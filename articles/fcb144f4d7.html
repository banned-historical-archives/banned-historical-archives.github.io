tart":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"韦国清等总政治部领导同志接见参加第四次文代会的我军代表团","authors":["王胜朝麦辛"],"parts":[{"type":"paragraph","text":"本报十五日讯 总政治部主任韦国清同志，副主任梁必业、黄玉昆、朱云谦同志，今天晚上接见了参加第四次文代会的解放军代表团的全体代表和工作人员。"},{"type":"paragraph","text":"韦国清同志在接见时首先向大家问好和祝贺。他在讲话中指出，邓小平同志对大会的《祝辞》讲得很全面、很深刻，坚持了毛泽东文艺思想，正确地估计了我国三十年来文艺战线上所取得的成就，并对今后的文艺工作指明方向，提出任务，对于组织、鼓舞文艺队伍进行新的长征具有重大的意义。韦国清同志肯定了部队文艺工作的成绩，要求大家回去以后，要很好地传达贯彻会议精神，认真学习《祝辞》，深刻全面理解其精神实质，结合部队的实际贯彻落实。他要求部队文艺工作者坚持三中全会提出的思想路线和政治路线，排除“左”的和右的思想倾向的影响，团结起来向前看，努力攀登文艺高峰，把部队文艺工作做得更好、更活跃、更有成绩。"},{"type":"paragraph","text":"（本报记者 王胜朝 麦辛）"}],"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fcb144f4d7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
