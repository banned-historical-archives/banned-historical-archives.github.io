art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"焦作王封煤矿采煤三队创全国薄煤层月产新纪录","authors":[],"parts":[{"type":"paragraph","text":"据新华社郑州一九七六年六月十三日电 在深入批邓、反击右倾翻案风的斗争取得伟大胜利的大好形势下，连续多年月月获得原煤高产的河南焦作矿务局王封矿采煤三队，今年五月份生产原煤七万一千五百七十四吨，创造了全国薄煤层工作面月产最高纪录。这个队已经提前四十六天完成了上半年煤炭生产计划。"},{"type":"paragraph","text":"王封矿采煤三队是全国煤炭工业系统的先进集体。一九七五年全队生产原煤六十万零七千多吨。相当于一个中型煤矿的年产量。反击右倾翻案风的斗争开展以来，这个队的党支部领导成员站在运动前列，带领全队职工认真学习毛主席的一系列重要指示，牢牢掌握斗争大方向，把批邓、反击右倾翻案风的斗争不断引向深入。党支部副书记张洪昌、张秉国、李奎诗等，深入班组，和群众同学习，同批判。在党中央两项英明决议的鼓舞下，全队职工迅速掀起了深入批邓、反击右倾翻案风斗争的新高潮。"},{"type":"paragraph","text":"在批邓、反击右倾翻案风斗争的推动下，采煤三队党支部充分依靠工人群众，坚持抓革命，促生产的方针，开展学大庆、赶开滦的群众运动，促进了煤炭生产的发展。五月份这个队的工作面中间出现五十多米长的薄煤带，煤层厚度只有半米左右，机组无法通过。工人们说，为了以实际行动批判邓小平、反击右倾翻案风，就是高山挡道，我们也要闯过去。他们组织突击队，分三班集中崩矸崩煤，终于扫清了机组通道。机电班的工人们破除迷信，解放思想，群策群力，实现了五项技术革新，全队产量一旬比一旬高，到月底产煤七万一千五百七十四吨，攀上了月产量的高峰。"}],"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6fb77dcb08"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
