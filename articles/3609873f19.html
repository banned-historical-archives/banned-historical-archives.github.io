tart":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"邓副总理离东京抵京都访问","authors":[],"parts":[{"type":"paragraph","text":"据新华社京都十月二十六日电 邓小平副总理和夫人卓琳，在园田外相的夫人园田天光光的陪同下，二十六日晚离开东京乘新干线超特快列车抵达日本的文化古城——京都进行友好访问。"},{"type":"paragraph","text":"在邓副总理离开东京之前，日本首相福田赳夫和夫人福田三枝到国宾馆送行。福田首相和邓副总理热烈握手，他对邓副总理说，今天早上他拜见了天皇陛下，天皇说，不知邓副总理这次旅行怎样，福田说，据我看来邓副总理是很满意的。邓副总理向福田首相表示感谢。并对他说，希望最近能在北京见到您，那时，您会见到华总理、叶委员长。福田说，那就约好，下次在北京见面吧！"},{"type":"paragraph","text":"在此以前，保利茂议长也前往宾馆为邓副总理送行。保利议长对邓副总理和廖承志副委员长说，其他外国人到别的国家时，不会象你们这样，在一夜之间就交了这么多朋友。"},{"type":"paragraph","text":"园田外相和日本政府其他官员到东京新干线车站为中国副总理送行。"},{"type":"paragraph","text":"邓副总理在舒适的列车上渡过了两小时零五十分钟，于十八时零二分抵达京都车站。京都负责人和各界知名人士聚集在月台上，鼓掌欢迎中国客人。当邓副总理及其一行走出车站时，聚集在出口处的两百多名群众高呼：“欢迎！欢迎！”他们挥动着中国国旗和日本国旗，热烈欢迎中国客人。"},{"type":"paragraph","text":"十月二十六日，福田首相和夫人前往迎宾馆为邓小平副总理和夫人送行。 共同社传真照片（新华社发）（照片）"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3609873f19"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
