<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"陕西司法机关揭露一批右派分子　李本固等原形毕露狼狈不堪","authors":["新华社"],"dates":[{"year":1957,"month":9,"day":15}],"is_range_date":false,"parts":[{"text":"陕西司法机关揭露一批右派分子　李本固等原形毕露狼狈不堪","type":"title"},{"text":"新华社","type":"authors"},{"text":"新华社西安１４日电:陕西省司法机关在最近两个多月中，先后揭露出一批反对共产党领导司法工作和恶毒地攻击国家法制的资产阶级右派分子。","type":"paragraph"},{"text":"右派分子、省司法厅律师公证科科员、民革成员李本固，诬蔑镇压反革命运动是“面宽刑重”，人民法院“拿人命开玩笑”；诬蔑司法部门的人事工作是“不问才不才，先问党不党”，叫嚣着要司法部门的共产党员下台；并且公然主张恢复旧司法系统管理人事的制度，向旧法人员招魂。司法厅的另外两个右派分子王伯约（共产党员）、杨绍简（民革成员）也极力反对党对司法工作的领导。他们诬蔑党对法院工作的领导和过问，是“造成案件错判的原因之一”，是“干涉”法院工作。陕西省人民检察院第一处副处长、右派分子杨玉珊（共产党员），诬蔑党的领导使检察机关不能发挥威力，并且以检察机关“只服从法律”为名，企图取消党对检察机关的领导。西安市第二法律顾问处副主任、右派分子马海瀛，诬蔑人民检察院对于一些案件的起诉是“唯恐天下不乱”，是“天下本无事，庸人自扰之”。他诬蔑检察院是“拿着镢头埋人”。省高级法院人民接待室主任、右派分子王黎昌恶毒地说，党中央可以领导司法工作，而地方党委不能领导同一级的法院工作，企图以此来取消党对司法工作的领导。","type":"paragraph"},{"text":"据揭发，这些右派分子大多数是解放前的旧司法人员。例如，李本固在解放前就曾经历任日伪吉林省高等检察厅书记官、吉林监狱教诲师、依兰县典狱长和伪国民党西安地方法院代理推事等；解放后在司法改革和肃反运动中受到严格批判，因而对共产党心怀不满。杨绍简解放前曾任伪河南陈县军法处承审员、伪陕西高等法院书记官；解放后曾包庇过逃亡地主和封建把头，对司法改革也心怀不满。","type":"paragraph"},{"text":"这些右派分子在陕西省司法机关工作人员的揭露和据理驳斥下，已经原形毕露、理屈词穷。例如，省司法厅的工作人员在驳斥李本固诬蔑镇压反革命运动的谰言时指出，人民法院办案的原则是派人调查，集体研究，非常慎重，即使发生错误也是坚持“有错必纠”的原则。大家当场质问李本固散播这些谰言有何根据，李本固这时举不出事实，狼狈不堪，不得不承认他自己是捏造，是恶意中伤。目前，有些右派分子已经低头认罪。","type":"paragraph"},{"text":" ——原载《人民日报》1957年9月15日。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a7274cc4c5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
