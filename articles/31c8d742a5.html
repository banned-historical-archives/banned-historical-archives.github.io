[],"dates":[{"year":1949,"month":10,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社广州廿三日电】　广州市军事管制委员会已于二十一日奉命成立。以叶剑英、方方、邓华、赖传珠、洪学智、萧向荣、曾生、林平、朱光、李章达、吴奇伟、张醁村为委员；叶剑英为主任，赖传珠为副主任。该会成立后即开始进行接管工作。"},{"type":"paragraph","text":"【新华社华南前线廿二日电】　广州西南地区人民解放军某部，二十日在新兴北四十里腰古圩地区，歼灭由广州西逃的伪广州绥署保安第三总队全部，生俘伪总队司令叶超，战果在清查中。"},{"type":"paragraph","text":"又讯:三水伪警察局长吕诛、保安营长欧阳义率领全部官兵，向解放军投诚。"},{"type":"paragraph","text":"【新华社华南前线廿二日电】　国民党残余匪帮自粤汉铁路南段狼狈溃逃时，疯狂破坏铁路桥梁，妄图以此延缓解放军勇猛前进。除部分桥梁因解放军进展神速未遭炸毁外，粤北始兴至曲江公路上之黄金桥、水泥大桥及多数木桥均遭匪军破坏。粤汉铁路上横跨浈江之曲江铁桥及英德以南之琶江大桥亦全遭炸毁。十月十四日匪军残部更于逃离广州最后一刻将市内连贯珠江南北两岸之海珠大桥炸毁，死伤平民五百余人。大桥北岸附近人家无一幸免，桥南的南华东路及鱼市场一带大部民房均成瓦砾。匪军于炸毁该桥前，曾控制桥头附近街道，藉口紧急戒严，暗地将四百余箱烈性炸药装上桥墩，旋即恢复交通。当桥上车马行人和桥下船只往来如织之际，匪帮竟拉开烈性炸药导火线，使全桥连续发生爆炸，一时血肉横飞，惨不忍睹，造成重大惨案。全市市民对匪军此种丧心病狂的暴行，莫不切齿痛恨，一致要求解放军早日将罪大恶极的匪首擒获法办。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"31c8d742a5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
