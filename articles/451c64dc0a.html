<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"房租上涨　居民老化　政治右倾——巴黎的一个难题","authors":["姚立"],"dates":[{"year":1990,"month":1,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"房租上涨　居民老化　政治右倾"},{"type":"paragraph","text":"——巴黎的一个难题"},{"type":"paragraph","text":"一年多来，法国巴黎１８区的一幢公寓门前一直挂着块牌子，上面写着醒目的大字：出租套房。然而，不但空房至今难以租出，而且还不断有住户搬走。一些老住户感慨道，这种现象乃前所未有。"},{"type":"paragraph","text":"据公寓的看门人介绍，出租的房屋都是４９平米的两间套房。搬走的住户大都是即将作父母的年轻夫妇。他们面临孩子的降生，无力每月花费５０００多法郎在市内换套大些的房子，只好迁到房租较低的市郊。而空出的房间又很少有人问津，因为市区房租太高，一些未婚青年男女对之只能“望楼兴叹”。"},{"type":"paragraph","text":"这幢公寓居民的遭遇从一个侧面反映了巴黎住房难的状况。主要原因是房租高。例如，市区一套普通住房的租金比郊区要高出１６％。另据统计，１９８８年，市区的房租平均提高了８％，新租房屋的租金上涨更快，达３０％。"},{"type":"paragraph","text":"房租直线上升引起住户的诸多不满。安德烈已８０多岁，一直住在市中心，居室月租金是２２０７法郎，前年，房主和他续约时，一下子要提到７５００法郎。涨幅如此之大，使他无法接受。他只好诉诸法律。"},{"type":"paragraph","text":"安德烈能否胜诉，姑且不谈，巴黎房租昂贵确实带来了不少问题。多年来，迁居郊区或外地的人不断增加，市区人口随之萎缩。１９５４年，市区人口约２８５万，到１９８２年人口普查时，已降至２１３万，减少１／４。而且迁出的多为年轻人，结果市区老人的比例大大提高。３５年前，巴黎市６５岁以上的人口占１１％，到１９８２年，这一比例已上升到１７％。而且，市区住户中的单人家庭比例竟高达４８％，大大高于市郊的２９％。"},{"type":"paragraph","text":"房租上涨使巴黎人口的社会构成也发生着变化。属社会中下层的家庭比例越来越小。１９５４年，工人家庭所占的比例为２６％，而１９７５年，这一比例降至１６．８％，自由职业者和高级职员家庭的比例却从８．４％升至１３．３％。目前，这种趋势仍在继续。对于一般收入不多的年轻人和中下层家庭来说，居住巴黎已成为一种“奢望”。随着巴黎居民不断“富人化”，政治倾向也愈益右转。这已为巴黎近年的一些选举结果所证明。"},{"type":"paragraph","text":"法国报刊就此写到：“巴黎正在逐步地脱离她的青年、儿童、穷人乃至生活。”"},{"type":"paragraph","text":"（姚立　编译）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"451c64dc0a"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
