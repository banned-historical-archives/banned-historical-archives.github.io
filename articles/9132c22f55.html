ical-archives/banned-historical-archives8/main/maoquanji13.pdf"],"article":{"title":"抚平江惨案死难烈士联叫","alias":"","parts":[{"type":"paragraph","text":"挽平江惨案死难烈士联！]"},{"type":"paragraph","text":"（1939年8月1日）日寇凭陵口，国难方殷③，枪口应当向外；"},{"type":"paragraph","text":"吾人主战，民气团可用，意志必须集中。"},{"type":"paragraph","text":"[1]1939年6月12日，国民党制造了轰动全国的“平江惨案”。惨案发生后，中共中央于8月1日在延安隆重举行追悼大会。毛泽东在会上发表了《必须制裁反动派》的演说，并送了这副挽联。其他领导人也送了挽联。平江惨案，1939年6月12日，驻湖南平江的杨森奉蒋介石密令，勾结地方反动势力，派国民党第二十七集团军包围新四军驻平江嘉义镇的通讯处，假借“商谈抗日紧急事宜”，将中共湘鄂赣特委书记、新四军平江留守通讯处主任涂正坤引出办事处。涂正坤刚出大门，即遭枪杀。随后，敌人冲入留守处，逮捕了抗日干部20余人，并且当即杀害了特委秘书吴渊、罗梓铭等5人。"},{"type":"paragraph","text":"[2]凭陵，同冯陵，侵扰之意。[3]方，正在。殷，深重。[4]民，人民。气，气势。"}],"authors":["毛泽东"],"dates":[{"year":1939,"month":8,"day":1}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":501,"page_end":501},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9132c22f55"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
