<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"全国气象部门学大寨学大庆代表会议闭幕  提高气象科技水平  为实现四化做贡献  李副主席作了指示，陈副总理讲了话","authors":[],"dates":[{"year":1978,"month":10,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"全国气象部门学大寨学大庆代表会议闭幕"},{"type":"paragraph","text":"提高气象科技水平为实现四化做贡献"},{"type":"paragraph","text":"李副主席作了指示，陈副总理讲了话"},{"type":"paragraph","text":"新华社北京十月二十八日电　全国气象部门学大寨学大庆代表会议十九日在首都人民大会堂隆重闭幕。中共中央副主席、国务院副总理李先念在会上号召气象战线的工作人员，努力学习，提高气象科学技术水平，为实现四个现代化而奋斗。"},{"type":"paragraph","text":"这次会议是十月七日在天津市开幕的，是继一九五七年全国气象先进工作者代表会议之后的又一次规模盛大的群英会，也是向四个现代化进军的誓师会。出席会议的有各级气象部门，包括广大的气象台、站、哨和科研、院校、工厂等单位的代表，有各省、市、自治区气象部门的领导成员和军队气象部门、民航、海洋、农垦、水产、盐业等有关部门的代表，还有特邀的著名气象学家、技术人员的代表，共计一千三百人。"},{"type":"paragraph","text":"以华主席为首的党中央对这次会议极为关怀。华主席为会议题词：“努力办好人民气象事业，为建设社会主义的现代化强国服务。”叶副主席也为会议题词：“加速气象科学技术现代化，为建设社会主义现代化强国做出新贡献！”代表们认真学习了两个题词，一致认为它体现了毛主席、周总理生前关于发展我国气象事业的一贯思想，指明了在新的历史时期气象工作的方向和任务，表达了以华主席为首的党中央对气象部门的殷切期望和关怀。"},{"type":"paragraph","text":"华国锋主席，叶剑英、邓小平、李先念、汪东兴副主席，党和国家其他领导人，十月二十日下午在人民大会堂接见了出席会议的全体代表，并同大家一起照了像。"},{"type":"paragraph","text":"中共中央政治局委员、国务院副总理纪登奎主持了闭幕式。中共中央政治局委员、国务院副总理陈永贵在闭幕式上讲了话。然后，中共中央副主席、国务院副总理李先念在会上作了指示。他勉励气象工作者说，气象是一门重要的科学。气象工作这条战线非常艰苦，你们做出了很好的成绩。因此，我想不论农业、工业、军事、航海业、捕捞业，所有各条战线都是感谢你们的，人民也是感谢你们的。"},{"type":"paragraph","text":"陈永贵副总理在讲话中指出，建国二十九年来，毛主席的革命路线在气象工作中始终是占主导地位的。广大气象工作者在各级党委领导下，做出了很大的成绩。实践证明，气象战线的各级领导班子大多数是好的和比较好的，气象队伍是一支经受了考验的好队伍。"},{"type":"paragraph","text":"陈副总理说，以华主席为首的党中央，正在率领全党、全军、全国人民进行新的长征。气象工作是新长征队伍的一支不可缺少的力量。新的时期，新的任务，要求我们广大气象工作者空前紧张地动员起来，为实现四个现代化做出应有的贡献。"},{"type":"paragraph","text":"陈副总理强调说，农业是国民经济的基础，是气象工作服务的重点。按照发展国民经济十年规划纲要提出的要求，任务是十分艰巨的。气象部门应当义不容辞地为完成这个任务做出贡献。"},{"type":"paragraph","text":"随着四个现代化步伐的加快，我国的工业、交通、航空、航海等国民经济各部门，以及国防建设事业，都将会以更快的速度向前发展。这些都需要气象部门提供及时准确的气象预报、情报和资料。因此，做好气象工作，是党和国家的要求，是广大人民的期望。"},{"type":"paragraph","text":"陈副总理指出，当前我国气象工作存在的主要问题是：技术装备落后，监视灾害性天气能力差，理论研究薄弱，管理水平低，因此，灾害性天气预报水平和防御能力还不高，不能适应新形势的要求。"},{"type":"paragraph","text":"陈副总理要求，气象部门首先要揭批“四人帮”，分清路线是非，解决心有余悸的问题。同时，要抓紧落实党的干部政策和知识分子政策，把广大气象干部和科技人员的积极性充分调动起来。还要抓紧业务工作，提高科学技术水平，向气象工作现代化进军。要迅速改变技术装备落后面貌，加强基础理论研究，努力办好气象院校、加紧培育人才，巩固和发展农村气象哨、大力开展群众性的科学实验活动。当前，要主攻对国计民生影响大的灾害性、关键性天气的预报和预防，大力开展人工降雨、防霜、防雹等项研究，全面提高业务水平和服务质量。各级党委要把气象工作列入议事日程，在抓工农业生产的同时，注意抓好气象工作。要保证科技人员有六分之五的时间从事业务服务和气象科研工作。气象部门的领导干部也要学习业务，不能长期当外行。要从政治上、生活上关心气象工作人员，特别是关心那些地处高山、沙漠、海岛、边远地区的气象台、站。要切实帮助他们解决实际困难。"},{"type":"paragraph","text":"在闭幕式上，农林部部长杨立功和中央气象局主要负责人饶兴向红旗单位代表和个人标兵分别颁发了锦旗、奖状。这次受奖的是：“县站预报的开路先锋”云南省镇雄县气象站、“风雪高原艰苦创业”的西藏自治区那曲地区气象台、“牧区学大寨的气象尖兵”内蒙古自治区镶黄旗气象站、“大搞业务基本建设，猛攻暴雨预报关”的江西省奉新县气象站、“为山区推广杂交水稻做贡献”的湖南省桂东县气象局、“依靠群众办气象，服务农业当闯将”的广西壮族自治区桂平县气象站等十七个红旗单位和全国气象部门的老模范段春作、娜仁格日勒、后起之秀阿加尔汗等十三个个人标兵。这次会议还表彰了一百一十八个先进单位和一百五十四个先进个人。"},{"type":"paragraph","text":"中共中央政治局委员、国务院副总理陈锡联，中共中央政治局候补委员、国务院副总理陈慕华，国务院副总理王震、谷牧也参加了闭幕式。参加闭幕式的还有国务院有关部、委、局和军队气象部门的负责人以及在京的气象工作者共三千四百多人。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"李先念","type":"人物"},{"name":"陈永贵","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"发言"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"80ad8f583f"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
