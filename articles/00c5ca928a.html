" crossorigin="">{"props":{"pageProps":{"books":[{"id":"01970a4d-895c-4f40-9511-60b51d869906","name":"唯物辩证法大纲（人民出版社1978年版）","internal":false,"official":true,"type":"pdf","author":"李达，人民出版社1978年版","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives3/main/01970a4d-895c-4f40-9511-60b51d869906.pdf"],"article":{"title":"出版说明","alias":"","parts":[{"type":"paragraph","text":"出版 说 明"},{"type":"paragraph","text":"我国著名哲学家李达同志逝世已经十二年，他在生前主持编写的《唯物辩证法大纲》，现在终于出版同广大读者见面。李达同志的遗愿得到了实现。"},{"type":"paragraph","text":"李达同志生于一八九○年。他从青年时候起就接受了马克恩主义。在我党成立前后到一九二七年这一期间，他在《薪青年》、《湘报》等刊物上，发表了许多文章，在我国早期传播马克思主义的活动中，起了积极的作用。在大革命失败后到新中国成立前的二十多年里，李达同志在国民党统治区任教，虽然政治环境十分险恶，但他始终坚持马克思主义的理论阵地，陆续写作和出版了《社会学大纲》、《经济学大纲》、《货币学概论》等著作。同时还翻译了《唯物辩证法教程》等书，把苏联批判德波林学派的成果介绍到国内来。其中《社会学大纲》这部著作，系统地论述了马克思主义哲学的基本原理，是他这一时期理论工作的主要成果。李达同志曾经把它寄到革命圣地延安，得到了伟大领袖毛主席的称赞。"},{"type":"paragraph","text":"新中国成立以后，李达同志勤奋地钻研毛主席著作，把宣传、解释毛主席的光辉哲学思想作为自已的光荣职责。为此，他写了一系列的论文和著作。其中《\u003c实践论\u003e解说》和《\u003c矛盾论\u003e解说》两书，伟大领袖毛主席曾经给予亲切的关怀和鼓励，出版以后，在国内外被翻译成多种文字，发生了广泛的影响。现在出版的这本《唯物辩证法大纲》，是李达同志主持编写的最后一部哲学著作，年到一九六五年，李达同志带病工作，为编写本书贡献了全部精力。这部著作系统地论述了马克思主义哲学的产生，发展及辩证唯物主义的基本原理；阐述了毛主席的光辉哲学思想；紧密联系当时国内外思想战线斗争的实际，对各种资产阶级反动哲学观点和修正主义哲学恩想，进行了有力的批判；同时结合我国社会主义革命与建设的实际，从方法论上论述了学习和运用这些原理的重要意义。论述深入浅出，文字比较简炼，概括了大量哲学史材科和自然科学成就，较好地体现了马克思主义哲学的理论与实践的统一，党性与科学性的统一，世界观与方法论的统一。它的出版，有助于广大读者完整地、雅确地理解辩证唯物主义的基本原理。"},{"type":"paragraph","text":"武汉大学前毛泽东思想研究室的同志参加了本书的编写工作，一九六五年曾经印出少量的本。现在正式出版，原来参城编写工作的陶德麟同志根据李达同志生前的意见，对原稿作了必要的修改，陈祖华同志校阅清样，提过一些修改意见。"},{"type":"paragraph","text":"一九七八年五月"}],"authors":[],"dates":[{"year":1978,"month":5}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":4,"page_end":5},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"00c5ca928a"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
