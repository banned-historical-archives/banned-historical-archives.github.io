script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"红小兵敢批走资派  宁夏海原县苍湾小学回汉族少年儿童用革命儿歌狠批邓小平","authors":[],"dates":[{"year":1976,"month":5,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"红小兵敢批走资派"},{"type":"paragraph","text":"宁夏海原县苍湾小学回汉族少年儿童用革命儿歌狠批邓小平"},{"type":"paragraph","text":"据新华社银川一九七六年五月三十一日电　在反击右倾翻案风斗争中，宁夏回族自治区海原县苍湾小学的回汉族少年儿童，以革命儿歌为武器参加批邓、反击右倾翻案风的斗争，推动了教育革命的深入发展。"},{"type":"paragraph","text":"反击右倾翻案风斗争开始后，苍湾小学的红小兵立即行动起来，以儿歌为武器，狠批翻案复辟狂邓小平。全校从一年级到五年级，人人挥笔，个个参战，短短四个多月就写了五百多首儿歌。这些儿歌热情歌颂伟大领袖毛主席，歌颂伟大的中国共产党，歌颂无产阶级文化大革命和社会主义新生事物，愤怒批判邓小平，痛击右倾翻案风。这些儿歌中，有的用马列主义、毛泽东思想的一个观点，批判邓小平的一个黑谬论，有的用十年来的大好形势，批驳邓小平鼓吹的“今不如昔”的反动谬论。这些旗帜鲜明、战斗性强的革命儿歌，在反击右倾翻案风的斗争中成为“团结人民、教育人民、打击敌人、消灭敌人的有力的武器”。在批判邓小平炮制的“三项指示为纲”的修正主义纲领时，红小兵们学习了毛主席关于阶级和阶级斗争的教导，在农村进行了调查访问，听了老贫农的忆苦思甜报告，写了一首儿歌：“阶级斗争是纲，字字放射金光；‘三项指示为纲’，砒霜裹着蜜糖；我们心明眼亮，决不受骗上当；坚持阶级斗争，狠批反动黑纲。”今年春天，红小兵们听到邓小平捏造什么“现在样板戏都卖不出去票了”的反动谬论，非常气愤。随即在老师的率领下，徒步二十多里，到县城再次看了革命样板戏电影《红灯记》和歌颂社会主义新生事物的影片。回来后创作了《贫下中农最爱样板戏》的儿歌，针锋相对地批判了邓小平的反动谬论。"},{"type":"paragraph","text":"早在批林批孔运动中，苍湾小学就通过开展革命儿歌创作和朗诵活动，组织儿童参加批林批孔斗争。红小兵们在斗争中学习马列主义、毛泽东思想，一年当中，写出了几百首很有战斗性的儿歌。随着教育革命的不断深入，这个学校革命儿歌的创作活动也不断发展。他们在实践中认识到，革命理论是搞好儿歌创作的思想武器，三大革命运动是开展儿歌创作的生活源泉。在学习无产阶级专政理论运动中，全校组织了红小兵理论学习小组，使学生从小粗知一点马列主义。为了更好地帮助学生了解斗争实际，他们请贫下中农到学校做忆苦思甜报告，进行新旧对比教育；请基层干部讲文化大革命以来的巨大变化。还让学生走出校门，参加社会活动，参加集体生产劳动，进行社会调查。在反击右倾翻案风斗争中，高年级学生通过调查，举办了苍湾大队十件新事展览，使学生清楚地看到，邓小平要翻文化大革命的案，算文化大革命的帐，目的就是为了颠覆无产阶级专政、复辟资本主义，这是革命人民绝对不能答应的。因此，在举办展览中，连一年级小学生也写了儿歌，表达他们的决心：“握紧小拳头，口号震天地，我们要革命，坚决反复辟”。"},{"type":"paragraph","text":"“六一”儿童节前夕，这个学校的红小兵又发出了新的誓言：铁拳对准走资派，红心永向毛主席，反修防修当闯将，誓保江山红万年。（附图片）"},{"type":"paragraph","text":"这是山东省武城县城关完小五年级学生、红小兵在声讨邓小平的罪行，回击右倾翻案风。"},{"type":"paragraph","text":"本报通讯员摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"宁夏文革","type":"人物"},{"name":"批林批孔","type":"主题/事件"},{"name":"教育革命","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0a80ae7748"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
