tart":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"《毛泽东军事战略论》出版江泽民题写书名","authors":["李庆山/姜文明"],"parts":[{"type":"paragraph","text":"本报北京12月22日讯 李庆山、特约记者姜文明报道：在纪念毛泽东诞辰100周年之际，由军事科学院有关专家编著的《毛泽东军事战略论》一书，日前由军事科学出版社出版发行。中央军委主席江泽民为这部专著题写书名。"},{"type":"paragraph","text":"毛泽东在长期的中国革命战争和军事实践中，形成了一套完整的军事战略的科学体系。《毛泽东军事战略论》，运用马克思主义的立场、观点和方法，以史实为依据，以战略为主体，从毛泽东的战略实践、战略观与方法论、战略思想、战略指导艺术以及坚持与发展毛泽东战略思想等方面，对毛泽东军事战略进行了较完整、深刻的论述。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"江泽民","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"017aaaa8ec"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
