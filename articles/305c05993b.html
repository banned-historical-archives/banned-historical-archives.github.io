r":1966,"month":10,"day":31}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛泽东思想放光采"},{"type":"paragraph","text":"解放军空军某部五好飞行员　杜心元"},{"type":"paragraph","text":"毛泽东思想放光采，"},{"type":"paragraph","text":"照遍五湖和四海。"},{"type":"paragraph","text":"我们的核导弹腾空起，"},{"type":"paragraph","text":"自力更生的一朵大红花儿开。"},{"type":"paragraph","text":"空军战士闻喜讯，"},{"type":"paragraph","text":"革命激情满胸怀，"},{"type":"paragraph","text":"高兴得热泪挂满腮，"},{"type":"paragraph","text":"毛主席啊，"},{"type":"paragraph","text":"这革命胜利的大果树是您栽！"},{"type":"paragraph","text":"我国成功发射了导弹核武器，"},{"type":"paragraph","text":"好像春雷震大地。"},{"type":"paragraph","text":"中国人民迈阔步，"},{"type":"paragraph","text":"毛泽东思想威力大无比。"},{"type":"paragraph","text":"美帝苏修吓破胆，"},{"type":"paragraph","text":"革命人民长志气。"},{"type":"paragraph","text":"颗颗红心向太阳，"},{"type":"paragraph","text":"太阳就是毛主席。"},{"type":"paragraph","text":"干革命靠毛泽东思想，"},{"type":"paragraph","text":"毛主席的教导永远牢记在心中。"},{"type":"paragraph","text":"四卷红书天天读，“老三篇”当座右铭。"},{"type":"paragraph","text":"毛泽东思想照心中，"},{"type":"paragraph","text":"科学高峰我们能攀登。"},{"type":"paragraph","text":"毛泽东思想照心中，"},{"type":"paragraph","text":"改造世界显威风。"},{"type":"paragraph","text":"毛主席的话我句句听，"},{"type":"paragraph","text":"驾起“雄鹰”镇长空。"},{"type":"paragraph","text":"伟大胜利鼓舞我们，"},{"type":"paragraph","text":"革命路上去冲锋。"},{"type":"paragraph","text":"我们要紧跟毛主席，"},{"type":"paragraph","text":"革命路上当尖兵。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"305c05993b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
