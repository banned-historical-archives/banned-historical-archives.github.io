uthors":[],"dates":[{"year":1948,"month":12,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"苏联科学院经济研究所开会"},{"type":"paragraph","text":"讨论加强联系实际"},{"type":"paragraph","text":"批评瓦尔加与资产阶级妥协的观点"},{"type":"paragraph","text":"【新华社陕北一日电】电通社莫斯科十一月二十六日讯：苏联的政治经济学家们，正被号召研究如何把社会主义经济学实际地应用于目前的情况，以帮助苏联政府及人民民主国家的政府。这是苏联科学院经济研究所科学委员会最近召开的四天会议讨论的主要内容。该委员会是与国家计划委员会协同工作的机关。科学院经济研究所所长奥斯特洛维扬诺夫提醒苏联的四千五百个经济学家说：联共中央最近号召哲学家和生物学家少作空泛的理论，加强实际效果。经济学家们也应当从这一号召中得出同样结论。会议通过明年的计划，其中包括对下列问题的研究：苏联工业中的工资问题，电气化在完成向共产主义转变的过程中的作用及对开发东部西伯利亚的展望等。"},{"type":"paragraph","text":"会议中理论讨论的显著特点，是抨击瓦尔加及其他一些经济学家的观点，他们顽固地坚持资本主义制度可以有某种程度的计划经济，并说这种计划经济似乎可以使阶级斗争变为工人阶级与资产阶级之间的妥协。会议并批评瓦尔加过低估计人民民主国家中阶级矛盾的重要性和不认识人民民主国家中工人阶级的领导作用。他没有能够强调民主国家只有在苏联的帮助下才能达到社会主义。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f3e88b5b55"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
