art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"叶剑英副主席等会见港澳各界人士代表团和港澳工人代表团","authors":[],"parts":[{"type":"paragraph","text":"新华社一九七三年十月四日讯 中共中央副主席、军委副主席叶剑英，中共中央委员廖承志，中共中央委员、国务院副秘书长罗青长，中共中央统一战线工作部负责人李金德今天下午会见了前来参加国庆活动和观光的以费彝民为团长，高卓雄、周宏明为副团长的港澳各界人士代表团，和以杨光为团长，马质彬、陈煌年为副团长的港澳工人代表团，同他们进行了亲切的交谈。叶副主席欢迎他们回来参观访问，勉励他们为促进爱国大团结，为实现台湾解放、祖国统一贡献力量。"},{"type":"paragraph","text":"参加会见的还有有关方面负责人梁上苑、李瑞环、朱曼平，新华社香港分社社长梁威林。"},{"type":"paragraph","text":"在北京期间，港澳爱国同胞们同首都人民一起参加了国庆游园活动，参观了工厂、人民公社、学校，游览了名胜古迹，所到之处都受到了热情欢迎。港澳各界人士和工人代表团将于五、六日分别离开北京，前往外地继续参观访问。"},{"type":"paragraph","text":"叶剑英、廖承志、罗青长、李金德十月四日会见了前来参加国庆活动和观光的港澳各界人士代表团和港澳工人代表团。"},{"type":"paragraph","text":"图为会见时合影。 新华社记者摄（照片）"}],"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"廖承志","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f2bf649fdd"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
