":[],"dates":[{"year":1967,"month":5,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"坦桑尼亚财政部副部长拉希迪举行访华宴会"},{"type":"paragraph","text":"热烈赞扬中国文化大革命"},{"type":"paragraph","text":"据新华社讯　坦桑尼亚财政部副部长拉希迪十二日晚在北京赞扬说，由伟大领袖毛主席亲自发动和领导的中国无产阶级文化大革命，是具有世界意义的大事。中国人民热爱毛主席，活学活用毛主席著作，是对世界人民斗争的伟大贡献。"},{"type":"paragraph","text":"拉希迪是在他为访问中国而举行的宴会上讲这些话的。国务院副总理李先念，以及财政部、外交部有关方面的负责人，应邀出席了宴会。"},{"type":"paragraph","text":"拉希迪在讲话中说，在毛泽东主席的正确领导下，中华人民共和国坚决反对和谴责帝国主义、新老殖民主义；北京已经成为世界人民抗击帝国主义的中心。中国坚决支持正在进行抗美救国斗争的越南人民，社会主义的中国是亚洲、非洲、拉丁美洲人民的最大的鼓舞力量。"},{"type":"paragraph","text":"他说，全世界被压迫人民都尊敬毛主席。他们热情地活学活用毛主席著作，无保留地支持中国无产阶级文化大革命。"},{"type":"paragraph","text":"拉希迪在讲话中介绍了坦桑尼亚在尼雷尔总统领导下，在发展独立的民族经济方面所作出的努力，表示坦桑尼亚人民坚决站在非洲反帝斗争的前列。"},{"type":"paragraph","text":"财政部副部长吴波在宴会上讲话，表示衷心感谢拉希迪副部长对我们伟大领袖毛主席和对光焰无际的毛泽东思想的称颂，以及对中国无产阶级文化大革命的赞扬。他说，拉希迪副部长的讲话，是对帝国主义、现代修正主义和各国反动派的一个沉重打击。"},{"type":"paragraph","text":"坦桑尼亚驻中国大使姆瓦卢科出席了宴会。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b63a8cfe96"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
