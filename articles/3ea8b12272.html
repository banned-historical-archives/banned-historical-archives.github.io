es":[{"year":1953,"month":8,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社平壤十二日电】　据“民主朝鲜报”报道:按照平壤市的重建计划，平壤市将修建一条宽阔平坦的大街，命名为“毛泽东路”，藉以纪念朝中两国人民的深厚友谊。在这条大街上，将建设用来表现朝鲜人民对中国人民的伟大领袖毛泽东主席和英雄的中国人民志愿军的热爱和感谢的建筑物。“毛泽东路”将紧接着横贯平壤市的“斯大林路”北口:从中心区的牡丹峰山麓箕林里起，直到北郊的坎北山山麓坎兴里止，长达四里多，是从平壤到新义州和从平壤到满浦越过鸭绿江前往中国的必经之路。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3ea8b12272"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
