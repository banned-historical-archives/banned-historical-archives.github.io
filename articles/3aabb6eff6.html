script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"中央人民政府举行元旦团拜毛主席亲致祝词祝我们在一九五二年取得更大的胜利","authors":[],"dates":[{"year":1952,"month":1,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京一日电】　中央人民政府在今日下午六时半在中南海怀仁堂举行一九五二年元旦团拜。参加团拜的有中央人民政府毛泽东主席，朱德、李济深副主席，政务院董必武、郭沫若、黄炎培副总理，中国人民政治协商会议全国委员会陈叔通副主席，人民革命军事委员会聂荣臻代总参谋长，中央人民政府委员会李立三、吴玉章、彭真、薄一波、乌兰夫、徐特立、蔡畅、刘格平、马寅初、马叙伦、沈雁冰、司徒美堂、蔡廷锴、彭泽民、傅作义、章伯钧、张奚若、谭平山、柳亚子、张东荪、龙云等委员，和中央人民政府政务院各委、部、会、院、署、行首长，人民革命军事委员会委员和所属各部首长，中国人民解放军陆、空、海军首长，中国人民政治协商会议全国委员会委员，各民主党派、人民团体负责人，文化、科学、教育、艺术工作者，首都各高等学校负责人共三百四十八人。应邀参加的，还有出席中央人民政府民族事务委员会第二次(扩大)会议的代表一百三十一人。"},{"type":"paragraph","text":"毛泽东主席在团拜开始时致祝词称:"},{"type":"paragraph","text":"“祝我们全体——人民政府的工作人员，人民志愿军和人民解放军的指挥员、战斗员，各民主党派，各人民团体，各少数民族和全国人民，在各个工作战线上的胜利!"},{"type":"paragraph","text":"祝我们在抗美援朝战线上的胜利!"},{"type":"paragraph","text":"祝我们在国防战线上的胜利!"},{"type":"paragraph","text":"祝我们在土地政革战线上的胜利!"},{"type":"paragraph","text":"祝我们在镇压反革命战线上的胜利!"},{"type":"paragraph","text":"祝我们在经济和财政战线上的胜利!"},{"type":"paragraph","text":"祝我们在文化和教育战线上的胜利!"},{"type":"paragraph","text":"祝我们在社会各界首先是知识分子的思想改造战线上的胜利!"},{"type":"paragraph","text":"我还要祝我们在新开辟的一条战线上的胜利，这就是号召我国全体人民和一切工作人员一致起来，大张旗鼓地，雷厉风行地，开展一个大规模的反对贪污、反对浪费、反对官僚主义的斗争，将这些旧社会遗留下来的污毒洗干净!"},{"type":"paragraph","text":"同志们，我们在上述一切战线上，在一九五一年，都已取得了胜利，有许多是极其伟大的胜利。我们希望，经过我们的共同努力，所有这些工作，在一九五二年能够取得更大的胜利。"},{"type":"paragraph","text":"中华人民共和国万岁!”"},{"type":"paragraph","text":"毛泽东主席致祝词后，举行欢宴。宴会完毕，由出席中央人民政府民族事务委员会第二次(扩大)会议的国内各民族代表向毛泽东主席、中国人民解放军朱德总司令和周恩来总理献礼、献旗致敬。团拜后，举行音乐舞蹈晚会。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"朱德","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3aabb6eff6"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
