tart":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"全国人大三届首次会议隆重开幕毛泽东刘少奇宋庆龄朱德周恩来邓小平等领导人出席开幕式周恩来总理代表国务院向大会作政府工作报告","authors":["孟庆彪杜修贤"],"parts":[{"type":"paragraph","text":"新华社二十一日讯 中华人民共和国第三届全国人民代表大会第一次会议，今天下午在人民大会堂隆重开幕。"},{"type":"paragraph","text":"中国人民的伟大领袖毛泽东主席，刘少奇主席，宋庆龄副主席，朱德委员长，周恩来总理，邓小平总书记等党和国家领导人，出席了大会开幕式。当他们同大会主席团其他成员一起登上主席台的时候，会场上响起了长时间的暴风雨般的掌声。"},{"type":"paragraph","text":"下午三时三十分，刘少奇主席宣布第三届全国人民代表大会第一次会议开幕。这时，全场起立，乐队高奏国歌。"},{"type":"paragraph","text":"接着，周恩来总理代表国务院向大会作政府工作报告。"},{"type":"paragraph","text":"周恩来总理的报告，在会场上激起一阵又一阵的掌声。"},{"type":"paragraph","text":"周恩来总理所作的政府工作报告，今天讲了一部分，明天还将在大会上继续报告。"},{"type":"paragraph","text":"今天大会的执行主席是：毛泽东、刘少奇、朱德、周恩来、宋庆龄、邓小平、彭真、康生、郭沫若、黄炎培、陈叔通、程潜、赛福鼎、林枫、刘宁一、阿沛·阿旺晋美等。"},{"type":"paragraph","text":"出席今天大会的代表，共有二千八百三十六人。"},{"type":"paragraph","text":"国务院组成人员，最高人民法院和最高人民检察院的负责人，中国人民解放军高级将领，列席了大会。"},{"type":"paragraph","text":"出席中国人民政治协商会议第四届全国委员会第一次会议的全体政协委员，也列席了大会。"},{"type":"paragraph","text":"第三届全国人民代表大会第一次会议十二月二十一日在首都人民大会堂隆重开幕。图为刘少奇主席宣布第三届全国人民代表大会第一次会议开幕。左起：彭真、周恩来、宋庆龄、毛泽东、刘少奇、朱德、邓小平。"},{"type":"paragraph","text":"新华社记者 杜修贤摄"},{"type":"paragraph","text":"大会会场。"},{"type":"paragraph","text":"新华社记者 孟庆彪摄"}],"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"邓小平","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"彭真","type":"人物"},{"name":"朱德","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d4ec6d67d1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
