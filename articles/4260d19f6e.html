tart":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"千万支颂歌唱给毛主席","authors":["北京部队学习毛主席著作积极分子代表大会代表内蒙古军区文工团“红色造反团”","王建萍"],"parts":[{"type":"paragraph","text":"歌声震天，心情激荡，最最最最幸福时刻到来了。"},{"type":"paragraph","text":"我们心中最红最红的红太阳毛主席神采奕奕，红光满面，和他的亲密战友林彪副主席接见了我们，并同我们一起照了像。这是我一生中最大的光荣，最大的幸福。我要一千遍一万遍地高呼：“毛主席万岁！万岁！万万岁！”"},{"type":"paragraph","text":"回想起在资产阶级反动路线迫害我们的时候，我们无产阶级革命派颗颗红心向着毛主席，日日夜夜想念毛主席。今天这个美好的愿望终于实现了，我们怎能抑制内心的激动，我们怎能不放声高唱：天大地大不如党的恩情大，爹亲娘亲不如毛主席亲。"},{"type":"paragraph","text":"毛主席啊，毛主席！是您那光辉思想的雨露阳光，哺育我们在斗争的大风大浪中锻炼成长，是您指引我们走上革命的道路，使我们懂得了革命，懂得了阶级和阶级斗争。没有您，就没有今天中国和世界革命的胜利。您是我们的最高领袖，最高统帅。我们要一辈子跟着您干革命。读您的书，听您的话，照您的指示办事。生，为捍卫您的光辉思想而战斗；死，为捍卫您的光辉思想而献身。谁敢反对您，我们就和他拚到底，坚决把他打倒！"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4260d19f6e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
