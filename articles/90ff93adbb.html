script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"《红旗》杂志发表文章批判现代修正主义者在文艺领域中的欺骗论调","authors":[],"dates":[{"year":1962,"month":11,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京1日电】　今天出版的《红旗》杂志第二十一期，除发表了社论《英雄的古巴人民必胜》以外，还发表了黎庶之的文章《现代修正主义者在文艺领域中追随没落的资产阶级》。黎庶之写的这篇文章，针对着现代修正主义者在文艺领域里的一种欺骗的论调，进行了分析批判。"},{"type":"paragraph","text":"这篇文章指出:现代修正主义者自称是主张“诚实地写作”，但他们所鼓吹的“诚实”，同现代资产阶级的文艺论者所说的“诚实”一样，不过是自我表现，内心剖白，歪曲真理，丑化社会主义，美化资本主义，表现个人主义、自由主义、虚无主义的“复杂内心”、“悲凉心境”和“狂乱的激情”。这种论调实质上是没落资产阶级的主观唯心主义的文艺论。这种文艺论的进攻矛头，是对着无产阶级革命文艺的党性的，是要把无产阶级文艺改造成为资产阶级文艺；是要把作家引向追求“内心的诚实”，而不是深入生活、深入群众；其中包藏着否定思想改造、拉着作家后退的恶毒企图；对作家的危害是很大的。文章指出，无产阶级作家所主张的诚实，是反映现实，反映客观真理，反映人民群众创造历史的斗争，歌颂社会主义和共产主义，表达人民群众的革命意志和革命理想；无产阶级的革命文学是最诚实的、忠于现实的文学。文章认为，现代修正主义者在文艺领域内玩弄“诚实地写作”论所想达到的企图，只是妄想，广大人民群众和革命作家是不会受到迷惑的。"},{"type":"paragraph","text":"另外，这期《红旗》杂志刊载的文章，还有姚依林的《高举毛泽东思想的旗帜，进一步做好社会主义商业工作》、杨波的《对积累和消费问题的几点意见》和赵明甫的《谈黄河流域的水土保持》"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"90ff93adbb"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
