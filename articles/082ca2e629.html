rs":[],"dates":[{"year":1978,"month":11,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"声讨“四人帮”的战斗呐喊革命文学史上的丰碑"},{"type":"paragraph","text":"《天安门诗抄》即将出版"},{"type":"paragraph","text":"新华社北京十一月十五日电　《天安门诗抄》即将由人民文学出版社出版。"},{"type":"paragraph","text":"出版社的编辑告诉记者，这本诗集已经付印，将于十二月中旬出书，明年一月八日周恩来同志逝世三周年前，即可在全国各地发行。"},{"type":"paragraph","text":"一九七六年清明节期间，英雄的首都人民以革命大无畏的精神，冲破“四人帮”的重重禁令，写了成千上万的革命诗词，沉痛悼念敬爱的周总理，愤怒声讨万恶的“四人帮”。这些张贴在人民英雄纪念碑前，或在天安门广场上朗诵过的诗歌，凝聚着人们的血和泪、爱和憎，是发自肺腑的战斗的呐喊，它们鼓舞着广大人民群众同“四人帮”作殊死的斗争。天安门诗歌在斗争中发挥了广泛深远的影响，是矗立在我国诗歌发展史和革命文学史上的一座丰碑。"},{"type":"paragraph","text":"当年写作或朗诵这些诗歌的同志尽管遭受了“四人帮”的残酷迫害，这些诗歌尽管被“四人帮”诬陷为“反革命诗词”而受到了查禁和销毁；但是人民群众仍然冒着种种危险，运用各种巧妙的方法，传抄这些诗歌，珍藏这些诗歌。粉碎“四人帮”以后，首都群众曾搜集、整理、编印过多种天安门诗集。人民文学出版社即将出版的《天安门诗抄》，是由童怀周根据自己编印的《天安门诗文选》（正续编）选编而成的。为天安门诗歌的收集、流传作出宝贵贡献的童怀周还为这本诗抄写了一篇前言。《天安门诗抄》收入了六百余篇诗文。全书分为三辑：第一辑，收古体诗、词、曲、挽联等；第二辑，收新体诗；第三辑，收悼词、誓词、祭文、散文诗。这本诗抄附有多幅珍贵的照片，将分精装、平装两种版本印行。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"082ca2e629"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
