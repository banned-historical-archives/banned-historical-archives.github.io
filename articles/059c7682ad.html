dates":[{"year":1953,"month":11,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"苏联“教师报”刊载论文"},{"type":"paragraph","text":"介绍毛泽东选集俄文版第三"},{"type":"paragraph","text":"【新华社莫斯科十九日电】苏联“教师报”十八日发表了普·谢沃斯季安诺夫的一篇论文，介绍“毛泽东选集”俄文版第三卷。作者介绍了“毛泽东选集”俄文版第三卷所包括的著作的时代背景和主要内容。他说：毛泽东同志在一九三九年五月到一九四一年五月这一时期的著作中，根据马克思列宁主义的学说，对中国共产党在这个时期的政治路线、战略和策略作了理论上的分析，规定了对帝国主义和封建主义作斗争和取得胜利的道路，并全面地研究了建设新民主主义中国的问题。作者指出：“毛泽东选集”俄文版第三卷中的著作，是毛泽东同志创造性地应用马克思列宁主义到中国具体历史环境中、并把马克思列宁主义理论与中国革命实践结合起来的光辉范例。这些著作证明了马克思列宁主义思想的生命力。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"059c7682ad"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
