art":11,"page_end":11,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"由毛主席睡木板床说起","authors":["李旖"],"parts":[{"type":"paragraph","text":"1949年3月，毛泽东率中共中央机关进驻北平时，住在香山双清别墅。别墅里有一张弹簧床，卫士觉得这张床要比毛主席过去睡的木板床好，睡着更舒适，于是，就把这张弹簧床搬了过来。然而，当毛主席走进卧室看到这张床时，严肃地对工作人员说：怎么换了这样一张床？为什么昨天能睡木板床，今天就不能睡了？毛主席让卫士撤走弹簧床，换了一个普通的木板床。"},{"type":"paragraph","text":"什么是艰苦奋斗、什么是节俭？从毛主席换床的这个故事中我们寻到了答案。如果说，在苦难的时候保持艰苦奋斗是一种现实的妥协，那么在日子较好的时候仍然保持着艰苦奋斗的本色，则是一种难能可贵的精神和境界。"},{"type":"paragraph","text":"木板床如一面镜子，一面艰苦奋斗的整容镜。照照这面镜子，我们可以看见自己的瑕疵。木板床见证了一代伟人艰苦奋斗的作风。也启示我们，我党我军之所以能从小到大、由弱到强，不断从胜利走向胜利，很重要的是因为我们具有艰苦奋斗的光荣传统。"},{"type":"paragraph","text":"毛主席一生为了人民的福祉鞠躬尽瘁，吃过很多苦，在取得胜利以后依然严格要求自己，保持着艰苦朴素的优良作风，反对虚荣，拒绝享受，为我们树立了光辉榜样。"},{"type":"paragraph","text":"作为党的干部，在艰苦的工作和生活环境中，能否保持旺盛的斗志，这是一种考验；当经济发展了，物质条件改善了，特别是地位变了、职位高了，能否继续保持和发扬勤俭节约、艰苦奋斗的优良作风，继续保持积极进取的精神状态，更是一种考验。能否经得起这种考验，无疑是检验一名党员干部官德好坏的试金石。"},{"type":"paragraph","text":"如今，我们的物质丰富了，人民的生活水平发生了翻天覆地的变化。这时候，有的同志认为再讲艰苦奋斗没有什么实际意义了，开始讲享受、图安乐。还有的同志认为，艰苦奋斗影响同志之间的团结，把提倡俭朴当成小气，把同志关系建立在物质基础上。这些艰苦奋斗“过时论”、“吃亏论”、“小节论”是完全错误的。没有艰苦奋斗就没有我们今天的幸福生活，没有艰苦奋斗更没有我们辉煌灿烂的明天。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"26a449cb9c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
