script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"邓颖超在四川省和成都市庆祝“三八”联欢会上讲话努力学习毛泽东著作　做彻底革命的女战士张茜和龚澎在会上作访问亚洲非洲和阿尔巴尼亚之行的情况的报告","authors":[],"dates":[{"year":1964,"month":3,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社成都7日电】　四川省和成都市各族各界妇女干部五百多人今天上午举行联欢会，热烈庆祝“三八”国际劳动妇女节。"},{"type":"paragraph","text":"全国妇联副主席邓颖超出席大会并讲了话。她向出席这次庆祝会的妇女干部并通过她们向四川省各族各界妇女热烈祝贺节日。"},{"type":"paragraph","text":"邓颖超说，她这次能够有机会参加这个联欢会感到特别愉快、特别高兴。这是她在四川解放后第一次参加这样的联欢会。她把这次联欢会同一九四六年在重庆召开的一次庆祝“三八”妇女节的集会作了对比。她说，为了争取举行那次集会，曾同国民党反动派进行了尖锐的斗争。那次集会是在紧张激愤中举行的。那时在国民党反动统治下的广大妇女，特别是工农妇女群众，是没有言论、集会自由的，更谈不到经济、政治的权利。那时的情况和解放后中国妇女作了国家主人的情况相比，是根本不同的。她说:“今天我同样在四川参加庆祝‘三八’妇女节的联欢会，但是和过去在重庆参加的庆祝‘三八’节大会的情况相比，真是两个世界。”她指出，我们处在伟大的毛泽东时代，我们的革命果实得来不易，我们要更自强不息地尽好革命的责任。"},{"type":"paragraph","text":"邓颖超号召大家努力学习毛泽东著作。她说:“现在全国人民正在掀起学习毛泽东著作的高潮。全国妇联主席蔡畅同志也号召我们学习毛泽东著作，促进思想革命化。那么我们要学习解放军那样，高举毛泽东思想旗帜，活学活用；要学习解放军那样，自觉地、坚持不懈地学习毛泽东著作，而不是间断地、形式主义地学习和脱离实际地为学习而学习。只有用毛泽东思想改造自己的思想，用毛泽东思想改进自己的工作，才能不断地促进思想革命化、工作革命化，为社会主义革命和社会主义建设作出更多更出色的成绩。在思想革命化和工作革命化的基础上，加强我们妇女的团结，加强全国人民的团结。团结起来的人民的力量是无穷无尽，是战无不胜的。”"},{"type":"paragraph","text":"邓颖超殷切希望到会的各个方面各个岗位上的妇女干部，关心自己所在单位、所在部门的妇女群众和妇女工作，以推动各个方面把妇女工作提高到一个新的水平，无论是在学习毛泽东著作方面，在促进思想革命化和工作革命化方面，或是在妇女工作方面，都要有雄心壮志，不断提高无产阶级觉悟。她表示要和大家共同努力，互相勉励，做一个不愧为我们伟大的国家、伟大的人民、伟大的军队、伟大的党、伟大的领袖毛泽东时代的彻底革命的女战士。"},{"type":"paragraph","text":"邓颖超最后将锡兰人民赠送给中国代表团的一大束鲜花转送给联欢会。当西南民族学院彝族学生达吉和四川省新龙县藏族女中共区委书记达旺代表大家接受这束象征中锡人民友谊的鲜花的时候，全场响起了热烈的掌声。"},{"type":"paragraph","text":"陪同周恩来总理和陈毅副总理出国访问的全国妇联执行委员张茜和外交部新闻司司长龚澎，分别在会上作了访问亚洲、非洲和阿尔巴尼亚之行的情况的报告。她们首先向与会者转达了这些国家的妇女们对中国妇女的深情厚谊，并谈到了她们在访问期间受到亲切接待的一些生动事例。她们说，她们高兴地看到这些国家的妇女正逐渐在社会活动和反对帝国主义、反对殖民主义的斗争中发挥越来越大的作用。"},{"type":"paragraph","text":"张茜和龚澎还谈到，在中国共产党和毛主席的教育下，中国妇女正以高涨的革命热情，在各条战线的各个工作岗位上为祖国社会主义建设事业的发展而努力工作，同时也时时刻刻注视和关怀着世界上被压迫民族和人民为事取独立解放而进行的正义斗争。中国妇女一定要继续加强同世界各国妇女的友好团结，同世界各国姊妹们携起手来，勇往直前，为争取民族解放、社会进步，为维护妇女权利、儿童幸福和保卫世界和平而共同奋斗。"},{"type":"paragraph","text":"四川省妇女联合会主任郑瑛最后讲话。她要求全省妇女热烈响应全国妇联主席蔡畅和副主席邓颖超的号召，掀起一个学习毛主席著作的热潮，提高觉悟，促进思想进一步革命化和进一步做好工作。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8cd0c6e773"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
