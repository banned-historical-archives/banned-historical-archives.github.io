script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji42","name":"毛泽东全集第42卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji42.pdf"],"article":{"title":"关于《到韶山》《登庐山》两首诗给臧克家、徐迟的信","alias":"","parts":[{"type":"paragraph","text":"关于《到韶山》《登庐山》两首诗"},{"type":"paragraph","text":"给臧克家、徐迟的信"},{"type":"paragraph","text":"（1959年9月1日）臧克家、徐迟二位同志："},{"type":"paragraph","text":"信收到。近日写了两首七律”，录上呈政（正）。如以为可，可上诗刊。"},{"type":"paragraph","text":"近日右倾机会主义猖狂进攻，说人民事业这也不好，那也不好。全世界反华反共分子以及我国无产阶级内部，党的内部，过去混进来的资产阶级、小资【产】阶级投机分子，他们里应外合，一起猖狂进攻。好家伙，简直要把个昆仑山脉推下去了。同志，且慢。国内挂着“共产主义”招牌的一小撮机会主义分子，不过捡起几片鸡毛蒜皮，当作旗帜，向着党的总路线、天跃进、人民公社举行攻击，真是“撼大树，可笑不自量”了。全世界反动派从去年起，咒骂我们，狗血喷头。照我看，好得很。六亿五千万伟大人民的伟大事业，而不被帝国主义及其在各国的走狗大骂而特骂，那就是不可理解的了。他们越骂得凶，我就越高兴。让他们骂上半个"},{"type":"paragraph","text":"[1]臧克家，当时任《诗刊》主编。徐迟，当时任《诗刊》副主编。"},{"type":"paragraph","text":"[2]两首七律，指《到韶山》《登庐山》，当时均未在《诗刊》上发表，后来收入人民文学出版社1963年12月出版的《毛主席诗词》中。"},{"type":"paragraph","text":"关于《到韶山》《登庐山》两首诗给臧克家、徐迟的信世纪吧！那时再看，究竟谁败谁胜？我这两首诗，也是答复那些忘八蛋的。"},{"type":"paragraph","text":"毛泽东九月一日"}],"authors":["毛泽东"],"dates":[{"year":1959,"month":9,"day":1}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":329,"page_end":330},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b6cadbb9e7"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
