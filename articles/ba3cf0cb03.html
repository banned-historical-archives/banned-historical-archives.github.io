ical-archives/banned-historical-archives8/main/maoquanji22.pdf"],"article":{"title":"冀东地区的作战方针","alias":"","parts":[{"type":"paragraph","text":"冀东地区的作战方针！！"},{"type":"paragraph","text":"（1946年12月4日）冀东区党委，并告中央局，分局："},{"type":"paragraph","text":"三十电悉。过去五个月我军歼敌三十九个旅，业已基本上停止了蒋军的大举进攻。今后半年内，我军必须力争歼敌四十个旅左右，根本转变战局。你区及热河?就-般情况来说，暂时自然是以游击战为主的局面，但你们应经常集中三个旅（九个团）寻敌弱点打运动战，打不甚坚固之据点，以一部打正面，以主力打迁回，每次歼敌一个营、两个营至一个团，在半年内力争歼敌五六个团，收复可能收复之各据点，各分区则都是游击战争。"},{"type":"paragraph","text":"中央"},{"type":"paragraph","text":"亥支"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央起草的给中共冀东区委并告中共中央晋察冀局和冀察热辽分局的电报。"},{"type":"paragraph","text":"[2]热河，旧省名，辖今河北省东北部、辽宁省西南部和内蒙古自治区东南部地区，1955年撤销。"}],"authors":["毛泽东"],"dates":[{"year":1946,"month":12,"day":4}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":301,"page_end":301},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ba3cf0cb03"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
