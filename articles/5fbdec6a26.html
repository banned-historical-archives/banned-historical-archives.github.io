","authors":["(黄万里)"],"dates":[{"year":1980,"month":2,"day":26}],"is_range_date":false,"parts":[{"text":"中共清华大学委员会关于黄万里同志右派问题的改正决定","type":"title"},{"text":"(黄万里)","type":"authors"},{"text":"黄万里同志，于1958年3月被定为右派分子，1978年2月摘掉右派分子帽子，现任水利系泥沙研究室教授。","type":"paragraph"},{"text":"根据中共中央(1978)55号文件的精神，我们对黄万里同志的原划右派问题进行了复查，按照1957年中共中央关于《划分右派分子的标准》的规定，黄万里同志原划右派问题属于错划，经中共北京市委批准予以改正，恢复政治名誉，恢复高教二级教授的工资待遇。","type":"paragraph"},{"text":" 中共清华大学委员会清华大学1980年2月26日","type":"paragraph"}],"comments":[],"origin":"根据文件翻印件打印。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5fbdec6a26"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
