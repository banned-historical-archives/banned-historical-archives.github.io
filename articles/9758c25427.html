script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"彭德怀部长接见德人民军歌舞团  萧华在宴会上强调支持关于结束柏林占领状态的建议","authors":[],"dates":[{"year":1958,"month":11,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"彭德怀部长接见德人民军歌舞团"},{"type":"paragraph","text":"萧华在宴会上强调支持关于结束柏林占领状态的建议"},{"type":"paragraph","text":"新华社23日讯　国务院副总理兼国防部长彭德怀元帅今天上午接见了以领队约瑟夫·舒茨上校和团长布兰德尔上校为首的德意志民主共和国人民军埃里希·魏纳特歌舞团全体团员。"},{"type":"paragraph","text":"接见时，约瑟夫·舒茨上校向彭德怀元帅转递了德意志民主共和国国防部长斯多夫上将的一封信，并转达了德国人民和人民军官兵对中国人民、中国人民解放军官兵们的友谊、热情的问候。"},{"type":"paragraph","text":"彭德怀元帅向贵宾们表示热烈的欢迎，对德国人民、人民军官兵和斯多夫上将表示深厚的谢意。他说，我们中德两国是兄弟国家，兄弟人民，兄弟军队，我们两国军队都是建立在马克思列宁主义基础之上的，有着共同的思想，共同的目标，为共同的事业并肩英勇奋斗。彭德怀元帅相信，德意志民主共和国人民军埃里希·魏纳特歌舞团的这次来我国访问演出，一定会受到中国人民和中国人民解放军全体官兵的热烈欢迎，并将进一步增进我们两国人民和两国军队之间的团结和友谊。"},{"type":"paragraph","text":"全场充满热情、欢乐的气氛，不断地回响着掌声。彭德怀元帅同一百多位团员，一一亲切地握手。"},{"type":"paragraph","text":"接见时在座的有萧华上将，杨成武上将，李聚奎上将，刘志坚中将，吴法宪空军中将，段德彰海军少将，魏传统少将，王兴纲少将，白文华大校，李伟大校，朱开印大校。"},{"type":"paragraph","text":"德意志民主共和国驻华大使汪戴尔、武官范因赫德中校也在座。"},{"type":"paragraph","text":"接见后，彭德怀元帅等和歌舞团全体团员一起合影。"},{"type":"paragraph","text":"新华社23日讯　中国人民解放军总政治部和中华人民共和国对外文化联络委员会今晚联合举行宴会，欢迎以领队约瑟夫·舒茨上校和团长布兰特尔上校为首的德意志民主共和国人民军埃里希·魏纳特歌舞团全体人员。"},{"type":"paragraph","text":"宴会充满了东方和西方和平前哨的战友们亲切团聚的热情、欢乐的气氛。"},{"type":"paragraph","text":"在宴会开始时，中国人民解放军总政治部副主任萧华上将首先讲话。他代表国防部和中国人民解放军全体官兵，对德意志民主共和国人民军埃里希·魏纳特歌舞团的来我国访问演出，表示热烈的欢迎。萧华上将在讲话中强调说，中国人民积极支持苏联赫鲁晓夫同志关于结束柏林的占领状态并从柏林撤退外国军队的建议。德国问题和平解决的主张，在全世界人民的支持下，德国人民经过自己的努力，一定能在和平、民主的基础上最终完成统一自己祖国的伟大任务。"},{"type":"paragraph","text":"萧华上将热烈感谢民主德国政府和人民对中国人民在进行社会主义建设和反对美帝国主义侵略的斗争中，所给予的同情、援助和支持。"},{"type":"paragraph","text":"约瑟夫·舒茨上校在热烈的掌声中致词。纳瑟夫·舒茨上校表示，德国人民和人民军官兵完全同情和支持中国人民为了解放台湾和反对美帝国主义的军事挑衅而进行的正义斗争。他说，中国共产党和德国统一社会党共同遵循的马克思列宁主义思想，是我们两国人民之间的亲密、持久的友谊的不可摧毁的基础，同时也是以强大的苏联为首的社会主义阵营的团结和力量的不可摧毁的基础。"},{"type":"paragraph","text":"出席今晚宴会的有杨成武上将，刘志坚中将，吴法宪空军中将，黄火星中将，莫文骅中将，钟汉华中将，欧阳文中将，段德彰海军少将，魏传统少将等。"},{"type":"paragraph","text":"出席宴会的还有北京市副市长冯基平，首都文艺界人士梅兰芳、李伯钊、欧阳山尊、陈锦清、王元方、侣朋、瞿希贤等和部队文艺工作者多人。"},{"type":"paragraph","text":"德意志民主共和国驻华大使汪戴尔、武官范因赫特也应邀参加了宴会。"},{"type":"paragraph","text":"宴会结束后，举行了联欢舞会。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"吴法宪","type":"人物"},{"name":"杨成武","type":"人物"},{"name":"刘志坚","type":"人物"},{"name":"彭德怀","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9758c25427"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
