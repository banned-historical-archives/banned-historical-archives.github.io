凶赵继贤的意见给华东局的指示","authors":[],"dates":[{"year":1951,"month":5,"day":23}],"is_range_date":false,"parts":[{"text":"中共中央关于同意处理“二七”惨案元凶赵继贤的意见给华东局的指示","type":"title"},{"text":"华东局并中南局：","type":"appellation"},{"text":"同意将“二七”惨案元凶赵继贤押解郑州，组织工人控诉后处决。请中南局即派人至苏南提解。","type":"paragraph"},{"text":" 中  央二十三日","type":"paragraph"},{"text":"附：","type":"paragraph"},{"text":"华东局关于处理“二七”惨案元凶的请示","type":"subtitle"},{"text":"（一九五一年五月二十一日）","type":"subtitle"},{"text":"中央并中央公安部：","type":"appellation"},{"text":"据苏南区党委五月十九日报告：“二七”惨案元凶赵继贤已于本月十日为苏州市府逮捕，经初步审讯，赵匪对制造“二七”惨案，镇压工人罢工运动，屠杀工人三四百名等罪行均供认不讳。并建议将赵匪解至发生惨案的原地，发动控诉公审处决，以为死难烈士复仇，并教育工人及广大人民等情。如中央批准这一意见，请告中南局派人来苏南提解，或由苏南派人押送武汉。如何？请电示。","type":"paragraph"},{"text":" 华东局五月二十一日","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"361a78a5da"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
