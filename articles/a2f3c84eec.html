art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"如愿以偿","authors":["武将"],"parts":[{"type":"paragraph","text":"10月4日，秋高气爽，首都北京还沉浸在国庆节的欢乐气氛中。这天上午十点多钟，邓小平副主席和邓颖超副委员长，在人民大会堂亲切接见了空军某航校副校长、原国民党空军少校考核官黄植诚。"},{"type":"paragraph","text":"在这盼望已久的时刻，黄植诚是多么高兴和激动啊！他面带幸福的笑容，向两位领导人敬礼。邓副主席赞扬他说：你的爱国行动产生了很好的影响。邓副委员长说：你这个决心下得好。黄植诚说：我在台湾就非常崇敬邓副主席和邓副委员长，在福建下飞机以后就提出希望能见到你们，今天终于如愿以偿，这是我一生最高的荣誉。"},{"type":"paragraph","text":"说话间，邓副主席请黄植诚抽烟。黄植诚拿起一支，还起身给邓副主席点了烟。过了一会儿，邓副委员长给黄植诚递过一杯茶，说：他请你抽烟，我请你喝茶。黄植诚连声说：谢谢。"},{"type":"paragraph","text":"邓副主席问黄植诚：“你是壮族吗？”黄植诚回答：“我回大陆以后才知道的。”邓副主席说：壮族是我国少数民族中的一个大民族，对革命也做出过很大的贡献。红七军和红八军，就有一半是壮族人。邓副委员长说：我出生在南宁，一位壮族奶妈抚养过我，我身上还有壮族的血液！"},{"type":"paragraph","text":"在接见中，从始至终洋溢着喜悦、温暖的气氛。邓副主席从祖国四化建设的前景谈到台湾回归祖国、实现和平统一的问题，黄植诚表示完全拥护叶委员长的建议。"},{"type":"paragraph","text":"黄植诚向邓副主席和邓副委员长报告说：我在北京和东北参观以后，看到祖国建设的基础非常稳固，国土辽阔，资源丰富，感到作为一个中国人很自豪。他表示要把自己的聪明才智和技能无保留地贡献给祖国，贡献给人民军队的建设事业。"}],"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a2f3c84eec"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
