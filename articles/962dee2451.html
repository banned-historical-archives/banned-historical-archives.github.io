","authors":["毛泽东"],"dates":[{"year":1965,"month":1,"day":27}],"is_range_date":false,"parts":[{"text":"接见以苏班德里约为首的印尼代表团时的讲话","type":"title"},{"text":"毛泽东","type":"authors"},{"text":"好的拿来，坏的丢掉。无论是本国的或外国的都一样，只能批判地接受，不能教条主义，照搬。","type":"paragraph"},{"text":"军事学校办得一塌糊涂，正在整理。过去没有军事学校可好了。打了几十年仗，就是没有军事学校。我们的军队百分之九十以上是不识字和小学程度的。国民党尽办军事学校，什么陆军大学毕业，就是我们这些不识字的兵打倒了它。","type":"paragraph"},{"text":"进军事学校的时间太长了。蒋介石办的黄埔军校，两个月入伍训练，四个月学校毕业。蒋介石的军队主要就是这些人还比较能打，陆军大学毕业的实在不能打。","type":"paragraph"},{"text":"书可以读一些，但是读多了害人，的确害人。革命斗争培养干部。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"962dee2451"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
