ical-archives/banned-historical-archives0/main/maoquanji27.pdf"],"article":{"title":"复叶剑英、陈赓电","alias":"","parts":[{"type":"paragraph","text":"复叶剑英、陈电凹"},{"type":"paragraph","text":"（1949年9月12日）"},{"type":"paragraph","text":"八日电悉。两兵团第一步集结并休息数日，第二步齐头进至曲江、翁源地区并休息数日，第三步协力夺取广州。除此以外均同意。"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军委起草的复叶剑英、陈电的主要内容。"},{"type":"paragraph","text":"[2]叶剑英、陈9月8日致电中共中央军委，报告华南分局赣州会议制订的解放广东的作战方案，提出依照中央军委意图先消灭北江、东江之敌，进占曲江（现属韶关市）、惠阳，创造和平解决条件，争取和平解决。同时，准备对付坚守广州顽抗之敌。因第四兵团与第十五兵团相隔过远，为求得同时展开，齐头并进，实行钳形合围，必须先行集结预定地区，9月底集结完毕。"}],"authors":["毛泽东"],"dates":[{"year":1949,"month":9,"day":12}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":236,"page_end":236},"tags":[{"name":"叶剑英","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7968ed5e71"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
