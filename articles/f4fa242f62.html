script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"在泰共领导的武装斗争胜利发展的鼓舞下  泰国工人反剥削反压迫斗争不断高涨  广大工人通过罢工等形式开展斗争反对美泰反动派的压榨","authors":[],"dates":[{"year":1969,"month":3,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"在泰共领导的武装斗争胜利发展的鼓舞下"},{"type":"paragraph","text":"泰国工人反剥削反压迫斗争不断高涨"},{"type":"paragraph","text":"广大工人通过罢工等形式开展斗争反对美泰反动派的压榨"},{"type":"paragraph","text":"新华社十九日讯　据“泰国人民之声”电台广播，在泰国共产党领导的武装斗争胜利发展的鼓舞下，具有光荣革命传统的泰国工人阶级反对美国垄断资本家和他侬反动集团残酷剥削和压迫的斗争，一年多来有了广泛的发展。"},{"type":"paragraph","text":"据不完全统计，一九六八年泰国工人为了反对美国—他侬集团压迫剥削和歧视侮辱工人，通过举行罢工等形式开展的斗争就在四十七次以上，参加斗争的工人超过一万四千人。其中，在美军基地和外国资本家工厂发生的斗争超过十五次，参加斗争的工人约四千六百人。"},{"type":"paragraph","text":"电台说，从今年一月中到三月中的两个月内，又有三千五百多名工人举行了十一次罢工等形式的斗争，反对他侬集团的压迫和剥削。"},{"type":"paragraph","text":"电台说，在一九六八年，乌塔保美军基地的几千名泰国工人曾举行了多次罢工斗争。去年十一月底至十二月初，曼谷一家美资工厂的几百名工人举行了两次罢工，抗议美国资本家无理解雇和残酷压迫剥削工人。"},{"type":"paragraph","text":"电台说，今年一月，北榄府的一家美资汽车轮胎公司的三百名工人，不顾他侬集团和资方的种种威胁，坚持举行罢工，要求增加工资和废除压迫剥削工人的苛刻条例，终于取得了斗争的胜利。巴吞他尼府空銮县的一家美资工厂的几百名工人为反对资本家的残酷剥削，在三月四日也举行了罢工。"},{"type":"paragraph","text":"电台指出，泰国工人的斗争是完全正义的，获得泰国爱国民主人士的同情和支持。尽管美国—他侬集团使用诱骗和威吓的反革命两面手法对付工人，但是，它无法消灭泰国工人阶级敢于斗争敢于胜利的革命斗争精神。他侬反动集团明目张胆地镇压工人的斗争，只能充分暴露它充当美帝国主义走狗和它的法西斯卖国集团的狰狞面目。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f4fa242f62"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
