s":[{"year":1960,"month":3,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　中国戏剧家协会上海分会最近将陆续举办一系列的文艺思想和学术讲座。这些讲座是为了帮助广大戏剧工作者更好地以毛泽东文艺思想武装自己，并不断丰富历史知识和专业知识，在文化革命高潮中作出更多成绩。"},{"type":"paragraph","text":"文艺思想讲座的讲题初步拟定有:“十年来上海戏剧界两条道路的斗争”“文艺工作者的世界观”“百花齐放、百家争鸣”“革命现实主义与革命浪漫主义”等八讲。历史知识讲座将从春秋战国开始讲到元、明、清止，共分十讲。主讲人将由有关部门的负责人和各大专学校历史系教授分别担任。"},{"type":"paragraph","text":"文艺思想讲座第一讲“十年来上海戏剧界两条道路的斗争”于昨日在瑞金剧场举行，由刘厚生主讲。历史知识讲座第一讲“春秋战国”，本月17日由中国科学院历史研究室杨宽主讲。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"23aa34caf6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
