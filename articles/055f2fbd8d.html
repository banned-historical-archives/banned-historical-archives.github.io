art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席和中共中央政治局委员接见海军党代表大会全体代表","authors":["郝建国"],"parts":[{"type":"paragraph","text":"本报11日讯 今天下午三时半，毛泽东主席和中共中央政治局委员刘少奇、康生、彭真、董必武、林伯渠、张闻天、彭德怀、邓小平在怀仁堂接见了出席海军第一届党代表大会的全体代表，陪同接见的还有贺龙元帅、聂荣臻元帅、陈赓大将。毛主席和中央负责同志首先接见了大会主席团的三十一位同志，随后便同全体代表见面。当毛主席和中央负责同志步入怀仁堂后边草坪的时候，海军党代表大会的全体代表以热烈的掌声欢迎他们。毛主席含笑向大家挥手、鼓掌，然后同全体代表合影。合影后，他慢步从全体代表面前走过，再次向全体代表挥手致意。"},{"type":"paragraph","text":"又讯 海军第一届党代表大会已在9日下午隆重开幕。10日，苏振华同志代表前届党委向大会作了关于党委工作的报告。大会将在17日结束。"},{"type":"paragraph","text":"毛主席、中共中央政治局委员们同海军党代表大会代表合影 本报记者 郝建国 摄"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"055f2fbd8d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
