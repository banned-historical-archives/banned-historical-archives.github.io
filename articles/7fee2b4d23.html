dates":[{"year":1976,"month":12,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京一九七六年十二月二十七日电　伟大的领袖和导师毛泽东主席的光辉著作《论十大关系》已由人民出版社出版单行本。"},{"type":"paragraph","text":"毛主席的这一光辉著作，是毛主席在一九五六年四月二十五日中共中央政治局扩大会议上的讲话。毛主席在这篇讲话中，以苏联的经验为鉴戒，总结了我国的经验，论述了社会主义革命和社会主义建设中的十大关系，提出了适合我国情况的多快好省地建设社会主义总路线的基本思想。"},{"type":"paragraph","text":"本书从十二月二十八日起在北京新华书店发行，并将在全国各地新华书店陆续发行。这本书还将由民族出版社用蒙古、藏、维吾尔、哈萨克、朝鲜五种文字翻译出版。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7fee2b4d23"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
