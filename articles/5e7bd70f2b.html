art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"华国锋总理致电萨莫拉总统对莫桑比克南部地区遭受水灾表示深切的同情和慰问","authors":[],"parts":[{"type":"paragraph","text":"新华社一九七七年三月十二日讯 中华人民共和国国务院总理华国锋三月十日打电报给莫桑比克人民共和国总统萨莫拉，对莫桑比克南部地区最近遭受水灾表示深切的同情和慰问。电报全文如下："},{"type":"paragraph","text":"马普托"},{"type":"paragraph","text":"莫桑比克人民共和国总统萨莫拉·莫伊塞斯·马谢尔阁下："},{"type":"paragraph","text":"惊悉贵国南部连日暴雨，河水泛滥成灾，致使人民生命财产遭受巨大损失。我代表中国政府和人民向阁下并通过阁下向灾区人民表示深切的同情和慰问。我们深信，英勇的莫桑比克人民在阁下的领导下，一定能够战胜水灾造成的暂时困难，继续胜利前进。"},{"type":"paragraph","text":"中华人民共和国国务院总理 华国锋"},{"type":"paragraph","text":"一九七七年三月十日于北京"},{"type":"paragraph","text":"新华社一九七七年三月十二日讯 中国红十字会三月十日打电报给莫桑比克政府，向莫桑比克遭受水灾的人民表示慰问。电报全文如下："},{"type":"paragraph","text":"马普托"},{"type":"paragraph","text":"莫桑比克人民共和国政府："},{"type":"paragraph","text":"获悉贵国南部发生严重水灾，造成巨大损失。中国人民和中国红十字会对此极为关切。中国红十字会决定赠送贵国政府五千吨粮食和五吨药品，以帮助灾区人民克服水灾造成的暂时困难。请转达中国人民和中国红十字会对灾区人民的深切慰问。"},{"type":"paragraph","text":"中国红十字会"},{"type":"paragraph","text":"一九七七年三月十日"}],"alias":""},"tags":[{"name":"华国锋","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5e7bd70f2b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
