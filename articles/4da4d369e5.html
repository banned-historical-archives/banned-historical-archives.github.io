art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"叶剑英会见朝鲜最高人民会议友好代表团同朝鲜同志进行亲切谈话，表示坚决支持朝鲜争取自主和平统一斗争","authors":[],"parts":[{"type":"paragraph","text":"新华社5月12日讯 中共中央副主席、人大常委会委员长叶剑英今天下午会见了由朝鲜劳动党中央书记、最高人民会议常设会议副议长许贞淑率领的朝鲜最高人民会议友好代表团。"},{"type":"paragraph","text":"叶剑英在他的住所同朝鲜同志进行了亲切的谈话。他说，中朝两国人民是邻居。两党两国和两国人民之间有着深厚的友谊。两国人民将一代一代友好下去。"},{"type":"paragraph","text":"许贞淑说，代表团的这次访问将为进一步发展朝中两党两国的友好关系作出贡献。她还向叶剑英介绍了朝鲜人民在金日成主席的领导下取得的成就。"},{"type":"paragraph","text":"叶剑英说，中国人民对朝鲜人民的每一项成就都感到十分高兴。我们坚决支持你们争取祖国自主和平统一的正义斗争。"},{"type":"paragraph","text":"人大常委会副秘书长邢亦民，外交部顾问韩念龙，朝鲜民主主义人民共和国驻中国大使馆临时代办全宗荣，参加了会见。"},{"type":"paragraph","text":"叶剑英委员长和许贞淑副议长亲切交谈。 新华社记者摄RW：叶剑英；委员长；接见外宾"}],"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4da4d369e5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
