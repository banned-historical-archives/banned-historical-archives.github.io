告半年来军管市政工作  各民主党派及民主人士致电祝贺","authors":[],"dates":[{"year":1949,"month":8,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"团结各阶层人民建设新北平"},{"type":"paragraph","text":"平各界代表会开幕"},{"type":"paragraph","text":"朱总司令指示发展工业生产"},{"type":"paragraph","text":"叶剑英报告半年来军管市政工作"},{"type":"paragraph","text":"各民主党派及民主人士致电祝贺"},{"type":"paragraph","text":"【平市讯】北平市各界代表会已于昨（九）日开幕。会议于上午九时举行开幕典礼，下午由北平市军管会主任兼北平市市长叶剑英报告军管会和市政府半年来的工作。到会代表共三百一十二人，连同来宾、列席者、旁听者共约四百余人。会议在庄严的音乐声中宣告揭幕，大会选举叶剑英、张友渔、彭真、赵振声、余心清、吴晗、韩卓儒、许德珩、许立群、萧明、宋凤祥、朱长江、柴泽民、刘同恩、萧松、古奇踪、张晓梅、薛成业、钱端升、诸福棠、高存信、王普、孙孚凌、刘一峰、马玉槐、陈铭德、贺绿汀、张奚若、梁思成等二十九人为主席团。并推选叶剑英、张友渔、彭真、吴晗、余心清、韩卓儒、许德珩、许立群、萧明等九人任主席团常务主席，彭真为召集人，薛子正任主席团秘书长，李公侠、杜任之、崔月犁、郭则忱等四人任副秘书长。叶剑英市长致开幕词后，中国人民解放军朱总司令、华北人民政府董必武主席、来宾国民党革命委员会李济深、民主同盟沈钧儒、无党派民主人士郭沫若相继讲话，最后由中共北平市委代表赵振声讲话。自由演讲开始后，有中国民主同盟北平市支部主委吴晗、工人代表袁峙、农民代表施德海、北平市妇联暨中小学教职员联合会代表田纶、北平市院校教职员联合会代表徐悲鸿、蒙古代表巴根、医界代表余贻周、国民党革命委员会北平分会筹委会主任余心清、中国农工民主党北平市党务整理委员会主委韩卓儒、工业界代表张俭堂等相继讲话。"},{"type":"paragraph","text":"叶剑英市长在开幕词中说明各界代表会的任务为团结北平各阶层人民，密切政府与人民的联系，进一步建设人民的新北平。叶市长说：“今天北平的人民已真正做了北平的主人，各界代表应该负起人民政府主人翁的责任，对人民政府的工作提出批评和建议。”"},{"type":"paragraph","text":"朱总司令在讲话中号召北平市各界人民努力恢复和发展生产，尤其是要努力恢复和发展工业生产，打下建设新北平的基础。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"彭真","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"发言"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ef07e5b4c4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
