" crossorigin="">{"props":{"pageProps":{"books":[{"id":"f4596d80-d0b2-4349-91d5-aadaae94aa11","name":"王洪文张春桥批示、上海市委在警备区看大字报时的讲话、关于许世友的大字报（1974）","internal":true,"official":true,"type":"img","author":"王洪文、张春桥、上海市委同志，1974.4.7、1974.6.28、1974.6.27","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/f4596d80-d0b2-4349-91d5-aadaae94aa11/1.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/f4596d80-d0b2-4349-91d5-aadaae94aa11/2.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/f4596d80-d0b2-4349-91d5-aadaae94aa11/3.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/f4596d80-d0b2-4349-91d5-aadaae94aa11/4.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/f4596d80-d0b2-4349-91d5-aadaae94aa11/5.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/f4596d80-d0b2-4349-91d5-aadaae94aa11/6.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/f4596d80-d0b2-4349-91d5-aadaae94aa11/7.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/f4596d80-d0b2-4349-91d5-aadaae94aa11/8.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/f4596d80-d0b2-4349-91d5-aadaae94aa11/9.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/f4596d80-d0b2-4349-91d5-aadaae94aa11/10.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/f4596d80-d0b2-4349-91d5-aadaae94aa11/11.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/f4596d80-d0b2-4349-91d5-aadaae94aa11/12.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/f4596d80-d0b2-4349-91d5-aadaae94aa11/13.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/f4596d80-d0b2-4349-91d5-aadaae94aa11/14.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/f4596d80-d0b2-4349-91d5-aadaae94aa11/15.png"],"article":{"title":"王洪文、张春桥同志批示","alias":"洪文、春桥同志批示","parts":[{"type":"paragraph","text":"洪文春桥周商批示"},{"type":"paragraph","text":"（一九七四年四月七日）春机调志批示"},{"type":"paragraph","text":"美议市委将这封信（指上海警备区政治部敬书谢克成同志1974·阜4月2日写的反映警备区批林批孔运动冷冷滑滑的信）印发市委常，警备区党委常委，由市委召集两个常委开次会议一议，帮助警务区顿导取待主动权为好·妥否，请酌·洪文网志批示！"},{"type":"paragraph","text":"同意春桥同志意见，请转天水同志阅办?"},{"type":"paragraph","text":"水上海市委领导同志在警务区看大字报时讲话"},{"type":"paragraph","text":"（1974年6月28日上午）马老讲话："},{"type":"paragraph","text":"4天到警备区看大字报，向同志们学习，很受教育7鞋众是翼正好英雄，工政乓起批林批孔的主力军，进一步说明了这不问题。同态们说“三个半天的会（指警备区三大部从6月22日至24日揭发大会）开待很好，，我赞成这个观点，警各区批林批孔运动是好的！正在进一步发展，我们支持同志们的草命大字报，支持揭开警备区六这大非问题，揭开价级斗争盖子·希整警备区领导在运动中取得土动"},{"type":"paragraph","text":"夜！起码下永看看大字报，和算众谈谈！和登众站在一起+把批标挑，孔运动进行到底"},{"type":"paragraph","text":"徐来资民恋讲话"},{"type":"paragraph","text":"上次君了大字报”今天是等二次，局回大水一样，机英同志行动起木了，自春桥，洪文两位政委批示以后：冷冷谢清的局西变为热气腾腾的局面”对这一局面麦示高兴，表示支持。"},{"type":"paragraph","text":"4天到警备区看大字报，向同志们学习，很受教育7鞋众是翼正好英雄，工政乓起批林批孔的主力军，进一步说明了这不问题。同态们说“三个半天的会（指警备区三大部从6月22日至24日揭发大会）开待很好，，我赞成这个观点，警各区批林批孔运动是好的！正在进一步发展，我们支持同志们的草命大字报，支持揭开警备区六这大非问题，揭开价级斗争盖子·希整警备区领导在运动中取得土动"},{"type":"paragraph","text":"夜！起码下永看看大字报，和算众谈谈！和登众站在一起+把批标挑，孔运动进行到底"},{"type":"paragraph","text":"徐来资民恋讲话"},{"type":"paragraph","text":"上次君了大字报”今天是等二次，局回大水一样，机英同志行动起木了，自春桥，洪文两位政委批示以后：冷冷谢清的局西变为热气腾腾的局面”对这一局面麦示高兴，表示支持。"}],"authors":["张春桥","王洪文"],"dates":[{"year":1974,"month":4,"day":7}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1},"tags":[{"name":"王洪文","type":"人物"},{"name":"张春桥","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"批林批孔","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]"
