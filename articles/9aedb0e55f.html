ical-archives/banned-historical-archives0/main/maoquanji29.pdf"],"article":{"title":"浣溪沙·和柳亚子先生","alias":"","parts":[{"type":"paragraph","text":"浣溪沙\"·和柳亚子先生"},{"type":"paragraph","text":"（1950年10月）"},{"type":"paragraph","text":"一九五○年国庆观剧，柳亚子先生即席赋《浣溪沙》，因步其韵奉和。"},{"type":"paragraph","text":"长夜难明赤县2天，百年魔怪舞翩跃3人民五亿不团圆。一唱雄鸡天下白山，万方乐奏有于，"},{"type":"paragraph","text":"诗人兴会更无前。[1]浣溪沙，词牌名，唐教坊（音乐学校）里曲子的名称。[2]赤县，战国时称中国为赤县神州。[3]翩跃，跳舞轻盈状。[4]一唱雄鸡天下白，李贺《致酒行》，“雄鸡一声天下白”[5]万方，古人称国族为方，《易经》有“鬼方”。[6]于阗，汉朝西域国名，在今新疆。[7]兴会，兴致、兴趣。"},{"type":"paragraph","text":"浣溪沙·和柳亚子先生附：柳亚子原词"},{"type":"paragraph","text":"火树银花不夜天，弟兄姊妹舞翩跃，歌声唱彻月儿圆！。不是一人能领导，那容百族共阗2"},{"type":"paragraph","text":"良宵盛会喜空前。1950年，毛泽东和朱德、柳亚子、余新清在北京。[1]新疆哈萨克族民间歌舞有《圆月》一歌云。[2]闻，聚会，会集。"}],"authors":["毛泽东"],"dates":[{"year":1950,"month":10}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":325,"page_end":326},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9aedb0e55f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
