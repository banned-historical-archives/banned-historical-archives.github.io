" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji39","name":"毛泽东全集第39卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji39.pdf"],"article":{"title":"对赵尔陆关于从组织上加强各经济协作区的建议的批语","alias":"","parts":[{"type":"paragraph","text":"对赵尔陆关于从组织上加强各经济协作区的建议的批语"},{"type":"paragraph","text":"（1958年5月25日）小平同志："},{"type":"paragraph","text":"此件请印发各政治局委员、书记处书记、各省市自治区党委书记。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"五月廿五日"},{"type":"paragraph","text":"[1]指赵尔陆1958年5月17日关于从组织上加强各经济协作区问题给毛泽东的建议信。信中说：如何从组织上加强各经济协作区的作用，是急待解决的一个问题。自执行中央工业与地方工业同时并举的方针和实行中央与地方经济管理新体制之后，地方办工业、群众办工业的积极性被调动起来。但如何使各省市工业的发展更能符合整个国民经济的计划性，避免和减少盲目性，更好地适应多快好省的总要求，单靠省或中央各部是不容易处理好的，而目前以各经济协作区的协作会议的形式来担负这一任务也比较困难。因此，我有一个想法，是否可以考虑在各区成立党的中央局，或中央分局，或别的组织形式，以统一和加强对各区的经济领导，综合规划各区的建设远景，及重大方针政策的掌握和生产的组织、地区的全面协作平衡等。在政权方面可不设置相应的组织机构，但要设置一个强的区域经济计划委员会，是中央局的办事机关。不论从目前的工作需要，还是将来的发展趋势看，设置这样一个机构，似乎有必要。因为主席号召大家要敢想敢说，我就把最近以来经常想、而又没有想好的意见大胆地向主席讲出来，供参考。"},{"type":"paragraph","text":"对赵尔陆关于从组织上加强各经济协作区的建议的批语"},{"type":"paragraph","text":"赵尔陆同志对区域协作问题，建议设立六个中央局及六个区域经济计划委员会。"},{"type":"paragraph","text":"[1]赵尔陆，当时任第一机械工业部部长。"}],"authors":["毛泽东"],"dates":[{"year":1958,"month":5,"day":25}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":376,"page_end":377},"tags":[{"name":"毛泽东","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8a1a669a45"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
