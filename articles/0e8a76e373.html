s":[],"dates":[{"year":1950,"month":7,"day":31}],"is_range_date":false,"parts":[{"type":"paragraph","text":"庆祝“八一”建军节"},{"type":"paragraph","text":"北大博物馆收集革命史料充实毛主席工作室的陈列"},{"type":"paragraph","text":"【本报讯】北京大学博物馆，为了庆祝“八一”建军节，多方搜集革命史料充实了毛主席在校工作室和李大钊烈士纪念室的陈列。最近收集并展出的，有毛主席和他的战友在十年土地革命时期、抗日民族解放战争时期及人民解放战争时期的照片多帧；李大钊烈士在“五四”时期与胡适讨论新青年杂志方针问题的手札和遗墨，一九二五年领导北京人民革命及争取关税自主运动的史料，以及一九二七年烈士殉难前夕，日本帝国主义走狗奉系军阀血腥统治下镇压革命运动的几种文件。里面有许多是从来没有发表过的。"},{"type":"paragraph","text":"此外，朱德总司令及郭沫若、吴玉章、何香凝、刘伯承、陆定一、马叙伦等为该室的题字也一并展出。"},{"type":"paragraph","text":"（北大通讯组）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0e8a76e373"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
