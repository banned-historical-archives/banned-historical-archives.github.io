script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"美国挑衅政策引起法国资产阶级人士不安","authors":[],"dates":[{"year":1953,"month":7,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"美国挑衅政策引起法国资产阶级人士不安"},{"type":"paragraph","text":"【新华社十八日讯】据塔斯社莫斯科讯：真理报十四日刊载了格·拉吉安尼所写的一篇文章，指出美国的挑衅政策引起了某些巴黎资产阶级人士的不安。"},{"type":"paragraph","text":"拉吉安尼写道：华盛顿三国外长会议上的分歧反映出西欧，特别是法国某些有势力人士最近所表明的意见，这种意见认为，美国的外交政策可能遭到彻底的失败，因为它不是从“实际情况”出发的。"},{"type":"paragraph","text":"美国在柏林的冒险行动的可耻失败甚至使法国的右翼人士也惊醒了过来。"},{"type":"paragraph","text":"拉吉安尼引述了巴黎“世界报”所刊载的一篇很足说明问题的文章——保罗·格拉多特所写的“柏林事件与计划中的欧洲军”。格拉多特在这篇文章中问道：假使“欧洲防务集团”已经建立好了，也就是假使报复主义的西德军队已经存在的话，六月十七日柏林挑衅事件可能产生甚么影响呢？格拉多特答复这个问题说：很可能柏林挑衅事件会“立刻变成第三次世界大战，第一个被拖入这次战争中去的将是法国人。”格拉多特在他文章的结语部分警告美国组织“欧洲防务集团”的计划。他写道：“‘欧洲防务集团’条约所包含的危险性，已在最近的事件中具体表现出来。因此我们可以断定，这个协定的草案充满了新战争的危险。假使批准这个条约的话，那么我们就是自甘冒险，终于有一天会为了‘普鲁士皇帝的利益’而投入战争里去。当然，法国人民是会拒绝参加这种战争的。”"},{"type":"paragraph","text":"拉吉安尼指出：不管华盛顿是否愿意，事实是：在主张缓和国际紧张局势的要求日益强烈的西欧，有越来越多的资产阶级统治集团人物都认为，假使把它们的政治命运和目前美国外交政策方针连在一起的话，简直太危险了。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f689048fce"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
