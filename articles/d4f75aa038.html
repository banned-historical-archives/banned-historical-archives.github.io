经过文化大革命的锻炼，体育战线新生力量茁壮成长的新气象","authors":[],"dates":[{"year":1974,"month":4,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　一九七四年全国举重个人比赛青少年组的比赛已于昨日下午胜利结束。青少年运动员们表现了良好的风格，取得了出色的成绩，共有四十五人一百十七次打破了十六项青少年全国纪录。"},{"type":"paragraph","text":"在这次比赛中，青少年运动员们不计较名次得失，互相鼓励，互相帮助，鼓足干劲，力争上游，表现了团结战斗、生气勃勃的崭新精神面貌。比赛中破全国纪录的人次之多、项目之广，也是过去少见的。这充分显示了经过无产阶级文化大革命的锻炼，体育战线新生力量茁壮成长的新气象，有力地回击了林彪一伙鼓吹“今不如昔”，诬蔑无产阶级文化大革命的反动谬论。"},{"type":"paragraph","text":"青少年选手们的良好风格和出色成绩，是在批林批孔运动的推动下取得的。他们认真学习马列和毛主席著作，带着强烈的无产阶级义愤，狠批林彪效法孔老二“克己复礼”，妄图复辟资本主义的罪行，深入批判“锦标主义”、“技术第一”的黑货，提高路线斗争觉悟。新疆队维吾尔族青少年运动员热合满，出身于工人家庭。他在批林批孔运动中，克服了看不懂汉文的困难，积极投入斗争，以自己的苦难家史，控诉万恶的旧社会，狠批林彪的“克己复礼”反动纲领，激发为革命刻苦训练的积极性。在这次比赛中，他八次打破了三项全国纪录，取得了最轻量级的第一名。"},{"type":"paragraph","text":"在这次青少年组比赛中，涌现了一批思想和技术都比较好的新生力量。如广东队的十五岁运动员叶联发，人小志高，他抱着“为人民作贡献，练得再苦也心甘”的愿望，严格要求自己，坚持刻苦训练，运动技术提高很快。在这次比赛中，他发扬了“小老虎”的精神，两次打破了次最轻量级的挺举青少年全国纪录。湖南运动员汪传坤，在批林批孔中进一步提高了路线斗争的觉悟，决心为毛主席争光，为社会主义祖国争光。在这次全国举重个人比赛中，他第一次试举就打破了次轻量级抓举的青少年全国纪录，接着又以顽强的毅力，连续三次打破了该项纪录，把去年的全国纪录提高十公斤。"},{"type":"paragraph","text":"在青少年组比赛中，不少当了教练、领队的老运动员，满腔热情地帮助兄弟队的年轻选手改进技术。广西队领队兼教练肖明祥，是曾经多次打破过世界纪录的老运动员。在比赛中，他热忱地鼓励陕西队的青少年运动员，帮助他们纠正技术动作。山东队教练员宋文壮，在本队运动员和上海队运动员激烈竞赛时，诚恳地帮助上海队运动员分析第一次试举失败的原因，鼓励上海队运动员完成好第二次试举。老运动员的热情辅导，使青少年选手们进一步增强了赶超世界先进水平的信心。(本报通讯员)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"林彪","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"批林批孔","type":"主题/事件"},{"name":"批林批孔","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d4f75aa038"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
