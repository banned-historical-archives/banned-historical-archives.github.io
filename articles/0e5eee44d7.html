ical-archives/banned-historical-archives0/main/maoquanji46.pdf"],"article":{"title":"对试生产出浓缩六氟化铀合格产品情况报告的批语","alias":"","parts":[{"type":"paragraph","text":"对试生产出浓缩六氟化铀合格产品"},{"type":"paragraph","text":"情况报告的批语！"},{"type":"paragraph","text":"（1964年1月）已阅，很好。[1]这是毛泽东对第二机械工业部党组1964年1月15日报告的批语。"},{"type":"paragraph","text":"[2]第二机械工业部党组的报告说：我部生产浓缩六氟化铀的气体扩散工厂，第五批主机投入运行后已于1964年1月14日上午开始取得合格产品。这一产品的生产，为我国原子武器的制造，提供了最基本的条件。报告还提出，要继续遵循主席“大力协同、做好这项工作”和周总理“实事求是，循序前进，坚持不懈，戒骄戒躁”的指示，在中央专门委员会的直接领导下，谦虚谨慎，兢兢业业，稳扎稳打，为更好地完成今后的任务而奋斗。"}],"authors":["毛泽东"],"dates":[{"year":1964,"month":1}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":251,"page_end":251},"tags":[{"name":"毛泽东","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0e5eee44d7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
