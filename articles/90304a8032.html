ical-archives/banned-historical-archives8/main/maoquanji12.pdf"],"article":{"title":"对巩固吕梁山脉问题的指示","alias":"","parts":[{"type":"paragraph","text":"对巩固吕梁山脉问题的指示"},{"type":"paragraph","text":"（1938年3月16日）"},{"type":"paragraph","text":"在敌人向普西进攻的形势下，国民党军队大部跑散，要巩固吕梁山脉在我手中，保障某些渡口，我军军事部署应考虑徐海东旅西移归还建制，朱德、彭德怀以一人西移指挥该师，好好打几个胜仗，才能解决问题。请和蒋介石、白崇禧、阎锡山、卫立煌商议，否则将贻误大局。"},{"type":"paragraph","text":"1938年，任弼时根据中央政治局会议的决定前往苏联，向共产国际汇报中国抗日战争的形势与中国共产党的工作和任务，以求共产国际对中国情况及中国共产党的方针政策实际了解。图为毛泽东、周恩来和准备出发的任弼时合影。"}],"authors":["毛泽东"],"dates":[{"year":1938,"month":3,"day":16}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":96,"page_end":97},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"90304a8032"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
