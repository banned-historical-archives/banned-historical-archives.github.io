tart":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"江青姚文元王洪文吴德同志观看一批歌舞曲艺节目鼓励文艺工作者为进一步发展和繁荣社会主义文艺不断作出新的贡献","authors":[],"parts":[{"type":"paragraph","text":"由专业和业余文艺工作者联合汇报演出的这两场歌舞曲艺节目，是从首都庆祝中华人民共和国成立二十三周年游园活动的大批文艺节目中挑选出来的，有合唱、合奏、独唱、独奏、表演唱等音乐作品，也有中小型歌舞、小舞剧等舞蹈作品和单弦、快板等曲艺作品。这些节目富有生活气息，生动活泼，从多方面反映了广大工农兵群众在社会主义革命和建设中沿着毛主席革命路线阔步前进的朝气蓬勃的精神面貌，受到了广大群众的热烈欢迎。"},{"type":"paragraph","text":"一同观看演出的有关方面负责人，有刘贤权、石少华、于会泳、狄福才、吴印咸、浩亮、刘庆棠等。"}],"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3a5d47ada8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
