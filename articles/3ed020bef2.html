","authors":[],"dates":[{"year":1949,"month":11,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社南京十日电】　人民辉放军第三野战军某部为贯彻朱总司令在开国典礼上宣布的命令，发扬革命英雄主义，交流经验，特于十月中旬举行首届英雄模范大会。大会经过对朱总司令命令的座谈会、英雄模范事迹典型报告和英雄模范相互访问后，并从一百六十四位英雄模范代表中，选出了四十七位人民英雄。大会闭幕时举行了隆重的烈士追悼大会，并通电毛主席、朱总司令，表示坚决继续进军、解放台湾、解放全中国、建设国防、捍卫祖国边缰和保卫世界永久和平的决心。出席大会的一百六十四位英雄模范，来自全部队各个单位，有战斗员、指挥员、政治工作者、侦察员、卫生工作者。"},{"type":"paragraph","text":"该部在中国共产党和上级的英明领导下，在三年解放战争中锻炼成为一支不可战胜的英雄队伍。该部涌现了二十五个为军以上领导机团所嘉奖的英雄模范单位，这些单位在历次伟大的战役胜利中，常起着重大的作用。一九四七年该部正式进入野战军行列后，即配合兄弟部队连战莱无、泰安、孟良崮、南麻、临朐、胶东诸战役。泰安战役中，该部射击英雄魏来国连杀伤敌人四百多，苦战七画夜，被嘉奖为“白马关战斗模范连”。一九四八年经过新式整军运动后，该部又配合兄弟部队扫荡胶济、津浦两线，参加解放济南、解放全山东，完成内线残敌的伟大任务。解放潍县攻坚战中，该部某团五分钟突入四丈多高的城墙，获得山东兵团嘉奖为“潍县团”的光荣称号。在解放济南战役中，该部某团首先越过宽深水壕，突破四丈多高的城墙，攻入城内，捣毁匪军防御核心，荣获济南第一团。在渡江前夜，该部侦察营二连首先突破江防，先行渡江，深八江南，完成侦察任务，兵团首长特写奖为“渡江先遣英雄连”。四月二十一日全线渡江登陆作战中，该部又涌现了四个“渡江英雄连”、“渡江模范连”和四个“渡江英雄班”。该部并有一个八个月没有逃亡的“团结互助模范连”。"},{"type":"paragraph","text":"会上英雄模范们一致把功劳归于共产党和毛主席以下各级首长的英明领导和全体指战员的共同努力。刚从北京回部的人民政协代表、射击英雄魏来国代表全体英雄模范在闭幕会上保证坚决执行朱总司令的命令，永远保持人民解放军顽强战斗和艰苦朴素的优良作风。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3ed020bef2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
