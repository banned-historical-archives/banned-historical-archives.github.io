art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"祝毛泽东思想武装的中国人民取得更大成绩","authors":[],"parts":[{"type":"paragraph","text":"新华社十八日讯 中国共产党第九次全国代表大会收到了匈牙利马克思列宁主义者们致毛泽东主席、林彪副主席和中国共产党第九次全国代表大会的贺信。贺信全文如下："},{"type":"paragraph","text":"北京"},{"type":"paragraph","text":"致中国共产党第九次全国代表大会"},{"type":"paragraph","text":"同志们："},{"type":"paragraph","text":"尊敬的毛泽东同志："},{"type":"paragraph","text":"尊敬的林彪同志："},{"type":"paragraph","text":"我们向中国共产党第九次全国代表大会致以无产阶级国际主义的祝贺。"},{"type":"paragraph","text":"中国共产党的历史经验证明，只有能够团结绝大多数的人民群众，教育群众并向群众学习，能够对统治阶级的反动的军事官僚主义机构进行长期的群众性的武装斗争，并拒绝关于通过和平途径取得政权的社会民主主义和修正主义主张的革命党，才能夺取政权。当然，某些“共产”党以不惜牺牲马克思列宁主义的代价可以变成在某些资产阶级政党或垄断资本的眼睛里“能够执政的”党，但是，这样的党所取得的政权，并不意味着工人阶级和劳动人民取得政权。"},{"type":"paragraph","text":"中国共产党之所以能够在无产阶级文化大革命中使社会再一次革命化，是因为中国人民在使所有的群众都起来反对国内反动的和修正主义的势力并支持自己的党阻止这种势力的破坏活动方面，证明是成熟的。中国共产党认识到，不通过群众的斗争，任何行政措施都不能提供反对修正主义，反对蜕化变质和反对资本主义复辟的保证，正如中国人民通过群众的斗争才能给予封建主义和帝国主义以打击一样。"},{"type":"paragraph","text":"中国人民和中国共产党的历史使命，是使中国变成一个能够使力量对比对进步的人类越来越有利的、繁荣的、统一的和社会主义的大国。社会主义中国越强大，各大洲进行反帝斗争的人民和被压迫民族越能觉得自己有力量，人民的命运越能掌握在人民自己手里，世界和平越不取决于某些大国相互间的交易。"},{"type":"paragraph","text":"匈牙利马克思列宁主义者们祝愿用毛泽东思想武装起来的中国人民和共产党在其正确的革命的政策中取得越来越大的成绩。这对世界各地进行斗争的革命力量，其中包括匈牙利为社会主义而斗争的力量，是一个最大的援助。"},{"type":"paragraph","text":"最后，让我们表达对伟大的中国人民和毛泽东同志本人深切的热爱和敬意。"},{"type":"paragraph","text":"致共产主义敬礼"},{"type":"paragraph","text":"匈牙利马克思列宁主义者们"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"89d04d0f3c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
