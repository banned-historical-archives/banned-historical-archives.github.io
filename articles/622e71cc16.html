rt":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"广东各界人民热情慰问英雄水兵参战部队代表在慰问大会上说：这次胜利首先要归功于党和毛主席的教导，归功于人民的支援，归功于上级的正确指挥和兄弟部队的配合；","authors":[],"parts":[{"type":"paragraph","text":"参战部队代表在慰问大会上说：这次胜利首先要归功于党和毛主席的教导，归功于人民的支援，归功于上级的正确指挥和兄弟部队的配合。"},{"type":"paragraph","text":"新华社广州七日电 广东省各界人民在欢呼胜利声中，今天组成慰问团，前往击沉美制蒋帮军舰两艘的海军部队，热情慰问保卫海上生产安全的英雄水兵。"},{"type":"paragraph","text":"慰问团的数百名代表，高举“向英雄的海军战士们致敬”等巨幅标语，敲锣打鼓，今天下午分别到达部队营区。代表们满怀胜利的喜悦，有的握着海军战士的手久久不放，有的把一束束鲜花送到水兵们的手里，表达他们对英雄的敬意。"},{"type":"paragraph","text":"中共广东省委书记处书记尹林平，在慰问大会上，向击沉美制蒋帮军舰的英雄水兵表示热烈的祝贺，赞扬他们这一仗打得漂亮，打得好。他号召全省共产党员、共青团员和全体人民，向英雄的人民海军学习，百倍警惕，常备不懈，努力生产，作好工作，随时准备支援解放军消灭胆敢来犯的敌人。"},{"type":"paragraph","text":"在击沉两艘美制蒋帮军舰的战斗中创立战功的海军某部代表刘维焕，在会上代表参战部队全体指战员，衷心感谢人民的关怀和慰问。他说，这次胜利首先要归功于党和毛主席的教导，归功于人民的支援，归功于上级的正确指挥和兄弟部队的配合。他表示，今后一定要更高地举起毛泽东思想伟大红旗，进一步突出政治，戒骄戒躁，认真总结经验，加强护渔护航，坚决消灭胆敢来犯的敌人。"},{"type":"paragraph","text":"两天来，这支海军部队驻地附近的渔民和许多县、市、人民公社的代表，也纷纷前往营区，热情慰问作战有功的部队。"}],"alias":""},"tags":[{"name":"广东文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"622e71cc16"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
