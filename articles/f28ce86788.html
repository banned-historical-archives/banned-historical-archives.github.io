art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"华国锋邓小平李先念等同志同各民主党派负责人和各界知名人士共庆春节","authors":[],"parts":[{"type":"paragraph","text":"据新华社二月十六日讯 华国锋主席，邓小平、李先念副主席，以及党和国家其他领导人，今天上午在中共中央统战部举办的联欢茶会上，同各民主党派负责人、各界知名人士欢聚一堂，共庆新春佳节。"},{"type":"paragraph","text":"联欢茶会在人民大会堂宴会厅举行。"},{"type":"paragraph","text":"华国锋、邓小平、李先念等领导同志热情地向大家鼓掌，致以节日的祝贺。"},{"type":"paragraph","text":"中共中央政治局委员、统战部部长乌兰夫讲了话。"},{"type":"paragraph","text":"应邀出席今天联欢茶会的有：政协副主席、部分常委、委员，在京部分人大常委、人大代表，各民主党派部分常委、中委，部分少数民族人士和民族研究工作者，宗教界人士，科技、教育、文化界人士，国务院参事等共约四百人。"},{"type":"paragraph","text":"在茶会上，首都文艺工作者演出了文艺节目。"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"华国锋","type":"人物"},{"name":"李先念","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f28ce86788"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
