art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"华国锋同志和齐奥塞斯库同志举行会谈会谈在诚挚、亲切、友好的气氛中进行","authors":[],"parts":[{"type":"paragraph","text":"新华社五月十五日讯 中共中央主席、国务院总理华国锋同罗马尼亚共产党总书记、罗马尼亚社会主义共和国总统尼古拉·齐奥塞斯库今天下午举行了会谈。"},{"type":"paragraph","text":"会谈是在诚挚、亲切、友好的气氛中进行的。"},{"type":"paragraph","text":"罗马尼亚方面参加会谈的有：罗共中央政治执行委员会委员埃列娜·齐奥塞斯库，罗共中央政治执行委员会委员，政府副总理、外贸和国际经济合作部部长科尔内尔·布尔蒂卡，罗共中央政治执行委员会委员、罗共中央书记杜米特鲁·波佩斯库，罗共中央政治执行委员会候补委员、外交部长斯特凡·安德烈，罗共中央委员、罗共中央书记瓦西里·穆沙特，罗共中央委员、总统府部长、总统顾问组组长瓦西里·蓬甘，罗共中央候补委员、罗马尼亚驻中国大使尼古拉·格夫里列斯库，化学工业部副部长扬·尼古拉，外贸和国际经济合作部副部长扬·斯托扬，机器制造工业部副部长杜米特鲁·尼斯托尔。"},{"type":"paragraph","text":"中国方面参加会谈的有：中共中央副主席、国务院副总理李先念，中共中央政治局委员、国务院副总理耿飚，中共中央政治局候补委员、国务院副总理陈慕华，中共中央委员、外交部长黄华，中共中央委员、外贸部长李强，中联部副部长乔石，外交部副部长余湛，外经部副部长魏玉明，中国驻罗马尼亚大使李庭荃等。"},{"type":"paragraph","text":"中共中央主席、国务院总理华国锋和罗马尼亚共产党总书记、罗马尼亚社会主义共和国总统尼古拉·齐奥塞斯库五月十五日举行会谈。 新华社记者摄"},{"type":"paragraph","text":"齐奥塞斯库总统和夫人由华主席陪同乘敞篷汽车，接受十多万群众的夹道热烈欢迎。 新华社记者摄"},{"type":"paragraph","text":"中共中央、国务院五月十五日在人民大会堂举行盛大宴会，热烈欢迎齐奥塞斯库总统和夫人。"},{"type":"paragraph","text":"华国锋主席主持了宴会。"},{"type":"paragraph","text":"图为宾主步入宴会厅。 新华社记者摄（照片）"}],"alias":""},"tags":[{"name":"华国锋","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"df74a82f1b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
