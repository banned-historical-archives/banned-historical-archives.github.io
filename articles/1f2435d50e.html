rt":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"用毛泽东思想统帅军事训练","authors":["牛德林/丁广师/姚亚萍"],"parts":[{"type":"paragraph","text":"三○一六部队警卫连党支部遵照毛主席关于“提高警惕，保卫祖国”的伟大教导，扎扎实实抓好军事训练。这是他们在训练间隙，以毛主席的哲学思想为武器，分析和解决军事训练中的问题。 牛德林摄"},{"type":"paragraph","text":"某团领导成员在军事训练中，深入基层帮助干部战士提高指挥和作战能力。这是团长张浩畔正和干部战士在一起，结合战例学习林副主席的战术原则。 丁广师摄"},{"type":"paragraph","text":"海军某部鱼雷快艇二中队队长张远德，活学活用毛泽东思想，正确处理政治思想好和其他三好的关系，切实抓好军事训练。这是他帮助新艇长掌握鱼雷攻击的要领。 本报通讯员摄"},{"type":"paragraph","text":"兰州部队某部三连干部战士，从难、从严、从实战需要出发，苦练近战、夜战的过硬本领。 姚亚萍摄（照片）"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1f2435d50e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
