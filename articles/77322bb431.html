script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"毛泽东关于民主人士参观土改问题的电报","authors":["毛泽东"],"dates":[{"year":1951,"month":3,"day":18}],"is_range_date":false,"parts":[{"text":"毛泽东关于民主人士参观土改问题的电报","type":"title"},{"text":"毛泽东","type":"authors"},{"text":"漱石、子恢、小平、仲勋同志：","type":"appellation"},{"text":"民主人士及大学教授愿意去看土改的，应放手让他们去看，不要事先布置，让他们随意去看，不要只让他们看好的，也要让他们看些坏的，这样来教育他们。吴景超、朱光潜等去西安附近看土改，影响很好。要将这样的事例教育我们的干部，打破关门主义的思想。","type":"paragraph"},{"text":" 毛泽东三月十八日","type":"paragraph"},{"text":"附件：","type":"appellation"},{"text":"西北局关于北京教授参观团参观情况的报告","type":"subtitle"},{"text":"1951.03.00","type":"subtitle"},{"text":"北京教授土改参观团十四人，定今晚夜车返京，他们到此十月曾参加长安县第一期土改总结会议，访问一个经过土改的农村，并直接参加长安五星区一个乡的土改工作（十几天），印象很好，对他们本身也是一个大教育。吴景超、朱光潜、雷海宗、戴赴光等人表现进步较快，他们前时座谈说，有几点收获。经群众运动中和农民沟通感情，由袖手旁观到伸手以至动手参加，打破了超阶级观点。从实践中才深刻了解了政策，感到我们干部是好的，改变了知识份子的优越感，认识本身不足。尤其是劳动群众的伟大力量和深厚感情对他们感到更大觉悟，只有和群众站在一起才有出路。他们说解放前，常说“人家”共产党，昨天还说“你们”共产党，现在要说“咱们”共产党了。这两天请他们给西安各界民主人士中小学教员和干部分别作几次报告，并到各大学讲演，反映都很好，对一般知识份子作用更大。","type":"paragraph"}],"comments":[],"origin":"川北区党委编印《关于镇压反革命问题的汇集：川北区第二次土改会议参考文件》， 1951年5月。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"77322bb431"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
