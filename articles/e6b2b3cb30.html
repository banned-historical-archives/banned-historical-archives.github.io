art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"大型纪念集《纪念柯棣华》出版叶剑英邓小平聂荣臻为纪念集题词撰文","authors":[],"parts":[{"type":"paragraph","text":"据新华社12月5日讯 为纪念印度友人、伟大的国际主义战士柯棣华大夫逝世四十周年（12月9日）而编辑的大型纪念集《纪念柯棣华》，已由人民出版社出版，6日起在北京开始发行。"},{"type":"paragraph","text":"叶剑英、邓小平、聂荣臻为纪念集题词、撰文。叶剑英的题词是：“中印人民都不会忘记柯棣华大夫”；邓小平的题词是：“发展中印两国人民的传统友谊”；聂荣臻的题词是：“纪念国际主义战士柯棣华同志：永志不忘，永为楷模”。"},{"type":"paragraph","text":"纪念集载有中外有关人士、柯棣华生前友好和亲属二十多人写的回忆和纪念文章。其中有叶剑英、聂荣臻、王炳南、江一真、钱信忠、季羡林、比·库·巴苏、丹尼尔·拉蒂菲、路易·艾黎、马海德、傅莱、马诺拉玛、瓦特萨拉、郭庆兰等。"},{"type":"paragraph","text":"纪念集还辑录了毛泽东、周恩来、朱德、宋庆龄当年悼念柯棣华的文章、函电和题词和以爱德华为队长的印度援华医疗队在中国的一些历史文献、资料、图片；柯棣华在华时给亲属和战友的信；原印度援华医疗队队员巴苏日记摘抄等。"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"叶剑英","type":"人物"},{"name":"聂荣臻","type":"人物"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e6b2b3cb30"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
