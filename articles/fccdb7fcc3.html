宾","authors":[],"dates":[{"year":1971,"month":10,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"海尔·塞拉西皇帝在上海观看民兵军事表演"},{"type":"paragraph","text":"张春桥主任陪同观看民兵热烈欢迎埃塞俄比亚贵宾"},{"type":"paragraph","text":"新华社上海十日电埃塞俄比亚皇帝海尔·塞拉西一世陛下，由上海市革命委员会主任张春桥陪同，今天下午观看了上海民兵的军事表演，受到上海民兵的热烈欢迎。"},{"type":"paragraph","text":"军事表演的靶场上，洋溢着中埃两国人民团结友好的气氛。当海尔·塞拉西一世皇帝陛下和其他埃塞俄比亚贵宾乘车来到靶场时，全副武装的男女民兵列队夹道欢迎。"},{"type":"paragraph","text":"在靶场上，男女民兵、红卫兵、红小兵和一户人民公社社员全家民兵，为埃塞俄比亚贵宾表演了步枪、半自动步枪射击，用步兵武器打敌机、打伞兵的技术，以及对登陆的敌人实施火力袭击的演习，显示了人民战争的威力。他们的表演，受到贵宾们一阵又一阵的热烈鼓掌欢迎。"},{"type":"paragraph","text":"表演结束，海尔·塞拉西皇帝陛下发表了热情的讲话，对民兵军事表演表示满意。他说，我们大家都希望生活在和平之中，同时，我们也都知道，在当前的世界情况下，人类的这种梦想不能实现。生活实践告诉我们，在我们的背后潜伏着危险。我高兴地从今天下午的表演中看到中国人民决心绝不再成为侵略的牺牲品。同样，埃塞俄比亚也已经作好准备，保卫自己不受侵犯。"},{"type":"paragraph","text":"今天下午陪同埃塞俄比亚贵宾观看民兵军事表演的，还有上海市革命委员会和中国人民解放军驻上海部队负责人王洪文、徐景贤、王秀珍、杨富珍、刘耀宗、高志荣等。"},{"type":"paragraph","text":"外交部代部长姬鹏飞以及陪同贵宾来访的有关方面负责人，也观看了民兵军事表演。（附图片）"},{"type":"paragraph","text":"埃塞俄比亚皇帝海尔·塞拉西一世陛下由周恩来总理陪同，十月十日乘专机从北京到达上海，受到上海市革命委员会主任张春桥等以及革命群众的热烈欢迎。海尔·塞拉西一世皇帝陛下由周恩来总理、张春桥主任等陪同，绕场一周，同机场上数千名欢迎群众见面。　新华社记者摄（传真照片）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"张春桥","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"人民战争","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fccdb7fcc3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
