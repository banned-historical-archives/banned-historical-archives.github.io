"year":1994,"month":6,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛泽东文艺思想的历史考察"},{"type":"paragraph","text":"吴文科"},{"type":"paragraph","text":"全面地、历史地考察并揭示毛泽东文艺思想形成和发展的整个过程，是帮助我们准确地把握毛泽东文艺思想及其精髓的重大研究课题。这方面，宋贵仑所著《毛泽东与中国文艺》一书，是一部颇有特色的理论著述。"},{"type":"paragraph","text":"该书在内容铺排与体例构架上，由“毛泽东与中国文艺”、“毛泽东著作与毛泽东文艺思想”和“毛泽东与毛泽东文艺思想”上、中、下三篇及附篇“毛泽东文艺理论与实践大事记”共四部分构成。其中，上篇是有关文艺的生平纪实，中篇是文艺著作研究，下篇是文艺思想探讨，附篇则是提供一个整体线索；在具体的著述操作上，生平纪实部分重考证，著作研究重文本，思想探讨重思辨，大事记略重全面，从而使该书在研究思路上呈现多方位的态势。作者求“新”而不求“全”，求“实”而不求“华”，著作中撷取较少为一般研究者所重视的事件，以及从前尚未发现或公开发表的著作，进行仔细的甄别与考据，在澄清事实与精读文本的基础上，提出了许多新颖、独到的看法与观点，让读者从中看到了真正的毛泽东及其文艺观。作者在研究方法上，始终把毛泽东的文艺活动及其著述放到具体的历史条件下进行实事求是的考察，同时把仔细地研读和领会毛泽东文艺著作的文本作为立论的前提与基础。史论结合的手法使得研究的结论水到渠成。"},{"type":"paragraph","text":"对于毛泽东文艺思想的形成与发展，该书有较系统的研究。作者认为，从“五四”新文化运动马克思主义思想在中国得到传播，到十四大系统阐发邓小平建设有中国特色的社会主义理论，其间毛泽东文艺思想的发展有三个阶段：毛泽东１９３６年１１月《在中国文艺协会成立大会上的讲演》，是毛泽东文艺思想的开端；１９４９年７月经毛泽东大量修改的《中共中央给中华全国文学艺术工作者代表大会的贺电》，是全国胜利后毛泽东文艺思想进一步发展的开端；党的十一届三中全会后党中央召开中国文学艺术工作者第四次代表大会，是改革开放新时期毛泽东文艺思想新的大发展的开端。在此框架下，毛泽东文艺思想的发展形成了三个高峰：以１９４２年毛泽东发表《在延安文艺座谈会上的讲话》提出文艺为人民大众服务为主要标志，是其第一个高峰；以１９５６年毛泽东和党中央提出“百花齐放，百家争鸣”的方针和毛泽东发表《同音乐工作者的谈话》为主要标志，是其第二个高峰；以１９７９年邓小平发表《在中国文学艺术工作者第四次代表大会上的祝辞》，并逐步形成有中国特色的社会主义文艺理论为标志，是其第三个高峰。这些论断对我们完整地准确地把握毛泽东文艺思想及其精髓，有着理论上的价值。"},{"type":"paragraph","text":"对于邓小平同志在改革开放新时期对毛泽东文艺思想的继承和发展，该书也有专章探讨。同时，对于党的第三代领导人关于坚持毛泽东文艺思想，繁荣和发展社会主义文艺的重要讲话，书中也进行了涉猎阐发，充分体现了毛泽东文艺思想在进入９０年代后的新发展。这就使这部研究毛泽东文艺思想的史论结合的专著，不仅具有历史的纵深感，也有现实的厚重感。"},{"type":"paragraph","text":"（《毛泽东与中国文艺》由人民文学出版社出版）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6599704285"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
