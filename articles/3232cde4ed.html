rt":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"史蒂文斯希望美中关系进一步改善","authors":[],"parts":[{"type":"paragraph","text":"据新华社一月四日讯 正在北京访问的美国共和党参院副领袖西奥多·史蒂文斯今天在记者招待会上说，美国愿意在上海公报和中美建交公报的原则基础上发展同中国的关系。"},{"type":"paragraph","text":"史蒂文斯参议员说，美国同中国的关系有着十分牢固的基础。他说，“我希望两国之间的关系将进一步改善。”他指出，自从美国前总统尼克松对中国进行具有历史意义的访问以及上海公报发表以来，中美关系不断增进。他说，“我认为不仅两国人民而且全世界人民都关心两国关系的继续改善。”"},{"type":"paragraph","text":"他认为上海公报和中美建交公报中所阐述的原则仍然是处理两国关系的基础。他说，“我希望情况将继续如此。”"},{"type":"paragraph","text":"他说他同中共中央副主席邓小平会谈是富有成果而内容丰富的。史蒂文斯说，邓小平的谈话十分坦率明确。"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"上海文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3232cde4ed"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
