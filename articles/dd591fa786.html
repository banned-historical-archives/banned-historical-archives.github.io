<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"永做文化大革命的尖兵","authors":["北京师范大学井冈山公社中文系联合大队"],"dates":[{"year":1967,"month":5,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"永做文化大革命的尖兵"},{"type":"paragraph","text":"北京师范大学井冈山公社中文系联合大队"},{"type":"paragraph","text":"在无产阶级文化大革命的高潮中，正当全中国、全世界革命人民隆重纪念毛主席的伟大著作《在延安文艺座谈会上的讲话》发表二十五周年的时候，我们心中最红最红的红太阳毛主席的又一光辉文献《关于红楼梦研究问题的信》发表了。毛主席的这封信，是无产阶级文化大革命又一盏指路明灯，是思想文化战线上社会主义革命的又一个强大武器！"},{"type":"paragraph","text":"毛主席明确指出：对资产阶级反动学术权威，“应当批判他们的毒害青年的错误思想，不应当对他们投降。”"},{"type":"paragraph","text":"马克思列宁主义、毛泽东思想的本质是批判的，革命的。十七年来，在党内最大的走资本主义道路当权派的包庇和支持下，资产阶级在思想文化领域内一刻也没有停止过制造颠覆无产阶级专政的反革命舆论。“不破不立，不塞不流，不止不行”，“破，就是批判，就是革命。”毛主席的这封信严肃地批判了党内的一些“大人物”，他们压制新生力量向资产阶级学术“权威”开火，“他们同资产阶级作家在唯心论方面讲统一战线，甘心作资产阶级的俘虏”。是保护这批牛鬼蛇神，让他们日甚一日地攻击无产阶级专政，复辟资本主义，还是对他们进行彻底批判，捍卫无产阶级专政，把社会主义革命进行到底？围绕这个问题，以毛主席为代表的无产阶级革命派和党内一小撮走资本主义道路的当权派展开了一次又一次的严重的斗争。"},{"type":"paragraph","text":"现在，我们十分清楚地看出，这些“大人物”中的最大的家伙，这些“大人物”的总后台，就是党内最大的走资本主义道路当权派，就是中国的赫鲁晓夫。是他赞扬卖国主义的影片《清宫秘史》是“爱国主义”的，扼杀了无产阶级同资产阶级在思想文化战线上的一场重大斗争；是他主张对资产阶级只讲联合，不讲斗争，向资产阶级投降，支持文艺界党内走资本主义道路当权派“阻拦‘小人物’的很有生气的批判文章”，压制“反对在古典文学领域毒害青年三十余年的胡适派资产阶级唯心论的斗争”……今天，在毛泽东思想的指引下，无产阶级革命派已经把这个党内最大的走资本主义道路的当权派揪出来了！我们一定要乘胜追击，彻底清算他的滔天罪行！"},{"type":"paragraph","text":"毛主席的这封信，说出了无产阶级革命派的心里话。我们伟大的领袖毛主席，从来就是以最大的热情支持革命的新生事物的。他在这封信里满腔热忱地赞扬了代表新生事物的“小人物”。毛泽东思想的雨露滋润我们成长。“九州生气恃风雷”。无产阶级革命派的革命生气，就靠伟大的毛泽东思想。对于资产阶级反动学术“权威”，对于党内一小撮走资本主义道路的当权派，对于剥削阶级思想，就是要高举革命的造反大旗，革它的命，造它的反！我们必须永远保持无产阶级的革命造反精神，向一切反党反社会主义反毛泽东思想的反革命修正主义分子勇敢地开战，永远做无产阶级文化大革命的尖兵！"},{"type":"paragraph","text":"无产阶级文化大革命胜利万岁！"},{"type":"paragraph","text":"伟大领袖毛主席万岁！万万岁！"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dd591fa786"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
