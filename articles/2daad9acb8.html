nned-historical-archives/banned-historical-archives9/main/books/十年文革中首长讲话传信录2.pdf"],"article":{"title":"戚本禹给聂元梓、蒯大富的电话记录","parts":[{"type":"title","text":"516．戚本禹给聂元梓、蒯大富的电话记录"},{"type":"paragraph","text":"(1967年2月13日)"},{"type":"paragraph","text":"聂、蒯同志："},{"type":"paragraph","text":"关于北京造反公社情况我不了解，他们的代表们曾找过我，因为抽不出时间，一直未能见到。我曾表示过，希望北京革命组织，在毛泽东思想基础上搞大联合，不要搞小团体主义。所传我们对造反公社的批评，如果指的这个意思，是有的。但是，这不是批评，而是一种愿望。另外，大联合组织，是否用北京公社的名义，希望你们商量一下。"},{"type":"paragraph","text":"祝你们在毛泽东思想基础上联合起来。"},{"type":"paragraph","text":"戚本禹"},{"type":"paragraph","text":"1967年2月13日"}],"authors":["戚本禹"],"dates":[{"year":1967,"month":2,"day":13}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":233,"page_end":233,"alias":""},"tags":[{"name":"戚本禹","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"聂元梓","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"革命大联合","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2daad9acb8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
