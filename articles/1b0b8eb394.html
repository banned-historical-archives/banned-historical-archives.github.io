:[{"year":1993,"month":7,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"湖南举办毛泽东生平和思想研讨会"},{"type":"paragraph","text":"新华社长沙７月１２日电（记者刘见初）来自三湘四水的近百名专家、学者和领导干部，７月８日至１０日聚会韶山，参加中共湖南省委为纪念毛泽东诞辰１００周年而举办的毛泽东生平和思想研讨会。"},{"type":"paragraph","text":"毛泽东同志在１９２７年上井冈山前，长期在湖南生活、学习和领导革命活动，建国后又曾３０多次回湖南视察。"},{"type":"paragraph","text":"与会者对毛泽东思想的科学体系，毛泽东的哲学、政治、经济、军事、党建、教育、文化和新闻等方面的思想以及他的社会主义经济建设的理论，进行了广泛深入的探讨；对邓小平同志坚持和发展毛泽东思想，创建建设有中国特色社会主义的理论也进行了研讨。研讨会共收到论文３５０篇。被评为优秀论文的１１０篇中，研究毛泽东早期思想的论文有１１篇，研究毛泽东生平与湖南的论文有３篇，有１５篇是研究邓小平同志如何坚持和发展毛泽东思想的。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"湖南文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1b0b8eb394"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
