art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东指出了革命的正确方向","authors":[],"parts":[{"type":"paragraph","text":"去年八月底九月初，中国工会代表团应邀参加了智利工人统一工会第四次代表大会，无论在会内会外，都受到了智利工人的热烈欢迎。"},{"type":"paragraph","text":"大会开幕那天，热情的智利工人代表们等候在会场门口。有一个身材魁梧的工人对着鱼贯而入的外国代表们一再高声问道：“有没有人民中国来的代表？有没有来自毛泽东土地上的兄弟？”我们和他们打了招呼，他就从台阶上跳下来，一把抓住我们的手说：“终于找到你们了。”接着他又和我们热烈地拥抱。许许多多工人和与会代表，也都向我们伸出了友谊的手，有的要求我们签名留念，有的高呼：“中国万岁！”“毛泽东万岁！”不少工人都淌下了激动的泪水。"},{"type":"paragraph","text":"有一次，我们在去会场的路上，一个来自智利最南方比欧比欧省的建筑工人走向前来同我们握手。他名叫曼·麦·冈萨雷斯。他一边走一边说：“我热爱中国，热爱毛泽东，因为中国代表真理，毛泽东指出了革命的正确方向。”他接着掏出一个精致的小本子，上面贴着从《北京周报》上剪下来的毛主席、刘主席和周总理的照片。他说：由于从心坎里热爱毛泽东、刘少奇和周恩来，所以无论走到哪里我都把他们的照片揣在口袋里，这样我感到有力量。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d0129e85b6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
