"],"dates":[{"year":1950,"month":2,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报余姚讯】　去年四月，由于人民解放军史无前例的大进军，浙江得到了解放，当盐务管理局接管了余姚盐场。除了废除苛捐杂税及非法剥削，并将窜扰在盐区内的股匪基本肃清，使盐民在政治上获得了初步的翻身外，盐务局为了保障盐民利益，一方面提出自救互救的口号，号召盐民在现有基础上提高产量与质量，另一方面，又自去年八月份起发放了中贫盐民贷款二四六○五○○○元，折合当时白米一四七二担。同时在可能情况下，尽量提高盐价，盐资尽量做到发放大米，目前每百斤盐已等于大米十四斤的价格(国民党统治时每百斤盐只等于大米二、三斤价格)目前政府财政虽然极端困难，还是尽量想法照顾盐民生活的。　(乡子)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cd2523f05f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
