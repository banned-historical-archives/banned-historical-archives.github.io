ical-archives/banned-historical-archives0/main/maoquanji27.pdf"],"article":{"title":"答谢福斯特、但尼斯祝贺中华人民共和国成立的电报","alias":"","parts":[{"type":"paragraph","text":"答谢福斯特、但尼斯祝贺中华人民共和国成立的电报"},{"type":"paragraph","text":"（1949年10月6日）亲爱的福斯特同志，但尼斯同志，和美国共产党全国委员会的全体同志们："},{"type":"paragraph","text":"十分感谢你们对于中华人民共和国成立的热烈祝贺。请将我的谢意转达给美国共产党全体党员，转达给全美国一切爱好和平正义和对中国人民怀有善意的人们。"},{"type":"paragraph","text":"诚如你们所说，中国人民的胜利是对于帝国主义首先是美国帝国主义的胜利。这个胜利，是全世界工人阶级和进步人类对于世界帝国主义阵营所进行的总的斗争的结果之一部分，在这个斗争中，美国的共产党人和一切真诚的民主分子是与中国人民并肩作战的。"},{"type":"paragraph","text":"美国共产党人在援助中国人民的正义事业而反抗美国帝国主义的反动对华政策的英勇奋斗中，享有一个特殊光荣的地位。尽管美国反动政府野蛮地迫害美国共产党和美国进步势力，非法地审讯美国共产党的十一位领袖，即但尼斯同志，威廉姆森同志，温斯顿同志，斯塔彻同志，戴维斯同志，温特同志，汤姆森同志，盖兹同志，波达许同志，格林同志和贺尔同志，但是事实毕竟表明了，正确的是美国共产党和美国进步势力，胜利的是美国共产党和美国进步势力的中国友人，而违反正义并因此可耻地失败了的则是美国现毛泽东全集第二十七卷在的帝国主义政府。这个事实，不能不鼓励全世界一切暂时尚处于被压迫地位的民主力量，不能不教育全世界一切暂时尚处于反动派统治和蒙蔽下的人民。"},{"type":"paragraph","text":"中美两国人民友谊万岁！"},{"type":"paragraph","text":"毛泽东一九四九年十月六日"}],"authors":["毛泽东"],"dates":[{"year":1949,"month":10,"day":6}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":377,"page_end":378},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9de179e7db"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
