" crossorigin="">{"props":{"pageProps":{"books":[{"id":"yaowenyuan","name":"姚文元文录","internal":false,"type":"pdf","official":false,"author":"姚文元","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/姚文元文录.pdf"],"article":{"title":"\"扶得东来西又倒\"","parts":[{"type":"title","text":"\"扶得东来西又倒\""},{"type":"paragraph","text":"《人民日报》"},{"type":"paragraph","text":"近来看了某些尖锐的和不尖锐的文章，我深感矫枉过正的现象的严重。我并不是提倡说八面玲珑的话，也并不是主张一讲话就要说出绝对真理，但是，我以为说话恰到好处应该是我们的努力方向。"},{"type":"paragraph","text":"恰到好处的批评是最尖锐最正确的批评，\"过正\"的批评不是\"温吞水\"，就是\"过火\"。"},{"type":"paragraph","text":"可是很多人却不习惯于这种恰到好处的艺术；反对一种倾向，总要反对得过头一些才够味似的，反映在文章中，就是专喜欢抓住一点而加以夸大，绝对化。提倡百家争鸣，就一定要提倡过头，以至主张\"随便什么话讲出来比不讲好\"\"鸣起来再说，用不着什么目的\"，连为社会主义这个大前提也一古脑儿否定了；提倡独立思考，就连以马克思列宁主义作为指导思想也作为一种束缚来反对了。反对粗暴，就连\"资产阶级思想\"，\"唯心主义\"这些词也当作\"粗暴\"一齐加以反对；而批判资产阶级思想的时候，往往拼命强调青年的\"组织性纪律性\"，以至把青年个人的爱好和坚持真理的棱角也一起磨掉了；现在反对不适当地束缚青年的爱好，又有些人主张青年中存在的某些资产阶级思想也不用批判，否则就是给青年戴上一顶大帽子。......真是\"扶得东来西又倒\"。"},{"type":"paragraph","text":"现在百家争鸣的方针开始实现了。很少听见有人讲\"资产阶级思想在某某方面的反映\"这样的话了。我希望不致于从这个完全正确的方针中得出这样一个结论：现在思想斗争已逐渐消失，学术战线上没有阶级斗争了。不是在反对庸俗社会学当中，已经有人在提倡一切都只应从艺术上、学术上分析，而不应从政治上加以分析吗？好象学术和政治没有什么关系似的。"},{"type":"paragraph","text":"当然，实际工作中\"过正\"的现象是很难避免的，笔直的道路是没有的，但决不能由此得出结论：不必注意和纠正矫枉过正的偏差。"}],"authors":["姚文元"],"dates":[{"year":1956,"month":9,"day":14}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":14,"page_end":15,"alias":""},"tags":[{"name":"姚文元","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6617b9f51e"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
