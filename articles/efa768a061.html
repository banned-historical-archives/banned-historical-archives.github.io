art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席著作在几内亚受到热烈欢迎","authors":[],"parts":[{"type":"paragraph","text":"新华社科纳克里12日电 毛泽东主席的著作在几内亚受到工人、学生、国家工作人员等各阶层人民的热烈欢迎。"},{"type":"paragraph","text":"据西非书店的不完全统计，今年头五个月这家书店出售的毛泽东著作达三百九十五册。人们很注意在毛泽东的著作中研究中国的经济建设方面的经验。"},{"type":"paragraph","text":"几内亚民主党达鲍拉州委员会总书记迪亚纳·凯法拉说，中国人民在中国共产党和毛主席的领导下打倒了日本法西斯和美国所支持的国民党反动派，胜利后又在经济和文化建设方面的大跃进取得了光辉的成就，这个事实不能不引起我们巨大的注意。他指出，毛泽东著作具有伟大的意义，因为中国和非洲都是被帝国主义者和殖民主义者统治过的。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"efa768a061"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
