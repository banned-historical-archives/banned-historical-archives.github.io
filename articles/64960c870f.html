script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"西哈努克亲王和夫人离京回国邓小平、李先念、吴德等到机场欢送","authors":[],"dates":[{"year":1976,"month":1,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京一九七五年十二月三十一日电　柬埔寨国家元首、柬埔寨民族统一阵线主席诺罗敦·西哈努克亲王和夫人，今天上午乘专机离开北京回国。"},{"type":"paragraph","text":"柬埔寨王国民族团结政府外交大臣沙林察和柬埔寨民族统一阵线中央政治局候补委员吉春也同机离开北京。"},{"type":"paragraph","text":"到机场欢送的有国务院副总理邓小平、李先念，人大常委会副委员长吴德，外交部副部长韩念龙，有关方面负责人卓琳、林佳楣、沈平、朱传贤、王珍。"},{"type":"paragraph","text":"柬埔寨驻中国大使馆临时代办吴平，在北京的其他柬埔寨朋友，以及朝鲜、越南民主共和国、老挝、巴基斯坦、越南南方共和、阿拉伯也门共和国、罗马尼亚、南斯拉夫驻中国的使节，巴勒斯坦解放组织驻北京办事处主任，也到机场送行。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"吴德","type":"人物"},{"name":"李先念","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"64960c870f"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
