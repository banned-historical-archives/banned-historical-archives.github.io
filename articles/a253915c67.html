rt":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席送三件宝","authors":["杜向明李龙勤"],"parts":[{"type":"paragraph","text":"1938年夏天，舒行在抗大二大队任大队长。一天上午，几架涂有“太阳旗”的日军飞机，带着刺耳的呼啸声朝延安上空飞来，随即投下了几十枚炸弹。敌人的恐吓更激起了大家强烈的义愤。当天下午，舒行第二次给中央组织部写了请求上前线的报告，他在报告中说：“敌人到我们这里来投炸弹，我要到敌人的后院去扔手榴弹。”"},{"type":"paragraph","text":"过了3天，中组部的一位同志找到舒行说：“你就是那位要到敌人后院扔手榴弹的舒行同志吧，你的报告毛主席批准了。”还告诉他，毛主席要见他和二大队的全体同志。"},{"type":"paragraph","text":"当天晚上，在延安清凉山下延河东岸的河滩上，抗大为这些即将上前线的同志们组织了欢送晚会。晚会开始了，毛主席走向临时搭起的戏台致欢送词。他说：“同志们呀，你们知不知道中国有个姜子牙呀？当年他二上昆仑，下山时，元始天尊送给他3件法宝——四不相、打神鞭、杏黄旗。今天你们也要下山，我也送给你们3件法宝，这就是统一战线、武装斗争、党的建设。姜子牙当年靠那3件法宝辅佐周文王夺得天下，你们也要用我送的这3件法宝，赶走日本鬼子，还我锦绣中华！”说到这里，毛主席点燃了手中的香烟，深深地吸了一口……"},{"type":"paragraph","text":"第二天早上，舒行带着一千多名同志开赴抗日前线。RW：毛泽东；回忆录"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a253915c67"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
