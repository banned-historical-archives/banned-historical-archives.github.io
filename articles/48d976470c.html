s":[{"year":1977,"month":6,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"瞿春荣　徐金保"},{"type":"paragraph","text":"“四人帮”为了篡党夺权，竭力破坏党的纪律，制造了种种谬论，其中之一:“遵守纪律是奴隶主义”。遵守党的纪律是奴隶主义吗?不。遵守党的组织纪律同奴隶主义两者泾渭分明，毫无共同之处。无产阶级的组织纪律是建立在自觉的基础之上的。我们无产阶级在斗争实践中深深懂得，严格党的纪律，是加强党的集中统一领导，巩固无产阶级专政，夺取革命胜利的根本保证。伟大的领袖和导师毛主席一再强调指出:“纪律是执行路线的保证”。没有严格的纪律，党就无法率领群众和军队进行胜利的斗争。“加强纪律性，革命无不胜。”"},{"type":"paragraph","text":"“四人帮”一伙叫嚣要“冲破”“党的纪律束缚”，党的纪律，是“束缚”吗?这话说对了一半。对他们搞修正主义、搞分裂、搞阴谋诡计来说，是“束缚”。可是要“冲破”并不那么容易。于是，他们对遵守党的纪律的人扣上一顶顶大帽子，什么“奴隶主义”、“软骨头”、“小绵羊”等等。这还不够，他们还培植象张铁生、翁森鹤这类“头上长角，身上长刺”的反革命分子来“冲破党的纪律束缚”，妄图搞乱全国，乱中结帮篡权。"},{"type":"paragraph","text":"“四人帮”是不是不要纪律呢?也不是。是不要无产阶级的纪律，而要建立他们法西斯的反革命纪律。江青不是赤裸裸地说“不听我的话，就是不听党的话”吗?她恬不知耻地把自己标榜为党的“化身”，要大家来听她的话，跟着她的反革命指挥棒转。谁不听她那一套，就给谁扣上“反党”大帽子，甚至逮捕、关押，进行残酷迫害。可见，大搞奴隶主义的，恰恰是“四人帮”自己。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"name":"夺权","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"48d976470c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
