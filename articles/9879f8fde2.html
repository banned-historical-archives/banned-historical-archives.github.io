art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"书亭","authors":["何念选/王献礼/翟席以故事的形式，真实生动地介绍了毛泽东同志从1936年7月至1937年1月，在保安短暂的六个月中的工作和生活情况？全书由三十多个故事组成，事迹感人，语言朴实，是一本反映以毛泽东同志为首的老一代共产党人生活？工作和高尚革命情操的通俗读物？（白黎著","军事译文出版社出版）〖HH/换行〗（翟席）","编解放军出版社出版）〖HH/换行〗《我们这一代青年人》〖HH/换行〗为了参加“国际青年年”的活动，国际青年年中国组织委员会委托有关新闻单位和刊物举办了以“我们这一代青年人”为题的短篇小说、报告文学征文活动。中国青年出版社出版了这次征文的获奖作品集，共收入作品二十六篇。这些作品全部出自青年之手，表现了我国年轻一代在伟大变革时代的希冀与欢乐，理想与信念，矛盾与斗争，呈现出鲜明的时代色彩。〖HH/换行〗（中国青年出版社出版）〖HH/换行〗《19颗星——对美国四位名将之研究》〖HH/换行〗马歇尔、麦克阿瑟、艾森豪威尔和巴顿，是美国近代史上有名的四位军事战略家。他们的奋斗道路、治军方法、指挥艺术及战略思想，一直是人们注意研究的对象。这本书的作者是位美国空军军官、政治学博士，他查阅了大量史料，采访了五百多位当事人，用对比手法，对以上四人的成长过程和指挥艺术、军事素养进行研究，而后写成此书。他的最后结论是：“将帅之才不是天生的，而是时势造就的。”这本书选材典型，史料翔实，富于哲理，兼有历史资料和文学欣赏价值。但是由于作者的立场和我们不同，阅读时对其中一些观点，要善于鉴别。〖HH/换行〗（〔美〕小埃德加·普里尔著","解放军出版社出版）〖HH/换行〗（何念选）〖HH/换行〗《抹不掉的回忆》〖HH/换行〗这是一部反映我军后勤战线先进典型的报告文学集，收入作品二十一篇。第一次披露了荣获“模范军医”称号的吕士才一家人的工作和生活。当代优秀大学生张华在进军校前的一段爱情故事也很耐人寻味。优秀科技工作者黄翠芬教授的风格，体现了鲜明的时代精神。身处逆境二十年，对党和祖国仍怀一片赤子之心的李敬中，其事迹催人泪下。华山抢险英雄，展现了八十年代青年的风貌。这些作品热情歌颂了我军在新的历史时期展现出来的新风貌、新品德。〖HH/换行〗（总后勤部政治部宣传部编金盾出版社出版）〖HH/换行〗（王献礼）〖HH/换行〗《中国女排之歌》〖HH/换行〗这是从全国四十家报纸上选辑出的一本盛赞我国女排历尽艰险、赢得“三连冠”的诗歌汇集。共收入诗歌一百二十三首。虽然说不上海篇都是佳作，但是读到它，可以使人感到一种十分强烈的爱国主义情感。〖HH/换行〗（丁明堂"],"parts":[{"type":"paragraph","text":"《毛主席在保安的故事》"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9879f8fde2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
