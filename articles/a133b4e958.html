script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"卢湾邮电支局职工联系实际狠批“克己复礼”进一步认清林彪路线的极右实质","authors":[],"dates":[{"year":1974,"month":3,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　本市市南区邮电局卢湾邮电支局党支部在批林批孔运动中，引导群众联系本单位实际，狠批林彪效法孔老二“克己复礼”，妄图复辟资本主义的罪行，提高了广大群众、干部巩固和发展无产阶级文化大革命伟大成果的自觉性。"},{"type":"paragraph","text":"前一阶段，这个支局的干部、群众批判了林彪效法孔老二“克己复礼”，妄图复辟资本主义的罪行，全局呈现了一派团结战斗的革命景象。为了把运动进一步引向深入，支局领导又分别深入班组，引导群众结合本单位实际，在歌颂无产阶级文化大革命中涌现出来的社会主义新生事物的同时，想一想新生事物在发展和壮大的过程中遇到了哪些阻力；查一查在无产阶级文化大革命中一些被批判了的东西有没有回潮。通过回顾，大家看到了修正主义路线的流毒并没有肃清，如在无产阶级文化大革命中被群众批得臭不可闻的“奖金挂帅”、“物质刺激”等黑货，如今也有回溯的现象。在文化大革命中，广大职工为了方便人民群众，把特挂邮件送上门，受到群众的赞扬。但后来又取消了这一做法，让收件人登门领取，降低了服务水平。从这些问题中，大家深深感到，如不肃清修正主义路线的流毒，弄得不好，社会主义企业就会滑到修正主义的泥坑中去。"},{"type":"paragraph","text":"在批判中，大家把孔老二维护奴隶制的倒退思想，同林彪攻击无产阶级文化大革命的谬论进行对照，进一步看清了林彪路线的极右实质。群众一针见血地指出:孔老二是没落的奴隶主阶级的卫道士，林彪是地主资产阶级的代理人，孔老二要“复礼”，林彪要“复辟”，都是妄图阻止社会变革，开历史倒车。可见林彪是个地地道道的孔老二的忠实信徒。"},{"type":"paragraph","text":"通过批判，广大职工表示要以实际行动来巩固和发展文化大革命的胜利成果，支持社会主义新生事物。投递三、四班学习小组，有八个青年狠批孔孟的“学而优则仕”和林彪污藏知识青年上山下乡是“变相劳改”的谬论，回顾了自己走与工农相结合道路的战斗历程，进一步看清了林彪破坏上山下乡的罪行，决心努力改造世界观，做无产阶级革命事业的接班人。　　(本报通讯员)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"林彪","type":"人物"},{"name":"批林批孔","type":"主题/事件"},{"name":"批林批孔","type":"主题/事件"},{"name":"上山下乡","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a133b4e958"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
