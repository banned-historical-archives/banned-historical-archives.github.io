ical-archives/banned-historical-archives8/main/maoquanji26.pdf"],"article":{"title":"致刘伯承、张际春、李达等电","alias":"","parts":[{"type":"paragraph","text":"致刘伯承、张际春、李达等电"},{"type":"paragraph","text":"（1949年4月10日）"},{"type":"paragraph","text":"顷接白崇禧方面来电称：“关于安庆撤退事，暂有困难。因自该地发生战事以来，国防部曾令坚守待援，该地辖京沪区指挥，蔽方不便擅令守军撤退。拟请贵方允许，暂留该地勿攻，撤方亦不出击，以待和谈解决。”"},{"type":"paragraph","text":"安庆既属国防部管辖，白崇禧自不便令撤，请令前线停止对安庆的攻击，以待和谈解决。如安庆畏我派人接洽动摇其军心，你们亦不必派人去联络，彼此暂维现状为要。"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军委起草的致刘伯承、张际春、李达并告总前委电的主要内容。"}],"authors":["毛泽东"],"dates":[{"year":1949,"month":4,"day":10}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":266,"page_end":266},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b10945f226"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
