rs":[],"dates":[{"year":1971,"month":12,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京二十九日电　由歇莱尔·希尔和杰里·董率领的美国进步学生代表团，今天下午参观了北京体育学院。中共中央政治局委员江青、中共中央对外联络部部长耿飚、国家体委主任王猛，同美国朋友一起观看乒乓球、武术和体操表演。"},{"type":"paragraph","text":"体育表演结束后，美国朋友们高兴地走进表演场地，同运动员们热烈握手，并一起高唱革命歌曲。这时，表演场内呈现出一派热烈友好的景象。"},{"type":"paragraph","text":"美国朋友还参观了这个学院的球类馆、田径馆、游泳馆，受到了师生们的热烈欢迎。"},{"type":"paragraph","text":"我国有关方面负责人冯铉、李青川、陈志雄等也陪同美国朋友参观。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"江青","type":"人物"},{"name":"耿飚","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"03f757fda5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
