uthors":["姚大慈","湖南"],"dates":[{"year":1957,"month":5,"day":31}],"is_range_date":false,"parts":[{"text":"共产党要保全“金字招牌”，清除“害群之马”","type":"title"},{"text":"湖南姚大慈","type":"authors"},{"text":"（姚大慈为湖南文史馆馆员）","type":"subtitle"},{"text":"在湖南省政协第三次全体会议上的书面发言摘要","type":"subtitle"},{"text":"“没有共产党，就没有新中国”这两句话是正确的，因此中国的无产阶级专政，是共产党领导，也是人人所心悦诚服的。但是领导是领导，如果不与民主党派协商，不听取群众的意见，独断专行那就把领导变为包办了。这个过程，有三大主义在中间，与包办成为相互的因果，所以成为一种不可不治的病。周主席说，希望这次会议，把一切矛盾尽情揭露出来，帮助共产党整风，这是很使人有感慨的话。共产党本来是整别人的，何以今天倒要别人来帮助整自己呢？自解放以来，共产党把队伍一天一天扩大，哪里有这么多好人来做共产党，这中间吸收了不少的假积极分子，披着伪装，钻进党内，起腐蚀作用。这种分子超过解放前老党员好多倍，人数既多，散布很广，就是解放前老党员也不免有最少数被他们腐蚀的，所以今天的共产党，不免有些变质的气味，所以酿成今天的现象。我觉得老党员是经过多年艰苦战争锻炼出来的，有他的高贵的品质，(我认为真共产党员都是有圣人之一体的，所以在革命过程中，有数不清的惊神泣鬼为普通人所万万做不到的奇迹。)大多数是不会变质的，这几年来变质的都是那些假积极分子，钻空子进去的假共产党员，我们为了要保护我们珍贵的领导力量，作为社会革命的杠杆，应该劝共产党在这次整风中，必须捐除姑息，把这些假党员害群之马清除出去，保全共产党的金字招牌，维持共产党在全国人民中信仰。在整风的方法，虽然是和风细雨，在整风的结果，决不可以是姑息优容，因为五千年未有的政治集团，是新中国的生命线，如果这个生命线不健全，新中国往后是不会健康的。","type":"paragraph"},{"text":" (原载1957年5月31日“新湖南报”)","type":"paragraph"}],"comments":[],"origin":"《社会主义辩论集之二  毒草集(资产阶级右派的反社会主义言论)》，湖南人民出版社1957年10月版，内部发行。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b5e376ea7a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
