ical-archives/banned-historical-archives8/main/maoquanji18.pdf"],"article":{"title":"给中共太行分局书记邓小平转太行分局各同志的电报","alias":"","parts":[{"type":"paragraph","text":"给中共太行分局书记邓小平转太行分局各同志的电报！"},{"type":"paragraph","text":"(1943年8月16日)小平同志转太行分局各同志："},{"type":"paragraph","text":"中央给冀察普分局关于保存干部电转给你处，谅已收阅。希望你处照此电意旨同样正确地处理此问题。即是将全部干部分为支持斗争与保存学习两部分，而从直属机关、学校（抗大、党校等）及太行、太岳、冀南、冀鲁豫各区抽调好的有造就前途的高级上级干部四百至五百人送延学习，提拔中下级上来代替他们的职位。你处中级于部及犯错误难处理的干部亦可送来，但不应放在上述数目之内。"},{"type":"paragraph","text":"中央书记处"},{"type":"paragraph","text":"八月十六日[1]这是毛泽东为中央书记处起草的给中共太行分局书记邓小平转太行"}],"authors":["毛泽东"],"dates":[{"year":1943,"month":8,"day":16}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":152,"page_end":152},"tags":[{"name":"邓小平","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0195200cc5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
