阔步前进  全世界人民感到欢欣鼓舞，帝国主义和现代修正主义吓得发抖","authors":[],"dates":[{"year":1969,"month":4,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"尼泊尔朋友热烈赞扬中国无产阶级文化大革命的光辉胜利"},{"type":"paragraph","text":"中国人民在建设社会主义的大道上阔步前进"},{"type":"paragraph","text":"全世界人民感到欢欣鼓舞，帝国主义和现代修正主义吓得发抖"},{"type":"paragraph","text":"新华社加德满都十日电　尼泊尔朋友热烈赞扬中国无产阶级文化大革命的光辉胜利。"},{"type":"paragraph","text":"一位尼泊尔朋友对中国朋友说，毛主席亲自发动和领导的无产阶级文化大革命，已经取得了光辉的胜利。这一场大革命，粉碎了刘少奇及其代理人企图在中国复辟资本主义的反革命路线，彻底摧毁了资产阶级司令部。同时也粉碎了帝国主义、现代修正主义阴谋在中国复辟资本主义的迷梦。他说，目前，七亿中国人民紧紧地团结在以毛主席为首林副主席为副的无产阶级司令部周围，正在建设社会主义的大道上阔步前进。他说，这是毛主席的马克思、列宁主义路线的伟大胜利，是毛泽东思想的伟大胜利。"},{"type":"paragraph","text":"一位住在尼泊尔西部的朋友说，经过两年多的无产阶级文化大革命，人们越来越理解到它是非常必要的和及时的，没有这场大革命，中国就会改变颜色。经过这场大革命，用毛泽东思想武装起来的伟大的七亿中国人民，在毛主席领导下，将把社会主义的中国建设得更加强大。全世界人民感到欢欣鼓舞。让帝国主义、现代修正主义发抖吧！"},{"type":"paragraph","text":"一位教员说，毛主席英明领导的无产阶级文化大革命的光辉胜利，鼓舞着正在向帝国主义、现代修正主义进行英勇斗争的各国人民。这场大革命具有非常重大的历史意义和深远影响，它解决了革命成功后如何巩固无产阶级政权的问题。他说，这是毛泽东思想的伟大胜利。他热情地祝愿毛主席万寿无疆！"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"24a7863fb3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
