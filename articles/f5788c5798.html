art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"浙江落实毛主席最新指示革命洪流奔腾急","authors":[],"parts":[{"type":"paragraph","text":"据新华社讯 在伟大领袖毛主席一系列最新指示的指引下，浙江省无产阶级文化大革命和工农业生产形势空前大好。"},{"type":"paragraph","text":"毛主席说：“办学习班，是个好办法，很多问题可以在学习班得到解决。”浙江省无产阶级革命派和广大革命群众怀着对伟大领袖毛主席无比深厚的无产阶级感情，把大办、办好毛泽东思想学习班，作为落实毛主席最新指示的关键。目前，全省城乡已经举办了七万七千多期毛泽东思想学习班，参加学习的达五百七十多万人次。"},{"type":"paragraph","text":"参加各地毛泽东思想学习班学习的无产阶级革命派、革命群众和革命干部，对无产阶级的伟大导师毛主席心怀一个“忠”字，对战无不胜的毛泽东思想狠抓一个“用”字，认真落实毛主席的一系列最新指示，使革命大批判、革命大联合和革命三结合的巨浪，有如钱塘江潮，一浪高过一浪，滚滚向前。目前，全省六十七个县市，大部分实现了革命大联合或达成革命大联合协议。在毛主席最新指示的指引下，浙江省“省联总”和“红暴派”在毛泽东思想的原则基础上达成了革命大联合的协议。全省十三所大专院校，已有八所实现了革命大联合或者达成了革命大联合的协议。全省已有十七个县市建立了革命委员会。杭州全市二百多个大中型工厂企业，大部分成立了革命委员会。"},{"type":"paragraph","text":"随着无产阶级文化大革命的不断深入发展，全省工农业生产有了新的发展，交通畅通，市场繁荣。"},{"type":"paragraph","text":"现在，浙江省广大无产阶级革命派、革命群众和革命干部，正以“只争朝夕”的革命精神，紧跟毛主席的伟大战略部署，进一步落实毛主席的最新指示，决心把全省无产阶级文化大革命推向新阶段，夺取无产阶级文化大革命的全面胜利。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"浙江省红色暴动委员会（红暴）","type":"人物"},{"name":"浙江文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f5788c5798"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
