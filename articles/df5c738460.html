<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"首都制成万能底盘拖拉机和小轿车  毛主席和中央领导同志参观新产品","authors":[],"dates":[{"year":1958,"month":6,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"首都制成万能底盘拖拉机和小轿车"},{"type":"paragraph","text":"毛主席和中央领导同志参观新产品"},{"type":"paragraph","text":"新华社20日讯　毛泽东主席今天下午七时在中南海参观了北京第一汽车附件厂制造的井冈山牌小轿车、兴平机械厂制造的巨龙牌拖拉机和北京农业机械厂制造的红旗牌万能底盘拖拉机，并且向这几家工厂的负责人详细询问了这些新产品的性能和特点。"},{"type":"paragraph","text":"下午三时，中共中央副主席刘少奇、周恩来、朱德、陈云和总书记邓小平，以及在场的中共中央政治局委员、书记处书记们也参观了这些新产品。朱德副主席和中共中央政治局委员李富春还乘坐井冈山牌小轿车，在草坪上绕行一周。"},{"type":"paragraph","text":"新华社讯　我国第一台红旗牌万能底盘拖拉机已由北京农业机械厂试制成功。20日这台拖拉机装着一套联合收割机，在北京南郊农场作了收割小麦的田间初步试验，证明它的性能基本上合乎设计要求。"},{"type":"paragraph","text":"这台新型的拖拉机，是北京农业机械厂设计的，它在国外也只有几年的发展历史。1956年，这个厂的总工程师出国考察时见到国外正在研究这种拖拉机，回国后虽曾在工厂作过介绍，但职工们当时却不敢想像能由自己来制造。在双反运动中，职工们打掉自卑感，决定自己设计这种拖拉机。他们分析了各国一些比较先进的拖拉机的优点，在农业研究所等单位的支持下，在三个月内就设计出来了。"},{"type":"paragraph","text":"这种拖拉机有许多优点：一、是用途广泛，利用率高。它既能收割麦子等二十三种谷物和薯类、油料、牧草等作物，进行喷雾、喷粉、铡草等工作，又能作一般万能拖拉机所能作的耕作和运输作业。二、是机身轻巧。它共有二十八马力，但总重量只一千一百七十公斤，每马力体重为四十一点八公斤（一般拖拉机每马力约重四十五到五十公斤）。三、是用这种拖拉机装置各种农具，可以省掉农具的机架、轮子及大部分传动机构，因而大量节约了钢材，降低了成本。四、是拖拉机上装置的农具和底盘联成一体，因而使各种农具成了自动式的农具，视线清楚，操作方便，转弯灵活。由于有这些优点，它很受农村欢迎，现在各地要求订购已达四十八万台。"},{"type":"paragraph","text":"这个厂的机修车间职工在接到试制任务时，情绪极为高涨，他们立即组织了试制小组。车间没有装配场所，就临时搭一个简陋的竹棚，有些零件没有图纸，就由技术人员和老工人研究创造，缺乏材料就用代用品。经过一个月的苦干，这台拖拉机就制造出来了。"},{"type":"paragraph","text":"这个厂现在还要根据第一台万能底盘拖拉机试制的情况，着手修改设计。职工们表示要在短时期内克服现存的一些缺点，试制出更完善的定型的红旗牌万能底盘拖拉机。"},{"type":"paragraph","text":"另外，还有一种适于深耕和中耕的万能拖拉机和巨龙牌拖拉机，最近也分别在北京永定机械厂和兴平机械厂试制成功。"},{"type":"paragraph","text":"据新华社讯　北京第一汽车附件厂20日试制成功“井冈山”牌小轿车。这部四轮五座的小轿车，从车身、发动机、化油器到每一个小零件，全部是国产的。"},{"type":"paragraph","text":"20日下午，第一汽车附件厂的职工敲锣打鼓，开着这部小轿车到中共北京市委、市工会联合会报喜。中共北京市委第一书记彭真接待了报喜的职工，并且乘坐这辆汽车，在台基厂马路上行驶一周。"},{"type":"paragraph","text":"第一汽车附件厂职工，在今年5月初提出了“能够制造汽车附件，就能够制造汽车”的口号，克服了种种困难，从设计造型到制成，只用了两个半月时间，比原计划提前了四十天。在试制过程中，清华大学一百多个教授和学生给了极大的帮助，北京以及全国许多城市的三十多个工厂给予热情的支援和密切配合。"},{"type":"paragraph","text":"（附图片）"},{"type":"paragraph","text":"毛主席在观看“巨龙”牌拖拉机。　新华社记者　邹健东摄"},{"type":"paragraph","text":"“井冈山”牌小轿车开到北京市委报喜"},{"type":"paragraph","text":"本报记者　吕相友摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"朱德","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"df5c738460"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
