ical-archives/banned-historical-archives8/main/maoquanji21.pdf"],"article":{"title":"东明作战暂勿举行","alias":"","parts":[{"type":"paragraph","text":"东明作战暂勿举行!"},{"type":"paragraph","text":"（1946年5月21日）刘、邓："},{"type":"paragraph","text":"四平已失，为不给顽方以发动大战之借口，东明作战暂勿举行，但对东明、长垣、考城、永年、聊城等处进行侦察准备。"},{"type":"paragraph","text":"中央"},{"type":"paragraph","text":"马卯"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央起草的给晋冀鲁豫军区司令员刘伯承和政治委员邓小平的电报。1946年5月20日晨刘伯承、邓小平致电中共中央，提出集中第七纵队主力攻取东明，然后再向长垣方向发展。同日，毛泽东在为中共中央起草的复电中说：“同意攻取东明，得手后再考虑夺取长垣，以为顽夺我安次、萧县、夏邑、定远四城及向水东区进攻之报复手段。”并询问攻取永年、聊城的可能条件。马卵电对原定攻取东明等地的部署作了修改。"}],"authors":["毛泽东"],"dates":[{"year":1946,"month":5,"day":21}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":340,"page_end":340},"tags":[{"name":"邓小平","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"57d0adea74"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
