rt":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"做继续革命的先锋战士","authors":["成都部队活学活用毛泽东思想积极分子/副营长石喜来"],"parts":[{"type":"paragraph","text":"伟大统帅毛主席教导说：“我赞成这样的口号，叫做‘一不怕苦，二不怕死’”。我反复学习了毛主席的这一最新指示，越学越感到无比亲切，无比激动。"},{"type":"paragraph","text":"有一段时间，我曾经觉得自己参加革命艰苦奋斗十几年了，打过仗，负过伤，立过功，现在革命取得了伟大胜利，以后该轻松一点了。思想离了轨，行动就变样，慢慢地习惯于和和平平地过生活，舒舒服服地干革命。在连队的小整风中，我带着问题反复学习了毛主席在党的七届二中全会上的报告，对照毛主席关于“革命以后的路程更长，工作更伟大，更艰苦”的伟大教导，检查了自己居功骄傲，不愿再过艰苦生活的情绪，认识到，所以产生这种情绪，最根本的是没有用毛主席关于无产阶级专政下继续革命的伟大理论武装头脑。怕吃苦、图安逸是资产阶级好逸恶劳的表现，是腐朽的资产阶级世界观的反映；不怕苦、不怕死是无产阶级专政下继续革命觉悟高的表现。"},{"type":"paragraph","text":"提高了认识以后，我就处处以一不怕苦、二不怕死的革命精神要求自己。近几年来，我的身体不太好。有一次，部队到一个炎热的地区执勤，我开过刀的伤口被汗水淹得经常发炎，痛得钻心。但是病痛决不能阻止我继续革命的步伐。我白天指挥战斗，夜晚看地形，筑阵地，挖工事，处处注意磨炼自己的革命意志。"},{"type":"paragraph","text":"我一定牢记毛主席的教导，继承和发扬我军一不怕苦、二不怕死的光荣传统，活学活用毛主席关于无产阶级专政下继续革命的伟大学说，狠批大叛徒刘少奇的“活命哲学”，把自己锻炼成为无产阶级专政下继续革命的先锋战士。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bdadcb4010"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
