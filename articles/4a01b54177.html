反革命分子的工资待遇问题的通知","authors":[],"dates":[{"year":1956,"month":4,"day":29}],"is_range_date":false,"parts":[{"text":"中共中央关于机关、企业内部被管制的反革命分子的工资待遇问题的通知","type":"title"},{"text":"上海局，各省市委、自治区党委，中央和军事各部门，中央国家机关各党组：（各省、自治区转所在军区和省军区）","type":"appellation"},{"text":"关于在机关、企业内部被管制的反革命分子的工资待遇问题，中央在1952年5月曾有一规定，这一规定是适合于当时的情况的。几年以来情况已经有了很大变化，现在在机关、企业内部继续管制的反革命分子已为数极少（主要是一些非留用的人员）。为了有利于对内部被管制分子进行改造工作，也为了提高这些人的工作和生产积极性，除了在政治上还应该同好人加以区别之外，在经济上可以一律按照同工同酬的原则，同其他职工一样取得应得的工资和超额奖金。","type":"paragraph"},{"text":" 中央1956年4月29日","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4a01b54177"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
