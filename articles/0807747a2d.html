,"dates":[{"year":1994,"month":8,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社波恩8月12日电　(记者　夏治沔)德国警方正严阵以待，准备对付右翼极端分子申请于13日开始举行的一系列集会和由此可能引起的冲突。"},{"type":"paragraph","text":"据官方统计，德国极右分子已在全国各地30多个城市提出了要求举行集会的申请，以纪念希特勒的副手鲁道夫·赫斯自杀7周年。"},{"type":"paragraph","text":"德国各州内政部已作出决定，不批准极右分子的集会，并调集警力，严加防范。同一天，德联邦政府亦表示，可为各州提供边防军，作为警察的后援力量，必要时可动用军用直升机调运警察。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0807747a2d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
