script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"《巴特寮新闻》揭露西苏加紧策划政变阴谋  警告极右派如不停止阴谋活动必遭镇压","authors":[],"dates":[{"year":1975,"month":5,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"《巴特寮新闻》揭露西苏加紧策划政变阴谋"},{"type":"paragraph","text":"警告极右派如不停止阴谋活动必遭镇压"},{"type":"paragraph","text":"新华社万象一九七五年五月八日电　据《巴特寮新闻》报道，以西苏·纳占巴塞为首的老挝极右反动派正在加紧策划在万象发动政变。"},{"type":"paragraph","text":"报道说，五月三日和四日，西苏及其右派军队的一些高级军官召开会议，决定在他们逃往外国之前发动政变。会上，他们对发动政变的武器、人力配备和战术等作了详尽的策划。他们的政变阴谋得到了培·萨纳尼空、文翁和总参谋长帕苏的紧密配合。"},{"type":"paragraph","text":"极右派为了实现这一阴谋，于五月六日命令其军队全部驻守兵营，并把一些非正规部队部署在万象市的一些地方。现在，他们正在抽调第三军区（沙湾拿吉）的军队到万象的吉乃莫兵营，并在距万象二十七公里的地方准备大炮、坦克，在龙镇、沙湾拿吉和泰国的乌隆准备T—28型飞机。"},{"type":"paragraph","text":"报道还揭露说，这一阴谋活动得到来自泰国的一些支持。"},{"type":"paragraph","text":"报道警告说，西苏必须立即停止上述活动。否则，老挝各爱国力量将同老挝全国人民一道，对他们进行彻底镇压，使他们遭到同美国在西贡和金边的走狗集团同样的下场。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"83ee34d406"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
