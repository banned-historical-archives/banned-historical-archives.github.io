["太原工学院学生"],"dates":[{"year":1957,"month":6,"day":6}],"is_range_date":false,"parts":[{"text":"给一年级全体同学们的一封信","type":"title"},{"text":"太原工学院学生","type":"authors"},{"text":"第一野战军全体指战员，第一炮声响了，虽然有的不太好！我部在4月开始，已经局部投入战斗了，但只是短兵接触，更大的战役还在后面呢！同志们，为了更有力的粉碎宗派主义、官僚主义在我院的统治，为了配合兄弟部队的作战，我们恳切地等待着你们，开辟第三战场——揭发三害在日常中的统治，揭发领导对我们的漠不关心……特别对我们意见不作处理……素仰你们的威力，坚信你们，旗开得胜，马到成功。","type":"paragraph"},{"text":"愿我们在未来的战斗中，摧毁，取得胜利的会师吧！","type":"paragraph"},{"text":" 太原工学院机二喀秋莎鸣放团指挥员战斗员上6月6日","type":"paragraph"},{"text":"支持同学呼声！！！","type":"paragraph"},{"text":"支持同学的停课鸣放的合理要求，我们誓为后盾，不达目的决不甘休，根除三害是时候了，不能再拖，彻底粉碎徐舟所提“‘鸣’‘放’、学习两不悮”的绝论谬论，官僚者不醒打它醒，让烈火燃烧彻底埋葬他们。","type":"paragraph"},{"text":" 太原工学院教师剪刀团6月8日","type":"paragraph"}],"comments":[],"origin":"《“鸣”、“放”选集（一）》（中共山西省委整风办公室编，1957年8月）。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"46f832ab78"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
