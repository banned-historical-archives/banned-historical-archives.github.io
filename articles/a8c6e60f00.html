thors":["江青","陈伯达"],"dates":[{"year":1967,"month":1,"day":26}],"is_range_date":false,"parts":[{"text":"陈伯达江青给北京航空学院\"红旗\"的电话指示","type":"title"},{"text":"陈伯达江青","type":"authors"},{"text":"起草一个决定，不必开誓师大会，考虑准备北京市工农兵和革命师生代表会，组织市人民政府，不一定用市长这一形式，标语和传单暂不印，转告（其它组织）。","type":"paragraph"},{"text":"工农兵都派代表参加。那一些可以接管，用什么形式，应经代表会研究。","type":"paragraph"},{"text":"立即放吴德同志回去，监督其工作，代表会马上准备工农兵代表会，代表会不能交给这一派，也不能交给那一派。北京市学生多比例可多一些，可搞主任，轮流主持会议。接管问题，可在会上充分讨论。","type":"paragraph"},{"text":"伯达同志传达主席一句话：凡是搞宗派主义，小团体主义，最后都搞不成的，把这个精神传给其它组织。","type":"paragraph"}],"comments":[],"origin":"1967年3月北京玻璃总厂红卫兵联络站编《中央首长讲话（1）》","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"江青","type":"人物"},{"name":"陈伯达","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a8c6e60f00"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
