<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"南平造纸厂坚持建设原料基地  文化大革命以前营造的一万多亩松树，现已成林。现在，正在进一步研究规划，部署力量，逐步发展成为一个林纸联合企业","authors":[],"dates":[{"year":1979,"month":7,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"南平造纸厂坚持建设原料基地"},{"type":"paragraph","text":"文化大革命以前营造的一万多亩松树，现已成林。现在，正在进一步研究规划，部署力量，逐步发展成为一个林纸联合企业"},{"type":"paragraph","text":"新华社福州电  福建省南平造纸厂建设造纸原料林基地，已经取得初步成绩。目前，一万六千多亩松树已经成林，其中引种的两千多亩速生的美国南方松，长得茁壮挺拔。"},{"type":"paragraph","text":"南平造纸厂是我国造纸行业中的一家重点工厂，每年要耗用二十万立方米的木材原料。为了确保造纸原料有稳定来源，这个厂从一九六三年就开始投资建设造纸原料林基地。到文化大革命以前，共营造了一万多亩马尾松。由于林彪、“四人帮”的干扰破坏，许多制度被搞乱了，这个厂造纸原料基地的建设也停了下来。粉碎“四人帮”后，厂领导加强了对林业基地的领导，在林场建立了党支部，增加了林场职工，国家也增拨了这方面的投资。今年，他们已自繁自育了五十多亩苗圃，计划造林一万五千亩。"},{"type":"paragraph","text":"南平造纸厂认真总结过去办原料林基地的经验，继续采用厂办林场、自营自管和厂社结合、合作造林两种办法。凡属国有的宜林荒山，他们就采取自己营造的办法；对属于集体所有的宜林荒山，他们则采取厂社结合、合作造林的形式。在与社队合作造林中，还具体规定了社队林场与纸厂结合，统一经营，国家投资，社队投工，山权不变，林权归厂，对口供应，收益分成等办法。这样，不但会促进林业的发展，保证纸厂长远的原料供应，而且有利于壮大社队集体经济，增加社员收入。"},{"type":"paragraph","text":"目前，南平造纸厂正在进行扩建，扩建项目投产后，新闻纸的生产能力将增加一倍，年消耗木材将达到四十多万立方米。最近，福建省林业局决定，把南平造纸厂附近的数十万亩松林和宜林地划归纸厂，作为他们的固定造纸原料基地。现在，这个厂正在进一步研究规划，部署力量，加快造纸原料基地的建设，要逐步使自己发展成为一个林纸联合企业。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"name":"福建文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"975d82d99c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
