script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"美国七万五千名码头工人坚持大罢工  罢工工人识破垄断资产阶级各种花招，团结一致共同战斗  美国垄断资产阶级因罢工损失五亿多美元，惊呼“面临着严重的危险”","authors":[],"dates":[{"year":1969,"month":1,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"美国七万五千名码头工人坚持大罢工"},{"type":"paragraph","text":"罢工工人识破垄断资产阶级各种花招，团结一致共同战斗"},{"type":"paragraph","text":"美国垄断资产阶级因罢工损失五亿多美元，惊呼“面临着严重的危险”"},{"type":"paragraph","text":"新华社二十三日讯 纽约消息：美国东海岸和墨西哥湾的七万五千名码头工人的大罢工，已经坚持了一个多月。工人们团结一致，坚持斗争，使美国垄断资产阶级遭到越来越沉重的打击。"},{"type":"paragraph","text":"美国码头工人的这次罢工是去年十二月二十日开始的。美国垄断资产阶级为了进行破坏，用尽了各种花招，包括通过美国政府施加压力，下令禁止这次罢工，但是所有花招都被码头工人识破。最近，美国垄断资产阶级用答应某些港口的工人的要求，而拒绝其他港口的工人的要求的手法，企图分化码头工人的团结，以达到破坏罢工的目的。但是码头工人又识破了这个阴谋，坚持只要有一个港口的工人的要求得不到满足，所有港口的工人决不复工，充分显示了美国工人团结战斗的精神。"},{"type":"paragraph","text":"美国码头工人的这次大罢工对美国垄断资产阶级的打击越来越沉重。目前有近四百艘船被困在从缅因州到得克萨斯州的各海港内，已使美国垄断资产阶级损失了五亿多美元。美国通讯社和资产阶级政客惊呼，这次大罢工对美国“发生了不利的影响”，使美国“面临着严重的危险”，他们纷纷要求刚刚上台的总统尼克松“竭其所能”来破坏这次大罢工。但是，美国反动派的一切阴谋诡计，只会进一步教育美国工人阶级，使他们加快地觉醒起来。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a368bd478a"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
