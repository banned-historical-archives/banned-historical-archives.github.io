<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"坚决执行林彪同志的五条指示　更好地突出政治　落实四好　加强战备","authors":["《解放军报》编辑部社论"],"dates":[{"year":1965,"month":11,"day":18}],"is_range_date":false,"parts":[{"text":"坚决执行林彪同志的五条指示  更好地突出政治  落实四好  加强战备","type":"title"},{"text":"《解放军报》编辑部社论","type":"authors"},{"text":"林彪同志在表扬海军舰艇部队十四日海战胜利的嘉奖令中，着重指出，今后部队工作应该特别强调以下五条：","type":"paragraph"},{"text":"一、更加加紧学习毛主席著作，要联系实际，在“用”字上狠下功夫；","type":"paragraph"},{"text":"二、更加加强部队的政治工作，坚持四个第一，特别是要大抓狠抓活思想；","type":"paragraph"},{"text":"三、领导要深入基层，进行面对面的领导；","type":"paragraph"},{"text":"四、大胆地提拔真正优秀的指战员，到关键性的负责岗位上；","type":"paragraph"},{"text":"五、苦练过硬的技术和近战夜战的战术。","type":"paragraph"},{"text":"这五条指示，是林彪同志根据毛主席历来的教导和我军的历史经验，对近几年来坚持四个第一、突出政治的经验，作了最好的概括；同时，又是针对当前国内外形势和我军所担负的任务提出来的。这个指示，是我军革命化、现代化建设和一切工作时依据，是进一分贯彻军委扩大会议关于加强军队政治思想工作决议的重大措施。它不仅对当前工作，有重大指导意义，而且对我军的长远建设，有不可估量的极其深远的意义。坚决执行这个指示，必将大大加强我军的政治思想工作，必将大大提高我军的战斗威力。","type":"paragraph"},{"text":"执行这五条指示，就是为了更好地突出政治，落实四好，加强战备。执行这五条指示，就是最重要的战备。搞好战备，要做多方面的工作。不同的部门，抓的重点不同，要切实把自己管的部分抓好。但是，这五条却是共同的，上上下下都要抓，各行各业都要抓，时时刻刻都要抓。只有抓好了这五条，各方面的工作才能真正搞好，战备工作才能真正落实。","type":"paragraph"},{"text":"各级党委要认真学习这五条指示，并且要组织全体干部战士进行学习，做到家喻户晓，深入人心。要按照这五条指示精神，结合四好总评，检查工作，总结经验，提出贯彻执行这五条指示的具体办法。","type":"paragraph"},{"text":"全军要坚决执行林彪同志的五条指示，更高地举起毛泽东思想的伟大红旗，更好地活学活用毛主席著作，坚持四个第一，大兴三八作风，发扬三大民主，开展四好连队运动。真正做到：把学习毛泽东思想的空气搞得浓浓的，把无产阶级的觉悟提得高高的，把士气鼓得足足的，把团结搞得好好的，把对敌人的仇恨搞得深深的。也只有把政治突出了，领导作风和工作方法才能不断改进，优秀的指战员和好人好事才能大量涌现，战术技术才能真正提高。","type":"paragraph"},{"text":"坚决执行这五条指示，就从根本上加强了战备，从根本上提高了战斗力，我们的军队就会无敌于天下。","type":"paragraph"},{"text":"（原载《解放军报》1965年11月18日）","type":"appellation"}],"comments":[],"origin":"原载《解放军报》1965年11月18日","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2fcb61f473"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
