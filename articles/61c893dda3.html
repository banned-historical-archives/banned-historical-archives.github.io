名党员联名来信的调查和处理情况的报告”的批复","authors":[],"dates":[{"year":1962,"month":10,"day":30}],"is_range_date":false,"parts":[{"text":"中国共产党陕西省委员会对“关于杨伟名等三名党员联名来信的调查和处理情况的报告”的批复","type":"title"},{"text":"咸阳地委并发户县县委：","type":"appellation"},{"text":"杨伟名等在“当前形势怀感”中所提出的主张，是严重的政治立场错误。这是农村中阶级斗争和两条道路斗争在党内的反映。对于这种反动的修正主义思想，必须及时警惕和坚决反对，决不可无动于衷，任其蔓延。地委个别负责同志甚至赞扬和支持他们，这是十分错误的。对于杨伟名等不但应指出他们的主张是完全错误的，并且要指出他们滥发信件，广为散播，在组织上也是有原则错误的，是违反党的纪律的。应由党的监委议处。如果他们确实认识了自己的错误，并能诚恳检讨，可以不给纪律处分。此复。","type":"paragraph"},{"text":" 中共陕西省委1962年10月30日","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"61c893dda3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
