<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"党的教导指航程　加倍努力攀高峰  全国科学大会代表继续分组座谈，深入学习邓副主席阐述的三个问题，决心为科技现代化甩开膀子大干","authors":[],"dates":[{"year":1978,"month":3,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"党的教导指航程　加倍努力攀高峰"},{"type":"paragraph","text":"全国科学大会代表继续分组座谈，深入学习邓副主席阐述的三个问题，决心为科技现代化甩开膀子大干"},{"type":"paragraph","text":"代表们一致认为，邓副主席的讲话，充分体现了华主席为首的党中央对科技工作的关怀，给我们树立了完整地、准确地理解毛泽东思想的榜样，必将在调动千军万马向科学技术现代化进军中产生深远影响。"},{"type":"paragraph","text":"新华社北京三月二十日电　全国科学大会二十日继续举行分组座谈，深入学习、讨论邓小平副主席的重要讲话。代表们一致认为，邓副主席的讲话精辟地论述了科学技术在社会主义现代化建设中的重大作用，科学地分析了我国科技队伍的状况，总结了我们党领导科学技术工作的历史经验。邓副主席的讲话充分体现了以华主席为首的党中央对科技工作的关怀，给我们树立了完整地、准确地理解毛泽东思想的榜样。这个讲话必将在调动千军万马向科学技术现代化进军中产生深远的影响。"},{"type":"paragraph","text":"代表们强调说，邓副主席在讲话中所阐述的科学技术是生产力的观点，具有十分重大的意义，必将产生深远的影响。中国社会科学院科研组织局负责人温济泽说，马克思和恩格斯在创立马克思主义理论的过程中，曾经花了很大精力，研究科学技术发展的历史。马克思在《资本论》中早就指出，生产力的发展，归根到底总是来源于发挥着作用的劳动的社会性质，来源于社会内部的分工，来源于智力劳动特别是自然科学的发展。科学技术是生产力，这本来是马克思早已阐明的观点，但“四人帮”肆意攻击科学技术是生产力这一观点，硬把科学技术说成是上层建筑。邓副主席的讲话，拨乱反正，把一个大是大非问题完全说透了。大寨大队和昔阳县的代表列举大量事实证明，科学技术就是生产力。大寨大队二十多年来粮食总产由二十万斤增加到近百万斤，亩产由二百四十斤上升到一千三百一十斤，都是同大寨社员群众研究和运用农业科学技术，大搞科学种田分不开的。大寨搞农田建设的劳动工具，最初是“扑篮加铁锨”，后来是“小炮（爆破）加平车”，再后来是“大炮加推土机”。工具改革一次，劳动效率就提高一步。这几年，一个冬天干的活，比过去四、五个甚至十来个冬天干的还要多。许多代表指出，确认科学技术是生产力，这就从根本上说明了科学技术的发展对于巩固社会主义制度以至将来过渡到共产主义的伟大革命作用；就能把科学技术现代化放在四个现代化的关键地位上。确认科学技术是生产力，从事科学技术工作的人当然就是劳动者，这就能调动广大科技工作者的积极性，并有利于加强工人、农民和知识分子的联盟。"},{"type":"paragraph","text":"邓副主席关于红与专的论述，在代表中引起了十分强烈的反响。许多代表激动地说，邓副主席明确提出了对红与专的正确理解和合理要求，把这个问题讲得那么实在、亲切，一下子解决了问题。过去，“四人帮”硬把“白专”、“反动权威”等等帽子套在我们头上，剥夺我们为社会主义服务、为工农兵服务的权利；邓副主席的讲话，解除了我们的思想顾虑，砸碎了加在我们身上的精神枷锁，今后我们在工作上可以甩开膀子大干，在学术上敢于钻研、敢于创新了。北京部队某团后勤处副处长叶洪海回顾自己搞发酵饲料的经历说，开始只用了六个月的时间就出了成果。后来，红与专、政治与业务的关系，被林彪、“四人帮”搞乱了，弄得人们头脑发胀，越搞越糊涂，影响了团结，影响了干劲，影响了工作。从事理论数学研究五十年的江泽涵教授说，“四人帮”横行时，好多年不准我搞研究，说我“三脱离”。现在，邓副主席把红专问题讲清楚了。今后只要注意世界观改造，站稳无产阶级立场，就可以大胆地搞业务、搞理论研究了。"},{"type":"paragraph","text":"许多代表还说，明确了红与专的标准，保证六分之五业务工作时间就成了理所当然的起码要求。中山医学院副教授吴秀荣说，“四害”横行时，搞业务、搞研究，好象是犯罪似的，现在搞科学研究，可以象工人做工、农民种田那样，理直气壮了。代表们表示，一定要精神抖擞地跟着华主席进行新的长征，不论在思想改造和科学研究方面，都要加倍努力。"},{"type":"paragraph","text":"邓副主席关于在科学技术部门中怎样实现党委领导下的分工负责制的论述，使参加大会的科技部门的领导干部们深受教育和鼓舞。他们在座谈中说，实行党委领导下的所长分工负责制，确实是重要的组织措施，既有利于加强党委的领导，又有利于充分发挥专家的作用。许多党政干部代表表示，为了发展科学事业，一定要做好后勤工作。西安交通大学党委副书记陈吾愚说，邓副主席在讲话中谈到愿意当大家的后勤部长，这对我们各级干部是很大的教育和鞭策，对心有余悸的人是很大的促进，对科技人员是很大的支持。中国科学院合肥分院党委书记白学光说，我愿意为科学事业做一个勤勤恳恳的办事员，有一分热，发一分光，把有生之年全部贡献给科学事业。"},{"type":"paragraph","text":"二十一日，大会将继续进行分组座谈。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"四人帮","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0b0fdc960a"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
