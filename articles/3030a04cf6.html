国家计划","authors":[],"dates":[{"year":1976,"month":3,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"坚持学习  深入批修  增产钢铁"},{"type":"paragraph","text":"抚顺钢厂职工在反击右倾翻案风中提前完成一、二月份国家计划"},{"type":"paragraph","text":"新华社沈阳电　伟大领袖毛主席亲自发动和领导的反击右倾翻案风的斗争，推动抚顺钢厂生产蓬勃发展。今年一、二月份，全厂提前完成了国家计划，钢和钢材的产量分别比去年同期增长百分之十三和百分之十二。同时，产品质量提高，品种增加，原材料消耗下降，还试制成功并且成批生产了四种国家急需的新产品。"},{"type":"paragraph","text":"在反击右倾翻案风的斗争中，这个厂的广大职工在厂党委领导下，认真学习马列著作和毛主席著作，学习毛主席的有关指示，紧紧抓住“三项指示为纲”这个修正主义纲领开展革命大批判。各级领导干部站在斗争的前列，工人理论队伍充分发挥骨干作用。到目前为止，全厂已经举办各种类型的学习班三十九期，召开各种类型的批判会五百九十多次，写出批判文章和大字报五千多份。广大职工把斗争的矛头直指党内那个不肯改悔的走资派，深入批判他炮制的“三项指示为纲”的修正主义纲领及其理论基础阶级斗争熄灭论和唯生产力论，揭露这个修正主义纲领否定以阶级斗争为纲，篡改党的基本路线，妄图复辟资本主义的反动实质，提高了阶级斗争和路线斗争觉悟，用更大的干劲抓革命，促生产，以实际行动回击右倾翻案风。在这场斗争中，厂的各级领导干部深入生产第一线，和工人一起学习革命理论，一起回击右倾翻案风，同时参加集体生产劳动，推动革命和生产蓬勃发展。广大党团员、工人理论队伍成员以及劳动模范、先进生产者等，在各项工作中充分发挥骨干作用。他们既是革命大批判的尖兵，又是生产的闯将。在学习无产阶级专政理论运动中诞生的“三八”炉的女炼钢工们，怀着极大的无产阶级义愤，利用业余时间集体写出了《从孔老二的“仁”、宋江的“忠义”看党内那个不肯改悔的走资派的所谓“团结”》的大字报，对全厂的革命大批判起了推动作用。她们在生产中鼓足干劲，力争上游，创造了同类炉的日产最高纪录。这个厂的第一炼钢车间，历史上钢的日产最高纪录是五百四十八吨，反击右倾翻案风的斗争大大激发了职工们的社会主义积极性，今年以来两次刷新了纪录，目前，钢的最高日产纪录已达到了七百二十三吨。"},{"type":"paragraph","text":"目前，抚顺钢厂广大职工正以“可上九天揽月，可下五洋捉鳖”的英雄气概，掀起抓革命、促生产的新热潮，决心把反击右倾翻案风的斗争进行到底，夺取新的更大的胜利。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"革命大批判","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3030a04cf6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
