year":1952,"month":3,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编辑同志:"},{"type":"paragraph","text":"对于贵报文娱简评“戏曲界究竟为谁服务?”一文，我也有同样感觉。"},{"type":"paragraph","text":"今天我们看戏，还是和过去一样的困难，许多戏剧都是高价票，我们买不起，买低价票须要排队，但因为票子极少，等排到了往往买不到(如长江、大众等剧院)。最难受的还有些售票员，看见你买低价票，就装出一副鄙视面孔，票子一抛，不许你多问一句，好像白送给你一样(如龙门剧院内一位售票员就是如此)。这种闲气曾使我一度下决心不要再看戏。真的，不但戏曲工作者把眼光放在那些看得起高价票的观众身上，连售票员也如此，那末我们广大的工人群众如何不要被关在门外呢?"},{"type":"paragraph","text":"在目前三反、五反的运动中，希望戏曲界同志清除资产阶级思想，把眼光拉回来，放在广大劳动人民身上，是我们非常盼望的。"},{"type":"paragraph","text":"读者　周瑾"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2b44baabb7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
