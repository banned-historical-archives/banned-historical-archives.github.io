r":1967,"month":2,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"希腊瑞典人民热爱毛主席著作"},{"type":"paragraph","text":"希腊去年一年出版毛主席著作单行本十六种，《毛主席语录》希腊文版最近在雅典出版"},{"type":"paragraph","text":"《毛泽东政治著作选集》瑞典文版在斯德哥尔摩出版"},{"type":"paragraph","text":"新华社十一日讯　雅典消息：《毛主席语录》希腊文版，最近在雅典出版。这本书是由雅典历史出版社出版的。"},{"type":"paragraph","text":"近年来，毛主席的许多著作已经陆续译成希腊文，在希腊出版，深受希腊人民的热烈欢迎。仅在一九六六年，希腊就出版了毛主席著作单行本十六种，其中包括：《在延安文艺座谈会上的讲话》、《论持久战》、《中国革命战争的战略问题》、《学习和时局》、《反对自由主义》、《〈共产党人〉发刊词》以及《关于纠正党内的错误思想》等。此外，雅典历史出版社还在一九六六年出版了两集《中国的社会主义文化大革命》的小册子，向希腊人民介绍中国的无产阶级文化大革命。"},{"type":"paragraph","text":"新华社斯德哥尔摩十日电　斯德哥尔摩本月初出版了一本瑞典文版的《毛泽东政治著作选集》。"},{"type":"paragraph","text":"这本选集包括毛主席的十二篇重要著作，其中有：《实践论》、《矛盾论》、《关于正确处理人民内部矛盾的问题》、《中国革命和中国共产党》、《目前形势和我们的任务》、《论人民民主专政》、《和美国记者安娜·路易斯·斯特朗的谈话》和《抗日游击战争的战略问题》等。"},{"type":"paragraph","text":"这本选集是由瑞典《马克思主义论坛》杂志的编辑布奥·古斯塔夫逊编的，由尼尔斯·霍姆伯格翻译，斯德哥尔摩的“拉本和肖格伦”出版公司出版。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"人民内部矛盾","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5052ee7786"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
