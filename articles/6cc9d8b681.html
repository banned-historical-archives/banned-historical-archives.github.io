革命的丰硕成果反击右倾翻案风，批判党内那个不肯改悔的走资派","authors":[],"dates":[{"year":1976,"month":4,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　在深入开展反击右倾翻案风、批判党内那个不肯改悔的走资派所推行的修正主义路线的斗争中，为了使广大青少年进一步受到形象化的阶级斗争和路线斗争教育，歌颂无产阶级文化大革命的伟大胜利，共青团上海市委、市红代会、市电影局决定于四月一日起在全市举行《春苗》、《决裂》、《第二个春天》、《闪闪的红星》、《青松岭》、《难忘的战斗》等六部优秀影片的汇映活动。三月三十一日上午，团市委、红代会、电影局在黄浦剧场联合召开了六部优秀影片汇映的动员大会。"},{"type":"paragraph","text":"无产阶级文化大革命以来，以革命样板戏为标志的无产阶级文艺革命取得了伟大的胜利。电影战线也同其他文艺战线一样，欣欣向荣，春色满园，涌现了《春苗》、《决裂》等许多优秀的革命影片。这些影片努力学习革命样板戏的创作经验，遵循党的基本路线，坚持以阶级斗争为纲，满腔热情地塑造了工农兵的英雄形象，歌颂了毛主席革命路线的伟大胜利。特别是《春苗》、《决裂》等影片，选择了在无产阶级专政条件下，无产阶级同党内走资派进行斗争这样一个重大题材，批判资产阶级，批判修正主义，具有现实的战斗意义，是我们当前反击右倾翻案风、批判党内那个不肯改悔的走资派的修正主义路线的有力武器。"},{"type":"paragraph","text":"大会要求各区有关单位充分运用这六部优秀影片，对广大青少年进行一次思想和政治路线的教育，并联系当前的斗争实际，认真学习毛主席的重要指示，引导广大青少年积极投入战斗，把反击右倾翻案风的斗争进行到底。"},{"type":"paragraph","text":"这次汇映将举行一个月。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6cc9d8b681"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
