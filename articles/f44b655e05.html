ical-archives/banned-historical-archives0/main/maoquanji31.pdf"],"article":{"title":"空军必须迅速组织新部队参战","alias":"","parts":[{"type":"paragraph","text":"空军必须迅速组织新部队参战！"},{"type":"paragraph","text":"（1951年11月20日）亚楼同志："},{"type":"paragraph","text":"意见很对。必须迅速组织新部队参战，越快越好。圣诞节以前，有停战的极大可能。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十一月二十日"},{"type":"paragraph","text":"[1]这是毛泽东对中国人民解放军空军司令员刘亚楼、副政治委员兼政治部主任吴法宪和参谋长王秉璋1951年11月19日17时报告的批语。"},{"type":"paragraph","text":"[2]指刘亚楼等的报告中提出的意见。报告说：根据昨天《人民日报》的消息看来，停战谈判最近可能会有头绪。我们正在设法，更加抓紧时机，尽量求得能使更多的空军部队得到实战锻炼机会，即使稍微冒一点险，也是值得的。具体的方法，就是完成了起码的作战准备工作以后，迅速投入战斗。每个部队不必打得太久，以便让出位置给别的部队去打。"}],"authors":["毛泽东"],"dates":[{"year":1951,"month":11,"day":20}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":84,"page_end":84},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f44b655e05"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
