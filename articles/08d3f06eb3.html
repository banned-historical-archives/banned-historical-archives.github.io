ical-archives/banned-historical-archives8/main/maoquanji21.pdf"],"article":{"title":"对东北军事工作和地方工作的意见","alias":"","parts":[{"type":"paragraph","text":"对东北军事工作和地方工作的意见"},{"type":"paragraph","text":"（1946年4月23日）彭真同志，并告林："},{"type":"paragraph","text":"东北局近来几次指示我都看了，都好。特别是卯皓五条指示“很好，望切实执行。速将南北主力依林彪电向四平集中，速招新兵补充前线，速组织民兵及地方部队剿匪保乡，速发动四平以北哈市以南广大群众为保卫长、哈而战，速在全满解决土地问题，放手地大量地用本地人做事。取得长、哈后，一定有许多人把眼光集中于大城市，忘记乡村，忘记艰苦工作，须再三指出纠正。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"卵漾"},{"type":"paragraph","text":"[1]指1946年4月19日中共中央东北局给各级党政军领导的指示。其主要内容为：一、除一部分干部及部队负责进行长哈齐等城市之攻取与巩固工作外，其他应在原地区加紧发动群众，进行减租减息，分配敌伪土地，深入清算运动，肃清敌伪残余，特别是迅速肃清土匪，迅速加强战时各种后方建设，加强交通运输，尤其是铁路之管理。二、各地地方武装，应大量抽出编成独立团、营，以便及时补充主力。三、除加强战区工作，开展敌后游击战争和破坏交通运输外，必须在四平以北松花江以南广大地区准备新的战场，以便大举歼灭敌人。四、应用防匪自卫的名义大量发展、组织民兵，从老部队中抽出一些下级干部和党员战士作民兵骨干。五、除个别地区外，地"}],"authors":["毛泽东"],"dates":[{"year":1946,"month":4,"day":23}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":278,"page_end":278},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"08d3f06eb3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
