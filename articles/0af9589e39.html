tes":[{"year":1986,"month":10,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"澳门各界人士怀着深切悼念之情"},{"type":"paragraph","text":"向叶剑英元帅致哀"},{"type":"paragraph","text":"据新华社澳门十月二十九日电　澳门中外人士一千三百多人今天隆重悼念叶剑英元帅。"},{"type":"paragraph","text":"叶剑英元帅灵堂设在南通银行大厦四楼的大厅里，正面挂着叶剑英元帅的巨幅遗像，上方写着“沉痛悼念叶剑英元帅”。灵堂内外及大门两侧摆满了花圈，气氛庄严肃穆。"},{"type":"paragraph","text":"上午十时至下午四时，人们络绎前来，在哀乐声中，向叶剑英元帅遗像致哀。"},{"type":"paragraph","text":"南光公司等内地驻澳机构负责人李耀祺、胡厚诚、王文彬、袁启麟、江嘉谟、宋一川、明晓光等轮流守灵。"},{"type":"paragraph","text":"前来悼念叶剑英元帅的有澳门政府秘书长李文、立法会主席宋玉生、立法会议员欧安利、澳门世界贸易中心总经理马树道，以安根浩为首的朝光公司代表团，以及澳门政府的其他官员。"},{"type":"paragraph","text":"澳门知名人士崔德祺、许士元、彭彼得、崔乐其、陶开裕、李葵、刘光谱、刘焯华、杜岚、戴成功、何贤的夫人、马万祺的亲属，以及各界的代表。"},{"type":"paragraph","text":"澳门政府秘书长李文代表澳督向南光公司负责人柯正平表示对叶剑英元帅的深切悼念。"},{"type":"paragraph","text":"南光公司等内地驻澳门机构今天下半旗向叶剑英元帅致哀。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0af9589e39"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
