art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"致电叶剑英委员长华国锋总理表示祝贺","authors":[],"parts":[{"type":"paragraph","text":"综合新华社讯 一些国家的国家元首和政府首脑陆续发来贺电，祝贺叶剑英委员长和华国锋总理分别就任人大常委会委员长和国务院总理。发来贺电的有："},{"type":"paragraph","text":"尼日尔最高军事委员会主席、国家元首孔切；贝宁人民革命党中央委员会主席、国家元首、革命军事政府首脑克雷库；摩洛哥国王哈桑二世；希腊总理卡拉曼利斯；德意志联邦共和国总理施密特；印度总理德赛；阿拉伯也门共和国指挥委员会主席兼武装部队总司令加什米；巴西总统盖泽尔；坦桑尼亚总理索科伊内；马里全国解放军事委员会主席、国家元首、政府首脑穆萨·特拉奥雷；印度共和国总统尼兰·桑吉瓦·雷迪；加拿大总理皮埃尔·埃利奥特·特鲁多；扎伊尔总统蒙博托；扎伊尔第一国务委员姆宾加·卡桑达；埃塞俄比亚临时军事行政委员会主席门格斯图；尼泊尔首相比斯塔；古巴国务委员会和部长会议主席卡斯特罗；佛得角全国人民议会议长阿比里奥·杜亚尔特；坦桑尼亚议长亚当·萨皮·姆克瓦瓦；塞拉利昂共和国总统西亚卡·史蒂文斯、总理兼住房和乡村规划部长C·A·卡马拉—太勒；也门民主人民共和国最高人民委员会常务委员会主席阿卜杜勒·法塔赫·伊斯梅尔；新西兰总督基思·霍利约克和埃及总理马姆杜·萨利姆。"}],"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"华国锋","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"03a3ebf4c1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
