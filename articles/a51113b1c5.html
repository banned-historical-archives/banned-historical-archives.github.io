发表题为《巴西事件的教训》的评论","authors":[],"dates":[{"year":1964,"month":5,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社地拉那4日电】　阿尔巴尼亚《人民之声报》最近就巴西政变发表评论说，巴西反动政变的头子是华盛顿忠实的走狗，他们的内外政策是无条件地从属于美帝国主义，为美国垄断资本家开门，取消资产阶级宪法所规定的自由，积极参加反对古巴和拉丁美洲反帝解放运动的阴谋和挑衅活动。"},{"type":"paragraph","text":"这篇题为《巴西事件的教训》的评论说，但是，拉丁美洲工人阶级和全体劳动人民从最近的巴西政变中，不仅再一次清楚地看到美帝国主义是国际宪兵；而且也清楚地看到了赫鲁晓夫现代修正主义集团及其追随者是资产阶级的奴仆，是革命事业的反对者。"},{"type":"paragraph","text":"赫鲁晓夫修正主义企图抑制人民革命的浪潮，特别是现在拉丁美洲人民反对美帝国主义和国内反动派的革命浪潮，宣传所谓“和平过渡”和“争取议会多数”的荒谬理论。"},{"type":"paragraph","text":"评论指出，特别是最近，苏联的报刊大肆散布幻想，似乎巴西革命和平发展的条件已经具备。他们甚至公然宣称古巴的革命道路不适合于巴西。但是，时间才过去不久，巴西的事件完全摧毁了修正主义的幻想，在美国主持下的巴西反革命用暴力推翻了古拉特政府。"},{"type":"paragraph","text":"评论指出，反动资产阶级为维护他们的利益，不惜采取一切手段，首先是采用反革命的暴力。巴西的例子表明，反动资产阶级不仅不允许政权落到无产阶级和劳动人民的手里，就是对古拉特这样的资产阶级政府也要使用暴力和反动的武装力量来推翻。“和平过渡”的鼓吹者和赫鲁晓夫修正主义以及反革命理论的设计者任何时候都骗不了劳动群众、工人阶级和世界人民。他们绝不能阻挡反对帝国主义的革命风暴。这种强有力的风暴不仅要扫清帝国主义者和一切反动派，而且将扫清他们忠实的走狗——革命事业的叛徒——现代修正主义者。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a51113b1c5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
