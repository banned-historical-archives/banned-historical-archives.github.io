文化大革命和社会主义建设作出更大贡献","authors":[],"dates":[{"year":1968,"month":7,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"江西超额完成夏粮征购任务"},{"type":"paragraph","text":"全省广大贫下中农自觉地多卖粮，卖好粮，力争为支援无产阶级文化大革命和社会主义建设作出更大贡献"},{"type":"paragraph","text":"新华社南昌十七日电　获得今年夏粮大丰收的江西省广大贫下中农，怀着无限忠于毛主席，无限忠于毛泽东思想，无限忠于毛主席无产阶级革命路线的无产阶级感情，踊跃向国家交售夏粮。到七月上旬，全省已经超额完成了夏粮征购任务。目前，广大贫下中农正力争交售更多的粮食，为支援无产阶级文化大革命和支援社会主义建设作出更大贡献。"},{"type":"paragraph","text":"“大海航行靠舵手，干革命靠毛泽东思想。”江西省各级革命委员会成员遵照毛主席“必须把粮食抓紧”的伟大指示，深入社队，帮助贫下中农大办毛泽东思想学习班，全面落实毛主席一系列最新指示。广大贫下中农经过学习，怀着对毛主席、对毛泽东思想、对毛主席革命路线的无限忠诚，自觉地多卖粮，卖好粮。他们说：今年夏粮丰收是毛主席“抓革命，促生产”伟大方针的胜利，是无产阶级文化大革命的丰硕成果，向国家多卖粮食，是我们忠于毛主席，忠于毛泽东思想，忠于毛主席革命路线的表现。"},{"type":"paragraph","text":"江西农村广大贫下中农在夏粮征购期间，狠抓阶级斗争，对中国赫鲁晓夫的“三自一包”、“四大自由”、“物质刺激”等反革命修正主义黑货展开了革命的大批判，提高了两个阶级、两条道路、两条路线斗争觉悟，有力地促进了夏粮征购工作。有些地方结合深入开展对敌斗争，粉碎了一小撮阶级敌人妄图破坏夏粮征购的阴谋，几天之内便胜利地超额完成了交售任务。有些县的广大贫下中农，通过开展革命的大批判，纷纷表示说：毛主席教导我们：“只有社会主义能够救中国”，我们一定听毛主席的话，坚决走社会主义康庄大道。他们高举红旗，敲锣打鼓，又快又好地超额完成了夏粮交售任务。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"江西文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"45fa7aebd8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
