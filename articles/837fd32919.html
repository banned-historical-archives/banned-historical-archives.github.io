ical-archives/banned-historical-archives8/main/maoquanji24.pdf"],"article":{"title":"同意先齐奢四军主力","alias":"","parts":[{"type":"paragraph","text":"同意先歼暂四军主力"},{"type":"paragraph","text":"（1948年4月10日）杨、罗、杨、耿，并告聂、萧、赵，中工委："},{"type":"paragraph","text":"你们主力先歼天镇附近之暂四军主力，如有可能再歼怀安之敌，是正确的。完成这些任务之后，或者向平绥”东段进击，或者向绥远协同在绥两纵歼灭三十五军，打开绥远局面，然后主力回师打平绥东段，依情况决定为适宜。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"十日十二时"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军委起草的给晋察冀野战军司令员杨得志、第一政治委员罗瑞卿、第二政治委员杨成武和参谋长耿飚的电报。"},{"type":"paragraph","text":"[2]聂、萧、赵，指聂荣臻、萧克、赵尔陆，当时分别任晋察冀军区司令员兼政治委员、副司令员和参谋长。"},{"type":"paragraph","text":"[3]平绥，即平绥路，指北平（今北京）至绥远（今属内蒙古自治区）包头的铁路，今京包线。"},{"type":"paragraph","text":"[4]绥远，旧省名，辖今内蒙古自治区中部地区，1954年撤销。"}],"authors":["毛泽东"],"dates":[{"year":1948,"month":4,"day":10}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":223,"page_end":223},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"837fd32919"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
