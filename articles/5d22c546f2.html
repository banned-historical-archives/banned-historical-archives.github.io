art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"要理直气壮地宣传毛泽东思想","authors":[],"parts":[{"type":"paragraph","text":"《陕西日报》1月28日，发表《理直气壮地宣传毛泽东思想》的评论员文章。文章指出：在清算了林彪、“四人帮”伪造、篡改、割裂马列主义、毛泽东思想的罪行以后，尽管我们又排除了两个“凡是”的困扰，重新恢复了马列主义、毛泽东思想的科学面目，一再重申它是我们行动的指南，是我们必须坚持的四项基本原则之一；可是还有极少数人，或者公然反对马列主义的基本原理，或者口头上拥护马列主义，却反对马列主义普遍原理同中国革命实践相结合而产生的毛泽东思想。也有一些人由于有种种错误认识，放松或放弃了对马列主义、毛泽东思想的学习。而我们一些同志却对此听之任之，对待毛泽东思想的宣传，不是积极主动，理直气壮，而是有气无力，放任自流。"},{"type":"paragraph","text":"文章认为，妨碍这些同志积极主动地宣传毛泽东思想的原因，主要是两条：认识片面和感情用事。"},{"type":"paragraph","text":"认识片面，表现在两个问题上。一是在批判了林彪、“四人帮”鼓吹的“精神万能”论以后，有些同志又走向另一极端，把物质利益原则的作用，夸大到了不适当的地位，忽视以至完全排除了思想、理论的巨大作用。二是把毛泽东同志的某些缺点、错误，同作为党的指导思想的毛泽东思想混为一谈。我们要坚持和当作行动指南的，是毛泽东思想的基本原理和科学体系。至于个别论断，无论马克思、列宁和毛泽东同志，都难免有失误。这些都不属于他们的基本原理所构成的科学体系。"},{"type":"paragraph","text":"感情用事也有两种表现。一是出于所谓朴素阶级感情，不肯承认毛主席和他的某些著作中有错误。这种思想僵化的情况，有待于继续克服。相反，有些同志因为毛主席有错误，或在“文化大革命”中自己挨了整，就把毛主席的错误说过头，否定毛泽东思想，不愿学习、宣传毛泽东思想，这也不是科学的态度。必须明确，毛泽东同志的功劳是第一位的，错误是第二位的。"},{"type":"paragraph","text":"文章强调，过去，我们在毛泽东思想指引下，取得了革命和建设的胜利；今天，毛泽东思想仍然是我们进行经济调整、四化建设的法宝。毛泽东思想不只是他个人的智慧，也是他的战友、党和人民的集体智慧和斗争经验的结晶。各级领导干部和宣传干部要带头学好毛泽东思想。不仅要学，而且要求学得更多些，更好些，更深些。理直气壮地宣传毛泽东思想，在四化建设的实践中坚持并不断丰富、发展毛泽东思想，是全党和全国人民的神圣职责。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"name":"四人帮","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5d22c546f2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
