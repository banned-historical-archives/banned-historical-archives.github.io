art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"张春桥的“依靠工人阶级‘左派’”析","authors":["任全良〖HH/换行〗DW：五四九一四部队"],"parts":[{"type":"paragraph","text":"工人阶级是人类历史上最进步最革命的阶级。“全心全意地依靠工人阶级”，这是取得中国革命胜利的根本的保证。可是，“四人帮”的狗头军师张春桥却胡说不能依靠整个工人阶级而“只能依靠工人阶级‘左派’”。"},{"type":"paragraph","text":"人们要问，张春桥要依靠的“工人阶级‘左派’”到底是谁呢？"},{"type":"paragraph","text":"是饱尝旧社会之苦，在毛主席、共产党领导下积极参加新民主主义革命，推翻了三座大山，又积极参加社会主义革命和社会主义建设的老工人吗？张春桥说：不是，因为“他们是既得利益者”。"},{"type":"paragraph","text":"是生在新社会，长在红旗下，对社会主义无限热爱，决心为社会主义和共产主义事业而奋斗的青年工人吗？张春桥说：也不是，因为“现在的青年工人更不行”。"},{"type":"paragraph","text":"铁人王进喜和工人队伍中的英雄模范人物总可以算是左派了吧？张春桥说：这些人“是站在保守势力一边的”。同样也不能依靠。"},{"type":"paragraph","text":"这又不是，那又不是，究竟有没有人够得上张春桥心目中的“工人阶级‘左派’”呢？当然是有的。就是翁森鹤一类新生反革命分子，陈阿大一类流氓、打砸抢者。张春桥吹捧：“翁森鹤是文化大革命中全国工人起来造反最早的”，陈阿大是“造反派的优秀代表”。除了翁森鹤、陈阿大这样的“左派”，其他人都是不能依靠的。"},{"type":"paragraph","text":"在国民党特务张春桥的眼里，左和右、革命和反革命、进步和反动是完全被颠倒了的。无产阶级队伍中的败类，阿飞、流氓、新生资产阶级分子，他认为是坚定的“左派”。真正的无产阶级左派，却被他认为是右派。从这里也反映出“四人帮”之极端孤立，证明中国整个无产阶级是站在他们的对立面的，是他们篡党夺权阴谋的坚决反对者。能够成为他们的依靠对象，为他们出力卖命的，只是翁森鹤、陈阿大等一小撮败类。"},{"type":"paragraph","text":"“四人帮”是工人阶级的凶恶敌人，却冒充为工人阶级的代表。然而，从他们“只能依靠工人阶级‘左派’”的这个反革命自白中，恰恰暴露了他们反对工人阶级的极右面目。一切反动派之所以反动，之所以必然要灭亡，就是因为他们和整个工人阶级，和百分之九十以上的人民群众相对抗。“四人帮”之必然灭亡，原因也正在这里。"}],"alias":""},"tags":[{"name":"张春桥","type":"人物"},{"name":"四人帮","type":"人物"},{"name":"夺权","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"806d87ee23"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
