art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"要闻简报","authors":[],"parts":[{"type":"paragraph","text":"李先念副总理到巴基斯坦进行友好访问"},{"type":"paragraph","text":"李先念副总理和夫人林佳楣应巴基斯坦伊斯兰共和国政府的邀请，于一月二十日到达伊斯兰堡，对巴基斯坦进行友好访问。在这之前李先念副总理访问了非洲四国。"},{"type":"paragraph","text":"二十一日上午，巴基斯坦总统齐亚·哈克前往宾馆会见李先念副总理。他代表巴基斯坦人民对李先念副总理表示热烈欢迎。李先念副总理向齐亚·哈克总统转达了华国锋主席和总理、叶剑英委员长和邓小平副总理的问候。稍后，李先念副总理回访了齐亚·哈克总统。双方还举行了会谈。"},{"type":"paragraph","text":"邓颖超副委员长会见宾努亲王"},{"type":"paragraph","text":"邓颖超副委员长一月二十日下午在家里接待前来探望的宾努亲王和夫人时表示，中国政府和中国人民对柬埔寨人民抗击越南侵略的英勇顽强革命精神给予高度评价，对于宾努亲王的爱国主义精神表示钦佩，并且坚决支持民主柬埔寨政府和人民的民族自卫战争。宾努亲王说，为了柬埔寨国家的独立和人民的利益，他决心为抗击越南的侵略而斗争，并坚信柬埔寨人民的反侵略斗争一定能取得胜利。"},{"type":"paragraph","text":"民革中央等举行春节联欢会"},{"type":"paragraph","text":"一月二十一日，中国国民党革命委员会和民革北京市委员会举行联欢会，一千四百多人欢聚一堂，喜迎新春佳节。民革中央负责人刘斐说，今年春节喜事重重，不同往年。民革成员将和全国人民一道，紧密团结在中国共产党周围，在新的一年里为四个现代化和统一祖国大业，作出自己应有的贡献。他说，在喜度春节的时候，我们更加思念隔海相望的台湾亲人。衷心希望在台湾的老朋友为统一祖国献策出力，为早日结束台湾与祖国分离的局面作出贡献，特别是希望蒋经国先生，能够以国家民族利益为重，正视现实，捐弃成见，早日商谈台湾归回祖国的问题。这是大陆同胞与台湾同胞的共同愿望，也是台湾各界人士的真正舆情。我热切盼望：明年新春佳节，能够和台湾一些老友共聚一堂，一起联欢！到会委员们即席赋诗，表达对台湾同胞的思念。 （均据新华社）"}],"alias":""},"tags":[{"name":"李先念","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f8e9713e76"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
