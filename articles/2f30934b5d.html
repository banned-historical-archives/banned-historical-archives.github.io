ical-archives/banned-historical-archives0/main/maoquanji51.pdf"],"article":{"title":"对陈毅悼词的批语","alias":"","parts":[{"type":"paragraph","text":"对陈毅悼词的批语\"!"},{"type":"paragraph","text":"（1972年1月）基本可用。删去两段。"},{"type":"paragraph","text":"二"},{"type":"paragraph","text":"前面已作了结论，后两段均可不要。功过的评论，不宜在追悼会上作。"},{"type":"paragraph","text":"[1]陈毅，原任中共中央政治局委员、国务院副总理兼外交部部长。“文化大革命”中受到错误批判。1969年4月在中共九大上当选为中央委员。1972年1月6日在北京逝世。1月8日，周恩来将对陈毅的悼词送毛泽东审阅。本篇一就写在周恩来的送审报告上。毛泽东审阅时，考虑到悼词中已有“陈毅同志是中国共产党的优秀党员，是中国人民的忠诚战士。几十年来，陈毅同志在毛主席、党中央的领导下，在长期革命战争中，在社会主义革命和社会主义建设中，坚持战斗，坚持工作，努力为人民服务”的结论，删去了其后的两段评价陈毅功过的文字，并写了一个批语，即本篇二。1月10日，陈毅追悼会在北京八宝山公墓礼堂举行，毛泽东前往参加追悼会，周恩来代表中央致悼词。毛泽东在同陈毅亲属的谈话中，对陈毅的一生作出了肯定的评价。同时还说邓小平的问题属于人民内部矛盾，为邓小平复出定了基调。"}],"authors":["毛泽东"],"dates":[{"year":1972,"month":1}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":290,"page_end":290},"tags":[{"name":"周恩来","type":"人物"},{"name":"邓小平","type":"人物"},{"name":"陈毅","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"人民内部矛盾","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2f30934b5d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
