7,"month":5,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛泽东是红太阳"},{"type":"paragraph","text":"一位尼日利亚朋友不久前写了一首诗，热情颂扬世界革命人民的伟大领袖毛泽东主席。他在诗中写道："},{"type":"paragraph","text":"毛泽东是红太阳，"},{"type":"paragraph","text":"毛泽东思想是阳光；"},{"type":"paragraph","text":"一轮红日从中国升起，"},{"type":"paragraph","text":"这轮红日就是毛泽东；"},{"type":"paragraph","text":"阳光普照，激励着一切被压迫人民，"},{"type":"paragraph","text":"这阳光就是毛泽东思想。"},{"type":"paragraph","text":"这红日不仅属于中国，"},{"type":"paragraph","text":"这阳光也不仅属于中国人民，"},{"type":"paragraph","text":"而且是世界被压迫人民的红色指路明灯。"},{"type":"paragraph","text":"那点燃中国革命的星星之火，"},{"type":"paragraph","text":"如今正在全世界燎原，"},{"type":"paragraph","text":"毛泽东思想已经传遍全世界。"},{"type":"paragraph","text":"毛泽东给劳动人民带来了幸福。"},{"type":"paragraph","text":"一年复一年，我多么渴望见到您呀！"},{"type":"paragraph","text":"虽然关山阻隔，"},{"type":"paragraph","text":"但我的心却早已飞向远方。"},{"type":"paragraph","text":"我多么渴望得到您的教益，"},{"type":"paragraph","text":"多么渴望能奔到您的身旁，"},{"type":"paragraph","text":"畅饮您智慧的甘露，"},{"type":"paragraph","text":"成为您忠诚的小学生。"},{"type":"paragraph","text":"您的思想万古长青，"},{"type":"paragraph","text":"您的著作宏伟无边。"},{"type":"paragraph","text":"毛泽东，伟大的革命巨人，"},{"type":"paragraph","text":"您把赫鲁晓夫的阴谋粉碎，"},{"type":"paragraph","text":"也把美帝吓得浑身发抖。"},{"type":"paragraph","text":"让我投到您的怀抱，"},{"type":"paragraph","text":"承受您思想的阳光的抚育，"},{"type":"paragraph","text":"然后返回非洲，"},{"type":"paragraph","text":"为您的思想的真理去宣传，"},{"type":"paragraph","text":"为您的革命的真理去传播。"},{"type":"paragraph","text":"为劳动人民，"},{"type":"paragraph","text":"我要投身于战斗。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7254385f78"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
