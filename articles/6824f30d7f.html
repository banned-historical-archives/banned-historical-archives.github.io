定","authors":[],"dates":[{"year":1961,"month":5,"day":1}],"is_range_date":false,"parts":[{"text":"中共沿河县委监委对冉崇清所犯错误的处分决定","type":"title"},{"text":"冉崇清，男，现年37岁，汉族，家庭中农成分，个人务农出身，城关公社中南省管理区人，中共党员，现任中南生产队大队长。其错误事实如下：","type":"paragraph"},{"text":"该同志于59年11月发现王家岩小队社员冉崇书和张永惠两人将自养的小黄牛杀吃，不分清是非，一律以破坏耕畜发展的恶名，将冉崇书父子两人进行吊打，由于受伤过重，第三天冉崇书就死了。","type":"paragraph"},{"text":"60年春为少数社员不爱护公共财产，而被冉崇清亲手吊打的有38户，翻箱倒柜149户。","type":"paragraph"},{"text":"综合以上错误事实，冉崇清同志所犯错误是严重的，违犯党的纪律，但念在整风运动中，本人表示愿意悔改，为此，为了严肃党纪，经县监委4月28日研究决定，党内给予留党察看一年处分。","type":"paragraph"},{"text":" 中共沿河县委监察委员会1961年5月1日","type":"paragraph"}],"comments":[],"origin":"贵州省某档案馆","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6824f30d7f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
