正主义者损害中国主权的一切企图注定要遭到彻底失败","authors":[],"dates":[{"year":1969,"month":3,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"玻利维亚共产党全国书记处发表声明"},{"type":"paragraph","text":"强烈谴责苏修对中国发动武装挑衅"},{"type":"paragraph","text":"帝国主义者和修正主义者损害中国主权的一切企图注定要遭到彻底失败"},{"type":"paragraph","text":"新华社六日讯　拉巴斯消息：玻利维亚共产党全国书记处四日发表声明，强烈谴责苏修叛徒集团悍然对中国发动武装挑衅。"},{"type":"paragraph","text":"声明指出，苏联修正主义对中华人民共和国所进行的武装挑衅“是今天控制苏联的修正主义集团的反动的、侵略性的帝国主义本性的一次赤裸裸的暴露。苏联修正主义者企图通过它的这一侵略来同美帝国主义紧密联合，来削弱中华人民共和国的力量。中华人民共和国今天已成了为反帝反修而斗争的世界各国人民的无可争辩的先锋队。修正主义者对人民中国的侵略证明了修正主义的帝国主义者的本性。这种本性在侵略捷克斯洛伐克人民的时候已经暴露出来。”"},{"type":"paragraph","text":"声明指出：玻利维亚共产党坚决谴责苏联修正主义者对中华人民共和国进行的侵略，并且表示对中国人民、中国共产党和中国政府给以真诚的声援。中国人民、中国共产党和中国政府正在毛泽东主席的指引下在中国建设社会主义，并在世界上领导反帝和反修斗争。"},{"type":"paragraph","text":"声明说：“玻利维亚共产党认为，帝国主义者和修正主义者损害中华人民共和国主权的一切企图注定要遭到彻底的失败。在毛泽东思想的旗帜下前进的中国人民将会战胜一切困难，取得最伟大的革命胜利。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a86d0c41ec"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
