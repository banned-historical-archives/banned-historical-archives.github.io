script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"英国共产党（马列）机关刊物《工人》发表文章  谴责苏联变本加厉剥削经互会其它成员国  东德同瑞典和英国发展贸易关系　匈意两国加强经济合作","authors":[],"dates":[{"year":1976,"month":11,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"英国共产党（马列）机关刊物《工人》发表文章"},{"type":"paragraph","text":"谴责苏联变本加厉剥削经互会其它成员国"},{"type":"paragraph","text":"东德同瑞典和英国发展贸易关系　匈意两国加强经济合作"},{"type":"paragraph","text":"新华社伦敦一九七六年十一月十八日电　英国共产党（马列）机关刊物《工人》最近发表的一篇题为《赶走俄国帝国主义》的文章指出，苏联的经济危机促使它变本加厉地剥削经互会的其它成员国。"},{"type":"paragraph","text":"文章指出，苏联在经互会会议上提出的长期计划，“是以曾被用作劫掠捷克斯洛伐克的借口的‘勃列日涅夫主义’的‘有限主权论’为依据的。”"},{"type":"paragraph","text":"文章说：“为期十五至二十年的‘经济一体化’计划，制订了基本建设投资和科技合作方面的协定。这个计划的目标是要把经互会成员国变成苏联经济的附庸，从而成为政治的附庸。”"},{"type":"paragraph","text":"文章说：“许多正在建设中的大型工业企业虽然是所有经互会国家联合投资的，但它们几乎都建在苏联的领土上。这样，苏联就夺走了它的邻国的基本建设投资，同时腾出它自己的资金用于军备。”"},{"type":"paragraph","text":"文章指出，苏联辩解说，这种一体化将能使经互会国家在最近的将来达到同等的经济发展水平，但是，“现实表明，情况正好相反，那些国家的经济发展和苏联的经济发展的差距越来越大”。"},{"type":"paragraph","text":"新华社柏林一九七六年十一月十九日电　据此间报纸报道，东德和瑞典十一月十七日在斯德哥尔摩签订了两国间一九七七年换货以及经济、技术和工业合作的两个议定书，强调进一步发展两国的经济、贸易关系。"},{"type":"paragraph","text":"另据报道，东德—英国政府混合委员会最近在伦敦也举行了会议，双方强调要进一步发展贸易和工业合作。"},{"type":"paragraph","text":"新华社布达佩斯一九七六年十一月十七日电　据此间报纸报道，匈牙利意大利经济混合委员会十一月十五日到十六日在布达佩斯举行第二次会议，并签订了会议的议定书。"},{"type":"paragraph","text":"会议回顾了匈意两国自第一次会议后的一年半以来经济合作的成果。迄今，两国签订了共四十项合作协定。目前，匈、意两国有关企业正在讨论五十六项新的合作倡议。"},{"type":"paragraph","text":"匈、意混合委员会要求两国企业对签订长期合作协定给予极大的关注，首先是食品工业、化学工业和医药工业方面的长期合作。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dc609a623a"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
