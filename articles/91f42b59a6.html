<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"捷共中央政治局委员　巴契列克指出南斯拉夫现代修正主义的目的 是要破坏社会主义阵营的团结","authors":[],"dates":[{"year":1958,"month":5,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【据新华社布拉格16日电】　捷克斯洛伐克共产党中央政治局委员、斯洛伐克共产党中央第一书记巴契列克，在16日在布拉迪斯拉发开幕的斯洛伐克共产党代表大会上指出，共产党人——列宁主义者尽他们最大的力量反对现代修正主义者削弱苏联领导作用的企图，反对在苏联和社会主义阵营其他国家之间制造分裂的企图。他着重指出，捷克斯洛伐克共产党已经宣称要对修正主义进行不调和的斗争。"},{"type":"paragraph","text":"巴契列克代表斯洛伐克共产党中央委员会在代表大会上作了工作报告。他着重指出，社会主义体系的现阶段已经使得苏联、捷克斯洛伐克和其他社会主义国家有可能在按人口计算的产量方面逐渐赶上和超过最发达的资本主义国家。到现在为止社会主义在世界上所取得的成就已经证实了以苏联为首的社会主义阵营的团结的重要意义。"},{"type":"paragraph","text":"巴契列克在谈到捷共对南斯拉夫共产主义者联盟第七次代表大会的结果的看法时强调说，我们党同其他共产党一样，完全有权利和义务指出，南共在原则问题上是离开了马克思列宁主义学说的，结果它就把自己排除在国际共产主义运动以外，并且在对其他兄弟党的关系上就站在完全非共产主义的立场上。"},{"type":"paragraph","text":"巴契列克说，南斯拉夫现代修正主义的目的是要分裂国际共产主义运动和破坏社会主义阵营国家的团结一致。事实证明，持有修正主义观点的南共领导人却只能看到，没有任何一个共产党或社会主义国家支持南斯拉夫的修正主义。"},{"type":"paragraph","text":"巴契列克接着说，南共的主要代表人物以怨恨的态度对待我们的批评。虽然他们摆出站在任何批评以外的姿态，可是他们不仅侵犯了批评的权利，还直接对苏联共产党和其他共产党进行诬蔑，并且在所谓工人阶级运动的“新趋向”的掩盖下传播修正主义观点。"},{"type":"paragraph","text":"捷共正在本着马克思列宁主义的精神，本着无产阶级国际主义的精神，沿着共产党和工人党莫斯科宣言所概述的道路坚定地和团结一致地向前迈进。"},{"type":"paragraph","text":"在谈到教育、科学和文化方面的问题时，巴契列克追述了在去年斯洛伐克共产党代表大会上对文艺战线上某些不健康现象所进行的批评。他说，在苏共二十次代表大会以后表现出动摇并且犯了错误的很多作家已经认识了他们的错误，并且回到了党的立场上来。但是仍然有某些作家表现动摇并且继续保持不正确的立场。巴契列克着重指出，在思想工作方面有必要进一步发展和加强人民在道义上和政治上的团结，有必要进行和完成文化、思想领域中的社会主义革命。他强调指出，必须更加具体地进行反对资产阶级民族主义残余的斗争。有必要本着社会主义爱国主义和无产阶级国际主义精神，本着捷克、斯洛伐克、匈牙利和乌克兰各民族的阶级团结的精神，用更大的力量对所有劳动人民进行正面教育。"},{"type":"paragraph","text":"【新华社布拉格17日电】　捷克斯洛伐克“红色权利报”16日为纪念捷克斯洛伐克共产党成立37周年发表的一篇文章着重指出，放弃了马克思列宁主义原则的修正主义者是资本主义向共产主义和工人阶级进行斗争中的盟友。“任何削弱党、贬低它的意义、剥夺它的先锋作用、把它降低到教育俱乐部的倾向，都是对工人阶级的敌对行为，和可耻地为资产阶级服务的背叛行为。”"},{"type":"paragraph","text":"这篇题为“修正主义者和列宁主义关于党的学说”的文章指出，在南斯拉夫共产主义者的纲领草案中，党的领导作用被限制在教育活动的范围内，并且被认为是暂时性的。文章又说，南共纲领草案甚至抛弃了共产党是无产阶级唯一的领导力量这个观念。"},{"type":"paragraph","text":"就这样，南斯拉夫共产主义者竟把共产党人和社会民主党人等量齐观，从而几乎把英国工党党员说成是布尔什维克的弟兄。"},{"type":"paragraph","text":"“红色权利报”强调指出，相信世界自发地向社会主义发展的人甚至对于持有改良主义理论的社会民主党也是十分满意的。"},{"type":"paragraph","text":"文章强调指出，只有从马克思列宁主义立场出发、目的在于加强党而进行的那种讨论和批评的自由才是有益的。文章接着写道:叛徒纳吉和他的集团的颠复性活动是修正主义分子滥用这种自由的发人深省的例子，叛徒纳吉和他的集团在匈牙利反革命事变达到顶点的时候，在修正主义的宣传下把党解散了。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"91f42b59a6"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
