的指示","authors":[],"dates":[{"year":1952,"month":2,"day":13}],"is_range_date":false,"parts":[{"text":"中共中央关于审处大贪污犯与大盗窃犯的指示","type":"title"},{"text":"各中央局，并转分局、省市区党委，并告各大军区党委：","type":"appellation"},{"text":"二月下半月至三月上半月，除大行政区在得中央批准后可以用公审方法审判一批内部的大贪污犯以外，工商界的大盗窃犯目前不忙于审处。各省市则内部的大贪污犯亦不忙于审处。至批准手续，华北局二月十日电所述应经中央和政务院总理批准，中央认为为慎重计，在头几批审判是必要的。请你们加以注意。","type":"paragraph"},{"text":" 中  央二月十三日","type":"paragraph"},{"text":"华北局关于送审贪污分子死刑案件批准手续的规定","type":"subtitle"},{"text":"内蒙古分局、各省委、京津两市委并报中央：","type":"appellation"},{"text":"最近有些省份请示召开公审大会及送审处决大贪污犯案件，准备均不充分，极显仓促，而对华北局审核时间的要求却极短促，这样很可能使上下都犯错误。为此规定：","type":"paragraph"},{"text":"（一）各省市召开公审大会、审理死刑案件，均须经过省委或市委反复讨论，各方考虑周到，一切判词、讲话准备齐全而成熟，然后由省委书记或市委书记签字送华北局审批。目前，有些单位一切都未准备好，即择定日子开会，送审案件及文件残缺不全的草率现象，应加改正。","type":"paragraph"},{"text":"（二）所有拟判死刑案件，除党内送审外，均须由省政府主席或市人民政府市长呈请政务院周总理及最高人民法院批准后执行。","type":"paragraph"},{"text":"（三）拟处决的贪污犯，当地党委和政府必须和该犯所属机关的主管负责同志事先协商，取得一致意见后，再作决定。","type":"paragraph"},{"text":"（四）大贪污分子涉及政治问题者，不管已否弄清，暂时均不处死，应放在“三反”运动后期或以后再办。在此期间，公安机关应加强工作，以便掌握更多特情，适当时期，予以打击。","type":"paragraph"},{"text":"以上四点，务望照办。","type":"appellation"},{"text":" 华北局二月十日","type":"paragraph"}],"comments":[],"origin":"根据文件的原件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2de8f7beef"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
