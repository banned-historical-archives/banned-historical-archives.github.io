tart":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"阿尔巴尼亚图片展览会在上海闭幕观众热烈赞扬阿劳动党和人民坚决反帝；反对现代修正主义","authors":[],"parts":[{"type":"paragraph","text":"新华社上海21日电 上海举办的“阿尔巴尼亚劳动党领导人民解放祖国和建设社会主义图片展览会”在今天闭幕。十四天来，共有九万五千多观众参观了展览会。  每天从早到晚，展览馆门口都可以看到观众排着长长的行列在等候入场参观。不少观众在场内来回反复观看，仔细摘录有关的文字材料。许多观众在留言处写下了观后感。他们祝阿尔巴尼亚人民在以恩·霍查为首的劳动党中央的领导下，在社会主义建设中取得更大的成就。他们对阿尔巴尼亚劳动党和人民坚决反对帝国主义、反对现代修正主义，表示热烈赞扬。一位工人写道：“展览会的一系列的事实雄辩地证明：阿尔巴尼亚劳动党是久经考验的马克思列宁主义的政党，是阿尔巴尼亚人民信赖的党，它在反对帝国主义、保卫世界和平、反对以南斯拉夫为代表的现代修正主义、保卫马克思列宁主义的纯洁性等方面，作出了巨大的贡献。”"}],"alias":""},"tags":[{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1f4f77ed04"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
