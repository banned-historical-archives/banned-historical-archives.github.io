<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"遥望天安门　浑身是力量","authors":["张跃"],"dates":[{"year":1976,"month":4,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"遥望天安门　浑身是力量"},{"type":"paragraph","text":"大连海港船舶队青年工人　张跃"},{"type":"paragraph","text":"雄伟的天安门广场，是伟大领袖毛主席庄严宣告中华人民共和国成立，亲手升起第一面五星红旗的地方，是毛主席在文化大革命中多次检阅红卫兵和革命群众的地方。可是，一小撮阶级敌人竟然在天安门广场制造反革命政治事件，丧心病狂地把矛头指向伟大领袖毛主席，指向以毛主席为首的党中央，并公开打出拥护邓小平的旗号，妄图扭转批邓和反击右倾翻案风的大方向，推出邓小平当中国的纳吉，全面复辟资本主义。这是全国人民所绝不能容忍的。我们严厉声讨这一反革命政治事件，它使我们更加看清了邓小平反革命的修正主义路线的反动实质，他所代表的是党内外资产阶级和没有改造好的地、富、反、坏、右的利益，他的问题的性质已变为对抗性矛盾。党中央撤销邓小平党内外一切职务，是非常英明，非常及时的，我们坚决拥护。"},{"type":"paragraph","text":"我是由红卫兵成长起来的青年工人。天安门广场是我想念和向往的地方。无产阶级文化大革命中，我和同学们在天安门广场受到了伟大领袖毛主席的检阅，参加了国庆观礼。每当我想起这一幸福时刻，浑身就有一股使不完的力量。有一次施工放炮，一个炮眼未炸，需要立即排除，危险很大，这时，我想起了毛主席在天安门城楼检阅红卫兵的情景，顿时觉得周身热血沸腾，勇气大增，我第一个冲上去，以最快的速度排除了哑炮，确保了施工的顺利进行。"},{"type":"paragraph","text":"人民的天安门广场绝不容许阶级敌人兴风作浪，邓小平企图扭转历史车轮只能是痴心妄想。我一定牢记毛主席关于“千万不要忘记阶级和阶级斗争”的教导，发扬当年红卫兵的革命精神，积极投入反击右倾翻案风的伟大斗争，抓革命，促生产，进一步巩固和发展文化大革命的胜利成果。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9f83717777"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
