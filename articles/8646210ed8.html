"dates":[{"year":1966,"month":9,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"读毛主席的书"},{"type":"paragraph","text":"四川达县草坝公社第七生产大队业余创作组葵花向太阳，禾苗爱雨露，毛主席的书，贫下中农最爱读。读得心里亮堂堂，读得两眼赛明珠，读得革命意志坚，读得浑身干劲足。地头读一读毛主席的书，干起活来赛猛虎；灯下读一读毛主席的书，半夜三更太阳出；困难时读一读毛主席的书，千难万难挡不住；胜利时读一读毛主席的书，再接再厉不满足。学一点，用一点，读一篇，进一步。读过一遍又一遍，人人都是顶梁柱，移山造海驱虎豹，万里春光双手铺。三大革命当闯将，锦绣江山起宏图。葵花向太阳，禾苗爱雨露，毛主席的书，贫下中农最爱读。越读心里越亮堂，毛主席咋说我咋做，活学活用进步快，革命路上迈大步。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8646210ed8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
