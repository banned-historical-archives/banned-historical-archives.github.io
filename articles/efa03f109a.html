南","孙天霖","陆铿"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"右派言论——攻击党报","type":"title"},{"text":"云南陆铿孙天霖","type":"authors"},{"text":"陆铿(云南省政协委员)","type":"paragraph"},{"text":"问题是决定编辑方针，掌握编辑方针的人，倒不一定有对读者负责的愿望。他们考虑的可能主要是“领导意图”，读者爱看固好，不爱看活该，反正领导不啃声就行了。报纸究竟是办成教科书、布告牌，还是变成人人所乐于享用的精神粮，这是上面决定的，编辑、记者只能照书执行。","type":"paragraph"},{"text":"现在只有一家大型铅印日报，在外国人看来，民主空气就很难说。办一家民间报纸和云南日报唱对台戏也未尝不可，对“百花齐放、百家争鸣”也有好处。","type":"paragraph"},{"text":"孙天霖(云南省工商联副主委)","type":"paragraph"},{"text":"……我要问一问：云南日报是否在我们工商界的阶级关系中，愿意制造和挑拨矛盾？这非常重要，决不是说“气话”。","type":"paragraph"}],"comments":[],"origin":"《社会主义辩论集之二  毒草集(资产阶级右派的反社会主义言论)》，湖南人民出版社1957年10月版，内部发行。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"efa03f109a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
