script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反对垄断资本剥削　沉重打击垄断资产阶级  美国纽约港拖船船员和旧金山市政工人坚持罢工  印第安人在美军基地前连续示威要求归还被强占的地方","authors":[],"dates":[{"year":1970,"month":3,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反对垄断资本剥削　沉重打击垄断资产阶级"},{"type":"paragraph","text":"美国纽约港拖船船员和旧金山市政工人坚持罢工"},{"type":"paragraph","text":"印第安人在美军基地前连续示威要求归还被强占的地方"},{"type":"paragraph","text":"据新华社十六日讯  华盛顿消息：美国纽约港的拖船船员和旧金山市的市政工人坚持罢工斗争，使美国垄断资产阶级受到沉重打击。"},{"type":"paragraph","text":"美国纽约港的四千名拖船船员十五日决定继续罢工，反对垄断资本的剥削，要求增加工资。这次罢工到十五日为止已达四十三天，成为纽约港持续时间最长的一次罢工。港口工人的罢工使美国垄断资本家经营的货运、客运受到严重影响，每天的损失约一百万美元。"},{"type":"paragraph","text":"与此同时，美国西海岸旧金山的市政工人从十三日开始的罢工，也在继续发展。目前卷入这次罢工的人数已达一万四千人。这次罢工得到了旧金山公共汽车工人、教员和港口工人的大力支持。罢工期间，公共汽车停驶，许多学校停课，使整个旧金山市实际上处于瘫痪状态。这次罢工的规模和影响是一九三四年旧金山工人总罢工以来最大一次。"},{"type":"paragraph","text":"据新华社十六日讯　华盛顿消息：美国印第安人最近在西雅图附近的劳顿堡和刘易斯堡两个美国军事基地前连续举行示威，强烈要求把这两处被美国军事当局强占的地方归还给印第安人。"},{"type":"paragraph","text":"八日，约一百六十名印第安人在劳顿堡基地前整天举行了示威，其中几十名印第安人不顾反动警察的镇压，当天晚上英勇地冲进了基地。与此同时，另一部分印第安人也冲进了邻近的刘易斯堡基地。"},{"type":"paragraph","text":"十五日，几十名印第安人不顾反动军队的武力威吓，在黎明时刻攀登悬岩，又一次冲进劳顿堡基地。"},{"type":"paragraph","text":"据报道，美国军事当局最近打算关闭这两处军事基地，把它们改作别用，但是坚持不把这些地方归还给印第安人。这就激起了印第安人的极大愤怒。目前美国印第安人反迫害斗争正在进一步发展。（附图片）"},{"type":"paragraph","text":"二月十二日，菲律宾工人和青年学生在马尼拉中心广场举行反美群众大会，愤怒声讨美帝国主义侵略菲律宾的滔天罪行。　新华社发"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e2b4cf9d57"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
