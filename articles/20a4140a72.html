art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"把资产阶级老爷统统打翻","authors":["战士张巨东"],"parts":[{"type":"paragraph","text":"夺权，夺权，干得好！"},{"type":"paragraph","text":"革命造反派的战友们，"},{"type":"paragraph","text":"你们敢于冲锋陷阵，"},{"type":"paragraph","text":"向走资本主义道路的当权派开战。"},{"type":"paragraph","text":"地是我们的地，"},{"type":"paragraph","text":"天是我们的天，"},{"type":"paragraph","text":"要踢开一切绊脚石，"},{"type":"paragraph","text":"把资产阶级的老爷们统统打翻！"},{"type":"paragraph","text":"对阶级敌人就是要乘胜追歼，"},{"type":"paragraph","text":"决不能让修正主义流毒自由泛滥。要夺，"},{"type":"paragraph","text":"要夺，一定要夺！"},{"type":"paragraph","text":"革命的根本问题就是政权。"},{"type":"paragraph","text":"用毛泽东思想武装起来的革命战士，"},{"type":"paragraph","text":"坚决支持无产阶级革命派，"},{"type":"paragraph","text":"毛主席亲手缔造的中国人民解放军，"},{"type":"paragraph","text":"是无产阶级革命派最有力的靠山。"},{"type":"paragraph","text":"最高指示我们铭记心间，"},{"type":"paragraph","text":"严阵以待，握紧枪杆，"},{"type":"paragraph","text":"坚决保卫无产阶级文化大革命，"},{"type":"paragraph","text":"坚决保卫毛主席的革命路线。"},{"type":"paragraph","text":"我们坚决和无产阶级革命派站在一边，"},{"type":"paragraph","text":"高举毛泽东思想伟大红旗勇往直前。"},{"type":"paragraph","text":"誓把无产阶级文化大革命进行到底，"},{"type":"paragraph","text":"永远保卫社会主义祖国红色江山。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"20a4140a72"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
