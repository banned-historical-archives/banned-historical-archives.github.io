<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共北京市委批发丰台区委关于社员自留地问题的报告的通知","authors":[],"dates":[{"year":1957,"month":11,"day":10}],"is_range_date":false,"parts":[{"text":"中共北京市委批发丰台区委关于社员自留地问题的报告的通知","type":"title"},{"text":"丰台区委关于社员自留地问题的报告中关于解决社员自留地问题的意见，是可行的。现将丰台区委的报告转发郊区各区乡党委参考。","type":"paragraph"},{"text":" 中共北京市委","type":"paragraph"},{"text":"中共北京市丰台区委关于社员自留地问题的报告","type":"subtitle"},{"text":"全区12个社共有社员16765户，73822人，耕地144179亩，每人平均土地1亩9分5厘3。全区有15293户社员（占社员总户数的91.2%）留了自留地2840.9亩，全区社员每人平均留地3厘8毫4，占社员每人平均土地的1.97%。另外，社员自己开垦耕种的房基、场院、小块荒地等共558亩9分8厘6。社员自留地和开荒地两项共计占全区农业社总耕地面积的2.358%。","type":"paragraph"},{"text":"蔬菜社自留地最多的是岳各庄红十月社，自留地占农业社耕地面积的3.3%，最少的是黄土岗社，占0.98%；大田社自留地最多的是赵辛店乡红五月社，占5.5%，最少的是卢沟桥社，仅19.5亩，占0.04%，自留地少的社，是因为社员认为社里买菜方便，出勤多收入也多，不愿多留；有的社副业收入大，分值高，买菜吃也方便，社员不愿要自留地；一些五保户、单身汉或人口少的户也不愿留地。","type":"paragraph"},{"text":"总起来看，全区各社自留地的比例是不高的。但是也有少数社员留地太多，这些户很少到社里出勤，甚至全年不出勤，靠种自留地到市场卖菜，搞自搂，也有部分社员在自留地或开荒地上种经济作物。有少数社员为搞自搂曾要求过多地留自留地，并以“不给，就退社”要挟农业社。多数社员对这种现象是不满意的。也有部分原来留地很少或没有留地的社员感到不方便，要求给一点或增加一点自留地。","type":"paragraph"},{"text":"在社会主义教育大辩论中，各社都辩论了多留自留地对不对的问题。大辩论以后有些社员自动退出了多留的自留地。看丹乡军民友谊社马厂第三小队有2户社员交出了2亩多自留地。张郭庄乡中捷友好社辛庄第一小队社员柴春和（下中农）全家5口人，留了3亩多地，不好好出勤，总支书记、社主任、队长等都曾动员他把过多的自留地交出来，他都拒绝了，在这次大辩论中，批判该队上中农李士杰和翻身忘本户申育贤以后，他主动把地交出来，表示“社里给我留多少，我就留多少”，并保证今后好好出工干活。但是在处理自留地问题上也出现过一些不妥当的做法，对自留地计算过严，以致一些本来留地不多的也要把一部分自留地退出来。个别社甚至普遍丈量自留地，把社员的宅边院地或场院等都计算在自留地内，","type":"paragraph"},{"text":"只要超过社里规定的数量，就要退回。","type":"appellation"},{"text":"为了正确地解决社员自留地问题，现在提出以下几点意见：","type":"paragraph"},{"text":"一、明确向社员讲清，自留地的用途是解决吃菜和饲料问题，自留地和零星开荒只能种菜和饲料作物，不得种植经济作物，种菜自吃有余的，应该由社统一代国营菜蔬公司收购，不能自行出售。","type":"paragraph"},{"text":"二、自留地占社员每人平均土地的比例，菜区以3%左右为宜，最高不超过5%，大田区以5%左右为宜，最高不超过10%。某些蔬菜社如果每人平均土地数量较多，劳动力又少的，自留地的数量还可以适当低些。目前社员自留地平均数量都没有超过这个指标，一般可以维持现有数量，不再变动。一部分留地过多的户，做好思想动员工作后，动员他们适当减少。留地太少的，如果本人要求增加，也可以适当增加一点。过去没有留自留地的户，如果有要求，还可以留出来，不愿留地，不勉强留。","type":"paragraph"},{"text":"三、一般的宅院内空地，数量较少，开垦种菜应该允许和提倡。如果数量较大，可以适当减少其自留地的数量。场院地应入社。已由社员开垦耕种的，如果影响本人出勤，应划出一部分归社。如果本人计划作为房基盖房，应向本人讲清，什么时间盖房，社里可随时拨给建房地皮。","type":"paragraph"},{"text":"荒地各社应主动地积极地集中开垦经营。过去社员开垦荒地数量较多，应交社经营，合作社必须种好，不得荒芜。","type":"paragraph"},{"text":"四、自留地、开垦场院和荒地交社部分的地上物一律由本主收获。但经济作物必须卖给国家，蔬菜必须交社代卖。开垦场院、荒地交社部分的用工，由社酌记工分。","type":"paragraph"},{"text":"以上意见，在大辩论中已经布置各社贯彻执行，多数社已经这样做了，有些社、队解决得还不彻底，需要根据上述精神进一步检查解决。","type":"paragraph"},{"text":"上述意见不当之处，请市委指示。","type":"paragraph"},{"text":" 1957.11.04","type":"paragraph"}],"comments":[],"origin":"根据《中共北京市委重要文件汇编》刊印。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"eb2984a015"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
