art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"集中精力深入揭批“四人帮”","authors":[],"parts":[{"type":"paragraph","text":"学好文件抓住纲，深入揭批“四人帮”，必须及时了解部队思想动向，排除各种干扰。八三二一五部队高炮连干部战士，不听、不信、不传小道消息，把时间和精力用到学好文件，揭批“四人帮”上。这种做法应该提倡。"},{"type":"paragraph","text":"树欲静而风不止。“四人帮”被粉碎，社会上的阶级敌人如丧考妣，不甘心失败。随着斗争的深入，他们采取各种方法，蛊惑人心，干扰揭批“四人帮”斗争的大方向，干扰华主席提出的抓纲治国战略决策的贯彻执行。这是值得注意的一个动向。我们要提高警惕，不给敌人以可乘之隙。"},{"type":"paragraph","text":"各级领导兵大力加强政治思想工作，向干部战士讲清楚传播小道消息的危害。要严格遵守党和国家的保密纪律，反对自由主义。要引导大家集中力量，把中央文件学深学透，把“四人帮”的评论批倒批臭，把揭批“四人帮”的斗争搞深、搞细、搞扎实，分清路线是非，提高思想觉悟，进一步搞好部队的革命化现代化建设。"}],"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9cfb1d5a9f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
