ar":1961,"month":5,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【据新华社北京1日电】　在欢乐的节日夜晚，中华人民共和国副主席董必武，中共中央副主席陈云、总书记邓小平，以及党和国家的其他领导人彭真、罗荣桓、陈毅、李富春、贺龙、乌兰夫、陆定一、康生、郭沫若等。同来自五十多个国家的贵宾们一起，在天安门城楼观看了天安门广场上的大联欢和节日焰火，共庆伟大的“五一”国际劳动节。"},{"type":"paragraph","text":"八时整，第一批礼花和焰火腾空而起，探照灯的银色光柱随之从四面八方射来，在天安门上空织成绚丽的图案。"},{"type":"paragraph","text":"随后，党和国家的领导人走到天安门城楼两侧，在团结友好的气氛中，接见了来自苏联和所有社会主义国家的各方面的贵宾，来自亚洲、非洲、拉丁美洲和世界各地的各方面的贵宾，以及各国驻中国的使节。党和国家的领导人向他们并通过他们向全世界的劳动人民致以节日的祝贺。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9e2f5aa70b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
