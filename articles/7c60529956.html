script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"祝贺伟大的十月社会主义革命三十七周年  毛泽东、周恩来致伏罗希洛夫、马林科夫、莫洛托夫电","authors":[],"dates":[{"year":1954,"month":11,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"祝贺伟大的十月社会主义革命三十七周年"},{"type":"paragraph","text":"毛泽东、周恩来致伏罗希洛夫、马林科夫、莫洛托夫电苏维埃社会主义共和国联盟最高苏维埃主席团主席伏罗希洛夫同志苏维埃社会主义共和国联盟部长会议主席马林科夫同志：苏维埃社会主义共和国联盟部长会议第一副主席兼外交部长莫洛托夫同志"},{"type":"paragraph","text":"值此伟大的十月社会主义革命三十七周年之际，我们代表中国人民和中国政府谨向你们并通过你们向伟大的苏联人民和苏联政府致以衷心的热烈的祝贺。"},{"type":"paragraph","text":"三十七年来，伟大的苏联人民在建设共产主义社会的事业中所获得的辉煌成就，对于促进人类进步和维护世界和平起了不可估量的作用。全世界进步人类为苏联人民所取得的历史性胜利而欢欣鼓舞，并把伟大苏联当作前进道路上的灯塔。"},{"type":"paragraph","text":"最近几年来，以苏联为首的全世界保卫和平的力量日益强大和发展。赞成和平共处的人越来越多。复活德国军国主义和日本军国主义的战争阴谋不断遭受德国人民、日本人民和各国人民的坚决反对。反对建立侵略性的军事集团，要求禁止原子武器、氢武器和其他大规模毁灭性武器，以及普遍裁减军备的斗争正在普遍展开。这一切使我们相信，只要各国人民将维护和平的事业担当起来，并且把这一事业坚持到底，世界和平就能够保持和巩固。"},{"type":"paragraph","text":"中苏两国的伟大同盟对促进两国的共同繁荣和维护远东与世界和平事业日益明显地发挥着极其巨大的作用。最近以赫鲁晓夫同志为首的苏联政府代表团与中国政府的会谈，标志着两国人民伟大友谊的新发展，并再一次表现了中苏八亿人民的一致愿望和共同利益。这种友谊将加速中国人民的社会主义建设和促进远东及世界和平的更加巩固。"},{"type":"paragraph","text":"伟大的苏维埃社会主义共和国联盟万岁！"},{"type":"paragraph","text":"中苏两国永恒的、牢不可破的友谊万岁！"},{"type":"paragraph","text":"中华人民共和国主席  毛泽东"},{"type":"paragraph","text":"中华人民共和国国务院总理兼外交部长　周恩来"},{"type":"paragraph","text":"一九五四年十一月六日于北京"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7c60529956"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
