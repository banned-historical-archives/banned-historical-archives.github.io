],"dates":[{"year":1975,"month":7,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京一九七五年七月二十一日电　中国人民政治协商会议第四届全国委员会常务委员、中国民主促进会中央常务委员吴研因先生因病于一九七五年七月十三日在北京逝世，终年九十岁。"},{"type":"paragraph","text":"吴研因先生的追悼会今天下午在八宝山革命公墓礼堂举行。国务院总理、政协全国委员会主席周恩来，政协全国委员会副主席叶剑英，人大常委会副委员长郭沫若、许德珩，以及政协全国委员会，中共中央统战部，教育部，国务院办公室和民进中央，向吴研因先生送了花圈。人大常委会副委员长乌兰夫、周建人，政协全国委员会副主席沈雁冰参加了追悼会。"},{"type":"paragraph","text":"追悼会由沈雁冰副主席主持，人大常委会委员、民进中央副主席杨东莼致悼词。悼词中说，吴研因先生解放前一贯从事文化教育工作，对蒋介石集团的反动统治甚为不满，对日本帝国主义侵略我国表示愤慨。解放后二十多年来，吴研因先生拥护伟大领袖毛主席，热爱社会主义祖国，关心国家大事，工作积极负责。在他的晚年，还能关心祖国的社会主义教育事业，拥护无产阶级文化大革命，积极参加批林批孔运动和无产阶级专政理论的学习。"},{"type":"paragraph","text":"参加追悼会的还有:人大常委会委员严济慈、陈此生、季方、胡愈之，政协全国委员会常务委员王芸生、孙起孟、苏子蘅、赵朴初、徐伯昕、徐楚波，有关方面负责人刘友法、童小鹏、刘皑风、李梦夫，民进中央常务委员和民进中央委员谢冰心、葛志成、张纪元、雷洁琼、严景耀、张明养、顾颉刚、王历耕、董守义，吴研因先生的生前友好董纯才、叶圣陶、林仲易、林励儒、黄鼎臣、庄明理。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"叶剑英","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"批林批孔","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"619552b10f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
