s":[{"year":1993,"month":12,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"农业部座谈毛泽东关于农村和农业思想"},{"type":"paragraph","text":"本报讯　日前，农业部举行座谈会，纪念毛泽东诞辰１００周年。"},{"type":"paragraph","text":"农业部原部长林乎加等３位同志为会议提供的纪念文章，回忆了毛泽东当年亲自主持制定《全国农业发展纲要》（即“四十条”）的过程。参加座谈的同志重温“四十条”，重新学习毛泽东同志几十年如一日地重视我国农业、农民、农村问题的思想，以及他在制定《纲要》过程中的马克思主义的领导方法，认为对现在仍具有重大指导意义。"},{"type":"paragraph","text":"座谈会向与会同志赠送了《纪念毛泽东诞辰１００周年论文集》，这些文章，回顾了毛泽东同志生前的许多重要论述和决策，反映了毛泽东同志对解决我国农民、农业、农村问题的宝贵思想和孜孜不倦的探索精神。　（刘良玉）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6001e10e77"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
