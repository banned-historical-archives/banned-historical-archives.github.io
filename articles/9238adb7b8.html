tart":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"大型文献纪录片《毛泽东》即将上映","authors":["李德润"],"parts":[{"type":"paragraph","text":"这部影片主要是由影片资料、文献资料和图片资料编辑而成的。影片以中国革命发展进程为背景，通过对第一次大革命时期、土地革命时期、抗日战争时期、解放战争时期、社会主义革命和建设时期的历史回顾，形象地描述了马克思列宁主义普遍真理和中国革命具体实践相结合的产物——毛泽东思想的形成和发展过程，生动地反映了毛泽东同志和党的其他领导人在中国革命的紧要历史关头，克服重重困难，带领中国各族人民走向胜利的光辉业绩。影片以大量事实告诉人们：毛泽东同志是我们党运用马克思列宁主义解决中国革命问题的卓越代表。毛泽东同志为我们党和中国人民军队的创立和发展，为中国各族人民解放事业的胜利，为中华人民共和国的缔造和我国社会主义事业的发展，建立了不可磨灭的功勋。他为世界被压迫民族的解放和人类的进步事业作出了重大贡献。"},{"type":"paragraph","text":"影片中不少珍贵的历史镜头，是第一次与广大观众见面。如蒋介石军队大举进攻陕甘宁边区时，毛泽东、周恩来、任弼时等中央领导同志坚持留在陕北，指挥全国解放战争的情景；毛泽东、周恩来在敌人炮声中镇定自若，最后撤离延安，探石过河的情景；1959年毛主席回到阔别三十二年的故乡韶山时，在他父母坟头献上一束野草表示游子衷情的情景；1965年毛主席重上井冈山，面对巍巍井冈，仿佛又听到那往日战斗号角的情景，等等。"},{"type":"paragraph","text":"这部影片是由中央新闻纪录电影制片摄制的。影片编辑高维进、吴均最近对记者说：“我们希望老同志通过这部影片引起回忆，重温革命斗争历史，在新的历史条件下，进一步恢复和发扬党的优良传统；希望青年人更多地了解中国革命经过的艰难曲折道路，了解毛泽东同志在中国革命事业中所起的重大作用，继承和发展毛泽东同志和其他老一辈无产阶级革命家所开创的事业。”"},{"type":"paragraph","text":"这部影片在制作过程中，得到了中共中央文献研究室、中共中央党史研究室、中国革命博物馆、中国人民革命军事博物馆等单位的热情帮助。"}],"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9238adb7b8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
