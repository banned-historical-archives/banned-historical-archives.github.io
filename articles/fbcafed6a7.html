<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"支援科学研究工作","authors":["《人民日报》社论"],"dates":[{"year":1956,"month":11,"day":16}],"is_range_date":false,"parts":[{"text":"支援科学研究工作","type":"title"},{"text":"《人民日报》社论","type":"authors"},{"text":"随着我国社会主义事业的发展，科学研究工作越来越显得重要了。我们的党和政府正在努力为科学研究工作创造必要的条件，以便实现科学发展的十二年规划，争取许多重要的急需的科学和技术部门尽快地接近世界先进水平，依靠我国本身的科学技术力量来解决工业、农业和国防建设中的重大技术问题。","type":"paragraph"},{"text":"目前，科学研究工作已经取得了许多方便条件，但是困难也还不少。在物质条件方面，许多科学部门的试验室、图书馆等都不够用；进行科学研究工作的许多设备、器材、图书、资料还不能得到充分的供给。在人力方面，科学技术工作人员还很不够，不少科学部门还缺少科学组织工作的干部和助手。这些困难在某种程度上影响了科学研究计划的执行。","type":"paragraph"},{"text":"当然，我国社会主义建设任务繁重，需用浩大，在计划以外，再抽调大量人力、物力供给科学部门是有困难的。同时，也有的抱着一种近视观点，以为科学研究是长期不见效果的工作，是可有可无可迟可早的工作。因此，有许多科学机关和高等学校提出的要求常常遭到冷遇，互相推脱，无人负责解决。例如某个研究机关为了买三袋水泥，一磅甘油，费了极大周折，尚不易到手。这种事例恐怕不是个别的，它反映了一部分人对科学工作缺乏足够的认识。这种观点必须加以纠正，必须从各个方面切实认真地注意支援科学研究工作。","type":"paragraph"},{"text":"首先必须分别轻重缓急，按照重点发展的方针，有重点地解决科学研究工作中的困难问题。科学研究工作门类很多，都有很大的用处，都需要努力发展，但由于国家财力、人力是有限的，如果平均使用力量，势必落得一事无成。因此必须抓紧那种既重要而又紧急的部分，想尽办法，满足它们的合理需要。在这里，应当肯定，某些部门将科学机构设置计划部署得过多过大，希望把十二年内应做的事都放在前几年一气完成，这是不对的。另一方面也要指出，科学研究工作中最重要而又紧急的项目，如果有条件举办而不努力举办，耽误了时间，这是极不应该的。","type":"paragraph"},{"text":"根据某一大学初步统计，该校最急需的器材和试剂就有四千多种，无论重型机器、精密仪表，以及铅丝、三角铁、猪肝、羊胆，都是他们进行研究工作所需要的。对于这些，各有关方面要切实具体地帮助他们解决，不要嫌复杂、怕麻烦。各级党政领导机关和生产、贸易部门，应当把支持科学研究工作，当作一项新的任务来进行，不仅要在思想上重视起来，而且要积极主动地配合他们进行工作。要多倾听科学工作者的呼声和意见，收集他们有益的建议，不熟悉的事情就要去学。尤其是生产、贸易部门，要认真熟悉科学部门的工作特点，照顾他们的特殊困难，灵活变通地帮助他们解决问题。科学研究工作本身具有探索性质，加之有些科学部门和科学研究项目是新建立起来的，要做什么试验，需要何种器材，有时他们自己也难以完全预计；而当他们要用的时候又往往迫不及待。同时，他们所需要的器材又往往是零星的而不是大批的。有关生产、贸易部门，针对这些特点，要主动地照顾他们，不要强求他们死板遵守供应制度。如分区供应制度，对整个国家建设来说是必要的，对大多数机关这样要求也是适当的，可是科学研究部门需要某些器材而又在当地买不到的时候，有这种器材的地区就应该特殊照顾，卖给他们。又如对外贸易部门和某些生产科学器材的企业，对一般主顾可以要求他们整批订购，而对科学研究部门就应当在可能范围内允许他们零星订购。有些零星器材，虽然生产计划上没有，但如果可能也应该为他们生产。至于原先同科学部门有协作关系的企业，有关企业领导部门要主动协助他们把这种协作关系恢复起来，必要时还可以扩大这种协作关系。","type":"paragraph"},{"text":"今后在适当时期内，国家经济机关应考虑订出一些有效的制度，彻底解决对科学部门的器材供应问题。","type":"paragraph"},{"text":"国家人事部门，也要尽可能加快调配一批科学组织工作干部和助手去充实科学研究部门。某些科学家兼职过多和社会活动过多的问题应当赶快解决。目前中央一级各科学部门，给科学家规定出固定的社会活动时间，其它时间都由科学家支配，不得侵占。这种办法可以推广。","type":"paragraph"},{"text":"科学研究机关必须清楚地了解国家人力和财力的状况，组织好自己的业务，学会精打细算，把科学事业计划纳入国家计划轨道，善于使用国家帮助，照顾国家困难，勤俭节约，使有限的人才和物资发挥最大的效能。在打破保守倾向之后，必须防止工作中可能有的百端俱举的平均主义和冒进倾向，更必须防止只花钱不办事、多花钱少办事的浪费铺张风气。必须把工作的发展计划安置在扎实可靠的基础上。我们希望我国科学家能够继承我国人民在革命战争年代里的艰苦奋斗的光荣传统，善于克服困难，和工农群众一道，在人力设备还不充分的条件下进行创造性的劳动，把工作做得更多更好。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fbcafed6a7"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
