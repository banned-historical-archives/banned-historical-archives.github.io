s":[{"year":1950,"month":3,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"欢迎毛主席周总理莫斯科中苏订约归来"},{"type":"paragraph","text":"黄炎培"},{"type":"paragraph","text":"一欢迎！欢迎！归来了。"},{"type":"paragraph","text":"这一遭，造成世界两大国家携手，"},{"type":"paragraph","text":"干杯！干杯！狂喜的克里姆林宫的酒。五星旗，交叉著，镰刀和斧头，社会主义，新民主主义，紧紧地靠拢着，一先一后，两大国人民的思潮在交流。"},{"type":"paragraph","text":"全世界人民的思潮在准备着接受。"},{"type":"paragraph","text":"一个个名词，“友好”“同盟”“互助”"},{"type":"paragraph","text":"深深地镌刻在七万万人的心头。"},{"type":"paragraph","text":"二欢迎！欢迎！归来了。"},{"type":"paragraph","text":"这一遭，一纸文书，震动了五大洲，"},{"type":"paragraph","text":"吓得帝国主义者们，好战者们一齐发抖。"},{"type":"paragraph","text":"造谣啊！眼看它丢丑。起来！起来！不愿做奴隶的人们，起来！喊破了歌喉。原子能，拿来建设了，还想把氢气弹来唬吓人，"},{"type":"paragraph","text":"呸！还不是银样蜡枪头！“苍龙缚住”了，“今日长缨在手”。"},{"type":"paragraph","text":"我们要“持久和平”"},{"type":"paragraph","text":"我们要“普遍安全”看！看！七万万人铁的拳头。（注）毛主席二万五千里长征过六盘山词里的句子"},{"type":"paragraph","text":"“今日长缨在手，何时缚住苍龙”。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b377db65de"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
