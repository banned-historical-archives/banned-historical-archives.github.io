1981,"month":11,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社北京十一月二日电　中共中央副主席邓小平今天上午会见了日本众议员、前首相福田赳夫。"},{"type":"paragraph","text":"邓小平对福田说，我们非常欢迎你来访问。你为缔结中日和平友好条约作出了贡献。中国人民是不会忘记所有为中日友好作出过努力的人士的。"},{"type":"paragraph","text":"邓小平和福田还就共同关心的问题交换了意见。邓小平介绍了中国对一些国际问题的看法。"},{"type":"paragraph","text":"邓小平在谈到关于台湾回归祖国实现祖国统一的九条建议时说，这九条建议是合情合理的，我们并不是要它投降，我们提出的是对等的谈判。福田说，他读了九条，对此表示理解和赞赏。"},{"type":"paragraph","text":"会见后，邓小平设宴款待福田赳夫一行。"},{"type":"paragraph","text":"今天下午，福田赳夫一行乘飞机离北京回国。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dc0b8be9cf"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
