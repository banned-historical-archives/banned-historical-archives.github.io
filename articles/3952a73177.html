rt":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"从极左路线的影响下解放出来旅大警备区炮团党委集中主要精力抓好教育训练，各项工作出现新的起色","authors":["李义/寇智/张海赴/姜定明/罗信"],"parts":[{"type":"paragraph","text":"本报讯 旅大警备区炮团党委贯彻三中全会精神，解放思想，注重联系部队建设的实际，肃清林彪、“四人帮”极左路线流毒影响，集中主要精力抓好教育训练。"},{"type":"paragraph","text":"从“阶级斗争为纲”的框框中解放出来，集中主要精力抓好部队中心工作。"},{"type":"paragraph","text":"从坐在屋里“谈路线、讲大事”的习惯中解放出来，深入基层抓工作、干实事。"},{"type":"paragraph","text":"从动不动就搞“斗争”的影响中解放出来，在党委内部讲友谊、讲谅解，同心同德抓部队建设。"},{"type":"paragraph","text":"党委思想解放，带来了部队工作面貌的新变化。今年以来，全团施工质量好，安全无事故；营建按标准化要求，也较好地完成了任务，受到上级的表扬；部队的作风、纪律进一步加强，各项工作都有新的起色。"},{"type":"paragraph","text":"（李义、寇智、张海赴、姜定明、罗信）"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3952a73177"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
