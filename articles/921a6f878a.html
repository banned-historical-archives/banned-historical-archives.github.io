:1997,"month":8,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"北京市居民近日偶遇一件“文革”时期景德镇生产的瓷瓶。他出于极大的好奇心，欣然将它购下。"},{"type":"paragraph","text":"此瓶高30厘米，通体施桔红色釉，器身开光处为三个工农兵人物形象，个个横眉立目，粗壮的手握着笔，正在奋笔疾书批判“封、资、修”的文章，背面书写着几个大字:“抓紧革命大批判!”图案和文字均带着强烈的时代特征。大概是又觉得观赏器总有些不合时宜，因此特意做成棒槌瓶的造型。就是说，在众多观赏性造型中特意选择了一个“硬汉”型，似乎可避“封资修”之嫌。经历过那个时代的人都知道，“文革”时期除必要的生活用品可留用外，其它凡带有观赏性和娱乐性的物品通通被视为“四旧”，喊杀声中几被砸烂无遗；无人再敢收藏。因此，此瓷瓶既有陈设观赏功能，又有动员“大批判”宣传作用，艺人的苦心孤诣和复杂心态皆融入其中了。"},{"type":"paragraph","text":"这件“文革瓷”尽管令人啼笑皆非，但它毕竟以其独特性占据了中国陶瓷史上的短暂一瞬。"},{"type":"paragraph","text":"摘自8月18日《北京晚报》　作者　肖灿"}],"comments":[],"origin":"《北京晚报》","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"921a6f878a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
