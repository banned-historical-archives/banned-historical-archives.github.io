tart":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"一切光荣归于毛主席","authors":["卢振中"],"parts":[{"type":"paragraph","text":"“支左爱民模范”李文忠同志，在某地一中军训结束时，红卫兵小将拿出心爱的日记本，叫他题词、留言。李文忠的“留言”，是送给每个红卫兵小将一条金光闪闪的毛主席语录。英雄走了，条条语录象灯塔，为红卫兵小将指引着前进的航向。"},{"type":"paragraph","text":"共产党员李从全同志，在某山村施工，每天为一瘫痪的老大娘端屎端尿，整整八个月。临走，老大娘哭着说：“谢谢你了，李同志！”李从全说：“别谢我，是毛主席他老人家教我这样做的，咱一块谢谢毛主席吧！”英雄走了，老大娘永远牢记着毛主席的恩情。"},{"type":"paragraph","text":"共产党员陈佃奎同志，在某地执行任务，和一位红小兵建立了深厚感情。分别时，红小兵向他要一张像片作纪念。陈佃奎做了一个精致的镜框，镶上毛主席的彩色照片，送给了那个红小兵。英雄走了，祖国的“花朵”永远沐浴在阳光下，“天天向上”，茁壮成长。"},{"type":"paragraph","text":"一切光荣归于毛主席！"},{"type":"paragraph","text":"英雄心中只有毛主席！"},{"type":"paragraph","text":"让我们象“支左爱民模范”李文忠和他的英雄战友那样，无限忠于毛主席，心中只有毛主席！时时、处处大树特树伟大领袖毛主席的绝对权威，大树特树伟大的毛泽东思想的绝对权威，让毛泽东思想的光辉普照全球，照亮亿万人民胜利前进的革命航道。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"军队支左","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"361f261456"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
