ear":1966,"month":5,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"邓拓是资产阶级代理人"},{"type":"paragraph","text":"长辛店机车车辆厂工人　王振淮"},{"type":"paragraph","text":"邓拓写的《伟大的空话》一文，是一株反党反社会主义的大毒草。这篇杂文一开头，就对我们伟大的党进行了恶毒的露骨的攻击。邓拓把“东风是我们的恩人，西风是我们的敌人”诬蔑为“伟大的空话”，诬蔑为“陈词滥调”。这完全是和修正主义一鼻孔出气。"},{"type":"paragraph","text":"目前，社会主义力量，特别是亚非拉人民的革命力量，正在日益压倒帝国主义和一切反动派的力量。东风压倒西风，是我们伟大的领袖毛主席对世界革命形势的著名的论断。是什么人对于东风压倒西风这个著名论断恨之入骨呢？是修正主义者，是反党分子。"},{"type":"paragraph","text":"邓拓，正因为你是资产阶级在党内的代理人，你忠心耿耿地为资产阶级服务，为地富反坏右服务，为资本主义的复辟鸣锣开道，你才反对把东风说成是恩人，把西风说成是敌人，你才把东风压倒西风这个著名的论断恨之入骨。按照你的逻辑，应该是象现代修正主义那样，来个一百八十度的大转弯，把东风当作敌人，把西风说成是恩人，这就是你的实话，你的黑话。真是什么藤儿结什么瓜，什么阶级说什么话，毒草永远成不了香花，敌人永远是敌人。我们工人是能够识别什么是香花，什么是毒草的。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"90f6740ea0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
