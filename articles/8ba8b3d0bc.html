倍，今年计划已提前完成","authors":[],"dates":[{"year":1966,"month":12,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛泽东思想武装的工人有最大创造力"},{"type":"paragraph","text":"洛阳轴承厂实现一厂顶两厂"},{"type":"paragraph","text":"生产能力超过原设计一倍，今年计划已提前完成"},{"type":"paragraph","text":"据新华社郑州电在史无前例的无产阶级文化大革命中，洛阳轴承厂广大职工活学活用毛主席著作，进一步大破洋框框，坚决走自己工业发展道路。今年，这个厂的工人拿下了一批具有六十年代先进水平的技术项目，提前超额完成了国家计划，产量、品种、质量都比去年有较大幅度的增长和提高。现在，这个厂的综合生产能力已超过原设计的一倍，实现了一厂顶两厂。"},{"type":"paragraph","text":"洛阳轴承厂今年的实践再一次有力地证明，生产靠人，人靠思想革命化，人的思想革命化靠毛泽东思想武装。有了毛泽东思想，什么困难都能战胜，什么奇迹都能创造，什么科学技术高峰都能攀登。"},{"type":"paragraph","text":"锻工车间过去用外国造的平锻机生产轴承套圈，要连续锻打两次或三次才能生产出一个锻件。资产阶级“权威”把这种设备吹嘘为世界上最先进的设备。但是工人们说，这种设备既笨重，效率又低，质量又差，满足不了生产的需要，算得什么先进！他们决定自己闯出一条锻造的新方法。在试验过程中，工人们以愚公为榜样，遇到困难，就学习毛主席的教导：“下定决心，不怕牺牲，排除万难，去争取胜利。”不断增强战胜困难的勇气和信心。他们经过数十次试验，终于在自己制造的一台压力机上，创出套锻新工艺，实现了一次锻打就可以生产出两个锻件。这台压力机可以顶上两台洋平锻机，产品质量也比平锻机生产的好。今年，这个车间实现的技术革新项目中，就有六项达到了国内外先进技术水平。"},{"type":"paragraph","text":"洛阳轴承厂的广大职工，在毛泽东思想的指引下，发扬无产阶级革命精神，今年全厂已实现大、中技术革新项目七百多项，其中有些具有六十年代先进水平。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8ba8b3d0bc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
