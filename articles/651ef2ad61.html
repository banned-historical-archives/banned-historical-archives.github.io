script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"美英资产阶级报刊  对意大利选举结果表示不安","authors":[],"dates":[{"year":1953,"month":6,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"美英资产阶级报刊"},{"type":"paragraph","text":"对意大利选举结果表示不安"},{"type":"paragraph","text":"【新华社十三日讯】美英资产阶级的一些报纸对意大利选举的结果表示失望和不安。"},{"type":"paragraph","text":"“纽约时报”记者塞·苏兹贝格从巴黎发的一条电讯中说：“欧洲的政治局面在起着变化，这种变化只能被认为对美国的政策与利益是不利的。”他说：意大利选举的结果和法国的政治危机都说明美国在冷战期间所扶持的力量“正在衰弱下去”。"},{"type":"paragraph","text":"斯克利浦斯—霍华德报纸记者沙克福指出，战后美国政府“把三十多亿美元倾入意大利”，这次选举的结果说明“战后西方在意大利的政策是失败了”。"},{"type":"paragraph","text":"纽约“世界电讯太阳报”的社论说：由于美元没有使得加斯贝利获得选举的胜利，国会应该重新考虑它对意大利的政策。"},{"type":"paragraph","text":"华盛顿“明星报”记者布朗说：加斯贝利之所以受挫，主要是由于他抱着亲美的态度。"},{"type":"paragraph","text":"英国资产阶级报纸对意大利大选的结果也表示忧虑不安。“每日电讯报”说：这次选举的结果，对意大利和整个西欧都是非常“严重”的。“曼彻斯特卫报”说，今后五年的前景是不能令人“鼓舞”的。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"651ef2ad61"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
