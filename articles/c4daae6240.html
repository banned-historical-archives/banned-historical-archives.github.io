林七十六万亩，四旁植树一亿多株","authors":[],"dates":[{"year":1967,"month":3,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"把文化大革命中焕发出来的革命干劲用到生产上"},{"type":"paragraph","text":"山东开展大规模植树造林活动"},{"type":"paragraph","text":"全省已造林七十六万亩，四旁植树一亿多株"},{"type":"paragraph","text":"据新华社济南二十七日电　山东农村广大贫下中农和革命干部热烈响应毛主席“抓革命，促生产”的伟大号召，在搞好春耕生产的同时开展大规模的春季植树造林活动，取得了很大成绩。据不完全统计，全省已造林七十六万亩，四旁植树一亿余株。"},{"type":"paragraph","text":"许多地方的广大贫下中农和革命干部，把在文化大革命中焕发出来的革命干劲，用到生产上，在林业战线上发挥了主力军的作用。临朐县蒋峪公社李子行大队，过去被党内一小撮走资本主义道路的当权派所把持，不封山，不造林，留着秃山让私人放羊，破坏了水土保持，妨碍了农业生产的发展。在这次文化大革命中，贫下中农革命派团结革命群众和革命干部，建立了林业生产班子，积极封山育林。他们冒着严寒风雪，农历正月初二就上山造林。完成任务后，又不失时机地整地育苗二十多亩。"},{"type":"paragraph","text":"一些经过“四清”运动的地方和单位的广大贫下中农和革命干部，狠狠打击了走资本主义道路的下台干部和坚持反动立场的地、富、反、坏、右分子破坏林木的罪恶活动，加强了造林和护林工作。枣庄市台儿区贺窑公社各社队都民主制订了护林公约和林业生产规划，现在已新造林一千五百亩。"},{"type":"paragraph","text":"各地“三结合”抓革命促生产第一线指挥机构，在搞好春耕生产的同时，加强了对林业生产的领导。国营林场、蚕场和果场的革命职工，一方面搞好本单位的林业生产，同时还积极主动地深入附近社队帮助植树造林。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"山东文革","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c4daae6240"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
