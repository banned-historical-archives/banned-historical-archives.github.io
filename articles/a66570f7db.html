tes":[{"year":1965,"month":3,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"一结合"},{"type":"paragraph","text":"就是学与用结合。这是最根本的一条。为了学与用结合得好，他采取了把自己“摆进”毛主席著作中去的办法，就是把自己的思想、工作和对国内外形势的看法“摆到”毛主席著作的学习中去对照、联想，用毛泽东思想来改造自己，指导行动。"},{"type":"paragraph","text":"多读"},{"type":"paragraph","text":"就是带着问题多读。多读能很好地领会文章的精神实质，以便熟练地应用。多读，他采取了通读和重点文章反复读相结合、读毛主席著作和读有关党史材料相结合等方法。"},{"type":"paragraph","text":"多想"},{"type":"paragraph","text":"就是带着问题反复联想，善于把毛主席著作和自己的思想、工作结合起来想。在阅读每篇文章时，多问几个为什么，就可以越想越深。"},{"type":"paragraph","text":"多比"},{"type":"paragraph","text":"就是用毛主席著作中的论述和各种错误思想比。要联系实际改造思想就要比，多比，是非就清，眼睛就亮，工作热情就高。"},{"type":"paragraph","text":"多用"},{"type":"paragraph","text":"毛主席教导:“精通的目的全在于应用”。运用毛主席著作，可以用一篇文章解决几个问题，也可以用几篇文章解决一个问题。"},{"type":"paragraph","text":"多记"},{"type":"paragraph","text":"就是记住毛主席著作中的一些基本观点，背诵一些重要段落，拿来当作镜子，经常照照自己，鞭策自己。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a66570f7db"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
