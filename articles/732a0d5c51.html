rt":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"重申中国坚决支持越南人民抗美战争阮明芳代理团长代表南越民族解放阵线中央向毛主席、林副主席深切感谢中国人民的大力支援，并递交了解放阵线政治纲领","authors":["齐铁砚"],"parts":[{"type":"paragraph","text":"新华社四日讯 国务院总理周恩来，今天下午接见了越南南方民族解放阵线常驻中国代表团代理团长阮明芳，同他进行了亲切友好的谈话。"},{"type":"paragraph","text":"接见时，阮明芳代理团长代表越南南方民族解放阵线中央委员会向毛主席、林彪副主席、中国党和政府表示深切的感谢，感谢中国人民对越南南方人民的大力支援。阮明芳代理团长还向周总理递交了越南南方民族解放阵线非常会议通过的解放阵线政治纲领。"},{"type":"paragraph","text":"周总理对越南南方民族解放阵线动员、团结一切可以团结的力量，参加和支持抗美救国战争，打败美国侵略者，彻底消灭和瓦解伪军，直到取得最后胜利的坚强决心，表示赞佩。"},{"type":"paragraph","text":"周总理重申，用毛泽东思想武装起来的七亿中国人民，誓做越南人民的可靠后盾；中国党和政府将一如既往地坚决支持越南人民的抗美救国战争。"},{"type":"paragraph","text":"接见时在座的有赵毅敏、韩念龙。"},{"type":"paragraph","text":"齐铁砚"},{"type":"paragraph","text":"周恩来总理和阮明芳代理团长进行亲切友好的谈话。 新华社记者 齐铁砚摄RW：周恩来；总理"}],"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"732a0d5c51"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
