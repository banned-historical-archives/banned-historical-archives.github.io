<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"毛主席派人来到川岛村——中国北京歌舞团帮助日本农民秋收并为农民演出","authors":[],"dates":[{"year":1966,"month":11,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席派人来了"},{"type":"paragraph","text":"十月下旬，东京附近各县正是收割稻谷的大忙季节。埼玉县川岛村贫农横川公太郎的稻子虽然已经黄熟，但是没有力量收割。正在这个时候，突然有三十几个男女青年出现在横川的稻田里，热情地帮助他秋收。"},{"type":"paragraph","text":"周围的农民好奇地跑来问:“这是哪里来的人?”帮助秋收的青年们亲热地告诉他们说:“我们是从北京来到日本进行访问演出的，是我们伟大领袖毛主席派来的。”"},{"type":"paragraph","text":"于是，人们奔走相告:“北京来了演员，演员们正在帮助我们秋收!是毛泽东派来的”。这个消息，飞快地传开了。"},{"type":"paragraph","text":"满怀激情挥镰割稻"},{"type":"paragraph","text":"在十月下旬一个天气晴朗的下午，北京歌舞团从东京出发，前往琦玉县川越市演出，路过川岛村。歌舞演员们利用中途休息的一个小时，访问了这里的贫农横川一家。中国的歌舞演员在同日本农民的谈话中，了解到贫农横川家不久前遭到台风的袭击，横川由于忙于修缮被风吹坏的房子，没有力量去收割已经成熟了的稻子。"},{"type":"paragraph","text":"演员们牢牢记住我们最敬爱的领袖毛主席的教导:“我们的同志不论到什么地方，都要和群众的关系搞好，要关心群众，帮助他们解决困难。”他们带着强烈的阶级感情，积极要求帮助横川秋收。"},{"type":"paragraph","text":"贫农横川怀着难以形容的激动的心情，把演员们带领到自己的稻田里。"},{"type":"paragraph","text":"镰刀不够，演员们就用手拔，四十几分钟的时间，一片稻田收拾得干干净净。"},{"type":"paragraph","text":"“我们永远忘不了你们!”"},{"type":"paragraph","text":"正在收割的时候，农民妇女们跑来向演员问好。演员把自己心爱的带有毛主席像的纪念章戴在一位农民妇女的胸前，这位农民妇女抚摸着红光闪烁的纪念章，不停地叨念着“毛泽东，毛泽东”。另一位脑前戴着天安门纪念章的日本妇女，跑到地里来找演员，一定还要一枚带有毛主席像的纪念章。"},{"type":"paragraph","text":"一位六十多岁的日本老太太激动地说，“这里从来没有来过外国人，中国人帮助我们收割更是新鲜事。我们永远忘不了你们!”"},{"type":"paragraph","text":"就地演出备受欢迎"},{"type":"paragraph","text":"演员为了加深两国人民的兄弟友谊，在村头一个空地上，为农民作了就地演出。他们用中文和日文唱了《大海航行靠舵手》，又在一阵又一阵的热烈掌声中，唱起了《毛主席的书我最爱读》《毛主席派人来》等歌曲。他们还用日文歌唱了《还我冲绳!》《木曾小调》等日本革命歌曲和民谣，每一歌，每一曲，都受到农民热烈欢迎。"},{"type":"paragraph","text":"当歌舞团离开川岛村的时候，贫农横川一家以及这个村子的男女老少都到村口热情欢送他们，并一再要求演员们再到这里来做客。　(据新华社)"},{"type":"paragraph","text":"\u003cIMG alt=请插入5号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1966\\11\\66bn040301.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e日本朋友得到中国演员赠送的《毛主席语录》后欣喜若狂，她们说:“我们一定要好好学习，把毛泽东思想作为武器，坚决进行斗争。”"},{"type":"paragraph","text":"新华社稿\u003c/FONT\u003e"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"607feca9e3"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
