script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"感谢对蒙古革命的祝贺布曼曾迪电复毛主席乔巴山元帅亦电谢周总理","authors":[],"dates":[{"year":1950,"month":8,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【中央人民电台广播】北京八日消息:毛泽东主席和周恩来总理收到蒙古人民共和国小呼拉尔主席团主席格·布曼曾迪和该国部长会议主席浩·乔巴山元帅的覆电，布曼曾迪主席和乔巴山元帅对于毛主席和周总理，电贺蒙古人民革命廿九周年纪念日表示感谢。"},{"type":"paragraph","text":"格·布曼曾迪主席给毛主席的电报说:中华人民共和国中央人民政府主席毛泽东阁下:"},{"type":"paragraph","text":"对您在蒙古人民革命廿九周年纪念日为蒙古人民更进一步的胜利的祝贺，谨向您和中国人民的友谊致以衷心谢意。"},{"type":"paragraph","text":"我代表蒙古人民和小呼拉尔主席团，以个人名义衷心地希望伟大的中国人民更进一步的胜利。"},{"type":"paragraph","text":"蒙古人民共和国小呼拉尔主席团主席格·布曼曾迪"},{"type":"paragraph","text":"一九五○年七月十日于乌兰巴特尔"},{"type":"paragraph","text":"浩·乔巴山元帅给周总理的电报说:"},{"type":"paragraph","text":"中华人民共和国中央人民政府政务院总理周恩来阁下:"},{"type":"paragraph","text":"对您在蒙古人民革命廿九周年纪念日之际为蒙古人民幸福的祝贺，谨向总理阁下致以衷心的感谢。"},{"type":"paragraph","text":"我代表蒙古人民和蒙古人民共和国政府，以个人名义衷心地希望伟大的中国人民在为彻底解放全中国及为建设自由独立的中华人民共和国斗争中更进一步地获得胜利。"},{"type":"paragraph","text":"蒙古人民共和国部长会议主席元帅浩·乔巴山"},{"type":"paragraph","text":"一九五○年七月十日于乌兰巴特尔"}],"comments":[],"origin":"中央人民电台","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"aef9a3f1c8"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
