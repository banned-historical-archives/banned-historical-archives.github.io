朋友赞扬我解放军在反帝斗争和文化大革命中的伟大贡献","authors":[],"dates":[{"year":1968,"month":8,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"热烈庆祝中国人民解放军建军四十一周年"},{"type":"paragraph","text":"我驻巴基斯坦和尼泊尔使馆举行招待会"},{"type":"paragraph","text":"巴基斯坦朋友赞扬我解放军在反帝斗争和文化大革命中的伟大贡献"},{"type":"paragraph","text":"新华社二日讯　中国驻巴基斯坦和尼泊尔大使馆武官一日晚分别在拉瓦尔品第和加德满都举行招待会，热烈庆祝中国人民解放军建军四十一周年。"},{"type":"paragraph","text":"应邀出席中国驻巴基斯坦大使馆代理武官于冈举行的招待会的有巴基斯坦国防、内政和克什米尔事务部长阿·拉·汗，巴基斯坦陆军总司令叶海亚汗和政府其他高级官员、三军军官，各界著名人士以及各国驻巴基斯坦外交使节等一百二十多位来宾。"},{"type":"paragraph","text":"在招待会上，巴基斯坦朋友热烈赞扬亲自缔造和领导中国人民解放军的伟大领袖毛主席。一位巴基斯坦朋友说，毛主席是全世界人民最伟大的领袖。一位工人称赞毛泽东思想是世界革命人民的灯塔。"},{"type":"paragraph","text":"他们热烈赞扬中国人民解放军在反帝斗争和无产阶级文化大革命中都作出了伟大贡献。"},{"type":"paragraph","text":"一位书籍出版者把毛主席著作《论持久战》的乌尔都文版单行本赠给中国大使馆临时代办和代理武官。"},{"type":"paragraph","text":"这一光辉著作的乌尔都文版本是为了庆祝中国人民解放军建军节而在这个节日前夕在巴基斯坦出版的，从一日起开始发行。"},{"type":"paragraph","text":"中国大使馆临时代办徐英和其他人员也出席了招待会。"},{"type":"paragraph","text":"招待会是在热烈友好的气氛中进行的。"},{"type":"paragraph","text":"应邀出席中国驻尼泊尔大使馆武官郭东俊举行的招待会的有尼泊尔皇家陆军总司令苏伦德拉·巴哈杜尔·沙阿、总参谋长辛哈·巴哈杜尔·巴斯尼亚特、首席法官巴格瓦蒂·普拉萨德·辛格、外事秘书雅杜·纳特·卡纳尔和其他高级官员，以及尼中友好协会会长普尔纳·巴哈杜尔和各界人士。各国驻尼泊尔外交官员也应邀出席了招待会。"},{"type":"paragraph","text":"中国大使馆临时代办屠国维和大使馆工作人员以及目前在尼泊尔各项工程中工作的中国技术人员的代表也出席了招待会。"},{"type":"paragraph","text":"出席招待会的共有一百六十多位客人。"},{"type":"paragraph","text":"招待会是在友好亲切的气氛中进行的。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ff55eed6e5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
