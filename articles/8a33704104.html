席了宴会　邓小平副总理和吴奈温总统先后在宴会上祝酒","authors":[],"dates":[{"year":1977,"month":9,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京一九七七年九月十七日电　国务院今晚举行宴会热烈欢迎缅甸联邦社会主义共和国总统兼国务委员会主席吴奈温及其随行人员。"},{"type":"paragraph","text":"国务院副总理邓小平主持今晚的宴会。"},{"type":"paragraph","text":"国务院副总理李先念、王震，人大常委会副委员长邓颖超，外交部长黄华，中国人民解放军副总参谋长李达，出席了宴会。"},{"type":"paragraph","text":"宴会在人民大会堂举行。这是一次欢乐的聚会。中缅两国朋友进行了亲戚“胞波”般的交谈，畅叙两国人民间的友好情谊。宾主频频举杯祝中缅两国人民的友谊和两国友好关系不断发展。"},{"type":"paragraph","text":"邓小平副总理和吴奈温总统先后在宴会上祝酒。邓小平副总理在祝酒时说，我们高兴地看到，近年来在我们两国政府和人民的共同努力下，我们两国的友好关系获得了新的发展。吴奈温总统对我国的每一次访问，都为加深我们之间的友谊作出了重要贡献。吴奈温总统和其他缅甸贵宾们这次停留的时间虽短，但是双方能够就各自国家的建设和发展的一些方面交流经验，互相学习，这对加深我们的相互了解，巩固我们之间的友谊具有十分重要的意义。"},{"type":"paragraph","text":"吴奈温总统在祝酒时说，每次我到中国访问，都受到无微不至的款待，这充分表明中国领导人和中国人民对缅甸人民的情谊。这次虽然我们是顺道来中国作短暂访问，但受到了华国锋主席等中国领导人体贴入微的接待，为此，我表示感谢。他祝中华人民共和国继续繁荣昌盛，祝缅中两国人民之间的友谊和两国友好关系长存。"},{"type":"paragraph","text":"缅甸驻中国大使馆外交官员应邀出席了宴会。"},{"type":"paragraph","text":"出席宴会的还有政府其他部门、对外友协、北京市革命委员会的负责人韩念龙、周化民、石林、宋养初、孙晓风、彭德清、刘向三、杜子端、华山、钱信忠、李青川、王冶秋、张瑞霭、曾涛、金照、杨骥、郑天翔等。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"李先念","type":"人物"},{"name":"王震","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8a33704104"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
