<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"华东各部局总支书记座谈会反映三反运动中干部和群众的思想情况","authors":[],"dates":[{"year":1952,"month":1,"day":5}],"is_range_date":false,"parts":[{"text":"华东各部局总支书记座谈会反映三反运动中干部和群众的思想情况","type":"title"},{"text":"【内部参考讯】华东三反运动的学习已展开，各单位都已在进行学习。华东区级各单位开始较早，华东财政部先后作了四次动员，学习已结束，进入民主检查阶段，成绩较好。但是，目前运动并不如所要求的进行得雷厉风行，相反的有很多单位首长不能层层负责，亲自动手，因此运动中热潮不高，学习不起劲，发现问题少，联系实际少，检查做了些，但不深刻，三反究竟如何反法？以后的步骤怎样？不明确。工业部反映：“三反一把抓，究竟以那个为主不晓得，不知如何动手。”","type":"paragraph"},{"text":"各单位总支书记反映目前干部、群众中的主要思想情况是：","type":"paragraph"},{"text":"(一)对运动的重大政治意义认识不够，党内外都有表现。邮电管理局有很多老干部对运动不够关心，他们说：“我们党每年要搞些名堂，一年一次，换换花样。上次因为国家经济困难搞过精简节约，今年又要来一套。”工业部有的党员说：“三反运动只是作为一年一次整风材料。”表现在对整党很重视，对整风、三反运动不够重视。","type":"paragraph"},{"text":"在党外，这种思想情况更为普遍，如新华书店有的群众对生产与节约的关系搞不清，说：“大家都讲节约，商店东西卖不出去，工厂不是要关门了？”邮电管理局的群众说：“增产节约对国家是好的，我们小职员却倒霉，增加很多困难。”","type":"paragraph"},{"text":"(二)对政策不了解，贪污与浪费的界线分不清。这种思想情况在群众中相当普遍。纺管局群众反映说：“我坦白了领导上以后是否还相信我?要是我检举了别人，是否会得罪人？如果那是个领导同志，他可能今天在运动中不调动我，以后一定要把我调走，岂不自己倒霉？”","type":"paragraph"},{"text":"(三)对必需大张旗鼓进行三反运动的认识模糊。这种思想有两种表现：一种是对贪污分子恨不起来，一种是领导上表现麻痹。如许多单位有的同志反映：(包括党员)：“贪污分子应该反对，但要杀头有些想不通。”“贪污分子抓起来只要送法院就行了，何必要大张旗鼓?”“贪污分子究竟是少数，要大家浪费这样多时间来学习、坦白、检举，是多余的。”有的机关领导上对三反运动表现了麻痹和官僚主义态度。如新华书店有一个科长竟同情已查出的一个贪污分子说：“他家穷，公家的钱反正放着不用，给他去放放利息，公家的钱亦不会少，有什么关系呢？”","type":"paragraph"},{"text":"运动开展的主要障碍是：有的领导同志对运动不重视，不能带头展开批评与自我批评。在各单位同志的发言中，都说明了领导同志重视并能虚心检查的单位，运动展开得比较顺利，如财政部曾先后作四次动员，效果就较好；否则运动就要流于形式，下面同志就会持观望态度，群众看党员怎样检查，党员又看首长怎样检查。例如华东合作总社朱则民已做过两次检查报告，第一次报告中所举贪污、浪费的事都是大家早已知道的，报告以后，干部反映说：“门只开了半边”，对领导还有怀疑。第二次又报告，内容较深刻些，干部反映说：“这还差不多，领导上真的带头了，这样，贪污分子就躲不过去了。”有的单位领导上在检查报告时往往避重就轻，强调客观原因，也影响了运动的开展。有的单位行政首长未亲自动手，还是忙于业务工作，忙于开会，把运动开展的任务交给支部和学委会。","type":"paragraph"},{"text":"党内外有些人对三反运动采取自由主义态度，认为：“我不掌握财务，又是包干制，又不做领导工作，三反运动反不到。”","type":"paragraph"},{"text":"此外，宣传工作不深入，群众未发动起来，大家对三反运动的政治意义不明确，敌我界线弄不清，对贪污分子觉得恨不起来，未形成一个“老鼠过街，人人喊打”的气氛。","type":"paragraph"},{"text":"(摘自上海解放日报一月五日“情况专页”)","type":"paragraph"}],"comments":[],"origin":"新华通讯社编《内部参考》1952年1月12日","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"58cf97e3cf"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
