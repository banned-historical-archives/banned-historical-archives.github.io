ical-archives/banned-historical-archives8/main/maoquanji11.pdf"],"article":{"title":"关于南方各地游击队整编原则的指示","alias":"","parts":[{"type":"paragraph","text":"关于南方各地游击队整编原则的指示！]"},{"type":"paragraph","text":"（1937年10月30日）博、叶："},{"type":"paragraph","text":"关于各地游击队问题："},{"type":"paragraph","text":"甲、集中五分之三，留下五分之二于原地改为保安队为原则，并坚持此原则，反对全部集中的国民党要求。"},{"type":"paragraph","text":"乙、留下五分之二，改为保安队部分，均须加以政治上整理，坚决反对投降主义，反对国民党派遣任何人，同时严防国民党之暗算，森严自己壁垒。"},{"type":"paragraph","text":"丙、集中五分之三为一军，以叶挺为军长（待考虑），项英为副军长，陈毅或刘英为参谋长，反对国民党插入任何人。"},{"type":"paragraph","text":"丁、以四个月为理清时间，任何游击队区，均须党中央派人亲自传达，然后集中。"},{"type":"paragraph","text":"戊、在何鸣部人枪没有如数交还以前，不集中。"},{"type":"paragraph","text":"己、叶挺能否为军长，待你们提出保证之后，再行决定。并告周、朱、彭、任。"},{"type":"paragraph","text":"洛毛"},{"type":"paragraph","text":"三十日[1]本文原件没有月份，月份是根据内容判定的。[2]指周恩来、朱德、彭德怀、任弼时。"}],"authors":["毛泽东"],"dates":[{"year":1937,"month":10,"day":30}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":345,"page_end":345},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5d194e1737"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
