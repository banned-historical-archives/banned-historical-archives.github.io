rt":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"奉比兰德拉国王之命拉纳大使举行盛大答谢宴会华国锋总理、阿沛·阿旺晋美副委员长等应邀出席 比兰德拉国王和华国锋总理在宴会上先后讲话","authors":[],"parts":[{"type":"paragraph","text":"新华社成都一九七六年六月四日电 奉尼泊尔国王比兰德拉·比尔·比克拉姆·沙阿·德瓦陛下之命，尼泊尔驻中国大使拉纳今天晚上在成都举行盛大答谢宴会。"},{"type":"paragraph","text":"应邀出席宴会的有："},{"type":"paragraph","text":"国务院总理华国锋，人大常委会副委员长阿沛·阿旺晋美，外交部长乔冠华、副部长韩念龙，中国驻尼泊尔大使曹痴；"},{"type":"paragraph","text":"四川省革命委员会主任赵紫阳，中国人民解放军成都部队司令员刘兴元，四川省革命委员会副主任段君毅、谢正荣、江海云，中国人民解放军四川省军区司令员胡继成，成都市革命委员会副主任崔大田、张坤等。"},{"type":"paragraph","text":"宴会厅里并排悬挂着中国国旗和尼泊尔王国国旗。比兰德拉国王陪同华国锋总理等步入宴会厅时，全场起立，热烈鼓掌。"},{"type":"paragraph","text":"在充满热烈友好气氛的宴会上，比兰德拉国王和华国锋总理先后讲话（全文见第二版）。他们在讲话中，热情称颂中尼两国人民的友谊和两国友好合作关系不断发展。"},{"type":"paragraph","text":"比兰德拉国王和华国锋总理讲话以后，乐队分别奏中国国歌和尼泊尔王国国歌。席间，乐队演奏了中尼两国乐曲。"},{"type":"paragraph","text":"随同比兰德拉国王访问的喜马拉雅·比尔·比克拉姆·沙阿亲王和夫人普林塞普·沙阿公主，巴森达拉·比尔·比克拉姆·沙阿亲王，肖芭·沙希公主，外交大臣克里希纳·拉杰·阿里亚尔，工商国务大臣哈尔卡·巴哈杜尔·古隆，肖芭公主的丈夫莫汉·巴哈杜尔·沙希驸马等，出席宴会作陪。"}],"alias":""},"tags":[{"name":"华国锋","type":"人物"},{"name":"四川文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a24f243ef6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
