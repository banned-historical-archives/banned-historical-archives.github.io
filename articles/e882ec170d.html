[{"year":1983,"month":10,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"叶剑英会见何东"},{"type":"paragraph","text":"宾主进行了友好的交谈"},{"type":"paragraph","text":"新华社北京10月20日电　中共中央政治局常委叶剑英今天上午在家里会见了英国友好人士、美国乔治敦大学董事埃里克·何东先生。"},{"type":"paragraph","text":"叶剑英曾多次会见何东，这次老朋友再次相见分外高兴。他在客厅里同何东进行了友好的交谈，并询问了他工作和生活情况。"},{"type":"paragraph","text":"何东对叶剑英说，您的一生为中国人民的革命事业建立了丰功伟绩，受到中国人民的高度爱戴和信任，我衷心祝愿您健康长寿，继续领导中国人民前进，争取更大的胜利。"},{"type":"paragraph","text":"叶剑英对此表示感谢，并同他热情握手告别。"},{"type":"paragraph","text":"对外友协会长王炳南会见时在座。（附图片）"},{"type":"paragraph","text":"叶剑英在家里会见何东。　新华社记者摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e882ec170d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
