script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"各国革命者坚决同中国人民站在一起  帝国主义修正主义阻挡不了中国前进  北京电台的许多国外听众来信支持我国反帝反修的坚定立场","authors":[],"dates":[{"year":1965,"month":11,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"各国革命者坚决同中国人民站在一起"},{"type":"paragraph","text":"帝国主义修正主义阻挡不了中国前进"},{"type":"paragraph","text":"北京电台的许多国外听众来信支持我国反帝反修的坚定立场"},{"type":"paragraph","text":"本报讯　北京电台最近收到许多国外听众的来信，赞扬我国建设成就，并表示支持我国反对美帝国主义和反对修正主义的坚定立场。"},{"type":"paragraph","text":"坦桑尼亚听众赛义夫说：坦桑尼亚人民和中国人民一样为中华人民共和国在国际事务中所采取的坚定正义的立场，特别是对于美国侵略越南所采取的立场感到特别的骄傲。毛主席有这样著名的科学论断：帝国主义和一切反动派都是纸老虎。看起来，反动派的样子是可怕的，但是实际上并没有什么了不起的力量，只不过是一只纸老虎。毛主席还说：从来没有不经打扫而自动去掉的灰尘。亲爱的毛主席使所有受到剥削和压迫的人民懂得要蔑视一切暴君，因为他们能够战胜长期压迫他们的人。他为人民彻底驱掉了幻想，号召全体人民武装起来，以各种坚决的行动而不是空洞的理想或语言来铲除压迫制度。"},{"type":"paragraph","text":"智利听众路易斯·德·瓦耶说：我百分之百地和中国站在一起，因为处在美帝国主义铁蹄下的各国人民的解放，应该通过武装斗争而不是象修正主义者赫鲁晓夫所宣扬的和平共处道路。革命从来就不是平静的，而是通过暴力来实现的。有中国的支持，世界人民将一劳永逸地从帝国主义和新老殖民主义手中解放出来。只有那些胆小鬼和机会主义者才接受莫斯科遵循的和平革命。那些勇敢、坚定和不怕武器的人才是和中国站在一起的，因为中国人民是勇敢的人民，不是胆小的白痴。"},{"type":"paragraph","text":"意大利听众基·吉阿布拉说：我总是把伟大的中国革命看作为给世世代代受着以美国为代表的世界资本主义统治的人民带来真正解放的历史时代的开始。"},{"type":"paragraph","text":"我深信：遵循正确的路线就是中国的路线即马列主义的路线，它最终必定占优势，胜利将属于正义而神圣的事业，当然这一切将完全归功于毛主席和中国人民。"},{"type":"paragraph","text":"意大利听众彼彼利·罗伯特说：你们十月一日的国庆节，是一个全中国人民庆祝帝国主义从中国领土上被驱逐出去、资本主义失败以及取而代之的共产主义制度建立的节日，我说是共产主义制度是因为在今天，必须将那些真正配得上称为共产主义国家同那些表面上是而实际上却是美帝国主义奴仆的国家区别开来。"},{"type":"paragraph","text":"西德听众爱·哈·桑特勒说：我深深地羡慕中国的光荣的建设，并对中国各方面的巨大成就感到惊异。中国有一个天才的、勇敢的领导，在世界上唯有他们懂得去实现真正的社会主义。虽然帝国主义者对他们进行各种敌对行动，苏联修正主义对他们进行诽谤，并怀着嫉妒和恶意甚至以发抖的恐惧来看待他们，但中国的领导仍然沿着笔直的大道走向光明和自由。……"},{"type":"paragraph","text":"我高兴地看到，在全世界，新中国的朋友和仰慕者越来越多，甚至在美国，愿同中国友好的呼声也越来越高。亲爱的朋友们，你们在世界上的友人比你们所设想的还要多。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9544668900"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
