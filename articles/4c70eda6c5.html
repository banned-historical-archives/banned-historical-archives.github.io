ors":[],"dates":[{"year":1955,"month":4,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"苏联代表在联合国经社理事会会议上"},{"type":"paragraph","text":"驳斥诬蔑我国实行“奴隶劳动”的谎言"},{"type":"paragraph","text":"新华社九日讯　据塔斯社纽约讯：联合国经济及社会理事会四月七日会议讨论了奴隶劳动问题。关于这个问题的特别指定的报告员是挪威代表恩根。他利用他的报告来散布对中华人民共和国的无耻的诽谤，说什么中国在实行“奴隶的劳动”。"},{"type":"paragraph","text":"苏联代表索波列夫指出，报告员的报告中包括着若干从蒋介石集团和其他可疑人物那里搞来的对于中华人民共和国的诬蔑性谎言。恩根所引述的所谓材料根本同事实不符，发表这些所谓材料应当被认为是对中华人民共和国滥施攻击。"},{"type":"paragraph","text":"鉴于中华人民共和国的代表由于美国的阻挠而未能在联合国中占有他们的合法席位，并且被剥夺了参加目前的理事会会议来为中国的利益辩护的机会，苏联驻联合国代表已经致函联合国秘书长，要求他把中华人民共和国关于保障中国人民的政治、经济权利和自由的创造性劳动的若干基本法律作为联合国的文件发表。这些法律完全驳倒了恩根的报告中所包含的诽谤。苏联代表抗议在报告中列入对于伟大的中国人民的诬蔑性谎言。理事会不应该考虑这些谎言。索波列夫强调指出，在中华人民共和国宪法中已经明文规定了目的在保障中国工人、农民和知识分子进行自由劳动的社会、经济和政治方面的一切权利。"},{"type":"paragraph","text":"苏联代表强调指出，在经济及社会理事会里讨论这种诽谤性的“材料”只会损害联合国的威信。索波列夫反对社会委员会提出的提案中给予恩根报告以肯定的评价第一点。他说，如果这一点被列入的话，那么苏联代表团将在整个提案表决时弃权。"},{"type":"paragraph","text":"经济及社会理事会各会员国的代表十分注意地听取了苏联代表的发言。值得注意的是：理事会中没有一个会员国代表出来支持恩根“报告”里的上述部分。"},{"type":"paragraph","text":"理事会通过了社会委员会提出的提案，苏联和捷克斯洛伐克代表在表决时弃权。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4c70eda6c5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
