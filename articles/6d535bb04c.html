al-archives/banned-historical-archives8/main/maoquanji2.pdf"],"article":{"title":"湘人斤张敬尧破坏和平","alias":"","parts":[{"type":"paragraph","text":"湘人尿张敬尧破坏和平"},{"type":"paragraph","text":"（1920年6月5日）各报馆各团体公鉴："},{"type":"paragraph","text":"顷湘南总司令部由广州转来艳电，称自吴师长撤防，三方签约。凡湘军采办粮秣，仍照前约履行，不得留难。宥日我军派人购米，经过防线，突被张敬尧接防军开枪轰击，伤毙我兵共计十三名，我军忍无可忍，不得不正当防御。似此爨自彼，破坏和平，应由张敬尧负责。希转告全国静候公判等语，窃张敬尧祸湘，中外咸知。今尤蓄意挑，扰乱大局，责有攸归。应请主张正谊，铲除强权，不胜迫切待命之至。"},{"type":"paragraph","text":"湖南旅沪各界联合会叩"}],"authors":["毛泽东"],"dates":[{"year":1920,"month":6,"day":5}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":213,"page_end":213},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6d535bb04c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
