<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"黄药眠访问记","authors":["北京师范大学","黄药眠"],"dates":[{"year":1957,"month":5}],"is_range_date":false,"parts":[{"text":"黄药眠访问记","type":"title"},{"text":"北京师范大学黄药眠","type":"authors"},{"text":"(黄药眠：北京师范大学中文系教授、系主任，中国民盟中央宣传部长)","type":"subtitle"},{"text":"访问记：系业务  主任不得过问，党书记  独掌阴阳乾坤","type":"subtitle"},{"text":"黄药眠主任说：","type":"paragraph"},{"text":"我并没意识到我是一个系主任，只意识到是师大一个教书人。许多事，李筠（党总支书记）不告诉我，即使说了也要掺假，其实我早已听说了，他还以为我不知道呢！结果只好是叫我做什么，我就做什么。我不明白党委负责下的一长负责制，究竟应该怎样进行？","type":"paragraph"},{"text":"比如留助教，向来有“奉父母之命”、“媒妁之言”。到时候给系主任一张名单，就算了事。当然留的大部分是党团员，光顾政治，不管业务。五二年，我提名留一个助教，但因为它同团员关系不太好，作风有点毛病，许多人就大兴问罪之师，甚至怀疑我和这个学生有什么裙带关系。","type":"paragraph"},{"text":"在何副校长乱搞男女关系这件事上，党委也是羞羞答答，对人不敢说，对党员爱护备至。但假如外人士犯了同样错误时，又该是什么态度呢？恐怕不会这样吧！党要是待己宽，责人严。是很遗憾的，因为他们是无产阶级的先锋队啊！","type":"paragraph"},{"text":"他们所以搞宗派，一来不懂业务，二来也没有政治头脑，这不是说他们马列主义念得少了，而是不了解他们的工作对象，不了解知识分子的特点。","type":"paragraph"},{"text":"肖璋副主任说：“我们师大是太小”了，这并不是说房子小，人少，而是说我们党委的魄力太小，眼光太短，对上级百依百顺，“组织性，纪律性”真强，而自己尽抓些小问题，结果是说辛苦也真辛苦，可只能做个官僚主义。","type":"paragraph"},{"text":"人家说师大老师阵容强，学生好，不错，可乱搞也不济事。今天搞研究部，明天搞函授班，——名堂不少，但这究竟为了什么？师大是干什么的？师大在五十多个兄弟院校中起什么作用？老师不明白，党委不清楚，连教育部也不敢说句肯定的话。","type":"paragraph"},{"text":"再如，党委始终不敢说，“只有搞好学术研究才能搞好教学”这句话，只是有气无力的点了一句“配合教学，开展学术研究”。这未免把老师看得太低了。谁也不会放下教学去搞什么研究！就说“配合教学”吧，如何配合也莫名其妙。直到现在学术空气还是淡淡薄薄，半死不活的毫无生气。","type":"paragraph"}],"comments":[],"origin":"原载“师大教学”120期，“苦药社”来稿。见《北师大反右资料汇编》。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"faa296331f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
