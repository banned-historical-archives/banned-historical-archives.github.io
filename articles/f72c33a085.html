"year":1955,"month":5,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"班禅堪布会议厅委员会向毛主席致敬电敬爱的毛主席："},{"type":"paragraph","text":"值此“五·二三”和平解放西藏办法的协议签订四周年，我们和僧俗人民为日益增进的幸福生活热烈庆祝之际，谨向您——中国各族人民的领袖致以崇高的敬意和衷心的祝贺。四年来，根据您的伟大的民族团结平等的政策，在中国共产党西藏工作委员会的领导帮助下，我们的各项事业都正在不断向前迈进。尤其是今年三月间，国务院第七次全体会议通过的关于成立西藏自治区筹备委员会、关于帮助西藏地方进行建设事项等决定，更给了我们西藏人民以极大的鼓舞。我们除继续巩固以往成绩和加强团结外，并以实际行动大力做好对修筑拉萨至日喀则、日喀则至江孜公路的支援工作，为彻底实现和平解放西藏办法的协议，支援解放台湾的斗争和建设祖国大家庭而奋斗！"},{"type":"paragraph","text":"西藏班禅堪布会议厅委员会谨上"},{"type":"paragraph","text":"一九五五年五月二十三日"},{"type":"paragraph","text":"藏历木羊年四月二日"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f72c33a085"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
