和日修斗争到底","authors":[],"dates":[{"year":1967,"month":6,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　正在上海进行革命串连的日本记者同盟代表团，昨天下午在上海新闻界革命造反派举行的报告会上介绍了日本革命人民、革命的新闻工作者反帝、反修斗争的宝贵经验。"},{"type":"paragraph","text":"日本记者同盟主席、代表团团长小林雄一同志，代表团副团长小泉省吾同志，都在会上作了长篇报告。他们用亲身的经历，大量的事实，充分地揭露了美日反动派勾结日共修正主义分子，疯狂进行反华的滔天罪行。他们义愤填膺地控诉了日共修正主义分子如何攻击伟大领袖毛主席、攻击光焰无际的毛泽东思想的罪行。同时他们激动地叙述了自己在战无不胜的毛泽东思想的指引下，起来革命造反的战斗历程。他们坚决表示，要同美日反动派、日共修正主义分子斗争到底。"},{"type":"paragraph","text":"日本新闻界革命造反派同志在报告中，热烈欢呼中国无产阶级文化大革命的伟大成就。一致认为，这是战无不胜的毛泽东思想的胜利。他们说:毛主席天才地、创造性地、全面地发展了马克思列宁主义，毛泽东思想是当代马克思列宁主义的最高峰，毛泽东思想是我们一切斗争的基础。敌人越攻击毛主席，我们就越热爱毛主席；敌人越攻击毛泽东思想，我们就越信仰毛泽东思想。"},{"type":"paragraph","text":"日本战友们在报告中对日本人民革命斗争的光明前途充满信心。小林雄一同志特别强调指出，正如毛主席所教导的:“尽管斗争道路是曲折的，但是日本人民的前途是光明的。中国革命经过无数次的曲折，胜利、失败、再胜利、再失败，最后的胜利属于人民。日本人民是有希望的。”他们坚决表示要听毛主席的话，活学活用毛主席著作，在毛泽东思想指导下，斗争到底，造反到底!"},{"type":"paragraph","text":"报告会自始至终洋溢着团结、战斗的气氛。日本同志们充满着无产阶级革命造反精神的讲话，不断地激起了全场热烈的掌声。大家同时高呼“全世界无产阶级革命派联合起来!”“打倒美帝!打倒苏修!打倒日共修正主义分子!”“革命无罪，造反有理!”等战斗口号。"},{"type":"paragraph","text":"上海新闻界革命造反委员会的代表在致欢迎词中热情地表示要向日本新闻界革命造反派学习，以激励我们更好地开展当前的革命大批判运动，同时在国际阶级斗争的大风大浪中，与日本同志们团结在一起，战斗在一起，胜利在一起!"},{"type":"paragraph","text":"参加昨天报告会的有上海新闻单位的革命造反派和革命职工，以及复旦大学、同济大学的革命红卫兵等。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"006b6a82dd"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
