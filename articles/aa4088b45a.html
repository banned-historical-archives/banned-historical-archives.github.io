尼上校和肖劲光副部长在充满友好气氛的宴会上祝酒","authors":[],"dates":[{"year":1973,"month":5,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"叶剑英副主席会见阿尔及利亚军事代表团"},{"type":"paragraph","text":"穆罕默德·泽尔吉尼团长举行答谢宴会"},{"type":"paragraph","text":"泽尔吉尼上校和肖劲光副部长在充满友好气氛的宴会上祝酒"},{"type":"paragraph","text":"新华社一九七三年五月三十一日讯　中央军委副主席叶剑英，今天晚上会见了阿尔及利亚第三军区司令穆罕默德·泽尔吉尼上校和由他率领的阿尔及利亚民主人民共和国军事代表团全体成员，同他们进行了亲切友好的谈话。"},{"type":"paragraph","text":"阿尔及利亚驻中国大使馆临时代办阿裴德参加了会见。"},{"type":"paragraph","text":"参加会见的还有我国国防部副部长肖劲光，外交部副部长何英，中国人民解放军副总参谋长彭绍辉，有关方面负责人路奎、汪普庆、赵春正、施之源等。"},{"type":"paragraph","text":"新华社一九七三年五月三十一日讯　阿尔及利亚民主人民共和国军事代表团团长、第三军区司令穆罕默德·泽尔吉尼上校，今天晚上举行答谢宴会。"},{"type":"paragraph","text":"应邀出席宴会的有，国防部副部长肖劲光，外交部副部长何英，中国人民解放军副总参谋长彭绍辉、总后勤部副部长张贤约、海军副司令员刘道生、空军副司令员成钧、军事科学院副院长高体乾、北京部队副司令员康林，有关方面负责人于步血、石侠、靳玉峰、栗光祥、路奎、赵春正、王海、汪普庆、胡为新等。"},{"type":"paragraph","text":"阿尔及利亚军事代表团的其他成员，阿尔及利亚驻中国大使馆临时代办阿裴德，出席了宴会。"},{"type":"paragraph","text":"在充满友好气氛的宴会上，泽尔吉尼上校和肖劲光副部长先后祝酒。"},{"type":"paragraph","text":"泽尔吉尼上校在祝酒时说，在我们逗留在你们国家的日子里，中国人民所取得的巨大成就以及在社会和经济方面的进步，给我们留下了非常深刻的印象。在毛泽东主席的英明领导下，中国人民已把社会主义的理论和原则变成了具体的现实。他说，我们的访问将为加强阿中两国人民和军队之间的战斗友谊，为进一步加强两国之间的合作关系作出新的贡献。"},{"type":"paragraph","text":"肖劲光副部长在祝酒时指出，当前非洲的形势一片大好。最近召开的第十届非洲国家首脑会议，再一次显示了非洲人民的战斗团结和他们决心在非洲彻底铲除殖民主义、种族主义的坚强意志。他说，当前，我们面临着反对超级大国的霸权主义和强权政治，保卫和建设我们各自国家的共同斗争。阿尔及利亚朋友们可以相信，在你们反帝、反殖，维护民族独立和建设自己祖国的正义斗争中，中国人民将永远是你们忠实可靠的战友。（附图片）"},{"type":"paragraph","text":"中央军委副主席叶剑英会见由穆罕默德·泽尔吉尼上校率领的阿尔及利亚民主人民共和国军事代表团全体成员。  新华社记者摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"aa4088b45a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
