script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"妄图取消党的领导　要党对修正主义投降  安徽文联反党集团阴谋败露","authors":[],"dates":[{"year":1957,"month":7,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"妄图取消党的领导　要党对修正主义投降"},{"type":"paragraph","text":"安徽文联反党集团阴谋败露"},{"type":"paragraph","text":"本报讯　安徽省文艺界在反右派斗争中，揭露了省文联的右派反党集团。这个集团的核心分子是文联党组委员王影，“江淮文学”副主编、文联党组委员石青和“江淮文学”编辑部副主任、共产党员钱锋。文联主席、文联党组书记戴岳则在幕后进行指挥。"},{"type":"paragraph","text":"王影、石青、钱锋等党内的右派分子同一些党外的右派分子勾结起来，利用“百花齐放、百家争鸣”的口号，反对党对文艺事业的领导。他们的主要论点有五个：一、党能领导文艺事业也不能领导文艺事业。二、在贯彻“鸣”、“放”方针时不需要党的领导。三、反对文艺刊物编辑部在工作中的“心中有数”。四、主张办“同人刊物”，从而摆脱党的领导。五、反对对毒草进行批评。"},{"type":"paragraph","text":"在王影等人的把持下，“江淮文学”从3月份起一直向右转，发表不少有毒的作品。安徽日报对这些作品提出批评，他们就向安徽日报和省委展开猖狂的进攻。他们诬指批评者是宗派主义和教条主义，反对安徽省委关于这次批评问题的结论。他们不仅以“江淮文学”为阵地，向批评者和党发出了许多暗箭，而且密谋印发材料，分送中央和友邻省、市，破坏省委威信；到处散播谬论，诽谤省委在贯彻“鸣”“放”方针方面是中央的反对派；利用省委宣传工作会议的讲坛，企图推翻省委的上述结论。石青承认，他们的“最低纲领”，是要党接受他们的修正主义，向他们来检讨认错。"},{"type":"paragraph","text":"在广大群众的揭露和批驳下，现在这一右派反党集团中有人开始作出交代，有人还拒不检查交代，斗争正在继续开展。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d8035ee40a"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
