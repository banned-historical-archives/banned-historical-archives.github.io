art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"首都隆重举行朱蕴山同志追悼会中共中央、人大常委会、国务院、全国政协送了花圈 邓小平、彭真、邓颖超、胡耀邦同志参加追悼会并送了花圈","authors":[],"parts":[{"type":"paragraph","text":"据新华社五月十一日讯 中国共产党的亲密朋友、第五届全国人民代表大会常务委员会副委员长、中国国民党革命委员会主席朱蕴山同志追悼会，今天下午在人民大会堂西大厅隆重举行。党和国家领导人以及首都各界人士八百多人，沉痛悼念这位革命的坚强战士和政治活动家，不断追求进步的爱国的革命老人。"},{"type":"paragraph","text":"庄严肃穆的追悼会会场里，悬挂着朱蕴山同志的遗像，安放着朱蕴山同志的骨灰盒。"},{"type":"paragraph","text":"中国共产党中央委员会、全国人民代表大会常务委员会、国务院、政协全国委员会送了花圈。"},{"type":"paragraph","text":"邓小平、彭真、邓颖超、胡耀邦同志参加了追悼会并送了花圈。"},{"type":"paragraph","text":"华国锋、叶剑英、李先念、陈云、宋庆龄、赵紫阳、谭震林、李井泉、阿沛·阿旺晋美、胡厥文、史良、粟裕、杨尚昆、黄火青、刘澜涛、陆定一、李维汉、季方、周建人、庄希泉、肖克、沙千里、周培源、张劲夫、陈此生、刘斐、朱学范、裴昌会、贾亦斌等，送了花圈。"},{"type":"paragraph","text":"韦国清、乌兰夫、彭冲、赛福鼎、宋任穷、习仲勋、廖承志、许德珩、肖劲光、班禅额尔德尼·却吉坚赞、杨静仁、江华、康克清、胡子昂、荣毅仁、胡愈之、王昆仑、何长工、程子华、杨秀峰、包尔汉、钱昌照、平杰三、屈武、李世璋、郑洞国、甘祠森、吴茂荪、董其武、黄鼎臣、蔡啸等，参加了追悼会。"},{"type":"paragraph","text":"追悼会由彭真同志主持，乌兰夫同志致悼词（全文见四版）。"},{"type":"paragraph","text":"送花圈的单位还有：中国国民党革命委员会、中共中央办公厅、中共中央统战部、全国人大常委会办公厅、国务院办公厅、全国政协办公厅、各民主党派、全国工商联、北京市人大常委会、安徽省领导机关、六安县领导机关、民革中央机关和各省市自治区组织及负责人。"},{"type":"paragraph","text":"追悼会后，朱蕴山同志的骨灰盒安放在八宝山革命公墓。"},{"type":"paragraph","text":"朱蕴山同志追悼会由彭真同志主持，乌兰夫同志致悼词。 新华社记者摄（照片）"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"胡耀邦","type":"人物"},{"name":"彭真","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"703ef89b36"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
