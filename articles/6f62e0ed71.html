ical-archives/banned-historical-archives0/main/maoquanji30.pdf"],"article":{"title":"多打小规模的歼灭仗","alias":"","parts":[{"type":"paragraph","text":"多打小规模的歼灭仗!"},{"type":"paragraph","text":"（1951年6月）"},{"type":"paragraph","text":"在目前，多打小规模的歼灭仗，削弱敌人，降低敌人士气，逐渐地进行打大规模的歼灭仗。只要我各级指挥员精心研究情况，很好地布置兵力，组织炮火，每个军一次求得歼灭敌人一两个建制连到一个建制营，是完全可以做到的。并且在目前敌人冒进情况下，是最有利于我捕歼敌人的机会。"},{"type":"paragraph","text":"[1]这是中国人民志愿军司令部1951年5月31日15时下达各部队并报送中央人民政府人民革命军事委员会的关于阻击战的指示中转述的毛泽东的一段话。毛泽东在阅看这个指示并把它转发给斯大林时，对这段话作了修改。"}],"authors":["毛泽东"],"dates":[{"year":1951,"month":6}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":408,"page_end":408},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6f62e0ed71"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
