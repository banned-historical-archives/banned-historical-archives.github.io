ical-archives/banned-historical-archives8/main/maoquanji10.pdf"],"article":{"title":"在中共中央召集的有各单位负责人参加的会议上的讲话","alias":"","parts":[{"type":"paragraph","text":"在中共中央召集的有各单位负责人"},{"type":"paragraph","text":"参加的会议上的讲话！"},{"type":"paragraph","text":"（1937年8月9日）"},{"type":"paragraph","text":"卢沟桥事变是中国大规模全国性抗日战争的开始。国民党转变已大进一步，但离彻底转变还远。目前还存在着严重的危机，即统治者怕群众起来。蒋介石的抗战决心是日本逼起来的，应战主义是危险的，在华北实际是节节退却。"},{"type":"paragraph","text":"红军今日以前是准备调动，今日以后是实行开动。红军应当实行独立自主的指挥与分散的游击战争。必须保持独立自主的指挥，才能发挥红军的长处，集团的作战是不行的。同时还要估计到特别的情形，防人之心不可无，应有戒心，保障红军之发展扩大。"},{"type":"paragraph","text":"[1]这是毛泽东在中共中央召集的有各单位负责人参加的会议上讲话的"}],"authors":["毛泽东"],"dates":[{"year":1937,"month":8,"day":9}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":523,"page_end":523},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c2d3d8c6c4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
