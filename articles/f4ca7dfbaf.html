rt":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"江萨总理离京赴上海访问邓小平耿飚陈慕华副总理等到机场欢送","authors":[],"parts":[{"type":"paragraph","text":"新华社四月一日讯 泰王国总理江萨·差玛南和夫人及其随行人员，由人大常委会副委员长姬鹏飞、外交部副部长韩念龙陪同，今天上午乘专机离开北京前往上海访问。"},{"type":"paragraph","text":"到机场热烈欢送泰国贵宾的有国务院副总理邓小平、耿飚、陈慕华，外交部长黄华和夫人何理良，中国人民解放军副总参谋长彭绍辉，外贸部副部长王润生，农林部副部长张根生，石油部副部长张文彬，民航总局局长沈图，全国妇联负责人黄甘英，北京市革命委员会副主任王笑一等。"},{"type":"paragraph","text":"今天，首都机场上飘扬着中泰两国国旗，数千名男女青年高兴地来到机场，为泰国贵宾送行。机场上举行了隆重的欢送仪式。军乐团奏中泰两国国歌后，江萨总理由邓小平副总理陪同，检阅了中国人民解放军陆海空三军仪仗队。当江萨总理和夫人同欢送群众挥手告别时，欢送的人们挥动着花束和彩带，青年们伴随着乐曲声跳起了欢乐的舞蹈。人们衷心感谢贵宾们带来了泰国人民对中国人民的友好情谊，祝中泰两国人民的传统友谊和两国的友好关系进一步发展。"},{"type":"paragraph","text":"各国驻中国的外交使节也到机场送行。"},{"type":"paragraph","text":"陪同贵宾们去上海访问的还有中国驻泰国大使柴泽民和夫人李友锋，外交部副司长王晓云、高建中。"},{"type":"paragraph","text":"泰国驻中国大使格森·格森西和夫人也陪同前往。"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"耿飚","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f4ca7dfbaf"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
