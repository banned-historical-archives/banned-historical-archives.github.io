script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"陈国栋在全国粮食宣传工作会议上的讲话","authors":["朱德"],"dates":[{"year":1958,"month":7,"day":2}],"is_range_date":false,"parts":[{"text":"朱德关于平息叛乱和军队开展地方工作的意见","type":"title"},{"text":"朱德","type":"authors"},{"text":"德怀同志并主席、中央：","type":"appellation"},{"text":"（一）甘、青、川牧业区反革命武装叛乱，从三月十八日开始先后发生以来，经过三个多月的围剿，已经搞掉了二万六千多人，现在成股流窜的约还有一万五千多人，主要是在甘南的夏河青海的果洛、玉树和川北的唐昆等地区。","type":"paragraph"},{"text":"（二）甘青两省委关于平息叛乱的方针是完全正确的，即在武装平息叛乱的基础上，彻底发动群众，坚决进行社会主义改造，开展对敌斗争，清除一切反动分子，以铲除发生叛乱的根源。甘肃省委提出三条要求：所有反动头子一律捉掉，一个不留；所有枪支一律收缴，一支不留；政教分离，寺院不得干涉政治。这些作法也是对的。","type":"paragraph"},{"text":"（三）甘青两省平息叛乱斗争的特点是：","type":"paragraph"},{"text":"一、发生叛乱的地区都是山高路远、交通不便的地方，部队的调入调出、远距离的机动作战、以及物资的运输供应等十分困难的（现在正用汽车运送骑兵部队）；","type":"paragraph"},{"text":"二、叛乱武装如果集中大股活动，使我们有可能一股作气歼灭掉，当然是最为有利的。但是叛乱武装在我威逼下常常采取小股流窜的办法，因此我们的部队也就不能不采取分散清剿的方针；","type":"paragraph"},{"text":"三、在西藏问题没有彻底解决以前，上述地区反革命叛乱和镇压叛乱的斗争还不可能一下子就完全解决。即使西藏和其他牧业区的社会主义改造全部完成了，镇压反革命复辟活动的斗争也还是长期的反复的。鉴于上述，甘、青两省的平乱部队，有仗打就集中围歼叛乱武装，没有仗打的时候，除保持一定的机动力量外，其余的就应当沿重要交通线上分散布点，和地方工作干部结合在一起，变为武装工作队，逐区逐乡地发动群众，进行社会主义改造，并在此基础上，清除坏分子，收缴枪支，清剿小股流窜的反革命武装。此外，我认为还可以作进一步的考虑，就是在叛乱基本平息之后，这些平叛的部队可以连人带枪就地复员转业，办起军垦农场，安家立业，不必再调出来。据甘肃军区的同志谈，这在部队中是可以说得通的。这样做的好处，一方面是，他们已经和当地群众有了联系，扎下了根，较之一般移民要好得多；另一方面，他们是亦军亦农，长期住下来，对于巩固那些边沿地区是有重大作用的。否则，另外进行移民之后，也还是要常驻军队。此外，以这批人为骨干，对于开发那些地方的丰富资源和促进文化发展等方面的好处，就更不要说了。为了解决这个问题，下点本钱也是必要的，首先是建起房屋，修通公路，然后逐步地做到生产自给。青藏铁路我看应当在第二个五年计划内修通。","type":"paragraph"},{"text":"以上意见，请考虑。","type":"appellation"},{"text":" 朱  德","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"朱德","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4e074bd3d9"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
