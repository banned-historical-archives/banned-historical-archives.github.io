ical-archives/banned-historical-archives0/main/maoquanji50.pdf"],"article":{"title":"对中央关于打击反革命破坏活动指示稿的批语","alias":"","parts":[{"type":"paragraph","text":"对中央关于打击反革命破环活动"},{"type":"paragraph","text":"指示稿的批语！"},{"type":"paragraph","text":"（1970年1月）照办。"},{"type":"paragraph","text":"[1]周恩来等1970年1月30日送审的这个中共中央指示稿指出，为落实战备，巩固国防，对反革命分子的各种破坏活动，必须坚决地予以打击。一、要放手发动群众。二、要突出重点。打击的重点是现行反革命分子。三、要严格区分两类不同性质的矛盾，分清敌我，区别轻重。四、要大张旗鼓、广泛深入地做好宣传、动员。五、要统一掌握批准权限，杀人由省、市、自治区革委会批准，报中央备案。六、要加强领导。周恩来在送审报告中写道：“我们几经讨论，认为现在需要发这样一个指示，给在备战动员中一小撮反革命分子的破坏活动以打击。”毛泽东阅后，写了这个批语。1月31日，中共中央发出了这个指示。"}],"authors":["毛泽东"],"dates":[{"year":1970,"month":1}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":514,"page_end":514},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7598dfbfd3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
