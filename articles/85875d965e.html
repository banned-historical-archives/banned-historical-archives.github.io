script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"约多批判修正主义的文艺观点  在文化战线上必须坚持无产阶级阵地  揭露南斯拉夫泛滥着抽象艺术和美国式舞蹈","authors":[],"dates":[{"year":1963,"month":3,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"约多批判修正主义的文艺观点"},{"type":"paragraph","text":"在文化战线上必须坚持无产阶级阵地"},{"type":"paragraph","text":"揭露南斯拉夫泛滥着抽象艺术和美国式舞蹈"},{"type":"paragraph","text":"新华社雅加达五日电　据印度尼西亚共产党机关报《人民日报》今日报道，印度尼西亚共产党中央委员会第二副主席、人民文化协会中央理事会书记处书记约多二日在雅加达发表演说，揭露和批判了文学和艺术领域中的修正主义理论和实践，驳斥了南斯拉夫共产主义者联盟纲领中关于“科学和艺术”的部分。这个纲领在这一部分中说：“在社会主义的民主制度中，知识分子的创造性摆脱了阶级的意志和阶级的局限。”约多说：这是什么意思呢？这是对阶级态度的咒骂、讽刺和谴责。这是违反马克思主义学说关于用无产阶级的观点、立场和方法来分析问题的原则的。"},{"type":"paragraph","text":"约多说：南斯拉夫共产主义者联盟的修正主义者的话总是说得很漂亮，但是如果彻底推敲一下，它们的内容总是名不符实的。在南斯拉夫新宪法草案中，“为争取人与人之间更为人道的关系而斗争”这句话是毫无意义的，因为在他们那里还有富农阶级——那末人们怎么谈“更人道的关系”呢！也许是贫农和富农之间的“更人道的关系”吧？"},{"type":"paragraph","text":"谈到他一九五八年春在南斯拉夫的见闻时，约多说：他在那里看到许许多多抽象派的艺术，极端“现代主义”的音乐，美国式的舞蹈等等。对这种恶劣倾向只能采取一种态度：对它作斗争。"},{"type":"paragraph","text":"约多说：文化战线是意识形态的战线，这条战线是非常重要的。我们的任务是艰巨的，我们的工作条件是困难的，但是只要我们坚持无产阶级的阶级观点、立场和方法，我们就不仅能够击败反人民的文化，而且能够使人民的文化取得胜利。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"85875d965e"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
