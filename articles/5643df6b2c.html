art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"克孜勒苏柯尔克孜自治州欢庆成立十周年各族人民百倍提高警惕，对帝国主义，反动派和现代修正主义的任务破坏活动，准备随时予以坚决彻底打击","authors":[],"parts":[{"type":"paragraph","text":"据新华社乌鲁木齐五日电 新疆维吾尔自治区克孜勒苏柯尔克孜自治州各族各界八千多人十一月三十日在自治州省府阿图什隆重集会，热烈庆祝自治州成立十周年。"},{"type":"paragraph","text":"全国人民代表大会民族委员会和民族事务委员会的代表张杰（回族）、新疆维吾尔自治区人民委员会副主席伊敏诺夫（维吾尔族）和克孜勒苏柯尔克孜自给州州长买买提艾沙（柯尔克孜族）先后在会上讲话，热烈庆祝自治州成立十年来在各方面获得的伟大成就。他们一致指出，这些成就的取得是由于自治州各族人民在党中央和毛主席的英明领导下。坚定地进行民主革命和社会主义革命，坚决贯彻执行党的社会主义建设总路线和民族政策的结果。"},{"type":"paragraph","text":"张杰在讲话中强调指出，自治州十年来获得的伟大成就，也是在自治州各族人民同国内外一切阶级敌人进行坚决斗争，战胜了各种困难之后赢得的。他说：在民族地区，阶级斗争必然要反映到民族问题上来。自治州各族人民在党中央和毛主席的领导下，与全国各族人民一道，向国内外阶级敌人进行了针锋相对的斗争，彻底粉碎了他们的卑鄙阴谋，取得了伟大的胜利。张杰说，自治州各族人民反对帝国主义、反动派和现代修正主义的斗争，仍然是一项长期的、复杂的、艰巨的历史任务。我们一定要百倍地提高警惕，对他们的任何破坏活动随时予以坚决彻底的打击。任何企图分裂我们祖国统一，破坏我们各民族团结的卑鄙阴谋，都注定是不能得逞的，都一定要遭到可耻的失败。"},{"type":"paragraph","text":"张杰在谈到民族地区进行社会主义革命时指出，必须在各民族内部坚决彻底地完成民主革命任务，并且把社会主义革命进行到底。"},{"type":"paragraph","text":"大会在热烈的掌声中通过了向党中央和毛主席的致敬电。"},{"type":"paragraph","text":"十年来，自治州的面貌已经起了根本性的变化。目前全州粮食总产量比一九五四年增长百分之三十一。在占自治州总面积百分之八十左右的柯尔克孜族人民聚居的帕米尔山区，耕地面积增加了两倍，粮食产量增加三倍多，这是历史上从未有过的事情。全州各类牲畜总头数也比一九五四年增长百分之五十一，比解放初期增长将近一倍。解放前自治州没有工业，现在已经兴建起一批工矿企业。一支本地民族的工人队伍已经成长起来。"}],"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5643df6b2c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
