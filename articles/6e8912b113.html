ical-archives/banned-historical-archives8/main/maoquanji25.pdf"],"article":{"title":"三纵到北平以东可试图切断平津路叫","alias":"","parts":[{"type":"paragraph","text":"三纵到北平以东可试图切断平津路川"},{"type":"paragraph","text":"（1948年12月11日）林、罗、刘："},{"type":"paragraph","text":"真十五时电悉。（一）既然五纵十二日晨即可到南口以南，该纵即可使用于该方面，不要再变动。（二）三纵到通县以南、北平以东（不是北平以南）地区，可试图切断平津路?，但不要破坏。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"十一日二十二时"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军委起草的给东北野战军司令员林彪、政治委员罗荣桓和参谋长刘亚楼的电报。"},{"type":"paragraph","text":"[2]指1948年12月11日15时林彪、罗荣桓、刘亚楼给中共中央军委等的电报。电报说：东北野战军五纵先头师本日已到龙头（怀来、顺义间），明（12日）晨可到南口、昌平以南，会合四纵、十一纵堵击南口之敌。已令三纵改向通县、北平以南前进。"},{"type":"paragraph","text":"[3]南口，镇名，位于北京市昌平县西部。"}],"authors":["毛泽东"],"dates":[{"year":1948,"month":12,"day":11}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":377,"page_end":377},"tags":[{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6e8912b113"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
