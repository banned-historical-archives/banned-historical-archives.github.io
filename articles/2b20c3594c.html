的通知","authors":[],"dates":[{"year":1958,"month":3,"day":31}],"is_range_date":false,"parts":[{"text":"中共中央关于在生产高潮中应当控制劳动强度的通知","type":"title"},{"text":"在目前的生产高潮中，有些地方的工人农民的劳动强度过高，休息时间过少，这是不能持久的。为了珍惜劳动人民的革命热情，使苦战和必要的休整相结合，各地应即注意这种情况，并采取适应措施。（一）工人农民自觉自愿地提高劳动强度是好的，应当鼓励的，但是也要有适当的控制，使他们有必要的休息时间。认为劳动强度可以一直提高下去的想法是不正确的。生产高潮经过一个适当时间以后，需要转入巩固和休整一个短时间（例如几天或十几天），然后再进入第二个高潮。这就是生产节奏的一种形式。这种生产的节奏需要调节。在多快好省、鼓足干劲、力争上游的总路线的基础上，运动需要波浪式的前进。应当教育工人农民更多地注意改进技术，改进工具，改进操作方法，以求生产的跃进，而不要单纯地、过分地依靠捉高劳动强度来达到目的。（二）教育工人农民认真地注意安全生产，并且采取和加强各项必要的安全措施，力求避免一切可以避免的伤亡事故。在发生伤亡事故的时候，要迅速进行慰问、哀悼、抚恤，同时抓紧时机，进行安全教育。（三）在控制劳动强度和注意劳动安全的问题上，必须防止和反对任何挫伤群众情绪、借此对群众生产高潮散布怀疑空气的言行。应当着重指出，目前的群众生产高潮的发展是完全健康的，一些小的伤亡事故是难以避免的，群众并没有因此而沮丧。相反，群众的积极性创造性和党的正确领导将使这种损失在今后日趋减少，将使生产高潮有节奏地继续前进和取得更大更多的胜利。","type":"paragraph"}],"comments":[],"origin":"中华全国总工会编《建国以来中共中央关于工人运动文件选编》（上），工人出版社，1989年。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2b20c3594c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
