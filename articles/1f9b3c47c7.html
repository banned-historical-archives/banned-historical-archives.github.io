script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"对十一届三中全会以来的路线作了全面深入的阐述邓小平《建设有中国特色的社会主义》一书增订本出版全书收入十二大以来邓小平同志的讲话、谈话44篇，包括直至今年一月的最新文稿。新增文稿中的突出内容是:坚持四项基本原则，反对资产阶级自由化；坚持改革开放政策","authors":[],"dates":[{"year":1987,"month":3,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京3月19日电　邓小平同志《建设有中国特色的社会主义》一书的增订本，最近由中共中央文献研究室编辑，人民出版社出版，3月20日起在全国新华书店陆续发行。"},{"type":"paragraph","text":"《建设有中国特色的社会主义》这本书，1984年12月出版时，收入党的十二大以来邓小平同志的讲话、谈话共22篇。这次增订本增加到44篇，包括近几年来直至今年1月的最新文稿，其中有些是首次公布的内部谈话。全部文稿都经作者本人审定。"},{"type":"paragraph","text":"新增文稿中的一个突出的内容，是坚持四项基本原则，反对资产阶级自由化。邓小平同志指出:这几年来一直存在着资产阶级自由化的思潮。搞自由化就是要脱离党的领导，把我们的国家引导到资本主义道路上去。我们的一些同志对此缺乏认识，反对资产阶级自由化的态度不坚决。要理直气壮地坚持四项基本原则，旗帜鲜明地反对资产阶级自由化。反对自由化还要在今后一个长时期内继续进行下去。有关这方面的论述，主要反映在《搞资产阶级自由化就是走资本主义道路》(1985年5月、6月)、《在中国共产党全国代表会议上的讲话》(1985年9月23日)、《在党的十二届六中全会上的讲话》(1986年9月28日)、《旗帜鲜明地反对资产阶级自由化》(1986年12月30日)等讲话、谈话中。增订本还收入了邓小平同志1983年10月12日在十二届二中全会上的讲话。这个讲话尖锐地提出思想战线不能搞精神污染，要求思想战线上的战士，高举马克思主义的、社会主义的旗帜，教育和引导人民正确地对待历史，认识现实，坚信社会主义和党的领导，鼓舞人民为伟大壮丽的社会主义现代化建设事业而英勇奋斗。"},{"type":"paragraph","text":"新增文稿中的另一个重要内容，是坚持改革开放政策。邓小平同志在这些文稿中，多次讲到改革的重要性和必要性，讲到我们的开放政策是正确的，是不会改变的。今年1月，在同外宾的两次谈话《排除干扰，坚定地执行改革开放政策》、《加强四项基本原则的教育，坚持改革开放的政策》中，反复说明反对资产阶级自由化不会影响改革开放政策，进行四项基本原则教育正是从根本上保证改革开放政策的顺利贯彻。增订本收入了邓小平同志自1986年以来关于政治体制改革的多次谈话，包括《在听取经济情况汇报时的谈话》、《改革政治体制，增强法制观念》、《不改革政治体制会阻碍生产力发展》、《政治体制改革要有一个蓝图》、《根据本国情况进行政治体制改革》、《政治体制改革的一些设想》等，对政治体制改革的意义、目标、内容、方法和步骤作了一系列论述。他着重指出，不改革政治体制，就不能保障经济改革的成果，就不能充分发扬社会主义民主，调动人民群众和基层单位的积极性。同时又指出了政治体制改革的复杂性和艰巨性，提出改革要既大胆又慎重。邓小平同志的这些谈话，为我国政治体制改革指出了正确的方向。"},{"type":"paragraph","text":"这本书的全部文稿，都是从我国的具体情况出发，论述建设有中国特色的社会主义的问题，有很强的现实针对性，反映了邓小平同志一贯倡导和坚持的基本观点和主张，对十一届三中全会以来的路线作了全面、深入的阐述。学习邓小平同志的这本著作，对于指导我们进行社会主义现代化建设，克服前进道路上的障碍，将会发挥重大的作用，产生深远的影响。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"发言"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1f9b3c47c7"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
