script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"“了不起，毛主席”　《开国领袖毛泽东》编剧王朝柱","authors":[],"dates":[{"year":1999,"month":9,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"“了不起，毛主席”"},{"type":"paragraph","text":"《开国领袖毛泽东》编剧王朝柱"},{"type":"paragraph","text":"时逢新中国五十华诞，颂扬以毛泽东为首的第一代领导人的丰功伟业，是创作电视连续剧《开国领袖毛泽东》的宗旨。我作为剧作者严格地遵循了如下的创作原则："},{"type":"paragraph","text":"忠实于历史。由于共和国只有五十周年，参加创建新中国的很多老同志——尤其是跟随毛泽东征战南北的老同志健在，因此，给予剧作者虚构的空间是很小的。也许出于同样的原因，唯有忠实于历史才有生命力，塑造的艺术形象毛泽东才具有强大的感染力——或曰更能打动今天的观众。为此，我试图通过全景式地反映夺取全国胜利，建设新中国，三反、五反，和平解放西藏、新疆，访苏并订立中苏友好同盟互助条约，决策抗美援朝、土地改革，以及制订第一个五年计划和第一部宪法等历史大事，客观地给今天的观众一个真实的毛泽东形象。"},{"type":"paragraph","text":"艺术地再现毛泽东。波澜壮阔的历史、浩瀚无尽的原始素材都是为塑造毛泽东这个伟大的艺术形象服务的。毛泽东是开国领袖，处理国事、家事的视角首先是领袖的品格。因此，当他毅然决策入朝参战之后，他要求自己的儿子毛岸英入朝的行为，更多的是从人民领袖的品格出发的。但是，当毛岸英真的就要赴朝参战了，他又想到了一起吃顿团圆饭，为儿子送行，这时的毛泽东就又从领袖还原成了普通的人民。同样，当他获悉毛岸英牺牲的消息之后，他的泪和着血往心里流，这是父爱子的表现。然而当他听说要把毛岸英运回国安葬后，他立即想到了牺牲在朝鲜的成千上万的志愿军指战员，他又忍泪说出了“哪里的黄土不埋人，就把岸英埋在朝鲜大地上”的话。很显然，这时的毛泽东又从普通人民的情感升华为领袖的品格。因此，当唐国强饰演的毛泽东每每演到此处，深深地为之掬出了忘情的泪水，感动得导演和在场的同行都为之发出了哽咽声。"},{"type":"paragraph","text":"这就是艺术真实那特有的感染力！"},{"type":"paragraph","text":"毛泽东是一位处变不惊的伟人。他获悉敌人准备炮轰天安门之后，依然坦荡自若地登上天安门城楼，与人民同庆共和国的第一个国庆；也就是在他刚刚登上天安门不久，遂又收到金日成请求出兵援朝的急电，他不仅一声不吭地参加完庆典活动，而且还出席晚会，与大诗人柳亚子唱和名词《浣溪纱》；等到京城的人民幸福地进入梦乡之后，他才召开紧急会议，作出入朝参战的决定。因此，唐国强演完上述这几节戏后，感叹不已地说了这样一句话：“了不起，毛主席！”"},{"type":"paragraph","text":"毛泽东又是一位极富浪漫情怀的诗人。因此，当我们来到莫斯科红场，拍摄毛泽东向列宁墓献花圈的一节戏的时候，唐国强饰演的毛泽东和早已仙逝的列宁会见了。因为作为诗人的毛泽东他一定会想到列宁，而且还会想到十月革命，甚至还会由十月革命想到巴黎公社革命、井冈山根据地……因此，这种浪漫主义的手段不仅是合理的，而且也极大地调动了时空，为多侧面地重塑毛泽东的光辉形象又打开了一扇门。"},{"type":"paragraph","text":"电视是综合艺术，需要导演、演员的再创作。《开国领袖毛泽东》一剧在表演空间方面是有限的。举例说：全剧近六千个镜头，毛泽东就占了三千三百多个。其中，有一千六百多个镜头号是在菊香书屋。这就给饰演毛泽东的唐国强出了一道极难的课题，那就是要在三十平方米的空间中演活毛泽东。如何才能把这样长的文戏演活呢？唐国强作为表演艺术大家，就像马连良演《空城计》、梅兰芳演《三堂会审》那样，在三十平方米的菊香书屋中终于把毛泽东演活了，得到了大家的认同。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5491f7b5c3"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
