rt":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"泰国人民武装斗争迅速发展毛主席说；“星星之火；可以燎原”","authors":[],"parts":[{"type":"paragraph","text":"泰国人民点起的武装斗争的星星之火，正以燎原之势燃烧起来。"},{"type":"paragraph","text":"八月七日，泰国人民武装歼灭了一支由泰国和“马来西亚”军警组成的巡逻队，缴获敌人全部武器。"},{"type":"paragraph","text":"泰国人民武装同美泰反动派的第一次交锋，是在东北部的那空拍侬府那家县，现在已经发展到乌隆、乌汶、沙功那空、廊开等府的广大东北部地区和整个南部地区。人民武装的活动越来越频繁，战斗的次数越来越多。据初步统计，去年下半年，东北部人民武装与美泰军警战斗二十四次，今年上半年已增加到四十三次。在南部，去年下半年战斗五次，今年头七个月已增加到五十一次。"},{"type":"paragraph","text":"泰国人民武装发挥人民战争的巨大威力，一次又一次地粉碎了敌人的“围剿”，杀伤了大量敌人，缴获了大批武器。例如，四月五日到五月二十五日，泰国人民武装在东北部沙功那空府粉碎了敌人两个多营的“围剿”，一举歼灭敌军一百六十多人。在泰国人民武装的沉重打击下，美泰反动派已经预感到末日的来临，惊呼他们完全“处在泰国人民的包围之中”。"},{"type":"paragraph","text":"美国侵略者一直把泰国反动派作为它侵略越南和印度支那各国的工具，把泰国作为它在东南亚的一个重要军事基地。泰国人民武装斗争的蓬勃发展，沉重地打击了美帝国主义的罪恶阴谋。"}],"alias":""},"tags":[{"name":"人民战争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ca8e98851f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
