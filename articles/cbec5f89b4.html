ical-archives/banned-historical-archives8/main/maoquanji25.pdf"],"article":{"title":"我军解放郑州","alias":"","parts":[{"type":"paragraph","text":"我军解放郑州1"},{"type":"paragraph","text":"（1948年10月22日）"},{"type":"paragraph","text":"【新华社郑州前线二十二日二十四时急电】我中原人民解放军于今日占领郑州。守敌向北面逃窜，被我军包围于郑州以北黄河铁桥以南地区，正歼击中。郑州为平汉、陇海两大铁路的交点，历来为军事重镇。蒋介石因徐州告急，被迫将驻郑兵团孙元良部三个军（按：国民党军从十月起整编师均改称为军，整编旅均改称为师）东调，郑州守兵薄弱，我军一到，拼命奔逃。现郑州东面之中牟县、北面之黄河桥均被我军切断，逃敌将迅速被歼。乔术：此件请长今日颜精心"},{"type":"paragraph","text":"州岸线升日耐笼北河特绣为平滨施海天为军事季镇。蒋迹国练州制亘宁驻那兵团孙元良部调非州守兵落弱，我军一到，拼命奔幽东钟年不北勾之黄何铁璃均被我爱地新，逃特迅建被。国民艺率之月"},{"type":"paragraph","text":"C毛泽东为新华社撰写的《我军解放郑州》的手稿。"}],"authors":["毛泽东"],"dates":[{"year":1948,"month":10,"day":22}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":93,"page_end":94},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cbec5f89b4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
