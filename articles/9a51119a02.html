script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji46","name":"毛泽东全集第46卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji46.pdf"],"article":{"title":"毛泽东等祝贺赫鲁晓夫七十寿辰的电报","alias":"","parts":[{"type":"paragraph","text":"毛泽东等祝贺赫鲁晓夫"},{"type":"paragraph","text":"七十寿辰的电报"},{"type":"paragraph","text":"（1964年4月16日）苏联共产党中央委员会第一书记苏联部长会议主席尼·谢·赫鲁晓夫同志："},{"type":"paragraph","text":"亲爱的同志，在你七十寿辰的时候，我们向你祝贺，祝你健康和长寿。"},{"type":"paragraph","text":"中国共产党人和中国人民，对于生长在列宁主义故乡的、具有长期革命传统的苏联共产党人和苏联人民，一向怀着深厚的兄弟情谊和最大的尊敬，对他们在十月革命以来的几十年间所获得的伟大成就表示热烈的祝贺。"},{"type":"paragraph","text":"中苏两个伟大兄弟国家的人民有着共同的利益和共同的斗争目标。从根本上说来，只要我们采取马克思列宁主义的立场，以美国为首的帝国主义和各国反动派，就决不会放松他们的反苏、反华、反共、反革命、反人民的政策。我们坚决相信，由于我们两国人民的要求，由于全世界各国革命人民的要求，中苏两党、两国和我们的人民，在反对帝国主义和各国反动派，坚持马克思列宁主义和无产阶级国际主义，维护社会主义阵营团结和国际共产主义运动团结，支持全世界被压迫人民和被压迫民族的革命运动，维护世界和平的斗争中，从长远看来，总是要紧密地团结起来的。"},{"type":"paragraph","text":"毛泽东等祝贺赫鲁晓夫七十寿辰的电报"},{"type":"paragraph","text":"尽管目前我们同你们之间存在着关系到马克思列宁主义一系列原则问题的分歧，存在着不团结的状态，但是，我们坚决相信，这只是暂时的。一旦世界发生重大事变，中苏两党、两国和我们的人民就会站在一起，共同对敌。"},{"type":"paragraph","text":"让帝国主义和各国反动派，在我们的团结面前颤抖吧，他们总是会失败的。"},{"type":"paragraph","text":"中苏两国人民的伟大团结和友谊万岁！战无不胜的革命的马克思列宁主义万岁！"},{"type":"paragraph","text":"中国共产党中央委员会主席毛泽东中华人民共和国主席刘少奇中华人民共和国全国人民代表大会常务委员会委员长朱德中华人民共和国国务院总理周恩来"},{"type":"paragraph","text":"一九六四年四月十六日"}],"authors":["毛泽东"],"dates":[{"year":1964,"month":4,"day":16}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":333,"page_end":334},"tags":[{"name":"毛泽东","type":"人物"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9a51119a02"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
