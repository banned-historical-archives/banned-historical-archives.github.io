script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"上海人民出版社党员、干部和群众对前途充满信心誓夺批邓、反击右倾翻案风的更大胜利","authors":[],"dates":[{"year":1976,"month":7,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　在热烈庆祝中国共产党诞生五十五周年的日子里，上海人民出版社的全体共产党员、广大干部和群众，认真学习了中央两报一刊“七一”社论《在斗争中建设党》。六月三十日晚上，社党委、革委会常委和各组室支部书记一起收听广播，畅谈了自己的体会。七月一日下午，召开了全社大会，交流了在批邓斗争中加强党的建设的经验。大家回顾了建党五十五年来的光荣历史，特别是回顾了文化大革命以来批判刘少奇、林彪、邓小平反革命的修正主义路线的斗争，深深感到在伟大领袖毛主席领导下的中国共产党，在斗争中越战越强，更加团结，更加朝气蓬勃，更富有战斗力。大家对前途充满信心，决心认真学习马克思主义，深入批判修正主义，夺取批判邓小平、反击右倾翻案风斗争的更大胜利，为实现共产主义远大目标而奋斗终身。"},{"type":"paragraph","text":"大家一致认为，毛主席的重要批示，为深入批邓斗争提供了新的、强大的思想武器，具有重大的现实意义和深远的历史意义。党内的资产阶级，“与工人阶级和贫下中农是两个尖锐对立的阶级”，他们就是“吸工人血的资产阶级分子”。毛主席的批示深刻地指出了广大革命人民同党内走资派的矛盾和斗争是不可调和的，使许多同志进一步认识到目前正在深入开展的批邓斗争的性质和重大意义，大大鼓舞了批邓的斗志。在学习讨论中，大家还分析了社会主义历史阶段阶级关系的变化，党内出现资产阶级的根源，进一步看清楚“走资派还在走”是整个社会主义历史时期存在的社会现象。大家表示一定要遵照毛主席的教导，树立起同走资派长期作战的思想，不断革党内资产阶级的命，保证我们的党和国家不改变颜色，为人类作出更大的贡献。"},{"type":"paragraph","text":"学习讨论中，许多同志深深感到毛主席的重要批示，对于每个共产党员、革命干部、特别是担负一定领导工作的干部，都是最大的关怀和爱护，为大家指明了坚持无产阶级专政下继续革命的方向和道路。有的老干部回顾了自己正反两方面的历史经验，表示一定要牢记毛主席的教导，坚持无产阶级专政下的继续革命，活到老，学到老，改造到老，斗争到老；要象过去革命战争年代那样，同工农群众打成一片；象过去打三大敌人那样，同走资派斗争到底。在文化大革命中走上领导岗位的新干部，从工厂、农村抽调到出版社来的工农编创干部，学习毛主席的指示以后说，我们来自工农，一定要不忘工农，要一辈子做个普通劳动者，永远同工农划等号；要随时警惕和抵制资产阶级的侵蚀，自觉地限制资产阶级法权，决不做资产阶级的接班人。许多共产党员在学习中纷纷表示要在斗争中认真学习马列主义、毛泽东思想，改造自己的世界观，努力做到从思想上完全入党。永远牢记党的基本纲领，坚持党的基本路线，不忘党的最终目的，为共产主义奋斗终身。"},{"type":"paragraph","text":"“我们这个党是有希望的”。上海人民出版社党委和全体同志，在学习中央两报一刊重要社论过程中，充满着同党内资产阶级作斗争的必胜信心，决心在斗争中加强党的建设，努力把出版社真正办成无产阶级专政的工具，为反修防修、巩固无产阶级专政大造革命舆论，为夺取批邓斗争的更大胜利作出应有的贡献。　(本报通讯员)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"限制资产阶级法权","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7629876df6"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
