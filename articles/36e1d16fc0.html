torical-archives/banned-historical-archives9/main/books/wenji8.pdf"],"article":{"title":"关于三个世界划分问题","description":"","dates":[{"year":1974,"month":2,"day":22}],"parts":[{"text":"关于三个世界划分问题","type":"title"},{"type":"paragraph","text":"毛泽东：希望第三世界团结起来。第三世界人口多啊！"},{"type":"paragraph","text":"卡翁达：对。"},{"type":"paragraph","text":"毛：谁是第一世界？"},{"type":"paragraph","text":"卡：我想应该是那些剥削者和帝国主义者的世界。"},{"type":"paragraph","text":"毛：第二世界呢？"},{"type":"paragraph","text":"卡：是那些已经变为修正主义分子的人。"},{"type":"paragraph","text":"毛：我看美国、苏联是第一世界。中间派，日本、欧洲、澳大利亚、加拿大，是第二世界。咱们是第三世界。"},{"type":"paragraph","text":"卡：我同意主席先生的分析。"},{"type":"paragraph","text":"毛：美国、苏联原子弹多，也比较富。第二世界，欧洲、日本、澳大利亚、加拿大，原子弹没有那么多，也没有那么富，但是比第三世界要富。你看这个解释好不好？"},{"type":"paragraph","text":"卡：主席先生，你的分析很确切，十分准确。"},{"type":"paragraph","text":"毛：研究一下吧。"},{"type":"paragraph","text":"卡：我想不用研究，我们的意见就可以取得一致，因为在我看来，这个分析已经很确切了。"},{"type":"paragraph","text":"毛：第三世界人口很多。"},{"type":"paragraph","text":"卡：确实如此。"},{"type":"paragraph","text":"毛：亚洲除了日本，都是第三世界。整个非洲都是第三世界，拉丁美洲也是第三世界。"},{"type":"paragraph","text":"根据中央文献出版社、世界知识出版社"},{"type":"paragraph","text":"一九九四年出版的《毛泽东外交文选》"},{"type":"paragraph","text":"刊印。"}],"comment_pivots":[{"part_idx":0,"offset":10,"index":1}],"is_range_date":false,"authors":["毛泽东"],"comments":["这是毛泽东同赞比亚总统卡翁达谈话的一部分。"],"page_start":452,"page_end":453,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"36e1d16fc0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
