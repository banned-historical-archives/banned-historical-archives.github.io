概要）","authors":[],"dates":[{"year":1972,"month":4,"day":18}],"is_range_date":false,"parts":[{"text":"中央军委关于办好教导队，加速轮训部队基层干部的指示（概  要）","type":"title"},{"text":"中央军委发出《关于办好教导队，加速轮训部队基层干部的指示》。《指示》指出，办好教导队，教育好干部，提高他们的毛泽东军事思想水平和组织指挥能力，是整顿好建设好军队的一个重要方面，是整军备战的迫切需要。鉴于林彪的破坏给部队造成的恶果，及部队新干部大量增加、技术装备不断发展的新情况，各级党委必须把轮训干部的工作列入议事日程，切实抓紧对基层干部的培训，认真办好教导队。要由打过仗的有经验的军、师、团一级的领导干部亲自任教，担任队长、排长、班长，进行传帮带，严格训练，严格要求。《指示》要求全军各大单位在两年内把基层干部轮训完。此后到1973年底，各大军区轮训干部最多的已达应训干部的95％以上。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d87cd56769"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
