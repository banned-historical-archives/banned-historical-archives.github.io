rt":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"沿着毛主席的无产阶级文艺路线胜利前进革命现代京剧《平原作战》剧照","authors":[],"parts":[{"type":"paragraph","text":"军爱民，民拥军。乡亲们热情地慰问子弟兵。"},{"type":"paragraph","text":"（第三场：《鱼水情深》）"},{"type":"paragraph","text":"共产党员、八路军排长赵勇刚。在毛主席的无产阶级军事路线指引下，他和抗日群众一起英勇机智地开展游击战，牢牢掌握着战胜敌人的主动权。"},{"type":"paragraph","text":"“千钧一发不容缓，要和敌人抢时间，扒火车插双翅飞进车站……。”赵勇刚获悉龟田要进山的情报后当机立断，决定率领战士扒火车飞进车站，炸掉敌人的军火，彻底粉碎龟田进山增援计划。"},{"type":"paragraph","text":"（第八场：《青纱帐里》）"},{"type":"paragraph","text":"赵勇刚刀劈日寇曹长。最后，赵勇刚和战士们放火烧掉日寇中心炮楼，把粮食运往山区，支援主力作战。"},{"type":"paragraph","text":"（第四场：《智取炮楼》）"},{"type":"paragraph","text":"在乡亲们蒙难的紧急关头，张庄村支部书记李胜挺身而出，闯敌阵，斗群魔，救乡亲，保公粮，耿耿正气满胸膛。"},{"type":"paragraph","text":"（第五场：《不屈不挠》）"},{"type":"paragraph","text":"张大娘为了掩护李胜，不幸中弹牺牲。临终前，她满怀深情地对打回张庄的赵勇刚说：“我把小英托付给你们，叫她永远跟着毛主席，永远跟着共产党，抗战到底，革命到底！”"},{"type":"paragraph","text":"（第五场：《不屈不挠》）"},{"type":"paragraph","text":"“为炸军火来接线，出奇制胜拴龟田。”赵勇刚化装进城侦察，到饭馆找八路军秘密工作人员联系。"},{"type":"paragraph","text":"（第六场：《袭扰县城》）"},{"type":"paragraph","text":"“只怕八路在你面前，你也认不出来”。为了炸掉敌人的军火，赵勇刚司机打扮来到车站，与敌人进行巧妙周旋。"},{"type":"paragraph","text":"（第九场：《爆炸军火》）"},{"type":"paragraph","text":"“用胜利迎接主力到来！”我八路军主力部队与赵勇刚、众战士胜利会师，我军在山上山下皆获全胜。"},{"type":"paragraph","text":"（第十场：《平原歼敌》）"},{"type":"paragraph","text":"（全版剧照均为新华社稿）"}],"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"06d0a7933e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
