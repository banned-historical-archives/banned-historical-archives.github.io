"authors":[],"dates":[{"year":1951,"month":4,"day":7}],"is_range_date":false,"parts":[{"text":"兰州镇压反革命分子后的社会反映","type":"title"},{"text":"【西北总分社七日讯】兰州市于三月十一、十五、二十五三天分三批枪决反革命分子一百十九名。群众对此基本上是拥护的。但干部和群众还有些错误思想存在。如有些民主人士和少数干部，不从这些反革命分子该不该杀来考虑问题，而片面地错误地认为杀得太多了，“杀一警百就可以了”；少数群众认为政府的“政策变了”，甚至有人说：“习仲勋书记到兰州来是指示杀人的”，“过去判的案都不算数了”。这里有些群众的反映可能是特务造的谣言。","type":"paragraph"}],"comments":[],"origin":"新华通讯社编《内部参考》1951年4月9日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0b4282f0fb"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
