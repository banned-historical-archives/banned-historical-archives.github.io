ors":[],"dates":[{"year":1964,"month":10,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛泽东刘少奇董必武朱德周恩来邓小平彭真陆定一同志"},{"type":"paragraph","text":"会见古巴党政代表团"},{"type":"paragraph","text":"新华社十六日讯　毛泽东主席以及党和国家的其他领导人刘少奇、董必武、朱德、周恩来、邓小平、彭真、陆定一，今天下午会见了古巴党政代表团团长、古巴社会主义革命统一党哈瓦那省委员会组织书记伊西多罗·马尔米埃尔卡·佩奥里，代表团团员米格尔·加西亚·卡莱罗、费利克斯·洛佩斯·普伦德斯、亚历杭德罗·阿里亚斯·梅迪纳。宾主进行了亲切友好的谈话。"},{"type":"paragraph","text":"会见时在座的，还有中共中央候补委员赵毅敏，外交部礼宾司代司长葛步海，美澳司副司长林平。古巴驻中国大使馆临时代办费尔南德斯也在座。"},{"type":"paragraph","text":"（附图片）"},{"type":"paragraph","text":"毛泽东同志等党和国家领导人会见古巴党政代表团。前左四是伊多罗·马尔米埃尔卡·佩奥里团长。  　新华社记者　孟庆彪摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"邓小平","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"彭真","type":"人物"},{"name":"朱德","type":"人物"},{"name":"陆定一","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4378473538"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
