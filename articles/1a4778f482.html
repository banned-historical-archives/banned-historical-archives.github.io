script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"打破资产阶级一统学校的局面","authors":["李善义"],"dates":[{"year":1968,"month":11,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"上海机械学院革委会　李善义"},{"type":"paragraph","text":"我们伟大领袖毛主席最近教导我们:“这次无产阶级文化大革命，对于巩固无产阶级专政，防止资本主义复辟，建设社会主义，是完全必要的，是非常及时的。”毛主席的话字字值千金，句句是真理。联系到我院建校十几年来两条路线的激烈斗争，充分证明了这一点。"},{"type":"paragraph","text":"一九五二年我院招收了两千一百多名工农学生。这些工农学生有雄心壮志，怀着一颗“为毛主席争气、为工人阶级争气”的红心，为革命而学习。毕业后，在社会主义建设事业中作出了很大的贡献。事实证明“从有实践经验的工人农民中间选拔学生”就是好!可是到了一九五五年，学校走资派耍了种种花招，只招了一百七十多名工农学生。一九六○年，这些走资派又以“一视同仁”为借口，仅招了十七名工农学生。工农学生到校后，走资派对他们又实行残酷的资产阶级专政，采取各种手段，迫使他们中途离校，到毕业时只剩下三名。从此以后，工农学生入学比上天还要难，而为地富子女、资产阶级子弟入学大开方便之门。"},{"type":"paragraph","text":"我们要问:为什么大量的工农学生受到迫害，被排斥于校门之外，而一些地主、富农、资产阶级子弟却硬拉进学校?为什么毛主席的无产阶级教育路线得不到有力的贯彻，而刘少奇的反革命修正主义教育路线、黑指示却到处推行，归根结底，是权不在我们无产阶级手里。文化大革命中揭发出来的大量事实查明，我院从旧党委书记、院长、教务长到各教研室的领导成员中，不少是叛徒、特务、反革命分子、顽固不化的走资派，以及资产阶级反动学术“权威”。这一小撮坏家伙对工农掌握文化技术大权恨得要死，怕得要命，遵照他们的黑主子刘少奇的旨意，利用他们所篡夺的权力，照搬苏修一套，鼓吹“大、洋、全”，千方百计地迫害、打击工农学生，实行资产阶级专政，大搞资本主义复辟。"},{"type":"paragraph","text":"无产阶级文化大革命中，广大红卫兵小将、革命的师生员工在毛主席革命路线的指引下，纷纷起来造反动派的反，把走资派所篡夺的那一部分权力夺了过来，建立无产阶级专政的机构——革命委员会。根据毛主席关于“工人阶级必须领导一切”的伟大指示，八月二十六日，以产业工人为主体的、有解放军指战员参加的工人毛泽东思想宣传队开进了学校，牢牢掌握住教育大权，为工农进大学敞开了大门。"},{"type":"paragraph","text":"根据两年多来的文化大革命的斗争实践，我们机械学院广大红卫兵小将、革命的师生员工深深地体会到:没有这次无产阶级文化大革命，毛主席的无产阶级革命路线就得不到有力的贯彻，工人阶级、贫下中农在科学技术文化方面就得不到彻底翻身，资产阶级知识分子统治我们学校的现象就会长期存在，我们这些青年学生也有可能成为资产阶级接班人。大家异口同声地说:这次无产阶级文化大革命，就是好，好得很!"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1a4778f482"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
