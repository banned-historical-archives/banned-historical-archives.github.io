rt":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"集训与在职自学并举军事工程学院干部普遍学习毛主席军事著作","authors":[],"parts":[{"type":"paragraph","text":"本报讯 军事工程学院全院干部目前正热烈学习毛主席军事著作。院党委把组织领导这个学习列为下半年中心工作之一，并且作出全面规划。"},{"type":"paragraph","text":"他们这次学习的方式，采取集训与在职学习并举。参加集训的主要是大尉以上的干部。第一期集训班已在7月15日开学，9月初起再陆续办四期（每期一个月时间）。集训的方法，以自学力主，辅以启发报告、解答问题和讨论漫谈。在职干部学习，计划从9月1日开始，至明年1月底结束，每周学习六个半小时。"},{"type":"paragraph","text":"院党委进行了深入的思想动员，要求全体干部积极参加学习，通过学习，加深对人民军队建军原则、人民战争和作战指导原则的理解，彻底破除教条主义和单纯军事观点。进一步提高思想水平和教学工作的质量，端正科学研究的方向。"}],"alias":""},"tags":[{"name":"人民战争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"09eaa7ceb0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
