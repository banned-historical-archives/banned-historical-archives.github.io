ar":1974,"month":3,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"邓小平会见澳大利亚科学代表团"},{"type":"paragraph","text":"新华社一九七四年三月二十八日讯  国务院副总理邓小平今天上午会见了澳大利亚科学院院长拉瑟福德·内斯·罗伯逊教授和澳大利亚国立大学副校长威廉斯博士，以及由他们率领的澳大利亚科学代表团全体团员，宾主进行了友好的谈话。"},{"type":"paragraph","text":"参加会见的代表团团员是：罗纳德"},{"type":"paragraph","text":"德雷顿·布朗教授，詹姆斯·梅多斯·伦德尔博士，约翰·保罗·怀尔德博士，戈登·莱斯利·艾达教授，汉斯·阿道夫·布克达尔教授，约翰·德里克·奥文顿教授，柳存仁教授。"},{"type":"paragraph","text":"澳大利亚驻中国大使费思棻参加了会见。"},{"type":"paragraph","text":"参加会见的还有我国有关方面负责人和科学工作者周荣鑫、周培源、贝时璋、吴凡吾、朱永行等。（附图片）"},{"type":"paragraph","text":"图为会见时合影　新华社记者摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1a130d2835"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
