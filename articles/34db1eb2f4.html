"authors":[],"dates":[{"year":1966,"month":6,"day":15}],"is_range_date":false,"parts":[{"text":"中共广州市东平农场委员会专政对象登记表--钟玉波","type":"title"},{"text":"","type":"appellation"},{"text":"广东省广州市郊区 公社 大队 生产队（ 村）","type":"paragraph"},{"text":"专政对象登记表","type":"paragraph"},{"text":"户主姓名 钟玉波 编号80","type":"paragraph"},{"text":"   问题性质 右派份子   姓名 现名 钟玉波 性别 男 家庭出身 自由职业   曾用名   年龄 32 本人成份 学生   文化程度 初一 民族 汉 现在职业及职务     原籍 广东花县 现住     何时何地何人介绍参加过何种反动组织，任何种职务     家庭成员及主要社会关系中的姓名、政治面貌及社会职业 母，罗英，家庭妇女。大哥：钟玉池，医生。三哥：钟玉纶，旅店职员。九哥钟泽均，工人。六哥：钟玉良，社员，前年在英德劳改场现释放。八姐：钟玉枚，工人。十二姐钟群芳，医生。十五姐钟志淳，工人。十六姐，钟棉。弟，钟玉庭，工人。   个人简历 1942年－1945在乡读书。 1945－1948在广州小学读书。 1948.7－1949.12在西村侨二师附小读书。 1950年停学在家。 1951.2－1951.7投考市干训班。 1952－1958年在市运输公司工作。 1958－现在划为右派来场劳改。   何时何地受过何种处分 1958.8.27.在广州市运输公司因划为右派分子受到降职降级处分。   ","type":"paragraph"},{"text":"注：(1) 专政对象包括解放后外出、外逃的和四清运动中新划出来的。","type":"paragraph"},{"text":"(2)“问题性质”一栏，分别填写属于那一种“分子”。","type":"paragraph"},{"text":"(3)“主要问题”一栏，包括解放前后的主要罪恶和主要问题。","type":"paragraph"},{"text":"   主要问题 钟于1951年参加革命工作后，工作长期不负责任，组织性、纪律性很差，个人主义十分严重，每当组织上处理某些问题而他个人认为不恰当时就在群众中大肆进行谩骂，甚至不惜捏造事实扩大问题，以达到打击和丑化领导的目的，对一些积极依靠组织的同志进行打击，在整风期间，污蔑和攻击政府人事工作和党的干部，诋毁马列主义，提倡资本主义思想的民主自由，并攻击肃反运动和党的各项方针政策，歪曲事实，攻击和丑化领导，仇恨组织破坏党群关系，思想品质恶劣，在斗争开始时，态度是十分狡猾和抵赖，后经群众揭发和多次的斗争才坦白交代问题。   大队贫下中农协会意见 同意列为专政对象 中共红路支部 签名 1966年 月 日   大队党支部意见 右派分子，列入专政对象。 签名 中国共产党广州市东平农场委员会 1966年6月15日   大队工作队意见 同意列为专政对象 签名  1966年6月15日   备考 右派分子继续监督改造。 中共广州市委农村四清总团三元里分团 66.6.15.   ","type":"paragraph"},{"text":"填表人 1966年6月 日","type":"paragraph"}],"comments":[],"origin":"根据文件的原件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"广东文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"34db1eb2f4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
