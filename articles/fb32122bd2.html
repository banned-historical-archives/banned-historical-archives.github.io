art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"苏发努冯主席致电叶剑英委员长表示祝贺","authors":[],"parts":[{"type":"paragraph","text":"新华社讯 老挝人民民主共和国最高人民议会主席苏发努冯三月七日打电报给叶剑英同志，真诚地祝贺他担任人大常委会委员长。电报全文如下："},{"type":"paragraph","text":"北京"},{"type":"paragraph","text":"中华人民共和国全国人民代表大会常务委员会委员长"},{"type":"paragraph","text":"叶剑英同志："},{"type":"paragraph","text":"值此第五届全国人民代表大会第一次会议选举您为中华人民共和国全国人民代表大会常务委员会委员长之际，我谨以老挝人民民主共和国最高人民议会和我个人的名义，向您并通过您向常务委员会委员和兄弟的中国人民表示真诚的祝贺。"},{"type":"paragraph","text":"我谨祝您身体健康并祝英勇、勤劳的兄弟中国人民在把中国建设成为强大和现代化的社会主义国家的事业中取得更加巨大的新胜利。"},{"type":"paragraph","text":"祝我们老中两国人民之间已有的兄弟友谊和战斗团结关系日益发展和牢固。"},{"type":"paragraph","text":"老挝人民民主共和国最高人民议会主席 苏发努冯"},{"type":"paragraph","text":"一九七八年三月七日于万象"}],"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fb32122bd2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
