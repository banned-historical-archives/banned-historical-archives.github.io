":1972,"month":5,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"“我是毛主席的红小兵！”"},{"type":"paragraph","text":"一天，江西省上饶县五府山公社徐潭小学四年级学生姚金秋，发现田坎下面的草丛中，有一个红纸包。他捡起打开来一看，唷，原来是厚厚的一叠人民币！一数，整整一百零五元。小姚想起毛主席关于“毫不利己专门利人”的教导，决心就地等待失主。他站在路边，等呀等呀，等了好久，果然一个穿着草鞋的农民着急地找来了。"},{"type":"paragraph","text":"经过询问，姚金秋看他回答的符合事实，便把红纸包递给失主。"},{"type":"paragraph","text":"失主一点，正好一百零五元。他感动得一边说：“谢谢你，谢谢你。”一边抽出一张五元的人民币送给小姚作酬谢。小姚笑着说：“我如果要钱的话，就不会在这里等你那么久了。”那个失主又要带他到商店买一斤水果糖送给他，小姚也谢绝了。"},{"type":"paragraph","text":"小姚告别失主，继续往前走。失主连忙叫住小姚，紧紧握住他的手说：“你爸爸是谁，你叫什么名字？”"},{"type":"paragraph","text":"小姚挺挺胸，高声回答说：“我爸爸是共产党员，我是毛主席的红小兵。”说罢，沿着铺满山花的道路，蹦蹦跳跳地走了。"},{"type":"paragraph","text":"本报通讯员"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f1a70c4828"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
