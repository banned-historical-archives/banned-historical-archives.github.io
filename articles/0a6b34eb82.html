":1976,"month":5,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反击右倾翻案风斗争给上海市水球队带来了崭新面貌。"},{"type":"paragraph","text":"共产党员赵英华今年已经三十开外了，他是领队又兼运动员，训练和工作尽管很忙，但他始终站在这次反击右倾翻案风斗争的前列，带头学，带头批，既当指挥员，又当战斗员。全队运动员在他的带领下，坚持以政治统帅训练，成立了理论小组，贴出了一批又一批的大字报，深入批判党内最大的不肯改悔的走资派邓小平；同时做到三个“不减”，就是在运动期间，训练时间不减；出勤率不减，运动量不减。"},{"type":"paragraph","text":"反击右倾翻案风的斗争促进了训练工作。运动员的社会主义积极性被充分调动起来了，训练工作搞得热气腾腾。每人每天的游泳量从二、三千米增加到五千米；水上射门也从每天一百次左右增加到两百次左右。正因为无产阶级政治统帅了训练工作，这个队的运动水平有了一定提高。最近他们打了十场训练比赛，都打出了风格和水平，取得了一定的成绩。　(本报通讯员)"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0a6b34eb82"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
