968,"month":5,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"中国赫鲁晓夫竭力宣扬生产好就是政治好的反动谬论，他的罪恶目的就是叫我们工人陷入埋头搞生产，不问政治、不问阶级斗争的泥坑里去，好让他们一伙国民党反动派的代理人篡党、篡政、篡军，搞资本主义复辟。"},{"type":"paragraph","text":"过去，我受了中国赫鲁晓夫“生产好就是政治好”的反动思想的影响，认为我文化水平低，批判资产阶级是有文化的干部的事情，与我无关。学习了毛主席关于工人“也要批判资产阶级”的教导，认识到我们工人阶级是批判资产阶级的主力军，如果我们工人不去批判资产阶级，那么，资产阶级就要来专我们的政，劳动人民就要吃二遍苦。因此，我们一定要积极投入革命大批判，狠批中国赫鲁晓夫及其在厂里的代理人，把他们批倒批臭，叫他们永世不得翻身!"},{"type":"paragraph","text":"机修车间一工人"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b9e5de2b88"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
