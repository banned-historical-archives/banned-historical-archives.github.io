script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"关于商业资本家的剥削实质","authors":[],"dates":[{"year":1965,"month":7,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"《学术月刊》第七期发表姚家华、芮品轩的《商业资本家的剥削实质》一文，文中指出，“商业资本家和其他资本家一样，完全是靠剥削起家的，对广大无产阶级和劳动人民进行残酷剥削、掠夺，就是他的本质。”“商业资本家的利润来源和其它资本家一样，是建立在瓜分整个无产阶级所创造的剩余价值这一基础上的。”首先，“产业资本:家把工人的剩余价值的一部分分割给商业资本家，是通过商业资本家的商品售卖价格超过购买价格而实现的。商业利润的获得，决不是商品的价格高于价值以上，而是商业资本家在价值或是生产价格以下向产业资本家购买商品，却按商品的价值或生产价格出售。正是这样，商业资本家就和产业资本家一样，按照社会平均利润率和他的资本数量获得一定数量的平均利润，从产业资本家那里瓜分到整个无产阶级所创造的剩余价值的一部分。”另一方面，“商业资本家获得利润，又是和他对商业职工进行残酷剥削分不开的”。"},{"type":"paragraph","text":"文章分析说，商业职工中有一部分是从事运输、包装、保管等活动的，这种劳动“是生产过程在流通中的继续，这种劳动是生产性的，会增加商品的价值，从事这种劳动的劳动者与产业工人一样会创造价值和剩余价值。”除此之外，“一般说来，商业工资劳动者从事商品买卖的劳动是不生产价值的，当然也就不会直接为商业资本家创造剩余价值。”他们的劳动，“只是实现商品的价值和剩余价值。”“商业职工是工资劳动者，他们出卖自己的劳动力，商业资本家付给他们的工资和产业工人一样仅是劳动力的价值，商业职工的劳动力使用，也同产业工人一样不会为劳动力的价格所限制；因此他们的劳动日也可分为有偿劳动时间和无偿劳动时间两个部分。”“商业职工必须超过有偿劳动时间来进行劳动，以便实现商业利润。”“由此可见，商业资本家正是通过对商业工资劳动者这部分剩余劳动的剥削、无偿占有而实现他的商业利润和发财致富。”“在商业资本家看来，商业职工的无偿劳动也是一种‘生产’劳动，‘它对于资本，也是利润的源泉。’……因此，商业剥削的实质就在于:商业资本家依靠对商业职工无偿劳动的剥削、占有，来取得产业部门让渡给他的那部分剩余价值。”“既然如此，商业资本:家为了能攫取到更多的商业利润，就必然要力图通过延长劳动日、加强劳动强度、提高劳动生产率等办法，来加强对商业职工的剥削。”“还尽量千方百计的压低商业职工的工资，将他们的工资压低在劳动力价值之下。这样，他不仅剥削、占有了商业职工的无偿劳动，而且还对商业职工的一部分必要劳动加以剥削，以便攫取更多的商业利润。”"},{"type":"paragraph","text":"文章还指出，商业资本家“还通过各种欺诈的办法向广大消费者和小生产者进行剥削和掠夺，榨取他们的血汗以获得更多的利润。”“商业资本家还经常进行投机倒把、囤积居奇、哄抬物价以及克扣份量等等不法手段来牟取暴利。”“此外，商业资本家还对广大小生产者进行着残酷的剥削，掠夺他们的剩余生产物甚至一部分的必要生产物。”“平白地把农民辛勤劳动的果实作为他们的暴利。”“因此，对广大消费者和小生产者的残酷剥削、掠夺，是商业资本家发财致富攫取暴利的又一个重要来源。”"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"52309289eb"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
