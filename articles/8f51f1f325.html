<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"破除资产阶级教育思想!","authors":["朱英","王必辉"],"dates":[{"year":1958,"month":5,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"王必辉　朱英"},{"type":"paragraph","text":"编者按:上海市中小学整风运动进入了新的阶段。教师们正在自觉革命，决心破除资产阶级个人主义与资产阶级教育思想。向党交心，奔向红专。我们欢迎教师们将“交心”的体会写寄给本报。"},{"type":"paragraph","text":"上海教师进修学院的教师，在一年来的整风中间，受到了很大的教育和提高，挖掘了学校所存在的问题。"},{"type":"paragraph","text":"上海中学教师进修学院，顾名思义，也能知道它是为了提高中学教学质量而设立的。但是他们究竟为谁服务呢?"},{"type":"paragraph","text":"前些时期，这里最能引起人们兴趣的问题是进修学院的性质和方针任务，“我们究竟是不是大专学校?”“是不是正规的?”“为什么不和一师院、二师院一样?”“科学研究”“系统提高”等等。他们为什么争论这些问题呢?一个教师说出了真心话:“水涨船高嘛!进修学院是正规的大专学校，那我们就可以身价百倍了。”争论的目的原来在此。"},{"type":"paragraph","text":"为个人名利打算"},{"type":"paragraph","text":"院的方针是“面向实际、逐步提高”；而许多人执行的是“面向大专、系统提高”。在“面向大专、争取正规”的思想指导下，不少人把提高中学教学质量的任务忘记了。他们把教学工作放在次要的地位，各自为各自的名利打算。数学科有人说:“我过去上课马马虎虎，备课不当一回事，但热中于写稿、出小册子，以求个人名利双收。”地理科一位教师在检查中写道:“我是事不关己装作不知，积累资本努力做一个大专讲师。”另一位教地质学的教师竟希望“本院取消地质学这门课程，自己就可以调到二师院去了。”"},{"type":"paragraph","text":"要的不教，教的不要"},{"type":"paragraph","text":"由于许多教师存在着资产阶级的办学思想，又满脑子考虑个人名利，当然不可能把教学工作放在首要地位，造成了严重的“教”与“用”脱节的现象。许多教师不顾本院培养的对象是在职的中学教师，编写教材不与中学教材配合，而是向大专看齐，有的更原封不动地搬向大专讲义。在布置作业方面，不顾学员的需要与水平，有的题目大得惊人，简直可以做论文；有的开了一大堆参考书叫人不知从何下手阅读。如语文函授班在讲魏晋南北朝文学时，一次就开列了24种书，其中有许多迎教师自己也没有看过。教师只是想借此夸耀自己的渊博。有的教师上课讲到哪里就哪里，爱讲什么讲什么；主要的不谈，却谈次要的；需要的不讲，却讲了完全无用的。难怪学员的评论是“要的不教，教的不要”。更严重的是有些教师还在课堂上散布了资产阶级的反动观点。"},{"type":"paragraph","text":"文人相轻"},{"type":"paragraph","text":"进修学院有的教师在教学上是比较好的，也得到学员们的欢迎。如语文科、历史科有二位教师，他们是有值得学习的地方。但是有的人却说历史科的那位教师是“浅”。语文科上学期组织教师听李炎先生的课，要总结他的教学经验。在总结经验的会上，大家不谈有哪些好经验，却大谈其学术水平如何如何。"},{"type":"paragraph","text":"现在，教师进修学院的教师们正预备进一步搞臭资产阶级个人主义，彻底破除资产阶级教育思想，以便在红专道路上轻装前进，更好的为教育事业服务。"},{"type":"paragraph","text":"\u003cIMG alt=请插入4号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1958\\05\\585f031201.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e教育生活\u003c/FONT\u003e"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8f51f1f325"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
