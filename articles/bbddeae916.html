al-archives/banned-historical-archives8/main/maoquanji8.pdf"],"article":{"title":"地方武装集中与分散并用的原则","alias":"","parts":[{"type":"paragraph","text":"地方武装集中与分散并用的原则！！"},{"type":"paragraph","text":"（1936年7月23日）彭："},{"type":"paragraph","text":"关于地方武装集中分散问题："},{"type":"paragraph","text":"甲、地方武装分散与集中并用的原则，分散以到班为止，集中以到独立师为止，中间有排、连、团的各种形式，依照敌情及苏区巩固的程度而适宜配置之。在敌情严重及苏区尚未巩固之时，应偏重于分散配置。"},{"type":"paragraph","text":"乙、过去中央苏区与今年春季陕北苏区采取过于集中的配置，致使县、区、乡失去了自卫武力，县、区、乡的党与政府失去了指挥游击战争的能力，在敌人进攻时便变为不利于我们。"},{"type":"paragraph","text":"丙、陕甘宁新苏区在肃清团匪、防卫外敌活动、群众建立并巩固政权的任务面前，一般在一县之内或两县之内，特殊的在一区或两区之内，至少必须有一连一排或一班不等的自卫武装的配置。例如定安二县，其有散匪七、八股，因地方无武装，至今不能建立政权，工作员被匪杀者十人之多。"},{"type":"paragraph","text":"[1]这是毛泽东给红军第一方面军司令员、西方野战军司令员兼政治委员彭德怀的电报。"},{"type":"paragraph","text":"[2]团匪，对反动地主武装民团、靖卫团等的蔑称。"},{"type":"paragraph","text":"丁、请考虑独立师的分散配置及其他地方武装不过分集中的问题。"},{"type":"paragraph","text":"泽东"},{"type":"paragraph","text":"二十三日三时长征胜利到达陕北后的毛泽东和贺子珍。"}],"authors":["毛泽东"],"dates":[{"year":1936,"month":7,"day":23}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":535,"page_end":536},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bbddeae916"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
