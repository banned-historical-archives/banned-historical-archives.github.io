hubusercontent.com/banned-historical-archives/banned-historical-archives3/main/45f85d41-2767-49bc-87e9-ba331b429fce.pdf"],"article":{"title":"关于军队整训的指示——给林彪同志的信","alias":"","parts":[{"type":"paragraph","text":"同意。团结和服从都是有条件的，不是无条件的。"},{"type":"paragraph","text":"年纪大的、年纪中的、年纪小的也要“三结合”，不要看不起年轻人。二十几岁、三十几岁的人都能做工作。·搞“三结合”，要老中小，老的都会去见上帝的。"},{"type":"paragraph","text":"今年形势好，布粮还是要抓。社论要搞快一些。批判文章文字要短。彭、罗、陆杨可以提为反革命修正主义，其他人都称修正主义分子。中国的赫鲁晓夫在文章中提，在标题上要提。"},{"type":"paragraph","text":"×"},{"type":"paragraph","text":"x"},{"type":"paragraph","text":"x"},{"type":"paragraph","text":"大批判要慎重，要确实，要调查清楚。调查清楚，批判才有力量，否则就会一风吹。引他（指刘少奇）的话不能只顾头不顾尾。批判要站得佳。“托拉斯”这个名词，不能一概，主要他走本主义道路。有些旧名词要赋予新的意义。"},{"type":"paragraph","text":"“驯服工具论”要批判，但也要有无产阶级纪律。服从、团结，那是有条件的。今年形势好，布、粮还是要抓。社论要搞快一些。"},{"type":"paragraph","text":"彭、罗、陆、杨可以称为“反革命修正主义分子”，其他人称“修正主义分子”。：“中国的赫鲁晓夫，”文章中提，在标题上不要提。"},{"type":"paragraph","text":"x"},{"type":"paragraph","text":"x"},{"type":"paragraph","text":"x写文章要琢磨，要准确，要尖锐明确。"},{"type":"paragraph","text":"（1967年9月）关于军队整训的指示"},{"type":"paragraph","text":"给林彪同志的信"},{"type":"paragraph","text":"（一九六七年五月七日）林彪同志："},{"type":"paragraph","text":"各地军队都应整训一个短时期，时间10----14天为宜，已经整训过的，一个月或三个月再整训一次，全军三支两军人员，每一个月或两个月，都应整训一次，发扬成绩，纠正错误，以利再战。"},{"type":"paragraph","text":"对广州、湖南军区报告的批示"},{"type":"paragraph","text":"（一九六七年）一、现将广州、湖南军区报告两个文件，发给你们希望遵照执行。"},{"type":"paragraph","text":"二、是错误的必须改正，如果不改正，越陷越深，到头来还得改正，威信损失就大了。及早改正威信只能比以前高。"},{"type":"paragraph","text":"三、不能动动摇摇，犹犹豫豫，听老婆孩子从保守派那里来的错误话，信以为具。"},{"type":"paragraph","text":"·307·"}],"authors":["毛泽东"],"dates":[{"year":1967,"month":5,"day":7}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":320,"page_end":320},"tags":[{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"name":"湖南文革","type":"人物"},{"name":"三支两军","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"type":"文稿类型","name":"书信"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"53d4fb4290"},"bui
