<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"在反击右倾翻案风斗争的推动下  京郊菜区革命和生产景象旺盛","authors":[],"dates":[{"year":1976,"month":3,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"在反击右倾翻案风斗争的推动下"},{"type":"paragraph","text":"京郊菜区革命和生产景象旺盛"},{"type":"paragraph","text":"据新华社讯　北京近郊菜区广大干部和社员在回击右倾翻案风的伟大斗争中积极贯彻执行抓革命，促生产的方针，推动蔬菜生产迅速发展。从去年十一月到今年三月，郊区蔬菜不仅品种增多，而且产量预计比上年同期增长一倍。"},{"type":"paragraph","text":"随着首都市场对蔬菜的需要量不断增长，去冬今春，在北京市有关部门的统一安排下，郊区蔬菜种植面积比上年扩大了一千多亩。其中，温室增加了五千多间，塑料大棚增加了一千多个，阳畦增加了两万多个。全郊区还把五万多个老式阳畦改建成新式阳畦。仅这一项措施，就可增产新鲜蔬菜一千多万斤。为了保证去冬今春首都市场的鲜菜供应，京郊各区县还普遍加强了对大白菜的储存管理和计划上市的工作。去年初冬收获的大白菜和萝卜目前还在源源上市，充分供应。"},{"type":"paragraph","text":"现在，京郊菜区呈现出一派抓革命促生产的旺盛景象。广大干部、社员在对土豆、小白菜、小萝卜、洋葱、蒜等春菜进行适时栽种的同时，加强了蔬菜田间管理工作。历年四月是市场供应新鲜蔬菜的“小淡季”。为了使“小淡季”变为“小旺季”，菜区广大干部、社员正在积极采取多种措施，紧张地给三万多亩菠菜、韭菜等越冬根茬菜浇水、追肥，促使这些蔬菜加速生长，适时上市。同时，积极搞好早春风障小菜的生产。在低温情况下，他们在夜间用草帘覆盖菜畦，防寒保温，使蔬菜能提前在四月中、下旬上市。他们还积极抓好温室、阳畦和塑料薄膜覆盖的蔬菜生产。两万多间温室生产的黄瓜、西红柿，以及十多万个阳畦、五千多亩塑料薄膜覆盖生产的芹菜、油菜、菠菜、小萝卜等，已陆续上市。"},{"type":"paragraph","text":"京郊菜区各级党委在发展蔬菜生产的过程中，引导广大干部和社员坚持社会主义道路，积极开展两个阶级两条道路的斗争，不断批判“自由种植”、“看价上市”等资本主义倾向，提高为革命种菜的自觉性。菜区各社队积极按照中共北京市委提出的蔬菜生产要保面积、保数量、保品种、保时间、保质量的要求，认真落实今年的蔬菜生产计划，确保全年蔬菜的生产和供应。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"093e0741a2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
