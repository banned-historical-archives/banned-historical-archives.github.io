script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"努力活学活用毛泽东思想　发扬敢于斗争的革命精神北加里曼丹人民武装在战斗中迅速成长","authors":[],"dates":[{"year":1969,"month":12,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京二十六日电　“马来亚革命之声”电台二十四日发表文章指出:“由北加里曼丹人民优秀儿女所组成的北加里曼丹人民革命武装，几年来克服重重困难，英勇战斗，沉重地打击了敌人，为北加里曼丹人民的民族解放事业作出了重大的贡献。”"},{"type":"paragraph","text":"文章说:“北加里曼丹人民的革命组织，遵循毛主席关于‘革命的中心任务和最高形式是武装夺取政权，是战争解决问题。’的教导，明确地宣布，坚决走武装斗争的道路，以暴力革命摧毁帝国主义及其走狗的反动暴力统治，建立一个新民主主义的北加里曼丹。”"},{"type":"paragraph","text":"文章说:北加里曼丹人民革命武装，努力活学活用毛泽东思想，充分发扬敢于斗争，敢于胜利的革命精神，放手发动和紧密依靠各族群众，狠狠地打击了拉赫曼—拉扎克集团和印度尼西亚苏哈托集团的反动军队的“围剿”。他们经过艰苦奋斗和大量消灭了敌人的有生力量之后，建立了游击区和根据地，这些游击区和根据地正在日益巩固和扩大。人民武装遵循伟大导师毛主席关于“从战争学习战争”的伟大教导，利用一切有利时机，勇敢地和敌人展开激烈的战斗，认真总结战斗经验，逐步提高了自己的战斗力。"},{"type":"paragraph","text":"文章说:“近几年来，北加里曼丹人民革命武装进行过多次出色的战斗，打得敌人狼狈不堪。”"},{"type":"paragraph","text":"文章说:“为了对付这支战斗力强的年青的人民游击队，拉赫曼一拉扎克集团和印度尼西亚苏哈托集团在帝国主义的指使下，互相勾结，动用了成万反动武装力量，连续在边区进行军事‘围剿’。”文章说，敌人的反革命“围剿”，都以失败告终。"},{"type":"paragraph","text":"文章说:“北加里曼丹人民革命武装牢记毛主席关于建设人民军队的伟大教导，大抓战士的思想政治工作和对群众的宣传工作，特别重视组织他们学习毛主席的著作，活学活用毛泽东思想。在敌人的白色恐怖下，他们克服了物质上和技术上的种种困难，大量翻印《毛主席语录》和《毛泽东著作选读》，为战士们和革命群众用毛泽东思想武装自己的头脑，提供了有利条件。毫无疑问，这些红色宝书，将在北加里曼丹人民的革命工作中，成为推翻英帝和拉赫曼一拉扎克集团的法西斯统治和争取北加里曼丹人民革命胜利的有利武器。”"},{"type":"paragraph","text":"文章说:“北加里曼丹人民革命武装的迅速成长，使拉赫曼—拉扎克集团和苏哈托集团怕得要死，恨得要命，为了挽回他们的败局，他们在帝国主义的指使和支持下，加紧勾结，准备大搞所谓联合‘围剿’。但是可以肯定，敌人妄想扑灭北加里曼丹人民的武装斗争烈火的一切阴谋，是注定要失败的。北加里曼丹人民绝对不会被敌人的嚣张气焰所吓倒，他们必将以更猛烈的、持久的进攻，来有力地回击敌人，粉碎敌人的一切阴谋。”"},{"type":"paragraph","text":"文章最后指出:“北加里曼丹人民从自己的切身经验中，已经深刻地体会到，只有在无产阶级的领导下，团结全国各族人民，坚持走武装斗争的道路，发扬艰苦奋斗、自力更生的革命精神，和敌人展开针锋相对的斗争，才能取得民族解放斗争的胜利。”"},{"type":"paragraph","text":"“北加里曼丹人民的斗争是正义的，最后胜利一定属于北加里曼丹人民!”"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"148a9d8f85"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
