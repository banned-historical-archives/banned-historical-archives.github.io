script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"坚决克服右倾保守思想","authors":["王湘浩"],"dates":[{"year":1959,"month":9,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"坚决克服右倾保守思想"},{"type":"paragraph","text":"吉林大学数学系主任　王湘浩"},{"type":"paragraph","text":"党的八中全会的文件是一盏照路明灯。经过核实的去年工农业产量，切实而具体地证明了大跃进所取得的成就是史无前例的。和工农战线一样，科学文教事业在去年的大跃进中也取得了巨大的成就。经过学术思想批判，扭转了理论脱离实际的资产阶级学术道路，群众性的大搞科学研究，大大加速了我国科学发展的进程。工厂、农村大办学校，学校大搞劳动生产和科学研究实行教育革命。这一系列的群众运动使党的教育方针开始得到贯彻。尤其重要的是，在科学文教事业上党的绝对领导加强了，这是我国科学文教事业健康飞跃发展的根本保证。"},{"type":"paragraph","text":"半年以来，在科学文教工作者的队伍中，有个别人产生了右倾保守情绪，怀疑大跃进的成绩。我是从事科学文教工作的人，我认为我们必须坚决克服右倾保守思想，同时加速进行思想改造，坚决响应党所提出的开展一个轰轰烈烈的增产节约运动的号召，向全国劳动人民看齐，使自己的工作切实跃进一步。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"教育革命","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"27b674a76f"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
