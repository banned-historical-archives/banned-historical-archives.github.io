者嘴脸","authors":[],"dates":[{"year":1960,"month":9,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社哈瓦那20日电】　古巴“今日报”18日就铁托参加联合国大会这件事发表评论，揭露铁托现代修正主义集团为它的美国主子效劳的丑恶嘴脸。"},{"type":"paragraph","text":"评论说，“铁托是美国人的朋友，这是铁托自己经常宣称的，艾森豪威尔每当有机会时也总是这样声称的。”"},{"type":"paragraph","text":"评论说，“帝国主义为了自己的目的使用了千百万美元，把这笔钱大方地交给南斯拉夫。”评论指出，铁托和艾森豪威尔“为这个臭名远扬的关于社会主义科学理论的修正主义者得到三十多亿美元这一点而大肆吹嘘”，而铁托得到的这笔钱是美国最近允诺给予拉丁美洲国家的五亿美元“援助”的六倍。评论说，“要了解这个巴尔干国家究竟发生了什么事，只要想一想这点就够了。”"},{"type":"paragraph","text":"评论谴责铁托集团“破坏国际社会主义的团结”。它说，“因此，铁托得到国务院的垂青。国务院促使它同土耳其订立联盟，而土耳其同时又同美国有联盟关系，这样南斯拉夫就间接地同侵略性的北大西洋公约组织联系在一起。”"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"37ee0b12c8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
