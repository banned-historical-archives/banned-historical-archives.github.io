art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"永远和工农群众相结合","authors":["某军医大学学习毛主席著作积极分子/五好学员史有来"],"parts":[{"type":"paragraph","text":"我怀着无限兴奋的心情参观了抗大校史展览，受到一次最深刻、最生动、最活的毛泽东思想教育。"},{"type":"paragraph","text":"以毛泽东思想为办校思想，以阶级斗争为主课，一面学习，一面生产，一面战斗，实行教育与生产劳动相结合，理论与实际相结合，使知识青年的思想迅速得到转变，这是抗大最宝贵的经验。"},{"type":"paragraph","text":"一九六五年十月，我参加农村社会主义教育运动，正赶上“三秋“大忙季节，挑了一天稻子，第二天肩膀又红又肿，全身酸疼。还挑不挑？还能不能挑？在思想激烈斗争的时候，我想起毛主席的教导：“你要群众了解你，你要和群众打成一片，就得下决心，经过长期的甚至是痛苦的磨练”，认识到自己正面临一场考验，拿起扁担便出发了。扁担压在肩上，象针扎一样。但是思想上一“硬”，力气也足了。就这样，我一直坚持参加了“三秋”劳动，肩上磨去了一层皮，但思想上却增加了劳动人民艰苦奋斗的优秀品质，革命意志也受到了一次锻炼。"},{"type":"paragraph","text":"在劳动中，我们同贫下中农建立了深厚的阶级感情。老贫农李阿全夫妇象对待自己的亲儿子一样关怀我们：让出床铺，自己去睡门板；一有空，就给我们讲家史；劳动时，手把手地教我们；夜里悄悄地给我们送来地瓜、米糕。有一次，老妈妈送来两个包子，第二天一看，我们没有吃，气急地说：“毛主席要我们互相关心，互相爱护，互相帮助，你存心要老妈妈不听毛主席的话？”几句话说得我心里热呼呼的，使我激动得热泪盈眶。"},{"type":"paragraph","text":"在与工农群众相结合的道路上，我刚刚迈出第一步。今后，我一定以抗大学员为榜样，读毛主席的书，听毛主席的话，照毛主席的指示办事，彻底改造思想，树立无产阶级世界观，长期地、无条件地和工农群众结合在一起，在人民解放军这所毛泽东思想的大学校里，把自己锻炼成为一个坚强的无产阶级革命事业接班人。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"de0175edad"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
