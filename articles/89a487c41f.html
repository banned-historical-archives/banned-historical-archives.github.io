ical-archives/banned-historical-archives8/main/maoquanji23.pdf"],"article":{"title":"陈谢军七月中旬开始向榆林方向出击","alias":"","parts":[{"type":"paragraph","text":"陈谢军七月中旬开始向榆林方向出击!]"},{"type":"paragraph","text":"（1947年6月20日）陈、谢："},{"type":"paragraph","text":"你纵务于月底结束休整，不再延长，午东由谢韩（陈赓二十五日动身先来中央）率领，由现地出发，午灰前后在绥德集结完毕，午弩开始向榆林方向出击。准备以二十天左右时间，各个歼灭三十六师之二十八旅（两个团），邓宝珊3之新十一旅（两个团），左世允之八十六师（三个团），并相机夺取神、府、榆、横等地，然后与边区野战军协同向南出击。在你们攻榆林期间，彭习则打宁马\"十八师（三个旅），收复定盐"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"已贺"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军委起草的给晋冀鲁豫野战军第四纵队司令员陈和政治委员谢富治的电报。"},{"type":"paragraph","text":"[2]谢，指谢富治。韩，指韩钧，当时任晋冀鲁豫野战军第四纵队副司令员。[3]邓宝珊，当时任国民党军晋陕绥边区总部总司令。[4]左世允，当时任国民党军晋陕绥边区总部第二十二军军长。[5]神、府、榆、横，指陕西神木、府谷、榆林和横山。[6]宁马，指宁夏马鸿逵，当时任国民党政府主席西北行辕副主任。[7]定盐，指陕西定边和宁夏盐池。"}],"authors":["毛泽东"],"dates":[{"year":1947,"month":6,"day":20}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":94,"page_end":94},"tags":[{"name":"谢富治","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"89a487c41f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
