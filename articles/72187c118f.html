:[],"dates":[{"year":1952,"month":5,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"为了纪念即将到来的五四青年节，本报邀请了在五反运动中有过贡献的青年同学开了一次座谈会。在这次座谈会上，出身资产阶级家庭的青年同学，一致认为他们在五反运动中受到一次深刻的阶级教育。在这次斗争中，一面和自己的资产阶级家庭划清界限，另一面更认识了工人阶级的大公无私。因此，要求努力学习，做一个毛主席的好学生。他们认为纪念五四青年节最好的办法是认真学习、努力提高自己、时刻准备着为祖国服务。他们认为学习不仅仅是为了自己，而是为了祖国，个人的前途是和祖国美好的前途相结合的。已有的一些成绩不仅不应该自满，而且应该更进一步的发挥五反运动中的斗争精神，督促资产阶级家庭做好退款和生产工作，争取五反运动的彻底胜利。他们说:要在任何环境下经得起考验，把这种精神应用到学习和工作中去。"},{"type":"paragraph","text":"下面是座谈会的记录:"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"72187c118f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
