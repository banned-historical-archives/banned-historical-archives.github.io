art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东思想具有伟大国际意义","authors":[],"parts":[{"type":"paragraph","text":"新华社东京二十三日电 日本记者会议主席小林雄一二十二日对中国记者发表谈话，盛赞毛泽东思想伟大的国际和国内意义。"},{"type":"paragraph","text":"小林说，毛泽东思想得到了真正进行反对帝国主义和殖民主义、争取民族独立和解放的人民的支持。"},{"type":"paragraph","text":"小林不久以前访问了中国，并且参加了在北京举行的亚非新闻工作者协会书记处第四次全体会议。"},{"type":"paragraph","text":"在谈到中国人民掀起学习毛泽东思想的高潮时，小林说，在美帝国主义扩大侵略战争的危险日益增大和现代修正主义与之加紧勾结的情况下，中国人民掀起了把毛泽东思想掌握在自己手里的运动，是一件具有历史意义的大事。"},{"type":"paragraph","text":"小林高度评价中国工农兵群众大学毛主席著作的热潮。中国的劳动人民通过学习认识到，如果不把毛泽东思想学到手，就不能建设他们所希望的社会主义。小林说，他们在工作中和生产活动中碰到了问题，就向毛主席著作求教，就从毛主席著作中寻找正确的世界观和思想方法。"},{"type":"paragraph","text":"小林指出，毛主席关于人民战争的思想，贯彻到中国的每个角落。他说，他在上海郊区的人民公社看到女民兵的住处挂着枪，在北京的少年文化宫看到孩子们做国防体育表演，看到中国人民广泛地进行民兵训练。他说，这一切都使他感到中国人民对美帝国主义扩大侵略战争的阴谋早就做好了准备，他们随时准备迎击和打败来犯的敌人。"},{"type":"paragraph","text":"小林说，这一切都表明，中国人民从苏联出现修正主义和资本主义在苏联复辟的事件中吸取了教训，中国人民今天正在毛泽东思想指导下进行社会主义文化大革命。他说，在中国这样一个大国要建设社会主义是一个非常艰巨的事业。只有把社会主义革命进行到底，才能走向共产主义。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"人民战争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"35d7ddee9f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
