院","郝少卿"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"郝少卿的言论","type":"title"},{"text":"西北师范学院郝少卿","type":"authors"},{"text":"1．“匈牙利事件是革命不是反革命，不是革命的话为什么有那么多人参加，应客观的看问题，看看《人民日报》，也应该看看资产阶级的报纸，铁托的看法是客观的。”","type":"paragraph"},{"text":"2．“在农村中自由发展，愿意怎样进行就怎样进行。”","type":"paragraph"},{"text":"3．“社会主义不见得好，资本主义不见得坏，因为世界上还有很多资本主义国家，他们还不是一样生活吗？”“官僚主义是社会主义制度的产物。”“旧社会是罪恶的根源，难道现在的三害不是罪恶的根源吗？”“现在社会上有四等人和元代社会一样，共产党、干部第一等，青年团员第二等，民主党派第三等，群众第四等，我自己是被压迫的人。”","type":"paragraph"},{"text":"4．“历史上有那个时代像共产党杀人杀的这么多，尽杀了些老百姓。”","type":"paragraph"},{"text":"5．“统购统销搞糟了，把老百姓的粮食弄光了，假若整风运动在河南开展的话，老百姓一定要把共党全部杀光。”“我说这话就代表河南老百姓。”","type":"paragraph"},{"text":"6．“没有共产党人家也不会卖国，我认为这是正确的，国民党也可以领导中国人民，不过领导的不好些罢了，共产党领导不会卖国你能保证吗？”","type":"paragraph"},{"text":"7．“党员团支部委员不能参加班会研究工作，这是干涉，宪法上没有规定。青年团为什么要领导青年，它为什么把青年包办了？”","type":"paragraph"},{"text":"8．反革命分子投炸弹于北京医学院党委书记住处后，他说“这人太笨了，杀一个党委书记有什么了不起。”","type":"paragraph"},{"text":"9．“人民大学培养的学生分布到全国各地当特务。”","type":"paragraph"},{"text":" 来源：《香花乎？毒草乎？(2)》（西北师范学院反右斗争委员会，1957年7月6日）。","type":"paragraph"},{"text":"","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d99b89d5dc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
