art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"让毛泽东思想永远占领教育阵地","authors":["北京部队步校无产阶级革命派"],"parts":[{"type":"paragraph","text":"在无产阶级文化大革命取得决定性胜利的凯歌声中，我们最最敬爱的伟大领袖毛主席发出了最新的战斗号令：“进行无产阶级教育革命，要依靠学校中广大革命的学生，革命的教员，革命的工人，要依靠他们中间的积极分子，即决心把无产阶级文化大革命进行到底的无产阶级革命派。”我们满怀着对伟大领袖毛主席无限热爱、无限忠诚、无限信仰、无限崇拜的阶级感情，认真学习和认真领会这一具有极其深远意义的伟大指示。"},{"type":"paragraph","text":"毛主席关于教育革命一系列的重要指示，为我们进行无产阶级教育革命指明了方向，规定了无产阶级教育革命最根本的道路，是我们进行无产阶级教育革命最强大的武器。中国赫鲁晓夫及其代理人彭德怀、罗瑞卿，疯狂反对毛主席的无产阶级教育路线，竭力兜售修正主义的所谓“系统性”、“完整性”，贩卖资产阶级军事第一、技术第一的黑货，妄图实现其复辟资本主义的罪恶阴谋。我们无产阶级革命派决心坚决贯彻执行伟大领袖毛主席的最新指示，团结全校革命师生员工，发扬敢想敢闯的无产阶级彻底革命精神，坚决肃清资产阶级军事路线和资产阶级教育路线的恶劣影响。我们要以毛主席的“五·七”指示为最高纲领，批判以中国赫鲁晓夫为代表的修正主义教育路线，继承和发扬“抗大”的光荣传统，遵照毛主席实践、认识、再实践、再认识的教导，彻底改革旧的教育制度、教学方针和教学方法，让毛泽东思想永远占领教育阵地。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"教育革命","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3ea714d0c1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
