:["西藏军区"],"dates":[{"year":1968,"month":6,"day":7}],"is_range_date":false,"parts":[{"text":"西藏军区给西藏“造总”的公开信","type":"title"},{"text":"西藏军区","type":"authors"},{"text":"拉萨革命造反总部的同志们：","type":"appellation"},{"text":"我人民解放军驻拉萨警备区部队，为了给驻财经大院驻军运送给养，保证驻军正常的战备工作，于上午进入该院。革命群众本应协助我们搞好这一工作，但该院的“造总”下属群众在少数坏人的挑拨下，对我部队开枪打手榴弹，打伤我干战数名，并毒打抓走我警备区司令员石板樵同志，还抓走我干战数名，我们认为这是严重的政治事件，你们应立即放回石板樵同志和被抓走的我干部战士，并要立即交出凶手。","type":"paragraph"},{"text":" 中国人民解放军西藏军区一九六八年六月七日十六时二十五分","type":"paragraph"},{"text":"来源：《风雷激战报》  西藏自治区无产阶级革命派大联合造反总指挥部主编  第七十期  1967年6月10日","type":"appellation"}],"comments":[],"origin":"《风雷激战报》　西藏自治区无产阶级革命派大联合造反总指挥部主编　第七十期　1967年6月10日","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"西藏文革","type":"人物"},{"name":"革命大联合","type":"主题/事件"},{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b8c19cf5f5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
