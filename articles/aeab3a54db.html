hors":["关锋"],"dates":[{"year":1966,"month":8,"day":4}],"is_range_date":false,"parts":[{"text":"关锋给北京师范大学少数派谭厚兰等同学的信","type":"title"},{"text":"关锋","type":"authors"},{"text":"（林杰电话转述）","type":"appellation"},{"text":"谭厚兰等同志：","type":"appellation"},{"text":"昨天晚上邀你们谈后，给你们提了一些意见，对不对请你们考虑。你们最近一些作法有些缺点和错误，这不要紧，昨天我说过，不要灰心丧气，我们按照毛主席教导，坚持真理，修正错误。如果有人抓你们的缺点和错误不放，不要怕，要顶着。你们首先起来揭发黑帮分子程今吾，首先起来批评孙友渔为首的工作组，这样一个革命的行动任何人也是抹煞不了的。当然，你们要象毛主席教导的那样虚心向群众学习，我赞成你们展开大辩论。以上意见请你们参考。","type":"paragraph"},{"text":" 关锋66年8月4日晚","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"关锋","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"aeab3a54db"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
