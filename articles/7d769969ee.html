art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"叶剑英委员长会见卢森堡大公让和夫人","authors":[],"parts":[{"type":"paragraph","text":"新华社九月二十六日讯 人大常委会委员长叶剑英今天晚上在人民大会堂会见了卢森堡大公让和夫人殿下。卢森堡副首相兼外交、外贸和合作大臣加斯东·托恩等贵宾参加了会见。"},{"type":"paragraph","text":"叶剑英委员长对大公让和夫人第一次来中国访问表示热烈欢迎。他说，中、卢建交后，两国关系发展良好。大公让说，正因为如此，我们在最好的季节来到中国访问。他非常感谢叶委员长会见他们。"},{"type":"paragraph","text":"会见以后，叶剑英委员长、李先念、耿飚、康世恩副总理，阿沛·阿旺晋美副委员长等，同大公让和夫人等贵宾一起合影留念。"}],"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7d769969ee"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
