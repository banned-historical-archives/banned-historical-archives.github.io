script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"资产阶级艺术日趋没落  美英猩猩联合“画”展大受吹捧","authors":[],"dates":[{"year":1958,"month":1,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"资产阶级艺术日趋没落"},{"type":"paragraph","text":"美英猩猩联合“画”展大受吹捧"},{"type":"paragraph","text":"新华社29日讯　苏联“苏维埃文化报”最近发表了一篇通讯，报道了英国伦敦现代艺术研究所和美国洛杉矶举办的所谓猩猩绘画展览会。"},{"type":"paragraph","text":"大家知道，不久前西方世界传遍了一个耸人听闻的消息，说是西方绘画界出现了一个新的“天才”——巴尔的摩公园里的黑猩猩别特西。这个美国猩猩的成功和荣誉引起了伦敦现代艺术研究所一些人的忌妒。于是西方又出现了一个“艺术大师”——伦敦动物园的黑猩猩刚果。"},{"type":"paragraph","text":"为了决定哪个猩猩应得首位的光荣，有人出了一个主意，主张举办一个联合展览会。这个展览会最近竟煞有介事地在堂而皇之的伦敦现代艺术研究所举行了。会上共展出了三十六幅猩猩的“创作”。许多参观展览会的人还津津有味地大谈其猩猩创作上的“个人”风格的发展，它们的“卓越的特点”以及它们对现代艺术的影响。"},{"type":"paragraph","text":"伦敦现代艺术研究所副所长阿洛维还在广播电台发表了他对展览会的观感。这位“学者”说，“问题在于，我们并不知道到底什么是艺术。对什么是艺术，我们各有各的看法，看法的一致是不存在的。”"},{"type":"paragraph","text":"意味深长的是，这个研究所最后对这些“作品”的荒唐估价，它认为，它们是“整个绘画艺术史上唯一真正的抽象艺术作品”。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9e037de58a"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
