:1976,"month":8,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"炉前工段　任孟国"},{"type":"paragraph","text":"玩弄戏法的人为了迷惑观众，使自己的把戏免遭戳穿，往往求助于障眼法。在邓小平授意炮制的《论总纲》里居然也把这种戏法玩得娴熟。"},{"type":"paragraph","text":"《论总纲》兜售“三项指示为纲”的修正主义纲领，大肆鼓吹唯生产力论。但他们很明白唯生产力论那种声名狼藉的境遇，于是，马克思主义的词句便成了他们用以障眼的“法宝”。请看，《论总纲》在论述政治与经济的关系时，一口气引用了毛主席和列宁的三段语录，还煞有介事地说什么:“如果我们忽视了理论学习，忽视了政治的统帅作用，我们的一切工作就一定要走到邪路上去”，对唯生产力论的批判“是完全正确的，完全必要的。现在要批判，今后也还要继续批判”。又引语录又发誓，其意在于要人们相信:文章对唯生产力论如此嫉恶如仇，他们是决不会去鼓吹它的。其实，这恰恰是用以障眼的烟幕，是耍花招，变戏法，是企图藏起狐狸尾巴，隐藏自己的原形。在这烟幕的掩护下，货真价实的唯生产力论如同那五彩缤纷的肥皂泡，一串接着一串地被吹了出来:什么“一听到要抓好生产，搞好经济建设，就给人家戴上‘唯生产力论’的帽子，说人家搞修正主义”；什么我们中国共产党人“要对生产负责”等等。真是集唯生产力论黑货之大成。《论总纲》全文从所谓实现“四个现代化”开头，又以实现“四个现代化”为结束，还把“全党全国各项工作”统统归结为“一切为了现代化”，总之，都要“围着这个转”。这是何等典型的唯生产力论鼓吹者的嘴脸1明明是修正主义谬论，却要披一件马克思主义的伪装。他们曾经得意洋洋地说过:“有许多东西，把主席的话引来，一下子就站住脚了”:无情的事实是，不管他们怎样引用马克思主义的语录，还是要露出自己的马脚，在光芒四射的毛主席的重要指示面前，邓小平一类走资派再次现了修正主义的原形。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2876e79cb7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
