rt":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"深入批判“四人帮” 增强法制观念","authors":["韩纪民/王传义/王怀刚"],"parts":[{"type":"paragraph","text":"本报讯 沈阳部队后勤某部紧密联系实际认真学习新宪法，大张旗鼓地表彰遵纪守法的好人好事，对违法乱纪的人进行必要的纪律处分，加强了干部战士的法制观念，提高了遵纪守法的自觉性。"},{"type":"paragraph","text":"过去，由于“四人帮”极力扇动无政府主义，把遵纪守法诬蔑为“奴隶主义”，把违法乱纪吹捧为敢“反潮流”，搞乱了人们的思想。这个部队有的同志受到影响，法纪观念淡薄，组织纪律性减弱，有的甚至违法乱纪，使部队建设受到损失。在这次学习中，他们以新宪法和叶副主席关于修改宪法的报告为武器，深入批判“四人帮”破坏社会主义法制的谬论和罪行，针对部队在遵纪守法等方面存在的问题，在全部队广泛开展了组织纪律大检查。党委发动大家边学、边批、边改，大力宣扬遵纪守法的好人好事，对违法乱纪的人进行批评教育，并实行必要的纪律处分。科长焦中洲入伍二十多年来，勤勤恳恳、兢兢业业地为党工作，模范遵守国家的政策、法令和部队的纪律。当组织决定他转业以后，他坚决服从分配，不但仍然坚持做好本职工作，而且还亲手编写业务教材，把自己工作中积累的经验传授给有关同志。对这样的一些好同志，部队党委在干部党员大会上进行了表彰，号召大家向他们学习。有一个干部和一个战士严重违犯了革命纪律，为教育本人和部队，他们发动群众对这两个人进行严肃的批评教育，并分别给予了纪律处分。通过大力表彰先进，严肃处理违法乱纪的人和事，伸张了无产阶级正气，打击了资产阶级歪风，部队出现了以遵纪守法为荣、以违法乱纪为耻，人人争当遵纪守法模范的好风尚。"},{"type":"paragraph","text":"（韩纪民、王传义、王怀刚）"}],"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"name":"反潮流","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"963c6305f2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
