见英雄并亲切交谈","authors":[],"dates":[{"year":1967,"month":12,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　英雄四排和支左爱民模范李文忠同志的先进思想、先进事迹，已成为上海无产阶级革命派、红卫兵小将、解放军指战员、革命干部和革命群众学习的好榜样。连日来，从井冈山旁来到上海的英雄四排代表们，向工人、贫下中农、解放军战士、学生，介绍了英雄四排和李文忠同志闪耀着毛泽东思想无比光辉的英雄事迹，对促进上海人民活学活用毛主席著作起了极大的鼓舞作用。"},{"type":"paragraph","text":"昨天晚上，上海市革命委员会举行座谈会，工厂、商店、学校和革命群众组织的代表们，和英雄四排的战友们一起，畅谈活学活用毛主席著作和“斗私，批修”的体会。市革委会负责人张春桥同志和革委会的其他领导成员参加了座谈会，张春桥同志接见了英雄四排的同志们，并和大家进行了亲切的交谈。"},{"type":"paragraph","text":"张春桥同志说，英雄四排的代表这次到上海来报告英雄事迹，是对上海的无产阶级革命派和广大革命群众巨大的支持，深刻的教育。英雄四排和李文忠同志不愧是伟大领袖毛主席和林副主席亲手培养出来的好战士，是全党、全军、全国人民的学习榜样。他们的光辉思想，最突出地表现了他们对伟大领袖毛主席无比的热爱，无比的忠诚。他们对红卫兵小将热诚关怀，对革命左派坚决支持。他们的光辉榜样将推动上海人民的工作和斗争。张春桥同志代表上海市革命委员会和上海人民向英雄四排的同志们表示感谢，并请他们转达对江西革命派和革命人民的亲切问候。"},{"type":"paragraph","text":"上海的工厂、学校和革命群众组织的代表，满怀着对英雄四排和李文忠同志极大的崇敬，热烈地向代表们介绍了他们如何联系实际，努力学习英雄四排和李文忠同志的光辉榜样，活学活用毛主席著作，抓好革命的大联合和革命的三结合，以及有关斗私批修的经验和体会。大家表示决心象英雄四排和李文忠同志那样，破私立公，言行一致，真正做到“毛主席热爱我热爱，毛主席支持我支持，毛主席指示我照办，毛主席挥手我前进。”"},{"type":"paragraph","text":"代表们介绍了六○一一部队在支左爱民工作中的宝贵经验。他们把一切成绩都归功于伟大领袖毛主席，归功于战无不胜的毛泽东思想。他们表示，要更高地举起毛泽东思想伟大红旗，加倍努力学习毛主席著作，紧跟毛主席的伟大战略部署，誓为争取无产阶级文化大革命更大的胜利而贡献出更大的力量。"},{"type":"paragraph","text":"英雄四排的代表们将在今天离开上海，和上海的革命派和革命人民告别。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"张春桥","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"name":"军队支左","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e56cb22f6a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
