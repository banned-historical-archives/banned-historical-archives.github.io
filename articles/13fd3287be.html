script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji20","name":"毛泽东全集第20卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji20.pdf"],"article":{"title":"中国只能走和平一条路","alias":"","parts":[{"type":"paragraph","text":"中国只能走和平一条路！"},{"type":"paragraph","text":"（1945年10月8日）"},{"type":"paragraph","text":"这次来渝，首先感谢蒋?先生的邀请与四十多天的很好的招待，感谢今晚的主人张文白?先生设了这样盛大的宴会，也感谢所有今天到会的各界人士。"},{"type":"paragraph","text":"这次商谈，全国的人民、全世界的友人与各同盟国的政府都很关心，因为商谈不是仅仅关于两党，而是与全国人民的利害有关的问题。商谈的情况如张先生所说，是可以乐观的。在东、西法西斯打倒以后，世界是光明的世界，中国是光明的中国。近三十年间，世界经历了两次大战，第二次大战的性质与第一次不同，在这次战争中，世界与中国都有了迅速的进步。现在的商谈的目的，是要实现和平建国。中国今天只有一条路，就是和，和为贵，其他的一切打算都是错的。商谈是在友好空气中进行，没有得到协议的问题，相约继续由商量来解决，而不用其他的方法解决。和平、民主、团结，在和平、民主、团结的基础上实现统一，这个方针，符合于全国人民的要求，也符合全世界人士与同盟国政府的要求。和平与合"},{"type":"paragraph","text":"[1]这是毛泽东离开重庆前在张治中举行的欢送宴会上的演说。[2]蒋，指蒋介石。[3]张文白，即张治中，字文白，当时任国民党政府军事委员会政治部作应该是长期的。大家一条心，不作别的打算，作长期合作的计划。全国人民、各党各派一致努力几十年，在蒋主席的领导下，彻底实现三民主义，建设独立、自由、富强的新中国！"},{"type":"paragraph","text":"不能否认，困难是有的，不指出这一点是不好的。中国人民的面前现在有困难，将来还会有很多困难，但是中国人民不怕困难，国共两党与各党各派团结一致不怕困难，不管困难有多大，在和平、民主、团结统一的方针下，在蒋主席领导下，彻底实现三民主义的方针下，一切困难都是可以克服的。"},{"type":"paragraph","text":"1945年10月8日，毛泽东在张治中举行的欢送会上讲话。"}],"authors":["毛泽东"],"dates":[{"year":1945,"month":10,"day":8}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":405,"page_end":406},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"13fd3287be"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
