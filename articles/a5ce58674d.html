art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"发动群众打倒无政府主义不上阶级敌人当驻通化市师范学校军训组帮助革命师生大办学习班，加强组织纪律性，树立革命委员会的领导权威","authors":["史亭/武阳/久武"],"parts":[{"type":"paragraph","text":"本报讯 三○一○部队驻通化市师范学校军训组，认真贯彻毛主席的“三·七”指示，通过大办毛泽东思想学习班，狠抓阶级斗争教育，帮助革命师生克服无政府主义，树立革命委员会的领导权威。现在，全校革命师生在校革命委员会的领导下，革命的组织纪律性大大加强，呈现出一片团结、紧张、严肃、活泼的革命景象。"},{"type":"paragraph","text":"这个学校在今年一月建立了校革命委员会以后，由于无政府主义思潮的影响，有些同学在课堂上坐不住，有的不请假外出，有的请了假逾期不归，影响了复课闹革命。驻校军训组反复学习了毛主席的“三·七”指示，建议革命委员会举办毛泽东思想学习班，积极引导革命师生清除无政府主义思潮的影响，加强革命的组织纪律性。"},{"type":"paragraph","text":"学习班刚一开办，军训组首先帮助革命师生学习了林副主席的指示：“革命，也得革自己的命。不革自己的命，这个革命是搞不好的。”启发大家认识，过去大方向正确，对无产阶级文化大革命作出了贡献，这是好的；但是不能吃老本，要立新功。接着，列举了阶级敌人利用无政府主义破坏毛主席伟大战略部署、破坏文化大革命的种种事实，使革命师生认识到，资产阶级、小资产阶级派性和无政府主义是一根藤上的两个毒瓜，都是无产阶级文化大革命的大敌！"},{"type":"paragraph","text":"在这个基础上，军训组的同志又同革委会成员一道，深入群众，调查研究，联系学校两个阶级、两条路线斗争的实际，发动群众对无政府主义的危害进行控诉。二年四班有一位同学，过去是革命造反派的头头，由于在文化大革命中受了“怀疑一切，打倒一切”思潮的影响，不能正确对待干部。一次，他主持对一个革命干部的错误进行批判，校外一个混进革命群众组织的坏分子，立刻给他写了一份材料，叫嚣什么不打倒这个革命干部“死不瞑目”！这位同学没有识破敌人的阴谋，当场宣读了这份进行阶级报复的反动材料，上了敌人的当。在控诉无政府主义的反动罪行时，他痛心地说：“伟大领袖毛主席对我们红卫兵寄托了无限的信任和希望，可是我被无政府主义迷住了心窍，给阶级敌人当了炮筒子，怎么能对得起毛主席他老人家呢！”活生生的阶级斗争事实，使革命师生看清了无政府主义的反动本质，大大提高了觉悟。他们说，无政府主义是中国赫鲁晓夫及其所推行的资产阶级反动路线的一支别动队，只有彻底把它打倒，才能建立无产阶级的领导权威。通过控诉，革命师生同仇敌忾，口诛笔伐，使无政府主义变成了人人喊打的过街老鼠。（史亭、武阳、久武）"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"派性","type":"主题/事件"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a5ce58674d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
