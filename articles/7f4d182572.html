<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"毛主席关于打歼灭战的思想，是对林彪鼓吹“消耗战”、“击溃战”的有力批判，也是夺取革命战争胜利的保证。革命样板戏《平原作战》就是一曲——歼灭战思想的胜利颂歌","authors":["泓渊"],"dates":[{"year":1974,"month":12,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"上海师大文艺系　泓渊"},{"type":"paragraph","text":"在革命现代京剧《平原作战》中，我八路军排长赵勇刚为了配合山区的反“扫荡”，率领一支游击队，深入敌后与武装的人民群众一起，把张牙舞爪的侵略军打得落花流水，这个戏生动地展现了人民必胜、侵略者必败的历史规律，显示了毛主席的歼灭战思想的巨大威力。"},{"type":"paragraph","text":"“战争的目的不是别的，就是‘保存自己，消灭敌人’”。只有大量地消灭敌人，才能有效地保存自己。歼灭战，就是以歼灭敌人的有生力量为主要目标，通过不断消耗敌人，壮大自己，逐渐改变敌强我弱的形势，直到最后战胜敌人。要达到这一目的，就必须遵照毛主席的指示:“集中优势兵力”，打歼灭战。《平原作战》就是反映了毛主席这一军事思想的好戏。"},{"type":"paragraph","text":"戏一开始，敌寇龟田凭着他多年的所谓作战经验，为了“扫除后顾之忧”，调动兵力，反复“清剿”，妄图一举把游击队消灭干净。面对着当时敌我力量对比十分悬殊的形势，赵勇刚既不搞那种脱离群众、独来独往的“流寇主义”；也不搞那种不顾客观条件，一味硬打硬拼的所谓“短促突击”。而是遵照毛主席关于“集中优势兵力，各个歼灭敌人”的军事原则，用计把龟田引出中心炮楼，“趁它内部空虚，集中兵力，造成局部优势，白天行动，出敌不意，拔掉中心炮楼”，取得了智取炮楼的辉煌胜利。不难设想，如果按照林彪所鼓吹的打“击溃战”、“消耗战”那一套去搞，和敌人硬挤硬打，那就不但不能取得这一胜利，相反正中龟田的奸计，使我军遭到很大的损失和伤亡。"},{"type":"paragraph","text":"要歼灭敌人的有生力量，还必须充分发挥我军和人民群众血肉相连这一优点，打游击战，打运动战，“力求在运动中歼灭敌人”，而不以固守某个地方为目的。革命现代京剧《平原作战》用形象、通俗的语言，总结了灵活机动的运动战术:“鬼子多，和他转；鬼子少，和他干；鬼子驻下我扰乱”。这样，把敌人搅得晕头转向，而我军正好在运动中造成有利条件，并且抓住机会，一举歼灭敌人。你看!敌寇到马庄，我军到张庄；敌寇到张庄，我军又到了中心炮楼；敌寇大杀回马枪，我军又给他来个声东击西，袭击县城，真可谓“神出鬼没，飘忽不定”，搅得龟田只能象一匹耳聋眼瞎的野牛冲入火阵，四处碰壁，无可逃遁。而赵勇刚正是充分发挥人民战争的威力，高度发挥主观能动性，出其不意，攻其不备，获得全胜的。如果按照林彪所鼓吹的谬论去办，势必在赵勇刚下山立足未稳之时，就被敌寇扼杀。由此可见，林彪所鼓吹的什么“消耗战”、“击溃战”，都是同毛主席的运动战、歼灭战思想完全背道而驰的。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"林彪","type":"人物"},{"name":"人民战争","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7f4d182572"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
