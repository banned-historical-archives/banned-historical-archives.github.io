:[{"year":1957,"month":6,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编者按:毛主席今年2月27日在最高国务会议上的讲演，作了若干补充，已于昨天公开发表了。这个历史性的文件，是用辩证唯物主义和历史唯物主义理论的透彻性和洞察力，高度地概括了我国当前的矛盾性质、斗争情况以及有关政治生活中的许多重大问题，并且教导我们在新形势下，应该怎样掌握马克思主义的立场、观点、方法；用什么样的标准来分析问题，明辨是非，解决矛盾，以适应新社会的需要。这是我们当前必须认真学习的一篇经典著作，希望大家把学习体会心得寄给我们。今天特先刊登五位同志的笔谈。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"人民内部矛盾","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d4ee95aea7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
