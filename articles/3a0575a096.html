,"dates":[{"year":1970,"month":7,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反对垄断资产阶级的剥削"},{"type":"paragraph","text":"澳大利亚炼油和港口运输工人罢工"},{"type":"paragraph","text":"据新华社十五日讯　墨尔本消息：澳大利亚的炼油厂工人和主要港口的装箱运输工人最近举行罢工，反对垄断资产阶级的剥削和压迫。"},{"type":"paragraph","text":"约一千名炼油厂的维修工人从十三日起举行不定期罢工，要求增加工资和改善劳动条件。罢工工人还在悉尼举行了抗议集会。"},{"type":"paragraph","text":"这次罢工已使澳大利亚八家主要炼油厂中的五个厂被迫关闭，悉尼等城市的成百个汽车加油站陷于瘫痪，澳大利亚的工业生产也将受到严重影响。"},{"type":"paragraph","text":"澳大利亚主要港口的一千六百名装箱运输工人从十四日起也举行不定期罢工，要求增加工资。这次罢工，严重地影响了全国装箱船运货物的进出口。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3a0575a096"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
