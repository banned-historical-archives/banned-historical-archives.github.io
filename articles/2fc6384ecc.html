:1968,"month":11,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"这个建议符合毛泽东思想"},{"type":"paragraph","text":"农村学校到底应该由谁来办？这是一个根本性的问题。多少年来，刘少奇推行了一整套反革命修正主义教育路线，千方百计不让我们贫下中农办学。他们打着“全日制”、“正规化”的破旗，扼杀民办小学，把广大农村小学办成了脱离三大革命运动的“世外桃源”，造成了学校与贫下中农的对立。"},{"type":"paragraph","text":"公办学校下放到大队来办，就可以保证农村教育大权最彻底地掌握在贫下中农手中，真正把学校教育和三大革命运动紧密结合起来，从而培养出无产阶级革命事业的可靠接班人。"},{"type":"paragraph","text":"公办学校下放到大队来办，也为教师队伍的思想革命化创造了极为有利的条件。过去，不少教师中了叛徒、内奸、工贼刘少奇的毒，虽然身在农村，可是看不起贫下中农，不能全心全意为贫下中农服务。贫下中农派进学校的教师李雪梅深有体会地说：有一次，我到一位贫农大娘家里去，大娘热情得很，她用油煎饺子招待我，我再三推让，她非要我吃不可。她说：“你是咱贫下中农派去的教师，我才实心实意地要你吃，要是那些和咱不一心的，我就不让了。”"},{"type":"paragraph","text":"关于侯振民、王庆余同志提出的一些具体办法和说明这些办法的好处，我们基本上同意。但按照我们大队实际情况，似应有些变通的做法。这就是："},{"type":"paragraph","text":"一、西山大队的学生中，除农民子女外，有相当大一部分是职工的子女。据初步计算，西山大队范围内的学校经费，每年大约在三万元到四万元之间，如果全部下放到大队负担，就有些过重。我们建议，各地应按照不同的具体情况，采取民办公助的办法解决。"},{"type":"paragraph","text":"二、教师记工分后，生活实在有困难的，应当同贫下中农一样，由大队给予帮助解决。如果按教师原工资水平补助，仍然脱离贫下中农，不利于教师的思想改造。北京四季青公社西山大队贫下中农管理学校委员会"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2fc6384ecc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
