,"dates":[{"year":1953,"month":7,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"海南黎族苗族自治区成立一周年纪念大会"},{"type":"paragraph","text":"向毛泽东主席致敬"},{"type":"paragraph","text":"据新华社讯：广东省海南黎族苗族自治区人民政府于七月三日在乐东县布由市举行自治区成立一周年纪念大会。"},{"type":"paragraph","text":"大会主席海南黎族苗族自治区人民政府委员胡国珍（黎族）致开会词。他概述了自治区成立一年来在政治、经济、文化、卫生等方面所获得的成绩。他要求全体黎族、苗族人民在毛主席和中国共产党的领导下，和各族兄弟一道向着美好的未来继续前进。"},{"type":"paragraph","text":"到会群众热烈欢迎领导海南岛各族人民进行二十多年革命斗争的冯白驹副主席讲话。冯白驹传达了中共中央华南分局和广东省人民政府对黎族苗族人民的关怀，并赞扬黎族、苗族人民的革命精神和自治区一年来的各项成就。他说，自治区的面貌已逐步改观了，各族人民已开始了幸福的生活，这是和毛主席的关怀、各族人民的努力分不开的。"},{"type":"paragraph","text":"冯白驹和广东省人民政府工作团团长谭天度代表广东省人民政府赠送大批毛巾、肥皂等礼物给到会的黎族、苗族人民。"},{"type":"paragraph","text":"纪念大会在欢呼声中通过了向毛主席、中国人民志愿军的致敬电后结束。"},{"type":"paragraph","text":"大会向毛主席致敬电的电文如下：敬爱的毛主席："},{"type":"paragraph","text":"在海南黎族苗族自治区成立一周年的日子，我们谨代表全区二十七万黎族、苗族人民向您——我们最敬爱的领袖和导师致以最崇高的敬礼和衷心的感激。"},{"type":"paragraph","text":"一年来，由于您和中央人民政府的无限关怀和汉族干部的耐心帮助，自治区贫穷落后的历史面貌已大为改观。目前，全区社会秩序空前安定，民族团结日益加强，农业生产、文化教育、卫生等事业都获得迅速发展。因而各族人民的生活已普遍改善，全区到处呈现一片欣欣向荣的新气象。我们永远不能忘记历代反动统治阶级的滔天罪恶。他们把我们赶到深山峻岭，荒无人烟的穷乡僻壤，使我们世世代代过着饥寒交迫的日子。国民党反动派以灭绝人性的野蛮手段，屠杀了我们数以千万计的同胞。他们企图以屠杀来制服我们。但是在中国共产党的英明领导下，经过长期斗争，终于取得了胜利，从而开始了黎族、苗族人民历史的新纪元。"},{"type":"paragraph","text":"敬爱的毛主席：我们深深地感到我们今天的幸福，是和您的名字分不开的，是和您伟大光辉的民族政策分不开的。您的名字是鼓舞我们前进的无穷力量。我们坚决向您保证：我们今后将继续发扬革命传统，永远团结在您和共产党的周围，为巩固祖国的国防和建设光辉灿烂的祖国而努力不懈。"},{"type":"paragraph","text":"最后，祝您万寿无疆。"},{"type":"paragraph","text":"广东省海南黎族苗族自治区成立一周年纪念大会一九五三年七月三日"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bf9381502a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
