组织精干、合理、效率高","authors":[],"dates":[{"year":1982,"month":11,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"叶剑英徐向前聂荣臻对全军后勤工作指示"},{"type":"paragraph","text":"抓好组织体制改革适应现代战争需要"},{"type":"paragraph","text":"要使后勤组织精干、合理、效率高"},{"type":"paragraph","text":"新华社北京11月18日电　在今天开幕的全军后勤工作会议上，总后勤部部长洪学智传达了中央军委副主席叶剑英、徐向前、聂荣臻对军队后勤工作的指示，要求全军后勤各级干部努力学习，不断提高业务水平，以适应军队建设和现代战争的需要。"},{"type":"paragraph","text":"叶剑英、徐向前、聂荣臻是最近在分别听取总后勤部领导人的工作汇报时作这些指示的。他们指出，我军的后勤工作，从战争年代到社会主义建设时期都起到了重大的作用，这是后勤工作的光荣。这几年后勤工作做得也是好的，为部队解决了不少问题。后勤业务是一门科学。现代战争对后勤提出了越来越高的要求。后勤工作的作用将越来越大，地位越来越重要，甚至在一定条件下决定战争的胜败。"},{"type":"paragraph","text":"叶剑英、徐向前、聂荣臻指出，我军的后勤工作必须加强，关键要抓好后勤的组织体制改革，使之精干、合理、效率高。他们要求各级指挥员都来关心和重视后勤工作，希望后勤战线的干部在党的十二大精神鼓舞下，更加奋发起来，不失时机地扎扎实实做好工作，为国防现代化作出更大的贡献。"},{"type":"paragraph","text":"中央军委常务副主席杨尚昆到会讲了话。他说，开创军队建设新局面，应该有个具体规划，这样全军上下就有了共同的奋斗目标。希望这次会议能讨论制定出一个开创后勤工作新局面的规划来。"},{"type":"paragraph","text":"总参谋长杨得志、总政治部主任余秋里出席了大会。杨得志在会上讲了话。"},{"type":"paragraph","text":"总后勤部政委王平主持了今天的大会。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"杨得志","type":"人物"},{"name":"聂荣臻","type":"人物"},{"name":"徐向前","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"41ac18cc40"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
