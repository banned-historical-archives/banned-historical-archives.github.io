script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反对垄断资本的剥削和压迫　反对腐朽的资产阶级教育制度  意大利群众斗争浪潮日益高涨","authors":[],"dates":[{"year":1968,"month":10,"day":31}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反对垄断资本的剥削和压迫　反对腐朽的资产阶级教育制度"},{"type":"paragraph","text":"意大利群众斗争浪潮日益高涨"},{"type":"paragraph","text":"据新华社二十九日讯  罗马消息：意大利人民反对垄断资产阶级的剥削和压迫的群众斗争的浪潮日益高涨。意大利南部二十多个省的工人最近接连举行总罢工，要求提高工资和充分就业。意大利许多城市的学生也纷纷罢课，举行示威游行并占领学校，反对腐朽的资产阶级教育制度，抗议反动当局镇压学生运动。"},{"type":"paragraph","text":"意大利的整个撒丁区，以及西西里区的阿格里琴托、卡尔塔尼塞塔、卡塔尼亚、恩纳和拉古扎省的工人二十八日举行总罢工，使意大利南部广大地区陷于瘫痪状态。工人们在这两个区的许多城市举行了群众集会和示威游行，反对意大利垄断资本的残酷剥削，抗议日益严重的失业状况。"},{"type":"paragraph","text":"在西西里区的首府巴勒莫，几十名被无理解雇的工人二十八日还占领了区政府工业部的建筑物，以表示抗议。"},{"type":"paragraph","text":"与此同时，意大利学生掀起了新的斗争的浪潮。在西西里区的墨西拿，学生们二十八日占领了墨西拿大学，并举行了三千人的群众大会，抗议警察闯入校园破坏学生的集会。为了声援大学生的正义斗争，墨西拿的中学生举行了罢课。在西西里区的阿格里琴托，五千学生同日举行罢课和游行，抗议反动当局无理逮捕十名学生。在撒丁区的萨萨里，学生们举行了抗议集会并散发传单，抗议学校当局无理勒令六十名学生停学。"},{"type":"paragraph","text":"在意大利的首都罗马，在意大利南部的福贾和克罗托内，以及意大利北部的里米尼、曼图亚和波伦亚，学生们最近也纷纷起来集会、罢课、占领学校、并举行示威游行，反对反动当局镇压学生运动，要求保证学生在校内集会的权利。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8199a99099"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
