s":[{"year":1949,"month":9,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社布拉格二十五日电】　英国共产党总书记波立特致电毛主席祝贺中华人民共和国的成立，电文如下:"},{"type":"paragraph","text":"亲爱的毛同志:当此中华人民共和国成立的时候，我谨致我个人的祝贺之意。我可以向你保证，我们将在我们的能力范围以内尽一切努力，巩固我们两国人民坚强和持久的良好关系。如果在任何时候，在你们面前的伟大任务当中，你觉得我们能对你和贵党有所帮助时，我们将设法帮助你们，并将以此为荣。谨致衷心贺忱。"},{"type":"paragraph","text":"你的亲如兄弟的哈利·波立特(签字)"},{"type":"paragraph","text":"一九四九年九月二十二日"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"48354d0d78"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
