" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"广东省南海县乡村干部对合作化运动的态度","authors":[],"dates":[{"year":1955,"month":10,"day":6}],"is_range_date":false,"parts":[{"text":"广东省南海县乡村干部对合作化运动的态度","type":"title"},{"text":"【广东分社六日讯】广东省南海县乡村干部对合作化运动的态度。","type":"paragraph"},{"text":"据南海县九月召开的建社扩干会议到会乡村干部九百四十四人的统计，原贫农成份干部八百七十六人中，仍处于贫农生活的占百分之四十六点七，升为新下中农的占百分之三十九点六，升为新上中农的占百分之十三点七。原中农成份的六十八个干部，有一户下降为贫农，三十七户成为下中农，三十户是上中农。这些干部由于经济地位不同，对合作化的态度也不同。会上，积极拥护合作化的有九百多人，占百分之八十二点七；本身有顾虑，态度不够坚决的占百分之十五点九；抵触情绪较大的占百分之十点四。","type":"paragraph"},{"text":"抵触情绪大的都是上中农或原是贫农已上升为上中农的。如容州乡乡长陈启原来是贫农，现在上升至上中农生活水平。他有养淡水鱼鱼苗的技术，赚钱多，一直对互助合作不积极。去年冬，乡里办了社，他才勉强加入了互助组。这次他对合作化运动的思想抵触更大，区里给该乡九个社的任务，他在各村都安上了点，就是自己的村没安上。别人问他时，他说：“人少，没有互助基础，大家的生活都过得很富裕，不用办社了。”这些生活上升富裕的干部具体表现：一般是不愿入社，在建社工作上是严重的右倾思想，反映富裕农民的情绪，甚至出现依靠中农，排斥贫农的现象。（河星据中共南海县委办公室材料编）","type":"paragraph"}],"comments":[],"origin":"新华社《内部参考》1955年10月11日","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b85c960afb"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
