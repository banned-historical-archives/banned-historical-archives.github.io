"year":1966,"month":5,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编者按:庄家富同志写的《用毛泽东思想武装自己的头脑》和周信礼同志写的《谈谈大城市卖西瓜的哲学问题》这两篇文章，竟被某些所谓“权威”指责为“庸俗化”、“实用主义”的典型。周信礼同志特写了文章，以生动的事实，有力地驳斥了这些谬误的论点。上海市乒乓球队的部分教练和运动员们也在最近举行了座谈会，对这个荒谬的指责进行了批判。凡是一切反对毛泽东思想的谬论，不管他是多大的“权威”，我们都要有勇气批判它，打倒它。我们要高举毛泽东思想的伟大红旗，更加努力活学活用毛主席著作，敢想、敢说、敢闯、敢做、敢革命。"},{"type":"paragraph","text":"\u003cIMG alt=请插入5号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1966\\05\\665p010101.JPG\"\u003e"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0ee57a74ec"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
