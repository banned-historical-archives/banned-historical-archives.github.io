{"year":1974,"month":11,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席派我守西沙　（外一首）"},{"type":"paragraph","text":"向明毛主席派我守西沙，南海深处把根扎，一顶帐篷撑蓝天，五尺钢枪映彩霞。海涛为我擂战鼓，白云常把刺刀擦，烈日喷焰风吹火，炼我红心钢骨架。日随海鸥巡领海，夜伴涛声守哨卡，五星红旗心中飘，万丈狂澜踩脚下！毛主席派我守西沙，西沙就是我的家，门前栽棵英雄树，火红青春永开花！我爱家乡白玉石，更爱宝岛金银沙；我爱西沙甘泉水，胜过家乡云雾茶。拣来彩贝镶金字，说出战士心里话：“党是母亲军是家，永随红旗守天涯！”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8fbac39e81"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
