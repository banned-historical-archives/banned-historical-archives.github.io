tart":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"永远按照毛泽东思想去战斗","authors":["北京部队学习毛主席著作积极分子代表大会代表？战士","王万旗"],"parts":[{"type":"paragraph","text":"“东方红，太阳升。”毛主席就是红太阳，红太阳的光芒暖心房。当我见到伟大领袖毛主席神采奕奕，满面红光，健步向我们走来的时候，我的热血沸腾，热泪盈眶，不知有多少心里话想对毛主席讲。"},{"type":"paragraph","text":"毛主席呵，毛主席！是您亲自领导中国革命，推翻了压在劳动人民头上的三座大山，把我们穷人从苦海中解放出来，成为新社会的主人翁。毛主席呵，毛主席！是您亲自发动和领导了史无前例的无产阶级文化大革命，使我国无产阶级的江山，永远保持了鲜红鲜红的颜色。毛主席呵，毛主席！是您的光辉思想哺育我不断成长，在无产阶级文化大革命的阶级斗争风浪中，使我懂得了革命的真正意义。我深深地体会到：只有按照您指引的方向前进，才能从胜利走向胜利；只有按照您的光辉思想去战斗，才能无坚不摧，攻无不克；只有按照您制定的革命路线前进，才能永保江山万代红。"},{"type":"paragraph","text":"我们最最敬爱的伟大领袖毛主席，您永远是我心中最红最红的红太阳。我向您宣誓：今后要加倍活学活用您的光辉著作，用您的光辉思想武装头脑，狠斗“私”字，猛批“修”字，用“只争朝夕”的革命精神，实现思想革命化，永远握紧手中的枪和笔，为保卫、巩固无产阶级的红色政权，更加英勇地去战斗！"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9f741f00b8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
