art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席和革命群众心连心","authors":["五好战士王列成"],"parts":[{"type":"paragraph","text":"看了《毛主席是我们心中的红太阳》这部影片，我对以毛主席为代表的无产阶级革命路线的认识更加深刻了。特别是看到毛主席两次走过金水桥，来到群众中间，就好像毛主席在朝着我们走来，我的心里热呼呼的。毛主席和革命群众心连着心，毛主席最了解广大革命群众的心情。史无前例的无产阶级文化大革命，就是毛主席群众路线的光辉体现。而以党内最大的走资本主义道路的当权派为代表的资产阶级反动路线，却害怕革命，镇压革命的群众运动，长资产阶级的志气，灭无产阶级的威风。现在，亿万革命人民奋起向党内最大的走资本主义道路的当权派猛烈开火，这是毛主席的无产阶级革命路线的伟大胜利。我们要高举无产阶级的革命的批判旗帜，彻底批判党内最大的走资本主义道路的当权派。"},{"type":"paragraph","text":"（五好战士 王列成）"}],"alias":""},"tags":[{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"48ba335ba9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
