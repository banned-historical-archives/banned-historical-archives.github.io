" crossorigin="">{"props":{"pageProps":{"books":[{"id":"173b340b-3108-4ae1-be57-d3fa78bb471a","name":"毛泽东思想万岁（1943-1949卷）（1968年武汉版）","internal":true,"official":false,"type":"pdf","author":"1968年5月，钢二司武汉大学总部、中南民院革委会宣传部、武汉师院革委会宣传部","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives3/main/173b340b-3108-4ae1-be57-d3fa78bb471a.pdf"],"article":{"title":"我们是能够克服困难的","alias":"","parts":[{"type":"paragraph","text":"代表大会准备条件。：一侯条件成熟，现在方式的各界人民代表会郎可执行人民代表大会的职权，成为全市的最高权力机关，选举市政府。以北平的情况来，大豹几个月后就可以这样做了。这样的利盒很多，希望代表们加紧准备。"},{"type":"paragraph","text":"毛主席号召全北平的人民，除了国民党反动派的残余及其潜伏的特务分子以外，“致团结起来，为克服困难，建设人民的首都而奋斗。"},{"type":"paragraph","text":"（《人民日报》一九四九年八月十四日）电复榔屿侨胞"},{"type":"paragraph","text":"（一九四六年八月七日）"},{"type":"paragraph","text":"贵会厌恶内战，呼吁和平，所提各填主张，均切中利，称卓藏。课独立民主和平，为擎党战后建国之湛本方针，而解决当前危机局面，应停止内战，重开政治协商，一切筝端均以政治方式解决；而好战分子不此之图，致内战继续扩大，时局日趋严重。彝党将与海外侨胞与全国人民一致努力，挽此时局，并本和平民主方针奋斗到底。"},{"type":"paragraph","text":"（原戴管冀鲁豫《人民日报》-一九四六年八月十日第一版）我们是能克服困难的"},{"type":"paragraph","text":"（一九四九年八月一日）"},{"type":"paragraph","text":"我们是能够克服困难的，不管什么样的困难也不怕，人民解放军的二十二年的斗争史给了我们这样一种经验和信心，只须共产党、人民解放军和全国人民明自己所遇困难的性，坚决地执行克服困难的各填根本政策，我们就能达到目的。"},{"type":"paragraph","text":"注：这是为新华社《我们是能够克服困难的》所写的-毁。"},{"type":"paragraph","text":"在中国人民政协第一属全体会上的开幕司"},{"type":"paragraph","text":"（一九四九年九月二十一日）位代麦先生们，全国人民所渴望的政治协商会现在开幕了。"},{"type":"paragraph","text":"我们的会包括六百多位代表，代表着全中国所有的民主党派，人民团体，人民解放军，各地区，各民族和国外华侨。这就指明，我们的会是一个全国人民大团结的会。"},{"type":"paragraph","text":"这种全国人民大团结之所以能够成功，是因为我们战胜了美国帝国主义所援助的国民党反动政府。在三年多的时间内，英勇的世界上少有的中国人民解放军，战胜了美国援助的国民党反动政府所有的数百万军队的进攻，并使自已转入反攻和进攻。现在，数百万人民解放军的野战军已经打倒接近台湾、广东、广西，贵州、四川和新疆的地区去了，中国人民的大多数已经获得了解放，反对了自已的敌人，取得了基本的胜利。在这个基础上，召开了今天的人民政治协商会。"},{"type":"paragraph","text":"我们的会之所以称为政治协商会，是因为三年以前我们会和蒋介石国民党一道开过一次政治协商会。·那次会的结果是被蒋介石国民党及其帮凶们破坏了，但是已在人民中留下了不可磨灭的印象。那次会明，和帝国主义的走狗蒋介石国民党及其帮凶们一道，"}],"authors":["毛泽东"],"dates":[{"year":1949,"month":8,"day":1}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":122,"page_end":122},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ddb638853e"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
