uthors":["东北工学院马列主义教研室"],"dates":[{"year":1957,"month":11}],"is_range_date":false,"parts":[{"text":"报刊摘录：在“坏事能否变成好事”问题上的右派言论","type":"title"},{"text":"东北工学院马列主义教研室","type":"authors"},{"text":"施蛰存(华东师大)辩证法不合东方民族的心理和习惯。中国人看问题习惯于有一个绝对标准，不能既说对，又说不对。(文汇7．16)","type":"paragraph"},{"text":"龙英华(北大学生)龙英华在作自我批判的时候，把他所干的一切坏事都说成是好事，而且说他原来就是明知故犯，就是故意要作一件坏事，然后让它转化成好事的。龙英华认为这就是辩证法。(批判右派分子谭天荣等论文集)","type":"paragraph"},{"text":"谭天荣(北京大学学生)毛主席说坏事在一定条件下可以转化为好事，毛主席说在一定条件下这是错误的，坏事一定要转化成好事。(批判右派分子谭天荣等论文集)","type":"paragraph"},{"text":"李伯球(农工民主党副秘书长)从个人主义出发的“无情打击”的坏事也会变成好事。(人民6．5)","type":"paragraph"},{"text":" 来源：《右派言论选辑》，社会主义思想教育参考资料之二，东北工学院马列主义教研室编，1957年11月。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"43622c2de3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
