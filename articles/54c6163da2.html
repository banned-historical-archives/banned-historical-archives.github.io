art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"牢记毛主席的教导 掌握阶级分析的方法","authors":[],"parts":[{"type":"paragraph","text":"《人民日报》、《解放军报》社论《芙蓉国里尽朝晖》传达的毛主席的最新指示，最深刻地揭示了文化大革命的阶级内容，是我们向阶级敌人发起不停顿地进攻的战斗命令。"},{"type":"paragraph","text":"毛主席早就指出：“帝国主义者和国内反动派决不甘心于他们的失败，他们还要作最后的挣扎。”无产阶级文化大革命越是接近全面胜利，党内一小撮死不悔改的走资派和社会上的牛鬼蛇神，越是要作垂死的挣扎。他们必然要施展更加阴险、更加狡猾、更加毒辣的手段，妄想夺回他们失去的“天堂”。这是阶级斗争的必然规律。"},{"type":"paragraph","text":"不久前，我们在黑龙江省东方红矿局支左。这个局的无产阶级革命派掌权后，有的同志阶级斗争观念淡薄了，产生了松懈情绪。被打倒的走资派和没有改造好的地、富、反、坏、右分子，认为有机可乘，互相勾结起来，大搞反革命阴谋活动。他们打着“关心职工福利”的幌子，又刮起一股反革命经济主义妖风，妄图颠覆新生的革命委员会。我们和革命委员会的同志一起学习毛主席关于阶级和阶级斗争的教导，识破了阶级敌人的阴谋，发动群众，彻底揭露阶级敌人的阴谋，揪出了兴风作浪的坏家伙。接着，我们又帮助革命委员会深入开展革命大批判，对这些坏家伙进行了坚决的斗争，从而教育了广大群众。"},{"type":"paragraph","text":"今天，我们反复学习了毛主席的最新指示，深刻地体会到：在无产阶级专政条件下，无产阶级同资产阶级的阶级斗争，是极其尖锐、复杂的。我们要牢记毛主席的教导，用毛主席关于阶级和阶级斗争观点，分析一切、对待一切，识破阶级敌人的一切反革命阴谋。我们一定要时刻不忘阶级斗争，提高革命警惕性，和广大无产阶级革命派、革命群众战斗在一起，不停顿地向阶级敌人进攻，不获全胜，决不收兵。"},{"type":"paragraph","text":"黑龙江伊春驻军活学活用毛主席著作先进集体某部无线电排"}],"alias":""},"tags":[{"name":"黑龙江文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"军队支左","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"54c6163da2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
