year":1996,"month":10,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"《毛泽东方法论导论》简评"},{"type":"paragraph","text":"中国社会科学院哲学所李景源主编，李为善、陈中立等同志参加撰写的《毛泽东方法论导论》一书，原先由当代中国出版社于一九九三年出版，现应广大读者的要求又重印出版。该书对毛泽东方法论的基本要素、体系结构和形成发展，作了深入细致的研究，从而有助于人们科学把握马克思主义哲学的精神实质，为更好地开展马克思主义哲学研究提供了科学方法。"},{"type":"paragraph","text":"该书通过系统地研究证明，矛盾分析法在毛泽东方法论体系中占有核心和基础的地位，是毛泽东方法论的主要内容；实事求是的方法实际上就是主体和客体、主观和客观的矛盾分析法；群众路线方法是领导和群众、集中和民主的矛盾分析法；阶级分析法是阶级矛盾的分析法；等等。不懂得矛盾分析的理论和方法，就不可能正确理解和掌握毛泽东方法论。"},{"type":"paragraph","text":"该书还对毛泽东方法论形成和发展的主客观条件作了深入的研讨，用毛泽东同志的大量的原话或实例，系统地阐发了毛泽东同志许多精彩的、独到的见解和方法，诸如所谓辩证分析就是分析事物的矛盾；做综合工作时不要陷于狭隘的经验论；要用分析和综合的方法从整个事物中抽出问题来作分析，再加以综合；按照从“为什么”到“怎么办”、从理论到方法的逻辑次序，形成成套思想；所谓辩证逻辑就是对立统一、内部联系、主要矛盾和次要矛盾的区别等；逻辑是从历史中来的，要把问题当作一定历史条件下的历史过程去研究；等等。这些思想方法，能帮助读者提高理论思维能力，叫人终生受益。"},{"type":"paragraph","text":"（元伟）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"84243fa8f8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
