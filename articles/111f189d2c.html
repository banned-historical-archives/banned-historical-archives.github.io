script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"阿《团结报》斥修正主义为美国民主党帮腔美国民主党和共和党是一丘之貉 决不能对约翰逊之流抱任何幻想","authors":[],"dates":[{"year":1964,"month":9,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社地拉那11日电　阿尔巴尼亚《团结报》今天在一篇关于美国大选的评论中说，人们在读现代修正主义者的报刊时得到一种印象，好象美国民主党同共和党有极大的区别，好象如果民主党获胜的话，国际舞台上的事情将会很好，和平将得到维护和加强。现代修正主义者把约翰逊说成是“理智的”人，并且吹捧约翰逊的民主党的纲领对现实有“明智看法”。他们的这种作法有利于美国执政的民主党，目的在于为他们向美帝国主义靠拢、妥协、让步的对外政策辩护。"},{"type":"paragraph","text":"这篇题为《两个党、两个纲领、两个候选人、一个政策》的评论说，事实上，美国两党同样仇视共产主义，仇视社会主义国家。两党在根本问题上的利益是十分吻合的。因此对任何人——无论是约翰逊还是其他人，都不能抱有任何幻想。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"111f189d2c"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
