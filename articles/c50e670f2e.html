<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"首都工人集会欢迎阿尔巴尼亚工会代表团  中阿人民在反帝反修正主义斗争中胜利前进","authors":[],"dates":[{"year":1964,"month":6,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"首都工人集会欢迎阿尔巴尼亚工会代表团"},{"type":"paragraph","text":"中阿人民在反帝反修正主义斗争中胜利前进"},{"type":"paragraph","text":"据新华社六日讯　首都一千多工人今晚集会，热烈欢迎以阿尔巴尼亚工会中央理事会书记索蒂尔·坎伯里为首的阿尔巴尼亚工会代表团。阿尔巴尼亚的同志们由全总副主席马纯古、书记处书记狄子才和北京市总工会副主席宋仲元等陪同走上主席台，受到热烈欢迎。"},{"type":"paragraph","text":"阿尔巴尼亚驻中国大使奈斯蒂·纳赛应邀参加了大会。"},{"type":"paragraph","text":"北京市总工会副主席宋仲元在会上讲话。他热情地赞扬勤劳勇敢的阿尔巴尼亚人民在恩维尔·霍查同志和劳动党的英明领导下，在社会主义革命和社会主义建设中取得了辉煌的成就。宋仲元说，中国工人阶级和人民一向是把你们的每一项胜利和成就看作是对中国人民的巨大支持和帮助。宋仲元表示：不管以美国为首的帝国主义多么猖狂，现代修正主义多么阴险毒辣，不论天空出现什么乌云，海上掀起什么风暴，中阿两国人民永远是相互支援、互相鼓舞，共同战斗、共同胜利。"},{"type":"paragraph","text":"索蒂尔·坎伯里在热烈的掌声中讲话。他说，我们在访问期间，亲眼看到了中国所发生的巨大变革，看到了中国人民在短短的历史时期内，从根本上改变了自己国家的面貌。他说，阿尔巴尼亚工人和全体人民把中国人民所取得的成就，看作是自己的成就。中华人民共和国的不断加强，就是世界社会主义力量的不断加强。我们在经济上所取得的成就，将使我们思想意识上的大炮对帝国主义和现代修正主义的打击更加沉重和有力。"},{"type":"paragraph","text":"他说，现代修正主义者害怕中国共产党高举的革命大旗，害怕革命，因而想尽各种办法来诬蔑中国人民。让他去诬蔑吧！而中国将一如既往地大踏步地前进。我们阿尔巴尼亚有一句谚语：“疯狗在狂叫，而骆驼队继续在前进。”"},{"type":"paragraph","text":"索蒂尔·坎伯里说，阿中两国人民的友谊，是经过光荣的考验、在马克思列宁主义基础上结成的战斗友谊。这种友谊是牢不可破的，是帝国主义和现代修正主义破坏不了的。"},{"type":"paragraph","text":"大会结束后，北京市一些工厂企业的业余文工团演出精采的文艺节目。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c50e670f2e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
