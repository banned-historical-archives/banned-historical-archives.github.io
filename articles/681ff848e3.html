year":1968,"month":8,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"无限忠于毛主席"},{"type":"paragraph","text":"积极交售上等粮"},{"type":"paragraph","text":"上苑公社西营大队第五生产队的社员，学习毛主席著作，心怀一个“忠”字，狠抓一个“用”字。今年夏收分配时，社员们学习了毛主席的教导：“在分配问题上，我们必须兼顾国家利益、集体利益和个人利益。”狠批中国赫鲁晓夫及其代理人在分配问题上的修正主义谬论。社员们说，中国赫鲁晓夫及其代理人鼓吹“多分少交少留”，是要毒害贫下中农和社员的思想，瓦解集体经济，破坏工农联盟，破坏社会主义建设，我们决不上他们的当。遵照毛主席的教导，社员们决定先把最好的粮食交给国家，留足种籽，剩下的才分给个人。他们把扬场机扬得最远的麦粒，用十几副筛子普遍过一次筛。还怕不干净，又把麦子摊到晒席上，仔细地拣一遍。直到大家认为这些粮食真正是一点杂质和不饱满的麦粒都没有了，才高高兴兴地交给国家。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"681ff848e3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
