":[],"dates":[{"year":1970,"month":2,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　春节，战斗的日子。华东师范大学革命师生和贫下中农战斗在一起，狠抓思想领域中的阶级斗争，开展革命大批判。"},{"type":"paragraph","text":"为了激发起革命师生的无产阶级革命感情，提高革命大批判的战斗力，在除夕的晚上，贫下中农和华东师大革命师生一起吃“忆苦饭”。当晚，许多贫下中农，都字字血，声声泪地控诉了剥削阶级的罪状。"},{"type":"paragraph","text":"贫下中农忆苦思甜、忆苦思权，深刻地教育了革命师生，他们说:“革命大批判不搞，无产阶级政权难保。”新春的第一天，一些系科和班级，都根据本单位阶级斗争的新动向、新特点，开展了革命大批判。有的班级狠批“四条汉子”及其反动言论，有的结合阶级敌人的翻案活动，批判了刘少奇的“阶级斗争熄灭论”，有的批判了农村资本主义自发势力，有的批判了剥削阶级的“四旧”。有的继续深入批判了桑伟川为大毒草《上海的早晨》翻案的文章。他们还批判了影响开展革命大批判的各种思想障碍，使批判资产阶级的烈火烧得更旺。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"59560ff4f7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
