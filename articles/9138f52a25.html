tart":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"中国文化大革命的胜利大大鼓舞各国人民","authors":[],"parts":[{"type":"paragraph","text":"新华社二十六日讯 意大利共产党（马克思列宁主义）中央委员会九月十四日给中国共产党中央委员会一封贺信，祝贺我国各省、市、自治区（除台湾省外）革命委员会全部成立。贺信全文如下："},{"type":"paragraph","text":"中国共产党中央委员会："},{"type":"paragraph","text":"当听到新疆维吾尔自治区和西藏自治区成立革命委员会的重大消息的时候，意大利共产党（马克思列宁主义）热烈欢呼毛泽东主席亲自发动和领导的无产阶级文化大革命所取得的全面胜利。"},{"type":"paragraph","text":"以毛泽东同志为代表的无产阶级革命路线在全中国取得了胜利。钻进党内窃取要职、企图把中国置于修正主义统治之下的中国赫鲁晓夫及其同伙的资产阶级路线遭到了彻底的失败。"},{"type":"paragraph","text":"革命委员会的红旗在全中国迎风飘扬，这是毛泽东思想——当代最高最活的马克思列宁主义——的又一伟大胜利。"},{"type":"paragraph","text":"正当以美帝国主义为首的帝国主义到处遭到革命人民的进攻、遭到越来越沉重的失败时，正当以苏联统治集团为中心的现代修正主义为越来越严重的危机所瓦解的时候，中国无产阶级文化大革命的胜利对正在反对帝国主义、反动派和修正主义的各国人民和革命者，是一个巨大的鼓舞和根本的支持。"},{"type":"paragraph","text":"全世界的马克思列宁主义政党正从这个胜利中，汲取新的力量，以便把毛泽东思想创造性地运用到本国的具体实际中去，壮大他们的队伍，率领群众开展革命斗争。"},{"type":"paragraph","text":"意大利共产党（马克思列宁主义）以及它所有的组织和党员有义务在群众中宣传无产阶级文化大革命新的伟大胜利的深远意义。"},{"type":"paragraph","text":"中国人民和他们的以毛泽东主席为领导的光荣的共产党万岁！"},{"type":"paragraph","text":"无产阶级文化大革命的全面胜利万岁！"},{"type":"paragraph","text":"中国共产党和意大利共产党（马克思列宁主义）之间的战斗团结万岁！"},{"type":"paragraph","text":"战无不胜的毛泽东思想万岁！"},{"type":"paragraph","text":"意大利共产党（马克思列宁主义）中央委员会"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9138f52a25"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
