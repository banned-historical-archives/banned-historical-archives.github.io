year":2003,"month":12,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"《诗人毛泽东》将走上荧屏"},{"type":"paragraph","text":"本报北京12月9日讯  记者向兵报道：在纪念毛泽东同志诞辰110周年之际，中共中央文献研究室、中共江苏省委、中央电视台今日在人民大会堂举行了20集电视文献专题片《独领风骚——诗人毛泽东》首映座谈会。"},{"type":"paragraph","text":"由上述三单位联合拍摄、镇江市广电总台承拍的这部电视片，以毛泽东同志的诗词创作为线索，形象地反映了毛泽东的生平业绩，生动地刻画了毛泽东作为政治家、军事家、思想家，又是伟大诗人的形象。其间既展示了毛泽东“指点江山”的青春抱负，也记录了他作为“马背诗人”的丰姿和“数风流人物，还看今朝”的革命英雄主义气概。在座谈会上，与会者称赞该片用形象的文学语言揭示了诗人毛泽东的内心世界，用精美的画面描绘出了毛泽东诗词的深远意境，以丰富的影像资料再现了毛泽东的风采。该片将于近期在中央电视台与观众见面。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3187ee79c5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
