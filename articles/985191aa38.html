<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"湖北省委关于资本主义工商业改造问题给中央的报告","authors":[],"dates":[{"year":1956,"month":1,"day":4}],"is_range_date":false,"parts":[{"text":"湖北省委关于资本主义工商业改造问题给中央的报告","type":"title"},{"text":"12月12日至22日，省委召开了地、市、县、镇党委、省委各部委和省人民委员会各直属机关党组的代表会议，学习了中央关于资本主义工商业改造问题的决议草案、主席的指示和中央同志在中央召开的代表会议上的报告和发言，结合本省情况，讨论了上述文件，进行了批评和自我批评，因而提高了到会干部的思想，统一了认识，并在此基础上，制定了今后两年的改造资本主义工商业的初步规划。","type":"paragraph"},{"text":"会议开始时，不少干部对于加速资本主义工商业改造的必要性与可能性是认识不足的，有些同志虽然看到私营工商业改造工作已经不能适应国家工业建设和本省农业合作化的大发展，但他们对如何将私营工商业改造工作推进到一个新的阶段仍然表现自觉性不够。有些同志则不甚了解市场情况，对改造工作采取墨守成规、安于现状的消极态度。经过这次会议，干部思想大为提高，都认识到加速我省资本主义工商业改造不仅是必要的，而且是可能的。例如沙市市私营棉布业按原规定零售比重45％批货，其中大店六家1月至10月共获利15000多元，将及其奖金的半数，而他们一个月还只做二十天生意，十天闲着无事，国营商店还是忙不过来，不能充分利用私商潜力来分担社会商品流通任务。如果为了限制私商利润，将批发减少，国营门市部，就更要忙不过来。估计在农业合作化大发展的条件下到今年秋冬，社会商品流转任务更加扩大，我们将更加被动。而且如果私营工商业改造继续停留在加工订货、经销代销的形式上，在一个行业内、大小厂、大小店之间、坐商摊贩之间，有赚有赔，肥瘦不均，亦无法解决。商业网也不能进行合理调整。经过讨论，大家认识到加速私营工商业改造使其与当前形势发展相适应，确是十分必需的。大家也摆出许多事实，说明加速私营工商业改造是可能的，虽然存在着一些困难条件，例如工商业者中间必然会有一小部分人抗拒改造，还有极少数的反革命分子必然会对改造进行破坏，以及我们对工商业者特别是对广大城乡的小商小贩的政治态度还缺乏了解等等。但是大家也认识到，只要善于利用目前的有利条件，就可以克服困难，完成改造任务。这些有利条件是：（一）工商行政部门、国营及合作社营工商业中的广大干部，和私营工商业中广大工人店员可以作为改造的依靠力量。（二）这些干部及其领导机关已具有一些改造私营工商业的实际经验，工人店员则积极要求改造私营工商业。（三）绝大多数私营工商业者见大势所趋，只要通过必要的教育，可以接受改造。","type":"paragraph"},{"text":"在进行企业改造的同时，必须进行对人的改造。从会议反映，不少干部对这一个问题还存在着一些糊涂思想。有的完全忽视改造人的重要意义；有的怀疑剥削者能否改造为劳动者；有的对培养工商业者中间的积极分子的意义认识不足；甚至有部分干部怕接近工商业者，怕丧失立场，怕说错话。总之，在这个问题上，不少干部存在着不相信党和工人阶级有力量改造私营工商业者的右倾思想。会议通过认真学习中央文件和分析本地情况，大家认识到当资产阶级由于目前国际国内的条件已被“包围”的形势下，教育是有作用的。事实证明：凡是那个地方教育工作做得较好，偷工减料，走私漏税就减少，而企业改造工作也进行得较顺利。松滋县公私合营利民油厂原资方经理×××被教育成为很好的生产管理者，就是许多实际例子中的一个。该厂前一个公股代表×××同志不接近、不教育、不大胆使用，结果×××没有得到教育改造，对企业不能起到有益的作用。后一个公股代表×××采取了对×××团结、教育的方针，×××在党的教育下，钻研生产，和工人一道发明炒籽机，变成了一个很好的生产管理者。到会干部又批判了怕接近怕教育资本家的右倾思想，加之在此次会议上又学习丁关于改造资本主义工商业的一些基本道理，胆子就壮起来，信心就树立起来了。","type":"paragraph"},{"text":"对“没收、挤垮和赎买”这三条办法，到会干部比较普遍的思想是：没有人赞成没收，但是认为“还是挤的办法好”，怀疑赎买政策。解决这个思想问题除了学习中央文件外，一条重要方法就是引导干部分析当地情况，具体算帐，怎样做对国家对人民有利。黄冈专区全区19061户私商，如果挤垮，国家将被迫每年拿出183万元来救济他们，由于商业户挤垮影响的其他城镇居民的救济还未包括在内。如果采用赎买办法，则每年付给他们的利息只有102000元，利用他们经营工商业，以企业盈利和所得税等形式，每年还可为国家积累财富200余万元。","type":"paragraph"},{"text":"因为不少干部对我省的商业到底是多是少不摸底，长时期大家的印象是商业过剩。由于这种印象，就产生对资本家挤垮为好，改造以转农业为好，以及对小商小贩改造不积极，怕背包袱（虽然大家对于小商小贩改造应实行合作化政策在认识上是明确的）等思想。这次会议比较彻底地解决了这个思想问题。经过分析情况，我省各地除了沙市、宜昌两市商业人回可能略有过剩外，都不是过剩，而是不足。山区如恩施区公私商业从业人员仅占总人口6．12‰，把私商全部改造也不够用。而且大家还估计到农业合作化和农业生产大发展后社会商品流通将大大扩展的近景和远景，恩施全区植桐规划15000万株，五年后可年产桐油75万担（现在年产8万担），这就要求工商业解决收购、加工、运输等问题。即以去冬今春情况看，恩施县龙凤区今年旧历年后即要求供销社供应胚猪和小猪5000头，以便农民杀了年猪把空猪圈补上。该县金子乡几个农业社要求供应双轮双铧犁、改良犁、化学肥料、杀虫药械、水车、茶种、麻种等。有些山区在将来路修好之后，要求供应独轮手车，有些丘陵区要求供应大车。要求供应的商品不但数量大，而且品种多，有些商品是国营和合作社营商业从来没有经营过的。由于这样摆情况算帐，大家思想弄通了，认识到挤垮私商有害无利和改造私商的迫切意义。","type":"paragraph"},{"text":"在统一干部的认识的基础上，各地完全同意省委提出的初步规划要求，并根据省的规划要求研究制定了各地的初步规划。省的初步规划是：私营工业，全省在1956年全部完成公私合营；私营商业（包括小商小贩）1956年通过各种不同形式（大体是武汉市和平等城市以公私合营和合作商店两种形式为主；小城镇以合作商店合作小组为主）完成全行业改造的商户要达到75％～80％。私营交通运输业，机船、汽车于1956年改造完毕；民船于1956年完成合作化占总吨位70％～80％，1957年上半年扫尾。手工业于1956年通过合作化及其他形式完成改造的户数占总户数85％～90％。","type":"paragraph"},{"text":"以上是否妥当，请中央指示。","type":"paragraph"}],"comments":[],"origin":"中共湖北省委党史研究室、中共湖北省委统战部编 《中国资本主义工商业的社会主义改造 湖北卷》  出版社：中共党史出版社  出版日期：1993年。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"985191aa38"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
