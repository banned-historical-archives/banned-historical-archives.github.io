ear":1950,"month":7,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【中央人民电台广播】北京十日消息:七月十一日是蒙古人民共和国廿九周年国庆纪念日，毛泽东主席和周恩来总理，分别打电报给蒙古人民共和国小呼拉尔主席团格·布曼曾迪主席和部长会议主席乔巴山元帅，表示祝贺。两电电文如下:"},{"type":"paragraph","text":"(一)毛主席给格·布曼曾迪主席的电报说:格·布曼曾迪主席阁下:"},{"type":"paragraph","text":"欣逢贵国廿九周年国庆纪念，我代表中华人民共和国中央人民政府和中国人民，向阁下和蒙古人民谨致祝贺之忱，并深信蒙古人民在经济文化的建设上将有更大的成就。"},{"type":"paragraph","text":"中华人民共和国中央人民政府主席　毛泽东　一九五○年七月七日于北京"},{"type":"paragraph","text":"(二)周总理给乔巴山元帅的电报说:乔巴山元帅阁下:"},{"type":"paragraph","text":"欣逢贵国廿九周年国庆纪念，我热烈祝贺蒙古人民的幸福与进步。"},{"type":"paragraph","text":"中华人民共和国中央人民政府政务院总理兼外交部部长　周恩来　一九五○年七月七日于北京"}],"comments":[],"origin":"中央人民电台","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"662be0d62a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
