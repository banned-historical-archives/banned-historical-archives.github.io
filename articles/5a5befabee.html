script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"我驻亚洲国家使节举行国庆招待会  许多朋友欢呼毛泽东思想万岁！中国文化大革命万岁！","authors":[],"dates":[{"year":1967,"month":10,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"我驻亚洲国家使节举行国庆招待会"},{"type":"paragraph","text":"许多朋友欢呼毛泽东思想万岁！中国文化大革命万岁！"},{"type":"paragraph","text":"据新华社讯　中国驻一些亚洲国家的大使馆分别举行招待会，隆重庆祝中华人民共和国成立十八周年。"},{"type":"paragraph","text":"我驻巴基斯坦大使馆临时代办徐英在一日晚上举行招待会。"},{"type":"paragraph","text":"出席招待会的有巴基斯坦教育和卫生部长卡齐·安瓦鲁勒·哈克、巴基斯坦政府各部的其他官员，高级军官、工人、农民、群众团体代表和各界知名人士。各国外交使节也出席了招待会。"},{"type":"paragraph","text":"巴基斯坦朋友在非常热烈和友好的气氛中，一再向中国朋友表示祝贺伟大领袖毛主席亲自发动和领导的中国无产阶级文化大革命的巨大胜利，祝贺中国人民十八年来在毛主席的英明领导下取得的伟大成就以及两国人民战斗友谊的日益发展。"},{"type":"paragraph","text":"许多巴基斯坦朋友在离开中国大使馆的时候，戴着毛主席像章、挥动《毛主席语录》，又一次高呼："},{"type":"paragraph","text":"“毛主席万岁！”“巴中友好万岁！”"},{"type":"paragraph","text":"我驻阿富汗大使馆临时代办姚吉年十月一日晚在大使馆举行的招待会，有二百多位客人出席，其中包括阿富汗长老院议长阿卜杜勒·哈迪·达威，王国政府国防、计划、不管、新闻和宣传等各部大臣和军队总参谋长等。阿富汗—中国友好协会会长苏尔坦亲王出席了招待会。出席招待会的还有一些国家驻阿富汗的外交使节。"},{"type":"paragraph","text":"招待会在友好亲切的气氛中进行。"},{"type":"paragraph","text":"一些阿富汗朋友向主人表示热烈祝贺，并为伟大领袖毛主席的健康、为中阿友谊而干杯。他们还热烈赞扬中国在伟大领袖毛主席的领导下所取得的巨大成就。"},{"type":"paragraph","text":"在尼泊尔首都加德满都，尼泊尔国王马亨德拉、王后拉特纳和大约七百位客人，出席了中国驻尼泊尔大使馆临时代办李中和一日举行的招待会。"},{"type":"paragraph","text":"出席招待会的还有喜马拉雅亲王殿下，首相苏里雅·巴哈杜尔·塔帕，大臣和副大臣们，尼泊尔皇家陆军总司令苏伦德拉·巴哈杜尔·沙阿将军和其他高级军政官员。"},{"type":"paragraph","text":"全国评议会主席纳金德拉·普拉萨德·里贾尔，国务会议常务委员会主席兰加纳特·夏尔马，尼中友好协会主席普尔纳·巴哈杜尔，尼泊尔—中国文化协会主席布班·拉尔·普拉丹也出席了招待会。"},{"type":"paragraph","text":"出席招待会的客人中还有工人、农民和各界人士。"},{"type":"paragraph","text":"各国驻尼泊尔外交使节也出席了招待会。"},{"type":"paragraph","text":"许多尼泊尔朋友向主人表示热烈赞扬中国人民在伟大的领袖毛主席的英明领导下所取得的伟大成就，并欢呼“毛主席万岁”。"},{"type":"paragraph","text":"我驻柬埔寨大使馆临时代办郑斯雄，一日晚上举行招待会，庆祝中华人民共和国成立十八周年。"},{"type":"paragraph","text":"柬埔寨王国政府首相宋双、柬埔寨政府一些官员以及其他柬埔寨朋友出席了招待会。"},{"type":"paragraph","text":"越南民主共和国、越南南方民族解放阵线以及其他国家驻柬埔寨的外交使节也出席了招待会。"},{"type":"paragraph","text":"我驻锡兰大使馆临时代办奚业胜一日晚上在科伦坡举行盛大招待会，庆祝中华人民共和国成立十八周年。商业和贸易部长佩里斯，土地、灌溉和电力部长德席尔瓦，议员们和政府高级官员以及工人、农民、学生和政府职员等六百多人出席了招待会。"},{"type":"paragraph","text":"招待会上放映了中国电影《光辉的榜样　伟大的创举》和《欢呼毛主席革命路线的伟大胜利》，受到观众热烈欢迎。他们热烈鼓掌，并不断高呼："},{"type":"paragraph","text":"“中国文化大革命万岁！”“毛泽东思想万岁！”"},{"type":"paragraph","text":"“毛主席万岁！万岁！万万岁！”"},{"type":"paragraph","text":"在老挝万象，中国驻老挝大使馆临时代办李联平十月一日为庆祝中华人民共和国成立十八周年，举行招待会。"},{"type":"paragraph","text":"老挝爱国战线党驻万象代表陶苏·培拉西、内政大臣方·丰萨万、温·拉迪功将军等以及其他政府官员，社会知名人士和外交使节约一百多人出席了招待会。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5a5befabee"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
