art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"更深入地开展革命大批判把中国赫鲁晓夫批深批透","authors":["防化学兵首次学习毛主席著作积极分子代表大会代表葛才夫"],"parts":[{"type":"paragraph","text":"三月二十五日凌晨，是我一生中最幸福、最难忘的时刻。我们心中最红最红的红太阳毛主席和他的亲密战友林副主席，接见了我军干部。毛主席啊，毛主席！看到您老人家，我热血沸腾，心潮奔流，情不自禁地纵情欢呼：毛主席万岁！毛主席万万岁！"},{"type":"paragraph","text":"毛主席啊，毛主席！我这个八岁就在地主家里当放牛娃的穷孩子，终年吃不饱，穿不暖，受尽了旧社会的压迫和剥削。是您，领导人民闹革命，使我们穷人翻身得解放。敬爱的毛主席啊，您是我们的大救星。在您的光辉思想指引下，我参加了革命，拿起了枪杆子，跟着您闹革命。您的光辉思想是革命战士的命根子。革命战士一时一刻也不能离开您的光辉思想。"},{"type":"paragraph","text":"在史无前例的无产阶级文化大革命中，亿万军民遵循您的“千万不要忘记阶级斗争”的伟大教导，与中国赫鲁晓夫为首的党内最大的一小撮走资派进行了坚决斗争，把他们打得落花流水。但是，阶级敌人是决不甘心于他们的失败的，越是接近死亡的时候，他们越会变换颜色，使用极其阴险、毒辣的手段，进行垂死挣扎。我们一定要用战无不胜的毛泽东思想洞察一切，戳穿阶级敌人的一切阴谋诡计。我们一定要更深入地开展革命大批判，把以中国赫鲁晓夫为首的党内一小撮走资派批深批透，把无产阶级文化大革命进行到底。"},{"type":"paragraph","text":"毛主席啊，毛主席！您是全中国和全世界革命人民的伟大导师。我们一定以林副主席为光辉榜样，永远忠于您，永远忠于您的光辉思想，永远忠于您的无产阶级革命路线。海枯石烂不变心，天崩地裂志不移！"}],"alias":""},"tags":[{"name":"革命大批判","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"80a94f3f38"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
