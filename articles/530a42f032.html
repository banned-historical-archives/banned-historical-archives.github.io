"authors":[],"dates":[{"year":1951,"month":9,"day":12}],"is_range_date":false,"parts":[{"text":"福建各民主党派对目前形势的反应","type":"title"},{"text":"【福建分社十二日讯】福建各民主党派的负责人及陈绍宽等，一致认为目前国际形势较过去紧张，感到朝鲜和谈前途暗淡。他们认为，对方连续制造挑衅事件破坏和谈，是欺人太甚，我们不能委曲求全，应予对方以适当压力(即军事打击)。有些民主人士希望能召开中、苏、印度、蒙古、缅甸、朝鲜、越南等曾以军队参加对日战争的一切国家的代表和会，并以上述各国就美制对日和约联合发表一声明。有的说，不管美制对日和约如何，我们有中苏友好同盟互助条约，只要加强抗美援朝，加强国防力量，美国任何新侵略都可以对付。由于他们相信中央对这些问题会有一定办法，产生了用不着我们操心的侥幸、依赖或不愿尽责的心理。工商界尤为严重，他们中间有很多人是得过且过，捐献缴款能拖即拖。至于驱逐黎培里出境，他们非常赞同，主张今后对有关这种人的处理要更严厉些。","type":"paragraph"}],"comments":[],"origin":"新华通讯社编《内部参考》1951年9月14日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"世界形势","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"530a42f032"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
