综合报告（节录）","authors":[],"dates":[{"year":1953,"month":5,"day":14}],"is_range_date":false,"parts":[{"text":"西南局关于三，四月份向毛主席中央的综合报告（节录）","type":"title"},{"text":"基本建设在全区一季度工作量为3504亿，只完成60.5%。西康完成105%，重庆82%，贵州75%，西南建筑工程局71%，云南43%，四川25.4%。计划不切实际，设计不周，材料供应不及时，盲目施工，管理薄弱，无人负责等是影响工程完成的主要原因，并造成工程质量的普遍低劣与严重的浪费。如贵二月修建的29座瓦窑，三月即有三座倒塌，七座开裂；重庆市二零一， 二零二 工地大小返工102次，其中水塔工程发现洞穴61处；九龙坡电厂混凝土柱子的狗洞蜂窝占 5%。……","type":"paragraph"},{"text":"……","type":"appellation"},{"text":"目前在领导农业生产上部分地区仍存在主观主义和命令主义，主要是：单纯[完成]任务观点，过高要求，形式主义等。 有的把增产指标硬往下摊派；有的在推广新式秧田时，大吹大擂地表扬极少数做得较好的单位和个人。长寿县在推广“稀秧密植”时，县上笼统提出“密植方七寸，每窝四五片”，区上则提出“两要三不要 （要七寸，要四五片，密得稀不得，少得多不得，慢得慌不得）”。 群众对此不易接受，表面应付，儿子在前面按新式挖窝，老头在后面按老式办法下种 。有的搞什么红旗竞赛等。这些都说明领会中央指示精神很不容易。……","type":"paragraph"}],"comments":[],"origin":"四川省某档案馆","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3a8896a333"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
