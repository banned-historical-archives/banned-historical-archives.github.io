],"dates":[{"year":1966,"month":9,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"穆克塔尔议长在京参观"},{"type":"paragraph","text":"赞扬我国建设成就　祝毛主席万寿无疆"},{"type":"paragraph","text":"新华社九日讯　索马里国民议会议长谢赫·穆克塔尔今天下午参观了中国革命博物馆。他在为博物馆的题词中写道：“我们对中国人民反对美帝国主义、英帝国主义和其他帝国主义的斗争，深为感动。”"},{"type":"paragraph","text":"谢赫·穆克塔尔议长今天上午参观了北京第三棉纺织厂。他谈到在这里的观感时，“希望中国人民继续前进，在建设祖国和反帝斗争方面取得更大胜利。”他最后“祝毛泽东主席万寿无疆。”"},{"type":"paragraph","text":"谢赫·穆克塔尔议长和由他率领的索马里议会友好代表团的成员，在今天上午和下午，分别由人大常委会副委员长郭沫若，委员南汉宸陪同参观的时候，受到工厂职工和博物馆工作人员的热烈欢迎。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4bed081f2d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
