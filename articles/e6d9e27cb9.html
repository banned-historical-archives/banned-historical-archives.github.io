art":6,"page_end":6,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"加强学习深入批邓","authors":[],"parts":[{"type":"paragraph","text":"加强学习，深入批邓。广州部队某团党委老中青三结合领导班子，认真学习毛主席关于反击右倾翻案风的一系列重要指示，联系各条战线阶级斗争、路线斗争的实际，深入批判邓小平的反革命罪行及其反革命的修正主义路线。这是他们在学习和研究资产阶级就在党内的问题。"},{"type":"paragraph","text":"黎原摄"},{"type":"paragraph","text":"深入批判邓小平反革命的修正主义路线。“南京路上好八连”紧密联系两个阶级、两条道路、两条路线斗争的实际，批判邓小平妄图颠覆无产阶级专政、复辟资本主义罪行。"},{"type":"paragraph","text":"方志俊摄"},{"type":"paragraph","text":"发挥理论队伍的骨干作用。成都部队某团一营机炮连理论小组长、副指导员金秀清，是批林批孔的闯将，在反击右倾翻案风斗争中又勇当先锋。这是他正在和理论骨干一起研究，深入批判邓小平“三项指示为纲”的修正主义纲领。"},{"type":"paragraph","text":"张艺学摄"},{"type":"paragraph","text":"人民解放军永远是无产阶级专政的坚强柱石。空军某部飞行员李忠东，是毛主席当年接见过的红卫兵。他发扬红卫兵的革命精神，刻苦学习毛主席的军事思想，深入批判邓小平炮制的“整顿”、“准备打仗”为纲的反动谬论。"},{"type":"paragraph","text":"坚持教育革命，以实际行动反击右倾翻案风。海军航空兵机务学校坚持开门办学，使教学紧密联系部队实际，培养能文能武、又红又专的战士。"},{"type":"paragraph","text":"支持社会主义新生事物，巩固和发展文化大革命胜利成果。某医院经常派出农村巡回医疗队，帮助培训赤脚医生，进一步巩固和发展了合作医疗制度。"},{"type":"paragraph","text":"集中火力批邓，坚持文艺革命。某部八连业余演唱组，坚持为工农兵服务，为无产阶级政治服务的方向。他们学习革命样板戏的创作经验，紧密配合现实阶级斗争，自编自演许多文艺节目，歌颂文化大革命，反击右倾翻案风。"},{"type":"paragraph","text":"刘里摄"},{"type":"paragraph","text":"（本版照片除署名外均为本报记者摄）（照片）"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"批林批孔","type":"主题/事件"},{"name":"教育革命","type":"主题/事件"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e6d9e27cb9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
