6,"month":4,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"杨浦区文化馆群众创作组"},{"type":"paragraph","text":"甲:毛主席挥手指航向，全国军民斗志昂。"},{"type":"paragraph","text":"乙:牢记党的基本路线，坚持以阶级斗争为纲，"},{"type":"paragraph","text":"丙:批判右倾翻案风，红色江山万年长。"},{"type":"paragraph","text":"甲:看!一张张大字报，"},{"type":"paragraph","text":"乙:如刀枪，闪闪亮，"},{"type":"paragraph","text":"丙:狠批“三项指示为纲”，"},{"type":"paragraph","text":"齐:揭穿邓小平的伪装!"},{"type":"paragraph","text":"甲:听!一篇篇批判稿，"},{"type":"paragraph","text":"乙:似战鼓，震天响，"},{"type":"paragraph","text":"丙:打在邓小平身上，"},{"type":"paragraph","text":"齐:疼在阶级敌人心上!"},{"type":"paragraph","text":"甲:人民大众开心之日，"},{"type":"paragraph","text":"乙:就是反革命分子难受之时。"},{"type":"paragraph","text":"甲:阶级斗争愈深入，"},{"type":"paragraph","text":"丙:敌人反扑就愈猖狂!"},{"type":"paragraph","text":"甲:一小撮反革命分子，"},{"type":"paragraph","text":"乙:螳臂当车，可笑不自量!"},{"type":"paragraph","text":"丙:他们垂死挣扎，狗急跳墙，"},{"type":"paragraph","text":"齐:妄图与无产阶级较量，夺回他们失去的天堂。"},{"type":"paragraph","text":"甲:在首都天安门广场，"},{"type":"paragraph","text":"乙:他们穷凶极恶，丧心病狂，"},{"type":"paragraph","text":"丙:制造反革命政治事件，"},{"type":"paragraph","text":"甲:把矛头指向伟大领袖毛主席，"},{"type":"paragraph","text":"乙:分裂以毛主席为首的党中央，"},{"type":"paragraph","text":"丙:妄图把邓小平当纳吉捧上台，"},{"type":"paragraph","text":"齐:反动气焰太嚣张!"},{"type":"paragraph","text":"甲:北京，"},{"type":"paragraph","text":"乙:是我们伟大祖国的心脏。"},{"type":"paragraph","text":"甲:天安门广场，"},{"type":"paragraph","text":"丙:是毛主席检阅革命群众的地方。"},{"type":"paragraph","text":"齐:决不能容忍敌人逞凶狂!"},{"type":"paragraph","text":"甲:谁想倒转历史车轮，"},{"type":"paragraph","text":"乙:绝没有好下场!"},{"type":"paragraph","text":"甲:敌人不投降，"},{"type":"paragraph","text":"丙:坚决把它消灭光!"},{"type":"paragraph","text":"甲:英雄的首都工人民兵，"},{"type":"paragraph","text":"乙:雄赳赳、气昂昂，"},{"type":"paragraph","text":"丙:迈开大步、浩浩荡荡，"},{"type":"paragraph","text":"齐:开进天安门广场。"},{"type":"paragraph","text":"乙:人民警察，"},{"type":"paragraph","text":"丙:警卫战士，"},{"type":"paragraph","text":"甲:密切配合、英勇战斗，"},{"type":"paragraph","text":"齐:用无产阶级专政铁拳，"},{"type":"paragraph","text":"齐:粉碎了敌人的复辟梦想。"},{"type":"paragraph","text":"甲:别看反革命分子一时猖狂，"},{"type":"paragraph","text":"乙:面对无产阶级专政的铁壁铜墙，"},{"type":"paragraph","text":"丙:如丧家之犬，"},{"type":"paragraph","text":"甲:晕头转向；"},{"type":"paragraph","text":"丙:哆嗦在地，"},{"type":"paragraph","text":"乙:一副狼狈相；"},{"type":"paragraph","text":"齐:谁要搞反革命勾当，"},{"type":"paragraph","text":"齐:总逃不了覆灭的下场!"},{"type":"paragraph","text":"甲:革命行动势不可挡，"},{"type":"paragraph","text":"乙:显示了群众专政强大力量，"},{"type":"paragraph","text":"丙:无产阶级专政坚强如钢。"},{"type":"paragraph","text":"齐:大长了无产阶级革命志气，"},{"type":"paragraph","text":"齐:大灭了资产阶级威风。"},{"type":"paragraph","text":"甲:英雄的首都工人民兵，"},{"type":"paragraph","text":"乙:人民警察，"},{"type":"paragraph","text":"丙:警卫战士，4"},{"type":"paragraph","text":"齐:用实际行动，"},{"type":"paragraph","text":"甲:保卫了毛主席!"},{"type":"paragraph","text":"乙:保卫了党中央!"},{"type":"paragraph","text":"丙:保卫了毛主席革命路线!"},{"type":"paragraph","text":"甲:雄伟的天安门广场，"},{"type":"paragraph","text":"乙:成了红旗的海洋，"},{"type":"paragraph","text":"丙:战斗的歌声象澎湃的海浪。"},{"type":"paragraph","text":"甲:英雄的首都工人民兵，"},{"type":"paragraph","text":"乙:人民警察，"},{"type":"paragraph","text":"丙:警卫战士，"},{"type":"paragraph","text":"甲:你们是阶级斗争的坚强哨兵!"},{"type":"paragraph","text":"乙:你们的革命行动受到全国人民的赞扬!"},{"type":"paragraph","text":"丙:你们为我们作出了光辉的榜样!"},{"type":"paragraph","text":"齐:我们向你们学习!向你们致敬!"},{"type":"paragraph","text":"甲:斗争的事实告诉我们，"},{"type":"paragraph","text":"乙:阶级斗争并没有熄灭。"},{"type":"paragraph","text":"丙:我们要坚持以阶级斗争为纲，"},{"type":"paragraph","text":"甲:注意阶级斗争动向，"},{"type":"paragraph","text":"乙:时刻提高革命警惕，"},{"type":"paragraph","text":"丙:牢牢握紧手中枪，"},{"type":"paragraph","text":"甲:冲杀在阶级斗争前方，"},{"type":"paragraph","text":"乙:坚决痛击复辟狂，"},{"type":"paragraph","text":"丙:团结战斗心向党，"},{"type":"paragraph","text":"齐:打不尽豺狼决不下战场!"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0c424a8899"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoa
