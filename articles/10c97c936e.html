<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"赵士珍关于镇压反革命工作给毛泽东的报告","authors":["河北省永清县","赵士珍"],"dates":[{"year":1951,"month":5,"day":27}],"is_range_date":false,"parts":[{"text":"赵士珍关于镇压反革命工作给毛泽东的报告","type":"title"},{"text":"河北省永清县赵士珍","type":"authors"},{"text":"[赵士珍：中共河北省永清县委书记]","type":"subtitle"},{"text":"毛主席：","type":"appellation"},{"text":"兹将河北省永清县镇反工作报告如下：","type":"paragraph"},{"text":"（一）我县有三三五村，人口十七万一千七百六十五人（半老区五万八千零二十五人，新区十一万三千七百四十人）。先后经过双减、反奸复仇、五四指示。有三十余村庄实行过土地改革。但由于十几年来紧张的拉锯形势，敌我斗争尖锐，日寇蒋匪惨杀我村干、斗争骨干及群众达一千七百八十三人。大王庄一村，一次即铡死我五个贫农小组长。平津解放后，我们对这些反革命分子未及时给以严厉镇压，他们仍进行各种破坏活动。","type":"paragraph"},{"text":"（二）逮捕在三月初和四月下旬分两批逮捕三百三十七名，杀掉一百一十一名。在逮捕数中，反革命杀人犯（有血债的）占百分之八十以上。对应抓之对象，都是根据侦查、调查材料和群众被难户反映控诉的材斜，县委逐个亲自审查。逮捕前和逮捕时，由县、区委亲自领导布置，任务一下交待到村，动员全党的力量来完成。采取包抓“兵对兵，将对将”的办法，两次抓捕均按计划全部抓到，无一漏网。","type":"paragraph"},{"text":"抓后，首先在抓犯人的村和城镇及时开展宣传攻势，继将反革命犯的名单、罪恶事实印成宣传品，发到每村一份，让群众讨论，并号召群众进行控诉检举。县并召开各界人民代表会议，将审理好的案犯，交由代表讨论，提出处理意见，这样做法结果取得了各界人民群众拥护与同情说“早该这样办”。","type":"paragraph"},{"text":"杀时，在那个地方影响大，即在那里处决。并召开大规模的控诉公审大会，专力组织了宣传员，向群众宣传犯人罪恶。两次大杀，在七处大会上计有八万余人，执行一百一十一名罪犯。群众情绪极为高涨，如我押解处决犯人，经过北曹家务时（回民村），群众看见，即自动高呼口号：“坚决镇压反革命分子！”“拥护人民政府！”并跟出村外。在每到一处执行罪犯时，均有县委一人和得力干部作广泛的宣传。除大会外，又有小会、漫谈、化装宣传、游动布告等各种宣传方式。群众对反革命罪犯是极为愤恨的，处决大会上发动了被难户控诉，更激起了群众仇恨，辛立张场赵福之父控诉反革命分子邢万俊活埋他儿子时，在悲愤交加之时，咬下邢的一口肉来，群众随着喊出：“枪决邢万俊”。","type":"paragraph"},{"text":"（三）各界人民对我镇压反革命政策极为拥护。群众说：“政府处理犯人先叫我们讨论提出意见，过去那有这样事，真是人民的政府给人民作主。”村干部说：“这样一镇压，工作好推动多了。坏人也找我们要求立功，不再干坏事。”不积极的干部也积极工作了。三区刘家务村长因受坏人威胁躺倒不干工作，现在提出“要干出个样子来，叫大家看”。六十余岁的胡英甫先生（各代会副主席），自镇压反革命以来，主动的开各阶层会，找各阶层代表人物谈，搜集意见，供给反革命分子的活动材料。城内大德栈饭馆掌柜的王贵良跑到刑场，痛骂被枪决的几个犯人说：“过去我不敢向你们要账，现在政府这一办我不要账了也痛快，早知你小子们活不长。”医生陈之华说：“坏人不杀，好人抬不起头来。”","type":"paragraph"},{"text":" 一九五一年五月二十七日","type":"paragraph"}],"comments":[],"origin":"《华北各省县委书记关于镇压反革命工作给毛主席的报告（第一辑）》，中国共产党中央华北局办公厅编印·1951年8月。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"10c97c936e"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
