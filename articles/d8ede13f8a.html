"dates":[{"year":1967,"month":2,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　上海革命造反派将于今日下午一时在上海文化革命广场举行“高举毛泽东思想伟大红旗，进一步开展夺权斗争誓师大会”。会上，革命领导干部，驻沪三军代表、革命群众组织代表将作重要讲话。上午十时起凭票入场。本市十个区、市郊十个县分别设有会场，收听大会实况。会后将举行盛大游行。"},{"type":"paragraph","text":"这次大会，将继续发扬“一月革命”的战斗精神，促使全市革命造反派进一步大团结，大联合，进一步开展“三位一体，联合夺权”的斗争，抓革命，促生产，加强无产阶级专政，加强无产阶级革命派的思想建设，把上海地区文化大革命运动推向新高潮。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"一月革命","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d8ede13f8a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
