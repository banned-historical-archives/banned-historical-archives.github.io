script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"两种肚皮","authors":["石曼","重庆"],"dates":[{"year":1957,"month":5,"day":31}],"is_range_date":false,"parts":[{"text":"两种肚皮","type":"title"},{"text":"重庆石曼","type":"authors"},{"text":"[编者按：石曼，出身于商人之家。现为重庆市文工团文学创作组组长。当着右派份子猖狂地向党进攻，每个有正义感的人都无比的愤怒的时候，石曼却在“两个肚皮”一文中，告诉人们要“胸怀宽广，气魄宏大”，象“宰相肚内能撑船”似的容纳下来，否则他就斥为“滴水不容”的小人，就是“自讨苦吃”。其阴险企图就是要解除共产党人的武装，让共产党在阶级敌人进攻面前，束手待毙，拱手把领导权让给敌人。]","type":"paragraph"},{"text":"在一个高等学府里听教授们揭发内部矛盾，一个教授开头炮放起来：“学校里的共产党员一般的都不好，没良心。”对这种意见，有位须眉尽白的老先生在旁边听来，胡子一撅一撅地表示不满，大部分人当然也不同意；及至这位教授面训领导的时候，在座的人不免都去看看领导和党员同志们的神色气相、观察他们有否愠怒之色。","type":"paragraph"},{"text":"休息时间，一位领导同志称赞刚才那位教授“畅所欲言”。他说：“打板子不痛打记不得，受批评要象挨了三十大板样的才能凑效。”接着他又说：“三十大板每一下都打在屁股上也不可能，有一两下打错了，打在脚拐骨上也是有的，虽然特别痛也不该计较。”听到这段谈话的人们，都赞叹这位领导同志胸怀宽广、气魄宏大，为后来发言者解除了顾虑。有人赞扬说：“真是宰相肚皮里能撑船。”","type":"paragraph"},{"text":"我却看到另外有这样一种同志，肚皮里非但撑不得船，连一滴水都容纳不下。听了别人意见之后，面红耳赤地说什么“光怪别人，不检讨自己。”冷言冷语地讽刺别人“光谈自己革命的，不谈自己不革命的。”有人因而怀疑到提意见人的历史、出身上去了。","type":"paragraph"},{"text":"奉劝这些同志们，多向前面那位肚皮里能撑船的同志学学，学习那种板子虽错打在脚拐骨上而不计较的态度，这样来虚心听取群众意见，改正错误；度量狭窄，肚皮里容不得一滴水的话，你自己势将把自己的肚皮胀破，自讨苦吃不说，还要作检讨、受处分。","type":"paragraph"},{"text":" (原载一九五七、五、卅一重庆日报)","type":"paragraph"}],"comments":[],"origin":"《重庆市右派言论选辑第五集》（内部文件，只供领导同志参考，请勿外传和翻印），中共重庆市委宣传部办公室编印，1957年9月。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e13a81e5ed"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
