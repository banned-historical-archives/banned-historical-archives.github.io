],"dates":[{"year":1996,"month":7,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　据新华社报道，《“文化大革命”简史》一书，经中央主管部门审定、核准，已由中共党史出版社出版。"},{"type":"paragraph","text":"这本书根据中共中央《关于建国以来党的若干历史问题的决议》的精神，叙说、剖析了长达十年之久的“文化大革命”发生的历史背景和起因，全面发动和高潮的到来，以及以后几年曲折发展中的一系列重大历史事件，其中邓小平同志主持的1975年全面整顿是本书的一大着墨点。"},{"type":"paragraph","text":"本报讯　据新华社报道，荟萃业余文艺创作精品的大型文艺创作出版工程——《中国大众创作文艺丛书》开始启动。《神州大动脉—京九铁路建设报告文学集》、《立体交响曲-中国建设建材文学作品选》已经面世。由大众文艺出版社出版的这套《丛书》从1996年起，有计划、有步骤地编辑出版党的十一届三中全会以来基层业余文艺作者创作的优秀文艺作品，并将长期坚持下去。《丛书》第一辑中的《中国煤矿短篇小说精品选》、《拥抱太阳——中国核试验基地风采录》、《长鸣集——河南省驻马店市文学作品选》不久也可陆续出版。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b6e908fdfc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
