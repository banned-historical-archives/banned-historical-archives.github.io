设安排情况的报告","authors":[],"dates":[{"year":1961,"month":1,"day":11}],"is_range_date":false,"parts":[{"text":"中央批转甘肃省委关于移人就食支援兄弟省建设安排情况的报告","type":"title"},{"text":"甘肃、陕西、青海、辽宁、黑龙江、河南、湖北、江西、浙江、河北、山西、四川、贵州省委、新疆、宁夏、内蒙自治区党委：","type":"appellation"},{"text":"中央同意甘肃省委一九六一年一月五日“关于移入就食支援兄弟省建设安排情况的报告”，希即按照执行。","type":"paragraph"},{"text":"据最近了解，有以下问题值得各地注意：","type":"paragraph"},{"text":"(一)车厢取暖设备差，沿途有的地方有时不能保证吃饭、喝水。","type":"paragraph"},{"text":"(二)有些调入省在职工到达后生活安排尚未落实。","type":"paragraph"},{"text":"中央认为十万余名职工、家属和解放军在寒冬的调动安置，是繁重的政治任务和组织工作，希望沿途有关省、区党委派出得力干部在本省、区境内重要的车站作好政治工作和照料好吃饭、喝水以及疾病治疗工作，保证他们愉快的平安的到达目的地。在目的地要迅速做好安排工作。铁道部应当组织有暖气的专门送人列车。","type":"paragraph"},{"text":" 中央1961年1月11日","type":"paragraph"},{"text":"(甘肃省档案馆91—4—938卷)","type":"paragraph"},{"text":"","type":"paragraph"}],"comments":[],"origin":"甘肃省某档案馆","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2b439f99aa"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
