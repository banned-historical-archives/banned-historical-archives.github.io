<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"北京门头沟煤矿革委会大办毛泽东思想学习班  狠抓带头人的思想工作","authors":[],"dates":[{"year":1970,"month":3,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"北京门头沟煤矿革委会大办毛泽东思想学习班"},{"type":"paragraph","text":"狠抓带头人的思想工作"},{"type":"paragraph","text":"据新华社二十八日讯　北京矿务局门头沟煤矿革委会针对矿上各级干部的活思想，大办毛泽东思想学习班，狠抓带头人的思想工作，促进各级领导班子革命化。"},{"type":"paragraph","text":"这个矿的大部分基层干部革命热情高，干劲足。但是，有时在工作中碰到一些困难，有的同志就认为"},{"type":"paragraph","text":"“基层干部不好当”，想换换班。"},{"type":"paragraph","text":"针对这种情况，矿革委会在解放军支左人员的帮助下，办起了新老干部参加的毛泽东思想学习班，组织大家带着问题，学习毛主席关于在无产阶级专政下继续革命的伟大学说，检查自己继续革命的觉悟高不高；学习毛主席和林副主席关于政权建设的指示，检查自己为无产阶级掌权的决心大不大；学习毛主席的光辉著作“老三篇”，检查自己全心全意为人民服务的思想树得牢不牢。矿革委会成员带头斗私批修。革委会副主任吴士德狠斗了自己原认为“当干部吃亏”的错误思想，干劲倍增，带头下井和工人群众一同采煤，亲自深入车间抓点。矿革委会负责人的模范行动，使广大基层干部很受教育。在学习班上，革委会还引导大家开展忆苦思甜活动。老矿工、革委会委员孙树林在万恶的旧社会里要过饭，下窑背煤，受尽了地主、资本家的残酷压榨。他说：“为什么在旧社会我们穷人这么苦？就是因为没有权。毛主席领导我们翻了身，使我们当家做主人，我们在工作中碰到一点困难，就不愿当干部，这就是忘了本！”通过回忆对比，使大家受到了深刻的阶级教育。由工人提拔为基层干部的李文民，原来也觉得基层干部不好当，想不干。通过学习，他认识到为无产阶级掌好权的重要性，决心努力做群众的带头人。"},{"type":"paragraph","text":"通过学习和忆苦思甜教育，大家纷纷行动起来，深入班组，参加劳动，密切联系群众，带头活学活用毛泽东思想，带头斗私批修，带头抓革命、促生产。矿上的新老干部以身作则，朝气蓬勃地出现在抓革命、促生产的第一线，进一步鼓舞了广大工人群众的革命积极性，全矿革命和生产出现了崭新的局面。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"军队支左","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a40c677ac6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
