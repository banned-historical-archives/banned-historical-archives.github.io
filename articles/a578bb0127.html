art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"步步紧跟毛主席 朝气蓬勃干革命某团党委成员学习毛主席著作在“用”字上狠下功夫","authors":[],"parts":[{"type":"paragraph","text":"本报讯 铁道兵某团党委认真学习毛主席关于无产阶级专政下继续革命的伟大学说，狠抓党委成员的思想革命化，大大振奋了领导班子继续革命的精神。大家决心步步紧跟毛主席，长征万里不停顿。"},{"type":"paragraph","text":"这个团的领导同志大多数是参军二十几年的老同志，为党、为人民做过一些工作，有的还多次立过功。在继续革命征途上，有的同志曾经背上了“老”字包袱，革命干劲不如当年足，革命朝气不如当年旺盛，甚至还出现了“没有功劳有苦劳，没有苦劳有疲劳”的错误思想。团党委针对这一思想实际，组织党委成员反复学习毛主席的光辉著作《将革命进行到底》和毛主席关于“夺取全国胜利，这只是万里长征走完了第一步”的教导，学习林副主席在“九大”的政治报告，检查自己的思想。大家深深感到，背上“老”字包袱，计较什么功劳苦劳的思想，实际上是半截子革命思想，是停顿起来不求进步的情绪的反映。有了这种思想，就不能紧跟毛主席在无产阶级专政下继续革命，就会把普通一兵的本色丢掉，甚至会被阶级敌人用糖衣裹着的炮弹击中。通过学习，大家的思想觉悟有了很大提高，决心进一步活学活用毛泽东思想，认真改造世界观，在思想革命化上做带头人，在革命征途上永不停顿，不断前进。"},{"type":"paragraph","text":"遵照毛主席的教导，团党委成员不讲功劳，不计苦劳，不怕疲劳，朝气蓬勃干革命。他们蹲山沟，住帐篷，不怕艰苦；上桥墩，进隧道，不辞辛劳；下连队，密切联系群众；上工地，积极参加劳动。团长马秀长牢记毛主席关于“我们共产党人不是要做官，而是要革命”的伟大教导，始终保持普通一兵本色。在施工中他身穿工作服，头戴柳条帽，和战士一起打眼放炮；遇到问题，就在隧道里和战士们一起活学活用毛主席著作，一起研究解决办法。一次，他到二营检查工作，营里考虑他年纪较大，沿途都是山路，很不好走，就让驭手套上马车去接他，他婉言谢绝了同志们的关怀，仍然背着背包徒步爬山赶到连队。政委陈学诗在解放战争和抗美援朝战争中，为人民负过伤，立过功。他牢记毛主席关于“不要吃老本，要立新功”的教导，刻苦认真地学习和实践毛主席关于无产阶级专政下继续革命的伟大理论。外出执行任务，经常吃不上饭，睡不好觉，他把这当成磨练自己一不怕苦、二不怕死的革命精神的好机会。中央两报一刊元旦社论广播的当天，他学到深夜，第二天一早，又冒着凛冽的寒风，翻山越岭走了几十里路，到连队和战士们一起学习毛主席的最新指示和元旦社论。战士们说：我们团首长紧跟毛主席，朝气蓬勃干革命，真是我们学习的好榜样。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a578bb0127"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
