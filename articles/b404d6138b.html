ical-archives/banned-historical-archives8/main/maoquanji20.pdf"],"article":{"title":"在中共七届一中全会第一次会议上的讲话","alias":"","parts":[{"type":"paragraph","text":"在中共七届一中全会第一次会议上的讲话！]"},{"type":"paragraph","text":"（1945年6月19日）"},{"type":"paragraph","text":"参加蒋介石召开的国民大会是危险的，故我们拒绝参加。我们决定不参加，把一个问题摆在美、蒋面前，也使中间派有文章做。这次国民大会开不开得成，蒋介石下决心的时候是在十一月。不开的好处是大家不合法；开的好处是蒋介石骑虎难下，成为众矢之的。我们的解放区人民代表会议则是稳当的、有利无弊的。它可能向两个方向发展，一个是向联合政府发展，选举-个解放区联合会；另一个也是向联合政府发展，但要经过一个曲折。成立解放区联合会，这是一个重大的步骤，前途就是成立一个新民主主义的政府。"},{"type":"paragraph","text":"王明同志写信给我，表示完全同意和拥护一中全会的三个文件一一全会议程、中央分工、解放区代表会议决议。"}],"authors":["毛泽东"],"dates":[{"year":1945,"month":6,"day":19}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":142,"page_end":142},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b404d6138b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
