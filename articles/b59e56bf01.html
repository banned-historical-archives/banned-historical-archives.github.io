ical-archives/banned-historical-archives0/main/maoquanji38.pdf"],"article":{"title":"给孙燕的信","alias":"","parts":[{"type":"paragraph","text":"给孙燕\"的信"},{"type":"paragraph","text":"（1957年12月17日）配君同志："},{"type":"paragraph","text":"来信收到。我同意你的意见，不去乡村。你母亲年已六十，不能劳动，当然不宜下放。你年小，你母亲需要照料，可以不去。但此事应由党作决定。你可持此信和你母亲一道，去湖南省委统战部，找那里的负责同志谈一谈，请他作出决定。我这封信只是建议，不是决定。"},{"type":"paragraph","text":"问你母亲和你好！"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一九五七年十二月十七日"},{"type":"paragraph","text":"去统战部时，可把你母亲照顾杨开慧同志的历史谈一下，使那里的同志了解情况。"},{"type":"paragraph","text":"[1]孙燕，学名孙佩君。她的母亲陈玉英1926年冬到毛泽东和杨开慧家里当保姆。1930年10月随杨开慧一起被国民党反动派逮捕，在狱中同敌人作了不屈的斗争。"}],"authors":["毛泽东"],"dates":[{"year":1957,"month":12,"day":17}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":380,"page_end":380},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b59e56bf01"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
