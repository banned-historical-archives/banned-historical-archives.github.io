script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"《人民日报》就本报发表的《告上海全市人民书》发表编者按抓革命促生产是当前文化大革命的关键问题崭新面貌的、革命的《文汇报》和《解放日报》的出现，是无产阶级革命路线反对资产阶级反动路线的胜利产物。这是我国无产阶级文化大革命发展史上的一件大事。这是一个大革命。","authors":[],"dates":[{"year":1967,"month":1,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京8日电　九日的《人民日报》就上海《文汇报》一月五日发表的《告上海全市人民书》发表编者按，全文如下:"},{"type":"paragraph","text":"《人民日报》编者按:上海《文汇报》一月五日发表的《告上海全市人民书》，是一个极其重要的文件。这个文件高举以毛主席为代表的无产阶级革命路线的伟大红旗，吹响了继续向资产阶级反动路线猛烈反击的号角。这个文件坚决响应毛主席的抓革命、促生产的伟大号召，提出了当前无产阶级文化大革命中的关键问题。这不仅是上海市的问题，而且是全国性的问题。"},{"type":"paragraph","text":"随着上海市革命力量的发展，崭新面貌的、革命的《文汇报》和《解放日报》出现了。这是无产阶级革命路线反对资产阶级反动路线的胜利产物。这是我国无产阶级文化大革命发展史上的一件大事。这是一个大革命。这件大事必将对于整个华东、对于全国各省市的无产阶级文化大革命运动的发展，起着巨大的推动作用。"},{"type":"paragraph","text":"(本报编者按:《告上海全市人民书》今日重新刊登于第二版)"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bc5acb1667"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
