thors":["戴学明　吴加溪　王木昌　葛毅"],"dates":[{"year":1967,"month":11,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"时代的最强音"},{"type":"paragraph","text":"海军首次学习毛主席著作积极分子代表大会代表、《海上猛虎艇》"},{"type":"paragraph","text":"戴学明　吴加溪　王木昌　葛　毅"},{"type":"paragraph","text":"我们纵情欢呼，"},{"type":"paragraph","text":"我们放声歌唱，"},{"type":"paragraph","text":"敬爱的林副统帅，"},{"type":"paragraph","text":"您为我们亲笔题词："},{"type":"paragraph","text":"“大海航行靠舵手，"},{"type":"paragraph","text":"干革命靠毛泽东思想”。"},{"type":"paragraph","text":"这是真理的结晶，"},{"type":"paragraph","text":"这是科学的总结，"},{"type":"paragraph","text":"这是时代的最强音，"},{"type":"paragraph","text":"这是亿万革命人民的心声。"},{"type":"paragraph","text":"在那炮火纷飞的战场上，"},{"type":"paragraph","text":"我们靠毛泽东思想，"},{"type":"paragraph","text":"猛打，猛冲，猛追，"},{"type":"paragraph","text":"消灭了吃人的美蒋豺狼。"},{"type":"paragraph","text":"在那惊心动魄的阶级大搏斗中，"},{"type":"paragraph","text":"我们靠毛泽东思想，"},{"type":"paragraph","text":"猛批，猛攻，猛轰，"},{"type":"paragraph","text":"把中国赫鲁晓夫“杀”的人仰马翻。"},{"type":"paragraph","text":"在公与私斗争的战场上，"},{"type":"paragraph","text":"我们靠毛泽东思想，"},{"type":"paragraph","text":"猛斗，猛挖，猛扫，"},{"type":"paragraph","text":"把“私”字扫地出门，"},{"type":"paragraph","text":"让“公”字在头脑里大放光芒。"},{"type":"paragraph","text":"“大海航行靠舵手，"},{"type":"paragraph","text":"干革命靠毛泽东思想”。"},{"type":"paragraph","text":"我们要以最大的决心，"},{"type":"paragraph","text":"我们要以最大的力量，"},{"type":"paragraph","text":"把林副主席的指示，"},{"type":"paragraph","text":"化为灵魂，落实在行动上。"},{"type":"paragraph","text":"永远忠于伟大的舵手毛主席，"},{"type":"paragraph","text":"永远忠于光焰无际的毛泽东思想，"},{"type":"paragraph","text":"沿着毛主席指引的方向，"},{"type":"paragraph","text":"奔驰在共产主义的金色航线上！"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3497d2651d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
