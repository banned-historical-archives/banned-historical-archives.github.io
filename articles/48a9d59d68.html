],"dates":[{"year":1967,"month":11,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　上海红卫兵革命造反展览会发出了关于征集文化大革命中的重要文献资料的启事。启事全文如下:"},{"type":"paragraph","text":"在光焰无际的毛泽东思想阳光的照耀下，在无产阶级文化大革命取得决定性胜利的大好形势下，在上海市革命委员会的直接领导下，上海红卫兵革命造反展览会的筹备工作已经全面开展。"},{"type":"paragraph","text":"举办红卫兵革命造反展览会，是巩固和总结无产阶级文化大革命伟大成果的一件大事，是毛主席、党中央交给广大红卫兵和革命造反派的一项光荣、严肃的政治任务。为了突出歌颂无产阶级文化大革命的伟大胜利，歌颂毛泽东思想的伟大胜利，歌颂以毛主席为代表的无产阶级革命路线的伟大胜利；为了更好地表现上海红卫兵在毛主席亲自发动和领导的无产阶级文化大革命运动中的革命造反精神和伟大功勋；为了教育人民，教育干部，教育后代，我们希望上海广大红卫兵、革命群众组织及有关单位，凡有文化大革命中的重要传单、图片和实物，以及其他可作为展出内容的重要文件材料，都能积极提供给我们，并与我们直接联系。"},{"type":"paragraph","text":"联系地址:上海延安中路1000号"},{"type":"paragraph","text":"上海红卫兵革命造反展览会秘书组"},{"type":"paragraph","text":"电话:"},{"type":"paragraph","text":"531690，563037×55"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"48a9d59d68"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
