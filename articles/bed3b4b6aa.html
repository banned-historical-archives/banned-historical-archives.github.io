tes":[{"year":1949,"month":10,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"世界人民为新中国诞生欢欣鼓舞"},{"type":"paragraph","text":"纷电祝贺毛泽东主席"},{"type":"paragraph","text":"【新华社北京六日电】保加利亚职工会中央委员会电贺毛主席称："},{"type":"paragraph","text":"“北京中华人民共和国中央人民政府毛泽东主席："},{"type":"paragraph","text":"当中华人民共和国中央人民政府选出之际，谨代表保加利亚工人和职员向你致热烈的战斗的敬礼。保加利亚工人和职员以极大的关切，注视着英勇中国人民在中国共产党领导下反对英美帝国主义者的多年的伟大而胜利的斗争。中华人民共和国的成立和英勇中国人民解放军之彻底粉碎国民党卖国贼，乃是以伟大的苏联和进步人类领袖斯大林同志为首的和平民主阵营中的新的坚强支柱。因此，反帝国主义阵营已更加成为反对新战争挑拨者的强大阵营。"},{"type":"paragraph","text":"中华人民共和国万岁！"},{"type":"paragraph","text":"英勇中国人民的领袖毛泽东同志万岁！"},{"type":"paragraph","text":"各国人民的领袖和导师斯大林同志万岁！"},{"type":"paragraph","text":"保加利亚职工会中央委员会"},{"type":"paragraph","text":"十月五日”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bed3b4b6aa"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
