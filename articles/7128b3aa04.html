script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"迅速执行各界代表会决议  京市府封闭全市妓院　千余妓女摆脱摧残剥削","authors":[],"dates":[{"year":1949,"month":11,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"迅速执行各界代表会决议"},{"type":"paragraph","text":"京市府封闭全市妓院"},{"type":"paragraph","text":"千余妓女摆脱摧残剥削"},{"type":"paragraph","text":"【北京讯】京市一百九十六家妓院，在昨晚八时被全部封闭。几千年来摧残妇女的野蛮制度的残余，从此在人民首都永远绝迹。这是市政府迅速执行第二届各界人民代表会议决议的结果。"},{"type":"paragraph","text":"昨日下午五时，各界人民代表会议一致通过封闭妓院的决议，聂荣臻市长在热烈掌声中，郑重宣布，立刻执行此项决议。市公安局于奉到命令之后，在五时半即出动干部和公安总队二千四百余人，在总局总指挥部的指导下，由民政局、市妇联等有关部门予以协助，分别到外城五个区及东郊、西郊等地，将饱受摧残和剥削的一千二百多个妓女，分别收容于临时设立的妇女生产教养院。同时对依靠剥削妓女为生，极端野蛮狠毒的一百九十六家妓院老板、领家等三百八十五人，分别集中审查，将按罪行大小依法处理。妓院财产全部没收，作为救济妓女之用。妓女在收容时，一般反映良好，三等妓女玉淑说：“这真好极了，我们早就盼望这一天。”三等妓女柳桂英的母亲刚从太原来，看到她女儿跳出火炕，感动得哭了，她说：“要不是从前国民党在太原抓人要钱，谁愿意把亲生女儿押到“窑子”里来呢！”对少数不了解政策的妓女，公安局的干部都予以温和的解释说服。为了使妓女们获得彻底的解放，临时设立的妇女生产救养院将依据此次京市各界代表会议决议的精神，负责对妓女进行教育，改造其思想，并将为她们医治性病，有家可归者遣送回家，有结婚对象者助其结婚，还没有结婚对象的，就组织她们学习技能，从事生产，使她们能逐渐独立谋生，成为社会的生产力量。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7128b3aa04"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
