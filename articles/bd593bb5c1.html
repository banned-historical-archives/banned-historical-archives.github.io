tes":[{"year":1980,"month":9,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"张恺帆委员说"},{"type":"paragraph","text":"对林彪、“四人帮”的流毒不能低估"},{"type":"paragraph","text":"张恺帆委员说，我们对林彪、“四人帮”的流毒和影响不能低估。有人说：“政治舞台如演戏，你上我下各有时，得势莫欺失势人，十年以后见高低。”这充分说明林彪、“四人帮”的残渣余孽，人还在，心不死，余毒还没有彻底肃清。现在有的干部跟林彪、“四人帮”犯了错误，还没有搞清楚，就调到别的省里，官复原职，有的还提升了。这样不利于干部总结经验教训，不利于领导班子的建设。这种人应该把他的问题搞清楚，检查好的可以用，但不能放到党和国家的要害部门。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"林彪","type":"人物"},{"name":"四人帮","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bd593bb5c1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
