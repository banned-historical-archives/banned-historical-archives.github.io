<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"心心相印　息息相通——看中国画《毛主席和牧羊人》","authors":["方平"],"dates":[{"year":1983,"month":12,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"方平"},{"type":"paragraph","text":"优秀的艺术品，往往会使人浮想联翩，思潮泉涌。在纪念毛泽东同志九十诞辰的时候，欣赏李宝林、陈雅丹的国画《毛主席和牧羊人》，就激起了我们对毛主席的深深的怀念和无限的眷恋。"},{"type":"paragraph","text":"这些年来，以表现领袖和人民在一起的题材的美术作品是不少的。而这幅画则突破了这类题材的一般表现手法，抓住人物最能传神的动作，给人们留下了难忘的印象。"},{"type":"paragraph","text":"画面上，寒冬腊月，毛主席在野外和两位牧羊人一起坐在地上，亲切地拉着家常，喝着大碗茶。画家准确地描绘了毛主席为其中一位牧羊人点烟时三个人的眼神，形象地揭示了毛主席和人民群众心心相印、息息相通的亲密关系。"},{"type":"paragraph","text":"这幅画的立意较深。画家意在表现领袖和人民之间内在的联系，因此不是一般化地表现他们在一起的情景，而是运用巧妙的艺术构思为读者留下了丰富的联想余地。从地上的两碗茶，我们可以联想到他们已谈了有一阵，领袖是那样关心群众，爱护人民；从主席为牧羊人点烟，牧羊人是那样无所拘束，坦率自然，我们可以联想到革命战争年代里，我们的人民与领袖之间的关系是那么亲密无间。三个人的画面是实的，背后的景象是虚的，这种艺术上的虚实结合，开阔了作品的画面，人们可以自然地从眼前的形象，进入画家为我们创造的“意境”，理解作品的主题。"},{"type":"paragraph","text":"鲁迅曾指出:“要极省俭的画出一个人的特点，最好是画他的眼睛。”《毛主席和牧羊人》就抓住了人物最能传神的眼睛，达到了较好的艺术效果。你看，画面上，毛主席的眼睛温和专注，他为牧羊人点火，就象在为一个熟悉的老战友，或者是远道来访的客人点火一样，亲切自然，平易近人。那位正吸着烟的牧羊人，则是那么激动，眉宇间流露出幸福的笑容，而另一个牧羊人，更是喜滋滋地望着眼前这一切，他大概是在想翻身后的农民应该向自己的领袖讲些什么吧!此情此景，令人心醉。"},{"type":"paragraph","text":"这幅画在处理人与物的关系上，在表现人与景的关系上，在刻画人物精神面貌与具体细节的关系上，都颇有独到之处。画面整洁明朗，色彩鲜艳，寓意深刻。这里的一些细节安排，如毛主席敞开的棉衣、衔在嘴上但尚未点着的烟、一满一浅的两碗茶，等等，都与人物组成了有机的联系，融为一体，衬托主题。同时作者巧妙地运用中国画传统笔墨和独特的表现方法，只以一群羊作环境渲染，使画面显得格外清新，人物形象更加突出。"},{"type":"paragraph","text":"《毛主席和牧羊人》，是国画家们深入生活取得的丰硕成果。它的创作经验表明，没有扎实的生活基础，要想创作出具有浓郁生活气息，并在传统题材中有所突破的作品，实在是不可能的。"},{"type":"paragraph","text":"\u003cIMG alt=请插入8号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1983\\12\\83CK030201.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e毛主席和牧羊人(中国画)　李宝林　陈雅丹\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgaut\u003e李宝林,陈雅丹\u003c/FONT\u003e"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6902ae43d8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
