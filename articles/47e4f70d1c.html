script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"动员被挤儿童入学　台北联校教员检查左倾错误","authors":["福德　森芹"],"dates":[{"year":1948,"month":6,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"动员被挤儿童入学"},{"type":"paragraph","text":"台北联校教员检查左倾错误"},{"type":"paragraph","text":"【黎城消息】二区台北联校，在上月十九号，接到人民日报十八号登载的纠正学校左倾错误及短论等，于二十号即召开全联校八个行政村的十个教员会议，读了报上的短论、批评与建议后，大家从个人思想检查左倾偏向，望北教员说：“去年秋天听到有学校挤封建，我就赶快发动儿童打了一个，挤了两个，组织贫雇学习小组，管起来的二十七个。全学校共学童五十八个，占人数百分之五十弱。”仵桥教员说：“我去年冬开学四五天就挤打了三个，教育科与联校和我谈，我以为走的是贫雇路线，这是为贫雇服务，挤出的还每日叫他们交柴二十斤。”岩南等学校去年冬先后成立贫雇学习组与治安组，来管理地富儿童。将干部撤换成翻身儿童，叫地主富农儿童每天送信、抬水、扫地。总计全联校四百八十六个儿童，挤打出的二十七个，管制的一百三十二个，使学校消沉，教员没劲去干，儿童识不上字，群众反映：“就这吧！”经过一上午的思想检查后，大家决心回去把挤出的学生都动员他们入学。"},{"type":"paragraph","text":"另一个是配合村上工作不恰当，儿童上课不经常，引起家长说到学校不顶事，念书不算话，使儿童感到无趣，不进校门。经一天的讨论检查，大家下定决心纠正这两个偏向。到六六节要检查各人工作成绩。（福德、森芹）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"47e4f70d1c"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
