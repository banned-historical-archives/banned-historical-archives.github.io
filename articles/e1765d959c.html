<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"强烈抗议垄断资本的残酷剥削二十万英国邮电工人举行罢工罢工得到美、法、日等国邮电工人的支援；英国政治经济受到严重影响","authors":[],"dates":[{"year":1971,"month":1,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社伦敦二十二日电　二十多万名英国邮电工人从二十日开始举行大规模的无限期罢工，强烈抗议垄断资本的残酷剥削，要求增加工资。这是英国有史以来第一次全国性邮电工人大罢工。"},{"type":"paragraph","text":"这次罢工使英国的政治经济活动受到严重的影响，给了垄断资产阶级以沉重的打击。据报道，邮电工人的罢工将使邮电当局每天损失约五十万英镑(合一百二十万美元)。"},{"type":"paragraph","text":"罢工开始后，将近两千个大邮局完全关闭，全国的信件和包裹的邮递工作几乎完全停顿。大堆的信件、包裹堆积在信件分拣中心，港口和机场上也堆积着从国外寄来的邮件，无人处理。许多大企业的商业活动不得不缩减，有些邮购业务陷于停顿。"},{"type":"paragraph","text":"由于英国电讯系统几万名工人中有大约百分之六十的电话接线员和其他电讯工人也参加了这次罢工，电话、电报和电传受到了严重影响。伦敦通往国外许多地区的电报陆续中断。许多垄断企业的进出口商业活动受到打击。连供代理首相、内政大臣莫德林用的内政部电话总机都关闭了。"},{"type":"paragraph","text":"各地邮电职工在罢工以前曾多次举行过抗议集会，对物价上涨而工资很低的状况表示强烈不满。二十日，各地的罢工工人还分别举行了示威。在伦敦最大的一个电话中继站，罢工的电话接线员们拿着标语牌设置了纠察线。在布莱克普尔、泰因河畔纽卡斯尔和坎特伯雷等几十个城镇，罢工工人也都纷纷举行集会或设置了罢工纠察线。在威尔士的加的夫，邮政工人在二十日清晨就举着抗议标语牌到这个城市的邮政总局门前示威。"},{"type":"paragraph","text":"英国邮电工人的工资比较低。随着物价的不断上涨，邮电工人的生活水平进一步下降。因此，他们早就提出了增加工资的要求。但是，英国邮政当局顽固地拒绝满足工人的合理要求。工人们忍无可忍，决定采取罢工行动。"},{"type":"paragraph","text":"英国邮电工人的罢工斗争得到了美国、法国、挪威、瑞典、比利时、意大利、澳大利亚、新西兰、日本等国家邮电工人的支援。这些国家的邮电工人决定拒绝受理英国与外界联系的电话、电报和电传等邮电业务。"},{"type":"paragraph","text":"英国统治集团对邮电工人的罢工非常不安。二十日晚上，代理首相莫德林赶紧召集有关大臣举行会议，策划对付邮电工人罢工斗争的阴谋。就业和生产率大臣对邮电工人施加压力，要工人接受“仲裁”。资本家出动汽车甚至飞机递送工商业来往邮件，妄图破坏工人的斗争。但是英国邮电工人不怕威胁和破坏，目前仍在继续坚持斗争。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e1765d959c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
