art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"华主席会见吴奈温总统","authors":[],"parts":[{"type":"paragraph","text":"国务院盛宴热烈欢迎缅甸贵宾 邓小平副总理、邓颖超副委员长等参加了会见和谈话 邓小平副总理主持宴会 李先念副总理出席"},{"type":"paragraph","text":"新华社一九七七年九月十七日讯 中共中央主席、国务院总理华国锋今天下午会见了缅甸联邦社会主义共和国总统兼国务委员会主席吴奈温。"},{"type":"paragraph","text":"会见在人民大会堂进行。缅甸贵宾来到会见厅时，华主席同吴奈温总统和他的女儿钦珊达温以及总统的其他随行人员一一握手，对他们前来我国访问表示热烈欢迎。宾主一起照了像。"},{"type":"paragraph","text":"在亲切的气氛中，华主席同吴奈温总统、国务委员貌貌博士、外交部长吴拉蓬、第二工业部长貌丘上校、国防部长觉廷将军，进行了热情友好的谈话。"},{"type":"paragraph","text":"邓小平副总理、邓颖超副委员长、黄华外长、韩念龙副外长，参加了会见和谈话。"},{"type":"paragraph","text":"新华社一九七七年九月十七日讯 国务院今晚举行宴会热烈欢迎缅甸联邦社会主义共和国总统兼国务委员会主席吴奈温及其随行人员。"},{"type":"paragraph","text":"国务院副总理邓小平主持今晚的宴会。"},{"type":"paragraph","text":"国务院副总理李先念、王震，人大常委会副委员长邓颖超，外交部长黄华，中国人民解放军副总参谋长李达，出席了宴会。"},{"type":"paragraph","text":"宴会在人民大会堂举行。这是一次欢乐的聚会。中缅两国朋友进行了亲戚“胞波”般的交谈，畅叙两国人民间的友好情谊。宾主频频举杯祝中缅两国人民的友谊和两国友好关系不断发展。"},{"type":"paragraph","text":"邓小平副总理和吴奈温总统先后在宴会上祝酒。邓小平副总理在祝酒时说，我们高兴地看到，近年来在我们两国政府和人民的共同努力下，我们两国的友好关系获得了新的发展。吴奈温总统对我国的每一次访问，都为加深我们之间的友谊作出了重要贡献。吴奈温总统和其他缅甸贵宾们这次停留的时间虽短，但是双方能够就各自国家的建设和发展的一些方面交流经验，互相学习，这对加深我们的相互了解，巩固我们之间的友谊具有十分重要的意义。"},{"type":"paragraph","text":"吴奈温总统在祝酒时说，每次我到中国访问，都受到无微不至的款待，这充分表明中国领导人和中国人民对缅甸人民的情谊。这次虽然我们是顺道来中国作短暂访问，但受到了华国锋主席等中国领导人体贴入微的接待，为此，我表示感谢。他祝中华人民共和国继续繁荣昌盛，祝缅中两国人民之间的友谊和两国友好关系长存。"},{"type":"paragraph","text":"缅甸驻中国大使馆外交官员应邀出席了宴会。"},{"type":"paragraph","text":"出席宴会的还有政府其他部门、对外友协、北京市革命委员会的负责人韩念龙、周化民、石林、宋养初、孙晓风、彭德清、刘向三、杜子端、华山、钱信忠、李青川、王冶秋、张瑞霭、曾涛、金照、杨骥、郑天翔等。"},{"type":"paragraph","text":"邓小平副总理同吴奈温总统举行会谈"},{"type":"paragraph","text":"新华社一九七七年九月十七日讯 国务院副总理邓小平同缅甸联邦社会主义共和国总统兼国务委员会主席吴奈温，今天上午举行了会谈。"},{"type":"paragraph","text":"缅甸方面参加会谈的有国务委员貌貌博士，外交部长吴拉蓬，第二工业部部长貌丘上校，国防部长觉廷将军，总统办公室主任埃觉中校，外交部政治司司长吴苏莱，外交部国际组织和经济司代理司长、研究处长杜丹汉。"},{"type":"paragraph","text":"中国方面参加会谈的有外交部部长黄华，副部长韩念龙，司长沈平，副司长程瑞声、刘华。"},{"type":"paragraph","text":"华主席同吴奈温总统亲切握手。 新华社记者摄（照片）"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"华国锋","type":"人物"},{"name":"李先念","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3c522e7a40"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
