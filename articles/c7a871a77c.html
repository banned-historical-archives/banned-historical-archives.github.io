script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"0b2f26ed-ad29-48e7-9c89-446932a97ab0","name":"中共党史教学参考资料 第27册 “文化大革命”参考资料 下册（1988年）","internal":true,"official":true,"type":"pdf","author":"","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives3/main/0b2f26ed-ad29-48e7-9c89-446932a97ab0.pdf"],"article":{"title":"再论孔丘其人","alias":"","parts":[{"type":"paragraph","text":"论”是孔孟之道的“学而优则仕”的翻版。教育界右倾翻案风的鼓吹者为了否定教育革命的成果，为修正主义的教育路线翻案，为复辟资本主义培养“人才”、又拣起了“学而优则仕”这个孔家店的破烂货。什么“培养工人农民。这样学校就取消了\"啦，什么不培养干部、技术员“还办大学于什么\"啦，等等，说穿了，就是把大学当作猎取高官厚禄的门砖，当作爬上精神贵族楼阁的阶梯，想要引诱青年跟他们走进复辟倒退的死胡同。一句话，他们要把作为无产阶级专政的工具的大学变成封建王朝的“大学”，变成资产阶级培养奴才的“最高学府”。"},{"type":"paragraph","text":"科技界右倾翻案风的鼓吹者，反对在科技战线上实行无产阶级专政，反对党对科技工作的领导，反对大搞群众运动，反对专业科技人员同工农相结合，反对开门办科研。他们故意歪曲党的政策，挑拨党和知识分子的关系，说在科技领域实行无产阶级专政，就是什么把知识分子“变成专政的对象了”。他们认为资产阶级知识分子不必改造世界观，说“许多政治工作、思想工作是妨碍科研、破坏科研”；他们鼓吹早已被革命群众批判过的由业务上的“专家”“权威“领导科研单位的制度，并且公然用孔老二的话说，这就是“名不正，言不顺，首先要正名”。在他们看来，工农兵是大老粗，“文化水平太低”，不配搞科研，妄图把广太群众摒弃在科研大门之外。至于工人阶级派出代表参加科研单位的领导工作，那就更为他们所不容了。他们所说所做的这一套，同孔孟宣扬的“唯上智与下愚不移”，“劳心者治人，劳力者治于人”，究竞有什么两样呢？"},{"type":"paragraph","text":"孔老二及其徒子徒孙们从保护没落反动阶级的切身利益出发，反对新兴阶级对没落阶级的阶级斗争，反对新生力量取代反动力量的社会变革，便百般地鼓吹“不偏之谓中，不易之谓庸”的中庸之道。刮右倾翻案风的人顽固地反对无产阶级必须在上层建筑其中包括各个文化领域对资产阶级实行全面专政，反对以社会主义新生事物代替资产阶级腐朽事物，因此也用折中主义的诡辩论、叫卖阶级斗争熄灭论、唯生产力论的陈旧货色。他们象林彪一样挥舞“中庸之道合理”的大棒，“大胆反对”所谓“极左”，实际上把矛头对着毛主席的革命路线，对着革命的群众运动。正象孔老二一样，无非是用“中庸”的面纱掩盖向革命群众反扑的挣拧嘴脸。"},{"type":"paragraph","text":"列宁指出：“旧社会灭亡的时候，它的死户是不能装进棺材、埋入坟墓的。它在我们中间腐烂发臭并且毒害我们.”《列宁全集》第二1七卷第四O七页）为复辟奴隶制奔走呼号的孔老二早已被扫进了历史的垃圾堆，但孔孟之道一整套反动思想并没有自行消失，而且至今仍然在继续腐蚀、毒害人们的灵魂，仍然被刮在倾翻案风的人用来搞复辟倒退。要在思想根源上把刮右倾翻案风的人推行的修正主义路线批深批透，必须继续批孔。"},{"type":"paragraph","text":"（原载1976年2月131《人民月报》）再论孔丘其人"},{"type":"paragraph","text":"（一九七六年二月二十四日）北京大学、清华大学大杭判组仅是一个顽固的守旧复古派，而且一旦得到权势，还是一个十足的翻案复辟狂。他曾在一个不太长的期间在售国当过大官。虽然掌权时间不长，却疯狂地从政治上、思想上、组织上对新兴跑主阶级进行了全面的反攻倒算，充分表现出他把没落奴隶主的复辟希望变为复辟行动的反动本质。孔丘这-一套，为后世一切搞复辟倒退的人所效法。在去年夏季前后那股右倾翻案风中，不是可以清楚地看到孔丘的幽灵还在游荡吗？那股右倾翻案风的风源，就是在文化大革命前追随刘少奇搞修正主义、在文化大革命中被批判过而不肯改悔的走资派。其所作所为、与孔老二的行径何其相似乃尔！"},{"type":"paragraph","text":"孔丘生活的时代，奴隶制度已经腐朽，奴隶起义、平民暴动和新兴地主阶级的夺权斗争此伏彼起，奴隶主贵族的统治风雨飘摇，处于全面瓦解的过程中，封建制取代奴隶制已成为不可抗拒的历史潮流。孔丘上台之际，鲁国革命形势蓬勃发展。新兴地主阶级的代表“三桓”一季孙氏、叔孙氏、孟孙氏登上了政治舞台，他们分占奴隶主头子鲁国国君的土地和奴隶，发展了封建生产关系，掌握了国家大部分权力。“三桓”敢于蔑视奴隶主的权威，把维护奴隶制的周礼踩在脚下。革新派代表人物少正卯办起了教育，宣传新兴地主阶级革新思想，批判腐朽的奴隶制度，影响很大，弄得“孔子之门、三盈三虚”。总之，各个领域都在发生着深刻的变革，革命潮流势不可当，把腐朽的奴隶制度冲击得七零八落，四分五裂。"},{"type":"paragraph","text":"孔丘顽固地站在没落奴隶主贵族的立场、对这场社会大变革恨得咬牙切齿。他把一切腐朽的旧事物视为至宝，一丁点也不准改动；他对一切新生事物，这也看不惯，那也不顺眼，百般挑剔，横加指责。新兴地主阶级革除了奴隶社会野蛮残酷的人殉制度，他咒骂革新者断子绝孙。你要把“三年之丧”改为一年吗？他说这可改不得。你要去掉每月初一祭祖庙用的活羊吗？他说那可动不得。甚至连一只酒杯在形体上有了一点改变，他也暴跳如雷。对于代表奴隶制度的陈旧的东西，他沉迷留恋，如醉如痴。在齐国宫廷里听到古老的《韶》乐，竞然“三月不知肉味”。他主张用夏朝的历法，坐殷朝的车子，戴周朝的礼帽，听歌颂舜的《韶》乐和歌颂周武王的《舞》乐。“率由旧章”、这就是他的方针。“齐一变，至于售；鲁一变、至于道”（把新兴地主阶级势力发展比较早的齐国，变成新兴地主阶级势力正在发展中的鲁国的样子；再把鲁国改回到“先王之道”的西周奴隶制），这就是他梦寐以求的政治“模式图”。他曾经明确地对子路说：“如果有人用着我，我就在东方把奴隶制恢复起来。”他还宣称：“我一年便可以搞出个样子来，三年就一定有成就。”"},{"type":"paragraph","text":"一朝权在手，便把令来行。孔丘一上台，就心急火燎地着手改变鲁国新兴地主阶级的政治路线。他凭借窃踞的地位，利用各种场合，大造“天下无道”的舆论。在他眼里，鲁国的社会变革简直是一场灾难、今不如昔，一代不如一代。“圣人”、“善人”已不再能见到！，就连古人的“狂”“矜”“愚”这些缺点也比今人好。你看，什么都搞乱了，不象个样子，一团糟，政权竞落在新兴势力的大夫手里，老百姓也要议论朝政，“礼坏乐崩”，气得孔丘又是摇头，又是躁脚，狂吼“是可忍也，敦不可忍也”。有一次，他问刚从季氏那里回来的冉求：“为啥回来这么晚？”冉求说：“处理政事。“孔丘轻蔑地说：“普通事务罢咧。”他压根不承认新兴地主阶级的政治是“政\"事。按照他的复辟经，政者正也”，季氏政权必须“正\"到奴隶制的轨道上去。他一旦当上“大官”，就大张旗鼓地“正名”了，也就是要把社会历史从发展变革的趋势中扭回去、实现他“克已复礼”的反动纲领。他横下一条心、大胆干，拼命干，说复旧就复旧，就是1《论语·述面》：“圣人，吾不得而见之契”，“善人、吾不得而见之矣。”要开倒车，就是要“正名”，“名不正则言不顺\"嘛！"},{"type":"paragraph","text":"孔斤的“正名”、就是向新生事物和新兴力量进行疯狂的反攻倒算，是颇带一些血腥气的。新生事物是在社会大变革中涌现的，代表着历史前进的方向。它的成长和发展，宣判了旧事物的死刑。因此、拼死保护旧事物的孔丘就要“纠之以猛”。他对新生事物的摧残、拖杀，可谓大刀阔斧，无所顾忌。按照周礼的规定，大夫“家不藏甲，邑无百雉之城”，就是说大夫不能有军队，不能有周围达三百丈的城。可是，鲁国新兴地主阶级的代表“三桓”无视周礼，发展了自记的力量，建立了各自的都城一费、、成。三都的建立，表明新兴地主阶级力量在政治上、军事上的壮大，是对奴隶主头子鲁君的严重威胁。这还了得，非削平不可！孔丘派子路打人季氏内部相策应，并亲自调兵，先后平掉了都、费都。只是由于孟孙氏的坚决反抗以及季孙氏、叔孙氏对孟孙氏的积极支援，使他损兵折将，才没有平掉成都。"},{"type":"paragraph","text":"对于新兴地主阶级革新派，孔丘看作眼中钉，肉中刺，必欲一棍子打死而后快。子贡问他：“您看现在的执政者怎么样？”他摆出十足的贵族老爷的架势，牙缝里嘘了一声说：“那伙卑微低贱的小人，算什么玩艺儿！\"个看，孔丘对登上政治舞台的新兴势力，怀着多么深刻的仇恨！那些顺应历史潮流的朝气勃勃的新兴地主阶级革新派，在孔丘眼里，既没有奴隶主贵族那样的身分，又没有什么知识和修养，怎么能让他们执掌政事呢？不把他们打下去，就不能随心所欲地推行复辟倒退的路线。他上台不久，就残酷地杀害了少正卯。少正卯不但在教育上同孔丘对着干，是一个进步理论的宜传家，而且作为鲁国的“乱政”大夫，又是一个新兴地主阶级政治革新的参与者。孔丘杀害少正卯是蓄谋已久的。他大权在握，经过一番精心策划，就给少正卯加上五条罪名。少正卯顾应历史发展潮流，坚持革新路线，批判奴隶制度，宣传进步理论，这些都成了十恶不赦的罪状。孔丘把他杀害之后，还暴户示众三日。这是没落奴隶主阶级对新兴地主阶级血腥的阶级报复。孔丘对付新兴力量，绝不讲什么“温、良、恭、俭、让”，他杀气腾腾，一不做，二不休，确有那么一股“猛”劲。直到他四处碰壁、倒床奄奄一息的时候，听说齐国新兴地主阶级代表陈恒夺取了政权，他还挣扎着爬起来，请求鲁国国君派兵去镇压。这说明，复辟势力上台，革命者就必然要人头落地。反动的阶级与革命的阶级、复辟倒退的路线与前进革新的路线水火不相容，它们之间的斗争是何等的尖锐激烈！“不是东风压倒西风，就是西风压倒东风，在路线问题上没有调和的余地。”"},{"type":"paragraph","text":"孔丘的“正名”，也就是搞翻案，“举逸民”。他急不可待地把那些没落奴隶主贵族扶植起来，拼凑起一个复辟班子。当初，鲁国没落奴隶主的头号代表人物鲁昭公妄图复辟，向“三桓”反夺权，失败后逃亡，死在晋国。季孙氏认为他罪有应得，把他埋在墓道之南，不让他与祖宗葬在一起：还想给他一个坏的谥号，以便后代子孙知道他的罪恶。孔丘却利用窃取的权力，把鲁昭公的墓迁人祖莹，替他恢复名誉，借助这个奴隶主贵族头子的户为复辟鸣锣开道。孔丘十分懂得，不给那些臭不可闻的复辟派翻案，不对他们作一番洗刷，没落奴隶主阶级就扶不起来，新兴地主阶级就打不下去。所以孔丘一面翻案，就一面大搞“举逸民”。他不断吹嘘自已的门徒：这个大胆果断，那个通情达理，还有那个精通业务公，企图让他们去算夺新兴地主阶级各方面的大权。他安插子路、仲弓等人做季氏家臣，当内探，破坏新兴地主阶级的革新路线。仲弓向他请教如何管理政事，他面授机宜，要仲弓特别注意“举贤才”。门徒子游作了武城宰，孔丘首先关注他的也是发现“人才”。的确，为要“举逸民”，孔丘四处1《论语·子路》：“噶！斗宵之人.何足算也！插手，布置心腹，竭力网罗腐朽没落势力、要做到“故旧不遗”。这些“故旧”，孔斤美其名日“贤才”。“贤才\"者，善于搞复辟的骨于分子也。"},{"type":"paragraph","text":"孔丘搞复辟翻案活动，是不得人心的。为了掩人耳目，他装出一副关心民生疾苦的姿态，声称要让老百姓生活富裕，年老的获得安适，年少的受到关怀。还提出“使民以时”、不要影响农业生产。俨然一个“恺梯君子，民之父母”。其实，孔丘是一个极端部弃和仇视劳动人民的大恶霸，他诬蔑劳动人民是“难养”的“小人”。郑国奴隶主有一次把崔符起义的奴隶全部屠杀，他听说后连连拍手称快，说是人民侮慢无礼就该狠狠镇压。他陪着鲁定公与齐景公在夹谷会盟，还以违反“周礼”的罪名，亲自指杀死了许多歌舞奴隶。这个劳动人民的死对头，怎么会关心、照顾起人民群众来了呢？所谓关心民众、发展生产云云，统统是幌子，其目的无非是给新兴地主阶级政权抹黑：人民生活水平低了，生产上不去了，实在不行了！当时，“三桓”实行一系列以封建制取代奴隶制的变革，解放了生产力、促进了社会的发展。连晋国的大夫都称赞他们得到了人们的拥护。对于这些，孔丘一概视而不见，故意颠倒是非，混淆黑白。他话里话外，把新兴地主阶级的革命变革说成是祸国映民。既然如此，要提高生活，发展生产、就一切恢复老样子吧！如果依了他的主张，那就只能是奴隶制复辟，解放了的生产力又被束缚起来。孔家店的二老板孟轲对孔丘这一绝招是颇得心传的。他提出“夫仁政必自经界始”，就是说要人们得到好处、过幸福生活，必须从恢复奴隶社会的并田制入手。显而易见，孔丘之流抓生活、抓生产是假，搞复辟、搞倒退是真。"},{"type":"paragraph","text":"孔丘一掌权就搞复辟，绝不是偶然的。他过去就紧跟鲁国头号复辟派鲁昭公大反新兴地主阶级，鲁昭公失败，他也跟在鲁昭公的屁股后面窜到齐国。孔丘这类反动没落阶级的代表人物，立场不改变，除了复辟，再也搞不出别的名堂来。有时即使来一下赌咒发暂，那也是从不算数的。孔丘在匡城被围，与匡人订了盟约，立下保证，不是一转身就全推翻了吗？他一贯坚持没落奴隶主贵族的反动立场，从来不是象有人说的那样，是什么顺乎时代的潮流，同情人民的解放，由奴隶社会变为封建社会的那个上行阶级的前驱者。"},{"type":"paragraph","text":"孔丘虽然早已完蛋了，但是，阶级斗争的历史告诉我们，一切妄图拉着历史车轮倒退的反动没落阶级，都把他奉为“至圣先师”。他那种坚持复辟倒退的顽固性，拼死反攻倒算的疯狂性，玩弄鬼域使俩进行反扑的欺骗性，是古今复辟派所共有的。今天，党内那些还在走的走资派，不正是亦步亦趋地踩着孔老二脚印走的吗？他们提出什么“三项指示为纲”的修正主义纲领，否定以阶级斗争为纲，改变党的基本路线，用折中主义的手法鼓吹阶级斗争熄灭论和唯生产力论，反对无产阶级文化大革命和文化大革命中涌现的革命的新生事物，就是要沿着孔老二“兴灭国、继绝世，举逸民”的老路，开历史倒车，复辟资本主义。伟大领袖毛主席指出：“革命的政党，革命的人民，总是要反复地经受正反两个方面的教育，经过比较和对照，才能够锻炼得成熟起来，才有赢得胜利的保证。”“轻视反面教员的作用，就不是一个彻底的证唯物主义者。”在当前回击右倾翻案风的伟大斗争中，我们必须坚持以阶级斗争为纲，继续批孔，充分发挥孔丘这个反面教员的作用，彻底揭露党内不肯改悔的走资派的真面目、深人批判修正主义，夺取无产阶级专政下继续革命的更大胜利。。"},{"type":"paragraph","text":"（原载1976年2月24日《人民日报》）"}],"authors":["北京大学大批判组","清华大学大批判组"],"dates":[{"year":1976,"month":2,"day":24}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":377,"page_end":380},"tags":[{"name":"夺权","type":"主题/事件"},{"name":"教育革命","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c7a871a77c"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
