,"authors":[],"dates":[{"year":1975,"month":12,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"人民解放军某部指战员为发展文化大革命胜利成果贡献力量"},{"type":"paragraph","text":"热情支持朝阳农学院开门办学"},{"type":"paragraph","text":"据新华社沈阳一九七五年十二月八日电　人民解放军驻辽宁省朝阳地区某部指战员，满腔热情支持朝阳农学院的教育革命，为巩固和发展无产阶级文化大革命的成果积极贡献力量。"},{"type":"paragraph","text":"朝阳农学院刚从城市搬到朝阳山沟，房子不够住，部队就挤出一些房间让他们住；建造教学基地缺少运输工具，部队又抽派车辆帮助运输。学院开门办学，有一项学军课，部队每年都把这件事情列入党委的工作计划。他们根据学院的要求，先后几次选派路线觉悟高、军事素质好的干部和战士进校担任军训教员，今年又两次热情接待了到部队参加学军的师生。为了搞好学军，他们还和学院党委一起组成联合领导小组，共同制定军训计划。不久前，朝阳农学院有三百多名师生来到某团参加军训，他们一进营房，部队领导干部就请师生参观连队荣誉室，让英雄模范人物给师生讲我军光荣传统，在班排和训练现场，给师生们讲路线，教军事，传传统，带作风。"},{"type":"paragraph","text":"这个部队的广大干部、战士积极热情地支持朝阳农学院的办学方向。他们宣传朝阳农学院实行教学、科研、生产三结合所取得的丰硕成果，讲从朝阳农学院毕业回农村的大学生在生产第一线发挥的作用和贫下中农对这些学生的高度赞扬。去年年底，朝阳农学院“农大毕业当农民好”的经验在《人民日报》发表以后，他们就向驻地二十多所中小学派了校外辅导员，一面帮助中小学开展教育革命，一面向师生宣传朝阳农学院的经验。"},{"type":"paragraph","text":"在热情支持朝阳农学院开展教育革命的同时，这个部队还广泛学习朝阳农学院教育革命的经验，促进部队建设。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"教育革命","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"name":"朝阳农学院","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c2e7e47224"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
