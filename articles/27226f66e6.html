script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"我国人民的伟大领袖毛主席会见蒙博托总统毛主席对蒙博托总统前来我国进行国事访问，表示热烈欢迎。会见在友好、坦率的气氛中进行。会见时在座的有周恩来总理、姬鹏飞外长等","authors":[],"dates":[{"year":1973,"month":1,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京一九七三年一月十三日电　我国人民的伟大领袖毛泽东主席今天下午在中南海会见了正在我国访问的扎伊尔共和国总统蒙博托·塞塞·塞科中将。"},{"type":"paragraph","text":"当蒙博托总统在外交和国际合作事务国务委员恩古扎·卡尔·伊邦德、共和国总统府主要顾问莫科洛·瓦·姆庞博陪同下来到会见厅时，毛主席同他及其随行人员热烈握手。蒙博托总统说:我为有机会同你会见感到高兴。我代表扎伊尔人民向你表示敬意。毛主席对蒙博托总统前来我国进行国事访问，表示热烈欢迎。会见在友好、坦率的气氛中进行。"},{"type":"paragraph","text":"会见时在座的有周恩来总理、姬鹏飞外长和齐宗华、罗旭、唐闻生等工作人员。"},{"type":"paragraph","text":"\u003cIMG alt=请插入6号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1973\\01\\731e010101.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e毛主席和蒙博托总统热烈握手。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入6号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1973\\01\\731e010102.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e我国人民的伟大领袖毛泽东主席一月十三日下午在中南海会见了正在我国访问的扎伊尔共和国总统蒙博托·塞塞·塞科中将。会见时在座的有周恩来总理、姬鹏飞外长和齐宗华、罗旭、唐闻生等工作人员。"},{"type":"paragraph","text":"毛主席会见蒙博托总统及其随行人员时情形。"},{"type":"paragraph","text":"新华社记者摄(传真照片)\u003c/FONT\u003e"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"27226f66e6"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
