ates":[{"year":1986,"month":2,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"杭州清退“文革”中被查抄的文物图书"},{"type":"paragraph","text":"本报讯　近两年来，浙江省杭州市举办了两次认领会，有两千四百户高高兴兴地认领了在“文革”中被查抄的文物、字画、工艺品、图书共一万六千四百五十二件、册。"},{"type":"paragraph","text":"为了搞好清退“文革”中被查抄的文物、图书，杭州市先后派一百一十名干部做这项工作。在每次认领会前，市委都举行新闻发布会，报纸、广播、电视配合宣传。"},{"type":"paragraph","text":"当浙江省文史馆馆员吴竞清的亲属领回六百多册图书时兴奋地说：我要写信告诉国内外亲友，让他们和我一起高兴。当八十岁高龄的赵受新失而复得吴昌硕、紫藤、齐白石等大师作的画时，感动得不知说什么好。（张砚　廖晓英）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"浙江文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e95d9a4d40"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
