","authors":[],"dates":[{"year":1950,"month":7,"day":15}],"is_range_date":false,"parts":[{"text":"广西某些民主人士对我党和政府的意见","type":"title"},{"text":"(广西日报社七月十五日讯)广西某些民主人士对我党和政府的意见：民主人士陈良左对政府很不满意，认为没有给他适当工作，对伪政府时代比他地位低的陈雄现在比他有实权，颇为不满。有些人认为：要他们说话表示意见的时候就找他们，否则就不管；他们认为这是为了“装面子”。有的认为“统战部是思想检查所”。有些民主人士因未能及时分配工作，情绪很坏。","type":"paragraph"}],"comments":[],"origin":"新华通讯社编《内部参考》1950年8月2日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"727a221cf2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
