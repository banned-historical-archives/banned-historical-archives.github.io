rt":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"条件越艰苦越要关心战士戒严部队某部干部爱兵受赞扬","authors":["刘文革/张水平"],"parts":[{"type":"paragraph","text":"本报讯 刘文革、张水平报道：在执行戒严任务中，某部各级干部开展爱兵活动，增强了官兵团结，部队出现团结一致、士气高昂的景象。6月1日，百余名战士联名给领导机关写信，赞扬干部爱兵的事迹。"},{"type":"paragraph","text":"条件越艰苦越要关心战士疾苦，是这个部队各级领导的共同想法。部队到达指定地域后，一些连队帐篷、锅灶没有收拾好，时逢天降大雨，党委“一班人”和机关干部主动把战士让进临时搭成的简易棚子。战士站岗把衣服淋湿了，政委当即拿出衣服给战士换上，自己只穿一件单衣代替战士上岗执勤。部队吃水困难，机关干部主动放弃洗脸、洗脚，把水让给战士用。干部们还自动组织起来轮换替战士站岗。干部们以对战士的厚爱，换来了战士对干部的信任和理解。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2edfc353fd"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
