<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"cnd","name":"文革博物馆","internal":false,"type":"db","official":false,"author":"","article":{"title":"关于夏杜克一案","authors":["伊叶"],"dates":[],"comment_pivots":[],"comments":[],"is_range_date":false,"description":"","page_start":0,"page_end":0,"parts":[{"text":"一九九六年八月十二日出版的《华夏文摘》增刊第九十六期——文革博物馆专集（十）（ｚｋ９６０８ａ）登有顾晓阳先生所写《逃学》一文，内称“……我至今还记得一位死囚的名字，叫夏杜克。他比我大不了几岁（年未满十八岁），父亲是个部级干部，家里生活优裕。但这小子却溜门撬锁，偷盗成性，就为这，给拉出去毙了。”","type":"paragraph"},{"text":"笔者与夏杜克为中学同班同学，本着对事实和个人名誉负责的目的，愿以所知补充并纠正上述说法。夏杜克出身高干，家里生活优裕，确为事实。他于１９６８年夏十五岁时被判死刑缓期两年执行而非立即执行，罪行为在一次群殴中持刀行凶致人死命，而非溜门撬锁，偷盗成性。事实上夏杜克在班上举止文雅，很有教养，从不逞凶斗狠，仗势欺人，曾被指定为班文革小组成员。平时他除略显一些干部子弟常有的优越清高之态外，并无其他不良习气和作风，以至他出事以后所有同学都极感意外。说他溜门撬锁，偷盗成性，可能来自于批判发言的无限上纲和肆意夸大，并无事实根据。当年北京一些中学生，特别是一些干部子女，在校外结成团伙打架斗殴，无非是为了出名“拔份儿”，在同性或异性朋友面前逞逞英雄罢了，并无其他政治经济目的。更多的是由于无所事事，以及父母学校由于自顾不遐而对他们的疏于管教，使他们走入歧途，而非本身的道德败坏，流氓成性；换句话说，是社会对他们的极不负责的放任以至抛弃使他们把自己的青春活力发挥到错误的方向去了。熟悉那个年代的人对此是不难理解的。不熟悉那个年代的人只要去看看电影《阳光灿烂的日子》里男主角的所作所为也就会明白了。多亏电影里的少年只用了砖头而不是刀子，否则很可能会成为夏杜克第二的。夏杜克后来的结局如何，是否被执行死刑，我不知道。由于他年龄小和案情单纯，我觉得没死的可能性更大。即使他确已死了，也不是泼皮无赖的恶贯满盈，说他（和被他杀死的人）是被社会变动急风暴雨摧折的一株嫩苗也许更为恰当。他（们）本来是可以成材的。唯此，我们才能看清这一悲剧背后的社会根源，明了那个疯狂的年代是如何扭曲和毒化人性的。","type":"paragraph"},{"text":"□ 寄自美国〈~}Gang.Qiu@ummed.edu~{〉————————————————————————————————————Now go to \u003ca href=\"/HXWZ/ZK96/zk98.hz8.html\"\u003ethe previous Zeng Kan issue\u003c/a\u003eor go back to \u003ca href=\"#TOC\"\u003ethe TOC of this issue\u003c/a\u003eor go to \u003ca href=\"/HXWZ/ZK96/zk100.hz8.html\"\u003ethe next Zeng Kan issue\u003c/a\u003eor go to \u003ca href=\"/HXWZ/cm-all.hz8.html\"\u003ethe index of all available issues\u003c/a\u003eor go to \u003ca href=\"#TRAILER\"\u003ethe end of this last column\u003c/a\u003e ————————————————————————————————————","type":"paragraph"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f93f64ef57"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
