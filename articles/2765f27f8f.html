<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"邓拓，休想溜过去！  是黑线就要搞掉，是黑帮就要打垮。我们工人阶级，有责任捍卫社会主义，捍卫毛泽东思想","authors":["田凤林"],"dates":[{"year":1966,"month":5,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"邓拓，休想溜过去！"},{"type":"paragraph","text":"是黑线就要搞掉，是黑帮就要打垮。我们工人阶级，有责任捍卫社会主义，捍卫毛泽东思想"},{"type":"paragraph","text":"呼和浩特邮电局投递科政治指导员　田凤林"},{"type":"paragraph","text":"我看了报上刊登的有关邓拓等一伙黑帮的反党反社会主义的材料后，万分愤慨。邓拓在《燕山夜话》中说的反党反社会主义的黑话，和国内外阶级敌人唱的完全是一个调子，如出一辙，其性质之恶毒，手腕之毒辣，比起以往的反共专家们都有过之而无不及。邓拓不愧为一小撮反党反社会主义分子中的一员主将，黑帮中的一个头目。"},{"type":"paragraph","text":"是黑线就要搞掉，是黑帮就要打垮。我们是工人阶级，有责任捍卫社会主义、捍卫毛泽东思想。我们决不允许邓拓兴风作浪，一定要坚决把他打倒，坚决向反党反社会主义的黑线开火，而且一定要站在社会主义文化大革命的前列。"},{"type":"paragraph","text":"邓拓向党发出了无数支毒箭，恶毒地骂我们党“吹牛皮”“狂热”，说“伟大的空话”，害了“健忘症”，“不堪信任”，污蔑我们的社会主义建设事业“完蛋”了。这完全是胡说八道。在毛泽东思想的光辉照耀下，我国的工农牧业正在一日千里地发展，工业上出现了大庆，农业上出现了大寨，我国的石油自给了，原子弹一颗接一颗地爆炸了，想来是这些成就把邓拓之流吓坏了，他们和帝国主义、修正主义分子站在一起对我们破口大骂了。我们要向邓拓之流大喝一声：你们污蔑我们党的目的，是想推翻我们党，实现资本主义复辟。你们的罪恶企图是永远也不会得逞的。"},{"type":"paragraph","text":"我在旧社会受尽了剥削和压迫。苦难的过去，我还记忆犹新，牛马不如的生活，还历历在目。一九四一年，我才六七岁，就跟着父母沿街乞讨来到了呼和浩特市，父亲揽长工，母亲做针线，我背了一个补了又补的麻袋走街串巷拣煤渣。就这样，我们全家拼死拼活地劳动也糊不住一家人的口。解放后，共产党来了，我们才翻了身。共产党是我们的大救星，邓拓要我们不信任共产党，其恶毒居心不是很清楚的吗？"},{"type":"paragraph","text":"邓拓狂妄地叫喊要我们党赶快下台“休息”，“什么话都不要说”，“什么事情都不能做”，一切听从邓拓你们这伙人的“指导”。我们要正告邓拓：用毛泽东思想武装起来的工农兵，是不会被你迷惑住的，要想让我们不听党的话，是万万办不到的。我们受剥削受压迫的时代已经一去不复返了，我们真正当了新社会的主人翁。我们懂得怎样当好这个家，我们懂得要当好我们无产阶级的家，就要听党的话，靠党的领导；就要不放松阶级斗争，消灭一切公开的或暗藏的阶级敌人。叫党“下台”，听你们来“指导”，这是你们做的“白日梦”。"},{"type":"paragraph","text":"邓拓反党反社会主义的面貌已经彻底暴露。不管他以退为进，还是以守为攻，都休想溜过去。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2765f27f8f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
