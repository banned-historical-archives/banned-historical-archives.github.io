tart":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"邓小平副总理访问日本","authors":[],"parts":[{"type":"paragraph","text":"中日和平友好条约批准书互换仪式十月二十三日在日本首相官邸举行。"},{"type":"paragraph","text":"十月二十三日，邓小平副总理同福田赳夫首相在日本首相官邸举行第一次会谈。"},{"type":"paragraph","text":"十月二十三日，日本天皇裕仁在皇宫接见邓小平副总理。"},{"type":"paragraph","text":"十月二十五日，邓小平副总理在东京举行答谢宴会，福田首相应邀出席。"},{"type":"paragraph","text":"邓小平副总理十月二十四日拜会了日本前首相田中角荣。图为田中先生陪同邓副总理一行观赏他在中日建交后种的一棵“雪椿”。"},{"type":"paragraph","text":"十月二十四日，邓小平副总理在东京拜会日本自民党干事长大平正芳，感谢他在任外相期间为中日邦交正常化作出的重要贡献。"},{"type":"paragraph","text":"日本奈良市群众热烈欢迎邓小平副总理一行。"},{"type":"paragraph","text":"十月二十四日，日本国会两院议长举行盛大室外酒会，热烈欢迎邓小平副总理和夫人卓琳。"},{"type":"paragraph","text":"十月二十八日，邓小平副总理一行在大坂参观日本松下电器公司。"},{"type":"paragraph","text":"十月二十四日，日本十个友好团体在东京联合举行盛大酒会，庆祝日中和平友好条约生效，热烈欢迎邓小平副总理访问日本。（本版照片均为新华社记者摄）（照片）"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2224f1cc22"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
