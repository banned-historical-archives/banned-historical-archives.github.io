hors":[],"dates":[{"year":1976,"month":7,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"在深入批邓、反击右倾翻案风斗争的推动下"},{"type":"paragraph","text":"一批厂矿企业提前完成上半年计划"},{"type":"paragraph","text":"在深入批邓、反击右倾翻案风斗争的推动下，一批厂矿企业提前完成了上半年生产计划。"},{"type":"paragraph","text":"徐州铁路分局"},{"type":"paragraph","text":"徐州铁路分局各级党组织批判了邓小平扼杀社会主义新生事物的罪行，更加热情地支持社会主义新生事物的成长。今年以来，全分局办起了两所七·二一工人大学；工人业余理论学习小组已发展到三百二十一个，参加人数达二千七百多人；干部参加劳动，工人参加管理蔚然成风；老中青三结合不断完善，全分局一至六月份从工人中提拔干部一百四十九名，进一步充实了各级领导班子。今年以来全分局月月超额完成货物运输任务，到六月二十日已提前十天完成了上半年国家货物运输计划，车辆停留时间等各项技术指标，都比去年同期有较大的提高。"},{"type":"paragraph","text":"淮北矿务局"},{"type":"paragraph","text":"淮北矿务局广大职工通过批判邓小平鼓吹的阶级斗争熄灭论和唯生产力论，更加自觉地贯彻执行党的基本路线，推动了生产的发展，已提前二十二天完成了今年上半年原煤生产计划，原煤产量比去年同期增长百分之三十点五；掘进进尺已完成全年计划的百分之六十点四。"},{"type":"paragraph","text":"吉林通化矿务局"},{"type":"paragraph","text":"吉林通化矿务局广大职工在反击右倾翻案风的斗争中，深入批判邓小平反革命的修正主义路线，坚持“抓革命，促生产”的方针，有力地推动了煤炭生产的发展。全局在连续八年超额完成国家计划的基础上，今年又提前十九天完成了上半年国家煤炭生产计划。原煤产量、开拓进尺和洗精煤都比去年同期有大幅度增长，创造了历史同期最高水平；其他各项经济指标也都比历史同期完成得好。"},{"type":"paragraph","text":"内蒙乌达矿务局"},{"type":"paragraph","text":"内蒙古自治区乌达矿务局党委带领全局职工认真学习毛主席的一系列重要指示，深入批判党内最大的不肯改悔的走资派邓小平的修正主义路线，使革命大批判步步深入，生产形势越来越好。到五月底，全矿务局提前三十一天完成了上半年国家原煤生产计划和提前四十五天完成掘进进尺国家计划。"},{"type":"paragraph","text":"江苏丹阳钢铁厂"},{"type":"paragraph","text":"江苏省丹阳钢铁厂广大职工深入批邓、反击右倾翻案风，有力地促进了生产发展。到五月二十八日，全厂已提前三十三天完成了上半年的国家计划，各项技术经济指标创造了历史同期最好水平。（据新华社讯）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"吉林文革","type":"人物"},{"name":"江苏文革","type":"人物"},{"name":"革命大批判","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5a7cf36052"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
