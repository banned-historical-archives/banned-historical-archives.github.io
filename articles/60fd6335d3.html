质决心为巩固和发展无产阶级文化大革命的胜利成果而战斗到底","authors":[],"dates":[{"year":1974,"month":2,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　四○四六公司机修厂党支部以马列主义、毛泽东思想为武器，紧密联系本单位阶级斗争和路线斗争的实际，发动群众狠批林彪鼓吹孔老二的“克己复礼”的反动纲领，向疯狂攻击社会主义的新生事物、妄图否定无产阶级文化大革命伟大成果的右倾思潮发起了进攻。在斗争中进一步提高了对无产阶级文化大革命必要性的认识，增强了执行党在社会主义历史阶段基本路线的自觉性。"},{"type":"paragraph","text":"最近以来，这个厂的党支部发动群众，集中火力狠批林彪效法孔老二“克己复礼”的反动纲领。在批判中，广大职工认真学习马列关于无产阶级专政的学说和毛主席关于反修防修、巩固无产阶级专政的一系列指示，剖析林彪所谓“复礼”的政治纲领、理论纲领、阶级内容和反革命手法，从而进一步认清了林彪叫嚷“克己复礼”的罪恶目的。工人们说:林彪及其死党在无产阶级文化大革命取得伟大胜利的时刻，迫不及待地连续四次书写“克己复礼”的条幅，躲在阴暗角落里窥测方向，策划阴谋，其目的就是为了复辟资本主义。该厂工人群众由于抓住了林彪鼓吹的“克己复礼”进行深入的批判，从而进一步认清了林彪这个资产阶级野心家、阴谋家、两面派、叛徒、卖国贼的真面目，认清了林彪反革命的修正主义路线的极右实质。"},{"type":"paragraph","text":"在批判中，他们还用铁的事实驳斥那些攻击社会主义的新生事物，妄图否定无产阶级文化大革命胜利成果的谬论。有个解放前在米行当过学徒的老工人以自己身受资本家压迫剥削的血泪史批判说:“旧社会我们这些米店的职工，头上顶着米，脚下踏着米，家里吃的却是糠菜皮。林彪要‘复礼’，就是妄图从根本上改变党在社会主义历史阶段的基本路线和政策，颠覆无产阶级专政，复辟资本主义，要我们工人再受地主、资本家的压迫剥削，再吃糠菜皮吗?我们坚决不答应!谁要变天，我们就坚决把他打下去!”"},{"type":"paragraph","text":"大家还对林彪在反革命武装政变计划《“571工程”纪要》中恶毒攻击社会主义制度和无产阶级文化大革命的反动谬论进行了批判。各班组的工人列举了自己子女在无产阶级教育革命中和在农村这个广阔天地里锻炼成长的大量事实批林批孔。通过这样的批判，大家对于毛主席亲自发动和领导的无产阶级文化大革命的深远意义，有了进一步的理解。"},{"type":"paragraph","text":"他们说，林彪反党集团和阶级敌人越是攻击无产阶级文化大革命，我们就越是要坚决保卫无产阶级文化大革命的胜利成果。大家表示，一定要当批林批孔的主力军，为巩固和发展无产阶级文化大革命的胜利成果，巩固无产阶级专政而战斗到底。　(本报市城建局通讯组)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"name":"批林批孔","type":"主题/事件"},{"name":"批林批孔","type":"主题/事件"},{"name":"教育革命","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"60fd6335d3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
