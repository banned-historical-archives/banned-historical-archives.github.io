有联系","authors":["李余庆"],"dates":[{"year":1955,"month":7,"day":2}],"is_range_date":false,"parts":[{"text":"江西省发现近四十人和胡风反革命集团有联系","type":"title"},{"text":"李余庆","type":"authors"},{"text":"【江西分社二日电】根据江西省公安厅所掌握的材料，全省已经发现和胡风反革命集团有联系的近四十人。其中，和胡风及路翎、绿原等联系甚密的主要有以下几个人：","type":"paragraph"},{"text":"朱企霞(江西师范学院中语科副教授)，和胡风是老同学(在日本留学时也是同学)又是老同事。系江西师范学院胡风小集团的头目，和胡风信件来往甚密。","type":"paragraph"},{"text":"屠瑶华(南昌邮电局营业员)，系胡风老婆梅志的妹妹。胡风通过她和在江西的胡风分子进行联系。","type":"paragraph"},{"text":"刘振辉，系今年一月间复员的转业军人，他和胡风及路翎、绿原等有密切联系，并按照他们的指示写了一些反动的诗和文章。(公安机关已将其逮捕)","type":"paragraph"},{"text":"江西省公安机关最近在这些人家里，查出胡风及胡风分子的信件近二百件，省有关部门已将这些信件翻印，准备上报。","type":"paragraph"}],"comments":[],"origin":"新华通讯社编《内部参考》1955年7月4日","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c1cd5b5bcb"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
