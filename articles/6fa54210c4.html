dates":[{"year":1970,"month":10,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"黄永胜和叶剑英同志亲切会见港澳同胞和海外爱国侨胞代表"},{"type":"paragraph","text":"新华社四日讯　中共中央政治局委员、中国人民解放军总参谋长黄永胜，中共中央政治局委员、中央军委副主席叶剑英，今天会见了参加国庆活动的港澳爱国同胞和海外爱国侨胞，同他们进行了亲切的谈话。"},{"type":"paragraph","text":"黄永胜同志代表政府和祖国人民对港澳爱国同胞和海外爱国侨胞代表，表示热烈欢迎。他赞扬港澳爱国同胞和海外爱国侨胞热爱社会主义祖国，积极支持祖国社会主义建设，勉励海外爱国侨胞支持各国革命人民反对美帝国主义及其一切走狗的斗争。"},{"type":"paragraph","text":"叶剑英同志也讲了话，他向代表们介绍了当前国内外的大好形势。"},{"type":"paragraph","text":"黄永胜、叶剑英同志讲话以后，港澳爱国同胞和海外爱国侨胞挥动红彤彤的《毛主席语录》，不断高呼：“毛主席万岁！”“毛泽东思想胜利万岁！”“中国共产党万岁！”“敬祝毛主席万寿无疆！”"},{"type":"paragraph","text":"港澳爱国同胞代表和海外爱国侨胞代表在讲话中，谈到他们在十月一日见到伟大领袖毛主席和他的亲密战友林副主席的幸福心情。他们说，当我们看到毛主席神采奕奕，身体非常健康，我们感到心潮澎湃，十分高兴。他们表示一定要更好地活学活用毛泽东思想，遵照伟大领袖毛主席关于“团结起来，争取更大的胜利”的教导，加强同祖国人民的团结，加强同各国革命人民的团结，坚决把反对美帝国主义及其一切走狗的斗争进行到底。"},{"type":"paragraph","text":"会见结束，全场起立，高唱《大海航行靠舵手》。"},{"type":"paragraph","text":"会见时在座的有：罗贵波、方克、陈德和、王安居、刘希文、俞侠、张桂馥、张政德、邢仁先等有关方面负责人。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"黄永胜","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6fa54210c4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
