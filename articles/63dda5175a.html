ical-archives/banned-historical-archives0/main/maoquanji38.pdf"],"article":{"title":"致叙利亚总统库阿特利电","alias":"","parts":[{"type":"paragraph","text":"致叙利亚总统库阿特利电"},{"type":"paragraph","text":"（1957年10月17日）叙利亚共和国总统舒克利·库阿特利先生阁下："},{"type":"paragraph","text":"中华人民共和国成立八周年时，承蒙来电祝贺，我代表中国人民，并且以我个人的名义，向阁下表示衷心的谢意。"},{"type":"paragraph","text":"当美帝国主义正在驱使土耳其向叙利亚进行挑畔，阴谋发动侵略战争的时候，我谨重申中国政府和中国人民坚决支持叙利业人民保卫独立、保卫和平的正义斗争的严正立场。"},{"type":"paragraph","text":"祝中叙两国友好关系日益发展，祝叙利亚人民反殖民主义斗争的胜利，祝叙利亚共和国繁荣和阁下身体健康。"},{"type":"paragraph","text":"毛泽东一九五七年十月十七日于北京"}],"authors":["毛泽东"],"dates":[{"year":1957,"month":10,"day":17}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":290,"page_end":290},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"63dda5175a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
