nned-historical-archives/banned-historical-archives9/main/books/十年文革中首长讲话传信录3.pdf"],"article":{"title":"谢富治在北师大讲话摘录","parts":[{"type":"title","text":"941.谢富治在北师大讲话摘录"},{"type":"paragraph","text":"(1967年8月22日)"},{"type":"paragraph","text":"附带说一声，最近揪解放军的事情，我们要谨慎。北京市还有一个革命委员会，全国有几个地方有革命委员会？连青海才有七个地方，全国其它地方就靠解放军在那里领导，你们把解放军搞乱了，全国怎么办？这个事情要顾大局，解放军有什么错误我们可以提，对解放军有什么意见可以提，不许把解放军搞乱了，这是最近毛主席讲的。河北省张家口、石家庄、天津、唐山、保定都派人来了嘛，还有师大、北航学生参加，可以提意见嘛！军队的事情，军队自己解决，不能到那里抓人。"}],"authors":["谢富治"],"dates":[{"year":1967,"month":8,"day":22}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":369,"page_end":369,"alias":""},"tags":[{"name":"谢富治","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"39bb0ecea8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
