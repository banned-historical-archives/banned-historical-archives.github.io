，委员长会议准备同意他的请求，建议复信表示敬意","authors":[],"dates":[{"year":1983,"month":3,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"全国人大常委会第二十六次会议举行全体会议"},{"type":"paragraph","text":"叶剑英写信请求不当六届人大代表"},{"type":"paragraph","text":"彭真说，委员长会议准备同意他的请求，建议复信表示敬意"},{"type":"paragraph","text":"杨尚昆就复信问题作说明，会议还听取了关于县以下人大代表直接选举若干规定（草案）等说明"},{"type":"paragraph","text":"新华社北京3月2日电　五届全国人大常委会第二十六次会议今天下午在人民大会堂举行全体会议。"},{"type":"paragraph","text":"会上宣读了叶剑英委员长致本次会议的信。叶委员长在信中提出：在六届人大选举中，建议各选举单位不再提名选他为全国人民代表大会代表，不再将他列为人大常委会委员长候选人。"},{"type":"paragraph","text":"彭真副委员长在会上说，叶剑英同志在担任本届全国人大常委会委员长期间做出了杰出贡献，委员长会议讨论了叶委员长的这封信，鉴于他年事已高，准备同意他的请求，并建议常委会就此事给叶委员长写一封复信。"},{"type":"paragraph","text":"杨尚昆副委员长兼秘书长就常委会给叶委员长复信问题作了说明。他说，委员长会议在讨论叶委员长这封信时认为，叶委员长在全国人民中享有崇高的威信，受到全国人民高度的爱戴和信赖，大家都希望他能继续领导全国人大常委会的工作，更多地为国为民造福，但为了让他得到更好的休息，以便延年益寿，所以，大家在准备同意他的请求的同时，建议常委会复信给叶委员长，表示对他的崇敬心情。委员长会议的这个意见请委员们讨论决定。"},{"type":"paragraph","text":"今天的会议印发了第六届全国人民代表大会少数民族代表名额分配方案（草案）、台湾省出席第六届全国人民代表大会代表协商选举方案（草案）和第五届全国人民代表大会常务委员会代表资格审查委员会主任委员、副主任委员、委员名单（草案），请大家审议。"},{"type":"paragraph","text":"会议听取了全国人大常委会法制委员会副主任王汉斌代表法制委员会作的关于县级以下人民代表大会代表直接选举的若干规定（草案）的说明和关于由对外经济贸易部行使原外国投资管理委员会批准权的决定（草案）的说明。"},{"type":"paragraph","text":"受国务院的委托，交通部副部长钱永昌在会上作了关于《中华人民共和国海上交通安全法（草案）》的说明，外交部副部长韩叙作了关于建议我国加入1973年《禁止并惩治种族隔离罪行国际公约》和批准1948年《防止及惩治灭绝种族罪公约》的说明。"},{"type":"paragraph","text":"今天的会议由彭真、彭冲副委员长主持。"},{"type":"paragraph","text":"乌兰夫、韦国清、赛福鼎、阿沛·阿旺晋美、许德珩、胡厥文、史良、习仲勋、班禅额尔德尼·却吉坚赞副委员长出席了会议。"},{"type":"paragraph","text":"国务委员黄华、最高人民检察院检察长黄火青列席了会议。（附图片）"},{"type":"paragraph","text":"3月2日下午，彭真、彭冲副委员长主持五届人大常委会第26次全体会议。会上宣读了叶剑英委员长给五届人大常委会第26次会议的信件。"},{"type":"paragraph","text":"新华社记者摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"彭真","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b602ad0846"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
