<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"雇工自由就是剥削自由","authors":["贾来恒"],"dates":[{"year":1967,"month":9,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"雇工自由就是剥削自由"},{"type":"paragraph","text":"贾来恒"},{"type":"paragraph","text":"党内最大的走资本主义道路当权派极力提倡“雇工、单干，应该放任自流”，而“对于不让雇工不让单干的不能放任”，这完全是站在地主、富农的立场上，为地主、富农说话，妄图在农村发展资本主义，让广大贫下中农继续当牛做马。"},{"type":"paragraph","text":"土地改革以后，我们大寨的贫下中农，响应毛主席“组织起来”的伟大号召，纷纷组织互助组，走集体化的道路。可是地主、富农对中国赫鲁晓夫提倡的雇工、单干自由拍手叫好。一些地主、富农，外出搞投机倒把。一些富裕中农也先发制人，把村子里劳力好、土地好、牲畜好、农具好的富裕中农和中农搞在一起，挂起了名为互助组、实际搞单干的“好汉组”的招牌。其他一些人也都兵对兵、将对将地搭伙起来了。剩下一些劳力弱、耕畜农具少、缺吃少穿的贫下中农，就谁也不要了。这样，使大寨的农业生产受到了损失，出现了两极分化，有些翻身户开始借高利贷、出卖土地了。"},{"type":"paragraph","text":"事情很清楚了，雇工、单干自由的实质，就是剥削自由，就是发展资本主义的自由；就是只有地主、富农继续剥削贫下中农的自由，没有贫下中农不受剥削的自由；只有地主、富农个人发财致富的自由，没有贫下中农共同富裕的自由；只有地主、富农发展资本主义的自由，没有贫下中农走社会主义道路的自由。看，党内最大的走资本主义道路当权派的心有多毒！罪有多大！"},{"type":"paragraph","text":"但是，蚍蜉撼树，螳螂挡车，都是痴心妄想。我们贫下中农最听毛主席的话，我们坚信：“只有社会主义能够救中国。”我们大寨的贫下中农在陈永贵同志的带领下，坚决贯彻执行毛主席的革命路线，坚持社会主义方向，煞住了雇工、单干自由的妖风。我们成立的互助组——“老少组”，粮食亩产大大超过了“好汉组”。大寨的群众亲眼看到了组织起来的力量，尝到了集体化的甜头，“老少组”不断扩大，组织起来的优越性更加明显，走社会主义道路的决心更加坚定。一九五三年，大寨成立了初级农业生产合作社。我们胜利了！党内最大的走资本主义道路当权派企图发展资本主义的美梦破灭了！"},{"type":"paragraph","text":"我们从自己的亲身经历中，深刻地认识到，集体化道路是社会主义的幸福大道，毛泽东思想是我们贫下中农的命根子。我们大寨的贫下中农一定要更坚决地遵照毛主席的教导，坚定不移地走集体化的道路，一直走到共产主义。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"679c4ba4a6"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
