art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"用拚刺刀的精神打倒资产阶级“权威”","authors":["王道明"],"parts":[{"type":"paragraph","text":"邓拓黑帮和一些所谓“权威”们，对伟大的毛泽东思想，对工农兵学习毛主席著作，射出了大量的毒箭，妄想射掉我们心中的红太阳，挖掉我们的命根子，以便他们更疯狂地推销资产阶级的黑货，实现资本主义复辟。这是一场你死我活的阶级斗争。"},{"type":"paragraph","text":"邓拓黑帮和某些所谓“权威”们知道，毛泽东思想是他们实现资本主义复辟的最大障碍，毛泽东思想是揭破他们的画皮、打垮他们疯狂进攻的最锐利的思想武器。毛泽东思想传播得越广越深，他们的反党黑货就越卖不出去；掌握毛泽东思想的人越多，他们的日子就越不好过；毛泽东思想在我们头脑里扎根越深，他们就完蛋得越快。特别是近几年来，全国人民带着深厚的阶级感情学习毛主席著作，毛泽东思想更加深入人心，人民觉悟更加提高，他们就越加仇恨，越加害怕，他们也就越猖狂地向毛泽东思想进攻。这是一切牛鬼蛇神的阶级本性决定的。"},{"type":"paragraph","text":"毛泽东思想代表了人类大多数人的利益，学习毛泽东思想是全世界人民的共同要求，是任何力量也挡不住的。毛泽东思想一定要被革命人民所掌握，一切牛鬼蛇神一定要被消灭。邓拓黑帮和某些所谓“权威”复辟资本主义的迷梦永远不能实现。革命人民敢于用革命的刺刀打败敌人的原子弹，也敢于用革命的笔杆打倒一切资产阶级的“权威”。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"867592f2d5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
