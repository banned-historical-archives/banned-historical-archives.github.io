ical-archives/banned-historical-archives8/main/maoquanji16.pdf"],"article":{"title":"晚张冲先生联","alias":"","parts":[{"type":"paragraph","text":"挽张冲先生联！"},{"type":"paragraph","text":"（1941年11月）大计赖支持，内联共，外联苏，奔走不辞劳，七载辛勤如一日；斯人独憔悴口，始病热，继病疟，深沉竟莫起，数声哭泣已千秋。"},{"type":"paragraph","text":"[1]1941年8月11日，国共两党谈判，国民党代表张冲病逝。8月13日，毛泽东为张冲逝世发给其家属电，电文是：“惊闻淮南先生逝世，至深哀悼，特电致。”同年11月9日在重庆夫子池新生活运动服务所礼堂举行追悼会。毛泽东和吴玉章、陈绍禹、邓颖超等7名中共参政员联名送了这副挽联。张冲（1902—1941)，字淮南，浙江乐清人，国民党员。早年专攻俄文，并赴苏联考察，曾与冯玉祥等发起组织中苏文化协会，推行孙中山联俄、联共、扶助农工三大政策。抗日战争期间，任大本营第六部主任秘书后任军委办公厅顾问处处长。1941年3月兼国民党中组部副部长。1941年8月11日病故于重庆。"},{"type":"paragraph","text":"[2]斯人，此人。憔悴，困顿萎靡的样子。斯人独憔悴，语出唐代杜"}],"authors":["毛泽东"],"dates":[{"year":1941,"month":11}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":312,"page_end":312},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"44aef9cdf9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
