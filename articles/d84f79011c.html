script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"旗帜鲜明地同资产阶级自由化作斗争　程宜山为捍卫真理奋斗不息","authors":[],"dates":[{"year":1991,"month":9,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"旗帜鲜明地同资产阶级自由化作斗争"},{"type":"paragraph","text":"程宜山为捍卫真理奋斗不息"},{"type":"paragraph","text":"本报讯  ９月１０日的《解放军报》、《科技日报》、《中国青年报》同时刊登通讯，介绍空军导弹学院教授程宜山在本职工作岗位上自觉坚持四项基本原则，勇敢捍卫马克思主义，捍卫社会主义制度，同资产阶级自由化作坚决斗争的事迹。"},{"type":"paragraph","text":"程宜山１９８１年从北京大学哲学系硕士研究生班毕业。今年１月，被国家教委和国务院学位委员会授予“为祖国社会主义现代化建设事业作出突出贡献的硕士学位获得者”荣誉称号。程宜山因患广泛性脑梗塞，于４月２５日逝世，年仅４９岁。"},{"type":"paragraph","text":"１９８０年秋，正在北大攻读硕士研究生的程宜山，出席在北京召开的一个“理论座谈会”。会议一开始，有人提出在哲学史研究中“不要马克思主义指导，不要任何思想指导，一切从材料出发”。坐在一旁的程宜山同那些“专家”、“名人”进行了辩论。１９８５年，他又写了《名人与名言新议》一文，提醒人们对方励之等的话要加分析，不要轻信。１９８８年，他对《河殇》进行针锋相对的批判。在不到１０年时间内，他先后单独或与人合作出版５本专著，发表４６篇学术论文，总计１０２万字。他的文章观点鲜明，材料充实，说服力强，在思想理论界具有一定影响。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d84f79011c"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
