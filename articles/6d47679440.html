华国锋同志代表党中央向全国各族青年致以热烈的节日祝贺","authors":[],"dates":[{"year":1979,"month":5,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京五月三日电　由共青团中央举办的纪念五四运动六十周年大会，今天下午在人民大会堂隆重举行。"},{"type":"paragraph","text":"中共中央主席华国锋，中共中央副主席邓小平、李先念、汪东兴出席了今天的大会。"},{"type":"paragraph","text":"共青团中央第一书记韩英致开会词。他说，今天的盛会，表明了党中央和革命前辈对我们青年一代的无比信赖和殷切期望。表明了我们青年一代继承光荣革命传统，誓把无产阶级革命事业推向前进的坚强决心。他号召广大青年人人都来奋勇争当新长征的突击手，人人都在伟大的新长征中创造出无愧于革命前辈、无愧于伟大时代的光辉业绩!"},{"type":"paragraph","text":"华国锋同志代表中共中央，向全国各族青年和在座的全国青联委员、全国学代会代表致以热烈的节日祝贺。"},{"type":"paragraph","text":"华国锋同志在讲话中高度评价了五四运动在我国革命史上的重要地位。他指出:五四运动以来的历史提供了一条颠扑不破的真理:只有社会主义能够救中国，只有社会主义才能使我国跳出黑暗的深渊，展开无限光明的前景。华国锋同志指出，共产党是在中国唯一能够提出正确的革命纲领和政策，领导中国人民取得胜利的党。没有共产党的领导，不可能推翻帝国主义和封建主义的统治，不可能使黑暗的旧中国变成社会主义的新中国。他强调说，马列主义、毛泽东思想是中国革命的胜利旗帜。我们一定要永远高举马列主义、毛泽东思想的伟大旗帜奋勇前进。"},{"type":"paragraph","text":"对越自卫还击战一等功荣立者海水干代表全国青联、全国学联，北京大学团委书记王丽梅代表首都青年在会上发了言。"},{"type":"paragraph","text":"五四运动的参加者许德珩同志也在大会上讲了话。"},{"type":"paragraph","text":"出席今天大会的还有党和国家其他领导人王震、韦国清、乌兰夫、方毅、邓颖超、纪登奎、吴德、余秋里、张廷发、陈永贵、陈锡联、胡耀邦、耿飚、聂荣臻、倪志福、陈慕华、赛福鼎、姬鹏飞、许德珩、胡厥文、谷牧、王任重、康世恩，政协全国委员会副主席宋任穷、沈雁冰、朱蕴山、康克清、季方、王首道、杨静仁、庄希泉、胡子昂，最高人民法院院长江华，最高人民检察院检察长黄火青，有关方面的负责同志彭真、薄一波、胡乔木、姚依林、杨勇、林乎加，中共中央和国务院各部委、各群众团体、中国人民解放军各总部负责人。"},{"type":"paragraph","text":"晚上，团中央和文化部在人民大会堂联合举办了纪念五四运动六十周年文艺晚会。"},{"type":"paragraph","text":"\u003cIMG alt=请插入7号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1979\\05\\7954010201.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e图为纪念五四运动六十周年大会主席台。　新华社记者摄(传真照片)\u003c/FONT\u003e"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"华国锋","type":"人物"},{"name":"汪东兴","type":"人物"},{"name":"李先念","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6d47679440"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
