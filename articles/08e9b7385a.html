ical-archives/banned-historical-archives8/main/maoquanji18.pdf"],"article":{"title":"致重必武电","alias":"","parts":[{"type":"paragraph","text":"致董必武电！"},{"type":"paragraph","text":"（1943年9月29日）"},{"type":"paragraph","text":"《解放日报》日内发表评国民党十-中全会社论，当作我党的表示。告小党派不要过于乐观，要静观国民党事实表现。蒋及国民党每遇一次危机即来一次宪政欺骗，毫无诚意，不要上当。驻会委员第一次会请假不去，以示对参政会通过反共决议之抗议。"},{"type":"paragraph","text":"[1]这是毛泽东和周恩来致董必武电的主要内容。对董必武来电的批语"},{"type":"paragraph","text":"（1943年9月底）"},{"type":"paragraph","text":"蒋利用邵²达其欺骗目的，仍要董但置末位，以示一拉一打，反映国民党不敢破裂，但反共是继续的。"},{"type":"paragraph","text":"[1]这是毛泽东对董必武关于国民参政会内部斗争情况以及将董的名字放在驻会委员末位的来电的批语的主要内容。"},{"type":"paragraph","text":"[2]邵，指邵力子，当时任国民参政会秘书长。"}],"authors":["毛泽东"],"dates":[{"year":1943,"month":9,"day":29}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":172,"page_end":173},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"08e9b7385a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
