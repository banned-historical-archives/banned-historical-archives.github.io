script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"故宫惊梦套曲〕——江青取经记（观故宫博物院慈禧罪行展览后作）","authors":["赵朴初"],"dates":[{"year":1977,"month":2,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"故宫惊梦套曲〕"},{"type":"paragraph","text":"——江青取经记（观故宫博物院慈禧罪行展览后作）"},{"type":"paragraph","text":"赵朴初〔字字双〕宫门骑马带伙计，四匹。红旗车队后跟随，神气。向来佩服武阿姨，皇帝。无奈乾陵还封在山沟里，可惜①。且图就近访慈禧，有理。早安排包管称心的见面礼，表意。送您一副假牙好啃童子鸡，补气。送您一副假发好和姑娘比，美丽。送您一套特制布拉吉，换季。送您一架莱卡照相机，拍戏。有人劝我把文艺大旗也送你，放屁。老娘少了它怎能混下去，哎咦！这分明是反革命的坏主意，可气。赶快给我拉出去，枪毙！〔不是路〕拜访慈禧，不比寻常拜老师。真着急，一心一意想登基。问吾师，看我聪明可象唐鹦鹉②？命运何如汉野鸡③？请教你，怎能抓到黄金玺？有何秘密？有何秘密？〔前腔〕心有灵犀，老谱新翻一局棋。排异己，人头好作上天梯。不稀奇，明明肃顺诛非罪④，浑浑慈安死不疑⑤。须牢记，是非黑白管他妈的屁。全凭诡计，全凭诡计。〔前腔〕莫泄天机，结个死死帮儿事可为。须准备，教师爷还要有军师。看当时，那奕?能巴结上洋人共定垂帘计，那袁世凯能出卖掉戊戌维新六健儿⑥。抓权势，弟兄们长享富和贵。安排交椅，安排交椅。〔前腔〕无尽珍奇，珠宝装成圣母仪。很便宜，一餐代价万人饥。这才知，为啥江山宁赠番邦礼，不许农奴动指儿。不是戏，赛二爷在这儿得到几天意⑦。哎哟哟，可真福气，可真福气！〔朝天子〕慈禧，慈禧，实际是女皇帝。莫怪咱们一见便投机，是惺惺惯把惺惺惜。您请洋人画像驻红颜⑧，我请洋人著书卖机密，先后遥遥去泰西。笑兮，骂兮，万古千秋矣！〔刮地风〕忽然刮地风儿起，刮到宫闱。文书器物一齐飞，堆上丹墀。殃民利己，骄横无忌，卖国投降，罪如山积。桩桩皆铁证，个个尽情批，好个“老佛爷”，算是揭了底。〔尾声〕方才一枕空欢喜，梦魂儿被风吹得无踪迹。待上朝，来不及着朝衣。一唱雄鸡红日起。光明直向身儿逼，没奈何，且让我披上几张画皮，却又被一阵狂飙撕去矣！〔注〕：①　乾陵是武则天和唐高宗李治合葬墓，在陕西乾县梁山。②　武则天梦见大鹦鹉，两翼皆折。狄仁杰解释说鹦鹉就是武则天，两翼是她的两个儿子。③　吕后名“雉”。当时人们避讳，把雉唤做“野鸡”（见韩愈《讳辨》），沿用至今。④　一八六○年英法联军入侵京津，清咸丰帝奕詝逃往热河。次年病死。遗诏任命八个大臣辅佐六岁的载淳掌管政务，肃顺是其中起主要作用的人。慈禧太后（那拉氏，载淳生母）企图夺取政权，实行垂帘听政，遭到八大臣反对，就勾结投降派恭亲王奕?发动政变，杀了肃顺。⑤　慈安太后（咸丰帝皇后，载淳嫡母）被慈禧暗害毒死。⑥　一八九五年中日战争，以慈禧为首的投降派同日本签订了丧权辱国的《马关条约》后，各帝国主义纷来抢占势力范围，中国面临被瓜分亡国的危机。以康有为为代表的资产阶级改良派发动了“变法维新运动”，得到光绪帝载湉的赞助。而以慈禧为首的顽固派则拚命反对，宣称“宁可亡国，不可变法”，“宁赠友邦，勿予家奴”。由于袁世凯的出卖，杀害了维新运动的中坚分子谭嗣同等六人，扑灭了这一运动。时为一八九八年，农历戊戌年。⑦　赛金花在八国联军盘踞北京时，炙手可热，人称赛二爷。⑧　慈禧请美国女画家卡尔为她画像，选其中最满意的一幅送往美国展览并赠送给美国总统。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"江青","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"27de82ecfe"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
