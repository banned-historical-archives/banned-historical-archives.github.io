tart":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"用文化工作推动部队战斗力生长等三则","authors":["滕典奇/原文革/聂国寿/左登胜/沙晓峰"],"parts":[{"type":"paragraph","text":"南空导弹某旅——"},{"type":"paragraph","text":"用文化工作推动部队战斗力生长"},{"type":"paragraph","text":"本报讯 滕典奇报道：南空导弹某旅针对恶劣气候和高难度训练课题，见缝插针开展丰富多彩的战地文化活动，激发了官兵训练热情。10月中旬，南空政治部推广了他们用文化工作推动部队战斗力生长的经验。为给打得赢提供强大精神动力，该旅制定了《文化工作实施细则》，并投资120多万元，给基层配齐了便于携带的野战文化装备器材。"},{"type":"paragraph","text":"山西省宁武县人武部——"},{"type":"paragraph","text":"加强基层民兵预建党支部建设"},{"type":"paragraph","text":"本报讯 原文革、聂国寿报道：10月上旬，山西省宁武县有8个基层民兵预建党支部被省军区评为先进。今年以来，宁武县人武部党委针对基层民兵预建党支部建设出现的新情况、新问题，在深入调研的基础上，以农村、企业、社区为重点，派机关干部蹲点帮扶。经过半年多努力，这些基层民兵预建党支部建设水平整体得到提高。"},{"type":"paragraph","text":"南海舰队某部——"},{"type":"paragraph","text":"“法纪大篷车”开进苗村黎寨"},{"type":"paragraph","text":"本报讯 左登胜、函授学员沙晓峰报道：10月上旬，南海舰队驻海南某部“法纪大篷车”开进驻地苗村黎寨，对少数民族群众进行法治宣传。近年来，该部专门组织由保卫、军务等部门组成的“法纪大篷车”，定期深入苗村黎寨，帮助群众举案说法、现场答疑，并向群众发放法律知识读本300余册，受到驻地群众的称赞。"}],"alias":""},"tags":[{"name":"山西文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"561f428fe8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
