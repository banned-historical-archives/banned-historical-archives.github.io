" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"在党和政府干部正确领导下交心运动胜利结束","authors":["《新生快报》报导"],"dates":[{"year":1958,"month":8,"day":18}],"is_range_date":false,"parts":[{"text":"在党和政府干部正确领导下交心运动胜利结束","type":"title"},{"text":"《新生快报》报导","type":"authors"},{"text":"全面的轰轰烈烈的交心运动，从本月5日起，到17日止，基本上已经胜利结束。17日下午各工区分别举行总结大会。张大队长、省公安厅范科长、赵干事、贾主任、王主任、常主任，分别在一、二、三工区的大会上作了讲话，指出了运动所取得的成绩以及全体劳教人员和犯人今后继续努力的方向。","type":"paragraph"},{"text":"这次运动的成绩，主要有以下三点：(1)绝大部分劳教人员和犯人，向党向政府和人民交出了真心和实心，挖掉了黑心，拔掉了白旗，换上红心，插上了红旗，思想上有了转变和提高。他们自觉地积极地向党靠拢，沿着社会主义道路前进，大大有利和加速了自己的改造。(2)经过群众检举揭发，清查出一批隐瞒历史罪恶和重新犯罪拒不坦白的坏分子，使他们在群众面前孤立起来。群众认清了他们的丑恶面貌，识破了他们的阴谋，打垮了他们的气焰，这就使各中队、小组里面，正气上升，邪气下降，出现了一种新鲜纯正的气象，为全体劳教人员和犯人的改造，扫清了一批障碍，使大家能够在党和政府的教育下，认清大是大非，加速了自己的改造步伐。(3)绝大部分人交代了从来没有向党交代的问题以后，丢掉了包袱，轻装走向劳动战场，从而工效不断上升，纪录不断刷新，每个人都在为祖国建设事业积极贡献力量，达到了加速改造，化消极因素为积极因素的目的。","type":"paragraph"},{"text":"也指出，有的人交代还不彻底，这些人应该认清形势，继续交待，不要故作镇定，其结果只有妨害自己的改造，同时也号召所有已经向党交了真心实心的人，要继续提高觉悟靠拢政府，在今后仍然应向一切不利于大家改造的反动思想以及反动言行进行不调和的彻底斗争。","type":"paragraph"}],"comments":[],"origin":"湖南省新生工程队(湖南省第一劳教[劳改]管教队)《新生快报》第11期。转载于李英宗《新生备忘录》，武汉长江文艺出版社，2000年。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"05c68361fa"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
