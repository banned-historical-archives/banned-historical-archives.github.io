script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"上海国棉九厂革委会坚决执行毛主席“来一个动员”的伟大指示动员全厂职工鼓励子女去农村落户广大职工纷纷行动，把子女送到农村去，走与工农结合的道路，以实际行动向毛主席表忠心","authors":[],"dates":[{"year":1969,"month":1,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　上海国棉九厂革委会，遵循毛主席“知识青年到农村去，接受贫下中农的再教育，很有必要。要说服城里干部和其他人，把自己初中、高中、大学毕业的子女，送到乡下去，来一个动员。各地农村的同志应当欢迎他们去”的伟大教导，组织全厂职工认真学习，坚决贯彻，并成立动员知识青年下乡上山小组，深入各车间、班组，积极动员职工鼓励、支持自己的子女下乡上山插队落户，接受贫下中农的再教育，炼一颗忠于毛主席的红心。"},{"type":"paragraph","text":"当毛主席关于“知识青年到农村去，接受贫下中农的再教育”的最新指示发表后，这个厂的广大职工纷纷表示要把自己初中、高中、大学毕业的子女送到乡下去，他们说:“知识青年下乡上山，这是毛主席的伟大战略部署，是缩短三大差别和反修防修、培养无产阶级革命事业接班人的重要途径。我们工人阶级应该紧跟，积极带头。”共产党员、老工人李桂英曾先后把自己的两个子女送到新疆和黑龙江落户，这次她坚决听毛主席的话，又积极动员另一个六七届大学毕业的孩子去崇明插队落户。"},{"type":"paragraph","text":"动员大批知识青年去农村插队落户，这是一场深刻的社会革命。厂革委会认识到，要更好地做好这项工作，必须动员广大职工以工人阶级主人翁的态度，以无限忠于毛主席的无产阶级感情，积极动员自己子女下乡落户。厂革委会指定一名常委负责做好深入细致的动员工作，并要求各车间革委会指定专人负责做好宣传、动员工作，做好职工的政治思想工作。他们一方面组织苦大仇深的老工人，进行回忆对比，进行阶级教育，使广大职工认识到知识青年去农村，就是为了把他们培养成为红色接班人，保牢红色江山不变色，使劳动人民不吃二遍苦。另一方面，发动全厂职工开展革命大批判，狠批刘少奇“读书做官论”“下乡镀金论”“公私溶化论”等反革命修正主义谬论。广大革命职工说:“知识青年去农村，听的是毛主席的话，走的是与工农相结合的革命路，接受的是毛泽东思想的再教育，这样培养出来的革命接班人就可靠。”他们纷纷鼓励、动员自己的子女去农村插队落户。不少职工不仅自己积极带头送子女去农村，去边疆，而且热情做好反革命分子等子女的思想工作，鼓励他们听毛主席的话，到工农群众中去，以实际行动忠于毛主席，在农村三大革命斗争的风浪中，把自己培养成为工农兵欢迎的知识分子。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bc1e7e03e1"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
