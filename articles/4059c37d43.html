r":1966,"month":8,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛泽东思想照宇宙"},{"type":"paragraph","text":"解放军北京某部　郑彦平"},{"type":"paragraph","text":"旭日东升彩霞飘，"},{"type":"paragraph","text":"中央全会发公报，"},{"type":"paragraph","text":"春雷轰鸣传万里，"},{"type":"paragraph","text":"大海欢呼高山笑。"},{"type":"paragraph","text":"喜鹊围着红旗飞，"},{"type":"paragraph","text":"喜鼓伴随红心跳，"},{"type":"paragraph","text":"喜歌唱得红日乐，"},{"type":"paragraph","text":"喜报织成红云飘。"},{"type":"paragraph","text":"手捧公报望北京，"},{"type":"paragraph","text":"心潮澎湃逐浪高。"},{"type":"paragraph","text":"毛主席声音耳边响，"},{"type":"paragraph","text":"字字句句冲云霄。"},{"type":"paragraph","text":"公报擂动跃进鼓，"},{"type":"paragraph","text":"公报吹响进军号，"},{"type":"paragraph","text":"公报指出阳关路，"},{"type":"paragraph","text":"公报搭起通天桥。"},{"type":"paragraph","text":"红色公报照红心，"},{"type":"paragraph","text":"一代英雄壮志豪，"},{"type":"paragraph","text":"雄文四卷金光闪，"},{"type":"paragraph","text":"顶天立地迎风暴。"},{"type":"paragraph","text":"一手拿枪一手笔，"},{"type":"paragraph","text":"站在斗争最前哨。"},{"type":"paragraph","text":"谁若胆敢伸魔爪，"},{"type":"paragraph","text":"彻底消灭决不饶！"},{"type":"paragraph","text":"展望前程明又亮，"},{"type":"paragraph","text":"东风阵阵起狂飚，"},{"type":"paragraph","text":"毛泽东思想照宇宙，"},{"type":"paragraph","text":"四海翻腾涌红潮。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4059c37d43"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
