al-archives/banned-historical-archives8/main/maoquanji5.pdf"],"article":{"title":"给十二军军委的信","alias":"","parts":[{"type":"paragraph","text":"给十二军军委的信"},{"type":"paragraph","text":"（1931年7月1日）震林同志及十二军军委："},{"type":"paragraph","text":"廿九日宁化的信，今日（一日）收到。没有说到卅六师及以栗同志行动，不知他们已去长汀否？照你们现在的布置是以筹款为中心，因此石城方面完全未派任何人去。你们现在这种布置，可以做一个月，短时期做，一星期至十天。一星期至十天满，卅四师在清流、连城的部队，即行撤回宁化，布置在中沙到长汀界上的线上，及宁化与石城两县交界的线上，多处的工作起来后，百○四团仍在都上，安远到中沙的一线上，但工作需要向江西边界推进，使与江西赤区接连百○三团及卅五师师部。十天后，应去石城布置，在三个重要地点工作起来。白水如顾不及，应暂时放弃，第二步再去工作。工作区重新划分，你们只管宁、石、长三县。真正要做好三县工作，非长期用大力不可。瑞金为卅五军专管；广昌归赣东独立师专管（赣东特委直接指导），不归你们。建宁已经做起工作来的地方，暂时归你们指导，这块扩大的红军，亦归你们补充，但未做起来的地方，应归三军团，将来在大局上，建宁应归三军团。"},{"type":"paragraph","text":"总前委毛泽东于建宁"}],"authors":["毛泽东"],"dates":[{"year":1931,"month":7,"day":1}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":363,"page_end":363},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d5162bf154"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
