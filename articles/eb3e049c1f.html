art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"大平首相瞻仰毛主席遗容参观周总理纪念展览","authors":[],"parts":[{"type":"paragraph","text":"新华社十二月六日讯 日本首相大平正芳和夫人一行今天上午瞻仰了毛泽东主席的遗容，参观了《周恩来同志纪念展览》。"},{"type":"paragraph","text":"大平首相分别在毛主席座像前和周总理半身塑像前献了花圈，表示深切悼念。"},{"type":"paragraph","text":"在瞻仰和参观结束后，大平首相对中国记者说：我曾经见到过毛主席和周总理，并接受过他们的教益。今天参观了纪念堂和纪念展览，使我感慨万分。这两位伟人的光辉形象通过纪念堂和展览馆不仅可以用来教育中国人民，而且对世界人民也有教育意义。非常感谢贵方为我们安排这两项活动。"},{"type":"paragraph","text":"陪同大平首相和夫人前往瞻仰和参观的有我国外交部副部长韩念龙，中国驻日本大使符浩等。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"eb3e049c1f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
