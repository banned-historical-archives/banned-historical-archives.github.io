script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"巴西学生坚持展开反美反独裁斗争  累西腓万名学生示威，反对美帝文化侵略，愤怒烧毁美帝星条旗  秘鲁美资铜公司两千多工人罢工反对美国资本家剥削","authors":[],"dates":[{"year":1968,"month":7,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"巴西学生坚持展开反美反独裁斗争"},{"type":"paragraph","text":"累西腓万名学生示威，反对美帝文化侵略，愤怒烧毁美帝星条旗"},{"type":"paragraph","text":"秘鲁美资铜公司两千多工人罢工反对美国资本家剥削"},{"type":"paragraph","text":"据新华社四日讯　里约热内卢消息：巴西进步学生继续开展斗争，反对美帝国主义的文化侵略，抗议亲美军事独裁政权血腥镇压学生运动，要求民主权利和实行教育改革。"},{"type":"paragraph","text":"在伯南布哥州首府累西腓，一万名学生二日晚举行盛大的反美反独裁示威游行。愤怒的示威群众烧毁了一面美国星条旗，表示他们对于美国殖民主义者的仇恨和唾弃。还有六个州最近也爆发了反美反独裁的示威行动。"},{"type":"paragraph","text":"在里约热内卢八万名学生、教师、艺术家六月二十六日举行声势浩大的反美反独裁示威游行之后，巴西学生向当局严正提出以下要求：立即释放所有在最近反美反独裁斗争中被捕的人、停止一切警察镇压、改革教育制度、取消对艺术作品和文化活动的审查制度。但是巴西当局二日晚悍然拒绝了这些正当要求，这就进一步暴露了它坚决与人民为敌的狰狞面目。"},{"type":"paragraph","text":"新华社四日讯　利马消息：美国南秘鲁铜公司在秘鲁南部所经营的托克帕拉铜矿的两千二百多名矿工，二日举行不定期总罢工，抗议美国资本家对他们的残酷剥削，要求增加工资。"},{"type":"paragraph","text":"铜矿工人的这次罢工给予这家美国公司以沉重打击，使它每天损失十一万美元。为了镇压罢工工人，秘鲁当局向这个矿区增派了警察。"},{"type":"paragraph","text":"最近，秘鲁库斯科省孔本西翁地区的约两万名农业工人举行无限期总罢工，抗议秘鲁政府欺骗人民的假“土改”。这次罢工使这个地区所有庄园和农场的农业活动陷于瘫痪。"},{"type":"paragraph","text":"在这以前，瓦拉尔山谷和昌凯山谷两千多名参加了秘鲁农民联合会的农业工人举行大会，强烈抗议庄园主对他们的迫害。在会上发言的人号召农业工人团结起来，为争取土地、正义和自由而进行艰苦的、长期的、有效的斗争。"},{"type":"paragraph","text":"据新华社四日讯　瓜亚基尔消息：最近在厄瓜多尔不断爆发农民和工人用暴力夺取土地的斗争。"},{"type":"paragraph","text":"几天以前，厄瓜多尔南部的卡莱曼加附近的“圣安娜”庄园的农民，不怕警察的残酷镇压，奋起反对庄园主的剥削，并夺取了这个庄园的耕地。"},{"type":"paragraph","text":"上个月，厄瓜多尔第一大城市瓜亚基尔的数百名没有栖身之处的工人及其家属，夺取了这个城市南部“拉萨伊瓦”庄园的一部分土地，准备建造住房。工人们用砍刀、石块英勇反抗警察的镇压，打伤六名警察。警察用催泪弹、枪弹和大棒把夺地的工人强行赶走，并且逮捕了一批工人。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"17d0eb0da4"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
