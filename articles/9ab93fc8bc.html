<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"工人毛泽东思想宣传队就是好  驻株洲市第二医院工人宣传队领导医务人员打破洋框框抢救阶级姐妹","authors":[],"dates":[{"year":1968,"month":10,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"工人毛泽东思想宣传队就是好"},{"type":"paragraph","text":"驻株洲市第二医院工人宣传队领导医务人员打破洋框框抢救阶级姐妹"},{"type":"paragraph","text":"进驻湖南省株洲市第二医院的工人毛泽东思想宣传队，高举毛泽东思想伟大红旗，领导这个医院妇产科的医务人员大破洋框框，在紧急需要的情况下，不进手术室，在产房给产妇动手术，抢救了谭淑元母子的生命。当地的广大革命群众赞扬说，工人阶级领导一切就是好！"},{"type":"paragraph","text":"下中农谭淑元是株洲县东风公社的社员，因难产并且流血过多，由她的爱人唐发元将她送到株洲市第二医院。当时，唐发元没带现金，只有公社开的一封介绍信。进驻这个医院的工人毛泽东思想宣传队，同党内一小撮走资派过去制定的没有现金不能住院的规章制度针锋相对，从抢救阶级姐妹的生命出发，当即决定收留谭淑元住院。"},{"type":"paragraph","text":"九月十四日上午，谭淑元突然大量流血。尽管输液筒在加压输血，但是还是远远补偿不了大量的失血。经过产房检查，确诊谭淑元为中央性前置胎盘。由于失血过多，她的嘴唇和指甲全发乌了，全身冷汗淋漓，血压一降再降，谭淑元完全处于休克状态了。在这生命危急的关键时刻，唯一的抢救办法就是在抗休克治疗的同时，进行剖腹手术。手术室距离产房虽然只有一百来米远，可是不能把处于休克状态的谭淑元送往手术室；因为她经不起一点颠簸，颠簸就可能死亡。而手术又必须立即进行！医务人员急得团团转，不知如何是好。"},{"type":"paragraph","text":"在这千钧一发之际，工人毛泽东思想宣传队组织大家学习毛主席的教导：“我们需要的是热烈而镇定的情绪，紧张而有秩序的工作。”“不破不立。破，就是批判，就是革命。”并当即决定，克服一切困难，抢救阶级姐妹！打破洋框框，不进手术室，就地动手术。"},{"type":"paragraph","text":"工人宣传队用毛泽东思想把医务人员的心照亮了。于是，一场紧张的战斗开始了！手术室的医务人员学习了毛主席的教导：救死扶伤，实行革命的人道主义。一种强烈的抢救阶级姐妹的深厚阶级感情，在激励着她们。破！非破不可！于是她们在很短时间内，将器械物品跑步送到产房。医务人员们在毛泽东思想指引下给谭淑元动了手术，娩出了胎儿。可是胎儿没有呼吸，全身发紫。经过二十多分钟的紧张抢救，胎儿出现了第一次呼吸。这时，谭淑元的流血也止了，她的血压开始上升，嘴唇渐渐由紫变红。"},{"type":"paragraph","text":"谭淑元母子得救了。产房内外，一片欢腾。人们齐声欢呼：战无不胜的毛泽东思想万岁！毛主席万岁！万万岁！谭淑元说，是伟大领袖毛主席给了她第二次生命。为了表达对毛主席的无限忠心和感激，唐发元夫妇给小孩取名“三忠”。"},{"type":"paragraph","text":"通过这一场抢救阶级姐妹的战斗，医务人员受到了很大的教育。他们说，给谭淑元破格在产房动手术的成功，这是给资产阶级反动学术“权威”一次狠狠的打击！医务人员反复学习毛主席的最新指示，深刻体会到：工人阶级必须领导一切，而且也能够领导一切。他们表示，知识分子只有老老实实接受工农兵的再教育，才能走上革命化的道路。　（据新华社）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9ab93fc8bc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
