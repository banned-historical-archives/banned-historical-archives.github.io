art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"刘少奇同志在延安的旧居重新开放","authors":[],"parts":[{"type":"paragraph","text":"新华社延安三月十一日电 伟大的马克思主义者、无产阶级革命家刘少奇同志在延安的旧居经过整修，已于三月八日重新开放。"},{"type":"paragraph","text":"重新开放的刘少奇同志在延安枣园旧居三孔土窑洞内，挂上了刘少奇同志在延安写作时的照片，陈列着刘少奇同志在延安时期用过的钟表、笔筒等物件。"},{"type":"paragraph","text":"刘少奇同志于一九三五年十月长征到达陕北后，大部分时间在延安工作。他在这里写下著名的《论共产党员的修养》，参加党的六届七中全会和“七大”的准备工作，并在“七大”会议上作了《关于修改党章的报告》。一九四五年毛泽东同志去重庆谈判期间，刘少奇同志在延安主持中央工作。"},{"type":"paragraph","text":"延安是刘少奇同志长期生活和战斗过的地方。文化大革命开始后，由于林彪、“四人帮”的诬陷和迫害，刘少奇同志在延安的旧居被封闭，很多宝贵历史资料被销毁。"}],"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"24b43c41cc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
