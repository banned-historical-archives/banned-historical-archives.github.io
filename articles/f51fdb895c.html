ical-archives/banned-historical-archives0/main/maoquanji27.pdf"],"article":{"title":"关于董其武部改编问题给薄一波的信","alias":"","parts":[{"type":"paragraph","text":"关于董其武部改编问题"},{"type":"paragraph","text":"给薄一波的信\""},{"type":"paragraph","text":"（1949年10月29日）一波同志："},{"type":"paragraph","text":"十月二十八日信悉。绥远两个军及一个骑兵师，可以编入人民解放军的战斗序列，并颁发番号；所列两军及骑师的军事指挥人员亦可照准，惟须与政治委员及政治部主任同时委任，方能使政治工作在军中建立威信，此点请与傅宜生?商酌。如果他认为此时发表政治委员及政治部主任有不便处，则军事人员可以事实上先行到职，而正式委任则待政治人员商定后一同行之。在绥远军队中实行认真的政治工作制度是一件大而艰难的事，必须事先有充分的精神准备，并须由傅宜生亲自领导方能行得通，否则难免出乱子。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十月二十九日"},{"type":"paragraph","text":"[1]董其武，原国民党政府军将领，1949年9月率部在绥远起义，当时任政协第一届全国委员会委员。薄一波，当时任中共中央华北局第一书记、中国人民解放军华北军区政治委员。"},{"type":"paragraph","text":"[2]傅宜生，即傅作义，原国民党政府军将领，1949年1月率部在北平起义。当时任中央人民政府委员。"}],"authors":["毛泽东"],"dates":[{"year":1949,"month":10,"day":29}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":476,"page_end":476},"tags":[{"name":"毛泽东","type":"人物"},{"name":"薄一波","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f51fdb895c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
