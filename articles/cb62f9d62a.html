script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"人民日报社纪委开除刘宾雁党籍刘宾雁严重违反党章、党纪和党的决议，在许多地方发表讲演、文章，否定四项基本原则，鼓吹资产阶级自由化，已丧失共产党员的条件","authors":[],"dates":[{"year":1987,"month":1,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京一月二十四日电　据《人民日报》报道:中共人民日报社机关纪律检查委员会1月23日根据刘宾雁的严重错误事实，按照党章的规定，决定开除人民日报记者、中国作家协会副主席刘宾雁的党籍。"},{"type":"paragraph","text":"《关于开除刘宾雁党籍的决定》指出:刘宾雁严重违反党章、党纪和党的决议，在许多地方发表讲演、文章，否定四项基本原则，鼓吹资产阶级自由化。他攻击四项基本原则是“陈腐的、曾经把中国几次引向灾难的过时观念，僵硬的、教条主义的东西，词句很好，内容是保守的，甚至是反动的”，攻击我们现在坚持的马克思主义是“过时的意识形态”。"},{"type":"paragraph","text":"刘宾雁诋毁共产党“堕落”，说他写《人妖之间》、《千秋功罪》“都是为了展示一个真理，就是中国共产党的腐败”。他诬蔑学习好八连和学习雷锋、王杰、欧阳海、曲啸等，都是为了把人变成党的“驯服工具”，说这是一个“痛苦的现实”。"},{"type":"paragraph","text":"刘宾雁违背党中央关于报刊新闻广播宣传要坚持四项基本原则的政治纪律，违反批评的事实一定要核对清楚的宣传纪律，把我们党的新闻工作者接受党的领导说成是当“三孙子”。他在一些报告文学作品里由于不核对事实、不尊重事实而颠倒是非、造谣中伤的问题是严重的。他的这些作品在社会上造成大量混乱，致使很多不明真相的读者误认为中国共产党真的“腐败”“堕落”了，而刘宾雁是真理的捍卫者。对于他的这种严重错误，地方和中央的有关党组织曾多次对他进行批评，但他始终拒不接受。"},{"type":"paragraph","text":"《决定》指出:刘宾雁已经丧失了一个共产党员的条件。为严肃党纪，按照党章规定，决定开除刘宾雁的党籍。"},{"type":"paragraph","text":"中共人民日报社机关纪律检查委员会《关于开除刘宾雁党籍的决定》已与刘宾雁本人见面，并于24日在刘宾雁所在的党支部宣布。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cb62f9d62a"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
