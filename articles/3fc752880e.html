script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"黄楼公社东新五队贫下中农职极贯彻毛主席“抓革命，促生产”的指示，发扬连续作战的作风，深夜帮助六队插秧。六队贫下中农知道此事后，立即把毛主席画像和革命宝书送给五队贫下中农。这真是——贫下中农心连心","authors":[],"dates":[{"year":1968,"month":9,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"八月十五日一清早，川沙县黄楼公社东新大队第六生产队的社员准备去插秧。但一到田头，他们呆住了:田里的秧早已插好了。这是谁来插的呢?问问这个不知道，问问那个也不晓得。"},{"type":"paragraph","text":"原来事情经过是这样的:"},{"type":"paragraph","text":"八月十四日晚上，活学活用毛泽东思想先进集体东新五队的广大贫下中农胜利地完成了抢收、抢种任务后，他们马上举办毛泽东思想学习班，总结今年“三抢”工作，大家一致认为，由于狠抓阶级斗争，深入开展革命大批判，揪出了隐藏在队里的阶级敌人，大大提高了贫下中农的政治觉悟，提前完成了抢收、抢种的任务。这是毛主席“抓革命，促生产”方针的伟大胜利!是战无不胜的毛泽东思想的伟大胜利!"},{"type":"paragraph","text":"接着，队长朱荣根同志说:“公社要求在八月十五日完成后季稻的插秧任务，现在我们已经提前完成了，但六队由于任务重，所以还有十多亩没完成，而且有缺秧的可能，大家看怎么办?”参加学习班的同志坚决地表示:“我们一定要去支援!”"},{"type":"paragraph","text":"这时，已经是深夜十点多钟了，但五队的贫下中农，人人精神振奋，个个斗志昂扬，在毛主席“抓革命，促生产”的最新指示指引下，他们发扬了连续作战的作风，忘掉了十多天来日夜战斗的疲劳，立即到秧田里拔秧去了。月亮好象有意在考验五队贫下中农对毛主席的忠心，躲在云里不肯露面，但用毛泽东思想武装起来的广大贫下中农，高唱着“下定决心，不怕牺牲，排除万难，去争取胜利”的语录歌曲，摸黑拔秧，当把秧拔好的时候，已经是深夜十二点多钟了。"},{"type":"paragraph","text":"五队的贫下中农为了夺取粮食的丰收，连夜用船把秧装到六队，在朦胧的月光下，把秧插好了才回家。"},{"type":"paragraph","text":"当六队的贫下中农、革命干部知道了五队贫下中农主动帮助他们插秧的事后，心情十分激动，立即推派代表，利用中午休息时间，手捧毛主席画像和四卷红彤彤的革命宝书——《毛泽东选集》，敲锣打鼓地到五队表示感谢。这时，两个队的贫下中农一起振臂高呼:毛主席万岁!毛主席万万岁!"},{"type":"paragraph","text":"川沙县黄楼公社革委会政宣组"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3fc752880e"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
