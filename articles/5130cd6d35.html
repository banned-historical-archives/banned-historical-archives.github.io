[{"year":1968,"month":5,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社东京十六日电　日本革命剧团齿轮座，为纪念中共中央一九六六年五月十六日的《通知》发出两周年，十五日在山口市举行庆祝会。"},{"type":"paragraph","text":"齿轮座干事长日笠世志久在讲话中说，毛主席亲自主持制定的中共中央一九六六年五月十六日的《通知》是一个伟大的马克思列宁主义文献。他说，《通知》创造性地发展了马克思列宁主义，提出了在社会主义中国防止资本主义复辟的一整套完整的革命理论，从而给全世界革命人民指出了走向共产主义的光明大道。"},{"type":"paragraph","text":"齿轮座的文艺战士藤川夏子等人讲话，表示要进一步用毛泽东思想武装自己的头脑，加强阶级斗争观念，不断地改造资产阶级世界观，树立无产阶级世界观，为彻底粉碎资产阶级文艺、修正主义文艺，建立无产阶级革命文艺而奋斗!"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5130cd6d35"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
