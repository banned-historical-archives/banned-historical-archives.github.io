rt":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"铁托总统分别致电叶剑英委员长华国锋总理表示祝贺","authors":[],"parts":[{"type":"paragraph","text":"新华社三月七日讯 南斯拉夫社会主义联邦共和国总统铁托三月七日打电报给叶剑英委员长，对他担任人大常委会委员长表示衷心的祝贺和最良好的祝愿。电报全文如下："},{"type":"paragraph","text":"北京"},{"type":"paragraph","text":"中华人民共和国全国人民代表大会常务委员会委员长叶剑英元帅："},{"type":"paragraph","text":"在您当选为全国人民代表大会常务委员会委员长的时候，请允许我代表南斯拉夫各族人民，并以我个人的名义，向您表示衷心的祝贺和最良好的祝愿，祝您在工作中取得新的成就，以造福于中国人民。"},{"type":"paragraph","text":"第五届全国人民代表大会的召开以及新宪法和其它重要决议的通过是在实现友好的中国人民向往的各项宏伟目标中的一个新胜利。"},{"type":"paragraph","text":"我深信，您的革命经历和坚韧不拔的精神将鼓舞这一最高机构在发挥其作用方面取得更大的成就。"},{"type":"paragraph","text":"约瑟普·布罗兹·铁托"},{"type":"paragraph","text":"一九七八年三月七日"},{"type":"paragraph","text":"新华社三月七日讯 南斯拉夫社会主义联邦共和国总统铁托三月七日打电报给华国锋同志，对他担任国务院总理表示衷心的祝贺和最良好的祝愿。电报全文如下："},{"type":"paragraph","text":"北京"},{"type":"paragraph","text":"中华人民共和国国务院总理华国锋同志："},{"type":"paragraph","text":"在您当选为中华人民共和国国务院总理的时候，我向您表示衷心的祝贺和最良好的祝愿，祝您在履行您的崇高职责中取得新的成就，并祝贵国在各方面进一步繁荣昌盛。"},{"type":"paragraph","text":"我们看到，您再次当选为国务院总理，这更坚定了友好的中国人民在以您为首的中国共产党领导下为社会主义的全面发展和国家建设而继续奋斗的决心和意愿，我坚信，这一斗争将取得新的重大的胜利。"},{"type":"paragraph","text":"我对不久前对中华人民共和国的访问记忆犹新。我借此机会再一次对我们会谈的结果和我们两个社会主义国家之间友好关系的发展表示满意。我相信，南斯拉夫社会主义联邦共和国和中华人民共和国之间的友谊和多方面的合作将进一步得到加强，这不仅有利于我们两国和两国人民，而且也有利于平等的国际合作和世界和平。"},{"type":"paragraph","text":"约瑟普·布罗兹·铁托"},{"type":"paragraph","text":"一九七八年三月七日"}],"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"华国锋","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"77e3972b29"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
