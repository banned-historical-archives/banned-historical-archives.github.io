ates":[{"year":1958,"month":8,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"在反修正主义斗争的口号下"},{"type":"paragraph","text":"乌共积极筹备“十七大”"},{"type":"paragraph","text":"新华社2日讯　据塔斯社蒙得维的亚2日讯：将在8月15日开幕的乌拉圭共产党第十七次代表大会的筹备工作正在积极进行。"},{"type":"paragraph","text":"乌拉圭共产党执行委员会发表了两项特别公报，其中公布了纲领宣言、政治纲领和新党章草案。已出版的“研究”杂志第九期，还刊登了有关这次代表大会的各项资料。"},{"type":"paragraph","text":"各省和各市正举行党的代表会议以及党组织的全体会议，讨论党的纲领、宣言草案和政治纲领草案以及新党章草案，并且选举参加代表大会的代表。"},{"type":"paragraph","text":"最近在蒙得维的亚举行了首都党组织的代表会议。共产党省委书记佩雷斯在会上作了关于选举前夕的国内政治局势、关于首都共产党员为实现党的政治纲领而斗争的报告。会议讨论了国际局势，并且就目前政策问题通过了一系列决议。"},{"type":"paragraph","text":"代表大会的筹备工作是在反对现代修正主义的斗争的口号下进行的。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"181ba57907"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
