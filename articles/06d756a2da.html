ors":[],"dates":[{"year":1975,"month":4,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"阿尔巴尼亚《人民之声报》发表文章"},{"type":"paragraph","text":"揭露苏联新资产阶级加紧盘剥劳动人民"},{"type":"paragraph","text":"新华社地拉那一九七五年四月十七日电　阿尔巴尼亚《人民之声报》十七日发表了一篇题为《苏联劳动群众和新资产阶级之间的鸿沟日益加深》的文章，揭露苏联新资产阶级对劳动人民的剥削和压迫。"},{"type":"paragraph","text":"文章说，苏联的现实是：一方面，新资产阶级利用自己的统治地位掠夺苏联劳动者创造的物质财富；另一方面，广大的劳动群众遭受压迫和剥削。在苏联，“新资产阶级骄奢淫逸，积聚大量的固定和不固定资产，过着腐化的寄生虫生活。法律、决定、命令和其他法律条例保证着他们不仅通过高工资、高报酬和利润等形式获得大宗款项，而且也为他们提供了种种特权。”"},{"type":"paragraph","text":"文章指出，“对于新资产阶级来说，千方百计地攫取利润是高于一切的，他们毫不顾忌广大劳动群众的需要。他们根据自己的地位和可能，利用种种方式获得比一般人高数十倍以上的收入。”"},{"type":"paragraph","text":"文章揭露苏联新资产阶级推行的“谢基诺经验”的反动实质时说：“谢基诺经验”只不过是对劳动者进行野蛮剥削的一个方法而已。"},{"type":"paragraph","text":"文章说：“失业是新资产阶级压在劳动群众肩上的又一负担。尽管官方机构吹嘘苏联没有失业，然而事实上，这一资本主义制度的病症也在这个国家中以隐蔽的方式表现出了它的某些特点”。"},{"type":"paragraph","text":"文章最后说：“事实不仅表明苏联的阶级两极分化，而且表明掌权的资产阶级同劳动群众的矛盾的加深。乌克兰、中亚细亚和波罗的海地区各共和国以及苏联其他地方的工人罢工和他们同警察之间的搏斗清楚地说明这一点。”苏联人民正在越来越加强对资产阶级的压迫和剥削政策的反抗。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"06d756a2da"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
