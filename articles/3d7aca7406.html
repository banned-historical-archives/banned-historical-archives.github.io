script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji50","name":"毛泽东全集第50卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji50.pdf"],"article":{"title":"关于中美会谈日期的批语","alias":"","parts":[{"type":"paragraph","text":"关于中美会谈日期的批语!"},{"type":"paragraph","text":"（1970年3月）可略推迟几天，以四月十五日为好，请总理酌定。"},{"type":"paragraph","text":"[1]这个批语写在国务院总理周恩来1970年3月24日给毛泽东等的报告上。报告说，美国“由于中东紧张、柬埔寨政变、美苏紧张而我们又直接提出要其来京谈中美之间的关键问题，弄得它不好回答，又不便在三月间约见，故迟至三月二十三日提出四月初会谈。”“可以料知美认为公开派特使来华还为时过早（它已在三月上旬透露），但又怕我们因为柬埔寨政变而加紧反美，所以先有叶海亚转达准备开辟直接渠道的谈话，后有美使馆在四月初会谈的通知”。为此，“拟将中美会谈推迟到四月十一日、十二日或十三日，既在中国总理访朝之后，又在美苏核会谈（四月中）之前。这种想法，不知妥否，请主席批示”"}],"authors":["毛泽东"],"dates":[{"year":1970,"month":3}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":525,"page_end":525},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3d7aca7406"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
