script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"上海工农兵、红卫兵小将和电影界革命派万余人集会批判反动影片《不夜城》是头号野心家的传声筒不少工人和老店员在会上以亲身经历有力驳斥“剥削有功”等反动论调","authors":[],"dates":[{"year":1967,"month":6,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　前天，上海市工农兵革命群众、红卫兵小将和电影界的无产阶级革命派一万余人集会文化革命广场，以革命大批判的主人翁姿态，怀着对党内头号走资本主义道路当权派的满腔怒火，召开了“高举毛泽东思想伟大红旗，斩断中国的赫鲁晓夫伸进电影界的黑手，彻底批判反动影片《不夜城》大会”。"},{"type":"paragraph","text":"在大会上发言的，有上海工人革命造反总司令部、东方红百货商店(原永安公司)、上海市电影局、国棉九厂、国棉十七厂、自动化仪表三厂等团体和单位的代表。工人出身的电光源专家蔡祖泉，三轮车工人、先进生产者程德旺以及工人出身的工程师唐应斌等也在会上作了批判发言。"},{"type":"paragraph","text":"他们在发言中一致指出:反动影片《不夜城》就是党内头号走资本主义道路当权派复辟资本主义的传声筒，是宣扬他“剥削有功”、“阶级斗争熄灭论”的活样板，是一部复辟资本主义的宣言书。党内最大的一小撮走资本主义道路当权派及其在上海的代理人，为了达到他们罪恶的政治目的，千方百计地支持这部反动影片出笼；当广大革命群众起来口诛笔伐这部反动影片的时候，他们又百般庇护这株大毒草。"},{"type":"paragraph","text":"不少工人和老店员都以他们亲身经受过的资本家残酷剥削、压迫的事实，有力地驳斥了党内最大的走资本主义道路当权派及其在上海的代理人通过这部影片所鼓吹的“剥削有功”、“红色资本家”等等反动论调。在大量的铁的事实面前，党内头号走资本主义道路当权派在上海的代理人、电影界的牛鬼蛇神、反动影片《不夜城》的编导者以及反动资本家都不得不低头认罪。"},{"type":"paragraph","text":"到会的无产阶级革命派战士和革命群众表示，一定要遵照伟大领袖毛主席的教导:“凡是错误的思想，凡是毒草，凡是牛鬼蛇神，都应该进行批判，决不能让它们自由泛滥。”决心彻底批判这条以中国赫鲁晓夫为总后台的反革命修正主义文艺黑线，斩断中国赫鲁晓夫伸向文艺界的黑手，肃清它们的流毒，把无产阶级文化大革命进行到底。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f93280bc7f"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
