资产阶级展开猛烈宣传攻势","authors":[],"dates":[{"year":1952,"month":3,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　为了在伟大的五反运动中动员全市一切宣传力量，发挥各种宣传工具的作用，向广大人民正确宣传党的政策并对资产阶级展开一个猛烈的宣传攻势，中共上海市委宣传部于本月十九日召开全市第六次宣传员代表扩大会议。出席的有全市各区党的宣传干部、宣传员代表及积极分子共二千余人。"},{"type":"paragraph","text":"市委宣传部副部长姚溱同志说明开会意义后，即由宣传部副部长陈琳瑚同志就五反斗争中的宣传内容、方法、步骤作了详细的报告。他在深刻地揭露了三年来资产阶级向工人阶级和人民革命队伍猖狂进攻的各种卑鄙无耻的罪行后，指出:必须把资产阶级忘恩负义、破坏抗美援朝、破坏祖国建设、破坏人民生活、腐蚀政府干部、篡夺工人阶级领导权的各种罪行以及他们的丑恶本质，详尽地向各阶层人民进行宣传。同时，在宣传中，必须说明政府在五反运动中的政策，团结各阶层人民的伟大力量，向不法资本家斗争，务使在宣传战线上对资产阶级造成上下内外夹攻的包围形势。陈琳瑚同志着重指出:这次五反的宣传工作，必须有步骤、有计划、有重点地进行，要服从斗争的要求和适应斗争的规律，必须严守宣传纪律，提倡深入点滴的宣传作风。各区必须运用一切宣传武器，动员所有宣传员及基层单位中广大宣传工作者，来组成一支强大的宣传大军，以保证五反斗争的胜利。"},{"type":"paragraph","text":"最后，姚溱同志又号召全市宣传工作者勇敢地投入这一场伟大的阶级斗争，在工作中锻炼并考验自己。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7c7cdbb494"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
