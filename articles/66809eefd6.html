性迅速提高","authors":[],"dates":[{"year":1951,"month":7,"day":25}],"is_range_date":false,"parts":[{"text":"西南区经过三大运动后群众觉悟和积极性迅速提高","type":"title"},{"text":"【内部参考讯】本社记者丁雪松报道：西南地区经过减租退押、镇压反革命和抗美援朝三大运动后，群众完全发动起来了，他们的积极性很高，对政府一切号召都热烈响应，其觉悟程度和热情甚至超过某些老区的群众。如在农村扩兵，规定要十人，但报名的总有三四十人。有些地方农会把条件提得很高，因此形成考兵、挑兵的现象。没有考上的人觉得很不光荣，有的还哭。这次中国人民赴朝慰问团传达报告时，到会的听众总是超过原订的人数。无论工人、农民和居民都打锣敲鼓扭着秧歌从很远的地方赶来听报告，在大太阳下坚持三四个钟头秩序很好。五十多岁的老大娘也会唱国际歌……群众的热情很使人感动。","type":"paragraph"},{"text":"这次慰问团的传达工作，在组织领导上也作得比上海好，收效很大。","type":"paragraph"}],"comments":[],"origin":"新华通讯社编《内部参考》1951年7月25日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"66809eefd6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
