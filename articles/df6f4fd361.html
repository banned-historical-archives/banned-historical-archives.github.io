art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东思想是对阶级敌人的“判决书”","authors":["苏登明"],"parts":[{"type":"paragraph","text":"我是个年青战士，文化水平低，不懂得邓拓之流和某些所谓“权威”老爷们说的这个“化”那个“化”，什么“实用主义”。我只晓得听毛主席的话。毛主席的话，是千真万确的真理，句句说到工农兵群众的心坎上。毛主席的话，用到哪里哪里灵，离开了毛泽东思想，就象黑夜走上了迷途，一步也不能行。毛泽东思想是最高最活的马克思列宁主义，是反对帝国主义、现代修正主义和各国反动派的强大武器。一切要革命的人都渴望掌握毛泽东思想，只有帝国主义者、现代修正主义者和各国反动派，把毛泽东思想看成是对他们的催命符、判决书，怕得要死。他们想尽法子诋毁毛泽东思想，限制革命的人民群众接近它。试问你们这些所谓“权威”老爷，为什么对毛泽东思想也怕得要死，极端地仇恨？很显然，你们和帝国主义、修正主义穿了连裆裤，成了一个“合唱队”。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"df6f4fd361"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
