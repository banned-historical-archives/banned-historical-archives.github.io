<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"“永远走毛主席指引的路”","authors":[],"dates":[{"year":1969,"month":1,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席发出了“工人阶级必须领导一切”的伟大号召以后，首都工人、解放军毛泽东思想宣传队，浩浩荡荡地开进了北京石油学院。几个月来，在工人阶级领导下，这个学校发生了很大的变化。同学们兴奋地说：“毛泽东思想阳光照，石油学院展新貌。”很多同学谈起自己的进步时都说：“这是工人师傅帮助了我。”"},{"type":"paragraph","text":"“永远走毛主席指引的路”"},{"type":"paragraph","text":"在工人宣传队领导下，石油学院革命师生深入展开革命大批判，猛烈地荡涤着资产阶级的污泥浊水，毛主席的革命路线深入人心。"},{"type":"paragraph","text":"机械系有一个姓王的女同学，在资产阶级知识分子统治学校的时候，是班里的“尖子”，一心一意考虑的是“知识”、“专业”。文化大革命以来，她的思想觉悟虽然有了提高，但是总觉得“掌握专业技术是过硬的东西”，对政治斗争仍然不够积极，批判会上也很少发言。工人宣传队张师傅看在眼里，想在心上。他不是责备这个青年，而是首先想到刘少奇推行的反革命修正主义教育路线的罪恶。要不是毛主席亲自发动和领导这场文化大革命，这些青年是多么危险呀！想到这里，张师傅感到自己的责任重大。他第一次找小王谈话，小王没有显著转变。"},{"type":"paragraph","text":"有一天，系里召开批判大会，同学们满腔怒火，揭露、批判刘少奇和他的代理人宣扬“公私溶化论”的滔天罪行。会后，张师傅趁热打铁，找小王谈心。张师傅从个人苦难的家史讲到解放后幸福的今天；从党内两条路线斗争史讲到毛主席发动文化大革命的伟大意义；从反革命修正主义教育路线对青年的毒害讲到青年人不问政治的危险。他说：“刘少奇虽然被打倒了，但是他的流毒还没被肃清，如果我们不彻底肃清其流毒，提高两条路线斗争觉悟，就会有眼睛分不清敌我，有鼻子闻不出香臭。学到专业技术也不知为谁服务，到那时可真是脑袋掉了还不知怎么掉的！”"},{"type":"paragraph","text":"张师傅语重心长的一席话，深深地教育了小王，她沉痛地说：“以前听了一些鼓吹‘业务第一’的谬论，觉得很入耳，现在才知道，这是拌着白糖的砒霜。工人师傅帮助了我，我一定永远走毛主席指引的路。”从此，小王认真学习毛泽东思想，把毛主席的书当作最重要的必修课。每逢开批判会，她都争着发言。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"867d14bb9b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
