"authors":[],"dates":[{"year":1969,"month":2,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"中国现代陶瓷器展览会在奥斯陆开幕"},{"type":"paragraph","text":"观众热烈祝贺中国艺术在文化大革命中取得的成就"},{"type":"paragraph","text":"新华社讯　奥斯陆消息：中国驻挪威大使馆和挪中友好协会联合举办的中国现代陶瓷器展览会一月二十五日在奥斯陆开幕。"},{"type":"paragraph","text":"展品有一百六十多组和单项的陶瓷艺术品。整个展览体现了中国人民对伟大领袖毛主席的无限热爱。展出的艺术品热烈歌颂中国无产阶级文化大革命，歌颂中国社会主义革命和社会主义建设的伟大胜利，歌颂在毛泽东思想哺育下成长起来的、焕发着共产主义精神的英雄人物。有些展品还反映了世界各国人民反对帝国主义的斗争。"},{"type":"paragraph","text":"挪中友好协会主席奥·希尔特在开幕仪式上讲话，赞扬中国艺术工作者在无产阶级文化大革命中所取得的成就。他表示希望这次展览有助于加强挪中两国人民的友好关系。"},{"type":"paragraph","text":"中国大使馆临时代办刘明华也在开幕式上讲了话。"},{"type":"paragraph","text":"出席开幕式的有挪威劳工和市政大臣海·塞普和各界朋友约一百五十人。各国外交使团的代表也出席了开幕式。"},{"type":"paragraph","text":"观众热烈祝贺展览会成功。一些朋友说，这个展览会无可辩驳地证明了中国人民在无产阶级文化大革命期间在艺术领域中所取得的巨大进步。他们在留言簿中欢呼：“文化大革命万岁！毛主席万万岁！”许多观众特别被《收租院》这组艺术品所吸引，赞扬这是对解放前中国农民的生活和斗争的生动写照。一些进步青年说，中国人民反对剥削和压迫的斗争，是对全世界被压迫人民的巨大鼓舞。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"11a27d2425"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
