script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"地拉那举行盛大群众游行欢庆“五一”节  阿人民伟大领袖霍查同志和列希、谢胡同志等检阅游行队伍  马尔科同志指出亚非拉人民革命斗争给美帝国主义以致命的打击；现代修正主义分崩离析，遭到了新的失败","authors":[],"dates":[{"year":1970,"month":5,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"地拉那举行盛大群众游行欢庆“五一”节"},{"type":"paragraph","text":"阿人民伟大领袖霍查同志和列希、谢胡同志等检阅游行队伍"},{"type":"paragraph","text":"马尔科同志指出亚非拉人民革命斗争给美帝国主义以致命的打击；现代修正主义分崩离析，遭到了新的失败"},{"type":"paragraph","text":"新华社地拉那一日电  阿尔巴尼亚首都地拉那一日上午举行了盛大的群众游行，热烈庆祝“五一”国际劳动节。战斗在社会主义革命和社会主义建设各条战线上并取得了辉煌胜利的阿尔巴尼亚工人阶级和全体劳动人民，满怀胜利的豪情接受自己的伟大领袖恩维尔·霍查同志的检阅。"},{"type":"paragraph","text":"上午十时整，阿尔巴尼亚人民的伟大领袖、阿尔巴尼亚劳动党中央委员会第一书记恩维尔·霍查同志，人民议会主席团主席哈奇·列希同志，部长会议主席穆罕默德·谢胡同志以及其他党政领导同志登上了检阅台。广场上响起了热烈的掌声和欢呼声。群众纵情地高呼，“劳动党！”“恩维尔·霍查！”“党，恩维尔，我们时刻准备着！”"},{"type":"paragraph","text":"以中共中央委员、上海市革命委员会副主任王洪文为团长的中国工人代表团全体成员在观礼台上观礼。"},{"type":"paragraph","text":"在观礼台上的还有应邀来阿尔巴尼亚参加“五一”国际劳动节庆祝活动的一些外国工会代表团和驻阿尔巴尼亚的各国外交使节。"},{"type":"paragraph","text":"阿尔巴尼亚工会中央理事会主席里塔·马尔科同志讲了话。他以党中央、部长会议和工会中央理事会的名义，祝贺英雄的阿尔巴尼亚工人阶级和全体人民在社会主义革命和社会主义建设方面所取得的新的胜利。"},{"type":"paragraph","text":"马尔科说，反对帝国主义和现代修正主义的斗争在今年有了新的高涨。资本主义国家的工人阶级正在日益广泛地投入到反对资产阶级的剥削和暴力的英勇行动中去。亚洲、非洲、拉丁美洲的人民正在给予帝国主义的体系首先是美帝国主义的体系以致命的打击。现代修正主义者惊慌不安，遭到了新的失败。使国家生活法西斯化、压迫别国人民、为划分世界而加强同帝国主义的联盟，这些更加暴露了他们的社会帝国主义的真面目，进一步导致了现代修正主义的四分五裂和分崩离析。"},{"type":"paragraph","text":"马尔科说，我们向兄弟的中国人民、中国工人阶级致以最热烈的祝贺。中国人民、中国工人阶级在中国共产党和伟大的马克思列宁主义者毛泽东主席的领导下，高举无产阶级文化大革命的旗帜，高举党的“九大”的团结和胜利的旗帜，在国家的革命改造中取得了巨大的成就。我国人民祝贺中华人民共和国发射第一颗人造地球卫星这一辉煌的成就和伟大的胜利，并且祝兄弟的中国人民在将来为世界的社会主义和革命取得更加伟大的成就和胜利。"},{"type":"paragraph","text":"马尔科在讲话中号召阿尔巴尼亚劳动者使第四个五年计划的最后一年——一九七○年成为在生活各个领域里取得新的胜利的一年。"},{"type":"paragraph","text":"在雄壮的军乐声中开始了群众游行。男女民兵、工人、农民、机关干部、市民、体育大军、青年学生和文艺队伍等意气风发地通过检阅台。霍查同志和其他党政领导人不断挥手向游行群众致意。"},{"type":"paragraph","text":"当一列游行队伍簇拥着热烈祝贺中国成功地发射第一颗人造地球卫星的巨幅宣传画通过检阅台时，扩音器里响起了这颗卫星发出的《东方红》乐曲，军乐队也奏起了这支乐曲，这时群众中爆发出了一片热烈的掌声和“人民中国！”“毛泽东万岁！”“友谊就是保证！”的热烈欢呼声。巨大的标语牌上写着“祝贺中华人民共和国发射第一颗人造地球卫星的伟大胜利！”"},{"type":"paragraph","text":"游行队伍中还有阿尔巴尼亚人民坚决支持各国人民反对帝、修、反的正义斗争的标语牌、横幅和宣传画。标语牌上写着“帝国主义和修正主义必败！”“向进行反对美帝的正义斗争的越南人民致敬！”“老挝人民必将通过武装斗争打败美帝！”“支持柬埔寨人民的正义斗争！”等。"},{"type":"paragraph","text":"游行在高昂的《国际歌》声中胜利结束。"},{"type":"paragraph","text":"“五一”晚上，地拉那劳动人民在市中心“斯坎德培”广场举行了盛大的联欢晚会，欢乐的人群还观看了五彩缤纷的节日焰火。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"谢胡","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f672d0e3f8"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
