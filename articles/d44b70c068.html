<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"克服火柴工业的无政府状态","authors":[],"dates":[{"year":1950,"month":7,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"克服火柴工业的无政府状态"},{"type":"paragraph","text":"根据六月全国火柴工业会议的决议，各地正在合理地调整火柴工业的产销关系。这是一个好现象，是旧中国工业生产中的无政府状态，转变到比较有计划的生产的一个好现象。"},{"type":"paragraph","text":"旧中国火柴工业的盲目性是惊人的。全国共有火柴工厂三百一十二家，排杆机一千二百余部，每月最大生产能力可达十五万余箱。现在生产量共约为七万七千余箱，而目前全国实际的消耗量每月仅约为五万余箱。这就是说，全国火柴目前消耗量仅为生产能力的三分之一。现在的生产量只及生产设备二分之一。现在的生产量亦过剩三分之一强。如果继续这样盲目生产下去，必然会加重产品滞销，资金周转将更加困难，以至于发生更多工厂停闭与工人失业的现象。"},{"type":"paragraph","text":"全国火柴工业会议，在公私火柴厂代表共同协商之下，决定暂时地、主动地、有计划地减产，在一九五○年下半年减为每月四万八千余箱，并禁制低级火柴。这样，一方面可以停止生产过剩现象，另一方面可以逐步推销存货，以活动各厂的资金，并改善人民的消费。这种步骤是合理的，因此，也是必要的。不过，这里对于公私之间，地区之间，均应有适当的安排，要能统筹兼顾，要避免过分计较局部的利益的倾向。各私营工厂应尽可能组织联营，避免盲目地竞争，减少人为的混乱现象。减产时对于工人生活应有适当的安排。所有减产的工厂，均应当切实地举行劳资协商，使劳资双方各得其所。"},{"type":"paragraph","text":"火柴工业是仍有发展前途的。它的销路与其他工业一样，主要在农村。在全国土地改革完成，农民生活改善，全国交通便利之后，火柴工业将有一个新的发展。事实上，在各地农村中，还有许多没有火柴或者买不起火柴的现象。“击石取火”，在许多地方的农村中并不是个别的现象。换一句话说，为农民服务，火柴工业才有远大的前途。"},{"type":"paragraph","text":"为了开辟现在的销路，迎接将来发展的局面，火柴工业应当在提高质量、减低成本方面作切实的努力。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d44b70c068"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
