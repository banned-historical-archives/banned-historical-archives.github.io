"year":1977,"month":7,"day":31}],"is_range_date":false,"parts":[{"type":"paragraph","text":"井冈山的中心——茨坪，有毛主席旧居。"},{"type":"paragraph","text":"一九二七年十月下旬，毛泽东同志率领工农革命军从大井来到茨坪。从这时候起，到一九二九年一月，毛泽东同志经常在这里居住。"},{"type":"paragraph","text":"从这座房子的正门进去，就是堂屋。那是当年毛泽东同志经常主持召开根据地干部会议的地方。左边是毛泽东同志的住房，房间里布置非常俭朴，除了一张木床、一张写字用的长方桌、一只木橱、两条木凳之外，还有一根扁担，一副竹篓。写字桌上有砚台和笔，还有一盏油灯。毛泽东同志曾在这里花费几个晚上的功夫，写下了《井冈山的斗争》这篇光辉著作。"},{"type":"paragraph","text":"屋子外边，有个凉亭，毛泽东同志经常在这里与过路群众促膝谈心，了解情况，宣传革命道理。门口石子路，是当时茨坪主要道路。红军战士经常在这里走过，他们也是当年毛主席邀请谈心的对象。(本报记者摄)"},{"type":"paragraph","text":"\u003cIMG alt=请插入7号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1977\\07\\777v040401.JPG\"\u003e"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"53b9a882a9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
