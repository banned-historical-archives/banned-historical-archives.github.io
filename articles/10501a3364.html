<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"云南省委纪律检查委员会关于开除马浩天党籍的决定","authors":[],"dates":[{"year":1954,"month":8,"day":30}],"is_range_date":false,"parts":[{"text":"云南省委纪律检查委员会关于开除马浩天党籍的决定","type":"title"},{"text":"中央纪律检查委员会批示：","type":"subtitle"},{"text":"同意你们开除马浩天的党籍并建议行政上给予撤职处分的意见。此件可登党刊。","type":"paragraph"},{"text":" 1954年12月","type":"paragraph"},{"text":"马浩天，山西省曲沃县人，现年34岁，家庭出身地主，本人成份学生，1937年参加革命，1938年入党。历任县委书记、地委委员、川北党校教育长、地委副书记、云南省农林厅副厅长等职。1947年“三查”时因任用叛徒、汉奸和生活上的腐化堕落等错误，受过当众警告处分。","type":"paragraph"},{"text":"全国解放后，马浩天更发展了资产阶级享乐腐化、损人利己的极端个人主义思想，曾采用各种卑劣手段，从精神上虐待其爱人丁自立同志（党员）。南下时，欺骗丁留在北方，随即提出离婚，未遂。丁自立同志南来后，马更对她进行一系列的欺骗、打击，最恶劣的是马常在警卫员朱发才面前诬蔑丁自立，宣传必须和丁离婚，当朱与保姆通奸受到丁自立同志批评后，马对朱的错误不但不批评制止，反支使朱污蔑丁自立同志与前警卫员王安祥通奸，多次故意问朱“小王为什么都是我不在家时来？”“我向法院告她，你敢不敢作证？”等等。在马这样多次有意的暗示及收买之下，朱发才即向支部写了诬蔑、陷害丁自立同志的“检举信”。马浩天在千方百计欺骗、打击、陷害丁自立的同时，又利用职权以极其卑鄙的手段，和某县文化馆女工作员刘淑珍（地主女儿）乱搞男女关系，指使刘脱离工作，把刘带到重庆、昆明姘居。当党的组织进行追查时，马则采取欺骗手段，多次保证说：“绝没有和任何人恋爱”、“如敢乱搞男女关系，请党立即开除我的党籍”，并利用私人关系，拉拉扯扯，活动一部分同志包庇他的错误。1953年12月马浩天出席全国农林工作会议时，得知刘淑珍在重庆生了孩子，为了继续向党隐瞒错误，竟欺骗会议的领导同志说：“昆明来信、来电，要我立即回去开全省农林工作会议”。连邓子恢同志的总结也不听，即匆忙赶到重庆进行布置。还写信给农林厅办公室主任，叫他扣压一切来信，以防党的组织来信了解他的情况。回到云南后，为了掩盖自己中途逃会进行无耻勾当的行为，又在党内外群众中散布“中央的会议拖的太长，不解决问题”的谰言。","type":"paragraph"},{"text":"在上述种种错误被揭发后，马浩天不但不老实检讨，反而多次耍无赖，埋怨党不该干涉他的“生活小节”。在学习党在过渡时期的总路线和四中全会决议，党组织对他进行了几次严肃的批评斗争之后，被迫在表面上承认了某些错误事实，应付过关，会后却给刘淑珍写信说：“我已对组织交代，你也主动地交代，你好好等待着我，离婚后，我再和你结婚。”并给刘想了假名字，准备秘密通讯，同时继续威胁丁自立和他离婚。至此，马浩天坚持错误，拒绝党的教育，欺骗党的行为，已发展到不可救药的地步。","type":"paragraph"},{"text":"马浩天为了追逐腐化生活，不惜以阴险的手段陷害多年共同生活和共同参加革命工作的伴侣，一贯欺骗组织，其错误给党造成的政治损失是极为严重的，为了严肃党的纪律，教育全党，经讨论通过予马浩天以开除党籍的处分，并建议行政上给予撤职处分。","type":"paragraph"}],"comments":[],"origin":"《纪律检查工作》第十五期，1955年2月18日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"10501a3364"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
