s":["天津市","荣子正"],"dates":[{"year":1957,"month":5,"day":30}],"is_range_date":false,"parts":[{"text":"在天津市工商界人士座谈会上的发言","type":"title"},{"text":"天津市荣子正","type":"authors"},{"text":"在中共天津市委统战部，地方工业部和财贸部召开的工商界人士座谈会上的发言（摘要）","type":"subtitle"},{"text":"中央说要赎买到底，不会是半赎买半没收。但事实上，赎买代价的实际等于没收私方剥削的大半。在企业合营以前，税务局为了多收税，查帐稽征时；把每件东西都估得很值钱。而工业、商业管理部门在企业合营时估财产，又样样估得不值钱，结果减少了私方的股金。这些部门进行上述工作时，都说要实事求是，公平合理，这两种工作也都是在工人监督下进行的。可是两个“实事求是”，两次监督，却使全国私营企业财产由四十五亿元成为合营后的股金二十二亿元。（原载1957年5月31日《天津日报》）","type":"paragraph"}],"comments":[],"origin":"中国人民大学经济系政治经济学教研室编《中国资產阶级右派经济言论批判参考资料》，1958年9月。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"729bae8b99"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
