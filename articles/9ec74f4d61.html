[{"year":1968,"month":2,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"我国农村的广大贫下中农和革命干部，对毛主席发出的最新指示，热烈响应，认真贯彻。他们以“斗私，批修”为纲，办起了各种类型的学习班。毛泽东思想的光辉，照亮了千村万户。广大农民的精神面貌，正在发生巨大的变化。"},{"type":"paragraph","text":"居住分散怎么办？办三家两户的学习班；农忙时怎么办？办田头学习班；……"},{"type":"paragraph","text":"他们最深刻的体会是：“办学习班没有巧，忠于毛主席就能办好”。有了对毛主席和对毛泽东思想的无限忠心，才能真正做到学用结合，才能紧跟毛主席的伟大战略部署，全面落实毛主席的最新指示，把伟大的毛泽东思想变为自觉的革命行动，推动农村无产阶级文化大革命从胜利走向新的胜利。"},{"type":"paragraph","text":"——编者"},{"type":"paragraph","text":"“办学习班没有巧，忠于毛主席就能办好”"},{"type":"paragraph","text":"最近，青岛市革命委员会对崂山县王哥庄公社港东大队等三个单位办的毛泽东思想学习班进行了调查总结，提出办好学习班的一条主要经验在于一个“忠”字。广大贫下中农说：“办学习班没有巧，忠于毛主席就能办好。”"},{"type":"paragraph","text":"三个单位一致认为，办好业余学习班，必须首先解决对毛主席、对毛泽东思想的态度问题。要永远忠于毛主席，永远忠于毛泽东思想，永远忠于毛主席的无产阶级革命路线。为此，各个学习班（组）首先大讲毛主席的英明伟大，激发学员对毛主席无限热爱的阶级感情，大学毛主席的最新指示，认清无产阶级文化大革命的大好形势；大讲今冬明春农村文化大革命的任务，明确具体奋斗目标；大讲大办毛泽东思想学习班的伟大意义和外地的先进经验；大讲阶级斗争和两条路线的斗争；忆旧社会的苦，比新社会的甜；忆资产阶级反动路线的苦，比毛主席无产阶级革命路线的甜。通过这些教育活动，大大提高了社员的阶级觉悟，激发了社员对毛主席和毛泽东思想的深厚的阶级感情，促进了社员大办毛泽东思想业余学习班的积极性和自觉性。"},{"type":"paragraph","text":"一位老贫农社员说：“毛主席处处为咱们贫下中农着想，毛主席的书是咱们的命根子，咱们不学谁学？毛泽东思想学习班咱们不办谁办？”另一位贫农社员说：“学习班我们要天天办，月月办，年年办，代代办，一代一代往下传。”这样，大办毛泽东思想业余学习班就成了广大社员的迫切要求，各种形式的毛泽东思想学习班（组）迅速办了起来。广大贫下中农深有感受地说："},{"type":"paragraph","text":"“办学习班没有巧，忠于毛主席就能办好。”"},{"type":"paragraph","text":"青岛市革委会"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9ec74f4d61"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
