ical-archives/banned-historical-archives8/main/maoquanji22.pdf"],"article":{"title":"华中野战军的作战经验","alias":"","parts":[{"type":"paragraph","text":"华中野战军的作战经验"},{"type":"paragraph","text":"（1946年8月28日）各首长："},{"type":"paragraph","text":"据粟裕、谭震林\"未感?电称：我军于二十六日在如皋西南地区歼灭六十九师之九十九旅后，又于二十七日在上述地区歼灭由如皋来援之敌六十五师（粤系）之一八七旅及七十九师-个团。总计两日战斗，将敌一万五千人全部解决，除毙伤外，俘虏近万人。第二次由如皋增援之一个团亦被歼一半。我军略加休整，以利再战，等情。我粟谭军从午元?至未感-个半月内，作战六次4，歼敌六个半旅及交通总队五于，造成辉煌战果。而我军主力只有十五个团，但这十五个团是很充实与很有战斗力的，没有采取平均主义的补充方法。每战集中绝对优势兵力打敌一部（例如未宥集中十个团打敌"},{"type":"paragraph","text":"[1]粟裕、谭震林，当时分别任华中野战军司令员和政治委员。[2] 未感，即8月27日。[3]午元，即7月13日。"},{"type":"paragraph","text":"[4]1946年7月13日至8月31日，由粟裕、谭震林指挥的华中野战军依托苏中解放区，连续作战7次，先后歼灭国民党军1个整编师师部、6个旅、1个团和5个交通大队，共5.37万余人，被誉为“七战七捷”。毛泽东写这个电报时，尚未收到华中野战军关于邵伯保卫战的报告，故电报中说作战6次。两个团，未感集中十五个团打敌三个团），故战无不胜，士气甚高；缴获甚多，故装备优良；凭借解放区作战，故补充便利；加上指挥正确，既灵活，又勇敢，故能取得伟大胜利。这一经验是很好的经验，希望各区仿照办理，并望转知所属一体注意。"},{"type":"paragraph","text":"军委未俭"}],"authors":["毛泽东"],"dates":[{"year":1946,"month":8,"day":28}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":103,"page_end":104},"tags":[{"name":"粟裕","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"谭震林","type":"人物"},{"type":"文稿类型","name":"文章"}]},{"type":"pdf","id":"wenji4","name":"毛泽东文集第四卷（1999）","internal":false,"official":true,"author":"中央文献研究室","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/wenji4.pdf"],"article":{"title":"华中野战军的作战经验","description":"根据毛泽东手稿刊印。","dates":[{"year":1946,"month":8,"day":28}],"parts":[{"text":"华中野战军的作战经验","type":"title"},{"type":"appellation","text":"各首长："},{"type":"paragraph","text":"据粟裕、谭震林未感电称：我军于二十六日在如皋西南地区歼灭六十九师之九十九旅后，又于二十七日在上述地区歼灭由如皋来援之敌六十五师（粤系）之一八七旅及七十九师一个团。总计两日战斗，将敌一万五千人全部解决，除毙伤外，俘虏近万人。第二次由如皋增援之一个团亦被歼一半。我军略加休整，以利再战，等情。我粟谭军从午元至未感一个半月内，作战六次，歼敌六个半旅及交通总队五千，造成辉煌战果。而我军主力只有十五个团，但这十五个团是很充实与很有战斗力的，没有采取平均主义的补充方法。每战集中绝对优势兵力打敌一部（例如未宥集中十个团打敌两个团，未感集中十五个团打敌三个团），故战无不胜，士气甚高；缴获甚多，故装备优良；凭借解放区作战，故补充便利；加上指挥正确，既灵活，又勇敢，故能取得伟大胜利。这一经验是很好的经验，希望各区仿照办理，并望转知所属一体注意。"},{"type":"paragraph","text":"军 委"},{"type":"paragraph","text":"未俭"}],"comment_pivots":[{"part_idx":2,"offset":7,"index":1},{"part_idx":2,"offset":9,"index":2},{"part_idx":2,"offset":151,"index":3},{"part_idx":2,"offset":164,"index":4},{"part_idx":2,"offset":176,"index":5},{"part_idx":2,"offset":249,"index":6}],"is_range_date":false,"authors":["毛泽东"],"comments":["粟裕、谭震林，当时分别任华中野战军司令员和政治委员。","未感，即八月二十七日。","午元，即七月十三日。","一九四六年七月十三日至八月三十一日，由粟裕、谭震林指挥的华中野战军依托苏中解放区，连续作战七次，先后歼灭国民党军一个整编师师部、六个旅、一个团和五个交通大队，共五万三千七百余人，被誉为“七战七捷”。毛泽东写这个电报时，尚未收到华中野战军关于邵伯保卫战的报告，故电报中说作战六次。","交通总队，见本卷第170页注〔3〕。","未宥，即八月二十六日。"],"page_start":189,"page_end":189,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8e35506a6b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
