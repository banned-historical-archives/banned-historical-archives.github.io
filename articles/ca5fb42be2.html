thors":[],"dates":[{"year":1952,"month":5,"day":31}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【中央人民电台广播】拉萨廿九日消息:西藏地方政府在廿三日召开庆祝大会，庆祝“关于和平解放西藏办法的协议”签订一周年。拉萨市藏、汉、回各族人民都热烈参加庆祝。大会主席、西藏地方政府首席噶伦然巴·图丹滚清报告开会意义以后，中央人民政府代表张经武将军、西藏军区司令员张国华将军、西藏地方政府代表素康·汪钦噶伦、班禅行辕代表计晋美扎萨、曾任西藏地方政府和谈代表团首席代表的阿沛·阿旺晋美和回族代表教长马俊良等都在会上讲话。张经武将军在讲话中号召西藏僧俗人民和人民解放军进藏部队全体指战员进一步团结起来，巩固和发展一年来报行协议所获得的重大成就，有计划有步骤地彻底实现“关于和平解放西藏办法的协议”。张国华将军在讲话中坚决表示:进藏人民解放军将永远坚持在祖国边疆，巩固国防，继续大力进行生产建设，进一步和西藏人民紧密地团结一起，为保证和平协议的彻底实现，为建设新西藏而奋斗。素康·汪钦噶伦、计晋美扎萨、阿沛·阿旺晋美、马俊良等在讲话中一致表示今后要为全部实现和平协议而努力。大会通过向祖国各族人民伟大领袖毛主席致敬电以后，在欢呼“中华人民共和国各民族大团结万岁”口号声中结束。"}],"comments":[],"origin":"中央人民电台","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"张国华","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ca5fb42be2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
