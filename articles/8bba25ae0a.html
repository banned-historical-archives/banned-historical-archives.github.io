script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反击右倾翻案风　夺取教育革命新胜利——清华大学《教育革命展览》照片选（图片）","authors":[],"dates":[{"year":1976,"month":2,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反击右倾翻案风　夺取教育革命新胜利"},{"type":"paragraph","text":"——清华大学《教育革命展览》照片选"},{"type":"paragraph","text":"在毛主席的无产阶级革命路线指引下，一场反击右倾翻案风的斗争正在清华大学深入地开展。这是精密仪器系机械制造工艺及设备专业七二届工农兵学员，结合无产阶级专政理论学习，评论《水浒》，批判党内不肯改悔的走资派。"},{"type":"paragraph","text":"新华社记者摄"},{"type":"paragraph","text":"在校党委的领导下，建筑工程系工农兵学员愤怒批判党内那个不肯改悔的走资派炮制的“三项指示为纲”的修正主义纲领。　本报记者摄"},{"type":"paragraph","text":"工农兵学员在欢送毕业生当农民的大会上，朗诵充满革命激情的长诗《理想之歌》。电子系教职员工在党委统一领导下，认真贯彻执行毛主席、党中央的指示，以阶级斗争为纲，搞好各项工作。革命师生员工坚持业余闹革命，经常写大字报、开批判会到深夜。　新华社记者摄"},{"type":"paragraph","text":"水利系工农兵学员傅青枝大学毕业后自愿回乡当农民，工宣队员热情地勉励她回农村后要以阶级斗争为纲，坚持党的基本路线，为建设社会主义新农村作出贡献。"},{"type":"paragraph","text":"新华社记者摄"},{"type":"paragraph","text":"延安地区贫下中农欢送自己的子女上大学。"},{"type":"paragraph","text":"受教育者也办教育。电力系工农兵学员自己登上讲台，上政治理论课。"},{"type":"paragraph","text":"电子系、精密仪器系师生和工人相结合，研制成功具有先进水平的图形发生器。这是他们正在进行调试工作。"},{"type":"paragraph","text":"机械系师生和工人、技术人员一起共同努力，打破了外国焊接工艺规范，成功地进行负一百度低温用钢的焊接。"},{"type":"paragraph","text":"清华大学农村分校师生大搞科学实验，促进粮食高产，为农业学大寨贡献力量。这是他们在进行土壤分析。"},{"type":"paragraph","text":"为了取得水坠坝科研的第一手资料，水利系工农兵学员开门办学、开门办科研，长期同群众一起战斗在施工第一线。这是他们在坝场取样。"},{"type":"paragraph","text":"建筑工程系工农兵学员拜工人为老师，在建筑工地边施工边上课。（本版照片除署名者外均为清华大学摄影组供稿）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"教育革命","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8bba25ae0a"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
