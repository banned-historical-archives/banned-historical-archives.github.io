art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"战士大学讲义","authors":["王鸣久〖HH/换行〗DW：建字八一一部队"],"parts":[{"type":"paragraph","text":"书页里，诱人的油墨香，是那样浓郁；书钉旁，醒目的手指痕，是那样清晰。"},{"type":"paragraph","text":"啊，这战士大学的“土讲义”，是对修正主义教育路线的冲击，毛主席的战士勇敢登攀，用斗争谱写教育革命进行曲。"},{"type":"paragraph","text":"一次次，工地上拟改提纲，一回回，连队里编选课题；一页页，一行行，一字字啊，都是群众智慧的结晶体！"},{"type":"paragraph","text":"有人说它“土气十足”，我们说：这是革命的创举！在这闪耀革命精神的“土讲义”前，凯洛夫的“精装本”不过是一堆垃圾！"},{"type":"paragraph","text":"是啊，茅屋里油印机印刷，“大老粗”的茧手编辑，看到它，那些资产阶级老爷们，怎不感到“礼崩乐坏”，如丧考妣？"},{"type":"paragraph","text":"哈哈！让他们去哀嚎哭泣吧，看战士学员自豪地捧着“土讲义”，它啊，每个标点符号都是重磅炮弹，轰毁邓小平复辟的断戈破旗！"}],"alias":""},"tags":[{"name":"教育革命","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c82079b14e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
