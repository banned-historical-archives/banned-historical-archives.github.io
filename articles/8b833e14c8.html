犯过错误的老造反派的通知","authors":[],"dates":[{"year":1967,"month":12,"day":2}],"is_range_date":false,"parts":[{"text":"中共中央、国务院、中央军委、中央文革关于正确对待犯过错误的老造反派的通知","type":"title"},{"text":"各省、市、区革命委员会（筹备小组）、军管会，各大军区、省军区：","type":"appellation"},{"text":"毛主席最近对浙江如何正确对待红暴派问题，作了重要的批示。","type":"paragraph"},{"text":"毛主席说：“浙江的红暴，与湖北的百万雄师不同，是个犯过错误的老造反派，有许多群众，似宜以帮助，批评，联合为原则。”","type":"paragraph"},{"text":"毛主席的这个极其重要的指示，对于各地的工作具有普遍的指导意义。目前不少地方都存在不同于百万雄师的犯过错误的老造反派，应当对他们采取正确的政策，即毛主席提出的帮助，批评，联合的政策，而不应对那些组织的群众采取施加压力、绝对排斥的政策，才能有利于促进革命的大联合和革命的三结合。应当组织有各派参加的毛泽东思想学习班，以“斗私，批修”为纲，大力帮助他们学习毛泽东思想；批评他们的错误，并促进他们自觉地改正自己的错误；同时大力推动他们同其他无产阶级革命造反派共同进行革命的大批判，实行革命的大联合，在革命“三结合”领导机构中保留他们一定的名额。采取这种政策将有利于团结大多数，使还没有建立革命领导班子的地方，能更迅速地实行革命的大联合和三结合；使那些已经成立临时权力机构地方的革命政权更加巩固。毛主席教导我们：“不同质的矛盾，只有用不同质的方法才能解决。”（《矛盾论》）只有执行毛主席提出的帮助，批评，联合的办法，才能够正确解决同犯过错误的老造反派这类性质的矛盾，而用高压、排斥、一派单独夺权等项方法，则是不能解决此种矛盾的。对党内一小撮走资本主义道路的当权派及特务，叛徒等坏人用种种方法破坏革命大联合，挑动武斗，则必须保持警惕。望同志们对毛主席这个最新指示细加体会，坚决执行。","type":"paragraph"},{"text":"（发至县、团级）","type":"paragraph"}],"comments":[],"origin":"根据中共中央办公厅、国务院秘书厅文化革命联合接待室编印《无产阶级文化大革命有关文件汇集 （第五集）》， 北京：1968年1月","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"中央文革","type":"人物"},{"name":"浙江省红色暴动委员会（红暴）","type":"人物"},{"name":"武汉地区无产阶级革命派百万雄师联络站（百万雄师）","type":"人物"},{"name":"浙江文革","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"革命委员会","type":"主题/事件"},{"name":"武斗","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8b833e14c8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
