1,"month":2,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"亲爱的同志们，朋友们!"},{"type":"paragraph","text":"我和中国代表团同人周恩来同志等这次在莫斯科会见了斯大林大元帅以及苏联政府其他负责同志，我们相互间在中苏两大国人民根本利益的基础上所建立起来的充分了解与深厚友谊，是难以用言语来形容的。人民可以看得见:业已经过条约国定下来的中苏两大国人民的团结将是永久的，不可破坏的，没有人能够分离的。而这种团结，不但必然要影响中苏两大国的繁荣，而且必然要影响到人类的将来，影响到全世界和平与正义的胜利。"},{"type":"paragraph","text":"留在苏联的时期内，我们曾经参观了许多工厂和农场等，看见了苏联工人，农民和智识份子从事社会主义建设的伟大成就，看见了苏联人民在斯大林同志和联共党的教育之下所养成的革命精神与实际精神相互结合的作风，证实了中国共产党人历来的信念，即:苏联经济文化及其他各项重要的建设经验，将成为新中国建设的榜样。"},{"type":"paragraph","text":"我们在苏联首都莫斯科以及十月革命策源地的列宁城，受到了热烈的招待，当我们离开这伟大的社会主义首都的时候，特向斯大林大元帅的，苏联政府和苏联人民致衷心的谢意。"},{"type":"paragraph","text":"中苏永久友好和永久合作万岁!"},{"type":"paragraph","text":"苏联人民万岁!"},{"type":"paragraph","text":"世界革命导师与中国人民的挚友一一斯大林同志万岁!"},{"type":"paragraph","text":"\u003cIMG alt=请插入2号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1951\\02\\512f070101.JPG\"\u003e"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"84ec702dc0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
