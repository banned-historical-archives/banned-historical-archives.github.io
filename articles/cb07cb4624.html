rt":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"艰苦奋斗的作风是执行毛主席革命路线的保证","authors":["武诗齐武"],"parts":[{"type":"paragraph","text":"在全国解放前夕，伟大领袖毛主席向全党发出号召：“务必使同志们继续地保持艰苦奋斗的作风。”二十多年来，我们牢记毛主席的教导，保持和发扬了艰苦奋斗的作风，打败了资产阶级和一切阶级敌人“糖弹”的进攻，坚决执行和捍卫了毛主席的无产阶级革命路线，取得了一个又一个伟大胜利。"},{"type":"paragraph","text":"“艰苦奋斗”是毛主席一贯倡导的无产阶级特有的作风。能否保持和发扬这一作风，是关系到能否执行毛主席的无产阶级革命路线的重大原则问题。作风和路线是紧密相连的，艰苦奋斗的作风，是执行正确路线的保证。如果有了正确的路线，而没有艰苦奋斗的作风，正确路线仍然得不到贯彻执行。“没有艰苦奋斗的工作作风，也就不能执行坚定正确的政治方向。”在长期革命斗争中，伟大领袖毛主席为我军制定了一条正确的建军路线；为了保证这条路线的贯彻执行，还亲自倡导和培育了艰苦奋斗的作风。回顾我军的战斗历程，那一步也没有离开过艰苦奋斗。在战火纷飞的年代，正是由于我们发扬了艰苦奋斗的作风，经受了一切艰难困苦的考验，坚定不移地执行了毛主席的革命路线，才战胜了国内外阶级敌人，夺取了政权，在社会主义革命和社会主义建设时期，也正是由于我军继承和发扬了艰苦奋斗的作风，才能在尖锐复杂的阶级斗争中，顶住了资产阶级思想的侵蚀，风吹浪打不动摇，为保卫和建设祖国、巩固无产阶级专政做出了新贡献。我军几十年的历史，就是一部艰苦奋斗的历史。所以说，艰苦奋斗的作风，是我军克敌制胜的法宝，是毛主席建军路线的重要组成部分。历史经验证明，我军的建设一时一刻也离不开它。丢掉了艰苦奋斗的作风，就是丢掉了我军的光荣传统，就要背离毛主席的革命路线。"},{"type":"paragraph","text":"作风历来是服务于一定阶级的，一定路线的。任何阶级要维护本阶级的利益，就必然提出一套和它的路线相适应的作风。无产阶级是这样，资产阶级也是这样。刘少奇一类骗子出于他们篡军反党的罪恶目的，在推行其机会主义路线的同时，还极力散布资产阶级腐朽庸俗的作风。他们为了达到其不可告人的罪恶目的，还极力抹煞两种作风的斗争实质。不分阶级，离开路线，去侈谈什么“大节”和“小节”，甚至把同路线紧密相关的作风问题，硬说成是什么“小节”问题。他们甚至装出一副关心下级干部生活的面孔，想用一些小恩小惠引诱人们脱离毛主席的革命路线，用心十分狠毒。由此可见，要不要艰苦奋斗，不仅仅是两种作风的区别，而且也是两个阶级、两条路线斗争的具体反映。作风和路线是紧密相连的。艰苦奋斗的作风是执行毛主席无产阶级革命路线的保证。"},{"type":"paragraph","text":"我们必须认真读马、列的书，读毛主席的书，不断地斗私批修，抵制和战胜形形色色的资产阶级思想的侵蚀，让艰苦奋斗的作风代代相传，坚定不移地执行毛主席的革命路线。"}],"alias":""},"tags":[{"name":"两条路线斗争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cb07cb4624"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
