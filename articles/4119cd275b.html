hors":["周恩来","戚本禹"],"dates":[{"year":1967,"month":8,"day":26}],"is_range_date":false,"parts":[{"text":"周恩来戚本禹接见黑龙江省潘复生等时的讲话","type":"title"},{"text":"周恩来戚本禹","type":"authors"},{"text":"〖时间：凌晨。摘要〗","type":"appellation"},{"text":"周总理、戚本禹同志接见了以潘复生为首的哈尔滨“捍联总”代表团卅多人，赵去非也被中央调来。","type":"paragraph"},{"text":"当谈到“六·五”事件时，周总理很气愤的讲：“他们（哈军工）只有200多人坐在那里（指革委会地107）你们有什么理由不接见？”","type":"paragraph"},{"text":"当谈到6.9反夺权时，周总理批评了他们，捍二不服气，军工的阎××辩解说：“他们把矛头指向无产阶级司令部，是敌我矛盾。”戚本禹说：“你们错就错在这里，在总理批评你们之后，还不接受。本来是内部矛盾问题，不应该夺权，不应该把他们打成逆流。你们内战外打，你们要做自我批评，总理说得很明确了。”","type":"paragraph"},{"text":"谈话期间，总理很气愤地把赵去非从后面坐位上调到前面，详细问了他的家庭出身，工作经历等等。然后问他：“哈尔滨的武斗如此严重，你采取了什么措施，你们为什么要镇压他们？”赵去非答不出来。","type":"paragraph"}],"comments":[],"origin":"1967年8月29日红代会清华井冈山一部第三动态组编《动态》第135期。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"戚本禹","type":"人物"},{"name":"潘复生","type":"人物"},{"name":"黑龙江文革","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"武斗","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4119cd275b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
