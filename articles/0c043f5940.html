script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"同修正主义办企业路线对着干","authors":[],"dates":[{"year":1976,"month":3,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"同修正主义办企业路线对着干"},{"type":"paragraph","text":"山东菏泽柴油机厂党委带领广大职工，以阶级斗争为纲，认真学习无产阶级专政理论，深入批判党内那个不肯改悔的走资派鼓吹的阶级斗争熄灭论、唯生产力论，促进全厂生产大发展。这个厂在提前四十四天超额完成一九七五年柴油机生产任务的基础上，今年一、二月份又接连取得了优异成绩。"},{"type":"paragraph","text":"去年夏季前后，党内那个不肯改悔的走资派大刮右倾翻案风，贩卖阶级斗争熄灭论和唯生产力论。这股风，也刮到了工厂。面对这种情况，菏泽柴油机厂党委组织全体职工，深入学习马克思、恩格斯、列宁关于无产阶级专政的论述和毛主席在文化大革命中的一系列指示，狠批阶级斗争熄灭论和唯生产力论。党委还引导职工大摆坚持无产阶级政治挂帅的甜头和就生产抓生产的苦头。文化大革命前，这个厂由于受“技术挂帅”、“生产第一”等修正主义办企业路线的影响，建厂八年没有形成生产动力机械的能力。在无产阶级文化大革命中，工人群众批判了修正主义办企业路线，促进了生产的发展。一九七一年新党委一建立，就狠抓阶级斗争，提前四十天超额完成全年生产任务；一九七二年头五个月，就超额完成了柴油机生产的年计划。一九七四年，由于党委放松了抓阶级斗争，阶级敌人趁机捣乱，资本主义倾向抬头，生产又受到很大影响。从这些事实中，大家深刻认识到，社会主义企业绝不单纯是生产单位，它首先是两个阶级、两条道路、两条路线斗争的阵地。要办好社会主义企业，必须紧紧抓住阶级斗争这个纲。脱离无产阶级政治，就生产抓生产，就会人心散，方向偏。"},{"type":"paragraph","text":"通过学习和回忆对比，厂党委成员提高了贯彻执行党的基本路线的自觉性。他们放手发动群众，以无产阶级专政理论为武器，大批修正主义，大批资本主义，进一步激发了群众大干社会主义的积极性。去年下半年，这个厂的生产任务虽然繁重，但由于广大工人坚持抓革命、促生产，提前超额完成了全年柴油机的生产任务。从去年十二月份以来，在厂党委领导下，这个厂的工人和技术人员相结合，先后搞成十个重大的技术革新项目，改造了二十一台、套设备和三条连续作业线。今年一月份实现了开门红，提前六天超额完成月产柴油机计划。二月份虽然春节放假，但仍然提前四天完成了月生产计划，经检验，产品质量达到一等。"},{"type":"paragraph","text":"最近，这个厂党委组织全厂干部、工人认真学习毛主席关于“什么‘三项指示为纲’，安定团结不是不要阶级斗争，阶级斗争是纲，其余都是目”的教导，深入批判党内那个不肯改悔的走资派抛出的“三项指示为纲”的修正主义纲领。通过学习和批判，广大职工进一步认清了在整个社会主义历史阶段，社会主义革命的性质、对象、任务和前途，从而增强了阶级斗争观念和无产阶级专政下继续革命的自觉性。他们决心牢牢抓住阶级斗争这个纲，用抓革命、促生产的实际行动，回击党内不肯改悔的走资派刮起的右倾翻案风。　本报通讯员"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"两条路线斗争","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0c043f5940"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
