<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共贵州省委关于加强劳力保护工作开展“十防一灭”安全运动的指示","authors":[],"dates":[{"year":1960,"month":5,"day":13}],"is_range_date":false,"parts":[{"text":"中共贵州省委关于加强劳力保护工作开展“十防一灭”安全运动的指示","type":"title"},{"text":"（上缺）了广阔的途径。但是，工伤事故还不断发生，有些单位甚至比去年还有上升，职业病和职业中毒现象在某些企业中仍然存在，劳逸结合、女工保护工作也还做得不够。这些虽是十个指头中一个指头的问题，如不及早引起重视，也会影响社会主义建设持续跃进的。因此，要求各级党组织结合当前技术革新和技术革命运动，采取坚决的措施，以与伤亡事故作斗争为中心，立即掀起一个“十防一灭”。“十防”即是要防止撞压（撞车、翻车、物体打击、机器绞压）、坍塌（冒顶、片邦、土石塌方、建筑物倒塌）、爆炸（瓦斯、火药爆炸、锅炉和受压容器爆炸）、触电、中毒（瓦斯、炮烟、工业毒物中毒）、粉尘、火灾、水淹（井下透水、淹溺、洪水冲淹）、烧烫和坠落（坠崖、落井）。“一灭”，就是要力争消灭死亡事故。安全生产的群众运动，以确保职工能够安全地、健康地进行生产，并必须做到以下几点：","type":"paragraph"},{"text":"一、必须把“十防”切实抓好、抓实、抓彻底，实现“一灭”才有可能。“十防”就是抓住危害职工安全健康的十大关键，采取积极的防止措施，不断地制服一切不安全的因素。各行各业应当抓住各自的关键问题，提出着重防止某些事故的口号，作为具体的行动目标，发动群众针对每一防止要求，订计划、提出措施、鼓干劲、搞高潮，向伤亡事故展开坚决的斗争。根据我省当前情况和以往的经验，要特别注意抓好：（1）抓季节。目前已进入雨季，炎暑季节很快就来到，要特别注意做好防洪、防淹溺、防坍方、防临时建筑物倒塌等工作，并要及早注意做好防暑降温工作，保证在盛暑季节不发生中暑晕倒事故；（2）抓薄弱环节。在新工人刚入厂、工人调换工种后、民工工地、节目和假日前后、生产最紧张时、接近完成任务和收尾工程中，往往是最容易发生事情的薄弱环节。因此，必须特别抓好；（3）抓平时的监督检查工作。把经常检查和大检查结合起来，避免大检查后产生松劲情绪，而让事故回升；（4）抓职工安全生产思想动态。及时了解职工在安全生产方面的思想情况，提高他们的安全生产技术知识，增强他们和事故作斗争的信心和能力。","type":"paragraph"},{"text":"二、紧紧结合技术革新和技术革命运动，从根本上改善劳动条件。技术革新、技术革命运动的飞跃发展，给劳动保护工作造成空前有利的形势。一方面，做好劳动保护工作可以巩固技术革新、技术革命的成果，促进运动更大、更好的发展；另一方面要通过技术革新、技术革命从根本上改变劳动保护工作的面貌。事实证明，每项革新，都大大有利于改善劳动条件，有利于消除影响职工安全和健康的危险因素；都可直接起到避免工伤事故和防止职业病、职业中毒的积极作用，都有利于减少加班加点；更好地安排劳逸结合。但也带来了一些新的问题。如在采用新技术后，工人的安全知识、技术水平和企业的管理水平都一时跟不上，群众所创造的新机器、新工具难免存在一些不安全的缺点等，如不注意就可能发生一些工伤事故。为此，要求做到：（1）各级党委应立即将劳动保护安全技术的革新事项，纳入技术革新、技术革命的整个规划中去。并有计划地改善劳动条件和消灭各种危害职工安全健康的因素，教育和帮助职工注意解决在革新中的安全工作，以防止发生事故。在检查、总结、评比技术革新、技术革命运动时，也要同时抓住安全；（2）对于群众的创造和革新，必须以满腔的热情去欢迎和支持。同时在各处企业中应成立安全技术鉴定小组，对新机器、新工具、新工艺等，进行认真的安全技术鉴定工作，以便帮助群众在有安全保证的条件下来加以采用和推广。并帮助车间或工段，根据新的工艺过程制订或修订新的操作规程，防止可能发生的工伤事故；（3）加强对职工的安全技术教育，提高职工的安全生产知识和技术水平，及时推广先进经验。通过以上工作，使技术革新、技术革命和安全生产运动成为一个统一的整体。","type":"paragraph"},{"text":"三、为了使“十防一灭”运动顺利地开展，迅速扭转当前伤亡事故的严重局面，要求各厂矿企业党委立即结合大战红五月和“六大”群众运动，在五月分内开展一次群众性的安全生产大检查。大检查不仅是一个查思想、查设备、查措施、查制度的群众运动，也是一个广大领导干部和群众提高思想认识，进行安全生产的自我教育的群众运动，是动员广大群众造成“十防一灭”运动高潮的重要方法。因此，必须采取群众检查（下缺）","type":"paragraph"}],"comments":[],"origin":"贵州省某档案馆","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"09573d4167"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
