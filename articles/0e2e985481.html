art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"向毛主席表示赞成废除旧的升学制度打碎的决不仅是一种考试制度；打碎的是几千年来套在人民脖子上的文化桎梏，打碎的是产生精神贵族和高薪阶层的温床，打碎的是产生现代修正主义的阶石？","authors":[],"parts":[{"type":"paragraph","text":"新华社十七日讯 北京市第四中学高三（五）班革命学生给毛主席的一封信，以及北京市第四中学全体革命师生为废除旧的升学制度给全市师生的倡议书。全文如下："},{"type":"paragraph","text":"敬爱的毛主席："},{"type":"paragraph","text":"我们看了女一中同学给您的信，我们非常赞成她们的观点。经过讨论，我们又补充了几点意见。这些意见在全校广播后，得到了全体革命师生的热烈响应，并一致决定，将它做为向全市师生的倡议。"},{"type":"paragraph","text":"我们给您抄送一份，我们热切盼望您给我们指示。"},{"type":"paragraph","text":"祝您"},{"type":"paragraph","text":"万寿无疆"},{"type":"paragraph","text":"北京市第四中学高三（五）班革命同学"},{"type":"paragraph","text":"一九六六年六月十一日"}],"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0e2e985481"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
