" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"鹰厦铁路死伤民工一千多人","authors":["刘葵华"],"dates":[{"year":1956,"month":6,"day":6}],"is_range_date":false,"parts":[{"text":"鹰厦铁路死伤民工一千多人","type":"title"},{"text":"刘葵华","type":"authors"},{"text":"新华社福州6日讯：据福建省支前委员会调查，从今年1月至4月，修建鹰厦铁路的民工因工伤事故而死亡的已达四十一人，重伤一百三十七人，轻伤一千三百多人。","type":"paragraph"},{"text":"造成伤亡事故的主要原因是：领导施工的干部对安全生产重视不够，在各个施工环节中缺乏对民工进行安全教育。今年前四个月工伤死亡的四十一人中，有三十八人因安全施工常识不足，在爆破、开挖土石方和搬运等施工活动中死亡的。","type":"paragraph"},{"text":"来源：根据1956年6月6日新华社《内部参考》。","type":"paragraph"}],"comments":[],"origin":"美国图书馆收藏","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bd289d78d4"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
