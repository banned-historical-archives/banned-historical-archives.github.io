art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"华国锋主席会见日本公明党第五次访华团","authors":[],"parts":[{"type":"paragraph","text":"华主席对日本朋友说，“竹入义胜委员长是我们的老朋友，为中日友好和恢复中日邦交做出了宝贵贡献。对竹入义胜委员长等许多老朋友，我们是时常记在心里的。”竹入义胜委员长首先对毛泽东主席、周恩来总理、朱德委员长的逝世再次表示哀悼。他说，“同时，我们对继续执行和发展毛主席制定的路线和政策的华国锋主席表示祝贺。”廖承志、韩念龙等参加了会见。"},{"type":"paragraph","text":"新华社一九七七年一月二十二日讯 中共中央主席、国务院总理华国锋今天下午会见了日本公明党委员长竹入义胜和以他为团长的日本公明党第五次访华团。"},{"type":"paragraph","text":"参加会见的访华团团员有正木良明、大久保直彦、石田幸四郎、市川雄一、土师进。"},{"type":"paragraph","text":"会见时，华主席同竹入义胜委员长和其他日本朋友一一亲切握手，对他们前来我国进行友好访问表示热烈欢迎。华主席同日本朋友进行了热情友好的谈话。华主席说，“竹入义胜委员长是我们的老朋友，为中日友好和恢复中日邦交做出了宝贵贡献。对竹入义胜委员长等许多老朋友，我们是时常记在心里的。”竹入义胜委员长在谈话中首先对毛泽东主席、周恩来总理、朱德委员长的逝世再次表示哀悼。他说，“同时，我们对继续执行和发展毛主席制定的路线和政策的华国锋主席表示祝贺。”竹入义胜委员长表示决心将为促进中日友好事业而继续努力。"},{"type":"paragraph","text":"中日友协会长廖承志，外交部副部长韩念龙等参加了会见。"},{"type":"paragraph","text":"华国锋主席同日本公明党第五次访华团合影。"},{"type":"paragraph","text":"新华社记者摄（照片）"}],"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"华国锋","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"廖承志","type":"人物"},{"name":"朱德","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"566ec08188"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
