":1959,"month":8,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"上海文艺出版社副总编辑　李信"},{"type":"paragraph","text":"党的八届八中全会的召开，是我国人民当前政治生活中的一件大事；会议的文献，也是具有伟大历史意义的，每一句话，每一个字，莫不令人欢欣鼓舞!"},{"type":"paragraph","text":"党的中央全会，以高度的马列主义原则，本着实事求是精神，适当调整了今年钢、煤、粮、棉生产的指标，并十分明确响亮地提出“三个提前”的号召，真是振奋人心。适当地调整四大指标，是为了使我国的伟大社会主义建设事业，更好地按比例、有计划的发展。因此，认真学习八中全会的文件，将使我们受到一次极为生动极为深刻的马列主义的教育。"},{"type":"paragraph","text":"调整后的指标，仍是大跃进的指标。只要全党全民同心日德，举国上下团结一致共同努力，就一定能保证与超额完成。那时，我国国民经济将达到一个新的更高的水平。因此，任何以为调整后的指标比原定指标有所降低，从而产生右倾松劲思想，都是极端错误的。我们必须发挥冲天干劲，立即投入全民性的增产节约运动；必须向当前业已产生的某些右倾保守思想作坚决斗争。并以此实际行动来彻底贯彻党的伟大的总路线，来回击国际帝国主义者和国内少数反动分子对我们神圣事业的诽谤与叫嚣。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fc49ec92e7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
