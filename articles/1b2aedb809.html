script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"毛主席最新指示鼓舞工人阶级排除万难去争取胜利  上钢三厂战胜高温夺得持续高产","authors":[],"dates":[{"year":1968,"month":9,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席最新指示鼓舞工人阶级排除万难去争取胜利"},{"type":"paragraph","text":"上钢三厂战胜高温夺得持续高产"},{"type":"paragraph","text":"新华社上海一日电  在伟大领袖毛主席一系列最新指示的巨大鼓舞下，上海第三钢铁厂广大革命职工以高昂的革命精神战胜高温，夺得了生产大发展。最近以来，全厂主要产品的日产量增长了百分之三十到百分之五十，其中转炉钢、电炉钢和铸钢件的日产量，都有大幅度的增长。在这同时，他们还胜利完成了十几种新产品的试制任务。"},{"type":"paragraph","text":"六、七、八月份是高温季节，给钢铁厂生产带来很大困难。按照过去的常规，在高温季节，无论产量、质量都要降低。经过两年多无产阶级文化大革命风暴锻炼的钢铁工人，决心打破旧的常规，狠抓革命，猛促生产。他们提出，今年的高温季节，不能象往年那样，光抓生活安排和防暑降温，不抓突出无产阶级政治；今年必须首先要抓毛主席最新指示的学习，抓阶级斗争，以阶级斗争和两条路线斗争这个纲，来促进钢铁生产的大发展。他们在驻厂解放军的热情支持和帮助下，始终把学习和落实毛主席的一系列最新指示放在一切工作的首位，狠抓阶级斗争和革命大批判，从而极大地振奋了革命精神，战胜了高温季节带来的各种困难，夺得了钢铁的持续高产。"},{"type":"paragraph","text":"上海第三钢铁厂的革命职工遵照毛主席关于打破洋框框，走自己工业发展道路的伟大教导，通过革命的大批判，大破了洋框框和旧规章制度，促进了生产的大发展。按照洋框框和旧框框，这个厂的铸钢车间过去冶炼不锈钢有所谓“五不炼”的规定：星期日不炼，夜班不炼，老炉子不炼，新炉子不炼，技术人员不在场不炼。在无产阶级文化大革命中，这个老框框已经被彻底打破了。这个车间的电炉工人还同革命的技术人员一道，经过反复实践，成功地改革了生产工艺流程，把一只电炉的冶炼时间从三个多小时缩短到一个半小时，为多快好省地生产钢闯出了新路子。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1b2aedb809"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
