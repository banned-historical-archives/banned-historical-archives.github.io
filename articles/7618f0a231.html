ical-archives/banned-historical-archives0/main/maoquanji31.pdf"],"article":{"title":"在中央关于三反中处理科学家、学者的问题的指示稿上加写的话","alias":"","parts":[{"type":"paragraph","text":"对武陟等县关于追赃的几项政策规定的批语"},{"type":"paragraph","text":"（1952年3月9日）此件很好，请各级党委一律照办。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"三月九日"},{"type":"paragraph","text":"[1]指中共平原省委1952年3月4日关于武陟等县正确贯彻政策追交赃物赃款给各地委、市委、县委并报华北局的通报。通报介绍的武陟等县关于追退赃物赃款的几项政策规定是：“现存赃款、赃物，立即交出；不便于立即交出者（如投资尚未结账等），可先交证件；原物已消耗者可登记，开清单，确实挥霍掉者，本人申请，群众评议，听候领导处理。追赃中不准损伤他人（如亲属）财产，更不准封门，停业，不准逼供等。”"}],"authors":["毛泽东"],"dates":[{"year":1952,"month":3,"day":7}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":498,"page_end":498},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7618f0a231"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
