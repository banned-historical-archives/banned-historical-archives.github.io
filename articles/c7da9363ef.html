art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"向邓小平的修正主义路线猛烈开火","authors":["董存瑞生前所在班全体同志"],"parts":[{"type":"paragraph","text":"我们班坚决拥护中共中央关于华国锋同志任中国共产党中央委员会第一副主席、国务院总理的决议和撤销邓小平党内外一切职务的决议。"},{"type":"paragraph","text":"中共中央的决议是声讨邓小平反动罪行的新的动员令。邓小平是个什么人物？我们这些在文化大革命中成长起来的红卫兵小将，最近学习毛主席的重要指示，更加清楚地认识到：邓小平从来不是一个马克思主义者，进入社会主义革命阶段以后，他由一个资产阶级的民主派变成一个走资本主义道路的当权派。新中国成立以后，他伙同刘少奇推行反革命的修正主义路线；文化大革命初期，他和刘少奇一起镇压革命群众，推行资产阶级反动路线。无产阶级文化大革命的急风暴雨，摧毁了刘少奇的资产阶级司令部。邓小平经过群众批判，他表示愿意悔改，“永不翻案”，但风头一过，他竟以“还乡团”自居，公然要翻文化大革命的案，算文化大革命的账，带头煽起右倾翻案风。在毛主席亲自发动和领导的反击右倾翻案风的伟大斗争中，邓小平拒不接受毛主席、党中央和广大革命群众对他的批判教育，自绝于党和人民。对于他的反动罪行，我们一定要彻底揭发，彻底批判。"},{"type":"paragraph","text":"在夺取政权、建立无产阶级专政的战斗中，老班长董存瑞舍身炸碉堡，用鲜血和生命为部队开辟胜利的通道；今天在巩固无产阶级专政的战斗中，我们要象董存瑞那样英勇作战，向邓小平反革命的修正主义路线猛烈开火，为巩固无产阶级专政而斗争。"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c7da9363ef"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
