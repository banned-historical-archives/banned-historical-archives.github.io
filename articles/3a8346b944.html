tart":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"《毛泽东论林业》（新编本）出版等二则","authors":["姚润丰/贝骁"],"parts":[{"type":"paragraph","text":"《毛泽东论林业》（新编本）出版"},{"type":"paragraph","text":"据新华社北京12月18日电（记者姚润丰）为纪念毛泽东同志诞辰110周年，中共中央文献研究室、国家林业局共同编辑的《毛泽东论林业》（新编本）一书近日出版发行。"},{"type":"paragraph","text":"这本书是在原林业部1993年编辑出版的《毛泽东论林业》摘编本的基础上增补、修订而成的。全书共收入自1919年至1967年间毛泽东关于林业问题的文稿58篇，其中包括一些调查报告、文章、讲话、谈话的节录和有关按语、批示、信函等。"},{"type":"paragraph","text":"书中收录的《林业真是一个大事业》《要真正绿化》《要使祖国的河山全部绿化起来》《公路河流两旁要植树》等11篇文稿为首次公开发表。"},{"type":"paragraph","text":"《领袖家风》大型展览在京开幕"},{"type":"paragraph","text":"本报北京12月18日讯记者贝骁报道：一张照片记录一段风云际会的历史，一件文物诉说一个感人至深的故事。今天上午，以毛泽东家庭生活为主线的大型专题展览《领袖家风》在中国人民革命军事博物馆隆重开幕，首都各界人士300多人参加开幕式并参观了展览。"},{"type":"paragraph","text":"《领袖家风》大型展览主要从毛泽东与子女、亲属、故旧的关系这一侧面，展示他作为人民领袖以天下为己任，立党为公、执政为民，全心全意为人民服务的崇高精神风范，和作为生活中的普通人，敬重师长、挚爱亲友、怀念故土的美好情感。"},{"type":"paragraph","text":"此次展出了240多幅历史图片和60多件物品。出席开幕式的毛泽东女儿李敏对记者说：“父亲对我们的要求向来十分严格，要我们永远保持艰苦朴素的作风。勤俭节约、艰苦奋斗就是我们家的家风。”毛泽东的卫士长李银桥等数十位在毛主席身边工作过的同志，在参观展览时见物忆旧，更是感慨万千。许多前来参观的观众怀着崇敬的心情走过一排排展柜，觉得此次展览给人以“可亲、可敬、可学”的感觉，表示要继承和发扬优良传统，努力为全面建设小康社会做贡献。"},{"type":"paragraph","text":"《领袖家风》大型专题展览由中国延安精神研究会、中央文献研究室第一编研部、北京市委宣传部、韶山毛泽东纪念馆等单位共同举办。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3a8346b944"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
