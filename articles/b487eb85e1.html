art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"做毛泽东思想的宣传员有线电连热情帮助社员学习毛主席著作","authors":["王果雄/黄景春/张峻"],"parts":[{"type":"paragraph","text":"本报讯 3136部队有线电连在野营中，热情帮助公社社员学习毛主席著作。"},{"type":"paragraph","text":"连队所在的生产大队经过社会主义教育，学习毛主席著作的人越来越多。为了帮助大队更好地开展学习活动，战士们送去了一百五十多本毛主席著作单行本，并帮助他们建立了阅览室。副指导员向大队团支部介绍了本连开展学习毛主席著作的经验，建议他们根据社员居住情况，组成了五个学习小组。社员集体学习时，副指导员带了学习骨干去参加，进行具体辅导。连里的学习积极分子，还向社员们介绍了活学活用毛主席著作的体会，启发大家更好地联系实际进行学习。"},{"type":"paragraph","text":"战士们热心宣传毛泽东思想，更加鼓舞了社员的学习积极性。在劳动中，他们把毛主席著作带在身边，一到休息时间就围在一起阅读。每天晚上，大队“青年之家”更是挤满了学习的人群。 （王果雄、黄景春）"},{"type":"paragraph","text":"三二九八部队坦克六连，在紧张训练中组织大家学习毛主席著作。图为他们在毛主席《井冈山的斗争》一文发表三十五周年的时候，在训练场上举行学习报告会。张峻摄"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b487eb85e1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
