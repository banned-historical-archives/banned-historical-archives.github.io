r":1980,"month":5,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"邓副总理会见美国佐治亚州长"},{"type":"paragraph","text":"新华社北京五月二十二日电  国务院副总理邓小平今天上午在这里会见了美国佐治亚州州长乔治·巴斯比和由他率领的贸易代表团。"},{"type":"paragraph","text":"去年邓小平访美时曾访问了佐治亚州的首府亚特兰大。"},{"type":"paragraph","text":"邓小平在同美国朋友友好交谈时说，我们正在进行四化建设，努力摆脱过去的落后状态。只要扎扎实实做工作，我们就有希望。"},{"type":"paragraph","text":"巴斯比州长一行十四人，其中有佐治亚州工商局的负责官员，以及有色金属、纺织机械、空间通讯、电力、家禽、旅游等方面的企业家。"},{"type":"paragraph","text":"会见时，巴斯比表示希望要进一步发展佐治亚州同中国的贸易和技术交流，并向邓小平赠送了一本记录他访问亚特兰大时的照相册。"},{"type":"paragraph","text":"外交学会会长郝德青，美国驻中国大使馆临时代办芮效俭等参加了会见。（附图片）"},{"type":"paragraph","text":"图为邓副总理同乔治·巴斯比州长握手。新华社记者摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2c203577ad"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
