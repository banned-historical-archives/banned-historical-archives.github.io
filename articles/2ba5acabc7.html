tes":[{"year":1985,"month":2,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社南宁二月十日电　在“文化大革命”中肆意屠杀党政领导干部和无辜群众的犯罪分子胥明德，逍遥法外十多年后，昨天在广西壮族自治区临桂县被依法处决。"},{"type":"paragraph","text":"胥明德原籍四川省綦江县人，捕前系四川省重庆二商技校綦江分校校长。“文化大革命”前在广西壮族自治区临桂县党校任辅导员。“文化大革命”期间，造反夺权，担任临桂县某造反组织的副总指挥，并以“群众代表”身分任县革委会委员。一九六八年六月至九月，胥明德在临桂县策划、指挥和亲手杀害干部群众七十七人。其中被杀害的干部有县委副书记、副县长、县法院院长、县检察院副检察长、民政科长等十三名县、区级干部。胥明德杀人手段极为残忍，民愤极大。这个血债累累、被群众叫做“杀人魔王”的罪犯，为了逃避惩罚，于一九七一年九月，以照顾父母为由回原籍綦江县工作，在档案中没有记载一点劣迹。胥明德善于钻营，伪装积极，到綦江县不久就担任綦江县搬运站党支部副书记、后又担任重庆二商技校綦江分校校长。"},{"type":"paragraph","text":"在广西临桂县的干部群众强烈要求下，胥明德逍遥法外十多年后终于被逮捕归案。桂林地区中级人民法院依法宣判其死刑。广西壮族自治区高级人民法院审核后下达了处决的命令。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"四川文革","type":"人物"},{"name":"重庆文革","type":"人物"},{"name":"广西文革","type":"人物"},{"name":"夺权","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2ba5acabc7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
