year":1978,"month":3,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京三月十七日电　出席全国科学大会的代表，今天前往毛主席纪念堂，瞻仰伟大领袖和导师毛主席遗容。"},{"type":"paragraph","text":"在全国科学大会即将胜利召开的时候，代表们更加絔怀伟大领袖毛主席的丰功伟绩。从清晨到傍晚，他们一批又一批地来到毛主席纪念堂，在毛主席塑像前肃立默哀，然后进入瞻仰大厅，怀着无比崇敬的心情，瞻仰我们党、我们军队、我们国家的缔造者毛泽东主席的遗容。他们一致表示，一定要开好这次大会，更高地举起毛泽东思想的伟大旗帜，紧跟英明领袖华主席为首的党中央进行新的长征，为在本世纪内把我国建设成为现代化的社会主义强国而努力奋斗。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]},{"id":"jfjb","name":"解放军报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"dates":[{"year":1978,"month":3,"day":18}],"page_start":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"出席全国科学大会的代表瞻仰毛主席遗容","authors":[],"parts":[{"type":"paragraph","text":"新华社三月十七日讯 出席全国科学大会的代表，今天前往毛主席纪念堂，瞻仰伟大领袖和导师毛主席遗容。"},{"type":"paragraph","text":"在全国科学大会即将胜利召开的时候，代表们更加缅怀伟大领袖毛主席的丰功伟绩，从清晨到傍晚，他们一批又一批地来到毛主席纪念堂，在毛主席塑像前肃立默哀，然后进入瞻仰大厅，怀着无比崇敬的心情，瞻仰我们党、我们军队、我们国家的缔造者毛泽东主席的遗容。他们一致表示，一定要开好这次大会，更高地举起毛泽东思想的伟大旗帜，紧跟英明领袖华主席为首的党中央进行新的长征，为在本世纪内把我国建设成为现代化的社会主义强国而努力奋斗。"},{"type":"paragraph","text":"参加全国科学大会的代表们来到毛主席纪念堂，瞻仰了毛主席遗容。 新华社记者摄（照片）"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b5e53e4229"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
