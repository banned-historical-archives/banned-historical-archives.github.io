art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"“好；好；毛泽东领导的中国好！”","authors":[],"parts":[{"type":"paragraph","text":"去年十一月八日，中国民族歌舞团结束了对智利瓦尔帕来索的访问，经圣地亚哥乘火车南去，沿途见到不少的铁路工人在辛勤劳动。当他们得知是来自北京的中国民族歌舞团时，立刻不约而同地放下了铁锹向演员们热情地欢呼挥手。途中，列车在一小站停靠，演员们被一群造纸工人包围了起来，其中的一个约摸四十岁左右，迫不及待地问翻译：“你们是来自北京的吗？”当他得到了肯定的回答时，脸上立即泛起了满意的微笑，同时伸出大拇指连声说：“好，好，毛泽东领导的中国好！”于是，在小小的月台上顿时出现了一个盛情洋溢的动人场面，有的向中国演员表示他曾读过中国画报，有的则忙于告诉他自己的名字和地址。车轮向前滚动了，月台上响起了一片掌声和欢呼声。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"43726a44d1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
