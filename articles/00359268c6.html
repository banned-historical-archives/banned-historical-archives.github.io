" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji23","name":"毛泽东全集第23卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji23.pdf"],"article":{"title":"我车对将介右企图在胶东抽兵的对策","alias":"","parts":[{"type":"paragraph","text":"我军对蒋介石企图在胶东抽兵的对策"},{"type":"paragraph","text":"（1947年8月25日）饶、黎川，并告陈、粟，刘、邓："},{"type":"paragraph","text":"敬亥电悉。蒋介石似乎判断我主力必守胶东，企图以四五个师向胶东进攻，吸引我主力进入内线后，即在青岛、平度、掖县线建筑坚固工事加以封锁，以两个师左右守备该线，然后以三四个师向东攻击。彼似希望此计迅速成功，以便抽出两三个师用于他处。目前彼在临沂以北使用了二十个旅，与向大别山对付刘邓之兵力约略相等，而在鲁西南对付陈粟之兵力则甚薄弱，在陕北对付彭习之兵力，自三十六师被歼后已甚感不足（仅有七个机动旅），在豫西对付我陈赓之兵力则完全没有。在此情况下，蒋介石必在胶东方面力求速决，以便抽兵。因此，我们完全同意你们以一部位于内线，"},{"type":"paragraph","text":"[1]饶、黎，指饶漱石、黎玉，当时分别任华东军区政治委员和副政治委员。"},{"type":"paragraph","text":"[2]陈、粟，指陈毅、粟裕，当时分别任华东野战军司令员兼政治委员和副司令员。刘、邓，指刘伯承、邓小平，当时分别任晋冀鲁豫野战军司令员和政治委员。"},{"type":"paragraph","text":"[3]彭习，指彭德怀、习仲勋，当时分别任西北野战军司令员兼政治委员和副政治委员。"},{"type":"paragraph","text":"[4]陈，当时任晋冀鲁豫野战军陈谢集团前委书记。以主力（二、七、九纵）位于外线，以利持久之方针。只要许谭率三个纵队位于外线（诸城一带），寻机打一二个小胜仗（不打无把握之仗)，敌即不敢向胶东深入，胶东大部至少一部即可保全。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"未有申7美）"},{"type":"paragraph","text":"随在使北神付款金力包强柔"},{"type":"paragraph","text":"T子"},{"type":"paragraph","text":"纯信正"},{"type":"paragraph","text":"金落必四"},{"type":"paragraph","text":"2百灯山对付而在鲁西南对付冻毛泽东起草的《我军对蒋介石企图在胶东抽兵的对策》的手稿。"},{"type":"paragraph","text":"[1]许谭，指许世友、谭震林，当时分别任华东野战军东兵团司令员和政治委员。"}],"authors":["毛泽东"],"dates":[{"year":1947,"month":8,"day":25}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":228,"page_end":229},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"00359268c6"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
