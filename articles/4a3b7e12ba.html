ical-archives/banned-historical-archives0/main/maoquanji51.pdf"],"article":{"title":"对中共九届二中全会公报稿的批语","alias":"","parts":[{"type":"paragraph","text":"对中共九届二中全会公报稿的批语！"},{"type":"paragraph","text":"（1970年9月6日）第三页去掉完全二字。其余无意见。"},{"type":"paragraph","text":"[1]这个批语写在周恩来等1970年9月6日为送审中共九届二中全会公报稿给毛泽东的报告上。周恩来等在报告中写道：“十一时后，约集各大组长、副组长，传达了主席指示的主要精神：加强团结，共同对敌，拥军爱民，读几本书，各做自我批评，严守党纪军纪。”“午后，各大组一致通过公报草案和基本通过宪法修改草案和一九七○年国民经济计划。”“现将公报草案呈上，请予审批。”公报稿第三页写道：“正如毛主席指出的：“新的世界大战的危险依然存在，各国人民必须有所准备。但是，当前世界的主要倾向是革命。”几个月来，国际形势的发展，完全证明了毛主席的这个科学论断。”毛泽东审阅时，删去了最后一句中“完全”二字。中共九届二中全会公报于9月6日通过，9月10日在《人民日报》发表。"}],"authors":["毛泽东"],"dates":[{"year":1970,"month":9,"day":6}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":86,"page_end":86},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"世界形势","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4a3b7e12ba"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
