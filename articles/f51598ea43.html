ical-archives/banned-historical-archives0/main/maoquanji28.pdf"],"article":{"title":"给李淑一的信","alias":"","parts":[{"type":"paragraph","text":"给李淑一\"的信"},{"type":"paragraph","text":"（1950年4月18日）淑一同志："},{"type":"paragraph","text":"来信收到。直荀牺牲，抚孤成立，艰苦备尝，极为佩慰。学习马列主义，可于工作之暇为之，不必远道来京，即可达到自的。肖午亭两位老先生前气为致候。顺颂健康！"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一九五○年四月十八日[1]李淑一，柳直荀的夫人。当时在湖南长沙福湘女中做教员。"},{"type":"paragraph","text":"[2]直荀，即柳直荀，早年同毛泽东相识。曾任湖南省农民协会秘书长、中国工农红军第二军团政治部主任、中共鄂西分特委书记。1932年牺牲。"},{"type":"paragraph","text":"[3]肖，即李肖，李淑一之父。午亭，即柳午亭，柳直萄之父。"}],"authors":["毛泽东"],"dates":[{"year":1950,"month":4,"day":18}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":290,"page_end":290},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f51598ea43"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
