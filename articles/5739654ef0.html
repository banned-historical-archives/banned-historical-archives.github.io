"authors":[],"dates":[{"year":1950,"month":5,"day":30}],"is_range_date":false,"parts":[{"text":"东北五常农民余粮卖不出影响生产","type":"title"},{"text":"（东北日报5月30日讯）目前东北农村存在如下两个问题：（一）农民余粮卖不出去。据说五常县仅合作社就存有3、4百万斤粮食卖不出去。有两个朝鲜人村子存稻子5、6十万斤，大米1斤6千元还卖不出去。农民说：“发展生产发展生产，现在生产这点就卖不出去，再生产更无法了。”（二）副业产品价格太贱，现在哈尔滨鸡子1200元一个，农村更贱，对副业生产是一个打击。","type":"paragraph"}],"comments":[],"origin":"新华社《内部参考》1950年6月15日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5739654ef0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
