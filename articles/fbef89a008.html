script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"美国经济危机迹象越来越明显  美国资产阶级报刊十分忧虑","authors":[],"dates":[{"year":1954,"month":1,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"美国经济危机迹象越来越明显"},{"type":"paragraph","text":"美国资产阶级报刊十分忧虑"},{"type":"paragraph","text":"据新华社讯：美国八十三届国会第二期会议将讨论美国政府的经济政策。为此，美国报纸越来越多地谈论美国经济危机的威胁，这种危机的迹象最近是表现得越来越明显了。"},{"type":"paragraph","text":"“纽约时报”评论员菲利普斯写道：国会是在这种情况下开会的：国民经济正遭遇着一九四九年以来最厉害的一次“自然调整”，它的影响在今后几个月内将更为厉害。"},{"type":"paragraph","text":"近来，美国报纸不断刊载关于美国经济危机现象加剧的言论。许多报纸特别忧虑的是美国企业活动的衰落，例如存货增加，重工业部门生产减少以及失业人数增加等等。根据官方材料，仅在一九五三年十二月一个月，美国失业人数就增加了四十二万两千人。各报指出，美国统治集团某些人士目前大吹大擂地预言美国经济的“繁荣”，是企图掩饰美国经济衰落的事实。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fbef89a008"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
