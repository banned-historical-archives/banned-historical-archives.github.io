script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"卡翁达总统发表讲话强调  摆脱外国剥削　实现经济独立  指出加强经济独立是为了巩固政治独立和国家安全","authors":[],"dates":[{"year":1972,"month":1,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"卡翁达总统发表讲话强调"},{"type":"paragraph","text":"摆脱外国剥削　实现经济独立"},{"type":"paragraph","text":"指出加强经济独立是为了巩固政治独立和国家安全"},{"type":"paragraph","text":"新华社卢萨卡一九七二年一月十二日电　赞比亚总统卡翁达一月十二日在赞比亚国民议会第四次会议开幕式上发表讲话，强调赞比亚决心摆脱外国剥削，争取经济上的独立。"},{"type":"paragraph","text":"卡翁达总统说：“必须把加强我们的经济独立看作也是为了巩固我们的政治独立和国家安全。”"},{"type":"paragraph","text":"卡翁达总统回顾了七年来赞比亚国民经济各个方面所取得的成就。他说：“尽管存在着一些问题，第一个国家发展计划规定的政府的目标在很大程度上完成了。”他说，赞比亚已经建立起新的制造工业。关于农业方面的成就，他说：“去年全国获得丰收，出售的玉米达到四百四十万包（每包九十公斤）。棉花生产从一九七○年的七百万公斤增加到一九七一年的一千一百九十万公斤。”"},{"type":"paragraph","text":"卡翁达说：“赞比亚曾经立志要从外国统治下获得政治独立。这一点，我们已经通过团结和坚决的行动实现了。今天，赞比亚立志要从外国剥削下取得经济独立。这是我们决心要获得的，这也是一九六八年以来我们整个经济改革计划的目标。”"},{"type":"paragraph","text":"他表示支持南部非洲被压迫人民的斗争。卡翁达总统说：“赞比亚可从世界事务中汲取很多教训。最重要的是，赞比亚不能只依靠联合国来保证自己的安全，而首先是要依靠自己。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c68d312f08"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
