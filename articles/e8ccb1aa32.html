”给杨尚昆的信","authors":[],"dates":[{"year":1959,"month":7,"day":13}],"is_range_date":false,"parts":[{"text":"毛泽东关于起草“庐山会议诸问题的议定纪录”给杨尚昆的信","type":"title"},{"text":"尚昆同志：","type":"appellation"},{"text":"五人起草小组，建议增加陆定一、谭震林、陶鲁笳、李锐、曾希圣、周小舟六同志，成为十一人小组，先议两天，七月十三、十四即今、明两天议事。十四夜印出交我及各组同志每人一份。十五日下午到我处开大区区长会议，议修改意见，修改第一次，夜付印。十六日印交所有同志阅读，会谈，修改缺点。十一人小组起草文件(名曰“庐山会议诸问题的议定纪录”)。你们在几天内一定要做苦工，不可开神仙会。全文不超过五千字。","type":"paragraph"},{"text":"此信收到，今天上下立即开会动手实行。请少奇、恩来二同志到会，看此信，请他们二人加以考虑，是否同意。如果同意的话，立即施行。","type":"paragraph"},{"text":" 毛泽东七月十三日上午五时","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e8ccb1aa32"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
