script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"日中友协（正统）总部发行的《日本和中国》周刊　赞扬我解放军医务工作者的先进事迹　指出治好小儿麻痹后遗症是毛主席无产阶级医疗卫生路线的胜利","authors":[],"dates":[{"year":1970,"month":2,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"日中友协（正统）总部发行的《日本和中国》周刊"},{"type":"paragraph","text":"赞扬我解放军医务工作者的先进事迹"},{"type":"paragraph","text":"指出治好小儿麻痹后遗症是毛主席无产阶级医疗卫生路线的胜利"},{"type":"paragraph","text":"新华社六日讯　东京消息：日中友协（正统）总部发行的一期《日本和中国》周刊上，在《为人民服务的解放军治好小儿麻痹后遗症》的标题下，刊登了一组介绍中国人民解放军医务工作者在毛主席无产阶级医疗卫生路线指引下，成功地医治好小儿麻痹后遗症的先进事迹的照片，并加上了编者的按语。"},{"type":"paragraph","text":"编者按语热情地赞扬了中国人民解放军的医务工作人员，努力学习毛主席著作，把人民的疾苦当作自己的疾苦，通过艰苦努力，攻克小儿麻痹后遗症这个顽固堡垒的生动事迹。"},{"type":"paragraph","text":"编者按语指出，因患小儿麻痹后遗症而十年不能走路的孩子，仅仅经过半年的治疗便能自由地行走和跳跃，这在从前不可想象的事，而今天在中国的确实现了。"},{"type":"paragraph","text":"按语说，被各国医学“权威”判定为“不治之症”的小儿麻痹后遗症，不是靠“高明”的医生，而是由中国人民解放军的普通医务工作者治疗成功了，这是为什么呢？是医务工作人员解决了为什么人服务的问题，是无产阶级医疗路线与资产阶级医疗路线斗争的一个胜利。"},{"type":"paragraph","text":"按语说，中国人民解放军医务工作者治好小儿麻痹后遗症的先进事迹，充分证明了毛主席无产阶级医疗卫生路线的巨大威力。（附图片）"},{"type":"paragraph","text":"在阿尔及利亚工作的中国医务人员，遵照伟大领袖毛主席的教导，全心全意地为阿尔及利亚广大劳动人民服务。他们不怕苦，不怕累，经常到撒哈拉大沙漠牧区巡回医疗，深受当地牧民的欢迎。　新华社记者摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1e65cf66db"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
