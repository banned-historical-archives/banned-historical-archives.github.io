:1954,"month":9,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席接见罗政府代表团"},{"type":"paragraph","text":"【新华社二十五日讯】我中央人民政府毛泽东主席二十五日下午四时接见了应邀来我国参加建国五周年国庆典礼的罗马尼亚人民共和国政府代表团团长、罗马尼亚工人党中央政治局委员、书记处第一书记格·阿波斯托尔，团员：罗马尼亚人民共和国国民议会主席团主席彼·格罗查博士，外交部第一副部长格·普利奥蒂亚萨，作家、国家奖金获得者尤·卡米拉，作家依·维特奈。"},{"type":"paragraph","text":"接见时在座的，有中央人民政府副主席刘少奇、宋庆龄，政务院总理兼外交部部长周恩来，政务院副总理董必武、陈云、邓小平。"},{"type":"paragraph","text":"接见时，罗马尼亚人民共和国驻我国大使郭佐文也在座。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4707c03295"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
