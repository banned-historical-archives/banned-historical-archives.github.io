script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji9-1","name":"毛泽东全集第9卷(1)","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji9-1.pdf"],"article":{"title":"致彭德怀等电","alias":"","parts":[{"type":"paragraph","text":"致彭德怀等电！"},{"type":"paragraph","text":"（1936年10月30日）"},{"type":"paragraph","text":"蒋介石以我军大部西渡，东岸所余不多，令胡宗南猛追。胡令周祥初、孔令恂两师向打拉池急进。关麟征师向靖远追击，毛炳文、王均部尾其后，似不会全部北进。何柱国令一骑兵师随胡军右翼相机追击。据以上情况，给我们打周、孔两师的极好机会。对周、孔右翼的骑兵师须以红二方面军有力部队拦阻之。红三十一军必须照彭令，由西向东打。"},{"type":"paragraph","text":"打拉池、西安州为我军尔后宁夏战役之屏障，万不可失，深望注意。"},{"type":"paragraph","text":"[1]这是毛泽东和周恩来致彭德怀、贺龙、任弼时、左权、聂荣臻、徐海东、程子华并告朱德、张国焘电的主要内容。"}],"authors":["毛泽东"],"dates":[{"year":1936,"month":10,"day":30}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":271,"page_end":271},"tags":[{"name":"毛泽东","type":"人物"},{"name":"彭德怀","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6f4a7cb230"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
