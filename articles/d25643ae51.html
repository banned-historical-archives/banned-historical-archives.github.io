ical-archives/banned-historical-archives0/main/maoquanji46.pdf"],"article":{"title":"对美国《锤与钢新闻通讯》一篇文章的批语","alias":"","parts":[{"type":"paragraph","text":"对美国《钝与钢新闻通讯》"},{"type":"paragraph","text":"一篇文章的批语!"},{"type":"paragraph","text":"（1964年5月28日）"},{"type":"paragraph","text":"陈伯达?同志阅。这是一篇好文章，用简单的语言，说清楚了一个大问题。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"五月廿八日"},{"type":"paragraph","text":"[1]这个批语写在1964年5月27日《参考消息》登载的文章摘要《号召击败美国对南越的侵略，并揭露赫鲁晓夫和美共领导的两面手法》旁边。这篇摘要摘自美国《锤与钢新闻通讯》1964年4月份发表的一篇文章。文章说，赫鲁晓夫叛徒集团言不由衷地要求美国军队撤出南越，但他们同时又称赞约翰逊总统是爱好和平和合乎情理的。这种两面派的政策是说明修正主义投降行径的又一个例子。美国共产党领导附和赫鲁晓夫的路线。他们一方面假装同情受到侵略的人，一方面又称赞约翰逊政府。"},{"type":"paragraph","text":"[2]陈伯达，当时任中共中央政治局候补委员、中央政治研究室主任、毛泽东的秘书。"}],"authors":["毛泽东"],"dates":[{"year":1964,"month":5,"day":28}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":373,"page_end":373},"tags":[{"name":"陈伯达","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d25643ae51"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
