ical-archives/banned-historical-archives0/main/maoquanji44.pdf"],"article":{"title":"对中央关于认真进行调查工作问题的指示信的修改","alias":"","parts":[{"type":"paragraph","text":"对中央关于认真进行调香工作"},{"type":"paragraph","text":"问题的指示信的修改"},{"type":"paragraph","text":"（1961年3月23日）"},{"type":"paragraph","text":"中共中央关于认真进行调查工作问题给各中央局，各省、市、区党委的一封信。"},{"type":"paragraph","text":"请发至地方县级，军队团级，城市发至区级及大工厂党委，大学党委，大报党委。"},{"type":"paragraph","text":"[1]中共中央关于认真进行调查研究工作的指示信是由中央书记处候补书记、毛泽东的秘书胡乔木起草的。本篇一是毛泽东为这一指示信加写的标题；本篇二是毛泽东为指示信确定的印发范围；本篇三是对指示信中一段话的修改，其中用宋体字排印的是毛泽东加写和改写的文字。毛泽东还将指示信的日期署为“1961年3月23日”。当天，中共中央即下发了这一指示。毛泽东全集第四十四卷"},{"type":"paragraph","text":"三"},{"type":"paragraph","text":"中央认为，最近几年的建设成就是伟大的，证明总路线、大跃进、人民公社的方向是正确的。但是在农业、工业等方面的具体工作中，也发生了一些缺点错误，造成了一些损失。这些缺点错误之所以发生，根本上是由于许多领导人员放松了在抗日战争期间和解放战争期间进行得很有成效的调查研究工作，满足于看纸上的报告，听口头的汇报，下去的时候也是走马看花，不求甚解，并且在一段时间内，根据一些不符合实际的或者片面性的材料作出一些判断和决定。在这段时间内，夸夸其谈，以感想代政策的恶劣作风，又有了抬头。这是一个主要的教训，全党各级领导同志决不可忽略和忘记这个付出了代价的教训。"}],"authors":["毛泽东"],"dates":[{"year":1961,"month":3,"day":23}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":233,"page_end":234},"tags":[{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"66f07d77e7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
