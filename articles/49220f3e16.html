art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"罗共“九大”选出新的领导机构齐奥塞斯库当选为中央委员会总书记","authors":[],"parts":[{"type":"paragraph","text":"据新华社布加勒斯特二十四日电 历时六天的罗马尼亚共产党第九次全国代表大会今天上午在共和国宫胜利闭幕。"},{"type":"paragraph","text":"由邓小平率领的中国共产党代表团出席了闭幕式。当齐奥塞斯库等罗共中央领导人陪同邓小平以及其他国家的共产党和工人党代表团团长出现在主席台上时，全场起立，长时间地热烈鼓掌并高呼：“乌拉！”"},{"type":"paragraph","text":"在今天的闭幕式上宣布了在二十三日下午选举党中央委员会和中央检查委员会的结果。大会新选出的中央委员会由一百二十一名委员和七十五名候补委员组成；中央检查委员会由二十三名委员组成。"},{"type":"paragraph","text":"据宣布，新选出的中央委员会已于二十三日举行了第一次全体会议，选举尼古拉·齐奥塞斯库为中央委员会总书记。会议并选出由十五名委员和十名候补委员组成的中央执行委员会，由七人组成的中央委员会常设主席团，以及由八人组成的中央书记处和由九人组成的中央监察委员会。"},{"type":"paragraph","text":"中央委员会常设主席团的成员是：尼古拉·齐奥塞斯库、基伏·斯托伊卡、扬·格奥尔基·毛雷尔、格奥尔基·阿波斯托尔、亚历山德鲁·伯尔拉德亚努、埃米尔·波德纳拉希、亚历山德鲁·德勒吉奇。"},{"type":"paragraph","text":"康斯坦丁·帕伏列斯库当选为中央检查委员会主席，杜米特鲁·柯柳当选为中央监察委员会主席。"},{"type":"paragraph","text":"全场不断热烈鼓掌欢迎新选出的罗共中央领导机构的成员。"},{"type":"paragraph","text":"大会一致通过了声援越南人民反美正义斗争的决议。"},{"type":"paragraph","text":"齐奥塞斯库在会上致了闭幕词。他向参加这次代表大会和向大会致以兄弟的祝贺的各国共产党和工人党代表们以及一些国家的民主党派表示热烈的感谢。RW：齐奥塞斯库；罗马尼亚中央委员会书记"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"49220f3e16"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
