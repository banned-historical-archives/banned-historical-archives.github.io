tart":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"《毛泽东思想研究系统》在京演示刘华清张震迟浩田张万年于永波傅全有等出席观看","authors":["特约/李欣周广翔"],"parts":[{"type":"paragraph","text":"本报北京12月16日讯 特约通讯员李欣、周广翔报道：为纪念毛泽东诞辰100周年，今天，中共中央政治局常委、中央军委副主席刘华清，中央军委副主席张震，在北京观看了《毛泽东思想研究系统》微机汇报演示。"},{"type":"paragraph","text":"刘华清、张震对研究这一系统的课题组成员说，很高兴观看演示，研究系统搞得很好，你们做了一件好事，对学习毛泽东思想很有帮助。"},{"type":"paragraph","text":"国防部长迟浩田、总参谋长张万年、总政治部主任于永波、总后勤部部长傅全有及三总部其他领导一同观看汇报演示。"},{"type":"paragraph","text":"总后勤部政委、研究系统总主编周克玉向军委领导介绍了研制情况。"},{"type":"paragraph","text":"《毛泽东思想研究系统》是根据总后勤部1992年6月下达的科研课题，由后勤指挥学院杨少俊研究员带领4名课题组成员经过一年奋斗，研制成功的智能软件系统。该系统在国内外第一次将计算机技术引入毛泽东思想研究领域，是富有学术价值与应用价值的开拓性课题。它开发出的“任意查询”、“原著查询”、“框图表示”等一整套基于人工智能原理的多层次知识表达技术，改变了人文科学、社会科学繁杂费时的传统研究方法，从而丰富和发展了传统的大型文献索引技术。经国家级鉴定，该项科研成果达到国内领先水平，并填补了我国在该领域的研究空白，为广大读者和专家学者学习、运用、研究毛泽东思想提供了快速高效的现代化手段。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f88fe24227"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
