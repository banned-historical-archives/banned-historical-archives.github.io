<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"毛主席故居——延安枣园村","authors":["程予"],"dates":[{"year":1952,"month":9,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社记者　程予"},{"type":"paragraph","text":"在延安城北有一片茂盛的果木林子，这就是六年前毛主席居住的地方——延安枣园村。"},{"type":"paragraph","text":"不久以前，记者去访问该村时，全村四十多个男女农民正在打扫毛主席的卧室和办公室。打扫完毕后，他们便围在院子里和记者畅谈起来。他们兴奋地追叙着和毛主席相处的幸福的日子:每年过春节，毛主席总是把枣园全村的人都请去吃饭，关怀地询问大家是不是达到了“耕三余一”(种三年地余一年的粮食)，生活提高了多少。那时候枣园全村有二十五户，一共七十多个人。全村耕地面积九百多亩，每亩地平均收粮食一百零五斤。家家都养了牲畜和家禽，平均每家有一头半牛、四只羊、两条猪和十多集鸡，生活过得挺美满。他们告诉毛主席:全村春节时杀了十八条猪。毛主席问道:“明年春节能不能每家杀一条猪呢?”大家毫不犹豫地说:“能!”毛主席笑起来了。"},{"type":"paragraph","text":"一九四七年的春天，胡宗南匪军侵占了延安。那时，匪徒们把村里的粮食抢光，牲畜杀光，门窗家俱烧光，全村百分之八十以上的耕地都长起一人高的蒿草，第二年春天，胡匪被打败逃走以后，全村只剩下从外面带回来的八条牛、二十只羊、几口小锅、几把镢头和破犁。但是，枣园村的人民并没有在困难前面低头，他们在当地中国共产党组织的领导下，提出了“团结互助战胜困难，恢复毛主席在这里的好光景!”的口号。他们在废墟上开始了春耕。村里的牛犋差得很远，可是没有人争先用牛，大家先让几户革命烈士家属、革命军人家属和有牛户变工。全村的人轮替着使用镢头翻地和种地。人民政府贷放的款子，解决了种籽的困难。全村的人民忘我地进行着劳动。这一年全村虽然只种了四百多亩川地。但是收成很好，每亩地平均收一百七十五斤粮食。秋收后，大家才开始修整门窗，添置农具和日用家俱。"},{"type":"paragraph","text":"一九五零年全村已完全恢复了战前的耕地面积。一九五一年全村就停止开荒，转入积粪施肥、精耕细作和田间选种，以提高单位面积的产量。全村的家禽也恢复到战前的数目!胡匪侵占时，村里共产党员秦纪恩的老婆保存下一只母鸡——那是枣园乡十六个村中惟一的一只母鸡，它和胡匪逃走时从汽车上飞进村来的一只公鸡养在一起，那年夏天就孵出三十多只小鸡:秦纪恩的老婆就把这些小鸡无代价地分给了全乡人民，现在全乡已有一千多只鸡了:"},{"type":"paragraph","text":"今年；枣园村的农民实行了多锄、多犁、多施肥的办法，开展了爱国增产竞赛运动。现在，栗园村已有四十三户人家，耕地一千二百多亩，每亩产量平均已超过战前二十一斤。全村百分之九十以上的劳动力参加了互助组。他们正在修复毛主席在这里修建的水渠，明年便可以把四百多亩川地变为水田。"},{"type":"paragraph","text":"从去年春季开始，枣园村人民自动规定了每月打扫毛主席故居次的制度，把毛主席住过的房屋收拾得非常整洁。常记者辞别枣园的时候，人们殷切地嘱咐着:“请你告诉毛主席，枣园人民永远想念着他!”　【新华社】"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3b4bfdb7d9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
