script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"“消费城”开始作划时代的转变大上海走上俭朴之路!畸形繁荣一扫而空　全体市民生活方式逐渐在改变　剥削阶级享乐的场所门庭冷落　各种奢侈品也无人问津了","authors":[],"dates":[{"year":1949,"month":8,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　上海——这全国最大的消费城市，过去是帝国主义和官僚资本主义剥削，搜括中国人民的大本营，洋人，官僚，豪门及其走狗聚集一处，造成了它的畸形繁荣，解放后由于所有废物均已一扫而空，而全体市民的生活方式也在逐渐改变，所以过去那些专供剥削阶级任意挥霍的场所，均已门可罗雀，各种各样的奢侈物品也已无人问津，整个城市正由奢侈淫靡逐步转化为质朴健康。"},{"type":"paragraph","text":"英商惠罗公司，过去是奢侈品大本营，全部物品中奢侈品占百分之八十，解放后营业一落千丈，上周劳资双方代表举行了一次座谈会，决定改变营业方针，把顾客对象转变为一般市民，实行产销合作，并把已无人过问的古玩部取消。"},{"type":"paragraph","text":"南京路四大公司、最近正举行大减价、并以“摸彩赠奖”来招徕顾客，但各公司专售奢侈品的部门营业仍毫无起色，尤其如珠宝部，钻戒，翡翠，玉器，固已无人过问，购买银器的顾客也难得看见，钟表部价值较高的如汉弥登表，现值在三十万以上，解放后很少卖出。化装品单就永安公司一家来说，过去最贵重香水如法国货“圣诞之夜二小瓶，售价须黄金一两，最近因无人过问，早已搁到仓库里去了，二等货如‘卡龙’、‘密箩’、‘密丝佛佗’……过去售价每瓶约合白米二石，目下只售五万余元，价钱虽廉，仍然无人问津，过去他们每月可出售‘克脱’香粉三打，现在每月只能售出半打。”"},{"type":"paragraph","text":"全市最高贵的西服店培罗蒙解放后营业一蹶不振，目下最考究的英制呢绒，售价每码在四十万(8月2日2版更正为““四万””)以上，不是贪官污吏或投机奸商那一个穿得起?况且上海人已经改变“只见衣衫不见人”的恶劣观念，所以经劳资双方协商后，改变营业方针，现在已改售实用品了。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"61e13c09f0"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
