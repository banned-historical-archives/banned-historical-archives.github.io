thors":[],"dates":[{"year":1967,"month":4,"day":29}],"is_range_date":false,"parts":[{"text":"中共中央关于纪念“五一”国际劳动节标语口号","type":"title"},{"text":"1.庆祝“五一”国际劳动节！","type":"paragraph"},{"text":"2.全世界无产者联合起来！全世界无产者同被压迫人民、被压迫民族联合起来！","type":"paragraph"},{"text":"3.打倒以美国为首的帝国主义！","type":"paragraph"},{"text":"4.打倒以苏修领导集团为中心的现代修正主义！","type":"paragraph"},{"text":"5.坚决支持越南人民的抗美救国战争！","type":"paragraph"},{"text":"6.坚决支持各国人民的革命斗争！","type":"paragraph"},{"text":"7.无产阶级专政万岁！","type":"paragraph"},{"text":"8.无产阶级文化大革命的全面胜利万岁！","type":"paragraph"},{"text":"9.以毛主席为代表的无产阶级革命路线胜利万岁！","type":"paragraph"},{"text":"10.彻底粉碎资产阶级反动路线！","type":"paragraph"},{"text":"11.彻底批判党内最大的走资本主义道路当权派！","type":"paragraph"},{"text":"12.无产阶级革命派联合起来，向党内一小撮走资本主义道路当权派夺权！","type":"paragraph"},{"text":"13.在毛泽东思想的伟大旗帜下，实现无产阶级革命派的大联合，实现革命的三结合！","type":"paragraph"},{"text":"14.坚决响应毛主席拥军爱民的伟大号召！","type":"paragraph"},{"text":"15.向伟大的中国人民解放军学习！","type":"paragraph"},{"text":"16.坚决响应毛主席“抓革命、促生产”的伟大号召，夺取革命生产双胜利！","type":"paragraph"},{"text":"17.把活学活用毛主席著作的群众运动推向新高潮！","type":"paragraph"},{"text":"18.高举毛泽东思想伟大红旗，把无产阶级文化大革命进行到底！","type":"paragraph"},{"text":"19.伟大的中国共产党万岁！","type":"paragraph"},{"text":"20.马克思列宁主义、毛泽东思想万岁！","type":"paragraph"},{"text":"21.我们的伟大领袖毛主席万岁！","type":"paragraph"},{"text":" 中共中央一九六七年四月二十九日","type":"paragraph"}],"comments":[],"origin":"根据文件的群众组织翻印件，翻印者未注明","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1fad6f3cbd"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
