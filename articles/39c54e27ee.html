题的报告的批语","authors":[],"dates":[{"year":1959,"month":6,"day":11}],"is_range_date":false,"parts":[{"text":"毛泽东对上海市委关于副食品、日用工业品问题的报告的批语","type":"title"},{"text":"尚昆：","type":"appellation"},{"text":"本日看到上海市委六月六日关于副食品、日用工业品两大问题的情况分析和处理意见，我认为是一个很好很好的文件。(一)请你即刻通知常委(不通知小平、陈云)在京各同志(共五人)，富春、一波、先念、陈毅、德怀、克诚、子恢、廖鲁言、叶季壮、姚依林、程子华、王震、邓洁、贾拓夫、宋平、余建亭、宋劭文、彭真、李雪峰、刘仁、天津万晓塘、河北林铁、陆定一、康生、胡乔木、陈伯达、杨尚昆、吴冷西、李锐、王稼祥，共计36\u003c35\u003e人，请他〔们〕立即阅读上海这个文件。未发给的，请你立即发送。限于六月十二日上午十二时以前读完，并且想一想，同自己的秘书及一二个同事谈一谈。以便六月十二日下午召集他们到会，由我主持。(二)请你告李先念同志，叫他在两日内替中央写一个发给各省、市、区党委并告中央各部、国务院各党组、党委，军委各部，工、青、妇各党组〔的指示〕，附上上海这个文件，转发他们，一律仿照执行。此转文写好先给我看一下。此信，你办完后，送刘、周、林、彭、彭、先念、陈毅六\u003c七\u003e同志一阅，然后存你处。","type":"paragraph"},{"text":"Good  morning!","type":"paragraph"},{"text":" 毛泽东六月十一日上午七时，倚枕书。","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"陈毅","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"39c54e27ee"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
