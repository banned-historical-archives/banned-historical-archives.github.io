rt":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"把毛泽东思想运用于日本革命实践","authors":[],"parts":[{"type":"paragraph","text":"新华社三十一日讯 东京消息：日本《毛泽东思想月刊》杂志社负责人小室刚在中国人民的伟大领袖毛主席《支持日本人民反美爱国正义斗争的谈话》发表六周年的时候，发表谈话指出，毛主席发表这篇光辉的谈话后，日本人民的反美爱国正义斗争出现了新的高潮，毛主席的谈话鼓舞着日本人民的反美斗争。"},{"type":"paragraph","text":"小室谴责日本反动派加紧勾结美帝镇压亚洲人民革命斗争的阴谋活动。小室指出，亚洲已经不是过去的亚洲，日本人民也不是过去的日本人民。日本人民一定会团结起来，同亚洲人民结成广泛的反美统一战线，同美日反动派进行斗争。"},{"type":"paragraph","text":"小室表示要深刻领会毛主席谈话的意义，把毛泽东思想运用到日本革命实践中去。"},{"type":"paragraph","text":"小室最后高呼：“战无不胜的毛泽东思想万岁！”"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"69e3b7c1d3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
