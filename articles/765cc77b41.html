tart":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"用毛泽东思想统帅生活管理五连从实战需要出发开展野炊训练","authors":[],"parts":[{"type":"paragraph","text":"五连有的干部认为，生活管理是事务性工作，他们怕别人说不突出政治而不敢大胆去抓。党支部针对这种活思想，组织学习了毛主席关于“抓革命，促生产，促工作，促战备”的教导，和林副主席关于“没有抽象的政治，为国家为人民办事就是政治，保卫国家就是政治，以毛泽东思想为指针搞好军事工作就是彻头彻尾、彻里彻外的政治”的指示。通过学习，大家认识到，衡量一个人是不是突出无产阶级政治，就看他是不是以政治思想统帅各项工作。以无产阶级政治为统帅去抓各项工作，抓得再多也是突出政治的；反过来，抓得再少也是不突出政治的。他们还结合部队的光辉战例，大谈抓好生活管理的重要性，大论生活管理搞不好的危害性，使大家进一步懂得：我军打仗历来靠政治，靠勇敢，但是对军事技术、战斗作风、生活管理等各方面因素，也不能放弃。放弃任何一方面都不行。抓好生活管理是战备的需要，必须抓好。"},{"type":"paragraph","text":"五连干部统一认识后，就用毛泽东思想统帅生活管理，狠抓在各种条件下的炊事训练。党支部对炊事班进行了深入的教育，使他们用战备的观点观察一切，检查一切，落实一切，组织他们学习林副主席指示：部队训练要设想各种情况，要想到最复杂最困难的情况，多练几手。平时养成一切都很顺利的观念，打起仗来就不会有充分的思想准备，就打不好。炊事班的同志们，为了保证在最困难的条件下完成任务，从难、从严、从实战需要出发开展野炊训练。过去在野营中挖炊灶，往往选择土质好、有坡有坎的地形，现在他们在土质差的地方，在各种地形上训练，反复摸索，反复实践，熟练地掌握了各种复杂条件下挖灶的本领，并且练会了挖各种不易暴露目标的散烟灶。"},{"type":"paragraph","text":"经过反复训练，炊事班野炊做饭又快又好，深受同志们赞扬。战士们说：“我们有战无不胜的毛泽东思想，有熟练的军事技术，有过硬的战斗作风，再加上生活管理的充分准备，我们就更有把握、更有力量歼灭一切来犯的敌人。”"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"765cc77b41"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
