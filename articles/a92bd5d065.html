ical-archives/banned-historical-archives0/main/maoquanji34.pdf"],"article":{"title":"关于游泳池建造费由稿费中支出给刘少奇等的信","alias":"","parts":[{"type":"paragraph","text":"关于游泳池建造费由稿费中支出给刘少奇等的信"},{"type":"paragraph","text":"（1954年4月25日）刘、陈、邓、罗瑞卿、尚昆、汪东兴诸同志："},{"type":"paragraph","text":"江青此信请阅。为补救计，建造费五亿由我的稿费中支出，游泳池封闭不用。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一九五四年四月廿五日"},{"type":"paragraph","text":"[1]刘，指刘少奇。陈，指陈云，当时任中共中央书记处书记、政务院副总理兼财政经济委员会主任。邓，指邓小平，当时任政务院副总理兼财政部部长。罗瑞卿，当时任政务院政治法律委员会副主任兼公安部部长。尚昆，即杨尚昆，当时任中共中央办公厅主任。汪东兴，当时任中共中央办公厅警卫局局长。"},{"type":"paragraph","text":"[2]指江青1954年4月20日给毛泽东的信。信中对她擅自提议给毛泽东修建游泳池一事作了检讨。"},{"type":"paragraph","text":"[3]这里是以当时流通的人民币计算的，按中国人民银行1955年3月1日起发行的新人民币折算，合5万元（新币1元等于旧币1万元）。"}],"authors":["毛泽东"],"dates":[{"year":1954,"month":4,"day":25}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":78,"page_end":78},"tags":[{"name":"江青","type":"人物"},{"name":"汪东兴","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"罗瑞卿","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a92bd5d065"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
