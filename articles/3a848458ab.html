script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"在毛主席的革命路线指引下，组织教师参加学工学农  培养理论联系实际的学风","authors":["云南腾冲县第一中学革命委员会"],"dates":[{"year":1971,"month":4,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"在毛主席的革命路线指引下，组织教师参加学工学农"},{"type":"paragraph","text":"培养理论联系实际的学风"},{"type":"paragraph","text":"云南腾冲县第一中学革命委员会"},{"type":"paragraph","text":"在伟大领袖毛主席的《五·七指示》的指引下，我校革命教师通过学工学农，开始改变“三脱离”现象。但是，在一些课程的教学中，理论和实际仍然不能很好结合。"},{"type":"paragraph","text":"为什么教师接触了实际，教学还是与实际脱节？我们作了些调查。发现有的教师长期脱离实际，现在虽然开始接触了实际，但不知教学如何联系实际；个别教师缺乏甘当小学生的精神，在接触实际中，没有虚心向工农群众学习。造成这种情况的根本原因是，旧教育制度的恶劣影响，教师长期“三脱离”，思想还没有根本转变过来。“不破不立”，我们组织教师活学活用毛主席著作，深入批判叛徒、内奸、工贼刘少奇的反革命修正主义教育路线。大家提高了路线斗争觉悟，认识到：第一，理论脱离实际，是与辩证唯物论的认识论根本对立的，是反马克思主义、列宁主义、毛泽东思想的；第二，教学脱离实际，只能把学生培养成为书呆子，不可能很好地为社会主义革命和社会主义建设服务；第三，知识分子在尖锐的阶级斗争中“一遇风浪就会左右摇摆”的劣根性，也是与理论脱离实际分不开的。在革命大批判中，我们又抓住典型事例，引导教师把教学脱离实际的问题提高到改造世界观的高度来认识。这样，促进了教师虚心向工农学习，认真向实际学习，逐渐培养理论联系实际的革命学风，推动了教育革命。"},{"type":"paragraph","text":"例如，学校办灯泡复制厂时，学校派了两位教师到有关工厂学习。他们认为工人师傅焊接排气管，进行灯泡封口，技术简单，没有虚心向工人学习。工厂办起来后，他们动手操作，玻璃壳不是在焊接排气管时破掉，就是在封口时炸裂，灯泡一个又一个地报废。经过革命大批判，他们认识到自己的傲慢自大、轻视实践的资产阶级思想，是失败的根本原因。以后，他们认真向工人学习，总结了一些经验，继续指导实践，接管和封口时玻璃壳破裂很少，教学质量也有了显著的提高。如过去讲火焰，只讲它的特性，不讲它的应用，学生学了用不上；现在结合复制灯泡，不但讲火焰特性，而且讲它的应用，学生就学到了比较完全的知识。"},{"type":"paragraph","text":"毛主席指出：“我国绝大部分的知识分子是愿意进步的，愿意改造的，是可以改造的。”广大教师在正确路线指引下，虚心向工农学习，向实际学习，努力改造旧思想，在教学中重视理论和实际相结合，受到工人和贫下中农的欢迎。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"革命委员会","type":"主题/事件"},{"name":"教育革命","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3a848458ab"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
