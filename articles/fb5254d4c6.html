ical-archives/banned-historical-archives0/main/maoquanji30.pdf"],"article":{"title":"致邓子恢电","alias":"","parts":[{"type":"paragraph","text":"致邓子恢电"},{"type":"paragraph","text":"（1951年9月24日、25日）子恢同志："},{"type":"paragraph","text":"如果可能的话，希望你偕同小平贺龙同志一道早日来京。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"九月廿四日"},{"type":"paragraph","text":"二子恢同志："},{"type":"paragraph","text":"九月二十五日电悉。（一）向你的病故的老母致哀悼之意；[1]邓子恢，当时任中共中央中南局第三书记。"},{"type":"paragraph","text":"[2]小平，即邓小平，当时任中共中央西南局第一书记。贺龙，当时任中共中央西南局第三书记。"},{"type":"paragraph","text":"[3]邓子恢1951年9月25日给毛泽东的电报中说：“我昨夜始回汉，因要了解一些工作情况，又因家母前日病故，要主持丧事，故拟于过国庆节后去京。可否，请示。”毛泽东全集第三十卷（二）同意你于过国庆节后来京，如能于十月三日到京则甚好。"},{"type":"paragraph","text":"毛泽东九月二十五日二十四时"}],"authors":["毛泽东"],"dates":[{"year":1951,"month":9,"day":24},{"year":1951,"month":9,"day":25}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":503,"page_end":504},"tags":[{"name":"贺龙","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fb5254d4c6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
