s":[{"year":1938,"month":7,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"前鱼市场稽查科稽查员方学文草拟“鱼程刍议”、贡献“督署”甘作傀儡爪牙、并名方仁德，得任“鱼税征收所”所长，设总所于东沟、并在东昌栈设立分所、方接办后、非但横徵暴敛，且任意勒索，惟悬挂洋旗之外商鱼船、亦不能幸免，后经各国驻沪领事提出交涉、亦无结果，因之方更有恃无恐，作威作福、中外鱼商莫不恨之切骨，近闻东沟来人谈、伪“督署”因方劣迹昭彰，故于前数日请求日方派出宪兵多名、在东沟伪总所内，将方捕去、闻者无不为之称快云。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"824a2d995f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
