动坦白的刘绍臣主罚款不判徒刑","authors":[],"dates":[{"year":1952,"month":2,"day":11}],"is_range_date":false,"parts":[{"text":"老舍、乐松生主张处刘元敬极刑　对自动坦白的刘绍臣主罚款不判徒刑","type":"title"},{"text":"【内部参考讯】为了审慎处理大奸商刘元敬案，北京市节约检查委员会主任刘仁特于九日邀请两位“老北京”老舍和乐松生谈话，倾听他们对于这个案件以及其他奸商处理的意见。老舍和乐松生的主要意见是：(一)不杀刘元敬很难平民愤；(二)对自动坦白盗窃国家资财五十亿元的刘绍臣，如果判处徒刑再行缓刑，不如不判徒刑处以罚款。因为前者老百姓不懂，后者老百姓容易了解，收效大。","type":"paragraph"}],"comments":[],"origin":"新华通讯社编《内部参考》1952年2月11日","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"13a6fa1e38"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
