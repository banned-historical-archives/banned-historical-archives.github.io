ical-archives/banned-historical-archives0/main/maoquanji33.pdf"],"article":{"title":"对彭德怀《四年来军事工作总结和今后建军中的若干基本问题（初步定稿）》的批语","alias":"","parts":[{"type":"paragraph","text":"对彭德怀《四年来军事工作总结和今后建军中的若干基本问题"},{"type":"paragraph","text":"（初步定稿）》的批语"},{"type":"paragraph","text":"（1953年11月）可用。略有修改。"},{"type":"paragraph","text":"[1]这是毛泽东对中央人民政府人民革命军事委员会副主席彭德怀为1953年12月召开全国军事系统党的高级干部会议准备的讲话稿的批语。"},{"type":"paragraph","text":"[2]毛泽东对彭德怀《四年来军事工作总结和今后建军中的若干基本问题（初步定稿）》的修改主要有：（一）在标题之下增加了副标题“在一九五三年十二月党的全国军事会议上的报告”和署名“中央人民政府人民革命军事委员会副主席彭德怀”。（二）将原稿中两处“建设我军为世界上第二支最优良的现代化的军队”，改为“建设我军为世界上第二支最优良的现代化的革命军队”。（三）将“在美帝国主义侵略朝鲜民主主义人民共和国，威胁我国东北边境的安全时”，改为“在美帝国主义侵略朝鲜民主主义人民共和国，侵略我国台湾，并使侵朝战争威胁到我国东北边境的安全时”。（四）将“按照毛主席历来的军事方针，就是发挥党委员会集体领导的原则，采取在党委统一（集体）领导下的首长分工负责制”，改为“按照毛主席历来的军事方针，就是根据党委员会集体领导和首长个人负责相结合的原则，采取在党委统一（集体）领导下的首长分工负责制”。将“至于强调个人领导，把个人的权力放在党委集体的权力之上的作法，是错误的”，改为“在有党委制存在的条件下，不适当地过分地强调个人领导，把个人的权力放在党委集体的权力之上的作法，那就是不对的”。"}],"authors":["毛泽东"],"dates":[{"year":1953,"month":11}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":443,"page_end":443},"tags":[{"name":"毛泽东","type":"人物"},{"name":"彭德怀","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"05ff881530"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
