rt":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"党领导一切的原则不容否定","authors":["李建华〖HH/换行〗DW：军事医学科学院二所一室党支部书记"],"parts":[{"type":"paragraph","text":"党内最大的不肯改悔的走资派邓小平授意炮制的《汇报提纲》，疯狂反对党对科技工作的领导，叫嚷要由“科技界所公认的”“第一流”的“权威”来领导。在邓小平看来，科技战线是资产阶级的世袭领地，只能由资产阶级“权威”来领导。这些无耻谰言，激起了我们革命战士满腔怒火。我们要正告邓小平：你这是白日做梦，痴心妄想，办不到！"},{"type":"paragraph","text":"伟大领袖毛主席教导我们：“中国共产党是全中国人民的领导核心。没有这样一个核心，社会主义事业就不能胜利。”“工、农、商、学、兵、政、党这七个方面，党是领导一切的。”我们党几十年斗争的基本理论和基本实践，一再证明，任何工作离开了党的领导，就将一事无成。党必须领导一切，这个马克思主义的重要原则，决不允许无产阶级的叛徒肆意否定。回想无产阶级文化大革命前，在刘少奇伙同邓小平推行的修正主义路线的把持下，科技战线成了资产阶级知识分子独霸的一统天下，他们把所谓“学术委员会”凌驾于党的领导之上，一切都是“专家”、“权威”说了算，结果论文写了一篇又一篇，却与实际不沾边，根本不能为社会主义革命和社会主义建设事业服务。文化大革命以来，我们坚持了党必须领导一切的原则，充分发挥了党支部的战斗堡垒作用，使毛主席的革命路线和科研方针得到了贯彻执行，取得了一批可喜的科研成果，为国防建设作出了贡献。事实使我们认识到，要使毛主席的革命路线得以贯彻，没有党的坚强领导是不行的。"},{"type":"paragraph","text":"邓小平反对党对科技工作的领导，就是妄图从科技界“打开一个大缺口”，取消无产阶级在整个上层建筑领域对资产阶级的全面专政，以达到他复辟资本主义的罪恶目的。我们一定要深入批判邓小平反对党的领导的罪行，坚决捍卫党领导一切的原则，更加自觉地在党的领导下，为共产主义事业而奋斗。"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ac9201e0d6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
