art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"牢牢掌握批邓的大方向","authors":["工程兵某团党委"],"parts":[{"type":"paragraph","text":"党中央的两个英明决议，大长了无产阶级的志气，大灭了资产阶级的威风，沉重地打击了阶级敌人的猖狂进攻，我们坚决拥护。"},{"type":"paragraph","text":"邓小平是新老资产阶级的总代表，他搞右倾翻案，搞复辟倒退，搞反攻倒算，集中代表了资产阶级的利益。制造天安门广场反革命政治事件的坏人，公开打起拥护邓小平的旗号，正说明邓小平是他们的总代表。他们为邓小平歌功颂德，胡说什么“由邓小平主持中央工作，斗争取得了决定性胜利”，“全国人民大快人心”。这是赤裸裸的反革命叫嚣。什么“决定性胜利”？不正是邓小平一上台就煽动右倾翻案风，向无产阶级发动全面进攻，给资产阶级和一切反革命复辟势力撑腰打气，使他们猖狂一时吗？什么“大快人心”？不正是邓小平疯狂推行修正主义路线，大搞复辟倒退，而使他们这些反革命分子欣喜若狂吗？"},{"type":"paragraph","text":"“翻案不得人心。”邓小平的翻案活动遭到亿万革命群众和干部的愤怒批判。阶级斗争的现实，使我们进一步认识到，我们同邓小平的斗争，是一场你死我活的阶级大搏斗。我们必须牢牢掌握斗争的大方向，坚定地站在毛主席革命路线一边，把斗争矛头对准邓小平，彻底批判邓小平妄图通过推行修正主义路线，颠覆无产阶级专政、复辟资本主义的罪行。"},{"type":"paragraph","text":"“人民得到的权利，绝不允许轻易丧失，必须用战斗来保卫。”我们部队曾参加过修建天安门广场和人民大会堂的工程。在施工期间，毛主席、党中央对我们关怀备至，体贴入微，亲切鼓励我们。我们深深地懂得，雄伟的天安门广场，是伟大领袖毛主席检阅革命群众的地方，是伟大社会主义祖国的中心。因而在天安门广场工程施工中，广大指战员精心设计，精心施工，顽强奋战，保质保量地完成了任务，全团指战员受到了敬爱的周总理的亲切接见。在施工期间，全团每个同志都在人民大会堂看过革命样板戏，使我们深受鼓舞。今天，反革命分子竟在天安门广场猖狂地制造反革命事件，还冲击人民大会堂，反革命气焰十分嚣张。我们表示坚决谴责、愤怒声讨。"},{"type":"paragraph","text":"我们决心团结在毛主席为首的党中央周围，以阶级斗争为纲，努力做好各项工作，用实际行动保卫毛主席、保卫党中央，保卫毛主席革命路线，保卫祖国的伟大首都。"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a5138f97aa"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
