script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"资产阶级自由化思潮的四次泛滥","authors":[],"dates":[{"year":1989,"month":11,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"资产阶级自由化思潮的四次泛滥"},{"type":"paragraph","text":"第一次发生在我们党着手进行拨乱反正的过程中。1979年，热衷于搞资产阶级自由化的人把我们党提出的解放思想的正确口号接过去，加以歪曲，打着反对“两个凡是”的幌子反对四项基本原则。"},{"type":"paragraph","text":"这次资产阶级自由化的泛滥，在一定程度上引起了社会秩序的混乱。北京出现了“西单墙”，发生了魏京生反革命事件，北京、上海等地出现了一些非法组织、非法刊物。"},{"type":"paragraph","text":"第二次发生在1983年前后，这时出现了严重的精神污染。少数理论工作者在人道主义、异化等问题上制造思想混乱，他们滥用“异化”的概念，为否定党的领导、否定社会主义制度的社会思潮提供了理论武器。"},{"type":"paragraph","text":"第三次发生在1986年前后，资产阶级自由化思想泛滥和逐步升级。由原来的比较隐蔽、旁敲侧击、影射的形式，发展到公开的、赤裸裸的攻击，由理论探讨发展到上街游行示威；由原来的个别分散的活动发展到互相串联，互相勾结，形成联合之势。出现了方励之、王若望、刘宾雁等一些搞资产阶级自由化的代表人物。"},{"type":"paragraph","text":"由于资产阶级自由化的泛滥，酿成了1986年底、1987年初的全国性学潮。"},{"type":"paragraph","text":"第四次资产阶级自由化泛滥，从1988年下半年开始。搞资产阶级自由化的代表人物，已有了更加明确的目标：即推翻中国共产党领导，推行资本主义私有制。今年春夏，他们挑起了学潮，并酿成动乱和暴乱。"},{"type":"paragraph","text":"（9月28日上海《组织人事报》刘友铸摘）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"name":"上海文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d09ad8f637"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
