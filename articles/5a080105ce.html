tart":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"昨日要闻简报","authors":[],"parts":[{"type":"paragraph","text":"朝鲜大使馆临时代办举行宴会庆祝朝中经济及文化合作协定十周年"},{"type":"paragraph","text":"朝鲜驻中国大使馆临时代协郑凤珪，二十三日晚在北京饭店举行宴会，热烈庆祝朝中经济及文化合作协定签订十周年。党和国家领导人周恩来、朱德、邓小平、彭真、陈毅、李先念、康生、聂荣臻、郭沫若、陈叔通、林枫等应邀出席。宴会始终洋溢着极其亲切的友好气氛。郑凤珪临时代办和陈毅副总理先后在宴会上讲话，热情祝愿中朝两国的友好合作关系不断发展，人民友谊永世长存。"},{"type":"paragraph","text":"我驻朝使馆临时代办举行宴会庆祝中朝经济及文化合作协定十周年"},{"type":"paragraph","text":"中国驻朝鲜大使馆临时代办刘祥纶，二十三日晚上举行宴会，热烈庆祝中朝经济及文化合作协定签订十周年。朝鲜党政领导人金光侠、李周渊、河仰天应邀出席了宴会。刘祥纶和李周渊先后在宴会上讲了话。他们一致指出十年前签订的中朝经济及文化合作协定的巨大意义，赞扬了两国人民在社会主义建设中所取得光辉成就。"},{"type":"paragraph","text":"西哈努克亲王接见我国大使陈叔亮大使把我国政府声明交给柬外交国务秘书"},{"type":"paragraph","text":"柬埔寨国家元首西哈努克亲王二十二日下午接见了中国驻柬埔寨大使陈叔亮。同天上午、陈叔亮大使拜会了柬埔寨外交国务秘书胡森巴，并把我国政府关于支持柬埔寨维护独立和主权、反对外国干涉和侵略的声明交给他。"},{"type":"paragraph","text":"（据新华社讯）"}],"alias":""},"tags":[{"name":"陈毅","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5a080105ce"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
