tart":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"把“四人帮”的流毒打扫干净上海警备区派出工作组检查部队十个“应该不应该”教育情况，推动揭批“四人帮”斗争深入发展","authors":[],"parts":[{"type":"paragraph","text":"本报讯 在贯彻落实党的十一大精神的热潮中，上海警备区党委组织了四十九个工作组，深入连队，对前段部队十个“应该不应该”的教育情况普遍进行了大分析、大检查，总结经验，找出问题，修订措施，决心抓纲抓到底，批判不松劲，用更大气力，把十个“应该不应该”的教育搞深搞细，把“四人帮”的流毒和影响打扫干净。"},{"type":"paragraph","text":"在分析检查中，他们广泛发动群众，组织连队干部战士学习十一大文件，以班为单位开好汇报会，以连为单位开好经验交流会。许多单位采取了抓住重点谈收获，正反对比看进步，典型解剖划界限，对照先进找差距的方法，认真总结连队和个人在十个“应该不应该”教育中的经验体会，对许多问题的认识由感性上升到理性，使同志们受到了一次出动的毛主席建军路线的再教育。对有些教育搞得不深的单位，他们进行了重点帮助。某团三连过去在“四人帮”及其余党马天水等插手下受影响较深，在十个“应该不应该”教育中，有些是非还搞不清，少数干部战士有些“怨气”。在这次分析检查中，连队在工作组的帮助下，抓住揭批“四人帮”这个纲，针对模糊不清的是非问题，深入进行了十个“应该不应该”的教育，进一步看清了“四人帮”对连队的毒害和影响，激发了对“四人帮”的阶级仇恨，较好地分清了路线是非，使连队工作有了新的起色。警备区后勤的三个医院，以往搞教育，由于没有妥善处理工学矛盾，有走过场的现象。这次领导深入动员，亲自备课讲课，和群众一起分析检查，保证了教育时间人员的落实，收效明显。"},{"type":"paragraph","text":"他们在大分析大检查中，针对有些单位抓机关和干部不如抓连队和战士那样认真的问题，注重抓了领导机关和干部，普遍以团为单位，用不少于三天的时间，进行了检查和教育，使领导机关和干部首先把路线是非界限搞清楚。"},{"type":"paragraph","text":"在分析检查中，他们贯彻了正面教育的原则，大力宣扬成绩，表彰先进，使领导和群众看到了十个“应该不应该”教育的巨大作用，有力地促进了部队十个“应该不应该”教育的深入发展。"}],"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"name":"上海文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c1a8a39d2d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
