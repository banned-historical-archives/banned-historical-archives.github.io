script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"树立革命的办学风气四川高等学校决定彻底批判盲目追求现代化、讲排场、讲阔气等资产阶级思想作风","authors":[],"dates":[{"year":1958,"month":1,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【据新华社成都16日电】　四川23所高等学校的校院长最近研究了贯彻勤俭办学方针问题，认为必须发动群众，反对浪费，树立起用革命办法办学的风气。"},{"type":"paragraph","text":"据校院长们反映，各校普遍存在机构庞大、层次过多、人浮于事的现象。据各校计划，一般可以紧缩和下放教职工30%左右，四川财经学院和四川农学院可以达到39%。四川大学在最近下放了250多名教职员，学校工作并未受到影响。许多校院长建议高等教育部恢复教师工作量制度，并根据不同性质的学校规定人员编制比例。"},{"type":"paragraph","text":"仪器、图书等教学设备方面，积压、浪费现象也相当严重。仅据成都工学院、四川师范学院等三个学院检查，积压和浪费的设备就在41万元以上。有的学校甚至连仪器的性能和用途都不了解就买回来，使用时还得派人到外地学习。"},{"type":"paragraph","text":"校院长们认为，贯彻勤俭办学方针不仅能为国家节约大量人力、物力和建设资金，而且关系着高等学校的社会主义教育方针的正确贯彻，这种人员过多和铺张浪费情况，不仅助长了一些教师脱离实际、脱离群众的思想作风，而且对学生也有不良影响。校院长们认为，只有贯彻勤俭办学方针，彻底扭转这种不良风气，才能培养出具有艰苦朴素作风和社会主义觉悟的国家建设人才。"},{"type":"paragraph","text":"校院长们认为，必须在当前整改中，大力发动教职员工和学生认真揭发一切违反勤俭办学方针的不良现象，深入展开辩论，彻底批判盲目追求现代化、讲排场、讲阔气等资产阶级思想作风，才能在高等学校中树立起艰苦朴素的革命的办学风气。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b66166b394"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
