<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"结合两条路线斗争实际狠批修正主义路线余毒  安徽煤炭工业战线形势大好","authors":[],"dates":[{"year":1971,"month":10,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"结合两条路线斗争实际狠批修正主义路线余毒"},{"type":"paragraph","text":"安徽煤炭工业战线形势大好"},{"type":"paragraph","text":"新华社合肥二十三日电　在毛主席无产阶级革命路线指引下，安徽省煤炭工业战线深入开展“工业学大庆”的群众运动，革命、生产出现一派朝气蓬勃的大好形势。到九月底，全省已超额完成今年前三个季度的国家生产计划，原煤产量比去年同期增长了百分之十二点二二。"},{"type":"paragraph","text":"今年以来，安徽省煤炭工业战线各级领导班子成员，在工业学大庆的群众运动中，认真读马列的书，认真读毛主席的书，结合工业建设中两条路线斗争的实际，狠批刘少奇修正主义路线的余毒。他们联系自己执行毛主席革命路线的情况，找本单位与大庆的差距，不断提高学大庆的自觉性。特别是今年八月，中共安徽省委和省革委会在淮南大通煤矿召开了全省工业学大庆的现场会议以后，全省煤炭工业战线立即出现了一个“学大庆，赶大通”的热潮。淮南市各级领导班子在贯彻落实全省工业学大庆现场会议精神时，广泛发动煤炭战线的工人群众，对照大庆的经验，从思想和路线上找本单位的差距，制订出进一步开展“学大庆，赶大通”的措施，推动了工业学大庆运动不断深入发展。"},{"type":"paragraph","text":"大通煤矿广大干部和工人牢记毛主席关于“虚心使人进步，骄傲使人落后”的教导，虚心向兄弟地区和兄弟单位学习，认真对照大庆和其他先进单位的经验，不断改进工作，进一步促进了全矿工业学大庆群众运动的发展。"},{"type":"paragraph","text":"安徽省煤炭工业战线各级党组织和革委会，在带领群众深入开展工业学大庆的群众运动中，认真改变领导作风，坚持深入群众，调查研究，狠抓典型，狠抓薄弱环节。淮北市煤炭工业战线的许多领导成员，经常与工人一起劳动，在生产第一线进行调查研究，发现问题及时解决，因而使煤炭生产稳步上升，到十月上旬，全市各矿已完成全年生产计划的百分之七十八点八，比去年同期增长了百分之二十七点五。前一时期，淮南市的李二矿由于掘进工作跟不上，采煤工作面缩小，影响了生产。矿党委领导成员通过深入第一线进行调查，采取逐步调整采场的方法，把采煤工作面的生产能力由日产一千五百吨提高到一千九百吨，迅速扭转了生产的被动局面。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"安徽文革","type":"人物"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"92db2d5b8f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
