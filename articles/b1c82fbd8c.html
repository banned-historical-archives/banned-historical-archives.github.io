<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"在数学教研室座谈会上的发言","authors":["哈尔滨工业大学","王泽汉"],"dates":[{"year":1957,"month":6,"day":16}],"is_range_date":false,"parts":[{"text":"在数学教研室座谈会上的发言","type":"title"},{"text":"哈尔滨工业大学王泽汉","type":"authors"},{"text":"(王泽汉：九三学社社员、哈尔滨工业大学副教授)","type":"subtitle"},{"text":"他说：我承认共产党领导，没有幻想打垮共产党，希望共产党统治不是二十、三十年，而是一千年一万年。但是共产党能不能统治万年呢？就看他是否能广开言路。从历史上来看，凡是给人民说话的机会，能够广开言路的朝代，就能统治长久。相反的像秦朝那样焚书坑儒，到二世就垮了。","type":"paragraph"},{"text":"他说：现在我们宪法规定的民主是够了，但是实际执行的却不够。首先是言论自由不够，只能说共产党好，不能说共产党坏。其次是出版自由不够，只能出新的，不能出旧的；只能出拥护党的，不能出反对党的。再就是民主人士有职无权。","type":"paragraph"},{"text":"他说：现在我们国家是很强大、很巩固，这是因为有六百万没有腐化、保持优良传统的军队。若是没有这六百万军队，一个晚上就垮了。","type":"paragraph"},{"text":"他说：从人民日报近几天发表的社论来看，是在“收”了。聪明的人，是让老百姓讲话的。枪杆子在共产党手里掌握，叫大家乱说也造不了反。而且绝大多数讲话的人，动机还是好的，既或说的不对也应该让讲。说共产党坏话的人，不等于反革命，反革命还不敢说共产党的坏话呢！像储安平、葛佩琦的意见，他们可以不说，但是，受损失的却是党。葛佩琦不过是乱说，乱说不等于乱动。不让乱说就可能乱动，如果乱动了，就可能发生匈牙利事件。","type":"paragraph"},{"text":"我说：储安平把毛主席比作大和尚，把党员比作小和尚亦是可以的。因为和尚是要到极乐世界去，到极乐世界也就是到共产主义世界去。","type":"paragraph"},{"text":"他说：我不喜欢美国的民主，但是我倒喜欢印度的民主。印度的制度在某些方面可能比我们还好，印度比我们好的地方，我们也应当学习。就是南斯拉夫的制度，有些我们也可以考虑。印度能给反对他们的人一个邦就是很好的，这样两党竞争，可以保持廉洁。所以印度独立之后，发展也不比我们慢，成绩也不比我们小。我不是说我们要抛开社会主义的道路，但我相信在毛主席的领导下，可以建立一个好的中国。","type":"paragraph"},{"text":"他说：国家的一些重要部门，像工业、国防、外交部门等，可以由共产党领导，但是像商业、文教部门就可以放手给非党人士独立干。十二个副总理中也可以有民主人士。（6月23日哈尔滨日报）","type":"paragraph"}],"comments":[],"origin":"《鸣放言论（二）》（哈尔滨：“学习生活”编辑室编，1957年7月10日）。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b1c82fbd8c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
