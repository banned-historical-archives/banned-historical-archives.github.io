":1966,"month":8,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"大立毛泽东思想"},{"type":"paragraph","text":"群情欢腾的天安门广场，"},{"type":"paragraph","text":"像七亿人民欢跳的心脏。"},{"type":"paragraph","text":"敬爱的领袖毛主席呀，"},{"type":"paragraph","text":"我们要永远在您的身旁。"},{"type":"paragraph","text":"东方升起了红太阳，"},{"type":"paragraph","text":"澄清了迷雾放金光。"},{"type":"paragraph","text":"伟大的舵手毛主席，"},{"type":"paragraph","text":"引导着革命航船渡重洋。"},{"type":"paragraph","text":"五洲四海东风浩荡，"},{"type":"paragraph","text":"祖国一派革命景象。"},{"type":"paragraph","text":"无产阶级文化大革命掀起了新高潮，"},{"type":"paragraph","text":"我们豪迈地走在共产主义大道上。"},{"type":"paragraph","text":"十六条字字闪烁着金光，"},{"type":"paragraph","text":"全会公报是行动的总纲。"},{"type":"paragraph","text":"要彻底摧毁旧世界，"},{"type":"paragraph","text":"全国大立毛泽东思想。"},{"type":"paragraph","text":"山在欢呼，海在欢唱，"},{"type":"paragraph","text":"进军的号角多么嘹亮。"},{"type":"paragraph","text":"在大风大浪里锻炼成长，"},{"type":"paragraph","text":"以大智大勇当革命闯将。"},{"type":"paragraph","text":"“敢”字当头，斗志昂扬，"},{"type":"paragraph","text":"自我教育，自我解放。"},{"type":"paragraph","text":"在共产主义的伟大尝试中，"},{"type":"paragraph","text":"把共产主义的风格大发扬。"},{"type":"paragraph","text":"红色的战士用红色的枪，"},{"type":"paragraph","text":"革命的武器是毛泽东思想。"},{"type":"paragraph","text":"铁打的江山要永不变色，"},{"type":"paragraph","text":"一定要把牛鬼蛇神全扫光。"},{"type":"paragraph","text":"光辉灿烂的毛泽东思想，"},{"type":"paragraph","text":"为马列主义增添了崭新的光芒。"},{"type":"paragraph","text":"毛主席的健康是我们最大的幸福，"},{"type":"paragraph","text":"祝福毛主席万寿无疆。"},{"type":"paragraph","text":"北京市京西矿务局医院卫生工  王长秀"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"125b9e0d42"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
