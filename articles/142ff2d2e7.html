校调干毕业生工资问题的答复","authors":[],"dates":[{"year":1968,"month":9,"day":24}],"is_range_date":false,"parts":[{"text":"中华人民共和国劳动部关于1966年、1967年大专院校调干毕业生工资问题的答复","type":"title"},{"text":"河北、山西、内蒙古、辽宁、甘肃、宁夏、上海、江苏、浙江、安徽、山东、江西等省、市、自治区革命委员会：","type":"appellation"},{"text":"自从6月27日国务院发出（68）国发文59号电报后，你们先后来电来文，询问1966年、1967年大专院校调干毕业生的工资问题，是否也按上述文件第四条的精神处理？经与有关部门研究后，现答复如下：","type":"paragraph"},{"text":"1966年、1967年大专院校调干毕业生分配工作以后，一律不重新评定正式工资级别。入学前原有工资低于大专毕业生临时工资的，按临时工资待遇执行；入学前原有工资高于大专毕业生临时工资的，按入学前原工资标准执行。已经重新评定正式工资级别的，应改过来，过去多发的工资可以不退。","type":"paragraph"},{"text":" 中华人民共和国劳动部1968年9月24日","type":"paragraph"}],"comments":[],"origin":"贵州省革命委员会毕业生工作领导小组办公室编印：《大中专毕业生分配工作文件选编》（内部文件、注意保存），1969年4月。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"142ff2d2e7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
