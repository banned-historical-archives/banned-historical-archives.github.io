"dates":[{"year":1967,"month":9,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　在万众欢腾热烈庆祝具有伟大历史意义的中华人民共和国成立十八周年的光辉日子里，毛主席第七、八次检阅文化革命大军的彩色文献纪录片:《毛主席永远和我们心连心》《光辉的榜样伟大的创举》，明日起在本市隆重上映。"},{"type":"paragraph","text":"这两部影片的放映，是全国人民和全上海革命人民的大喜事，是我们最最敬爱的伟大领袖毛主席对广大革命群众的巨大关怀，巨大鼓舞，巨大支持，巨大鞭策!"},{"type":"paragraph","text":"从一九六六年八月十八日至十一月二十六日短短三个多月的时间里，毛主席先后八次接见和检阅了一千一百多万文化革命大军，这是中国革命和国际共产主义运动历史上前所未有的伟大革命创举。《毛主席永远和我们心连心》《光辉的榜样伟大的创举》同毛主席前六次检阅文化革命大军的文献纪录影片一样，是纪录我们的伟大导师、伟大领袖、伟大统帅、伟大舵手毛主席这一伟大革命创举的壮丽史诗。"},{"type":"paragraph","text":"这两部彩色文献影片是由中央新闻纪录电影制片厂、八一电影制片厂联合摄制的。"},{"type":"paragraph","text":"又讯　在中华人民共和国成立十八周年的光辉节日里，本市电影院放映的最近摄制的纪录片，还有《军民团结心连心》、《毛泽东思想的光辉照耀海港》、《热烈欢呼北京市革命委员会诞生》、《工农兵掌握文艺的新时代》、《彻底批判反动影片\u0026lt;不夜城\u0026gt;》、《毛泽东思想阳光照洪泾》、《万里东风扫残云——上海街头革命大字报巡礼》和《文化大革命中的上海》等。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"76e98a0e5c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
