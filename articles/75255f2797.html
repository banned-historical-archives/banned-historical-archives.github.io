锨光人影；休息时到处在朗读毛主席语录","authors":[],"dates":[{"year":1966,"month":10,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"响应毛主席伟大号召  为革命治水"},{"type":"paragraph","text":"三十万劳动大军打响根治海河第二仗"},{"type":"paragraph","text":"劳动时到处是锨光人影；休息时到处在朗读毛主席语录"},{"type":"paragraph","text":"据新华社保定十四日电　河北省又一个根治海河的大工程——子牙新河工程已于十月五日正式开工。这是继去冬今春治理黑龙港流域胜利之后，根治海河的第二个战役。"},{"type":"paragraph","text":"河北各地人民公社广大社员，高举毛泽东思想伟大红旗，踊跃地参加了治河的战斗。现在，来自邯郸、邢台、石家庄、保定、衡水、沧州、天津和唐山八个专区八十七县（市）的三十万治河大军，最坚决最热烈地响应毛主席的“一定要根治海河”的伟大号召，满怀为革命出工、为革命治水的豪情，在天津以南广阔的子牙新河工地上，打响了根治海河的第二仗。"},{"type":"paragraph","text":"无产阶级文化大革命、党的八届十一中全会的公报和十六条，极大地鼓舞了广大社员的革命精神，报名参加治河的空前踊跃。各地报名出工的社员都几倍、几十倍地超过了分配的出工人数，出现了大量的父送子、妻送夫、兄弟争着出工的动人事例。去冬今春参加治理黑龙港的许多积极分子和先进集体，这次又来到了子牙新河工地。"},{"type":"paragraph","text":"三十万劳动大军都是思想好、劳动好、身强力壮的小伙子。他们带着毛主席著作和语录，走到那里，学到那里，宣传到那里，热情地传播毛泽东思想。从子牙河畔献县到渤海边一百多公里的工地上一片红旗招展。劳动时到处是锨光人影，一片劳动欢声；休息时到处都在学习毛主席著作，朗读毛主席语录。三十万劳动大军，决心活学活用毛主席著作，学大寨、学大庆、学解放军，把工地办成毛泽东思想的大学校。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"河北文革","type":"人物"},{"name":"天津文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"75255f2797"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
