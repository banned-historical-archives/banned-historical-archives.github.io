[{"year":1992,"month":12,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反映毛泽东光辉形象"},{"type":"paragraph","text":"大型画册《怀念》出版"},{"type":"paragraph","text":"本报北京12月19日讯　在毛泽东同志诞辰99周年前夕，中央文献出版社隆重推出大型画册《怀念》。"},{"type":"paragraph","text":"该画册由毛泽东的亲属李敏、孔令华主编，分为“革命的家庭”、“温馨的父爱”、“真挚的乡情”、“深切的怀念”四个部分，收入130余幅历史照片，其中有大量从未发表过的珍贵照片。"},{"type":"paragraph","text":"画册通过真实、生动的瞬间影像，使人们从生活、情操等方面，进一步了解一代伟人毛泽东。毛泽东一家那些为中国革命英勇献身的亲人的形象，他对子女严格要求又一往情深的父爱，他对家乡山水和父老乡亲的眷恋，他用松枝祭奠父母时流露的深情缅怀，以及他在畅游江河湖海时的惬意，在填词赋诗欢庆胜利和怀念战友时的情怀，在画册中都有生动的再现。人们将从画册中看到作为儿子、兄长、丈夫、父亲的毛泽东和作为学生、朋友、战友、同窗的毛泽东，一位有着广泛爱好和普通人喜怒哀乐情感的毛泽东。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"69cd672a65"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
