tes":[{"year":1967,"month":1,"day":30}],"is_range_date":false,"parts":[{"text":"上海市委招生广告","type":"title"},{"text":"上海市委现在要招收大批幼儿（年龄不限）。","type":"paragraph"},{"text":"总负责是：陈（丕显）阿姨、曹（荻秋）阿姨。","type":"paragraph"},{"text":"一、条件","type":"paragraph"},{"text":"能随声附和，妖言惑众，会看风使舵，八面玲珑，擅长保皇。","type":"paragraph"},{"text":"二、学习科目","type":"paragraph"},{"text":"1．政治：奴隶主义，忠孝主子，一呼百诺，亦步亦趋，步步紧跟，战场上保命，衙门里保官。","type":"paragraph"},{"text":"2．语文：内外有别。姑息养奸。","type":"paragraph"},{"text":"3．数字：经济主义。","type":"paragraph"},{"text":"4．唱歌：上海市委就是好、大唱“三停”就是好。","type":"paragraph"},{"text":"5．体育：营私舞弊、三风三抢","type":"paragraph"},{"text":"三、毕业条件","type":"paragraph"},{"text":"必须是铁杆保皇，全心全意，不存二心，对陈阿姨、曹阿姨五体投地，为了陈阿姨、曹阿姨鞠躬尽瘁、死而后已。毕业证书由陈阿姨、曹阿姨负责审核再发。","type":"paragraph"},{"text":"报名审核人：陈氏衙门喽罗。","type":"paragraph"},{"text":"驻沪毛泽东思想武汉地区工人造反司令部《星火兵团》原作","type":"appellation"},{"text":"哈尔滨军工学院红色造反团——毛泽东思想红卫兵驻沪联络站 《红色造反报》“招生”战斗组改编 （1967年1月30日）","type":"appellation"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ec4bb5f1d2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
