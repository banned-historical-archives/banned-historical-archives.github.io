r":1963,"month":3,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"塔斯社报道中苏两党交换信件"},{"type":"paragraph","text":"新华社十二日讯　塔斯社莫斯科十一日电：一九六三年二月二十一日，苏共中央委员会曾写信给中共中央委员会，在信中提出了自己关于兄弟党作出共同努力以加强世界共产主义运动的团结的必要性的见解。"},{"type":"paragraph","text":"苏共中央在这封信中重申了尼基塔·赫鲁晓夫在德国统一社会党第六次代表大会上所阐明的苏共关于停止共产党之间的论战的立场，并建议就当前世界共产主义运动的重大问题，举行苏共代表同中共和其他兄弟党代表的双边会谈。"},{"type":"paragraph","text":"前已报道，中国共产党中央委员会主席毛泽东由于这封信在二月二十三日接见了苏联驻中华人民共和国大使契尔沃年科，并同他进行了谈话。"},{"type":"paragraph","text":"三月九日，中共中央总书记邓小平接见了苏联大使并交给他中共中央对苏共中央二月二十一日的信件的复信。"},{"type":"paragraph","text":"在苏联共产党中央委员会和中国共产党中央委员会的信件中，都表示有必要举行苏共和中共代表的双边会谈。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]},{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"塔斯社报道中苏两党交换信件","authors":[],"dates":[{"year":1963,"month":3,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京12日电】　塔斯社莫斯科11日电:1963年2月21日，苏共中央委员会曾写信给中共中央委员会，在信中提出了自己关于兄弟党作出共同努力以加强世界共产主义运动的团结的必要性的见解。"},{"type":"paragraph","text":"苏共中央在这封信中重申了尼基塔·赫鲁晓夫在德国统一社会党第六次代表大会上所阐明的苏共关于停止共产党之间的论战的立场，并建议就当前世界共产主义运动的重大问题，举行苏共代表同中共和其他兄弟党代表的双边会谈。"},{"type":"paragraph","text":"前已报道，中国共产党中央委员会主席毛泽东由于这封信在2月23日接见了苏联驻中华人民共和国大使契尔沃年科，并同他进行了谈话。"},{"type":"paragraph","text":"3月9日，中共中央总书记邓小平接见了苏联大使并交给他中共中央对苏共中央2月21日的信件的复信。"},{"type":"paragraph","text":"在苏联共产党中央委员会和中国共产党中央委员会的信件中，都表示有必要举行苏共和中共代表的双边会谈。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]},{"id":"jfjb","name":"解放军报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"dates":[{"year":1963,"month":3,"day":13}],"page_start":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"塔斯社报道中苏两党交换信件","authors":[],"parts":[{"type":"paragraph","text":"新华社12日讯 塔斯社莫斯科11日电：1963年2月21日，苏共中央委员会曾写信给中共中央委员会，在信中提出了自己关于兄弟党作出共同努力以
