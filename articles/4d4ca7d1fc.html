{"year":1977,"month":9,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京一九七七年九月十八日电　中华人民共和国国务院总理华国锋，九月十八日打电报给尼泊尔王国政府首相基尔提·尼迪·比斯塔，热烈祝贺他就任尼泊尔王国政府首相。电报全文如下:"},{"type":"paragraph","text":"加德满都尼泊尔王国政府首相基尔提·尼迪·比斯塔阁下:"},{"type":"paragraph","text":"在阁下就任尼泊尔王国政府首相的时候，我谨向你表示热烈的祝贺。祝愿尼泊尔政府和人民在维护民族独立、捍卫国家主权和发展民族经济的事业中不断取得新的成就。我深信，中尼两国人民的传统友谊和两国间的友好合作关系将获得进一步的巩固和发展。"},{"type":"paragraph","text":"中华人民共和国国务院总理　华国锋"},{"type":"paragraph","text":"一九七七年九月十八，日于北京"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"华国锋","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4d4ca7d1fc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
