art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"《毛泽东西藏工作文选》出版","authors":["秦杰/李术峰"],"parts":[{"type":"paragraph","text":"据新华社拉萨7月22日电（记者秦杰、李术峰）在隆重庆祝西藏和平解放50周年之际，中共中央文献研究室、中共西藏自治区委员会和中国藏学研究中心合作编辑出版了《毛泽东西藏工作文选》，出版座谈会今天在西藏拉萨举行。全国政协副主席、中共中央统战部部长王兆国出席并讲话。"},{"type":"paragraph","text":"《毛泽东西藏工作文选》共收入毛泽东自1949年8月至1961年1月有关西藏工作的文稿101篇，其中相当多一部分是第一次公开发表。这部文选比较全面地反映了这一时期毛泽东和党中央对西藏工作作出的一系列重大决策和重要指示，多侧面地反映了西藏人民在党的指引和领导下努力建设新西藏的奋斗历程，是学习毛泽东关于西藏工作的思想和党对西藏工作的方针政策的生动教材，是党的第一代领导集体对西藏人民及西藏工作的关怀和重视的生动体现。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"西藏文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8744bd5dac"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
