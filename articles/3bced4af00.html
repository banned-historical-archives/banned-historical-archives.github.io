ithubusercontent.com/banned-historical-archives/banned-historical-archives21/main/60d25bc8-3eea-4ea4-b3cc-3f04e9b8a910/1.jpg"],"article":{"title":"王任重同志在会上也解答了大家提的问题","alias":"","parts":[{"type":"paragraph","text":"王任重同志在会上也解答了大家提的问题"},{"type":"paragraph","text":"因为团中央还没有，不能答复。团粗织怎么办？"},{"type":"paragraph","text":"有人罪大恶极的黑帮分子不打不过瘾，他三关于文斗武斗："},{"type":"paragraph","text":"们怕的就是打。我看怕的不是打，怕的是揭露他们的罪恶，在政治上斗臭斗垮，文斗才能提高识，要活学活用毛主席著作，摆事实道理。罪大恶极的，公安部门可以处理。我们反对逼供信，因为过去犯过错。清华提出打活老虎不打死老虎，斗争时叫他耕话，我们同意。只要事实俱在，不承也是黑帮。大大放大才能眞正把敌人斗倒、斗臭、斗垮，我们要开动脑筋，不用拳头，才能打倒他们。"},{"type":"paragraph","text":"半工半读学生是否搞运动搞，有的生产任务重，要生产，出去三金"},{"type":"paragraph","text":"要安排好，革命生产都要搞好。四国庆节一定能够搞好，请到外地的同志都放心。"},{"type":"paragraph","text":"\u003c此系记录稿，仅供参考，如有出人，转抄者负青\u003e"},{"type":"paragraph","text":"天津大学“八，一三红卫兵精仪系转抄"},{"type":"paragraph","text":"毛主席语录"},{"type":"paragraph","text":"社会主义制度终究要代替资本主义制度，这是一个不以人们自已的意志为转移的客观规律。不管反动派怎样企图阻止历史车输的前进，革命或迟或早总会发生，业且将必然取得胜利。"},{"type":"paragraph","text":"《在苏联最高苏稚埃庆祝伟大的十月社会主义革命"},{"type":"paragraph","text":"四十周年会上的耕话》"}],"authors":["王任重"],"dates":[],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1},"tags":[{"name":"王任重","type":"人物"},{"name":"武斗","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3bced4af00"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
