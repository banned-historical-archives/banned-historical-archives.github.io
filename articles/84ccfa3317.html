],"dates":[{"year":1981,"month":9,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社北京九月十五日电　人大常委会委员长叶剑英今天下午在人民大会堂会见了由议长阿卜杜卡德尔·瓦贝利·阿斯卡尔率领的吉布提国民议会代表团。"},{"type":"paragraph","text":"瓦贝利议长对叶剑英说，我能见到您感到很高兴，这次会见体现了我们两国间深厚的友谊。他说，吉布提人民在五十年代进行争取民族独立的斗争时就得到了中国人民的支持。"},{"type":"paragraph","text":"叶剑英对吉布提贵宾来访表示热烈欢迎。他说，中吉两国友好合作关系正在不断发展，在国际事务中两国在许多方面有着一致的观点。他说，在当今世界上，国家要独立，民族要解放的总趋势是不会改变的。已经取得独立的国家也要维护自己的独立。"},{"type":"paragraph","text":"人大常委会副委员长谭震林参加了会见。"},{"type":"paragraph","text":"据新华社北京九月十五日电　人大常委会今晚在人民大会堂举行宴会，热烈欢迎由阿卜杜卡德尔·瓦贝利·阿斯卡尔议长率领的吉布提国民议会代表团。"},{"type":"paragraph","text":"谭震林副委员长主持了宴会。他在宴会上讲话时说，中国、吉布提建交以来，两国的友好合作关系在和平共处五项原则的基础上有了进一步的发展。他表示相信，吉布提国民议会代表团的来访必将为中、吉友谊的进一步巩固和发展做出可贵的贡献。"},{"type":"paragraph","text":"瓦贝利在宴会上发表了热情洋溢的讲话。他说，吉布提和中国虽然相隔万里，但两国人民的心是连在一起的。我们要维护和平，不仅需要自己的努力，也需要很多朋友的支持，其中包括中国。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"谭震林","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"84ccfa3317"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
