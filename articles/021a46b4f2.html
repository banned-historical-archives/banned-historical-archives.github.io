ical-archives/banned-historical-archives8/main/maoquanji11.pdf"],"article":{"title":"对进攻晋察翼边区之敌的作战方法","alias":"","parts":[{"type":"paragraph","text":"对进攻晋察翼边区之敌的作战方法！"},{"type":"paragraph","text":"（1937年12月5日）"},{"type":"paragraph","text":"1937年，八路军第一一五师挺进晋西北，开辟晋察冀革命根据地。朱、任："},{"type":"paragraph","text":"对进攻冀察晋边区之敌，除上月二十九日电及你们来电外，请注意以下各点："},{"type":"paragraph","text":"（一）避免正面抵抗，袭击敌之后尾部队。（二）在敌之远近后方活动，使敌进一步仍在我包围中。（三）同蒲、正太路?必须积极活动，予以有力的配合。[1]这是毛泽东和彭德怀给朱德和八路军政治部主任任弼时的电报。[2]正太路，指正定至太原的铁路，即今石太线。（四）注意在敌后方破坏伪组织、伪军。（五）加紧瓦解敌军工作。"},{"type":"paragraph","text":"（六）在确有胜利条件下，集结适当力量给敌以部分的歼灭和有力打击，增加敌恐怖与进攻困难是必要的，但须详细审慎。"},{"type":"paragraph","text":"毛彭五日二十二时"}],"authors":["毛泽东"],"dates":[{"year":1937,"month":12,"day":5}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":409,"page_end":410},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"021a46b4f2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
