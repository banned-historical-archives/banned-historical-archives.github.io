<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"本市举行少年儿童赛诗会歌颂新生事物　反击右倾翻案风","authors":[],"dates":[{"year":1976,"month":2,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　“我们革命新一代，挥着拳头登上台，狠批右倾翻案风，奇谈怪论脚下踩”。本月十五日下午，共青团上海市委红小兵工作组举办的上海市少年儿童“歌颂社会主义新生事物，反击右倾翻案风”赛诗会在上海杂技场举行。来自本市各区、县小学系统的红小兵、革命教师、工农兵辅导员满怀豪情，运用儿歌这一战斗武器，热情歌颂社会主义新生事物，反击右倾翻案风，生动地显示了新中国的少年儿童关心国家大事的战斗风貌。"},{"type":"paragraph","text":"赛诗会一开始，普陀区少年宫的红小兵首先登台朗诵了毛主席词二首，毛主席的光辉诗篇激起红小兵们强烈的革命激情，全场红小兵用斩钉截铁的声音齐声高诵:“世上无难事，只要肯登攀，这就是时代的最强音。”在全场高唱《痛击右倾翻案风》后，《新生事物齐歌颂》的献诗开始了。各区、县的红小兵生气勃勃地争先献诗，他们从各个角度和侧面放声歌唱社会主义新生事物。这些新儿歌，取材于火热的斗争生活，旗帜鲜明，生动简练，激情洋溢，听后使人豪情倍添。腰鼓咚咚，百花盛开，身穿彩色衣裙的红小兵边歌边舞地走上中心台，演出了歌舞《为新生事物齐鼓掌》，生动形象地反映了新中国少年儿童对无产阶级文化大革命的由衷赞美，为社会主义新生事物拍手叫好的动人情景。"},{"type":"paragraph","text":"这次赛诗会是在本市各区、县的许多小学普遍召开“歌颂社会主义新生事物，狠批奇谈怪论”赛诗会的基础上举行的。最近一个时期以来，本市不少小学的校园里，儿歌专栏琳琅满目，赛诗会开得热气腾腾。广大红小兵结合开门办学，搞社会调查，创作了大量摆事实、讲道理、富有战斗力的儿歌，狠批教育界的奇谈怪论，反击右倾翻案风。这次赛诗会正是红小兵们运用儿歌这一武器投入战斗的生动写照。看，当赛诗会亮出“狠批右倾翻案风”的联诗题目时，红小兵和工农兵辅导员争先恐后，斗志昂扬地跨上诗坛，高声朗诵新创作的战斗诗篇。首首儿歌满腔仇，怒斥走资派还在走。听，红小兵铿锵有力的诗句:“党内走资派，满肚怀鬼胎，念的翻案经，做的复辟梦，顽固不悔改。我们红小兵，革命志豪迈，历史的教训，时刻记心怀，高举马列旗，狠批走资派，江山咱保卫，誓做新一代。”广大红小兵满怀义愤，笔当枪炮上诗台，万炮齐轰走资派。工农兵辅导员也跳上诗台，意气奋发地投入战斗，斗争锋芒直指党内至今不肯改悔的走资派。"},{"type":"paragraph","text":"赛诗会还进行了画配诗，工农兵评诗，拉诗，儿歌表演等活动，内容丰富多彩，形式生动活泼。最后，赛诗会在上海市少年宫演出的歌舞《红小兵歌唱无产阶级文化大革命好》的高潮中结束。"},{"type":"paragraph","text":"\u003cIMG alt=请插入6号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1976\\02\\762h040401.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e在赛诗会上，少年儿童正在表演批判右倾翻案风的文艺节目。　本报记者　摄\u003c/FONT\u003e"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"79b7d48a9a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
