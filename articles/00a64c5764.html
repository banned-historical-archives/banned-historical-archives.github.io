<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"甘肃省委关于加强土地改革领导问题的指示","authors":[],"dates":[{"year":1952,"month":2,"day":27}],"is_range_date":false,"parts":[{"text":"甘肃省委关于加强土地改革领导问题的指示","type":"title"},{"text":"西北局批示：","type":"subtitle"},{"text":"2月27日关于土改领导问题电阅悉。","type":"paragraph"},{"text":"（一）到春耕时，应把土改停下，集中力量领导群众把春耕搞好。某些地方如土改确实不能停止，则应采取白天生产，夜晚开会办法。“土改与春耕结合进行”，事实上土改与春耕都不可能搞好。","type":"paragraph"},{"text":"（二）改正错订地主成份，如不能以原来土他财产退还时，应尽量用本乡剩余果实补还或从其他方面设法补偿。","type":"paragraph"},{"text":"（三）地主多余房屋原有家具已经转移时，应令其原件缴出，但不要提“作适当调剂”，以免发生乱没收现象。","type":"paragraph"},{"text":"春节后展开的土改乡及二期尚未完成的乡合计仍占全省土改乡的半数以上，加之当前土改地区多是辽阔山地，领导骨干大大减弱的情况下，各级党委必须加强对土改的领导，才能取得完全胜利。为此：","type":"paragraph"},{"text":"（一）地委、县委书记仍必须用主要力量去领导土改（春耕），兼顾“三反”。地委、县委须组织巡视组赴各地检查土改，及时发现并解决问题，加强具体指导。县委向地委、地委向省委均须按去冬办法，及时用电话、电报、书面汇报。","type":"paragraph"},{"text":"（二）地委、县委要经常地反复地克服干部中正在滋长着的赶急图快、骄傲自满情绪，最有效的方法是：经常地检查，严肃地找寻工作中缺点和存在的问题，那怕是很小的缺点，亦不要放过，以便经常警惕干部。此外，要教育干部十分警惕的注视地主的隐蔽破坏活动。二期经验证明，地主已由公开拒抗转变为隐蔽的更恶毒的破坏。","type":"paragraph"},{"text":"（三）要按各地具体情况，把土改与春耕结合好，既要做好土改工作，又要做好春耕播种、防旱抗旱工作，争取今年丰收，这就要求从干部的思想教育到具体的工作方法，均能切实地解决好。","type":"paragraph"},{"text":"（四）坚决正确贯彻“省土委会关于土改中若干问题的指示”“省人民政府关于划分农村阶级成份的补充规定”。教育干部克服一切违反政策策略的“左”的观点和做法，又要防止立场不稳的干部曲解指示的精神，包庇地主。","type":"paragraph"},{"text":"（五）各地提出改正错订的地主成份后，因其财产已没收分配了，应如何退还的问题，我们意见，可按下列原则处理：","type":"paragraph"},{"text":"（1）本来不是地主，但因过去当过伪乡保人员，或有霸占敲诈行为，引起群众不满而提高其成份错订为地主者。成份坚决改正，土地财物可按其恶迹情节之轻重，酌量退还一部或大部；","type":"paragraph"},{"text":"（2）如并无恶迹，只是由于经济上计算而错订为地主者，成份坚决改正，财产原则上全部退还；","type":"paragraph"},{"text":"（3）应退还之土地财物，如可以原物归还甚好，如无法退还原物，则应采取协商办法，说明情况，在本人同意下，用剩余之果实补还，如本乡无剩余果实，可在本区、本县其他乡的剩余果实中调剂补还，或从今后其他乡没收的大恶霸财物中抽出一部分（得到本乡群众同意下）补还；","type":"paragraph"},{"text":"（六）关于没收地主多余房屋问题，除对恶霸地主、反革命分子外，对一般地主只没收其现住房屋以外的多余房屋。但凡遇地主把多余房屋中原有家具搬移到自住房屋中的情况时，可令其将原有家具照旧拿出或作适当调剂予以没收分配。","type":"paragraph"},{"text":"（七）没收地主多余粮食，是指其现有粮食而言。至于地主转移分散了的粮食，可依处理非法分散财产原则分别议处。","type":"paragraph"}],"comments":[],"origin":" 甘肃省委农村工作部编印《甘肃土地改革文集（党内文件）》，1954年10月 1日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"00a64c5764"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
