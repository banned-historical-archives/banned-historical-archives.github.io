ical-archives/banned-historical-archives0/main/maoquanji42.pdf"],"article":{"title":"对周恩来关于中印边界问题复尼赫鲁的信稿的修改","alias":"","parts":[{"type":"paragraph","text":"对周恩来关于中印边界问题复尼赫鲁的信稿的修改\"！"},{"type":"paragraph","text":"（1959年11月7日）"},{"type":"paragraph","text":"由于中印两国边界从来没有划定过，而又非常漫长，距离两国政治中心很远或者比较远，如果两国政府不想出一个十分妥善的解决办法，我担心双方都不愿意看到的边境冲突今后还有可能出现。而只要出现了这类冲突，哪怕是很小的冲突，就会被那些敌视我们两国友谊的人们所利用，以达其不可告人的目的。"},{"type":"paragraph","text":"[1]这是毛泽东在周恩来1959年11月7日关于中印边界问题复印度政府总理尼赫鲁的信稿中加写的一段话。此外，毛泽东对这封信还有一些个别文字的修改。1959年11月10日《人民日报》发表了周恩来的这封信。"}],"authors":["毛泽东"],"dates":[{"year":1959,"month":11,"day":7}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":485,"page_end":485},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b95465c257"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
