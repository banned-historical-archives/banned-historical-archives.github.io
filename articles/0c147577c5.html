authors":["龙文明"],"dates":[{"year":1956,"month":4,"day":7}],"is_range_date":false,"parts":[{"text":"湘西苗族自治州普遍发生耕牛死亡现象","type":"title"},{"text":"龙文明","type":"authors"},{"text":"湖南分社7日讯：湘西苗族自治州普遍发生耕牛急症死亡现象。据沪溪县麻坪、新田、南冲和茫田四个乡的反映：五月上旬的五天中死亡耕牛十三头，病倒一百多头。沪溪县耕畜保卫干部下去后，缺乏药品（主要是需要盘尼西林）、治疗困难。在永顺县高良坪区，死亡的耕牛有六十三头。","type":"paragraph"},{"text":"花垣县青平乡第一农业社（高级社）一天就病倒耕牛十一头，其中死亡两头。耕牛死亡原因，主要是社里耕牛无专人看守，轮流每户一天。有的即使专人管理，但工分低，一个主要劳动力每天看六头牛，每头牛只有一分，而在田间劳动，这样的主要劳动力至少得十分。","type":"paragraph"},{"text":"来源：根据1956年4月7日新华社《内部参考》。","type":"paragraph"}],"comments":[],"origin":"美国图书馆收藏","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0c147577c5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
