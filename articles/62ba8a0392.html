tart":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"国防部命令前线恢复炮击台湾当局迷途知返接受和平解决的时机；看来尚有所待；美国人利用台湾当局进行任何侵犯我国主权的勾当，我们是绝对不承认的；","authors":["彭德怀"],"parts":[{"type":"paragraph","text":"新华社20日15日讯 中华人民共和国国防部命令，全文如下："},{"type":"paragraph","text":"中华人民共和国国防部命令"},{"type":"paragraph","text":"福建前线人民解放军同志们："},{"type":"paragraph","text":"台湾当局从十九日夜到二十日晨在金门海域引进美军护航，我军停止炮击金门命令，宣布无效。我军两次停止炮击，台湾当局毫无悔悟。他们坚持顽固态度，拒不接受和谈，加紧战争准备，高叫反攻大陆。现在，他们在邀请杜勒斯到台湾策划进一步实施美蒋“条约”的前夕，竟然把美国军舰引来护航达五小时之久，这是公然违反我们暂停炮击的条件。是可忍，孰不可忍？因此，必须恢复炮击，以示惩罚。"},{"type":"paragraph","text":"中国人的事绝不允许美国人插手，这是民族大义。执迷不悟的人究竟是极少数。台湾当局迷途知返接受和平解决的时机，看来尚有所待，我们继续寄以希望。美国人赖在台湾和台湾海峡是不行的，美国人干涉中国内政，是绝对不容许的，美国人利用台湾当局进行任何侵犯我国主权的勾当，我们是绝对不承认的。台、澎、金、马的爱国军民应当觉悟过来，台、澎、金、马一定要回到祖国的怀抱。"},{"type":"paragraph","text":"国防部长 彭德怀"},{"type":"paragraph","text":"一九五八年十月二十日下午三时"}],"alias":""},"tags":[{"name":"彭德怀","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"62ba8a0392"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
