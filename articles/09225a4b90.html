],"dates":[{"year":1976,"month":6,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京一九七六年六月七日电　罗马尼亚共产党总书记、罗马尼亚社会主义共和国总统尼古拉·齐奥塞斯库和罗马尼亚政府总理马尼亚，曼内斯库打电报给毛泽东主席、朱德委员长和华国锋总理，就我国云南省西部地区发生地震，表示最深切的慰问。电报全文如下:"},{"type":"paragraph","text":"中国共产党中央委员会主席毛泽东同志"},{"type":"paragraph","text":"中华人民共和国全国人民代表大会常务委员会委员长朱德同志"},{"type":"paragraph","text":"中华人民共和国国务院总理华国锋同志:"},{"type":"paragraph","text":"惊悉云南省西部发生强烈地震，造成了人员伤亡和物质损失，我们代表罗马尼亚共产党中央委员会、罗马尼亚社会主义共和国国务委员会师政府，代表罗马尼亚人民并以我们个人名义向你们、向中国共产党中央委员会、中华人民共和国全国人民代表大会常务委员会和国务院，向中国人民和灾区居民表示最深切的同情和慰问，向死难者家属表示最衷心的哀悼。"},{"type":"paragraph","text":"罗马尼亚共产党总书记、罗马尼亚社会主义共和国总统尼古拉·齐奥塞斯库"},{"type":"paragraph","text":"罗马尼亚社会主义共和国政府总理马尼亚·曼内斯库"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"华国锋","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"朱德","type":"人物"},{"name":"云南文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"09225a4b90"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
