s":[],"dates":[{"year":1957,"month":7,"day":27}],"is_range_date":false,"parts":[{"text":"浦熙修家乡人民揭露浦熙修、罗隆基","type":"title"},{"text":"新华社南京27日电  据浦熙修的家乡嘉定县人民和浦熙修的亲戚揭露，罗隆基和雷震、杨虎等人联系，浦熙修完全了解。当罗隆基接受雷震每月二两黄金的津贴，住在上海虹桥疗养院时，浦熙修也常在那里。浦熙修的叔祖父浦泳就曾经从嘉定赶到虹桥疗养院看过他们。上海刚解放时，罗隆基、浦熙修住在杨虎家里，浦泳也去那里看过他们。1949年底，当浦泳到上海探望浦熙修父亲浦友梧时，浦友梧就夸耀地说：“隆基正在活动搞外交工作、当外交部长，以后我们这些亲戚都有办法了。”","type":"paragraph"}],"comments":[],"origin":"新华通訊社編：《内部参考》，第2269期，1957年7月29日","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"67b2742c60"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
