<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"彻底埋葬修正主义的“物质刺激”黑货","authors":["戈午泉"],"dates":[{"year":1967,"month":10,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编者按：这里选刊的上海杨树浦发电厂的革命大字报，出自战斗在生产第一线的革命职工之手。这些革命大字报，具有鲜明生动、尖锐泼辣的战斗风格，象一颗颗炮弹一样，打中敌人的要害。它雄辩地说明，用毛泽东思想武装起来的工人阶级，是出色的革命批判家。"},{"type":"paragraph","text":"这些大字报，反映了杨树浦发电厂的革命职工，紧跟毛主席的伟大战略部署，以“斗私，批修”为纲，人人参战，个个挥笔，掀起了群众性革命大批判的新高潮。"},{"type":"paragraph","text":"要真正从政治上、思想上、理论上批倒批臭以中国赫鲁晓夫为首的党内一小撮走资本主义道路的当权派，就必须充分发动群众，打一场革命大批判的“人民战争”。这种大批判，也只有同本地区、本单位的斗、批、改结合起来，才能更广泛地动员和吸引群众参加，充分发挥群众的智慧和力量，把中国赫鲁晓夫的流毒揭深批透。这样的大批判，既是“斗私，批修”的好战场，又是活学活用毛主席著作的大课堂。杨树浦发电厂的同志们这样做了，所以取得了良好效果。"},{"type":"paragraph","text":"彻底埋葬修正主义的“物质刺激”黑货"},{"type":"paragraph","text":"毛主席教导我们，政治是统帅，是灵魂，“政治工作是一切经济工作的生命线。”社会主义建设，靠人的思想革命化，要把人的革命化放在首位，用人的革命化带动机械化。"},{"type":"paragraph","text":"中国赫鲁晓夫一贯同毛主席的教导唱对台戏。他竭力鼓吹“物质第一”，“奖金第一”，说什么要实现工业化，只有“按经济办法管理经济”，只有大搞物质刺激，奖金挂帅，才能调动生产积极性。"},{"type":"paragraph","text":"电业系统党内一小撮走资本主义道路的当权派，紧跟其黑主子中国赫鲁晓夫，在电业系统中刮起了一股反革命修正主义妖风。早在一九五四年，在全国电业系统中我厂就首先推行了修正主义的“安全无事故奖金制度”。一九五八年，在总路线、大跃进、人民公社三面红旗的光辉照耀下，我们工人起来造了党内一小撮走资本主义道路当权派的反，把这种修正主义的制度冲掉了。可是，到了三年经济暂时困难时期，我厂党内一小撮走资本主义道路当权派在中国赫鲁晓夫的指使下，又把这杀人不见血的“软刀子”抛了出来，并且大肆鼓吹什么“物质刺激能调动人的积极性”！请问：它调动的到底是什么样的积极性？"},{"type":"paragraph","text":"我们认为，所谓“积极性”，归根结底只有两种：一种是全心全意为人民服务、为社会主义革命和社会主义建设事业而奋发图强的积极性。正如毛主席所教导的那样：“群众中蕴藏了一种极大的社会主义的积极性。”这种一心为公的积极性，好得很！应该大力提倡，大大发扬。另一种则是为个人名利、一心为“私”的个人主义的“积极性”，也就是资本主义的“积极性”。这种“积极性”，必须严加批判，坚决抵制。“物质刺激”就是刺激这种个人主义“积极性”的毒药，它会腐蚀我们工人的革命意志，好让那班老爷舒舒服服地搞资本主义复辟。"},{"type":"paragraph","text":"提倡“物质刺激”的老爷们说：“物质刺激体现了按劳分配的原则，克服了平均主义。”这完全是骗人的鬼话。说穿了，是挂着按劳分配的旗号，干着修正主义的罪恶勾当。就拿“安全无事故奖金制度”中各类人员的奖金率来看：一般工人工资低，奖金率只有本人工资的百分之十五到二十，而一些工程师、车间主任、总值长等人，原来工资就很高，但他们的奖金率要达到本人工资的百分之四十五到五十。有些人一个月的奖金竟比老师傅一个月的工资还高。这是什么分配原则？这不是彻头彻尾的修正主义黑货又是什么？"},{"type":"paragraph","text":"“金猴奋起千钧棒，玉宇澄清万里埃。”在史无前例的无产阶级文化大革命中，我们要彻底批倒、批臭以中国赫鲁晓夫为首的党内一小撮走资本主义道路当权派，肃清他们在各方面的流毒，把修正主义的“物质刺激”黑货彻底埋葬！"},{"type":"paragraph","text":"（狂飙兵团　戈午泉）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"人民战争","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0184a1fea6"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
