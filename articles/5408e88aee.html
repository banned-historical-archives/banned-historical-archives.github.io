":["赵丹"],"dates":[{"year":1968,"month":12,"day":13}],"is_range_date":false,"parts":[{"text":"139号犯人狱中报告（两枚镍币）","type":"title"},{"text":"赵丹","type":"authors"},{"text":"这两枚一分钱的镍币是从哪儿来的呢？我记不确切了。记得我初到此地购买东西时，确是找分币零钱的。记得当时因为天冷，我曾要求过此地的工作人员代购些水果糖，好增加些热量，可工作人员不肯。而买东西改做只找糖、不找分币那是后来的事了。","type":"appellation"},{"text":"我这个人在生活小事上，素来是马马虎虎，所以不知怎么就遗留下这两枚一分钱的镍币了。这实在是没有任何用意和用心在内的。","type":"appellation"},{"text":"在此认罪，并恳宽恕是幸！","type":"appellation"},{"text":" 139","type":"paragraph"},{"text":" 一九六八年十二月十三日","type":"paragraph"}],"comments":[],"origin":"李辉整理《赵丹自述》，大象出版社，2003年1月第一版。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5408e88aee"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
