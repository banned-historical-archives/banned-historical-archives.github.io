ical-archives/banned-historical-archives0/main/maoquanji42.pdf"],"article":{"title":"给钟学坤的信","alias":"","parts":[{"type":"paragraph","text":"给钟学坤的信"},{"type":"paragraph","text":"（1959年12月29日）学坤同志："},{"type":"paragraph","text":"信收到了，谢谢你。九派，湘、鄂、赣三省的九条大河。究竟哪九条，其说不一，不必深究。三吴，古称苏州为东吴，常州为中吴，湖州为西吴。我甚好，谢谢你的关心。你的工作和学习如何？尽心工作，业余学习，真正钻进去，学一点真才实学，为人民服务，是为至盼！"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十二月廿九日"},{"type":"paragraph","text":"[1]钟学坤，当时是庐山疗养院护士。庐山会议期间，曾在毛泽东处做保健工作。"},{"type":"paragraph","text":"[2]指钟学坤1959年9月下旬写给毛泽东的信。信中向毛泽东请教如何理解《七律·登庐山》一诗等问题。"}],"authors":["毛泽东"],"dates":[{"year":1959,"month":12,"day":29}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":534,"page_end":534},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"aad64fbbf7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
