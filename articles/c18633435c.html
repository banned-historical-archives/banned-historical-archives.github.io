art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"印度尼西亚反动派掀起反华运动；是为美帝和现代修正主义效劳世界上没有任何力量能抹煞中国所起的国际作用，中国是孤立不了的","authors":[],"parts":[{"type":"paragraph","text":"新华社地拉那四日电"},{"type":"paragraph","text":"这篇题为《印度尼西亚的反华运动为帝国主义、现代修正主义和国际反动派效劳》的评论说，“当前国际事件发展的进程证实，不仅在印度尼西亚，而且在全世界各地正发生着反动势力同革命力量的冲突，帝国主义和殖民主义势力同民族解放和社会进步力量的冲突。"},{"type":"paragraph","text":"“帝国主义和国际反动派都把各个革命政党和人民中国看作是自己最危险的敌人。今天中华人民共和国、中国共产党站在反对帝国主义和国际反动派斗争的前列。”因此，“现在美帝国主义、国际反动派及其仆从把所有的毒箭射向成为他们战争和侵略计划不可逾越的障碍的中华人民共和国、伟大的中国人民及其光荣的党。”"},{"type":"paragraph","text":"评论指出，在国际帝国主义反共的共同政策范围内，印度尼西亚反动派采用了最卑鄙的手段和方法。他们践踏国际法最起码的准则，破坏中国外交人员的不可侵犯的权利、侮辱中国公民的尊严和威胁他们的安全。他们挑起反华情绪，编造反对中华人民共和国的各种谎言，最后采取了粗暴的挑衅的流氓行为。"},{"type":"paragraph","text":"评论指出，这些挑衅和粗暴行为是美帝国主义、赫鲁晓夫修正主义者及国际反动派反对中华人民共和国整体计划的组成部分，目的在于破坏印度尼西亚和中国之间的友谊，使印度尼西亚人民离开其真正的久经考验的朋友——中华人民共和国。"},{"type":"paragraph","text":"评论说，印度尼西亚出现的肆无忌惮的反华运动在美帝国主义者、英国、荷兰殖民主义者和其他反动派那里引起了无法形容的兴高采烈。他们希望，印度尼西亚同它的真正朋友断绝了关系时，大概将为实现他们的侵略和奴役目的、使印度尼西亚人民重新陷入殖民主义的泥坑而轻易地敞开道路。为此目的，他们鼓励印度尼西亚反动派把反共反人民和反华的运动干到底。美国报纸《纽约先驱论坛报》在评论印度尼西亚反动军队势力的进攻时写道：“在雅加达发生的事情不能不使我们高兴”。合众国际社也宣称，“印度尼西亚即将发生符合我们美国政策的变化的时候不是很远了！”这清楚表明是谁干涉了印度尼西亚的内政，是谁站在印度尼西亚反动派的背后，表明美帝国主义者及其仆从的目的何在。"},{"type":"paragraph","text":"评论说，但是，这些阴谋必将遭到失败。人民中国是孤立不了的。世界上没有力量能够抹煞人民中国所起的国际作用，更不能使它的深刻的爱好和平与进步政策、它在反对美帝及其支持者的侵略和战争政策斗争中的贡献变黑。"},{"type":"paragraph","text":"阿尔巴尼亚人民坚决谴责印度尼西亚和国际反动派的反华运动。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c18633435c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
