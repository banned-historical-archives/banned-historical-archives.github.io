[],"dates":[{"year":1950,"month":8,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"庆祝罗马尼亚解放六周年"},{"type":"paragraph","text":"罗大使举行招待会"},{"type":"paragraph","text":"毛主席应邀出席"},{"type":"paragraph","text":"【新华社二十三日讯】罗马尼亚人民共和国驻我国大使鲁登科，为庆祝罗马尼亚解放六周年纪念，特于二十三日下午八时在京举行盛大招待会。"},{"type":"paragraph","text":"中华人民共和国中央人民政府毛泽东主席应邀出席。应邀与会者尚有中央人民政府副主席刘少奇、李济深、张澜；中央人民政府秘书长林伯渠；政务院总理兼外交部部长周恩来，副总理董必武、黄炎培；最高人民法院院长沈钧儒，及中央人民政府各部门首长和各人民团体负责人等四百余人。"},{"type":"paragraph","text":"各国外交使节应邀出席者有苏联大使罗申，朝鲜大使李周渊，印度大使潘尼迦，波兰大使布尔金，瑞典大使阿马斯顿，德意志外交使团团长柯尼希，蒙古大使贾尔卡赛汉，匈牙利大使夏法朗柯，缅甸大使吴敏登，丹麦公使穆克，以及捷克斯洛伐克大使馆临时代办哈谢克等人。"},{"type":"paragraph","text":"招待会在热烈友好的气氛中进行。会后并放映了罗马尼亚的新闻影片《一九四九年的八月二十三日》和《多瑙河——黑海运河》。（附图片）"},{"type":"paragraph","text":"毛主席向罗大使鲁登科举杯祝贺  齐观山摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"82126758da"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
