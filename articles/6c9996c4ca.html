苏政府呼吁签署日内瓦协议各国严格履行协议规定义务","authors":[],"dates":[{"year":1964,"month":4,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"塔斯社就万象政变受权发表声明"},{"type":"paragraph","text":"老挝极右反动力量发动政变是企图重新把老挝卷入内战  苏政府呼吁签署日内瓦协议各国严格履行协议规定义务"},{"type":"paragraph","text":"新华社二十一日讯　据塔斯社莫斯科讯：塔斯社二十日受权就十九日在万象发生的军事政变发表了一项声明。"},{"type":"paragraph","text":"声明中指出，老挝极右反动力量发动这次政变的企图不能不认为是对确定老挝作为独立、和平和中立国家的国际地位的日内瓦协议的直接侵犯，是企图破坏老挝内部政治问题的和平解决、重新把老挝卷入内战。"},{"type":"paragraph","text":"声明说，“苏联政府谴责指望破坏日内瓦协议和老挝问题的和平解决的反动势力的行为。苏联政府宣布支持以富马亲王为首的老挝联合政府和支持为在日内瓦协议的基础上取得和平和民族和睦所作的努力。苏联政府，作为老挝问题日内瓦会议的两主席之一，呼吁签署日内瓦协议的各国严格地和坚定地履行这个协议所规定的义务。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6c9996c4ca"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
