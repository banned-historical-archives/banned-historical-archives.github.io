ical-archives/banned-historical-archives0/main/maoquanji45.pdf"],"article":{"title":"《冬云》诗一首和给林克的信","alias":"","parts":[{"type":"paragraph","text":"《冬云》诗一首和给林克的信"},{"type":"paragraph","text":"（1962年12月26日）"},{"type":"paragraph","text":"冬云诗一首雪压冬云白絮飞，万花纷谢一时稀。高天滚滚寒流泄，大地微微暖气吹。独有英雄驱虎豹，更无豪杰怕熊黑。梅花欢喜漫天雪，"},{"type":"paragraph","text":"冻死苍蝇未足奇。"},{"type":"paragraph","text":"[1]这首诗在人民文学出版社1963年12月出版的《毛主席诗词》中发表时，“高天滚滚寒流泄”一句改为“高天滚滚寒流急”"},{"type":"paragraph","text":"[2]林克，当时任毛泽东办公室秘书。"},{"type":"paragraph","text":"[3]冬云，作诗日期12月26日（作者的生日），在当年冬至后的第四天。旧说“冬至一阳生”，所以诗中说“大地微微暖气吹”，这里是比喻虽在冬至，大地并没有完全被寒流控制。"},{"type":"paragraph","text":"[4]黑，熊的一种，现在叫马熊或人熊。毛泽东全集第四十五卷林克同志："},{"type":"paragraph","text":"请将诗一首付印，于今天下午印成50份，于下午六时前交我为盼。"},{"type":"paragraph","text":"毛泽东廿六日晨七时"}],"authors":["毛泽东"],"dates":[{"year":1962,"month":12,"day":26}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":305,"page_end":306},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0ccdcbbfe2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
