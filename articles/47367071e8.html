":1967,"month":3,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席关心毛里塔尼亚人民"},{"type":"paragraph","text":"同中国农业考察组一起工作的毛里塔尼亚司机莫克塔，二月十八日晚在收听毛里塔尼亚电台广播时，忽然高兴地在屋子里跳了起来。家里人惊奇地问他：“你怎么啦？”他立即激动地对家里人说：“我听到了一个非常非常好的消息，中国和毛里塔尼亚发表了联合新闻公报，公报说两国签订了三项协定。这样我们将要得到伟大中国的更多的无私援助，我们将要接待更多的来帮助我们建设的中国兄弟！”最后他赞扬说：“毛主席真伟大，他不仅领导中国人民进行革命和建设，而且还关心毛里塔尼亚人民！”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"47367071e8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
