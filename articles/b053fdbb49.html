ical-archives/banned-historical-archives0/main/maoquanji28.pdf"],"article":{"title":"给文南松的信","alias":"","parts":[{"type":"paragraph","text":"给文南松?的信"},{"type":"paragraph","text":"（1950年5月12日）南松表兄："},{"type":"paragraph","text":"正月来信收到了，感谢你的好意。运昌?兄给我多次信，我回了一信，寄南县白蚌口，不知他收到没有？运昌兄的工作，不宜由我推荐，宜由他自己在人民中有所表现，取得信任，便有机会参加工作。十哥、十七哥还在否？十一哥健在甚慰，他有信来，我已回了一信，不知他收到否？你说乡里缺粮，政府不发，不知现在怎么样，还是缺粮吗？政府一点办法也没想吗？来信时请详为告我。"},{"type":"paragraph","text":"此复，即问近安！"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一九五〇年五月十二日[1]文南松，毛泽东的表兄。[2]运昌，即文运昌，毛泽东的表兄。"},{"type":"paragraph","text":"[3]十哥，即文泮香，毛泽东的表兄。十七哥，即文枚清，毛泽东的表兄。"},{"type":"paragraph","text":"[4]十一哥，即文涧泉，毛泽东的表兄。"}],"authors":["毛泽东"],"dates":[{"year":1950,"month":5,"day":12}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":373,"page_end":373},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b053fdbb49"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
