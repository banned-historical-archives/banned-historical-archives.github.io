[{"year":1965,"month":6,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"读了《“鞋帽大王”的生意经》这篇文章后，使我进一步认清了资产阶级唯利是图、损人利己的丑恶本质，使我更加认清了旧社会资本主义剥削制度的可恶，更加热爱今天新社会。同时，也使我懂得了一条真理，这就是不管哪一个资本家，他们都是靠压榨劳动人民的血汗起家的。资本家的“生意经”，就是他们的“欺骗经”、“剥削经”，也就是劳动人民受苦受难的原因!今天，有些资本家在吹嘘，他们是靠“勤俭起家”的，这完全是骗人的鬼话，我们万万不能上当!"},{"type":"paragraph","text":"我是一个青年，生长在新社会，没有经受旧社会的苦难，往往对资本家的丑恶本质认识不足，读了《歌唱新社会》上刊登的文章，使我上了一堂深刻的政治课。"},{"type":"paragraph","text":"上海长阳中学学生　施振中"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a7d4aef3f2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
