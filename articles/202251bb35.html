es":[{"year":1998,"month":2,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　去年以来，不少报刊纷纷报道了毛泽东写给陈伯钧的两封亲笔信流失民间，为成都一名叫王安廷的老人所收藏的新闻，引起广大读者的关注。现经重庆晚报记者调查，此事纯属子虚乌有。"},{"type":"paragraph","text":"据介绍，这两件“墨宝”一共三页，是王安廷1994年以五六元的代价从成都猛追湾文物市场购得的一包“文革”资料中发现的。王安廷还向传媒声称，愿以这两件墨宝交换“在成都市区的2000平方米展览厅一座，或1000平方米包括全部设备的希望小学一座”。凡是到他的“王安廷小小博物馆”参观墨宝者，每人均须交纳赞助费50元。"},{"type":"paragraph","text":"据中国革命博物馆和陈伯钧将军的女儿向记者介绍，毛泽东的这两封信，一封写于1936年10月15日，当时陈伯钧担任红六军团军团长，另一封写于1937年10月9日，当时陈伯钧任八路军三五九旅旅长，这在1987年上海人民出版社出版的《陈伯钧日记》中均有记载。1974年陈伯钧将军病逝后，这两件珍贵的墨宝由陈伯钧的夫人陈琳捐献给国家，作为国宝级的一级文物由中国革命博物馆收藏，从未出借给任何单位和个人，自然也就根本不可能“流失民间”。"},{"type":"paragraph","text":"据介绍，王安廷手中的“毛泽东墨宝”，落款10月15日的那封纸边呈锯齿状，似从书上撕下，但上面鲜红的毛泽东印章却十分醒目，而落款为10月9日那封油墨及印刷痕迹更为明显，两封信的左下角均有一枚模糊不清的黑色长方形图章。据了解，毛泽东这两件墨宝由中国革命博物馆收藏后，曾经将原件复制并加盖复制品章后交给家属留存，1985年出版的《文存》"},{"type":"paragraph","text":"第一卷第一期和《陈伯钧日记》中都刊载了按复制件原大制作的影印件，上面均留有长方形复制品章的痕迹。王安廷手中的“墨宝”看来不仅源于影印件，还有人为做手脚之嫌。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"202251bb35"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
