ical-archives/banned-historical-archives0/main/maoquanji27.pdf"],"article":{"title":"复彭德怀电","alias":"","parts":[{"type":"paragraph","text":"复彭德怀电!"},{"type":"paragraph","text":"（1949年9月10日）"},{"type":"paragraph","text":"集中注意力争取于十一月初、中旬由玉门向新疆进军。由你们自己做准备的事项，请你抓紧进行，除帐篷、水壶、粮食外，你未提皮衣、皮帽、毡鞋，这些是很重要且须立即准备的，是否需要我们帮助你们办皮衣，要多少，请即告。陶崎岳、赵锡光等已准备与我们和平解决，新疆主席包尔汉已派人至伊犁附近接洽和平谈判，我们已令邓力群率电台日内进驻迪化，故新疆已不是战争问题，而是和平解决的问题，本日我们邀请张治中正式谈了，请他帮助解决新疆的问题，并在新疆方面担负工作任务（尚未提到具体职位），他表示愿意听候驱策，做什么事也可以。"},{"type":"paragraph","text":"[1]这是毛泽东复彭德怀电的主要内容。这个电报还提出：应设立西北军政委员会，统辖西北5省，以彭德怀为主任，习仲勋、赵寿山、张治中、邓宝珊4人为副主任，办公地点在兰州或西安；以张治中为新疆军政委员会主任，王震及少数民族的2人至3人为副主任（或须加上陶崎岳），以为新疆的过渡机关。"},{"type":"paragraph","text":"[2]赵锡光，当时任国民党军新疆省警备副总司令兼整编第四十二师师长。"}],"authors":["毛泽东"],"dates":[{"year":1949,"month":9,"day":10}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":228,"page_end":228},"tags":[{"name":"毛泽东","type":"人物"},{"name":"彭德怀","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"609dee2fd1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
