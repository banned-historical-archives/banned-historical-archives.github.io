script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"日本《赤旗报》刊载岛田政雄的文章中国现代文学充满革命斗争性中国文学在主题、题材、形式、手法上真是百花齐放在革命性和多样性的统一中，突出刻划具有鲜明阶级性的人物形象在同资本主义残余进行不调和的斗争中，没有现代修正主义可钻的空子中国作家清楚了解:所谓“阶级斗争已经不复存在，让我们描写人的真实性吧”是多么虚伪的口号","authors":[],"dates":[{"year":1963,"month":1,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京12日电】　东京消息:日共中央机关报《赤旗报》最近刊载了日中友好协会常任理事岛田政雄写的一篇文章，评介中国现代文学。"},{"type":"paragraph","text":"这篇题为《中国文学现状给我们的启示》的文章指出《红岩》是中国目前“最畅销”的一本长篇小说。他说，我对于那些革命者在屠杀的枪声中坚持到最后一瞬间的革命乐观主义深感惊叹。文章说，这种对革命的乐观主义的描写是通过对反面和正面人物的典型的刻划来进行的。"},{"type":"paragraph","text":"文章说，现在，中国文学在主题、题材、形式、手法上真是百花齐放，所有作家在写作时都尽量发挥自己的特点。一些宏伟的长篇小说是描绘出了中国革命的优秀的巨幅画卷，而无数的短篇小说则是突出地刻划了工人、农民和士兵在大城市和边疆地区建设社会主义时迸发出火花的新旧矛盾——激烈的阶级斗争中产生出来的崭新的人物形象。"},{"type":"paragraph","text":"文章指出，工农作家的不断成长和大量涌现，给中国文学注入了新的血液。"},{"type":"paragraph","text":"文章强调说，牢固地扎根在同个人主义、利己主义、资本主义残余进行的不可调和的斗争中展开的社会主义建设的中国文学，是没有现代修正主义可钻的空子的。中国的作家清楚地了解:所谓“阶级斗争已经不复存在。让我们描写人的真实性吧”这样一种口号，是脱离现实生活多么远的虚伪的空洞口号。中国文学在革命性和多样性的统一中，刻划出阻挠历史车轮前进的人和推动历史车轮前进的人的具有鲜明阶级性的形象。"},{"type":"paragraph","text":"岛田政雄说，我想向日本文学界指出的是，中国文学的无产阶级国际主义。他说，我想到访问过日本的李季写的取材于关于日本热海初岛的传说的叙事诗《海誓》，就深为广大的中国人民所喜爱。这首诗从主人公的坚强意志和热情中表达了日本民族的伟大精神，并且歌颂了这种伟大精神，它深深地打动了中国人民的心弦。"},{"type":"paragraph","text":"他说，中国的作家和诗人们就是这样在很多的文学作品中描写了刚果、古巴、老挝、越南等亚非国家人民的生活和精神。中国文学对亚洲、非洲、拉丁美洲人民怀有兄弟般的亲切感情，坚决地响应了全世界人民争取建立反对帝国主义统一战线的号召。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e0aac2e3c8"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
