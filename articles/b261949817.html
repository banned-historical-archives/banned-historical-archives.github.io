" crossorigin="">{"props":{"pageProps":{"books":[{"id":"f750c865-cb15-4c03-98b2-aad6e569d88a","name":"毛远新破坏民兵建设的部分罪行材料（1976.12）","internal":false,"official":true,"type":"img","author":"毛远新，1976.12，反攻倒算材料，辽宁省委民兵工作领导小组办公室","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/f750c865-cb15-4c03-98b2-aad6e569d88a/1.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/f750c865-cb15-4c03-98b2-aad6e569d88a/2.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/f750c865-cb15-4c03-98b2-aad6e569d88a/3.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/f750c865-cb15-4c03-98b2-aad6e569d88a/4.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/f750c865-cb15-4c03-98b2-aad6e569d88a/5.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/f750c865-cb15-4c03-98b2-aad6e569d88a/6.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/f750c865-cb15-4c03-98b2-aad6e569d88a/7.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/f750c865-cb15-4c03-98b2-aad6e569d88a/8.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/f750c865-cb15-4c03-98b2-aad6e569d88a/9.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/f750c865-cb15-4c03-98b2-aad6e569d88a/10.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/f750c865-cb15-4c03-98b2-aad6e569d88a/11.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/f750c865-cb15-4c03-98b2-aad6e569d88a/12.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/f750c865-cb15-4c03-98b2-aad6e569d88a/13.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/f750c865-cb15-4c03-98b2-aad6e569d88a/14.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/f750c865-cb15-4c03-98b2-aad6e569d88a/15.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/f750c865-cb15-4c03-98b2-aad6e569d88a/16.jpg"],"article":{"title":"（三）毛远新一九七四年一月十四日检查沈阳市民兵总指挥部工作时的插话（摘录）","alias":"","parts":[{"type":"paragraph","text":"（三）毛远新一九七四年一月十四日检查沈阳市"},{"type":"paragraph","text":"民兵总指挥部工作时的插话（摘录）"},{"type":"paragraph","text":"（X×X同志介绍XXXXX等单位的出兵、管兵和安排生产的经验时）"},{"type":"paragraph","text":"毛远新：新光比较好，新光多少人？xX×：×××x多人，抽六十名民兵执勤毛远新：××多人抽六十人就影响生产？别听他胡扯"},{"type":"paragraph","text":"（X×同志汇报劳教班的情况说到召开家长座谈会取得明显效果时）"},{"type":"paragraph","text":"毛远新：这可做条规定，青年人进劳教班，要做家长的工作，吃饭、生活、劳动，带他们看一遍。将来你公安局把强劳的研究一下，工厂有的人不上班还扣工资呢，强劳的还带工资？"},{"type":"paragraph","text":"（x××汇报过去整组的方法和战时组建部队，独立师团普通民兵的情况时）"},{"type":"paragraph","text":"毛远新：你们安排个计划，不管独立团也好，独立营也好，总得在相当一段时间参加你这个活动。你们考虑一下，民兵参加社会阶级斗争和整组结合起来，我总觉得是一回事，你们整组后怎么办？很重要是有没有事于，没事干就没有生命力。怎么算整组完成了，"},{"type":"paragraph","text":"11若按过去的作法搞，还是纸上谈兵。"},{"type":"paragraph","text":"xxx：既搞政治教育，也搞军事训练。政治占百分之六十，军事占百分之四十，我们初步规定八十个小时左右。"},{"type":"paragraph","text":"毛远新：我的意思是这些人除了执勤外，还搞点军事训练。你们是不是研究一一下，比如一批六千多人，除了执勤外，还搞些基本的军事训练。在轮换时，把换下来的民兵用三、五天时间，组织他们拉练、打靶，叫他们看看坦克，知道是怎么回事，回去之后成为骨干行不行？"},{"type":"paragraph","text":"现在民兵参加社会阶级斗争，利用这个条件组织训练，营长、连长也拉出去试一试，怎么和民兵正常训练结合起来好，你们这么拉练几次，将来调动就容易了。"},{"type":"paragraph","text":"我过去提出改造民兵，怎么把过去好的做法结合起来。“打起来你靠谁？光靠武装干部不行，有的都跑不动了。”将来要落实到一个区、一个武装基干团，要有一个长期的计划，多少人执勤，多少人拉练，通过这个形式就不落空了。你们要注意这个问题，对省军区、包括沈阳军区下的命令，要分析一下，不符合实际情况的就可以造反，你们敢不敢给张海棠、杨弃贴大字报？"},{"type":"paragraph","text":"xX：我们不贴大字报，有意见我们要提。"},{"type":"paragraph","text":"毛远新：城市民兵工作到底怎么做，上海经验说的很清楚，因为这是新鲜经验，省军区的同志也不大清楚，在这方面你们有最大的发言权，不然他们就乱下命令，弄得下面无所是从。你们要按照上海经验，摸索一套办法。把过去的好经验结合起来，要注意实效。"},{"type":"paragraph","text":"XX：有的工厂警卫，可以用民兵代替解放军。毛远新：你们抓一个点，用事实证明讲出道理，搞个调查报-12-告，我给你们举个例子，（略）现在北京有些主要街道都是民兵执勤，部队很少，遇到事情，他们好处理。生活上有什么问题？定量不能降，原来多少还是多少。沈阳不是出汽车吗，你（指×××）说个话，六个区六台车你都拿不出来？"},{"type":"paragraph","text":"夜间执勤补助粮食，这个原则可以定，凡是你夜间执勤的就补助三两，不执勤的不补，做民兵工作的同志要考虑把经常性的民兵工作结合起来。区里可以合到一块嘛。"},{"type":"paragraph","text":"（四）毛远新一九七四年一月二十一日在检查民"},{"type":"paragraph","text":"兵执勤工作时的插话（摘录）"},{"type":"paragraph","text":"（一月二十一日夜间，毛远新等，检查了沈阳市沈河、大东两区民兵执勤情况，并讲了话）"},{"type":"paragraph","text":"毛远新：巡逻一班多少人？"},{"type":"paragraph","text":"X××：（说不清楚）一般-一条街十三个民兵，巡逻八、九个，驻街三、四个。"},{"type":"paragraph","text":"毛远新：那也看不着啥人，你们节日要加强巡逻，加强警戒。区机动分队是那个厂子的？有多少人？"},{"type":"paragraph","text":"x×X：是××工厂的，五十人。毛远新：能调来吗？x××：能调。但打了几次电话，没有找到负责人。毛远新对×xx同志说：你去调。"},{"type":"paragraph","text":"x××同志打电话给×x工厂武装部长x×同志。（他在家病休，××同志说：我现在病着，要五十人不行呀，你实在要出，我得到车间去找，能出三十人，还得一小时以后，动用工厂警卫人员。）"},{"type":"paragraph","text":"13"},{"type":"paragraph","text":"兵执勤工作时的插话（摘录）"},{"type":"paragraph","text":"（一月二十一日夜间，毛远新等，检查了沈阳市沈河、大东两区民兵执勤情况，并讲了话）"},{"type":"paragraph","text":"毛远新：巡逻一班多少人？"},{"type":"paragraph","text":"X××：（说不清楚）一般-一条街十三个民兵，巡逻八、九个，驻街三、四个。"},{"type":"paragraph","text":"毛远新：那也看不着啥人，你们节日要加强巡逻，加强警戒。区机动分队是那个厂子的？有多少人？"},{"type":"paragraph","text":"x×X：是××工厂的，五十人。毛远新：能调来吗？x××：能调。但打了几次电话，没有找到负责人。毛远新对×xx同志说：你去调。"},{"type":"paragraph","text":"x××同志打电话给×x工厂武装部长x×同志。（他在家病休，××同志说：我现在病着，要五十人不行呀，你实在要出，我得到车间去找，能出三十人，还得一小时以后，动用工厂警卫人员。）"},{"type":"paragraph","text":"13"}],"authors":["毛远新"],"dates":[{"year":1974,"month":1,"day":14}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":8,"page_end":9},"tags":[{"name":"毛远新","type":"人物"},{"name":"上海文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b261949817"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
