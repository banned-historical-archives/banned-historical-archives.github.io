ors":[],"dates":[{"year":1972,"month":8,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京一九七二年八月三日电　中共中央政治局委员姚文元，中共中央委员、中共中央对外联络部部长耿飚，今天会见了以利维奥·里萨利蒂为团长、曼里奥·迪努齐为副团长的意大利共产党(马克思列宁主义)代表团，同他们进行了亲切友好的谈话，会见后设宴招待了代表团。"},{"type":"paragraph","text":"参加会见和宴会的我国有关方面负责人和工作人员有冯铉、李肖白、邢竹芳、赵学礼、苏子南、林咸农、夏方林、姚世根。"},{"type":"paragraph","text":"意大利共产党(马列)代表团于七月十八日到达北京。代表团先后在北京、延安等地参观访问。在京期间中共中央对外联络部部长耿飚曾会见了意共(马列)代表团。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"姚文元","type":"人物"},{"name":"耿飚","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"34886bab0a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
