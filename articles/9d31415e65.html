" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji27","name":"毛泽东全集第27卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji27.pdf"],"article":{"title":"答谢兰那地夫祝贺中华人民共和国成立的电报","alias":"","parts":[{"type":"paragraph","text":"答谢兰那地夫祝贺中华人民共和国成立的电报"},{"type":"paragraph","text":"（1949年11月19日）亲爱的兰那地夫同志："},{"type":"paragraph","text":"你在十月十二日的贺电收到了，十分感谢你对于中华人民共和国和中国共产党的热情的祝贺。全中国人民读到你的电报里所表现的印度革命人民的兄弟友爱，都将感觉欢欣和骄傲。印度人民是亚洲历史悠久人口众多的伟大民族之一，它的过去的命运和将来的道路和中国有许多类似之点。我确信，依靠勇敢的印度共产党和一切印度爱国者团结奋斗，印度决不会长期处于帝国主义及其合作者的绊羁之下。自由的印度将有一天要与自由的中国一样，作为社会主义和人民民主主义大家庭的一员而出现于世界，这一天将要终结人类历史上帝国主义和反动的时代。祝印度爱国人民团结奋斗的胜利！印度人民和中国人民的兄弟团结万岁！"},{"type":"paragraph","text":"中国共产党中央委员会主席毛泽东"},{"type":"paragraph","text":"一九四九年十一月十九日[1]兰那地夫，当时任印度共产党总书记。"}],"authors":["毛泽东"],"dates":[{"year":1949,"month":11,"day":19}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":526,"page_end":526},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9d31415e65"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
