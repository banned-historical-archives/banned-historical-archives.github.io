ntent.com/banned-historical-archives/banned-historical-archives11/main/data/1739/1739.pdf"],"article":{"title":"王洪文一九七六年十月三日在平谷县的讲话（节录）","alias":"","parts":[{"type":"paragraph","text":"G408-34.，供批判用·"},{"type":"paragraph","text":"王洪文一九七六年十月三日"},{"type":"paragraph","text":"在平谷县的讲话（节录）"},{"type":"paragraph","text":"一九七六年十一月王洪文一九七六年十月三日"},{"type":"paragraph","text":"在平谷县的讲话（节录）"},{"type":"paragraph","text":"中央出了修正主义，你们怎么办？打倒！别人搞修正主义我也打倒他，我搞修正主义，你们也来造反。最好是不出修正主义，但这只是个人愿望，实际上是不可能的。建国以来，中国就出了高岗、饶漱石，彭德怀，刘少奇，林彪，邓小平，不出是不可能的。今后还可能出什么唐小平、王小平之类，要警惕！不只是邓小平搞修正主义，出是可能的，不出是奇怪的。"},{"type":"paragraph","text":"XX"},{"type":"paragraph","text":"X"},{"type":"paragraph","text":"我们要和贫下中农划等号，你们也要和工人阶级、贫下中农划等号，你们要在农村多呆一段时间，要把眼睛睁的大大的看着修正主义，包括我。我这个人又听人家的，又不听人家的。"},{"type":"paragraph","text":"e-- 1 --"}],"authors":["王洪文"],"dates":[{"year":1976,"month":10,"day":3},{"year":1976,"month":11}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":2},"tags":[{"name":"邓小平","type":"人物"},{"name":"王洪文","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b1735f0bf4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
