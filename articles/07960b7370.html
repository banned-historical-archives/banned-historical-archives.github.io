script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"威尔科克斯同志和希尔同志举行会谈  双方认为现代修正主义是造成今天国际共运不团结的力量","authors":[],"dates":[{"year":1964,"month":12,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"威尔科克斯同志和希尔同志举行会谈"},{"type":"paragraph","text":"双方认为现代修正主义是造成今天国际共运不团结的力量"},{"type":"paragraph","text":"新华社十八日讯　墨尔本消息：据澳大利亚共产党（马克思列宁主义者）机关报《先锋报》报道，新西兰共产党总书记维·乔·威尔科克斯最近访问了墨尔本，并且同澳大利亚共产党（马克思列宁主义者）主席爱·弗·希尔等领导人举行了非正式会谈。"},{"type":"paragraph","text":"在会谈中，双方讨论了同世界马克思列宁主义运动密切相关的问题。双方一致认为，各国的现代修正主义者的活动是主要危险，也是造成今天国际共产主义运动中的不团结的力量。"},{"type":"paragraph","text":"双方一致认为，苏联共产党采取的解除头号修正主义者赫鲁晓夫的职务的行动虽然造成了恢复团结的可能性，但是同时认识到，仍有许多困难妨碍各国共产主义运动在马克思列宁主义，一九五七年宣言和一九六○年八十一党声明的基础上实现有原则的团结。"},{"type":"paragraph","text":"双方一致认为，无产阶级和共产党人的责任是为了这个目的而再接再厉地进行斗争。"},{"type":"paragraph","text":"澳大利亚共产党（马克思列宁主义者）方面参加会谈的还有党的副主席帕·马隆，克·奥谢和书记弗·约翰逊。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"07960b7370"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
