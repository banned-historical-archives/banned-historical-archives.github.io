ar":1964,"month":5,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"邹依仁在《中国经济问题》第二、三期合刊发表《现代资产阶级统计学派学术思想的剖析》一文，论述资产阶级统计学的各种学术流派，特别详尽地论述了社会学派和数理学派的发生和发展及其对各国，尤其是对旧中国的影响。"},{"type":"paragraph","text":"文章在批判社会学派时说，它是以唯心主义哲学和庸俗的政治经济学作为理论根据的，因此它不可能对社会现象及其规律性作出真正的科学说明；其次，社会学派在统计理论与统计实践的联系方面发生严重的矛盾，而且这种矛盾是不可能解决的。"},{"type":"paragraph","text":"接着，文章批判了数理学派，指出它实际上就是资产阶级社会经济统计学和数理统计学的混合物。它的根本性错误在于把推论统计学的方法以及其他有关的一些数学方法硬套在社会经济现象的研究方面，也就是把自然界现象、自然规律和社会现象、社会规律完全等同和混淆起来，使社会经济现象的统计研究完全走上了形式主义数学的道路，从而达到掩盖资本家剥削的实质，欺骗人民，为资本家效劳的目的。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0970fbca27"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
