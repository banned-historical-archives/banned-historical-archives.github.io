rt":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东文物馆正式动工","authors":["苏晓洲"],"parts":[{"type":"paragraph","text":"毛泽东文物馆是韶山“一号工程”建设中的主体工程，于去年12月26日奠基，选址位于毛泽东同志纪念馆南侧。按照“可持续发展”和“生态优先”、“以人为本”的原则，这座建筑东西南三面环山，依山而建，与韶山冲自然生态浑然一体。全馆分为文物库房区和陈列展示区。"},{"type":"paragraph","text":"2004年，党中央、国务院把韶山与井冈山、延安一起确立为全国爱国主义教育示范基地“一号工程”。韶山“一号工程”定位为突出“毛泽东领导中国人民站起来”的主题，建设包括毛主席遗物保护和陈列布展工程，毛泽东同志铜像广场改扩建，韶河及沿线整治，毛泽东故居及纪念馆周边道路改造，信息、通信、监控管理系统改造等项目。这项总投资达2.9亿元的系统工程，将于2007年完成。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c35dfc46df"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
