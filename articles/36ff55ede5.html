script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"南京工商界举行五反动员大会当场逮捕大奸商八名柯庆施市长号召全市人民紧密团结打垮资产阶级向人民国家的猖狂进攻","authors":[],"dates":[{"year":1952,"month":2,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社南京八日电】　南京市工商界六日举行反对行贿、反对偷税漏税、反对盗骗国家资财、反对偷工减料、反对盗窃国家经济情报动员大会、参加大会的有工商界一百四十三个行业以及各界代表三千八百多人、会外有五十多万人收听大会实况广播、大会从下午一点半开到晚上十一点，收到各界人民检举和控诉不法商人罪行的信件两万多封，电话一千二百多次，南京市人民政府接受群众要求，当场逮捕了罪恶重大而又拒不坦白的奸商八名。"},{"type":"paragraph","text":"南京市工商界反对行贿、反对偷税漏税、反对盗骗国家资财、反对偷工减料、反对盗窃国家经济情报的运动，是从去年十二月底经过各界人民代表会议讨论决定后开始的、一个多月来，人民群众检举和工商界初步坦白的案件近四万件、在这些案件里面，仅营造、五金、水电、树木竹等十八个行业的奸商行贿款项就有三十三亿九千多万元、奸商所获暴利以及国家财产所受的损失目前还无法统计，但从以下几个例子中就可以看到问题的严重性:原来只有二百五十万资金的安平水电行，二年来采用一切卑劣手段盗骗国家资财，现在已变成拥有十亿元资金的暴发户；新中、锐声等营造厂承包某项工程时，串通工程人员抬高标价、偷工减料，使国家损失十七亿元；卷烟业的偷税户占全业百分之七十七，仅据几户的初步材料统计，国家税收损失就达四十七亿元；百货业漏税户占百分之八十以上。"},{"type":"paragraph","text":"在动员大会上，市工商业联合会筹委会副主任委员黄希仁、中国水泥公司南京分公司经理徐美峰、水电业同业公会副主任委员韦寿萱、庆和漆庄经理朱圣庆等都初步坦白了自己的不法行为、接着，店员、工人、机关和部队干部一个接一个地检举和控诉不法资本家的罪行、大会内外五十多万群众对于这些不法资本家的罪行莫不十分愤恨、在群众送交大会的两万多封检举信中，有店员检举老板的，儿女检举父亲的，妻子检举丈夫的，母亲检举儿子的，邻居检举邻居的、收听大会广播的店员顾友良，当场撕毁了他和老板订立的“生死同盟条约”，检举了老板的三十三件行贿、伦税等不法行为、店员周伟听了机关干部控诉不法资本家的罪行后，立即把他老板的两本假账送给大会、家庭妇女胡正仕向大会检举她丈夫宋大年诈骗国家财产的罪行，她说:“我不能承认这个盗骗国家资财的贼是我的丈夫。”老太太王俞氏收听广播时检举了她儿子长期偷税的不法行为、南京大学一个女生写信给大会，要求人民政府逮捕她的拒不坦白的父亲。"},{"type":"paragraph","text":"大会主席团接受群众要求，指名新中营造厂经理陈文焕、安平水电行经理张志明、大来木行经理李昌富等十二个罪恶重大的奸商上台当众坦白、其中，陈文焕等八个奸商吞吞吐吐，拒不坦白，在群众齐声要求下，人民政府当场把他们逮捕起来；李昌富等四人尚肯坦白，人民政府限期他们在两天内彻底交代清楚。"},{"type":"paragraph","text":"最后，大会请市长柯庆施讲话，柯庆施代表南京市人民政府宣布:限令全市工商界不法分子从二月七日起到十一日止，在这五天内彻底坦白，柯庆施警告说:有些拒不坦白的奸商，还在公开叫嚣“宁可坐牢保财产，不愿坦白退脏款。”这些奸商必将自食恶果、只有彻底坦白并积极参加检举，才是唯一的光明道路、他最后号召全市各界人民，包括正当守法的工商业者在内，紧密地团结起来，对不法资本家群起而攻之，打垮资产阶级向人民国家的猖狂进攻。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"36ff55ede5"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
