script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoistlegacy.de-2347","name":"黑龙江省国家行政机关工作人员行政纪律处分批准权限的暂行规定","author":"黑龙江省人民政府","internal":false,"official":false,"type":"unknown","files":[],"article":{"title":"黑龙江省国家行政机关工作人员行政纪律处分批准权限的暂行规定","dates":[{"year":1981,"month":1,"day":5}],"is_range_date":false,"authors":["黑龙江省人民政府"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"中共黑龙江省委核查“三种人”小组办公室, 核查“三种人”文件选编, 140-142","tags":[{"name":"处分","type":"主题/事件"},{"name":"纪律","type":"主题/事件"},{"name":"行政机关","type":"主题/事件"}],"parts":[{"type":"title","text":"黑龙江省国家行政机关工作人员行政纪律处分批准权限的暂行规定"},{"type":"paragraph","text":"根据一九五七年《国务院关于国家行政机关工作人员的奖惩暂行规定》，对于国家行政机关工作人员行政纪律处分的批准权限，暂作如下规定："},{"type":"paragraph","text":"一、处分的批准权限"},{"type":"paragraph","text":"1、经各级人民代表大会选举担任政府行政职务的人员，受警告、记过、记大过和降级处分，由上级人民政府决定后执行。对于严重违反纪律，不适合担任现任职务的，应该由本级人民代表大会予以罢免，并由本级人民政府报上级机关备案。经人大常委会任命的政府工作人员受警告、记过、记大过和降级处分，由上级人民政府决定后执行，受降职、撤职、开除留用察看和开除公职处分，由本级人民政府决定，提交本级人大常委会核准后执行，同时报送上级机关备案。"},{"type":"paragraph","text":"2、 省人民政府任命的副局长（相当职务人员）受行政纪律处分，由各该机关提出意见报省人民政府决定和执行。"},{"type":"paragraph","text":"3、 省人民政府任命的处长、副处长（相当职务人员）受警告、记过、记大过和降级处分，由各该机关决定和执行，并报任命机关备案；受降职、撤职、开除留用察看和开除公职处分，由各该机关提出意见报省人民政府决定和执行。"},{"type":"paragraph","text":"4、 省人民政府直属机关自行任命的干部，受警告、记过、记大过、降级、降职、撤职和开除留用察看处分，由各该机关决定和执行；受开除公职处分，由各该机关决定，报省人民政府批准后执行。"},{"type":"paragraph","text":"5、 省人民政府授权由行署任命的干部，受警告、记过、记大过、降级、降职、撤职、开除留用察看处分，由行署决定和执行，并报省人民政府备案；受开除公职处分，由各该机关提出意见，行署决定，报省人民政府批准后执行。"},{"type":"paragraph","text":"行署自行任命的干部，受警告、记过、记大过和降级处分，由各该机关决定和执行；受降职、撤职、开除留用察看和开除公职处分，由各该机关决定，报行署批准后执行。"},{"type":"paragraph","text":"6、 市、县人民政府自行任命的干部，受警告、记过、记大过、降级、降职、撤职、开除留用察看和开除公职处分，由市、县人民政府决定和执行。具体巿批权限，可根据本规定，由市、县人民政府自行拟定。"},{"type":"paragraph","text":"二、处分的承办手续"},{"type":"paragraph","text":"1、行政机关干部违反行政纪律给予处分时，一般都应该经过各该机关的群众会议讨论，并应通知受处分人出席申诉意见。同时，要让受处分人在处分决定上签字，如其不签，由该机关写明情况备查。然后由各该机关提出书面报告，按干部管理权限，报干部主管部门审批。"},{"type":"paragraph","text":"对给予违反行政纪律干部的处分，在决定批准之前，批准机关必须全面审查案卷，指定适当的干部同受处分人谈活，听取他的意见，进行必要的思想教育。纪律处分经决定或批准生效后，应向群众宣布，书面通知本人，并将处分决定装入本人档案。"},{"type":"paragraph","text":"2、 报请上级机关审批的处分案件，必须有处分决定、综合材料或调查报告、证言、证（据）复制件、受处分人的检查和对处分的意见等材料。"},{"type":"paragraph","text":"上报备案的案件，必须有处分决定，受处分人的检查和对处分的意见等材料。"},{"type":"paragraph","text":"3、 党员干部违反行政纪律，凡给予党纪和行政纪律双重处分的，其行政纪律处分可根据各级党委的决定或建议，由各级人事部门负责承办行政纪律处分手续，按行政干部任免权限呈报有关部门批准。承办完结，可将党委的处分建议、处分决定等有关材料，随批复文件存入文书档案。"},{"type":"paragraph","text":"三、 处分的承办部门"},{"type":"paragraph","text":"1、干部受行政纪律处分的审批手续，按干部管理权限，由各级人事部门承办。"},{"type":"paragraph","text":"2、 省人民政府局长、副局长（或相当职务人员）受各种行政纪律处分，省人事局承办手续后，由省人民政府行文；其他干部的行文按干部任免权限，由人事部门请示同级人民政府确定。"},{"type":"paragraph","text":"四、 其他"},{"type":"paragraph","text":"1、 前省革委会龙发〔1972〕271号文件第二项关于“行政处分批准权限”即行作废。"},{"type":"paragraph","text":"2、 事业单位工作人员受行政纪律处分的审批权限，可参照本规定执行。"},{"type":"paragraph","text":"3、 本规定如与国家规定有抵触时，按国家规定办法执。"},{"type":"paragraph","text":"（黑政发〔1981〕第3号文件，一九八一年一月五日）"}],"alias":""},"tags":[{"name":"黑龙江文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e525ebaa87"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
