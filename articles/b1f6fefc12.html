93,"month":12,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"百部爱国主义影片介绍毛泽东和他的儿子"},{"type":"paragraph","text":"１９５０年秋，毛泽东决定组成中国人民志愿军赴朝参战，并将自己的长子毛岸英交给志愿军司令员彭德怀，奔赴前线。不久，毛岸英在朝鲜牺牲。毛泽东丧子，心情异常悲痛。毛岸英的妻子刘思齐整日思念丈夫，却不知他早已牺牲。毛泽东强忍悲痛，将全部精力投入工作，但儿媳刘思齐每周一次的探望使他痛苦不已。在周恩来的鼓励下，毛泽东终于将毛岸英牺牲的真相告诉了儿媳刘思齐。刘思齐流着泪走了。毛泽东独自沉浸在对几位已故亲人的无限怀念之中……本片由潇湘电影制片厂摄制，张今标导演。（附图片）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b1f6fefc12"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
