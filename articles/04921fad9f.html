ical-archives/banned-historical-archives0/main/maoquanji32.pdf"],"article":{"title":"为爱晚亭题名","alias":"","parts":[{"type":"paragraph","text":"为爱晚亭题名凹"},{"type":"paragraph","text":"（1952年9月）爱晚亭"},{"type":"paragraph","text":"[1]爱晚亭，位于岳麓山下清风峡中，亭坐西向东，三面环山。出岳麓书院后门，沿石径行200米，便是爱晚亭。清乾隆五十七年岳麓书院山长罗典创建。原名红叶亭，后湖广总督毕沅据唐代诗人杜牧《山行》“停车坐爱枫林晚”，改为爱晚亭。毛泽东青年时代，在第一师范求学，常与罗学、张昆弟等人一起到岳麓书院，与蔡和森聚会于爱晚亭下，纵谈时局，探求真理。因为这个缘故，1952年湖南大学重修爱晚亭时，校长李达致书毛泽东，请求题写亭名，毛泽东愉快地接受了请求。现在的爱晚亭亭匾，就是由毛泽东亲笔手书制成的。"}],"authors":["毛泽东"],"dates":[{"year":1952,"month":9}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":249,"page_end":249},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"04921fad9f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
