ical-archives/banned-historical-archives8/main/maoquanji12.pdf"],"article":{"title":"一二〇师应与傅作义协力击破西进之敌","alias":"","parts":[{"type":"paragraph","text":"一二师应与傅作义协力"},{"type":"paragraph","text":"击破西进之敌"},{"type":"paragraph","text":"（1938年3月6日）朱、彭，贺、萧、关："},{"type":"paragraph","text":"甲、据高双成?五日电称，府谷之敌已于三日被其左旅张团?击溃退回保德，府谷无敌等语；据陈奇涵称，离石、军渡、口之敌因攻击渡河无效，暂停进攻，口之敌正向临县运动；又据贺萧关称，傅作义一部正与大武镇之敌作战等语，判断该敌将主力分两路转向方山、临县，企图先击破傅作义部保障侧面安全，并配合东北两面三路敌之作战。据陈光罗荣桓白志文?称，县、大宁、午城镇之敌均向蒲县进，该三地及汾西均无敌；据贺萧关称，岢岚"},{"type":"paragraph","text":"[1]朱、彭，指朱德、彭德怀。贺、萧、关，指贺龙、萧克、关向应，当时分别任八路军第一二○师师长、副师长和政治委员。"},{"type":"paragraph","text":"[2]高双成，当时任国民党军第八十六师师长。"},{"type":"paragraph","text":"[3]左旅张团，指国民党军第八十六师第二五六旅（旅长左世允）第五一二团，团长张杰。"},{"type":"paragraph","text":"[4]陈奇涵，当时任八路军留守兵团绥德警备司令部司令员。"},{"type":"paragraph","text":"[5]傅作义，当时任国民党军第二战区北路前敌总司令、第七集团军总司令兼第三十五军军长。"},{"type":"paragraph","text":"[6]陈光、罗荣桓，当时分别任八路军第一一五师代师长和政治部主任。白志文，当时任八路军留守兵团警备第五团团长。之敌共不过八百人，但文水、交城之敌已进至娄烦镇以南等语，判断该敌企图占领静乐县，求与岢岚及大武镇之敌配合行动。"},{"type":"paragraph","text":"乙、据上情况，敌分五路包围一二○师及傅作义军，企图压迫我军渡河情况已明，但每路敌力均不大，我贺师“应与傅作义协力各个击破之。"},{"type":"paragraph","text":"丙、如王旅协同傅军力能击破由岢岚向五寨之敌，则以现至岚县东村镇之张旅转至娄烦镇，相机击破由娄烦向静乐前进之敌为有利。该地得手后，如大武镇之敌继续向方山前进，张旅第二步可协同傅作义军打方山之敌。如此可以保证静乐岢岚方山三县于我手中，使傅军不感敌之数面包围而能在普西北坚持作战。如觉王旅或张旅单独作战不能击破敌之一路，而集中则确能击破一路，则以集中打一路为合宜。但打岢岚一路为宜或打娄烦一路为宜，须依当前情况妥为决定。"},{"type":"paragraph","text":"丁、既有傅军八个团在临县以南，足以威胁口、军渡之敌，张旅自不必再往口、军渡方向。目前重点在坚决击破正向静乐方山五寨三点前进之敌，必须击破此三路中之一路或二路，方能破坏敌之包围计划，巩固普西北根据地，策应其他区域之作战。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"六日二十四时[1]贺师，指八路军第一二○师，师长贺龙。[2]王旅，指八路军第一二○师第三五九旅，政治委员王震。[3]张旅，指八路军第一二〇师第三五八旅，旅长张宗逊。"}],"authors":["毛泽东"],"dates":[{"year":1938,"month":3,"day":6}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":77,"page_end":78},"tags":[{"name":"贺龙","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f637b922bc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
