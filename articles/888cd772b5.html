<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"电影剧本“神龛记” 为资产阶级作宣传","authors":["阿里"],"dates":[{"year":1952,"month":2,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"阿里"},{"type":"paragraph","text":"前些日子，得到一个机会看到了“神龛记”的电影剧本，据说已经拍成电影，等待上映了。“神龛记”的故事内容，是描写在某城市里，有一个资本家，他所经营的百货公司，生意清淡，因此由于他没有认识到工商业的前途，缺乏信心，准备关店，可是店员们是认清只要老老实实做生意是有前途的，于是设法打通老板企图关店的消极态度，积极鼓励他改变营业方针，出售日常必需品，为劳动人民服务。他在店员们的要求之下，算是答应了，但是却把大部份资金移动，与某老板娘合伙，囤积棉纱。把一小部份充作公司的资金，店员们为了一心要把公司搞好，只好把这些菲薄的资本去购货。新的营业开始后，生意非常好，店员们也都兴高彩烈的工作着。可是这个老板却干起逃税的不法行为来了，他叫老账房造假账，欺蒙税收人员，最后算是悔悟过来，撕毁了假账簿，向政府坦白。"},{"type":"paragraph","text":"这个剧本的主要企图就是为了说明一个资本家从落后到所谓“转变”，甚至是认清工商业的前途，愿在新社会中做一个有利于国民生计的正当商人。剧本描写这个老板很可爱。但是试问，像这样一个对我们国家的工商政策采取抗拒态度，在职工的鼓励下，敷衍了事的改变了营业方针，把店勉强开下去的不法商人，像这样一个不肯老老实实经营业务，利令智昏，移动资金，囤积棉纱，投机倒把，贪图厚利的不法商人；像这样一个以偷税漏税的极端自私自利的行为来盗窃国家财产的不法商人，是值得编导者，以如此温情的态度去加以同情吗?直接了当的说，这些危害国家经济建设的不法行为是不能容忍的，显然，这是编导者对资产阶级的本质认识肤浅，糊涂的缘故。资产阶级三年来，千方百计地破坏共同纲领，用各式各样糖衣炮弹来腐蚀我们的革命干部，达到盗窃国家财产的卑劣行为，并篡夺我们工人阶级的领导权，这些事实证明资产阶级是这样肆无忌惮的向我们猖狂进攻，而“神龛记”的作者却熟视无睹。"},{"type":"paragraph","text":"再说，剧本中的那个老账房，他是一个高级职员，是老板的唯一亲信，他最后扪心自问，替老板造假账是犯法的，而坚决要离开，他并不是因思想提高，认识资本家的可憎嘴脸，憎恨这种逃税是直接危害人民利益，危害国家收入的不法行为，而单纯是为了害怕祸惹到自己身上而已。这与目前轰轰烈烈的五反运动中，一般高级职员、老年工人，在工会、青年团员、积极店员的不断教育和启发下，纷纷打破顾虑，不受老板利用，大胆检举，控诉不法老板的罪行是恰恰相反的。"},{"type":"paragraph","text":"还有，剧本中所描写的一些积极店员，始终对老板的消极对待营业，以及移用资金、投机倒把、企图攫取暴利、有计划地逃税等损害国家利欲薰心的可恶行为，好像没有办法去揭发。同时对老账房的启发和教育根本就是不够的，好像最后是老账房自己“良心”发现和怕事，才吐露老板的偷漏行为的。这显然是严重地忽视了积极店员在群众中的作用以及督促资方走向正路的推动作用。这是不真实的。"},{"type":"paragraph","text":"“神龛记”的作者是严重地受了资产阶级的思想影响，对资产阶级的面目和不法行为引不起憎恨，反而还在作品中为资产阶级塑造动人的形象，以此为资产阶级作宣传说明“神龛记”的作者对资产阶级的生活方式及思想意识，不能本质的去认识。这也说明在我们影剧工作者中间确有一部份人在自己的思想深处，严重地受了资产阶级的影响的。希望本市的影剧工作者，积极投身于三反、五反的运动中，锻炼自己、改造自己，洗刷自己的资产阶级思想影响，正视资产阶级的丑恶，为这一场严重的阶级斗争而努力。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"888cd772b5"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
