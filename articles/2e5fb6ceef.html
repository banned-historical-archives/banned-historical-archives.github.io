,"dates":[{"year":1981,"month":1,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社北京一月二十九日电　国家民委副主任杨东生(藏族)说，特别法庭依法对林彪、江青反革命集团的判决，表达了全国各族人民的心愿。它再一次宣告，任何危害国家安全、破坏民族团结的罪人，是不会有好下场的。"},{"type":"paragraph","text":"杨东生在同记者的谈话中，愤怒控诉了林彪、江青反革命集团破坏民族团结的累累罪行。他说，在十年动乱中，林彪、江青一伙践踏党的民族政策，破坏少数民族的平等权利和自治权利，推行封建法西斯的民族政策，制造了象“内人党”等冤假错案。这伙民族败类的捣乱破坏，给少数民族人民和少数民族工作带来了深重的灾难。"},{"type":"paragraph","text":"杨东生说，粉碎“四人帮”后，重申了党的民族政策，拨乱反正，使民族工作和民族地区的各项事业有了较大的恢复和发展。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"江青","type":"人物"},{"name":"林彪","type":"人物"},{"name":"四人帮","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2e5fb6ceef"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
