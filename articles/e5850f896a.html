rt":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"缅甸一女作家谴责印度投靠美国她说，美帝正利用假中立主义者和修正主义者反对共产主义和镇压民族解放斗争","authors":[],"parts":[{"type":"paragraph","text":"新华社仰光6日电 缅甸著名女作家都阿玛今天在《人民报》上发表文章说：印度政府加紧扩军备战和进行反华宣传，目的之一是要求得到更多的“美援”和转移印度人民对国内困难的注意。"},{"type":"paragraph","text":"她指责印度政府目前将军事费用增加一倍，接受世界上最大的帝国主义的军事援助，进行战争准备。"},{"type":"paragraph","text":"她说，美帝国主义者正在利用假中立主义者和修正主义者来反对共产主义和镇压民族解放斗争。因此，美国要印度扮演重要的角色和供应它大量军事“援助”就不足为奇了。"},{"type":"paragraph","text":"她谴责印度一些好战分子在叫喊着“对共产主义宣战”，“占领西藏”，和“对中国宣战”。她还谴责尼赫鲁政府大规模逮捕进步人士、工人、农民和爱国人士。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e5850f896a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
