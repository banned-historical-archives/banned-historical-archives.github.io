script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"十多位社会科学家谈反对资产阶级自由化  宣传马克思主义要理直气壮","authors":[],"dates":[{"year":1987,"month":1,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"十多位社会科学家谈反对资产阶级自由化"},{"type":"paragraph","text":"宣传马克思主义要理直气壮"},{"type":"paragraph","text":"新华社北京1月17日电　在中国社会科学院今天召开的座谈会上，社会科学界的十多位著名学者就坚持四项基本原则、反对资产阶级自由化问题发表了意见。"},{"type":"paragraph","text":"中国社会科学院院长胡绳说，党的十一届三中全会以来，我们的改革和建设成绩显著，社会安定，人民满意，这是世界公认的。但是，在这样的大好形势下，确有个别人利用开放搞活、百家争鸣的形势鼓吹资产阶级自由化，否定社会主义，主张“全盘西化”，攻击党的领导。"},{"type":"paragraph","text":"胡绳说，知识界绝大多数同志是拥护四项基本原则的，不少人对资产阶级自由化也是抵制的，反对的，但在相当长的时期里，正面阐述四项基本原则的声音不大，批判资产阶级自由化的声音不大，有的人站出来讲话，也没有得到应有的支持，结果使许多被错误思潮搞乱的问题没有得到及时澄清。"},{"type":"paragraph","text":"胡绳认为，不旗帜鲜明地坚持四项基本原则，不旗帜鲜明地反对资产阶级自由化，安定团结的局面就不能维持，社会主义建设就要受到危害。"},{"type":"paragraph","text":"哲学家贺麟在发言中说，有人把马克思主义看作是百家争鸣中的一家，这实际是否定马克思主义是指导我们思想的理论基础。马克思主义不是一般的一家，而是占主导地位、起指导作用的一家，百家争鸣必须在马克思主义指导下进行。"},{"type":"paragraph","text":"近代史研究所名誉所长刘大年指出，资产阶级自由化思想的流传，同有些人宣扬马克思主义过时有关。我们社会科学工作者有责任站出来，从理论的高度上，结合实际，回答这个问题。只要资本主义还存在，就必然会有资产阶级对马克思主义的否定。我们要看到，反对资产阶级自由化是一项长期的任务。"},{"type":"paragraph","text":"宗教研究所名誉所长任继愈谈到，我们在马克思主义理论研究方面取得的成果，已经引起了国际上的重视。我们要理直气壮地宣传这些成果，不仅要宣传马克思主义的基本原理，而且要宣传用马克思主义基本原理指导解决具体问题所取得的成果。"},{"type":"paragraph","text":"文学研究所研究员唐弢说，鼓吹“全盘西化”，不仅是否定社会主义，也是否定自己的民族。"},{"type":"paragraph","text":"许涤新、吕叔湘、苏秉琦、安志敏、陈述、傅懋勣、胡厚瑄、巫宝三、杨一之等，也在会上发了言。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3018606086"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
