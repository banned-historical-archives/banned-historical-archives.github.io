<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"内蒙古胡风分子及有各种问题的人采取各种方法阻挠和破坏肃反斗争的开展","authors":[],"dates":[{"year":1955,"month":7,"day":13}],"is_range_date":false,"parts":[{"text":"内蒙古胡风分子及有各种问题的人采取各种方法阻挠和破坏肃反斗争的开展","type":"title"},{"text":"【内蒙古分社十三日讯】内蒙古自治区自开展肃清胡风反革命集团运动以来，胡风分子和有胡风分子嫌疑的，有类似胡风思想以及有各种问题的人，采取了各种方法转移视线，企图阻挠、破坏运动的开展。","type":"paragraph"},{"text":"第一种是不交代问题，污蔑领导，造谣生事，进行破坏活动。六月二十五日，内蒙古工会厕所突然起火，在扑灭后检查证明是化学燃料燃烧(对纵火人已掌握线索)的。人民银行内蒙区行干部史永镜(为中央军五十七师国民党特别党部书记)说：“内蒙党(指我党)分两派，一派以乌兰夫为首，一派是绥远的”。交通局吉力木图说：“现在的社会一天比一天压力大。”工农速成中学的一个胡风嫌疑分子，暗地里烧毁信件、材料。","type":"paragraph"},{"text":"第二种是伪装积极，拉拢群众，蒙蔽过关。司法厅刘××(在香港、缅甸住过，曾给香港国民党报纸写过稿子)、人民银行梁××(军统特务)与胡风分子白××，伪装积极。有些有问题的人，还写假检举材料。工业厅李××(历史有重大问题，对党一贯不满)和王××(和英国间谍有联系)，最近，请另外三个同志下馆子吃饭，企图拉拢帮助他们过关。","type":"paragraph"},{"text":"第三种是沉默寡言，消磨时间，企图过关。他们在学习中多不发言，发言也只讲好不讲坏，甚至光说过去，不说现在(尤其是起义干部)，跟着党团员跑，河套行政区干部刘××(阿垅学生)发言时，照报纸念。","type":"paragraph"},{"text":"第四种是各小集团之间和内部互相攻击。政治情况复杂的人民建设银行内蒙区行地方拨款科内的两个小集团的主要分子，互相攻击对方为胡风分子，贾××在会上说：“我现在已有书面材料交人事科。”另一个(冯××)则说：“这等于胡风三十万字的所谓报告。”畜牧兽医学院一个小集团内部也在互相揭发，原因何在，还不大清楚。","type":"paragraph"},{"text":"现全区已发现的胡风分子及有嫌疑的人，已有五、六个。河套行政区逮捕一个胡风分子后，继续发现由这个胡风分子所组织的“文艺小组”。","type":"appellation"},{"text":"在运动中已发生重大泄密事件，统计局一个已被开除出团的干部，曾在一次座谈会上向群众一一介绍了我们反胡风的方针、步骤、方法。该干部由何得知这一情况，现正追查中。","type":"paragraph"},{"text":" (陆勃)","type":"paragraph"}],"comments":[],"origin":"1955年7月20日新华通讯社编《内部参考》。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"65faaadd55"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
