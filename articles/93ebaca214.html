<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"光焰无际的毛泽东思想又一伟大胜利我国最大的工频热处理设备在沪诞生上海重型机器厂无产阶级革命派以最快的速度，最好的质量，最低的成本制造出这一工业上迫切需要的设备","authors":[],"dates":[{"year":1967,"month":10,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社上海二十日讯　我国最大的工频热处理设备，以最快的速度，最好的质量，最低的成本，在史无前例的无产阶级文化大革命中，在上海重型机器厂诞生了。这是光焰无际的毛泽东思想的伟大胜利。它说明:无产阶级文化大革命促进了人的思想革命化，因而使各项工作做得更多更快更好更省。"},{"type":"paragraph","text":"国家工业的发展，迫切需要巨型的冷轧机，这种冷轧机的轧辊，质地要求非常硬，而且又长又大又重。因为冷轧机轧钢板就是要通过这些轧辊，把没有加过热的很宽的合金钢板轧薄。要解决这样大轧辊的表面淬火，通常是先在“并式炉”内加热，然后再放到油槽或水槽内淬火。这种办法，工艺复杂，难以掌握，成品率低，并且周期很长，成本也高。工频热处理是一项新技术，用这种办法，可以边加热边淬火，工艺简单，成品率高，质量好，周期压缩一半，成本只有前者的三分之一。"},{"type":"paragraph","text":"轧辊的工频淬火，在我国是由沈阳重型机器厂首先采用的。然而，要解决直径二米大轧辊淬火的工频热处理设备，不但我国没有，而且在世界上也很难找到。"},{"type":"paragraph","text":"无产阶级文化大革命的滚滚风雷，摧毁了党内最大的一小撮走资本主义道路当权派强加在人们精神上的枷锁。上海重型机器厂无产阶级革命派，以大无畏的战斗姿态，挑起了革命和生产的两副重担。他们遵循毛主席的教导，以“老三篇”为座右铭，以《实践论》为行动纲领，只用了十个月的时间，多快好省地把这台身高十米的设备制成了。"},{"type":"paragraph","text":"我们的伟大领袖毛主席教导我们说:“中国人民有志气，有能力，一定要在不远的将来，赶上和超过世界先进水平。”到去年第三季度，巨型冷轧机的制造剩下三个最大的关键问题。如何解决这一关键?有的部门的原领导人感到棘手，不愿意挑起这副重担。然而，有几位普通车工、钳工、热处理工和电工却勇敢地挑起了这副重担。"},{"type":"paragraph","text":"在革命领导干部的支持下，以这些同志为主，再配备上部分工人和连中专学校也没有进过的机械、电器技术员，组成了一支小分队，开始工作了。"},{"type":"paragraph","text":"这个厂的无产阶级革命派从党内一小撮走资本主义道路当权派手中夺了权后，全力支持了工频设备小分队，把工频设备的命运完全掌握在无产阶级革命派手中。"},{"type":"paragraph","text":"一台大型工频热处理设备诞生了。毛泽东思想武装起来的工人，就是能用自己的双手创造出人间的奇迹。"},{"type":"paragraph","text":"\u003cIMG alt=请插入5号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1967\\10\\67am040101.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e我国最大的工频热处理设备，在上海重型机器厂诞生了。这台工频热处理设备有十米高。　新华社稿\u003c/FONT\u003e"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"93ebaca214"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
