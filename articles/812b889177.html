art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席的伟大号召是我们前进的指路明灯","authors":["“支左爱民模范排”"],"parts":[{"type":"paragraph","text":"毛主席关于“团结起来，争取更大的胜利”的伟大号召，概括了“九大”的基本精神，是我们前进的指路明灯，胜利的根本保证。我们一定象好排长李文忠那样，毛主席指示我照办，毛主席挥手我前进，同广大革命群众一起，把团结搞得好好的，争取更大的胜利。"},{"type":"paragraph","text":"回顾我们在三支两军工作中，有个革委会的领导成员，由于滋长了骄傲自满情绪，影响了领导班子内部的团结。这时，一小撮阶级敌人乘机而入，破坏抓革命、促生产。我们发现这种情况，就及时和革委会成员一起联系实际学习毛主席关于“国家的统一，人民的团结，国内各民族的团结，这是我们的事业必定要胜利的基本保证”的教导，使大家认识到：有了在毛泽东思想基础上的团结，才能更好地发挥无产阶级专政的威力，狠狠地打击一小撮阶级敌人。革委会成员在提高认识的基础上，从团结的愿望出发，通过斗私批修，消除了隔阂，加强了团结。大家胸怀巩固无产阶级专政的目标，团结一致，共同对敌，使新生的革命政权在阶级斗争的暴风雨中不断地发展、巩固，成为坚不可摧的战斗堡垒。这件事使我们深刻体会到，加强革命的团结，是革命的需要，是阶级斗争的需要，是巩固无产阶级专政的需要。"}],"alias":""},"tags":[{"name":"三支两军","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"812b889177"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
