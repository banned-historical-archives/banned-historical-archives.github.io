ical-archives/banned-historical-archives8/main/maoquanji17.pdf"],"article":{"title":"致周恩来电","alias":"","parts":[{"type":"paragraph","text":"致周恩来电！"},{"type":"paragraph","text":"（1942年6月13日）"},{"type":"paragraph","text":"二十二个文件的学习在延安大见功效，大批青年干部（老干部亦然）及文化人如无此种学习，极庞杂的思想不能统一。华北、华中斗争极紧张残酷，要熬过今明两年须费极大牺牲，两年后如能保存现有军队（五十七万）的一半，全国则保存现有党员（八十万）的一半，便是胜利。大后方党宜将省委、特委一概取消，只留县委、区委，必要时连县、区委也取消，只留支部，便可大量保存，否则是无法保存的。省、特、县、区四级干部均转入支部工作，可以开辟很多新支部，其任务是勤学、勤业、交朋友三项，以待时机，除有据点者外（如方方）请下决心办理。"}],"authors":["毛泽东"],"dates":[{"year":1942,"month":6,"day":13}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":83,"page_end":83},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"03a733aff3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
