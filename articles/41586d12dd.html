":[],"dates":[{"year":1963,"month":2,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京9日电】　中国共产党中央委员会副主席刘少奇，在英国共产党代表团在北京逗留期间，接见了英共总书记约翰·高兰和英国《工人日报》主编乔治·马修斯，进行了友好的会谈。在会谈中，双方各自表达了对于有关问题的观点。"},{"type":"paragraph","text":"接见时在座的，有中共中央政治局候补委员、书记处书记康生同志。"},{"type":"paragraph","text":"【新华社北京9日电】　英国共产党总书记约翰·高兰和政治委员会委员、英国《工人日报》主编乔治·马修斯于今天乘飞机离开北京回国。"},{"type":"paragraph","text":"到机场欢送的有中共中央总书记邓小平和中央政治局候补委员、书记处书记康生。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"康生","type":"人物"},{"name":"邓小平","type":"人物"},{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"41586d12dd"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
