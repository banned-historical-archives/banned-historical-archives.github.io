ical-archives/banned-historical-archives0/main/maoquanji33.pdf"],"article":{"title":"对高级步兵学校政治队第二期教育计划的批语","alias":"","parts":[{"type":"paragraph","text":"对高级步兵学校政治队第二期教育计划的批语"},{"type":"paragraph","text":"（1953年6月4日）彭德怀\"同志："},{"type":"paragraph","text":"此件还你。未细看，望了一下，有几处修改”。另关于每天九小时半学习时间，似太多，改为八小时如何？尤其夏天，学生吃不消。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"六月四日[1]彭德怀，当时任人民革命军事委员会副主席。"},{"type":"paragraph","text":"[2]指人民革命军事委员会总政治部军校管理部1953年5月1日制订的中国人民解放军高级步兵学校政治队第二期教育计划。"},{"type":"paragraph","text":"[3]毛泽东对这个教育计划稿作了三处修改：一是将训练要求的第一条“加强马克思列宁主义、毛泽东思想的教育”一句话中的“毛泽东思想”五个字删去；二是将这一条中“了解由新民主主义过渡到社会主义的条件和道路”一句，改为“了解由新民主主义逐步地过渡到社会主义的条件和道路”；三是在“每天学习时间定为九小时半：正课六小时；复习射击教练、队列教练一小时；自习二小时半”一句中的“九小时半”处划了横线和问号，并在旁边批注：“似以八小时为好，即正课五小时，操练一小时，自习二小时。”"}],"authors":["毛泽东"],"dates":[{"year":1953,"month":6,"day":4}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":193,"page_end":193},"tags":[{"name":"毛泽东","type":"人物"},{"name":"彭德怀","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"07945fa766"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
