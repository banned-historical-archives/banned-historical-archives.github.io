torical-archives/banned-historical-archives9/main/books/wenji5.pdf"],"article":{"title":"今后不要提倡新式富农的意见是不对的","description":"根据手稿刊印。","dates":[{"year":1948,"month":3,"day":8}],"parts":[{"text":"今后不要提倡新式富农的意见是不对的","type":"title"},{"type":"paragraph","text":"说今后不要提倡新式富农的意见是不对的。我们提倡新式富农的目的和俄国革命后保存富农的目的是不相同的。中国富农经济不占重要成分，粮食供给主要依靠中农、贫农，并不是依靠富农，我们鼓励吴满有一类人之目的，在于这样能够稳定新旧中农，刺激其生产。如果过去这是需要的，现在这种情形仍未改变，不能说这种需要已不存在。如果中国的某些地区有依靠富农粮食供给的情形，那就鼓励富农经济更加是需要的了。一种模糊的违反经济要求的“左”倾情绪在人们的思想中作怪，在土地法公布后甚为普遍，做宣传工作的同志应当加以批判，而不应为其动摇而投降这种情绪。"},{"type":"paragraph","text":"毛 泽 东"},{"type":"paragraph","text":"三月八日"}],"comment_pivots":[{"part_idx":0,"offset":17,"index":1},{"part_idx":1,"offset":91,"index":2}],"is_range_date":false,"authors":["毛泽东"],"comments":["这是毛泽东在一份关于新式富农入党问题的电报稿上写的批语。","吴满有，陕西横山人，一九二八年逃荒到延安县务农，后经过土地革命分得了土地，发展成为新式富农。在陕甘宁边区大生产运动中他成绩突出，被评为劳动英雄。陕甘宁边区曾开展向吴满有学习的运动。"],"page_start":90,"page_end":90,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ab9f13102a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
