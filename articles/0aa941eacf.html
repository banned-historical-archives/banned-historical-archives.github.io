ical-archives/banned-historical-archives0/main/maoquanji28.pdf"],"article":{"title":"为李银桥题词","alias":"","parts":[{"type":"paragraph","text":"为李银桥?题词"},{"type":"paragraph","text":"（1950年7月12日）努力学习，学好后再做工作，为人民服务。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一九五〇年七月十二日"},{"type":"paragraph","text":"[1]李银桥（1927—2009），曾先后任毛泽东的卫士、副卫士长、卫士长。1950年，当李银桥从报上看到中直机关干部文化补习学校的招生启事后，便向毛泽东汇报了去上学的想法。临行前，他拿出一个黑漆皮面的练习本，请毛泽东题词留个纪念。毛泽东提起笔，想了想，便在第一页上行云流水一般写出：“努力学习，学好后再做工作，为人民服务。毛泽东一九五○年七月十二日”。"}],"authors":["毛泽东"],"dates":[{"year":1950,"month":7,"day":12}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":532,"page_end":532},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0aa941eacf"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
