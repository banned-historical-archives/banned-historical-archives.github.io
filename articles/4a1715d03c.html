ical-archives/banned-historical-archives8/main/maoquanji12.pdf"],"article":{"title":"对苏鲁豫皖边区的工作的指示","alias":"","parts":[{"type":"paragraph","text":"对苏鲁豫皖边区的工作的指示！"},{"type":"paragraph","text":"（1938年7月22日）郭洪涛，并告朱、彭并转中党："},{"type":"paragraph","text":"鱼电今日收到。"},{"type":"paragraph","text":"1．对石友三应继续采取争取的方针，表示接受其指挥，并表示援助他统一鲁南各游击队的指挥，同时要求他划出一定防地给我们作根据地与后方。"},{"type":"paragraph","text":"2.省委或八路军支队应派负责代表和石友三恳切谈一次，说明中共与八路军对他的希望并竭诚援助他，同时向他说明并吞各游击队的方针不对，必然要引起许多局部磨擦，除与日本勾结的土匪部队应肃清外，对各抗日游击队应采取容纳与争取的方针。"},{"type":"paragraph","text":"3.加强石部中下级党的组织工作，同时经过特别同志张友渔3去向石说明你们的意见和（来》影响石。"},{"type":"paragraph","text":"4.请将山东友军、政权及党组织情况经常电告。"},{"type":"paragraph","text":"毛服"},{"type":"paragraph","text":"养"},{"type":"paragraph","text":"[1]这是毛泽东和胡服（刘少奇）关于苏鲁豫皖边区的工作的指示给郭洪涛等的电报。"},{"type":"paragraph","text":"[2]“中党”二字可能有误。[3]张友渔，当时任中共山东省委联络局书记。"}],"authors":["毛泽东"],"dates":[{"year":1938,"month":7,"day":22}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":403,"page_end":403},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4a1715d03c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
