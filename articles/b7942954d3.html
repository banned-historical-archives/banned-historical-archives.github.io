art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东思想学习班就是好〔数来宝〕","authors":["总后“五·七”写作小组"],"parts":[{"type":"paragraph","text":"合：（朗诵）毛主席教导我们说：“办学习班，是个好办法，很多问题可以在学习班得到解决。”"},{"type":"paragraph","text":"甲：毛主席向全国人民发号召，革命群众斗志高。"},{"type":"paragraph","text":"乙：毛主席最新指示都照办，七亿神州红烂漫。"},{"type":"paragraph","text":"甲：学习班就是好，听我对你表一表。"},{"type":"paragraph","text":"乙：（白）你参加过学习班？"},{"type":"paragraph","text":"甲：咳！要不是参加学习班，我们怎么能下“山”！"},{"type":"paragraph","text":"乙：（白）下什么“山”？"},{"type":"paragraph","text":"甲：我们厂革命群众分两派，上了山头受了害。阶级兄弟打“内战”，事情越来越难办。"},{"type":"paragraph","text":"乙：（白）啊！你们那是派性山头。"},{"type":"paragraph","text":"甲：对！多亏了解放军同志帮助咱，办起了毛泽东思想学习班。两派代表都参加，可开始一言也不发。"},{"type":"paragraph","text":"乙：两派全都不说话，一定是对立情绪特别大。"},{"type":"paragraph","text":"甲：解放军毛主席著作学得好，把两派耐心来开导。"},{"type":"paragraph","text":"合：（朗诵）毛主席教导我们说：“在工人阶级内部，没有根本的利害冲突。”“两派要互相少讲别人的缺点、错误，别人的缺点、错误，让人家自己讲，各自多做自我批评，求大同，存小异。”"},{"type":"paragraph","text":"甲：毛主席最新指示威力大，两派说出了心里话。两派头头手握手，心情激动热泪流。两派头头一带头，革命群众斗私批修有劲头。学习班好处实在多，我们厂实现革命大联合。"},{"type":"paragraph","text":"乙：这回你来听我说，我们厂革命三结合的过程很曲折。一派同意厂长参加革委会，一派坚决来反对。本来实现了革命大联合，差点又闹得分了伙。"},{"type":"paragraph","text":"甲：（白）那你们是怎么解决的呢？"},{"type":"paragraph","text":"乙：厂里办起学习班，解放军帮咱学习“老五篇”，最新指示来对照，解放军帮咱开了窍。正确对待干部，是实现革命三结合的关键。“全无敌”一派先说话：派性的害处实在大。我们要厂长参加革委会，主要是为了显示自己方向对。"},{"type":"paragraph","text":"甲：（白）噢！原来是这么回事。"},{"type":"paragraph","text":"乙：“傲霜雪”一派接着把言发：我们的派性可真到了家，只因为我们争席位，就反对厂长参加革委会。"},{"type":"paragraph","text":"甲：（白）也是“私”字当头。"},{"type":"paragraph","text":"乙：学习班斗私批修摆战场，人人都来亮思想。认识错误马上改，两派共同帮助厂长站出来。"},{"type":"paragraph","text":"甲：学习班的好处说不完，你再听我谈一谈。我们厂革委会主任是党委副书记，开始工作有顾虑。他害怕再把错误犯，老账新账一起算。从他参加了学习班，工作精神大改观，毛主席著作活学活用得好，大家夸他是好领导。"},{"type":"paragraph","text":"乙：学习班是毛泽东思想大学校，能把派性克服掉。"},{"type":"paragraph","text":"合：克服派性，增强党性，无产阶级革命立场更坚定。紧跟伟大领袖毛主席，夺取文化大革命的全面胜利。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"派性","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b7942954d3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
