script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"毛主席接见苏联文化代表团中苏友协总会欢宴该团全体到京人员","authors":[],"dates":[{"year":1952,"month":11,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京六日电】　中央人民政府毛泽东主席六日下午六时接见苏联文化工作者代表团团长吉洪诺夫，团员格鲁森科、查哈罗夫、别洛沙普柯、叶菲莫夫，苏联艺术工作团领导人楚拉基，团员米哈伊洛夫、乌兰诺娃、盖达伊、纳赛罗娃、奥布拉兹卓夫、哈侬、裴布托夫，苏军红旗歌舞团团长亚历山大罗夫，副团长罗蒙诺索夫，苏联电影艺术工作者代表团团长费道罗夫，团员契尔柯夫、契尔卡索夫。"},{"type":"paragraph","text":"在座的有:中央人民政府副主席朱德、宋庆龄、高岗，政务院总理周恩来，副总理陈云、郭沫若、邓小平，政务院文化教育委员会副主任兼文化部部长沈雁冰，中央人民政府人民革命军事委员会总政治部副主任萧华，中苏友好协会总会总干事钱俊瑞，中央人民政府外交部副部长伍修权。"},{"type":"paragraph","text":"在座的还有苏联驻我国大使馆代办顾德夫，苏联对外文化协会代表茹克福，苏联影片输出公司驻华总代表处总代表史福德。"},{"type":"paragraph","text":"【本报讯】　据新华社北京六日电:中苏友好协会总会于五日晚八时举行宴会，欢迎苏联文化工作者代表团、苏联艺术工作团和苏军红旗歌舞团。"},{"type":"paragraph","text":"以吉洪诺夫为首的苏联文化工作者代表团、由楚拉基领导的苏联艺术工作团全体到京人员和以亚历山大罗夫为首的苏军红旗歌舞团应邀出席。"},{"type":"paragraph","text":"应邀出席宴会的还有:苏联驻我国大使馆代办顾德夫和大使馆人员，苏联对外文化协会代表茹克福和帮助我国进行建设的苏联专家们。"},{"type":"paragraph","text":"中苏友好协会总会副会长宋庆龄、吴玉章、郭沫若，总干事钱俊瑞，在京理事、干事和北京市中苏友好协会负责人均出席招待。"},{"type":"paragraph","text":"出席宴会的，有中央人民政府副主席朱德、高岗，中央人民政府政务院总理周恩来、副总理陈云、邓小平，中央人民政府人民革命军事委员会代总参谋长聂荣臻、人民革命军事委员会总政治部副主任萧华，以及中央人民政府其他首长和中国人民解放军高级将领。"},{"type":"paragraph","text":"出席宴会的还有中国人民政治协商会义全国委员会副主席陈叔通，各人民团体负责人刘宁一、廖承志、邓颖超、田德民，首都文化界人士李四光、陶孟和、竺可植、吴有训、茅盾、周扬、萧三、艾青、周立波、老舍、曹禺、梅兰芳、周信芳等。"},{"type":"paragraph","text":"应邀出席宴会的各国驻华外交官员有:罗马尼亚大使鲁登科、蒙古大使贾尔卡赛汗、匈牙利大使夏法朗柯、保加利亚大使彼得科夫、缅甸大使吴拉茂、朝鲜大使权五稷、波兰大使基里洛克、印度大使赖嘉文、越南大使黄文欢、德意志民主共和国外交使团大使衔团长柯尼希、印尼大使馆临时代办伊沙·玛蒂、捷克斯洛伐克大使馆临时代办雅布罗斯基和各国使馆人员。"},{"type":"paragraph","text":"郭沫若在宴会上致词，他代表中苏友好协会总会，向在伟大十月社会主义革命三十五周年纪念日前夕，前来我国参加“中苏友好月’活动的苏联文化工作者代表团、苏联艺术工作团和苏军红旗歌舞团全体同志表示热烈的欢迎。他说:“中国人民革命的胜利和国家建设事业的胜利，是和苏联对我们的援助分不开的。三年来我们国家建设在苏联援助下，已经取得了许多重大的成就。我们向三年来在中国不辞艰苦、以忘我的精神帮助我国建设的苏联专家们致敬!我们感谢斯大林大元帅、苏联政府和苏联人民对于中国革命和建设的真诚无私的援助!现在我国人民正在一努力学习苏联先进的建设经验，迎接即将到来的大规模经济建设和文化建设，为祖国的工业化而奋斗。我们坚信:在伟大的苏联的援助下，我们一定能够把张盛的工业化的新中国建设成功!’"},{"type":"paragraph","text":"吉洪诺夫在宴会上致答词说:中苏两国的友好，是具有全人类历史意义的事情。我们两个国家的友好，无论是战争中，无论是和平建设中都得到证实了。我们两国的友好不仅是长期的，而且是永恒的、世世代代的。因为这是两国人民幸福所需要的。我们两个国家的友好同盟，是全世界和平的保证。"},{"type":"paragraph","text":"宴会洋溢着亲切友好的空气，宾主频频举杯祝贺中苏两国人民的伟大的友好同盟的巩固和发展，祝贺苏联十月社会主义革命三十五周年，祝贺中国人民的英明领袖毛泽东主席的健康，祝贺中国人民的最亲密的朋友、全世界人民的伟大导师斯大林大元帅的健康!全场不时迸发出热烈的掌声和欢笑声。"},{"type":"paragraph","text":"宴会后由中苏艺术家表演精彩节目。"}],"comments":[],"origin":"新华社,本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"邓小平","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"陈云","type":"人物"},{"name":"朱德","type":"人物"},{"name":"高岗","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fe64f4016f"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
