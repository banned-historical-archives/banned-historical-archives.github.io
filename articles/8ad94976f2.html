art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"刘少奇是革命人民的死敌","authors":["战士朱明德"],"parts":[{"type":"paragraph","text":"伟大领袖毛主席教导我们：“谁是我们的敌人？谁是我们的朋友？这个问题是革命的首要问题。”可是，大叛徒刘少奇却对外国人说：“中国有句俗话，‘朋友越多越好，敌人越少越好’。我们愿意和所有的人做朋友。”好一个“所有的人”！赤裸裸地暴露了刘少奇背叛无产阶级和革命人民的丑恶面目。"},{"type":"paragraph","text":"我们在世界上的朋友当然是越多越好。但是，我们交的朋友只能是革命的人民，我们决不能同帝国主义者、现代修正主义者和各国反动派交朋友。相反，我们团结革命的人民，正是为了反对帝国主义者、现代修正主义者和各国反动派。刘少奇故意抹杀敌我界限，要“和所有的人做朋友”，这不是要我们同敌人和平共处，向敌人屈膝投降吗？"},{"type":"paragraph","text":"事实上，刘少奇这个地地道道的反革命修正主义分子，也并不是同“所有的人”都“做朋友”的。对于各国革命人民，他从来是仇恨的。他所交的朋友，都是那些外表上衣冠楚楚而实际上双手沾满人民鲜血的反动家伙。你看，他不是曾经同镇压印尼人民的刽子手打得火热吗？他不是曾经高呼苏联赫鲁晓夫“万岁”吗？物以类聚，人以群分。刘少奇就是帝国主义、现代修正主义和各国反动派的忠实走狗，是我国人民和世界革命人民的公敌！"}],"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8ad94976f2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
