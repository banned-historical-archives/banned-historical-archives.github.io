陈伯达"],"dates":[{"year":1966,"month":8,"day":13}],"is_range_date":false,"parts":[{"text":"陈伯达给毛泽东主席的报告","type":"title"},{"text":"陈伯达","type":"authors"},{"text":"一、昨晚中央文革小组讨论了问题，主要意见是强调各校各单位，认真学习十六条，掌握十六条，按十六条办事。拟用《人民日报》连续发表几篇社论。周总理说：学习才能熟悉，掌握才能应用，要狠抓学抓用才能掌握好。","type":"paragraph"},{"text":"二、自然科学技术各单位，都要高举文化大革命的纲，但要适当分工和大家布置，一部分人直接搞文化大革命，一部分人处理日常工作，个别一些尖端要害科研部门，要保证不得中断，保证如期完成并高质量。","type":"paragraph"},{"text":"周总理说：现在全世界都望着北京，中国的文化大革命就是为了推动世界革命，把中国建设更好。搞革命要以双倍工作的精神，把工作搞好。","type":"paragraph"}],"comments":[],"origin":"《无产阶级文化大革命参考资料（内部资料，仅供参考）》（北京汽车分公司文革大字报办公室、北京汽车分公司行政保卫文革、北京国棉三厂文革筹委会宣传组，一九六六年十一月十二日）。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"陈伯达","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"中央文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c6207888dd"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
