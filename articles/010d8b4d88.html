{"year":1991,"month":6,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社北京6月7日电　(记者于长洪)在领导中国人民建立新中国的斗争中，毛泽东无疑是一位杰出的领袖；在与普通人一样的感情生活里，毛泽东又不愧是一位慈爱的父亲——今天在京首映的重大革命历史题材影片《毛泽东和他的儿子》，从个人生活这一独特的角度揭示毛泽东丰富的内心世界，描述质朴，感人泪下，受到首都观众和文艺界人士一致好评。"},{"type":"paragraph","text":"由湖南潇湘电影制片厂隆重推出的彩色宽银幕故事片《毛泽东和他的儿子》是向中国共产党诞生七十周年的献礼片。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"010d8b4d88"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
