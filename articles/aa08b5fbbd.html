[],"dates":[{"year":1979,"month":7,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京七月二十六日电　《解放军报》今天报道:人民解放军总政治部主任韦国清说，全军上下尤其各级领导干部和领导机关，要加强学习马列主义、毛泽东思想基本理论，认真贯彻执行党的三中全会制定的路线、方针、政策，进一步肃清林彪、“四人帮”极左路线的流毒影响。"},{"type":"paragraph","text":"韦国清同志是在七月二十四日晚上向参加全军群众工作部长会议、联络宣传工作座谈会、军事法院院长会议和解放军报社记者会议的同志们说这些话的。"},{"type":"paragraph","text":"韦国清同志说，党的三中全会以来，各部队贯彻落实全会精神，贯彻落实军委三个重要会议精神，做了大量工作，军队工作有了很大进步，形势很好。但是，在肯定成绩的同时，必须看到和重视工作中存在的问题，并认真加以解决。韦国清同志说，全军上下尤其各级领导干部和领导机关，要加强马列主义、毛泽东思想基本理论的学习，要认真学好党的三中全会制定的路线、方针、政策，学好五届人大二次会议几个重要文件和制定的法律，同时要继续学好实践是检验真理的唯一标准这一课。通过学习，进一步肃清林彪、“四人帮”极左路线的流毒影响，提高政治觉悟，提高思想理论水平，提高工作能力，提高战斗力，切实把军队的调整、改革、整顿、提高工作搞好。"},{"type":"paragraph","text":"韦国清同志还强调要认真总结对越自卫还击作战的政治工作经验，进一步把我军的优良传统发扬光大。他指出，我们越是加强现代化建设，越要加强政治工作，越要发扬我军的优良传统。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"name":"四人帮","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"aa08b5fbbd"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
