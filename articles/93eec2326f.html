],"dates":[{"year":1966,"month":9,"day":25}],"is_range_date":false,"parts":[{"text":"上海市红卫兵总部第一号通令","type":"title"},{"text":"九月十二日上海市红卫兵总部成立以来，本市各区红卫兵总部相继成立。故本部决定凡上海市红卫兵总部所属的红卫兵战士于9月26日起换用统一袖章、旧袖章收缴。","type":"paragraph"},{"text":"上海市红卫兵总部所发袖章、红底黄字，统一印有“上海市红卫兵”字样，并盖有总部或区总部印章。","type":"paragraph"},{"text":"袖章式样：","type":"paragraph"},{"text":"上海市","type":"paragraph"},{"text":"红卫兵","type":"paragraph"},{"text":"本部所属红卫兵袖章由本部统一发放，任何单位不得复制，违令者严加处理。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"93eec2326f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
