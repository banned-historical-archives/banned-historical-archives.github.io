ical-archives/banned-historical-archives0/main/maoquanji51.pdf"],"article":{"title":"诉衷情","alias":"","parts":[{"type":"paragraph","text":"诉衷情!"},{"type":"paragraph","text":"（1974年）父母忠贞为国酬口何曾怕断头。如今天下红遍，江山靠谁守？业未就，身躯倦，鬓已秋3。你我之辈，忍州将夙愿，"},{"type":"paragraph","text":"付与东流？"},{"type":"paragraph","text":"[1]这是毛泽东写给周恩来的一首词。当时，毛泽东身体不好，疾病缠身，周恩来患有癌症，亦在重病中。这首词，字数虽不多，但周恩来为无产阶级共产主义事业奋斗一生的豪情，却跃然纸上。毛泽东已经预感到，革命将发生曲折，他和周恩来等老一辈无产阶级革命家夙愿将要“付与东流”。他问自己，也问周恩来：社会主义的红色江山究竟“靠谁守”？此词情感真挚，读来令人潜然泪下。"},{"type":"paragraph","text":"[2]酬，报答。为国酬，就是“为酬国”。[3]鬓已秋，两鬓发白如同秋霜，喻年事已高。[4]忍，岂忍。夙愿，平素的愿望。"}],"authors":["毛泽东"],"dates":[{"year":1974}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":532,"page_end":532},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4ec3f15939"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
