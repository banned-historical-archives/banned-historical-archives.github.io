先锋报》说印度同美帝结盟也同苏联修正主义者结盟","authors":[],"dates":[{"year":1965,"month":9,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社地拉那15日电　阿尔巴尼亚《青年之声报》今天发表评论说，印度反动派侵略巴基斯坦，是帝国主义一修正主义者阴谋的组成部分。"},{"type":"paragraph","text":"评论说，印度政府对巴基斯坦发动了赤裸裸的肆意侵略，再次暴露了它一贯对邻国奉行大国沙文主义和扩张主义的危险路线，揭去了它的“不结盟”的外衣。"},{"type":"paragraph","text":"评论指出，如果没有美帝国主义和苏联修正主义领导的怂恿和支持，印度反动派就不敢对巴基斯坦进行冒险。勃列日涅夫九月十日对印度反动派的赞扬绝不是偶然的。它更加清楚地表明了帝国主义一修正主义的进一步合作，表明它们进一步进行出卖其它国家自由和独立的交易。修正主义者根本:就不想区分侵略者和侵略的受害者。"},{"type":"paragraph","text":"新华社墨尔本16日电　今天出版的《先锋报》在评论印度侵略巴基斯坦的事件时强调指出:“非常清楚，印度统治阶级是侵略者”，而“美帝国主义和苏联修正主义是在同心协力支持印度的侵略。”"},{"type":"paragraph","text":"这家报纸写道:“印度统治阶级早就是美帝国主义的傀儡。他们充当亚非人民；团结的破坏者——帝国主义的代理人。”"},{"type":"paragraph","text":"“他们完全是结盟的，同美帝国主义结盟，当然，也同苏联修正主义者结盟。”"},{"type":"paragraph","text":"“印度侵略者在使用苏联的飞机和军事装备，这是对修正主义所起的作用的最好的说明。”"},{"type":"paragraph","text":"《先锋报》说:“因此，美帝国主义和苏联修正主义是在同心协力支持印度的侵略。”"},{"type":"paragraph","text":"报纸强调说“非常清楚，印度统治阶级是侵略者”；爱好和平、反对侵略的人，应该毫不含糊地反对印度侵略。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"59cd20c613"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
