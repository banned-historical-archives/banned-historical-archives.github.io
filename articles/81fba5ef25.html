<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共上海人民广播电台总支委员会关于开除右派分子苗力沉党籍的决定","authors":["(苗力沉)"],"dates":[{"year":1959,"month":3,"day":4}],"is_range_date":false,"parts":[{"text":"中共上海人民广播电台总支委员会关于开除右派分子苗力沉党籍的决定","type":"title"},{"text":"(苗力沉)","type":"authors"},{"text":"苗力沉，男，四十岁，富农出身，学生成份，一九三七年入党。曾任中央政研室敌伪组研究员、西北联政组织秘书、华东新华广播电台编辑部副主任等职，现在上海人民广播电台台长。其主要反党活动是：","type":"paragraph"},{"text":"大鸣大放前后，支持、配合资产阶级右派向党展开猖狂进攻。他攻击“从中央到地方广播方针不明确”，宣传部“过多干涉了电台的业务，妨碍了电台的积极性”，“市委对电台不重视、不信任、不支持”，“上海广播电台在一定程度上处于无领导状态”，煽动电台群众把“鸣放”的矛头指向市委和市委宣传部。当右派分子利用“左叶事件”向党进攻时，苗力沉竟授意新闻部表示声援，致使新闻部以电台全体编辑记者名义发出了抗议通电。电台右派分子向党猖狂进攻，大叫肃反残酷，苗也乘机歪曲污蔑党的整风运动和肃反斗争，说：“参加革命十年以上的党员，很少有不受过委曲的，”助长和怂恿了右派向党进攻的气焰。右派分子金瑞暘就公开向苗挑拨说：“你八年来有什么进步，搞到现在连个市委委员也没当上。我替你想了，你有二个前途：要么搞政治，将来当中央委员，要么搞学术工作，当个大记者，要么就一辈子当个电台台长，这算是最悲哀的了。”苗力沉不但不进行反驳，反而把他看成是“知心朋友”，认为编辑部“没有右派分子”。在开始斗争金瑞暘之前，又亲自到他家去通风报信。在电台广播方针上，苗力沉主张电台应“多搞社会新闻和多做广告”，以“充分满足各色人物的不同需要和兴趣”。在鸣放过程中，他公然违背市委的指示，播送了大量的右派分子的反动言论。","type":"paragraph"},{"text":"在政治上完全丧失立场，敌我不分。八年来，他同副台长陈浩天一起包庇和吸收了反革命分子、坏分子和政治面目不清的分子百余人到电台工作，有些还被提拔为科、组长，使之把持了某些重要地位，把电台弄得乌烟瘴气。例如秘书组副组长陶复平，是一个曾经出卖过十几个共产党员的叛徒、特务，一九五五年被发觉后，苗还认为他“是可捕可不捕的人”；一九五六年被宽大释放后。苗又擅自决定恢复陶的原级原薪。","type":"paragraph"},{"text":"苗力沉政治上敌我不分，组织上对党不满，反抗领导是一贯的。三反时，因其立场不稳，打虎不力，曾被撤销“打虎司令”职务；斯大林同志逝世开追悼大会时，电台竟播送音乐，又受到党的警告处分。对此，他不但没有接受教训，反而对党怀恨在心，经常散布一些反党言论。并和陈浩天、柳星三等结成反党集团，抗拒党的领导。他的反党罪行被揭发批判后，态度极不老实，继续挑拨电台某些干部对党不满，直至经过多次反复批判斗争，才被迫认罪。当组织上决定要他下乡劳动改造时，他竟又发生了败坏人伦的兽性行为，道德堕落达于极点。","type":"paragraph"},{"text":"根据以上事实，苗力沉已经完全堕落成为反党反社会主义的右派分子，为了纯洁党的组织，决定开除其党籍，撤消一切职务，保留公职，送农村劳动教养。","type":"paragraph"},{"text":" (已经中央批准)","type":"paragraph"},{"text":" 原载 《关于清除党内右派分子的决定汇编(五)》，中共中央监察委员会办公厅编，一九五九年十二月。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"81fba5ef25"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
