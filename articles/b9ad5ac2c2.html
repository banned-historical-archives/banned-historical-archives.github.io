代表怒斥宫本修正主义集团充当反动政府帮凶破坏学生斗争","authors":[],"dates":[{"year":1968,"month":11,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"决心把反对腐朽教育制度的斗争进行到底"},{"type":"paragraph","text":"日本东京大学学生坚持罢课二百五十多天"},{"type":"paragraph","text":"学生代表怒斥宫本修正主义集团充当反动政府帮凶破坏学生斗争"},{"type":"paragraph","text":"新华社二十日讯　据东方通讯社报道：坚持了二百五十多天罢课斗争的日本东京大学进步学生约四千人，十八日举行集会，强烈谴责佐藤反动政府和日共宫本修正主义集团疯狂破坏学生正义斗争的罪恶行径，并表示，决心把反对腐朽、反动的教育制度的斗争进行到底。"},{"type":"paragraph","text":"会议开始时，全体与会者起立高唱《国际歌》，并高呼七项正义要求，其中包括：学校当局承认他们勾结警察疯狂镇压学生的滔天罪行，保证不处罚自今年一月以来参加学生斗争的任何学生等。"},{"type":"paragraph","text":"一位学生代表在会上发言，严厉谴责宫本修正主义集团策划破坏学生斗争的阴谋。他指出：“每当斗争发展到新的高潮时，民主青年同盟（日共修正主义集团控制下的青年组织）的卖国集团总是跳出来企图扑灭斗争的烈火；每当罢课开始时，他们总是叫嚷‘反对罢课’；每当开始占领学校大楼时，他们总是叫喊‘反对占领’。他们一贯用这种办法反对学生的正义斗争，站在学校反动当局一边。日共修正主义卖国集团充当了警察部队所不能充当的角色。但是，广大学生群众已经识破了日共修正主义分子的反革命嘴脸，他们决不允许这些修正主义分子的阴谋得逞。”"},{"type":"paragraph","text":"在学生英勇斗争的冲击下，以大河内一男为首的东京大学的校领导最近宣告垮台。为了平息学生的斗争，佐藤反动政府新任命反动教授加藤一郎为代理校长。"},{"type":"paragraph","text":"十八日下午，正当学生举行集会的时候，加藤一郎假惺惺地走进了会议厅。这时，主席台上的学生代表以高昂的声调通过扩音器揭露反动的大学当局迄今为止对学生运动所犯下的一系列罪行，并要求他们向学生们低头认罪。加藤妄图推卸罪责，学生们当场揭露，他同前任校长大河内一男一样，也是佐藤反动政府的走狗。学生们对着加藤不断地愤怒高呼：“滚回家去，滚回家去！”加藤狼狈不堪，被赶出了会议厅。"},{"type":"paragraph","text":"会后，学生们在校园里举行了轰轰烈烈的示威游行，高呼战斗口号，表示要把斗争进行到底。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b9ad5ac2c2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
