政","电力部"],"dates":[{"year":1957,"month":5}],"is_range_date":false,"parts":[{"text":"大字报——寓言一则","type":"title"},{"text":"电力部栾忠政","type":"authors"},{"text":"（栾忠政：北京电力设计分院线路室技术员）","type":"subtitle"},{"text":"（栾忠政大字报稿）","type":"subtitle"},{"text":"女猎人林某，一日出猎，遇羊群，见一羊短角，认定为狼，追之。羊哀啼自白，林某大吼曰：“休使苦肉计！”乃以X击之，羊倒地。猎人林某始悟，然毫无愧曰：“羊角皆长，独尔角短小，此尔之过也，休得怨我。”随扬长而去。羊扪额上短角，无言以对，唯自恨得天独薄。呜呼，哀哉！","type":"paragraph"},{"text":" 来源：《想一想，对不对》（电力工业部整风办公室编印，1957年7月）。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"63636c3500"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
