script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"热情歌颂毛主席和霍查同志缔造的中阿战斗友谊《欧洲伟大的社会主义明灯》影展在京隆重开幕周恩来康生李先念谢富治刘宁一杨成武等负责同志参加了开幕式　谢胡阿利雅等同志应邀前来出席开幕式受到了革命群众夹道欢迎","authors":[],"dates":[{"year":1967,"month":10,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社北京十三日电　在全国人民热烈称颂中阿两国人民牢不可破的战斗友谊的欢呼声中，《欧洲伟大的社会主义明灯》——中国摄影代表团访问阿尔巴尼亚摄影展览，今天下午在首都隆重开幕。"},{"type":"paragraph","text":"中央领导同志和各方面的负责同志周恩来、康生、李先念、谢富治、刘宁一、杨成武，以及首都革命群众代表，参加了开幕式。"},{"type":"paragraph","text":"阿尔巴尼亚党政代表团团长、阿尔巴尼亚劳动党中央政治局委员、阿尔巴尼亚部长会议主席穆罕默德·谢胡同志，阿尔巴尼亚党政代表团团员、劳动党中央政治局委员、中央书记处书记拉米兹·阿利雅同志，阿尔巴尼亚党政代表团的其他成员，以及在北京的其他阿尔巴尼亚同志，应邀出席了开幕式。"},{"type":"paragraph","text":"今天，在举行展出的北京展览馆内外，洋溢着中阿两国人民战斗友谊的热烈气氛。展览会场的前厅中央，高悬着毛主席像和恩维尔·霍查同志像，下面用中阿两国文字写着:“中阿两党两国人民的革命团结和战斗友谊万岁!”展览会场外，中阿两国国旗迎风飘扬。展览会场门口，一边挂着毛主席语录:“‘海内存知己，天涯若比邻’。中阿两国远隔千山万水，我们的心是连在一起的。”另一边挂着恩维尔·霍查同志语录:“我们两国人民和两国之间的伟大友谊和钢铁般的国际主义团结，比任何时候都更加坚强。”"},{"type":"paragraph","text":"下午一时多，谢胡同志和其他阿尔巴尼亚同志乘车来到展览馆，首都各界革命群众热烈鼓掌，夹道欢迎阿尔巴尼亚战友。随后，周恩来、康生等同志和谢胡、阿利雅等同志一起，观看了展出的照片。"},{"type":"paragraph","text":"走进宽敞的展览大厅，迎面直立着中阿两党、两国和两国人民伟大的牢不可破的战斗友谊的缔造者、我们伟大的领袖毛泽东同志和阿尔巴尼亚人民的伟大领袖恩维尔·霍查同志亲切握手的巨幅照片。在这幅光辉四射的照片两侧，竖立着两排红旗，背面写着毛主席语录:“中阿两党、两国人民团结起来，全世界马克思列宁主义者团结起来，全世界革命人民团结起来，打倒帝国主义，打倒现代修正主义，打倒各国反动派。一个没有帝国主义、没有资本主义、没有剥削制度的新世界，一定要建立起来。”"},{"type":"paragraph","text":"展览会展出的二百多幅照片，热情地歌颂了阿尔巴尼亚人民的伟大领袖、中国人民最亲密的朋友恩维尔·霍查同志，歌颂了一直高举马克思列宁主义革命大旗的阿尔巴尼亚劳动党，歌颂了阿尔巴尼亚人民的革命的英雄气概，介绍了阿尔巴尼亚军民在反帝反修斗争中取得的伟大胜利，介绍了“一手拿镐、一手拿枪”的阿尔巴尼亚人民在社会主义革命和社会主义建设中所取得的巨大成就，特别是阿尔巴尼亚人民在开展思想革命化运动中所取得的成就。许多照片还介绍了阿尔巴尼亚人民对我们伟大领袖毛主席无限热爱、对我国无产阶级文化大革命热情支持的情况。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"谢富治","type":"人物"},{"name":"康生","type":"人物"},{"name":"杨成武","type":"人物"},{"name":"刘宁一","type":"人物"},{"name":"谢胡","type":"人物"},{"name":"李先念","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a0f57d18d2"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
