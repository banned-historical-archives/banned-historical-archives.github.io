script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"帝国主义和修正主义的攻击和诬蔑只是枉费心机中阿友谊在共同斗争中久经考验罗士高大使酒会招待访华归国的两个阿尔巴尼亚代表团","authors":[],"dates":[{"year":1963,"month":1,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社地拉那5日电】　中国驻阿尔巴尼亚大使罗士高4日晚在大使馆举行酒会，招待访问中国归来的由佩·沙姆布利率领的阿中友好协会代表团和由皮·米特罗约尔基率领的阿尔巴尼亚文化代表团。"},{"type":"paragraph","text":"出席酒会的有两个代表团的全体团员，还有阿尔巴尼亚部长会议副主席、阿中友协主席凯莱齐，外交部长什图拉，工业部长斯巴修，建筑部长帕希科，《人民之声报》总编辑达·马马基，阿尔巴尼亚人民军总政治部主任萨·别克特希等政府、文化、新闻界人士。"},{"type":"paragraph","text":"在洋溢着亲切友好气氛的酒会上，罗士高、凯莱齐、沙姆布利和米特罗约尔基先后讲了话。"},{"type":"paragraph","text":"罗士高大使热情欢迎两个代表团访问中国后归来。他说，代表团对中国的友好访问，进一步发展和增强了中阿两国人民之间的深厚的友谊。"},{"type":"paragraph","text":"罗士高说，这种友谊是建立在马克思列宁主义和无产阶级国际主义基础之上的，是经得起考验的友谊。无论是帝国主义还是现代修正主义的任何攻击和诬蔑，都破坏不了这种友谊。"},{"type":"paragraph","text":"沙姆布利在讲话中说，我们在中国访问的一个月，将使我们永志不忘。我们到处都受到热烈的欢迎和友好的接待，看到伟大的中国人民对我们建设成就的赞扬和对我们在劳动党的领导下坚决反对帝国主义、反对现代修正主义的高度评价，这对我们是巨大的鼓舞。"},{"type":"paragraph","text":"沙姆布利说，中阿友谊是建立在无往不胜的马克思列宁主义基础之上的，是在反对帝国主义、反对现代修正主义的斗争中建立起来的。这一牢不可破的友谊是任何力量侵犯不了的。"},{"type":"paragraph","text":"米特罗约尔基说，访问兄弟中国的美好印象使我们毕生难忘。三十多天，我们文化代表团一直生活在友谊之中。我们为中国现代文化的发展而高兴。中国文化为世界文化作出了卓越贡献。今天它在中国共产党的领导下取得了很大的发展。"},{"type":"paragraph","text":"米特罗约尔基说，中国的文化对于我们是很大的财富。我们将很好地向阿尔巴尼亚人民介绍它，增进我们两国人民的友谊。"},{"type":"paragraph","text":"凯莱齐也在酒会上讲了话。他感谢中国人民对两个代表团的接待。他说，中阿友谊是人民革命感情的友谊，是在共同斗争中和在风雨中考验过的友谊。代表团的访问将更增进我们的友谊。"},{"type":"paragraph","text":"酒会上，宾主一再为两国人民友谊的不断增进，为阿尔巴尼亚劳动党和中国共产党，为毛泽东同志和霍查同志的健康干杯。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"31d3a17efb"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
