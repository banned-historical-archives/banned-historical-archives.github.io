" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"毛泽东对邓小平在七届六中全会上的发言稿的批语和修改","authors":["毛泽东"],"dates":[{"year":1955,"month":10,"day":7}],"is_range_date":false,"parts":[{"text":"毛泽东对邓小平在七届六中全会上的发言稿的批语和修改","type":"title"},{"text":"毛泽东","type":"authors"},{"text":"一","type":"subtitle"},{"text":"退邓小平同志。","type":"paragraph"},{"text":"此件很好。作了一点修改，请你斟酌。","type":"paragraph"},{"text":" 毛泽东十月七日","type":"paragraph"},{"text":"二","type":"subtitle"},{"text":"[在对于农业社会主义改造抱着右倾观点的共产党员中，确有]一些[同资产阶级共呼吸的人]，他们是对资产阶级思想的投降主义者[。他们中的多数]则是反映[富裕中农的]思想。","type":"paragraph"},{"text":"注：[ ]外为毛泽东加写或改写的文字。","type":"paragraph"},{"text":"三","type":"subtitle"},{"text":"一切在这个问题上犯右倾错误的同志，因为他们同党外的资产阶级思想有某些共同点，他们在资产阶级分子向党进攻的时候，就会丧失警觉，解除武装，不能理直气壮地驳斥资产阶级分子的谬论。例如在一九五三年，党内党外都有人叫喊所谓“农民苦”，而在一九五五年，党内党外又都有人叫喊所谓“农民生产情绪低落”，我们怎样能够希望这样的同志去理直气壮地驳斥党外的那些谬论呢?","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"发言"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c94d6a6958"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
