的报告","authors":[],"dates":[{"year":1950,"month":6,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京十二日电】　中国共产党中央委员会六月六日到九日在北京举行了第七届第三次中央全体会议。出席这次会议的有中共中央委员三十五人，候补中央委员二十七人，并有各省市党委书记及其他工作人员四十三人参加会议。在这个会议上，毛泽东主席作了“为争取国家财政经济状况的基本好转而斗争”的报告。此外，刘少奇作了关于土地改革问题的报告，周恩来作了关于外交工作和统一战线工作的报告，陈云作了关于财政经济工作的报告，聂荣臻作了关于军事工作的报告。全会讨论了并一致同意毛主席的报告及其他报告。全会于六月九日完满闭幕。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"聂荣臻","type":"人物"},{"name":"陈云","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"72b86448c4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
