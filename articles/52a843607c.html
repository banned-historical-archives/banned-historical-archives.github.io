script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"抵制资产阶级腐朽思想的侵蚀，端正党风  中纪委要求加紧处理党员干部违纪案件  江苏省机械进出口分公司副经理陈寿阳向外商索贿贪污，江苏省决定开除他的党籍，撤销职务，并由司法机关依法惩办","authors":[],"dates":[{"year":1982,"month":1,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"抵制资产阶级腐朽思想的侵蚀，端正党风"},{"type":"paragraph","text":"中纪委要求加紧处理党员干部违纪案件"},{"type":"paragraph","text":"江苏省机械进出口分公司副经理陈寿阳向外商索贿贪污，江苏省决定开除他的党籍，撤销职务，并由司法机关依法惩办"},{"type":"paragraph","text":"新华社北京1月11日电  中央纪律检查委员会1月8日就江苏省机械进出口分公司副经理陈寿阳，在出国订货时向外商索取贿赂并贪污公款一事，发出《必须严肃处理党员干部中的违法乱纪案件》的通报。"},{"type":"paragraph","text":"通报指出，纠正党员干部中的违法乱纪行为，抵制资产阶级腐朽思想的侵蚀，端正党风，根本问题在于经常进行思想教育，健全党内民主生活，开展批评与自我批评，清除我们队伍中的政治灰尘，这是一个重要方面。但对那些违法乱纪者，必须严格执行纪律。凡是蜕化变质丧失党员条件的，必须清除出党；对那些触犯刑律的，要交司法部门依法惩处。绝不能姑息迁就，贻害于党。"},{"type":"paragraph","text":"去年1月，江苏省机械进出口分公司副经理陈寿阳，带领公司业务员、翻译戴贵颉和徐州市淮海皮革厂副厂长、工程师申可中，去意大利接洽皮革机械进口业务。在此期间，陈寿阳用极为卑劣的手法，声称“失窃”，以“借钱”为名，接受了外商贿赂。接受贿赂后，他在商务谈判中不顾国家利益，一味屈从外商提出的苛刻要求，使国家在政治上和经济上遭受损失。陈寿阳3人在国外还用谎报交通费、旅馆费、小费等手段，贪污公款购买个人消费品。"},{"type":"paragraph","text":"中共江苏省委认为，陈寿阳的上述行为，违反了党纪国法，情节恶劣，后果严重，不仅使国家在经济上遭受损失，而且在政治上有损民族尊严，败坏了祖国的声誉。他已经完全丧失共产党员的条件，堕落成了一个刑事犯罪分子。省委同意省委纪律检查委员会提出的给予陈寿阳开除党籍的处分，并建议撤销其行政职务，由司法机关依法惩办。"},{"type":"paragraph","text":"省委并决定将这一事件在全省党内通报。"},{"type":"paragraph","text":"中央纪委的通报指出，江苏省委对陈寿阳的处理是完全正确的，各地也应抓紧处理此类案件。通报强调说，共产党员是以为人民利益而奋斗为其根本宗旨的，他们艰苦奋斗、流血牺牲，不是为个人利益，而是为广大人民谋福利。但有些党员已经背弃了这个宗旨，他们为着追逐个人私利，不择手段，投机倒把、走私贩私、贪污盗窃、行贿受贿、侵吞哄抢国家资财等等，完全丧失了共产党员的条件。我们有些党组织对这些违法乱纪行为，有的视而不见，听之任之；有的大事化小，敷衍了事；有的说情开脱，包庇纵容。党组织的这种软弱涣散的状况，致使某些违法乱纪行为得以蔓延开来。"},{"type":"paragraph","text":"通报最后说，当前全体党员都要认真学习和实践陈云同志的《要讲真理，不要讲面子》的讲话精神，增强党性，坚决克服我们队伍中组织上、思想上、作风上的不纯，增强战斗力，以承担历史赋予我们的重任。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"江苏文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"52a843607c"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
