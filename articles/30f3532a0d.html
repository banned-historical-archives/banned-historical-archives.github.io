,"dates":[{"year":1980,"month":12,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"苏联经济的无政府状态的典型标志之一是“搞突击”和工作动员，力图通过这些做法一下子消除不断出现的供应不足的状况。迄今供应困难并没有减少，搞突击仍然作为一种“恢复元气的方法”延用下去。实行这种制度的结果，社会遭受的损失每年达数十亿。一方面持续存在着商品短缺现象，居民买不到最普通的商品。另一方面，为了轻易地完成计划和毫无意义地增加消费者的储备，企业在不断生产无人需要的商品。生产企业和物资技术供应机构积压生产资料，批发贸易部门积压消费品。"},{"type":"paragraph","text":"从根本上来说，这不是认识问题，也不是技术上的问题，而是利益的问题，它不是象很多辩护士所说的那样，是缺乏发达的“社会主义觉悟”的表现。人们的利益是在劳动和消费的关系的基础上表现出来的，人们在这种关系中生活，而这种关系又是长期不变的。在这些条件下，劳动的经济动机对社会来说仍然起决定性作用。"},{"type":"paragraph","text":"(摘自北京《经济学译丛》今年第十一期)"}],"comments":[],"origin":"《经济学译丛》","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"30f3532a0d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
