"year":1979,"month":10,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"宋庆龄陈慕华会见泰妇女委员会代表团"},{"type":"paragraph","text":"据新华社北京十月三日电 人大常委会副委员长、全国妇联名誉主席宋庆龄今天下午会见了以坤仁素玛里·乍滴甲瓦尼夫人为团长的泰国妇女委员会代表团。"},{"type":"paragraph","text":"宋副委员长在她的住所里，同她们进行了友好的交谈。宋副委员长说，我很高兴中泰两国间经常有代表团互相来往。乍滴甲瓦尼夫人接着说，这样，我们可以更好地互相帮助和学习。全国妇联主席康克清、副主席黄甘英参加了会见。"},{"type":"paragraph","text":"据新华社北京十月二日电 国务院副总理陈慕华今天下午会见了以坤仁素玛里·乍滴甲瓦尼夫人为团长的泰国妇女委员会代表团。邓小平副总理的夫人卓琳参加了会见。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5b096939f5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
