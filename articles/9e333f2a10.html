thors":["中央文革办事组"],"dates":[{"year":1967,"month":8,"day":25}],"is_range_date":false,"parts":[{"text":"中央文革办事组给北京建工学院红卫兵的一封信","type":"title"},{"text":"中央文革办事组","type":"authors"},{"text":"最高指示","type":"subtitle"},{"text":"帝国主义者和国内反动派决不甘心于他们的失败，他们还要作最后的挣扎。在全国平定以后，他们也还会以各种方式从事破坏和捣乱，他们将每日每时企图在中国复辟。这是必然的，毫无疑义的，我们务必不要松懈自己的警惕性。","type":"paragraph"},{"text":"建工学院的红卫兵并告北京市大中学校红代会各同志：","type":"appellation"},{"text":"昨天，北京街头出现建工新八一贴出的大字报“斗刘实况”和建工八一贴出的“师大附中革命派八月十九日与刘平平谈话纪要”的大字报。这两张大字报，同上次出现的斗彭大会上的大字报一样，毫无批判，把党内最大的走资本主义道路当权派放毒的话公开出来，客观上替党内最大的走资本主义道路当权派做了义务宣传员，这是非常错误的。","type":"paragraph"},{"text":"新、老八一的红卫兵的某些同志，特别是新八一红卫兵的一些同志，在大批判中作出了一些成绩，便骄傲起来，发展了风头主义和小团体主义。不顾影响地把党内最大的走资本主义道路的当权派放毒的话，加以扩散，以至犯了上述错误，是应该引为教训的。希望你们讨论一下这件事，改正这个错误，不要再做党内最大的走资本主义道路当权派所希望作的事，上他们的当。","type":"paragraph"},{"text":"致","type":"paragraph"},{"text":"无产阶级文化大革命的敬礼！","type":"appellation"},{"text":" 中央文化革命小组办事组六七年八月二十五日","type":"paragraph"}],"comments":[],"origin":"1967年9月7日北京建筑工业学院《革命串联》；1967年8月26日红代会清华井冈山一部第三动态组编《动态》第133期。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"中央文革","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9e333f2a10"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
