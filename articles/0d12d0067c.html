ical-archives/banned-historical-archives0/main/maoquanji39.pdf"],"article":{"title":"在中国驻苏使馆关于苏联积极筹备庆祝我国国庆的报告上的批语","alias":"","parts":[{"type":"paragraph","text":"在中国驻苏使馆关于苏联积极筹备"},{"type":"paragraph","text":"庆祝我国国庆的报告\"上的批语"},{"type":"paragraph","text":"（1958年6月24日）刘、邓："},{"type":"paragraph","text":"看来不举行庆祝是不行的了。请书记处讨论一次，然后常委谈一下，考虑方针，答复苏共。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"六月廿四日"},{"type":"paragraph","text":"[1]中国驻苏联大使馆1958年6月20日给外交部、中联部并报中央的报告中说，6月20日，苏共中央联络部第一副部长维诺格拉多夫接见了陈楚并告称，苏共中央很重视我国国庆十周年纪念，认为这是整个社会主义阵营的重大节日，苏联将进行全国性的大规模的庆祝活动。苏共中央希望了解我国的意图，庆祝活动的计划、措施、规模和总的精神等，以便更密切地配合进行活动。"},{"type":"paragraph","text":"[2]刘，指刘少奇。邓，指邓小平，当时任中共中央总书记、国务院副总理。"}],"authors":["毛泽东"],"dates":[{"year":1958,"month":6,"day":24}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":437,"page_end":437},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0d12d0067c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
