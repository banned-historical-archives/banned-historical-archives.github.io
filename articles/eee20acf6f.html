art":5,"page_end":5,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"在批邓；反击右倾翻案风的斗争中加强党的建设","authors":[],"parts":[{"type":"paragraph","text":"“南京路上好八连”在反击右倾翻案风的斗争中，同邓小平修正主义路线对着干，做出了可喜的成绩。他们决心以阶级斗争为纲更好地建设连队，使连队永远沿着毛主席的无产阶级革命路线胜利前进。图为：指导员、党支部书记戴大喜向团党委汇报八连党支部在深入批邓斗争中，领导干部战士认真学习毛主席重要指示的体会。"},{"type":"paragraph","text":"方浩摄"},{"type":"paragraph","text":"武汉警备区某部六连共产党员、副班长李偃清，认真学习毛主席著作，敢斗修正主义“大人物”。去年在邓小平大谈什么“整顿”为纲，宣扬“打钢仗”等反动谬论时，李偃清就感到他不讲阶级斗争，不讲路线，是同毛主席唱反调的，便给毛主席写信汇报自己的看法。图为：他和理论骨干一起研究批判邓小平“打钢仗”的谬论。"},{"type":"paragraph","text":"齐明安摄"},{"type":"paragraph","text":"沈阳部队某部“学习毛主席著作的模范红九连”副政治指导员于小平，认真学习马列著作和毛主席著作，不断提高阶级斗争和路线斗争觉悟。去年邓小平的“三项指示为纲”的修正主义纲领一出笼，他就自觉地进行抵制，积极地开展批判。图为：于小平在写批判“三项指示为纲”的发言稿。"},{"type":"paragraph","text":"王明会摄"},{"type":"paragraph","text":"在同邓小平修正主义路线斗争中不断前进的北京部队某部八连党支部，带领全连同志加强学习，深入批邓。他们决心为巩固和发展文化大革命胜利成果、巩固无产阶级专政、捍卫毛主席革命路线作出新贡献。图为：他们在深入批判邓小平破坏我军建设的罪行。"},{"type":"paragraph","text":"李海摄"},{"type":"paragraph","text":"北京卫戍区某部六连理论骨干在党支部领导下，顶着右倾翻案风阔步前进。他们著书立说，批判修正主义，批判资产阶级，作出了优异成绩。这是对邓小平否定文化大革命和批林批孔、否定新生事物的有力批判。图为：六连理论小组正在校对他们编写的《史记选译》一书。"},{"type":"paragraph","text":"吴林摄"},{"type":"paragraph","text":"面对右倾翻案风敢开顶风船的某部防化连党支部，带领全连指战员认真学习毛主席关于资产阶级“就在共产党内”的论述，深入批判邓小平反革命的修正主义路线。图为：他们正在搞大批判专栏。"},{"type":"paragraph","text":"徐运均摄（照片）"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"批林批孔","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"eee20acf6f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
