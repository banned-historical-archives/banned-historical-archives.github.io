authors":[],"dates":[{"year":1950,"month":9,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席周总理"},{"type":"paragraph","text":"电贺保加利亚解放六周年"},{"type":"paragraph","text":"我国妇联主席蔡畅致电保国妇联主席祝贺"},{"type":"paragraph","text":"【新华社八日讯】九月九日为保加利亚解放六周年纪念。中央人民政府毛泽东主席与周恩来总理兼外交部部长分别致电保加利亚人民共和国国民议会主席团乔吉·达米扬诺夫主席及部长会议维尔科·契尔文科夫主席，表示庆贺。电文如下："},{"type":"paragraph","text":"（一）毛主席贺电保加利亚人民共和国国民议会主席团乔吉·达米扬诺夫主席阁下："},{"type":"paragraph","text":"欣逢保加利亚解放六周年之际，我代表中华人民共和国中央人民政府及中国人民谨向阁下及保加利亚人民致庆贺之忱，并祝保加利亚人民在建设祖国的伟大事业上获得更大的成就。"},{"type":"paragraph","text":"中华人民共和国中央人民政府主席  毛泽东"},{"type":"paragraph","text":"一九五○年九月六日于北京"},{"type":"paragraph","text":"（二）周总理贺电保加利亚人民共和国部长会议维尔科·契尔文科夫主席阁下："},{"type":"paragraph","text":"欣逢保加利亚解放六周年之际，请接受我对阁下、贵国政府及保加利亚人民的热烈祝贺。"},{"type":"paragraph","text":"中华人民共和国中央人民政府政务院总理兼外交部部长  周恩来"},{"type":"paragraph","text":"一九五○年九月六日于北京"},{"type":"paragraph","text":"【新华社八日讯】中华全国民主妇女联合会主席蔡畅顷致电保加利亚妇女联合会主席左拉·特拉哥依契娃，祝贺保加利亚解放六周年纪念。电文如下：左拉·特拉哥依契娃夫人："},{"type":"paragraph","text":"在保加利亚获得自由、独立的六周年解放纪念日，谨代表中国妇女向保加利亚人民和妇女致热烈祝贺，并预祝你们在走向社会主义的建设事业中取得更大的胜利。"},{"type":"paragraph","text":"蔡畅  九月八日"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4240996ede"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
