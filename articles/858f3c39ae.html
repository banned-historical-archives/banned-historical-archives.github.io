script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"用毛泽东思想武装干部和社员","authors":["高兴烈"],"dates":[{"year":1967,"month":2,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"解放军闻风而动积极向贫下中农和农村各级干部宣传党中央的信"},{"type":"paragraph","text":"让毛主席的声音传遍广大农村  用实际行动大力支援春耕生产"},{"type":"paragraph","text":"用毛泽东思想武装干部和社员"},{"type":"paragraph","text":"本报讯　北京部队空军某仓库的干部和战士，坚决执行伟大领袖毛主席的指示，支援驻地生产队狠抓革命，猛促生产。他们在工作中，大力突出政治，热情宣传毛泽东思想，使广大贫下中农和干部精神振奋，意气风发，掀起了春耕生产热潮。"},{"type":"paragraph","text":"去冬以来，这个仓库的干部、战士就遵照毛主席“抓革命，促生产”的指示，积极帮助驻地生产队在开展无产阶级文化大革命运动的同时，努力搞好备耕工作。《中共中央给全国农村人民公社贫下中农和各级干部的信》发出以后，全体干部、战士更是欢欣鼓舞。他们在我们最最敬爱的伟大领袖毛主席像前庄严宣誓：毛主席呀毛主席！我们坚决响应您老人家的伟大战斗号召，大力支持、帮助春耕生产工作，和贫下中农、干部在一起，为夺取春耕生产的胜利而奋斗到底！"},{"type":"paragraph","text":"千支援，万支援，用毛泽东思想宣传群众、组织群众、武装群众是最大的支援。仓库的干部、战士，当天下午就抬着毛主席巨幅画像，举着用大红纸写的党中央的信和毛主席语录牌，敲锣打鼓来到村头、地头，一遍又一遍地给群众宣讲党中央的信，和群众一起学习毛主席语录，还演唱文艺节目。广大贫下中农无限热爱毛主席，最听毛主席的话。毛主席语录、党中央的信，战士读一句，贫下中农鼓一次掌，最后一句话音没落，“毛主席万岁！万万岁！”的欢呼声，就响彻田野。晚上，宣传小组又深入到贫下中农家里，组织他们学习毛主席著作和党的方针政策。一位贫农老大爷激动地说：“党中央的信说，咱贫下中农是农村中抓革命、促生产的主力军。毛主席这样信得过咱，咱坚决给他老人家争气！咱贫下中农一定要做抓革命的闯将，促生产的先锋！”"},{"type":"paragraph","text":"战士们在宣传工作中十分注意用毛泽东思想教育干部，帮助他们提高觉悟，端正态度，挺起腰杆，积极工作。一个生产队长犯过一些错误，受到革命群众的批评，产生了消极情绪。指导员叶礼珍，几次亲自登门，帮助他学习毛主席语录：“我们的责任，是向人民负责。每句话，每个行动，每项政策，都要适合人民的利益，如果有了错误，定要改正，这就叫向人民负责。”诚恳地告诉他：革命群众对你的错误进行揭发批判，目的是为了“治病救人”。作为一个革命者，应该知错就改，而不应该害怕批评。鼓励他听毛主席的话，奋发工作，抓好春耕生产。毛主席的谆谆教导，同志的苦口良言，使这位队长猛醒过来，决心在春耕生产中将功补过。其他同志也分别针对队里干部的活思想，逐个帮助他们带着问题学习有关的毛主席语录，树立了团结一致，搞好春耕的信心。干部积极行动起来，受到贫下中农的热烈欢迎，大家说：“犯有一般错误的干部，是咱们的阶级兄弟。他们能够痛改前非，按照毛主席的话去做，我们就谅解他们，支持他们！”"},{"type":"paragraph","text":"干部、战士一边宣传，一边帮助备耕。他们和群众并肩劳动，专挑重担子。在山坡上取土垫地，地冻土硬，铁锹挖不下，镐头刨不动，战士们就抡起大锤，打钢钎，一块一块地往下撬。战士李传敏、驭手吕学功等同志打大锤，双手磨出了一串血泡，坚持不换人。推车、抬筐运土的，全是一蹓小跑。雪后风寒，可大家脱掉了棉衣，还是汗流浃背。战士们的行动，深深感动了广大贫下中农。近日来，社员出勤率成倍增加，几乎达到百分之百，就连六、七十岁的老大爷，也都争着上工。他们说：“毛主席下达了动员令，解放军带头打冲锋，我们那里还呆得住？！我们坚决响应毛主席的号召，好好向解放军学习，不打响春耕第一炮，不夺取革命、生产双胜利，誓不罢休！”"},{"type":"paragraph","text":"（高兴烈）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"858f3c39ae"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
