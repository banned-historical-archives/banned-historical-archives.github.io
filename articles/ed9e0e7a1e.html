<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"在华主席为首的党中央亲切关怀下中央团校隆重举行开学典礼汪东兴乌兰夫同志等出席　汪副主席作重要讲话","authors":[],"dates":[{"year":1978,"month":8,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京八月十日电　中国共产主义青年团中央团校今天隆重举行开学典礼。"},{"type":"paragraph","text":"中共中央副主席汪东兴，中共中央政治局委员乌兰夫出席了开学典礼，并同全体学员一起照了像。出席开学典礼的还有中共中央组织部部长胡耀邦，中共中央宣传部副部长朱穆之，中共中央党校副校长马文瑞、副教育长冯文彬等。"},{"type":"paragraph","text":"中央团校由于林彪、“四人帮”的摧残破坏停办了十二年。在华主席为首的党中央的亲切关怀下，今天团校第十六期正式开学。团校的校园里呈现一派喜气洋洋的景象。来自全国各条战线包括十二个民族的二百七十二名学员，穿着节日新装，朝气勃勃，济济一堂。他们都是团的干部，平均年令二十五岁。"},{"type":"paragraph","text":"开学典礼由共青团十大筹委会副主任王照华主持。汪东兴副主席作了重要讲话。(全文另发)"},{"type":"paragraph","text":"共青团十大筹委会主任韩英也讲了话。他首先分析了全国的大好形势和共青团工作出现的崭新局面。他说，中共中央五月四日发出的关于召开共青团第十次全国代表大会的通知，极大地振奋了广大青年的革命热情。"},{"type":"paragraph","text":"他们热烈响应党中央的号召，以实际行动迎接共青团十大的召开。广大青少年出现了学政治、学科学、学文化、学技术的热潮。勤奋学习，刻苦钻研，已经蔚然成风。同时，各条战线的团员、青年正在掀起比、学、赶、帮、超的社会主义劳动竞赛热潮，争当新长征的突击手。"},{"type":"paragraph","text":"他说，召开共青团十大的各项筹备工作正在顺利进行。全国青少年渴望已久的《中国青年》杂志和《中国青年报》、《中国少年报》，将在团的十大前后相继复刊。一些省、市的团校、团刊，以及青少年宫，也正在恢复和建立。"},{"type":"paragraph","text":"韩英在讲话中回顾了伟大领袖和导师毛主席和敬爱的周总理、朱委员长、叶副主席、邓副主席等老一辈无产阶级革命家对共青团和青年工作的关怀，并且以大量事实，揭批了林彪、“四人帮”对共青团和青年工作的破坏。他在谈到团校的工作时说，文化大革命前，团校先后培训团干部一万一千多名，其中许多同志后来成了党政军各级组织的领导骨干。团校为共青团培训了骨干，也为党输送了干部，为我国青年运动，为社会主义革命和建设事业做出了应有的贡献。事实证明，在毛主席、党中央的亲切关怀和领导下，团校执行的是党的干部教育的路线和方针。他驳斥了林彪、“四人帮”诬蔑团校执行了“修正主义教育路线”的谰言。"},{"type":"paragraph","text":"韩英希望中央团校的教职员工和全体学员，恢复和发扬理论联系实际的学风，完整地准确地领会和掌握马列主义、毛泽东思想体系，深入揭批“四人帮”的反革命罪行，进一步增强党性，改进作风，用优异的学习成绩，迎接共青团十大的胜利召开。"},{"type":"paragraph","text":"学员代表在讲话中表示，一定要刻苦学习马列主义、毛泽东思想，不辜负华主席、党中央的殷切希望。"},{"type":"paragraph","text":"\u003cIMG alt=请插入7号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1978\\08\\788b010301.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e中央团校八月十日举行开学典礼。中共中央副主席汪东兴，中共中央政治局委员乌兰夫等出席了开学典礼，并接见了全体学员。新华社记者摄(传真照片)\u003c/FONT\u003e"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"汪东兴","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"name":"四人帮","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ed9e0e7a1e"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
