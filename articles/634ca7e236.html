<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"湖北麻城县万人大会参考资料——三种人把瞒产私分揭发出来了","authors":[],"dates":[{"year":1959,"month":4,"day":12}],"is_range_date":false,"parts":[{"text":"湖北麻城县万人大会参考资料——三种人把瞒产私分揭发出来了","type":"title"},{"text":"中一管理区第十生产队七小队上河腾垸，共有23户，95人，种有水田166.5亩，1958年完成国家粮食任务42252斤，按分配任务还有14830斤未完成，比57年多卖了12485斤。","type":"paragraph"},{"text":"该队从去年冬季起，就开始叫喊没有口粮，春节前还给了他们供应粮食2千斤。春节后，管理区发现他们私自整过米，没有供应，这样干部和群众的意见很大，曾一连几天不下地生产，食堂里也经常吃些糠菜。4月初县里将供应定到了食堂，而这里没有给供应。于是该队的队长罗先成带上食堂干部和一部分群众到管理区找着党总支书吵供应，吵得很厉害，并说：“去年多卖了，今年如不供应，就要饿死人。”可是，另一方面他们却叫保管梅国珍在家主持私分粮食，并向群众布置：“各户将米拿回去，要抓紧时间到山上去砍两挑柴火，等县里的万人大会散了就停火。”","type":"paragraph"},{"text":"中一管理区总支知道这里有问题，没有听他们叫喊，并派了团总支书记胡太生同志深入到该队去发动三种人，算账摸底。","type":"paragraph"},{"text":"经过依靠三种人罗文山、转业军人陈守明等进行了个别的串联发动，开座谈会，回忆对比和算粮食的收入开支账以后，罗文山等认为党对他们一向是很关心的，共产党是贫农的救命恩人，贫农离开了党就活不成，下决心要向党说真心话。于是他们揭发了小队干部多报种子、隐瞒粮食等行为。据揭发夹墙内小仓库隐瞒籼稻谷1000斤，晚稻谷1100斤，大米1250斤，大麦50斤，豆折70多斤，共计折谷4千多斤。有了这些粮食，全垸95人接小麦保证不要国家供应。","type":"paragraph"},{"text":"该垸为什么要瞒产私分呢？三种人揭发出来的原因有三个：","type":"paragraph"},{"text":"1.管理区对该垸的工作抓的不够紧，情况了解不具体，虽然干部去过几次，但总是“屁股冒沾凳”就走了，政策贯彻不够。特别是对粮食问题大家顾虑多。","type":"paragraph"},{"text":"2.骨干不强。党员周汝启现任副队长，很软弱，怕得罪人，不敢坚持真理，管理区总支对他的教育也不够。批评多，具体帮助解决问题和加强政治思想教育少，因而他们对党的政策不大相信，顾虑很多。特别是对今年的粮食政策——报出的瞒产私分粮食先安排食堂满足口粮的政策不相信，他们说：“归食堂，又何必要人报出来呢？恐怕是哄人呀！”","type":"paragraph"},{"text":"3.贫农和三种人没有占优势，没有及时地打击坏分子的破坏。全垸23户，中农1户，地主2户，富农1户，伪保长1户，反动会道门头子1户，真正的贫农三种人只有3户，都没有当干部，群众称为老实人，其余都是中农和、泥、木、铁匠等小手工业者，生活都很富裕。伪保长陈焱清和道德会门头子帅国珍（现为三类管制分子）经常在群众中造谣说：“现在到处没吃的呀！”这样群众瞒产更不敢报出来。他们还暗地出主意说：“你不吵他（指政府）他就要找你”。对这些坏分子的造谣破坏没有及时的打击，这是很长时间没有把真相弄清的主要原因。","type":"paragraph"},{"text":"这次把贫农三种人的优势树立起来，问题也揭发出来了。经过进一步贯彻了粮食政策，首先满足了口粮的需要，并揭发和打击了坏分子的破坏言行以后，群众生产情绪特别高涨，很快掀起了生产高潮，都说：“我们把粮食藏起来，吃糠吃菜自己整自己，还说政府不供应，真是错极了。”","type":"paragraph"},{"text":" 1959年4月12日","type":"paragraph"}],"comments":[],"origin":"湖北省某档案馆","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"634ca7e236"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
