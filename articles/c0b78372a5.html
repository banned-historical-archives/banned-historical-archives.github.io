art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"“感谢毛主席”","authors":["张朴夫振峰"],"parts":[{"type":"paragraph","text":"“毛主席著作，打开了我心灵上的窗子，使我呼吸到新鲜空气，见到了阳光。”这是共产党员、维吾尔族战士努尔巴克的切身体会。"},{"type":"paragraph","text":"在执行筑路任务中，担任突击组长的努尔巴克，总是提前上工，为爆破手打好石眼，为同志们准备好工具，还把毛主席著作拿到工地。休息时，他便组织大家学习《愚公移山》。努尔巴克指着眼前的山头说：“愚公敢移山，主要是他有坚强的信心和意志；我们只要有了这种精神，哪怕路修不好！”学习后，有的同志提出和努尔巴克挑战，比比谁的意志坚。就这样，努尔巴克的突击组，一直保持着先进组的光荣称号。"},{"type":"paragraph","text":"后来，努尔巴克当了班长。这时，部队投入野营训练，六十公里的急行军，一路上涉水、跨沟、爬山、走悬崖……，对新战士来说，这是一次艰巨的考验。努尔巴克在行军中，不是替这个背枪，就是替那个背背包。每到艰险地段，他还唱着歌，给战士们鼓劲。特别是班上那两个年纪最小的新战士，努尔巴克总是紧跟着他们，随时帮助、鼓励他们。到达野营地，两个新战士一头倒在铺上便睡着了。努尔巴克为他们打来开水，叫他们起来洗脚，并且表扬了他们坚持到底的精神。两个新战士洗着脚，心里很受感动，说：“这次行军如果不是班长帮助，我们会掉队的。”努尔巴克却说：“这不是我的功劳，是毛主席他老人家教导我的，要说感谢，得感谢毛主席。”"},{"type":"paragraph","text":"训练中，一次听到卧倒命令，有的新战士动作迟缓，原来地上有石块和水坑。在另一次射击中，有的战士认为没有真敌人，打起靶来不带劲。努尔巴克发现这些情况，就进行分析研究。他想：要使全班过得硬，还得请教毛主席。于是，他又组织同志们学习《丢掉幻想，准备斗争》，并且把喀喇昆仑山上硬八连的事迹讲给大家听。在努尔巴克的诱导下，全班不只敌情观念增强了，练硬功的劲头更足了，还形成了天天学习毛主席著作的好风气。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c0b78372a5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
