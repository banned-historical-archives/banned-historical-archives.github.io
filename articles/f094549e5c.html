script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"不允许资产阶级社会学复辟  在科学院哲学社会科学部座谈会上，潘梓年希望一切爱国的哲学社会科学工作者起来战斗","authors":[],"dates":[{"year":1957,"month":8,"day":31}],"is_range_date":false,"parts":[{"type":"paragraph","text":"不允许资产阶级社会学复辟"},{"type":"paragraph","text":"在科学院哲学社会科学部座谈会上，潘梓年希望一切爱国的哲学社会科学工作者起来战斗"},{"type":"paragraph","text":"据新华社30日讯　中国科学院哲学社会科学部昨天在北京举行座谈会，揭发和批判了右派分子实现章罗联盟反社会主义科学纲领的一个重要步骤——图谋使资产阶级社会学复辟，进行反共反社会主义的活动。参加座谈会的有哲学、社会科学工作者一百多人。"},{"type":"paragraph","text":"哲学社会科学部副主任潘梓年首先发言。他指出，右派分子利用中国共产党提出“百花齐放，百家争鸣”的方针和共产党整风的机会，发出了“恢复”旧社会学、旧经济学、旧政治学、旧法学等等叫嚣，企图在这种口号下把对共产党不满、对社会主义制度不满、怀念资本主义制度、抗拒思想改造的知识分子组织起来，并且企图引导缺乏经验的青年走上错误的道路。他们的目的是图谋资产阶级社会学复辟，用资产阶级世界观来反对无产阶级的世界观；用资产阶级的社会政治思想来指导我们的国家工作。他们进攻的矛头直接指向马克思列宁主义，指向我们国家的根本制度，指向工人阶级及其先锋队中国共产党。这是一场政治上、思想上尖锐的阶级斗争，一切真正爱国的、拥护社会主义的哲学社会科学工作者必须起来战斗。"},{"type":"paragraph","text":"潘梓年接着叙述了费孝通、吴景超、陈达、李景汉等右派分子的活动。"},{"type":"paragraph","text":"潘梓年接着指出右派分子企图使关于人口问题、劳动问题、农业与农民生活问题、城市建设问题、民族问题的调查研究工作都掌握在资产阶级社会学者的手里，其目的很明显地不是为了学术研究，而是要在科学研究机构、高等学校以至国家生活的各方面夺取马克思主义的思想阵地。"},{"type":"paragraph","text":"潘梓年最后说，在科学研究工作中，我们今后仍然坚定不移地贯彻“百花齐放、百家争鸣”的方针，仍然要坚持调动一切积极力量为社会主义建设服务的方针。在我国过去学过资产阶级社会学的人当中出了不少右派分子，这是同这门学问的极端反动有关的。资产阶级社会学彻头彻尾是反马克思主义的、反科学的，我们必须在原则上予以否定。但是过去学过社会学的人经过初步思想改造以后，只要站在人民的立场和拥护社会主义的立场，仍然可以对社会主义建设事业贡献自己有用的知识和能力的。"},{"type":"paragraph","text":"中央民族学院副院长贺致平在会上揭露图谋资产阶级社会学复辟的主要策谋者费孝通反共、反社会主义、反马列主义的活动，以及民族学院师生揭露和批判费孝通反动言行的情况。"},{"type":"paragraph","text":"费孝通、吴景超在会上作了“交代”。"},{"type":"paragraph","text":"曾参与图谋资产阶级社会学复辟活动的劳动干部学校副教授袁方在会上揭露了一些这个右派集团的阴谋活动。"},{"type":"paragraph","text":"座谈会将继续举行。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f094549e5c"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
