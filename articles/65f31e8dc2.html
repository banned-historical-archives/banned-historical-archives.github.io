script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"澳共(马列主义者)党刊号召把毛泽东思想应用于党的建设毛主席对马列主义作出无与伦比的贡献","authors":[],"dates":[{"year":1966,"month":4,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京5日电　澳大利亚共产党(马克思列宁主义者)机关刊物《澳大利亚共产党人》第十八期刊登了一篇文章，题为《论澳大利亚马克思列宁主义党的发展》。文章指出，毛主席“创造了关于党的学说的真正宝库”，“对马克思列宁主义的理论作出了无与伦比的贡献”。它号召把这些放之四海而皆准的原则应用到澳大利亚党的建设的具体问题中去。"},{"type":"paragraph","text":"文章在详细回顾了澳大利亚的共产主义运动、特别是澳大利亚马克思列宁主义党的发生和发展过程后指出，党的建设意味着加强党的马克思列宁主义。那意味着对同马克思列宁主义格格不入的一切倾向采取毫不调和的态度。建立一个坚持马克思主义，从而深刻了解本身的矛盾和其他一切矛盾，坚持通过批评和自我批评揭露和处理矛盾的方法，坚持实践和坚持联系群众的党，这是压倒一切的任务。"},{"type":"paragraph","text":"文章说，澳大利亚修正主义者就群众性的党大肆宣传和把党员标准降低到零的程度，这恰恰符合苏联修正主义者关于全民党、全民国家(而不是无产阶级专政)的概念。这完全是社会民主主义，完全是改良主义。我们坚决认为，列宁关于党的概念和刘少奇的《论共产党员的修养》是完全正确的。与修正主义者所说的相反，我们的党员必须发展成为把无产阶级革命事业置于一切之上的人。他们必须成为模范人物，不断对他们所受到的资产阶级的坏影响进行斗争，完全忘我(准备为了革命的利益放弃财产、生命、工作、职业)，而不仅仅是口头上这样讲的人。他们必须发展成为愿意服从党的决定到任何地方担任任何工作的人。只有进行彻底的马克思列宁主义意识形态建设，才能够保证建立这样一个党。"},{"type":"paragraph","text":"文章强调说，在这些问题上，毛泽东对马克思列宁主义的理论作出了无与伦比的贡献。正是毛泽东做出了这种贡献，这不是偶然的。列宁对包括党的问题在内的各个问题的贡献是巨大的。毛泽东增加了这种贡献。因为他参加了持久的斗争——中国的革命。中国共产党人在合法的和非法的条件下，在解放区和非解放区，在秘密工作中和公开工作中，在和平斗争中和武装斗争中进行了活动。他们犯了不少错误，但是他们赢得了胜利。在多年的党内尖锐斗争中，确立了毛泽东的马克思列宁主义思想的统治地位。他创造了关于党的学说的真正宝库。它能够使各党避免犯错误，如果它们进行党的思想建设的话。他的著作《实践论》和《矛盾论》不是关于马克思主义哲学的某种抽象的论文，而是在党的建设的斗争烈火中产生的。它们是中国党的建设的一部分。可以提到的其他著作当中有:《改造我们的学习》、《整顿党的作风》、《反对党八股》、《在延安文艺座谈会上的讲话》、《关于领导方法的若干问题》、《反对自由主义》、《学习和时局》。"},{"type":"paragraph","text":"文章说，毛泽东论述了放之四海而皆准的原则。我们的任务是把这些普遍原则应用到澳大利亚党的建设的具体问题中去。文章特别提到，为党的民主集中制而奋斗是这些问题中的一个迫切的问题。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"65f31e8dc2"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
