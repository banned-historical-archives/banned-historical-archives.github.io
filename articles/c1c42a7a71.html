rt":5,"page_end":5,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"热烈欢呼反击右倾翻案风斗争的伟大胜利","authors":[],"parts":[{"type":"paragraph","text":"首都人民载歌载舞，欢庆“五一”国际劳动节，决心认真学习毛主席的重要指示，牢牢掌握斗争大方向，深入批邓，把反击右倾翻案风的伟大斗争进行到底。"},{"type":"paragraph","text":"“世上无难事，只要肯登攀”。在毛主席词二首和中共中央两项决议的鼓舞下，首都军民决心紧密地团结在以毛主席为首的党中央周围，乘胜前进，争取更大的胜利。"},{"type":"paragraph","text":"新华社记者摄"},{"type":"paragraph","text":"在粉碎天安门广场反革命政治事件的斗争中光荣立功的首都工人民兵，满怀战斗豪情参加“五一”游园联欢。他们决心以阶级斗争为纲，提高警惕，为保卫毛主席，保卫党中央，保卫毛主席的革命路线，保卫祖国的伟大首都而战斗。"},{"type":"paragraph","text":"在粉碎反革命逆流的斗争中建立功勋的首都工人民兵、人民警察和警卫战士参加游园。他们表示要更紧密地团结战斗，把反击右倾翻案风斗争推向新高潮，为反修防修、巩固无产阶级专政而努力作战。"},{"type":"paragraph","text":"新华社记者摄"},{"type":"paragraph","text":"五月一日晚，首都军民在灯火辉煌的天安门广场庆祝国际劳动节，欢呼反击右倾翻案风斗争的伟大胜利。"},{"type":"paragraph","text":"新华社记者摄"},{"type":"paragraph","text":"清华大学师生员工在“五一”游园联欢会上，演出大型舞蹈《翻案不得人心》，表达了他们在以毛主席为首的党中央领导下，誓将批邓和反击右倾翻案风的伟大斗争进行到底的坚强决心。"},{"type":"paragraph","text":"驻京部队干部战士满怀战斗豪情参加“五一”游园联欢。他们决心在以毛主席为首的党中央领导下，认真学习毛主席的重要指示，以阶级斗争为纲，掀起深入批邓、反击右倾翻案风的新高潮，抓革命、促生产、促工作、促战备，进一步发展大好形势，保卫无产阶级专政。"},{"type":"paragraph","text":"首都工农兵群众举行盛大游园联欢，热烈庆祝“五一”国际劳动节。这是北京齿轮厂业余宣传队演出群口词《为保卫毛主席、保卫党中央而战》。"},{"type":"paragraph","text":"参加“五一”游园联欢的各族人民，满怀豪情地赞颂社会主义祖国“到处莺歌燕舞”的大好形势，共同表达一定要解放台湾的坚强决心。 新华社记者摄"},{"type":"paragraph","text":"（本版照片除署名外均为本报记者摄）（照片）"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c1c42a7a71"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
