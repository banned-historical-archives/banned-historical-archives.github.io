["北京地质勘探学院","林墨荫"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"“在匈牙利革命走上街头了”","type":"title"},{"text":"北京地质勘探学院林墨荫","type":"authors"},{"text":"林墨荫认为苏联不应出兵匈牙利（指第一次）。二十大以后对国际共产主义运动上的一切事情都应该换一种眼光来估计了，匈牙利现在暴乱的分子，过不了几天也可能是革命的英雄，苏联这次出兵，就是还拿老眼光来看国际共产主义运动的新问题，你们看吧，事件完了以后，苏联非处理一批高级干部不可。","type":"paragraph"},{"text":"林墨荫认为，这次暴乱是革命，他说：","type":"paragraph"},{"text":"在匈牙利革命走上街头了，这也可能是匈牙利走上社会主义的特殊道路。以前我们搞学生运动时，反动派杀我们几个人，那时我们是什么心情？我们上街游行，喊口号：「谁是刽子手？李宗仁!」，「谁是刽子手？李宗仁！」现在几天之内，苏联军队竟在布达佩斯屠杀了一千多人，你想想，一千多人躺在街头，匈牙利人民作何感想，布达佩斯人口占全匈牙利三分之一，影响有多大，对苏联怎样不恨？南斯拉夫在联合国上投弃权票，对的很，一方面还不破坏苏南关系，给苏联留情面，另一方面将来可和人民的匈牙利搞好关系。","type":"paragraph"}],"comments":[],"origin":"北京地质勘探学院党委会宣传部编《社会主义教育参考资料第二编：右派言论汇编》，1957年10月5日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8244f01b59"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
