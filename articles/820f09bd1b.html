tart":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"纪念毛主席诞辰八十五周年","authors":[],"parts":[{"type":"paragraph","text":"《伟大的领袖和导师毛泽东主席纪念展览》二十六日起在京展出"},{"type":"paragraph","text":"《伟大的领袖和导师毛泽东主席纪念展览》经过修改充实，于十二月二十六日在中国人民革命军事博物馆展出。"},{"type":"paragraph","text":"整个展览共分四个部分：一、毛主席在新民主主义革命时期；二、毛主席在社会主义革命时期；三、毛主席在世界革命斗争中；四、毛主席永远活在我们心中。这次展出的一千多件珍贵文物和照片，生动地反映了毛主席为中国革命建树的不朽功勋。"},{"type":"paragraph","text":"在展出的历史照片中，反映毛主席和周总理、朱委员长等老一辈无产阶级革命家亲密友谊的内容，比过去的展览有很大增加。引人注目的是，当年毛主席和彭德怀、陶铸、薄一波、杨尚昆等许多老同志在一起的一幅幅珍贵照片，第一次陈列在展览大厅。"},{"type":"paragraph","text":"全国各省、市、自治区同时举办《毛主席和我们在一起》摄影展览"},{"type":"paragraph","text":"为纪念毛主席诞辰八十五周年，全国二十九个省、市、自治区于十二月二十六日同时举办《毛主席和我们在一起》摄影展览。"},{"type":"paragraph","text":"由文化部、国家文物事业管理局联合主办的这次影展，共展出一百五十四幅照片，大部分照片是第一次公开展出的。"},{"type":"paragraph","text":"南泥湾大生产展览馆正式开放"},{"type":"paragraph","text":"在毛主席八十五诞辰前夕，毛主席视察过的延安南泥湾屯垦区的大生产展览馆在南泥湾的阳湾建成并正式开放。（均据新华社）"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"820f09bd1b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
