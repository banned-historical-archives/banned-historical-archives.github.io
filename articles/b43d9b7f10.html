ical-archives/banned-historical-archives0/main/maoquanji51.pdf"],"article":{"title":"对陈云来信的批语","alias":"","parts":[{"type":"paragraph","text":"对陈云来信的批语"},{"type":"paragraph","text":"（1972年7月22日）印发。请中央商定。我看都可以同意。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"七二年七月二十二日"},{"type":"paragraph","text":"二请总理办。"},{"type":"paragraph","text":"[1]陈云，原任中共中央副主席、国务院副总理。“文化大革命”中，被解除了中共中央委员之外的领导职务。1972年7月21日，他给毛泽东并中央写信，反映他在江西南昌下放的情况，请求中央根据他的身体情况，给他分配力所能及的工作。信中写道：“如果没有适当的工作可分配，可否参加北京老同志学习班？参加学习班之后，可否在我身体还能走动的几年在春秋季节仍到外地下面去看看？如果可以这样办的话，因为我不能坐飞机，可否破例在往返的路上给一个能烧暖气的公务车，避免受冷感冒，也可延长一点在外地走动的时间。”本篇一写在陈云的这封信上；本篇二写在这封信的信封上。"},{"type":"paragraph","text":"[2]总理，指周恩来。"}],"authors":["毛泽东"],"dates":[{"year":1972,"month":7,"day":22}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":327,"page_end":327},"tags":[{"name":"毛泽东","type":"人物"},{"name":"陈云","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b43d9b7f10"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
