" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji28","name":"毛泽东全集第28卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji28.pdf"],"article":{"title":"关于援助越南武器的批语","alias":"","parts":[{"type":"paragraph","text":"关于援助越南武器的批语"},{"type":"paragraph","text":"（1950年3月、4月）所抽枪炮弹药应该是好的和合用的。"},{"type":"paragraph","text":"二你们所抽枪炮弹药应该是好的和合用的。"},{"type":"paragraph","text":"[1]本篇一是毛泽东对中共中央1950年3月30日给中共中央西南局的电报的批语。本篇二是毛泽东对中共中央1950年3月30日给中共中央驻越共中央联络代表罗贵波的电报的批语。本篇三是毛泽东在中国人民解放军第四野战军第二政治委员兼中南军区第二政治委员邓子恢、第四野战军第三政治委员兼中南军区第三政治委员谭政、第四野战军参谋长兼中南军区参谋长赵尔陆和第四野战军副参谋长兼中南军区副参谋长李聚奎的电报上写给刘少奇的批语。"},{"type":"paragraph","text":"[2]中共中央的电报说：“中央决定由中南、西南两区各准备一万支步枪，并配备与一万支步枪相适应之轻重机枪、迫击炮、山炮等武器，援助越南。”"},{"type":"paragraph","text":"[3]中共中央的电报说：“罗贵波三月二十四日电称越南需武器甚急，请即将已集中南宁待运之枪炮先行运去，其余物资及干部正商办中。”"},{"type":"paragraph","text":"关于援助越南武器的批语"},{"type":"paragraph","text":"三少奇同志："},{"type":"paragraph","text":"第四项请你酌定电复。我意是可以的。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"四月三日"},{"type":"paragraph","text":"[1]邓子恢等电报所提意见的第四项内容是：“请中央考虑可否再抽调一部分山炮连、排干部及必需的炮手前往，以便帮助其组织练训。如同意请即复示。”"}],"authors":["毛泽东"],"dates":[{"year":1950,"month":3},{"year":1950,"month":4}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":252,"page_end":253},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d0a6270f5a"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
