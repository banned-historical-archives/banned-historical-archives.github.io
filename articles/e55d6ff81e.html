art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席的教导就是最高命令","authors":["海达/遥塞"],"parts":[{"type":"paragraph","text":"在波涛汹涌的黄海海面上，驰骋着一艘运输艇，日夜航行在大小岛屿之间，担负着交通运输任务。这个艇的干部战士，在长年远离领导、单独执勤的情况下，自觉地按照最高指示办事，用毛泽东思想指导自己的行动。这艘艇，就是连续七年荣获四好称号的一○九艇。一○九艇的许多动人事迹，在海岛上到处流传。最近，在某岛上又传颂着这样一个爱民故事："},{"type":"paragraph","text":"一天，波涛滚滚，浓雾弥漫。某小岛四位渔民驾驶的渔船，被海流拉走了，去向不明。这个急人的消息传到了一○九艇。可是，这个艇上没有导航设备，从来没有在这样的浓雾天里出过海；附近海区的礁石又多，弄不好就会发生事故。怎么办？毛主席说：“一切从人民的利益出发，而不是从个人或小集团的利益出发；向人民负责和向党的领导机关负责的一致性；这些就是我们的出发点。”毛主席的教导就是最高命令。抢救革命群众刻不容缓，运输艇冲破迷雾，顶着恶浪，奔向渔船失踪的海区。海面上，小山包似的大浪一起一伏；雾越来越浓，从船头看不见船尾。小艇象个瓢似地在雾海中摇来晃去，随时都有触礁的危险。五好战士王保华冒着风浪，趴在船头上，两手紧紧地抓住船舷，仔细地观察着海面。突然，听到前面哗哗的声音，他立即大声向艇长报告：“前面发现礁石！”艇长马上要了个左舵，礁石从船舷右面一闪而过。就这样，小艇三次遇礁，都安全脱险了。"},{"type":"paragraph","text":"天黑了，运输艇每前进一步，都带来更大的困难。同志们朗颂着毛主席的教导：“这个军队具有一往无前的精神，它要压倒一切敌人，而决不被敌人所屈服。”个个精神抖擞，斗志昂扬，他们用信号灯照射海面，细心搜索任何一个疑点，终于找到了失踪的渔船，救上了渔民。清晨，一○九艇迎着朝霞，军民同声高唱《大海航行靠舵手》，驶回了海港。（海达、遥塞）"}],"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e55d6ff81e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
