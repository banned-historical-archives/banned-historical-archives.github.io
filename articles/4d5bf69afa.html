script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"王金璋委员说  机构要精简，干部要年青","authors":[],"dates":[{"year":1980,"month":9,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"王金璋委员说"},{"type":"paragraph","text":"机构要精简，干部要年青"},{"type":"paragraph","text":"王金璋委员说，华国锋同志讲了官僚主义的四种表现，符合实际情况，抓住了要害。当前有些机关的官僚主义严重存在，群众批评之为“门难进，官难见，脸难看，事难办”。宁夏回族自治区机构臃肿，层次多，人浮于事，工作效率低。“文革”前，自治区直属单位只有三十多个，现在增加到八十多个，还有不少临时机构。由于机构重叠，助长了官僚主义作风，遇事互相扯皮，有的事一拖几个月或一、两年，最后不了了之。有的厅局，正副厅局长七、八个，甚至十几个，正副处长二、三十个。群众不满地说：“局长成班，处长成排，问题成堆。”领导多而工效不高，划圈圈的多，负责的少，甩手的多，实干的少，甚至有的连圈圈也不愿划，群众给他们画相道：“八点上班九点到，一杯清茶一张报，不到十一点不见了。”为此，我建议：重叠和临时机构应合并或撤销；人员要精减，特别是非生产人员、不称职的领导要坚决调整；明确职责范围，做到功过分明，严重失职者，要依法追究责任；建立健全检察、监督制度，真正依靠群众监督国家机关。"},{"type":"paragraph","text":"他说，这次国务院领导成员的调整，是改革我国干部制度的良好开端。邓小平、李先念、陈云、徐向前、王震同志，都是德高望重的党和国家领导人，是建国元勋，深受人民群众的尊敬和爱戴。这些老同志为了改革干部体制，适应四化建设的需要，主动让贤，把国务院的领导职务让给年富力强的同志担任，这是非常英明的决策。中央领导同志给我们树立了榜样，带了头，我完全拥护。今后，一定按照这个精神，把干部年轻化工作搞好。由于林彪、“四人帮”的十年浩劫，把人们的思想搞乱了。目前，有的地方派性仍很严重，有的单位“风派”、“震派”人物进了领导班子。这些单位领导形不成核心，影响四化建设，群众很有意见。有的“角刺”人物不认识错误，不总结经验教训，天天在骂娘。因此，不少老同志担心，这样下去，我们党的事业要受损失，对改善和加强领导班子，培养中青年干部十分焦急。为此，我建议：1、必须首先把组织、人事部门整顿、调整好，使这些部门成为能够坚持党性、杜绝派性的机构。2、对干部进行民意测验、群众推荐、群众选举的办法，把有真才实学、年富力强的干部选调到领导岗位上来。对那些派性严重、不能胜任工作者，坚决从领导班子中调整出去。3、认真做好老干部的工作。对老干部要视情况，分别对待。身体好、有工作能力的，应让其继续工作，发挥骨干作用；体质弱的，安排当顾问；真正不能工作的，可以离休、退休。总之，对老干部的安排要持慎重态度，不要搞“一刀切”，都从领导岗位上换下来。4、老干部要把培养中青年干部作为神圣职责，搞好传帮带。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"派性","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4d5bf69afa"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
