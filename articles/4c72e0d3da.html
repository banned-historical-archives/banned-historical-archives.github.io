tart":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东的旗帜放光辉","authors":["石英"],"parts":[{"type":"paragraph","text":"触摸着故乡晚霞映透的渠水，"},{"type":"paragraph","text":"战士余热未尽的枪筒，"},{"type":"paragraph","text":"职工宿舍里的暖气片……"},{"type":"paragraph","text":"都保有他那永恒的体温。"},{"type":"paragraph","text":"细看那稻穗弯腰拂扫的村路，"},{"type":"paragraph","text":"油田纵横交错的小径，"},{"type":"paragraph","text":"铺满国际友谊的停机坪上……"},{"type":"paragraph","text":"都留有他深深的足印。"},{"type":"paragraph","text":"童年时代我们刚听到他的名字："},{"type":"paragraph","text":"有的是在乞讨无门的黄昏，"},{"type":"paragraph","text":"有的是在“偷”听老师讲课的窗外，"},{"type":"paragraph","text":"有的是在拔除敌伪据点的早晨……"},{"type":"paragraph","text":"从那时起我们挺起身来，"},{"type":"paragraph","text":"丢掉要饭棍，拿起识字课本，"},{"type":"paragraph","text":"投入推翻三座大山的战斗，"},{"type":"paragraph","text":"扬眉吐气，成了新时代的主人！"},{"type":"paragraph","text":"就象绿叶永远忘不了树干，"},{"type":"paragraph","text":"我们想到这些就觉得他最亲。"},{"type":"paragraph","text":"“四人帮”说我们“起点不高”，"},{"type":"paragraph","text":"而他的思想早已在我们心里生根。"},{"type":"paragraph","text":"我们参加革命，在党旗下宣誓，"},{"type":"paragraph","text":"决心跟着党走，他跟我们心贴心。"},{"type":"paragraph","text":"从这一基点出发，我们永不动摇，"},{"type":"paragraph","text":"无论是延安暂时撤离，还是“四人帮”以假乱真……"},{"type":"paragraph","text":"也许这种感情有点过于质朴，"},{"type":"paragraph","text":"但我们要把它传之子孙；"},{"type":"paragraph","text":"尽管征途上有风雨坎坷，"},{"type":"paragraph","text":"我们永远高举毛泽东的旗帜前进！"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"四人帮","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4c72e0d3da"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
