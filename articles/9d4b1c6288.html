ical-archives/banned-historical-archives0/main/maoquanji45.pdf"],"article":{"title":"给臧克家的信","alias":"","parts":[{"type":"paragraph","text":"给臧克家的信"},{"type":"paragraph","text":"（1962年4月24日、27日）克家同志："},{"type":"paragraph","text":"数信收到，甚为感谢！同时在两个刊物发表，不甚相宜，因为是《人民文学》搜集来的。另有几首，可以考虑在《诗刊》上发表。《诗刊》五月号何时排版，请告确期。"},{"type":"paragraph","text":"你细心给我修改的几处，改得好，完全同意。还有什么可改之处没有，请费心斟酌赐教为盼！"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"1962年4月24日"},{"type":"paragraph","text":"二克家同志："},{"type":"paragraph","text":"[1]臧克家，当时任《诗刊》主编。"},{"type":"paragraph","text":"[2]指《人民文学》编辑部同志搜集的毛泽东过去写的诗词10余首。1962年4月，毛泽东从中选了6首词，略加修改后，交给《人民文学》发表。毛泽东全集第四十五卷"},{"type":"paragraph","text":"数信都收到，深为感谢！应当修改之处，都照尊意改了。唯此次拟只在《人民文学》发表那六首旧词，不在《诗刊》再发表东西了。在《诗刊》发表的，待将来再说。违命之处，乞谅为荷！"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一九六二年四月廿七日衣切"},{"type":"paragraph","text":"万节品"},{"type":"paragraph","text":"1毛泽东致臧克家信的手稿。"}],"authors":["毛泽东"],"dates":[{"year":1962,"month":4,"day":24},{"year":1962,"month":4,"day":27}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":119,"page_end":120},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9d4b1c6288"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
