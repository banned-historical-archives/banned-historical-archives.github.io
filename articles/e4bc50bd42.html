uthors":["严卫民"],"dates":[{"year":1993,"month":8,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社上海8月22日电　(记者　严卫民)为纪念毛泽东诞辰100周年，深圳先科娱乐传播有限公司与中央档案馆和中央文献研究室合作，录制了一套《巨人之声——毛泽东》激光唱片。"},{"type":"paragraph","text":"《巨人之声——毛泽东》辑录了毛泽东同志在各个不同历史时期的七篇重要讲话原声录音:在中国人民政治协商会议筹备会上的讲话(1949·6·15)；中国人民政治协商会议第一届全体会议上的开幕词(1949·9·21)；在人民英雄纪念碑奠基仪式上宣读碑文(1949·9·30)；在开国大典上宣读中华人民共和国中央人民政府成立公告(1949·10·23)；在中国人民政治协商会议第一届全国委员会第三次会议上致开幕词(1951·10·1)；在第一届全国人民代表大会第一次会议上致开幕词(1954·9·15)；在中国共产党第八次全国代表大会上致开幕词(1956·9·15)。"},{"type":"paragraph","text":"这套激光唱片时间为80分钟，共两张。将于今年9月在国内外发行。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e4bc50bd42"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
