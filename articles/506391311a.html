art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"苏修新沙皇必须马上住手","authors":["东海舰队活学活用毛泽东思想先进集体六五五艇全体指战员"],"parts":[{"type":"paragraph","text":"苏修叛徒集团八月十三日侵入我国新疆裕民县铁列克提地区，挑起新的流血事件，当场打死打伤我边防战士多名。这是苏修社会帝国主义侵略本性的又一次大暴露。我们坚决拥护我国政府向苏联政府提出的抗议照会，愤怒声讨沙皇的滔天罪行。"},{"type":"paragraph","text":"伟大领袖毛主席教导我们：“一切反动势力在他们行将灭亡的时候，总是要进行垂死挣扎的。”今年三月，苏修武装侵我国神圣领土珍宝岛遭到应有惩罚之后，并不甘心，变本加厉地对我国进行武装挑衅和侵略威胁。他们大搞反华战争动员，加紧反华军事部署。他们还伙同美帝，勾结日本、印度等国反动派，加紧拼凑对我国的所谓“军事包围圈”。苏修叛徒集团这种疯狂反华的罪恶行径，并不说明它强大，恰恰相反，正充分暴露了它的虚弱本质。"},{"type":"paragraph","text":"我们驻守在海防前线的指战员严正警告苏修叛徒集团：神圣的中国领土、领空和领海，一寸也不容侵犯。你们必须马上住手，停止挑衅，立即从中国领土上撤出全部入侵军队。你们这伙叛徒，硬要继承老沙皇的衣钵，侵犯中国领土，把强大的社会主义中国当成百年前沙皇俄国可以任意宰割的旧中国，那就完全打错了算盘。在用毛泽东思想武装起来的中国人民和人民解放军面前，任何侵略者都只能碰得头破血流，粉身碎骨。毛主席教导我们：“人不犯我，我不犯人；人苦犯我，我必犯人”。如果苏修叛徒集团胆敢把战争强加到我们头上，我们坚决奉陪到底！"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"506391311a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
