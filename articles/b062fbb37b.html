<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"试论右倾保守思想的产生根源","authors":["沈立人"],"dates":[{"year":1958,"month":2,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"沈立人"},{"type":"paragraph","text":"当前我国的社会主义事业正面临一个大跃进的新形势。对待新形势，有两种人，两种态度:一种是促进派，决心很大，信心很强，充满了革命干劲；一种是“促退派”，决心不大，信心不强，丧失了革命志气。前一种是先进思想，后一种是落后思想，或称之曰:右倾保守思想。右倾保守思想同一切落后思想一样，阻碍着我们事业的发展，必须扫除，必须克服。在新形势下，这种右倾保守思想怎么会产生的呢?"},{"type":"paragraph","text":"右倾保守思想的产生，首先有其认识上的根源。这就是，对当前的新形势认识不足。形势发展了，认识仍停留在老地方甚至倒退回去，同已经变化了的客观情况不相适应，于是产生右倾保守思想。"},{"type":"paragraph","text":"认识落后于形势，一方面表现在对社会主义事业大跃进的客观需要认识不足。我国原有的经济基础非常薄弱，几年来虽有很大发展，基本上还是农业国，所以需要迅速改变其面貌。这是容易理解的。但是当前更出现了一种需要大跃进的新形势，这是由于经过经济上的社会主义革命，我国已建立了社会主义的生产关系，并已巩固，不允许生产力长期地处于现有的水平上，必须大跃进，以继续巩固社会主义的所有制，并满足作为社会主义所有制的主体的人民的日益增长的需要。再看国际情势，帝国主义还存在，同我们争时间、比速度；我们也必须大跃进，在十五年左右赶上或者超过英国。这些，都说明需要大跃进，不跃进就不行。对此问题认识不足，觉得渐进、缓进甚至不进都无妨，就会产生右倾保守思想。"},{"type":"paragraph","text":"认识落后于形势，另一方面表现在对社会主义事业大跃进的客观可能认识不足。社会主义事业需要大跃进，但是不是可能呢?是完全可能的。因为我们不仅具备了一切有利条件，如优越的社会主义制度，党的正确领导，觉悟的、勇敢的人民，无私的国际援助，丰富的自然资源等，并且经过第一个五年计划，工农业生产大大增长，已奠定了社会主义工业化的初步基础，同时在建设实践中开始积累了经验；更经过去年以来的全民整风和反右派斗争，社会主义制度在政治上、思想上进一步巩固了，群众的政治积极性和劳动热情进一步提高了，领导和干部的思想作风也进一步改善了。这个新形势，说明了我们可能以比过去更快的速度向前跃进。对此问题认识不足，或者只看到我们原有的一些条件，认为只可能按过去一样的速度前进，也就会产生右倾保守思想。"},{"type":"paragraph","text":"在可能不可能跃进的问题上，有人过分强调了困难的一面。我们是有不利条件的，造成了一些困难。但是我们应当认识，不利条件是在变化的；特别是我们应当认识任何事物都有好坏两面，不利条件是可能转化为有利条件的。如一“穷”二“白”是个困难，但正因为这样，进一步刺激了我们以信心百倍的精神来努力改变它。问题不在于有无困难，问题在于我们对待困难的态度，在于我们是否充分动员一切积极因素来战胜困难。这样，一切不利条件就转化为有利条件了。对此认识不足，同样会产生右倾保守思想。"},{"type":"paragraph","text":"其次，右倾保守思想的产生，不仅有其认识根源，还有其阶级根源。有些人站在资产阶级或小资产阶级的立场上，他们不相信我们在工业上可能大跃进，不相信我们可能赶上英国，往往以资本主义的速度来衡量；又不相信我们在农业上可能大跃进，不相信我们可能在基本合作化及其日益巩固的基础上有比过去发展更快的大跃进，往往以个体农民的生产不稳定状态来对照。“燕雀安知鸿鹄志”，有了“燕雀”的眼光，当然只满足于现有的水平或速度，满足于缓进或渐进，而不敢如鸿鹄一样的跃进、大跃进，甚至认为跃进即“冒进”了。"},{"type":"paragraph","text":"当然，有右倾保守思想的人，其根源不尽相同，有的只是认识上的片面，有的则是残余的资产阶级或小资产阶级(包括个体农民)思想的影响。但无论怎样，头脑中如果塞满了右倾保守思想，一定会迷失方向、丧失信心，更谈不上革命气概，并在客观上成为阻碍革命事业前进的绊脚石。一切有右倾保守思想的人，必须迅速惊醒，站稳工人阶级立场，正确认识向前跃进的新形势，鼓起革命干劲来!"},{"type":"paragraph","text":"\u003cIMG alt=请插入4号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1958\\02\\582f030801.JPG\"\u003e"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b062fbb37b"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
