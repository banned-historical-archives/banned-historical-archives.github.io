领导集团充当美帝帮凶到处煽动反华浪潮","authors":[],"dates":[{"year":1967,"month":1,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"澳共（马列主义者）《先锋报》发表文章强调指出"},{"type":"paragraph","text":"毛泽东思想是世界革命指路明灯"},{"type":"paragraph","text":"痛斥苏修领导集团充当美帝帮凶到处煽动反华浪潮"},{"type":"paragraph","text":"新华社墨尔本二十七日电　澳大利亚共产党（马克思列宁主义者）机关报《先锋报》二十六日发表文章，热情赞扬毛泽东思想是世界革命的指路明灯；强烈谴责苏联修正主义领导集团充当美帝国主义的帮凶，到处煽动反华浪潮。"},{"type":"paragraph","text":"文章说：“毛泽东思想是世界帝国主义走向最后崩溃时代的马克思列宁主义。如果没有毛泽东思想这个指路明灯，世界革命就不能发展。因为，没有正确的革命理论，就不会有革命运动。帝国主义者和现代修正主义者所以都攻击毛泽东思想，也正是因为它是进行世界革命的理论指南。”"},{"type":"paragraph","text":"文章指出：“中国共产党创造性地发展了马克思列宁主义，提高了革命人民对马克思列宁主义普遍真理的认识，从而使他们对苏联修正主义集团和他们本国的修正主义的叛卖行为提高了警惕。”"},{"type":"paragraph","text":"文章热情赞扬毛主席亲自发动和领导的中国无产阶级文化大革命。"},{"type":"paragraph","text":"文章说：“目前在中国开展的无产阶级文化大革命，清除了旧社会遗留下来的污垢，因而消灭了产生修正主义的社会基础。这也进一步促进了世界革命运动和反对以美帝国主义为首的帝国主义的斗争。”"},{"type":"paragraph","text":"“中国的无产阶级文化大革命，把毛泽东思想带给世界人民，这对世界无产阶级革命的发展是必不可少的。”"},{"type":"paragraph","text":"文章接着指出，高举毛泽东思想伟大红旗的中国人民，遭到卖身投靠美帝国主义的苏联修正主义领导集团的反对，是并不奇怪的。"},{"type":"paragraph","text":"文章说：“由于苏联修正主义集团和他们的主子美帝国主义快要灭亡，他们更加仇恨中国了。这是很自然的。叛徒总是要这样干的。他们攻击中国，因为中国是他们从事叛卖的障碍。在伟大的马克思列宁主义者毛泽东领导下的中国共产党，揭露了苏联修正主义叛徒。”"},{"type":"paragraph","text":"“苏联修正主义领导集团的行动表明，他们同美帝国主义者的关系是非常密切的，充分暴露出他们是美帝国主义的帮凶。他们的一切行动都是密切配合美帝国主义的需要的。他们的叛徒嘴脸已经暴露无遗。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3d7d828782"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
