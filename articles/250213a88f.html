努力完成比赛任务，增进我与亚洲各国和地区运动员间的友谊","authors":[],"dates":[{"year":1978,"month":12,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京十二月一日电　华国锋主席，叶剑英、邓小平、李先念、汪东兴副主席，以及陈锡联、耿飚同志，今天下午在人民大会堂接见了参加第八届亚运会的中国体育代表团的领导成员、运动员、教练员和工作人员，并同大家一起照了像。"},{"type":"paragraph","text":"中国体育代表团即将启程前往曼谷。华主席以及党和国家其他领导人的接见，给他们很大的鼓舞，都表示要努力去完成亚运会的各项比赛任务，为促进亚洲体育运动的发展，增进中国与亚洲各国和地区运动员之间的友谊，作出贡献。"},{"type":"paragraph","text":"被接见的还有亚运会举行期间将访问泰国的东方歌舞团。"},{"type":"paragraph","text":"\u003cIMG alt=请插入7号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1978\\12\\78c2010101.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e华主席同篮球运动员穆铁柱亲切握手。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入7号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1978\\12\\78c2010102.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e华主席，叶剑英、邓小平、李先念、汪东兴副主席等同参加亚运会的同志们亲切见面。　均新华社记者摄(传真照片)\u003c/FONT\u003e"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"叶剑英","type":"人物"},{"name":"汪东兴","type":"人物"},{"name":"李先念","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"250213a88f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
