dates":[{"year":1947,"month":2,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报天津三日专电】　据关系方面消息:驻华美军陆战队将于两月内撤退完竣，惟剩余物资之处理，尚须更长时间。另据传闻美军眷属一批，仍在来华途中。(金)"},{"type":"paragraph","text":"【本报北平三日专电】　军调部政府方面昨日以备忘录致中共代表，要求于二日以前将共方撤退人员及地点名单提出，以便通知各地区军政当局，予以保护，否则不负安全责任，另据某关系方面称:军调部之撤废，按规定应由任何一方面下令，但迄今并未奉到此种命令，又悉:政府方面参谋长蔡文治定明日为共方人员饯行，另据侧面消息:蔡将调任驻美大使馆武官。(木)"},{"type":"paragraph","text":"【本报北平三日专电】　军调部共方今日得延安覆电谓:一切撤退事宜，由叶剑英全权处理。又叶于今晨以备忘录，致政府方面参谋长蔡文治，对政府一年来对于共方人员膳宿及交通工具诸方面之招待，表示感谢之意，同时并请转达李主任与何市长致谢。末谓:如美方交通工具允许，共方即决于本周内开始撤退另息:共方人员名单已交出(木)"},{"type":"paragraph","text":"【本报沈阳二日专电】　驻谿山小组，二日来沈，会齐各小组后，即转平。"},{"type":"paragraph","text":"【联合社北平三日电】美方驻延安联络团即将撤退，美国派代表驻延两年余，至是将告结束。美方联络团一口离去，将切断延安对外国之最后接触，因他国并无派使节或观察员该地者。美方联络团由军官两员及士兵一名组成，将依照美国退出军调部之政策而离延安。"}],"comments":[],"origin":"本报,联合社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8ffe265cec"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
