ates":[{"year":1946,"month":2,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【合众社北平廿日电】据此间华方报纸息:国共军于平汉路上保定以南五哩之处发生冲突。豫南安阳亦续有冲突。铁路管理小组定本日离平赴安阳监督修理豫省之铁道。食米蕃薯四千五百石业已运抵鲁省泰安，将由国民党中共及美方代表组成之粮食委员会指导分配。"},{"type":"paragraph","text":"【联合社北平二十日电】今日午后二时左右，有难民二千人，自称近郊住户，拥入协和医院军事调处执行总部，要求安全返家，并要求共军自彼等所居村庄撤退。为首群众叩门求见中共委员叶剑英，但未发现叶氏，群众乃穿越天井及房廊，直趋叶氏办公室，但经告以叶氏不在，乃悄然退出。执行部代表，当与为首诸人谈话。请愿群众大部份衣冠楚楚，男女小孩均有，多数自称为附近各县之地主商人，或其他职业者。手持旗帜上书县名，有一标语用英语写成，上称:“打倒破坏铁路的汉奸。”"}],"comments":[],"origin":"合众社,联合社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"10f8dadaec"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
