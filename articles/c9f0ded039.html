art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"我国防部最强烈抗议美帝严重战争挑衅我人民空军起飞迎击打伤敌机一架严正警告美国侵略者；用伟大毛泽东思想武装起来的中国人民，不怕任何战争威胁，严阵以待？如果你们一定要较量，七亿人民的铁拳定把侵略者砸得粉碎？","authors":[],"parts":[{"type":"paragraph","text":"新华社十六日讯 美帝国主义F—105型战斗机两架，九日上午悍然侵入我广西东兴各族自治县上空，疯狂扫射我村庄和正在劳动的公社社员。我人民空军当即起飞迎击，打伤敌机一架。"},{"type":"paragraph","text":"我国防部发言人愤怒谴责美帝国主义这种疯狂的战争挑衅行为，并且就此提出最强烈的抗议。"},{"type":"paragraph","text":"这两架美机，在九日九时十分一侵入我广西东兴各族自治县上空，就对地面疯狂扫射，并发射火箭多枚，打伤我公社社员三人，打死耕牛一头，打坏房屋两间。我人民空军立即奋起截击敌机，当即击伤其中一架。敌机见势不妙，仓惶扔掉副油箱和还没有来得及发射的火箭，就狼狈逃窜。"},{"type":"paragraph","text":"在这以前，九月五日三时，美国强盗飞机还侵入我友谊关西南边境地区上空，投下炸弹数枚。"},{"type":"paragraph","text":"我国防部发言人指出：美帝国主义这样肆无忌惮地连续侵入我国领空，疯狂轰炸扫射，决不是偶然的。这是美帝国主义在加紧扩大侵略越南战争的同时，对中国人民进行的又一次严重的战争挑衅。这不能不引起全中国人民的极大愤慨和严重警惕。我们要严正警告美国侵略者：用伟大毛泽东思想武装起来的英雄的中国人民，是不怕任何战争威胁的。我们正在严阵以待，如果你们一定要较量的话，那就来吧！七亿中国人民的铁拳一定会把侵略者砸得粉碎。"},{"type":"paragraph","text":"入侵我广西东兴各族自治县上空的美国强盗飞机，被我人民空军击伤后狼狈逃窜。这是美机扔下的火箭残骸。 新华社稿"},{"type":"paragraph","text":"入侵我广西东兴各族自治县上空的美国强盗飞机，狼狈逃窜时扔下的副油箱和火箭发射架残骸。左下图是美机副油箱上的商标，上有“美国财产”、“佛莱彻尔公司”制造、“油量六百五十美国加化”、“空重三百二十三磅”及“序列编号”等字样。"},{"type":"paragraph","text":"美国强盗飞机在广西友谊关西南边境地区上空投下炸弹数枚。这是落在卡凤公社弄怀屯的美帝国主义炸弹（子母弹）的弹壳。右上图是子母弹弹壳上的商标，上有“美国通用航空喷气公司”制造、“美国空军”、“序列编号”等字样。（照片）"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"广西文革","type":"人物"},{"name":"越南战争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c9f0ded039"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
