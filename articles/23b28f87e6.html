ical-archives/banned-historical-archives0/main/maoquanji35.pdf"],"article":{"title":"关于调查山西省和顺、昔阳两县农民缺粮情况的批语","alias":"","parts":[{"type":"paragraph","text":"关于调查山西省和顺、昔阳两县农民"},{"type":"paragraph","text":"缺粮情况的批语"},{"type":"paragraph","text":"（1955年7月8日）小平川同志："},{"type":"paragraph","text":"此件第五页所载山西两个县缺粮情况?是否属实，请转山西省委派人前往调查，以其结果报告中央为盼。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"七月八日[1]小平，即邓小平，当时任中共中央秘书长、国务院副总理。"},{"type":"paragraph","text":"[2]《人民日报》总编室1955年7月6日编印的《人民日报情况》登载的《读者反映山西和顺、昔阳两县农民缺粮情况严重》的材料说：据6月中旬收到的读者来信反映，山西省和顺、昔阳两县农民缺粮情况十分严重，不少农民放弃了生产，成群结队到外地投亲或行乞，有的地方已出现卖子女、离婚等现象。由于粮食问题得不到解决，农民怨言很多，反动地主、富农和暗藏的反革命分子也趁机活动，各种谣言不断出现。读者在来信中要求党和政府迅速派人下去查明情况，解决农民的缺粮问题。"}],"authors":["毛泽东"],"dates":[{"year":1955,"month":7,"day":8}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":188,"page_end":188},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"23b28f87e6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
