ear":1952,"month":4,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"王孙"},{"type":"paragraph","text":"在这次伟大的五反斗争中，曾经涌现了不少的爱国青年积极检举了他们的家属或亲友，像许云影、马六珂都是每个青年的好榜样。由于这些爱国青年的正义行为，使五反运动更迅速地向前推进一步。事实证明:资产阶级出身的同学们的积极行动，是五反斗争的一支辅助力量。今天已有许多资产阶级出身的同学受了这些英勇行动的感染，都纷纷自动地要求向资产阶级家庭作坚决的斗争，获得了或多或少的成绩。为使这些同学们能够取得彻底的胜利，我想来谈一谈怎样向资产阶级家庭作斗争的问题。"},{"type":"paragraph","text":"\u003cIMG alt=请插入3号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1952\\04\\524e060301.JPG\"\u003e"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5a05c8fca3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
