ical-archives/banned-historical-archives0/main/maoquanji37.pdf"],"article":{"title":"关于请胡乔木阅读《在社会大变动的时期里》一文的批语","alias":"","parts":[{"type":"paragraph","text":"关于请胡乔木\"阅读《在社会大变动的时期里》一文的批语"},{"type":"paragraph","text":"（1957年4月）送胡乔木同志阅。可惜人民【日报】缺乏这样一篇文章"},{"type":"paragraph","text":"毛[1]胡乔木，当时任中共中央书记处候补书记、毛泽东的秘书。"},{"type":"paragraph","text":"[2]指1957年4月13日《大公报》社论《在社会大变动的时期里》。文章说，我们的国家目前正处在大变动的时期。第一，由于社会主义改造的决定性胜利和社会主义建设的巨大发展，我国的社会制度起了根本的变化。第二，经济制度的剧烈变化，必然会反映到广大人民的思想意识中。第三，我们的经济事业和其他工作不能停留在现有的技术水平上，它们应当而且也必然会有高度的发展。在这个大变动的时期里，时代带给我们巨大的历史任务。在经济建设战线上，我们要把人民的经济事业组织好、管理好，这就要求我们学会经营管理社会主义的企业，也要求我们学会逐步进行国民经济的技术改造。在思想建设战线上，人民的思想状况应当符合于社会主义的经济基础，并且能推动经济事业的发展。"}],"authors":["毛泽东"],"dates":[{"year":1957,"month":4}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":515,"page_end":515},"tags":[{"name":"毛泽东","type":"人物"},{"name":"胡乔木","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"327f18cb76"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
