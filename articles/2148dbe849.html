<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"区别奴隶社会和封建社会的标志","authors":[],"dates":[{"year":1956,"month":12,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"华东师范大学历史系教授束世澂，最近完成了一篇“论区别奴隶社会和封建社会的标志”的论文。"},{"type":"paragraph","text":"作者说，我国古代史的分期问题争论了几十年，至今还未能得出结论。这是因为其中有些症结问题纠缠不清，难于解决的缘故。他在这篇论文中着重分析了斯大林对封建制所下的定义:“在封建制度下，生产关系底基础是封建主占有生产资料和不完全占有生产工作者”。他认为这个定义是不够明确、不够圆满的。"},{"type":"paragraph","text":"过去有人根据斯大林所下的定义，认为奴隶主对奴隶可以自由杀戮、封建主则无权处死奴婢，可作为古代史分期问题的特征。束世澂指出，典型奴隶制的雅典共和国，在法律上并没有准许奴隶主可以任意杀戳奴隶的条文。我国唐代，一般承认它是封建社会，但法律上却规定:“奴婢贱人，律比畜产”“决罚致死……无罪”。其他无论从社会支配生产力者、从生产力、从所使用的生产工具或人身依附关系等标志来划分奴隶社会和封建社会，也都不能说明问题。"},{"type":"paragraph","text":"束世澂引证了马克思论封建制的话:“土地所有权只是某些人对直接生产者人身所有权的附属品，在奴隶制及农奴制下就是如此。”他认为这样是确切地反映出奴隶制和封建制的社会结构。"},{"type":"paragraph","text":"束世澂又引证了列宁对封建制的描绘:农民用自己的劳动及自己的农具去耕种领主的土地，生产品归了领主，一星期给领主工作几天，另几天给自己工作，农民自己份地上的私人经济是领主经济底条件，其目的不是给农民保证生产资料，而是给领主保证劳动人手。他认为农奴制的构成，必须有对立的两方，一方是握有世袭领地的领主，另一方是被分与土地的农民，只有这样，才形成了农奴制，才是封建社会的开始。"},{"type":"paragraph","text":"束世澂还引述了恩格斯“论日耳曼人封建制的形成”中提到封建制是由采邑制和保护关系底进一步发展而成为证，以法兰克为例，第九世纪盛行领地制，才是封建社会；而封建化的最终完成，则在十一、二世纪的法兰西时代。"},{"type":"paragraph","text":"束世澂认为，过去采用斯大林的封建制定义过于简单笼统；如果遵从马克思、恩格斯和列宁的指导文献，来探求封建制的标志，中国古代史的分期问题是不难解决的。从马克思、恩格斯和列宁的指示中，可以得出下列要点:一、马克思指出，领主对农奴是有人身所有权的；二、恩格斯指出，封建领地在任何情况下都是一种“职田”，不容和地主所有制混淆；三、列宁指出，构成封建制的对立阶级是领主与农奴；四、恩格斯在“法兰克时代”论文中，以采邑制的形成看作封建制的萌芽时期，以领地制(即领主制)的形成为封建社会开始的时期，可作为区分奴隶制和封建制的标志。"},{"type":"paragraph","text":"束世澂这篇论文，将在1957年1月创刊的“学术月刊”上发表。"},{"type":"paragraph","text":"(彦)"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2148dbe849"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
