tart":5,"page_end":5,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"声讨“四人帮”","authors":["抒新善飞"],"parts":[{"type":"paragraph","text":"山在呐喊，"},{"type":"paragraph","text":"海在咆哮。"},{"type":"paragraph","text":"搞修正主义的蛇蝎们——滚开！"},{"type":"paragraph","text":"搞分裂的蛀虫们——滚开！"},{"type":"paragraph","text":"搞阴谋诡计的奸贼们——滚开！"},{"type":"paragraph","text":"滚开！滚开！滚开！"},{"type":"paragraph","text":"八亿张怒吼的喉咙，"},{"type":"paragraph","text":"八万钧雷霆炸天外！"},{"type":"paragraph","text":"八亿双攥紧的拳头，"},{"type":"paragraph","text":"八万丈狂飙扫“四害”！"},{"type":"paragraph","text":"“四人帮”——"},{"type":"paragraph","text":"把马列主义无耻叛卖，"},{"type":"paragraph","text":"“四人帮”——"},{"type":"paragraph","text":"把毛主席指示疯狂篡改，"},{"type":"paragraph","text":"住手！住手！住手！"},{"type":"paragraph","text":"高高飘扬的五星红旗，"},{"type":"paragraph","text":"哪能让阴谋家玷污！"},{"type":"paragraph","text":"毛主席开创的革命事业，"},{"type":"paragraph","text":"怎能让野心家败坏！"},{"type":"paragraph","text":"中国革命的航船，"},{"type":"paragraph","text":"决不能落入阴谋家的黑手，"},{"type":"paragraph","text":"中国人民的命运，"},{"type":"paragraph","text":"岂能让野心家主宰！"},{"type":"paragraph","text":"亿万人民同仇敌忾，"},{"type":"paragraph","text":"声讨的浪潮震撼天外："},{"type":"paragraph","text":"谁违背三项基本原则，"},{"type":"paragraph","text":"万人唾弃，万足齐踹！"},{"type":"paragraph","text":"看历史车轮滚滚向前，"},{"type":"paragraph","text":"把小小“四人帮”碾成尘埃！"}],"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"502dc378ce"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
