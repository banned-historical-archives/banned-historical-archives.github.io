art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"决心当毛泽东思想大学校的好学生西藏军区某部二连藏族战士爱读“老三篇”","authors":["张启方"],"parts":[{"type":"paragraph","text":"本报讯 去年九月，一批翻身农牧民的子弟来到西藏军区某部二连。连里为了帮助这些战士更好地掌握毛泽东思想，以《为人民服务》、《纪念白求恩》、《愚公移山》为课本，边学毛主席著作，边学文化，既提高了思想觉悟，又提高了文化水平。"},{"type":"paragraph","text":"战士们无比热爱毛主席的书，他们把这三篇光辉著作带在身上，走到哪里学到哪里。有的把这三篇著作中的生字抄在本子上，有的在黑板上、沙地上反复地练习写字，还有的把毛主席的话编成歌曲唱。许多战士还把“毛主席万岁”“中国共产党万岁”“人民公社万岁”等自己最喜爱的口号，以及热爱毛主席的心情，让别人写成汉文，自己照着读和写。他们说：“我天天看到毛主席的像，好像毛主席天天站在我面前。我天天读毛主席的书，好像天天听到毛主席的声音。要我好好学习，革命到底。”这些同志进步很快。"},{"type":"paragraph","text":"新战士次仁穷沛初到连队时，怕紧张，有些不安心。在旧社会和次仁穷沛的父亲一起讨过饭的副指导员大扎西，多次给次仁穷沛讲过去的苦难经历，还把次仁穷沛领到营房附近他们过去讨饭时住过的几个破烂不堪的小窑洞前，一面回忆过去，一面学习毛主席著作。打这以后，次仁穷沛把报纸上的毛主席语录剪下来，一条一条学，坚决照毛主席的指示办事。有天夜晚，他和战友去放水浇地，突然水渠决口，次仁穷沛想起毛主席“毫不利己专门利人”的教导，就毫不犹豫地扑上去，用身体去堵。最近，次仁穷沛当了班长。他学习了毛主席关于挑重担子的教导后，充满了做好工作的信心。"},{"type":"paragraph","text":"无产阶级文化大革命以来，全连同志都更加如饥似渴地学习毛主席著作，更加刻苦地学习文化。他们决心把连队办成毛泽东思想的好学校。每个藏族战士都决心做一个毛泽东思想大学校里的好学生。（张启方）"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"西藏文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a5e7bac442"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
