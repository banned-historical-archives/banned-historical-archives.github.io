r":1966,"month":9,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席说的我都照办"},{"type":"paragraph","text":"我很关心现在正在中国进行的社会主义文化大革命。听说六月六日北京高中学生写信给党中央和毛主席，强烈要求废除旧升学制度，我认为这是非常了不起的行动。因为他们同我一样，都是高中三年级的学生。那种令人钦佩的思想和行动，只有在毛主席领导下的中国才能产生。在我国，上大学只是死读书，对别人的事根本不放在心上。像这样的人是帝国主义及佐藤所需要的。"},{"type":"paragraph","text":"我们决不甘心当奴隶，那么我们怎么办才好？我只有好好地用毛泽东思想武装自己，并把它付诸实践。毛主席不仅是中国人民的，而且是世界人民的。毛主席是我最好的导师。毛泽东思想是指导我日常生活的指南针。"},{"type":"paragraph","text":"我买了七月五日的《北京周报》。第一页以整页篇幅登了毛主席的照片。我看到毛主席像时的激动心情很难用笔墨形容。我眼里充满了热泪。只要是毛主席说的，不管什么事，我都照办，甚至献出我自己的生命。"},{"type":"paragraph","text":"毛泽东思想万岁！"},{"type":"paragraph","text":"毛泽东主席万岁！"},{"type":"paragraph","text":"〔日本〕鹤田"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"67090e704e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
