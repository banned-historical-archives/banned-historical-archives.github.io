电报","authors":["毛泽东"],"dates":[{"year":1949,"month":10,"day":12}],"is_range_date":false,"parts":[{"text":"中央关于民族军改名和成立新疆分局的电报","type":"title"},{"text":"毛泽东","type":"authors"},{"text":"彭甘，并西北局：","type":"appellation"},{"text":"九日酉时电悉。（一）伊宁民族军必须有一人为新省军区副司令，已见前电。（二）民族军应改名为人民解放军，他们已有此意，并要求我们派政治工作人员去。此事及应编师的数目及具体番号，待你至迪化与民族军负责人商量后再定。（三）民族军应有一部开迪化，另一部开乌苏。此事待与赛福鼎商量后，再告。（四）新疆党的领导机关应成立分局，同意以王震为书记，徐立清为副书记，罗元发，张贤约，饶正锡，王恩茂，郭鹏，曾涤，邓力群为委员。自治区只有民主同盟，尚无党的组织（应该建立党的组织），是否可以同盟负责同志数人临时参加分局会议，待考虑后再告。","type":"paragraph"},{"text":" 中央十月十二日","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cdc4d6b123"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
