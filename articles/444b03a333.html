[],"dates":[{"year":1983,"month":12,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京十二月十六日电　今天出版的第二十四期《红旗》杂志在“纪念毛泽东同志九十周年诞辰”的专栏里，发表了毛泽东同志的五封书信。"},{"type":"paragraph","text":"这五封书信是:《致范文澜》(一九四○年九月五日)、《致中央研究组及高级研究组》(一九四一年九月二十九日)、《致何凯丰》(一九四二年九月十五日)、《致吴玉章》(一九四八年八月十五日)、《致中央、省市自治区、地、县四级党委委员》(一九五八年十一月九日)。《红旗》杂志在刊登这五封书信时，还刊登了《致范文澜》信的手迹。"},{"type":"paragraph","text":"为了纪念毛泽东同志九十周年诞辰，《红旗》杂志还在封面上刊登了毛泽东同志校订《毛泽东选集》第四卷的照片。"},{"type":"paragraph","text":"在“纪念毛泽东同志九十周年诞辰”专栏里，还发表了李维汉的文章:《毛泽东思想指导下的中国统一战线》；杨得志的文章:《在新的历史条件下坚持和发展人民战争的战略战术思想》；《红旗》编辑部文章:《建设有中国特色的社会主义》。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"杨得志","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"范文澜","type":"人物"},{"name":"人民战争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"444b03a333"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
