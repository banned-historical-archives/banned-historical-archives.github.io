ical-archives/banned-historical-archives0/main/maoquanji51.pdf"],"article":{"title":"对中南海门诊部关于周恩来心脏病情况报告的批语","alias":"","parts":[{"type":"paragraph","text":"对中南海门诊部关于周恩来心脏病"},{"type":"paragraph","text":"情况报告的批语\""},{"type":"paragraph","text":"（1972年11月12日）应当休息、节劳。不可大意。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"1972，11，12"},{"type":"paragraph","text":"[1]中南海门诊部卞志强、张佐良1972年11月11日给叶剑英等中央领导人写报告说，昨晚再次组织了有关的心脏科医生会诊，大家一致认为：恩来同志的心脏病发展是比较重的，动脉硬化的情况，特别是主动脉硬化引起主动脉瓣膜关闭不全的情况有所加重，导致冠状动脉供血不足及心脏功能均较前为差，要及时严重注意。平时虽随时研究病情，调整治疗，但药物的力量毕竟有限，宜特别注意休息，增加睡眠，采取减轻工作和其他一些可行的办法。希望中央领导同志考虑，并给以指示。毛泽东看到报告后写了这个批语。"}],"authors":["毛泽东"],"dates":[{"year":1972,"month":11,"day":12}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":360,"page_end":360},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1e67487405"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
