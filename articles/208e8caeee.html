rt":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东思想是革命和建设的指路明灯","authors":[],"parts":[{"type":"paragraph","text":"据新华社开罗三日电 巴苏陀兰大会党驻开罗代表拉马格勒·钦亚恩三日在这里向新华社记者谈到他最近访问中国的观感说：“毛泽东思想是中华人民共和国社会主义建设迅速发展的真正指路明灯，所有的工人、农民和其他各阶层中国人民正在如饥如渴地学习毛泽东思想，并在自己的工作中运用毛泽东思想。”"},{"type":"paragraph","text":"钦亚恩说：“中国人民的战斗性和国际主义给我们的印象最深。我们在街上、在工厂或人民公社里遇到许多人，在交谈中发现他们都决心要同帝国主义和新老殖民主义斗争到底，并且表示支持和声援世界被压迫人民的斗争。”"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"208e8caeee"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
