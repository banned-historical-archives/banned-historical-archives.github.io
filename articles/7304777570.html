","authors":[],"dates":[{"year":1967,"month":5,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"意大利《红卫兵》报说中国文化大革命赢得世界革命者支持"},{"type":"paragraph","text":"红卫兵为世界革命作出伟大贡献"},{"type":"paragraph","text":"据新华社讯　罗马消息：意大利共产主义青年联盟（马克思列宁主义）机关报《红卫兵》最近在一篇社论中热烈赞扬毛主席和中国无产阶级文化大革命时写道：“今天领导我们、领导一切革命者的是毛泽东——当代的列宁，他是一支伟大的革命军队的舵手。”"},{"type":"paragraph","text":"社论严厉地驳斥了帝国主义和现代修正主义对中国无产阶级文化大革命的恶毒诽谤，并且指出，自去年八月以来，中国的“无产阶级文化大革命突飞猛进地向前发展。它挫败了帝国主义者和修正主义者的阴谋，赢得了世界上所有革命者的充分支持，为无产阶级巩固社会主义的斗争、反对修正主义的斗争和实行无产阶级专政下的广泛的革命的民主指出了新的伟大的方向。”"},{"type":"paragraph","text":"社论在谈到中国的红卫兵时热情地写道：“中国的红卫兵在向全世界青年进行纪律和革命干劲的教育。红卫兵所担负的砸烂旧世界、做共产主义事业接班人的任务，是他们为世界革命作出的最有效的贡献。”"},{"type":"paragraph","text":"社论在谈到毛泽东思想对意大利青年的革命斗争的指导意义时指出：“如果我们在青年日常的斗争中能够善于正确地运用毛泽东思想，意大利共产主义青年联盟（马克思列宁主义）就会起到它的先锋作用、共产主义学校的作用。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7304777570"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
