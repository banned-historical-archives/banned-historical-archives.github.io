nned-historical-archives/banned-historical-archives9/main/books/十年文革中首长讲话传信录3.pdf"],"article":{"title":"戚本禹给新华社革命同志的电话指示","parts":[{"type":"title","text":"850.戚本禹给新华社革命同志的电话指示"},{"type":"paragraph","text":"(1967年7月24日)"},{"type":"paragraph","text":"我对新华社工作有几点意见，能转告新华社革命同志，作为研究问题参考："},{"type":"paragraph","text":"我认为新华社革命同志在无产阶级文化大革命中做了很多工作，很多记者同志在两条道路、两个阶级斗争中很英勇，应该表扬。但是现在在新华社内部黑线影响是否肃清了，革命是否搞好了，新华社各部门领导权是否是真正掌握在无产阶级革命派手中，我有怀疑。突出一点，是你们那里可以向黑线司令部提供绝密情报，但不向中央文革等同志或三军无产阶级司令部同志反映情况，例如“××××”“××××”绝密文件可以发给华北局、西北局以及中央各部门另外一个司令部一些人物，但不发给张春桥、王力、关锋、姚文元甚至江青同志，这是不能容忍的，在无产阶级文化大革命进行一年多，还有这样的现象，是很奇怪的，希望你们向中央文革作检查，请王唯真同志抓一下此事。"}],"authors":["戚本禹"],"dates":[{"year":1967,"month":7,"day":24}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":309,"page_end":310,"alias":""},"tags":[{"name":"戚本禹","type":"人物"},{"name":"中央文革","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"338a6ef15d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
