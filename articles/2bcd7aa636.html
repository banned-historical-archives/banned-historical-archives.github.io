ical-archives/banned-historical-archives0/main/maoquanji40.pdf"],"article":{"title":"大国小国应该平等相待","alias":"","parts":[{"type":"paragraph","text":"大国小国应该平等相待"},{"type":"paragraph","text":"（1958年8月16日）"},{"type":"paragraph","text":"大国、小国应该平等相待。有这样一种论调：大国是不好惹的，小国是可以随便欺侮的。这种论调是绝对没有道理的。什么大国小国，大国往往是由许多小国联合组成。中国在古代就是由一万个左右的小国组织成的，后来变成八百个小国，以后又变成七个小国，最后才统一成一个大国。现在中国还是由许多省份组成的。鹿和老虎谁比谁强？我看老虎不一定比鹿强。一九○○年，八国联军打进北京来，八国联军中也有小国，可是它们欺侮大国。日本也是小国，也侵略过我们。这是因为它们是工业国；我们是农业国，政府也很腐败。"},{"type":"paragraph","text":"国家大小只是形式。我们两国是完全平等的朋友性质的国家。我们希望你们发达起来，我看这是完全可能的。"},{"type":"paragraph","text":"[1]这是毛泽东和柬埔寨王国首相诺罗敦·西哈努克亲王谈话的一部分。"}],"authors":["毛泽东"],"dates":[{"year":1958,"month":8,"day":16}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":44,"page_end":44},"tags":[{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2bcd7aa636"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
