art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"父女俩","authors":["王兴柏〖HH/换行〗DW：八七○九五部队"],"parts":[{"type":"paragraph","text":"新播的种子发了芽，"},{"type":"paragraph","text":"离巢的小鹰飞天涯。"},{"type":"paragraph","text":"老团长笑眼眯成线，"},{"type":"paragraph","text":"下乡的女儿来信啦！"},{"type":"paragraph","text":"信儿来自天山下，"},{"type":"paragraph","text":"一张照片随信夹，"},{"type":"paragraph","text":"跨马挥鞭牧羊群，"},{"type":"paragraph","text":"哈，真象一个新疆娃！"},{"type":"paragraph","text":"一行行字迹映眼帘，"},{"type":"paragraph","text":"激昂的话儿催心花："},{"type":"paragraph","text":"“贫下中牧老师多啊，"},{"type":"paragraph","text":"广阔天地课堂大；"},{"type":"paragraph","text":"“捧血衣，老书记痛说血泪史，"},{"type":"paragraph","text":"使我懂得爱啥和恨啥；"},{"type":"paragraph","text":"风雪中，队长帮我练骑、掌羊鞭，"},{"type":"paragraph","text":"教我怎样认路、抗风沙。"},{"type":"paragraph","text":"“油灯下，大婶和我学理论，"},{"type":"paragraph","text":"明灯盏盏心头挂；"},{"type":"paragraph","text":"批判会上，我和大叔同登台，"},{"type":"paragraph","text":"怒斥邓小平把言发。"},{"type":"paragraph","text":"“任凭翻案妖风四处狂，"},{"type":"paragraph","text":"刮不倒新人的钢骨架；"},{"type":"paragraph","text":"咱是文化大革命炼出的新一代，"},{"type":"paragraph","text":"心中装着全国、全天下……”"},{"type":"paragraph","text":"老团长心喜忙回信，"},{"type":"paragraph","text":"对女儿掏出心里话："},{"type":"paragraph","text":"“你向资产阶级法权坚决挑战，"},{"type":"paragraph","text":"学习你，我复员到农村去安家！”"}],"alias":""},"tags":[{"name":"限制资产阶级法权","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"47f778d202"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
