itle":"中国人民解放军军事法院刑事判决书【顾同舟】","dates":[{"year":1982,"month":2,"day":25}],"is_range_date":false,"authors":["中国人民解放军军事法院"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"《历史的审判（续集）》编辑组，历史的审判（续集），317-318","tags":[{"name":"长沙","type":"主题/事件"},{"name":"顾同舟","type":"主题/事件"},{"name":"军事法院","type":"主题/事件"},{"name":"林彪","type":"主题/事件"},{"name":"判决书","type":"主题/事件"},{"name":"周宇驰","type":"主题/事件"}],"parts":[{"type":"title","text":"中国人民解放军军事法院刑事判决书"},{"type":"subtitle","text":"(1982)刑字第1号"},{"type":"paragraph","text":"公诉人：中国人民解放军军事检察院检察员韩鹤、阚国富。"},{"type":"paragraph","text":"被告人：顾同舟，男，汉族，现年六十二岁，河北省清河县人，一九三七年十一月入伍，原系广州军区空军司令部参谋长，一九七一年九月十七日被隔离审查，一九八〇年七月二十九日被逮捕。现在押。"},{"type":"paragraph","text":"被告人顾同舟资敌一案，由本院依法组成合议庭，于一九八二年二月二十五日在本法庭依法进行了公开审理。解放军军事检察院检察员韩鹤、阚国富出庭支持公诉。经审理查明："},{"type":"paragraph","text":"一九七一年九月五日，被告人顾同舟参加了广州军区召开的军以上干部会议，听了军区领导传达的毛泽东主席在长沙接见负责干部时揭露林彪等人的重要谈话。当时会议宣布，不准记，不准传，不准向北京打电话报告传达内容。但顾同舟为了满足林彪反革命集团的需要，于当晚十一时三十五分，在电话上向林彪反革命集团成员于新野密报了毛泽东主席的谈话内容。九月六日，林彪反革命集团案主犯周宇驰驾驶直升飞机到北戴河，将于新野整理的顾同舟密报毛泽东主席谈话内容的电话记录稿送给林立果、叶群。促使林彪提早下决心谋杀毛泽东主席，发动反革命武装政变。"},{"type":"paragraph","text":"九月八日周宇驰打电话给顾同舟，指使顾同舟派陈伯羽去长沙探听毛泽东主席在长沙时的情况，尔后到北京，顾接此电话后，当日即将陈派往长沙。顾同舟还按照周宇驰的旨意，将毛泽东主席的谈话内容整理成文字材料，连同其给周宇驰的亲笔信，派其妻以看病为名，于九月九日乘飞机到北京送给周宇驰。"},{"type":"paragraph","text":"上述事实清楚，证据确凿，被告人亦供认。"},{"type":"paragraph","text":"被告人顾同舟，为林彪反革命集团提供重要情报，后果严重，已构成资敌罪。本院力维护社会主义法制，巩固人民民主专政，保卫社会主义制度，依照《中华人民共和国刑法》第九十七条和第五十二条之规定，判决如下："},{"type":"paragraph","text":"一、判处资敌犯顾同舟有期徒刑十一年，刑期自判决执行之日起，扣除判决执行前的羁押期，至一九八二年九月十六日止。"},{"type":"paragraph","text":"二、剥夺其政治权利三年。"},{"type":"paragraph","text":"三、剥夺其二级独立自由勋章和二级解放勋章。"},{"type":"paragraph","text":"如不服本判决，可从接到判决书的第二天起，十日内提出上诉状和副本，上诉于中华人民共和国最高人民法院。"},{"type":"subtitle","text":"审判长 陈少柏"},{"type":"subtitle","text":"审判员 阎国森"},{"type":"subtitle","text":"军人陪审员 王克东"},{"type":"subtitle","text":"军人陪审员 刘玉荣"},{"type":"subtitle","text":"军人陪审员 涂序凑"},{"type":"subtitle","text":"一九八二年二月二十五日"},{"type":"subtitle","text":"书记员 程玉林"},{"type":"subtitle","text":"一九八二年三月一日"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4398de64d7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
