art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东思想放光芒天险变通途","authors":["铁道兵学习毛主席著作积极分子代表大会代表/杨连第生前所在连队指导员朱圣尧"],"parts":[{"type":"paragraph","text":"毛主席啊，毛主席！我们又一次见到了您。十几年来，您老人家先后九次接见了我们连的代表，这是您老人家对我们最大的关怀，最大的鼓舞，最大的鞭策！"},{"type":"paragraph","text":"毛主席啊，毛主席！回顾我们连的战斗历程，那一步不是在您光辉思想指引下走过来的。翻开我们连的战斗史册，那一页不是用您的光辉思想写成。我们高举您的思想伟大红旗，穿森林，攀绝壁，走天险，越狭谷，开山劈岭，修路架桥，在您老人家所走过的长征途中，在那急流险滩上，十几年来，我们修架起四十六座通向北京的金桥。我们的每一个胜利都是您的光辉思想的胜利。"},{"type":"paragraph","text":"毛主席啊，毛主席！您的光辉思想哺育起来的战士对您最忠，最忠。每当我们在登高遇到困难时，想起您老人家，就浑身是劲，腿不软，心不跳。当山风呼啸，大雨瓢泼，随时都有刮下桥墩的危险时，牢记您老人家的教导，就稳如泰山，坚如磐石。"},{"type":"paragraph","text":"我们就是靠着您老人家的光辉思想，提高部队思想觉悟，搞好思想革命化。用您老人家战无不胜的思想培养出一批又一批无限忠于您的共产主义新人。我们要一辈子读您的书，听您的话，照您的指示办事，做您的好战士。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8d31f6aa8e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
