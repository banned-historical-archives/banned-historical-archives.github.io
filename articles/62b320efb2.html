ical-archives/banned-historical-archives0/main/maoquanji48.pdf"],"article":{"title":"毛泽东等祝贺中蒙友好互助条约签订五周年的电报","alias":"","parts":[{"type":"paragraph","text":"毛泽东等祝贺中蒙友好互助条约"},{"type":"paragraph","text":"签订五周年的电报"},{"type":"paragraph","text":"（1965年5月30日）乌兰巴托蒙古人民革命党中央委员会第一书记、蒙古人民共和国部长会议主席尤·泽登巴尔同志，蒙古人民共和国大人民呼拉尔主席团主席扎·桑布同志："},{"type":"paragraph","text":"在中华人民共和国和蒙古人民共和国友好互助条约签订五周年的时候，我们代表中国共产党、中华人民共和国政府和中国人民向蒙古人民革命党、蒙古人民共和国政府和蒙古人民致以热烈的祝贺。"},{"type":"paragraph","text":"祝中蒙两国人民之间的友谊和友好合作关系在马克思列宁主义和无产阶级国际主义的基础上，在反对帝国主义侵略和保卫世界和平的斗争中得到进一步的发展。"},{"type":"paragraph","text":"中国共产党中央委员会主席毛泽东中华人民共和国主席刘少奇中华人民共和国全国人民代表天会常务委员会委员长朱德中华人民共和国国务院总理周恩来"},{"type":"paragraph","text":"一九六五年五月三十日"}],"authors":["毛泽东"],"dates":[{"year":1965,"month":5,"day":30}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":68,"page_end":68},"tags":[{"name":"毛泽东","type":"人物"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"62b320efb2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
