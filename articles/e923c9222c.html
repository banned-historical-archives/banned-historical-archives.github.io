" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"还政于民","authors":["清华大学","马琦(马维琦)"],"dates":[{"year":1957,"month":5,"day":25}],"is_range_date":false,"parts":[{"text":"还政于民","type":"title"},{"text":"清华大学马琦(马维琦)","type":"authors"},{"text":"（马琦，即马维琦，清华大学电机系学生）","type":"subtitle"},{"text":"其一：马克思的自私的逆子们愚蠢的认为只有党团员才懂得马列主义，否认非党团员们的马列主义觉悟，迷信的信任自己的‘进步性’，对别人否认一切，天天疑神疑鬼，但科学不能垄断为升官法宝，马克思主义是人类的历史遗产。人人有权继承，我们坚决反对正统马克思主义迷信。","type":"paragraph"},{"text":"其二：非党团员要民主要权利，要做自己命运的主人，要做国家命运的主人。我们不要做客人，我们不只要义务，我们不要作庸人政治下的牺牲，我们不要粗暴和野蛮，为民主自由头曾可断，血曾可流，今日决不容许那些不学无术的‘土包子’霸占自己心爱的祖国的命运，独断独行。","type":"paragraph"},{"text":"其三：共产党好比一支未熟的桃子，尖上红、下面青、理论红、行动青。我们不能满足他是一支桃子，而要他是一支全红的桃子，党要澈底整整。","type":"paragraph"},{"text":"其四：那些封建的家谱迷者处处接谱点中，不管称不称职，有多大本领，品质多恶劣，只要在谱内就可给以信任，提拔，不在谱就是异己。结果造成局部庸人掌权、胡作非为，甚至变成土皇帝操生杀之权。","type":"paragraph"},{"text":"一、民无权的基本特征：","type":"paragraph"},{"text":"1．假民主的选举权，被选举权——空话，罢免权＝0，代表不受选民意志的约束。","type":"paragraph"},{"text":"2．人民对当权者没有切实监督。","type":"paragraph"},{"text":"3．人权无保障，政治上受歧视。","type":"paragraph"},{"text":"二、还政于民的几点要求：","type":"paragraph"},{"text":"1．真正民主的选举权和被选举权的实际保障，切实的罢免权，代表必须受选民的监督和约束。","type":"paragraph"},{"text":"2．保证人民对当权者的监督权。","type":"paragraph"},{"text":"3．保障侵犯人权者受法律制裁，政治平等，反对党员特权。","type":"paragraph"},{"text":" 来源：《高等学校右派言论选编》（中共中国人民大学委员会，1958年8月）。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e923c9222c"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
