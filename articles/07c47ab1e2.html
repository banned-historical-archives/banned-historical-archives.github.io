r":1966,"month":3,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"一切工作都要突出毛泽东思想"},{"type":"paragraph","text":"中共云南省委要求全省干部坚持突出政治，把学习毛主席著作放在首位，把领导好学习毛主席著作作为头等重要的政治任务，使全省工作沿着正确的政治方向前进"},{"type":"paragraph","text":"据新华社昆明二十三日电中共云南省委最近举行的扩大的常委会议，要求全省各级领导干部坚持突出政治，把学习毛主席著作放在一切工作的首位，把领导好学习毛主席著作作为头等重要的政治任务；大力发动工农群众学习毛主席著作，使毛泽东思想在群众中扎根，以便正确贯彻执行党的方针政策，使全省的工作沿着正确的政治方向前进。"},{"type":"paragraph","text":"会议认为，云南省广大干部和群众学习毛主席著作的运动正在逐步地深入发展。带上一部《毛泽东选集》、一把锄头到生产第一线去，开始成为广大干部的自觉行动。工农群众学习毛主席著作也比过去更为活跃和广泛，并且收到了显著的效果。会议在讨论当前学习毛主席著作运动存在的问题时指出，当前还有些同志没有真正懂得在一切工作中必须突出政治的重要性。会议要求，全省各地应当结合干部特别是领导干部的思想实际和工作实际，深入地开展一次政治和业务、政治和生产、政治和技术的关系的大辩论。通过讨论，使广大干部懂得突出政治就是突出毛泽东思想。要处处坚持以阶级斗争为纲；要以毛泽东思想作为建设社会主义走向共产主义的最高指示；要坚持党的领导作用、坚持群众路线和民主集中制；坚持不断革命。确立政治统帅一切的观点，提高学习毛主席著作的自觉性。"},{"type":"paragraph","text":"会议指出，突出政治，首先要求各级领导干部把学习毛主席著作放在一切工作的首位，把领导干部、群众学习毛主席著作作为头等重要的政治任务。各级领导干部，特别是县以上干部，都必须以身作则，带头刻苦学习，起模范作用，努力把毛泽东思想学到手。"},{"type":"paragraph","text":"会议在谈到必须活学活用毛主席著作的时候指出，“用”是多方面的，但最根本的是改造思想，改造世界观，使自己不断革命化，树立不为名，不为利，不怕苦，不怕死，一心为革命，一心为人民的思想。同时，还要学会运用“一分为二”的辩证观点来分析和处理问题，认识客观规律，改造客观世界。"},{"type":"paragraph","text":"会议还强调要大力发动工农群众学习毛主席著作，用毛泽东思想武装群众，使毛泽东思想在群众中扎根。必须充分认识群众学习毛主席著作的重大意义，群众一旦掌握了毛泽东思想，就可以调动一切积极因素，产生巨大的物质力量。会议指出，要提倡干部和群众一起学一起用。学习的方法，应当实事求是，少而精，学一点用一点，不搞形式主义。"},{"type":"paragraph","text":"会议要求各级党委广泛发动群众总结学习毛主席著作的经验，注意发现和培养典型，树立样板，认真实行一般号召和具体指导相结合的领导方法。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"云南文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"07c47ab1e2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
