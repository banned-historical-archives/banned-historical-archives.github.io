邓颖超、彭真等送花圈","authors":[],"dates":[{"year":1980,"month":2,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"五届人大常务委员、北京积水潭医院院长"},{"type":"paragraph","text":"孟继懋同志追悼会在京举行"},{"type":"paragraph","text":"叶剑英、乌兰夫、邓颖超、彭真等送花圈"},{"type":"paragraph","text":"新华社北京一月二十八日电　我国著名骨科专家孟继懋同志追悼会今天下午在八宝山革命公墓礼堂举行。"},{"type":"paragraph","text":"孟继懋同志是第五届全国人民代表大会常务委员会委员、中华医学会常务理事、中华外科学会全国委员会名誉主任委员、北京积水潭医院院长、北京市创伤骨科研究所所长，因病医治无效，于一九八○年一月二十日逝世，终年八十二岁。"},{"type":"paragraph","text":"叶剑英、乌兰夫、邓颖超、彭真、廖承志、阿沛·阿旺晋美、胡厥文、王昆仑、林乎加、贾庭三等同志送了花圈。全国人大常委会、中共中央统战部、卫生部、中华医学会，以及北京市人大常委会、北京市人民政府、北京市政协等单位，也送了花圈。"},{"type":"paragraph","text":"阿沛·阿旺晋美、胡厥文、王昆仑、贝时璋、周培源、林巧稚、张秉贵、张孝骞、王磊、钱信忠、崔月犁、郭子恒、毛联珏、杨春茂、雷洁琼、廖沫沙和医务界等有关方面负责人，以及孟继懋同志的生前友好等，共六百多人参加了追悼会。"},{"type":"paragraph","text":"追悼会由全国人大常委会副秘书长张加洛主持，北京市副市长白介夫致悼词。"},{"type":"paragraph","text":"悼词说，孟继懋同志曾任第二届、第三届政协全国委员会委员，第三届全国人民代表大会常务委员会委员，第四届全国人民代表大会代表。他认真学习马列主义、毛泽东思想，努力改造世界观，积极参加社会主义革命和社会主义建设。他把毕生的精力献给了医疗卫生事业，是我国矫形外科的奠基人之一，为我国创伤骨科事业的发展做出了重要贡献。"},{"type":"paragraph","text":"悼词说，孟继懋同志对教育和培养人材极其热心，几十年来为我国培养了几代矫形外科医生，他们中的许多人已成为这一学科的专家。他十分重视基础医学理论的探讨，并在新的手术设计和改进方面有许多贡献。一年前，他在年老多病的情况下，仍然全力以赴，主编了《骨与关节损伤总论》这一重要著作，为培养骨科专业人材付出了最后的心血。"},{"type":"paragraph","text":"悼词最后说，孟继懋同志，是一位对党有着深厚感情的卓越的医学科学家，他的逝世是医疗卫生战线的一个重大损失。（附图片）"},{"type":"paragraph","text":"孟继懋教授遗像         新华社发"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"彭真","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8f2b1e5aca"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
