[],"dates":[{"year":1976,"month":3,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"小国使世界震惊"},{"type":"paragraph","text":"比《光明和被剥削者》盛赞柬埔寨人民巨大胜利"},{"type":"paragraph","text":"新华社布鲁塞尔一九七六年三月十九日电　比利时刊物《光明和被剥削者》最近一期发表文章，热烈赞扬柬埔寨人民的革命精神，赞扬柬埔寨人民取得的胜利和成就。"},{"type":"paragraph","text":"文章说，“柬埔寨人民打败了罪大恶极的美帝国主义，他们依靠的首先是自己的力量。”"},{"type":"paragraph","text":"文章说，“这表明，即使是小国人民，只要他们决心斗争，就可以打败强大的侵略者。”"},{"type":"paragraph","text":"文章在揭露苏联破坏柬埔寨人民的革命斗争时写道：“苏联社会帝国主义竟无耻到如此程度”。文章说，苏联社会帝国主义直到最后时刻还支持朗诺，向他提供援助，接着，又试图炮制在柬埔寨从来没有存在过的虚幻的第三势力。"},{"type":"paragraph","text":"文章说，柬埔寨人民“坚持不结盟政策，要求真正的民族独立，拒绝按照美帝国主义或者苏联社会帝国主义的利益行事”。文章说，苏联社会帝国主义披着红旗的伪装，推行同美帝国主义一样的政策。“就象亚洲人民所说的那样，不能前门拒狼，让后门进虎，柬埔寨人民是不会允许这样的。”"},{"type":"paragraph","text":"文章热烈赞扬了柬埔寨人民解放十个月以来在各方面取得的巨大成就，文章说，小国民主柬埔寨使世界震惊，柬埔寨人民必将取得新的巨大胜利。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3fe37674fd"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
