script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"美国法西斯细菌麕集华盛顿  75个“极右”组织开会商讨统一活动","authors":[],"dates":[{"year":1962,"month":3,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"美国法西斯细菌麕集华盛顿"},{"type":"paragraph","text":"75个“极右”组织开会商讨统一活动"},{"type":"paragraph","text":"新华社22日讯　据塔斯社纽约讯：包括“约翰—伯奇”协会在内的美国七十五个“极右”组织的代表20日晚上在华盛顿举行秘密集会，讨论近来像毒菌一样在美国出现的成百个“极右”组织统一活动的问题。"},{"type":"paragraph","text":"美国法西斯主义的狂热鼓吹者哈杰斯对新闻记者说，会议已决定设立一个五人委员会来统筹美国各地的“极右”组织的活动。这个委员会由他和菲勒斯将军、威洛贝将军、加利福尼亚州众议员鲁斯洛和臭名远扬的反共告密者吉特娄组成。这个委员会将每三个月在华盛顿举行一次秘密会议。"},{"type":"paragraph","text":"哈杰斯是美国法西斯组织“基督教十字军”的头子。这个组织去年从美国资本家那里筹募到一百万美元的基金。"},{"type":"paragraph","text":"这些法西斯组织现在正积极开展活动。在加利福尼亚州，“约翰—伯奇”协会的成员正在征募州当局的官员，特别是国民警卫队的官员参加他们的组织。法西斯分子公开向国民警卫队的队员讲课，要他们参加武装匪徒组织“民兵”。“约翰—伯奇”协会的一名成员还在洛杉矶组织了一个间谍组织，专门对一些所谓“不可靠分子”进行钉梢。在加利福尼亚州的圣地亚哥，以国民警卫队准将费希尔等为首的当地的反共组织“圣地亚哥研究图书馆”并且编制了加利福尼亚州二十万居民的“颠覆活动”的材料，专门用来对美国人民进行恐吓和讹诈。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9dcb8b68eb"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
