ors":[],"dates":[{"year":1967,"month":2,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"比拉尼部长访问沙石峪大队"},{"type":"paragraph","text":"赞扬社员们用毛泽东思想武装起来取得巨大成就"},{"type":"paragraph","text":"新华社十五日讯　毛里塔尼亚伊斯兰共和国外交、计划部长比拉尼·马马杜·瓦尼，今天在访问河北省遵化县岳各庄人民公社沙石峪大队时，热情赞扬用毛泽东思想武装起来的沙石峪大队的社员们所创造出来的巨大成绩。比拉尼部长对社员们说，你们取得这样大的成绩，是你们用强大的思想武器——毛泽东思想武装起来的结果。我完全看到了用毛泽东思想武装起来的人，是有着巨大勇气来克服困难的。他祝愿社员们坚持学习毛主席著作，去争取新的胜利。"},{"type":"paragraph","text":"比拉尼部长和由他率领的毛里塔尼亚政府代表团的成员，乘坐直升飞机在沙石峪村口降落时，生产大队的文化革命委员会、红卫兵的负责人和社员代表迎上前去，同比拉尼部长等热烈握手。欢迎的人们高举毛主席像，敲锣打鼓，挥动红光闪闪的《毛主席语录》高呼：“中国毛里塔尼亚两国人民的友谊万岁！”“打倒帝国主义和新老殖民主义！”“毛主席万岁！万万岁！”比拉尼部长手持《毛主席语录》，频频挥动，向社员们致意。"},{"type":"paragraph","text":"毛里塔尼亚客人参观了社员们经过艰苦斗争在石头山上开垦出来的层层梯田以及大队的果木林和蓄水池，并访问了社员家庭，同社员进行了亲切交谈。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a3147dfb84"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
