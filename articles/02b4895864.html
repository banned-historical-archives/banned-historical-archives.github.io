学院"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"寃呼","type":"title"},{"text":"山西医学院吕学铭","type":"authors"},{"text":"(吕学铭：山西医学院医疗系16班学生)","type":"subtitle"},{"text":"现在中国执政者为中国共产党，它的一举一动，一言一行都会密切的关系到6亿中国人民的切身利害。无产阶级专政这个历史阶段产物的形式工具，不可讳言地有它阴暗的一面，今天党意识到这一点而要求党内外人士帮助党进行整风，这是党一贯的知错必改，有误必纠的传统优良作风，然而我院的党委对这次整风采取的什么态度呢？那就是明中让鸣，暗中不让放，挂羊头卖狗肉，不信可拿考试问题为证，很明显要争鸣就不能考试，要考势必就影响争鸣。解决这个矛盾领导上也曾在表面上做了一些决定，但让我们看看何其英的三条理由，哪一条站的住，那一条会合乎辩证唯物主义呢？事后还有一些所谓正人君子，如何鸣寃真是笑话，直言诚然是个“直言”，自己没有脑子，不加分析思考的只会按照上级意图乱喊一气。","type":"paragraph"},{"text":" 山西医学院“祖宗”1957年6月×日","type":"paragraph"}],"comments":[],"origin":"《“鸣”、“放”选集（一）》（中共山西省委整风办公室编，1957年8月）。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"02b4895864"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
