script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"薄一波在天津视察工作时指出  坚持四项基本原则搞好改革开放是个整体  反对资产阶级自由化是长期任务，建设四化需要长期艰苦奋斗","authors":[],"dates":[{"year":1987,"month":2,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"薄一波在天津视察工作时指出"},{"type":"paragraph","text":"坚持四项基本原则搞好改革开放是个整体"},{"type":"paragraph","text":"反对资产阶级自由化是长期任务，建设四化需要长期艰苦奋斗"},{"type":"paragraph","text":"新老干部认真学习马克思主义理论才能正确执行党的方针政策"},{"type":"paragraph","text":"新华社天津2月13日电  中共中央顾问委员会副主任薄一波最近在天津视察工作时指出，坚持四项基本原则同搞好改革、开放是统一的整体。领导干部要认真学习马克思主义理论，要发扬艰苦创业、勤俭建国的精神。"},{"type":"paragraph","text":"薄一波于2月8日至13日在天津视察工作。他听取了中共天津市委、市政府领导同志的工作汇报，与退居二、三线的老同志进行了座谈，参观了天津港、天津经济技术开发区及古文化街、南市食品街、中环线等市政建设。"},{"type":"paragraph","text":"薄一波说，坚持四项基本原则，反对资产阶级自由化，是一件十分重要的事情。这个事情不解决，头脑就不清醒，方向就不明确，就难免出大的问题。改革和开放是我们的基本国策，反对资产阶级自由化是我们的长期任务，两者统一在建设有中国特色的社会主义的过程中。我们搞现代化建设，始终不能忘记坚持四项基本原则；把经济搞上去，发展社会生产力，充分显示社会主义制度的优越性，人民就会更加自觉地坚持社会主义道路。他说，我们历来主张，进行两条战线的斗争，有“左”反“左”，有右反右。绝不能走回头路，再搞“左”的那一套；也绝不能照搬资本主义那一套，搞所谓“全盘西化”。对经过实践证明是正确的传统和经验，我们一定要继续坚持并在新形势下进一步发展。"},{"type":"paragraph","text":"薄一波说，改革包括的内容很多，我们叫作全面改革。我们要通过改革找出一条比较快的发展社会生产力的路子来，使社会主义制度的优越性得到充分发挥。我们的农村改革已经取得了很大成绩，城市改革也取得了很大的进展。当然，还有许多问题要研究，比如政治体制改革的问题。历史的经验证明，我们中国人是能行的。我们有本事从中国的实际出发搬掉“三座大山”，我们同样有本事建设有中国特色的社会主义。我们要不断地提高民族自信心、自尊心。中国的改革是一定能成功的，改革是大有希望的。"},{"type":"paragraph","text":"薄一波对天津在积极提拔年轻干部的同时，采取多种形式充分发挥老同志作用，实行老中青三结合的作法给予肯定。他说：在指导思想上要坚持老中青三结合，不搞一刀切。有的老同志身体尚好，应当给他们安排适当的工作。选拔干部要注意德才兼备，首先要讲革命化。讲知识化不能只看文凭，要注重实际工作能力、实践经验和实际水平。年轻干部要肯吃苦、干实事，要立志做大事，不要追求作大官。要谦虚谨慎，尊重老同志。不论是老同志还是年轻同志，也不论是理论工作者还是实际工作者，都要学习马列主义、毛泽东思想。他要求年轻干部认真读几本书，把握马克思主义的立场、观点、方法，坚持理论联系实际。他强调说，只有懂得马克思主义的基本理论，才能正确地理解和执行党的改革、开放、搞活的方针政策。"},{"type":"paragraph","text":"薄一波在视察中环线等市政建设工程后指出，近几年，天津市为城乡人民办实事，群众很满意。毛泽东同志强调共产党员要全心全意为人民服务，这是我们党的宗旨。每年坚持为人民办一些看得见、摸得着的实事，为人民服务不是停在口头上，而是落实在行动中，这样就会得到人民的拥护，事情也就好办了。按人民的意志办事，体现了社会主义民主的实质，这与资本主义的所谓民主有本质的不同。"},{"type":"paragraph","text":"薄一波强调必须保持和发扬艰苦奋斗的革命精神。他说，实现共产主义的远大理想，不是一蹴而就的，要扎扎实实地奋斗，一步一步地走下去。在革命战争年代，我们的党员、干部与广大人民群众同甘苦、共奋斗，取得了革命的胜利。现在要建设社会主义现代化强国，也要靠艰苦奋斗精神。没有这种精神，各项工作都难以做好。他对天津这几年在各项工作中注意发扬党的优良传统，提倡艰苦奋斗，在一些大的工程中搞义务劳动等作法，表示满意。在视察天津经济技术开发区时，他高兴地挥毫题词：“毋忘艰苦创业，坚持勤俭建国。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"薄一波","type":"人物"},{"name":"天津文革","type":"人物"},{"name":"革命三结合","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ea61853093"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
