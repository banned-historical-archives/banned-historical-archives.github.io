rt":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"福建渔民今年夏汛生产丰收在文化大革命推动下破除“歇海”旧习惯；六月份以来；已捕鱼一百多万担，比去年同期增产两倍多","authors":[],"parts":[{"type":"paragraph","text":"福建省广大渔民破除夏汛“歇海”的旧习惯，今年夏季鱼汛生产获得大丰收。从六月份以来，已捕鱼一百一十万担，比去年同期增产两倍多。"},{"type":"paragraph","text":"夏汛生产主要是在近海内海捕捞小杂鱼，单位产量较小。一些较大的渔业生产单位，过去在春汛结束后，就“歇海”来修船补网，等到秋冬汛再出海。今年，在无产阶级文化大革命的推动下，广大渔民提出要革除“歇海”的旧习惯，建立新风气，捕捞更多的鱼，供应城乡人民。他们挖掘船网工具的潜力，投入夏汛生产；同时修船补网，做秋冬汛生产的准备工作。集中在夏汛生产的主要渔场——闽南渔场的渔船，比去年增加一半以上。"}],"alias":""},"tags":[{"name":"福建文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0d5e4cb551"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
