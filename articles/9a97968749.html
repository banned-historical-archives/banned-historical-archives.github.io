ates":[{"year":1966,"month":3,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"抗议美国垄断资本残酷剥削"},{"type":"paragraph","text":"智利铜矿工人向首都进军"},{"type":"paragraph","text":"据新华社圣地亚哥电　在智利由美国资本经营的特尼恩特铜矿的数百名矿工，二十二日带着妻子和儿女，翻山越岭，完成了从矿区到奥伊金斯省省会兰卡瓜市的八十公里进军。这是他们向首都圣地亚哥进军的第一段路程，进军是为了抗议美国公司一再拒绝工人们提出的增加工资的正当要求。"},{"type":"paragraph","text":"特尼恩特铜矿是美国肯尼柯特铜公司在智利拥有的世界最大的铜矿之一。这个铜矿的工人从一月四日开始一直坚持罢工。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9a97968749"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
