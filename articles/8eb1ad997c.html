学学生"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"给王恒守教授的信","type":"title"},{"text":"复旦大学学生","type":"authors"},{"text":"敬爱的王恒守教授：","type":"appellation"},{"text":"我是一个爱科学因而爱你的人。为了使我能够为你说公正话，希望你能助我将此文转登。","type":"paragraph"},{"text":" 您未来的学生","type":"paragraph"},{"text":"(略)王恒守教授的一些论点是合理的，如像由受学生敬爱的导师来治理学校，无疑的对学术来说是起推进作用的；又如批判思想搞通了，那么工作学习都会搞好了的说法也是完全正确的，不应以发言者的优缺点去反驳发言者的言论，这是不合逻辑的。其实就是关于阶级的划分，它也只是对人的一种划分，是否可以用一种标准去衡量一切是值得研究的。当然这是应从定义和分类去着手研究的，如果应该修正，那么修正也是完全必要的和好的。","type":"paragraph"},{"text":"(略)用免职用反党反苏去限止(制)少数敢言者发言是可耻的，这样做可以使人口服而不能使人心服。(略)他们所以如此，只不过是为了自己的政治利益，这一点是很明显的。","type":"paragraph"},{"text":"最令人不满的，是农民的生活，仍然处于贫困状态。(略)如果说农民和工人的比较说得过去，那么和那些丰衣足食的干部来比较又怎样说得过去呢？(略)","type":"paragraph"}],"comments":[],"origin":"《毒草集——批判右派思想言论选辑之一》（复旦大学校刊编辑室，1957年8月）。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8eb1ad997c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
