<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"文化大革命促进了本市计量工作广大计量工作人员坚持开门办计量，积极为社会主义建设服务，取得了显著成绩","authors":[],"dates":[{"year":1976,"month":2,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　在无产阶级文化大革命和批林批孔运动推动下，本市计量工作实行专业管理和群众性的管理相结合，加强了计量管理工作，广大计量工作人员开门办计量，大搞计量技术革新，使计量科学技术水平不断提高，研究成果不断涌现，有力地回击了科技界的右倾翻案风。"},{"type":"paragraph","text":"计量工作涉及到国民经济的各个部门，工农业生产和其它各个方面都需要使用计量器具。要保证它的量值的统一，必须实行专业计量部门的管理和群众性的管理相结合。文化大革命以来，各级专业计量部门积极组织群众办计量，一个全市性的计量协作网基本形成。目前，本市工业、农业、商业等系统中的主要行业已建立了二百五十个计量室(站)和测力、无线电、大油池等专业计量网，开展计量检修试测协作工作，为保证本市使用的上百万件计量器具的准确性做了大量工作。宝山、嘉定、崇明、松江、南汇、上海、金山等县计量所的计量工作人员，分别组成为农机生产服务的小组，背起工具包，携带标准器，深入社、队企业、车间、班组，采取边调查研究，边检修量具，边传授技术，边协助筹建计量室等方法，有力地支援了农机生产，提高了农机质量。宝山县计量所组织力量，对四十三个县属厂、社办厂和八个大队企业使用的二千多件量具进行检修，为了保证正常生产，他们急生产所急，能现场解决的就现场解决。由于加强了量具的检修和管理，该县生产的插秧机的质量和装配效率均有所提高，零部件合格率从百分之三十六点一，提高到百分之八十以上。一九七五年，市计量局所属三个计量所，为本市有关工厂企业上门检修了近三万件计量器具，加强了计量管理工作。"},{"type":"paragraph","text":"近几年来，随着工业生产和技术革新运动的发展，机械化、自动化程度的不断提高，对计量工作的要求也不断提高。为了使计量检验工作适应生产的需要，变手工计量检验为自动快速计量检验，计量工作人员与工人、技术人员相结合，积极采用电子、激光、光栅、微波、红外线等新技术，创造了自动快速测长(齿轮、内外径、螺距)、测重、测速、测湿、测温、测时和化学分析等计量技术革新项目，达一千一百多项。其中为实现自动测重而搞成的电子自动秤，已经在冶金、化工、纺织、港口、邮电、轻工等行业中应用。"},{"type":"paragraph","text":"广大群众是使用计量器具、掌握计量技术的主人。他们对生产中的计量问题最了解、最熟悉，因此充分依靠群众，实行三结合，就最能发挥计量为生产服务的作用，加快计量科学技术研究的步伐。为了适应工农业生产发展的需要，本市制造成功一批具有先进水平的计量仪器。如上海机床厂、上海计量局等单位自行设计制造的激光比长仪，由于采取制造、科研、使用单位的三结合，只花了较短的时间，就获得成功。检定精密机床上的一米基准刻线尺，综合误差只有零点二微米，相当于一根头发的三百五十分之一。"},{"type":"paragraph","text":"目前，上海市群众性的计量技术交流活动正在蓬勃开展。市和部分区的科学技术交流站都建立了计量交流队。为了推广应用计量新技术和革新成果，各有关方面还采用办展览会、讲座、短训班、技术协作、技术会诊和攻关会战等形式，积极解决生产中的计量测试问题，把群众办计量提到一个新的水平。"},{"type":"paragraph","text":"本市计量工作呈现的一派热气腾腾的景象，有力地批判了反对科技工作大搞群众运动的谬论，回击了科技界的右倾翻案风。　(本报通讯　员)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"name":"批林批孔","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b67c5b548b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
