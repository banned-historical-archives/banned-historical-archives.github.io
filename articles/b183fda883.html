ical-archives/banned-historical-archives0/main/maoquanji41.pdf"],"article":{"title":"对陶铸关于广东召开公社代表大会部署的报告的批语","alias":"","parts":[{"type":"paragraph","text":"对陶铸关于广东召开公社代表大会"},{"type":"paragraph","text":"部署的报告的批语"},{"type":"paragraph","text":"（1959年4月20日）尚昆："},{"type":"paragraph","text":"请以电话告陶铸，赞成他的意见。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"四月廿日上午二时"},{"type":"paragraph","text":"[1]中共广东省委第一书记陶铸1959年4月18日给毛泽东的这一报告说，从上海开会回来后，即按照指示布置全省各公社召开一次代表大会。接到主席在杭州的指示后，省委决定进一步加快进度，已通知各地、县，要各县立即召开一个社的代表大会，地委派人帮助，县委亲自掌握。省委在潮安搞的公社代表大会试点，已提前进行。5月初省委在潮安召开地委书记现场会议，交流经验，为全省全面铺开、分批召开公社代表大会作好准备。"},{"type":"paragraph","text":"[2]尚昆，即杨尚昆，当时任中共中央书记处候补书记、中央办公厅主任。"}],"authors":["毛泽东"],"dates":[{"year":1959,"month":4,"day":20}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":457,"page_end":457},"tags":[{"name":"陶铸","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b183fda883"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
