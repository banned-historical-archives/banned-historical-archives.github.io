" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji28","name":"毛泽东全集第28卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji28.pdf"],"article":{"title":"为《人民海军》报题写报头","alias":"","parts":[{"type":"paragraph","text":"为《人民海军》报题写报头\""},{"type":"paragraph","text":"（1950年1月1日）人民海军"},{"type":"paragraph","text":"人民海事毛泽东为《人民海军》报题写的报头。"},{"type":"paragraph","text":"[1]1949年8月28日，毛泽东在中南海接见了张爱萍等人，商讨了建设海军的事情。会议结束后，张爱萍等请毛泽东为海军报题写报头，并为部队题词。此后，毛泽东题写了：“我们一定要建设一支海军，这支海军要能保卫我们的海防，有效地防御帝国主义的可能的侵略。”同时题写了“人民海军”4个字，共3张，毛泽东在一张上作了标记。《人民海军》报创刊采用的报头是取毛泽东标记那一张中的三个字和另外一张中的一个字，横排在一起，作为华东军区海军机关报的报头。题词也发表在1950年1月1日的《人民海军》报创刊号上。"}],"authors":["毛泽东"],"dates":[{"year":1950,"month":1,"day":1}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":135,"page_end":135},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f8af179e8d"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
