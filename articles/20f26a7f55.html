本百分之三十五，明年计划扩大制造五万部。","authors":[],"dates":[{"year":1949,"month":12,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"华北农业机械总厂职工"},{"type":"paragraph","text":"向毛主席报告生产成绩"},{"type":"paragraph","text":"今年完成新式农业机械四千余部，降低成本百分之三十五，明年计划扩大制造五万部。"},{"type":"paragraph","text":"【本报讯】京郊华北农业机械总厂全体职工，于本月二十一日写信给毛主席报告生产成绩。该信略称："},{"type":"paragraph","text":"敬爱的毛主席：我们在您英明的领导之下，坚定不移地向苏联老大哥学习先进的建设经验，我们初步实行了生产专责制，逐步的加强了科学化的工厂管理，大大的增高了我们的生产效率。一九四九年的任务，我们已经胜利完成。在我们全体职工八个月来积极努力下，已完成了新式农业机械共四千余部，拖拉机犁零件一千二百余套，成本平均减低了百分之三十五，生产效率平均提高了九倍。"},{"type":"paragraph","text":"最敬爱的毛主席，现在我们正作扩大制造的新计划。我们有信心向您保证，明年将用最大的努力献给您和广大的农民五万部农业机械，最后让我们以极度的兴奋和热情向您高呼：“毛主席！有了您的领导我们什么都不怕，任何困难都可以被克服。您就是胜利，您就是一切。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"20f26a7f55"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
