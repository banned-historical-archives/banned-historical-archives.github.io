ical-archives/banned-historical-archives0/main/maoquanji51.pdf"],"article":{"title":"对中央关于组织群众广泛讨论宪法修改草案通知稿的批语","alias":"","parts":[{"type":"paragraph","text":"对中央关于组织群众广泛讨论宪法修改草案通知稿的批语"},{"type":"paragraph","text":"（1970年9月）照发。"},{"type":"paragraph","text":"[1]中共中央1970年9月12日为组织人民群众广泛讨论《中华人民共和国宪法修改草案》给各省、市、自治区党的核心小组和中央军委发出通知，指出：这一宪法修改草案是1954年宪法的继续和发展。毛主席在1970年3月提出了召开四届人大和修改宪法的意见，并提出了不设国家主席的建议。中央政治局从3月开始进行修改宪法的准备，7月12日成立了以毛主席为主任的中央修改宪法起草委员会。中央政治局和起草委员会详细研究了全国人民对1954年宪法的修改意见，提出了《中华人民共和国宪法修改草案》，并于8月23日提交九届二中全会审查，9月6日全会基本通过了这个草案，并决定动员全国人民进行讨论和修改。请各省、市、自治区革委会和中央军委将群众意见集中起来，于9月底报告中央。"}],"authors":["毛泽东"],"dates":[{"year":1970,"month":9}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":89,"page_end":89},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"190dff2de9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
