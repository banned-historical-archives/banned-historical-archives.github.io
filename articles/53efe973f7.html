的指示","authors":[],"dates":[{"year":1950,"month":10,"day":30}],"is_range_date":false,"parts":[{"text":"中共中央转发华东局关于土改经验报道的指示","type":"title"},{"text":"中南局、西北局、西南局：","type":"appellation"},{"text":"兹将华东局关于土改经验的报道指示转发你们参考。","type":"paragraph"},{"text":"中 央","type":"paragraph"},{"text":"十月三十日","type":"paragraph"},{"text":"分局、各省区党委并中央：","type":"appellation"},{"text":"目前各省区土地改革工作正逐步展开，领导上除对政策掌握运动指导仍须谨慎小心外，对土改工作经验报道也须十分注意。在土改运动展开以后，对于工作的进展和经验不必在大城市报纸经常地作大量的报道，只要在工作告一段落时将工作发展轮廓和已成熟的经验作两三次事后的总结性的报道即可，以避免引起与土改无关系的各阶层人民和许多城市居民不必要的波动，并避免乱传许多不成熟的，或甚至错误的经验。报道经验须经各省（区）地委、党的负责同志审阅始可刊登，但对暴露地主罪恶，分析当地土地情况，宣传和学习土改，训练土改干部，各界人民及各民主党派拥护土改及参加土改工作情况，人民法庭对不法地主惩治情况，各级土委的重要活动，农村基层组织（如政权、农会及民兵等）的整顿和发展，土改结束后的农村新气象及生产情况等应有计划地多作系统的报道。","type":"paragraph"},{"text":" 华东局酉  宥","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"53efe973f7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
