<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"天津市工商界对解除当前困难所提的意见—根据工商业联合会调查材料","authors":[],"dates":[{"year":1950,"month":5,"day":13}],"is_range_date":false,"parts":[{"text":"天津市工商界对解除当前困难所提的意见—根据工商业联合会调查材料","type":"title"},{"text":"一九五○年津市工商业情况：","type":"paragraph"},{"text":"在工业方面：烟草工业三十六户仅三户开工；火柴工业十八户仅二户开工；造纸、造胰、植物油、化学染料、橡胶等工业停工的厂户均在百分之五十左右。其他各业停工的百分之二十以上。","type":"paragraph"},{"text":"商业方面则普遍感受销货不动的困难。","type":"paragraph"},{"text":"现将工商两业共七十一行业对解除当前困难所提意见汇集于下：","type":"paragraph"},{"text":"(一)关于私营企业投资条例及公司法问题，一般均希望政府早日公布施行，使(此处一字辨认不出)有的企业得以扩充资本，新生的企业亦易于吸收游资，引入正规，发展生产。","type":"paragraph"},{"text":"(二)关于市场销路问题，希望政府速作有重点有计划的扶助，使大家可能咬紧牙关渡过这一暂时的困境，以迎接即将到来的繁荣。至于个别行业针对各自情况提出的意见，计有植物油工业、油坊工业、地毯工业、制蛋工业、和鸡鸭卵商业等，主张由政府掌握计划推广国外贸易，以争取外汇打开出路；橡胶工业和鞋帽工业主张实行有重点有计划的联营产销；火柴工业主张成立专卖机构统一产销，统一品质规格，避免盲目的生产和贬价的竞销。","type":"paragraph"},{"text":"(三)关于资金及金融的问题，一般的意见，认为津市的私营工商业根基原极脆弱，十余年来，经过帝国主义和官僚资本的压迫，敌伪和反动势力的剥削，实在已患着严重的贫血症。已经不能用自己的力量来更生，所以迫切希望政府通过国营企业机构，用订货加工收购等等方式，作有重点有计划的大量输血，方能挽救危急。","type":"paragraph"},{"text":"(四)关于公私关系问题，一般的均感于公私关系联系不够密切，配合照顾得不够适当。尤其公营企业对于加工或收购的条件规定过苛，大家希望公营企业今后要以正确合作的精神来领导和团结互助，共谋发展，不要发生本位主义或操纵挤轧的偏向。","type":"paragraph"},{"text":"(五)关于税收和公债的负担问题，希望能尽早的实现单一税制和尽量简化手续与公平合理，并且希望早日统一全国税政，划一全国稽征手续，务使货物运销不受任何地区的限制，和繁复苛细手续的烦恼。现在的货物税领照贴花手续过繁，浪费了不少人力物力，且有时妨碍了工商业的营运，希望能集中力量在生产厂所或销售集中地方来监督稽征，放宽营运方面的稽考，手续力求简化，税制要单一便利。至于工商业税采用民主评议方式，在过渡期间，原不失一种较为合理的办法，但是不宜永远照此作去，应该吸取东北旅大的前进经验，由税务当局从速制定统一的会计制度，划一单据账簿，实行查账计征的办法，以期作到真正的合理的负担。","type":"paragraph"},{"text":"其他个别行业如茶商业、纸商业、花纱布绸商业、制蛋商业等，对于座商外出销货，须再纳行商税，而本地工商业税并不能减除，又出外采购或销货均须请领采购证或销货证，认为手续繁重，有碍商业发展，影响城乡物资交流，主张简化手续和合理的纠正。又盐商业主张盐业纳税，应由盐政机关统一征收单一税，随报运征收工商税，外埠凭准运单销售，不再征收行商税。","type":"paragraph"},{"text":"(六)关于过剩工人解雇救济和工资问题，为照顾到今日津市工商业凋敝的现实，和今后工商业调整后的趋势。将会有一部分过剩工人解雇，除资方应依劳资关系处理办法给予解雇费外，希望政府强化职业介绍机构，帮助过剩工人转业，或举办水利和修建工程，或移民垦区，以资收容救济。至于工资问题，则希望政府就各地各业的情况，划一制定工资标准，使私营工商业对于现存一部分不合理的制度，得有遵循加以调整。","type":"paragraph"},{"text":"(七)关于税收的各别问题，现在工商业税条例规定的工商业税一部分是按营业额计征，在工业方面完纳货物税的厂户，其营业额的计算方法，依税务当局的指示，是将出厂价格加算应完货物税额合并作为营业额，这样一来，不但须就货物税额上再加上一层工商业税，且发票上的交易余额亦须照此计算，粘贴印花事实无异重征，希望政府对此问题详加考虑，对于计征工商业税所依据的营业额合并货物税额计算的方法，予以明令纠正，以减轻工业方面不合理的负担。","type":"paragraph"},{"text":"(据天津日报五月十三日内部材料编)","type":"paragraph"}],"comments":[],"origin":"1950年5月18日新华通讯社编《内部参考》。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"de3ce77c5a"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
