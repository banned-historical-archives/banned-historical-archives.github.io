art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东主席永远活在各国革命人民的心中","authors":[],"parts":[{"type":"paragraph","text":"坦桑尼亚友谊纺织厂数百名工人举着毛泽东主席遗像，九月十七日到中国专家组住地吊唁毛泽东主席逝世。"},{"type":"paragraph","text":"孟加拉国各界人士到中国驻孟加拉大使馆吊唁毛泽东主席逝世。这是他们在毛泽东主席遗像前默哀。"},{"type":"paragraph","text":"墨西哥人民群众从九月九日至十八日，不断地到中国驻墨西哥大使馆沉痛哀悼毛泽东主席逝世。"},{"type":"paragraph","text":"九月十二日，秘鲁的约亚契卡尼剧团在首都利马演出前，演员捧着毛主席遗像和红旗走上舞台，向观众朗读纪念毛主席的悼词，全场五百多名观众一起肃立默哀。"},{"type":"paragraph","text":"瑞典群众九月十七日晚在斯德哥尔摩举行火炬游行和追悼会，沉痛悼念毛泽东主席逝世。这是游行队伍举着毛泽东主席遗像和红旗，走向追悼会会场。"},{"type":"paragraph","text":"九月十一日，法国巴黎群众在街上游行，悼念毛泽东主席逝世。标语牌上写着毛主席语录：“群众是真正的英雄”。"},{"type":"paragraph","text":"意大利群众九月十一日在罗马游行，悼念毛泽东主席逝世。他们举着巨幅毛主席语录：“人民，只有人民，才是创造世界历史的动力”。"},{"type":"paragraph","text":"九月十六日，澳大利亚各界人士在堪培拉举行全国性追悼大会，哀悼毛泽东主席逝世。"},{"type":"paragraph","text":"（本版照片均为新华社稿）（照片）"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e32f439489"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
