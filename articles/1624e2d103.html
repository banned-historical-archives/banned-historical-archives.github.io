市","彭文应"],"dates":[{"year":1958,"month":3,"day":12}],"is_range_date":false,"parts":[{"text":"1958年个人规划","type":"title"},{"text":"上海市彭文应","type":"authors"},{"text":"(彭文应：民盟上海市副主任委员、上海市人民代表、上海市政协常委)","type":"subtitle"},{"text":"1．尽快依照计划完成交代。","type":"paragraph"},{"text":"2．积极加强自我改造，认真学习马列主义理论。","type":"paragraph"},{"text":"3．继续学习国内外时事及实习自然科学基础知识。","type":"paragraph"},{"text":"4．认真参加指定之学习及活动。","type":"paragraph"},{"text":"5．整理50—100件合理化建议，贡献与党及政府。","type":"paragraph"},{"text":"6．整理10—20件发明及技术改进，贡献与有关生产部门。","type":"paragraph"},{"text":"7．积极接受党的领导：","type":"paragraph"},{"text":"(1)全心全意接受党的领导。","type":"paragraph"},{"text":"(2)完全信任党，把一切交给党。","type":"paragraph"},{"text":"(3)所有工作学习生活上重大问题请示党。","type":"paragraph"},{"text":"(4)对党不保留任何事情。","type":"paragraph"},{"text":"(5)对党经常联系会报，每月至少三次。","type":"paragraph"},{"text":"(6)结识党员朋友至少二人，经常请教。","type":"paragraph"},{"text":"8．个人生活规律化。","type":"paragraph"},{"text":" 彭文应  1958.03.12","type":"paragraph"},{"text":" 来源：彭志一提供。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1624e2d103"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
