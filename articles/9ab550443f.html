[{"year":1967,"month":11,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"中国国际贸易促进委员会  日本国际贸易促进协会一代表团发表共同声明"},{"type":"paragraph","text":"中国文化大革命大大促进人民的思想革命化"},{"type":"paragraph","text":"指出美帝是中日人民的共同敌人，苏修是美帝的头号帮凶，反帝必须反修"},{"type":"paragraph","text":"新华社十日讯　中国国际贸易促进委员会和日本国际贸易促进协会神户支局友好商社访华代表团，今天在北京发表了一项共同声明。共同声明中指出，中日两国人民在反对共同敌人美帝国主义及其走狗的斗争中结成的战斗友谊，一定日益发展。"},{"type":"paragraph","text":"共同声明说，代表团通过在中国的参观访问体会到，由伟大领袖毛主席亲自发动和领导的无产阶级文化大革命，是史无前例的伟大创举，具有深远的世界意义。无产阶级文化大革命进一步促进了全中国人民的思想革命化，使工农业生产飞跃发展，科学技术水平迅速提高，社会主义经济正在大踏步前进。"},{"type":"paragraph","text":"代表团体会到：毛泽东思想超出了中国一国范围，照耀着全世界被压迫民族和被压迫人民的解放道路。"},{"type":"paragraph","text":"共同声明指出，美帝国主义是中日两国人民的共同敌人，是全世界被压迫民族和被压迫人民的共同敌人。苏修是美帝国主义的头号帮凶，反帝必反修。"},{"type":"paragraph","text":"声明指出，日本佐藤政府一贯追随美帝，疯狂反华，是战后日本历届政府中最反动的政府。"},{"type":"paragraph","text":"共同声明指出，当前发展中日友好贸易的主要障碍是美帝国主义、日本佐藤政府、苏联现代修正主义领导集团及日共宫本修正主义集团。但是，他们决不能阻挡历史潮流的前进。双方表示要继续坚持中日关系的政治三原则、贸易三原则和政治、经济不可分的原则，同上述四个方面的敌人进行坚决的斗争，为发展中日两国人民的友好贸易而努力。"},{"type":"paragraph","text":"在共同声明上签字的是中国国际贸易促进委员会负责人王茂春等，日本国际贸易促进协会神户支局友好商社访华代表团村上正二郎等。签字仪式上，中日两国朋友手捧《毛主席语录》，朗读毛主席的教导。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9ab550443f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
