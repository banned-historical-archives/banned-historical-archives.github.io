script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"全国纺织系统安全生产座谈会提出：批判左倾思想　搞好安全生产","authors":[],"dates":[{"year":1980,"month":12,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"全国纺织系统安全生产座谈会提出："},{"type":"paragraph","text":"批判左倾思想　搞好安全生产"},{"type":"paragraph","text":"据新华社北京电　最近在北京举行的全国纺织系统安全生产座谈会，批判了左倾思想给安全生产造成的影响，决定从实际出发，采取切实措施，要大大减少各种重大事故，有计划、有步骤地解决危险厂房、仓库建设、女工劳保等问题。"},{"type":"paragraph","text":"纺织系统的安全生产、劳动保护工作在解放后相当长的一个时期里搞得比较好。可是在十年浩劫中，有关的制度规程遭到严重破坏，死亡事故、火灾事故时有发生，人民生命财产遭受损失。目前，危险厂房仍大量存在，形成了重大事故的隐患。各地代表认为出现这些问题与经济工作中长期存在的左倾思想影响有很大关系。由于重生产、轻安全，在安全生产和劳动保护方面欠账太多。"},{"type":"paragraph","text":"通过讨论，代表们统一了思想认识，决心肃清左倾思想的影响，从现在开始，立即采取有效措施，切实搞好安全生产。纺织工业部提出，目前已经完成今年生产计划的企业，可以提前维修设备、培养和教育工人，为明年的安全生产作好准备；危险厂房、危险锅炉和仓库严重不足，是纺织工业安全生产的三大隐患，明年要结合调整，停建、缓建一部分在建项目，腾出必要的资金、材料来逐步解决这些问题；要抓好女工的劳动保护，尽快把女工的卫生室、哺乳室、孕妇休息室等恢复建设起来。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7f11b30c76"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
