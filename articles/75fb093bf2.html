<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"朱总司令故乡全体农民在“八一”前夕  给毛主席、朱总司令写信报告生产情况","authors":[],"dates":[{"year":1953,"month":8,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"朱总司令故乡全体农民在“八一”前夕"},{"type":"paragraph","text":"给毛主席、朱总司令写信报告生产情况"},{"type":"paragraph","text":"朱总司令的故乡——四川省仪陇县马鞍乡的全体农民，在“八一”建军节前夕写信给毛主席、朱总司令，报告他们一年来的生产和生活情况，全文如下：敬爱的毛主席、朱总司令："},{"type":"paragraph","text":"这一年来，我们马鞍乡又变了一个样。去年，我们向您们提出“多打粮食，支援祖国经济建设”的保证，现在已经实现了。大春、小春都比前年增产了一成到一成半。今年大家更起劲。我们乡上的田从来没上过底肥，今年不但普遍上了底肥，还多施了一道追肥。人民政府怕我们的肥料不够，还借给我们三千万元买了七千多斤硫酸錏。今年全乡百分之八十的田是用的少秧密栽的新方法。四村王贤者互助组的二十多亩田，今年平均每亩栽了九千到一万窝，秧窝发的大，谷穗也比往年长，大家量谷穗、称谷粒，算下来平均每亩要打八、九百斤。"},{"type":"paragraph","text":"我们的生活比起去年更好了。从今年小春打下来到现在，我们乡上的农民在银行里没断过存款，多的时候存到过四千多万元，青黄不接的时候也没少过一千万元。"},{"type":"paragraph","text":"咱乡的农民人人都关心烈属、军属的生产和生活。去年，大家给六十户烈属、军属包耕和帮工的田，都比前年增产了一成七，今年估计比去年还要增产二成。逢年过节，家家都不忘慰问烈属和军属，平时也从未让烈属和军属家里缺过米，少过柴。现在离秋收还有二十多天，各村就都已订了帮助烈属、军属收秋的计划。有不少互助组在计划里都订着：保证做到“包收包打包入仓”和“边打边耕”。"},{"type":"paragraph","text":"我们还要告诉您们一件大喜事。我们马鞍乡开始普选了。大家都决心在普选中选好自己的代表，巩固自己的政权。普选一开始，大家自动成立了六十四所午校，利用晌午歇凉的时候学习选举法。我们没让一个坏分子窃取了选举权。现在我们已经把我们的代表候选人提出来了。这些人都是多年来对敌人斗争最坚强、风里来雨里去、忠实积极的好农民和好干部。这些天，大家都欢天喜地地准备庆祝“八一”，迎接选举，准备秋收。"},{"type":"paragraph","text":"敬爱的毛主席、朱总司令：我们知道，国家经济建设才开始，更好的日子还在后面。我们保证在您们的领导下，继续搞好生产，支援祖国的大建设。祝您们身体健康"},{"type":"paragraph","text":"四川省仪陇县马鞍乡全体农民上"},{"type":"paragraph","text":"七月二十七日"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"75fb093bf2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
