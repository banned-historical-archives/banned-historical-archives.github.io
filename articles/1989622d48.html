:[{"year":1948,"month":5,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"内蒙自治政府周年纪念"},{"type":"paragraph","text":"各界电毛主席致敬"},{"type":"paragraph","text":"【新华社东北十三日电】“五一”内蒙古自治政府成立周年纪念日，乌兰浩特市各界曾热烈举行庆祝大会，并电毛主席、朱总司令暨中共中央委员会致敬，电称：“内蒙古人民在你们的领导和帮助下，广大地区已获得解放。内蒙古民族第一次实现了人民的统一、团结与民族自治，建立了自治政府。这充分证明了你们提出来的中国少数民族政策的正确。中国各少数民族均将循着这条道路而获得解放。今天是自治政府成立周年纪念，适逢革命圣地延安已告光复，象征全国胜利为期不远，谨向你们致热烈的庆贺，并致亲切的敬意。我们决在你们领导下继续努力，配合全国的胜利大反攻，为实现各民族联合的新中国而奋斗”。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1989622d48"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
