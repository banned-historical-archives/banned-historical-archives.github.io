"林昭"],"dates":[{"year":1964,"month":2}],"is_range_date":false,"parts":[{"text":"血书：自谏","type":"title"},{"text":"北京大学林昭","type":"authors"},{"text":"自谏（一九六四年二月血书）","type":"subtitle"},{"text":"眼枯见骨，心死成灰，抱病郁痛，天乎冤哉！","type":"paragraph"},{"text":"家国多难，予生也哀，素丝欺  ，歧途方回！","type":"paragraph"},{"text":"失足自怜，回头百年，初心似水，指证苍于！","type":"paragraph"},{"text":"永昼频迫，风夜忧煎，意存碧落，恨穷黄泉！","type":"paragraph"},{"text":"作赋奈何，百身莫赎，坐令我众，遘此楚  ！","type":"paragraph"},{"text":"风尘寂寞，天涯沦落，忝难歌残，铜驼没绿！","type":"paragraph"},{"text":"故剑茫茫，故园就荒，举世无道，我适何邦！","type":"paragraph"},{"text":"穷途猖狂，戴哭兴亡，九畹芜秽，五内摧伤！","type":"paragraph"},{"text":"百虑重忧，谓我何书，恸念来日，血泪交浴。","type":"paragraph"},{"text":"已歌燕市，无惭楚囚，子期不见，江波悠游！","type":"paragraph"},{"text":"愁不能辍，愤不忍说，节不见改，志不可夺！","type":"paragraph"},{"text":"书愤沥血，明志绝泣，此身如絮，此心似铁！","type":"paragraph"},{"text":"自由无价，年命有涯，宁为玉碎，以殉中华！","type":"paragraph"},{"text":"山川挝鼓，河岳鸣笳，魂化雷电，肠断桑麻！","type":"paragraph"},{"text":"风雨长霄，平旦匪还，捐生取义，岂俟来朝！","type":"paragraph"},{"text":"志节皓皓，行状皎皎，正气凛冽，清名孔昭！","type":"paragraph"},{"text":" 来源：《林昭文抄》，甘粹先生2000年7月11日抄本。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f2c09a370e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
