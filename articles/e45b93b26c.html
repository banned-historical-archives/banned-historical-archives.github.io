script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"德民众举行反极右示威","authors":["吕鸿"],"dates":[{"year":2000,"month":11,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"德民众举行反极右示威"},{"type":"paragraph","text":"新华社柏林11月4日电（记者吕鸿）德国首都柏林和许多城市4日举行了不同规模的群众反极右示威游行活动，强烈要求政府取缔极右政党德国国家民主党。这是一段时间以来德国反极右活动规模较大的一次。"},{"type":"paragraph","text":"在柏林，500多人举行抗议活动，抗议极右分子举行的集会。由于发生了冲突，德警方提前结束了极右分子举行的集会，并逮捕了13名新纳粹分子。在德国东部城市德绍，约2000人参加了反新纳粹示威游行。此外，在东部萨克森州和南部巴伐利亚州等地也爆发了较大规模的群众反极右活动。"},{"type":"paragraph","text":"据此间媒体透露，德国内阁将在本月8日召开会议，正式作出取缔德国国家民主党的决定，并将该决定递交德国联邦参议院和德国宪法法院裁定通过。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e45b93b26c"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
