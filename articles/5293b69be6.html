<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共中央转发辽宁省委批转省委财贸部关于在农村中的财贸工作人员参加社会主义大辩论的意见","authors":[],"dates":[{"year":1957,"month":9,"day":14}],"is_range_date":false,"parts":[{"text":"中共中央转发辽宁省委批转省委财贸部关于在农村中的财贸工作人员参加社会主义大辩论的意见","type":"title"},{"text":"各省、市、自治区党委：","type":"appellation"},{"text":"辽宁省委批转省委财贸部《关于在农村中的财贸工作人员参加社会主义大辩论的意见》转发各地参考。","type":"paragraph"},{"text":" 中央1957年9月14日","type":"paragraph"},{"text":"辽宁省委批转省委财贸部关于在农村中的财贸工作人员参加社会主义大辩论的意见","type":"subtitle"},{"text":"各市、地、县（旗）委：","type":"appellation"},{"text":"省委同意省委财贸部《关于在农村中的财贸工作人员参加社会主义大辩论的意见》。省委认为：在农村中的财贸工作人员参加农民的辩论是有好处的，既可以提高他们的思想觉悟，也可以使他们直接地、更多地听取农民的反映，而促其改进工作。","type":"paragraph"},{"text":"对在农村中的财贸工作人员应如何进行整风问题，各地委可选择适当的时机进行试点，使整风运动不断地深入开展。","type":"paragraph"},{"text":" 中共辽宁省委员会1957年8月26日","type":"paragraph"},{"text":"省委：","type":"appellation"},{"text":"在农村的财贸工作人员（不包括县城和大镇），据现有的不精确的统计有70777人，其中供销社的48000人，信用社、银行6999人，税务人员800人，粮食购销站、粮库9293人，食品采购站、批发商店5685人。这些人员无论在社会关系、日常生活等方面，都和农民有着千丝万缕的联系，农民的思想对他们是有很大影响的；他们工作得好坏对农民也有着直接的影响，特别是目前即将展开的以统购统销为中心的大辩论和他们的关系是很密切的。因此我们的意见，在农村中的财贸工作人员在目前可以和农民一起参加这一次大辩论。参加在一起辩论有这样几个好处：（1）在大辩论中明辨是非，提高觉悟；（2）直接听取农民群众对财贸工作的意见，以改进工作；（3）可以通过他们日常所了解的农民和农业社中破坏统购统销政策、本位主义、资本主义思想表现和组织他们积极搜集这方面的情况，向当地党的组织提供情况，对社会主义大辩论的开展是有好处的；（4）这次农村社会主义大辩论是在党委统一领导下进行的，组织了大批干部，有坚强的领导，通过参加辩论，提高思想、改进工作是十分有利的。","type":"paragraph"},{"text":"当然不是说仅参加农村的大辩论就解决了在农村中的财贸工作人员的整风问题，他们的整风问题还需要以企业为单位进行，采取提意见、发议论、展开辩论的办法，提高觉悟、改进工作。根据农村的分散情况和职工的思想情况，这一步应如何进行、什么时候进行，现在我们还提不出什么具体意见来，我们准备在一二个地方试试点，也希望各地委能试一个点。","type":"paragraph"},{"text":"在参加农村大辩论时期，各地领导应注意搜集和研究他们的思想和行动表现，以便使某些问题能在他们单独进行整风时加以解决。","type":"paragraph"},{"text":"以上意见是否对，请批示。","type":"paragraph"},{"text":" 中共辽宁省委财贸部1957年8月17日","type":"paragraph"}],"comments":[],"origin":"根据中央文件翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5293b69be6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
