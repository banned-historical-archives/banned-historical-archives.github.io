script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"千万个雷锋在成长","authors":["杨俊林"],"dates":[{"year":1976,"month":8,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"一班战士　杨俊林"},{"type":"paragraph","text":"雷锋，是用马列主义、毛泽东思想武装起来的共产主义战士。他具有爱憎分明的阶级立场，言行一致的革命精神，公而忘私的共产主义风格，奋不顾身的无产阶级斗志。"},{"type":"paragraph","text":"“向雷锋同志学习”。伟大领袖毛主席的号召，象一声春雷，响彻万里长空，震动五湖四海。共产主义精神的绚丽花朵，在伟大祖国的土地上竞相开放。看!从长城内外到大江南北，从兴安丛岭到五指山麓，从雅鲁藏布江到东海之滨，有多少英雄战士在沿着雷锋的道路阔步前进:一不怕苦，二不怕死的好战士王杰，舍身救列车的英雄欧阳海、蔡永样，爱民模范李文忠、洛桑单增，反修战士柯永成，做缩小三大差别、限制资产阶级俊法权促进派的魏尧升、钟志民、林林宏、张兴华、卢江天……雷锋同志的精神鼓舞着千万人朝共产主义的伟大目标前进。"},{"type":"paragraph","text":"仅在我们这样一个普通的连队，雷锋精神的火花就闪烁着耀眼的光芒:"},{"type":"paragraph","text":"司务长张林海一天外出有事，遇到一位外地来的老大娘在南京路上迷了路，他不辞辛劳，想方设法，一直把大娘送到住处。大娘热泪盈眶地说:“孩子，你真象当年的雷锋啊!”唐山、丰南一带强烈地震发生以后，连队干部和战士牢记毛主席的教导，纷纷以实际行动投入支援抗震救灾斗争；我人民解放军指战员为抗震救灾作出了巨大贡献，灾区人民含着热泪赞扬说:“毛主席教育出来的好战士，个个都是活雷锋!”"},{"type":"paragraph","text":"永远继承和发扬雷锋同志的共产主义精神，这就是我军广大指战员今天的战斗风貌。"},{"type":"paragraph","text":"邓小平散布“雷锋叔叔不在了”的反动谬论，玩的是“黄鼠狼给鸡拜年”的把戏。邓小平哪里会希望千万个“雷锋”成长起来呢?他是要把成长着的“雷锋”都镇压下去。邓小平装出一副关心军队建设的面孔，把黑手伸到军队里来，以救世主的架势要对军队进行“整顿”，就是要整掉毛主席的无产阶级建军路线；整掉党对军队的绝对领导；整掉无产阶级军队完全彻底为人民服务的宗旨，推行资产阶级军事路线，为他篡夺党和国家的最高权力，复辟资本主义服务。"},{"type":"paragraph","text":"走资派还在走，革命战士斗了还要斗。我们要认真学习毛主席的一系列重要指示，牢记我军的性质和宗旨，深批邓，对着干，学雷锋，做雷锋，让雷锋精神在我们队伍中永远发扬，永远闪光!"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5a512b2503"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
