script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"批判资产阶级经营作风　坚持支农的正确方向  潮阳县商业部门积极供应春耕物资","authors":[],"dates":[{"year":1975,"month":3,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"批判资产阶级经营作风　坚持支农的正确方向"},{"type":"paragraph","text":"潮阳县商业部门积极供应春耕物资"},{"type":"paragraph","text":"新华社广州一九七五年三月六日电　广东省潮阳县商业部门，及早做好春耕生产物资的供应工作。目前，全县绝大部分春耕生产物资已经运送到社队。其中竹、木、铁制的春耕中小农具比去年同期增加百分之二十六点二。"},{"type":"paragraph","text":"去年秋收冬种结束后，这个县商业局党组织就召开全县商业支援农业工作经验交流会，总结经验，表彰先进，研究部署支援今年春耕生产的任务和措施。会后，商业局领导干部一方面组织广大干部、职工学习马列著作和毛主席著作，深入批判刘少奇、林彪的“利润挂帅”、“物质刺激”等修正主义黑货，批判资产阶级经营作风，坚持商业支援农业的正确方向；同时带领调查组深入部分社队调查研究，摸清春耕生产物资需求情况，了解支农中存在的问题。西胪供销社职工认真总结了去年及时供应农药防治病虫害，使全公社夺得稻子大丰收的经验，从去冬开始，他们就切实抓好农药的采购和调运工作，目前，他们已将储备的五十多吨农药和一批制造土农药的原料陆续供应社队。和平供销社的职工，根据本地溪河多、贫下中农有积河泥习惯的特点，及早采购了一批木材、铁钉等，帮助各大队搞好农船维修工作。"},{"type":"paragraph","text":"在支援春耕生产中，潮阳县商业部门注意帮助社、队利用本地资源，大搞土肥料、土农药。关埠供销社抽调干部到上底大队同社员一起放养红萍种苗六百多亩。县委在关埠公社召开了红萍生产现场会议，并从关埠公社聘请了三十名有放养红萍经验的老农，到各公社进行技术指导，使全县早稻绿肥生产有了新的发展。贵屿供销社帮助各大队试验生产土化肥腐植酸氨，到二月中旬，全公社已生产腐植酸氨十九万多担。在发展土肥料、土农药的同时，这个县商业部门还帮助各社、队办好中小农具维修站，利用本地竹、木资源，自己动手加工、维修了一大批中小农具。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4e61178732"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
