" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"在中国民主同盟文委座谈会上的发言","authors":["清华大学","钱伟长"],"dates":[{"year":1957,"month":2}],"is_range_date":false,"parts":[{"text":"在中国民主同盟文委座谈会上的发言","type":"title"},{"text":"清华大学钱伟长","type":"authors"},{"text":"（钱伟长：清华大学副校长）","type":"subtitle"},{"text":"不要找不学无术的人哇哇叫！","type":"subtitle"},{"text":"[早在1957年2月钱伟长在民盟中央文委与民盟北京市委文委联合座谈会上发言，就大肆攻击学习苏联的方针，大叫要取消不学无术的人（指党员）的发言权。他的发言如下：]","type":"paragraph"},{"text":"一、1952年前后，我们的教学工作主要学习苏联，这时学习苏联我们完全拥护，因为不知道苏联先进经验是什么？今天就不同了，我们要研究资本主义的哪些是好的，哪些是坏的：苏联的哪些是好的，哪些是坏的。现在有两种偏向：一种是资本主义全面复僻；一种是死守苏联。不好，都是不好的。谁一批评苏联，即反苏反共。如果这样，就无法谈问题。今后教学如何改进，要看这个问题解决的怎样。今天的“帽子”太多。","type":"paragraph"},{"text":"二、高教、中小学，中等技术学校应密切联系，全面考虑。小学首先要数量，高校要质量，中等教育要在质量上发展数量。中学的学制存在很大的问题。中小学12年，儿童必须是7岁上学，那么20岁左右才能上大学，如果将来再抄袭苏联的办法，有几年工作经验的人才许考大学，那么就要延到23岁上大学，26、27岁才能工作，已经成了小老头，失去锐气了。","type":"paragraph"},{"text":"三、院系调整……工作量，一系列的改革，无非是行政办法。学校领导不以学术来讲话，而以某个人是否有群众基础来讲话，我们应该找有学术水平的人讲话，不要找不学无术的哇哇地叫。今后如不再严格地处理学术水平问题，教学工作无法提高。开展争论也应该是有学术水平的人开展争论，升级也应以学术水平为标准。从群众基础上、从能说会道上来提级是不对的。助教开课起过一定作用，但不足作为经验。","type":"paragraph"},{"text":"高教部对高等学校就无学术领导，连一个学术委员会都没有。","type":"paragraph"},{"text":"我所讲的学术领导不是老头领导，年老年轻只要有学术都可以领导。学术问题与群众观点是两回事。现在有些人在争夺科学研究工作，我看是争毛厕坑又不拉屎。因为他们没吃饭，肚中空空。","type":"paragraph"}],"comments":[],"origin":"《捍卫高等教育和科学事业的社会主义方向 批判右派分子钱伟长的反党反社会主义言行（一）》（清华大学新清华编辑委员会编，1957年12月）","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"86821a4b3e"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
