ical-archives/banned-historical-archives0/main/maoquanji48.pdf"],"article":{"title":"在章士钊反映被抄家情况来信上的批语","alias":"","parts":[{"type":"paragraph","text":"在章士钊反映被抄家情况"},{"type":"paragraph","text":"来信上的批语!"},{"type":"paragraph","text":"（1966年8月30日）送总理酌处。应当予以保护。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"八月卅日"},{"type":"paragraph","text":"[1]全国人大常委会委员、中央文央研究馆馆长章士钊1966年8月30日给毛泽东写信，反映8月29日晚被抄家的情况，请求毛泽东帮助，“在可能范围内稍稍转圆一下”“最要紧在不发生重复搜索”。毛泽东阅信后即在上面写了这个批语。据章士钊的女儿章含之写的《我与父亲章士钊》一文记载，9月1日，毛泽东还给章士钊写了一封回信，信中说：“来信收到，甚为系念。已请总理予以布置，勿念为盼！”"},{"type":"paragraph","text":"[2]国务院总理周恩来接到毛泽东转来的信件和批语后，当即办理，并于8月30日下午2时在信封上批注：“已办。周注。”同时，他还亲笔写了一份应予保护的领导干部和著名民主人士的名单，包括宋庆龄、郭沫若、章士钊、程潜、何香凝、傅作义、张治中、蔡廷锴、邵力子、蒋光、沙千里、张奚若、李宗仁等，和国家副主席，全国人大常委会副委员长、人大常委，政协全国委员会副主席，国务院副总理、部长、副部长，各民主党派负责人，两高（指最高人民法院和最高人民检察院）负责人等。"}],"authors":["毛泽东"],"dates":[{"year":1966,"month":8,"day":30}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":527,"page_end":527},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cb0db6d01d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
