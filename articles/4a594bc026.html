ates":[{"year":1953,"month":6,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"中国佛教协会成立会议全体代表向毛泽东主席致敬电敬爱的毛主席："},{"type":"paragraph","text":"我们来自全国各地区出席中国佛教协会成立会议的佛教四众代表们，受着全国佛教徒的嘱托谨向您——我们最敬爱的伟大领袖表示无限的爱戴与感激的心情，并致以最崇高的敬意。在您的光明照耀之下，全国佛教徒获得了真正的信仰自由，中国佛教协会的产生，有力地证明了您和中国共产党、中央人民政府的宗教政策之正确与伟大。敬爱的毛主席，我们永远感谢着您的功德。"},{"type":"paragraph","text":"当此全国各地区及不同民族和不同宗派的佛教徒共同组织的中国佛教协会成立的时候，我们向您保证，全体佛教徒一定要更紧密地团结在人民政府的周围，积极参加爱国运动和保卫世界和平运动，参加新中国的各种建设事业，为着祖国人民的福利，为着全世界人类的安宁，贡献我们的一切力量。"},{"type":"paragraph","text":"您的每一个号召，都是人民的幸福之音，响应您的号召，是全国佛教徒神圣的责任。"},{"type":"paragraph","text":"敬祝您吉祥安乐、万寿无疆。"},{"type":"paragraph","text":"佛教协会成立会议全体代表  一九五三年六月三日"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4a594bc026"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
