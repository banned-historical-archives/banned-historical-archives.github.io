":[{"year":1980,"month":6,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"刘性凤"},{"type":"paragraph","text":"毛泽东同志在批判林彪一伙鼓吹的“英雄创造历史”时，明确提出是奴隶们创造历史。这里的“奴隶”指的就是“人民群众”，除了包括所有的广大劳动人民以外，还包括脑力劳动和新兴的剥削阶级，甚至还包括领袖人物。因为“奴隶”在这里是和“英雄”对立的，所以“英雄”在这里指的是反动统治阶级。“奴隶们创造历史”是指人民群众通过自己的实践活动创造新的社会。“英雄创造历史”是指反动阶级认为他们的思想活动、意志活动可以决定社会上的一切。反动阶级对历史起的只是破坏作用，不等于也参加历史的创造。前一种观点是唯物主义的历史观，因为这是从社会存在决定社会意识的唯物史观的基本原理出发的；后一种观点是唯心主义的历史观，因为这是从社会意识决定社会存在的唯心史观出发的。领袖来自群众。因此，我们说人民群众是历史的创造者的时候，是包含领袖人物在内的。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f4c3536ebd"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
