<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"上海师大等学校举办的师资培训班胜利结业本市中小学教育战线喜添五千多名新兵学员们在毕业前夕纷纷表示要努力做捍卫和执行毛主席的无产阶级教育路线的忠诚战士，为无产阶级教育事业作出贡献","authors":[],"dates":[{"year":1972,"month":7,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　在毛主席无产阶级教育路线指引下，上海师范大学和上海第一师范学校、上海第四师范学校、安亭师范学校举办的中小学师资短期培训班，最近胜利结业，为上海中小学教育战线培养了五千多名新兵。"},{"type":"paragraph","text":"为了适应当前上海中小学教育事业飞跃发展的需要，根据市有关部门的决定，去年九月，从市郊十个县以及国营农场选调了具有二至三年以上农业生产实践经验、文化程度相当于高中或初中毕业的知识青年六千多人进行培训。培训为中学教师的有四千五百多人，分设语文、政治、数学、外语、工业基础知识、农业基础知识、军事体育、革命文艺等九个专业，其中一千多名学员已在今年二月提前毕业。培训为小学教师的有一千五百多人，按小学课程分设专业。这批知识青年，经过无产阶级文化大革命的锻炼，接受了贫下中农的再教育，绝大多数人具有一定的思想觉悟，在培训期间以顽强的革命精神刻苦学习，努力提高政治思想和文化科学水平。"},{"type":"paragraph","text":"中小学师资培训工作，遵照毛主席关于“进行一次思想和政治路线方面的教育”的教导，坚持以批修整风为纲，把学习和贯彻执行毛主席的无产阶级教育路线放在首位，将忠诚党的教育事业的思想教育贯串始终。针对有些学员存在的“当教师倒霉”的思想，培训班以党的基本路线为纲，组织学员认真学习毛主席的无产阶级教育路线，批判刘少奇一类骗子的反革命修正主义教育路线，肃清“教师倒霉论”的流毒，明确为谁学习、为谁当教师这个根本问题。为了帮助学员进一步分清两条路线，树立忠诚党的教育事业的思想，培训班组织师生到工厂、农村人民公社和中小学进行调查，接受教育。工人、贫下中农回忆对比的阶级教育，激发了学员的阶级觉悟；广大学生家长——工农兵、革命干部、革命知识分子对革命教师的殷切期望，增强了学员们为革命而当好教师的信心和决心；教育战线上两个阶级、两条路线争夺青少年的激烈斗争，使学员们更加意识到自己肩上责任的重大。通过一系列的思想和政治路线方面的教育，学员们提高了学习和贯彻执行毛主席的无产阶级教育路线的自觉性，从路线斗争高度认识了革命教师的光荣责任，克服了“当教师倒霉”等错误思想。他们说:“刘少奇一类骗子拼命抓上层建筑，妄图复辟资本主义；我们为了彻底粉碎他们的反革命阴谋，一定要为无产阶级掌好文权。”有一位烈士的女儿，一度也有“当教师倒霉”的想法，经过路线教育，在社会调查中听了老工人的回忆对比后，思想觉悟有了提高。她说，如果我们不占领教育阵地，让资产阶级在教育文化阵地上专我们的政的话，那才是最大的倒霉。她决心继承先烈革命志，誓当教育革命的尖兵，为巩固无产阶级专政而学习，并在政治思想和业务学习等方面都有了不小的进步。"},{"type":"paragraph","text":"在进行路线教育的基础上，培训班组织学员到中小学进行教育革命实践，在教学中帮助他们处理好政治教育与业务教学的关系，狠批了刘少奇一类骗子“政治可以冲击其它”以及“智育第一”、“业务挂帅”等修正主义黑货，划清了政治挂帅与“政治可以冲击其它”的界限，上好社会主义文化课与“智育第一”的界限。为了帮助学员更好地理解和学习毛主席的无产阶级教育路线和政策，树立忠诚党的教育事业的思想，学习必要的基础业务知识，以便将来能够担任中学一门或小学二门以上学科的教学工作，培训班结合中小学教材，着重进行基础知识教学，并在中小学教材基础上适当加以提高、加深，使学员现在的“学”与今后的“教”更好地结合起来，注意培养学员分析问题和解决问题的能力。"},{"type":"paragraph","text":"在毛主席无产阶级教育路线的指引下，培训班学员在六月上旬胜利结业。在奔赴战斗岗位之前，他们满怀革命的豪情壮志，以党的需要作为自己的志愿，纷纷表示“让革命来挑选自己，而不是自己去挑选革命工作”，努力做捍卫和贯彻执行毛主席的无产阶级教育路线的忠诚战士，为无产阶级教育事业作出贡献。"},{"type":"paragraph","text":"培训班的教育革命实践，也对师范院校的教育革命起了推动作用。这些单位的领导决心进一步改变脱离三大革命运动，脱离中小学教育革命实践的状况。有的单位已从中小学实际出发，编写出一些新教材，有的单位的教师打算更经常地到中小学去，熟悉中小学教育革命的情况，研究中小学教育革命中的问题，推进师范教育革命的蓬勃开展。"},{"type":"paragraph","text":"(本报通讯　员)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"教育革命","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a419eb42a0"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
