ear":1985,"month":12,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"《历史研究》今年第四期发表林庆元《章太炎是小资产阶级思想家》一文，指出章太炎是城乡小资产阶级思想家，理由是:一、章太炎赞成资本主义及其议会民主制，是由于他看到了西方制度的弊病；二、章太炎不是代表封建地主阶级的利益来反对代议制，而是从小资产阶级的利益出发反对代议制的。章太炎认为代议制实行结果，必为大资产阶级所垄断而不利于小资产阶级；三、章太炎提出的某些经济主张也是着眼于保护小资产阶级利益的；四、章太炎追求普遍的平等和绝对自由，是小资产阶级的政治要求。"},{"type":"paragraph","text":"(霍史达)"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fcd49d25e2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
