script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji26","name":"毛泽东全集第26卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji26.pdf"],"article":{"title":"把南北通船通航通邮诸事当作一件大事去做","alias":"","parts":[{"type":"paragraph","text":"把南北通船通航通邮诸事"},{"type":"paragraph","text":"当作一件大事去做"},{"type":"paragraph","text":"（1949年2月15日）彭、叶，并告总前委、天津市委、华北局，并发各局、各前委："},{"type":"paragraph","text":"丑文电悉。"},{"type":"paragraph","text":"为了（一）恢复南北商业联系，发展生产；（二）使南方各大城市资产阶级了解我党政策措施，便利我们在占领南方各大城市时孤立国民党，顺利地接收管理和发展各大城市的生产：（三）使轮船、飞机、邮政、电报从国民党手中转入我们手中等项目的，我们对于不论何种轮船业，民航公司（中航、央航\"），都应当允许其先在平、津、秦皇岛恢复通航。北平电讯局未停，天津电讯局亦应准备恢复通电。平、津与南方邮务、交通亦应恢复。银行、钱庄、邮局及商家的汇兑，亦应恢复。在通船、通航、通邮、通电、通汇之后，我们的检查不可过严。对付特务，主要应从群众工作和内线工作方面去取得成绩，而不要从限制交通、通讯方面去求成绩。京、沪、汉等地的国民党必然会利用我们恢复交通、通讯派遣一些特务来平、津，并互相联络。但平、津方面增加了一些特务，京、沪、"},{"type":"paragraph","text":"[1]丑文，即2月12日。[2]中航、央航，即国民党政府的两个民用航空公司：中国航空公司、汉方面即减少了一些特务，特务总数并不因此增加。而京、沪、汉诸地几个月之后即是属于我们的。因此，你们对于南北通船、通航、通邮、通电、通汇诸事，应当看作一件大事去做，而不应当采取消极态度。此次南京代表团回去对我影响极好。现在上海代表团又来了，将来武汉、长沙亦可能派代表团来。这些代表团都是资产阶级及绅士们的代表，其中有些是国民党人。他们处在国民党灭亡在即、我军即将占领全国的形势下，不得不向我们找出路。这是有利于我们发展的现象，故应好好地应付这些代表团。并由总前委及董薄\"、彭叶共同负责研讨并提出对子南北通船、通航、通邮、通电、通汇诸事的具体办法报告我们批准，以便与上海代表及魏文瀚、金山2等解决问题。"},{"type":"paragraph","text":"中央"},{"type":"paragraph","text":"删亥"},{"type":"paragraph","text":"[1]董，指董必武（1886一1975)，湖北黄安（今红安）人，当时任华北人民政府主席。薄，指薄一波，当时任华北人民政府副主席。"},{"type":"paragraph","text":"[2]魏文瀚（1896一?），天津市人，当时任上海市轮船业同业公会理事长，被推为赴北平参加南北通航谈判的代表。金山（1911—1982)，湖南沅"},{"type":"paragraph","text":"你牌流邮迪迪区壮车我历发便好上海成五号文磁今心"},{"type":"paragraph","text":"了科法内送口"},{"type":"paragraph","text":"毛泽东为中共中央起草的《把南北通船通航通邮诸事当作一件大事去做》的手稿。"}],"authors":["毛泽东"],"dates":[{"year":1949,"month":2,"day":15}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":136,"page_end":138},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b1666590ad"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
