tes":[{"year":1976,"month":9,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"不许邓小平贩卖洋奴哲学"},{"type":"paragraph","text":"天津钟表厂工人理论小组"},{"type":"paragraph","text":"邓小平授意炮制的《汇报提纲》，露骨地宣扬洋奴哲学、爬行主义，别有用心地说什么，“讲自力更生，又不能变成闭关自守，变成排外。”邓小平妄想以学习外国先进经验为借口，把资本主义制度移到中国来。谁反对他这样做，他就要给谁扣上“闭关自守”、“排外”的帽子。"},{"type":"paragraph","text":"发展我国社会主义工业和科学技术，是坚持独立自主、自力更生，还是搞洋奴哲学、爬行主义，这是两条路线的尖锐斗争。《汇报提纲》把发展我国工业和科学技术的希望，寄托在外国的先进技术上，公然对抗毛主席提出的“独立自主、自力更生”的方针。按照邓小平这套洋奴哲学去搞，我们社会主义祖国就要变成帝国主义、社会帝国主义的附庸和殖民地，那还谈得上什么发展自己的工业和科学技术？"},{"type":"paragraph","text":"把我国工业和科学技术的命运拴在外国人身上，真能加速工业和科学技术的发展吗？否！我们厂曾请过一位苏联专家，说是帮助我们发展钟表工业。这个“洋专家”来到之后，就强行砍掉了我们自行设计的“三针闹钟”，生产他们国内已经落后的“两针闹钟”，还美其名曰“友好牌”。由于产品设计落后，外观不美，不受工农兵欢迎，结果不得不贬价处理，给国家造成了几百万元的损失。后来，苏修叛徒集团撕毁协议，撤走专家，妄图用这一套来卡我们。我厂广大职工在党的领导下，坚持自力更生方针，改进了设计，恢复了“金鸡牌”闹钟，并群策群力，增加了花色品种，很受群众欢迎。经过无产阶级文化大革命，广大职工的阶级斗争、路线斗争和继续革命的觉悟有了很大提高，生产迅速发展。现在我厂的产品已畅销到七十多个国家和地区，受到世界各国朋友的欢迎。广大职工深有体会地说：媚外崇洋，一切全凉；自力更生，能攀世界高峰。"},{"type":"paragraph","text":"毛主席教导我们：“自力更生为主，争取外援为辅，破除迷信，独立自主地干工业、干农业，干技术革命和文化革命，打倒奴隶思想，埋葬教条主义，认真学习外国的好经验，也一定研究外国的坏经验——引以为戒，这就是我们的路线。”我们将永远沿着这条正确路线奋勇前进。"},{"type":"paragraph","text":"（摘自八月二十七日《天津日报》）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"天津文革","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a2625f0699"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
