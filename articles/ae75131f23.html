art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"西藏军区举行业余文艺会演十五个业余演出队演出节目一百多个，表现了高原战士热爱党和毛主席，热爱边疆和藏族人民的真切感情；","authors":["杜琳"],"parts":[{"type":"paragraph","text":"本报讯 八月一日至二十一日，西藏军区举行了第三届业余文艺会演。这次会演，是根据林彪元帅关于部队文艺工作指示的精神，对一九六○年以来西藏各部队文艺工作的大检阅。通过会演，交流了经验，培养了骨干，为进一步开展文艺工作打下了良好的基础。"},{"type":"paragraph","text":"这次会演有十五个业余演出队、二百八十三人参加，共演出十五场、一百七十六个节目。其中《边防战士想念毛主席》、《西藏就是我的家》、《冰河救藏胞》、《日夜巡逻催战马》等节目，表现了高原战士热爱党和毛主席，热爱边疆和藏族人民的真切感情，以及战胜阶级敌人，藐视自然困难，立足西藏、眼看世界的英雄气魄。"},{"type":"paragraph","text":"在会演开幕式上，中共西藏工委和军区首长、机关干部一百多人，同登舞台高唱革命歌曲。军区首长自始至终观看了演出，并作了重要报告，号召到会同志高举毛泽东思想红旗，乘胜前进，进一步做好文艺工作，积极为部队创造四好连队服务。报告中，一再强调要大家狠抓创作。"},{"type":"paragraph","text":"闭幕式上，军区首长给获奖单位和个人发了奖。（杜琳）"}],"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ae75131f23"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
