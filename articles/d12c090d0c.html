art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"民族英雄岳飞墓重新开放叶剑英同志亲笔题匾额“心昭天日”","authors":[],"parts":[{"type":"paragraph","text":"据新华社杭州十月一日电 民族英雄岳飞墓（包括岳庙），经修复，最近重新向群众开放。"},{"type":"paragraph","text":"岳飞是一位热爱祖国，刚直不阿而遭到诬陷的民族英雄。在林彪、“四人帮”极左路线干扰下，岳飞再度被加上“莫须有”的罪名。坐落在西子湖畔的岳飞墓（包括岳庙）本是全国重点文物保护单位，但却遭到严重破坏。"},{"type":"paragraph","text":"经过一年的修复，今天，岳飞墓丰碑堂堂，芳草青青。叶剑英同志亲笔题的匾额“心昭天日”，悬挂在大殿前，大殿两壁刻有“尽忠报国”四个大字。岳飞像高达四米，身披蟒袍，臂露金甲，一手按剑，一手握拳，显示出岳飞的英武气概。"}],"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d12c090d0c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
