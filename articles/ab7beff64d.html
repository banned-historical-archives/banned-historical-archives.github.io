script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"南朝鲜统一革命党公布白皮书  揭露朴正熙集团残暴压迫和剥削工人","authors":[],"dates":[{"year":1974,"month":3,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"南朝鲜统一革命党公布白皮书"},{"type":"paragraph","text":"揭露朴正熙集团残暴压迫和剥削工人"},{"type":"paragraph","text":"新华社平壤一九七四年三月十日电　据朝鲜中央通讯社报道，南朝鲜统一革命党最近公布一项白皮书，揭露朴正熙集团残暴压迫和剥削南朝鲜工人。"},{"type":"paragraph","text":"白皮书说，南朝鲜工人的悲惨遭遇完全是朴正熙集团实行法西斯卖国政策造成的。"},{"type":"paragraph","text":"白皮书说，南朝鲜工人被迫每天辛苦劳动十二至十四小时。有些行业甚至被迫进行十六至十八小时奴隶般的劳动。但是付给他们的饥饿工资却不到最低生活费用的三分之一。女工和童工的条件是很恶劣的。他们的工资只有普通男工工资的百分之四十八。"},{"type":"paragraph","text":"它说，在南朝鲜的外国垄断企业付给工人的工资，不到它们付给本国工人工资的十分之一或二十分之一。"},{"type":"paragraph","text":"白皮书说，南朝鲜的工厂和企业就象“中古式的奴隶劳动场所”。南朝鲜工人由于工作场所的空气污染而长年染上呼吸系统和其它疾病。即使在他们生病或发生工伤事故时，他们也处于无依无靠的境地。劳动人民遭到工伤事故的数字在过去十年中增加了三十倍。"},{"type":"paragraph","text":"白皮书指出，在有些外国企业里工人被当做牛马，被虐待，受侮辱，甚至被杀害。他们在工作时竟被剥夺了说朝鲜话的权利。白皮书说，朴正熙集团所奉行的政策的目的，就是通过出卖国家和民族来实现他们永远当政的野心。如果不彻底粉碎现在的统治者推行的这种叛卖政策，那末南朝鲜劳动人民的地位就很难改善，也就无法摆脱目前的悲惨境遇。为了确保南朝鲜工人基本的权利，必须粉碎朴正熙政权。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ab7beff64d"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
