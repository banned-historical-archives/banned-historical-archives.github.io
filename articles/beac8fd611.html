script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"阿《团结报》揭露赫鲁晓夫修正主义者新的投降活动  苏联领导背着德越人民同美帝进行幕后交易","authors":[],"dates":[{"year":1966,"month":4,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"阿《团结报》揭露赫鲁晓夫修正主义者新的投降活动"},{"type":"paragraph","text":"苏联领导背着德越人民同美帝进行幕后交易"},{"type":"paragraph","text":"新华社地拉那三十一日电　阿尔巴尼亚《团结报》三十一日发表评论，揭露赫鲁晓夫修正主义者背着德国人民和越南人民，同美帝国主义进行幕后交易，策划危害世界和平与安全的危险阴谋。"},{"type":"paragraph","text":"这篇题为《帝国主义和修正主义的另一阴谋和幕后交易》的评论说，美国最近正在进行关于“柏林危机”已经过去、欧洲局势“平静”，因此把一些部队从欧洲和西柏林东移的宣传运动，这是约翰逊的所谓“和平攻势”的一个组成部分。但是，这些煽惑人心的宣传是骗不了任何人的。"},{"type":"paragraph","text":"评论列举了许多事实后指出，赫鲁晓夫修正主义者的所谓“缓和欧洲紧张局势”的政策，使华盛顿有可能把一部分部队从西欧和西柏林转移到南越。如果美国没有同苏联修正主义者的互相谅解，它就不可能增派这部分军队到越南去扩大侵略战争。"},{"type":"paragraph","text":"评论说，赫鲁晓夫修正主义领导人有意破坏社会主义国家关于同德意志民主共和国单独签订和约，并在此基础上解决西柏林问题的共同决定。为了不妨碍同美帝国主义的关系，赫鲁晓夫修正主义者早就用“欧洲集体安全”和维持“现状”的蛊惑人心的口号代替了签订对德和约。"},{"type":"paragraph","text":"评论最后说，赫鲁晓夫分子所追求的“现状”使华盛顿感到高兴。目前，美国在越南的罪恶战争正使白宫大伤脑筋，美国侵略者在南越正遭到接二连三的失败，五角大楼不得不派越来越多的军队去挽救不可避免的灾难，在这种情况下，美帝国主义正需要后方的“平静”，以便腾出手来去镇压英雄的越南人民。赫鲁晓夫分子的投降政策正在帮助美国的这种努力。这些事实再次更加清楚地暴露了关于“团结”和说什么赫鲁晓夫修正主义者正在给英雄的越南人民以“援助”的口号的蛊惑性和危险性。事实上，赫鲁晓夫修正主义者正在以一切方式帮助美国侵略者从死胡同里摆脱出来。但是，赫鲁晓夫修正主义者的这一新阴谋必将象过去一样遭到可耻的破产。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"beac8fd611"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
