script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"资本家每个毛孔都充满工人阶级的血和泪头号野心家鼓吹‘剥削无罪’妄想变天王家码头里弄干部和退休工人以亲身经历批判自称‘老革命’的无耻谰言","authors":[],"dates":[{"year":1967,"month":4,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　在万炮齐轰党内最大的走资本主义道路当权派的时刻，上海广大革命的里弄干部也积极行动起来，投入了战斗。南市区王家码头街道部分里弄干部，退休工人以亲身经历，揭发、控诉修正主义总后台梦想翻天的滔天罪行。"},{"type":"paragraph","text":"党内最大的走资本主义道路当权派百般美化资本主义制度，竭力散播修正主义思想，说什么:“劳动人民不是反对剥削，而是欢迎剥削。”万豫码头街里委会读报员夏菊英愤怒地说:我在旧社会里做了二十多年工人，受尽了残酷剥削。开始在一家蛋厂干活，资本家只顾自己赚钱发财，那里管我们工人生活，每天日班连夜班，只发四角钱，当时连两个人的一天口粮也买不起，我的大孩子病了，由于没钱就医，活活病死，同时，我的工作也被停了。好不容易，托人求情，进了一家烟草厂，我满望生活会好一点，可是东山老虎要吃人，西山老虎同样要吃人，这个老板的剥削更厉害了，我经常一天做十几个小时，还是吃不饱，穿不暖。逢到淡季，老板不发工资，我家只能背债度日。逢时过节还要给工头送礼孝敬，我做牛做马，一年忙到头，连一件过冬棉衣也没有着落。我们劳动人民恨透了这个吃人的剥削制度，现在党内最大的走资本主义道路当权派梦想走“一人富，万人苦”的资本主义道路，我们坚决不答应!"},{"type":"paragraph","text":"天下乌鸦一般黑。中国老板靠剥削起家，外国资本家也是剥削成性。新码头街里委会积极分子谢孝旌说:十八岁那年，我到太古轮船当服务员。外国资本家欺我年轻无知，规定只有吃饭，不给工资，一不如意，还拳打脚踢。这样在苦难中过了一年才给我定了薪，名义上似乎给我十元钱一个月，经过中外领班、管事的层层剥削，拿到手还不到五元钱，剥削得我们透不过气来。可是党内头号的走资本主义道路当权派却说“剥削无罪”，这明明是替剥削阶级说话，充分暴露了这个党内最大的走资本主义道路当权派的丑恶嘴脸。"},{"type":"paragraph","text":"老新街里委会等里弄干部和退休工人，怀着无比愤怒的心情，痛斥反革命修正主义总后台大肆鼓吹“剥削无罪”、“造反无理”的谰言。他们说:资本家饱食终日，养得白白胖胖，吃的用的都是我们劳动人民的血汗，可是自称为“老革命”的党内头号走资本主义道路当权派，却抹煞事实，颠倒黑白。对于这种彻头彻尾站在资产阶级立场上的反革命修正主义分子，我们一定要把他揪出来，彻底打倒!"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"85dbe4abb3"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
