thors":[],"dates":[{"year":1950,"month":5,"day":6}],"is_range_date":false,"parts":[{"text":"林彪为特殊费开支的规定由","type":"title"},{"text":"关于过往客人及其他特殊费用的解决问题，兹按中央令下：","type":"paragraph"},{"text":"一、凡属于党政军等各机关单位或人员往返各地者，其费用概由其原机关负责人支领报销，当地机关，不负招待之责。","type":"paragraph"},{"text":"二、凡来分配工作、或应分配工作尚未到职的民主人士与技术人员，以及其他各种人员，如中央或中央某部邀其晋京或指定到某地做其他工作者，其膳宿旅费等，则由邀请的机关负责。如系中央指定的，即由中央人民政府政务院规定开支数目，并向中财委报销。恐遇有特殊情形，如外国朋友或被难人员等来至该地，须有特别开销时，可酌情经各该当地政府首长批准先行使用后，再向中央财政部报销。","type":"paragraph"},{"text":"以上仰即遵行，并转饬所属知照为要！","type":"paragraph"},{"text":"此令，林彪","type":"paragraph"}],"comments":[],"origin":"《林彪元帅文集》（下册），香港凤凰书品， 2016年。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"林彪","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b85f08958d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
