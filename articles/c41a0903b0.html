script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"雷曼在德国统一社会党代表大会上说  德共中央坚决反对修正主义  民主德国的成就是对德共在西德斗争的有效援助","authors":[],"dates":[{"year":1958,"month":7,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"雷曼在德国统一社会党代表大会上说"},{"type":"paragraph","text":"德共中央坚决反对修正主义"},{"type":"paragraph","text":"民主德国的成就是对德共在西德斗争的有效援助"},{"type":"paragraph","text":"新华社柏林11日电　德国共产党中央第一书记雷曼今天晚上在德国统一社会党第五次代表大会上说，克服右倾机会主义对于德国共产党来说，是一个决定性的问题。德共中央坚决反对修正主义的见解。"},{"type":"paragraph","text":"雷曼说，驳斥帝国主义者所宣扬的所谓国家已经日益成为阶级对立的调解者的这种骗人的说法是必要的。此外，还有必要用最尖锐的方式来反驳那种企图贬低党的作用和否认苏联共产党的领导地位的见解。他说，“西德反原子武装和争取民主的斗争迫切要求我们在西德劳动人民面前澄清这些问题。”"},{"type":"paragraph","text":"雷曼接着说，西德的进步人士把德国统一社会党看成是在马克思列宁主义立场上实行工人阶级统一的党，把它的政策看作是全德工人阶级和劳动人民的指南针。“德意志民主共和国在提高生产、巩固国家和实现社会主义方面的每一项成就都是对德国共产党在西德进行斗争的有效援助。”"},{"type":"paragraph","text":"雷曼指出，西德反对原子武装的群众运动充分表现了侵略势力和复仇主义政客们同人民群众的深刻矛盾。以工人阶级为首的广大人民坚决反对进行原子武装和建立导弹基地。"},{"type":"paragraph","text":"雷曼说，德国共产党始终努力寻求同社会民主党人建立合作，以便加强工人阶级的行动统一。他号召社会民主党人同西德全体劳动人民一道反对波恩政府疯狂的复仇计划。"},{"type":"paragraph","text":"雷曼最后激昂地高呼：要求取消对德共的禁令，要求让德共自由活动，要求让所有爱好和平的公民、所有民主党派和组织都有自由活动的权利。雷曼的致词不断被响亮的掌声所打断。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c41a0903b0"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
