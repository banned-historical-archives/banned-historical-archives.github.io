art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"空军政治工作会议着重检查右倾保守思想","authors":[],"parts":[{"type":"paragraph","text":"本报讯 最近空军召开的政治工作会议根据党中央和毛主席关于反对右倾保守主义思想的指示，着重检查了空军政治工作落后于实际的状况。"},{"type":"paragraph","text":"会议认为，几年来空军政治工作是有成绩的，并且有很大进步，但是，这些进步远远赶不上空军发展的需要。政治工作的现状还落后于实际，主要表现在：思想领导薄弱，赶不上空军思想建设的需要；官兵中生长着的新的道德品质，没有得到大力的培养和扶植；对不良思想倾向迁就姑息，没有展开坚决的斗争；日常的政治教育工作很薄弱，飞行训练中的政治工作也赶不上训练的发展。其主要原因是政治工作中存在着右倾保守主义思想。到会同志以批评和自我批评的精神检讨了右倾保守主义思想给空军政治工作带来的危害，一致认为：政治工作落后于实际的状况再不能继续下去了，必须敲起警钟，根据党中央和毛主席的指示，反对右倾保守主义思想，彻底改变这种状况。会议从思想认识和工作方法两个方面讨论了如何克服右倾保守主义思想的问题。"},{"type":"paragraph","text":"会议上布置了1956年空军政治工作的7项任务和4项基本措施。会议期间，总政治部副主任甘泗淇上将，空军司令员刘亚楼上将曾到会作了重要指示。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"22eafa3122"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
