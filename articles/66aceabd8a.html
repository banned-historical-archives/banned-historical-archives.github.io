主持告别仪式，郭沫若同志致悼词，李先念同志等参加","authors":[],"dates":[{"year":1971,"month":6,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京十九日电　政协全国委员会副主席谢觉哉同志，因病医治无效，于一九七一年六月十五日在北京逝世，终年八十八岁。"},{"type":"paragraph","text":"谢觉哉同志于一九二五年加入中国共产党，开始从事党的宣传教育工作。一九三四年参加了伟大领袖毛主席率领中国工农红军进行的二万五千里长征。"},{"type":"paragraph","text":"谢觉哉同志历任过中央苏维埃政府秘书长、内务部长、司法部长、中央党校副校长、陕甘宁边区政府秘书长、陕甘宁边区参议会副参议长、华北人民政府司法部长等职；新中国成立以后，历任内务部长、最高人民法院院长、中国人民政治协商会议第四届全国委员会副主席。在党的第八次全国代表大会上当选为候补中央委员。"},{"type":"paragraph","text":"谢觉哉同志，是中国人民忠诚的革命老战士，是中国共产党的优秀党员。他忠于党，忠于毛主席，为中国人民的伟大革命事业作出了贡献。他的一生是光荣的一生，革命的一生。"},{"type":"paragraph","text":"中共中央政治局委员、中华人民共和国副主席董必武，今天上午前往医院向谢觉哉同志的遗体告别。"},{"type":"paragraph","text":"今天下午，在八宝山革命烈士公墓举行了告别仪式，悼念谢觉哉同志的逝世。"},{"type":"paragraph","text":"告别仪式由中共中央政治局委员、政协全国委员会副主席叶剑英主持。中共中央委员、人大常委会副委员长、政协全国委员会常务委员郭沫若致悼词。"},{"type":"paragraph","text":"中共中央政治局委员、国务院副总理李先念，中共中央委员张鼎丞、曾山，参加了告别仪式。"},{"type":"paragraph","text":"参加告别仪式的还有:"},{"type":"paragraph","text":"政协全国委员会副主席邓子恢、傅作义；"},{"type":"paragraph","text":"最高人民法院副院长吴德峰；"},{"type":"paragraph","text":"政协全国委员会常务委员邓初民、史良、刘斐、朱蕴山、张奚若、陈此生、季方、周培源；"},{"type":"paragraph","text":"中共中央机关、国务院有关部门和政协全国委员会机关的负责人。"},{"type":"paragraph","text":"谢觉哉同志的生前友好和家属，也参加了告别仪式。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"李先念","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"66aceabd8a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
