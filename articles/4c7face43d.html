{"year":1987,"month":12,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"湖南举办毛泽东著作版本展览"},{"type":"paragraph","text":"新华社长沙12月26日电  （记者刘春贤）今天在长沙开幕的毛泽东著作版本展览会上，第一次向读者展出了毛泽东早年主编湖南学生联合会的全部会报《湘江评论》。"},{"type":"paragraph","text":"《湘江评论》创刊于1919年7月，共出版5期和1期临时增刊。这些刊物至今保存完好。"},{"type":"paragraph","text":"这个展览是湖南图书馆和韶山毛泽东同志纪念馆联合主办的。他们将多年收集珍藏的毛主席的论著、文稿、电报、书信、诗词、手迹等，按历史年代顺序展出；其中汉文本680种，少数民族文本196种，外文本2008种，共计8800多册。同时展出的还有最早发表毛主席一些重要论著的刊物。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"湖南文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4c7face43d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
