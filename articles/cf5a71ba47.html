织有关部门进行救灾工作，同时派出慰问团前往灾区慰问　灾区各族人民在批林批孔运动推动下，满怀信心战胜灾害，重建家园","authors":[],"dates":[{"year":1974,"month":5,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京一九七四年五月十二日电　我国云南省昭通地区和与其邻接的四川省凉山彝族自治州境内，五月十一日三时二十五分发生强烈地震，十二日还有余震。"},{"type":"paragraph","text":"据我国地震台网测定，这次地震为七点一级，震中地区在北纬二十八点二度，东经一百零四度。震后房屋、人、畜遭到不同程度的损失。"},{"type":"paragraph","text":"伟大领袖毛主席和党中央、国务院对灾区各族人民十分关怀，迅速组织有关部门进行救灾工作；同时，派出由商业部部长范子瑜任团长的慰问团前往灾区慰问。中共四川省委和云南省委已采取紧急措施，分别组织省级有关部门和凉山彝族自治州、昭通地区做好防震救灾工作，并分别派人民解放军和医疗队赶到现场，进行防震救灾工作。国家地震局和昆明、成都等地地震专业人员同时赶赴现场，监视震情。"},{"type":"paragraph","text":"地震地区各族人民群众，在毛主席、党中央的关怀下，在批林批孔运动的推动下，满怀信心战胜地震灾害。他们决心自力更生，奋发图强，发展生产，重建家园。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"四川文革","type":"人物"},{"name":"云南文革","type":"人物"},{"name":"批林批孔","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cf5a71ba47"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
