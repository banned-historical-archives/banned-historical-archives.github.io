" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji31","name":"毛泽东全集第31卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji31.pdf"],"article":{"title":"对中共济南市委报告的批示","alias":"","parts":[{"type":"paragraph","text":"对中共济南市委报告的批示川"},{"type":"paragraph","text":"（1952年1月6日）各中央局，并转分局、省市区党委："},{"type":"paragraph","text":"济南市委这个报告很好，请转发各大城市参考，并在党刊上发表。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一月六日"},{"type":"paragraph","text":"[1]这是毛泽东对中共济南市委关于开展三反运动部署的报告的批语。该报告的主要特点，一是内容全面充实，既扼要列举了各行各业暴露出的贪污浪费官僚主义现象，说明开展“三反”运动之有的放矢，又明确提出了从机关到企业到警备部队方方面面开展运动的部署要求；二是提出运动的重点是清剿贪污分子特别是大贪污犯，抓住了运动的要害；三是开展运动的决心大，方法对，要求各级领导亲自动手，放手发动群众，务求达到目的，不获全胜决不收兵。"}],"authors":["毛泽东"],"dates":[{"year":1952,"month":1,"day":6}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":245,"page_end":245},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4ec0b8cf71"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
