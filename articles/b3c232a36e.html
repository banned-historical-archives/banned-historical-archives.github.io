script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"“四人帮”是“假革命的反革命”","authors":[],"dates":[{"year":1976,"month":10,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"“四人帮”是“假革命的反革命”"},{"type":"paragraph","text":"中共南京无线电厂委员会"},{"type":"paragraph","text":"喜庆的锣鼓震天响，报捷的鞭炮冲九霄。我们南京无线电厂全体党员和职工群众，热烈庆祝华国锋同志任中共中央主席、中央军委主席，热烈欢呼粉碎王洪文、张春桥、江青、姚文元反党集团篡党夺权阴谋的伟大胜利！"},{"type":"paragraph","text":"华国锋同志任党中央主席、中央军委主席，这是伟大领袖和导师毛主席生前的英明决策，这是全党全军全国各族人民的共同心愿。从此，我们党又有了自己的领袖，我们的无产阶级革命事业又有了可靠的掌舵人！以华国锋主席为首的党中央，继承毛主席遗志，代表工人阶级和全国人民的根本利益和共同愿望，采取果断措施，一举粉碎王张江姚反党“四人帮”，这是无产阶级反击资产阶级进攻的具有决定意义的胜利！这充分表明，以华国锋主席为首的党中央和人民群众心连心。我们对以华国锋主席为首的党中央衷心爱戴，坚决拥护！"},{"type":"paragraph","text":"伟大领袖毛主席深刻分析了社会主义时期阶级关系的变化和阶级斗争的特点，指出：“搞社会主义革命，不知道资产阶级在哪里，就在共产党内，党内走资本主义道路的当权派。走资派还在走。”王张江姚“四人帮”，就是党内资产阶级的典型代表，就是不肯改悔的正在走的走资派。他们背叛马克思主义、列宁主义、毛泽东思想，篡改毛主席的指示，反对“三要三不要”的基本原则，搞修正主义，搞分裂，搞阴谋诡计，篡党夺权，犯下了滔天罪行。他们是“借革命以营私”的假马克思主义骗子，是玩弄阴谋诡计的巧伪人。这是一群披着羊皮的豺狼，是我们工人阶级最凶恶的敌人。"},{"type":"paragraph","text":"列宁指出：“马克思主义在理论上的胜利，逼得它的敌人装扮成马克思主义者”。（《马克思学说的历史命运》，《列宁全集》18卷583页）在马克思主义、列宁主义、毛泽东思想深入人心，无产阶级专政空前巩固的今天，党内资产阶级头面人物向无产阶级进攻的惯用手法，就是打着红旗反红旗。“四人帮”正是这样。他们打着马克思主义旗号，搞修正主义。他们恬不知耻，摇唇鼓舌，欺世盗名，自吹是什么“正确路线的代表”。实际上，他们是用反革命两面派的手法来掩盖他们背叛马克思主义的真面目。但是，骗人是不能持久的。他们自己的种种倒行逆施，暴露了他们“假革命的反革命”的丑恶嘴脸。以华国锋主席为首的党中央，以无产阶级的雄伟气魄，为人民除了四害，真是大快人心，大振人心，大得人心。"},{"type":"paragraph","text":"我们工厂是伟大领袖毛主席在一九五六年一月十一日亲自视察过的工厂。毛主席的亲切关怀和谆谆教导，永远激励着我们沿着毛主席的革命路线前进。今年，我们全厂广大干部、群众遵照毛主席、党中央的战略部署，深入批邓，反击右倾翻案风，发展了全厂革命和生产的大好形势，一至九月份超额完成国家计划，工业总产值比去年同期增长百分之五。在当前这场关系到党和国家命运的重大斗争中，我们决心最紧密地团结在以华国锋主席为首的党中央周围，迅速掀起学习马列著作和毛主席著作的新高潮，以马克思主义、列宁主义、毛泽东思想为锐利武器，彻底揭露和批判“四人帮”反党篡权的滔天罪行，巩固和发展无产阶级文化大革命的胜利成果。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"华国锋","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"四人帮","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b3c232a36e"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
