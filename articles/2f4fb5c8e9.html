art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"保卫国防，保卫文化大革命","authors":[],"parts":[{"type":"paragraph","text":"在我国无产阶级革命派高举革命的大批判的旗帜，向党内最大的一小撮走资本主义道路当权派发起猛烈进攻的时候，从祖国南方前哨，传来了振奋人心的捷报。日日夜夜守卫着祖国领空的我英雄的空军部队，昨天在广西某地上空，一举全歼入侵的美国A—6型攻击机两架，并活捉美国飞贼一名。这是我国无产阶级文化大革命的又一伟大胜利，这是以毛主席为代表的无产阶级革命路线的又一伟大胜利，这是光焰无际的、战无不胜的毛泽东思想的又一伟大胜利！我们热烈祝贺英雄的空军部队的这一新胜利，向参战有功的战友们致以崇高的无产阶级文化大革命的敬礼！"},{"type":"paragraph","text":"空军部队的这一新胜利，再次证明伟大的毛泽东思想是我军一切胜利的源泉。空军部队广大指战员，高举毛泽东思想的伟大红旗，坚持活学活用毛主席著作，大力突出无产阶级政治。无产阶级文化大革命以来，他们坚决站在毛主席的革命路线一边，向党内最大的一小撮走资本主义道路当权派猛烈开火。正是由于他们在头脑里树立了毛泽东思想的绝对权威，坚决照毛主席的指示办事，就使他们在战斗中所向披靡，无往不胜。"},{"type":"paragraph","text":"空军部队的这一新胜利，再次证明，伟大领袖毛主席亲自缔造和领导的、林彪副主席直接指挥的中国人民解放军，不愧为无限忠于毛主席，无限忠于毛泽东思想，无限忠于毛主席革命路线的英雄的军队，不愧为我们伟大祖国的国防和无产阶级文化大革命的忠诚保卫者！"},{"type":"paragraph","text":"中国人民的死敌美帝国主义，在苏修叛徒集团的支持下，不断派飞机、军舰侵犯我国领空、领海。对于帝国主义强盗的武装挑衅，我们根据毛主席的教导，向来是“有来犯者，只要好打，我党必定站在自卫立场上坚决彻底干净全部消灭之……”。今年以来，我空军部队和海军航空兵部队，已经先后击落了入侵的美机七架。美国侵略者每次吃了败仗，约翰逊总是羞羞答答，矢口否认。这一次，我空军部队不仅把约翰逊派来的两架美机全部报销，而且活捉美国飞贼一名。人赃俱在，看约翰逊还怎样抵赖！"},{"type":"paragraph","text":"用毛泽东思想武装起来的中国人民，有着同美帝国主义打交道的丰富经验，早就看透了美帝国主义的侵略和战争本性。对于他们的任何挑衅，我们早已作好了准备。我们一定按照毛主席“对敌人要狠，要压倒它，要消灭它”的教导，随时准备给侵略者以双倍的打击，为保卫祖国，保卫文化大革命，为世界革命事业，作出新的贡献！"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"革命大批判","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2f4fb5c8e9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
