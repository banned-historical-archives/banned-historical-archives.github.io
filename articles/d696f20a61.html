" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"林彪在八届十一中全会闭幕式上的讲话","authors":["林彪"],"dates":[{"year":1966,"month":8,"day":12}],"is_range_date":false,"parts":[{"text":"在八届十一中全会闭幕式上的讲话","type":"title"},{"text":"林彪","type":"authors"},{"text":"中国共产党第八届中央委员会第十一次全体会议已经胜利地结束了。这一次会议，从头到尾都是主席亲自领导的。今天，主席又在会议上对我们作了极为宝贵的指示。这次会议解决了重大的问题。在这次规模伟大的文化革命进行过程中间，发生了严重的路线错误，几乎扼杀了这一个革命，使之停顿下来，中断下来，倒退下来。在这种危险的时候，主席出来扭转了这种局势，使这次文化革命能够重整旗鼓，继续进攻，打垮一切牛鬼蛇神，破“四旧”，立“四新”，使我们的社会主义建设，除了物质的发展外，精神上、思想上得到健康的发展。今天又把组织机构解决了，保证了我们今后工作能够更加落实。","type":"paragraph"},{"text":"现在如果是没有别的问题，就宣布散会。（鼓掌）","type":"paragraph"},{"text":"刊载于《高举毛泽东思想伟大红旗》（林彪文集），1967年4月编印，编印者不明。","type":"paragraph"}],"comments":[],"origin":"刊载于《高举毛泽东思想伟大红旗》（林彪文集），1967年4月编印，编印者不明。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"林彪","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d696f20a61"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
