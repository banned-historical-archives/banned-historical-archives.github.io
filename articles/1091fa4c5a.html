script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"无敌的力量","authors":["骆飞"],"dates":[{"year":1976,"month":8,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"无敌的力量"},{"type":"paragraph","text":"骆飞"},{"type":"paragraph","text":"从唐山、丰南一带传来的一则则军民团结抗震救灾的英雄事迹是何等地激动人心，又是多么地发人深思啊！看，最近报纸报道：开滦马家沟矿三号井开始出煤，唐钢炼出了抗震志气钢，唐山电厂开始供电，厂矿的机器发出悦耳的响声，公共汽车正在街道上行驶，有的商店开始营业，“抗震”学校开了学……。所有这些，雄辩地向全世界显示了中国人民的无敌力量。"},{"type":"paragraph","text":"力量这个词，不同的阶级有不同的解释、用不同的公式来计算。唯利是图的资本家认为有了金钱就有了压倒一切的“力量”。在美帝、苏修这样两个超级大国看来，武器越多，争夺的地盘越大，“力量”也就越强……。与一切反动派相反，我们则认为，真正的力量是用马克思主义、列宁主义、毛泽东思想武装起来的真心实意拥护革命的人民群众，“这是真正的铜墙铁壁，什么力量也打不破的，完全打不破的”。多少年来，我们就是靠着这种力量，打败了日本帝国主义，消灭了蒋家王朝，创建了新中国；我们就是靠着这种力量，斗垮了刘少奇、林彪、邓小平这一个个党内资产阶级的挂帅人物，巩固了无产阶级专政；同样，我们也是靠这种力量，在强烈的地震灾害面前打了胜仗。事实证明，这种力量，是其它任何力量所无法相比的，是真正无敌的！"},{"type":"paragraph","text":"党内最大的不肯改悔的走资派邓小平，从反动的唯心史观出发，根本不相信人民的力量，把群众视为“阿斗”、“群氓”，认为“依靠工农兵是相对的”，唯有他才是救世主。邓小平的相对依靠论，暴露了他反对依靠工农兵的资产阶级立场。他要依靠的是哪些人呢？是不肯改悔的走资派、“隐士”、“逸民”和其他社会渣滓。他重新工作不久，正是网罗了这些人，大刮翻案复辟的十二级台风，妄图“一拳头打出去”，在中国复辟资本主义。但是，翻案不得人心，在强大的人民力量面前，他很快就倒了台。他的喽罗在天安门广场闹事时，甚至狂妄叫嚣他们的力量“谁镇得了？”“来一个军也不顶用”……可是人民群众一挥铁拳，他们便顷刻瓦解。"},{"type":"paragraph","text":"人民的力量是无敌的，因为它是一种革命的力量，代表历史发展的方向。经过无产阶级文化大革命、批林批孔和批邓、反击右倾翻案风斗争锻炼的中国人民，用马克思主义、列宁主义、毛泽东思想武装起来的中国人民，有毛主席和党中央的英明领导，有毛主席的无产阶级革命路线指引，就无坚不摧，无往不胜。唐山地区抗震救灾的巨大胜利，不就是生动的证明吗？难道还有什么力量能够阻挡中国人民前进的步伐吗？"},{"type":"paragraph","text":"让一切反动派在我们强大的人民力量面前发抖吧！"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"批林批孔","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1091fa4c5a"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
