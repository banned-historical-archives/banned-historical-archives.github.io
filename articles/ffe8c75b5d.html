art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"热烈欢迎老挝党政代表团姚文元、吴德等同志陪同凯山、西巴色等同志观看演出","authors":[],"parts":[{"type":"paragraph","text":"新华社一九七六年三月十六日讯 中联部、外交部今天晚上举行文艺晚会，热烈欢迎以凯山·丰威汉同志为团长、奔·西巴色同志为副团长的老挝党政代表团。"},{"type":"paragraph","text":"中共中央政治局委员姚文元，中共中央政治局委员、人大常委会副委员长吴德，中联部长耿飚，外交部长乔冠华，文化部长于会泳，中联部副部长申健，中国驻老挝大使国鹰等，陪同老挝战友观看演出。"},{"type":"paragraph","text":"老挝驻中国大使塔汶·西扎伦、大使馆外交官员，以及在北京的其他老挝朋友，也应邀出席了文艺晚会。"},{"type":"paragraph","text":"晚会上，中国歌舞团的文艺工作者演出了反映我国社会主义革命和社会主义建设、具有民族特色的音乐、舞蹈节目。他们还怀着对老挝人民的友好情谊，演唱了歌颂老挝人民新生革命政权的老挝歌曲《新老挝万岁》。演出受到热烈鼓掌欢迎。"},{"type":"paragraph","text":"演出结束后，凯山·丰威汉、奔·西巴色同志由姚文元、吴德同志陪同走上舞台，同演员们一一握手，并向演员们赠送了花篮。（附照片）"},{"type":"paragraph","text":"中联部、外交部三月十六日举行文艺晚会，热烈欢迎以凯山·丰威汉同志为团长、奔·西巴色同志为副团长的老挝党政代表团。演出结束后，凯山·丰威汉同志、奔·西巴色同志等由姚文元、吴德同志等陪同，走上舞台同演员合影。"},{"type":"paragraph","text":"新华社记者摄（照片）"}],"alias":""},"tags":[{"name":"姚文元","type":"人物"},{"name":"吴德","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ffe8c75b5d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
