<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"天津高级知识分子对匈牙利事件认识模糊","authors":["李正杰"],"dates":[{"year":1956,"month":11,"day":5}],"is_range_date":false,"parts":[{"text":"天津高级知识分子对匈牙利事件认识模糊","type":"title"},{"text":"李正杰","type":"authors"},{"text":"新华社天津５日讯　报纸上公布了匈牙利事件以后，在天津一些高等学校的教师中引起了思想混乱。","type":"paragraph"},{"text":"南开大学、天津师范学院等高等学校的许多教师认为匈牙利的问题很复杂、很糟糕。南开大学数学系刘晋年、经济系讲师王瑞惠和天津师范学院中文系教授雷石榆等人都认为苏联出兵镇压叛乱是个很大的错误。王瑞惠说：华沙条约主要是针对帝国主义，而匈牙利发生叛乱是内部问题，苏联出兵扩大了流血事件，因此引起匈牙利走向了“中立”。天津师范学院物理系主任张崇年教授还认为匈牙利事件苏联要负全部责任。他说：解放后匈牙利曾向苏联赔款四十多万美元。再加上苏联驻军在匈牙利，这个小国当然受不了。许多教师还认为匈牙利和波兰的问题与苏共二十次代表大会有关，反个人崇拜反得过火了，拉科西反掉了，使刚从监狱出来的纳吉上台简直是乱搞。很多人都对拉科西表示同情，认为他应该重新出来领导匈牙利。但有人认为匈牙利要求苏联军队开进布达佩斯是纳吉的阴谋，趁此进行叛变。","type":"paragraph"},{"text":"有些教师说：匈牙利劳动人民党的领导人大多数都是在苏联学习回来的，不是土生土长的领导者，不了解国内情况，只是教条主义的一套。南开大学数学系主任曾鼎龢教授把匈、波两国党的领导人比做中国革命初期的王明、博古，说他们两人从苏联学习回来领导革命也是总犯错误。天津师范学院生物系主任林子明教授说匈波事件弄得他很糊涂，不知谁是革命，谁是反革命，他举例说，报纸一会说纳吉受委屈了，把他从监狱放了出来而且立即当了部长会议主席，不一会又说他是叛徒。有点使人无所适从。","type":"paragraph"},{"text":"南开大学生物系主任萧采瑜教授等人认为匈牙利可能受了南斯拉夫的影响。并认为西方国家都有一套资产阶级的民主，缺乏民主了自然会引起人民的不满。","type":"paragraph"},{"text":"不少的教师还怀疑目前的局势会不会引起第三次世界大战？不了解东欧人民民主国家为什么一直不表示态度？天津师范学院中文系讲师高玉爽公开表示有点害怕。","type":"paragraph"},{"text":"更多的教师认为中国共产党老练，有远见，并引以自豪。有人说匈、波两国应该向我们学习学习。天津师范学院政教系唐文播说：中国共产党的思想工作作得好，中国人民生活水平并不高，但人民并没有因此而引起不满。","type":"paragraph"},{"text":"来源：１９５６年１１月５日新华社《内部参考》。","type":"paragraph"}],"comments":[],"origin":"美国图书馆收藏","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5795973053"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
