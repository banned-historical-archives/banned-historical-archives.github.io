代","authors":["天津日报"],"dates":[{"year":1957,"month":9,"day":7}],"is_range_date":false,"parts":[{"text":"人民代表追击何迟右派小集团　华粹深软磨硬顶不老实交代","type":"title"},{"text":"天津日报","type":"authors"},{"text":"【本报讯】前天下午，人代会第四代表组斗争的矛头指向了何迟的右派小集团。小集团的成员华粹深(列席)态度极不老实，尾随何迟软磨硬顶，被代表们质问的闭口无言。","type":"paragraph"},{"text":"何迟做了两次空洞的交代。他说，他和华粹深、吴同宾等人在一九五三年底组成了小集团，并且有“阴谋活动”。但是，他又说他们只是在“文艺思想上反党”和对“某某领导同志不满”，避而不谈他们所进行的反党活动事实。于是代表们制止了他的“交代”。华粹深在交代时完全效法何迟，并拐弯抹角地说他们对领导不满是因为领导上“不重视戏曲”。并说他自己“思想上对党没有不满。”","type":"paragraph"},{"text":"列席人士、作协天津分会秘书长张学新当场列举事实驳倒了华粹深的谎言。他说，几年以来，尤其是在大鸣大放时期天津市文艺界的许多党员都受到了华粹深的辱骂，华粹深在许多会上无中生有的攻击这些党员，说他们是“有特权的人”、“文艺界的坏分子”、“根本不能做戏曲工作”，说中央和天津市委领导人不懂戏曲、不重视戏曲。在他给何迟的密信中肆意辱骂南开大学领导。难道说这不叫对党不满吗？党不是抽象的，华粹深几乎反对所有和他有关系的党员和党组织，这还不叫做反党吗？接着张学新对这个小集团的阴谋活动进行了揭露。他说，这个小集团从组成那一天起，就企图霸占天津戏曲界，处处反对党的文艺方针，打击戏剧改革，垄断剧目、榨取上演税。例如评剧“刘胡兰”、梆子“柳荫记”等新戏都受到了这个小集团的有组织、有计划的打击。何迟背着党偷偷地组织全国性的马戏院时，华粹深也积极参与了活动，何迟并封了他的官——马戏院训练部主任，将来做马戏学校校长。在大鸣大放期间，何迟、华粹深一起出动，挑拨曲艺艺人反对党和政府。华粹深到处煽惑说天津日报召开文艺界人士座谈会时，不请戏曲艺人参加，是瞧不起戏曲(其实天津日报专门召开过一次戏曲艺人座谈会)，同时还给“新港”写文章恶意地质问：“曲艺是不是艺术，演员算不算文艺界？”在何迟发动赵佩茹等去市委请愿的同时，华粹深发动小彩舞等去找来津视察的全国人民代表大会代表，申诉所谓“天津市不重视曲艺的情况”。难道这不是小集团的有计划、有组织的活动吗？","type":"paragraph"},{"text":"李文芳、韩俊卿、新翠霞、王庆林等代表还质问华粹深：“你给梆子剧团右派分子王庾生写信说‘何迟是龙头，我们是龙尾’是什么意思？你们小集团中互相通信时，信封后面写上‘付之一炬’，是为什么？”","type":"paragraph"},{"text":"对这些问题，华粹深不是推托就是避而不答，后来他说：“我实在记不得了。”","type":"paragraph"},{"text":"最后，代表们责令他在下次会上一定要老实交代，不要自绝于人民。","type":"paragraph"},{"text":" 来源：《天津日报》1957年9月9日。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e4fa2911e5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
