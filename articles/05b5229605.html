<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"大搞土法，迅速出铜","authors":["《云南日报》短论"],"dates":[{"year":1958,"month":8,"day":10}],"is_range_date":false,"parts":[{"text":"大搞土法，迅速出铜","type":"title"},{"text":"《云南日报》短论","type":"authors"},{"text":"省委召开的炼铜会议，确定我省今年产铜一万至一万五千吨，明年产铜六万吨到十万吨。这个规划揭开了我省炼铜工业新的一页。","type":"paragraph"},{"text":"现在，全省各地都已经积极着手发展炼铜工业，到7月底，各地已建炼铜土炉五百七十三座，产铜二百一十九吨，这个成绩是很显著的。但是，也应该看到，目前炼铜工业的发展距离计划的要求还很远。因此，各地还需要抓紧时机，尽快地组织炼铜工业上马，不然今年铜的跃进计划就有落空的危险。","type":"paragraph"},{"text":"在发展炼铜工业上，需要自力更生，克服单纯依赖设备条件的思想，要依靠群众的力量，从土法开步走，在有铜矿资源的地方都应迅速把炼铜工业抓起来。这不仅是在当前设备不足的情况下所必须采取的措施，也是高速度发展炼铜工业的正确道路。利用土法炼铜，平均二人到三人每年可产铜一吨，全省组织十万人用土法炼铜，加上大工业争取提前生产，明年即可生产粗铜六万至十万吨。所以，立即采用土法炼铜，抽调必要的劳动力投入铜的采掘和冶炼，是保证今明年铜的生产计划得以实现的主要措施。但是到了月底，各地投入炼铜的劳动力只有两万多人，如果在8月分炼铜的劳动力还不能大部分上阵，那么今年的生产计划就有落空的危险。所以，各地必须坚决迅速地在8月底以前把必要的劳动力抽调出来投入铜的建炉和生产。","type":"paragraph"},{"text":"由于铜的采、选、炼都比较复杂，技术问题能否解决，是生产能否跃进的关键，也是当前普遍遇到的主要困难。正因为如此，我们就应该从技术较为简单的土炉着手。特别是我省有悠久的炼铜历史，在群众中有许多具有炼铜经验的人，只要采取积极坚决的态度就能把他们集中起来组织到铜的生产上去，同时通过组织现场学习、训练，边学边炼，以厂带厂等办法，技术力量不足的困难就可以得到解决，从而迅速炼出铜来以满足建设需要。","type":"paragraph"},{"text":"省管以上的矿山企业，担负着相当大的铜的生产任务，一方面必须动员广大职工群众克服困难，尽力加快基本建设速度，力争提前投入生产；一方面又要抓土法炼铜，提倡在企业内部大建卫星厂矿，大、中、小一盘棋，千方百计早出铜、多出铜。另外，一切有条件的部门，如学校、商业、部队和地质部门等，都可以搞铜，这样就能在全省范围内形成一个全民办炼铜工业的热潮。","type":"appellation"},{"text":"（原载1958年8月10日云南日报）","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"05b5229605"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
