ear":1960,"month":8,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席的每一句话，每一个行动，都鼓舞着少年儿童。"},{"type":"paragraph","text":"江苏路第五小学六年级的少先队员秦璞过去看到算术就头疼，当他读了“跟随毛主席长征”这本故事书后，受到很大的启发。他激动地说:“毛主席的故事书使我懂得了许多真理，我们今天是为祖国学习，为共产主义事业学习。我们一定要学习毛主席坚定彻底的革命精神，勇往直前，不怕任何困难。”"},{"type":"paragraph","text":"卢湾区第三中心小学小朋友余亮坤读了“在毛主席教导下”这本书后，毛主席对人民的高度热爱和关怀。时刻关心同志的精神，使他深深感动，大考时，有些同学功课跟不上，余亮坤就主动把这些同学组织起来，帮助他们温习，使他们的功课有了进步。"},{"type":"paragraph","text":"3日，中国福利会少年宫举行了一个读书辅导会，小朋友们表示:一定要时刻记住毛主席的话，读毛主席的故事书，做毛主席的好孩子。(中国福利会少年宫稿)"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fbbf00a008"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
