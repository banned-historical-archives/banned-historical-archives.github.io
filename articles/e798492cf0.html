" crossorigin="">{"props":{"pageProps":{"books":[{"id":"dfdd6b56-5f4e-42e1-af94-ae2ab38cc0b4","name":"毛泽东思想万岁（1913-1943卷）（1968年武汉版）","internal":true,"official":false,"type":"pdf","author":"1968年武汉","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives3/main/dfdd6b56-5f4e-42e1-af94-ae2ab38cc0b4.pdf"],"article":{"title":"给杨怀中先生的信（摘录）","alias":"","parts":[{"type":"paragraph","text":"新民学会一次讨记载提出无产阶级革命和无产阶级专政的主张"},{"type":"paragraph","text":"（一九二一年一月）《达到目的须采用什么方法？》"},{"type":"paragraph","text":"首由毛润之报告巴黎方面蔡和森君的提羲。，并云：世界解决社会问题的方法大概有下列几种："},{"type":"paragraph","text":"1.社会政策2.社会民主主义3.激烈方法的共产主义（列宁的主义）4.温和方法的共产主义（罗素的主义）5.无政府主义"},{"type":"paragraph","text":"我们可以拿来参考以决定自已的方法。何叔衡：主张过激主义，一次的扰乱，抵得二十年的教育，我深信这些。毛润之：我的意见与何君大体相同。社会政策，是补直漏的政策，不成办法。社会民主主"},{"type":"paragraph","text":"义，借会为改造工具，但事实上羲会的立法总是保护有产阶级的。无政府主义否款权力，这种主义，恐怕永世都做不到。温和方法的共产主义，如罗素所主张的极端的自由，放任资本家，亦是永世做不到的。急烈方法的共产主义，即所劳农主义，用阶级专政的方法，是可以预计效果的。故最宜采用。"},{"type":"paragraph","text":"给杨怀中先生的信"},{"type":"paragraph","text":"（摘录）"},{"type":"paragraph","text":"…··怀中先生言，日本某君以东方思想均不切于实际生活，诚哉其言，吾意即西方思想亦未必尽是，几多之部分亦应与东方思想同时改造也。今人动教子弟宜立志，又日某君有志愚，此最不通志者。吾有见宇宙之眞理，照此以定，吾人之心之所之之谓也，今人所谓立志，如有志为军事家，有志为教育家，乃见前辈之行事，及近合施为羡其成功，育目以为已志。乃出于一种模仿性，眞能欲立志不能如是容易，必先研究哲学伦理学·以其所得眞理奉以为已身言动之准，立之为前途之。"},{"type":"paragraph","text":"再择其合于此之事，尽力为之，以为达到之方始谓之有志也，如此之志，方为眞志，而非育从之志，其始所谓立志只可谓之有求善之顷向或求眞求美之顷向，不过一种冲动耳，非眞正之志也，显然此志也容易立哉、十年未得眞理郎十年无志，身未得则身无志，此叉学，之所以贵乎幼也。·………·"}],"authors":["毛泽东"],"dates":[],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":67,"page_end":67},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e798492cf0"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
