art":5,"page_end":5,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"为传播毛泽东思想而斗争美国劳动人民坚决回击反动家伙无耻挑衅","authors":[],"parts":[{"type":"paragraph","text":"不久前的一天，几个美国进步劳工党党员象往常一样，来到纽约西区波多黎各劳动人民聚居区的街头，出售西班牙文版的《毛主席语录》。他们热情地向过路行人介绍这本全世界革命人民的宝书。许多群众为了寻求革命真理，纷纷购买。"},{"type":"paragraph","text":"这时，有两个反动家伙跑来寻衅。一个家伙一面破口大骂，一面从售书人手里抢走一本红书，并恶狠狠地扔在地上。一位过路的多米尼加工人对这个反动家伙的挑衅大为气愤，上前一步，掐住了这个家伙的脖子，教训他说：“你是什么东西！竟敢侮辱毛主席的书！马上把书拾起来！”第二个家伙见势不妙，拾起书就想逃跑。但是，有十几个工人挡住了他的去路，并且命令他立刻把书还回去。在工人们的愤怒斥责下，这两个家伙只得乖乖送还了书，并且灰溜溜地走开了。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7b0779ebb9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
