rt":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"《毛泽东评点二十四史》线装本出版发行","authors":["刘贵和〖HH/换行〗DW："],"parts":[{"type":"paragraph","text":"本报北京6月6日讯 刘贵和报道：经中共中央文献研究室、国家新闻出版署和中央档案馆批准，线装书局正式出版《毛泽东评点二十四史》线装本，首批200套已于近日印制完毕开始发行。"},{"type":"paragraph","text":"《毛泽东评点二十四史》线装本的出版发行，是我国建国以来规模最大的线装图书出版工程。这套书由中央档案馆组织专家进行整理、校勘，全部用毛泽东生前阅读并评点过的清乾隆武英殿本《二十四史》原件影印制版，按原书原貌分850册、80函，大16开型线装装帧，采用传统手工印制。全书最大限度展示了毛泽东阅读《二十四史》所作评注、圈点的原貌。有关专家认为，这套书生动反映了毛泽东同志对我国悠久历史的关注、思考，具有特别的文献、版本和学术价值。"},{"type":"paragraph","text":"据悉，《毛泽东评点二十四史》线装本将在国内外限量编号发行500套，后300套的印制发行很快将开始进行。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"29d0390f71"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
