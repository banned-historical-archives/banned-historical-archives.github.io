script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"邓小平会见舒尔茨谈国内情况时强调  中国只能走社会主义的道路  搞现代化要有稳定政治局面  反对资产阶级自由化不搞运动基本方法是进行教育","authors":["仓立德"],"dates":[{"year":1987,"month":3,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"邓小平会见舒尔茨谈国内情况时强调"},{"type":"paragraph","text":"中国只能走社会主义的道路  搞现代化要有稳定政治局面"},{"type":"paragraph","text":"反对资产阶级自由化不搞运动基本方法是进行教育"},{"type":"paragraph","text":"本报讯　记者仓立德报道：中国的既定政策会不会改变？反对资产阶级自由化会不会搞运动？中共中央顾问委员会主任邓小平在会见美国国务卿舒尔茨时对此作出了明确回答。"},{"type":"paragraph","text":"会见是3日上午在北京人民大会堂举行的。邓小平面色红润，和往常一样身着银灰色中山装，站在福建厅门口，微笑着同舒尔茨及其主要随行官员一一握手。"},{"type":"paragraph","text":"舒尔茨首先转达了里根总统对邓主任的问候，并转交了里根总统给邓主任的信件。他风趣地说：“总统说我干的事情不够多，所以让我兼任邮差，现在我的任务完成了。”"},{"type":"paragraph","text":"邓主任请舒尔茨回国后转达他对里根总统和夫人的良好祝愿。他笑着说，我知道总统先生遇到一点小麻烦。“一个国家的事情，搞政治，总会遇到一些麻烦。我们还不是也遇到一些麻烦吗？”我们相信阁下和在座的朋友对此也会采取理解的态度。现在我们的麻烦已经过去了。在谈到中国国内情况时，邓小平强调指出，有两条是重要的：第一，中国只能走社会主义道路。象我们这样一个有10亿人口的大国，资本主义是肯定行不通的。第二，要搞社会主义现代化，要使中国摆脱落后状态，没有稳定的政治形势是不行的。我们一定要有一个稳定的政治局面，有秩序地进行社会主义现代化建设。这些问题，自十一届三中全会以来，我们一直这样讲，从来没有变过。我们的既定政策不会改变。实行了八年的行之有效的政策，为什么要变呢？"},{"type":"paragraph","text":"关于反对资产阶级自由化问题，邓主任说，我们不搞运动。在进行四个现代化建设的过程中，都存在着反对资产阶级自由化的问题。这是长期的事情。既然是长期的，就不能搞运动，我们的基本方法是进行教育。"},{"type":"paragraph","text":"舒尔茨对邓小平的介绍表示感谢。他说，美国重视同中国的关系。邓小平说，这好，在这一点上双方的想法一致。宾主还就一些重大国际问题交换了意见。"},{"type":"paragraph","text":"会见历时一个小时。中方在座的有国务委员兼外长吴学谦、副外长朱启祯等。"},{"type":"paragraph","text":"（附图片）"},{"type":"paragraph","text":"图为邓小平会见舒尔茨。　杨绍明摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6d4c58fd19"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
