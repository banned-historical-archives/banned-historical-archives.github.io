art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"用毛泽东思想带兵带出象麦贤得那样真正过得硬的战士；任何惊涛骇浪都能顶住；任何敌人都不在话下","authors":["隋永源"],"parts":[{"type":"paragraph","text":"一个连队干部，应该带出什么样的战士来？看了麦贤得同志的英雄事迹以后，我越想越觉得：一定要带出大批麦贤得式的钢铁战士来！"},{"type":"paragraph","text":"以前我当排长的时候，总觉得战士的军事技术搞好了，其他方面差一些没关系。在练兵过程中，我只是以“技术过硬的战士才算过硬”去鼓励战士。这样，虽然战士的练兵热情很高，但思想基础不牢固，往往是“三分钟的热度”。如七班有一个战士学技术热情高，领会能力强。但他练兵的目的不明确，过了一些日子，情绪低落，练兵劲头也就不大了。去年，全排同志在工作中都出了不少汗，就是因为思想基础不牢固，没有评上四好排。"},{"type":"paragraph","text":"麦贤得同志的事迹，非常有说服力地告诉我：最好的武器，是毛泽东思想；最大的战斗力，是用毛泽东思想武装起来的人。只有突出政治，用毛泽东思想武装战士的头脑，带出来的战士才能象麦贤得那样一不怕苦，二不怕死，天不怕，地不怕。这才算是真正过硬的战士。部队有了大批麦贤得式的钢铁战士，任何艰难困苦都可以战胜，任何惊涛骇浪都能顶住，任何敌人都不在话下。"},{"type":"paragraph","text":"我吸取了过去的教训，增强了无产阶级的带兵观点，决心用无产阶级的政治思想来带兵。要做到这一点，首先自己要加强学习毛主席著作，处处以毛主席的书为最高指示。如新战士刚到连队，有的还不大安心工作，我就用毛主席关于为全中国和全世界人民服务的论述教育他们。新战士服役态度端正了，自觉地学习毛主席著作，工作热情很高。当然，这只不过是开始，今后，我一定坚持这样做下去。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9d73812af2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
