和宋庆龄副委员长等出席","authors":[],"dates":[{"year":1978,"month":8,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京八月十六日电　第五届全国人民代表大会常务委员会今天开始在北京举行第三次会议。"},{"type":"paragraph","text":"在今天的全体会议上，批准了《中华人民共和国和日本国和平友好条约》和《中华人民共和国和罗马尼亚社会主义共和国关于经济技术合作的长期协定》。"},{"type":"paragraph","text":"人大常委会委员长叶剑英，副委员长宋庆龄、聂荣臻、乌兰夫、吴德、韦国清、陈云、李井泉、蔡畅、邓颖超、赛福鼎、廖承志、姬鹏飞、阿沛·阿旺晋美、周建人、许德珩、胡厥文，出席了今天下午的全体会议。"},{"type":"paragraph","text":"国务院副总理耿飚，最高人民检察院检察长黄火青，最高人民法院副院长王维纲，列席了今天下午的会议。"},{"type":"paragraph","text":"会上，外交部副部长韩念龙作了关于中日和平友好条约的报告和关于中罗经济技术合作的长期协定的说明。"},{"type":"paragraph","text":"会议通过决议，批准《中华人民共和国和日本国和平友好条约》和《中华人民共和国和罗马尼亚社会主义共和国关于经济技术合作的长期协定》。"},{"type":"paragraph","text":"今天上午，会议分小组认真讨论和审议了中日和平友好条约和中罗经济技术合作的长期协定。在讨论中，委员们热烈发言，一致认为，在当前国际形势下，中日两国和平友好条约的签订，具有重大的现实意义和深远的历史意义。这一条约是迄今中日关系的政治总结，也是进一步发展两国关系的新起点。它不仅得到了中日两国人民的热烈欢迎和拥护，在亚洲和全世界也获得了广泛的支持和称赞。委员们一致认为，中罗经济技术合作长期协定的签订，有助于进一步巩固和发展中罗两国人民兄弟友谊和发展中罗两国的经济技术合作。"},{"type":"paragraph","text":"会议将于十七日、十八日继续举行。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"世界形势","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"90b70c5ab7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
