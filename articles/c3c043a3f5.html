ical-archives/banned-historical-archives0/main/maoquanji30.pdf"],"article":{"title":"转发天津市通过各界人民代表扩大会议进行镇反工作的报告的批语","alias":"","parts":[{"type":"paragraph","text":"转发天津市通过各界人民代表扩大会议"},{"type":"paragraph","text":"进行镇反工作的报告的批语"},{"type":"paragraph","text":"（1951年4月17日）各中央局，并转分局，省委，大中市委，区党委："},{"type":"paragraph","text":"天津镇反工作做得很好，团结和教育了各界人民，一切地方均应照此\"办理，坚决地打破神秘主义和关门主义的作风。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"四月十七日"},{"type":"paragraph","text":"[1]天津市公安局1951年4月9日总结的通过召开各界人民代表扩大会议进行镇反的报告中说，天津市于3月27日召开第三届各界协商委员会第四次扩大会议讨论镇压反革命问题，之后又于29日召开1.5万人的市区各界人民代表扩大会议，揭发控诉反革命分子的罪行。大会实况由电台广播，组织了50万市民收听。会议进行了5个小时，到会群众情绪一直高涨，会后各界反映很好。"}],"authors":["毛泽东"],"dates":[{"year":1951,"month":4,"day":17}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":239,"page_end":239},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c3c043a3f5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
