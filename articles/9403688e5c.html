,"dates":[{"year":1969,"month":1,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社北京十一日电　中国共产党中央委员会收到马来亚共产党中央委员会的一份电报。电报热烈祝贺我国成功地进行了一次新的氢弹试验。"},{"type":"paragraph","text":"电报说:“在无产阶级文化大革命日益接近全面胜利的时候，中国又爆炸了一颗氢弹，成功地进行了一次新的热核试验。这标志着中国核武器的发展又有了新的飞跃。我们以无限喜悦的心情，代表我们党全体党员、马来亚民族解放军全体指战员和马来亚人民，向你们表示热烈的祝贺。"},{"type":"paragraph","text":"“这次氢弹试验的成功是战无不胜的毛泽东思想的又一伟大胜利，是毛主席无产阶级革命路线的又一伟大胜利，是无产阶级文化大革命的又一辉煌成就。"},{"type":"paragraph","text":"“这次氢弹试验的成功是中国人民对世界革命事业的又一重大贡献。它又一次打击了美帝、苏修的核威胁、核讹诈政策，打击了美苏勾结妄图重新瓜分世界的殖民主义阴谋，对于全世界被压迫民族、被压迫人民的革命斗争是一个巨大的鼓舞和支持。”"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9403688e5c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
