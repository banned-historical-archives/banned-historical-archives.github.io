<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"金山县领导成员遵照毛主席关于“既当‘官’，又当老百姓”的教导  虚心向群众学习　遇事同群众商量","authors":[],"dates":[{"year":1971,"month":2,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"金山县领导成员遵照毛主席关于“既当‘官’，又当老百姓”的教导"},{"type":"paragraph","text":"虚心向群众学习　遇事同群众商量"},{"type":"paragraph","text":"据新华社上海电　中共上海金山县委和县革委会领导成员，发扬党的密切联系群众的优良作风，虚心向群众学习，遇事同群众商量，尊重群众的首创精神，充分发挥了群众的积极性，使全县革命和生产面貌发生深刻的变化。"},{"type":"paragraph","text":"金山县委和县革委会牢记毛主席关于“正确的政治的和军事的路线，不是自然地平安地产生和发展起来的，而是从斗争中产生和发展起来的”这一教导，不断同各种脱离群众的错误思想和错误倾向作斗争。在斗争中树立群众观点，发扬党的密切联系群众的优良作风。县革委会成立后，领导班子中有的老干部认为自己在文化大革命中经过群众帮助，路线觉悟有了提高，能听取群众意见，不会重犯压制群众的错误；有的新干部认为自己是从群众中来的，不存在脱离群众的问题。县革委会带着这个问题组织大家认真学习毛主席关于群众路线的教导，使大家认识到，新班子是从群众斗争中建立起来的，有为群众服务的愿望，但由于刘少奇反革命修正主义路线的余毒并没有肃清，资产阶级思想和旧习惯势力也会不断侵蚀，如果不警惕，还会自觉不自觉地脱离群众。认识提高后，他们注意抓住脱离群众的错误倾向和思想苗头，不断在领导班子内部开展批评和自我批评；同时，领导干部经常下基层召开群众座谈会，听取群众意见。县革委会成立以来，先后四次发动群众实行开门整风，大大发扬了密切联系群众的优良传统。有个新干部进入县革委会后，滋长了骄气，和群众的关系有些疏远。县革委会对他进行了帮助，和他一起学习毛主席关于“既当‘官’，又当老百姓”的教导，一起回忆旧县委一些人由于不注意思想改造，脱离群众，犯严重错误的教训，使他看到脱离群众的危害性，认识了错误。在这以后，他注意联系群众，遇事和群众商量，虚心向群众学习，密切了和群众的关系，受到大家的赞扬。"},{"type":"paragraph","text":"金山县委和县革委会在实际工作中注意防止不依靠群众，凭老经验、老办法办事。这个县一九六九年在早稻中推广使用一种农药，对当年增产起了一定的作用。去年，有的干部就不和群众商量，不看气温条件和作物生长情况，凭老经验布置下去。结果群众纷纷提出意见。县委和县革委会虽然及时改正了，但一部分社、队生产已受到了影响。通过这个教训，他们狠批了经验主义，帮助干部提高认识。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"72364e43b6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
