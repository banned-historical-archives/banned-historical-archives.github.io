义谬论","authors":[],"dates":[{"year":1972,"month":7,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编者按:是坚持主观和客观、认识和实践相统一，还是坚持主观和客观、认识和实践相分裂，从来是辩证唯物论同反动的唯心论和形而上学斗争的焦点。刘少奇一类骗子竭力鼓吹所谓“办事情”是一个“从主观到客观，从思想到实际”的过程，这是一条彻头彻尾的唯心论的认识路线。"},{"type":"paragraph","text":"刘少奇一类骗子在认识路线上颠倒主观和客观、认识和实践的关系，完全是为他们在政治上倒行逆施制造反革命舆论。说穿了，他们鼓吹这样的唯心论的“办事”路线，就是妄图改变党的基本路线，颠覆无产阶级专政，复辟资本主义。我们一定要清醒地看到在这种所谓“办事”路线背后的触目惊心的阶级斗争和路线斗争，要在毛主席革命路线指引下，坚持唯物论的反映论，彻底批判和清算刘少奇一类骗子鼓吹的唯心论的先验论，把批修整风运动进一步推向深入。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2ba7ebc92b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
