script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反对美帝剥削掠夺　支持古巴革命厄瓜多尔爆发反美大示威各地示威群众在美使领馆前高呼“打倒美帝国主义”","authors":[],"dates":[{"year":1960,"month":12,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京12日电】　基多消息:由厄瓜多尔学生9日在首都基多开始的群众反美示威正在扩大。这个国家的一些主要城市里都发生了大规模的反美示威。"},{"type":"paragraph","text":"9日，几百名基多的大学生在美国驻厄瓜多尔大使馆门前举行了示威。愤怒的示威者用砖石击碎了大使馆建筑物的窗户。"},{"type":"paragraph","text":"第二天，基多学生继续举行反美示威，用砖瓦攻击了美国大使馆和美国新闻处，并且高呼口号:“打倒美帝国主义!”“反对美国剥削者的古巴和厄瓜多尔万岁!”“要古巴，不要美国佬!”示威者还要求厄瓜多尔同社会主义国家建立关系。"},{"type":"paragraph","text":"与此同时，厄瓜多尔一些主要城市中的学生和人民群众也举行了反美示威。示威者高呼反对美帝国主义、支持古巴革命和要求同社会主义国家建立关系的口号。厄瓜多尔的重要城市瓜亚基尔的学生在美国领事馆前举行了示威，并且击碎了领事馆建筑物的窗户。"},{"type":"paragraph","text":"厄瓜多尔法律学校协会在10日宣布，瓜亚基尔的学生将在12日举行大规模反对美帝国主义的集会。"},{"type":"paragraph","text":"据报道，这次示威的导火线是作为里约热内卢议定书的保证国之一的美国最近参与作出关于维持这项议定书的决定，1942年在一次泛美会议上签订的这项议定书规定把厄瓜多尔的一片领土划归当时派军队侵入这个国家的秘鲁。厄瓜多尔和秘鲁的边界纠纷和这项议定书的签订，都是在这个地区霸占着石油租让地的美孚油公司进行挑拨和策动的结果。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f3bdd9843f"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
