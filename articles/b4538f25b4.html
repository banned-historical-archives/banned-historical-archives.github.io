" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"有感而发","authors":["北京大学","李景禄"],"dates":[{"year":1957,"month":5}],"is_range_date":false,"parts":[{"text":"有感而发","type":"title"},{"text":"北京大学李景禄","type":"authors"},{"text":"有感而发","type":"subtitle"},{"text":"哲一 李景禄 (5611082)","type":"subtitle"},{"text":"假如我们青年人的言论是有意识的反社会主义，那就说明了这个社会本身就是自发的产生叛送性格的魔力。（但事实不是这样，然而很多卫道者竟把反社会主义的帽子以泰山压顶之势向你们头上抛来。）斯大林的“阶级斗争理论”的幽灵仿佛有复活的趋势，离开了社会主义的言论变成了反社会主义的，错误的变成了反动的，是非变成了敌我问题。大概是物极必反的规律在起作用吧！","type":"paragraph"},{"text":"在社会主义社会和共产主义社会中技术革新和社会制变革新的现象都将是必然要继续发生……我们要建立一定的制度来保证群众路线和集体领导的彻底实行……减少我们工作中的脱离客观实际情况的主观主义和片面性（关于无产阶级专政的历史经验）民主是发展的，集中也是发展的，巧妙的民主将以巧妙的集中为伴侣，民主在发展过程中好的将成为习惯而消亡，但最完善的民主始终是发展的极限。思想斗争是严重的，但不是残酷的。","type":"paragraph"},{"text":" 来源：北京大学社会主义思想教育委员会编印《北京大学右派分子反动言论汇集》，一九五七年十月。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b4538f25b4"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
