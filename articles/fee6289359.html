ical-archives/banned-historical-archives0/main/maoquanji46.pdf"],"article":{"title":"和毛远新的谈话纪要","alias":"","parts":[{"type":"paragraph","text":"和毛远新的谈话纪要"},{"type":"paragraph","text":"（1964年2月）"},{"type":"paragraph","text":"以前我当过小学校长、中学教员，又是中央委员，也做过国民党的部长，但我到农村和农民在一起时，深感农民知道东西很多，知识很丰富，我不如他们，应向他们学习。你至少不是中央委员吧？你怎么能比农民知识多呢？回去告诉你们政委，就说是我说的，今后每年到农村去一次，这样大有好处！"},{"type":"paragraph","text":"你就是不懂得辩证法，不懂一分为二，以前把自己看得了不得，现在又把自己看得一文不值，都是不对的。"},{"type":"paragraph","text":"对犯错误的人要鼓励，当犯错误的人知道自己犯错误的时候，你就要指出他的优点，事实上，他的优点还是很多的，对犯错误的同志，要洗温水澡，热了受不了，冷了也受不了，温水最合适。对犯错误的青年，不要开除，开除是害了他，对立面也弄没有了，溥仪、康泽这样的人也改造过来了，青年人有些是党员，有些是团员，还改造不过来？开除太简单化。"},{"type":"paragraph","text":"你在学校里是不是“左派”？看到一个文件表扬了你，有人捧你并不是好事，像你那样的青年人要多挨些骂，骂少了不好，什么事都是这样逼出来的。我写《实践论》《矛盾论》，就是逼出来的，如果现在让我写，我就写不出来。"},{"type":"paragraph","text":"什么叫先进？先进就是做落后人的工作，对周围的人要分析，毛泽东全集第四十六卷我到哪里都想打听，都想交朋友，你们青年人要学辩证法，学会用辩证法分析问题。比如我吧，我并不比别人聪明，但我懂得辩证法，会用辩证法分析问题，不明百的问题用辩证法一分析就明白了，要好好学会用辩证法，这个作用很大。"}],"authors":["毛泽东"],"dates":[{"year":1964,"month":2}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":284,"page_end":285},"tags":[{"name":"毛泽东","type":"人物"},{"name":"毛远新","type":"人物"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fee6289359"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
