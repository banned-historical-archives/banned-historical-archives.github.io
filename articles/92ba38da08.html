al-archives/banned-historical-archives8/main/maoquanji8.pdf"],"article":{"title":"致林彪、鼓荣臻电","alias":"","parts":[{"type":"paragraph","text":"致林彪、聂荣臻电！"},{"type":"paragraph","text":"（1936年4月2日）林、聂："},{"type":"paragraph","text":"甲、普军四个纵队已大分散，杨耀芳亦被红军第十五军团吸引北去。你们区域已造成最好群众条件，极有利于作战，战后伤员即存现区。中路军主力去打破黄河堡垒接运伤员去陕北，三十军在县钳制六十九师主力，宋时轮率八十一师之一营出灵石毁路钳制吕、梁、关等。你们不动，专事整理训练扩大，再打二仗、三仗。乙、蒋介石压迫张学良、杨虎城出兵延长、延水，即将出动。你们在现在地区取得胜利，可将现区变成苏区。由中路军去晋西南配合你们也把你（它）变成苏区，把黄河与陕北打通，张杨出兵便可能延缓，外交有所凭借而进行，所以你们应把握此时机，坚决在现地区作战。丙、基本上不改变你们出普东南方针，取得上述胜利后，你们仍出普东南，你们现有大批新兵，打仗又可增扩新兵，这样无论从哪方面说，在现地区作战都是最正确方针。"},{"type":"paragraph","text":"彭毛"},{"type":"paragraph","text":"二日二十二时[1]这是毛泽东和红军第一方面军司令员彭德怀给第一方面军第一军团"}],"authors":["毛泽东"],"dates":[{"year":1936,"month":4,"day":2}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":357,"page_end":357},"tags":[{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"92ba38da08"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
