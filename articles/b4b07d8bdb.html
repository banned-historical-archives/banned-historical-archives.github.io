script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"坚决贯彻毛主席“抓革命，促生产”方针以革命带动生产  浙江夏熟作物样样获得好收成  山东五千多万亩小麦丰收在望","authors":[],"dates":[{"year":1968,"month":6,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"坚决贯彻毛主席“抓革命，促生产”方针以革命带动生产"},{"type":"paragraph","text":"浙江夏熟作物样样获得好收成  山东五千多万亩小麦丰收在望"},{"type":"paragraph","text":"编者按：夏收大忙季节到来了！"},{"type":"paragraph","text":"有些地方已经传来了丰收的喜讯。有些地方，小麦已经黄熟，丰收在望。我国广大农村呈现出一派紧张战斗、热气腾腾的革命景象。"},{"type":"paragraph","text":"今年的夏季好收成，是全国亿万军民在伟大导师毛主席抓革命，促生产的伟大方针指引下，在无产阶级文化大革命节节胜利的凯歌声中，以冲天的革命干劲和英雄式的劳动换来的。有些地方是在同干旱作顽强的斗争得来的。因此，今年的夏季好收成，来之不易。"},{"type":"paragraph","text":"各省市革命委员会（革筹小组）和各地领导机关，要遵循毛主席关于不违农时的一贯教导，动员一切可以动员的人力物力，迅速投入农业第一线，全力以赴地打好夏收这一仗！"},{"type":"paragraph","text":"全国无产阶级革命派和广大革命群众应该看到，保证今年夏熟作物的丰产丰收，颗粒归仓，是紧跟毛主席伟大战略部署，夺取无产阶级文化大革命全面胜利的一个组成部分。切不可等闲视之。"},{"type":"paragraph","text":"全国无产阶级革命派和广大革命群众应该懂得：越是形势大好，越要提高革命警惕。无产阶级的敌人，为了达到破坏文化大革命的罪恶目的，一定会千方百计地破坏我们的夏收成果。因此，我们在紧张的夏收劳动中，千万不要忘记阶级斗争。一定要警惕阶级敌人的阴谋破坏活动，不给阶级敌人以任何可乘之机。"},{"type":"paragraph","text":"据新华社杭州四日电　在夺取无产阶级文化大革命全面胜利的大好形势下，浙江省今年夏收形势大好，平原、山区和海岛，处处出现大面积平衡高产，正在收获的大麦、小麦、蚕豆、油菜等夏熟作物和新近上市的春茧，样样获得大丰收。广大贫下中农欢呼这是无产阶级文化大革命的伟大成果，是战无不胜的毛泽东思想的伟大胜利。"},{"type":"paragraph","text":"目前，浙江省正进入夏收大忙季节。从浙南山区到杭嘉湖平原，广大贫下中农和社员群众兴高采烈地抬着伟大领袖毛主席画像和毛主席语录牌，积极下田收割，蚕室里日夜采茧。春粮、油菜和蚕茧的主要产区杭嘉湖地区，今年大小麦、蚕豆穗大粒粗，结实饱满，比去年有更大丰收；春茧结得又大又多，单产和总产都是解放以来最高的一年。"},{"type":"paragraph","text":"浙江今年夏熟作物大丰收，是广大贫下中农、社员群众和革命干部坚决贯彻执行毛主席“抓革命，促生产”的伟大方针的结果。今年春耕以来，浙江各地粮区和蚕区普遍多次举办了各种类型的毛泽东思想学习班，广大社员群众以“老三篇”和毛主席的最新指示为武器，深入持久地开展革命大批判。通过革命大批判，大大提高了广大贫下中农、革命干部的阶级觉悟和两条路线斗争觉悟，激发了社员的生产积极性，夺得了今年第一季好收成。"},{"type":"paragraph","text":"据新华社济南四日电　在夺取无产阶级文化大革命全面胜利的凯歌声中，我国小麦重要产区之一的山东省的五千五百多万亩小麦等夏熟作物，绝大部分长势喜人，丰收在望。季节较早的菏泽、济宁、临沂、泰安、济南等地区，已开镰收割。现在，山东广大农村到处是一片喜气洋洋的丰收景象。"},{"type":"paragraph","text":"山东省广大贫下中农和社员群众，由于大办毛泽东思想学习班，活学活用毛主席著作，斗私批修，精神面貌发生了显著变化。他们坚决贯彻毛主席“抓革命，促生产”的伟大方针，以革命带动生产，保证了今年的小麦种得多，种得好。在去冬雨雪少的情况下，广大社员冒着凛冽寒风，开展小型农田水利冬修活动，使今年全省春灌面积扩大了三百多万亩。部分地区的小麦在冬季受到较为严重的冻害，社员们加强管理，尽最大努力减轻了灾害的程度。"},{"type":"paragraph","text":"今年春季，山东各地先后派出十万人的毛泽东思想宣传队，深入农村，狠抓革命，猛促生产。人民解放军驻山东部队广大指战员组成大批毛泽东思想宣传队，到全省七十八个县，深入生产队进行支农工作。山东工人阶级除生产大量农机具和农药支援农业生产外，在今年小麦返青期间，济南、青岛、潍坊等市的工人还深入农村为农民修理农具和排灌机械。山东各地供销部门今年供应农村的夏收工具，不仅品种、数量比往年有所增多，价格也有所降低。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"山东文革","type":"人物"},{"name":"浙江文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b4b07d8bdb"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
