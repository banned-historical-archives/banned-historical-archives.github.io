ar":1966,"month":12,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"奉贤县奉城公社东门大队　第二生产队政治指导员　施龙根"},{"type":"paragraph","text":"自从毛主席语录被谱上曲子发表后，我们队里办的毛主席著作读书班，每次上课时就教社员们唱。现在男女老幼都会唱七、八首毛主席语录歌和四、五首革命歌曲了。我们贫下中农最爱唱毛主席语录歌，百唱不厌，越唱越有味道，越唱越爱唱。我过去不爱唱歌，但现在也会唱十多首歌了。"},{"type":"paragraph","text":"唱了毛主席语录歌，毛主席的话几牢记在心头。我学会了《政策和策略是党的生命》这首歌后，脑子里深深地印下了毛主席的这一教导，在工作中不折不扣地贯彻党的各项政策和措施。今年三秋，安排作物面积和调整茬口，唱着这首语录歌，更加增强了我保证完成国家所下达的粮棉计划的信心。"},{"type":"paragraph","text":"在碰到困难的时候，唱了毛主席语录歌，就增加了克服困难的无穷力量。十一月十七日，天下雨了，为了不脱季节，不误农时，我们冒雨种油菜。雨落在身上衣服湿了，雨落在田里，泥土有些凝了。但是我们个个高唱毛主席语录歌:“我们的同志在困难的时候，要看到成绩，要看到光明，要提高我们的勇气。”越唱干劲越大，大家决心与天奋斗，终于完成了当天的种油菜任务。十二月三日，我们队里的男同志挑粪浇油菜，把大粪挑到二里外的油菜田里，挑到下午，觉得疲劳极了。有些社员心想早些休息明天再挑，但是劳动象上战场，今天的事必须今天做完，这时我们大家高唱起“下定决心，不怕牺牲，排除万难，去争取胜利”的毛主席语录歌，我们边唱边挑，疲劳也忘了，终于把大粪施到了油菜田里，完成了任务。"},{"type":"paragraph","text":"我们社员唱毛主席语录歌，越唱越甜。大家说，唱了毛主席语录歌，好象毛主席就在我们身边，鞭策我们奋勇前进，浑身是劲。天天唱毛主席语录歌，越唱越加热爱毛主席。年年唱毛主席语录歌，保持革命本色永不变."}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"448f775f66"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
