s":[],"article":{"title":"国务院侨务办公室印发《关于华侨、归侨、华侨学生、归侨学生、侨眷等身份解释（试行）》的通知","dates":[{"year":1984,"month":6,"day":23}],"is_range_date":false,"authors":["国务院侨务办公室"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"中央组织部干审局, 干审工作政策文件选编 (下), 1161-1162","tags":[{"name":"侨务","type":"主题/事件"}],"parts":[{"type":"title","text":"国务院侨务办公室印发《关于华侨、归侨、华侨学生、归侨学生、侨眷等身份解释 (试行)》的通知[1]"},{"type":"subtitle","text":"1984年6月23日 · 国侨发〔1984〕2号"},{"type":"paragraph","text":"为适应已经变化的情况和新时期侨务工作的需要，经商全国人大法制工作委员会、华侨委员会、外交部、司法部、公安部、民政部等部门同意，现将一九五七年十二月四日中侨委《关于华侨、侨眷、归侨、归国华侨学生身份的解释》修订为《关于华侨、归侨、华侨学生、归侨学生、侨眷、外籍华人身份的解释(试行)》，供各级侨务部门进行工作时参考，不对外公布。"},{"type":"paragraph","text":"在试行中，请注意以下几点："},{"type":"paragraph","text":"一、这个《身份解释》，是为了确定上述几种人的身份，至于对其中某些人员的适当照顾，应根据有关规定和本地区实际情况确定。例如,在归侨、侨眷较多的地方，可优先照顾归侨或归侨中的知识分子；在侨眷较多的地方，可优先照顾在国外有影响的代表人物的国内亲属及华侨在国内的直系亲属（配偶、父母、子女）。凡涉及到处理有关历史遗留问题，应按有关规定执行。"},{"type":"paragraph","text":"二、定居是指已取得在所在国的居留权，或虽未取得所在国的居留权而事实上已在当地居住谋生。三、因所谓“海外关系”造成的冤假错案涉及的人较多，对于其中不具有上述几种身份的人，侨务部门也应关心对他们落实政策的工作。"},{"type":"paragraph","text":"四、对于虽不属于上述几种人身份，但与他们有亲友关系的人，也应注意做好工作。在试行中，有什么问题，望及时函告我们，以便修改补充。"},{"type":"paragraph","text":"关于华侨、归侨、华侨学生、归侨学生、侨眷、外籍华人身份的解释 (试行)"},{"type":"paragraph","text":"一、华侨:指定居外国的中国公民。"},{"type":"paragraph","text":"二、归国华侨：指回国定居的华侨，简称归侨。不论年龄大小和何时回国，都是归侨。来华定居的外籍华人，在恢复中国国籍后,也称归侨。"},{"type":"paragraph","text":"三、华侨学生：指回国学习未在国内定居的华侨。"},{"type":"paragraph","text":"四、归国华侨学生：把从国外回来定居就学的华侨，简称归侨学生。不论年龄大小，就读何种学校，都是归侨学生。"},{"type":"paragraph","text":"五、侨眷:指华侨在国内的眷属。包括:配偶、父母、子女（含媳妇、女婿）、兄弟姐妹、祖父母、外祖父母、孙儿孙女、外孙儿外孙女、抚养人和生活主要来源依靠华侨的其他亲属。华侨回国后，其国内眷属仍视为侨眷。"},{"type":"paragraph","text":"外籍华人在华的具有中国国籍的眷属，与侨眷范围相等同（享受侨眷待遇）。"},{"type":"paragraph","text":"六、外籍华人:指原是华侨或华侨后裔，后已加入或已取得居住国国籍者（国内有关优待华侨的政策一般可以适用于外籍华人）。"},{"type":"paragraph","text":"[1] Note: This document can also be found in 最高人民法院刑事审判第二庭, 刑事申诉工作手册, pp. 207-209."}],"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f92566212f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
