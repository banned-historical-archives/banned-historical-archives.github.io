<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"武汉高等学校反右倾思想取得很大成绩","authors":["罗重璋"],"dates":[{"year":1957,"month":9,"day":17}],"is_range_date":false,"parts":[{"text":"武汉高等学校反右倾思想取得很大成绩","type":"title"},{"text":"罗重璋","type":"authors"},{"text":"新华社武汉17日讯　武汉市各高等学校都在开学前利用了一周到十天的时间，在党内、团内批判了右倾思想。从这次思想批判中看，各校的左派甚至党委成员中，右倾思想是较为普遍而严重的。这些学校的右倾思想主要表现是：惜才；怕将来不好相处；怕妨碍功课；想草率收兵算事；对党内右派分子下不了斗争的决心等等。","type":"paragraph"},{"text":"各高等学校反右倾思想的做法是：首先从党委委员一级进行检查(结合学文件)，然后总支、支部到左派骨干。在检查中也展开争论，同时也进行揭发、排队。","type":"paragraph"},{"text":"经过这一段对右倾思想的批判，有如下几方面的收获：第一、提高了党员和左派的思想认识，一些原来认为搞得差不多了，这期可以搞业务了的人，认识了这期的任务很重。表示要再接再励，继续进行反右派斗争。不少学校重新进行了摸底排队工作，结果发现了更多的右派分子。如华中师范学院原来只排八十多个右派分，现在已排了一百七十多个；武汉测量制图学院原只划出四十多个右派分子，现在划出一百零三个。第二、在批判右倾思想的同时，一批隐蔽在党内的右派分子也被揭露出来了。如党内右派分子康文彬(武汉医学院党委委员宣传部长)、夏振坤(华中农学院党内右派分子党委委员)都是在这次批判右倾思想中被揭露出来的。第三、是健全了领导小组，使作战司令部更富有战斗力，因此一开学就进行短兵相接的战斗。","type":"paragraph"},{"text":"到目前止，武汉市十多所高等学校三万七千多师生中已划出的右派分子共一千三百八十七人，其中有八十人已见报。这学期的任务是很艰巨的，因为一千三百多右派分子中已经斗争的只占三分之一左右，而被斗争当中又大部尚未搞臭。各校经过开学后集中搞两星期的反右派后，即转入边上课边反右派，有的学校为了把反右派搞彻底准备将每周上课时数适当减少，大都把上课时间缩短为每周三十六到四十小时左右(包括习题课、实验等)。","type":"paragraph"},{"text":" ——原载新华社《内部参考》1957年9月20日。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b8483b8b0a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
