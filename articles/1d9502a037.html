script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"拉美国家加强合作保卫独立主权发展民族经济  加勒比共同体采取联合措施反对帝国主义控制和剥削  三个香蕉出口国领导人举行会议抵抗跨国公司的压力","authors":[],"dates":[{"year":1974,"month":5,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"拉美国家加强合作保卫独立主权发展民族经济"},{"type":"paragraph","text":"加勒比共同体采取联合措施反对帝国主义控制和剥削"},{"type":"paragraph","text":"三个香蕉出口国领导人举行会议抵抗跨国公司的压力"},{"type":"paragraph","text":"据新华社一九七四年五月十一日讯　加勒比共同体和共同市场自去年八月成立以来，在促进本地区反对殖民主义、保卫国家主权和发展民族经济方面起着重要的作用。"},{"type":"paragraph","text":"在不到一年的时间里，参加加勒比共同体和共同市场的国家和单位已从四个发展到十个。这个组织成立时，参加的只有圭亚那、牙买加、特立尼达和多巴哥以及巴巴多斯四个已独立的国家，今年四月十七日，多米尼加、新独立的国家格林纳达以及尚未独立的伯利兹、蒙特塞拉特、圣文森特和圣卢西亚等单位加入。最近海地和苏里南也申请加入这个组织。"},{"type":"paragraph","text":"加勒比共同体和共同市场成立不久，就进行了反对帝国主义控制和掠夺原料的斗争。去年十月，美国片面决定把一九七四年从西印度群岛进口食糖的定额从原来的二十二万吨削减为二万三千八百吨。加勒比共同市场部长会议立即通过决议表示反对。今年一月，加勒比共同体为了要求英国提高根据英联邦食糖协定在一九七一年确定的食糖价格，举行了特别会议，就提高糖价作出了决定，迫使英国同意将食糖价格从一九七一年确定的每吨一百二十三美元提高到一百六十八美元。"},{"type":"paragraph","text":"加勒比共同体的各成员国和单位为了发展民族经济，采取了许多联合措施。去年，加勒比共同体的四个创始国——圭亚那、牙买加、特立尼达和多巴哥以及巴巴多斯签订了关于协调鼓励工业发展的财政措施和成立加勒比投资公司等协议。今年三月中旬，加勒比共同体农业部长常设委员会开会，讨论了发展农业、增产粮食和牲口以及促进本地区农产品自给的具体方案和措施。加勒比共同体还鼓励各成员国和单位利用本地区原料来发展工业。各成员国和单位实行了共同的对外关税，抵制帝国主义的倾销，保护民族经济。"},{"type":"paragraph","text":"这个组织的各成员之间在经济上互通有无，互相帮助。去年十二月，加勒比共同市场部长级特别会议决定，本地区营业的炼油厂应满足本地区对石油产品的需要，同时还决定本地区的资源和产品首先应当用来满足本地区的需要。特立尼达和多巴哥政府及牙买加政府都保证优先向加勒比共同体和加勒比自由贸易协会的成员国和单位供应石油。"},{"type":"paragraph","text":"据新华社巴拿马城一九七四年五月十日电　据巴拿马官方的“自由电台”广播，哥斯达黎加、巴拿马和洪都拉斯的领导人五月九日在哥斯达黎加首都圣约瑟举行会议，协调三国在跨国公司压力面前保卫它们的主权和经济利益的措施。"},{"type":"paragraph","text":"参加这次会议的有：哥斯达黎加新任总统丹尼尔·奥杜维尔，巴拿马政府首脑奥马尔·托里霍斯将军和洪都拉斯经济和贸易部长阿夫拉姆·贝纳顿以及这三个国家的其他高级官员。会议研究了香蕉出口国对出口香蕉征收附加税后出现的形势，特别是洪都拉斯的局势，因为美资标准果品公司在这个国家削减了产量，作为对香蕉出口国的报复手段。这家公司在哥斯达黎加也开始采取同样的手段。托里霍斯将军和奥杜维尔总统一致表示声援和支持洪都拉斯。"},{"type":"paragraph","text":"会议决定五月十五日在哥斯达黎加首都圣约瑟举行一次由全体拉美香蕉出口国参加的会议。"},{"type":"paragraph","text":"另据报道，托里霍斯将军五月九日在哥斯达黎加接见墨西哥《至上报》记者谈到香蕉出口国联盟时指出：“我们有了一个能够回击任何形式的报复的组织”。他说，这是一个不愿再受剥削的国家的联盟，这个联盟“正在活动并且越来越团结”。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1d9502a037"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
