script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"结束了在国外的访问周总来总理陈毅谢富治副总理回到北京刘少奇主席邓小平总书记等前往机场欢迎","authors":[],"dates":[{"year":1965,"month":4,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京6日屯　周恩来总理、陈毅副总理和谢富治副总理，结束了在国外的访问，今天中午乘专机回到北京。"},{"type":"paragraph","text":"中共中央副主席、中华人民共和国主席刘少奇，中共中央总书记邓小平等，前往机场欢迎。"},{"type":"paragraph","text":"周恩来总理和谢富治副总理率领中国党政代表团参加了罗马尼亚乔治马一德治同志的葬礼，访问了阿尔巴尼亚。在这以后，周恩来总理等访问了阿尔及利亚、阿联、巴基斯坦和缅甸。"},{"type":"paragraph","text":"陈毅副总理兼外交部长先后访问了阿富汗、巴基斯坦和尼泊尔。"},{"type":"paragraph","text":"随同周恩来总理出国访问的章汉夫、赵毅敏、罗青长，随同陈毅副总理出国访问的韩念龙、张彤等，今天也一起回到北京。"},{"type":"paragraph","text":"在机场上，少先队员向周总理，陈毅、谢富治副总理等献花。"},{"type":"paragraph","text":"到机场欢迎的党和国家领导人，还有彭真、李先念、陆定一、康生、李雪峰、郭沫若、林枫，政协全国委员会副主席徐冰、高崇民，国防委员会副主席蔡廷错，最高人民法院院长杨秀峰，最高人民检察院副检察长黄火星。"},{"type":"paragraph","text":"到机场欢迎的还有邓颖超、廖承志、刘晓、伍修杖、许光达、徐子荣、蒋南翔、李昌、方毅、刘震、周荣鑫、张奚若、李一氓、姬鹏飞、乔冠华、刘新杖、王新亭、刘志坚、刘少文、杜义德、林海云、邹大鹏、冯铉、许立、吴冷西、丁西林、龙子荣、杨奇清、汪金祥、凌云、邝任农、史良、罗叔章、王绍鏊、季方、陈其尤、周培源、王芸生、郑天翔、崔月犁、陆平、马绵古、杨蕴玉、王伟、张友渔、张铁生、张杰、沙梦弼、周叔迦、魏章玲等。"},{"type":"paragraph","text":"到机场欢迎的，还有罗马尼亚、阿尔巴尼亚、阿尔及利亚、阿联、巴基斯坦、缅甸、阿富汗、尼泊尔驻中国的使节和外交官员。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"谢富治","type":"人物"},{"name":"邓小平","type":"人物"},{"name":"陈毅","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2582ac5149"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
