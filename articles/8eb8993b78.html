ical-archives/banned-historical-archives8/main/maoquanji17.pdf"],"article":{"title":"在中共中央政治局会议上的讲话","alias":"","parts":[{"type":"paragraph","text":"在中共中央政治局会议上的讲话!"},{"type":"paragraph","text":"（1942年7月25日）"},{"type":"paragraph","text":"精兵简政适合于目前需要，但做得还不彻底。明年陕甘宁边区脱离生产的人员要减至六万人，晋西北减至五万人。边区主要是两项工作：教育工作和经济工作。普西北加上打仗一项。要提高工作效率和质量，少而精，能学习的学习，能生产的生产。军队不继续补充，按现有实际人数充实连队，可以实行小团制。至于敌后，要准备很大的缩小。搞一个统筹统支与自给自足相配合的很好的经济制度，以七分统筹、三分自给为主旨。"},{"type":"paragraph","text":"[1]这是毛泽东在中共中央政治局会议上讨论精兵简政问题时讲话的一"}],"authors":["毛泽东"],"dates":[{"year":1942,"month":7,"day":25}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":110,"page_end":110},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8eb8993b78"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
