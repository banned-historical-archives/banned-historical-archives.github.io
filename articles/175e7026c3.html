rt":5,"page_end":5,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东思想最能发动群众","authors":[],"parts":[{"type":"paragraph","text":"在城乡开展的社会主义教育运动，近来有一个新的发展，就是强调了突出政治，活学活用毛主席著作，以毛泽东思想教育人、改造人，并以毛主席的著作指导运动的每一步工作。各级干部带着毛主席著作下乡、下厂，成了毛泽东思想的强大的宣传队，提高了工农群众和广大基层干部的阶级觉悟，使社会主义教育运动得以顺利进行。广东省和江苏省邗江县方巷大队，在农村社会主义教育运动中，活学活用毛主席著作的经验，就是很好的证明。"},{"type":"paragraph","text":"毛泽东思想在人民群众中威信最高、影响最大，是推动社会主义教育运动的最好武器。用毛泽东思想最能发动群众，最能教育群众。用毛泽东思想武装群众，不仅有了社会主义教育运动的办法，而且还有了道理，有了方向。同时，也为工矿企业和农村的政治工作奠定了基础。"},{"type":"paragraph","text":"工人、贫农、下中农和所有劳动人民热烈要求学习毛主席著作，有着如饥似渴的心情。毛主席的话，一经和群众见面，就深深地打动了群众。他们在长期的革命斗争中，深切地体会到：毛泽东思想是指路明灯，是翻身法宝。他们说：“毛主席的话，千金难买，学会一句，终身管用。”不少人想尽各种办法去买毛主席著作。不识字的人也说：“不识字，识思想。”实践证明，组织工农群众学习毛主席著作，是促进工农群众革命化的根本，是革命和建设的根本，是千年大计，万年大计。中国要兴旺，就要用毛泽东思想去武装人民群众。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"175e7026c3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
