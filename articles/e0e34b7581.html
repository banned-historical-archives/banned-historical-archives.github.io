ical-archives/banned-historical-archives0/main/maoquanji39.pdf"],"article":{"title":"毛泽东等祝贺波兰人民共和国国庆的电报","alias":"","parts":[{"type":"paragraph","text":"毛泽东等祝贺波兰人民共和国"},{"type":"paragraph","text":"国庆的电报\""},{"type":"paragraph","text":"（1958年7月21日）波兰统一工人党第一书记瓦迪斯瓦夫·哥穆尔卡同志，波兰人民共和国国务委员会主席亚历山大·萨瓦茨基同志，波兰人民共和国部长会议主席约瑟夫·西伦凯维兹同志："},{"type":"paragraph","text":".当波兰人民共和国国庆十四周年的时候，我们谨代表中华人民共和国政府和人民向你们，并且通过你们向波兰人民共和国政府和人民致以热烈的祝贺。"},{"type":"paragraph","text":"中国人民怀着欢欣的心情注视着波兰人民在波兰统一工人党和波兰人民共和国政府的领导下，在发展国民经济和巩固社会主义制度的斗争中，在缓和国际紧张局势、维护欧洲和世界和平的事业中取得了很大的成就。"},{"type":"paragraph","text":"一年来，中波两国人民的友好和合作在各方面又获得了新的发展，这种友好合作关系的发展，不仅有助于加速我们两国的社会主"},{"type":"paragraph","text":"[1]这是毛泽东以中华人民共和国主席、中国共产党中央委员会主席的名义和全国人民代表大会常务委员会委员长刘少奇、国务院总理周恩来联名给波兰统一工人党第一书记瓦迪斯瓦夫·哥穆尔卡、波兰人民共和国国务委员会主席亚历山大·萨瓦茨基、波兰人民共和国部长会议主席约瑟夫·西伦凯维兹的电报。祝贺波兰人民共和国国庆十四周年。"},{"type":"paragraph","text":"毛泽东等祝贺波兰人民共和国国庆的电报义建设，而且加强了以苏联为首的社会主义阵营的团结。"},{"type":"paragraph","text":"祝中波两国人民的兄弟友谊日益巩固和发展。"},{"type":"paragraph","text":"中华人民共和国主席中国共产党中央委员会主席毛泽东中华人民共和国全国人民代表大会常务委员会委员长刘少奇中华人民共和国国务院总理周恩来一九五八年七月二十一日于北京"}],"authors":["毛泽东"],"dates":[{"year":1958,"month":7,"day":21}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":488,"page_end":489},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e0e34b7581"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
