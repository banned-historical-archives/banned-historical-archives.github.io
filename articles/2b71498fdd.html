<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"北京各区地富反坏右分子对人民公社散布很多谣言","authors":[],"dates":[{"year":1958,"month":10,"day":30}],"is_range_date":false,"parts":[{"text":"北京各区地富反坏右分子对人民公社散布很多谣言","type":"title"},{"text":"新华社北京30日讯　最近，北京各区地富反坏右分子对人民公社散布很多的谣言。内容大体有以下几种。","type":"paragraph"},{"text":"1、关于小孩集中的谣言：有的区发现“小孩都归国家，集中起来用汽车送走”、“不让父母见面”、“将来要把这村小孩与那村小孩对换”等谣言。怀柔九渡河乡有人造谣说：“小孩集中起来后，有的要送到苏联去。”","type":"paragraph"},{"text":"2、关于夫妇生活的谣言：管制分子吴士夫造谣说：“共产党大锅饭实现了，将来还得共产共妻”。褚清元造谣说：“现在男的住一块，女的住一块，要想并房，还得经过批准。”大台公社懒汉崔来田造谣说：“这回寡妇要和光棍住在一起了。”","type":"appellation"},{"text":"3、关于吃饭的谣言：地主分子王惠英造谣说：“听说成立人民公社后，都得吃白薯面。”伪警察所长黄经纬造谣说：“不知在那儿，人们入社后，大人孩子都吃不饱，所有人都饿得哭了。”西城区还发现“今后回民和汉民放在一起了”的谣言。","type":"paragraph"},{"text":"4、其他：昌平区发现“信用社存款不许取了”，“布票过‘十一’就二折一”的谣传。门头沟刑满释放的反革命分子高奉宽散布谣言说：“票子要盖戳了，不盖戳不能花了。”西城区有人传说：“入公社大口小口都得交七块钱。”门头沟大台村有人造谣说：“年下(指年底)要天下大乱，到那时，就谁也顾不了谁了”。","type":"paragraph"},{"text":"少数地富反坏右分子反动气焰嚣张，公开抗拒人民公社运动。伪军赵智孝公开对街坊说：“把我脑袋打开，我也不入食堂。”地主分子聂维笃非常可恶地说：“入社！我把东西全他妈的砸了！”有的并煽动群众，阻止群众入社。反动分子赵景向群众煽动说：“叫入人民公社，就不入，叫开会，就说没工夫去。”由于他的煽动，当时有四户没有报名参加。有的敌人还公开谩骂积极分子和民警，甚至写反动传单和反动信。反动分子王希文当积极分子动员他把多余的房子拿出来交给公社时说：“现在把人都归公了，又叫我拿房，我就是不拿，怎么着吧！”9月28日椿树胡同派出所户口箱内发现一张反动传单，内答是“我坚决不拥护人民公社”。","type":"paragraph"},{"text":"有的剥削阶级分子寻找各种借口，拒绝入社，有的甚至进行破坏。富农分子罗山借口“不吃荤”，拒绝参加公社。资本家老婆鲁玉珍(其丈夫在香港作买卖)说：“人民公社生活集体化，我可不行，我有的是钱，吃不了大锅饭。”资本家薛顺明公开对人说：“别人说共产主义是天堂，人民公社是桥梁，我看人民公社就是窝窝头，让我死也不入社，如果谁强迫我，我就得拉上一个。”","type":"paragraph"},{"text":"来源：1958年10月30日新华通讯社编《内部参考》。","type":"paragraph"}],"comments":[],"origin":"美国图书馆收藏","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2b71498fdd"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
