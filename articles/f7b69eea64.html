:[],"dates":[{"year":1961,"month":3}],"is_range_date":false,"parts":[{"text":"林彪关于部队管理教育的五条指示","type":"title"},{"text":"我军的管理教育工作，必须坚持五条原则：","type":"paragraph"},{"text":"一、既要负责管理，严格要求，防止把部队搞得松松垮垮，又要耐心说服教育，讲究方式方法，防止简单粗暴。","type":"paragraph"},{"text":"二、既要以表扬好人好事和进行正面教育为主，又要对一般性的缺点和错误，进行个别谈话或者班、小组的批评。","type":"paragraph"},{"text":"三、既要官管兵，又要动员兵管兵。","type":"paragraph"},{"text":"四、既要进行深入细致的思想工作，又要热情关怀和帮助解决实际困难，干部并应事事以身作则。","type":"paragraph"},{"text":"五、既要有严格的军容风纪和正规的生活秩序，又要使部队活泼愉快、官兵融洽无间。","type":"paragraph"}],"comments":[],"origin":"《林彪元帅文集》（下册），香港凤凰书品， 2016年。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"林彪","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f7b69eea64"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
