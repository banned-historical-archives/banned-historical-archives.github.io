ical-archives/banned-historical-archives8/main/maoquanji10.pdf"],"article":{"title":"关于周恩来赴南京谈判内容的批复","alias":"","parts":[{"type":"paragraph","text":"关于周恩来赴南京谈判内容的批复！"},{"type":"paragraph","text":"（1937年3月5日）万万火急周："},{"type":"paragraph","text":"（甲）总部直属队即以前后方两特务团编成，人数约一千五百，其余均机关，旅长人选及部队编成候彭、任提出意见再复，其余均同意。"},{"type":"paragraph","text":"（乙）与我们发表宣言同时，要求国民党亦发表宣言形式之公开文件，承认我们之合法地位。"},{"type":"paragraph","text":"（丙）行政区设主席与委员会制为宜，经费（包括保安团队在内）每月三十万，又收回苏票3二百万。"},{"type":"paragraph","text":"（丁）党员数告以尚待清查，但总数佑计约十万，苏区白区各半。暂以周、叶二人参加国会议，毛不参加。林为特区主席，也参加经委。"},{"type":"paragraph","text":"[1]这是毛泽东和洛甫（张闻天)给周恩来的急电。[2]指彭德怀、任弼时。[3]即第二次国内革命战争时期中华苏维埃国家银行发行的纸币。[4]指周恩来、叶剑英。[5]原文如此，似漏“防”字。（戊）请将伙食费与增援西路军二事日内办妥。"},{"type":"paragraph","text":"洛毛"},{"type":"paragraph","text":"五日二十一时并告彭、任。"}],"authors":["毛泽东"],"dates":[{"year":1937,"month":3,"day":5}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":236,"page_end":237},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d7e11edbe3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
