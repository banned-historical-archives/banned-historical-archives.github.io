script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"慕尼黑的历史教训决不能忘  比利时《光明和被剥削者》揭露欧安会是慕尼黑在当前的翻版","authors":[],"dates":[{"year":1977,"month":10,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"慕尼黑的历史教训决不能忘"},{"type":"paragraph","text":"比利时《光明和被剥削者》揭露欧安会是慕尼黑在当前的翻版"},{"type":"paragraph","text":"新华社布鲁塞尔一九七七年九月二十九日电　比利时刊物《光明和被剥削者》最近一期发表文章，要求人们不要忘记慕尼黑的历史教训。"},{"type":"paragraph","text":"文章说，一九三八年九月签订的慕尼黑协定，“标志着在侵略者面前畏缩和投降”。当时德国帝国主义是后起的帝国主义，是各国人民最危险的敌人。"},{"type":"paragraph","text":"文章在回顾了当时欧洲发生的事情后警告人们不要忽视历史的教训。文章说，“今天，苏联和美国两个超级大国，是各国人民的主要敌人。”“后起的帝国主义——苏联社会帝国主义，是世界上主要的战争策源地”。"},{"type":"paragraph","text":"文章指出，苏联社会帝国主义“使用了同希特勒一样的手法：越加紧侵略，就越谈论和平；越是准备新的世界大战，就越谈论缓和。它利用了赫尔辛基欧洲安全会议这个圈套，并且准备在贝尔格莱德（会议上）再来一次。赫尔辛基（会议），这是慕尼黑在当前的翻版！”"},{"type":"paragraph","text":"据新华社一九七七年九月二十七日讯 吉隆坡消息：马来西亚《光华日报》九月二十四日发表社论说：“美苏被指为‘新世界大战的战争根源，尤其以苏联为危险’，是有根据的，并非危言耸听！”"},{"type":"paragraph","text":"社论指出，苏联在“欧安会”以后立即实行使武器现代化的计划，准备发展新型导弹等，寻求战略优势。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"31338261fb"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
