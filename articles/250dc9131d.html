authors":[],"dates":[{"year":1976,"month":4,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　在反击右倾翻案风伟大斗争深入发展的大好形势下，在以革命样板戏为标志的文艺革命胜利进军声中，上海人民出版社编辑出版的《文艺评论》丛刊即将与广大工农兵读者见面。"},{"type":"paragraph","text":"《文艺评论》丛刊以马克思主义关于无产阶级专政的理论为指导，以阶级斗争为纲，坚持党的基本路线，坚持毛主席革命文艺路线，批判反革命修正主义文艺路线，坚持文艺为工农兵服务、为社会主义服务、为无产阶级政治服务的方向，为进一步贯彻执行党的“百花齐放、百家争鸣”等一系列方针政策，活跃文艺评论，为巩固无产阶级专政，为在文艺领域内实行无产阶级对资产阶级的全面专政而努力奋斗。"},{"type":"paragraph","text":"为了欢呼文化大革命胜利十周年，《文艺评论》丛刊第一辑以主要篇幅发表了《文艺作品要努力反映文化大革命》的“笔谈会”专栏文章。其中，有对反映文化大革命的优秀影片《春苗》的编剧、导演、表演、摄影、美术等各方面的评论和创作体会文章；有对“努力反映文化大革命的斗争生活”征文选《序曲》(《朝霞》丛书)的评论；有对表现文化大革命中涌现的新生事物的一些文学、戏剧、美术作品的评论。在这个专栏中，还热情地推荐了《上山下乡知识青年创作丛书》，发表了有关的评论和创作体会文章。"},{"type":"paragraph","text":"为了密切配合现实的阶级斗争，《文艺评论》丛刊第一辑还有“评论《水浒》，反修防修”、“学习鲁迅”、“学习革命样板戏”等专栏，发表了有关文章。这些文章是对党内那个不肯改悔的走资派诬蔑、攻击评论《水浒》和学习革命样板戏的有力反击。"},{"type":"paragraph","text":"《文艺评论》丛刊系不定期刊物。在《文艺评论》丛刊第一辑的编辑、出版过程中，上海人民出版社坚持“开门办社”的方针，坚持开展三结合评论活动，在党的领导下，组织专业和业余的评论作者认真学习马列著作、毛主席著作，学习社会，调查研究，注意无产阶级文艺评论队伍的建设，并写出了一批有战斗力的文艺评论文章。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"name":"上山下乡","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"250dc9131d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
