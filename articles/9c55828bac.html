art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"向毛主席递交国书","authors":["刘东波"],"parts":[{"type":"paragraph","text":"据新华社17日讯 埃及共和国首任驻华特命全权大使哈桑·拉加卜在17日偕商务代表法尔和副代表孟大维向中华人民共和国主席毛泽东递交国书。"},{"type":"paragraph","text":"递交国书时，拉加卜大使致颂词，毛泽东主席致答词。"},{"type":"paragraph","text":"拉加卜大使并且代表纳赛尔总统向毛泽东主席赠送了精美的礼品。"},{"type":"paragraph","text":"拉加卜大使在颂词中，表示感谢中国在埃及恢复它在苏伊士运河的全部权利和主权时所采取的崇高立场和所给予的坚决支持。"},{"type":"paragraph","text":"毛泽东主席在答词中说，中国政府和中国人民将尽一切可能支持埃及人民维护苏伊士运河主权的英勇斗争，并且相信在这一斗争中埃及人民一定会取得最后的胜利。"},{"type":"paragraph","text":"埃及驻中国首任特命全权大使哈桑·拉加卜将军向毛泽东主席递交国书。"},{"type":"paragraph","text":"新华社记者 刘东鳌摄"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9c55828bac"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
