ors":[],"dates":[{"year":1969,"month":3,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京二十日电　中共中央政治局常委周恩来同志、康生同志，最近会见了缅甸共产党副主席、缅甸共产党中央代表团团长德钦巴登顶，缅甸共产党中央委员、代表团团员德钦佩丁等同志，吊唁缅甸共产党主席德钦丹东同志的牺牲。会见时，周恩来同志和康生同志代表中国人民的伟大领袖毛泽东主席、林彪副主席和中共中央、中央文革，对德钦丹东同志的牺牲，向德钦巴登顶、德钦佩丁同志，并通过他们向缅共中央，表示深切的哀悼。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"康生","type":"人物"},{"name":"中央文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7bcc766d72"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
