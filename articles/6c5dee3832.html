authors":["费孝通"],"dates":[{"year":1957,"month":6,"day":25}],"is_range_date":false,"parts":[{"text":"费孝通在6月25日民盟中央扩大座谈会上的交代","type":"title"},{"text":"费孝通","type":"authors"},{"text":"……费孝通在25日民盟中央举行的扩大座谈会上“承认罗隆基在人代大会和政协会议上的发言，都是找他、吴景超、潘光旦三个人商量过的。”","type":"paragraph"},{"text":" (见1957年6月26日“光明日报”第1版)","type":"paragraph"},{"text":"费孝通说，他的有些思想和罗隆基是一致的，有些则不同。他说，罗隆基写发言稿时，老是找他、吴景超、潘光旦一起谈。罗隆基认为“正派”的知识分子是保留着资产阶级思想的那些人，凡是进步的都被他称为“教条主义者”，他说，邓初民就是“教条主义”最突出的一个。罗隆基最讨厌进步分子，认为他们是“观风色，看气候，扣帽子，打冷拳”的人物。他认为那些思想落后的人是有本事的。他要他们：“不必低估自己以往的工作和成绩”，不要“妄自菲薄”，要他们“各凭本事，各显神通”。费孝通说，罗隆基所指的本事实际上就是受资产阶级思想所支配的那一套。","type":"paragraph"},{"text":"费孝通指出，罗隆基这几年来一直讨厌思想改造，说知识分子不喜欢这个名词。罗隆基认为知识分子和党的距离是思想改造运动搞出来的。思想改造和肃反是造成党和非党隔膜的原因，所以他要求党以“国士”对待知识分子，不这样，他们就不肯把力量发挥出来。","type":"paragraph"},{"text":"费孝通说罗隆基把盟北京市委的“争鸣”刊物夺过来据为己有，企图把这个刊物变成反社会主义的刊物。","type":"paragraph"},{"text":" (见1957年6月26日《人民日报》第2版)","type":"paragraph"},{"text":" 来源：《揭露和批判章罗联盟的军师-费孝通》，中央民族学院整风办公室编印，1957年8月。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6c5dee3832"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
