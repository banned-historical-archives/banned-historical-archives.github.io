":[{"year":1976,"month":11,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"打倒“四人帮”  各族人民心花放"},{"type":"paragraph","text":"广西东兴万尾大队党支部书记　黄玉春（京族）"},{"type":"paragraph","text":"红色电波传来了特大的喜讯，地处北部湾畔的万尾岛顿时欢声雷动。无限忠于毛主席革命路线的京族人民，个个心花怒放，喜笑颜开。大家迅速地汇集在一起，举行庆祝大会，坚决拥护华国锋同志任党中央主席、中央军委主席，热烈欢呼粉碎王洪文、张春桥、江青、姚文元“四人帮”反党集团的伟大胜利。"},{"type":"paragraph","text":"葵花永远向太阳，京族人民永远怀念伟大领袖毛主席。在那黑暗的旧社会，万尾岛财主当道，渔霸横行，京族人民处于水深火热之中。"},{"type":"paragraph","text":"一九四九年，伟大领袖毛主席派来了亲人解放军，从此京族人民才见了天日，当了主人。我们永远不会忘记，是大救星毛主席领导我们打倒地主、渔霸，走上社会主义道路，过上了幸福生活。“四人帮”反党集团，肆意篡改毛主席的指示，在国内国际一系列问题上反对毛主席的革命路线，搞修正主义，搞分裂，搞阴谋诡计，妄图篡党夺权。如果他们的阴谋得逞，资本主义就要复辟，我们就要吃二遍苦。“四人帮”是京族人民的不共戴天的死敌。以华国锋主席为首的党中央，继承毛主席的遗志，清除了“四人帮”，我们万分高兴，坚决拥护！"},{"type":"paragraph","text":"过去，我们万尾大队浮沙遍地，群众吃水困难。在文化大革命中，我们发扬自力更生、艰苦奋斗的革命精神，修筑了一条底宽二十米、长一千八百米的拦海大堤，使清清的河水沿着渠道流进海岛，同时，堵海造田，扩大耕地面积。同一九六五年比，粮食总产量增加了三倍，渔业总产量增加了四倍。海岛面貌焕然一新，欣欣向荣。我们大队有今天，完全是毛泽东思想照耀的结果。“四人帮”疯狂反对马克思主义、列宁主义、毛泽东思想，妄图把各族人民往修正主义邪路上引，实在是罪大恶极。"},{"type":"paragraph","text":"华国锋同志任党中央主席、中央军委主席，是伟大领袖毛主席生前的英明决策，代表了各族人民的根本利益和共同愿望。粉碎“四人帮”的果断措施，进一步证明，华国锋主席同全国人民心连心，是忠实继承毛主席遗志，坚定不移地执行和捍卫毛主席革命路线的杰出领袖，我们京族人民完全信得过，打心眼里拥护。我们一定要最紧密地团结在以华国锋主席为首的党中央周围，一切行动听党中央的指挥，同王张江姚反党集团作坚决的斗争，把毛主席开创的无产阶级革命事业进行到底！"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"华国锋","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"四人帮","type":"人物"},{"name":"夺权","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"48ce1b4655"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
