art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"彻底批判林彪资产阶级军事路线","authors":[],"parts":[{"type":"paragraph","text":"北京卫戍区某部六连和北京部队某部八连指战员，在深入开展批林批孔运动中，认真学习毛主席在解放战争时期的一系列光辉著作，掌握马克思主义、列宁主义、毛泽东思想的理论武器，揭露和批判林彪在辽沈、平津两大战役中的右倾机会主义立场、千方百计地干扰和破坏毛主席的战略决策和作战方针的滔天罪行。通过学习和批判，剥掉了林彪这个所谓“常胜将军”、“天才军事家”、“一贯正确”的画皮，更加认清了林彪修正主义路线的极右实质。"},{"type":"paragraph","text":"北京卫戍区某部六连指战员，从揭露和批判林彪在辽沈、平津两大战役中的右倾机会主义路线入手，深入批判林彪资产阶级军事路线。"},{"type":"paragraph","text":"北京卫戍区某部六连在批林批孔中，用辽沈、平津两大战役的历史图片资料，帮助大家弄清历史事实，深入批判林彪破坏辽沈、平津战役的罪行。"},{"type":"paragraph","text":"北京部队某部八连指战员把学习毛主席军事著作和深入批判林彪资产阶级军事路线紧密地结合起来，用学习带动批判，以革命大批判促进学习。这是战士们在认真学习毛主席著作。"},{"type":"paragraph","text":"北京部队某部团长郭忠田向八连战士讲述辽沈、平津战役时毛主席的英明决策，用事实进一步批判林彪推行右倾机会主义路线的罪行。"},{"type":"paragraph","text":"北京部队某部八连党支部在开展批判林彪资产阶级军事路线中，充分发挥战士理论队伍的作用，组织理论小组成员先学先批，边学边批，总结经验，在全连推广。"},{"type":"paragraph","text":"北京卫戍区某部六连炮班，以毛主席的十大军事原则为武器，揭发批判林彪鼓吹打击溃战和得不偿失的消耗战，反对打歼灭战的所谓“六个战术原则”。（本组照片均为新华社记者摄）"}],"alias":""},"tags":[{"name":"林彪","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"批林批孔","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2bf58b6603"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
