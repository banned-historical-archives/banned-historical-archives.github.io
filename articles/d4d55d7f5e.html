script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"历史教学与评论《水浒》紧密结合上海师大历史系师生员工通过评论，认清《水浒》的要害是宣扬投降主义，从而提高识别投降派和修正主义的能力","authors":[],"dates":[{"year":1975,"month":9,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　上海师范大学历史系师生员工认真学习毛主席关于评论《水浒》的重要指示，并根据斗争需要积极组织教学，使教学工作为评论《水浒》服务。"},{"type":"paragraph","text":"这个系的师生认真学习了毛主席关于评论《水浒》的重要指示，学习了《人民日报》社论和《红旗》杂志第九期短评以后，立即投入评论《水浒》的战斗。在学习毛主席关于评论《水浒》重要指示的同时，系党总支还组织大家学习了毛主席《中国革命和中国共产党》、《在延安文艺座谈会上的讲话》、《关于正确处理人民内部矛盾的问题》、《在中国共产党全国宣传工作会议上的讲话》等光辉著作中的有关章节和关于评论《红楼梦》、批判坏电影《武训传》等指示，使大家提高了对评论《水浒》重大意义的认识。大家说，《水浒》从明朝问世以来，许多人受蒙蔽，我们过去虽然也看到宋江是受“招安”的，但很少认识到这是投降主义，没有看清《水浒》是部反面教材。现在学习了毛主席的重要指示，受到深刻的教育，认识到:认清古代投降派的真面目，有助于识别现代的投降派。从《水浒》这部反面教材中吸取教训，总结历史经验，学会在复杂的斗争中识别正确路线和错误路线，这是反修防修、巩固无产阶级专政的大事，我们一定要积极投入这场具有重大、深刻意义的斗争，在斗争中批判学科领域中那些把投降主义说成是“农民的局限性”之类的阶级调和论，进一步改造历史学科，实现无产阶级对资产阶级的全面专政。"},{"type":"paragraph","text":"历史系还根据评论《水浒》的需要组织教学，重点帮助大家认清《水浒》的要害是宣扬投降主义及宋江推行的投降主义路线，提高识别投降派和修正主义的能力。中国古代史教学不再按部就班地讲授先秦、两汉内容，而是把有关两宋的教学提前进行，并且把原来准备的两宋内容作了若干调整，结合评论《水浒》，进行专题讲座，计有:宋朝政治经济状况与农民起义的关系、无产阶级文化大革命以来对《水浒》评论的情况、宋元理学与《水浒》宣扬的投降主义的关系、《水浒》出笼的背景、金圣叹评注《水浒》等方面的内容，有的已作了专题报告。中共党史教研组在教学方面正积极准备突出关于机会主义路线头子都是投降派这一方面的内容。世界史教研组也重点准备在资产阶级革命史和国际共产主义运动史教学中分清革命派和投降派方面的内容。历史系的同志还围绕评论《水浒》的要求，结合教学与教材编写工作，着手编写专题资料。"},{"type":"paragraph","text":"这个系的师生们以极大的政治热情投入评论《水浒》的斗争。连日来，有的同志每天战斗到深夜，有的同志在星期天也坚持战斗，有的同志在食堂、寝室里展开热烈的争论。师生间相互取长补短，教师认真辅导学员，学员也对教师的讲稿提出修改意见。在结合战斗任务组织教学的过程中，师生们初步确定和开始讨论宋江推行投降主义路线的三部曲、宋江与武训、宋江是地主阶级的一派、《水浒》出笼迎合了地主阶级的需要等题目。师生们在讨论之后陆续撰写专题文章，并且在班组学习、评论的基础上，积极准备全系大会，揭露宋江这个隐藏在农民起义队伍内部的地主阶级分子的丑恶面目，分析批判宋江的投降主义路线。通过对《水浒》的评论和讨论，大家决心进一步学习无产阶级专政理论，批判林彪反革命的修正主义路线，把上层建筑领域的社会主义革命进行到底。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"name":"人民内部矛盾","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d4d55d7f5e"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
