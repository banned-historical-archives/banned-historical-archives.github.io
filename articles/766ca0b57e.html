hors":["周恩来"],"dates":[{"year":1968,"month":5,"day":2}],"is_range_date":false,"parts":[{"text":"周恩来就限期收回被抢武器对新疆军区的指示","type":"title"},{"text":"周恩来","type":"authors"},{"text":"〖时间：八点十分〗","type":"appellation"},{"text":"总理办公室周家鼎同志传达总理指示：","type":"paragraph"},{"text":"三促最近抢枪很凶，总理让我告诉军区，让郭鹏同志对三促做工作，所抢的武器要限期收回，全部交回，否则要通报全国。这种做法是违反《九 · 五》命令的，是不允许的。限期交回（期限 总理没有讲，请军区考虑），否则要通报全国，一通报，他们就要垮台。据说，三促几次冲击空九军。代表都在这里，有什么问题不能解决？为什么要这样搞？总理说：请军区出面谈。","type":"paragraph"},{"text":"周家鼎同志说：","type":"paragraph"},{"text":"这是总理指示，你就这样转告军区首长。总理要我直接告诉郭鹏同志，请你转告一下。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"新疆文革","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"766ca0b57e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
