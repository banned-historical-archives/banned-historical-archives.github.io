script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"美参议院通过肯尼迪扩军备战措施美资产阶级政客要美国“作出一切牺牲”支持肯尼迪","authors":[],"dates":[{"year":1961,"month":7,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【据新华社北京28日电】　华盛顿消息:美国参议院军事委员会27日在听取了国防部长麦克纳马拉和参谋长联席会议主席兰尼兹尔的作证后，迅速通过了肯尼迪在26日向国会提出的动员二十五万后备役人员服现役一年和为美国陆、海、空军购买飞机、舰只和导弹拨款九亿五千八百万美元等加强扩军备战的措施。"},{"type":"paragraph","text":"美国民主党和共和党的资产阶级政客们在肯尼迪演说后也发出好战叫嚷，表示支持肯尼迪的疯狂扩军措施。参议院共和党议员举行政策会议后宣布，他们将与民主党议员合作以加速通过肯尼迪要求增加军费与扩充军队的法案。"},{"type":"paragraph","text":"参议院共和党领袖德克森27日发表声明叫嚷说，那些“认为美国不会尽一切力量——包括进行核战争——来履行它在欧洲承担的义务”的想法是完全“错误的”。"},{"type":"paragraph","text":"众议院共和党领袖哈勒克在27日说，要求政府削减非军用的国内开支，“勒紧裤带”来执行肯尼迪加紧扩军备战的计划。"},{"type":"paragraph","text":"前共和党全国委员会主席、参议员摩顿26日要求美国要“作出一切牺牲”来支持肯尼迪的计划。"},{"type":"paragraph","text":"前美国副总统尼克松27日也发表声明支持肯尼迪加速扩充军备的计划。尼克松除了赞成增拨大量军费外还要求肯尼迪政府赶快恢复核武器试验，并采取行动推翻古巴革命政府。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"79872b01e3"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
