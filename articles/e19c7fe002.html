tart":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"为执行毛主席革命路线自觉艰苦奋斗","authors":[],"parts":[{"type":"paragraph","text":"本报讯 八三二五部队十四连，分散在二十多个点、一百多里长的线上执行战备任务。大多数点设在千米以上的山顶，生活条件比较艰苦。连队党支部遵照伟大领袖毛主席关于“没有艰苦奋斗的工作作风，也就不能执行坚定正确的政治方向”的教导，经常教育全连同志继承和发扬我军艰苦奋斗的光荣传统，提高执行毛主席革命路线的自觉性，完成上级交给的战备任务。"},{"type":"paragraph","text":"有一个时期，这个连有的同志对艰苦奋斗的意义认识不足，党支部组织大家反复学习毛主席关于发扬艰苦奋斗的工作作风与坚持坚定正确的政治方向的关系的论述，回顾连队在某地执行生产任务时，遵照毛主席关于自力更生，艰苦奋斗的伟大教导，用铁镐、大锤、钢钎，在冰天雪地里开出荒地，生产几十万斤粮食，沿着毛主席革命路线不断前进的事迹。大家认识到：艰苦奋斗是我军的光荣传统，也是贯彻执行毛主席革命路线的重要保证。永远保持和发扬这一光荣传统，才能保持人民军队的本色。同志们都从贯彻执行毛主席革命路线的高度，自觉发扬艰苦奋斗的革命精神。八班住在一座近两千米的高山上，粮食蔬菜不能用车运，他们就一袋一捆地往山上背；山上没有水源，冬天大雪封了路，他们就化雪水吃。艰苦的环境磨练了同志们的革命意志，大家说：“为了保卫祖国，为了执行毛主席的革命路线，我们愿意自觉地吃苦。”几年来，他们胜利完成了上级交给的战备任务，被树立为部队学习毛主席著作先进集体。"},{"type":"paragraph","text":"十四连党支部体会到，要使我军艰苦奋斗的光荣传统发扬光大，关键是干部要做艰苦奋斗的带头人。连长郑乃俭常年和战士们一道抡铁镐搞生产，风雨无阻；指导员黎茂洪经常深入班里做耐心细致的思想工作。在干部的影响带动下，战士们更加发扬艰苦奋斗的精神，自觉在艰苦环境中磨练自己。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e19c7fe002"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
