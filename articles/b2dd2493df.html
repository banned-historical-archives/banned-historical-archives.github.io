ical-archives/banned-historical-archives8/main/maoquanji17.pdf"],"article":{"title":"给谢觉截“的信","alias":"","parts":[{"type":"paragraph","text":"给谢觉哉的信"},{"type":"paragraph","text":"（1942年9月15日）谢老："},{"type":"paragraph","text":"六日函悉。死者已矣，生者务宜注意。关于你及林老的工作及生活，亟宜有所调节，务不过劳，文章亦不宜写得太多，请加考虑为盼！"},{"type":"paragraph","text":"敬礼！"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"九月十五日罗迈\"到政府工作，许多事可交给他做。[1]谢觉哉，当时任陕甘宁边区参议会副议长。[2]指王凌波。他是谢觉哉的同乡和好友，生前任延安行政学院副院长。[3]指林伯渠。当时任陕甘宁边区政府主席。[4]罗迈，即李维汉。1940年10月起任中共中央宣传部副部长。1942其。死，生者室"},{"type":"paragraph","text":"你的拌茗介级亟空有所同吊诱不道"},{"type":"paragraph","text":"壁写及事清"},{"type":"paragraph","text":"TAZA"},{"type":"paragraph","text":"逼所的样作，停字事候毛泽东致谢觉哉信的手稿。"}],"authors":["毛泽东"],"dates":[{"year":1942,"month":9,"day":15}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":151,"page_end":152},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b2dd2493df"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
