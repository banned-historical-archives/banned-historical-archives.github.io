authors":[],"dates":[{"year":1970,"month":4,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京二十九日电　中国共产党中央委员会毛泽东主席、中国共产党中央委员会林彪副主席、中华人民共和国国务院总理周恩来，收到了老挝爱国战线党中央委员会主席苏发努冯亲王发来的电报。电报最热烈地祝贺中国成功地发射了第一颗人造地球卫星。电报全文如下:"},{"type":"paragraph","text":"北京"},{"type":"paragraph","text":"中国共产党中央委员会主席毛泽东阁下，"},{"type":"paragraph","text":"中国共产党中央委员会副主席林彪阁下，"},{"type":"paragraph","text":"中华人民共和国国务院总理周恩来阁下:"},{"type":"paragraph","text":"值此中华人民共和国第一次成功地发射人造地球卫星之际，我谨代表老挝人民、老挝爱国战线党，并以我个人的名义向你们致以亲切的敬意和最热烈的祝贺。"},{"type":"paragraph","text":"中国人民在以敬爱的毛泽东主席为首的中国共产党和中国政府的领导下，在成功地发射人造地球卫星方面取得了巨大的成就，这标志着伟大的社会主义的中华人民共和国在宇宙科学和技术的领域中取得了新的进展，对发展为人类利益服务的科学和技术事业做出了十分重大的贡献。"},{"type":"paragraph","text":"老挝人民、老挝爱国战线党对兄弟的中国人民所取得的这一新的辉煌胜利，感到无比欢欣和振奋。我们把你们的胜利，看成是对我们的神圣的抗美救国的抗战事业的一个巨大鼓舞。"},{"type":"paragraph","text":"老挝人民、老挝爱国战线党衷心祝愿兄弟的中国人民在以敬爱的毛主席为首的中国共产党、中华人民共和国政府的领导下，在发展科学技术和在中国建设社会主义的事业中，取得新的、更加巨大的胜利，为保卫亚洲和世界和平作出贡献。"},{"type":"paragraph","text":"趁此机会，我们谨向为这一成就作出贡献的中国全部干部、工人、人民解放军战士和科学技术工作者致以最热烈的祝贺。"},{"type":"paragraph","text":"老挝爱国战线党中央委员会主席"},{"type":"paragraph","text":"苏发努冯亲王"},{"type":"paragraph","text":"一九七○年四月二十六日于桑怒"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3274988526"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
