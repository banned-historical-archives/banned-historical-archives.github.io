rt":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"《毛泽东选集》第三卷日、俄文版出版毛主席的两篇光辉著作在尼泊尔出版","authors":[],"parts":[{"type":"paragraph","text":"新华社三十一日讯 《毛泽东选集》第三卷的日文版和俄文版，最近已由北京外文出版社出版。至此，《毛泽东选集》日文版已出版了第一卷至第三卷，俄文版第一卷至第四卷已经出齐。"},{"type":"paragraph","text":"《毛泽东军事文选》英文版五十开本的袖珍本，也已由北京外文出版社出版。"},{"type":"paragraph","text":"已经由北京外文出版社出版的，还有《毛主席论人民战争》的英、法、西、俄、日、德、阿拉伯、越南、世界语、泰、缅甸、印尼、印地、葡萄牙、意大利等十五种文字的版本。"},{"type":"paragraph","text":"《毛主席的六篇军事著作》的泰、缅甸文版也已经出版。"},{"type":"paragraph","text":"新华社加德满都三十一日电 伟大导师毛主席的光辉著作《矛盾论》最近已翻译成尼泊尔文，在尼泊尔首都加德满都出版。"},{"type":"paragraph","text":"毛主席的另一篇光辉著作《抗日战争胜利后的时局和我们的方针》最近也已译成尼泊尔文，在加德满都出版。"},{"type":"paragraph","text":"伟大导师毛主席的这两篇光辉著作受到尼泊尔人民的热烈欢迎。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"人民战争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d27cd10968"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
