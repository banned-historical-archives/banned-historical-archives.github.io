<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"因为这是毛主席的书","authors":["向线"],"dates":[{"year":1966,"month":12,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"因为这是毛主席的书"},{"type":"paragraph","text":"向线"},{"type":"paragraph","text":"一天早晨，有一列开往沈阳的火车，离开车时间只有一个小时了。"},{"type":"paragraph","text":"一辆满载货物的汽车，朝车站飞奔。汽车刚刚停稳，从驾驶座里跳出两个满脸大汗的解放军战士。他俩急忙跑到行李房，办理托运手续。行李员一看满满一车物资，便吃惊地问道：“快开车了，怎么来这么晚呐？”这两个战士边擦着脸上的汗边说：“这是毛主席著作。印刷厂的工人同志，为了使毛主席的书早点和战士们见面，加班加点赶印出来，刚刚整好就运来了。”行李员听说是运送毛主席著作，急忙问道：“多少件，到哪里下车？”一听说是到一个小车站下车，行李员更加着急了。因为在这个车站，火车只停一分钟，这么多书，按规定要分三次才能运完。“怎么办？”行李员一面想，一面说：“这是毛主席的书，应该想办法早点送到解放军同志们手里。”说完便往车站里跑去。"},{"type":"paragraph","text":"不一会，行李员跑回来高兴地对这两个战士说：“领导上决定，这次咱们打破旧框框，什么时候卸完，什么时候开车。”车站领导一面组织职工抢装，一面通知这个小站组织人力准备抢卸。工人们为了把毛主席著作装上火车，飞快地奔跑着，很快把一大汽车毛主席著作搬上了火车。列车长鸣一声，直奔前方。"},{"type":"paragraph","text":"这个小站的工人们听说要卸毛主席著作，都感到很高兴，他们早已做好一切准备，在站台等候。"},{"type":"paragraph","text":"列车一到站，工人们就赶忙抢卸。有的旅客听说是抢卸毛主席著作，也主动参加了这场光荣的劳动。大家同心协力，不到两分钟，就把毛主席著作全部卸下来了。"},{"type":"paragraph","text":"工人们面对着这一大堆毛主席著作，心里有说不出来的高兴。有的说："},{"type":"paragraph","text":"“我们车站卸下这么多毛主席的书，这还是头一回。书虽然不是给我们的，但是，我们要让解放军同志早点读到毛主席的书，这是我们最大的责任。”他们为了尽快把书送到战士们手里，把全站的职工、家属、少先队员都动员起来了，大家都说：“解放军上战场杀敌人靠的是毛泽东思想，我们给解放军运毛主席著作，这就是最好的武器，是对解放军最大的支援！”大家推的推，抬的抬，挑的挑，扛的扛，仅仅用了两个来小时，把运来的毛主席著作送到了部队驻地。"},{"type":"paragraph","text":"铁路职工、家属对毛主席著作无比热爱的实际行动，有力地鼓舞着每一个干部、战士。大家纷纷表示，要像铁路工人那样无限热爱我们的伟大领袖毛主席，像他们那样无比热爱毛主席著作。大家决心更加努力活学活用毛主席著作，把毛主席的书当成各项工作的指导方针，真正把毛泽东思想学到手，真正贯彻到行动中去。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1cc9ab0eab"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
