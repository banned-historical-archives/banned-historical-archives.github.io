" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji40","name":"毛泽东全集第40卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji40.pdf"],"article":{"title":"记者头脑要冷静","alias":"","parts":[{"type":"paragraph","text":"记者头脑要冷静川"},{"type":"paragraph","text":"（1958年11月21日）"},{"type":"paragraph","text":"做报纸工作的，做记者工作的，对遇到的问题要有分析，要有正确的看法、正确的态度。"},{"type":"paragraph","text":"矛盾有正面，有侧面。看问题一定要看到矛盾的各个方面。群众运动有主流，有支流。到下面去看，对运动的成绩和缺点要有辩证的观点，不要把任何一件事情绝对化。好事情不要全信，坏事情也不要只看到它的消极一面。比方瞒产，我对隐瞒产量是寄予同情的。当然，不说实话，是不好的。但是为什么瞒产？有很多原因，最主要的原因是想多吃一点，值得同情。瞒产，除了不老实这一点以外，没有什么不好。隐瞒了产量，粮食依然还在。瞒产的思想要批判，但是对发展生产没有大不了的坏处。"},{"type":"paragraph","text":"虚报不好，比瞒产有危险性。报多了，拿不出来。如果根据多报的数字作生产计划，有危险性，作供应计划，更危险。"},{"type":"paragraph","text":"记者到下面去，不能人家说什么，你就反映什么，要有冷静的头脑，要作比较。"},{"type":"paragraph","text":"强迫命令，不好。一定的命令还是需要的。如果什么事情都命令，就不好了。有些事情也并非强迫命令，例如党委的决议，一定"},{"type":"paragraph","text":"[1]这是毛泽东和新华通讯社社长、《人民日报》总编辑吴冷西谈话的要点。毛泽东全集第四十卷要照办。总要有集中。集中的过程要有民主。要提倡民主作风，反对强迫命令。"},{"type":"paragraph","text":"记者要善于比较。唐朝有一个太守，他问官司，先去了解原告被告周围的人和周围的情况，然后再审原告被告。这叫作“勾推法”。这就是比较，同周围的环境比较。记者要善于运用这种方法。不要看到好的就认为全好，看到环的就认为全坏。如果别人说全好，那你就问一问：是不是全好？如果别人说全坏，那你就问一问：一点好处没有吗？"},{"type":"paragraph","text":"记者的头脑要冷静，要独立思考，不要人云亦云。这种思想方法，首先是各新华分社和《人民日报》的记者、北京的编辑部要有。不要人家讲什么，就宣传什么，要经过考虑。"},{"type":"paragraph","text":"记者，特别是记者头子，头脑要清楚，要冷静。"}],"authors":["毛泽东"],"dates":[{"year":1958,"month":11,"day":21}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":475,"page_end":476},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]},{"id":"maoxuan-jinghuo","name":"毛泽东选集1-7（静火版）","internal":false,"official":false,"author":"静火","type":"pdf","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/maoxuan-jinghuo.pdf"],"article":{"title":"记者头脑要冷静","parts":[{"text":"记者头脑要冷静","type":"title"},{"type":"paragraph","text":"做报纸工作的，做记者工作的
