rs":["[中共沿河县委监委]"],"dates":[{"year":1961,"month":3}],"is_range_date":false,"parts":[{"text":"关于张珍乾的主要错误事实","type":"title"},{"text":"[中共沿河县委监委]","type":"authors"},{"text":"（上缺）张珍乾，男，26岁，家庭贫农，解放前后任小队会计。错误事实：","type":"paragraph"},{"text":"一、逼死人命四条：（1）60年正月崔满三因久病不能出工?麦子，扣饭三天即死。（2）崔二嵬因久病不能放牛被张扣饭5天即死。（3）正月，扣杨心满母女二人五天饭，女儿即死。（4）59年8月车廷富的？？扯海椒吃，被张发现，吊起毒打，小孩被迫外逃谋生，？？？舟路上。","type":"paragraph"},{"text":"二、吊打。60年正月，干部？？不在20斤大米，珍乾抽崔道贵背柴，因肚饿向珍乾的母亲（侯桂香系炊事员）要饭吃，侯不让，被张吊打一顿。","type":"paragraph"},{"text":"三、扣饭。张珍乾在干堡食堂当会计两个月，依使其父亲？？（原任太平生产队分支书记，已撤职劳改）的势力。社员被扣饭的有16人，达90多次，经常打骂群众，如60年2月？？（女）背猪草上街卖，为其哥哥缴学费，为此被张珍乾扣饭四顿。","type":"paragraph"}],"comments":[],"origin":"贵州省某档案馆","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"15c12cd7a8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
