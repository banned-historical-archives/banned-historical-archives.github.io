取把国家粮食库存增加到千亿斤报告的批示","authors":[],"dates":[{"year":1960,"month":1,"day":26}],"is_range_date":false,"parts":[{"text":"中共中央转发粮食部党组关于在今后三年内争取把国家粮食库存增加到千亿斤报告的批示","type":"title"},{"text":"各省、市、自治区党委：","type":"appellation"},{"text":"中央同意粮食部党组《关于在今后三年内争取把国家粮食库存增加到一千亿斤的报告》。中央认为，在今后粮食生产继续跃进的基础上，逐步增大国家粮食储备不仅是必要的，而且是可能的。在三年内把库存增加到一千亿斤，应当作为我们的奋斗目标。责成粮食部迅速提出分省、市、自治区的，分年度的增加库存的指标，作为各地执行的参考。此外，关于人民公社和生产队逐步建立粮食储备问题，也请各地加以注意。","type":"paragraph"},{"text":" 中  央一九六O年一月二十六日","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"011cd67f7a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
