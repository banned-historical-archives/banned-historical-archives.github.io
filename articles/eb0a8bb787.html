es":[{"year":1949,"month":9,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"英共总书记波立特国际妇联主席戈登"},{"type":"paragraph","text":"电毛主席祝贺"},{"type":"paragraph","text":"【新华社布拉格二十五日电】英国共产党总书记波立特致电毛主席祝贺中华人民共和国的成立，电文如下：亲爱的毛同志：当此中华人民共和国成立的时候，我谨致我个人的祝贺之意。"},{"type":"paragraph","text":"我可以向你保证，我们将在我们的能力范围以内尽一切努力，巩固我们两国人民间坚强和持久的良好关系。"},{"type":"paragraph","text":"如果在任何时候，在你们面前的伟大任务当中，你觉得我们能对你和贵党有所帮助时，我们将设法帮助你们，并将以此为荣。谨致衷心贺忱。你的亲如兄弟的哈利·波立特（签字）"},{"type":"paragraph","text":"一九四九年九月二十二日"},{"type":"paragraph","text":"【新华社布拉格二十五日电】国际民主妇女联合会主席欧热妮·戈登电贺毛泽东主席。原文如下：毛泽东主席："},{"type":"paragraph","text":"际此中华人民民主共和国——世界和平的坚强堡垒诞生之际，我们最热烈最愉快地向你敬礼。中华人民民主共和国的诞生对于中国妇女是最高兴的一件事。我们祝你们向着一个繁荣的民主的新中国前进。"},{"type":"paragraph","text":"国际民主妇女联合会主席欧热妮·戈登　一九四九年九月廿四日"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"eb0a8bb787"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
