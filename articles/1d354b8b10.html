:1938,"month":8,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"沪西曹家渡越界区域、向归公共租界当局所管辖、自华军西移以后、遂有“维持会”出现、在某方庇护下、任意搜刮钱财、饱入私囊、商民受其剥削、痛苦不堪、兹悉该处一带摊贩均系小本营生、过去只须向租界当局捐领执照、已可营业、而今因有“维持会”之故、乃须增加负担、据悉无论设摊或为小贩、每日由“维持会”中饬派伪警若干名、分任各摊贩处收取捐款、按其营业收入之多寡、征收捐款、自三百文至数角不等、惟闻如果已向“维持会”捐领月季执照、则此项零星捐款、可以不必缴纳。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1d354b8b10"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
