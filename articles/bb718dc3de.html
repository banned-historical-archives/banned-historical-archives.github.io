"],"dates":[{"year":1967,"month":9,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"紧跟毛主席的伟大战略部署"},{"type":"paragraph","text":"国防工办　国防工政无产阶级革命派"},{"type":"paragraph","text":"听到我们伟大的导师、伟大的领袖、伟大的统帅、伟大的舵手毛主席视察三大区的特大喜讯，国防工办、工政的全体革命群众，心情万分激动，振臂高呼：毛主席万岁！万岁！万万岁！祝愿毛主席万寿无疆！万寿无疆！"},{"type":"paragraph","text":"这个特大喜讯，表明了我们心中最红最红的红太阳毛主席的身体非常健康，这是我们全国人民和全世界革命人民最大最大的幸福！"},{"type":"paragraph","text":"这个特大喜讯，表明了毛主席是当代最伟大的天才，是当代无产阶级最杰出的领袖，最英明的导师。"},{"type":"paragraph","text":"这个特大喜讯，表明了毛主席最深入群众，最相信群众，最依靠群众，最善于集中群众的智慧，始终和革命群众同呼吸，共命运，永远同群众心连心，为全国人民和全世界革命人民树立了极其光辉的典范！"},{"type":"paragraph","text":"这个特大喜讯，表明了每当革命处于最关键的时刻，毛主席总是亲自掌握革命航向，制定战略部署，引导革命人民由胜利走向新的胜利！"},{"type":"paragraph","text":"这个特大喜讯，给我们发出新的战斗号令：我们一定要紧跟毛主席的伟大战略部署，牢牢掌握斗争的大方向，要从思想上进一步巩固和发展革命的大联合，促进革命的“三结合”，深入开展革命的大批判，搞好本单位斗批改，狠抓革命，猛促生产，促战备，促工作，誓把无产阶级文化大革命进行到底，誓把国防工办、工政机关办成红彤彤的毛泽东思想的大学校！"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"革命大批判","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bb718dc3de"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
