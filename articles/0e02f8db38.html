art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"分析矛盾找出课程重点联系实际活学理论原则某机械学校用毛泽东思想改进教学","authors":["王岳风"],"parts":[{"type":"paragraph","text":"本报讯 海军某机械学校运用毛泽东思想指导专业技术训练，取得良好的效果。"},{"type":"paragraph","text":"分析课程主要矛盾，抓住本质，掌握规律，指导教学，是他们普遍采用的一个方法。譬如，有一个教学班在学习电力拖动机械课程时，开始感到舵机电气线路图非常复杂，不容易弄清楚。这时，他们就集中精力分析电力拖动机械的主要矛盾——电动机和工作机主间的矛盾，并研究它们的运动规律，结果很快就分清了主线路、控制线路以及它们的关系与相互作用。在这个基础上，他们又抓住各种线路图的共性，总结出了“电力拖动认图法”的六条规律，对学习其他机械线路图也有一定参考价值。教员和学员一致反映，在教学中抓主要矛盾，由于重点突出，以点带面，对课程学习深透扎实。"},{"type":"paragraph","text":"结合实践活动，活学活用理论，指导教学，是他们采用的另一个方法。在教学中，对凡是能够通过实践活动进行教学的课程，都尽量让学员进行实践。如某教学班学习船舶阻力课程时，首先组织学员到船模实验池进行实验。在实验中，有的操纵拖船，有的观察现象，有的记录情况，画出船在水中航行遇到阻力时所产生的波形，作出抽曳曲线。大家在实践中提出了几十个问题。例如，为什么不同舰艇航行时，造成的水波形状具有不同特点？为什么产生涡流，它们对舰艇起什么作用？为什么舰船水下部分横剖面（船底）的形状不同？等等。这些问题，都是船舶阻力课程基本内容所要回答的问题。在教员指导下，把这些问题分类排队，依次学了磨擦阻力、船形阻力、兴波阻力、飞洙阻力的理论以及它们和舰船主要尺寸与外形间的关系。经过这样一段教学，最后转入设计活动时，因为学员有了一定的感性知识，资料比较丰富，所以就提出了较好的方案。有些专业基础课程的教学，难于让每个学员都进行实验，他们就通过某些实验表演、教具图形等，让学员从观察现象中理解一些抽象的概念和问题的实际意义，然后再归纳提高到理论上去。"},{"type":"paragraph","text":"他们在专业技术训练中，还非常重视发动群众，开展民主讨论。对于每一门课程，每一阶段，学习什么，怎样学习，领导上都向教员、学员交代清楚。对于课程的重点问题，经常发动大家展开讨论，并及时总结提高，力求对每个重要问题都钻研得深刻，解决得彻底。 （王岳风）"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0e02f8db38"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
