66,"month":12,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"让毛泽东思想当家"},{"type":"paragraph","text":"“让毛泽东思想当家！”宁夏西吉县大坪公社红卫大队的贫下中农，在这个思想指导下，广泛深入地开展了“全家红”的活动。"},{"type":"paragraph","text":"目前，全大队已涌现出一批活学活用毛主席著作的“全家红”。许多原来不识字的社员，在别人帮助下，已经通读了“老三篇”，不少人还能背诵“老三篇”。"},{"type":"paragraph","text":"许多“全家红”的家庭，还经常召开讲用会，用毛主席的话，对照自己的思想行动，开展批评和自我批评。"},{"type":"paragraph","text":"有一次，贫农冉宗贤利用雨天休息时间，帮助队上去卖羊，回来以后就要队上给他记了一分半工。在学习“老三篇”时，他用“完全”、“彻底”两把尺子一量，觉得自己的做法很不对头。在家庭讲用会上，他主动地作了自我批评。（附图片）"},{"type":"paragraph","text":"右图：张思德故乡思德公社学习毛主席著作积极分子在开学习毛主席著作讲用会前，读《毛主席语录》。　新华社记者摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1fe87e263e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
