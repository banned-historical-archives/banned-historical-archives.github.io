"卢鹏","河南医学院"],"dates":[{"year":1957,"month":6,"day":8}],"is_range_date":false,"parts":[{"text":"给学院首长的第二封公开信","type":"title"},{"text":"河南医学院卢鹏","type":"authors"},{"text":"(卢鹏：河南医学院外科基础教研组助教)","type":"subtitle"},{"text":"敬爱的党委书记杜葆林、史子彬同志：","type":"appellation"},{"text":"亲爱的卢长山程耀吾同志：","type":"appellation"},{"text":"根据我个人的意见，在四大金刚八大台柱统治下的党，若有诚意开展好党的整风，我提供下列意见，以供参考。","type":"paragraph"},{"text":"第一、立即迅速处理强奸犯张廷辅。","type":"paragraph"},{"text":"第二、要收回民心。","type":"paragraph"},{"text":"1、对某些人的正义批评保证今后不以任何方式进行报复，并希望发出书面文件为凭。","type":"paragraph"},{"text":"2、医治思想总结、三反思想改造、肃反等运动中所留下的创伤。立即对死者设灵堂使群众观祭，使四大金刚八大台柱放下威风，对受害者发给道歉书，(为什么被划为斗争对象，受害者的受害程度与影响，结论如何。)三分。一分给受害者本人保存，一分征求受害者的同意后当众公布，一分存放受害者的档案袋内(不能一般化公式化，要用复写纸写)。","type":"paragraph"},{"text":"3、公平合理的组织评薪委员会，广泛征求群众意见，重新评薪，该降的就降，该升的就升，打破党团员与群众之别，不牵扯友情与裙带有关系。","type":"paragraph"},{"text":"第三、要求被四大金刚八大台柱所排斥的河南大学医学院地下党老党员张佑文同志邀请回院帮助党整风。","type":"paragraph"},{"text":"第四、要求被四大金刚八大台柱挤出去的老党员马驰同志金鲁峰同志，邀请回院帮助党整风。","type":"paragraph"},{"text":"以上仅是我个人要求，请答覆我。　　谨致","type":"paragraph"},{"text":"敬礼！","type":"appellation"},{"text":" 思想总结的重点？？三反的贪污分子？？肃反的反革命分子？？卢鹏1957．6．8","type":"paragraph"}],"comments":[],"origin":"《右派言论集》（河南医学院马列主义教研室编印，1958年4月）。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d38e7e286b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
