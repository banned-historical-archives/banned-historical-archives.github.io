时的讲话摘要","authors":["胡耀邦"],"dates":[{"year":1959,"month":7,"day":26}],"is_range_date":false,"parts":[{"text":"胡耀邦在掖县王贾大队参观青年技术对试验室时的讲话摘要","type":"title"},{"text":"胡耀邦","type":"authors"},{"text":"这种队有三条任务：一改良技术，二推广技术，三培养技术干部。","type":"paragraph"},{"text":"我看一个公社搞个红专学校，一个生产大队搞个十人左右的技术队是有好处的，也是能办到的，要叫农村青年有个学习的地方，要有激发青年上进的组织形式。这件事，应很好地总结，很好地推广，林萍同志，你们山东要办这个事情啊！","type":"paragraph"},{"text":"我想，明年或后年召开全国技术队积极分子大会。","type":"paragraph"},{"text":"我在青岛时给团的干部讲过，人为什么要吃东西？肚子饿了，无非是需要热量和维生素。饿了就往肚子里装粮食，我们中国人一年一人360斤还不够。美国人平均每人一年吃76公斤粮食。苏联人平均每人一年吃170公斤粮食。印度人每天平均吃10两粮食。日本人每天平均吃14两粮食。","type":"paragraph"},{"text":"我们要想办法，逐步多吃肉，多吃水果，改变这种习惯。","type":"paragraph"},{"text":"要种一些谷子，人吃粮，牲口吃草，谷草是精饲料。要牲口第一，人第二，猪第三，我们前天锄草培地瓜沟，六个人干了半天，不如一头牛半个小时干得多，还是牛有力气，要先给他吃。老牛几千年来就为人们服务，从来不发牢骚，不提意见，我们应主动照顾地。","type":"paragraph"}],"comments":[],"origin":"山东省省级机关革命造反总指挥部《彻底肃清胡耀邦在山东的流毒》，1967年7月。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"胡耀邦","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7de65bf928"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
