整理稿的批语","authors":["毛泽东","（一九六二年二月—四月）"],"dates":[{"year":1962,"month":2,"day":14}],"is_range_date":false,"parts":[{"text":"毛泽东对《在扩大的中央工作会议上的讲话》整理稿的批语","type":"title"},{"text":"毛泽东（一九六二年二月—四月）","type":"authors"},{"text":"一","type":"subtitle"},{"text":"田家英同志：","type":"appellation"},{"text":"我看还是我的那个原始讲话好。请你即刻通知北京，叫机要室再送一份我的讲话来，我和你每人有一本，两人对照一起修改，有两天就改好了。如有三份，可以叫林克参加。如你身边有一份，就不要北京再送了。","type":"paragraph"},{"text":" 毛泽东二月二十四日上午五时","type":"paragraph"},{"text":"二","type":"subtitle"},{"text":"田家英同志：","type":"appellation"},{"text":"改好了（初步地），请你看一遍，看还有什[么]错误没有。看完后，即送江青看，然后还我。","type":"paragraph"},{"text":" 毛泽东廿六日上午四时半","type":"paragraph"},{"text":"三","type":"subtitle"},{"text":"田家英同志：","type":"appellation"},{"text":"此件请印清样7份。最好今天印出交我。原稿还我。印时，校对清楚。","type":"paragraph"},{"text":" 毛泽东三月十日","type":"paragraph"},{"text":"四","type":"subtitle"},{"text":"田家英同志：","type":"appellation"},{"text":"在第三页上加了一句，请酌。","type":"paragraph"},{"text":" 毛泽东三月十四日下午二时二十分","type":"paragraph"},{"text":"五","type":"subtitle"},{"text":"照此付印，共印九份，分交刘、周、邓、彭、伯达各一份，请他们看一遍（刘、周、邓，请他们看第二遍），提出修改意见。另交田家英、林克、江青、毛泽东各一份存阅。印后板\u003c版\u003e折\u003c拆\u003e 掉，原稿毁掉。","type":"paragraph"},{"text":" 毛泽东三月廿日","type":"paragraph"},{"text":"六","type":"subtitle"},{"text":"少奇、小平同志：","type":"appellation"},{"text":"此件已请陈伯达等几位同志读了一篇\u003c遍\u003e，有些修改，我看过了，认为修改得好。现送上请审阅。如认为可用，请交尚昆同志处理。","type":"paragraph"},{"text":" 毛泽东四月七日下午九时","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"江青","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"发言"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e1d026d774"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
