<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"上海哲学社会科学工作者讨论资产阶级法权问题","authors":[],"dates":[{"year":1958,"month":10,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　张春桥同志在“解放”半月刊第六期发表的“破除资产阶级的法权思想”一文，引起社会上各方面的密切注意。上海社联特于26日邀集上海哲学社会科学工作者一百多人举行座谈会，根据该文的若干论点，对破除资产阶级法权残余及资产阶级法权思想，展开热烈讨论。"},{"type":"paragraph","text":"关于供给制改为工资制的问题，许多人指出，应有正确的估价，首先是要有历史观点。张文井没有指出当时的历史条件。解放后，如果全民实行供给制，不但没有物质基础，也没有思想基础。有人认为，解放以后，两种分配制度可以同时并存。有人认为可以在部队、干部中保存供给制并且逐渐扩大范围。有人认为如果两种分配制度并存，在解放后新的形势下，必然会引起许多纷乱，从供给制改工资制，是客观事物的必然性，不能看成少数人的意见。有人指出，问题倒不在于该不该改变，而在于当时由于这种改变形成了一种舆论、一种错觉，以为供给制就是农村作风、游击习气；认为推动生产力前进，只有依靠物质刺激，提倡多劳多得，结果呢，把政治丢了，有些人因此多得才愿多劳，这是一个严重的错误。"},{"type":"paragraph","text":"关于按劳取酬，许多人指出，这个分配制度，与旧社会比较，是平等的，但是，在社会主义社会里，这种制度还是不平等的。比如熟练劳动比不熟练劳动是否，多劳呢?大学毕业生是否比小学毕业生多劳呢?这乃是社会上给他安排、培养的结果，如果认为熟练劳动或大学毕业生就是多劳，因此应该多得，貌似公道实不公道。事实上在大跃进的今天，工农群众正在发挥一种忘我的、不计较报酬的劳动的共产主义精神，已把一些陈旧的框框打破了。"},{"type":"paragraph","text":"同时，对于资产阶级法权残余与法权思想的表现、解放九年来资产阶级法权残余消长情况及今后国家机关如何实行供给制，也提出各种看法。有人指出:讨论资产阶级法权残余及资产阶级法权思想，不能离开共产主义思想和历史观点。既要承认它，又要变革它，消灭它。有人说，资产阶级法权残余与资产阶级法权思想要严格分开，对资产阶级法权残余，因为利用它，不得不有所让步，但绝不能因此对资产阶级法权思想有丝毫妥协。"},{"type":"paragraph","text":"座谈会将继续举行。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"限制资产阶级法权","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e607a92c15"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
