946,"month":8,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【联合社北平十七日电】军调部中共代表叶剑英，前随美代表罗柏森赴京向马歇尔特使对“安平事件”有所报告，刻已自京返平，今日谈称:马使及司徒大使之联合声明系调解困难之表现，而非调解失败之表现。据叶氏称:马使会询周恩来对蒋主席胜利日发表文告，有何意见?周恩来当表示:希望马使继续努力调解国共纠纷。第一步先使双方停战。共员自作战区撤退后，将开赴指定区域，依照整军案施行训练。至共军撤后各地，在政治方面，将民主原则，实行地方自治，本地人民之意见须予尊重。原有之地方自治组织不予更动。又讯叶氏称:马使九月间不致改美:用事三人小组会议及北平军调部均将继续。"},{"type":"paragraph","text":"【联合社天津十七日电】此间民国日报今日载北平讯:军调部中共代表叶剑英。曾于军调部政府，中共及美方代表会议时宣称中共对军调部每周由北平飞往大同联络机之安全，不负责任"}],"comments":[],"origin":"联合社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4b0b1fd4b9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
