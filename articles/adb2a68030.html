"dates":[{"year":1978,"month":4,"day":20}],"is_range_date":false,"parts":[{"text":"中共中央通知(摘 录)","type":"title"},{"text":"现将《中共中央关于加快工业发展若干问题的决定(草案)》(简称工业三十条)发给你们，请你们立即组织各工业管理机关、各工业交通企业试行。","type":"paragraph"},{"text":"……","type":"paragraph"},{"text":"附:","type":"subtitle"},{"text":"中共中央关于加快工业发展若干问题的决定(草案)(摘 录)","type":"subtitle"},{"text":"……","type":"paragraph"},{"text":"二十八、纪律","type":"paragraph"},{"text":"由于\"四人帮\"的干扰破坏，现在许多方面纪律松弛，无政府主义现象严重，危害甚大。必须加强组织性、纪律性，同一切违反政策、违反制度、违反统一计划、违反财经纪律、违反劳动纪律的现象作斗争。","type":"paragraph"},{"text":"广大职工，都要自觉地遵守纪律，爱护公共财物。","type":"paragraph"},{"text":"共产党员、共青团员，特别是各级领导干部，应当成为遵守纪律的模范。要支持和表扬那些认真执行政策、制度和敢于坚持原则的同志，决不允许对他们进行打击报复。","type":"paragraph"},{"text":"对违反纪律的人，要进行严肃的批评教育。情节严重、屡教不改的，要给予处分，包括记过、撤职、降级降薪、留厂察看(察看期间只发生活费)，直至除名。除名要慎重。","type":"paragraph"}],"comments":[],"origin":"根据中央文件的翻印件，翻印者未注明","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"adb2a68030"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
