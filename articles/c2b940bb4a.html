rt":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"华国锋主席访问伊朗","authors":[],"parts":[{"type":"paragraph","text":"八月二十九日，华国锋主席到达伊朗首都德黑兰，机场上举行了隆重的欢迎仪式。这是华国锋主席由巴列维国王陪同检阅仪仗队。"},{"type":"paragraph","text":"八月三十一日，华国锋主席同巴列维国王在德黑兰单独举行会谈前在一起。"},{"type":"paragraph","text":"华国锋主席应伊朗国王巴列维陛下的邀请，八月二十九日乘专机到达德黑兰，巴列维国王到机场热烈欢迎华国锋主席。"},{"type":"paragraph","text":"八月二十九日，伊朗国王巴列维陛下和王后陛下举行盛大宴会，热烈欢迎华国锋主席。"},{"type":"paragraph","text":"华主席由巴列维国王陪同，乘车来到国王纪念塔广场后，德黑兰市长把一把德黑兰市的金钥匙和一个银水果盘赠送给华主席。"},{"type":"paragraph","text":"伊朗人民怀着对中国人民的深情厚谊，手举中伊两国国旗，热烈欢迎华国锋主席。（本版照片均为新华社记者摄）（照片）"}],"alias":""},"tags":[{"name":"华国锋","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c2b940bb4a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
