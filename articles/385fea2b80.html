art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"纪念毛泽东同志《愚公移山》发表50周年座谈会在京举行","authors":["贾奋勇母长华"],"parts":[{"type":"paragraph","text":"新华社北京5月13日电（记者贾奋勇、母长华）中共中央党校和河南省济源市委、市政府等单位今天在北京联合举行座谈会，纪念毛泽东同志的著名文章《愚公移山》发表50周年。"},{"type":"paragraph","text":"1945年6月11日，毛泽东同志在中国共产党第七次全国代表大会上发表了著名的闭幕词《愚公移山》。半个世纪以来，愚公移山的故事伴随着毛泽东的名字，在国内外广泛传播，产生了深远的历史影响。愚公移山精神成为中华民族宝贵的精神财富，它不仅鼓舞全党和全国人民推翻了帝国主义、封建主义和官僚资本主义三座大山，而且激励全国人民艰苦奋斗，在几十年的社会主义建设和十几年来的改革开放的伟大事业中，不断取得辉煌成就。50年来，特别是改革开放以来，愚公的家乡河南济源人民在党的领导下，以愚公“挖山不止”的精神，把科学决策和愚公精神相结合，全面进行社会主义现代化建设，使济源由一个山区穷县发展成为现代化的工业旅游城市。1994年，济源市工农业总产值达75亿元，实现财政收入2.13亿元，成为我国中西部地区发展最快的市（县）之一。"},{"type":"paragraph","text":"与会者认为，在改革开放和市场经济蓬勃发展的今天，更要进一步弘扬愚公精神，弘扬自力更生、艰苦奋斗的优良传统，加强党组织和干部队伍的思想作风建设。愚公移山精神永远是中华民族宝贵的精神财富，它将永远激励全国人民艰苦创业、开拓进取。"},{"type":"paragraph","text":"中组部、中宣部、中央文献研究室、中共中央党史研究室以及河南省、焦作市等有关部门和单位的领导同志、专家学者近200人参加了座谈会。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"河南文革","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"385fea2b80"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
