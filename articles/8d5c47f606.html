art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"反对资产阶级自由化决不影响屏幕的绚丽多彩","authors":["肖瑛"],"parts":[{"type":"paragraph","text":"艾知生说，要坚持四项基本原则，反对资产阶级自由化。但是，不要把什么问题都和资产阶级自由化挂上钩，而且完全应该允许在艺术风格上、题材体裁方面的多样化，提倡艺术技巧和表现手法上的创新。"},{"type":"paragraph","text":"艾知生指出，电视观众是多层次的，所以它的表现手法应该努力做到雅俗共赏。有些作品出现了新的脸谱化的倾向，写改革的作品，党委书记总是特别保守，厂长总是非常先进，令人想起有一个时期强调“突出政治”，写部队时连长都很保守，指导员都很先进，这同样是搞公式化，应该努力改变这种情况。出现在屏幕和银幕上的人，应该是活生生的人，不要搞公式化、概念化。文艺创作包括电视、电影创作，一定要努力做到毛泽东同志所说的“革命的政治内容和尽可能完美的艺术形式的统一”。"}],"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8d5c47f606"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
