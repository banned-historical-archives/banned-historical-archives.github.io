" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共西北军政委员会机关委员会关于开除艾绳业党籍的决定","authors":[],"dates":[{"year":1952,"month":4,"day":9}],"is_range_date":false,"parts":[{"text":"中共西北军政委员会机关委员会关于开除艾绳业党籍的决定","type":"title"},{"text":"艾绳业，陕西米脂县人，现年35岁，1938年参加革命，同年入党，曾任文书、经理、秘书等职，现任西北军政委员会出版局秘书处长。","type":"paragraph"},{"text":"艾绳业于1949年10月由陇东调西安时，即勾结其堂弟艾琴轩伙同贩毒，前后达240多两，并直接帮助其父进行违法走私的活动，他自己且有吸毒的恶习，来西安后更加严重，常去裕民、吉庆商行等6处吸食，甚至还将毒品带回机关办公室及宿舍来吸。更严重的是利用职权，勾结奸商及其家族亲戚，大量盗骗国家财产，买公家东西时压低价格，少报货量，迟付价款；向公家卖东西时则抬高价钱，以坏顶好，拖延交货时间。仅勾结奸商赵福民向出版局售纸一项，即使国家财产损失3000余万元。而艾从中贪污受贿，据其初步承认已达1300余万元。艾在工作中一贯表现消极，阳奉阴违，作风不正，品质恶劣，在群众中影响极坏。对他这些严重的错误，组织上虽多方进行过教育，但仍执迷不悟，在三反运动中并与奸商订立“攻守同盟”，狡辩抵赖，拒不坦白。","type":"paragraph"},{"text":"艾绳业如此严重的违法乱纪，贪污腐化，屡教不改，已完全丧失了共产党员的品质，为纯洁党的组织，经西北局批准，特决定开除其党籍。","type":"paragraph"}],"comments":[],"origin":"中共中央监察委员会办公厅编：《县委书记以上干部受到开除党籍处分的决定汇编（二）》（党内文件·注意保存），1960年。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"13154dde41"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
