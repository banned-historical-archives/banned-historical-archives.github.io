"year":1996,"month":7,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"《“文化大革命”简史》出版"},{"type":"paragraph","text":"本报讯《“文化大革命”简史》一书，经中央主管部门审定、核准，已由中共党史出版社出版。这本书根据中共中央《关于建国以来党的若干历史问题的决议》的精神，以简明、清晰的论述，翔实、丰富的材料，精练、生动的语言，叙说、剖析了长达十年之久的“文化大革命”发生的历史背景和起因，全面发动和高潮的到来，以及以后几年曲折发展中的一系列重大历史事件，直到大动乱结束。书中着力论述了十年历史进程中各种力量的较量，邓小平同志主持的１９７５年全面整顿是一大着墨点。书中还说明了中国共产党以自身的力量结束了这场大动乱，开始了振兴中华的历史补偿。（吴茗）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5925aeebca"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
