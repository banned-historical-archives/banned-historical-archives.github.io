ical-archives/banned-historical-archives8/main/maoquanji22.pdf"],"article":{"title":"致彭德怀、习仲勋电","alias":"","parts":[{"type":"paragraph","text":"致彭德怀、习仲勋电\""},{"type":"paragraph","text":"（1947年3月30日）彭、习："},{"type":"paragraph","text":"二十九日二十一时电悉。部署于待机位置甚妥。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"三十日十三时"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军委起草的给西北野战兵团司令员兼政治委员彭德怀和副政治委员习仲勋的电报。"},{"type":"paragraph","text":"[2]1947年3月29日21时，彭、习致电军委：“1．敌左路为一二三旅、一三五旅、一六五旅次序，由青化砭向东北以永坪以南高地前进；中路为第一军，由甘谷驿经禹居；右路为七十六师两个旅，由延长向交口镇。三路均向延川会攻。估计敌占延川后，可能巩固延川、延长；清漳、永坪、青化砭地区或向北打通咸榆公路，或者继续寻找我主力决战。2．我拟寻求歼击一三五旅，好打时再歼一二三旅，因该两旅较其他东进各敌战力稍弱。为此部署：拟于三月三十一日隐蔽集结蟠龙、石咀、李家沟、贺家岩、风背上之弧线上，位置此线可以应付敌占延川后上述三种情况，寻求歼敌左路之机"}],"authors":["毛泽东"],"dates":[{"year":1947,"month":3,"day":30}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":482,"page_end":482},"tags":[{"name":"毛泽东","type":"人物"},{"name":"习仲勋","type":"人物"},{"name":"彭德怀","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"aeb70e9418"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
