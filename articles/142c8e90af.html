rs":[],"dates":[{"year":1967,"month":9,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席最新指示的伟大胜利"},{"type":"paragraph","text":"首都革命大联合的伟大洪流滚滚向前势不可挡"},{"type":"paragraph","text":"毛主席教导我们：在工人阶级内部，没有根本的利害冲突。在无产阶级专政下的工人阶级内部，更没有理由一定要分裂成为势不两立的两大派组织。"},{"type":"paragraph","text":"在迎接国庆的日子里，首都革命群众坚决执行毛主席的最新指示，掀起了革命大联合的高潮。北京街头到处红旗招展，锣鼓喧天，他们组成浩浩荡荡的队伍，向毛主席、党中央、中央文革小组报喜，向北京市革命委员会和支左的人民解放军报喜。"},{"type":"paragraph","text":"本报记者　刘振祥摄"},{"type":"paragraph","text":"在清华大学实现革命大联合的庆祝会上，革命师生们正在认真学习毛主席语录，决心紧跟毛主席的伟大战略部署，进行革命的大批判和本校的斗批改。"},{"type":"paragraph","text":"本报记者　沈谷容摄"},{"type":"paragraph","text":"北京市百货大楼革命职工学习了毛主席的最新指示后，迅速行动起来，实现了革命的大联合。革命职工激动地高呼：毛主席万岁！毛主席的无产阶级革命路线胜利万岁！　新华社记者　安　康摄"},{"type":"paragraph","text":"北京第三棉纺织厂的革命群众组织，紧跟毛主席的伟大战略部署，以“只争朝夕”的精神实现了革命的大联合。这是准备车间的两派革命群众组织一起写喜报，祝贺革命大联合的胜利实现。"},{"type":"paragraph","text":"新华社记者　张树源摄"},{"type":"paragraph","text":"全国的工人阶级迅速地联合起来，红卫兵小将迅速地联合起来，条条战线的无产阶级革命派迅速地联合起来，在革命大联合的历史潮流中，建立新的功勋，迎接新的胜利！"},{"type":"paragraph","text":"在毛泽东思想伟大红旗下，革命的大联合万岁！"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"中央文革","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"军队支左","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"142c8e90af"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
