art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席的话句句是真理","authors":["李仁"],"parts":[{"type":"paragraph","text":"我是生在旧社会，长在新社会的一个青年战士。旧社会我家祖辈三代给地主扛活，房无一间、地无一垅，住的是瓜棚，吃的是糠菜，一家五口盖一床被子。现在，我们同全国人民一样都过上了幸福生活。是谁解放了我们？是党，是毛主席。党和毛主席是我们的救命恩人。一九五九年我光荣地参加了人民解放军，又是党和毛主席把我培养成为一个革命战士，是毛主席的书，指引我不断前进。刚入伍的时候，我不懂得什么叫阶级斗争，为什么要革命，读了毛主席的书，使我擦亮了眼睛，认清了谁是敌人，谁是恩人，懂得了为谁革命，为谁扛枪。一九六○年领导上分配我守总机，开始时技术差，任务重，有时弄得手忙脚乱，我想打退堂鼓。读了毛主席的书，使我增强了克服困难的勇气。一九六一年我当总机班长，班里的工作取得了一些成绩，我曾一度满足现状，看不起群众。毛主席的书又一次帮我踢开了前进道路上的绊脚石。一九六四年刚当排长时，我工作方法简单，工作效果不好，又是毛主席的书教导我不断改进领导方法，在工作上出现了新气象。我深深体会到，毛主席的话，句句是真理，一句顶一万句，用到哪里哪里灵。"},{"type":"paragraph","text":"资产阶级“权威”老爷们，你们反对工农兵活学活用毛泽东思想，我们决不答应。我们热爱伟大领袖毛主席，热爱毛主席的书。凡是毛主席说的，我们就坚决拥护，坚决照办。我们要干一辈子革命，学习一辈子毛主席著作。谁反对我们学习毛主席著作，谁就是反对我们闹革命。不管是什么样的“权威”，我们都要同他坚决斗到底。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d3f39c3771"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
