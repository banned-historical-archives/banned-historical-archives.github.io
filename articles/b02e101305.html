ical-archives/banned-historical-archives8/main/maoquanji26.pdf"],"article":{"title":"致东北局等电","alias":"","parts":[{"type":"paragraph","text":"致东北局等电"},{"type":"paragraph","text":"（1949年5月14日）"},{"type":"paragraph","text":"毛主席向他指出，抗联干部领导抗联斗争及近年参加东北的斗争是光荣的。此种光荣斗争历史应当受到党的承认和尊重。但抗联同志在过去的工作中亦和党内其他各地从事革命斗争的同志一样，是难免有缺点和错误的，应该着重检讨自己过去工作中的缺点和错误，借以提高自己的政治水平，以便今后更好地为党工作。上述估计，适用于周保中同志及其他-切-一贯地执行党的路线的抗联同志。我们认为应根据上述估计对周保中同志予以积极的帮助，启发他去掉某些包袱和片面性，这个同志会有更大的进步。"},{"type":"paragraph","text":"[1]这是毛泽东关于通报毛泽东、朱德和周保中谈话精神为中共中央起"}],"authors":["毛泽东"],"dates":[{"year":1949,"month":5,"day":14}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":398,"page_end":398},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b02e101305"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
