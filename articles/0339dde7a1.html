"year":1976,"month":8,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京一九七六年八月二十日电　华盛顿消息:今年是四年一度的美国总统选举年。美国两大资产阶级政党(民主党和共和党)最近先后举行了全国代表大会，经过激烈的角逐，确定了各自的总统、副总统候选人。"},{"type":"paragraph","text":"民生党于七月十二日到十五日在纽约召开的全国代表大会上，确定了曾任佐治亚州州长的詹姆斯·卡特(吉米·卡特)为该党总统候选人，明尼苏达州参议员沃尔特·蒙代尔为副总统候选人。"},{"type":"paragraph","text":"共和党从八月十六日到十九日在密苏里州的堪萨斯城召开了全国代表大会，确定现任总统杰拉尔德·福特为该党总统候选人，堪萨斯州参议员罗伯特·多尔为副总统候选人。"},{"type":"paragraph","text":"今年的大选将于十一月二日举行。从现在起到投票前夕，两党候选人将继续进行激烈的竞选斗争。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0339dde7a1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
