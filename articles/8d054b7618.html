业社会主义思想","authors":[],"dates":[{"year":1951,"month":10,"day":11}],"is_range_date":false,"parts":[{"text":"河南、湖南部分地区农民土改后产生农业社会主义思想","type":"title"},{"text":"【内部参考讯】在河南、湖南部分已经土地改革的农村中，由于干部没有很好地进行劳动致富、爱国发家的宣传工作，不少农民产生了农业社会主义大锅饭的思想。湖南宁乡六区石泉乡农民说：“分的东西暂行照管一下，不到明年秋收，就到了社会主义社会，那时这些东西都是公共的了。”有些农民应添置农具也不添置了，他们说：“到了社会主义，有政府来添置”。河南陈留县有些农民虽在口头上说合大锅可以节省柴火，村与村合并可以腾出地来多种粮食，但实际上却怀疑：“真要合大锅，谁还提劲干活呢！”","type":"paragraph"}],"comments":[],"origin":"新华通讯社编《内部参考》1951年10月11日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8d054b7618"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
