校","钟家源"],"dates":[{"year":1957,"month":6,"day":18}],"is_range_date":false,"parts":[{"text":"给卫道者","type":"title"},{"text":"重庆师范专科学校钟家源","type":"authors"},{"text":"[编者按：钟家源，地主出身，重庆师专学生，曾于1950年混入青年团，在土地改革中，害怕被土匪杀害撕毁组织介绍信，脱团并脱离革命，鸣放中反说他“上了青年团的当，受了骗，团污得很”。有人出来对鸣放中的错误言论说了几句公道话，他就写了这首诗加以恶毒的咒骂。]","type":"paragraph"},{"text":"告诉你","type":"paragraph"},{"text":"你披着马列主义的外衣","type":"paragraph"},{"text":"给敌人做着忠实的奴隶","type":"paragraph"},{"text":"你决不帮助党整风","type":"paragraph"},{"text":"你决心保卫“特权阶级”","type":"paragraph"},{"text":"请你到清水池边","type":"paragraph"},{"text":"照照你那狰狞的面皮","type":"paragraph"},{"text":"你自以为很有道理","type":"paragraph"},{"text":"其实","type":"paragraph"},{"text":"都是些十七世纪遗留下的臭东西","type":"paragraph"},{"text":"你象飘飘在虚空的孔明灯","type":"paragraph"},{"text":"一肚子灌满了乌烟瘴气","type":"paragraph"},{"text":"你把他当成了“皇经皇籍”","type":"paragraph"},{"text":"当成了卫道的武器","type":"paragraph"},{"text":"时代的狂潮象惊天动地的飘下","type":"paragraph"},{"text":"它要掀翻你","type":"paragraph"},{"text":"摔碎你","type":"paragraph"},{"text":"把你从十万公尺的高空","type":"paragraph"},{"text":"摔向那活世界的水底","type":"paragraph"},{"text":"摔得你粉身碎骨","type":"paragraph"},{"text":"我们将见你做一堆儿肉饼","type":"paragraph"},{"text":"堆在那里腐烂、生蛆","type":"paragraph"},{"text":" 6．18","type":"paragraph"}],"comments":[],"origin":"《重庆市右派言论选辑第一集》（内部文件，只供领导同志参考，请勿外传和翻印），中共重庆市委宣传部办公室编印，1957年8月。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7ed3de47e3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
