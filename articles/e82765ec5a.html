"year":1956,"month":12,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京22日电】　以叶剑英元帅为首的中国军事友好访缅代表团即将启程，21日下午，缅甸驻华大使馆临时代办吴巴茂及夫人举行酒会为代表团饯行。"},{"type":"paragraph","text":"中国军事友好访缅代表团团长叶剑英元帅和全体团员都出席了酒会。"},{"type":"paragraph","text":"外交部副部长章汉夫，中缅友好协会会长郑振铎、副会长钱伟长也出席了酒会。"},{"type":"paragraph","text":"出席酒会的还有中国人民解放军的高级将领陈赓大将、萧华上将、王秉璋空军中将等。"},{"type":"paragraph","text":"各国驻华武官也应邀出席了酒会。"},{"type":"paragraph","text":"在酒会上，吴巴茂代办和叶剑英团长相互致词，他们一致认为，这次访问必将促进中缅两国人民和军队之间友好关系的进一步发展。"},{"type":"paragraph","text":"中国军事友好访缅代表团是应缅甸政府邀请的。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e82765ec5a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
