art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"用毛泽东军事思想指导未来信息化战争等二则","authors":["邹维荣/卜金宝/费士廷"],"parts":[{"type":"paragraph","text":"毛新宇委员——"},{"type":"paragraph","text":"用毛泽东军事思想指导未来信息化战争"},{"type":"paragraph","text":"■本报记者邹维荣卜金宝"},{"type":"paragraph","text":"军事科学院战争理论和战略研究部副部长毛新宇委员告诉记者，他今年提交提案的题目是《用毛泽东军事思想指导未来信息化战争》。"},{"type":"paragraph","text":"毛新宇委员说：“虽然科学技术不断发展，各项改革不断创新，但毛泽东军事思想仍然是指导国防和军队建设，打赢未来信息化战争的重要思想武器。”"},{"type":"paragraph","text":"毛新宇委员说，这份提案他准备了很长时间。“毛泽东是人民军队的主要缔造者，作为人民军队的一员，我长期从事用毛泽东思想指导军队现代化建设的研究，有责任为国防和军队建设贡献自己的力量。”"},{"type":"paragraph","text":"（本报北京3月11日电）"},{"type":"paragraph","text":"王莉代表——"},{"type":"paragraph","text":"开展祭奠革命先烈爱国主义教育活动"},{"type":"paragraph","text":"■本报记者费士廷"},{"type":"paragraph","text":"空军政治部文工团一级演员王莉代表建议，在中小学开展祭奠革命先烈爱国主义教育活动。"},{"type":"paragraph","text":"“在中小学大力开展祭奠革命先烈活动是进行爱国主义教育重要而有效的形式。”王莉代表建议，相关部门应出台规定，明确要求清明节期间全国中小学校组织学生祭奠革命先烈，同时，鼓励中小学校根据地区和学校特色，不定期地组织学生祭奠革命先烈。王莉代表说，要根据孩子的特点，精心安排祭奠革命先烈教育活动的形式和内容，增强教育效果。"},{"type":"paragraph","text":"（本报北京3月11日电）"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b8de866696"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
