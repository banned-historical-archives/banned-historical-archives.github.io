s":[],"dates":[{"year":1983,"month":9,"day":24}],"is_range_date":false,"parts":[{"text":"中共中央给广西壮族自治区党委的指示","type":"title"},{"text":"中共广西壮族自治区委员会：","type":"appellation"},{"text":"九月十七日电悉。你们“处遗”工作总的部署是好的，望继续抓紧抓好。对于调整出班子的干部，除必须追究刑事责任的人以外，都要多做细致的思想工作，区别不同情况，按政策妥善处理，尤其是对其中有影响的负责干部，要多采取个别谈心方式，帮助提高认识，不要求他们一再检讨，也不要开会批判。“处遗”工作，地、市委和区直部委办厅局领导的班子调整，要抓紧进行。十月底前完不成，还可继续延长时间。调整领导班子中，要注意把关，严防“三种人”混入新的领导班子。","type":"paragraph"},{"text":" 中共中央一九八三年九月二十四日","type":"paragraph"},{"text":"来源：《处理“文革”遗留问题、清理“三种人”文件汇编（第一册）》广西壮族自治区党委整党办公室。1986年8月","type":"appellation"}],"comments":[],"origin":"( 《处理“文革”遗留问题、清理“三种人”文件汇编》，广西壮族自治区党委整党办公室，一九八六年八月。)","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"广西文革","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fb6bb69a3b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
