ar":1976,"month":4,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"北京"},{"type":"paragraph","text":"中华人民共和国总理华国锋阁下:"},{"type":"paragraph","text":"你担任中国共产党中央委员会第一副主席和中华人民共和国国务院总理一事，表明了中国人民支持和信任你的领导。"},{"type":"paragraph","text":"坦桑尼亚政府和人民向你表示最热烈和最诚挚的祝贺。我们相信，坦中两国之间的友好合作关系将继续发展，这不仅有利于我们两国和两国人民，而且有利于所有正在进行反帝斗争的人民，同时也有利于第三世界的团结。"},{"type":"paragraph","text":"坦桑尼亚人民同我一起祝你健康，并祝你在促进中国革命的工作中一切顺利。"},{"type":"paragraph","text":"坦桑尼亚联合共和国总统"},{"type":"paragraph","text":"朱利叶斯·克·尼雷尔"},{"type":"paragraph","text":"一九七六年四月九日"},{"type":"paragraph","text":"于达累斯萨拉姆"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"华国锋","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e005062099"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
