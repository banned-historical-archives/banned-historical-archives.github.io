script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"玻利维亚共产党发表声明  强烈谴责苏修集团侵捷的罪行  坚信修正主义统治下的人民只要高举马列主义旗帜定能扫除帝修反","authors":[],"dates":[{"year":1968,"month":11,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"玻利维亚共产党发表声明"},{"type":"paragraph","text":"强烈谴责苏修集团侵捷的罪行"},{"type":"paragraph","text":"坚信修正主义统治下的人民只要高举马列主义旗帜定能扫除帝修反"},{"type":"paragraph","text":"新华社九日讯　拉巴斯消息：玻利维亚共产党不久以前发表声明，强烈谴责苏修叛徒集团出兵占领捷克斯洛伐克，表示声援捷克斯洛伐克的马列主义共产党人、工人阶级和人民。声明说：“这个事件彻底暴露了现代修正主义的本质和他们背叛国际共产主义运动真正利益的嘴脸。”"},{"type":"paragraph","text":"声明说，苏修集团用来武装侵略捷克斯洛伐克人民的借口是不能成立的。这种军事占领是适应它建立霸权的利益的，是违反捷克斯洛伐克和苏联的人民和无产阶级的意志和利益的。"},{"type":"paragraph","text":"声明说：玻利维亚共产党表示强烈谴责当前对捷克斯洛伐克人民的侵略。“我们共产党人同玻利维亚工人阶级和人民一道声援捷克斯洛伐克的马列主义共产党人、工人阶级和人民，并表示确信，同在苏联和被修正主义分子统治的其他国家一样，只要那里的人民胜利地高举马克思列宁主义旗帜，不久必将把修正主义、美帝国主义和其他一切反社会主义势力统统扫除干净。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"20aa4c7c4e"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
