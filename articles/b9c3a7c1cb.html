","authors":[],"dates":[{"year":1951,"month":4,"day":27}],"is_range_date":false,"parts":[{"text":"常德专区不少地方发生强迫植棉的现象","type":"title"},{"text":"【新湖南报四月二十七日讯】湖南常德专区不少地方干部以按亩分派、登记、插牌等办法强迫群众植棉。澧县采取的办法是自上而下逐级分派任务，划定植棉区，再由群众自报，干部评议。有些地方干部将不能植棉的渍水田、山旁田和山坡地也都规定为植棉地。龙潭区按亩登记后，干部还叫植棉户画押盖章，保证植棉。农民对强迫命令是有意见的，这从一个老太婆的反映中可以看出。她说：“强叫我种棉，宁愿不要地，我也不种棉。”现在已发现农民将已登记的棉田提前放水耕翻，准备插秧、种稻情事。","type":"paragraph"}],"comments":[],"origin":"新华通讯社编《内部参考》1951年5月10日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b9c3a7c1cb"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
