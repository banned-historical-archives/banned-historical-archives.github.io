{"year":1994,"month":1,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社汉城1月23日电　中国选手马文革和王涛今天在这里举行的’94乒乓球世界全明星巡回赛第二场比赛中，分别荣获冠、亚军。"},{"type":"paragraph","text":"马文革在决赛中以3∶0战胜了王涛。"},{"type":"paragraph","text":"在半决赛中，马文革以21∶17和21∶6轻取克罗地亚选手普里莫拉茨。在第一轮比赛中，马文革以2∶0胜韩国选手金泽洙，普里莫拉茨以2∶0胜瑞典名将瓦尔德内尔。"},{"type":"paragraph","text":"王涛在第一轮比赛中战胜韩国的刘南奎后，在半决赛中与世乒赛冠军、法国选手加蒂安相遇，结果以2∶1险胜。"},{"type":"paragraph","text":"中国队教练陆元盛说，王涛以前从未胜过加蒂安，今天他打出了信心。"},{"type":"paragraph","text":"加蒂安在第一轮比赛中以2∶0淘汰了世界排名第三的比利时选手塞弗。"},{"type":"paragraph","text":"’94乒乓球世界全明星巡回赛共有8名选手参加，其中包括奥运会冠军瓦尔德内尔、世界杯赛冠军普里莫拉茨和世乒赛冠军加蒂安。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2188b0559b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
