es":[{"year":1968,"month":5,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"日本共产党千叶县委员会(左派)联络负责人菊地一茂说，毛泽东同志亲自领导和发动的中国无产阶级文化大革命，是人类历史上空前的伟大革命，不仅对中国的历史发生着伟大的作用，而且对国际共产主义运动及世界革命，正在产生着深远影响。"},{"type":"paragraph","text":"菊地表示，日本千叶县革命左派将深入地学习伟大的毛泽东思想，在毛泽东思想的伟大红旗下，进一步团结起来，加强反带、反修、反日本垄断资本的斗争。"},{"type":"paragraph","text":"日本共产党大坂府委员会(左派)代表保田敏男说，日本革命左派，在中国无产阶级文化大革命的鼓舞下，纷纷起来造了宫本修正主义集团的反。"},{"type":"paragraph","text":"日本共产党兵库县委员会(左派)松井志郎说，伟大的领袖毛主席是世界革命人民的导师。中国无产阶级文化大革命的伟大胜利，不仅是中国人民的伟大胜利，而且是国际无产阶级和全世界人民的伟大胜利。"},{"type":"paragraph","text":"他说，伟大的毛泽东思想是国际共产主义运动光辉的指路明灯。捍卫伟大的毛泽东思想，捍卫中国无产阶级文化大革命的胜利成果，捍卫伟大的中华人民共和国是日本革命左派和全世界无产阶级的神圣的国际主义义务。"},{"type":"paragraph","text":"日本民主青年同盟爱知县委员会(左派)委员、青年女工矶部惠子说，随着伟大的无产阶级文化大革命的胜利，越来越多的日本革命青年和人民，提高了觉悟，认清了日共宫本修正主义集团的反革命真面目。"},{"type":"paragraph","text":"矶部说:日本革命必须依靠伟大的毛泽东思想。向日本人民传播伟大的毛泽东思想是我们日本革命青年的无比光荣的任务。她说，日本的革命青年，牢记伟大领袖毛主席“枪杆子里面出政权”的教导，将进一步为争取日本民族的解放和日本革命的胜利贡献出自己的力量。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"718399add9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
