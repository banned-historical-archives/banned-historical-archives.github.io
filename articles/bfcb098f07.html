script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"改进医疗作风　全心全意为人民服务  广州部队一六五医院医护人员学习马克思主义，批判修正主义，抵制资产阶级思想的影响，出现了新的医疗风尚","authors":[],"dates":[{"year":1975,"month":6,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"改进医疗作风　全心全意为人民服务"},{"type":"paragraph","text":"广州部队一六五医院医护人员学习马克思主义，批判修正主义，抵制资产阶级思想的影响，出现了新的医疗风尚"},{"type":"paragraph","text":"据新华社广州电　人民解放军广州部队一六五医院党委，认真组织医护人员学习马克思主义，批判修正主义，注意警惕资产阶级思想的腐蚀和影响。广大医护人员全心全意为人民服务，出现了新的医疗风尚。"},{"type":"paragraph","text":"这个医院的党委认真组织医护人员学习马列著作和毛主席著作，深入批判修正主义的医疗卫生路线，提高了贯彻执行毛主席的无产阶级医疗卫生路线的自觉性。广大医护人员利用医疗队到工厂、农村巡诊防病的机会，虚心接受工人阶级和贫下中农的再教育，促进自己的思想革命化，提高对工作的责任感。一次，五官科助理军医高秀芬为地方上的一个青年作鼻炎埋线复查，看到埋线吸收良好，本来可以签字让他离院，可是高秀芬又对病人作多方面的检查，结果诊断出病人还患有痢疾，于是又建议住院治疗。过去，有的医护人员把怕脏怕累总看作是一般的作风问题。现在，大家认识到怕脏怕累是资产阶级思想，于是抢着干脏活累活。一次，病房收治了一位大小便失禁的重病人，每天需要换洗七、八次被褥，大家天天抢着给她倒屎倒尿，喂饭洗澡。经过一年的精心护理，使她痊愈出院。"},{"type":"paragraph","text":"在为工农兵服务的过程中，他们严格执行毛主席为我军制定的“三大纪律八项注意”，防止沾染资产阶级的思想作风。这个医院的老年慢性支气管炎防治小组，长年累月地走村串户，热情为部队和驻地群众防病治病，但他们决不接受“请客送礼”。医护人员在医疗中，有时碰到个别人散布资产阶级思想作风，就认真进行批评教育。她们说：全心全意为人民服务，就要同资产阶级的医疗思想作风决裂。如果沾染上资产阶级思想作风，就要偏离无产阶级的办院方向。"},{"type":"paragraph","text":"这个医院还涌现出许多处处以他人利益为重的新人新事。护士杨粤穗在抢救一位危重病儿时，看到患儿急需输血，而血库正缺少这一血型的血，便不顾连续上夜班的疲劳，主动将自己的血输给患儿，使病儿转危为安。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bfcb098f07"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
