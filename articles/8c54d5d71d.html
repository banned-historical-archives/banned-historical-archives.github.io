art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"警惕资产阶级思想的侵蚀","authors":["周杰〖HH/换行〗DW：海南岛驻军"],"parts":[{"type":"paragraph","text":"我出身于贫苦家庭，童年是在苦水里熬过的。解放后，我在蜜水里成长。经过党的教育，我懂得了爱和恨，决心永远不忘过去。我想：家庭出身好，可以自然红，资产阶级思想不可能侵蚀我。"},{"type":"paragraph","text":"可是，资产阶级思想象毒菌一样，无孔不入。一九六○年我提为军官了，不论思想上还是生活上，马上改变了普通一兵的本色，急于买料子服，急于讲排场、摆阔气。正如话剧《千万不要忘记》的台词所说的，问题不在于你穿什么，问题在于你想什么，追求什么，奋斗目标是什么。而我，恰恰忘记了过去所受的苦，忘记了世界上还有三分之二以上的劳动人民没有获得解放。我脑子里的前沿阵地，已被资产阶级思想打开了一个缺口。"},{"type":"paragraph","text":"我的这一经历说明：家庭出身好，不能自然红，因为在有阶级和阶级斗争的社会里，资产阶级随时随地都在争夺我们青年。要清除资产阶级的思想影响，就得自觉改造，自觉锻炼。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8c54d5d71d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
