<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"b2b674a1-9042-4317-a7b8-de4267668ba5","name":"毛泽东思想万岁（1958.1-1960）","internal":false,"official":false,"type":"pdf","author":"","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives3/main/b2b674a1-9042-4317-a7b8-de4267668ba5.pdf"],"article":{"title":"在上海会议上的讲话","alias":"","parts":[{"type":"paragraph","text":"在上海会上的话"},{"type":"paragraph","text":"（一九五九年四月五日）要多谋普断。第一要多谋，第二要能断。什么叫多谋呢？就是要听听不同的意见。先跟我们这些人谈一谈，交换交换意见。"},{"type":"paragraph","text":"要谋于秘书，谋于省市党书记，谋于地委书记、县委书记、公社书记、谋于农民，谋于厂长、车间主任、工段长、小组长，谋于工人，谋于有不同意见的同志。"},{"type":"paragraph","text":"要当机立断，不要错过形势。机不可失，时不算来。要善于观察形势，才能当机立断。缺乏当机立断，还是对形势观察不安，断得不恰当，就是有一点武断。"},{"type":"paragraph","text":"x"},{"type":"paragraph","text":"x"},{"type":"paragraph","text":"x"},{"type":"paragraph","text":"留有余地，成都会议上就讲过留有余地，后头不留有余地了。我们过去打仗，是用三倍、四倍、五倍、六倍、以至七倍的兵力来包围敌人，这是留了很大的余地。你一个团，我用三个、五个、六个、十个团，有几个团的后备，总可以把它吃下。不打无准备之仗，不打无把握之仗。而现在我们搞工业很多是打没有把握之仗，打没有准备之仗。我就怀疑搞工业的同志们是否眞正积累了经验。积累了一些，还有一些没有积累。工作方法有相当大部份不对头。比如就不晓得多谋善断，留有余地。这是个马克思主义的方法问题。"},{"type":"paragraph","text":"×x"},{"type":"paragraph","text":"x"},{"type":"paragraph","text":"我们过去反对的“鞍形”，重点是在皮对“反曾进”。一九五七年不搞“鞍形”是不行的。为了完成第一个五年计划，一九五六年搞了一百四十亿元的基本建设投资，当时是必要的。但是库存减少很多，一九五七年不得不调整一下。一九五六年十一月中央全会的时候，我完全赞成调整。铁和材料只有那么多，只能办那么多的事。"},{"type":"paragraph","text":"*马鞍形”将来还会有。生产增长速度可能一年高一点、一年低一点，或者两年高一点、一年低一点，或者三年高一点、一年两年低一点。不能每天高潮。象我们开会，每天高潮，就要死人的。波浪式的前进，这是个工作方法问题，"},{"type":"paragraph","text":"在第十六次最高国务会上的罐舒要"},{"type":"paragraph","text":"（一九五九年四月十五日）"},{"type":"paragraph","text":"有许多人对西藏寄于同情。但是他们同情少数人，不同情多数人，一百个人里头，同情几个人，就是那些叛变分子，不同情首分之九十几。在外国，有那么一些人，他们对西藏人就是只同情一两万人，顶多三、四万人。西藏（包括昌都、前藏、后藏三个区域）大概是一！"}],"authors":["毛泽东"],"dates":[{"year":1959,"month":4,"day":5}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":231,"page_end":231},"tags":[{"name":"毛泽东","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6b7af7eaae"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
