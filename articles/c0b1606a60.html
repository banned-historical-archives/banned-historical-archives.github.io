es":[{"year":1951,"month":2,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"京市人民政府和各党派、团体"},{"type":"paragraph","text":"向毛主席朱总司令献旗"},{"type":"paragraph","text":"【京市新闻处讯】京市人民政府和各民主党派、人民团体等十七个单位在春节拥军优属运动中为了表示对毛主席、朱总司令所领导的中国人民解放军的崇高敬意，特于十四日下午三时向中央人民政府毛泽东主席、中国人民解放军朱德总司令暨中国人民解放军全体指战员献旗致敬。"},{"type":"paragraph","text":"献旗典礼在庄严的国歌声中开始。由京市人民政府吴晗副市长代表首都各界人民献词致敬。中国人民革命军事委员会总政治部副主任萧华将军代表毛主席、朱总司令和人民解放军全体指战员接受锦旗，并表示谢意。"},{"type":"paragraph","text":"参加献旗典礼的单位有北京市人民政府、中共北京市委会、中国国民党革命委员会北京市分会、中国民主同盟北京市支部、民主建国会北京市分会、中国民主促进会北京市分会、中国农工民主党北京市分会、九三学社北京市分会、中国新民主主义青年团北京市委会、中国人民保卫世界和平反对美国侵略委员会北京市分会、北京市总工会、北京市农民协会、北京市民主妇女联合会、北京市学生联合会、北京市文学艺术工作者联合会、中苏友好协会北京市分会、北京市工商联合会筹备会。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c0b1606a60"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
