art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"两条路线斗争中找问题 灵魂深处斗私字","authors":["沈阳部队活学活用毛泽东思想积极分子/指导员张玉德"],"parts":[{"type":"paragraph","text":"去年五月，我和几个同志组成一个毛泽东思想宣传队，执行支农任务。我很高兴，心想，这是执行毛主席他老人家发出的“人民解放军应该支持左派广大群众”的伟大战斗号令，一定要紧跟毛主席的伟大战略部署，勇敢地捍卫毛主席的革命路线，和贫下中农一起把农村的文化大革命进行到底。"},{"type":"paragraph","text":"我所在的生产队阶级斗争很复杂，当时我想：自己是学习毛主席著作积极分子，要是在阶级斗争的火线上打了败仗，可就“砸锅”了，上级面前不好交代，群众中影响也不好。越想越觉得不如到别的队好，可以少担些风险。"},{"type":"paragraph","text":"党小组会上，有的同志一针见血地给我提出：“在复杂的阶级斗争面前，怕沾包，想换队，是最大的私，是没有按照毛主席的指示办事。我们应当迎着阶级斗争的大风浪前进。”同志们的批评，使我受到很大的震动。带着这个问题，我学习了光辉的“毛三篇”，认识到：开始信心很足，是因为自己想搞出点名堂来；现在想换队，是看到问题很复杂，不好搞，怕丢面子。说来说去，都是“私”字在作怪。反复学习了“老三篇”，使我深刻认识到保名就是保私。我决心斗倒“私”字，迎着困难上，在复杂的阶级斗争中，为保卫毛主席的革命路线做出贡献。于是，我按照毛主席的教导，深入到群众中，和广大贫下中农一起，同中国赫鲁晓夫在农村推行的反革命修正主义路线作斗争，较好地完成了支农任务。"},{"type":"paragraph","text":"斗争实践教育了我：两个阶级、两条道路、两条路线大搏斗的战场，是检验我们世界观的考场。抓住在两条路线斗争中的活思想，破私立公，就能破到要害处，立在根本上；就能坚决执行毛主席的革命路线，永远忠于毛主席。"}],"alias":""},"tags":[{"name":"两条路线斗争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c802859812"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
