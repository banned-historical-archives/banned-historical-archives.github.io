" crossorigin="">{"props":{"pageProps":{"books":[{"id":"chuanxinlu1","name":"十年文革中首长讲话传信录（上册）","internal":false,"type":"pdf","official":false,"author":"周良霄,顾菊英","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/十年文革中首长讲话传信录1.pdf"],"article":{"title":"江青、陈伯达在北京大学革命师生大会上的讲话","parts":[{"type":"title","text":"22．江青、陈伯达在北京大学革命师生大会上的讲话"},{"type":"paragraph","text":"(1966年7月23日深夜)江青同志："},{"type":"paragraph","text":"革命的同学们，我跟陈伯达同志是来做小学生的，我是和他一块来听一听同志们的意见，看一看你们的大字报，这样我们可以懂一点事，少犯错误，跟同志们一块来进行这一场文化大革命。我们是一块的，不会脱离你们的。你们什么时候说有意见，要我们来听，我们就立刻来。现在我们了解的也还不够多，也还提不出什么具体的意见。"},{"type":"paragraph","text":"但是，一片大好形势！你们的革命的热情是好的！干劲是好的！我们都站在你们这个革命派这边。革命是个大熔炉，最能锻炼人了。谁不革命，谁就走开！革命的跟我们站在一块。"},{"type":"paragraph","text":"我听说你们昨天一夜没有睡，今天也在辩论。本来是想听一听你们的辩论会的，可是来了就不行啦！(笑了)所以，我希望你们今晚上要好好睡觉。要吃好，睡好，才能打好这一仗。"},{"type":"paragraph","text":"好，现在请陈伯达同志来谈几句话。伯达同志："},{"type":"paragraph","text":"刚才江青同志讲的话，就是我们文化革命小组向大家想讲的话，我完全同意她的话。我们想还继续来向你们这里学习，学习你们斗争的经验。在这个文化革命中，这个斗争中，北京大学是站在最前面。我相信，你们一定会在党中央的领导下，在毛泽东思想的旗帜下，继续前进！"},{"type":"paragraph","text":"我讲点个人意见，对于“6·18”这个事情，说是个反革命事件，这是不对的，错误的。这是我个人向大家说这么一点。我希望大家在这个斗争中，好好学习毛主席著作，学习他怎么样分析阶级，分析情况，把我们中国革命一步一步引导到胜利的道路。在文化革命中，我们要掌握好毛泽东思想这个武器，好好学习毛主席著作，看他是怎样领导革命的，我们应当怎么样在这个革命运动中做工作。听懂了吗？(大家回答：听懂了！)"},{"type":"paragraph","text":"革命的道路是不平坦的，是曲折的，是会有一些反复的。比如你们就有些反复。“6·18”以前，“6·18”以后，以及到最近这几天就有几种反复，是不是？有些反复嘛，是有变化嘛，路是曲折的，革命的道路是不平坦的，是曲折的。准备斗争，准备胜利。"},{"type":"paragraph","text":"毛主席万岁！"},{"type":"paragraph","text":"毛泽东思想万岁！江青同志："},{"type":"paragraph","text":"我一定把同志们的革命热情、革命干劲带给毛主席。再见了！"}],"authors":["江青","陈伯达"],"dates":[{"year":1966,"month":7,"day":23}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":56,"page_end":56,"alias":""},"tags":[{"name":"江青","type":"人物"},{"name":"陈伯达","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a128f60690"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
