<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"资产阶级野心家、阴谋家的可耻下场","authors":["华国瑞","胡亮宝"],"dates":[{"year":1973,"month":9,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"上钢五厂二车间　华国瑞　胡亮宝"},{"type":"paragraph","text":"我党历次路线斗争的经验告诉我们:一切混入党内的资产阶级代理人，为了反对毛主席的马克思列宁主义路线，实现其篡夺党和国家领导权的政治野心，他们必然在组织上搞分裂活动，在策略手段上搞阴谋诡计。林彪正是这样一个资产阶级野心家、阴谋家。"},{"type":"paragraph","text":"打着“大树特树”的旗号，反对无产阶级革命领袖，这是林彪搞阴谋诡计的手法之一。林彪为了达到其篡党夺权的罪恶目的，玩弄“大树特树”的阴谋，歪曲、阉割和篡改马列主义、毛泽东思想。他胡诌什么马列主义“过时了”，要“大树”毛泽东思想，而毛泽东思想则是由他“端出来”、“树起来”的，这是对伟大领袖毛主席的诬蔑和攻击。林彪“大树特树”毛泽东思想是假，要别人树“林家”是真。不是吗?正当林彪口头上叫喊“大树特树”“绝对权威”的时候，背地里却在切齿咒骂毛泽东思想已经“走向反面”，积极炮制复辟资本主义的反革命武装政变计划。可见，林彪的“大树特树”是一个战略上的诡计。"},{"type":"paragraph","text":"以“注重大节”为名，拼凑资产阶级司令部，是林彪的又一阴谋。只要是卖身投靠他的，就被称为“大节好”、“自己人”，收作死党，包庇重用。凡是私心重、骨头软的，他就用封官许愿、请客送礼、接见照相等手法，腐蚀拉拢，拉上贼船。要是与他有不同意见的，他就收集黑材料，不惜用流氓的语言，叫嚣要“斗倒斗垮”、“共讨共诛”、“千刀万剐”。这是林彪一伙拉山头，搞宗派，分裂党，搞反革命阴谋的大暴露。"},{"type":"paragraph","text":"装出“高举”、“紧跟”的样子，在背后下毒手，是林彪这个资产阶级野心家、阴谋家最毒辣的阴谋。林彪在表面上好话说尽，在背地里却大量收集、精心研究古今中外一切野心家的政变阴谋、谋杀伎俩。训练反革命别动队，穷凶极恶地妄图谋害我们伟大领袖毛主席。真是阴谋要尽，野心毕露，罪大恶极，死有余辜。"},{"type":"paragraph","text":"林彪搞阴谋诡计决非偶然，这是由他的反动资产阶级本性所决定的。在无产阶级专政条件下，资产阶级在党内的代表人物懂得，他们要夺回失去的“天堂”，就得靠伪装，搞阴谋。否则，他们就连一天也混不下去。因此，耍两面手法，搞阴谋诡计，便成了资产阶级野心家颠覆无产阶级专政、复辟资本主义惯用的手法和策略。野心家、阴谋家林彪怀着不可告人的罪恶目的，“语录不离手，万岁不离口，当面说好话，背后下毒手”，口蜜腹剑，笑里藏刀，其最终目的就是妄图在中国实现其封建买办法西斯专政的美梦。"},{"type":"paragraph","text":"历史是无情的，一切逆时代潮流而动的资产阶级野心家、阴谋家，不管他怎样善于耍阴谋诡计，“其实都是最愚蠢的，都是没有好结果的。”林彪这个资产阶级野心家、阴谋家，他自以为搞阴谋诡计，就能够扭转历史前进的车轮；耍陷害手段，就可以实现其篡党篡政、复辟资本主义的反革命狼子野心，这只是白日做梦，只能落得一个身败名裂，葬身沙漠的可耻下场!"},{"type":"paragraph","text":"\u003cIMG alt=请插入6号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1973\\09\\7395030101.JPG\"\u003e"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"name":"夺权","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0bab99ec0d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
