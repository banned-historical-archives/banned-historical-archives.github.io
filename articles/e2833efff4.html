script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"在蒋介石卖国集团暴虐统治和残酷剥削下台湾同胞生活水深火热","authors":[],"dates":[{"year":1954,"month":8,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"大批裁员制造大量失业流离失所无以为生者日增"},{"type":"paragraph","text":"【据新华社北京电】　据台湾报纸透露，蒋介石卖国集团正在大批裁员，将更多的台湾同胞推入失业的队伍。伪政府今年宣布各级机构都要裁员十分之一。伪台湾糖业公司今年已裁员三千七百名，伪招商局裁员一千三百多人，伪台湾电力公司裁员五千人。而事实上，这些替蒋介石卖国集团工作的公务人员由于待遇菲薄，早已吃穷当光。台湾某一典当铺经理三月五日在伪高雄市议会报告说，目前典当财物者以公务员为最多，占百分之二十八。蒋介石卖国集团现在将他们大批裁去，无疑将使他们的生活完全处于绝境。"},{"type":"paragraph","text":"从台湾报纸透露的一些零星的消息中，可以看出台湾同胞生活悲惨的情形。在台北市，许多失业者流离失所，栖身在人行道旁棚屋内的人数日益增加。他们有许多人以输血为生，而许多妇女则被迫为娼。台湾报纸承认，仅台北市一地就有娼妓一万多人，平均每十名成年妇女中就有一人。许多生活困难的家庭将自己的女儿出卖给人做“养女”，而这些“养女”大部分受到欺凌和虐待，最后被迫为娼。生活悲惨的结果，患肺病而死亡的人为数惊人。台湾匪帮承认台湾息肺病的人有十六万人之多，每年因此死亡的达一万一千多人。"},{"type":"paragraph","text":"替美国倾销剩余肥料用高利贷掠夺农民粮食"},{"type":"paragraph","text":"蒋介石残余匪帮使用种种手段残酷剥削台湾农民，其中手段之一就是利用美国肥料来掠夺农民的粮食。"},{"type":"paragraph","text":"由于美国垄断了台湾肥料的货源，利用肥料与台湾大米进行不等价交换，台湾肥料价格高涨。从一九四九年六月到一九五三年六月期间，台湾物价平均上涨为六倍，而肥料的价格上涨为十倍，使台湾农民无力购买肥料。现在台湾耕地的施肥量比一九三八年减少了一半。蒋匪粮食局趁机用“以肥换谷”的办法来掠夺农民的口粮供给出口，他们强向农民“贷放”美国肥料，规定肥料款价百分之三十要当时缴纳稻谷，百分之七十要在收割后“偿还”稻谷，并按百分之十计算月息。"},{"type":"paragraph","text":"台湾宜兰县农民的例子清楚地说明:“以肥换谷”是蒋匪帮替美国倾销剩余肥料和以高利贷剥削台湾农民的毒辣手段。宜兰县去年遭受天灾，歉收的粮食也已被蒋匪帮征敛殆尽，农民无法再缴纳“肥料谷”。据统计，到今年六月为止，全县农民“积欠”去年第一期的“肥料谷”九十六万市斤，以月息一分计算，每百斤应加“利息”二百三十斤；“积欠”去年第二期的“肥料谷”二百二十四万市斤，每百斤应加“利息”七十三斤；合计要向匪粮食局“清还”去年“肥料谷”三百二十万市斤，外加“利息”二百八十八万三千二百市斤。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e2833efff4"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
