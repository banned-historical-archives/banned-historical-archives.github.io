art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"郭老对“全部烧掉”的自解——记“文革”初期郭老给青年教师徐正之的一封复信","authors":["薜文"],"parts":[{"type":"paragraph","text":"1966年，“史无前例”的10年大动乱拉开了序幕。各条战线上的优秀分子、知名人士率先成了被批判的对象。是年4月14日，身为全国人大副委员长的郭沫若同志，在三届人大常委会第三十次会议上发言，他说：“几十年来，一直拿着笔杆子在写东西。按字数来讲，恐怕有几百万字了，但是，拿今天的标准来讲，我以前所写的东西，严格地说，应该全部把它烧掉，没有一点价值。”这个讲话后经新华社播发，见诸各报纸。"},{"type":"paragraph","text":"郭老这番话如何理解？不同的人有不同的看法。当时有一位青年教师徐正之，在他写的一篇有关郭老的历史剧《武则天》的文章中，对郭老此言表示了自己的看法。文中说：“简单的烧掉是不能解决问题的，也是不科学的。真正的共产党人，要敢于坚持真理，敢于纠正错误。并援引毛泽东同志的话说：“彻底的唯物主义者是无所畏惧的。”"},{"type":"paragraph","text":"1967年8月24日，徐持此文走访了人民日报社，想征求一下编辑部的意见。一位编辑看过文章后，提出了三条建议供徐选择。一，写成大字报张贴在大街上；二，在群众小报上发表；三，将文章转送郭老亲自阅处。徐按第三条建议将文章送呈郭老，同时给郭老写了一封短信，请他阅后提出意见，并请求他将稿件“挂号退还”。"},{"type":"paragraph","text":"第二天，即8月25日，郭老看了信、稿，亲笔作复，并附退原稿。信如下："},{"type":"paragraph","text":"大作拜读了，谢谢您的指教，谨如嘱“挂号退还”。我自己也希望能成为“一个彻底的‘辩证’唯物主义者。”"},{"type":"paragraph","text":"凤凰每经五百年要自焚一次，从火中再生。这就是我所说的“烧掉”的意思。"},{"type":"paragraph","text":"专复 顺致"},{"type":"paragraph","text":"敬礼"},{"type":"paragraph","text":"郭沫若"},{"type":"paragraph","text":"八月二十五日"},{"type":"paragraph","text":"迄今为止，这是我们所看到的郭沫若同志对这一问题所作的唯一解释。"},{"type":"paragraph","text":"（薛文）"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1a773740a2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
