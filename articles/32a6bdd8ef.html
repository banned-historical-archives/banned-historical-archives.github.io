nned-historical-archives/banned-historical-archives9/main/books/十年文革中首长讲话传信录3.pdf"],"article":{"title":"陈伯达对红卫兵负责人的重要讲话","parts":[{"type":"title","text":"976.陈伯达对红卫兵负责人的重要讲话"},{"type":"paragraph","text":"(1967年10月1日)"},{"type":"paragraph","text":"十月一日晚，在天安门城楼上，我们最最敬爱的伟大领袖毛主席同总理、伯达同志谈了两个小时话，然后伯达同志出来对城楼上的红卫兵负责人谈了话。他说：你们要好好改造资产阶级世界观，你们的世界观是资产阶级的。文化大革命以来，在有些地方是有所改进的，在很多地方却有所增长，(指资产阶级世界观)你们如果不改造资产阶级世界观，就可能垮台，毛主席党中央不希望你们垮台，如果你们硬要垮，我们也没有办法。陈伯达同志还说：你们根本谈不上什么党性，而是派性高于一切。我们是党性高于一切，我们是毛泽东思想高于一切。陈伯达同志又说：加入党的，应该懂得无产阶级党性，还没有加入党的，如果是无产阶级的革命派，也应该懂得无产阶级的党性，按照无产阶级党性办事。象鲁迅先生，他没有加入党，就是有高度的无产阶级党性。"}],"authors":["陈伯达"],"dates":[{"year":1967,"month":10,"day":1}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":421,"page_end":421,"alias":""},"tags":[{"name":"陈伯达","type":"人物"},{"name":"派性","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"32a6bdd8ef"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
