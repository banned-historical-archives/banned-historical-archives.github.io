" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji15","name":"毛泽东全集第15卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji15.pdf"],"article":{"title":"在政治上军事上准备全面大反攻救援新四军","alias":"","parts":[{"type":"paragraph","text":"在政治上军事上准备全面大反攻"},{"type":"paragraph","text":"救援新四军1]"},{"type":"paragraph","text":"（1941年1月14日）彭、左，贺、关，聂、彭，刘、邓，吕、程，朱，陈、罗，胡、陈，周、叶："},{"type":"paragraph","text":"（一）叶项率新四军万人遵令北移，被蒋介石派七万余人包围于泾县以南之茂林一带，自鱼至元已血战八昼夜，他们决与全军存亡。文夜虽有傅秋涛一部突小包围，但主力仍未突围，有全军覆灭危险。"},{"type":"paragraph","text":"[1]这是毛泽东和朱德、中共中央军委副主席王稼祥给彭德怀、八路军副参谋长左权等的电报。"},{"type":"paragraph","text":"[2]贺、关，指贺龙、关向应，当时分别任八路军第一二○师师长和亚治委员。聂、彭，指聂荣臻、彭真，当时分别任八路军晋察冀军区司令员兼政治委员和中共中央北方分局书记。刘、邓，指刘伯承、邓小平，当时分愚任八路军第一二九师师长和政治委员。吕、程，指吕正操、程子华，当时别任八路军第三纵队兼冀中军区司令员和政治委员。朱，指朱瑞，当时任共中央山东分局书记。陈、罗，指陈光、罗荣桓，当时分别任八路军第一五师代师长和政治委员。胡、陈，指胡服（刘少奇）和华中新四军八路军指挥部代总指挥陈毅。周、叶，指周恩来和中共驻重庆代表叶剑英。"},{"type":"paragraph","text":"[3]叶，指叶挺，当时任新四军军长。项，指项英，当时任中共中类委新四军分会书记、新四军副军长。"},{"type":"paragraph","text":"（二）中央决定在政治上军事上迅即准备作全面大反攻，救援新四军，粉碎反共高潮。"},{"type":"paragraph","text":"（三）除已令苏北、山东迅即准备一切，待命消灭韩德勤、沈鸿烈\"，同时发出最严重抗议通电，并向蒋介石直接谈判外，我华北洛部须遵前令提前准备机动部队，准备对付最严重事变。"},{"type":"paragraph","text":"毛泽东朱德王稼祥"},{"type":"paragraph","text":"寒[1韩德勤，当时任国民党江苏省政府主席、国民党军鲁苏战区副总司沈鸿烈，当时任国民党山东省政府主席、国民党军鲁苏战区副总司令。2指《包围韩德勤沈鸿烈以答复蒋介石对皖南新四军之聚歼计划》中场"}],"authors":["毛泽东"],"dates":[{"year":1941,"month":1,"day":14}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":348,"page_end":349},"tags":[{"name":"毛泽东","type":"人物"},{"name":"朱德","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0343ae199d"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
