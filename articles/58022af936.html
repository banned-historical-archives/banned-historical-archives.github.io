" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"向共产党进一言","authors":["南京林学院","徐福均"],"dates":[{"year":1957,"month":6,"day":6}],"is_range_date":false,"parts":[{"text":"向共产党进一言","type":"title"},{"text":"南京林学院徐福均","type":"authors"},{"text":"徐福均已将他写的“向共产党进一言”的文章交给学生会，从六方面揭露其所谓“一些不平的现实”并提出九项要求。","type":"paragraph"},{"text":"“一些不平的现实”","type":"subtitle"},{"text":"1、一党专政，以党代政；","type":"paragraph"},{"text":"2、党员高人一等，视群众为落后分子；","type":"paragraph"},{"text":"3、在共产党没有克服不了困难标题下，出现了不懂装懂的外行装内行的现象；","type":"paragraph"},{"text":"4、与民主党派长期共存，有名无实；","type":"paragraph"},{"text":"5、民主气氛不够，自由空气不浓；","type":"paragraph"},{"text":"6、责人则严，责己从宽。","type":"paragraph"},{"text":"九项要求","type":"subtitle"},{"text":"1、大民主自由，今后的选举和统一分配工作应由同学自己作主；","type":"paragraph"},{"text":"2、要求博爱平等。目前只有对党的尊，没有对群众的敬，应提倡互敬友爱合作；","type":"paragraph"},{"text":"3、对学生的鉴定应全部公开；","type":"paragraph"},{"text":"4、立即成立平反委员会，恢复被错斗者的名誉及当众烧毁不符事实的资料，一切不得暗留底稿。","type":"paragraph"},{"text":"5、民主党派应扩大且有职有权；学校亦成立民主党派吸收青年参加，民主党派应和党平级的领导我们，要听听民主人士的政见和治国大纲；","type":"paragraph"},{"text":"6、建立由教授为核心的校务委员会来领导全院的教学工作，反对以政治代替业务；","type":"paragraph"},{"text":"7、建立学生代表制，代表应全部由民主方式产生，党群应分开选举；","type":"paragraph"},{"text":"8、紧缩党的机构，取缔各系党支书脱产制，今后党的常规活动费应由党自己负担，不得由国库开支；","type":"paragraph"},{"text":"9、迅速解决建院问题。","type":"paragraph"},{"text":" 来源：1957年6月8日新华通讯社编《内部参考》。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"58022af936"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
