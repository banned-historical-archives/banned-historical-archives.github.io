tart":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"雷格·伯奇同志率英共（马列）访华代表团到京周恩来、姚文元、纪登奎等同志到机场热烈欢迎 周恩来、姚文元、邱会作、纪登奎同志宴请英国同志","authors":[],"parts":[{"type":"paragraph","text":"中共中央政治局常委周恩来、政治局委员姚文元、政治局候补委员纪登奎、中央委员刘锡昌、候补中央委员郭玉峰，以及有关方面负责同志任允中、申健、朱达成、冯铉、唐明照，到机场热烈欢迎英共（马列）访华代表团的同志。"},{"type":"paragraph","text":"今天晚上，周恩来、姚文元、邱会作和纪登奎同志举行宴会，热烈欢迎雷格·伯奇主席和由他率领的英共（马列）访华代表团的同志。"},{"type":"paragraph","text":"到机场欢迎代表团的全体同志出席了宴会。中共中央委员曹轶欧、倪志福，候补中央委员张世忠和有关方面负责同志张纪之、鲁瑛、王笑一、凌青也出席了宴会。"},{"type":"paragraph","text":"在宴会前后，周恩来、姚文元、邱会作和纪登奎同志和雪格·伯奇等英国同志进行了亲切的谈话。"}],"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"姚文元","type":"人物"},{"name":"纪登奎","type":"人物"},{"name":"邱会作","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6f90291f87"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
