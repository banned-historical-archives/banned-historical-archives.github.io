:["太原工学院学生"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"大字报——是离开宝座的时候了","type":"title"},{"text":"太原工学院学生","type":"authors"},{"text":"我们是一年级的同学。各方面的情况不太了解，但看了大字报后，我们愤怒的火焰无法克制，我们的热血已经沸腾，我们不能再沉默，良心迫使我们拿起武器，向官僚主义作无情的斗争，我们要为受寃者抱不平。","type":"paragraph"},{"text":"在肃反中你们没有尾巴主义是开路先锋，你们雷厉风行，血口喷人，蛮横粗暴，不可一世的气势现在那里去了，你们到静坐禅功，对我们的意见为什么无动于衷，我们一年级同学功课压力大，星期日变成星期七，不能休息，我们一再提过意见，可是党委和行政“置若罔闻”，置之不理，试问身体健康何以保证，我们怀疑党能够领导好教学工作。","type":"paragraph"},{"text":" 太原工学院×××","type":"paragraph"},{"text":" 来源：《“鸣”、“放”选集（一）》（中共山西省委整风办公室编，1957年8月）。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"56a6895da7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
