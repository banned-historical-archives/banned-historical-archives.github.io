art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"无限忠于毛主席 誓为人民立新功","authors":["空军某部击落美蒋U—2高空侦察机的全体指战员"],"parts":[{"type":"paragraph","text":"山在欢呼，海在欢笑！我们伟大领袖毛主席视察了华北、中南和华东地区后，胜利回到北京的喜讯传来，激动着每一个革命战士的心，我们一遍又一遍地欢呼：毛主席万岁！万岁！万万岁！"},{"type":"paragraph","text":"毛主席啊！我们最最敬爱的伟大统帅！您以无比惊人的伟大气魄，亲自发动和领导了震惊世界的无产阶级文化大革命，开创了无产阶级专政条件下进行革命的光辉范例。在您的亲自指挥下，亿万文化革命大军，向党内最大的一小撮走资本主义道路的当权派展开了猛烈的攻击，取得了决定性的胜利。在革命大批判和革命大联合的新高潮中，您老人家又走遍华北、中南和华东各地，深入到广大群众中去，进行了细致的调查和研究。您的伟大实践，进一步把文化大革命推向前进。"},{"type":"paragraph","text":"毛主席呀，毛主席！您这伟大的行动，象一股劲吹的东风吹遍了祖国每一个角落。这是您对全国无产阶级革命派的最大最大的鼓舞，最大最大的关怀，最大最大的爱护，最大最大的鞭策。"},{"type":"paragraph","text":"敬爱的毛主席，人民解放军是您亲手缔造和亲自领导的军队，是无产阶级专政的柱石，是保卫无产阶级文化大革命最坚强的后盾。我们一定紧跟您的伟大战略部署，牢牢掌握斗争大方向，做革命大批判的先锋，当促进革命大联合的模范，和无产阶级革命派一道，集中火力，集中目标，彻底摧毁资产阶级司令部。我们也一定遵照您抓革命，促战备的伟大号召，百倍地提高警惕，随时准备歼灭一切敢于来犯的敌人，随时准备粉碎地富反坏右分子和美蒋特务的阴谋破坏活动。在无产阶级文化大革命运动中，为人民立新功！"}],"alias":""},"tags":[{"name":"革命大批判","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ff3164144c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
