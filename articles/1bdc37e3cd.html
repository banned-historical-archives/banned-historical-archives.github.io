ical-archives/banned-historical-archives0/main/maoquanji48.pdf"],"article":{"title":"看了“人工喉”“断手再植”“止血粉”等文章后对医务工作者的指示","alias":"","parts":[{"type":"paragraph","text":"看了“人工喉”“断手再植”“止血粉”"},{"type":"paragraph","text":"等文章后对医务工作者的指示"},{"type":"paragraph","text":"（1966年3月12日）"},{"type":"paragraph","text":"应该加强医务人员的马列主义学习，并用以指导业务工作。既然军事上证明了所谓弱者可以打败强者，没有念过书或念过很少书的可以打败黄埔毕业生、陆军大学毕业生，医务界为什么是例外？医学校也要加强马列主义课程，好多毕业生就是不懂马列主义。血吸虫病的检查与治疗应该免费。过去医务人员就是不接近群众，不相信群众。消灭钉螺的办法还不是群众创造出来的？所以，我写的那首诗内说：“华佗无奈小虫何。”今后要在医务界大力系统的宣传马列主义。医务人员都要下去。"}],"authors":["毛泽东"],"dates":[{"year":1966,"month":3,"day":12}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":315,"page_end":315},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1bdc37e3cd"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
