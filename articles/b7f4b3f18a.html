tart":5,"page_end":5,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"纪录片《走近毛泽东》令人耳目一新","authors":[],"parts":[{"type":"paragraph","text":"新华社北京11月26日电（记者邱红杰）首次公开的影像、鲜为人知的故事，由中央文献研究室、中央新闻纪录电影制片厂等单位最近联合摄制完成的文献纪录片《走近毛泽东》，令人耳目一新。"},{"type":"paragraph","text":"26日首映的这部长约90分钟的电影纪录片，有近100组首次公诸于世的珍贵资料镜头。据新影副厂长郭本敏介绍，这个片子是为了纪念毛泽东诞辰110周年而摄制的，前后历时近1年，制作这部影片目的是为了让现在年轻人对这位开国领袖的人格、思想多一些了解，让年长一些的人对领袖更增加一些感情。"},{"type":"paragraph","text":"记者看到，这部影片大大简化了毛泽东一生中那些人所共知的大事件和大场面，而着力铺陈领袖工作生活中可亲、可爱的细节，产生了强烈的情感冲击力。影片中讲述了毛泽东一根竹手杖的故事、游泳的故事、笔杆子的故事、当老师的志向、旷达的生死观……一个接一个的小故事，让人对毛泽东的伟大与平凡产生全新的感受。片中还有大量富于情趣和幽默的情节，如毛泽东模仿非洲来宾互致曲膝礼的憨态可掬，令人忍俊不禁。"},{"type":"paragraph","text":"今年12月26日是毛泽东诞辰110周年纪念日。华夏电影发行有限责任公司将于近期向全国影院推广发行这部影片。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b7f4b3f18a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
