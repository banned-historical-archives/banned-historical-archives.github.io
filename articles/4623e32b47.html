ical-archives/banned-historical-archives8/main/maoquanji21.pdf"],"article":{"title":"致余光生电","alias":"","parts":[{"type":"paragraph","text":"致余光生电"},{"type":"paragraph","text":"（1946年6月30日）光生同志："},{"type":"paragraph","text":"从现时起，凡各地蒋军向我进攻之消息，均请发表，并广播，因为蒋口头说停战，实际在作战，我应发表新闻予以揭穿。"},{"type":"paragraph","text":"本月参考消息，顽军侵占青州、龙山再车站，“文水阎军占我孝义镇”等项消息，请补发广播，并登报。"},{"type":"paragraph","text":"今日报纸头条新闻黄墨涌等名流似在渝不在沪，说他们在沪是否有错，请加考查。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十月卅日夜[1这是毛泽东关于发表揭露蒋军进攻解放区新闻问题给新华社、解放几多地疗军向我健攻"},{"type":"paragraph","text":"有饺表：盖房播S"},{"type":"paragraph","text":"三停我实际?"},{"type":"paragraph","text":"玫清"},{"type":"paragraph","text":"丙声站？，，文水窗"},{"type":"paragraph","text":"清愿请补荒候经叛级级致修我列"},{"type":"paragraph","text":"勿什矩"},{"type":"paragraph","text":"也们先语"},{"type":"paragraph","text":"管信，待加考尽毛泽东给余光生的指示的手稿。"}],"authors":["毛泽东"],"dates":[{"year":1946,"month":6,"day":30}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":444,"page_end":445},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4623e32b47"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
