ical-archives/banned-historical-archives8/main/maoquanji24.pdf"],"article":{"title":"对西北局关于执行中共中央土改和整党指示的报告的批语","alias":"","parts":[{"type":"paragraph","text":"对西北局关于执行中共中央十改和整党指示的报告的批语"},{"type":"paragraph","text":"（1948年6月26日）"},{"type":"paragraph","text":"西北局六月二十二日计划是正确的。各局、各分局应按本区具体情况，迅速订出本年计划，并于七、八两月开完各级干部会，九月布置全区工作完毕，十部到达乡村，或做土改或做减租或做整党建政，务必按照中央五月二十五日指示的程序和方法，在今后一年的工作中，不但要避免过去数年所犯过的严重政治错误，不使重犯，而且要紧紧地抓住季节，于秋季农民较闲时及冬季农民最闲时在农村开会（亦不可过多），做完可做和应做的工作。过去各地在秋、冬两季开高级及中级干部会，布置全年工作的习惯，未能顾到农民的季节，对于农村工作有极大妨碍，这种情况，从今年起必须改变。各级干部会开会时间必须缩短，必须遵照中央五月二十五日指示第二条乙项的方法，人数不要太多，事前准备提纲，过去将干部会动辑开一两个月之久的习惯，必须改变。"}],"authors":["毛泽东"],"dates":[{"year":1948,"month":6,"day":26}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":313,"page_end":313},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fe35143bc0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
