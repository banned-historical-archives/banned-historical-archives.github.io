art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"海军七十名复员老兵上书毛主席","authors":["徐建"],"parts":[{"type":"paragraph","text":"本报讯 海军某部训练团七十多名即将走上生产战线的志愿兵，最近联名上书毛主席，表达回乡参加农业生产大跃进的决心。"},{"type":"paragraph","text":"决心书中说，为了祖国的需要，我们将放下枪杆，拿起锄头，为促进生产大跃进，实现四十条纲要，从根本上改变家乡面貌，贡献自己的全部力量。并且保证做到坚决保持和发扬我军的光荣传统，学习红军团长方和明热爱劳动、艰苦朴素、不怕困难，全心全意为人民服务的优良品质；回乡后大干三月，打响今年生产的第一炮，苦干三年，从根本上改变家乡面貌；要克勤克俭，厉行节约，不浪费，不摆阔，把生产资助金完全用到生产上；要遵守法令政策和劳动纪律；时刻保持革命警惕性，严守国家军事秘密，积极参加预备役训练，做民兵的骨干，维持地方治安，并准备随时响应祖国的召唤，保卫祖国。 （徐建）"}],"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7211b355e7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
