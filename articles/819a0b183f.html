:1976,"month":2,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"江西省乐平县港口公社里首大队青年科研生产队队长、农民大学生　程立标"},{"type":"paragraph","text":"伟大领袖毛主席早就指出:“我们的教育方针，应该使受教育者在德育、智育、体育几方面都得到发展，成为有社会主义觉悟的有文化的劳动者。”在无产阶级文化大革命中，毛主席又明确指出:“要从有实践经验的工人农民中间选拔学生，到学校学几年以后，又回到生产实践中去。”在毛主席光辉指示的指引下，我于一九七四年五月从上海师范大学生物系毕业，回到农村当农民，到现在快两年了。"},{"type":"paragraph","text":"可是，右倾翻案风的鼓吹者却胡说什么“培养工人农民，这样学校就取消了”。这不是和毛主席的指示唱对台戏，把矛头对着毛主席的革命路线吗?鼓吹这种谬论的罪恶用心，就是要否定教育革命的成果，为修正主义教育路线翻案，妄图把学校变成他们搞资本主义复辟的基地。"},{"type":"paragraph","text":"“试看天地翻覆”。我们工农兵大学生当工人农民的路子走定了，右倾翻案风鼓吹者的如意算盘打错了。到农村近两年来，我和贫下中农一起学习革命理论，批林批孔，搞科学种田，为农业学大寨出力。在农村火热的三大革命运动中，我提高了阶级斗争觉悟和路线斗争觉悟，对贫下中农产生了深厚的阶级感情，同时也增长了农业生产方面的知识。我爱农村的每一寸土地，更爱与贫下中农一起种地。我们里首大队的知识青年组织了青年科研生产队，由我担任队长。我们决心和广大贫下中农一起，大搞科学试验，攀登农业科研和生产的新高峰，为农业学大寨、普及大寨县作出新的贡献，在三大革命运动中，坚持同修正主义对着干，用实际行动反击右倾翻案风。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"批林批孔","type":"主题/事件"},{"name":"教育革命","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"819a0b183f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
