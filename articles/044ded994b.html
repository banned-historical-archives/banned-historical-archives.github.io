art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"以毛泽东思想为武器深入开展革命大批判干部战士把忆阶级苦、民族苦和控诉美帝国主义、社会帝国主义的侵略罪行联系起来，认清它们的反动本质，进一步树立了常备不懈的思想","authors":["群永红/高文"],"parts":[{"type":"paragraph","text":"本报讯 三三二五部队炮一连，在“两忆三查”中，以毛泽东思想为武器，坚持开展革命大批判，进一步激发了干部战士对美帝国主义、社会帝国主义的深刻仇恨，常备不懈的思想树立得更牢。"},{"type":"paragraph","text":"炮一连在“两忆三查”中，革命大批判抓得好，是从一班受到启发的。一班在“两忆三查”中，抓紧革命大批判，把忆阶级苦、民族苦和控诉美帝国主义、社会帝国主义的侵略罪行联系起来，边忆边批，边查边批，对美帝国主义、社会帝国主义本质认得清，战备思想树得牢。党支部及时总结和推广了一班的经验，使革命大批判在全连深入地开展起来。"},{"type":"paragraph","text":"他们的作法是："},{"type":"paragraph","text":"学习毛主席关于阶级、阶级斗争的论述，狠批“剥削有功论”，认清美帝国主义和社会帝国主义是剥削制度的最大维护者，把千仇万恨都集中到美帝国主义、社会帝国主义身上。"},{"type":"paragraph","text":"学习毛主席关于帝国主义的论述，狠批帝国主义、社会帝国主义的强盗理论，认清美帝国主义、社会帝国主义是我们最凶恶的敌人。"},{"type":"paragraph","text":"学习毛主席关于革命战争的论述，狠批“阶级斗争熄灭论”，提高继续革命觉悟，树立无产阶级战争观。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"044ded994b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
