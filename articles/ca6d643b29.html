thors":[],"dates":[{"year":1959,"month":3,"day":29}],"is_range_date":false,"parts":[{"text":"《麻城县万人大会简报》第11期","type":"title"},{"text":"中一公社讨论情况","type":"subtitle"},{"text":"一、提出了几个问题：","type":"subtitle"},{"text":"1.不高清楚坚决不回去。绝大多数小队长都是这样说，原中一社小队长林生×说。即是用犁犁，用耙耙我也要搞清楚，不然我不回去。57年我存款50元是准备给我侄女出嫁，可是我到社里去取款时，他们说冒得，只有5元。我倒现在还未得钱；我做了9000多工分还成了超支户。","type":"paragraph"},{"text":"2.领导真英明，看出了问题：","type":"paragraph"},{"text":"晏店三社小队长曾庆发说：“我们跃进了一年，产量增加了，收入减少了，不晓得是么鬼事。57年我五口人吃饭做4000多工分只找30多元。58年做7000多分还要找100多元，这次领导真英明，看出了问题。”","type":"paragraph"},{"text":"3.要是小问题，皮袄哪来的","type":"paragraph"},{"text":"王集五爱九社小队长陈友州说：“社里会计郭少华四个人吃饭一个人劳动，钱总是有用的，身上穿皮袄，这是哪来的？”","type":"paragraph"},{"text":"迎集民主九社，主任夏大明贪污社会救济款30元，夏大发还把食堂的60多元用了。晏店六社陈德清他们卖200多斤粮食的都贪了污。","type":"paragraph"},{"text":"迎集十中队会计吴锦锐说：“十社支书肖修顺，不知道搞什么经。开队会计会，对他们说：‘你们不能告诉队长，哪个说就是逼死他的命’。”","type":"paragraph"},{"text":"4.干部大量超支：","type":"paragraph"},{"text":"迎集陈墩中队分支书记余学群超支100多块。十社主任鲍德元、胡正英他们做新屋，下通知叫各队去帮小工，全部是支社里的钱。","type":"paragraph"},{"text":"二、还有几个问题：","type":"subtitle"},{"text":"1. 搞报复打击。桃园十五社王永荣说：“不报复是没有这个好事，以后技术一点不到堂，看他不整死你。”","type":"paragraph"},{"text":"2.怕搞出来问题光检讨就玩了事。王集一社小队长王顺焱说：“说不说如的，不总只作一个检讨。”","type":"paragraph"},{"text":"3.怕搞不清楚：中一八社小队干部毛道永说：“好倒好，就是怕搞不清楚，要求把队会计搞来一起搞。”","type":"paragraph"},{"text":"公社党委根据大家意思提出两条具体规定：","type":"paragraph"},{"text":"（1）只要把问题交代清楚，不论问题多大，一律不戴贪污分子帽子，不予处分；","type":"paragraph"},{"text":"（2）贪污挪用、瞒产私分们只要报出来，么时有钱，能拿出来的马上还，不能拿出来的打条子。他们还提出了以下口号：","type":"paragraph"},{"text":"“账要算清，话要说明，多劳多得，一定执行”；","type":"paragraph"},{"text":"“苦战一年，谁超谁减，超产奖励，坚决兑现”。","type":"paragraph"}],"comments":[],"origin":"湖北省某档案馆","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ca6d643b29"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
