script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"79da64b8-3433-4da6-9e03-61863d278909","name":"毛泽东选集第三卷（人民出版社1991年版）","internal":false,"official":true,"type":"pdf","author":"","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives3/main/79da64b8-3433-4da6-9e03-61863d278909.pdf"],"article":{"title":"对日寇的最后一战","alias":"","parts":[{"type":"paragraph","text":"对日寇的最后一战"},{"type":"paragraph","text":"（一九四五年八月九日）"},{"type":"paragraph","text":"八月八日，苏联政府宣布对日作战，中国人民表示热烈的欢迎。由于苏联这一行动，对日战争的时间将大大缩短。对日战争已处在最后阶段，最后地战胜日本侵略者及其一切走狗的时间已经到来了。在这种情况下，中国人民的一切抗日力量应举行全国规模的反攻，密切而有效力地配合苏联及其他同盟国作战。八路军、新四军及其他人民军队，应在一切可能条件下，对于一切不愿投降的侵略者及其走狗实行广泛的进攻，歼灭这些敌人的力量，夺取其武器和资财，猛烈地扩大解放区，缩小沦陷区。必须放手组织武装工作队，成百队成千队地深入敌后之敌后，组织人民，破击敌人的交通线，配合正规军作战。必须放手发动沦陷区的千百方群众，立即组织地下军，准备武装起义，配合从外部进攻的军队，消灭敌人。解放区的巩固工作仍应注意。今冬明春，应在现有一万万人民和一切新解放区的人民中，普遍地实行减租减息，发展生产，组织人民政权和人民武装，加强民兵工作，加强军队的纪律，坚持各界人民的统一战线，防止浪费人力物力。凡此一切，都是为着加"},{"type":"paragraph","text":"*这是毛泽东就苏联对日宣战发表的声明。强我军对敌人的进攻。全国人民必须注意制止内战危险，努力促成民主联合政府的建立。中国民族解放战争的新阶段已经到来了，全国人民应该加强团结，为夺取最后胜利而斗争。"}],"authors":["毛泽东"],"dates":[{"year":1945,"month":8,"day":9}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":337,"page_end":338},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]},{"id":"f5f88e94-5aa4-47b1-90fc-01f24b0bbf5b","name":"毛泽东选集（一卷本）","internal":true,"official":true,"type":"pdf","author":"毛泽东，人民出版社1968年版","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives3/main/f5f88e94-5aa4-47b1-90fc-01f24b0bbf5b.pdf"],"article":{"title":"对日寇的最后一战","alias":"","parts":[{"type":"paragraph","text":"对日寇的最后一战"},{"type":"paragraph","text":"（一九四五年八月九日）"},{"type":"paragraph","text":"\"*\"y4"},{"type":"paragraph","text":"*"},{"type":"paragraph","text":"八月八日，苏联政府宣布对日作战，中国人民表示热烈的欢迎。由于苏联这一行动，对日战争的时间将大大缩短。对日战争已处在最后阶段，最后地战胜日本侵略者及其一切走狗的时间已经到来了。在这种情况下，中国人民的一切抗日力量应举行全国规模的反攻，密切而有效力地配合苏联及其他同盟国作战。八路军、新四军及其他人民军队，应在一切可能条"},{"type":"paragraph","text":"Vi件下，对于一切不愿投降的侵略者及其走狗实行广泛的进攻，歼灭这些敌人的力量，夺取其武器和资财，猛烈地扩大解放区，缩小论陷区。必须放手组织武装工作队，成百队成千队地深入敌后之敌后，组织人民，破击敌人的交通线，配合正规军作战。必须放手发动沦陷区的千百万群众，立即组织地下军，准备武装起义，配合从外部进攻的军队，消灭敌人。解放区的巩国工作仍应注意。今冬明春，应在现有一一万万人民和一切新舞放区的人民中，普遍地实行减租减息，发展生产，组织人民政权和人民武装，加强民兵工作，加强军队的纪律，坚持各界人民的统一战线，防止浪费人力物力。凡此一切，都是为着加强我军对敌人的进攻。全国人民必须注意制止内战危险，努力促成民主联合政府的建立。中国民族解放战争的新阶段已经到来了，全国人民应该加强团结，为夺取最后胜利而斗争。"}],"authors":["毛泽东"],"dates":[{"year":1945,"month":8,"day":9}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":1043,"page_end":1043},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]},{"id":"maoxuan-jinghuo","name":"毛泽东选集1-7（静火版）","internal":false,"official":false,"author":"静火","type":"pdf","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/maoxuan-jinghuo.pdf"],"article":{"title":"对日寇的最后一战","parts":[{"text":"对日寇的最后一战","type":"title"},{"type":"paragraph","text":"八月八日，苏联政府宣布对日作战，中国人民表示热烈的欢迎。由于苏联这一行动，对日战争的时间将大大缩短。对日战争已处在最后阶段，最后地战胜日本侵略者及其一切走狗的时间已经到来了。在这种情况下，中国人民的一切抗日力量应举行全国规模的反攻，密切而有效力地配合苏联及其他同盟国作战。八路军、新四军及其他人民军队，应在一切可能条件下，对于一切不愿投降的侵略者及其走狗实行广泛的进攻，歼灭这些敌人的力量，夺取其武器和资财，猛烈地扩大解放区，缩小沦陷区。必须放手组织武装工作队，成百队成千队地深入敌后之敌后，组织人民，破击敌人的交通线，配合正规军作战。必须放手发动沦陷区的千百万群众，立即组织地下军，准备武装起义，配合从外部进攻的军队，消灭敌人。解放区的巩固工作仍应注意。今冬明春，应在现有一万万人民和一切新解放区的人民中，普遍地实行减租减息，发展生产，组织人民政权和人民武装，加强民兵工作，加强军队的纪律，坚持各界人民的统一战线，防止浪费人力物力。凡此一切，都是为着加强我军对敌人的进攻。全国人民必须注意制止内战危险，努力促成民主联合政府的建立。中国民族解放战争的新阶段已经到来了，全国人民应该加强团结，为夺取最后胜利而斗争。"}],"comment_pivots":[],"dates":[{"year":1945,"month":8,"day":9}],"is_range_date":false,"authors":["毛泽东"],"comments":[],"page_start":647,"page_end":649,"description":"这是毛泽东就苏联对日宣战发表的声明。\n毛泽东选集\n第四卷\n第三次国内革命战争时期","alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"宣言"}]},{"id":"xuanji3","name":"毛泽东选集第三卷（1967）","type":"pdf","internal":false,"official":true,"author":"毛泽东","
