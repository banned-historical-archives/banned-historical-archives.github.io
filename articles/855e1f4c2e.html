":[{"year":1967,"month":9,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"“剥削自由”是为地主阶级争“权”"},{"type":"paragraph","text":"过去，我们贫下中农都是一根藤上的苦瓜，家家都有辛酸史、血泪仇。我家在旧社会里不但受地主、富农的雇工剥削，还受高利贷的剥削。有一次我家借了两百斤米，以后却要我们还九百斤小麦，利上滚利，直到解放时我家才还清这笔阎王债。这是为什么呢？革命的根本问题是政权问题。在旧社会里，我们千苦万苦，就是苦在没有无产阶级的政权；在新社会里，千甜万甜，就是甜在有了无产阶级的政权。解放以后，地主、富农看见我们贫下中农掌了权，恨得牙根痒痒的。他们连做梦也想变天。中国赫鲁晓夫是他们的孝子贤孙，也对我们贫下中农恨得要命。他就叫嚷“剥削自由”，妄图复辟资本主义，把我们贫下中农手里的印把子夺过去，交给地主、富农，让他们重新骑在我们贫下中农头上。这是痴心妄想。"},{"type":"paragraph","text":"在当前两个阶级、两条道路、两条路线决战的时刻，我们民兵要牢记毛主席“千万不要忘记阶级斗争”的教导，坚决站在毛主席的革命路线一边，彻底摧毁以中国赫鲁晓夫为首的资产阶级司令部。"},{"type":"paragraph","text":"（五好民兵　孙永华）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"855e1f4c2e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
