tart":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东思想永远照耀着各国人民前进","authors":[],"parts":[{"type":"paragraph","text":"据新华社渥太华电 加拿大友好人士文幼章最近在一个双月刊的十一月——十二月一期上发表文章，称颂毛泽东主席是人类历史上最伟大的革命导师和领袖之一。"},{"type":"paragraph","text":"文幼章在文章中指出，毛主席完全献身于马克思、恩格斯和列宁的辩证唯物主义和历史唯物主义。他把辩证唯物主义和历史唯物主义创造性地运用于中国革命。“通过长期的斗争，他成功地把马克思列宁主义同中国客观实际结合起来。”"},{"type":"paragraph","text":"文幼章说，毛泽东思想“不仅在中国的持续革命中，而且在一切革命运动中，特别是在当前第三世界的革命运动中，已经形成一种持久的、创造性的影响”。"},{"type":"paragraph","text":"谈到毛主席缔造中国人民解放军时，文幼章说，中国“人民解放军在很大程度上是毛泽东政治哲学的产物”，它是为人民服务的。"},{"type":"paragraph","text":"文幼章还说，毛主席认为，第三世界是战胜两个超级大国，即美帝国主义和苏联社会帝国主义的主力军。“因此，中国支持（世界上）一切民族解放斗争”。"},{"type":"paragraph","text":"据新华社雅温得电 喀麦隆民族联盟机关报《团结报》最近一期发表文章说：“毛泽东思想将继续照耀着各国人民，鼓舞着各民族前进。”"},{"type":"paragraph","text":"文章指出，毛泽东主席是“全世界人民特别是贫困的被压迫人民的一位伟大导师”。"},{"type":"paragraph","text":"文章说：“在半个多世纪里，毛泽东把自己的全部精力献给了中国人民和全世界被压迫民族被压迫人民的解放事业。”"},{"type":"paragraph","text":"文章说，毛泽东主席的伟大名字永垂青史。毛主席关于独立自主，相信自己的力量，勤俭建国和按照多、快、好、省方针进行建设的原则，将永远鼓舞着各国人民。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f337002b3f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
