":[{"year":1967,"month":12,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编者按:这里选刊的一组稿件，是驻沪空军某部五连和驻地生产大队贫下中农在一次批判会上的发言。我们的子弟兵和贫下中农以亲身经历的阶级斗争，无情地揭露和控诉了中国赫鲁晓夫在农村推行修正主义路线、大搞资本主义复辟的滔天罪行。这些发言观点鲜明，感情充沛。有事实，有分析，联系思想，斗私批修，充分体现了军民一致、同仇敌忾的血肉相连的关系，也表达了亿万革命农民高举毛泽东思想伟大红旗，坚决走社会主义道路，把农村的无产阶级文化大革命进行到底的坚强决心。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"03af1f25bc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
