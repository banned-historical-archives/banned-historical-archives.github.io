s":[],"dates":[{"year":1950,"month":9,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本书共六章:第一章说明履行波茨坦协定，早日签订对日和约为保证日本走上民主化道路的唯一办法，但是美帝为了要将日本变成它在亚洲的侵略基地，保持它的军事独占，根本就不打算实行这个办法。它竟采取了“不宣而和”，目的是为了长期占领。但是，苏联政府屡次要求迅速订立对日和约，希望日本成为一个自由、独立和拥有主权的国家，反对奴役日本和复活日本军国主义。"},{"type":"paragraph","text":"第二章“美帝在日本的疯狂备战行动”，例举了无数事实说明美帝的侵略野心。在美帝扶植下，日本的海陆空军基地正在着手恢复和加以现代化；在“警察”的伪装下，陆军正在大批训练；战争工业亦在大力恢复发展，战犯一批批释放，所有这些，艾契逊坦白说过，目的是“使其成为亚洲反攻的一个主要堡垒。”"},{"type":"paragraph","text":"第三章叙述美帝在日本一面控制了对外贸易、国民经济，一面加紧镇压民主运动，“整萧”日本共产党。"},{"type":"paragraph","text":"第四、五章记述日本人民和日本共产党的斗争情形和斗争方向。"},{"type":"paragraph","text":"最后一章说明中国人民一向是日本人民的朋友，日本人民的斗争为中国人民所关怀，今后中日人民必然会联合起来，反对美帝占领日本，要求实现波茨坦宣言，早日缔结和约。"},{"type":"paragraph","text":"本书材料收集丰富，立论正确，为研究日本问题的重要参考资料。(本书共一二九页，基价五·五元)"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ff96be2bb7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
