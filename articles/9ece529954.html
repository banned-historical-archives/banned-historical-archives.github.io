rt":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"政治学院对新学员进行否定“文革”教育","authors":["孙勇民"],"parts":[{"type":"paragraph","text":"本报9月1日讯 政治学院新学员今天入学后上的第一课，是流行彻底否定“文革”的教育。这一教育将要进行十天。"},{"type":"paragraph","text":"在上午为培训班第五期、哲学和政治经济学教员培训班第二期的学员举行的开学典礼上，政治学院院长兼政委刘志坚讲了彻底否定“文化大革命”的必要性和重要性，要求学员们把参加这个教育当作必修课和基础课来抓。"},{"type":"paragraph","text":"下午，政治学院副院长姜思毅给学员们作了《彻底否定“文化大革命”的教育要落到实处》的专题报告，要求大家联系参加“文革”的经历和感受，认识“文革”的理论与实践的错误和危害，清除“左”的思想影响，使自己的工作和行动符合党的总任务、总目标的要求。（孙勇民）"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9ece529954"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
