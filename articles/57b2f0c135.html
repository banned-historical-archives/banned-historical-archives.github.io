ical-archives/banned-historical-archives0/main/maoquanji32.pdf"],"article":{"title":"对《一九五三年兵工生产会议备忘录》的批语","alias":"","parts":[{"type":"paragraph","text":"对《一九五三年兵工生产会议"},{"type":"paragraph","text":"备忘录》的批语"},{"type":"paragraph","text":"（1952年12月2日）尚昆\"同志："},{"type":"paragraph","text":"在你们正在拟制的分工条例中，应增加一项：各委、部、会讨论重要问题时，应做出简明纪录送阅。军委已由肖向荣这样做，很有用处。此件是封永顺做的，也很好，比做长报告送阅，经济得多。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十二月二日[1]尚昆，即杨尚昆，当时任中共中央办公厅主任。"},{"type":"paragraph","text":"[2]这个分工条例后来形成为中共中央1953年3月10日发出的《关于加强中央人民政府系统各部门向中央请示报告制度及加强中央对于政府工作领导的决定（草案）》。决定草案中规定，政府各部门“将会议所讨论的或所决定的重要事项，用最简明的文字记录出来上报”，可以作为向中央反映情况的一种方式。"},{"type":"paragraph","text":"[3]肖向荣，当时任人民革命军事委员会办公厅主任。[4]封永顺，当时任人民革命军事委员会军械部副部长。"}],"authors":["毛泽东"],"dates":[{"year":1952,"month":12,"day":2}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":347,"page_end":347},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"57b2f0c135"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
