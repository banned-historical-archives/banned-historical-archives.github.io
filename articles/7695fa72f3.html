rt":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"心在伴随毛主席飞翔","authors":["顾培希"],"parts":[{"type":"paragraph","text":"萤光屏象绿色的海洋，"},{"type":"paragraph","text":"我日夜守在它的身旁，"},{"type":"paragraph","text":"目不转睛地注视着"},{"type":"paragraph","text":"每一个回波的跳荡。"},{"type":"paragraph","text":"突然，萤光屏上出现一个光点，"},{"type":"paragraph","text":"它跳了一下又继续增大，"},{"type":"paragraph","text":"我迅速地判断：是目标，"},{"type":"paragraph","text":"又准确地报出了方位、距离……。"},{"type":"paragraph","text":"耳机传来指挥员的声音："},{"type":"paragraph","text":"“这是一架专机，"},{"type":"paragraph","text":"重点掌握好，重点掌握好，"},{"type":"paragraph","text":"毛主席就在这架飞机上！”"},{"type":"paragraph","text":"啊！敬爱的毛主席坐在这架飞机 上！"},{"type":"paragraph","text":"我的心禁不住激烈地跳荡，"},{"type":"paragraph","text":"全身的血液热烈沸腾，"},{"type":"paragraph","text":"眼睛闪射出欢乐的光芒。"},{"type":"paragraph","text":"我仿佛乘着电波飞向天空，"},{"type":"paragraph","text":"走进主席坐的机舱，"},{"type":"paragraph","text":"见主席象亲人一样，"},{"type":"paragraph","text":"慈祥的脸放着红光。……"},{"type":"paragraph","text":"主席慈爱地握住我的手，"},{"type":"paragraph","text":"象有一股暖流通过我身上。"},{"type":"paragraph","text":"“毛主席您好！”"},{"type":"paragraph","text":"主席点头和我拉起家常。……"},{"type":"paragraph","text":"专机平稳地飞着，"},{"type":"paragraph","text":"飞过泰山，越过长江。……"},{"type":"paragraph","text":"我的心伴随毛主席在天空飞翔，"},{"type":"paragraph","text":"一直把雄鹰送到机场。"},{"type":"paragraph","text":"幸福啊！这次导航我终生难忘，"},{"type":"paragraph","text":"毛主席就坐在这架飞机上。"},{"type":"paragraph","text":"这永生的幸福啊，"},{"type":"paragraph","text":"给我增添了无穷无尽的力量。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7695fa72f3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
