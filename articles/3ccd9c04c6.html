":1956,"month":11,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席观看苏联马戏团表演"},{"type":"paragraph","text":"新华社5日讯　毛泽东主席今晚由苏联驻华大使尤金陪同在北京体育馆观看了苏联马戏团的表演。"},{"type":"paragraph","text":"在演出休息时，毛泽东主席接见了马戏团团长勒·符·阿萨诺夫、音乐指挥斯·伊·谢苗诺夫和主要演员，并且同他们在一起照了相。在演出结束以后，毛泽东主席走下看台同全体演员们见面。全场在“莫斯科—北京”的音乐声中长久地热烈鼓掌欢呼。"},{"type":"paragraph","text":"今晚到场观看表演的，还有国务院副总理陈云、邓小平，外交部副部长姬鹏飞，文化部副部长夏衍等人。"},{"type":"paragraph","text":"马戏团今晚演出的马术、绷床、走钢丝和耍狮熊等精采节目，受到了观众的热烈欢迎。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3ccd9c04c6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
