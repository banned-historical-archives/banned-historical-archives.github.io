tart":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"全国印刷机械工业召开抓革命促生产经验交流会会议指出，预计今年全年印刷机械总产量可等于文化大革命前平均年产量的六倍，并且增加了许多新品种，为提高我国印刷工业的机械化、自动化程度创造了有利条件。","authors":[],"parts":[{"type":"paragraph","text":"新华社济南三十日电 在伟大的斗、批、改高潮中，中央有关部门在青岛召开了全国印刷机械工业抓革命促生产经验交流会议，来自全国二十多个省、市、自治区一百六十多个有关单位的代表，怀着对伟大领袖毛主席无限热爱、无限忠诚的深厚无产阶级感情，狠批了中国赫鲁晓夫及其在工业、文化系统的代理人为阻挠毛主席著作出版而极力破坏印刷机械工业发展的滔天罪行，交流了抓革命、促生产的经验。"},{"type":"paragraph","text":"出席会议的代表指出，为满足广大革命人民对毛主席光辉著作的迫切需要，大力发展印刷机械工业，使制版、印刷、装订逐步实现机械化、自动化，这是印刷机械工业部门革命职工的光荣政治任务。"},{"type":"paragraph","text":"会议指出，十几年来，在印刷机械工业部门一直存在着两条道路、两条路线的斗争。中国赫鲁晓夫及其代理人为在中国复辟资本主义，竭力阻挠毛主席著作的出版和毛泽东思想的传播，压制和扼杀印刷机械的生产和配套。在这些反动家伙的阻挠、破坏下，印刷机械工业生产发展缓慢，技术设备陈旧，长期处于落后状态。"},{"type":"paragraph","text":"无产阶级文化大革命运动中，印刷机械工业部门的广大革命职工高举“对反动派造反有理”的革命大旗，夺回了被党内一小撮走资派窃踞的领导权。革命职工们怀着对伟大领袖毛主席的赤胆忠心，发挥冲天的革命干劲，大造各种印刷设备，满足毛主席著作大量出版的需要，使印刷机械的生产出现了大飞跃。一九六七年全国印刷机械的产量等于文化大革命前平均年产量的三倍半。今年以来，印刷机械工业战线上的革命、生产形势大好，越来越好，预计全年印刷机械的总产量可等于文化大革命前平均年产量的六倍，并且增加了许多新品种，为提高我国印刷工业的机械化、自动化程度创造了有利条件。"},{"type":"paragraph","text":"参加会议的北京人民机器厂、山东威海机械厂、四川宜宾印刷机械厂，以及山东省和青岛市革命委员会等单位的代表，分别介绍了他们紧跟毛主席的伟大战略部署，狠抓阶级斗争，放手发动群众，自力更生，迅速发展印刷机械生产的经验，受到出席会议同志的热情欢迎。"},{"type":"paragraph","text":"会上交流的大量情况表明：最近以来，印刷机械工业战线上的工人阶级，遵照伟大领袖毛主席“认真搞好斗、批、改”的教导，迅速掀起了斗、批、改的高潮。广大革命职工深入批判中国赫鲁晓夫推行的反革命修正主义办企业路线，打破了旧框框，为印刷机械新产品的试制工作闯出了一条崭新的道路。例如胶版印刷机的试制，按照过去的办法，从图纸整理和分析到工艺分析和准备等，就需要半年时间，整个产品制造出来，大约需要两年；现在，只用三个月就制造出来了。其他如高速折页机、三面切书机、配页机、烫金机等新产品的试制，也都大大缩短了时间。"},{"type":"paragraph","text":"会议期间，北京人民机器厂的工人把伟大领袖毛主席赠送给首都工农毛泽东思想宣传队的珍贵礼物——芒果（复制品），转送给各地印刷机械工业战线上的无产阶级革命派和山东省及青岛、威海两市革命委员会。代表们怀着无比激动、无比兴奋的心情，千遍万遍地高呼：“伟大领袖毛主席万岁！万万岁！”“敬祝毛主席万寿无疆！万寿无疆！”他们庄严地向毛主席宣誓：印刷机械工业战线上的革命职工一定紧跟毛主席的伟大战略部署，坚决贯彻执行以毛主席为首、林副主席为副的无产阶级司令部的一切战斗号令，认真搞好本单位的斗、批、改，以革命带动生产，为超额完成今年印刷机械生产计划，为生产更多的高效率、高质量的印刷机械而奋斗。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"山东文革","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a0032a84cc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
