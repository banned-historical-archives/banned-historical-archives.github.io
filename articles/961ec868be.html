art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"印尼华侨靠毛泽东思想打退武装匪徒进攻我最强烈抗议印尼反动当局打伤华侨八十多人的血腥暴行","authors":[],"parts":[{"type":"paragraph","text":"据新华社二十日讯 雅加达消息：印度尼西亚法西斯政权十三日在东爪哇茉莉芬市，又制造了一起出动大批武装军警和暴徒袭击华侨，打伤和用刺刀刺伤华侨八十多人的血腥事件。赤手空拳的华侨在受到袭击时，英勇地进行自卫，同全副武装的军警暴徒搏斗两小时之久，打退了法西斯匪徒的进攻。这场斗争又一次显示了用毛泽东思想武装起来的中国人民威武不屈、敢于斗争的英雄气概，大灭了美帝苏修的走狗印尼反动派的威风。"},{"type":"paragraph","text":"十二日上午，茉莉芬市的华侨一百多人，到该市基地司令部进行说理斗争，要求释放在五月二十二日被无理逮捕的无辜华侨陈家碧等四人。基地司令卡斯丹理亏心虚，不敢照面，并且出动数十名全副武装的军人，用刺刀对准华侨，百般恫吓，企图用武力驱散他们。华侨由于他们的正当要求遭到蛮横拒绝，留在基地司令部前面的广场上坚持斗争。到第二天上午，参加斗争的人数增加到三百多人。他们不顾右派武装军警的威吓欺骗，齐声朗读毛主席语录，大唱革命歌曲，高呼“毛主席万岁！”“中国印尼两国人民友好万岁！”等口号，坚决要求基地司令卡斯丹出来答复他们的要求。"},{"type":"paragraph","text":"茉莉芬军事当局不仅顽固地拒不答复华侨的正当要求，在十三日中午竟然出动大批荷枪实弹的军警，严密封锁了基地司令部附近的大街小巷，还从外地调来一百多名全副武装的军人，把华侨层层包围。到当天深夜，埋伏在司令部周围的暴徒疯狂地向手无寸铁的华侨发动突然袭击，向华侨大量投掷石块。这时包围华侨的法西斯军人兽性大发，疯狂地用刺刀、枪托和军棍向华侨发动野蛮进攻，连十三岁的小孩子也被打得遍体鳞伤。广大爱国华侨忍无可忍，英勇地进行自卫反击，同这些法西斯匪徒进行了针锋相对的斗争。尽管当时华侨中有七十人被打伤和刺伤，他们仍斗志昂扬地坚持搏斗两小时之久，打退了印尼法西斯匪徒的猖狂进攻，直到迫使他们全部撤退为止。"},{"type":"paragraph","text":"据新华社二十一日讯 雅加达消息：中国驻印度尼西亚大使馆二十日照会印尼外交部，对东爪哇军政当局继六月三日在岩望市制造残酷迫害华侨的暴行之后，十三日又在茉莉芬制造了打伤和刺伤华侨八十多人的严重流血事件，向印尼政府提出最强烈的抗议。"},{"type":"paragraph","text":"中国大使馆的照会指出：我们要正告印度尼西亚政府：用毛泽东思想武装起来的广大华侨是绝对吓不倒、压不服的。正在胜利进行无产阶级文化大革命的七亿中国人民坚决支持广大华侨反迫害的正义斗争。如果你们一意孤行，继续疯狂反华、排华，只能是“搬起石头打自己的脚”。"},{"type":"paragraph","text":"照会说：“中国大使馆坚决要求印度尼西亚政府：就此严重事件立即公开道歉；严惩肇事者和主使人；立即释放全部被捕的华侨；负责受伤华侨的一切医疗费用；停止一切反华、排华的种族主义迫害。否则，由此而产生的一切严重后果，必须由印度尼西亚政府全部承担。”"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"961ec868be"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
