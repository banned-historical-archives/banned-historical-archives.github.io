":["马列主义研究院郭冲"],"dates":[{"year":1972,"month":10}],"is_range_date":false,"parts":[{"text":"为柴沫平反事给毛泽东的信（要点）","type":"title"},{"text":"马列主义研究院郭冲","type":"authors"},{"text":"〖柴沫，原马列主义研究院秘书长。此信日期不详，登在中央办公厅信访处1972年11月3日编印的《要信摘报》第270号上。〗","type":"subtitle"},{"text":"信中说，一九六六年五月，陈伯达曾三次来院讲话，说柴沫不听他的话，不走他的门子。陈勾结关锋、戚本禹等，以莫须有的罪名把柴沫打倒。从此大会批斗，小会追逼，白天监督劳动，黑夜轮番审讯，使他精神、肉体上受到很大折磨，被迫自杀。后经对柴沫的历史和全部工作反复调查，证明他是党的一个好干部。现在陈伯达已揪出两年多，该院学习班也办了一年零七个月，可是对陈迫害柴沫的罪行还没有得到清算，对柴沫也未作出正确结论。为此，恳请主席责成有关部门为柴沫平反，恢复名誉，作出正确结论。","type":"paragraph"}],"comments":[],"origin":"《建国以来毛泽东文稿》第十三册，北京：中央文献出版社，1998年1月第一版。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"陈伯达","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"051a3ade5e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
