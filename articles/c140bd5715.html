振华","北京政法学院","张敬臣","罗典荣","陈守铭","黄盛业"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"右派言论——反对苏联","type":"title"},{"text":"北京政法学院罗典荣侯振华张敬臣黄盛业陈守铭","type":"authors"},{"text":"二十大后，认为斯大林很毒辣，说：“残酷无情，是个阴险的政治家，开始在党内的地位不高，后来爬得很高，特别通过秘密警察和个人野心向上爬，以达到其维持自己的统治。”（北京政法学院  罗典荣的材料）","type":"paragraph"},{"text":"“赫鲁晓夫有些专断，我看反对赫鲁晓夫不能算是反党。”（北京政法学院  侯振华）","type":"paragraph"},{"text":"“日本是大大的，苏联是小小的，中国是偷偷的。”……“周总理今年访问苏联，苏联把中国大大的棒了一下，中国也把联苏大大地棒了一下。”（北京政法学院  张敬臣）","type":"paragraph"},{"text":"“苏联的东西价格昂贵，中国的东西价钱便宜，苏联专家特别喜欢来中国工作，目的是想来捞一把，满载而归。”（北京政法学院  黄盛业）","type":"paragraph"},{"text":"“苏联学术讨论没有我国自由，容易一棒子打死。苏联人的性格死板，缺少人情味。苏联巴蕾舞和美国大腿舞没有区别，只是国家不同罢了，我们大多数人只是盲目的喊苏联好。”（北京政法学院  陈守铭）","type":"paragraph"}],"comments":[],"origin":"《高等学校右派言论选编》（中共中国人民大学委员会，1958年8月）。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c140bd5715"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
