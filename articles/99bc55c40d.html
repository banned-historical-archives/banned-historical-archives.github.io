script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"全国工交工作会议和工交政工会议推荐七十个大庆式先进单位周总理接见工交战线先进人物代表　勉励他们更好地活学活用毛主席著作互学互助不断前进","authors":[],"dates":[{"year":1966,"month":3,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京5日电　近两年来，全国工业交通战线掀起了群众性的活学活用毛主席著作热潮，开展了社会主义教育运动，大学解放军，大学大庆，开展比学赶帮超群众运动，涌现出了一批先进单位。这批先进单位，在阶级斗争、生产斗争和科学实验三大革命运动中起了带头作用和示范作用。"},{"type":"paragraph","text":"最近召开的全国工业交通工作会议和全国工业交通政治工作会议，根据各省市自治区和中央工业交通各部提名，推荐出七十个大庆式先进单位，它们是全国各地区、各行业先进单位的代表，是全国工业交通企业的学习榜样。"},{"type":"paragraph","text":"这一批大庆式先进单位当中，有全国闻名的大庆油田，有一九六三年受到国家经委表扬的五个勤俭办企业的先进单位:襄樊棉织厂、潞安矿务局石圪节煤矿、兰州炼油厂、湖南橡胶厂、上海嘉丰棉纺织厂；有中央工业交通各部所属的企业，也有各省、市、自治区所属的企业；有冶金、化工、煤炭、石油、电力、建筑材料、林业、机械、农业机械等部门的重工业企业，也有纺织、轻工、手工业部门的企业，以及铁道、交通、邮电、地质和物资部门的企业；有工业交通企业，也有新兴的工业地区。"},{"type":"paragraph","text":"这七十个大庆式先进单位的共同特点是，高举毛泽东思想伟大红旗，突出政治，坚持以阶级斗争和两条道路斗争为纲，坚持以政治统帅生产、统帅技术、统帅业务，坚持群众路线，不断地进行技术革新和技术革命，出色地完成了生产建设任务，培养出了一支革命化的工人阶级队伍，并且开始取得了按照毛泽东思想办企业的经验。全国工业交通工作会议和全国工业交通政治工作会议认为，推厂他们的经验，将会进一步促进工业交通战线上学大庆、创五好的比学赶帮超群众运动的继续深入发展，进一步促进企业革命化，促进工业生产新高潮。"},{"type":"paragraph","text":"全国工业交通工作会议和全国工业交通政治工作会议一九六六年推荐的七十个大庆式先进单位是:"},{"type":"paragraph","text":"大庆油田"},{"type":"paragraph","text":"潞安矿务局石圪节煤矿"},{"type":"paragraph","text":"石景山钢铁公司炼铁厂"},{"type":"paragraph","text":"北京第二棉纺织厂"},{"type":"paragraph","text":"天津钢厂钢丝绳分厂"},{"type":"paragraph","text":"内蒙古自治区代兰塔拉铅矿"},{"type":"paragraph","text":"琉璃河水泥厂"},{"type":"paragraph","text":"北京市内电话局三十九分局"},{"type":"paragraph","text":"唐山发电厂"},{"type":"paragraph","text":"天津永利沽厂"},{"type":"paragraph","text":"太原化肥厂"},{"type":"paragraph","text":"新风加工厂"},{"type":"paragraph","text":"辽源发电厂阜新蒙古族自治县农业机"},{"type":"paragraph","text":"械厂"},{"type":"paragraph","text":"丹东精密仪器厂"},{"type":"paragraph","text":"哈尔滨银光电镀厂"},{"type":"paragraph","text":"鞍山钢铁公司无缝钢管厂"},{"type":"paragraph","text":"齐齐哈尔车辆厂"},{"type":"paragraph","text":"沈阳冶炼厂"},{"type":"paragraph","text":"长春第一汽车制造厂伊春林业管理局新青林业局"},{"type":"paragraph","text":"锦州铁路局孙家养路工区"},{"type":"paragraph","text":"鹤岗邮电局"},{"type":"paragraph","text":"大连机车车辆厂"},{"type":"paragraph","text":"阜新矿务局新丘露天煤矿"},{"type":"paragraph","text":"锦州新兴工业地区"},{"type":"paragraph","text":"上海卫海铁工厂"},{"type":"paragraph","text":"马鞍山钢铁公司"},{"type":"paragraph","text":"富春江冶炼厂"},{"type":"paragraph","text":"上海嘉丰棉纺织厂"},{"type":"paragraph","text":"福州火柴厂"},{"type":"paragraph","text":"丹阳化肥厂"},{"type":"paragraph","text":"潍坊柴油机厂"},{"type":"paragraph","text":"横峰纺织器材厂"},{"type":"paragraph","text":"济南铁路局大协车站"},{"type":"paragraph","text":"上海第三钢铁厂"},{"type":"paragraph","text":"上海永鑫无缝钢管厂"},{"type":"paragraph","text":"上海微型轴承厂"},{"type":"paragraph","text":"无锡缫丝一厂"},{"type":"paragraph","text":"胜利油田"},{"type":"paragraph","text":"上海机床厂"},{"type":"paragraph","text":"上海杨树浦发电厂"},{"type":"paragraph","text":"溪后伐木场"},{"type":"paragraph","text":"上海德新金属冶炼厂"},{"type":"paragraph","text":"襄樊棉织厂"},{"type":"paragraph","text":"武汉柴油机厂"},{"type":"paragraph","text":"广州氧化铁厂"},{"type":"paragraph","text":"湖南橡胶厂"},{"type":"paragraph","text":"广州海运管理局南海一五五轮"},{"type":"paragraph","text":"洛阳轴承厂"},{"type":"paragraph","text":"三五一七厂"},{"type":"paragraph","text":"南阳酒精厂"},{"type":"paragraph","text":"桂林机修厂"},{"type":"paragraph","text":"重庆南岸皮革厂"},{"type":"paragraph","text":"元江糖厂"},{"type":"paragraph","text":"火石堡煤矿"},{"type":"paragraph","text":"长江航运公司奉节航道段"},{"type":"paragraph","text":"红枫水力发电建设公司"},{"type":"paragraph","text":"宝鼎地质队"},{"type":"paragraph","text":"重庆钢铁公司大平炉车间"},{"type":"paragraph","text":"四○三地质队"},{"type":"paragraph","text":"兰州炼油厂"},{"type":"paragraph","text":"甘肃冶金公司"},{"type":"paragraph","text":"玉门石油管理局"},{"type":"paragraph","text":"西安人民搪瓷厂"},{"type":"paragraph","text":"新疆维吾尔自治区交通厅"},{"type":"paragraph","text":"三○八筑路队"},{"type":"paragraph","text":"陕西澄城半机械化农具公司"},{"type":"paragraph","text":"青铜峡水泥厂"},{"type":"paragraph","text":"西宁市运输车辆厂"},{"type":"paragraph","text":"西安储运公司咸阳仓库"},{"type":"paragraph","text":"新华社北京5日电　周恩来总理今天下午接见了全国工业交通战线上的先进人物代表王进喜、田凤林、冯玉萍、陈鑫煜、黄荣昌、刘源富等六位同志。他们是应全国工业交通工作会议和全国工业交通政治工作会议的邀请，来北京作报告的。"},{"type":"paragraph","text":"接见时，周总理同他们进行了亲切的谈话。周总理勉励他们更高地举起毛泽东思想伟大红旗，更好地活学活用毛主席著作，要互相学习，互相帮助，经常交流经验，不断前进。他说，只你一个单位红了还不算，而且要帮助其他单位一样红，让他们来超过你们，你们再超过他们，在比学赶帮超运动中，做出更大的成绩。"},{"type":"paragraph","text":"周总理还表扬了全国工业交通工作会议和全国工业交通政治工作会议所推荐的七十个大庆式先进单位。"},{"type":"paragraph","text":"接见时在座的，有薄一波、余秋里、陶鲁笳同志，以及各大区和中央有关工业交通部门负责人顾卓新、韩哲一、李一清、李斌、岳宗泰、张铁民、张霖之、吕东、孙大光、康世恩、王子纲等同志。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"湖南文革","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"天津文革","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"重庆文革","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"99bc55c40d"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
