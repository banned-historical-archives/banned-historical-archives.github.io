<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"应邀率代表团启程前往中苏访问在雅加达机场发表谈话艾地说共产党人必须谴责修正主义指出帝国主义者和南斯拉夫修正主义者正竭尽全力破坏中共和苏共会谈","authors":[],"dates":[{"year":1963,"month":7,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社雅加达19日电】　由印度尼西亚共产党主席艾地率领的印度尼西亚共产党代表团于19日晚间从雅加达乘飞机前往莫斯科。代表团是应苏联共产党中央委员会和中国共产党中央委员会的邀请前往苏联和中国访问的。"},{"type":"paragraph","text":"代表团副团长是印度尼西亚共产党中央委员会政治局委员、中央委员会书记处书记苏蒂斯曼。代表团团员是:印度尼西亚共产党中央宣传鼓动部委员苏吉约诺，印度尼西亚共产党中央候补委员、印度尼西亚共产党东加里曼丹委员会书记法赫鲁勒·巴拉克巴，印度尼西亚共产党北苏门答腊委员会常务委员拉库特·森比林，印度尼西亚共产党中央国际部副部长扎因·纳苏蒂安和艾地的秘书布逊·吞让。"},{"type":"paragraph","text":"到机场热烈欢送代表团的有:印度尼西亚共产党中央委员会第一副主席鲁克曼，中央委员会政治局委员萨基尔曼，中央委员会政治局候补委员优素福·阿吉托罗普和约诺以及印度尼西亚共产党中央委员会的其他领导人，全印度尼西亚中央职工会、印度尼西亚农民阵线、人民青年团、印度尼西亚妇女运动协会和其他群众组织的负责人。"},{"type":"paragraph","text":"数以百计的印度尼西亚共产党党员和印度尼西亚共产党的同情者赶到机场向艾地和代表团团员热烈欢呼和鼓掌。"},{"type":"paragraph","text":"到机场送行的还有:中国驻印度尼西亚大使姚仲明和中国大使馆的外交官员，苏联大使馆代表库兹涅佐夫，古巴大使馆临时代办卡多索，朝鲜民主主义人民共和国驻雅加达总领事申永朋。"},{"type":"paragraph","text":"18日晚上，姚仲明大使曾举行宴会为以艾地为首的印度尼西亚共产党友好代表团送行。艾地、鲁克曼、苏蒂斯曼和印度尼西亚共产党中央委员会其他负责人以及代表团团员共三十余人出席了宴会。"},{"type":"paragraph","text":"今天印度尼西亚共产党中央委员会书记处还宣布，以艾地为首的印度尼西亚共产党代表团应菲德尔·卡斯特罗的邀请，将前往古巴访问，参加“七月二十六日”的纪念活动。访问古巴的代表团其他团员为:苏蒂斯曼和扎因·纳苏蒂安。"},{"type":"paragraph","text":"【新华社雅加达20日电】　印度尼西亚共产党中央委员会主席艾地19日晚在动身前往苏联和中国进行访问前在机场发表了谈话。"},{"type":"paragraph","text":"艾地在谈到印度尼西亚共产党代表团同苏联共产党和中国共产党即将举行的会谈时说，他知道目前分歧的实质。帝国主义者和南斯拉夫修正主义者竭尽全力来破坏苏共和中共的会谈。艾地说:因此，对于这两个共产党来说，除了使他们的会谈成功以外，没有其他能为全世界共产党人和劳动人民理解的明智的政策。"},{"type":"paragraph","text":"艾地说:对于我来说，同这两个共产党进行商谈不仅符合国际运动的利益，而且也符合新兴力量发展的利益。每一个支持新兴力量对旧有势力作斗争的政策的印度尼西亚的儿子当然都不希望苏共和中共的争论继续下去。我和我率领的代表团将按照全世界共产党人和劳动人民的愿望而努力。"},{"type":"paragraph","text":"艾地在回答西方记者所提出的问题时说:“我和印度尼西亚共产党是站在莫斯科声明一边，因为声明明确地说，所有共产党人都必须谴责和揭露现代修正主义。”"},{"type":"paragraph","text":"关于苏加诺总统所表示的他要改组内阁的问题，艾地表示他相信苏加诺总统不会使人民失望。帝国主义、南斯拉夫修正主义和他们的走狗最近积极活动，企图破坏苏加诺总统组织以纳沙贡为核心的内阁的努力。我相信印度尼西亚人民将继续拒绝对他们内政的干涉，不管这种干涉是来自帝国主义还是修正主义。"},{"type":"paragraph","text":"他说:我和我所率领的代表团在动身的时候，心情是愉快的。因为，首先，在国内，粉碎反革命的运动越来越高涨，革命运动日益发展，人民的政治觉悟水平极高。其次，苏加诺总统所号召的对新殖民主义的马来西亚进行正面斗争的政策受到越来越响亮的欢迎。"},{"type":"paragraph","text":"艾地还谈到印度尼西亚的经济问题，他说:我相信，依靠人民更加坚强的团结，“五月二十六日”(指颁布经济条例的日子)的偏差因素和破坏经济宣言的条例是可以打败的。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1f94b745ff"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
