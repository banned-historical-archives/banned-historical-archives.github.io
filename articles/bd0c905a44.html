script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"高举农业学大寨红旗　顶住“四人帮”干扰破坏  天门县棉花总产量突破一亿斤","authors":[],"dates":[{"year":1977,"month":1,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"高举农业学大寨红旗　顶住“四人帮”干扰破坏"},{"type":"paragraph","text":"天门县棉花总产量突破一亿斤"},{"type":"paragraph","text":"据新华社武汉电　湖北省天门县各级党组织高举“农业学大寨”红旗，坚决顶住“四人帮”的干扰和破坏，紧紧抓住阶级斗争这个纲，认真贯彻执行“以粮为纲，全面发展”的方针，夺得农业全面丰收。去年，全县棉花总产量一跃突破了一百万担的大关，成为我国皮棉总产量最多的一个县。"},{"type":"paragraph","text":"天门县是湖北省棉花集中产区，全县有棉田七十八万亩。从一九七三年以来，这个县平均亩产皮棉都超过百斤，每年向国家提供大量的商品棉，为社会主义革命和建设事业作出了积极贡献。去年，棉花产量继续大幅度上升。全县皮棉总产量比前年增产十一万二千三百担，平均亩产达到一百二十九斤，创造历史最高水平。"},{"type":"paragraph","text":"去年，正当全县人民贯彻全国农业学大寨会议精神的时候，“四人帮”制造种种修正主义谬论，反对大批修正主义、反对大批资本主义、反对大干社会主义，妄图把普及大寨县的群众运动一棍子打下去。县委和各级党委迎着阶级斗争的风浪前进，坚持整党整风，加强县委和各级领导班子的革命化建设；坚持深入进行党的基本路线教育，批判资本主义倾向，不断解决发展农业的方向道路问题，激发了广大群众大干社会主义的积极性。"},{"type":"paragraph","text":"天门县委和各级党委认真贯彻执行“以粮为纲，全面发展”的方针。多年来，他们把多种棉花、种好棉花，给国家多作贡献，作为自己应尽的光荣职责。各级党委把棉花生产列入工作议程，从加强领导到技术管理，都经常进行研究，并且派出大批干部到产地调查研究，总结和推广棉花增产的先进经验。他们根据全县平原、滨湖、丘陵地区粮棉生产不平衡的状况，狠抓了不同地区如何平衡增产的问题。他们总结了小庙公社健康一大队夏粮上《纲要》，早稻上《纲要》，皮棉平均亩产一百五十斤，连年粮、棉双丰收的经验，有效地推动了全县夺取粮、棉双高产。去年全县不仅棉花产量突破一百万担，而且粮食产量比前年增加一成以上。生猪和家禽饲养量、鲜鱼、麻类、蚕茧、莲子、黄花菜、蜂蜜等多种经营也都比前年增产。"},{"type":"paragraph","text":"天门县各级党委注意把广大干部、群众在大批修正主义、大批资本主义中激发出来的社会主义积极性，引导到大干社会主义农业上来。他们顶着“四人帮”扣的“唯生产力论”的大帽子，大搞农业技术改革，落实农业“八字宪法”，实行科学种田，大力改变生产条件，保证了棉花和粮食的丰收。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"name":"湖北文革","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bd0c905a44"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
