art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"经过文化大革命的中国不可战胜比中友协指出苏修侵犯中国是苏美勾结共同反华阴谋的一部分","authors":[],"parts":[{"type":"paragraph","text":"新华社二十四日讯 布鲁塞尔消息：比利时左派刊物《光明》周刊最近发表一篇文章，严正谴责苏修叛徒集团对中国进行武装挑衅，并且指出，经过无产阶级文化大革命锻炼的中国是不可战胜的，苏修叛徒集团迟早必将被苏联人民所粉碎。"},{"type":"paragraph","text":"文章说，苏修叛徒集团是美帝国主义的帮凶。苏联“修正主义领导人的所作所为是社会帝国主义者的行为：他们入侵捷克斯洛伐克，他们剥削他们控制的东欧国家，他们在伊朗、印度和一些非洲国家攫取新殖民主义式的利润”。"},{"type":"paragraph","text":"文章指出，苏修叛徒集团声嘶力竭地煽动反华，是为了掩盖他们在柏林问题上的叛卖。它还指出，苏修对中国进行武装挑衅，是妄想借此维持日益陷于四分五裂的修正主义集团的“团结”，并且为拼凑修正主义集团的反华黑会作准备。"},{"type":"paragraph","text":"文章最后强调说：“无产阶级文化大革命的巨大胜利保证了中国将永远是红彤彤的。中国是不可战胜的。而修正主义者只不过是一些必将被他们的人民粉碎的可怜虫。”"},{"type":"paragraph","text":"新华社二十二日讯 布鲁塞尔消息：比中友协不久前在比利时首都布鲁塞尔向报界发表公报，谴责苏修叛徒集团蓄意对中国进行武装挑衅，侵犯中国的领土珍宝岛。"},{"type":"paragraph","text":"公报首先列举了大量铁的事实，驳斥了苏修叛徒集团贼喊捉贼的无耻谰言，指出珍宝岛从来就是中国的领土。公报接着指出，勃列日涅夫和柯西金上台以来，变本加厉地破坏中苏边界现状，不断进行武装挑衅。"},{"type":"paragraph","text":"公报强调指出，苏联军队侵犯中国领土珍宝岛的事件，是由苏联政府蓄意制造的，是苏修叛徒集团策划美苏勾结共同反华阴谋的一部分。"},{"type":"paragraph","text":"公报最后说：“作为中国人民的朋友，我们不能对任何破坏独立自主的国家中国领土的行为保持沉默。”"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7342a879b4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
