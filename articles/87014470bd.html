art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"从工人中培养技术人员就是好","authors":["驻岳城水库毛泽东思想宣传队"],"parts":[{"type":"paragraph","text":"“大学还是要办的，我这里主要说的是理工科大学还要办，但学制要缩短，教育要革命，要无产阶级政治挂帅，走上海机床厂从工人中培养技术人员的道路。要从有实践经验的工人农民中间选拔学生，到学校学几年以后，又回到生产实践中去。”毛主席的这一最新指示，给无产阶级教育革命进一步指明了前进的方向，也是我们彻底批判中国赫鲁晓夫反革命修正主义教育路线、科技路线的最锐利的武器。"},{"type":"paragraph","text":"毛主席教导我们：“走上海机床厂从工人中培养技术人员的道路。”我们驻岳城水库毛泽东思想宣传队，帮助水库完成在汛前安上闸门的光荣任务中，深刻地体会到毛主席这一指示的无比英明和伟大。"},{"type":"paragraph","text":"我们接受了安装闸门这个任务后，一些反动学术“权威”跳出来给革命工人泼冷水，说什么：“到时候完不成可以用草袋堵嘛！”“离开了我，你们别想安上闸门。”工人们气愤地说：“滚开！离开你地球照样转！”我们宣传队帮助革委会组成了闸门队，推选出最有实践经验的工人当设计技术人员。他们中间，有的只读过三年书，最高的文化水平是中专毕业。他们发挥了在无产阶级文化大革命中迸发出来的冲天干劲，充分运用自己的实践经验，人人动脑筋，想办法，搞创造，破难关，不到三个月就造出了资产阶级反动学术“权威”认为根本不能做的巨型闸门。"},{"type":"paragraph","text":"浇注混凝土的关键是立模。工人们大胆提出：把过去反动学术“权威”规定的一个闸墩立模三次、浇注三次的办法改为一次立模、一次浇注。经过我们同革命职工反复研究，认为这个办法既能保证施工质量，又能加速施工进度，我们坚决支持和采纳了他们的合理化建议。结果九天任务一天完成，还保证了质量。这一事实给了资产阶级反动学术“权威”一记响亮的耳光。"},{"type":"paragraph","text":"联系这件事，我们学习毛主席的最新指示：“走上海机床厂从工人中培养技术人员的道路。”感到特别亲切。建设社会主义是依靠工农群众、培养工农群众，还是依靠资产阶级反动学术“权威”，培养资产阶级“专家”，这是毛主席的无产阶级革命路线和中国赫鲁晓夫的反革命修正主义路线的分水岭。安装闸门的实践生动地证明，工人阶级的无产阶级觉悟最高，无产阶级立场最坚定，最有彻底的革命性，最忠于伟大领袖毛主席，因此，必须“走上海机床厂从工人中培养技术人员的道路”。"},{"type":"paragraph","text":"我们要认真学习、坚决贯彻毛主席的最新指示，和水库的广大革命职工一起，狠批中国赫鲁晓夫的反革命修正主义教育路线、科技路线，永远沿着毛主席的革命路线胜利前进！"}],"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"name":"教育革命","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"87014470bd"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
