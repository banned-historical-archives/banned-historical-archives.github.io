阴谋暴动的罪犯","authors":[],"dates":[{"year":1951,"month":11,"day":28}],"is_range_date":false,"parts":[{"text":"青海省人民法院判处一批拒绝劳动改造阴谋暴动的罪犯","type":"title"},{"text":"【西北总分社二十八日讯】青海省人民法院，最近将拒绝劳动改造阴谋暴动越狱的罪犯田维廉等二十五名，分别判处死刑或增加刑期，继续劳动改造。其中田维廉、李瑜、李喧、唐钰、彭占元等匪犯，解放后，曾参加匪“西革会”、“反共救国军”分任匪“团长”、“副官长”，积极进行反革命暴乱，被管训后，又组织犯人越狱暴动，经过分别判处徒刑，从循化押解到西宁劳动改造时，又互相勾结，组织犯人彭学智等阴谋暴动越狱，并商定要杀害我警卫战士，夺取武装后逃跑。","type":"paragraph"}],"comments":[],"origin":"1951年11月29日新华通讯社编《内部参考》。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d090cb7263"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
