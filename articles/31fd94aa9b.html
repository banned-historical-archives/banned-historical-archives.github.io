art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"忠于毛泽东思想世界革命就能胜利","authors":[],"parts":[{"type":"paragraph","text":"新华社二十日讯 澳大利亚共产党（马克思列宁主义者）主席爱·弗·希尔同志和夫人乔·希尔，今天下午参观了正在无产阶级文化大革命中乘胜前进的北京大学。"},{"type":"paragraph","text":"下午三时，希尔同志和夫人由中共中央候补委员赵毅敏同志陪同，来到了北大。他们受到了北大全体革命师生和外地来北大参观学习的革命师生的热烈欢迎。"},{"type":"paragraph","text":"希尔同志和夫人在听了聂元梓等同志关于北大文化大革命运动的情况和已经取得的胜利成果的介绍之后，参观了“新北大文化革命展览会”。"},{"type":"paragraph","text":"希尔同志和夫人在展览会的留言簿上写道：这场无产阶级文化大革命的深入的程度，给我们留下了极深的印象，并大大地鼓舞了我们。北京大学在把无产阶级革命进行到底这方面确实具有极大的启发性。全心全意忠于毛泽东思想，并且决心在斗争中贯彻毛泽东思想，就能保证无产阶级革命不仅在中国而且在全世界取得胜利。"},{"type":"paragraph","text":"参观展览以后，希尔同志和夫人还看了校园里的大字报。他们又一次受到了广大革命师生的热烈欢迎。RW：希尔；访华"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"31fd94aa9b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
