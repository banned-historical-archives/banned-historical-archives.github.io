script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反对垄断资本的残酷剥削美国十六万多铁路工人罢工","authors":[],"dates":[{"year":1971,"month":8,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社北京七月三十一日电　华盛顿消息:美国铁路工人的罢工斗争浪潮猛烈地冲击着美国垄断资本集团。继四家铁路公司的十二万多名铁路工人于十六日、二十四日相继罢工之后，三十日又有六家铁路公司的四万三千名铁路工人投入了罢工斗争。"},{"type":"paragraph","text":"美国铁路工人是有战斗传统的。去年九月和十二月，五十万铁路工人冲破反动当局设置的重重障碍，举行了两次全国规模的大罢工，使美国全国铁路运输一度全部停顿，国内经济一片混乱，所以美国统治集团对铁路工人的罢工怕得要命。在今年这次铁路工人罢工前后，尼克松政府的头面人物一再出面对工人进行威胁。二十九日晚，尼克松又亲自出马对工人施加压力，妄图破坏工人的斗争。但是，铁路工人不怕威胁，把罢工斗争进一步扩展到十家铁路公司。"},{"type":"paragraph","text":"十六万三千名铁路工人的罢工使美国十家公司的铁路系统陷于瘫痪。这十家垄断企业是:南方铁路公司，联合太平洋铁路公司，南太平洋铁路公司，诺福克和西方铁路公司，圣菲铁路公司，阿尔顿和南方铁路公司，休斯敦铁路干线和终点公司，德卢思、梅萨毕和铁区公司，爱尔近、乔利埃特和东方公司，贝塞默和伊利湖公司。据报道，这十家公司的铁路线占美国全部铁路线的将近一半。"},{"type":"paragraph","text":"铁路工人的罢工，不仅直接打击了铁路垄断资本，而且使依靠铁路运输原材料或产品的美国工业垄断资本也受到沉重的打击。美国二十五个州长惊呼，铁路工人的罢工对他们州的经济产生了“危险的或灾难性的”后果。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b62b648125"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
