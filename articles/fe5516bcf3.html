通知（概要）","authors":[],"dates":[{"year":1975,"month":3,"day":22}],"is_range_date":false,"parts":[{"text":"中共中央关于要求做好工代会、 团代会、 妇代会 准备工作的通知（概要）","type":"title"},{"text":"1975年3月22日，中共中央发出通知要求做好工代会、团代会、妇代会的准备工作。《通知》说，同意中国工会第九次全国代表大会筹备组、共青团第十次全国代表大会筹备组和中国妇女第四次全国代表大会筹备组讨论通过的代表产生办法和分配方案。《通知》要求各省、市、自治区党委要加强领导，认真做好三个代表大会代表的选举工作。这三个代表大会的筹备组均被“四人帮”所控制，在“文化大革命”结束前，三个代表大会都未召开。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fe5516bcf3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
