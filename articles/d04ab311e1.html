压迫人民的伟大胜利","authors":[],"dates":[{"year":1968,"month":9,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社墨尔本十四日电　澳大利亚共产党(马克思列宁主义)机关报《先锋报》十二日发表文章，欢呼中国全国(除台湾省以外)各省、市、自治区全部成立革命委员会。文章热情赞扬说:“这是全世界被压迫人民的伟大胜利。”"},{"type":"paragraph","text":"这篇题为《中国无产阶级文化革命的伟大胜利》的文章说，全中国(除台湾省以外)各省、市、自治区革命委员会全部成立，“把中国的无产阶级文化大革命推向一个更高的阶段。”"},{"type":"paragraph","text":"文章严正驳斥了“美帝和苏修这两个盟国”诬蔑中国无产阶级文化大革命的无耻谰言。文章说:“在这场革命的整个进程中，帝国主义和以苏修集团为首的修正主义清楚地暴露了它们的狼子野心。”“它们无数次地断言无产阶级文化大革命失败了。”“它们编造了种种谣言，说什么中国国内秩序混乱。”"},{"type":"paragraph","text":"文章接着指出，中国无产阶级文化大革命取得了伟大胜利，“‘混乱’是乱了以中国赫鲁晓夫为首的走资本主义道路的当权派。这些坏蛋被揪出来打倒了。”“另一方面，中国的工人、农民、学生在斗争中受到了很大锻炼。他们大大加强了中国的无产阶级专政。”"},{"type":"paragraph","text":"文章强调说:“全中国(除台湾省以外)建立了由人民解放军的代表、革命群众的代表和革命干部的代表所组成的革命委员会，这标志着工农政权——无产阶级专政的巨大发展。”"},{"type":"paragraph","text":"文章说，中国无产阶级文化大革命的伟大胜利，“同苏修集团和捷修集团卑鄙地背叛无产阶级专政形成了鲜明的对照。它们已可耻地堕落下去。而中国人民却空前地高举着马克思列宁主义、毛泽东思想的伟大红旗。”这一伟大胜利也“同美帝国主义及其一切盟国所遭受的危机形成了鲜明的对照，它们在世界人民手下确实陷入了混乱”。"},{"type":"paragraph","text":"文章最后说:“澳大利亚全体革命者同中国共产党人和全中国人民一道，欢呼无产阶级文化大革命全面胜利的这一新的标志。”"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"革命委员会","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d04ab311e1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
