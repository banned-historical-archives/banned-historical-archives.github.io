rt":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"干部要带头学带头用带头传公安部队召开驻京单位学习毛主席著作经验交流会","authors":[],"parts":[{"type":"paragraph","text":"本报讯 公安部队最近召开了所属驻京机关、部队、院校学习毛主席著作经验交流会。"},{"type":"paragraph","text":"会上，某部副指导员孔祥秀、化验员韩文玲、团政委赵晓焰、教员那顺、连长吴长明、刘奎、翁泉洪等十五名学习毛主席著作积极分子，介绍了学习经验。公安部队李天焕政委作了题为《把毛主席著作的学习深入一步》的讲话。"},{"type":"paragraph","text":"会议认为，要使学习深入发展，关键在于各级党委和领导干部。各级党委中心学习组，要给部队做出榜样；各级干部、特别是团以上领导干部，要带头学，带头用，带头传。这样，一方面可以进一步促进党委和领导干部的思想革命化；另一方面，党委和领导干部有了亲身体会和经验，在指导部队学习时，就能抓到点子上。"},{"type":"paragraph","text":"会议要求，各级党委和领导干部，要把领导学习毛主席著作当作经常的首要任务，抓深、抓细，一抓到底。明确突出政治，首先要狠抓学习毛主席著作，把毛主席著作作为干部、战士的必修课，作为政治课的基本内容。各项工作都要坚持用毛泽东思想挂帅。看一个单位的领导水平的高低，就看是否抓住了这个最重要、最根本的东西；衡量一个单位工作好不好的主要标志，也是首先看毛主席著作活学活用得怎样，是否促进了思想革命化，促进了四个第一、四好运动和各项工作的落实。"},{"type":"paragraph","text":"会议还要求各级领导干部，防止自满，加强领导。要有不断革命的精神和一分为二的观点，在看到成绩的同时要看到缺点，愈有成绩，愈要看到缺点。要避免出现前紧后松的现象。要逐级抓，加强检查督促。"},{"type":"paragraph","text":"会议认为，在任务繁重、加强战备的情况下，更要努力学习毛主席著作，这是加强部队建设和战备的最根本的环节，是战胜一切敌人最可靠的保证。   （新闻科）"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"64bb6b1811"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
