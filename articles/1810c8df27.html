ar":1977,"month":4,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"\u003cIMG alt=请插入7号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1977\\04\\774f040201.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e北京造纸七厂广大工人以学大庆、促大干的革命精神，高标准高质量地生产《毛泽东选集》第五卷用纸。该厂从今年一月份以来，每天都保质保量地完成了生产计划。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入7号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1977\\04\\774f040202.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e天津人民出版社印刷厂广大工人和干部热烈欢呼《毛泽东选集》第五卷纸型到厂，决心在华主席为首的党中央领导下，群策群力，胜利完成印刷《毛泽东选集》第五卷的光荣任务。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入7号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1977\\04\\774f040203.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e广州红旗印刷厂的广大职工以大庆为榜样，坚持无产阶级政治挂帅，发扬“三老四严”作风，高速度、高质量地赶印《毛泽东选集》第五卷。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入7号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1977\\04\\774f040204.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e上海市印刷六厂干部深入车间，和工人一起参加赶印《毛泽东选集》第五卷战斗。图为该厂党支部副书记和工人、技术人员一起认真检查印刷质量。"},{"type":"paragraph","text":"(本报记者摄)\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入7号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1977\\04\\774f040205.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e在延安八路军印刷厂印制过毛主席著作的一二○一厂老印刷工人宫有才(右二)，接到印制《毛泽东选集》第五卷的光荣任务后坚守岗位，不怕疲劳，连续作战，为《毛泽东选集》第五卷的出版作出了新贡献。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入7号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1977\\04\\774f040206.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e"},{"type":"paragraph","text":"西藏自治区印刷厂的工人和干部及拉萨市各界群众兴高彩烈地迎接《毛泽东选集》第五卷纸型运抵拉萨。"},{"type":"paragraph","text":"(本版照片除署名外均为新华社供稿)\u003c/FONT\u003e"}],"comments":[],"origin":"本报,新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"编纂《毛泽东选集》第五卷","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1810c8df27"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
