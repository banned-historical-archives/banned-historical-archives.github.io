ar":1978,"month":9,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"邓小平副主席访问朝鲜"},{"type":"paragraph","text":"九月十日上午，邓小平副主席和金日成主席在主席台上观看平壤各界群众举行的盛大游行队伍。"},{"type":"paragraph","text":"九月九日晚，邓小平副主席出席金日成主席举行的盛大国庆宴会。"},{"type":"paragraph","text":"九月十二日上午，金日成主席来到宾馆同邓小平副主席会谈。"},{"type":"paragraph","text":"九月十一日，邓小平副主席在李钟玉总理的陪同下访问咸兴市，受到群众的热烈欢迎。"},{"type":"paragraph","text":"九月八日，邓小平副主席同平壤机场上的欢迎群众见面时，人们挥动花束热烈欢迎中国人民的友好使者的到来。"},{"type":"paragraph","text":"九月八日，邓小平副主席代表中共中央、国务院向金日成主席赠送了礼品。"},{"type":"paragraph","text":"九月九日，邓小平副主席一行出席观看万寿台艺术团的演出。"},{"type":"paragraph","text":"九月十日下午，邓小平副主席及其一行来到平壤牡丹峰参加群众游园活动。"},{"type":"paragraph","text":"九月十一日，邓小平副主席一行参观咸兴二·八维尼纶厂。"},{"type":"paragraph","text":"（本版照片均为新华社记者摄）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4af2fa366b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
