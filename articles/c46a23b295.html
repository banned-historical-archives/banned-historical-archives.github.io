思想情况","authors":[],"dates":[{"year":1953,"month":12,"day":2}],"is_range_date":false,"parts":[{"text":"东北各县粮食统购试点中干部和群众的思想情况","type":"title"},{"text":"【东北总分社二日讯】东北各地粮食计划收购已进行了各项准备工作。在各县粮食统购试点工作中，农村干部和群众的思想情况如下：","type":"paragraph"},{"text":"党员干部的思想情况：热河省少数县级干部认为：这工作比扩军任务还难，必须先强迫命令，以后再进行纠正。辽东省凤城四台子村干部，对征粮工作盲目乐观，对购粮工作则信心不大，他们认为，只能宣传，不能带头，个别的尚存在消极对抗情绪。各地有些区村干部，平常对粮食工作重视不够，所以心中无数，在讨论任务时，对县提出的指标，不敢表示态度。接受了怕任务大，完不成，不接受自己又没有什么根据。因而有的区村干部则虚报灾情，多报消费，以减少余粮数字，削减采购任务。","type":"paragraph"},{"text":"余粮户的思想情况：他们想尽各种办法躲避把粮食卖给国家，辽东省西安县永康村余粮户把粮食分散在亲戚朋友家里，大量加工成米储存起来。东丰县石丰村杨春林说：“今年有粮也不卖，有五石粮可以换两匹瘦马，喂一石粮，明春就值二十石粮食的钱，比卖粮合适。”宽甸县农民普遍反映：今年闹粮荒，粮食一定涨价。该县农民对卖粮有七愿七不愿：(一)愿意晚卖，不愿早卖；(二)愿意存粮，不愿卖粮，认为“存粮如存金，永远不断根”；(三)愿放高利贷，不愿卖钱；(四)愿到远处卖粮，不愿在近处卖，怕露富；(五)愿意卖给私商，不愿卖给国家(他们认为国家价格低，手续又麻烦，卖给私商既省劲，价又高)；(六)愿意零卖，不愿整卖，啥时用钱啥时卖；(七)愿意卖大豆、杂粮，不愿卖高粱、玉米。","type":"paragraph"},{"text":"一般粮食够吃户的思想：因为自己粮食够吃，所以对购粮不关心，还有的叫喊自己受了灾。","type":"paragraph"},{"text":"缺粮户有两种想法：一种是怕国家把村中余粮买尽，在村子里买不到粮食；另一种是抱着旁观者的态度，认为统购粮食购不到他们的头上。","type":"paragraph"},{"text":"据松江省反映，各县分配到各区的购粮数字，却超过任务，如阿城超过一百吨，桦川超过六百吨，但细粮不足，阿城不足三百吨，桦川水稻不足二千吨。粗粮、大豆多，细粮则太少。估计这可能是由于细粮计划供应后，细粮有黑市，农民不愿卖细粮所致。(任步芳)","type":"paragraph"}],"comments":[],"origin":"1953年12月8日新华通讯社编《内部参考》。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c46a23b295"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
