art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"驻张家口部队联系实际学习毛泽东军事思想","authors":["郑弦"],"parts":[{"type":"paragraph","text":"编者按"},{"type":"paragraph","text":"本报讯 党的六中全会精神的传达学习，鼓舞了驻张家口地区部队广大指战员。他们在学习《决议》领会基本精神的同时，以极大的热情学习和运用毛泽东军事思想，在训练场上，展现出一派钻研现代军事科学、苦练杀敌本领的动人景象。"},{"type":"paragraph","text":"驻这个地区的部队领导干部，在深入部队宣讲六中全会精神的过程中，忆传统，讲战例，用切身体会说明，毛泽东军事思想过去是我们克敌制胜的强大武器，现在和将来仍然是指导我们搞好训练，赢得反侵略战争胜利的传家宝。各部队普遍组织排以上干部学习了《中国革命战争的战略问题》、《抗日游击战争的战略问题》、《论持久战》、《战争和战略问题》等军事著作，有的还举办了学习毛泽东军事思想的专题讲座。一些部队运用毛泽东的战略战术思想，反复研究和修订战术演练方案，提高各级干部的指挥艺术。某师任师长最近在学习毛主席四篇军事著作中，翻阅了大量外军资料，运用毛泽东同志积极防御的战略思想，总结自己多年来组织部队训练的经验，写出了《现代战争条件下师坚固阵地防御初探》的论文。某侦察营营长胡双廷长期坚持学习毛泽东军事著作，写了读书笔记和摘录的敌军资料达上百万字。学习《决议》后，他更自觉地抓紧时间，把自己有关的学习成果加工整理，向部队讲课，并用来指导部队的战术训练，受到了上级的表扬。"},{"type":"paragraph","text":"广大指战员通过学习《决议》，坚持把学习毛泽东军事著作同研究现代战争的特点和规律结合起来，努力解决新问题，探讨新结论，有力地推动了训练。某炮兵团司令部开了一次学习毛泽东军事思想讨论会，大家从研究敌军入手，讨论了“假如我是蓝军怎么办”的问题，具体分析敌之长短，我之优劣，然后根据毛主席制定的把战略上的劣势转变为战役和战术上的优势，集中优势兵力，各个歼灭敌人等军事原则，对战争初期炮兵的使用、坚固防御阵地炮兵的观察和配系、反坦克炮兵预备队的运用、炮兵坚固防御阵地的通信联络与指挥等问题，进行了比较深入的探讨，形成了四篇学术论文，并着手运用这些研究成果，改革部队的训练，取得了明显成效。（郑弦）"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ef56d0b43d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
