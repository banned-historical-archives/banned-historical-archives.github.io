" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"“肃反”成绩是次要的，错误是主要的","authors":["太原工学院学生"],"dates":[{"year":1957,"month":6,"day":6}],"is_range_date":false,"parts":[{"text":"“肃反”成绩是次要的，错误是主要的","type":"title"},{"text":"太原工学院学生","type":"authors"},{"text":"领导以狡辩的舌尖强词夺理，硬以我院肃反工作成绩是主要的，缺点是次要的话句，企图推翻铁的事实，不惜违背自己的良心。","type":"paragraph"},{"text":"成绩在那里？！！！","type":"paragraph"},{"text":"被搞的133名中（又何尝是133人）搞出了几个反革命？？？！！！五人小组戏视“人”这伟大而崇高的字眼，而以流氓的行为，粗暴的手段，下流的谩骂，对人的侮辱野蛮的拳打脚踢，无中生有，血口喷人卑鄙伎俩，任性而放纵无理而专横地把人置于绝境和死地，使得多少热情的有着远大理想的青年，在肉体上受到了残酷的折磨，精神上受到严重的摧残，在生活上失去青春的活力而使他们的心老在了年龄的前边，变成了一个××的老人，在生活的道路上失去了前进的勇气和信心，无辜受害者至今追忆那黑色的日子仍不能不泣不成声和悲痛欲绝呀！","type":"paragraph"},{"text":"纵然在肃反后，违法者又以怎样的态度对待这些无辜的受害者呢？是冷漠，是卑视，是不信任，自然知道被搞错，但仍以整人者的姿态、极不诚恳不老实的市侩作风，官老爷的架子，向受害者进行敷衍的所谓道歉，甚至干脆若无其事，置之不理，更可气的是以错误是不可避免的话句来搪塞责任，以“成绩是主要的，错误是次要的”违背事实的话，表明功多于过，自封为有功之臣，然而成绩在那儿呢？","type":"paragraph"},{"text":"133人中几乎均被搞错，这就是成绩吗？","type":"paragraph"},{"text":"我们大声的呼吁违法者要得到应得的处分，必须赶快的老老实实地承认错误，当众道歉做深刻的检讨，以解除受害者心头上的冰冷而沉重的锁链，使他们受到创伤涡血的心，最后走出牢狱的铁牢，违法者不要再给党造成更大的罪恶了呀！","type":"paragraph"},{"text":" 太原工学院  机三一伙1957年6月6日","type":"paragraph"}],"comments":[],"origin":"《“鸣”、“放”选集（一）》（中共山西省委整风办公室编，1957年8月）。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2914d4bfca"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
