<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"坚决同地方民族主义作斗争进一步巩固祖国的统一","authors":["新华社"],"dates":[{"year":1958,"month":2,"day":28}],"is_range_date":false,"parts":[{"text":"坚决同地方民族主义作斗争进一步巩固祖国的统一","type":"title"},{"text":"新华社","type":"authors"},{"text":"据新华社２８日讯第一届全国人民代表大会民族委员会举行第五次扩大会议。这次会议是以在少数民族中进行整风和社会主义教育为中心议题。参加会议的有六十位委员，九十位全国人民代表大会的少数民族代表，以及民族事务委员会和中央其他有关部门的工作人员共八百多人。","type":"paragraph"},{"text":"会议期间，民族事务委员会副主任汪锋作了关于在少数民族中进行整风和社会主义教育问题的报告（报告全文将在本报发表）。参加会议的委员、人民代表，结合本地区的情况进行了讨论，一致认为在当前少数民族地区的整风运动中，应该坚决进行反对地方民族主义的斗争，进一步巩固社会主义祖国大家庭的统一和团结。","type":"paragraph"},{"text":"会议最后由全国人民代表大会民族委员会副主任委员谢扶民（僮族）作总结发言。他首先指出：必须在党的领导之下，坚决依靠少数民族中的共产主义骨干，坚决相信群众中的大多数，坚决争取团结那些中间状态的人们，批判一切右倾思想，扫除一切思想障碍，把整风和社会主义教育运动进行到底。","type":"paragraph"},{"text":"谢扶民在发言中强调指出，要巩固以汉族为中心的民族大团结。他说，地方民族主义的一个突出表现，就是不承认汉族先进，不欢迎汉族的帮助，不愿意向汉族学习。一些少数民族中的右派分子更是在这个问题上兴风作浪，公开煽动反对汉族干部和汉族人民，拒绝汉族的帮助，反对向汉族学习。对于这种错误思想必须进行批判，对于那些资产阶级右派分子的反动行为必须坚决给予打击。要将我国建设成为一个伟大的社会主义强国，要使各民族得到共同的发展和繁荣，就必须不断加强以汉族为中心的我国各民族之间的团结互助，共同努力，共同进步。汉族是我国革命和建设事业的主力军，是我国名民族团结的中心，搞好以汉族为中心的我国各民族间的大团结，不断改进少数民族和汉族之间的关系，是我国在解决民族问题方面的根本任务。","type":"paragraph"},{"text":"谢扶民说：今天的汉族，是在工人阶级及其政党中国共产党领导之下的汉族，它有责任和义务帮助国内各民族获得发展和进步，同时也需要从少数民族方面取得一切可能取得的帮助和支持，向少数民族学习一切有益的东西。但是主要的，还是少数民族应当向汉族学习，和取得汉族的帮助，这是关系到各少数民族建设社会主义和发展、繁荣的重大问题。","type":"paragraph"},{"text":"最后，谢扶民对如何正确对待民族的风俗习惯问题，作了阐述。他说，每一个民族的风俗习惯中，都有一部分是有利于社会主义、有利于民族发展的有益的成分，必须予以发扬，有一部分是对社会主义和民族发展没有多大影响的成分，可以不去管它；还有一部分是不利于社会主义、不利于民族发展的有害的成分，则应该教育群众认识它的危害作用，在群众自觉的基础上，逐步加以改变。","type":"paragraph"},{"text":"这次会议历时三天，在２月１３日日下午闭幕。","type":"paragraph"},{"text":"---- 原载《人民日报》1958年3月1日原题为：“汉族为中心  各族大团结  各民族委员在人大民族委员会扩大会议上表示决心  坚决同地方民族主义作斗争进一步巩固祖国的统一”。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ccf65e734c"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
