],"dates":[{"year":1993,"month":8,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"世界杯乒乓赛马文革输给黄文冠"},{"type":"paragraph","text":"王涛淘汰塞弗进入四强"},{"type":"paragraph","text":"本报广州８月２１日电世界杯乒乓球赛今晚在广州体育馆继续进行。中国队的头号主力马文革失手于加拿大的黄文冠，王涛则顺利进入半决赛。"},{"type":"paragraph","text":"今晚，王涛先战比利时的塞弗。状态正佳的王涛此盘发挥不错，正手抢攻和反手弹拨屡屡得手，以２１∶１２、２１∶１８连下两局获胜。"},{"type":"paragraph","text":"随后进行的马文革与黄文冠一战，马文革状态不佳，失误频频，不是发球下网，就是接球不过，抢攻命中率也不高。面对曾是广东乒乓球队一员的黄文冠，马文革显得无斗志，以１２∶２１、７∶２１败北。"},{"type":"paragraph","text":"今晚另两场比赛的结果为：克罗地亚的普里莫拉茨以２∶０胜英格兰陈新华，瑞典的卡尔松２∶０胜奥地利丁毅。半决赛和决赛将于明天进行。半决赛对阵形势为：普里莫拉茨对卡尔松，王涛对黄文冠，胜者争冠军。（赵劲）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"278460dafd"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
