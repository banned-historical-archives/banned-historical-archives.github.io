art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"批评资产阶级自由化的思潮增强四项原则基础上的团结","authors":[],"parts":[{"type":"paragraph","text":"新华社西安八月二十四日电 中共陕西省委第一书记、省人大常委会主任马文瑞，在最近召开的省人大常委会上强调指出，必须改变领导上存在的涣散软弱状态，努力抓好经济工作和思想政治工作，发展三中全会以来大好形势。"},{"type":"paragraph","text":"马文瑞在谈到思想战线上的问题时指出，有些人把批评当作打棍子，没有把批评和自我批评看成是我们党的优良作风，当作推动我们工作前进的动力，实际上是存在着某些企图摆脱党的领导、离开社会主义轨道的倾向。有些人放肆地发表反对四项基本原则的言论，羡慕资产阶级自由化。"},{"type":"paragraph","text":"马文瑞说，必须改变思想战线的领导存在着的涣散软弱状态。对于那些脱离社会主义轨道、脱离党的领导、搞资产阶级自由化的社会思潮，如同对待左倾错误思想一样，也要进行严肃的正确的批评和必要的恰当的斗争。不能把一切批评都说成打棍子、整人，那样，将导致取消任何批评。在政治生活中我们决不能放下批评的武器。当然，开展批评和自我批评，要坚持正确的方法，实事求是地、摆事实讲道理地、与人为善地去进行。不能简单粗暴，乱批乱斗，不能搞运动。对于仍在进行破坏活动的林彪、江青反革命集团的残余分子、仇视社会主义的敌对分子和唯恐天下不乱的人，要坚决揭露和打击。"},{"type":"paragraph","text":"马文瑞希望大家好好学习党的六中全会的《决议》，统一认识，增强在坚持四项基本原则基础上的团结，振奋精神，搞好工作，搞好生产，把物质生产搞上去，把社会主义的精神文明搞好。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"392a231e2f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
