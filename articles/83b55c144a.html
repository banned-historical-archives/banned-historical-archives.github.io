dates":[{"year":1995,"month":5,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"丁松战卡尔松，第二局丁松以十比五领先时，兴奋不已，竟然拿起擦汗毛巾，跑到了卡尔松那边的球台位置上，弄得卡尔松莫名其妙。电视评论员宋世雄一时激动，脱口而出:“丁松以十比五领先交换场地。”忘了交换场地是在第三局。"},{"type":"paragraph","text":"从五十年代起便蜚声世界乒坛的匈牙利名将，曾七夺世界冠军的西多，今天上午出现在世乒赛新闻中心时，立即被敏感的记者和热情的工作人员所包围，并纷纷请他签名合影留念。六十八岁的西多用汉语叫着“容国团、庄则栋、李富荣……”等人的名字。当人群中有一位模仿当年西多擅长的近台削球逼角反攻动作时，西多会心地笑了。"},{"type":"paragraph","text":"新闻发布会上，有记者问蔡振华:“您的房间号码是六一六，是否为讨顺一顺的口彩?”蔡振华笑着回答:“不，隔壁王涛、吕林住的号码比我的更好，是‘六一八’，又顺又发，我想他们应该争取拿到男双冠军!”"},{"type":"paragraph","text":"天津的球迷对家乡的球星马文革厚爱有加。不管他输也好，赢也好，场上的观众总是报以鼓励的掌声。此间的大报小报以及电台、电视台中的评论几乎都像“赞美诗”一样。有篇文章甚至亲昵地称呼着马文革的别号:“马儿啊，你快些跑，给咱天津人露一回脸。”"},{"type":"paragraph","text":"赛会这次发了不少可以进入内场的摄影记者证件。可几天下来。发觉不少人连相机都不带，是冒牌的摄影记者。于是作出决定，“有内场证，无相机者”也不准入内。一位好不容易搞到内场证的电台记者为采访男团决赛，特意借了一架相机挂在脖子上，连同那些录音设备，真有点“不堪重负”。"},{"type":"paragraph","text":"今晚男团决赛开始之前，新闻记者也悄悄地进行了一次“小型决赛”，只见新闻发布会内前三排的座位已被一些包、报纸所“占领”，一位“为他人作嫁”的年轻记者则担任了“看守”的角色，如同先前上海小菜场时替人占位置的“主儿”。他说，“要汲取昨天女团决赛后抢不到位子的教训。”　宋丽珍　马申"},{"type":"paragraph","text":"(本报天津五月八日专电)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"天津文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"83b55c144a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
