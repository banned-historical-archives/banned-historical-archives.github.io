script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"意大利群众斗争浪潮波及全国工人和学生纷纷罢工、罢课、游行示威、占领工厂和校舍，向垄断资产阶级的反动统治发动了英勇的进攻","authors":[],"dates":[{"year":1970,"month":1,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社北京二十三日电　罗马消息:随着意大利政治、经济危机的不断加深，意大利革命群众运动日益蓬勃发展。全国各地的工人、农业工人、青年学生和其他阶层劳动人民以罢工、罢课、游行示威、占领工厂和校舍等斗争方式，向垄断资产阶级的反动统治发动了英勇的进攻，使已经处在风雨飘摇中的意大利垄断资本集团遭到一次又一次的沉重打击。"},{"type":"paragraph","text":"二十一日，一万多名学生在意大利第二大城米兰举行声势浩大的示威游行，抗议意大利反动统治集团对劳动人民进行野蛮的法西斯镇压。"},{"type":"paragraph","text":"下午六点多钟，一万多名米兰各大学和一些中学的学生在米兰大学外面集合整队开始示威游行。"},{"type":"paragraph","text":"在浩浩荡荡的游行队伍前面是一条大横幅，上面写着“马克思列宁主义万岁!”其他横幅和标语牌上写着:“工人和学生在争取社会主义的斗争中团结起来”和“我们要制止镇压”。示威者唱着革命歌曲，高举着红旗列队前进。"},{"type":"paragraph","text":"学生的斗争得到工人的热情支持，米兰、瓦雷泽、克雷莫纳、帕维亚和其他北部城市的许多工人赶来参加了学生的示威游行。"},{"type":"paragraph","text":"反动当局出动了近一千名警察进行野蛮镇压。法西斯警察投掷催泪弹，企图阻止游行队伍前进。但是示威学生不畏强暴，和工人们一起用推倒的汽车、家俱筑起路障，用石头和砖块作武器，同反动警察进行了英勇搏斗，打伤警察多名。市区的交通有三个多小时完全处于瘫痪状态。"},{"type":"paragraph","text":"示威群众分成几路，其中一路数千名学生在击退了警察的野蛮袭击后，游行到法院，在法院外面举行了长时间的示威。与此同时，其他各路游行队伍在一些广场和街头也同警察展开了激烈搏斗。战斗一直持续到夜晚。"},{"type":"paragraph","text":"随着经济情况不断恶化，人民生活日益贫困，在意大利各地，最近也爆发了许多要求增加工资和改善生活条件的罢工和示威。"},{"type":"paragraph","text":"二十日，西西里地区的伯利斯河谷区遭受地震灾害的两万灾民前往该地区首府巴勒莫，抗议政府无视他们的困苦处境。地震灾民在巴勒莫举行了五个小时的游行示威，许多学生参加了他们的行列。与此同时，在巴勒莫、特拉巴尼、阿格里琴托等受过地震灾害地方的人民也举行了抗议罢工。"},{"type":"paragraph","text":"意大利各城市的九万名交通运输工人最近不断举行罢工斗争，要求提高工资，缩短工时。"},{"type":"paragraph","text":"二十日，意大利首都罗马的印刷工人也举行罢工，声援为反对解雇而占领工厂达两个多月之久的二百多名印刷工人。同一天，一些公司的煤气工人开始举行七十二小时的罢工，使一百三十个城镇的煤气输送发生中断。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9881ab9e03"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
