:[{"year":1966,"month":8,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社北京十二日电　出席最近在北京举行的亚非作家紧急会议后返国的索马里和尼泊尔代表，热情洋溢地对新华社记者表达了他们对毛主席的热爱和对毛泽东思想的高度评价。"},{"type":"paragraph","text":"索马里代表阿卜杜拉齐兹·努尔·赫尔西在摩加迪沙对新华社记者发表谈话说:在中国，每一个工人、农民、战士，甚至是家庭主妇，都在学习毛泽东主席的著作。毛泽东主席的著作是当代最高的马克思列宁主义。"},{"type":"paragraph","text":"他说:“当然，学习马克思、恩格斯、列宁、斯大林的经典著作，是非常重要的。但是，对我们亚非两洲的战斗人民来说，毛泽东思想是更加强大的武器。许多非洲朋友对我说:‘毛泽东主席的著作对于他们的斗争是非常必要的’。”"},{"type":"paragraph","text":"他在谈到中国的无产阶级文化大革命时说:“中国的文化革命不仅对中国，而且对全世界来说都有巨大的重要意义。”"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"735e185afb"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
