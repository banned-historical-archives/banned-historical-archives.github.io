script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"“耐普曼——资产阶级”的提法质疑","authors":[],"dates":[{"year":1988,"month":3,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"“耐普曼——资产阶级”的提法质疑"},{"type":"paragraph","text":"1921年在苏联历史上是一个重要转折点，由于布尔什维克党和苏维埃政府开始从“战时共产主义”向新经济政策过渡，在苏维埃社会阶级结构中，大量涌现出一批个体商贩、商人、租让者、租赁者、包卖主、私人企业主、经纪人、代销者等等，这些人苏联史上称之为“耐普曼”。“耐普曼”是由俄语“新经济政策”的缩写字“ИЗП”加上“МАИ”构成，原意是“这一新经济政策的人或代表”。苏联理论界一直认为，耐普曼是资产阶级或新资产阶级的代名词，总是与地主、富农、反革命分子相提并论。吴恩远在《世界历史》上发表《论耐普曼的组成、性质及作用》一文指出，所谓“耐普曼”中占绝对成份的小商人、自由职业者、小业主等，他们的经济状况和苏维埃工人、职员相差无几；在生产关系中处于不雇佣人，或只是少量地、临时性、辅助性地雇佣人的地位；因而，他们应属于与资产阶级本质不同的小资产阶级范畴。“耐普曼——资产阶级”这一提法是不能成立的。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"44f34fd692"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
