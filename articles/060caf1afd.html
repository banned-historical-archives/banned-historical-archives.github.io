year":1966,"month":10,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席著作给我无穷力量"},{"type":"paragraph","text":"我非常喜欢毛泽东的书。毛泽东是一位世界上最伟大的人物。他是一个伟大的政治家、思想家、理论家和军事家。我读过两篇毛主席的军事著作，我感到自己比过去强大得多了，从中获得了力量。读过毛泽东的书以后，我感到世界上再没有克服不了的困难。革命者开始时力量是很小的，但我们可由三个人壮大到三十人、三百人、三千人、五十万人……，最后胜利一定是我们的。共产党人在世界上没有克服不了的困难。"},{"type":"paragraph","text":"希腊　一海员"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"060caf1afd"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
