ical-archives/banned-historical-archives0/main/maoquanji34.pdf"],"article":{"title":"对全国文联、作协主席团联席会议决议等的批语","alias":"","parts":[{"type":"paragraph","text":"对全国文联、作协主席团联席会议决议等的批语"},{"type":"paragraph","text":"（1954年12月8日）周扬同志："},{"type":"paragraph","text":"均已看过。决议可用。"},{"type":"paragraph","text":"[1]指准备提交中华全国文学艺术界联合会主席团、中国作家协会主席团1954年12月8日召开的扩大的联席会议讨论通过的《关于（文艺报）的决议》稿。决议稿有六点：（一）改组《文艺报》的编辑机构，重新成立编辑委员会，实施集体领导原则。（二）贵成《文艺报》新的编委提出办法，坚决克服错误，端正编辑方针，使《文艺报》成为具有明确战斗方向和切实作风的刊物。内容应以文艺批评为主，同时对人民的文化艺术生活发表评论和介绍，力求扩大和密切文艺和广大人民生活的联系。（三）全国文联主席团责成中国作协主席团改进对《文艺报》的领导工作。《文艺报》在工作上应与文化部建立密切联系。（四）责成《人民文学》同中国作协领导的其他刊物及地方分会的刊物加强文艺批评工作，并提出开展文艺批评和自由讨论的具体计划。（五）责成中国作家协会、中国戏剧家协会、中国音乐家协会、中国美术家协会和所属各地方协会的机关刊物以及各省市文联所属机关刊物的编辑机构，根据本决议的方针进行工作检查，并改进工作。（六）中国作协主席团应在1955年春节前召开作协第二次理事会，讨论改进作协的领导工作。这个决议在1954年12月9日《人民日报》上发表。"},{"type":"paragraph","text":"[2]周扬，当时任中共中央宣传部副部长、中华全国文学艺术界联合会副主席。毛泽东全集第三十四卷"},{"type":"paragraph","text":"你的讲稿“是好的，在几处地方作了一点修改，请加斟酌。郭老讲稿很好，有一点小的修改，请告郭老斟酌。“思想斗争的文化动员”这个题目不很醒目，请商郭老是否可以改换一个。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十二月八日早"},{"type":"paragraph","text":"[1]指周扬准备在1954年12月8日全国文联、作协主席团扩大的联席会议上作的题为《我们必须战斗》的讲话稿。内容是：（一）开展对胡适派资产阶级唯心论的斗争；（二）《文艺报》的错误；（三）胡风的观点和我们的观点之间的分歧。这个讲话稿在1954年12月10日《人民日报》上发表。"},{"type":"paragraph","text":"[2]指全国人大常委会副委员长、中华全国文学艺术界联合会主席郭沫若准备在1954年12月8日全国文联、作协主席团扩大的联席会议上作的题为《思想斗争的文化动员》的讲话稿。内容是：（一）坚决地展开对于资产阶级唯心论的思想斗争。（二）广泛地展开学术上的自由讨论，提倡建设性的批评，并提出十六字目标：明辨是非，分清敌友，与人为善，言之有物。（三）加紧扶植新生力量。根据毛泽东的建议，这个讲话稿的题目后来改为《三点建议》，在1954年12月9日《人民日报》上发表。"}],"authors":["毛泽东"],"dates":[{"year":1954,"month":12,"day":8}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":367,"page_end":368},"tags":[{"name":"毛泽东","type":"人物"},{"name":"周扬","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6ea77230b7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
