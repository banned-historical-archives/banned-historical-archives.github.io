r":1950,"month":8,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　国营上海鱼市场为了保障货主正当利益，发展渔业生产，并在基本上取缔投机操纵的根源，彻底消除不合理的封建剥削，减轻买客的负担，自今(十二)日起，实行现款交易，统一收付货款，和取消经纪人向买客收取每元一分五厘的外佣。以后鱼类 须先以现款向该场出纳股掉换“鱼商分批购货计数证”，凭证入场购货，无证者须在购货时当场付现。货主应得货款于鱼货出售当日由鱼市场给付，以便可以早日出海。这是上海鱼业的大改革，不但对于产销双方有利，而且帮助经纪人改造，使成为正当的依靠劳动收入的市场服务员。(永)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9ce88223ff"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
