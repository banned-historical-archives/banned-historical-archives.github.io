tart":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"打得好！打得好哇！——空军地空导弹“英雄营”官兵缅怀毛主席","authors":["张泓赵宇贺西泉"],"parts":[{"type":"paragraph","text":"10月7日，曾5次见到毛主席的岳振华，又回到空军地空导弹“英雄营”讲传统。"},{"type":"paragraph","text":"那是34年前的这天，“英雄营”击落了猖獗一时的美蒋RB—57D高空侦察机，首开防空作战史上用地空导弹击落敌机的先例。随后全营南征北战，又创造出导弹部队“打游击”和“近快战法”等奇迹般的打法，取得辉煌战果。我地空导弹部队共击落敌机9架，“英雄营”独占其5，而岳振华一人就指挥打下了4架。全营3次荣立集体一等功，被国防部授予“英雄营”称号。"},{"type":"paragraph","text":"最难忘1964年7月23日那一天，毛主席和刘少奇、周恩未、朱德等中央领导，在人民大会堂接见“英雄营”全体官兵。毛主席风趣地对空军主要负责同志说：美蒋就那么几架U—2飞机，不够我们打的嘛。他紧紧握住岳振华的手，操着他那浓浓的、洪亮动听的湖南口音连连说：“岳振华同志，打得好！打得好哇！”"},{"type":"paragraph","text":"从此，“英雄营”形成个规矩，每年7月23日，是“纪念毛主席接见光荣传统教育日”。每次讲到那浓浓湘音的故事，就总是掀起一个高潮。这故事成了激励官兵战斗意志的战鼓。"},{"type":"paragraph","text":"打高科技战争，常常是分秒之间见功夫。“英雄营”的训练标准，总是难人一码。如装退导弹，基本要求之一是快。训练大纲规定1分多钟完成是优秀，而“英雄营”的兵只用40多秒就够了。为了达到这个成绩，二连去年一年就组织训练和表演装退弹1200余次，平均每次都装退导弹3枚以上。近几年，“英雄营”被军委确定为“开放营”，从此由“地下”转入“地上”，向外军打开了神秘的营门。至今“英雄营”官兵已接待了28个国家的军事代表团，被来访者誉为“世界上一流的军人”。"},{"type":"paragraph","text":"今年秋天，美国原太平洋总部总司令、海军上将亨廷顿·哈迪斯蒂率领的美国防大学将官班访问团，踏上了“英雄营”的阵地。黑眼睛的士兵们一番气势威猛、准确娴熟的战斗表演，令蓝眼睛的将官们看得过瘾、折服。一名准将幽默地说：“希望你们不要再打我们。”RW：毛泽东；生平"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"036094e9a4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
