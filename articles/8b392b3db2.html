art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"帮助群众学好毛主席著作","authors":[],"parts":[{"type":"paragraph","text":"我们支部许多党员学习毛主席著作是积极的，但是有些同志不能很好地带领非党群众学习，什么原因，经过分析，主要是这些同志对党员在学习毛主席著作中，要起带头、宣传和组织作用认识不足。如有的说：出力气，干重活，可以带头，学习毛主席著作，自己文化低，理解能力差，带不了头。"},{"type":"paragraph","text":"针对这一问题，我们组织党员学习了毛主席《改造我们的学习》，还学习了林彪同志关于突出政治的指示。毛主席指出，中国共产党是拿起马克思列宁主义这个武器的倡导者、宣传者和组织者。林彪同志说：“我们要把传播毛泽东思想和贯彻毛泽东思想当作自己的毕生事业。”毛主席和林彪同志的这些指示，使党员们认识到，为了党的事业，为了带领群众更好地完成任务，学好用好毛主席著作，是我们做好一切工作的根本；作为一个党员，需要在各方面起模范作用，但是最主要的是要宣传毛泽东思想，用毛泽东思想武装群众的头脑。过去有的党员（班长）被选为学习小组长，往往强调工作忙，一再推辞，现在认为是义不容辞了。"},{"type":"paragraph","text":"认识提高后，我们又总结介绍了几个党员帮助和组织非党群众学习毛主席著作的经验，用活人活事告诉大家怎样起带头、宣传和组织作用。党员郑贵发（班长）善于组织全班学习毛主席著作，新战士一到班，他就给他们讲解学习毛主席著作的好处，指定老战士个别帮助。有个新同志看小说多，对学习毛主席著作抓得不紧，他就给他讲两者的关系、位置的摆法，并特地让他去团里听学习毛主席著作积极分子的报告。他还做到会前、科目前和执行任务前，结合班内思想情况活学活用毛主席著作，使全班的思想、工作进步很快。党员刘宏彪和曾凡桂结成“一对红”后，曾凡桂身体弱，爬山、跑步喘不过气来，担心将来打仗完不成任务。刘宏彪就和他一起学习《愚公移山》、《丢掉幻想，准备斗争》，并和他一起打篮球，练长跑，使曾凡桂增强了体质，提高了信心。党员们学了这些经验，感到有了样板，过去认为自己文化低、起不了作用的党员，现在也觉得有了信心，有了办法。"},{"type":"paragraph","text":"这样，党员们就把帮助和组织非党群众学好毛主席著作，做为自己经常的重要任务。非党群众反映：过去有的党员只顾自己学习，现在热心帮助我们学习了。"},{"type":"paragraph","text":"（颜平聪整理）"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8b392b3db2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
