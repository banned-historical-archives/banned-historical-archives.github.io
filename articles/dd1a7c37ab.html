":1952,"month":1,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席周总理电贺印度国庆"},{"type":"paragraph","text":"【新华社二十五日讯】一月二十六日为印度共和国国庆日，我中央人民政府毛泽东主席与政务院周恩来总理兼外交部部长分别致电印度共和国总统普拉沙德及总理兼外交部部长尼赫鲁，表示祝贺。电文如下："},{"type":"paragraph","text":"毛主席致普拉沙德总统电印度共和国总统普拉沙德先生："},{"type":"paragraph","text":"值此贵国国庆之际，我代表中华人民共和国政府及人民谨向阁下、贵国政府及人民致热烈的祝贺，并祝印度人民日益繁荣与幸福。"},{"type":"paragraph","text":"中华人民共和国中央人民政府主席　毛泽东"},{"type":"paragraph","text":"一九五二年一月二十四日　北京"},{"type":"paragraph","text":"周恩来总理兼外长致尼赫鲁总理兼外长电印度共和国政府总理兼外交部部长尼赫鲁先生："},{"type":"paragraph","text":"值此贵国国庆之际，请接受我对阁下、贵国政府及人民的诚挚祝贺。祝中印两国间的友好关系获得进一步的发展。"},{"type":"paragraph","text":"中华人民共和国中央人民政府政务院总理兼外交部部长　周恩来"},{"type":"paragraph","text":"一九五二年一月二十四日　北京"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dd1a7c37ab"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
