rs":[],"dates":[{"year":1971,"month":10,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"参加沃—德耶毛泽东水电站发电庆祝仪式"},{"type":"paragraph","text":"我政府代表团离京赴阿尔巴尼亚"},{"type":"paragraph","text":"新华社二十三日讯　应阿尔巴尼亚政府邀请，以水利电力部副部长张彬为团长的中国政府代表团，今天乘飞机离开北京前往阿尔巴尼亚，参加沃—德耶毛泽东水电站发电庆祝仪式。代表团团员是：我国驻阿尔巴尼亚大使馆经济参赞李晓林（已在阿尔巴尼亚）、水电部对外司负责人刘蔼然。工作人员有游吉寿、田德宝、吴冬和。"},{"type":"paragraph","text":"我国有关方面负责人梁其舟、钱正英、韩宗正、李连庆、魏玉明、鲁平、余进琦等前往机场送行。"},{"type":"paragraph","text":"阿尔巴尼亚驻我国大使罗博、参赞安东尼、武官哈卡尼和经济参赞贝赞尼等前往机场欢送。"},{"type":"paragraph","text":"阿尔巴尼亚费尔泽水电站设计鉴定工作组组长、建筑部副部长拉赫曼·汉库也前往机场欢送。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7fa14c509d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
