ical-archives/banned-historical-archives0/main/maoquanji36.pdf"],"article":{"title":"关于检查同苏联专家、顾问关系的批语","alias":"","parts":[{"type":"paragraph","text":"关于检查同苏联专家、"},{"type":"paragraph","text":"顾问关系的批语"},{"type":"paragraph","text":"（1956年1月30日）"},{"type":"paragraph","text":"此件“值得看一下。似须整个检查一次同各方面顾问专家的关系。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一月卅日"},{"type":"paragraph","text":"[1]指苏联驻华军事总顾问彼得鲁塞夫斯基1956年1月12日同中共中央军委委员、国务院副总理兼国防部部长彭德怀谈话的纪要。总顾问说，一些苏联军事顾问反映，中国同志目前已经不需要他们，不交给他们工作做。他自已有很多话也无处谈。彭德怀对这种情况进行了解释。双方还就缩减顾问编制和中国军队装备现代化等问题交换了意见。毛泽东全集第三十六卷"},{"type":"paragraph","text":"刘、周、陈、小平、彭真阅，尚昆存。"},{"type":"paragraph","text":"20世纪50年代，大量的苏联专家和技术人员来到中国，为中国建设做出了重要贡献。图为苏联专家在大连造船公司。"},{"type":"paragraph","text":"[1]刘，指刘少奇。周，指周恩来。陈，指陈云，当时任中共中央书记处书记、国务院副总理。小平，即邓小平，当时任中共中央秘书长、国务院副总理。彭真，当时任中共中央书记处候补书记。"},{"type":"paragraph","text":"[2]尚昆，即杨尚昆，当时任中共中央副秘书长、中央办公厅主任。"}],"authors":["毛泽东"],"dates":[{"year":1956,"month":1,"day":30}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":208,"page_end":209},"tags":[{"name":"毛泽东","type":"人物"},{"name":"彭真","type":"人物"},{"name":"彭德怀","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5f778b2f68"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
