了，算不算错捕","dates":[{"year":1956}],"is_range_date":false,"authors":["人民公安"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"铁道部政治部审干办公室, 审干工作政策选编(三), 628","tags":[{"name":"错捕","type":"主题/事件"},{"name":"纠正","type":"主题/事件"}],"parts":[{"type":"title","text":"可捕可不捕的捕了，算不算错捕"},{"type":"paragraph","text":"对于可捕可不捕的捕了的，虽然也是错误，也应该检查和纠正，但是从它的性质上说，这种错误不是冤枉好人的性质，而是工作上掌握政策和判处上不符合法律或不完全符合法律的错误，不应当和错捕的案件一样看待，一样处理。 凡是可捕可不捕的而捕了的，应当教育释放，但不赔偿损失，并应在释放前征求当地群众意见和向群众进行适当解释交代，如经解释仍有很大的意见的，可以缓释。衡量可捕可不捕的案件，去年逮捕的，就要依照去年的政策界限为标 准，就是说从今年和去年的不同情况出发。其中捕后已经判刑的，应当依照法律程序，有步骤、有计划地加以改判。捕后至今尚未判刑的，无论是今年捕的或者是去年捕的，都应当一律依照今年的政策精神处理。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"454ff300d9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
