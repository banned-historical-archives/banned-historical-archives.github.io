幕","authors":[],"dates":[{"year":1967,"month":10,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"向法国人民介绍我国文化大革命巨大成就等情况"},{"type":"paragraph","text":"“中国人民从胜利走向胜利”展览在巴黎开幕"},{"type":"paragraph","text":"新华社巴黎电　法中友好协会举办的中国图片和招贴画展览会，九日在巴黎开幕，受到法国人民的热烈欢迎。"},{"type":"paragraph","text":"这个题为“中国人民从胜利走向胜利”的展览会，着重介绍了中国无产阶级文化大革命的巨大成就，中国人民和世界人民热爱伟大领袖毛主席和战无不胜的毛泽东思想、学习毛主席著作，中国人民解放军支援文化大革命和热爱人民以及中国革命的文化艺术为工农兵服务等情况。展览会共展出了一百七十多张照片和七十多张招贴画。在每一组图片或招贴画旁边都醒目地写着有关的毛主席语录。同以“为人民服务”为题的一组图片一起，展出了用大字书写的毛主席的光辉著作“老三篇”法文译文全文。"},{"type":"paragraph","text":"这个展览会在巴黎一直开放到十月十四日，然后再在法国其他一些城市展出。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4e2608ecb0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
