script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"《河北日报》就留村公社党委强令毁瓜事件发表评论  尊重生产队自主权必须深批极左","authors":[],"dates":[{"year":1979,"month":7,"day":31}],"is_range_date":false,"parts":[{"type":"paragraph","text":"《河北日报》就留村公社党委强令毁瓜事件发表评论"},{"type":"paragraph","text":"尊重生产队自主权必须深批极左"},{"type":"paragraph","text":"本报讯  《河北日报》就正定县留村公社党委强令南庄大队毁瓜事件，发表了《尊重生产队自主权必须深批极左》的评论员文章。文章中说“这件事如果发生在林彪、‘四人帮’横行时，不足为奇，它出现在今天，这不能不引起人们的深思。”文章指出，党中央强调尊重和保护生产队的自主权，得民心，顺民意，农业大上有了奔头，社员的生产积极性空前高涨，整个农村形势一天天好起来。但是，有的人对群众的呼声和要求听而不闻，仍然用极左的眼光看问题，埋怨三中全会以来的政策“右”了，讲民主“过头”了，对强调和尊重生产队的自主权，反感得很。这次留村公社党委强令毁瓜的事件，就是这种极左思潮的表现。他们在政治上以大帽子压人，说什么这是“触犯了党纪国法”，是林彪、“四人帮”“闹而优则仕”、“踢开党委闹革命”的流毒，仍然在搞无限上纲。对党员干部以组织处分吓人。在经济上给“小鞋穿”，夏粮征购给增加了五千斤。这种行为，严重地挫伤了广大群众的社会主义积极性，对农业生产的发展十分有害。"},{"type":"paragraph","text":"文章讲了中央关于农业问题的两个文件中指出的“在坚持社会主义方向、执行国家法律和接受国家计划指导的前提下，公社所有基本核算单位都有权因时因地制宜地进行种植，有权决定增产措施，有权决定经营管理方法，有权分配自己的产品和现金，有权抵制任何领导机关和领导人的瞎指挥。”最后强调要把农业生产尽快搞上去，必须联系实际，继续批判林彪、“四人帮”的极左路线，认真贯彻执行“农林牧副渔同时并举”和“以粮为纲，全面发展，因地制宜，适当集中”的方针，坚决改变那种“以粮为纲，全面砍光”的错误做法，要在抓紧粮、棉、油等项生产的同时，提倡多种经营，适当种些瓜、菜和经济作物，增加集体和社员的收入，尽快改变“高产穷队”的面貌。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"林彪","type":"人物"},{"name":"四人帮","type":"人物"},{"name":"河北文革","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a868416f32"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
