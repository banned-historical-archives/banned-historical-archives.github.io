torical-archives/banned-historical-archives8/main/maoquanji4-2.pdf"],"article":{"title":"征募和教育新兵问题的训令","alias":"","parts":[{"type":"paragraph","text":"征募和教育新兵问题的训令1]"},{"type":"paragraph","text":"（1930年3月29日）"},{"type":"paragraph","text":"为令遵事。照得红军为工农革命之斗争工具，在此反动政局日益崩溃，革命潮流日形高涨之际，自应多征忠实勇敢之工农分子扩大红军，以资扑灭反动势力，获取最后胜利。惟近查各部队对征募新兵一项，只图征募小公差兵及任意增添挑夫，极少注意战斗兵之补充。更有收募五官不全、驼背、跛足及患肺痨、花柳病、盲肠炎、痔疮等症者，此殊不知五官不全、驼背、跛足者不特有关红军观瞻，实亦不合军人之资格。原因患目疾者不能瞄准射击，耳聋者不能分辨号令，鼻塌者多为梅毒遗传且易受传染病，口吃者不能担负军人之传达任务，至于身患肺痨、花柳病、盲肠炎、痔疮诸症，不但身体屏弱不能随军斗争，抑且有传染他人之危险。本长鉴于上述各项之非是用，特规定征募新兵及新兵入伍时应注意之事项如下：（一）征募新兵之资格：年龄须在十六岁以上三十岁以下，身长四尺二寸（裁尺）以上，体格强健，无恶疾及非五官不全者。（二）征募职权及检查手续：各大队皆可随时征募新兵，但必须经军医处或卫生队检查合格后始得补名。如分兵（指一支队分出）游击时，得由支队长、政治委员或支队副亲自检验，确与第一项资格相符合者始行补名。（三）新兵教育：教育以集中为原则，新兵多则在纵队设新兵大队，少则在支队设新兵排。教育训练至相当时期及有相当程度时，始行补充入连。自训令后务仰转知所属，一体遵行。倘再玩忽乱收不符上述规定者，除否准其补名之伙食外，并处罚其主管长官，决不宽贷。切切此令。"},{"type":"paragraph","text":"军长朱德"},{"type":"paragraph","text":"政治委员毛泽东公历一九三〇年三月二十九日"}],"authors":["毛泽东"],"dates":[{"year":1930,"month":3,"day":29}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":77,"page_end":78},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"588d969a26"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
