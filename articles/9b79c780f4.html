torical-archives/banned-historical-archives8/main/maoquanji9-1.pdf"],"article":{"title":"陕西、甘肃、宁夏各苏区情况","alias":"","parts":[{"type":"paragraph","text":"陕西、甘肃、宁夏各苏区情况"},{"type":"paragraph","text":"（1936年9月4日）"},{"type":"paragraph","text":"陕甘宁苏区，版图颇大，东西长约一千二百余里，南北亦六百里。现有盐池、定边、靖边、安定、安塞、延川、保安、环县、豫旺九城在我手中。各县地形山多、沟深、林稀、水缺、土质松，人户少，交通运输不便，不宜大部队运动，物产一般贫乏，不能供给大军久驻。神木特区，东西长二百余里，南北约三百余里，游击战争颇发展。关中苏区，南界距西安九十里，中部、三原、庆阳等十县的乡村已连成一片，县城非我所有。陕南苏区发展至二十余县，部队约二千人。"},{"type":"paragraph","text":"[1]这是毛泽东和周恩来、彭德怀致朱德、张国焘、任弼时电的主要内容。"}],"authors":["毛泽东"],"dates":[{"year":1936,"month":9,"day":4}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":109,"page_end":109},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9b79c780f4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
