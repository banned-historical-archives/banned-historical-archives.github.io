script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"成都第二師範學校學生在街上張貼標語和工人、居民發生衝突","authors":[],"dates":[{"year":1957,"month":6,"day":12}],"is_range_date":false,"parts":[{"text":"成都第二师范学校学生在街上张贴标语和工人、居民发生冲突","type":"title"},{"text":"新华社成都14日讯         6 月12日晚，成都第二师范学校部分学生到大街张贴标语和工人、居民发生冲突。","type":"paragraph"},{"text":"据悉，事情的缘起是从报上一条消息引起而逐渐发展起来的。6月2日，：文汇报上载有安徽怀远县一个小学教师常金白被农业社干部欧打的消息。这件事引起许多学生的不满，更触发了许多学生不安心専业的思想。6 月6日，校内出现了一篇署名XY Z的人写的文章，文章从社会上不重视小学教师谈起，最后提出：“头可断，血可流，师范不可读”。这篇文章引|起了学生的纷纷议论，各种不同意见的大字报都贴出来了，有的认为文章说得对，有的反对。","type":"paragraph"},{"text":"11日，学生许世昌以“武五”为笔名写了一篇大字报， 鼓动大家为全年12个月的伙食费而斗争。这个关係全校学生切身利益的事立即把所有人的注意力都吸引过来了。","type":"paragraph"},{"text":"原来，中等师范学校学生助学金一年只有十个月(据说内部调整是十一个月)，假期没有，而其他中等专业学校学生的助学金却是十二个月。学生对此颇为不满。12日 中午， 有二十多个学生到盈道街、学道街、蕴市口、春熙路一带张贴标语。标语内容是争取师范学校和专业学校待遇一视同仁，欢迎四川大学学生的支援等。晚饭后，又有一些学生到大街上去贴标语，其中有雨个学生贴的标语内容有“反对叶石部长的胡言乱语”(_上星期六，他们曾听过中共市委宣传部长叶石作的有关劳动教育的报告，他们认为报告不解决问题)。盐市口附近前进铁工厂的工人对学生的这种行动很不满意，认为这是无理骂叶部长，便扯下标语，同时要拉贴标语的学生到派出所去。学生不去，彼此拉扯，发生殴打，最后终于拉到西东大街派出所。消息传回学校后，有一百多学生到西东大街包围了派出所，并呼口号要求惩办凶手，保障人权。派出所当即建议学生派二十名代表到所内座谈。","type":"paragraph"},{"text":"学生接受了派出所的建议。接著由派出所召集的有工人、居民、工会工作者、小学教师、学生代表的座谈会，进行了评理。会上，大家都对学生提意见，都说学生提意见的方式不好，不应该拿到街上来。会上学生承认他们作法不够恰当，有些冲动。最后大家在会上还彼此鼓掌表示团结。座谈会直到深夜才散。","type":"paragraph"},{"text":"学生返校后，大家认为没有解决问题，有的主张联络四川师范学院，初级师范和第一师范等学校一致行动。但初级师范学校和第一师范学校学生都反对他们的作法。","type":"paragraph"},{"text":"目前，学校表面已比较沉寂，但助学金问题仍未解决，学生情绪仍极不安定。(朱实)","type":"paragraph"},{"text":"来源：新华通讯社编：《内部参考》，第2232期，1957年6月16日。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"32d23e4fea"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
