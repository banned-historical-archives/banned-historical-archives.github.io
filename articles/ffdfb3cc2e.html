ical-archives/banned-historical-archives0/main/maoquanji32.pdf"],"article":{"title":"给毛宇居的信","alias":"","parts":[{"type":"paragraph","text":"给毛宇居?的信"},{"type":"paragraph","text":"（1952年7月11日）宇居兄："},{"type":"paragraph","text":"归去后来信均收到，甚慰。有复邹普勋一信，请代转交。接毛泽连的信，六婶病故，他自己又跌断了脚，不知实际情形如何，脚尚有诊好的希望否？他未提到要钱的话，不知他的生活尚过得去否？暇请查明见告。接张有成?兄的信，乡里粮缺猪贱，不知现在好些否？风便望将乡情赐否（告）。为了了解乡间情况，拟待秋收以后邀李漱清、邹普勋二位来京一游，请你征求他们二人意见告我为盼！"},{"type":"paragraph","text":"顺致敬意"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"七月十一日[1]毛宇居，毛泽东的堂兄和少年时的私老师。[2]邹普勋，毛泽东少年时的私同学和邻居。[3]毛泽连，毛泽东的堂弟。[4]六婶，毛泽连的母亲。[5]张有成，毛泽东少年时的朋友。"},{"type":"paragraph","text":"[6]李漱清，湖南湘潭人。辛亥革命前是韶山的进步教员，毛泽东常去他家看书、请教。建国后，曾任湖南省文史研究馆馆员。"}],"authors":["毛泽东"],"dates":[{"year":1952,"month":7,"day":11}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":163,"page_end":163},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ffdfb3cc2e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
