art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"学习雷锋对敌狠深揭狠批“四人帮”","authors":[],"parts":[{"type":"paragraph","text":"南京铁路分局南京西站民兵团在揭批“四人帮”的斗争中，利用墙报、黑板报和学习专栏，大力宣扬雷锋同志憎爱分明，立场坚定，同阶级敌人斗，同资本主义、修正主义斗的英雄事迹；利用座谈会、故事会，大讲雷锋同志对敌狠、对己和的动人故事，号召广大民兵向雷锋同志学习，象严冬一样残酷无情地揭批“四人帮”。这样做，对发动广大民兵积极投入揭批“四人帮”的斗争，起了巨大的鼓舞作用。货运车间武装基干排副排长王勇进学习雷锋，坚持“下班不下岗”，抓紧业余时间写大批判文章，办大批判专栏。到三月初为止，全团办大批判专栏四十二期，漫画二期，召开批判会二百多场，写批判文章近千篇。为了保证运动的胜利进行，他们还进一步加强了站、场的安全保卫工作，派出民兵配合公安机关执勤巡逻，打击了一小撮阶级敌人的破坏活动。（南京警备区报道组）"}],"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5bcf3f1da9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
