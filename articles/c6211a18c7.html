雯"],"dates":[{"year":1984,"month":12,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"广东省博物馆展出“文革”期间的部分查抄物资供失主认领"},{"type":"paragraph","text":"据新华社广州12月12日电　（记者陈婉雯）广东省博物馆从昨天起公开展示在“文化大革命”期间抢救回来尚未找到失主的全部文物共一千六百多件，供失主到场认领。"},{"type":"paragraph","text":"广东省博物馆的工作人员出于对祖国文化遗产的爱护，在“文化大革命”初期曾主动到堆放查抄物品的场地抢救过两批文物；后来又接收了一些单位送来的查抄文物，总共有二千多件。党的十一届三中全会以后，广东省博物馆对已经找到物主的文物做了清退工作。今年11月15日，他们又根据调查得来的线索，通知部分失主前来认领了五百八十三件文物。"},{"type":"paragraph","text":"这次展示的待领文物，大部分是明、清两代的字画。其中有董其昌的字，郑板桥、居巢、居廉的画。现代画家的作品也不少，其中有岭南画派创始人之一高剑父和他的学生黎雄才等人的画。此外，还有战国时代铜剑，汉代铜镜、陶壶，宋代瓷碗，明代古琴等文物。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"广东文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c6211a18c7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
