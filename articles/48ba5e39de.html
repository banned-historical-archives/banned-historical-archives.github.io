":[],"dates":[{"year":1967,"month":9,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京十一日电　新德里消息:印度旁遮普文进步周刊《回忆爱国者报》最近发表文章，严厉谴责苏共修正主义领导集团勾结美帝共同反华，破坏世界革命。它热情歌颂毛主席领导的中国共产党是国际共产主义运动和反修斗争的先锋。"},{"type":"paragraph","text":"文章说:“苏共领导和苏联政府背离马克思列宁主义，抛弃了革命道路，集中力量宣扬非革命的议会斗争形式，从而暴露了它是热衷于修正主义思想和实践的领导集团。”"},{"type":"paragraph","text":"文章说，在苏共第二十次代表大会上，苏联修正主义领导就阴谋使国际共产主义运动背离马克思列宁主义的革命道路。苏修领导在苏共第二十二次代表大会和第二十三次代表大会上沿着修正主义道路进一步滑了下去，并且力图封住国际共产主义运动中抵制它们的修正主义路线的人的嘴巴，恐吓他们，分裂他们，镇压他们。"},{"type":"paragraph","text":"文章热情歌颂中国共产党和伟大的领袖毛主席。它指出:“今天国际共产主义运动中反对现代修正主义的先锋是中国共产党。中国共产党是世界上最大的共产党，在她的领导下，世界上最大的国家中国，正在走马克思列宁主义的革命道路，并且在完成苏联十月革命所没有完成的任务。”"},{"type":"paragraph","text":"“中国今天是国际共产主义革命运动的领袖，是一切反帝斗争的积极支持者。中国在毛泽东同志领导下站在反对苏共修正主义领导集团的队伍的前列。在这场斗争中，中国不仅得到国际共产主义运动中日益壮大的反修力量的支持，而且得到他们的信任。”"},{"type":"paragraph","text":"文章说，中国共产党的反对修正主义的斗争，敲响了苏联修正主义领导集团死亡的丧钟。因此，苏修千方百计要使中国受修正主义的影响，而且全力支持美帝国主义反对中国。今天美帝和苏修都在竭力进行反华的肮脏宣传，妄图孤立和搞垮中国。因此很明显，美帝和苏修完全勾结起来了。"},{"type":"paragraph","text":"文章说，美帝国主义指使一些国家的反动派来包围中国，但是，过去的历史响亮地打击了这些制订包围政策的阴谋家。今后的历史将再次猛烈地打击阴谋包围中国的帝国主义、现代修正主义和各国反动派。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"48ba5e39de"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
