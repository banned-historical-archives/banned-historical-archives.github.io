:[{"year":1950,"month":6,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席欢宴波大使"},{"type":"paragraph","text":"波大使分谒我政府首长"},{"type":"paragraph","text":"【新华社十九日讯】中央人民政府毛泽东主席于十九日下午七时宴波兰驻我国大使布尔金及波兰大使馆全体馆员，应邀作陪者有中央人民政府朱德副主席，刘少奇副主席，李济深副主席，林伯渠秘书长，政务院周恩来总理兼外交部长，我驻波兰大使彭明治，外交部办公厅王炳南主任，阎宝航副主任，中央人民政府典礼局余心清局长，及外交部苏联东欧司伍修权司长，交际处王倬如处长，沈平副处长。"},{"type":"paragraph","text":"波兰共和国驻我国大使布尔金于呈递国书后，曾分谒朱德副主席，李济深副主席，张澜副主席，黄炎培副总理，贸易部叶季壮部长，文化部沈雁冰部长，并访问我驻波兰大使彭明治等。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"朱德","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a2eca0b305"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
