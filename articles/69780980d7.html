{"year":1967,"month":5,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"文化大革命将使我国永不变色"},{"type":"paragraph","text":"班长　才国惠"},{"type":"paragraph","text":"党内最大的走资本主义道路当权派支持反革命修正主义分子彭真抛出《汇报提纲》，妄想扼杀无产阶级文化大革命，在中国复辟资本主义，要中国人民走回头路，吃二遍苦。中共中央的《通知》，就是宣布他们反革命修正主义路线死刑的判决书，表达了七亿中国人民坚决要把社会主义革命进行到底的不可动摇的意志。"},{"type":"paragraph","text":"列宁和斯大林首先在苏联创建了社会主义，但是后来被修正主义分子篡夺了政权，走上了复辟资本主义的道路。在这种情况下，世界上一切真正的马克思列宁主义者，一切真正的革命人民，都在思考这样一个问题：无产阶级夺取政权后，能不能不变颜色？他们仰望着我们伟大领袖毛主席，把希望寄托在社会主义的中国身上。毛主席总结了苏联的历史教训，以最大的勇敢、最大的智慧、最大的魄力、最大的天才，亲自发动和领导了史无前例的、震撼世界的无产阶级文化大革命。中共中央《通知》，是这场大革命的进军号令，指路明灯。国际共产主义运动最大的教训，就是资产阶级偷偷摸摸从意识形态领域入手，实行和平演变，篡夺千百万人流血牺牲建立起来的无产阶级政权。我们伟大的导师毛主席第一个从理论上、路线上、方针上、政策上、实践上解决了无产阶级夺取政权以后永不变色的问题。这是对国际共产主义运动最大的贡献。我国无产阶级文化大革命的胜利，不仅给中国人民，也给世界人民的前途带来无限希望，无限光明。这个胜利不仅是中国人民的伟大胜利，也是世界革命人民的伟大胜利。我们全中国、全世界革命人民共同欢呼这个伟大胜利，庆祝这个伟大胜利。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"69780980d7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
