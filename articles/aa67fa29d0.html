art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"首都三天来百万革命群众愤怒大示威示威群众在英代办处门前庄严表示：有战无不胜的毛泽东思想作武器，有全国七亿人民作后盾，香港同胞反迫害斗争一定会取得最后胜利","authors":[],"parts":[{"type":"paragraph","text":"据新华社十七日讯 首都无产阶级革命派和广大革命群众今天举行更大规模的示威游行，愤怒声讨香港英国当局血腥镇压我香港同胞的法西斯暴行。三天来，前往英国驻中国代办处门前示威的群众已达一百万人。示威的群众庄严地表示：有强大的社会主义祖国作靠山，有战无不胜的毛泽东思想作武器，有全国七亿人民作后盾，香港同胞的反迫害斗争一定会取得最后胜利！"},{"type":"paragraph","text":"连日来，英国驻中国代办处门前怒涛澎湃，首都革命工人、贫下中农、红卫兵、革命师生、革命干部和街道革命群众，潮水般地涌来。到今天晚上，强大的示威游行达到了高潮。在英国代办处门前的墙上，贴满了声讨港英当局法西斯暴行的大字报、大字标语、抗议书和漫画，有的地方贴了五、六层之多。有的群众看到今天报纸上揭露港英当局对被捕的香港同胞进行残酷迫害的消息，更加义愤填膺。他们振臂高呼：“最强烈抗议港英当局的法西斯暴行！”“英国政府必须立即无条件接受中国政府的严正要求！”"},{"type":"paragraph","text":"参加示威游行的红卫兵小将和革命师生强调指出，“学习和宣传毛泽东思想是香港爱国同胞神圣不可侵犯的权利！”“谁反对香港爱国同胞学习和宣传毛泽东思想就打倒谁！”红卫兵小将们指出，香港英国当局为了压制香港同胞学习和宣传毛泽东思想，竟然使用高压手段，我们一千个不答应，一万个不答应！"},{"type":"paragraph","text":"今晚，有二十多个国家和地区的在京国际友人来到英国代办处门前，他们高举着用中文和各国文字写的“打倒英帝国主义”、“强烈谴责英帝罪行”、“支持香港中国工人的正义斗争”等标语牌，并且把一份措词强烈的抗议声明交给了英国代办处的外交官员。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"aa67fa29d0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
