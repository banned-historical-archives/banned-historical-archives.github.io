间管理","authors":[],"dates":[{"year":1958,"month":8,"day":1}],"is_range_date":false,"parts":[{"text":"中共中央通知各地今后三个月狠狠抓好秋粮田间管理","type":"title"},{"text":"在8、9、10三个月内狠狠地抓好秋粮的田间管理，对于保证秋季更大丰收，关系甚大。中 南、西北等地区农业协作会议已经提出口号：在这三个月内省、地、县、区、乡、社六级干部会师一律深入田间，和农民一起，搞好试验田、丰产田、带动农民搞好秋田管理工作，不实现全面大丰收决不离开田间。中央认为这是一项很重要的措施，希望各省、区、市的一切农村工作干部，部分财粮贸干部、政法干部、部分文教干部，尽可能地都仿照这个规定，一律深入田间（可以采取万人检查评比团的形式），尽一切努力，协同农民，及时发现问题，解决问题，保证实现今年全面大丰收，并为明年的更大跃进做好必要的准备工作。","type":"paragraph"},{"text":" 一九五八年八月一日","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"305218a63d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
