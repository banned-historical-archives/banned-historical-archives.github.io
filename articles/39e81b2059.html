rt":5,"page_end":5,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"国家档案局公布第十四世达赖喇嘛为拥护协议事致毛泽东主席的电报","authors":["孙闻"],"parts":[{"type":"paragraph","text":"这份达赖喇嘛于1951年10月发给毛泽东主席的电报全文如下："},{"type":"paragraph","text":"中央人民政府毛主席：今年西藏地方政府特派全权代表噶伦阿沛等五人于1951年4月底抵达北京，与中央人民政府指定的全权代表进行和谈。双方代表在友好基础上已于1951年5月23日签订了关于和平解放西藏办法的协议。西藏地方政府及藏族僧俗人民一致拥护，并在毛主席及中央人民政府领导下积极协助人民解放军进藏部队巩固国防，驱逐帝国主义势力出西藏，保护祖国领土主权的统一，谨电奉闻。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"西藏文革","type":"人物"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"39e81b2059"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
