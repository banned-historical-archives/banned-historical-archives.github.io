script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反对垄断资本的残酷剥削和压迫  英国各行业工人斗争此伏彼起连绵不断","authors":[],"dates":[{"year":1970,"month":1,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反对垄断资本的残酷剥削和压迫"},{"type":"paragraph","text":"英国各行业工人斗争此伏彼起连绵不断"},{"type":"paragraph","text":"新华社伦敦二十一日电　年初以来，英国工人反对垄断资本残酷剥削和压迫的斗争此伏彼起，连绵不断。各行各业的数百万工人采取了罢工、停工、反对加班加点等各种斗争方式来抗议生活费用暴涨和要求增加工资。"},{"type":"paragraph","text":"目前英国全国有二百万职工提出了增加工资的要求，其中包括二十四万铁路工人，三十万邮政工人，二十万地方政府雇用的工人，五万多名海员以及汽车工业工人、化学工业工人、飞机驾驶员和护士等。"},{"type":"paragraph","text":"制造飞机引擎的罗尔斯—劳埃斯公司全国各工厂的一万六千多名工人，十八日拒绝加班，抗议垄断资本家削减三千五百人的计划。"},{"type":"paragraph","text":"与此同时，罗尔斯—劳埃斯公司在英格兰、苏格兰和北爱尔兰的十四家工厂中的五千名雇员和技工也都采取了拒绝加班的行动。布里斯托尔的九百多名飞机制造工人从十三日开始举行罢工，抗议资方裁减工人的计划。工人的罢工沉重地打击了垄断资本。"},{"type":"paragraph","text":"最近两个多星期以来，默尔西河畔的若干码头上的数百名码头工人相继举行罢工，要求增加工资。罢工工人拒绝为货轮装卸货物。在南威尔士的斯旺西，码头工人最近的一次罢工使码头陷于瘫痪。"},{"type":"paragraph","text":"苏格兰因弗戈登炼铝厂的大约七百名建筑工人和怀尔德特·梅勒·布朗利纺织机器厂的大约五百名工人也分别从十二日、十四日开始举行罢工，要求提高工资，抗议生活费用上涨。"},{"type":"paragraph","text":"与此同时，英国许多工厂的工人不顾反动当局的威胁和欺骗，正在坚持斗争。南威尔士国际镍公司克利德赫冶炼厂的八百名加工工人举行的罢工本周已进入第五个月。罢工工人挫败了老板策划的企图迫使工人放弃罢工的一个又一个阴谋。在德文的森特拉克斯，一千五百名工人要求增加工资的罢工斗争已经坚持了十二个星期。罢工工人的正义斗争得到了英格兰中部地区的许多工厂数千名工人的有力支持。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7738aa3f34"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
