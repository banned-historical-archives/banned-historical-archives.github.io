ical-archives/banned-historical-archives0/main/maoquanji30.pdf"],"article":{"title":"对西安市在清理积案中组织罪犯学习《惩治反革命条例》的经验的批语","alias":"","parts":[{"type":"paragraph","text":"对西安市在清理积案中组织罪犯学习《惩治反革命条例》的经验的批语"},{"type":"paragraph","text":"（1951年9月1日）送罗瑞卿同志注意，推广西安办法。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"九月一日"},{"type":"paragraph","text":"[1]这个批语，写在1951年8月31日出版的《内部参考》第一五六号上。这一期《内部参考》报道：西安市在清理积案过程中，组织一批未判决和已判决罪刑的反革命分子进行了一次《惩治反革命条例》的学习，并展开了坦白、检举运动，收效很大，平息了未判决罪犯的情绪波动，使他们认识到人民政府判罪是有根、有据、有凭、有证，是分清轻重、分别对待的。不少未判罪的犯人都拿《惩治反革命条例》第十四条来检查自己，认为这是他们“唯一的出路”。已判决罪刑的反革命分子，经此次学习后，心悦诚服地接受了人民政府对自已的判刑，并且在劳动改造中积极生产。"},{"type":"paragraph","text":"[2]罗瑞卿，当时任中央人民政府公安部部长。"}],"authors":["毛泽东"],"dates":[{"year":1951,"month":9,"day":1}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":478,"page_end":478},"tags":[{"name":"毛泽东","type":"人物"},{"name":"罗瑞卿","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"87e575c0fd"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
