uthors":[],"dates":[{"year":1970,"month":11,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编辑同志:"},{"type":"paragraph","text":"前几天，我们到某剧场去看革命现代沪剧，演出还没有结束，场子里就有一批人乱哄哄地涌向舞台，抢着要看演员。散场后，又有一些人专门等在门口争看演员，甚至要主要演员签字。"},{"type":"paragraph","text":"我们觉得，剧场内外发生的这些现象，是反革命修正主义文艺黑线余毒的表现。对演员吹吹捧捧，那是过去十里洋场上资产阶级腐朽、庸俗的作风。刘少奇、周扬一伙，为了复辟资本主义，在文艺界大搞“三名三高”，大演封、资、修的坏戏，腐蚀文艺工作者，毒害广大工农兵观众。当前，在毛主席革命文艺路线指引下，无产阶级文艺革命正在蓬勃发展。我们去看革命样板戏，是去接受毛泽东思想的教育，更好地向剧中的无产阶级英雄人物学习，而决不能带着资产阶级的思想感情去消遣消遣，去欣赏某个演员。有些人围观“名”演员，留恋他们过去演过的那些封、资、修戏剧中的思想垃圾，这是很危险的，这不仅对文艺工作者的世界观的改造不利，而且自己有了这种资产阶级的坏思想坏作风，就很容易被阶级敌人拉过去，走上邪路。"},{"type":"paragraph","text":"我们希望，各级组织和有关部门的领导，都应该遵照毛主席的教导，突出无产阶级政治，狠抓意识形态领域里的阶级斗争，深入开展革命大批判，彻底肃清反革命修正主义文艺黑线的余毒。"},{"type":"paragraph","text":"三个革命群众"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e37809fa46"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
