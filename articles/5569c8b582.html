ar":1976,"month":9,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"金日成同志和朴成哲同志的贺电北京中国共产党中央委员会第一副主席中华人民共和国国务院总理华国锋同志，中华人民共和国全国人民代表大会常务委员会副委员长吴德同志："},{"type":"paragraph","text":"在中华人民共和国成立二十七周年的时候，我们以朝鲜劳动党中央委员会、朝鲜民主主义人民共和国中央人民委员会、政务院、全体朝鲜人民和我们个人的名义，向你们，并通过你们，向中国共产党中央委员会、全国人民代表大会常务委员会、国务院和兄弟的中国人民，致以最热烈的祝贺和问候。"},{"type":"paragraph","text":"中华人民共和国成立以后，兄弟的中国人民在自己的伟大领袖毛泽东同志和中国共产党的英明领导下，坚决地粉碎了内外敌人的一切阴谋破坏活动，在社会主义革命和社会主义建设中取得了光辉的成就。"},{"type":"paragraph","text":"经过无产阶级文化大革命、批林批孔运动和反击右倾翻案风的斗争，无产阶级专政更加巩固，全国人民的团结得到了加强，落后的旧中国变成了繁荣昌盛的社会主义新中国。"},{"type":"paragraph","text":"今天，中华人民共和国的国际地位空前提高。"},{"type":"paragraph","text":"朝鲜人民对中国人民在新社会的建设中取得的一切成就，象自己的成就一样，感到由衷的高兴，并表示热烈的祝贺。"},{"type":"paragraph","text":"朝中两国人民是战友，是阶级兄弟。我们两国人民在反对共同敌人的长期艰苦的革命斗争中，用鲜血结成了战斗友谊。"},{"type":"paragraph","text":"我们确信，我们两国人民建立在马克思列宁主义和无产阶级国际主义基础上的战斗的友好合作关系，将一如既往，今后也必将在反对帝国主义和争取社会主义事业胜利的共同斗争中得到进一步巩固和发展。"},{"type":"paragraph","text":"借此机会，我们衷心祝愿兄弟的中国人民紧密地团结在中国共产党的周围，遵照毛泽东同志的遗志，以阶级斗争为纲，深入开展批判邓小平的修正主义路线、反击右倾翻案风的斗争，高度发扬独立自主、自力更生的革命精神，在把本国建设成为强大的社会主义国家的斗争中和在解放台湾、统一全中国的事业中，取得更大的胜利。"},{"type":"paragraph","text":"朝鲜劳动党中央委员会总书记"},{"type":"paragraph","text":"朝鲜民主主义人民共和国主席  金日成"},{"type":"paragraph","text":"朝鲜民主主义人民共和国政务院总理　朴成哲"},{"type":"paragraph","text":"一九七六年九月三十日于平壤"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"批林批孔","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5569c8b582"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
