刘少奇信","authors":["毛泽东"],"dates":[{"year":1950,"month":6,"day":4}],"is_range_date":false,"parts":[{"text":"毛泽东关于修改土地改革问题的报告给刘少奇信","type":"title"},{"text":"毛泽东","type":"authors"},{"text":"少奇同志：","type":"appellation"},{"text":"此件看过，很好，很有用。有些修改，请再酌。说富农的部分长了，反而不清楚，有些则说得不大适当，故删去一大部。加上一九四六年以后一段经验，借以纠正一部分同志已经有了的一种错觉，说过去的“左”倾错误是一九四七年十月十日土地法大纲上规定了没收富农多余土地财产的原故。如果没有这段说明，则不能纠正此种错觉。","type":"paragraph"},{"text":"所谓生产力，是指劳动者和生产资料（亦称生产手段）两部分。所谓生产资料，在农村中，首先是土地，其次是农具、牲畜、房屋等。粮食是农民利用生产资料生产出来的生活资料。我们将从地主手里没收的粮食亦和其他被没收的东西列在一起称为生产资料也是可以的，因为这种粮食具有资金的性质。所谓生产关系，是指人们对生产资料的所有关系，即财产的所有权关系。生产资料的使用，例如农民使用（租用）地主的土地，只是地主对于土地的所有关系的结果，这种所有关系表现为佃农对地主的隶属关系（人与人的关系），即是生产关系。过去许多同志在这个问题上犯了二元论（甚至是多元论）的错误，将生产关系和使用关系并列，又将生产资料与生活资料并列，作为划分阶级的标准，把问题弄得很糊涂，划错了许多人的阶级成分。曾于一九四七年冬季叫乔木写了一个文件，题为《中国各社会阶级及其待遇的规定》，其前面两章是我写的，说明了这个问题，可以参看。","type":"paragraph"},{"text":" 毛泽东六月四日下午","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"77b3588c54"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
