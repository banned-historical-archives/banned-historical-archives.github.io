rt":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"伟大的导师 伟大的领袖 伟大的统帅 伟大的舵手毛主席万岁！首都军民和在京外国朋友参观《毛主席是我们心中的红太阳》影展","authors":[],"parts":[{"type":"paragraph","text":"红日东升，朝霞万丈。毛主席啊，您是我们伟大的导师，伟大的领袖，伟大的统帅，伟大的舵手，您是我们心中最红最红的红太阳。我们永远沿着您指引的方向前进，让战无不胜的毛泽东思想伟大红旗插遍全球，永远高高飘扬。"},{"type":"paragraph","text":"红小兵，心最红，热爱伟大领袖毛泽东；誓作无产阶级革命事业的接班人，革命路上打先锋。 本报记者摄"},{"type":"paragraph","text":"毛泽东，您是英明的舵手，指引我们向前；您是指路明灯，照亮我们前进的航程。"},{"type":"paragraph","text":"您教导我们：“枪杆子里面出政权”。您给我们送来智慧、力量和勇敢。我们要拿起枪杆，大造帝国主义的反，大造殖民主义的反。我们要把乌云驱散，让大地日月换新天。 人民日报供稿"},{"type":"paragraph","text":"四海翻腾云水怒，五洲震荡风雷激。伟大的毛泽东思想，照亮了全世界被压迫人民革命斗争的道路。 人民日报供稿"},{"type":"paragraph","text":"伟大统帅毛主席，革命战士永远忠于您。我们要永远读您的书，永远听您的话，永远按照您的指示办事，永远做您的好战士。谁敢反对我们心中的红太阳，谁敢反对伟大的毛泽东思想，我们就坚决和他拚到底。 本报记者摄（照片）"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"74b50ea26f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
