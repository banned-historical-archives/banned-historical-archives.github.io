s":["邓小平"],"dates":[{"year":1966,"month":6,"day":28}],"is_range_date":false,"parts":[{"text":"邓小平对北京师大女附中工作组的指示","type":"title"},{"text":"邓小平","type":"authors"},{"text":"卓琳：","type":"appellation"},{"text":"对他们（指李××、梁××、王××等人）不管不好，这样会使他们越来越往那边跑。","type":"paragraph"},{"text":"邓小平：","type":"appellation"},{"text":"可以和他们展开辩论，规模不要大，但也要有力量，让那些争取过来的人也参加辩论。","type":"paragraph"},{"text":"要以理服人，不能压服人。开会之前要做充分的准备，不打无准备之仗。不要骂他们，不要让他们站着低头，要和他们说理。","type":"paragraph"},{"text":"慢慢要把党团组织逐渐恢复起来。在团内也可以受教育，可以过组织生活，宣传党的政策和毛泽东思想。左、中、右都让参加，都受教育，右派不来，正好暴露自己。可以改组团组织。","type":"paragraph"},{"text":"传达雪峰同志的报告要分步骤，先给骨干后给党团员，对不同的人讲得内容不要一样。对一般人只讲政策，不讲策略。","type":"paragraph"},{"text":"不做老师的工作将来谁教课？要吸收教师参加革命委员会，现在你们最大的弱点，就是老师中没有左派，老师这方面的工作差。老师的工作也应让学生去做。老师中一个积极分子也没有怎么行呢？要向老师交代政策，他们都怕，不知那天就会斗到自己，怕揭露和自己有关的事情挨骂，帽子越戴越大，要再三向他们讲政策。","type":"paragraph"},{"text":"有很多人听了就揭露东西了。要争取老师，老师绝大多数还是好的，大量的是中间派，要团结他们，让他们革命，讲政策的目的是要分化他们，使他们中的一些人觉悟，消除顾虑，团结多数。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b17959c5bc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
