script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"解放军运动会举行第二次航空表演  董必武邓小平等国家领导人出席观看","authors":[],"dates":[{"year":1959,"month":5,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"解放军运动会举行第二次航空表演"},{"type":"paragraph","text":"董必武邓小平等国家领导人出席观看"},{"type":"paragraph","text":"新华社17日讯　中国人民解放军第二届体育运动大会今天在北京西郊机场举行第二次航空表演，答谢首都人民对这次运动大会的关怀和帮助。"},{"type":"paragraph","text":"中华人民共和国副主席董必武、国务院副总理邓小平、薄一波、陆定一、罗瑞卿，全国人民代表大会常务委员会副委员长李济深、黄炎培、李维汉，政协全国委员会副主席康生，最高人民检察院检察长张鼎丞，国防委员会副主席林彪元帅、程潜、中国人民解放军各军种、各兵种首长等，出席观看了今天的表演。观看表演的还有中央国家机关北京市各部门和各民主党派、各人民团体的负责人，首都各界人民代表和中国人民解放军陆、海、空军将领和广大官兵代表等共六万多人。"},{"type":"paragraph","text":"各国驻华外交使节也应邀出席观看了表演。"},{"type":"paragraph","text":"上午九时，三架悬挂五星红旗和“八一”军旗的初级教练机排成品字队形飞过机场低空，表演正式开始。接着，人民空军的四架直升飞机给观众表演了垂直着陆、起飞、横侧飞行等动作。人民空军某部的跳伞运动员们表演了花样跳伞、综合跳伞、特技跳伞、飞伞和空降兵跳伞，以及滑翔机表演。随后，喷气歼击机表演高级特技和复杂特技以及空中对地靶射击。这些精彩的表演，不断获得全场观众热烈的掌声。"},{"type":"paragraph","text":"十一时，三架教练机载着彩带低空掠过机场，表演结束。人民解放军空军部队和航空运动员们高超的技能和强大的威力，在首都六万多观众心中，留下了深刻的印象。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"83c69e6cbc"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
