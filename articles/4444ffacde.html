script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中央关于处理资产阶级分子的党籍和工会会籍问题的批示","authors":[],"dates":[{"year":1961,"month":9,"day":26}],"is_range_date":false,"parts":[{"text":"中央关于处理资产阶级分子的党籍和工会会籍问题的批示","type":"title"},{"text":"现将中央组织部和中央统战部“关于处理已经加入党和工会的资产阶级分子的党籍和会籍问题的几点意见”发给你们，请参照执行。这次的审查和处理工作。最后应当汇集报省、市、区党委核准，今后望注意。不要吸收领定息或有其他剥削的分子和商人入党。","type":"paragraph"},{"text":"中央组织部、中央统战部关于处理已经加入党和工会的资产阶级分子的党籍和会籍问题的几点意见","type":"subtitle"},{"text":"根据若干地区的反映：在公私合营高潮前后，特别是一九五八年以来，有一些资产阶级分子加入了工会、少数人加入了党。这些人多数属于小资本家，大、中资本家则是极少数。在他们当中、少数人是由于隐藏历史和成份混入的。多数人则是由于我们某些干部的阶级观点模糊或者政策界限不明，把他们吸收进来的。有些人则是由于具备了党员和会员条件，而参加了党和工会的。他们加入党和工会后。政治思想表现也各有不同，多数表现尚好，有不同程度的进步。少数表现不好。做坏事的，是极少数。鉴于情况的复杂,对于已经加入党和工会的资产阶级分子的党籍和会籍问题的处理，应当采取严肃认真的态度，又要采取区别对待的方针。","type":"paragraph"},{"text":"一、党是工人阶级的先锋队。应该保持高度的纯洁性。接收党员必须严格。对于已经入党的资产阶级分子，凡属隐瞒历史和成份混入党内的。或者入党后有破坏活动的，应一律开除。不符合党员条件的。也应该劝其退党。确实具备党员条件并且确实未领取定息的， 则可保留其党籍。","type":"paragraph"},{"text":"二、工会是工人阶级的群众性组织，处理已入会的资产阶级分子的会籍问题，应该比党组织处理其党籍问题宽一些．只要不是隐瞒历史和成份、只要入久会没有严重违法乱纪或者进行破坏活动。并且不再继续领取定息的、就是表现稍为落后一些，都应当保留会籍，加强对他们的教育和改造。","type":"paragraph"},{"text":"三、各地对这一问题、 要先进行调查摸底，分别不同情况，慎重处理、处理时需报经县、区以上党委审批。在处理过程中，必须重视 政治思想工作，切勿简单从事。","type":"paragraph"},{"text":"四 、对于清理出党和工会的资产阶级分子，企业党组织和工商业联合会仍然要加强对他们的教育改造。","type":"paragraph"},{"text":"五、吸收资阶级分子参加党和工会，实际上就是改变了他们的的阶级成分。因此，今后对待他们参加党和公会的问题，应当按照党章和工会章程办事。","type":"paragraph"},{"text":"以上意见如中央以为可行，请批转各级党委参照执行。","type":"paragraph"},{"text":" 一九六一年九月十六日","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4444ffacde"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
