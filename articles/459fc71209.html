,"dates":[{"year":1953,"month":10,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"祝贺德意志民主共和国成立四周年"},{"type":"paragraph","text":"毛泽东主席致皮克总统电"},{"type":"paragraph","text":"德意志民主共和国总统威廉·皮克同志亲爱的总统同志："},{"type":"paragraph","text":"值此德意志民主共和国成立四周年之际，我代表中国人民、中华人民共和国政府并以我个人名义，谨向爱好和平的全德人民和您本人致以最衷心的祝贺。"},{"type":"paragraph","text":"中国人民怀着十分愉快的心情注视着德意志民主共和国过去四年中在政治、经济、文化各方面所获得的成就。德国人民在苏联的援助下反对国际反动势力挑衅的斗争中所取得的胜利，以及苏联政府和德意志民主共和国政府代表团在莫斯科会谈中所获得的重大成果，对于巩固欧洲和平和全世界的和平事业是一个巨大的贡献。"},{"type":"paragraph","text":"祝德国人民在争取建立一个统一、独立、民主和爱好和平的德国的光荣事业中获得更大的胜利。德国人民在这个事业中将永远得到中国人民和中国政府深厚的同情和全力的支持。"},{"type":"paragraph","text":"中华人民共和国中央人民政府主席毛泽东一九五三年十月五日于北京"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"459fc71209"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
