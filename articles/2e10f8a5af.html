的通知","authors":[],"dates":[{"year":1963,"month":1,"day":14}],"is_range_date":false,"parts":[{"text":"中共中央关于在社会主义教育运动中严禁打人的通知","type":"title"},{"text":"各中央局，各省、市、自治区党委，西藏工委：","type":"appellation"},{"text":"根据许多地区的材料反映，在农村社会主义教育运动中，有些地方发生打人和乱搞斗争等违法乱纪现象。这件事应该引起全国各地党组织的严重注意。请各地的县一级以上党委，立即进行一次检查，并且采取有效措施，坚决防止纠正。","type":"paragraph"},{"text":"中央已经多次指出，不仅在人民内部的教育运动中，绝对不允许采取打人、罚跪、捆、吊这类粗暴办法，对于有违法行为的地主、富农和贪污盗窃分子、投机倒把分子等，也应该依法惩处，而不要用打人等办法对待。","type":"paragraph"},{"text":"凡是已经发生打人现象的地方，由上级党委负责，进行严肃的处理。对犯有这种错误的人，特别是领导干部，应该责令认真检讨，情节严重恶劣的，给以必要的纪律处分，并且向群众进行适当的解释，消除群众的怀疑误会。","type":"paragraph"},{"text":"现在将中央办公厅《情况简报》第472号摘录刊载的湖南、湖北的两个材料发给你们参阅。","type":"paragraph"},{"text":" 中央一九六三年一月十四日","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]},{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共中央关于在社会主义教育运动中严禁打人的通知","authors":[],"dates":[{"year":1963,"month":1,"day":14}],"is_range_date":false,"parts":[{"text":"中共中央关于在社会主义教育运动中严禁打人的通知","type":"title"},{"text":"各中央局，各省、市、自治区党委，西藏工委：","type":"appellation"},{"text":"根据许多地区的材料反映，在农村社会主义教育运动中，有些地方发生打人和乱搞斗争等违法乱纪现象。这件事应该引起全国各地党组织的严重注意。请各地的县一级以上党委，立即进行一次检查，并且采取有效措施，坚决防止纠正。","type":"paragraph"},{"text":"中央已经多次指出，不仅在人民内部的教育运动中，绝对不允许采取打人、罚跪、捆、吊这类粗暴办法，对于有违法行为的地主、富农和贪污盗窃分子、投机倒把分子等，也应该依法惩处，而不要用打人等办法对待。","type":"paragraph"},{"text":"凡是已经发生打人现象的地方，由上级党委负责，进行严肃的处理。对犯有这种错误的人，特别是领导干部，应该责令认真检讨，情节严重恶劣的，给以必要的纪律处分，并且向群众进行适当的解释，消除群众的怀疑误会。","type":"paragraph"},{"text":"现在将中央办公厅《情况简报》第472号摘录刊载的湖南、湖北的两个材料发给你们参阅。","type":"paragraph"},{"text":" 中央一九六三年一月十四日","type":"paragraph"},{"text":"(根据中央文件翻印件打印)","type":"appellation"}],"comments":[],"origin":"根据中央文件翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2e10f8a5af"},"buildId":"3k8CSiaVLD8fQh
