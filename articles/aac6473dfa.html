s":[{"year":1967,"month":8,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"文化大革命的丰硕成果  山东化肥工业飞速发展"},{"type":"paragraph","text":"山东省化学肥料生产战线上的广大革命职工和革命干部，在无产阶级文化大革命中彻底批判了中国赫鲁晓夫及其在山东代理人对发展化肥工业的种种阻挠和破坏，使全省化肥工业建设沿着毛主席的革命路线飞速发展。这个省从一九五八年开始筹建化肥工厂，到一九六四年底，只有两处建成投入生产；而一九六六年一年内新建成并投入生产的小型化肥厂就有七个，今年全省又有十六个化肥厂开工兴建，目前有的已建成投入生产，有的接近建成。这些新建化肥厂的生产能力，相当于一九六四年全省氮肥总产量的二十八倍左右。这是毛泽东思想的伟大胜利，是无产阶级文化大革命的丰硕成果！（据新华社讯）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"山东文革","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"aac6473dfa"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
