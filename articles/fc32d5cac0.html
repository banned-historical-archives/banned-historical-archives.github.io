s":[],"dates":[{"year":1979,"month":11,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"要做遵纪守法的带头人"},{"type":"paragraph","text":"广州部队某团指战员学习叶剑英同志讲话见效果"},{"type":"paragraph","text":"据新华社广州十一月二十四日电  人民解放军广州部队某团干部、战士学习叶剑英同志的国庆讲话，批判林彪、“四人帮”鼓吹的无政府主义和极端个人主义，划清社会主义民主与极端民主化的界限。指战员们说，发扬社会主义民主和健全社会主义法制，就是要既保障民主，又保障集中；既保障自由，又保障纪律；既保障个人心情舒畅，又保障统一意志。社会上那种只要民主，不要集中，只要自由，不讲纪律，甚至捣乱闹事，破坏安定团结的人，是极端错误的。我们要正确处理个人利益与国家利益、局部利益与整体利益的关系，做安定团结的促进派，遵纪守法的带头人，为保卫祖国，建设四化多做贡献。"},{"type":"paragraph","text":"这个团参加过对越自卫还击作战。干部、战士们深深感到，坚决维护党的集中统一领导和加强纪律性，对于保证战斗胜利有着决定的意义。学习叶剑英同志的国庆讲话时，他们联系林彪、“四人帮”煽动无政府主义造成的恶果，进一步认清了无政府主义的危害。他们说，四个现代化是全国人民宏伟壮丽的事业，进行四化建设，需要忘我的革命精神、高度集中统一的领导和铁的纪律！破坏社会秩序、生产秩序和工作秩序，是违背全国人民的根本利益的。"},{"type":"paragraph","text":"最近，这个团有一批在对越自卫还击作战中光荣负伤的战士要退出现役，回到农村。他们愉快地服从领导上的安排，决心到农村为四化作出贡献。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"林彪","type":"人物"},{"name":"四人帮","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fc32d5cac0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
