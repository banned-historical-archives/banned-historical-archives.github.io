script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反对垄断资产阶级残酷剥削和压迫  意大利二百五十万工人举行罢工  法国巴黎工人坚持斗争市内交通连续四天陷于混乱","authors":[],"dates":[{"year":1969,"month":9,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反对垄断资产阶级残酷剥削和压迫"},{"type":"paragraph","text":"意大利二百五十万工人举行罢工"},{"type":"paragraph","text":"法国巴黎工人坚持斗争市内交通连续四天陷于混乱"},{"type":"paragraph","text":"据新华社二十日讯  罗马消息：意大利广大工人反对垄断资产阶级残酷剥削的斗争烈火越烧越旺，参加罢工斗争的工人已从上周的将近二百万增加到二百五十万。"},{"type":"paragraph","text":"意大利垄断资产阶级为了应付国内外市场上日益激烈的竞争，正极力压低工人的工资，加强对工人阶级的剥削。他们的这种罪恶行径，受到意大利广大工人的坚决反击。目前斗争正在迅速发展。"},{"type":"paragraph","text":"意大利一百多万冶金和机器制造业工人，和将近一百万建筑工人，在上周举行全国性的大罢工以来，继续在坚持斗争。国营冶金和机械制造业的三十万工人，以及化学、制药、水泥等行业工人本周也参加罢工斗争的行列。"},{"type":"paragraph","text":"在意大利北部的工业中心都灵，四十万工人十九日举行了二十四小时大罢工，使这个地区的机械制造企业全部陷于瘫痪状态。热那亚的冶金和机械制造工人也举行了罢工。"},{"type":"paragraph","text":"与此同时，意大利人民反对生活费用上涨的群众斗争也在蓬勃地向前发展。在意大利中部的大城市佛罗伦萨，各行各业的工人十九日举行总罢工，抗议房租昂贵。这次总罢工使佛罗伦萨的全部工厂、商店、银行被迫关门，公共交通停顿，报纸停止出版。数千工人和市民还举行了示威游行和抗议集会。同一天，在意大利南部的萨勒诺，工人们也举行了总罢工。"},{"type":"paragraph","text":"据新华社巴黎十九日电　法国工人反对垄断资本集团残酷剥削和压迫的斗争，正在继续发展。"},{"type":"paragraph","text":"在三万二千名铁路工人罢工八天以后，巴黎的地下铁道和公共汽车的司机十六日也开始罢工，到十九日，罢工仍在继续。巴黎的市内交通已经连续四天陷于一片混乱。"},{"type":"paragraph","text":"法国国内航空公司的地勤人员十七日罢工二十四小时。十九日，这个公司在巴黎奥利机场的一千名地勤人员又罢工四十八小时。"},{"type":"paragraph","text":"法国其他城市的工人也展开罢工斗争。大西洋沿岸城市圣纳泽尔的大西洋造船厂的一个工厂的工人，十八日举行罢工。十九日，五百名罢工工人还冲进了这个工厂管理部门的办公室，要求增加工资。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"184cd626ca"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
