ical-archives/banned-historical-archives0/main/maoquanji36.pdf"],"article":{"title":"在一份反映江苏省农村宰杀耕牛情况严重的材料上的批语","alias":"","parts":[{"type":"paragraph","text":"在一份反映江苏省农村宰杀耕牛"},{"type":"paragraph","text":"情况严重的材料上的批语"},{"type":"paragraph","text":"（1955年12月4日）陈云同志："},{"type":"paragraph","text":"此件中江苏一条消息请看一下。这个问题，请在研究曾希圣提出的问题的时候，全面地研究一下，替中央起草一个回答曾希圣并告各地的电报，能在一星期内外，写好发出就好。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十二月四日[1]陈云，当时任中共中央书记处书记、国务院副总理。"},{"type":"paragraph","text":"[2]指新华社1955年12月3日编印的《内部参考》第二三九期上刊载的《江苏省农村宰杀耕牛现象严重》的消息。其中说，江苏省各地宰杀耕牛数字惊人，省畜产公司今年以来收购的牛皮比去年增加50%。据了解，这些耕牛中，有许多还能耕种。各地滥杀耕牛的原因是：一、农业合作社在处理耕牛入社问题上对老牛、小牛的报酬压得过低。二、对宰杀耕牛的审批制度执行不严格，很多地区经兽医检查后由区文书盖章就可以宰杀。三、价格政策有毛病，死牛比活牛的价钱还高。"},{"type":"paragraph","text":"[3]曾希圣，当时任中共安徽省委书记。"}],"authors":["毛泽东"],"dates":[{"year":1955,"month":12,"day":4}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":95,"page_end":95},"tags":[{"name":"毛泽东","type":"人物"},{"name":"陈云","type":"人物"},{"name":"曾希圣","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8761fe5530"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
