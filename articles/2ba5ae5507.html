tart":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"《毛泽东手书选集》出版江泽民总书记题写书名","authors":[],"parts":[{"type":"paragraph","text":"这套书选入毛泽东手迹两千多幅，是从浩繁的中央档案馆馆藏毛泽东手迹中，精选、汇编而成，新篇幅占百分之七十以上，相当部分是世所罕见的书法珍品。如此全面系统地发表毛泽东手书真迹，尚属首次。"},{"type":"paragraph","text":"全书共十卷：第一卷自作诗词，第二卷题词、题字；第三、四卷书信；第五、六卷文稿、电稿；第七、八卷批注、札记；第九、十卷古诗词。为了便于阅读，全部手迹都附印了释文；有的还作了必要的考证和校订。"},{"type":"paragraph","text":"毛泽东自青少年时代就酷爱书法。此后，无论是在戎马倥偬的战争年代，还是在日理万机的建设时期，他都没有停止过对书法艺术的实践和研究。特别是建国以后，经过广收博览，在融汇历代名家之长的基础上，更加发展了具有鲜明特征的书法艺术，深受专家推崇和群众喜爱。"},{"type":"paragraph","text":"薄一波同志为这套书的出版发行发来了贺信。全国政协副主席赵朴初和中央、北京市有关部门负责同志出席了这套书的出版座谈会。大家在发言中认为，这套书比较全面系统地展现了毛泽东书法艺术的发展历程，展现了毛泽东书法的巨大魅力和光辉成就。他的手迹不仅是书法艺术之瑰宝，而且许多都是革命历史的重要记录。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2ba5ae5507"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
