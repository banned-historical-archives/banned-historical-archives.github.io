art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"陆定一薄一波叶剑英等同志观看话剧《女飞行员》和《赤道战鼓》","authors":[],"parts":[{"type":"paragraph","text":"本报讯 中共中央政治局候补委员、国务院副总理陆定一，中共中央委员、国防委员会副主席叶剑英，十三日晚观看了空军政治部文工团话剧团演出的五幕六场话剧《女飞行员》。"},{"type":"paragraph","text":"观看演出的还有粟裕、李天佑、周希汉等同志。"},{"type":"paragraph","text":"空军政治部主任黄玉昆陪同观看了演出。"},{"type":"paragraph","text":"演出结束后，陆定一、叶剑英同志等登台同演员一一握手。"},{"type":"paragraph","text":"本报讯 中共中央政治局候补委员、国务院副总理薄一波，中共中央委员、国防委员会副主席叶剑英，在十日、十四日先后观看了海军政治部文工团话剧团演出的七场话剧《赤道战鼓》。"},{"type":"paragraph","text":"观看演出的还有王树声、李卓然、赖传珠、刘震等负责同志。"},{"type":"paragraph","text":"陪同观看演出的有海军政治委员苏振华、副政治委员杜义德。"},{"type":"paragraph","text":"演出结束后，薄一波、叶剑英同志走上舞台同演员们一一握手。RW：陆定一；观看叶剑英；观看薄一波；观看"}],"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"薄一波","type":"人物"},{"name":"陆定一","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"feefcea5f5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
