s":[{"year":1992,"month":4,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"64米22于文革又刷新铁饼亚洲纪录"},{"type":"paragraph","text":"本报北京4月18日讯　今天，国家集训队的于文革在北京地区春季田径邀请赛第2天的比赛中，第一次投掷就以64米22的成绩打破了64米的男子铁饼亚洲纪录。"},{"type":"paragraph","text":"原纪录是4月11日由他本人在北京地区优秀运动员田径赛上创造的。"},{"type":"paragraph","text":"于文革来自湖南，今年26岁，是我国目前很有实力的投掷选手。他在去年8月北京地区秋季田径邀请赛、今年4月北京地区优秀运动员田径赛以及这次田径邀请赛上，半年多时间里3破亚洲纪录，充分显示了自己的潜力。"},{"type":"paragraph","text":"赛后，于文革说：创造亚洲纪录我非常高兴，这个成绩相当于世界第六七名的水平，我将加紧刻苦训练，争取在巴塞罗那奥运会上取得好成绩。　（李长云）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8127f73c93"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
