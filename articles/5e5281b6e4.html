wn","files":[],"article":{"title":"中共中央组织部关于确定党的秘密外围组织成员各类中等学校学员计算参加革命工作时间有关问题给湖北省委组织部的答复","dates":[{"year":1984,"month":6,"day":5}],"is_range_date":false,"authors":["中共中央组织部"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"中共山西省委组织部, 干审工作文件选编, 78-79","tags":[{"name":"湖北","type":"主题/事件"},{"name":"老干部","type":"主题/事件"},{"name":"外围","type":"主题/事件"},{"name":"组织","type":"主题/事件"}],"parts":[{"type":"title","text":"中共中央组织部关于确定党的秘密外围组织成员各类中等学校学员计算参加革命工作时间有关问题给湖北省委组织部的答复*"},{"type":"subtitle","text":"厅字〔84〕13号"},{"type":"paragraph","text":"中共湖北省委组织部："},{"type":"paragraph","text":"转去武汉新华书店来函一件。凡我部《关于确定党的秘密外围组织、进步团体及三联书店成员参加革命工作时间的通知》（组通字〔83〕34号）规定以外的组织、团体，我们正在调查研究之中，在没有新的规定之前，暂不能计算参加革命工作时间。请你们答复来函单位。"},{"type":"paragraph","text":"另外，按照《关于建国前我党开办的华北人民革命大学、延安中学等校学员参加革命工作时间问题的通知》（组通字〔83〕49号）的规定，建国前我党开办的各类中等学校，均不能按短期训练班性质的干部学校计算其学员的参加革命工作时间；在短期训练班性质的干部学校学习后，没有"},{"type":"paragraph","text":"立即分配工作，而是转入正规学校学习的，其参加革命工作时间不能从入短期训练班性质的干部学校时算起，凡与规定不符的，应予以改正。"},{"type":"paragraph","text":"中共中央组织部办公厅"},{"type":"paragraph","text":"一九八四年六月五日"},{"type":"paragraph","text":"（晋组字〔1984〕45号文件转发）"},{"type":"paragraph","text":"*标题是编者加的"}],"alias":""},"tags":[{"name":"湖北文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5e5281b6e4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
