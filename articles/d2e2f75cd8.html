952,"month":7,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"蔡本发"},{"type":"paragraph","text":"我五岁时，父死后，家中吃不饱、穿不暖。我母亲领带我们讨饭生活，很苦。到十岁，帮地主家放牛，做到十七岁，到上海卖大饼油条。到十八岁，我在工厂里做工，十九岁到日晖港做工，受了很多气，又被剥削，天天做工，吃不饱，穿不暖。解放了，我们工人翻了身，工人当家作主人，现在得了红旗，心中很高兴不得了。我现在体会到，在过去想不到给我们来学文化，现在给我们劳保享受，又被选上了工会委员。我一定好好为人民服务，感谢毛主席和共产党。"},{"type":"paragraph","text":")原文写错两个字("}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d2e2f75cd8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
