指示","authors":[],"dates":[{"year":1967,"month":4,"day":15}],"is_range_date":false,"parts":[{"text":"中央文革小组关于安徽合肥四月十六日开追悼大会的问题的指示","type":"title"},{"text":"安徽省合肥市工人一司并请转告各革命组织：","type":"appellation"},{"text":"一、你们要在四月十六日召开十万多人的追悼大会，我们认为这样的追悼大会不宜召开，我们不赞成你们开，现在全国正在集中批判党内最大的走资本主义道路的当权派，不能转移斗争大方向，请你们立即说服各革命组织，不要举行这样大规模的追悼大会。","type":"paragraph"},{"text":"二、我们建议：安徽省无产阶级革命派应该注意紧紧掌握斗争大方向，把斗争的矛头指向安徽省最大的走资本主义道路的当权派李葆华，决不能把斗争的矛头指向人民解放军。","type":"paragraph"},{"text":" 中央文革小组一九六七年四月十五日","type":"paragraph"}],"comments":[],"origin":"原载北京化工学院毛泽东思想宣传员 《无产阶级文化大革命文件汇编 [第二集]》，北京：1967年9月","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"中央文革","type":"人物"},{"name":"安徽文革","type":"人物"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"636c2f83e9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
