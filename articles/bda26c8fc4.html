tart":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东国防现代化建设思想","authors":["张纯明傅振龙"],"parts":[{"type":"paragraph","text":"在8月中旬于大连召开的全军毛泽东军事思想学术讨论会上，军事科学院毛泽东军事思想研究所的高铁军同志提出，毛泽东同志的国防现代化建设思想，虽然散见于他的一些论述和讲话中，但内容相当丰富，其核心思想是强调要走符合中国国情的国防现代化建设的道路。高铁军认为，毛泽东国防现代化建设的思想主要表现在这样几个方面：依据国际形势和国内环境的特点，确立国防现代化建设的基本原则的思想；发展常规武器和尖端武器、建设军队与强化民兵、以我为主发展军事理论和学习外国先进经验等方面坚持“两条腿”走路的思想；依靠本国力量建立、完善中央和地方两级国防工业、国防科技体系的思想；正确处理国防建设与国家建设关系的思想。成都军区司令部的刘忠信同志认为，在毛泽东同志的关于国防现代化建设的思想中，还包含着内容丰富却未条理化的关于现代国防的开放思想。他认为，这一思想从毛泽东同志的许多有关论述和我军在几十年的战斗，历程中，从我军通过不断与外界进行能量、物质和信息的交换而逐渐发展壮大的历史事实中可以得到证明。毛泽东同志曾经指出，在国防建设上“中国无论何时也应以自力更生为基本立脚点。但中国不是孤立也不能孤立，中国与世界紧密联系的事实，也是我们的立脚点，而且必须成为我们的立脚点。”刘忠信在文中写道，毛泽东的开放思想，是他运用马克思主义研究中国社会的实际问题和对中国近代史进行反思的结果。这种思想的主要内容有：战时实行正确的联盟——与外界进行能量交换；引进外国先进的武器装备——与外界进行物质交换；借鉴外国先进的军事思想——与外界进行信息交换等。 （张纯明、傅振龙）"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"name":"世界形势","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bda26c8fc4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
