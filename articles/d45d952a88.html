"authors":[],"dates":[{"year":1966,"month":2,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"阿根廷报纸谴责苏联修正主义者出卖世界革命利益"},{"type":"paragraph","text":"苏共新领导力图为美帝侵越开脱罪行"},{"type":"paragraph","text":"新华社十四日讯　布宜诺斯艾利斯消息：阿根廷《人民民主报》最近发表文章指出，帝国主义的扩张政策是帝国主义本身发展的结果，“美帝国主义的目的是要建立一个有史以来最大、最强和最血腥的政治和经济的帝国”。"},{"type":"paragraph","text":"文章谴责苏联修正主义者在越南问题上“为美帝国主义开脱罪行”。它指出，越南正在进行一场反对美国侵略者的人民战争。要越南同侵略者进行谈判将意味着“使没有理由呆在那里的人合法地赖在那里”。这还主要意味着要越南人民“放下人民革命战争的旗帜、背叛越南人民的事业”，并且“给那只被围困在越南土地上的野兽以喘息的机会”。"},{"type":"paragraph","text":"文章指出，美国佬或者是无条件撤出越南，或者是被消灭在那里，第三条道路是没有的。"},{"type":"paragraph","text":"文章说，赫鲁晓夫的继承者同他们的前任没有任何区别，所不同的是：苏共新领导“实际上始终不渝地执行牺牲世界革命利益而向美帝国主义投降并同它合作的政策，但是却动人地高喊‘声援’各国人民的斗争”。文章最后指出，美国在越南问题上的“和平攻势”必将失败。“人民革命战争表明了它是被压迫人民和民族为了粉碎帝国主义和新老殖民主义桎梏所必经的唯一道路。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"人民战争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d45d952a88"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
