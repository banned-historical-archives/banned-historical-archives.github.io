/13.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/c21f8808-2334-4e60-a047-27a52e8adbce/14.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/c21f8808-2334-4e60-a047-27a52e8adbce/15.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/c21f8808-2334-4e60-a047-27a52e8adbce/16.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/c21f8808-2334-4e60-a047-27a52e8adbce/17.png"],"article":{"title":"吴正斌在武胜路集会上的讲话（节录）","alias":"","parts":[{"type":"paragraph","text":"不敢动了，要把过去这样那样的帽子统统摘掉。我们造反派十年来是有斗争经验的，造劲更大了。但是，也有人对当前的运动信心不足，感到湖北走资派顽固，不一定攻得下来，这个观点不对。文化大革命的经验告诉我们，大人物你不打，他就不倒··有中央委员夏邦银、候补委员谢望春和朱洪霞、吴焱金领导我们，斗争一定会取得胜利的。"},{"type":"paragraph","text":"三月二十一日吴正斌在武胜路集会上的讲话（节录）"},{"type":"paragraph","text":"吴正斌说：“当前有几个问题需要解决。一是党的领导问题。党的领导就是毛主席，党中央的领导，我们同意个人要服从组织。但是，还要下级服从上级，全党服从中央。现在的运动，省委领导不力，中央委员夏邦银领导我们千，还不是党的领导？不要被他们说的在党的领导下一类话而束缚了我们的手脚。二是关于无政府主义的问题。我们在街头召开大会，大字报上街，这不是无政府。我们这些人都是各级革委会的副主任、常委、委员。是他们把政府搞垮了，把我们这些人下放的下放，批判的批判，拘留的拘留，外调的外调。如果说他们是政府，那么我们也是政府。我们就是他们的对立面，是对着干的。我们这次回击右倾翻案风，是在中央委员，省、市革委会副主任、常委领导下进行的，我们是有政府的，不戴他那个无政府主义的帽子”。"},{"type":"paragraph","text":"吴正斌说：“当前有几个问题需要解决。一是党的领导问题。党的领导就是毛主席，党中央的领导，我们同意个人要服从组织。但是，还要下级服从上级，全党服从中央。现在的运动，省委领导不力，中央委员夏邦银领导我们千，还不是党的领导？不要被他们说的在党的领导下一类话而束缚了我们的手脚。二是关于无政府主义的问题。我们在街头召开大会，大字报上街，这不是无政府。我们这些人都是各级革委会的副主任、常委、委员。是他们把政府搞垮了，把我们这些人下放的下放，批判的批判，拘留的拘留，外调的外调。如果说他们是政府，那么我们也是政府。我们就是他们的对立面，是对着干的。我们这次回击右倾翻案风，是在中央委员，省、市革委会副主任、常委领导下进行的，我们是有政府的，不戴他那个无政府主义的帽子”。"}],"authors":["吴正斌"],"dates":[{"year":1976,"month":3,"day":21}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":9,"page_end":9},"tags":[{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f6c6a5928e"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
