s":[{"year":1948,"month":2,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"南线新区人民欢度春节"},{"type":"paragraph","text":"向毛主席朱总司令拜年"},{"type":"paragraph","text":"【新华社豫陕鄂前线十五日电】新区人民欢度解放后第一个春节。叶县某镇农民在民主政府领导下已初步翻身，腊月二十八日，该地农会又分给一千二百八十个贫苦农民以三十三石粮食和衣服、布匹、家具等一部。许多农民在领粮时都说：去年这时到处躲债，年三十夜还不敢回家，今年可是大不同了。镇上各家都贴出自编的对联，如“解放军来到河南，老百姓有吃有穿”。春节第一天，到处锣鼓喧天，驻军的秧歌队和农民的狮子队尽日同乐，十字街口悬挂着毛主席和朱总司令的巨幅画像，整天挤满了人向毛主席和朱总司令拜年。"},{"type":"paragraph","text":"宝丰农民也在紧张的翻身斗争中欢度新春，大家穿着新衣服拜年。某镇农会主席告诉记者说：“今年最大的痛快是腊月没人逼帐，没保长来要过年捐，不用去给地主磨面、蒸馒头、扫地了”。该村在两个月内已有一千多穷人分了将近两千多亩土地、一万五千斤粮食和一千多件衣服，过年时农会还给穷户每户分了一斤肉钱，因此年三十晚家家户户都包了饺子。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c2de5124f2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
