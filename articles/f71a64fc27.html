year":1948,"month":7,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"斯大林毛泽东同志"},{"type":"paragraph","text":"电慰托格里亚蒂"},{"type":"paragraph","text":"【新华社陕北十六日电】塔斯社莫斯科十四日电：斯大林代表联共（布）中央委员会顷致电意共中央委员会，原电如下："},{"type":"paragraph","text":"联共（布）中央委员会对人类的死敌们谋害工人阶级和意大利全体劳动人民的领袖——我们亲爱的托格里亚蒂同志的毒辣企图深为愤慨。联共（布）中央委员会对于托格里亚蒂的战友们未能保护他免遭这一卑鄙暗伏的袭击感到悲痛。"},{"type":"paragraph","text":"联共（布）中央委员会约瑟夫·斯大林（签字）"},{"type":"paragraph","text":"【新华社陕北十六日电】中共中央毛泽东主席致电意大利共产党，慰问意共领袖托格里亚蒂。原电如下："},{"type":"paragraph","text":"意大利共产党中央委员会同志们：中国共产党中央委员会闻悉意大利反动派阴谋刺伤托格里亚蒂同志之消息，表示极大的愤慨。特对托格里亚蒂同志致以慰问。"},{"type":"paragraph","text":"中国共产党中央委员会主席　毛泽东"},{"type":"paragraph","text":"一九四八年七月十五日"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f71a64fc27"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
