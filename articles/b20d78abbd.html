rs":["王炽"],"dates":[{"year":1986,"month":10,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"促进祖国统一　完成叶帅宿愿"},{"type":"paragraph","text":"全国台联台盟总部在京理事痛悼叶剑英逝世"},{"type":"paragraph","text":"据新华社北京10月28日电  （记者王炽）全国台联、台盟总部的在京理事和各界台胞代表今天下午在全国政协礼堂举行座谈会，沉痛悼念叶剑英同志的逝世。他们表示，要化悲痛为力量，促进祖国的统一，完成叶剑英同志生前未了的宿愿。"},{"type":"paragraph","text":"会议开始前，全体人员起立，向叶剑英同志遗像致哀。"},{"type":"paragraph","text":"全国台联会长林丽韫在座谈会上说，叶剑英同志在担任第五届全国人大常委会委员长期间，发表了一系列有关和平统一祖国的文告和讲话，有力地促进了祖国的统一事业。"},{"type":"paragraph","text":"台盟总部主席苏子蘅、秘书长徐萌山，全国台湾同学会会长廖秋忠在发言中回顾了叶剑英同志关怀台湾同胞的往事。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b20d78abbd"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
