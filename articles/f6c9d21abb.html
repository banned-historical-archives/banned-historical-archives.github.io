art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"英国人民高呼：毛主席万岁！万万岁！许多英国和亚非拉朋友冲破警察阻拦到我代办处表示坚决支持","authors":[],"parts":[{"type":"paragraph","text":"据新华社伦敦三十日电 英帝国主义最近对中国驻英代办处等机构所采取的一系列非法措施和法西斯暴行，激起了英国广大人民和在英国的亚、非、拉朋友的无比愤慨，他们强烈谴责英国当局的反华罪行，并且表示坚决支持中国政府的严正立场和中国驻英人员进行的正义斗争。"},{"type":"paragraph","text":"二十七日下午，数十名英国和在英国的亚、非、拉进步人士不顾英国警察的威胁，来到被大批英国警察和便衣特务包围的中国驻英代办处门前，他们高举《毛主席语录》，齐声朗读其中的一些段落，并激昂慷慨地高呼：“打倒英帝国主义！”“打倒美帝国主义！”“打倒苏联现代修正主义！”“世界人民的伟大领袖毛主席万岁！万岁！万万岁！”中国驻英临时代办沈平同代办处的许多同志来到门前，同外国朋友们一起高声朗诵毛主席语录，并振臂高呼：“毛主席万岁！万岁！万万岁！”站在旁边的英国警察和便衣特务被这种场面吓得目瞪口呆、张惶失措。"},{"type":"paragraph","text":"代办处的同志们同外国朋友进行了座谈。在座谈时宾主用不同的语言高唱《东方红》、《大海航行靠舵手》、《国际歌》等革命歌曲。"},{"type":"paragraph","text":"当这些外国朋友进入代办处时，一个反动的资产阶级报纸记者企图混进去，但是当场就被揪了出来，一位青年朋友愤怒地指责他是中国人民和英国人民的敌人。这个家伙老羞成怒，结结巴巴地威胁说，“你、你敢和中国人站在一起！？”这位青年朋友横眉冷对，高声回答说，“我们就是要同中国人民站在一起！我们要同香港的中国人民站在一起，要同七亿中国人民站在一起！”"},{"type":"paragraph","text":"座谈结束时，这些外国朋友每人举着一幅伟大领袖毛主席的画像昂首阔步地走出中国代办处，向聚集在代办处门前的警察、特务和许多反动的资产阶级报纸记者示威。"},{"type":"paragraph","text":"这种对中国人民的战斗友谊也洋溢在伦敦的其他一些地方。二十七日下午，代办处的一些同志和新华社记者在警察和特务的尾随下来到海德公园。这时，人们不顾警察和便衣特务的威胁，纷纷向中国同志涌来，热情地同他们握手，有的人高举《毛主席语录》，高呼“毛主席万岁！”有的人高举拳头，表示他们的支持。"},{"type":"paragraph","text":"在海德公园还可以看到另一种动人的场面：虽然英国警察当局不久前用法西斯警察暴行来镇压和迫害在海德公园出售《毛主席语录》的进步人士，但是最近自愿到这里出售《毛主席语录》的人比以前更多了，而且他们售出的数目也越来越多。"},{"type":"paragraph","text":"当二十九日发生英国警察、暴徒袭击我驻英代办处，打伤我工作人员的事件后，许多英国朋友马上打电话或写信给我代办处及新华社伦敦分社，强烈谴责英国当局这一法西斯暴行，并表示坚决支持我驻英机构人员的英勇斗争。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f6c9d21abb"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
