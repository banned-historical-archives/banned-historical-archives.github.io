art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"要闻简报","authors":[],"parts":[{"type":"paragraph","text":"中共中央副主席邓小平九日上午在人民大会堂会见诺罗敦·西哈努克亲王和夫人，同他们进行了亲切友好的交谈。会见以后，邓小平设午宴款待西哈努克亲王和夫人。"},{"type":"paragraph","text":"教育部、国家体委九日为在法国巴斯蒂亚国际中学生体操锦标赛中取得优异成绩的我国中学生体操运动员发了奖。在这次国际比赛中，我国中学生体操运动员获得了男、女个人全能第一名和十个单项的第一名。"},{"type":"paragraph","text":"全国儿童和少年工作协调委员会九日在北京正式成立，康克清为主任。这个委员会是为了落实中央书记处关于加强儿童和少年工作的指示而成立的。它的任务是同各有关单位加强联系、沟通情况、协调组织，使各方面的力量紧密配合，分工负责，共同做好儿童和少年工作。"},{"type":"paragraph","text":"南斯拉夫联邦主席团八日在茨·米亚托维奇主席主持下举行会议，讨论了南斯拉夫同阿尔巴尼亚关系中的迫切问题。会议还讨论了发展南斯拉夫武装力量以及有关南斯拉夫武装力量的领导与指挥方面的某些问题。"},{"type":"paragraph","text":"美国总统里根和日本首相铃木八日结束会谈后发表联合公报，要求苏联军队立即撤出阿富汗，反对干涉波兰，并且表示要各自发展同中国的关系，支持东盟的团结。（据新华社）"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"99ba1f6f96"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
