le":"239. 干部离休退休后其档案如何处理？","dates":[{"year":1983,"month":1}],"is_range_date":false,"authors":["中共中央组织部研究室","中共中央组织部组织局"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"中共中央组织部研究室、中共中央组织部组织局，党的组织工作问答，285-286","tags":[{"name":"档案","type":"主题/事件"},{"name":"干部","type":"主题/事件"},{"name":"退休","type":"主题/事件"}],"parts":[{"type":"title","text":"239. 干部离休退休后其档案如何处理？"},{"type":"paragraph","text":"答：干部离休、退休以后，其档案按下列办法分工保管："},{"type":"paragraph","text":"（一）中央管理的中央、国家机关副部长以上职务和省、市、自治区党委常委、纪律检查委员会副书记、顾问委员会副主任、副省长、人大常委会副主任、政协副主席以上职务的党员干部的档案,由中央组织部保管；民主党派和无党派爱国人士的档案，由中央统战部保管；中央管理的其他干部的档案，分别由中央、国家机关各部委，省、市、自治区党委组织部门保管。"},{"type":"paragraph","text":"（二）中央管理范围以外的干部的档案，就地安置的，由原管理单位或工作单位保管；易地安置的，转至负责管理该干部的组织、人事部门保管。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"66732d1998"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
