art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"要闻简报","authors":[],"parts":[{"type":"paragraph","text":"邓小平副总理会见日本外务大臣园田直"},{"type":"paragraph","text":"国务院副总理邓小平八月十日下午会见了日本外务大臣园田直。"},{"type":"paragraph","text":"在友好的气氛中，邓副总理同园田外务大臣就缔结中日和平友好条约的问题和共同关心的国际问题进行了交谈。邓副总理说，园田外务大臣怀着发展中日友谊的强烈愿望来到中国，这次访问必将为进一步增进和加强中日两国人民的友谊和双方的友好合作关系，作出重要贡献。"},{"type":"paragraph","text":"会见后，邓小平副总理设宴招待园田直外务大臣及其随行人员。"},{"type":"paragraph","text":"乌兰夫副委员长会见西德联邦议院副议长"},{"type":"paragraph","text":"人大常委会副委员长乌兰夫八月十日上午会见德意志联邦共和国联邦议院副议长赫·施米特—福肯豪森，同他进行了友好的谈话。"},{"type":"paragraph","text":"耿飚副总理会见澳大利亚工党议员访华团"},{"type":"paragraph","text":"国务院副总理耿飚八月十日下午会见以克莱德·卡梅伦为团长的澳大利亚工党议员访华团，同他们进行了友好的谈话。（据新华社）"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"耿飚","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"761538ca7d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
