es":[{"year":1946,"month":12,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报天津廿七日专电】　司徒大使廿六日由平抵津后，今晨十一时假美总领馆招待中外记者，司徒氏对国事前途仍抱乐观。渠称:国大召开及宪法通过，虽使和谈陷于停止，但和谈仍有重开希望，渠表示挽救今日中国人民唯一办法，为获得和平，面和平之获致必须政治民主作保证。渠钦佩蒋主席召开国大及通过宪法之毅力。渠称:修改后之宪法，虽较政协议定者不同，但如能真正实行，亦自有好处。提及联合国大会时。渠称:四强精神日趋接近，世界和平将由此获得保证。最后答复问题两项:一，渠此次来平与叶剑英会晤，系以个人资络，劝告叶氏谋取谅解，俾和谈重开。二，大连事件发生后，一般人士敏感过甚，实属多余。渠谓，此事不久可成过去，不会发生不良影响。(金)"},{"type":"paragraph","text":"【本报北平廿六日专电】　当叶剑英在燕园时，曾接见记者，对和谈前途，希望从此可以好转，谓第三方面正在开会，有重斩发动调解之趋势。"},{"type":"paragraph","text":"又司徒于离平时，曾对记者称:希望第三方面从事调解，谓目前人心归趋，皆为和平，大家已有一共同认识，即国家为重，党派为轻。又谓，关于国共和题，共方主张一举而全盘解决，政府方面则主步步解决。(裴)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1d178a5aad"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
