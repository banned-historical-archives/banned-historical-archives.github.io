ical-archives/banned-historical-archives0/main/maoquanji29.pdf"],"article":{"title":"志愿军参战目前只做不说","alias":"","parts":[{"type":"paragraph","text":"志愿军参战目前只做不说"},{"type":"paragraph","text":"（1950年10月19日）邓、谭，并告饶、陈，刘、邓、贺，习、马："},{"type":"paragraph","text":"十月十三日电悉。（一）为了保卫中国支援朝鲜，志愿军决于本日出动，先在朝鲜北部尚未丧失的一部分地方站稳脚，寻机打些运动战，支持朝鲜人民继续奋斗。在目前几个月内，只做不说，不将此事在报纸上做任何公开宣传，仅使党内高级领导十部知道此事，以便在工作布置上有所准备，此点请各中央局加以注意。（二）四十八军可以在明年三月再行集中，如有特别情况需要提早集中时再通知你们。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十月十九日"},{"type":"paragraph","text":"[1]邓、谭，指邓子恢、谭政，当时分别任中共中央中南局第三书记、中南军区第二政治委员和中共中央中南局常务委员、中南军区第三政治委员。"},{"type":"paragraph","text":"[2]饶、陈，指饶漱石、陈毅，当时分别任中共中央华东局第一书记和第二书记。刘、邓、贺，指刘伯承、邓小平、贺龙，当时分别任中共中央西南局第二书记、第一书记和第三书记。习、马，指习仲勋、马明方，当时分别任中共中央西北局第一书记和第三书记。"}],"authors":["毛泽东"],"dates":[{"year":1950,"month":10,"day":19}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":257,"page_end":257},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"396d61676c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
