的思想情况","authors":["于生"],"dates":[{"year":1955,"month":12,"day":21}],"is_range_date":false,"parts":[{"text":"江苏省党员干部对资本主义工商业改造的思想情况","type":"title"},{"text":"于生","type":"authors"},{"text":"【江苏分社二十一日讯】江苏省最近召开了各地、市、县委书记联席会议。从会上讨论的情况看，贯彻中央对私营工商业改造的方针政策，要比农业合作化困难此。一部分干部，甚至有直属市部长一级的干部对赎买政策都想不通。他们认为，资产阶级是社会主义革命的对象，没有两面性了，对资本家的企业应该没收，不必用赎买政策。在公私合营厂中作实际工作的同志“不愿与资本家打交道”的思想相当普遍。他们怕腐蚀、怕上级说右倾。","type":"paragraph"},{"text":"另外，从讨论中提出来的问题看，干部对私营工商业改造的政策的认识水平也是比较低的。例如：小商小贩和商业资本家的界限问题、手工业资本家和手工业者的界限问题、资本家和资本家代理人的界限问题等都闹不清楚。","type":"paragraph"},{"text":"省委认为，在今后工作中，加强对党员和干部的教育工作还是一个很重要的环节。","type":"paragraph"}],"comments":[],"origin":"新华通讯社编《内部参考》1955年12月23日","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1c999c47a5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
