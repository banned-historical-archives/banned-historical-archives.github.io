script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"邓小平在会见芬兰共产党主席时说中国必须有一个安定团结的政治局面 排除一切社会主义建设道路上的障碍搞资产阶级自由化这件事，影响不了已取得的安定团结局面，也影响不了改革和开放政策；十一届三中全会以来，整个国家的发展是不能否定的","authors":["虞家复"],"dates":[{"year":1987,"month":1,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京一月十五日电　(记者虞家复)中共中央顾问委员会主任邓小平今天上午在人民大会堂会见芬兰共产党主席阿尔沃·阿尔托一行时说，中国现在有两大任务:一是维护世界和平；二是发展社会主义生产力。中国必须有一个安定团结的政治局面，排除一切社会主义建设道路上的障碍。"},{"type":"paragraph","text":"邓小平说，现在存在着一种思潮，就是搞资产阶级自由化。这件事，中国的马克思主义者是不会同意的。它影响不了我们已经取得的安定团结的局面，也影响不了我们为了社会主义建设而采取的改革和开放政策，因为从中共中央十一届三中全会以来，整个国家的发展是不能否定的。"},{"type":"paragraph","text":"邓小平还指出，我们执行的政策是成功的，特别是改革和开放政策。我们在干前人所没有干过的事情。我们处于一个新的时期，没有任何经验可以供我们借鉴。但是我们搞社会主义建设的方针是坚定不移的。"},{"type":"paragraph","text":"邓小平说，我们历来认为真正的马克思列宁主义就是要把马列主义的基本原理同自己国内的情况相结合。我们从自己的经验中认识到，任何国家的革命都必须根据自己国家的特点和自己的革命实践来寻求革命胜利的道路、方法和方式。"},{"type":"paragraph","text":"邓小平在同芬共同志谈到党与党的关系时说，所有的党，不管大小和历史长短，都应当平等。他说，我们很高兴中芬两党恢复了关系。这种关系是在新的、平等和相互尊重的基础上恢复的，我们相信以后两党关系会顺利发展。中国共产党愿意遵循同样的原则处理同其他国家共产党的关系。"},{"type":"paragraph","text":"阿尔托介绍了芬共和芬兰的情况。他说，芬共代表团这次访问中国，揭开了两党关系史上新的一页。"},{"type":"paragraph","text":"阿尔托说，他希望中国在实现自己的目标方面取得更大的成就。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7e8ab8efda"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
