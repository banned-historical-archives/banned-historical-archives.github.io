<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"中共黄浦区委贯彻执行毛主席的建党路线加强党的组织建设　认真抓好纳新工作去年以来，发展了一千余名新党员，进一步加强了各级党组织的战斗力","authors":[],"dates":[{"year":1972,"month":7,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　在毛主席建党路线的指引下，中共黄浦区委按照“积极、慎重”的方针，认真抓好纳新工作，自一九七一年以来，发展了一千余名新党员，进一步加强了各级党组织的战斗力。"},{"type":"paragraph","text":"去年五月，新区委建立后，区委领导同志一面认真学习毛主席的建党学说，一面深入基层调查研究，提高了对纳新工作重要性的认识。毛主席教导说:“不清除废料，不吸收新鲜血液，党就没有朝气。”大家深深体会到，是否积极、慎重地把文化大革命中涌现出来的先进分子及时吸收到党内来，增加党的新鲜血液，巩固和壮大党的队伍，这是对党的事业抱什么态度的问题，是要不要把巩固无产阶级专政的根本任务落实到基层的大问题。"},{"type":"paragraph","text":"黄浦区委在纳新工作中主要抓了三个环节:"},{"type":"paragraph","text":"一、抓思想。去年六月，区委对全区各个系统的积极分子状况，作了一次调查分析。他们发现在一千七百多名积极分子中，已经提出入党要求的有七百五十多人，有些已多次提出申请，有些已基本具备入党条件。但是有些基层党组织领导却存在这样那样的顾虑。有的认为:“青年人哇啦哇啦，年龄大了作用不大，里弄妇女婆婆妈妈，艺徒刚满师还要考察考察，知识分子情况复杂。”主张纳新工作慢慢来。区委针对这些思想，举办了建党工作学习班，组织干部反复学习毛主席的建党学说，提高了大家对纳新工作重要意义的认识。"},{"type":"paragraph","text":"二、抓典型。区委在抓纳新工作中，注意运用典型经验，推动面上的工作。例如关于如何对待知识分子入党的问题，凤阳路第一小学党支部在开始抓发展工作的时候，认为“没有发展对象”，后来学习了毛主席关于“一分为二”的论述，学习了党的“有成份论，不唯成份论，重在政治表现”的政策，具体分析了教师队伍的状况，认识到不是教师队伍中没有可以发展的积极分子，而是党支部存在保守思想。于是，党支部发动全体党员，热情帮助和培养积极分子，于去年发展了两名新党员。黄浦区委及时介绍了这个学校发展新党员的做法，为中、小学发展新党员的工作提供了经验。又如，有些基层单位的同志往往强调中心工作忙，插不进，不重视这项工作。区委就总结、推广了这方面工作做得好的先进单位的经验。如金陵东路街道党委在开展批修整风运动中，把积极分子推到阶级斗争、路线斗争的第一线，让他们到群众中去经受锻炼。通过实际斗争，进一步激发了积极分子对伟大领袖毛主席深厚的无产阶级感情，对刘少奇一类骗子的无比仇恨。在斗争中，既发展了新党员，又推动了批修整风运动的深入。这个街道党委的经验推广后，收到了较好的效果。"},{"type":"paragraph","text":"三、抓薄弱环节。黄浦区委在抓典型经验的同时，对纳新工作开展得比较缓慢的文教、卫生系统，专门派出了调查组，同这些系统的一些基层党组织同志一起学习毛主席关于“吐故纳新”的指示，一起分析研究，帮助解决工作中的一些问题，使这些单位的纳新工作有了较大的进展。去年四月底前，文教、卫生系统只发展了五名新党员；经过帮助之后，到去年年底已发展了四十九名新党员。"},{"type":"paragraph","text":"黄浦区委在积极、慎重做好纳新工作的同时，还积极培养、提拔新干部，注意基层党组织领导班子的老、中、青结合，充分发挥战斗堡垒作用。区委遵照毛主席关于无产阶级革命事业接班人的五个条件，积极培养、提拔新干部，使基层党组织增加了新鲜血液，充实了新生力量，改变了原班子朝气不足的状况。这些新干部在革命老干部的带领下，发挥敢想、敢说、敢做的革命精神，学习走在前，阶级斗争冲在前，困难工作抢在前，受到了广大党员和革命群众的好评。"},{"type":"paragraph","text":"黄浦区委还遵照毛主席关于“认真看书学习，弄通马克思主义”的教导，除了要求新党员、新干部在基层单位带头认真学习以外，还举办各种类型的学习班，组织他们到“五·七”干校、政治学校、业余夜校轮训，认真读马、列的书，读毛主席的书，对他们进行思想和政治路线方面的教育。许多新党员、新干部认真学习，做到了三个坚持:坚持学习马、列著作和毛主席著作，学习党的方针、政策；坚持走群众路线，身不离劳动，心不离群众；坚持把个人置于党的集体领导之下，自觉遵守民主集中制原则。区委还组织新党员、新干部积极投入三大革命运动，在斗争第一线经受锻炼和考验，积累经验，增长才干，更好地发挥共产党员的先锋作用和模范作用。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"338c9de7cf"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
