ical-archives/banned-historical-archives8/main/maoquanji25.pdf"],"article":{"title":"华东野战军全军可多休整数日","alias":"","parts":[{"type":"paragraph","text":"华东野战军全军可多休整数日！"},{"type":"paragraph","text":"（1948年12月22日）粟，并告邓、张："},{"type":"paragraph","text":"（一）五十四军撤回南京，刘汝明开合肥一带，李延年3第三次向北增援之可能性已大减。（二）你们可集中华野全军并多休整数日，养精蓄锐，然后一举歼灭杜聿明。只要杜部不大举突围，你们应休息至下月初，约于子微左右开始攻击较为适宜。望酌办。（三）给养情况是否已有改善，弹药准备如何，望告。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"二十二日二十二时"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军委起草的给华东野战军代司令员兼代政治委员粟裕并告中原野战军政治委员邓小平和副政治委员兼政治部主任张际春的电报。"},{"type":"paragraph","text":"[2]刘汝明，当时任国民党军第八兵团司令官。[3]李延年，当时任国民党军第六兵团司令官。[4]杜聿明，当时任国民党军徐州“剿匪”总司令部副总司令兼前进指"}],"authors":["毛泽东"],"dates":[{"year":1948,"month":12,"day":22}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":447,"page_end":447},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"449ca92b99"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
