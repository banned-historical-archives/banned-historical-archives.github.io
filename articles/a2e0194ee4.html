上半月相比产量和质量都有提高","authors":[],"dates":[{"year":1969,"month":8,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　上海搪瓷六厂革委会在煞住无政府主义歪风邪气的战斗中，遵循毛主席关于“要过细地做工作。要过细，粗枝大叶不行，粗枝大叶往往搞错”的教导，坚持依靠群众，发动群众，根据不同情况，区别对待，多做思想教育工作，推动了整党整团工作的深入发展，并在生产上取得了新的胜利。"},{"type":"paragraph","text":"这个厂有些同志开始时认为自己厂不算大先进，但也有点“小苗头”，无政府主义情况不严重。经过学习、座谈，不少同志结合本厂、本部门、本人大摆无政府主义的表现，大议无政府主义的危害性，大挖无政府主义的根子。这就使全厂干部和群众看到了自己厂里，不但有无政府主义，而且阶级敌人还在乘无政府主义之机，公开的或暗下的进行翻案活动。"},{"type":"paragraph","text":"无政府主义的情况摆出来了，如何办?有人要求厂革委会一概点名批判，有人要求对闹无政府主义的人都要从严处理。面临这一情况，厂革委会遵循毛主席“要过细地做工作”的伟大教导，首先开展调查研究，进行具体分析，是一贯的，还是偶然的；情节恶劣，还是不恶劣；是受利用的，还是幕后煽动的，作了逐个的、历史的、阶级的分析。根据不同情况，区别对待。大家一致认为，摆在面前大量的问题是人民内部矛盾，必须加强思想教育。他们决定抓先进典型为主，而以重点批判为辅，表扬好人好事，带动中间。同时又以抓党、团员干部为主，带动广大群众。这样，他们对一贯的、情节恶劣的、群众意见大的人，在大会上点名，要他们好好检查自己的错误。同时，厂革委会又举办了毛泽东思想学习班，把一些受无政府主义思潮影响较重，但群众意见不大、情节不很恶劣的人请到学习班，与老工人一起学习，边学习，边批判，帮助他们提高认识，引导他们自觉斗私批修，取得群众谅解。为了使整党、整团工作结合组织纪律教育，厂革委会也专门安排了这方面的组织生活，并且对学习好的、联系思想好的、有积极行动的，在讲用会上介绍，发扬好人好事，树立无产阶级正气，打击资产阶级邪气。使党团员的组织纪律进一步加强。有些小组还制订了煞住无政府主义歪风的措施。"},{"type":"paragraph","text":"这个厂在煞住无政府主义歪风邪气的战斗中，加强了思想政治教育，很多同志加强了组织性纪律性，不少青年的革命积极性也大大提高了。因此，高温车间缺勤率下降百分之五十。八月上半月生产与七月上半月相比产量和质量都有提高。"},{"type":"paragraph","text":"(本报通讯　员)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"name":"人民内部矛盾","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a2e0194ee4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
