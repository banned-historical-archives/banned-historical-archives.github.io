script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"响应毛主席的伟大号召走与工农相结合的道路  吉林八万多应届中学毕业生奔赴农村  学习株洲市厂社挂钩经验，城乡各个部门积极配合，安置工作越做越好","authors":[],"dates":[{"year":1975,"month":8,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"响应毛主席的伟大号召走与工农相结合的道路"},{"type":"paragraph","text":"吉林八万多应届中学毕业生奔赴农村"},{"type":"paragraph","text":"学习株洲市厂社挂钩经验，城乡各个部门积极配合，安置工作越做越好"},{"type":"paragraph","text":"新华社长春一九七五年八月三日电　在学习无产阶级专政理论运动的推动下，吉林省广大应届中学毕业生热烈响应毛主席关于“知识青年到农村去”的伟大号召，走与工农相结合的道路，上山下乡。到七月中旬，已有八万五千六百多人满怀革命豪情奔赴农村广阔天地。"},{"type":"paragraph","text":"今年，吉林省知识青年上山下乡动员安置工作形势很好。广大城镇中学应届毕业生通过学习无产阶级专政理论，批判刘少奇、林彪的“下乡镀金”、“变相劳改”等反动谬论，批判“学而优则仕”等孔孟之道，批判资产阶级法权思想，加深了对知识青年上山下乡，走与工农相结合道路伟大意义的认识，更加坚定了到农村扎根干革命的决心。许多毕业生在毕业前踊跃写申请书、决心书，争先恐后报名下乡。各学校党组织针对毕业生的思想实际，采取多种形式对他们进行深入细致的思想教育工作。不少学校举办了毕业生学习班，进行阶级教育、革命传统教育、理想前途教育和坚持乡村的教育。长春第一汽车厂优秀青年工人陈岱山生前所在的长春第十一中学，还组织毕业生学习了陈岱山的英雄事迹，以“我为祖国干了些什么”为题讨论了什么是革命青年应有的理想。这些活动使广大毕业生到农村去的行动更加自觉了。"},{"type":"paragraph","text":"吉林省各地党组织都把做好知识青年上山下乡工作当做反修防修、巩固无产阶级专政的一件大事来抓，不仅纳入党委议事日程，专门研究讨论，而且主要领导干部都亲自抓，深入基层调查研究，做好组织动员工作。一些有应届毕业生子女的领导干部，都自觉破除资产阶级法权观念，以身作则，模范地执行党的政策，带头送子女首批上山下乡。广大党员、干部和职工，经过学习无产阶级专政理论，批判资产阶级法权观念，积极支持子女上山下乡，以实际行动支持社会主义的新生事物。最近一个多月来，全省到处出现家长热情支持子女奔赴农村干革命，广大知识青年争先恐后要求上山下乡的生动局面。因此，今年虽然全省毕业生是最近几年最多的一年，上山下乡进度却比历年都快。前郭、磐石、伊通、东丰、双辽、浑江、长白、扶余、长岭、大安、突泉、库伦和科尔沁右翼中旗十三个县、自治县、市、旗的应届毕业生已经全部下到农村。"},{"type":"paragraph","text":"吉林省今年普遍学习推广了株洲市实行厂社挂钩的经验，调动了城乡两个方面做好知识青年工作的积极性。许多单位都派人到农村协助做好接待安置工作，一些安置点社队也派了领导干部和贫下中农代表到挂钩单位报告农业学大寨的大好形势和农村建设的长远规划，讲知识青年在农村茁壮成长的生动事迹，热情欢迎城镇知识青年到农村去。"},{"type":"paragraph","text":"由于城乡各个部门积极主动配合，使动员安置工作越来越好。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"吉林文革","type":"人物"},{"name":"上山下乡","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"name":"限制资产阶级法权","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d5dee4a210"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
