script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"实行对资产阶级专政","authors":["谷加扬"],"dates":[{"year":1975,"month":12,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"实行对资产阶级专政"},{"type":"paragraph","text":"工农大队合作医疗领导小组组长　谷加扬"},{"type":"paragraph","text":"为了取得社会主义革命的彻底胜利，实现共产主义，“无产阶级必须在上层建筑其中包括各个文化领域中对资产阶级实行全面的专政”。医疗卫生是上层建筑的重要组成部分，建立合作医疗，对于在医疗卫生领域内对资产阶级实行专政有着重要意义。"},{"type":"paragraph","text":"我们大队实行合作医疗制度以前，由于缺医少药，一些骗人的巫医、神汉乘机活动，一小撮阶级敌人也在暗地里兴风作浪，搞破坏活动。有一年春天，我们大队流行一种传染病，邻队一个未改造好的坏分子就胡说什么“这是天灾，要用神药、仙丹才能治好”，结果使一些迷信思想比较严重的人，受骗上当。"},{"type":"paragraph","text":"实行合作医疗以后，大队建立了以贫下中农为领导核心的管理小组，把农村医疗卫生大权牢牢掌握在贫下中农手里。几年来，赤脚医生大力向人们宣传科学治病的道理，揭露封建迷信的唯心主义的谬论，贯彻执行预防为主的方针，开展群防群治活动。这些，都猛烈地冲击着剥削阶级的意识形态，不断破除人们头脑中残存的旧思想，旧风俗，旧习惯。人们不信天命讲革命，不信迷信讲科学，自觉地同迷信与不卫生的习惯作斗争。去年春天，外地传来了喝仙水治百病的谣言，社员群众根本不信那一套。他们说：“合作医疗能治疗百病，封建迷信的东西害死人。”"},{"type":"paragraph","text":"我们贫下中农一定要坚持合作医疗制度，永远占领农村医疗卫生阵地，大力扶植社会主义新生事物，为无产阶级对资产阶级实行全面专政而斗争。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ca04c5398e"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
