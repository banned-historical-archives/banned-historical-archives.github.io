art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席革命文艺路线胜利万岁革命现代京剧《杜鹃山》彩色影片剧照选登","authors":[],"parts":[{"type":"paragraph","text":"杜鹃山农民自卫军党代表柯湘。她坚决贯彻执行毛主席的建军路线，用无产阶级思想改造农民自卫军，使它最后成为中国工农革命军的一部分。"},{"type":"paragraph","text":"柯湘耐心教育雷刚，指明农民武装只有步步跟定共产党，才能够节节胜利，蒸蒸向上。雷刚提高了无产阶级的觉悟，决心永远跟着共产党，永远跟着毛委员。"},{"type":"paragraph","text":"李石坚带来共产党来到杜鹃山的好消息，雷刚等兴奋异常，决定劫法场，抢一个共产党员领路向前。"},{"type":"paragraph","text":"杜妈妈责备雷刚不听柯湘劝阻，莽撞下山，铸成大错，雷刚悔恨交加。"},{"type":"paragraph","text":"“阶级情，海样深，同命运，一条心！往年同受同样苦，今朝同把冤仇伸”。当雷刚误将推车雇工田大江当作“土豪”欲加责打时，柯湘用党的阶级路线教育雷刚，结果雷刚悔悟，田大江参军，广大农民自卫军战士也提高了阶级觉悟。"},{"type":"paragraph","text":"柯湘在刑场上大义凛然，怒斥反动地主靖卫团头子毒蛇胆。"},{"type":"paragraph","text":"柯湘揭露温其久勾结敌人、出卖革命的叛徒面目，教育了雷刚和战士们。自卫军同仇敌忾，清除内奸。"},{"type":"paragraph","text":"“满腔热血化雷电，光华照河山。”柯湘等阻击敌人，掩护战友转移。在激战中，田大江英勇牺牲，气贯长虹。"},{"type":"paragraph","text":"鹃花似火，红旗招展。自卫军会合主力，全歼靖卫团，编入工农革命军，开赴井冈山，去见毛委员。"}],"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ab97103270"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
