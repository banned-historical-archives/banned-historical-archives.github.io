ical-archives/banned-historical-archives8/main/maoquanji15.pdf"],"article":{"title":"关于对付将介石的方针致周恩来电","alias":"","parts":[{"type":"paragraph","text":"关于对付蒋介石的方针致周恩来电"},{"type":"paragraph","text":"（1941年1月27日）（一）同意逐步撤退办法。（二）但须估计到蒋全部逮捕我们的人，须准备应付全部逮捕。"},{"type":"paragraph","text":"（三）西安撤退的二十五人，由李华率领，有完全合法护照，行至潼关被十六军扣留，朱总已电熊、胡，请饰放行，未知结果如何。"},{"type":"paragraph","text":"（四）如不实行十二条，不能恢复谈判，这个态度是完全正确的。"},{"type":"paragraph","text":"（五）日蒋矛盾尚可利用，李宗仁以信阳、应山敌北进至新安店集中者达两万余，炮百门，战车三十辆，飞机二十架，并仍续有增加，有向豫北进犯企图，令各集团军部署对敌。汤恩伯主力正在确山以北布防中。莫德宏以华中敌军乘我清剿匪军之际，集结主力于信阳附近，令其商城各部布置对敌等情。敌如大举进攻，必是日寇配合亲日派之行动，目的在威胁蒋介石妥协，亦是将蒋毁掉之步骤。"},{"type":"paragraph","text":"（六）我之方针是捉住江南事变及“一·一七”命令死也不放破裂是蒋发动的，蒋把我们推到不能不和他对立的地位，我们领导的军队已被宣布为叛变，我们已无任何可能再与蒋介石发生关系除非他取消“—·一七”命令，并实行十二条，我们没有和他谈判的余地，这种余地已被蒋剥夺干净了。办事处人员要打要杀权在们，我们是每人都准备杀头的。如他们亦认为两军相交不斩来使则放我们的人回延，否则由他们自便。在他们没有宣布全部破裂以前（取消八路番号、宣布中共叛变），我们办事处仍留少数人不走，以待他们之觉悟。这些都应公开向张冲等说明。"},{"type":"paragraph","text":"（七）新四军将领就职通电及声讨亲日派通电即日发你处。"},{"type":"paragraph","text":"（八）延安一切这类文件如不便于由办事处发出，则用间接方法秘密散发，以保办事处安全。"}],"authors":["毛泽东"],"dates":[{"year":1941,"month":1,"day":27}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":386,"page_end":387},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"71cf5c0677"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
