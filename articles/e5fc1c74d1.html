al-archives/banned-historical-archives8/main/maoquanji8.pdf"],"article":{"title":"致林彪、最荣臻等电","alias":"","parts":[{"type":"paragraph","text":"致林彪、聂荣臻等电"},{"type":"paragraph","text":"（1935年11月8日）林、聂，彭、李："},{"type":"paragraph","text":"一、董英彬（斌）七日称，候一〇六师到，该军各师由大《太）白镇依次东进。现一〇六师一部已到太白镇附近，估计该敌三个师一二日内有向黑水寺、直罗镇前进可能。二、我军为消灭该敌明九号部署如下：（甲）第一军团主力在原地不动，但将白灵沟以东地区之部队移驻秋林子西北地区。（乙）第二十五军明日移至白灵沟、安沟、大星《升）号一带，后日经秋林子移至桃花砭、张村驿之线。（丙）第二纵队明日移至油房原、老人仓之线。（丁）我们明日在原地不动。林对黑水寺、桃花砭一线及其以东、以南地区地形、道路、人家限两日内绘图具报。"},{"type":"paragraph","text":"彭毛八日二十二时"}],"authors":["毛泽东"],"dates":[{"year":1935,"month":11,"day":8}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":47,"page_end":47},"tags":[{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e5fc1c74d1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
