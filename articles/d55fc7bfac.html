"dates":[{"year":1993,"month":4,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　以发展商业、旅游、房产为特色，专业从事浦东第三产业开发的上海浦东华夏实业总公司，开业近一年来实业发展迅速。该公司负责开发的浦东新区六大开发区之一“华夏商业旅游开发区”已落实大型项目26个，总投资50亿元。日前，在上海商城浦东新区招商会上，该公司又分别签订了与仁恒房地产有限公司合建“仁恒花园住宅”、与山西汾酒厂合建“汾酒商城”等四个投资联建项目，投资达五亿元。"},{"type":"paragraph","text":"(张文革)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d55fc7bfac"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
