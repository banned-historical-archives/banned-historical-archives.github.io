hors":[],"dates":[{"year":1979,"month":9,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"叶剑英同志诗集《远望集》出版"},{"type":"paragraph","text":"本书收入作者旧体诗词共五十二题、八十一首"},{"type":"paragraph","text":"新华社北京九月十七日电  叶剑英同志的诗集《远望集》已由人民文学出版社出版，二十日起在全国各地新华书店发行。"},{"type":"paragraph","text":"本书收入作者一九二五年至一九七九年四月所作的旧体诗词共五十二题、八十一首。这些作品，大多曾发表过，可分为三类：一是怀念革命斗争中牺牲的烈士、歌颂英雄人物；二是对各时期政治形势的感受；三是解放后访问各地时赞颂祖国壮丽山河和大好革命形势的篇章等。"},{"type":"paragraph","text":"叶剑英同志写下了不少纪录时代风貌、抒发革命豪情的诗篇。毛泽东同志对叶剑英同志的诗有很高的评价，一九六五年曾亲笔录写他的《远望》，在给陈毅同志的信中说“剑英善七律”。"},{"type":"paragraph","text":"诗集出版前，作者进行了校订，有的还作了修改。"},{"type":"paragraph","text":"《远望集》采用特种大三十二开本，分精、平两种装帧，书前选印作者各时期的照片七帧，手迹一张。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"828b06deba"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
