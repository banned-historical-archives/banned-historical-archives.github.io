script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji16","name":"毛泽东全集第16卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji16.pdf"],"article":{"title":"理论研究阅读材料目录","alias":"","parts":[{"type":"paragraph","text":"理论研究阅读材料目录"},{"type":"paragraph","text":"（1941年11月1日）各地高级学习组组长、副组长："},{"type":"paragraph","text":"兹规定各地高级学习组理论部分的研究材料如下："},{"type":"paragraph","text":"（一）季米特洛夫之国际七次大会报告、结论及闭幕词（解放社季氏文选一至一百六十五页)"},{"type":"paragraph","text":"（二）《联共党史》的结束语"},{"type":"paragraph","text":"（三）法英美德意五国共产党史的传播与研究及对马列主义的宣传所作的决议（《解放》一百○五期）"},{"type":"paragraph","text":"（四）联共中央关于《联共党史》出版后应如何进行宣传的决议（《解放》七十九期）2"},{"type":"paragraph","text":"（五）《斯大林与〈联共党史〉》（《解放》一百廿八期）3（六）《左派幼稚病》（解放社版）[1]即《论共产国际各支部内\u003c联共（布）党史简明教程\u003e底传播与研究以及马克思列宁主义底宣传》。景林译自1939年8月12日德文《国际通讯》八卷第四十五期，载《解放》第一〇五期。[2]即《联共（布）中央关于\u003c联共（布）党史简明教程\u003e出版后党底宣的决议》。载《解放》第七十九期。[3]即《斯大林同志与\u003c联共（布）党史简明教程\u003e》。载《解放》第一八期。"},{"type":"paragraph","text":"以上各件请先看，最好背精读一部至两遍\"，由组长或副组长对于每一件材料提出要点加以讨论。"},{"type":"paragraph","text":"（七）艾译的《哲学大纲》第八章“认识过程”即《哲学选辑》第四章"},{"type":"paragraph","text":"（八）李译《辩证唯物论教程》第六章“唯物辩证法与形式论理学”"},{"type":"paragraph","text":"（九）河上肇《经济学大纲》序说（陈豹隐译）以上口口可后看。（十）《联共党史》全书以上一部可后看，看及讨论办法同前。"},{"type":"paragraph","text":"毛泽东　王稼祥"},{"type":"paragraph","text":"十一月一日[1]抄件原文如此，可能是：“最好能精读一遍至两遍”。[2]即艾思奇和郑易里翻译的苏联米丁、拉里察维基等所著《新哲学大纲》。"},{"type":"paragraph","text":"[3]即李达和雷仲坚翻译的苏联西洛可夫、爱森堡等所著《瓣证法唯物论教程》。"},{"type":"paragraph","text":"[4]河上肇（1879—1946)，日本的马克思主义经济学家。《经济学大纲》是他1928年发表的著作。"}],"authors":["毛泽东"],"dates":[{"year":1941,"month":11,"day":1}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":277,"page_end":278},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"555add8938"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
