art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东思想光焰无际印度、瑞典、丹麦、比利时、法国出版毛主席光辉著作","authors":[],"parts":[{"type":"paragraph","text":"全世界革命人民的宝书《毛主席语录》英文版，最近由印度北方邦的“思想出版社”再版发行。这是印度革命人民的一件大喜事。再版的《毛主席语录》刊印了一幅毛主席的像片和林彪同志在一九六六年十二月十六日为《毛主席语录》写的再版前言。"},{"type":"paragraph","text":"毛主席的《反对自由主义》和《改造我们的学习》两篇光辉著作，已经译成印地文，由新德里的“思想出版社”出版。这两篇文章出版后，受到印度广大劳动人民的极大欢迎。"},{"type":"paragraph","text":"《毛主席语录》瑞典文版一日在斯德哥尔摩出版。瑞典人民对这本红书的出版一直很关心，不少人曾写信或亲自跑到书店，询问《语录》出版的日期。"},{"type":"paragraph","text":"在瑞典文版《毛主席语录》发行之前，人们只好购买英文版的《毛主席语录》来学习。许多瑞典人已养成了随身携带和随时阅读这本小红书的习惯。有些人已能背诵许多毛主席的语录。"},{"type":"paragraph","text":"丹麦“未来出版社”翻译并出版的《毛主席语录》丹麦文版，四月二十六日起在丹麦发行。这本红书同中文原版一样，附有一张毛主席像和一篇林彪同志撰写的再版序言。"},{"type":"paragraph","text":"毛主席的这本红书受到了丹麦革命人民的热烈欢迎。一批丹麦青年在得到这本红书以后激动地说：“这本书肯定会成为我们日常工作和斗争中的可靠武器。”"},{"type":"paragraph","text":"《毛主席语录》荷兰文版最近在比利时由布鲁塞尔“国际书店”出版。第一版共发行两万册。早在出版前，就有大批读者向书店预购。"},{"type":"paragraph","text":"法国“马斯佩罗出版社”最近出版了一套袖珍本的毛主席著作选集。这一套选集分成三册，共包括毛主席的《中国社会各阶级的分析》、《关于纠正党内的错误思想》、《中国革命战争的战略问题》、《实践论》、《矛盾论》、《新民主主义论》、《在延安文艺座谈会上的讲话》、《关于正确处理人民内部矛盾的问题》等二十一篇光辉著作和十八首诗词。"}],"alias":""},"tags":[{"name":"林彪","type":"人物"},{"name":"人民内部矛盾","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c50b6644a5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
