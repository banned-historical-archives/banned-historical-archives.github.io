,"month":2,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【法国新闻社北平二十日电】军调部中共代表叶剑英原定今日飞返延安，兹因与美国代表吉伦会晤，故延期至廿一日成行。吉伦昨日自沪抵此，其专发停留西苑机场，等待接送叶氏及中共人员十六名启程。预料叶氏于返抵延安后对于军调部使命之失败，将发表长篇声明。"},{"type":"paragraph","text":"【中央社北平廿日电】军调都共方委员叶剑英，决定廿一日由平启程返延安。共方人员廿人，与叶剑英同机返延，为共方最后一批撤退人员，共方廿日以备忘录致政府副委员蔡文治将军，通报共方人员撤退完毕，并对年来政府招待表示满意。"}],"comments":[],"origin":"法国新闻社,中央社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"666be58ab6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
