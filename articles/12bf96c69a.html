art":5,"page_end":5,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"德国北威州打击网上极右宣传","authors":["刘钢"],"parts":[{"type":"paragraph","text":"据即将出版的最新一期德国《明镜》周刊报道，北威州政府的主管机构已要求所有在北威州注册的互联网站对其网上内容及链接网站进行认真检查，杜绝右翼极端主义内容的出现。"},{"type":"paragraph","text":"北威州州长于尔根·比索明确表示，州政府决心阻止右翼极端主义分子利用互联网进行极右宣传。他说，如果哪家网络公司继续使其网站中出现宣扬纳粹的内容，那么它将依法受到高额罚款的处罚。他同时希望，国际社会能够制定相应法规，禁止宣扬极右内容的网站进入互联网。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"12bf96c69a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
