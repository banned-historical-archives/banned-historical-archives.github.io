给毛主席保证积极生产","authors":[],"dates":[{"year":1951,"month":2,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【丽水讯】在人民政府正确的民族政策执行下，使居住在浙南丽水专区泰顺、景宁等县雁荡山区的苗民生活得处于安居乐业之境，真是‘苗家见青天，不再做牛马!’在旧社会里，尤其是在国民党反动政府‘大汉族主义’者统治下，居住在处州山区的苗胞是一群不幸的，好像注定了悲惨命运的受苦者，受够封建地主的残酷剥削，加上反动派的重压榨，捉丁勒索，苗胞和千百万受苦农民一样的不幸，恨透了国民党反动政府和地主阶级。"},{"type":"paragraph","text":"在旧社会里，苗胞所受的压迫是特别深重的，他们被看做‘低等民族’，穿着民族服装，讲着民族语言，职业也被局限于务农。经常被迫替地主阶级和伪乡保长无代价做各种苦役。"},{"type":"paragraph","text":"苗胞农民的勤劳是出名的，但在旧社会中，却被地主剥削得世代穷困，像景宁县苗胞多靠种山田，开荒山过日子。解放以前租种山田。租种一亩田起码要五块白洋(银元)的押租金，每年顶少要交纳占年产量三分之二的租谷，蕃薯山地每收六斤要给地主四斤。租一座山，起码要等于价值六成的押租金，每年又要交重租，砍伐在山上苗胞自栽的树，要拿出等于树价约三成许的洋钿给地主。夏荒借生谷，秋收时归还地主，起码对半利息。在苦难的黑地狱里，山区苗胞家家户户每年要缺半年吃粮，靠着吃蕃薯、苞萝(玉蜀黍)、山麻、茶子、野菜等杂粮和草根充饥。在荒月里‘老弱饿死填沟壑’的惨象日夕数起。"}],"comments":[],"origin":"丽水","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"25452141f1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
