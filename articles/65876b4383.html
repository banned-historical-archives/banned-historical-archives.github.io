<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"彭泽县广泛开展群众性活学活用毛泽东思想讲用活动　学一点　用一点　效果好","authors":[],"dates":[{"year":1969,"month":12,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"彭泽县广泛开展群众性活学活用毛泽东思想讲用活动"},{"type":"paragraph","text":"学一点　用一点　效果好"},{"type":"paragraph","text":"据新华社南昌电　在党的“九大”精神鼓舞下，江西省彭泽县活学活用毛泽东思想群众运动不断广泛深入地向前发展。现在，全县从城镇到乡村，从机关到家庭，从领导到群众，普遍开展了讲用活动，他们采取定期讲，随地讲，巡回讲，家庭讲，联户讲和社队讲等多种多样的形式，使讲用的内容越来越丰富，效果越来越好，出现了一个层层讲用，人人讲用，常讲常新的生动活泼的新局面。"},{"type":"paragraph","text":"这个县广大革命群众在开展讲用活动中，很注意结合各个时期的新形势和新任务，做到学一点，用一点，讲一点，通过讲用不断提高阶级斗争和路线斗争觉悟，达到自己教育自己的目的。每当毛主席最新指示一发表，全县各地广大群众立即开展学习，学了就用，用了就讲，讲了再用，用了再讲，这样不断讲用，不断加深理解，保证毛主席的一系列最新指示全面落实，条条深入人心。这个县复排大队的领导班子内部、领导和社员之间，曾经一度闹不团结。伟大领袖毛主席关于“团结起来，争取更大的胜利”的最新指示发表后，这个大队的干部、社员就反复学习，反复讲用，不断加深对毛主席最新指示的理解。他们通过反复讲用，提高了路线斗争觉悟，促进了彼此之间的革命大团结，全大队很快出现了团结战斗的新景象。"},{"type":"paragraph","text":"在讲用活动中，这个县广大群众还经常结合活思想，采用一事一讲用的办法，使讲用做到中心突出，生动活泼，扎扎实实，立竿见影。芳蓉公社五联大队的一个生产队主要负责人，针对一个没有改造好的地主分子企图腐蚀干部的事件，在全队进行了“千万不要忘记阶级斗争”的讲用，使广大贫下中农擦亮了眼睛，从而进一步提高了阶级斗争和路线斗争觉悟。通过这种讲用活动，更好地促进了毛泽东思想的大传播和大普及，推动全县社员家庭广泛展开了讲用活动。"},{"type":"paragraph","text":"在群众性的讲用热潮中，彭泽县各级革委会的领导干部坚持以身作则，学在前，用在前，带头讲用。他们主动深入到群众中去，用毛主席关于无产阶级专政下继续革命的学说对照检查自己，带头斗私批修，搞好思想革命化。各级革委会领导在带头讲用中，很注意抓新事物、新经验，及时总结，热情推广，促使群众性的讲用活动不断向前发展。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"65876b4383"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
