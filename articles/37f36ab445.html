dates":[{"year":1961,"month":12,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社河内16日电】　越南民主共和国主席胡志明、总理范文同今天下午接见了以叶剑英元帅为首的中国军事友好代表团全体成员。"},{"type":"paragraph","text":"接见时在座的有:越南民主共和国副总理兼国防部长武元甲大将，人民军副总参谋长黄文泰中将等。"},{"type":"paragraph","text":"接见时在座的还有中国驻越南大使何伟。"},{"type":"paragraph","text":"接见后，代表团向胡志明主席赠送了礼品。随后，胡志明主席、范文同总理同代表团共进晚餐。"},{"type":"paragraph","text":"【新华社河内15日电】　越南民主共和国副总理兼国防部长武元甲大将，今天晚上隆重举行宴会，热烈欢迎以叶剑英元帅为首的中国军事友好代表团。"},{"type":"paragraph","text":"出席宴会的，有阮志清大将，越南人民军总参谋长文进勇上将，总政治局主任双豪中将，副总参谋长黄文泰中将、陈文茶中将，总后勤局主任陈贵海少将，总政治局副主任黎光道少将等越南人民军高级将领。"},{"type":"paragraph","text":"出席宴会的，还有越南外交部长雍文谦，总理府部长阮康，对外文化联络委员会主任阮庆全，越中友好协会会长春水，以及各中央机关、群众团体负责人。"},{"type":"paragraph","text":"中国驻越南大使何伟、经济代表曹言行和社会主义国家驻越南武官等也应邀出席了宴会。"},{"type":"paragraph","text":"武元甲大将和叶剑英元帅先后在会上发表了重要讲话。他们的讲话不断为热烈的掌声所打断。"},{"type":"paragraph","text":"宴会始终在亲切友好的气氛中进行。宾主频频为中越两国人民和两国军队之间的牢不可破的兄弟友谊，为社会主义阵营的伟大团结，为世界和平而干杯。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"37f36ab445"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
