取民族独立反对帝国主义斗争中获更大胜利","authors":[],"dates":[{"year":1960,"month":9,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"刘少奇主席　周恩来总理　陈毅外长"},{"type":"paragraph","text":"电贺阿临时政府成立二周年"},{"type":"paragraph","text":"祝阿尔及利亚人民在争取民族独立反对帝国主义斗争中获更大胜利"},{"type":"paragraph","text":"新华社18日讯　中华人民共和国主席刘少奇9月18日致电阿尔及利亚共和国临时政府总理费尔哈特·阿巴斯，祝贺阿尔及利亚共和国临时政府成立二周年。电报全文如下：阿尔及利亚共和国临时政府总理费尔哈特·阿巴斯阁下："},{"type":"paragraph","text":"值此阿尔及利亚共和国临时政府成立二周年之际，我谨代表中华人民共和国和中国人民向阁下和英勇的阿尔及利亚人民表示热烈的祝贺。祝贵国繁荣，人民幸福。"},{"type":"paragraph","text":"中华人民共和国主席　刘少奇"},{"type":"paragraph","text":"1960年9月18日于北京"},{"type":"paragraph","text":"新华社18日讯　中华人民共和国国务院总理周恩来9月18日致电阿尔及利亚共和国临时政府总理费尔哈特·阿巴斯，祝贺阿尔及利亚共和国临时政府成立二周年。电报全文如下：阿尔及利亚共和国临时政府总理费尔哈特·阿巴斯阁下："},{"type":"paragraph","text":"欣逢阿尔及利亚共和国临时政府成立二周年，我谨代表中华人民共和国政府，并且以我个人的名义，向贵国政府和人民致以热烈的祝贺。"},{"type":"paragraph","text":"两年来，阿尔及利亚人民为争取民族独立和反对帝国主义、殖民主义进行了不屈不挠的英勇斗争，并且取得了巨大的胜利。这对亚洲、非洲、拉丁美洲各国人民争取和维护民族独立的正义斗争是一个极大的鼓舞，从而赢得了世界各国人民的同情和赞扬。中国政府和人民一贯地坚决支持阿尔及利亚人民的正义斗争，并且坚信，你们的斗争一定能获得最后的胜利。"},{"type":"paragraph","text":"中国人民非常高兴地看到，中阿两国人民之间的战斗友谊和友好合作关系在反对帝国主义和殖民主义和保卫世界和平的共同事业中获得不断的发展和巩固。祝英雄的阿尔及利亚人民在争取民族独立和反对帝国主义和殖民主义的斗争中获得更大的胜利。"},{"type":"paragraph","text":"中华人民共和国国务院总理"},{"type":"paragraph","text":"周恩来"},{"type":"paragraph","text":"1960年9月18日于北京"},{"type":"paragraph","text":"新华社18日讯　中华人民共和国国务院副总理兼外交部长陈毅9月18日打电报给阿尔及利亚共和国临时政府副总理兼外交部长克里姆·贝勒卡塞姆，祝贺阿尔及利亚共和国临时政府成立二周年。电报全文如下：阿尔及利亚共和国临时政府副总理兼外交部长克里姆·贝勒卡塞姆阁下："},{"type":"paragraph","text":"欣逢阿尔及利亚共和国临时政府成立二周年，我谨向阁下表示热烈的祝贺。祝中阿两国的友好合作关系获得进一步发展。祝阁下在争取民族独立、促进亚非各国友好团结和维护世界和平的事业中取得新的成就。"},{"type":"paragraph","text":"中华人民共和国国务院副总理兼外交部长　陈　毅"},{"type":"paragraph","text":"1960年9月18日于北京"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"陈毅","type":"人物"},{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"64493de4cc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
