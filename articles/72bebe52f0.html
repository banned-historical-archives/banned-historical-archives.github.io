ical-archives/banned-historical-archives8/main/maoquanji15.pdf"],"article":{"title":"应向国民党当局提出严重交涉","alias":"","parts":[{"type":"paragraph","text":"应向国民党当局提出严重交涉！"},{"type":"paragraph","text":"（1941年1月13日）"},{"type":"paragraph","text":"希夷军部率六个团仍在泾县以南茂林地区围困中，并没有出来，现粮尽弹绝，处境极危，有全军覆没之可能。虽有傅秋涛两个团突出至宁国山地，亦未突出大包围线外，请严重向重庆提出交涉，并向全国呼吁求援等语，请向当局提出最严重交涉，如不立即解围，我们即刻出兵增助，破裂之责由彼方担负。我们今日发出之通电，望立即散发。[1]这是毛泽东和朱德、王稼祥关于应向国民党当局提出严重交涉致周、叶剑英电的主要内容。[2]傅秋涛，当时任新四军第一支队司令员兼政治委员。皖南新四军转"}],"authors":["毛泽东"],"dates":[{"year":1941,"month":1,"day":13}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":339,"page_end":339},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"72bebe52f0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
