校（原北京无线电工业学校）"],"dates":[{"year":1966,"month":8}],"is_range_date":false,"parts":[{"text":"通告全市","type":"title"},{"text":"抗大第一无线电工校（原北京无线电工业学校）","type":"authors"},{"text":"我们是旧世界的批判者。凡是不符合毛泽东思想的，我们都要彻底消灭！我们要造反！我们要大破大立！造旧世界的反。","type":"paragraph"},{"text":"解放十七年来，我们还经常看到一些资产阶级的少爷、小姐、大混蛋们，打扮得妖里妖气，趾高气扬地坐在三轮车上，让上了年纪的老大爷拉着，看到这些我们非常气愤！解放前，这些混蛋们骑在人民头上作威作福，现在，我们看着他们这样做，我们决不答应！因此，我们通告全市，除老、弱、病、残者外，一律不许乘坐三轮车，如有违抗者，我们将采取革命行动！通告即日生效。望全市革命同志支持此项通告。","type":"paragraph"},{"text":"我们在毛泽东思想指导下，就是要破坏旧世界，造反，毛主席给了我们造反的权利，我们就要造反、造反、再造反，造旧世界的反，造封建主义的反，造资产阶级的反！不把毛泽东思想伟大红旗插全国、全世界，誓不罢休！","type":"paragraph"},{"text":"革命的造反精神万岁！","type":"paragraph"},{"text":"战无不胜的毛泽东思想万岁！","type":"paragraph"},{"text":"伟大的领袖，伟大的统帅，伟大的舵手毛主席万岁！","type":"paragraph"},{"text":" 抗大第一无线电工校（原北京无线电工业学校）","type":"paragraph"},{"text":"（原传单上似有年、月、日，但辨认不清，应在1966年8月下旬。──编者）","type":"appellation"}],"comments":[],"origin":"原传单上似有年、月、日，但辨认不清，应在1966年8月下旬。──编者","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4f45b79b59"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
