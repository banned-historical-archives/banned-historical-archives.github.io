tart":7,"page_end":7,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席著作受到西班牙人民热烈欢迎","authors":[],"parts":[{"type":"paragraph","text":"新华社马德里一九七六年十二月二十五日电 伟大领袖和导师毛泽东主席的光辉著作，深受西班牙人民的衷心欢迎。"},{"type":"paragraph","text":"马德里基础出版社从一九七四年九月到一九七五年二月分卷出版了《毛泽东选集》一至四卷。其中，第一卷和第二卷已经再版，总共印行一万八千册；第三卷和第四卷初版，共印行一万六千册。今年六月，这家出版社又初版印行了《毛泽东主席语录》一万八千册。"},{"type":"paragraph","text":"巴塞罗那的阿纳格拉玛出版社在一九七四年出版了《毛泽东四篇哲学论文》一书，这四篇著作是：《实践论》、《矛盾论》、《关于正确处理人民内部矛盾的问题》和《人的正确思想是从那里来的？》。"},{"type":"paragraph","text":"在马德里、巴塞罗那等大城市的书店里，或者在友好人士举办的有关报告会上，都可以看到很多人购买毛主席著作。毛主席逝世以后，一些西班牙报刊还分别刊登过一些毛主席的诗词和语录。最近，马德里基础出版社负责人说：“西班牙的广大读者十分崇敬和热爱毛泽东主席。《毛泽东选集》销售很快，我们将继续再版，以满足读者的需要。”"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"人民内部矛盾","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a566600d1b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
