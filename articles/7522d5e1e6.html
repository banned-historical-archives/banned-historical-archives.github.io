<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"天津市郊区广大干部和社员以批邓斗争为动力  战胜严重灾害  誓夺全年丰收","authors":[],"dates":[{"year":1976,"month":9,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"天津市郊区广大干部和社员以批邓斗争为动力"},{"type":"paragraph","text":"战胜严重灾害  誓夺全年丰收"},{"type":"paragraph","text":"新华社天津电　天津郊区广大干部和社员群众在各级党组织的领导下，深入批邓、反击右倾翻案风，以阶级斗争为纲，发扬人定胜天的革命精神，决心战胜严重自然灾害，夺取全年农业丰收。"},{"type":"paragraph","text":"目前，天津郊区的干部和社员正在大力加强秋庄稼的田间管理。全市六百七十多万亩大秋作物已经中耕了两遍，普遍追了肥。四个近郊区的秋菜播种工作已经完成百分之八十以上。"},{"type":"paragraph","text":"今年，天津郊区先后遭受旱、涝、雹、虫和地震等自然灾害。特别是七月二十八日唐山、丰南一带发生强烈地震，波及天津，给天津市郊区农业生产带来了许多困难。在自然灾害面前，各级党组织带领干部和社员群众，学习毛主席的一系列重要指示，坚持以阶级斗争为纲，深入开展批邓、反击右倾翻案风的伟大斗争。他们密切联系实际，批判邓小平反革命的修正主义路线和孔老二的“天命论”，激发了更大的革命干劲，决心自力更生，艰苦奋斗，战胜灾害，发展生产。全郊区到处响着豪言壮语：“大批促大干，斗倒老天夺高产，山崩地裂无所惧，誓为国家多贡献！”中共天津市东郊区委提出了“学大寨精神，创大寨业绩，大灾之年不减产量、不减社员口粮、不减对国家贡献”的响亮口号。汉沽区桥沽大队的干部、群众，地震以后表示要坚决做到：粮食亩产过“长江”的指标不变，粮食、蔬菜、水果的产量不减，对国家的贡献不减，公共积累不减，为建成大寨式大队而努力奋斗。天津市受地震灾害最重的宁河县人民决心加倍努力发展生产，把自然灾害造成的损失补起来。"},{"type":"paragraph","text":"在抗震救灾的斗争中，天津郊区干部和社员，首先不误农时地抓好大秋作物的田间管理。他们以大寨为榜样，“先治坡，后治窝”。地震以后，迅速组成百万劳动大军，给秋庄稼除草、追肥、灭虫，各项田间管理工作，一环紧扣一环。各区、县还组织人力，检查、整修了所有桥、闸、堤、坝和扬水站，以利排涝防洪。"},{"type":"paragraph","text":"天津郊区在努力抓好大秋作物田间管理的同时，还认真做好“三秋”的各项准备工作，检查、维修了各种农机具。在这方面，各级党组织都采取有力措施，帮助受灾较重的社队。全郊区广泛开展了积肥运动，为种好冬小麦所准备的底肥比往年又多又好。"},{"type":"paragraph","text":"为了夺取农业丰收、争取抗震救灾斗争的更大胜利，中共天津市委和郊区各级党组织都加强了对这一工作的领导。市委主管农业的部门派出五个工作队，到宁河、汉沽、蓟县、武清、宝坻等区、县，具体帮助工作。各区、县委领导成员深入农村基层，和贫下中农搞三同，参加战斗，指挥战斗。整个郊区抗震救灾、发展农业生产的工作，正在顺利进行中。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"天津文革","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7522d5e1e6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
