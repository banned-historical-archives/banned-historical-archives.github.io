ors":["王英富"],"dates":[{"year":1957,"month":6,"day":9}],"is_range_date":false,"parts":[{"text":"杨玉清所指的“民”究竟能包括多少人？","type":"title"},{"text":"王英富","type":"authors"},{"text":"编辑同志：","type":"appellation"},{"text":"看了你报６月５日第二版登的杨玉清的发言，有下面一点意见：整风运动是从团结愿望出发，经过批评达到更高阶段的团结，而不是为了将某些同志整死。我认为杨玉清的发言就很难使人相信他是本着这样的精神提出善意的意见的。他说：“这些人应该下台，不下台不足以平民愤”，“人民日报总编辑非下台不可，因为人民日报几年来都在歌功颂德”。显然，他是以人民的代表自居而发出不平的呼声的。但他所指的“民”究竟能包括多少人呢？我想只能是极少数的人，如果把自己或少数人的气愤就算作是“民愤”那就不是实事求是的了。","type":"paragraph"},{"text":"人民日报是否几年来都在歌功颂德呢？不是的。几年来人民日报的确宣传了我国在中国共产党领导下所取得的革命胜利，宣传社会主义社会幸福的前途，宣传我国人民建设社会主义的伟大成就、热情和信心，宣传我国各族人民的团结和合作，以及反映我国人民对共产党和毛主席的热爱，如果把这些说成旧社会的歌功颂德，这就是歪曲事实和对人民的污蔑。","type":"paragraph"},{"text":"我也不同意“真正的文人是反现状的，从古以来好文章都是反现状的”说法。诚然，在剥削阶级占统治的社会里，“真正的文人”是反“现状”的，因为他们的文章或多或少代表了人民的要求和愿望，所以才博得“真正的文人”的称号。在工人阶级掌握政权的社会里，“文人”除了反对旧社会遗留下的遗毒外，更主要的是对新事物加以反映和宣传，否则他们就不是人民的“文人”。但是，按照杨玉清的说法，“文人”必须起来反对我们社会上的一切现象，包括建设社会主义和人民民主专政在内，然而这是我国人民所绝对不允许“反”的。","type":"paragraph"},{"text":" 北京政法学院学生  王英富","type":"paragraph"},{"text":"——原载《人民日报》1957年6月9日","type":"appellation"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a65bfd532d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
