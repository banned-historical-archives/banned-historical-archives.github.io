ical-archives/banned-historical-archives0/main/maoquanji29.pdf"],"article":{"title":"对成立化学兵学校报告的批语","alias":"","parts":[{"type":"paragraph","text":"对成立化学兵学校报告的批语\""},{"type":"paragraph","text":"（1950年12月11日）同意照周所拟办理。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十二月十一日"},{"type":"paragraph","text":"[1]这是毛泽东对中央人民政府人民革命军事委员会总参谋部军事训练部部长萧克1950年11月2日报告的批语。"},{"type":"paragraph","text":"[2]指周恩来1950年12月2日在萧克报告上批示的意见。萧克的报告说：在对美帝为首的侵略集团作战中，随时有遭受敌人毒气攻击的可能，而我军在这方面现在几乎完全没有精神准备和物质准备，故必须立即成立化学兵学校。首先培养防毒人才，学习化学战术知识，然后进一步加强化学兵机构装备。报告并提出学校筹建的具体意见。周恩来在萧克报告上批示：拟原则同意，第一年人数可较少点，定为800名，200名由各大军区抽去年参军的南下工作团学生，600名征调志愿学生。"}],"authors":["毛泽东"],"dates":[{"year":1950,"month":12,"day":11}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":441,"page_end":441},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"382554d62f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
