ical-archives/banned-historical-archives0/main/maoquanji31.pdf"],"article":{"title":"转发装甲兵司令部关于精简节约工作报告的批语","alias":"","parts":[{"type":"paragraph","text":"转发装甲兵司令部关于精简节约工作报告的批语"},{"type":"paragraph","text":"（1951年12月5日）中央和军委各部门，中央人民政府各党组，各中央局并转分局，：各省市区党委，各大军区并转各级军区，军事学院，志愿军党委："},{"type":"paragraph","text":"（一）这是我们所收到的军事方面的第一个精简节约的报告，特转发你们参考。（二）反贪污应和精简节约及反对浪费分开来做，须作全面的调查分析，号召坦白和检举，才能彻底暴露一切贪污人员而加以分别的处理。装司这个报告着重在精简节约和反对浪费方面，并且还只是部分的开始，但已很有意义，使人高兴。（三）望全军立即展开这一斗争，发动全体指战员，进行（甲）精简节约反对浪费，（乙）反对贪污，并将这二者既分开而又联系起来。（四）一切军事部门均应向军委作报告。"},{"type":"paragraph","text":"毛泽东一九五一年十二月五日"}],"authors":["毛泽东"],"dates":[{"year":1951,"month":12,"day":5}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":113,"page_end":113},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b54df4dac5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
