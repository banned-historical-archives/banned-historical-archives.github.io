ical-archives/banned-historical-archives8/main/maoquanji11.pdf"],"article":{"title":"关于克服对国民党的投降主义倾向的指示","alias":"","parts":[{"type":"paragraph","text":"关于克服对国民党的投降主义倾向的指示！!"},{"type":"paragraph","text":"（1937年10月13日）小开、刘小《晓）二同志，并告博、叶、周、胡、林："},{"type":"paragraph","text":"（甲）民族资产阶级的影响，在部分左倾领袖及党员中是在增长，主要表现在对于国民党的投降，只知同国民党统一，处处迁就他的要求，而不知同他的错误政策做斗争。"},{"type":"paragraph","text":"（乙）民族统一战线不但不取消对于国民党的错误政策进行批评与斗争，而且只有在这一基础上，才能使统一战线充实巩固起来，使之继续前进。只有使国民党感觉到群众对于自己的不满与压迫，才能推动它在各方面的彻底转变。同国民党和平共居，只能延长他的错误政策的寿命。"},{"type":"paragraph","text":"（丙）对于国民党投降主义倾向必须开始斗争。对个别左倾领袖如章乃器等的这类错误，适（应》在报纸上有适当的批评。批评的态度应以说服为主，暂时可不指其名。这类左倾领袖今天起着把革命群众带给资产阶级的作用。"},{"type":"paragraph","text":"（丁）国民党在华北失败后，气焰大杀，其内部如陈诚、胡宗南、卫立煌等实力派对国民党老政策均表不满，更由于八路军在华"},{"type":"paragraph","text":"[1]这是毛泽东和洛甫（张闻天）给潘汉年、刘晓的电报。[2]指博古（秦邦宪)、叶剑英、周恩来、胡服（刘少奇）、林伯渠。北的模范作用，以及国际形势的转变，使我们在政治上处于完全优势。因此我们应不失时机对国民党的错误政策采取攻势的批评与斗争，主要方向首先是在改组国民党，然后及于改组政府与改造军队，这不是使国共合作分裂，而是使之更进一步的开展。"},{"type":"paragraph","text":"洛毛十月十三日"}],"authors":["毛泽东"],"dates":[{"year":1937,"month":10,"day":13}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":243,"page_end":244},"tags":[{"name":"毛泽东","type":"人物"},{"name":"世界形势","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"28ee1351aa"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
