<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoistlegacy.de-5384","name":"中共中央关于处理反革命分子和各种犯罪分子自首问题的指示（节录）","author":"中共中央","internal":false,"official":false,"type":"unknown","files":[],"article":{"title":"中共中央关于处理反革命分子和各种犯罪分子自首问题的指示（节录）","dates":[{"year":1956,"month":1}],"is_range_date":false,"authors":["中共中央"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"最高人民法院刑事审判第二庭, 刑事申诉工作手册, 145-146","tags":[{"name":"反革命","type":"主题/事件"},{"name":"自首","type":"主题/事件"}],"parts":[{"type":"paragraph","text":"中共中央"},{"type":"title","text":"关于处理反革命分子和各种犯罪分子自首问题的指示（节录）"},{"type":"subtitle","text":"（一九五六年一月）"},{"type":"paragraph","text":"1955年镇压反革命运动中，自首的反革命分子和各种犯罪分子有一个相当大的数目，仅据17个省、市1955年7至10月份不完全的统计，向人民政府、公安机关自首的分子即有xx万xx余名，其中不少是有重大历史罪恶，或有现行破坏活动的反革命分子和各种犯罪分子，也有很大一部分是没有什么严重的历史罪恶、没有现行活动的一般敌伪军、政、警、宪和反动党团人员。这些自首的分子绝大多数是真诚的，也有极少数是假自首的。"},{"type":"paragraph","text":"这种大批反革命分子自首的情况，说明这次镇反运动震动了敌人，使敌人有了分化，使一部分反革命分子有了动摇。正确地对待前来自首的分子和正确地处理（这一大批）已经自首的分子，对于继续分化瓦解敌人，彻底肃清一切暗藏的反革命分子，有着重要的意义。因此："},{"type":"paragraph","text":"（一）对于前来自首的分子，应当采取欢迎的态度，应当首先稳定他们的情绪，向他们讲清楚坦白从宽、立功折罪、立大功受奖的政策；鼓励他们彻底坦白交代自己的问题，要他们检举自己所知道的反革命分子和各种犯罪分子。同时也对他们说明不坦白从严的一方面。"},{"type":"paragraph","text":"（二）对于前来自首的分子，一律不要立即拘留或逮捕，要他们回去安心生产，听候政府处理，并告诉他们如果一次没有交代彻底，应该继续交代。"},{"type":"paragraph","text":"为了防止发生意外，对必须予以监视控制的，可采取秘密监视的办法监视起来，并且迅速查明其坦白材料的确实程度，按其罪恶大小、有无立功和立功大小等情况，妥善处理。"},{"type":"paragraph","text":"（三）对于自首分子应当从宽处理："},{"type":"paragraph","text":"甲、对自首分子一般应根据他坦白的程度予以减刑，罪恶不甚严重而坦白真诚的，或罪恶虽然比较严重而坦白真诚又有显著的立功表现的，可免予处刑。"},{"type":"paragraph","text":"乙、对于经过调查证实，罪恶很大，依法应当判处死刑的分子，如果他们基本上是真诚坦白的，一般可以不再处死，而釆取判处长期徒刑或较长期徒刑的办法劳动改造；即使是罪恶严重非杀不可的分子，也可以采取判处死刑缓期执行以观后效或判无期徒刑的办法，而不要马上处死。"},{"type":"paragraph","text":"丙、对于可捕可不捕的分子和没有现行活动的一般敌伪军、政、警、宪和反动党团分子，应向他们宣布从宽处理，免予惩办，以消除其顾虑，使其安心劳动生产。"},{"type":"paragraph","text":"（四）对于有现行活动的反革命分子以及同现行反革命案件有关的分子，自首后可由公安机关根据深入侦察的需要，加以控制使用，促其继续立功赎罪。"},{"type":"paragraph","text":"（五）对于经过调查证实，属于假坦白而有罪恶的分子，或借假坦白作掩护而继续进行反革命活动的分子，则应当严肃对待，依法逮捕惩办。但是，对于那些坦白了一些问题，而隐瞒了重大罪恶的分子，则不要以假坦白论处，而应当继续进行工作促其坦白，经过工作仍然不坦白的分子，再依法给予应得的惩办。"}],"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"36d35e60ab"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
