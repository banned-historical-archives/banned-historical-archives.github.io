ical-archives/banned-historical-archives8/main/maoquanji16.pdf"],"article":{"title":"关于敌后各根据地领导方法的指示","alias":"","parts":[{"type":"paragraph","text":"关于敌后各根据地领导方法的指示\""},{"type":"paragraph","text":"（1941年12月12日）德怀、瑞卿同志："},{"type":"paragraph","text":"估计到敌后各根据地间交通已经很困难，今后更加难于通过，乘往费时间，因此要求我们对各根据地的领导方法上注意下列各点：（一）详细研究各地之书面报告及电报。（二）与各地来往人不管其职务如何）详细谈话及调次要负责人受训，利用机会收集材斜。（三）派人及组织巡视团，到各地检查工作搜集材料。（四）全毕北的高干会议、政治工作会议不宜召集，因主要负责人来往费，得不偿失。（五）召集晋东南、冀南的各种会议（如锄奸、敌伪等会议)，做出结论，介绍给其他根据地。领导方法之最重要的一个回题，就是利用一切可能进行调查，收集材料，对敌后抗战的各个体问题加以深入研究，得出具体结论。"},{"type":"paragraph","text":"毛朱王谭傅"},{"type":"paragraph","text":"一九四一年十二月十二日[1]这是毛泽东和朱德、王稼祥、谭政、傅钟联名给彭德怀、罗瑞卿的"}],"authors":["毛泽东"],"dates":[{"year":1941,"month":12,"day":12}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":319,"page_end":319},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b08703326a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
