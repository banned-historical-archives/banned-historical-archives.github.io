<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"“文革”期间查抄的金银财物应当归还","authors":[],"dates":[{"year":1987,"month":4,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编辑同志:"},{"type":"paragraph","text":"我家在一九六六年八月三十一日和九月一日，连续两次被大队干部抄去金手镯二只，金戒指二十三只，还有白银、银元、珍珠和麝香等一批贵重物品。当时由经手人清点计数，出具收据，我至今还保存着这些原件。党的十一届三中全会后，我从财政、银行等部门查实，我家被查抄的金银财物既没有上交国库，又没有卖给银行。因此，我多次到大队、公社(现在的乡政府)和县有关部门去要求发还原物，可他们以“原物下落不明”为由，上推下卸，至今不予解决。请问，我该怎么办?"},{"type":"paragraph","text":"温岭县　颜子春"},{"type":"paragraph","text":"颜子春同志:"},{"type":"paragraph","text":"从你来信和附来的清单原件来看，你提出归还原物的要求是合理合法的，应当受到当地政府机关的重视和法律上的保护。"},{"type":"paragraph","text":"公民的合法财产受法律保护，宪法巴有明文规定。为了使这个规定切实得到贯彻，中央和国务院有关部门多次发文，要求将“文化大革命”中被非法查抄的金银财物归还给原主。去年初，中央和国务院有关部门又发文指出，“文化大革命”中查抄的金银及其制品，已经上交国库的，不再清退原物，折人民币后给价款；没有上交国库，原物尚在，原主索要的应该归还原物。稀有的金银古币，可以作为文物对待，虽已上交国库，如果原物还在，也应归还原物。清退金银及其制品的折价款，应按退还原主时的牌价作价，过去没有按照退还原主时牌价作价，原主要求补差的，应按过去退还时的牌价补差。补差价所需经费，由落实政策单位负责；如数额过大，单位不能负担的可由同级财政给予补贴。“文化大革命”中查抄的其他财物，已经发给变卖价款的，一般不再重新处理。"},{"type":"paragraph","text":"有关单位在清退“文化大革命”中查抄的金银财物等贵重物品时，对于当时经手查抄和保管这些查抄金银财物的当事人推托这些原物已经遗失的，不能听之任之，随意轻信，应当查个水落石出。凡是当时查抄的手续清楚，有经手人、保管人出具的证据可查，而又确实没有移交给上级机关或变卖的，上级机关要责令当事人交出原物。当事人以种种借口不肯交出原物的，上级机关除了按上述规定作价赔偿原主外，可由落实政策的单位向当地法院提起诉讼，依法追究经手人的法律责任。"},{"type":"paragraph","text":"本刊法律顾问组"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5fd33f42ef"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
