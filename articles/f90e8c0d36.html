ical-archives/banned-historical-archives0/main/maoquanji29.pdf"],"article":{"title":"关于统筹两广对付美蒋进犯","alias":"","parts":[{"type":"paragraph","text":"关于统筹两广对付美蒋进犯"},{"type":"paragraph","text":"（1950年11月17日）剑英同志，并告方方及邓、谭："},{"type":"paragraph","text":"（一）你十一月廿一日动身去广西甚好。（二）广东必须迅速地和广泛地展开土地改革工作，你们布置如何盼告。（三）只要广东的土改完成，广西的土匪消灭，即使蒋介石登陆进犯也是容易对付的。（四）你们必须统筹两广，将两广作为一个对付帝国主义和蒋介石登陆进犯的统一的单位，不要只顾一省。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十一月十七日"},{"type":"paragraph","text":"[1]剑英，即叶剑英，当时任中共中央华南分局第一书记、中国人民解放军广东军区司令员兼政治委员。"},{"type":"paragraph","text":"[2]方方，当时任中共中央华南分局第三书记。"},{"type":"paragraph","text":"[3]邓，指邓子恢，当时任中共中央中南局第三书记、中国人民解放军中南军区第二政治委员。谭，指谭政，当时任中共中央中南局常务委员、中国人民解放军中南军区第三政治委员。"}],"authors":["毛泽东"],"dates":[{"year":1950,"month":11,"day":17}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":371,"page_end":371},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f90e8c0d36"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
