year":1996,"month":12,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"朝报警告日本当局勿与极右势力为伍"},{"type":"paragraph","text":"新华社平壤１２月１６日电朝鲜《劳动新闻》今天发表评论指出，日本当局不要与极右势力为伍。"},{"type":"paragraph","text":"评论罗列了日本今年一系列的右倾表现：首相和一些内阁成员以及许多国会议员参拜靖国神社；自民党把参拜靖国神社写进大选竞选公约，并要访日的外国元首参拜靖国神社；内阁成员、国会议员把过去的侵略罪行说成“正义”的谰言层出不穷；政府同美国签署“日美安保联合宣言”，把日本的作战范围扩大到整个亚太地区，等等。"},{"type":"paragraph","text":"评论指出，这说明，右倾化已成为日本的“国策”。日本当局把责任推给“国内右翼势力”是为了掩人耳目。"},{"type":"paragraph","text":"评论最后警告日本当局不要与极右势力为伍，并放弃蒙骗国际舆论的企图，否则，它将受到更加强烈的谴责和反对。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6cbf0cbc7e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
