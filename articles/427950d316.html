tes":[{"year":1976,"month":8,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"“毛泽东号”机车组党小组在批邓中努力学习积极战斗"},{"type":"paragraph","text":"“毛泽东号”机车组党小组在批邓、反击右倾翻案风斗争中，把组织党员、群众学习马列著作和毛主席的重要指示放在首位，坚持在斗争中学，在斗争中用。他们根据机车组人员流动分散的特点，采取正常跑车按班学，压火洗修集中学和交流学习心得体会等多种形式坚持学习。他们把革命导师的重要语录摘抄下来，进行专题学习，同时对邓小平的谬论和右倾翻案风的奇谈怪论进行专题批判。这样专题学，专题批，“红箭射黑靶，画皮剥得透，要害批得深”。"},{"type":"paragraph","text":"在党小组带领下，全组同志牢记工人阶级历史使命，胸怀共产主义大目标，工作不计时间，劳动不讲报酬。为了庆祝“毛泽东号”诞生三十周年，他们豪迈地提出：铁路工人钢铁汉，誓与邓小平对着干，安全走行三百万（公里），多拉快跑作贡献。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"427950d316"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
