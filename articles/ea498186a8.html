要利用外资和发挥原工商业者的作用","dates":[{"year":1979,"month":1,"day":17}],"is_range_date":false,"authors":["邓小平"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"中共中央统一战线工作部, 中共中央文献研究室, 新时期统一战线文献选编, 16-17","tags":[{"name":"落实政策","type":"主题/事件"},{"name":"侨务","type":"主题/事件"},{"name":"荣毅仁","type":"主题/事件"},{"name":"投资","type":"主题/事件"},{"name":"原工商业者","type":"主题/事件"}],"parts":[{"type":"title","text":"搞建设要利用外资和发挥原工商业者的作用*"},{"type":"subtitle","text":"（一九七九年一月十七日）"},{"type":"subtitle","text":"邓小平"},{"type":"paragraph","text":"听说你们对如何搞好经济建设有很好的意见和建议，我们很高兴。今天就谈谈这个问题。"},{"type":"paragraph","text":"现在经济建设的摊子铺得大了，感到知识不够，资金也不足。党的十一届三中全会决定把工作重点转移到社会主义现代化建设上来。过去耽误的时间太久了，不搞快点不行。但是怎样做到既要搞得快点，又要不重犯一九五八年的错误，这是个必须解决的问题。我们现在搞建设，门路要多一点，可以利用外国的资金和技术，华侨、华裔也可以回来办工厂。吸收外资可以采取补偿贸易的方法，也可以搞合营，先选择资金周转快的行业做起，如轻纺工业、手工业、旅游业等，以换取外汇。当然，利用外资一定要考虑偿还能力。"},{"type":"paragraph","text":"要发挥原工商业者的作用。有真才实学的人，应该把他们找出来，使用起来。能干的人，就当干部。对这方面的情况，你们比较熟悉，可以多做工作。比如说旅游业，你们可以推荐有本领的人当公司经理，有的可以先当顾问。还要请你们推荐有技术专长、有管理经验的人管理企业，特别是新行业的企业。不仅是国内的人，还有入了外籍的，都可以用，条件起码是爱国的，事业心强的，有能力的。"},{"type":"paragraph","text":"要落实对原工商业者的政策。这也包括他们的子孙后辈。他们早已不拿定息了，只要没有继续剥削，资本家的帽子为什么不摘掉？落实政策以后，工商界还有钱，有的人可以搞一两个工厂，赚取外汇，也可以投资到旅游业。手里的钱闲起来不好。你们可以有选择地搞。总之，钱要用起来，人要用起来。"},{"type":"paragraph","text":"荣毅仁同志，你主持的中国国际信托投资公司，要规定一条：给你的任务，你认为合理的就接受，不合理的就拒绝，由你全权负责处理。处理错了也不怪你。要用经济方法管理经济，从商业角度考虑签订合同，有利润、能创汇的就签订，否则就不签。应该完全排除行政干扰。所谓全权负责，包括用人权。只要把社会主义建设事业搞好，就不要犹豫。"},{"type":"paragraph","text":"*这是邓小平同志接见胡厥文，胡子昂、荣毅仁等工商界领导人时谈活的摘要。"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ea498186a8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
