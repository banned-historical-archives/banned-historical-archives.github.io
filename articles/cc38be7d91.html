art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"上海郊区开挖淀浦河工程全线动工这是上海解放以来一项最大的农田水利工程，也是对“四人帮”阻挠和破坏上海郊区农业学大寨运动的有力回击","authors":[],"parts":[{"type":"paragraph","text":"据新华社上海电 在第二次全国农业学大寨会议胜利召开的喜讯鼓舞下，上海郊区人民开挖淀浦河的工程已于一九七六年十二月中旬全线动工。这是上海解放以来一项最大的农田水利工程，也是对“四人帮”阻挠和破坏上海郊区农业学大寨运动的有力回击。"},{"type":"paragraph","text":"正在开挖的淀浦河，西起青浦县淀山湖九曲港，东至上海县境内黄浦江船华渡口，贯穿青浦、松江、上海三个县，全长四十六公里，河面宽五十至六十米。全线将建造二座铁路桥、八座公路桥、二十六座拖拉机桥和三座水闸。它开成后将给上海郊区西部地区增添一条东西向的排水干河，使这一地区在遇到汛期、暴雨时能迅速排出积水。这对降低青浦、松江两县五十多万亩低洼地的地下水位，免除洪涝灾害，改良土壤，保证作物丰收，有着很大作用。淀浦河的开成，将为沪、宁、皖省、市之间增辟一条比原来航道缩短航程三十公里，能通航一百吨船只的六级航道，有利于城乡物资交流；还将对改善黄浦江和市区饮用水的水质提供条件，也有利于消灭血吸虫病。"}],"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cc38be7d91"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
