" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"新湖南报发现反动刊物","authors":[],"dates":[{"year":1950,"month":11,"day":2}],"is_range_date":false,"parts":[{"text":"新湖南报发现反动刊物","type":"title"},{"text":"【新湖南报11月2日讯】新湖南报收到一封自桂北寄给匪特伍曙光（系伪中央日报记者，国民党特务，是解放前惨杀高继青主犯之一）的信及反动刊物《正义之声》两期。伍匪原住新湖南报现在地址，因伍匪已被我逮捕，故获此信。信中写道：“曙光同志：朝共战争共匪一再惨败，国内沿海线大军即将登陆，刻川黔贵各省反共军声势浩大，已使共匪受到严重打击，其死路将近矣，请即发动长市新闻界同志及早遵照密切行事，望勿观望，并盼多通讯为要。”此信写在油印品末。","type":"paragraph"},{"text":"信内有《正义之声》第28期（9月25日）、第35期（10月7日）两份共四张，内容分“国际新闻”、“国内新闻”、“战地新闻”三栏，以“美联社、合众社、路透社、中央社”等为头衔，长沙谣言即来源于该刊物中，如：“匪首萧靖（原文如此）光在韩被炸”，“百万份召降传单，投向北韩地区”，“南韩军继续挺进，菲军已抵韩待命”等等。","type":"paragraph"}],"comments":[],"origin":"新华社《内部参考》1950年11月25日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2905634180"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
