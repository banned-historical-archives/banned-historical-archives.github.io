唯一出路是同修正主义进行斗争，重建无产阶级专政","authors":[],"dates":[{"year":1968,"month":11,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"希共马列主义小组谴责苏修侵捷罪行"},{"type":"paragraph","text":"苏修社会帝国主义真面目暴露无遗"},{"type":"paragraph","text":"捷克斯洛伐克人民的唯一出路是同修正主义进行斗争，重建无产阶级专政"},{"type":"paragraph","text":"新华社十五日讯  侨居外国的希腊共产党马克思列宁主义小组不久前发表声明，强烈谴责苏修叛徒集团武装侵略和军事占领捷克斯洛伐克的罪行。声明指出，这一事件彻底暴露了苏修社会帝国主义的真面目。"},{"type":"paragraph","text":"声明说：“苏联修正主义者早已出卖了社会主义和践踏了无产阶级国际主义，当他们竭力把对捷克斯洛伐克进行的军事侵略和占领说成是‘保卫’社会主义和无产阶级国际主义的行动时，他们的帝国主义面目已暴露无遗。”"},{"type":"paragraph","text":"声明接着说：“苏联侵略者的侵略行为只能加深人民的愤慨，只能加强捷克斯洛伐克人民和一切战斗的人民对帝国主义和修正主义的阴谋的反抗和斗争。"},{"type":"paragraph","text":"“尽管捷修发出了投降的号召，捷克斯洛伐克人民仍然站了起来，组织了各种形式的反抗和斗争，以便摆脱入侵者的军事占领的统治。"},{"type":"paragraph","text":"“对于经受严峻考验的捷克斯洛伐克人民来说，唯一的出路是对苏联修正主义者、帝国主义者和本国反动派进行斗争，争取民族独立和自由，保卫其社会主义成果，重建和巩固无产阶级专政，争取社会主义在捷克斯洛伐克的胜利”。"},{"type":"paragraph","text":"声明强调说：“由于希腊共产党的投降主义，机会主义的领导和修正主义的叛卖，希腊人民在美帝国主义的法西斯统治下正经受着残酷的考验，通过捷克斯洛伐克事件，希腊人民更清楚地看到反对帝国主义和反对法西斯的斗争是与反对现代修正主义的斗争不可分割的”。"},{"type":"paragraph","text":"声明最后说：居住在国外的希腊革命战士“不论在哪里生活和工作，他们都将把自己的反帝反修斗争与世界人民捍卫独立、捍卫马克思列宁主义、争取社会主义和共产主义的斗争联系在一起。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"aee2d4eeeb"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
