ors":[],"dates":[{"year":1965,"month":4,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　一九六四年度上海市体育运动队伍评选四好运动队和五好运动员给奖大会于七日在市体育俱乐部举行。男子排球一队、女子篮球一队、男子乒乓球队、跳水队第一组等四个集体获得了四好运动队称号。乔元、朱振华、王后军、陈敏英、龚俊平、杨明明、于淑钏、宣耀伦、旋晓梅、岑阿七、赵素霞、蒋时祥等八十人被评为五好运动员。另有女子乒乓球队、网球队、游泳队、男子体操第三组、田径四百米跑组等五个单位受到大会表扬。"},{"type":"paragraph","text":"这次被评上的四好运动队和五好运动员，在过去的一年中，在活学活用毛主席著作方面都取得了较大的收获，他们提高了阶级觉悟，进一步树立了干体育就是干革命的思想，能把祖国荣誉放在第一位，因而，在训练中能够勤学苦练，技术上进步较快。如女篮一队去年全年坚持学习毛主席著作，以毛泽东思想指导训练、比赛、生活，使队员们的思想面貌起了显著的变化，促进了运动水平的提高。"},{"type":"paragraph","text":"中共上海市委教育卫生工作部副部长、市人委文教办公室副主任陈琳瑚在授奖大会上讲了话，他首先向四好运动队和五好运动员表示热烈的祝贺。他说:运动员要继续高举毛泽东思想红旗，把四好、五好运动坚持下去，特别要突出政治，一定要用毛主席的思想的“矢”，射自己身上存在的问题的“的”。他希望运动员都要学习解放军的“四个第一”和“三八作风”，争取做一个雷锋式的好青年。"},{"type":"paragraph","text":"最后四好运动队代表和五好运动员虞强鸣、乔元、张秀英、朱挺等十人在会上发言，他们表示:要听党的话，努力学习毛主席著作，以勤学苦练的实际行动迎接第二届全国运动会。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"上海文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f6afa61dce"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
