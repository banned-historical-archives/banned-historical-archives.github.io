script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"革命科技人员决不走个人奋斗道路上海科技界批判党内头号走资本主义道路当权派推行修正主义科研路线的罪行","authors":[],"dates":[{"year":1967,"month":4,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　《爱国主义还是卖国主义?》一文的发表，在上海的科学技术界激起了强烈的反响。广大革命科技人员和革命职工，怀着无比愤怒的心情，控诉和声讨这个中国赫鲁晓夫的滔天罪行。"},{"type":"paragraph","text":"连日来，中国科学院华东分院在上海地区的研究所、一机部电缆研究所、上海市建筑科学研究所、上海市农药研究所等单位的革命科技人员和革命职工，纷纷集会或示威游行，热烈欢呼《红旗》杂志发表的这篇重要文章，是毛泽东思想的又一伟大胜利，是向党内最大的走资本主义道路当权派发动总进攻的进军号。他们指出，这个以“老革命”自居的假革命、反革命头目，解放以来，竭力反对社会主义革命，反对农业合作化，鼓吹“三自一包”、“三和一少”的修正主义路线，宣扬阶级斗争熄灭论，恶毒攻击三面红旗，破坏社会主义教育运动，在文化大革命运动中提出和推行资产阶级反动路线，猖狂镇压革命群众，罪行累累，罄竹难书。他们说，对于这个反革命修正主义总头目，就是要抡起毛泽东思想的千钧棒，予以迎头痛击!"},{"type":"paragraph","text":"一些身受修正主义科研路线毒害的革命科技人员说，党内最大的走资本主义道路当权派及一小撮党内走资本主义道路当权派，长期来在科研院所推行修正主义科研路线，强调技术至上，鼓吹个人奋斗的道路，听任资产阶级“学者”、“权威”垄断科研实权，残害社会主义科学事业。今天，他们妄想在科学技术部门实现资本主义复辟的阴谋已遭到可耻的失败。我们决心彻底批判修正主义科研路线，并肃清其流毒，使科技界成为光焰无际的红彤彤的毛泽东思想的新天地，狠抓革命，猛促科研，力争把我国科学技术在不太长的时间内赶上和超过世界先进水平。"},{"type":"paragraph","text":"革命科技人员和革命职工坚决表示，他们决心在毛泽东思想的伟大红旗下，在向党内最大的走资本主义道路当权派的斗争中，紧密地团结起来，实现革命的大联合和革命的“三结合”，狠抓革命，猛促科研，誓把文化大革命进行到底!"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fb483a9657"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
