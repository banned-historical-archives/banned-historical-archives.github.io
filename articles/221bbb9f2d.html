ical-archives/banned-historical-archives8/main/maoquanji10.pdf"],"article":{"title":"关于提醒杨虎城等对整个政治前途自信心致周恩来、博古电","alias":"","parts":[{"type":"paragraph","text":"关于提醒杨虎城等对整个政治前途"},{"type":"paragraph","text":"自信心致周恩来、博古电"},{"type":"paragraph","text":"（1937年1月30日）周、博："},{"type":"paragraph","text":"（甲）杨说愿意做我们政策牺牲品，应向他说明此政策非我们的，乃张、杨与我们共同的。提醒他对整个政治前途之自信心，对其他高级于部亦然，经过他们去提醒中级干部，认识自己的前途，并说明我们与他们始终愿在一起，为和平统一御侮救亡之总方针而奋斗。撤兵后蒋如食言进攻，彼时曲在蒋，我们则为最后自卫而战，国人当同情，我们现在作战则失去国人同情。"},{"type":"paragraph","text":"（乙）对东北军宜以张汉卿主张和平解决电为根据说话，说明张之意见是正确的。"},{"type":"paragraph","text":"（丙）杨之绥署宜设三原，王树常宜来。"},{"type":"paragraph","text":"（丁）杨如不愿放弃富、甘两城，可仍交还他，我们驻乡下可也。"},{"type":"paragraph","text":"毛泽东三十日三时半"}],"authors":["毛泽东"],"dates":[{"year":1937,"month":1,"day":30}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":175,"page_end":175},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"博古","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"221bbb9f2d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
