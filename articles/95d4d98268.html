:[],"dates":[{"year":1968,"month":1,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"在夺取无产阶级文化大革命全面胜利的进军号声中，从河南省传来了振奋人心的喜讯:河南二七公社、开封八二四和河南造总两派革命群众组织，以毛主席的最新指示为指南，以“斗私，批修”为纲，在革命原则下达成大联合协议，成立河南省革命大联合委员会，为进一步巩固和发展全省革命大联合做出了新贡献。这是战无不胜的毛泽东思想的伟大胜利，是毛主席的无产阶级革命路线的伟大胜利。"},{"type":"paragraph","text":"十一日下午，河南二七公社、开封八二四和河南造总的代表、广大革命群众和人民解放军指战员，隆重集会，热烈庆祝河南省革命大联合委员会的光荣诞生。河南省革命委员会筹备小组、河南省军区党委以及郑州市革筹小组、郑州警备区的负责人刘建勋、陈桂昌、王辉等同志，出席了大会。"},{"type":"paragraph","text":"庆祝大会在雄壮的《东方红》歌声中开始。在全场热烈的掌声中，宣读了河南省革命大联合委员会向我们心中最红最红的红太阳毛主席报喜的致敬电。"},{"type":"paragraph","text":"河南省革命大联合委员会的光荣诞生，是河南省无产阶级革命派、革命群众坚决贯彻执行毛主席最新指示所取得的丰硕成果，是以“斗私，批修”为纲，大办毛泽东思想学习班的重大成就。在河南省革筹小组、省军区党委不久以前举办的毛泽东思想学习班里，河南二七公社、开封八二四和河南造总的代表们，经过三方代表的反复酝酿和充分协商，在革命的原则下，求大同、存小异，他们最后达成协议，三方各派出七名代表组成了河南省革命大联合委员会。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"河南文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"95d4d98268"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
