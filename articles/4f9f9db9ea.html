<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"帮助党进行整风就要提反面意见","authors":[],"dates":[{"year":1957,"month":6,"day":10}],"is_range_date":false,"parts":[{"text":"帮助党进行整风就要提反面意见","type":"title"},{"text":"本报讯　为了帮助共产党整风，民革陕西省委员会在十日下午，召集了陕西省、西安市参事室参事中的民革成员二十人举行座谈会，征求意见。","type":"paragraph"},{"text":"陕西省政协委员、陕西省参事室参事张镜白在发言中，对共产党提出了四点批评和意见，他说，我首先想谈谈严肃法制问题。有些共产党员本身具有优越感，对国家法制很忽视，认为自己是共产党员，如果犯了错误，小的检讨一下，或在党内批评一下，大的不过调动一下职务，换换环境，没有什么了不得的事。而党对党员也有些偏护，只要是党员就可曲法相从，这样作不特破坏国家法制，而且增加了党员的优越感，觉得自己与众不同，甚或认为一入党便成了“铁饭碗”，便可任意胡作非为，国家法制管不到他。如岐山县“六一”农业社社委员兼队长谢永福是个共产党员，屡对社员蛮横无理，经常打骂群众，弄得社内不团结，群众的意见很大，但县委总觉得这个人工作积极负责，对谢所犯的错误，没有认真彻底处理。因此他认为今后应该严肃法制，必须铁面无情，不能因人而异，这样才能消除部分党员的优越感和特权思想。","type":"paragraph"},{"text":"第二，要提高入党标准，抓紧对新党员的教育。有些人在未入党前，表现得很积极，也能联系群众，努力工作，但在入了党以后，态度就改变了，认为自己的一切都比别人强，比别人先进，瞧不起别人，骄傲自满，脱离群众，满脸共产党员味，包括个别老党员在内，使人望而生畏。有些党员自己不学无术，反而嫉妒别人才能比他强。少数党员以他个人好恶出发向上汇报情况，来处理事情，更恶劣的是假借党在群众中的威信，狐假虎威。因此，加强对这些党员的教育很重要。","type":"paragraph"},{"text":"第三，党员兼职过多，现在已成为司空见惯的事，党从未考虑党员的才能如何?兼职的效果如何?以及身体条件如何？而只要是共产党员便认为政治上可靠，把事情贻误了或办坏了都在所不惜，这是严重的宗派主义在作怪。结果有的因兼职过多而顾此失彼，有的把好事办成坏事，有的空挂虚名放弃职责。而非党人士无职无权，只能在一边袖手旁观。所以有人就怀疑党对知识分子的团结、教育、改造的政策，因为只是长期改造，而不加使用，使他们对事业失掉了积极性，增加了“作客思想”和“雇佣观点”。在这次整风中，应该纠正党员兼职过多的现象，放手使用非党人士，才能在社会主义建设中收到群策群力之效。","type":"paragraph"},{"text":"最后，他谈了对“墙”和“沟”的看法。他说，最近有一部分人士认为墙和沟是由双方造成的，拆墙填沟必须由双方共同动手。我不同意这种看法，因为党外人士无时无刻都在争取党的领导，以能紧密地团结在党的周围、共同建设社会主义事业而努力为最大的光荣。但是部分共产党员却高高在上，盛气凌人，与党外人士相处不运用“团结、批评、团结”的公式，而是拒人于千里之外，甚至有极少数共产党员认为国家的一切大事都应该由共产党包办，统一战线、民主协商都是多余的，因此才逐渐形成“墙”高“沟”深。他认为在这次整风中应该使党员切实明瞭党的统一战线政策，改变对民主党派的看法和作风，由高人一等的位置降到互交朋友，由盛气凌人改变为平易近人，这样“墙”和“沟”就会逐渐消灭了。","type":"paragraph"},{"text":"陕西省参事室参事潘禹九，谈起党这次发起的整风运动，表示十分高兴。他说，党外人士是国家的一分子，周绕在党的周围，党要清除“三害”，他们是踊跃协助的。他说，他在最近的几天里，有一点感觉或者说是错觉。前些日子，某人民团体的负责人说，现在好多党外人士大喊大叫，说他们是有职无权，如果要给他们权，他们能干得了吗?这意味着什么?是不是说，既有了名位就算了吧？六月七日人民日报二版上发表了一篇读者来信，题目是：希望龙云先生到我们学校看看。文章中写着，如果我们的父母都是骑在人民头上作威作福或是贵族，我们都是一些少爷、公子哥儿之流，人民指着鼻子骂我们，是起码应有的斥责。这又意味着什么?是不是说，你还能给我们提意见吗?西安日报九日头版头条消息，首都石景山钢铁厂职工，驳斥离开社会主义的错误言论。从这些报道的字里行间看不出我们工作中有什么问题，那还整什么风呢?潘禹九说，是叫党外人士大胆提意见帮助整风呢?还是叫歌功颂德呢？他说，我不反对提正面意见，共产党的劳苦功高，只要是爱国的人，稍有良心的人，谁都承认，但今天为了改进工作，党进行整风，叫大家提意见，不是叫大家说什么好、什么好的问题，如果是为了这个，他说，我根本没有意见。他认为，所谓叫提意见就是提反面意见，而报纸上把歌功颂德的话那样登出来，能起什么作用?对整风有无好处?他说，自古以来的执政者，凡是喜欢听人说自己好的，都害事很大。今天，不管别人发表什么意见，人们都有眼有鼻，自然会辨别是非。","type":"paragraph"},{"text":"在座谈会上发言的还有陕西省参事室参事冯子明，西安市参事室参事宋端先、薛志超，陕西省参事室参事段韶九，西安市参事室参事孙作蕃(以发言先后为序)。他们在发言中，都对一些单位党组织和个别党员的宗派主义、官僚主义和主观主义提出了批评和意见，并提出了一些改进工作的建议。段韶九在发言中还建议党和人民政府把民法、刑法等早日完成，对于参加革命工作的知识分子包括民主党派人士和无党派民主人士中，还有人戴着地主阶级成分的“空帽子”，应该考虑早予摘掉。","type":"paragraph"}],"comments":[],"origin":"《西安日报》1957年6月11日。原题为: “潘禹九在省、市参事室民革成员座谈会上说：帮助党进行整风就要提反面意见，批评本报刊登石景山职工座谈的消息是歌功颂德”。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4f9f9db9ea"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
