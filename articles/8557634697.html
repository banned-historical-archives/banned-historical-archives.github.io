<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"文艺界对古典文学研究工作中的资产阶级唯心主义观点展开批判","authors":[],"dates":[{"year":1954,"month":11,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"‘文史哲’、‘光明日报’的‘文学遗产’专刊、‘人民日报’等报刊，最近陆续发表文章，对俞平伯关于‘红楼梦’研究的错误的立场、观点和方法展开批判。这是古典文学研究工作中以马克思列宁主义的观点来批判资产阶级唯心主义观点的尖锐斗争。"},{"type":"paragraph","text":"古典文学研究中的错误观点，在俞平伯的‘红楼梦研究’一书和‘红楼梦简论’等文中，表现得很突出。李希凡、蓝翎两位在‘文史哲’第九期和‘光明日报’的‘文学遗产’专刊第二十四期(十月十日)发表了“关于‘红楼梦简论’及其他”和“评‘红楼梦研究”’两文，批判了俞平伯研究‘红楼梦’的资产阶级立场、观点、方法。钟洛在十月二十三日“人民日报”发表了“应该重视对‘红楼梦’研究中的错误观点的批判”，分析了俞平伯对‘红楼梦’的基本论点的错误，指出李希凡、蓝翎的两篇文章是三十多年来向古典文学研究工作中的胡适之派的资产阶级立场、观点、方法进行反击的第一枪。指出这个问题按其实质来说是工人阶级对资产阶级在思想战线上的又一次严重斗争。"},{"type":"paragraph","text":"李希凡、蓝翎两位在十月二十四日的‘人民日报’上，又发表了‘走什么样的路?’，指出俞平伯在文学研究上，是‘以隐蔽的方式，向学术界和广大的青年读者公开地贩卖胡适之的实验主义，使它在中国学术界中间借尸还魂。’"},{"type":"paragraph","text":"中国作家协会在十月二十四日召开了关于‘红楼梦’研究的讨论会。华东作家协会在十月三十日，也召开了关于‘红楼梦’研究的讨论会。夏衍在华东作家协会的发言中指出关于‘红楼梦’研究的讨论不单单是研究‘红楼梦’一本书，或者对某个人研究‘红楼梦’的批判的问题，它的意义更在于要弄清接受文学遗产的基本问题:要用马克思列宁主义的立场、观点和方法来批判和接受文学遗产，而在这个工作中必须批判和澄清资产阶级唯心主义观点。在讨论中，不少人对古典文学研究和教学工作中不正确的看法和态度也进行了批判。大家认为这次开展关于‘红楼梦’研究的讨论，使自己越发认识到加强学习马克思列宁主义和毛泽东著作的重要。"},{"type":"paragraph","text":"最近的‘人民日报’和‘光明日报’的‘文学遗产’专刊，仍在陆续发表有关的文章。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8557634697"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
