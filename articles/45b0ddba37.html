],"dates":[{"year":1972,"month":11,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京一九七二年十一月十八日电　柬埔寨民族统一阵线中央政治局主席、柬埔寨王国民族团结政府首相宾努亲王和夫人，今天上午乘专车离开北京前往我国南方进行参观访问。"},{"type":"paragraph","text":"柬埔寨国内特使英·萨利陪同宾努首相前往访问。"},{"type":"paragraph","text":"随同宾努首相和夫人前往访问的有柬埔寨王国民族团结政府沙林察大臣的夫人，大臣周成、江裕朗、谢桑、吉春和夫人、秀蒲拉西以及正在北京的柬埔寨驻外使节。"},{"type":"paragraph","text":"中共中央军委副主席叶剑英，中共中央政治局候补委员纪登奎，中共中央对外联络部部长耿飚，外交部副部长韩念龙，交通部副部长郭鲁，有关方面负责人林佳楣、韩叙、王珍、梁枫、孙浩等，前往车站欢送。"},{"type":"paragraph","text":"前往车站送行的还有柬埔寨王国民族团结政府大臣秀木、副大臣万比尼和夫人。"},{"type":"paragraph","text":"我国驻柬埔寨大使康矛召和杨玲同志，陪同柬埔寨贵宾前往访问。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"纪登奎","type":"人物"},{"name":"耿飚","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"45b0ddba37"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
