<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"参加西藏自治区成立十周年庆祝活动华国锋率领中央代表团到达拉萨受到各族人民三万多人夹道欢迎","authors":[],"dates":[{"year":1975,"month":9,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社拉萨一九七五年九月五日电　中共中央政治局委员、国务院副总理华国锋率领中央代表团，前来参加西藏自治区成立十周年庆祝活动，今天乘专机从成都到达拉萨。中央代表团受到拉萨各族人民三万多人隆重、热烈的夹道欢迎。"},{"type":"paragraph","text":"到机场欢迎中央代表团的有:中共西藏自治区委员会第一书记、自治区革委会代理主任、人民解放军西藏军区第一政治委员任荣，正在拉萨的人大常委会副委员长、西藏自治区革委会副主任、西藏军区副司令员阿沛·阿旺晋美，西藏自治区党委、自治区革委会、西藏军区、拉萨市的负责人天宝、封克达、高圣轩、巴桑、郭锡兰、李本善、陈卓、孙玉山、郄晋武等。"},{"type":"paragraph","text":"中共西藏自治区委员会书记、自治区革委会副主任、西藏军区司令员陈明义，中共西藏自治区委员会书记热地，专程前往成都迎接中央代表团，今天同机到达拉萨。"},{"type":"paragraph","text":"拉萨机场上阳光灿烂，红旗飘扬，彩门上挂着“热烈欢迎中央代表团”的巨幅标语。当华国锋团长，姚连蔚、严政、司马义·艾买提、宝日勒岱、何正文、孙玉国副团长，以及代表团其他成员走下飞机时，任荣、阿沛·阿旺晋美等负责同志迎上前去，热烈欢迎。藏汉族儿童向代表团全体成员献了鲜花。在一片鼓乐声中，五百多名穿着鲜艳民族服装的翻身农奴和人民解放军指战员挥动花束，一群藏族儿童跳起了欢乐的舞蹈，热烈欢迎毛主席和党中央派来的亲人。"},{"type":"paragraph","text":"由三万多人组成的盛大欢迎队伍，在市区夹道欢迎中央代表团。在这里欢迎的有中共中央候补委员央宗，人大常委会委员错其，西藏自治区党、政、军的其他负责人杨宗欣、南海、仁增旺杰、郝平南、马瑞华、次仁拉姆等，以及有关方面人士阿沛·才旦卓噶。今天，高原古城拉萨打扮得五彩缤纷。家家户户门前插着红旗，窗台上摆满了鲜花，林荫道上空悬挂着用藏、汉文书写的欢迎标语，欢乐的鼓乐声在空中震响，到处洋溢着节日的气氛。欢迎的各族人民很早就聚集在街道两旁。当华国锋团长等在任荣、阿沛·阿旺晋美等负责同志陪同下乘坐敞篷汽车进入拉萨市区的时候，夹道欢迎的人群沸腾起来，欢呼声响彻云霄。革命文艺工作者跳起了欢乐的民族舞蹈。从郊区赶来的翻身农奴们挥动着刚收下的一束束青稞和冬小麦，欢欣鼓舞地向中央代表团报告农业丰收的喜讯。人们用各种民族语言不断高呼:“各族人民的伟大领袖毛主席万岁!”“中国共产党万岁!”“全国各族人民大团结万岁!”"},{"type":"paragraph","text":"中央代表团从机场前往市区的途中，受到了沿途正在田间劳动的贫下中农的热烈欢迎。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"华国锋","type":"人物"},{"name":"西藏文革","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c351e4cd94"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
