script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji33","name":"毛泽东全集第33卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji33.pdf"],"article":{"title":"关于缩减在辽东等地修建国防工事计划的批语","alias":"","parts":[{"type":"paragraph","text":"关于缩减在辽东等地修建国防工事计划的批语"},{"type":"paragraph","text":"（1953年7月11日）黄克诚同志："},{"type":"paragraph","text":"赞成你的缩减计划，这是很必要的，望照此部署。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"七月十一日[1]黄克诚，当时任中国人民解放军副总参谋长。"},{"type":"paragraph","text":"[2]指黄克诚1953年7月11日给毛泽东的报告中提出的缩减在辽东等地修建国防工事的计划。报告中说，鉴于各种条件的限制，如财力、物力、技术、技术领导均缺乏，领导干部和施工部队又无近代筑城经验，5年完成原计划确有很大困难。因此，拟对整个计划重新研究一下，采取稳步修建的方针，即前3年少修，求得锻炼干部，取得经验后再逐年增加。"}],"authors":["毛泽东"],"dates":[{"year":1953,"month":7,"day":11}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":242,"page_end":242},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cc22228f7a"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
