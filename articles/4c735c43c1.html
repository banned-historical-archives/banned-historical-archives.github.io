["太原工学院学生"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"大字报——我们要争平等地位","type":"title"},{"text":"太原工学院学生","type":"authors"},{"text":"学校内领导上把同学分成三等人，党、团、落后群众。党员总是高人一等。团员也有先进落后之分，学校的党、团和行政做工作，只依靠少数的党、团干部，本不接近少数群众，只是少数人的汇报，有什么大小工作，党、团干部包办，根本不用民主选举而委任党、团干部领导。好像群众中根本是白痴，没有领导天才，我们请问这是平等看待吗？是相信群众吗？他们口口声声是马列主义，实际上官僚主义、宗派主义。","type":"paragraph"},{"text":" 太原工学院  ×××","type":"paragraph"}],"comments":[],"origin":"《“鸣”、“放”选集（一）》（中共山西省委整风办公室编，1957年8月）。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4c735c43c1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
