art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席的好战士","authors":["杜义"],"parts":[{"type":"paragraph","text":"编辑同志："},{"type":"paragraph","text":"我怀着十分激动的心情，向你们写这封信。"},{"type":"paragraph","text":"元旦前夕，我从长春回家休养，乘火车的时候，因为身体病弱，路又很滑，刚要跨上车门就摔倒了。就在这时候，一个解放军战士很快把我扶起来，并亲切地问：“同志，摔坏没有？”说着，提起我的背包，把我搀扶进车厢，安置在一个舒适的座位上。我没来得及向他道谢，他已提着水壶给旅客倒开水去了。一会儿，又看他拿着书组织旅客们学习毛主席著作。车厢安静下来了，他又和列车员拿着拖把提着水桶，挨座擦地板倒烟灰。车厢的旅客，都被这位热心为大家服务的“列车代表”李贞国同志所感动。"},{"type":"paragraph","text":"餐车开始卖饭了，我有病，走路不方便，正在为吃饭问题发愁。李贞国同志走过来了，他亲切地对我说：“餐车离这儿远，你走动不方便，我去替你打来吃。”当他把一大盘大米饭和肉菜端到我面前时，我被感动得流出热泪。我想，只有共产党和毛主席教导的战士，才能这样关心群众，体贴群众。"},{"type":"paragraph","text":"在这里，我对李贞国同志再一次表示衷心感谢。"},{"type":"paragraph","text":"吉林省扶余县大林子公社中心学校 杜义"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9bad5929ce"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
