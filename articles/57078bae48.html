torical-archives/banned-historical-archives8/main/maoquanji7-1.pdf"],"article":{"title":"和某私熟先生应对联","alias":"","parts":[{"type":"paragraph","text":"和某私垫先生应对联！"},{"type":"paragraph","text":"（1934年2月）涓涓溪流，岂能作浪？（某私塾先生）"},{"type":"paragraph","text":"星星火炬，可以燎原。（毛泽东）"},{"type":"paragraph","text":"[1]1934年2月的一天，毛泽东来到离中央所在地不远的乌石珑帮助红军家属犁田。休息时和一老者谈话。恰好有一路过的私塾先生看到热闹非凡，也驻脚在此休息，抑制不住激动的心情，于是对大家说：“我出一上联给大家对对。”私垫先生沉思了一下，见路旁一条小溪流有所触动，于是出了上联。在场的群众听后，无人回答。有好些群众的目光投向毛泽东，意思要毛泽东作答。毛泽东深解众意，看了看群众点烟的火柴上的点点火星，即生灵"}],"authors":["毛泽东"],"dates":[{"year":1934,"month":2}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":289,"page_end":289},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"57078bae48"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
