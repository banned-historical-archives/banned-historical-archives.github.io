script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反对垄断资本的残酷剥削和压迫  美国许多行业工人不断举行罢工  通用电气公司十五万工人仍继续坚持罢工","authors":[],"dates":[{"year":1969,"month":11,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反对垄断资本的残酷剥削和压迫"},{"type":"paragraph","text":"美国许多行业工人不断举行罢工"},{"type":"paragraph","text":"通用电气公司十五万工人仍继续坚持罢工"},{"type":"paragraph","text":"新华社二日讯　华盛顿消息：最近期间，美国各行业的工人为反对垄断资本的残酷剥削和压迫，不断举行罢工斗争，给了垄断资本的反动统治以沉重的打击。"},{"type":"paragraph","text":"美国最大的军火垄断企业之一的通用电气公司的十五万名工人，从十月二十七日起为争取提高工资而举行的大罢工，一直在继续坚持中。这次大罢工严重地影响着这家公司设在美国三十多个城市的许多工厂的生产，并且引起了美国统治集团的极大担忧。"},{"type":"paragraph","text":"美国最大的工业企业通用汽车公司的两个工厂的一万名工人为反对垄断资本家用加快生产速度的办法来加紧残酷压榨工人，先后从九月下旬和十月上旬起举行罢工。另一家大公司美国汽车公司的两个工厂的工人为了要求提高工资，从十月中旬起也举行了罢工。据报道，汽车工人的罢工已经使美国小汽车和卡车的生产量迅速减少。"},{"type":"paragraph","text":"此外，美国许多其他行业的工人，例如铁矿、镍矿和铁矾土矿的工人、橡胶工业工人、轮船船员等，也纷纷举行了各种规模的罢工。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a25e3831f5"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
