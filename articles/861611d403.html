" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"安徽省夏粮统购中部分基层干部强迫命令作风严重","authors":[],"dates":[{"year":1955,"month":7,"day":31}],"is_range_date":false,"parts":[{"text":"安徽省夏粮统购中部分基层干部强迫命令作风严重","type":"title"},{"text":"【安徽分社七月三十一日讯】安徽省在夏粮统购中，有些地区的基层干部存在着较严重的强迫命令作风，有的甚至逼死人命。桐城县桐兴乡区乡干部搜查农民的粮食时，绑、打了十二个人，关押了十六个人（绝大部分是中农）。灵璧县三山乡张运因等五个干部，将余粮户集中起来审问，要把不愿卖粮的人绑起来。濉溪县许庙乡财粮员把不愿卖粮的人罚晒太阳。怀宁县雷山乡中农陈香（女），实应售粮一百六十斤，因为干部没有认真摸底核实，在召开的余粮户评议会上，乡干部江潮指名要她家出售四百斤余粮，并威胁她说：“人民政府不打人，不骂人，但可以关，可以判。”陈的儿子当场磕头要求少买，干部也没有理会，次日晨，陈自缢而死。","type":"paragraph"},{"text":"此外，有些地区的干部因为心中无数，统购时怕群众骂，对夏粮统购工作存在抵触思想。据六安专区检查了解的一千三百六十七个乡中，有五百三十个乡的干部思想不通（汪伟民据省委材料编）","type":"paragraph"}],"comments":[],"origin":"新华社《内部参考》1955年8月6日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"861611d403"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
