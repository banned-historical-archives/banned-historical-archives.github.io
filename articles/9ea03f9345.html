es":[{"year":1987,"month":2,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社厦门2月25日电　广播电影电视部部长艾知生在最近举行的全国电视题材规划会上强调指出，反对资产阶级自由化，决不影响电视屏幕的绚丽多彩。"},{"type":"paragraph","text":"艾知生说，要坚持四项基本原则，反对资产阶级自由化。但是，不要把什么问题都和资产阶级自由化挂上钩，而且完全应该允许在艺术风格上、题材体裁方面的多样化，提倡艺术技巧和表现手法上的创新。艾知生说，前一段时间，一些文艺作品脱离人民革命斗争的历史和当前亿万人民群众为四个现代化而斗争的现实，沉溺于猎奇或身边琐事，甚至专写社会的阴暗面。这些是不正常的。有些作品出现了新的脸谱化的倾向，写改革的作品，党委书记总是特别保守，厂长总是非常先进，令人想起有一个时期强调“突出政治”，写部队时连长都很保守，指导员都很先进，这同样是搞公式化，应该努力改变这种情况。文艺创作包括电视、电影创作，一定要努力做到毛泽东同志所说的“革命的政治内容和尽可能完美的艺术形式的统一。”"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9ea03f9345"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
