ates":[{"year":1975,"month":3,"day":31}],"is_range_date":false,"parts":[{"type":"paragraph","text":"上海理发工具厂二车间青年学习小组，最近学习了《哥达纲领批判》、《国家与革命》中论及资产阶级法权的章节，认识到，在社会主义这个相当长的历史阶段中，在分配方面资产阶级法权“仍然占着统治地位”。资产阶级法权是有其产生、发展和灭亡的客观规律的，不能只是简单地宣判它死刑，而要用辩证的观点进行分析，承认它的某些部分在一定的历史时期还将起着作用，但它终究将随着历史的发展而被消灭。因此，无产阶级对社会主义社会中所存在着的资产阶级法权，也应根据马克思主义关于“对于具体的事物作具体的分析”的观点，采取不同的态度:对已经取消的那一部分资产阶级法权(如生产资料所有制方面)决不能恢复，恢复了就是复辟，就是历史的倒退，对正在(即将)逐步消灭的那部分资产阶级法权(如名目繁多的奖金制度等)，决不能留恋，而应当在无产阶级专政下加速它的灭亡；对还在起作用、将来才能取消的那部分资产阶级法权(如商品制度、货币交换，以及反映在分配、交换其它方面的)，则必须加以限制，并积极创造条件，以便最后彻底消灭它。对于资产阶级的法权思想，应当批判和破除，要大力宣传共产主义思想，培养共产主义精神。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"name":"限制资产阶级法权","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ca09be342d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
