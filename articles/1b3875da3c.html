thors":[],"dates":[{"year":1959,"month":3,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京21日电】　中国共产党中央委员会和中华人民共和国毛泽东主席、全国人民代表大会常务委员会刘少奇委员长和国务院总理周恩来致电匈牙利党和国家领导人祝贺匈牙利苏维埃共和国成立四十周年。贺电全文如下:匈牙利社会主义工人党中央委员会第一书记卡达尔·亚诺什同志，匈牙利人民共和国主席团主席道比·伊斯特万同志，匈牙利人民共和国工农革命政府总理明尼赫·费伦茨同志:"},{"type":"paragraph","text":"值此匈牙利人民纪念匈牙利苏维埃共和国四十周年的时候，我们谨代表中国共产党、中华人民共和国政府和中国人民向你们，并且通过你们向匈牙利社会主义工人党、匈牙利人民共和国工农革命政府和匈牙利人民致以热烈的、兄弟般的敬意。"},{"type":"paragraph","text":"四十年前，匈牙利人民在匈牙利共产党的领导下，继伟大的十月社会主义革命之后，在匈牙利建立了苏维埃共和国。这是一个具有历史意义的重大事件。虽然它只存在了一百三十三天就在国内外反革命力量的联合进攻下失败了，但是这次革命斗争充分表现了匈牙利人民的革命精神，对当时正在争取自由解放的各国劳动人民是一个巨大的鼓舞，并且丰富了国际共产主义运动的经验。"},{"type":"paragraph","text":"匈牙利人民经过长期曲折的英勇斗争终于在十四年前，在苏联红军的援助下，重新赢得了解放。匈牙利人民继承了过去光荣的革命传统，以辛勤的劳动建设自己的社会主义祖国，在很短时间内，匈牙利已经变成了一个先进的工业农业国。近年来，匈牙利人民在匈牙利社会主义工人党的正确领导下，在巩固无产阶级专政、发展国民经济和提高劳动人民的物质和文化生活方面取得了光辉的成就。一贯忠于马克思列宁主义的匈牙利社会主义工人党和工农革命政府，始终不渝地为加强以苏联为首的社会主义阵营的团结、反对现代修正主义而斗争，并且对制止帝国主义战争阴谋，维护欧洲和世界和平事业作出了重大贡献。"},{"type":"paragraph","text":"中匈两国人民早就在革命斗争中结成了深厚的兄弟友谊。建设社会主义—共产主义的崇高理想把我们两国人民紧密地团结在一起。中国人民一向以极大的关怀注视着匈牙利人民的斗争，并且，为他们的伟大成就感到欢欣鼓舞。在纪念匈牙利苏维埃共和国成立四十周年的历史性的日子里，我们坚信匈牙利人民在建设社会主义和保卫和平的事业中将不断获得新的、更大的成就，并且衷心地祝贺中匈两国人民的兄弟友谊日益巩固和发展。"},{"type":"paragraph","text":"中国共产党中央委员会主席"},{"type":"paragraph","text":"中华人民共和国主席　毛泽东"},{"type":"paragraph","text":"中华人民共和国全国人民代表大会"},{"type":"paragraph","text":"常务委员会委员长　刘少奇"},{"type":"paragraph","text":"中华人民共和国国务院总理　周恩来"},{"type":"paragraph","text":"1959年3月19日于北京"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1b3875da3c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
