" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"坚决镇压坏分子和反革命分子，北京一批罪大恶极的犯罪分子被判处死刑","authors":["新华社"],"dates":[{"year":1957,"month":10,"day":15}],"is_range_date":false,"parts":[{"text":"坚决镇压坏分子和反革命分子，北京一批罪大恶极的犯罪分子被判处死刑","type":"title"},{"text":"新华社","type":"authors"},{"text":"新华社１４日讯:北京市中级人民法院１４日下午在中山公园音乐堂举行惩治刑事犯罪分子宣判大会。强奸幼女杀人犯蔡仲瑜、张有成，流氓轮奸犯何大衡、刘绍华、韩永和，反革命罪犯朱华、马云宽等七个罪大恶极的犯罪分子已在会上被判处死刑。","type":"paragraph"},{"text":"北京市中级人民法院院长贺战军还在会上宣布，最近经北京市有关法院判处死刑的盗窃杀人犯蔡金生、强奸幼女杀人犯姚仲祥、抗拒社会主义改造杀人犯高德起、反革命杀人犯王书田等案已经最高人民法院核准，当天执行死刑。","type":"paragraph"},{"text":"有四千多人参加了这次宣判大会。","type":"paragraph"},{"text":"强奸幼女杀人犯蔡仲瑜今年８月上旬强奸了一个六岁幼女之后，又蓄意奸淫八岁幼女李学文。在强奸幼女李学文时，李学文挣扎反抗，蔡仲瑜竟毫无人性地先将李学文掐死，而后进行奸污。罪犯张有成，在１９５２年强奸了当时只有十四岁的外甥女赵春华。去年７月赵春华与刘海昆结婚后，张有成就蓄谋杀害刘海昆，企图长期霸占赵春华。今年４月２８日夜，张有成到刘海昆家用刀将刘砍伤后逃跑。５月２５日晨他去工人宿舍谋害刘海昆，误认工人蔡润生就是刘海昆，于是开枪杀死了蔡润生。北京市中级人民法院宣布对这两名罪犯判处死刑。","type":"paragraph"},{"text":"罪犯何大衡、刘绍华和韩永和是一个流氓集团的头目。这个有十个人的流氓集团，屡次在天安门、劳动人民文化宫、东单公园、天桥等地追逐和侮辱妇女，并且四处结伙偷窃，打架斗殴，严重地破坏了首都的社会秩序。今年７月２９日，以罪犯何大衡、刘绍华、韩永和为首，竟在东单公园强行轮奸了一个姓张的女工。北京市中级人民法院判处何大衡、刘绍华、韩永和三个罪犯以死刑；并分别判处这个流氓集团的其他七名犯罪分子以无期徒刑或长期徒刑。","type":"paragraph"},{"text":"反革命分子朱华，从１９５２年开始策划组织反革命组织“一元会”，拟定了“实行人民自治”、“恢复中国旧制”等反动政治纲领，妄图颠覆人民政权。１９５５年，朱华与反革命分子张勋民、孔晓多次进行秘密策划，企图与美帝国主义分子取得联系。这一伙反革命分子的阴谋没有来得及实现就被我公安机关逮捕。","type":"paragraph"},{"text":"北京市人民检察院检察长郭步岳在宣判大会上讲了话。他指出，广大人民群众迫切要求人民政府对这些披着人皮的野兽坏分子和反革命分子实行坚决无情的专政。人民群众的这种要求是完全正确的。首都的政法机关一定在广大人民群众的支持下，尽自己的职责，对坏分子和反革命分子实行无情的专政，坚决地保卫首都建设的顺利进行和人民的幸福生活。","type":"paragraph"},{"text":" ——原载《人民日报》1957年10月15日。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"02734eef3d"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
