script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反对美国和本国垄断资本的残酷剥削  智利阿根廷人民不断展开斗争","authors":[],"dates":[{"year":1969,"month":11,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反对美国和本国垄断资本的残酷剥削"},{"type":"paragraph","text":"智利阿根廷人民不断展开斗争"},{"type":"paragraph","text":"新华社三日讯　智利、阿根廷的工人、职员和教师最近不断举行罢工斗争，反对美国和本国垄断资本的残酷剥削，并且要求增加工资。"},{"type":"paragraph","text":"最近几天来，智利工人、职员和教师的罢工斗争不断高涨。从康塞普西翁城到首都圣地亚哥一带，一些工厂和学校的工人、职员纷纷举行罢工，要求增加工资。据不完全的统计，截至十月三十一日参加罢工的工人、职员共有一万二千多人。"},{"type":"paragraph","text":"智利大学的六千名非教学人员从十月三十一日清晨起开始举行罢工，并且占领了这所大学的各个部门，要求当局增加工资和改善生活条件。"},{"type":"paragraph","text":"十月三十一日，智利中部地区的一千二百名铁路工人也举行罢工，要求增加工资并且反对当局解雇一批工会领导人。"},{"type":"paragraph","text":"十月三十日，圣地亚哥公共卫生局的一千二百多名工人举行一天罢工，抗议当局解雇一位工会领导人。由于工人们的坚决斗争，当局被迫在三十一日上午无条件恢复了这位领导人的工作。"},{"type":"paragraph","text":"美国资本控制的太平洋钢铁公司所属的瓦奇帕托钢铁厂的大约三千五百名职员，十月二十九日和三十日两天分批举行两小时罢工，抗议这家公司的资本家对工人和职员进行残酷剥削。"},{"type":"paragraph","text":"阿根廷数千名工人二十九日举行三十八小时罢工，抗议翁加尼亚军事独裁政权的反动经济政策。这次罢工是在工人们冲破一些黄色工会领导人的阻挠之后举行的。参加罢工的主要是产业工人。具有光荣斗争传统的科尔多瓦城的汽车制造工人积极参加了这次罢工。"},{"type":"paragraph","text":"阿根廷门多萨省小学教师为要求增加工资从十月初开始陆续举行罢教。十月二十八日他们再度举行罢教。教师们还举行大会，决定以后每周举行两天罢教。他们的斗争得到了门多萨省五千多名中学和私立学校教师的支持。胡胡伊省帕尔帕拉城的商业学校的教员二十四日也举行了不定期罢教，抗议当局拖欠工资。这个学校的三百六十名学生前往省政府，声援教师的斗争。拉里奥哈省的教师为了要求增加工资，从十月二十八日举行四十八小时罢教。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1d3cee7a93"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
