制止剧团‘挖角’行为和取缔所谓‘流动演员’”指示的通知","authors":[],"dates":[{"year":1960,"month":5,"day":18}],"is_range_date":false,"parts":[{"text":"文化部关于深入宣传坚决贯彻中央关于“坚决制止剧团‘挖角’行为和取缔所谓‘流动演员’”指示的通知","type":"title"},{"text":"各省、市，自治区文化局（厅）：","type":"appellation"},{"text":"最近中央向省、市、自治区党委发出了“坚决制止剧团‘挖角’行为和取缔所谓‘流动演员’”指示和批转文化部党组“关于坚决制止剧团，‘挖角’行为和取缔所谓‘流动演员’个人流动办法的请示报告”。中央的这个指示和文化部向中央的报告，对于戏剧工作坚持社会主义组织原则，杜绝剧团“挖角”现象，以及对流动演员进行社会主义改造，均有极重要意义。为此，望你局（厅）将中央的这个指示和文化部向中央的报告进行深入宣传，组织所属剧团、演员、干部讨论学习，对现在还在自由流动演出的演员进行教育，加强管理。各地文化主管部门和剧团应坚决贯彻执行中央指示，同时并应根据上述精神将各地剧团“挖角”问题进行认真检查，严肃处理。","type":"paragraph"},{"text":"抄报：中共中央宣传部、国务院文教办公室","type":"paragraph"},{"text":"抄送：中共各省、市、自治区委宣传部、文教部","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]},{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"文化部关于深入宣传坚决贯彻中央关于“坚决制止剧团‘挖角’行为和取缔所谓‘流动演员’”指示的通知","authors":[],"dates":[{"year":1960,"month":5,"day":18}],"is_range_date":false,"parts":[{"text":"文化部关于深入宣传坚决贯彻中央关于“坚决制止剧团‘挖角’行为和取缔所谓‘流动演员’”指示的通知","type":"title"},{"text":"各省、市，自治区文化局（厅）：","type":"appellation"},{"text":"最近中央向省、市、自治区党委发出了“坚决制止剧团‘挖角’行为和取缔所谓‘流动演员’”指示和批转文化部党组“关于坚决制止剧团‘挖角’行为和取缔所谓‘流动演员’个人流动办法的请示报告”。中央的这个指示和文化部向中央的报告，对于戏剧工作坚持社会主义组织原则，杜绝剧团“挖角”现象，以及对流动演员进行社会主义改造，均有极重要意义。为此，望你局（厅）将中央的这个指示和文化部向中央的报告进行深入宣传，组织所属剧团、演员、干部讨论学习，对现在还在自由流动演出的演员进行教育，加强管理。各地文化主管部门和剧团应坚决贯彻执行中央指示，同时并应根据上述精神将各地剧团“挖角”问题进行认真检查，严肃处理。","type":"paragraph"},{"text":"抄报：中共中央宣传部、国务院文教办公室","type":"paragraph"},{"text":"抄送：中共各省、市、自治区委宣传部、文教部","type":"paragraph"}],"comments":[],"origin":"原载中华人民共和国文化部办公厅《文化工作文件资料汇编 （二）》， 北京：[内部出版]，1988年12月","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b21a1b503b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
