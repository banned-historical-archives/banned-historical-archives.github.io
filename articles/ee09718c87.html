" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"右派言论——拥护“党天下”的谬论  否定党的领导","authors":["上海财经学院","学生"],"dates":[{"year":1957,"month":5}],"is_range_date":false,"parts":[{"text":"右派言论——拥护“党天下”的谬论  否定党的领导","type":"title"},{"text":"上海财经学院学生","type":"authors"},{"text":"(1)“副总理中没有一个非党人士是事实，各部虽有非党人士担任，但总有党员监督，层层都有党员配置，因此，是‘党天下’。”","type":"paragraph"},{"text":"(2)“储安平提出付总理中没有一个非党人士，有些道理，可以考虑。”","type":"paragraph"},{"text":"(3)“共产党从上到下的各级组织，特别是基层组织，普遍存在着严重的三大主义，到处是党委决定一切，以党代政。各民主党派、民主人士根本无法发挥监督作用，因此，‘党天下’的提法又有什么不对呢?”","type":"paragraph"},{"text":"(4)“我过去在商业机关工作时，每成立一个单位，如无党员，一定要调个党员来作头儿。”","type":"paragraph"},{"text":"(5)“讲‘党天下’这种话是傻瓜，因为实际上政治经济学中已明白告诉我们：‘无产阶级专政’。……无产阶级专政就是‘党天下’。”","type":"paragraph"},{"text":"(6)“我认为不要党委制，不等于不要党的领导。”","type":"paragraph"},{"text":"(7)“社会主义要，共产党领导是不要的。”","type":"paragraph"},{"text":"(8)“‘八大’学习时强调要党的领导，今天这么一放，向党提出了很多意见和缺点，这样的领导今后是否仍然需要呢？”","type":"paragraph"},{"text":"(9)“党的领导正确，在理论上尚未想通。可能是上级领导正确，但到下级具体执行就不是这样，我在具体工作中就遇到很多问题，使我想不通。”","type":"paragraph"},{"text":"(10)认为党政不分、以党代政的情况是存在的，说，“今后应建立一些制度，多发挥政府部门的作用”。","type":"paragraph"},{"text":"(11)“不要党委领导是有道理的，三大主义是社会主义制度造成的，也有道理，如马林科夫的错误。”","type":"paragraph"},{"text":"(12)“建议成立一个有全面(即党、团、行政、学生会)性的整风机构。”(意思就是不要党委的单独领导)","type":"paragraph"},{"text":"(13)“学生会要有独立性，不能成为团委会附属机构。团委会把学生会当成管理科；党委对学生会、团委会应同等看待，实际上不是如此。”","type":"paragraph"},{"text":"(14)“党中央领导是对的，但基层组织太薄弱，不起作用，须要加强，特别是有些党员不懂科学，怎能领导呢？”","type":"paragraph"},{"text":"(15)“党委会完全负责制不好，应组织校务委员会。”","type":"paragraph"},{"text":"(16)“党不能领导科学，大学生闹事正说明党委工作成问题。”","type":"paragraph"},{"text":"(17)“学校应由教授、学生、行政三方面参加学校的领导，而党委一手包办，教授、教员、学生无提意见的自由，这样不够合理。”","type":"paragraph"},{"text":"(18)“党的干部对科学是外行，……党委制有问题，不能领导学校(政治与业务)，可以联合些老教授，由党来领导，组织一个机构来领导学校的政治与业务。”","type":"paragraph"},{"text":"(19)“共产党什么都想抓，但什么都搞不好，有些党员不能进行政治领导，根本不能进行业务领导。”","type":"paragraph"},{"text":"(20)“企业党委领导可以肯定，但学校是否要党委领导，可以考虑考虑！”","type":"paragraph"},{"text":"(21)“在联席会议上，没有权利决定问题，都是由团支书、党支委决定问题。”“党团对工作垄断。”","type":"paragraph"},{"text":"(22)“党中央是正确的，市委要考虑，党委会更不用说。”","type":"paragraph"},{"text":" 来源：《反右派斗争言论选辑　第一辑　学生部份》（中共上海财经学院委员会编，1957年9","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ee09718c87"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
