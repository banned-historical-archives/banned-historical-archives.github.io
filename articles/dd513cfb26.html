" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共中央办公厅印发张春桥1967年关于上海工人要求建立武卫组织的请示和毛主席批示","authors":[],"dates":[{"year":1973,"month":7,"day":12}],"is_range_date":false,"parts":[{"text":"中共中央办公厅印发张春桥1967年关于上海工人要求建立武卫组织的请示和毛主席批示","type":"title"},{"text":"毛主席批示","type":"subtitle"},{"text":"林、周、文革各同志阅示。","type":"paragraph"},{"text":" 1967年7月31日","type":"paragraph"},{"text":"主席：","type":"appellation"},{"text":"“文攻武卫”的口号提出来以后，上海的工人造反派要求成立武卫组织。据了解，目前上海的武斗虽然不多，但是，小规模的武斗经常不断。出现武斗，一般是由市革命委员会派出少量徒手 解放军战士去制止。他们人数少，到得慢，而且往往挨打，效果也并不多好。如果由上海工人革命造反总司令部负责成立工人武卫指挥部，在市区各个区搞一万人左右的队伍，十个区（不含郊区）搞十万人左右，从一百几十万产业工人中选拔并不困难。这十万人当然不需要天天出动，每天有十分之一的人值班就是够了，也不会妨碍生产。这支由工人造反派组成的队伍，在目前可以制止武斗，更重要的是可能从中找出一条改造民兵的办法。上海原有的民兵，枪支弹药已由井备区收起来了，组织瘫痪在那里。如果目前提出整顿民兵，条件不成熟，麻烦也不少。不如成立工人武卫组织，从小到大，从徒手到发枪，逐步地建立一支以造反派为基础的人民武装。因为几次听到主席提出民兵的改造问题，造反派夺去的枪不要急于收回问题，联系到上海工人造反派提出的这个要求，形成了以上的想法，不知是否妥当。如果大方向不错，可否在上海试验一下。请批示。敬礼！","type":"paragraph"},{"text":" 春桥  67.7.31","type":"paragraph"},{"text":" （中共中央办公厅73.7.12印发）","type":"paragraph"},{"text":"天水、纯麟、景贤、秀珍同志：","type":"appellation"},{"text":"伟大领袖毛主席最近又问起文攻武卫情况，讲了武器弹药的配备问题。党的第十次路线斗争中有大量的材料证明林贼一伙为了搞反革命政变，他们极端害怕和仇视这支工人武装，因此，他们恶毒攻击、千方百计地企图搞掉这支工人武装队伍。当然，在伟大领袖毛主席领导下，他们的阴谋是永远不能得逞的。敌人的攻击并不奇怪，问题是我们有些革命的同志在对待文攻武卫这个问题上的认识，并不一致。是支持这一新生事物，还是扼杀这一新生事物，实际上是存在着斗争，有些同志的行动和言论就说明了这个问题。中央政治局最近把伟大领袖毛主席六七年七月三十一日批示，春桥同志的报告找出来印发给有关同志，并决定给上海一份备案现寄上。因此，春桥同志和我建议市委、井备区、市民兵指挥部同志们认真讨论一下，我并且希望大家把讨论的意见告诉春桥、文元同志和我。最近如果有机会我还建议把这个文件精神，不仅对市区而且对郊区也是非常重要的。我仅仅是些建议，不要印发，如你们认为有必要可以在小范围内口头讲一下，有不当之处，请大家批评。","type":"paragraph"},{"text":" 王洪文   73.7.14","type":"paragraph"}],"comments":[],"origin":"根据档案材料翻印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"张春桥","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"武斗","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dd513cfb26"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
