<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"为纪念伟大领袖毛主席的《在延安文艺座谈会上的讲话》发表二十八周年体现毛泽东思想的革命样板戏在沪上演向北京学习的一批剧目和其他革命现代戏从二日起同时演出","authors":[],"dates":[{"year":1970,"month":5,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　为了纪念伟大领袖毛主席的光辉著作《在延安文艺座谈会上的讲话》发表二十八周年，上海广大革命文艺战士，满怀胜利的喜悦和战斗的豪情，学习、排练了一批革命样板戏和革命现代戏，将从五月二日至二十三日，向上海广大工农兵群众演出，热烈歌颂毛主席的无产阶级革命文艺路线的伟大胜利。"},{"type":"paragraph","text":"毛主席的光辉著作《讲话》是马克思列宁主义思想文化运动的划时代文献，是无产阶级文艺革命的指路明灯，是无产阶级文艺战胜一切封、资、修文艺的有力的思想武器。在《讲话》光辉思想的指引下，广大革命文艺战士在江青同志的率领下，攻克了资产阶级、封建阶级反动文艺的最顽固的堡垒，创造了一批光彩夺目的革命样板戏，使工农兵的英雄形象巍然屹立在社会主义舞台上。这一伟大胜利震撼了全中国，震撼了全世界。今天，在深入开展的无产阶级文艺革命中，在学习、排练革命样板戏的过程中，广大革命文艺工作者重新学习毛主席的光辉著作，感到更加深刻、更加亲切、更加鼓舞。"},{"type":"paragraph","text":"毛主席在《讲话》中指出:“我们的文学艺术都是为人民大众的，首先是为工农兵的，为工农兵而创作，为工农兵所利用的。”演出革命现代戏，满腔热情地歌颂工农兵英雄人物，就是坚持文艺为工农兵服务，为无产阶级政治服务的根本方向。上海京剧团《海港》剧组、上海市舞蹈学校《白毛女》剧组的革命文艺战士，在排练中以《讲话》为武器，彻底批判叛徒、内奸、工贼刘少奇及其在文艺界的代理人周扬等“四条汉子”所推行的反革命修正主义文艺路线，肃清他们所散布的“全民文艺”等资产阶级文艺思想的流毒，进一步提高了阶级斗争和路线斗争觉悟，促进了演出质量的提高。上海京剧团《海港》剧组的革命文艺战士说:“我们要在这次红五月的演出中，始终突出无产阶级政治，努力塑造好工人阶级的英雄形象，唱好每一句唱腔，做好每一个动作，全心全意地为广大工农兵服务，用保卫革命样板戏的实际行动，纪念《讲话》发表二十八周年。”"},{"type":"paragraph","text":"从五月二日起在本市公演的，有革命现代京剧《海港》、革命现代舞剧《白毛女》，还有向北京学习的革命现代京剧《红灯记》、《沙家浜》，革命现代舞剧《红色娘子军》，《钢琴伴唱\u0026lt;红灯记\u0026gt;》以及试验创作的革命现代京剧《龙江颂》、革命交响音乐《智取威虎山》、革命历史歌曲演唱、革命话剧《农奴戟》、革命沪剧《金训华之歌》等。参加演出的革命文艺工作者，反复学习了毛主席在《讲话》中关于“一定要把立足点移过来”，“移到工农兵这方面来，移到无产阶级这方面来”这一伟大教导，在农村这个广阔的天地里，在火热的群众斗争中，在接受工农兵再教育中，提高了继续革命的自觉性。他们说:“皮肤晒黑了，思想炼红了；人离高楼深院远了，心与工农兵贴得紧了。”许多剧组还坚持在农村、工厂练功、排戏，请工农兵提意见，使演出质量有了新的提高。"},{"type":"paragraph","text":"我国第一颗人造地球卫星发射成功的特大喜讯，激励了广大革命文艺工作者。在红五月里参加演出的上海京剧团《海港》剧组，上海市舞蹈学校《白毛女》剧组和其他剧组的革命文艺战士，决心把演出作为活学活用毛泽东思想的大课堂，演英雄人物，走英雄道路，以毛主席的《讲话》为指针，更坚决地和工农兵相结合，更好地为工农兵服务。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d52d2133b8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
