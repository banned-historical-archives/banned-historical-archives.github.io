art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"把毛泽东思想装进脑里刻在心上刘英俊家乡万人集会表达学习决心","authors":[],"parts":[{"type":"paragraph","text":"据新华社长春十六日电 刘英俊同志的家乡吉林省长春市十五日万人集会，共同表示要象刘英俊同志那样，把毛主席的书当作一切行动的最高指示，真正成为学习最高指示、执行最高指示、宣传最高指示、捍卫最高指示的模范。"},{"type":"paragraph","text":"中共吉林省委代理第一书记赵林在会上讲话，他号召全省人民积极参加学习和宣传刘英俊同志的活动，通过这一活动，把全省学习毛泽东思想的高潮推向新的高峰，把向解放军学习的活动推向新的高峰，把当前的无产阶级文化大革命推向新的高峰。他说，刘英俊同志给我们树立了活学活用毛主席著作的光辉榜样。我们要象刘英俊同志那样，把毛主席著作学得好上加好，真正把毛泽东思想装进脑子里，刻在心上。广大干部，特别是各级领导干部，必须带头学，带头用。"},{"type":"paragraph","text":"中共长春市委第一书记宋洁涵在讲话中，号召全市人民更好地活学活用毛主席著作，发扬刘英俊同志的革命精神，无限忠于党，忠于无产阶级革命事业，忠于党中央和毛主席，忠于伟大的毛泽东思想。要不为名，不为利，不怕苦，不怕死，全心全意地为人民服务。要更加突出无产阶级政治、突出毛泽东思想，把无产阶级文化大革命运动搞得更好。"},{"type":"paragraph","text":"刘英俊同志生前所在部队负责人谷凤鸣在会上详细介绍了刘英俊同志的生平事迹。"},{"type":"paragraph","text":"在会上讲话的还有吉林省军区负责人钟明彪、刘英俊同志的母亲朱秀兰。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"吉林文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"97edf32324"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
