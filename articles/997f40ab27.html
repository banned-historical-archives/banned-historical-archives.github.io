"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"复旦大学学生的匿名信","type":"title"},{"text":"匿名信之一","type":"subtitle"},{"text":"土包子　麻子两贼：","type":"appellation"},{"text":"在中二部份同学召集的座谈会上，你辈受共产党指使，为虎作伥，假造事实，血口喷人。是的，石绍裘同志有某些缺点，但他基本上是纯洁、天真、有远大理想的人，你们却把人骂得狗血喷头，这正说明你辈无耻又无知，受人利用，拍共产党的马屁。","type":"paragraph"},{"text":"警告你辈：——山鸡、麻子，如果再狐假虎威，仗势欺人，我将要把你辈之首级取下，悬在第十宿舍门口。","type":"paragraph"},{"text":"你们如果稍有明知，就应该知道，共产党除了毛主席一人外，就全是坏蛋。目前，共屁党正处于总崩溃，不久他们就要完蛋了。","type":"paragraph"},{"text":"警告你辈，我的信你辈要绝对保秘（密），要是交给党支部就小心脑袋，（也许先请你们吃大便）。","type":"paragraph"},{"text":"我写（与）中二17人无联系，但他们是正义者，所以我要支持他（们），谁说此信是他们写的，谁就要先吃我们的味道，决不容许你辈怀疑他们。","type":"paragraph"},{"text":"非党天下万岁","type":"paragraph"},{"text":" 一枝梅于复旦天国　1957.06.×日。","type":"paragraph"},{"text":"注：土包子、麻子和山鸡系指中文系的同学。","type":"paragraph"},{"text":"匿名信之二","type":"subtitle"},{"text":"我抗议！　我反对！　我支持！","type":"paragraph"},{"text":"我中立！　我发疯！　我自杀！","type":"paragraph"},{"text":"我是第三条道路的发起人，我崇拜！！！","type":"paragraph"},{"text":"我杀人！　我放火！　我跳河！　我跳楼！","type":"paragraph"},{"text":"匿名信之三","type":"subtitle"},{"text":"共产党整风，要群众帮助，浪费时间，为何不也像肃反一样，党员坐下来，群众来斗一斗？共产党员要（和）风细雨，有保障，人民群众是该死的，要受共产党恩（赐）才能（讲）话！共产党员操生死之权。","type":"paragraph"},{"text":"六亿中国人除共产党外，都是不能有个人独立人格。每个党员特别是党支部有无上之威，爱骂谁，爱打谁，任意所为；专门布置反映干部反映。世界最可怜的是中国老百姓，一经反映干部反映后，就是苦闷下来到死为止。","type":"paragraph"},{"text":"请共产党员想一想，你们给中国人民多少痛苦，“三反”、“五反”、“思改”“肃反”，你们害了多少人。今天你们坐下来，叫人民提意见是形式。","type":"paragraph"},{"text":"试看全国人民如何反映，原来有如此共产党员。除党员阿谀外，所有中国人是畜生，人格没有被尊重。除了阿谀以外，没有一个中国人不是受冤枉的。","type":"paragraph"}],"comments":[],"origin":"共青团复旦大学委员会编：《右派思想言论专辑》第一期（校内刊物、仅供参考），1957年7月11日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"997f40ab27"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
