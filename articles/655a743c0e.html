tart":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"一辈子听毛主席的话 当战士的小学生","authors":["广州部队某部副政委刘芳池"],"parts":[{"type":"paragraph","text":"《解放军报》十二月十二日社论，传达了我们伟大领袖毛主席的最新指示：“军队办学习班要有战士参加。”毛主席这一伟大指示，是对我们干部的最大关怀、最大爱护和最大鞭策，是反修、防修的根本保证，是办好毛泽东思想大学校的根本方针，是继承和发扬我党我军优良传统、进一步搞好上下级关系、造就千百万无产阶级革命事业接班人的伟大战略措施。"},{"type":"paragraph","text":"毛主席教导我们：“群众是真正的英雄”，“在某种意义上来说，最聪明、最有才能的，是最有实践经验的战士。”我们团先后办了四期毛泽东思想学习班，每期都有战士参加。我是每期学习班的组织者和参加者，在与战士们一起学习、一起生活的日子里，从战士身上学到了许多宝贵的东西。他们无限热爱毛主席，无限忠于毛泽东思想的深厚阶级感情，他们如饥似渴地活学活用毛主席著作，学了就用，立竿见影的先进事迹，深深教育了我。使我感到，应当恭恭敬敬地拜他们为老师，虚心地向他们学习。有一期，我编在班里，与战士们同学习、同忆苦、同生活、同斗私批修，对自己教育很深。老战士李良坤平时生活十分艰苦，积存了五十多元钱。他学习了“老三篇”后，认识到一个革命战士，心中只能装着人民，装着革命，决不能装着自己。他了解到驻地公社正在大办毛泽东思想学习班，急需红色宝书，便立即拿出全部存款，买了五千多册“老三篇”和毛主席著作单行本，挨家挨户送到贫下中农手里。不少战士不仅自己学了就用，而且还诚恳地帮助干部亮私心，找问题，挖根源，猛斗官、骄二气。"},{"type":"paragraph","text":"对照战士，比比自己，使我找到了差距。比如，亮思想不如战士彻底，斗私心不如战士狠，一心为公的思想境界不如战士高，团结友爱、三八作风不如战士好。总之，活学活用毛主席著作，在用字上狠下功夫不如战士。从这里使我对“群众是真正的英雄”这句话的含义，有了更深刻的理解。以后，我每次下连队首先到战士中去，听战士的意见，虚心向战士学习，遇事同战士商量。这样，不仅使自己在工作中少走弯路，更重要的是对自己的思想革命化有很大的促进。"},{"type":"paragraph","text":"联系自己的实践，反复学习毛主席的最新指示，使我更加心明眼亮。我一定要更高地举起毛泽东思想伟大红旗，一辈子听毛主席的话，一辈子当战士的小学生，永葆无产阶级革命青春，和战士们在一起，紧跟伟大领袖毛主席，把中国革命和世界革命进行到底。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"655a743c0e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
