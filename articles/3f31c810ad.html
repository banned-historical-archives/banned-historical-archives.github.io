ical-archives/banned-historical-archives8/main/maoquanji20.pdf"],"article":{"title":"普察冀第二野战军十一月份必须完成三项任务","alias":"","parts":[{"type":"paragraph","text":"晋察冀第二野战军十一月份必须完成三项任务"},{"type":"paragraph","text":"（1945年10月30日）聂\"转萧、罗②及澜涛3，并告热河分委："},{"type":"paragraph","text":"你们一面组织野战军，一面组织运输队，一面则要指挥冀察现成部队迅速肃清北平、古北口间铁路线上之伪军并控制该路（至少北面一段），发动群众，组织地方武装，准备野战战场。此项任务必须在十一月内争取先机完成之，否则将处于被动地位，不能巩固热河，亦不能巩固张家口。故萧、罗下月一个月内必须完成三项任务，第一是组成野战军，第二是组织运输队赴承德接运武器弹药，第三是占领北平、古北口间铁路线，准备野战战场。以上三项任务，澜涛等领导后方工作的同志们须尽全力协助完成之。澜涛等同志的主要精力，今后须转向东方战线，西方战线则由聂、耿?独力"},{"type":"paragraph","text":"[1]聂，指聂荣臻，当时任晋察冀军区司令员兼政治委员。"},{"type":"paragraph","text":"[2]萧，指萧克（1907一2008)，湖北嘉禾人，当时任晋察冀第二野战军司令员。罗，指罗瑞卿（1906一-1978），四川南充人，当时任晋察冀第二野战军政治委员。"},{"type":"paragraph","text":"[3]澜涛，即刘澜涛（1910—1997)，陕西米脂人。当时任晋察冀军区副政治委员。"},{"type":"paragraph","text":"[4]热河，即热河省。处理之。澜涛电台速与延安联络勿误。关于歼灭石匣\"、密云、怀柔地区之敌伪，发动该地区民众创造野战战场一项任务，热河分委负有由古北口向南竭力协助萧、罗之任务，该地区地方工作之管辖划归热河负责，免去过去三不管状态。"},{"type":"paragraph","text":"中央酉三十"}],"authors":["毛泽东"],"dates":[{"year":1945,"month":10,"day":30}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":486,"page_end":487},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3f31c810ad"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
