art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"浙江军区开办学习毛主席著作读书班","authors":["赵立仁"],"parts":[{"type":"paragraph","text":"本报讯 为了深入学习毛主席著作，浙江军区除了广泛组织干部在职学习外，并开办了校以上军官读书班。第一期读书班已于2月26日开学。参加读书班的有军区周副司令员、刘副政委、政治部主任以及机关各部处长和部队团以上领导干部等三十余人。"},{"type":"paragraph","text":"这期读书班的学习目的是：学习毛主席的哲学思想，提高思想水平，改进工作。学习内容是：“实践论”、“矛盾论”、“关于正确处理人民内部矛盾的问题”等。学习方法是：以理论联系实际的认真读书为主，辅以必要的讨论和写学习笔记；做到读、想、写、议相结合。"},{"type":"paragraph","text":"开学时，刘副政委强调说明了学习毛泽东思想的重要性。他表示自己一定要学好。周副司令员指出，这次学习既要学好，也要通过学习总结经验，以便指导部队的学习。（赵立仁）"}],"alias":""},"tags":[{"name":"人民内部矛盾","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"756f37d95f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
