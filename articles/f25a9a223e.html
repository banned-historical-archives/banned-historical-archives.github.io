torical-archives/banned-historical-archives8/main/maoquanji9-2.pdf"],"article":{"title":"先打丁德隆后打周祥初孔令愉","alias":"","parts":[{"type":"paragraph","text":"先打丁德隆后打周祥初孔令恂！"},{"type":"paragraph","text":"（1936年11月19日）彭："},{"type":"paragraph","text":"我军先打其右路丁师。对周孔?似宜让其北进数十里，然后坚决扼阻之，以便我军消灭丁师后，向其周孔之侧后打去。又二方面军主力宜跟进为预备队，其一部则坚决扼阻王军。如何，请依情况决定。"},{"type":"paragraph","text":"毛"},{"type":"paragraph","text":"十九日"},{"type":"paragraph","text":"[1]这是毛泽东给红军前敌总指挥兼政治委员、第一方面军司令员彭德怀的电报。"},{"type":"paragraph","text":"[2]丁师，指国民党军西北“剿匪”总司令部第一路第二纵队第七十八师，师长丁德隆。"},{"type":"paragraph","text":"[3]周孔，指周祥初、孔令恂，当时分别任国民党军西北“剿匪”总司令部第一路第二纵队第四十三师师长和第九十七师师长。"},{"type":"paragraph","text":"[4]王军，指国民党军西北“剿匪”总司令部第一路第六纵队司令王以哲指挥的东北军一部。"}],"authors":["毛泽东"],"dates":[{"year":1936,"month":11,"day":19}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":5,"page_end":5},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f25a9a223e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
