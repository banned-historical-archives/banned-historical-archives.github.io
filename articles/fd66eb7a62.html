tart":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席怎样说的，我就怎样做","authors":["王杰"],"parts":[{"type":"paragraph","text":"毛主席怎样说的，我就怎样做。"},{"type":"paragraph","text":"我们只有觉悟到毛主席著作对于我们革命者象“阳光”、“空气”、“粮食”一样需要，才有可能把毛主席著作学好、用好。"},{"type":"paragraph","text":"学习的整个过程，学习的一切东西，都要从效果出发，着眼于领会和运用，必须切实在“用”字上下功夫，真正做到学用一致，身体力行。"},{"type":"paragraph","text":"我们能够运用毛主席的立场、观点、方法，说明和解决现实问题愈多，改造思想、改进工作的效果愈明显，我们的学习收效就愈大。"},{"type":"paragraph","text":"只要是干革命做工作，总会不断地遇到各种各样的问题，老的解决了，新的问题又会出现。哪里有工作哪里有斗争，哪里就会有问题可以带着学。"},{"type":"paragraph","text":"只有“集中兵力打歼灭战”，把劲使在节骨眼上，一次学习，解决一个问题，学一点，用一点，才能学得深，领会精，运用的好，扎扎实实的搞好工作。"},{"type":"paragraph","text":"学习毛主席著作必须从长期坚持着眼，学习毛主席著作是一辈子的事情，活到老，学到老，一定要不断增强学习的决心和毅力，把学习长期坚持下去。RW：王杰；日记"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fd66eb7a62"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
