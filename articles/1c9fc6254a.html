art":6,"page_end":6,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"为无产阶级政治服务","authors":["某部毛泽东思想文艺宣传队白清海"],"parts":[{"type":"paragraph","text":"伟大的领袖毛主席在《在延安文艺座谈会上的讲话》中教导我们：“要使文艺很好地成为整个革命机器的一个组成部分，作为团结人民、教育人民、打击敌人、消灭敌人的有力的武器，帮助人民同心同德地和敌人作斗争。”我是业余文娱活动积极分子，但是真正理解文艺武器的战斗作用，还是无产阶级文化大革命以来的事。"},{"type":"paragraph","text":"我们团毛泽东思想文艺宣传队，为了紧密配合无产阶级革命派的夺权斗争，编演了一个多口词《无产阶级革命派夺权万岁》。每当我们演出，唱到“战斗吧，无产阶级革命派的战友们，人民解放军誓做你们的坚强后盾！夺权吧，无产阶级革命派的战友们，解放军给你们大力支援！”这句唱词时，总是掌声雷动，演出总是被“向解放军致敬！”“毛主席万岁！万万岁！”的欢呼声打断。有一次为铁路职工、革命干部演出，演完这个节目后，从台下走上来两位戴着红袖章的老工人，他们紧握着我们的手，非常恳切地说：“这个节目说出了我们无产阶级革命派的心里话，对我们教育很大。昨天，有个受蒙蔽站错了队的同志看了你们的演出，一夜没睡好。他反复学习了《毛主席语录》，今天一大早就参加了革命造反派组织。这个节目本来大伙儿都看了好几遍了，我们也知道同志们都很累了，可是大家总想再看一遍……”老工人的话，把我们说得浑身热烘烘的。只要无产阶级革命派需要，我们演十遍百遍也不觉累。大家又精神抖擞、斗志昂扬地把多口词《无产阶级革命派夺权万岁》表演了一遍。"},{"type":"paragraph","text":"晚上，我认真地读着《在延安文艺座谈会上的讲话》，越读越觉得亲切，更加清楚地认识到：只有毛主席的文艺路线，才是无产阶级革命历史上最完整、最彻底、最正确的马克思列宁主义的文艺路线。只有坚定不移地按照毛主席的文艺思想办事，文艺才能发挥它的战斗威力，起到枪杆子起不到的作用，使每句唱词、每个音符都成为支援无产阶级革命派的一份力量，使文艺真正成为“团结人民、教育人民、打击敌人、消灭敌人的有力的武器”。"}],"alias":""},"tags":[{"name":"夺权","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1c9fc6254a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
