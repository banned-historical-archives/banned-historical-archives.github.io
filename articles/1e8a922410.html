art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"波尔布特等同志参观军事博物馆汪东兴副主席陪同柬埔寨战友参观","authors":[],"parts":[{"type":"paragraph","text":"新华社一九七七年九月二十九日讯 柬共中央书记、民主柬埔寨政府总理波尔布特和由他率领的柬埔寨党政代表团，今天上午由中共中央副主席汪东兴陪同，参观了中国人民革命军事博物馆。"},{"type":"paragraph","text":"柬埔寨战友在综合馆里详细地观看了反映中国人民在以毛主席为首的中国共产党领导下，坚持武装夺取政权的道路，经过二十几年的英勇奋斗，取得民主革命伟大胜利的图片和实物。"},{"type":"paragraph","text":"波尔布特等柬埔寨同志还参观了在这里展出的《伟大的领袖和导师毛泽东主席纪念展览》。在展出的毛主席会见外宾活动的照片中，有一九七五年波尔布特同志在北京访问期间毛主席亲切会见他时拍摄的照片。"},{"type":"paragraph","text":"参观结束时，波尔布特同志祝愿中国人民和人民解放军在毛主席革命路线指引下，在以华主席为首的党中央领导下，取得更大的胜利。"},{"type":"paragraph","text":"陪同参观的还有中国人民解放军副总参谋长王尚荣、中共中央对外联络部副部长申健。"}],"alias":""},"tags":[{"name":"汪东兴","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1e8a922410"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
