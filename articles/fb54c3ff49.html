ical-archives/banned-historical-archives0/main/maoquanji50.pdf"],"article":{"title":"对中共八届扩大的十二中全会公报稿的批语","alias":"","parts":[{"type":"paragraph","text":"对中共八届扩大的十二中全会"},{"type":"paragraph","text":"公报稿的批语!!"},{"type":"paragraph","text":"（1968年10月）印发全会各同志讨论。"},{"type":"paragraph","text":"二此句此地不用为宜。2"},{"type":"paragraph","text":"[1]本篇一、二写在1968年10月28日送审的中共八届扩大的十二中全会公报稿上；本篇三写在10月30日送审的公报稿上。这个公报10月31日经全会通过，11月2日在《人民日报》发表。"},{"type":"paragraph","text":"[2]1968年10月28日送审的公报稿中写道：“全会认为，无产阶级文化大革命的伟大胜利，进一步证明了毛泽东思想是马克思列宁主义发展的崭新阶段，进一步证明了毛泽东同志关于无产阶级专政下继续革命学说的极其深远的意义。”毛泽东审阅时，删去了文中“进一步证明了毛泽东思想是马克思列宁主义发展的崭新阶段”一句，并写了这个批语。此外，公报稿的这一段中还讲到，毛泽东思想“是我们全党全军全国一切工作的唯一指导思想”，毛泽东审阅时，删去了其中“唯一”二字。毛泽东全集第五十卷"},{"type":"paragraph","text":"三有一点修改。"},{"type":"paragraph","text":"[1]毛泽东对1968年10月30日送审稿的修改，主要是删去了以下一句话：“毛泽东思想在全国人民群众中的大普及，是这次无产阶级文化大革命取得的一个非常伟大的成就。”"}],"authors":["毛泽东"],"dates":[{"year":1968,"month":10}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":334,"page_end":335},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fb54c3ff49"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
