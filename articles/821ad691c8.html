ical-archives/banned-historical-archives0/main/maoquanji47.pdf"],"article":{"title":"十六字令·八首","alias":"","parts":[{"type":"paragraph","text":"十六字令·八首"},{"type":"paragraph","text":"（1964年）龙!，隐雾驱云驾长风，骤雨霁，天际起霓虹。灯21,黑沉迷途指归程，红光闪，万众获重生。泉，香然无底是灵源，清澈澈，"},{"type":"paragraph","text":"谁人藏心间。[1]龙，指革命者。[2]灯，指革命行动。[3]泉，指革命热情。"},{"type":"paragraph","text":"十六字令·八首水,群众饥渴饮且醉，被颠倒，从此夜生辉。雷，孤夜深深独不寐，隆隆轰，斩断万年碑3。秋叫，百花杀尽犹未休，狂动，神州落荒流。枪15,荧光冥冥过冷芒，忽而怒，"},{"type":"paragraph","text":"平地三尺浪。[1]水，革命理论。[2]雷，革命运动。[3]碑，指“旧思想、旧文化、旧风俗、旧习惯”。[4]秋，指革命年代。[5]枪，指革命武装。毛泽东全集第四十七卷"},{"type":"paragraph","text":"花，可怜羞弱不胜压，昨夜雪，"},{"type":"paragraph","text":"娇藏在冰崖。[1]花，指革命女将。"}],"authors":["毛泽东"],"dates":[{"year":1964}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":409,"page_end":411},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"821ad691c8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
