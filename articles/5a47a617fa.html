ates":[{"year":1968,"month":2,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　在各条战线全面落实毛主席的最新指示，夺取无产阶级文化大革命全面胜利的凯歌声中，上海外语学院革命委员会昨天胜利诞生。"},{"type":"paragraph","text":"在去年九月大联合高潮中，外语学院两派革命群众组织虽然在市革委会的帮助下实现了革命的大联合，但是由于极“左”和极右思潮的影响没有肃清，由于派性作怪，因此在思想上并没有真正联合起来。派性斗争掩盖了阶级斗争，学院革委会一直建立不起来。"},{"type":"paragraph","text":"“办学习班，是个好办法，很多问题可以在学习班得到解决。”在市革委会教卫组、上海警备区军训团、大专院校红代会举办的毛泽东思想学习班上，上海外国语学院的无产阶级革命派，一遍又一遍地学习了伟大领袖毛主席的一系列最新指示，通过学习，认识到:能不能尽快地建立革命委员会，全面落实毛主席的最新指示，这是对毛主席忠不忠的问题，只有思想上心怀一个“忠”字，才能在行动上紧跟毛主席的伟大战略部署。他们决心以“只争朝夕”的革命精神，迅速建立学院的革命委员会。"},{"type":"paragraph","text":"在军训团的帮助下，这个学院的无产阶级革命派学习、总结了文化大革命以来正反面的经验教训，沉痛地检查了由于资产阶级、小资产阶级的派性作怪，两个革命群众组织长期搞磨擦，打“内战”的沉痛教训。在学习班上，双方逐步做到亮私不怕丑，斗私不怕痛，狠斗派性，双方都把来学习班前制定的派性的产物——原定的学院革委会方案，全盘谈了出来，都激动地宣布:这是“以我为核心的产物，应予作废!”双方经过斗私批修，横扫派性，在落实革委会成员的名单时，出现了不争席位，不争名次，互相谦让，互相推荐的共产主义风格，建立了革命的三结合临时权力机构。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"派性","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5a47a617fa"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
