art":5,"page_end":5,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"永远跟着毛主席在大风大浪中前进","authors":[],"parts":[{"type":"paragraph","text":"天安门广场上一片热气腾腾的革命景象。参加大会的百万革命群众热烈庆祝无产阶级文化大革命，欢呼伟大的领袖、伟大的统帅、伟大的舵手毛主席的英明领导。"},{"type":"paragraph","text":"本报记者摄"},{"type":"paragraph","text":"首都革命群众抬着毛主席象和“毛主席万岁”、“中国共产党万岁”的标语牌，浩浩荡荡地行进在天安门广场上。"},{"type":"paragraph","text":"本报记者摄"},{"type":"paragraph","text":"在毛泽东思想伟大红旗下阔步前进！"},{"type":"paragraph","text":"本报记者速写"},{"type":"paragraph","text":"中国人民解放军驻京部队指战员，以无限激动的心情，向伟大的领袖、伟大的统帅、伟大的舵手毛主席欢呼致敬。他们表示：永远跟着党和毛主席闹革命，永远靠毛泽东思想干革命。"},{"type":"paragraph","text":"y新华社记者摄"},{"type":"paragraph","text":"首都各中学的革命小将，兴高采烈地向毛主席热烈欢呼，表达他们对党和毛主席的无限热爱，表达他们把无产阶级文化大革命进行到底的决心。"},{"type":"paragraph","text":"y新华社记者摄"},{"type":"paragraph","text":"参加庆祝大会的首都郊区人民公社社员怀着对伟大领袖毛主席无限热爱、无限信仰、无限崇拜的心情，连声高呼：“毛主席万岁！”"},{"type":"paragraph","text":"新华社记者摄"},{"type":"paragraph","text":"首都大、中学校的革命小将——“红卫兵”，怀着沸腾的革命激情，热烈地向伟大领袖毛主席欢呼致敬，表达他们永远跟着毛主席在大风大浪里前进的革命决心。"},{"type":"paragraph","text":"新华社记者摄 （照片）"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1005dc7e85"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
