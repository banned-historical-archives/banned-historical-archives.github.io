year":1978,"month":5,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"华主席给金主席的感谢电"},{"type":"paragraph","text":"新华社新义州五月十日电  中共中央主席、国务院总理华国锋在离开朝鲜民主主义人民共和国国境的时候，从新义州给朝鲜劳动党中央委员会总书记、朝鲜民主主义人民共和国主席金日成发了一封感谢电，电报全文如下：朝鲜劳动党中央委员会总书记朝鲜民主主义人民共和国主席金日成同志："},{"type":"paragraph","text":"在我们圆满地结束了这次友好访问即将离开贵国之际，我谨向您表示衷心的感谢。我们在访问期间所受到的隆重、热烈的欢迎和亲切友好的接待，极其生动地体现了朝鲜人民对中国人民的兄弟般的深情厚谊，使我们非常感动。"},{"type":"paragraph","text":"我相信，通过这次访问，中朝两党、两国和两国人民之间的伟大友谊和战斗团结，必将得到进一步的巩固与发展。借此机会，再次向您，向朝鲜劳动党、政府和兄弟的朝鲜人民，表示最良好的祝愿。中国共产党中央委员会主席中华人民共和国国务院总理"},{"type":"paragraph","text":"华国锋"},{"type":"paragraph","text":"一九七八年五月十日"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"华国锋","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"750f228da9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
