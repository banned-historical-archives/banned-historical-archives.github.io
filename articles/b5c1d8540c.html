rt":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"祝贺华主席为毛主席的当之无愧的接班人","authors":[],"parts":[{"type":"paragraph","text":"中国，北京"},{"type":"paragraph","text":"中国共产党中央委员会主席、中央军事委员会主席华国锋先生阁下"},{"type":"paragraph","text":"亲爱的主席："},{"type":"paragraph","text":"我代表尼日利亚联邦军政府和全体人民，并以我个人的名义，就你任中国共产党中央委员会主席和中央军事委员会主席，向你致以衷心的敬意，并表示诚挚的祝贺。我们尼日利亚人怀着浓厚的兴趣密切注视着你们伟大国家中发生的事情；我们感到很高兴，中华人民共和国有了你作为伟大领袖和导师毛泽东主席的当之无愧的接班人。你的卓越的品德和丰富的经验使我们相信，你能够成功地带领伟大的中国人民沿着毛主席指引的道路前进，并取得符合你们伟大国家全体人民利益的越来越大的革命成就。我祝阁下健康和长寿，以便你能履行你所肩负的伟大职责，并祝我们两国间的友谊和亲密关系在今后的岁月里继续不断地得到加强。"},{"type":"paragraph","text":"顺致最崇高的敬意。"},{"type":"paragraph","text":"你最诚挚的，"},{"type":"paragraph","text":"尼日利亚联邦共和国联邦军政府首脑、武装部队总司令 奥卢塞贡·奥巴桑乔中将"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b5c1d8540c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
