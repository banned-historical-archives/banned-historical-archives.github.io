s":[],"dates":[{"year":1957,"month":5,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"中央领导人接见各国青年代表"},{"type":"paragraph","text":"彭德怀、贺龙、叶剑英接见部队青年代表"},{"type":"paragraph","text":"新华社25日讯　中共中央领导人毛泽东、刘少奇、周恩来、朱德、陈云、邓小平、林伯渠、董必武、彭真、贺龙、陆定一、薄一波、王稼祥、胡乔木，今天下午接见了应邀参加中国新民主主义青年团第三次全国代表大会的各国青年组织的代表团。受接见的有苏联、越南民主共和国、罗马尼亚、保加利亚、捷克斯洛伐克、朝鲜民主主义人民共和国、德意志民主共和国、意大利、匈牙利、印度尼西亚、阿尔巴尼亚、法国、南斯拉夫、蒙古、英国、日本等十六个国家的青年代表团。"},{"type":"paragraph","text":"新华社25日讯　国防部长彭德怀元帅和贺龙元帅、叶剑英元帅，在今天上午接见了出席青年团第三次全国代表大会的部队青年代表。"},{"type":"paragraph","text":"彭德怀元帅向代表们祝贺团的改名。他说，青年团改名为共产主义青年团使团的任务加重了。青年们要为建设社会主义，要为六亿人民消灭贫困，实现人类理想的最美好的社会制度——共产主义社会而奋斗。"},{"type":"paragraph","text":"接见时在座的，还有陈赓大将、谭政大将、萧华上将、甘泗淇上将和王宏坤海军上将。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"贺龙","type":"人物"},{"name":"叶剑英","type":"人物"},{"name":"彭德怀","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"06a31ccfc1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
