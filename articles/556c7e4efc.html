":[],"dates":[{"year":1954,"month":1,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"云南省红河哈尼族自治区首届各族各界人民代表会议"},{"type":"paragraph","text":"向毛泽东主席致敬电敬爱的毛主席："},{"type":"paragraph","text":"在您伟大的民族政策光辉照耀下，我们云南省红河哈尼族自治区首届各族各界人民代表会议，于一九五三年十二月二十五日至三十一日在元阳县新街召开了。这次会议代行了人民代表大会的职权，全体到会代表充分发扬团结友爱的精神，经过民主讨论和充分协商，制订和通过了自治区人民政府的组织条例和施政方针，庄严地签订了爱国团结公约，选出协商委员会的正副主席和委员，自治区人民政府的正副主席和委员，正式成立了红河哈尼族自治区人民政府。"},{"type":"paragraph","text":"解放四年来，由于您伟大英明的领导和对各族人民关怀爱护，提高了我们的政治觉悟，改善了我们的经济生活和文化生活，结束了历史上的苦难生活。如今我们又获得了自治权利，进一步开辟了光明幸福的前途。我们谨代表全自治区四十万各族人民，向您表示衷心的感谢，并坚决保证今后永远紧密地团结在您的周围，保卫祖国边疆，和全国人民一道在国家过渡时期的总路线的灯塔照耀下，为共同建设伟大祖国的大家庭而奋斗。"},{"type":"paragraph","text":"云南省红河哈尼族自治区首届各族各界人民代表会议全体代表"},{"type":"paragraph","text":"一九五三年十二月三十一日"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"556c7e4efc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
