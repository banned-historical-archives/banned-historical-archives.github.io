script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"切勿做金钱的奴隶——一个派出所副所长犯罪后的自述","authors":["谭伟明"],"dates":[{"year":1988,"month":7,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"切勿做金钱的奴隶"},{"type":"paragraph","text":"——一个派出所副所长犯罪后的自述"},{"type":"paragraph","text":"我叫李×，28岁，原是湖南省湘潭市一个派出所的副所长。在金钱和女色的引诱下，包庇隐藏犯罪分子，落得可耻下场。面对铁窗高墙，我像做了一场恶梦，追悔莫及……。"},{"type":"paragraph","text":"记得1981年我刚参加公安工作时，何等高兴啊！我努力工作，被团市委授予“文明青年标兵”称号。但我在成绩面前，忽视了思想改造，在公安工作的特定环境里，我不是见恶思善、以正压邪、坚定立场、是非分明，而是不知不觉地渐渐变质。1985年8月，我被任命为派出所副所长后，不仅没有兢兢业业，秉公执法，反而飘飘然了。我的思想慢慢地发生了变化，错误地认为，人生在世，就是那么回事！因而对社会上的一些丑恶现象，我见怪不怪，习以为常，后来发展到贪图吃喝玩乐，常常出入于舞厅，尽兴于餐馆，陶醉于灯红酒绿之中，与一些不三不四的人交往甚频。有个劳教人员的妻子，是个赌博惯犯。她在找我交谈中，先是一副可怜相，继而对我肉麻地吹捧，我便对她产生了好感。当我生病住院时，她又第一个到医院看望，并主动替我垫付了400多元住院费，以后又送西装、皮鞋等物给我，并邀我去广州旅游。在她的甜言蜜语和糖弹攻击面前，我完全丧失了警惕，一种愿为她两肋插刀的江湖义气油然而生，不但在生活上与她鬼混，而且在她的犯罪事实暴露后，我还两次出面为她说情。当检察机关决定依法逮捕她的时候，我又公然帮助她隐藏、转移，充当了犯罪分子的保护伞。"},{"type":"paragraph","text":"今日，我如梦方醒，悔恨不已！我决心洗心革面，重做新人，也望人们以我为戒，在改革、开放的大潮中保持清醒头脑，切勿在金钱女色面前，重蹈我之覆辙！"},{"type":"paragraph","text":"（谭伟明整理）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d404fba588"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
