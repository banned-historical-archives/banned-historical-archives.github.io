,"dates":[{"year":1972,"month":11,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京一九七二年十一月十二日电　中共中央政治局委员姚文元今天下午会见了以作家富成傅为团长、剧作家藤井义昭为事务局长的日本山口县文学代表团，同他们进行了亲切友好的谈话。参加会见的代表团团员有:诗人礒永秀雄、评论家太田静一、作家古川熏、作家中村信之、评论家占部弘、《长周新闻社》记者三井幸彦。"},{"type":"paragraph","text":"会见时在座的还有对外友协副会长杨骥，国务院文化组成员于会泳，中日友协秘书长孙平化，有关方面负责人、文艺工作者和工作人员浩然、田树千、单达圻、李福德、肖棣华、唐家璇、徐鸿道、赵春胜、张和平等。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"姚文元","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"97af2f327e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
