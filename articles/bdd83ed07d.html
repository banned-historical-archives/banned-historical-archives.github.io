<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"陈伯达戚本禹与清华革命师生代表的谈话","authors":["戚本禹","陈伯达"],"dates":[{"year":1967,"month":3,"day":26}],"is_range_date":false,"parts":[{"text":"陈伯达戚本禹与清华革命师生代表的谈话","type":"title"},{"text":"陈伯达戚本禹","type":"authors"},{"text":"陈伯达、戚本禹同志接见清华大学部分教职工与井冈山兵团总部代表的座谈摘录。","type":"appellation"},{"text":"地点：人民大会堂会议室","type":"appellation"},{"text":"戚本禹：请大家来谈谈批和改的问题，大学是不是也要考虑复课。","type":"paragraph"},{"text":"陈伯达：……我们要批判从盘古以来的教育制度，创造历史上空前未有的崭新的教育制度。","type":"paragraph"},{"text":"戚本禹：现在教师与学生的关系是个问题。","type":"paragraph"},{"text":"（同学：同学对教师是敬而远之。）","type":"paragraph"},{"text":"戚本禹：教师对同学也是敬而远之吧！","type":"paragraph"},{"text":"（同学：我们不太愿学习，都想走。教师：教师也想走。）","type":"paragraph"},{"text":"陈伯达：教师也想走？教员比例多大？两千多？教职工共七千三百人？过去一个教员，一个人管几十人，几吊钱，以后十个人一个教员，是不是太多了？","type":"paragraph"},{"text":"（群众：太多了。）","type":"paragraph"},{"text":"戚本禹：是多了，现在工厂需要大批的技术人员，有文化的，特别是小工厂。","type":"paragraph"},{"text":"（教师：学校教育两个特点：脱离群众，脱离实践，科学“修养”科学“八股”。）","type":"paragraph"},{"text":"陈伯达：秀才、举人……也不是学校里出来的，而是自己修、自修，所以资本主义教育制度有他进步的方面，有他退步的方面。","type":"paragraph"},{"text":"过去出来的人就想当官。","type":"paragraph"},{"text":"居里夫人她还是自修出来的，科学技术中有很多辩证法，不能搞形而上学，你们可以研究这个问题，你谈的很对。","type":"paragraph"},{"text":"（教师：……我们思想感情完全同劳动人民脱离了。）","type":"paragraph"},{"text":"陈伯达：什么是高标准？高标准也有不同的说法，毛主席的《改造我们的学习》主要是针对社会科学，但是也适用于自然科学，科学技术也要按照毛主席《改造我们的学习》办。几万人的大工厂，几百万人的大城市就是有问题。……","type":"paragraph"},{"text":"戚本禹：林学院应当搬到东北的大森林里去。不要高楼大厦，住在帐蓬里带些书本就行了。需要尖端科研的是否要在北京？","type":"paragraph"},{"text":"陈伯达：也不一定，林学院毕业生，毕业后，要动员到森林里去，要做很多思想工作。清华多少系，我看可以搬到多少个地方去。","type":"paragraph"},{"text":"戚本禹：这可要大乱了。","type":"paragraph"},{"text":"戚本禹：科学研究还要不要在学校？","type":"paragraph"},{"text":"（群众：应到工厂去，到外边去。）","type":"paragraph"},{"text":"陈伯达：科研也要在外边搞，尖端科研应该在……，建造了这么多房子怎么办？我真发愁。","type":"paragraph"},{"text":"戚本禹：房子是会有用的。","type":"paragraph"},{"text":"陈伯达：房子可以做展览馆，可以招待外国人。文科怎么办？例如北大。","type":"paragraph"},{"text":"戚本禹：北师大有一个叫林海洋的人来信说文科三年。第一年是长征，劳动……","type":"paragraph"},{"text":"陈伯达：三年太长了，长征，这为什么要在学校里搞呢？长征主要是指接触社会，走路走多了是一种休息，不见得累。居里夫人的发现并不是在课堂上，她和他丈夫，一个助手，两三个人搞起来的。","type":"paragraph"},{"text":"（群众：基础课改革难，专业课改革比较容易。）","type":"paragraph"},{"text":"陈伯达：专业课改革也不怎么难。","type":"paragraph"},{"text":"（教师：基础课的体系必须破掉，都是“从猿到人”，过去学生是被加工的对象，“一言堂”。）","type":"paragraph"},{"text":"陈伯达：过去教改的结果，恐怕得重新研究，恐怕应该再总结—下。","type":"paragraph"},{"text":"（教师：学建筑，高大精尖，不考虑五亿农民的需要。）","type":"paragraph"},{"text":"戚本禹：有没有学过农村的房子建筑？没有，啊！","type":"paragraph"},{"text":"陈伯达：北方农村的炕是最好的，要有它的总结经验，是最高级的建筑物。城市膨胀了。北京过去进城时一百六十万人，日本占领时，很多土豪劣绅、地主、富农跑到城市里来了，……","type":"paragraph"},{"text":"（群众：什么是高级、低级都颠倒了。）","type":"paragraph"},{"text":"陈伯达：什么是高标准……。要总结实际经验。四川有的老百姓，猪、牛、人，茅房都在一个房子里，不要以为“天堂”的地方，什么都好，有的地方房子很糟糕的。","type":"paragraph"},{"text":"杭州房子很多都是草房子。……要研究，各地方不一样，有的地方有木材，有的地方有芦苇。……西北住窑洞，很好，冬天里很暖和，夏天很凉快，要从实际出发。（有人送上条子看后）今天主要是研究教改，提出问题，不做定案，有些没有准备的发言，也很好。五八年大跃进的时候，你们搞了一套制度，后来又一笔勾销了，你们天天在考虑这个问题，你们有准备的是干部问题？这与今天的会内容不太一样。你们可以组织一个小组，可以搞个小刊物“教学批判”。这是百年大计，千年大计，万年大计，究竟是培养修正主义接班人，还是社会主义接班人？","type":"paragraph"},{"text":"","type":"appellation"}],"comments":[],"origin":"1967年11月北师大革委会斗批改办公室《教育革命学习材料（一）》","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"戚本禹","type":"人物"},{"name":"陈伯达","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bdd83ed07d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
