958,"month":7,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"7月号的“学术月刊”发表了马白和包永新二人合写的“钱谷融典型论中的修正主义”一文，指出钱谷融在典型论上，和他反对文学反映社会现实一样，也是攻击阶级性，把阶级性与人性、个性对立起来。"},{"type":"paragraph","text":"这篇文章以下列几项理由来驳斥钱谷融把阶级性和个性相对立的谬论。第一，“抽象的个性是没有的，个性和阶级性并不是对立的东西”。第二，在阶级社会中，人的本质就是他的阶级性。第三，即以阿Q的典型性而论，他的典型性是根植于阶级的。“阿Q是一个农民，是某一个阶层的农民”。所以，“典型性和阶级性不能绝对割裂”。"},{"type":"paragraph","text":"钱谷融反对文学反映社会现实，着重人物描写而轻视典型环境。这篇文章批驳了他的谬论，并指出“典型环境和典型性格两者是辩证的统一”。如同花草和土壤，鱼和水的关系一样。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4e7ff3f4ef"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
