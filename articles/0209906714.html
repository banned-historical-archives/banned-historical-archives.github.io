" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"右派言论——诋毁历次运动","authors":["云南","李凤桐","李鸿谟","杨克成","罗桂元","陈洪恢"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"右派言论——诋毁历次运动","type":"title"},{"text":"云南杨克成李凤桐陈洪恢李鸿谟罗桂元","type":"authors"},{"text":"杨克成(昆明市副市长、民主建国会昆明市委负责人，云南省工商联常委、省人民委员会委员)","type":"paragraph"},{"text":"工商界在五反中吃了苦头。从帮助党整风的角度来看，让工商界吐“苦水”有多大好处？我看算“五反”的旧账，对整风帮助不大，因为过去的问题不如今天合营企业中公私共事问题来得直接。但是工商界本身不吐“苦水”坏处很大，思想上能不能彻底解决问题呢？又有鼓励他们谈的必要。","type":"paragraph"},{"text":"“吐苦水”是我说的，……如“肃反”中斗错了人，“三反”“五反”中斗偏了的事。……但是，在这当中我不能不说明一点：资产阶级有苦向共产党诉是好的，指使这个阶级向帝国主义和反动派去诉就不好了，资产阶级受了委屈，也不许吐苦水，那就把资产阶级划到另一方面去了，不是人民内部矛盾了。","type":"paragraph"},{"text":"李凤桐(云南省财政干部学校总务科科长)","type":"paragraph"},{"text":"运动一来就扣，就押，就关，不是使人口服心服，而是苦打成招。有些人花花巧巧，告人的人却被认为是积极分子。领导上明知道这个人是坏蛋，却被吸收入党。在“肃反”运动中有些人就是造谣生事，无中生有，明明知道是别人的事，也要诬赖好人，不是反革命也说成反革命。“三反”中不是贪污分子也说成贪污。","type":"paragraph"},{"text":"陈洪恢","type":"paragraph"},{"text":"从肃反运动看，就不一定要这样做。我怀疑肃反政策不大正确，也不及时。1954年公布宪法，肃反又把宪法推翻了。是否有必要来一个大张旗鼓的肃反运动，我看不见得。","type":"paragraph"},{"text":"李鸿谟、罗桂元(省政协学校学员)","type":"paragraph"},{"text":"“三定”的方法方式，虽较“三反”、“五反”来得客气，但迷惑困扰，疲劳轰炸，造成恐怖气氛，应无逊色。农民暗中悲愤的说：“今天又轮到我们了”。","type":"paragraph"}],"comments":[],"origin":"《坚决粉碎右派分子的猖狂进攻》（反右派斗争学习参考材料之一，中共云南省委党校教务处编，云南人民出版社，19579月）。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"人民内部矛盾","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0209906714"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
