ors":["《内部参考》"],"dates":[{"year":1957,"month":6,"day":4}],"is_range_date":false,"parts":[{"text":"南京大学学生在新华日报门前张贴大字报","type":"title"},{"text":"《内部参考》","type":"authors"},{"text":"南京大学学生是6月1日开始拥到新华日报门前张贴大字报的，当天新华日报文教组记者强剑患即贴出大字报提出质问。他在大字报上写道南大学生民主运动情况为什么不报道，大学生已经动起来了，并已质问到门上来，无视这种事实是愚蠢的。他反对不报道南大消息是记者选择新闻自由的说法。他认为这是自欺欺人，有这种思想的记者应该撤回来，派思想先进的记者去报道。他写道：“重庆新华日报只有被国民党捣毁，从来没有被群众质问过，我们要为恢复老新华日报的名誉而斗争。”关于报纸是否刊登南大消息的分歧意见，报社领导上劝说大家不要张贴大字报，强剑患又贴出大字报反对，他写道，为了不让人家知道，大字报可以贴到三楼上去，如果你(指领导上)要亲手或指使别人撕掉大字报的话，我将向中央控告你。","type":"paragraph"},{"text":"记者孙士正，预备党员，把党内的谈话写到大字报上，向群众公布，说副总编辑樊发源曾对他说过，要他独立思考，不要跟人家走，要对某人提高警惕等。这张大字报引起群众情绪激动。","type":"paragraph"},{"text":"现新华日报内沿着楼梯从三楼起直到楼下，张贴了几十张大字报。有的提出八项要求，有的提出五点意见等等。要求贯彻中央整风指示精神，解放思想，搬除影响大“放”大“鸣”的枷锁，改组整风领导小组，吸收党外人士参加，要领导上立即检讨，否则要求从领导整风的岗位上撤下来。有的要求刻不容缓地开展新闻业务的讨论，改进报纸。点名要求把报社下放农村工作的干部调回来整风，撤换不称职的组长以上的干部，把一些不合理的干部工资级别拉下来。肃反中被斗争的要求平反等等。","type":"paragraph"},{"text":"新华日报还有些编辑在酝酿办同仁报纸，初步计划自己筹集经费，每星期出一期，内容主要是揭发矛盾和刊登具有社会兴趣的新闻和文章。还有些人在报社内部座谈会上，公开提出要民主改造报社的领导干部，或让他们来办报，办一个星期试一试，保证比现在办得好。","type":"paragraph"},{"text":" ----来源：1957年6月7日新华通讯社编《内部参考》。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a2ff01a098"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
