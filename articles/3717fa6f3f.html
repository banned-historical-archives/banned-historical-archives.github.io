<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"在动员集镇居民支援农业中新兴公社发生强迫命令违法乱纪行为","authors":["新华社"],"dates":[{"year":1960,"month":10,"day":12}],"is_range_date":false,"parts":[{"text":"在动员集镇居民支援农业中新兴公社发生强迫命令违法乱纪行为","type":"title"},{"text":"新华社","type":"authors"},{"text":"本刊讯　江苏省盐城地委在９月下旬接一封人民来信，揭发盐城县新兴人民公社和新兴大队，在动员集镇居民支援农业工作中犯有严重的强迫命令和违法乱纪的错误。地委书记很重视这件事，当即派工作组下去调查。调查结果证明，新兴人民公社和新兴大队确实发生过下列强迫命令和违法乱纪行为：","type":"paragraph"},{"text":"一、停止口粮供应。新兴大队两批下放支农的十八户居民，有十户因思想不通和存有实际困难，迟迟不愿下去，因而即按宣布下放的日期，分别停止九户二十五人的口粮供应。停止供应的时间，多者十五天，少者也有六天。据了解，有两户曾断炊两至三天。沈国平六口子断粮三天，向人借到一斤粮票，买了米头子搞青菜冬瓜混吃，但终因饥饿难忍，小孩子跑到蔬菜园上找他爸爸要吃，他爸爸向生产队长胡连青要求恢复供应，胡说：“那个叫你不下去的，一家子饿死拉倒，饿死替狗死！”","type":"paragraph"},{"text":"二、民兵持枪押人。在下放过程中，大队曾用两个民兵，手执武器，将思想不通的群众倪同西、周淑珍、沈大成、倪福西、沈国平五人押至公社，陈社长对他们训了话，并说：“你们要全家搬走，去改造思想。”当时倪同西不服，曾反抗了几句：“我有什么错误，以前既未做过事，也未扛过枪，要改造什么思想。”陈社长就发态度说：“不与你谈了！”在这个期间，大队也召开过一些会议，民兵同样是?带武器，逐户上门喊人，严重地侵犯人身自由。","type":"paragraph"},{"text":"上述两种强迫命令和违法乱纪的行为，是紧密联系在一起的，企图从生活上思想上对群众施加压力，达到下去支援农业的目的。由于如此，群众在街上大吵大喊，客观上造成了极坏的政治影响，把伟大的光荣的群众性的支援农业运动，在人们印象上错认为是对坏人的改造。","type":"paragraph"},{"text":"在支农运动中，公社党委和大队支部有下列错误思想","type":"paragraph"},{"text":"一、有丢包袱思想。支农运动开始时，公社党委认为公社所在地的政治情况过于复杂（敌占时间较长，有政治历史的人较多），要分散一部分到其他大队去劳动改造，以减少公社住地的复杂性，存在一种丢包袱的思想。在这种错误思想的指导下，把伟大的支援农业任务与处理敌我矛盾混淆起来，把有一般的政治历史问题和没有问题的好人与交保就医的犯法分子和管制分子混淆起来，统称为下去“改造”，扩大了敌我矛盾，破坏了政治影响，带来工作上的很大被动。","type":"paragraph"},{"text":"二、大队干部对平素不够顺眼的人（不分有无劳动能力）均企图通过支援农业进行下放，因而把年高六十岁以上和长期有病不能劳动的人也排上四户（均经公社党委研究的）。倪同西现年六十四岁，患有疝气病，妻五十一岁有黄病，还有一个七十多岁的岳母。因这家人平素会讲一些怪话（无政治历史问题），这次就叫他支援农业（称改造）。这种错误作法是脱离群众，不得人心的。公社党委批准时，明知没有劳动能力，但未很好检查纠正。","type":"paragraph"},{"text":"三、由于混淆了敌我界限，满足于行政命令，就没有充分地进行思想动员和组织准备，如动员那些不管有无劳动能力的人全家迁出，怎样迁法，迁至那里，迁进那家房屋以及其他具体问题如何解决等，都没有很好落实。尤其惹人反感的，就是不该动员迁出的（无劳动能力的人）也动员迁出。同时领导上办事一味凭着自己的好恶而不从群众的切身情况设想。如新兴镇仅有三千左右的人口，出脚就是农村，在下放对象当中，部分人就是菜农、饲养员，这些人可以就地劳动，无须迁出。","type":"paragraph"},{"text":"来源：1960年10月12日新华社《内部参考》。","type":"paragraph"}],"comments":[],"origin":"美国图书馆收藏","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3717fa6f3f"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
