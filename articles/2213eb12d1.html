script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"巴特寮电台评论议定书执行情况  老挝爱国力量为实现民族和睦坚持斗争  反对萨纳尼空极右反动集团拖延和破坏协定的行为","authors":[],"dates":[{"year":1973,"month":10,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"巴特寮电台评论议定书执行情况"},{"type":"paragraph","text":"老挝爱国力量为实现民族和睦坚持斗争"},{"type":"paragraph","text":"反对萨纳尼空极右反动集团拖延和破坏协定的行为"},{"type":"paragraph","text":"新华社一九七三年十月二十一日讯　巴特寮电台十月二十一日广播一篇评论，回顾万象协定的议定书签订一个月来的执行情况，表示老挝各爱国力量将继续作坚决努力，为在全国范围内实现民族和睦创造条件。"},{"type":"paragraph","text":"评论说，在过去的一个月中，各爱国力量作出了坚持不懈的努力。在九月十四日议定书签订后，老挝爱国战线中央、老挝人民解放军最高指挥部、老挝爱国中立武装力量指挥部分别发表了号召书和停火令，号召全国干部、战士和同胞严格履行协定及议定书。不久，各爱国力量方面派出了参加执行协定中央联合委员会的代表团前往万象。所有这些表现出了老挝各爱国力量在履行协定及议定书过程中以民族和人民的利益为重的一贯诚意和严肃态度。"},{"type":"paragraph","text":"评论说，自执行协定中央联合委员会成立以来，双方共同合作，已经较好地做了某些重要工作，如已经开始把老挝各爱国力量方面的干部、战士和工作人员运到万象市，这就为尽快成立临时民族联合政府和民族政治联合委员会、使万象和琅勃拉邦两市中立化创造了条件。"},{"type":"paragraph","text":"评论说：但是，“公众舆论也对萨纳尼空极右反动集团在履行协定中缺乏诚意的行为表示不满。”评论接着说，他们极力歪曲协定及议定书的内容，污蔑各爱国力量，散布发动政变的流言，并且接连派遣军队向老挝各爱国力量控制的地区发动“扫荡”、进攻和窜犯。"},{"type":"paragraph","text":"评论说：“老挝各爱国力量坚决反对他们拖延和破坏协定及议定书的行为。”"},{"type":"paragraph","text":"评论说：“老挝各爱国力量严格履行协定及议定书，同时将继续作出坚决的努力，同万象政府方面一道，促使万象和琅勃拉邦两市尽快实现中立化，为早日成立临时民族联合政府和民族政治联合委员会、在全国范围内实现民族和睦创造有利条件。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2213eb12d1"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
