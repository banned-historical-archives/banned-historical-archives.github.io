院","洪琦林"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"马屁先生正传","type":"title"},{"text":"成都地质学院洪琦林","type":"authors"},{"text":"（原文署名“酸公”）","type":"subtitle"},{"text":"马屁先生不知何许人也，以其生好拍马屁，故以名之。先生幼即聪敏过人，善体大人之意，迎奉之术已初萌矣，其父辈皆官宦世家，素有谗上媚主之才欺乡霸里之势，家学渊源，故先生能承其衣钵发扬光大，良有以也。","type":"paragraph"},{"text":"及长，正值解放初期，先生俨然以进步姿态乔装于组织之前，开会则夸夸其谈，满口“马列”，行动则假充积极跑前颠后，老天不负苦心人，终有一日到来，先生胸带红花台前停立，无比激动，举臂宣誓，乃一共产党员矣！","type":"paragraph"},{"text":"先生首任科长之职，对领导之栽培，益发报效无微之至，首长用品，率皆精美绝伦，首长膳食当然物美价廉，首长指示必须洗耳恭听，首长搬家愿效犬马之劳，虽满头大汗，何听怨言，鞠躬尽瘁，死而后已。或曰先生如此之精诚，伪所为欤！一言以蔽之曰，“升级加薪”此先生一贯之宗旨也，先生之对普通干部，也则又一付手腕，回然不同也，群众领取用品，一律增产节约，群众不满膳食，羊羹难调众口，群众提出批评，拍桌打板申斥，群众如要搬家，一个工人不派，虽意见如山，好在债多不愁，先生有领导后台，自然天地不怕。","type":"paragraph"},{"text":"奈天有不测风云，中央号召整风开始，群众意见如雪片飞来，民主墙上缤纷多采，先生之时运不振矣。先生深居简出，抑郁不振，饮食不下，卧床不起，先生以旷世之奇才，今日乃遭垓下之困，终于×年×月×日寿终于官邸，呜呼！哀哉！","type":"paragraph"},{"text":"先生一世英名于此休矣！小子不忍先生之不凡经历泯没于后世，遂拔笔以为正传，有诗为证：","type":"paragraph"},{"text":"旷世奇才马屁君","type":"paragraph"},{"text":"拍上欺下堪绝伦","type":"paragraph"},{"text":"呜呼一旦无常去","type":"paragraph"},{"text":"清风冷月伴幽魂","type":"paragraph"},{"text":" 来源：《四川省右派言论选辑4》(内部文件，只供领导同志参考，请勿外传和翻印)，中共四川省委宣传部办公室编，1957年7月28日。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2693c86016"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
