伦"],"dates":[{"year":1957,"month":2,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报义乌讯】　浙江义乌县苏溪乡红焰农业社，在春节前盖了很多新房。红焰社共118户，20多年来，本村只有四户人家造了11间新房。现在只几个月就造了33间新房。从户数上看，除11户原是贫农的社员已造了新房外，还有17严正在平基、筹办建筑材料，在春节前后都可动工。50多岁的胡绍茂:一家六口人，20几年来，一直挤在一间房子里住，不但鸡笼、兔笼、桌椅挤满屋子，三个儿子都20多岁了，同居也很不方便。现在他家造了七间新房，胡绍茂高兴地说:“真想不到住新房啊!”金朱盛和金天两兄弟造了五间新房，新房的柱子上贴着一付对联:毛主席功高如山，共产党恩深似海。　(宋正伦)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2c4eabc6b3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
