:["中国人民大学","汪同祖"],"dates":[{"year":1957,"month":5}],"is_range_date":false,"parts":[{"text":"人民大学宗派主义根源在党中央","type":"title"},{"text":"中国人民大学汪同祖","type":"authors"},{"text":"（汪同祖：中国人民大学新闻系外语教研室副教授）","type":"subtitle"},{"text":"人民大学一开办就竖起了两面大旗；一面是教条主义，一面是宗派主义。教条主义的根源是由于学习苏联。宗派主义是由于党团员多，根源在党中央。","type":"paragraph"},{"text":"学校象衙门，而学术空气不浓，过份强调政治，学术次要的。","type":"paragraph"},{"text":"人民大学是个党员很多非党同志很少的一个大学，所以党群这座墙就很难推倒。","type":"paragraph"},{"text":"首先应该去掉几个副校长。我们要那么多副校长干什么？！他们不懂业务，不知道干些什么！","type":"paragraph"},{"text":"人大的行政干部对待知识分子是秀才碰着兵，有理说不清。","type":"paragraph"},{"text":" 来源：《高等学校右派言论选编》（中共中国人民大学委员会，1958年8月）。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1530e9cc9f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
