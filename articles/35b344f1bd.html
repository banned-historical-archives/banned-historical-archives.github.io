script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"忠心耿耿为美帝国主义效劳  南修正主义者露出奴才嘴脸  美“工人周报”斥南宣传机器诬蔑我国外交政策","authors":[],"dates":[{"year":1958,"month":11,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"忠心耿耿为美帝国主义效劳"},{"type":"paragraph","text":"南修正主义者露出奴才嘴脸"},{"type":"paragraph","text":"美“工人周报”斥南宣传机器诬蔑我国外交政策"},{"type":"paragraph","text":"新华社7日讯　美国“工人周报”11月2日刊载了一篇题为“南斯拉夫修正主义和远东危机”的文章，斥责南斯拉夫修正主义者对中国外交政策的诬蔑和为美帝国主义效劳。"},{"type":"paragraph","text":"这篇文章揭露了南斯拉夫修正主义者在美帝国主义者正在加紧制造远东紧张局势的时候所扮演的可耻角色。“工人周报”举出贝尔格莱德9月16日出版的“国际政治”杂志的一篇污蔑中国外交政策的文章，来说明南斯拉夫修正主义者如何为美帝国主义者效劳。"},{"type":"paragraph","text":"“国际政治”杂志的文章作者是南斯拉夫“战斗报”的国际问题评论员特斯利奇。他在一篇题为“中国的外交政策”的文章中极为无耻诬蔑和恶毒地攻击中华人民共和国“放弃”万隆原则，选择了“集团联盟”政策。“工人周报”的文章说：特斯利奇在长达二十二段的文章中用99％的篇幅来攻击中华人民共和国。"},{"type":"paragraph","text":"“工人周报”说：“这个说法是同南共第七次代表大会所宣布的纲领一致的，这个纲领拒绝了关于帝国主义是战争趋势和危险根源这一马克思列宁主义的概念，而采纳了这样的概念，即认为危险同样来自两个大国集团，这两个集团一个是资本主义集团，另一个是社会主义集团。”“工人周报”指出，但是事实上，南共纲领把它的“控告的主要力量针对着苏联”。"},{"type":"paragraph","text":"“工人周报”说，特斯利奇在他的文章里虽然重申了“两个集团”的路线，但是可以十分清楚地看出，他企图把这次危机的责任推到苏联和中华人民共和国身上。"},{"type":"paragraph","text":"“工人周报”的文章最后说，这就是修正主义的本色，“在危险很严重的时候——当全世界站在杜勒斯的所有边缘中最危险的边缘上的时候，这位所谓纯粹的、现实的、现代的社会主义者却站在英国工党的右边，站在前议员莱曼和前（美国）国务卿艾奇逊的右边”。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"35b344f1bd"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
