art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"卫星上天红旗高举——驳张春桥“卫星上天，红旗落地”的谬论","authors":["袁淑娟孙连成"],"parts":[{"type":"paragraph","text":"张春桥在《论对资产阶级的全面专政》这篇黑文章中，抛出了一个“卫星上天，红旗落地”的所谓“历史经验”，要人们“任何时候不要忘记”。“四人帮”惯于用贼喊捉贼的伎俩，明明是他们自己大搞修正主义，要使社会主义的红旗落地，却戴上维护“红旗”的假面具，要人记住苏修“卫星上天，红旗落地”的教训，真是无耻之极。"},{"type":"paragraph","text":"列宁缔造的第一个社会主义国家“红旗落地”，了，原因何在？难道如张春桥所说，是“卫星上天”的结果吗？完全不是。是苏修叛徒集团篡夺了党和国家的领导权，推行反革命的修正主义路线，复辟资本主义的结果。因而，坚持无产阶级专政下的继续革命，防止党内资产阶级的野心家、阴谋家篡党夺权，这才是我们从苏联所应吸取的惨痛教训。张春桥玩弄“假作真来真事隐”的把戏，把苏联的“红旗落地”归之于是因为“卫星上天”的结果，这不是为苏修新徒集团开脱又是什么呢？"},{"type":"paragraph","text":"张春桥别有用心地把“卫星上天，红旗落地”作为一个普遍规律提出来，似乎致力于发展工农业生产和科学技术，使卫星上天，红旗就必然要落地；为了防止“红旗落地”，就只有不去高速度地发展工农业生产和科学技术，这是对马克思主义的公然背叛。马克思历来重视生产和科学技术的发展。恩格斯《在马克思墓前的讲话》中说过：“在马克思看来，科学是一种在历史上起推动作用的、革命的力量”（《马克思恩格斯选集》第三卷第五七五页），这就是说生产力的发展，科学技术的进步，是推动社会制度发生变革的力量，而决不是促使社会发生倒退的力量。有了毛主席革命路线的指引，坚持社会主义的方向，我们高速度地发展社会主义工农业生产，发展科学技术，只会使我们的红旗举得更高，而决不会使“红旗落地”。"},{"type":"paragraph","text":"生产力和生产关系是一种辩证的关系。生产力的发展为生产关系的变革提供了物质基础，而当生产关系不能适应生产力发展的时候，只有生产关系的变革，才会促进生产力的巨大发展。伟大领袖毛主席运用生产关系一定要适合生产力性质的规律，为我国社会主义革命和建设制定了一系列马克思列宁主义的方针、政策。“四人帮”大施阴谋，极力破坏，他们炮制了一系列破坏革命、破坏生产的反动口号，什么“宁要社会主义的低速度，不要资本主义的高速度”呀，“宁要社会主义的草，不要资本主义的苗”呀，“宁要社会主义的晚点，不要资本主义的正点”呀……“四人帮”公然把“高速度”、“正点”和“苗”等好事同腐朽没落的资本主义联系起来，而把“低速度”“没有文化”、“晚点”和“草”同叶会主义连在一起，这正好暴露他们是一伙搞复辟倒退的、右得不能再右的反革命黑帮吗。"}],"alias":""},"tags":[{"name":"张春桥","type":"人物"},{"name":"四人帮","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1d083b18b5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
