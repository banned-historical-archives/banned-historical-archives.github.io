"year":1993,"month":12,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"《新疆人民永远怀念毛主席》音带出版"},{"type":"paragraph","text":"“把天下的水都变成墨，把蓝天和大地都当作纸，也写不完毛主席的恩情。”"},{"type":"paragraph","text":"为纪念毛泽东主席１００周年诞辰，新疆音像出版社近日推出了《丝路歌魂》系列音乐之一——《新疆人民永远怀念毛主席》专辑。专辑收录了五六十年代在新疆乃至全国广为流传的民歌，有大家熟知的《毛主席的恩情唱不完》、《萨拉姆毛主席》、《草原上的金太阳》等２０余首，既保留了民歌原有的演奏、演唱风格，又在配器手法上充分利用了现代化科学手段，耳熟能详之外，又带给人明朗、舒畅的现代气息。"},{"type":"paragraph","text":"据悉，经过几年来的准备与紧张的录制工作，到目前为止，新疆音像出版社不但已录制出版了整套维吾尔族古典音乐“十二木卡姆”，还系统地录制了新疆民族音乐各类作品２００余首。它们分为“丝路歌魂”系列（包括新疆各民族优秀民歌，新疆风格的创作歌曲及王洛宾、田歌等作品专辑。）和“西域乐魂”系列（包括新疆民族舞曲、新疆风格的轻音乐等）。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"新疆文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e43aebf23d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
