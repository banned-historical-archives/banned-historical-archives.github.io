”（概要）","authors":[],"dates":[{"year":1972,"month":8,"day":9}],"is_range_date":false,"parts":[{"text":"中共中央批转“四川省委、成都军区党委扩大会议总结提纲”（概要）","type":"title"},{"text":"1972年3月23日，中共中央批转四川省委关于解决四川问题的请示报告。报告提出联系四川实际批判林彪反党集团罪行的请示意见。此前，11日、22日，中共中央政治局成员两次接见了刘兴元、李大章等四川省负责人，宣布刘兴元任中共四川省委第一书记、省革委会主任。7月中旬，中共四川省委、成都军区召开常务扩大会议，传达贯彻中央批林整风汇报会议精神。8月9日，中央召集四川省负责人刘兴元、李大章等10人到北京，讨论制定了《四川省委、成都军区党委扩大会议总结提纲》。8月17日，中共中央批转了这个《提纲》。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"四川文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"08d7b9fa0d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
