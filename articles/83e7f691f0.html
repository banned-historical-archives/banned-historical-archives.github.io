央高级党校","姚北桦"],"dates":[{"year":1956,"month":8,"day":8}],"is_range_date":false,"parts":[{"text":"忽然想到（杂文）","type":"title"},{"text":"中共中央高级党校姚北桦","type":"authors"},{"text":"（姚北桦：新闻班第三班第一支部学员；入学前为江苏《新华日报》副刊主编）","type":"subtitle"},{"text":"[原编者按：这是姚北桦在1956年8月写的一篇污蔑新社会里“连读报也没有自由”的杂文。发表于新华日报1956年8月8日“副刊”。署名：司空见。全文如下。]","type":"paragraph"},{"text":"据说某学校有位教师因爱看上海某小报，也被人指为有“思想问题”。理由是：上海者，花花世界也，爱看花花世界的小报者，一定是羡慕花花世界的生活方式者也。结论是：资产阶级思想无疑。","type":"paragraph"},{"text":"乍听的时候，觉得这种事情实在好笑；转而一想，又似乎觉得不值一笑；但是想而又想，却觉得严重起来了。","type":"paragraph"},{"text":"按照上述公式推论，岂不事事都可能成为“问题”？比如，北京是历代帝王的都城，如果爱看北京的报纸，就会有封建思想之嫌。准此，南京的报纸也不能看，因为南京曾是国民党反动派的首都……。","type":"paragraph"},{"text":"想不到在看报这件日常小事上，也有这么大的“帽子”。","type":"paragraph"},{"text":" 来源：中共中央高级党校校部办公室印；共印1800份，发全校学员和有关干部。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"83e7f691f0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
