" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji51","name":"毛泽东全集第51卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji51.pdf"],"article":{"title":"对中国党政代表团访问越南的两个文件送审稿的批语","alias":"","parts":[{"type":"paragraph","text":"对中国党政代表团访问越南的"},{"type":"paragraph","text":"两个文件送审稿的批语I"},{"type":"paragraph","text":"（1971年3月）"},{"type":"paragraph","text":"可以提出征求越方意见。他们可能认为这样说好，也可能认为说得较隐嗨一点好，我还看不清他们的主意。"},{"type":"paragraph","text":"[1]周恩来1971年3月3日将他准备在越南河内群众大会上的讲话稿和中越两国党和政府联合公报（中方草稿）送毛泽东审阅，并提出：两个文件中画有红杠处是新的提法，请考虑。周恩来在河内市群众大会上的讲话稿中画红杠的一段话是：“越南、老挝、柬埔寨是中国的近邻，我们决不允许美帝国主义在那里为所欲为。如果美帝国主义硬要沿着扩大侵略印度支那战争的道路走下去，中国人民将采取一切必要措施，甚至不惜承担最大的民族牺牲，全力支援越南人民的抗美救国战争，全力支援印度支那三国人民的抗美救国战争，直至彻底打败美国侵略者。”中越两国党和政府联合公报（中方草稿）中划红杠的一段话是：“中国人民决不允许美帝国主义在印度支那地区肆无忌惮，为所欲为。如果美帝国主义沿着扩大侵略印度支那战争的道路走下去，中国人民决心采取一切必要措施，甚至不惜承担最大的民族牺牲，全力支援越南人民和印度支那各国人民，彻底打败美国侵略者。”周恩来的讲话和联合公报分别在1971年3月10日和11日《人民日报》发表。"}],"authors":["毛泽东"],"dates":[{"year":1971,"month":3}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":181,"page_end":181},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b7bd33b9cc"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
