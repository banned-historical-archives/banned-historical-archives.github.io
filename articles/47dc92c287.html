art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"又一曲毛泽东思想的颂歌","authors":[],"parts":[{"type":"paragraph","text":"西藏翻身农奴万里迢迢送马支援邢台地震灾区人民的光辉事迹，深深地感动了邢台灾区成千上万的人民，也深深地感动了我们。这是党的民族政策的胜利，是伟大的毛泽东思想的颂歌。"},{"type":"paragraph","text":"是什么力量把万里之外的藏族同胞和邢台灾区人民的心紧紧连结在一起，把藏族同胞和祖国各族人民的心紧紧连结在一起？是崇高的无产阶级感情，是伟大的毛泽东思想。藏族同胞说：“虽然我们和邢台地区人民没有见过面，可是我们一心听毛主席的话，都热爱毛主席的书，大家走社会主义光明大道的决心是一个，藏汉族人民的心是在一起跳动的。”这话说得真好。说到我们每个人的心坎上。伟大的毛泽东思想是我国人民战胜国内外敌人的强大武器，也是我国各族人民团结和革命的共同基础。有了毛泽东思想，我国各族人民就会同呼吸、共命运，就会团结得象一个人一样。"},{"type":"paragraph","text":"毛主席说：“国家的统一，人民的团结，国内各民族的团结，这是我们的事业必定要胜利的基本保证。”只要我们各族人民永远高举毛泽东思想伟大红旗，团结在我们伟大的党和敬爱的领袖毛主席的周围，我们就天不怕，地不怕，什么困难都能克服，什么敌人都能战胜，我们的社会主义祖国就会一天天更加兴旺，我们的革命事业就会取得更大的胜利。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"47dc92c287"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
