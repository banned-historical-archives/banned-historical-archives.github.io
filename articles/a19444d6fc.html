ical-archives/banned-historical-archives8/main/maoquanji13.pdf"],"article":{"title":"在延安党政军及群众团体检查工作的干部晚会上的讲话","alias":"","parts":[{"type":"paragraph","text":"在延安党政军及群众团体检查工作的"},{"type":"paragraph","text":"干部晚会上的讲话！"},{"type":"paragraph","text":"（1938年12月13日）"},{"type":"paragraph","text":"一、各部门应站在自己的岗位上，担负起本身的职务，把工作精神更加紧张起来。"},{"type":"paragraph","text":"二、加紧学习，学习马列主义、革命运动及中国的历史，从中央委员会各级干部研究较高深的理论起，一直到各机关事务人员学习文化止。"},{"type":"paragraph","text":"三、积极推进生产运动，各机关各部队各团体每一个人均须参加生产运动，以克服当前困难。"},{"type":"paragraph","text":"四、加强巩固统一战线的工作。五、健全党内生活。"},{"type":"paragraph","text":"[1]中共中央组织部于1938年12月13日晚召开延安党政军及群众团体检查工作的干部晚会，毛泽东出席指导，并代表中共中央书记处作报告。号召各机关在抗战新阶段的形势下，克服当前一切困难，增加新的力量，停止敌之进攻，以便准备实施我之反攻。要求后方工作各部门，以战斗的精神，深入检查工作，以担负起各部门的工作任务，并指出我们检查工作的五个方面，即本篇一；并说明检查的目的，即本篇二。一、总结过去工作，发扬过去工作成绩，纠正缺点。二、规定今后任务。1938年，毛泽东在延安。图中汽车是宋庆龄捐赠的。"}],"authors":["毛泽东"],"dates":[{"year":1938,"month":12,"day":13}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":82,"page_end":83},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a19444d6fc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
