":[{"year":1994,"month":6,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社吉隆坡6月14日电　马文革、王涛今晚在这里举行的世界明星乒乓球巡回赛第二站的决赛中再领风骚，他们的最后位置刚好与在北京进行的首站比赛颠倒了一下，马文革获得冠军，王涛获得亚军。"},{"type":"paragraph","text":"在决赛中，马文革以3:1战胜了王涛。马文革是在首轮以2:1战胜韩国的金泽洙、半决赛中以3:2胜加拿大的黄文冠后进入决赛的。"},{"type":"paragraph","text":"王涛在首轮比赛中以2:0胜了瑞典的林德，在半决赛中以3:1胜了捷克的彼得·科贝尔。"},{"type":"paragraph","text":"参加本站比赛的除上述6名选手外，还有马来西亚的黄天赐，和日本的松下浩二。他们在首轮比赛中分别输给了黄文冠和科贝尔，比分都是0:2。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9a1c527ecd"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
