script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"255cf4cb-cd67-45ab-b5e8-8240fdbad8f8","name":"社会主义从空想到科学的发展（人民出版社1967年版）","internal":false,"official":true,"type":"pdf","author":"恩格斯，人民出版社1967年版","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives4/main/255cf4cb-cd67-45ab-b5e8-8240fdbad8f8.pdf"],"article":{"title":"马克思写的法文版序言","alias":"","parts":[{"type":"paragraph","text":"马克思写的法文版导言"},{"type":"paragraph","text":"这本小册子中所包含的几页早先曾作为三篇论文发表在《社会主义评论》2上，它们是从恩格斯最近的著作《科学中的变革》3中抽出来译成法文的。①"},{"type":"paragraph","text":"弗里德里希·恩格斯是现代社会主义最杰出的代表人物之-，他在1844年就以他首先发表在马克思和卢格在巴黎出版的《德法年鉴》4上的《政治经济学批判大纲》引起了注意。《大纲》中已经表述了科学社会主义的某些一般原则。在曼彻斯特（当时恩格斯住在那里），他用德文写了《英国工人阶级状况》（1845），这是一部重要的著作，其意义由马克思在《资本论》中作了充分的估价。在他第一次旅居英国以及后来旅居布鲁塞尔的时候，他是社会主义运动的正式机关报《北极星报》和罗伯特·欧文的《新道德世界》报的撰稿人。5"},{"type":"paragraph","text":"在他旅居布鲁塞尔时，他和马克思建立了德国工人共产主义俱乐部6，这个俱乐部同佛来米和瓦隆的俱乐部保持了联系。他们两人和伯恩施太德一起创办了《德意志一布鲁塞尔报》7。应正义者同盟设在伦敦的德国委员会的邀请，他们参加了这个由卡尔·沙佩尔在1839年因参加布朗基的密谋而"},{"type":"paragraph","text":"①在保·拉法格发表的《社会主义从空想到科学的发展》一书导言的原文中还做了如下的补充：“它们经作者校阅过，而且作者为了使资本主义生产的经济力量的辩证运动更容易为法国读者所理解，还在第三部分做了一些补充。”一编者注不得不从法国逃出以后所创立的组织。从那时起，同盟就放弃了秘密组织的普通形式，变成国际性的共产主义者同盟。了。但是在当时的情况下，同盟还必需对各国政府保持秘密。1847年，在同盟在伦敦召开的国际代表大会上，马克思和恩格斯被委托起草《共产党宣言》，《宣言》在二月革命前不久出版，并且几乎立即被翻译成欧洲的一切文字。①"},{"type":"paragraph","text":"同年，马克思和恩格斯致力于建立布鲁塞尔民主协会9的工作，这是一个公开的和国际性的组织，参加这个组织的有资产阶级激进派和社会主义工人的代表人物。"},{"type":"paragraph","text":"二月革命后，恩格斯成了《新莱茵报》10的编辑之一，这家报纸是由马克思在科伦创办的，于1849年5月被普鲁士政府禁止。恩格斯参加爱北斐特起义以后，作为志愿部队指挥官维利希的副官完成了反对普鲁士人的巴登进军11（1849年6一7月）。"},{"type":"paragraph","text":"1850年，他在伦敦做《新莱茵报。政治经济评论》12的撰稿人，这个刊物是由马克思出版并在汉堡刊印的。恩格斯在上面发表了《德国农民战争》，十九年后在莱比锡印成小册子出搬并连续出了三版。"},{"type":"paragraph","text":"在德国的社会主义运动重新活跃起来以后，恩格斯做了《人民国家报》和《前进报》13的撰稿人；这两家报纸所发表的最重要的论文都是他写的，其中大部分都印成了小册子：《论"},{"type":"paragraph","text":"①在保·拉法格发表的原文中还做了如下的补充：“《共产党宜言》是现代社会主义最有价值的文件之一：它现在仍然是描述资产阶级社会的发展和必将结束资本主义社会的无产阶级的形成的最有力和最鲜明的著作之“：在这一著作中，正象在早一年出版的马克思的《暂学的贫困》中一样，第一次清楚地表述了阶级斗争的理论。”一编者注俄国社会问题》、《德意志帝国国会中的普鲁士烧酒》、《论住宅问题》、《行动中的巴枯宁主义者》等等。"},{"type":"paragraph","text":"1870年恩格斯从曼彻斯特迁居伦敦以后，参加了国际14总委员会；他被委托负责同西班牙、葡萄牙和意大利联系。"},{"type":"paragraph","text":"他寄给《前进报》并讽刺地题为《欧根·杜林先生在科学中实行的变革》的最近的一组论文，是对杜林先生关于科学、特别是关于社会主义的所谓新理论的驳斥。这些论文已经集印成书并且在德国社会党人中获得了巨大的成功。在这本小册子中我们摘录了这本书的理论部分中最重要的部分；这一部分可以说是科学社会主义的入门。"},{"type":"paragraph","text":"原文是法文马克思写于1880年5月4一5日左右"},{"type":"paragraph","text":"选自《马克思恩格斯全集》设于1880年在巴黎出版的弗·恩格期"},{"type":"paragraph","text":"第19卷第259一263页空想社会主义和科学社会主义》一书"},{"type":"paragraph","text":"1870年恩格斯从曼彻斯特迁居伦敦以后，参加了国际14总委员会；他被委托负责同西班牙、葡萄牙和意大利联系。"},{"type":"paragraph","text":"他寄给《前进报》并讽刺地题为《欧根·杜林先生在科学中实行的变革》的最近的一组论文，是对杜林先生关于科学、特别是关于社会主义的所谓新理论的驳斥。这些论文已经集印成书并且在德国社会党人中获得了巨大的成功。在这本小册子中我们摘录了这本书的理论部分中最重要的部分；这一部分可以说是科学社会主义的入门。"},{"type":"paragraph","text":"原文是法文马克思写于1880年5月4一5日左右"},{"type":"paragraph","text":"选自《马克思恩格斯全集》设于1880年在巴黎出版的弗·恩格期"},{"type":"paragraph","text":"第19卷第259一263页空想社会主义和科学社会主义》一书"}],"authors":["马克思"],"dates":[{"year":1880,"month":5,"day":4},{"year":1880,"month":5,"day":5}],"is_range_date":true,"comments":[],"comment_pivots":[],"description":"","page_start":5,"page_end":7},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9b9e0660af"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
