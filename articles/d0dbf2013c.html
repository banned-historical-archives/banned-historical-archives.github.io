:[],"dates":[{"year":1950,"month":8,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"感谢对罗解放六周年的祝贺"},{"type":"paragraph","text":"巴洪电复毛主席"},{"type":"paragraph","text":"格罗查电复周总理"},{"type":"paragraph","text":"【新华社二十八日讯】罗马尼亚人民共和国国民大会主席团主席巴洪及部长会议主席格罗查，分别电谢毛泽东主席和周恩来总理兼外交部长对罗马尼亚解放六周年纪念日的祝贺。两电电文如下："},{"type":"paragraph","text":"致毛主席电中华人民共和国中央人民政府毛泽东主席："},{"type":"paragraph","text":"当我们国家被常胜苏军解放六周年国庆之际，我本人及代表罗马尼亚人民共和国国民大会主席团对阁下之祝贺表示谢意。"},{"type":"paragraph","text":"罗马尼亚人民共和国国民大会主席团主席、教授、博士  康斯坦丁·依·巴洪"},{"type":"paragraph","text":"致周总理电中华人民共和国政务院总理兼外交部部长周恩来："},{"type":"paragraph","text":"当我们祖国由苏军解放六周年之际，对阁下之祝贺表示衷心的感谢。"},{"type":"paragraph","text":"罗马尼亚人民共和国部长会议主席、博士  彼·格罗查"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d0dbf2013c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
