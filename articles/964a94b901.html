art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"中国文化大革命加强了革命的反帝力量","authors":[],"parts":[{"type":"paragraph","text":"新华社九日讯 全非工会联合会常任书记津比希利五日发来贺电。全非工会联合会向毛泽东主席和英雄的中国人民致以热烈的、兄弟般的祝贺和最良好的祝愿，祝中国共产党第九次全国代表大会成功。"},{"type":"paragraph","text":"贺电说：中国人民的文化大革命巩固和加强了革命的反帝力量。"},{"type":"paragraph","text":"贺电说：“中国人民本着真正的无产阶级国际主义精神，对于非洲人民反对帝国主义、新殖民主义和种族歧视的斗争给予巨大的支持。为了彻底消灭帝国主义和剥削，非洲工人和中国人民之间的团结将不断加深和巩固。”"},{"type":"paragraph","text":"贺电说：“非洲工人强烈谴责美帝国主义对盘踞台湾岛的蒋介石反动集团的支持，并谴责在联合国对这个集团的支持。非洲工人还强烈谴责美帝国主义的侵略行动：利用美国舰队和在中国周围的其它基地来反对中国人民。”"},{"type":"paragraph","text":"贺电最后祝愿“毛泽东主席万岁！”“非洲人民和中国人民之间的友谊万岁！”"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"964a94b901"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
