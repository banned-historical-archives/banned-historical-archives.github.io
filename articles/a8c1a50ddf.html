s":[],"dates":[{"year":1983,"month":6,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"方仲如同志追悼会在京举行"},{"type":"paragraph","text":"胡耀邦叶剑英邓小平陈云邓颖超等送了花圈"},{"type":"paragraph","text":"新华社北京6月13日电　五届政协全国委员会常务委员、原中共陕西省委书记方仲如因病于1983年6月5日在北京逝世，终年82岁。"},{"type":"paragraph","text":"方仲如同志追悼会今天下午在八宝山革命公墓礼堂举行。"},{"type":"paragraph","text":"胡耀邦、叶剑英、邓小平、陈云、邓颖超、习仲勋、王震、乌兰夫、杨尚昆、宋任穷送了花圈。"},{"type":"paragraph","text":"王震、杨尚昆、宋任穷、康克清、王首道、程子华、杨静仁以及全国政协、中央组织部、中央统战部的负责人和机关工作人员、方仲如同志的生前友好共500人参加了追悼会。"},{"type":"paragraph","text":"追悼会由习仲勋主持，刘澜涛致悼词。"},{"type":"paragraph","text":"悼词说，方仲如1901年生于陕西省咸阳市。他从青年时代起就接受马克思主义思想教育，参加进步运动。1923年加入社会主义青年团，1926年转为中共党员，为我党在陕西地区早期的革命活动家之一。同年秋他受北方党组织负责人李大钊委派，以中共党员的身份去冯玉祥将军部工作，任国民革命军第二集团军第五路军政治处处长，在党内担任党、团书记。“西安事变”后，他到西北军爱国将领杨虎城部任独立旅政治处处长，为发展党的统一战线工作做出了贡献。"},{"type":"paragraph","text":"悼词说，方仲如1937年到延安，在抗日战争、解放战争时期历任中共中央党校教员、研究室主任、校务处长；中共中央机关事务管理局局长；西北财经办事处副秘书长；西北联防军后勤部部长；第一野战军后勤司令部副司令员、政治委员。全国解放后，方仲如历任西安市长，中共西安市委书记，陕西省委书记，省政协主席，并当选为党的第八届全国代表大会的代表。"},{"type":"paragraph","text":"悼词说，方仲如在近六十年革命活动中，为中国人民的解放事业，为社会主义革命和社会主义建设事业竭尽心力，做出了很大的成绩。他的一生是革命的一生，是战斗的一生，是为人民服务的一生。（附图片）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"叶剑英","type":"人物"},{"name":"胡耀邦","type":"人物"},{"name":"王震","type":"人物"},{"name":"陈云","type":"人物"},{"name":"宋任穷","type":"人物"},{"name":"习仲勋","type":"人物"},{"name":"陕西文革","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a8c1a50ddf"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
