中央文件电报的通知","authors":[],"dates":[{"year":1967,"month":12,"day":2}],"is_range_date":false,"parts":[{"text":"中共中央、国务院、中央军委、中央文革小组关于各地报送中央文件电报的通知","type":"title"},{"text":"各省、市、自治区革命委员会（筹备小组）、军管会，各大军区、省军区：","type":"appellation"},{"text":"全国的无产阶级文化大革命的形势大好，整个形势越来越好。目前已有十六个省、市、自治区成立了革命委员会或筹备小组，六个省、市、自治区已实行军管，估计今冬明春，全国绝大部分省、市、自治区将陆续成立革命委员会或筹备小组。今后各省市的机关、工厂、学校、部队等基层单位的一般问题，不必上报中央，应先报送省、市、自治区革命委员会（筹备小组）、军管会，各大军区、省军区处理；解决不了的重要问题，再报中央。","type":"paragraph"},{"text":"特此通知。","type":"paragraph"},{"text":"（发至县、团级）","type":"paragraph"}],"comments":[],"origin":"根据中共中央办公厅、国务院秘书厅文化革命联合接待室编印《无产阶级文化大革命有关文件汇集 （第五集）》， 北京：1968年1月","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"中央文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"指示"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4eb2de2c0d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
