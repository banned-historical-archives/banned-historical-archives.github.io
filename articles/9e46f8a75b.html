ical-archives/banned-historical-archives0/main/maoquanji36.pdf"],"article":{"title":"在中共八大预备会议第一次会议上的讲话提纲","alias":"","parts":[{"type":"paragraph","text":"在中共八大预备会议第一次会议上的讲话提纲\""},{"type":"paragraph","text":"（1956年8月）陈、陆、胡、王稼祥、李维汉、胡绳、田家英。"},{"type":"paragraph","text":"a.大会宗旨：总结经验，团结党内外国内外一切有用【因]素，外宾四十九国，为建设社会主义为《而》斗争。"},{"type":"paragraph","text":"b.除了选举以外，主观主义，宗派主义，团结那与自己有过斗"},{"type":"paragraph","text":"[1]这个讲话提纲，写在印发中国共产党第八次全国代表大会日程安排、会议规则等六个文件的目录上。八大预备会议第一次会议在1956年8月30日举行，毛泽东在会上作了讲话。这篇讲话的记录整理稿，已编入《毛泽东选集》第五卷，题为《增强党的团结，继承党的传统》。"},{"type":"paragraph","text":"[2]陈，指陈伯达，当时任中共中央政治研究室主任、中央宣传部副部长。陆，指陆定一，当时任中共中央宣传部部长。胡，指胡乔木，当时任中共中央副秘书长、毛泽东的秘书。王稼祥，当时任中共中央对外联络部部长。李维汉，当时任中共中央统战部部长。胡绳，当时任中共中央政治研究室副主任。田家英，当时任中共中央政治研究室副主任、毛泽东的秘书。他们都参加了中共八大文件的起草工作。"},{"type":"paragraph","text":"[3]指应邀来北京参加中国共产党第八次全国代表大会的外国共产党和工人党的代表团。实际上，后来参加八大的共有56个国家的共产党和工人党的代表团、代表和观察员。"},{"type":"paragraph","text":"在中共八大预备会议第一次会议上的讲话提纲争的人\"。"},{"type":"paragraph","text":"七大选票（举）经验是成成（功）的。时间安排是充裕的。资产阶级。C.150-1702上届中委。！三八线d.36小时发言时间是充裕的。前门饭店。"},{"type":"paragraph","text":"[1]这里指要在中共八大会议上提出反对党内的主观主义、宗派主义问题。毛泽东在八大预备会议第一次会议的讲话中说：“这次大会应当继续发扬我们党在思想方面和作风方面的优良传统，把主观主义、宗派主义这两个东西切实反一下，此外，还要反对官僚主义。”又说：“反对宗派主义，特别值得说一下的，就是要团结那些跟自己作过斗争的人。”"},{"type":"paragraph","text":"[2]指中共中央准备在中共八大预备会议上提出的第八届中央委员、候补中央委员的名额。1956年9月27日，八大正式选举出第八届中央委员97人、候补中央委员73人，共170人。"},{"type":"paragraph","text":"[3]“三八线”，这里指考虑中共第八届中央委员会成员以“三八式”干部划线问题，即1938年以后参加革命工作的党员千部一般不进入第八届中央委员会。1956年8月30日，毛泽东在八大预备会议第一次会议上说：“现在，很多很有用的人才是在抗日战争时期培养起来的，这就是所谓三八式”的干部。他们是我们现在工作的很重要的基础，没有他们不行。但是这部分干部人数很多，如果要安排，这届中委的名额就要增加到好几百人。所以这次就不考虑安排了。”"},{"type":"paragraph","text":"[4]指中国共产党第八次全国代表大会日程（草案）安排的9个下午约36小时的大会发言时间。"}],"authors":["毛泽东"],"dates":[{"year":1956,"month":8}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":480,"page_end":481},"tags":[{"name":"毛泽东","type":"人物"},{"name":"编纂《毛泽东选集》第五卷","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9e46f8a75b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
