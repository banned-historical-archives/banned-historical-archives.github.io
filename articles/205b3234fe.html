","authors":[],"dates":[{"year":1967,"month":2,"day":9}],"is_range_date":false,"parts":[{"text":"中央军委关于解放军艺术学院学生参加“湘江风雷”的通知","type":"title"},{"text":"最近在湖南长沙，解放军艺术学院三人参加了反动组织“湘江风雷”，进行反革命活动，还有部分学生特别是艺院“星火燎原”在湖南、沈阳、福州等军区造谣，抄家，任意抓人，带头冲击军事领导机关，进行残酷武斗，抗拒毛主席批准的八条命令。为了坚决贯彻毛主席的指示，以护军纪，保卫文化大革命，军委决定：艺术学院所有人员，限五天之内返回本校进行整风，违者以军纪处分。","type":"paragraph"},{"text":" 中央军委一九六七年二月九日","type":"paragraph"}],"comments":[],"origin":"原载湖南《反复辟战报》1967年7月17日，第一期，第一版","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"湖南文革","type":"人物"},{"name":"武斗","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"205b3234fe"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
