rt":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"军事学院出版学习毛主席著作专辑","authors":[],"parts":[{"type":"paragraph","text":"本报讯 军事学院“军学杂志”，将于7月1日出版学习毛主席军事著作的专辑。在这一期专辑中，有宣传毛主席军事著作的论文，如张震的关于“论持久战”的学术演讲，康明的学习“中国革命战争的战略问题”的体会。他们根据自己学习的实际体会，对若干军事学术问题作了探讨，例如战争的持久性、积极防御，乘敌之隙的可能性、阵地战和运动战相结合、集中兵力和歼灭战的思想等。还有一部分文章，是根据毛主席思想，对改革教学工作的研究。其中有胡秉权和胥亚平写的关于军事和政治教学从实际出发、贯彻群众路线问题的论文。此外，关于在军事和政治教学中贯彻毛主席思想，在文化教育中讲授毛主席著作的体会等，都分别发表了文章。"},{"type":"paragraph","text":"这期“军学杂志”还以“根据‘八大’二次会议精神，掀起学习毛主席军事著作的高潮”为题，发表了社论。社论号召全体教学工作人员，把对于毛主席军事著作的学习向前推进一步，以毛主席军事著作为指针，改进学院的教学工作。 （宋琼）"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"53c2a5b1e8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
