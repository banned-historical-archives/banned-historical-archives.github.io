<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"艾地主席指出仅仅一般地反帝已经远远不够  亚非团结应以反美斗争精神为基础  现代修正主义者说亚非团结意味分裂反帝力量，这是错误的","authors":[],"dates":[{"year":1965,"month":3,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"艾地主席指出仅仅一般地反帝已经远远不够"},{"type":"paragraph","text":"亚非团结应以反美斗争精神为基础"},{"type":"paragraph","text":"现代修正主义者说亚非团结意味分裂反帝力量，这是错误的"},{"type":"paragraph","text":"新华社雅加达二十四日电　印度尼西亚共产党主席艾地二十一日在印度尼西亚科学家举行的迎接即将到来的第一次亚非会议十周年的集会上说：“亚非团结必须包含有对美帝国主义作斗争的精神，仅仅一般地反对帝国主义今天已经不够了。”"},{"type":"paragraph","text":"他强调指出，亚非国家和人民在共同的反帝斗争中必须加强团结和互相支持。亚非团结的基础应当是反对美帝国主义的精神。"},{"type":"paragraph","text":"艾地说：“万隆会议已经有十年了。这十年在我们当代世界历史上确是非常重要的。这是因为，在这个时期中，由于亚非人民的英勇斗争，许多新独立的国家出现了。这还因为，在这个时期中，亚非国家形成了一个国际反帝阵线，它反对帝国主义、殖民主义和新殖民主义的立场一天天变得更加坚决。越来越团结的亚非国家成了一支不论是帝国主义还是修正主义都不能忽视的力量。”"},{"type":"paragraph","text":"他说：“亚非团结应当有反帝精神。这已经是各界人士所能接受的了。然而在当前的世界形势下，仅仅这样作还远远不够。”"},{"type":"paragraph","text":"他指出，“十年前，美帝国主义就已经干了许多坏事。但是当时了解这一点的人还比较少。但是十年后的今天，形势发生了巨大的变化。已经摆脱老牌帝国主义统治的亚非国家，日益直接感到新殖民主义——美帝国主义的压迫。”"},{"type":"paragraph","text":"艾地说：“历史本身就揭露了美帝国主义的罪恶本性。全世界人民愈来愈清楚地了解美帝国主义是世界人民的头号敌人。‘美国佬，滚回去’这句口号，几乎响彻世界所有的首都。”"},{"type":"paragraph","text":"艾地说：“在我们迎接万隆会议十周年的时刻，我们应当有一致的决心，使亚非团结同反对美帝国主义的斗争精神结合起来。”在亚洲、非洲这两个大陆上发生的混乱都是美帝国主义的黑手制造的。所以亚非国家和整个新兴力量不应该停止对美帝国主义的谴责和斗争。"},{"type":"paragraph","text":"艾地说，亚非是新兴力量的核心。“因为新兴力量是一切反帝力量的联合，其中亚非人民和国家正在同帝国主义进行最彻底和最激烈的斗争。宣布亚非为核心不但是由于它们过去取得的成就，而且也是由于它们目前的任务和行动。”"},{"type":"paragraph","text":"艾地说：“现代修正主义者说，加强亚非团结意味着分裂反帝力量。这是错误的。最彻底的反帝力量的团结恰恰就是整个新兴力量反帝斗争取得胜利的最大保证。”"},{"type":"paragraph","text":"艾地赞扬印度尼西亚人民在同新殖民主义产物“马来西亚”的、在同帝国主义进行的斗争中所取得的成就。他说，“我们所采取的行动进一步增强了我们在亚非国家所进行的斗争中的先锋地位。先锋地位不仅取决于过去取得的成就，而是首先取决于今天为支持其他国家人民的每一个反帝斗争而采取的行动。我们的先锋作用应该由下述两点来证明：率先坚决支持其他国家人民的反帝斗争，坚决地谴责帝国主义是我国人民和政府的一项绝对的义务。”"},{"type":"paragraph","text":"艾地说：“我认为，处在革命形势下的人民最有条件充当亚非国家领导人的东道主。我国人民的革命精神是使庆祝万隆会议的活动成功的最好条件。印度尼西亚人民对国内反革命分子、‘政治宣言’的假支持者、托洛茨基分子、‘支持苏加诺主义机构’分子及其走狗发动了一系列的攻势，对农村恶魔和对‘马来西亚’的制造者和支持者英美帝国主义发动了攻势。这一切将保证万隆会议的庆祝活动在十分有利的情况下进行。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"世界形势","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b8e1a11a69"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
