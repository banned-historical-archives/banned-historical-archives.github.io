art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"胡风分子的“钻肚术”与张春桥的鬼花招","authors":["战士陈通元"],"parts":[{"type":"paragraph","text":"伟大领袖毛主席在批判胡风反革命集团时，极其尖锐地指出：“胡风分子是以伪装出现的反革命分子，他们给人以假象，而将真象荫蔽着。”他们采取孙悟空钻进牛魔王肚子里的战术，“‘深入到’我们的‘肝脏里面’来了”。“四人帮”的狗头军师、老反革命分子张春桥，几十年来大耍反革命两面派手法，以假乱真，伪装革命，欺骗党和人民，混进了革命队伍，爬上了党和国家的领导岗位，而在暗地里干着见不得人的反革命勾当。他玩的这套鬼花招，和胡风反革命分子耍的“钻肚术”，真可以说是异曲同工，青出于蓝而胜于蓝。"},{"type":"paragraph","text":"早在三十年代初，张春桥就充当国民党的马前卒，为反动军阀、日寇、国民党歌功颂德，积极从事拥蒋反共活动，疯狂反对鲁迅，积极参加国民党的反革命文化“围剿”。后来又披着“进步青年”的伪装混入延安，钻到了我们党内。长期以来，他隐瞒自己的反革命历史，打着革命“左派”、“马克思主义理论家”等招牌，招摇撞骗，大肆歪曲、篡改马列主义、毛泽东思想，大搞分裂党的阴谋活动，破坏社会主义革命和社会主义建设，妄图篡夺党和国家的最高领导权。"},{"type":"paragraph","text":"然而，张春桥也罢，反革命分子胡风也罢，“不管他怎样伪装，他的尾巴是藏不住的”。以华主席为首的党中央一举粉碎“四人帮”，象狐狸一样狡猾的狗头军师张春桥也现了原形，成为不齿于人类的狗屎堆。"}],"alias":""},"tags":[{"name":"张春桥","type":"人物"},{"name":"四人帮","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c1a9fde76f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
