script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"学生、教工、干部三结合搞大批判华东师大物理系排除干扰猛攻资产阶级司令部","authors":[],"dates":[{"year":1967,"month":9,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　华东师范大学物理系革命的学生、教工、干部三结合搞革命大批判，开始把革命大批判专栏办到工厂、工人新村和农村去，并开展其他形式的革命大批判活动，为彻底摧毁以中国赫鲁晓夫为首的资产阶级司令部而努力战斗。"},{"type":"paragraph","text":"前一阶段，由于受了外来的干扰，该系有一部分学生不安心搞革命的大批判。在系革命委员会的推动下，在解放军军政训练营的大力帮助下，不少同志初步克服了“留在学校没事干”、“大批判是空对空”等错误思想，开始安心在校，决心掀起一个群众性的革命大批判新热潮。"},{"type":"paragraph","text":"为了搞好革命大批判运动，该系革委会部分委员和政宣组的同志带头投入战斗，深入班级战斗组，发动干部、教师、教辅人员与学生，万炮齐轰中国赫鲁晓夫，创造了学生、教工、干部“三结合”的战斗形式。"},{"type":"paragraph","text":"目前，该系多种多样的革命大批判活动正在逐步开展。一年级、二年级和六六届毕业生按照毛主席“从战争学习战争”的教导，克服了物理系同志不会写大批判文章等思想，搞了十多个革命大批判专栏。有的大批判专栏还面向工农，贴到工厂、工人新村、农村等地方去，向工农群众宣传毛泽东思想。并征求工农群众意见，把大批判专栏办得更好。此外，还组织了以批判中国赫鲁晓夫“两种教育制度”等为主要内容的批判组，和到工厂了解修正主义教育路线对学生的危害和工人同志对教学改革要求的调查组。"},{"type":"paragraph","text":"革命大批判促使这个系的革命师生进一步活学活用毛主席著作，紧跟毛主席的伟大战略部署。他们举办活学活用毛主席著作讲用会，用毛主席的指示，对照中国赫鲁晓夫及其在上海爪牙的黑话，进一步看清了党内走资本主义道路当权派的反革命本性，更加痛恨这些最主要最危险的敌人，也进一步分清了什么是毛主席的无产阶级革命路线，什么是中国赫鲁晓夫的资产阶级反动路线，这对他们学会“批判资产阶级”很有好处。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"革命委员会","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"edd730d2d6"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
