thors":[],"dates":[{"year":1969,"month":4,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"英国工人和进步学生热烈祝贺我党“九大”开幕"},{"type":"paragraph","text":"无产阶级文化大革命的伟大胜利"},{"type":"paragraph","text":"新华社伦敦十日电　英国工人和进步学生热烈祝贺中国共产党第九次全国代表大会的开幕，热烈欢呼中国无产阶级文化大革命的伟大胜利。"},{"type":"paragraph","text":"一位英国工人在听到中国共产党第九次全国代表大会开幕的消息后欢欣鼓舞地说：“这是我们长期来所盼望的。这是无产阶级文化大革命和毛主席革命路线的伟大胜利。”"},{"type":"paragraph","text":"他认为，大会和大会的文件必将总结文化大革命的丰富经验，将为国际共产主义运动作出历史贡献。"},{"type":"paragraph","text":"他谈到中国的无产阶级文化大革命对他和他的许多朋友的思想有很大的影响。他说，毛泽东思想和无产阶级文化大革命“给了我们真正的希望。现在我们大家都认为，支持中国和无产阶级文化大革命是我们的国际主义职责。”"},{"type":"paragraph","text":"一位旅居英国的青年工人强调说，中国共产党第九次全国代表大会的召开，是对帝国主义和现代修正主义的沉重打击，在美帝国主义者和苏修叛徒集团正在加紧反华的反革命勾结的时候，特别是这样。他说：“这是对世界被压迫人民反对帝国主义和修正主义斗争的巨大鼓舞。”"},{"type":"paragraph","text":"当他看到毛主席在代表大会上讲话的照片时说：“我们热爱毛主席的人看到他身体非常健康，真是高兴极了。”"},{"type":"paragraph","text":"苏塞克斯大学的一批进步学生最近写信给中国朋友说，他们非常高兴地知道中国共产党第九次全国代表大会已经召开。"},{"type":"paragraph","text":"这封信说：“无产阶级文化大革命是争取共产主义的人类进步斗争史中最重要的事件之一，给了我们和全世界帝国主义国家里的学生巨大的鼓舞。”"},{"type":"paragraph","text":"信中指出，在毛泽东思想指引下进行的文化大革命“加深了我们对阶级斗争、对工人阶级的领导作用、对本国的和世界的修正主义和帝国主义的本质的认识。”"},{"type":"paragraph","text":"他们在信中祝中国共产党第九次全国代表大会圆满成功，祝毛泽东主席万寿无疆。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0c97918c92"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
