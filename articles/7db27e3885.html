ear":1947,"month":4,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编辑先生:我是吴兴县菱湖镇乡问的一个农民，我们菱湖乡间的农民，除了养蚕种田以外，还有养鱼，也是我们的一种主要生产。我们菱湖农民，所养的鱼，每年运销于上海地方，价值总数，在几十万万元以上。胜利以后，因为农村遭受了战争损失，对于养鱼的本钱，自然成了一个问题，去年六月里，菱湖区长王洗先生，发起组织渔业改进会，向中国农民银行借了一万万元的款子，以救济我们渔民为号召，我们认为渔民的救星到了，将来的希望很大。谁知道王洗先生:(一)把向农民银行借来每月六厘半的款子，放给我们，就要收我们每月八厘的利息；(二)向农民银行借款的期限，为六个月，到期本利同还，但是他要我们农民每月还给他利息；(三)他把我们农民还给他的利钱，不马上还给农民银行，却放在他自己开设的龙湖钱庄内放拆洋(就是每月三角利息的高利贷)，请问这批的利息数目多大?(四)上年年底我们卖了鱼以后，有一部份农民连本钱也都还了他，他也没有还给银行，也放在龙湖钱庄放拆洋；(五)现在还要利用我们农民养鱼的名义，再向中国农民银行借五万万元的款子，预备继续做他盘剥重利的勾当。他这种行为，究竟在法律上犯了什么罪?我们用什么法子可以告他?请公开答复我们。祝你康健　吴兴菱湖农民王炳荣上"},{"type":"paragraph","text":"二月十九日"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7db27e3885"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
