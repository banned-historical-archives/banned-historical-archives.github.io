rt":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"要闻简报","authors":[],"parts":[{"type":"paragraph","text":"〗 邓小平副总理和乌兰夫副委员长观看泰国文化团演出"},{"type":"paragraph","text":"邓小平副总理、乌兰夫副委员长九月六日晚出席观看了泰国文化团演出的富有民族特色的泰国舞蹈。邓小平副总理对泰国朋友说：“你们的演出很精彩。欢迎你们带来泰国人民的友情。加强友好往来对发展两国人民的友谊非常重要。”"},{"type":"paragraph","text":"演出结束，演员们高歌泰中友谊。在一片热烈掌声中，邓小平副总理和乌兰夫副委员长等走上舞台，同演员们热情握手，祝贺他们演出成功。"},{"type":"paragraph","text":"国务院发出关于扩大利用野生植物原料搞好今年“小秋收”的通知"},{"type":"paragraph","text":"国务院最近发出关于扩大利用野生植物原料搞好今年“小秋收”的通知。通知要求：要进一步广泛、深入地宣传利用野生植物原料，开展“小秋收”的重要意义；要搞好产购销衔接，以用促购，以购促产：要进一步贯彻落实党在农村的经济政策，抓好“小秋收”产品的采集和收购工作。"},{"type":"paragraph","text":"团中央将召开全国新长征突击手表彰大会"},{"type":"paragraph","text":"共青团中央为了鼓励和表彰新长征突击手（队）为四化作出的积极贡献，进一步动员全国青年打好四个现代化第一战役，在增产节约运动中发挥突击作用，决定于九月十九日在北京召开全国新长征突击手表彰大会。"},{"type":"paragraph","text":"今年三月，团中央作出在全国青年中开展新长征突击手活动的决定以来，全国广大团员、青年和各级团组织热烈响应，涌现出一大批新长征突击手和青年先进集体。"},{"type":"paragraph","text":"目前，经过各省、市、自治区的评选，全国已选出了八千多名新长征突击手，近千个新长征突击队，以及三好学生、优秀团干部和少先队优秀辅导员。这次选出的新长征突击手（队）和标兵，绝大多数都是在本岗位上做出第一流成绩的先进青年和先进青年集体。在全国新长征突击手表彰大会上，团中央将命名十面突击队红旗、一百五十名（个）新长征突击手（队）标兵，颁发奖章、奖状、奖旗和奖品。万名新长征突击手（队）的奖章、奖状，团中央委托各地团委在全国表彰大会后代发。（均据新华社）"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"15072b04dc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
