tart":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"执行毛主席指示闻风而动字字照办七连学习英雄崇高品质，决心把思想革命化提到新高度","authors":["姜勉希/刘兴仕/张静惠"],"parts":[{"type":"paragraph","text":"本报讯 正在进行四好总评的6122部队七连的同志们，坚决响应伟大领袖毛主席和林彪副主席的最新战斗号令，迅速掀起一个宣传、学习“支左爱民模范排”和“支左爱民模范”李文忠同志的热潮。他们决心以“斗私，抵修”为纲，把活学活用毛主席著作的群众运动推向新阶段，把四好连队运动提到新水平，把部队思想革命化提到新高度，努力在无产阶级文化大革命运动中为人民立新功。"},{"type":"paragraph","text":"连日来，七连同志们热烈学习了“支左爱民模范排”和“支左爱民模范”李文忠同志的事迹，受到了深刻的教育，更加明确了破私立公，实现思想革命化的方向。五好战士金京海说：“从英雄四排和李文忠同志的光辉事迹中，又一次证明了这样一个伟大的真理：用毛泽东思想武装起来的人最有觉悟，最大公无私，最有战斗力。我们学英雄，就要在四好总评中，深入贯彻毛主席发出的要斗私，批修的伟大指示，打一场斗私批修的进攻战，在灵魂深处爆发革命，把总评的过程变成大树特树毛主席和毛泽东思想绝对权威的过程。”指导员任维海说：“英雄四排和李文忠同志，是伟大的毛泽东思想哺育出来的。我决心以他们为榜样，用毛泽东思想武装自己和全连干部战士的头脑，把连队建设成为捍卫毛主席革命路线的坚强集体。”"},{"type":"paragraph","text":"全连同志一致表示，要象英雄四排和李文忠同志那样，对毛主席的每一项指示，闻风而动，字字照办，句句照办，立竿见影。对毛主席的伟大战略部署，步步紧跟，永远紧跟，誓把无产阶级文化大革命进行到底！（姜勉希、刘兴仕、张静惠）"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"军队支左","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4701aafc92"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
