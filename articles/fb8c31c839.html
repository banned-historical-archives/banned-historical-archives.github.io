<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"王树声吴德接见七机部武斗两派代表的讲话","authors":["吴德","王树声"],"dates":[{"year":1967,"month":8,"day":31}],"is_range_date":false,"parts":[{"text":"王树声吴德接见七机部武斗两派代表的讲话","type":"title"},{"text":"王树声吴德","type":"authors"},{"text":"〖时间：凌晨。王树声吴德接见七机部“九一六”、“新九一五”两派讲话摘要〗","type":"appellation"},{"text":"吴德：","type":"paragraph"},{"text":"北京市革委会坚决反对武斗，中央文革、江青同志同我们谈过多次，在毛主席所在地，在首都坚决不能用武斗，因此发过公告，发过好多篇社论。有些是根据中央指示写的。武斗没什么商量的，要坚决制止，要把武斗搞臭。","type":"paragraph"},{"text":"有些人歪曲文攻武卫口号。凡是武斗厉害的地方，不管你说得天花乱坠，大方向一定掌握得不好，因为武斗干扰大方向。现在，武斗越来越升级，弹弓、刀子，还有放火的。北京仪器厂一派在楼里，一派在外面打起来，西单商场打来打去打伤的是工人，走资派打不着。","type":"paragraph"},{"text":"伯达同志讲：死有重于泰山的，也有轻于鸿毛的，武斗打死了究竟算什么？比家雀毛还不如。再有，破坏国家财产，门窗、桌子打破，有的是大破坏，如西单商场、水泥厂。有的甚至停产。在无产阶级专政条件下完全可以通过辩论嘛，打了阶级弟兄为什么都不痛心？破坏国家财产是犯罪行为。","type":"paragraph"},{"text":"戚本禹同志写了一篇文章说：你们破坏了国家财产，总有一天要被清算的。西单商场是打、砸、抢的典型，武斗无非是打死些人，破坏国家财产。观点不同可以争论嘛，你们老说自己正确，那一条是符合毛泽东思想的。中央文革三条不但是制止今天的武斗，而且是制止今后武斗的指示，你们要很好考虑中央文革的意见。今后不要搞事，谁搞谁犯错误，革命造反派老是武斗也会走向反面。","type":"paragraph"},{"text":"为了制止武斗，中央决定在西单商场和北京仪器厂展览，你们不要搞这个典型。凡是参观过的没有一个不反对的，痛哭流涕，说这是犯罪，这哪里是革命。中央要求严肃处理这件事。","type":"paragraph"},{"text":"（黄作珍：商场两派现在正在整风）一整风，群众就起来造头头的反。所以这个事干不得，要按照毛主席指引的航向前进。北京现在大字报很多，搞了棚，真正把一小撮走资派搞臭，越抓大批判，走资本主义道路当权派、牛鬼蛇神就拚命搞武斗，我们真正革命造反派要提高警惕，北京阶级斗争可是尖锐复杂，但总的很好，我们越搞大批判，他们越紧张，搞假工代会，武斗也有造反派上当的，有的造反派打报告给我，说上了当参加了武斗。","type":"paragraph"},{"text":"紧跟主席思想就攻无不克。如果你们达成协议不武斗就好了，有的达成了协议一天就破坏了（一机床厂）。伯达同志说“谁破坏协议谁就是反革命。”这句话我不敢说。中央文革指示一定要搞臭武斗，坚决制止，当然有的武斗是造反派水平不高，有的是保守派挑起，但最主要是走资本主义道路当权派搞乱，但愿你们做个教训，如果有一个人被打死，多可惜呀！","type":"paragraph"},{"text":"王树声：","type":"paragraph"},{"text":"以后再发生武斗，不但你们有责任，而且我们也有责任，因为我们是军管。这不是小型武斗，是大型武斗。文化大革命中我们要学习，向你们学习，学习你们的长处。我们军管六个部，七机部搞好对大家有影响，你们是搞××的。三军是我们的榜样，跟三军就是跟中央，跟林总。我们能不能做个榜样，把毛主席著作学习放在第一位，不利文化革命的不讲、不做，有利文化革命的我们就做。你们总埋怨人家，不管哪个人先动手都是不对的。","type":"paragraph"}],"comments":[],"origin":"1967年9月2日红代会清华井冈山一部第三动态组编《动态》第139期","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"吴德","type":"人物"},{"name":"王树声","type":"人物"},{"name":"中央文革","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"武斗","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fb8c31c839"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
