生产更大胜利","authors":["汪玉春"],"dates":[{"year":1983,"month":8,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"叶剑英王震会见烟台地区黄金生产系统职工代表"},{"type":"paragraph","text":"勉励大家发扬艰苦创业革命精神，争取黄金生产更大胜利"},{"type":"paragraph","text":"据新华社济南8月23日电　（通讯员汪玉春）中共中央政治局常委、中央军委副主席叶剑英，中共中央政治局委员王震，新近在烟台会见了烟台地区黄金生产系统的职工代表，对黄金生产系统广大干部、工人、技术人员和军队转业干部表示慰问，勉励他们发扬艰苦创业的革命精神，争取黄金生产的更大胜利。"},{"type":"paragraph","text":"会见时，叶剑英、王震同大家一一握手，并在一起照了相。烟台地委书记王济夫、烟台行署副专员姜德华向叶剑英、王震汇报了烟台地区黄金生产的情况。"},{"type":"paragraph","text":"当他们汇报到这里的黄金生产八年翻了两番时，叶剑英、王震连声说好，称赞他们为四化建设做出了贡献。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"王震","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"025e6d062d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
