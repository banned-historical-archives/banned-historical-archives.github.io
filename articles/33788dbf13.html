利而战斗  热烈祝贺中国人民在文化大革命中取得辉煌胜利","authors":[],"dates":[{"year":1967,"month":10,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"冯维希在老挝革命节招待会上号召人民更有力地开展人民战争"},{"type":"paragraph","text":"为争取抗美救国斗争的完全胜利而战斗"},{"type":"paragraph","text":"热烈祝贺中国人民在文化大革命中取得辉煌胜利"},{"type":"paragraph","text":"据新华社康开九日电  老挝爱国战线党中央委员会总书记、老挝民族团结政府新闻、宣传和游览大臣富米·冯维希八日发表讲话说：哪里有压迫，哪里就一定有反抗压迫的斗争；哪里有外来侵略，哪里就一定有反抗侵略的斗争。老挝人民对美帝国主义侵略者的仇恨已变成不可战胜的坚强4力量。"},{"type":"paragraph","text":"富米·冯维希是在庆祝老挝革命节二十二周年的招待会上讲这些话的。"},{"type":"paragraph","text":"富米·冯维希强调说：“革命已使我们看清：谁是我们的敌人，谁是我们的朋友。”不管美帝国主义及其走狗怎样玩弄阴谋，老挝人民识破了美帝国主义及其走狗宣扬的所谓“和平”、“独立”、“民族联合政府”的欺骗阴谋，更看清了万象傀儡集团的卖国勾当。他接着指出：目前敌人的捣乱一点也不说明他们有什么胜利的希望，恰恰说明他们已经到了严重失败的地步。他们只有一条路可走：就是走向更大的、全面的、最后的失败。富米·冯维希强调要大力加强正规部队、地方部队和民兵游击队三种武装力量的建设，要全面建设和巩固解放区，发展根据地，以保证人民战争的胜利进行。他号召全体干部、战士和人民更紧密地团结起来，在现有胜利的基础上，为争取抗美救国斗争的完全胜利而冲锋陷阵。"},{"type":"paragraph","text":"富米·冯维希在讲话中对中国人民在社会主义建设中取得的伟大成就表示热烈赞扬，对中国人民在抗美救国斗争中给予老挝人民的全心全意的援助表示崇高的敬意和衷心的感谢，并祝中国人民在以毛泽东主席为首的、用毛泽东思想作为指针的中国共产党的英明领导下，在无产阶级文化大革命中取得辉煌胜利。"},{"type":"paragraph","text":"出席招待会的还有老挝爱国战线党中央委员会驻川圹代表，老挝爱国中立力量领导委员会负责人以及各行政机关、群众组织的负责人和两支爱国力量所属部队的干部。中国驻老挝经济文化代表团和越南民主共和国驻老挝经济文化代表团负责人都应邀出席了招待会，并分别在会上讲了话。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"人民战争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"33788dbf13"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
