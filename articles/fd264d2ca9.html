r":1968,"month":5,"day":31}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛泽东思想育英雄"},{"type":"paragraph","text":"解放军战士　钟永华"},{"type":"paragraph","text":"文化大革命烈火熊，"},{"type":"paragraph","text":"毛泽东思想育英雄，"},{"type":"paragraph","text":"门合呵，光辉业绩照日月，"},{"type":"paragraph","text":"烈士呵，顶天立地一劲松。"},{"type":"paragraph","text":"昆仑舞臂，南岭高歌，"},{"type":"paragraph","text":"长江澎湃，南海奔腾，"},{"type":"paragraph","text":"山山水水翘首望呵，"},{"type":"paragraph","text":"五湖四海把你颂。"},{"type":"paragraph","text":"你，“一切想着毛主席”，"},{"type":"paragraph","text":"多次舍己救弟兄；"},{"type":"paragraph","text":"你，“一切服从毛主席”，"},{"type":"paragraph","text":"驱散迷雾斩妖风；"},{"type":"paragraph","text":"你，“一切紧跟毛主席”，"},{"type":"paragraph","text":"二十年革命一贯忠；"},{"type":"paragraph","text":"你，“一切为着毛主席”，"},{"type":"paragraph","text":"刀山火海仍从容。"},{"type":"paragraph","text":"看，为救同志，扑向炸点，"},{"type":"paragraph","text":"你，面不改色，毫不心惊，"},{"type":"paragraph","text":"用生命去捍卫毛主席革命路线，"},{"type":"paragraph","text":"用鲜血写下了最大的“忠”！"},{"type":"paragraph","text":"门合呵，你生为革命而生，"},{"type":"paragraph","text":"烈士呵，你死比泰山还重。"},{"type":"paragraph","text":"你象一把火炬燃烧在我们心里，"},{"type":"paragraph","text":"你象一面红旗飘扬在我们上空。"},{"type":"paragraph","text":"学习你，忠于人民忠于党，"},{"type":"paragraph","text":"学习你，立场坚定旗帜红，"},{"type":"paragraph","text":"学习你，彻底改造世界观，"},{"type":"paragraph","text":"学习你，永远革命绝对忠！"},{"type":"paragraph","text":"看，千万支大军象战马驰骋，"},{"type":"paragraph","text":"手捧宝书，攀登“忠”的高峰。"},{"type":"paragraph","text":"呵，不到长城非好汉，"},{"type":"paragraph","text":"跟着毛主席，誓叫世界一片红。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fd264d2ca9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
