rt":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"时间紧任务重 抓纲带目不放松工兵一连揭批“四人帮”搞得扎实，各项任务干得出色","authors":[],"parts":[{"type":"paragraph","text":"本报讯 前些时，八一○五四部队工兵一连有几项工作要做，揭批“四人帮”的斗争，连队生产，施工备料，砌二百多米长的围墙，参加上级召开的贯彻执行条令现场会的准备工作。时间紧，任务重，党支部紧紧抓住揭批“四人帮”这个纲，带动了各项任务的圆满完成。"},{"type":"paragraph","text":"开始，有的同志忽视揭批“四人帮”这件大事。为了统一认识，党支部两次召开支委会，学习毛主席关于“纲举目张”的论述，学习华主席关于“深入开展揭发批判‘四人帮’的伟大群众运动，是一九七七年的中心任务”的重要指示，认清揭批“四人帮”和其它工作的关系。大摆“四人帮’反党乱军给连队带来的流毒和影响，看清深入揭批“四人帮”，对于加强连队建设的迫切性和重要性。接着，党支部三次召开军人大会和骨干会，反复动员，明确思想。干部战士响亮提出：时间紧，任务重，抓纲带目不动摇，大家出主意，想办法，从三个方面解决这个问题："},{"type":"paragraph","text":"一、科学安排，保证拿出必要的时间揭批“四人帮”。党支部研究时间安排时，首先把揭批“四人帮”放在第一位考虑，统筹安排其它工作。在家的三名连队干部，分工两名负责抓学习和批判，一名侧重抓施工和生产。他们还根据轻重缓急，对其它几项工作做了周密计划，使学习和批判的时间得到保证。"},{"type":"paragraph","text":"二、用大干的精神赢得时间，用来揭批“四人帮”。干部战士提出：一天要当两天用，一个人要顶两人干，努力提高工作效率。党支部组织大家开展革命竞赛活动，促进了工作任务的完成。砌围墙原计划十天完成，一搞竞赛，五天就完成了，为揭批“四人帮”赢得了时间。"},{"type":"paragraph","text":"三、把揭批“四人帮”贯穿到各项工作中去。施工备料时，党支部组织大家边施工边联系实际批判“四人帮”破坏国民经济建设的罪行，激发干部战士大干社会主义的热情，结果提前完成了备料任务。党支部还采取各种形式开展革命大批判，如召开小型批判会，办工地广播，组织文艺晚会等。不到十天时间，全连写出近二百篇批判稿。揭批“四人帮”的斗争搞得轰轰烈烈、扎扎实实。"},{"type":"paragraph","text":"驻守在西南边疆的空军航空兵某部空地勤人员，狠批“四人帮”破坏我军建设的滔天罪行，决心为保卫祖国苦练杀敌本领。 吴正辉摄（照片）"}],"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cac65e966c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
