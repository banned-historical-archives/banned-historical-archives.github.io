,"authors":[],"dates":[{"year":1952,"month":3,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京廿七日电】　据塔斯社莫斯科二十四日讯:“真理报”刊载了一篇文章，论述西方国家资产阶级报纸对苏联就缔结对德和约问题致美、英、法三国政府照会的反应。"},{"type":"paragraph","text":"评论员指出:苏联政府这个新的行动，获得了全世界人民的热烈欢迎和拥护。因此，各国资产阶级的宣传机构便慌忙想办法，企图提出什么论点来抵制对于苏联建议的正确评价。结果，资产阶级的评论家们使自己处于相当为难的境地。"},{"type":"paragraph","text":"英国的“泰晤士报”说:“苏联的照会在很多方面是令人难以应付的。”英国的“论坛”周刊说:苏联的建议已使西方国家“处于无可奈何的进退两难的境地”；因为，该周刊解释说，接受苏联的建议，西方就必须“放弃它的重新武装西德的计划”，而拒绝这个建议“就是推翻以前的一切宣言，承认西方国家更关心的是招募德国军队十二个师，而不是建立统一和独立的德国。”"},{"type":"paragraph","text":"“真理报”评论员进一步指出，西方国家资产阶级报纸的窘迫和惶惑，暴露了它们嫌恶巩固和平的计划。“泰晤士报”和“纽约时报”都表示害怕苏联建议会阻止德国的重新武装。"},{"type":"paragraph","text":"美国“基督教科学箴言报”驻华盛顿记者哈许反映华盛顿的烦恼说，苏联的有效行动“直接切断了达到美国政府的主要政策目标的道路。如果苏联这个行动成功了，这将意味着根据把德国和西欧联系起来这个观念而建立的一切军事和政治计划立即将寿终正寝。”"},{"type":"paragraph","text":"西方资产阶级的报纸不得不承认苏联的建议是合乎西欧人民的和平愿望的。"},{"type":"paragraph","text":"“泰晤士报”承认:苏联这个步骤，能够影响法德两国国内反对西方现有的“防御”计划的人们。"},{"type":"paragraph","text":"“基督教箴言报”说:苏联的建议可能“不仅投合西德的口味，而且还会投合西欧各友邦国内很大一部分人的意见。”"},{"type":"paragraph","text":"“真理报”评论员指出:资产阶级评论家们正在企图搜索出一种德国和苏联都不能接受的解决德国问题的方法来，他们的任务是寻找那种必然会被苏联拒绝的“议论”，以便为指责苏联“不愿”解决德国问题准备藉口，而使西方国家逃避掉阻挠和平解决德国问题的责任。从美国报纸的评论中可以看出，美国政府正在寻找藉口来拒绝苏联的建议。报纸提出的藉口之一，就是说什么苏联反对所谓联合国调查德国举行选举的条件的调查团在德意志民主共和国“进行调查”，而大家知道，这个非法调查团的活动只不过是粗暴地干涉德国的内政。"},{"type":"paragraph","text":"“真理报”评论员指出:苏联政府的建议的清晰与肯定的性质，使得美英资产阶级的评论家越来越难于搬弄他们的虚伪“论点”了。他们不得不承认必须“严肃地对待”苏联的建议。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9d02d1f99c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
