":1978,"month":10,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"华国锋总理电贺图瓦卢独立"},{"type":"paragraph","text":"新华社北京九月三十日电　中华人民共和国国务院总理华国锋九月二十八日打电报给图瓦卢政府总理托阿利皮·劳蒂，热烈祝贺图瓦卢独立，并通知他中国政府承认图瓦卢。电报全文如下：富纳富提图瓦卢政府总理托阿利皮·劳蒂阁下："},{"type":"paragraph","text":"在图瓦卢宣布独立和阁下出任总理之际，我谨代表中华人民共和国政府和人民，向阁下，向图瓦卢政府和人民表示热烈祝贺。我还高兴地通知阁下，中国政府决定承认图瓦卢。"},{"type":"paragraph","text":"祝图瓦卢人民在捍卫国家主权、维护民族独立、发展民族经济方面取得成就。祝中、图两国和两国人民的友谊不断发展。"},{"type":"paragraph","text":"中华人民共和国国务院总理　华国锋"},{"type":"paragraph","text":"一九七八年九月二十八日"},{"type":"paragraph","text":"于北京"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"华国锋","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]},{"id":"jfjb","name":"解放军报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"dates":[{"year":1978,"month":10,"day":1}],"page_start":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"华国锋总理电贺图瓦卢独立","authors":[],"parts":[{"type":"paragraph","text":"新华社九月三十日讯 中华人民共和国国务院总理华国锋九月二十八日打电报给图瓦卢政府总理托阿利皮·劳蒂，热烈祝贺图瓦卢独立，并通知他中国政府承认图瓦卢。电报全文如下："},{"type":"paragraph","text":"富纳富提"},{"type":"paragraph","text":"图瓦卢政府总理托阿利皮·劳蒂阁下："},{"type":"paragraph","text":"在图瓦卢宣布独立和阁下出任总理之际，我谨代表中华人民共和国政府和人民，向阁下，向图瓦卢政府和人民表示热烈祝贺。我还高兴地通知阁下，中国政府决定承认图瓦卢。"},{"type":"paragraph","text":"祝图瓦卢人民在捍卫国家主权、维护民族独立、发展民族经济方面取得成就。祝中、图两国和两国人民的友谊不断发展。"},{"type":"paragraph","text":"中华人民共和国国务院总理 华国锋"},{"type":"paragraph","text":"一九七八年九月二十八日于北京"}],"alias":""},"tags":[{"name":"华国锋","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7a6a06aca7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
