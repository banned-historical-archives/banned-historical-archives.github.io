:["程潜","陈明"],"dates":[{"year":1949,"month":8,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北平廿七日电】　程潜、陈明仁两将军八月+九日电复毛主席朱总司令。电文如下:"},{"type":"paragraph","text":"北平毛主席朱总司令:八月+六日电敬悉。辱荷藻饰，惭感交并。承示团结部属，与人民解放军亲密合作，并准备改编为人民解放军，以革命精神教育部队，改变作风，力求进步，为消灭残匪，解放全国人民而奋斗。潜等责无旁贷，遵命竭力以赴。自解放军暨代表团进驻长沙以来，推诚相处，军民欢腾，秩序安宁。至于军政机构，正次第重组，部队正作初步整编，进行均甚顺利，凡此差可告慰。来日艰巨，潜等菲陋，当秉临深复薄之诫。尚盼随时指示为祷。"},{"type":"paragraph","text":"程潜、陈明仁八月十九日"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"51fce208a4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
