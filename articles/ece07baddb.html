rt":6,"page_end":6,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"翻身农奴想念毛主席","authors":["藏族民兵英雄七林汪丹"],"parts":[{"type":"paragraph","text":"彩云飞舞啊雪莲盛放，"},{"type":"paragraph","text":"雪山草原处处红旗飘扬。"},{"type":"paragraph","text":"翻身农奴日夜想念毛主席，"},{"type":"paragraph","text":"毛主席是照亮雪山草原的金太阳！"},{"type":"paragraph","text":"过去草原虽然无比宽广，"},{"type":"paragraph","text":"却没有我们农奴放个瓦罐的地方。"},{"type":"paragraph","text":"雪山底下的青稞虽有千堆万担，"},{"type":"paragraph","text":"却没有我们农奴一木碗的口粮。"},{"type":"paragraph","text":"伟大的领袖毛主席啊！"},{"type":"paragraph","text":"您把农奴救出苦海见了太阳。"},{"type":"paragraph","text":"大叛徒刘少奇却妄想再把我们推进"},{"type":"paragraph","text":"苦难的深渊，"},{"type":"paragraph","text":"真是毒如蛇蝎，恶如豺狼！"},{"type":"paragraph","text":"毛主席啊！您伟大思想的光辉，"},{"type":"paragraph","text":"指引着各族人民奔向胜利的前方。"},{"type":"paragraph","text":"翻身农奴千遍万遍地祝福您老人"},{"type":"paragraph","text":"家："},{"type":"paragraph","text":"万寿无疆！万寿无疆！万寿无疆！"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ece07baddb"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
