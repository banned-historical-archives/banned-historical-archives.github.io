tart":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"用光焰无际的毛泽东思想导航","authors":["张鸣"],"parts":[{"type":"paragraph","text":"脚踏碧海浪千层，"},{"type":"paragraph","text":"手捧宝书望北京，"},{"type":"paragraph","text":"水下阳光金灿灿，"},{"type":"paragraph","text":"滚滚波涛见红心。"},{"type":"paragraph","text":"这是海军某潜艇的战士写在舱壁上的一首诗。这艘潜艇的干部战士长年累月在大海中航行，把光焰无际的毛泽东思想当作水底航行的导航灯。"},{"type":"paragraph","text":"战士王有田从上艇那天起，就精心制作了一本“红太阳画册”，汇集了二百六十多张不同样式的毛主席像。每次出海，他都把这本“红太阳画册”带在身边。战士们说：“潜艇离了岸，白天见不到太阳，晚上看不到月亮。但我们心中有颗最红最红的红太阳。红太阳把我们每个人的心照得通红通红，把海底照得透亮透亮。”"},{"type":"paragraph","text":"在海上，他们带着问题活学活用毛主席著作，战胜了各种困难和艰险，胜利地、不折不扣地执行毛主席交给的战斗任务。潜艇潜到海底里，舱室温度剧烈升高。高温闷热，人容易疲劳昏倒。有一天，风浪很大，一舱有很多同志都晕船了。这时，大家一起高声朗读：“发扬勇敢战斗、不怕牺牲、不怕疲劳和连续作战（即在短期内不休息地接连打几仗）的作风。”顿时，同志们精神焕发，浑身是劲。当发现敌情的时候，大家就高声朗颂毛主席语录：“一切反动派都是纸老虎”，“务歼入侵之敌”。毛主席的教导鼓舞着他们去战斗，去夺取胜利。每次出海，他们都在海底召开活学活用毛主席著作讲用会，把海底当作斗私批修的战场，用光焰无际的毛泽东思想导航。指战员们决心做到：永远沿着毛主席指引的航向前进，一度不能偏，一分不能差。在一次潜航中，上级要他们报告情况，战士们深深懂得：这是向毛主席汇报情况啊！无线电班的同志们，在发报前围在一起，反复学习《为人民服务》这篇光辉著作，以“完全”“彻底”为尺子，把机器和文件准备了又准备，检查了又检查。发报的时间到了，全艇几十颗无限忠于毛主席的红心，随着电波，飞到了北京，飞到了伟大领袖毛主席的身边。（张鸣）"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c3a8d6a95c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
