s":[{"year":1963,"month":4,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席的好战士——雷锋"},{"type":"paragraph","text":"吴敏　高山画"},{"type":"paragraph","text":"?战友乔安山学习文化信心不足，雷锋便念《毛主席关怀警卫战士学文化》给他听，送他钢笔和本子。乔安山向雷锋表示感谢，雷锋说：“这是党和毛主席给我们的学习机会，应该感谢毛主席！”"},{"type":"paragraph","text":"?一次出车运粮食，有一位战友一肩就扛起了百多斤重的麻袋，并对雷锋说：“雷锋，你有这个能耐吗？”雷锋个子小，力气小，听到这话心里非常难受。"},{"type":"paragraph","text":"?当晚，雷锋怎么也睡不着，他再次认真地读了《纪念白求恩》这篇文章，心里忽然亮堂起来：“毛主席啊，我一定按照您的话做！不管自己力量大小，全部献给人民，毫不利己，专门利人！”"},{"type":"paragraph","text":"?有一次运水泥，雷锋发现车上撒下一些水泥，雷锋想：一点一滴也是国家资财，不能浪费，便利用休息时间把它扫了起来。他不仅清扫了自己的车子，也清扫了别人的车子，一共扫起了三百多斤。　〔待续〕"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d56eaab27d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
