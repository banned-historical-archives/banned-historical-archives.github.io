script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"罗工人党中央全会决议  坚决同修正主义作斗争  选举毛雷尔为中央委员并改选中央监察委员会","authors":[],"dates":[{"year":1958,"month":6,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"罗工人党中央全会决议"},{"type":"paragraph","text":"坚决同修正主义作斗争"},{"type":"paragraph","text":"选举毛雷尔为中央委员并改选中央监察委员会"},{"type":"paragraph","text":"新华社布加勒斯特14日电　罗马尼亚工人党中央委员会在6月9日到13日举行了全体会议。"},{"type":"paragraph","text":"据“火花报”今天发表的会议公报说，这次会议的决议强调指出必须巩固党的组织，不断地加强党的团结和党的纪律，提高党员和候补党员的政治思想水平，同修正主义和一切资产阶级思想影响作斗争，并且同脱离党内生活准则的现象作斗争。"},{"type":"paragraph","text":"公报说，会议拥护党中央政治局对南共纲领草案和南共代表大会所采取的立场。"},{"type":"paragraph","text":"公报还说，全体会议听取和讨论了党中央政治局关于执行党的第二次代表大会关于发展党的队伍、培养党的干部和调整党的社会成分的报告。会议讨论了保护社会主义所有制的问题，并且通过了相应的决议。"},{"type":"paragraph","text":"新华社布加勒斯特14日电　在9日到13日举行的罗马尼亚工人党中央委员会全体会议上，选举了格·毛雷尔为中央委员，伊·马尔金、瓦·维尔库、米·布尔凯和乔·尼古拉为候补中央委员。"},{"type":"paragraph","text":"全会改选了中央监察委员会。康·帕伏列斯库再次当选为委员会主席。图·科柳当选为副主席。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cd2b328cb0"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
