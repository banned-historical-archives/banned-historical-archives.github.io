" crossorigin="">{"props":{"pageProps":{"books":[{"id":"5ba19c54-124b-4e05-bf76-73e558230021","name":"红旗一九六六年第十二期","internal":false,"official":true,"type":"pdf","author":"《红旗》杂志编辑部","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives2/main/5ba19c54-124b-4e05-bf76-73e558230021.pdf"],"article":{"title":"周恩来在接见外地来京革命师生大会上的讲话","alias":"","parts":[{"type":"paragraph","text":"在接见全国各地来京革命师生大会上周恩来同志的讲话"},{"type":"paragraph","text":"（一九六六年九月十五日）同志们，同学们"},{"type":"paragraph","text":"我们热烈欢迎你们！欢迎你们从五湖四海，来到无产阶级文化大革命的中心一一北京，来到伟大的领和毛主席身边。"},{"type":"paragraph","text":"我们最敬爱的领袖毛主席同大家亲切会见，这是对我们最大的关怀，最大的鼓舞！这是我们最大的幸福，最大的光荣！"},{"type":"paragraph","text":"无产阶级文化大革命，是改造人们灵魂的大革命，也是促进社会生产的大节命。毛主席亲自主持制定的十六条指出：无产阶级文化大革命是使我国社会生产力发展的一个强大的推动力。“"},{"type":"paragraph","text":"“无产阶级文化大革命，就是为的要使人的思想革命化，因而使各项工作做得更多、更快、更好、更省。”"},{"type":"paragraph","text":"随着无产阶级文化大革命高潮的兴起，我国工农业生产正在出现一个更新的面貌，更新的繁荣。"},{"type":"paragraph","text":"搞好工农业生产，关系很大。它关系到我国社会主义建设，关系到第三个五年计划，关系到城乡人民生活，关系到无产阶级文化大革命。它也关系到支援越南人民的抗美救国斗"},{"type":"paragraph","text":"我们一定要响应毛主席的号召，一手抓革命，一手抓生产，保证文化大革命和工农业生产双胜利！"},{"type":"paragraph","text":"广大的工人、公社社员，科学技术人员和机关企业干部，都应当坚守生产岗位，不失时机地掌握生产环节，把在文化大革命中焕发起来的冲天干劲，用到工农业生产和科学实验中去1"},{"type":"paragraph","text":"同志们，同学们！"},{"type":"paragraph","text":"为了有利于工农业生产的正常进行，大中学校的红卫兵和革命学生，现在不要到工厂，企业单位和县以下的机关，农村人民公社去进行革命串连。那里的革命，要按照原来的“四清”部署，有计划有步骤地进行，工厂，农村不能像学校那样放假，停止生产来搞革命。革命学生要尊重工农群众，信赖工农群众，相信工农群众完全可以依靠自己把革命搞好。"},{"type":"paragraph","text":"秋收秋种的大忙季节已经到来。大中学校的红卫兵和革命师生，应当有组织地到农村去参加劳动，帮助秋收，学习贫下中农的革命干劲和勤劳的品质。"},{"type":"paragraph","text":"同志们，同学们！你们在无产阶级文化大革命中，起了很大的作用。对于你们的革命行动，我们热烈地欢迎，坚决地支持。我们相信，你们一定会高举毛泽东思想伟大红旗，在革命中学会革命，把直已锻炼成为毛主席的好战士，好学生，成为共产主义的一代新人！"},{"type":"paragraph","text":"把无产阶级文化大革命进行到底！抓革命，促生产，迎接社会主义建设的新高潮！伟大的中国各族人民万岁！伟大的中国共产党万岁！伟大的毛泽东思想万岁！韩大的领袖毛主席万岁！万岁！万万岁1"}],"authors":["周恩来"],"dates":[{"year":1966,"month":9,"day":15}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":10,"page_end":11},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b3e2226cdd"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
