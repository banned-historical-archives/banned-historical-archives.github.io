art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席刘主席等同赫鲁晓夫等各国贵宾观看焰火","authors":[],"parts":[{"type":"paragraph","text":"新华社1日讯 毛泽东主席、刘少奇主席，和尼·谢·赫鲁晓夫同志今天晚上在天安门城楼上观看了广场上的群众大联欢和丰富多采的节日焰火。同他们在一起的有：朱德、周恩来、林彪、彭真等党和国家的领导人，苏斯洛夫、胡志明、诺沃提尼、金日成、泽登巴尔、萨瓦茨基、道比、加涅夫、谢胡、马特恩、波德纳拉希等十一个兄弟国家的领导同志们。"},{"type":"paragraph","text":"今天应邀到天安门城楼上观看群众大联欢和节日焰火的，还有十一个社会主义国家党政代表团的全体团员，各国共产党和工人党代表团全体成员，越南和朝鲜军事代表团全体成员，各国驻中国的使节，亚非友好国家政府代表团全体成员和政府代表，苏中友协代表团和其他社会主义国家劳动人民代表团的团长、副团长和主要团员，国际性人民群众组织代表团的团长、副团长或全团成员，各国对中国友好组织、人民团体组织、贸易、文化、艺术、新闻、科学技术合作、体育等代表团的团长、副团长，各国的政界人士和知名人士。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"75f5eb7bf5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
