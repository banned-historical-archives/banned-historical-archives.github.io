al-archives/banned-historical-archives8/main/maoquanji1.pdf"],"article":{"title":"夜学招学广告","alias":"","parts":[{"type":"paragraph","text":"夜学招学广告！"},{"type":"paragraph","text":"（1918年3月2日）一去年旧学生愿来者，至师范号房报到：一新学生愿入夜学者，不论年纪大小，认字多少，均至师范号房报名，报名时写明姓名住址职业年龄及门牌；一阴历二月初五日上课，报名时各带笔墨，来师范下首国民学校内听讲；一每夜七点钟起，九点钟止，听讲两点钟；一今年每星期六夜，夜夜上课不间断；一不收学费，有讲义发；-一夜学每夜上课，如有空位，准人随便听讲。"},{"type":"paragraph","text":"[1]1918年《湖南省立第一师范学校学友会夜学日志》第1册3月8日日志收录此文时有如下说明：“先是三月二日毛君泽东代拟出广告，兹录于后。”此件后来又收入1918年《湖南省立第一师范学校学友会贰号纪事录》中，个别字有出入。影合理八第校学气师一节立省南湖"},{"type":"paragraph","text":"1918年3月，湖南省立第一师范学校第八班合影。第四排右二为毛泽东。"}],"authors":["毛泽东"],"dates":[{"year":1918,"month":3,"day":2}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":471,"page_end":472},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"22caac7c80"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
