们因反对修正主义而被开除","authors":[],"dates":[{"year":1963,"month":4,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"比共第十四次代表大会闭幕"},{"type":"paragraph","text":"大会通过政治方针和党章并开除四人出党"},{"type":"paragraph","text":"被开除者声明说他们因反对修正主义而被开除"},{"type":"paragraph","text":"新华社十九日讯　布鲁塞尔消息：比利时共产党第十四次代表大会从十三日到十五日在安特卫普举行。"},{"type":"paragraph","text":"比利时共产党主席伯内尔向大会作了中央委员会从一九六○年第十三次代表大会以来的工作总结报告。大会通过了中央委员会向大会提出的比利时共产党政治方针和党章。"},{"type":"paragraph","text":"大会通过一个决议，把前比利时共产党中央委员会委员雅克·格里巴和莫里斯·多洛涅、莫里斯·马索兹、雷诺·兰多尔夫四人开除出党。这个决议说，“这四个同志好几个月以来一直进行同一九五四年以及第十四次代表大会所通过的党章不相容的派系活动”，他们“在一项向布鲁塞尔省委会提出的联合声明中，断然拒绝承认他们这些活动的不可接受的性质，并且明白表示他们打算以同样方法继续进行活动”，因此，代表大会“同意布鲁塞尔省委员会提出把这四个同志开除出党的要求”。"},{"type":"paragraph","text":"在通过这个决议时，有一票反对，八票弃权。"},{"type":"paragraph","text":"格里巴等四人随后发表声明说：“我们所以被比利时共产党第十四次代表大会开除，是因为我们反对领导机构把党引入其中的机会主义和修正主义；是因为我们希望切实执行我们党第十一次、十二次和十三次代表大会的决议，希望遵守国际共产主义运动的宪章——八十一个共产党和工人党的声明……全国代表大会是在瞒着布鲁塞尔的共产党员的情况下开除我们的，甚至拒绝听取我们的意见。”"},{"type":"paragraph","text":"大会选出了六十人组成的中央委员会和十二人组成的政治局。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"发言"},{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"38053ce99f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
