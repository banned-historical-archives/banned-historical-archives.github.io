《关于补发集体所有制单位干部职工“文化大革命”期间因冤假错案被停发减发工资情况和意见的报告》的通知","authors":[],"dates":[{"year":1986,"month":9,"day":27}],"is_range_date":false,"parts":[{"text":"中共中央组织部转发辽宁省委组织部和落实干部政策办公室《关于补发集体所有制单位干部职工“文化大革命”期间因冤假错案被停发减发工资情况和意见的报告》的通知","type":"title"},{"text":"现将辽宁省委组织部和落实干部政策办公室《关于补发集体所有制单位干部职工“文化大革命”期间因冤假错案被停发减发工资情况和意见的报告》转发给你们。请参照处理。","type":"paragraph"},{"text":"关于补发集体所有制单位干部职工“文化大革命”期间因冤假错案被停发减发工资情况和意见的报告","type":"subtitle"},{"text":"中央组织部：","type":"appellation"},{"text":"党的十一届三中全会以来，我省在大力复查、平反“文化大革命”中冤假错案的同时，有计划、有步骤地补发了“文化大革命”期间国家机关干部和企事业单位干部、职工因冤假错案被停发、减发的工资。在这一问题基本得到解决后，我省于一九八二年七月下发了辽委办发[1982]39号文件，进一步明确了对县(区)属以上集体所有制企事业单位干部、职工“文化大革命”期间被错停发、减发的工资也应予以补发(按规定扣除固定收入和困难补助费)。","type":"paragraph"},{"text":"为了进一步妥善做好集体所有制企事业单位干部、职工因冤假错案在“文化大革命”期间被错停发、减发工资的补发工作，针对当前遇到的几个问题，根据中央有关文件精神，结合我省实际情况，提出如下解决意见：","type":"paragraph"},{"text":"一、对县(区)属以上集体所有制企事业单位干部、职工在“文化大革命”期间被停发、减发的工资，应予以补发。经济情况较好的县(区)属集体所有制企事业单位，要尽快加以解决；经济效益差，经费比较困难的亏损、微利的县(区)属集体所有制单位，可采取立据分期补发的办法，把偿还计划逐个落实到人，力争在近二、三年内补发完毕。","type":"paragraph"},{"text":"二、对于乡镇和街道所属集体所有制企事业单位干部、职工“文化大革命”期间错停发、减发的工资，由于这些单位实行独立核算，自负盈亏，产供销、人财物都未列入当地国民经济计划和劳动计划，不能和县(区)属集体所有制企事业单位等同起来，可根据各单位财力状况和本人所受到的经济损失，给予适当解决或一次性补助。","type":"paragraph"},{"text":"三、补发工资经费来源，可采取多条渠道解决。首先，要立足于企业内部挖掘潜力，增产增值；其次，上级主管部门要统筹安排，集中一部分资金，解决本系统一些单位经费不足的困难；第三，对经济困难的单位，由地方财政予以适当补助。","type":"paragraph"},{"text":"解决集体所有制企事业单位补发工资问题，必须严格审批手续。要由原单位经过调查，提出解决意见，上报上级(即县团级)主管部门审批。原单位撤销的，由现所在单位负责处理。","type":"paragraph"},{"text":"以上意见，不当之处请指正。","type":"paragraph"},{"text":" 中共辽宁省委组织部中共辽宁省委落实干部政策办公室一九八六年七日十五日","type":"paragraph"},{"text":"(原载《干审工作政策文件选编》北京：党建读物出版社，1993年)","type":"appellation"}],"comments":[],"origin":"原载《干审工作政策文件选编》北京：党建读物出版社，1993年","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"辽宁文革","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bbf7370d25"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
