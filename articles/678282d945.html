工人的反映","authors":[],"dates":[{"year":1950,"month":7,"day":5}],"is_range_date":false,"parts":[{"text":"救济失业工人暂行办法颁布后苏南失业工人的反映","type":"title"},{"text":"（苏南日报7月5日讯）中央颁布救济失业工人暂行办法后，苏南一般失业工人均对人民政府寄予很大希望，并迫切要求各级政府迅速成立失业工人救济委员会。有的工人认为，救济失业工人不应只限于解放以后的；解放前的失业工人，长期在国民党统治下，所受的痛苦和压迫最深，经济情况也更困难，应该享受这个待遇。有的工人不了解救济范围，以为只给工会会员，所以着急自己没有工会会籍，会不会没有自己的份。","type":"paragraph"}],"comments":[],"origin":"新华社《内部参考》1950年7月11日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"678282d945"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
