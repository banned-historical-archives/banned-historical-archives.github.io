art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"要闻简报","authors":[],"parts":[{"type":"paragraph","text":"邓小平副总理会见布热津斯基博士"},{"type":"paragraph","text":"邓小平副总理五月二十一日下午会见美国总统国家安全事务助理兹比格涅夫·布热津斯基博士，同他就中美双方共同关心的国际问题和双边关系问题认真坦率地交换了意见和看法。"},{"type":"paragraph","text":"会见后，邓小平副总理在北海公园仿膳设晚宴招待布热津斯基博士和夫人一行。"},{"type":"paragraph","text":"乌兰夫副委员长会见瑞典朋友"},{"type":"paragraph","text":"人大常委会副委员长乌兰夫五月二十一日上午会见瑞典—中国友好联合会名誉主席扬·朱尔达尔和夫人、摄影艺术家鲁内·哈斯纳和夫人等瑞典朋友，同他们进行了亲切友好的谈话。"},{"type":"paragraph","text":"耿飚副总理会见所罗门群岛政府农业土地部长"},{"type":"paragraph","text":"国务院副总理耿飚五月二十一日下午会见所罗门群岛政府农业土地部长沃塔·木和他的随行人员，同他们进行了亲切友好的谈话。"},{"type":"paragraph","text":"所罗门群岛将于今年七月宣布独立。谈话时，耿飚副总理对所罗门群岛即将独立表示祝贺，并希望独立后中、所两国和两国人民加强友好往来和相互了解。"},{"type":"paragraph","text":"耿飚副总理会见英国卫生代表团"},{"type":"paragraph","text":"国务院副总理耿飚五月二十一日晚会见以英国卫生和社会福利大臣恩纳尔斯为团长的英国卫生代表团，同他们进行了友好的谈话。"},{"type":"paragraph","text":"国防部副部长粟裕会见日本自卫队退役高级军官"},{"type":"paragraph","text":"国防部副部长粟裕二十一日下午会见日本自卫队退役高级军官奥宫正武、松金久知、味冈义一、门胁尚一，同他们进行了友好的谈话。（均据新华社）"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"粟裕","type":"人物"},{"name":"耿飚","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"72a706fa79"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
