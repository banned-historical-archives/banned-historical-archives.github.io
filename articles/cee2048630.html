ical-archives/banned-historical-archives0/main/maoquanji27.pdf"],"article":{"title":"复彭德怀电","alias":"","parts":[{"type":"paragraph","text":"复彭德怀电!"},{"type":"paragraph","text":"（1949年9月4日）"},{"type":"paragraph","text":"向青、宁进军以适合情况解决问题，不使军队太疲劳为原则，早一点迟一点都可以。宁夏马军力争全部缴械，其次则争取大部缴械，一部改编。总之，改编的部队愈少愈好。请考虑利用马鸿宾，派人向马鸿宾做些工作，争取大部和平缴械，一部改编的局面。宁夏人少地狭，马部军政党可能有二十万人，加上十九兵团十万人，粮食问题必甚严重，请预为筹备。"},{"type":"paragraph","text":"[1]9月2日毛泽东为中共中央军委起草的致彭德怀、张宗逊电，询问是否可于9月15日以前占领青海、宁夏。3日，彭、张复电说：15日占西宁有可能，9月底能占宁夏省会。这是毛泽东复彭德怀并告贺龙、习仲勋电的主要内容。"},{"type":"paragraph","text":"[2]马鸿宾，当时任国民党西北军政长官公署副长官。"}],"authors":["毛泽东"],"dates":[{"year":1949,"month":9,"day":4}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":206,"page_end":206},"tags":[{"name":"毛泽东","type":"人物"},{"name":"彭德怀","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cee2048630"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
