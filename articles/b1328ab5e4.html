script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"应马科斯总统和夫人邀请前往菲律宾进行正式友好访问李先念副总理离京抵马尼拉受到热烈欢迎邓小平、纪登奎、余秋里、陈锡联、耿飚、王震、陈慕华副总理，吴德、邓颖超、姬鹏飞副委员长等到机场送行马科斯总统和夫人等到机场欢迎","authors":[],"dates":[{"year":1978,"month":3,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京三月十二日电　国务院副总理李先念应菲律宾总统费迪南德·埃·马科斯和夫人的邀请，今天上午乘专机离开北京，前往菲律宾进行正式友好访问。"},{"type":"paragraph","text":"到机场送行的有:国务院副总理邓小平、纪登奎、余秋里、陈锡联、耿飚 、王震、陈慕华，人大常委会副委员长吴德、邓颖超、姬鹏飞，外贸部长李强，中国人民解放军副总参谋长张爱萍，国务院办公室主任吴庆彤，外交部副部长韩念龙、王海容等。"},{"type":"paragraph","text":"陪同李先念副总理访问的有外交部长黄华，以及林佳楣、何理良、王晓云、刘华等。"},{"type":"paragraph","text":"菲律宾驻中国大使馆临时代办塞维里诺陪同李先念副总理前往马尼拉。"},{"type":"paragraph","text":"孟加拉国驻中国大使阿卜杜勒·莫明的夫人和大使馆临时代办柯瑞姆，也到机场送行。"},{"type":"paragraph","text":"新华社马尼拉三月十二日电　中华人民共和国国务院副总理李先念，应菲律宾共和国总统费迪南德·埃·马科斯和夫人伊梅尔达·马科斯的邀请，三月十二日乘专机到达马尼拉，对一水相隔的友好邻帮菲律宾共和国进行正式友好访问，受到热烈隆重的欢迎。"},{"type":"paragraph","text":"随同李先念副总理前来访问的外交部部长黄华以及林佳楣、何理良、王晓云、刘华等也同机到达。"},{"type":"paragraph","text":"下午三时，李先念副总理乘坐的专机在马尼拉国际机场徐徐降落。马科斯总统和夫人迎上前去，在飞机舷梯旁的红地毯上同李先念副总理和夫人林佳楣紧紧握手。马科斯夫人亲自把洁白芳香的茉莉花环挂在李副总理颈上，并向林佳楣献了花束。"},{"type":"paragraph","text":"机场上举行了隆重的欢迎仪式。鸣礼炮十九响后，乐队奏起中、菲两国国歌。李副总理在马科斯总统的陪同下检阅了三军仪仗队，随后同前来迎接的菲律宾官员和各国驻菲律宾外交使节见面。"},{"type":"paragraph","text":"机场主楼前的广场上，上千名儿童排着整齐的队伍，穿着鲜艳的民族服装，载歌载舞。当李副总理和林佳楣在马科斯总统和夫人陪同下走近时，他们把新鲜花瓣撤向李副总理一行，表示热烈的欢迎。李副总理等频频向他们挥手致意。"},{"type":"paragraph","text":"然后，李副总理由马科斯总统陪同，林佳楣由马科斯夫人陪同乘车前往总统府宾馆。"},{"type":"paragraph","text":"今天，马尼拉市洋溢着一片节日气氛。阳光煦丽，椰林葱翠，数十万群众穿着绚丽的各式民族服装，有的跳着各地的土风舞，有的唱着民歌，有的弹着民族乐器，有的挥舞着中菲两国国旗或彩旗，热烈欢迎中国贵宾。整洁的海滨大道——罗哈斯大街焕然一新，沿途两国国旗迎风飘扬。用中、英文写的“欢迎中华人民共和国副总理李先念阁下及夫人一行”大标语牌和横幅比比皆是。机场和市中心一带许多地方高挂着成排的五彩缤纷的大花篮。欢迎群众几次拦住李副总理的车队，向中国客人献花。"},{"type":"paragraph","text":"到机场欢迎李副总理的菲律宾高级官员有:外交部长、国事访问委员会主席卡洛斯·罗慕洛,副外长、国事访问委员会副主席何塞·迪·英格里斯和夫人，副外长、国事访问委员会副主席曼努埃尔·科连特斯，武装部队参谋长罗米欧·埃斯皮诺上将和其他内阁成员以及菲律宾驻中国大使纳西索·杰·雷耶斯和夫人等。"},{"type":"paragraph","text":"中国驻菲律宾大使柯华和夫人张明以及大使馆其他外交官员也到机场欢迎。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"吴德","type":"人物"},{"name":"李先念","type":"人物"},{"name":"纪登奎","type":"人物"},{"name":"王震","type":"人物"},{"name":"余秋里","type":"人物"},{"name":"耿飚","type":"人物"},{"name":"陈锡联","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b1328ab5e4"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
