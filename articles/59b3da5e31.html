ical-archives/banned-historical-archives0/main/maoquanji46.pdf"],"article":{"title":"对林彪关于部队文艺工作的谈话的批语","alias":"","parts":[{"type":"paragraph","text":"对林彪关于部队文艺工作的"},{"type":"paragraph","text":"谈话的批语\""},{"type":"paragraph","text":"（1964年6月4日）"},{"type":"paragraph","text":"江青阅。并于六月五日去找林彪同志谈一下，说我完全赞成他的意见，他的意见是很好的，并且很及时。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"六月四日"},{"type":"paragraph","text":"[1]这个批语写在中国人民解放军总政治部1964年6月2日编印的《工作通讯》第一三一期上。该期通讯登载了中共中央军委副主席、国防部部长林彪同年5月9日在听取总政治部副主任刘志坚、傅钟和总政治部文化部副部长陈其通关于全军第三届文艺会演情况的汇报后，对部队文化艺术工作发表的谈话。谈话说，无产阶级文艺的自的，就是要团结人民，教育人民，鼓舞革命人民斗志，瓦解敌人，消灭敌人。部队文艺工作必须密切结合部队任务和思想情况，为兴无灭资，巩固和提高战斗力服务。文艺工作的关键还是要抓创作，搞好创作要做到领导、专业人员和群众的三结合，领导上要出题目，分任务，统筹安排。文艺工作者搞好创作，要有学习毛主席著作、深入生活和练基本功这三项过硬功夫。创作人员要做到边看、边想、边写、边改。革命的文艺要有两个标准，即政治标准和艺术标准，两者不是混合，而是化合。部队文艺工作要行行出“状元”，“状元”是比出来的，要先在军区比，全军范围比，然后在全国比，也要争取够得上在世界范围内比的水平。"}],"authors":["毛泽东"],"dates":[{"year":1964,"month":6,"day":4}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":377,"page_end":377},"tags":[{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"type":"文稿类型","name":"对话"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"59b3da5e31"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
