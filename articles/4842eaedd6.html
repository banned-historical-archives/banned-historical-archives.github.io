ical-archives/banned-historical-archives0/main/maoquanji32.pdf"],"article":{"title":"对聂荣臻关于中南军区南迁问题的报告的批语","alias":"","parts":[{"type":"paragraph","text":"对聂荣臻关于中南军区南迁问题2的"},{"type":"paragraph","text":"报告的批语"},{"type":"paragraph","text":"（1952年6月11日）周林阅，退聂办。"},{"type":"paragraph","text":"（一）以四十三军移驻海南岛，四十六军移驻雷州半岛，即足以对付海南局势。四十四军仍位惠州一带不要动。这样可以东西机动，如海南岛有事再将四十四军调去不迟。"},{"type":"paragraph","text":"（三）赵尔陆调出为军工部长，不要去广东。以上两点已与谭赵谈过。其余均同意。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"六月十一日[1]聂荣臻，当时任中国人民解放军代总参谋长。[2]指中南军区机关驻地拟由武汉市迁往广州市。"},{"type":"paragraph","text":"[3]周，指周恩来。林，指林彪，当时任人民革命军事委员会副主席、中国人民解放军中南军区司令员。"},{"type":"paragraph","text":"[4]赵尔陆，当时任中国人民解放军中南军区参谋长，1952年8月7日被任命为中央人民政府第二机械工业部部长。"},{"type":"paragraph","text":"[5]谭，指谭政，当时任中国人民解放军中南军区第三政治委员。赵，指赵尔陆。"}],"authors":["毛泽东"],"dates":[{"year":1952,"month":6,"day":11}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":137,"page_end":137},"tags":[{"name":"毛泽东","type":"人物"},{"name":"聂荣臻","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4842eaedd6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
