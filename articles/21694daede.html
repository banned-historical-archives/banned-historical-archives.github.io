:[{"year":1960,"month":5,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【据新华社北京18日电】　贝尔格莱德消息:南斯拉夫总统铁托17日向南斯拉夫通讯社记者发表谈话，把全世界人民同声怒斥的美机侵犯苏联领空事件说做并不是“现在的主要事件”。他并且攻击苏联说，美机侵犯苏联的事件“不应该”成为“具有这样规模的争执的借口”。"},{"type":"paragraph","text":"铁托在谈话中千方百计替美国的侵略罪行掩饰和开脱。他在谈话中虽说要谴责美国的行为，但他只说“美国飞机飞入苏联领空”，“美国和苏联之间发生了巨大的事情”，通篇对美国不敢用“侵略”“挑衅”一词，竭力掩盖这一事件的严重性质。铁托假意装作对四国首脑会议的决裂“感到极大的担心和不安”，但他避而不谈美国的对苏联的侵略行为和坚持继续这种无耻行径破坏了四国首脑会议的罪责，反而刻意攻击苏联对美国侵略行为的揭发。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"21694daede"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
