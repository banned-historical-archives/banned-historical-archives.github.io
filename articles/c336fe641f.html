自运动","authors":[],"dates":[{"year":1951,"month":4,"day":23}],"is_range_date":false,"parts":[{"text":"北京基督教向教徒征收高额会费抵抗三自运动","type":"title"},{"text":"【本刊讯】北京二区基督教圣公会以向教徒征收高额教会经费抵抗三自运动。该会于本月八日发当通知，要教徒以收入所得的十分之一交给教会，作为教会的经费。该会有些上层分子对教徒说：“政府要教会自养，你们(指教徒)就得养我们。”这一通知公布后，大多数教徒反映，认为教会方面金钱和财产(主要是房产)很多，不应藉口三自运动来收高额会费。有些教徒互相议论，要求教会公开经济，以教会财产组织生产，解决教会今后经费问题。这一问题已由二区区委反映到北京市委统战部，该部现正在考虑处理办法。","type":"paragraph"}],"comments":[],"origin":"1951年4月23日新华通讯社编《内部参考》。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c336fe641f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
