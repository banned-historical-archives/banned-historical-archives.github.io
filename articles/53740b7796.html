script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"坚决执行毛主席伟大指示，走和贫下中农相结合的道路  天津五万多大中学校毕业生奔赴农村  广大毕业生说：我们读书不是为了当官，而是为了革命，我们要一辈子听毛主席的话，当一辈子普通农民","authors":[],"dates":[{"year":1968,"month":12,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"坚决执行毛主席伟大指示，走和贫下中农相结合的道路"},{"type":"paragraph","text":"天津五万多大中学校毕业生奔赴农村"},{"type":"paragraph","text":"广大毕业生说：我们读书不是为了当官，而是为了革命，我们要一辈子听毛主席的话，当一辈子普通农民"},{"type":"paragraph","text":"据新华社天津二十三日电　遵照伟大领袖毛主席的教导，天津市已有四万多名高、初中毕业生和一万多名大学毕业生，离开学校，奔赴农场或农村，坚决走与工农兵相结合的道路。"},{"type":"paragraph","text":"伟大领袖毛主席教导说：“从旧学校培养的学生，多数或大多数是能够同工农兵结合的，有些人并有所发明、创造，不过要在正确路线领导之下，由工农兵给他们以再教育，彻底改变旧思想。这样的知识分子，工农兵是欢迎的。”天津市广大工人、贫下中农、革命干部、革命师生、街道居民，认真学习了毛主席的最新指示，深刻地认识到，知识青年走与工农兵相结合的道路，接受工农兵的再教育，是防修反修的百年大计，千年大计，是培养无产阶级革命事业接班人的根本途径。他们表示，要认真落实毛主席的指示，做好知识青年上山下乡的工作。各学校针对毕业生的活思想，举办了各种类型的毛泽东思想学习班，学习毛主席的一系列最新指示，请旧社会苦大仇深的老工人、老贫农用自己在旧社会的苦难家史教育学生。许多学校还组织学生参观了“天津市三条石阶级教育展览会”，发动学生广泛开展忆苦思甜活动。在这个基础上，他们进一步深入地批判了大叛徒刘少奇推行的反革命修正主义教育路线，肃清大叛徒刘少奇所宣扬的“读书做官”、“万般皆下品，唯有读书高”、“劳心者治人，劳力者治于人”、“下乡镀金”、“吃小亏占大便宜”等反革命修正主义思想。天津河北大学最近有一百六十五名大学毕业生坚决响应毛主席的伟大号召，准备到农村去安家落户。他们说：我们读书不是为了当官，而是为了革命，我们要一辈子听毛主席的话，当一辈子普通农民，用自己的双手建设社会主义的新农村。"},{"type":"paragraph","text":"做好毕业生家长的工作，是动员毕业生到农村安家落户的一个重要环节。天津市各级革命委员会很重视这项工作。许多工厂、学校、街道举办了有毕业生、革命教师、革命家长参加的三结合的毛泽东思想学习班。许多学生家长学习了毛主席的最新指示，批判了各种错误思想，积极支持自己的子女到农村去安家落户。"},{"type":"paragraph","text":"广大毕业生到农村以后，受到了贫下中农的热烈欢迎，许多生产队的贫下中农给他们准备好了房子和锄头、扁担等生产用具。许多贫下中农还向下乡落户的知识青年赠送毛主席著作，鼓励他们读毛主席的书，听毛主席的话，照毛主席的指示办事，做毛主席的好战士。（附图片）"},{"type":"paragraph","text":"北京新华印刷厂的革命职工家属，认真学习毛主席的最新指示，写出决心书，表达忠于毛主席，送子女去农村安家落户的革命豪情。"},{"type":"paragraph","text":"新华社记者摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"天津文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"上山下乡","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"53740b7796"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
