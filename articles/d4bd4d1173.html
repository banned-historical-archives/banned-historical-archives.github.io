":[],"dates":[{"year":1964,"month":3,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京23日电】　中国共产党中央委员会主席毛泽东，今晚会见日本共产党中央委员会政治局委员、中央书记处书记袴田里见和由他率领的日本共产党中央委员会代表团团员:日共中央政治局委员松岛治重，中央书记处书记米原昶，中央委员西泽富夫。"},{"type":"paragraph","text":"毛泽东同志同袴田里见等同志进行了亲切友好的谈话，谈话以后设宴招待日本同志们。"},{"type":"paragraph","text":"参加会见和宴会的，有中共中央副主席刘少奇，总书记邓小平，政治局委员彭真，政治局候补委员康生，中央书记处候补书记杨尚昆，中央委员廖承志，中央候补委员赵毅敏，中共中央机关负责工作人员赵安博、庄涛。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d4bd4d1173"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
