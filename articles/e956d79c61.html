ical-archives/banned-historical-archives0/main/maoquanji30.pdf"],"article":{"title":"中央关于向各界人士解释镇压反革命的必要性的电报","alias":"","parts":[{"type":"paragraph","text":"中央关于向各界人士解释镇压反革命的必要性的电报"},{"type":"paragraph","text":"（1951年2月28日）各中央局，各大军区，并转分局，省委，大市委，区党委及各省军区："},{"type":"paragraph","text":"请注意利用中央政府发布惩治反革命条例的机会，结合当地反革命活动的具体情况，向知识分子、工商界、宗教界、民主党派、民主人士广泛地解释镇压反革命的完全必要，使他们赞同我们的方针。中央司法部长史良所写的《坚决正确镇压一切反革命活动》\"一文，写得很好，她是司法部长，又是民主人士，各地应注意利用此文说服那些存有错误思想的社会人士及胆怯的人们。将史良此文和中央的条例，彭真的报告及人民日报二月二十二日社论印成一本，广为传播，并组织党内外学习。"},{"type":"paragraph","text":"中央"},{"type":"paragraph","text":"二月二十八日[1]载于1951年2月24日《人民日报》。"},{"type":"paragraph","text":"[2]指政务院政治法律委员会副主任彭真1951年2月20日关于镇压反革命和惩治反革命条例给中央人民政府委员会所作的报告，载于1951年2月22日《人民日报》。"}],"authors":["毛泽东"],"dates":[{"year":1951,"month":2,"day":28}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":144,"page_end":144},"tags":[{"name":"毛泽东","type":"人物"},{"name":"彭真","type":"人物"},{"type":"文稿类型","name":"通讯"}]},{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中央关于向各界人士解释镇压反革命的必要性的电报","authors":["毛泽东"],"dates":[{"year":1951,"month":2,"day":28}],"is_range_date":false,"parts":[{"text":"中央关于向各界人士解释镇压反革命的必要性的电报","type":"title"},{"text":"毛泽东","type":"authors"},{"text":"各中央局，各大军区，并转分局，省委，大市委，区党委及各省军区：","type":"appellation"},{"text":"请注意利用中央政府发布惩治反革命条例的机会，结合当地反革命活动的具体情况，向知识分子、工商界、宗教界、民主党派、民主人士广泛地解释镇压反革命的完全必要，使他们赞同我们的方针。中央司法部长史良所写的《坚决正确镇压一切反革命活动》一文，写得很好，她是司法部长，又是民主人士，各地应注意利用此文说服那些存有错误思想的社会人士及胆怯的人们。将史良此文和中央的条例，彭真的报告及人民日报二月二十二日社论印成一本，广为传播，并组织党内外学习。","type":"paragraph"},{"text":" 中央二月二十八日","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e956d79c61"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html
