art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"首都百万青年学习毛主席著作","authors":[],"parts":[{"type":"paragraph","text":"据新华社17日讯 首都百万青年组成了成千上万的毛泽东著作学习小组、红旗读书会、东风读书会等读书组织，积极学习毛主席著作。他们一边学习，一边根据学习心得分析国际形势，研究工作中的矛盾和问题，从而推动了生产和学习的跃进。"},{"type":"paragraph","text":"最近，青年们普遍学习了毛主席著作中的“中国革命是世界革命的一部分”（新民主主义论）、“坏事能否变成好事”（关于正确处理人民内部矛盾的问题）、“战争的目的在于消灭战争”（中国革命战争的战略问题）、“矛盾诸方面的同一性和斗争性”（矛盾论）等理论问题。他们在学习过程中联系美英帝国主义侵略中东问题，热烈地讨论了国际形势，明确了战争同和平的关系，还进一步联系到自己的工作，并认识到伟大中国生产建设上的跃进在今天国际形势下的重大意义，认识到中国革命对于世界革命的伟大作用。"},{"type":"paragraph","text":"青年们学习毛主席著作时，他们不是孤立地、静止地、脱离实际地学习，而是从生产实际出发，经过学习理论，解放思想，然后又回到生产中去，发展生产。北京人民印刷厂制版车间有些工人以前常埋怨生产条件比不上美术印刷厂和税务总局的印刷厂，因而安于现状，没有能发挥技术革新的干劲。他们在学习毛主席的“矛盾论”、“介绍一个合作社”文章以后，他们都感到以前的想法是错了，提出要努力发挥主观能动性的作用，主动地改进和创造条件。大伙在“赶美术，超税务总局”的口号鼓舞下，边学习边搞技术革新，苦战一周，平均每人提出了一百五十四项建议。有的建议已经在生产中起到了作用。"}],"alias":""},"tags":[{"name":"人民内部矛盾","type":"主题/事件"},{"name":"世界形势","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8a0a3258ab"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
