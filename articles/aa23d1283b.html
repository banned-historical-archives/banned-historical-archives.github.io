ical-archives/banned-historical-archives8/main/maoquanji21.pdf"],"article":{"title":"准备攻取宁武等城","alias":"","parts":[{"type":"paragraph","text":"准备攻取宁武等城！"},{"type":"paragraph","text":"（1946年6月20日）贺、李："},{"type":"paragraph","text":"（一）占领朔县及轩岗镇甚慰。（二）望即攻取宁武，事先充分准备，然后一举攻克。（三）待宁武占领后，再考虑对县、代县、繁峙、山阴、岱岳等处逐一攻取之。（四）在打这些城市中，锻炼出一支善于攻城的队伍来。（五）对傅作义\"及大同、口泉、怀仁仍不要惊动。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"已号"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军委起草的给晋绥军区司令员贺龙和政治委员李井泉的电报。"},{"type":"paragraph","text":"[2]轩岗镇，位于山西原平县西北。"},{"type":"paragraph","text":"[3]醇县，旧县名，1958年撤销，部分划归山西宁武县，部分与代县合并为山西原平县。"},{"type":"paragraph","text":"[4]山阴，指山阴城，位于山西山阴县南部。岱岳，镇名，今为山西山阴县县治。"},{"type":"paragraph","text":"[5]傅作义，当时任国民党军第十二战区司令长官。"}],"authors":["毛泽东"],"dates":[{"year":1946,"month":6,"day":20}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":400,"page_end":400},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"aa23d1283b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
