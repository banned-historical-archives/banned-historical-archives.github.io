authors":[],"dates":[{"year":1967,"month":2,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"意共（马列）向党员和劳动人民发出号召"},{"type":"paragraph","text":"宣传中国文化大革命　揭穿帝修反无耻谎言"},{"type":"paragraph","text":"据新华社二十三日讯　罗马消息：意大利共产党（马克思列宁主义）最近在一项号召书中，欢呼中国无产阶级文化大革命取得的巨大胜利，热情称颂毛主席是“国际无产阶级的导师”，并且号召党员把宣传中国的无产阶级文化大革命作为一项刻不容缓的任务。"},{"type":"paragraph","text":"这个刊登在十八日出版的《新团结报》上的意大利共产党（马克思列宁主义）中央委员会的号召书说：“中国的无产阶级文化大革命正以雷霆万钧之势向前发展。它的胜利，不仅对中国人民来说，而且对于全人类来说，都是一个伟大和积极的事件。中国的革命为世界革命最广泛和迅速的发展打下了基础。”"},{"type":"paragraph","text":"号召书指出，“真正的共产党员、马克思列宁主义者、广大的革命人民都为此而欢欣鼓舞”，而“帝国主义者、反动派、资产阶级和修正主义者却为此而恼怒”。"},{"type":"paragraph","text":"号召书接着指出，尽管帝国主义者、反动派和以苏共领导为中心的现代修正主义者对毛主席和中国的无产阶级文化大革命进行无耻的诽谤和攻击，但是，“毛主席的威望和无产阶级文化大革命的声誉却越来越高”。"},{"type":"paragraph","text":"号召书揭露了苏联修正主义领导集团出卖越南人民利益的叛徒嘴脸。号召书说，苏联领导人阴谋瓦解越南人民的斗争意志，支持美国的“和谈”骗局。波德戈尔内前往教廷向罗马教皇致意，这不仅对一个马克思列宁主义者来说，是闻所未闻的事，就是对于一切正直的劳动人民来说，也是闻所未闻的事。"},{"type":"paragraph","text":"号召书热情地称颂毛主席的伟大功勋和毛泽东思想的伟大光辉。"},{"type":"paragraph","text":"号召书说，中国共产党和七亿中国人民的可靠舵手、国际无产阶级的导师毛泽东同志，越来越受到各国人民的崇敬和爱戴。修正主义者害怕毛泽东思想。"},{"type":"paragraph","text":"号召书指出：毛泽东思想对马克思列宁主义的创造性发展、对辩证唯物主义和历史唯物主义的科学理论，作出了巨大的贡献。"},{"type":"paragraph","text":"号召书最后呼吁意大利共产党（马克思列宁主义）的党员和意大利劳动人民团结起来，揭露帝国主义者、反动派和现代修正主义者的反华宣传，并且指出，刻不容缓的任务是，宣传中国的无产阶级文化大革命，从中吸取教益，以便更加坚定地高举意大利社会主义革命的红旗奋勇前进。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9773148413"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
