ical-archives/banned-historical-archives8/main/maoquanji16.pdf"],"article":{"title":"配合国民党军作战争取时局好转","alias":"","parts":[{"type":"paragraph","text":"配合国民党军作战争取时局好转！]"},{"type":"paragraph","text":"（1941年9月9日）彭、左、罗，陈、刘，陈、罗凹"},{"type":"paragraph","text":"敌攻湘北，又犯郑、洛，国民党正集中力量抗敌，我八路新四各部应向各重要交通线予以可能的袭击，配合国民党之作战。同时对国民党敌后各部应停止任何攻击性行动，仅在彼方举行攻击时取防卫手段。同时并向国民党各部发出通知，要求配合对敌。所有上述方针，其目的都为争取时局好转。"},{"type":"paragraph","text":"毛朱王叶"},{"type":"paragraph","text":"九月九日.[1]这是毛泽东和朱德、中共中央军委副主席王稼祥和军委参谋长叶剑英给彭德怀、八路军副参谋长左权和八路军野战政治部主任罗瑞卿等的电报。"},{"type":"paragraph","text":"[2]陈、刘，指新四军代军长陈毅和刘少奇。陈、罗，指陈光、罗荣"}],"authors":["毛泽东"],"dates":[{"year":1941,"month":9,"day":9}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":225,"page_end":225},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"091bf994b8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
