ical-archives/banned-historical-archives8/main/maoquanji15.pdf"],"article":{"title":"关于政治上、军事上准备全面反攻致周恩来、叶剑英电","alias":"","parts":[{"type":"paragraph","text":"关于政治上、军事上准备全面反攻"},{"type":"paragraph","text":"致周恩来、叶剑英电！"},{"type":"paragraph","text":"（1941年1月15日）（一）蒋介石一切仁义道德都是鬼话，千万不要置信。"},{"type":"paragraph","text":"（二）中央决定发动政治上的全面反攻，军事上准备一切必要力量粉碎其进攻。"},{"type":"paragraph","text":"（三）中间派孙、冯等调和退让论是有害的，只有猛烈坚决地全面反攻，方能打退蒋介石的挑畔与进攻，必须不怕决裂，猛烈反击之，我们“佳电”的温和态度须立即终结。"},{"type":"paragraph","text":"（四）顾祝同称“新四军在各地之办事处、通迅处、留守处、仓库、修械所及一切非法组织一律封闭，武装解除，人员扣留”等语，令上官云相执行，上官此次消灭叶、项是很坚决的。"},{"type":"paragraph","text":"（五）上官云相元未称：“鹿角山、东流山、凤里溪、李村一带之匪，元日被我击毙俘虏者共七千余人，残匪千余仍在原地挣扎，限于十四日午后一时前，彻底肃清。”"},{"type":"paragraph","text":"[1]这是毛泽东关于政治上、军事上准备全面反攻致周恩来、叶剑英"}],"authors":["毛泽东"],"dates":[{"year":1941,"month":1,"day":15}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":356,"page_end":356},"tags":[{"name":"周恩来","type":"人物"},{"name":"叶剑英","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dfb970d57b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
