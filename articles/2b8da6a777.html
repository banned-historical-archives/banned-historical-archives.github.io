ical-archives/banned-historical-archives8/main/maoquanji12.pdf"],"article":{"title":"在边区国防教育会第一次代表大会开幕典礼上的讲话","alias":"","parts":[{"type":"paragraph","text":"在边区国防教育会第一次代表大会"},{"type":"paragraph","text":"开幕典礼上的讲话"},{"type":"paragraph","text":"（1938年4月11日）"},{"type":"paragraph","text":"我们的民族是一个缺乏教育的民族，但抗战已大大地改变了中国人，这是几十年的教育所不能成功的，如果抗战再坚持下去，还会造就千百万的新人。我想：今天在座诸君一定可以看到由这些新人所组织起来的独立自由和幸福的新中国之实现，抗战对我们既有这样大的帮助，那末我们就应该用全力来应付抗战，用教育来支持抗战，目前的抗战是规定一切的东西，我们的教育也要听抗战的命令，这就叫做抗战教育。抗战教育不是强迫的，而是自发的，它依靠着群众或学生的学习热忱和教育干部的积极性。并且需要把教育者与被教育者亲密的联系起来。"}],"authors":["毛泽东"],"dates":[{"year":1938,"month":4,"day":11}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":149,"page_end":149},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2b8da6a777"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
