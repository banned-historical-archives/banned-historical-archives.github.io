  徐向前陪同贵宾参观故宫和文化大革命期间出土的历史文物","authors":[],"dates":[{"year":1974,"month":5,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"桑戈尔总统参观北京大学和故宫"},{"type":"paragraph","text":"吴德何英陪同贵宾参观北大受到学校负责人和学员热烈欢迎"},{"type":"paragraph","text":"徐向前陪同贵宾参观故宫和文化大革命期间出土的历史文物"},{"type":"paragraph","text":"新华社一九七四年五月八日讯　桑戈尔总统和其他塞内加尔贵宾在北京市革命委员会主任吴德和外交部副部长何英陪同下，今天下午参观了北京大学，受到学校负责人和工农兵学员的热烈欢迎。"},{"type":"paragraph","text":"北京大学校园里今天洋溢着中、塞两国人民团结友好的气氛。桑戈尔总统听了有关这个学校教育革命的情况介绍以后，又前往西方语言系法语专业教室参观。贵宾们来到时，学生们正在用法语讨论《人民日报》为联合国大会第六届特别会议召开而发表的社论《坚决支持第三世界的正义要求》。一位学员谈到特别会议的情况，热情赞扬了塞内加尔政府和人民对这次会议的支持。这时，教室里响起了热烈的掌声。桑戈尔总统还参观了这个学校的历史系考古专业教学标本陈列室和校办制药厂，观看了工农兵学员演出的文艺节目。"},{"type":"paragraph","text":"今天上午，桑戈尔总统和夫人由人大常委会副委员长徐向前陪同，参观了故宫博物院和无产阶级文化大革命期间出土的历史文物。（附图片）"},{"type":"paragraph","text":"桑戈尔总统和其他塞内加尔贵宾由吴德主任等陪同，五月八日下午参观了北京大学。"},{"type":"paragraph","text":"这是在校办制药厂参观。新华社记者摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"吴德","type":"人物"},{"name":"徐向前","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"教育革命","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9bcadec588"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
