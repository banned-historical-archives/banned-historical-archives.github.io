ical-archives/banned-historical-archives0/main/maoquanji31.pdf"],"article":{"title":"转发北京市打虎经验的批语","alias":"","parts":[{"type":"paragraph","text":"转发华东军区党委关于打虎预算报告的批语"},{"type":"paragraph","text":"（1952年1月30日）各大军区，志愿军，并各中央局："},{"type":"paragraph","text":"华东军区一月二十九日规定打虎预算\"的精神很好，发给你们参考。一个大军区不会只有两百多个大老虎，但第一次规定这样一个数目是适当的，以后可以根据认识的深入逐步追加打虎任务。中央一级十二万人，清出贪污分子一万人（百分之八十以上是一百万元以下的小贪污分子，一般须从轻处理），已经清出或准备清出的大老虎四百只，这是经过多次严格督促、不断追加任务才达成的奋斗目标。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一月三十日"},{"type":"paragraph","text":"[1]中共华东军区委员会1952年1月29日给各级党委和首长并报毛泽东、华东局的报告规定了华东各部队打虎的预算，预计华东部队在打虎阶段总共要打出大老虎266个，小老虎865个，中小贪污分子86850人。"}],"authors":["毛泽东"],"dates":[{"year":1952,"month":1,"day":28}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":312,"page_end":312},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"726984ff88"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
