发言提纲的批语和修改","authors":["毛泽东"],"dates":[{"year":1954,"month":2,"day":28}],"is_range_date":false,"parts":[{"text":"毛泽东对周恩来在高岗问题座谈会上的发言提纲的批语和修改","type":"title"},{"text":"毛泽东","type":"authors"},{"text":"一","type":"subtitle"},{"text":"少奇同志，并书记处各同志：","type":"appellation"},{"text":"恩来同志二月二十五日的发言提纲经胡乔木、陈伯达二同志作了一些修改，我同意这些修改，请你们考虑酌定。","type":"paragraph"},{"text":" 毛泽东一九五四年二月二十八日","type":"paragraph"},{"text":"二","type":"subtitle"},{"text":"[在长期的革命斗争中，高岗虽有其正确的有功于革命的一面，因而博得了党的信任，但他的个人主义思想（突出地表现于当顺利时骄傲自满，狂妄跋扈，而在不如意时，则患得患失，泄气动摇）和私生活的腐化欲长期没有得到纠正和制止，并且在全国胜利后更大大发展了，这就是他的黑暗的一面。]高岗的这种黑暗面的发展，使他一步一步地变成为资产阶级在我们党内的实际代理人。[高岗在最近时期的反党行为，就是他的黑暗面发展的必然结果，]同时也就是资产阶级在过渡时期企图分裂、破坏和腐化我们党的一种反映。","type":"paragraph"},{"text":"注：[  ]外为毛泽东加写或改写的文字。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"高岗","type":"人物"},{"type":"文稿类型","name":"发言"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fab414c049"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
