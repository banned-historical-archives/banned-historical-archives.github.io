art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"宁武县人武部给“窗口”单位松绑","authors":["原文革/聂国寿"],"parts":[{"type":"paragraph","text":"宁武县人武部给“窗口”单位松绑"},{"type":"paragraph","text":"本报讯原文革、聂国寿报道：山西省宁武县人武部一改过去两眼盯着“窗口”单位的做法，把抓基层的重点转移到小散远单位，使基层整体建设水平得到明显提高。"},{"type":"paragraph","text":"过去，宁武县人武部在抓基层建设中注重“窗口”单位，许多大项任务都集中到几个条件较好、交通方便的单位。这些单位接受检查验收频繁，经常处于超负荷状态，基层干部叫苦不迭。一些基础较差的小散远单位则被长期冷落。在今年大抓基层建设中，该人武部纠正以往的做法，既注重典型引路，更注重整体推进，为“窗口”单位砍掉高指标，给小散远单位压担子，并派机关干部定点帮扶，调动了小散远单位争先创优的积极性。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2ba5abdcfe"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
