],"dates":[{"year":1955,"month":11,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛泽东主席在10月29日下午邀集中华全国工商业联合会执行委员会的委员们，座谈关于如何更适当地进行私营工商业的社会主义的改造问题。中华全国工商业联合会主任委员陈叔通、副主任委员李烛尘、南汉宸、章乃器、许涤新、孟用潜、盛丕华、荣毅仁、陈经畲、黄长水、胡子昂、巩天民，以及现在齐集在北京开会的执行委员会的委员们应邀出席。"},{"type":"paragraph","text":"中共中央书记处书记刘少奇、周恩来、朱德、陈云，政治局委员康生、彭真、张闻天、彭德怀、邓小平以及现在北京的中共中央委员和候补委员出席了座谈会。"},{"type":"paragraph","text":"参加座谈会的还有:全国人民代表大会常务委员会副委员长李济深、沈钧儒、郭沫若、李维汉，国务院副总理贺龙、陈毅、李富春、李先念，中国人民政治协商会议全国委员会副主席何香凝、章伯钧，各民主党派、各人民团体、中央人民政府各部门和各企业单位的负责人等。"},{"type":"paragraph","text":"参加座谈会的共有五百多人。"},{"type":"paragraph","text":"毛泽东主席在座谈会上讲了话。会上讲话的还有周恩来、陈云、陈叔通、李烛尘、荣毅仁、黄长水、胡子昂、巩天民等。"},{"type":"paragraph","text":"——据新华社讯"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"陈云","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"adc775df7b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
