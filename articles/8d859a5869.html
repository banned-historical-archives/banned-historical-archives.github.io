ear":1993,"month":12,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社北京12月20日电　为纪念毛泽东同志诞辰一百周年，中国人民银行定于12月25日向海内外发行毛泽东诞辰一百周年纪念金银币一套。这套金银币各三枚，发行国外的为精制币，国内为普制币。金币正面图案分别为三十年代毛泽东头像和六十年代毛泽东视察祖国山河半身像；背面图案为延安宝塔和中南海新华门。银币正面图案分别为六十年代毛泽东头像和五十年代毛泽东在火车上办公时的坐像；背面图案与金币相同。"},{"type":"paragraph","text":"这套纪念币由中国上海造币厂铸造。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8d859a5869"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
