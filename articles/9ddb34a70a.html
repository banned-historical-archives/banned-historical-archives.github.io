al-archives/banned-historical-archives8/main/maoquanji8.pdf"],"article":{"title":"致王以哲、张学良电","alias":"","parts":[{"type":"paragraph","text":"致王以哲、张学良电"},{"type":"paragraph","text":"（1936年4月6日）王以哲兄，并转张学良先生勋鉴："},{"type":"paragraph","text":"甲、方代表周同志偕克农依约于八日赴肤施，与张学良先生会商救国大计，定七日由瓦窑堡启程，八日下午六时前到达肤施城东北二十里之川口，以待张学良先生派人至川口引导入城。关于入城以后之安全，请张学良先生妥为布置。"},{"type":"paragraph","text":"乙、双方会商之问题，方拟定为：1．停止一切内战，全国军队不分红白一致抗日救国问题；2.全国红军集中河北，首先抵御日帝迈进问题；3.组织国防政府抗日联军具体步骤及其政纲问题；4.联合苏联及先（选）派代表赴莫斯科问题；5.贵我双方订立互不侵犯及经济通商初步协定问题。丙、张学良先生有何提议，即祈预告为盼。"},{"type":"paragraph","text":"彭德怀毛泽东"},{"type":"paragraph","text":"鱼午"}],"authors":["毛泽东"],"dates":[{"year":1936,"month":4,"day":6}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":370,"page_end":370},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9ddb34a70a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
