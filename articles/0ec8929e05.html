<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"上海市革委会举行宴会热烈欢送叙利亚民间艺术团叙利亚朋友热情赞扬中国文化大革命","authors":[],"dates":[{"year":1968,"month":2,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　上海市革命委员会昨晚举行宴会，热烈欢送阿拉伯叙利亚共和国奥玛雅民间艺术团全体成员。"},{"type":"paragraph","text":"上海市革命委员会领导成员朱锡琪和奥玛雅民间艺术团团长优素福·沙克拉先后在宴会上讲话。"},{"type":"paragraph","text":"朱锡琪同志首先在宴会上敬祝世界革命人民心中最红最红的红太阳，我们最最敬爱的伟大领袖毛主席万寿无疆!万寿无疆!接着他代表上海市革命委员会和一千万上海人民为叙利亚朋友在上海，在中国访问演出获得的巨大成功，致以热烈的祝贺。"},{"type":"paragraph","text":"他说，奥玛雅艺术团这次来华访问，虽然时间不长，但是，对于进一步增进我们中叙两国人民之间的相互了解和友谊，已经作出了可贵的贡献。从你们演出的歌舞中，我们更加增强这样一个信念，那就是:阿拉伯民族是伟大的民族，阿拉伯人民是英雄的人民。美帝国主义及其走狗以色列的任何侵略、威胁或军事挑衅，必将遭到彻底的粉碎，最后胜利一定属于英雄的阿拉伯人民、叙利亚人民!"},{"type":"paragraph","text":"他说，用毛泽东思想武装起来的七亿中国人民，包括我们一千万上海人民在内，坚决站在阿拉伯人民一边。我们将永远是你们忠实可靠的反帝战友，将永远支持你们的一切正义斗争!"},{"type":"paragraph","text":"叙利亚奥玛雅民间艺术团团长优素福·沙克拉在席间发表了热情的讲话。他说，通过参观访问，增加了我们无比的信心与信念:要使我们获得解放，只有进行人民战争，才能创造我们的未来。他高度赞扬了一月革命的发源地上海的无产阶级文化大革命的成就。他说，在你们的国家我们看到了无产阶级文化大革命的确是毛主席创造的伟大奇迹，你们的无产阶级文化大革命不仅关系到中国而且影响到全世界。因为，这是当代的伟大创举。整个人类都在受到影响。"},{"type":"paragraph","text":"阿拉伯叙利亚共和国驻华大使萨迪克和夫人应邀出席了宴会。萨迪克大使也在宴会上讲了话。"},{"type":"paragraph","text":"出席宴会的还有对外友协上海分会负责人及本市无产阶级革命派代表。"},{"type":"paragraph","text":"阿拉伯叙利亚共和国奥玛雅民间艺术团结束了在华的访问演出，于今日离沪回国。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"人民战争","type":"主题/事件"},{"name":"一月革命","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0ec8929e05"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
