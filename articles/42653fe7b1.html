al-archives/banned-historical-archives8/main/maoquanji6.pdf"],"article":{"title":"为夏耕运动给各级苏维埃负责人的信","alias":"","parts":[{"type":"paragraph","text":"为夏耕运动给各级苏维埃负责人的信"},{"type":"paragraph","text":"（1933年4月22日）省苏县苏区苏的主席团及土地部长、乡苏的主席及全体代表同志们："},{"type":"paragraph","text":"春耕已过去了。有些地方虽然得到了好的成绩，但许多地方的成绩是非常之差的。严重的情形是政府主席团忽视春耕，土地部对春耕怠工，尤其是动员的方式脱离了群众。现在夏耕已到，转眼就是秋收，如果你们再不努力，不立即改变春耕中所犯错误，不大家拿出战斗精神来对付夏耕，那么，为了群众利益为了革命战争去增加二成收获的计划，就要受到极严重的影响了。因此中央土地部特为编了一个夏耕运动大纲（即《红色中华》发表的《怎样领导夏耕运动》）发给你们，在这个大纲中指出了夏耕的严重意义，夏耕的目的，夏耕的中心工作，与夏耕中动员群众的方式，其中特别指出瑞金武阳区的实例一在这里真正做到了“有组织的动员”，激发了农民群众空前高度的劳动热忱，得到了春耕的伟大成绩。你们接到这个大纲之后，要立即召集各种必要的会议（县苏主席土地部长召集各区主席土地部长开会，区苏及其土地部召集乡苏主席及贫农团主任开会，乡苏分别召集代表会，贫农团、妇女代表会、赤卫军、少先队、儿童团及乡村群众开会），解释大纲的要点，讨论本地的进行办法，立即将革命的夏耕战斗开展到所有红色农村中去。省苏不必召集县苏开会，但要根据此大纲而有具体活泼的指导。省对县县对区均要每月检查他们的工作一次。区对乡则每半月检查一次。中央土地部当于五月内派人分往各县对你们的夏耕成绩作第一次检查。夏耕任务的完成首先靠了你们正确而有力量的领导。同志们大家为了夏耕的全部胜利而奋斗呵！"},{"type":"paragraph","text":"临时中央政府主席毛泽东"},{"type":"paragraph","text":"副主席项英张国焘代土地人民委员胡海\""},{"type":"paragraph","text":"一九三三年四月二十二日[1]胡海（1901—1935)，江西吉安人。曾任中华苏维埃共和国临时中"}],"authors":["毛泽东"],"dates":[{"year":1933,"month":4,"day":22}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":261,"page_end":262},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"42653fe7b1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
