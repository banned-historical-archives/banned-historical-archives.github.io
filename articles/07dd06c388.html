art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"掀起学习毛主席著作的新高潮——热烈欢呼《毛泽东选集》第五卷出版","authors":[],"parts":[{"type":"paragraph","text":"春风，杨柳，红旗，笑脸……"},{"type":"paragraph","text":"各族人民载歌载舞喜迎红五卷："},{"type":"paragraph","text":"啊！高举和捍卫毛主席的伟大旗帜，"},{"type":"paragraph","text":"华主席是我们光辉的榜样、杰出的典范！"},{"type":"paragraph","text":"闯过刀山火海，顶过妖风迷雾！"},{"type":"paragraph","text":"靠的是马列主义、毛泽东思想作“主心骨”；"},{"type":"paragraph","text":"硬六连战士的眼睛多么明亮啊！"},{"type":"paragraph","text":"看！他手里正捧着毛主席的书……"},{"type":"paragraph","text":"难以抑制的高兴，难以描绘的笑容——"},{"type":"paragraph","text":"最心爱的书送到战士手中；"},{"type":"paragraph","text":"毛主席的著作是我们的粮食、武器、方向盘。"},{"type":"paragraph","text":"“雷锋班”的同志都象班长雷锋！"},{"type":"paragraph","text":"南海西沙，满旗高挂，难忘的时刻，节日般盛大……"},{"type":"paragraph","text":"反侵略反复辟的重任一肩挑起，"},{"type":"paragraph","text":"继承毛主席遗志，水兵何惧风吹浪打！"},{"type":"paragraph","text":"首都北京，毛主席纪念堂工地，基建工程兵，何等专心致志！"},{"type":"paragraph","text":"学习、施工都在高质量、高速度进行，以实际行动把“四人帮”狠揭猛批！"},{"type":"paragraph","text":"雄文到边疆，春满蒙古包！"},{"type":"paragraph","text":"巡逻归来的战士、民兵眉开眼笑："},{"type":"paragraph","text":"“我们要一代一代地传下去啊！毛主席的伟大旗帜是革命的传家宝……”"},{"type":"paragraph","text":"第一批宝书先发车场来，"},{"type":"paragraph","text":"坦克手雷鸣般地把巴掌拍：“让我们掀起一个学习的新高潮，"},{"type":"paragraph","text":"让我们展开一个学习的大竞赛！”"},{"type":"paragraph","text":"（本报通讯员、本报记者摄 辛冶配诗）"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"编纂《毛泽东选集》第五卷","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"07dd06c388"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
