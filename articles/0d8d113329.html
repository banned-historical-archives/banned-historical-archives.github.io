）","authors":[],"dates":[{"year":1971,"month":2,"day":21}],"is_range_date":false,"parts":[{"text":"中共中央关于扩大传达反党分子陈伯达问题的通知（概要）","type":"title"},{"text":"1971年2月19日，周恩来就结束全国计划会议一事致信毛泽东，汇报近日工作安排，毛在信上批示：“都同意。请告各地同志，开展批陈整风运动时，重点在批陈，其次才是整风。不要学军委座谈会，开了一个月，还根本不批陈。更不要学华北前期，批陈不痛不痒，如李、郑主持时期那样。”根据毛泽东批示精神，周恩来于2月20日主持中央政治局会议，讨论通过《关于扩大传达反党分子陈伯达问题的通知》。2月21日，《通知》下发。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"陈伯达","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"批陈整风","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0d8d113329"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
