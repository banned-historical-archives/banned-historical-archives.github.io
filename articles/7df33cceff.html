" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"浠水县望城乡农民卖粮后的情况","authors":[],"dates":[{"year":1953,"month":12,"day":9}],"is_range_date":false,"parts":[{"text":"浠水县望城乡农民卖粮后的情况","type":"title"},{"text":"【湖北分社九日讯】湖北省浠水县望城乡农民，已于本月初把二十八万多斤余粮卖给国家，超过分配任务三万多斤。农民卖粮后，阶级觉悟普遍提高，认清了旧道路不好，新道路好，更相信政府和靠拢政府了。不少人把卖粮的钱先还清政府的各项贷款和私人的借债，剩下的都存入银行和信用合作社。卖粮后，群众生产热情很高，迫切要求组织农业生产合作社，而且对冬季生产也抓得很紧。","type":"paragraph"},{"text":"以上是好的一方面，另方面还存在以下一些问题：","type":"paragraph"},{"text":"(1)有些人还有顾虑或不满情绪：中农虽把粮食卖了，但还怕露富。如一中农原来不打算买红薯吃，后来看见别人都买，他也买红薯吃；另一中农则以攻为守说：“我的粮食在合作社卖了，明年公家要再卖给我，不卖给我就不行！”实际上他家里还有很多稻谷。中农裴兴元卖了谷后，不满地说：“共产党不掌握政策，土地改革时把阶级成份划错(土地改革时划他为富农，是正确的，覆查后降为中农，群众很不满；但他仍认为土地改革时划错了)，卖粮食也不优待军属(他家里有人参军)！”中农朱国恩被群众摸着底，无话讲，卖了谷，但心中不满，故意说他的菜秧被人偷了，要干部去调查，干部说：不好调查。他就反问：“你怎么把人家家里(指他自己)的余粮都调查到了？”贫农主要是对粮食供应不放心，怕明年没米吃。","type":"paragraph"},{"text":"(2)对物价还有疑虑：刘全发到合作社问了许多东西的价钱，就是不买，说是怕涨价了；有一个农民到信用合作社存款，要把钱折成谷存，他说：“存钱不如存谷”。有些农民怕货物涨价，一次买了十斤油、十斤盐、十斤白面；有的则一次买了三十斤盐放在家里。","type":"paragraph"},{"text":"(3)有些人对社会主义认识还很模糊，他们说：群众都去到合作社买东西了，这一来把私商挤垮了，不就到了社会主义了吗!有些人认为社会主义好，但如何往社会主义走，思想还不明确。","type":"paragraph"},{"text":"(4)很多人对安排下一步生产尚存观望态度农民卖谷后的钱买生活日用品的多，添置生产资料的还很少(据说目前还不是时候)。对于余钱如何处理?有些人还拿不定主意。存在银行、信用合作社里怕使用不方便，放在家里又怕浪费。(崔葆章)","type":"paragraph"}],"comments":[],"origin":"1953年12月15日新华通讯社编《内部参考》。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7df33cceff"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
