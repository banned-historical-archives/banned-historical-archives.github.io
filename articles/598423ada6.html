ors":[],"dates":[{"year":1957,"month":1}],"is_range_date":false,"parts":[{"text":"毛泽东和袁水拍、臧克家的谈话(摘录)","type":"title"},{"text":"一","type":"subtitle"},{"text":"你们看，将来即使革命在全世界都得到胜利之后，会不会还有斗争？","type":"paragraph"},{"text":"(答：说不上来。)","type":"paragraph"},{"text":"我看是会有的，领导与被领导(群众)之间，总是会有矛盾斗争的。不过斗争的武器不是枪杆子，而是笔杆子，在墙上写大字报。","type":"paragraph"},{"text":"二","type":"subtitle"},{"text":"我自己写一点旧体诗词。象词，很短小，这种形式运用起来方便，也就熟悉了。他们给我弄了一部“诗综”，我看李攀龙的诗，有的很好。杜甫的诗，有好的，大多数并不怎么样。","type":"paragraph"},{"text":"三","type":"subtitle"},{"text":"民歌最早是四言的多，象《诗经》，后来发展成五、七言，现在七言的比较多。","type":"paragraph"},{"text":"我看新诗应该写得“精炼，大体整齐，押大体相近的韵”，可以专为新诗编一部《新诗韵》。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"598423ada6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
