es":[{"year":1949,"month":7,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"平遥等县贸易工作右倾"},{"type":"paragraph","text":"助长私商投机国家人民受害"},{"type":"paragraph","text":"【太原电】太原区三专署区国营贸易部门中，空买私商粮棉，盲目扶植私营棉织业，致造成助长私商投机倒把的严重恶果，平遥贸易公司（下称丰华茂商店）怕麻烦、脱秤、出脚价，经常有粮四十万斤存放私商处。其中，许多投机商人以打存条向贸易公司空卖粮食，骗取国家巨款，大作买空卖空的破坏活动。平遥私营同义货栈从三月到六月先后空卖给丰华茂商店棉花十万斤，该货栈取款后乘机倒贩，一次即获利一百万元以上。有些私商往往向乡村低价购粮，交粮时却又不按原订标准交粮。在与私营棉织工厂订立合同贷纱扶植上，缺乏调查研究，盲目性极大，榆次贸易分公司曾以可织三十五匹洋布的纱贷给私人同兴工厂，却被充作投机倒贩资本，结果失败，未能按期交布，工厂停顿，工人失业。丰华茂自四月份起，普遍与平遥各私营工厂订立合同以纱换布，每台机经常贷给底纱八块（每块七斤半），迄六月止，共贷二千四百四十块纱；但因发放没重点，不调查，不仅未起了带动私资的作用，许多资方反而誊出资本进行商业投机，这样既削弱了国营经济的领导作用，又助长了物价上涨。造成以上严重错误的原因，主要是贸易工作人员对党的城市政策认识不明确，在完成供应任务时，存在有单纯任务观点，盲目的依靠私商，而对公营商店则缺乏组织与领导，不能在市场上起领导作用。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"99b239bd98"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
