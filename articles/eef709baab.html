,"dates":[{"year":1998,"month":11,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报北京11月24日专电　　(驻京记者吴娟)一本55万字的《茅以昇桥话》在京刚出版，即引起学术界的关注，这本书将有关桥的资料汇集一体，是由“桥梁泰斗”茅以昇先生的9本手抄本转化而来。"},{"type":"paragraph","text":"记者在京见到了厚厚的9大本手抄本，它由粗糙的方格纸精心装订而成，纸上誊写的蝇头小楷极其工整，书脊上还写着“桥话”两字。据茅老的女儿介绍，茅老酷爱文学，阅读面很广，从五十年代起他就开始摘抄古诗词中有关桥梁的诗句，六十年代他拟写了一个庞大的有关桥梁文章的出版计划，文革中他抓紧时间，邀几位老友天天跑图书馆，从浩瀚的古文献中抄摘了自汉魏六朝至清朝以古桥为内容的数十万字资料，整理成“桥典”、“桥景”、“桥文”、“桥名”等几大部分，亲手装订成册，设计封面。日积月累达数十万字。这套手抄本一直放在茅老家中的书柜里，一直到1996年茅以昇先生百年诞辰之际，他的母校西南交通大学校长胡正民了解了这一情况，有关方面才促成了这本书的出版。"},{"type":"paragraph","text":"据悉，茅以昇先生在六十年代提出了“桥文化”的观点，并发表了大量有关桥的科普文章，其中《石拱桥》一文被收入中学课本。《桥话》的出版，丰富了茅老有关桥文化的观点和设想。遗憾的是，茅老谢世前尚未完成《桥话》的全部编撰，尤其是港、澳、台和东北等地的古桥资料的收集，有待有志之士进一步收集整理。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"eef709baab"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
