" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"交大西安部分出現反动标語","authors":[],"dates":[{"year":1957,"month":6,"day":12}],"is_range_date":false,"parts":[{"text":"交大西安部分出现反动标语","type":"title"},{"text":"新华社西安12日电   交通大学西安部分出现辱駡共产党的反动标语和言论。","type":"paragraph"},{"text":"11日发现的一张贴在一个自修敎室的反动标语写道：“打倒毛贼东，建立‘自由中国’”在校内厕所、走廊、敎室内又分别发现了“‘猪’，‘毛’喽喽！共产党员若不允返沪，请当心！”、“推翻共产党、打回老家去！”、“打倒共产党，毛主席逝世”、“共产党员混蛋”等好几张反动标语。","type":"paragraph"},{"text":"目前，交大西安部分校方已将部分反动标语公布，许多敎员和学生为此出了大字报，对上述情况表示愤慨，要求大家正常进行迁校问题的讨论，但必须提高警惕。（孙传镐）","type":"paragraph"},{"text":"来源：新华通讯社编：《内部参考》，第2230期，1957年6月14日。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b93f197a60"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
