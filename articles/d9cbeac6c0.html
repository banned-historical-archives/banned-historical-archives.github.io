示","authors":[],"dates":[{"year":1950,"month":12,"day":20}],"is_range_date":false,"parts":[{"text":"中央关于中南局彻底完成土改计划的批示","type":"title"},{"text":"我们基本上同意你们发这样一个指示，着重纠正土改中的右倾偏向，以便发动广大群众进行土地改革。但在指示中还应增加一些防止左倾危险的指示，指出那些左的错误是不许再犯的。例如：侵犯中农利益，忽视联合中农的重要性，破坏富农经济，对地主普遍地扫地出门，乱打乱杀；在工作方式上的强迫命令，大轰大嗡等。如此，才能一方面既放手发动群众；另一方面又不犯或少犯左的错误。否则，某些干部很可能重犯过去某些左的错误。在土改试点中有些好的经验，望你们选择二三个乡的经验，系统地加以总结，写出全部过程予以发表，要各地学习和仿效。另选一、二个乡的坏经验，加以系统的批判，亦予以发表，要各地防止和避免。这样的指导方法是最具体最有效的。望你们注意采取。","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d9cbeac6c0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
