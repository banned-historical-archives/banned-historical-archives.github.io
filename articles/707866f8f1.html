957,"month":6,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"奴隶成了凉山的主人"},{"type":"paragraph","text":"据新华社讯　四川凉山彝族自治州彝族人民的生活正在日新月异的变化着。自1955年底，共产党和人民政府在这里采用和平协商方式进行民主改革后，彝族人民开始走向他们山歌里所幻想的生活。政府贷款为他们建造新居，发给他们生产工具，帮助他们组织合作社。从此，这里的彝族人民结束了奴隶制度给予他们的非人生活，被解放了的奴隶作了凉山的主人。他们有自己的土地，有自己的生产工具；他们脱下了标志奴隶生活的破不遮体的衣服，女人穿上红裙，男人有了新装。这里也出现了从未有过的现象，奴隶的孩子也背上书包上学校了；结成夫妇的年青人，再也不怕奴隶生活拆散他们的婚姻。下图就是彝族人民解放前后生活的对照。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"707866f8f1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
