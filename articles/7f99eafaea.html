script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"上海电视台今晚举行《坚持文艺革命，反击右倾翻案风》电视批判会","authors":[],"dates":[{"year":1976,"month":3,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　近日来，上海广大革命文艺战士，认真学习无产阶级专政理论，学习毛主席关于无产阶级文化大革命的一系列指示，以马克思主义、列宁主义、毛泽东思想为武器，用大量无可辩驳的事实，对右倾翻案风展开回击。为此，上海电视台定于今日晚上六点半，邀请上海京剧团、上海市舞蹈学校、上海电影厂《春苗》创作组、上海市淮剧团、上海市沪剧团、上海市越剧团、上海戏剧学院等单位部分革命文艺工作者，举行《坚持文艺革命，反击右倾翻案风》电视批判会。欢迎同志们到时收看。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7f99eafaea"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
