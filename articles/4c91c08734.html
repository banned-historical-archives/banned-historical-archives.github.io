" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"毛泽东转发饶漱石关于华东各地三反斗争情况的报告的批语","authors":["毛泽东"],"dates":[{"year":1952,"month":1,"day":13}],"is_range_date":false,"parts":[{"text":"毛泽东转发饶漱石关于华东各地三反斗争情况的报告的批语","type":"title"},{"text":"毛泽东","type":"authors"},{"text":"各中央局，并转分局、省市区党委；各大军区，志愿军：","type":"appellation"},{"text":"（一）饶漱石同志一月十日的报告很好，所提各项意见都是正确的，各地都可采用。（二）机关生产在三反斗争中已名誉扫地，很多机关要求立即交出，但由政府马上接收还有困难，在目前几个月内仍应责成原机关负责管理，并不得抽动任何人员和财产，听候政府处置。这就是“管而不动，听候命令”的方针。（三）华东向资产阶级作斗争的办法很好，北京天津也是这样做的，请各大中小城市都照这样做。对于一切犯法的资本家，无例外地均应抓住其小辫子，分别轻重大小，予以不同的惩治或批判。一部分罪大恶极者，没收其资产。这是人民政府在全国胜利后第一次大规模惩治资产阶级的犯法行为，这是完全必要的。请你们依据当地具体情况，精密地组织这一场斗争。在斗争中注意组织三反的统一战线，酌情照顾民主人士。","type":"paragraph"},{"text":" 毛泽东一月十三日","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"饶漱石","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4c91c08734"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
