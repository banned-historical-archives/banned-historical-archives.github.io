" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共中央关于县、区、乡三级暂不进行“三反”“五反”的指示","authors":[],"dates":[{"year":1952,"month":2,"day":24}],"is_range_date":false,"parts":[{"text":"中共中央关于县、区、乡三级暂不进行“三反”“五反”的指示","type":"title"},{"text":"（一）县区乡三级的“三反”，除省委地委为了典型试验之目的，可以个别地进行以外，一律待春耕完成以后再做，以免引起混乱。此点前已通知。","type":"paragraph"},{"text":"（二）县区乡某些违法资本家中的“五反”，目前一律不要进行。已进行者，一律停止。将来何时进行及如何进行，中央将根据情况另行通知。","type":"paragraph"},{"text":"（三）中等城市例如四平街、营口、石家庄、新乡、苏州、宁波、宜昌、衡州、江门、梧州、宝鸡、汉中、自流井、遵义等的违法资本家中何时进行“五反”及如何进行“五反”，须由各中央局、分局、省委、区党委，根据中央二月十五日指示，严格审查控制，逐一批准，以免混乱。","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"10bfb0e43e"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
