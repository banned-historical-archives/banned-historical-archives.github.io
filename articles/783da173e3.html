thors":[],"dates":[{"year":1953,"month":5,"day":7}],"is_range_date":false,"parts":[{"text":"海南岛少数民族区春荒严重","type":"title"},{"text":"【广东分社讯】海南少数民族区春荒相当严重。目前黎族、苗族自治区、白沙县的饥饿人口已达百分之四十至六十，有些乡村还达百分之八十到一百；其次为琼中县，估计需急救和待救人全占百分之四十到五十；其余保亭、东方、乐东三县也有程度较轻的灾荒。灾情原因是去年几次刮风，又加亢旱，各种作物受损。去年冬耕虽有收成，但群众纳了粮还了债家无余粮；公粮负担没有贯彻依法减免，土特产因运销不便而滞销。","type":"paragraph"},{"text":"对少数民族地区的春荒问题，海南行署已重视，三月间即曾派调查组到白沙、琼中、东方等县调查，并发了急救款五亿三千万元，最近并成立了海南生产救灾委员会，省府拨去的社会救济粮款亦已分拨到县。(冯子平)","type":"paragraph"}],"comments":[],"origin":"1953年5月7日新华通讯社编《内部参考》。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"783da173e3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
