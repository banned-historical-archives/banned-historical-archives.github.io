,"dates":[{"year":1966,"month":12,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社摩加迪沙电　索马里一位教师最近在这里写信给中国红卫兵说:毛主席领导下的红卫兵们，我们祝贺你们“为了保卫革命成果而采取的每一个革命行动”。"},{"type":"paragraph","text":"这位教师写的信说:“我们同你们站在一条阵线上，坚决反对帝国主义、殖民主义、反动派和美帝国主义的帮凶现代修正主义。”"},{"type":"paragraph","text":"信中说:“我们祝你们在无产阶级文化革命中取得完全胜利。这场革命，创造了新的经验，我们从中学会了如何维护独立和胜利果实，如何支持各国人民的斗争，如何在毛泽东的教导下奋勇前进。”"},{"type":"paragraph","text":"这封信接着说:在这场文化革命中，你们彻底地揭露了帝国主义、修正主义和反动派的一切罪恶阴谋。通过开展这场革命，你们的国家就不会落到反动派和修正主义分子手里，就不会发生资本主义复辟。"},{"type":"paragraph","text":"信中在谈到帝国主义对文化大革命的诬蔑和诽谤时说:“修正主义者也参加了西方宣传的大合唱。但是，我们亲眼看到的以及非洲和亚洲各国人民都知道的种种事实，已经百分之百地驳斥了他们的无稽谣言。”"},{"type":"paragraph","text":"这封信指出，帝国主义者和修正主义者攻击中国和中国的文化大革命，是因为这场革命把他们吓得发抖，因为“北京是世界被压迫人民的一切革命力量的心脏。”"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"58361af6cc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
