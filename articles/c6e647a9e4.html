hors":[],"dates":[{"year":1973,"month":7,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京一九七三年七月二十日电　中共中央政治局常委、国务院总理周恩来，中共中央政治局委员姚文元，今天下午会见了越南劳动党中央候补委员、越南《人民报》总编辑黄松和由他率领的越南《人民报》代表团全体团员，同他们进行了十分亲切友好的谈话。"},{"type":"paragraph","text":"参加会见的代表团团员有:《人民报》国际部主任光泰，《人民报》驻北京记者黎思荣，《人民报》记者武慧琼。"},{"type":"paragraph","text":"越南民主共和国驻中国大使馆临时代办阮进，越南南方共和驻中国大使阮文广，越南南方解放通讯社驻北京记者黎春和，也参加了会见。"},{"type":"paragraph","text":"会见时在座的有，中共中央候补委员、国务院文化组秘书长石少华，中共中央对外联络部负责人申健，《人民日报》负责人鲁瑛、陈浚、潘非，外交部新闻司副司长肖特，以及张德维、胡乾文等。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"姚文元","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c6e647a9e4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
