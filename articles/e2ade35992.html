art":6,"page_end":6,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"读《毛泽东战争动员思想概论》有感","authors":["袁和平李云龙"],"parts":[{"type":"paragraph","text":"由韩永录任主编，郝维品、张秀山任副主编的《毛泽东战争动员思想概论》，已由军事科学出版社出版发行。"},{"type":"paragraph","text":"毛泽东战争动员思想，是毛泽东军事思想的重要组成部分，是毛泽东人民战争思想的精髓。它产生于中国革命战争的伟大实践，同时又为中国革命战争实践提供了正确的理论指导。在长期艰苦卓绝的中国革命战争实践中，以毛泽东为代表的中国共产党人，把马克思列宁主义的普遍原理和中国革命的具体实践相结合，汲取人民战争中战争动员实践的宝贵经验和人民群众的智慧，博采古今中外战争动员思想之精华，把唯物史观彻底运用于军事领域，创立了具有中国特色的无产阶级战争动员的科学理论——毛泽东战争动员思想。毛泽东战争动员思想内容十分丰富，是一个博大精深的科学理论体系。它所包含的科学思想和理论，是我军总结战争动员历史经验，指导未来战争动员工作的强大思想武器。革命战争年代，它产生了无坚不摧的伟大力量，取得了辉煌业绩。今天，它作为战争动员实践活动的先导，仍然在马克思主义战争动员理论宝库中放射出灿烂的真理之光。"},{"type":"paragraph","text":"随着时代的进步，科学技术的不断发展，战争进入了高技术时代。在未来高技术局部战争中，战争动员面临着许多新问题和新挑战，时代已经向我们提出了新的要求，要求我们认真研究和探讨现代条件下的人民战争动员，赋予毛泽东战争动员思想以新的内容，以适应维护国家安全和打赢未来高技术局部战争的需要。所以，我们要认真研究历史上战争动员理论，尤其要研究中国人民进行人民战争的动员理论——毛泽东战争动员思想，从中找出一些规律性的东西，并与当今和未来一个时期内可能面临的战争实际结合起来。"},{"type":"paragraph","text":"《毛泽东战争动员思想概论》一书，涉及到毛泽东战争动员思想的各个方面，既对毛泽东战争动员思想的内涵、特征、历史地位、发展历程作了理论上的阐述，又对其基本理论和基本内容作了理论概括。尤其是对现代高技术局部战争条件下战争动员遇到的一些新情况、新问题作了积极的探索，对新形势下继承和发展毛泽东战争思想作了初步解答。同时，阐述了新时期邓小平同志对毛泽东战争动员思想的发展，为我们做好现代条件下特别是高技术条件下局部战争动员准备，提供了新的经验和科学的方法。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"人民战争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e2ade35992"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
