户","authors":["唐祖蓉","新华通讯社"],"dates":[{"year":1962,"month":11,"day":9}],"is_range_date":false,"parts":[{"text":"重庆市市中心区自由市场开放后出现一些暴发户","type":"title"},{"text":"新华通讯社唐祖蓉","type":"authors"},{"text":"新华社重庆讯  重庆市市中心区自开放自由市场以来，已出现了一些暴发户。这些人利用开放自由市场的机会，大搞投机违法活动，在短短的两三个月中就获得几千元到一万元以上的暴利。","type":"paragraph"},{"text":"在这些暴发户中，多半是解放前的投机商人。大阳沟菜市场(市中心大的菜市场)搞蔬菜投机活动的谬廖清云，解放前是个菜把头。今年9月，他趁市场管理有些放松的机会，一面与人搞蔬菜投机生意，一面与外地投机商相勾结，贩卖豆粉、黄花、花葫椒等乾副食品，进行黑市交易。到10月中旬仅仅四十七天，就获得暴利六千二百余元。解放前一贯贩卖鸡鸭的投机商刘世云，最近他雇了两个工人，从农村买回大批鸡、鸭。他除出卖鸡、鸭肉外，还将大批鸡毛、鸭毛等卖给畜产公司，并将从公司得到的奖售物资，拿来做投机买卖。到现在为止，他已获得暴利四千七百余元，白糖六百多斤，购货券一百余张。贩卖干副食品的摊贩吴云清，从7月开始，以四十元起家，通过大搞转手买卖，套购国家物资，克扣斤两等手段，牟取暴利达一万元以上。","type":"paragraph"},{"text":"在这些暴发户中，也有一些国营企业和合作社的职工。他们勾结投机商人，套购国家物资，进行黑市买卖，从中牟取暴利。如金星服装生产合作社会门门市部负责人雷玉成，将店内凭票供应的呢绒、卡机等成衣，让投机商贩拿出去以高出牌价一至二倍的价格出售，然后收购切角作废的布票来充上缴。据了解，他与十七个投机商贩有勾结，仅其中约四个人就替他卖了成衣一百四十二件，买进废布票一千四百尺。又如重庆市针纺站调出拨员朱友诚、物价员杨志谋、市百货公司进货员吕荣岱勾结黑市投机商钱永富、唐雅生等八人，组成了集团，进行投机违法活动。他们假借针纺站调拨给市百货公司一批针织品的名义，先后从重庆纤造厂提走了人造丝被面五十二床、白府绸衬衫六十六件、汗衫四百二十六件，被单五十六床，套袜三百打，到市场高价出售，然后按国家牌价付款给厂方，获得了大批暴利。","type":"paragraph"},{"text":"来源：1962年11月9日新华社《内部参考》。","type":"paragraph"}],"comments":[],"origin":"美国图书馆收藏","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6e8126e80d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
