策不会改变  今年将开展增产节约和增收节支运动","authors":["葛大星","邓斌"],"dates":[{"year":1987,"month":1,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"李鹏在全国勘察设计工作会上强调"},{"type":"paragraph","text":"反对资产阶级自由化有特定含义  党对待知识分子的政策不会改变"},{"type":"paragraph","text":"今年将开展增产节约和增收节支运动"},{"type":"paragraph","text":"新华社北京1月17日电　中共中央政治局委员、国务院副总理李鹏今天在北京强调：党对知识分子的政策不会变。"},{"type":"paragraph","text":"李鹏今天对来自全国各地的工程勘察设计专家说，现在有人挑拨党和知识分子的关系，说什么反对资产阶级自由化就是要整知识分子，这纯属诬蔑和歪曲。"},{"type":"paragraph","text":"他说，反对资产阶级自由化有特定含义。我们反对违背四项基本原则，反对在中国搞资本主义，反对搞“全盘西化”。反对资产阶级自由化根本不会影响和改变党的十一届三中全会以来党对知识分子的政策。他希望广大知识分子提高警惕，不要受个别居心不良的人挑拨。"},{"type":"paragraph","text":"李鹏重申：党是爱护和信任广大知识分子的。知识分子本身就是工人阶级的一部分，是国家的主人。他说，搞社会主义现代化建设还要靠大家同心协力。"},{"type":"paragraph","text":"据新华社北京1月17日电（中央人民广播电台记者邓斌、新华社记者葛大星）中共中央政治局委员、国务院副总理李鹏今天在这里说，国务院决定今年在全国各行各业大力提倡艰苦奋斗、勤俭建国、多做贡献、严守纪律的社会风气，开展增产节约和增收节支运动。"},{"type":"paragraph","text":"李鹏在今天结束的全国勘察设计工作会议上指出，当前我国经济建设的弦绷得还比较紧，其中一条就是基建战线仍然拉得过长，需要通过改善投资结构继续控制投资总规模。要保证能源、交通、原材料等重点建设，做到投资省、工期短、效益高。他特别强调，引进国外先进技术要从我国国情和每个企业、每个项目的实际情况出发，更多地考虑适用性和整体配套能力。"},{"type":"paragraph","text":"参加会议的国务委员宋平强调，艰苦奋斗和勤俭建国是我们国家走向繁荣富强的重要法宝，什么时候丢掉它，什么时候就要跌跟头。增产节约和增收节支应长期坚持下去。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"feabf6a86d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
