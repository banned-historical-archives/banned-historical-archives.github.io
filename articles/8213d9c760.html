ear":1976,"month":8,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　青浦县徐泾公社徐泾大队第八生产队的贫下中农，认真学习毛主席的一系列重要指示，狠批邓小平鼓吹的阶级斗争熄灭论、唯生产力论，大搞科学种田，继夏粮亩产超千斤后，又夺得早稻亩产一千二百八十七斤的好收成，超过历史最高水平，亩产比大丰收的一九七五年增加一成。"},{"type":"paragraph","text":"八队的贫下中农说，今年早稻丰收是同邓小平斗出来的，同大自然斗出来的。在取得夏粮丰收以后，八队的贫下中农和干部认真学习毛主席的有关重要指示，联系本队阶级斗争实际，狠批邓小平炮制的《论总纲》这株大毒草，进一步擦亮了大家的眼睛。许多贫下中农联系八队从后进转变为先进，粮食常年亩产连续几年超双千斤的战斗历程说，我们的丰收是抓阶级斗争抓出来的，邓小平贩卖唯生产力论，鼓吹“四个现代化”，决不是关心生产，而是以抓生产为幌子，大搞资本主义复辟的勾当，我们千万不能上当。大家决心同邓小平对着干，干到底。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8213d9c760"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
