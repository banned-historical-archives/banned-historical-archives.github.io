art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"把毛泽东著作当作方向盘","authors":["曹瑞林"],"parts":[{"type":"paragraph","text":"一连党支部坚持组织官兵学习毛泽东著作，做到重点文章经常学，基本观点反复学。新版《毛选》发行后，这个连把学雷锋与学《毛选》结合起来，以雷锋的“钉子”精神，见缝插针地学习毛泽东著作，收效明显。现在，全连官兵已熟读了《为人民服务》、《纪念白求恩》、《反对自由主义》、《关于纠正党内的错误思想》、《愚公移山》等8篇文章。"},{"type":"paragraph","text":"确保学得懂，争取用得上，是一连学《毛选》力求实现的目标。对文化水平低、理解能力差的同志，他们采取干部骨干领读和重点讲解的办法，并积极引导大家联系实际学基本观点，注重在实际中运用。过去，党支部生活存在着“会上不说，会后乱说”等自由主义现象，在学习《反对自由主义》时，同志们逐条检查纠正，恢复了批评与自我批评的好作风。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"156592080a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
