争","authors":[],"dates":[{"year":1968,"month":4,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"尼泊尔朋友热烈欢呼中国文化大革命取得巨大胜利"},{"type":"paragraph","text":"中国文化大革命鼓舞亚非拉人民的革命斗争"},{"type":"paragraph","text":"新华社加德满都六日电　尼泊尔朋友热情欢呼中国无产阶级文化大革命取得巨大胜利，并且指出，中国无产阶级文化大革命取得的胜利，鼓舞了正在进行反美斗争的亚非拉人民。"},{"type":"paragraph","text":"一位作家对新华社记者说：“中国无产阶级文化大革命的节节胜利，使世界人民感到高兴。我进一步懂得并相信，在伟大领袖毛主席领导下的中国，是正在同帝国主义和殖民主义作斗争的人民和国家的真正朋友。”"},{"type":"paragraph","text":"他说：帝国主义者和现代修正主义者最害怕中国的无产阶级文化大革命，他们千方百计诬蔑中国目前正在进行的这场革命，他们破坏中国同邻国以及世界人民的友好关系。但是，他们没有得逞。"},{"type":"paragraph","text":"他说：“在毛泽东思想的光辉照耀下，中国将日益强大。全世界人民为中国无产阶级文化大革命的伟大胜利而欢欣鼓舞。”"},{"type":"paragraph","text":"一位住在潘尼帕的朋友在写给新华社加德满都分社的信中说：伟大的中国人民在毛主席的领导下，在无产阶级文化大革命中取得了巨大的胜利。一个接着一个地建立起来的革命委员会表明了“在伟大领袖毛主席领导下和在毛主席的思想照耀下的中国决不会也永远不会改变颜色。文化大革命的节节胜利，极大地鼓舞了亚非拉正在斗争中的革命人民把反对他们的头号敌人——美帝国主义者及其走狗的斗争进行到底。”"},{"type":"paragraph","text":"一位教师在写给新华社加德满都分社的信中满怀热情地说：“毛泽东思想是当代最高水平的马克思列宁主义。”由毛主席亲自发动和领导的无产阶级文化大革命取得的巨大胜利，极大地鼓舞了全世界人民。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e26451a705"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
