al-archives/banned-historical-archives8/main/maoquanji1.pdf"],"article":{"title":"杨昌济记毛泽东的谈话","alias":"","parts":[{"type":"paragraph","text":"杨昌济记毛泽东的谈话！!"},{"type":"paragraph","text":"（1915年4月5日）"},{"type":"paragraph","text":"毛生泽东，言其所居之地为湘潭与湘乡连界之地，仅隔一山，而两地之语言各异。其地在高山之中，聚族而居，人多务农，易于致富，富则往湘乡买田。风俗纯朴，烟赌甚稀。渠之父先亦务农，现业转贩，其弟亦务农，其外家为湘乡人，亦农家也，而资质俊秀若此，殊为难得。余因以农家多出异材，引曾涤生、梁任公之例以勉之。毛生曾务农二年，民国反正时又曾当兵半年，亦有趣味之履历也。"},{"type":"paragraph","text":"毛泽东的妻子杨开慧。毛泽东的老师杨昌济。"},{"type":"paragraph","text":"[1]本篇是杨昌济《达化斋日记》中有关毛泽东谈话的一段记载。当时杨昌济在湖南省立第一师范学校任教，是毛泽东的老师。"}],"authors":["毛泽东"],"dates":[{"year":1915,"month":4,"day":5}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":171,"page_end":171},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"048048371a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
