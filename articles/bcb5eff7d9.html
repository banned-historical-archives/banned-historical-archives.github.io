rs":["刘叔模","湖北"],"dates":[{"year":1957,"month":6,"day":5}],"is_range_date":false,"parts":[{"text":"在中共武汉市委召开的座谈会上的发言","type":"title"},{"text":"湖北刘叔模","type":"authors"},{"text":"（按：刘叔模现任民革武汉市委会秘书长、武汉市人民委员会参事室参事。以下是他在鸣放期间发表的一系列右派言论的一部分。）","type":"subtitle"},{"text":"刘叔模说，“墙”“沟”的问题主要是宗派主义，旧社会讲权势，有的靠权势无所不为，有的厌权势有所不为。解放以后我有一种感觉，仿佛有人多接近党员就是靠拢党，靠拢党的人可能是无所不为的人，而党说他们是积极分子，形成宗派主义。","type":"paragraph"},{"text":"刘叔模建议重大问题应由党和民主党派协商，民主党派的领导干部应由民主党派民主选举，以便更好的发挥民主党派的作用。（见6月5日“长江日报”）","type":"paragraph"},{"text":" 来源：《右派言论选集》（湖北人民出版社，1957年9月）。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bcb5eff7d9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
