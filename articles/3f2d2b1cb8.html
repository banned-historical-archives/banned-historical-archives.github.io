script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"邓副总理同江萨总理会谈  就共同关心的国际问题和进一步发展两国关系交换了意见","authors":[],"dates":[{"year":1978,"month":11,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"邓副总理同江萨总理会谈"},{"type":"paragraph","text":"就共同关心的国际问题和进一步发展两国关系交换了意见"},{"type":"paragraph","text":"新华社曼谷十一月六日电　中国国务院副总理邓小平和泰国总理江萨·差玛南今天在会谈中都表示，期望中国和泰国之间已经建立的友好关系有重大发展。"},{"type":"paragraph","text":"今天上午，中泰两国领导人在曼谷市中心总理府的泰库法大厦进行了历时三小时的诚挚、坦率的会谈。两国领导人就共同关心的国际问题和进一步发展中泰两国的双边关系交换了意见。双方同意，在邓副总理这次访问期间，签署以下三个文件：中泰两国政府关于成立贸易联合委员会的议定书；中泰两国政府关于一九七九年度两国进出口商品的议定书；中泰两国政府科学技术合作联合委员会第一次会议会谈纪要。"},{"type":"paragraph","text":"邓小平副总理和江萨总理首先举行了两个多小时的会谈。参加会谈的有：中国外交部长黄华和泰国外交部长乌巴蒂·巴乍里央恭。随后，两国代表团的其他成员也参加了会谈。"},{"type":"paragraph","text":"会谈中，江萨总理对邓副总理来泰国进行友好访问再次表示热烈的欢迎。他说，双方将就两国互利的问题进行商谈，相信会取得美好的结果。双方还将就共同关心的国际问题特别是亚洲地区形势的问题交换意见。他表示深信，会谈将有助于泰中两国和本地区的发展和繁荣。"},{"type":"paragraph","text":"邓副总理感谢泰国政府、江萨总理和泰国人民对他的热情友好的欢迎，并感谢泰国国王陛下和王后陛下的接见。他说，我们这次怀着对泰国人民深厚的感情，为了进一步发展两国政治、经济、贸易、文化、科学技术等方面的友好合作而前来访问。同时，也是为了答谢江萨总理和许多泰国朋友对中国的友好访问。他指出，我们两国友好往来有悠久的历史，特别是建交以来，两国关系的发展令人满意，双方都怀有互相信任的感情。我们两国相互学习，相互合作的领域是广阔的。他说，中泰两国同处亚洲，理所当然地对世界形势特别是亚洲形势都表示关切。我们两国领导人互相访问，交换意见，对加深了解，促进两国友好关系的进一步发展是非常有益的。"},{"type":"paragraph","text":"泰国方面参加会谈的还有：副总理顺通·宏拉达隆；农业和合作社部长比达·卡那素；交通部长素拉吉·迈耶叻；教育部长汶颂·马丁；工业部长格森·乍滴甲瓦尼；外交部副部长翁·蓬尼空；其他各部副部长；以及泰国武装部队最高司令森·纳那空上将。"},{"type":"paragraph","text":"中国方面参加会谈的还有：中国驻泰国大使张伟烈，国务院办公室副主任李力殷，外交部亚洲司副司长王晓云，外贸部四局副局长荣凤祥，外交部礼宾司副司长戴平。（附图片）"},{"type":"paragraph","text":"十一月六日，邓小平副总理和泰国总理江萨·差玛南在总理府泰库法大厦举行会谈。"},{"type":"paragraph","text":"新华社记者   张桂玉摄   （传真照片）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"name":"世界形势","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3f2d2b1cb8"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
