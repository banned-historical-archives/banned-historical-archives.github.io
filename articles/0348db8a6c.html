le":{"title":"中央纪委、中央组织部关于加强各级纪律检查部门与组织部门相互联系的通知","dates":[{"year":1982,"month":4,"day":22}],"is_range_date":false,"authors":["中共中央组织部"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"中共中央组织干审局，干审工作政策文件选编 （上），634","tags":[{"name":"工作联系","type":"主题/事件"},{"name":"组织工作","type":"主题/事件"}],"parts":[{"type":"title","text":"中央纪委、中央组织部关于加强各级纪律检查部门与组织部门相互联系的通知"},{"type":"subtitle","text":"1982年4月22日 · 中组发〔1982〕7号"},{"type":"paragraph","text":"为了加强各级党的纪律检查部门和组织部门工作中的联系，互通情况，密切配合，现将有关事项通知如下："},{"type":"paragraph","text":"一、党的纪律检查部门，在查处党员干部违纪案件过程中，应当及时地将立案审查的情况向同级党委组织部门通报；处理结案后，应将处分决定等有关材料抄送组织部门备查。"},{"type":"paragraph","text":"二、党的组织部门，在选拔、任命干部时，对于有问题正在查处或有反映还没有查处的干部,要向同级党委纪律检查部门了解情况，征求意见。"},{"type":"paragraph","text":"三、如果意见有分歧时，可请示同级或上级党委解决。"},{"type":"paragraph","text":"四、同级党委的纪律检查部门和组织部门要根据工作需要，研究制订加强双方联系的具体办法，如：建立定期的联席会议制度或规定相互邀请参加有关会议，交流情况的碰头会等。"}],"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0348db8a6c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
