将逐步改善","authors":[],"dates":[{"year":1981,"month":9,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社北京九月九日电　中共中央副主席邓小平今天上午在人民大会堂会见了以公明党中央执行委员会委员长竹入义胜为团长、副委员长二宫文造为副团长的日本公明党第十次访华代表团一行二十六人。"},{"type":"paragraph","text":"会见时，邓小平同代表团进行了亲切的交谈。"},{"type":"paragraph","text":"邓小平对客人说，一九七八年十二月党的十一届三中全会以来，我国确定了一系列的方针政策。两年多来的实践证明，这些方针政策都是行之有效的，我们要继续贯彻执行下去。"},{"type":"paragraph","text":"他说，我们要坚持社会主义道路，要建设高度民主、高度文明的现代化的社会主义强国。我国人民的生活只能逐步改善。如果我们不强调道德风尚，不重视精神文明，没有远大理想，只是一味地追求物质享受，那就无法实现我们的目标。"},{"type":"paragraph","text":"邓小平谈到了农业上实行的各种形式的生产责任制，他指出，实行生产责任制，不会破坏我国的社会主义制度，因为它并没有改变所有制。他说，这种责任制真正体现了按劳分配的原则，同时也是符合中国农村实际情况的。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"566299d1b3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
