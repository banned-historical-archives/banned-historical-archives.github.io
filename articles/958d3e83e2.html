调用毛泽东思想指导人民进行革命斗争","authors":[],"dates":[{"year":1970,"month":3,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"澳共（马列）机关报《先锋报》发表文章指出"},{"type":"paragraph","text":"澳大利亚人民正显示出巨大的斗争力量"},{"type":"paragraph","text":"强调用毛泽东思想指导人民进行革命斗争"},{"type":"paragraph","text":"新华社墨尔本二十六日电　澳大利亚共产党（马克思列宁主义）机关报《先锋报》二十六日发表文章，强调用毛泽东思想指导澳大利亚人民目前正在进行的革命斗争。"},{"type":"paragraph","text":"文章指出，澳大利亚的资产阶级正在不断地向人民进攻。资本主义制度就是资产阶级对广大劳动人民群众的专政。"},{"type":"paragraph","text":"文章说，现在，几乎每天都可以在生活中证实这个真理。青年人因为拒绝为美国侵越战争卖命，而在狱中遭受折磨。资产阶级法律正被加紧用来对付人民，示威者遭到毒打，受控告和坐牢。警察暴行越来越多……"},{"type":"paragraph","text":"文章强调说，现实正在教育人民，使他们认识到，必须组织起来，反抗资产阶级变本加厉地对他们使用暴力。"},{"type":"paragraph","text":"文章指出，战争来源于帝国主义制度，帝国主义正在花费数以百万计的军费准备战争。"},{"type":"paragraph","text":"文章接着说：美帝国主义和克里姆林宫的修正主义正在准备反革命战争。苏修叛徒们继续在中国边境进行侵略活动。革命人民必须重视这一现实并从现在起就作好对付侵略的准备。"},{"type":"paragraph","text":"文章说：“资产阶级不要人民用革命暴力来反抗在国外进行的侵略战争和国内的法西斯反革命暴力。”"},{"type":"paragraph","text":"文章说，使资产阶级及其仆从们感到恼火和沮丧的是，澳大利亚人民正显示出自己的巨大的斗争力量。"},{"type":"paragraph","text":"文章强调指出：“在澳大利亚反对修正主义的意识形态的斗争中，毛泽东主席的革命教导已经深入人心。只能是这样，因为毛主席的教导是真理，是符合普通人民的利益的。没有毛主席的革命真理就不可能有革命斗争，这一点已经在实际生活中得到证明。”"},{"type":"paragraph","text":"文章最后说：“各行各业的广大人民正在运用毛泽东思想总结他们的斗争经验。这只能导致更高形式的斗争。正如毛主席所说的：‘只能经过战争去消灭战争，不要枪杆子必须拿起枪杆子’。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"958d3e83e2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
