art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东军事教育思想的主要内容","authors":[],"parts":[{"type":"paragraph","text":"文中还提到，追寻我军军事教育的历史轨迹，毛泽东等老一辈无产阶级革命家在每个历史时期的重大军事教育实践活动中，都有一系列关于军事教育的精辟论述。这些论述反映了毛泽东军事教育思想的形成和发展过程，在我军的军事教育实践中发挥了指向和推动的作用。我军从小到大，由弱到强，发展为今天这样具有一定现代化水平的人民军队，与毛泽东军事教育思想有着不可分割的联系。今天，加强对毛泽东军事教育思想的研究，无论是对于丰富和发展毛泽东军事教育思想，还是对于解决当前我军军事教育实践中出现的新问题，都具有重要的意义。文中最后还对邓小平同志丰富和发展毛泽东军事教育思想的主要方面作了具体阐述。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"517581ceb5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
