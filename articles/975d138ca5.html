rt":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"中罗两党代表团举行会谈中共中央举行宴会欢迎罗马尼亚工人党代表团 刘少奇邓小平同志陪同扬·格·毛雷尔同志等观看文艺演出","authors":["邹健东"],"parts":[{"type":"paragraph","text":"新华社三日讯 中国共产党代表团和罗马尼亚工人党中央委员会代表团今天下午举行会谈。"},{"type":"paragraph","text":"中国方面参加会谈的有，中国共产党代表团团长、中共中央副主席刘少奇，代表团团员：中共中央总书记邓小平，政治局委员彭真，政治局候补委员康生。"},{"type":"paragraph","text":"罗马尼亚方面参加会谈的有，罗马尼亚工人党中央委员会代表团团长、罗马尼亚工人党中央委员会政治局委员扬·格·毛雷尔，代表团团员：罗马尼亚工人党中央委员会政治局委员埃·波德纳拉希、尼·齐奥塞斯库和基伏·斯托伊卡。"},{"type":"paragraph","text":"会谈在友好的气氛中进行。"},{"type":"paragraph","text":"据新华社三日讯 中国共产党中央委员会今晚举行宴会，热烈欢迎由罗马尼亚工人党中央委员会政治局委员扬·格·毛雷尔率领的罗马尼亚工人党中央委员会代表团。"},{"type":"paragraph","text":"中共中央副主席刘少奇，中央总书记邓小平出席了宴会。"},{"type":"paragraph","text":"出席宴会的罗马尼亚工人党中央委员会代表团团员，有罗马尼亚工人党中央委员会政治局委员埃·波德纳拉希、尼·齐奥塞斯库和基伏·斯托伊卡。代表团的全体工作人员，罗马尼亚驻中国大使杜米特鲁·乔治乌，也应邀出席了宴会。"},{"type":"paragraph","text":"在宴会上，宾主为中罗两党和两国的友好团结，为毛泽东同志和乔治乌一德治同志的健康干杯。"},{"type":"paragraph","text":"出席宴会的还有，中共中央政治局委员彭真、李富春，政治局候补委员陆定一、康生、薄一波，中央书记处书记罗瑞卿，中央书记处候补书记杨尚昆，中央委员廖承志、林枫、萧劲光、叶剑英、伍修权、王从吾，中央候补委员徐冰、赵毅敏等。"},{"type":"paragraph","text":"据新华社三日讯 文化部今天举行文艺晚会，欢迎由扬·格·毛雷尔率领的罗马尼亚工人党中央委员会代表团。"},{"type":"paragraph","text":"在中共中央副主席刘少奇、中央总书记邓小平、中央政治局候补委员康生等陪同下，罗马尼亚工人党中央委员会代表团全体成员，观看了总政文工团、中央歌剧舞剧院等联合演出的中罗两国的歌舞节目。"},{"type":"paragraph","text":"晚会在合唱《全世界无产者联合起来》的歌声中开始。"},{"type":"paragraph","text":"演出结束后，扬·格·毛雷尔等由刘少奇、邓小平等陪同走上舞台，同演员们亲切握手。"},{"type":"paragraph","text":"图为会谈时情形。 新华社记者 邹健东摄"}],"alias":""},"tags":[{"name":"康生","type":"人物"},{"name":"邓小平","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"彭真","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"975d138ca5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
