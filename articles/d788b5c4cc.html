rt":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"三连学习毛主席军事思想发挥了战士的主动精神","authors":["郑岳"],"parts":[{"type":"paragraph","text":"本报讯 0061部队政治部以所属二支队三连为典型，举办了学习毛主席军事思想展览会。"},{"type":"paragraph","text":"三连对毛主席军事思想的学习，是从去年10月开始的。在战术大合练中，全连同志体会到，学习毛主席军事思想对部队的训练有着很大的意义。为此，今年训练预备期间，该连又开展了学习毛主席军事思想的活动。仅一个多月，全连就写出许多篇文章。文章一般都能结合去年训练的实际，写出自己的感想，并提出自己对战术的意见。该连党支部还初步总结了这次群众性学习毛主席军事思想的经验。"},{"type":"paragraph","text":"为了及时介绍经验，在干部、战士当中掀起学习毛主席军事思想的热潮，该部政治部以三连的材料，在直属队举办了一次展览会。一周中，参观的就达两千余人。看了展览，许多同志提高了认识，增强了学习的信心。战士吴成德在意见簿上写道：过去我总认为战士又不指挥，学习军事思想有啥用；这次我认识到，不好好学习，就只能指挥员拨一拨自己动一动，不可能发挥自己的主动性、积极性。为了扩大这一宣传，该部政治部决定以三连的材料，组织巡回展览。 （郑岳）"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d788b5c4cc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
