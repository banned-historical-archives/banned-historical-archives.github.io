<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"全市小朋友代表昨欢聚 庆祝第一届国际儿童节保证努力做毛主席的好学生首长们都在保卫儿童权利书上签了名","authors":[],"dates":[{"year":1950,"month":6,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　昨天，全上海的小朋友，不论是在学的，失学的，或是学龄以前在托儿所的，从早晨到夜晚，在晴朗的天空下，展开了各式各样的活动，来庆祝第一个国际儿童节。"},{"type":"paragraph","text":"上午九时，在大光明举行了全市代表性的庆祝大会，二千多白衣蓝裤佩戴红领巾的少年儿童队队员，一批批的踏着轻快活泼的步伐走进会场来，宋庆龄、饶漱石、舒同、潘汉年、冯定、萧三、罗权章、赵朴初、陆璀、黄静汶、陈炎、杨小妹、贺宜等政府首长和各界来宾都带着愉快慈祥的微笑到会祝贺，他们每一位入场以前，都在“保卫世界和平书”“保卫儿童权利书”上签了名，表示对小朋友的忠心爱护。"},{"type":"paragraph","text":"大会在“东方红”的乐声中开始，首先通过主席团方明、朱良、沈粹缜、姚溱、姚淑文、夏衍、章蕴、梁兆安、曹漫之、曹友容、崔义田、陆万美、张本、张耀祥、赵朴初、刘长胜、郑兰荪、卢于道、戴白韬等十九人，章蕴同志担任执行主席，她首先对小朋友说明国际儿童节的来源，它是国际民主妇联爱好和平民主的妈妈姊姊们所发起的。它的意义是为保卫孩子们的权利和幸福，要向破坏世界和平的战争贩子帝国主义作斗争，接着提醒小朋友们自己翻身做了新中国的小主人，不要忘了生活在帝国主义压迫下的千千万万的小朋友，对他们应寄予同情，和他们携起手来，为打倒共同的敌人，反对侵略战争，参加保卫世界和平运动。最后勉励小朋友们要注意卫生爱护身体，努力学习，自小培养为人民服务的观点。"},{"type":"paragraph","text":"潘副市长亲切的对小朋友说，代表人民政府向全上海的小弟弟小妹妹致敬问候，并说明政府有为未来小主人服务的义务，今后一定要把小朋友的卫生教育福利等工作搞好。戴白韬局长代表教育局保证将儿童工作做好，并勉励小朋友听毛主席的话，好好学习，培养五爱的新道德。中国保卫世界和平宣传团团长萧三同志，特别来参加庆祝会，对小朋友说明:保卫和平就是保卫我们自己，也是保卫你们小朋友，希望中国的小朋友和全世界的小朋友们站在一道，踊跃的参加保卫世界和平运动。三野的一级人民英雄陈炎，鸿丰纱厂的劳动模范杨小妹，儿童文学作家贺宜，都讲了话；最后由儿童剧团的陈海根代表全上海的小朋友向首长来宾以及平日辛劳教导他们的老师致谢，并保证以行动来感谢国家政府所给予孩子的关切爱护，不淘气，不懒惰，好好学习做毛主席的好学生。"},{"type":"paragraph","text":"昨天到会的首长来宾，都是小朋友渴望见面的人物，当主席一一介绍时，小手掌拍得像春雷一般响；十多年来全心全意致力于儿童福利工作的宋副主席站起来和小朋友们见面时，慈祥和霭亲切温暖的微笑点头，小朋友争着说:“这就是最最爱护我们的宋副主席!”掌声更是排山倒海似的响个不停。"},{"type":"paragraph","text":"大会历时五十分钟结束，游艺节目开始了，有儿童剧团，正志小学，华东保育院，育才学校的各种舞蹈。精彩的表演，让每个小朋友笑，笑，笑，乐，乐，乐，一直到中午十二时大家才愉快地分手。"},{"type":"paragraph","text":"(关于各区庆祝活动的新闻载第二版)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1068251b30"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
