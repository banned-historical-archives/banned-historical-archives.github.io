art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东思想永远是照耀我们前进的灯塔","authors":["工程兵四好连队标兵/某部一连指导员张堂印班长曹石斌〖HH/换行〗DW：工程兵某部一连"],"parts":[{"type":"paragraph","text":"在欢庆“九大”隆重开幕的大喜日子里，我们怀着激动的心情看了纪录影片《干革命靠毛泽东思想》，受到了一次极为深刻的教育。"},{"type":"paragraph","text":"阳光雨露育青松，毛泽东思想育英雄。这部影片深刻表现了后勤战线上许多先进集体和个人活学活用毛泽东思想的模范事迹和宝贵经验。毛主席的好战士年四旺同志，就是毛泽东思想哺育起来的英雄。他深深体会到：学习毛主席著作，必须带着深厚的无产阶级感情学，带着深厚的无产阶级感情用，活学活用“老三篇”，狠斗“私”字一闪念。在阶级敌人破坏铁路的时刻，年四旺英勇地抢救了满载矿工和红卫兵的列车，完全是由于他一贯刻苦活学活用毛泽东思想的结果。“无限忠于毛主席的川藏运输线上十英雄”面对特大的山崩，怀着对伟大领袖毛主席的赤胆忠心，迎着风险上，踏着艰难走，不怕牺牲，奋勇向前，为人民流尽了最后一滴血。十英雄生前如饥似渴地学习毛主席著作，自觉地照毛泽东思想办事，战无不胜的毛泽东思想给了他们战天斗地的无穷无尽的力量。……无数动人的英雄事迹，都闪耀着毛泽东思想的灿烂光芒，都是一曲曲伟大的毛泽东思想的颂歌。"},{"type":"paragraph","text":"我们从切身经历中深深体会到：战无不胜的毛泽东思想永远是我们连队革命化建设的灵魂。我们连连续八年被评为四好连队，被树为工程兵活学活用毛泽东思想先进单位标兵和四好连队标兵，一九六五年，全连干部战士光荣地受到伟大领袖毛主席亲切接见。我们从长期的革命斗争实践中，明确了一个真理，干革命不靠天，不靠地，全靠战无不胜的毛泽东思想。我们一定要更高地举起毛泽东思想伟大红旗，掀起活学活用毛泽东思想的新高潮，全面落实毛主席一系列最新指示，用实际行动向“九大”献礼！"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"47f72de1df"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
