dates":[{"year":1949,"month":8,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"孙夫人宋庆龄女士昨抵平"},{"type":"paragraph","text":"毛主席朱总司令等均往车站欢迎"},{"type":"paragraph","text":"【新华社北平二十八日电】孙夫人宋庆龄女士已于今日下午四时自上海抵平。毛主席、朱总司令、周副主席、林伯渠、董必武、李济深、何香凝、沈钧儒、郭沫若、章伯钧、黄炎培、马叙伦、谭平山、柳亚子、彭泽民、蔡廷锴、聂荣臻、李立三、廖承志、蔡畅、沈雁冰、李德全、陈其瑗、胡愈之、张治中、齐燕铭、康克清、许广平、罗叔章、沈兹九等五十余人均往车站欢迎。孙夫人下车后，与欢迎者一一握手，并接受洛杉矶儿童保育院儿童的献花。孙夫人系于本月二十六日从上海启程，由全国民主妇女联合会副主席邓颖超、廖仲恺先生女公子廖梦醒、上海市军管会交际处处长管易文伴送来平。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"856b359462"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
