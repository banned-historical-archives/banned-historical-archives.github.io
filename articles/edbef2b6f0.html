rt":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"姚文元同志会见罗马尼亚《火花报》代表团","authors":[],"parts":[{"type":"paragraph","text":"新华社一九七五年四月三十日讯 中共中央政治局委员姚文元今天下午会见以罗马尼亚共产党中央委员会委员、罗马尼亚《火花报》总编辑亚历山德鲁·约内斯库为团的罗马尼亚《火花报》代表团，同他们进行了非常亲切的谈话。"},{"type":"paragraph","text":"参加会见的代表团团员有：维克多·维杜、弗洛里亚·齐奥塞斯库、维奥里尔·萨勒江、杜米特鲁·丁努。"},{"type":"paragraph","text":"罗马尼亚驻中国大使格夫里列斯库，大使馆三等秘书鲁贝尔努和罗马尼亚《火花报》驻京记者德古泽参加了会见。"},{"type":"paragraph","text":"会见时在座的还有《人民日报》负责人鲁瑛、陈浚，《人民日报》领导成员刘治平等。"},{"type":"paragraph","text":"会见后，中罗两国同志共进晚餐。"}],"alias":""},"tags":[{"name":"姚文元","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"edbef2b6f0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
