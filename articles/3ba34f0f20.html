es":[{"year":1997,"month":6,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"《毛泽东评点二十四史》线装影印本出版"},{"type":"paragraph","text":"本报北京六月六日讯记者杨武军报道：经中共中央文献研究室、新闻出版署和中央档案馆批准，由线装书局出版发行的《毛泽东评点二十四史》线装本，首批印制的二百套开始发行。这是建国以来规模最大的线装图书出版工程，新闻出版署署长于友先等出席今天出版发行新闻发布会。"},{"type":"paragraph","text":"毛泽东对《二十四史》的圈点、评注，是一个伟大的革命家、政治家、思想家对我国悠久历史的审视，这一审视的真实记录构成了这套影印线装书特有的文献价值、版本价值、学术价值和艺术价值。中央档案馆组织专家学者对原书进行了整理、校勘，并全部用原件影印制版，较好地再现了原书原貌。全书共分八百五十册，分八十函，大十六开型线装装帧，采用传统手工精制，正文用特制玉牌宣纸精印。这套线装本国内外限量发行五百套，每套书配有精美的镜面框装编号藏书证。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3ba34f0f20"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
