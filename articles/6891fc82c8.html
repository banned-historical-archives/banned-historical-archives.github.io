ical-archives/banned-historical-archives0/main/maoquanji45.pdf"],"article":{"title":"毛泽东等祝贺蒙古人民革命四十一周年的电报","alias":"","parts":[{"type":"paragraph","text":"毛泽东等祝贺蒙古人民革命"},{"type":"paragraph","text":"四十一周年的电报！"},{"type":"paragraph","text":"（1962年7月10日）乌兰巴托蒙古人民革命党中央委员会第一书记、蒙古人民共和国部长会议主席尤·泽登巴尔同志，蒙古人民共和国大人民呼拉尔主席团主席扎·桑布同志："},{"type":"paragraph","text":"在蒙古人民革命四十一周年的时候，我们代表中国人民、中国共产党和中华人民共和国政府向你们，并且通过你们向蒙古人民、蒙古人民革命党和蒙古人民共和国政府致热烈的、兄弟般的祝贺。"},{"type":"paragraph","text":"蒙古人民在蒙古人民革命党和蒙古人民共和国政府的领导下，为建设社会主义、为维护亚洲和世界和平进行了不解的努力，并且取得了很大的成就。中国人民对于兄弟的蒙古人民所取得的各项成"},{"type":"paragraph","text":"[1]这是毛泽东以中国共产党中央委员会主席的名义和中华人民共和国主席刘少奇、全国人民代表大会常务委员会委员长朱德、国务院总理周恩来联名给蒙古人民革命党中央委员会第一书记、蒙古人民共和国部长会议主席尤·泽登巴尔，蒙古人民共和国大人民呼拉尔主席团主席扎·桑布的电报。祝贺蒙古人民革命四十一周年。1921年蒙古人民在苏俄红军援助下于7月8日解放库伦，击溃温甘伦白匪军，取得革命的胜利。7月11日，在库伦正式成立人民革命政府。"},{"type":"paragraph","text":"毛泽东等祝贺蒙古人民革命四十一周年的电报就感到衷心的喜悦。"},{"type":"paragraph","text":"中蒙两国是兄弟邻邦。在革命斗争和社会主义建设事业中，两国人民一直相互同情、相互支援。我们深信，中蒙两国人民之间的友谊必将日益巩固和发展。祝中蒙两国人民的兄弟友谊万古长青！"},{"type":"paragraph","text":"中国共产党中央委员会主席毛泽东中华人民共和国主席刘少奇中华人民共和国全国人民代表大会常务委员会委员长朱德中华人民共和国国务院总理周恩来"},{"type":"paragraph","text":"1962年7月10日于北京"}],"authors":["毛泽东"],"dates":[{"year":1962,"month":7,"day":10}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":164,"page_end":165},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"朱德","type":"人物"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6891fc82c8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
