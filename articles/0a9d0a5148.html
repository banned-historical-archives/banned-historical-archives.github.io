script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"美帝国主义“后院”处处是火山  拉丁美洲人民反压迫反剥削斗争浪潮汹涌","authors":[],"dates":[{"year":1967,"month":3,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"美帝国主义“后院”处处是火山"},{"type":"paragraph","text":"拉丁美洲人民反压迫反剥削斗争浪潮汹涌"},{"type":"paragraph","text":"本报综合报道　在美帝国主义的“后院”拉丁美洲，广大劳动人民正在日益觉醒，纷纷起来同残酷剥削他们的美国垄断资本和本国反动统治当局进行英勇的斗争。"},{"type":"paragraph","text":"今年以来，反对剥削和压迫的群众斗争的浪潮遍及了拉丁美洲的许多国家。"},{"type":"paragraph","text":"中美洲萨尔瓦多的公共汽车工人，在一月份发动了这个国家历史上第一次交通工人大罢工，要求提高工资，以弥补通货膨胀给他们带来的损失。"},{"type":"paragraph","text":"乌拉圭的银行、石油、电话、渔业、铁路、邮政等部门的职员十五万人，在二月份举行了七十二小时的罢工，抗议物价上涨，要求政府通过包括提高工资待遇规定的预算。乌拉圭公立医院一万五千名医务工作人员以及蒙得维的亚卡拉斯科机场的技术人员为要求增加工资也举行了罢工。"},{"type":"paragraph","text":"哥伦比亚银行职工从一月下旬开始罢工，要求增加工资。尽管政府进行迫害，罢工斗争还是迅速扩大到全国各地银行业。有的地方，银行职工进行了绝食斗争。"},{"type":"paragraph","text":"在阿根廷的图库曼省，由于反动政府采取封闭糖厂和大批解雇罢工工人等镇压措施，糖业工人在二月间举行示威游行，抗议独裁政权枪杀罢工工人的暴行。"},{"type":"paragraph","text":"阿根廷上百万各行业工人本月一日开始举行二十四小时的总罢工，抗议翁加尼亚亲美独裁政权所执行的出卖民族利益和损害工人权益的反动政策。"},{"type":"paragraph","text":"这次罢工是阿根廷工人阶级对翁加尼亚政权的反动政策发起的一次新反击。去年十二月十四日，阿根廷各行业工人曾经举行过二十四小时全国总罢工。"},{"type":"paragraph","text":"在智利的库拉尼拉乌“好望”农庄的农业工人举行的罢工已经坚持了一个月，他们不顾警察开枪镇压，坚决拒绝让工贼进入庄园破坏罢工。在塔尔卡省，三百名农民占领了一个庄园。他们的造反行动得到附近农民的支持。"},{"type":"paragraph","text":"在巴拉圭，美国垄断了巴拉圭主要出口品牛肉的屠宰和冷藏，并且控制了巴拉圭的石油矿藏。它还在农村里保存着封建制度，甚至还有农奴制度。百分之七十的农民没有土地。现在，巴拉圭的工人、农民和人民党派结成了联盟，并且组成了游击队，同美帝国主义及其走狗进行着斗争。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0a9d0a5148"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
