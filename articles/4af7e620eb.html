ors":[],"dates":[{"year":1966,"month":9,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"阿尔巴尼亚同志高度赞扬我国文化大革命"},{"type":"paragraph","text":"中国成为反帝反修的世界革命中心"},{"type":"paragraph","text":"据新华社地拉那电　阿尔巴尼亚劳动党发罗拉区委员会第二书记加尼·凯西和区委书记萨巴·哈萨十九日向本社记者发表谈话说，发罗拉区的劳动人民同阿尔巴尼亚全国人民一样，高度赞扬和热烈支持毛泽东同志亲自领导的中国无产阶级文化大革命。"},{"type":"paragraph","text":"凯西同志说：“以毛泽东同志为首的中国共产党和中国，在全世界高举革命的火炬，已经成为反对帝国主义和反对修正主义的世界革命的中心。中国文化大革命不仅有国内的重大意义，而且有巨大的国际意义。从这方面说，一切真正的马克思列宁主义政党和马克思列宁主义者都能够从中学习到如何取得社会主义革命的胜利，并把它不断推向前进的宝贵经验。”"},{"type":"paragraph","text":"哈萨同志说：“我区劳动人民热烈赞扬中国文化大革命的正确措施。他们十分懂得这些措施是不仅关系到中国的现在，而且关系到中国世世代代不出修正主义的重大问题。”"},{"type":"paragraph","text":"在谈到最近美帝和苏修相互勾结对中国文化大革命大肆进行造谣、污蔑和诽谤的时候，凯西同志强调指出：“全世界人民都知道，敌人越是反对，越说明我们做对了，如果被敌人赞成，倒是我们做错了。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4af7e620eb"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
