为","authors":[],"dates":[{"year":1955,"month":9,"day":27}],"is_range_date":false,"parts":[{"text":"上海市批发商对资产清理工作有对抗行为","type":"title"},{"text":"【上海分社九月二十七日讯】上海市批发商在企业改造后对资产清理工作的对抗行为极为严重。据人民银行七个办事处及中国银行的统计，国际贸易等二十四个批发行业自五月份清理资产以来，完成情况极差。九十一万元应收账款完成百分之二十九，两百五十六元存货完成百分之三十六，宕帐五十万元完成百分之四，对劳方义务（欠薪、解雇费等）完成百分之七十八，欠公款也有五百四十多万元未归还。","type":"paragraph"},{"text":"据各区私商改造办公室反映，有的资本家故意歪曲政策，说政府谈“统战”，即“不了了之”。协顺皮毛号资方在小组会上公开对大昌慎资方说：“老兄五反退财不还，政府不会硬要”。国际贸易业资本家庄永基应付职工一百六十四元到期不付，竟公开甲称：“请愿劳动改造，不愿付职工‘义务’”。","type":"paragraph"},{"text":"有的资本家故意找借口拖延清理工作，企图逃避管理。有的资本家借口亲自收取应收账款，乘机动用资金到外埠去久不归来。有的资本家一面公开叫嚣国营公司杀价，一面偷偷把存货卖掉，不存入银行。有的非法出顶房屋，或者把已订入计划应出售的生财分藏在家中。","type":"paragraph"},{"text":"有的资本家不仅不积极清理资产，偿付对公欠款和对劳方的义务，还强调生活困难。据黄浦区统计，资本家每月申请生活费达万元以上。","type":"paragraph"},{"text":"目前市私商改造办公室已注意纠正上述现象。除了由工商联组织他们听报告与进行讨论检查外，情节严重的已送法院审判，并在报纸上公开揭露。","type":"paragraph"},{"text":" （张家炽）","type":"paragraph"}],"comments":[],"origin":"新华社《内部参考》1955年10月5日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f965c4dad7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
