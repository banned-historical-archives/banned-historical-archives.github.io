:[{"year":1952,"month":3,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"\u003cIMG alt=请插入3号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1952\\03\\523k020401.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e(1)重庆私管钢钻机器筑在解放以前由于蒋美联合绞杀，已经衰败到“一息仅存”，许多工厂靠着卖厂房、卖家具，甚至卖工作母机过日子。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入3号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1952\\03\\523k020402.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e(2)如“上海机器厂”，在日本投降前有二百多个工人，但到解放以前，只剩了七、八个工人看厂。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入3号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1952\\03\\523k020403.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e(3)解放两年以来，人民政府为了扶助民族工业，给予这些工厂的贷款二百八十六亿元，给予加工定货价值近三千亿元。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入3号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1952\\03\\523k020404.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgaut\u003e张伯诚,汪伟光,王木天\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e(4)这些工厂老板们看见自己的“事筑”获得恢复并发展，就立刻露出了狰狞面目；为了更有计划地向人民民主政权进攻，就以“研究业务”为名，秘密组织了“星四聚餐会”。张伯诚　汪伟光　王木天　合绘"},{"type":"paragraph","text":"钱子凡改编\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgaut\u003e凡子钱\u003c/FONT\u003e"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d402a216b9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
