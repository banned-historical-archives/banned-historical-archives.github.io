ical-archives/banned-historical-archives0/main/maoquanji48.pdf"],"article":{"title":"和黑非洲留法学生联合代表团的谈话（摘录）","alias":"","parts":[{"type":"paragraph","text":"和黑非洲留法学生联合代表团的"},{"type":"paragraph","text":"谈话（摘录）"},{"type":"paragraph","text":"（1965年9月14日）"},{"type":"paragraph","text":"事情总是有麻烦，不能怕麻烦。革命也可以叫麻烦。革命就是麻烦，搞经济建设也是麻烦。怕麻烦什么事情也搞不成，不怕麻烦什么事情也可以搞成。…知识分子就是要能够跟人民的大多数结合起来。跟他们结合的时候就有麻烦，你要跟他结合，他不跟你结合，这个麻烦得很！这些人听话，那些人又不听话，就有这些麻烦。不能怕这些麻烦，无非是在长期的斗争中跟群众站在一道，群众最后会了解你们的，会信任你们的，会在那些真正为人民利益服务的人的领导下团结起来的。劳动人民很需要为他们服务的知识分子，但是，不为他们服务的知识分子，他们不高兴，不喜欢。"},{"type":"paragraph","text":"你或者是比他们高一等，站在他们头上，那他们不喜欢。他们喜欢那种平等的人，用平等的态度对待他们，跟他们一道参加劳动，了解他们的思想情况，了解他们的要求，为他们的利益服务，又有知识，他们喜欢这样的人。"}],"authors":["毛泽东"],"dates":[{"year":1965,"month":9,"day":14}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":192,"page_end":192},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ec8db2a638"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
