"year":1976,"month":11,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"江青是挑动武斗的罪魁祸首编辑同志："},{"type":"paragraph","text":"在轰轰烈烈的无产阶级文化大革命运动中，有的地方刮起一股“武斗风”。群众组织之间打“内战”，党内走资派和社会上的阶级敌人，乘机制造混乱，混水摸鱼，严重干扰了毛主席的革命路线和各项方针政策的贯彻落实。"},{"type":"paragraph","text":"煽起这股黑风的，不是别人，正是那个自称为“文化大革命旗手”的大野心家江青。无产阶级文化大革命运动刚开始，我们伟大领袖毛主席就明确指出“要文斗，不要武斗”。可是，江青却背着毛主席、党中央抛出了一个“文攻武卫”的反革命口号，煽起了“武斗风”。我是亲身参加无产阶级文化大革命运动的红卫兵，对这件事非常清楚。当时，我正上中学。我们学校革命师生响应伟大领袖毛主席的号召，向党内走资派展开了斗争。以后，各群众组织之间因在某些问题的看法上有分歧，产生了一些矛盾。辩论这些问题时，个别人也发生过动手动脚的现象，由于大家知道武斗是不对的，是违背毛主席教导的，经过批评教育很快就改正了。可是，自从江青抛出“文攻武卫”这个反革命口号以后，就给武斗提供了“理论根据”，使武斗合法化了。当时，我们学校的各群众组织都成立了“文攻武卫指挥部”、“文攻武卫战斗队”等武斗组织，并召开了一个“文攻武卫誓师大会”，会后游行时，互不让路，当场就打起来，造成了我县文化大革命中的第一次流血事件。以后，武斗事件越来越多。全县的各群众组织都建立了专业武斗队，把工厂工人、生产队社员调离生产岗位去搞武斗，使工厂停产，农村生产没人搞，革命和生产遭到巨大破坏。“四人帮”这伙坏蛋，到处煽风点火，挑动群众武斗，制造分裂，制造混乱，以便他们趁火打劫，篡党夺权，真是血债累累，罪恶滔天！"},{"type":"paragraph","text":"现在，以华国锋主席为首的党中央，一举粉碎了“四人帮”反党集团，我们向“四人帮”讨还血债的时候到了。我们一定要彻底揭发他们的罪行，彻底批判他们的反革命的修正主义路线，加强革命团结，在华国锋主席为首的党中央领导下，继承毛主席的遗志，把无产阶级专政下的继续革命进行到底！"},{"type":"paragraph","text":"解放军某部战士　田智华"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"江青","type":"人物"},{"name":"华国锋","type":"人物"},{"name":"四人帮","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"武斗","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"decb57d254"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
