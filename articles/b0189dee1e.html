 帝国主义和修正主义结成镇压人民的反革命同盟只能表明它们的虚弱","authors":[],"dates":[{"year":1968,"month":11,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"阿《团结报》谴责苏美勾结妄图主宰世界的罪恶行径"},{"type":"paragraph","text":"美帝苏修是各国人民不共戴天的敌人"},{"type":"paragraph","text":"帝国主义和修正主义结成镇压人民的反革命同盟只能表明它们的虚弱"},{"type":"paragraph","text":"新华社地拉那二十五日电　阿尔巴尼亚《团结报》二十四日发表文章，谴责苏修加紧勾结美帝，推行苏美合作主宰世界的反革命全球战略的罪恶行径。"},{"type":"paragraph","text":"文章揭露，苏修头目柯西金最近在莫斯科先后接见了美国前国防部长、刽子手麦克纳马拉和美国参议院外交委员会的两个成员，并同他们举行了“会谈”。文章指出，美国垄断资本家的这些使者走访莫斯科，显然是为了策划阴谋诡计，妄图加强苏美共同主宰世界的联盟。"},{"type":"paragraph","text":"文章说，柯西金向华盛顿的使者们保证，今后将继续坚定地遵循“和平共处”、“缓和东西方关系和达到两大国之间力量的平衡”的臭名昭著的政策。美帝国主义者对叛徒柯西金的热情的表白当然感到十分满意。资产阶级报刊用大字标题报道了修正主义者的“忠诚”。"},{"type":"paragraph","text":"文章指出，帝国主义者和修正主义者之间的勾结说明他们是虚弱的。各国人民正日益清楚地认识到，苏修和美帝是各国人民的不共戴天的敌人。全世界反对苏修和美帝的斗争正在日益高涨。在苏联内部和其它修正主义者当权的国家中，这种斗争也在发展。为了扑灭人民的反抗怒火，帝国主义者和修正主义者正在千方百计地加紧勾结，以镇压各国人民争取自由和独立的革命斗争，特别是反对亚洲以及世界的社会主义和革命的坚不可摧的堡垒——中华人民共和国。"},{"type":"paragraph","text":"文章最后说，不管美帝和苏修怎样煞费心机，策划什么样的阴谋诡计来阻止日益高涨的革命风暴，他们的目的是永远也不会得逞的。在各国人民强有力的打击面前，在全世界真正的马克思列宁主义力量和革命者面前，美帝和苏修必将灭亡。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b0189dee1e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
