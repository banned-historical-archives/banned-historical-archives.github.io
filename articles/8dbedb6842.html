,"dates":[{"year":1971,"month":3,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社北京七日电　新华社记者报道:在美国工人运动、黑人运动、学生运动以及美国各阶层人民反对侵略战争的斗争迅猛发展的同时，美国妇女争取解放的运动方兴未艾，有力地冲击着美国垄断资产阶级的反动统治。"},{"type":"paragraph","text":"处在美国垄断资本主义社会最底层的广大劳动妇女，长期以来受尽了压迫和剥削。垄断资产阶级对劳动妇女采取“最先解雇，最后录用”的原则，使妇女的失业率通常要比男子高出百分之四十左右。美国女工工资的微薄也是人所共知的。连美国官方也承认，在业妇女的工资平均只相当于男子的百分之五十八。美国各级政府男女雇员的工资相差将近一半，女售货员的工资还不到男售货员工资的百分之四十点五。"},{"type":"paragraph","text":"哪里有压迫和剥削，哪里就有反抗压迫和剥削的斗争。一年来，美国广大劳动妇女掀起了一场又一场争取平等权利的斗争。去年国际劳动妇女节前后，华盛顿、纽约、旧金山、长滩、芝加哥、休斯敦等二十个城市的妇女，举行了一次大规模的庆祝活动。去年八月二十六日，广大劳动妇女为了抗议性别歧视，要求同工同酬，掀起了一个波及全国的斗争高潮，数百个城市的成千上万名妇女走上街头，举行了游行示威和罢工。妇女们还举行了各种集会，散发了大量传单，揭露美国社会对妇女的歧视，愤怒控诉垄断资本家对女工的残酷压榨。许多家庭妇女也摆脱了家庭的绸绊，投入了斗争。在美国第一大城纽约，三万名妇女冲破警察设置的重重路障，在全市范围内举行了声势浩大的示威游行。"},{"type":"paragraph","text":"斗争的实践使越来越多的妇女认识到，垄断资本主义的社会制度是她们受苦受难的根源，只有推翻垄断资产阶级的罪恶统治，才能获得彻底解放。因此，她们当中的先进分子开始把斗争的矛头指向垄断资本主义制度，在斗争中喊出了“权力归人民”、“资本主义必将完蛋”等口号。为了更有效地进行斗争，美国广大妇女正在组织起来。妇女界各种进步组织纷纷出现。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8dbedb6842"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
