],"dates":[{"year":1973,"month":2,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京一九七三年二月十六日电　周恩来总理今晚举行宴会，招待美国总统国家安全事务助理亨利·基辛格博士和随行人员，以及专机机组人员。"},{"type":"paragraph","text":"应邀出席宴会的基辛格博士的随行人员中有:赫·克莱因、艾·詹金斯、理·肯尼迪、约·霍尔德里奇、温·洛德、乔·豪海军中校、理·索洛蒙、彼·罗德曼等。"},{"type":"paragraph","text":"出席宴会作陪的有:军委副主席叶剑英，外交部部长姬鹏飞、副部长乔冠华、符浩，有关方面负责人朱穆之、杨德中、马仁辉、章文晋、王海容、彭华、韩叙、朱传贤、邢仁先等。"},{"type":"paragraph","text":"周恩来总理和基辛格博士在宴会上先后祝酒，表示将根据中美上海公报的精神，致力于实现两国关系的正常化。"},{"type":"paragraph","text":"今天下午，周恩来总理、姬鹏飞部长、乔冠华副部长同基辛格博士继续举行了会谈。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"叶剑英","type":"人物"},{"name":"乔冠华","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"707f2f6531"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
