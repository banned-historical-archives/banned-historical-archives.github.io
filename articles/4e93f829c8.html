art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"彭德怀部长复信勉励","authors":[],"parts":[{"type":"paragraph","text":"北京市东郊区烈属、军属、革命残废军人和复员军人代表会议全体代表同志："},{"type":"paragraph","text":"读完了你们1月25日的来信，非常兴奋。你们的会议开得很好，作出的决议也很好。你们在决议中所说的：“在党和政府的领导下，继续发扬烈属、军属、革命残废军人和复员军人的光荣传统，在保卫祖国和建设社会主义事业中，发挥骨干作用。”这不仅应当是你们的行动公约，而且应当成为全国烈、军属和残废、复员军人的努力方向。"},{"type":"paragraph","text":"你们都曾经为革命战争和保卫祖国贡献过力量。但是你们并没有自恃有功和骄傲自满。在社会主义建设中，你们又决心用愚公移山的精神，和全区人民一起，把已经掀起的农业生产高潮推向更高峰，争取在1958年内实现每亩产粮四百斤的指标，并向北京市各郊区提出了友谊的挑战。你们这种艰苦奋斗、勇敢前进的革命精神，一定会给中国人民解放军全体同志及全国的烈、军属和残废、退伍军人带来很大的鼓舞。希望你们踏踏实实地努力，保证实现增产计划，争取生产战线上的胜利！"},{"type":"paragraph","text":"请向东郊区全体烈属、军属、革命残废军人和复员军人，并向东郊区党委、政府、合作社的工作同志和全体人民，转致亲切的敬意。"},{"type":"paragraph","text":"此致敬礼"},{"type":"paragraph","text":"彭德怀"},{"type":"paragraph","text":"2月10日"}],"alias":""},"tags":[{"name":"彭德怀","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4e93f829c8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
