hors":[],"dates":[{"year":1958,"month":7,"day":26}],"is_range_date":false,"parts":[{"text":"冯友兰对中东局势发表反动议论","type":"title"},{"text":"本刊讯　北大教授冯友兰对中东局势发表了极其恶毒的言论，他说：“朝鲜战争所以没有扩大，是因为当时西风压倒东风，优势和主动权在杜勒斯那边。杜勒斯执行的是威胁政策，他不愿战争扩大，而我们也是想打局部战争，战争就停下来了。现在苏美的力量可以对消，我们有了洲际导弹，主动权在我们手里，扩大战争对我们有利，杜勒斯不让扩大也不行，最近苏联的声明就等于最后通牒；而美国有军事基地，它也想用战争来挽救经济危机。因而第三次世界大战一定要打起来”。","type":"paragraph"},{"text":"(中央国家机关党委宣传部供稿)","type":"paragraph"},{"text":"来源：1958年7月26日新华通讯社编《内部参考》。","type":"paragraph"}],"comments":[],"origin":"美国图书馆收藏","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"朝鲜战争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"377bc2ffc0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
