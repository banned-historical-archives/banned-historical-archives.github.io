命的伟大成果，今年头两个月超额完成国家计划","authors":[],"dates":[{"year":1974,"month":3,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"革命步步前进　生产节节上升"},{"type":"paragraph","text":"广州缝纫机厂职工在批林批孔中巩固、发展无产阶级文化大革命的伟大成果，今年头两个月超额完成国家计划"},{"type":"paragraph","text":"新华社广州一九七四年三月十日电　广州缝纫机厂党委重温毛主席在无产阶级文化大革命中的一系列重要指示，狠批林彪鼓吹孔孟之道，否定无产阶级文化大革命，妄图复辟资本主义的罪行，带领全厂干部和工人坚持“抓革命，促生产”的方针，发展了革命和生产的大好形势。今年头两个月连续超额完成国家计划，产量比去年同期增长百分之八点二七，产品质量稳定提高。"},{"type":"paragraph","text":"这个厂在无产阶级文化大革命中获得了迅速的发展，去年缝纫机的产量比文化大革命前的一九六五年增长了一倍多。广大职工说：林彪反党集团妄想复辟资本主义，否定无产阶级文化大革命，我们坚决不答应！我们要用抓革命、促生产的实际行动，来巩固和发展无产阶级文化大革命的伟大成果。"},{"type":"paragraph","text":"在批林批孔斗争中，这个厂的各级领导成员纷纷到斗争第一线，同群众一起，狠抓革命，猛促生产。他们组织职工认真学习毛主席和党中央关于批林批孔的重要指示，举办批林批孔学习班培训骨干，积极发动群众投入这场斗争，集中火力，狠批林彪效法孔老二“克己复礼”，妄图复辟资本主义的罪行。全厂已经召开大小批判会五百多次。批林批孔斗争，进一步焕发了广大职工的社会主义积极性。机壳车间各工段的工人互相支援，团结战斗，使生产节节上升。电镀车间去年返工率较高。在批林批孔斗争中，这个车间的工人狠批林彪宣扬的“天才论”，坚持实践第一的观点，对质量问题进行了周密的检查和分析，终于找出了返工率较高的主要原因。他们马上组织力量攻关，使返工率迅速下降。零件五车间梭芯套组的女工比较多，二月初，由于焊接机坏了，加上梭皮螺丝供应不上，生产一度上不去。后来，工人们批判了林彪、孔老二鄙视妇女的反动谬论，决心以实际行动回击林彪、孔老二对妇女的污蔑。女工们敢想敢干，自己修好了焊接机，一人干两人的活，终于把产量赶了上去，并提前半个月完成了当月的生产任务。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"林彪","type":"人物"},{"name":"批林批孔","type":"主题/事件"},{"name":"批林批孔","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3279082f3f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
