52,"month":3,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"\u003cFONT class=imgaut\u003e朱波,钱予凡,杨锦文\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入3号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1952\\03\\5232030701.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e朱波原　文　钱予凡　改编　杨锦文　画"},{"type":"paragraph","text":"(一)大贪污犯孙建国，曾任军委后勤部供应处副主任，是被资产阶级腐蚀的干部之一。他在一九三八年参加革命。一九四八年在辽沈战役中打断了肠子，经过治疗接上了狗肠子，至今肛门仍经常流大便，当时上级拨了东北币两千万元要他休养。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入3号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1952\\03\\5232030702.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e(二)一九四九年一月孙建国在梅河县休养时，奸商王龄知道他是老干部，就假惺惺地来奉承他，劝他作“长远打算”。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入3号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1952\\03\\5232030703.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e(三)孙建国听信了王龄的话，就和王龄一起在长春开设了一个“大众油坊”。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入3号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1952\\03\\5232030704.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e(四)王龄就想进一步利用孙建国掩护自己做非法的走私活动。他和另外几个奸商商量好，想用看戏、嫖妓来引诱他。\u003c/FONT\u003e"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2d770c2aff"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
