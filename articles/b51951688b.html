art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"紧密联系实际坚持学用结合9234部队学习毛主席著作指导了当前工作","authors":["杨子才"],"parts":[{"type":"paragraph","text":"本报讯 9234部队在职干部学习毛主席著作，做到了学得好、不断线、效果扎实。他们的经验是把学习和当前的实际工作紧密联系起来，坚持学用结合的方针。"},{"type":"paragraph","text":"这个部队除了对全年干部的毛主席著作学习作了总的安排以外，在布置每项中心工作的时候，同时也布置了结合学习毛主席著作的任务。例如贯彻少而精的训练方针，他们首先从调查研究入手摸清“的”，发现主要思想障碍是强调军事科学的系统完整、怀疑少而精的做法会不会影响训练效果；然后，他们便找出“矢”，规定在贯彻训练方针中结合学习毛主席关于集中优势兵力各个消灭敌人、关于主要矛盾与次要矛盾等论述。这样，就使毛主席著作的学习变成了当前中心工作的有机组成部分。既解决了所谓工作与学习的矛盾，保证了充分的学习时间，有利于长期坚持；同时，又使学习真正落到了实处，推动了当前工作，收到了立竿见影之效。"},{"type":"paragraph","text":"为了使学习与工作结合更经常，9234部队采取了两项重要措施。首先，以领导干部组成的中心组自己先把学习和工作结合起来。每次党委会讨论重大工作时，都结合学习毛主席有关著作，对照部队情况，展开分析。经常是一项重大工作研究好了，同时布置干部应该学习毛主席哪些著作、解决工作中的什么问题，既有一套工作计划，又有指导干部学习的计划。而就领导干部本身来说，他们不仅毫不间断地坚持了每星期六上午的学习日制度，而且加上工作中的学习，学的时间、分量都比一般干部多。其次，这个部队还采用了以机关干部带动分队干部的办法，通过机关干部大批下连这个有利条件，把学习和工作综合起来。机关干部下连帮助工作的时候，都毫无例外地参加了分队干部的毛主席著作学习。在学习中，工作组一面帮助分队干部进行学习，一面运用毛泽东思想和分队干部一起分析连队工作。这就既保证了机关干部下连期间的学习不致中断，又推动了分队干部的学习，推动了连队工作的改进。"},{"type":"paragraph","text":"由于毛主席著作的学习紧密联系了当前的实际工作，9234部队的学习保持了持久的热情，各项工作也都比往年好，真正作到了学以致用。在增产节约教育中，他们学习了毛主席关于军队生产自给的论述以后，掀起了一个开荒种菜的热潮；机关整风中，后勤部门学习了毛主席的“关心群众生活，注意工作方法”，后勤干部纷纷下连帮助工作，受到连队一致好评；最近学习了毛主席关于调查研究的论述以后，党委分头深入下层解剖“麻雀”，机关干部都建立了自己的“联系班”、“联系炮”，现在，在9234部队的干部中，学习毛主席著作的习惯，已逐渐养成，处处以毛泽东思想为指针来进行工作已逐渐成为风气。  （杨子才）"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b51951688b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
