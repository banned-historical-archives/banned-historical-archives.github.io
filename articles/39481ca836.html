:["《宣教动态》"],"dates":[{"year":1959,"month":5,"day":23}],"is_range_date":false,"parts":[{"text":"为什么肿病继续上升","type":"title"},{"text":"《宣教动态》","type":"authors"},{"text":"据卫生部报告，入春以来，肿病又有上升趋势，涉及面也较广。从今年一月到目前，在山东、河南、江苏等十一个省、自治区共发生肿病一百零五万五千余人，死亡六千七百余人。其中以山东省最为严重，一月至四月十四日发生肿病病人七十七万九千余人，死亡六百一十八人，仅四月一日至十日一旬中即发生肿病病人十七万三千余人。其次是河南省，从一月到四月二十日发生肿病十五万三千余人，死亡二千余人。","type":"paragraph"},{"text":"肿病发生的原因，据各地报告有以下几点：","type":"paragraph"},{"text":"第一，口粮较紧。也有个别地区群众误以为吃盐可以增加力气，每天吃盐一两以上（正常日需三钱），因吃盐过多，引起代谢障碍发生浮肿。也有吃野菜而引起的过敏反应。","type":"paragraph"},{"text":"第二，食品种类单调，长时间未能谓节，脂肪、蛋白质严重缺乏或不平衡。","type":"paragraph"},{"text":"第三，去年患过肿病，未根治，今年复发（河南省较多）。","type":"paragraph"},{"text":"第四，原患有慢性病（如钩虫病等）、贫血、身体虚弱、年龄大、胃肠不好。","type":"paragraph"},{"text":"现各地都在采取紧急措施防治。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"39481ca836"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
