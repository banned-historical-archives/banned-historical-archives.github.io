al-archives/banned-historical-archives8/main/maoquanji8.pdf"],"article":{"title":"致林彪、鼓荣臻等电","alias":"","parts":[{"type":"paragraph","text":"致林彪、聂荣臻等电"},{"type":"paragraph","text":"（1935年11月4日）林、聂，叶，彭、李，并转周\""},{"type":"paragraph","text":"一、敌董英彬率一〇八、一〇九、一一一师有日到大白镇的，因补粮并候其一〇六师，二、三两日在大白镇未动。王以哲一一七师本日向富县进。二、我军为消灭该敌继续南进。（甲）下纵队明五号由王家坪过河，取小路经克劳、九牛塔进至桥家庄、毛家庵、塔儿上、老人仓之线宿营，准备后日进至安沟、白灵沟、林家沟之线。（乙）叶率直属队随二纵队司令部明日进至下寺湾，二纵队全部进至下寺湾、王家坪之线宿营，后日叶率直属队及二纵队准一纵队路线进至桥家庄、老人仓之线。（丙）我们本日到桥家庄，明日拟到道左铺。三、务须带足七天粮食，不得误事。"},{"type":"paragraph","text":"彭毛四日十九时"}],"authors":["毛泽东"],"dates":[{"year":1935,"month":11,"day":4}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":39,"page_end":39},"tags":[{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c40959b099"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
