art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席声明是伟大的进军号","authors":[],"parts":[{"type":"paragraph","text":"据新华社讯 东京消息：日本《毛泽东思想》月刊七月号发表文章，热烈欢呼毛主席支持世界人民反对美帝斗争的庄严声明。"},{"type":"paragraph","text":"文章说，毛泽东同志关于“全世界人民团结起来，打败美国侵略者及其一切走狗”的战斗号召，是全世界无产阶级和革命人民面临的共同的光荣的战斗任务，是伟大的进军号。"},{"type":"paragraph","text":"文章说，毛泽东同志指出：“当前世界的主要倾向是革命。”世界革命的形势一片大好。世界的命运已经牢牢地掌握在斗争中的人民的手里。印度支那三国人民的斗争同广大亚洲、非洲和拉了美洲的民族解放斗争以及北美、欧洲、大洋洲人民的革命斗争紧密结合，互相呼应，向前发展。我们衷心拥护毛泽东同志对柬埔寨以及印度支那三国人民的坚决支持。"},{"type":"paragraph","text":"文章指出，帝国主义“弱肉强食”的时代，已经一去不复返了。七十年代，是“帝国主义走向全面崩溃，社会主义走向全世界胜利”的光辉时代。"},{"type":"paragraph","text":"文章强调说，我们日本人民在这大好形势下，担负着反对美日反动派复活日本军国主义的光荣任务。这个斗争，是世界人民反对美国侵略者及其一切走狗的斗争的一环，是亚洲人民反美统一战线的一个组成部分。"},{"type":"paragraph","text":"文章说，现在我们要遵照毛泽东同志的伟大号召，展望光明的前途，为发展广大日本人民反对美帝国主义和日本军国主义的斗争，而携手奋斗！"},{"type":"paragraph","text":"美帝国主义及其走狗的寿命不长了。"},{"type":"paragraph","text":"最后的胜利必定属于战斗的日本人民！"},{"type":"paragraph","text":"战无不胜的毛泽东思想万岁！"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ab993f5c81"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
