[{"year":1982,"month":11,"day":24}],"is_range_date":false,"authors":["胡耀邦"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"中共中央统一战线工作部, 中共中央文献研究室, 新时期统一战线文献选编, 249","tags":[{"name":"民主建国会","type":"主题/事件"}],"parts":[{"type":"title","text":"给胡厥文的信"},{"type":"subtitle","text":"（一九八二年十一月二十四日）"},{"type":"subtitle","text":"胡耀邦"},{"type":"paragraph","text":"厥老："},{"type":"paragraph","text":"手惠中华职业教育社的两册资料，收悉。该社故友新秀决心继承发扬光大黄任老[1]毕生奋斗的事业，为国家加速造就人才，并且已经作出了成绩，可喜可贺。中央统战部代该会请求恢复组织和工作的报告，我尚未收到。但我以为：此种好事有统战部赞助就行，毋须等待中央批准。现在百废待兴，应多多提倡人人奋勇争先的风气，不宜层层设卡，贻误良机。尚望厥老勉励该会同仁发扬主动精神和创造性，放胆把工作推向前进。时届严冬，年高不适，望善自珍摄。"},{"type":"subtitle","text":"胡耀邦"},{"type":"subtitle","text":"一九八二年十一月二十四日"},{"type":"paragraph","text":"注释"},{"type":"paragraph","text":"〔1〕黄炎培（一八七八——一九六五），字任之，上海川沙人。一九一七年在上海创办中华职业教育社。"}],"alias":""},"tags":[{"name":"胡耀邦","type":"人物"},{"name":"上海文革","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"429fae195c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
