,"authors":["北京石油学院","武长坡"],"dates":[{"year":1957,"month":5}],"is_range_date":false,"parts":[{"text":"“杜再生——张院长、贾皞同志目中的「得力」干部”","type":"title"},{"text":"北京石油学院武长坡","type":"authors"},{"text":"武长坡：北京石油学院政治理论教研室资料室主任、政治理论教研室工会部门委员会主席","type":"paragraph"},{"text":"杜再生，这位建校办公室主任同志，在办公室的沙发上，指手划脚地指导建校绿化工作，他灵机一动，小树移来移去，说句话很容易，经费和人民遭殃。","type":"paragraph"},{"text":"奇怪的是，我院工作人员中唐山人很多，并且多由杜再生同志介绍。所介绍的人除有很多能干的工人同志之外，还有「病夫」，或来了不久，即调到一个工作[此处有二字不清]，工资又比一般工人较高的地方。例如在治安保卫委员会的王松岭（按系杜先生的亲友）。在大力精简机构的时候，某系新来一位女干部，听说姓杜，也是由他介绍来的。一般非由杜介绍来的工人不满地表示，北京石油学院成了唐山石油学院，工人中唐山来的形成一个帮派。","type":"paragraph"},{"text":"杜同志的话为什么人事部门言听计从呢？原因简单的很，一、他是张院长、贾皞同志心目得力的干部。二、人事部门为讨得领导人物的喜欢以保自己的职位，原则就置之脑后。杜由十六级跃升为十四级，理明显矣！","type":"paragraph"},{"text":"武长波的“万言书”摘录：党内也有宗派情绪","type":"subtitle"},{"text":"党内宗派情绪是有的，这表现在：以张院长、贾皞、许德贵、骆正愉、王义端、黄圣伦、吴麟祥、张献放、刘汝询、袁乃驹、陈景达等清华后起之秀在张院长、贾皞同志之前的得宠方面；你们对张院长的「三害」为何保持默言如瓶呢？仅以张院长非公坐小汽车所需汽油量来看：摆架子要官僚、主观、片面。最厉害者谁也？是张院长。你们可不作声。我以为：你们所以如此，其因有二：1、张院长者，老石油也，贾皞者，张之红人也。贾皞者后起之秀的培养者也（贾曾以此为荣哩）。此举者，在我院张系新势力成矣，大矣！2、新势力之成统治，对张贾在院职位一劳永逸也。后起之秀之拥张贾只不过是帮助张、贾达到飞黄腾达之目的也。这岂不是两全其美之举尔？","type":"paragraph"},{"text":"为什么我会产生这种看法呢？其因者三：","type":"paragraph"},{"text":"（1）可能也是由于他们的头脑发热了吧？在群众群起向人事处——阎院长官僚主义「打炮」的时候（刘永昌系由阎院长带来，群众对刘有意见，和阎院长的官僚主义联系在一起是可以理解的）但是，在这个时候，你们这些决策者，则偶然变得「冷静」起来。把阎院长、刘永昌作为你们的「替死鬼」，这是保护领导者的作法吗？","type":"paragraph"},{"text":"（2）也是因为偶然性吧！我们在五月二十三日的文章原稿把陈景达、李季、袁乃驹、方华灿、樊世忠等同志删去了，贾忽以「忠实原稿」为名，把这些同志的名字又添上去，造成我们攻击面过宽。","type":"paragraph"},{"text":"（3）在广大的教师（非党）干部中都有这种看法：许、骆、康（斌）王（义端）张（献放），刘汝洵、赵大驳等等，有何功，有何特殊才能，为何飞达如此快，贾之华众取宠，诸如人民日报文章之不够真实（夸大成绩），「培养新生力量之经验」（夸大成绩），等诸事者众皆知尔。","type":"paragraph"},{"text":"这些虽属偶然现象，但我认为这些偶然现象乃是必然现象的补充表现形式。正因如此，我们不能不得出这样一个结论：党内墙的存在，使党委会领导同志脱离群众，使某些党员滋长了特权思想，这样就影响了群众积极性的发挥。","type":"paragraph"}],"comments":[],"origin":"《北京石油学院反右派斗争资料汇集》第一辑(北京石油学院政治理论教研室编印，1957.10)，(内部参考 注意保存)。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4286f94538"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
