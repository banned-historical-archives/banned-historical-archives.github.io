建立无产阶级专政的新的权力机构是伟大的划时代事件","authors":[],"dates":[{"year":1968,"month":9,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京十五日电　东京消息:日本共产党(左派)全国协议会机关报《人民之星》十五日发表社论，热烈欢呼中国各省、市、自治区(除台湾省外)革命委员会全部成立。社论指出，这是马克思列宁主义、毛泽东思想的又一伟大胜利。"},{"type":"paragraph","text":"社论说，这一伟大胜利宣告，在占世界人口四分之一的中国，已经全面地建立了无产阶级专政的新的权力机构。这不仅对中国人民，而且对人类发展的历史，是一个伟大的划时代的事件。"},{"type":"paragraph","text":"社论指出，伟大的马克思列宁主义者毛泽东同志领导的无产阶级文化大革命，彻底地打垮了钻进中国无产阶级专政机构内部妄图复辟资本主义的中国赫鲁晓夫，粉碎了梦想在社会主义的中国复辟资本主义的美帝国主义和苏联现代修正主义的阴谋，给帝国主义、现代修正主义和各国反动派以沉重的打击，大大地加强了全世界革命人民的力量。"},{"type":"paragraph","text":"社论说，当前，世界上以社会主义中国和世界革命人民为一方，以美帝国主义、苏联现代修正主义和各国反动派为另一方，革命与反革命，进步与反动之间，展开了大搏斗。革命与进步的阵营日益强大；而反革命与反动阵营日益衰弱。美帝国主义和苏联现代修正主义妄图由美苏两大国瓜分和主宰世界，它们到处横行霸道，但是，这只能促进它们自己走向瓦解。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"94c2f4924c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
