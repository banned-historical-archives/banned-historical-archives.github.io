入人心","authors":[],"dates":[{"year":1976,"month":6,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社东京一九七六年六月二十一日电　中国上海京剧团从六月十八日起在名古屋演出中国革命现代京剧三场，受到观众的热烈欢迎。"},{"type":"paragraph","text":"爱知县知事仲谷义明等观看了演出。"},{"type":"paragraph","text":"许多观众在看了演出后表示，从中国革命现代京剧中，看到了毛泽东思想深入人心。一位名叫山崎的土木建筑工人说:“我深深地了解到革命现代京剧，是教育人民，打击敌人的有力工具。上海京剧团的访日演出，促进了日中两国人民友谊的发展。”有的观众在看了《审椅子》等短剧后说，中国人民是在阶级斗争的大风浪中锻炼成长，勇猛前进的。"},{"type":"paragraph","text":"上海京剧团在名古屋访问演出期间，会见了爱知县和名古屋市政府的负责人，并拜会了已故的日本朋友后藤钾二的夫人及其一家。上海京剧团一行还同名古屋电气学园进行了联欢和座谈。"},{"type":"paragraph","text":"上海京剧团负责人和部分团员还同名古屋日中友好记者会的朋友进行了座谈。"},{"type":"paragraph","text":"在这以前，中国上海京剧团在六月十三日和十四日在横滨市演出了两场中国革命现代京剧。京剧团团长和部分团员会见了横滨市市长飞鸟田一雄，并同横滨市一家啤酒厂的职工进行了联欢。"},{"type":"paragraph","text":"二十一日，上海京剧团返抵东京。"},{"type":"paragraph","text":"\u003cIMG alt=请插入6号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1976\\06\\766m040301.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e上海京剧团在东京举行首场演出。演出结束后，日中文化交流协会理事长中岛健藏(左二)和演员握手表示祝贺。　新华社发(传真照片)\u003c/FONT\u003e"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"上海文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"baaa542696"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
