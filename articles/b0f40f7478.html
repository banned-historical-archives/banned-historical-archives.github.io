":[{"year":1996,"month":10,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　《毛泽东读书笔记解析》日前由广东人民出版社出版，为一般读者了解和认识毛泽东提供了一个新的角度，展示出一个“书斋里的毛泽东”形象。"},{"type":"paragraph","text":"这部上下两册的书收集范围全，以准确性、文献性为材料的编选原则，叙述方式和语言表达朴实、生动。在编写体例上，每个条目包括原文摘引、毛泽东读书的笔记和谈话及注解分析三个部分。这部书使人们从毛泽东读书的角度了解他的个性情趣，特别是他联系实际而不为书所拘的读书方法。这部书成稿后，由国家新闻出版总署转送中共中央有关部门审稿，一些毛泽东研究专家参加了工作，体现出广泛汇集、严肃选取、客观解析的特点。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b0f40f7478"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
