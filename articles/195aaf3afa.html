["北京市","金萃"],"dates":[{"year":1957,"month":6,"day":1}],"is_range_date":false,"parts":[{"text":"“资本家帽子可以一律摘掉”","type":"title"},{"text":"北京市金萃","type":"authors"},{"text":"（金萃：原名吴金萃，北京公私合营裕生祥电机厂副厂长）","type":"subtitle"},{"text":"吴金萃认为公私合营牌子可以摘掉，改国营；资本家帽子可以一律摘掉","type":"subtitle"},{"text":"在中央统战部召开的工商界座谈会上他说：公司合营的牌子可以摘掉，改国营，现在是“合资”不是“合营”，因为人既不一定在本企业，即使在企业的，也是大问题上级决定，小问题公方领导，私方只是作“公职工作”，谈不上经营，更没有为私人利润而经营的剥削实质。他认为资本家的帽子可以一律摘掉。因为从一九四九年到一九五五年是七年，我们已经取得了四分之三社会主义，一九五六到一九五七这两年进步得更快，完全可以取得那四分之一，落得个四分之四。（六月一日人民日报）","type":"paragraph"}],"comments":[],"origin":"《摆出来，大家看》（电力部团委会办公室编印，1957年6月）。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"195aaf3afa"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
