往码头热烈欢送","authors":[],"dates":[{"year":1974,"month":4,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社成都一九七四年四月十六日电　以乔森潘副首相为团长、英·萨利特别顾问为副团长的柬埔寨民族统一阵线和王国民族团结政府代表团，结束了对四川省的友好访问，今天上午乘船离开重庆。陪同代表团参观访问的叶剑英副主席、韩念龙副部长也同船离开重庆。"},{"type":"paragraph","text":"四川省和重庆市党、政、军负责人严政、段君毅、鲁大东、钱敏等以及革命群众两千多人，前往重庆港码头热烈欢送贵宾。"},{"type":"paragraph","text":"今天，山城重庆阳光灿烂，长江之滨红旗飘扬，嘉陵江畔锣鼓喧天。青少年们在重庆港码头上，挥舞花束和彩带，载歌载舞，高呼口号，热烈欢送柬埔寨战友。当贵宾们乘车通过市区时，聚集在街道两旁的成千上万群众向他们热烈鼓掌，表示欢送。"},{"type":"paragraph","text":"贵宾登上轮船前，宾主一起在重庆港码头合影留念。随后，乔森潘副首相、英·萨利特别顾问等同前来送行的省、市负责人亲切握手，热烈拥抱。挂满彩旗的轮船在一片欢呼声和锣鼓声中离开港口，柬埔寨贵宾们在船上长时间向欢送的群众挥手告别。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"四川文革","type":"人物"},{"name":"重庆文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0f12f7f51c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
