申"],"dates":[{"year":1995,"month":5,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"△马文革收到天津体委系统2000多名干部的鼓励信，并送上一块手表和666元慰问费，意在鼓励他珍惜在家乡门口参加世乒大赛的分分秒秒，六六大顺。据悉，此次大赛结束后，马文革将赴德国打球半年，他的妻子将伴随同行。"},{"type":"paragraph","text":"△在新闻中心，打电话时间最长的不是新闻记者，而是中国乒乓队的选手，只要比赛一结束，他们便赶紧跑到记者工作室，拿起直拨电话给亲朋好友打电话“通报消息”，并尽量使用方言，让外人难以“听清”，一般一次要打半小时以上。好在电话多，记者们倒没什么意见。"},{"type":"paragraph","text":"△尽管韩国选手刘南奎昨天“一败涂地”，但天津的球迷决不以一时的胜负论英雄。今天晚上，观战席上的刘南奎走出比赛馆时，三位十八、九岁的天津姑娘紧追不舍，她们手里拿着纪念封和笔请他签名。尽管刘南奎连连摆手“企图”谢绝，但在其中一位戴眼镜的姑娘足足100米距离的贴身紧逼下，刘终于为她签上了大名。"},{"type":"paragraph","text":"△倪夏莲是前中国乒乓球队的混双世界冠军。这次率卢森堡队前来天津后，她会见了许多新朋旧友。倪夏莲已经是3岁孩子的母亲，看上去人瘦了许多，不再是以前的“小胖墩”。倪夏莲在世界排名第60位，按理说可列入单打种子选手。但有关方面将她“遗漏”了，让她从预赛打起。有人为她打“抱不平”，倪夏莲笑着说:“在中国，我服从决定。”"},{"type":"paragraph","text":"本报记者　马申　宋丽珍"},{"type":"paragraph","text":"(本报天津5月11日专电)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"天津文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3faa797e1b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
