<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"浙江诸暨县立初级中学发生无组织无纪律现象","authors":[],"dates":[{"year":1952,"month":7,"day":5}],"is_range_date":false,"parts":[{"text":"浙江诸暨县立初级中学发生无组织无纪律现象","type":"title"},{"text":"4月初旬，浙江诸暨县县立初级中学错误地在校内开展了一个“反偷窃”运动，运动中普遍发生逼供现象，严重地违背了中央关于在学校中进行思想改造指示中的原则精神。","type":"paragraph"},{"text":"诸暨县立初级中学共有学生380人，其中16岁以下的占244人。学校中长期存在着偷窃及占小便宜的风气，学生普遍要求杜绝此种不良作风，校方也曾设法防止，但未生效。4月初旬，该校秋三班失窃新民牌钢笔3枝，经查出为该班学生金国铭所偷。该校团支委会及行政方面因受社会上三反运动特别是“打虎”斗争的影响，想藉此在全校开展一个大规模的“反偷窃”运动，乃以秋三班为典型，召开坦白检举大会，并吸收其他班级代表参加。该班级任教师并提出“不获全胜，决不收兵”的口号，当金国铭被逼下跪时（后又被捆绑并加殴打），团支书又喊出“不坦白打死你，坐牢大家去”的口号。于是错误的“反偷窃”运动就迅速地在全校展开，各班级任教师亲自动员布置，团员愈多的班级，“斗争”也愈剧烈。团员很少的班级见其他班都展开“斗争”，也硬找了一个学生，强迫他承认曾在学校后园子里偷摘樱桃吃，罚他下跪并加以捆绑。“反偷窃”运动从骂、跪开始，到后来竟发展到捆绑、打耳光、集体殴打、“打康乐球”等。这一运动告一段落后，该校接着又转入以“反对资产阶级腐朽思想”为主的“思想改造运动”，除斗争了一些有“反动思想”及落后同学外，打击面还扩大至一擦雪花膏的女同学，说她“有资产阶级腐朽思想”、“恋爱观点不正确”，因而被斗争下跪。面对这种情况，校方惟恐“反到自己头上”而袖手旁观，团支部怕同学说“立场不稳”而跟着群众做尾巴，致使整个学校陷入混乱状态，干部无心工作，学生学习情绪不安。运动前后历时一月光景才经县委发现而制止（已作适当处理）。运动中被斗学生计41人，罚跪16人，被吊4人，被打4人，被管制5人，逃跑6人（中有1人下落不明）。社会舆论很坏。","type":"paragraph"},{"text":"产生以上错误的原因，主要由于该校行政和团支部方面不了解学生工作的基本问题在于思想教育，因而轻率地发动运动，企图以“斗争”的方式纠正长期存在于学校中的不良风气，以致造成混乱局面，使教育工作受到严重损害。对于初中学生和小学学生，只应着重正面的爱国主义教育和新道德的教育，除个别屡犯偷窃行为而不改的学生须由校方作适当处理外，一般犯有偷窃行为或占小便宜的学生应从加强教育来解决。诸暨县立中学的教训值得各地警惕。今后为了防止类似现象发生，希各地党委宣传部门加强对学校工作的领导，严格执行请示报告制度。","type":"paragraph"}],"comments":[],"origin":"中共中央宣传部《宣传通讯》1952年第22期。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d3afd4f029"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
