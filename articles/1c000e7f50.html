<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"毛泽东思想指挥战斗——拥军爱民故事两则","authors":[],"dates":[{"year":1970,"month":2,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛泽东思想指挥战斗"},{"type":"paragraph","text":"——拥军爱民故事两则"},{"type":"paragraph","text":"在危急关头"},{"type":"paragraph","text":"在八一八四工地上，传颂着一个军爱民，民拥军的动人故事。"},{"type":"paragraph","text":"一天凌晨，战斗在八一八四工地上的解放军某部战士李庆有，推着运渣斗车从洞口飞跑出来，在离倒渣台十几米远的轨道上停住了车。他刚把车停稳，忽听背后有人在喊。李庆有回头一看，一辆满载石渣的斗车，象脱缰的野马顺着坡势直冲下来。车上的工人一边拚命地踩着失灵的车闸，一边向前面车上的人连声呼喊：“快跳车！快跳车！”李庆有马上意识到：一场严重的撞车事故就要发生。如果跳车，自己虽然脱险了，但斗车相撞就会从七米多高的倒渣台上翻下去，在倒渣台下工作的工人，就有生命危险。怎么办？“为人民利益而死，就比泰山还重”。毛主席的伟大教导使李庆有下定决心：为了保护工人的生命安全，就是粉身碎骨也要把车刹住，堵住冲下来的斗车！"},{"type":"paragraph","text":"在这万分危急的关头，李庆有站在斗车上岿然不动，双脚死死踩着车闸，使出全身力气拚命刹车。只听“咔嚓”一声，猛冲下来的斗车撞到李庆有的斗车上，速度减慢了。李庆有腰部负伤了。但是危险还没有完全解除。斗车由于冲力太大，没有立即停住。尽管李庆有拚命地抓住刹车，两辆斗车顺着坡势仍然继续往下滑去。"},{"type":"paragraph","text":"这一切，被站在前面斗车上的民工毕崇刚看在眼里，他想：“为了保护亲人解放军，就是自己牺牲了也值得。有我毕崇刚，就决不能让解放军战士有个好歹！”于是，他用尽全身力气刹闸堵车。一声巨响，顺坡滑下来的斗车和毕崇刚的斗车撞在一起，毕崇刚左腿负了重伤，鲜血不住地流。这时，三辆斗车还是继续向下滑去，眼看就要冲出倒渣台。在这千钧一发的时刻，毛主席关于“下定决心，不怕牺牲，排除万难，去争取胜利”的伟大教导，给毕崇刚增添了无穷的力量。他咬紧牙关，忍着剧痛，使劲往下一蹲，用右腿把车闸死死地刹住了。三辆斗车停住了，一场严重事故终于避免了。　本报通讯员"},{"type":"paragraph","text":"他们想到一起了"},{"type":"paragraph","text":"一天深夜，天下着大雨。江苏省射阳县宁海公社奤套大队第四生产队贫农陈大爷的大女儿陈昌花，在床上翻来复去怎么也睡不着。她想：“今天解放军到这里执勤，天黑雨大，同志们巡逻时可能会碰到困难。”她越想越放不下心，翻身起了床，又推了推酣睡的妹妹昌芳。昌芳今年才十六岁，前几天刚刚参加民兵。没等姐姐说完，小昌芳就表了态，坚决跟解放军一块去巡逻。"},{"type":"paragraph","text":"姐妹俩穿好衣服，背起枪，大步向民兵营走去。她们走到村西头，隐约发现前面岔路口有个人也在向西走去。追上一看，是基干民兵陈昌良。原来，昌良也是前往营部要求去配合解放军巡逻的。三个小陈，一个心眼，排成了一路纵队，向着营部跑去。"},{"type":"paragraph","text":"这时，在营部值班的民兵干部，也正在考虑派一个战斗小组去协助解放军巡逻，正好三个小陈主动找上门来了。他激动地说：“好哇，大家都想到一块啦！”接着就发出了“出发”的命令。"},{"type":"paragraph","text":"这一夜，陈昌花带领着一个民兵战斗小组，和解放军战士们冒雨巡逻了七个钟头。他们一面以警惕的目光巡视着海面，一面向战士们介绍附近一带的地形，以及当地人民解放前后在海滩上和敌人斗争的光荣历史。战士们一个个紧握枪杆，激动地说：“军民团结如一人，试看天下谁能敌？”"},{"type":"paragraph","text":"本报通讯员"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1c000e7f50"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
