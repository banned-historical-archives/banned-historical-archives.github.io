art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席最新指示是教育革命最锐利武器","authors":["第二炮兵医校无产阶级革命派"],"parts":[{"type":"paragraph","text":"我们的伟大领袖毛主席发出了无产阶级教育革命的最新指示：“进行无产阶级教育革命，要依靠学校中广大革命的学生，革命的教员，革命的工人，要依靠他们中间的积极分子，即决心把无产阶级文化大革命进行到底的无产阶级革命派。”伟大领袖毛主席对我们无产阶级革命派这样信任，我们一定要以最大的努力完成这个光荣而又伟大的历史任务。"},{"type":"paragraph","text":"学校是培养接班人的地方。无产阶级要通过学校来培养无产阶级革命事业的接班人，资产阶级也要通过学校来培养他们的接班人。无产阶级和资产阶级在教育战线上的阶级斗争一直是很激烈的。"},{"type":"paragraph","text":"毛主席教导我们说：“学制要缩短，教育要革命，资产阶级知识分子统治我们学校的现象，再也不能继续下去了。”经过一年多来的无产阶级文化大革命，我们对毛主席的这一教导理解更深刻了。中国赫鲁晓夫为了实现其复辟资本主义的阴谋，顽固推行了一条资产阶级、修正主义的教育路线，猖狂地反对教育为无产阶级的政治服务，反对活学活用毛主席著作，不准在教材中选用毛主席语录。相反却让一些资产阶级反动“权威”、“名流”，肆无忌惮地推销资产阶级、修正主义的黑货来毒害学生。妄图使学生两耳不闻窗外事，一心只读业务书，走白专道路，变成资产阶级接班人。居心十分险恶。"},{"type":"paragraph","text":"我们无产阶级革命派决心在毛泽东思想的指引下，彻底砸烂几千年来从孔夫子到中国赫鲁晓夫的剥削阶级的教育制度，把我们学校建成一个完全新型的毛泽东思想大学校。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"教育革命","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"151742cbe1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
