ticle":{"title":"最高人民法院关于处理私房社会主义改造中房屋典当回赎案件中的两个问题的批复","dates":[{"year":1988,"month":9,"day":8}],"is_range_date":false,"authors":["最高人民法院"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"上海市房屋土地管理局上海市房地产业协会, 上海房地产管理文件汇编(1949-1997)下卷, 2016-2017","tags":[{"name":"房地产","type":"主题/事件"},{"name":"民法","type":"主题/事件"},{"name":"社会主义改造","type":"主题/事件"}],"parts":[{"type":"title","text":"最高人民法院关于处理私房社会主义改造中房屋典当回赎案件中的两个问题的批复"},{"type":"subtitle","text":"法〔研〕复（1988）37号"},{"type":"paragraph","text":"山东省高级人民法院："},{"type":"paragraph","text":"你院鲁法（民）发（1988）10号《关于处理房屋典当回赎案件中几个问题的请示报告》收悉。经研究，并商得中华人民共和国建设部的同意，现答复如下："},{"type":"paragraph","text":"一、 人民法院处理有关私房社会主义改造中的房屋典当回赎案件，仍应参照国家房产管理局（1965）国房局字105号《关于私房改造中处理典当房屋问题的意见》办理，但此类房屋典当题比较复杂，政策性强，各地在执行中可根据具体情况，区别对待。如出典的房屋在改造前未回赎；改造中产权已转移给国家，改造后不准回赎；如出典的房屋没有被改造，产权未转移给国家，应按（1965）国房局字105号文件中关于“今后对于出典房屋一般仍应按照典当关系处理”的规定和最高人民法院（1984）法办字第112号《关于贯彻执行民事政策法律若干问题和意见》第（1958）条的规定，以及最高人民法院近几年来对此条规定所作的解释处理。"},{"type":"paragraph","text":"二、 最高人民法院（1984）法办字第112号《关于贯彻执行民事政策法律若干问题的意见》第（1958）条第二款规定：“典期届满逾期十年或典期未载明期限经过三十年未赎的，原则上应视为绝卖”。人民法院处理未被改造的出典房屋纠纷案件，对于已超过上述规定回赎时效的，应确认房屋产权为承典人所有；对于未超过规定回赎时效的，应准予出典人回赎。"},{"type":"subtitle","text":"一九八八年九月八日"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6fb8ecfdf9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
