ical-archives/banned-historical-archives0/main/maoquanji49.pdf"],"article":{"title":"关于“三相信、三依靠”的指示","alias":"","parts":[{"type":"paragraph","text":"关于“三相信、三依靠”的指示川"},{"type":"paragraph","text":"（1967年3月20日）这是一个好报告。"},{"type":"paragraph","text":"一、依靠群众。这一点是主要的。我们都是从群众中来的嘛！群众就是工农兵学商。中央办公厅所属的干部都是群众嘛！工作主要是群众做的，靠少数领导人是不行的，也是不够的。那样也不能离开群众，要有群众观点。"},{"type":"paragraph","text":"二、依靠军队。我们的军队不仅会打仗，而且会做群众工作、宣传工作、生产工作等。军队内的很多干部很小参加军队，很少读书，文化是在部队慢慢提高的，思想比较单纯。军队和地方不同，没有地权，没有财权，说走就走了。省里有地盘，军队没有地盘，军队还有条组织纪律性强，行动快。如沈阳军队支左、支工、支农的经验，中央批转以后，全军在二十一天内就行动起来了。如果是地方传来传去，行动很慢。"},{"type":"paragraph","text":"三、依靠干部。干部绝大多数是好的，很多事让干部去办，政策靠他们去执行，有些省委书记要很快解放出来，要他们好好检讨。有的省委书记犯了错误，就是因为他们害怕群众，动员一些群众去保护他们，结果害了自己。"},{"type":"paragraph","text":"[1]这是毛泽东听了林彪3月20日在军级以上干部会议上的讲话后的指示。"}],"authors":["毛泽东"],"dates":[{"year":1967,"month":3,"day":20}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":374,"page_end":374},"tags":[{"name":"毛泽东","type":"人物"},{"name":"军队支左","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"16973b5de8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
