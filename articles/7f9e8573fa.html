art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"人人负责 敢想敢讲叶剑英元帅在0937部党代会作重要讲话","authors":[],"parts":[{"type":"paragraph","text":"本报讯 12日上午，叶剑英元帅在0937部队党代表大会上，向全体代表作了重要讲话。"},{"type":"paragraph","text":"叶剑英元帅首先要求每个解放军军人要在现有装备的基础上，掌握手中武器，钻研技术，钻研战术，在合成军队的建设上，要很好地运用合同战术。他说，每个军官要多学一些本领。合成军队的军官要学会各特种兵的专业知识。如果指挥员对空军的知识知道得少，就不能指挥空军；对炮兵知道得少，就不能指挥炮兵。指挥员脑子里只有陆军知识，没有海军和空军知识，他的战术思想就没有合成，就不能指挥合成军队。因此，对特种兵不能忽视。他强调地说，每一个特种兵都有它的专门知识，合成军队必须先有专，后有合，没有专就不能合，只专不合也不行。"},{"type":"paragraph","text":"叶剑英元帅强调说，为了使军队建设多快好省，就必须挖掘一切潜在力量。每个人都要对社会主义建设负责，要做到人人负责，敢想敢讲，提出合理化建议，互相学习，互相帮助。这样，先进的落后的都动员起来了，就能促进工作不断地向前发展。他说，近几年来，在一些军官当中产生了一种骄傲自满情绪。由于他们自己放松了自我改造，不能接受别人的帮助和新鲜事物，别人都大踏步地跃进，他却背着很沉重的包袱落后了。这一点很值得大家警惕。"},{"type":"paragraph","text":"叶剑英元帅说，双反运动后，人的精神面貌变了，朝气来了，干劲足了，现在应当采取措施，把干劲巩固起来，坚持下去。各级领导必须注意发扬社会主义民主，工作要有节奏。为此，他要求各级领导干部，经常了解部队情况，要深入贯彻社会主义民主，使群众对社会主义建设负责，对事情敢提意见，敢于思想，敢于批判。通过群众社会主义积极性的发扬，使我们的工作做得更多更快更好更省。"}],"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7f9e8573fa"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
