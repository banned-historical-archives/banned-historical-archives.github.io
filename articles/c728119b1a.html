art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"彭德怀元帅重申解放台湾坚定立场巴卢库上将警告美帝小心丢掉脑袋","authors":[],"parts":[{"type":"paragraph","text":"本报22日讯 应邀来我国访问的阿尔巴尼亚军事代表团，在部长会议第一副主席兼国防部长巴卢库上将率领下，今天下午乘飞机到达北京。"},{"type":"paragraph","text":"他们在机场上受到彭德怀元帅、聂荣臻元帅，黄克诚大将、肖华上将，张宗逊上将等及陆海空军军官的热情欢迎。"},{"type":"paragraph","text":"巴卢库上将由彭德怀元帅陪同检阅了仪仗队。"},{"type":"paragraph","text":"彭德怀元帅致词欢迎来自欧洲保卫和平前哨的亲密战友。他说，中阿两国人民及其军队紧密地团结在以苏联为首的社会主义阵营之内，为和平为社会主义而共同奋斗。"},{"type":"paragraph","text":"彭德怀元帅强调指出，美帝国主义对我国的战争挑衅和军事威胁，激起了中国人民和全体解放军官兵的无比愤怒。我军官兵完全拥护周恩来总理和陈毅外长的声明。中国人民解放台湾和沿海岛屿的坚定立场是不可动摇的，如果美帝国主义不立即停止其在台湾地区的军事挑衅，胆敢把战争强加在我国人民头上，中国人民和中国人民解放军将和过去反抗日本军阀一样，奋起与美帝国主义作战。"},{"type":"paragraph","text":"巴卢库上将在讲话中说：我们来到你们伟大而美丽的国家，是为了了解兄弟般的中国人民在建设社会主义事业中所取得的巨大成就，为了了解中国人民解放军官兵们的工作和生活。我们相信，阿尔巴尼亚军事代表团的访问，将有助于加强我们两国人民和武装力量之间的兄弟般的友谊联系。"},{"type":"paragraph","text":"他严厉地谴责了南斯拉夫的叛徒行为。"},{"type":"paragraph","text":"巴卢库上将表示坚决支持中国政府关于台湾局势的声明。他指出，美帝国主义的军事挑衅，军事冒险和玩弄原子武器，恫吓不了任何人，更恫吓不了在为解放自己的不可分割的合法的领土部分——台湾的伟大的中国人民。如果它们胆敢伸出罪恶之手来反对中华人民共和国，那么它们必将在这一罪恶的毫无出路的道路上丢掉脑袋。他表示将对中国人民解放自己的领土台湾和沿海岛屿的神圣斗争，给予兄弟般的有力支持。"},{"type":"paragraph","text":"到机场欢迎贵宾的，还有外交部副部长姬鹏飞。"},{"type":"paragraph","text":"阿尔巴尼亚驻我国大使巴利里和各国驻华武官也到机场欢迎。"}],"alias":""},"tags":[{"name":"彭德怀","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c728119b1a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
