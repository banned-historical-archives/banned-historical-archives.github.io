<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoistlegacy.de-2095","name":"关于整顿和加强对地富反坏分子监督改造工作的意见","author":"北京市公安局","internal":false,"official":false,"type":"unknown","files":[],"article":{"title":"关于整顿和加强对地富反坏分子监督改造工作的意见","dates":[{"year":1978,"month":4}],"is_range_date":false,"authors":["北京市公安局"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"北京市公安会议参阅材料 (MLC, DA387)","tags":[{"name":"地富反坏","type":"主题/事件"},{"name":"四类分子","type":"主题/事件"},{"name":"摘帽","type":"主题/事件"}],"parts":[{"type":"paragraph","text":"机密"},{"type":"paragraph","text":"北京市公安会议参阅材料之四"},{"type":"title","text":"关于整顿和加强对地富反坏分子监督改造工作的意见"},{"type":"paragraph","text":"地富反坏分子是我国现阶段的专政对象。依靠人民群众的力量，加强无产阶级专政，把绝大多数四类分子改造成为新人，是公安机关的一项重要任务，也是减少反革命和刑事犯罪案件的一项重要措施。但是，这些年来，由于“四人帮”及其在公安局的黑干将刘传新的干扰破坏，造成了四类分子底数不清，定性不准，有无帽子不明，法律手续不健全，执行政策也较为混乱，放松了对四类分子的监督改造工作。为了进一步加强对敌斗争，落实群众专政，根据全国第十七次公安会议的精神，我们要继续深揭狠批“四人帮”及其黑干将刘传新的罪行，分清路线是非，肃清流毒，大力推广浙江省诸暨县枫桥区的经验，认真整顿对四类分子的监督改造工作，充分发动和依靠群众，有效的打击和分化改造敌人。把对四类分子的监督改造工作切实加强起来，保卫华主席、党中央和首都的安全。为此，对整顿和加强监改工作，提出以下意见。"},{"type":"paragraph","text":"一、认真清理四类分子底数，搞准专政对象。"},{"type":"paragraph","text":"今年内要对四类分子进行一次全面清理，派出所要认真汇集和详细审阅四类分子档案材料，深入发动群众，搜集了解表现，摸清每个四类分子的情况，逐个进行复查，要按照党的政策，搞清三个问题：一是把定性搞准确。要根据一九五〇年政务院“关于划分农村阶级成份的决定”和参照一九五六年中央十人小组“关于反革命分子和其他坏分子的解释 及处理的政策界限的暂行规定”以及一九五七年中央十人小组对此暂行规定的“补充解释”等有关规定，研究确定。定性搞错了的，要实事求是地纠正过来。二是把有无帽子搞准，搞清楚。对判处缓刑，管制，剥权过期的四类分子以及原来批示意见不明确有无帽子的四类分子，要根据其问题性质和表现，进行分析研究，分别不同情况，确定代不代帽子。对代着帽子的四类分子，确实改造好了的，可以摘掉帽子。对没有代着帽子的四类分子，坚持反动立场，表现坏的，要代上帽子。三是把法律手续搞健全。根据一九七二年中央四十五号文件和全国第十七次公安会议精神，四类分子的定性、摘代帽子，必须经区县革委会批准，未经法定机关批准的一律无效。凡是不合法定手续的四类分子，要重新依法补办手续。通过清理，确实搞清楚谁是代着帽子的，谁是摘了帽子的，要逐人填表登记，建立档案。漏管的一定要管起来，对外逃的四类分子要追查清楚下落。对现在社会上代着反革命帽子的原国民党军政人员，要搞清县团以上和区营以下的人数和情况。"},{"type":"paragraph","text":"二、放手发动群众，普遍进行评审"},{"type":"paragraph","text":"对这次清理认定下来的代着帽子的地富反坏分子，要在各级党委领导下，紧密结合党政中心工作，放手发动群众。认真组织群众评审，对有破坏活动的四类分子要开展批判斗争。事前，要作好充分准备工作，切实掌握他们的历史罪恶和现实表现，明确评审重点。一般一个群众会，评审一个四类分子，也可以选择不同的好坏典型，同时评审几个四类分子。对表现很坏，有破坏活动的，要开展说理斗争，揭露和批判他们的罪行，打击敌人的反动气焰；对认罪守法，表现好的，要给予适当鼓励；对经过长期考察确实改造好了的，可以依法摘掉帽子，全面体现政策，有效的促进敌人分化改造。今后，对代着帽子的四类分子，要坚持月考、季评、年升降的制度，每年结合“五一”、“十一”、春节保卫工作进行三次认真评审，使监改工作经常化、制度化。"},{"type":"paragraph","text":"三、整顿监督改造小组，落实监改措施。"},{"type":"paragraph","text":"在评审的基础上，要落实毛主席“关于几个好人中夹一个坏人，这就专了政”的教导，对代着帽子的四类分子。都要整顿和恢复监改组织。凡是监改小组已取消了的，要迅速建立起来；小组成员有缺额的，要充实补齐。原则上一个小组包一个四类分子，每个小组要保持五至十人。对在内部工作的四类分子，要在住家地和服务地都建立监改小组，实行“两头包，双主动”。监改小组成员应以工人、贫下中农为主体，适当吸收一些内部职工参加。要把监改小组的工作活跃起来，对四类分子坚持实行“三包一保证”，即：由监改小组包政治教育，包监督劳动，包予防破坏，责令四类分子订出改造自己的保证书，定期检查和汇报。监改小组要坚持每半月碰头一次，研究四类分子改造情况，交流工作经验。对监改小组成员，要加强政治思想教育和政策业务教育，提高他们的对敌斗争本领，使监督改造小组真正做到：“组织、措施、任务”三落实。"},{"type":"paragraph","text":"四、正确执行党的对敌斗争政策，促进分化改造"},{"type":"paragraph","text":"对地富反坏分子的监改工作、必须实行“监督劳动与政治教育相结合，惩办与改造相结合”和“给出路”的政策。政治上严格实行监督改造，经济上实行同工同酬。对四类分子严禁打骂、体罚、侮辱，坚决废除法西斯式的审查方式。对四类分子子女，要认真贯彻党的有成份论，不唯成份论，重在本人政治表现的政策，政治上不歧视，坚决纠正让四类分子的子女代替四类分子参加会议，出义务工等违反政策的做法。做好争取教育工作，化消极因素为积极因素。"},{"type":"paragraph","text":"五、搞好计划安排，加强领导"},{"type":"paragraph","text":"整顿和加强监改工作，是公安工作中的一项重要任务，是政策性很强的一项工作，必须加强领导，确实抓紧、抓好。各分局要根据自己的情况，制定出具体的计划，报经区委批准。工作中，要组织大家深入学习全国第十七次公安会议文件及有关政策界限的规定，统一思想认识，明确这次整顿监改工作的目的意义，要求和做法，做好充分准备，清理整顿监改工作，要先行试点，然后再全面铺开，各分局要有一位主要领导同志主管这项工作。领导要经常深入基层。进行督促检查和指导，掌握全盘工作情况，及时解决工作中的问题，防止发生偏差。这项工作，要求在年底以前搞完，工作结束后，各分局要向市局写出总结报告。"},{"type":"subtitle","text":"一九七八年四月"}],"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8415098528"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
