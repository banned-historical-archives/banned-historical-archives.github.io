al-archives/banned-historical-archives8/main/maoquanji8.pdf"],"article":{"title":"关于坚持联合抗日不为谣言所动致王以哲、张学良电","alias":"","parts":[{"type":"paragraph","text":"关于坚持联合抗日不为谣言所动"},{"type":"paragraph","text":"致王以哲、张学良电"},{"type":"paragraph","text":"（1936年2月19日）王以哲，并转张学良勋鉴："},{"type":"paragraph","text":"最近情况："},{"type":"paragraph","text":"（甲）冀察政委会实际上已成为第二愧儡政府，南京已决定成立绥省内蒙古各盟旗地方自治政委会，这就等于将绥远出卖给日本。包头、五原等地日人已遍设特务机关，日本军人到处活动，山东、山西正循着冀察绥之亡国道路前进，华北五省首先变为华北国亡基础。"},{"type":"paragraph","text":"（乙）日本灭亡中国之一切行动，均得南京政府蒋介石之赞助与拥护，希望其起抗日实无异于与虎谋皮，贵军与军之联合抗日号召全国，必为蒋贼等所深恨，造作谣言，以中伤破坏两方面之团结，实意中事。"},{"type":"paragraph","text":"（丙）希望贵方不为奸人谣言所动、威利所屈，坚持联合【抗]日之立场，则他胜幸甚，但对于蒋贼之阴谋暗算，须切实严防，将派李克农即日赴洛川，面谈一切，望接洽。"},{"type":"paragraph","text":"彭德怀　毛泽东"},{"type":"paragraph","text":"十九日"}],"authors":["毛泽东"],"dates":[{"year":1936,"month":2,"day":19}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":243,"page_end":243},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8345ade664"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
