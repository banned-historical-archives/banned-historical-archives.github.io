"authors":[],"dates":[{"year":1958,"month":8,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席视察河南农村"},{"type":"paragraph","text":"连声称赞人民公社棉花长得好：“有这样一个社，就会有好多社。”"},{"type":"paragraph","text":"新华社郑州11日电　毛泽东主席在8月6日到8日视察了河南农村。"},{"type":"paragraph","text":"毛主席在河南省视察了新乡县七里营人民公社的社办工业和棉田；襄城县梁庄、薛元等农业社种植的烟叶和谷子；长葛县“五四”农业社的玉米田和商丘县道口乡中华农业社种植的红薯和稻子。当毛主席在这些地方视察的时候，干部和群众都向毛主席热烈欢呼，并且争着向毛主席报告农业社发展、巩固的情况和农业大丰收的情况。毛主席在视察时同群众进行了亲切的谈话。陪同毛主席进行视察的有中共河南省委第一书记、河南省省长吴芝圃，中共河南省省委书记处书记杨蔚屏、史向生以及有关地、县、乡的党委负责同志。"},{"type":"paragraph","text":"6日下午，毛主席到达新乡县七里营乡。这里的人民按照毛主席指示的道路，已经在全乡农业合作化的基础上建立了七里营人民公社。毛主席询问了这个公社的情况，并且参观了这个公社的托儿所、“幸福院”、食堂、面粉加工厂、滚珠轴承厂，又到田间观看了棉花的生长情况。毛主席和在“幸福院”里过着晚年幸福生活的老年人握手，并且谈了话。在滚珠轴承厂里，毛主席详细地观看了用土法生产滚珠轴承的过程，他对这个小工厂在两天时间里就生产出五千多滚珠极为称赞。毛主席对于田间一望无际长得特别好的棉花感到特别高兴。毛主席走到正在棉花地里喷射杀虫药剂的女社员面前提议说：“作作给我看看”，六个女社员兴高彩烈地给毛主席作了表演。毛主席走进了齐肩高的棉花地，棉花的果枝上棉桃成串，他连声称赞棉花长得好。毛主席从棉花地里走出来向社干部说：“像这样的棉花有多少”？社长王文生说：“七里营生产队一万零五百亩，有五千多亩是这样的。每亩保证皮棉一千斤，争取两千斤。”毛主席笑着向吴芝圃说：“吴书记，有希望啊！　你们河南都像这样就好了。”吴芝圃说：“有这么一个社就不愁有更多这样的社”，毛主席说：“对！有这样一个社，就会有好多社”。"},{"type":"paragraph","text":"毛主席在襄城县的梁庄农业社、十里铺乡薛元农业社等地观看了烟叶和谷子生长的情况。这里种的云南多叶烟，已经长到一人多高，每棵有七十多个叶，每亩计划产三万斤。毛主席高兴地走到烟叶地里，仔细地观看了烟叶的生长情况，并向梁庄农业社的党支部书记张富德等详细询问了烟叶的种植和收获等方面的问题。"},{"type":"paragraph","text":"在长葛县“五四”农业社，毛主席观看了长得很好的麦茬玉米。这里有四十亩密植麦茬玉米，已经长到六尺多高，计划亩产两万斤，附近的另一块干部玉米试验田长得更好，计划亩产两万五千斤。毛主席称赞了这些生长良好的玉米。毛主席问县委书记吕炳光今年的产量，吕炳光说：“保证一千五百斤，争取两千斤。”毛主席笑着问：“能达到吗？”吕炳光满怀信心地说：“一定达到，秋后到北京给主席报喜。”"},{"type":"paragraph","text":"在商丘县道口乡中华农业社“七一”试验站，毛主席看到了架秧和不架秧的两种试验红薯以及这个社第一次试种的水稻，并且对这些作物生长的情况表示满意。毛主席看到高粱的时候，就问：“有没有种多头高粱？”商丘地委第二书记任秀铎回答说，有许多地方种了这种高粱。毛主席说：“这种高粱产量高。”"},{"type":"paragraph","text":"毛主席在河南农村视察了三天后已经离开河南。毛主席这次视察给河南人民带来了巨大的鼓舞和无比的力量，各地人民决心以更大的成就来回答毛主席的关怀。毛主席视察过的农业社都修订了生产计划，决心争取更大的丰收。（图片）"},{"type":"paragraph","text":"毛主席在河南襄城县双庙乡参观农业社种植的烟叶。"},{"type":"paragraph","text":"新华社记者　侯波摄"},{"type":"paragraph","text":"毛主席视察河南省襄城县时，参观农业社的谷子丰产田。"},{"type":"paragraph","text":"新华社记者　侯波摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"821fa313e5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
