<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"坚决抵制资产阶级对工人的腐蚀","authors":["北京市机械局工人理论小组"],"dates":[{"year":1975,"month":3,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"坚决抵制资产阶级对工人的腐蚀"},{"type":"paragraph","text":"北京市机械局工人理论小组"},{"type":"paragraph","text":"伟大领袖毛主席最近指出：“列宁说，‘小生产是经常地、每日每时地、自发地和大批地产生着资本主义和资产阶级的。’工人阶级一部分，党员一部分，也有这种情况。无产阶级中，机关工作人员中，都有发生资产阶级生活作风的。”毛主席这个指示，进一步指明了防止资本主义复辟，坚持无产阶级专政下继续革命的重要性。"},{"type":"paragraph","text":"工人阶级是人类历史上最伟大的一个阶级，它最有远见、大公无私、最富有革命的彻底性。但是，在社会主义条件下，由于资产阶级影响的存在，国际帝国主义、修正主义影响的存在，以及资产阶级法权的存在，工人阶级的一部分也还有可能产生新的资产阶级分子。"},{"type":"paragraph","text":"在整个社会主义历史阶段始终存在着阶级、阶级矛盾和阶级斗争。无产阶级夺取政权后，地主资产阶级虽然被打倒了，但是他们不甘心于自己的灭亡，必然要利用各种阵地向无产阶级进攻，把他们复辟的希望变成复辟的行动。同时，社会上还存在着小生产的残余，存在着一部分农民自发的资本主义倾向。在上层建筑领域内，剥削阶级的意识形态仍然存在。资产阶级和小资产阶级自发势力还会从各方面来包围、浸染和腐蚀无产阶级。此外，在社会主义社会中，还不可避免地存在着资产阶级法权。毛主席指出：“我国现在实行的是商品制度，工资制度也不平等，有八级工资制，等等。这只能在无产阶级专政下加以限制。”如果我们对于这些东西不加限制，任其扩大，资本主义的东西就会泛滥起来。一些资产阶级思想严重的人，就会利用货币进行投机倒把，牟取暴利，借以攫取更多社会财富，无偿占有别人劳动。"},{"type":"paragraph","text":"不仅如此，在社会主义条件下，在工人阶级内部也还会保留许多从旧社会带来的各种影响。"},{"type":"paragraph","text":"列宁指出：“工人和旧社会之间从来没有一道万里长城。工人还保存着许多资本主义社会的传统心理。工人在建设新社会，但他还没有变成清除掉旧世界的污泥的新人，他还站在旧世界的污泥里面。只能幻想把这种污泥清除掉。如果以为这可以马上办到，那就是愚蠢透顶的空想，就是在实践上把社会主义世界移到半空中去的空想。"},{"type":"paragraph","text":"“不，我们不是这样建设社会主义的。我们是站在资本主义社会的土壤上建设的，我们要同劳动者身上也有的、经常拖无产阶级后腿的一切弱点和缺陷进行斗争。”"},{"type":"paragraph","text":"工人阶级从来也不是生活在真空中，而是在资本主义社会的废墟上来建设社会主义的。在资本主义社会里，资产阶级不但在政治上和经济上对无产阶级和劳动人民进行残酷的剥削和压迫，而且在他们中间散布资产阶级思想，对他们进行精神上的奴役。在资本主义社会里，破产了的小资产者、小私有者和小生产者，不断加入无产阶级队伍，他们也必然会把自己的意识和习惯，带到工人阶级队伍里来。"},{"type":"paragraph","text":"因此，无产阶级要胜利地进行社会主义革命和社会主义建设，巩固和加强无产阶级专政，就不仅要同已经被打倒但还没有被消灭的剥削阶级作斗争，同旧社会遗留下来的可恶的资本主义制度的种种残余作斗争，而且要同自身的一切弱点和缺陷作斗争。"},{"type":"paragraph","text":"当然，这不是说资产阶级和旧社会习惯势力对工人阶级的腐蚀和影响是不可战胜的。恰恰相反，工人阶级不仅能彻底战胜一切私有制残余，同传统的所有制关系实行最彻底的决裂，也一定能战胜资产阶级和旧社会习惯势力的腐蚀和影响，同传统的观念实行最彻底的决裂。"},{"type":"paragraph","text":"毛主席教导我们：“在建设社会主义社会的过程中，人人需要改造”。“所有的人都应该学习，都应该改造。”为了更好地巩固和加强无产阶级专政，抵制资产阶级和旧社会习惯势力对工人的腐蚀和影响，每个工人、共产党员和革命干部，必须加强马克思主义、列宁主义、毛泽东思想的学习，在改造客观世界的同时，不断地改造主观世界。只有这样，才能始终保持革命本色，增强抵制资产阶级和旧社会习惯势力腐蚀的能力，不断地为巩固和加强无产阶级专政而斗争。"},{"type":"paragraph","text":"当前，我们必须学好马列和毛主席关于无产阶级专政的理论，把批林批孔运动普及、深入、持久地进行下去，搞好上层建筑包括各个文化领域的社会主义革命，批判资本主义，批判资产阶级世界观，批判孔孟之道，批判一切剥削阶级的意识形态。这样才能彻底战胜资产阶级和旧社会习惯势力对无产阶级的腐蚀，进一步巩固和加强无产阶级专政。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"批林批孔","type":"主题/事件"},{"name":"限制资产阶级法权","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"62b3e46358"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
