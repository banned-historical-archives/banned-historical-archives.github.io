国民党革命委员会","龙云"],"dates":[{"year":1957,"month":6,"day":18}],"is_range_date":false,"parts":[{"text":"关于中苏关系的言论","type":"title"},{"text":"中国国民党革命委员会龙云","type":"authors"},{"text":"（龙云：中国国民党革命委员会副主席。以下为六月十八日在民革中央小组扩大会议上揭发的龙云言论）","type":"subtitle"},{"text":"(一)抗美援朝战争的经费，全部由中国负担，不合理。","type":"paragraph"},{"text":"(二)第一、第二两次世界大战中，美国借款给盟国，又实施租借法案，后来他们有的赖了债，有的美国不要他们还了。苏联对我国借款，十几年都还不清，还要付利息。中国为社会主义而战，结果如此。","type":"paragraph"},{"text":"(三)苏军解放我国东北时，拆走了工厂中的一些机器，有无代价？偿还不偿还？","type":"paragraph"},{"text":"(四)我国援外预算太大，主张抓紧压缩对外的援助。（见六月十九日北京日报）","type":"paragraph"},{"text":" 来源：《提高警惕 粉碎右派阴谋》（1957年6月）。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"555efe5bd4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
