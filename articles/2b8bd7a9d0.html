<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"美国南部行","authors":["张彦"],"dates":[{"year":1981,"month":5,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"美国南部行"},{"type":"paragraph","text":"李报记者  张彦"},{"type":"paragraph","text":"七、暴发的得克萨斯"},{"type":"paragraph","text":"除阿拉斯加州外，得克萨斯是美国最大的一个州。今天，我在这个州还听见有人说：“在连界的美国版图上，我们还是第一大州”，因为阿拉斯加与美国本土之间还隔着一个加拿大。"},{"type":"paragraph","text":"在某种意义上，得克萨斯似乎有点象我们的新疆。它东西横跨773英里，南北相距801英里，面积相当于美国东北部纽约等七、八个州的总和，它的一个县就比康涅狄格一个州还大。"},{"type":"paragraph","text":"得克萨斯州在今天的美国之所以闻名，并不仅仅因为它幅员大，更重要的是由于它变化快。50年前，这里还只是个贫穷落后的农业地区，当时的580万人口，60％住在农村，靠种棉花养牲口为生。"},{"type":"paragraph","text":"自从三十年代在这里东部发现石油和矿产以来，就开始了巨变。如今，这个州已是美国的化工、电子、飞机和金属工业的主要产区之一。这里还是除加利福尼亚之外的美国国防工业的重要基地。飞快发展起来的城市休斯敦和达拉斯，分别享有能源中心和金融中心的盛誉。这个州的人口也以惊人的速度增长着。"},{"type":"paragraph","text":"来到休斯敦和达拉斯，立刻就感到有点异样。这里似乎没有底特律或纽约这些老工业城市那种陈旧衰败的景象，到处可以见到正在进行中的建设工程，特别是办公大楼。常常在一座落成不久的几十层新楼旁边，另一座又已经起来半截。"},{"type":"paragraph","text":"由于得克萨斯东部发现石油，大老板们便以达拉斯为中心，大量投资加以经营。久而久之，这里就银行云集，成为财力通往美国西南部的一个重要孔道。美国五百家大公司中，三百多家在这里设有分支机构。这里还有全州最大的银行和二百家保险公司。豪华而别致的贸易中心，似乎已成为达拉斯的象征。"},{"type":"paragraph","text":"南部的休斯敦现在已经一跃而为全国第五大城市。大休斯敦总共有二百九十多万人。人口大幅度增长，主要是因为各种事业的发展引来了大批的外来机构。1970年以来，已经有二百多家大公司的总部或分支机构进驻这里。美国最大的30家石油公司已有29家在这里设有经营机构，此外还有400个其他的石油公司。全国四分之一的炼油设备和四分之一的石油和天然气输送公司都在休斯敦沿海湾区。这里向全国提供至少60％的基本石油化工产品。"},{"type":"paragraph","text":"美国国家航空与航天局的载入宇宙飞船中心就设在这里，登月用的全套装置至今还在这里公开展出。国际知名的得克萨斯医疗中心，也座落在休斯敦。这个庞大的医疗中心包括七个主要医院，十多个专科医学院和护士学校，还有不少专题医学研究机构。"},{"type":"paragraph","text":"按吨位计，休斯敦是美国的第三大港，但它并不临海，全靠1914年人工开凿的一条50英里长的运河与海沟通，与几十个国家有贸易来往。外资也随之涌进。休斯敦的国际交往日益发展，那里设有50个国家的领事馆。1979年我国邓小平副总理曾经到这里访问。"},{"type":"paragraph","text":"由于历史的原因，得克萨斯州具有较大的独立性，州内实行低税制，吸引了大量州外的投资和最新科学技术的使用。这里的黑人和西班牙语少数民族占相当比例，是廉价劳动力的来源。而且，由于这里的种种条件限制，使工会力量难以发展，老板们得以谋取较大的利润。但是，随着城市工业的发展，得克萨斯实际上已经潜伏着走向反面的因素。石油化工的快速发展带来了空气和水的严重污染，对于少数民族廉价劳动的剥削也已激起了反抗。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2b8bd7a9d0"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
