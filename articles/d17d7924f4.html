ical-archives/banned-historical-archives0/main/maoquanji34.pdf"],"article":{"title":"对周敦祥来信的批语和复信","alias":"","parts":[{"type":"paragraph","text":"对周敦祥来信的批语和复信"},{"type":"paragraph","text":"（1955年2月3日）"},{"type":"paragraph","text":"将此信转寄湖南省委统战部，看是否能在省参事室及文史【馆】给以位置。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"二月三日"},{"type":"paragraph","text":"二敦祥先生："},{"type":"paragraph","text":"来信收到。尊况甚表同情。已请湖南省委统一战线部酌量设法"},{"type":"paragraph","text":"[1]周敦祥，五四时期曾加入毛泽东领导的新民学会，1955年4月后被安排为湖南省文史研究馆馆员。"},{"type":"paragraph","text":"[2]指周敦祥1955年1月10日给毛泽东的信。信中说，1921年她曾和张国基一起到南洋办教育，1935年回国。新中国成立后因找不到正式工作，曾想到华北革命大学学习，后因华北革命大学从第四期停办，学习未成，工作不得，经济困难，个人生活也无法维持，希望毛泽东能给她介绍一个工作。毛泽东全集第三十四卷为助，未知能如愿否，你可就近接洽。如有急切困难，尚望见告。"},{"type":"paragraph","text":"顺祝进步"},{"type":"paragraph","text":"毛泽东二月三日"}],"authors":["毛泽东"],"dates":[{"year":1955,"month":2,"day":3}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":448,"page_end":449},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d17d7924f4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
