<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"“复礼”就是要建立林家法西斯王朝林彪“复礼”的阶级内容，就是把被打倒的地主资产阶级重新扶植起来，建立林家法西斯王朝。他接过孔老二“兴灭国，继绝世，举逸民”的反动口号，狂妄叫嚣要对无产阶级专政的敌人“一律给予政治上的解放”。","authors":[],"dates":[{"year":1974,"month":2,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"上海毛巾九厂民兵营梅雪美说:“继绝世”是复地主资产阶级的天堂"},{"type":"paragraph","text":"孔老二大肆鼓吹“兴灭国，继绝世，举逸民”。他的“兴灭国”，就是要复辟已经灭亡了的奴隶主贵族的国家；林彪蓄谋反革命政变，妄图推翻无产阶级专政，建立林家法西斯王朝。孔老二的“继绝世”，是要让奴隶主贵族的世袭特权继续下去；林彪则为地主资产阶级请命，妄图夺回他们失去的“天堂”。孔老二的“举逸民”，是要把已经倒台的奴隶主贵族重新扶植起来；林彪则要把无产阶级专政的对象“一律给予政治上的解放”。一古一今，一师一徒，何等相似!林彪、孔老二都是妄图把历史车轮拉向倒转的顽固派，是同走一条复辟道，结果只能是同样的下场。"},{"type":"paragraph","text":"驻沪海军某部海斌说:决不许资本主义再“兴”起来"},{"type":"paragraph","text":"孔老二鼓吹的“继绝世”，是行将灭亡的奴隶主阶级的哀叫，是同他的“克己复礼”的反动纲领相呼应的。资产阶级野心家、阴谋家林彪，继承孔老二的衣钵，极力推行复辟倒退的路线。他耍尽各种阴谋手段，妄想“继”被推翻了的地主买办资产阶级的“绝世”，恢复他们已经失去的“天堂”，妄图把被我党我军和我国人民亲手打倒的地主资产阶级重新扶植起来，建立林家法西斯王朝。他这一套完全是孔老二“继绝世”的拙劣翻版。今天，在我们社会主义国家里，决不允许剥削阶级的“绝世”恢复起来，决不允许大大小小的“黄世仁”、“南霸天”重新骑在劳动人民头上作威作福，决不让我们国家重新沦为帝国主义、社会帝国主义的殖民地。"},{"type":"paragraph","text":"嘉定县望新公社范庭祥说:“举逸民”就是反攻倒算"},{"type":"paragraph","text":"林彪“克己复礼”，要复的是什么“礼”?贫下中农说得好，就是要复旧社会三座大山压在劳动人民头上的“礼”，是要复地主富农收租米、放债米、压迫剥削贫下中农的“礼”，复“三纲五常”，把劳动妇女压在最低层的“礼”。解放前，我们望新地区百分之八十的土地被地主富农所霸占。贫下中农在地主富农重租的剥削下，过着“上无片瓦，下无寸田”、“衣不遮体，糠菜充饥”的悲惨生活。那时，望新地区贫下中农被地主、富农、土匪恶霸逼得讨饭或逃荒，能记得起的有一百七十一户，卖儿卖女的有一百三十三人，被逼死的有三十五人。贫下中农还受劳役地租和高利贷的剥削。全公社在解放前几年，有一千多户贫下中农借地主、富农的债米六千二百石。林彪“克己复礼”，就是要恢复这种吃人的“礼”，就是要把地、富、反、坏这些“逸民”“举”出来，进行反攻倒算。这是白日做梦。林彪是我们贫下中农的死对头!"},{"type":"paragraph","text":"宜昌中学革命大批判组盛毅说:武装政变是林彪“复礼”的大暴露"},{"type":"paragraph","text":"林彪究竟要复什么“礼”?这个“礼”的阶级内容，在他们一伙炮制的《“571工程”纪要》反革命武装政变计划中最详尽、最完整地暴露出来了。在这个反革命政变计划中，林彪声嘶力竭地攻击无产阶级专政是“独裁”，疯狂地叫嚷要对无产阶级专政的对象“一律给予政治上的解放”。这些人就是林彪搞复辟时所要“继”的“贵族世家”，所要“举”的“逸民”。在此同时，他要利用他那“镇压之权”加以残杀和迫害的则是革命的干部，真正的共产党员和广大劳动人民。这也是林彪平时讲的“升一批，罢一批”的真实含义。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"林彪","type":"人物"},{"name":"批林批孔","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3a0c17d1c6"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
