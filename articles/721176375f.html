ors":["纪文"],"dates":[{"year":1963,"month":1,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　上海鲁迅纪念馆在春节期间(初一至初五)，照常对外开放。"},{"type":"paragraph","text":"纪念馆最近增添了两件珍贵的展品。陈列的最后部分的立柜中，有毛主席亲笔录写的鲁迅的一首诗，内容是:“万家墨面没蒿莱，敢有歌吟动地哀。心事浩茫连广宇，于无声处听惊雷。”郭沫若同志将此诗翻成口语，作为说明。在“中国的将来寄托在共产党人身上”一组中，增加了一张新华日报的照片，报道了1936年中国工农红军东渡黄河时鲁迅的贺信，贺信说:“在你们身上，寄托着人类和中国的将来。”"},{"type":"paragraph","text":"纪念馆开放时间:每天上午九时至十二时(十一时一刻停止进馆)；下午一时至五时(四时一刻停止进馆)。星期一不对外开放。(纪文)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"721176375f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
