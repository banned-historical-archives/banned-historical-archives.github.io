script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"新的世界是剥削终止的世界","authors":["萨多维亚努"],"dates":[{"year":1949,"month":4,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新的世界是剥削终止的世界"},{"type":"paragraph","text":"萨多维亚努"},{"type":"paragraph","text":"罗马尼亚代表团团长萨多维亚努接着发言。他高呼：全世界和平拥护者联合起来，新的世界是和平的世界，是平等的世界和剥削终止的世界。对于大资本家说来，战争是有利的事业。但是，他们为人民的不可更易的和平意志所反对。他们也碰到了维护和平的战士——苏联和整个受过苦难的人类的反对。整个罗马尼亚人民都已经起来为和平而奋斗。"},{"type":"paragraph","text":"在西班牙国际纵队中作战时失散的福尔少校发表了动人的演说。他斥责帝国主义者所奉行的帮助佛郎哥和把西班牙变成“神圣同盟”的城堡的政策。他号召大会为反对反动、反对法西斯主义而战，并欢迎“大会带给全世界人民以伟大希腊的黎明！”"},{"type":"paragraph","text":"丹麦代表海柏着重指出威协着丹麦人民的危险，因为反动派支持下的社会民主党政府把丹麦包括入北大西洋公约，摒弃了传统的中立政策。抗议这个战争公约的浪潮已经横扫了丹麦全国。以工人阶级为首的一切阶层人民都参加了丹麦的和平运动。"},{"type":"paragraph","text":"越南妇女代表达理梁（译音）向大会报告了越南人民为争取国家独立、反对法国殖民帝国主义者及其美国主子而进行的斗争，她说，越南人民反对马歇尔计划和北大西洋公约。"},{"type":"paragraph","text":"年青的法国残废军人代表继越南代表之后演说。他说，法国人民不愿意做战争贩子的共谋者。法国代表在世界拥护和平大会之前宣布，他们决心涤雪法国政府使我们祖国蒙受的耻辱。大会主席法捷夫在会议结束前宣布：朝鲜代表团已经到来参加大会。全场鼓掌欢迎。大会随后宣读了关于布拉格和平大会代表们的工作报告。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9de966821b"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
