uthors":["陈静"],"dates":[{"year":1956,"month":6,"day":20}],"is_range_date":false,"parts":[{"text":"昆明市郊修建水库农民义务劳动过重","type":"title"},{"text":"陈静","type":"authors"},{"text":"新华社昆明20日讯：从今年2月2日开始动工的白沙河水库，是昆明郊区目前唯一的一个中型水库，预计6月底可以完工。","type":"paragraph"},{"text":"现在每天参加修建工程的民工有四千多个，到6月14日的统计，实际出工人次已达四十五万一千多个。","type":"paragraph"},{"text":"这些民工都是来自昆明市郊区七十三个乡的高级社。参加工程的社员每天只由工务处预支给少量补助（最高六角，最低三角），一般只够本人的伙食费。然后再根据民工劳动的数量和质量大体按照农业的标准评给工分，完工后分别由农业社付给报酬。但是，这个水库修成后只有五个乡可以得益。其他六十八个乡的社员们对这种“义务劳动”很不满意国。阿拉乡高级社每月有一百个全劳动力参加修水库，社里每天需评给一千个工分，五个月即需十五万个工分，以当地每个工分二角三分计算，到秋收分配时，合作社需付出人民币三万四千五百元。合作社担心秋后会因这笔开支减少收入。其它一些社的情况也是如此。","type":"paragraph"},{"text":"有的社打算把这批义务劳动的工分报酬分三年支给社员，社员又不满意，请求回社生产，但水库工程的主管机关又不同意。","type":"paragraph"},{"text":"来源：根据1956年6月20日新华社《内部参考》。","type":"paragraph"}],"comments":[],"origin":"美国图书馆收藏","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"86db9fb1cd"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
