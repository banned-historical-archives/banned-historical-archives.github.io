dates":[{"year":1980,"month":9,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"叶剑英会见佩尔蒂尼"},{"type":"paragraph","text":"赵紫阳、彭真、黄华等参加了会见"},{"type":"paragraph","text":"据新华社北京9月18日电  人大常委会委员长叶剑英今天下午会见了意大利总统山德罗·佩尔蒂尼和夫人及其主要随行人员。这是两位年过八旬的反法西斯老战士之间的亲切会晤。"},{"type":"paragraph","text":"会见时，叶剑英向佩尔蒂尼总统和夫人等表示热烈欢迎，并把新任总理赵紫阳等中国领导人介绍给意大利贵宾。"},{"type":"paragraph","text":"佩尔蒂尼说，我非常高兴终于能到中国来看看我所敬仰的中国人民。"},{"type":"paragraph","text":"叶剑英赞扬佩尔蒂尼在反法西斯斗争中所作的贡献，祝他健康长寿，并祝中意两国在政治、经济、贸易、文化、科学技术等方面的交流日益增长。"},{"type":"paragraph","text":"意大利总统说，意大利人民对中国人民抱有深厚的感情，并始终密切地注视着中国人民为自由、民主、解放而进行的斗争。"},{"type":"paragraph","text":"他说，今天我们尤其需要本着当年反法西斯的精神，并肩站在一起，反对那些企图把霸权强加于他人的人，以保卫世界和平。"},{"type":"paragraph","text":"叶剑英说，中国人民同意大利人民在反对霸权主义的侵略、扩张行径上有着共同的观点。"},{"type":"paragraph","text":"在十分融洽的交谈中，佩尔蒂尼说，他年事已高，本不想担任总统职务，但是议会以压倒多数的票数选举他为总统，他只好接受。"},{"type":"paragraph","text":"叶剑英说，他也曾提出辞职，但他的请求没有被接受。会见结束时，佩尔蒂尼祝贺赵紫阳当选为总理。赵紫阳对他表示深切的谢意。"},{"type":"paragraph","text":"参加会见的还有人大常委会副委员长彭真、副总理兼外交部长黄华等。"},{"type":"paragraph","text":"意大利外交部长埃米利奥·科隆博、总统府秘书长安东尼奥·马卡尼科博士等会见时在座。"},{"type":"paragraph","text":"（附图片）"},{"type":"paragraph","text":"叶剑英委员长同佩尔蒂尼总统握手。新华社记者摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"彭真","type":"人物"},{"name":"赵紫阳","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"04b6916982"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
