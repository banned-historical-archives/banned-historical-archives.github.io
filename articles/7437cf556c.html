uthors":[],"dates":[{"year":1980,"month":11,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"特别法庭正在审查对林彪、江青反革命集团案的起诉书"},{"type":"paragraph","text":"预计审查工作将于近日结束"},{"type":"paragraph","text":"新华社北京11月6日电　新华社记者今天从最高人民法院特别法庭获悉，特别法庭已经收到最高人民检察院特别检察厅对林彪、江青反革命集团案的起诉书，并且正在对起诉书进行审查。预计审查工作将于近日结束。然后，特别法庭将在开庭至少7天之前把起诉书副本送达被告。"},{"type":"paragraph","text":"这个案件经公安部侦查预审终结，于今年9月移送最高人民检察院审查起诉。一个多月以来，特别检察厅对公安部移送的案卷材料、证据和起诉意见书进行了审查，并讯问了江青等10名被告。特别检察厅确认他们触犯了刑律，应当追究法律责任，并依法对他们提起了公诉。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"江青","type":"人物"},{"name":"林彪","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7437cf556c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
