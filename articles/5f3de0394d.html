<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共中央关于土改委员会工作问题给饶漱石的复电","authors":[],"dates":[{"year":1950,"month":8,"day":28}],"is_range_date":false,"parts":[{"text":"中共中央关于土改委员会工作问题给饶漱石的复电","type":"title"},{"text":"饶漱石同志：","type":"appellation"},{"text":"你八月十七日来电关于土地改革委员会的意见，我们同意，并已将来电转中南、西北、西南各局。","type":"paragraph"},{"text":" 中  央八月二十八日","type":"paragraph"},{"text":"附：","type":"paragraph"},{"text":"饶漱石关于土改委员会工作问题给刘少奇的电报","type":"subtitle"},{"text":"（一九五0年八月十七日）","type":"subtitle"},{"text":"少奇同志：","type":"appellation"},{"text":"八月四日转来邓子恢同志关于如何运用土改委员会的电报，经研究后，有如下意见：","type":"paragraph"},{"text":"（一）建立与健全县以上人民政府的土地改革委员会，以便充分利用政府的地位去领导农民运动，支持农民的正义斗争，孤立打击反抗破坏土改的分子，保证有秩序地进行土改，这是完全必须的。但由于土改是一场激烈的斗争，为了确保党与人民政府对土改的领导，土改委员会就必须是一个真正强有力的战斗的指挥机关。为此，它的组织成分及运用它的方法，不能与通常的统一战线机构或政府其他一般部门完全一样。","type":"paragraph"},{"text":"甲、根据华东初步经验，人民政府中的土改委员会，应以农协的干部为主体，以党委的农委为骨干，再吸收一部分同情与支持土改的民主人士参加，省（区）以上的土改委员会中可以吸收较多的民主人士，专区及县的土改委员会则吸收三五个民主人士参加即可，不宜强调广泛吸收。因为在开明士绅及民主人士中，有时虽也有很多有益的意见，但一涉及土改具体工作，则很多是做不得的；同时，根据我们现有干部条件，对于这种情况是较难应付与较难掌握的；如勉强应付，则很可能不是在土委内部经常争辩不休，或是遇事迁就，因而在实际斗争的指挥上显得软弱无力，便是为了遂行斗争的指挥任务显得方式生硬，因而陷于被动，甚至有时反将关系搞坏。","type":"paragraph"},{"text":"乙、有关土改原则、方针、政策、法令等重大问题，应由各级人民代表会议协商委员会和人民政府委员会去协商决定。协商决定后再交土改委员会执行，土改委员会对政府委员会直接负责。如果在执行过程中，尚有某些不同意见或争论，可提交协商会议或下一次人民代表会或政府委员会去讨论，这样做法，既能使各方面的意见在适当的场合充分发表，又能使作为土改指挥机关的土改委员会本身能事权集中，运用灵活，保证各方面在土改中行动的一致。","type":"paragraph"},{"text":"（二）对子恢同志所提土改工作任务中，诸如订定土改细则，提出与审查土改计划，解释疑问，检查执行状况，调查统计处理有关问题等，应当也必须由土改委员会办理。至于土改干部的训练，似应由各级政府出面，而实际则由党委亲自掌握。至于有关统战的具体组织事务及土改的宣传工作，似由土委协同统战部门、宣教部门与文教部门进行为宜。因为各级土委均属新建，很难对这些工作全面照顾，同时，充分运用各部原有机构，也能将一切可以使用于土改工作方面的力量充分发挥作用。","type":"paragraph"},{"text":"（三）为了保证党的领导及使干部人选易于解决，现在华东局这一级党的农委会，即全部参加华东军政委员会的土地改革委员会，作为核心。各省（区）亦采取三者结合为一的方法，即由党的农委兼农会党组又兼土改委员会的党组，地委及县委在农会中的党组，亦即为同级土改委员会的核心。这一机关，对外是人民政府的土改委员会，对内便是党的农委。","type":"paragraph"},{"text":"（四）关于人民政府土地改革委员会的这种组织形式与工作方式的运用，我们还在草创期中，还无成熟经验。以上各点是否有当，请示。","type":"paragraph"},{"text":" 饶漱石八月十七日","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"饶漱石","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5f3de0394d"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
