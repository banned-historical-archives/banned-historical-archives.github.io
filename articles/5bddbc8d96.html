{"year":1952,"month":2,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编辑同志:在三反运动进入高潮的时候，三反纪录片的上映是有十分重要的教育意义的，当贪污分子和奸商的丑恶形象在银幕上出现时，引起我无比激怒和仇恨。从这里我更具体的认清了贪污分子和奸商对祖国人民利益的严重危害性。在三反运动展开时，我对运动的严重性认识不足，在运动开展的过程中我还觉得有些同志搞得“过火”，现在想起来，这种右倾思想是多么的荒谬和危险。像贪污犯宋德贵泄露国家机密、薛昆山在羊毛里掺沙子之类的事件，难道在我的周围就没有吗?像奸商刘元敬在造房子时偷工减料之类的情形在我的周围就没有吗?再说我自己就没有受到资产阶级的影响吗?不是的，我的警惕心太不高了，三反纪录片帮助我批判了我的右倾思想，我要从此奋起，投入火热的三反斗争中去。"},{"type":"paragraph","text":"同志们，大家去看看三反纪录片，对我们的打虎战斗是有帮助的。"},{"type":"paragraph","text":"王立武"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5bddbc8d96"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
