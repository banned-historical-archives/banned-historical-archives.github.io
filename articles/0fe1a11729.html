认，反动军队的伤亡比米佐族的多四、五倍","authors":[],"dates":[{"year":1969,"month":3,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"坚持武装斗争　取得巨大战果"},{"type":"paragraph","text":"米佐族人民英勇奋战痛击印度反动派"},{"type":"paragraph","text":"印度资产阶级报纸承认，反动军队的伤亡比米佐族的多四、五倍"},{"type":"paragraph","text":"据新华社十四日讯　新德里消息：深受印度反动政府残酷压迫的米佐族人民，坚持武装斗争，英勇奋战，继续打击印度反动军警。"},{"type":"paragraph","text":"今年二月份，米佐人民武装进行了多次战斗。他们在一次战斗中，消灭了一个印军哨所。他们还同库基族人民一起，在印度东部中央直属领地曼尼普尔的英帕尔通往阿萨姆邦迪马普尔的公路上，伏击了一支印度反动军队。这支米佐武装力量还攻占了反动地主武装的一个前沿哨所，缴获了一批步枪。"},{"type":"paragraph","text":"据印度报业托辣斯二月二十一日报道，由于米佐人民继续英勇打击印度反动军警，印度阿萨姆邦反动当局已宣布延长把米佐山区作为“骚乱地区”的期限，并决定增派军队去镇压米佐人民。"},{"type":"paragraph","text":"一九六六年，米佐族人民学习邻近的那加人民的榜样，拿起武器反对印度反动派。米佐人民的武装斗争得到了印度革命人民的支持。惊慌失措的印度反动政府对米佐人民发动了残暴的武装镇压。但是米佐族人民坚决开展武装斗争，痛击印度反动军队。连印度资产阶级报纸也不得不承认，反动军队遭受的伤亡比米佐族的伤亡多四、五倍。战斗中的米佐人民还把他们的活动范围扩大到中央直属领地特里普拉，同那加人民和库基人民协同战斗。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0fe1a11729"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
