art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"李先念副总理同阿希乔总统举行会谈阿希乔总统由李先念副总理陪同瞻仰毛主席遗容","authors":[],"parts":[{"type":"paragraph","text":"新华社一九七七年十月五日讯 国务院副总理李先念同喀麦隆联合共和国总统阿赫马杜·阿希乔今天上午举行了会谈。"},{"type":"paragraph","text":"喀麦隆方面参加会谈的有：经济和社会委员会主席萨巴尔·莱科，共和国总统府秘书长埃布瓦·萨米埃尔，共和国总统府特别事务部长桑加—库沃·弗朗索瓦，共和国总统府特别事务部长亚吉·阿卜杜拉耶，外交部长克恰·让，经济和计划部长优素福·达乌达，农业部长安泽·琼吉·吉尔贝，总统府负责同议会联系的部长级代表邦格瓦·克里斯蒂安，喀麦隆民族联盟中央委员会委员、国民议会第一副议长马伊马蒂普·泰奥多尔，喀麦隆民族联盟中央委员会委员、议员布巴·贝洛，喀麦隆民族联盟中央委员会委员恩瓦利彭贾，共和国总统府特别顾问布韦莱·纪尧姆，共和国总统府巡回大使凯马朱·达尼埃尔，北方省省长奥斯曼·梅伊，喀麦隆驻中国大使贝莱奥肯，阿希乔总统的其他随行人员穆哈马杜·阿希乔、阿班达·梅托戈·瓦莱尔、埃克迪·萨姆尼克·约瑟夫、哈比·加布里埃尔、奥斯马努·达乌达中校、梅卡·梅卡·勒内、蒙瓦·特宁、比洛瓦·唐·帕斯卡尔、韦萨·恩乔亚·伊德里斯。"},{"type":"paragraph","text":"中国方面参加会谈的有：外交部副部长何英，外经部副部长程飞，农林部副部长肖鹏，卫生部副部长黄树则，中国驻喀麦隆大使魏宝善，有关方面负责人何功楷、李永凯、罗旭、刘和林、刘华、徐守仁、周兰。"},{"type":"paragraph","text":"新华社一九七七年十月五日讯 喀麦隆联合共和国总统阿赫马杜·阿希乔和夫人由国务院副总理李先念和林佳楣同志陪同，今天上午前往毛主席纪念堂瞻仰了毛主席遗容。"},{"type":"paragraph","text":"阿希乔总统在毛主席坐像前默哀，并献了花圈。花圈的缎带上写着：“向中国人民的伟大领袖毛泽东主席致敬”。"},{"type":"paragraph","text":"阿希乔总统的随行人员也前往瞻仰。"},{"type":"paragraph","text":"图为会谈时情形。 新华社记者摄（照片）"}],"alias":""},"tags":[{"name":"李先念","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"eab2e6c528"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
