ical-archives/banned-historical-archives0/main/maoquanji36.pdf"],"article":{"title":"关于发表郭沫若访日诗篇的批语","alias":"","parts":[{"type":"paragraph","text":"关于发表郭沫若访日诗篇的批语"},{"type":"paragraph","text":"（1956年2月24日）送彭真同志："},{"type":"paragraph","text":"内件请交北京日报发表。其中有些草体字须先改为楷书，以免弄错。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"二月廿四日"},{"type":"paragraph","text":"[1]郭沫若，当时任全国人大常委会副委员长、政协全国委员会副主席、中国科学院院长。"},{"type":"paragraph","text":"[2]彭真，当时任中共北京市委第一书记、北京市市长。"},{"type":"paragraph","text":"[3]指信封内装的郭沫若访日诗篇七首。郭沫若于1955年12月1日至25日，应日本学术会议的邀请，率中国科学院学术考察团访问日本。这些诗是他访日期间写的。信封内的七首是：《箱根即景》《访须和田故居》《别须和田》《宫岛即景》《访博多湾》《留别华侨》《游别府》。1956年2月29日在《北京日报》发表时，将《访博多湾》和《留别华侨》分别改题为《吊千代松原》和《归途在东海道车中》，又增加了《宿春帆楼》和《船入长江口》两首，这九首诗总题为《访日杂咏》。"}],"authors":["毛泽东"],"dates":[{"year":1956,"month":2,"day":24}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":235,"page_end":235},"tags":[{"name":"毛泽东","type":"人物"},{"name":"彭真","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9423d8dc67"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
