告:判处四个现行反革命分子徒刑","authors":[],"dates":[{"year":1967,"month":2,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　昨天(二十四日)下午，上海市公安局革命造反委员会(公革会)闵行分会等十一个革命群众组织，联合举行“保卫无产阶级文化大革命，坚决镇压反革命分子大会”，公审现行反革命分子卢锦华、赵成祥、何少云和王天广，并分别判处了徒刑。"},{"type":"paragraph","text":"出席大会的有工人、农民、解放军指战员、红卫兵小将和革命的机关干部、里弄居民等近万人。当四名反革命分子押到会场时，愤怒的群众不断高呼:“坚决镇压反革命!”“誓死保卫无产阶级专政!”"},{"type":"paragraph","text":"上海市徐汇区人民法院捍卫毛泽东思想革命造反队代表宣读了公安、检察、法院的联合通告。通告宣布现行反革命分子卢锦华判处徒刑二十年。现行反革命分子卢锦华在无产阶级文化大革命中，对党和人民心怀刻骨仇恨，多次散发反革命传单和张贴反动标语，恶毒地攻击和污蔑我们心中最红最红的红太阳毛主席。对蓄意制造重大爆炸事故，进行阶级报复的现行反革命分子赵成祥判处徒刑十八年。对在无产阶级文化大革命中行凶杀人犯何少云，以及不服管制，潜逃山区，妄图建立反革命根据地的反革命分子王天广分别判处徒刑十五年和七年。"},{"type":"paragraph","text":"工人、农民、解放军、红卫兵等十一个革命组织的代表相继在会上作了发言和联合发言。他们一致表示:坚决拥护和支持上海市公安局革命造反委员会闵行分会等专政机关的革命造反组织对这四名反革命分子实行专政。他们严厉警告一小撮坚持反动立场的地、富、反、坏、右分子，不许乱说乱动，无产阶级专政机关和革命造反派坚决镇压一切反革命分子!坚决取缔一切反革命组织!坚决打击破坏无产阶级文化大革命的犯罪分子!"},{"type":"paragraph","text":"勇敢、机警地协助公安部门破获反革命分子卢锦华案件的红卫兵黄丽珍受到大会的奖励。"},{"type":"paragraph","text":"\u003cIMG alt=请插入5号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1967\\02\\672p040101.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e现行反革命分子卢锦华、赵成群、何少云、王天广押到会场，听取判决。　　(本报记者摄)\u003c/FONT\u003e"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"acfecf88f5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
