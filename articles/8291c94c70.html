选集》第五卷付出辛勤的劳动。李先念同志、汪东兴同志参加了会见和宴会。会见和宴会充满亲切友好的气氛","authors":[],"dates":[{"year":1977,"month":7,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京一九七七年七月三日电　中共中央主席华国锋、副主席叶剑英，中共中央政治局委员李先念、汪东兴，今天下午会见并宴请参加《毛泽东选集》第五卷翻译工作的外国专家，感谢他们为翻译《毛泽东选集》第五卷付出辛勤的劳动。"},{"type":"paragraph","text":"参加会见和宴会的外国专家是:柯弗兰、艾德乐、恩里格·波萨达、戴妮丝·李、让·毛赛尔、安藤彦太郎、川越敏孝、莫罗特·波斯德、让·皮埃尔·高姆、阿丽亚娜·拉蕾。"},{"type":"paragraph","text":"毛泽东主席著作编辑出版委员会办公室的负责同志参加了会见和宴会。"},{"type":"paragraph","text":"会见和宴会充满亲切友好的气氛。"},{"type":"paragraph","text":"\u003cIMG alt=请插入7号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1977\\07\\7774010301.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e中共中央主席华国锋、副主席叶剑英，中共中央政治局委员李先念、汪东兴，七月三日会见并宴请参加《毛泽东选集》第五卷翻译工作的外国专家。"},{"type":"paragraph","text":"新华社记者　摄　(传真照片)\u003c/FONT\u003e"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"华国锋","type":"人物"},{"name":"汪东兴","type":"人物"},{"name":"李先念","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"编纂《毛泽东选集》第五卷","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8291c94c70"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
