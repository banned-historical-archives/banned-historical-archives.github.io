art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"最热烈欢呼毛主席视察回北京","authors":["余光烈"],"parts":[{"type":"paragraph","text":"喜讯传军营，"},{"type":"paragraph","text":"军营好欢腾；"},{"type":"paragraph","text":"锣鼓歌声震天响，"},{"type":"paragraph","text":"欢呼毛主席视察回北京。"},{"type":"paragraph","text":"一张张笑脸飞红霞，"},{"type":"paragraph","text":"一双双笑眼热泪滚；"},{"type":"paragraph","text":"红彤彤语录手中捧，"},{"type":"paragraph","text":"金灿灿太阳心中升。"},{"type":"paragraph","text":"欢呼啊！歌唱啊！"},{"type":"paragraph","text":"毛主席最最伟大最最英明；"},{"type":"paragraph","text":"歌唱啊！欢呼啊！"},{"type":"paragraph","text":"毛主席永远和革命群众心连心。"},{"type":"paragraph","text":"毛主席啊毛主席，"},{"type":"paragraph","text":"千言万语难表战士爱戴情。"},{"type":"paragraph","text":"天再大，没有您对人类的贡献大，"},{"type":"paragraph","text":"海再深，没有您对人民的恩情深。"},{"type":"paragraph","text":"在革命的每一个关键时刻，"},{"type":"paragraph","text":"都是您把胜利的航向指引；"},{"type":"paragraph","text":"在文化大革命的新高潮中，"},{"type":"paragraph","text":"祖国处处又留下您光辉的脚印。"},{"type":"paragraph","text":"毛主席啊，有了您的英明领导，"},{"type":"paragraph","text":"咱心红眼亮方向明；"},{"type":"paragraph","text":"毛主席啊，有了您的天才指挥，"},{"type":"paragraph","text":"咱勇敢战斗无往不胜！"},{"type":"paragraph","text":"战士永远忠于您的革命路线，"},{"type":"paragraph","text":"紧跟您的伟大战略部署乘胜前进！"},{"type":"paragraph","text":"誓把文化大革命进行到底，"},{"type":"paragraph","text":"让光焰无际的毛泽东思想满天红！"},{"type":"paragraph","text":"通信兵余光烈"}],"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"811a2b2723"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
