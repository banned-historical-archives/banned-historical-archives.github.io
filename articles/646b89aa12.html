","authors":[],"dates":[{"year":1953,"month":8,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京卅一日电】　苏联部长会议主席格·马林科夫致电我中央人民政府毛泽东主席祝贺“八一”建军节。电文如下:"},{"type":"paragraph","text":"北京"},{"type":"paragraph","text":"中华人民共和国中央人民政府主席——毛泽东同志:"},{"type":"paragraph","text":"值此中华人民共和国人民解放军建军二十六周年之际，主席同志，谨向您致衷心的祝贺。希望中华人民共和国光荣的武装力量在保卫祖国及维护世界和平的事业中获得更进一步的巩固。"},{"type":"paragraph","text":"格·马林科夫"},{"type":"paragraph","text":"一九五三年七月三十一日于莫斯科"},{"type":"paragraph","text":"【新华社北京卅一日电】　苏联外交部部长维·莫洛托夫致电我中央人民政府政务院总理兼外交部部长周恩来祝贺“八一”建军节。电文如下:"},{"type":"paragraph","text":"北京"},{"type":"paragraph","text":"中华人民共和国政务院总理兼外交部部长——周恩来同志:"},{"type":"paragraph","text":"值此中华人民共和国英勇的人民解放军建军二十六周年之际，总理同志，请您接受我衷心的祝贺。"},{"type":"paragraph","text":"维·莫洛托夫"},{"type":"paragraph","text":"一九五三年七月三十一日于莫斯科"},{"type":"paragraph","text":"【新华社北京卅一日电】　中国人民解放军朱德总司令接到苏联国防部部长布尔加宁关于祝贺八一建军节的贺电，电文如下:"},{"type":"paragraph","text":"中国人民解放军总司令朱德同志:"},{"type":"paragraph","text":"值此中华人民共和国人民解放军建军节，谨代表苏联武装力量和我本人向您祝贺。"},{"type":"paragraph","text":"祝中华人民共和国在进一步巩固武装力量的战斗威力的事业上的成就。"},{"type":"paragraph","text":"布尔加宁"},{"type":"paragraph","text":"一九五三年七月三十一日"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"朱德","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"646b89aa12"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
