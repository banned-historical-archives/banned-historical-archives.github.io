rt":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"粉碎“四人帮”爱民谱新篇“抗洪救灾爱民模范营”拥政爱民做出新成绩","authors":[],"parts":[{"type":"paragraph","text":"本报讯 武汉部队炮兵某部“抗洪救灾爱民模范营”指战员，深揭猛批“四人帮”，提高了贯彻我军建军宗旨的自觉性，拥政爱民的光荣传统进一步发扬。"},{"type":"paragraph","text":"这个营为了大力宣传以华主席为首的党中央粉碎“四人帮”的伟大胜利，大力宣传华主席是我们当之无愧的英明领袖，在野营中派出十九个宣传组，走遍三个生产队的一百多户人家。他们在山区训练了一个月，采取不同形式向贫下中农宣传了一个月，受到贫下中农的热情赞扬。"},{"type":"paragraph","text":"“抗洪救灾爱民模范营”在开展拥政爱民活动中，还把积极参加普及大寨县运动作为发扬我军做群众工作的优良传统的重要内容。他们从各方面大力支援附近社队的学大寨运动。每逢节假日，干部战士轮流参加兴修水利、积肥运肥等劳动。他们还采取“组织不散，人员轮换”的办法，组织了一个支农小组，长期住在驻地附近陶楼生产队，协助他们开展农业学大寨运动，做出了可喜的成绩。"}],"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"da3082bf84"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
