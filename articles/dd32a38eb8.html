es":[{"year":1949,"month":6,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"光明日报在平创刊"},{"type":"paragraph","text":"毛主席祝词：团结起来光明在望"},{"type":"paragraph","text":"【新华社北平十七日电】中国民主同盟机关报光明日报十六日在北平创刊。创刊号载有各民主党派负责人及无党派民主人士祝词。中共中央毛泽东主席祝词为“团结起来，光明在望”。该报在题为“团结一致建设民主新中国”的发刊词中称：要建设民主新中国，“在组织方面我们要求团结，在行动方面我们要求一致。我们可以有不同的思想，不同的见解，不同的作风。但是当不同的思想、见解、作风化为行动的时候，却必须求得一致。”该报由章伯钧任社长，胡愈之任总编辑，林仲易任总经理，萨空了任秘书长，日出对开四版。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dd32a38eb8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
