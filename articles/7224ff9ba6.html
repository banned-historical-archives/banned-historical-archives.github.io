<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"5a6e14f4-1103-48c3-bd99-37613918dd4b","name":"中共党史教学参考资料 第25册 “文化大革命”参考资料 上册（1988年）","internal":true,"official":true,"type":"pdf","author":"","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives3/main/5a6e14f4-1103-48c3-bd99-37613918dd4b.pdf"],"article":{"title":"谭震林写信痛斥江青一伙","alias":"","parts":[{"type":"paragraph","text":"谭震林写信痛厅江青一伙"},{"type":"paragraph","text":"布日-九六七年二月1七日，谭震林同志在给林彪的-封信中这样写道："},{"type":"paragraph","text":"昨天碰头会上是我第三次反击。第一次是前天在电话中，第二次是昨天早写了-封信。我所以要如此、是到忍无可忍的地步。"},{"type":"paragraph","text":"“他们（指江青一伙）不仅不听主席的指示，当着主席的面说‘我要造你的反’。他们把主席放在什么地位，真比武则天还凶。，“.大批老干部，省级以上的高级干部，除了在军队的，住在中南海的，凡乎都挨了斗，戴了高帽，坐了飞机，身体搞垮了，弄得妻离子散，倾家荡产的人不少，谭启龙、江华同志就是如此。我们党被丑化到无以复加了。北京丑图出笼后，上海、西安照办。真正的修正主义反革命分子无人过问、他们有兴趣的是打倒老干部，只要你有--点过错，非整死你不可…….他们能执政吗？能接班吗？我怀疑。"},{"type":"paragraph","text":"“我想了很久，最后下了决心，准备牺牲。但我绝不自杀也不叛国，也决不允许他们如此蛮干。总理已被他们整得够呛了，总理心襟宽，想得开，等候下去。等候，等候、等到何时？难道等到所有老十部都下去了再说吗？不行，不行，一万个不行！这个反我造定了。下定决心，准备牺牲，斗下去，拼下去。."},{"type":"paragraph","text":"谭震林同志这封充满革命激情的信，到了林彪手里、林彪十分恼火。他想不到，谭震林同志竞敢这样仗义执言、慷概陈词，公开反对他们-伙“打倒一切\"的罪恶阴谋。"},{"type":"paragraph","text":"二月十九日，林彪在谭震林信上写了个批示，把信转交毛泽东同志。"},{"type":"paragraph","text":"林彪在信的批示中写道：“主席，谭震林最近的思想意识糊涂堕落到如此地步，完余出乎意料之外。现将他的来信送上，请阅。此致敬礼林彪十九日”毛泽东同志过去曾多次指出，要保谭震林同志，可是林彪、江青-伙反革命集团却干方百计要打倒谭震林同志。林彪多么希望毛主席看了谭震林同志的信件、看了他自记在信上的，批示，能有一个表态，支持他们打倒谭震林同志。可是、毛主席只淡淡地批了“已阅”两字、就退了回来。"},{"type":"paragraph","text":"林彪顿时恼差成怒，立刻将毛主席的批示撕成碎块，丢到墙角的痰流里去了。"},{"type":"paragraph","text":"站在一边的秘书，看到一向叫哦“无限忠于毛主席”的林彪，竞这样粗暴无理地对待毛主席的批示，感到很过意不去。后来，他趁林彪不在的时候、将毛主席的批示，从痰盂里捞出、晾干、又拼凑到块，复制保存到中央档案馆。"},{"type":"paragraph","text":"（原载《党史文江》1986年第3期）"}],"authors":["布日"],"dates":[{"year":1986}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":309,"page_end":309},"tags":[{"name":"江青","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"name":"谭震林","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7224ff9ba6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
