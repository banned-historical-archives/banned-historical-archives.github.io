art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"难忘的延安火炬大游行","authors":["原毛泽东同志秘书叶子龙"],"parts":[{"type":"paragraph","text":"岁月如梭，光阴荏苒。50年过去了，延安市人民欢庆日寇无条件投降的情景，仍历历在目。"},{"type":"paragraph","text":"1945年8月15日上午，日皇宣布无条件投降的消息传出后，全市轰动，万人欢腾，街上张灯结彩，红旗飘扬。"},{"type":"paragraph","text":"晚间，东南北各区到处举行火炬游行，全市灯火辉煌，欢呼声从各处发出。无数火炬照亮山岭河畔，机关与群众的乐队、秧歌队，纷纷出发游行。许多群众举着火炬，自发加入游行队伍中。“中华民族解放万岁！”“动员起来支援前线，保卫边区！”“制止蒋介石发动内战！”口号此起彼伏，声震山谷。"},{"type":"paragraph","text":"游行队伍中，毛主席、朱总司令等的巨幅画像在熊熊火炬丛中高高举起。在人群中，一个卖瓜菜的小贩欢喜地跳起来，把篮子里的桃、梨，一个一个地抛向空中，高呼：不要钱的胜利果，请大家自由吃呀！群众报以热烈的掌声。庆祝的人群潮水一样继续涌来，秧歌队伍越跳越大，完全变成一片人海了。人们唱着“前进，人民的解放军！解除敌人的武装，去恢复交通和城镇！坚决大胆，迅速向前进，谁敢阻挡，就把他消灭得干干净净！”美军观察组闻讯后也乘汽车随秧歌队致庆。那一夜，全市灯火彻夜未灭。"},{"type":"paragraph","text":"为庆祝抗战胜利，9月5日，延安各界2万人，还在南门外广场举行了庆祝大会，朱总司令、边区政府林伯渠主席和吴玉章同志发表了讲话。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"25466cbf54"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
