script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"准备出席莫斯科国际经济会议  欧美各国工商界和社会人士加紧筹备工作  西德资产阶级报刊不满美国占领者垄断西德贸易","authors":[],"dates":[{"year":1952,"month":3,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"准备出席莫斯科国际经济会议"},{"type":"paragraph","text":"欧美各国工商界和社会人士加紧筹备工作"},{"type":"paragraph","text":"西德资产阶级报刊不满美国占领者垄断西德贸易"},{"type":"paragraph","text":"【新华社十八日讯】定于四月初在莫斯科举行的国际经济会议，继续在欧美两洲各国工商界和社会人士中，引起越来越广泛的响应。许多国家正加紧筹备参加会议的工作。"},{"type":"paragraph","text":"在东欧，捷克斯洛伐克、保加利亚、罗马尼亚的报纸和杂志，最近连续刊载了许多经济界人士的文章，拥护在莫斯科举行国际经济会议。德意志民主共和国、波兰和匈牙利等国的筹备委员会，已先后举行会议，讨论了参加莫斯科会议的问题。波兰筹备委员会会议已决定扩大筹备委员会，并选出了三个专门委员会，负责准备波兰代表团提交莫斯科会议的文件。保加利亚科学院定于三月二十三日召开经济会议。保加利亚部长会议所辖国家计划委员会主席马台耶夫等人，将在会上报告扩大国际贸易的可能性等问题。"},{"type":"paragraph","text":"在西欧，意大利最近又有一批工商业家表示愿意参加莫斯科会议。其中包括：佛罗伦萨著名工业家、普拉托市商会领导人邦尼佛尔提，最大的水果商、议员古塔达罗和佛兰科等。据法国报纸报道，法国工商界将派二十五人组成的代表团到莫斯科去。西德资产阶级的报刊越来越注意国际经济会议，并且对美国占领当局垄断西德的贸易表示不满。比利时社会党议员布伦姆力主参加莫斯科会议。她指出：要和比利时的纺织、玻璃、制鞋工业的失业现象作斗争，就必须和东方进行贸易。奥地利的商界人士纷纷对报界发表谈话。他们指出：美国人的支配正在绞杀奥地利的经济；而扩大对苏联和人民民主国家的贸易，将有助于发展工业和减少失业者。芬兰工会中央联合会已决定派联合会主席苏穆和总书记林德勃鲁姆，以观察员资格参加国际经济会议。"},{"type":"paragraph","text":"在美洲，国际经济会议筹备委员布朗最近在加拿大蒙特利尔举行记者招待会，他指出：加拿大将有十五名代表到莫斯科去。对于参加会议表示关心的人士之间已经建立了联系。据“人民报”报道，巴西已经成立了筹备委员会。巴西伯南布哥州的议员、商人和工会领袖们很愿意到莫斯科去。智利工商界正在筹组代表团，代表团团员将包括：与炼铜业有关的商业利益集团代表谢摩涅蒂，木器业代表波克列波维奇，印刷商联合会主席纳西曼托，工会代表布列斯特和前财政部长斐德雷加尔。阿根廷将有一个由六人组成的代表团出席国际经济会议，由拉巴拉他大学工程学院教授符赖雷任团长。乌拉圭的工业家和商人也成立了筹备委员会，由经济学博士洛彼兹担任主席。乌拉圭筹备委员会正在就国际经济会议的目标及其对于解决经济问题的重要性，对各界人士进行广泛的解释工作。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7534f36ec2"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
