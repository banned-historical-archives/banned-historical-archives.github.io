967,"month":5,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"上海市第十女中　二红卫兵"},{"type":"paragraph","text":"当收音机中传来我们心中最红最红的红太阳毛主席和林彪同志同首都三百万革命群众一起欢度“五一”国际劳动节的特大喜讯时，我们再也抑制不住心头的激动，大家跳呀、唱呀，幸福的泪花不知不觉地夺眶而出。敬爱的领袖毛主席呀，我们衷心地祝愿您万寿无疆:祝愿林副主席身体永远健康!"},{"type":"paragraph","text":"听着广播，我们仿佛身临其境，我们仿佛看到毛主席您老人家一步步地朝我们走来。"},{"type":"paragraph","text":"去年十月一日、十月十八日是我们终生最难忘的时刻。也是在天安门，我们见到了您——我们渴望已久的心中最红最红的红太阳。欢呼呀，跳跃呀，激动的心情久久不能平静。"},{"type":"paragraph","text":"毛主席啊毛主席，您最最支持上海的一月革命，您最最支持无产阶级革命派联合起来向党内一小撮走资本主义道路的当权派夺权。这给了我们极大的鼓舞和力量。我们最忠实地执行了您的指示，向上海市第六女中的红卫兵战友学习，用“只争朝夕”的精神在革命的大批判和本单位斗批改结合起来的斗争中统一了全校红卫兵组织。在您的光辉思想的指引下，我们全校革命师生发扬了再接再厉、勇敢战斗的革命精神，在革命的大批判中促进了我校革命的“三结合”。"},{"type":"paragraph","text":"敬爱的毛主席啊!千言万语，表达不尽我们红卫兵对您的无限热爱，无限忠诚，无限信仰，无限崇拜。我们只有千百倍地努力学习您的光辉著作，牢牢地为无产阶级掌好权用好权。我们要永远忠于您的无产阶级革命路线，永远忠于您的光辉思想。"},{"type":"paragraph","text":"我们革命的红卫兵誓和党内最大的走资本主义道路的当权派战斗到底。我们就是要最忠实地执行马克思所说的无产阶级只有解放全人类才能最后解放自己的教导，团结一切可以团结的人们，组成浩浩荡荡的文化革命大军，坚决完成一斗二批三改的战斗任务，坚决把无产阶级文化大革命进行到底!"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"一月革命","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"55b12d8f6f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
