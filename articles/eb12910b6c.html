rt":7,"page_end":7,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"描绘历史斑斓画图评说千古风云人物","authors":["艺风在《前言》中说：像这样把著名历史人物逐一评说，查阅《四库总目》，得知前人没有做过？它太费力？史书浩如烟海，没有几十年的准备时间，做不成这件事？他之所以坚持下来，不畏艰难，是受了毛泽东诗歌理论的鼓舞？1956年毛泽东曾说：“旧体诗词源远流长……最能反映中华民族和中国人民的特性和风尚？”中华民族上下五千年，有着祖先留下的优良传统，故生生不息？他写作此书，就是为了让人们能从优秀历史人物身上吸取我们民族优良传统和风尚，迎接新的挑战，实现中华民族的伟大复兴？"],"parts":[{"type":"paragraph","text":"●艺风"},{"type":"paragraph","text":"军队离休干部杨子才经数十年研读史书，搜集史料，数易其稿，写成659首七言古风，对著名历史人物逐一评说。书名为《萤窗咏史诗》，由长征出版社出版，封面上印着两行字：“上起先秦下迄清末，描绘历史斑斓画图；始自轩辕止于孙文，评说千古风云人物。”"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"eb12910b6c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
