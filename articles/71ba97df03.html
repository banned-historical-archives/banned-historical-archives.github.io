损失","authors":[],"dates":[{"year":1971,"month":4,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"意大利又掀起罢工浪潮"},{"type":"paragraph","text":"全国邮件投递工作完全停顿，大批商店停业，垄断资产阶级遭到重大损失"},{"type":"paragraph","text":"新华社十六日讯　罗马消息：意大利工人在四月初举行了有一千多万人参加的大罢工以后，这几天又在全国范围内掀起了罢工浪潮，要求增加工资，缩短工时和充分就业。"},{"type":"paragraph","text":"十四日，意大利全国各地的十七万邮政和电讯工人举行了一天罢工。工人们除了要求增加工资外，还抗议政府迟迟不履行在上次罢工后同工人所签订的合同。这次罢工使意大利所有邮局的邮件的投递工作完全停顿，国内外的电报和电话联系受到很大影响。从十五日开始，邮局工作人员还展开了怠工运动。"},{"type":"paragraph","text":"意大利全国各地的四十万货运卡车司机也在十三日和十四日举行罢工。二十万旅馆服务人员十五日也举行了罢工，使意大利的许多旅馆不得不关门。"},{"type":"paragraph","text":"据报道，最近几天参加罢工斗争的还有矿工、医生和职员等。撒丁岛的六千名铅矿和锌矿工人在十四日和十五日举行静坐罢工，要求增加工资和充分就业。"},{"type":"paragraph","text":"在意大利工人和职员纷纷举行罢工的同时，罗马市的商人十五日也举行罢市，抗议政府增加税收。据统计，这一天约有八万家商店关了门，使意大利首都呈现出一片“萧条而死寂的气氛”。"},{"type":"paragraph","text":"意大利工人不断掀起的罢工斗争使垄断资产阶级遭到重大损失。据西方通讯社报道，在今后的几个星期中，一系列其他行业的工人也将举行罢工，“意大利正进入一个社会危机的新时期，目前还看不到解决的前景”。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"71ba97df03"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
