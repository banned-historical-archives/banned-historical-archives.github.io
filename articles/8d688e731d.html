六”的内容","authors":["谢富治"],"dates":[{"year":1967,"month":9,"day":27}],"is_range_date":false,"parts":[{"text":"谢富治对科学院哲学社会科学部的谈话中有关清查“五·一六”的内容","type":"title"},{"text":"谢富治","type":"authors"},{"text":"摘要：","type":"appellation"},{"text":"防止坏人，提高警惕。九·一、九·五、九·一六至九·一七，总理、中央文革同志们的讲话精神，特别是江青同志九·五的讲话，指出“五·一六”的危害性……为什么中央很重视它呢？因为这个组织把矛头对准伟大领袖毛主席为首的无产阶级司令部，指向伟大的中国人民解放军，指向毛主席亲自缔造的、林副主席亲自指挥的这样一个支柱……对毛主席司令部，现在有一种来自极“左”的，或者来自右的。“五·一六”就是来自极“左”的，它是反革命组织，是秘密的，把矛头对准无产阶级司令部。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"谢富治","type":"人物"},{"name":"中央文革","type":"人物"},{"name":"清查五·一六","type":"主题/事件"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8d688e731d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
