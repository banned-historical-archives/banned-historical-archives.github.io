ical-archives/banned-historical-archives8/main/maoquanji22.pdf"],"article":{"title":"开第三师后相机解决东明之敌","alias":"","parts":[{"type":"paragraph","text":"歼第三师后相机解决东明之敌川"},{"type":"paragraph","text":"（1946年9月5日）刘、邓:"},{"type":"paragraph","text":"现向前后王楼、砖庙集进攻之川军两个旅（一二二及一二七）不甚疲劳，且两旅靠拢，似较难打。现向东明进攻之川军两个团，是两个师的部队（三一一团属四十一师，三七四团属四十七师），经过鄂北、陕南长途跋涉，比较疲劳，且远离其后梯队，孤军深入，直迫东明城下，似较好打。望以一部固守东明，待第三师完全解决后，相机解决东明附近之敌。请按实情决定。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"申微子[1]这是毛泽东为中共中央军委起草的给晋冀鲁豫野战军司令员刘伯承"}],"authors":["毛泽东"],"dates":[{"year":1946,"month":9,"day":5}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":132,"page_end":132},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7a1823f874"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
