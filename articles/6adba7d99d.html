ar":1963,"month":7,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛泽东主席接见古巴三个代表团"},{"type":"paragraph","text":"新华社二十六日讯　毛泽东主席今天下午接见以奥斯明·费尔南德斯为首的古巴全国文化委员会代表团，以胡安·布拉斯科为首的古巴工会代表团和以佛利斯·库厄拉为首的古巴青年学生代表团。毛泽东主席同古巴同志们进行了亲切友好的谈话。"},{"type":"paragraph","text":"接见时在座的，有楚图南、张致祥、陈少敏、王照华等有关方面负责人。"},{"type":"paragraph","text":"古巴驻中国大使馆临时代办佩德罗苏也在座。（附图片）"},{"type":"paragraph","text":"右图为接见时合影。前排左起：第四人是古巴全国文化委员会代表团团长奥斯明·费尔南德斯，第二人是古巴工会代表团团长胡安·布拉斯科，第七人是古巴青年学生代表团团长佛利斯·库厄拉。"},{"type":"paragraph","text":"新华社记者　吕厚民摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6adba7d99d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
