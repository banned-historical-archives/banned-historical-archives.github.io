thors":["中国民主同盟","陈新桂"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"在民盟中央帮助党整风的组织生活会上的发言","type":"title"},{"text":"中国民主同盟陈新桂","type":"authors"},{"text":"（陈新桂：中国民主同盟候补中央委员、上海市副主任委员）","type":"subtitle"},{"text":"他在民盟中央小组帮助党整风的组织生活会上说(摘要)：","type":"paragraph"},{"text":"他所接触的知识分子，对当前“鸣”“放”有五种顾虑：①担心再有一次暴风雨；②怕变相报复；③怕提了意见没下文；④怕卫道者，全面论者围剿戴帽子；⑤少数人怀疑整风有无用处。他说：储安平提出“党天下”“一党治国”。储安平的话还没有说完。在苏联以及新民主主义国家，是无产阶级专政，是通过工人阶级先锋队——共产党专政。把党外人士看成异党分子，这样不出宗派主义就很奇怪了。他还说在延安整过主观主义，愈整愈厉害，无产阶级专政是个“根”，如果不从根本上解决，官僚主义宗派主义将越反越多。","type":"paragraph"},{"text":" 来源：《提高警惕 粉碎右派阴谋》（1957年6月）。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e77e1cff08"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
