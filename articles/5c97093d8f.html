art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"既当人民的卫生员又当毛泽东思想宣传员","authors":["某部学习毛主席著作积极分子/卫生员陈继勤"],"parts":[{"type":"paragraph","text":"中国赫鲁晓夫，这个妄图在中国复辟资本主义的头号坏家伙，一贯贩卖“业务挂帅”、“技术第一”的黑货。他在医疗卫生战线疯狂推行反革命修正主义路线，叫嚷什么“为了培养专家”，可以“不让他们参加政治运动”，等等。这是彻头彻尾的反动谬论。"},{"type":"paragraph","text":"伟大领袖毛主席领导的历次政治运动，就是无产阶级反对资产阶级和一切剥削阶级的阶级斗争。这是关系到我们国家不变颜色的头等大事。中国赫鲁晓夫不让医务人员参加政治运动，就是不要我们去同资产阶级和一切剥削阶级作斗争，妄想把我们圈在单纯看病发药的死胡同里，成为他复辟资本主义的“驯服工具”。"},{"type":"paragraph","text":"伟大领袖毛主席教导我们：政治是统帅，是灵魂。“政治工作是一切经济工作的生命线。”用毛泽东思想武装起来的革命战士，决不会上中国赫鲁晓夫的当。他越是鼓吹什么“业务挂帅”、“技术第一”，不让我们参加政治运动，我们就越是要坚持用毛泽东思想挂帅，坚持突出无产阶级政治，积极投身到火热的阶级斗争中去。我们医疗队在支农中就是这样做的。我们不但认真地为广大贫下中农看病治病，而且，走到哪里，就把毛泽东思想宣传到哪里，把毛泽东思想学习班办到哪里，把革命大批判开展到哪里，既当人民的卫生员，又当毛泽东思想宣传员。有一位大队党支部副书记，我们不但给她医好了胃病和腰腿痛病，而且通过共同活学活用毛主席著作，帮她克服了想撂挑子的错误思想。事后她激动地说：“你们不仅治好了我身上的病，更重要的是治好了我思想上的病。你们真是毛主席派来的好医生。”事实证明，只有念念不忘突出无产阶级政治，才能使一切工作永远沿着毛主席的无产阶级革命路线胜利前进。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5c97093d8f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
