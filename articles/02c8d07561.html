script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"“我们不能成为电视的奴隶”马拉多纳指责国际足联不关心选手们的利益","authors":[],"dates":[{"year":1995,"month":1,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报专稿　“我们不能成为电视的奴隶!”这是足坛“坏小子”马拉多纳在葡萄牙接受《环球报》记者采访时愤然吐出的口号。"},{"type":"paragraph","text":"这位对国际足联早就不满的球星言语难免偏激。他指责国际足联尤其是阿维兰热从来都不关心选手们的利益，不在意球员们的疾苦，指责官员们肆意更改比赛时间，只是为了给电视转播提供方便。"},{"type":"paragraph","text":"“我们在大中午的烈日下奔跑、踢球，而他们那些当官的在有空调的房间里休息，喝着香槟、就着小吃，这种情况不能再继续下去了，我们需要的是真正为选手们的利益奔波、操劳的足联官员。”他抱怨道:“我们需要的是真正懂得足球的人，是能够和其他人协商、善于听取别人意见的领导人，而不是独断专行的独裁者!”"},{"type":"paragraph","text":"谈到国际足联的财经分配时，马拉多纳更是气不打一处来:“他们总是在标榜自己用世界杯赚来的资金转拨给了各国，帮助他们建立足球场，可这完全是无耻的谎话，至少，在阿根廷我没有见到过这样一个球场，倒是在胡里奥·格龙多纳先生(阿根廷足协主席)的别墅里见过一个小型球场。”"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"02c8d07561"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
