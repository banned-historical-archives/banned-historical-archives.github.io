<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"jfjb","name":"解放军报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"dates":[{"year":1977,"month":2,"day":1}],"page_start":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"阶级仇恨满胸膛深揭猛批“四人帮”广州部队某团一炮连采用“算帐”方法揭露“四人帮”极右派面目","authors":[],"parts":[{"type":"paragraph","text":"本报讯 广州部队某团一炮连党支部，引导干部战士采用“算账”的方法，揭批“四人帮”的反革命罪行。他们着重算了三笔账："},{"type":"paragraph","text":"一、摆“四人帮”大搞阴谋诡计，篡党夺权的罪行，算他们在政治上的迫害账，认清他们刽子手的凶恶面目。干部战士历数了“四人帮”一条条罪状，无比愤慨地说：“四人帮”毒如蛇，狠如狼，他们迫害伟大领袖和导师毛主席，陷害敬爱的周总理和中央其他领导同志：他们乱打棍子，乱扣帽子，要把许多忠于毛主席革命路线的好干部置于死地而后快；他们大搞顺我者昌，逆我者亡，对于不跟他们走的革命群众，实行残酷镇压。白骨精江青甚至连自己身边的工作人员也不放过，稍不如意就以莫须有的罪名关进监狱。“四人帮”是一伙穷凶极恶的刽子手。"},{"type":"paragraph","text":"二、摆“四人帮”破坏革命和生产的事实，算他们给我国社会主义建设造成的损失账，认清他们极右派的反动面目。五班以江西拖拉机厂为例算了一笔账：这个厂由于受“四人帮”的破坏，去年前十个月总共只生产拖拉机五百台；粉碎“四人帮”以后的十一、十二两个月，生产拖拉机一千零六台。按每月生产五百零三台计算，去年这个厂少生产拖拉机四千五百三十台。家在福建的战士李碧生说：“四人帮”不顾国家安危，不顾人民死活，长期以来把黑手伸向各地，唯权是夺，搞得国无宁日；他们挥舞“唯生产力论”的大棒，谁抓生产就打向谁，造成一些单位停工停产，妄图把社会主义的经济基础搞垮，把无产阶级的家业搞光，以便造成混乱，乱中夺权。"},{"type":"paragraph","text":"三、摆“四人帮”穷奢极欲、肆意挥霍国家财富的事实，算他们的剥削账，认清他们吸血鬼的丑恶面目。炊事班同志气愤地说：王洪文在上海住了三个月，花费两万三千多元，这笔钱够我们全连一年零两个月的伙食费，等于一个普通工人几十年的工资；江青窜到我们南海前哨，下令给她修建“行宫”，一下花掉了七十多万元，这笔钱可以用来购买手扶拖拉机二百三十多台，可修建供一千多人居住的工人宿舍。“四人帮”口头上高喊“限制资产阶级法权”，实际上是贪得无厌的吸血鬼。"},{"type":"paragraph","text":"在摆事实的基础上，党支部又引导大家回忆地主资本家的罪恶，回忆国民党反动派的罪恶，并且同“四人帮”的罪恶作了比较，使干部战士更加看清了“四人帮”比地主资本家还厉害，是国民党反动派的残渣余孽。他们干了地主资本家和国民党反动派想办而办不到的事情。干部战士们说：清算“四人帮”的罪恶账，阶级仇恨满胸膛；乘胜前进追穷寇，深揭狠批斗志昂。"}],"alias":""},"tags":[{"name":"江青","type":"人物"},{"name":"四人帮","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"限制资产阶级法权","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5f199fe8b4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
