art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"再议“四人帮”的“放羊梦”","authors":["蒋祖清〖HH/换行〗DW：浙江省军区政治部"],"parts":[{"type":"paragraph","text":"去年，曾见报上有一篇揭露“四人帮”“放羊梦”的短文，说“四人帮”把群众污蔑为一群绵羊，梦想由他们几个带头羊带着走修正主义道路，读后至今难忘。由此想到，在“四人帮”的“放羊梦”里还有一梦，那就是梦想使我军打起仗来“放羊”。"},{"type":"paragraph","text":"“四人帮”不是拚命攻击我军的条例条令是“条条框框”、“紧箍咒”吗？不是竭力鼓吹“战士可以反班长，班长可以反排长，排长可以反连长，……一级反一级”吗？一无纪律约束，二可违命抗上，军队就不成为军队，打起仗来那能不“放羊”？"},{"type":"paragraph","text":"张春桥说：“放羊也不怕”。为何不怕？还不就是要由他们这四只“带头羊”到时候手举白旗降敌么？这对一心想当“儿皇帝”的“四人帮”来说，岂止是“不怕”，还真是盼着呢！"},{"type":"paragraph","text":"然而这也终究不过是一梦。革命人民怎么能让他们的阴谋得逞呢！"}],"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e74bef23ed"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
