支援刚果人民反对帝国主义和殖民　主义、维护民族独立和国家统一的正义斗争。","authors":[],"dates":[{"year":1961,"month":2,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京21日电】　中华人民共和国主席刘少奇今天打电报给几内亚共和国总统塞古·杜尔，表示中国政府和人民支持几内亚共和国政府就刚果共和国总理卢蒙巴被杀害事件所采取的立场。电文如下:科纳克里"},{"type":"paragraph","text":"几内亚共和国总统塞古·杜尔先生阁下:"},{"type":"paragraph","text":"阁下2月17日来电收到。中华人民共和国政府和中国人民支持几内亚共和国政府就刚果共和国总理巴帝斯，卢蒙巴被杀害事件所采取的立场。卢蒙巴总理被害事件，不仅是美、比帝国主义及其代理人对刚果人民和全体非洲人民的猖狂进攻，也是对亚洲和世界爱好和平人民的严重挑衅。中国政府和中国人民对此感到极大的愤怒，我国政府已经在2月14日发表抗议声明，我国首都各界五十多万人在2月18日举行了抗议集会，其他许多大城市也都纷纷举行了抗议集会。我国政府已经重申承认以基赞加代理总理为首的刚果合法政府，并且同刚果共和国建立了外交关系。我国政府和人民决心从一切方面支援刚果人民反对帝国主义和殖民主义、维护民族独立和国家统一的正义斗争。我们深信，只要刚果人民坚强的团结起来斗争到底，一定会赢得最后胜利。"},{"type":"paragraph","text":"顺致最崇高的敬意。"},{"type":"paragraph","text":"中华人民共和国主席　刘少奇"},{"type":"paragraph","text":"1961年2月21日于北京"},{"type":"paragraph","text":"塞古·杜尔总统17日给刘少奇主席的电报"},{"type":"paragraph","text":"北京"},{"type":"paragraph","text":"中华人民共和国主席先生阁下:"},{"type":"paragraph","text":"我荣幸地通知阁下，为了对巴蒂斯·卢蒙巴总理和他的同伴们的被杀害表示抗议，几内亚共和国指令宣布2月14日为国哀日，停止工作一天，照领工资。在这一天里，全国各地都举行了群众大会。已经立即采取了以下措施:第一，要求安全理事会谴责联合国当局背叛了它的使命。我们已经决定撤回对联合国当局的一切信任，并且决定把在几内亚领土上的一切联合国专家和顾问交回联合国。第二，几内亚共和国承认基赞加政府为刚果的合法政府。我们请求你支持我们为反对帝国主义阴谋恶化刚果局势而进行的努力。"},{"type":"paragraph","text":"顺致崇高的敬意。"},{"type":"paragraph","text":"塞古·杜尔"},{"type":"paragraph","text":"1961年2月17日于科纳克里"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6dc89f654f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
