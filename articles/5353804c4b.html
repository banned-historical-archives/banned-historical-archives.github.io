script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"首都各少数民族著名人士指出要发展安定团结政治局面 必须反对资产阶级自由化","authors":[],"dates":[{"year":1987,"month":1,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社北京一月九日电　首都各少数民族著名人士今天在国家民委举行的座谈会上指出，珍惜和发展安定团结的政治局面符合全国各族人民的根本利益；要巩固和发展安定团结的大好形势，就必须坚持四项基本原则，旗帜鲜明地反对资产阶级自由化。"},{"type":"paragraph","text":"历史学家、北京师范大学教授白寿彝(回族)说，现在有些人把民主和自由理解为想干什么就干什么，实际上这种绝对的民主、自由是不存在的。我国宪法规定公民有游行的自由，但是我们在行使这个权利的时候要想到，自己是中华人民共和国的公民，在行使自己公民权利的时候是否有利于国家，是否符合广大人民群众的利益，不能忘了作为公民对国家所应承担的义务。"},{"type":"paragraph","text":"全国人大民委副主任吴向必(苗族)、爱新觉罗·溥杰(满族)和全国人大常委会委员扎喜旺徐(藏族)在座谈中都指出，我们都不要忘记十年内乱的那段历史。团结是来之不易的，安定是改革开放的需要。我们希望广大青年学生明辨是非，要坚持四项基本原则，维护安定团结的政治局面。"},{"type":"paragraph","text":"中共中央统战部、全国人大民委、国家民委的负责同志及在京的卅一个少数民族的六十多位知名人士出席座谈会。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5353804c4b"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
