rt":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"叶剑英委员长就国际儿童年发表谈话","authors":[],"parts":[{"type":"paragraph","text":"新华社八月五日讯 人大常委会委员长叶剑英今天就国际儿童年向新华社记者发表了谈话。"},{"type":"paragraph","text":"叶剑英委员长说，联合国大会决定今年是国际儿童年，这是个有意义的倡议。它对今天的儿童、对人类的未来都将产生影响。尽管世界各国儿童的处境和存在的问题不同，但全世界的儿童有一个共同点，就是需要成人给予他们更多和更好的关怀和保护。这个问题是涉及到整个社会、关系到每个国家和民族前途和命运的崇高事业。"},{"type":"paragraph","text":"他说，我国政府和人民愿和各国关心儿童幸福的人们一起，为全世界的儿童们争取一个和平的国际环境和美好的未来而共同奋斗。"}],"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"60c696d858"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
