ical-archives/banned-historical-archives8/main/maoquanji21.pdf"],"article":{"title":"给黄齐生\"的信","alias":"","parts":[{"type":"paragraph","text":"给黄齐生\"的信"},{"type":"paragraph","text":"（1945年12月29日）黄老先生道席："},{"type":"paragraph","text":"新词拜读，甚感盛意！钱老先生处乞代致候。敬祝六七荣寿，并颂新年健康！若飞寄来报载诸件付上一阅，阅后乞予退还。其中国民党骂人之作，鸦鸣蝉噪，可以喷饭，并付一观。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十二月廿九日[1]黄齐生（1879—1946)，贵州安顺人，教育家。他是王若飞的舅，曾积极参加抗日救亡运动和反内战反独裁的民主运动，当时在延安。[2]指钱拯（1884—1968)，原籍浙江杭县（今余杭)，当时是陕甘宁边区参议会参议员。黄老完生运帝"},{"type":"paragraph","text":"新词持溪飞感盛意!我老先爱乞代改候。做候"},{"type":"paragraph","text":"第舞，玉颂新平处"},{"type":"paragraph","text":"飞雾之你鸭饭，主什一童见"},{"type":"paragraph","text":"东毛泽东致黄齐生信的手稿。"}],"authors":["毛泽东"],"dates":[{"year":1945,"month":12,"day":29}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":119,"page_end":120},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ca56631eca"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
