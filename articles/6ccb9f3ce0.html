<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"南京高教界三反运动获得成绩进一步展开思想改造学习深入批判资产阶级的腐朽思想","authors":[],"dates":[{"year":1952,"month":4,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【南京讯】南京市高等教育界，在南京市高等教育界学习委员会领导下，就三反运动中初步批判资产阶级思想所获的成绩的基础上，进一步深入展开批判资产阶级思想的思想改造学习运动。学习决分两个单元进行:第一单元以批判资产阶级政治思想为主；第二单元以批判资产阶级的学术思想、教学观点、工作作风为主。以期彻底批判资产阶级思想，树立工人阶级思想的领导地位，明确政治立场，划清思想界限，为高等教育的改革作好准备。预定学习时间自四月初至七月十五日为止。学习方法着重精读文件、听取报告、领导带头、联系实际，开展批评与自我批评。"},{"type":"paragraph","text":"为了使高教界对这次学习有正确的认识，南京高等教育界学习委员会于四月七日召开思想改造学习运动动员大会。会上由高教界学习委员会主任委员潘菽总结了南大在三反运动学习中的收获和缺点。中共南京市委宣传部部长石西民作了“进一步批判资产阶级丑恶思想”的报告。石西民的报告指出了上一阶段学习的收获，为普遍地批判了知识分子的名利思想，知识商品化思想，以及投机取巧博取名利的种种行为，初步明确了资产阶级与工人阶级的思想界限，认识到思想改造的重要，并初步的运用了批评与自我批评的武器，促进了教学上的认真负责，同事间的团结融洽，在工作上开始出现了新的面貌。石西民同时指出:缺点表现在思想批判不深刻，未吸引同学参加到学习中来对教师提意见，以及学习还不平衡。他说:在知识分子中影响最大的如资产阶级的政治思想、学术思想、教学观点等等都还没有触及。这些思想又正是教师在大量散布着腐蚀学生头脑的东西。所以进一步批判资产阶级思想，就成为摆在面前急待解决的问题。"},{"type":"paragraph","text":"【又讯】南京大学学生在三反斗争中，检查批判资产阶级思想作风的学习获得巨大成绩。同学们思想认识不断提高，对卑鄙龌龊的资产阶级思想感到无比憎恨。批评与自我批评也都普遍地、尖锐地展开起来。在批判这些丑恶的资产阶级思想以后，学习和工作上都开始出现新气象。机械系二年级同学，从前大家不愿干课代表，认为于己无益，并且妨害自己学习，现在大家却极踊跃地站出来竞选。体育系有同学从前不敢跳木箱，怕跌交，现在在为祖国而学习的思想基础上，他们有了勇气，不仅敢跳，而且学习得有了成绩。"}],"comments":[],"origin":"南京","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6ccb9f3ce0"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
