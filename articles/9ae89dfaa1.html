script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"type":"pdf","id":"wenji5","name":"毛泽东文集第五卷（1999）","internal":false,"official":true,"author":"中央文献研究室","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/wenji5.pdf"],"article":{"title":"截断宿蚌路，歼敌于淮河长江以北","description":"根据中央档案馆保存的原件刊印。","dates":[{"year":1948,"month":11,"day":9}],"parts":[{"text":"截断宿蚌路，歼敌于淮河长江以北","type":"title"},{"type":"appellation","text":"陈邓，粟陈张，并谭王："},{"type":"paragraph","text":"齐电悉。（一）徐州敌有总退却模样，你们按照敌要总退却的估计，迅速部署截断敌退路以利围歼是正确的。（二）陈、邓直接指挥各部，包括一、三、四、九纵应直出宿县，截断宿蚌路，四纵不应在黄口附近打邱清泉，而应迅速攻宿县，一纵在解决一八一师后，应立即去宿县。华野三、广两纵的任务是对付邱清泉，但应位于萧县地区从南面向黄口徐州线攻击，以便与宿县我军联结。如敌向南总退却时，则集中六个纵队歼灭之。（三）粟、陈、张应令谭、王集中七、十、十三纵及由南向北之十一纵，以全力向李弥兵团攻击，用迅速手段歼灭该兵团的全部或大部，控制并截断徐州至运河 车站之间的铁路，运东主力则歼灭黄兵团。（四）只要以上几点办到，就能破坏敌人总退却的计划，遭我全部歼灭，并占领徐州。现在不是让敌人退至淮河以南或长江以南的问题，而是第一步（即现在举行之淮海战役）歼敌主力于淮河以北，第二步（即将来举行的江淮战役）歼敌余部于长江以北的问题。（五）敌指挥系统甚为恐慌混乱，望你们按照上述方针，坚决执行，争取全胜。此时我军愈坚决，愈大胆，就愈能胜利。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"九日十六时"}],"comment_pivots":[{"part_idx":0,"offset":15,"index":1},{"part_idx":1,"offset":10,"index":2},{"part_idx":2,"offset":2,"index":3},{"part_idx":2,"offset":96,"index":4},{"part_idx":2,"offset":230,"index":5},{"part_idx":2,"offset":260,"index":6},{"part_idx":2,"offset":279,"index":7},{"part_idx":2,"offset":381,"index":8}],"is_range_date":false,"authors":["毛泽东"],"comments":["这是毛泽东为中共中央军委起草的给中原野战军第一副司令员陈毅、政治委员邓小平和华东野战军代司令员兼代政治委员粟裕、参谋长陈士榘、副参谋长张震等的电报。","谭王，指谭震林、王建安，当时分别任华东野战军山东兵团政治委员和副司令员。","指陈毅、邓小平一九四八年十一月八日给谭震林并报中共中央军委的电报。电报说，我已令三纵向黄口、徐州急进，协同四纵歼敌。现三、九两纵正向东进。今晨经由永城向宿县逃退之敌，确系邱清泉兵团部队。蒋军究竟只撤退邱清泉、刘汝明两部，还是整个放弃徐州，不日即可判明。如判明蒋军整个南撤设防淮河时，如有可能，你们要派部队举行追击，迅速进至淮南、路东。","邱清泉，当时任国民党军第二兵团司令官。","李弥兵团，指李弥任司令官的国民党军第十三兵团。","运河，镇名，在江苏邳县。","黄兵团，指黄百韬任司令官的国民党军第七兵团。","江淮战役于一九四九年一月十六日至二十四日举行。这次战役歼灭了残留在淮河以南长江以北地区并向江南撤退的敌人，解放了江淮间广大地区。"],"page_start":204,"page_end":205,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9ae89dfaa1"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
