script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"搞修正主义的必然搞分裂","authors":["常缨"],"dates":[{"year":1976,"month":11,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"搞修正主义的必然搞分裂"},{"type":"paragraph","text":"常缨"},{"type":"paragraph","text":"搞修正主义的人，在组织上一定要搞分裂主义。“四人帮”搞修正主义，篡改毛主席的指示，也就是无耻背叛马列主义、毛泽东思想。他们推行修正主义路线，复辟资本主义，必然遭到全党全军全国人民的坚决反对和抵制；因此，只能纠集一小撮人，拉山头，搞宗派，闹分裂。"},{"type":"paragraph","text":"搞分裂者注定失败，原因是他们脱离人民，不得人心。一切真正的共产党员、革命人民不赞成分裂，反对分裂。特别是经过无产阶级文化大革命的锻炼，掌握了马列主义、毛泽东思想的亿万人民群众，对维护党的团结的重要性有了更深刻的认识，会自觉地起来同一切搞修正主义、搞分裂、搞阴谋诡计的人作坚决的斗争。"},{"type":"paragraph","text":"我党历史上的机会主义、修正主义路线头子，妄图分裂我们的党，搞垮我们的党，都没有好结果。陈独秀纠合了一个所谓“列宁主义者左翼反对派”，进行分裂党的阴谋活动，未能得逞。瞿秋白、李立三、王明三次“左”倾机会主义路线，实行宗派主义的干部政策，极力排斥和打击坚持正确路线的同志，结果都是搬起石头砸自己的脚。长征途中，张国焘另立中央，分裂党，分裂红军，结果孤单单一个人跑到了国民党那里，当了蒋介石的一个小特务。可见搞分裂者不得人心。全国解放后，高岗饶漱石、彭德怀、刘少奇、林彪，都搞分裂，篡党夺权，结果都被扫进了历史的垃圾堆。王张江姚反党集团闹分裂，结果也搞垮了他们自己。历史经验证明：我们这个党是有希望的，要搞垮我们的党是不容易的。"},{"type":"paragraph","text":"修正主义存在一天，分裂的危险就存在一天。反修斗争与反对分裂总是连在一起的。我们要最紧密地团结在以华国锋主席为首的党中央周围，一切听从党中央的指挥，在同“四人帮”进行坚决斗争中加强党的团结和统一，在长期的反修防修斗争中加强党的团结和统一。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"四人帮","type":"人物"},{"name":"夺权","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4db4782c1b"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
