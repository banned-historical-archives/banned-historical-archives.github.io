al-archives/banned-historical-archives8/main/maoquanji2.pdf"],"article":{"title":"女子革命军","alias":"","parts":[{"type":"paragraph","text":"女子革命军"},{"type":"paragraph","text":"（1919年7月14日）"},{"type":"paragraph","text":"或问女子的头和男子的头，实在是一样。女子的腰和男子的腰实在是一样。为甚么女子头上偏要高竖那招摇畏风的警？女子腰间偏要紧缚那拖泥带水的裙？我道，女子本来是罪人，高髻长裙，是男子加于他们的刑具。还有那脸上的脂粉，就是黔〈\u003e文。手上的饰物，就是桔。穿耳包脚为肉刑，学校家庭为牢狱。痛之不敢声，闭之不敢出。或问如何脱离这罪？我道，惟有起女子革命军。"}],"authors":["毛泽东"],"dates":[{"year":1919,"month":7,"day":14}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":32,"page_end":32},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"badfabd33d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
