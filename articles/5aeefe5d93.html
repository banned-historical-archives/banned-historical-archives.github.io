script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"团结起来反对殖民剥削和侮辱要求作人的权利  中美洲墨西哥巴拿马印第安民族召开代表大会","authors":[],"dates":[{"year":1977,"month":1,"day":31}],"is_range_date":false,"parts":[{"type":"paragraph","text":"团结起来反对殖民剥削和侮辱要求作人的权利"},{"type":"paragraph","text":"中美洲墨西哥巴拿马印第安民族召开代表大会"},{"type":"paragraph","text":"新华社巴拿马城一九七七年一月二十八日电  中美洲、墨西哥和巴拿马印第安民族第一次国际代表大会从一月二十四日至二十八日在巴拿马城举行。大会分析了这些国家的土著居民在文化、社会、政治和经济等方面遭遇的问题。除上述国家的代表外，南美洲国家、美国、加拿大的代表作为观察员出席了会议。"},{"type":"paragraph","text":"在大会过程中，代表们表示，各印第安民族应该团结起来进行斗争，反对“过去剥削和侮辱我们、现在仍然在剥削和侮辱我们的”殖民主义者，恢复“作为人的天然权利”。这些权利被那些“奴役和剥削美洲印第安人”的殖民主义者“在理论和实践上予以否定”。"},{"type":"paragraph","text":"在这次代表大会上正式成立了“中美洲印第安民族联合会”。联合会的组织章程规定，联合会的宗旨是：“谋求各印第安民族的团结”，“加强各印第安民族之间的友谊和相互了解”，“促进同其他和印第安民族有着共同事业的民族的团结”；“反对一切灭绝种族的大屠杀”；“促进中美洲人民在合理使用每个国家、特别是印第安民族所拥有的经济资源的基础上实现经济独立”。根据组织章程，联合会的会址设在巴拿马城。"},{"type":"paragraph","text":"巴拿马内政和司法部长豪尔赫·卡斯特罗出席了大会的开幕式。他在谈到巴拿马运河问题时，呼吁所有巴拿马人同心协力，在整个巴拿马领土上、实现完全的独立。"},{"type":"paragraph","text":"在十五世纪末殖民主义者占领和统治美洲之前，土著印第安民族就居住在拉丁美洲。他们为这个地区的文化、社会、经济和政治的发展作出了宝贵的贡献。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5aeefe5d93"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
