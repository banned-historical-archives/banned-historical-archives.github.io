art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"齐奥塞斯库同志和夫人瞻仰毛主席遗容耿飚同志等陪同前往 齐奥塞斯库同志在毛主席坐像前献了花圈","authors":[],"parts":[{"type":"paragraph","text":"新华社五月十七日讯 罗马尼亚共产党总书记、罗马尼亚社会主义共和国总统尼古拉·齐奥塞斯库和夫人埃列娜·齐奥塞斯库及其随行人员，由中共中央政治局委员、国务院副总理耿飚和外交部长黄华陪同，今天上午前往毛主席纪念堂，瞻仰毛泽东主席的遗容。"},{"type":"paragraph","text":"齐奥塞斯库同志在毛主席坐像前献了花圈，花圈上披挂着罗马尼亚共产党党旗和罗马尼亚社会主义共和国国旗。"},{"type":"paragraph","text":"齐奥塞斯库和夫人等罗马尼亚同志缓步走进瞻仰厅，在毛泽东主席的遗体前肃立致哀。"},{"type":"paragraph","text":"齐奥塞斯库同志和夫人，及其随行人员，由耿飚同志等陪同，五月十七日前往毛主席纪念堂，瞻仰了毛泽东主席遗容。齐奥塞斯库同志在毛主席坐像前默哀，并献了花圈。 新华社记者摄（照片）"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"耿飚","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1dcca2947f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
