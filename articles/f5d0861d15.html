tart":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"牢记毛主席指示 一刻也不脱离群众","authors":["北京部队学习毛主席著作积极分子代表大会代表？某师副政委","宋双来"],"parts":[{"type":"paragraph","text":"在无产阶级文化大革命一片大好形势下，伟大领袖毛主席教导我们：“要很好地解决上下级关系问题，搞好干部和群众的关系。”毛主席的这一最新指示，非常英明，非常正确，非常及时。不仅有伟大的现实意又，而且有深远的历史意义。它是干部搞好思想革命化的指路明灯，是把无产阶级文化大革命进行到底的强大思想武器。我们一定要句句照办，字字照办，把最高指示铭刻在心头，落实到行动。"},{"type":"paragraph","text":"毛主席早在一九四一年三月就教导我们：“群众是真正的英雄，而我们自己则往往是幼稚可笑的，不了解这一点，就不能得到起码的知识。”是否相信群众、依靠群众、联系群众，这是真马列主义还是假马列主义，是真革命还是假革命的试金石和分水岭。实践告诉我们，群众是三大革命运动的实践者，群众就是比我们高明。作为一个领导干部，必须经常“到下面去走一走，看一看，要坚持群众路线，遇事多和群众商量，做群众的小学生”。只有这样，才能更深刻地理解伟大的毛泽东思想，理解党的路线、方针和政策，才能使我们的心和群众的脉搏跳动在一起，才能正确指导工作，才能无往而不胜。如果高高在上，脱离群众，就会一事无成。"},{"type":"paragraph","text":"我深深体会到：相信群众，依靠群众，做群众的小学生，归根结底，是世界观问题。解放前，我是个穷小子。在战争年代里，跟着毛主席干革命，那时就是一个心眼，和群众吃在一起，住在一起，不怕苦，不怕死，当了干部也能和群众打成一片。全国胜利以后，由于自己改造思想不够，随着职位逐渐提高，生活条件不断改善，便产生了特殊化的思想。特别是觉得自己有斗争经验，有些“老本”，因此，到群众中去就少了，联系群众就差了。我们伟大领袖毛主席的最新指示，及时地给我指明了继续前进的方向。我一定坚决响应伟大领袖毛主席的号召，以“斗私，批修”为纲，彻底改造世界观，永远做群众的小学生，永远跟着毛主席干革命。"}],"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f5d0861d15"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
