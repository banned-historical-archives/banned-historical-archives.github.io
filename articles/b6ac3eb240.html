ar":1965,"month":9,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京17日电　毛泽东主席今天下午会见日本共产党中央政治局委员、书记处书记袴田里见，日本共产党中央委员、书记处书记砂间一良，同他们进行了亲切的谈话。"},{"type":"paragraph","text":"参加会见的，有中共中央副主席刘少奇、周恩来，总书记邓小平，政治局委员、书记处书记彭真，政治局候补委员、书记处书记康生，中央委员刘宁一等。"},{"type":"paragraph","text":"会见以后，毛泽东席设宴招待袴田里见和夫人袴田菊，砂间一良和夫人砂间秋。"},{"type":"paragraph","text":"\u003cIMG alt=请插入5号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1965\\09\\659i010301.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgaut\u003e钱嗣杰\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e毛泽东主席会见日本共产党中央政治局委员、书记处书记袴田里见(前左四)，和日本共产党中央委员、书记处书记砂间一良(前左二)"},{"type":"paragraph","text":"(新华社传真　钱嗣杰　摄)\u003c/FONT\u003e"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b6ac3eb240"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
