ical-archives/banned-historical-archives0/main/maoquanji29.pdf"],"article":{"title":"对航空学校是否迁移报告的批语","alias":"","parts":[{"type":"paragraph","text":"对航空学校是否迁移报告的批语！"},{"type":"paragraph","text":"（1950年10月12日）不要迁移。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十月十二日"},{"type":"paragraph","text":"[1]这是毛泽东对中国人民解放军空军司令员刘亚楼1950年10月10日报告的批语。"},{"type":"paragraph","text":"[2]刘亚楼的报告说：根据朝鲜战争的经验，美帝特别企图在空军方面显其威风，对各种航空目标加以拼命的轰炸，尤其是对航空学校。估计到当前情况的发展，在发生战争的情况下，我各航空学校的现有位置，均处在离前线或海岸不远的地方，而且在将特别引起敌人注意的主要交通线上（中长路）和经济、政治中心（沈阳、北京）。因此，尺等正在考虑我军各航空学校是否需要迁移的问题。"}],"authors":["毛泽东"],"dates":[{"year":1950,"month":10,"day":12}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":235,"page_end":235},"tags":[{"name":"毛泽东","type":"人物"},{"name":"朝鲜战争","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1c88e132df"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
