ors":["毛泽东"],"dates":[{"year":1964,"month":6,"day":24}],"is_range_date":false,"parts":[{"text":"接见越南外宾时关于保健工作的讲话","type":"title"},{"text":"毛泽东","type":"authors"},{"text":"中国的保健工作是学习苏联的，我不能完全听保健医生的话。我同我的医生有一个君子协定：我发烧时请你，我不发烧时不找你，你也不找我，我说一年不找他算他功劳大，如果每个月都找他，这就证明他的工作未做好。我对医生的话只听一半，要他一半听我的。完全听医生的话病就多了，活不了。以前没有听说那么多高血压、肝炎。一个人如果不动动，只是吃的好，穿的好，住的好，出门乘车，不走路，就会多生病。衣食住行受太好的照顾，是高级干部生病的四个原因。我们的保健工作学了苏联的，把不专门的医生变成专门的，不多看各种各样的病不行，要改进。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"34694778ce"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
