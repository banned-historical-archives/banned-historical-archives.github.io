tes":[{"year":1973,"month":1,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　一九七二年上海市农民篮球比赛，经过五天五十场的紧张比赛，已于一月十四日晚上在川沙县体育场胜利闭幕。"},{"type":"paragraph","text":"参加这次比赛的，有十个县以公社为单位的二十个男女代表队。这些代表队的成员，绝大多数是复员军人、回乡知识青年，他们既是农业劳动的闯将，又是农村的体育积极分子。参加比赛的单位，男子队有:青浦县金泽公社、嘉定县南翔公社、崇明县马桥公社、南汇县惠南公社、上海县诸翟公社、松江县新浜公社、宝山县月浦公社、奉贤县庄行公社、金山县金卫公社、川沙县金桥公社。女子队有:青浦县金泽公社、嘉定县朱桥公社、崇明县汲浜公社、南汇县宣桥公社、上海县七一公社、松江县新浜公社、金山县张埝公社、宝山县杨行公社、奉贤县齐贤公社、川沙县高南公社。"},{"type":"paragraph","text":"在比赛过程中，广大运动员、裁判员、工作人员遵循毛主席关于“路线是个纲，纲举目张”的伟大教导，以批修整风为纲，深入批判了刘少奇一类骗子散布的“锦标主义”以及“体育不能下农村”等谬论，使大家提高了贯彻执行毛主席革命体育路线的自觉性。"},{"type":"paragraph","text":"在比赛中，各代表队认真贯彻“友谊第一，比赛第二”的方针，互相学习，交流经验，取长补短，团结友爱，共同提高。运动员胜不骄，败不馁，勇敢顽强，不怕困难，赛出了风格，赛出了水平，运动技术普遍有了提高。"},{"type":"paragraph","text":"一月十四日晚上，在川沙县人民大会堂隆重举行了闭幕式。上海市革委会郊区组，上海市体委，中共川沙县委等负责同志出席了闭幕式。"},{"type":"paragraph","text":"在闭幕大会上，大会竞赛组宣布了比赛成绩，接着发了奖状。"},{"type":"paragraph","text":"闭幕式最后，川沙县部分公社的文艺小分队表演了文艺节目。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"793da7c2e9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
