tart":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"昆明部队某团炮连掀起学习毛泽东思想热潮","authors":[],"parts":[{"type":"paragraph","text":"本报讯 昆明部队某团二营炮连的干部在学习毛泽东思想的高潮中，自觉地要求自己学得更多些，钻得更深些，站在学习运动的前头，有效地带领了战士的学习，推动了批邓、反击右倾翻案风斗争的深入发展。"},{"type":"paragraph","text":"在沉痛悼念伟大的领袖和导师毛主席逝世的日子里，炮连干部战士怀着深厚的无产阶级感情，赞颂毛主席的丰功伟绩，如饥似渴地学习毛主席著作，连队很快形成了学习毛泽东思想的热潮。这就给干部提出了一个迫切的要求：一定要站在学习运动的前头，带领群众前进。"},{"type":"paragraph","text":"炮连干部把决心变为行动，使连队迅速呈现出干部带战士、战士促干部的新气象。指导员张俊，订出了通读《毛泽东选集》一至四卷的计划。近半个月来，他学习了《中国社会各阶级的分析》、《湖南农民运动考察报告》以及毛主席关于批邓、反击右倾翻案风的一系列重要指示和关于社教运动的批示，并且写了读书笔记。他说：“想到毛主席对我们的殷切期望，想到毛主席为我们留下了战无不胜的毛泽东思想，浑身就有使不完的劲头，用不完的力气。工作再忙，也不能放松学习。”他每天总要挤出两小时来读书，在全连起了带头作用。干部刻苦的学习精神，带动了全连战士。五班在战备、施工十分紧张的情况下，由班长和理论骨干带领，每天挤出一个小时，认真学习毛主席著作。有一次，收工已经很晚了，战士们来不及洗脸、换衣服，就由班长主持学习讨论。大家说，毛主席为我们开创的无产阶级革命事业，我们一定要把它进行到底。我们只有认真学习毛泽东思想，努力实践毛泽东思想，坚持无产阶级专政下的继续革命，才能不辜负毛主席的亲切教导和培育。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"054dbe4ce6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
