["冯国大","北京矿业学院","尹毅夫","汤伯森","贾佑庸","阎林森"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"右派言论——攻击、丑化党员","type":"title"},{"text":"北京矿业学院阎林森贾佑庸冯国大汤伯森尹毅夫","type":"authors"},{"text":"“党员执行党的方针政策，执行党的指示，党员是木头人，不会独立思考，党员和组织的关系好比狗和主人，主人给些吃的就跟着跑，而不管它主人是好是坏，都是忠诚的。”（北京矿业学院  阎林森）","type":"paragraph"},{"text":"“党员使人望而生畏，党的门禁森严，难以靠近是党群关系恶化的原因。”（北京矿业学院  贾佑庸）","type":"paragraph"},{"text":"“党几年来培养了一批盲目的崇拜者，说着清一色的话，包庇党的错误，党员只听上级领导布置，而不开动脑筋，不追求真理。”（北京矿业学院　冯国大）","type":"paragraph"},{"text":"“党团员都是挂牌的，其目的是为了找爱人，向上爬。”（北京矿业学院  汤伯森）","type":"paragraph"},{"text":"“党员威风凛凛出现于群众面前，批评别人是能手，整别人思想是家常使饭。”（北京矿业学院  一枝梅）","type":"paragraph"},{"text":"“毛主席是土包子，党团员是混旦，王八旦，拍马溜须的人，是坐探，走狗，和特务。”（北京矿业学院　尹毅夫）","type":"paragraph"},{"text":" 来源：《高等学校右派言论选编》（中共中国人民大学委员会，1958年8月）。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5d52bda18a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
