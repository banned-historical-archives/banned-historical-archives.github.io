ical-archives/banned-historical-archives0/main/maoquanji48.pdf"],"article":{"title":"对关锋、戚本禹反映北京市文化大革命情况报告的批语","alias":"","parts":[{"type":"paragraph","text":"对关锋、戚本禹反映北京市文化大革命情况报告的批语"},{"type":"paragraph","text":"（1966年8月28日）"},{"type":"paragraph","text":"此件印发政治局、书记处、中央文革小组、北京市委以及薄一波、陶鲁各同志。此事应当讨论一下。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"八月二十八日上午"},{"type":"paragraph","text":"[1]指中共中央文化革命小组组员关锋、戚本禹1966年8月26日给副组长江青的报告。报告中说，北京市的红卫兵在8月18日百万人大会后有了很大发展，各大、中学普遍建立了组织。当前运动的主流是健康的，但也有一些缺点，产生了一些副作用。例如捉人、打人的现象很多，特别是捉了、打了一些好人和中间群众；抄家的范围宽了一些；对群众日常生活中的习惯干预得多了一点。北京新市委的一些领导人对红卫兵的活动采取消极观望态度，不敢积极出来领导运动。特别值得注意的是：（一）个别人利用某些学校的红卫兵对抗“十六条”，破坏文化大革命：（二）有些院校红卫兵的领导权落到了保皇派手里，他们实行没有工作组的工作组路线。报告提出了新北京市委应站到运动第一线去领导运动，对工作组的路线应进行批判等四点建议。8月27日，江青将这个报告转送毛泽东。毛泽东的批语就写在这个报告上。"},{"type":"paragraph","text":"[2]薄一波，当时任中共中央政治局候补委员、国务院副总理兼国家经济委员会主任。陶鲁，当时任国家经济委员会副主任。"}],"authors":["毛泽东"],"dates":[{"year":1966,"month":8,"day":28}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":525,"page_end":525},"tags":[{"name":"戚本禹","type":"人物"},{"name":"江青","type":"人物"},{"name":"关锋","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"薄一波","type":"人物"},{"name":"中央文革","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c0b2bbd3a6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
