1951,"month":12,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛泽东选集在香港发行"},{"type":"paragraph","text":"【新华社广州十七日电】“毛泽东选集”（第一卷）十五日在香港发行，半小时内就全部销完。同时还有大量读者在经售书店办理登记手续，要求在“毛泽东选集”第一卷再版后优先购买。"},{"type":"paragraph","text":"香港大公报和香港文汇报当天都发表了社论。香港大公报的社论在指出了“毛泽东选集”对中国人民革命事业的伟大意义后说：这部书对东方人民，对一切殖民地、半殖民地的人民，用处也一样大。中国革命创造了殖民地、半殖民地国家革命成功的榜样。因此，这一部中国人民革命的经典同时也是一切殖民地、半殖民地人民的经典。香港文汇报的社论认为香港的我国人民和留居海外各地的侨胞，应以“毛泽东选集”在香港发行为起点，热烈地学习马克思列宁主义和中国革命实际相结合的毛泽东思想；响应毛主席关于“思想改造”的号召，彻底肃清帝国主义、封建主义的反动思想影响，更加热爱自己的祖国。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"780d842926"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
