script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"毛泽东主席接见李宗仁先生和夫人毛主席说:你们回来，很好，欢迎你们。　祖国是比过去强大了一些，但还不很强大，我们至少还得再建设二三十年才能真正强大起来。　跑到海外的，凡是愿意回来，我们都欢迎。他们回来，我们都以礼相待。","authors":[],"dates":[{"year":1965,"month":7,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京27日电　毛泽东主席今天中午接见李宗仁先生和他的夫人郭德洁女士。"},{"type":"paragraph","text":"毛主席同李宗仁先生及其夫人热烈握手。"},{"type":"paragraph","text":"毛主席说:你们回来，很好，欢迎你们。"},{"type":"paragraph","text":"李宗仁先生说:我们回来后都为祖国的强大感到高兴。"},{"type":"paragraph","text":"毛主席说:祖国是比过去强大了一些，但还不很强大，我们至少还得再建设二三十年才能真正强大起来。"},{"type":"paragraph","text":"李宗仁先生对毛主席说，在海外的许多人士都怀念祖国，他们渴望回到祖国来。"},{"type":"paragraph","text":"毛主席说:跑到海外的，凡是愿意回来，我们都欢迎。他们回来，我们都以礼相待。毛主席建议李宗仁先生到全国各地去看看。"},{"type":"paragraph","text":"今天同时被接见的还有程思远先生。"},{"type":"paragraph","text":"接见时在座的，有彭真同志，郭沫若同志和夫人于立群，中共中央统一战线工作部部长徐冰同志，以及章士钊先生，刘仲容先生。"},{"type":"paragraph","text":"接见后，毛泽东主席和夫人江青同志设宴招待李宗仁先生和夫人郭德洁女士，以及程思远先生。"},{"type":"paragraph","text":"\u003cIMG alt=请插入5号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1965\\07\\657s010101.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgaut\u003e钱嗣杰\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e毛泽东主席接见李宗仁先生(右一)和他的夫人郭德洁女士(右三)，以及程思远先生(右四)　(新华社传真　钱嗣杰　摄)\u003c/FONT\u003e"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f439a3ebec"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
