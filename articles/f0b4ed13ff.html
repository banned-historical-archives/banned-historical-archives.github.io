ical-archives/banned-historical-archives0/main/maoquanji47.pdf"],"article":{"title":"对汪东兴报告的批示","alias":"","parts":[{"type":"paragraph","text":"对汪东兴报告的批示"},{"type":"paragraph","text":"（1964年7月）"},{"type":"paragraph","text":"摆设盆花是旧社会留下来的东西。这是封建士大夫阶级、资产阶级、公子哥儿、提笼架鸟的人玩的。那些吃了饭没有事情做的人才有功夫养花弄花。"},{"type":"paragraph","text":"全国解放已经十几年了，养花不但没有减少，反而比过去发展了，现在要改变。我就不喜欢房里摆花，白天好像有点好处，晚上还有害处。我的房子里的花早就让他们撤了，以后再让他们把院子里的花也撤了。你们在院子里种了一些树，不是满好吗？还可以再种。你们的花窖要取消。大部分花要减掉，只需少数人管理庭园。今后庭院要多种树，多种果树，还可以种点粮食、蔬菜、油料作物。北京市区中的公园和香山要逐步改种这些果树和油料作物，这样既好看，又实惠，对子孙后代有好处。"}],"authors":["毛泽东"],"dates":[{"year":1964,"month":7}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":31,"page_end":31},"tags":[{"name":"汪东兴","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f0b4ed13ff"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
