<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"甘肃省委批转省委农村部工作组关于试办1959年收益分配的报告","authors":[],"dates":[{"year":1959,"month":11,"day":10}],"is_range_date":false,"parts":[{"text":"甘肃省委批转省委农村部工作组关于试办1959年收益分配的报告","type":"title"},{"text":"各地、市、州委，各县(市)委：","type":"appellation"},{"text":"现在把省委农村工作部工作组在临洮县6个生产队，在靖远县3个生产队试办1959年收益分配的两个报告，转发你们参考。","type":"paragraph"},{"text":"从这两个报告中充分看出，今年的瞒产私分现象十分严重，瞒产私分最少的占产量的25％，多的还有40，50甚至70％。瞒产私分的中心人物是一部分资本主义思想严重的富裕中农和他们的代理人——一部分资本主义思想严重的干部。但是问题严重的不在于他们，而在于相当数量的思想右倾、本位主义严重的干部和相当数量的在粮食问题上存有种种顾虑的各阶层农民，在不同程度上受他们的思想影响，跟着他们瞒产私分。而在于有些地县领导同志至今还对这个问题认识不清。没有把它看成一个严重问题，认真去解决。因此为了作好分配工作，首先必须广泛开展社会主义教育和两条道路的斗争，这场斗争是不可避免的，只有通过对个别重点人的彻底揭发，深入批判，把富裕中农的资本主义思想在广大群众中搞臭；只有通过对广大群众和干部和社会主义教育，使大家觉悟提高，认识明确，摆脱资本主义思想的影响，才能核实产量，弄清工分，实行合理分配。这两个县的试点，都是经过了这场斗争，经过了广大群众充分的鸣放、辩论才分配下去的。","type":"paragraph"},{"text":"这两个报告还反映出，群众对于我们春季说的话是否冬季兑现，还有种种怀疑，因此分配中必须坚决贯彻执行第二次郑州会议以来中央规定的各项政策和省委关于贯彻中央政策的各项具体规定，不能有所马虎；如果认为省委的有些规定应该变更，必须事先报告省委批准。","type":"paragraph"},{"text":"真正在全年公社化基础上的分配，这还是第一次，从下到上，从群众到干部，都没有经验，但是分配工作是最后反映公社一年生产成绩，体现公社分配政策，体现党的政策方针的重大问题必须作好，不能草率从事，否则就会给公社的发展巩固带来不良影响，这就要求全党必须特别重视这一工作，地县委主要负责同志，必须亲自抓这个工作，了解这个工作中的特点和问题，掌握解决问题的方法步骤，坚决贯彻执行党的政策，坚决依靠群众，走群众路线。为此要求各专区(自治州、市)，各县都能马上派出工作组选择一两个点进行试办，取得具体经验，以便11月下旬在全省全面开展分配工作，争取年内胜利完成这一工作。平凉专区已经在四个核算单位中开始了分配工作，希望把你们的经验报告省委，以便转发各地参考。","type":"paragraph"},{"text":"略：临洮县6个生活队和靖远县3个生产队试办1959年收益分配的两个报告。","type":"paragraph"},{"text":" 甘肃省委1959年11月10日","type":"paragraph"},{"text":"(甘肃省档案馆91—4—497卷)","type":"paragraph"}],"comments":[],"origin":"甘肃省某档案馆","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2879308e54"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
