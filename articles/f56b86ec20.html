ical-archives/banned-historical-archives8/main/maoquanji12.pdf"],"article":{"title":"和毛华初的谈话","alias":"","parts":[{"type":"paragraph","text":"和毛华初的谈话！!"},{"type":"paragraph","text":"（1938年7月）毛泽东：“你这么小也来了，还是回去吧！”毛华初：“妈妈讲这里有书读。”"},{"type":"paragraph","text":"毛泽东：“这里是有书读，但敌人不让我们平平安安地读书。还要打仗，日本帝国主义的飞机随时可能来轰炸延安。要跑飞机，要跑路，住的是窑洞，吃的是小米和窝窝头，你吃得消吗？”"},{"type":"paragraph","text":"毛华初：“我给地主放过牛，讨过米，跟妈妈坐过牢，吃得消，不怕苦。”"},{"type":"paragraph","text":"毛泽东：“哟，原来你吃过苦，那就打收条留下吧。"},{"type":"paragraph","text":"毛泽东：“不过，要记住，你过去吃过旧社会的苦，吃过地主压追剥削的苦，那是阶级苦。从今天起，你就要为革命吃苦了。你要知道，革命是一件艰难的苦差事，要经过艰苦奋斗，才能取胜。你今后学习也好，将来工作也好，都要吃苦在先·…..\""},{"type":"paragraph","text":"[1]毛华初，湖南韶山人，族名远怀，字式谷。毛泽民养子。这是毛华初刚到延安去见毛泽东的谈话的一部分。给李正清题词！"},{"type":"paragraph","text":"（1938年夏）"},{"type":"paragraph","text":"团结干部，连系民众，是一刻也不应该忘记的。如果这样做，就有了工作胜［利】的基础。"},{"type":"paragraph","text":"毛泽东[1]1938年，抗大第三期学员即将毕业时，毛泽东到抗大作报告。这是"},{"type":"paragraph","text":"结锋知，违繁不，定一刻也云知谁忘能机。小果样做，我消个己作鹏的笙艺"},{"type":"paragraph","text":"4毛泽东为李正清的题词。"}],"authors":["毛泽东"],"dates":[{"year":1938,"month":7}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":405,"page_end":407},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f56b86ec20"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
