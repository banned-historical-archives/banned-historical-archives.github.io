rt":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"听毛主席的话不信“专家”那一套","authors":["胡振东"],"parts":[{"type":"paragraph","text":"在北京汇报演出的前一天，我们排演《烧煤问题》时，来了一位戏剧“专家”。我们请他给提意见。他开始不肯说，经我们再三要求之后，他说：“我看不大懂，感到这戏有点乱！”我一听心里就凉了。专家说看不懂，恐怕这戏还真有问题。情绪马上低落下来。但又想这戏在部队演出同志们很欢迎，特别是炊事员同志更欢迎，对部队进行改灶节约用煤也有一定的促进作用。想到这心里又亮堂起来，信心也增大了。但又想专家毕竟是专家，他的意见不能轻视，我的脑子里就打开架了。到底以谁为主呢？领导发现我的情绪有波动，就鼓励我说：“这戏在部队演出所以受欢迎，是因为它如实地反映了部队的现实生活，表现了无产阶级战士身在灶旁心怀世界的革命精神。”对啊！毛主席说：“我们的文学艺术都是为人民大众的，首先是为工农兵的，为工农兵而创作，为工农兵所利用的。”我们的戏在部队既然为大家所欢迎，就说明它符合毛主席的教导，必须坚持演出。"},{"type":"paragraph","text":"第二天，我们精神饱满地演出了。演出的结果是首长满意、同志们满意。首长还鼓励我们要继续打破框框，让话剧艺术更好地为兴无灭资的斗争服务。通过实践，我的认识也随着提高。我感觉革命战士要想在文化大革命中当尖兵，就必须突出政治，用毛泽东思想武装自己的头脑。坚决听毛主席的话，不信“专家”那一套，坚决和那些反党反社会主义的资产阶级“文艺家”斗争到底！"}],"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c4fb204eba"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
