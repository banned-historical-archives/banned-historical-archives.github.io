ical-archives/banned-historical-archives8/main/maoquanji15.pdf"],"article":{"title":"皖南部队以突围出去分批东进或北进为有利","alias":"","parts":[{"type":"paragraph","text":"皖南部队以突围出去分批东进或北进为有利！1"},{"type":"paragraph","text":"（1941年1月12日）叶、姚(胡、陈即转)："},{"type":"paragraph","text":"你们当前情况是否许可突围？如有可能，似以突围出去分批东进或北进（指定目标，分作几个支队分道前进，不限时间，以保存实力达到任务为原则）为有利，望考虑决定为盼。因在重庆交涉恐靠不住，同时应注意与包围部队首长谈判，并盼将情形电告。"},{"type":"paragraph","text":"毛朱王[1]这是毛泽东和朱德、中共中央军委副主席王稼祥给新四军军长叶挺中共中央东南局副书记饶漱石（姚）的电报。[2]胡，指胡服，即刘少奇。陈，指陈毅，当时任华中新四军八路军总"}],"authors":["毛泽东"],"dates":[{"year":1941,"month":1,"day":12}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":333,"page_end":333},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"63fcdfc47a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
