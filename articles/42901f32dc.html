script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"雅库布·戈翁将军和夫人到达北京  首都人民隆重欢迎尼日利亚贵宾  李先念、陈锡联、华国锋、徐向前等和首都群众数千人到机场热烈欢迎","authors":[],"dates":[{"year":1974,"month":9,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"雅库布·戈翁将军和夫人到达北京"},{"type":"paragraph","text":"首都人民隆重欢迎尼日利亚贵宾"},{"type":"paragraph","text":"李先念、陈锡联、华国锋、徐向前等和首都群众数千人到机场热烈欢迎"},{"type":"paragraph","text":"新华社一九七四年九月八日讯　尼日利亚联邦共和国联邦军政府首脑、武装部队总司令雅库布·戈翁将军和夫人，应我国政府邀请前来进行国事访问，今天下午乘专机到达北京。首都群众数千人怀着喜悦的心情聚集在首都机场上，隆重、热烈地欢迎尼日利亚贵宾。"},{"type":"paragraph","text":"随同戈翁将军和夫人来访的有尼日利亚东北州、中西州的军事长官，外交部、农业和自然资源部、经济发展和建设部的部长，以及工业、经济、贸易、体育、教育、新闻等方面的负责人和随行记者。"},{"type":"paragraph","text":"到机场欢迎尼日利亚贵宾的有我国领导人李先念、陈锡联、华国锋、徐向前，外交部长姬鹏飞，外贸部长李强，外经部副部长陈慕华，中国人民解放军副总参谋长李达。在机场上，李先念副总理代表周恩来总理向戈翁将军和夫人表示热烈欢迎。"},{"type":"paragraph","text":"在第三世界国家人民团结日益加强的时刻，尼日利亚贵宾不远万里来到我国访问，带来了尼日利亚人民的友好情谊，使中国人民感到十分鼓舞。今天，首都主要街道上空，一面面鲜艳的彩旗和中尼两国国旗迎风招展。许多高大建筑物上悬挂着巨幅标语，上面写着：“热烈欢迎戈翁将军和夫人！”“坚决支持尼日利亚人民维护民族独立和国家主权的斗争！”“中国、尼日利亚人民的友谊万岁！”“第三世界人民大团结万岁 ！”“全世界人民大团结万岁！”"},{"type":"paragraph","text":"下午五时，贵宾的专机在飘扬着中国和尼日利亚两国国旗的首都机场上降落。李先念副总理和林佳楣同志等迎上前去，同戈翁将军和夫人以及其他尼日利亚贵宾热情握手。接着，举行了隆重的欢迎仪式。乐队奏尼日利亚国歌和中国国歌。戈翁将军由我国领导人陪同检阅了中国人民解放军陆、海、空三军仪仗队。"},{"type":"paragraph","text":"戈翁将军和夫人同欢迎群众见面时，机场上一片欢腾。首都男女民兵持枪列队向贵宾们致意。人们挥舞彩带和花束，载歌载舞，热烈欢迎尼日利亚贵宾。戈翁将军高兴地不断挥手、鼓掌，向欢迎群众致意。"},{"type":"paragraph","text":"戈翁将军和夫人等贵宾乘车进入市区，在宾馆受到邓颖超同志的热烈欢迎。"},{"type":"paragraph","text":"到机场迎接贵宾的还有："},{"type":"paragraph","text":"人大常委会委员武新宇、童第周；"},{"type":"paragraph","text":"政府部门、中国人民解放军、北京市革命委员会、对外友协的负责人何英、王海容、魏伯亭、郭林祥、郝中士、夏之栩、林泽生、马耀骥、申光、纪兆全、任朴斋、魏福凯、于步血、万里、马仁辉、缪海棱、董林、丁雪松；"},{"type":"paragraph","text":"中国驻尼日利亚大使冯于九和杜洛同志。"},{"type":"paragraph","text":"尼日利亚驻中国大使萨努西和夫人以及大使馆外交官员，各国驻中国使节也到机场迎接。（附图片）"},{"type":"paragraph","text":"戈翁将军和夫人应我国政府邀请前来进行国事访问，九月八日乘专机到达北京。我国领导人李先念、陈锡联、华国锋、徐向前及首都群众数千人在机场隆重、热烈欢迎尼日利亚贵宾。　新华社记者摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"华国锋","type":"人物"},{"name":"李先念","type":"人物"},{"name":"徐向前","type":"人物"},{"name":"陈锡联","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"42901f32dc"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
