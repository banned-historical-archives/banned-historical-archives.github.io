art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"胜利全靠毛主席","authors":["驻海南岛某部观通站"],"parts":[{"type":"paragraph","text":"在欢庆党的“九大”胜利闭幕的大喜日子里，我们守卫在祖国南海前哨的海防战士，最最幸福地从银幕上看到了中国共产党第九次全国代表大会在北京隆重开幕的盛况，看到了伟大领袖毛主席主持“九大”隆重开幕的光辉形象。海防战士的心呵，飞向了北京，飞向了毛主席的身旁。我们千遍万遍地欢呼：“敬祝毛主席万寿无疆！万寿无疆！”"},{"type":"paragraph","text":"这部彩色文献纪录影片是一曲毛泽东思想和毛主席革命路线的壮丽凯歌。它充分显示了“九大”是一个团结的大会，胜利的大会；它充分表达了亿万人民对伟大领袖毛主席无限热爱、无限忠诚的深厚的无产阶级感情。"},{"type":"paragraph","text":"毛主席啊，毛主席！从秋收起义的火炬映山川，到无产阶级文化大革命的战鼓震天地，中国革命的伟大胜利，全靠您的英明领导。回顾我们观通站的斗争史，每前进一步都是您的光辉思想来指引。我们遵循您的建军路线和林副主席根据您的建军路线提出的各项方针原则，粉碎了大叛徒刘少奇和反革命修正主义分子彭德怀、罗瑞卿资产阶级军事路线的疯狂进攻，连续两年荣获四好连队和先进单位的光荣称号。去年，我们在您关于“办学习班，是个好办法”的伟大号召鼓舞下，在人员少、任务重的情况下，坚持办了三十五期各种类型的毛泽东思想学习班，落实您的一系列最新指示，胜利地完成了战备执勤任务。我们还帮助驻地生产大队举办了多期学习班，用您的战无不胜的思想武装了广大贫下中农，取得了革命生产双丰收。在阶级斗争的疾风暴雨中，我们受到了极大的锻炼和教育，提高了阶级斗争和两条路线斗争的觉悟，锤炼了对您无限忠诚的一颗红心。斗争实践使我们深深体会到，紧跟您就是方向，就是胜利！"},{"type":"paragraph","text":"我们决心在以您为首、林副主席为副的新的中央委员会的领导下奋勇前进，把我们站建设成忠于您的战斗集体。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"两条路线斗争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"02234ec5ad"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
