art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"热烈欢呼毛泽东思想的伟大胜利","authors":[],"parts":[{"type":"paragraph","text":"据新华社巴黎十二日电 法国的民族解放阵线必胜协会最近在巴黎工人区举行电影晚会，放映了彩色文献纪录影片《中国共产党第九次全国代表大会在北京隆重开幕》。协会负责人在电影放映前讲话，热烈赞扬中国无产阶级文化大革命取得了决定性的胜利，并指出这是毛泽东思想的伟大胜利。"},{"type":"paragraph","text":"出席晚会的有六、七百人，其中绝大多数是在法国工作的非洲工人。"},{"type":"paragraph","text":"在会场的进口处，悬挂着中国人民伟大领袖毛主席的画像和中华人民共和国国旗，两侧展出了中国共产党第九次全国代表大会的图片和中国共产党光辉战斗历程的图片。在会场进口处设立的陈列着毛主席著作的书台，受到工人们热烈的欢迎，许多非洲工人围着书台，热情地索取毛主席著作。"},{"type":"paragraph","text":"在晚会上放映的“九大”隆重开幕的影片，受到观众热烈欢迎，观众们聚精会神，特别注意倾听中国人民伟大领袖毛主席和林副主席的声音。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"07c9c60fb4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
