ical-archives/banned-historical-archives0/main/maoquanji36.pdf"],"article":{"title":"对周恩来在政协二届二次会议上的政治报告稿的修改","alias":"","parts":[{"type":"paragraph","text":"对周恩来在政协二届二次会议上的"},{"type":"paragraph","text":"政治报告稿的修改\"！"},{"type":"paragraph","text":"（1956年1月）"},{"type":"paragraph","text":"我们要求和平，但是如果国际侵略集团把战争强加在我们头上的话，我们也并不惧怕战争。"},{"type":"paragraph","text":"我国政府一年来曾经再三指出：除了用战争方式解放台湾以外，还存在着用和平方式解放台湾的可能性。这样，我国大陆人民和台湾人民就有一种共同的爱国的责任，这就是除了积极准备在必要的时候用战争方式解放台湾以外，努力争取用和平方式解放台湾。"},{"type":"paragraph","text":"[1]本篇一至三是毛泽东对周恩来1956年1月30日在全国政协二届二次会议上政治报告稿所作的修改。文中用宋体字排印的是毛泽东加写和改写的文字。"}],"authors":["毛泽东"],"dates":[{"year":1956,"month":1}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":203,"page_end":203},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"eb99a905b5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
