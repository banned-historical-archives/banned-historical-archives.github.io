"山西师范学院","张文华"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"大字报诗—— “琵琶行”","type":"title"},{"text":"山西师范学院张文华","type":"authors"},{"text":"“琵琶行”","type":"subtitle"},{"text":"活剖孕妇商纣王，焚书坑儒秦始皇，","type":"paragraph"},{"text":"二十世纪中青王，怀抱琵琶苏院长。","type":"paragraph"},{"text":" 山西师范学院  张文华","type":"paragraph"},{"text":"写在厕所的诗","type":"subtitle"},{"text":"争鸣狂风过，百花气节伤。","type":"paragraph"},{"text":"恨迹大路旁，目睹心悽凉。","type":"paragraph"},{"text":"秋冬之际春风来，百花含苞欲放开。","type":"paragraph"},{"text":"昨夜暴风铺满地，此情此景实可哀。","type":"paragraph"},{"text":"说争鸣，道争鸣，争鸣成了一阵风。","type":"paragraph"},{"text":"只怕风过天又雨，大家徒劳一场空。","type":"paragraph"},{"text":" 山西师范学院×××","type":"paragraph"},{"text":"致在墙角写诗的人们","type":"subtitle"},{"text":"说争鸣，道争鸣，争鸣来了一阵风，只说风吹乌云散，那知风吹云更浓，用风不行用药，用药不行用刀，用刀不行用火，火！火！烧掉那些恶东西。在墙角写诗的朋友，把诗印在火把上，挺身出来，你的朋友在等待着你。","type":"paragraph"},{"text":" 山西师院  马后炮","type":"paragraph"},{"text":"“西江月”","type":"subtitle"},{"text":"乌云遮住了太阳，","type":"paragraph"},{"text":"百姓要见阳光，","type":"paragraph"},{"text":"手拿风煽，","type":"paragraph"},{"text":"赶散乌云，","type":"paragraph"},{"text":"为了大放大鸣。","type":"paragraph"},{"text":" 山西师范学院×××","type":"paragraph"}],"comments":[],"origin":"《“鸣”、“放”选集（一）》（中共山西省委整风办公室编，1957年8月）。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4d67463311"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
