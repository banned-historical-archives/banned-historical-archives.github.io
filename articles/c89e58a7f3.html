":[],"dates":[{"year":1946,"month":8,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报南京十四日专电】　马帅对蒋主席文告，未作任何表示。下午曾接见今日由平抵此之军调部美方代表罗伯森听取安平事件调查报告。黄昏时，俞大维氏往访马帅，约谈二小时。马帅定明日飞浔转牯，晋谒蒋主席商谈时局。"},{"type":"paragraph","text":"【本报南京十四日专电】　俞部长大维今日下午六时赴宁海路五号马帅公馆为蒋主席传递意见，与马帅互谈二小时。俞氏辞出后，即往北极阁宋院长官邸，将马帅对时局之若干意见报告宋院长，谈至十时余，始返寓。"},{"type":"paragraph","text":"【本报南京十四日专电】　军调部美方代表罗伯森，中共代表叶剑英两氏，今日下午四时，乘马帅星座机抵京。同行者有大公报记者彭子冈女士。罗叶两氏即分别向马帅与周恩来氏报告，军调部工作情形及安平事件调处经过。可能于明日返平。又今日下午八时记者往访叶剑英氏，因叶氏正与周恩来谈话，未能接见。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c89e58a7f3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
