art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"弄清对资产阶级实行专政的无比重要","authors":[],"parts":[{"type":"paragraph","text":"本报讯 ○一七九部队一机连干部战士在学习毛主席关于理论问题的重要指示时，联系国际共产主义运动的经验教训，加深无产阶级必须对资产阶级实行全面专政的必要性和重要性的认识。同志们谈到：一八七一年巴黎公社依靠武装人民，赶走了反动派，建立起了工人阶级的政权。但是，公社在成立以后，却犯了对敌人过于宽大的错误。如没有坚决运用专政手段没收法兰西银行，以致让资产阶级拥有进行反扑的大量资财；没有坚决向凡尔赛进军，彻底消灭反动势力，以致凡尔赛政府卷土重来。在列宁缔造的第一个社会主义国家里，苏修叛徒集团背叛无产阶级专政，实行法西斯专政，致使苏联人民重新陷入苦海。同志们从这些历史事实里深深懂得了：放弃和取消无产阶级专政，必然导致资本主义复辟。我们要保卫社会主义制度，胜利地向共产主义过渡，就必须加强无产阶级专政。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"94018b1001"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
