论组"],"dates":[{"year":1976,"month":8,"day":31}],"is_range_date":false,"parts":[{"type":"paragraph","text":"批“极左”就是否定文化大革命"},{"type":"paragraph","text":"北京石油化工总厂机修厂工人理论组"},{"type":"paragraph","text":"《论总纲》含沙射影地诬蔑文化大革命是“极左”路线的产物，“冲击”了一切，破坏了生产。它妄图从根本上否定文化大革命，进而否定我们党的基本理论和基本实践。"},{"type":"paragraph","text":"伟大领袖毛主席亲自发动和领导的无产阶级文化大革命，是亿万革命人民反修防修的一次伟大革命实践。在文化大革命中，毛主席的革命路线战胜了刘少奇、林彪反革命的修正主义路线，进一步巩固了无产阶级专政。党的九大、十大全面总结了文化大革命的根本经验和历史功绩。"},{"type":"paragraph","text":"毛主席早在文化大革命初期就指出，无产阶级文化大革命所要解决的根本矛盾，是无产阶级和资产阶级两个阶级、社会主义和资本主义两条道路的矛盾。这次运动的重点，是斗争那些党内走资本主义道路的当权派。毛主席的伟大指示，为我们指明了文化大革命的斗争方向。广大工农兵在文化大革命中奋起造走资派的反，斗得对，斗得好，革命大方向始终正确。邓小平在《论总纲》中却诬蔑文化大革命“混淆两类矛盾，颠倒敌我”、把“好干部”打下台。所谓“好干部”是些什么角色呢？他自己的话是最好的注解。他说：“只要人家说你复辟了，你的工作就干好了。”原来，他的所谓“好干部”就是敢于“拚老命”搞复辟的不肯改悔的走资派。邓小平把对走资派的斗争诬蔑为“混淆两类矛盾”，公然为被打下台的刘少奇、林彪两个资产阶级司令部鸣冤叫屈，就是妄图否定文化大革命的斗争大方向。"},{"type":"paragraph","text":"无产阶级文化大革命批判了刘少奇、林彪反革命的修正主义路线，夺回了被走资派篡夺的那一部分权力，无产阶级专政空前巩固，毛主席的革命路线深入人心，亿万工农兵群众的社会主义积极性空前高涨。他们坚持抓革命、促生产，使整个国民经济出现一派欣欣向荣的大好形势。正如毛主席所指出的：“无产阶级文化大革命是使我国社会生产力发展的一个强大的推动力。”我们石油化工总厂就是在文化大革命风暴中开始兴建的。在文化大革命的推动下，仅用了几年时间，就建立起这个现代化的大型石油化工联合企业。几年来，为国家生产了大量石油化工产品，提供了许多先进技术，培养了一大批生产建设人材。邓小平诬蔑文化大革命“冲击一切”，破坏了生产，妄图否定文化大革命对社会生产力发展的巨大推动作用，为其贩卖唯生产力论大造反革命舆论，完全是徒劳的。"},{"type":"paragraph","text":"邓小平授意炮制的《论总纲》声称：“必须以这三项重要指示为纲，总结无产阶级文化大革命以来的丰富经验”。其实，他们的“总结”不过是否定和反对的代名词。他们诬蔑文化大革命是“极左”路线的产物，不仅全盘否定了文化大革命，而且否定了我们党的基本理论和基本实践。这就充分暴露了党内资产阶级翻九大和十大的案，算文化大革命的帐的险恶用心。我们对此必须彻底揭露，深入批判，用战斗来保卫毛主席的无产阶级革命路线，保卫无产阶级文化大革命的胜利成果！"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"林彪","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7b3da6f265"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
