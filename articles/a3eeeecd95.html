art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"沿着毛主席指引的道路奋勇前进","authors":["国庆观礼代表/昆明部队某部干事邹号青"],"parts":[{"type":"paragraph","text":"大海航行靠舵手，干革命靠毛泽东思想。我们靠毛泽东思想哺育成长的革命战士，时时刻刻想念伟大领袖毛主席，日日夜夜渴望见到我们心中最红最红的红太阳。盼啊，盼啊，今天，在伟大社会主义祖国成立二十周年的大喜日子里，我们来自点苍山下的战士，在天安门前见到了最敬爱的伟大领袖毛主席。毛主席啊，毛主席！天大地大，不如您老人家的恩情大；河深海深，不如您老人家的恩情深。我们千遍万遍地高呼：毛主席万岁！毛主席万万岁！"},{"type":"paragraph","text":"銎胀ǖ幕�关工作人员�T谑�多年的机关工作中，是毛主席教导我们，要学习白求恩同志〖JZ/加重〗“对工作的极端的负责任，对同志对人民的极端的热忱”，"},{"type":"paragraph","text":"当前，全国亿万军民正高举党的“九大”团结、胜利的旗帜，遵照林副主席国庆讲话的指示精神，进一步活学活用毛泽东思想。我们一定把毛主席给我们的光荣和幸福，化为继续革命的巨大动力，以林副主席为光辉榜样，读一辈子毛主席的书，听一辈子毛主席的话，永远照毛主席的指示办事，永远沿着毛主席指引的继续革命的道路前进，为捍卫毛主席的无产阶级革命路线奋斗终身！"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a3eeeecd95"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
