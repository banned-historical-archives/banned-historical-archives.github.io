["首都红卫兵纠察队西城分队指挥部"],"dates":[{"year":1966,"month":8,"day":25}],"is_range_date":false,"parts":[{"text":"首都红卫兵纠察队队员六项守则","type":"title"},{"text":"首都红卫兵纠察队西城分队指挥部","type":"authors"},{"text":"一、 坚决按照毛主席的指示办事。努力学习最高指示，忠实执行最高指示，热情宣传最高指示，勇敢捍卫最高指示。","type":"paragraph"},{"text":"坚决按十六条精神办事。学习十六条，熟悉十六条，掌握十六条，运用十六条。","type":"paragraph"},{"text":"二、 大学解放军，大力发扬“三八作风”，雷厉风行，坚决做到：召之即来，来之能战，战之能胜。","type":"paragraph"},{"text":"三、 必须坚决贯彻“三大纪律八项注意”。严禁打人及变相体罚，严禁侮辱人。","type":"paragraph"},{"text":"四、 谦虚、谨慎、戒骄戒躁、全心全意为人民服务，做人民忠实的勤务员。坚决防止特殊化。","type":"paragraph"},{"text":"五、 只有值勤时戴臂章，不值勤时一律不准戴臂章，臂章由班长掌握。","type":"paragraph"},{"text":"六、 一定要注意深入调查研究，在任何情况下，都要沉着、冷静，严防阶级敌人乘机捣乱破坏。","type":"paragraph"},{"text":" 首都红卫兵纠察队西城指挥部","type":"paragraph"},{"text":"（发表于首都红卫兵纠察队西城指挥部：《首都红卫兵纠察队西城指挥部通令集（1-10）》）","type":"paragraph"}],"comments":[],"origin":"发表于首都红卫兵纠察队西城指挥部：《首都红卫兵纠察队西城指挥部通令集（1-10）》","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cdf2fe1287"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
