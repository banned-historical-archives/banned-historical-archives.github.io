tart":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"张冲同志追悼会在全国政协礼堂举行张冲同志家属带头简化丧事、移风易俗的优良作风受到赞扬","authors":[],"parts":[{"type":"paragraph","text":"据新华社11月21日讯 中国人民政治协商会议全国委员会副主席、中国共产党的优秀党员、忠诚的无产阶级革命战士、彝族人民的好儿子张冲同志因病长期医治无效，于1980年10月30日在北京逝世，终年81岁。张冲同志追悼会今天下午在全国政协礼堂举行。"},{"type":"paragraph","text":"中共中央、人大常委会、国务院、政办全国委员会的领导同志邓小平、胡耀邦等参加了追悼会。"},{"type":"paragraph","text":"追悼会由中共中央政治局委员、人大常委会副委员长彭真主持，中共中央政治局委员、人大常委会副委员长、政协全国委员会副主席、中共中央统战部部长乌兰夫致悼词。"},{"type":"paragraph","text":"张冲同志追悼会会场肃穆、朴素，没有陈放花圈，参加追悼会的同志也没有戴黑纱、白花。这是根据张冲同志生前的遗愿和家属的建议安排的。参加追悼会的同志对张冲同志的家属这种带头简化丧事、移风易俗的优良作风表示赞扬。"},{"type":"paragraph","text":"张冲同志的骨灰将按照他本人的遗愿，撒在他生前为考察和研究长江上游水利建设而九次穿越过的金沙江虎跳峡中。"},{"type":"paragraph","text":"追悼会后，邓小平等同志向张冲同志的夫人惠国芳及其亲属表示亲切慰问。"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e7702a2367"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
