rs":[],"dates":[{"year":1963,"month":7,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"美洲教师代表大会通过里约热内卢宣言"},{"type":"paragraph","text":"号召拉美教师反对干涉和殖民剥削"},{"type":"paragraph","text":"新华社里约热内卢二日电　美洲教师第八次代表大会今天上午闭幕。这次代表大会是在六月二十七日开始举行的。"},{"type":"paragraph","text":"代表大会通过的里约热内卢宣言说，教师应该“为反对各种干涉和殖民剥削形式，争取各国人民的自由发展，反对寡头势力和垄断集团而斗争。”宣言支持自决权和各国人民的不干涉原则。"},{"type":"paragraph","text":"这项宣言指出，在各成员国必须建立教师中央统一工会，维护免费的公立教育，为扫除文盲，为争取改善工资而斗争。宣言并抗议巴拉圭当局对教师进行的政治迫害。"},{"type":"paragraph","text":"代表大会通过的关于拉丁美洲经济的决议指出，拉丁美洲的经济受到下列原因的阻碍：经济从属于帝国主义的强大政治力量；大庄园制的土地所有制和经济的不发达；对垄断资本主义和外国机构的租让等。"},{"type":"paragraph","text":"代表大会选举了美洲教师联合会执行委员会，决定把会址设在智利。并且决定下一次代表大会将在委内瑞拉首都加拉加斯举行。"},{"type":"paragraph","text":"在代表大会举行期间，拉丁美洲各国代表和一些国际组织的代表在大会和委员会上作了报告和发了言。"},{"type":"paragraph","text":"古巴代表劳尔·费雷尔教授在委员会上作了关于古巴教育情况的报告，受到了与会者极其热烈的欢迎。他说，革命后，古巴教育有了深刻的改变，已经扫除了文盲。古巴今天是没有文盲的土地。"},{"type":"paragraph","text":"费雷尔指出：这一文化革命是在帝国主义封锁下进行的，但是得到本大陆的支持和社会主义国家的帮助。"},{"type":"paragraph","text":"教育工作者工会国际的代表保罗·德拉努在代表大会全体会议上发言说，教育工作者工会国际支持“所有为争取自由而斗争的人，这一斗争是在本大陆特别开展的革命斗争的延续”。"},{"type":"paragraph","text":"德拉努说，各国的经验，特别是苏联、中国和古巴等国的革命经验表明，当全体人民关心教育，并把它当成自己的事情的时候，在很短的时期中，我们在教育方面就实现了具有历史意义的迅速的进展。"},{"type":"paragraph","text":"他在发言中谴责干涉不发达国家教育事务的美国资本家在教育方面提供的新殖民主义的援助。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"046f3cfafc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
