ical-archives/banned-historical-archives0/main/maoquanji38.pdf"],"article":{"title":"给达赖喇嘛的复电和对复电稿的批语","alias":"","parts":[{"type":"paragraph","text":"给达赖喇嘛?的复电和对复电稿的批语"},{"type":"paragraph","text":"（1957年4月22日）亲爱的达赖喇嘛："},{"type":"paragraph","text":"你四月一日从拉萨拍给我们的电报收到了，谢谢你的问候。"},{"type":"paragraph","text":"你同班禅额尔德尼?出国参加释迦牟尼?涅两干五百周年纪念和访问印度，为增进中印两国的友好作了重要贡献，并且给各方面人士留下了深刻的印象。经过这次长途旅行，请你对身体多多保重。祝你在加强祖国各民族团结和西藏内部团结的工作中作出新的成就。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一九五七年四月二十二日"},{"type":"paragraph","text":"[1]达赖喇嘛，即达赖喇嘛·丹增嘉措，西藏宗教领袖之一，当时任全国人大常委会副委员长、西藏自治区筹备委员会主任委员。"},{"type":"paragraph","text":"[2]班禅额尔德尼，即班禅额尔德尼·确吉坚赞，西藏宗教领袖之一，当时任政协全国委员会副主席、西藏自治区筹备委员会第一副主任委员。"},{"type":"paragraph","text":"[3]释迦牟尼，古印度释迦族人，佛教创始人。毛泽东全集第三十八卷"},{"type":"paragraph","text":"分复为好。退徐冰办理。\""},{"type":"paragraph","text":"毛"},{"type":"paragraph","text":"[1]这是毛泽东在中共中央统战部副部长徐冰的请示信上写的批语。1957年4月1日，达赖喇嘛曾分别给毛泽东、刘少奇、周恩来、朱德发来电报。徐冰在报送统战部代拟的给达赖喇嘛的复电时，曾建议用毛、刘、周、朱4个人的名义合发一份复电。"}],"authors":["毛泽东"],"dates":[{"year":1957,"month":4,"day":22}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":34,"page_end":35},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6d6127159f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
