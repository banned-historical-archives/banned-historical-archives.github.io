{"year":1967,"month":5,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席的革命文艺路线胜利万岁"},{"type":"paragraph","text":"纪念毛主席《在延安文艺座谈会上的讲话》发表二十五周年"},{"type":"paragraph","text":"要使文艺很好地成为整个革命机器的一个组成部分，作为团结人民、教育人民、打击敌人、消灭敌人的有力的武器，帮助人民同心同德地和敌人作斗争。"},{"type":"paragraph","text":"革命现代芭蕾舞剧《红色娘子军》"},{"type":"paragraph","text":"红色娘子军战士怀着强烈的阶级仇恨，积极练兵，准备狠狠地打击敌人。"},{"type":"paragraph","text":"本报记者　刘振祥摄"},{"type":"paragraph","text":"革命现代芭蕾舞剧《白毛女》"},{"type":"paragraph","text":"王大春在山洞里找到满头白发的喜儿，告诉她杨各庄已经解放了。他们满怀喜悦的心情高唱：“太阳出来了，太阳就是毛泽东，太阳就是共产党”。王大春带着喜儿迎着太阳走出山洞。　\t新华社记者　王一兵摄"},{"type":"paragraph","text":"革命现代芭蕾舞剧《白毛女》"},{"type":"paragraph","text":"百万工农齐奋起，风烟滚滚春雷激。喜儿家乡的乡亲们在八路军的领导下，拿起刀枪，誓把恶霸地主统统消灭光。"},{"type":"paragraph","text":"本报记者　王景仁摄"},{"type":"paragraph","text":"革命交响音乐《沙家浜》"},{"type":"paragraph","text":"新四军和党的地下工作者同当地革命群众建立了血肉关系，决心夺取对敌斗争的胜利。"},{"type":"paragraph","text":"本报记者　蒋铎摄"},{"type":"paragraph","text":"革命现代芭蕾舞剧《红色娘子军》"},{"type":"paragraph","text":"吴清华和革命群众愤怒地控诉恶霸地主南霸天的罪行，并坚决要求参加红军。"},{"type":"paragraph","text":"新华社记者　陈娟美摄"},{"type":"paragraph","text":"革命交响音乐《沙家浜》"},{"type":"paragraph","text":"指导员郭建光率领十八名伤病员，在芦荡里坚持斗争。他们不怕饥饿，不怕困难，不怕牺牲，表现了人民战士坚强、勇敢、大无畏的英雄气概。"},{"type":"paragraph","text":"新华社记者　张家骅摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"58f70906b9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
