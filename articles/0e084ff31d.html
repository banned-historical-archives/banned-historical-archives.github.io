","authors":["毛泽东"],"dates":[{"year":1961,"month":6,"day":22}],"is_range_date":false,"parts":[{"text":"转发习仲勋关于中央机关精简情况报告的批语","type":"title"},{"text":"毛泽东","type":"authors"},{"text":"小平同志：","type":"appellation"},{"text":"此件很好，应当批发给各中央局，各省、市、区党委，照此报告，坚决执行。如果中央二十四万人中，已减三分之一，即八万人，并且还可以减去几万人，我想再减四万人，不知行不行？如能共减十二万人，占总数二十四万人的一半，肯定工作效率会大为提高。各省、市、区一级，专区一级，县一级，这地方三级均照此计划，坚决精减，则将在全国范围内大为减少官僚主义，提高工作效率。现在城镇人口要减少二千万以上，人民公社三级人员已有规定，如能坚决妥善实行，则一个人浮于事的严重问题就可解决了。以上请酌办。","type":"paragraph"},{"text":" 毛泽东一九六一年六月二十二日","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"习仲勋","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0e084ff31d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
