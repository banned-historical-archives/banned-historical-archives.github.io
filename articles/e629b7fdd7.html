script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"挪威工人共产党(马列)机关报发表文章揭露苏修对印度进行殖民剥削","authors":[],"dates":[{"year":1974,"month":8,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社斯德哥尔摩一九七四年八月七日电　挪威工人共产党(马克思列宁主义)机关报《阶级斗争》最近一期发表一篇文章，揭露苏联社会帝国主义对印度进行殖民剥削。"},{"type":"paragraph","text":"这篇题为《苏联对印度的援助是掠夺》的文章说，苏联修正主义者，尤其是勃列日涅夫本人，一向把“援助”印度说成是他们对发展中国家奉行“正确的国际主义政策”的典范。他在去年十二月份访问印度期间，大肆鼓吹苏联对印度的“援助”是“无私的”和“无条件的”。然而，《真理报》的国际问题评论员茹科夫却有另外的看法。他在评论中说，“印度人没有从我们这里白拿过任何东西”。"},{"type":"paragraph","text":"文章揭露说，仿制苏联米格式飞机的印度斯坦航空公司是苏联用以控制和操纵印度生产的一个臭名昭著的典型。不仅如此，在印度冶金、机械、石油、电气等主要工业部门中百分之三十的企业操纵在苏联手中。苏联通过对这些企业部门的控制，获得了一个有效的对印度施加压力的手段。"},{"type":"paragraph","text":"文章指出，苏联对印度的所谓“援助”是要偿还的。偿还的形式之一是向苏联出口黄麻、茶叶等原料以及印度生产的产品。苏联往往还把来自印度的商品转卖到世界市场上，从中获取暴利，并且在世界市场上排斥印度的出口产品。苏联提供印度的贷款也是要付利息的。仅仅一九六九年印度付给苏联的利息就达一亿一千万卢布。"},{"type":"paragraph","text":"文章说，《真理报》评论员茹科夫曾经供认，苏联“帮助印度建立工厂，印度将用这些工厂的产品来偿还我们。这是有前途和有成效的合作，因为印度没有劳动力不足的问题。”这就是说:苏联提供资金，印度提供大量的和廉价的劳动力并为苏联进行生产。这不是对印度的原料和劳动力的帝国主义剥削又是什么?目前苏联正在印度建立一座炼铝工厂，该工厂的全部产品将出口给苏联。"},{"type":"paragraph","text":"文章最后说，苏联如今是在印度的最大的帝国主义势力。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e629b7fdd7"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
