"dates":[{"year":1975,"month":9,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"学习马克思主义　批判修正主义"},{"type":"paragraph","text":"北京市文化局创作评论组"},{"type":"paragraph","text":"在全党和全国人民学习无产阶级专政理论的热潮中，《人民日报》发表了《开展对〈水浒〉的评论》的社论，传达了毛主席关于评论《水浒》的重要指示。这是我国人民当前政治生活中的一件大事。"},{"type":"paragraph","text":"如何看待《水浒》这部书，如何看待宋江这个人物，决不只是一个如何评价古典文学作品的问题，而是一个关系到用马克思主义占领包括文学、艺术在内的上层建筑各个领域的问题，关系到反修防修、巩固无产阶级专政的重大问题。刘少奇、林彪为了推行反革命的修正主义路线，复辟资本主义，竭力鼓吹剥削阶级的旧思想、旧文化，拚命兜售某些古典文学作品中所宣扬的封建毒素。《水浒》研究中的阶级调和论，就是一个例证。因此，学习和领会毛主席的重要指示，开展对《水浒》的评论和讨论，不仅对于古典文学研究，而且对于文学、哲学、历史、教育各个领域，对于全党和全国人民坚持马克思主义、批判修正主义，把毛主席的革命路线坚持下去，都有重大而深刻的意义。"},{"type":"paragraph","text":"毛主席十分重视上层建筑领域的革命。新中国建立以后，毛主席发表了《应当重视电影〈武训传〉的讨论》等一系列重要指示，亲自发动和领导了政治思想战线上的历次重大斗争。毛主席在批判《武训传》时告诫我们：要坚持运用历史唯物主义的观点去研究历史事件和历史人物，然后“决定什么东西是应当称赞或歌颂的，什么东西是不应当称赞或歌颂的，什么东西是应当反对的”。"},{"type":"paragraph","text":"当前开展的对《水浒》的评论，是我国政治思想战线上的又一次重大斗争。毛主席说：“《水浒》这部书，好就好在投降。做反面教材，使人民都知道投降派。”毛主席的论述，深刻地揭露了《水浒》宣扬投降主义路线的本质，指出了宋江搞修正主义、投降主义的真面目。这样，就从根本上划清了投降派和革命派的界限，投降主义路线和农民革命路线的界限，有力地批判了《水浒》研究中的阶级调和论。"},{"type":"paragraph","text":"学习无止境，战斗无穷期。我们决心通过对《水浒》的评论，努力学习马克思主义，积极投入批判修正主义的战斗，把上层建筑领域的革命进行到底！"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b10d3f0035"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
