art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东思想大普及","authors":["何大广","战士"],"parts":[{"type":"paragraph","text":"无产阶级文化大革命的一个最重要成果，就是毛泽东思想空前大普及。最近母亲来队看望我，一进屋，第一句话就问：“孩子，毛主席他老人家的书你学得怎么样啊？”我说：“妈，我学的还很不够哇。弟弟来信说，您老人家还是村里学习毛主席著作的积极分子，我得好好向您老人家学习。”她说：“毛主席他老人家是我们贫下中农的大救星，毛主席的书是我们的命根子，我们不好好学，可是不行啊！”然后，她给我讲了许多乡亲们在无产阶级文化大革命中学习毛主席著作的动人事迹。她说：“在俺庄，不管是老头子，还是老婆子，都在读毛主席的书，每家都成立了学习毛主席著作小组。村里还办了一个学习毛主席著作夜校。别说我们这六七十岁的人读毛主席的书，邻居那个八十多岁的老太太，她每天还要小孙女给她念毛主席的书。这样的事太多了，要我说三天三夜也说不完啊。”"},{"type":"paragraph","text":"听到母亲讲这些家乡的好消息，我深深体会到：这场无产阶级文化大革命，就是普及毛泽东思想的大革命。亿万革命人民对毛主席的感情，从来也没有象今天这样深；活学活用毛主席著作的积极性，从来也没有象今天这样高；毛泽东思想哺育出来的英雄集体和英雄人物，从来也没有象今天这样多。真是形势喜人。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2a9087e1d8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
