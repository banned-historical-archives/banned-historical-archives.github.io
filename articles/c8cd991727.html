script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"type":"pdf","id":"wenji4","name":"毛泽东文集第四卷（1999）","internal":false,"official":true,"author":"中央文献研究室","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/wenji4.pdf"],"article":{"title":"占领长春后的东北军政工作部署","description":"根据毛泽东手稿刊印。","dates":[{"year":1946,"month":4,"day":19}],"parts":[{"text":"占领长春后的东北军政工作部署","type":"title"},{"type":"appellation","text":"彭林并转周，陈高："},{"type":"paragraph","text":"（一）长春占领，对东北及全国大局有极大影响，望对有功将士，传令嘉奖。"},{"type":"paragraph","text":"（二）杨师立即或休息数日南下参战，必须增加四平方面兵力，歼灭新一军主力，并准备继续打几个大胜仗，方能保卫长春。（三）用全力夺取哈、齐二市。（四）用全力发动长、哈、齐三市及长哈齐线东西两侧各二百里左右地区的数百万群众，帮助他们组织起来与武装起来，作为控制全满之中心区域，迅速准备一切，为保卫长春而战。为此目的，应派遣大批有经验、懂策略干部分布中心区域各县市工作，发动群众，消灭土匪，清算汉奸，减租减息，改善职工待遇，分配大汉奸土地，这些工作短时期内须见成效。但须注意坚持广泛民族统一战线，只得罪少数人，不要得罪太多的人。为群众所反对之汉奸、豪绅、恶霸，必须惩办，但不要牵连太广。工人工资及其他劳动条件切不可提得过高，必须采取劳资合作、发展生产、繁荣经济、劳资两利的政策，决不可只顾工人暂时片面利益，结果害了自己。"},{"type":"paragraph","text":"中央"},{"type":"paragraph","text":"卯皓午"}],"comment_pivots":[{"part_idx":1,"offset":2,"index":1},{"part_idx":1,"offset":8,"index":2},{"part_idx":3,"offset":4,"index":3},{"part_idx":3,"offset":66,"index":4},{"part_idx":3,"offset":128,"index":5}],"is_range_date":false,"authors":["毛泽东"],"comments":["彭林，指彭真、林彪，当时分别任中共中央东北局书记、东北民主联军第一政治委员和东北局副书记、东北民主联军总司令。","周，指周保中（一九○二——一九六四），云南大理人，当时任东北民主联军副总司令兼吉辽军区司令员。陈，指陈云，当时任东北民主联军北满军区政治委员。高，指高岗（一九○五——一九五四），陕西横山人，当时任东北民主联军北满军区司令员。","杨，指杨国夫，当时任东北民主联军第七师师长。","哈齐，指黑龙江哈尔滨和齐齐哈尔。","满，指满洲，即中国东北地区。"],"page_start":122,"page_end":123,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c8cd991727"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
