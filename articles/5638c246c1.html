al-archives/banned-historical-archives8/main/maoquanji8.pdf"],"article":{"title":"百区工作的主要问题","alias":"","parts":[{"type":"paragraph","text":"白区工作的主要问题！"},{"type":"paragraph","text":"（1936年7月30日）"},{"type":"paragraph","text":"白区工作，在政治策略的影响方面有很大成绩。现在要加强组织建设，使之能担负起政治任务。目前白区工作在组织上很有发展的线索，据外来的同志说，在许多地方有很多大革命时期的落伍分子，现在又积极地肯干起来。他们过去没有犯什么罪，错误是声明过一下，尽可利用他们去做工作。西安周围、渭水南北，都有党的组织，应去发展扩大。各方面的工作，都须有党的组织才有力量。目前外面情报，只有军事情报，没有社会、文化、政治、经济等情报，这是因为没有归党去进行。外交工作，原则上要建立独立系统，分清责任，限于政治军事方面的外交。"},{"type":"paragraph","text":"[1]这是毛泽东在中共中央政治局常委会议上关于白区工作问题讲话的"}],"authors":["毛泽东"],"dates":[{"year":1936,"month":7,"day":30}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":549,"page_end":549},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5638c246c1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
