地畅谈了当前大好的国内外形势","authors":[],"dates":[{"year":1965,"month":8,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"刘主席董副主席邓小平同志接见李宗仁先生及其夫人"},{"type":"paragraph","text":"刘少奇主席等领导人同李宗仁先生亲切地畅谈了当前大好的国内外形势"},{"type":"paragraph","text":"新华社三十一日讯　刘少奇主席和夫人王光美，董必武副主席，邓小平总书记和夫人卓琳，今天下午接见了李宗仁先生及其夫人郭德洁女士。"},{"type":"paragraph","text":"刘少奇主席等领导人同李宗仁先生亲切地畅谈了当前大好的国内外形势。"},{"type":"paragraph","text":"同李宗仁先生一起被接见的，还有程思远先生。"},{"type":"paragraph","text":"接见时在座的，有中共中央统一战线工作部部长徐冰和夫人张晓梅，国务院副秘书长罗青长，以及刘仲容先生。"},{"type":"paragraph","text":"接见后，刘少奇主席等领导人设宴招待李宗仁先生和夫人郭德洁女士以及程思远先生。（附图片）"},{"type":"paragraph","text":"刘少奇主席、董必武副主席、邓小平总书记接见了李宗仁先生和他的夫人郭德洁女士。这是接见时合影。前左三是李宗仁先生，前左五是郭德洁女士，前左七是程思远先生。"},{"type":"paragraph","text":"新华社记者　杜修贤摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"37536ad3ce"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
