script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"在革命大批判中弄清了一条道理:旧社会资本家借送货上门加强剥削，新社会送货上门是为人民服务。我们恢复为劳动人民送煤球","authors":[],"dates":[{"year":1967,"month":5,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编辑同志:"},{"type":"paragraph","text":"今年一月份以来，由于反革命经济主义妖风的影响，我们煤炭行业送货上门的制度废除了，这样使广大居民深感不便，意见纷纷。对此，我们展开了辩论。有的认为应该恢复送煤球上门的制度，这是为人民服务。有的反对恢复这个制度，认为这是过去资本家搞的旧制度，不合理，应该废除。虽然辩论多次，但是谁也没有说服谁。意见得不到统一，问题一直没有解决。"},{"type":"paragraph","text":"当戚本禹同志的《爱国主义还是卖国主义?》一文发表以后，我们知道了党内头号走资本主义道路当权派竟为资本家涂脂抹粉，说什么“劳动人民不是反对剥削，而是欢迎剥削”，“资本家多了，剥削多了，那么，我们就越感到舒服”。这简直是胡说八道!我们煤炭工人在旧社会里受资本家的剥削最深，最懂得什么是剥削，那时候我们成天累死累活干活，每个月所得到的工资仅够买两块肥皂，吃的是残羹冷饭，连妻子儿女也养不起。资本家所以要搞送货上门制度，主要是为了从中剥削。"},{"type":"paragraph","text":"通过革命的大批判，大家一致认为，送货制度虽然是旧社会遗留下来的，但在新社会里继续这样做，本质是不同的。旧社会送货上门是资本家借以加强剥削，而新社会里送货上门是为人民服务的。毛主席教导我们:“全心全意地为人民服务，一刻也不脱离群众；一切从人民的利益出发，而不是从个人或小集团的利益出发；向人民负责和向党的领导机关负责的一致性；这些就是我们的出发点。”听毛主席的话，照毛主席的指示办事，是我们统一行动的准则。这样，我们终于从四月二十日起，恢复了送煤球上门的制度，服务对象是广大劳动人民，对地、富、反、坏、右分子及一切剥削阶级分子，我们一律不送。"},{"type":"paragraph","text":"黄浦区煤炭七站"},{"type":"paragraph","text":"井冈山战斗队"},{"type":"paragraph","text":"全体工人革命"},{"type":"paragraph","text":"造反队员"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"革命大批判","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"90c1f0900c"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
