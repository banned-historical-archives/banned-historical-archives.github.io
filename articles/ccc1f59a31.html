" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"毛泽东关于拟在三峡游泳给中央的电报","authors":[],"dates":[{"year":1957,"month":7,"day":7}],"is_range_date":false,"parts":[{"text":"毛泽东关于拟在三峡游泳给中央的电报","type":"title"},{"text":"中央，并请转罗瑞卿、王任重二同志：","type":"paragraph"},{"text":"我拟七月廿四日到重庆，廿五日乘船东下，看三峡。如果峡间确能下水，则下水过三峡，或只游三峡间有把握之一个峡。如不可能，则于船出峡口时下水到宜昌，或径到沙市。然后乘船到武汉。此事，已与瑞卿谈过。请中央考虑批准。如果中央同意的话，则(一)请瑞卿即带孙勇、韩队长等能游者十人左右，到武汉与已试航试泳一次之船队再去试行，反复几次。(二)王任重同志不要去，我拟于七月中旬到武汉和省委谈一些问题。","type":"paragraph"},{"text":" 毛泽东七月七日","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"王任重","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ccc1f59a31"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
