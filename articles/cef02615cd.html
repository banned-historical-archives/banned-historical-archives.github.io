<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"一幅优秀的照片剪贴","authors":["姚文元"],"dates":[{"year":1958,"month":12,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"姚文元"},{"type":"paragraph","text":"本月二十一日文汇报第一版上，有一幅吸引人的照片。在一望无际的喷野上，田陌纵横，一块块耕作过的土地，整齐得象从高处望下来的静立不动的部队。东方太阳正在升起，霞光万道，五位工、农、商、学、兵同志迎着清晨的阳光，并肩而立，手执工具或产品，精神焕发，健康的脸上露着胜利的微笑。照片的远处是一片工厂，画面有一种全新的气氛，富有生命力。它把中央关于人民公社若干问题的决议中开头那一段对人民公社热烈的歌颂，很形象地表达出来了。如果是五彩的，印在更好一些的纸上，画面更清晰些，效果当会更好罢。"},{"type":"paragraph","text":"那里来的这幅好照片呢?一看，呵，原来是新华社发的照片剪贴。"},{"type":"paragraph","text":"近几个月来，新华社发的照片剪贴，渐渐多起来了，看得一多，印象也慢慢深起来。这是一种新的战斗的艺术武器，用在歌颂社会主义建设，揭露敌人的丑相，是很有力的。前几天，绝妙的半面阿登纳半面希特勒的人面，加上一首讽刺诗，留下的印象是深刻的；艾森豪威尔立在绞架面前那幅剪贴照片，也形象地表达出帝国主义、战争罪犯自套绞索自取灭亡的命运。看着这些剪贴的照片，总觉得比有些照片在思想意义上更深一层，在画面结构更完整、更集中。这是因为剪贴本身就是一种概括和加工，它集中了不同的生活现象，选择了有本质意义的共同点或对立面，舍去了次要的部分，给以编排、突出。这样，把分散在好几幅照片中的精华集中起来，把只反映某一方面的画面同它的对立面结合起来，就成功了现在的照片剪贴。它是真实的，然而又不同于和生活一模一样的真实；它是和创作的图画不同的照片，然而又不仅仅是照片。一剪一贴，一留一去，就有一个分析提高的过程，这种过程，大概在一切艺术创作中都有的吧。"},{"type":"paragraph","text":"自然，剪贴不能代替照片，离开了照片就没有材料剪贴，照片也不是无选择无概括的自然主义。照片比剪贴更自然生动，剪贴比照片更深刻突出。两者各有优点。比较上说，照片更接近于新闻报道，剪贴更接近于宣传画，有的剪贴也已经成了宣传画的内容。两者都是很需要的。但剪贴是一种新兴的艺术，很有发展前途，所以这里特别写下自己的一点感想，欢迎这个新的创造。我希望照片剪贴以后，有一些可以多注重真实，有一些则不必过份追求做得同照片一模一样，因为剪贴不是绘画创作，总有缀合的痕迹；剪贴可以考虑充分在综合、突出、思想性方面多下功夫，发挥它的特长，使人一见就有一种照片上得不到的深刻印象:对于敌人，一针见血地暴露出他们伪装下的、正在烂下去的本质，破除其假象，揭露其真相；对于飞跃中的祖国、伟大的以苏联为首的社会主义阵营，则可以象这幅关于人民公社的剪贴画一样，运用艺术手法，集中地、高瞻远瞩地表现出欣欣向荣的生活，人民伟大的创造力量和无穷无尽的灿烂前程。这方面，照片剪贴还有很大的创造的天地，还有许多新的表现手法可以发掘。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"姚文元","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cef02615cd"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
