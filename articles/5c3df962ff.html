s":[],"dates":[{"year":1949,"month":9,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席朱总司令宴程潜张治中等"},{"type":"paragraph","text":"庆祝他们举行起义和响应人民和平运动"},{"type":"paragraph","text":"【新华社北平二十三日电】中国共产党毛泽东主席和中国人民解放军朱德总司令今晚举行宴集，应邀参加者有程潜、张治中、傅作义、邓宝珊、黄绍＠、李书城、李明灏、刘斐、陈明仁、孙兰峰、李任仁、吴奇伟、高树勋、张轸、曾泽生、何基澧、刘善本、林遵、邓兆祥、左协中、廖运周、李明扬、张＠村、黄琪翔、周北峰、程星龄等二十六人。应邀作陪者有李济深、陈铭枢、蔡廷锴、蒋光鼐、周恩来、陈毅、刘伯承、粟裕、黄克诚、聂荣臻、罗瑞卿、邢肇棠、周保中、赵寿山、张学诗、杨拯民。席间，毛主席几次举杯庆祝到会诸人举行起义和响应人民和平运动的功绩。毛主席说：由于国民党军中一部分爱国军人举行起义，不但加速了国民党残余军事力量的瓦解，而且使我们有了迅速增强的空军和海军。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5c3df962ff"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
