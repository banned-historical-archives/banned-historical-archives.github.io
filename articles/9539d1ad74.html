dates":[{"year":1974,"month":9,"day":2}],"is_range_date":false,"parts":[{"text":"彭德怀遗言","type":"title"},{"text":"彭德怀","type":"authors"},{"text":"〖1974年9月2日上午，两个专案审查人员奉叶剑英之命到医院看望彭德怀，作临终谈话。这是他们记录的谈话要点。〗","type":"subtitle"},{"text":"毛主席发展了马列主义……","type":"paragraph"},{"text":"周总理，我们相处三十多年，他是我们党内最能掌握和运用毛主席思想策略的，我们的社会主义事业一定能胜利。","type":"paragraph"},{"text":"我自己犯有很多错误，但我不搞阴谋诡计，在这点上我是清白的。","type":"paragraph"},{"text":"问心无愧！","type":"paragraph"},{"text":"我们国防建设，战略防御设施不完备，国防工业和科研跟不上，这是我最担心的，只要我们有计划，有准备，敌人的物质力量是可以战胜的。","type":"paragraph"},{"text":"已经审查我八年了，现在还没有做结论。","type":"paragraph"}],"comments":[],"origin":"彭德怀传记编写组《一个真正的人——彭德怀》，人民出版社1994年10月第一版。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"彭德怀","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9539d1ad74"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
