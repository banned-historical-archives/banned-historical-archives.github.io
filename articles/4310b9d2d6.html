authors":[],"dates":[{"year":1979,"month":10,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"全国各地热烈庆祝建国三十周年"},{"type":"paragraph","text":"都强调要认真学习四中全会公报和叶剑英同志的讲话"},{"type":"paragraph","text":"新华社北京十月二日电  连日来，全国各地纷纷举行各种活动，热烈庆祝中华人民共和国成立三十周年。从九月二十九日到十月一日，二十九个省、市、自治区都举行了国庆报告会、庆祝会、座谈会、茶话会、展览会和联欢会。"},{"type":"paragraph","text":"国庆节前夕，党的十一届四中全会公报和叶剑英同志代表中共中央、人大常委会和国务院在庆祝中华人民共和国成立三十周年大会上的讲话，给了全国各族人民很大鼓舞。各地在庆祝节日的报告会、座谈会上，都强调要认真学习四中全会公报和叶剑英同志的讲话，高举马列主义、毛泽东思想的旗帜，做解放思想的促进派，做安定团结的促进派，做四化建设的促进派，向着四个现代化的宏伟目标奋勇前进。不少省、市、自治区在庆祝建国三十周年的日子里，还召开了表彰先进集体和模范人物大会。在一些集会上，劳动模范们畅谈学习四中全会公报和叶剑英同志讲话的心得体会。"},{"type":"paragraph","text":"节日里，坚守生产岗位的工农群众，用出色的劳动庆祝国庆。不少地方的领导干部还到基层单位，同群众一起劳动和联欢，向群众祝贺节日。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4310b9d2d6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
