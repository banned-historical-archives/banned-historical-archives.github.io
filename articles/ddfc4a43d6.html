al-archives/banned-historical-archives8/main/maoquanji8.pdf"],"article":{"title":"给李克农的训令","alias":"","parts":[{"type":"paragraph","text":"给李克农的训令1"},{"type":"paragraph","text":"（1936年2月21日）"},{"type":"paragraph","text":"估计张学良愿意与我们继续谈判，准备订立互不侵犯协定；同意抗日，但不同意讨蒋；不反对国防政府、抗日联军口号，但不同意马上实行这个口号；接受蒋介石的策略，即取消苏维埃红军、取消苏维埃制度与暴动策略。在这种情况下，我们的策略：处处把张学良与蒋介石分开；求得互不侵犯协定的订立；坚持抗日救国代表大会，坚持抗日讨卖国贼不可分离：如张提出取消苏维埃，则克农提出取消南京政府，在抗日救国代表大会中作取消双方政府、成立全国人民公意的政治制度的初步讨论；如张提出取消暴动，则克农提出取消一切国民党的压迫制度、封建剥削：要求停止内战，不拦阻全国红军集中河北，不反对红军充任抗日先遣队；原则不让步，交涉不破裂。二十五日李克农等到达洛川，同王以哲会谈。"},{"type":"paragraph","text":"[1]这是毛泽东和洛甫（张闻天)、彭德怀以中共中央及军委名义发出的"}],"authors":["毛泽东"],"dates":[{"year":1936,"month":2,"day":21}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":247,"page_end":247},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ddfc4a43d6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
