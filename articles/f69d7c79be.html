ical-archives/banned-historical-archives8/main/maoquanji17.pdf"],"article":{"title":"在鲁迅艺术文学院的讲话","alias":"","parts":[{"type":"paragraph","text":"在鲁迅艺术文学院的讲话！"},{"type":"paragraph","text":"（1942年5月30日）"},{"type":"paragraph","text":"提高要以普及为基础，不要瞧不起普及的东西，大树也是从像豆芽菜一样小的树苗长起来的。那些瞧不起普及的人，他们在豆芽菜面前熟视无睹，结果把豆芽菜随便踩掉了。你们现在学习的地方是小鲁艺，还有一个大鲁艺，还要到大鲁艺去学习。大鲁艺就是工农兵群众的生活和斗争，广大的劳动人民就是大鲁艺的老师。你们应当认真地向他们学习，改造自己的思想感情，把自己的立足点逐步移到工农兵这一边来，才能成为真正的革命文艺工作者。"}],"authors":["毛泽东"],"dates":[{"year":1942,"month":5,"day":30}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":79,"page_end":79},"tags":[{"name":"毛泽东","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f69d7c79be"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
