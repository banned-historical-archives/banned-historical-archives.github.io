rt":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"南斯拉夫匪徒侵入阿尔巴尼亚阿人民军少将科拉乃奇怒斥南修正主义者","authors":[],"parts":[{"type":"paragraph","text":"9月1日，特罗波亚区数千居民怀着悲愤的心情为死难者举行葬礼。阿尔巴尼亚人民军少将科拉乃奇在葬礼仪式上强烈谴责南斯拉夫匪徒的这一无耻罪行。他说，这一丑恶的行动再次揭破了贝尔格莱德刽子手们的野蛮面目。这些疯狂豺狼们的行动超过了希特勒法西斯匪徒。他们妄想把社会主义的阿尔巴尼亚变成他们的殖民地，从而不惜采取最卑鄙最野蛮的手段。但是，南斯拉夫修正主义者应该知道，阿尔巴尼亚已有了自己的主人，它有着在劳动党领导下的勇敢和爱国的人民。十六年来，阿尔巴尼亚人民在劳动党的领导下，英勇地反击和粉碎了帝国主义者和在阿尔巴尼亚国境周围的帝国主义仆从们的一切敌对阴谋。"},{"type":"paragraph","text":"阿尔巴尼亚劳动党特罗波亚区党委书记迪尔米希说，特罗波亚的居民永远一手拿枪，一手拿镐，象这两位英雄的战士一样，坚决地忠诚地保卫着边境。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"851dc68fa6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
