busercontent.com/banned-historical-archives/banned-historical-archives14/main/2d7a81d2-0b40-46b9-938f-0d6d3c8a8a7e/1.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives14/main/2d7a81d2-0b40-46b9-938f-0d6d3c8a8a7e/2.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives14/main/2d7a81d2-0b40-46b9-938f-0d6d3c8a8a7e/3.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives14/main/2d7a81d2-0b40-46b9-938f-0d6d3c8a8a7e/4.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives14/main/2d7a81d2-0b40-46b9-938f-0d6d3c8a8a7e/5.jpg"],"article":{"title":"中共湖南省委、长沙市委召开大会传达贯彻党中央指示精神","alias":"","parts":[{"type":"paragraph","text":"毛主席语录揭发与批判"},{"type":"paragraph","text":"我们现在思想战"},{"type":"paragraph","text":"线上的一个重要任（第二期）"},{"type":"paragraph","text":"务，就是要开展对于省直单位革命大批判组编"},{"type":"paragraph","text":"修正主义的批判一九七四年四月十一日"},{"type":"paragraph","text":"中共湖南省委、长沙市委召开大会传达贯彻党中央指示精神"},{"type":"paragraph","text":"大会号召全省军民抓批林批孔，促工"},{"type":"paragraph","text":"农业生产，夺取革命、生产的新胜利"},{"type":"paragraph","text":"为了坚决贯彻党中央四月七日对湖南的重要指示，把我省批林批孔群众运动推向新的高潮，促进工农业生产，夺取革命和生产的新胜利，省委和长沙市委于四月十日召开了誓师大会。参加大会的有省会工农兵群众、革命干部、革命知识分子和红卫兵小将，共八万一千多人。中共湖南省委、省革委会、省军区，以及长沙市委、市革委会、长沙警备区的负责同志参加了大会。省（市）总工会、共青团省（市）委、省（市）妇联、省工宣办和长沙市民兵指挥部的负责同志也参加了大会。"},{"type":"paragraph","text":"大会由中共中央委员、省委常委唐忠富同志主持。中共湖南省委第二书记张平化同志传达了中央重要指示，并作了讲话。在大会上讲话的还有张立宪、张厚、胡勇、叶卫东、李铁"}],"authors":["省直单位革命大批判组"],"dates":[{"year":1974,"month":4,"day":11}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1},"tags":[{"name":"湖南文革","type":"人物"},{"name":"批林批孔","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"175f2e9088"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script
