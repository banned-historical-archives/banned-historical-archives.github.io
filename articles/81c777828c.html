tart":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"中国文化大革命标志着帝修反的大失败","authors":[],"parts":[{"type":"paragraph","text":"新华社科伦坡十日电 锡中友好协会三日举行大会，会上通过一项决议，热烈欢呼中国无产阶级文化大革命的伟大胜利。"},{"type":"paragraph","text":"决议说，一九六八年在中国发生的具有历史意义的两个最重大的事件是，中国除台湾省外的二十九个省、市、自治区全部成立了革命委员会和胜利地举行了中国共产党第八届扩大的第十二次中央委员会全会。这使我们感到非常高兴和受到巨大鼓舞。这两个具有革命重大意义的事件，不仅是中国人民的伟大胜利，而且也是世界各国人民和进步人民的伟大胜利。决议指出，中国无产阶级文化大革命对世界人民革命的影响确实是非常巨大的，它标志着帝国主义、现代修正主义和各国反动派的大失败。"},{"type":"paragraph","text":"决议说，中国人民在毛泽东思想的光辉指引下，从胜利走向胜利。世界各国人民的民族解放斗争和革命斗争一定会得到中国人民的大力支持。"},{"type":"paragraph","text":"决议最后说，我们十分高兴地从中国共产党八届扩大的十二中全会发表的公报中获悉，中国的赫鲁晓夫刘少奇已经被撤消党内外的一切职务，同时，中国共产党的第九次代表大会即将召开。我们衷心地祝愿中国共产党和中国人民在对于人类的命运具有深远意义的光荣斗争中完全成功。"}],"alias":""},"tags":[{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"81c777828c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
