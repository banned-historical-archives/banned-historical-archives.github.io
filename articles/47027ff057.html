<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反对殖民剥削　要求增加工资  比属刚果非洲工人举行大罢工  卢蒙巴指出刚果争取独立斗争日益强大","authors":[],"dates":[{"year":1959,"month":10,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反对殖民剥削　要求增加工资"},{"type":"paragraph","text":"比属刚果非洲工人举行大罢工"},{"type":"paragraph","text":"卢蒙巴指出刚果争取独立斗争日益强大"},{"type":"paragraph","text":"本报讯　据利奥波德维尔消息：比属刚果非洲工人第一次有组织的、大规模的罢工斗争正在迅速扩大中。10月5日，比属刚果交通运输局所属利奥波德维尔等地航运工人首先举行罢工。到8日，罢工已扩展到下刚果地区。马塔迪、利奥波德维尔、斯坦利维尔等许多港口和铁路工人已全部停止工作。好几个省的水运和铁路运输都陷于瘫痪状态。据西方通讯社透露，目前投入罢工斗争的非洲工人已达二万三千人，占交通运输局管辖的航运和铁路企业工人总数90％以上。"},{"type":"paragraph","text":"这次罢工是由刚果运输局工人基督教工会所发起的。参加罢工的非洲工人支持这个工会向比利时殖民当局提出的增加非洲工人工资15％的要求。许多欧洲籍工人也积极参加这一斗争。他们拒绝代替非洲工人留下的工作，从而打击了殖民当局挑拨工人团结和破坏罢工斗争的阴谋。罢工工人们表示，他们将坚持斗争，直到要求得到满足。"},{"type":"paragraph","text":"这次罢工斗争，是比属刚果工人阶级对比利时殖民统治和殖民剥削的直接抗议。比利时和美英垄断资本集团每年从比属刚果掠夺了巨额利润，但是非洲工人生活却极为困苦。一个本地工人的每天工资仅能购买一包火柴。去年资本主义世界的经济危机，严重打击了比属刚果的经济，非洲工人生活更加困苦。仅在利奥波德维尔，失业工人即有数万人。在今年年初，失业工人问题成为导火线，激发了大规模的反对殖民统治的斗争。比利时殖民当局一方面对刚果人民进行血腥镇压，另一方面又提出了进行政治经济“改革”的诺言，并且决定在11月份进行所谓“选举”，以欺骗刚果人民。但是，这些手法都未达到预期的目的。最近半年多来，刚果民族独立运动有了进一步的发展。刚果工人和广大人民生活也更加恶化。今年，比属刚果贸易赤字将高达三十亿比利时法郎，殖民当局已决定增加税收、加紧剥削。这些情况都激起了更多工人和广大人民投身反殖民统治的斗争。"},{"type":"paragraph","text":"不久以前，刚果的工会组织大部分是受殖民当局控制和影响的。今年年初大规模的反殖民统治斗争以后，刚果非洲工人的组织水平和觉悟水平已经有了很大提高。利奥波德维尔公共汽车工人、科基哈特维尔炼油厂工人、塞德克工厂工人都曾先后举行罢工，要求增加工资。最近航运和铁路部门非洲工人在统一领导和共同目标下，在广大地区同时发动罢工，这是刚果工人运动史上从未曾有过的。"},{"type":"paragraph","text":"据新华社阿克拉10日电　刚果民族运动党领袖卢蒙巴今天在这里发表谈话说，刚果人民争取独立的斗争运动正在日益强大，这给比利时殖民当局企图消灭在全国各地出现的人民独立运动的阴谋以有力的打击。卢蒙巴是到这里来参加全非人民大会总务委员会会议的，这次会议已于9日结束。"},{"type":"paragraph","text":"卢蒙巴说，比利时殖民者在刚果人民不惜代价要粉碎殖民主义锁链的斗争面前，不得不宣布刚果人民享有独立的权利。但是，他们拟订中的计划的目的却想建立一个“比利时—刚果共同体”。这个计划规定建立的省议会议员，60％由选举产生，40％由当局指派。因此，比利时政府希望建立一个在它控制之下的傀儡政府。"},{"type":"paragraph","text":"卢蒙巴接着说，正是因为这个缘故，我们的运动决定拒绝参加将在年内举行的这次反民主选举。我们唯一关心的是希望刚果人民毫不迟延地成为自由的人民。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"47027ff057"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
