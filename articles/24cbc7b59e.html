ical-archives/banned-historical-archives0/main/maoquanji46.pdf"],"article":{"title":"在八评苏共中央的公开信稿上加写的两段话","alias":"","parts":[{"type":"paragraph","text":"在八评苏共中央的公开信稿上"},{"type":"paragraph","text":"加写的两段话\"!"},{"type":"paragraph","text":"（1964年3月17日）"},{"type":"paragraph","text":"本文想讨论一个大家都熟悉的、很出名的问题，这就是所谓“和平过渡”问题。这个问题之所以出名，弄得大家都注意起来，是由于赫鲁晓夫?在苏共第二十次代表大会上提了出来，在苏共第二十二次代表大会上用纲领的形式加以系统化，以其修正主义的观点，反对马克思列宁主义的观点。一九六三年七月十四日苏共中央的公开信，又重弹这个老调。"},{"type":"paragraph","text":"二"},{"type":"paragraph","text":"为此原故，我们要写这篇文章，以比过去更加清楚的语言，回答修正主义者。"},{"type":"paragraph","text":"[1]八评苏共中央的公开信以《无产阶级革命和赫鲁晓夫修正主义》为题，在1964年3月31日《人民日报》和《红旗》杂志1964年第六期发表。本篇一写在这篇文章送审稿前言部分的开头；本篇二写在送审稿前言部分的末尾。"},{"type":"paragraph","text":"[2]赫鲁晓夫，当时任苏共中央第一书记、苏联部长会议主席。"}],"authors":["毛泽东"],"dates":[{"year":1964,"month":3,"day":17}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":290,"page_end":290},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"24cbc7b59e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
