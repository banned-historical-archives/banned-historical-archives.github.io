],"dates":[{"year":1961,"month":6,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛泽东主席接见苏加诺总统"},{"type":"paragraph","text":"同日在极为友好的气氛中举行会谈"},{"type":"paragraph","text":"新华社13日讯　毛泽东主席今天下午在中南海勤政殿接见印度尼西亚共和国总统苏加诺，宾主进行了亲切友好的谈话。"},{"type":"paragraph","text":"同时被接见的还有印度尼西亚第一副首席部长兼分配部长约·莱梅纳，临时人民协商会议副议长威路约·普斯波尤多，劳工部长阿赫姆·埃尔宁普拉贾，民用工业部长苏哈托准将，合作国会副议长穆萨林中校，部长级国务秘书穆·伊克桑，加托特·苏布罗托中将等贵宾。接见时，印度尼西亚驻中国大使苏卡尼·卡托迪维约也在座。"},{"type":"paragraph","text":"接见时在座的有：中华人民共和国主席刘少奇，国务院总理周恩来，外交部副部长黄镇。"},{"type":"paragraph","text":"新华社13日讯　毛泽东主席和印度尼西亚共和国总统苏加诺，今天下午举行了会谈。"},{"type":"paragraph","text":"会谈在极为友好的气氛中进行。"},{"type":"paragraph","text":"中国方面参加会谈的有：中华人民共和国主席刘少奇，国务院总理周恩来，外交部副部长黄镇。"},{"type":"paragraph","text":"印度尼西亚方面参加会谈的有：第一副首席部长兼分配部长约·莱梅纳，印度尼西亚驻中国大使苏卡尼·卡托迪维约。（附图片）"},{"type":"paragraph","text":"毛主席接见苏加诺总统，图为接见前合影。前排左起第七人是苏加诺总统，第九人是第一副首席部长莱梅纳"},{"type":"paragraph","text":"新华社记者　吕厚民、张　彬摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6530aa2167"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
