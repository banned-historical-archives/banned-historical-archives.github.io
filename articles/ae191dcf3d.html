script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"坚决同资产阶级的坏思想决裂","authors":["尤美丽"],"dates":[{"year":1971,"month":1,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"我们一定要同资产阶级思想划清界线，决不能和平共处。"},{"type":"paragraph","text":"最近，学校开展了揭露矛盾、批判修正主义教育路线的群众运动，形势一派大好。但是，我班有些同学却反常，他们对复课闹革命没有劲，政治活动也不参加，他们不是在家里玩，就是上课吵吵闹闹。这完全是刘少奇的“读书做官论”的翻版“读书无用论”余毒的反映。这种状况，资产阶级是欢迎的，但我们无产阶级是非常痛心的。资产阶级就是利用青少年的弱点向我们进攻，妄图把青年人拉下泥坑，变成他们的接班人，我们想一想，这是多么危险啊!希望这些同学赶快清醒过来，赶快同自己头脑中的非无产阶级思想决裂，彻底划清无产阶级思想和资产阶级思想的界线，用毛泽东思想武装自己的头脑，坚决执行毛主席关于“复课闹革命”的伟大号召和“纪律是执行路线的保证”的伟大教导，坚持复课闹革命，加强革命的组织纪律性，把自己培养成为无产阶级革命事业的接班人。"},{"type":"paragraph","text":"中一(15)班　尤美丽"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ae191dcf3d"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
