" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"右派分子沈石指黑为白，顽固反对知识分子思想改造","authors":[],"dates":[{"year":1957,"month":9,"day":5}],"is_range_date":false,"parts":[{"text":"右派分子沈石指黑为白，顽固反对知识分子思想改造","type":"title"},{"text":"《解放军报》记者报道　９０５９部队文工团右派分子沈石肆意诽谤党的知识分子政策，抵抗党对知识分子的思想改造。","type":"paragraph"},{"text":"沈石是预备党员，文工团的创作组长。整风开始后，他狂吠着要揭领导上的“盖子”，疯狂地攻击领导，攻击党员、党支部和肃反运动中的积极分子，并提出支部不能领导整风，主张另成立一个领导小组，企图篡夺整风的领导权。","type":"paragraph"},{"text":"他特别抓住知识分子问题向党开火。他诽谤党的知识分子政策是“限制、利用、改造，和对资产阶级一样”。他把干部阅读某些内部文件有一定的级别限制，说成是“知识分子学习也受限制”。他恶意地说：“知识分子入党难，文工团的知识分子入党更难”（他本人是在文工团入党的）。他崇拜胡风的所谓主观战斗精神，反对知识分子应向工农兵学习和文艺应为工农兵服务的方针，公开讽刺到群众中去体验生活的同志。","type":"paragraph"},{"text":"他污蔑党“歧视知识分子”，胡说在党的心目中“有知识，成了历史复杂的别名”，“地主劳动几年，可以改变成分，我们还不如地主”。他慷慨激昂地责问党：“究竟要把知识分子改造成什么样子？”他要党对知识分子重新估价，说什么知识分子事事都有自己的看法，容易不满现状，而领导上往往把这当作没有立场或立场不稳；知识分子比较容易接受新事物，而领导上把这与教条主义、好高鹜远、不虚心等混淆，这与工农分子的自满保守有关；知识分子历史复杂是缺点也是优点，工农分子历史清白是优点也是缺点，历史清白造成了党群关系的矛盾；党员靠政治吃饭，群众靠业务吃饭，知识分子喜欢学习业务技术，而领导上往往把这与名利思想混淆。","type":"paragraph"},{"text":"沈石在知识分子问题上向党进攻，不仅有言，而且有行，他曾积极拉拢、煽动别人对党进行攻击。经过群众的揭露和说理斗争，他已被迫在会上低头认罪。文工团的同志要求他彻底地作检讨。","type":"paragraph"},{"text":" ——原载《解放军报》1957年9月5日。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1e6e7ed17d"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
