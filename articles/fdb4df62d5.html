script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"桑穆加塔桑同志致电中国共产党中央委员　会热烈祝贺我国新的氢弹试验成功这是对美帝国主义及苏联现代修正主义的核垄断的巨大打击，是对他们想利用这种垄断来重新瓜分世界企图的巨大打击，是对为从帝国主义特别是美帝国主义统治下获得民族解放而斗争的各国人民的巨大支持","authors":[],"dates":[{"year":1969,"month":1,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京五日电　中国共产党中央委员会收到了锡兰共产党总书记桑穆加塔桑同志发来的一份电报。电报热烈祝贺我国成功地进行了一次新的氢弹试验。"},{"type":"paragraph","text":"电报说，我代表锡兰共产党中央委员会为你们又一次氢弹爆炸成功，向你们和你们伟大的领袖毛泽东同志表示最热烈的敬意和最衷心的祝贺。"},{"type":"paragraph","text":"电报说，这是中华人民共和国在当代最伟大的马克思列宁主义者毛泽东同志亲自发动和领导的无产阶级文化大革命全面胜利推动下所取得的技术进步的胜利。这是无产阶级文化大革命焕发了人民巨大的积极性的结果。这是毛泽东思想的又一胜利。"},{"type":"paragraph","text":"电报说，你们进行热核试验成功，是对美帝国主义及苏联现代修正主义的核垄断的巨大打击，是对他们想利用这种垄断来重新瓜分世界企图的巨大打击。你们的成功是一种阻碍帝国主义和修正主义的新战争冒险和新战争威胁的力量。这是世界和平的最可靠的保证。这是对为从帝国主义特别是美帝国主义统治下获得民族解放而斗争的各国人民的巨大支持。"},{"type":"paragraph","text":"电报说，这次成功是对将要召开的中国共产党第九次全国代表大会的一项重大献礼。不仅中国而且全世界都在盼望着这次代表大会，把它看做是国际共产主义和革命运动的道路上的一个重要里程碑。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fdb4df62d5"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
