"dates":[{"year":1951,"month":4,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"峰峰煤矿劳动模范大会致电毛主席"},{"type":"paragraph","text":"保证创造“安全生产季”"},{"type":"paragraph","text":"【新华社八日讯】国营峰峰煤矿劳动模范大会于三月二十八日致电毛主席，保证要在今年第二季创造“安全生产季”。该电首先向毛主席报告了该矿完成并超过一九五○年的生产任务，并于最近创造风镐采煤二百五十四吨的全国新纪录的情况。该电继即提出，今后要进一步团结和带动全体职工，继续展开抗美援朝运动，迎接“五一”劳动节，保证要在今年第二季达到全季安全生产的目的。到会的劳动模范表示：要在爱国主义劳动竞赛中创造出更多的新纪录，特别要创造集体的劳动模范，用实际行动反对美国武装日本，保卫世界和平。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a435897105"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
