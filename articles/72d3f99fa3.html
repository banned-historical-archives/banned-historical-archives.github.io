ar":1955,"month":7,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席接见印度文化代表团团长"},{"type":"paragraph","text":"新华社三十日讯　中华人民共和国毛泽东主席，三十日下午接见了印度文化代表团团长、印度政府外交部副部长阿·库·钱达和夫人，代表团秘书、印度政府外交部官员古·辛格，代表团舞台监督、全印广播电台主任兼节目指导拉·马拉太。"},{"type":"paragraph","text":"接见时在座的，有中华人民共和国副主席朱德，全国人民代表大会常务委员会委员长刘少奇、国务院总理周恩来，全国人民代表大会常务委员会副委员长李济深、黄炎培、李维汉，国务院副总理陈云、邓小平、陈毅，中国人民政治协商会议全国委员会副主席章伯钧，国防委员会副主席聂荣臻、叶剑英、程潜、张治中、傅作义，文化部代理部长钱俊瑞，副部长丁西林、夏衍和外交部副部长章汉夫。"},{"type":"paragraph","text":"接见时，印度驻华大使赖嘉文和夫人也在座。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"72d3f99fa3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
