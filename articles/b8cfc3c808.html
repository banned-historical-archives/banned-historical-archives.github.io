script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"工人调查组到上层建筑领域进行调查研究，同广大干部和技术人员一起批判修正主义企业管理路线，推动了上层建筑领域里斗批改的深入开展。江南造船厂的工人调查组在斗争中体会到——工人是企业管理的主人","authors":[],"dates":[{"year":1975,"month":2,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"在中央两报一刊元旦社论精神鼓舞下，江南造船厂的广大职工联系修正主义办企业路线在本厂的影响，深入批林批孔，组成了有工人老师傅和工人理论队伍成员参加的调查组，到上层建筑领域“倒蹲点”，彻底清算修正主义办企业路线的各种流毒和影响，推动了上层建筑领域社会主义革命的深入和发展。"},{"type":"paragraph","text":"工人调查组是由来自生产第一线的船体、造安、电气等车间五个工段共十余人组成的。他们“走上来”后，采取开座谈会、批判会等各种形式，对厂部生产、技术、检查等科室及厂里有关领导作了多次调查，掌握了许多第一手资料，进一步看到了由于修正主义办企业路线的流毒尚未肃清，严重地束缚了广大造船工人的革命创造精神和冲天干劲，阻挠了造船工业发展的状况。"},{"type":"paragraph","text":"工人调查组的同志针对个别领导迷信洋框框，看不到工人群众在生产实践中积累起来的丰富经验的思想，就联系修正主义路线开展革命大批判。工人同志用苏修撤退专家，撕毁合同，苏联专家扼杀工人创造精神的大量事实和一些亲身经历，控诉和批判了苏修的罪恶行径。有些同志在揭露批判中指出，苏修名为援助，实质上是妄图对我们进行政治上控制，经济上掠夺，军事上侵略，生产上破坏，思想上腐蚀。一句话，苏修亡我之心不死。通过批判，大家体会到，深入批林批孔，批判修正主义办企业路线，才能牢牢树立相信群众的思想，坚持独立自主、自力更生的方针。"},{"type":"paragraph","text":"通过在上层建筑各科室、部门的调查研究，也使工人调查组的同志提高了路线斗争觉悟，他们体会到，工人阶级一定要牢记自己的历史使命，永远用马列主义、毛泽东思想占领整个上层建筑领域，推动上层建筑的斗批改。"},{"type":"paragraph","text":"工人群众“倒蹲点”、“走上来”，促进了江南造船厂上层建筑领域的斗批改。厂技术组领导最近改变了作风，带领技术人员到生产第一线广泛听取工人群众的意见。厂检查组的同志和广大工人、技术人员一起，提出了航行试验等改革大纲。厂党委也组成了由四个车间、四个科室人员和厂革委会领导参加的专门班子，发动群众，调查研究，在符合多快好省的基础上，对生产技术、工艺图纸和现场施工等方面修正主义的影响，实行边批判边改革，进一步推动了本厂的斗批改。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"批林批孔","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b8cfc3c808"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
