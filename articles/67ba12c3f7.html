script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"右派分子有整套反动策略纲领妄想资产阶级在中国复辟涂长望希望九三学社社员提高政治警觉","authors":[],"dates":[{"year":1957,"month":6,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报北京14日专电】　记者杨重野报道:九三学社中央常务委员会今日继续举行座谈会。发言的人无限愤慨的提出，要对反党反社会主义的言论，予以坚决地回击，要明辨是非，同右派分子划清界线。"},{"type":"paragraph","text":"涂长望的发言很有代表性，他指出九三学社社员，很多人政治嗅觉不灵，是政治伤风，上次座谈会上，对储安平的反动言论，提出批评的有三人，而在不同程度上同情储安平的却有五人。他说，对储安平的发言，不能孤立的看，要把右派分子一系列的言论联系起来看，他们有一批“理论家”，有一套“政治策略”，有“纲领”，这是他们的“三部曲”，在同时进行“合唱”，他认为这是资产阶级不甘心退出政治舞台的迴光反照。"},{"type":"paragraph","text":"很多人同意涂长望的看法，并且指出不仅是政治嗅觉不灵，而且由于自己受了资产阶级民主理论的毒害相当深，在思想意识上起了共鸣，现在经过对这些反动言论的批判，特别是史良在民盟中央小组座谈会上的揭发，使得大家警惕起来了。"},{"type":"paragraph","text":"大家也提到，帮助党整风，也要在整风中教育自己，改造自己。王钧衡提出知识分子应该以党的知识分子——红色专家为奋斗目标。董渭川提出要多向工人农民学习，以加强自己的改造。"},{"type":"paragraph","text":"许德珩在最后作了发言，他说:“离开工人阶级先锋队——中国共产党的领导，我们国家的社会主义前途是不可想像的。同时，离开社会主义别的道路是没有的。”"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"67ba12c3f7"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
