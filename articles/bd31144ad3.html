art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"黄牛就要长双角","authors":["董振国"],"parts":[{"type":"paragraph","text":"作为一个共产党员，不可以没有革命“老黄牛”的干劲，更应当有斗敌人的双角。鲁迅的两句诗：“横眉冷对千夫指，俯首甘为孺子牛”，清楚地说明了这个道理。“横眉”，是指对敌人战斗，“俯首”，是指为人民服务的态度和干劲。我们要求“黄牛长双角”，就是要象鲁迅那样，对人民鞠躬尽瘁，死而后已；用“双角”同敌人斗争，不获全胜，决不休战。"},{"type":"paragraph","text":"“黄牛要长双角”，是由我们党的基本纲领和基本路线决定的，也是共产党员五个“必须做到”中的要点之一，是同党内资产阶级斗争的需要。毛主席指出：“搞社会主义革命，不知道资产阶级在哪里，就在共产党内，党内走资本主义道路的当权派。走资派还在走。”社会主义革命的实践表明，只要旧社会的痕迹还存在，走资派还将不断地产生。走资派还在走，无产阶级须战斗。要做无产阶级政党的一员，不长起“双角”，不拿起斗争的武器，怎么去战斗呢？"},{"type":"paragraph","text":"在农村或牧区，曾经看到这样的现象：有些牧人担心牛长角顶人，把小牛的嫩角用锯子锯去，或擦抹“止角药”，使其弯卷而生，丧失锋锐的战斗力。在政治生活中，资产阶级特别是党内走资派，也使用“止角法”。他们将“中庸之道”之类腐蚀剂往战士的“双角”上狠抹。叛徒刘少奇宣扬“党内和平论”、“驯服工具论”，要人们去做“逆来顺受”的奴才；卖国贼林彪鼓吹“不批评、不建言、不得罪”的“三不主义”，要人们抹稀泥，当政治上的“八级泥瓦匠”；走资派邓小平不讲马列主义的斗争哲学，一味诱导人们“踏踏实实的干”，去做抓老鼠的“好猫”。然而，无产阶级革命战士头上的“角”，是什么样的“止角法”也止不住的，它总是要长起来，而且总是要用它来和阶级敌人斗，和修正主义路线斗。"},{"type":"paragraph","text":"伟大领袖毛主席一贯强调共产党员和革命分子要拿起思想斗争的武器。最近又指出：“不斗争就不能进步。”我们各级党组织都应当遵循毛主席的教导，以阶级斗争为纲，在斗争中加强党的思想建设和组织建设，积极培养长“角”的革命“牛”。我们每一个共产党员和革命战士，也要自觉执行毛主席的指示，积极投入到同党内资产阶级及一切阶级敌人的斗争中去！"}],"alias":""},"tags":[{"name":"党内资产阶级","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bd31144ad3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
