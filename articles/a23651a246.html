,"dates":[{"year":1954,"month":12,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"青年团上海市委于本月廿六日下午举行了第十九次‘青年讲座’，邀请吴强同志作了‘在文学领域中与资产阶级思想进行斗争问题’的报告，到会听讲的有上海各大学、部分中学的爱好文艺的同学、中等学校青年语文教师、部分爱好文艺的机关青年和青年团干部等六百余人。吴强同志在报告中，首先对最近文艺界中，在全国各地开展批判俞平伯的‘红楼梦研究’中的资产阶级唯心论观点和批评‘文艺报’的编辑思想，以及对胡适派反动思想斗争的情况，作了系统的介绍和分析，并对这次思想斗争的实质、重要意义和方针政策作了说明。最后，他指出青年应该自觉成为新生力量的代表，在学术上应提倡老老实实、脚踏实地的刻苦钻研精神，培养自己的独立思考能力和积极创造精神，成为有真才实学的人。在文学创作上，则应抱着‘大胆创作，慎重发表’的负责态度。吴强同志的报告使到会青年对当前在文学领域中与资产阶级思想进行斗争问题有了明确的认识。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a23651a246"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
