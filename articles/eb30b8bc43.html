示报告》（概要）","authors":[],"dates":[{"year":1978,"month":8,"day":19}],"is_range_date":false,"parts":[{"text":"中共中央转发共青团十大筹备委员会《关于红卫兵问题的请示报告》（概要）","type":"title"},{"text":"1978年8月19日，中共中央转发共青团十大筹备委员会《关于红卫兵问题的请示报告》。《报告》指出，作为“文化大革命”中产生的红卫兵组织，已经完成了它的历史使命。现在，学校共青团组织早已恢复，工作在不断加强；少先队和学生会也正在恢复。红卫兵的存在，使学校中学生组织重迭，学生干部负担过重，矛盾很多。普遍认为，红卫兵组织可以不再继续存在了。文件下达后，学校中的红卫兵组织即行解散。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"eb30b8bc43"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
