:[{"year":1951,"month":2,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"太原、上海炼钢工人向毛主席报告生产新纪录"},{"type":"paragraph","text":"敬爱的毛主席："},{"type":"paragraph","text":"我们太原炼铁厂炼钢部全体职工，自从去冬热烈地掀起爱国主义生产竞赛以来，由于党、政、工、团的正确领导，苏联朋友给我们技术上的指导，员工们发挥集体主义的精神，各部门间紧密联系，所以，除了胜利地超额完成一九五○年的生产任务外，今年一月一日至七日，又连续创造五个冶炼时间和三次产量上的新纪录。这次冶炼时间较去年的最高纪录缩短一时零一分钟，日产量超过去年最高纪录百分之四点九。这些新纪录的创造，给我们带来无限的勇气与力量。我们满怀信心地向你保证：我们坚决消灭工作中的缺点，完成一九五一年国家给予我们的新任务，为世界的和平和祖国的富强供献出我们一切的力量。"},{"type":"paragraph","text":"祝您"},{"type":"paragraph","text":"身体健康"},{"type":"paragraph","text":"太原炼铁厂炼钢部劳动模范王贵英、王殿英、马守金暨全体职工敬爱的毛主席："},{"type":"paragraph","text":"让我们向您报告咱们工厂的一个大喜讯："},{"type":"paragraph","text":"我们上海钢铁公司第一厂的××吨马丁炉，自从一九五○年六月大修以来，一直冶炼到现在，炉龄已经达到四百炉以上。这是从未有过的新纪录。"},{"type":"paragraph","text":"对于这个纪录，我们不敢自满。我们向您保证：我们一定要创造更高的纪录。我们坚决响应您的号召，在生产上发挥所有的力量，为建设强大的国防力量和经济力量而奋斗。"},{"type":"paragraph","text":"祝您"},{"type":"paragraph","text":"身体健康"},{"type":"paragraph","text":"上海钢铁公司第一厂全体职工"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"300673ce55"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
