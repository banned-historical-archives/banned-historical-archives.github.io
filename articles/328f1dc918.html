script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"章伯钧罗隆基谬论连篇这两个人的修正主义思想早已暴露　章伯钧曾经说“我就是机会主义者”","authors":["夏群"],"dates":[{"year":1957,"month":6,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报成都16日专电】　民盟四川省委副秘书长赵一明15日在中共四川省委统战部邀请民主人士帮助党整风的座谈会上指出，今年四月民盟中央召开的全国工作会议上，就已经出现了以罗隆基、章伯钧为首的修正主义思想的种种谬论。赵一明也曾认为，民主党派的地位可能发生相当大的变化，因此他到雅安市了解民盟工作时提出的意见，突出的强调了党和民主党派的平行地位和民主党派要参加国家的决策工作。他认为这些意见和章伯钧主张的“政治设计院”是一脉相通的。"},{"type":"paragraph","text":"从助手变成“敌手”"},{"type":"paragraph","text":"赵一明说他的一些看法，助长了四川农学院民盟支部某些人的错误思想，有的人已感到不仅不是党的助手，反而像党的“对手”，甚至是“敌手”。赵一明认为自己的修正主义思想，最近显得特别突出的原因，主要是在盟内受了这种思想的影响。他说，最近在民盟小组会议的讲台上出现的许多谬论，实际上在今年4月民盟中央召开的全国工作会议上就已经出现了。他说，那次会议由于强调反教条主义，因此有人借口来宣传和贩卖修正主义。他说，那次会议对知识分子问题作了错误的估计，过分的强调了知识分子的特点、强调对知识分子要“礼贤下士、三顾茅庐”，最典型的是以罗隆基为代表的认为今天知识分子的问题是“无产阶级的小知识分子和小资产阶级大知识分子工作的矛盾”，认为要像毛主席刘委员长周总理这些无产阶级的大知识分子才能作高级知识分子的工作。赵一明认为这一系列观点的主要错误，就是没有指出知识分子中接受党的领导，而要党去“三顾茅庐”；没有指出知识分子要深入进行思想改造，完全不恰当的强调了知识分子的所谓“优良”传统。"},{"type":"paragraph","text":"章伯钧主张发展盟员的鬼蜮用心"},{"type":"paragraph","text":"赵一明说，那次会议中对社会民主生活也反映了一些否定的意见，如章伯钧特别强调在生活问题上不仅要满足物质生活的要求，还要注意精神生活。言下之意，对几年来的民主生活感到不满足。赵一明还指出，那次会议在民主党派的工作上出现了许多没有原则的意见。罗隆基特别强调要把民主党派工作“摆正”。他所谓“摆正”，就是要使民主党派中央级的部长的一切待遇，要与国务院的部长一样，省级民主党派的部长，要与省人民委员会的厅长一样。章伯钧主张要在几年内使民盟发展到五十万盟员。并且说，他就是机会主义，一有机会就发展组织。章伯钧在向全体同志讲话中，还提到“周公辅成王”的故事，意思说几年来民主党派已经成熟，如果党再要像以往那样不放手，就会像苏联与南斯拉夫的关系一样。章伯钧甚至荒谬的说:“中国的民主党派只有两个是靠自己起家的，民盟靠走中间路线起家，农工民主党靠反共起家。”"},{"type":"paragraph","text":"他指出，民盟四川省主委潘大逵对于罗隆基的许多观点加以支持，他关于平分工作的意见，主要就是支持罗隆基的意见。(夏群)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"328f1dc918"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
