tart":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席用过的水桶和扁担","authors":["井冈山革命博物馆"],"parts":[{"type":"paragraph","text":"一九二八年六月，毛主席直接领导了井冈山革命根据地的武装斗争，在龙沅口取得辉煌胜利。随后，毛主席指示部队深入永新、莲花一带分兵以发动群众，建立革命根据地的坚实基础。毛主席亲自带领红四军三十一团三营来到了塘边村，深入进行调查研究，宣传、组织、武装群众，帮助群众建立红色政权。当时，毛主席住在贫农周香姬大娘家里，在繁忙的工作中经常帮助周大娘劈柴、挑水、扫院子，使塘边村的革命群众深受感动。这就是毛主席帮助房东周大娘挑水用过的水桶和扁担。"},{"type":"paragraph","text":"毛主席在井冈山地区给群众挑水用的桶、扁担。（照片）"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dc95d912dd"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
