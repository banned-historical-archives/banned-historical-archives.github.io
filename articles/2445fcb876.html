"https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives3/main/0b2f26ed-ad29-48e7-9c89-446932a97ab0.pdf"],"article":{"title":"要学外国的长处","alias":"","parts":[{"type":"paragraph","text":"心情舒畅、生动活泼，那样一种政治局面，以利于依靠人民群众的力量巩固无产阶级专政工会、共青团、红卫兵、红小兵、贫下中农组织、妇女组织，应当经过整顿逐步健全起来。各级领导机构要按照老中青三结合的原则，注意发挥老干部的作用，注意培养新干部，特别是要注意从工人中、从妇女中，从少数民族中培养干部，并努力帮助在职干部更快地提高理论水平和实际工作能力。不管老干部、新干部，军队干部、地方干部，都要虚心向群众学习，加强调查研究，坚持群众路线，全心全意为人民服务。"},{"type":"paragraph","text":"当前国际形势--片大好，整个世界在大动荡、大分化、大改组的过程中改变着面貌。各国人民的革命斗争正在深人发展。中、小国家更广泛地联合起来反对美苏两个越级大国的霸权主义和强权政治。苏修在全世界人民面前进一步暴露出它的社会帝国主义面目。不论苏修、美帝玩弄多少阴谋论计，都不能阻止国家要独立、民族要解放、人民要革命的历史潮流奔腾向前。在新的一年里，我们将继续贯彻执行毛主席的革命外交路线，进一步加强同社会主义国家的团结，坚决支持各国人民的革命斗争，在五项原则的基础上，争取和社会制度不同的国家的和平共处，为促进人类进步事业而努力。"},{"type":"paragraph","text":"最近，美帝国主义对越南民主共和国进行大规模的最炸袭击。对美帝国主义的这一侵略行径，中国人民表示极大的惯概和强烈的遗责。如果美国政府不立即停止轰炸，不签署“关于结束战争、恢复越南和平的协定”，坚持侵略战争，中国人民将一如既往，坚决履行自己的国际主义义务，全力支援越南人民的抗美救国战争。中国人民将继续坚定不移地支援老拉人民和东埔寨人民的抗美救国斗争。我们深信，胜利一定属于英雄的印度支那三国人民"},{"type":"paragraph","text":"在欢度新年的时候，我们对台湾省的骨肉同胞表示深切的关怀。我们一定要解放台湾。我们对港澳同胞表示怀念。我们对海外侨胞致以问候，祝愿他们为增进中国人民和各国人民的友谊作出更多的贡献"},{"type":"paragraph","text":"让我们在以毛主席为首的党中央领导下，团结起来，争取更大的胜利"},{"type":"paragraph","text":"要学外国的长处"},{"type":"paragraph","text":"（一九七三年二月二十六日）"},{"type":"paragraph","text":"周思来"},{"type":"paragraph","text":"最近我们出去了两个代表团。一个医学代表团在国外看了回来，不敢做报告，他们要做报告，有一个军代表说，不要把我们说得-一团漆黑。这么老大，随便给人家戴帽子，结果他们不敢讲了。这种风气不好，出去花了不少钱，回来连报告也不敢做。科学家代表团出国回来后，连一个报告都没有写出来，不敢谈人家的长处，也不敢谈我们的短处，这是不符合毛泽东思想的。有些人自己不懂，又随便给人家戴帽子。出国参观、考察，就是为了学习人家的长处。"}],"authors":["周恩来"],"dates":[{"year":1973,"month":2,"day":26}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":15,"page_end":15},"tags":[{"name":"周恩来","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"世界形势","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2445fcb876"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
