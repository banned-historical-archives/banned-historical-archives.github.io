],"dates":[{"year":1958,"month":6,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"宁蒗彝族自治县土地改革完成"},{"type":"paragraph","text":"两万六千多名奴隶变成土地主人"},{"type":"paragraph","text":"新华社昆明9日电　云南省小凉山上宁蒗彝族自治县用和平协商方式所进行的土地改革已在最近完成。"},{"type":"paragraph","text":"获得解放的两万六千多名彝族“娃子”（奴隶）变成了土地的主人，有些“娃子”是过去奴隶主用武力从各地抢上凉山的，在人民政府帮助下，有一千多人已回家和亲人团聚。每一个人都分得了三至五亩耕地。人民政府还帮助他们每人一套农具（锄头、砍刀等）、毯子、衣服、蓝布长头巾。妇女们得到了百折裙和针线。每家都得到了一整套锅盘碗盏、足够的粮食和食盐。每三家得到了一头耕牛。"},{"type":"paragraph","text":"得到解放的奴隶发挥了惊人的生产积极性。他们夜以继日地和其他的彝族人民一起兴修水利。在不到两个月的时间内，这个自治县就完成了可灌五万多亩耕地的水利工程，平均每人一亩多，超额完成了计划。他们还准备再修可灌几万亩田地的水利工程。过去小凉山上的彝族从不种水田，今年大种水稻，要求粮食亩产量由去年的一百二十斤提高到四百五十斤，每人收入粮食五百斤以上，基本上达到自给。"},{"type":"paragraph","text":"土改进行得早的地区，解放了的奴隶现在已有一万多人参加农场，二千多人加入了农业社。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"917b7e4290"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
