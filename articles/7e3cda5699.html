<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"毛泽东思想挂了帅　生产越干越有劲","authors":["孙禄英"],"dates":[{"year":1966,"month":9,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"上海国棉二厂五好工人　孙禄英"},{"type":"paragraph","text":"党的八届十一中全会号召我国广大群众努力学习毛泽东思想，进一步促进人的思想革命化，防止修正主义，防止资本主义复辟，永保无产阶级的铁打的江山。这真是说到我的心里了。要革命，就要思想革命化；要思想革命化，就要用毛泽东思想武装自己的头脑。这几年来，在党的培养下，我坚持学习毛主席著作。通过学习，觉悟有了提高，懂得了革命的道理。"},{"type":"paragraph","text":"我读毛主席的书，听毛主席的话，照毛主席的指示去做，越做越有劲，越想越高兴。毛主席的著作篇篇、句句、字字都把我心里照得亮堂堂的。我由衷地感谢亲爱的领袖毛主席，给我指出了后半辈子革命的光明大道。"},{"type":"paragraph","text":"这几年来，厂里进来了不少革命接班人，我真为她们生长在幸福的伟大的毛泽东时代而高兴。想想自己从十二岁开始，就在工头的木棒下熬着痛苦的日子，同她们现在比比，真是样样不如。她们能文能武，充满着革命朝气。我认为，今后搞社会主义革命和建设，就靠她们了，自己只要一心一意搞好生产算了。因此，当车间里发动大家提高纱的质量，要求练好技术基本功时，我想自己已到了年纪，手脚也硬了，怎么能赶得上这些“小老虎”?练了一阵，也提不高，想想有些灰心。这时，我学习了《愚公移山》，老愚公白发苍苍，敢于立下搬掉两座大山的雄心。自己为什么遇到一点小困难就畏缩不前?自己立不下壮志，到底是手脚发硬，还是思想上有毛病呢?想想自己是个共产党员，难道就在困难面前屈服了吗?这一下子，毛泽东思想把我的“病”根子照出来了，我不禁山了一身冷汗，警觉到再这样发展下去是非常危险的。不!我决不能萎缩不前，而要不断革命。毛主席教导我们:“你要知道梨子的滋味，你就得变革梨子，亲口吃一吃。”我想我一定要按照毛主席的指示，“下定决心，不怕牺牲，排除万难，去争取胜利。”我就虚心向技术高的同志学习粗纱包卷、细纱接头。夜班下来，清晨学；中班下来，半夜学，在同志们的帮助下，终于练好了基本功。在去年的十一个月中，接头没有出过白点，正是毛泽东思想挂了帅，生产越干越有劲。"},{"type":"paragraph","text":"要革命，也要把自己从家务束缚中解放出来。我有五个孩子，爱人长期请病假，经济也比较紧，家务千头万绪摆在面前，怎么办?我就去请教毛主席著作。毛主席说:“夺取全国胜利，这只是万里长征走完了第一步。……中国的革命是伟大的，但革命以后的路程更长，工作更伟大，更艰苦。”我想毛主席的话真对，我们要继续革命下去，一定要把革命工作放在第一位。在党组织和同志们的帮助下，我把家务作了妥善安排，保证有更多精力放在革命工作上。"},{"type":"paragraph","text":"今年年初领导上派我去新疆帮教技术，我也带着这样的心情去的。我同那边的小青年一起学习“老三篇”，从阶级教育着手，既提高她们的觉悟，又教会她们技术。在毛泽东思想光辉的照耀下，我们心连心，为了共同的革命目标，团结在一起，把工作做好了。"},{"type":"paragraph","text":"要离开新疆的日子越来越近，领导上交给我的任务，必须很快完成，但我突然病了，新疆的同志无微不至地关怀我，送我到医院。任务没有完成，我怎能安心住在医院里?当我重读《纪念白求恩》时，我再也耽不下去了，终于得到医生的许可，回到了车间。看到这些小青年热情地来迎接我时，我不觉高兴得眼泪夺眶而出。我完成了党交给我的任务，依依不舍地离开了这美丽富饶的边疆。这次去边疆，我又上了一堂生动的毛泽东思想教育的课。我亲眼看到了伟大的毛泽东思想在那边开花结果，看到了毛泽东思想的无穷威力。"},{"type":"paragraph","text":"我千句万句不忘一句:读一辈子毛主席的书，干一辈子革命。我要积极投入无产阶级文化大革命，横扫一切牛鬼蛇神，砸烂旧世界，创造新世界。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"新疆文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7e3cda5699"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
