,"赵燕士"],"dates":[{"year":1957,"month":5}],"is_range_date":false,"parts":[{"text":"赵燕士的右派言论","type":"title"},{"text":"山西赵燕士","type":"authors"},{"text":"(赵燕士:山西教育厅秘书、民进会员)","type":"subtitle"},{"text":"“我们厅里五位厅长都是党员，没有非党人士厅长，使旧知识分子有话没处说，假若有一个非党厅长。党外同志就可以很好的谈谈心。”主张“提拔党外人士担任领导干部的比重扩大”。“从中央到基层各种主要工作岗位上，各级领导干部党员负责正职，副职都应由非党人士来担任”。","type":"paragraph"},{"text":"“苏共二十次代表大会反对个人崇拜，是苏联共产党不民主的总暴露，这证明了我认为苏联政治上不民主，经济上平等。美英经济上不平等，政治上却民主的看法是对的”。又说：“匈牙利事件也是由于不民主而造成的”，还说：“中国党遵义会议前王明、博古不接受毛主席的意见，也是不民主”。甚至说：“思想改造、肃反都是不自由不民主”等等。","type":"paragraph"},{"text":"“党对旧知识分子不重视、不信任，甚至有打击排斥的现象。肃反就是党对知识分子不尊重不信任的一次大暴露。”“肃反丧失了知识分子的自尊心”。","type":"paragraph"},{"text":"一、支持储安平的“党天下”谬论说：“不管党天下言论如何，但实际上许多领导干部都是党员，从中央到地方各级国家机关领导干部中非党员都是少数，这是事实，问题就在于今后如何改进。”","type":"paragraph"},{"text":"二、对章伯钧支持说：“长期共存互相监督即和民主党派共同领导、平分秋色。”并说：“政治设计院、各民主党派轮流执政”没错。","type":"paragraph"},{"text":"“在提拔干部上。界限非常明显，在旧社会里是用人唯亲，裙带关系，一朝天子一朝臣，私人提拔等。但一个主官私人拉拢提拔的究竟还是少数，别人工作努力，仍可提拔；现在是另一个标准，就是党团员可以提拔，非党团员努力也不行”。","type":"paragraph"},{"text":"“统购、统销后，有饿死的人；公私合营后，物品质量低了，工人生产也不积极了”。","type":"paragraph"},{"text":"两点建议","type":"subtitle"},{"text":"党员是少数，又不便把非党同志提拔到主要工作岗位，这就必然影响非党同志的积极性。解决这个问题，我提两点建议：第一、党员条件应加以修改，应根据新的情况作新的变更。如参加工作在10年以上，是模范就可以吸收入党，一切历史、年龄、成分放在次要地位考虑。第二、在干部政策上，在各种主要工作岗位上应由党员负责，但非党员只要有工作能力也可以提拔，并应有职有权，这样来发挥大家的力量","type":"paragraph"},{"text":" 教育厅秘书  赵燕士","type":"paragraph"}],"comments":[],"origin":"《“鸣”、“放”选集（二）》（中共山西省委整风办公室编，1957年9月）。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"274c387377"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
