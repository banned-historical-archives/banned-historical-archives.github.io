ical-archives/banned-historical-archives0/main/maoquanji34.pdf"],"article":{"title":"关于部队中急待解决的问题的批语","alias":"","parts":[{"type":"paragraph","text":"关于部队中急待解决的问题的批语！"},{"type":"paragraph","text":"（1954年8月3日）少奇同志："},{"type":"paragraph","text":"此件似应在中央会议讨论作出决定。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"八月三日"},{"type":"paragraph","text":"[1]这是毛泽东在中央人民政府人民革命军事委员会副主席彭德怀1954年7月28日报告上写给刘少奇的批语。"},{"type":"paragraph","text":"[2]指彭德怀的报告。报告说：最近部队中存在几个急待解决的问题：（一）自三反运动以后，在一部分高级干部中，仍滋长着若干个人享乐、腐化堕落的恶劣现象。（二）1954年上半年，发生两件最严重的失密事件。（三）兵员太老，全军现80%的兵，都是参军3年以上的老兵。（四）下层干部的结婚限制，再不宜继续下去。"},{"type":"paragraph","text":"[3]中共中央政治局1954年8月27日会议决定：（一）关于在一部分干部中滋长着若干个享乐、腐化堕落的恶劣现象和严重的失密事件，必须开展适当的斗争和严格执行纪律，由军委在1954年冬或1955年春召开一次解放军全军党代表会议，提出讨论并做出决定。（二）关于兵员问题和下级干部的婚姻问题，待中央讨论兵役法时再行讨论。"}],"authors":["毛泽东"],"dates":[{"year":1954,"month":8,"day":3}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":193,"page_end":193},"tags":[{"name":"毛泽东","type":"人物"},{"name":"彭德怀","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c078341b7f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
