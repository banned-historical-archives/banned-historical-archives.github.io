<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中央复西北局关于伊斯兰教徒“朝罕”问题","authors":[],"dates":[{"year":1951,"month":5,"day":27}],"is_range_date":false,"parts":[{"text":"中央复西北局关于伊斯兰教徒“朝罕”问题","type":"title"},{"text":"西北局：","type":"appellation"},{"text":"西北局统战部五月十二日电悉。","type":"paragraph"},{"text":"伊斯兰教徒“朝罕”问题，如我们长期不允许，就会在这个问题上陷于被动。同意你们提出的主动地有计划、有控制地允许一部分人出去“朝罕”的办法，请你们先试办一次，以便取得经验。惟请注意下列各点。","type":"paragraph"},{"text":"（一）人数尽可能少一些。","type":"paragraph"},{"text":"（二）反革命分子、嫌疑分子、旧军官及土改地区之地主、恶霸分子不要去。","type":"paragraph"},{"text":"（三）每人所带费用，以够用为原则，过多的应加以适当的限制。","type":"paragraph"},{"text":" 中央","type":"paragraph"},{"text":"附：","type":"paragraph"},{"text":"西北局统战部对要求“朝罕”人的意见","type":"subtitle"},{"text":"（1951年5月12日）","type":"subtitle"},{"text":"中央统战部并转公安部：","type":"appellation"},{"text":"关于“朝罕”我们研究有如下意见：我们认为现在要求“朝罕”的人，多为地主旧军人（有些群众亦请求去但为数很少），这些人“朝罕”可能作一些反宣传，也可能与逃亡匪首马步芳、马步青取上联系，这是不好的一面，但另一面他们亦可能透露一些真实情况，如民族平等、团结互助，信教自由，同时我们可借此对近东信伊斯兰教各国取得一些联系，便利今后国际统战工作。因此，我们意见：虽不鼓励大家去“朝罕”，但应主动有计划的控制，坚决要“朝罕”的人，甚至派隐蔽力量，随同一块，去宣传政府信教自由，民族平等各种政策，并了解情况，以便利今后工作，以上意见是否有当，望复。","type":"paragraph"},{"text":" 西北局统战部","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e225bd1dcb"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
