ical-archives/banned-historical-archives0/main/maoquanji46.pdf"],"article":{"title":"关于注意我内部是否有苏联和蒋帮布置的人的批语","alias":"","parts":[{"type":"paragraph","text":"关于注意我内部是否有苏联和蒋帮布置的人的批语"},{"type":"paragraph","text":"（1964年1月28日）肖华、徐子荣同志："},{"type":"paragraph","text":"此件值得注意。我国军队、公安部队、机关中和社会上是否有被苏修布置的人，请你们研究一下。至于蒋匪帮是否有其布置的人，则更值得注意。谢富治同志如未外出，此件应请他看一下。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一月廿八日阅后退毛。"},{"type":"paragraph","text":"[1]肖华，当时任中国人民解放军总政治部副主任。徐子荣，当时任公安部副部长。"},{"type":"paragraph","text":"[2]指中国人民解放军总参谋部情报部1964年1月27日印发的《阿破获一叛国案简况》。简况中说：阿尔巴尼亚1963年8月侦破了一起叛国案，成员有一教授，国防部一中校、一大尉，一演员以及工程师、技术人员等共8人。据悉，该叛国集团的任务是为苏联提供情报，暗杀领袖。"},{"type":"paragraph","text":"[3]谢富治，当时任公安部部长。"}],"authors":["毛泽东"],"dates":[{"year":1964,"month":1,"day":28}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":224,"page_end":224},"tags":[{"name":"谢富治","type":"人物"},{"name":"肖华","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"56ced48d3e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
