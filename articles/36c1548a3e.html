<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"jfjb","name":"解放军报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"dates":[{"year":1965,"month":8,"day":3}],"page_start":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"一项义不容辞的政治任务守岛一连帮助民兵学习毛主席著作搞好战备","authors":["颜国庆"],"parts":[{"type":"paragraph","text":"本报讯 6732部队一连，根据当前形势的需要，进一步和岛上民兵密切协同，从思想上和军事技术上，帮助民兵做好战备工作，大大增强了守岛的战斗力。"},{"type":"paragraph","text":"最近，一连的同志联系当前形势，重温了毛主席有关人民战争思想的论述。大家进一步认识到：组织、教育和训练好民兵，搞好军民联防，就是搞好战备工作的一个重要组成部分，就是今后取得战争胜利的重要保障。全连干部战士都自觉地把搞好军民联防、帮助民兵训练，当作一项义不容辞的政治任务。"},{"type":"paragraph","text":"一连根据几年来学习毛主席著作、坚持四个第一、突出政治的经验，深刻体会到：要搞好军民联防，首先要把毛泽东思想传给民兵。在这个思想指导下，他们买了许多毛主席著作送给民兵，派了二、三十个优秀战士，去传学习毛主席著作、坚持四个第一、发扬三八作风的经验。最近，他们还派出三名教练员去帮助民兵搞战备训练。临走前，指导员董建华把他们召集起来，教育大家要根据民兵在战备中的活思想，活学活用毛主席著作，帮助民兵从根本上提高觉悟。一排副排长马岩苏到了民兵队，首先帮助民兵学习了毛主席关于人民战争的论述和《为人民服务》这篇文章。通过学习毛主席著作，民兵的觉悟有了很大的提高，进一步明确了为什么要当个好民兵的道理，站岗放哨和执行各种勤务更加积极了。"},{"type":"paragraph","text":"为了进一步加强民兵战备教育，一连还通过作报告、放电影、放幻灯和教练员讲评的形式，大力揭露美帝国主义和蒋匪帮的新阴谋，宣传越南人民反美爱国斗争的英勇事迹等。这就大大增强了民兵对美帝国主义的仇恨，提高了他们的革命警惕性。民兵叶贤兴，过去认为几个毛敌人象个跳蚤，顶不破被窝。经过形势教育以后，他的认识提高了。有几次，几个民兵因病或不在家，他就冒着风雨，主动出去巡逻潜伏、站岗放哨。"},{"type":"paragraph","text":"在加强教育，提高认识的基础上，一连从实战需要出发，扎扎实实帮助民兵训练。战士们和民兵一起察看地形、熟悉阵地和作战方案，进行夜间战斗演习；平时，一连还根据民兵的特点，利用农闲季节、雨天和早晚时间，帮助训练民兵。在一连的大力帮助下，岛上民兵和群众的训练都取得了很好成绩，涌现了大批神枪手，大大增强了军民联防的力量。  （颜国庆）"}],"alias":""},"tags":[{"name":"人民战争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"36c1548a3e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
