art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"波尔布特等同志由汪东兴副主席陪同前往纪念堂瞻仰毛主席遗容波尔布特和英萨利、温威等同志在毛主席坐像前默哀，并以柬埔寨共产党名义献了花圈","authors":[],"parts":[{"type":"paragraph","text":"新华社一九七七年九月二十九日讯 柬埔寨共产党中央委员会书记、民主柬埔寨政府总理波尔布特和由他率领的柬埔寨党政代表团，由中共中央副主席汪东兴陪同，今天上午前往毛主席纪念堂，瞻仰了毛泽东主席的遗容。"},{"type":"paragraph","text":"波尔布特同志和柬埔寨党政代表团成员英萨利、温威等同志，在毛主席坐像前默哀，并以柬埔寨共产党的名义献了花圈。花圈的缎带上写着：“敬献给伟大的英勇的坚强的中国共产主义战士、伟大的杰出的无产阶级国际主义战士、当代伟大的马克思列宁主义导师、柬埔寨人民崇高的伟大战友毛泽东主席”。"},{"type":"paragraph","text":"波尔布特同志等柬埔寨贵宾在毛主席坐像前默哀，并献了花圈。 新华社记者摄（照片）"}],"alias":""},"tags":[{"name":"汪东兴","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"867a4ba0ec"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
