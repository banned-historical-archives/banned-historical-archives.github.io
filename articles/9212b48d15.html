ical-archives/banned-historical-archives0/main/maoquanji48.pdf"],"article":{"title":"水调歌头·重上井冈山","alias":"","parts":[{"type":"paragraph","text":"水调歌头·重上井冈山凹"},{"type":"paragraph","text":"（1965年5月）久有凌云志，重上井冈山。千里来寻故地，旧貌变新颜。到处莺歌燕舞，更有潺潺流水，高路入云端。过了黄洋界2，险处不须看。风雷动，旌旗奋，"},{"type":"paragraph","text":"是人寰。"},{"type":"paragraph","text":"[1]重上井冈山，1965年5月下旬，毛泽东重上井冈山游览视察。22日，先后到黄洋界和茨坪。在茨坪居住期间，了解井冈山地区水利、公路建设和人民生活，会见了老红军、烈士家属、机关干部和群众。25日写了这首词。29日下山。"},{"type":"paragraph","text":"[2]黄洋界，井冈山五大哨口之一，另四个是八面山、双马石、朱砂冲、桐木岭。毛泽东全集第四十八卷"},{"type":"paragraph","text":"三十八年过去，弹指一挥间。可上九天揽月2，可下五洋捉鳖3，谈笑凯歌还。世上无难事，"},{"type":"paragraph","text":"只要肯登攀。"},{"type":"paragraph","text":"[1]三十八年过去，弹指一挥间，从1927年10月毛泽东率领秋收起义部队上井冈山，到这次重来，已经过去了38年，他却觉得只是弹一下指、挥一下手的短时间。"},{"type":"paragraph","text":"[2]九天揽月，九天，天的极高处。《孙子·形》：“善攻者，动于九天之上。”揽月，摘取月亮。唐李白《宣州谢楼饯别校书叔云》：“俱怀逸兴壮思飞，欲上青天览明月。”览同揽。"},{"type":"paragraph","text":"[3]捉鳖，喻擒拿敌人。元康进之《李逵负荆》第四折：“管教他瓮中捉鳖，手到拿来。”"}],"authors":["毛泽东"],"dates":[{"year":1965,"month":5}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":49,"page_end":50},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]},{"id":"bfe38dad-00f4-4779-9991-fa6a70bf11f1","name":"红旗一九七六年第一期","internal":false,"official":true,"type":"pdf","author":"《红旗》杂志编辑部","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives2/main/bfe38dad-00f4-4779-9991-fa6a70bf11f1.pdf"],"article":{"title":"水调歌头·重上井冈山","alias":"","parts":[{"type":"paragraph","text":"词"},{"type":"paragraph","text":"首水调歌头重上井冈山一九六五年五月"},{"type":"paragraph","text":"旌旗奋，久有凌云志，重上井冈山，"},{"type":"paragraph","text":"是人寰。千里来寻故地，"},{"type":"paragraph","text":"三十八年过去，旧貌变新颜。"},{"type":"paragraph","text":"弹指一挥间。到处莺歌燕舞，"},{"type":"paragraph","text":"可上九天揽月，"},{"type":"paragraph","text":"可下五洋捉鳖，更有潺潺流水，高路入云端。"},{"type":"paragraph","text":"谈笑凯歌还。过了黄洋界，"},{"type":"paragraph","text":"世上无难事，险处不须看。"},{"type":"paragraph","text":"只要肯登攀。风雷动，"}],"authors":["毛泽东"],"dates":[{"year":1965,"month":5}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":6,"page_end":6},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9212b48d15"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
