" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoistlegacy.de-1888","name":"第五届全国人民代表大会常务委员会关于成立最高人民检察院特别检察厅和最高人民法院特别法庭检察、审判林彪、江青反革命集团案主犯的决定","author":"第五届全国人民代表大会常务委员会","internal":false,"official":false,"type":"unknown","files":[],"article":{"title":"第五届全国人民代表大会常务委员会关于成立最高人民检察院特别检察厅和最高人民法院特别法庭检察、审判林彪、江青反革命集团案主犯的决定","dates":[{"year":1980,"month":9,"day":29}],"is_range_date":false,"authors":["第五届全国人民代表大会常务委员会"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"最高人民法院研究室，中华人民共和国最高人民法院特别法庭审判林彪江青反革命集团案主犯纪实，1-2","tags":[{"name":"黄火青","type":"主题/事件"},{"name":"江华","type":"主题/事件"},{"name":"江青","type":"主题/事件"},{"name":"林彪","type":"主题/事件"},{"name":"审判","type":"主题/事件"},{"name":"特别法庭","type":"主题/事件"},{"name":"特别检察厅","type":"主题/事件"}],"parts":[{"type":"title","text":"第五届全国人民代表大会常务委员会关于成立最高人民检察院特别检察厅和最高人民法院特别法庭检察、审判林彪、江青反革命集团案主犯的决定"},{"type":"subtitle","text":"一九八〇年九月二十九日第五届全国人民代表大会常务委员会第十六次会议通过"},{"type":"paragraph","text":"鉴于林彪、江青反革命集团案是特别重大案件，根据最高人民法院和最高人民检察院的建议，全国人民代表大会常务委员会特作如下决定："},{"type":"paragraph","text":"一、成立最高人民检察院特别检察厅，对林彪、江青反革命集团案进行检察起诉。"},{"type":"paragraph","text":"任命最高人民检察院检察长黄火青兼特别检察厅厅长，最高人民检察院副检察长喻屏、人民解放军总政治部副主任史进前为副厅长，马纯一、王文林、王芳、王振中、王瀑声、王耀青(女)、冯长义、曲文达、朱宗正、江文、孙树峰、李天相、沈家良、张中如、张英杰、张肇圻、孟庆恩、图们、钟澍钦、袁同江、敬毓嵩为检察员。"},{"type":"paragraph","text":"二、成立最高人民法院特别法庭，审判林彪、江青反革命集团案主犯。特别法庭设两个审判庭。"},{"type":"paragraph","text":"任命最高人民法院院长江华兼特别法庭庭长，人民解放军副总参谋长伍修权、最高人民法院副院长曾汉周、人民解放军总政治部副主任黄玉昆为副庭长，王文正、王志道、王战平、甘英(女)、史笑谈、宁焕星、司徒擎、曲育才、朱理之、任成宏、任凌云、刘丽英(女)、刘继光、许宗祺、严信民、苏子蘅、巫宝三、李明贵、李毅、吴茂荪、沈建、张世荣、张敏、范之、费孝通、骆同启、高朝勋、高斌、黄凉尘、曹理周、翟学玺为审判员。"},{"type":"paragraph","text":"任命曾汉周为第一审判庭审判长、伍修权为第二审判庭审判长。"},{"type":"paragraph","text":"三、 特别法庭公开进行审判，由各省、自治区、直辖市、各党派、各人民团体、国家机关、人民解放军派代表参加旁听。"},{"type":"paragraph","text":"四、 特别法庭的判决是终审判决。"}],"alias":""},"tags":[{"name":"江青","type":"人物"},{"name":"林彪","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ebc751cebe"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
