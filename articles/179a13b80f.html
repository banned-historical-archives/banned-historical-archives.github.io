[],"dates":[{"year":1974,"month":4,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　上海无线电七厂职工认真贯彻落实毛主席关于“绿化祖国”的光辉指示，在厂党委的领导下，在区园林部门的大力支持下，十几年来坚持为革命搞好绿化工作。特别是无产阶级文化大革命以来，他们建立了一套专业管理与群众护养相结合、绿化工作同爱国卫生工作相结合的制度，使绿化工作做得越来越好，改变了工厂的环境面貌。到目前为止，全厂绿化面积已达一万五千多平方米，种植各种乔木、灌木五千一百多株。"},{"type":"paragraph","text":"这个厂是生产半导体器件电子元件的厂，生产上工艺卫生要求比较高，需要防尘、防风砂，所以搞好绿化工作对于提高产品质量、促进生产发展有直接关系。厂党委对绿化工作非常重视，根据工厂的实际情况，把这一工作列入党委工作之内，并由厂革委会后勤组分工主管，配备适当的专业人员负责全厂的绿化工作，从组织上落实。他们还积极依靠群众搞好绿化工作。广大群众自觉爱护绿化，对一些不重视绿化工作或损坏绿化的不良倾向，群众自动贴出大字报、小评论，进行批评。这样，就在全厂职工中造成了以爱护绿化为荣、破坏绿化为耻的新风尚。此外，他们还把全厂划分成十三块绿化卫生区，由就近车间、组室分块包干，除草护养，负责保管，实行专业人员与群众管理相结合的方法，每次全厂开展爱国卫生大扫除时，也同搞绿化工作结合起来进行。"},{"type":"paragraph","text":"搞好了绿化，不仅改善了这个厂的环境，而且为职工提供了良好的学习和休息场地。"},{"type":"paragraph","text":"(本报通讯　员)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"179a13b80f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
