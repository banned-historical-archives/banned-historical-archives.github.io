" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji23","name":"毛泽东全集第23卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji23.pdf"],"article":{"title":"庆祝刘邓大军之胜利","alias":"","parts":[{"type":"paragraph","text":"庆祝刘邓大军之胜利凹"},{"type":"paragraph","text":"（1948年1月1日）"},{"type":"paragraph","text":"（一）庆祝你们突围东进之胜利；（二）庆祝十纵、十二纵在桐柏、江汉两区之胜利。2"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央起草的致刘伯承、邓小平电的主要内容。"},{"type":"paragraph","text":"[2]国民党军对大别山地区的围攻，采取密集靠拢、向心合击战术。刘、邓决定在内线进行小的战斗和游击战，打击和牵住敌人，邓小平率野战军前方指挥所和三个纵队坚持大别山区，采取“敌向内、我向外，敌向外、我亦向外，将敌牵到外线，以小部牵制大敌，以大部消灭小敌”的方针，积极打击和拖散敌人。由刘伯承率中原局及野战军后方机关及第一纵队在淮河以北、沙河以南地区展开，以第十、第十二纵队分别向桐柏、江汉两区展开，并于1947年12月6日、13日，分别成立江汉军区和桐柏军区，实现了刘、邓将淮河和汉水变成中原解放区的两条内河的计划。12月24日，刘邓东进部队一部攻克广济，待国民党军两个整编师来援时又跳出合击圈。东进部队在外线收复鄂东、皖西县城十余座，共歼灭国民党军1.1万余人。"}],"authors":["毛泽东"],"dates":[{"year":1948,"month":1,"day":1}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":489,"page_end":489},"tags":[{"name":"邓小平","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f016abef9a"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
