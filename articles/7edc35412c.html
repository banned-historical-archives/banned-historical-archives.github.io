","authors":[],"dates":[{"year":1961,"month":12,"day":24}],"is_range_date":false,"parts":[{"text":"甘肃省通渭县城关人民公社党委会对右派分子的处理意见","type":"title"},{"text":"自1960年12月2日至1961年12月21日","type":"paragraph"},{"text":"卷内共5件20页\t\t\t\t\t\t保管期限   永久","type":"paragraph"},{"text":"全宗号1\t\t\t\t\t\t\t归档时案卷号：4","type":"paragraph"},{"text":"关于右派份子处理的逐步意见","type":"subtitle"},{"text":"我社共有返乡的右派份子7人，现在家劳动改造的只有4人，其余3人自回家后不仅没参加劳动，受广大群众的监督教育并且常不归家，此时不在，因此表现无处可报，现在家4人的处理意见列于后：","type":"paragraph"},{"text":"孙效武，虽劳动不好，但没有其它事实，所以还是摘掉帽子继续加强教育进行思想改造。","type":"paragraph"},{"text":"王立轩，自回家后，一贯能遵守纪律，受群众的监督教育改造自己，据此经研究应摘掉帽子。","type":"appellation"},{"text":"孔令文，劳动一般，较能服从队上的领导，再没其它问题，因之这次还是摘掉继续加强思想教育。","type":"paragraph"},{"text":"田庆荣，据说在外处某地已摘了帽子。","type":"paragraph"},{"text":"除此外其他3人（田成兰，景吉昌，米尚义）目前还是查清下落，发现所属单位作研究处理，若最近回来者劳动一个时期再视其改造情况：","type":"paragraph"},{"text":"是否有当请指正.","type":"paragraph"},{"text":" 中共城关公社委员会。61.12.24","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7edc35412c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
