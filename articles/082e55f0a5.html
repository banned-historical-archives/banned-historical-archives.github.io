art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"中国馆受到热烈欢迎观众说人民公社好极了；许多人对毛主席表示敬意","authors":[],"parts":[{"type":"paragraph","text":"新华社开罗29日电 自世界农业展览会3月26日在这里公开展出以来，三天中，已经有六万多人参观了展览会的中国馆。"},{"type":"paragraph","text":"每天一早，就有大批参观者通过富有中国民族特色的拱门，拥入中国馆。晚上，当展览馆将近闭馆的时候，中国馆里仍挤满了成群的参观者。"},{"type":"paragraph","text":"中国馆的每一个部分都引起埃及公众和来自其他阿拉伯和非洲国家的参观者的很大的兴趣。品质优良的大米和小麦、人民公社的工业产品、人民公社的模型和黄河的主要工程特别受到人们的欢迎。"},{"type":"paragraph","text":"数以千计的观众在留言簿上写下了他们对中国农业的伟大成就和人民公社的优越性的衷心和热情的祝贺。他们写道：“中国馆是农业发展的光辉榜样。这种发展是成立了人民公社的结果。”“中国人民公社好极了。这是提高全体人民的生活水平的很好的合作制度。它使中国人民飞跃前进。”"},{"type":"paragraph","text":"许多人在参观了中国馆以后，谴责帝国主义对中国的诬蔑。一位观众写道：“我在中国馆所看到的事实，揭穿了西方帝国主义、特别是美国的宣传”。另一位观众写道：“中国人民的伟大发展使我感到惊奇。它消除了我从帝国主义那里听到的东西。”"},{"type":"paragraph","text":"许多人还对毛主席表示敬意。他们写道：“向中国建设的光辉成就的伟大创造者毛泽东致敬！”"},{"type":"paragraph","text":"前已报道，阿联总统纳赛尔曾在开幕日参观了中国馆。阿联政府的许多高级官员和最近在这里访问的许多国家的农业部长也都参观了中国馆。"}],"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"082e55f0a5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
