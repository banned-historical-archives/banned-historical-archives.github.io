script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"李金香： 批判我的贤妻良母主义","authors":["李金香"],"dates":[{"year":1950}],"is_range_date":false,"parts":[{"text":"李金香：批判我的贤妻良母主义","type":"title"},{"text":"李金香","type":"authors"},{"text":"我生长在东北极南部一个封建富农的家庭里，父母具有极刻苦、吝啬、检朴的性格，对于子女的教育，极为重视。我的母亲善于处理家务，把家庭整理得有条不紊，所以我从幼就养成对天伦之乐胜于一切的思想。以后我所受的教育，完全是帝国主义日本的教育。在当时，我并不感到这种教育是错误的，而一向认为它是对的。以前我认为男人无论在办事能力方面，智力方面，远远的高于女人，什么事情，女人都是做不好的。同时，女人侍奉男人也是应该的。因为女人的天性，是适合那些事情。又认为女人不应该读许多书，因为无论才智如何高出，在社会上也不能得到和男人同一的地位。女人惟一的道路，就是选择一个好丈夫，依靠自己的丈夫安分的过活，作一个贤妻良母就可以啦！我因此承认“女子无才便是德”“三从四德”的话是对的。我更认为女子在社会上的活动，只能在生小孩以前，如果生了孩子，就应该回到家里，好好的照顾孩子，不然在社会上又要工作，又要顾及家庭，弄得两方面都作不好。所以当我生了第一个孩子以后，马上就离开了我的教书工作，回到家庭里。我特别崇拜希特勒，因为他主张女人回到厨房里去，男女不应该平等。我的这些不正确的认识，完全是受封建的法西斯教育的影响。我入革大以后，我的思想是翻天覆地的起了变化。我知道了以前那些轻视妇女的观点，同样是统治阶级压迫劳动人民的手段。因为劳动妇女占劳动人民中的一半呀！就拿三从四德来说吧！它叫妇女一切要服从男子，不参加政治活动，减少被压迫的一半人民对统治阶级的反抗，更容易造成剥削阶级的统治。叫妇女回到厨房，是怕人民的力量增强起来，这就是统治阶级剥夺妇女权利的真面目。从前我对妇女错误的看法，是受了统治阶级的欺骗。原来男人和女人除了生理构造不同以外，其他如办事能力、智力等，根本就没有不同的地方。男人可以做的事情，女人同样可以去做。在苏联社会主义社会里，男女是平等的。只有在阶级社会里，男女才不平等，这是统治阶级造成的。阶级消灭了，男女不平等也就消灭了。中国今天的革命，是我们妇女翻身的时候，看吧！在解放区，由于封建阶级的消灭，女人有平分土地权。由于她们积极参加劳动，参加政治斗争，在共产党领导下，在经济上、政治上已有和男子一样的地位，而且她们也和男子一样涌现了很多战斗、支前的劳动英雄。妇女占人口中的一半，妇女不参加人民解放战争及新中国的一切建设事业，人类就不能澈底解放。同时妇女解放的问题，和劳动人民的解放是一致的。只有消灭了统治阶级，劳动人民都解放了，妇女也就解放了。我们应当和劳动男子团结起来，共同努力，将革命进行到底，澈底打倒三个敌人，建设新民主主义社会，最后达到共产主义理想的社会。那么现在我们参加了革命阵营，要作一个革命战士，就要克服过去盲目服从的奴隶思想。我要站在无产阶级的立场，用历史唯物主义、马列主义的科学理论，大胆来批判一切，自觉的服从人民群众利益，服从组织纪律。坚持真理，站在无产阶级的立场，坚强的进行斗争！","type":"paragraph"}],"comments":[],"origin":"《思想总结》大公报青年群编辑室辑，棠棣出版社，1950年。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"847ead971a"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
