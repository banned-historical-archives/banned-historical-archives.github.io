<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"柬中友协主席兰·涅特赞扬我国建设成就　中国人民在毛泽东思想基础上团结一致","authors":[],"dates":[{"year":1966,"month":7,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"柬中友协主席兰·涅特赞扬我国建设成就"},{"type":"paragraph","text":"中国人民在毛泽东思想基础上团结一致"},{"type":"paragraph","text":"据新华社金边十四日电　柬埔寨中国友好协会主席兰·涅特最近在一次报告中，赞扬中国人民在毛泽东思想的基础上建立的团结一致。"},{"type":"paragraph","text":"他说：中国的团结一致是无可置疑的。七亿中国人民都以毛泽东思想作为他们团结一致的基础。兰·涅特是在柬埔寨中国友好协会七月十日举行的座谈会上，就他率领的柬埔寨中国友好协会代表团在今年四月和五月访问中国的观感作报告的。柬中友协代表团的成员狄弟娜和胡荣也作了报告。"},{"type":"paragraph","text":"兰·涅特指出，中国的艺术在不断向前发展，他们一直在进行改革；最近进行了大规模的改革。中国人民根据毛泽东思想，对京剧进行了彻底的改革。长期以来，京剧被认为是碰不得的难以攻克的堡垒。"},{"type":"paragraph","text":"兰·涅特在讲话中赞扬了中国的经济建设。他说，我们看到，中国自从一九四九年解放以来，自从摆脱了帝国主义统治以来，还不到二十年，如果把中华人民共和国同欧洲国家相比，中国进步的速度是非常快的。中华人民共和国的经济已经不再是落后的。“只要稍稍注意一下它所作出的努力，在不久的将来，它肯定将非常迅速地前进，肯定将赶上和超过西方国家的进展。”"},{"type":"paragraph","text":"他还说，中国在核武器方面的发展表明中国已经是非常先进的。他又说：因为苏联停止供应中国的汽油，曾经造成了中国汽油供应上的困难。因此，中国根据毛泽东思想，自力更生的思想，自己努力勘探石油，他们终于找到了石油。现在，他们已经有了充足的石油。今后，他们还将发现更多的石油。"},{"type":"paragraph","text":"兰·涅特在谈到柬中两国的友谊时说，柬中两国的友谊是有悠久历史的永恒的友谊。最近，这种友谊发展得更加紧密了。他强调指出：“自从一九五三年完全独立以来，在国家元首、人民社会同盟主席和柬中友协名誉主席诺罗敦·西哈努克亲王英明领导下的柬埔寨王国，在毛泽东主席领导下的中华人民共和国，进一步发展了我们两国之间已经存在的友谊。”他说：“我们两国的友谊是永恒的友谊，就象长江和湄公河的流水常流不息。”"},{"type":"paragraph","text":"胡荣报告了参观中国工厂和人民公社的观感。"},{"type":"paragraph","text":"他说：人民公社在农村是极为重要的，社员们说，在困难时期，人民公社起了克服困难的极为重要的作用，并且经受住了一切考验。现在，不管谁去参观，谁都承认这一点。所到之处，猪肉、鸡和蔬菜都供应充足。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3c983d166c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
