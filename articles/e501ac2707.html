" crossorigin="">{"props":{"pageProps":{"books":[{"id":"05422d8e-4445-44ee-9b50-dcb1f49d143c","name":"唐岐山同志若干讲话","internal":true,"official":true,"type":"img","author":"唐岐山，复辟后“揭发”材料","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/05422d8e-4445-44ee-9b50-dcb1f49d143c/1.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/05422d8e-4445-44ee-9b50-dcb1f49d143c/2.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/05422d8e-4445-44ee-9b50-dcb1f49d143c/3.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/05422d8e-4445-44ee-9b50-dcb1f49d143c/4.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/05422d8e-4445-44ee-9b50-dcb1f49d143c/5.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/05422d8e-4445-44ee-9b50-dcb1f49d143c/6.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/05422d8e-4445-44ee-9b50-dcb1f49d143c/7.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/05422d8e-4445-44ee-9b50-dcb1f49d143c/8.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/05422d8e-4445-44ee-9b50-dcb1f49d143c/9.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/05422d8e-4445-44ee-9b50-dcb1f49d143c/10.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/05422d8e-4445-44ee-9b50-dcb1f49d143c/11.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/05422d8e-4445-44ee-9b50-dcb1f49d143c/12.png"],"article":{"title":"唐歧山在郑州市基层单位党委正副书记会议上的讲话（摘录）","alias":"","parts":[{"type":"paragraph","text":"误，是受邓小平修正主义路线影响。同志们要知道给一个省委定下犯方向路线错误，那可不是一件小事啊！当然对地、市委，对一些单位，问题有大有轻，要通过 摆事实讲道理来定性。同志们讲的，我不排除。"},{"type":"paragraph","text":"（根据记录整理）唐歧山三月二十七日在郑州市基层单位党委"},{"type":"paragraph","text":"正副书记会议上的讲话（摘录）"},{"type":"paragraph","text":"“现在有的领导同志由于没有端正对运动的态度，自己不好好学习，也不认真组织群众去学习，我们认为这是错误的。”"},{"type":"paragraph","text":"“要在认真学习的基础上，批判邓小平‘三项指示为纲”的修正主义纲领，批判“阶级斗争熄灭论’和“唯生产力论’，批判折中主义的诡辩论，并且联系我市的实际，.彻底揭发批判右倾翻案风。"},{"type":"paragraph","text":"“受了邓小平错误路线的影响，说了错话，办了错事的，责任在邓小平，希望你们带头揭，带头批，转好弯子。两条路线斗争的阵线已经大白，如果再不转弯子，就是对毛主席的态度问题，持续下去，就会犯新的错误。希望这些同志快转弯，转好弯。只有这样，才能取得反击右倾翻案风的主动权，回到毛主席的革命路线上来。我们认为，在这些同志中，大多数是好的，转的是快的，但是有些人有抵触情绪，个别人甚至持反对态度。希望有关党的组织帮助他们转变立场，端正态度，积极投入到这场运动中来。”"},{"type":"paragraph","text":"“当前要警惕有人在那里挑动群众斗群众，以破坏生产来破坏革命，以经济主义转移斗争的大方向。”"},{"type":"paragraph","text":"（按当时的记录稿摘录）唐歧山同常建立同志的几次话（摘录）第一次， （三月二十三日早上七点半唐歧山家里）常，唐师傅，今天静坐三天了。唐，谁叫你们坐的？常，是马志昌。常，张永和的问题怎么样？"},{"type":"paragraph","text":"唐，张永和我不知道，过去市委定的小范围帮助，以后为啥抓了，我就不清楚了过去糊里糊涂抓了，现在还能稀里糊涂放，必须得有材料，以后谁也推不翻。铁路上的邢、李、王问题也没有解决嘛！"},{"type":"paragraph","text":"常，那现在既然坐下来了，怎么办？唐，回来我给省委说一下，看能不能给个梯子叫您下来。现在坐下来不好起了1常：那我们就等吧？唐：唤!第二次：（三月二十七日早上，唐歧山家里）常。唐师傅，张永和的问题怎么样了，啥时候能放？公安局已同意送饭了"},{"type":"paragraph","text":"唐。现在不能放，一放就爆炸了，只能冷放，不能热放，省委已同意调查解决。还有很多工作要作，你们先回去吧！"},{"type":"paragraph","text":"曹德贵，那过去没有调查清楚为啥抓人呢？唐；你问我，我问谁？抓，我也不知道么！第三次：（三月三十日，唐歧山家)常，·张永和能不能放？"},{"type":"paragraph","text":"唐：你们不是看着的吗？公安局、法院都汇报了情况，记者也跟着的，材料已报上去，等着吧！"},{"type":"paragraph","text":"常，我们厂的问题怎么办?"}],"authors":["唐岐山"],"dates":[{"year":1976,"month":3,"day":27}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":5,"page_end":5},"tags":[{"name":"邓小平","type":"人物"},{"name":"两条路线斗争","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e501ac2707"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
