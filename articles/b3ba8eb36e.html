,"dates":[{"year":2001,"month":4,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"韩执政党谴责日右倾言论"},{"type":"paragraph","text":"各社会团体呼吁抵制日货"},{"type":"paragraph","text":"据新华社汉城4月15日电 （记者高浩荣）韩国执政的新千年民主党发言人15日谴责日本政界要人关于历史教科书和向朝鲜半岛派兵等问题上的右倾言论，并要求政府对此采取强硬措施。"},{"type":"paragraph","text":"据此间媒介报道，出马竞选日本自民党总裁的日本行政改革相桥本龙太郎、前厚生相小泉纯一郎、经济财政相麻生太郎和自民党政调会长龟井静香12日举行联合记者招待会时都表示，日本文部科学省此次审定通过的历史教科书“没有问题”。14日，龟井静香还表示，在驻韩美军遭到武力攻击时，日本将行使集体自卫权，向朝鲜半岛派遣自卫队。"},{"type":"paragraph","text":"新千年民主党发言人说，日本政要错误的历史观“令人失望、愤怒和忧虑”。龟井静香的讲话“全面违反了日本的现行宪法”，“反映了日本右倾化的现象”。他表示，该党将与国民一起谴责这些言论。"},{"type":"paragraph","text":"新华社汉城4月14日电 （记者高浩荣）韩国各地的社会团体14日举行多种活动，抗议日本历史教科书歪曲史实。"},{"type":"paragraph","text":"在首都汉城，40多个社会团体14日举行集会，抗议日本审定通过歪曲历史的教科书，批评刚出笼的教科书是“日本右倾化的产物”。抗议者呼吁市民抵制日本文化和日本商品，他们还在集会上烧毁了日本香烟和日本产的学习用品等。韩国佛教会当天在汉城市内的10多个地方开展签名运动，要求日本重新修改历史教科书。"},{"type":"paragraph","text":"在南部城市光州市，4个社会团体14日举行抗议日本歪曲史实的历史教科书的集会。与会者说，日本不仅不反省过去的战争罪行，反而歪曲历史，这是对韩国国民的嘲弄。他们散发的传单呼吁民众不听日本歌曲，不看日本电影，不买日本商品。在庆尚南道和庆尚北道的一些城市，许多社会团体也分别举行了抗议日本历史教科书的签名运动和抵制日货的活动。（附图片）"},{"type":"paragraph","text":"4月14日，韩国群众在汉城举行集会，抗议日本审定歪曲史实的历史教科书。图为参加集会的群众高呼抗议口号。新华社发"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b3ba8eb36e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
