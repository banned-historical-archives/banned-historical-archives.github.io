art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"深入“八个问题”学习领会毛泽东思想","authors":[],"parts":[{"type":"paragraph","text":"高级防校系统检查学习效果"},{"type":"paragraph","text":"本报讯 高级防空学校为了在“八个问题”的学习中，进一步贯彻以毛泽东思想为指针，各学习小组普遍阅读了解放军报2月26日“深钻毛主席关于社会主义革命和建设的理论”的报道，在思想上进一步明确了学习“八个问题”，就是学习毛泽东思想。"},{"type":"paragraph","text":"根据上述指导思想，学校召开一系列会议，研究了具体贯彻的各种措施。学习指导小组对已进行的三个课题的学习效果做了检查。政治教研室召集各队教员汇报了学习情况，检查了教学内容是否贯彻了以毛泽东思想为指针；在教学方法上是否掌握了重点深透的原则。学员三队召开了支委扩大会，讨论了贯彻毛泽东思想、抓重点等问题。从检查的结果来看，总的来说学习是贯撤执行了以毛泽东思想为指针的要求，如四队在组织第一课题学习中，着重钻研总路线是一条创造性的马克思列宁主义的路线，是毛主席创造性的把马克思列宁主义的普遍真理和中国革命实践相结合的伟大产物。他们在阅读文件上，也十分重视学习毛主席著作。但是也有的单位在贯彻这一指导思想方面，还不够十分明确。"},{"type":"paragraph","text":"为了更好地贯彻执行以毛泽东思想为指针进行学习，学校领导上进一步加强了思想指导和理论指导。引导大家深钻毛主席关于社会主义革命和社会主义建设的理论；关于过渡时期阶级斗争的理论；关于群众运动的理论；关于国防建设和人民战争的理论；等等。他们还强调要通过学习，提高共产主义觉悟，树立无产阶级的共产主义世界观。"},{"type":"paragraph","text":"装甲兵注意抓重点问题"},{"type":"paragraph","text":"本报讯 为了在“八个问题”学习中，深入学习毛泽东思想，装甲兵政治部采取了具体措施。"},{"type":"paragraph","text":"他们最近召开了宣教工作会议，认真传达了总政治部宣传部2月23日电话会议的精神，统一认识，进一步明确以毛泽东思想为指针，以提高共产主义觉悟为目的的指导思想，使全体干部集中精力，深钻毛主席关于社会主义革命和社会主义建设的理论。同时，他们根据一些单位的学习情况，提出了深入学习的重点问题。有的单位提出，要深入学习“总路线是一条创造性的马克思列宁主义的路线”和“树立共产主义世界观”这两个问题。有的单位提出要深入学习社会主义社会的过渡性质，共产主义的远大前途，不断革命论和革命发展阶段论等问题。学习中要求精读毛主席的“关于正确处理人民内部矛盾的问题”，刘少奇同志的“马克思列宁主义在中国的胜利”，周恩来同志的“伟大的十年”，林彪同志的“高举党的总路线和毛泽东军事思想的红旗阔步前进”等文件；还要求阅读周扬同志2月7日在中华全国学生第十七届代表大会上的报告“目前形势和共产主义教育问题”等文章。目前，装甲兵各部队正在深入“八个问题”的学习，深刻领会毛泽东思想。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"人民战争","type":"主题/事件"},{"name":"人民内部矛盾","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b46b4dba12"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
