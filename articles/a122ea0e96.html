script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"周恩来同志提出批极左思潮","authors":[],"dates":[{"year":1981,"month":7,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"周恩来同志提出批极左思潮"},{"type":"paragraph","text":"1971年9月，毛泽东、周恩来同志机智地粉碎了林彪反革命集团的叛变。周恩来同志在毛泽东同志支持下主持中央日常工作，使各方面的工作有了转机。特别是在落实干部政策和各项经济政策方面，收到一定效果。1972年1月10日，召开了追悼陈毅同志大会。4月24日，《人民日报》发表《惩前毖后，治病救人》社论，强调经过长期革命斗争锻炼的老干部是党的宝贵财富。经济工作方面，强调贯彻按劳分配、实行必要奖励制度；在农业中提出不要把党的方针所提倡和允许的多种经营，当作资本主义倾向来批判；在工业中要求重视产品质量，重视发挥老工人和技术人员的作用。10月1日，《人民日报》、《红旗》杂志、《解放军报》联合发表国庆社论：《夺取新的胜利》，号召加快社会主义建设步伐，要求大家为革命事业学文化和技术等。"},{"type":"paragraph","text":"在这个期间，周恩来同志鉴于林彪反革命集团的破坏和极左思潮、无政府主义流毒对实际工作的影响，提出要批判极左思潮的意见，这实际是1967年2月前后许多中央领导同志要求纠正“文化大革命”错误这一正确主张的继续和发展。1972年8、9月，周恩来同志曾两次讲话指出，左的不批透，右的还会来；并针对一些单位的情况说，极左思潮不批透，你们就没有勇气贯彻毛主席的革命路线。10月14日，《人民日报》根据周恩来同志意见发表了批极左的三篇文章，其中主要一篇署名龙岩，题为《无政府主义是假马克思主义骗子的反革命工具》。这篇文章斥责了林彪以及江青、张春桥、姚文元所鼓吹的形形色色极左论调，受到全党同志热烈欢迎，但江、张、姚大为恼火，假借上海工人意见，攻击这篇文章是大毒草。毛泽东同志也错误地认为当时的任务仍然是反对“极右”，把周恩来同志的正确意见否定了。随后，《人民日报》内部还开展了批“右倾回潮”的运动，把矛头指向周恩来同志。这样就使党内左倾错误不但得不到纠正，而且继续发展了，林彪、“四人帮”煽动起来的无政府主义的极左思潮更加滋长泛滥。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a122ea0e96"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
