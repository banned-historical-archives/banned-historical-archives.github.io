script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"汽轮机锅炉研究所两派长期“内战”，所里无政府主义思潮泛滥，　阶级敌人大刮右倾翻案妖风。革命派战士来信问——难道背后就没有黑手在挑动么?!","authors":[],"dates":[{"year":1968,"month":6,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编辑同志:"},{"type":"paragraph","text":"毛主席教导我们:“在工人阶级内部，没有根本的利害冲突。”而我所在去年九月实现革命大联合后，到今年二月又分裂成两派，至今“内战”不停。现在所门口挂着两块牌子，一个挂“革委会”，另一个挂“革筹会”，各搞各的活动。所里所以形成这种局面，是由于两派中的某些头头资产阶级派性发作的结果，他们打“内战”劲道十足，可就是不愿联合起来抓对敌斗争。正在两派忙于“内战”的时候，所里的走资派和牛鬼蛇神大刮右倾翻案妖风。有的牛鬼蛇神反攻倒算，说过去革命群众斗他是错了。可是，有些头头却对此视而不见。最近，两派协商解决革委会问题，但有的头头“私”字当头，争名额，老是谈不成。革命群众实在看不惯，他们说，这些头头到底是革命第一，还是名额第一?"},{"type":"paragraph","text":"由于头头不认真抓革命，促生产，所里无政府主义思潮泛滥，有下棋，打扑克，养鱼弄花，有打毛线，捉鱼，养鸡，养鸭。上班时间有的睡觉，有的带小孩，有人干脆谈恋爱。所里每天有不少人借“出差”为名外出游玩，花了大量出差费。科室大批人员脱产，闲得无聊。所的科研工作基本上处于瘫痪状态。"},{"type":"paragraph","text":"看到所里这些情况，我们十分痛心。我们要问两派中的某些头头，你们背离毛主席的伟大战略部署，不牢牢掌握革命斗争的大方向，不抓革命，不促生产，你们到底要把群众带到那里去?你们不肯实行革命的大联合，大打“内战”的行为，不正是使亲者痛、仇者快，恰恰迎合了阶级敌人的需要吗?我们要问:所里长期“内战”，难道背后就没有黑手在挑动么?!希望你们提高警惕，不要被阶级敌人蒙住眼睛，被敌人牵着鼻子走上邪道去。"},{"type":"paragraph","text":"我们迫切要求两派头头，斗私批修，以革命大局为重，进一步从思想上联合起来，巩固革命大联合和实现革命三结合，狠抓阶级斗争，把破坏革命大联合、三结合的黑手和隐藏在革命队伍里的阶级敌人统统揪出来，斗倒批臭，把革命、生产、工作推向前进。"},{"type":"paragraph","text":"一机部汽轮机锅炉研究所"},{"type":"paragraph","text":"革命派十战士"},{"type":"paragraph","text":"调查附记:汽轮机锅炉研究所的无政府主义发展到了惊人的地步，这种情况岂能允许长期存在?"},{"type":"paragraph","text":"凡是“内战”长期不停的单位，十之八九有阶级敌人在捣鬼、破坏。汽轮机锅炉研究所的右倾翻案黑风刮得很严重，表明敌人嚣张得很。这也说明，研究单位决不是“世外桃源”，不狠抓阶级斗争，不主动向敌人发动进攻，敌人就要来搞垮我们。希望汽轮机锅炉研究所的革命群众组织的头头们，清醒地看到这一点，赶紧团结起来，共同对敌，在抓革命、促生产方面立新功。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"派性","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"890b6231f8"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
