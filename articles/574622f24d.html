ical-archives/banned-historical-archives0/main/maoquanji27.pdf"],"article":{"title":"在《中国人民政治协商会议共同纲领》起草过程中的批语","alias":"","parts":[{"type":"paragraph","text":"在《中国人民政治协商会议共同纲领》起草过程中的批语！!"},{"type":"paragraph","text":"（1949年9月）乔木："},{"type":"paragraph","text":"纲领共印三十份，全部交我，希望今晚十点左右交来。题应是《共同纲领》。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"九月三日你应注意睡眠。"},{"type":"paragraph","text":"[1]毛泽东对《中国人民政治协商会议共同纲领》草案作过多次修改，写了一些批语，这些文献资料没有全部保存下来。这里选入的5次批语，只是一个侧面的反映。"},{"type":"paragraph","text":"[2]乔木，即胡乔木，当时任毛泽东的秘书。这5次批语都是写给他的。在《中国人民政治协商会议共同纲领》起草过程中的批语"},{"type":"paragraph","text":"二乔木："},{"type":"paragraph","text":"今\"晚付印的纲领，请先送清样给我校对一次，然后付印。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"即"},{"type":"paragraph","text":"三即刻付印，一小时内交我。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"四照此改正，印成小册子一千本。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"九月六日[1]指1949年9月3日。"},{"type":"paragraph","text":"[2]指经毛泽东1949年9月6日修改的《中国人民政治协商会议共同纲领》草案，修改的底本是纲领草案（1949年9月5日，初稿）铅印件。毛泽东全集第二十七卷"},{"type":"paragraph","text":"五乔木："},{"type":"paragraph","text":"即刻印一百份，于下午八时左右送交周副主席“。但不要拆版，侯起草小组修正后，再印1000份。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"九月十一日下午四时半"},{"type":"paragraph","text":"[1]指周恩来，当时受中共中央委派主持起草《中国人民政治协商会议共同纲领》。"}],"authors":["毛泽东"],"dates":[{"year":1949,"month":9}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":207,"page_end":209},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"574622f24d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
