script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"“泰国人民之声”揭露美国—他侬集团残酷压迫和剥削人民的罪行　号召人民在泰共领导下团结起来坚持人民战争  把美帝国主义驱逐出泰国，推翻他侬卖国集团反动统治，建立一个人民的新泰国","authors":[],"dates":[{"year":1969,"month":12,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"“泰国人民之声”揭露美国—他侬集团残酷压迫和剥削人民的罪行"},{"type":"paragraph","text":"号召人民在泰共领导下团结起来坚持人民战争"},{"type":"paragraph","text":"把美帝国主义驱逐出泰国，推翻他侬卖国集团反动统治，建立一个人民的新泰国"},{"type":"paragraph","text":"新华社二十七日讯　“泰国人民之声”电台二十四日广播一篇文章说，在美国—他侬集团的残酷压迫和剥削下，泰国人民的生活日益困苦。文章号召泰国人民团结起来，在泰国共产党的领导下，坚持人民战争，把美帝国主义驱逐出泰国，推翻他侬卖国集团的反动统治，建立一个人民的新泰国。"},{"type":"paragraph","text":"文章说，由于美国—他侬集团只顾剥削人民，不顾人民的生活，全国水利长年失修，各种自然灾害连续不断地在泰国各地发生。仅今年七月底到十一月底，泰国全国七十一个府中就有四十多个府遭受水灾，数十万农民倾家荡产，饥寒交迫。"},{"type":"paragraph","text":"文章说，美国—他侬集团还以各种借口，疯狂抢夺农民的土地修建军事基地、战略公路和囚禁人民的“集中营”。他侬当局供认，全国百分之八十五以上的农民都没有自己的谋生土地或土地不足。几乎每户泰国农民都负有债务，债息高达百分之一百到三百。"},{"type":"paragraph","text":"文章说，除了占人口多数的农民生活日益困苦外，泰国各阶层人民的生活现在也十分困难。物价不断飞涨，人民的实际收入减少。"},{"type":"paragraph","text":"文章还说，美国—他侬集团还野蛮地逮捕和屠杀人民。这个反动集团已经把人民的民主权利剥夺殆尽。"},{"type":"paragraph","text":"文章指出，哪里有压迫，哪里就有反抗。泰国爱国的人们对美帝国主义的侵略行径和他侬—巴博集团的卖国、压迫和剥削罪行再也不能容忍下去了，因此，他们在泰国共产党的领导下，拿起枪杆子，同美国—他侬集团进行坚决的斗争。"},{"type":"paragraph","text":"文章说，泰国人民的武装斗争正在不断发展扩大，形势非常有利于泰国人民。最后的胜利一定属于泰国人民。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"人民战争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d24ebd301a"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
