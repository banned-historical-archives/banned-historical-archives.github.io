<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"按照毛主席的革命路线管好购销点——江西省崇仁县礼陂公社洋陂大队贫下中农管理购销点的几点经验","authors":[],"dates":[{"year":1969,"month":4,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"按照毛主席的革命路线管好购销点"},{"type":"paragraph","text":"——江西省崇仁县礼陂公社洋陂大队贫下中农管理购销点的几点经验"},{"type":"paragraph","text":"江西省崇仁县礼陂公社洋陂大队，是一个方圆四十多华里的深山沟。全大队有四个生产队，一百三十四户，六百多人口，分散居住在二十个村庄里。过去，社员买一支线，打五分钱酱油，都要往返三十里路，爬一百一十二个坡岭，耽搁一天工，到礼陂街上去买。山里盛产木材、毛竹、木炭、香菇、冬笋、草纸、毛边纸，年产值可达四万多元。因为没有人进山收购，有些物资就积压浪费了。贫下中农说：“山坑里的人买根针，好比唐僧去取经；山坑里的宝，卖不出去等于草。”"},{"type":"paragraph","text":"一九五七年，供销社在这里设了一个下伸点。由于叛徒、内奸、工贼刘少奇反革命修正主义路线的毒害，这个下伸点脱离政治、脱离群众的经营作风相当严重，群众意见很大。一九六○年，供销社便把这个下伸点撤销了。"},{"type":"paragraph","text":"一九六六年下半年，无产阶级文化大革命的东风吹进了深山沟。洋陂大队贫下中农满腔怒火地起来痛批大叛徒刘少奇及其在商业部门的代理人所推行的反革命修正主义路线。贫下中农在毛主席的无产阶级革命路线指引下，在洋陂大队办起了一个由贫下中农管理的购销点。"},{"type":"paragraph","text":"这个购销点只有一个售货员，是由贫下中农推选出来的。购销点的货从国家来，价由国家定，钱由国家管，牢牢掌握社会主义商业的经营方向。"},{"type":"paragraph","text":"购销点一切从方便贫下中农出发，实行了“三边”、“三串”、“三开”的新制度。"},{"type":"paragraph","text":"“三边”，就是一边宣传毛泽东思想，一边参加集体生产劳动，一边供应生活日用品，收购土特产。两年多来，售货员挨家挨户给贫下中农送去了毛主席画像和《毛主席语录》。平时，售货员卖完货，就和社员们一块学习毛主席语录，读“老三篇”，成为毛泽东思想的宣传员。两年多来，这个购销点的售货员参加集体生产劳动达三百四十多个劳动日，成为新型的亦商亦农售货员。此外，售货员还帮助社员带信、发信一千二百多封，带送报纸七千五百多份，也是一个义务邮递员。"},{"type":"paragraph","text":"“三串”，就是挑着货郎担串队、串村、串户，把货送到田边、灶头。售货员手头缺货，社员还可以预约购买。一次村里来了卖肉担子，售货员就挑一担酱油跟在后面，社员买了肉，正好买酱油。广大贫下中农高兴地说：“购销点为我们考虑得真是太周到了。”两年多来，售货员顶风冒雨，翻山越岭，挑着货郎担串村串户，共走了三万多里，满足了群众生产和生活上的需要。"},{"type":"paragraph","text":"“三开”，就是固定地点，每天早上、中午、晚上开门营业，便于社员利用出工前、收工后的空闲时间购买东西，不耽误生产。贫下中农都一致称赞购销点“办得顶好”，“买东西方便”，亲热地叫它是“作田人的店”。"},{"type":"paragraph","text":"毛主席教导我们：“要认真总结经验。”总结这个购销点的经验，概括起来，是“三要”。"},{"type":"paragraph","text":"第一，要始终突出无产阶级政治，从政治上加强对购销点的管理，坚持社会主义经营方向。洋陂大队管理小组，由大队革委会副主任、民兵连长、妇女主任和贫下中农代表等七人组成。它的主要任务是加强对购销点的政治思想领导；听取社员意见，改进购销工作；对购销点业务活动实行监督和管理。至于购销点的财务、资金、物价和购销调存，则全部由公社购销站统一管理，统一领导。公社购销站对大队购销点实行“三定”：定流动资金，定合理损耗，定期收款对账，并给适当的经营手续费。物资分配和供应的原则是勤拨少拨，方便群众。土特产收购则要求就地加工，就地包装，快收快调，直线运输。这样，就把大队的生产、消费完全纳入国家计划的轨道。"},{"type":"paragraph","text":"第二，要抓好亦商亦农售货员的政治思想工作，狠抓人的思想革命化。毛主席教导我们：“政治工作是一切经济工作的生命线。在社会经济制度发生根本变革的时期，尤其是这样。”洋陂大队购销点是在激烈的两个阶级、两条道路、两条路线斗争中产生的。大队革命委员会十分重视对售货员进行两条路线斗争教育。每次学习，都吸收售货员参加，一道以“老三篇”为座右铭，斗私批修，一道学习党内两条路线斗争史，一道开展革命大批判，用毛泽东思想武装头脑，狠批大叛徒刘少奇所推行的“三自一包”、“四大自由”、“工分挂帅”、“物质刺激”等反革命修正主义黑货和他的反革命修正主义商业路线，划清了毛主席的革命路线和刘少奇反革命修正主义路线的界限，进一步提高了售货员贯彻执行毛主席无产阶级革命路线的自觉性。"},{"type":"paragraph","text":"第三，要妥善解决亦商亦农售货员的收入问题。两年来，洋陂大队购销点的售货员是一半时间营业，一半时间参加集体生产劳动，卖货到那个生产队，就在那个生产队劳动，年终分配的时候，所做劳动工分和所得的手续费，统统拨归大队，售货员按中上劳动力标准，在大队参加分配。这样做，国家不要发工资，集体也不增加负担，本人生活水平不降低，群众也满意。"},{"type":"paragraph","text":"由于贫下中农对购销点从政治思想上加强管理，因而取得了显著的成果。两年多来，这个购销点的售货员突出了无产阶级政治，全心全意为贫下中农服务，不但解决了社员购买日用品的困难，而且大大地促进了大队农、林、副业的发展，扩大了国家收购量，支援了社会主义工业建设，增加了社员的收入。去年，仅小山竹、笋壳、木柴、废品等四个收购项目，就使集体和社员的收入增加了一万多元。"},{"type":"paragraph","text":"江西抚州专区革委会财贸组"},{"type":"paragraph","text":"崇仁县革委会财贸组"},{"type":"paragraph","text":"崇仁县礼陂公社革委会"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"江西文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d9b52b6307"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
