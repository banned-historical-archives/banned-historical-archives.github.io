ical-archives/banned-historical-archives0/main/maoquanji31.pdf"],"article":{"title":"对山东军区第二届生产会议情况报告的批语","alias":"","parts":[{"type":"paragraph","text":"转发西康军区关于三反的"},{"type":"paragraph","text":"紧急指示的批语"},{"type":"paragraph","text":"（1952年1月10日）"},{"type":"paragraph","text":"此件\"很好。真是雷厉风行，没有拖泥带水。发给各大军区及志愿军参考。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一月十日"},{"type":"paragraph","text":"[1]指中共西康军区委员会1952年1月6日关于开展三反的紧急指示。指示要求：（一）团以上机关必须在5天内发动起群众，用7天时间进行民主检查（即个人坦白，群众检举和组织检查），5天做好结束工作；连队则3天发动起群众，5天进行民主检查，3天做好结束工作。（二）改变平时工作方法，大张旗鼓，雷厉风行，集中力量进行三反斗争，整编工作一律暂缓。（三）各军、分区、军直、教导团等3天一次向军区作报告。（四）三反运动是当前压倒一切的工作，各级组织务必大胆放手发动群众，依靠群众，绝不允许拖泥带水，敷衍了事，要在一月份内做出显著成绩，彻底解决问题。"}],"authors":["毛泽东"],"dates":[{"year":1952,"month":1,"day":10}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":256,"page_end":256},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"40086437c1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
