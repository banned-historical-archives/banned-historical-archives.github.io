:["山西师范学院","汪子云","田雨翔"],"dates":[{"year":1957,"month":5}],"is_range_date":false,"parts":[{"text":"右派言论——“不要马列主义”","type":"title"},{"text":"山西师范学院汪子云田雨翔","type":"authors"},{"text":"汪子云（山西师范学院教授、九三学社社员）：","type":"paragraph"},{"text":"“不要马列主义，不学马列主义照样能把古典文学学好，我就不学马列主义”。","type":"paragraph"},{"text":"田雨翔（山西师范学院教授、民盟省筹委组织部长）：","type":"paragraph"},{"text":"“马列主义有什么学头，不过就是那几条，由人家（指我们）变，今天左，明天右，奇妙莫测；我只晓得庄子哲学，进攻之先，退避三舍，观察动静，再向前攻”。","type":"paragraph"},{"text":"“知识分子就是为知识而斗争，如果我们没有一套，共产党才不要你呢，这也是利用、限制、改造，只要有被人利用之处就不怕。向科学进军就是显示我们能力的机会。共产党对我们知识分子就是不信任，不要说三顾茅庐，只要少斗争点就好了”。","type":"paragraph"},{"text":"“政治舞台就是唱戏，谁唱的好，谁就成功”。","type":"paragraph"}],"comments":[],"origin":"《“鸣”、“放”选集（四）》（中共山西省委整风办公室编印，1957年11月）。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"81fae523f6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
