" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji7-2","name":"毛泽东全集第7卷(2)","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji7-2.pdf"],"article":{"title":"在中共中央政治局常委会议上的讲话","alias":"","parts":[{"type":"paragraph","text":"在中共中央政治局常委会议上的讲话！"},{"type":"paragraph","text":"（1935年6月29日）"},{"type":"paragraph","text":"日军进攻北平，明显地要侵占华北。现在各帝国主义国家的冲突在中国表现为军阀间的矛盾。日本帝国主义想把蒋介石完全控制在自己手下。党对时局应有表示，应发表文件。要在部队中宣传反对日本帝国主义，反对放弃华北，这最能动员群众。"},{"type":"paragraph","text":"[1]1935年6月29日，中共中央政治局常委会议在两河口召开。这是毛泽东在听取博古（秦邦宪）关于华北事变、日军向北平进攻的情况报告后"},{"type":"paragraph","text":"1935年6月至8月，中共中央政治局先后在两河口、沙窝、毛儿盖多次召开会议，讨论红军落脚问题。图为两河口会议旧址。"}],"authors":["毛泽东"],"dates":[{"year":1935,"month":6,"day":29}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":186,"page_end":187},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ca75d1451c"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
