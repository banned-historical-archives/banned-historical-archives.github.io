题的信和批语","authors":[],"dates":[{"year":1953,"month":5,"day":19}],"is_range_date":false,"parts":[{"text":"毛泽东关于用中央名义发文件、电报问题的信和批语","type":"title"},{"text":"一","type":"subtitle"},{"text":"少奇同志及尚昆同志：","type":"appellation"},{"text":"（一）华南分局报告及方方的检讨，应加印分发彭真、习仲勋、高岗、薄一波、陈伯达、罗瑞卿、洛甫、贺龙及其他参加中央会议的同志，准备讨论。嗣后，有关较重大的问题的文电，都应如此办。（二）贺龙同志未离京前，应邀他参加中央的各次会议。（三）嗣后，凡用中央名义发出的文件、电报，均须经我看过方能发出，否则无效。请注意。","type":"paragraph"},{"text":" 毛泽东五月十九日","type":"paragraph"},{"text":"二","type":"subtitle"},{"text":"少奇、恩来、德怀同志阅后，交尚昆同志：","type":"appellation"},{"text":"（一）请负责检查自去年八月一日（八一以前的有过检查）至今年五月五日用中央和军委名义发出的电报和文件，是否有及有多少未经我看过的（我出巡及患病请假时间内者不算在内），以其结果告我；（二）过去数次中央会议决议不经我看，擅自发出，是错误的，是破坏纪律的；（三）十四号通知照发。","type":"paragraph"},{"text":" 毛泽东五月十九日","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"贺龙","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f3f6834bb2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
