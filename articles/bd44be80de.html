":[{"year":1964,"month":6,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京十八日电】　刘少奇主席、邓小平总书记和彭真、贺龙、康生、杨尚昆等党和国家领导人，今晚观看了越南人民军总政治局歌舞团演出的三幕七场舞剧《义静烈火》。"},{"type":"paragraph","text":"演出休息时，刘少奇主席、邓小平总书记等党和国家领导人接见了歌舞团团长范洪居中校、副团长阮春耀中校、艺术指导阮辉瑜大尉和部分演员，同他们进行了亲切友好的谈话。"},{"type":"paragraph","text":"刘少奇主席、邓小平总书记等党和国家领导人在演出结束后，走上舞台，与演员们亲切握手，祝贺他们演出成功。"},{"type":"paragraph","text":"今晚观看演出和陪同接见的，还有中国人民解放军副总参谋长杨成武上将，总政治部副主任刘志坚中将等。"},{"type":"paragraph","text":"越南驻中国大使陈子平观看了演出，接见时也在场。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bd44be80de"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
