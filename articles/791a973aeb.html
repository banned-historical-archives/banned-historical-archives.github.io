ical-archives/banned-historical-archives8/main/maoquanji25.pdf"],"article":{"title":"给徐向前“的信","alias":"","parts":[{"type":"paragraph","text":"给徐向前\"的信"},{"type":"paragraph","text":"（1948年11月29日）向前同志："},{"type":"paragraph","text":"闻病极念，务望安心静养，不要挂念工作，前方指挥由周、胡、陈担负。你病情略好能够移动时即来中央休养，待全愈后再上前线。总之，治疗和休养是第一等重要，病好一切好办。"},{"type":"paragraph","text":"毛刘朱周任"},{"type":"paragraph","text":"十一月二十九日"},{"type":"paragraph","text":"[1]徐向前（1901一1990)，山西五台人。当时任华北军区副司令员、华北野战军第一兵团司令员兼政治委员。"},{"type":"paragraph","text":"[2]周，指周士第（1900一1979)，广东琼海人。当时任华北野战军第一兵团副司令员兼副政治委员。胡，指胡耀邦（1915一1989），湖南浏阳人。当时任华北野战军第一兵团政治部主任。陈，指陈漫远（1911一1986），广西蒙山人。当时任华北野战军第-兵团参谋长。"}],"authors":["毛泽东"],"dates":[{"year":1948,"month":11,"day":29}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":296,"page_end":296},"tags":[{"name":"毛泽东","type":"人物"},{"name":"徐向前","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"791a973aeb"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
