script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"罗马尼亚《世界》周刊发表文章强调  铲除帝国主义强权政治和发号施令政策  奥《新闻报》揭露苏联通过不平等贸易剥削东欧国家","authors":[],"dates":[{"year":1977,"month":1,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"罗马尼亚《世界》周刊发表文章强调"},{"type":"paragraph","text":"铲除帝国主义强权政治和发号施令政策"},{"type":"paragraph","text":"奥《新闻报》揭露苏联通过不平等贸易剥削东欧国家"},{"type":"paragraph","text":"新华社布加勒斯特一九七七年一月二十一日电　罗马尼亚《世界》周刊最近一期发表文章强调，必须铲除帝国主义的强权政治和发号施令、干涉别国内政、无视各国人民直接参加世界政治生活的合法愿望的旧政策。"},{"type":"paragraph","text":"文章说，不能在狭窄的圈子内解决国际问题。在国际生活中，应当确保所有国家有权平等地参与国际生活，参与解决人类所关心的重大问题。应当提高中小国家、发展中国家、不结盟国家、走上独立发展道路的国家在解决一切国际问题中的作用；重视每个国家人民合法的民族利益；消除一国或一些国家以任何形式对另一主权国家进行奴役、施加压力和干涉内政的现象，铲除一国或一些国家背着别国去解决有关第三国问题的企图。"},{"type":"paragraph","text":"文章指出，要实现这些准则就应当确保使每个国家完全平等地参加讨论普遍关心的问题；确保每个国家有代表自己、表达自己立场和利益的主权，确保在多边会议中应协商一致作出决议；应确立轮流主持会议的原则。"},{"type":"paragraph","text":"文章还谈到了国际经济关系民主化的问题。文章说，没有经济关系的真正民主化，没有为争取消除不发达状态和现存差距而进行的坚决斗争，国际政治关系的民主化是不可能得到保证的。"},{"type":"paragraph","text":"新华社维也纳一九七七年一月二十一日电 奥地利《新闻报》一月二十一日发表评论，揭露苏联通过不平等贸易加紧剥削“经互会”国家。"},{"type":"paragraph","text":"评论首先指出，“苏联对经互会内部的小国的国民经济的压力越来越大，每年一月一日，经互会内部贸易价格作年度变动时，苏联总是要求东欧国家付给更多的钱”。"},{"type":"paragraph","text":"评论说，“从一九七七年一月一日起匈牙利付给苏联石油的钱要比一九七六年多百分之二十二点五”，“同样，对其他东欧国家的石油价格也会上涨。”"},{"type":"paragraph","text":"评论指出，东欧国家为了支付苏联提供的动力和原料，“要向苏联提供愈来愈多的货物，使它们的贸易条件日益恶化，而且它们还必须参加设在苏联的‘经互会’的动力和原料方面的联合投资，这样又要求东欧向苏联出口机器和设备，规定苏联以后提供动力来支付这些机器和设备”。"},{"type":"paragraph","text":"评论指出，“人们估计在以后五年内‘经互会’的联合投资为二千亿先令（约合八十亿美元），其中几乎所有的项目都在苏联。而东欧人必须提供一半的款项”。"},{"type":"paragraph","text":"评论说，在一九七四年，苏联通过加紧对东欧国家的出口获得一亿二千九百万美元的顺差。一九七五年通过经互会内部贸易价格的变动，苏联进一步提高它的顺差。在一九七五年中，扣除东欧人为联合工程项目向苏联的供货，苏联获得七亿三千七百万美元的顺差。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"341867eb6c"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
