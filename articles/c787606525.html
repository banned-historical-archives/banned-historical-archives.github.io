:["霍柏林"],"dates":[{"year":1983,"month":9,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"陈潭秋烈士纪念馆开馆典礼在武汉举行"},{"type":"paragraph","text":"叶剑英题词　陈云题写馆名"},{"type":"paragraph","text":"新华社武汉9月27日电　（记者霍柏林）陈潭秋烈士纪念馆开馆典礼今天在武汉举行。叶剑英、陈云同志分别为纪念馆题词或题写了馆名。"},{"type":"paragraph","text":"叶剑英的题词是：“纪念陈潭秋烈士向他的革命精神学习”。"},{"type":"paragraph","text":"陈云题写了馆名：“陈潭秋烈士纪念馆”。"},{"type":"paragraph","text":"陈潭秋烈士纪念馆坐落在陈潭秋同志早年工作和生活过的地方——原武昌高师附小。纪念馆内复原了“陈潭秋同志卧室”，建立了“陈潭秋同志武汉革命活动陈列室”。"},{"type":"paragraph","text":"中共湖北省委副书记、武汉市委第一书记王群在开馆典礼上讲了话。他说，陈潭秋同志早期在湖北省、武汉地区从事党的工作，对党的建立和发展，对开展工运、农运、青运、妇运和统战工作，作出了巨大的贡献，深为湖北、武汉地区人民敬重和怀念。王群说，让我们在党中央领导下，学习革命前辈为共产主义奋斗终身的革命精神，发扬党的光荣传统，为实现社会主义四化建设的宏伟目标和共产主义的远大理想而努力奋斗。（附图片）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"陈云","type":"人物"},{"name":"湖北文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c787606525"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
