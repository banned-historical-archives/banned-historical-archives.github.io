北工学院","梁志德","郑义华","郑榕之"],"dates":[{"year":1957,"month":5,"day":23}],"is_range_date":false,"parts":[{"text":"在学院座谈会上的讲话","type":"title"},{"text":"东北工学院郑义华梁志德郑榕之","type":"authors"},{"text":"采矿系郑义华说：市委书记报告空洞无物，估计错误，未了解情况。机械系有的教师说肃反基本上是错误的，我也不同意，我认为肃反工作，成绩很少，与今天教师的反感比起来，是得不偿失的。全国肃反成绩是基本的，但在东北工学院，肃反的方式方法基本上错误，成绩很少，肃反成为党员对群众不满的报复手段，目的是要达到思想压制。","type":"paragraph"},{"text":"钢铁工艺系梁志德讲师说：肃反以后发展的一些党员，是不是有一些是用别人的鲜血染红了的布尔什维克？","type":"paragraph"},{"text":"机械系讲师郑榕之说：东北工学院肃反工作中，错误和缺点是主要的，而党员和肃反小组长没有提出看法，我怀疑党员和肃反组长是否肯揭发这些错误。肃反的结果，有人说觉悟提高了，我不同意。说擦亮了眼睛，我也不同意，总的来讲肃反的错误和缺点是主要的。（五月二十三日辽宁日报）","type":"paragraph"},{"text":" 来源：《章伯钧张百生等人言论集》（中国旅大市委宣传部编，一九五七年七月）。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b9e1d810c8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
