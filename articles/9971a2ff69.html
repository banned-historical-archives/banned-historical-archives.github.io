<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"“科学自由”是一帖蒙汗药——上海光机所理论小组专题批判《汇报提纲》纪实","authors":[],"dates":[{"year":1976,"month":8,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"夜晚，室内灯光通亮，中国科学院上海光学精密机械研究所理论小组的同志们正在认真学习马克思的《哥达纲领批判》，揭露批判邓小平授意炮制的《汇报提纲》所鼓吹的“科学自由”谬论的反动本质。"},{"type":"paragraph","text":"一开头，组长高师傅就提出:革命导师告诉我们，一个纲领是“一面公开树立起来的旗帜”(《马克思恩格斯选集》第3卷第31页)，经过前几次的批判，我们认识到邓小平授意炮制的这个《汇报提纲》，也拣起资产阶级历来鼓吹的“科学自由”的破烂，作为向无产阶级进攻的思想武器，我们必须加以揭露和批判。"},{"type":"paragraph","text":"话音刚落，一个同志就说:我细心琢磨了几次，觉得《汇报提纲》虽然没有公开亮出“科学自由”这块破牌子，但它既要表达资产阶级意志，狐狸尾巴就一定会露出来。比如它玩弄了断章取义、打着红旗反红旗的卑劣手法，借口贯彻双百方针，却闭口不谈毛主席提出的六条政治标准，抽掉了阶级内容，极力鼓吹自由发展、自由争论。又如，它处心积虑地攻击无产阶级在科技领域中对资产阶级实行全面专政的一系列重大措施是“简单粗暴”。这就赤裸裸地表达了邓小平和科技界不肯改悔的走资派鼓吹“科学自由”的真意。他们还胡说什么“现在主要矛盾是知识分子不敢搞理论”、“开门办所会产生压力”，等等。他们在提纲中写的和口中宣扬的，无非要使人相信今天是那样的不自由，而在推行修正主义科研路线时又是那么自由，这不是鼓吹“科学自由”又是什么呢?"},{"type":"paragraph","text":"高师傅进而提出了这样一个问题:“为什么‘科学自由’是资产阶级的虚伪口号?”"},{"type":"paragraph","text":"有个同志指着《哥达纲领批判》中的一段话说:马克思曾一针见血地指出:“‘科学自由’——普鲁士宪法中有一条就是这样写的。”(《马克思恩格斯选集》第3卷第23页)这就告诉我们，“科学自由”本来就是资产阶级提出来的。当资产阶级处于上升时期，迫切要求以资本主义的生产关系取代原来封建的生产关系，当时提出这个口号，具有反封建的进步意义。但是，当资产阶级取得了统治地位后，再把这个口号列在宪法条文中，则是为其超阶级的唯心主义国家观服务的，目的在于掩盖资产阶级国家的阶级实质。"},{"type":"paragraph","text":"紧接着，一个青年工人引证马克思批判“自由国家”时的论述，进一步揭露了“科学自由”的反动性。他说，哥达纲领起草者完全背离了马克思主义的国家学说，根本不提无产阶级专政，也没有说出将来的共产主义国家是什么样的，却提出了什么“争取自由国家”是德国工人党的奋斗目标。其实，国家是阶级斗争的产物，是统治阶级压迫被统治阶级的工具。同样，在阶级存在的社会里，科学总是为一定阶级服务的，是受一定阶级的哲学思想支配的。毛主席指出:“美国确实有科学，有技术，可惜抓在资本家手里，不抓在人民手里，其用处就是对内剥削和压迫，对外侵略和杀人。”(《别了，司徒雷登》)今天在苏联，科学技术已成为勃列日涅夫修正主义统治集团对内剥削和压迫劳动人民，对外与美帝国主义争夺世界霸权的工具。所以，“科学自由”如同离开了阶级的存在侈谈“自由国家”一样，是十分荒谬的。"},{"type":"paragraph","text":"一个年近四十的科技人员接过话茬，愤怒地说，文化大革命前，有些同志受刘少奇修正主义路线毒害，想通过走“自由选题”、“自由结合”这条道路求名获利，往往置国家急需的任务于不顾，把工农业生产实际问题置之脑后，单凭个人兴趣任意开题停题，以邻为壑，结果国家资金如水流，成果未出人变修。通过文化大革命，我们批判了刘少奇修正主义路线，摒弃了“科学自由”虚伪的一套，取得了思想，科研双丰收。去年，所里研制成功了一台高功率气体激光加工机床，深受有关工厂的欢迎，全国有许多人来所参观。但是，由于研制成本高，价格昂贵，不适宜在实际加工中推广应用，今年，同志们急工业生产之所急，大胆设想，用普通玻璃管取代石英玻璃管，试制成功了一台低成本、高效率的气体激光加工机床。《汇报提纲》重新鼓吹“科学自由”，要我们重走文化大革命前修正主义的老路，是绝对办不到的!"},{"type":"paragraph","text":"通过这个批判会，大家认清了“科学自由”是邓小平抛出的一帖蒙汗药，必须批深批透。"},{"type":"paragraph","text":"本报通讯　员"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9971a2ff69"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
