script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"抓好坚持马克思主义反对修正主义的百年大计  淄博矿务局东方红总厂党委在批林批孔斗争中培养工人理论队伍","authors":[],"dates":[{"year":1974,"month":8,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"抓好坚持马克思主义反对修正主义的百年大计"},{"type":"paragraph","text":"淄博矿务局东方红总厂党委在批林批孔斗争中培养工人理论队伍"},{"type":"paragraph","text":"据新华社济南一九七四年八月三日电 山东淄博矿务局东方红总厂党委遵照毛主席关于“认真看书学习，弄通马克思主义”的教导，积极培养工人理论骨干。现在全厂已形成了一支三百五十多人的工人理论队伍，他们在批林批孔运动中，积极辅导全厂职工学习政治理论，带动大家深入开展革命大批判，对促进全厂革命和生产的发展起了重要作用。"},{"type":"paragraph","text":"这个厂的工人理论骨干是在批林整风运动中开始培养起来的。当时为了使革命大批判深入开展下去，这个总厂所属的水泥厂党支部组织了八个业余学哲学小组，从工人、基层干部中选拔了七名政治觉悟较高和有一定理论水平的学习骨干，担任职工业余学哲学的辅导员。他们和大家一起认真学习毛主席的《实践论》、《矛盾论》，运用辩证唯物主义的观点痛斥林彪宣扬的天才论，推动了革命大批判的深入发展。这一事实使东方红总厂党委加深了对建立一支工人理论队伍的重要意义的认识，自觉地把培养工人理论队伍当作坚持马克思主义，反对修正主义的百年大计来抓。他们在全厂范围内大张旗鼓地推广水泥厂工人学哲学的先进经验，很快在全厂建立了七十九个业余学哲学小组，同时采用办政治夜校、学习班等形式，积极培养理论骨干。两年来，总厂党委先后举办了三期辅导员学习班，五期读书班，共培训了理论骨干三百五十六名。现在，这支骨干队伍的大部分人，都学习了毛主席的五篇哲学著作和《共产党宣言》、《哥达纲领批判》、《国家与革命》等马列著作，选学了《反杜林论》的有关章节，理论水平不断提高。"},{"type":"paragraph","text":"东方红总厂党委在培养理论队伍的过程中，注意把工人理论骨干放到三大革命运动的第一线，让他们在实践中学习，在斗争中锻炼、提高。批林批孔运动一开始，总厂党委就发动理论骨干深入群众，调查研究，把群众在斗争中遇到的难题，作为理论研究的课题。支架厂理论小组，在调查中发现部分工人对批林与批孔的关系认识不清，针对这种情况，他们翻书籍，查资料，在全厂作了《批林必须批孔》的辅导报告，向工人们介绍了孔老二的反动哲学观点和反动政治主张，批判林彪效法孔老二“克己复礼”，阴谋复辟资本主义的罪行。使大家认识到，林彪和孔老二虽然相隔两千多年，但是他们的反动思想是一脉相承的，都是拉历史倒退的复辟狂。全厂职工提高了认识，人人挥戈上阵，迅速掀起了革命大批判新高潮。"},{"type":"paragraph","text":"为了更好地培养工人理论队伍，东方红总厂各级党组织还十分重视抓好典型，总结经验。平时，理论骨干每讲一课，各级党组织都要组织他们总结一次，看一看辅导的观点明确不明确，语言通俗不通俗，联系实际紧不紧，发现不足，认真改正。同时，他们还注意总结工人辅导员中的典型经验，及时召开经验交流会进行推广。去年以来，他们就总结了支架厂青年工人许凤高为革命当好辅导员，九二四四厂党支部认真培养工人理论辅导员，砖瓦厂老工人王洪儒辅导《实践论》等七个典型经验，在全厂推广。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"林彪","type":"人物"},{"name":"批林批孔","type":"主题/事件"},{"name":"批林批孔","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5fb51ef66d"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
