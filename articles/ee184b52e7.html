ical-archives/banned-historical-archives0/main/maoquanji42.pdf"],"article":{"title":"对冶金部关于一九六O年至一九六七年钢铁工业远景规划草案的批语","alias":"","parts":[{"type":"paragraph","text":"对治金部关于一九六〇年至一九六七年"},{"type":"paragraph","text":"钢铁工业远景规划草案的批语"},{"type":"paragraph","text":"（1959年12月）各同志阅，退毛。要件"},{"type":"paragraph","text":"[1]冶金工业部1959年12月14日印发的这份规划草案指出，钢铁工业今后8年发展规划的要求是：一、继续贯彻执行大、中、小并举，中央与地方并举和土洋并举的方针，保证高速度的发展。二、在各大区建立起完整的钢铁工业体系，基本上解决钢铁工业的布局问题。三、完全解决国民经济发展对钢铁产品品种的需要。根据上述方针和任务，初步设想1967年钢产量达到6000万至7000万吨或7000万至8000万吨。"}],"authors":["毛泽东"],"dates":[{"year":1959,"month":12}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":523,"page_end":523},"tags":[{"name":"毛泽东","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ee184b52e7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
