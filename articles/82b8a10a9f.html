府的恐怖手段和修正主义分子的欺骗宣传都阻挡不了武装斗争的发展","authors":[],"dates":[{"year":1970,"month":1,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"阿尔巴尼亚《战士报》发表文章热烈赞扬"},{"type":"paragraph","text":"印度人民武装斗争日益发展和加强"},{"type":"paragraph","text":"指出反动政府的恐怖手段和修正主义分子的欺骗宣传都阻挡不了武装斗争的发展"},{"type":"paragraph","text":"新华社地拉那十六日电　阿尔巴尼亚《战士报》十五日发表文章，热烈赞扬印度人民武装斗争日益发展和加强。"},{"type":"paragraph","text":"文章说，印度正处于全面的政治、经济和军事危机之中，最近印度国大党各派系之间的争斗就是印度阶级矛盾进一步尖锐化的反映。印度反动政府抛弃了本国人民的最根本的利益，迎合美帝国主义者、苏联修正主义者和各国垄断资本，使印度越来越深地陷入了经济危机的泥坑。文章接着揭露了印度反动政府对印度人民的残酷剥削，并指出，印度人民在忍无可忍的情况下，开展了武装斗争。文章说，印度的农民武装斗争在印度共产党（马克思列宁主义）领导下，不断发展和增强。"},{"type":"paragraph","text":"文章在热情赞扬了印度各地农民武装斗争所取得的巨大胜利后说，在斗争中，农民们认识到一个伟大的真理，即只有手执武器进行武装斗争才能赢得自身的权利，也只有这样，才能推翻腐朽的社会制度。文章指出，印度农民的武装力量正在日益加强。印共（马列）的干部不断地深入到群众中间，发动他们进行反对剥削者和反动警察势力的英勇斗争。游击队力量的进一步组织，印共（马列）对他们的领导，以及他们同广大人民群众的更加团结，将使印度人民武装斗争取得新的胜利。"},{"type":"paragraph","text":"文章指出，印度反动政府同修正主义分子和反动政党一起，除了使用恐怖手段之外，还进行欺骗宣传，妄图使广大人民群众放弃武装斗争。但是，无论是反动政府的恐怖手段，还是修正主义分子的欺骗宣传，都不能阻挡印度人民武装斗争的发展。这一斗争不仅对印度，而且对整个世界革命运动都具有重大的意义。农民革命战士在手执武器进行的斗争中日益得到锻炼和日益强大，他们必将赢得最后胜利。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"82b8a10a9f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
