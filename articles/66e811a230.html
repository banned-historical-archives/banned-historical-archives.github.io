["北京钢铁学院","张振祥","徐涤如","文兴伯","朱伦"],"dates":[{"year":1957,"month":5}],"is_range_date":false,"parts":[{"text":"右派言论——攻击、丑化党员","type":"title"},{"text":"北京钢铁学院张振祥文兴伯徐涤如朱伦","type":"authors"},{"text":"“党员发现群众有问题不帮助，把他记在日记本上，收集起来整人，或者是列入档案，一直跟随到死为止，党员又不走群众路线，连这个教条也没有，他们与群众格格不入。”（北京钢铁学院  张振祥）","type":"paragraph"},{"text":"“……大学生活是软禁生活，党团组织和群众的关系，是人与奴隶的关系，共产党迫害青年，相杀人，党员今日已成为社会进步的障碍，党员口袋里装着党证以执政者自居……当我见到党的干部时，就好像见到敌人一样。”（北京钢铁学院  文兴伯）","type":"paragraph"},{"text":"“（1）对共产党员特殊材料作成的这句话，很有反感……不合乎事实与逻辑。","type":"paragraph"},{"text":"（2）现在的矛盾自然存在的是一小部分，而党制造出来的是一大部分，如历次运动，宗派主义，主要由党来解除这鸿沟，解除青年之间矛盾。","type":"paragraph"},{"text":"（3）赞成教授治校，反对党委治校，解放前清华是教授治校，办的多好，而今天党委治校，学校办坏了。”（北京钢铁学院  徐涤如）","type":"paragraph"},{"text":"“……以后有什么事，不要让党员先知道，党员一知道一汇报党中央也知道了，互相勾通，使我们达不到预计目的。","type":"paragraph"},{"text":"政治教研组是靠党吃饭的。","type":"paragraph"},{"text":"现在人和人之间表面一套关系都是虚伪的。”（北京钢铁学院  朱伦）","type":"paragraph"},{"text":" 来源：《高等学校右派言论选编》（中共中国人民大学委员会，1958年8月）。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"66e811a230"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
