authors":["周恩来","江青","陈伯达"],"dates":[{"year":1968,"month":4,"day":4}],"is_range_date":false,"parts":[{"text":"周恩来江青陈伯达接见北京农业大学东方红时的讲话","type":"title"},{"text":"周恩来江青陈伯达","type":"authors"},{"text":"摘要：","type":"paragraph"},{"text":"总理：二月中旬各口搞三结合夺权，当时我很怀疑，为什么农口那么容易？过去很落后，夺权却走在别人前面，问题很复杂。","type":"paragraph"},{"text":"江青：（谭震林）现在把农口搞成这样，你们不应该退出来，应该跟上去。我和总理都不知道他有这么多恶劣的东西，以前对他的东西掌握不多。现在斗争正在深入，你们现在不能撤走，农大东方红同学要担负主要责任。听说农机、劳大、师大有人在农口，很好。……总之，不能使农口各部左派力量垮下去，因为他们现在力量还很弱，……现在农口是特殊问题，左派垮了就不好了。农口关系很大，是关系到全国农村问题，所以你们一定要很好地支持农口革命左派。","type":"paragraph"},{"text":"伯达：我同意这个意见，希望你们很好地支持农口革命左派。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"江青","type":"人物"},{"name":"陈伯达","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"909a6f99c9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
