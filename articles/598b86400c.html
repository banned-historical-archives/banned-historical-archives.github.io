ical-archives/banned-historical-archives0/main/maoquanji30.pdf"],"article":{"title":"关于四十五军等部队行动部署致陶铸电","alias":"","parts":[{"type":"paragraph","text":"关于四十五军等部队行动部署"},{"type":"paragraph","text":"致陶铸电"},{"type":"paragraph","text":"（1951年1月22日）陶铸同志，并告邓、谭，叶、方："},{"type":"paragraph","text":"一月十五日电悉。四十五军争取早日结束剿匪待命开韶关广州线整训备战；廿一兵团确定在广西境内剿匪及驻防；四十九军争取在五月或六月以后能集中使用，望按此意图进行部署。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一月廿二日"},{"type":"paragraph","text":"[1]陶铸，当时任中共中央中南局常委、中国人民解放军中南军区政治部主任，被派往广西帮助剿匪工作。"},{"type":"paragraph","text":"[2]邓，指邓子恢，当时任中共中央中南局第三书记、中国人民解放军中南军区第二政治委员。谭，指谭政，当时任中共中央中南局副书记、中国人民解放军中南军区第三政治委员。叶，指叶剑英，当时任中共中央华南分局第一书记、中国人民解放军广东军区司令员兼政治委员。方，指方方，当时任中共中央华南分局第三书记。"}],"authors":["毛泽东"],"dates":[{"year":1951,"month":1,"day":22}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":55,"page_end":55},"tags":[{"name":"陶铸","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"598b86400c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
