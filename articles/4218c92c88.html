script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"意大利南部人民奋起反剥削","authors":[],"dates":[{"year":1969,"month":7,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"意大利南部人民奋起反剥削"},{"type":"paragraph","text":"阿浦利亚区三十五万农业工人罢工并举行大示威"},{"type":"paragraph","text":"西西里各行各业工人再次联合总罢工使整个岛屿陷于瘫痪"},{"type":"paragraph","text":"新华社十一日讯　罗马消息：意大利南部阿浦利亚区三十五万农业工人最近举行罢工，并且在几十个农业中心举行声势浩大的示威，反对大资本家的残酷剥削，要求增加工资和充分就业。"},{"type":"paragraph","text":"这个地区巴里省的十万农业工人已坚持罢工斗争两个多星期。安德里亚、莫尔费塔、科拉托和比通托市的工人举行了总罢工，声援农业工人的正义斗争。罢工者占领了阿浦利亚区四个城市的市政厅，堵住了许多条公路，并迫使一些火车停止行驶。"},{"type":"paragraph","text":"在意大利南部的西西里，各行各业的工人十一日又一次联合举行总罢工，抗议意大利当局对西西里劳动人民在去年遭受强烈地震灾害之后的困苦处境采取不闻不问的恶劣态度。总罢工使这个地中海上的大岛陷于瘫痪状态。"},{"type":"paragraph","text":"在意大利首都罗马，来自全国各地的小农五千多人，九日举行了示威游行和群众集会，抗议意大利当局的农业政策。他们高举的一幅红色大标语上写着：“工人、农民和学生团结起来进行斗争！”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4218c92c88"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
