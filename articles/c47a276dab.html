970,"month":10,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"瑶族老人心向毛主席"},{"type":"paragraph","text":"在广西壮族自治区中部大瑶山上，一位瑶族老人活学活用毛泽东思想的先进事迹被人们广泛传诵着。这位老人，就是金秀瑶族自治县六巷公社六巷大队石架生产队的老贫农赵金录。"},{"type":"paragraph","text":"熬过严寒的人最喜欢红太阳，从苦海里解救出来的瑶家儿女最热爱毛主席。赵金录无限热爱伟大领袖毛主席，无限崇拜战无不胜的毛泽东思想，他经常对青年人说：“大瑶山上的香草为什么那么香，因为有春天雨露的滋润；瑶族人民生活为什么这样好，因为有毛主席的英明领导。毛主席是我们瑶族人民心中的红太阳，毛泽东思想是我们的命根子。我们要翻身不忘过去的苦日子，幸福不忘毛主席。”"},{"type":"paragraph","text":"无产阶级文化大革命中，赵金录怀着对伟大领袖毛主席无比深厚的无产阶级感情，如饥似渴地活学活用毛泽东思想。他不识字，记忆力又差，学习起来很困难。但是，困难吓不倒无限忠于毛主席的瑶族老人。他坚持天天学，经常问，反复背。他经常向识字的干部和小学生请教。为了背熟一条毛主席语录，他曾熬过许多不眠之夜。“九大”期间，毛主席发出“团结起来，争取更大的胜利”的最新指示以后，当天夜里，赵金录老人要孙子和曾孙轮流教他背诵。"},{"type":"paragraph","text":"战无不胜的毛泽东思想把这个瑶族老人的头脑武装起来了。一九六七年冬天，大瑶山上瑶族人民掀起了“农业学大寨”的群众运动，村村寨寨组织了“新愚公突击队”，劈山造田，拦河打坝。这时，一小撮阶级敌人乘机煽起无政府主义思潮，队里出现乱砍伐林木的现象。赵金录及时提醒在大队当干部的孙子赵有汉说：“我们不能只顾开山放炮，不见敌人磨刀。目前这股砍伐林木的妖风就是阶级敌人吹起来的。”于是，赵有汉狠抓了队里的阶级斗争，迅速刹住了乱伐林木的歪风，革命和生产出现了蓬勃发展的大好形势。"},{"type":"paragraph","text":"赵金录学习了“老三篇”，浑身有使不完的劲。从一九六六年以来，他主动要求给队里看田水，他日日夜夜风里雨里看水情，修田埂，把全队九条长达七千多米的梯田水沟看管得好好的。他还利用看田水的空闲时间，给生产队开了一亩二分梯田，六亩荒地，种上了玉米，为集体增产粮食三千五百多斤。"},{"type":"paragraph","text":"党的“九大”以后，赵金录整天想着如何用实际行动落实毛主席关于“在全国取得更大的胜利”的伟大号召。他想到，看田水的劳动地点离家有六里远，如果搬到田间工棚去住，每天就能节省几个小时的来回走路时间，为集体多干点活。于是，他就用树皮、竹子把劳动时休息的工棚修补了一下，在工棚正中间端端正正地贴上一张毛主席的光辉画像，一个人搬到工棚去住。一年多来，他很少回家，经常吃住在工棚，学习在工棚。他的老伴和儿子劝他回家住宿，他说：“住工棚好啊，出门就能干集体活。”队里社员也不放心，经常劝他回家住，他就借此机会向他们忆苦思甜，进行阶级教育和继续革命教育。小小的工棚变成了毛泽东思想宣传站，阶级教育的课堂。"},{"type":"paragraph","text":"本报通讯员"},{"type":"paragraph","text":"本报记者"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c47a276dab"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
