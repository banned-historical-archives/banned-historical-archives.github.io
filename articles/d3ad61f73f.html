script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"type":"pdf","id":"wenji4","name":"毛泽东文集第四卷（1999）","internal":false,"official":true,"author":"中央文献研究室","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/wenji4.pdf"],"article":{"title":"给洪禹的信","description":"","dates":[{"year":1946,"month":3,"day":12}],"parts":[{"text":"给洪禹的信","type":"title"},{"type":"appellation","text":"洪禹同志："},{"type":"paragraph","text":"一月二十五日给我的信，很久就收到，很对你不起，到今天才复你，这是由于我几个月来都在病中的原故，请你原谅。在详细看了你的信以后，我感觉应当同意你的意见。在关于你本人的具体问题上，当然这是你一方面的声音，而别方面的我还未听到；但是我觉得你所提出的那些意见，确是我们的党组织值得注意与必须注意的。因为今天离你发信的日子已有一个半月，在这期间内不知道你的问题已获解决否？如果尚未，请你去找组织部副部长安子文同志当面商量解决，我已把你给我的信付给安子文同志看去了。在你的问题得到解决的时候，请你告知我是如何解决的，我愿意知道这事的结果。总之我感觉对你及许多同志很负疚，因为我们工作中做得不好的事实在太多了。致以同志的敬礼！"},{"type":"paragraph","text":"毛 泽 东"},{"type":"paragraph","text":"三月十二日"},{"type":"paragraph","text":"根据人民出版社一九八三年出版的"},{"type":"paragraph","text":"《毛泽东书信选集》刊印。"}],"comment_pivots":[{"part_idx":0,"offset":5,"index":1},{"part_idx":2,"offset":74,"index":2}],"is_range_date":false,"authors":["毛泽东"],"comments":["洪禹，一九一八年生，福建南安人，当时在延安鲁迅艺术文学院文学系研究室从事研究工作。在延安审干期间，曾受到错误的审查，为此向毛泽东写了申诉信，在毛泽东过问后问题得到了解决。","洪禹在给毛泽东的信中说：他在抢救运动中，被毫无根据地怀疑为国民党特务，抢救运动后，又长期不作结论，不予甄别平反。他说，这种作法无论对党对个人都是极为不利的，这只能伤害无辜，制造混乱，绝不可能帮助党组织弄清问题。希望党中央关照各级党组织密切注意，千万不要因为革命节节走向胜利，就以为多一个人少一个人算不了什么，因而可以对受审查的人任意处置，或者置之不理。党的工作在一定意义上说，是一种十分细密的关于人心的组织工作，任意对待受审查的人，后果不仅仅是一两个受到粗暴对待的人的问题，它是关系到人心向背，关系到革命成败的一个十分重要的问题。"],"page_start":108,"page_end":108,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d3ad61f73f"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
