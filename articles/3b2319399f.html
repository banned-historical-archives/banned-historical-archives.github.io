art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"刘少奇是美帝的帮凶","authors":["战士郭学相吕法丁王全根"],"parts":[{"type":"paragraph","text":"刘少奇这个叛徒、内奸、工贼，是美帝国主义的一条走狗。他公然吹捧美帝：“在美国统治集团内部，也有一些头脑比较清醒的人逐渐认识到战争政策未必对美国有利。”完全是一副无耻吹捧美帝国主义的丑相。"},{"type":"paragraph","text":"美帝国主义是世界人民最凶恶的敌人。那些吃人成性的美国大资本家，就是靠侵略吃饭的，他们难道会放弃战争政策吗？从第二次世界大战结束以来，美帝国主义就没有一刻停止过侵略战争。它援助国民党蒋介石打内战，它发动侵略朝鲜的战争，它直到现在还在屠杀越南人民，还霸占着我国领土台湾。这是不容辩驳的事实。如果说，“在美国统治集团内部”还有什么“头脑清醒的人”，那就是一些更阴险、更狡猾的屠夫。他们手上拿着刀，嘴里大念“和平”经，迷惑革命人民，乘人不备的时候下毒手。如果信了刘少奇的鬼话，把和平的希望寄托在这些“头脑清醒的人”身上，革命人民就要遭殃。刘少奇这个内奸耍的是多么阴险的一招啊！"},{"type":"paragraph","text":"我们最敬爱的伟大领袖毛主席指出：“我们说‘帝国主义是很凶恶的’，就是说它的本性是不能改变的，帝国主义分子决不肯放下屠刀，他们也决不能成佛，直至他们的灭亡。”用毛泽东思想武装起来的革命人民，看透了美帝的侵略本性，决不会上刘少奇的当！刘少奇拚命为美帝涂脂抹粉，只不过充分暴露了他是美帝帮凶的丑恶嘴脸！"}],"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3b2319399f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
