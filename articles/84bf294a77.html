<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"志愿军周文江英雄连上书毛主席  保证发扬荣誉为祖国人民争取更大的光荣","authors":[],"dates":[{"year":1952,"month":8,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"志愿军周文江英雄连上书毛主席"},{"type":"paragraph","text":"保证发扬荣誉为祖国人民争取更大的光荣"},{"type":"paragraph","text":"敬爱的毛主席：为了保卫祖国的安全和世界和平，我们参加了中国人民志愿军，走上了抗美援朝的最前线。将近两年以来，我们完成了历次战斗任务，并在二次战役中荣获“一等功臣连”的光荣称号。我们知道，我们的荣誉是在祖国广大人民的热烈支援，是在上级首长的正确指挥和兄弟部队的有力配合，特别是在党和您的英明领导之下获得的。因此，这个荣誉，应该属于党和您以及祖国人民。我们决心更加虚心地学习，保持荣誉，发扬荣誉，为我们敬爱的领袖争光！为祖国人民争光！"},{"type":"paragraph","text":"毛主席！我们全连每一个同志无时无刻不在想念着您。在最艰苦的环境和最激烈的战斗中，一想起您，我们立刻生长了无穷的力量，任何困难也不能阻挡我们。记得长津湖战役西兴里战斗时，在零下三十度的严寒中，我们每天吃一顿冰冻的土豆。敌人在数十架飞机和猛烈的炮火掩护下，拼死突围，疯狂地向我们攻击反扑。山头上打得烟火弥漫。在这最紧张的时候，我们想起了党，想起了您，就立刻增加了无限的勇气。政治指导员朱良玉同志在牺牲前高呼着您的名字。三排副的脚冻烂了，三个指甲冻掉了，还是坚持作战。副连长周和林同志和二排的六个同志，打退了敌人三次冲锋，连续战斗了十七小时，守住了山头，扭住了敌人，最后并配合兄弟部队，歼灭了敌人。敬爱的领袖！是您鼓舞着我们，给我们以排除万难的力量，使我们从胜利走向胜利！"},{"type":"paragraph","text":"前几天，抗美援朝纪念章发下来了。您的金像挂在我们胸前。同志们都喜笑颜开地说：“毛主席天天跟我们在一起，我们的战斗意志更加坚强了。”毛主席！我们全体同志向您保证：我们决心在平时努力练好本领，提高战斗技术，在战斗中更加坚定勇敢地消灭敌人。我们一定粉碎美帝国主义企图扩大侵略战争的阴谋，让抗美援朝纪念章更加光辉灿烂！  中国人民志愿军周文江英雄连全体同志"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"84bf294a77"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
