"dates":[{"year":1957,"month":8,"day":14}],"is_range_date":false,"parts":[{"text":"浙江日报有右派小集团","type":"title"},{"text":"浙江省、市新闻出版界9、10两日举行反右派大会，揭露和批判浙江日报一个右派小集团的反党活动。这个右派小集团的成员有该报文教艺术组主编谢狱(笔名耿明、卜束)、副主编夏钦瀚(笔名伍隼)、主编助理白刃(笔名孙赤)(以上三人都是共产党员)及编辑葛进等人。这个右派小集团与外部的右派分子勾结，密谋准备筹办所谓“同人刊物”向党进攻。","type":"paragraph"},{"text":" ——原载《文汇报》1957年8月14日。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"19e25e7e87"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
