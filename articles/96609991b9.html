art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东思想的宣传员","authors":["喻晓/辰生"],"parts":[{"type":"paragraph","text":"一天，共产党员、会计尚兴保到某地银行去取款，由于去的时间匆忙，竟忘了带毛主席著作，这对尚兴保来说，是很“例外”的情况，他平时外出总是要把“毛选”放在挎包里。想不到由于人多，在银行里一等就将近两个小时！当时他就想，要是带“毛选”来了，就不会白白浪费这些时间，心里感到十分懊悔。他又进而想到大家，每天那么多人取款存款，要是大家在这段等的时间内能看上毛主席著作，那该有多好！他沉思了一会，感到有了办法，马上跑到新华书店，买回许多本毛主席著作单行本，交给了银行的一位姓袁的同志。袁同志听了尚兴保说的用意后，代表银行表示感谢。"},{"type":"paragraph","text":"尚兴保觉得，不仅自己要学好毛主席著作，作为一个共产党员，有责任帮助大家都来学好，让更多的人掌握毛泽东思想，这是自己对无产阶级革命事业应尽的义务。"},{"type":"paragraph","text":"（辰生插图）"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"96609991b9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
