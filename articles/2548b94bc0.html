<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"一个蛊惑人心的口号——驳“要当码头的主人，不做吨位的奴隶”","authors":["玉令"],"dates":[{"year":1978,"month":4,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"玉令"},{"type":"paragraph","text":"一九七四年初，“四人帮”及其在上海的余党盗用“上港五区部分工人”的名义，别有用心地炮制了一个“要当码头的主人，不做吨位的奴隶”的反动口号。这个假左真右的反动口号出笼之后，霎时间，诸如“不做产值的奴隶”，“不做产品的奴隶”，“不做平方米的奴隶”，“不做土石方的奴隶”，“不做工分的奴隶”等一系列类同的口号，应运而生，鼓噪一时。"},{"type":"paragraph","text":"这个口号打着充分发挥工人革命作用的旗号，把为社会主义抓吨位，说成是“唯生产力论”，是搞“修正主义”，是做“奴隶”；而把什么活也不干，把国家计划指标抛进黄浦江，却说成是抓“革命”，是当“主人”。真是是非颠倒，荒唐之至。"},{"type":"paragraph","text":"大家知道，在工人当牛做马的旧社会，生产资料全部为资本家占有，而工人则一无所有，工人为了维持最低限度的生活，不得不将自己的劳动力当作商品出卖给资本家。产品越多，工人所受的剥削就越多越残酷。马克思曾极其深刻而形象地描绘了这一情景:生产资料的占有者——“资本家，昂首前行；劳动力所有者成了他的工人，尾随于后。一个笑容满面，雄心勃勃；一个战战兢兢，畏缩不前，象在市场上出卖了自己的皮一样，只有一个前途——让人家来鞣。”剥削者当“主人”，劳动者却是奴隶。在旧社会，历史就是这样的被颠倒!"},{"type":"paragraph","text":"全国解放后，毛主席和中国共产党把那种被颠倒的历史重新颠倒过来了。工人阶级成了我们社会主义国家的领导阶级，劳动人民做了国家的主人，那种做牛做马当奴隶的时代一去不复返了!在我们社会主义的港口，工人早已是码头的主人。“四人帮”喊出这个似乎很“革命”的口号，除了蛊惑人心，愚弄工人之外，还能说明什么呢?"},{"type":"paragraph","text":"问题的关键还在于所谓“不做吨位的奴隶”。马克思说过:“每个小孩子都知道，一个民族如果停止工作，——不用说是停止一年，就是只停止几个星期——就会饿死的。”我们的社会主义企业，必须以生产为中心；社会主义企业中的工人，必须以主要的精力从事生产。在码头，就是要抓吨位。这正是工人成为工厂企业的主人的一个突出的表现，也是广大工人都懂得的极其普通的常识。“四人帮”却把“主人”和“吨位”蓄意对立，制造混乱，似乎抓了吨位，就破坏了主人的地位，就是做“奴隶”，这不是对工人的莫大污辱吗?"},{"type":"paragraph","text":"不抓生产，不抓吨位，不抓平方米，没有巩固的物质基础，社会主义制度又怎么能巩固呢?按照“四人帮”的逻辑，只有游手好闲，什么活也不干的，才算是“主人”。而勤勤恳恳抓生产的，都只能当“奴隶”。但是，这样的“主人”，岂不就是“四人帮”网罗的角刺兼备的翁森鹤、陈阿大这样的新生资产阶级分子吗?如果这些人成了码头的“主人”，中国就将出现资本主义复辟，人剥削人的制度又将卷土重来，工人群众就真又要做牛做马当奴隶。“四人帮”的这一假左真右的口号的反动性也就在这里。"},{"type":"paragraph","text":"“四人帮”炮制的这一假左真右的口号，在上海港，在上港五区，造成的恶果是十分严重的。它成了砸向广大工人的一根棍子，谁要搞生产，就被讽刺为“老奴隶”、“瞎眼黄牛”、“小绵羊”，群众大干社会主义的积极性受到了严重的挫伤。码头上出现了干部不敢管生产，生产指挥系统失灵，生产不讲指标，干多少算多少，不干也没人管的混乱局面。一九七四年以后的一段时间里，上港五区的生产走了下坡路，年吞吐量递减百分之十，成本平均递增百分之十八。可见，“四人帮”高喊这一反动口号的目的，就是要搞垮我国国民经济，使我们工人重新回到旧社会的奴隶地位。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"name":"上海文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2548b94bc0"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
