script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"阿根廷农民游行集会抗议垄断集团残酷剥削","authors":[],"dates":[{"year":1972,"month":2,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"阿根廷农民游行集会抗议垄断集团残酷剥削"},{"type":"paragraph","text":"阿根廷东北部几个省的一万多名农民一月三十一日举行示威游行，抗议垄断集团压低农产品价格，残酷剥削农民。"},{"type":"paragraph","text":"这一天，查科省、圣菲省、福莫萨省和密西昂奈斯省的农民乘坐六百辆卡车从四面八方赶到查科省省会雷西斯滕西亚举行了大会。农民领导人在会上讲话，反对美国控制的一些垄断集团从国外进口纤维以压低棉花的收购价格。会上讲话的代表还抗议当局对农业缺乏保护政策。"},{"type":"paragraph","text":"大会在向查科省省长发出的一份备忘录中说，农民们坚决反对所有那些剥削农民和其他劳动人民的人。如果农民提出的要求得不到解决，农民们将采取必要的措施，甚至举行总罢工。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"02e38b9b1a"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
