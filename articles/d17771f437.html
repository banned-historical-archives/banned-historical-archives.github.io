script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"“学校领导外行说内行话”","authors":["中国人民大学","于云鹏","佟骏","傅铁城","吴家麟","王向明","王鸿章"],"dates":[{"year":1957,"month":5}],"is_range_date":false,"parts":[{"text":"“学校领导外行说内行话”","type":"title"},{"text":"中国人民大学王向明傅铁城于云鹏王鸿章吴家麟佟骏","type":"authors"},{"text":"“老干部不学无术，不懂装懂，指手划脚，用行政命令代替学术的领导。教研室领导是滥竽充数。学校各级领导是外行说内行话。”他主张“要有真才实学的人来领导”，他崇拜旧法人员，认为“右派分子钱端升，楼邦彦有学问能领导”。（中国人民大学法律系讲师  王向明的材料）","type":"paragraph"},{"text":"“党在领导科学、文化、教育是无能的，应该让位。党内缺少无产阶级知识分子不得不拉资产阶级文人，而利用改造的办法，不如让其领导。”（中国人民大学历史系学生　傅铁城）","type":"paragraph"},{"text":"“中央干部必须有文化才能领导国家……工农当然不行了……高级知识分子大多数有修养，而工农能这样吗？”（中国人民大学哲学系学生  于云鹏）","type":"paragraph"},{"text":"“党员什么都行，没有拿过试管的可以领导化学。”（中国人民大学计划系学生　王鸿章）","type":"paragraph"},{"text":"吴家麟在发言时谩骂教研室主任刘国勋同志是“大独裁者专制统治，小学毕业，中学程度，不学无术，一窍不通，胸无点墨，不懂装懂。”“这学期老干部讲课是全线崩溃。”“党的干部政策是：唯党，党亲，唯资。一脚踢开老法学家。”认为“老干部不适合做高等学校的工作。老农并不等于农学家。”（中国人民大学法律系讲师  吴家麟的材料）","type":"paragraph"},{"text":"“党不能也不应该领导科学、艺术。我们目前对科学艺术的领导是外行领导内行，科学艺术是个人事业，可以自成学派，可以自己建文体系，科学家艺术家可以自由结社，这是科学艺术的特点，党不应去管。”（中国人民大学马列主义研究班研究生  佟骏）","type":"paragraph"},{"text":" 来源：《高等学校右派言论选编》（中共中国人民大学委员会，1958年8月）。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d17771f437"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
