art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"要闻简报","authors":[],"parts":[{"type":"paragraph","text":"金日成主席接见《人民日报》代表团"},{"type":"paragraph","text":"朝鲜人民的伟大领袖金日成主席五月三十日上午接见了以总编辑胡绩伟为团长的《人民日报》代表团，同他们进行了十分亲切友好的谈话。"},{"type":"paragraph","text":"金日成主席说：“华国锋主席访问我国以后，你们紧接着来，很有意义。我们是一家人。”"},{"type":"paragraph","text":"接见前，金日成主席同代表团同志们一起照了像。"},{"type":"paragraph","text":"邓小平副总理会见阿根廷经济部长"},{"type":"paragraph","text":"邓小平副总理五月三十日上午会见了阿根廷共和国经济部长何塞·阿·马丁内斯·德奥斯博士。"},{"type":"paragraph","text":"会见时，邓小平副总理同马丁内斯·德奥斯部长进行了亲切友好的谈话。马丁内斯·德奥斯部长对邓小平副总理说，我和我的代表团能有机会来中国访问感到很高兴。我们对这次访问很有兴趣。我们希望通过访问来扩大我们两国多方面的互利的合作。"},{"type":"paragraph","text":"邓小平副总理对马丁内斯·德奥斯部长率领大型的经济代表团来中国访问表示热烈欢迎。他说，我们愿意同拉美国家加强相互来往，增进彼此了解。我们两国的贸易交往很有发展前景。我们都愿意扩大我们两国经济和其它领域之间的友好合作关系。"},{"type":"paragraph","text":"李先念副总理会见多哥水电代表团"},{"type":"paragraph","text":"国务院副总理李先念五月三十日下午会见了多哥水电代表团。"},{"type":"paragraph","text":"会见时，李先念副总理同代表团团长、多哥矿业、动力、水利资源部长艾·加·米维多，副团长、多哥农村发展部长道·尼翁富等多哥朋友进行了亲切友好的谈话。谈话中，米维多部长向李先念副总理转达多哥总统纳辛贝·埃亚德马将军对华国锋主席的问候，转达多哥人民对中国人民的友好情谊。李先念副总理对此表示感谢并请米维多部长回国后转达华国锋总理对埃亚德马将军的问候。（据新华社）"},{"type":"paragraph","text":"中尼边界联检会议圆满结束"},{"type":"paragraph","text":"新华社加德满都五月三十日电 中尼边界联合检查委员会中国代表团在参加委员会第一次会议以后，今天上午离开加德满都回国。"},{"type":"paragraph","text":"中尼边界联合检查委员会第一次会议于五月十七日至二十八日在加德满都举行。"},{"type":"paragraph","text":"据会议结束后双方发表的新闻公报说：“会议是在非常友好和亲切的气氛中进行的。会议讨论了有关检查、修理和重建中尼边界损坏的界桩问题，以及以更大比例绘制新的边界地图的问题。”"},{"type":"paragraph","text":"公报接着说：“鉴于中尼边界是友好的边界，自从两国划定边界以来没有发生领土争议，双方已经在所有方面达成协议。”协议已于五月二十八日由双方首席代表签字。"},{"type":"paragraph","text":"中国阿根廷两国政府贸易协定正式生效 文件的纪要和两国政府海运协定在京签字"},{"type":"paragraph","text":"据新华社五月三十日讯 我国外贸部长李强和交通部长叶飞今天下午分别同阿根廷共和国经济部长何塞·阿·马丁内斯·德奥斯博士签署了关于交换中国和阿根廷两国政府贸易协定正式生效文件的纪要和两国政府海运协定。"},{"type":"paragraph","text":"陈慕华副总理出席了签字仪式，并在签字仪式前会见了马丁内斯·德奥斯部长和由他率领的阿根廷经济代表团，同他们进行了亲切友好的谈话。"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"华国锋","type":"人物"},{"name":"李先念","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"43b8b9b31d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
