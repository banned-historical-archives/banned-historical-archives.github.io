ical-archives/banned-historical-archives0/main/maoquanji38.pdf"],"article":{"title":"给刘松林的信","alias":"","parts":[{"type":"paragraph","text":"给刘松林\"的信"},{"type":"paragraph","text":"（1957年8月4日）思齐儿："},{"type":"paragraph","text":"信收到。回来了，很高兴。"},{"type":"paragraph","text":"转学事是好的，自己作主，向组织申请，得允即可。如不得允，仍去苏联，改学文科，时间长一点也不要紧。不论怎样，都要自己作主，不要用家长的名义去申请，注意为盼。"},{"type":"paragraph","text":"祝你进步"},{"type":"paragraph","text":"父亲"},{"type":"paragraph","text":"八月四日"},{"type":"paragraph","text":"[1]刘松林，原名刘思齐，1949年10月同毛泽东之子毛岸英结婚。1950年11月毛岸英在抗美援朝战争中牺牲。1955年刘松林去苏联，在莫斯科大学数力系读书。1957年暑假回国办理转学手续。同年10月转入北京大学俄罗斯语言文学系读书。"}],"authors":["毛泽东"],"dates":[{"year":1957,"month":8,"day":4}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":201,"page_end":201},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e53b086b97"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
