" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中央组织部关于留学生政治审查的标准条件及审查程序的通知（摘录）","authors":[],"dates":[{"year":1953,"month":6,"day":4}],"is_range_date":false,"parts":[{"text":"中央组织部关于留学生政治审查的标准条件及审查程序的通知（摘录）","type":"title"},{"text":"……，现再将中央已经批准的对于留学生政治审查的标准、条件及审查程序，通知如下，望转达有关单位，遵照执行：","type":"paragraph"},{"text":"一、关于选拔留学生的政治审查标准，必须完全具备下列条件者，始能当选：","type":"subtitle"},{"text":"（1）历史清楚，政治上可靠，思想进步者；","type":"paragraph"},{"text":"（2）学习工作积极努力，品质优良，有培养前途者；","type":"paragraph"},{"text":"（3）家庭成员与主要社会关系，无反革命问题者。","type":"paragraph"},{"text":"根据以上标准，凡具有下列条件之一者，均不能选派出国学习：","type":"paragraph"},{"text":"（1）历史上曾主动，积极参加过反动组织和反动活动者；","type":"paragraph"},{"text":"（2）历史不清，或尚有可疑的情节者；","type":"paragraph"},{"text":"（3）解放后仍有反动言行者；","type":"paragraph"},{"text":"（4）品质恶劣，或培养前途不大者；","type":"paragraph"},{"text":"（5）在反动组织中任过重要职务之人员的子女，本人思想界限不清，无显著进步者；","type":"paragraph"},{"text":"（6）家庭成员和主要社会关系，现在资本主义国家或香港、澳门、台湾等地，从事反革命活动或政治面目可疑、与本人关系密切、对其确有影响者；","type":"paragraph"},{"text":"（7）直系亲属（祖父母、父母、兄弟姐妹、夫或妻）被我处死或扣押者；","type":"paragraph"},{"text":"（8）直系亲属对我敌视或被我管制，或主要社会关系被我处死、扣押对本人影响较大者；","type":"paragraph"},{"text":"（9）本人社会关系（直接的）复杂，交代不清，有可疑情节者。","type":"paragraph"},{"text":"（二）关于审查程序问题：","type":"subtitle"},{"text":"（1）选送留学生的各基层单位（机关、学校、企业）的党、团、行政方面必须以认真负责的精神作好选拔与审查工作，一方面要选拔在政治上及学业上表现真正优秀的人员，另方面要尽量搜集拟选拔人员的历史材料与旁证材料，作出负责的结论。","type":"paragraph"},{"text":"（2）在基层单位选拔之后，应由基层单位所在地方党委负责指导当地人事、公安等部门及青年团组织。进行复审。经复审认为合格者，应由党委书记或副书记签字盖章。","type":"paragraph"},{"text":"（3）被选拔的留学预备生，进入北京俄专后，对他们应继续搜集材料，进行审查。在出国之前，必须经过以中央人事部为主的会同中央公安部、北京俄专二部的联合审查；其中学习机密科系者，再经中央公安部审查，最后决定出国与否。","type":"paragraph"}],"comments":[],"origin":"摘自《组织工作文件选编》，转载于铁道部政治部审干办公室《审干工作政策选编》， 1982年9月。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f84d26413f"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
