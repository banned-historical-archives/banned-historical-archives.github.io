tes":[{"year":1997,"month":6,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社北京6月8日电　(记者曹剑杰)力克王励勤和孔令辉两位实力派选手后进入中国乒乓球全明星赛决赛的马文革，今天，下午在这里出人意料地栽在马林的拍下。年仅17岁的马林凭借旋转各异的发球和凶狠的正手弧圈球，以3:0战胜29岁的马文革，赢得全明星赛男单冠军。"},{"type":"paragraph","text":"排名世界第九的王晨苦战五局击败国家二队的崔晨梅，获得全明星赛女单冠军。崔晨梅获亚军。"},{"type":"paragraph","text":"右手直握球拍的马林是在淘汰了世乒赛男单季军阎森和张勇后进入决赛的，面对实力比自己高出一筹的马文革，马林敢于起板抢拉，常压得对手不得不离台回球。另外，马林的正手发球动作小，隐蔽性强，使得马文革经常判断失误，为自己创造“一锤定音”的机会。最后，马林以21:18、21:19和21:17取胜，并获得一万元冠军奖金。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9c40a0a78a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
