<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"发放农贷是为了支持生产  中国农业银行领导干部认为，要管理好农村信贷工作，必须肃清极左路线流毒，注意讲求经济效果","authors":[],"dates":[{"year":1979,"month":10,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"发放农贷是为了支持生产"},{"type":"paragraph","text":"中国农业银行领导干部认为，要管理好农村信贷工作，必须肃清极左路线流毒，注意讲求经济效果"},{"type":"paragraph","text":"新华社北京十月二十八日电 中国农业银行领导干部最近在研究农村金融工作时一致认为，要搞好农村金融工作，按照经济规律管理经济、管理信贷，必须肃清极左路线的流毒，打破过去由于批判所谓“贷富不贷贫”而造成的思想禁区。"},{"type":"paragraph","text":"他们说，过去在一个相当长的时间里，批判农村信贷工作“贷富不贷贫”，使一些人错误地认为，农业贷款只有给穷队、穷户才是正确路线，贷给富队，支持社员发展家庭副业就是资本主义。由于这个错误观点至今没有澄清，仍在影响农村金融工作的正确开展。不少农村金融工作者不敢大胆地把农业贷款主要用于支持社队发展商品经济。穷队需要贷款，即使不符合政策，他们照样贷给，结果一些穷队靠贷款过日子。"},{"type":"paragraph","text":"许多地区发放农业贷款只强调钱物结合，不注意贷款的经济效果。有的人对于“有借有还”这一信贷基本原则，也看成是修正主义的东西，片面地认为发放贷款是支持生产，收回贷款就是不支持生产。许多银行、信用社干部讲贷款发放理直气壮，讲收回贷款顾虑重重，造成大批农业贷款无法发挥作用。"},{"type":"paragraph","text":"中国农业银行指出，农业贷款资金的主要来源是存款，必须归还；而要归还就要发展商品生产，卖了产品，有了收入，才能归还。如果把贷款用于赈济，没有商品生产，自己吃的还不够，靠贷款过日子，那就不能归还。因此，农业贷款不能用于赈济，必须到期收回，这是办银行、管贷款的最起码的条件。我们强调按照经济规律发放贷款，就是要讲求经济效果。凡是符合党的方针政策，实现了增产增收，创造了物质财富，扩大了资金的来源的，不论是穷队还是富队，农业银行、信用社都应该发给贷款。如果有的社队使用贷款不能做到增产增收，而是靠贷款过日子，银行、信用社就不应再给他们发放贷款。"},{"type":"paragraph","text":"农业银行还指出，我们应该明确地树立这样一个观点：发放贷款是为了支持生产。收回到期贷款，加速银行资金的周转，也是为了支持生产。“发”与“收”是一件事情的两个方面，偏废任何一面都是错误的。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"17971c102e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
