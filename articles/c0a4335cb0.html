送行","authors":[],"dates":[{"year":1975,"month":12,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京一九七五年十二月五日电　美利坚合众国总统杰拉尔德·福特，结束了在中国的访问，今天上午乘专机离开北京。"},{"type":"paragraph","text":"福特总统的夫人贝蒂·福特、女儿苏珊·福特，国务卿亨利·基辛格博士，以及随同福特总统来访的其他人员，也于今天离开北京。"},{"type":"paragraph","text":"国务院副总理邓小平、李先念，人大常委会副委员长吴德、李素文，外交部长乔冠华，外贸部长李强，中国驻美国联络处主任黄镇，以及林佳楣同志，到机场送行。"},{"type":"paragraph","text":"在飘扬着美国国旗和中国国旗的首都机场上，举行了欢送仪式。乐队奏美国国歌和中国国歌。福特总统由邓小平副总理陪同，检阅了中国人民解放军陆、海、空三军仪仗队。"},{"type":"paragraph","text":"到机场送行的还有政府部门、北京市革命委员会等有关方面的负责人王海容、朱穆之、谢静宜、严佑民、刘澄清、王曼恬、姜惠莲、路金栋、刘华清、刘存信、邓岗、王冶秋、刘传新、章含之、朱霖、林平、秦加林、朱传贤，以及各界访美人士二百余人。"},{"type":"paragraph","text":"美国驻中国联络处主任乔治·布什和夫人以及联络处官员，也到机场送行。"},{"type":"paragraph","text":"\u003cIMG alt=请插入6号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1975\\12\\75c6010401.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e美利坚合众国总统杰拉尔德·福特，结束了在中国的访问，十二月五日乘专机离开北京。"},{"type":"paragraph","text":"国务院副总理邓小平、李先念，人大常委会副委员长吴德、李素文等到机场送行。图为邓小平副总理和福特总统在机场握手。"},{"type":"paragraph","text":"新华社记者摄"},{"type":"paragraph","text":"(传真照片)\u003c/FONT\u003e"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"吴德","type":"人物"},{"name":"李先念","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c0a4335cb0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
