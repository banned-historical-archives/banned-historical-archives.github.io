rt":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"周恩来总理陈毅副总理回到北京朱德邓小平等领导人到机场热烈欢迎","authors":["张彬"],"parts":[{"type":"paragraph","text":"朱德、邓小平、彭真、贺龙、李先念、谭震林、康生、聂荣臻、罗瑞卿、杨尚昆、刘宁一、谢富治等领导人，到机场热烈欢迎。"},{"type":"paragraph","text":"到机场欢迎的，还有各方面的负责人邓颖超、廖承志、徐冰、方毅、张奚若、章汉夫、罗贵波、徐子荣、李昌、孔原、林海云、李天佑、张彦、姬鹏飞、曾涌泉、王炳南、韩念龙、刘新权、邹大鹏、龚子荣、吴冷西、张凯、李玉奎、汪道涵、梁必业、萧向荣、张天云、刘少文、余立金、杜义德、万里、张铁生等。"},{"type":"paragraph","text":"阿联驻中国大使馆临时代办穆罕默德·加麦尔·埃丁·哈利勒，阿尔及利亚驻中国大使馆临时代办穆罕默德·胡利，也到机场欢迎。"},{"type":"paragraph","text":"据新华社乌鲁木齐七日电周恩来总理、陈毅副总理和随行人员今天上午乘专机离开乌鲁木齐回北京。"},{"type":"paragraph","text":"下图周恩来总理、陈毅副总理以及随行人员，同前往欢迎的我国领导人朱德、邓小平、彭真、贺龙、李先念、谭震林、康生、聂荣臻、罗瑞卿、杨尚昆、刘宁一、谢富治等以及阿联驻华大使馆临时代办穆罕默德·加麦尔·埃丁·啥利勒（右八）、阿尔及利亚驻华大使馆临时代办穆罕默德·胡利（右九）在机场合影。"},{"type":"paragraph","text":"新华社记者张彬摄RW：周恩来；总理；访问归来； 陈毅；副总理；访问归来"}],"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"谢富治","type":"人物"},{"name":"康生","type":"人物"},{"name":"邓小平","type":"人物"},{"name":"贺龙","type":"人物"},{"name":"陈毅","type":"人物"},{"name":"刘宁一","type":"人物"},{"name":"李先念","type":"人物"},{"name":"聂荣臻","type":"人物"},{"name":"谭震林","type":"人物"},{"name":"彭真","type":"人物"},{"name":"罗瑞卿","type":"人物"},{"name":"朱德","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c7590c4d5a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
