rs":[],"dates":[{"year":1957,"month":10,"day":1}],"is_range_date":false,"parts":[{"text":"中山大学右派言论之五：其他反动言论","type":"title"},{"text":"对台湾刘自然事件，美国兵屠杀我国同胞，唐友伦说：“美国人不是疯子，不会平白无故杀人。”","type":"paragraph"},{"text":"解放台湾一定会引起第三次世界大战。（谭寄南）","type":"paragraph"},{"text":"蒋介石统治中国时，不是为了压迫剥削人民，也不是为了升官发财，是为了实现其理想。（卢永荛）","type":"paragraph"},{"text":"中华民族最愚蠢，胡适最有天才。（刘法生）","type":"paragraph"},{"text":"印度尼西亚有石油我们去进攻它。（杨熙旭）","type":"paragraph"},{"text":"阿尔巴尼亚工业发展快是因为基数低；美国基数高所以发展慢。（郑家安）","type":"paragraph"},{"text":"资产阶级有好人，无产阶级有坏人。（郑家安）","type":"paragraph"},{"text":"人本身没有价值，而是社会给予的。（王劲常）","type":"paragraph"},{"text":"高饶事件是去东北的苏联专家写信给斯大林，斯大林打电报给毛泽东，毛泽东下命令才搞起来的。（戴易林）","type":"paragraph"},{"text":"如果我能跑出国去，我愿意去，凭着我的军事知识，将来如果有战争发生，不管那方面只要有钱给我，我就愿意到战场上去卖命，拼死了也算是痛快。（罗木公）","type":"paragraph"},{"text":"一些体弱多病和生得不好看的人都要杀掉，妇女要回到厨房去。（罗木公）","type":"paragraph"},{"text":"学医的好处就是毕业后如果能自由开业，就可以赚到很多很多钱。（陈贞忠）","type":"paragraph"},{"text":"九龙事件我外交部发表声明抗议不起作用，当放屁。（岑澜）","type":"paragraph"}],"comments":[],"origin":"中共中山大学委员会宣传部编: 《中山大学右派言论汇编（一）》，1957年10月。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"39bc9b9f3c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
