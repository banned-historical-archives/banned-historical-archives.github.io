问题","authors":[],"dates":[{"year":1967,"month":5,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"西巴基斯坦出版《中国的无产阶级文化大革命》小册子"},{"type":"paragraph","text":"文化大革命解决了巩固无产阶级专政问题"},{"type":"paragraph","text":"新华社拉瓦尔品第电　在西巴基斯坦首府拉合尔最近出版的一本小册子指出，毛泽东主席亲自发动和领导的中国无产阶级文化大革命，“肯定是对马克思列宁主义最富有创造性的运用，是对马克思列宁主义理论宝库的极其珍贵的贡献”，“是对全世界革命的工人阶级的巨大贡献”。"},{"type":"paragraph","text":"这本名叫《中国的无产阶级文化大革命》的乌尔都文小册子指出：由伟大的列宁在十月革命中缔造的第一个社会主义国家——苏联，由于苏联人民的内外敌人的阴谋活动，目前已经被现代修正主义分子所控制，美帝和苏修竭力想通过它们在中国的走狗和修正主义分子迫使中国放弃她的革命立场而断送中国革命。由毛泽东主席领导的文化大革命，挫败了它们的阴谋诡计。"},{"type":"paragraph","text":"这本小册子还说：这场文化大革命解决了在社会主义社会建立以后，如何保卫和巩固无产阶级专政的问题；而这个问题是其它国家和共产党还没有解决的。由于中国文化大革命，中国将永远是被压迫民族和被压迫阶级的最大的革命旗手，并将更有力地领导世界无产阶级的革命运动。"},{"type":"paragraph","text":"这本小册子说：毛泽东主席的思想象疾风一样吹遍全世界。这是中国文化大革命和毛泽东主席领导下的中国共产党对世界工人阶级作出的巨大贡献。现在，学习马克思列宁主义，应当从学习毛泽东思想开始。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a38fbd9e09"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
