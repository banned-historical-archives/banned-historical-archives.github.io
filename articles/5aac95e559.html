art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"向广大群众宣传毛主席的革命路线","authors":["政文/伍龙山/剑政宣/思而轩"],"parts":[{"type":"paragraph","text":"活跃在太原市区"},{"type":"paragraph","text":"山西省军区直属机关和所属部队广大指战员，响应毛主席关于人民解放军应该积极支持左派广大群众的伟大号召，组成了一支三百多人的文艺宣传队伍，在太原市区，敲锣打鼓，浩浩荡荡地走上街头、车站，深入厂矿、学校和农村，展开了广泛的宣传活动。"},{"type":"paragraph","text":"为了使宣传紧密配合文化大革命的形势，他们不怕苦，不怕累，在短短的几天时间里，就编写了快板、诗歌、表演唱等短小精悍的文艺节目三十多个。他们每到一地，都受到了广大群众的热烈欢迎。每一个节目都被“毛主席万岁！万万岁！”的口号声和热烈的掌声打断。（政文）"},{"type":"paragraph","text":"深入到农村山庄"},{"type":"paragraph","text":"在无产阶级文化大革命进入夺权斗争的新形势下，三二一四部队坚决响应毛主席关于人民解放军应该积极支持左派广大群众的伟大号召，组织宣传队，排练了六十多个适应新形势的文艺节目，向农村人民公社社员宣传毛主席的无产阶级革命路线，表示积极支持革命派的革命行动。广大社员看了宣传队的演出后，人人欢欣鼓舞，拍手叫好。社员们说：“解放军把毛主席的声音带到我们深山沟来了！”“毛主席和革命群众心连心，心贴心！”“我们坚决站在毛主席的无产阶级革命路线一边！”（伍龙山、报道组）"},{"type":"paragraph","text":"热情接待兄弟民族"},{"type":"paragraph","text":"七六○四部队哨所附近的公路上，经常有藏族、纳西族和白族等兄弟民族的群众来来往往。哨所的同志在公路旁设了一个开水站，站里贴着毛主席像和毛主席语录，摆了毛主席著作。他们还在大树上挂了毛主席语录牌，专供来往的革命群众阅读。革命群众每次路过这里，他们都热情接待，向革命群众传播毛泽东思想。毛主席号召无产阶级革命派大联合，夺走资本主义道路当权派的权，他们就热情宣传大联合、大夺权的伟大意义。革命造反派的同志激动地说：解放军对我们革命造反派最关心，最支持，真是毛主席的好战士。（剑政宣、思而轩）"}],"alias":""},"tags":[{"name":"夺权","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5aac95e559"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
