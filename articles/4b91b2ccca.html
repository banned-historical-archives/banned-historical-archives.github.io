rt":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"努伊拉总理和夫人离京去上海访问我国领导人张春桥倪志福等到机场欢送 李井泉副委员长陪同前往","authors":[],"parts":[{"type":"paragraph","text":"新华社一九七五年四月四日讯 突尼斯共和国总理赫迪·努伊拉和夫人以及随同来访的突尼斯贵宾由人大常委会副委员长李井泉陪同，今天上午乘专机离开北京前往上海参观访问。"},{"type":"paragraph","text":"到机场热烈欢送突尼斯贵宾的有：我国领导人张春桥、倪志福，人大常委会委员林巧稚，有关方面负责人王海容、何英、顾明、陈慕华、刘建章、马耀骥、姚成庆、朱传贤、周觉和首都群众数千人。"},{"type":"paragraph","text":"首都机场上飘扬着中国国旗和突尼斯国旗。隆重的欢送仪式开始，乐队奏突尼斯国歌和中国国歌。努伊拉总理由张春桥副总理陪同检阅了中国人民解放军陆、海、空三军仪仗队。当努伊拉总理和夫人等突尼斯贵宾同欢送群众告别时，人们敲锣打鼓，高呼口号，欢送贵宾。在飞机弦梯旁，张春桥、倪志福等同努伊拉总理和夫人等贵宾一一握手告别。"},{"type":"paragraph","text":"各国驻中国使节，突尼斯驻中国大使馆的外交官员，也到机场送行。"},{"type":"paragraph","text":"陪同努伊拉总理和夫人前往上海的还有我国外交部礼宾司副司长傅顺和，突尼斯驻中国大使克利比和夫人。"}],"alias":""},"tags":[{"name":"张春桥","type":"人物"},{"name":"上海文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4b91b2ccca"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
