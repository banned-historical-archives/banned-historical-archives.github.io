比前年增加百分之十三，比文化大革命前的六五年增加一倍以上","authors":[],"dates":[{"year":1975,"month":2,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京一九七五年二月十一日电　中国人民银行新近提供的材料表明，一九七四年全国城乡储蓄超过了历年增长水平，存款总额比一九七三年增加百分之十三，比无产阶级文化大革命前的一九六五年增加一倍以上。"},{"type":"paragraph","text":"河北、湖南、湖北、黑龙江、吉林、云南、新疆和青海等省、自治区新增加的存款，比一九七三年增加的存款多出百分之三十到八十。北京、上海、天津的储户去年增加了六十多万户。西藏自治区去年农村存款总额比一九六五年增加了十倍以上。西藏安多县布曲公社在民主改革前，全乡八十二户中有七十二户常年依靠国家救济生活；民主改革后，生产迅速发展，广大翻身农奴生活越来越好，到一九七四年八月底，全乡百分之七十九的家庭有了手表、半导体收音机和闹钟等，平均每户还有存款一千四百元。"},{"type":"paragraph","text":"全国城乡储蓄存款的增加，反映了在批林批孔运动普及、深入、持久发展的大好形势下国家兴旺发达，反映了人民生活安定和提高，也反映了勤俭节约新风尚的发扬光大。"},{"type":"paragraph","text":"各地人民银行和信用社在批林批孔运动中进一步加强了勤俭节约，支援社会主义建设的宣传。上海南市区办事处配合地区党委发动群众破旧俗立新风，去年全区居民参加储蓄的户数和金额，都比前年增加百分之二十三。湖北省监利县龚场公社信用社在公社党委领导下，组织带头实行晚婚、不收聘礼的女青年巡回宣传，推动全公社展开了群众性的破旧立新、移风易俗的活动。全公社有四十五名女青年很快退了聘礼，并且把原来准备结婚用的钱存入信用社，支援社会主义建设。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"湖北文革","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"西藏文革","type":"人物"},{"name":"批林批孔","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bcc8909e47"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
