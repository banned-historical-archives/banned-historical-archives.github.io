thors":[],"dates":[{"year":1980,"month":3,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"《回忆少奇同志》一书出版发行"},{"type":"paragraph","text":"《红旗飘飘》回忆刘少奇同志文章专辑也将出版"},{"type":"paragraph","text":"据新华社北京三月十五日电　中国青年出版社为了向广大青年介绍刘少奇同志的革命斗争事迹，最近编辑了两本关于刘少奇同志的回忆录，一本是"},{"type":"paragraph","text":"《回忆少奇同志》，已经出版发行；另一本是回忆刘少奇同志的文章专辑——《红旗飘飘》第二十集，也将出版。中国青年出版社印刷厂的职工为赶印这两本书，进行了紧张的劳动。"},{"type":"paragraph","text":"《回忆少奇同志》一书，收集了张爱萍、马文、吕振羽等七位同志写的六篇文章：《真理的启示》、《在刘少奇同志身边》、《回忆往事——少奇同志在中央苏区的片断》、《刘少奇同志在中央苏区》、《少奇同志在淮北抗日敌后》、《跟随少奇同志回延安》，反映了刘少奇同志在安源、中央苏区和抗日战争等几个时期的一些革命事迹，全书约十一万字。"},{"type":"paragraph","text":"《红旗飘飘》第二十集专辑，近二十万字。徐向前同志为这个专辑题了词，题词全文是：“刘少奇同志光辉的革命业绩，是我们学习的典范！”专辑的文章作者中，有肖劲光、杨献珍、陈克寒、刘英、师哲、王林、郭明秋、岳夏等革命老干部，还有吴振英、刘振德等二十多位在少奇同志身边工作过的秘书、警卫人员、医务人员。"},{"type":"paragraph","text":"这两本书都收有刘少奇同志的照片若干幅。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4238462712"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
