tart":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"贫下中农无限热爱毛主席 无比仇恨中国赫鲁晓夫沈阳某部八连干部战士走访人民公社，喜看大好形势","authors":[],"parts":[{"type":"paragraph","text":"沈阳部队某部八连在人烟稀少、驻地分散的农场生产。党支部根据部队分散的特点，运用群众路线的教育方法，充分发动群众采取读报、听广播、召开批判会、颂扬会、讲用会、现身说法等方法，组织部队学习形势。连排还成立了形势教育指导小组，班里有形势报告员，做到连里讲，排里讲，干部讲，战士讲，大讲特讲无产阶级文化大革命的大好形势，大讲特讲伟大领袖毛主席的丰功伟绩，大讲特讲毛泽东思想的伟大胜利，大讲特讲毛主席无产阶级革命路线的伟大胜利。"},{"type":"paragraph","text":"党支部还利用战士家信，请来队家属介绍，向社会调查、访问，加强对部队的形势教育。他们组织干部战士走访人民公社，参加社员的家庭批判会。大家亲眼看到农村革命大批判搞得轰轰烈烈，广大贫下中农无限热爱毛主席，无比仇恨中国赫鲁晓夫。干部战士受到了一次生动的形势教育，无不满怀激情地欢呼毛泽东思想的伟大胜利。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"297fa5855e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
