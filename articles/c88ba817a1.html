art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席等会见十二个社会主义国家代表团","authors":[],"parts":[{"type":"paragraph","text":"新华社三十日讯 毛泽东主席同刘少奇、宋庆龄、董必武、朱德、周恩来、邓小平等党和国家领导人，今天分批会见了十二个社会主义国家的代表团。"},{"type":"paragraph","text":"他们是：由朝鲜劳动党中央委员会政治委员会委员、朝鲜劳动党中央委员会副委员长、朝鲜民主主义人民共和国最高人民会议常任委员会委员长崔庸健和朝鲜劳动党中央委员会政治委员会委员、朝鲜劳动党中央委员会副委员长朴金喆率领的朝鲜民主主义人民共和国党政代表团，由越南劳动党中央政治局委员、越南民主共和国政府总理范文同率领的越南民主共和国党政代表团，由罗马尼亚工人党中央委员会政治局委员、罗马尼亚人民共和国部长会议主席、国务委员会副主席扬·格奥尔基·毛雷尔率领的罗马尼亚人民共和国党政代表团，由阿尔巴尼亚劳动党中央政治局委员、阿尔巴尼亚人民共和国部长会议第一副主席兼国防部部长贝基尔·巴卢库上将率领的阿尔巴尼亚人民共和国党政代表团，由苏联共产党中央主席团候补委员、全苏工会中央理事会主席维·瓦·格里申率领的苏联党政代表团，由古巴社会主义革命统一党哈瓦那省委员会组织书记伊西多罗·马尔米埃尔卡·佩奥里率领的古巴党政代表团，由蒙古人民共和国部长会议第一副主席索·鲁布桑率领的蒙古人民共和国政府代表团，由德意志民主共和国部长会议副主席兼外交部长洛塔·博尔茨率领的德意志民主共和国政府代表团，由匈牙利《人民自由报》编辑委员会主席、匈牙利社会主义工人党中央政治局委员科莫钦·佐尔坦率领的匈牙利人民共和国代表团，由波兰人民统一阵线全波委员会主席团委员和书记维托德·雅罗辛斯基率领的波兰人民统一阵线全波委员会代表团，由捷克斯洛伐克工会中央理事会书记瓦茨拉夫·帕歇克率领的捷克斯洛伐克代表团，由保加利亚对外友好与文化联络委员会中国部主席、人民代表迪米特尔·迪莫夫率领的保加利亚代表团。"},{"type":"paragraph","text":"参加会见的，还有党和国家其他领导人彭真、陈毅、李富春、贺龙、李先念、柯庆施、谭震林、乌兰夫、陆定一、康生、薄一波、李雪峰、罗瑞卿、杨尚昆、林枫、邓子恢等。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c88ba817a1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
