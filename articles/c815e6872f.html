":[{"year":1968,"month":10,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席最新指示最合贫下中农的心愿"},{"type":"paragraph","text":"狼牙山五壮士之一、河南沁阳县北孔大队负责人　宋学义"},{"type":"paragraph","text":"在举国欢庆伟大的中华人民共和国成立十九周年的大喜日子里，在伟大的斗、批、改高潮中，伟大领袖毛主席发出了关于干部下放劳动的最新指示，这是对广大干部最大的关怀，最大的鼓舞，最大的教育，最大的鞭策，真说到俺贫下中农的心窝里了。"},{"type":"paragraph","text":"大海航行靠舵手，干革命靠毛泽东思想。"},{"type":"paragraph","text":"毛主席关于干部下放劳动的最新指示，为进一步搞好斗、批、改扫清了障碍，为广大干部同工农结合，重新学习指明了方向，是反修防修的千年大计、万年大计，是彻底改变干部精神面貌，促进干部思想革命化的根本途径，是使共产党人和革命干部同广大群众保持密切联系，免除官僚主义的确实保证，是进一步巩固工农联盟的重大措施。"},{"type":"paragraph","text":"早在一九四三年，毛主席就教导我们：“我们共产党人不是要做官，而是要革命，我们人人要有彻底的革命精神，我们不要有一时一刻脱离群众。只要我们不脱离群众，我们就一定会胜利。”回想在艰难困苦的抗日战争岁月里，我们之所以有力量，小米加步枪就能打败日本强盗的飞机加坦克，就在于我们的广大干部遵照毛主席的教导，能和广大人民群众紧密地团结在一起，全心全意地为人民服务。一九六四年，毛主席他老人家总结了国际共产主义运动的经验教训，又深刻地指出：干部参加集体生产劳动，“这是社会主义制度下一件带根本性的大事”。毛主席是中国共产党的伟大领袖，是工人阶级和劳动人民的伟大领袖，毛泽东思想最集中地代表了工人阶级和广大劳动人民群众的根本利益，毛主席的话句句是真理，字字闪金光，毛主席的最新指示，完全符合贫下中农的心愿。俺贫下中农最喜欢那些听毛主席话的，能上能下，能“官”能民，和俺贫下中农滚在一起的好干部；反对那些高高在上，指手画脚，爱摆架子，好当撒手掌柜的官老爷。劳动是革命干部的本色。干部要是老住大楼，坐机关，高高在上，发号施令，不参加劳动，就看不到群众的力量，摸不着群众的思想，体会不到群众的疾苦。日久天长，他们就会变得懒、馋、占、贪，舒舒服服地滑到修正主义的泥坑拔不出脚来。俺贫下中农对毛主席的最新指示一千个拥护，一万个照办，热烈欢迎干部下乡来和俺贫下中农同举一面旗——毛泽东思想伟大红旗，同学一本书——毛主席的书，同抓一条纲——阶级斗争这条纲，同站一条线——毛主席的革命路线，同走一条路——社会主义光明道路，同吃一锅饭，同干一样活，在毛泽东思想的光辉照耀下，在工人阶级的领导下，紧跟毛主席的伟大战略部署，认真搞好斗、批、改，同心协力搞好阶级斗争、生产斗争、科学实验三大革命运动，鼓足干劲，力争上游，多快好省地建设社会主义新农村。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c815e6872f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
