script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"澳共（马列）主席希尔同志在庆祝“五一”节群众大会上讲话  全世界人民竭尽全力扩大反美统一战线  工人阶级要解放只能依靠自己的力量和盟友的力量，决不能靠资产阶级议会","authors":[],"dates":[{"year":1971,"month":5,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"澳共（马列）主席希尔同志在庆祝“五一”节群众大会上讲话"},{"type":"paragraph","text":"全世界人民竭尽全力扩大反美统一战线"},{"type":"paragraph","text":"工人阶级要解放只能依靠自己的力量和盟友的力量，决不能靠资产阶级议会"},{"type":"paragraph","text":"新华社墨尔本电　澳大利亚共产党（马克思列宁主义）主席爱德华·弗·希尔同志于“五一”国际劳动节在墨尔本举行的群众大会上讲话，号召澳大利亚工人阶级团结起来，坚决地进行斗争，反对头号帝国主义——美帝国主义，反对美帝的侵略战争计划，反对美帝占领澳大利亚。他还表示坚决支持为反对美帝国主义这个头号敌人而进行斗争的各国人民。"},{"type":"paragraph","text":"希尔同志指出：“反对美帝国主义的斗争，对澳大利亚工人阶级和人民的斗争来说，是巨大的团结因素。明确地、毫不含糊地认清美帝国主义是头号敌人，有助于这一团结。坚持不懈地进行反对美帝国主义的斗争，就是建立起反对美帝国主义斗争的战斗团结。建立尽可能广泛的反对美帝国主义的统一战线，是当务之急。”"},{"type":"paragraph","text":"希尔同志赞扬了印度支那人民的抗美救国斗争、阿拉伯人民反对美帝及其工具以色列的斗争、拉丁美洲人民反对美帝的斗争、美国人民，特别是美国黑人的斗争、日本人民反对日本军国主义的斗争。"},{"type":"paragraph","text":"希尔同志接着指出：“印度支那人民为世界各国人民拿起枪杆子树立了光辉的榜样。的确是枪杆子里面出政权。必须承认这一点，承认这一点的人现在比过去任何时候都多。在这个问题上，最好的老师是美帝自己。”"},{"type":"paragraph","text":"希尔同志说，当前，美帝的危机比过去任何时候都深。必须竭尽全力扩大反美统一战线。人民能够消灭美帝，挫败它的战争计划。战争危险依然存在，但是主要倾向是革命。"},{"type":"paragraph","text":"他指出：“今天的世界形势是：一方面，武装解放斗争、社会主义的辉煌进展和资本主义国家内革命风暴的巨大发展；另一方面，以美帝和新沙皇为首的反动势力日趋没落。"},{"type":"paragraph","text":"“我们的斗争必须达到新的高度，同解放运动的武装斗争汇合起来，同社会主义（国家）人民（的斗争）汇合起来，同其他国家中的斗争汇合起来，从而使全世界反帝力量迅速形成最大的力量。毛主席说：‘我们共同的敌人是美帝国主义，我们大家都是站在一条战线上，大家需要互相团结互相支持。’”"},{"type":"paragraph","text":"希尔同志还揭露了澳大利亚统治集团对工人和其他劳动人民实行资产阶级专政。他指出，只有推翻资本主义，才能结束资产阶级专政。"},{"type":"paragraph","text":"希尔同志说：“工人只能依靠他们自己的力量和他们的盟友的力量。他们决不能靠议会之类的资产阶级机构或议会政客，也不能靠法庭的所谓公道，法庭搞的只是资产阶级的公道。”"},{"type":"paragraph","text":"希尔同志指出，澳大利亚工人是强大的，他们在农民、学生及其他阶层中都有强大的同盟者。决不能低估这种力量。它将扫除美帝及其当地的傀儡。这种力量将进而使澳大利亚成为一个建设社会主义的人民当家作主的国家。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"世界形势","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"23822d0687"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
