:1977,"month":7,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"以华主席为首的党中央一举粉碎‘四人帮’以后，上海钢铁研究所第二研究室的技术人员思想大解放，他们联系实际，批判“四人帮”在政治与业务、科研与生产等问题上散布的谬论，剥画皮、抓要害，划清为革命学习业务、钻研技术与“白专道路”的界限，树雄心，立壮志，提出了“国家的急需是我们的任务，满足用户要求是我们的标准，攻克技术难点是我们的义务，的战斗口号。全室的技术人员都订出了又红又专的规划，还提出了切实可行的措施，出现了政治上积极上进，学习上刻苦钻研，工作上埋头苦干的生动活泼局面。软磁组两个技术人员，承担了一项研制任务，他们和工人一起，克服冶炼、锻造等多道工序中的困难，完成了这项任务，并大胆提出了赶超国际先进水平的设想，不畏劳苦，连续奋战一个月，研制成功一种新型材料，为国家填补了一项空白。"},{"type":"paragraph","text":"(简讯均本报通讯　员供稿)"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"669ae983e9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
