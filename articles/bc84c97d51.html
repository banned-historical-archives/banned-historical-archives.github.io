rt":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"军车被人无故拦截学生民警奋力解围","authors":["张水平/刘文革"],"parts":[{"type":"paragraph","text":"本报讯 张水平、刘文革报道：6月3日21时许，一辆被拦截于北京东长安街交通岗的军用北京牌吉普车，在十名大学生和两名民警的帮助保护下，免受暴徒伤害。"},{"type":"paragraph","text":"19时许，东长安街上一辆由东向西驶来的军用吉普车，在交通岗处被一伙不明身份的人无故拦截。这些人出口不逊，任意辱骂军人，砸碎车窗。在他们煽动一些人将军车推翻时，人群外传来喊声：“住手，不要乱来！”这时，只见挤进来十几名大学生和两名警察，他们迅速制止了这些人的行动。民警和大学生在周围维护秩序。围观的群众自觉地让开了一条路，军车徐徐开动，一名军官感动地说：“谢谢！谢谢！”"}],"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bc84c97d51"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
