art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"我们一刻也离不开毛泽东思想","authors":["工程兵学习毛主席著作积极分子/二级爆破英雄郑定富"],"parts":[{"type":"paragraph","text":"十七日晚上，听说要我参加庆祝无产阶级文化大革命的盛会，心里就非常激动。总在想，毛主席一定会来参加大会。想到这里，觉也睡不着了。第二天，会议快开始时，毛主席真的来了，他穿着草绿色军装，戴着鲜红的帽徽和领章，神采奕奕，满面红光，身体那么好。我的心在激动，血在沸腾，总想多看几眼，看清楚些。毛主席啊！祝你万寿无疆！我真想立即跑回部队，把我所看到的这一切，一口气告诉给亲爱的战友。"},{"type":"paragraph","text":"平时，我每逢遇到问题，遇到困难，一学毛主席著作，就觉得浑身是劲，问题迎刃而解。有时工作累了，有些疲劳，想休息一下，可是一读毛主席讲的”中国的革命是伟大的，但革命以后的路程更长，工作更伟大，更艰苦”、“什么叫工作，工作就是斗争。……越是困难的地方越是要去，这才是好同志”，就觉得腰也不疼了，劲头也来了。我们连队连续三年被评为四好连队，同志们说：“我们连是学习毛主席著作起家的，我们一时一刻也离不开毛泽东思想。”这话千真万确，我们革命战士，饭可以不吃，觉可以不睡，学习毛主席著作一时一刻也不能放松！"},{"type":"paragraph","text":"毛主席亲自参加的这个庆祝无产阶级文化大革命的大会，也是一个新的动员令。毛主席亲自参加大会，最充分、最生动地说明，伟大领袖对我们工农兵最关怀，最热心领导我们闹革命！当林彪同志代表毛主席、党中央向同志们问好时，我激动得流泪了。我们有这样伟大的领袖和军队首长，我们感到无比的光荣和自豪。毛主席号召我们要把无产阶级文化大革命进行到底！把社会主义革命进行到底！我把这话刻记在心上了，一定照着毛主席的话去做。"},{"type":"paragraph","text":"在前一阶段无产阶级文化大革命中，已经揪出了一批牛鬼蛇神，这是我们广大工农兵在毛主席领导下取得的伟大胜利。可是敌人是不甘心失败的，他们要耍手段，搞阴谋，顽强地和我们作斗争。我们必须乘胜追击，决不让敌人有喘息的机会，一定要横扫一切牛鬼蛇神，不取得无产阶级文化大革命的彻底胜利，决不收兵。我们一定要用毛泽东思想这个锐利的武器，把旧思想、旧文化、旧风俗、旧习惯，彻底干净地爆破掉。导火索已经点燃了，我们就要把牛鬼蛇神统统爆炸个稀巴烂。我决心象过去在战场上与敌人拚刺刀一样，心不跳，手不软，不怕流血牺牲，打它一个彻底干净的歼灭战！"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"11e8fd29e9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
