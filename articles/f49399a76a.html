thors":["卢炳忠","唐厥旺","河南农学院","郭章学"],"dates":[{"year":1957,"month":5}],"is_range_date":false,"parts":[{"text":"“河南农学院是上饶集中营还是高等学校？”","type":"title"},{"text":"河南农学院卢炳忠郭章学唐厥旺","type":"authors"},{"text":"卢炳忠（农60级学生）：在肃反运动中，当时的禹王台，在古柏的衬托下，显得那样的阴森，猫头鹰也在叫，到处是棍棒声和呻吟声，吓人极了，真像一座集中营。我真不知道他们（注：指党员干部）是共产党员还是国民党员，河南农学院是上饶集中营还是高等学校？","type":"paragraph"},{"text":"郭章学（农59级学生）：在肃反运动中产生的违法乱纪现象，我院领导上是明知故犯。肃反对象受尽了各种折磨。","type":"paragraph"},{"text":"我院是班房，是监狱。","type":"paragraph"},{"text":"唐厥旺（理化教研组助教）：肃反中的积极分子连国民党都不如，和中美合作所（注：蒋美合办的特务机关）一样。党委书记是杀人犯，共产党员连起码的人道主义都没有。","type":"paragraph"},{"text":" 来源：《右派言论选辑》（河南农学院，1957年12月）。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f49399a76a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
