<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"好邻居  好朋友","authors":["柯贤伟"],"dates":[{"year":1981,"month":6,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"好邻居  好朋友"},{"type":"paragraph","text":"柯贤伟"},{"type":"paragraph","text":"尼泊尔是个具有悠久历史和灿烂文化的古老王国。它位于世界屋脊喜马拉雅山的南麓，境内山脉逶迤，雪峰高耸，河谷深邃，密林层层，素有“亚洲山国”之称。世界第一高峰珠穆朗玛峰就在中尼两国的边界线上，是中尼两国人民友谊的象征。"},{"type":"paragraph","text":"自古以来，中尼两国人民始终保持着友好融洽的关系。据史籍记载，一千五百多年以前，两国人民的祖先就不畏艰难，开辟了寻求友谊和知识的道路。尼泊尔是佛教创始人释迦牟尼的故乡，他出生在尼泊尔西南的兰毗尼村。公元五世纪初，我国东晋高僧法显为寻访释迦牟尼诞生地古迹，披荆斩棘，跋山涉水，来到尼泊尔朝圣，法显回国时还带回了珍贵的佛像和佛经。公元406年，尼泊尔高僧佛驮跋陀罗（汉名觉贤）也来我国访问，他是第一个访问中国的尼泊尔僧人。觉贤同回国不久的法显紧密合作，翻译了《佛只律》等十多部梵文佛经，并在我国广为传播，对沟通两国文化交流作出了巨大的贡献。公元七世纪（唐朝贞观年间）高僧玄奘到尼泊尔参谒佛生地和圆寂地，他在《大唐西域记》中，为人们描绘了尼泊尔许多地区的风土人情和奇闻异事。"},{"type":"paragraph","text":"公元643年，中尼有了正式的使节往来，中国使者王玄策曾经三次访问尼泊尔。以后历代两国的友好使者和僧人经常相互访问。两国邻近地区的边民通商贸易，为时更早。边境地区人民世代友好相处，来往极为频繁。"},{"type":"paragraph","text":"随着两国友好关系的不断发展，中尼两国人民在各个领域的交流越来越密切。古代尼泊尔的建筑独具一格，一些著名的艺匠曾多次来中国，协助建造了许多宏伟的宫殿庙宇。西藏拉萨的布达拉宫，就体现了中尼两国建筑艺术相互融合的风格。十三世纪中叶，尼泊尔的工艺和建筑家阿尼哥等几十人应元世祖的聘请，来我国西藏营造金塔，塑铸佛像，以后又由西藏来到北京，与中国同行共同建造寺塔等建筑。北京阜城门内的白塔寺和耸立在北海公园琼华岛上的白塔，就是中尼两国人民友好合作的历史见证。"},{"type":"paragraph","text":"中尼两国于1955年建交，揭开了两国友谊史上的新篇章。周恩来总理曾两次访问过尼泊尔。三年前邓小平副总理也到过尼泊尔访问。尼泊尔已故的马亨德拉国王和现在的比兰德拉国王也曾多次来我国访问。两国领导人的互访，加强了双方在政治上、经济上和文化上的合作。现在，中国和尼泊尔之间已经有了一条和平友好的共同边界，一个和平友好的条约，一条全程一百多公里的友谊公路，还有一条从加德满都经珠穆朗玛峰附近飞越喜马拉雅山到达中国的友谊“空中桥梁”。这些友谊的纽带，把两国更加紧密地联结在一起。"},{"type":"paragraph","text":"中尼两国在国际事务中一贯互相支持，有着共同的利益和奋斗的目标。中国人民坚决支持尼泊尔奉行独立自主不结盟的外交政策，支持比兰德拉国王宣布尼泊尔为“和平区”的建议。尼泊尔政府曾经为恢复我国在联合国的合法席位进行过始终不渝的努力，并且不允许外来势力把尼泊尔作为进行反对中国活动的基地。所有这些，充分体现了中尼两国的友谊是经得起考验的，中尼两国之间的友好睦邻关系是发展国与国之间关系的光辉范例。（附图片）"},{"type":"paragraph","text":"矗立在首都加德满都市中心的尼泊尔烈士碑和比姆森塔。这是尼泊尔人民保卫国家独立的象征。"},{"type":"paragraph","text":"新华社记者  郝章印摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"name":"西藏文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4e9cc84aaa"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
