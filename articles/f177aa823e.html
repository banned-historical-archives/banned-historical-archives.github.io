彪"],"dates":[{"year":1967,"month":11,"day":5}],"is_range_date":false,"parts":[{"text":"关于支左问题的指示","type":"title"},{"text":"林彪","type":"authors"},{"text":"要学老三篇，破“私”立公。共产主义就是讲的一个公字，反对一个“私”字。要破“私”立公，不然就在那里扯皮。要解决问题，就要从灵魂深处爆发革命。有错误不改，就是不好，干部、战士，不要以为学了毛主席著作就行了，学了不用那是空话。","type":"paragraph"},{"text":"千头万绪就是要破“私”。破“私”，要打进攻战，光打防御战不是马列主义。拥护我们伟大领袖毛主席的人是革命的，公和“私”的标准就是拥护还是反对我们的伟大领袖毛主席。","type":"paragraph"},{"text":"（郑维山、陈先瑞汇报工作后林副主席的指示）","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"林彪","type":"人物"},{"name":"军队支左","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f177aa823e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
