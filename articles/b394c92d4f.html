[],"dates":[{"year":1966,"month":6,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"几内亚艺术家歌唱毛主席万寿无疆"},{"type":"paragraph","text":"毛主席著作闪烁着光辉的思想"},{"type":"paragraph","text":"据新华社杭州二十一日电  几内亚国立佐利巴舞蹈团结束了在杭州的访问演出，今天乘车前往上海。"},{"type":"paragraph","text":"舞蹈团总团长西索柯·阿马杜在杭州期间向中国朋友说，中国人民在建设中取得的辉煌成就，加强了世界和平的力量，这些成就是在毛泽东主席领导下取得的。他说，几内亚舞蹈团成员们随着对中国了解的增多，更加热爱毛主席，更加热爱毛主席著作。"},{"type":"paragraph","text":"舞蹈团的演员贡德·索里每天晚上读毛主席著作。他说：“读了毛主席的书，使我知道了很多东西，给了我很多智慧。”"},{"type":"paragraph","text":"演员凯塔·芒塞利说：“《毛泽东选集》第四卷我已读了一遍，现在正仔细读第二遍，我从字里行间看到了毛泽东思想的光辉。”鼓手卡马拉·塞古巴特地给他弟弟带回一部毛主席著作。他说：“读了毛主席的书，我的弟弟就会知道怎样做人。”"},{"type":"paragraph","text":"舞蹈团是十四日到达杭州的。他们在杭州演出三场，受到了观众的热烈欢迎。昨晚，中国主人为他们举行了欢送宴会。"},{"type":"paragraph","text":"宴会上，舞蹈团副总团长库雅特·索里·康迪亚满怀激情地歌唱毛泽东主席万寿无疆，全体团员一齐击掌相和“啊，毛主席呀，祝你万寿无疆！”"},{"type":"paragraph","text":"这位西非著名的歌唱家在参观中看到毛主席在飞机上工作的一幅绣象后表示非常喜爱，他说，这幅绣象使他看到毛主席怎样在为人民工作，在为人类描绘前景。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b394c92d4f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
