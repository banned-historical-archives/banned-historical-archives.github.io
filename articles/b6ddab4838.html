art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"要闻简报","authors":[],"parts":[{"type":"paragraph","text":"邓小平副总理会见美国客人"},{"type":"paragraph","text":"邓小平副总理六月二十二日上午会见了美国当前危险委员会执行委员会主席尤金·罗斯托和夫人。"},{"type":"paragraph","text":"会见时，邓小平副总理和尤金·罗斯托先生在坦率、友好的气氛中就当前国际政治形势的一些重大问题交换了看法。"},{"type":"paragraph","text":"斯里兰卡总统接见耿飚副总理"},{"type":"paragraph","text":"斯里兰卡共和国总统朱尼厄斯·理查德·贾亚瓦德纳六月二十二日中午在总统府接见中国国务院副总理耿飚。"},{"type":"paragraph","text":"贾亚瓦德纳总统和耿飚副总理进行了亲切友好的谈话。耿飚副总理向贾亚瓦德纳总统转达了中国共产党中央委员会主席、国务院总理华国锋，全国人民代表大会常务委员会委员长叶剑英，国务院副总理邓小平对他最良好的问候。贾亚瓦德纳总统对此表示感谢，并请耿飚副总理转达他对中国领导人的问候。"},{"type":"paragraph","text":"随后，贾亚瓦德纳总统设便宴招待耿飚副总理。"},{"type":"paragraph","text":"斯里兰卡总理设宴欢迎耿飚副总理"},{"type":"paragraph","text":"斯里兰卡总理拉纳辛哈·普雷马达萨六月二十一日晚在总理府举行宴会，欢迎中华人民共和国副总理耿飚和夫人赵兰香。"},{"type":"paragraph","text":"普雷马达萨总理和耿飚副总理在宴会上讲了话。"},{"type":"paragraph","text":"宴会是在亲切友好的气氛中进行的。宾主频频为加强中斯两国人民的友谊、为发展两国之间的友好和合作关系干杯。"},{"type":"paragraph","text":"杨勇副总长率军事友好代表团回到北京"},{"type":"paragraph","text":"以中共中央委员、中国人民解放军副总参谋长杨勇为团长、中共中央委员、中国人民解放军南京部队政治委员廖汉生为副团长的中华人民共和国军事友好代表团，圆满结束了对南斯拉夫的友好访问，六月二十二日早晨乘飞机回到北京。"},{"type":"paragraph","text":"到机场迎接代表团的有，中共中央政治局委员、中国人民解放军总政治部主任韦国清等。"},{"type":"paragraph","text":"刚果人民军总参谋长宴请我军事友好代表团"},{"type":"paragraph","text":"刚果国家人民军总参谋长恩戈洛·雷蒙六月二十日在首都布拉柴维尔举行宴会，欢迎以中国人民解放军副总参谋长迟浩田为团长的中国军事友好代表团。"},{"type":"paragraph","text":"恩戈洛·雷蒙总参谋长和迟浩田副总参谋长在宴会上讲了话。"},{"type":"paragraph","text":"我军事友好代表团结束对瑞典的访问"},{"type":"paragraph","text":"以中国人民解放军副总参谋长张爱萍为团长的中国军事友好代表团结束了对瑞典的友好访问，六月二十二日乘飞机离开斯德哥尔摩前往意大利。瑞典三军总司令斯蒂格·辛内格仑上将等前往机场送行。"},{"type":"paragraph","text":"代表团在六月十日到达瑞典后访问了瑞典部队，参观了工业企业和一些军事设施。中国客人所到之处，受到瑞典朋友的热情欢迎和友好接待。（均据新华社）"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"耿飚","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b6ddab4838"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
