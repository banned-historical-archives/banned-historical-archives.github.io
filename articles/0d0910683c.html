市场供应","authors":["高庆琪"],"dates":[{"year":1956,"month":4,"day":4}],"is_range_date":false,"parts":[{"text":"太原市公私合营商店盲目并店改组影响市场供应","type":"title"},{"text":"高庆琪","type":"authors"},{"text":"【山西分社4日讯】最近中共太原市委对太原市公私合营商店合并改组的情况进行了检查，发现存在如下几个问题：","type":"appellation"},{"text":"一、由于过多的并店撤点，严重地影响了市场供应和群众需要。太原市饮食公司把原来的一千三百九十七个点并为六百一十四个点。蔬菜公司把一百七十四户座摊商合并为五十六户，福利公司把理发社由一百零一户合并为五十二户，煤建公司把七十五户合并为十五户，国药业已开设二百余年，经营七辈子的三和堂中药铺也撤掉了，恒济堂的阿魏麝香化气膏、七珍丹畅销山西、陕西等地，被撤销后群众还纷纷来信购药，但该店已不存在。饮食业将一部分卖灌肠、杂割、豆腐脑、煎饼等粗食的也并入合营饭店，使一些进城农民、赶马车的和一些收入较少的其他劳动人民买不到粗熟食。","type":"paragraph"},{"text":"有些干部对经销、代销的办法领会不够，认为只有合并后由自己直接管起来才算公私合营。南华门王书文兄弟二人摆一小果摊，要求经销、代销，但市山果总店的干部，非让他们公私合营不可，他们不愿意，干部就要撤回他们的营业证。","type":"paragraph"},{"text":"二、随意改变经营服务态度和人事制度：太原布饮食、服务业普遍实行了卖票制度，甚至连卖元宵的小铺、推车卖割糕的小游商也卖票，造成消费者很多麻烦。福中恒中药铺原有熟悉业务的业务员五人，调走三人，换来三个新手，因此营业额逐渐下降，过去每天营业额一百元，现在只能达到六十元。","type":"paragraph"},{"text":"三、对名牌产品保持发扬不够：如国药业已有二百年历史和有一定信誉的三和堂中药铺所生产的天罡竝肋丸、海马三肾丸、红花一品膏，以及受群众欢迎的康培英琥珀解毒丸、小儿七珍丹，均在并店后停止生产。","type":"paragraph"},{"text":"目前，中共太原市委对资本主义工商业改造九人小组正在采取各种措施扭转这些错误做法。","type":"paragraph"}],"comments":[],"origin":"新华通讯社编《内部参考》1956年4月4日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0d0910683c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
