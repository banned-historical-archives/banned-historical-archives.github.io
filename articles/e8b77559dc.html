art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"把毛泽东思想千秋万代地传下去","authors":["售书员李春芬"],"parts":[{"type":"paragraph","text":"我们听到中央人民广播电台广播说，党中央已经决定大量出版毛主席著作。当时，我们的心无比激动，大家高兴得跳了起来。"},{"type":"paragraph","text":"我是部队售书员，深深体会到部队同志学习毛主席著作的迫切要求。他们见了我，就让我想办法给他们买《毛泽东选集》。我也想了许多办法，去新华书店联系过多次，就是没有解决。记得有一次，我们部队要买一部分《毛泽东著作选读》甲种本，我费了很大的劲，才给了二十套。我搞这个工作已经六、七个月了，从没买到过一部《毛泽东选集》。"},{"type":"paragraph","text":"解放前，我家祖祖辈辈给地主种地，我还不到两岁的时候，爸爸就连累带饿地死去了。想起过去的苦，我恨死了旧社会。解放了，党和毛主席把我一家救了出来，我从内心里热爱我们伟大的领袖毛主席，热爱毛主席的书，可就是买不到《毛泽东选集》。现在才知道，原来是周扬这伙黑帮搞的鬼。周扬，你们这些坏家伙，不让我们读毛主席的书，我们偏要读，偏要学好用好。我们一定要把毛泽东思想这个最锐利的武器学到手，一定要把毛泽东思想的班接过来，传下去，世世代代地传下去。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"周扬","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e8b77559dc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
