rt":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"欢呼毛主席革命路线的伟大胜利","authors":["“塔山英雄团”全体指战员"],"parts":[{"type":"paragraph","text":"我们全团指战员，怀着无比兴奋的心情认真学习党中央的两项决议，坚决拥护党中央关于华国锋同志任中共中央第一副主席和国务院总理的决议，坚决支持党中央关于撤销邓小平党内外一切职务的决议。大家激动地说：党中央的两项重要决议，无比英明，非常正确，表达了全党、全军和全国人民的共同心愿，大长了无产阶级和革命人民的志气，大灭了资产阶级和一切阶级敌人的威风。这是毛主席革命路线的伟大胜利，是反击右倾翻案风斗争的伟大胜利。"},{"type":"paragraph","text":"在伟大领袖毛主席亲自发动和领导的反击右倾翻案风的斗争中，我们全团指战员义愤填膺，同仇敌忾地批判了邓小平炮制“三项指示为纲”的修正主义纲领，妄图颠覆无产阶级专政，复辟资本主义的反动罪行。通过革命大批判，大家进一步认识到，邓小平反革命的修正主义路线和反动言行集中反映了资产阶级复辟的愿望，他是资产阶级的总代表。几个月来，邓小平顽固坚持错误，拒不接受党和人民对他的挽救。现在，党中央决定撤销邓小平党内外一切职务，我们一千个支持，一万个拥护。我们要发扬战争年代英勇顽强、连续作战和“追穷寇”的革命精神，把邓小平的反动言行批深批透，把他的修正主义货色扫进历史垃圾堆。"},{"type":"paragraph","text":"反击右倾翻案风的斗争，是无产阶级文化大革命的继续和深入，是一场反翻案、反复辟、反倒退的大搏斗。随着反击右倾翻案风的不断深入，国内外阶级敌人，党内资产阶级，必然要进行疯狂的破坏和捣乱。一小撮反革命分子在天安门广场策划的反革命政治事件，就是阶级敌人在走投无路的情况下垂死挣扎的反映。首都广大工人民兵、人民警察、警卫战士和革命群众，对这一小撮阶级敌人坚决实行无产阶级专政，好得很！我们坚决支持首都工农兵群众的革命行动，誓死保卫毛主席，保卫党中央，保卫毛主席的无产阶级革命路线。"},{"type":"paragraph","text":"我们全团指战员决心在毛主席和党中央领导下，以阶级斗争为纲，提高革命警惕，加强战备，坚决打击阶级敌人的破坏和捣乱，保卫反击右倾翻案风的斗争胜利进行到底，用实际行动发展革命的大好形势，夺取更大胜利。"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f8d5aeb4cf"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
