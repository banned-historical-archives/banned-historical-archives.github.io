别投降派和修正主义的能力，决心为巩固无产阶级专政而斗争","authors":[],"dates":[{"year":1975,"month":9,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　在深入学习毛主席关于理论问题的重要指示和积极开展对《水浒》评论的大好形势下，青浦县于本月十七日下午举行了“青浦农民评论《水浒》专题赛诗会”。广大贫下中农怀着对投降派的无比愤恨，纷纷登上台来，用革命的诗歌，愤怒揭露宋江破坏农民起义的丑恶嘴脸。"},{"type":"paragraph","text":"在赛诗会上，大家争先恐后，竞相上台赛诗，不少老农民用握锄头的手，当场写下了声讨投降派的战斗檄文，许多下乡知识青年更是一马当先冲在前，积极投入这场战斗，立志要把投降派批臭。他们愤怒讨伐投降派宋江，高声怒吼:“宋江本是豺狼种，梁山起义他断送，卑躬屈膝盼招安，真是一条软骨虫!”在赛诗会上，广大贫下中农还联系一八五二年青浦小刀会农民起义军不畏强暴，视死如归的英雄事迹，狠狠批判宋江只反贪官，不反皇帝的投降主义路线。通过写诗、赛诗，大家进一步深刻领会毛主席关于评论《水浒》指示的重要意义，提高了识别投降派和修正主义的能力。这次赛诗会共收到几百首铿锵有力的诗歌，这些诗歌表达了广大贫下中农为巩固无产阶级专政而斗争的坚强决心。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"07f55bb443"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
