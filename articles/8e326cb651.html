art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"要闻简报","authors":[],"parts":[{"type":"paragraph","text":"华总理同海德拉主席会谈取得圆满成功"},{"type":"paragraph","text":"国务院总理华国锋同毛里塔尼亚国家元首海德拉主席十三日下午继续举行了会谈。"},{"type":"paragraph","text":"我国外交部发言人说，中毛两国领导人两次会谈都谈得很好。还说，双方在会谈中还讨论了进一步发展中毛友好合作关系问题，并取得了满意的结果。"},{"type":"paragraph","text":"邓副总理会见并宴请海德拉主席"},{"type":"paragraph","text":"国务院副总理邓小平十三日上午会见了毛里塔尼亚国家元首海德拉主席以及随行人员。"},{"type":"paragraph","text":"在谈到国际局势时，邓小平强调了反对霸权主义、维护世界和平的重要性。"},{"type":"paragraph","text":"海德拉主席认为，第三世界只有团结起来，才能避免大国霸权的损害。"},{"type":"paragraph","text":"李先念副总理抵惠灵顿访问"},{"type":"paragraph","text":"国务院副总理李先念及其随行人员十三日下午到达新西兰首都惠灵顿，进行为期两天的友好访问。"},{"type":"paragraph","text":"李先念和夫人在机场受到新西兰总理马尔登和夫人的热烈欢迎。机场上中国和新西兰的国旗随风飘扬，军乐队高奏两国国歌，李先念检阅了仪仗队。"},{"type":"paragraph","text":"金日成主席途经乌鲁木齐回国"},{"type":"paragraph","text":"朝鲜劳动党中央委员会总书记、朝鲜民主主义人民共和国主席金日成和由他率领的朝鲜党政代表团在参加南斯拉夫社会主义联邦共和国总统、南斯拉夫共产主义者联盟主席约瑟普·布罗兹·铁托的葬礼活动后，十三日上午乘专机途经我国新疆维吾尔自治区首府乌鲁木齐回国。"},{"type":"paragraph","text":"新疆维吾尔自治区党委第一书记汪锋，自治区人民政府主席司马义·艾买提等前往机场热情迎送并在机场设宴招待金日成主席等朝鲜同志。（均据新华社）"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"李先念","type":"人物"},{"name":"新疆文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8e326cb651"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
