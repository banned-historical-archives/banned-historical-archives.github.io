,"林川"],"dates":[{"year":2000,"month":2,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"奥地利  十五万民众游行示威　反对极右翼政党入阁"},{"type":"paragraph","text":"据新华社维也纳2月19日电  （记者林川、刘云峰）奥地利首都维也纳19日举行战后规模最大的群众游行示威和集会，反对极右翼政党自由党进入政府，并抗议人民党同自由党联合执政。"},{"type":"paragraph","text":"19日下午2时，游行队伍从维也纳火车西站、火车南站和体育馆等地分四路向市中心进发，沿途不断有人加入游行队伍。傍晚6时，聚集在总统府和总理府附近英雄广场的人数超过15万。这次活动虽然是群众团体“民主攻势”和“救助他人”组织的，但反对党社民党和绿党以及工会组织也参加了抗议活动。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f187f1d56a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
