tes":[{"year":1952,"month":10,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京卅日电】　苏联部长会议主席斯大林致电我中央人民政府毛泽东主席，祝贺我国国庆。电文如下:"},{"type":"paragraph","text":"中华人民共和国中央人民政府主席毛泽东同志:"},{"type":"paragraph","text":"值此中华人民共和国成立三周年之际，主席同志，请您接受我衷心的祝贺。"},{"type":"paragraph","text":"祝中国人民，中华人民共和国政府及您本人在强大的人民民主的中国国家之建设中获得新的成就。"},{"type":"paragraph","text":"祝中华人民共和国和苏维埃社会主义共和国联盟的伟大友谊——远东及全世界和平与安全的坚强支柱更加巩固和发展。"},{"type":"paragraph","text":"约·斯大林"},{"type":"paragraph","text":"一九五二年九月二十九日于莫斯科"},{"type":"paragraph","text":"【新华社北京卅日电】　苏联外交部部长维辛斯基致电我中央人民政府政务院总理兼外交部部长周恩来，祝贺我国国庆。电文如下:"},{"type":"paragraph","text":"中华人民共和国中央人民政府政务院总理兼外交部部长周恩来同志:"},{"type":"paragraph","text":"在中华人民共和国成立三周年纪念日，总理兼部长同志，请您接受我真挚的祝贺，并衷心地希望在新的人民民主中国的建设中，在巩固苏联和中华人民共和国两国人民的伟大友谊及在维护和平与国际安全的斗争中获得进一步的胜利。"},{"type":"paragraph","text":"安·维辛斯基"},{"type":"paragraph","text":"一九五二年九月二十九日于莫斯科"},{"type":"paragraph","text":"\u003cIMG alt=请插入3号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1952\\10\\52a1010101.JPG\"\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入3号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1952\\10\\52a1010102.JPG\"\u003e"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a08220c7d7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
