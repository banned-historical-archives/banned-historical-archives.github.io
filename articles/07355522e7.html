981,"month":8,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"什么是毛泽东教育学说?是否可以概括为就是毛泽东同志提出和制定的无产阶级教育的理论和政策。"},{"type":"paragraph","text":"毛泽东同志在领导中国新民主主义革命和社会主义革命的过程中，历来十分重视教育工作，并亲自关怀和指导。毛泽东同志曾有过亲自的教育实践。一九一七年他办过工人夜校，一九一八年组织留法勤工俭学，一九二一年创办湖南自修大学，一九二六年主持农民运动讲习所，并担任教学工作。以后，又在红军大学、抗日军政大学等校参加过教育教学工作。民主革命时期，在毛泽东教育学说指导下，培养和教育了大批干部，取得了抗日战争和解放战争的胜利；在社会主义革命和社会主义建设时期，特别是解放后的十七年中，在改造半封建半殖民地的旧教育和旧学校，实行无产阶级教育改革，扫除文盲，提高人民的文化水平，团结、教育、改造广大知识分子等方面取得了伟大的成绩，各级各类学校的质量逐年提高，培养出了大批社会主义建设人才。毛泽东教育学说是马列主义与中国教育实践相结合的产物。"},{"type":"paragraph","text":"(摘自北京《教育研究》一九八一年第七期厉以贤文)"}],"comments":[],"origin":"《教育研究》","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"07355522e7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
