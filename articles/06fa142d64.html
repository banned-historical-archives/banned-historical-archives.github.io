<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反抗反动当局的残酷剥削和压迫　达荷美爆发大规模罢工罢教斗争","authors":[],"dates":[{"year":1967,"month":12,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反抗反动当局的残酷剥削和压迫"},{"type":"paragraph","text":"达荷美爆发大规模罢工罢教斗争"},{"type":"paragraph","text":"据新华社十四日讯科托努消息：达荷美工人和教师最近举行罢工、罢教，反抗达荷美反动当局对他们加紧进行压迫和剥削。他们的斗争迫使反动当局取消了关于禁止罢工和工会活动的反动禁令。"},{"type":"paragraph","text":"这次要求增加工资和反对征收所谓“全国团结税”的斗争，是从十二月八日小学教师罢教开始的，很快地就扩展到中学教师、邮电和私人企业部门的职工。由于邮电工人罢工，达荷美与外界的电讯联系全被切断，达荷美最大城市科托努的国际机场的工作也受到影响。"},{"type":"paragraph","text":"达荷美反动当局的总统索格洛九日在电视台发表讲话，悍然宣布罢工“非法”，并威胁要对“无政府主义和混乱”进行镇压。随后有十多名工会领导人被捕。"},{"type":"paragraph","text":"达荷美工人总联合会十二日向反动当局发出最后通牒，通牒中警告说，如果不释放被捕的工会领导人、不撤销禁止罢工和工会活动的禁令的话，工人总联合会将举行总罢工。"},{"type":"paragraph","text":"面对这一强大压力，达荷美反动当局在当天匆匆召开紧急会议，并于当晚被迫宣布撤回关于禁止罢工和工会活动的禁令。但是，反动当局无理拒绝释放被逮捕的工会领导人，因此工人的斗争还在继续。"},{"type":"paragraph","text":"这次大规模的罢工、罢教，是达荷美人民对索格洛反动政权的横征暴敛政策的一次反击。索格洛在两年前的一次政变中上台后，执行反人民的反动政策，国内经济困难，民不聊生，失业严重。为了进一步向人民搜刮，索格洛反动政权在把公用企业职工的工资强行降低百分之二十五之后，最近又下令“冻结工资”，并向私营企业职工强征占他们工资收入的百分之二十五的所谓“全国团结税”。这进一步激起了人民的强烈反抗。"},{"type":"paragraph","text":"据新华社十五日讯  科托努消息：达荷美工人十三日发动总罢工，反抗达荷美反动当局的迫害和横征暴敛。总罢工使达荷美最大城市科托努和首都波多诺伏陷于瘫痪。"},{"type":"paragraph","text":"在总罢工的当天晚上，达荷美反动政权的陆军参谋长阿莱竟明目张胆地威胁工会领导人“不得再采取罢工行动”。但是，达荷美的工人不顾反动当局的恫吓，继续坚持罢工，同反动当局的反人民政策进行斗争。"},{"type":"paragraph","text":"由于罢工，科托努国际机场已经关闭了两天。十五日从国外来的国际航线定期班机无法着陆，被迫改道到邻国降落。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"06fa142d64"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
