tart":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"总政重新编印《毛泽东邓小平著作选读》士兵读本收入《邓选》三卷29篇著作","authors":[],"parts":[{"type":"paragraph","text":"本报北京11月18日讯 根据江泽民总书记重要讲话和中共中央决定的精神，为满足广大士兵学习《邓小平文选》第三卷的愿望，总政治部对过去印发士兵的《毛泽东邓小平著作选读》重新进行了修订，作为士兵学习建设有中国特色社会主义理论和进行党的基本路线教育的基本教材。修订后的这个读本，充分考虑士兵的特点，共收入了《邓小平文选》第三卷中的29篇著作，基本反映了建设有中国特色社会主义理论的主要内容，比较鲜明地突出了新时期军队建设思想。此书日前已由解放军出版社出版发行。总政治部要求全军各部队认真做好这本书的发行工作，保证士兵人手一册；要结合各项政治教育，组织广大士兵认真学习。"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c0a8c4923e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
