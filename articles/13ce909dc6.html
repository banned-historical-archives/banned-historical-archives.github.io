:["北京钢铁学院","彭卓宗","章萼舫"],"dates":[{"year":1957,"month":5}],"is_range_date":false,"parts":[{"text":"右派言论——反对党的统战政策","type":"title"},{"text":"北京钢铁学院章萼舫彭卓宗","type":"authors"},{"text":"“现在的人民代表大会也很形式，它并不代表人民，民主党派是傀儡，只举手通过。所以在民主党派中可合成一个大党来进行监督。”（北京钢铁学院　章萼舫）","type":"paragraph"},{"text":"“现在党是不相信人民的，重要工作不让群众去做，无论什么单位都要党员做头。例如首（原文不清拟系首字——编者注）长总是一个参加游击争斗大老粗，他们什么都不懂，怎能领导？这样能贯彻党的路线吗？他们都是外行，应学会了再领导。如对文艺界的公式化、概念化和教条主义是因为党员做头，不懂业务，又强加压制，不懂装懂的缘故。”（北京钢铁学院  彭卓宗）","type":"paragraph"},{"text":" 来源：《高等学校右派言论选编》（中共中国人民大学委员会，1958年8月）。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"13ce909dc6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
