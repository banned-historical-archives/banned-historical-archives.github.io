机场欢迎","authors":[],"dates":[{"year":1969,"month":9,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京十四日电　以阿尔巴尼亚劳动党中央政治局委员、阿尔巴尼亚人民共和国人民议会主席团副主席里塔·马尔科同志为团长的阿尔巴尼亚党政代表团，由中共中央委员、中国人民解放军副总参谋长王新亭同志陪同，今天乘专机离开北京去外地访问。"},{"type":"paragraph","text":"前往机场欢送的，有中共中央政治局常委康生同志，中共中央政治局委员姚文元同志、李先念同志，中共中央政治局候补委员李德生同志.前往机场欢送的，还有中共中央委员李强同志和有关方面负责人乔冠华、谢怀德、申健等同志。"},{"type":"paragraph","text":"阿尔巴尼亚驻中国大使罗博同志随同去外地访问。"},{"type":"paragraph","text":"越南民主共和国驻中国大使吴明鸾，越南南方共和临时革命政府驻中国大使馆临时代办黄英，也到机场欢送。"},{"type":"paragraph","text":"新华社南京十四日电　阿尔巴尼亚党政代表团团长、阿尔巴尼亚劳动党中央政治局委员、阿尔巴尼亚人民共和国人民议会主席团副主席里塔·马尔科同志，团员:阿尔巴尼亚劳动党中央委员、人民议会主席团委员托宁·雅科瓦同志，阿尔巴尼亚劳动党中央委员、斯库台军区政委迪拉维尔·波奇同志，在中共中央委员、中国人民解放军副总参谋长王新亭同志陪同下，今天上午乘专机到南京参观访问。"},{"type":"paragraph","text":"阿尔巴尼亚驻中国大使罗博同志也随同到南京参观访问。"},{"type":"paragraph","text":"前往机场欢迎的，有中共中央政治局委员、南京部队司令员、江苏省革命委员会主任许世友同志，中共中央委员、南京部队政委杜平同志，中共中央委员、南京部队副司令员张才千同志，江苏省革命委员会副主任、南京市革命委员会主任杨广立等同志。"},{"type":"paragraph","text":"阿尔巴尼亚同志今天参观了由我国自行设计、自行施工建造的南京长江大桥，受到了中共中央委员、南京长江大桥工人工程师王超柱同志和建桥工人及革命群众的热烈欢迎。"},{"type":"paragraph","text":"今天晚上许世友同志举行了宴会，热烈欢迎阿尔巴尼亚同志。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"康生","type":"人物"},{"name":"姚文元","type":"人物"},{"name":"李先念","type":"人物"},{"name":"许世友","type":"人物"},{"name":"王新亭","type":"人物"},{"name":"江苏文革","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e62bac9ccb"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
