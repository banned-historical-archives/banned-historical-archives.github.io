art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东对唯物辩证法的新探索","authors":[],"parts":[{"type":"paragraph","text":"房良钧在《中国社会科学》1993年第6期上撰文指出：《毛泽东哲学批注集》的有关内容表明，《矛盾论》并不是毛泽东对唯物辩证法研究的终结。毛泽东1939年在读艾思奇编的《哲学选辑》时，对矛盾的统一斗争相对绝对问题又有新探索：1、列宁说矛盾的统一是相对的，斗争是绝对的，是从历史发展、依永久性意义上提出的：2、依一时说，统一是绝对的，斗争是相对的；3、统一既有相对的一面，又有绝对的一面，是相对性和绝对性的辩证统一。房文认为，这些探索不仅是对《矛盾论》的重要补充和新的突破，而且是对唯物辩证法的新发展，对目前学术界的辩证法研究具有重要意义。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"591b29cc19"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
