script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"带头限制资产阶级法权","authors":[],"dates":[{"year":1975,"month":5,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"带头限制资产阶级法权"},{"type":"paragraph","text":"今年开春以后，河北省孟村回族自治县委动员知识青年上山下乡。有人猜测，计统科副科长李士权的儿子李东风，大概不会上山下乡。理由是，小李的爸爸具体负责计划统计工作，还能不给自己的孩子在城里安排个工作？可是，名单公布了，李东风的名字却端端正正地写在首批下乡知识青年的光荣榜上。"},{"type":"paragraph","text":"要不要送子务农？李士权思想上是有过斗争的。还在李东风上中学的时候，老李对儿子将来到哪里去的问题，就曾有过各种考虑。后来，李东风高中毕业了，有关单位在同老李接洽招收工人的工作时，又主动表示愿意帮忙。毛主席关于理论问题的重要指示发表以后，老李认真学习，反复思考。他想，知识青年上山下乡是为缩小三大差别、限制资产阶级法权、巩固无产阶级专政而采取的一项革命措施。自己虽然负责计划统计工作，但是作为一个领导干部，只能用人民给的权力全心全意地为人民服务，决不能把职权当成特权，用它来为个人谋私利。"},{"type":"paragraph","text":"搞清楚知识青年上山下乡的伟大意义以后，李士权和爱人决心送子下乡务农。儿子临走那天，老李把他送上汽车，并嘱咐他到农村以后虚心接受贫下中农的再教育，认真学好毛主席关于理论问题的重要指示，积极参加三大革命运动，为巩固无产阶级专政作出贡献。在李士权的影响下，原来对知识青年上山下乡态度不积极的一些家长，纷纷把自己中学毕业的子女送到乡下去。当地的干部和群众赞扬说：“老李不愧是限制资产阶级法权的带头人！”"},{"type":"paragraph","text":"本报通讯员"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上山下乡","type":"主题/事件"},{"name":"限制资产阶级法权","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f4bedc84b4"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
