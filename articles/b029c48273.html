tart":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"学习鲁迅；永远忠于毛泽东思想","authors":[],"parts":[{"type":"paragraph","text":"我国文化战线上最英勇的旗手、伟大的共产主义战士——鲁迅，逝世三十年了。"},{"type":"paragraph","text":"今天，在史无前例的无产阶级文化大革命的高潮中，我们纪念毛主席热烈赞扬的这位伟大的文学家、伟大的思想家和伟大的革命家，纪念这位“在文化战线上，代表全民族的大多数，向着敌人冲锋陷阵的最正确、最勇敢、最坚决、最忠实、最热忱的空前的民族英雄”，意义是十分重大的。"},{"type":"paragraph","text":"毛主席说：“鲁迅的两句诗，‘横眉冷对千夫指，俯首甘为孺子牛’，应该成为我们的座右铭。‘千夫’在这里就是说敌人，对于无论什么凶恶的敌人我们决不屈服。‘孺子’在这里就是说无产阶级和人民大众。一切共产党员，一切革命家，一切革命的文艺工作者，都应该学鲁迅的榜样，做无产阶级和人民大众的‘牛’，鞠躬尽瘁，死而后已。”"},{"type":"paragraph","text":"我们纪念鲁迅，就要学习他高度仇恨敌人，全心全意为人民服务的革命精神。"},{"type":"paragraph","text":"鲁迅在敌人面前，不愧为无产阶级的硬骨头和革命的闯将。他对敌人深恶痛绝，极端鄙视。在敌人对他进行种种围攻、迫害、摧残的恶劣环境里，他坚决遵循毛泽东思想指引的方向，站在革命斗争的最前列，不屈不挠地朝着腐败的旧社会进攻，朝着帝国主义的恶势力进攻，同执行王明右倾机会主义投降路线的周扬一伙进行了坚决的斗争。"},{"type":"paragraph","text":"鲁迅无限崇敬和热爱伟大的领袖毛主席，他热情拥护、坚决执行毛主席的正确路线，勇敢地捍卫毛泽东思想。他把自己看做革命的“马前卒”和革命的“小兵”，无条件地维护党的利益。鲁迅革命的、战斗的一生，就是全心全意为人民服务的一生。"},{"type":"paragraph","text":"鲁迅不朽的英雄业绩，表现了他对伟大的毛泽东思想的无限忠诚，表明了他是一个伟大的共产主义战士。"},{"type":"paragraph","text":"我们纪念鲁迅，学习鲁迅，最重要最根本的，就是要永远忠于毛泽东思想，努力学习毛泽东思想，掌握毛泽东思想。头可断，血可流，毛泽东思想不可丢。我们要永远横眉冷对反对毛泽东思想的人。谁拥护毛泽东思想，我们就和他亲；谁反对毛泽东思想，我们就和他拚。"},{"type":"paragraph","text":"在当前无产阶级文化大革命中，我们必须更好地活学活用毛主席关于阶级和阶级斗争的观点，认清国内外阶级敌人的反动本性，认清当前阶级斗争的复杂性尖锐性，百倍提高警惕，坚守战斗岗位，坚决粉碎国内外阶级敌人的一切阴谋诡计，进一步巩固无产阶级专政。誓死捍卫以毛主席为代表的无产阶级革命路线，坚决反对资产阶级的反动路线，坚定不移地把无产阶级文化大革命进行到底。"},{"type":"paragraph","text":"我们还必须结合当前的斗争和工作的实际，学好用好“老三篇”，战士要学，干部更要学。把“老三篇”当作座右铭来学，抵制修正主义的影响和一切剥削阶级思想的侵袭，加强思想革命化，提高人的无产阶级觉悟，完全彻底地为人民服务。"},{"type":"paragraph","text":"让战无不胜的毛泽东思想，千秋万代永放光芒！"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b029c48273"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
