<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"保卫陕甘宁保卫毛主席  延安举行战斗动员","authors":[],"dates":[{"year":1947,"month":3,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"保卫陕甘宁保卫毛主席"},{"type":"paragraph","text":"延安举行战斗动员"},{"type":"paragraph","text":"【新华社延安九日电】延安各界保卫边区、保卫延安的动员大会，于昨日（八日）下午四时在商会大会场举行。到会的群众，除了机关、学校的人员外，特别引人注目的是延安四五十里内四乡赶来的数千农民和他们的民兵自卫军，还有前日刚从蒋管区被迫撤回的中共联络人员，共约万余人，把整个的会场旁边的山坡以及门口的大路都挤满了。红缨枪、步枪和千万只臂膀，表现出延安军民不可侮的伟大力量。"},{"type":"paragraph","text":"“坚决保卫边区，保卫延安，保卫土地，保卫民主，保卫丰衣足食的生活，保卫毛主席！”“全边区军民紧急动员起来，粉碎卖国贼蒋介石的进攻，把法西斯匪徒胡宗南打出去！”这两幅贴在会场两边的大标语，是边区军民自卫战斗的呼声，反映出近来延安的人们紧张备战的坚强意志。"},{"type":"paragraph","text":"大会在战斗的号声中开会，选举林主席伯渠、李副主席鼎铭、刘副主席景范、谢副议长觉哉、王副司令员维舟、邓颖超、习仲勋、谢市长怀德、白茜、王会长克温、杨步浩等十一人为主席团后，即由林主席致开会词。他指出日寇投降后蒋胡军不断进攻边区的形势后，便号召说：“陕甘宁边区是民主的发祥地，中共中央所在地，培养了革命干部，做了很多使人民翻身、使中国民主和平独立的事情，我们要尽一切力量保卫边区、保卫延安、保卫毛主席、保卫朱总司令！”他要求“大家要团结起来，接受过去的经验，建立起民兵游击队等组织，配合正规军作战，把胡宗南打出去！指战员们，民兵们，游击队员们，一切人们组织起来，粉碎卖国贼蒋介石的进攻！”（群众高呼：保卫延安！保卫毛主席！保卫朱总司令！）续由朱总司令、彭副总司令、周恩来同志相继讲话（原文另详），邓颖超同志代表妇女界说：“这次一定能打胜仗，抗日中间就是这样，对不对？（群众说：“对！”）坚壁清野，不给敌人一颗粮食，让它住不下去，让它活不了！解放区七千万妇女不落后，是不是？（到会妇女说：“是！”）我们一定能跟上去！（大家一致说：“能跟上去！”）男人们到前线去，女人们做鞋、做衣服、搞土地改革、生产，一定能打胜仗！各种工人、青年等组织要成为一个参战的组织，配合作战，一定可以打胜仗！中国人民一定要胜利！”（大家高呼：中国人民一定能胜利！）接着由王会长克温代表商界讲演，他说：“蒋介石撕毁了协定，进攻解放区，又进攻延安。延安工农商各界团结起来、参加自卫军、担架运输队，打退敌人，我们是有力量的！坚决保卫边区，保卫延安，保卫毛主席，保卫朱总司令！”讲演毕，即通过大会通电（另详见今日本报第二版），高呼口号，散会。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6ffede638b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
