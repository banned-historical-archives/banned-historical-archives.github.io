script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"《南侨日报》创刊三周年  刊载毛主席等题词  五千余人集会忠诚拥护祖国","authors":[],"dates":[{"year":1950,"month":1,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"《南侨日报》创刊三周年"},{"type":"paragraph","text":"刊载毛主席等题词"},{"type":"paragraph","text":"五千余人集会忠诚拥护祖国"},{"type":"paragraph","text":"【新华社北京七日电】据此间光明日报今日所载新加坡通讯，新加坡《南侨日报》于去年十一月二十日即该报创刊三周年纪念日，刊出祖国中央人民政府各首长的题词，并举行了庆祝大会。毛主席的题词是：“为侨民利益而服务”，周恩来总理的题词是：“为宣传新民主主义的共同纲领而奋斗，为保护国外华侨的正当权益而奋斗。”该报创刊三年庆祝会于新加坡大世界游艺场举行，到会者五千余人，热烈表示对祖国中央人民政府的拥护。会中该报为表示对祖国的无限忠诚和拥戴，献给中央人民政府一面绣有全体工作人员签名和椰树的锦旗，由中央人民政府华侨事务委员会副主任委员庄希泉代表接受。会后并举行游艺节目，其中有第一次被介绍到南洋的秧歌舞。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"49c254683d"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
