969,"month":2,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"各国海员热爱毛主席"},{"type":"paragraph","text":"航行到我国大连港的各国广大劳动海员，无限热爱毛主席，无限热爱毛泽东思想。"},{"type":"paragraph","text":"有些外国海员为了寻求革命真理，积极向我们索取毛主席著作和毛主席像章。从一九六八年以来，到大连港的各国海员，主动向我们索取各种文版的《毛主席语录》一千五百五十五本，《毛泽东选集》和毛主席著作单行本七千八百五十二册，金光闪闪的毛主席像章一万一千二百六十二枚。每当他们喜得盼望已久的革命宝书时，有的高高地举过头顶，有的亲切地紧贴在胸口。他们手捧宝书，认真学习。例如英国一个年轻的水手，在他读过的毛主席著作的空白处，写下了密密麻麻的读后感。他在《战争和战略问题》一文的“枪杆子里面出政权”，“整个世界只有用枪杆子才可能改造”的句子旁，划上着重号，并写道：“这是最科学的论断，最伟大的革命真理。毛泽东主席真不愧为世界上最伟大的革命家！”"},{"type":"paragraph","text":"有些劳动海员，为了更好地学习毛泽东思想，建立学习毛主席著作小组，开学习毛主席著作讲用会，交流学习经验。他们不仅热情颂扬毛主席的伟大功绩，表达他们无限热爱毛主席和毛泽东思想的深厚无产阶级感情，而且还以愤怒的心情，批判大叛徒、大内奸、大工贼刘少奇的黑《修养》。一个日本劳动海员愤慨地说：“反革命修正主义分子刘少奇的《修养》和宫本显治唱的是一个腔调。他只要我们‘修养’，不要我们革命。我要控诉，要斗争，要造帝国主义、修正主义的反，要造日共宫本修正主义集团的反。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"568e106969"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
