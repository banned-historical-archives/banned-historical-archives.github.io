script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"大阪举行宴会热烈欢迎邓副总理","authors":[],"dates":[{"year":1978,"month":10,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"大坂举行宴会热烈欢迎邓副总理"},{"type":"paragraph","text":"新华社大坂十月二十八日电　大坂府知事、大坂市长、大坂商工会议所今晚在皇家饭店联合举行宴会，热烈欢迎邓小平副总理一行。"},{"type":"paragraph","text":"大坂府知事黑田了一在宴会上致词说，今天世界处于重大变动之中，各国之间强烈希望建立友好合作关系，日本和中国应在亚洲和世界上起很大的作用。在这种情况下，长期以来所期望的日中和平友好条约终于在双方的热情努力下缔结了，大坂各阶层人士都对此表示祝贺。"},{"type":"paragraph","text":"黑田说，日本和中国有着一衣带水的关系。缔结日中和平友好条约意味着日中两国关系恢复了本来应有的状态，同时也是新的出发点。他说，从历史上看，大坂同中国在经济、文化等各方面都有着密切的往来，大坂各阶层人士对中国抱有传统的亲切感。他表示，希望日中两国今后在政治、经济、科技、文化、体育等各方面，进一步扩大友好交流。"},{"type":"paragraph","text":"廖承志副委员长在宴会上讲话，他代表邓小平副总理对大坂各界朋友们的热情招待表示深切谢意，并向八百万大坂人民转达中国政府和中国人民的良好祝愿和亲切问候。"},{"type":"paragraph","text":"他指出，历史悠久的名城大坂，自古以来就与中国有着密切的友好交往。中日邦交正常化后，大坂和上海结成了友好城市，并互设了总领事馆，双方的友好往来日益发展。"},{"type":"paragraph","text":"廖副委员长说：“大坂人民和各界友好人士长期来为促进中日友好关系的发展和缔结中日和平友好条约进行了不懈的努力，作出了宝贵的贡献，这是十分令人钦佩的。在此谨表示衷心的感谢和崇高的敬意。”"},{"type":"paragraph","text":"他说，目前，中国人民正在华国锋主席为首的中共中央领导下进行新的长征，决心在本世纪内把我国建设成为现代化的社会主义强国。“我们依靠自力更生建设我们的国家，同时也要学习外国的先进科学技术和一切先进经验。日本有许多先进的东西值得我们学习和借鉴。随着两国睦邻友好关系的发展，我们之间的友好往来和各领域的交流将会不断扩大，我们两国人民之间的传统友谊与合作一定会结出新的更加丰硕的果实。”"},{"type":"paragraph","text":"园田外相的夫人园田天光光、佐藤大使夫妇、大坂市长大岛靖、大坂商工会议所会长佐伯勇等近二百名各界人士出席了宴会。席间，宾主频频举杯，祝贺中日和平友好条约的生效和日中友好事业的发展。"},{"type":"paragraph","text":"邓副总理一行是今天下午从奈良乘汽车到达大坂的。他们在皇家饭店门前，受到了黑田知事、大岛市长以及佐伯勇会长和大坂各阶层人士的热烈欢迎。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"091f24e0af"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
