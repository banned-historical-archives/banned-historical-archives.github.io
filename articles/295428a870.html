":[],"dates":[{"year":1947,"month":1,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"感谢毛主席、朱总司令领导翻身"},{"type":"paragraph","text":"更乐农民表心意"},{"type":"paragraph","text":"严冬送上好皮衣"},{"type":"paragraph","text":"【本报讯】涉县更乐村翻身农民在欢度旧历新年的时候，家家户户感谢大恩人毛主席和朱总司令，都说：“今天的好时光是毛主席和朱总司令给的”。全村农民挑选了两件最好的皮袄送给自己的恩人，并写了许多感恩信，其中一封写道：“亲爱的毛主席、朱总司令：你们身体健康吧！我们在你二位的领导下，彻彻底底的翻了身，把石板一块一块的都掀翻了，我们可觉得舒快哩！俺这舒快是你们给的，千年万载不会忘记的，你们两个人比上俺爹娘还要亲，俺们没有什么好东西感谢你们，除了送你们皮袄两件表表我们的心事外，我们只有永远的照住你们两个人所指给我们的道路走。”另一封中写道：“毛主席同志：要不是你，我就不能翻身，拥护你东西是一个穷心，礼轻仁义重……送这皮袄是应该的；希来个照像，我就放心，知道老恩人穿上了。”全村农民同时并赠送两件皮袄给刘司令员与杨主席。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"295428a870"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
