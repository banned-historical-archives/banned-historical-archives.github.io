tart":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"共颂毛主席和霍查同志亲手缔造的伟大中阿友谊 共祝中国文化大革命和阿革命化运动的辉煌胜利","authors":[],"parts":[{"type":"paragraph","text":"周恩来陈伯达康生李富春江青戚本禹姚文元等同志应邀出席招待会 纳塔奈利大使和周恩来同志发表了热情洋溢的讲话"},{"type":"paragraph","text":"据新华社二十九日讯 阿尔巴尼亚驻中国大使瓦西里·纳塔奈利今晚举行盛大招待会，热烈庆祝阿尔巴尼亚解放二十三周年。"},{"type":"paragraph","text":"中央和中央文革小组负责同志以及其他方面的负责同志周恩来、陈伯达、康生、李富春、江青、戚本禹、姚文元、陈毅、李先念、聂荣臻、谢富治、杨成武、吴法宪、汪东兴、叶群、郭沫若、刘宁一等，应邀出席了招待会。"},{"type":"paragraph","text":"阿尔巴尼亚劳动党中央委员、不管部长谢·佩奇同志，和由他率领的阿中友协代表团，出席了招待会。"},{"type":"paragraph","text":"招待会开始时，乐队奏中国国歌和阿尔巴尼亚国歌。"},{"type":"paragraph","text":"纳塔奈利大使和周恩来同志先后在招待会上发表了热情洋溢的讲话。周恩来同志代表我们伟大领袖毛主席和他的亲密战友林彪同志，代表中国共产党、中国政府和中国人民，向阿尔巴尼亚人民的伟大领袖、中国人民的亲密战友恩维尔·霍查同志，向光荣的阿尔巴尼亚劳动党，向阿尔巴尼亚人民共和国政府和兄弟的阿尔巴尼亚人民，表示最热烈的祝贺。"},{"type":"paragraph","text":"招待会上洋溢着中阿两国人民之同的战斗友谊的热烈气氛。在悬挂着中阿两国国旗的招待会会场上，中阿两国同志满怀无产阶级国际主义的友情，用最美好的语言，热烈赞颂由毛泽东同志和恩维尔·霍查同志亲手缔造的伟大的中阿友谊，热烈祝贺中国无产阶级文化大革命和阿尔巴尼亚革命化运动取得的辉煌胜利，表示中阿两国人民在反对帝、修、反的斗争中，在为实现社会主义和共产主义胜利的斗争中，永远团结在一起，战斗在一起。"},{"type":"paragraph","text":"纳塔奈利大使和周恩来同志的讲话，在全场激起一阵阵雷鸣般的热烈掌声。（纳塔奈利大使和周恩来同志的讲话全文见二、四版）"},{"type":"paragraph","text":"应邀参加招待会的，还有政府各部门的负责人，中国人民解放军各总部、各军种、兵种的负责人，北京市革命委员会的负责人和首都革命群众组织的代表。他们当中有王树声、李天佑、王新亭、邱会作、萧劲光、李作鹏、余立金、张秀川、郑维山、方毅、乔冠华、李强、张奚若、楚图南、吴德、刘锡昌、赵志玺、林晓芒、李冬民等。"},{"type":"paragraph","text":"应邀出席招待会的，还有各国驻中国使节。"}],"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"戚本禹","type":"人物"},{"name":"康生","type":"人物"},{"name":"江青","type":"人物"},{"name":"陈伯达","type":"人物"},{"name":"姚文元","type":"人物"},{"name":"李富春","type":"人物"},{"name":"中央文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e5207fbc72"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
