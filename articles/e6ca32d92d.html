":[{"year":1986,"month":7,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"作者:李标晶"},{"type":"paragraph","text":"刊于《广西文学》一九八六年第七期"},{"type":"paragraph","text":"这是作者正在写作的茅盾传记中的一章。在那场史无前例的民族大劫难中，茅盾虽然没被关进“牛棚”，但也未能幸免，他遭到无端批判，被迫放下手中笔，处于几乎与世隔绝的痛苦状况中。作者通过对茅盾这些年生活遭遇的描写，写出了一代文豪对祖国命运的震惊、愤怒和悲伤。这里有横眉冷对的沉默，有大义凛然的直言，有失去伴侣的哀痛，有对慈母的怀念，也有周总理的关心爱护和朋友间相互关怀的友情。作者还用不少的篇幅写了茅盾在“文化大革命”中，以巧妙的:形式，通过各种含蓄的诗词，同“四人帮”作斗争的情况，表现了这位伟大作家的深邃的思索和铮铮铁骨、傲然正气。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e6ca32d92d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
