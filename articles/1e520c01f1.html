r":1945,"month":11,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【中央社定远营廿四日电】阿拉善旂农工商等团体，以共军到处攻城略地，破坏统一，廿一日特联合致电毛泽东，请即停止军事行动，以维统一，原电称，胜利伊始，民困待苏，中国不可再有内战，先生诺言，今犹在耳，讵当胜利复员而团结大计正在商谈之时，贵党军队竟进攻晋绥，破坏交通，似此言行相悖，此非蓄意制造内战，居心破坏统一者何，须知今后建国，端赖和平团结，如违民意，必为国人唾弃，深望先生实践前言，维护统一，迅即停止军事行动，国家幸甚，民族幸甚。"}],"comments":[],"origin":"中央社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1e520c01f1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
