script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji31","name":"毛泽东全集第31卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji31.pdf"],"article":{"title":"对董必武等关于五机关合署办公及开展三反斗争情况报告的复信","alias":"","parts":[{"type":"paragraph","text":"对董必武等关于五机关合署办公及开展三反斗争情况报告的复信"},{"type":"paragraph","text":"（1951年12月30日）董必武、罗瑞卿同志阅后，交彭真同志阅办："},{"type":"paragraph","text":"（一）十二月二十九日关于五机关合署办公以及开展三反斗争情况的报告已收到，阅悉。"},{"type":"paragraph","text":"[1]董必武，当时任中央人民政府委员、政务院副总理兼政治法律委员会主任。罗瑞卿，当时任中央人民政府公安部部长。"},{"type":"paragraph","text":"[2]彭真，当时任中共中央书记处候补书记、政务院政治法律委员会副主任。"},{"type":"paragraph","text":"[3]指董必武、彭真、罗瑞卿1951年12月29日关于中央政法部门5个机关实行合署办公和动员三反的初步情况给周恩来并报毛泽东、中央的报告。报告内容有4条，其中第一、二、三条讲政法委员会、最高人民法院、最高人民检察署、中央司法部和法制委员会五机关合署办公的情况、好处和困难。第四条讲这次实行五机关合署办公和初步发动三反运动中暴露出的我们党内的问题。这些问题是：（一）党内有些本位主义的思想，常常不自觉地给党外人士的权位思想作了支柱，妨害内部工作上应有的统一领导。过去各部门间经常有些不从实际工作出发，单纯地搬“政府组织法”，闹工作关系问题的现象，甚至有所谓“利用民主人士打胜仗”之说。（二）自由主义现象相当严重，对三反运动有袖手旁观的，也有强调自己业务与此中心运动对立的，对党组、党委决定，不合自己意见的不宣不传，各顾各的，不看整体，原则同意的事，办不办都不一定。（三）有些部门的民主人士负责人，对三反只要反贪污一反，他们对反浪费反官僚主义这两反很不积极。毛泽东全集第三十一卷"},{"type":"paragraph","text":"（二）报告第四条第一项所说“利用民主人士打胜仗”的人是些什么人，姓甚名谁，他们如何利用民主人民（士）去打仗的，请补报。这样的人已丧失作为一个严肃的共产党人的立场，必须按其情节轻重给以必要的纪律方面的党内处罚，请你们议定处罚办法（邀同本人参加）报告中央核办。"},{"type":"paragraph","text":"（三）报告第四条第二项所说对三反运动采取自由主义态度的党员是些什么人，姓甚名谁，请补报。对于这样的人，应给以一个限期（例如十天），遵照中央决议，认真发动群众开展反贪污反浪费反官僚主义的斗争，否则即须撤职。如果本人有贪污实据，还须开除党籍；严重者须送法院惩办。"},{"type":"paragraph","text":"（四）报告第四条第三项所说只要“一反”，不要其余“二反”的民主人士，是些什么人，姓甚名谁，请补报。"},{"type":"paragraph","text":"（五）报告的其他部分，均同意。"},{"type":"paragraph","text":"毛泽东一九五一年十二月三十日"}],"authors":["毛泽东"],"dates":[{"year":1951,"month":12,"day":30}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":202,"page_end":203},"tags":[{"name":"毛泽东","type":"人物"},{"name":"彭真","type":"人物"},{"name":"罗瑞卿","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ad0818988f"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
