tart":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"“你们都是毛主席的好战士”","authors":[],"parts":[{"type":"paragraph","text":"事情发生在七十一医院门诊部。"},{"type":"paragraph","text":"这天下午，一位贫农老大爷看完病，付了药费就匆匆忙忙地走了。卫生员曾德荣清点药费时发现多了一分钱。他朝门外望了望，老大爷早已走远了。“只一分钱嘛，算了吧。”这个念头刚一闪现，他马上感到不对头。毛主席为我军制定的“三大纪律”的第二条就是“不拿群众一针一线”，这一分钱怎能算了呢！"},{"type":"paragraph","text":"曾德荣拿上这一分钱，朝着贫农老大爷走的方向追去。赶了一里多路，他终于追上了老大爷，把多收的一分钱还给老大爷。老大爷很不过意地说：“看你跑得气喘吁吁，一分钱算得了什么呀？”曾德荣就向老大爷宣传毛主席亲自为我军制定的“三大纪律八项注意”的伟大意义，他说：“我们是毛主席的战士，应该自觉地遵守革命纪律。”老大爷听了十分感动，紧紧地握住曾德荣的手说，“好，好，毛主席的战士就是要听毛主席的话，你们都是毛主席的好战士。”（本报通讯员）"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3f5248f10d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
