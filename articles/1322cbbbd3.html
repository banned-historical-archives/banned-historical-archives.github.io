ical-archives/banned-historical-archives8/main/maoquanji25.pdf"],"article":{"title":"十一纵可到三河集结相机攻击通具一带","alias":"","parts":[{"type":"paragraph","text":"十一纵可到三河集结相机攻击通县一带1]"},{"type":"paragraph","text":"（1948年10月29日）林、罗、刘，并告热河："},{"type":"paragraph","text":"本日八时电悉。你们既已将塔山守备部队撤下休整，十一纵似可调出使用于北平方面。如你们同意，即请令该纵取捷径，经遵化、蓟县到三河集结，相机攻击通县一带，并暂受杨罗耿指挥。蒋傅为捣毁平山、石门二带中央及华北政府所在地之自的，使用三个最强的军，一个骑兵师，一个骑兵旅，一个坦克队及一个工兵爆炸队，先头本日已占望都。我杨罗耿回援后，在兵力对比上，尚"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军委起草的给东北野战军司令员林彪、政治委员罗荣桓和参谋长刘亚楼的电报。"},{"type":"paragraph","text":"[2]热河，旧省名，辖今河北省东北部、辽宁省西南部和内蒙古自治区东南部地区，1955年撤销。这里指热河军区。"},{"type":"paragraph","text":"[3]指1948年10月29日8时林彪、罗荣桓、刘亚楼给中共中央军委、东北局的电报。电报说：昨日我已有3个纵队进到辽河沿岸，因无浮桥而少渡船无法过河，现正加紧架桥。我十纵昨将一一六师（缺1个营）全部歼灭。已令我塔山守备部队撤下休整。"},{"type":"paragraph","text":"[4]杨罗耿，指杨得志、罗瑞卿、耿飚，当时分别任华北军区第二兵团司令员、政治委员和参谋长。"},{"type":"paragraph","text":"[5]蒋，指蒋介石。傅，指傅作义，当时任国民党军华北“剿匪”总司令部总司令。不足歼灭此敌。现通县、北平一带空虚，原开通县之十三军的第四师亦被调用于平保线”，如十一纵能出现于通县方面调动南下敌军一部回头，则我杨罗耿可给其余部以歼灭打击。"},{"type":"paragraph","text":"军委艳酉"}],"authors":["毛泽东"],"dates":[{"year":1948,"month":10,"day":29}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":130,"page_end":131},"tags":[{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1322cbbbd3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
