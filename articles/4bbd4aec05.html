" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji33","name":"毛泽东全集第33卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji33.pdf"],"article":{"title":"给张澜、黄炎培的信","alias":"","parts":[{"type":"paragraph","text":"给张澜、黄炎培的信"},{"type":"paragraph","text":"（1953年5月13日）张副主席、黄副总理："},{"type":"paragraph","text":"五月五日惠书及周孝怀先生意见书，收到，阅悉；并已转付有关各部门负责同志阅看。其中有些问题，已请周总理酌处。便时尚希转告孝怀先生。此复"},{"type":"paragraph","text":"顺致敬意"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一九五三年五月十三日周书奉还。"},{"type":"paragraph","text":"[1]张澜，当时任中国民主同盟中央委员会主席、中央人民政府副主席。黄炎培，当时任中国民主建国会主任委员、政务院副总理。"},{"type":"paragraph","text":"[2]指张澜、黄炎培1953年5月5日给毛泽东、周恩来的信。信中说：“周孝怀君从上海来信，大意是：希望政府考虑明令三反五反总结束，安慰受冤，释放无问题被拘者，扭转人心。附笺还谈到农业税等问题。我们会商一下，认为这些都在政府慎重处理之中，孝怀此函，自是一片忠爱热诚的流露，将原笺送陈，以供参考。”"},{"type":"paragraph","text":"[3]周孝怀，当时任上海民生轮船公司董事长。"}],"authors":["毛泽东"],"dates":[{"year":1953,"month":5,"day":13}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":167,"page_end":167},"tags":[{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4bbd4aec05"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
