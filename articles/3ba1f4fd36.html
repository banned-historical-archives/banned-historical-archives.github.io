art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"只有毛主席才有这样伟大的魄力","authors":[],"parts":[{"type":"paragraph","text":"世界革命者誉称这场世界上最伟大的革命群众运动，是毛主席“为国际共产主义运动作出的卓越贡献”。日本一位八十多岁的老人无比崇敬地说，只有毛泽东主席才有这样巨大的魄力，发动这场具有世界意义的革命群众运动。澳大利亚《先锋报》指出，“毛泽东敢于支持造反的红卫兵运动。只有伟大的马克思列宁主义者才能预见到这一运动的巨大解放力量”。意大利共产党（马克思列宁主义）领导人说，毛主席“放手发动群众，把重大政治问题直接交给群众去处理，这是一种大无畏的革命行动”。许多国家的革命者指出，正是有了这种浩浩荡荡、奔腾澎湃的群众运动，正是亿万革命群众遵循了毛主席的教导，执行了毛主席的无产阶级革命路线，才使社会主义中国“刨掉了帝国主义和现代修正主义的毒根”；“摧毁了资本主义复辟的社会基础”；“巩固了无产阶级专政”；“确保了社会主义江山，世世代代永不变色”；“促进了社会主义建设的更大跃进”；“保证了中国从社会主义向共产主义的过渡”。阿尔巴尼亚的报纸指出，毛主席和中国共产党“充分发挥人民群众的革命首创精神，这是铲除修正主义毒草的最有效的手段，是永远堵塞资本主义的任何社会主义国家复辟的道路的最可靠的保证”。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3ba1f4fd36"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
