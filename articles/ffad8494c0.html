script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"武汉染料厂革委会加强阶级和阶级斗争教育  帮助青年工人自觉抵制资产阶级思想的侵蚀","authors":[],"dates":[{"year":1970,"month":3,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"武汉染料厂革委会加强阶级和阶级斗争教育"},{"type":"paragraph","text":"帮助青年工人自觉抵制资产阶级思想的侵蚀"},{"type":"paragraph","text":"据新华社武汉电　武汉染料厂革委会在驻厂解放军毛泽东思想宣传队的帮助下，遵照伟大领袖毛主席关于“青年，即使是青年工人，因为没有受过旧社会的苦，更应该加强阶级教育，提高他们的思想觉悟”的教导，抓紧对青年工人进行阶级和阶级斗争教育，增强了广大青年工人抗御资产阶级思想腐蚀的能力，促进了青年工人的思想革命化。"},{"type":"paragraph","text":"武汉染料厂是一个新建立的工厂，青年工人占全厂工人总数的百分之五十以上。驻厂解放军毛泽东思想宣传队和厂革委会深深认识到：用伟大的毛泽东思想教育和培养青年工人，这是关系到造就无产阶级革命事业接班人，巩固无产阶级专政的大事。因此，他们经常同老工人一道，深入细致地研究青年工人的思想状况，针对阶级敌人妄图利用各种手段腐蚀毒害青年工人的罪恶活动，及时举办毛泽东思想学习班，组织青年工人学习毛主席关于阶级和阶级斗争的教导，以战无不胜的毛泽东思想为武器，开展革命大批判。去年十月以来，这个厂经常召开批判会和出版大批判专栏，人人口诛笔伐，对形形色色的资产阶级思想进行了批判，大大提高了青年工人抵制资产阶级思想侵蚀的自觉性。驻武汉染料厂解放军毛泽东思想宣传队和厂革委会还依靠老工人不断对青年工人进行无产阶级革命传统的教育，帮助他们树立无产阶级世界观。许多老工人经常给青年工人讲厂史、家史、两条路线斗争史，开展忆苦思甜活动，提高了青年工人的阶级斗争和两条路线斗争觉悟。一车间有个青年工人，一度放松世界观的改造，受到资产阶级思想的侵蚀，追求生活享受。车间老工人黄绍龙同他一起忆苦思甜，向他讲工人阶级的革命传统。这个青年工人在黄师傅的帮助下，批判了资产阶级思想，狠斗了自己头脑中的资产阶级“私”字。从此以后，他坚持活学活用毛主席著作，自觉地向老工人学习，认真改造世界观，成为这个车间的毛泽东思想宣传员，还被评为“五好”工人。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ffad8494c0"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
