" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"戚本禹给地质部机关革命造反团的一封电话信","authors":["戚本禹"],"dates":[{"year":1967,"month":4,"day":10}],"is_range_date":false,"parts":[{"text":"戚本禹给地质部机关革命造反团的一封电话信","type":"title"},{"text":"戚本禹","type":"authors"},{"text":"革命造反兵团的同志：","type":"appellation"},{"text":"四月五日来信收到，谢谢！","type":"paragraph"},{"text":"地质学院东方红的同志曾向我谈过地质部的情况，他们认为旷伏兆同志是个比较好的同志，可以参加革命三结合的领导班子。我向有关方面对旷伏兆同志的情况进行了一些调查，觉得地质学院东方红的同志对旷伏兆同志的看法大体上是对的。我希望你们考虑革命小将的意见，支持旷伏兆同志，迅速建立地质部领导班子，抓革命、促生产，在革命和生产战斗中为人民作出新的贡献。同时，也希望旷伏兆同志能够很好地依靠和团结广大革命群众（包括炮轰过自己的，反对过自己的革命同志）虚心向群众学习，改正自己的错误，把地质部的文化大革命进行到底！","type":"paragraph"},{"text":"以上只是地质学院东方红的同志和我的一种意见，供你们参考。","type":"paragraph"}],"comments":[],"origin":"1967年5月北京玻璃总厂红卫兵联络站编《中央首长讲话（4）》","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"戚本禹","type":"人物"},{"name":"革命三结合","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ceff8e18a6"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
