rt":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席啊，毛主席！珠穆朗玛峰再高，没有您的恩情高","authors":[],"parts":[{"type":"paragraph","text":"在祖国边疆喜马拉雅山南麓的深山密林里，传诵着藏族女青年班宗无限热爱毛主席，活学活用毛泽东思想的动人事迹。"},{"type":"paragraph","text":"一天清晨，班宗带领青年们，巡逻在深山密林中。他们为了保卫伟大的社会主义祖国，经常配合解放军日夜巡逻，警惕地守卫着祖国边疆。正当她巡逻的时候，突然发现有一处山林起火，火势越来越大，严重地威胁着边疆居民生命财产的安全。"},{"type":"paragraph","text":"班宗急忙向起火的地方奔去。她铭记着毛主席关于“我们为人民而死，就是死得其所”的伟大教导，奋不顾身地扑向火海，勇敢灭火。她的衣服和头发都被烧焦了，但她仍然丝毫不顾个人安危，高呼着“下定决心，不怕牺牲，排除万难，去争取胜利”，一直坚持到扑灭了这场山火。"},{"type":"paragraph","text":"班宗所以能够这样临危不惧，最根本的一条，就是因为她无限热爱毛主席，如饥似渴地学习毛主席著作，学了就用。有一天，她和青年们到一个村庄去宣传毛泽东思想，发现阶级敌人破坏农业生产，便立即带领群众同阶级敌人进行斗争，把阶级敌人的反动气焰打了下去。广大贫苦农牧民激动地说：毛主席的教导指引着我们藏族人民战胜敌人，奋勇前进！"},{"type":"paragraph","text":"班宗今年十九岁。在旧社会，她家世世代代当奴隶，受尽牛马苦，挨尽领主鞭，她兄妹十一人，被饿死、冻死八个。解放后，毛泽东思想的光辉照亮了西藏高原，班宗一家人和百万藏族农奴彻底翻了身。班宗逢人总是激动地说：“有了毛主席的英明领导，才有我班宗一家的今天。珠穆朗玛峰再高，没有毛主席的恩情高。我们藏族人民一定世世代代听毛主席的话，永远跟着毛主席干革命！”"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"abdd7e48a2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
