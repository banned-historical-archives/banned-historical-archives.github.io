<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"四川省卫生厅关于涪陵县龙潭区明泉公社发病多、死亡严重的检查报告","authors":[],"dates":[{"year":1961,"month":7,"day":25}],"is_range_date":false,"parts":[{"text":"四川省卫生厅关于涪陵县龙潭区明泉公社发病多、死亡严重的检查报告","type":"title"},{"text":"明泉公社是个二类地区，全社有2,345户，8,909人，其中男的4,016人，女的4,893人。","type":"paragraph"},{"text":"疾病死亡情况：61年1至7月5日止（据公社登记）共死亡459人，占总人口的5.16%，6月1日至7月5日就死亡157人，总死亡总数的34.2%。经查对结果，实际死亡比登记数大。如明月大队6月1日至7月5日，死亡登记的只有25人，实际死亡60人。双石大队死亡登记的35人，实际死亡47人。","type":"paragraph"},{"text":"该社疾病、死亡大的主要原因是：","type":"paragraph"},{"text":"第一，生活安排不好，口粮接不上，蔬菜缺乏，副食品搞得差。全社已有一个多月未搭配粮食，社员的小春予分粮和增种粮，大部份生产队吃光了。全社已无粮吃的计有1,682户，占总户数的70.17%。在这种情况下，公社缺乏领导群众渡荒的具体措施和信心，依粮口家解决问题。","type":"paragraph"},{"text":"第二，治病工作抓得差。六月上旬以来，疾病、死亡不断增加，但并未引起公社党委应有的重视，也未采取紧急措施，病人出院后的生活、医药、劳动无人管，加之区部份病人患病久、住院长、工分少、粮食分得少，生活下降，代病参加劳动，体质不断减弱，产生低血糖病而死亡。","type":"paragraph"},{"text":"第三，区一级的卫生部门无人负责，散在农村的病人，巡回医疗跟不上，十个大队的防病治病仅有4人负责，缺乏少药的情况较为普遍。","type":"paragraph"},{"text":" 摘自涪陵地委除办室简报1961年7月25日","type":"paragraph"},{"text":"来源：四川省卫生厅“省委除害灭病办公室工作组对涪陵、达县、绵阳、温江等专区防治肿病的调查材料(1961年3月-9月)”.","type":"paragraph"}],"comments":[],"origin":"四川省某档案馆","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5b0063dec4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
