<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"市冶金工业局领导干部认真学习革命导师的光辉论述用对立统一规律观察社会主义社会 努力搞清楚对资产阶级专政的问题","authors":[],"dates":[{"year":1975,"month":2,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社上海一九七五年二月二十二日讯　上海冶金工业局党委、革委会领导成员认真学习毛主席关于理论问题的重要指示和《人民日报》、《红旗》杂志选辑的马克思、恩格斯、列宁关于无产阶级专政的部分论述，对于为什么要对资产阶级专政的问题有了新的认识。他们说，我们必须用对立统一的观点来观察社会主义社会。社会主义社会实现了所有制的根本改变，这是一个翻天覆地的变化。社会主义显示了巨大的优越性。但是，正如马克思早就指出的，它“是刚刚从资本主义社会中产生出来的，因此它在各方面，在经济、道德和精神方面都还带着它脱胎出来的那个旧社会的痕迹。”对待这些旧社会的痕迹采取什么态度，这是前进还是倒退的大问题。解放二十多年来，伟大领袖毛主席领导我们在和资产阶级作斗争中，取得了一个又一个的胜利。这个过程，就是不断消灭旧社会痕迹的过程。我们要从理论上搞清楚这个问题，明确继续革命的方向，为消灭这些“旧社会的痕迹”而斗争到底。"},{"type":"paragraph","text":"这个局的领导干部在学习、讨论毛主席关于理论问题的重要指示和革命导师关于资产阶级法权的论述时，联系中国革命的历史和国际共产主义运动的历史经验，更加感到毛主席指出的对资产阶级法权要“在无产阶级专政下加以限制”的深刻意义。他们说，对于应该如何认识和对待资产阶级法权这个问题，要十分重视。要认真看书学习，真正弄清楚这个问题。同时在实践中要更加注意深入实际，深入群众，坚持参加集体生产劳动，永远把自己看作是一个普通劳动者。"},{"type":"paragraph","text":"有些同志在学习时，畅谈了经过无产阶级文化大革命和批林批孔运动，我国无产阶级专政空前巩固，社会主义新生事物大量涌现的伟大意义。他们说，社会主义新生事物是对资产阶级法权的挑战，具有强烈的生命力。比如，干部走五·七道路，知识青年上山下乡，工农兵参加马克思主义理论队伍，等等，这些都是有利于缩小三大差别、限制资产阶级法权的。我们对新生事物，一定要抱着满腔热情的态度，大力促使它茁壮成长。"},{"type":"paragraph","text":"通过学习、讨论，冶金局的领导干部重温了毛主席提出的“认真看书学习，弄通马克思主义”的伟大号召，感到格外亲切。他们说，没有革命的理论，就不会有革命的运动。我们必须认真看书学习，多读一点马列著作和毛主席著作，借助于马克思主义的望远镜和显微镜，来识别什么是社会主义，什么是资本主义，实现对资产阶级的全面专政。他们计划在学习马克思、恩格斯、列宁关于无产阶级专政部分论述的同时，选学《哥达纲领批判》、《共产党宣言》、《国家与革命》、《共产主义运动中的“左派”幼稚病》等马列著作和毛主席《在中国共产党第七届中央委员会第二次全体会议上的报告》、《论人民民主专政》等著作，联系实际，一个专题一个专题，一个问题一个问题地学，务求弄懂、学深。在这过程中，还要对社会现状亲自作一些调查，以便更好地理解无产阶级专政的理论，并努力帮助广大干部、群众一起学好，把巩固无产阶级专政的任务落实到基层。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"name":"批林批孔","type":"主题/事件"},{"name":"上山下乡","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"name":"限制资产阶级法权","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f29533bdfc"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
