ical-archives/banned-historical-archives8/main/maoquanji23.pdf"],"article":{"title":"给张曙时的信","alias":"","parts":[{"type":"paragraph","text":"给张曙时的信"},{"type":"paragraph","text":"（1947年11月18日）曙时同志："},{"type":"paragraph","text":"十月十七日来示读悉。法律工作是中央新设领导工作的一个部门，兄及诸同志努力从事于此，不算“闲居”。将来时局开展，出到外面工作，自属必要。目前则在激烈战争中，年老的人出去，似乎尚非其时。法律本于人情，收集各解放区实际材料，确是必要的。关于宪草的意见，托王谢二同志转达，不赘。贱体粗安，承问极感，天寒尚望珍摄。"},{"type":"paragraph","text":"敬候起居健吉！"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十一月十八日"},{"type":"paragraph","text":"[1]张曙时（1884—1971)，江苏睢宁人。当时任中共中央法律委员会委员。"},{"type":"paragraph","text":"[2]王谢，指王明、谢觉哉。"}],"authors":["毛泽东"],"dates":[{"year":1947,"month":11,"day":18}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":405,"page_end":405},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"15c4656a53"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
