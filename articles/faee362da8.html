script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"李鹏指出今年要办好两件大事  政治思想战线反对资产阶级自由化  经济上开展增产节约增收节支活动","authors":["李安定"],"dates":[{"year":1987,"month":1,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"李鹏指出今年要办好两件大事"},{"type":"paragraph","text":"政治思想战线反对资产阶级自由化  经济上开展增产节约增收节支活动"},{"type":"paragraph","text":"新华社北京1月20日电（记者李安定）国务院副总理李鹏今天在全国电子工业劳模表彰、厅局长会议上指出：今年，我们要办好两件大事：在政治思想战线上，反对资产阶级自由化；在经济上，开展增产节约、增收节支活动，把国民经济建立在长期、稳定发展的基础上。"},{"type":"paragraph","text":"李鹏说，最近中央作了重大人事变动，但是党的十一届三中全会以来的路线、方针、政策不会变，开放、改革的方针不会变，党的十二大确定的奋斗目标不会变。"},{"type":"paragraph","text":"李鹏说，电子工业是国民经济中的新兴工业，国家对电子工业抱有很大期望。电子工业一方面要为改善人民生活服务，更重要的是用先进的电子技术改造传统工业、农业，达到提高经济效益的目的。去年，电子工业在改革方面迈出了一大步，如全部直属企业下放，部机关进行了体制改革，军转民的工作也有很大进展。电子工业既有很大发展，也面临着一定的困难，希望电子行业的同志兢兢业业，深化改革，进一步发展大好形势。"},{"type":"paragraph","text":"李鹏说，搞社会主义建设要贯彻按劳分配原则，但是单有这条还不够，还要靠精神，要重视两个文明的建设。"},{"type":"paragraph","text":"中共中央书记处书记邓力群、中顾委副主任薄一波出席了今天的会议。薄一波还在会上发表了讲话。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"薄一波","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"faee362da8"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
