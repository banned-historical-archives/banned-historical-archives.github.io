script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"阿《人民之声报》发表文章揭露苏修加紧剥削工人阶级","authors":[],"dates":[{"year":1975,"month":10,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社地拉那一九七五年十月十八日电　阿尔巴尼亚《人民之声报》十月十八日发表署名文章，揭露苏修加紧对工人阶级的剥削。"},{"type":"paragraph","text":"文章说:“苏联复辟资本主义的反革命过程导致了完全建立修正主义新资产阶级的统治。”苏联的国家所有制是“一种生产和资本高度集中的特殊类型的资本主义所有制。修正主义资产阶级是国营企业的真正所有者，并在国家的帮助下剥削工人阶级和其他所有劳动群众。”"},{"type":"paragraph","text":"文章指出，今天“苏联的现实是:一方面，修正主义新资产阶级作为生产资料的唯一所有者，利用其统治地位掠夺苏联工人阶级和其他劳动者创造的物质财富，另一方面，广大的劳动群众遭受压迫和剥削。”"},{"type":"paragraph","text":"文章说:“由于修正主义资产阶级推行压迫和剥削政策的结果，修正主义资产阶级同劳动群众之间的鸿沟越来越深。新资产阶级奢侈腐化，囤积了大量的动产和不动产，过着腐朽的寄生虫的生活。法律、决定、命令和其他法律条例保证了他们获得各种利益的特权。”"},{"type":"paragraph","text":"文章指出，苏联的统治者“利用国家机构，掌握着经济生活的命脉，并按着自己的利益指导着经济生活。那些给新资产阶级带来巨额利润的部门，如军火工业的生产得到发展，而对人民的日用品的供应则严重缺乏，因为用于生产日用消费品的国家资金越来越少。”“与此同时，对人民的苛捐杂税却不断增加，日用品的销售价格也不断提高。”"},{"type":"paragraph","text":"文章最后说:“苏修资产阶级利用官僚主义和警察的国家机构，正在不断地加紧对失去生产资料的工人阶级和其他劳动群众的资本主义压迫和剥削。事实也表明，当权的资产阶级和劳动群众之间的矛盾正在深化和激化。”"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"82fad641f5"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
