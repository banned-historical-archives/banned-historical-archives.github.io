r":1961,"month":6,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"天津大学土建系最近就有关建筑艺术问题展开讨论。为了使讨论开展得更好，这个系还举办了一系列的学术报告会。第一次报告会由沈玉麟教授讲《资产阶级现代建筑是怎样产生的?》"},{"type":"paragraph","text":"报告人追溯了十九世纪欧美资本主义国家的历史背景与建筑发展概况，从历史的、社会的、阶级的根源，阐述了二十世纪西方资产阶级现代建筑的发生与发展过程，并着重介绍了资本主义现代建筑的三个主要学派——功能主义、唯理主义与有机建筑是怎样产生的。关于资产阶级美术理论对现代建筑的影响，报告人主要介绍了资产阶级现代建筑的几个主要学派，是在二十世纪初叶借助于当时反动的美术理论形成的；叙述了立体主义、纯粹主义、构成主义、表现主义以及超现实主义等美术流派对现代建筑学派的影响。报告人还介绍了功能主义、唯理主义和有机建筑三个学派的主要理论根据，他们的典型作品，以及对这些理论与实践活动的评价；并从建筑的阶级性、社会性剖析了资产阶级现代建筑的本质特征。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9c12e9f0d6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
