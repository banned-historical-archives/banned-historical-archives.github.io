script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反对外国垄断资本家和他侬集团的残酷剥削  泰国工人不断举行罢工  一美资公司工人坚持罢工，迫使资方答应工人提出的条件","authors":[],"dates":[{"year":1969,"month":3,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反对外国垄断资本家和他侬集团的残酷剥削"},{"type":"paragraph","text":"泰国工人不断举行罢工"},{"type":"paragraph","text":"一美资公司工人坚持罢工，迫使资方答应工人提出的条件"},{"type":"paragraph","text":"据新华社四日讯　曼谷消息：据泰国报纸报道，泰国工人为维护自己的权利，反对外国垄断资本家和他侬集团的残酷剥削，最近连续举行罢工，奋起斗争。"},{"type":"paragraph","text":"泰国北部达府筑路工人一千多人，二月十九日举行罢工，要求增加工资，改善生活条件。他侬卖国集团立即派出武装警察前往镇压，英勇的泰国筑路工人不畏强暴，坚持斗争，给他侬卖国集团和承建这个公路的资本家以沉重的打击。在中部北榄府，一家美国资本的汽车轮胎公司的二百五十名工人，一月十二日举行罢工，要求增加工资并废除压迫剥削工人的苛刻条例。工人们不顾他侬集团和资方的种种威胁，坚持罢工斗争到二月六日，迫使资方答应了工人所提出的条件。"},{"type":"paragraph","text":"二月六日，泰国南部宋卡府合艾县有一千名锡矿工人，手持标语牌，向到那里活动的傀儡总理他侬举行示威，抗议他侬卖国集团出卖泰国人民的利益，追随美帝，限制泰国锡的输出，造成工人失业。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"57f39c1559"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
