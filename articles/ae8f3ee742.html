做‘控制使用’的结论","dates":[{"year":1979,"month":2,"day":1}],"is_range_date":false,"authors":["组工通讯"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"铁道部政治部审干办公室, 审干工作政策选编 (一), 139-140","tags":[{"name":"干部","type":"主题/事件"},{"name":"控制使用","type":"主题/事件"}],"parts":[{"type":"title","text":"对干部不能乱做“控制使用”的结论"},{"type":"subtitle","text":"(―九七九年二月一日)"},{"type":"paragraph","text":"在战争年代和解放初期，由于客现条件的限制，有的干部的政治历史或社会关系问题，一时难以查清，不能做出肯定或否定的结论。因此，在使用上，党组织把他们放在次要的工作岗位，适当加以控制，以便继续进行考查。采取这种暂时性的措施，在当时是必要的。现在，全国解放快三十年了。经过多次政治运动和组织审查，有些同志已经查清确无问题，或者虽然有某些问题，但经过长期考察，一贯表现很好，组织上就应当解除过去的怀疑取消“控制使用”的结论，政治上予以信任，并按其德才条件，大胆使用。今后，对干部一般不做“控制使用”的结论。只是对极个别不控制使用就很可能危害社会主义事业的人，例如，本人确有重大的反革命嫌疑，或者有严重政治历史问题而又一贯表现恶劣的；直系亲属因反革命罪被镇压，本人因而对党和人民怀有仇恨的，在使用上才需要作必要的控制。但在他们的问题未彻底查清以前，对于其中有一技之长的人仍须根据情况注意发挥他们的作用，并在使用过程中继续进行教育和考察，确定控制使用对象，一定要从严掌握，须经省以上党委审查批准，切不可随意确定，草率从事。"},{"type":"paragraph","text":"(摘自一九七九年《组工通讯》第六期)"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ae8f3ee742"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
