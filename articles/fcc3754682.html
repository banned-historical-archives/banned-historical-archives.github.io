art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"痛斥党内头号走资本主义道路当权派的“剥削有功”论","authors":[],"parts":[{"type":"paragraph","text":"编者按："},{"type":"paragraph","text":"什么藤结什么瓜，什么阶级说什么话。党内最大的走资本主义道路的当权派，鼓吹“剥削有功”、“造反无理”，是为剥削阶级剥削劳动人民充当辩护士，是为人吃人的剥削制度唱赞歌，是为资本主义鸣锣开道。"},{"type":"paragraph","text":"党内最大的走资本主义道路的当权派，恬不知耻地说：“剥削得越多，功劳越大。”这纯粹是胡说八道。剥削阶级的“功劳”，就是吃人的“功劳”，就是杀人不眨眼的“功劳”，就是制造我们无产阶级和劳动人民血泪史的“功劳”。"},{"type":"paragraph","text":"不懂得什么是阶级，什么是剥削，就不懂得革命。广大工农兵群众，在旧社会深受剥削之苦，他们掌握了毛泽东思想，就最懂得什么是阶级，什么是剥削，就最要革命，他们对党内最大的走资本主义道路当权派的反动谬论就看得最清，恨得最深，批得最透。今天发表的这组稿件的作者，用毛主席的阶级和阶级斗争的观点作武器，去解剖党内最大的走资本主义道路当权派的丑恶灵魂，把他那复辟资本主义的阴谋，暴露在光天化日之下。"},{"type":"paragraph","text":"当前，对党内最大的走资本主义道路当权派展开的批判，是一场挖掉我国的修正主义总后台，防止资本主义复辟，大破资产阶级思想，大立毛泽东思想的革命群众运动。我们每个同志都要高举毛泽东思想的革命的批判的大旗，彻底地把党内最大的走资本主义道路的当权派批深批透。我们要为保卫毛主席、保卫毛泽东思想、保卫以毛主席为代表的无产阶级革命路线尽最大努力，誓把无产阶级文化大革命进行到底！"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fcc3754682"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
