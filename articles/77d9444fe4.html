script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"上海沪东造船厂革委会加强领导认真办好街头大批判专栏紧密配合当前形势　充分发挥战斗作用注意抓好负责搞大批判专栏人员的思想政治工作，坚决抵制资产阶级新闻观点的侵蚀，使大批判专栏成为加强无产阶级专政的有力武器","authors":[],"dates":[{"year":1969,"month":11,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　上海沪东造船厂革委会注意抓好负责搞街头革命大批判专栏人员的思想政治工作，坚决抵制资产阶级新闻观点的侵蚀，使街头革命大批判专栏成为加强无产阶级专政的有力战斗武器。"},{"type":"paragraph","text":"这个厂的出头革命大批判专栏已经坚持办了两年多，出了近五十期，因此，有些同志认为该批的都批过了，觉得再批无非还是“老生常谈”。甚至有人提出要吸引读者，就必须搞些“新鲜”的内容。"},{"type":"paragraph","text":"厂革委会发现了这一错误的思想苗子后，及时召集负责搞街头革命大批判专栏的人员进行座谈，组织大家反复学习毛主席“我们现在思想战线上的一个重要任务，就是要开展对于修正主义的批判”的伟大教导，以及林副主席在“九大”作的政治报告，使大家认识到，办街头革命大批判专栏，如果不突出无产阶级政治，就会走上资产阶级的邪道。接着，厂革委会又在全厂召开了革命大批判专栏经验交流会，并且成立了以工人为主体的革命大批判写作组，还进一步健全了办革命大批判专栏的组织。"},{"type":"paragraph","text":"这个厂在办街头革命大批判专栏时，注意引导大家批判各种资产阶级新闻观点。一次，一个负责抓大批判专栏的同志为了追求“新鲜”，特地派人到外面收集小道“新闻”，准备上大批判专栏。厂革委会发觉后，及时制止了这种做法。"},{"type":"paragraph","text":"这个厂的街头革命大批判专栏紧密配合斗、批、改各阶段的战斗任务，充分发挥了战斗作用。例如，在整党建党中，大批判专栏就狠批大叛徒刘少奇的黑“六论”；在深入开展经济领域斗、批、改时，他们就狠批大叛徒刘少奇的“爬行主义”、“洋奴哲学”、“专家治厂”等等。"},{"type":"paragraph","text":"目前，这个厂已经初步形成了群众关心办好革命大批判专栏的好风气。"},{"type":"paragraph","text":"本报通讯　员"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"77d9444fe4"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
