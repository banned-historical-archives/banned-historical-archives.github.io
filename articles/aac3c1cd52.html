" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji15","name":"毛泽东全集第15卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji15.pdf"],"article":{"title":"致周恩来等电","alias":"","parts":[{"type":"paragraph","text":"致周恩来等电！"},{"type":"paragraph","text":"（1940年12月6日）"},{"type":"paragraph","text":"为隔断韩德勤、霍守义，打通苏、皖，以便黄克诚增援皖东，粉碎桂军莫德宏之进攻起见，新四军苏北部队必须从淮安、宝应间开一缺口。苏北新四军各部正与韩部在曹甸、安丰激战，韩部已被截断，只待曹甸、安丰、阳念、黄浦、平桥等地占领，此次战役可结束。仍留兴化、高邮及他处不打，保存韩德勤。此缺口打通黄克诚主力即可向皖东增援。"}],"authors":["毛泽东"],"dates":[{"year":1940,"month":12,"day":6}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":269,"page_end":269},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"aac3c1cd52"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
