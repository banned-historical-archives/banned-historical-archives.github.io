art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"像吕祥璧那样一个心眼跟着毛主席四川省蓬溪县红卫兵小将会见英雄的妈妈","authors":[],"parts":[{"type":"paragraph","text":"本报讯 “不靠爹，不靠娘，英雄吕祥璧的成长，全靠毛泽东思想。我们热烈欢呼，我们纵情歌唱，欢呼我们心中最红最红的红太阳，歌唱哺育我们成长的毛泽东思想。”四川省蓬溪县红卫兵小将的代表们，在会见了英雄吕祥璧同志的母亲以后，怀着激动的心情，写下了这首热情洋溢的诗歌。"},{"type":"paragraph","text":"这次会见是在最近举行的。参加会见的还有专程前来蓬溪县参加吕祥璧追悼会的张思德同志的母亲、黄继光同志的母亲。"},{"type":"paragraph","text":"八十多名小将围坐在三位老人身边，倾听了她们讲述英雄成长的故事。"},{"type":"paragraph","text":"吕妈妈从吕祥璧解放前的苦难生活，讲到翻身解放，从他读书、劳动，讲到参军入伍。她亲切地说：“祥璧知道，我们翻身解放靠毛主席，我们建设社会主义靠毛主席。祥璧就是一个心眼：一个心眼热爱毛主席，一个心眼跟着毛主席，一个心眼读毛主席的书，一个心眼听毛主席的话，一个心眼做毛主席的好战士。他能够当毛主席的好战士，人民的好儿子，就是靠对毛主席的这一片忠心。”"},{"type":"paragraph","text":"张妈妈和黄妈妈都鼓励小将们好好向吕祥璧学习，像他那样响应毛主席伟大号召，关心国家大事，把无产阶级文化大革命进行到底。张妈妈说：“大家都说我有个好儿子，其实我那个儿子是从小就交给毛主席的，他就是听毛主席的话听得好。毛主席叫他干啥他就干啥，完全、彻底为人民服务。你们红卫兵就要学他这一点。”黄妈妈也说：“继光能在最危急的时候，用胸膛堵住敌人枪眼，也是因为他最听毛主席的话，能下定决心，不怕牺牲，排除万难，去争取胜利。”"},{"type":"paragraph","text":"红卫兵小将们听了三位英雄妈妈的勉励，个个精神鼓舞，都表示：要学英雄的思想，走英雄的道路，在头脑里树立毛泽东思想的绝对权威，做无产阶级革命事业的接班人。（报道组）"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"四川文革","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c18cfc1d00"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
