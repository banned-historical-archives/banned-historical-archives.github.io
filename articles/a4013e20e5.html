"authors":["黄炎培"],"dates":[{"year":1955,"month":6,"day":24}],"is_range_date":false,"parts":[{"text":"黄炎培“胡风的本质就是这样的”","type":"title"},{"text":"黄炎培","type":"authors"},{"text":"胡风我从没有认识过。胡风原名张光人，张光人我也没有认识过。","type":"paragraph"},{"text":"胡风事件最初揭载于报纸的时候，我还和有些人同样地认为是思想问题。后来从报纸上细细地看到了一批又一批关于胡风反革命集团的材料，统共一百六十九封信，看完了才恍然大悟，这不是思想问题，中间有那么大的政治背景，不自觉地激起我高度的仇恨和愤怒。","type":"paragraph"},{"text":"我现在明白了。读到了“湖北日报”记者所揭发的胡风对地主家庭的一贯的反革命立场那篇文章，我认识了胡风原来是：放高利贷，强奸无数妇女，残酷剥削农民、窑民、渔民，毒打农民，杀死农民，奸占贫农妻子，霸占公田、公湖，这样罪大恶极的血腥臭的大恶霸地主家庭的一个成员，胡风做出这种种勾当，并不奇怪，胡风的本质就是这样。","type":"paragraph"},{"text":"反革命分子的罪恶活动，是多种多样的。它抓住了人类心理上的弱点，人类厌丑，装做丑鬼来吓弄人；人类爱美，装做美貌来诱惑人。后者的阴险狠毒，超过于前者。阴险狠毒的胡风正是这后者一流。胡风知道马克思列宁主义在人民中间获得的信仰，在一天加高一天，就把马克思列宁主义当做外衣披上身来了。料不到马克思列宁主义到了万恶的胡风手里，被利用来欺骗不懂和不懂而想懂马克思列宁主义的人。","type":"paragraph"},{"text":"胡风的手法是“两面派”，搞的是“挖心战”，胡风的战略有时会从进攻转变为退却，“在忍受中求得重生”。胡风是善于“用孙行者钻进肚皮去”的策略钻进党的。但是，任凭胡风那么样阴险狠毒，到今天在强烈的太阳光照射之下，在人民群众千千万万只眼睛怒视之下，一切一切凶形怪相完全暴露了。","type":"paragraph"},{"text":"胡风这一事件，发展到现在，只有将反革命的胡风依法处理，将胡风分子依法分别处理；对于隐藏着的胡风反革命集团残余分子，必须各方各面严密搜查，尽量发掘出来，勿让一个漏网。","type":"paragraph"},{"text":"大家今后必须更加提高警惕，把胡风这一事件当做深刻的教育资料，要善于辨别伪善，肃清胡风之类的反动分子，并慎防一切反动分子的潜藏。当然，我们不能冤枉一个好人，但绝对不能放过一个坏人。","type":"paragraph"},{"text":"我个人只想提出一点：胡风既经披着马克思列宁主义外衣，可能有些信仰马克思列宁主义和正在学习马克思列宁主义的青年，在没有养成高度的辨别好的和坏的、真的和伪的能力的时候，被炫惑了，拖进去了，发生或多或少的关系了。这种被欺骗而不愿永远跟着胡风走的人，今天必须趁早真诚地坦白地交代，只要老老实实地自动交代，相信我们爱护青年、珍惜人才的人民政府会予以合法的宽恕的。","type":"paragraph"}],"comments":[],"origin":"一九五五年六月二十四日《人民日报》。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a4013e20e5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
