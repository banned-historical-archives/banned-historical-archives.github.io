authors":[],"dates":[{"year":1973,"month":6,"day":22}],"is_range_date":false,"parts":[{"text":"会见马里国家元首特拉奥雷时的谈话（节录）毛泽东（未经本人审阅）","type":"title"},{"text":"我们都是叫作第三世界，就是叫做发展中的国家。你不要看中国有什么展览会啊，其实啊，是一个很穷的国家。我说，I SAY（英文：我说），越穷越好！就会革命啊。西方国家呢，不大行了。","type":"paragraph"},{"text":"无论怎么样，这些西方资本主义国家是创造了文化，创造了科学，创造了工业。现在我们第三世界可以利用他们的科学、工业、文化──包括语言──的好的部分。","type":"paragraph"},{"text":"（外交部绝密文件，文特43）","type":"paragraph"}],"comments":[],"origin":"外交部绝密文件，文特43","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"41a56e76a5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
