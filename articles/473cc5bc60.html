script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"促进城乡物资交流免除中间剥削　保定组织棉花交易市场","authors":[],"dates":[{"year":1949,"month":5,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"促进城乡物资交流免除中间剥削"},{"type":"paragraph","text":"保定组织棉花交易市场"},{"type":"paragraph","text":"【冀中讯】保定解放以来，三区组织了一个棉花交易市场，使四乡农民有了一个公平交易的场所，免去了以往花店对农民的无限制剥削。国营大生商店为促使城乡物资交流及农工产品间的合理交换，保持种棉与运棉者的一定利润，进行大力收购，开始时，每日仅成交几百斤（籽棉），经大生收购以来，市场上量逐渐增加，围城数十里的村庄，特别是满城一带产棉区的农民，都赶到这市场上来卖，现在上量已经增加到五千至一万斤（籽棉），大生商店平均收购总量的百分之七十五以上，其余留给轧花生产，在四十天内，共收购籽棉十七万二千九百五十五斤。卖棉的农民，大部换回食盐、洋布、农具及肥料等；特别是肥料，大部都是卖籽棉的农民买去。大生商店，为供给农民需要，进一步促使城乡物品交流，除西关的裕生、南关的建生分店外，又在城内设立了一个门市部，出售洋布、煤油、面粉等。开始因农民知道的较少，销货不多，现在到门市部购买者逐渐增多，特别是路西满城、唐、完及曲阳等县者为多，这样减少了商人的中间剥削；同时建生、裕生两个分店，也大量出售。一个多月的统计，共出售洋布四千二百六十二匹半，食盐四十五万二千三百九十八斤，煤油七千四百六十三斤，面粉三百八十八袋，大煤一百一十四万四千九百六十一斤。大生商店在购棉、出售工业品上，是掌握了合理的交换，尽量解决乡民在买卖上的困难，同时对掺假施潮的投机商贩，进行了教育和适当的处理，得到乡民拥护，提高了农民和一般市民，对商店的认识。现一般农民反映均甚良好，这样不但促进了城乡间物资的畅流，而且在农民中树立了威信。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"473cc5bc60"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
