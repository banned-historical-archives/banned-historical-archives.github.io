],"dates":[{"year":1981,"month":4,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"莫斯科对波宣传的新动向"},{"type":"paragraph","text":"首次攻击波党内有“修正主义分子”"},{"type":"paragraph","text":"新华社莫斯科4月26日电  苏联今天首次攻击波兰统一工人党的队伍中有所谓“修正主义分子”。这是在波兰统一工人党召开十中全会前夕和积极准备第九次代表大会的时候，以及苏共领导人苏斯洛夫23日突然访波后，苏联宣传中出现的一个值得注意的新动向。"},{"type":"paragraph","text":"苏联中央报纸今天刊登了塔斯社25日发自华沙的一条消息说：“波兰统一工人党队伍中的修正主义分子在一些地方策动破坏党的工作人员威信的运动，力图在党的各个环节之间，在中央委员会、省和基层组织之间制造麻烦。从事这种活动的人想使作为社会领导力量的波兰共产主义者的党瘫痪。”"},{"type":"paragraph","text":"塔斯社还指责波兰“党内的修正主义势力提出改革波兰统一工人党的要求，拒绝现有的组织结构，并在所谓横的结构的幌子下成立各种不符合党章的中心，以取代党的领导机构。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"df6fffa8bb"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
