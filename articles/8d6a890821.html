art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席；祝您万寿无疆","authors":["某部五连演唱组马占锋"],"parts":[{"type":"paragraph","text":"春雷一声震天响，"},{"type":"paragraph","text":"党中央公报传四方。"},{"type":"paragraph","text":"句句是真理，字字闪金光，"},{"type":"paragraph","text":"把革命的道路照得红又亮。"},{"type":"paragraph","text":"党中央公报，"},{"type":"paragraph","text":"是革命的灯塔；"},{"type":"paragraph","text":"党中央公报，"},{"type":"paragraph","text":"是进军的号角；"},{"type":"paragraph","text":"党中央公报，"},{"type":"paragraph","text":"是战斗的武器；"},{"type":"paragraph","text":"党中央公报，"},{"type":"paragraph","text":"闪耀着毛泽东思想的万丈光芒！"},{"type":"paragraph","text":"最最敬爱的领袖毛主席啊！"},{"type":"paragraph","text":"无比伟大、光荣、正确的党！"},{"type":"paragraph","text":"您的号召说出了我们心里话，"},{"type":"paragraph","text":"您的号召给了我们无穷力量。"},{"type":"paragraph","text":"为革命，"},{"type":"paragraph","text":"前人没走过的路我们敢闯！"},{"type":"paragraph","text":"为革命，"},{"type":"paragraph","text":"前人没攀过的高峰我们敢上！"},{"type":"paragraph","text":"我们永远跟着您干革命，"},{"type":"paragraph","text":"乘风破浪，奔向胜利的前方！"},{"type":"paragraph","text":"一千句话，一万句话，"},{"type":"paragraph","text":"说不完我们对党和毛主席的热爱。"},{"type":"paragraph","text":"一千张纸，一万张纸，"},{"type":"paragraph","text":"写不完我们对毛泽东思想的信仰！"},{"type":"paragraph","text":"千言万语汇成一句话："},{"type":"paragraph","text":"毛主席，"},{"type":"paragraph","text":"我们祝您万寿无疆！"},{"type":"paragraph","text":"让我们振臂高呼："},{"type":"paragraph","text":"万岁！万岁！万万岁！"},{"type":"paragraph","text":"我们最敬爱的领袖毛主席。"},{"type":"paragraph","text":"万岁！万岁！万万岁！"},{"type":"paragraph","text":"无比伟大、光荣、正确的党。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8d6a890821"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
