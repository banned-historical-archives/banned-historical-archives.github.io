常务委员会民族委员会法案委员会和国防委员会中的右派分子黄绍竑等十人的职务的建议","authors":[],"dates":[{"year":1958,"month":1,"day":31}],"is_range_date":false,"parts":[{"text":"全国人民代表大会常务委员会关于罢免全国人民代表大会常务委员会民族委员会法案委员会和国防委员会中的右派分子黄绍竑等十人的职务的建议","type":"title"},{"text":"1957年6月26日至7月15日举行的全国人民代表大会第四次会议，曾经把关于撤销右派分子全国人民代表大会代表资格和其他职务问题，交由全国人民代表大会常务委员会酌量情况处理。现在就这个问题提出建议如下:","type":"paragraph"},{"text":"(一)截至这次大会以前，已经由原选举单位正式撤销全国人民代表大会代表资格的右派分子有钱端升、沈志远、杨逸棠、江丰、刘兰畦、沙文汉、杨思一、王国松、李士豪、宋云彬、姚顺甫、冯雪峰、曾昭抡、向德、谭惕吾、雷天觉16人。其中钱端升所担任的全国人民代表大会法案委员会委员、曾昭抡所担任的全国人民代表大会预算委员会委员，当然随着代表资格的撤销而撤销。","type":"paragraph"},{"text":"(二)关于右派分子章乃器、潘大逵、曾庶凡、黄绍竑、陈铭枢、黄现璠、费振东、乔传珏、马哲民、章伯钧、叶笃义、程士范、潘锷鏱、罗隆基、费孝通、储安平、钱伟长、钱孙卿、欧百川、王天锡、韩兆鹗、丁玲、张东木、谢雪红、杨子恒、郑立齐、黄琪翔、李伯球、徐铸成、黄药眠、王毅齐、张轸、张云川、朱君允、毕鸣岐、谭志清、龙云、李琢庵38人的代表资格问题，代表资格审查委员会已经向大会提出建议，认为他们已经丧失继续执行全国人民代表大会代表职务的合法根据，不应当出席第一届全国人民代表大会第五次会议。因此，常务委员会决定建议大会罢免黄绍竑、龙云、陈铭枢全国人民代表大会常务委员会委员的职务，罢免费孝通、黄现璠、欧百川全国人民代表大会民族委员会委员的职务，罢免张云川、陈铭枢、黄绍竑、黄琪翔、谢雪红、罗隆基全国人民代表大会法案委员会委员的职务，罢免龙云国防委员会副主席的职务，罢免黄琪翔国防委员会委员的职务。","type":"paragraph"},{"text":"请大会予以审议。","type":"appellation"},{"text":" 全国人民代表大会常务委员会1958年1月31日","type":"paragraph"},{"text":" 来源：1958年2月2日《文汇报》。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"34635f6ed1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
