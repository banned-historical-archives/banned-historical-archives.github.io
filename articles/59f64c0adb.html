文到机场迎接","authors":[],"dates":[{"year":1975,"month":4,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"结束对墨西哥的友好访问"},{"type":"paragraph","text":"陈永贵副总理回到北京"},{"type":"paragraph","text":"我国领导人邓小平、吴德、王震、李素文到机场迎接"},{"type":"paragraph","text":"新华社一九七五年四月八日讯　国务院副总理陈永贵在结束对墨西哥的友好访问以后，今天上午乘专机回到北京。"},{"type":"paragraph","text":"陈永贵副总理的随行人员肖鹏、林平、郭凤莲、高建中、陈宗烈、曹瑞峰、李宗昌等，同机回到北京。"},{"type":"paragraph","text":"到机场迎接的有：我国领导人邓小平、吴德、王震、李素文和外交部长乔冠华、副部长王海容，水电部副部长张彬，农林部副部长梁昌武，以及有关方面负责人朱传贤、鲁平、吴凡吾、唐闻生、李永凯等。"},{"type":"paragraph","text":"墨西哥驻中国大使馆临时代办罗乐思和夫人，罗马尼亚驻中国大使格夫里列斯库，也到机场迎接。"},{"type":"paragraph","text":"陈永贵副总理一行在回北京途中于昨天到达乌鲁木齐。他们到达和离开乌鲁木齐时，新疆维吾尔自治区负责人赛福鼎、曹思明、司马义·艾买提等到机场迎送。（附图片）"},{"type":"paragraph","text":"陈永贵副总理回到北京时，我国领导人邓小平、吴德、王震、李素文前往机场迎接。　新华社记者摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"吴德","type":"人物"},{"name":"陈永贵","type":"人物"},{"name":"王震","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"59f64c0adb"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
