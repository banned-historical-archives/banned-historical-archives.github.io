:[],"dates":[{"year":1947,"month":2,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报北平廿一日专电】　军调部共方今晨全部离平矣。美方及政府方面吉伦，蔡文治以及各处长等，均到机场相送，情况至为热烈。诸人合摄纪念影甚多，叶剑英将其久留之小胡髭完全剃去，一身棉军衣，精神奕弈，临行以锦旗一面赠送美方三二二航空大队。上书“感谢一年来之协助”等字，并致词，略谓:“一年来的努力决未白费，中国终久会实现和平的。”叶于登机后，机门随手砰然关上。某记者为之长叹息说:‘和平之门从此关闭了’。记者旋于午后赴军调部各部门，作最后中一瞥。人去楼空，凄凉万状。惟美方人员尚有若干三连环臂章，固仍赫然在目，然殆将成历史遗物矣。(木)"},{"type":"paragraph","text":"【本报北平廿日专电】　军调部共方今日致备忘录于政府及美方谓:明晨八时，共方自叶剑英，薛子正，黄华以下全部离平，撤往延安。又政府方面新闻处亦定明日结束，处长李如桐，日内飞京，就任中宣部某司长。蔡文治参谋长将于下月初旬最后离平，至此军调部已成了历史上的名词了。(木)"},{"type":"paragraph","text":"【联合社北平二十一日电】军调部中共委员叶剑英，今晨率属下十九人乘坐美军用机飞返延安，美方支部主任吉伦，及政府方面参谋长蔡文治，均莅临送行。临行前，叶氏曾向美第三三二军队运输团献赠金红色绢旗一面，对美军协助工作表示感谢，并致词称:‘余深信过去一年间马帅与美国协助中国争取和平之种种努力，决非徒劳无益。和平之获致仅属时间问题。中美合作万岁’。按此系叶氏自美国终止调解以来之初次公开声明。"},{"type":"paragraph","text":"【法国新闻社北平廿一日电】军调部美分部参谋长华德上校今日与叶剑英等同赴延安公干。"},{"type":"paragraph","text":"【合众社北平廿一日电】叶剑英将军偕其他军调部中共人员九名于廿一日晨十一时三十分飞抵延安，朱德亦在机场迎接，据叶氏称北平尚留有一联络处，有办事员四人，由薛子清将军领导，处理未了事务。"}],"comments":[],"origin":"本报,联合社,法国新闻社,合众社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"86e78cce45"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
