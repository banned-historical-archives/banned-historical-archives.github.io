革命艺术的崇高榜样","authors":[],"dates":[{"year":1969,"month":3,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"我泥塑“收租院”在阿一城市展出"},{"type":"paragraph","text":"阿尔巴尼亚朋友赞扬展览是无产阶级文化大革命的成果，是革命艺术的崇高榜样"},{"type":"paragraph","text":"据新华社地拉那十二日电　中国泥塑“收租院”展览十一日在阿尔巴尼亚中部城市爱尔巴桑开幕。"},{"type":"paragraph","text":"展览厅入口处高悬着阿尔巴尼亚人民的伟大领袖恩维尔·霍查同志的巨幅画像和中国人民的伟大领袖毛主席的巨幅画像。大厅墙上挂着霍查同志语录牌和毛主席语录牌。在通向展览厅的街道上，悬挂着一幅幅欢呼阿中两党和两国人民革命友谊的红色横幅标语。"},{"type":"paragraph","text":"阿尔巴尼亚劳动党爱尔巴桑区委员会第一书记门泽尔吉乌同志和爱尔巴桑区其他党政领导同志出席了开幕式。爱尔巴桑市工人、人民军部队、机关干部和学生代表也出席了开幕式。"},{"type":"paragraph","text":"中国驻阿使馆临时代办李庭荃应邀出席开幕式。"},{"type":"paragraph","text":"爱尔巴桑区人民会议执行委员会副主席纳努什同志在开幕式上讲了话。纳努什同志谴责苏修叛徒集团最近对中国领土珍宝岛的武装挑衅。他说，在中国人民伟大领袖毛主席思想指引和鼓舞下的伟大的中国人民，给了苏修叛徒集团以应有的回击。阿尔巴尼亚人民和中国人民在这一新的形势下，如同以往一样，站在一起，加强着他们钢铁般的团结和永恒的友谊。"},{"type":"paragraph","text":"他说，由毛泽东同志亲自发动和领导的中国无产阶级文化大革命，锻炼和提高了中国亿万工人、农民和人民知识分子的革命觉悟，他们自觉地捍卫着无产阶级专政和社会主义事业。他说，无产阶级文化大革命的顺利发展，激发了天才的中国人民的创造热情，取得了辉煌成就。他指出，“收租院”展览正是无产阶级文化大革命的成果。它是革命艺术的崇高榜样。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e631b1fba1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
