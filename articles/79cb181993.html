script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"资产阶级思想触目惊心  北京钢铁学院教师决心彻底改造","authors":["村邻"],"dates":[{"year":1958,"month":4,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"资产阶级思想触目惊心"},{"type":"paragraph","text":"北京钢铁学院教师决心彻底改造"},{"type":"paragraph","text":"本报讯　北京钢铁学院自开展双反运动以来，共贴出了近七十万张大字报，重要内容之一是揭露和批判了教师中的资产阶级教学思想。"},{"type":"paragraph","text":"有的教师重业务，轻政治，公开宣扬技术第一，在课堂上对学生说“搞社会科学的，搞政治的都是没出息的人。你们要好好念书，否则将来就没有人看得起”。鼓励学生只专不红。"},{"type":"paragraph","text":"教学中轻视实际，脱离实际，更是一种普遍现象。钢铁学院教师中有那么一种舆论：唯有理论才是科学，水平低的才去搞实际。教师不愿下实验室，不愿去工厂，认为工厂中没有什么可学的；还有人看不起工厂技术人员，说什么：“世界上著名的科学家都是搞理论的，工程师没有什么了不起。”"},{"type":"paragraph","text":"有些教师在授课或指导设计时不结合我国建设实际，炼铁教研组有些教师不讲解我国现厂原料处理方法。许多毕业设计的题目也是脱离我国当前建设实际的。比如压力加工教研组教师贪大贪新，叫毕业生设计三百万吨年产量的初轧厂。不少教师的科学研究工作也是不愿意和生产相结合。不愿搞小的，只愿搞大的；不愿搞实际，只愿搞理论，因而这两年钢铁学院科学研究工作进展不大，有许多研究工作花了很大的精力和财力却不得不半途而废了。炼钢教研组近两年研究了十六个题目只有三个有结果。钢铁学院教师中还流传一种舆论：教学是“输出”，搞科学研究、搞进修是“输入”。所以有很大一部分教师只重视个人进修、搞翻译和科学研究。有些教师忙于自己搞翻译赚稿费，不肯给同学编写讲义。有些教师不批改同学作业，有的把同学作业收去隔年才退还；有的干脆就丢到纸篓里或者遗失了。有的教师为着自己搞科学研究尽量少担任课。如果分到自己头上了，也有个窍门——不很好备课。有些教师现在还用好几年以前写的讲稿。有的人讲九十分钟课只准备半个小时，有的干脆不备课。"},{"type":"paragraph","text":"教师中争名夺利，互相排斥，闹不团结的现象相当严重。几乎每个教研组都有闹不团结的事，采矿系七个教授之间都有纠纷。有些教师又进行同一题目的科学研究，不但不互相合作，反而互相拆台。由于教师之间不团结，不仅给教学和科学研究工作带来很大损失，还造成巨大的物质浪费。由于系与系之间、教研组与教研组之间闹纠纷，不肯互通有无，以致设备重复。冶金系四个专业实验室都设有化学分析室、暗室、金相室、天平室。"},{"type":"paragraph","text":"在这些触目惊心的事实面前，教师们开始认识到了资产阶级思想危害之大，大家下决心一定要在这次运动中“脱胎换骨”，彻底改造。"},{"type":"paragraph","text":"（村邻）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"79cb181993"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
