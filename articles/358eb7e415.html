动的人应怎么办","dates":[{"year":1956}],"is_range_date":false,"authors":["人民公安"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"铁道部政治部审干办公室, 审干工作政策选编(三), 623","tags":[{"name":"反动","type":"主题/事件"},{"name":"肃反","type":"主题/事件"}],"parts":[{"type":"title","text":"对思想言论很反动的人应怎么办"},{"type":"paragraph","text":"历史上没有反动身分，也不是敌对阶级分子，但思想言论很反动，对这些人怎么办？"},{"type":"paragraph","text":"对这些人，如果查证属实，确是以反革命为目的，蓄意造谣破坏，煽惑群众，制造混乱，就应以反革命论处。但是，必须把落后言论和反革命谣言严格区别开来。如果是由于思想落后、不了解政策，或误信反革命谣言而无意传谣，或因家庭生活困难而有不满言论，都应坚持说服教育，不应当同反革命谣言混淆起来。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"358eb7e415"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
