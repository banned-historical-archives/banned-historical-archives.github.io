art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"叶剑英委员长会见翁毓麟议长双方希望加强接触，增进两国人民之间的了解和合作","authors":[],"parts":[{"type":"paragraph","text":"新华社十月六日讯 人大常委会委员长叶剑英今晚会见了马来西亚上议院议长敦·奥马尔·翁毓麟和夫人以及由翁毓麟率领的马来西亚议会代表团全体成员。"},{"type":"paragraph","text":"叶剑英对翁毓麟在苏联侵占阿富汗和越南侵占柬埔寨问题上所持的正义立场表示赞赏。他还重申中国支持包括马来西亚在内的东盟各国关于使东南亚成为和平、自由、中立区的主张。"},{"type":"paragraph","text":"翁毓麟说，他对有中国这样一个国家同东盟各国一道致力于国际和平与安全，很受鼓舞。"},{"type":"paragraph","text":"叶剑英和翁毓麟都表示希望双方加强接触，以增进两国人民之间的相互了解和友好合作。"},{"type":"paragraph","text":"人大常委会副委员长乌兰夫和夫人云丽文等会见时在座。马来西亚驻中国大使塔拉拉和夫人参加了会见。"}],"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a796302682"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
