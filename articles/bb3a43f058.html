<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"胡愈之等在国务院党外人士座谈会上驳斥削弱党的领导的言论","authors":["新华社"],"dates":[{"year":1957,"month":6,"day":8}],"is_range_date":false,"parts":[{"text":"胡愈之等在国务院党外人士座谈会上驳斥削弱党的领导的言论","type":"title"},{"text":"新华社","type":"authors"},{"text":"《人民日报》特约新华社专稿：国务院秘书长习仲勋６月８日下午继续邀请党外人士举行座谈会。","type":"paragraph"},{"text":"国务院参事谌小岑谈到了法制和人事问题，他说，立国八年来，没有颁布程序法，许多机关没有组织法，没有业务法规。他认为党内有人不注意法制，而对人事安排比较注意。关于人事问题，他认为外行很忙，内行闲着。例如出版界有许多没有搞过出版业务的担任出版社社长，外行充内行，造成出版界的很多损失。","type":"paragraph"},{"text":"谌小岑说，在工作中，有些党员急躁冒进，追求数字和超额完成任务，例如出版工作中就盲目追求印行多少种、出多少册，但又不问读者需要，于是有的书堆满仓库，有的脱销。","type":"paragraph"},{"text":"中国文字改革委员会副主任胡愈之在会上谈到了两点意见。他的第一个意见是：共产党应当大大加强在国家机关中的核心领导作用，特别是加强党对文教机关的领导。他认为八年多以来，我们国家机关工作的成绩是主要的，缺点和错误是个别的。尽管有人不喜欢这样的提法，但事实仍然是事实。","type":"paragraph"},{"text":"胡愈之说，党和政应当分工，以党代政是不对的；但是如果党不要问政，党退出机关学校，一切方针政策不要通过共产党，而只是由行政机关来设计和施工，我们的国家机关就会失掉同群众的联系，人民政府就会变质，就会变成脱离人民的衙门。","type":"paragraph"},{"text":"胡愈之说，今天的确发生了许多错误和缺点，是必须加以揭发和纠正的；但这些错误和缺点很大部分是因为工作发展太快，是在前进中产生的，有些是不可避免的。为了纠正这些错误和缺点，主要是更加加强党的领导，而不是削弱党的领导。","type":"paragraph"},{"text":"胡愈之的第二个意见是：党要大大加强思想政治教育工作，特别是帮助知识分子进行自我教育和自我改造。他说，由于社会主义建设和社会主义改造的着着胜利，经济基础已经起了改变，但是人们的思想意识依然落后于物质基础。在一部分从旧社会出身的知识分子中间，反动的思想有时又冒出头来。从卢郁文揭发的那封匿名信也可以证明。","type":"paragraph"},{"text":"胡愈之说，最近出现的一些反动言论，不仅石景山钢铁厂的职工，广大的人民都表示愤慨。他认为，这种思想应该让全国人民看清楚，以免受到迷惑。胡愈之认为要加强思想教育工作，特别是对知识分子的思想改造。如果反动的资产阶级思想依然泛滥，知识分子和工农之间的距离永远不能缩短，社会主义的前途就有危险。","type":"paragraph"},{"text":"法制局顾问王之相说，整风中对不正确的意见讲清道理，分清是非，这不能说是“收”。王之相同意卢郁文对储安平发言的批评，并提出了补充意见。他认为，不能把党的领导和党天下混淆起来，现在有共产党作为领导党，同时又有民主党派存在，人民通过全国人民代表大会和各级人民代表大会行使权力，从实际上看，家庭妇女也广泛参加了基层的管理工作。党天下的说法是没有根据的。","type":"paragraph"},{"text":"国务院参事李奇中对胡愈之的发言表示同意。他又说，宗派主义的一个因素——特权，整风中首先要克服，先要从人事上解决。过去安排了一些人，不是为了工作，而是为了照顾面子，迁就历史、功劳，应该改变这种情况，工作能力和职位不相称的要调整，对高级干部在生活上的特殊照顾也应该取消，这样可以减少矛盾。","type":"paragraph"},{"text":"李奇中在发言中还对当前体制和编制不明确、没有服务细则和工作检查制度、业务部门负责人不管人事、有些企业单位工作定额低，超额工资过高等情况，提出了批评。","type":"paragraph"},{"text":" ——原载《人民日报》1957年6月9日，原标题为“在国务院党外人士座谈会上　胡愈之等驳斥削弱党的领导的言论”","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bb3a43f058"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
