tart":6,"page_end":6,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席的话句句是真理革命宝书是同美以侵略者作斗争的最有力武器","authors":[],"parts":[{"type":"paragraph","text":"《毛主席语录》阿拉伯文版今年十月在开罗出版以来，受到阿联人民和其他阿拉伯国家人民的热烈欢迎。他们认为，这本书是他们同美以侵略者作斗争的最有力的武器。"},{"type":"paragraph","text":"开罗出版《毛主席语录》阿拉伯文版的出版社发行人对新华社记者说：《毛主席语录》是他书店里空前的畅销书。这个出版社出版的第一版《毛主席语录》已在一个月内售完。开罗和阿联其他城市的许多书店和读者继续不断给这家出版社打电报和写信，要求供应更多的《毛主席语录》。现在，这个出版社准备再版发行，印数将比第一版增加一倍。"},{"type":"paragraph","text":"阿联的一个学生说，他的学校校长向他借阅了《毛主席语录》后对他说：“毛主席讲的话句句是真理。”"},{"type":"paragraph","text":"开罗大学学生在宿舍里经常学习《毛主席语录》。他们在讨论有关形势问题时，常常拿出《毛主席语录》来寻找结论。一位学生说：“我们埃及人十分热爱毛主席和中国人民。”"},{"type":"paragraph","text":"有一次，记者访问一位巴勒斯坦朋友，发现他在笔记本上写了许多条毛主席语录。他说：“每当我记住一条毛主席语录，我就把它写在这本笔记本上。我现在能背诵几十条毛主席语录了。”这位巴勒斯坦朋友说：“阅读《毛主席语录》已经成为我的生活的一部分。”"},{"type":"paragraph","text":"另外一位巴勒斯坦朋友对新华社记者说：毛主席教导我们说：“枪杆子里面出政权”。巴勒斯坦的问题，只有动员我们的人民去进行人民战争才能解决，我们不相信苏联修正主义鼓吹的所谓“和平共处”的论点。我们决不能同我们的死敌美国侵略者的工具以色列和平共处。"},{"type":"paragraph","text":"开罗的一些报纸最近也刊登了毛主席的一些语录。一家报纸刊登的一张越南人民活捉美国飞行员的照片的说明是：“毛泽东主席说，‘一切反动派都是纸老虎。’看！美国侵略者不就是纸老虎吗？”"},{"type":"paragraph","text":"伟大领袖毛主席关于“枪杆子里面出政权”的光辉思想，是全世界人民革命斗争的指南，引导着一切被压迫和被剥削的人民走上真正解放的道路。人民武装斗争的烈火已在亚非拉熊熊燃烧。新华社记者 刘作文摄（照片）"}],"alias":""},"tags":[{"name":"人民战争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4206be5869"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
