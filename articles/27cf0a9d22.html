art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"《叶剑英诗词选集》今日出版邓小平题写书名","authors":["吴祥顺"],"parts":[{"type":"paragraph","text":"本报讯 《叶剑英诗词选集》，由邓小平同志题写书名，已于4月26日由人民文学出版社出版，并在全国发行。"},{"type":"paragraph","text":"叶剑英同志是我国老一辈无产阶级革命家，也是深受人民爱戴的诗人。他从青年时代起写下不少诗词，可惜有些已经散失。这部诗词选集收入诗词九十一题一百四十二首。其中诗一百二十五首，词十七首。这些诗词或叙事，或咏史，或抒情，或阐发哲理，有的描写中国革命斗争的峥嵘岁月，有的赞颂我国社会主义四化建设，都具有深刻的政治内容和感人的艺术力量。选编时，作者对所收入的诗词逐首重新校订，有些还作了修改。       （吴祥顺）"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"27cf0a9d22"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
