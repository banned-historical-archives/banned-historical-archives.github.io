torical-archives/banned-historical-archives8/main/maoquanji4-1.pdf"],"article":{"title":"题送川公审土豪劣绅大会联","alias":"","parts":[{"type":"paragraph","text":"题遂川公审土豪劣绅大会联！"},{"type":"paragraph","text":"（1928年1月）你当年剥削工农，好就好，利中生利；"},{"type":"paragraph","text":"我今日宰杀土劣②，怕不怕，刀上加刀。．[1]1928年1月5日毛泽东率领工农革命军队攻克江西遂川县城，1月24日召开成立县工农兵政府的群众大会，公审土豪劣绅郭渭坚，并处以极刑。毛泽东在会上讲了话，并为大会亲笔书写了这副对联。遂川，县名，在江西省西南部，赣江支流遂川江上游，邻接湖南省。"},{"type":"paragraph","text":"[2]土劣，土豪劣绅的缩称。"},{"type":"paragraph","text":"毛泽东率领起义部队到达井冈山，极力争取、团结、改造袁文才、王佐两支武装。图为袁文才（左）、王佐。"},{"type":"paragraph","text":"1928年2月，毛泽东率工农革命军取得井冈山斗争的第一个胜仗，攻克宁冈县城新城，打破国民党军对井冈山的第一次“进剿”。图为油画《新城大捷》。毛泽东送给袁文才骑马用的裹腿。《王佐迎接工农革命军》（中国画）"}],"authors":["毛泽东"],"dates":[{"year":1928,"month":1}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":95,"page_end":98},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a06dea2ff0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
