"authors":["昆明军区"],"dates":[{"year":1968,"month":2,"day":21}],"is_range_date":false,"parts":[{"text":"昆明军区云南军区在京开会首长给云南省军管会的电报","type":"title"},{"text":"昆明军区","type":"authors"},{"text":"云南省军管会转文山，东川、下关两派革命群众组织，以及其他地区的革命群众组织：","type":"appellation"},{"text":"欣闻文山地区两派革命群众组织已于二月十日下午达成停火、交枪协议，并举行签字仪式，签字后两派一起游行，互相祝贺，互相赠送毛主席像章，气氛很好，现正为全面实现协议积极努力。这是毛泽东思想的伟大胜利！是毛主席革命路线的伟大胜利！我们表示坚决的支持和热烈祝贺！","type":"paragraph"},{"text":"在伟大领袖毛主席最新指示的指引下，最近，东川两派革命群众组织业已达成了停火、交枪协议。下关等地的革命群众组织，也正在积极准备谈判和交枪，放人。这是非常可喜的大好事。","type":"paragraph"},{"text":"希望文山，东川认真落实协议，进一步作出新的贡献。并希望各地区和革命群众组织，都仿效文山、东川，迅速达成停火，交枪协议，并付诸实施，立即无条件把武斗制止下来，尽快恢复生产、恢复交通运输和社会秩序。","type":"paragraph"},{"text":"目前，在夺取无产阶级文化大革命全面胜利的凯歌声中，全国务省的革命委员会一个接着一个的成立，形势大好，发展很快。我们必须更高地举起毛泽东思想伟大红旗，紧跟毛主席的伟大战略部署，坚持党性，打倒派性，急起直追，迎头赶上，提高革命警惕，防止阶级敌人挑拨破坏，在争取早日实现和巩固革命大联合和革命的三结合中立新功！保证毛主席的最新指示条条落实，全面落实，夺取云南无产阶级文化大革命的全面胜利。","type":"paragraph"},{"text":" 昆明、云南军区，两军、空指在京开会领导干部一九六八年二月二十一日","type":"paragraph"},{"text":"来源：云南八·二三《风展红旗》编  《毛主席无限关怀云南人民──中央和中央首长对云南无产阶级文化大革命的指示》","type":"appellation"}],"comments":[],"origin":"云南八·二三《风展红旗》编　《毛主席无限关怀云南人民──中央和中央首长对云南无产阶级文化大革命的指示》","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"云南文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"派性","type":"主题/事件"},{"name":"武斗","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"924d198d32"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
