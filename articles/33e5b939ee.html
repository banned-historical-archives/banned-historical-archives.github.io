r":1980,"month":5,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"叶剑英同志视察深圳珠海两市"},{"type":"paragraph","text":"新华社广州五月二日电 中共中央副主席叶剑英同志四月二十七日至二十八日视察了广东省深圳、珠海两市，受到当地群众的热烈欢迎。"},{"type":"paragraph","text":"中央决定广东省对外经济活动实行特殊政策、灵活措施以后，深圳和珠海两市经济特区都在加紧建设。"},{"type":"paragraph","text":"叶副主席由深圳市委负责同志陪同来到新开辟的蛇口工业区。负责建设这个工业区的香港招商局负责人详细介绍了工业区的开发经过，汇报了这个吸引外资、从事以外销为主的工业区的第一期工程进展情况。工地上的工程技术人员和工人群众从四面八方赶来欢迎叶副主席。叶副主席亲切地向大家招手致意，高兴地说，“你们办得很好。希望大家继续努力。”"},{"type":"paragraph","text":"八十三岁高龄的叶副主席登上深圳水库大坝，眺望秀丽的湖山景色。这里正在建设一个旅游区。"},{"type":"paragraph","text":"叶副主席来到罗湖桥和文锦渡，同正在这里值勤的边防公安干警亲切握手，表示慰问。"},{"type":"paragraph","text":"二十八日上午，叶副主席前往珠海市香洲烈士陵园，向五十五年前为人民革命事业牺牲的烈士墓献了花圈。花圈的挽带上写着：“珠海香洲为中国人民的革命事业而牺牲的烈士永垂不朽”。一九二四年，叶剑英同志在香洲（即现在的珠海市）设营训练新兵。一九二五年四月二十五日，一小撮叛徒趁叶剑英同志东征未归，策划发动了反革命兵变，有二十七位官兵不幸殉难。叶剑英同志闻讯后立即赶回香洲，敉平叛乱，收殓烈士遗体，在香洲狮山营造了烈士陵墓。现在陵园已整修一新。叶副主席在陵园里久久停留，逐一瞻仰了烈士墓碑。"},{"type":"paragraph","text":"叶副主席在珠海市委负责同志陪同下，还视察了珠海市和拱北海关。"},{"type":"paragraph","text":"叶副主席离开珠海时，在码头上同当地驻军指战员见面。战士们簇拥在叶副主席身边热烈鼓掌。"},{"type":"paragraph","text":"叶副主席嘱咐他们要加强训练，巩固国防。指战员们齐声回答：“提高警惕、保卫祖国！”当叶副主席登上轮船站在甲板上向战士们告别时，指战员们列队欢送，长时间地鼓掌，祝叶副主席健康长寿。轮船远去了，叶副主席挥动双臂高喊：“同志们，再见！”（附图片）"},{"type":"paragraph","text":"叶剑英同志四月二十八日在广东省珠海市视察时和驻军某部指战员在一起。"},{"type":"paragraph","text":"新华社记者摄（传真照片）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"广东文革","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"33e5b939ee"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
