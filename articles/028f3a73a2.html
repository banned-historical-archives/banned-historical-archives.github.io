<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"集体化的道路就是好","authors":["解放军某部驻浙江余杭县九堡公社毛泽东思想宣传队"],"dates":[{"year":1968,"month":12,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"集体化的道路就是好"},{"type":"paragraph","text":"解放军某部驻浙江余杭县九堡公社毛泽东思想宣传队"},{"type":"paragraph","text":"全国解放以后，随着土地改革的完成，广大贫下中农在毛主席的革命路线的指引下，迅速掀起了轰轰烈烈的互助合作运动高潮。"},{"type":"paragraph","text":"农业合作化的巨浪，使国内外一小撮阶级敌人吓破了胆。混进我们党内的剥削阶级代理人刘少奇，就迫不及待地跳出来，疯狂地反对毛主席的无产阶级革命路线。他叫嚷什么农村走集体化的道路是“不可能的”。他恶毒地攻击发展互助合作运动、逐步建立农村的社会主义生产关系，是“一种错误的、危险的、空想的农业社会主义思想”。刘少奇妄想扼杀社会主义集体经济的萌芽，阻止农业社会主义高潮的到来。真是猖狂已极！"},{"type":"paragraph","text":"什么“空想的农业社会主义思想”！办合作社，走集体化道路，是广大农民的强烈愿望。早在一九四三年，毛主席就深刻指出：“在农民群众方面，几千年来都是个体经济，一家一户就是一个生产单位，这种分散的个体生产，就是封建统治的经济基础，而使农民自己陷于永远的穷苦。克服这种状况的唯一办法，就是逐渐地集体化；而达到集体化的唯一道路，依据列宁所说，就是经过合作社。”毛主席的教导，句句说出了广大贫下中农的心里话。广大贫下中农有"},{"type":"paragraph","text":"“走社会主义道路的积极性”，他们走社会主义的道路最坚决。我们宣传队所在的九堡公社就是一个例子。九堡公社广大贫下中农，在土改以后，立即响应毛主席“组织起来”的伟大号召，成立了互助组，夺取了农业大丰收。以后，又成立了合作社，一九五五年取得了比互助组时期更大的丰收。一九五七年，依靠集体力量，战胜了自然灾害，取得了特大丰收。一九五八年，毛主席“人民公社好”的伟大号召一发出，他们就坚决响应，立即成立了人民公社，使农业集体化跃进到了一个新阶段。九堡公社的贫下中农依靠集体经济的力量，在钱塘江边修建了大型翻水站，实现了灌溉电气化的愿望。过去十天不下雨就干得冒烟的沙土，现在成了一片丰收的良田。每当谈到这些巨大发展变化时，贫下中农都非常激动地说：“毛主席指引的集体化道路，越走越宽广，越走越幸福，是走向共产主义的光明大道，我们走定了！”农村社会主义事业繁荣兴旺的事实，早就彻底粉碎了刘少奇污蔑办合作社是“一种错误的、危险的、空想的农业社会主义思想”的无耻谰言。"},{"type":"paragraph","text":"刘少奇认为不“危险”的是什么呢？那就是“保存富农经济”。他拚命叫嚷：雇人种地“不要限制”，“对穷人也是有好处的”。这完全是地主、富农、吸血鬼的嚎叫！从九堡公社集体经济发展的事实可以看出，对广大贫下中农有好处的，只能是走集体化的道路。如果让刘少奇发展富农经济的阴谋得逞，那么，就会出现富者越富、穷者越穷的现象，使贫下中农受二茬罪，吃二遍苦。"},{"type":"paragraph","text":"由此可见，刘少奇反对农业合作化，鼓吹“保存富农经济”，其目的就是要在农村发展资本主义，在我国实现资本主义复辟。"},{"type":"paragraph","text":"在农业方面，是实行农业集体化还是发展富农经济，这是农村中两个阶级、两条道路、两条路线斗争的焦点，是关系着把中国农村引向社会主义还是引向资本主义的头等重大的问题。"},{"type":"paragraph","text":"毛主席教导我们：“社会主义制度终究要代替资本主义制度，这是一个不以人们自己的意志为转移的客观规律。”尽管叛徒刘少奇拚命反对社会主义革命，但是随着历史车轮的滚滚前进，党和革命人民把他永远地扔进了历史的垃圾箱。我们要继续深入而持久地开展革命大批判，彻底肃清刘少奇的反革命修正主义思想的流毒，永远沿着毛主席的无产阶级革命路线奋勇前进。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"028f3a73a2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
