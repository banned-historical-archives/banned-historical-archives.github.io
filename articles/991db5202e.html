难民流亡江南。","authors":[],"dates":[{"year":1946,"month":9,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"苏北广大的农村，在中共多年的统治下，起了巨大的变化。长期的封建统治崩溃了，风行一时的“斗争”“清算”运动已经告一段落，而又一个巨浪接着掀起了。各地乡村中，基层政权正在发动一个新的土地重分配运动，每一乡镇，按照人口和土地的多寡平均分配，不论男女老幼，都有权利配得一份土地，有的二亩，有的三亩，最少也在一亩半以上。苏北各地，土地向来集中在少数地主手中，现在，他们被迫把世代承袭的田地交还给泥土的主人——农民，他们满怀着恐惧的怨愤的心情流亡出来了，江阴，尽多有靖江泰兴等地的难民。这些流落在外的“中国白俄”们痛心疾首在埋怨中共的“土地分配”运动，结束了他们无忧无虑的享乐生涯；他们日夜渴望着国军的捷音，等待“奸匪肃清”后，可以重新返归战乡，重做主人。而那些翻了身的农民们的脸上，却相反的露出了从所来有的欢笑，从生到死，他们生身在那里，土地是他们最亲密的朋友，现任，他们竟成了土地的主人，几千年来的梦想，今天成了事实，自然，他们将永远站在自己的土地上，加倍努力的操作，生产下去。"},{"type":"paragraph","text":"江阴的地主们也在担忧了:“新四军会不会南下?”一部分胆小的地主有的在零星出卖田地，但是买得起田地的人却说:“我们不愿意冒这样的险，宁可把款子去放拆息，做买卖!免得白吃辛苦，买了田，被分配。”"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"991db5202e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
