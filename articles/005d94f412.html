art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席永远和我们在一起","authors":["前志愿军荣立一等功/副营长侯尚庆"],"parts":[{"type":"paragraph","text":"收音机里，又一次传来了毛主席接见革命师生的振奋人心的消息，我好象来到了天安门，亲眼见到了我们的伟大领袖毛主席！"},{"type":"paragraph","text":"我们部队虽然和北京相隔很远，但隔山隔水不隔心，毛主席永远和我们在一起。一想起我们敬爱的领袖毛主席，一想起毛主席的教导，我们浑身就增加了无穷的战斗力量。记得在朝鲜战场上，有一次作战，我们只有四十多人，美国鬼子却有六百多个。这时，毛主席的教导在我们耳旁回响：“这个军队具有一往无前的精神，它要压倒一切敌人，而决不被敌人所屈服。不论在任何艰难困苦的场合，只要还有一个人，这个人就要继续战斗下去。”这些话，使我们浑身是胆，勇气十足，等到敌人逼近，一齐开火，就打倒了六七十个美国鬼子。经过三四天奋战，终于把这支美国侵略军全部消灭了。"},{"type":"paragraph","text":"毛主席接见革命师生给了我巨大的鼓舞和力量，我虽然年纪大了一些，但决心干一辈子革命，坚决以“老三篇”为座右铭，时时对照检查自己，毛主席怎样说，我就怎样做，努力改造世界观，永远做毛主席的好战士。"},{"type":"paragraph","text":"看到敬爱的毛主席啦！RW：毛泽东；接见红卫兵；言论"}],"alias":""},"tags":[{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"005d94f412"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
