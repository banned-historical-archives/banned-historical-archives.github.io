art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"把无产阶级文化大革命进行到底","authors":["总政治部文工团"],"parts":[{"type":"paragraph","text":"在无产阶级文化大革命的高潮中，我们参加了首都举行的文艺界无产阶级文化大革命大会，感到异常振奋，受到了极大的鼓舞。"},{"type":"paragraph","text":"我们欢呼这个大会开得好，这是向文艺界一小撮走资本主义道路的当权派和反革命修正主义文艺路线发动总攻击的誓师大会，是对文艺界文化大革命的大动员、大促进。我们热烈拥护周总理、陈伯达同志、江青同志的讲话。我们热烈响应大会的号召，决心高举毛泽东思想伟大红旗，突出无产阶级政治，坚决贯彻以毛主席为代表的无产阶级革命路线，彻底批判反革命修正主义文艺路线，完成一斗二批三改的任务，把无产阶级文化大革命进行到底。"},{"type":"paragraph","text":"江青同志担任我军文化工作顾问，这是一件大喜事。当我们听了这个大好消息的时候，心情都非常激动，感到十分幸福。大家都说，这是我们最伟大的领袖毛主席和他的亲密战友林彪同志对部队文化工作的极大关怀。江青同志对毛主席著作学习得很好，用得很活，很坚决，由她来担任部队文化工作顾问，给我们带来了很大的鼓舞，给我们带来了极大的战斗力量。"},{"type":"paragraph","text":"北京京剧一团等四个文艺团体划归人民解放军建制，我们表示热烈欢迎。今后，让我们在中央军委、总政及江青同志领导下，高举毛泽东思想伟大红旗，团结一致，共同学习，并肩战斗，努力创造人类历史上最光辉灿烂的无产阶级新文艺。"}],"alias":""},"tags":[{"name":"江青","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6ca5335088"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
