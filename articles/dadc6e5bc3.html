art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"《毛泽东邓小平江泽民论科学发展》《科学发展观重要论述摘编》出版","authors":[],"parts":[{"type":"paragraph","text":"新华社北京9月19日电 为配合全党开展深入学习实践科学发展观活动，经中共中央批准，由中共中央文献研究室编辑，中央文献出版社、党建读物出版社出版的《毛泽东邓小平江泽民论科学发展》和《科学发展观重要论述摘编》，即日起出版发行。《毛泽东邓小平江泽民论科学发展》和《科学发展观重要论述摘编》分别收入的毛泽东、邓小平、江泽民同志关于科学发展的重要论述和党的十六大以来以胡锦涛同志为总书记的党中央关于科学发展观的重要论述，反映了科学发展观是对党的三代中央领导集体关于发展的重要思想的继承和发展，是马克思主义关于发展的世界观和方法论的集中体现，是同马克思列宁主义、毛泽东思想、邓小平理论和“三个代表”重要思想既一脉相承又与时俱进的科学理论，是我国经济社会发展的重要指导方针，是发展中国特色社会主义必须坚持和贯彻的重大战略思想。同时出版的，还有《深入学习实践科学发展观活动领导干部学习文件选编》，供县处级以上党员领导干部学习。"},{"type":"paragraph","text":"《毛泽东邓小平江泽民论科学发展》《科学发展观重要论述摘编》和《深入学习实践科学发展观活动领导干部学习文件选编》，对于广大党员干部深入学习和把握科学发展观的科学内涵、精神实质和根本要求，进一步增强贯彻落实科学发展观的坚定性、自觉性，使深入学习实践科学发展观活动收到实效，有重要意义。"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"江泽民","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dadc6e5bc3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
