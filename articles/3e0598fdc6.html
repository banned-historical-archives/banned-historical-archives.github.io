al-archives/banned-historical-archives8/main/maoquanji1.pdf"],"article":{"title":"贺廖廷旋、皮述莲同学新婚联","alias":"","parts":[{"type":"paragraph","text":"贺廖廷璇\"、皮述莲同学新婚联"},{"type":"paragraph","text":"（1915年）二月梅香清友2；"},{"type":"paragraph","text":"春风桃灼佳人。"},{"type":"paragraph","text":"[1]廖廷璇，湖南沅江人，毛泽东在湖南第一师范读书时的同班同学，毕业后任湖南沅江县教育科督学，1919年3月病逝。"},{"type":"paragraph","text":"[2]梅香，梅花芬芳的气味。清友，纯洁之友。"},{"type":"paragraph","text":"[3]灼，明亮。桃灼，桃花盛开，十分鲜明。语出《诗·周南·桃天》：“桃之天天，灼灼其华。之子于归，宜其室家。”意思是说，桃树茂盛，花朵鲜艳，女子出嫁，年时俱当。以此比喻，祝贺新婚幸福美满。佳人，美女。"}],"authors":["毛泽东"],"dates":[{"year":1915}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":213,"page_end":213},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3e0598fdc6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
