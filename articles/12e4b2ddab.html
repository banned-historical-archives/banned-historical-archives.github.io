" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji49","name":"毛泽东全集第49卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji49.pdf"],"article":{"title":"对八三四一部队支工工作的指示和支工情况报告等的批语","alias":"","parts":[{"type":"paragraph","text":"对八三四一部队支工工作的指示"},{"type":"paragraph","text":"和支工情况报告等的批语！"},{"type":"paragraph","text":"（1967年6月、11月）"},{"type":"paragraph","text":"1.下去后要做好宣传工作，要做深入的、细致的、艰苦的思想政治工作。厂子里女工多，要派些女同志下去，便于工作。"},{"type":"paragraph","text":"[1]根据毛泽东的指示，中国人民解放军八三四一部队组织支工部队，于1967年6月26日分别进入北京针织总厂及其所属的两个分厂和北京市化工三广。本篇一是毛泽东在支工部队临行前所作的三点指示。1967年11月11日，北京针织总厂革委会给毛泽东写来报喜信，汇报在支左部队的帮助下，该厂成立了革委会。11月13日，八三四一部队也给毛泽东写报告说，我们进入北京针织总厂后，坚决遵照主席在我们临行前所作的三点指示进行工作，以毛泽东思想为武器，宣传群众，组织群众，武装群众；大力宣传主席关于“在工人阶级内部，没有根本的利害冲突”和“要斗私，批修”的号召，促进了该厂两派群众的大联合，组成了“三结合”的领导班子。在支工过程中，我们老老实实地做工人群众的小学生，同他们一起学习，一起劳动，一起战斗，同他们交心，了解了很多情况，学习了很多东西。此外，还组织医疗小组，为职工及其家属看病近2000人次。本篇二是对北京针织总厂革委会的来信和八三四一部队报告的批语。11月17日，中共中央将来信、报告和批语一起印发全国各地区、各企业、各机关、各学校，要求根据具体情况参照执行。毛泽东全集第四十九卷"},{"type":"paragraph","text":"2.下去后不要匆匆忙忙急于表态，经过调查研究，如果两派都是革命的群众组织，就要逐步地把他们联合起来。就是两派严重对立的群众组织，群众也是愿意联合的，不愿意联合的只是少数的几个头头。"},{"type":"paragraph","text":"3.要向工人群众学习，不怕犯错误，错了就改。要关心群众的生活，组织个医疗组，给他们看病。"},{"type":"paragraph","text":"二看过，很好，谢谢同志们！"},{"type":"paragraph","text":"毛泽东十一月十五日"}],"authors":["毛泽东"],"dates":[{"year":1967,"month":6},{"year":1967,"month":11}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":512,"page_end":513},"tags":[{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"革命大联合","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"name":"军队支左","type":"主题/事件"},{"type":"文稿类型","name":"指示"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"12e4b2ddab"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
