"北京政法学院","匿名"],"dates":[{"year":1957,"month":5}],"is_range_date":false,"parts":[{"text":"大字报——反对不按劳取酬","type":"title"},{"text":"北京政法学院匿名","type":"authors"},{"text":"我们看了刺头同志写的“某某老婆”工资表，感到很气愤，这些夫人太太们有很多是工作不称职的，反而领取高薪，象徐敬之老婆赵淑云、侯冠儒老婆郭素贞等人，大字不识几个，写几句话都写不通，居然也领取比大学教师高宝华等人还高的工资，这简直是浪费国家财产，我们坚决反对这种按丈夫官职资格取酬的原则！我们建议：","type":"paragraph"},{"text":"一、结合整风精简行政机构，将那些不适合工作的官太太们和其他人调到其他工作岗位上去。","type":"paragraph"},{"text":"二、那些能力低，工资高的太太们和其他人应降低工资，实行按劳取酬。","type":"paragraph"},{"text":" 来源：《北京政法学院右派分子言行汇编》(第3部分)(北京政法学院，1957年10月)。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5ae63c51a2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
