script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"抗议资本家残酷剥削和无视矿工安全  西班牙煤矿工人罢工  维哥市造船工人不顾当局镇压举行示威","authors":[],"dates":[{"year":1972,"month":6,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"抗议资本家残酷剥削和无视矿工安全"},{"type":"paragraph","text":"西班牙煤矿工人罢工"},{"type":"paragraph","text":"维哥市造船工人不顾当局镇压举行示威"},{"type":"paragraph","text":"据新华社讯　马德里消息：西班牙阿斯图里亚斯的一千三百名煤矿工人五月二十七日举行罢工，抗议资本家残酷剥削和无视矿工的安全。五月二十六日，阿斯图里亚斯的一个矿井塌陷，造成两名矿工死亡。这一事故是由于资本家唯利是图、不顾矿工死活而造成的。事故发生后，煤矿工人十分愤慨，在第二天纷纷离开矿井，举行罢工，表示抗议。"},{"type":"paragraph","text":"新华社讯　马德里消息：西班牙西南部维哥市的几百名造船工人五月二十六日在这个城市的中心举行示威游行，要求增加工资。西班牙反动当局悍然派出所谓“防暴”部队向示威群众冲击，并且蛮横地逮捕了一些示威者。"},{"type":"paragraph","text":"五月二十六日下午，工人们不顾反动当局的镇压高呼口号，在这个拥有二十万人口的加利西亚港口的一些地方重新集结举行示威。"},{"type":"paragraph","text":"这个城市的一些其他造船厂、发动机制造厂和十多个小型冶金厂的工人二十六日也举行了罢工。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e04cf36a0e"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
