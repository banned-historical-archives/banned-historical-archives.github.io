ical-archives/banned-historical-archives8/main/maoquanji15.pdf"],"article":{"title":"在中共中央政治局会议上的讲话","alias":"","parts":[{"type":"paragraph","text":"在中共中央政治局会议上的讲话！"},{"type":"paragraph","text":"（1941年3月5日）"},{"type":"paragraph","text":"过去我们的“佳电”及撤兵，一方面取得了中间派的同情，另一方面使国民党抓住我们怕破裂，更加向我们进攻。在我们向参政会提出十二条时，蒋表示着慌。我们继续坚持强硬的立场，蒋动员所有小党派向我们要求出席参政会，因此我党参政员董必武、邓颖超提出新的十二条办法。这一次我党周恩来、董必武、邓颖超三个战士坚持了党的立场，这是有重大的意义。我认为我党此次坚定的立场是对的，给了国民党以坚决的打击，会给各方面以极大的影响。我们的孤军奋斗是有极大的意义。我党外交政策并不反对英、美援华，但反对参加英美集团。我们不反对参加中缅联防，在反日的目的下赞成中缅联防，利用帝国主义间的矛盾。现在以大势观之，国民党反共政策是不会停止的，但在日本南进的政策下反共高潮将会降低。"},{"type":"paragraph","text":"[1本篇一是毛泽东在中共中央政治局会议上关于目前时局问题讲话的"},{"type":"paragraph","text":"财政方针主要是发展的方针，手段是票子。应当转变过去的紧缩政策，根据新的方针，立即实行新的政策。要决心立即投资生产事业，主要是投资盐的生产。纸票新增发六百万元，因为现在特别需要，不得不发。以二百万投资盐的生产，二百万买粮食，一百万支付中央与边区的经费，一百万由银行周转。各种垄断的办法必须立即改变，私利不要妨碍人家，政府要实行纠正。要实行贸易自由政策，过去实行以公营事业吞并私人事业的政策是不对的。对边区资本主义发展不要害怕，过去提党内反对资本主义发展的口号，后来改用反对贪污腐化的口号。"}],"authors":["毛泽东"],"dates":[{"year":1941,"month":3,"day":5}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":468,"page_end":469},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"aeaef0b56e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
