","authors":[],"dates":[{"year":1969,"month":11,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社北京二十九日电　华盛顿消息:在日益广泛的反对垄断资产阶级的残酷剥削和压迫的罢工斗争中，美国广大工人群众坚持斗争的精神正在不断提高。"},{"type":"paragraph","text":"据报道:美国最大的化学企业之一奥林马锡森公司设在纽黑文的温切斯特军火工厂的三千名工人，从今年七月十五日起举行的罢工，直到最近仍在坚持中。罢工工人不顾反动警察的破坏和镇压，在厂外设置了昼夜二十四小时的纠察线，坚决阻止车辆通过。罢工工人还同资本家和反动工会头目破坏罢工的阴谋进行了顽强的斗争。"},{"type":"paragraph","text":"纽约市一百多所日间托儿所的工作人员，在今年八月到九月间举行了三星期的罢工。她们不断举行了大规模的示威，并且不止一次直接同反动警察展开了激烈的斗争。"},{"type":"paragraph","text":"美国最大的钢铁企业之一琼斯—劳克林钢铁公司在匹兹堡的一个工厂的工人，为反对资本家的剥削和反动工会的出卖，最近在一个车间的八百多名工人带头下掀起了全厂的罢工，迫使工厂完全停止生产十天，并使资本家不得不向工人的要求让步。"},{"type":"paragraph","text":"旧金山的美国太平洋电话公司的工人，在最近不到两年的时间里已经有二十次踢开反动工会而举行罢工，使旧金山的电话联系多次中断。"},{"type":"paragraph","text":"据新华社北京二十七日电　华盛顿消息:从十月二十七日开始举行罢工的美国通用电气公司的约十五万工人，已经坚持斗争了一个月。目前罢工还在继续，正在给美国统治集团以越来越沉重的打击。"},{"type":"paragraph","text":"一个月来，通用电气公司的罢工工人不断识破了垄断资本家妄图挑拨工人群众间的关系，破坏罢工的种种阴谋，加强了团结，坚持了罢工。他们在一些州里还对反动当局派来破坏和镇压罢工的法西斯警察进行了坚决的斗争。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f8e9ae03af"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
