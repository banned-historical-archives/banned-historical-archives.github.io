<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"上海矽钢片厂革命派和驻厂海军某部订立拥军爱民公约增强军民团结　把文化大革命进行到底深入开展革命大批判，彻底打倒中国赫鲁晓夫","authors":["东闻"],"dates":[{"year":1967,"month":8,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　上海硅钢片厂无产阶级革命派和驻厂海军东海舰队某部毛泽东思想宣传队，昨天一同学习了毛主席“拥军爱民”的伟大教导，学习了《人民日报》、《解放军报》有关的社论，进行了讨论。大家在提高认识的基础上，一起制订了拥军爱民公约。内容包括:"},{"type":"paragraph","text":"一、认真学习、积极响应、坚决贯彻毛主席“拥军爱民”的伟大号召，坚定不移地‘要相信和依靠群众，相信和依靠人民解放军，相信和依靠干部的大多数’，进一步增强军民团结，紧紧掌握斗争大方向，紧跟毛主席的伟大战略部署，深入开展革命大批判，彻底从政治上、思想上、理论上把中国赫鲁晓夫批深、批透、批倒、批臭，进一步把文化大革命推向前进!"},{"type":"paragraph","text":"二、解放军宣传队坚决把毛主席关于“人民解放军应该支持左派广大群众”的伟大教导，作为“三支”“两军”工作的行动指南，坚定不移地站在无产阶级革命派一边，誓作无产阶级革命派的坚强后盾。"},{"type":"paragraph","text":"三、造反大队牢记毛主席“没有一个人民的军队，便没有人民的一切”的教导，坚定不移地相信解放军，拥护解放军，依靠解放军，学习解放军。有情况主动向解放军反映，有问题主动找解放军商量，密切配合，大力协助解放军搞好“三支”“两军”工作。"},{"type":"paragraph","text":"四、加强军民相互学习，求得共同进步。解放军宣传队要虚心当群众小学生，学习革命派忠于毛主席、忠于毛泽东思想的鲜明阶级立场和深厚的阶级感情；学习革命派誓死捍卫毛主席革命路线的革命造反精神；学习革命派破私立公、一心为革命的高尚品德。无产阶级革命派要虚心学习解放军高举毛泽东思想伟大红旗，活学活用毛主席著作，大力突出无产阶级政治，坚持四个第一、三八作风等优良传统，为无产阶级掌好权用好权。"},{"type":"paragraph","text":"五、加强军民团结，互相关心，互相爱护，互相帮助。有了缺点、错误，首先进行自我批评，迅速改正。有了意见，一定按照“团结——批评——团结”的原则，进行帮助。"},{"type":"paragraph","text":"六、提高警惕，严防阶级敌人破坏。及时识破敌人的阴谋诡计，勇敢揭露和坚决打击敌人的破坏活动。坚决反对把矛头指向解放军和冲击军事机关，坚决反对把矛头指向革命派和压制革命群众。(东闻)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f7387deb5c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
