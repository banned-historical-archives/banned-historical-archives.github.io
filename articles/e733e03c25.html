art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"马里军事代表团到京红卫兵小将向客人赠送了《毛主席语录》和毛主席像章","authors":[],"parts":[{"type":"paragraph","text":"新华社九日讯 由马里共和国基塔省长兼军区司令迪比·席拉·迪亚拉上尉率领的马里共和国军事代表团，今天下午乘飞机到达北京。代表团是应我国国防部邀请前来进行友好访问的。"},{"type":"paragraph","text":"中国人民解放军副总参谋长李天佑，总政治部副主任袁子钦，总后勤部副部长张贤约，海、空军负责人周希汉、常乾坤，国防部办公厅副主任潘振武，以及外交部、北京市革命委员会的代表，陆海空三军指战员，首都红卫兵小将数百人到机场热烈欢迎马里客人。"},{"type":"paragraph","text":"当客人走下飞机以后，在机场上欢迎的指战员和红卫兵小将高声朗读毛主席语录：“中国人民把亚洲、非洲、拉丁美洲人民的反帝国主义斗争的胜利看作是自己的胜利，并对他们的一切反帝国主义、反殖民主义的斗争给以热烈的同情和支持。”接着，向客人们赠送了法文版《毛主席语录》和毛主席像章。迪比·席拉·迪亚拉等走向欢迎的队伍，不断挥动红彤彤的《毛主席语录》表示谢意。随后，毛泽东思想宣传队为欢迎马里客人演出了歌颂我们伟大领袖毛主席和支持亚非拉人民革命斗争的歌舞，受到热烈欢迎。"},{"type":"paragraph","text":"马里共和国驻中国大使吉塞和各国驻中国大使馆武官也到机场迎接。"},{"type":"paragraph","text":"马里军事代表团昨天到达上海时，受到了中国人民解放军驻上海部队负责人的热烈欢迎。"}],"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e733e03c25"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
