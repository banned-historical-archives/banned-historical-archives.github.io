hors":["同济大学"],"dates":[{"year":1957,"month":5}],"is_range_date":false,"parts":[{"text":"同济大学右派分子反对无产阶级专政的言论","type":"title"},{"text":"同济大学","type":"authors"},{"text":"城建系助教  李铮生","type":"paragraph"},{"text":"“各种运动破坏了人与人正常关系。”并歪曲说：“我们的社会就没有人情味。”（见校刊129期第四版）","type":"paragraph"},{"text":"校刊编辑室职员  唐玉白","type":"paragraph"},{"text":"“社会主义的光芒，我胆怯、心慌、眼花。”“别人幸福的死去，我却痛苦的生存。”（见校刊131期第六版）","type":"paragraph"},{"text":"速中语文教师  余力容","type":"paragraph"},{"text":"“无产阶级专政是‘一党专政’，民主党派没有自己的斗争纲领，是共产党的花瓶。”（见校刊119期第六版）","type":"paragraph"},{"text":"道桥系毕业生  吴志刚","type":"paragraph"},{"text":"“官僚主义、个人崇拜是社会主义制度产生的。”（摘自道桥系毕业生吴志刚材料）","type":"paragraph"},{"text":"卫生工程系毕业生  姚骏之","type":"paragraph"},{"text":"“人民政府是捞钞票，要捞人民政府的一分钱都是困难的。”“现在犯人坐牢睡在里面不准讲话否则遭打。”","type":"paragraph"},{"text":"造谣说：“南京学生要打报馆，政府动员了三轮车工人将学生打走。”（摘自卫生工程系毕业生姚骏之材料）","type":"paragraph"},{"text":"铁路系毕业生  邱镕兆","type":"paragraph"},{"text":"“说三大主义是社会主义制度的产物，也有道理。”（摘自铁路系毕业生邱镕兆材料）","type":"paragraph"},{"text":"城建系毕业生  史奉羔","type":"paragraph"},{"text":"反胡风学习在本校开展时他说：“胡风你们认得吗？不认得不要讲。”","type":"paragraph"},{"text":"在公布胡风材料时，有一句‘胡风在日本有一段时期是干了不可告人的勾当。’他说：“胡风既然干了不可告人的勾当，你们又不知道。”（意思是指人民日报报道空洞）。（摘自城建系毕业生史奉羔材料）","type":"paragraph"},{"text":"结构系毕业生  周知其","type":"paragraph"},{"text":"“我作为一个人民和青年群众，我要求国家应该对于每一个公民有法律的保障，要求真正的贯彻民主、平等、自由的政策。”","type":"paragraph"},{"text":"“为什么仅仅因为一个青年偶犯了一些错误和思想上不符（你们的）要求，就要给他种种打击，甚至几乎要迫他走上绝路呢。这难道是革命的目的吗？”（摘自结构系毕业生周知其材料）","type":"paragraph"},{"text":"道桥系毕业生  吴志刚","type":"paragraph"},{"text":"他曾写过这样一首仇恨新社会的诗：“我高举起我的葬旗，嘴里哼着哀歌，向前！向前！朝着我的坟墓前进！”（摘自道桥系毕业生吴志刚材料）","type":"paragraph"}],"comments":[],"origin":"同济大学马列主义资料室编印《右派分子言论汇编》第二辑（内部资料不得外传），一九五七年十月。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8e115e52bb"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
