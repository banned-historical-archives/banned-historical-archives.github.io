<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"对资产阶级不能讲“忠恕”","authors":["辽宁省庄河县金山大队党支部"],"dates":[{"year":1975,"month":6,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"对资产阶级不能讲“忠恕”"},{"type":"paragraph","text":"辽宁省庄河县金山大队党支部"},{"type":"paragraph","text":"历代反动派，为了维护他们的反动统治，都把孔孟之道的“忠恕”、“中庸”奉为至宝。林彪为了复辟资本主义，同样从历史垃圾堆里拣起孔孟之道，叫嚷要“以仁爱之心待人之忠，以宽宥原谅之恕”处理人与人的关系，反对马克思主义的斗争哲学，抹杀社会主义社会的阶级矛盾和阶级斗争，保护反革命分子和新老资产阶级分子。"},{"type":"paragraph","text":"列宁指出：“无产阶级专政不是阶级斗争的结束，而是阶级斗争在新形式中的继续。”在社会主义这个历史阶段中，老的地主资产阶级每日每时都在图谋复辟，新的资产阶级分子仍然不断地在产生。资产阶级每日每时都在利用残存在人们头脑中的传统观念和习惯势力，散布资产阶级思想和腐朽的生活作风，腐蚀人们的灵魂，破坏无产阶级专政的社会主义制度。因此，我们每日每时都不可放松同新老资产阶级分子、同资本主义倾向、同资产阶级生活作风、同资产阶级思想作斗争。"},{"type":"paragraph","text":"无产阶级文化大革命以前，由于我们受“阶级斗争熄灭论”和“中庸之道”的影响，埋头抓生产，放松了阶级斗争，一小撮阶级敌人便兴风作浪。我们要学大寨，阶级敌人就散布“条件差，学不来”；我们要打农业翻身仗，阶级敌人就煽动“砍树卖柴捞外快”，妄图把人心搞散，破坏社会主义集体经济，复辟资本主义。经过无产阶级文化大革命，我们加深了对党的基本路线的理解。从一九六九年以来，我们坚持斗争哲学，深入开展革命大批判，狠批刘少奇、林彪反革命的修正主义路线，打击一小撮阶级敌人腐蚀拉拢干部、煽动资本主义妖风、破坏农业学大寨运动的罪行。同时，还抓了意识形态领域的阶级斗争，批判反动没落阶级的意识形态孔孟之道。这些斗争，推动了农业学大寨运动的蓬勃发展。一九七一年粮食亩产超《纲要》，一九七二年跨过“黄河”，一九七三年亩产又增加到七百多斤，不仅改变了长期吃返销粮的局面，还向国家卖余粮十五万斤。其他多种经营也有了很大发展。穷山沟正在变成“金山”沟。"},{"type":"paragraph","text":"在抓阶级斗争和路线斗争中，我们还不断加强领导班子的思想建设。过去，有的干部“好人主义”思想比较严重，遇到矛盾绕开走，睁一只眼，闭一只眼，不说好，不说坏；批判资本主义不愿开口。近几年，我们党支部多次开门整风，增强了斗争精神，带领群众批判修正主义、批判资本主义，为巩固无产阶级专政、发展社会主义集体经济而战斗。"},{"type":"paragraph","text":"几年来，广大贫下中农坚持党的基本路线，大批资本主义，大干社会主义。一九七四年，粮食亩产一跃跨过“长江”，达到八百八十七斤，集体经济越来越壮大。更可喜的是，人的精神面貌发生了深刻的变化。社会主义新思想、新道德、新风尚大大发扬，广大干部和社员群众不断破除小生产的旧习惯，自觉地同私有观念作斗争，一心一意大干社会主义。"},{"type":"paragraph","text":"斗争的实践使我们进一步体会到：如果对资产阶级讲什么“忠恕”，资产阶级就会吃掉无产阶级。因此，必须对资产阶级进行针锋相对的斗争。社会主义靠斗争来发展，无产阶级专政靠斗争来巩固。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"林彪","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3a41b115fc"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
