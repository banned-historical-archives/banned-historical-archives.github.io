<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"清除左倾思想影响稳步发展民族教育  教育部、民委召开会议研究调整发展民族教育的方针任务","authors":[],"dates":[{"year":1981,"month":3,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"清除左倾思想影响稳步发展民族教育"},{"type":"paragraph","text":"教育部、民委召开会议研究调整发展民族教育的方针任务"},{"type":"paragraph","text":"据新华社北京3月5日电　教育部、国家民委2月16日至25日在北京召开全国民族教育工作会议，分析民族教育形势，总结交流经验，研究在当前形势下调整和发展民族教育的方针、任务。"},{"type":"paragraph","text":"中共中央政治局委员、国务院副总理方毅到会讲了话。方毅说，发展民族教育，提高少数民族的科学文化水平，大力培养少数民族干部，是进行四化建设、落实民族政策、增强民族团结的需要，也是建设边疆、巩固国防的需要。他指出，加强和办好民族教育是个严肃的政治问题，关系到全局，具有重大的战略意义。国内外的许多事实证明，凡是有眼光的人，都重视发展教育事业。各省、市、自治区，特别是少数民族多的省和自治区，一定要把少数民族教育工作列入议事日程，一年抓几次，地、县更要经常研究这项工作。要加强党对民族教育工作的领导，加强思想政治工作。当前要对少数民族学生进行四项基本原则、爱国主义和民族团结的教育。"},{"type":"paragraph","text":"会议期间，中共中央政治局委员、人大常委会副委员长乌兰夫、国务院副总理杨静仁接见了到会代表。"},{"type":"paragraph","text":"会议认为，办好民族教育的关键，在于各级党和政府的重视，在于对落实民族政策、提高对民族教育重要地位和作用的认识。只要各级党委重视，就能调动各方面的积极性，把民族教育工作推向前进。会议要求各地加强对民族教育的领导，各级教育部门要把搞好民族教育作为自己应尽的职责，认真总结历史经验，清除左倾思想的影响，使民族教育稳步向前发展。"},{"type":"paragraph","text":"会议强调，当前民族教育工作要在着重抓好调整的同时，稳步地发展。民族教育的主要任务是加强各级各类学校的政治思想教育，切实抓好中、小学教育，调整和办好少数民族的中等专业教育和高等教育。大力扫除文盲，逐步发展业余教育。加强民族师范教育，搞好少数民族师资队伍的建设。进一步恢复和加强民族语文教学和民族文字教材建设等。"},{"type":"paragraph","text":"来自全国29个省、市、自治区包括31个民族成分的各民族代表二百七十多人出席了这次会议。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"33d2a1b312"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
