":[{"year":1952,"month":4,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社沈阳廿八日电】　中共中央东北局在十八日召开了“毛泽东选集”学习会，讨论毛泽东同志杰出的哲学著作“矛盾论”。学习会由中共中央东北局书记高岗主持，参加讨论的有东北局各委员与各部负责干部。到会者一致认为毛泽东同志在这一战斗的哲学文献中，根据中国革命的丰富的经验，发展了马克思、恩格斯、列宁、斯大林关于唯物辩证法的学说，尤其是深入而周密地说明了矛盾的普遍性和特殊性及其相互联系问题，严厉地批判了教条主义和经验主义的主观、片面与表面的思想方法的错误，这对于当前的伟大革命斗争与思想改造运动，有着极其巨大的指导意义。因此认真学习“矛盾论”和毛泽东同志的其他著作，对于全党特别是高级领导干部来说，是提高工作水平和领导水平的决定性的问题。"},{"type":"paragraph","text":"讨论会历时四小时，大部分的时间讨论了现阶段中国革命运动中的矛盾问题、革命成败的内部原因与外部原因的关系问题、党内思想斗争的问题、目前国营企业内部以及东北农村中的矛盾问题、阶级矛盾和新旧事物的矛盾在各个方面的具体表现问题。多数东北局委员和各部负责干部都发表了意见，讨论极为热烈。高岗曾用许多实际材料和理论上的根据，就会上提出的某些问题，进行了生动具体的分析。"},{"type":"paragraph","text":"为使学习毛泽东同志的著作成为经常制度，由高岗任东北局“毛泽东选集”学习组长，并决定每两星期召开学习讨论会一次，讨论前每个参加会议的同志都须充分准备，并联系当前革命斗争和工作中的问题。下一次讨论会，拟进一步就“实践论”与“矛盾论”进行深入讨论。最后，东北局委员林枫等并提议每个东北局委员对自己领导的部门都要组织“毛泽东选集”的学习小组，当即得到到会同志的一致赞成。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"高岗","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c9795fa182"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
