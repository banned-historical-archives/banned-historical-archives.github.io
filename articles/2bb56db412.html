"dates":[{"year":1964,"month":9,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"广州部队选出三届全国人大代表"},{"type":"paragraph","text":"叶剑英同志等十一人当选"},{"type":"paragraph","text":"新华社广州二十四日电  中国人民解放军广州部队军人代表大会今天选举中共中央委员、国防委员会副主席叶剑英元帅等十一人为第三届全国人民代表大会代表。"},{"type":"paragraph","text":"今天广州部队军人代表大会以无记名投票方式选举出的第三届全国人民代表大会代表，还有：李天佑、邱会作、刘兴元、詹才芳、文年生、陈明仁、江雪山、郝忠云、钱安良、李玉亭。"},{"type":"paragraph","text":"参加广州部队这次军人代表大会的代表，来自广州部队各个工作岗位。全军学习毛主席著作的尖兵、广州部队五好战士标兵黄祖示，老英雄程远茂、赵兴旺，广州部队五好战士标兵张仲明和广州部队模范共青团员刘瑞明等，都是这次军人代表大会的代表。他们带着广州部队全体官兵的嘱托，庄严行使了自己的民主权利。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2bb56db412"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
