rt":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"运用毛泽东军事思想研究现代局部战争","authors":["赵险峰"],"parts":[{"type":"paragraph","text":"迟总长谈到当今世界形势时说，缓和的大趋势不会逆转，但动荡不稳却继续存在。因此，如何看待和应付现代条件下的局部战争，是一个需要研究和正确回答的历史性课题。"},{"type":"paragraph","text":"迟总长指出，毛泽东军事思想作为一种科学体系，它所揭示的武装斗争的一般规律和特殊规律，提出的研究战争、指导战争的根本立场、观点和方法，是经得起时间空间变化的检验的，不仅适应于传统战争的昨天，也适应于现代局部战争的今天和明天。"},{"type":"paragraph","text":"迟总长认为，在当前运用毛泽东军事思想深入研究现代局部战争的作战指导和战法具有特别重要的意义。在现代局部战争中要取得胜利，最根本的是要在作战指导上坚持积极防御的战略思想、人民战争的法宝和机动灵活的战略战术。同时要下功夫研究现代局部战争的新情况，在传统作战经验的基础上创造新战法，掌握高人一筹的对策。只有这样，才能在现代战争中立于不败之地。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"人民战争","type":"主题/事件"},{"name":"世界形势","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cd756a1b02"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
