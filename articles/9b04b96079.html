ical-archives/banned-historical-archives0/main/maoquanji50.pdf"],"article":{"title":"关于陈毅的几点指示","alias":"","parts":[{"type":"paragraph","text":"关于陈毅的几点指示"},{"type":"paragraph","text":"（1967年8月11日）材料不黑，性情直爽。陈毅是个好同志，对陈毅要一批二保。"},{"type":"paragraph","text":"要保他，他是第三野战军司令，外交部长现在没人搞，还要他来搞。"},{"type":"paragraph","text":"陈毅怎么能打倒呢？陈毅跟了我四十年，功劳那么大。陈毅现在掉了二十斤肉，不然我带他接见外宾。"}],"authors":["毛泽东"],"dates":[{"year":1967,"month":8,"day":11}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":51,"page_end":51},"tags":[{"name":"陈毅","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"}]},{"id":"45f85d41-2767-49bc-87e9-ba331b429fce","name":"毛泽东思想万岁（1961年-1968年）","internal":true,"official":false,"type":"pdf","author":"","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives3/main/45f85d41-2767-49bc-87e9-ba331b429fce.pdf"],"article":{"title":"关于陈毅的几点指示","alias":"","parts":[{"type":"paragraph","text":"八、依靠群众，加强专政，新疆办大型劳改农场不一一定好，要研究；九、要抓学习，把工作做好，要精兵简政。"},{"type":"paragraph","text":"对公安工作的指示"},{"type":"paragraph","text":"（一九六七年八月）"},{"type":"paragraph","text":"公安机关是无产阶级手里的一把刀子，掌握得好，就能打击敌人，保卫人民；掌握不好，就容易伤害自己。这把刀子要是被坏人抓走了，那就更加危险。所以，公安工作只能由党委直接领导，不能由业务部门垂直领导。"},{"type":"paragraph","text":"关于陈毅的儿点指示"},{"type":"paragraph","text":"（一九六七年八月十一日）（对北外造反团所编《陈毅黑话集》的评语）材料不黑，性情直爽。"},{"type":"paragraph","text":"×"},{"type":"paragraph","text":"+"},{"type":"paragraph","text":"+陈毅是个好同志，对陈毅要一批二保。"},{"type":"paragraph","text":"×"},{"type":"paragraph","text":"×"},{"type":"paragraph","text":"×要保他，他是第三野战军司命，外交部长现在没人搞，还要他来搞。"},{"type":"paragraph","text":"XX"},{"type":"paragraph","text":"×"},{"type":"paragraph","text":"陈毅怎么能打倒呢？陈毅跟了我四十年，功劳那么大。陈毅现在掉了二十斤肉，不然我带他接见外宾。"},{"type":"paragraph","text":"对姚文元同志《斋陶的两本书》"},{"type":"paragraph","text":"一文的批示"},{"type":"paragraph","text":"(一九六七年九月）好极：此文的要害是点破了“五·一六。”"},{"type":"paragraph","text":"对新开工作的指示"},{"type":"paragraph","text":"（一九六七年九月）新闻单位要树立严肃作风、科学作风、战斗作风，要培养无产阶级革命者的战斗风格。"},{"type":"par
