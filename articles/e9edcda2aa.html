es":[{"year":1970,"month":3,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编者按:《红旗》杂志一九七○年第三期发表的题为《一场粉碎资本主义道路的尖锐斗争》一文中指出:一九五一年七月，叛徒、内奸、工贼刘少奇赤膊上阵，抛出一个疯狂地赤裸裸鼓吹走资本主义道路的黑纲领。这个黑纲领必须彻底批判。请注意:在新中国成立不久，刘少奇就提出要在中国搞半个世纪资产阶级专政的纲领，妄图使我国无产阶级专政变为资产阶级专政，把几亿中国工人、农民重新置于帝国主义、地主阶级、资产阶级剥削之下。这是一个多么阴险毒辣的罪恶计划啊!它是一份不可多得的绝妙反面教材。对于这个完整而又系统的反动政治纲领，《红旗》杂志的文章已经作了深刻的揭露和批判。让我们高举毛泽东思想伟大红旗，深入开展革命大批判，进一步肃清刘少奇反革命修正主义路线的余毒!"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e9edcda2aa"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
