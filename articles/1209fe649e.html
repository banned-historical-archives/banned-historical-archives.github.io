伟大胜利。中国在国内和国际方面的历史性胜利，是对美帝和苏修的最沉重和决定性的打击，是对全体进步人类反帝反殖斗争的鼓舞、推动和支持。","authors":[],"dates":[{"year":1966,"month":12,"day":31}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京三十日电　毛主席收到了阿尔巴尼亚劳动党中央委员会第一书记恩维尔·霍查同志发来的电报，热烈祝贺我国又一次新的核爆炸成功。电报全文如下:"},{"type":"paragraph","text":"北京中国共产党中央委员会主席毛泽东同志:"},{"type":"paragraph","text":"我谨一代表阿尔巴尼亚人民、阿尔巴尼亚劳动党，向您并通过您，向人民解放军、科学工作者、工程师、技术人员和全体兄弟中国人民，致以最亲切的兄弟般的祝贺和敬意，祝一九六六年十二月二十八日成功地进行了新的核爆炸。这一光辉成就把中国的社会主义科学技术提到一个更高的水平，这是天才的中国人民、光荣的中国共产党和您的光辉思想的又一伟大胜利。"},{"type":"paragraph","text":"七亿中国人民在核试验方面不断取得的成就以及在国内和国际方面的历史性胜利，是对美帝国主义者和赫鲁晓夫修正主义者的侵略计划和罪恶阴谋的最沉重和决定性的打击。美帝国主义者和赫鲁晓夫修正主义者企图垄断核武器称霸世界，迫使为民族和社会解放进行英勇革命斗争的各国人民屈服。全体进步人类为伟大人民中国的这一新的光辉胜利感到无限高兴，表示衷心的祝贺，并认为这是对他们进行反对帝国主义、殖民主义及其走狗的共同斗争的鼓舞、推动和支持。"},{"type":"paragraph","text":"阿尔巴尼亚人民把兄弟中国人民这一伟大胜利看作是自己的胜利，感到由衷的高兴，并受到鼓舞。阿人民祝贺自己的战友——伟大的中国人民在社会主义建设、不断加强国防、提高自己伟大祖国的荣誉和为世界人民造福的事业中取得新的更大的成就和胜利。"},{"type":"paragraph","text":"阿尔巴尼亚劳动党"},{"type":"paragraph","text":"中央委员会第一书记"},{"type":"paragraph","text":"恩维尔·霍查"},{"type":"paragraph","text":"一九六六年十二月二十九日"},{"type":"paragraph","text":"于地拉那"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1209fe649e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
