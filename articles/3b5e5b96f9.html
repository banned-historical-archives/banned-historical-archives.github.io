修正主义","authors":[],"dates":[{"year":1960,"month":11,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"凯莱齐副主席作访华报告"},{"type":"paragraph","text":"人民公社是很好的组织形式"},{"type":"paragraph","text":"中阿两党坚决反对帝国主义和现代修正主义"},{"type":"paragraph","text":"新华社地拉那11日电　阿尔巴尼亚劳动党中央委员、部长会议副主席、阿中友好协会主席凯莱齐10日在地拉那纺织中心斯大林纺织工厂向工人们作了访华观感的报告。斯大林纺织工厂厂长杰贝罗和中国驻阿尔巴尼亚大使罗士高都出席了大会。"},{"type":"paragraph","text":"凯莱齐说，阿中友好协会代表团在访问中国期间，到处都看到了中国人民所取得的巨大成就。他特别称赞了中国的城乡人民公社。"},{"type":"paragraph","text":"他说，人民公社是一个很好的组织形式，它动员和组织了所有的劳动力投入生产。人民公社不仅兴办了自己的工业，并且创办了很多集体福利事业，如食堂、托儿所等等。"},{"type":"paragraph","text":"他说，人民公社自己兴办的小型工业和土法生产的工业虽然设备简陋，但都能生产出很好的产品供应城乡的需要。"},{"type":"paragraph","text":"他还指出，所有这一切都是由于实行了中国共产党提出的两条腿走路方针的结果。"},{"type":"paragraph","text":"凯莱齐说，中国人民对阿尔巴尼亚人民有着极为深厚的友谊，这种友谊是建立在马克思列宁主义无产阶级国际主义的基础之上的，是永恒的和牢不可破的。这种友谊是由我们两国马克思列宁主义的政党——以毛泽东同志为首的中国共产党和以霍查同志为首的阿尔巴尼亚劳动党所锤炼成的。"},{"type":"paragraph","text":"他强调说：我们两党在共同的道路上进行着共同的斗争，保卫马克思列宁主义的纯洁性，坚决地反对帝国主义和现代修正主义，特别是南斯拉夫修正主义者。"},{"type":"paragraph","text":"他说：帝国主义竭力使用各种手段来麻痹各国人民的警惕性，但是我们对帝国主义不抱有任何幻想，只要敌人胆敢侵犯我们，我们就全民动手消灭它。"},{"type":"paragraph","text":"他说，我们的敌人对中国进行疯狂的诬蔑和攻击，但是丝毫也不能损害中国的国际威望，中国正以坚强的步伐向前迈进。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3b5e5b96f9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
