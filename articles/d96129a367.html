es":[{"year":1968,"month":4,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"上海工人革命造反总司令部"},{"type":"paragraph","text":"毛主席教导我们:对派性要进行阶级分析。毛主席这一英明的指示，我们一定要深刻领会，坚决照办。"},{"type":"paragraph","text":"无产阶级同资产阶级，是势不两立的两大派。在整个过渡时期，无产阶级同资产阶级的斗争，不是东风压倒西风，就是西风压倒东风，根本没有调和的余地。"},{"type":"paragraph","text":"在无产阶级文化大革命中，无产阶级革命派的派性同资产阶级的派性的斗争，也是十分激烈、十分尖锐的。随着无产阶级文化大革命的深入发展，这两种根本对立的派性之间的斗争，也就越来越成为两个阶级、两条道路、两条路线斗争的一个十分重要的内容。我们上海工人阶级，坚持无产阶级革命派的派性，同革命队伍内部表现出来的各种不同形式的资产阶级的派性作了不调和的斗争，取得了一个又一个的胜利。我们批判和克服了“争着亮小山头旗子”的资产阶级派性，团结对敌，促进了革命大批判更深入地开展；批判和克服了“以我为核心”的资产阶级派性，巩固和发展了革命的大联合；批判和克服了“争席位、争当第一把手”的资产阶级派性，巩固和发展了革命的三结合。最近，我们又同右倾机会主义的、保守派的派性，右倾翻案的“秋后算账”派的派性，形“左”而实右的极“左”派的派性，右倾分裂主义、宗派主义、山头主义的派性，以及一切反革命两面派的派性作了针锋相对的斗争，有力地保卫和巩固了我们的红色政权——上海市革命委员会。"},{"type":"paragraph","text":"资产阶级的派性尽管千变万化，但万变不离其宗，都是资产阶级的利己主义、个人主义，都是一个“私”字。我们无产阶级革命派的派性，即无产阶级先锋队的党性，即用马克思列宁主义、毛泽东思想武装起来的左派的革命性。它的根本标志就是一个“公”字，就是无限忠于毛主席，无限忠于毛泽东思想，无限忠于毛主席的革命路线。我们一定要以毛泽东思想为武器，不断在灵魂深处爆发革命，斗掉“私”字，大立“公”字，对毛主席无限忠诚。而且不是忠在嘴巴上，而是忠在心坎里，忠在行动上。在破私立公的过程中，不断增强自己的无产阶级先锋队的党性。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"派性","type":"主题/事件"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d96129a367"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
