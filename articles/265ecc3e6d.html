" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"武汉民主人士对党关於高、饶反党联盟的决议的反映","authors":["徐奔"],"dates":[{"year":1955,"month":4,"day":7}],"is_range_date":false,"parts":[{"text":"武汉民主人士对党关于高、饶反党联盟的决议的反映","type":"title"},{"text":"徐奔","type":"authors"},{"text":"【湖北分社四月七日讯】在公布党关于高、饶反党联盟的决议后，武汉市民主人有以下反映：","type":"paragraph"},{"text":"一、对高、饶何以会犯这样的错误“不解”、“可惜”。有的人说：“高、饶是老革命，在这一桩事上太糊涂了。”“高、饶地位如此高，为什么还感不足？”文史馆馆员黄明孝说：“高、饶做这样大的事还受资产阶级影响，我觉得可惜。做共产党员真不容易！”一工商界华方城说：“高、饶在权时重如泰山，犯了错误轻如鸿毛。”工商界孙履元说：“大丈夫要能屈能伸，高岗自杀大可不必，搞垮了应该再来。”工商界黄坚志说：“高岗是一个青年有为的高级将领，可惜为了个人利益断送了自己的生命，这是党的胜利，又是党的损失。”","type":"paragraph"},{"text":"二、对高、饶反党联盟问题的看法：资本家王际清说：“高、饶事件发生是由于他们当初参加革命的动机不纯。”饶被调中央任组织部长后就对党中央不满，认为党中央是把他调虎离山，削弱他的势力，就与高岗调中央后的思想结合起来了，联盟就形成了。一参事谢平难说：“高、饶是分两步走：第一步是清君侧，第二步是逼宫篡位。”资本家孙鼎九认为：“高的错误只是骄傲自满，个人主义，不愿屈就于人之下。”工商界邓鹤卿说：“高岗好比太平天国时的东王，杨秀清想夺权。”资本家王际清、赵厚甫问“高、饶是否资产阶级出身?”“没有与资产阶级勾搭何以说他们是资产阶级的代理人？”资本家吴小鲁说：“报上说的没有事实，只是有一些如闹独立王国、向党进攻的一些帽子。”","type":"paragraph"},{"text":"三、对高、饶处理的猜测：有的认为“高、饶事件与大行政区撤销相联系。”“正是由于高、饶的割据一方，搞独立王国，所以中央才决定撤销大行政区，以防止各自为政。”资本家范中平说：“高岗是东北的王牌，工作有成绩，有贡献；饶是右倾，两人的错误应有轻重之别。”民革中有些人问：“他们在党内受了处分，是否还要受刑事处分呢？”有的说：“既是反党联盟，除他的二人外其他人也应分别轻重予以处分。”市政协常委、参事刘骥(菊村)说：“高、饶在司法上一定要裁判的。”此外，资本家吴小鲁对党决议成立党中央和地方监察委员会认为“是为了专门监察高、饶的余党。”华中师范学院老教授韦卓民说：“我战战兢兢，我们这些人难免不发生错误，而处理我们的错误将是人民法院，谁来监察我们呢？”","type":"paragraph"},{"text":"工商界看到决议中说饶漱石在华东采取向资本家投降的右倾政策一段后说：“这一下消除了我们过去认为华东是旧三民主义，武汉是社会主义，北京是新民主主义的谬论。”并说：“过去武汉的资本家羡慕上海的资本家。”“上海的五反松些，武汉的资本家个个都要作一个结论。”他们口头上说饶右倾，实则是借题发挥，说“武汉政策左了”。某区工商联主委、资本家杨懋卿说：“党对资本主义工商业的政策华东比中南要宽些，这次揭露了饶漱石的右倾政策，对华东的资本家是不利的。”还有的资本家对于说干部一犯了错误就是资产阶级思想的进攻“心里不服”。","type":"paragraph"},{"text":"(徐奔根据武汉市各阶层人士在市协商会所举行的座谈会上的发言及中共武汉市委统战部的材料编写)","type":"paragraph"}],"comments":[],"origin":"新华通讯社编《内部参考》1955年4月22日","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"高岗","type":"人物"},{"name":"饶漱石","type":"人物"},{"name":"夺权","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"265ecc3e6d"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
