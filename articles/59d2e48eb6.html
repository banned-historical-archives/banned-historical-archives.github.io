烈欢送","authors":[],"dates":[{"year":1972,"month":5,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"波德纳拉希率罗政府军事代表团回国"},{"type":"paragraph","text":"叶剑英、李德生等同志以及有关方面负责人前往机场热烈欢送"},{"type":"paragraph","text":"新华社一九七二年五月四日讯　由罗马尼亚共产党中央执行委员会委员、中央常设主席团委员、罗马尼亚社会主义共和国国务委员会副主席埃米尔·波德纳拉希率领的罗马尼亚政府军事代表团，在结束对我国的友好访问以后，于今天上午乘专机离开北京回国。"},{"type":"paragraph","text":"中共中央政治局委员、中央军委副主席叶剑英，中共中央政治局候补委员、中国人民解放军总政治部主任李德生，中共中央委员、中共中央对外联络部部长耿飚，外交部副部长乔冠华，中共中央委员、国防部副部长粟裕，中共中央委员、中国人民解放军副总参谋长张才千，中国人民解放军总后勤部副部长封永顺、海军副司令员吴瑞林、空军副司令员薛少卿、北京部队副司令员王振祥，北京市革命委员会秘书长黄作珍，对外友协副会长丁西林，以及有关方面负责人甘迈、王明修、朱传贤、张全忠等，前往机场热烈欢送。"},{"type":"paragraph","text":"罗马尼亚驻中国大使格夫里列斯库和夫人，大使馆公使衔参赞基伏和夫人、武官乔治乌上校，朝鲜驻中国大使玄峻极，大使馆武官张来宪大校，也前往机场欢送。"},{"type":"paragraph","text":"（附图片）"},{"type":"paragraph","text":"这是宾主在机场合影。"},{"type":"paragraph","text":"新华社记者摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"李德生","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"59d2e48eb6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
