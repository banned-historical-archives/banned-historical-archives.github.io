<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"开茶市是不是为资产阶级服务？","authors":[],"dates":[{"year":1972,"month":6,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"开茶市是不是为资产阶级服务？"},{"type":"paragraph","text":"去年，广东南雄县工农兵饭店进行思想和政治路线方面的教育，在一次学习会上，老职工邓诗福反映群众的意见，提出要重新开茶市。这意见一提出，大家议论得很欢。一些人认为，茶市不能开，要开就是“复旧”。多数人反对这种看法，支持邓师傅的意见，认为重开茶市，是为工农兵服务，不是复旧。"},{"type":"paragraph","text":"哪一种意见对呢？饭店党组织领导职工围绕这个问题，认真学习毛主席的有关教导，狠批刘少奇一类骗子形“左”实右的修正主义路线。大家统一了认识，决定重新开茶市。他们说，茶是劳动人民种的，但在解放前，劳动人民遭剥削，受压迫，连饭都吃不上，那谈得上喝茶！现在人民生活水平不断提高，工农兵要喝茶，不能把这也说成是资产阶级的吃喝玩乐。我们为满足工农兵的要求开茶市，怎么能说是为资产阶级服务呢？"},{"type":"paragraph","text":"可是，茶市刚开张时，喝茶的人不多，什么原因呢？原来，很多工农兵顾客嫌茶市开得不及时，下班了要喝杯茶，店门又关了。另外，也没什么点心供应，光喝茶嫌单调。群众的意见给他们指明了方向。他们重新安排了开茶市的时间。中午农民进城的多，晚上下班后很多工人要来店喝茶，在这段时间开茶市，最适应群众的要求。除了卖茶，还供应点心。从去年九月份开始，营业情况一直很好，受到工农兵的欢迎。"},{"type":"paragraph","text":"从要不要开茶市这件事中，广大职工懂得了一个道理：刘少奇一类骗子时而从右的方面，时而又从极“左”方面破坏毛主席的革命路线，干扰社会主义大方向，模糊人们的认识。因此，必须用阶级分析的方法，站在路线斗争的高度，学会识别真假马克思主义，分清什么是社会主义，什么是资本主义，才能很好地为工农兵服务。"},{"type":"paragraph","text":"南雄县革委会报道组"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"816d3ab03a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
