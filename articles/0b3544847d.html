:[{"year":1984,"month":9,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"张遇博包庇“文革”中犯严重错误的人受处分"},{"type":"paragraph","text":"本报讯　中共辽宁省沈阳市和平区区委委员兼区环保局党委副书记张遇博，包庇“文革”中犯有严重错误的人，受到党纪处分。"},{"type":"paragraph","text":"对该局党委办公室副主任丁某、集贤环卫所党支部书记宋某在“文革”中的严重错误，张遇博早已了解。但1983年7月，区委责成他组织力量对丁、宋二人在“文革”中的问题进行调查时，他却说丁、宋没有什么问题。他没有组织力量进行调查，竟擅自以局党委名义给区委写书面报告，为丁、宋开脱，使环卫局的核查工作遇到阻力。后经区委派工作组查明，丁某积极参加了抄家、抓人、打人和刑讯逼供等迫害干部、群众的活动，原三废厂负责人聂瑞琛被打致死，丁应负重要责任。宋某在“清队”时担任革命领导小组成员，也曾参与刑讯逼供、制造冤假错案等活动。"},{"type":"paragraph","text":"对张遇博丧失党性原则、包庇“文革”中有严重问题的人、抵制清理“三种人”工作的错误，上级党委进行了认真查处，今年8月给予撤销区委委员职务的处分（所任局党委副书记早已免职）。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"清理阶级队伍","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0b3544847d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
