-historical-archives/banned-historical-archives9/main/books/maoxuan-jinghuo.pdf"],"article":{"title":"官僚主义者阶级是革命对象","parts":[{"text":"官僚主义者阶级是革命对象","type":"title"},{"type":"paragraph","text":"管理也是社教。如果管理人员不到车间小组搞三同，拜老师学一门至几门手艺，那就一辈子会同工人阶级处于尖锐的阶级斗争状态中，最后必然被工人阶级把他们当作资产阶级打倒。不学会技术，长期当外行，管理也搞不好，以其昏昏，使人昭昭，是不行的。"},{"type":"paragraph","text":"官僚主义者阶级与工人阶级和贫下中农是两个尖锐对立的阶级。这些人是已经变成或者正在变成吸工人血的资产阶级分子，他们怎么会认识呢？这些人是斗争对象，革命对象，社教运动决不能依靠他们，我们能依靠的，只是那些同工人没有仇恨，而又有革命精神的干部。"}],"comment_pivots":[{"part_idx":2,"offset":31,"index":2}],"dates":[{"year":1965,"month":1,"day":29}],"is_range_date":false,"authors":["毛泽东"],"comments":["陈正人，时任农业机械部（一九六五年一月改为第八机械工业部）部长。","在印发这段批注的时候，薄一波在“这些人”的后面加了一个注释：“指那些企业领导人中坚决走资本主义道路的人”。"],"page_start":1477,"page_end":1477,"description":"这是毛泽东同志在对陈正人〔1〕关于社教蹲点情况报告的批语和批注。","alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ff534be5e8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
