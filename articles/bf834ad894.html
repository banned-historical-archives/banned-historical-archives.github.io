"dates":[{"year":1966,"month":12,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"用毛泽东思想武装社员头脑"},{"type":"paragraph","text":"福安专区夺得抗灾斗争大胜利"},{"type":"paragraph","text":"福建省福安专区广大社员高举毛泽东思想伟大红旗，经过几个月的顽强努力，夺得了秋季抗灾斗争的重大胜利。现在，这个专区的晚稻已经收割登场，沿海地区许多受灾较重的社队，一般都没有减产或减产不多；受灾较轻的山区各县的晚稻都获得大幅度增产。社员们看到大灾之年有这样好的年景，都说这是毛泽东思想的伟大胜利。"},{"type":"paragraph","text":"今年九月初，正当晚稻生长的关键时刻，这个专区连续遭到台风、海啸和山洪的袭击，全区九个县有七十三万亩秋粮作物被淹，还有一部分海堤和水利工程被毁坏。在这样严重的灾害面前，全区干部社员毫不气馁，他们活学活用毛主席著作，以毛泽东思想为武器，向灾害展开了英勇的斗争，取得了胜利。"},{"type":"paragraph","text":"（据新华社讯）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bf834ad894"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
