ical-archives/banned-historical-archives0/main/maoquanji50.pdf"],"article":{"title":"/对康生关于审阅祝贺缅共武装斗争二十周年电报问题的检讨的批语","alias":"","parts":[{"type":"paragraph","text":"对康生关于审阅祝贺缅共武装斗争二十周年电报问题的检讨的批语！"},{"type":"paragraph","text":"（1968年3月28日）"},{"type":"paragraph","text":"注意到了，就好了。对外刊物和出版方面似有不少问题，可否请康生、伯达、文元三同志主持召开一二次座谈会，研究改善办法。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"三月二十八日"},{"type":"paragraph","text":"[1]中共中央政治局常委、中央文化革命小组顾问康生1968年3月27日给毛泽东写信说：“中联部代中央起草的对缅共武装斗争二十周年的贺电，这个稿子我看过，而且经我批发送审的，我有责任。”“读了主席对电文的修改和严肃的批语，我深自遣责，没有坚决贯彻执行主席多次的教导，又一次犯了错误，这是不能充许的。希望主席予以严厉的批评。今后起草对外文件定当严加注意，坚决遵照主席的指示办事。”本篇一写在康生的这封检讨信上；本篇二写在这封检讨信的信封上。"},{"type":"paragraph","text":"[2]伯达，即陈伯达，当时任中共中央政治局常委、中央文化革命小组组长。文元，即姚文元，当时任中共中央文化革命小组组员。毛泽东全集第五十卷"},{"type":"paragraph","text":"送林、周、伯达、文元同志亲启。退康生。"},{"type":"paragraph","text":"[1]林，指林彪，在中共八届十一中全会上继续当选为中央政治局常委，不久被称中央副主席。周，指周恩来。"}],"authors":["毛泽东"],"dates":[{"year":1968,"month":3,"day":28}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":190,"page_end":191},"tags":[{"name":"康生","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"27706400e3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
