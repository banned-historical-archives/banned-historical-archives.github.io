script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji26","name":"毛泽东全集第26卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji26.pdf"],"article":{"title":"复李济深等五十六人电","alias":"","parts":[{"type":"paragraph","text":"复李济深等五十六人电！"},{"type":"paragraph","text":"（1949年2月2日）李济深、沈钧儒、马叙伦、郭沫若、谭平山、彭泽民、章伯钧、李锡九、蔡廷锴、周建人、符定一、章乃器、李德全、胡愈之、沙千里、茅盾、朱学范、陈其尤、黄振声、朱蕴山、邓初民、翦伯赞、王绍鳌、吴晗、许广平、楚图南、丘哲、韩兆鹦、许宝驹、田汉、洪深、侯外庐、沈兹九、宦乡、杨刚、曹孟君、李文宜、罗叔章、刘清扬、张曼筠、施复亮、孙起孟、严信民、李民欣、梅龚彬、沈志远、周颖、安娥、吴茂荪、何惧、林一元、赖亚力、孔德证、袁震、沈强、王蕴如诸先生共鉴："},{"type":"paragraph","text":"二月一日来电读悉，极感盛意。中华民族与中国人民的解放斗争，百余年来，前仆后继。无数先烈的鲜血，洒遍了锦绣山河；亿兆后起的人民，表现了英雄气概。此次人民解放战争之所以胜利，是由于全国人民不畏强御，团结奋斗，各民主党派各人民团体一致奋起，相与协力，从而使人民解放军获得各方面的援助，使人民的敌人完全陷于孤立，胜负之数，因以判明。现在残敌尚存，诡谋时"},{"type":"paragraph","text":"[1]李济深、沈钧儒、马叙伦、郭沫若等56人，是当时已到达解放区的各民主党派、各人民团体、文化艺术界、新闻界、社会科学界以及其他方面有影响的爱国民主人士。他们在1949年2月1日联名致电毛泽东、朱德等，作。求喘息谓为求和平，待外援名曰待谈判。口诵八条\"，手庇战犯，眼望美国，脚向广州。欲求人民解放斗争获得最后胜利，必须全国一切民主力量同德同心，再接再厉，为真正民主的和平而奋斗。诸先生长期为民主事业而努力，现在到达解放区，必能使建设新中国的共同事业获得迅速的成功。特电布复，敬表欢迎。"},{"type":"paragraph","text":"毛泽东朱德"},{"type":"paragraph","text":"二月二日"},{"type":"paragraph","text":"[1]八条，指中共中央主席毛泽东1949年1月14日在《关于时局的声明》中提出的同国民党政府进行和平谈判的八项条件。当时国民党政府已口"}],"authors":["毛泽东"],"dates":[{"year":1949,"month":2,"day":2}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":97,"page_end":98},"tags":[{"name":"毛泽东","type":"人物"},{"name":"朱德","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"60fa920c57"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
