art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"接见全军青年工作等四个会议代表罗总长对出席全军青年工作会议的代表讲了话，指出青年工作要着重抓好两件事：一是组织青年学习毛主席著作；二是大力表扬先进，树立标兵，使青年迅速成长为又红又专的接班人；","authors":[],"parts":[{"type":"paragraph","text":"新华社十五日讯 贺龙元帅和罗瑞卿大将今天上午接见了出席中国人民解放军青年工作会议、海军第三届文艺会演、海军后勤部四好五好代表会议和海军直属队四好五好代表会议的代表。"},{"type":"paragraph","text":"接见前，罗瑞卿总参谋长对出席全军青年工作会议的代表讲了话。他说，这几年来，军队青年工作执行了军委和林彪元帅的指示，成绩不小，培养了大批五好战士以及神枪手、神炮手和技术能手。军队政治工作做得好，其中就有青年工作的一份。"},{"type":"paragraph","text":"罗瑞卿大将勉励到会代表们，今后要把军队的青年工作做得更好一些，更活一些。他说，军队里绝大多数是青年，我们做的工作实际上是青年工作。军队政治工作做得好不好，出色不出色，从某种意义上讲，青年工作担负着特殊的责任。"},{"type":"paragraph","text":"罗瑞卿大将指出青年工作要着重抓好两件事：一是组织青年学习毛主席著作；二是大力表扬先进，树立标兵，使青年战士既有毛泽东思想作指导，又有先进的形象作榜样，迅速成长为又红又专的接班人。"},{"type":"paragraph","text":"今天接见时在场的，有彭绍辉上将、张爱萍上将、杨成武上将、李天佑上将、王新亭上将、李聚奎上将、苏振华海军上将、王宏坤海军上将、刘志坚中将、刘道生海军中将、李作鹏海军中将等。"}],"alias":""},"tags":[{"name":"罗瑞卿","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"575bb95bf1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
