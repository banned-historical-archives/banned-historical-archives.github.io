rt":8,"page_end":8,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"韩国法院向一日本极右翼政客发布拘捕令","authors":["张青"],"parts":[{"type":"paragraph","text":"据新华社首尔6月30日电（记者张青）据韩联社30日报道，韩国一家法院当天向涉嫌损害“慰安妇”受害者名誉的日本极右翼政客铃木信行发布了拘捕令。"},{"type":"paragraph","text":"韩国首尔中央地方法院当天表示，铃木信行此前长时间缺席法院的庭审，故向其发布了拘捕令，拘捕令有效期为一年。在此期间，韩国检察机关将通过国际司法合作掌握居住在日本的铃木的行踪，只要他一进入韩国立马对其实施逮捕。此外，法院还决定委托检察机关对铃木进行通缉。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6656d8b9de"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
