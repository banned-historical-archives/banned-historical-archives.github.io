报告”（概要）","authors":[],"dates":[{"year":1970,"month":6,"day":26}],"is_range_date":false,"parts":[{"text":"中共中央转发“北京大学、清华大学关于应届毕业生的情况报告”（概要）","type":"title"},{"text":"1970年6月26日，中共中央转发《北京大学清华大学关于应届毕业生的情况报告》。中央指示要求各地参照这个报告把应届毕业生的工作做好。《报告》介绍了北京大学、清华大学通过办毛泽东思想学习班对毕业生进行鉴定工作的做法，提出对少数犯有严重错误的学生，要重在教育。对“可以教育好的子女”要帮助他们继续做到“划、清、站”。对极少数属于敌我矛盾的学生，要“批”字当头，立足于“拉”，执行“发动群众，认真监督，就地改造”的方针。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"59dbd675d6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
