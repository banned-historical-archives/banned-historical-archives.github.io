tart":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"用毛主席建军思想教育新干部","authors":[],"parts":[{"type":"paragraph","text":"四连党支部经常组织新干部活学活用毛主席关于无产阶级专政下继续革命的伟大理论，使新干部迅速成长，担负起巩固无产阶级专政的光荣使命"},{"type":"paragraph","text":"本报讯 七○二一部队四连党支部，用毛主席的建军思想教育新干部，使新干部迅速成长，担负起加强战备、巩固无产阶级专政的光荣使命。"},{"type":"paragraph","text":"这个连队今年提拔了一些新干部，党支部及时举办了毛泽东思想学习班，组织他们反复学习了古田会议决议和一九六○年军委扩大会议决议，学习了毛主席和林副主席的有关指示，狠批了反革命修正主义分子彭德怀、罗瑞卿鼓吹的“军事第一”等谬论，还请老干部讲述我军几十年来靠政治建军、靠政治打胜仗的光荣传统，使新干部认识到，毛主席的建军思想，是我军从小到大，从弱到强，战胜一切敌人的法宝，也是无产阶级专政下我军永不变色，争取更大胜利的重要保证。大家深有体会地说：“我们新干部，应该在头脑里深扎毛主席建军思想的根子。”"},{"type":"paragraph","text":"裾彰�主席关于〖JZ/加重〗“一个路线，一种观点，要经常讲，反复讲”"},{"type":"paragraph","text":"党支部认为，毛主席的建军思想代表着无产阶级和广大劳动人民的根本利益，只有一心为公、具有无产阶级世界观的人，才能领会深刻、贯彻自觉。因此，党支部经常组织新干部活学活用毛主席关于无产阶级专政下继续革命的理论和毛主席的光辉著作“老三篇”，引导他们斗私批修，搞好思想革命化。在时间紧、任务重的时候，党支部就组织新干部学习林副主席关于突出政治的指示，防止只抓业务、忽视政治的倾向；在连队发生问题，干部容易产生急躁情绪、不能坚持耐心说服教育的时候，党支部就组织新干部学习林副主席关于四个第一的指示，搞好管理教育工作；在连队形势好，新干部容易忽视抓活思想的时候，党支部就组织他们学习毛主席关于“掌握思想教育，是团结全党进行伟大政治斗争的中心环节”的教导，狠斗“满”字、“骄”字。由于党支部经常组织新干部斗私批修，大大提高了他们贯彻执行毛主席建军思想的自觉性，更好地发挥了新干部在全面建设连队中的作用。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1f98149ef9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
