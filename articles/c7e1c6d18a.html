ear":1955,"month":7,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"华东体育学院院长　吴蕴瑞"},{"type":"paragraph","text":"我完全拥护全国人民代表大会常务委员会批准依法逮捕审判反革命分子潘汉年、胡风的决定。"},{"type":"paragraph","text":"现在台湾还没有解放，我们与帝国主义的斗争还是十分尖锐，潘汉年、胡风这一批反革命分子竟钻进了我们的革命队伍里来，并窃取了党和政府的重要职务，准备为帝国主义作内应，破坏我们的社会主义建设，破坏我们的革命事业，这种毒辣的手段，使我们全国人民无法容忍。以往我们总认为通过“镇压反革命”和“三反”“五反”，就此可以天下太平了，从潘汉年、胡风反革命事件使我们认识到这种天真的书生气和右倾麻痹思想，是要不得的。因此，我决定要认真的学习，提高政治觉悟，加强革命警惕性，紧密地团结在党的周围，和一切暗藏的反革命分子作坚决的斗争!"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c7e1c6d18a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
