讲话录音的通知","authors":[],"dates":[{"year":1967,"month":4,"day":7}],"is_range_date":false,"parts":[{"text":"中共中央、国务院、中央军委、中央文革小组关于播送林彪同志讲话通知","type":"title"},{"text":"我们伟大领袖毛主席指示，林彪同志一九六七年三月二十日讲话录音，应向中国人民解放军人员和全国红卫兵播放。","type":"paragraph"},{"text":"林彪同志的讲话，是一个极其重要的马克思列宁主义、毛泽东思想的报告，对指导当前的无产阶级文化大革命运动，指导人民解放军正确地介入地方无产阶级文化大革命，推动无产阶级革命派在两条路线的斗争中进一步取得胜利，具有非常重大的意义。","type":"paragraph"},{"text":"各军区党委，各级党委、各省、市革命委员会，各军事管制委员会，各革命群众组织必须认真组织大家学习林彪同志讲话，坚决贯彻执行。","type":"paragraph"},{"text":" 中共中央国 务 院中共中央军委中央文革小组一九六七年四月七日","type":"paragraph"}],"comments":[],"origin":"根据《中共中央文件汇编，1966.5-1968.5 [内部参考]》，1968年5月出版，编印者不明","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"林彪","type":"人物"},{"name":"中央文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"发言"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b93cb87904"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
