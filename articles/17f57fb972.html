:[{"year":1994,"month":3,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社耶路撒冷3月13日电　以色列政府今天宣布保卫犹太人联盟和卡哈内·哈依两个犹太人极右组织为恐怖主义组织，禁止这两个组织活动。"},{"type":"paragraph","text":"据以色列电台广播说，以色列内阁今天下午召开会议时一致作出了这一史无前例的决定，以满足巴解组织在希布伦惨案发生后提出的以色列应采取具体措施保护被占领土巴勒斯坦人安全的要求。但是，这两个极右组织的成员声称将就取缔其组织的任何企图向以色列最高法院提出上诉。"},{"type":"paragraph","text":"现为议员的前总理沙米尔表示他支持取缔这两个极右组织，并说以色列不需要这种组织。反对党佐梅特党也表示支持政府的决定。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"17f57fb972"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
