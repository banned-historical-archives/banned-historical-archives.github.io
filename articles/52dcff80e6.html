<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"全国工商界青年积极分子大会  致毛主席的保证书","authors":[],"dates":[{"year":1956,"month":3,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"全国工商界青年积极分子大会"},{"type":"paragraph","text":"致毛主席的保证书敬爱的毛主席："},{"type":"paragraph","text":"我们来自祖国各地的800多个工商界青年积极分子，受了全体工商界青年的委托，怀着无限感激和兴奋的心情，向您——我们最敬爱的领袖和导师，致崇高的敬礼！"},{"type":"paragraph","text":"我们只有在中国共产党和您的教导下，才懂得了资本主义腐朽的本质和社会发展的必然趋势，而选择了使全国人民共同富裕的社会主义康庄大道。"},{"type":"paragraph","text":"我们中间的一些人曾经悔恨自己的出身不好，看不清前途。只有在党和您的教导下，我们才认识到，只要我们能够自觉地掌握自己的命运，坚决接受社会主义改造，就能够有光明的前途。"},{"type":"paragraph","text":"我们一向都是过着不劳而获的生活。只有在党和您的教导下，我们才认识到剥削的可耻，和劳动的无上光荣，而下定决心把自己从剥削者改造成为光荣的劳动者。"},{"type":"paragraph","text":"是党和您把我们从旧制度旧生活的泥坑里拯救出来，并给我们指出了光明的未来。"},{"type":"paragraph","text":"是党和您引导我们走上了全新的生活道路，教导我们改造成为给社会创造财富的新人。"},{"type":"paragraph","text":"是党和您无微不至地关怀和爱护着我们，对我们任何一点微小的进步和贡献，都给予鼓励和支持。"},{"type":"paragraph","text":"纵然有千言万语，也说不完我们内心对您的感激。把千言万语变成一句话，就是：我们要永远记住您的教导，永远跟着共产党走。"},{"type":"paragraph","text":"我们向您保证：我们一定和广大的职工一起，积极做好企业的改造工作，服从公股代表的领导，接受工人的监督和帮助，钻研业务学习技术，改进经营管理，使我们企业的生产和经营做到又多、又快、又好、又省。"},{"type":"paragraph","text":"我们向您保证：我们一定要加强政治学习，改造思想，提高觉悟，踏踏实实地工作，勤勤恳恳地劳动，争取尽快地走进工人阶级的光荣行列。"},{"type":"paragraph","text":"我们向您保证：我们一定要戒骄戒躁，以身作则，影响和推动别人积极接受社会主义改造。我们不但要做一个社会主义改造的积极分子，而且要争取成为一个社会主义建设的积极分子。"},{"type":"paragraph","text":"敬爱的毛主席，我们有勇气有信心和其他各界青年一样做社会主义的接班人。我们有多少力量就贡献多少力量。我们一定和全国人民全国青年一道，为把我国建设成为一个繁荣昌盛的社会主义国家而奋斗到底！"},{"type":"paragraph","text":"我们敬祝您：身体健康，万寿无疆！"},{"type":"paragraph","text":"全国工商界青年积极分子大会"},{"type":"paragraph","text":"1956年2月29日"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"52dcff80e6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
