ical-archives/banned-historical-archives8/main/maoquanji15.pdf"],"article":{"title":"在中共中央政治局会议上的讲话","alias":"","parts":[{"type":"paragraph","text":"在中共中央政治局会议上的讲话！"},{"type":"paragraph","text":"（1940年9月11日）"},{"type":"paragraph","text":"应补充现在中国处在大事变的前夜。目前时局趋势有三个方向，一是维持现状，使抗战有利于大资产阶级；二是进步，在不损害大资产阶级利益前提下，对中产阶级和小资产阶级作部分的让步；三是投降，在重庆失守后中国将变为南北朝，会产生中国的贝当式的投降政府与汪精卫合流。我们的方针，是团结与争取进步派、中间派，分化顽固派，争取可能变化的顽固派，反对投降派，以争取时局的初步好转，即亲苏、和共、政治改良的实现，再争取时局的彻底好转，即抗日统一战线政权的建立。同时，我们必须在政治上、军事上、思想上、组织上准备可能到来的突然事变，使我们在任何可能变化条件下都能应付。"}],"authors":["毛泽东"],"dates":[{"year":1940,"month":9,"day":11}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":133,"page_end":133},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"70cba1eb3f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
