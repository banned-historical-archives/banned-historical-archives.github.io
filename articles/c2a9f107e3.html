ical-archives/banned-historical-archives8/main/maoquanji11.pdf"],"article":{"title":"关于华北我军应坚持统一战线政策的指示","alias":"","parts":[{"type":"paragraph","text":"关于华北我军应坚持统一战线政策的指示"},{"type":"paragraph","text":"（1937年12月17日）朱、彭、任，并告林、聂，贺、肖、关，刘、徐、张，小平、子华，雪枫："},{"type":"paragraph","text":"（甲）必须坚持抗日民族统一战线政策，八路对华北各友军尤其对阎及各县地方政权，地方绅士，必须保持好的友好关系，一切须求合法与统一，减少磨擦，团结，尤其荣臻所在之晋东北地区，事同一律，不应立异，一切须取得阎之同意者须设法取得其同意，其坚不同意者我们应让步。"},{"type":"paragraph","text":"（乙）普西北、普东南、晋西及普南各区方针，照此原则办理。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"[1]即林彪、聂荣臻、贺龙、肖克、关向应、刘伯承、徐向前、张浩、邓小平、程子华、彭雪枫。"},{"type":"paragraph","text":"[2]此处似有掉字。"}],"authors":["毛泽东"],"dates":[{"year":1937,"month":12,"day":17}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":418,"page_end":418},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c2a9f107e3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
