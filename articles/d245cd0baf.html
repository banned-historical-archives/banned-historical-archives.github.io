art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"狠批“四人帮”妄图篡党夺权的罪行","authors":[],"parts":[{"type":"paragraph","text":"本报讯 “济南第二团”的“一等功臣连”——一连指战员，以饱满的革命热情，认真学习马列著作和毛主席著作，揭发批判“四人帮”阴谋篡党夺权的反革命罪行。"},{"type":"paragraph","text":"这个连干部战士激情满怀地说：以华国锋主席为首的党中央忠实继承毛主席遗志，一举粉碎了王洪文、张春桥、江青、姚文元反党集团篡党夺权的罪恶阴谋，取得了伟大的历史性胜利，这对于坚持党的基本路线，巩固无产阶级专政，建设社会主义，防止资本主义复辟，都具有重大的现实意义和深远的历史意义。同时，指战员们也深深认识到，现在“四人帮”反党集团虽然被粉碎了，但斗争并没有结束。我们一定要发扬战争年代勇往直前的战斗精神，乘胜前进，痛打“落水狗”，深入揭发批判“四人帮”的反革命罪行，彻底清除其反革命修正主义路线的毒害和影响，捍卫毛主席的革命路线。"},{"type":"paragraph","text":"为了批深批透“四人帮”篡党夺权的滔天罪行，党支部组织大家认真学习毛主席关于批判“四人帮”的一系列重要指示，学习毛主席提出的“要搞马克思主义，不要搞修正主义；要团结，不要分裂；要光明正大，不要搞阴谋诡计”的三项基本原则，深揭猛批“四人帮”阴谋篡党夺权的反革命罪行。他们分别从政治上、组织上和反革命的手法上，揭露了“四人帮”的大量罪行。大家愤怒地指出：“四人帮”反党集团违背三项基本原则，手段极其卑劣，目的极端反动。他们是党内资产阶级的典型代表，是妄图篡党夺权的资产阶级阴谋家、野心家，是全国人民不共戴天的死敌。我们一定要刻苦学习马列主义、毛泽东思想，努力作战，坚决同“四人帮”斗争到底，不获全胜，决不收兵！"}],"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"name":"夺权","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d245cd0baf"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
