ar":1986,"month":11,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"“资产阶级权利”的误译和误解"},{"type":"paragraph","text":"沈越在《天津社会科学》一九八六年第四期发表文章指出，按劳分配中体现的等量劳动相交换的平等权利，在马恩著作的中文版中，一直被误译为“资产阶级权利”，而按照德文原文，应译为“市民权利”。"},{"type":"paragraph","text":"作者认为，市民的历史同商品经济的历史是一致的。在封建社会中，市民不仅是资产阶级的前身，同时也是无产阶级的前身。从经济身分看，都是商品所有者。到了资本主义社会，存在着双重的经济关系。一方面是市民的一般商品经济关系，一切人包括资产者和无产者都是独立的商品所有者，是权利平等的市民；另一方面是特殊的资本主义经济关系，资产者和无产者存在阶级利益的对立，阶级之间无平等权利可言。在社会主义社会（即马克思在《哥达纲领批判》中说的共产主义第一阶段）中，也存在双重经济关系：一是共产主义经济关系，主要体现在全社会共同占有生产资料上，在这方面没有任何个人权利可言；一是市民经济，主要体现在劳动者对自己的劳动能力拥有"},{"type":"paragraph","text":"“天然特权”，要求在个人消费品的分配上实行等量劳动相交换。马克思指出，这种平等权利按照原则仍然是市民的权利，因为它同商品经济社会中的等量劳动相交换没有性质上的差别。马克思设想的这一阶段已不存在商品经济，所以他才把这种市民权利称为“旧社会的痕迹”。马克思是站在“各尽所能，按需分配”的共产主义高级阶段的角度，才对分配领域中市民经济关系的历史局限性进行了批评，指出“它象一切权利一样是一种不平等的权利”。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"54c5d22782"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
