art":6,"page_end":6,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"巴基斯坦政府首脑电贺邓小平副总理复职","authors":[],"parts":[{"type":"paragraph","text":"新华社一九七七年七月二十七日讯 巴基斯坦政府首脑齐亚·哈克七月二十三日打电报给邓小平副总理，衷心祝贺他恢复副总理和总参谋长职务。电报全文如下："},{"type":"paragraph","text":"北京"},{"type":"paragraph","text":"中华人民共和国国务院副总理邓小平先生阁下"},{"type":"paragraph","text":"阁下："},{"type":"paragraph","text":"我非常愉快地衷心祝贺阁下任中华人民共和国国务院副总理和人民解放军总参谋长。任命阁下承担这些崇高职务是对阁下献身于伟大的中国革命事业并在促进这一事业中作出贡献的确认。"},{"type":"paragraph","text":"我借此机会表示我们的热忱希望，愿巴基斯坦和中国之间传统的亲密友好关系今后继续增进，日益加强。"},{"type":"paragraph","text":"请阁下接受我热烈的个人问候和最良好的祝愿，祝你健康和幸福，并祝兄弟的中国人民继续进步和昌盛。"},{"type":"paragraph","text":"巴基斯坦伊斯兰共和国政府首脑"},{"type":"paragraph","text":"穆罕默德·齐亚·哈克将军"},{"type":"paragraph","text":"一九七七年七月二十三日于拉瓦尔品第"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0294ef045f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
