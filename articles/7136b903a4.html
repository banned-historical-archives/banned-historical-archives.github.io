ical-archives/banned-historical-archives0/main/maoquanji30.pdf"],"article":{"title":"转发北京市委关于召开市协商委员会扩大会议讨论镇反问题的报告的批语","alias":"","parts":[{"type":"paragraph","text":"转发北京市委关于召开市协商委员会扩大会议讨论镇反问题的报告的批语"},{"type":"paragraph","text":"（1951年3月27日）各中央局，并转分局，省委，区党委，大中市委："},{"type":"paragraph","text":"北京的办法很好，请你们均照这样做。你们如何做的，请写报告来。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"三月二十七日"},{"type":"paragraph","text":"[1]指中共北京市委1951年3月20日给中央、华北局的报告中谈到的召开市协商委员会扩大会议讨论镇压反革命问题的做法。报告说，采取有各界代表参加的小型代表会议讨论镇反，是为了便于集中讨论，使各界人民代表了解真实情况与得到充分发言的机会，并激起他们对反革命的仇恨。会议的报告要着重列举反革命罪犯的罪行，把典型案卷和典型罪犯的事实集中起来报告，这样虽然道理讲得少，却具有无可争辩的说服力。会上将反革命罪犯的罪证加以陈列展览，效果也很好。"}],"authors":["毛泽东"],"dates":[{"year":1951,"month":3,"day":27}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":189,"page_end":189},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7136b903a4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
