应用的先进的汽车底量综合办验台。他们说，我们就是要——遵照毛主席教导走自己的路","authors":[],"dates":[{"year":1968,"month":8,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"天津人民汽车三厂的一些汽车司机、汽车修理工人同工人出身的工程技术人员和革命青年技术员相结合，在驻厂人民解放军和厂革委会的支持帮助下，高举毛泽东思想伟大红旗，从资产阶级反动技术“权威”手中夺回了科学技术大权，在这个一向只能修理和保养汽车的工厂里，试制成功了检验汽车制动性能和底盘输出功率的汽车底盘综合检验台。"},{"type":"paragraph","text":"这种新设备的试制刚一开始，就出现了尖锐的两条路线斗争。斗争集中地表现在:依靠谁来试制，走什么道路。工人们主张由工人和工程技术人员相结合，他们说，我们就是要遵照毛主席关于自力更生的教导，走自己的路，试制适合我国应用的先进的汽车底盘综合检验台。但是，党内一小撮走资派和资产阶级反动技术“权威”却推行中国赫鲁晓夫的“专家治厂”、“爬行主义”等反革命修正主义黑货，只依靠那些有工程师等技术头衔的少数人，去生吞活剥地照抄外国书本上的洋教条和外国设备的洋框框，压制广大革命工人和革命青年技术人员的积极性和创造性。他们搞了一年，浪费了国家大量财力和物力，结果一事无成。"},{"type":"paragraph","text":"在史无前例的无产阶级文化大革命运动中，革命职工高举“对反动派造反有理”的大旗，造了党内一小撮走资派和资产阶级反动技术“权威”的反，夺回了科学技术大权，自己组织了三结合的科研小组。他们在整个试制过程中，坚持用毛泽东思想来指导试制工作。他们一边试制，一边开展革命大批判，狠批中国赫鲁晓夫及其在本厂代理人推行“专家治厂”、“爬行主义”等反革命修正主义黑货，以及压制工人革命积极性，对工人实行资产阶级专政的滔天罪行。工人和工人出身的技术人员不仅有丰富的实践经验，更重要的是他们有对伟大领袖毛主席的无限忠心，有对社会主义事业的无限熟爱。在工人、技术人员共同努力下，在交通科学研究院青年技术人员的协助下，终于在今年四月份搞成功。经过三个多月的实际使用考验，证明汽车底盘综合检验台的质量很好，而且检验得更准确。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"天津文革","type":"人物"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2c09bad9fb"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
