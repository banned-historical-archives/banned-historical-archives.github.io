al-archives/banned-historical-archives8/main/maoquanji8.pdf"],"article":{"title":"给杨虎城的信（节录）","alias":"","parts":[{"type":"paragraph","text":"给杨虎城的信（节录）"},{"type":"paragraph","text":"（1935年12月5日）虎臣先生总指挥阁下："},{"type":"paragraph","text":"乃闻阁下之孙、冯两师，亦由陕南向陕北开进，诚不识是何居心！如言保境，则军并无问鼎长安之谋。如言进攻红军，则不计何立中、刘翰东、牛元峰、沈克等之惨败，宁不计唐嗣桐、张汉民之覆辙？如言陕西，则阁下卧榻之侧，耽耽者究是何人？蒋介石四十余团久已深入陕甘，张学良主力近更陆续入陕。邵力子手无寸铁，阁下已为之喘喘（懦懦）不安，倘易之何柱国或张学良手下任何一人，则阁下之绥靖主任，地方权力，当有存乎？冯钦哉已为蒋介石拉去，孙蔚如能保其不为冯钦哉第二乎？如言国家，则今日者，乃亡国灭种之日也。凡属爱国志士，革命军人，应如何泣血椎心，一致奋起，为抗日讨蒋而战。盖日本帝国主义实我民族国家之世仇，而蒋介石则通国人民之公敌。日本而无蒋介石，则吞并华北灭亡中国之诡计不得售，蒋介石而无日本，则其卖国家戮民众祸军队排异已之奸谋不得。是以抗日反蒋，势无偏废。建义旗于国中，申天讨于禹域，驱除强寇，四万万具有同心，诛戮神奸，千百年同兹快举。鄙人等卫国有心，剑履俱奋，行程二万，所为何来，既达三秦，愿求同志。倘得阁下一军，联并进，则河山有幸，气"},{"type":"paragraph","text":"[1]虎臣，即杨虎城。势更雄，减少后顾之优（忧》，增加前军之力。鄙人等更愿联合一切反蒋抗日之人，不问其党派及过去之行为如何，只问今日在民族危机关头是否有抗日讨蒋诚意，凡愿加入抗日讨蒋之联合战线者，鄙人等无不乐与提携，共组抗日联军，并设国防政府，主持抗日讨蒋大计。此政府应有适合民心统一意志之十大纲领，具见十二月一日苏维埃中央政府与革命军事委员会所发宣言。如荷同意，即祈派遣代表，前来苏区，商洽一切。重关百二，谁云秦塞无人，故国三千，惨矣燕云在望。亡国奴之境遇，人所不甘，阶下囚之前途，避之为上。冰霜匝地，勉致片言，风雨同舟，愿闻明教。专此布臆。"},{"type":"paragraph","text":"顺颂勋祺。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"彭德怀一九三五年十二月五号"}],"authors":["毛泽东"],"dates":[{"year":1935,"month":12,"day":5}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":102,"page_end":103},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"de2612ab04"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
