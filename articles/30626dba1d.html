art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席为我们树立了伟大革命榜样中国努力进行文化大革命根除资产阶级残余影响","authors":[],"parts":[{"type":"paragraph","text":"加拿大“进步工人运动”为纪念中国共产党成立四十五周年，在它的机关刊物《进步工人》八月号上发表一篇声明说，中国共产党和毛泽东主席对“马克思列宁主义理论作出的杰出贡献”对世界“有着普遍的意义和适用性”，“中国共产党和毛泽东主席为我们树立了伟大的革命榜样”。"},{"type":"paragraph","text":"声明在赞扬目前在中国进行的社会主义文化大革命时说：在保卫革命胜利方面，革命干部一时一刻没有放松过警惕。甚至在今天，在取得政权很久以后，中国人民在他们的伟大和久经考验的共产党的领导下，正在努力致力于进行社会主义文化大革命，根除资产阶级的残余影响，清除混入党内的修正主义分子。"},{"type":"paragraph","text":"声明最后说：“加拿大’进步工人运动’和《进步工人》编辑部同中国人民和世界各国马克思列宁主义者一起，欢庆这个节日，并深深感谢中国共产党和毛泽东主席为我们树立了伟大的革命榜样。我们向光荣的中国共产党表示革命的和团结的祝贺。中国共产党和毛泽东主席万岁！社会主义文化大革命万岁！”"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"30626dba1d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
