<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"词六首","authors":["毛泽东"],"dates":[{"year":1962,"month":5,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"词六首"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"这六首词，是一九二九——一九三一年在马背上哼成的，通忘记了。《人民文学》编辑部的同志们搜集起来寄给了我，要求发表。略加修改，因以付之。　一九六二年四月廿七日"},{"type":"paragraph","text":"清平乐"},{"type":"paragraph","text":"风云突变，军阀重开战。洒向人间都是怨，一枕黄粱再现。　红旗跃过汀江，直下龙岩上杭。收拾金瓯一片，分田分地真忙。"},{"type":"paragraph","text":"采桑子"},{"type":"paragraph","text":"人生易老天难老，岁岁重阳。今又重阳，战地黄花分外香。　一年一度秋风劲，不似春光。胜似春光，寥廓江天万里霜。"},{"type":"paragraph","text":"减字木兰花"},{"type":"paragraph","text":"漫天皆白，雪里行军无翠柏。头上高山，风卷红旗过大关。　此行何去，赣江风雪迷漫处。命令昨颁，十万工农下吉安。"},{"type":"paragraph","text":"蝶恋花"},{"type":"paragraph","text":"六月天兵征腐恶，万丈长缨要把鲲鹏缚。赣水那边红一角，偏师借重黄公略。　百万工农齐踊跃，席卷江西直捣湘和鄂。国际悲歌歌一曲，狂飙为我从天落。"},{"type":"paragraph","text":"渔家傲"},{"type":"paragraph","text":"万木霜天红烂漫，天兵怒气冲霄汉。雾满龙冈千嶂暗，齐声唤，前头捉了张辉瓒。　二十万军重入赣，风烟滚滚来天半。唤起工农千百万，同心干，不周山下红旗乱。*"},{"type":"paragraph","text":"渔家傲"},{"type":"paragraph","text":"白云山头云欲立，白云山下呼声急。枯木朽株齐努力，枪林逼，飞将军自重霄入。　七百里驱十五日，赣水苍茫闽山碧。横扫千军如卷席，有人泣，为营步步嗟何及！"},{"type":"paragraph","text":"*　关于共工头触不周山的故事"},{"type":"paragraph","text":"《淮南子·天文训》：“昔者共工与颛顼争为帝，怒而触不周之山，天柱折，地维绝。天倾西北，故日月星辰移焉；地不满东南，故水潦尘埃归焉。”"},{"type":"paragraph","text":"《国语·周语》：“昔共工弃此道也，虞于湛乐，淫失其身，欲壅防百川，堕高堙庳，以害天下。皇天弗福，庶民弗助，祸乱并兴，共工用灭。”（三国时吴国韦昭注：“贾侍中（按指后汉贾逵）云：共工，诸侯，炎帝之后，姜姓也。颛顼氏衰，共工氏侵陵诸侯，与高辛氏争而王也。”）"},{"type":"paragraph","text":"《史记》司马贞补《三皇本纪》：“当其（按指女娲）末年也，诸侯有共工氏，任智刑以强，霸而不王，以水乘木，乃与祝融战，不胜而怒，乃头触不周山崩，天柱折，地维缺。”"},{"type":"paragraph","text":"毛按：诸说不同。我取《淮南子·天文训》，共工是胜利的英雄。你看，“怒而触不周之山，天柱折，地维绝。天倾西北，故日月星辰移焉；地不满东南，故水潦尘埃归焉”。他死了没有呢？没有说，因而没有死，共工是确实胜利了。"},{"type":"paragraph","text":"〔原载《人民文学》1962年5月号〕"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1a91caec46"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
