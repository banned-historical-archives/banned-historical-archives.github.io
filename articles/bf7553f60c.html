script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"美国一部分资产阶级报纸和英国“雷诺新闻”  不满李承晚破坏朝鲜停战的挑衅行动","authors":[],"dates":[{"year":1953,"month":6,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"美国一部分资产阶级报纸和英国“雷诺新闻”"},{"type":"paragraph","text":"不满李承晚破坏朝鲜停战的挑衅行动"},{"type":"paragraph","text":"【新华社二十九日讯】李承晚集团在美方纵容下所采取的破坏停战的行动，甚至在美国一部分资产阶级舆论中间也引起不满。"},{"type":"paragraph","text":"华盛顿“明星报”发表的评论说：美国应当“强迫南朝鲜接受停战条件，即使这意味着撤换李（承晚）总统也在所不惜”。"},{"type":"paragraph","text":"“芝加哥太阳报”说，李承晚“已经变成了出卖和平事业的国际叛徒”。"},{"type":"paragraph","text":"“基督教科学箴言报”在评论中承认：“李承晚在亚洲人心目中是不得人心的。这也许是令人不愉快的，但这是十分现实的。我们暂且不论是非，他的反动趋势和专横手段使他和蒋介石一样在千百万亚洲人的心目中，成为威信扫地的旧秩序的象征。”该报指出：大多数亚洲人“已经要求有力地继续进行停战的努力”。"},{"type":"paragraph","text":"【新华社二十九日讯】伦敦消息：英国“雷诺新闻”斥责李承晚破坏停战。"},{"type":"paragraph","text":"“雷诺新闻”二十八日的评论说：李承晚“是世界上最危险的人”，是“旧时代遗留下来的老头子，时代的错误，中世纪的暴君”。该报说，如果把李承晚加以保护性质的看管这一着行不通的话，联合国可以揭穿他是虚声恫吓，并且声明，如果他照他所威胁的那样碰一下任何一个印度士兵或在任何方面有违反停战协定的行为，就不给予他一颗子弹、一滴汽油的援助。该报问道：“我们敢说李承晚不是虚声恫吓吗？我们敢于使人民受到屠杀、受到战争威胁吗？”“我们敢于使整个世界受到一场从朝鲜开始的新的更加罪恶的战争的威胁，任凭李承晚与麦卡锡之流去专横地决定战略吗？”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bf7553f60c"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
