art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"狠批林彪诬蔑文化大革命的反动谬论小石柏大队干部和社员决心为巩固和发展文化大革命成果做出更大贡献","authors":[],"parts":[{"type":"paragraph","text":"据新华社石家庄一九七四年四月九日电 河北省南宫县小石柏公社小石柏大队的干部和社员，在大队党支部领导下，以无产阶级文化大革命以来全大队社会主义事业蓬勃发展的事实，狠批林彪效法孔老二“克己复礼”，恶毒攻击文化大革命，妄图复辟资本主义的罪行，决心更自觉地贯彻执行毛主席的革命路线，为巩固和发展无产阶级文化大革命的伟大成果做出更大贡献。"},{"type":"paragraph","text":"批林批孔运动展开以后，小石柏大队党支部带领群众狠批林彪“克己复礼”的反动纲领。他们针对林彪一伙对无产阶级文化大革命的恶毒攻击，组织干部、社员重温毛主席在无产阶级文化大革命中的一系列重要指示，回顾文化大革命以来全大队的巨大变化，用事实狠狠回击林彪一伙的无耻谰言。这个大队的广大革命群众。在文化大革命中深入批判刘少奇的修正主义路线，提高了阶级斗争、路线斗争和无产阶级专政下继续革命的觉悟，全大队有十九名优秀分子入了党，五十六名青年加入了共青团，老干部得到了锻炼，新干部茁壮成长，大队、生产队领导班子都实现了老、中、青三结合。几年来，由于大队、生产队领导班子以党的基本路线为纲，带领群众艰苦奋斗学大寨，全大队农田基本建设实现了排、灌、路、林四配套，一九七三年全大队粮食亩产达到六百多斤，比文化大革命前的一九六五年翻了一番。谈起这些变化，全大队干部、社员兴高采烈。老贫农刘茂福说，林彪一伙恶毒攻击和诽谤文化大革命，只能说明他们是人民群众的最凶恶的敌人。"},{"type":"paragraph","text":"在这个大队插队落户的下乡知识青年，也用自己接受贫下中农再教育的收获，狠批林彪一伙诬蔑知识青年上山下乡是“变相劳改”的反动谬论。知识青年刘宝贵回顾了自己在农村锻炼成长的过程后说：毛主席为我们知识青年指引的与工农相结合的道路，是我们实现思想革命化，把我们锻炼成为无产阶级革命事业接班人的光明大道。我们是一九六九年由天津市到达小石柏大队插队落户的。几年来经过党的培养和贫下中农的教育，现在我们十人中，已有五名参加了共青团，三名被贫下中农推选为生产队干部，一名当了民办教师。实践使我们认识到，我们需要在农村三大革命运动中锻炼成长，农村是我们有志于干社会主义革命的知识青年大有作为的地方。林彪一伙越是诬蔑攻击知识青年上山下乡，我们越要在农村扎根，为建设社会主义新农村而战斗。"},{"type":"paragraph","text":"小石柏大队的干部、社员通过批判林彪一伙攻击诬蔑无产阶级文化大革命的反动谬论，进一步焕发了用实际行动巩固和发展文化大革命伟大成果的社会主义积极性。他们在深入批判林彪“克己复礼”的反动纲领的同时，正在抓紧时机开展春耕，全大队百分之九十五以上的劳动力已经投入春耕生产。"}],"alias":""},"tags":[{"name":"林彪","type":"人物"},{"name":"批林批孔","type":"主题/事件"},{"name":"批林批孔","type":"主题/事件"},{"name":"上山下乡","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ccaed319ae"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
