torical-archives/banned-historical-archives8/main/maoquanji7-2.pdf"],"article":{"title":"关于夏跳战役后行动问题的报告","alias":"","parts":[{"type":"paragraph","text":"关于夏洮战役后行动问题的报告！"},{"type":"paragraph","text":"（1935年8月20日）"},{"type":"paragraph","text":"我们的行动方向，一是向东（陕西），一是向西（青海、新疆)。红军主力应向东，向陕、甘边界发展，不应向黄河以西。目前我们的根据地应以洮河流域为基础，将来向东发展，后方移至甘肃东北与陕西交界地区。向东还是向西是一个关键问题，应采取积极向东发展的方针。夏洮战役应采取由包座至岷州?的路线，可集中三个军，甚至全部集中走这条路线。左路军应向右路军靠拢。阿坝要迅速打一下。应坚持向东打，不应以一些困难转而向西。"},{"type":"paragraph","text":"[1]1935年8月20日，中共中央政治局在毛儿盖召开会议，毛泽东在会议上作关于夏洮逃战役后行动问题的报告。这是报告的一部分。"}],"authors":["毛泽东"],"dates":[{"year":1935,"month":8,"day":20}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":215,"page_end":215},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7993d41e59"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
