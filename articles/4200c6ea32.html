<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"毛主席“抓革命，促生产”伟大方针的新胜利全国早稻喜庆丰收主要产区早稻总产量和单位面积产量都比去年有较大幅度的增长","authors":[],"dates":[{"year":1967,"month":8,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京十一日电　在无产阶级文化大革命节节胜利，革命的大批判运动滚滚向前的凯歌声中，生产战线又传来了振奋人心的喜讯:今年全国早稻又获丰收。"},{"type":"paragraph","text":"我国早稻主要产区分布在五岭南北、长江两岸和东南沿海的十二个省、市、自治区。目前，这些地区的早稻已基本上收割完毕。收割的结果表明，除个别自然灾害较重的地区外，今年早稻的收成普遍比去年好。主要产区的广东、广西、福建、湖北、湖南、浙江、上海七个省、市、自治区，早稻的总产量和单位面积产量都比去年有较大幅度的增长。"},{"type":"paragraph","text":"今年早稻获得丰收，是各地农村人民公社的广大贫下中农和革命干部高举毛泽东思想伟大红旗，贯彻执行毛主席“抓革命，促生产”伟大方针所取得的新胜利。这个胜利又一次证明:在毛泽东思想指引下的无产阶级文化大革命，是发展社会生产力的无比强大的推动力。"},{"type":"paragraph","text":"当早稻备耕工作正在紧张进行的时候，党内一小撮走资本主义道路当权派，顽固地推行资产阶级反动路线，大刮反革命经济主义黑风，妄图以此来对抗无产阶级文化大革命和破坏春耕生产。正在这个时候，《中共中央给全国农村人民公社贫下中农和各级干部的信》发表了。广大贫下中农和各级干部热烈响应毛主席和党中央“抓革命，促生产”的伟大号召，人民解放军也按照毛主席和党中央的指示，派出大批人员下乡支援农业。在毛主席和党中央伟大号召的鼓舞下，在解放军的支持、帮助下，广大农村人民公社社员和农村革命干部意气风发地狠抓革命，猛促生产，彻底粉碎了党内一小撮走资本主义道路当权派对抗无产阶级文化大革命和破坏春耕生产的阴谋，并且促使各地的早稻栽插面积一般都比去年有所扩大。各地农村人民公社社员和农村革命干部还认真细致地开展了以追肥为中心的田间管理活动。据了解，不少公社、生产队追肥的数量和质量都超过去年，治虫、除草工作也比去年抓得紧。今年早稻长势好，田间管理工作精细是一个很重要的因素。"},{"type":"paragraph","text":"为把丰收的果实全部拿到手，并保证适时栽插晚稻，各早稻产区普遍重视了抢收早稻和抢插晚稻的组织领导工作，广大农村人民公社社员和农村革命干部在抢收、抢插工作中坚持活学活用毛主席著作，坚持抓革命、促生产，使不少社、队抢收、抢插工作不但进度较快，质量也较好。很多社、队还把收、管、吃三项工作紧紧抓好，做到颗粒归仓、妥善保管和安排好社员家庭计划用粮，保证了丰产丰收。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4200c6ea32"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
