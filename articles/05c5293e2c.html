ical-archives/banned-historical-archives0/main/maoquanji46.pdf"],"article":{"title":"关于编诗词集给田家英的信","alias":"","parts":[{"type":"paragraph","text":"关于编诗词集给田家英的信"},{"type":"paragraph","text":"（1963年12月5日、6日）田家英同志："},{"type":"paragraph","text":"“钟山风雨”一诗，似可加入诗词集，请你在会上谈一下，酌定。"},{"type":"paragraph","text":"“小小寰球”一词似可收入集中，亦请同志们一议。其余反修诗、词，除个别可收入外，都宜缓发。《八连颂》另印，在内部流传，不入集中。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十二月五日[1]田家英，当时任中共中央政治研究室副主任、毛泽东的秘书。[2]指毛泽东1949年4月写的《七律·人民解放军占领南京》。"},{"type":"paragraph","text":"[3]指当时正在编辑的毛泽东诗词集，人民文学出版社1963年12月出版，书名为《毛主席诗词》。"},{"type":"paragraph","text":"[4]指毛泽东1963年1月9日写的《满江红·和郭沫若同志》。"},{"type":"paragraph","text":"[5]《八连颂》，是毛泽东1963年8月1日写的赞颂上海南京路上好八连的杂言诗。"},{"type":"paragraph","text":"关于编诗词集给田家英的信田家英同志："},{"type":"paragraph","text":"今天或明天开天（会）讨论诗词问题，我现再有所删节改正，请康生\"同志主持，提出意见，交我酌定为盼！"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十二月六日五时"},{"type":"paragraph","text":"[1]康生，当时任中共中央政治局候补委员、中央书记处书记、中央文教小组副组长。"}],"authors":["毛泽东"],"dates":[{"year":1963,"month":12,"day":5},{"year":1963,"month":12,"day":6}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":134,"page_end":135},"tags":[{"name":"康生","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"05c5293e2c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
