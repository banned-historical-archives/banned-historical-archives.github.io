art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席热爱我热爱 毛主席支持我支持 毛主席指示我照办 毛主席挥手我前进——记“支左爱民模范排”","authors":[],"parts":[{"type":"paragraph","text":"（照片一）“支左爱民模范排”，在无产阶级文化大革命中，对毛主席赤胆忠心，跟毛主席寸步不离。在保卫无产阶级文化大革命，保卫和支持无产阶级革命派，彻底摧毁以中国赫鲁晓夫为首的资产阶级司令部的斗争中，建立了不朽的功勋。这是“支左爱民模范排”在赣江激流中抢救红卫兵和革命群众的八名战士和被抢救的部分红卫兵小将在一起。"},{"type":"paragraph","text":"（照片二）“支左爱民模范排”对伟大统帅毛主席和毛泽东思想无限信仰、无限忠诚。他们把大树特树毛主席和毛泽东思想的绝对权威，看作是时代赋予他们的极其光荣而伟大的任务。这是李文忠同志（左）生前和他的战友一起学习毛主席著作。"},{"type":"paragraph","text":"（照片三）“支左爱民模范排”的战士和江西棉纺织印染厂的革命职工一起，以毛泽东思想为武器，开展革命大批判。他们决心从政治上、思想上、理论上把以中国赫鲁晓夫为首的党内一小撮走资派彻底批倒、批臭！"},{"type":"paragraph","text":"（照片四）“支左爱民模范排”的同志立场最坚定，旗帜最鲜明，走到那里，就在那里坚定地支持革命左派，就组织那里的革命群众学习毛主席著作，就同那里的革命群众一起抓革命，促生产。他们走过那里红一线，住到那里红一片。这是“支左爱民模范排”的战士在蒋巷公社帮助秋收。"},{"type":"paragraph","text":"（照片五）生为毛主席战斗 死为毛主席献身"},{"type":"paragraph","text":"为保卫毛主席的无产阶级革命路线，为抢救红卫兵小将和革命群众，在江西赣江壮烈献身的六连四排的三位毛主席好战士：共产党员、四排排长李文忠（上图）；共产党员、副班长李从全（左图）；共产党员、战士陈佃奎（右图）。他们实现了生前立下的豪言壮语：“生为毛主席战斗，死为毛主席献身。”"},{"type":"paragraph","text":"（照片六）对毛主席赤胆忠心，跟毛主席寸步不离。伟大领袖毛主席发出了要斗私，批修的伟大号召，“支左爱民模范排”的同志热烈响应，积极行动，同广大革命群众一起，办起了毛泽东思想学习班，以“斗私，批修”为纲，推动革命大批判、革命大联合和革命三结合。这是荣立一等功的新任四排排长庞朝胜（中站立者）等同志，和江西棉纺织印染厂无产阶级革命派举行斗私批修讲用会。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"江西文革","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"军队支左","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"46f3039fbc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
