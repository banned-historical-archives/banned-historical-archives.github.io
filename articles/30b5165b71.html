tart":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"“我们永远热爱毛主席”最近获得独立的南也门人民高度赞扬光芒万丈的毛泽东思想","authors":[],"parts":[{"type":"paragraph","text":"南也门人民在最近欢庆独立的时候，高度赞扬光芒万丈的毛泽东思想，无限热爱全世界革命人民的伟大导师毛主席。"},{"type":"paragraph","text":"一位民族解放阵线的战士对新华社记者说：“当我们庆祝我们的胜利时，我们永远不会忘记伟大领袖毛主席给我们的支持和鼓舞。”"},{"type":"paragraph","text":"六位从哈达拉毛地区来的民族解放阵线的战士，在深夜一点多钟特地找到新华社记者，热情而真挚地表达了他们对伟大领袖毛主席和新中国的热爱。其中一位战士说：“三十日在哈达拉毛庆祝独立时，人们高举伟大领袖毛主席的像。毛主席领导的中国人民给了我们很大的支持和鼓舞，特别是毛泽东思想给了我们无穷的力量。独立前，英帝国主义尽管千方百计地禁止我们得到毛主席著作，但是我们还是冒着生命危险，穿过英国封锁线，把毛主席的著作送到前线战士手里。”这位战士从兜里掏出一本红彤彤的《毛主席语录》后，意味深长地接着说：“你看，这本书就是一年前我穿过封锁线从中国朋友那里得到的。现在英帝被我们赶走了，但是，我们的斗争，我们的革命并没有结束。我们那里的人们非常渴望和非常迫切地期待着更多更多的毛主席的著作和他的语录。”临别时，记者给他们戴上毛主席像章时，战士们双手抚摸着胸前说：“毛主席是世界革命人民的伟大领袖，我们永远热爱他。”"},{"type":"paragraph","text":"最近几天，许多南也门人民络绎不绝地向中国朋友索取《毛主席语录》和毛主席像章。有些人曾经多次索取毛主席像章，他们解释说：“我们一挂在胸前就被人家要走了。”一位南也门工人说：“毛主席的书一看就懂，因为他讲的都是革命的道理。”一位司机得到一本《毛主席语录》后，当天晚上一口气读到深夜三点，他说：“我是一个字一个字、一句一句地读的。我要反复地学习，因为毛主席的书都是革命的真理。”"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"30b5165b71"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
