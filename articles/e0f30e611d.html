rt":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"林彪聂荣臻叶剑英元帅等观看驻京部队文艺团体演出","authors":["韩荣志"],"parts":[{"type":"paragraph","text":"本报讯 林彪元帅、聂荣臻元帅、叶剑英元帅等最近分别观看了驻京部队各文艺团体的演出。演出的节目反映了历次革命战争时期我军的光荣传统和解放区军民的斗争生活，其中有话剧《战斗里成长》、《打得好》、《十六条枪》，歌剧《兄妹开荒》、《刘顺清》，歌表演《革命历史歌曲表演唱》等。这些节目，是驻京部队各文艺团体为纪念毛主席《在延安文艺座谈会上的讲话》发表二十周年演出节目的一部分。"},{"type":"paragraph","text":"观看演出的还有罗瑞卿大将、肖劲光海军大将、刘亚楼空军上将、肖华上将、博钟上将等总部和军种兵种的首长。"},{"type":"paragraph","text":"为纪念毛主席《在延安文艺座谈会上的讲话》发表二十周年，驻京部队各文艺团体曾为首都各机关、部队和广大人民群众举行了多次演出，受到热烈欢迎。最近，他们将结束在首都的演出，即分赴部队进行慰问演出。"},{"type":"paragraph","text":"林彪元帅、聂荣臻元帅、叶剑英元帅等观看了空军政治部文工团演出的《革命历史歌曲表演唱》。在演出结束后，上台和演员们一一握手，并合影留念。 本报记者 韩荣志摄"}],"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"林彪","type":"人物"},{"name":"聂荣臻","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e0f30e611d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
