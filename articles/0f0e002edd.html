ical-archives/banned-historical-archives8/main/maoquanji25.pdf"],"article":{"title":"立即抽几个纵队兼程东进好天沈阳逃敌","alias":"","parts":[{"type":"paragraph","text":"立即抽几个纵队兼程东进"},{"type":"paragraph","text":"歼灭沈阳逃敌!"},{"type":"paragraph","text":"（1948年10月28日）林、罗、刘："},{"type":"paragraph","text":"刚发二十七日二十三时半电给你们，接到你们二十七日十八时电及十一时半电，你们业已部署大军迅速向鞍山、海城前进，歼灭沈阳南下之敌，甚好甚慰。希望你们立即抽出几个纵队于明3（二十八）日兼程东进，如能于二十九日渡过辽河，则沈阳逃敌跑不掉，否则，沈阳之敌有于三十日退到营口的可能。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"二十七日二十四时半4"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军委起草的给东北野战军司令员林彪、政治委员罗荣桓和参谋长刘亚楼的电报。"},{"type":"paragraph","text":"[2]即《望以有力兵团东渡辽河歼灭营口一带之敌》。[3]“明”字应为“今”字。"}],"authors":["毛泽东"],"dates":[{"year":1948,"month":10,"day":28}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":126,"page_end":126},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0f0e002edd"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
