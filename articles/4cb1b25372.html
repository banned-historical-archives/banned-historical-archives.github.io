ates":[{"year":1967,"month":9,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"《人民日报》编者的话:"},{"type":"paragraph","text":"锣鼓喧天，捷报频传，在无产阶级文化大革命的阵阵凯歌声中，伟大的一九六七年国庆节就要到来了。"},{"type":"paragraph","text":"今年的国庆节，是在革命的大批判的新高潮中到来的。"},{"type":"paragraph","text":"今年的国庆节，是在革命的大联合的新高潮中到来的。"},{"type":"paragraph","text":"今年的国庆节，是在广大革命群众遵循毛主席的教导，掀起“抓革命，促生产”的新高潮中到来的。"},{"type":"paragraph","text":"今年的国庆节，是在广大军民遵循毛主席的指示，热烈展开“拥军爱民”运动的新高潮中到来的。"},{"type":"paragraph","text":"今年的国庆节，是在广大革命群众响应林彪同志的号召，掀起活学活用毛主席著作的新高潮中到来的。"},{"type":"paragraph","text":"千好万好，都是毛主席的英明领导好；千胜利万胜利，都是毛主席的无产阶级革命路线的伟大胜利。让我们放声歌唱伟大的领袖毛主席，纵情欢呼无产阶级文化大革命的伟大胜利。"},{"type":"paragraph","text":"今天本报发表了一九六七年国庆节推荐歌曲，明天将继续发表，请同志们积极学唱。　(原载九月二十五日《人民日报》)"}],"comments":[],"origin":"《人民日报》","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"革命大批判","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4cb1b25372"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
