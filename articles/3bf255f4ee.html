:1946,"month":12,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【联合社北平三十日电】军调部中共代表叶剑英昨夜已由哈尔滨返平，惟此行劝谕共军司令林彪准许美方视察团入东北共军占领区域，是否成功，军调部方面今日仍守缄默。叶氏曾在哈尔滨共军司令部与林彪会谈，此行使命，系提议军调部执行小组自东北共军区内撤退后由美方派遣视察团赴哈。各小组连同美方代表在内，国共军拒绝保证安全，已退出双城，齐齐哈尔及拉法。同时，军调部已完成其他共军区域内政府代表，与国军区域内中共代表之撤退手续。除东北外，美方代表现仍留在两军控制区域内。"}],"comments":[],"origin":"联合社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"林彪","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3bf255f4ee"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
