script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"参加全国城市规划工作会议的代表摆问题谈意见  肃清左倾思想影响才能搞好城市建设","authors":["徐耀中"],"dates":[{"year":1980,"month":10,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"参加全国城市规划工作会议的代表摆问题谈意见"},{"type":"paragraph","text":"肃清左倾思想影响才能搞好城市建设"},{"type":"paragraph","text":"本报讯  据新华社记者徐耀中报道：参加全国城市规划工作会议的代表，近几天在总结城市建设的经验时指出，只有肃清左倾思想的流毒，才能使我国城市建设走上正确的轨道。"},{"type":"paragraph","text":"代表们说，在过去相当长的一段时间里，由于左倾思想的影响，一些地方把建设城市看作是搞修正主义，有的甚至片面强调城市要向农村看齐。"},{"type":"paragraph","text":"只注意生产，不注意生活和消费，使城市里“骨头”和“肉”的比例严重失调，这是在过去一个时期内左倾思想在城市建设中的又一种表现。"},{"type":"paragraph","text":"许多代表认为，左倾思想还表现在把讲究建筑艺术、讲究城市优美，看作是资产阶级情调而加以否定。"},{"type":"paragraph","text":"因此，现在城市居民平均居住面积还没有解放初期多。全国城市每日缺水约800万吨，不少工厂常常被迫停产或半停产，住在高楼上的居民时常断水。城市的公共交通也十分紧张。前些年许多城市的名胜古迹、风景园林都遭到破坏。据全国22个省、市、自治区的粗略统计，被侵占的园林绿地达一万一千多公顷，占这些城市园林绿地总面积的五分之一。城市污染也十分严重。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"daf858dfd3"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
