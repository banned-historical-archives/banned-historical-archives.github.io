art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"永远紧跟毛主席赤胆忠心志不移","authors":["铁道兵学习毛主席著作积极分子“铁道兵硬骨头战士”张春玉"],"parts":[{"type":"paragraph","text":"三月七日，我又一次见到我们心中最红的红太阳毛主席。我流着幸福的眼泪，千遍万遍地高呼：“毛主席万岁！万万岁！”"},{"type":"paragraph","text":"毛主席啊，毛主席！我们铁道兵战士远隔千山万水，颗颗红心永远向着您。每当红日从东方升起，我们想起您，是您领导中国人民南征北战，推翻了三座大山，建立了新中国；每当捧起您的红色宝书，我们想起您，是您的光辉思想武装了中国人民和全世界革命人民，使国内外一切反动派都逃不脱覆灭的命运；每当高举红旗走进工地，我们想起您，是您教导我们：“人民解放军应该是一个大学校”，“抓革命，促生产，保工作，促战备”，人换思想，山河变貌。我们在山坡上用冰雪镶成“毛主席万岁”五个金光闪闪的大字，我们每看一遍，都觉得无限幸福，浑身是力量。我们把您的谆谆教导写在工地上，茫茫林海筑路有方向。我们把您的画像挂在帐篷里，阳光日夜暖心房。我们把您的红色革命宝书揣在身上，心中有个永远不落的红太阳。"},{"type":"paragraph","text":"“大海航行靠舵手，干革命靠毛泽东思想”。毛主席啊，毛主席！在向阶级敌人和大自然的斗争中，是您的灿烂阳光，照耀我们成长；是您的光辉思想，把我从一个贫苦农民的儿子哺育成为一个革命战士；在隧道发生意外塌方、战友生命受到严重威胁的危急时刻，是您的光辉思想指挥我把战友救出了险区；我负伤住院后，是您的光辉思想给了我无穷的力量，战胜了伤残剧痛；在无产阶级文化大革命中，又是您的光辉思想指引我继续向前，把病房当战场，拿起笔作刀枪，对以中国赫鲁晓夫为首的党内最大的一小撮走资派进行坚决的斗争。"},{"type":"paragraph","text":"最敬爱的伟大导师毛主席啊！我决心以“只争朝夕”的革命精神，努力学好用好您的一系列最新指示，彻底地斗私批修，改造世界观，永远紧跟您，一丝一毫都不离；誓死保卫您，赤胆忠心志不移。"}],"alias":""},"tags":[{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4fb3c00724"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
