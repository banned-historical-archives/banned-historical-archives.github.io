<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"学习门合找出差距　反掉右倾打击敌人上海毛巾漂印厂学英雄见行动狠抓阶级斗争不转向","authors":[],"dates":[{"year":1968,"month":6,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　上海毛巾漂印厂革命委员会，以门合同志为光辉榜样，大办毛泽东思想学习班，用毛泽东思想武装广大革命群众，提高路线斗争觉悟，狠狠打击了一小撮阶级敌人。"},{"type":"paragraph","text":"上海毛巾漂印厂在前一段时期抓了革命大批判，揪出了一小撮混进革命队伍中的阶级敌人。他们得到了表扬，但是革委会和造反队的一些头头就产生了骄傲自满情绪，认为自己厂里有“四个好”、“一个高”。四个好是:联合好，团结好，革命好，生产好。一个高是:在行业、地区里威信高。认为维持现状、保牢荣誉，就不错了。"},{"type":"paragraph","text":"但是，他们要维持现状，阶级敌人却不让他们维持现状。被揪出来的阶级敌人就到处叫冤枉，四清下台干部也闹着要翻案。正在这时，报纸上发表了门合同志无限忠于毛主席革命路线的光辉事迹。厂革委会和造反队的同志越看越感动，立即办起了向门合同志学习的毛泽东思想学习班。在学习班里，他们认真学习了毛主席的最新指示:“对广大人民群众是保护还是镇压，是共产党同国民党的根本区别，是无产阶级同资产阶级的根本区别，是无产阶级专政同资产阶级专政的根本区别。”他们对照门合同志无限忠于毛主席的光辉事迹，个个思潮翻腾，厂里阶级斗争的情况象一幕幕电影一样出现在脑海里。他们体会到落后的根本原因，就是没有象门合同志那样，每分钟、每秒钟为毛主席的革命路线放好哨，站好岗，打好仗，而是思想上存在着右倾保守。通过学习，厂革委会和造反队的头头都纷纷表示，一定向门合同志学习，一切想着毛主席，一切服从毛主席，一切紧跟毛主席，一切为着毛主席，誓死捍卫毛主席的革命路线，狠抓阶级斗争不转向，落实毛主席的最新指示。"},{"type":"paragraph","text":"厂领导学习门合，找出差距，深入发动群众，全厂普遍办起了班组毛泽东思想学习班。在班组学习班里，革命群众总结前一阶段对敌斗争的经验，找出工作中的差距。改正了前一阶段在对敌斗争中只揪斗不批判的缺点，向阶级敌人发动了新的进攻，抓住已揪出来的敌人进行大批判，同时又挖出一批隐藏得很深的阶级敌人。"},{"type":"paragraph","text":"(上海毛巾漂印厂革委会政宣组)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7b8cf9b4f9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
