" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji8","name":"毛泽东全集第8卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji8.pdf"],"article":{"title":"关于红军东进抗日讨伐卖国贼图锡山的命令","alias":"","parts":[{"type":"paragraph","text":"关于红军东进抗日讨伐卖国贼阎锡山的命令！]"},{"type":"paragraph","text":"（1936年1月19日）"},{"type":"paragraph","text":"阎锡山接受日本天皇的命令，秘密把陕西?卖出。本会命令我英勇的抗日主力红军，即刻出发，打到山西去，打倒万恶的阎锡山，保卫抗日根据地，扩大抗日根据地，开通抗日前进路，同日本直接开火，把日本帝国主义尽快赶出中国。命令陕甘宁苏区的抗日红军和游击队、赤卫军、少先队，坚决保卫陕甘宁苏区、扩大陕甘宁苏区这个抗日战争的根据地；命令黄河两岸的抗日红军、游击队和民众，奋勇过河东去，在河东发展抗日根据地，配合红军主力打大胜仗。"},{"type":"paragraph","text":"[1]这是西北革命军事委员会主席毛泽东和副主席周恩来、彭德怀联名发出的《关于红军东进抗日讨伐卖国贼阎锡山的命令》。为严守行动秘密，这项命令直至2月12日红一方面军主力东渡黄河前才予以公布。"}],"authors":["毛泽东"],"dates":[{"year":1936,"month":1,"day":19}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":205,"page_end":205},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5478d71767"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
