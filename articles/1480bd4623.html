》后，走上舞台和演员亲切握手。台上台下高呼：毛主席万岁！毛主席万万岁！","authors":[],"dates":[{"year":1968,"month":3,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"周恩来、康生、江青等同志陪同威尔科克斯同志出席文艺晚会"},{"type":"paragraph","text":"观看革命现代京剧《智取威虎山》后，走上舞台和演员亲切握手。台上台下高呼：毛主席万岁！毛主席万万岁！"},{"type":"paragraph","text":"新华社十八日讯  新西兰共产党总书记维·乔·威尔科克斯同志，今天出席了为欢迎他而举行的文艺晚会。"},{"type":"paragraph","text":"在晚会上，威尔科克斯同志由周恩来、康生、江青、谢富治、吴法宪、汪东兴、叶群等同志陪同，观看了北京京剧一团演出的革命现代京剧《智取威虎山》。"},{"type":"paragraph","text":"威尔科克斯同志同周恩来、康生、江青等同志，走进晚会会场时，全场同志起立，热烈鼓掌，欢迎威尔科克斯同志。威尔科克斯同志挥动红彤彤的《毛主席语录》，向大家亲切致意。"},{"type":"paragraph","text":"演出结束以后，台上台下齐唱《大海航行靠舵手》。高呼：“毛主席万岁！”"},{"type":"paragraph","text":"“毛主席万万岁！”威尔科克斯同志和周恩来、康生、江青等同志，在欢呼声中走上舞台，和演员们亲切握手，祝贺他们演出的成功。"},{"type":"paragraph","text":"（附图片）"},{"type":"paragraph","text":"新西兰共产党总书记维·乔·威尔科克斯同志在周恩来、康生、江青等同志陪同下，三月十八日出席了为欢迎他而举行的文艺晚会，观看了革命现代京剧《智取威虎山》。"},{"type":"paragraph","text":"演出结束后，威尔科克斯同志由周恩来、康生、江青同志陪同上台和演员合影。"},{"type":"paragraph","text":"新华社记者摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"康生","type":"人物"},{"name":"江青","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1480bd4623"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
