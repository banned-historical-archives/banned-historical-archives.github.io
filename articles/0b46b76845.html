ical-archives/banned-historical-archives0/main/maoquanji32.pdf"],"article":{"title":"给罗元鲲的信","alias":"","parts":[{"type":"paragraph","text":"给罗元鲲\"的信"},{"type":"paragraph","text":"（1952年10月22日）翰溟先生："},{"type":"paragraph","text":"十月十九日赐示敬悉。李先生交来两件？，均已拜读，极为感谢！自传兴会举，评论深刻，可为后生楷模。"},{"type":"paragraph","text":"另件所述“特色”诸点，得之传闻，诸多不实，请勿公表为荷。两件奉还。袁先生墓文遵嘱书就，烦为转致。新化古寺有所毁损，极为不当，此类各地多有，正由政务院统筹保护之法，故不单独写字，尚祈谅之。僧尼老者守寺，少壮从事劳动，此论公允，已转政府有关机关酌处。此复。"},{"type":"paragraph","text":"敬颂旅安！"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一九五二年十月廿二日[1]罗元鲲，号翰溟，毛泽东在湖南省立第一师范学校读书时的历史教员。"},{"type":"paragraph","text":"[2]指罗元鲲托李漱清交给毛泽东的两篇文稿。一篇是罗元鲲的自传，一篇是罗写的《第一师范时代的毛主席》。"},{"type":"paragraph","text":"[3]指毛泽东书写的“袁吉六先生之墓”。袁吉六即袁仲谦，是毛泽东在湖南省立第一师范学校读书时的国文教员，1932年去世。"}],"authors":["毛泽东"],"dates":[{"year":1952,"month":10,"day":22}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":305,"page_end":305},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0b46b76845"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
