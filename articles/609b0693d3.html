rt":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"36载义务守护土城毛泽东旧居","authors":["刘远懋/欧阳浩"],"parts":[{"type":"paragraph","text":"■刘远懋 本报记者 欧阳浩"},{"type":"paragraph","text":"上面这张照片背后的故事是88岁的张邦珍老人36年义务守护土城毛泽东故居。"},{"type":"paragraph","text":"在贵州习水县土城镇长征街一侧的一条里弄，有一栋砖瓦结构的小楼，一层有两间房屋，张邦珍老人住一间，另一间就是毛泽东旧居，后面还有一个狭小岩洞。“毛主席当时就住在岩洞里头。”老人说，在那些枪林弹雨的日子里，毛泽东将这个岩洞作为天然的防空洞，在这指挥了青杠坡战斗和一渡赤水战斗。后来，因无人知道毛泽东曾在这里住过，土城卫生院于1967年将岩洞挖去一部分，建起了一栋职工宿舍楼。直到1975年，毛泽东的警卫员陈昌奉来到土城，才认出这里并恢复了原样。"},{"type":"paragraph","text":"当时，政府想让居住在这里的张邦珍搬迁出去，但她却自告奋勇提出要留在这里负责守护。从此，这位土城卫生院退休职工的老年生活，多了一份沉甸甸的责任。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"609b0693d3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
