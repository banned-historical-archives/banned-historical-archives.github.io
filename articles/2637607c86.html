<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"钟志民的父母积极支持儿子退学的革命行动  让孩子听毛主席的话，坚决走与工农相结合的道路","authors":[],"dates":[{"year":1974,"month":1,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"钟志民的父母积极支持儿子退学的革命行动"},{"type":"paragraph","text":"让孩子听毛主席的话，坚决走与工农相结合的道路"},{"type":"paragraph","text":"编者按：南京大学学员钟志民的《一份退学申请报告》在本报刊登后，钟志民的父母立即表示坚决支持儿子的退学要求，并检查和批判了自己“走后门”的错误。革命小将挑战，革命老将应战，值得欢迎，值得支持。"},{"type":"paragraph","text":"在两个阶级、两条路线的斗争当中，我们一定要警惕资产阶级思想的侵蚀，认真纠正“走后门”之类的一切不正之风。这是关系巩固无产阶级专政，反修防修的大事，必须认真对待。那种明知是错，只要“下不为例”就可以了的说法，既是为资产阶级思想打掩护，也是广大干部、群众通不过的。钟志民父母的革命行动，鲜明地表现了我们社会主义社会的新风尚，应当加以发扬。"},{"type":"paragraph","text":"新华社福州一九七四年一月二十六日电《人民日报》一月十八日加按语发表了南京大学政治系学员钟志民的《一份退学申请报告》以后，钟志民的父亲钟学林、母亲黎明心情十分激动，热烈支持钟志民的革命行动。"},{"type":"paragraph","text":"钟学林是参加过二万五千里长征的老红军，现在人民解放军福州部队政治部担任领导职务；黎明是一位退休的老干部。当他们从广播中知道儿子申请退学的报告已经公开发表时，都非常高兴。正在江西驻军某部检查工作的钟学林，立即打电话向福州部队政治部党委汇报，表示完全拥护《人民日报》的编者按语，坚决支持儿子的退学申请报告。黎明说：“从志民的行动中，我意识到孩子在向我们作父母的挑战了，我们要好好地向他们学习。”"},{"type":"paragraph","text":"钟学林和黎明同志原来想把自己的子女"},{"type":"paragraph","text":"“前途”安排得好一些，通过“走后门”，把到农村插队三个月的钟志民送到部队，后来又“走后门”，让他上了大学。钟志民在教育革命实践中，思想觉悟不断提高。一九七三年暑假，钟志民从大学回到家里，对父母说：“毛主席教导要从有实践经验的工人、农民中间选拔学生。我是通过‘走后门’上大学的，不符合党的原则。我要听毛主席的话，打算申请退学。”钟学林、黎明听了之后，思想上震动很大。他们想，让志民“走后门”上大学是错误的，是不正之风，但是他上大学快两年了，再退学有点可惜。随着批林整风运动的深入发展，钟学林和黎明反复学习《共产党宣言》中关于同传统观念实行“最彻底的决裂”的论述，学习毛主席关于培养和造就千百万无产阶级革命事业接班人的教导，进一步想到对子女“前途”的看法有错误。后来，钟学林带领工作组到生产建设部队和基层去，贯彻落实毛主席关于知识青年上山下乡的一系列指示，亲眼看到广大知识青年积极响应毛主席的号召，在三大革命运动中锻炼成长，认识又进一步提高：是教育子女走与工农相结合的道路，还是利用党和人民给予的职权“走后门”，让子女上大学？这不是无关紧要的小事，而是两种思想、两条路线斗争的大问题。他回顾了自己跟随毛主席干革命四十年的战斗历程，深深感到，作为党的一个高级干部，更应该模范地执行毛主席的革命路线，因此特地写了一封信给钟志民，要他把自己“走后门”上大学的经过和准备申请退学的想法，如实地向校党委汇报。"},{"type":"paragraph","text":"钟志民的《一份退学申请报告》和《人民日报》编者按发表后，钟学林、黎明立即给南京大学党委发了一封电报，表示完全支持钟志民的退学报告，并且对自己过去的错误做法作了自我批评。他们在电报中说：“孩子是党的财产，要服从党的安排。我们决心让孩子在三大革命运动中锻炼成长为无产阶级革命事业的可靠接班人。”"},{"type":"paragraph","text":"一九七四年一月二十三日下午，钟志民从南京大学回到家里，一家人欢欣鼓舞。钟志民向父母谈了自己认真看书学习，批判修正主义，批判资产阶级世界观，努力改造思想的体会。钟学林和黎明也结合自己的亲身经历讲了革命传统，总结了在教育子女问题上的经验教训。他们对钟志民说：“毛主席指引的道路，你要坚决地走下去，风吹浪打不回头。我们还要教育你的小弟弟向你学习，坚决走与工农相结合的道路。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"教育革命","type":"主题/事件"},{"name":"上山下乡","type":"主题/事件"},{"name":"两条路线斗争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2637607c86"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
