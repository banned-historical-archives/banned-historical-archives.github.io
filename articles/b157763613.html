art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"昨日要闻简报","authors":[],"parts":[{"type":"paragraph","text":"在周恩来罗瑞卿同志陪同下艾地同志率代表团离京到广州访问"},{"type":"paragraph","text":"艾地同志和由他率领的印度尼西亚共产党代表团，由中共中央副主席周恩来，中共中央委员、中央书记处书记罗瑞卿陪同，二十一日上午乘专机离开北京前往广州参观访问。中共中央总书记邓小平，中共中央政治局委员、中央书记处书记彭真，中共中央政治局候补委员、中央书记处书记康生等同志，和首都各界群众到机场欢送。"},{"type":"paragraph","text":"当以艾地同志为首的印度尼西亚共产党代表团到达广州时，受到正在广州的中共中央政治局委员陈毅，中共中央委员、中共中央中南局书记处书记、广东省省长陈郁等及广州各界一千多人的热烈欢迎。"},{"type":"paragraph","text":"中央农村文化工作队回到北京周扬同志强调工作队的重要作用"},{"type":"paragraph","text":"文化部、中国文联、共青团中央等部门联合组织的第一批农村文化工作队六个队，已在不久前陆续回到北京。他们深入广大农村四个多月，取得了显著成绩。"},{"type":"paragraph","text":"第一批农村文化工作队回京后，举行了经验交流和向首都文化艺术界汇报大会。在汇报大会期间，中共中央宣传部副部长周扬接见了全体工作队队员。周扬同志在谈话中，强调指出农村文化工作队的重要作用，今后要坚持贯彻这一措施，促使社会主义新文化在农村中生根，保证文艺工作者永不脱离劳动群众。"}],"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"罗瑞卿","type":"人物"},{"name":"周扬","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b157763613"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
