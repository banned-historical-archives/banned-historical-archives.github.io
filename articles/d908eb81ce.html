[{"year":1979,"month":1,"day":31}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社华盛顿一月二十九日电　正在这里访问的中国副总理邓小平和夫人卓琳今天晚上在肯尼迪中心观看了美国艺术家的精彩表演。"},{"type":"paragraph","text":"美国总统卡特和夫人、副总统蒙代尔和夫人以及许多其他美国知名人士同中国客人一起观看了文艺表演。"},{"type":"paragraph","text":"今天晚上确实是一个充满了真正友谊的夜晚。美国的许多优秀艺术家专程从全国各地来到这里为来自太平洋彼岸的客人们演出。他们当中有来自加利福尼亚州的环球巡回演出者，来自纽约州的美国黑人舞蹈家，有七十六岁的钢琴家鲁道夫·塞金，流行歌曲演唱家约翰·丹佛和百老汇舞蹈团。"},{"type":"paragraph","text":"每一个节目都由著名的作曲家、演出者、创作者，或前宇宙航行员向观众介绍，他们说，邓副总理访问美国是“一个划时代的事件”。"},{"type":"paragraph","text":"刚刚从中国访问回来的参议员约翰·格伦得知邓副总理喜爱观看篮球比赛，特地介绍了来自加利福尼亚州的六名篮球表演者。他们在舞台上表演了精彩的控球技术。"},{"type":"paragraph","text":"当二百名华盛顿儿童用汉语唱起《我爱北京天安门》这支歌曲时，晚会达到了高潮。"},{"type":"paragraph","text":"演出结束时，邓副总理和夫人在卡特总统和夫人的陪同下走上舞台，向演员们表示感谢。"},{"type":"paragraph","text":"据新华社华盛顿一月二十九日电　邓小平副总理今天在美国国务卿万斯为他举行的午宴上祝酒时说，中美关系正常化是“中美两国人民的共同胜利，因为它符合两国人民的共同愿望和利益，而且对于世界的和平和稳定十分重要”。"},{"type":"paragraph","text":"他表示:“两国政府和人民将继续努力，卓有成效地发展中美两国间的友好合作关系”。"},{"type":"paragraph","text":"万斯在祝酒词中说:“我们克服了许多困难并且建立了完全的、正常的关系，这一成就是卡特总统、华主席和你本人领导的结果。”"},{"type":"paragraph","text":"他说，美国人民和中国人民有许多共同点，在邓副总理和卡特总统的重要会谈中，“对已有的共同点，我们将有进一步的领会，对那些有不同意见的问题，我们将探讨缩小分歧的可能性”。他强调说:“为了世界和平的利益，我们必须设法增进我们的互相谅解和合作”。"},{"type":"paragraph","text":"中国方面出席午宴的有副总理方毅等。"},{"type":"paragraph","text":"美国方面出席午宴的有总统国家安全事务助理布热津斯基等。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d908eb81ce"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
