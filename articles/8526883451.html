":1976,"month":4,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"以优异成绩回击右倾翻案风"},{"type":"paragraph","text":"西藏山南榨油厂职工在反击右倾翻案风的斗争中，正确认识和处理政治与经济的关系，抓革命促生产，今年一月份完成了两个月的生产任务，二月份又取得了新成绩。"},{"type":"paragraph","text":"今年，这个厂生产任务繁重。全厂工人、干部在厂党支部的领导下，认真学习党的基本路线和无产阶级专政理论，批判党内那个不肯改悔的走资派刮起的右倾翻案风，提高了阶级斗争和路线斗争觉悟，进一步增强了工人阶级是国家主人翁的政治责任感。大家表示要以更大的革命干劲，优异的生产成绩，回击右倾翻案风，巩固和发展无产阶级文化大革命的胜利成果。"},{"type":"paragraph","text":"这个厂是个综合性的副食加工厂。各个车间都掀起了抓革命促生产的热潮。面粉车间创造了建厂以来车间日产量最高纪录，白酒酿造车间今年头一个月的生产量，就等于去年两个月的生产量。全厂在人少任务重的情况下，还为人民公社加工了农产品，有力地支援了春季农业生产和农业学大寨运动。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8526883451"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
