ical-archives/banned-historical-archives0/main/maoquanji31.pdf"],"article":{"title":"给董必武的信","alias":"","parts":[{"type":"paragraph","text":"给董必武的信"},{"type":"paragraph","text":"（1951年12月4日）必武同志："},{"type":"paragraph","text":"我认为你给饶漱石同志的信的内容是正确的，可以抄发华东以外各中央局负责同志一阅，促其注意这件事。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十二月四日可以连同你此信和我答复你的几句话，一起抄发。"},{"type":"paragraph","text":"又及[1]董必武，当时任政务院副总理兼政治法律委员会主任。"},{"type":"paragraph","text":"[2]指董必武1951年10月18日关于县乡政权建设问题给中共中央华东局第一书记饶漱石的信。董必武在信中指出，加强下级政权机关的工作，可以而且应该经由上级政权机关领导着去做；各级党委对各级政权机关的领导，应经过在政权机关中工作的党员来实现，其中如有党员3人以上，应组成党组以保证党的领导。党直接做政权机关的工作是不好的。"},{"type":"paragraph","text":"[3]指董必武1951年12月3日关于县乡政权建设问题给毛泽东的信。信中对他在1951年10月18日关于同一问题给饶漱石写信的背景情况作了说明，并对县乡政权建设问题提出了三点意见：一、下级政权机关的建立，党应经过上级政权机关领导着去做比较好些；二、县乡两级建政工作，目前县级建政是关键；三、县乡建政是一件大事，在组织上和思想上都要有充分的准备。"}],"authors":["毛泽东"],"dates":[{"year":1951,"month":12,"day":4}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":109,"page_end":109},"tags":[{"name":"毛泽东","type":"人物"},{"name":"饶漱石","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"874827229e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
