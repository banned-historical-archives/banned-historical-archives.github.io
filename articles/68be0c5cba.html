批示","authors":[],"dates":[{"year":1963,"month":11,"day":29}],"is_range_date":false,"parts":[{"text":"中共中央转发关于粮食销售问题的两个文件的批示","type":"title"},{"text":"各中央局，各省、市、自治区党委；","type":"appellation"},{"text":"现在把福建省委关于今年四月至十月份粮食销售情况的检查报告和中央办公厅情况简报第四百六十一期登载的《粮食统销太多带来不良后果》转发给你们，请你们认真看看。","type":"paragraph"},{"text":"福建省委及时抓紧粮食销售工作，检查了今年四月到十月的粮食销售情况，实事求是地分析了粮食增销的合理因素和工作上存在的问题，并且收回了一部分虚报冒领的粮食，提出了控制粮食销量的具体措施。各省、市、自治区党委都应当仿照福建省委的做法，把粮食销售工作很好地抓起来。","type":"paragraph"},{"text":"中央办公厅情况简报登载的材料反映，湖南浏阳县的一个大队，多销的粮食达三万八千多斤，占统销粮食的百分之四十五点六。这种大量浪费国家商品粮食的现象，是不能容许的。请湖南省委检查一下，情况是否属实。请各省、市、自治区也检查一下，有没有类似现象。如果属实，如果有，必须立即纠正。湖南是粮食销量比较平稳的省份，还有浏阳县东峰大队那样不合理多销粮食的地方，足见在那些粮食销量增加过多的地区，工作中存在的问题一定更多。这是必须抓紧的问题。","type":"paragraph"},{"text":"对于不合理多销的粮食决不要轻易放过去，不该销的粮食一斤也不要多销。请你们务必抓紧时机，把一切粮食供应的漏洞堵死，把一切可以节省的粮食节省下来，以保证来年春夏的粮食供应，保证春耕生产的顺利进行。","type":"paragraph"},{"text":"（各地发至县）","type":"paragraph"},{"text":" 一九六三年十一月二十九日","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"68be0c5cba"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
