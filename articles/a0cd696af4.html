" crossorigin="">{"props":{"pageProps":{"books":[{"id":"aa09042b-1acf-42db-a419-19be684e4485","name":"印度共产党（毛主义）文献集（2022年）","internal":false,"official":false,"type":"pdf","author":"中国国内革命左派，2022年编","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives3/main/aa09042b-1acf-42db-a419-19be684e4485.pdf"],"article":{"title":"声援印度人民的斗争！","alias":"","parts":[{"type":"paragraph","text":"声援印度人民的斗争！革命实践二〇一八当今世界最先进的革命斗争正在广的印度次大陆进行。印度共产党（毛主义）正在全国许多地方领导最高形式的革命斗争，即武装斗争。印度工人和农民日益增长的不满情绪激起了印度人民党政府的高度反动反应，他们正在采用极端暴力的和压道性的方法来镇压群众的反抗。这表明印度统治阶级害怕人民群众。尽管已经在农民中建立了一些基础，但印共（毛）认识到了在印度城市工人阶级中培养革命意识的必要性。此外，印共（毛）正通过改组其领导干部来显示其作为一个革命党的成熟。我们祝贺巴萨瓦拉吉同志成为党的新总书记。资产阶级媒体对印度革命斗争的关注很少。毛主义者在不同国家的一项重要任务就是广泛宣传我们印度同志的成就。这是提高不同国家工人阶级群众政治觉悟的重要组成部分。如果做到了这一点，我们将能够更好地组织有效的团结行动。对印度人民战争的声援必须不仅仅是在口头上表示支持，例如在互联网上发表更多的表示支持的言论。真正的团结应包括各种类型的实际支持。印度同志需要什么样的支持，应该征求他们的意见。这可能包括财政支持、物资供应(例如医疗)、专门人员，以及对帝国主义国家中的压追和剥削印度人民的公司采取的行动。在毛主席时代，当人们访问中国并询问他们能做些什么来帮助中国革命的时候，他们被告知回到自己的国家，在那里进行革命。帮助印度同志的最好办法，就是无论身在何处，都要努力加紧建立马列毛主义革命运动。支持印度共产党（毛主义)！印度人民的革命斗争必胜！总书记贾纳帕蒂同志自愿辞去职务，中央委员会选举巴萨瓦拉吉同志为新任总书记印度共产党(毛主义)二〇一八年印度共产党（毛主义）总书记贾纳帕蒂同志自愿辞去职务，中央委员会选举巴萨瓦拉吉同志为新任总书记。鉴于贾纳帕蒂（Ganapathy）同志过去几年健康状况不佳和年龄增长，展望未来，为加强中央委员会，他自愿卸下总书记的职责，并提议选举另一名同志为总书记。在详细讨论之后，中央委员会第五次会议接受了这一提议，并选举巴萨瓦拉吉（南巴拉·克萨瓦·拉奥）（Basavaraju[NamballaKesava Rao]）同志为新任总书记。"}],"authors":["（英国）革命实践"],"dates":[{"year":2018}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":205,"page_end":205},"tags":[{"name":"人民战争","type":"主题/事件"},{"name":"毛主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]},{"id":"maoistlibrary","name":"马列毛图书馆","internal":false,"official":false,"type":"db","author":"网络资料","files":"","article":{"title":"声援印度人民的斗争！","authors":["（英国）革命实践"],"dates":[{"year":2018}],"is_range_date":false,"comment_pivots":[],"comments":[],"page_start":0,"page_end":0,"description":"","parts":[{"type":"paragraph","text":"革命实践\n二〇一八"},{"type":"paragraph","text":"当今世界最先进的革命斗争正在广袤的印度次大陆进行。印度共产党（毛主义）正在全国许多地方领导最高形式的革命斗争，即武装斗争。印度工人和农民日
