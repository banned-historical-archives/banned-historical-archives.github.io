art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"活学活用毛主席著作是第一条","authors":["李荣春崔寒韦"],"parts":[{"type":"paragraph","text":"我们在边疆扎根，就是扎毛泽东思想的根。要首先使毛泽东思想在自己的头脑里扎根，才能使毛泽东思想在广大人民群众中扎根。 李荣春"},{"type":"paragraph","text":"我们同“私”字作斗争，其艰苦程度并不亚于同拿枪的敌人作斗争。必须以毛泽东思想为武器，“敢”字当头，勇于自己革自己的命，坚持高标准，抓住私心杂念穷追猛打，才能彻底斗倒“私”字，树立一心为公的无产阶级世界观。 某部党委学习中心组"},{"type":"paragraph","text":"敞开门闹思想革命，就是把自己灵魂深处的私心杂念交给群众，和群众在一起把它斗倒。群众的眼睛最亮，耳朵最灵，看问题最准。敞开门闹革命，有了群众的帮助和监督，就能更快更彻底地挖掉私心杂念。 排长 崔寒韦"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a2c08fcb17"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
