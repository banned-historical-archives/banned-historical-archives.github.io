业发生工资问题","authors":[],"dates":[{"year":1950,"month":10,"day":26}],"is_range_date":false,"parts":[{"text":"镇江、长沙等地新谷上市后部分私营企业发生工资问题","type":"title"},{"text":"【内部参考讯】镇江、长沙等地在新谷上市粮价下跌的情况下，私营企业已发生工资问题。镇江职工工资在今夏困难时期，曾普遍下降8成至5成，现米价又下降30％，因此目前实得工资仅及去年的50％至30％。该地不少私营企业单位的职工已要求由米薪改为折实单位。长沙织染、绸布等业劳方亦纷纷要求资方以折实单位发给工薪，但资方未同意。新福兴与大明两织染厂的工人曾因工资问题罢工1天。现虽已复工，但仍未获得解决。","type":"paragraph"}],"comments":[],"origin":"新华社《内部参考》1950年10月26日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"53958e1317"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
