art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"邓小平会见比利时国王博杜安一世","authors":[],"parts":[{"type":"paragraph","text":"新华社5月27日讯 中共中央副主席邓小平今天下午在会见比利时国王博杜安一世时说，中比两国在许多问题上的看法是一致的。我们愿意同包括比利时在内的整个欧洲加强合作。欧洲希望中国好起来，中国也希望欧洲好起来。"},{"type":"paragraph","text":"会见在人民大会堂举行。在交谈中，邓小平对博杜安一世说，你的这次访问对增进我们两国的相互了解和发展两国友好关系是很重要的。"},{"type":"paragraph","text":"博杜安一世对有机会同邓小平会晤表示高兴。他说，我们欧洲的联合是从经济和贸易开始的。现在要逐步在政治上统一，以便做到用一个声音说话。"},{"type":"paragraph","text":"陪同博杜安一世来访的比利时外交大臣诺东，比利时驻中国大使罗杰·德诺睦参加了会见。"},{"type":"paragraph","text":"外交部副部长韩念龙，中国驻比利时大使郑为之会见时在座。"},{"type":"paragraph","text":"会见以后，邓小平设宴款待博杜安一世和法比奥拉王后等比利时贵宾。"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5030f898d4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
