authors":[],"dates":[{"year":1970,"month":5,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"日本《长周新闻》热情赞扬我人造卫星发射成功"},{"type":"paragraph","text":"中国新成就是毛泽东思想的伟大胜利"},{"type":"paragraph","text":"新华社讯　东京消息：日本进步报纸《长周新闻》最近发表短评，热情赞扬中国成功地发射第一颗人造地球卫星，并指出这一成就对世界人民的解放斗争是一个伟大的鼓舞。"},{"type":"paragraph","text":"短评说：中国第一颗人造卫星发射成功了！战斗的日本人民和全世界人民，欢欣鼓舞，欢呼这个喜讯。美帝、苏修、佐藤反动派和宫本修正主义集团的丧钟敲响了，他们为此而垂头丧气，哀叹不已。象征着毛泽东思想和文化大革命伟大胜利的人造卫星的发射成功，是在七十年代初，给予挥舞着导弹在世界各地疯狂地挑起侵略战争的美帝、苏修和一切反动派的毁灭性打击。同时，它还标志着世界人民解放的堡垒飞跃地得到加强，给奋起粉碎日美“安全条约”的日本人民、坚持武装斗争的亚、非、拉人民和开展革命群众运动的资本主义国家人民，增添了无限的信心。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"76b544b1f0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
