script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"出席世界大会的日本各界领袖痛斥茹科夫一伙的破坏活动  现代修正主义者反人民面貌彻底暴露  各国人民的团结将击败一切分裂阴谋","authors":[],"dates":[{"year":1964,"month":8,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"出席世界大会的日本各界领袖痛斥茹科夫一伙的破坏活动"},{"type":"paragraph","text":"现代修正主义者反人民面貌彻底暴露  各国人民的团结将击败一切分裂阴谋"},{"type":"paragraph","text":"新华社七日讯　东京消息：出席第十届禁止原子弹氢弹世界大会的日本各界领袖谴责苏联代表团团长茹科夫阴谋破坏世界大会，并一致指出，世界大会获得巨大胜利这一事实证明，在人民的团结斗争面前，分裂主义者最后必定彻底失败。"},{"type":"paragraph","text":"世界大会全体大会主席团成员、日本亚非团结委员会理事长坂本德松指出，“茹科夫到达日本头一天就表明要同时参加世界大会和分裂主义者的集会，并且说什么要努力使这两个禁止原子弹氢弹运动‘统一’起来。茹科夫的话证明，他并不是前来参加世界大会，同各国代表和人民并肩争取全面禁止核武器的，而是钻进大会企图从内部破坏世界大会的。”"},{"type":"paragraph","text":"坂本指出，茹科夫和听从他的指挥的一小撮人在国际会议上大肆进行捣乱，但当他们的阴谋遭到大多数与会各国代表，特别是日本和亚洲、非洲和拉丁美洲代表的坚决反击眼看就要失败时，他们就自己宣布脱离世界大会并反诬世界大会“不民主”，受北京的“操纵”等等。"},{"type":"paragraph","text":"坂本说，“我们从茹科夫这一系列的行径清楚地看出现代修正主义者到处搞分裂阴谋的丑恶面貌。”"},{"type":"paragraph","text":"世界大会国际会议日本代表团团员、新日本妇女会事务局长小笠原贞子指出，“第十届禁止原子弹氢弹世界大会同内外分裂主义者展开针锋相对的斗争，把它们反人民的面貌彻底揭露出来，从而获得了辉煌的胜利，这是有重大意义的。”"},{"type":"paragraph","text":"她说，日本和来自世界各国的和平战士早就看透了茹科夫之流的阴谋，因此才能够及时进行斗争粉碎他们的阴谋。"},{"type":"paragraph","text":"小笠原贞子强调说，“通过这一番斗争我们进一步确信，在反对美帝国主义、反对分裂主义者的斗争中，最后胜利是属于人民这边的。”"},{"type":"paragraph","text":"世界大会执行委员、日本宗教徒和平协议会常任理事佐藤行通说，“苏联代表团和服从它指挥的一小撮外国代表在世界大会上所采取的态度，是违背正在为反对美帝国主义的侵略和战争政策而英勇斗争的日本人民的意志的。他们对日本人民和世界人民恣意的诽谤，是绝对不可容许的行为。”"},{"type":"paragraph","text":"佐藤指出，“出席第二届世界宗教徒和平会议的苏联和加拿大等代表团在这个会议上同意支持第十届世界大会，同意会议通过战斗性的‘东京宣言’，但到了茹科夫策动破坏世界大会时，这些人就把手掌翻过来最后跟随茹科夫逃跑。这件事证明，分裂主义者和它们的走卒是惯用两面手法的，是不可信任的。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"73e2e15ac4"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
