<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"杨路对丁石孙的谈话","authors":["北京大学","杨路"],"dates":[{"year":1957,"month":6,"day":27}],"is_range_date":false,"parts":[{"text":"杨路对丁石孙的谈话","type":"title"},{"text":"北京大学杨路","type":"authors"},{"text":"（杨路：北京大学数学系学生；丁石孙：数学系助教）","type":"subtitle"},{"text":"1．北大的运动开始后就有两方面，一方面是整风，一方面是争取扩大民主。","type":"paragraph"},{"text":"2．他的动机是要求自由，民主，要冲击一下僵化了的头脑，他承认在运动中有些错误，一是思想偏激，有无政府主义倾向，二是作为团员组织性，纪律性不够，他愿意以后在团内作检讨。","type":"paragraph"},{"text":"3．谭天荣认为中国今天是处于匈牙利的状况，所谓的百万大军是客观存在着的，他要引导他们走一条破坏性最小的道路，谭去天津是为了扩大影响。刘奇弟有复仇情绪，惟恐天下不乱，张景中只有烦琐逻辑，跟着别人的看法走，他开始曾劝张不要参加进来，他说这样，要声名狼藉的。他自己去天津根本没有想到帮党整风他在天津，有些话比较偏激。","type":"paragraph"},{"text":"4．《广场》是有明显的倾向性，但他认为还太软，因之他不参加，谭天荣不满意广场，不要刘奇弟，后来是要了，但一直没有分开。","type":"paragraph"},{"text":"5．谭天荣，林希翎那是勇敢正直的人，(我告诉他林已作检讨)如果作检讨说明一个女孩子还不够坚强，我欢喜坚强，勇敢的人。不论他主张什么。(我问他蒋介石如何，)蒋的这种品质还是好的。","type":"paragraph"},{"text":"6．有了阶级立场，就无所谓良心，他认为良心、人道是最高的原则，他今天不愿意从社会主义的利益来考虑问题，","type":"paragraph"},{"text":"7．要求言论自由，反社会主义的言论也应该有自由。","type":"paragraph"},{"text":"8．他说人家说他反社会主义，实事上他主张取消定息，把资本家全抓起来，这样阶级就消灭了，你们以后就再也不会谈阶级斗争了。","type":"paragraph"},{"text":"9．我国没有经历资本主义阶段，因之，提出资产阶级民主，自由的口号，也是有道理的。","type":"paragraph"},{"text":"10．目前的空气不够自由，活泼，这样束缚人们的创造性，所以想到波兰，南斯拉夫和世界各国去看看。","type":"paragraph"},{"text":"11．你们要谈效果，我只管动机，我不愿改变我的思想，我等待你们的审判好了。","type":"paragraph"},{"text":"12．现在已不认为江副校长是三害分子，但不打算道歉，对江不必实行我的人道，关于秘密报告的事，我不打算谈，这样对不起刘奇弟，他今天是正在受迫害。","type":"paragraph"},{"text":"13．现在反右派斗争是小题大作。","type":"paragraph"},{"text":" 丁石孙摘1957．6．27．","type":"paragraph"}],"comments":[],"origin":"北京大学社会主义思想教育委员会编印《北京大学右派分子反动言论汇集》，一九五七年十月。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c821ff51ab"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
