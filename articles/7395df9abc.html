script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"不可否认陈志雄的收入中有剥削","authors":["杜宰经"],"dates":[{"year":1981,"month":7,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"不可否认陈志雄的收入中有剥削"},{"type":"paragraph","text":"看了《人民日报》5月29日发表的《一场关于承包鱼塘的争论》，我想谈点不同看法。陈志雄利用公有的生产资料雇请工人劳动，并不能说明他的纯收入中不存在剥削成分，只是他剥削的分量不是太多罢了。土改前的二地主，他们手中也没有生产资料，而是从地主手中租到土地后再租给农民，从中谋利。这说明，不直接占有生产资料的人也能剥削他人的劳动。"},{"type":"paragraph","text":"陈志雄有较高的养鱼技术和管理水平，并要承担经济责任，他收入高不能算剥削。这种说法也是站不住脚的，他的技术和管理水平要变为财富，其中有一部分是靠雇请工人来实现的。在资本主义社会中，一些企业主既是工程师，又是管理员，我们能认为这样的企业里没有剥削工人的性质吗？"},{"type":"paragraph","text":"陈志雄雇工承包集体鱼塘，得到的个人纯收入中有剥削的成分，这么一点剥削允许不允许存在，这是另一回事。陈志雄承包集体鱼塘，有利于生产发展，在生产力落后的我国，这对国家、集体、个人都有利，但不能因此认为他的个人收入中不存在剥削。"},{"type":"paragraph","text":"中央民族学院  杜宰经"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7395df9abc"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
