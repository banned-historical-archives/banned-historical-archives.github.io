script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"不要让学生做分数的奴隶","authors":["夏晓林"],"dates":[{"year":1981,"month":10,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"不要让学生做分数的奴隶"},{"type":"paragraph","text":"夏晓林"},{"type":"paragraph","text":"朋友告诉我，北京某小学最近将语文、数学考试的及格标准从60分一下子提高到95分，并规定凡考试成绩低于95分的学生统统都要补考。听罢，顿时为该校的孩子们捏一把汗，小小年纪本来学习负担就重，这一来他们就更要拚命死记硬背，提心吊胆地过日子了。"},{"type":"paragraph","text":"对学生学业成绩进行考查和评定，是教学工作中必不可少的环节。分数象一面镜子，可以反映出教与学两方面的情况，有助于师生总结经验，找出薄弱环节，提高教学质量。分数对学生的学习也有督促作用，但这种作用不能夸大。提高学生的学习积极性和学习质量，主要是靠正确的政治思想工作和科学的教学方法，而不是分数。如果过分夸大分数的督促作用，就会使学生为追求分数而学习，失去可贵的学习主动性和创造性，后果将是很不好的。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"78a3c51238"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
