<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"jfjb","name":"解放军报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"dates":[{"year":1998,"month":6,"day":8}],"page_start":7,"page_end":7,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"读书东篱下悠悠几千年读《毛泽东评点二十四史》精华解析遐想","authors":["济宁"],"parts":[{"type":"paragraph","text":"二十四史是记载中国几千年历史的重要典籍。毛泽东一生对二十四史作过许多评点和批注，他不同凡响的评点的确让人拍案叫绝。"},{"type":"paragraph","text":"如毛泽东在读《后汉书》卷九三《李固传》时写下了下面一段精彩的文字："},{"type":"paragraph","text":"“晋朝人阮籍反对刘邦，他从洛阳走到成皋，叹道：世无英雄，遂使竖子成名。……我是自信而又有些不自信。我少年时曾经说过：自信人生二百年，会当水击三千里。可见神气十足了。便又不很自信，总觉得山中无老虎，猴子称大王，我就变成这样的大王了。……我曾举了后汉人李固写给黄琼信中的几句话：山尧山尧者易折，皎皎者易污。阳春白雪，和者盖寡。盛名之下，其实难副。这后两句，正是指我。我曾在政治局常委会上读过这几句。人贵有自知之明。……事物总是要走向反面的，吹得越高，跌得越重，我是准备跌得粉碎的。”"},{"type":"paragraph","text":"毛泽东挥洒自如，一叹三绝的风采跃然纸上，而借古喻今信手拈来的历史精华无不表现了伟人的幽默、风趣中的智慧与胸怀。"},{"type":"paragraph","text":"毛泽东读史见解之深刻，角度之独特，文彩之飞扬，实令人荡气回肠，掩卷长思。诸葛亮为智慧的代名词，“隆中对”则更是历代谋国安邦之名篇。可毛泽东却在评《三国志》卷三五《诸葛亮传》写到："},{"type":"paragraph","text":"“其始误于隆中对，千里之遥而二分兵力。其终则关羽、刘备、诸葛三分兵力，安得不败。”"},{"type":"paragraph","text":"诸葛亮是一代贤相，但蜀国终未成就统一天下的大业，他本人也无奈地“出师未捷身先死”。爱读三国的人总不免要问：“蜀国失误在何处？”"},{"type":"paragraph","text":"此类令人回味无穷的精彩评点，在书中真是枚不胜举。"},{"type":"paragraph","text":"《毛泽东评点二十四史》精华解析，确是近来繁荣史书出版中一本不可多得的好书、精品书。书中毛泽东评点真迹的200多幅影印图片，弥足珍贵。而中央档案馆，中共中央文献研究室、国家新闻出版署，中国档案出版社四家毛泽东藏书之权威机构的联合推出，更显示出其原汁原味、正宗、正版的权威性。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"06c6ae5961"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
