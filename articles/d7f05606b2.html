ates":[{"year":1970,"month":11,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反对庄园主的剥削和压迫"},{"type":"paragraph","text":"哥伦比亚农民开展夺地斗争"},{"type":"paragraph","text":"据新华社十一日讯　波哥大消息：哥伦比亚农民最近奋起进行夺地斗争，反对庄园主的残酷剥削和压迫。"},{"type":"paragraph","text":"在托利马省，农民已经从地主手里夺取了二千八百多公顷的土地。十一月二日，该省瓜莫市的一百多户无地农民夺取了面积为一千多公顷的“拉琼塔”庄园。在萨尔达纳和普里菲卡西翁市，六百多农民夺取了“埃尔蒂格雷”、“圣阿古斯丁”和“色拉”庄园。农民们在这些庄园里建造起自己的房屋并且准备在过去被地主荒芜了的土地上播种。他们竖起巨幅标语牌，上面写着：“打倒帝国主义的假土改”、“工农联盟万岁”等口号。"},{"type":"paragraph","text":"在梅塔省，农民们占领了“克布拉迪塔”、“阿雷纳莱斯”等七个庄园。在大西洋省马纳蒂市，农民们占领了四个畜牧业大庄园。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d7f05606b2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
