<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"充分发挥工人阶级在抓革命促生产战斗中的主力军作用上海冶金工人创造今年来钢的日产量最高纪录 决心夺取革命生产新胜利来回答毛主席的关怀","authors":[],"dates":[{"year":1968,"month":8,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　上海冶金工业战线广大革命职工，为了夺取无产阶级文化大革命全面胜利，以最大的革命热情和革命干劲，促使生产大幅度增长，昨天创造了今年以来钢的日产量最高纪录。"},{"type":"paragraph","text":"无产阶级文化大革命是使我国社会生产力发展的一个强大的推动力。冶金工业战线昨天创造今年以来钢的日产量最高纪录，是由于:一、他们大学八月五日《人民日报》更要社论，彻底批判反动的资产阶级的“多中心论”，在以毛主席为首、林副主席为副的无产阶级司令部的领导下进一步加强了革命的团结；二、狠抓对敌斗争不转向，以纲带钢，即以阶级斗争为纲，带动钢铁生产的大幅度增长；三、深入持久地开展革命大批判，大破中国赫鲁晓夫修正主义的企业管理路线和技术路线，走毛主席指引的“鞍钢宪法”的道路；四、反保守，鼓干劲，发扬了一九五八年大跃进中的革命干劲，尤其是在无产阶级文化大革命中大力促进人的思想革命化。总之，这是上海广大钢铁工人全面落实毛主席一系列最新指示，响应伟大领袖毛主席“抓革命，促生产”的伟大号召的结果。"},{"type":"paragraph","text":"为了夺取无产阶级文化大革命的全面胜利，以适应国民经济大发展的需要，上海市冶金工业局在十三日举行大会，落实毛主席的一系列的最新提示，进一步掀起革命生产新高潮。在这个大会精神的鼓舞下，上海钢铁工人立即行动起来，为了向毛主席献礼，纷纷讨论，研究增产措施，力争高产优质。从前天深夜开始，有的工人提前上班做准备工作。战斗开始以后，大家猛冲猛打，下班铃响了，有的工人仍然留在车间里为下一班做准备工作。在这场争分夺秒的战斗中，广大钢铁工人发扬了共产主义风格，把方便让给别人，把困难留给自己；各级革命委员会的领导人员，纷纷到生产第一线，和工人们同劳动、同学习、同战斗；革命的技术人员也走出办公室，深入炉前和轧钢机旁，走与工人相结合的道路；生活后勤等部门也积极配合，适应高产的需要，做好物资供应工作。"},{"type":"paragraph","text":"昨天深夜，当他们夺取了今年以来日产量最高水平的新纪录以后，听到了毛主席的最新指示:“我国有七亿人口，工人阶级是领导阶级。要充分发堂工人阶级在文化大革命中和一切工作中的领导作用。工人阶级也应当在斗争中不断提高自己的政治觉悟，”毛主席最新指示给广大革命职工以巨大政治动力，更加鼓舞了大家的革命斗志，纷纷表示:“一定要全面落实毛主席的一系列最新指示，更好地发挥工人阶级的主力军作用，夺取革命生产新胜利，来回答伟大领袖毛主席对我们的爱护和支持。”"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"782746f84a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
