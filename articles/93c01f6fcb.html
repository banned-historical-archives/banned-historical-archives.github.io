ical-archives/banned-historical-archives0/main/maoquanji29.pdf"],"article":{"title":"按新情况重新确定攻击目标","alias":"","parts":[{"type":"paragraph","text":"按新情况重新确定攻击目标"},{"type":"paragraph","text":"（1950年10月27日）彭、邓，并告高："},{"type":"paragraph","text":"（一）据此间所收情报均说伪六师之第二团被围并说已被歼，与来电所说不符，望查告。伪六师第十九团向温并增援，其第七团在古场被我切断后路；似此，如打得好，可能全歼伪六师；（二）伪八师只有一个营在熙川，主力已撤至球场有向温并进攻说，似此，以熙川为攻击目标之部署已不适宜，请按新情况酌定。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十月二十七日二十二时"},{"type":"paragraph","text":"[1]彭、邓，指彭德怀、邓华，当时分别任中国人民志愿军司令员兼政治委员和副司令员兼副政治委员。"},{"type":"paragraph","text":"[2]高，指高岗，当时任东北军区司令员兼政治委员。[3]温井，位于平安北道云山郡东北。[4]古场，位于慈江道楚山郡中部。[5]球场，位于平安北道宁边郡东部。"}],"authors":["毛泽东"],"dates":[{"year":1950,"month":10,"day":27}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":307,"page_end":307},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"93c01f6fcb"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
