art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席领导中国人民大踏步前进","authors":[],"parts":[{"type":"paragraph","text":"尼泊尔工商大臣纳·普·里贾尔，十三日在中国驻尼泊尔大使杨公素为欢迎他访华回国而举行的茶会上说，中国人民有纪律、有组织，有高涨的热情。他们在毛泽东主席领导下正在国家建设方面大踏步前进。“中国人民很有信心并且热爱他们的领导人。”"},{"type":"paragraph","text":"里贾尔大臣说，中国人民有自力更生的精神，这种精神是伟大的精神。在每个乡村、城市和工厂，人民通过自己的努力为发展国家建设而工作。“我参观了工厂。有些工厂规模不很大，但是产品很好。农业生产正在增加。中国的农业生产能足够地满足人民生活的需要。”“我发现中国人民的力量是他们发展中的一支巨大的力量，我也相信，在最近的将来，中国将成为世界上最强大的大国。”"}],"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f867e6314c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
