art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席，我们永远忠于您！","authors":[],"parts":[{"type":"paragraph","text":"第二炮兵战斗英雄王儒听到毛主席视察文化大革命情况胜利回到北京的消息，情不自禁地放声唱起了《东方红》。他仰望着东方刚刚升起的红太阳，好像毛主席来到了自己身边，心里默默地想：“毛主席呀！我们把您比作红太阳，其实太阳哪有您明亮。您伟大思想的光辉，把全世界革命人民的心照亮，您是全世界革命人民心中永远不落的红太阳。”"},{"type":"paragraph","text":"王儒同志心潮翻涌，回想起战争年代，不管在枪林弹雨的战场上，还是在硝烟迷漫的行军路上，大家天天想念着延安，想念着伟大统帅毛主席，是毛主席亲自指挥我们南征北战，打败了一个又一个凶恶的敌人，取得一个又一个的伟大胜利！今天，北京是世界的延安，天安门是全世界革命人民心中的灯塔，毛主席是全世界革命人民心中最红最红的红太阳。只要紧跟伟大领袖毛主席，按照毛泽东思想办事，坚决贯彻、执行毛主席的革命路线，就一定能从胜利走向胜利！他激动地向毛主席表示决心：我永远忠于您，忠于您的光辉思想，忠于您的革命路线，您老人家指到哪里，我们就打到哪里，紧跟您的伟大战略部署，把无产阶级文化大革命进行到底！把世界革命进行到底！"}],"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"28096cad11"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
