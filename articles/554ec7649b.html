ical-archives/banned-historical-archives8/main/maoquanji10.pdf"],"article":{"title":"和《大公报》记者范长江的谈话","alias":"","parts":[{"type":"paragraph","text":"和《大公报》记者范长江的谈话!"},{"type":"paragraph","text":"（1937年2月9日）"},{"type":"paragraph","text":"第五次反“围剿”失败在不应当搞广昌大决战，不应同陈诚指挥的主力硬拼。应当暂时放弃苏区，分红军为四路，猛出杭州、苏州、南京、芜湖四点，施以伴攻，以诱动江西兵力，然后择弱点一战，胜而后回江西，再突破弱的方面，则苏区可以保全。"},{"type":"paragraph","text":"二"},{"type":"paragraph","text":"希望中国走上宪政民主之路，以民主求统一求和平。和平统一之后，始可以言抗日。故为实现民主政治，共产党可放弃土地革命和苏维埃、红军的名义。有人反对共产党谈爱国主义，这是不彻底懂得马列主义。马列主义是反帝国主义的，在半殖民地的国家提倡爱国主义，本质上就是反帝国主义的。"},{"type":"paragraph","text":"[1]1937年2月9日傍晚，《大公报》记者范长江到达延安，毛泽东出席欢迎宴会。晚10时，在凤凰山住处会见范长江，彻夜长谈。本篇一是毛泽东关于战略问题的一段谈话；本篇二是毛泽东关于共产党现时的要求的一段"}],"authors":["毛泽东"],"dates":[{"year":1937,"month":2,"day":9}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":182,"page_end":182},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"554ec7649b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
