],"article":{"title":"中共中央组织部关于对‘文革’中犯有错误的同志能否入党问题给中共辽宁省委组织部的答复","dates":[{"year":1991,"month":8,"day":2}],"is_range_date":false,"authors":["中共中央组织部"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"中央组织部干审局, 干审工作政策文件选编(下), 1433-1434","tags":[{"name":"辽宁","type":"主题/事件"},{"name":"入党","type":"主题/事件"}],"parts":[{"type":"title","text":"中共中央组织部关于对“文革”中犯有错误的同志能否入党问题给中共辽宁省委组织部的答复"},{"type":"subtitle","text":"1991年8月2日·〔91〕组建字0028号"},{"type":"paragraph","text":"你部《关于“文革”中犯有错误的同志能否入党问题的请示》收悉，现答复如下:"},{"type":"paragraph","text":"一、关于“文革”中犯有严重错误的人能否入党的问题，原则同意你们的意见。吸收这些人入党应十分审慎，严格审查，从严掌握。对个别经过党组织长期考验，各方面表现好，对“文革”中的错误检查认识深刻，确实具备党员条件的，可以吸收其入党，但要经地(市)级党委批准。"},{"type":"paragraph","text":"二、关于“文革”中犯有一般错误的人能否人党的问题，我部1983年12月召开的发展党员工作座谈会上已明确意见，即“对‘文革’期间犯有一般性错误的人，本人过去已作了检查，党的十一届三中全会以来表现好，确实已经具备了党员条件的，可以发展”。"}],"alias":""},"tags":[{"name":"辽宁文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"910f93d940"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
