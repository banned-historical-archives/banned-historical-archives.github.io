tart":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"中国粉碎了“四人帮”更加稳定团结","authors":[],"parts":[{"type":"paragraph","text":"新华社努瓦克肖特一九七六年十二月十七日电 毛里塔尼亚国民议会议长萨勒十二月十六日在接见中国驻毛里塔尼亚大使康矛召时说：“中国人民在华主席领导下所取得的伟大成就证明了毛主席的英明。”"},{"type":"paragraph","text":"萨勒议长同康矛召大使进行了热情友好的谈话。他说：“毛里塔尼亚和其它第三世界国家特别关心在中国所发生的一切事情。华国锋被任命为中国共产党中央委员会主席和以华国锋主席为首的中国共产党中央委员会粉碎‘四人帮’反党集团，对我们来说也是一件幸运的事。毛主席在生前就不是偶然而是很好地选择了华国锋为他的接班人。”"},{"type":"paragraph","text":"他说：“在华主席的领导下，中国人民正在加速各方面的建设，以实现毛主席确定的伟大目标：使中国在本世纪末成为一个强大的社会主义国家。”"},{"type":"paragraph","text":"萨勒议长接着说：“不久前，中国的敌人和第三世界的敌人曾臆断中国将发生一场灾难。但是，事实证明，中国稳定而团结，一切都正常。这正是毛主席生前的愿望，这也是中国人民按照毛主席的教导所取得的伟大成就。”"},{"type":"paragraph","text":"萨勒议长最后表示希望看到中国人民和毛里塔尼亚人民之间的友谊进一步得到发展。"}],"alias":""},"tags":[{"name":"华国锋","type":"人物"},{"name":"四人帮","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3e33869daa"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
