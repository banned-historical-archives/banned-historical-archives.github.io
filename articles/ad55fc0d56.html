ates":[{"year":1950,"month":2,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"防止额外剥削  取缔匿价逃税"},{"type":"paragraph","text":"京房地产交易所开幕"},{"type":"paragraph","text":"【北京讯】北京市城区房地产交易所昨（十）日上午在该所举行开幕典礼。市府吴晗副市长及地政局刘仲华局长和沈勃副局长都亲往讲话，市财政局及公逆产清管局也派有代表参加。该所吕建亚所长在会上报告了交易所的筹设经过及目前京市房地产权的转移情况。吴副市长在致词中首先说明房地产交易所的成立，是执行本市第二届各界人民代表会议的决议，完全符合广大市民的要求。交易所的首要任务是在协助市民进行房地产的交易，减轻中费负担，防止额外剥削。并通过对房地产买卖、典、交换等监证工作，以取缔匿价逃税、消除买卖纠纷。参加这一新工作的人员，务须密切联系群众，彻底执行政府的城市房屋政策。刘仲华局长和各局代表讲话时，一致认为这是一个新的工作，要在摸索中创造经验和成绩，从而扩大业务范围，更好地为人民服务。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ad55fc0d56"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
