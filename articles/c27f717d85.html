" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"上海电影系统清队领导小组关于羽山放到群众中去的请示报告","authors":[],"dates":[{"year":1969,"month":5,"day":19}],"is_range_date":false,"parts":[{"text":"上海电影系统清队领导小组关于羽山放到群众中去的请示报告","type":"title"},{"text":"市革会工宣队第一办公室：","type":"appellation"},{"text":"我系统东方红（天马）电影制片厂编剧羽山（文艺五级），在无产阶级文化大革命中被革命群众作为清理对象揪出。","type":"paragraph"},{"text":"羽山在历史上参加过国民党部队，先后在国民党部队中担任过护士、上尉军医等伪职。1938年羽山在西安参加过反动的帮会（青帮）组织。","type":"paragraph"},{"text":"羽山自1939年2月参加革命（延安鲁迅艺术学院）以后，犯了一系列严重错误。1945年春，羽山在晋察冀军区整风运动中，向军区首长提出不合理的要求，并带头组织“请愿”活动，受到了严肃的批判；1955年，羽山在反胡风反革命集团的斗争中，同情胡风集团分子，曾对胡风反革命集团成员田×说：“一个人受点挫折没有关系，不要灰心……”；1957年整风反右运动中，羽山又站在资产阶级右派立场上，散布了一些右派言论，发表了《要不要电影文学》毒草文章，攻击党对电影事业的领导，羽山在右派分子召开的座谈会上叫嚷：“作品的公式化、概念化，是领导的教条主义造成的，对领导的教条主义要加以清算……”。","type":"paragraph"},{"text":"由于羽山在整风反右运动中散布右派言论，生活上腐化堕落，与政治上有重大嫌疑的骆××私自同居，并多次不接受组织劝阻，1958年12月被开除党籍。","type":"paragraph"},{"text":"1962年，羽山向上级党委和原上海市委写信申诉，企图为其被开除党籍的问题翻案（未遂）。同时又抛出毒草文章《续貂篇》，攻击毛主席的无产阶级革命文艺路线。","type":"paragraph"},{"text":"此外，羽山还写了《东风化雨》（小说，已出版）、《纺织姐妹》、《盐都春雷》等其它一些毒草作品，抹煞阶级斗争，宣扬阶级调和，歪曲历史，为复辟资本主义制造舆论。","type":"paragraph"},{"text":"我们认为：羽山历史上参加过国民党部队和青帮组织，并担任上尉军医等伪职，属一般政历问题；羽山加入革命队伍以后，资产阶级世界观没有得到改造，散布资产阶级右派言论，写了毒草作品，对抗组织，目无法纪，犯了一系列严重错误。根据“打击面要小，教育面要宽”的政策精神，我们认为羽山的问题的性质属于人民内部矛盾。经过革命群众多次批判、教育，在毛主席的革命路线和党的政策的感召下，羽山在文化大革命中进一步交代了自己的问题，对自己屡次所犯的严重错误有了一定的认识，有悔改表现，可以给予解放，回到群众中去接受教育改造。","type":"paragraph"},{"text":"以上报告，是否妥当？请批示！","type":"paragraph"},{"text":" 上海电影系统清队领导小组工宣队：军宣队：革筹会：1969年5月19日","type":"paragraph"}],"comments":[],"origin":"根据档案材料翻印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"name":"人民内部矛盾","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"name":"清理阶级队伍","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c27f717d85"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
