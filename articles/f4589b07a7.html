ical-archives/banned-historical-archives0/main/maoquanji29.pdf"],"article":{"title":"人民解放军必须进入西藏","alias":"","parts":[{"type":"paragraph","text":"人民解放军必须进人西藏\""},{"type":"paragraph","text":"（1950年10月11日）外交部："},{"type":"paragraph","text":"应告袁大使：（一）西藏是中国领土，西藏问题是中国内政问题。人民解放军必须进入西藏。首先希望不经战争进入西藏，故要西藏代表团九月来北京谈判，该团故意拖延，至今尚未动身。现人民解放军已向昌都前进，数日内可能占领昌都。如西藏愿意谈判，代表团应速来京。（二）朝鲜问题应照周总理九月三十日演说内容答复之，即中国不能坐视其邻人受侵略而置之不理，扩大战争的责任应由侵略国担负。外交部拟电送阅。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十月十一日"},{"type":"paragraph","text":"[1]这是毛泽东在中国驻印度大使袁仲贤1950年10月10日关于印度对西藏问题的态度给外交部的报告上写的批语。"}],"authors":["毛泽东"],"dates":[{"year":1950,"month":10,"day":11}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":229,"page_end":229},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]},{"id":"wenji6","type":"pdf","name":"毛泽东文集第六卷（1999）","internal":false,"official":true,"author":"中央文献研究室","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/wenji6.pdf"],"article":{"title":"人民解放军必须进入西藏","description":"根据手稿刊印。","dates":[{"year":1950,"month":10,"day":11}],"parts":[{"text":"人民解放军必须进入西藏","type":"title"},{"type":"appellation","text":"外交部："},{"type":"paragraph","text":"应告袁大使：（一）西藏是中国领土，西藏问题是中国内政问题。人民解放军必须进入西藏。首先希望不经战争进入西藏，故要西藏代表团九月来北京谈判，该团故意拖延，至今尚未动身。现人民解放军已向昌都前进，数日内可能占领昌都。如西藏愿意谈判，代表团应速来京。（二）朝鲜问题应照周总理九月三十日演说内容答复之，即中国不能坐视其邻人受侵略而置之不理，扩大战争的责任应由侵略国担负。外交部拟电送阅。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十月十一日"}],"comment_pivots":[{"part_idx":0,"offset":11,"index":1}],"is_range_date":false,"authors":["毛泽东"],"comments":["这是毛泽东在中国驻印度大使袁仲贤一九五○年十月十日关于印度对西藏问题的态度给外交部的报告上写的批语。"],"page_start":116,"page_end":116,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f4589b07a7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
