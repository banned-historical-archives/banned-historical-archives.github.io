锟","伍奂中","北京地质勘探学院","李燕吉","李维干","龙国坤"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"“党委违反中央政策”","type":"title"},{"text":"北京地质勘探学院李维干李燕吉伍奂中龙国坤付锟","type":"authors"},{"text":"李维干说：","type":"paragraph"},{"text":"“党委违反中央政策把关于知识分子的团结教育，改造政策变成打击，排挤，赶走的政策。”","type":"paragraph"},{"text":"李燕吉说：","type":"paragraph"},{"text":"“党用人不重才干。高级知识分子今后会减少了，也伤了父母的心，不希望孩子深造了。”","type":"paragraph"},{"text":"伍奂中说：","type":"paragraph"},{"text":"“不管其人如何，达到教授水平就应给教授称号，教授是学衔，美国教授还是教授。”","type":"paragraph"},{"text":"龙国坤说：","type":"paragraph"},{"text":"“钱伟长是学术上骗子，为什么应得奖金？一下子棒一气，一下子垮下来，斯大林也是这样，什么事总是这样。”","type":"paragraph"},{"text":"“老干部和知识分子之间的矛盾，只有在党的干部提高科学文化水平成为内行的时候才能解决。”","type":"paragraph"},{"text":"付锟说：","type":"paragraph"},{"text":"“思想改造是不必要的，伤害了知识分子的自尊心。”","type":"paragraph"}],"comments":[],"origin":"北京地质勘探学院党委会宣传部编《社会主义教育参考资料第二编：右派言论汇编》，1957年10月5日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d5a9ea427c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
