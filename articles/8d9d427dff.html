ical-archives/banned-historical-archives0/main/maoquanji42.pdf"],"article":{"title":"转发张体学关于湖北分粮到户等情况汇报的批语","alias":"","parts":[{"type":"paragraph","text":"转发张体学\"关于湖北分粮到户等情况汇报的批语"},{"type":"paragraph","text":"（1959年6月20日）"},{"type":"paragraph","text":"此件请尚昆用电报发各省、市、区党委研究。粮食要分到户。另要大抓副食品、日用工业品，恢复手工业。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"六月二十日[1]张体学，当时任湖北省省长。"},{"type":"paragraph","text":"[2]指张体学1959年6月16日晨关于小麦入库、分粮到户及抓手工业等情况的电话汇报。张体学说，湖北的小麦已快打完了，入库进展不算很快，正在抓。粮食以人分等定量到户后，情况大变，小队于部和农民欢天喜地，大队和公社干部仍有些不通。现在省委决定直接与群众见面了。可以办得通。渔民已经归队不少，湖里开始有人捕鱼了。抓了一下手工业之后，产品有所增加。同日，国务院副总理兼财政部部长李先念将这一电话内容转报周恩来。毛泽东的批语就写在李先念的报告上。"},{"type":"paragraph","text":"[3]尚昆，即杨尚昆，当时任中共中央书记处候补书记、中央办公厅主任。"}],"authors":["毛泽东"],"dates":[{"year":1959,"month":6,"day":20}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":88,"page_end":88},"tags":[{"name":"李先念","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8d9d427dff"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
