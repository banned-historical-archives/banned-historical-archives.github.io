ar":1966,"month":7,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"战士最听毛主席的话"},{"type":"paragraph","text":"解放军某部　黄祖示葵花向着红太阳，战士最听毛主席的话。毛主席，毛主席，您叫干啥咱就干啥。您说党的总路线好，咱就一步不离它。您说阶级斗争不能忘，咱就把牛鬼蛇神踩脚下。您说人民战争威力大，六亿人民把枪拿。您说美帝是纸老虎，咱就坚决戳穿它！您说劳动人民是一家，咱就把革命红旗插遍天下。毛主席，毛主席，您的话威力最大。战士信仰您的话，天不怕来地不怕。狂风恶浪不动摇，万代都把红旗插。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"人民战争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fd9e9a249e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
