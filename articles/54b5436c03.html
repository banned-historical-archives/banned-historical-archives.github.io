script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"筱香水难道应该一辈子做奴隶吗?","authors":["邓耕"],"dates":[{"year":1950,"month":9,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"邓耕"},{"type":"paragraph","text":"“筱香水”是香港长城影片公司的出品。长城影片公司，一连串的出了如“复活”、“海棠红”、“筱香水”这类影片。在制片方针上，长城公司还是引袭着旧的没落的方针，所出的影片，丝毫没有与今日新的生活呼应。"},{"type":"paragraph","text":"“筱香水”是一部应加严格抨击的影片，空洞无聊，而且有坏影响。也许有少数观众被它的花巧所蒙蔽，因此，我们必需揭穿它。"},{"type":"paragraph","text":"首先，“筱香水”并没有一分诚意，企图暴露封建反动阶级的罪恶。那位罪魁齐大帅只是被轻描淡写的带了一笔。那位督察长虽然负担了一切，却又写成了一个小丑式的人物；并且对于“筱香水”，还显得非常锺情似的，结果又为情死去。观众对这样一个人物，是不会引起嫉恶如仇似的憎恨的。在这种描写之下，“筱香水”这部影片恰好为齐大帅这类人物开了一扇方便之门。"},{"type":"paragraph","text":"第二，从表面看起来，“筱香水”似乎也是为旧艺人在旧社会中所受的凌虐鸣不平的。但事实上，它在开始就使筱香水这个人物给观众一种极为恶劣的印象。而筱香水的一切态度行动，又处处是轻浮下流，丝毫没有作为一个被凌虐压迫者的那分真纯和高贵的气质。尤其那几段唱歌，对于旧艺人，是百分之百的亵渎，编导是带着齐大帅与督察长一样的心情在下流的欣赏着。“筱香水”这部影片，绝没有丝毫为旧艺人控诉不平之处；而是在侮辱旧艺人、亵渎旧艺人；侮辱被压迫者、亵渎被压迫者。"},{"type":"paragraph","text":"第三，我们是不管筱香水与梁燕铭之间的恋爱为着什么，有没有理由把它在今日宣扬一番；而最可痛恶的，是筱香水这样一个被压迫者，到死也只是为了求得正统封建道德的一点谅解。似乎被压迫者的一生，也就只是为了这样一个目的。让梁燕铭的大太太喊她一声妹妹，她的奴隶地位便没有什么不好了。“筱香水”十足的是在维护封建正统道德观念；但筱香水的一辈子处应该于这样的奴隶地位吗?"},{"type":"paragraph","text":"为了“筱香水”的这些坏影响，我们反对它。希望在香港的电影工作者，不要再依附于这种旧的没落的方针之下；而做一点对观众有益的事吧!"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"54b5436c03"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
