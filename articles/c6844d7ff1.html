script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji21","name":"毛泽东全集第21卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji21.pdf"],"article":{"title":"先攻怀仁等地然后相机夺取大同山","alias":"","parts":[{"type":"paragraph","text":"先攻怀仁等地然后相机夺取大同！"},{"type":"paragraph","text":"（1946年6月23日）贺、李，聂、唐："},{"type":"paragraph","text":"（一）必须于最近期间攻取怀仁、岱岳、山阴、宁武、应县、繁峙、代县、醇县”、原平、忻县、五台、定襄，然后相机夺取大同。（二）为执行此任务，同意贺李第二方案，从绥东四个主力旅中抽调一个旅，使用于上述目的。调动时注意隐蔽，不露形迹。（三）聂刘即派一个主力旅附炮交贺李指挥执行上述任务，同时令路东地方党政军协同动作，并即派人至贺李处受领任务。（四）为完成此任务，望贺李与聂刘直接联络。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"二十三"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军委起草的给晋绥军区司令员贺龙、政治委员李井泉和晋察冀军区司令员兼政治委员聂荣臻、参谋长唐延杰的电报。"},{"type":"paragraph","text":"[2]岱岳，镇名，今为山西山阴县县治。山阴，指山阴城，位于山西山阴县南部。"},{"type":"paragraph","text":"[3]醇县，旧县名，1958年撤销，部分划归山西宁武县，部分与代县合并为山西原平县。"},{"type":"paragraph","text":"[4]绥，指绥远，旧省名，辖今内蒙古自治区中部地区，1954年撤销。[5]聂，指聂荣臻。刘，指刘澜涛，当时任晋察冀军区副政治委员。"}],"authors":["毛泽东"],"dates":[{"year":1946,"month":6,"day":23}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":418,"page_end":418},"tags":[{"name":"毛泽东","type":"人物"},{"name":"聂荣臻","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c6844d7ff1"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
