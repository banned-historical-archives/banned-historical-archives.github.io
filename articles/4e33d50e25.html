<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"从学潮和国际形势变化中引出深层次反思北京大学生读《毛选》议国情许多人从毛泽东的理论和实践中受到教育，增强了走社会主义道路的信心","authors":["纪涛"],"dates":[{"year":1990,"month":1,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"笔者近日在北京大学采访，该校图书出纳台的负责人让记者翻看了学生们的借书卡:“近两年，本科生和研究生都未停止过借阅《毛选》和马列著作。”"},{"type":"paragraph","text":"经过深入采访，记者发现，大学生阅读《毛选》和马列著作的兴趣和热情是有层次的。"},{"type":"paragraph","text":"北大哲学系八六级学生辛鸣坦率地说:“我们呼唤毛泽东，是对社会主义的重新追求和礼赞。从1989年春夏之交的这场风波和最近国际形势发生的变化中，北大一些同学认了这一条:只有社会主义才能发展中国。我们也感到社会主义前进是很艰难的，邓小平同志提出的坚持四项基本原则，坚持改革开放正是要发展社会主义。大家佩服毛泽东，在六十年代那么困难的形势下坚定地走社会主义道路。这说明我们对社会主义是充满信心的。”"},{"type":"paragraph","text":"辛鸣的同班同学黄绍举对记者说:“从学潮至暑假结束，我接触了不少工人农民，发现社会主义已作为一种文化深入到中国民众心里了。毛泽东说得对，在中国，没有真正的资本主义土壤。社会主义还很不成熟，但有前途，我们要研究它。”"},{"type":"paragraph","text":"“就大多数学生来说，是把毛泽东当作近代中国革命的缩影来看的，他们想从毛泽东那里来了解中国国情”，清华大学社科系青年教师吴兴柯和大学生一起学习讨论后这样分析。"},{"type":"paragraph","text":"北航的研究生程松林说，他最近调查了几十名1988年毕业的大学生，许多人的共同感受是走上社会后，才感到自己太不了解中国国情，从毛泽东的传记和著作里发现，他对中国社会的分析是太透彻了。"},{"type":"paragraph","text":"清华大学在校生刘悦在开学后写了一篇文章:《国情与历史的思考》，这篇文章在校刊上刊出后引起不少学生议论。文章认为，近几年听的看的净是西方的民主自由学说、政体评介、经济模式，探讨的是萨特、尼采、弗洛依德、韦伯等西方人物的精神世界，几次学潮打的旗帜基本上是西方的口号，反思起来真令人震惊。近代史上只有毛泽东领导的革命是最成功的变革。大学生们读《毛选》是想搞清楚:为什么毛泽东的理论和实践能胜利?"},{"type":"paragraph","text":"北京化工学院青年教师徐广军在肯定大学生学《毛选》、阅读毛泽东诗词和传记的热情时不无遗憾地说:现在完整地记叙毛泽东一生的传记、描绘他政治生活的评传大多是西方人写的，他们不少人是用西方的英雄史观、政治标准、伟人强人意识来描述、分析毛泽东的。这无疑是在向我们中国的作家、党史工作者、理论工作者挑战:我们该怎样向青年一代评介我们的毛泽东。　纪涛"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"世界形势","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4e33d50e25"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
