art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"紧跟毛主席彻底闹革命","authors":["全国战斗英雄/南京部队某部副参谋长周文江"],"parts":[{"type":"paragraph","text":"毛主席身穿军装，亲自参加首都百万群众大会，使我们受到了极大的鼓舞，增添了无穷的力量。我们一定坚决响应毛主席和党中央的伟大号召，彻底斗垮走资本主义道路的当权派，彻底批判一切反动的学术“权威”，把它们永远踩在脚下！"},{"type":"paragraph","text":"我们伟大领袖毛主席，这样关心群众，信任群众，永远和群众在一起，支持群众的革命运动，给全国人民带来了极大的鼓舞。我们要以伟大领袖的革命实践为榜样，更加坚定地相信群众，更加深入地发动群众，敢于革命，善于革命，依靠群众的智慧和力量，把文化大革命进行到底。"},{"type":"paragraph","text":"林彪副主席在讲话中，代表我们最敬爱的毛主席和党中央向大家问好，这是毛主席和党中央对革命群众的极大关怀，我们决不辜负毛主席和党中央的关怀和期望。我们最热烈地拥护党中央关于无产阶级文化大革命的决定，最热烈地拥护党的八届十一中全会公报，坚决响应党中央和林彪副主席的号召，更高地举起毛泽东思想的伟大红旗，学习十六条，熟悉十六条，运用十六条，把无产阶级文化大革命进行到底，把社会主义革命进行到底。"},{"type":"paragraph","text":"万物生长靠太阳，干革命靠的是毛泽东思想。毛泽东思想是我们心中永远不落的红太阳，是我们的命根子，我们要更有成效地活学活用毛主席著作，在战无不胜的毛泽东思想指引下，百倍提高警惕，加强战备，保卫无产阶级文化大革命，保卫社会主义祖国铁打的江山，努力完成祖国人民和世界人民交给我们的历史使命。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ae95b99691"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
