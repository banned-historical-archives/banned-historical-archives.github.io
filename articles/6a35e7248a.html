script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"沙尔玛团长举行酒会庆祝马来亚解放同盟十七周年  马来亚人民坚决进行武装斗争直到胜利  谴责赫鲁晓夫修正主义者勾结美帝及其走狗","authors":[],"dates":[{"year":1966,"month":2,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"沙尔玛团长举行酒会庆祝马来亚解放同盟十七周年"},{"type":"paragraph","text":"马来亚人民坚决进行武装斗争直到胜利"},{"type":"paragraph","text":"谴责赫鲁晓夫修正主义者勾结美帝及其走狗"},{"type":"paragraph","text":"新华社一日讯　马来亚民族解放同盟驻中国代表团团长沙尔玛今晚在北京说，东南亚已经成为世界革命风暴的主要中心，马来亚人民在现阶段要加强并进一步发展反对“马来西亚”的运动，来配合越南人民和整个东南亚人民反对美帝国主义的斗争。"},{"type":"paragraph","text":"沙尔玛团长为庆祝马来亚民族解放同盟成立十七周年，今晚在北京饭店举行酒会。中国亚非团结委员会主席廖承志和中国其他各人民团体的负责人，在北京的一些外国朋友，应邀出席了酒会。中外人士热烈祝马来亚人民的反帝爱国斗争不断取得新的胜利。"},{"type":"paragraph","text":"沙尔玛团长在酒会上首先讲话。他强调说，在我们的同盟进入它的第十八个年度，我们的武装斗争于第十八个年度中也正在开展的时候，马来亚人民更加决心在各方面进行反对帝国主义和争取自由、独立、民主与和平的斗争。"},{"type":"paragraph","text":"沙尔玛在谈到马来亚人民反帝斗争的历史时说，马来亚人民从经验中认识到，对付极端狡猾和武装到牙齿的敌人，必须以武装斗争为主要的斗争形式。必须以工人阶级为领导，以工农联盟为基础，团结起来进行各种斗争来配合武装斗争，直到完全、彻底地打败敌人。"},{"type":"paragraph","text":"沙尔玛在讲话中谴责英帝国主义在东南亚进行掠夺，并根据它在苏伊士以东的战略，正在纵容和帮助美帝国主义在越南进行侵略战争。"},{"type":"paragraph","text":"他还谴责说：赫鲁晓夫修正主义者在同美帝国主义及其走狗搞合作来分裂反帝力量。马来亚人民将在一切斗争领域中坚决进行反对现代修正主义的斗争。"},{"type":"paragraph","text":"沙尔玛说，马来亚人民反对受美国支持的英帝国主义及其走狗的反动统治的斗争是正义的。中国人民和亚洲、非洲、拉丁美洲以及全世界一切革命人民都在和我们一起战斗，最后胜利一定是属于我们的。"},{"type":"paragraph","text":"中国亚非团结委员会副主席康永和在酒会上讲话，他以中国人民的名义向为反对美英帝国主义及其走狗的反动统治、为争取民族解放而斗争的马来亚人民致崇高的敬意，并祝马来亚人民在新的一年中不断壮大和发展自己的力量，在粉碎新殖民主义产物“马来西亚”和争取民族解放的斗争中获得更多的成就。"},{"type":"paragraph","text":"他说，中国人民完全支持马来亚人民的爱国正义斗争。"},{"type":"paragraph","text":"康永和在讲话中强烈谴责美帝国主义对越南民主共和国“恢复轰炸”的新罪行。他说，中国人民同全世界人民一道，继续坚决支持越南人民抗美救国的正义斗争，直到取得最后的胜利。"},{"type":"paragraph","text":"英国朋友夏庇若也在酒会上讲话。他代表在北京居住和工作的英国朋友热烈祝贺马来亚民族解放同盟成立十七周年，并且保证全力支持马来亚人民为粉碎“马来西亚”的斗争，全力支持所有殖民地人民反对英、美帝国主义的斗争。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6a35e7248a"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
