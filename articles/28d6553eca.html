<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"上海七○二九厂二十号炉的炼钢工人打破资产阶级反动技术“权威”的清规戒律，把炼钢炉炉龄从十炉提到七十炉，使钢的成材率提高了几十倍。他们——多快好省地炼出241号新钢种","authors":[],"dates":[{"year":1968,"month":9,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编辑同志:"},{"type":"paragraph","text":"我们上海七○二九厂二十号炉的同志们，认真地学习毛主席《愚公移山》、《人的正确思想是从那里来的?》等光辉著作，发扬冲天干劲，多快好省地炼出了241号新钢种。"},{"type":"paragraph","text":"过去，上自冶金部，下至厂里的一小撮走资派，都不把普通的炼钢工人放在眼里，他们纠集了一批资产阶级反动技术“权威”，组织了一个指挥部，专门负责冶炼241号新钢种，完全把工人排斥在外。这些资产阶级反动技术“权威”，其实根本就不懂得241号新钢种怎么炼，他们翻阅了大量的外国书籍，订出一条又一条清规戒律卡住工人的手脚。有一个资产阶级反动技术“权威”根据什么外国规定，胡说冶炼这种钢的炉龄是不能超过十炉的，否则对于钢锭质量是有问题的。厂里的走资派竟命令工人照办。在这些资产阶级反动技术“权威”的瞎指挥下，不但生产上不去，钢的成材率只有百分之一点五，浪费了国家大量的宝贵金属材料。"},{"type":"paragraph","text":"二十号炉的同志看到这种情况，心里焦急万分!他们根据自己多年的实践经验，经过反复的研究讨论，认为用不着每逢炼到十炉钢就重新砌炉。他们怀着对伟大领袖毛主席无限的忠诚，不怕厂里走资派和资产阶级反动技术“权威”的管、卡、压，大胆打破洋框框，先后把炉龄提高到十二炉、十三炉、十五炉。"},{"type":"paragraph","text":"今年以来，二十号炉的同志们批判了中国赫鲁晓夫及其在本厂的代理人的修正主义企业路线，遵照毛主席“人类总得不断地总结经验，有所发现，有所发明，有所创造，有所前进”的伟大教导，加强三班团结，改进操作方法，终于攻破了“前期炉、后期炉不能炼241号钢”的旧框框，大大地提高了生产率。他们还勇敢地冲破了补炉这一关，一旦发现炉衬有毛病，就一面坚持生产，一面进行补炉，打破了资产阶级反动技术“权威”认为补炉不能炼241号钢的限制，把冶炼241号钢的炉龄从资产阶级反动技术“权威”规定的只能炼十炉提高到七十炉，钢的成材率提高了几十倍。"},{"type":"paragraph","text":"上海七○二九厂革委会办公室"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"28d6553eca"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
