<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"在毛泽东思想哺育下迅速成长新中国女飞行员展翅翱翔十五年为社会主义建设作出重要贡献","authors":[],"dates":[{"year":1966,"month":3,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京7日电　在毛泽东思想哺育下成长起来的新中国的女飞行员，已经在祖国的天空展翅飞翔了十五年。她们不仅为国家社会主义建设作出了许多贡献，还培养出一批批新飞行员，为妇女参加航空事业开辟了广阔的道路。"},{"type":"paragraph","text":"“三八”节前夕，这些女飞行员们回顾了十五年来为革命飞行的“航迹”，满怀革命豪情展望未来，表示一定要更好地读毛主席的书，把毛主席著作当作最高指示，飞得更好，为党和人民作出更大的贡献。"},{"type":"paragraph","text":"十五年来，这些女飞行员飞遍了祖国各地，有的已经飞行了九十多万公里。她们不分白天黑夜，不管风里雨里，执行运送器材、空投物资、抢救病人、护林灭火等任务，都完成得很出色。在长期的飞行中，许多人练成了在各种复杂气象条件下都能飞行的“全天候”飞行员。不少人连年被评为五好战士和空军部队学习毛主席著作的积极分子。被人们称为空中女闯将的秦桂芳，为了把粮食送给被大雪封住的山区工人兄弟，在零下二三十度的严寒季节，奋战四十天，飞行一百四十多小时，胜利完成了任务。第一批女飞行员陈志英、伍竹迫、阮荷珍、丘以群为了援救被风雪包围的内蒙古锡林郭勒盟的牧民，驾着飞机战胜了恶劣的气流，及时把粮食和饲料送到牧民手中。在华北人民抗洪斗争中，第二批女飞行员也勇敢地投入了斗争的行列。女飞行员韩淑琴、黄秀清等迎着风雨把大批防汛器材和食物投到最需要的地方。"},{"type":"paragraph","text":"许多女飞行员还兼任飞行教员。她们以毛泽东思想指导教学，为国家培养了一批又一批的新飞行员。经她们带出的学员，现在有的已经担任了大队长、副大队长，有的担任了中队长或机长等领导职务。一级技术能手伍竹迪，担任夜间复杂气象条件下训练飞行的教员，在教学中善于抓活思想，从解决思想问题入手解决技术难点。她总结的抓学员活思想的经验，受到教员们一致好评。女飞行指挥员陈志英在带飞学员时，处处突出政治，以政治统帅技术。为了纠正一个飞行员下滑着陆的痼癖动作，她首先提高这个学员的阶级觉悟，使这个学员树立对人民负责、为革命而飞的思想，然后在技术上循循善诱，多次示范，使他克服了痼癖动作的毛病。"},{"type":"paragraph","text":"这些女飞行员是在毛泽东思想哺育下成长起来的。近几年来，她们人人自觉地努力活学活用毛主席著作，处处照毛主席指示办事，更进一步促进了革命思想和飞行技术的迅速提高。她们很有体会地说，要想飞得好，为革命而飞的思想先要树立牢。出席过空军学习毛主席著作积极分子代表会议的女飞行员韩淑琴，反复学习《纪念白求恩》、《为人民服务》，把驾机飞行看作是自己为中国革命和世界革命服务，每次飞行浑身都充满了革命激情，不怕艰苦，不怕困难，每次任务都完成得很出色。第一批女飞行员秦桂芳技术较好，但她经常用毛主席“虚心使人进步，骄傲使人落后”的教导对照自己。她每飞一次就总结一次经验教训，并且虚心向同志们学习，作到了飞行技术精益求精。女飞行员李秀云和武秀梅有次驾机执行任务归来，遇到天气突变，机场被密集的云层盖住，千米外看不到景物，她们就以毛主席语录“热烈而镇定的情绪，紧张而有秩序的工作”来鼓励自己，不慌不忙，按着指挥员的口令穿云下降，安全着陆。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"aa4450e2d4"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
