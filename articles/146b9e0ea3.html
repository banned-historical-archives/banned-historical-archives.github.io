art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东思想在印度传播越来越广","authors":[],"parts":[{"type":"paragraph","text":"据新华社讯 印度反动派像蝙蝠害怕阳光一样，害怕战无不胜的毛泽东思想。它们恶毒地污蔑、拚命地抵制毛泽东思想在印度的传播。但是，深受苦难的印度人民无限热爱革命真理毛泽东思想。他们带着印度革命的实际问题，热烈地学习毛主席著作，同印度反动派和印共修正主义进行斗争。光辉的毛主席著作在印度传播得越来越广。"},{"type":"paragraph","text":"在印度反动派的统治中心新德里，革命群众已经翻译出版了全世界人民热爱的红色革命宝书《毛主席语录》的英文译本。西孟加拉邦、喀拉拉邦、旁遮普邦、马德拉斯邦的革命人民正在积极翻译出版《毛主席语录》的其他语文译本。"},{"type":"paragraph","text":"正在高举毛泽东思想伟大红旗，坚决开展武装斗争的印度西孟加拉邦大吉岭地区的印共革命派和革命人民，明确宣布：他们开展武装斗争，“是按照毛泽东的思想路线行事的”。他们坚定不移地贯彻毛主席的英明指示：“枪杆子里面出政权”，“革命的中心任务和最高形式是武装夺取政权，是战争解决问题。”他们在血的教训中，在斗争的实践中，越来越深刻地认识到毛主席的革命路线的伟大。他们表示要更好地学习毛主席的军事著作，掌握毛主席的战略战术，坚决走中国革命的道路，在印度广泛发展武装斗争，打倒印度反动派，夺取印度革命的胜利。"},{"type":"paragraph","text":"被反动派投入监狱中的印度革命者，在战无不胜的毛泽东思想鼓舞下，增添了无穷的战斗力量。不久前，发生了这样一件感人的事情：中国海员接到了一封从印度监狱中寄来的血书。血书的英文字是：“我们渴望得到一部世界上最宝贵的书——毛泽东的著作。伟大的毛泽东主席万岁！”写这封血书的印度革命者正在狱中遭受着印度反动派的残酷折磨。正是伟大的毛泽东思想给他们带来坚强的斗争意志和对胜利的坚定信心。每当反动派把他们打得遍体鳞伤的时候，他们就背诵毛主席语录：“一切反动派都是纸老虎。”“他们对于革命人民所作的种种迫害，归根结底，只能促进人民的更广泛更剧烈的革命。”他们在艰苦的监狱斗争中，迫切地希望从伟大导师毛主席的光辉著作中得到教导。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"146b9e0ea3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
