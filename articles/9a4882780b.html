ors":[],"dates":[{"year":1986,"month":10,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"梅县地区人民深切悼念叶剑英同志"},{"type":"paragraph","text":"表示要把叶帅家乡建设成文明富庶新侨乡"},{"type":"paragraph","text":"新华社广州10月24日电  叶剑英同志的家乡——广东省梅县地区的人民群众，深切哀悼叶剑英同志。"},{"type":"paragraph","text":"在梅县雁洋区雁上乡叶剑英同志的故居，23日有二千多名干部群众前来吊唁。人们怀着沉痛的心情缅怀叶剑英同志光辉的一生，追念他离开家乡后为人民革命事业建立的不朽功勋。梅县地、市和雁洋区的党政领导干部谈到，叶帅一向关心家乡建设，1980年5月叶帅回乡视察时，希望家乡干部群众发挥山区和侨乡的优势，努力开发山区、建设山区，使家乡人民尽快富裕起来。他们表示，一定不辜负叶帅的殷切期望，尽快地把梅县地区建设成为文明富庶的新侨乡。"},{"type":"paragraph","text":"叶剑英同志的母校——梅县东山中学的师生员工，22日集会沉痛悼念叶剑英同志。全国人大代表、梅县市政协副主席、原东山中学校长李泉隆说，叶帅曾为母校题词：“年年桃李，岁岁芬芳，努力教学，为建设社会主义强国而奋斗”，这是叶帅对后人的勉励和希望。东山中学现任校长罗传厚表示，一定要继承叶帅的遗志，办好东山中学。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9a4882780b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
