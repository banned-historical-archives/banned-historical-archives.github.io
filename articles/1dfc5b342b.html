script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"这就是阶级压迫和阶级剥削","authors":["赵双昌"],"dates":[{"year":1963,"month":6,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"今天我们全班同学在出工前参观了过去地主的住宅，受到一次生动的阶级教育。"},{"type":"paragraph","text":"生产队长带领我们走进一座四合院——这就是过去地主的住宅。前面是个大院子，中间是客厅，两边是厢房和套间。这座建筑非常坚固、精致。墙壁上有精工巧匠画的花纹图案，所有的梁柱原来都是红漆的，地上铺有一尺见方的大理石。旁边的社员说这座住宅造了三年多，真是“徒弟进去，师傅出来”。许多农民被迫放弃农活给地主造房子，而他们自己却住不起瓦房，只好在草屋里安身。他们吃的是糠菜粥汤，有上顿没下顿的，但是照样要交租完粮。解放后在党的领导下，他们翻身作了主人，当年压迫剥削他们的地主被斗倒了，这座四台院也换了主人，现在它是农民的住宅和生产队的粮仓。可是那个地主还想变天复辟，去年他就曾向队干部说什么要收回“他的”土地和房子，真是白日做梦!"},{"type":"paragraph","text":"今天的参观使我具体生动地懂得什么叫阶级压迫和阶级剥削，也使我真正懂得阶级敌人总是不甘心于他们的失败的，他们还在做复辟的美梦。今后我要时刻保持革命的警惕性，永远坚定地站在劳动人民这一边，和国内外阶级敌人斗争到底。　高二丁班　赵双昌"},{"type":"paragraph","text":"6月9日"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1dfc5b342b"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
