"],"dates":[{"year":1981,"month":6,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报北京专讯　为了庆祝中国共产党诞生六十周年，大型彩色精装摄影集《雪山草地行》将于六月出版发行。"},{"type":"paragraph","text":"叶剑英同志为这本影集题写了书名。"},{"type":"paragraph","text":"这本影集中的照片是由新华通讯社广东分社记者杨绍明拍摄的。去年七月，他到四川省西北部采访，沿着当年红军爬雪山、过草地的路线，搜集了关于红军长征的大量珍贵史料。影集选编的一百六十幅彩色照片和所作的简要说明，介绍了雪山草地一带重要的革命历史纪念地和社会主义建设的新面貌，以及地理环境、民族宗教、风土人情等。　(张德祥)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e02cb31759"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
