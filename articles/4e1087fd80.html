art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席刘主席接见缅甸贵宾","authors":[],"parts":[{"type":"paragraph","text":"新华社29日讯 毛泽东主席、刘少奇主席今天晚间接见了缅甸联邦总理吴努和夫人及女儿、缅甸国防军总参谋长奈温将军和夫人，同时被接见的缅甸贵宾还有：联邦政府克钦邦事务部长杜瓦信瓦瑙，联邦政府教育与司法部长吴埃貌博士，中长貌貌准将，缅甸联邦检察总长吴延昂，吴努总理的顾问吴旺，掸邦政府教育和卫生部长苏吞埃，克钦邦政府教育表团团长苏敏上校，外交部常任秘书巴林顿，国会议员吴达信、吴波信，缅甸联邦党代表波丁貌季，民族团结阵线吴钦等。"},{"type":"paragraph","text":"缅甸驻中国大使叫温和夫人也参加了接见。"},{"type":"paragraph","text":"接见时在座的，在必董必武副主席，朱德委员长，周恩来总理，黄炎培、陈叔通副委员长，贺龙、陈毅、罗瑞卿奚若，外交部副部长章汉夫，中缅边界联合委员会中国方面代表姚仲明，中国驻缅甸大使李一氓等。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4e1087fd80"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
