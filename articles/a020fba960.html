ical-archives/banned-historical-archives0/main/maoquanji50.pdf"],"article":{"title":"对两报一刊编辑部文章《把新闻战线的大革命进行到底》的批语","alias":"","parts":[{"type":"paragraph","text":"对两报一刊编辑部文章《把新闻战线的大革命进行到底》的"},{"type":"paragraph","text":"批语"},{"type":"paragraph","text":"（1968年8月）"},{"type":"paragraph","text":"此文可用。但从13页起的两节中读起来较沉懵，空话太多，新意太少，宜加删改。并宜接触当前政治斗争。"},{"type":"paragraph","text":"[1]中共中央文化革命小组组员姚文元1968年8月18日送审的这篇《人民日报》、《红旗》杂志、《解放军报》编辑部文章，共分5节。毛泽东审阅时，删去了第四节中以下一段话：“毛泽东思想是马克思列宁主义发展的第三个里程碑，是放之四海而皆准的普通真理。毛泽东思想在世界范围内的广泛传播，对于国际共产主义运动，对于整个世界革命，具有深远的历史作用。通过各种新闻手段向全世界大力宣传毛泽东思想，传播毛主席的伟大声音，这是我们对战斗的各国无产阶级和被压迫人民、被压迫民族的最大支援。”这篇文章发表在1968年8月25日出版的《红旗》杂志第二期和9月1日《人民日报》《解放军报》。毛泽东批语中说的“从13页起的两节”，指这篇文章的第四、五两节，发表前作了一些删改。"}],"authors":["毛泽东"],"dates":[{"year":1968,"month":8}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":286,"page_end":286},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a020fba960"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
