ical-archives/banned-historical-archives0/main/maoquanji35.pdf"],"article":{"title":"毛泽东等祝贺保加利亚解放十一周年的电报","alias":"","parts":[{"type":"paragraph","text":"毛泽东等祝贺保加利亚解放"},{"type":"paragraph","text":"十一周年的电报！"},{"type":"paragraph","text":"（1955年9月7日）保加利亚人民共和国国民议会主席团主席格·达米扬诺夫同志，保加利亚人民共和国部长会议主席伏·契尔文科夫同志，保加利亚人民共和国外交部长明·涅伊切夫同志："},{"type":"paragraph","text":"值此保加利亚从法西斯主义的奴役下解放十一周年之际，我们谨代表中华人民共和国政府和人民向你们，并通过你们向保加利亚人民共和国政府和人民致衷心的祝贺。"},{"type":"paragraph","text":"中华人民共和国政府和人民怀着极其兴奋的心情注视着保加利亚人民共和国十一年来在光荣的保加利亚共产党的领导下，在社会主义建设事业中所取得的巨大成就。这些成就使保加利亚人民获得了日益繁荣的幸福生活，并加强了以苏联为首的和平、民主、社会主义阵营的力量。祝兄弟的保加利亚人民在实现第二个五年计划和保卫欧洲和世界和平的事业中获得更大的胜利。我们深信中保两国"},{"type":"paragraph","text":"[1]这是毛泽东以中华人民共和国主席的名义和全国人民代表大会常务委员会委员长刘少奇、国务院总理兼外交部长周恩来联名给保加利亚人民共和国国民议会主席团主席格·达米扬诺夫、保加利亚人民共和国部长会议主席伏·契尔文科夫、保加利亚人民共和国外交部长明·涅伊切夫的电报。祝贺保加利亚解放十一周年。毛泽东全集第三十五卷的兄弟友谊必将随着我们两国社会主义建设事业的推进而更加巩固和发展。"},{"type":"paragraph","text":"中华人民共和国主席毛泽东中华人民共和国全国人民代表大会常务委员会委员长刘少奇中华人民共和国国务院总理兼外交部长周恩来"},{"type":"paragraph","text":"一九五五年九月七日于北京"}],"authors":["毛泽东"],"dates":[{"year":1955,"month":9,"day":7}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":346,"page_end":347},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ed0e383e2e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
