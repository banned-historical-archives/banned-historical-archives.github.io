script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"鞍钢党委在揭批“四人帮”斗争中认真落实党的政策给受迫害的老劳模彻底平反恢复名誉","authors":[],"dates":[{"year":1978,"month":6,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社沈阳六月二日电　鞍钢党委在揭批“四人帮”的斗争中，认真落实党的政策，给一批受“四人帮”迫害的老劳模彻底平反，恢复名誉，有的已重新命名为劳动模范。"},{"type":"paragraph","text":"建国以来，鞍钢涌现出一大批劳动模范，其中有些是闻名全国的先进人物。如老英雄孟太，“走在时间前面的人”王崇伦，著名的电机专家宋学文，模范家属王秀兰等。"},{"type":"paragraph","text":"“四人帮”一伙疯狂破坏社会主义建设事业，把老劳模视为眼中丁、肉中刺，残酷诬陷迫害他们。孟太就是深受“四人帮”及其在鞍钢的党羽迫害的老模范之一。"},{"type":"paragraph","text":"鞍钢在恢复时期，老孟太以厂为家，艰苦奋斗，守炉餐，伴炉眠，带领群众跑遍厂区，拣来各种备件、材料，足够修复几坐高炉。从此，有名的“孟太仓库”诞生了。鞍钢各厂矿学习孟太的精神，克服种种困难，在一片废墟上很快建成了我国最大的钢铁工业基地。孟太为我国社会主义建设作出了卓越贡献，是中国工人阶级的优秀代表。但是，“四人帮”及其在鞍钢的党羽和代理人，却把这样一个受广大人民群众遵崇的老劳模诬陷为“修正主义分子”、“工贼”，对他进行残酷的打击迫害。一九六七年九月孟太在北京逝世，他们竟不准开追悼会，不准宣传孟太的事迹。他们甚至丧心病狂地要把孟太的骨灰从八宝山革命公墓清除出去。"},{"type":"paragraph","text":"在“四人帮”横行的时候，鞍钢职工怀着满腔义忿，记下了“四人帮”对老劳模实行法西斯专政的罪行。打倒了“四人帮”，广大群众迫切要求为老劳模恢复名誉。"},{"type":"paragraph","text":"去年九月三十日，鞍钢党委首先给老英雄孟太恢复名誉，召开了隆重的追悼大会，为孟太昭雪不白之冤，同时作出了向孟太学习的决定。全公司大张旗鼓地宣传孟太精神和他的光辉事迹。"},{"type":"paragraph","text":"鞍钢党委在落实党的政策，进行这一工作的过程中，采取的措施是:一、查清资产阶级帮派体系打击、迫害老劳模的种种阴谋活动，给老劳模恢复名誉。莫须有的罪名一律摘掉，入档案的黑材料统统销毁。二、对老劳模的职务，根据不同情况，进行合理安排。三、老劳模受迫害期间扣发的工资全部补发。四、对受株连的家属、亲属，向他们所在单位认真说明情况，澄清问题。五、对有些劳动模范或标兵，根据他们的表现，重新命名，给他们披红戴花，广泛宣传他们的先进事迹。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c56a7800e2"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
