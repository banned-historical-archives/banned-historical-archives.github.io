ical-archives/banned-historical-archives0/main/maoquanji27.pdf"],"article":{"title":"致班禅额尔德尼电","alias":"","parts":[{"type":"paragraph","text":"致班禅额尔德尼电"},{"type":"paragraph","text":"（1949年11月23日）班禅额尔德尼先生："},{"type":"paragraph","text":"接读十月一日来电？，甚为欣慰。西藏人民是爱祖国而反对外国侵略的，他们不满意国民党反动政府的政策，而愿意成为统一的富强的各民族平等合作的新中国大家庭的一分子。中央人民政府和中国人民解放军必能满足西藏人民的这个愿望。希望先生和全西藏爱国人士一致努力，为西藏的解放和汉藏人民的团结而奋斗。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"朱德"},{"type":"paragraph","text":"一九四九年十一月二十三日[1]班禅额尔德尼·确吉坚赞是西藏宗教领袖之一。"},{"type":"paragraph","text":"[2]指班禅额尔德尼1949年10月1日从青海发给毛泽东和朱德的电报。电报中表示拥护中央人民政府成立，期望西藏早日解放。"}],"authors":["毛泽东"],"dates":[{"year":1949,"month":11,"day":23}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":537,"page_end":537},"tags":[{"name":"毛泽东","type":"人物"},{"name":"朱德","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5572ebc8ef"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
