art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"我国体育战线形势大好粉碎“四人帮”后，我国运动员十八次打破世界纪录，八次打破世界青少年纪录，获十八个世界冠军和世界性比赛冠军","authors":[],"parts":[{"type":"paragraph","text":"我国体坛老将徐寅生在第四届全运会开幕前夕应记者之请发表了谈话，他在分析体育战线大好形势时说："},{"type":"paragraph","text":"粉碎“四人帮”近三年来，特别是党的十一届三中全会以来，我国体育战线发生了很大变化，广泛深入地揭批林彪、“四人帮”，澄清了路线上、思想上、理论上的是非。端正思想路线，人们精神大解放。群众性体育活动重新兴盛起来。体育运动技术水平有较快回升。粉碎“四人帮”以后，到今年九月十日为止，我国运动员十八次打破世界纪录，八次打破世界青少年纪录；获得了十八个世界冠军和世界性比赛冠军，二百五十五个重要国际比赛冠军。遭受林彪、“四人帮”严重摧残的体育战线，在短短几年里有这样大的进步，是非常可喜的，非常令人鼓舞的。"}],"alias":""},"tags":[{"name":"林彪","type":"人物"},{"name":"四人帮","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4002adec1f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
