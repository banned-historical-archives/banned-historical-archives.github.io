"江青","陈伯达"],"dates":[{"year":1966,"month":7,"day":22}],"is_range_date":false,"parts":[{"text":"江青陈伯达在北京大学的讲话","type":"title"},{"text":"江青陈伯达","type":"authors"},{"text":"〖七月二十二日上午江青、陈伯达同志到北京大学看大字报，约十一点在燕南园召集部分同学座谈，听取各种不同意见，并作简短讲话。〗","type":"appellation"},{"text":"江青同志说：党中央万岁！北大同学革命万岁！同学们，我没有多少话可讲。我代表毛主席来看你们，听了你们的意见，看了你们的大字报，情况不太清楚，没有什么可讲的，请伯达同志讲讲。","type":"paragraph"},{"text":"陈伯达同志说：我没有什么话好讲，因为情况不太了解。我是来调查研究，根据毛主席工作方针，要进行调查研究，工作组要走群众路线。要听大家的意见，你们看到昨天《人民日报》社论没有。还是这个态度。毛主席说要从群众中来，到群众中去。要多听多看多想，多倾听群众意见，你们有很多不同意见，有不同的意见不要紧，这是很好的现象，还是要回去辩论，把问题弄清楚。我就说这些。","type":"paragraph"}],"comments":[],"origin":"来源：一九六六年十月中央教育部八•一八红卫兵总部编印《无产阶级文化大革命运动期间中央及有关负责同志讲话（选编 ）》（第一集）；《大字报选 第二集》（北京：一院大字报选编小组，1966.12）","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"江青","type":"人物"},{"name":"陈伯达","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"发言"}]},{"id":"jqjianghua","type":"pdf","name":"江青十年讲话汇编","internal":false,"official":false,"author":"江青，本世纪初国内老左编","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/jqjianghua.pdf"],"article":{"title":"江青陈伯达在北京大学的讲话","description":"","dates":[{"year":1966,"month":7,"day":22}],"parts":[{"text":"江青陈伯达在北京大学的讲话","type":"title"},{"type":"paragraph","text":"〖七月二十二日上午江青、陈伯达同志到北京大学看大字报，约十一点在燕南园召集部分同学座谈，听取各种不同意见，并作简短讲话。〗"},{"type":"paragraph","text":"江青同志说：党中央万岁！北大同学革命万岁！同学们，我没有多少话可讲。我代表毛主席来看你们，听了你们的意见，看了你们的大字报，情况不太清楚，没有什么可讲的，请伯达同志讲讲。"},{"type":"paragraph","text":"陈伯达同志说：我没有什么话好讲，因为情况不太了解。我是来调查研究，根据毛主席工作方针，要进行调查研究，工作组要走群众路线。要听大家的意见，你们看到昨天《人民日报》社论没有。还是这个态度。毛主席说要从群众中来，到群众中去。要多听多看多想，多倾听群众意见，你们有很多不同意见，有不同的意见不要紧，这是很好的现象，还是要回去辩论，把问题弄清楚。我就说这些。"}],"comment_pivots":[],"is_range_date":false,"authors":["江青","陈伯达"],"comments":[],"page_start":17,"page_end":17,"alias":""},"tags":[{"name":"江青","type":"人物"},{"name":"陈伯达","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4e8faa1b4c"},"b
