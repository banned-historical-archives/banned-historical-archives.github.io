" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"川西区贪污、浪费现象严重","authors":[],"dates":[{"year":1952,"month":1,"day":8}],"is_range_date":false,"parts":[{"text":"川西区贪污、浪费现象严重","type":"title"},{"text":"【川西分社八日讯】川西区、市两级机关反贪污、反浪费和反官僚主义运动，于十二月初开始，现即将进入检举、坦白阶段。","type":"paragraph"},{"text":"据初步检查，铺张浪费现象是普遍的，较严重的是行署等高级领导机关，部分高级干部生活上不遵守制度，随意铺张浪费。行署部门(除公安厅外)估计浪费即有四亿多元。贸易部门在商品流转费用方面的浪费有八十六亿，商品与资金积压，仅百货公司即有百亿左右。盐务局去年资金积压约一百一十亿。银行经常积压资金有二百多亿，因积压资金而受到影响的利息损失等浪费约百亿左右。工业方面：一般设备利用率只达百分之四十左右。","type":"paragraph"},{"text":"贪污方面：财经部门从一九五零年一月至一九五一年十一月，初步发现的贪污分子即有一零三二人(其中共处死四十人，判徒刑一五五人，清洗开除二三三人，行政纪律处分一九六人)，共贪污十一亿六千万元。贪污最多的是粮食部门，次为税务、贸易部门。贪污分子中，留用人员占大多数。","type":"paragraph"}],"comments":[],"origin":"新华通讯社编《内部参考》1952年1月10日","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"df87879dff"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
