rt":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东思想的科学体系（下）","authors":[],"parts":[{"type":"paragraph","text":"第四，关于政策和策略。毛泽东精辟地论证了革命斗争中政策和策略问题的极端重要性，指出政策和策略是党的生命，是革命政党一切实际行动的出发点和归宿，必须根据政治形势、阶级关系和实际情况及其变化制定党的政策，把原则性和灵活性结合起来。在对敌斗争和统一战线工作等方面，他提出了许多重要的政策和策略思想。"},{"type":"paragraph","text":"第五，关于思想政治工作和文化工作。毛泽东根据“一定的文化（当作观念形态的文化）是一定社会的政治和经济的反映，又给予伟大影响和作用于一定社会的政治和经济；而经济是基础，政治则是经济的集中表现”这个基本观点，提出了许多具有长远意义的重要思想。如：关于思想政治工作是经济工作和其他一切工作的生命线，要实行政治和经济的统一、政治和技术的统一、又红又专的方针；关于发展民族的、科学的、大众的文化，实行百花齐放、百家争鸣、推陈出新、古为今用、洋为中用的方针，等等。"},{"type":"paragraph","text":"第六，关于党的建设。毛泽东特别注重从思想上建党，提出党员不但要在组织上入党，而且要在思想上入党，经常注意以无产阶级思想改造和克服各种非无产阶级思想。他指出，理论和实践相结合的作风，和人民群众紧密地联系在一起的作风，以及自我批评的作风，是中国共产党区别于其他任何政党的显著标志。建国前夕和建国以后，鉴于我们党成为领导全国政权的党，毛泽东多次提出务必使同志们继续保持谦虚谨慎、戒骄戒躁、艰苦奋斗的作风，警惕资产阶级思想的侵蚀，反对脱离群众的官僚主义。"},{"type":"paragraph","text":"毛泽东思想的活的灵魂，是贯穿于上述各个理论的立场、观点和方法，有三个基本方面，即实事求是、群众路线、独立自主。"},{"type":"paragraph","text":"（据新华社）"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c971e1f00f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
