<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"克服右倾保守　击退翻案妖风","authors":[],"dates":[{"year":1968,"month":4,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编者按:最近，阶级敌人掀起了一股右倾翻案的反革命逆流。一小撮叛徒、特务、顽固不化的走资派和地、富、反、坏、右分子，以为时机到了，他们要交好运道了，有的外出“串连”，有的交头接耳，有的煽风点火，造谣生事，有的甚至得意地唱起歌来。他们纷纷跳了出来，妄图翻案。这些家伙热昏了头，完全错误地估计了形势，高兴得太早了。阶级敌人掀起的右倾翻案逆流，不过是翻了几片浪花，瞬息又变成几个泡沫，被革命的洪流冲走了。"},{"type":"paragraph","text":"无产阶级文化大革命越接近全面胜利，阶级斗争就越发尖锐、激烈，阶级敌人就越要猖狂反扑。毛主席教导我们:“敌人是不会自行消灭的。”“帝国主义者和国内反动派决不甘心于他们的失败，他们还要作最后的挣扎。”我们必须克服右倾保守思想，提高警惕，擦亮眼睛，密切注视阶级敌人的动向。只许他们规规矩矩，不许他们乱说乱动。如果发现他们还不老实，就发动群众，狠狠地斗一斗!再不老实，再斗!直到把他们斗倒斗臭、送进历史垃圾箱为止。"},{"type":"paragraph","text":"编辑同志:"},{"type":"paragraph","text":"无产阶级文化大革命越是接近全面胜利，一小撮阶级敌人就越是要进行猖狂的反扑。最近，阶级敌人刮起的一股右倾翻案的反革命妖风，必须引起我们一切革命同志的密切注意。"},{"type":"paragraph","text":"这股反革命妖风一刮，我厂一小撮躺下装死的阶级敌人，就跳了出来，妄图为“联司”一小撮坏蛋、为陈、曹及其总后台中国赫鲁晓夫翻案。一小撮牛鬼蛇神显得格外活跃，以为翻案的时机已到，蠢蠢欲动。有的以生病为名，请假出去“串连”，“窥测方向”；有的在暗中煽风点火，造谣生事，唯恐天下不乱。有个坏蛋在去年“八·四”革命行动以后，曾经召开过黑会，制订了什么“隐蔽精悍，以待时机”的反革命纲领，不久前被革命群众揪出来了，最近还在写检查。可是，当这股妖风一刮，他就猖狂地说:“我没有什么好写的了。”还有一个反动分子竞得意忘形地说:“这一下有好戏看了。”猖狂之极，简直到了不可容忍的地步。"},{"type":"paragraph","text":"毛主席教导我们:“蒋介石对于人民是寸权必夺，寸利必得。我们呢?我们的方针是针锋相对，寸土必争。”对敌人的仁慈，就是对人民的犯罪，就是对毛主席的不忠，难道我们能允许阶级敌人翻案吗?我们要奋起毛泽东思想的千钧棒，迎头痛击阶级敌人的翻案活动。这些家伙从哪里钻出来，我们就坚决从哪里把它打下去1"},{"type":"paragraph","text":"工总司上海柴油机厂东方红总部“红匕首”"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海市工人革命造反总司令部（工总司）","type":"人物"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bc27ba3ac9"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
