" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"西安市工商界四反运动已获初步战果　二月一日将向非法商人发动全面进攻","authors":[],"dates":[{"year":1952,"month":1,"day":27}],"is_range_date":false,"parts":[{"text":"西安市工商界四反运动已获初步战果　二月一日将向非法商人发动全面进攻","type":"title"},{"text":"【西北总分社二十七日讯】西安市工商界四反运动已获初步成绩。截至二十日止，工商界坦白检举已有一万五千二百七十多件(店员、学徒检举案件不在内)，行贿人民币六十四亿多元，漏税八亿多元，另有行贿物资黄金一百一十四两，白洋一万余元，面粉六千袋，汽油二万二千加仑，因行贿而盗窃国家财产的数字尚无法统计。这些案件大部分是小的，一千万至五千万者仅七十六件，五千万至一亿者五件，一亿以上的三件。按照目前情况估计，小问题已暴露得差不多，中等问题暴露了一部分，大问题刚露头。在此以前，运动的声势还不够大，主要由于前一个时期忙于机关内部整风，对工商界还没有真正进攻；另一原因是工商业者消极应付和积极抵抗。为此，西安市委于二十日发出关于开展工商界四反运动的紧急指示，确定自一月二十日起基本上结束党、政机关和群众团体中的坦白检举阶段，转入处理问题阶段。同时积极整顿党、工人阶级与群众队伍，分析研究奸商坦白材料，作好思想上和组织上的准备工作，组织工商业者、店员、学徒和机关工作人员学习周总理、薄一波同志的报告。到二月一日开始向资产阶级发动全面进攻，先召集全市各行业经理、店员、学徒五万人以上的群众动员大会，随后开始大规模的坦白检举，预计三月中旬结束战斗。","type":"paragraph"}],"comments":[],"origin":"新华通讯社编《内部参考》1952年1月31日","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"384e5194c3"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
