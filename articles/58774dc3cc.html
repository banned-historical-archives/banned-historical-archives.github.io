ical-archives/banned-historical-archives8/main/maoquanji21.pdf"],"article":{"title":"中央关于谈判重点及对国民党与美国的态度问题的指示","alias":"","parts":[{"type":"paragraph","text":"中央关于谈判重点及对国民党"},{"type":"paragraph","text":"与美国的态度问题的指示"},{"type":"paragraph","text":"（1946年4月20日）周："},{"type":"paragraph","text":"皓夜电悉。"},{"type":"paragraph","text":"（一）力争东北停战及解决政治问题，力争民主宪法（其中不得有任何利于独裁的条文)，力争政协决议百分之百兑现，必须如此，方可将国大省宪两个形式问题留待以后再争。"},{"type":"paragraph","text":"（二）不要准备对国美两方面同时弄僵。我们坚决反对国民党内战与独裁方针，力争和平与民主，为此目的，不怕与国民党弄僵。但对美国则除非他恢复赫尔利政策，公开全面地赞助国民党实行内战与独裁，我们不应和他弄僵。因此，我党一切反内战、反独裁的主张（东北、宪草、国大、自由、组府、运兵、借款等）均应向马歇尔严正表示意见，但应避免用激烈态度与抗议形式。周马之间仍应尽可能保持友好关系，使国民党无隙可乘。"},{"type":"paragraph","text":"（三）极力团结民盟及孙科，但对张君励应警惕，他的宪草是利于独裁的。"},{"type":"paragraph","text":"中央卯号亥我们坠决及对网民壳内我力学和平与民主庆复森尔利政策1"},{"type":"paragraph","text":"行为战"},{"type":"paragraph","text":"周鸟之们仍舒得号系"},{"type":"paragraph","text":"毛泽东为中共中央起草的《关于谈判重点及对国民党与美国的态度问题的指示》的手稿。"}],"authors":["毛泽东"],"dates":[{"year":1946,"month":4,"day":20}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":271,"page_end":272},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"58774dc3cc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
