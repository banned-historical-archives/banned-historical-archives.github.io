rt":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"艰苦奋斗奔四化","authors":[],"parts":[{"type":"paragraph","text":"一九六三年，周恩来同志在为雷锋题词时，把“奋不顾身的无产阶级斗志”作为雷锋精神的四个方面之一；八十年代第一春，邓小平同志在关于目前的形势和任务的报告中，把“艰苦奋斗的创业精神”列为实现四化必须具备的四个前提之一。"},{"type":"paragraph","text":"为革命事业奋不顾身和艰苦奋斗，是社会主义一代新人必须具备的优秀品德，更是我们建设四个现代化的社会主义强国必须发扬的革命精神。我们的国家是一个大国，又是一个穷国，底子薄，科学技术落后。把我国建设成为一个社会主义的强国，把我军建设成为一支现代化的革命军队，是一个长期的艰苦奋斗的过程，一定要提倡和实行艰苦创业的精神。"},{"type":"paragraph","text":"雷锋是艰苦奋斗的典型。这里介绍的一些单位和同志也是艰苦创业的榜样。"},{"type":"paragraph","text":"我们讲艰苦奋斗，就要在思想上聚精会神，一心奔四化；工作上脚踏实地、埋头苦干；学习上勤奋努力，锲而不舍；生活上吃苦在前，享受在后。要象雷锋那样，工作上向积极性最高的同志看齐，生活上向水平最低的同志看齐。"},{"type":"paragraph","text":"我们讲艰苦奋斗，就要从自己做起，从一点一滴做起，只要有利于四化，有利于国防事业，就积极主动去做，扎扎实实地做，要象雷锋那样，把有限的生命投入到无限的为人民服务之中去。"},{"type":"paragraph","text":"发扬艰苦奋斗精神，领导干部要带头，以便造成一种以艰苦为荣的好风气。五中全会公报号召我们，万众一心，紧张努力，创造优异的成绩迎接党的十二大召开。我们每个同志都学习雷锋，发扬艰苦奋斗精神，自己的工作就能越做越好；全军同志都发扬艰苦奋斗精神，部队建设就会大大加强；人人都艰苦奋斗，四化大业就大有希望！"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"449b62c8ef"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
