":[{"year":1975,"month":5,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"邓小平副总理会见阿尔及利亚代表团和凯卢大使"},{"type":"paragraph","text":"新华社一九七五年四月三十日讯　国务院副总理邓小平今天上午会见了由阿尔及利亚革命委员会委员、农业和土地改革部长、土地革命全国委员会主席穆罕默德·拉比·塔耶比率领的阿尔及利亚代表团全体成员和阿尔及利亚新任驻中国大使穆罕默德·梅萨乌德·凯卢。"},{"type":"paragraph","text":"邓小平副总理同塔耶比部长、凯卢大使等阿尔及利亚朋友进行了亲切友好的谈话。"},{"type":"paragraph","text":"阿尔及利亚驻中国大使馆参赞德赫利参加了会见和谈话。"},{"type":"paragraph","text":"参加会见和谈话的还有我国农林部长沙风，外交部礼宾司司长朱传贤，西亚北非司代司长周觉，有关方面负责人李步霄、李永凯、马凌、秦凤翥等。（附图片）"},{"type":"paragraph","text":"下图：邓小平副总理会见阿尔及利亚代表团。"},{"type":"paragraph","text":"新华社记者摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c5c406958b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
