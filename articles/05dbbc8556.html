<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"毛泽东关于工业部门学解放军的信","authors":["毛泽东"],"dates":[{"year":1963,"month":12,"day":16}],"is_range_date":false,"parts":[{"text":"关于工业部门学解放军的信","type":"title"},{"text":"毛泽东","type":"authors"},{"text":"林彪、贺龙、荣臻、瑞卿、肖华同志：","type":"appellation"},{"text":"国家工业各个部门现在有人提议从上至下（即从部到厂矿）都学解放军，都设政治部、政治处和政治指导员，实行四个第一和三八作风。我并建议从解放军调几批好的干部去工业部门那里去做政治工作（分几年完成，一年调一批人），如同石油部那样。据薄一波同志说：现在已有水利电力部、冶金工业部、化学工业部正在学习石油部学解放军的办法在做。我已收到冶金部学解放军的详细报告，他们主张从上到下设政治部、处和指导员。看来不这样做是不行的，是不能振起整个工业部门（还有商业部门，还有农业部门）成百万成千万的干部和工人的革命精神的。要这样做，政治干部的来源，我想有四个办法解决：一是从解放军调出一部分强的而又可能调出的政治干部和懂政治的军事干部送到工、商、农部门中去（先着重工业部门）；二是由工业及其他部门派得力同志到解（放）军的军师团去学习几个月；三是由他们派人到现在莫文骅管的政治学院去当学生，按期毕业，回去工作；四是他们自己抓起来做，将解放军一套思想政治工作条例、办法，拿去略加改变（必需适合各个不同部门的情况），作为自己的东西去实行，现在已有四个部这样做了。看来这第四项办法是主要的，因为解放军不可能调出很多的干部。但解放军要给他们以帮助，是肯定的。请你们考虑一下是否可行，然后我和中央常委同志同你们谈一下（有个别管工业的同志参加。林有病可不出席），把方针确定下来。这个问题我考虑了几年了，现在因为工业部门主动提出学解放军，并有石油部的伟大成绩可以说服人，这就到了普遍实行的时候了。解放军的思想政治工作和军事工作，经林彪同志提出四个第一、三八作风之后，比较过去有了一个很大的发展，更具体化又更理论化了，因而更便于工业部门采用和学习了。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"05dbbc8556"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
