ical-archives/banned-historical-archives0/main/maoquanji29.pdf"],"article":{"title":"征调老战士补充志愿军部队","alias":"","parts":[{"type":"paragraph","text":"征调老战士补充志愿军部队凹"},{"type":"paragraph","text":"（1950年12月26日）"},{"type":"paragraph","text":"现美英军及李承晚军合计尚有二十余万人，还须打几个大仗，才能彻底解决问题。我们为了扩大胜利的成果，彻底歼灭美帝在朝鲜的侵略军队，援助朝鲜人民争取独立、自由、解放，保卫我们祖国的安全，造成收复台湾的有利形势，巩固中国革命的胜利果实，保卫东亚及世界的和平，我们必须进一步地扩大抗美援朝保家卫国的运动，按照军委十二月二十七日的决定分期征调一部分老战士，我们号召全体人民解放军（除新疆），每个连队征调二十人，必须使他们自觉自愿的参加中国人民志愿部队，以巩固和提高人民志愿部队的作战力量，彻底战胜敌人。必须使人民解放军指战员明白，参加人民志愿军是我们人民战士的无尚光荣，也是我们锻炼自己、学习对美帝作战经验、为祖国立功的最好机会。"},{"type":"paragraph","text":"[1]这是毛泽东对中央人民政府人民革命军事委员会总政治部《关于执行军委征调老战士补充志愿部队的政治动员指示》所作的修改。文中用宋体字排印的是毛泽东加写和改写的文字。"},{"type":"paragraph","text":"[2]这里指南朝鲜军部队。"}],"authors":["毛泽东"],"dates":[{"year":1950,"month":12,"day":26}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":465,"page_end":465},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1bce2b5217"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
