dates":[{"year":1952,"month":3,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"重庆“星四聚餐会”案件已经全部破获。从这个案件里，充分证明了资产阶级三年来对于人民民主政权发动了猖狂的进攻，而且证明了这种进攻是有组织、有计划进行的。"},{"type":"paragraph","text":"“星四聚餐会”是重庆私营钢铁机器业奸商的一个非法组织，并且以它为核心，逐渐由一个混合组织发展成“星五聚餐会”、“星六聚餐会”、“造船小组”、“十一厂联络处”和“会计师座谈会”等几个专业的组织，并由最初时期的十二个厂发展到四五十个厂。他们的组织极其严密，并且用“派进来”和“拉过去”的办法，在国家机关内部布置了大规模的“坐探网”。在统一的指挥之下里应外合向国家大举进攻。他们进攻的目标是钢铁工业、成渝铁路、造船工业、纺织机械工业等国家经济的重要部门。他们就针对着这些经济部门野心勃勃地施展他们所擅长的垄断操纵、投机欺诈的惯技，极力钻营，盗窃和篡夺国家经济权益。在经济上获得了发展之后，并开展了它的政治攻势，有计划地向人民民主国家进行经济和政治的双管齐下的进攻。"},{"type":"paragraph","text":"事实说明了资产阶级就是这样的企图把我们的国家拉上腐朽的资本主义的道路上去。这是我们坚决不能容许，我们必须贯彻三反、五反斗争，彻底打退资产阶级的猖狂进攻。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e5275d6fe3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
