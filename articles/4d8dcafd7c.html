r":1946,"month":5,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【法国新闻社北平十四日电】报载中共主席毛泽东氏，已飞赴莫斯科，就政府军接收东北所引起之各项问题，与苏联方面有所讨论云云。记者当以此事询诸昨日自延安抵此之某可靠人士，据称:此项传说绝非事实。毛氏仍在延安。目前并无任何迹象，证明有成行之准备，除非纯粹为疗疾，则当别论。盖毛氏患疾甚重，已历相当时日，闻其所患者为脑瘤，自须长期休养，惟外传渠完全解除政务之说，全为不测云。"}],"comments":[],"origin":"法国新闻社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4d8dcafd7c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
