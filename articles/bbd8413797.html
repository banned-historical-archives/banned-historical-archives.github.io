果河在怒吼》","authors":[],"dates":[{"year":1966,"month":9,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"索马里贵宾参观全国农业展览馆时说"},{"type":"paragraph","text":"毛泽东思想在中国生了根"},{"type":"paragraph","text":"穆克塔尔议长等观看《刚果河在怒吼》"},{"type":"paragraph","text":"新华社十日讯　索马里国民议会议长谢赫·穆克塔尔和由他率领的索马里国民议会友好代表团的成员，今天在参观全国农业展览馆时，热烈赞扬中国农民在毛泽东思想指引下，发扬自力更生、艰苦奋斗的精神，取得了农业的大发展。"},{"type":"paragraph","text":"谢赫·穆克塔尔议长等索马里朋友以极大的兴趣，参观了展览馆的大寨式农业典型展览和水利馆。谢赫·穆克塔尔议长在为展览馆的题词中写道：“中国农民在战胜贫困和改良土地方面所取得的成绩，使我感到惊奇。我祝愿中国农民为实现光辉的未来和下一代的美好生活，按照他们现在的决心继续前进。”他还表示感谢中国政府派农业技术人员去帮助索马里人民。"},{"type":"paragraph","text":"代表团团员穆斯塔法在发表自己的感想时说，“使我感到钦佩的是，毛泽东思想在很多地方生了根，使得中国人民在各方面都获得了很大成就，农业也有很大的发展。中国人民真正把毛泽东思想运用到实际斗争中去了！”他还祝中国和索马里友谊不断发展，祝愿毛主席长寿。"},{"type":"paragraph","text":"陪同参观的杨明轩副委员长对索马里朋友表达的友好感情，表示衷心的感谢。"},{"type":"paragraph","text":"谢赫·穆克塔尔议长和其他索马里朋友，今天下午由刘宁一副委员长陪同，参观了北京钢丝厂，受到职工的热烈欢迎。"},{"type":"paragraph","text":"新华社十日讯　谢赫·穆克塔尔议长和由他率领的索马里国民议会友好代表团，今天应邀出席晚会，观看了舞剧《刚果河在怒吼》。"},{"type":"paragraph","text":"朱德委员长陪同索马里客人观看了演出。"},{"type":"paragraph","text":"索马里朋友们在观看这个反映英雄的刚果人民，为反对美帝国主义侵略，争取民族独立、自由和解放而进行英勇斗争的舞剧时，对演员们的精彩表演，报以一阵阵热烈的掌声。"},{"type":"paragraph","text":"演出结束后，朱德委员长等陪同谢赫·穆克塔尔议长等登上舞台，同演员们亲切握手，表示祝贺。"},{"type":"paragraph","text":"这个晚会是中非友协为欢迎索马里国民议会友好代表团而举行的。人大常委会副委员长郭沫若、杨明轩，中非友协副会长南汉宸等，也陪同索马里客人观看演出。在北京的索马里专家和留学生也应邀出席了晚会。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"朱德","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bbd8413797"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
