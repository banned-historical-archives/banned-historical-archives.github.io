tart":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"向灵魂深处开刀","authors":["学习毛主席著作积极分子/五好战士樊桂喜"],"parts":[{"type":"paragraph","text":"我刚入伍时，对卫生员的工作没有正确的认识，认为又脏又累，低人一等，没前途，所以工作不安心。通过学习毛主席著作，认识到这是个人主义思想作怪。可是又觉得这种思想很丑，见不得人，不敢暴露出来。心想：反正怎么也是为人民服务，悄悄改了算了。李文忠同志说：“思想上的丑东西，是客观存在，躲也躲不开，回避也回避不了，不承认是自欺欺人。”事实正是这样，因为我没有狠狠地斗私，在工作中不是嫌病号脏，就是嫌病号“事多”。特别是看到一起入伍的战友，甚至比自己入伍晚的同志当了班长、排长，自己心里就火辣辣的不是滋味。"},{"type":"paragraph","text":"毛主席教导我们：“凡是反动的东西，你不打，他就不倒。这也和扫地一样，扫帚不到，灰尘照例不会自己跑掉。”“私”字是剥削阶级加给我们的精神锁链，是中国赫鲁晓夫用来毒害革命人民的腐蚀剂。要“完全”“彻底”为人民服务，就必须斗私。斗私就不能怕疼，要向灵魂深处开刀，彻底地亮，狠狠地斗，坚决地改。于是，我就在班务会上来了个“翻箱倒柜”“大扫除”，把我的私心杂念，毫无保留地暴露在光天化日之下。在同志们的帮助下，我狠斗了私心，思想上也感到轻松多了。再次学习“老三篇”，觉得特别亲切。以前觉得病号“事多”，根本的是自己没有树立全心全意为人民服务的世界观；过去在化验病号大便时觉得臭，根本的是自己头脑里的“私”字臭。今后，我一定时时以李文忠同志为榜样对照自己，努力活学活用毛主席著作，彻底改造思想，让光焰无际的毛泽东思想统帅自己的每一根神经，指挥自己的一切行动。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"839d98a34e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
