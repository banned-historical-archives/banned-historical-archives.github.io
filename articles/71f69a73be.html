ical-archives/banned-historical-archives0/main/maoquanji31.pdf"],"article":{"title":"给黄炎培的信","alias":"","parts":[{"type":"paragraph","text":"给黄炎培的信"},{"type":"paragraph","text":"（1951年12月29日）黄先生："},{"type":"paragraph","text":"十二月二十八日惠书敬悉。"},{"type":"paragraph","text":"轻工业部发动反贪污反浪费反官僚主义斗争，并已开始收效，甚为欣慰。讲演稿很好，只须将第一面有四处括号内数字去掉，就可发表。"},{"type":"paragraph","text":"顺致敬意"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一九五一年十二月廿九白"},{"type":"paragraph","text":"[1]黄炎培，民主建国会主要负责人。当时任中央人民政府委员、政务院副总理。"},{"type":"paragraph","text":"[2]指黄炎培1951年12月28日给毛泽东的信。信中谈到轻工业部三反运动的一些具体情况，说在向商店查诘中，发现不少漏税、行贿、送回扣的情况，民建总会及北京市分会正在展开工商界思想改造运动，预备提出“消灭行贿、消灭回扣”的口号，回扣实是贪污，在北京社会根深蒂固，不扑灭，无以整伤各机关风纪。"},{"type":"paragraph","text":"[3]指黄炎培1951年12月8日在轻工业部全体工作人员大会上的报告，题为《我们要彻底地为反贪污反浪费反官僚主义而斗争》。后在1951年12月30日《人民日报》上发表。"}],"authors":["毛泽东"],"dates":[{"year":1951,"month":12,"day":29}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":197,"page_end":197},"tags":[{"name":"毛泽东","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"71f69a73be"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
