script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"达喀尔会议加强了反剥削反掠夺斗争  发展中国家原料会议主席揭露富国从原料中渔利  第三世界国家报纸强调在大国面前共同行动保卫本国资源","authors":[],"dates":[{"year":1975,"month":2,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"达喀尔会议加强了反剥削反掠夺斗争"},{"type":"paragraph","text":"发展中国家原料会议主席揭露富国从原料中渔利"},{"type":"paragraph","text":"第三世界国家报纸强调在大国面前共同行动保卫本国资源"},{"type":"paragraph","text":"新华社阿尔及尔一九七五年二月十日电据阿尔及利亚新闻社报道，发展中国家原料会议主席、塞内加尔财政和经济事务部长巴巴卡尔·巴二月八日在达喀尔向阿尔及利亚新闻社记者发表谈话，赞扬达喀尔会议增强了第三世界国家的团结。他指出，“这种团结的加强，证明了达喀尔会议是极其有益的”。"},{"type":"paragraph","text":"他说：“我们会议产生的团结使我们在对付富国方面变得更加强大了。这些富国直到目前仍在从我们的原料中渔利。”"},{"type":"paragraph","text":"他指出，会议所作的决议是符合发展中国家人民的利益的，这些决定将有利于发展中国家控制原料的市场。"},{"type":"paragraph","text":"新华社一九七五年二月十一日讯　阿尔及利亚、尼日利亚和墨西哥报纸最近分别发表文章或社论，赞扬达喀尔原料会议加强了发展中国家之间的团结。"},{"type":"paragraph","text":"阿尔及利亚《圣战者日报》二月十日发表的文章说，达喀尔会议在它的宣言、行动纲领中深刻地分析了混乱的世界经济形势，并且“通过了维护它们（发展中国家）合法利益的重大决议”，这些决议“表明了发展中国家首先依靠自己并加强它们之间的团结的愿望。”"},{"type":"paragraph","text":"尼日利亚《国际时代》周报二月十日发表社论说，达喀尔会议“肯定新国家有控制自己经济资源的专有权；在许多初级产品价格下降的情况下，保护原料生产者的利益；制定新的国际经济秩序的各项建议。”社论说，会议的许多建议中最重要的是“号召原料生产者之间不屈不挠的团结”。"},{"type":"paragraph","text":"墨西哥《至上报》二月七日发表社论指出，“发展中国家必须联合它们的努力，加强和协调它们的工作，以便在大国、或在强国所组成的集团面前建立共同阵线，明智而坚定地行动起来保卫它们自己的东西。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5eabf51ba7"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
