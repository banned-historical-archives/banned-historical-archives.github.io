" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"赵越右派集团开始瓦解","authors":[],"dates":[{"year":1957,"month":8,"day":26}],"is_range_date":false,"parts":[{"text":"赵越右派集团开始瓦解","type":"title"},{"text":"文化部工作人员连日来集会揭露以中央群众艺术馆组织室主任赵越为首的右派小集团的活动。","type":"paragraph"},{"text":"整风以后，赵越提出了这个小集团的主要纲领:“艺术家治馆”，主张在群众艺术馆中成立“艺术委员会”，并规定有关群众艺术的重大问题都由这个委员会决定。按赵越等意见，这个艺术委员会的成员都是非党员艺术家，党员馆长只可参加做一个委员，副馆长只能列席，主任委员由选举确定。这个右派小集团妄想实现这个“纲领”，来篡夺中央群众艺术馆的领导权，改变群众艺术事业的社会主义方向。反右派斗争开展以后，这个右派小集团的阴谋和罪恶活动，受到了应有的反击，已开始瓦解。","type":"paragraph"},{"text":" ——原载《文汇报》1957年8月26日。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"99baa1bde9"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
