ors":[],"dates":[{"year":1971,"month":11,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"抗议垄断资产阶级裁减工人造成严重失业"},{"type":"paragraph","text":"英国十多万工人罢工、示威和集会"},{"type":"paragraph","text":"据新华社伦敦二十五日电  英国全国各地十多万名工人十一月二十四日举行罢工、示威游行和集会，强烈抗议垄断资产阶级越来越多地裁减工人，造成严重失业。这次大规模的抗议活动把最近这几个月来英国广大工人反对失业的斗争推向了一个新的高潮。"},{"type":"paragraph","text":"参加这次罢工的有全国许多地方不同行业的职工，其中包括苏格兰上克莱德造船公司的工人，伦敦、利物浦等地的码头工人，林肯郡、埃塞克斯等地一些重要工业企业的工人。许多地方的工人在举行罢工的同时，举行了示威游行。"},{"type":"paragraph","text":"在伦敦，来自英格兰、苏格兰、南威尔士等地区的约二万名工人举行了声势浩大的示威游行。工人们举着许多标语牌，标语牌上写着：“要求工作权利！”“团结起来，反对失业！”“保卫工人权利！”浩浩荡荡地经过伦敦西区主要街道，到议会前面举行抗议。"},{"type":"paragraph","text":"当工人们游行到英国议会门前时，当局出动了警察、马队，对工人进行威胁，阻拦工人前进。许多工人群众同警察和骑警进行了英勇的搏斗，他们一面高呼口号，一面还击警察的进攻。当局无理逮捕了十多名示威群众。"},{"type":"paragraph","text":"这次工人的罢工和示威活动使全国不少工厂、船坞、码头的生产和作业陷于停顿，使垄断资本受到巨大损失。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e78e071c7d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
