制度的斗争仍在坚持中","authors":[],"dates":[{"year":1968,"month":6,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反对美国垄断资本的掠夺和残酷剥削"},{"type":"paragraph","text":"智利工人继续进行罢工斗争"},{"type":"paragraph","text":"智利学生反对腐朽教育制度的斗争仍在坚持中"},{"type":"paragraph","text":"新华社八日讯　圣地亚哥消息：美国洛克菲勒财团控制的智利石油公司的职工和奥索尔诺—拉乌尼翁银行圣地亚哥分行的职工，七日在智利首都圣地亚哥宣布罢工，要求增加工资和改善生活待遇，反对美国垄断资本的残酷剥削。"},{"type":"paragraph","text":"与此同时，智利重要工业城市康塞普西翁的冶金工人和纺织工人以及智利全国航空公司的职工的罢工斗争，正在继续发展中。"},{"type":"paragraph","text":"据报道，由于外国垄断资本正在加紧对智利的渗透和掠夺，近年来智利经济状况日益恶化。货币不断贬值，生活费用急剧上涨。去年一年中，智利货币贬值了百分之三十二；而今年到目前为止已再次贬值了十次；在今年头五个月中，生活费用已经上涨了百分之十五点四。广大劳动人民的生活日益贫困。"},{"type":"paragraph","text":"此外，智利大学广大学生反对腐朽的资产阶级教育制度的斗争，仍在坚持着。智利大学的进步教师和附属这个大学的进步研究人员的代表，七日再次公开表示要站在广大学生一边，反对这个学校的反动分子勾结修正主义分子企图破坏大学生罢课斗争的阴谋活动。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"012f80437d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
