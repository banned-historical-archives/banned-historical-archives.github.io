art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东主席会见英国前首相希思等贵宾","authors":[],"parts":[{"type":"paragraph","text":"毛主席同英国贵宾一一握了手，并且同希思先生和艾惕思大使在无拘束的气氛中进行了广泛的交谈"},{"type":"paragraph","text":"周恩来总理、王洪文副主席、邓小平副总理等参加了会见和谈话"},{"type":"paragraph","text":"新华社一九七四年五月二十五日讯 毛泽东主席今天下午会见了英国前首相、保守党领袖希思，英国驻中国大使艾惕思，以及随同希思先生访华的人员：蒂莫西·基特森爵士和夫人、道格拉斯·赫德、布赖恩·沃伦爵士、威廉·沃尔德格雷夫、莫里斯·特罗布里奇、佩内洛普·加德纳小姐。"},{"type":"paragraph","text":"毛主席同英国贵宾一一握了手，并且同希思先生和艾惕思大使在无拘束的气氛中进行了广泛的交谈。谈话结束以后，希思先生把英国科学家达尔文生前最喜欢的并且有本人签名的照片（复制品）和达尔文著的《人类原始及类择》一八七一年原版书一套送给毛主席。"},{"type":"paragraph","text":"参加会见和谈话的有周恩来总理、王洪文副主席、邓小平副总理、乔冠华副外长、王海容部长助理和唐闻生、章含之。（附照片）"},{"type":"paragraph","text":"毛泽东主席同希思先生握手。（新华社记者 摄）"},{"type":"paragraph","text":"毛泽东主席会见希思先生时情形。（新华社记者 摄）"}],"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"邓小平","type":"人物"},{"name":"王洪文","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"39743f602e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
