art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席来到十三陵工地","authors":["吕绍明"],"parts":[{"type":"paragraph","text":"毛主席来到十三陵水库工地，"},{"type":"paragraph","text":"来到这十万大军战斗的阵地，"},{"type":"paragraph","text":"千万人一起发出欢呼，"},{"type":"paragraph","text":"千万双手一起伸向毛主席。"},{"type":"paragraph","text":"毛主席走上了望台挥手致意，"},{"type":"paragraph","text":"沸腾的人群向台前拥挤；"},{"type":"paragraph","text":"我激动的心无法说啊！"},{"type":"paragraph","text":"一次又一次喊着："},{"type":"paragraph","text":"万岁，毛主席！"},{"type":"paragraph","text":"我睁大眼睛望着毛主席，"},{"type":"paragraph","text":"心中充满无比的欢喜；"},{"type":"paragraph","text":"参加十三陵水库建设是多么光荣，"},{"type":"paragraph","text":"更光荣的是看到了毛主席。"},{"type":"paragraph","text":"我永远不会忘记这一天啊！"},{"type":"paragraph","text":"我要更坚强地战斗下去，"},{"type":"paragraph","text":"为了答谢我们敬爱的领袖，"},{"type":"paragraph","text":"我要在十三陵使出全身的力气。"},{"type":"paragraph","text":"就在这红五月的二十五号啊！"},{"type":"paragraph","text":"工地上到处传扬着动人的消息："},{"type":"paragraph","text":"“我们已经突破了五万大关！”"},{"type":"paragraph","text":"“啊！这就是咱们向毛主席的献礼！”"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"22f9db6cd4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
