art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席的恩情永远说不完","authors":[],"parts":[{"type":"paragraph","text":"某部九连在四好总评的后一阶段，请驻地生产队贫协委员、共产党员于桂芝老大娘和李洪生老大爷作了在旧社会血泪家史的报告，使干部战士进一步加深了学习毛主席著作的阶级感情。两位老人讲了在旧社会所受的苦，又以无比兴奋的心情，讲述了党和毛主席的恩情，社会主义给他们带来的幸福生活。最后，两位老人又亲手用苞米芯和白菜帮给大家做了一顿忆苦饭。"},{"type":"paragraph","text":"听了老人们的苦难家史，吃了忆苦饭，大家的思想感情受到很大震动。"},{"type":"paragraph","text":"同志们一致的结论是：我们的幸福是党和毛主席给的，我们的进步是党和毛主席教导的，我们的成长是党和毛主席哺育的。我们一定要努力学好毛主席著作，永远听毛主席的话，永远跟党走！（工作组）"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"278b56c1d1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
