<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中等学校的主要矛盾是什么？","authors":[],"dates":[{"year":1957,"month":5,"day":18}],"is_range_date":false,"parts":[{"text":"中等学校的主要矛盾是什么？","type":"title"},{"text":"中国民主促进会陕西省委员会在5月18日邀请西安市二中、四中、五中、六中、九中、西安市高中、陕西省西安第二卫生学校等十一个中等学校的教师座谈目前中等学校内的主要矛盾问题。","type":"paragraph"},{"text":"中等学校内主要矛盾在哪里呢?座谈会上大家集中谈了这个问题。西安市高中郭衢生教师说：中学首先是教学质量与国家要求的矛盾。西安市高中教师有一定质量，但学生的成绩并不好，这主要是学校领导没有把教师放在主人翁的地位。另外，中小学教师的待遇、社会地位等与高等学校教师比较相差悬殊，影响教师的积极性。在教学时间上教师负担也过重，一般教师每周担任十八到二十节课，每天还要开会，没有时间提高自己，更谈不到向科学进军。我们学校教师都订有个人进军计划，但是流于形式，因此教师没有条件提高自己的业务能力，教学质量也就无法提高了。有的教师认为学校主要矛盾是领导与被领导的关系，也就是党群关系。学校领导把老教师总看成是落后的，老教师则批评学校领导不民主，实际这两种看法是片面对片面，互相指责，影响老教师的积极性，也影响教学质量的提高。","type":"paragraph"},{"text":"学校行政领导不民主，许多教师反映了这方面的问题。教师郭衢生说：去年我校评选出席西安市先进教育工作者没有通过票选，而是大家一举手就通过了，结果教师们对先进工作者不服气。陕西省西安第二卫生学校教师秦昂说：去年我担任班主任，同学们反映会议多，于是我根据这些情况写了批评稿件送领导审查，领导不但不研究解决，反而在一次大会上受到严厉的批评。西安市六中教师王洁如说：我们学校原来有值日教师的制度，以后取消了，但领导又提出叫群众讨论恢复，群众不同意，结果由行政上决定还是恢复了。","type":"paragraph"},{"text":"许多教师提出学校领导对民主党派看法上不够正确。西安市高中教师弓矢石认为贯彻“长期共存、互相监督”的方针，首先应该有“一家人”的思想，有了一家人的思想才能相互起监督的作用。西安市七中教师祝仲迪指出学校个别党员对统战政策不够了解，因此轻视民主党派。他说，有一位党员教师在一次会上说，初中毕业生考不上学校组织自学，可以叫民主党派选人辅导，因为他们吃“冤枉”，“闲”得发慌。","type":"paragraph"},{"text":"党、团员在学校的地位特殊，宗派情绪很严重。西安市二中教师王文成举出实例，批评了这种现象。他说，学校提拔干部只强调政治，不考虑业务能力。据说，有一位青年教师过去教小学五年级都有困难，以后调在学校教政治，不久又擢升为教导主任。为什么提升那样快呢?因为他是一个团员。西安市十一初中教师秦学义回忆他在西安市小学教师进修学校工作时，那里的宗派主义更严重。去年，学校有一位青年干部郭士敏申请报考高等学校，学校金主任多方留难，以后拿报纸给他看，金主任居然把报纸一推，说不懂政策，要考学校就离职，最后郭士敏只好离职了。但是，另一个团员叫刘松筠，却批准他在职学习，团员和非团员在考学上都不平等。西安市十一初中教师韩圃说：评选先进教育工作者的条例上规定政治历史要清楚，学校在执行中把清楚与清白混为一谈，因此许多老年和中年教师被排挤在外，而评选出席的先进教育工作者很多是青年团员，他们思想是先进的，但缺乏先进经验，难道老教师与中年教师因为历史复杂就把先进经验也一笔勾销吗?显然，这会妨碍教学质量的提高。","type":"paragraph"},{"text":"学校老教师和青年教师不团结现象各校都普遍存在。老教师和中年教师一般是无党派人员，而青年教师大部分是团员，他们一般对老教师不够尊敬，有的老教师就唉声叹气说：“夕阳无限好，只是近黄昏”，用来比喻自己的心情。青年教师骄傲情绪与党在发展组织中的缺点分不开的。西安市二中教师王文成、西安市十一初中韩圃反映他们要求进步，可是领导发展党员只注意青年教师，使老教师感到消极、苦闷。","type":"paragraph"},{"text":"座谈会上，还对教学制度和教材提出批评和意见；对学校机构臃肿，人浮于事，以及教育工会只收会费，不解决教师的托儿等问题也提出尖锐的批评。","type":"paragraph"}],"comments":[],"origin":"《陕西日报》1957年5月24日。原题为：“中等学校的主要矛盾是什么？民进陕西省委邀集中学教师举行座谈”。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6a12b8f04d"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
