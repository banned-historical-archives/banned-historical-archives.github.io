ical-archives/banned-historical-archives8/main/maoquanji11.pdf"],"article":{"title":"致周恩来等电","alias":"","parts":[{"type":"paragraph","text":"致周恩来等电]"},{"type":"paragraph","text":"（1937年10月22日）恩来长电？，对大局分析及我党政策完全正确，我们完全同意。"},{"type":"paragraph","text":"请恩来拟具建议书，即去南京代表我党严重与正式地向国民党建议，并推动各界促进时局之转变。党的宣言，俟恩来南京谈判后再行决定，目前以解放报论文为号召。"},{"type":"paragraph","text":"[1]这是毛泽东和洛甫（张闻天）致周恩来、朱德、彭德怀等电的主要内容。"},{"type":"paragraph","text":"[2]周恩来10月19日致电毛泽东、朱德、彭德怀等，说鉴于日军集结全力猛攻山西并企图夺取上海，国民党政府对持久抗战发生动摇，国内妥协和平空气抬头，中国抗战出现新的危机，提出以下建议：（一）中共公开发表宣言，反对和平妥协，坚持抗战到底；（二）向国民党政府提出抗战紧急方案；（三）向阎锡山、黄绍站、卫立煌提出华北的进一步的计划；（四）要求国民党政府增派军队到华北支持抗战；（五）八路军在华北积极行动，直接配合友军作战并扩大发展游击战争，等等。"}],"authors":["毛泽东"],"dates":[{"year":1937,"month":10,"day":22}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":314,"page_end":314},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"朱德","type":"人物"},{"name":"彭德怀","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f58c858076"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
