],"dates":[{"year":1949,"month":9,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新疆人民获得和平解放"},{"type":"paragraph","text":"人民政协新疆代表函谢毛主席朱总司令"},{"type":"paragraph","text":"【新华社北京三十日电】人民政协新疆代表赛福鼎等三人因新疆和平解放，昨函毛主席、朱总司令致谢。该函称：伟大的领袖毛主席朱总司令："},{"type":"paragraph","text":"我们听到了前国民党新疆警备总司令陶峙岳和新疆省政府主席鲍尔汉率领新疆军政人员发表通电，脱离广州国民党反动政府、归向人民民主阵营的声明。我们认为他们的声明是正确的，是符合于新疆人民的愿望的。"},{"type":"paragraph","text":"在你们的领导下和人民解放军的支援下，新疆人民现已获得和平解放。我们谨代表新疆人民向你们致最崇高的感谢和敬意。"},{"type":"paragraph","text":"中国人民政治协商会议新疆代表赛福鼎、阿里木江、涂治"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b9c6981260"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
