s":[],"dates":[{"year":1971,"month":10,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京二十四日电　在伟大领袖毛主席的“以粮为纲，全面发展”方针指引下，全国各地农村在抓好秋收工作的同时，积极开展“小秋收”活动。据商业部门的不完全统计，到九月底，光是黑龙江、吉林、河北三省的“小秋收”产品，总值已达一亿多元。"},{"type":"paragraph","text":"我国地区辽阔，野生植物、野生动物资源丰富，种类繁多。有野生淀粉、野生油料、野生纤维、野生化工原料、野生药材、野生的藤、条、棕、草和各种兽、鸟、蛇、虫等。其中有许多是工农业生产、出口和人民生活需要的重要物资。秋季正是收集、猎取这些野生植物、野生动物的“小秋收”季节。为了做好这一工作，很多省、市、自治区都召开了“小秋收”会议，积极动员和组织广大社员投入“小秋收”活动。吉林、黑龙江、广东、河南、湖南、湖北等省的革委会，还成立了开展“小秋收”活动的领导机构，有的地方抽出大批干部深入社、队，加强对“小秋收”活动的领导。"},{"type":"paragraph","text":"各地在开展“小秋收”活动中，坚持社会主义方向，认真落实党的有关政策。在兼顾国家、集体、个人三者利益的原则下，根据“小秋收”产品具有成熟期集中，采集期短，量大和产地分散的特点，规定凡是适宜集体经营的品种都由社队集体经营；对那些零星分散，不宜社队集体经营的品种，鼓励社员利用工余时间采集、出售，充分调动社员群众的积极性。同时，各级领导还教育群众要做到采集、利用、保护与发展资源相结合，防止乱砍滥伐。有的地方还举办“小秋收”各种产品的实物或图片展览，帮助社员识别，并且大力推广采集和加工的技术。"},{"type":"paragraph","text":"各级商业部门在各级党组织和革委会的领导下，同有关部门密切配合，加强收购力量，合理设置网点，发挥农村代购代销店的作用，尽量做到及时收购，方便群众，从而促进了“小秋收”活动的顺利开展。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"黑龙江文革","type":"人物"},{"name":"吉林文革","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f0fc0e33ed"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
