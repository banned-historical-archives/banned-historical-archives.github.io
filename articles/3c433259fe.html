":[{"year":1977,"month":5,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"各族人民为建设毛主席纪念堂贡献力量"},{"type":"paragraph","text":"江西省井冈山地区安福县人民把当地最好的油杉木披红挂彩，翻越千山万水运往北京，敬献给毛主席纪念堂。"},{"type":"paragraph","text":"新华社稿"},{"type":"paragraph","text":"北京市房山县人民精选了一批象征革命果实世代相传的红果树，栽种在毛主席纪念堂四周。"},{"type":"paragraph","text":"新华社记者摄"},{"type":"paragraph","text":"广东省石湾镇的陶瓷工人以最快的速度，最好的质量，完成了为毛主席纪念堂设计、制作大型陶瓷浮雕花板的任务，创造了石湾陶瓷生产史上的新纪录。"},{"type":"paragraph","text":"新华社记者摄"},{"type":"paragraph","text":"山东省济南花岗石厂工人怀着对毛主席极其深厚的无产阶级感情，以革命加拚命的精神，日夜奋战，于五月中旬提前胜利完成了为毛主席纪念堂开采、加工花岗石板材的任务。　新华社记者摄"},{"type":"paragraph","text":"四川省石棉县人民为毛主席纪念堂敬献的枣红色花岗石，作为纪念堂基座台帮，象征着毛主席开拓的红色江山坚如磐石，千秋万代永不变色。这是纪念堂建设者在精心镶嵌花岗石台帮。　新华社记者摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3c433259fe"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
