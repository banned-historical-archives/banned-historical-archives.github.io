script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"邓小平会见杜尔时指出  当前战争策源地是苏联","authors":[],"dates":[{"year":1980,"month":5,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"邓小平会见杜尔时指出"},{"type":"paragraph","text":"当前战争策源地是苏联"},{"type":"paragraph","text":"新华社北京五月五日电  国务院副总理邓小平今天中午在人民大会堂在会见杜尔总统谈到当前世界形势时指出，多年来的实践证明，苏联对外推行霸权主义，对别国进行侵略、欺侮、奴役和剥削，它本身已不是社会主义国家而是社会帝国主义国家。"},{"type":"paragraph","text":"他说，当前真正威胁世界和平的是苏联，战争策源地是苏联。八十年代究竟怎么过，很值得注意。"},{"type":"paragraph","text":"邓小平重申中国坚决反对霸权主义、维护世界和平的立场，表示中国永远不做超级大国，永远属于第三世界。"},{"type":"paragraph","text":"会见时，杜尔总统谈到了他这次访华的情况。他说，我同华国锋总理对各种问题进行了很重要的讨论。邓小平说，我们是老朋友了。中几两国的关系是友好的，没有矛盾。他还向杜尔介绍了中国社会主义建设成功的和不成功的经验。"},{"type":"paragraph","text":"邓小平今天还同时会见了杜尔总统的部分随行人员。"},{"type":"paragraph","text":"会见后，邓小平设宴招待杜尔总统和夫人一行。"},{"type":"paragraph","text":"外交部副部长宫达非，外经部副部长李克，几内亚驻中国大使达乌达·库鲁马等参加了会见和宴会。"},{"type":"paragraph","text":"（附图片）"},{"type":"paragraph","text":"邓小平副总理会见几内亚总统杜尔。"},{"type":"paragraph","text":"新华社记者 摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"世界形势","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"315e089c00"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
