script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"就是要夺资产阶级的权","authors":[],"dates":[{"year":1967,"month":1,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"《文汇报》革命造反派接管《文汇报》了!这个革命行动好得很!一个新的、革命造反的《文汇报》将以毛泽东思想为最高指针，高举革命造反大旗，向党内一小撮走资本主义道路的当权派和社会上的牛鬼蛇神展开总攻击；更加深入地批判资产阶级反动路线，清除它的影响；夺取一斗、二批、三改的决定性的胜利。"},{"type":"paragraph","text":"自解放以来，资产阶级反党反社会主义反毛泽东思想的黑线，曾经几度顽固地统治着《文汇报》，对党对人民犯下了不可饶恕的罪行。"},{"type":"paragraph","text":"这样的报纸，我们不反，还待何人?!现在不反，还待何时?!“天下者，我们的天下；国家者，我们的国家；社会者，我们的社会。我们不说，谁说?我们不干，谁干?”看!《文汇报》革命造反派起来造反了!他们采取了果敢的革命的行动——夺权!要《文汇报》新生，一定要夺权!要《文汇报》迅速回到以毛主席为代表的无产阶级革命路线上来，更要夺权!除了夺权以外的什么折衷主义的作法，统统滚蛋!"},{"type":"paragraph","text":"《文汇报》“星火燎原”革命造反派的行动好得很!好得很!它有力地宣布了《文汇报》的新生。我们坚决支持你们的革命行动。"},{"type":"paragraph","text":"毛主席谆谆教导我们:“报纸的作用和力量，就在它能使党的纲领路线，方针政策，工作任务和工作方法，最迅速最广泛地同群众见面。”我们热切地希望《文汇报》革命造反派同志们，牢牢记住毛主席的伟大教导，努力把《文汇报》办成宣传毛泽东思想的坚强阵地!"},{"type":"paragraph","text":"放眼看来来，坚定不移向前进!让我们在战无不胜的毛泽东思想伟大红旗下，发扬勇敢战斗的作风，高歌造反永向前!"},{"type":"paragraph","text":"看东方，火炬赤旗舞，万里红!"},{"type":"paragraph","text":"红卫兵上海司令部"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c4389355a4"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
