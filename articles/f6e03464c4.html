ical-archives/banned-historical-archives8/main/maoquanji15.pdf"],"article":{"title":"致国民参政会公函","alias":"","parts":[{"type":"paragraph","text":"致国民参政会公函"},{"type":"paragraph","text":"（1941年2月15日）国民参政会秘书处钧鉴："},{"type":"paragraph","text":"关于政府对新四军处置，我党中央曾有严重抗议，并提出善后办法十二条如下："},{"type":"paragraph","text":"（一）制止挑畔；（二）取消一月十七日命令；（三）惩办皖南事变祸首何应钦、顾祝同、上官云相三人；（四）恢复叶挺自由，继续充当军长；（五）交还皖南新四军全部人枪；（六）抚恤皖南新四军全部伤亡将士；（七）撤退华中的剿共军；（八）平毁西北的封锁线；（九）释放全国一切被捕的爱国政治犯；（十）废除一党专政，实行民主政治；（十一）实行三民主义，服从总理遗瞩；（十二）逮捕各亲日派首领，交付国法审判。"},{"type":"paragraph","text":"请政府采纳。在政府未予裁夺前，泽东等碍难出席。特此达，敬希鉴察。"},{"type":"paragraph","text":"毛泽东　陈绍禹‧秦邦宪林伯渠"}],"authors":["毛泽东"],"dates":[{"year":1941,"month":2,"day":15}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":438,"page_end":438},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f6e03464c4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
