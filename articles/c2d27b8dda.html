art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"全国省市区人大民委主任会议结束阿沛·阿旺晋中调，各级人大民委的同志要加强马列主义、毛泽东思想的学习，增强贯彻党和国家民族政策和法律的自觉性","authors":["郑庆东张银曙"],"parts":[{"type":"paragraph","text":"据新华社北京11月7日电（记者郑庆东、张银曙）全国人大常委会副委员长、人大民委主任委员阿沛·阿旺晋美在今天结束的全国各省、自治区、直辖市人大民委主任会议上强调，各级人大民委的同志要加强马列主义、毛泽东思想的学习，用马列主义关于民族问题的理论武装头脑，确立无产阶级的世界观和民族观，正确认识民族问题的重要性和长期性，增强贯彻党和国家民族政策和法律的自觉性。"},{"type":"paragraph","text":"在为期五天的会议期间，与会同志认真座谈讨论了《关于贯彻实施民族区域自治法和当前民族工作几个问题的意见》向委员长会议的汇报提纲，交流了人大民委工作的经验，进一步研究了以民族区域自治法为中心的民族法制建设问题。"},{"type":"paragraph","text":"阿沛·阿旺晋美在大会结束时的讲话中强调在贯彻实施民族区域自治法的同时，还要加强散居少数民族工作。"},{"type":"paragraph","text":"阿沛·阿旺晋美指出，随着改革开放，各民族交往日趋密切，各民族地区的少数民族人口进入城市和沿海地区经商、办企业、办事、旅游将日益增多，民族地区和各省市的横向经济联系和合作将日益加强。因此，我们一定要把散居少数民族工作提到党和国家民族工作的重要位置上来。"},{"type":"paragraph","text":"据了解，全国人大民委将根据这次会议中与会同志的意见，对《关于贯彻实施民族区域自治法和当前民族工作中几个问题的意见》向委员长会议汇报提纲作进一步的修改和补充，力求全面、准确地反映各地的情况和意见。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c2d27b8dda"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
