ar":1979,"month":6,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"叶剑英聂荣臻彭真会见巴苏医生"},{"type":"paragraph","text":"新华社北京六月二十三日电  人大常委会委员长叶剑英、副委员长聂荣臻、法制委员会主任彭真，今天晚上会见并宴请中国人民的老朋友、印度巴苏医生。"},{"type":"paragraph","text":"人民大会堂会见厅里今晚气氛友好热烈。中印老朋友见面格外亲切，双方互致问候。巴苏医生对叶剑英委员长说：“我这次是前来中国参加针灸针麻学术讨论会的。您现在很忙，还抽出时间来会见我，很感激。”叶委员长说：“你是国际主义战士，应该欢迎。”"},{"type":"paragraph","text":"参加会见和宴会的还有在抗日战争时期曾经同巴苏医生一起帮助中国人民抗日、现在担任卫生部顾问职务的马海德，以及卫生部长钱信忠，对外友协副会长楚图南等。（附图片）"},{"type":"paragraph","text":"人大常委会委员长叶剑英、副委员长聂荣臻、法制委员会主任彭真六月二十三日会见中国人民的老朋友印度医生巴苏。新华社记者摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"聂荣臻","type":"人物"},{"name":"彭真","type":"人物"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1bd1bef65b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
