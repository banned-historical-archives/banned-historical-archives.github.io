ical-archives/banned-historical-archives0/main/maoquanji28.pdf"],"article":{"title":"给林谷生的信","alias":"","parts":[{"type":"paragraph","text":"给林谷生的信"},{"type":"paragraph","text":"（1950年5月7日）谷生先生："},{"type":"paragraph","text":"三月十日来信收到。林蔚同志死事极可痛惜，将来自应与全国各地死难同志一同有所纪念。"},{"type":"paragraph","text":"此复，顺颂大安"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一九五○年五月七日"},{"type":"paragraph","text":"[1]林谷生（1889—1960），湖南省韶山市永必乡长湖村人。大革命时期，曾在湖南省农民协会举办的工农于部训练班工作。新中国成立后在长沙市饮食行业工作。"},{"type":"paragraph","text":"[2]林蔚（1898—1928），林谷生的胞弟。1919年赴法国勤工俭学，1922年加入中国共产党，1925年入莫斯科军事学院学习。1926年回国，曾任中共湖南省委常务委员、省委秘书长等职。1928年3月在湖南醴陵被国民党军杀害。"}],"authors":["毛泽东"],"dates":[{"year":1950,"month":5,"day":7}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":341,"page_end":341},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0a4e89be8f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
