:1964,"month":10,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京5日电　毛泽东主席同党和国家其他领导人刘少奇、周恩来、朱德、邓小平、彭真、陈毅、李富春，今天晚间会见了越南民主共和国党政代表团团长、越南劳动党中央政治局委员、越南民主共和国政府总理范文同和代表团团员黄文欢、潘英、陈子平。"},{"type":"paragraph","text":"毛泽东同志、刘少奇同志、范文同同志以及中越两国的其他领导同志，进行了亲切友好的谈话。"},{"type":"paragraph","text":"会见时，范文同同志代表越南民主共和国党政代表团，向中国共产党中央委员会和中国政府赠送锦旗。红色的锦旗上用越中两国文字绣着胡志明主席的诗句:“越中情义深，同志加兄弟”。"},{"type":"paragraph","text":"\u003cIMG alt=请插入5号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1964\\10\\64a6010201.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgaut\u003e盂庆彪\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e十月五日，毛泽东主席同党和国家其他领导人会见了以范文同为首的越南民主共和国党政代表团。"},{"type":"paragraph","text":"(新华社传真　孟庆彪　摄)\u003c/FONT\u003e"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9638351556"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
