thors":["天津大学学生"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"大字报——“取消学校中的党委会、团委会”","type":"title"},{"text":"天津大学学生","type":"authors"},{"text":"天大一些学生提出带有政治性问题的有：","type":"appellation"},{"text":"1、取消学校中的党委会、团委会，由教师和学生组成校务会议来领导学校。","type":"appellation"},{"text":"2、团的干部是政治流氓，团委会应受学生会领导。","type":"appellation"},{"text":"3、改组人民日报和中国青年报。人民日报应该由全国各党派、人民团体、民主人士参加，而不应由共产党操纵。","type":"appellation"},{"text":"4、在高等学校中不应肃反，发动群众搞肃反刺伤了教师和学生的心灵。","type":"appellation"},{"text":"5、三大主义的根源是民主集中制。","type":"appellation"},{"text":"6、宪法是挂羊头卖狗肉，民主是“金鱼缸式”的民主。","type":"appellation"},{"text":"7、必修政治课违反信仰自由的政策。","type":"appellation"}],"comments":[],"origin":"1957年6月13日新华通讯社编《内部参考》。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"43ce712314"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
