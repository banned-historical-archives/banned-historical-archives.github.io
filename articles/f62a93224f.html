":["于淑文","刘德昭","北京地质勘探学院","龚汝劼"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"“我院的党委是一团糟，腐化了”","type":"title"},{"text":"北京地质勘探学院于淑文刘德昭龚汝劼","type":"authors"},{"text":"于淑文说：","type":"appellation"},{"text":"“我院的党委是一团糟，腐化了。我院由于温昌芸事件的揭发，可以看出是到处黑暗，见不到光明，我真象生活在魔鬼峡谷中。”","type":"appellation"},{"text":"刘德昭说:","type":"appellation"},{"text":"“同意‘私产党’和‘集体分肥’的论调，反右派本身就是一种‘私’的表现。”","type":"appellation"},{"text":"龚汝劼说：","type":"appellation"},{"text":"“当党委变质后，整风不能解决怎么办？”","type":"appellation"},{"text":"“中国革命是伟大的，领导中国进行革命，但为什么地院的党组织没有达到这种要求，未达标准？”","type":"appellation"},{"text":"“党要象党章上规定那样可以代表人民利益，但实际上做不到。”","type":"appellation"},{"text":"“老干部对任何事只会享乐，不愿吃苦，对自己考虑很多，如陈子谷。物探楼不好，学生伙食不好，但他胖了。”","type":"appellation"},{"text":"“每一个党员不能百分之百的掌握马列主义，党是否保证他不发生变质，不能保证则不能对党有无条件信任。”","type":"appellation"},{"text":"“无条件信任是指在一定时间内不发生变质而已，否则马万钧的推理二次革命是合理的，有二次革命的话，也是无产阶级革命”。","type":"appellation"}],"comments":[],"origin":"北京地质勘探学院党委会宣传部编《社会主义教育参考资料第二编：右派言论汇编》，1957年10月5日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f62a93224f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
