ical-archives/banned-historical-archives0/main/maoquanji52.pdf"],"article":{"title":"对林默涵来信的批语","alias":"","parts":[{"type":"paragraph","text":"对林默涵来信的批语"},{"type":"paragraph","text":"（1975年7月2日）中央："},{"type":"paragraph","text":"周扬一案，似可从宽处理，分配工作，有病的养起来并治病。久关不是办法。请讨论酌处。"},{"type":"paragraph","text":"附林默涵来信。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一九七五.七二日"},{"type":"paragraph","text":"[1]林默涵，原任中共中央宣传部副部长、文化部副部长。“文化大革命”中被错误打成所谓“文艺黑线代表人物”之一。1975年6月24日，他给毛泽东写信说，5月底中央宣布对他解除监护、恢复自由，使他深感党是真正爱护干部的，希望继续留在党内。他表示有决心好好学习马列和毛主席著作，虚心当群众的小学生，把自已的一切献给党和人民的事业。"},{"type":"paragraph","text":"[2]周扬，原任中共中央宣传部副部长、中国文学艺术界联合会副主席、中国作家协会副主席。“文化大革命”中被错误打成所谓“文艺黑线代表人物”。1979年，中共中央宣传部批准文化部党组的决定，指出解放后17年文化部的工作成绩是主要的，根本不存在什么“文艺黑线”和以周扬等为代表的所谓“黑线代表人物”问题。凡是因所谓“文艺黑线”等错案受到打击和诬陷者一律彻底平反。此后，周扬即被放出。"}],"authors":["毛泽东"],"dates":[{"year":1975,"month":7,"day":2}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":41,"page_end":41},"tags":[{"name":"毛泽东","type":"人物"},{"name":"周扬","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bfc2baa84d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
