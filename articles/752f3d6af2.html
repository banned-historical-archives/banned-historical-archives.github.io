tart":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"人大二届四次会议继续举行大会毛泽东、刘少奇、董必武、朱德、周恩来、邓小平等领导人出席李先念作一九六三年国家预算草案和预计执行情况、一九六四年国家预算初步安排的报告","authors":[],"parts":[{"type":"paragraph","text":"新华社18日讯 第二届全国人民代表大会第四次会议，今天下午继续举行大会。"},{"type":"paragraph","text":"国务院副总理李先念，在会上作了关于1963年国家预算草案和预计执行情况、1964年国家预算初步安排的报告。"},{"type":"paragraph","text":"毛泽东主席、刘少奇主席、董必武副主席、朱德委员长、周恩来总理、邓小平总书记出席了今天的大会。"},{"type":"paragraph","text":"出席大会的，还有全国人民代表大会常务委员会副委员长郭沫若、黄炎培、彭真、陈叔通、赛福鼎、程潜、刘伯承、林枫，国务院副总理邓子恢、陈毅、乌兰夫、李富春、聂荣臻，最高人民检察院检察长张鼎丞等。"},{"type":"paragraph","text":"国务院各部负责人，最高人民法院副院长，最高人民检察院副检察长，中国人民解放军高级将领，列席了大会。"},{"type":"paragraph","text":"出席中国人民政治协商会议第三届全国委员会第四次会议的政协委员，也列席了大会。"},{"type":"paragraph","text":"会议将从11月19日开始进行分组讨论。"},{"type":"paragraph","text":"李先念副总理在人大二届四次会议上作报告 新华社稿"}],"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"邓小平","type":"人物"},{"name":"李先念","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"朱德","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"752f3d6af2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
