uthors":[],"dates":[{"year":1961,"month":3,"day":28}],"is_range_date":false,"parts":[{"text":"甘肃省委关于处理退赔平调款的请示","type":"title"},{"text":"西北局并中央：","type":"appellation"},{"text":"我省处理退赔平调的工作，目前正在深入展开，经过初步摸底计算，需要退赔的金额大体为三亿三千万元左右，其中属于省级平调的约为三千万元，属于专、县平调的约为二亿元，属于队平调的约为一亿元。可以退赔的实物大体有一亿四千万元，其余一亿九千万元需用现金支付，其中专、县及企业部门约可拿出三千万元，全部付出现金，此外中央补助我省六千万元，省从1960年财政结余中拿出一亿元。在这一亿六千万元当中，拟于今年上半年付给现金60％，即九千六百万元，其余40％即六千四百万元按中央规定发行期票，明年兑现。妥否，请指示。","type":"paragraph"},{"text":" 甘肃省委1961年3月28日","type":"paragraph"},{"text":"(甘肃档案馆91—4—844卷)","type":"paragraph"}],"comments":[],"origin":"甘肃省某档案馆","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3f61870db4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
