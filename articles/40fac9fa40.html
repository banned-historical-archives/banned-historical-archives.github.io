torical-archives/banned-historical-archives9/main/books/wenji4.pdf"],"article":{"title":"给邝赛朝暨美国海员工会三千华工的电报","description":"","dates":[{"year":1946,"month":6,"day":24}],"parts":[{"text":"给邝赛朝暨美国海员工会三千华工的电报","type":"title"},{"type":"paragraph","text":"邝赛朝先生暨美国海员工会三千华侨工友："},{"type":"paragraph","text":"接获来电，得悉诸位工友呼吁立即停止中国内战，取消一党专政，成立民主联合政府，并对依靠外力进行内战的行为表示义愤。诸位关怀祖国前途，热爱和平民主，令人感佩兴奋。深望诸位再接再厉，唤起全美侨胞、全美劳工界与各界人士，要求美国当局立即停止对国民党独裁政府的任何援助，撤退驻华美国海陆空军，并撤销已向美国会提出的继续军事援华法案，使中国和平民主得以早日实现，中美传统友谊得以保持。"},{"type":"paragraph","text":"中国共产党中央委员会主席毛泽东"},{"type":"paragraph","text":"一九四六年六月二十四日"},{"type":"paragraph","text":"根据一九四六年六月二十六日"},{"type":"paragraph","text":"《解放日报》刊印。"}],"comment_pivots":[{"part_idx":2,"offset":4,"index":1}],"is_range_date":false,"authors":["毛泽东"],"comments":["指邝赛朝给孙中山夫人宋庆龄转国民党政府主席蒋介石、中国共产党主席毛泽东、中国民主同盟主席张澜的电报。电报说：“美国海员工会中三千华侨会员要求根据停战协定与政协决议，立即停止中国内战，实现和平与重建中国。我们厌恶在内战中使用日伪军与美军的办法。我们认为必须肃清空前的贪污，取消一党专政，代之以民主联合政府。美国劳工界将尽一切力量拥护民主自由独立的中国。”"],"page_start":146,"page_end":146,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"40fac9fa40"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
