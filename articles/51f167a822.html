ical-archives/banned-historical-archives8/main/maoquanji24.pdf"],"article":{"title":"同意刘陈邓攻打熊缓春的部署","alias":"","parts":[{"type":"paragraph","text":"同意刘陈邓攻打熊绶春的部署！"},{"type":"paragraph","text":"（1948年9月2日）刘、陈、邓，并告粟、谭、陈："},{"type":"paragraph","text":"我们冬丑电?发后接你们东亥电，我们同意你们打熊绶春\"之部署。此役能胜，就是给粟谭陈一个大帮助。打法，以主力不失时机抓住熊绶春歼击为最好，对十一师及南阳方面则以次要兵力钳制之。注意准备时间及开进时间的机密隐蔽，否则将惊走敌人达不到目的。此役结论可能有三种：（一）全部或大部歼灭熊绶春三个旅，因此吸引北面之三师、十一师，南面之二十八师、四十八师等部集中于确山一带对我。（二）因打得不好，仅歼熊绶春一部（例如一个旅），结果亦将吸引三师、十一师或再加二十八师集中信确二带，"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军委起草的给中原野战军司令员刘伯承、第一副司令员陈毅和副政治委员邓子恢的电报。"},{"type":"paragraph","text":"[2]粟、谭、陈，指粟裕、谭震林、陈士，当时分别任华东野战军代司令员兼代政治委员、副政治委员和参谋长。"},{"type":"paragraph","text":"[3]指1948年9月2日中共中央军委给刘伯承、陈毅、邓子恢的电报。电报要求刘陈邓精心组织歼灭国民党军熊绶春部的战役，并说如能在9月15日前后完成歼敌任务，就是对华野作战的极大帮助。"},{"type":"paragraph","text":"[4]指1948年9月1日亥时刘伯承、陈毅、邓子恢关于准备歼击泌阳、唐河间之熊绶春部或春水地区之十一师一部给中共中央军委的电报。"},{"type":"paragraph","text":"[5]熊绶春，当时任国民党军整编第十师师长。[6]信确，指河南信阳和确山。但不会吸引更多敌人。（三）因事前泄漏机密惊走敌人，或因打得很不好形成对峙，连一部敌人也不能歼灭，结果只能吸引十一师或再加三师稍为向南移动一点，于大局无变动。不论此役结果如何，你们均必须准备在那时将主力各纵迅速移至许漯附近待命，准备在粟谭陈方面出现困难情况时向豫东前进，一则使刘时?感受威胁，二则使孙元良刘汝明不敢东援，三则（这是主要的）调动三师、十一师、十师、八十五师等部于运动中歼其一部。粟谭陈方面出现可能的困难情况的时间大约在十月，那时你们必须精心筹划策应办法，以援助之。因此，在九十两月或者甚至还有十一月的上半月，你们所率直属各纵必须准备连续行动和连续作战，这一点望向各纵干部预先讲清楚，使他们有充分的精神准备。弹药、粮食、医药等项之使用及储备，均须和此项要求相适应。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"冬申[1]许漯，指河南许昌和漯河。[2]刘峙，当时任国民党军徐州“剿匪”总司令部总司令。"},{"type":"paragraph","text":"[3]孙元良，当时任国民党军第十六兵团司令官。刘汝明，当时任国民党军第四绥靖区司令官。"}],"authors":["毛泽东"],"dates":[{"year":1948,"month":9,"day":2}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":433,"page_end":434},"tags":[{"name":"陈毅","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"51f167a822"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
