ical-archives/banned-historical-archives0/main/maoquanji33.pdf"],"article":{"title":"关于搜集敌战俘营中我伤病人员情况的电报","alias":"","parts":[{"type":"paragraph","text":"关于搜集敌战俘营中我伤病人员情况的电报"},{"type":"paragraph","text":"（1953年5月4日）李克农叫同志，并金首相、彭司令员："},{"type":"paragraph","text":"五月四日零时册分来电和简报均悉。同意来电所提各点意见和发言稿。你们五月三日十六时四十分简报称，据归俘谈，济州岛敌第八战俘营中仍有大批我病伤人员。按第八战俘营是坚持遭返的战俘营。望立即就归俘此项报告进行详细调查，搜集证据和材料，以便在必要时反击敌人。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"五月四日五时"},{"type":"paragraph","text":"[1]李克农，当时任中央人民政府外交部副部长、中国人民解放军副总参谋长、朝鲜停战谈判中国人民志愿军代表团党委书记。"},{"type":"paragraph","text":"[2]金首相，指朝鲜民主主义人民共和国首相金日成。彭司令员，指中国人民志愿军司令员兼政治委员彭德怀。"}],"authors":["毛泽东"],"dates":[{"year":1953,"month":5,"day":4}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":158,"page_end":158},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d95354ea63"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
