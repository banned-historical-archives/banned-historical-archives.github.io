rt":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"紧跟毛主席寸步不离","authors":["1124工地英雄集体代表"],"parts":[{"type":"paragraph","text":"六月三日，我们最最敬爱的伟大领袖毛主席和他的亲密战友林副主席接见了我们。我们看到毛主席迈着稳健的步伐登上主席台，亲切地向我们招手致意，我们顿时热泪盈眶，激动地一面高喊着“毛主席万岁！万万岁！”一面不停地擦试着眼睛，生怕泪水遮住了视线。我们心里多么希望时间走慢一点，再慢一点！让我们多看看伟大领袖毛主席！让我们把毛主席的伟大形象深深地刻在心里！"},{"type":"paragraph","text":"接见后，我们万分激动，连夜召开了“向毛主席献忠心”的大会、座谈会，热烈歌颂伟大领袖毛主席，歌颂战无不胜的毛泽东思想，歌颂毛主席的革命路线。有的同志在日记上写着：毛主席啊，毛主席！您的丰功伟绩比天高，您的恩情比海深。见到了您，是我们最大最大的幸福。"},{"type":"paragraph","text":"敬爱的毛主席啊，毛主席！您的光辉思想，就是我们的最高命令。在您的光辉思想照耀下，我们与罕见的特大塌方持续搏斗二十多天，取得了伟大的胜利。我们跟着您寸步不离，天塌下来也能顶住，地陷下去也能填平。我们以海水做墨，以蓝天做纸，以森林当笔，也写不完我们对您的无限热爱、无限忠诚。我们一定更高地举起您的光辉思想的伟大红旗，紧跟您的伟大战略部署，进一步落实您的最新指示，深入开展革命大批判，不断提高路线斗争觉悟，以门合同志为光辉榜样，为您的革命路线放好哨，站好岗，打好仗。做到心往您的革命路线上想，劲往您的革命路线上使，让生命的每一秒钟都忠于您，忠于您的光辉思想，忠于您的革命路线。"}],"alias":""},"tags":[{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4b47b3eb6f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
