社论的批评","authors":[],"dates":[{"year":1956,"month":6}],"is_range_date":false,"parts":[{"text":"毛泽东对《人民日报》一九五六年六月二十日社论的批评","type":"title"},{"text":"六月二十日社论有原则性错误：既要反对保守倾向，又要反对急躁情绪。这社论讲反右不到半年，就认为反右成绩很大，估高了。不能说社论一点马列主义没有。但“但是”以后，是反马列主义的。社论的提法同魏忠贤的办法一样，君子小人。引我的话，掐头去尾，只引反左的。这不对。不用全段话，是秦琼卖马，减头去尾要中间一段，方法是片面的。前面讲少数如何，后面讲多数如何。形式上两面反，实为反左。……","type":"paragraph"},{"text":"(一九五六年六月二十日社论《要反对保守主义，也要反对急躁情绪》，是刘少奇要求陆定一由中宣部的人写成，刘少奇、陆定一等审阅修改发表的。后来，毛泽东严厉批评了这篇社论。)","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"陆定一","type":"人物"},{"type":"文稿类型","name":"文章"}]},{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"毛泽东对《人民日报》一九五六年六月二十日社论的批评","authors":[],"dates":[{"year":1956,"month":6}],"is_range_date":false,"parts":[{"text":"毛泽东对《人民日报》一九五六年六月二十日社论的批评","type":"title"},{"text":"六月二十日社论有原则性错误：既要反对保守倾向，又要反对急躁情绪。这社论讲反右不到半年，就认为反右成绩很大，估高了。不能说社论一点马列主义没有。但“但是”以后，是反马列主义的。社论的提法同魏忠贤的办法一样，君子小人。引我的话，掐头去尾，只引反左的。这不对。不用全段话，是秦琼卖马，减头去尾要中间一段，方法是片面的。前面讲少数如何，后面讲多数如何。形式上两面反，实为反左。……","type":"paragraph"},{"text":"(一九五六年六月二十日社论《要反对保守主义，也要反对急躁情绪》，是刘少奇要求陆定一由中宣部的人写成，刘少奇、陆定一等审阅修改发表的。后来，毛泽东严厉批评了这篇社论。)","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"陆定一","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"858eb26a7e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
