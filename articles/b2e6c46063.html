”和铺张浪费的现象的通知（概要）","authors":[],"dates":[{"year":1966,"month":12,"day":23}],"is_range_date":false,"parts":[{"text":"中共中央办公厅关于必须防止和坚决纠正“一平二调三收款”和铺张浪费的现象的通知（概 要）","type":"title"},{"text":"中共中央办公厅发出《必须注意防止和坚决纠正“一平二调三收款”和铺张浪费的现象》的文件并转发了河南省委批转的一份材料。河南省委认为，有的同志忘记了过去刮“共产风”的严重教训，又在那里平调生产队的粮、款、物资和劳力，铺张浪费，盲目大办各项事业。省委提出，要维护生产队的所有权，不准再搞平调，对平调生产队的粮款和物资，要坚决如数退回。对刮“共产风”的人，要严格批评教育。干部大吃大喝、多吃多占的，要检查退赔。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"河南文革","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b2e6c46063"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
