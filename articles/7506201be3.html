art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"全民学理论黑龙江几百万人学习毛泽东著作","authors":[],"parts":[{"type":"paragraph","text":"据新华社哈尔滨8日电 中共黑龙江省委7日晚召开了学习理论广播大会，交流工农群众学习政治理论的经验，把这个全民性的理论学习运动推向新的高潮。"},{"type":"paragraph","text":"中共黑龙江省委书记强晓初在广播大会上宣布，全省已有二百六十万工农群众、家庭妇女和青年学生参加了学习政治理论，学习毛泽东著作的运动。强晓初说：这表明理论已经走出了小数知识分子的狭小圈子，开始进入了一个以工人、农民为主体的群众性的学习马克思列宁主义理论，学习毛泽东著作的新阶段。"},{"type":"paragraph","text":"收听这次大会广播的有全省六百五十万已经开始和将要开始学习理论的工农群众、机关干部和大专学校的学生。牡丹江水泥厂工人刘锡令在会上介绍了他学习理论的经验。他没有进过学校，在工厂学了几年文化，1956年开始学习毛主席著作，现在他正在一面学习，一面在工人中讲授马列主义。他说：理论并不是神秘的东西，特别是毛主席的著作，句句打动人心。勃利县吉兴乡共青团总支书记——全乐农业生产合作社赵叔琴，家庭妇女哈尔滨市道里区经纬街居民委员宋彩文都在会上介绍了学习情况。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7506201be3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
