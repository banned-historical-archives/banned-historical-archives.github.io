展","authors":[],"dates":[{"year":1967,"month":2,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"美国《进步劳工》赞颂我国文化大革命具有伟大历史意义"},{"type":"paragraph","text":"文化大革命的胜利促进世界革命发展"},{"type":"paragraph","text":"一个强大的革命的中国是对世界蓬勃兴起的革命力量的巨大支持"},{"type":"paragraph","text":"新华社讯　纽约消息：美国进步劳工党机关刊《进步劳工》双月刊在今年二月——三月号中刊登一篇文章，热烈赞扬中国无产阶级文化大革命是一件具有伟大历史意义的大事。"},{"type":"paragraph","text":"文章强调说，中国文化大革命的胜利将“无法估量地加强世界革命运动的发展”；“在中国挫败修正主义将关系到全世界的前途”。"},{"type":"paragraph","text":"文章写道：“文化大革命的结果，对全体革命者来说，都有着重大关系。经过革命思想充分薰陶的七亿中国人民将是一支不可战胜的力量。……一个强大的革命的中国是对全世界各地蓬勃兴起的革命力量的巨大支持。”“我们祝愿文化革命取得完全的胜利。它每取得一项胜利，都意味着美帝国主义和修正主义遭到一次重大失败。”"},{"type":"paragraph","text":"文章热情赞扬毛泽东思想给世界各地的革命指明了道路，并且表示深信，在毛泽东思想指引下，“经验丰富和久经考验的中国共产党定将在它新的历史性努力中获得成功”。"},{"type":"paragraph","text":"文章谴责帝国主义者和修正主义者正在拚命散布各种谰言，反对中国的文化大革命。文章强调说，帝国主义者和修正主义者“仇恨中国共产党及其伟大领袖毛泽东。他们的仇恨产生于他们对中国共产党和中国人民的害怕；因为中国共产党和中国人民是世界上最强大的革命力量，是阻止他们把全世界瓜分为‘势力范围’的主要障碍”。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3545870a41"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
