art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席的革命文艺路线胜利万岁——钢琴伴唱《红灯记》、钢琴协奏曲《黄河》、革命交响音乐《沙家浜》电影剧照","authors":["新华社"],"parts":[{"type":"paragraph","text":"钢琴协奏曲《黄河》是根据冼星海的《黄河大合唱》创作的。它以抗日战争为历史背景，以黄河象征中华民族，表现无产阶级的革命英雄主义，歌颂中华民族的雄伟气概和斗争精神，歌颂毛主席人民战争思想的伟大胜利。这是演奏时的一个场面。"},{"type":"paragraph","text":"钢琴伴唱《红灯记》“天下事难不倒共产党员”中的一个镜头：李玉和接到密电码，决心完成党交给的艰巨任务。"},{"type":"paragraph","text":"钢琴协奏曲《黄河》中的钢琴演奏者殷诚忠。"},{"type":"paragraph","text":"钢琴伴唱《红灯记》“仇恨入心要发芽”中的一个镜头：李铁梅决心继承先辈的革命遗志，宁肯粉身碎骨也决不交出密电码。"},{"type":"paragraph","text":"钢琴伴唱《红灯记》中“学你爹心红胆壮志如钢”的一个镜头：李奶奶给铁梅说家史，用先烈事迹教育下一代。"},{"type":"paragraph","text":"革命交响音乐《沙家浜》“坚持”中的一个镜头：在毛泽东思想的指引下，郭建光决心带领伤病员奋战在水乡。"},{"type":"paragraph","text":"革命交响音乐《沙家浜》的一个场面：它以宏伟的气势，歌颂了伟大人民战争。"},{"type":"paragraph","text":"革命交响音乐《沙家浜》“授计”中的一个场面：阿庆嫂时刻在惦记着芦苇荡里的伤病员。她决心牢记毛主席教导，依靠群众的智慧，战胜顽敌度难关。"},{"type":"paragraph","text":"革命交响音乐《沙家浜》“斥敌”中的一个镜头：沙奶奶大义凛然痛斥汉奸走狗卖国贼的无耻行为。"},{"type":"paragraph","text":"（本版照片新华社发）"}],"alias":""},"tags":[{"name":"人民战争","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4d64b86c8c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
