,"dates":[{"year":1981,"month":5,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"邓小平会见诗琳通公主时说"},{"type":"paragraph","text":"希望中泰两国相互往来更加密切"},{"type":"paragraph","text":"新华社北京五月十四日电　中共中央副主席邓小平今天上午会见了泰王国公主玛哈扎克里·诗琳通殿下。"},{"type":"paragraph","text":"邓小平请诗琳通公主转达他本人对普密蓬·阿杜德国王和王后陛下的问候和良好祝愿。"},{"type":"paragraph","text":"邓小平说，中泰两国间没有纷争，我们之间只存在友谊。他希望中泰两国领导人和人民之间的相互往来更加密切。"},{"type":"paragraph","text":"诗琳通公主说，我这次来中国是想看看中国人民如何团结合作建设国家。我认为中国有许多东西值得学习。外交部副部长韩念龙，泰国驻中国大使哥颂等参加了会见。会见后，邓小平设宴招待诗琳通公主及其随行人员。"},{"type":"paragraph","text":"哥颂大使今晚为诗琳通公主殿下访华举行了宴会。人大常委会副委员长邓颖超等应邀出席。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"42dae4e092"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
