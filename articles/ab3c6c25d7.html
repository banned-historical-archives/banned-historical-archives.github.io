art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"近代资产阶级启蒙思想家严复","authors":["张晓生"],"parts":[{"type":"paragraph","text":"严复（1853——1921），字又陵，号几道，福建侯官（今闽侯）人。"},{"type":"paragraph","text":"严复出身于乡医之家。十四岁时，以第一名的成绩考入湘系军阀左宗棠创办的福州船政学堂。毕业后，曾在军舰上供职五年。1877年被派赴英国格林尼次海军大学留学。在英国两年间，初步形成了他的资产阶级民主主义思想。结业返国，先是在福州船政学堂充任教习，后调至北洋水师学堂任总教习，旋又升任总办。这时，严复年仅三十八岁，可谓宦途得志。但是，他对所谓“洋务运动”并不感兴趣，更厌恶充斥于官场的腐败习气。他常常向人们痛切陈言：再这样下去，用不了三十年，中国就会被列强吞灭殆尽。"},{"type":"paragraph","text":"1894年中日战争爆发，民族危机愈形严重。严复深感有必要向全国人士敲响警钟，在天津的《直报》上，接连发表了《论世变之亟》、《原强》、《辟韩》及《救亡决论》等立论深刻、行文犀利的政论文章，无情地抨击了封建顽固派的谬说，批驳了洋务派的妄想；全面提出了他的“鼓民力”、“开民智”、“新民德”的资产阶级改良主义主张，为酝酿中的康梁变法提供了强有力的思想武器。"},{"type":"paragraph","text":"然而使严复最负盛名的，还是他所译的《天演论》。该书于1898年4月出版后，立刻轰动一时，在社会上发生了巨大影响。严复所以要译这本书，目的是要用进化论“物竞天择，适者生存”的基本原理，摧毁顽固派和洋务派的保守思想，进一步提请人们注意亡国灭种的危险。他认为，如同自然界的一切都在竞争一样，种族与种族之间也是一个大竞争的局面。中国为救亡图存起见，除却“与天争胜”、发愤自强以外，别无他法。这对当时的思想界起了积极的启蒙作用。"},{"type":"paragraph","text":"严复晚年专事译著，思想有些趋向保守。然而，他一生的功绩毕竟是主要的。鲁迅曾多次怀着钦敬的心情，谈到严复对自己的影响。毛泽东同志也曾高度评价过他，说：“洪秀全、康有为、严复和孙中山，代表了在中国共产党出世以前向西方寻找真理的一派人物。”RW：严复；资产阶级思想家"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ab3c6c25d7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
