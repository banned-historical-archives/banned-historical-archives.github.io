art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"朝气蓬勃的共产党员","authors":["张永正付怀华〖HH/换行〗DW：五一一二六部队"],"parts":[{"type":"paragraph","text":"在迎接中国共产党成立五十五周年的日子里，喜读许多共产党员自觉抵制党内最大的不肯改悔的走资派邓小平刮起的右倾翻案风的模范事迹，心潮澎湃，浮想联翩。报纸上刊载的一篇篇生动感人的通讯，胜似一曲曲扣人心弦的颂歌，热情地歌颂了我们伟大、光荣、正确的党，经过无产阶级文化大革命的战斗洗礼，更加坚强，更加朝气蓬勃。"},{"type":"paragraph","text":"革命导师恩格斯说得好，任何工人政党，“只有在内部斗争中才能发展起来，这是符合一般辩证发展规律的。”（《马克思恩格斯选集》第四卷第四三二页）我们党从一九二一年诞生以来，马克思主义同机会主义路线的斗争一直没有停止过。正是在长期的斗争中，毛主席的马克思列宁主义路线越来越深入人心，我们的党日益发展壮大，领导全国人民从胜利走向胜利。特别是毛主席亲自发动和领导的无产阶级文化大革命，及时而坚决地粉碎了刘少奇、林彪、邓小平的复辟阴谋，积累了同走资派作斗争的丰富经验，从理论和实践上解决了同党内资产阶级作斗争的重大课题。当邓小平的“三项指示为纲”刚一出笼，许多党组织和党员就嗅出它的味道不对，不传达，不贯彻，他们不仅善于识别，而且敢于斗争，和邓小平的修正主义路线“专开对头车”。历史发展的法则再一次雄辩地证明：“我们这个党是有希望的”。"},{"type":"paragraph","text":"毛主席指出，党内两条路线的斗争，“还可能搞十次、二十次、三十次”。“走资派还在走”，是社会主义时期长期存在的历史现象。我们一定要树立长期作战的思想，把深入批邓、反击右倾翻案风的斗争进行到底，满怀豪情地去迎接新的胜利。"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8aad11f9fd"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
