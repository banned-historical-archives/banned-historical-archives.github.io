" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"毛泽东给黄炎培的信","authors":["毛泽东"],"dates":[{"year":1952,"month":9,"day":29}],"is_range_date":false,"parts":[{"text":"毛泽东给黄炎培的信","type":"title"},{"text":"毛泽东","type":"authors"},{"text":"任之先生：","type":"appellation"},{"text":"九月廿二日大示收到，甚谢。因与财经机关商酌，迟复为歉。","type":"paragraph"},{"text":"先生所提税收，劳资两问题，确是应当注意调整的。据财委同志报告，有些已经调整，有些正在调整，有些则尚待研究调整办法。","type":"paragraph"},{"text":"上次我和先生谈的关于中小工商业的几点意见，过于简单，不便发表。此类问题，宜由财经机关征询各方意见，加以处理，较为适宜。","type":"paragraph"},{"text":"大函及几个附件我已交付陈云薄一波诸同志负责研究去了。我处亦收到工商业者不少信件，可以看出他们对我们工作缺点的反映。","type":"paragraph"},{"text":"近日颇忙，稍待当约先生面叙。","type":"paragraph"},{"text":"顺祝","type":"paragraph"},{"text":"康吉","type":"appellation"},{"text":" 毛泽东九月廿九日","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2c9f58c263"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
