<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"毛泽东主题书画作品走红京城拍卖市场","authors":["何名"],"dates":[{"year":1996,"month":12,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"何名"},{"type":"paragraph","text":"日前由中国嘉德国际拍卖有限公司主办的’96北京嘉德拍卖会爆出新闻。以毛泽东为主题创作的艺术作品，成为拍卖市场竞价的热点。李可染先生1974年创作的中国画“韶山——革命圣地毛主席旧居”，创下了今秋这类作品拍卖的最高价位:154万元人民币。而据有关部门的不完全统计，最近3个月这类题材的作品在京城拍卖市场上，成交额已直逼400万元。首都拍卖界人士称，继去年秋天以605万元的价位，拍卖了刘春华的油画《毛主席去安源》之后，这是首次大规模地将以毛泽东为主题创作的作品推向拍卖市场。"},{"type":"paragraph","text":"拍卖成交额最高的前10名中，有5幅作品引人注目:李可染的《韶山》、傅抱石的《毛主席故居》、阿老的《全国儿童都热爱您》、倪震等的《毛主席是世界人民心中的红太阳》、蒋兆和的《你们要关心国家大事》。以毛主席诗词为内容创作的书法作品同样也成为竞买的热点:“陆俨少的书法《毛主席语录》以2.2万元人民币成交；赵朴初的书法作品“毛泽东诗词《沁园春·雪》”、于立群的书法作品“毛泽东诗词《清平乐·会昌》”等，也都经历了40余次的竞价才最终落槌。"},{"type":"paragraph","text":"对以“毛泽东”为主题的作品在拍卖市场上的火爆情形，首都收藏界的人士认为，毛泽东的时代在中国历史上具有独特性，对中国社会的发展，对中国人心态的塑造、以及中国人世界观的确立都有极大的影响。而这批作品在题材上的影响，远远超出了它们在艺术处理上的影响。这里既有当代大师蒋兆和、李可染、陆俨少等秘而未宣的作品，又有对当时政治生活、艺术风格发生过重大影响的作品，它们都是那个特定历史时期美术史、社会发展史的重要组成部分，是不可多得的第一手收藏资料。京城的专家们同时表示遗憾:北京大学的一位教授说:“这些作品应该由国家收藏，走进拍卖市场本身就是一个误会。”"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2da32850c7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
