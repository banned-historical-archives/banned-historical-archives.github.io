uthors":[],"dates":[{"year":1968,"month":1,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"加紧煽动反华　镇压亚非人民革命　残酷剥削人民"},{"type":"paragraph","text":"美苏指使印度反动政府疯狂扩军"},{"type":"paragraph","text":"据新华社十一日讯 新德里消息：在美帝国主义和苏联现代修正主义领导集团的指使和帮助下，印度反动政府正在不顾国内严重的经济困难，继续疯狂地增加军费，扩充军备，更加残酷地压榨生活已经十分困苦的印度人民。"},{"type":"paragraph","text":"印度反动政府最近得到了它的主子美帝国主义的同意，从英国买到了一批霍克猎人式战斗轰炸机。去年十二月初，印度国防部长透露，苏修帮助印度反动政府修建的米格式喷气战斗机工厂已开工生产。据悉，其中一座工厂设在奥里萨邦，生产机身；一座设在马哈拉施特拉邦，生产发动机；另一座设在安得拉邦，生产米格式战斗机所用的导弹。这些工厂都是在一九六二年印度反动派向中国发动大规模进攻以后修建的。"},{"type":"paragraph","text":"据印度报业托辣斯透露，印度政府在一九六七年内竭力以四十五个中队为目标扩充它的空军。同时，印度政府修建了更多的空军基地。过去，美帝国主义同印度反动政府曾经达成过协议，一旦美帝国主义认为对它发动侵略战争有必要时，将把它的空军开到印度，使用印度反动政府为它准备好的空军基地。"},{"type":"paragraph","text":"印度报刊还透露，美印两国政府正在商谈在中印边境完成一个“雷达系统”的工程的问题。这项工程是一九六二年印度反动派向中国发动大规模进攻后，美帝帮助印度反动政府修建的。这显然是为美帝和印度空军的侵略行动提供方便的军事工程。"},{"type":"paragraph","text":"去年十一月，印度国防部长曾经大肆叫嚷印度为了“加强国防”而需要潜水艇。就在这个时候，印度报刊透露，苏修供给印度反动政府的四艘潜水艇即将加入印度的舰队。"},{"type":"paragraph","text":"美帝和苏修指使印度反动派扩充军备的目的，一方面是使印度反动政府进一步去反对中国和镇压亚非人民的解放斗争；另一方面通过印度反动政府增加军费来剥削印度人民。从印度反动政府向中国和巴基斯坦发动武装进攻以来，印度政府每年军费开支已经从过去每年的三十亿卢比以下猛增为每年约一百亿卢比，差不多占总预算支出的三分之一。"},{"type":"paragraph","text":"印度反动政府以所谓“对付中国和巴基斯坦的威胁”为借口，掩盖它扩充军备是为美帝、苏修、印度官僚买办资本的利益效劳的实质。它的这种欺骗早已不灵了。印度人民正在奋起斗争，决心把美帝、苏修通过它们的走狗在印度建立的反动统治彻底砸烂。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"25f0b7da4c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
