ical-archives/banned-historical-archives0/main/maoquanji30.pdf"],"article":{"title":"转发广东军区党委关于派遣工作组检查和帮助镇反工作的指示的批语","alias":"","parts":[{"type":"paragraph","text":"转发广东军区党委关于派遣工作组检查和帮助镇反工作的指示的批语"},{"type":"paragraph","text":"（1951年4月3日）陈、饶，邓、贺，习、张："},{"type":"paragraph","text":"请你们检查所属各省各分区有无广东那样的情况?，如有这种情况，请你们仿照广东办法，由各省军区派遣工作组分赴各分区各县加以检查和帮助当地的镇反工作，坚决而正确地执行镇反任务。地方镇反工作亦须由省级机关派遣工作组，分赴各专区和各县检查和帮助当地的镇反工作。此事甚为重要，请加注意为盼。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"四月三日"},{"type":"paragraph","text":"[1]陈，指陈毅，当时任中共中央华东局第二书记、中国人民解放军华东军区司令员。饶，指饶漱石，当时任中共中央华东局第一书记、中国人民解放军华东军区政治委员。邓，指邓小平，当时任中共中央西南局第一书记、中国人民解放军西南军区政治委员。贺，指贺龙，当时任中共中央西南局第三书记、中国人民解放军西南军区司令员。习，指习仲勋，当时任中共中央西北局第一书记、中国人民解放军西北军区政治委员。张，指张宗逊，当时任中共中央西北局副书记、中国人民解放军西北军区第一副司令员。"},{"type":"paragraph","text":"[2]指中共广东军区委员会派赴珠江、北江等地的工作组在工作检查中发现的上述地区某些县在镇压反革命中存在的严重右倾现象。如英德县关押53名罪大恶极者未加处理，其中有一匪首张玉周曾杀害我同志及革命群众，拘押年余，仍未处理，群众提出控诉也被置之不理，后经人民代表在县人代会上提出控诉始批准处决，但仍未执行。"}],"authors":["毛泽东"],"dates":[{"year":1951,"month":4,"day":3}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":217,"page_end":217},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a30ec4665d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
