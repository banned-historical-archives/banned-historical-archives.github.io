script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"清除左倾思想影响  搞好地质工作调整  全国地质局长会议要求提高地质工作的经济效果","authors":[],"dates":[{"year":1981,"month":1,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"清除左倾思想影响  搞好地质工作调整"},{"type":"paragraph","text":"全国地质局长会议要求提高地质工作的经济效果"},{"type":"paragraph","text":"据新华社南京1月22日电  全国地质局长会议在研究今年地质部门任务时强调指出，要在清除左倾思想影响的基础上，进一步搞好地质工作的调整。"},{"type":"paragraph","text":"出席会议的各省、市、自治区地质局长和地质专家们指出，经济工作中的左倾思想对地质工作也危害不浅。在过去的多年时间里，在“以钢为纲”的口号下，部署了过多的力量寻找铁矿，按照扭转北煤南运的要求，在成煤条件不好的南方大力找煤；提出了一些过高的不切实际的地质找矿指标，而对国民经济急需的却没有得到应有的重视和加强。地质工作的比例失调比较严重，要进一步搞好调整，必须认真清除左倾思想的影响。"},{"type":"paragraph","text":"会议指出，地质工作进一步调整的任务是：打破行政区划框框，在资源形势分析和成矿远景区划的基础上，统筹兼顾，加强基础地质调查研究，使地质工作的基本布局和队伍结构更趋合理，努力提高地质研究程度和找矿效果，提高地质工作的经济效果。在地质找矿方面，必须根据国家建设需要和地质条件可能相结合的原则进行部署。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"004903c785"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
