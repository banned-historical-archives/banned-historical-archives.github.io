],"dates":[{"year":1949,"month":8,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"铁路职员冯怀义勾结私商剥削工人"},{"type":"paragraph","text":"已经太原铁路局查明撤了职"},{"type":"paragraph","text":"【本报讯】本报三月一日第一版刊载“铁路局职工冯怀义勾结私商投机倒把”消息，已经太原铁路管理局深入检查。事实经过情形如下：解放军野战一兵团采购员张同志，包给私营铁炉经理丁维士洋镐八百把，每把实价小米三十八斤。丁维士包到后，又由冯怀义经手转包给阳泉库铁工工友一百五十把，以作职工业余生产，每把小米三十斤。据了解：冯怀义由丁维士手中承包时，即由丁维士给他订立了两张合同，一张每把小米三十五斤，一张每把小米三十斤（该两张合同已为阳泉一区工会扣存），和工人面议是三十斤一把的那张合同，计一百五十把洋镐相差小米七百五十斤，事后为阳泉职工会知悉追究，被逼承认实有其事。给工人价款时，按每把三十五斤小米折给。当时冯怀义虽则承认，并不很好反省错误，事后竟又收了工人一百斤小米作报酬，一错再错剥削工人。事实查明后，该局以冯怀义身为股长，竟敢欺骗公家，剥削渔利欺瞒工人，除将小米一百斤全数追出退给工人外，撤除股长职务，以维路纪，而警效尤。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a6dcae6d7c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
