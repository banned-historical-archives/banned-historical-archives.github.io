残余  还要求军队参加一批大的骨干工程建设，使光荣的人民军队更加光荣杨尚昆指出要彻底否定“文革”，整党一定要搞得踏实，真正解决问题","authors":["李月柱"],"dates":[{"year":1984,"month":5,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"胡耀邦在沈阳会见部队领导干部要求通过整党提高干部思想"},{"type":"paragraph","text":"克服主观主义和政策上“左”的残余"},{"type":"paragraph","text":"还要求军队参加一批大的骨干工程建设，使光荣的人民军队更加光荣杨尚昆指出要彻底否定“文革”，整党一定要搞得踏实，真正解决问题"},{"type":"paragraph","text":"新华社沈阳5月19日电　（记者李月柱）中共中央总书记胡耀邦和中共中央政治局委员、中央军委副主席杨尚昆17日在沈阳会见驻东北地区陆海空军领导干部时，要求部队搞好整党，积极参加四化建设，使光荣的人民军队更加光荣。"},{"type":"paragraph","text":"胡耀邦在讲话中说，这几年来，部队工作的进展是很大的，所以取得这么大的进展，有两个基本条件：第一，有党中央和中央军委的正确领导，主要是军委邓小平主席领导得好，军队大的事情、大的决策都是在邓小平主席亲自主持下定的；第二是我们广大干部作了努力，特别是领导班子调整以后，工作更加蓬勃。"},{"type":"paragraph","text":"胡耀邦要求军队积极参加祖国的四化建设。他说，军队总结了军民共建精神文明的经验。这项工作搞得很好，成绩很大。在军民共建文明方面，我给你们提两条具体要求：第一，现在我们正在整党，准备三年完成。我们的四化建设还有许多困难，资金不足，管理经营落后，吃“大锅饭”的现象严重。我认为其中最大的困难是如何提高干部的思想。通过整党，真正克服我们思想中的主观主义，政策上的“左”的残余，“左”的情绪，这是第一位要解决的困难，第一位要办的事情。军队整党，一般来说都是走在前头的。希望你们做出样子，起到帮助地方的作用，克服“左”的影响，克服不正之风。第二，军队要参加一批大的骨干工程建设。这是邓小平同志提出来的，他特别赞扬了参加引滦入津工程的部队。军队以后可以参加一部分骨干工程建设。我们光荣的人民解放军同地方合作出力，能够在本世纪末建设成几十个大工程，军队就光荣上面加光荣了。"},{"type":"paragraph","text":"杨尚昆在讲话中列举军队开创新局面所取得的成绩后，重点讲了整党问题。他说，总的来看，军队整党的进展是不错的，第一阶段学习文件情况很好，转入对照检查都比较稳当，强调一定要准备好再转。杨尚昆指出，整党一定要搞得踏实，真正能够解决问题，达到党中央提出的要求。他提出对照检查要坚持四个为主：以领导班子集体检查为主，以现在的领导班子为主，以检查近期问题为主，以检查如何开创新局面为主。决不要搞成人人过关。要彻底否定“文化大革命”，不把这个问题说透，就难以消除派性，难以搞好整党。杨尚昆希望退下来的老干部，积极帮助现在的领导班子整好党。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"胡耀邦","type":"人物"},{"name":"派性","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"48e3394644"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
