script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反击资产阶级的猖狂进攻 北京文艺工作者开上“前线”作家丁玲、曹万等二百余人先后参加市节约检查委员会检查小组工作","authors":[],"dates":[{"year":1952,"month":2,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"北京文艺工作者，积极参加了反对不法工商业者盗窃国家资财的轰轰烈烈的实际斗争。春节前，参加北京市节约检查委员会检查小组的文艺工作者，有作家丁玲、曹禺和中央文学研究所的青年作家徐光耀、陈淼、雷加、玛金等十五人，中央戏剧学院创作室的贺敬之、贾克等，北京话剧院邵潍、耿震等十余人，中央美术学院同学二十五人。电影剧本创作所剧作家十二人，北京电影制片厂演员六人，春节后，已参加检查小组工作；中央美术学院教员胡一川、冯法襈、董希文、吴冠中、陈晓南、文景阳等人和同学二百余人，亦将陆续开赴“前线”。"},{"type":"paragraph","text":"北京文艺工作者参加这次反对不法工商业者的行贿、偷税、偷工减料、盗窃国家资财的斗争，都是作为检查小组的战斗 的一员参加实际工作的，有的人还担任了小组长。现在，每个人都正紧张地短刀相接地向不法工商业者作战。"},{"type":"paragraph","text":"反击和打退资产阶级的猖狂进攻，是一场严重的阶级斗争。文艺工作者必须迅速地反映这一斗争，发挥文艺武器的战斗威力。有的同志在检查工作告一段落时，就写出了配合运动的短文和短诗，用文艺作品参加了战斗。"},{"type":"paragraph","text":"另外，北京电影制片厂拍摄三反运动新闻片的摄影队，在北京有四队，天津、上海各两队，第一号新闻片已在全国各地影院放映；开赴沈阳、武汉、广州、重庆、西安等大城市的摄影队，现已陆续出发。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0cae97a7a2"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
