script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"首都举行公祭甘泗淇同志大会罗瑞卿大将主祭　徐立清中将致悼词","authors":[],"dates":[{"year":1964,"month":2,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京9日电】　中国人民解放军总部各部和首都部队官兵以及首都各界两千五百多人，今天上午在中山公园中山堂举行公祭，追悼毕生献身于中国人民解放事业的革命战士——中共中央候补委员、中国人民解放军总政治部副主任甘泗淇同志。"},{"type":"paragraph","text":"公祭大会由中共中央书记处书记、国务院副总理兼中国人民解放军总参谋长罗瑞卿大将主祭。"},{"type":"paragraph","text":"甘泗淇同志的灵台前面，陈放着中国共产党中央委员会、人大常委会和国防部送的花圈，两侧摆着毛泽东、刘少奇、周恩来、朱德、宋庆龄、陈云、林彪、邓小平、董必武等党和国家领导人献的花圈。灵堂内外悬挂着许多挽联和挽幛。"},{"type":"paragraph","text":"上午十时，公祭大会在哀乐声中开始。主祭人罗瑞卿大将在甘泗淇同志的遗象前敬献花圈，全场肃穆致哀。接着，中国人民解放军总政治部副主任徐立清中将致悼词。他说，甘泗淇同志在长期的革命斗争中，积劳成疾，不幸于一九六四年二月五日与世长辞了。他的逝世，是我党我军的重大损失，我们都为此深感哀痛。"},{"type":"paragraph","text":"徐立清中将说，甘泗淇同志为中国人民的解放事业，献出了自己的一生，对于中国人民解放军政治工作的建设，做了大量的工作。他在长期革命斗争中，经历了二十多年的战争生活，一直到生命的最后一刻，仍然在积极地工作。在他的一生中，努力工作，艰苦朴素，平易近人和乐观愉快的精神，表现了共产党员的可贵品质，值得大家学习。"},{"type":"paragraph","text":"徐立清中将说，今天，我们怀着沉痛的心情，悼念我们的战友甘泗淇同志，我们要坚定不移地在党中央、毛主席的领导下，更高地举起毛泽东思想的伟大红旗，在党的社会主义建设总路线的指引下，为进一步加强我军的政治思想工作，为进一步加强我国的国防力量，为反对美帝国主义的侵略，为保卫和建设我们伟大的社会主义祖国而奋斗。"},{"type":"paragraph","text":"参加今天公祭大会的，有中共中央书记处候补书记杨尚昆和各方面的负责人李四光、蔡畅、廖承志、王首道、伍修权、萧克、王震、赵尔陆、吕正操、杨献珍、罗贵波、刘澜波、张启龙、徐冰、余秋里、何长工、张子意、邹大鹏、武新宇、吴德峰、南汉宸，和北京市的负责人万里、吴晗等。"},{"type":"paragraph","text":"参加公祭大会的，还有中国人民解放军高级将领许光达大将、刘亚楼空军上将、彭绍辉上将、杨成武上将、杨勇上将、李天佑上将、王新亭上将、傅钟上将、李聚奎上将、李志民上将、李达上将、傅秋涛上将、廖汉生中将、刘志坚中将、梁必业中将、萧向荣中将、王尚荣中将、刘少文中将、甘渭汉中将、莫文骅中将、王秉璋空军中将、王辉球空军中将、杜义德海军中将、吴信泉中将、向仲华中将、崔田民中将、孔石泉中将以及陆海空军部队的军官。"},{"type":"paragraph","text":"公祭仪式结束后，在哀乐声中起灵。甘泗淇同志的骨灰移置西郊八宝山革命公墓。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"徐立清","type":"人物"},{"name":"罗瑞卿","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e46bccd905"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
