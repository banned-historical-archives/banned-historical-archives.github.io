ical-archives/banned-historical-archives0/main/maoquanji31.pdf"],"article":{"title":"给毛岳乔的信","alias":"","parts":[{"type":"paragraph","text":"对周恩来关于解决三反中业务停顿问题的意见的批语"},{"type":"paragraph","text":"（1952年2月16日）周总理："},{"type":"paragraph","text":"我完全同意你的意见\"，请速予调整。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"二月十六日上午二时"},{"type":"paragraph","text":"[1]指周恩来1952年2月15日给毛泽东的信中提出的关于解决三反中业务停顿问题的意见。信中说，今日政务院会议后，同陈云、薄一波谈到三反斗争中业务停顿的问题现在已到应该予以解决的时候了。照中央一级三反斗争的情况看来，每个机关各级领导干部中抽出1/3或1/4的人来专搞业务，是完全可能的，不至于影响打虎工作。各部门业务如果没有领导同志来管是无法进行的。信中还说，要维持经济生活的正常进行，主席给天津市委电报中所指示的办法是主要的一面，同时，机关业务的恢复也是必须解决的另一面，没有这另一面，问题仍然得不到解决。在中央及京津两地的各机关，从现在起就可以这样做了，在全国至迟3月1日也可以这样做。"}],"authors":["毛泽东"],"dates":[{"year":1952,"month":2,"day":15}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":402,"page_end":402},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dbfc140346"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
