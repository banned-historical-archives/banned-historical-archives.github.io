" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji25","name":"毛泽东全集第25卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji25.pdf"],"article":{"title":"即刻部著全牙廖耀湘兵团","alias":"","parts":[{"type":"paragraph","text":"即刻部署全歼廖耀湘兵团！"},{"type":"paragraph","text":"（1948年10月20日）林、罗、刘："},{"type":"paragraph","text":"皓二十一时电悉。"},{"type":"paragraph","text":"（一）你们行动方针已有电示，即不打锦、葫而打廖耀湘。我们完全同意你们建议，如廖兵团继进，则等敌再进一步再进攻之；一经发觉敌不再进，或有退沈阳退营口的象征时，则立即包围彰武、新立屯两处敌人，以各个击破为方法，以全歼廖兵团为自的。望即本此方针，即刻动手部署，鼓励全军达成任务。"},{"type":"paragraph","text":"（二）因敌有随时退至营口可能，望令十纵准备，一经发觉敌有[1]指廖耀湘任司令官的国民党军第九兵团。"},{"type":"paragraph","text":"[2]林、罗、刘，指林彪、罗荣桓、刘亚楼，当时分别任东北野战军司令员、政治委员和参谋长。"},{"type":"paragraph","text":"[3]指林彪、罗荣桓、刘亚楼1948年10月19日21时给中共中央军委的电报。电报说：“估计彰武、新立屯地区之敌，有可能在现地不动，等整八军到锦西后，再南北配合向锦州前进，沈阳之敌则向营口撤退。但亦有另一可能，即是：现在彰武、新立屯地区之敌撤回新民、沈阳，利用辽河阻隔我军，全部向营口撤退。”电报建议，如沈阳之敌仍继续向锦州前进，则等敌再前进一步后再向敌进攻，但若有征候敌不再前进，或有回撤沈阳转往营口的动向时，则我军立即迅速包围彰武、新立屯两处敌人，以各个击破方法全部歼灭之。退营口的象征，即兼程开营口守备。"},{"type":"paragraph","text":"（三）高、伍\"建议以十二纵及三个独立师由钟伟指挥，由四平以北上车赶于二十四日以前全部运抵清源，以急行军开至鞍山、海城，堵塞敌向营口退路。此计划甚为必要，请即电高、伍照此速办，愈快愈好。惟十纵仍须准备从打虎山开营口，以占先机。当然，十纵目前可在打虎山不动，待敌有退营口征候时迅开营口。"},{"type":"paragraph","text":"（四）高、伍又建议，以其余各独立师及二线兵团由萧、萧指挥，向法库、彰武、新民急进，配合锦州主力歼敌。我们认为这也是完全必要的。惟第-一，以十二纵及三个独立师共六个师开鞍山、海城是否足够，如敌全力退营口，我六个师恐难抵御，是否应增加一二个独立师于营口方面。第二，去彰武、新民与敌接触的时机不可过迟，也不可过早，似宜适时隐蔽开至法库以北，待你们主力业已发起攻击抓住了廖耀湘时，突然断敌向沈阳退路为宜。以上两点请酌复高、伍。"},{"type":"paragraph","text":"（五）蒋介石十五日到沈阳时即携杜聿明?同来，是帮助卫立煌指挥撤退的。外国通讯社十八日讯，蒋介石又到沈阳。目前数日是"},{"type":"paragraph","text":"[1]高，指高岗（1905—1954)，陕西横山人，当时任东北军区第一副司令员。伍，指伍修权（1908一1997），湖北武昌人，当时任东北军区第二参谋长。"},{"type":"paragraph","text":"[2]钟伟（1915—1984)，湖南平江人。当时任东北野战军第十二纵队司令员。"},{"type":"paragraph","text":"[3]萧、萧，指萧劲光、萧华。萧劲光（1903一1989)，湖南长沙人，当时任东北野战军第一兵团司令员。萧华（1916-1985），江西兴国人，当时任东北野战军第一兵团政治委员。"},{"type":"paragraph","text":"[4]杜聿明（1904—1981），陕西米脂人。当时任国民党军徐州“剿敌决策时机，撤退是十五日就决定了的，如何撤退则或者昨今两日已经决定，或者尚待决定，并且决定之后又可改变。望你们密切注视这数日的动态，不失时机，争取大胜。"},{"type":"paragraph","text":"军委二十日四时"}],"authors":["毛泽东"],"dates":[{"year":1948,"month":10,"day":20}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":82,"page_end":84},"tags":[{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5f6960683c"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
