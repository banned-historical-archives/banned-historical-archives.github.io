art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"为什么必须学好毛主席军事著作一支队基层干部经过辩论提高了认识","authors":["徐文会"],"parts":[{"type":"paragraph","text":"本报讯 基层干部为什么学习毛主席军事著作？战术训练又如何体现毛主席军事思想？0054部队一支队就这一问题发动干部鸣放辩论，从而端正了大家的学习态度。"},{"type":"paragraph","text":"支队在学习毛主席军事著作时，有的同志存在一些片面认识。为了统一思想，激起大家的学习热情，支队曾发动群众展开辩论。有的同志说：毛主席的军事著作是研究战争规律和战略问题的，基层干部是搞战术训练的，学了联系不上。在讨论中，许多同志不同意这种意见，认为不能把战略和战术完全割裂开来。有的同志指出：战争指导规律和战略思想是进行战斗和战术运用的指导方针，它贯穿在一定历史阶段的每次战役和每个战斗的全部过程中。毛主席在论“中国革命战争的战略问题”中告诉我们，战略是研究战争规律带全局性的东西，战役战术是研究战争规律局部性的东西，局部性的东西是隶属于全局的，懂得了全局性的东西，就能更恰当地处理局部性的东西。"},{"type":"paragraph","text":"有的同志说，毛主席著作中所规定的战略原则，仅能从思想上从理论上领会，在战术训练中无法体现出来。讨论中大家认为，这种意见和前一种意见相仿，同样没有充分认识到毛主席军事思想对现实和未来反侵略战争的巨大指导意义。至于把毛主席以劣势装备战胜优势装备的敌人的战略思想、作战原则贯彻到战术训练中去，是不是可能呢？大家列举大量事实说明是完全可能的。例如，在大兵团战术演习中，开展广泛的小分队战术活动，采用穿插、迂回、分割、包围等战术手段，利用有利地形，集中优势兵力，迅速歼灭敌人，就体现了毛主席的利用敌人短处，发挥自己长处，出敌不意，打歼灭战的指导思想。演习中搞军民合练，就体现了毛主席人民军队人民战争的军事思想。因此有的同志说：“把毛主席的军事思想贯彻到战术训练中，这是理论结合实际，运用历史上的丰富经验使训练质量进一步提高的根本措施之一。”同时大家还指出：学习毛主席军事著作，决不能以死记某些词句、背熟几条原则为满足，而是要领会毛主席军事著作的精神实质，学习毛主席研究与解决中国革命武装斗争的立场、观点、方法。因此，在运用毛主席的作战原则时，要根据现代战争的特点加以发展。如过去战略防御是以运动战为主，反对固定的作战线和阵地战，承认非固定的作战线和运动战；现在则应既承认非固定的作战线和运动战，又承认固定的作战线和阵地战；过去反对大后方制度，承认小后方制度，现在则应承认大后方制度，也要承认小后方制度。通过辩论以后，大家一致认为毛主席军事著作永远是我军珍贵的财宝，人人都必须好好学习。 （徐文会）"}],"alias":""},"tags":[{"name":"人民战争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"38d3610435"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
