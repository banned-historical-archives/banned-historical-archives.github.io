ear":1976,"month":11,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"华国锋主席会见博卡萨总统等贵宾"},{"type":"paragraph","text":"华主席非常高兴地同博卡萨总统等客人一一热烈握手，并一起合影留念。华主席同贵宾们进行了亲切友好的谈话。李先念副总理参加会见"},{"type":"paragraph","text":"新华社一九七六年十一月十六日讯　中国共产党中央委员会主席、国务院总理华国锋今天下午会见了中非共和国总统、中非共和国革命委员会主席萨拉赫·阿丁·艾哈迈德·博卡萨及其随行人员。"},{"type":"paragraph","text":"会见在人民大会堂举行。下午六时，贵宾们来到会见厅，华国锋主席在会见厅门口的迎客松屏风前迎接客人。华主席非常高兴地同博卡萨总统和随同来访的第二副总理亨利·迈杜、外交部长安东尼奥·弗朗克一一热烈握手，并且同客人一起合影留念。随后，华主席同博卡萨总统等贵宾进行了亲切友好的谈话。"},{"type":"paragraph","text":"参加会见的有国务院副总理李先念，外交部副部长何英。（附图片）"},{"type":"paragraph","text":"华国锋主席同博卡萨总统热烈握手。"},{"type":"paragraph","text":"华国锋主席同博卡萨总统及其随行人员合影。　新华社记者摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"华国锋","type":"人物"},{"name":"李先念","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d3a0ea8b61"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
