tps://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives3/main/ff92c783-256c-487a-abd2-8e59e9be6390.pdf"],"article":{"title":"毛泽东同邓小平关于批评“四人帮”的一次谈话（节录）","alias":"","parts":[{"type":"paragraph","text":"毛泽东同邓小平关于批评“四人帮”的一次谈话（节录）（水生草常间。未海小平间志驻时）"},{"type":"paragraph","text":"（一九七至年六月）（邓：合说的光C，指一九七互车医用思目生在次角会议上所洋“西人都”联后，就治模著业席指学开合始讲“四人等”的会议。了毛主界都知道了。）（业您点头）我查有皮增，把问开了。（用：后他们否认定“四人都”。）这会有给带，美列少责，民热刻。我应不行了，员总理：总带小平，足叶的，只你爆奶，要会消在则格。有事是伙阵婚联，不要跑王济文，江费，不然用每别不好办事。作《后巧）期庄则棉语一下，告还免，不我陈爆就不。跑江常、王文，司小不野办。风向快要健了，有跌治用。（3，政动为的所也气是心，我进不举她适界优究，"},{"type":"paragraph","text":"--这个办法师，暂有余地，大家请是统行了。我难备视须文说，叫他找你（指功），听你的话。他成望不离。（邓：他最应的定言，秋语局许多国态感到不其实。）工青生不基欢他，专门应视这里合他的快：凭应买工作.没有大间题，你要肥工作干成来。（玛：这方面我还有决心批了。）那好。（及，成对的人悉常，一定会有。）（业岸笑）水秀于群，风必维之。（，开地工作时，主康经农达个工作用位，我说主1美肥我放出刀央上了。）这是叶节提议的，费成的。（%：总参谨长。）职是这料。通从成中析济心疗私的局机的的间生，正海密的地票的。中的国足容有行.-111"}],"authors":["毛泽东"],"dates":[{"year":1975,"month":6}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":108,"page_end":108},"tags":[{"name":"邓小平","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"四人帮","type":"人物"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9de0ee9da7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
