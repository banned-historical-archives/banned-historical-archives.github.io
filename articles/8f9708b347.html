ical-archives/banned-historical-archives0/main/maoquanji29.pdf"],"article":{"title":"对出版志愿军报纸请示报告的批语","alias":"","parts":[{"type":"paragraph","text":"对出版志愿军报纸请示报告的批语\""},{"type":"paragraph","text":"（1950年11月6日）"},{"type":"paragraph","text":"报纸可以名为“志愿军”。标明朝鲜人民军总司令部批准出版字样。部队的番号采用代字。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十一月六日"},{"type":"paragraph","text":"[1]这是毛泽东对中央人民政府人民革命军事委员会总政治部主任罗荣桓、副主任萧华1950年11月6日请示报告的批语。"},{"type":"paragraph","text":"[2]罗荣桓和萧华的请示报告说：志愿军政治部请示有关出版报纸问题，我们意见，为了更好保守军事秘密及不给敌人以可乘的借口起见，拟用朝鲜人民军所属某部名义出版（报头另加中文版三字）。所有部队番号均用代字，稿件内容一律经过慎重审查才刊登。"}],"authors":["毛泽东"],"dates":[{"year":1950,"month":11,"day":6}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":353,"page_end":353},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8f9708b347"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
