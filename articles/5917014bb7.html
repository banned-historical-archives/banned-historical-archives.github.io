ical-archives/banned-historical-archives0/main/maoquanji45.pdf"],"article":{"title":"关于请刘晓等来杭州一谈给刘少奇等的信","alias":"","parts":[{"type":"paragraph","text":"关于请刘晓等来杭州一谈"},{"type":"paragraph","text":"给刘少奇等的信"},{"type":"paragraph","text":"（1962年12月25日）少奇、恩来、小平同志："},{"type":"paragraph","text":"我想请刘晓、伍修权、赵毅敏、廖承志四位同志来杭州一谈，听取他们所知的情况和意见。他们可以缓缓南来，沿途（天津、济南、合肥、南京、上海）作点调查研究，在年初（一月六日以前）到杭州即可。如你们及他们四位都同意的话，请即照办。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十二月二十五日[1]刘晓，当时任外交部副部长。"},{"type":"paragraph","text":"[2]恩来，即周恩来。小平，即邓小平，当时任中共中央总书记、国务院副总理。"},{"type":"paragraph","text":"[3]伍修权、赵毅敏，当时均任中共中央对外联络部副部长。廖承志，当时任国务院外事办公室副主任。"}],"authors":["毛泽东"],"dates":[{"year":1962,"month":12,"day":25}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":304,"page_end":304},"tags":[{"name":"毛泽东","type":"人物"},{"name":"廖承志","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"赵毅敏","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5917014bb7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
