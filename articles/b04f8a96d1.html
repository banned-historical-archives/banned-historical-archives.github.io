<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"中国民间歌舞团演出誉满坎帕拉乌干达观众高呼毛主席万岁中国革命歌舞演出加强了亚非人民反帝团结","authors":[],"dates":[{"year":1966,"month":11,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社坎帕拉20日电　正在访问乌干达的中国民间歌舞团最近在首都坎帕拉和工业城市金贾等地演出，受到热烈的欢迎。观众在看了演出后说:“毛泽东思想是彻底革命的指针，是革命人民的指路明灯。”坎帕拉的六千多观众热烈赞扬毛泽东思想哺育下的中国革命歌舞艺术。每当金光闪闪的毛主席像出现在舞台背景上时，全体观众一再发出热烈的掌声。一个乌干达青年看到毛主席像时非常激动地高呼:“毛主席万岁，毛主席万岁!”"},{"type":"paragraph","text":"乌干达的广大观众喜爱《大海航行靠舵手》、《毛泽东思想闪金光》和《石油工人凯歌》等颂扬伟大的毛泽东思想的歌舞。一位乌干达朋友看了描绘中国工人不畏艰难困苦、发扬自力更生精神，把荒川变成油海的情景时感动地说:“人民一旦用毛泽东思想武装起来，就真正能够改造自然。”一个大学生说:“我们从你们的演出中可以看到中国人民的力量。中国的一切成就都是在毛主席领导下取得的。”一个乌干达农民在观看了演出后一再同中国演员握手，并对他们说:“我通过你们的演出知道，中国人民在毛主席的领导下，团结得象一个人。你们的表演是对我们的鼓舞。”他表示祝愿毛主席万寿无疆。"},{"type":"paragraph","text":"三个从邻国来到这里的非洲青年在观看了演出后给歌舞团写的一封贺信中写道:“你们的演出以革命的精神加强了我们的勇气，使我们更加渴望学习毛主席的著作和毛泽东思想。”"},{"type":"paragraph","text":"乌干达观众还十分喜爱反映中国人民英勇斗争和战斗精神的舞蹈，如《飞夺泸定桥》和《女民兵》以及表达亚非拉人民的革命愿望和战斗意志的歌曲《亚非拉人民要解放》等。一位乌干达新闻工作者对新华社记者说:“你们的演出不仅促进了乌干达人民和中国人民之间的文化交流，而且加强了亚非人民的反帝团结。”另一位乌干达朋友说:“你们的演出有助于提高非洲人民的反帝觉悟。”一位非洲青年说:“中国的演出向非洲的革命人民表明，没有革命精神，我们就不可能取得真正的独立和在各个方面自力更生。”"},{"type":"paragraph","text":"中国民间歌舞团是在十二日到达乌干达的。歌舞团十四日晚上在坎帕拉的纳基武博运动场举行首次演出时，乌干达政府部长、国民议会议长、各界知名人士和外交使节以及中国驻乌干达大使陈志方观看了演出。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b04f8a96d1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
