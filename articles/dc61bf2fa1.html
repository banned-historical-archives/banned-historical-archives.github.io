{"year":1965,"month":7,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛泽东主席会见印度尼西亚共产党代表团"},{"type":"paragraph","text":"新华社四日讯　中国共产党中央委员会主席毛泽东，今天会见印度尼西亚共产党代表团团长、印度尼西亚共产党中爪哇大地区委员会常委苏克米，副团长、印度尼西亚共产党西苏门答腊大地区委员会常委阿布·曼苏尔，以及代表团成员：斯拉末，格美克，阿明·则因，西玛莫拉，吉丹姆，苏巴尔第。毛泽东主席同代表团全体同志进行了亲切友好的谈话。"},{"type":"paragraph","text":"会见时在座的有中共中央委员刘宁一，中共中央机关负责工作人员张上明。"},{"type":"paragraph","text":"（附图片）"},{"type":"paragraph","text":"七月四日，毛泽东主席会见了印度尼西亚共产党代表团团长苏克米、副团长阿布·曼苏尔以及代表团的全体同志。毛泽东主席同苏克米（前左四）、阿布·曼苏尔（前左六）等印度尼西亚同志合影。"},{"type":"paragraph","text":"新华社记者　钱嗣杰摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dc61bf2fa1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
