ical-archives/banned-historical-archives8/main/maoquanji23.pdf"],"article":{"title":"陈菜部的供应和普要鲁像三个纵队行动问题","alias":"","parts":[{"type":"paragraph","text":"陈栗部的供应和晋冀鲁豫"},{"type":"paragraph","text":"三个纵队行动问题！"},{"type":"paragraph","text":"（1947年8月16日）滕，并告陈、粟："},{"type":"paragraph","text":"删辰电悉。（一）我山东主力六个纵队及炮纵均在冀鲁豫及豫皖苏地区作战，你们必须以全力援助解决供应问题，即派负责人去聊城、寿张找陈粟商量。（二）王新亭纵队仍在太岳地区，以一部攻占垣曲，策应豫西陈谢行动。先念率赵纵\"至聊城，受陈粟指挥，相机南进。王宏坤纵队?迅速完成编整准备，于本月底下月初"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军委起草的给晋冀鲁豫军区第二副司令员滕代远的电报。"},{"type":"paragraph","text":"[2]陈、粟，指陈毅、粟裕，当时分别任华东野战军司令员兼政治委员和副司令员。"},{"type":"paragraph","text":"[3]寿张，旧县名，1964年撤销，辖区分别划归山东阳谷县和河南范县。"},{"type":"paragraph","text":"[4]王新亭纵队，指晋冀鲁豫军区第八纵队，纵队司令员王新亭。"},{"type":"paragraph","text":"[5]陈谢，指陈、谢富治，当时分别任晋冀鲁豫野战军陈谢集团前委书记和副书记。"},{"type":"paragraph","text":"[6]先念，即李先念，当时任晋冀鲁豫野战军副司令员。[7]赵纵，指晋冀鲁豫野战军第十二纵队，纵队司令员赵基梅。[8]王宏坤纵队，指晋冀鲁豫野战军第十纵队，纵队司令员王宏坤。受陈粟指挥，加入鲁西南作战。"},{"type":"paragraph","text":"军委铣申"}],"authors":["毛泽东"],"dates":[{"year":1947,"month":8,"day":16}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":211,"page_end":212},"tags":[{"name":"毛泽东","type":"人物"},{"name":"王宏坤","type":"人物"},{"name":"王新亭","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fa09c09fec"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
