"year":1975,"month":5,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"坎温·布法宣布开除一批极右反动军官"},{"type":"paragraph","text":"新华社万象一九七五年五月十六日电  据万象电台广播，根据老挝临时民族联合政府首相梭发那·富马亲王的命令，国防和退伍军人部国务秘书、万象军队总负责人坎温·布法将军五月十六日宣布，自即日起开除一批极右反动军官。被开除军籍的极右派军官有：前万象军队副总司令库帕拉西·阿沛少将、前国防和退伍军人部总局长乌敦·萨纳尼空少将，前万象方面第二军区司令（特种部队司令）王宝少将，前万象方面第五军区司令通立·觉宾本准将，前万象方面军事科学院院长坎西·萨纳尼空准将，前万象军队副总参谋长艾当·辛冯萨准将，前万象方面宪兵司令仑·西苏诺上校和前执行协定中央联合委员会万象方面代表团成员宋佩上校。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"537beabcb9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
