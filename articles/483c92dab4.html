art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东思想统帅千里边防","authors":[],"parts":[{"type":"paragraph","text":"日夜守卫在风雪帕米尔边防线上的军民，怀着对伟大领袖毛主席无限热爱、无限崇拜的心情，活学活用毛主席著作，把千里边防建设成毛泽东思想统帅的钢铁长城，时刻准备消灭敢于来犯的敌人。"},{"type":"paragraph","text":"每当红色电讯把毛主席的最新指示传到帕米尔高原，边防战士就立即以最快的速度把毛主席最新指示送到高原深处的每个毡房。图为塔吉克族牧民在迎接前来传达毛主席最新指示的边防战士。"},{"type":"paragraph","text":"新华社记者摄"},{"type":"paragraph","text":"千里边防线上军民团结如一人。各族牧民一边放牧，一边守卫边防。图为公社牧民乌帕尔艾依在向边防部队指战员报告他观察的边防情况。"},{"type":"paragraph","text":"新华社记者摄"},{"type":"paragraph","text":"胸有朝阳，心明眼亮。图为在海拔四千八百米的高山哨所的边防战士，正在国境线上值勤。"},{"type":"paragraph","text":"新华社记者摄"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"483c92dab4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
