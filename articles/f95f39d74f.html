ical-archives/banned-historical-archives8/main/maoquanji25.pdf"],"article":{"title":"给刘少奇等的信","alias":"","parts":[{"type":"paragraph","text":"给刘少奇等的信!I"},{"type":"paragraph","text":"（1948年12月4日）"},{"type":"paragraph","text":"（一）此电可以不发。因济南在老解放区的包围中，人口亦未超过百方，军管会取消，以市府行使政权，是可以的。（二）但沈阳、平、津、沪、宁乃至徐、汴、郑等处则是另一种情形，必须要看群众发动情形，反革命被镇压情形及周围环境巩固情形而决定军管制时间的长短。军管制的利益正是因为它帮助人民群众实行民主的独裁。如果人民群众讨厌这种独裁，必是军管会脱离了人民群众，不去帮助人民镇压反革命，而去妨碍人民镇压反革命。如果我们的军管制确是帮助人民镇压反革命，人民决不会把我们的和蒋介石的两种独裁看成一样。主张在大城市过早地取消军管制，是危险的。"}],"authors":["毛泽东"],"dates":[{"year":1948,"month":12,"day":4}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":332,"page_end":332},"tags":[{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f95f39d74f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
