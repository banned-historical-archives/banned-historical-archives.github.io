促使基层组织联合起来，用实际行动迎接国庆","authors":[],"dates":[{"year":1967,"month":9,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　在毛主席的伟大战略部署的指引下，上海科技界的三大革命群众组织——上海市科技单位革命造反总司令部、上海科技战线革命造反联络总站、工总司科研系统总联络站，昨晚实现了革命的大联合，成立了统一的革命群众组织——上海科技系统革命造反联合委员会。"},{"type":"paragraph","text":"科技界的三大革命群众组织都有共同的斗争目标——批倒、批臭党内最大的一小撮走资本主义道路当权派，彻底批判修正主义科研路线，把科技界办成毛泽东思想的大学校。但是，过去由于革命队伍内部受了山头主义、小团体主义、“唯我独左”、“唯我独革”、“以我为核心”等错误思想的影响，造成相互对立，相互排斥，抓住对方一些枝节缺点，无限上纲，甚至发展到打“内战”，使革命大联合长期不能实现。这种对立的情绪，也带到了三个组织的所属基层，影响了基层组织抓革命、促生产。"},{"type":"paragraph","text":"昨晚，三个革命群众组织的负责人，在市革命委员会的组织下会聚一堂，以毛泽东思想为武器，相互谈心，开展自我批评，大家决心立即执行毛主席的最新指示，紧紧掌握斗争的大方向，克服小资产阶级的派性，大树无产阶级的党性，实现革命的大联合；进一步联合上海科技界的无产阶级革命派和革命群众，团结一致，共同对敌，积极开展大学习、大批判、大斗争，狠抓革命，猛促科研，在革命大批判的斗争中进一步巩固和发展革命的大联合和革命的“三结合”。"},{"type":"paragraph","text":"会上，三个革命群众组织的负责人学习了毛主席的最新指示:在工人阶级内部，没有根本的利害冲突。在无产阶级专政下的工人阶级内部，更没有理由一定要分裂成为势不两立的两大派组织。他们说，我们只有联合起来的理由，没有分裂的理由。我们之间过去的任何摩擦，不应再作计较。今天，大敌当前，我们一定要紧密团结起来，为批倒批臭党内最大的一小撮走资本主义道路当权派及其爪牙，为打倒帝国主义、现代修正主义和国内外一切反动派而共同努力。"},{"type":"paragraph","text":"三个革命群众组织的负责人在取得一致认识的基础上，昨晚联合签订了革命大联合的协议，共同发表了实行革命大联合的声明。他们表示，在实现革命大联合的基础上，积极促进基层组织实现革命的大联合，在革命大批判的新高潮中，用实际行动来迎接伟大的国庆节。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"上海市工人革命造反总司令部（工总司）","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"派性","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"宣言"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fbdde8d526"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
