authors":[],"dates":[{"year":1972,"month":4,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"沿着毛主席的无产阶级文艺路线胜利前进"},{"type":"paragraph","text":"——革命现代京剧《红色娘子军》剧照"},{"type":"paragraph","text":"洪常青满怀革命豪情，动员群众，为扩大红色根据地而战斗。"},{"type":"paragraph","text":"“保主力插敌后，守阵地排万难，战士双手能擎天！”洪常青与两战士坚守在红云岭上，阻击敌人。"},{"type":"paragraph","text":"洪常青以高度的革命胆略，深入匪窠，智斗群匪。南贼等卑躬屈膝，争相逢迎。"},{"type":"paragraph","text":"“笑顽敌垂死挣扎枉费心肠。洒热血迎黎明我无限欢畅”。洪常青满怀对共产主义事业的坚定信仰，大义凛然，从容就义。"},{"type":"paragraph","text":"娘子军连战士们在军事民主会上，讨论攻打椰林寨的战斗方案。"},{"type":"paragraph","text":"洪常青热情地指引吴清华“迎着朝阳去”投奔那“崭新日月照河山”的革命根据地。"},{"type":"paragraph","text":"洪常青用毛泽东思想的阳光雨露哺育吴清华迅速成长，使吴清华懂得了革命不但要靠勇敢，还要有一条正确的路线。"},{"type":"paragraph","text":"根据地里，阳光灿烂，英雄树下，一片欢笑。军民畅叙鱼水情，团结战斗骨肉亲。"},{"type":"paragraph","text":"踏着英雄的血迹，继承先烈的遗志。军民一心，发出誓言：“继续冲锋在革命大道上！直到五洲四海红旗飘扬！”"},{"type":"paragraph","text":"（本版照片均为新华社稿）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cbfc3184a6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
