":["冯玉明","哈尔滨师范学院"],"dates":[{"year":1957,"month":6,"day":9}],"is_range_date":false,"parts":[{"text":"在学院教授、讲师座谈会上的发言","type":"title"},{"text":"哈尔滨师范学院冯玉明","type":"authors"},{"text":"（冯玉明：民主促进会哈尔滨市筹委会委员、哈尔滨师范学院讲师）","type":"subtitle"},{"text":"我们学院的“清一色”是指处长级以上干部无一党外人士而言。当我不知道图书馆卢馆长是处级干部之前，这是客观现实，但，这不是永久性的“清一色”。我看问题的角度是从领导与被领导，党群关系来看的，当然，要看院一级的干部。他还说，宗派主义有两点，一个是组织上的，一个是作风上的，我谈的是组织上的人事安排问题，至于处长级以上干部无一党外人士的现象，这是客观存在。“清一色”和“党天下”不是一回事，语意在我体会也好像是不同，形式也许相近，但用语、起源不同，使用者心情不同，有善意的，有恶意的。他最后说，有些单位现在感到春伴如秋意转浓。（6月16日哈尔滨日报）","type":"paragraph"}],"comments":[],"origin":"《鸣放言论（二）》（哈尔滨：“学习生活”编辑室编，1957年7月10日）。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"67a1e055b5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
