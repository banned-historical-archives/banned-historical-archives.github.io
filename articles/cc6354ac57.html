范例  赞扬中国文化大革命对世界革命的前途具有决定性意义","authors":[],"dates":[{"year":1967,"month":10,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"意共（马列）为庆祝中华人民共和国成立十八周年发表声明"},{"type":"paragraph","text":"中国革命为全世界革命者提供了范例"},{"type":"paragraph","text":"赞扬中国文化大革命对世界革命的前途具有决定性意义"},{"type":"paragraph","text":"新华社五日讯　罗马消息：意大利共产党（马克思列宁主义）书记处为庆祝中华人民共和国成立十八周年发表声明指出：“全世界一切真正的马克思列宁主义者都必须从中国革命的丰富经验中吸取教益和力量”。"},{"type":"paragraph","text":"意大利共产党（马克思列宁主义）机关报《新团结报》最近一期在《中华人民共和国万岁》的标题下刊载了这一声明。声明强调说，中国革命证实了“枪杆子里面出政权”的原理。全世界一切真正的共产党人和马克思列宁主义者要正确地进行革命，就必须更加深刻地领会在毛泽东思想指导下的中国革命的历史经验。"},{"type":"paragraph","text":"声明赞扬由毛泽东同志亲自发动和领导的中国无产阶级文化大革命。声明指出，在毛泽东思想指引下的中国无产阶级文化大革命，解决了无产阶级夺取政权后如何巩固政权、防止资本主义复辟和把革命推向前进这个决定性的问题。因此，对待无产阶级文化大革命的态度，是区分真正的马克思主义者和马克思列宁主义的敌人以及假革命者的决定性因素。"},{"type":"paragraph","text":"声明指出，帝国主义、修正主义和一切反动派极力歪曲中国无产阶级文化大革命，但是，这丝毫无损于中国无产阶级文化大革命的普遍意义。中国无产阶级文化大革命不仅对于在中国建设社会主义和共产主义，而且还对全世界的革命前途具有决定性意义。声明强调指出，在伟大的毛泽东思想指导下的中国革命，为全世界一切真正马克思列宁主义者进行革命斗争提供了一个具有永久、普遍意义的范例。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cc6354ac57"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
