斗争经验","authors":[],"dates":[{"year":1952,"month":3,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社天津四日电】　天津市机关、工厂、企业的反贪污运动，第二个战役已胜利结束，战果辉煌。经过这一战役，全市各单位已基本上克服了右倾思想和运动的不平衡现象；群众业已发动起来，全体打“虎”指战员，都信心很大，勇气极高；并创造了许多打“虎”经验。"},{"type":"paragraph","text":"这次战役是二月五日开始的。开始时，各单位领导干部首先在订“打虎计划”中克服了右倾思想。第一次的计划，一般是保守的，待大家掌握了“发动群众、搜集材料、研究问题、讲究战术”的方法之后，都纷纷自动修改计划，增加数字。"},{"type":"paragraph","text":"战役开始后。有些单位进展比较迟缓，主要原因是这些单位的领导干部思想右倾，或者他们本身手脚不干净。天津市节约检查委员会对这些单位采取了断然措施，撤换了一批不力的干部，纯洁和加强了各单位的打“虎”指挥部。"},{"type":"paragraph","text":"有些单位的领导人开始时不相信群众，怕“群众知道的事情不多”，怕“耽误生产”，怕“群众左”。后来，凡是发动群众的，检举的材料就多，打虎的声威也振作起来。尤其在工厂，华北纺织管理局所属棉纺第三厂，工人起来后，检举材料有三千多件，工人家属也检举了一百多件，并帮助打“虎”。"},{"type":"paragraph","text":"战斗中，市节约检查委员会及时地交流了各单位的打“虎”办法和经验。在运动中，群众有很多新的创造与经验。如工业器材公司，掌握了“头脑清醒”“不放松一个线索，不漏掉一个缺口”和“箭不虚发、一发必中”的原则，使第一次战役打出的“小老虎”有的变成了“大老虎”。电业局首先掌握材料，确定目标，将熟悉各个大贪污嫌疑犯情况的人员，组织成若干有力的打虎队，然后召开大会，在会上“点名誓师”——公布大贪污犯的名单，指派打虎队分别围攻。打“虎”的声势浩大，“虎威”尽去，“虎形”难躲，一下就打出“大老虎”。"},{"type":"paragraph","text":"现在各单位，还有少数的贪污分子企图“抱残守缺”，拒不坦白。市节约检查委员会决定稍加休整，调整队伍，交流经验后，再发动第三次战役。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3f563c294b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
