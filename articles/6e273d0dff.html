ear":1967,"month":7,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"痛斥“剥削是救人”滥调爸爸、妈妈："},{"type":"paragraph","text":"在家时，爸爸常常给我讲，旧社会咱家上无片瓦，下无片土，一家人生活没有着落，只好给地主扛活，到头来还是吃不饱，穿不暖，实在活不下去。解放了，毛主席把咱穷人从苦海里救了出来，彻底翻了身，当上了社会的主人，过上了幸福生活。可是，党内最大的走资本主义道路当权派却胡说什么“剥削是救人”，“劳动人民不是反对剥削，而是欢迎剥削”。这简直是胡说八道，是妄想拉我们走回头路，受二遍苦。我们绝对不答应！"},{"type":"paragraph","text":"爸爸、妈妈：我们必须牢记毛主席“宜将剩勇追穷寇，不可沽名学霸王”的教导，穷追猛打，让中国的赫鲁晓夫象过街老鼠，无处藏身。"},{"type":"paragraph","text":"广有"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6e273d0dff"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
