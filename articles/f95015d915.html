rt":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"振兴中国哲学当以毛泽东哲学为基础","authors":[],"parts":[{"type":"paragraph","text":"《长江日报》3月7日发表胡为雄文章说：中国哲学通向繁荣之路的唯一切近的出发点就是毛泽东哲学。这是因为："},{"type":"paragraph","text":"一、毛泽东哲学为中国新民主主义革命的胜利和使中国稳步进入社会主义阶段提供了正确的方法，它在今天仍然有效地发挥着这种功能。作为马克思主义哲学发展的毛泽东哲学，哺育了中国整整三代人。"},{"type":"paragraph","text":"二、毛泽东哲学是中西哲学联璧的升华物，是时代智慧的结晶。毛泽东哲学既是马克思主义的，又是中国式的；既能唯物辩证地解释自然、人类社会和人类思维发展的客观规律，又能象中国传统哲学那样与治理社会事务，与社会政治观、伦理观紧密结合起来，这就使得中国哲学一跃而登上了辩证唯物主义的宝座。从而形成了中国哲学发展史上的最近环节，这个环节直至如今还在生长、发展、壮大。"},{"type":"paragraph","text":"三、毛泽东哲学有着丰富广漠的内容，许多珍贵的思想有待我们去进一步挖掘和发扬。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f95015d915"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
