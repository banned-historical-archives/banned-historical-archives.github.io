知","authors":[],"dates":[{"year":1979,"month":2,"day":7}],"is_range_date":false,"parts":[{"text":"中国人民银行关于对上山下乡知青场、队发放贷款问题的通知","type":"title"},{"text":"各省、市、自治区分行：","type":"appellation"},{"text":"关于贯彻执行中共中央一九七八年十二月十二日转发《国务院关于知识青年上山下乡若干问题的试行规定》中有关知青场、队贷款问题通知如下：","type":"paragraph"},{"text":"一、集体办的实行独立核算的知青场、队，在从事生产过程中所需的生产资金，应首先用国家(包括地方上的)安排的专项资金解决，专项资金不足的可以申请贷款。金融部门按照社队贷款的有关规定适当予以贷款支持。","type":"paragraph"},{"text":"二、银行贷款属于周转性质的资金，知青场、队有收益后，应首先偿还银行到期贷款。","type":"paragraph"},{"text":"三、属于“开办费”性质的铺底资金，银行不能贷款。","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"上山下乡","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8a0baf43c5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
