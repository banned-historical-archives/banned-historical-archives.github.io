,"穆木天"],"dates":[{"year":1957,"month":5,"day":17}],"is_range_date":false,"parts":[{"text":"我的呼吁","type":"title"},{"text":"北京师范大学穆木天","type":"authors"},{"text":"（穆木天：北京师范大学教授）","type":"subtitle"},{"text":"数年来，北京师范大学教授们心里积压了千头万绪的苦恼。直到最近这几天，春风才算吹进了铁狮子坟的师大校门缝儿。尽管学校当局召开了几次教授座谈会，可是，教师还是顾虑重重，不敢大胆提意见，怕再遭一吹无枉之灾，因为，在师大，教师被发配、降级等等之类的阴谋报复，是早有前例的。","type":"paragraph"},{"text":"闻者不戒，言者有罪，“刑不上大夫，礼不下庶人，”是师大几年来一贯的传统。这次运动，当然，我也有很多顾虑。但，我相信党，相信毛主席，终于鼓起勇气发了言。","type":"paragraph"},{"text":"就在上周一次座谈会上，我把我的意见只说出几十分之一，可是，主持会议的某党员首长把我的意见都给打了回票。","type":"paragraph"},{"text":"我提了党领导者一些宗派主义的行为。如某党员教授刚到校不久就把他过去写的半部中国文学史交党员首长，不经过教研室和系的研究，由这位首长直接推荐给教育部出版。而李长之教授真正在师大讲授的中国文学史讲义，水平比那位党员教授的要高的多，却不被推荐。又如教研室初成立时，非党员教研室主任是单干，而党员教研室主任继任时，则先由校长出马调动某讲师作秘书等等事例，我认为都是宗派主义行为。我还举出某党员老婆孩子一大堆还违法乱纪乱搞男女关系事。我认为党委和行政不处理这件事，也是宗派主义行为。可是，党员首长把我的话完全给打回来了。他说那位党员教授去年才恢复党籍，不算宗派主义。至于另外那位同志乱搞男女关系的事，已经处理过了，处理内容就是作了检讨，并且本人也不知道女方是有爱人的，更不知道她的爱人为此而动刀自杀事。说这也不算宗派主义。","type":"paragraph"},{"text":"我很不会说话，更不会巧辩，一气之下，只好退出会场，直到今天，我没有勇气再参加这些会了。事实具在，而作为领导整风的首长，还敢于巧辩，师大的这个运动的前途不能不令人担忧。","type":"paragraph"},{"text":"我呼吁：请党中央像搭救王蒙一样，救救师大罢！让黑暗王国有一线光明罢！","type":"paragraph"},{"text":" 57年5月17日于铁狮子坟师大（原载5月22日《光明日报》）","type":"paragraph"}],"comments":[],"origin":"《首都高等学校反右派斗争的巨大胜利》（北京：北京出版社，1957年）。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"933a70b97a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
