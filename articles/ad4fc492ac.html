"dates":[{"year":1982,"month":10,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"叶剑英委员长致电"},{"type":"paragraph","text":"热烈祝贺贾亚瓦德纳当选斯里兰卡总统"},{"type":"paragraph","text":"新华社北京10月23日电　中华人民共和国全国人民代表大会常务委员会委员长叶剑英今天打电报给贾亚瓦德纳，热烈祝贺他当选斯里兰卡民主社会主义共和国总统。电报全文如下：科伦坡斯里兰卡民主社会主义共和国总统贾亚瓦德纳先生阁下："},{"type":"paragraph","text":"在阁下当选斯里兰卡民主社会主义共和国总统的时候，我谨代表中国人民和中国政府并以我个人的名义向阁下表示热烈的祝贺和最良好的祝愿。祝阁下在领导斯里兰卡人民建设自己国家的崇高事业中取得新的成就。祝中斯两国人民的传统友谊日益巩固和发展。"},{"type":"paragraph","text":"中华人民共和国全国人民代表大会"},{"type":"paragraph","text":"常务委员会委员长　叶剑英"},{"type":"paragraph","text":"1982年10月23日于北京"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ad4fc492ac"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
