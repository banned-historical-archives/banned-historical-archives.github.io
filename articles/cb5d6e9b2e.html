[],"dates":[{"year":1981,"month":8,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社北京八月十日电　中共中央党史资料征集委员会副主任谢筱逎在今天开幕的全国党史资料征集工作会议上说，中共中央党史资料征集委员会成立一年多来，已征集到历史文献和档案资料三千多件，革命回忆录二百多篇，收到资料目录六百五十多册，计一千五百卷，二十一万件。"},{"type":"paragraph","text":"谢筱逎说，粉碎“四人帮”以后，叶剑英、邓小平、陈云等老一辈无产阶级革命家对研究和编写党史工作特别重视。他们指出，为了编好党史，首先要把党史资料立好，立准确。中央党史资料征集委员会去年五月成立以来，会同中央档案馆，到中央机关和十几个省、市、自治区进行了党史资料的征集工作。在已征集到的党史资料中，有珍贵的历史文件；有毛泽东、周恩来、刘少奇、朱德等老一辈无产阶级革命家的文稿、照片、讲话记录。"},{"type":"paragraph","text":"在征集文字资料、历史文献的同时，征集委员会还十分重视党史“活资料”的征集工作。去年年底以来，中央党史资料征集委员会向一万七千多名第二次国内革命战争以前参加革命的老干部发出征集信。在短短几个月的时间里，中央党史资料征集委员会就收到了老干部寄来的数百万字的回忆录和材料。"},{"type":"paragraph","text":"谢筱逎希望各级党史资料征集委员会，充分发挥党史工作者的积极性和创造性，为圆满完成征集党史资料的任务，为编写党史正本贡献力量。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cb5d6e9b2e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
