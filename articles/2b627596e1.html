art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"搞好革命团结是毛主席一贯的伟大思想","authors":["工程兵活学活用毛泽东思想先进单位标兵某部党委学习中心组"],"parts":[{"type":"paragraph","text":"“团结起来，争取更大的胜利。”是毛主席一贯的伟大思想。没有革命的团结就没有革命的胜利，在无产阶级夺取政权的时候，靠的是无产阶级的革命团结，在巩固和发展政权的时候，仍然靠无产阶级的革命团结。"},{"type":"paragraph","text":"几年来，我们部队党委的团结状况基本上是好的，特别是在无产阶级文化大革命中，同志们深深认识到，军队是无产阶级专政的柱石，担负着保卫无产阶级专政的光荣任务，搞好部队的团结，特别是领导班子的团结尤其重要。斗争实践告诉我们：什么时候团结搞得好，什么时候就进步，就取得胜利。我们决心在毛主席最新指示的巨大鼓舞下，进一步搞好革命团结，为巩固无产阶级专政，贡献出我们的全部力量。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2b627596e1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
