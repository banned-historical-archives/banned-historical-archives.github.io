script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"新疆维吾尔自治区委党校学员决心以叶剑英同志国庆讲话为武器  继续深入批判极左  解放思想大胆工作","authors":[],"dates":[{"year":1979,"month":10,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新疆维吾尔自治区委党校学员决心以叶剑英同志国庆讲话为武器"},{"type":"paragraph","text":"继续深入批判极左  解放思想大胆工作"},{"type":"paragraph","text":"据新华社乌鲁木齐十月十日电  中共新疆维吾尔自治区委员会党校学员学习叶剑英同志在庆祝中华人民共和国成立三十周年大会上的讲话时，普遍把这个讲话称为“解放思想的金钥匙”和“肃清极左路线流毒的强大思想武器”。大家表示，一定要认真学习，努力贯彻，解放思想，大胆工作，加速祖国边疆的社会主义现代化建设。"},{"type":"paragraph","text":"自治区党校这一期的学员，都是来自天山南北各地、县和农垦团场的党政领导干部，有着丰富的实际工作经验。这些天，在宿舍里、课堂上，学员们学习叶剑英同志讲话的情景十分感人。许多老干部全神贯注地逐段逐句学习，有的学员放弃了国庆期间探亲会友的机会，在宿舍里专心致志地阅读、做笔记。他们认为，这个讲话深刻地揭露了林彪、“四人帮”蓄意制造和推行的极左路线的本质及其危害，使他们进一步认识到，要落实党的政策、加快四化建设的步伐，非肃清极左路线的流毒不可。"},{"type":"paragraph","text":"在阿克苏地区工作了二十多年的阿克苏县委副书记肖明玲，学习时回顾了文化大革命中林彪、“四人帮”推行的极左路线给当地造成的危害，激动地说，那时可真急人，极左路线可把人害苦了。接着，他谈到粉碎“四人帮”后阿克苏县的变化，特别是今年在党的十一届三中全会精神鼓舞下，阿克苏县委认真贯彻中央关于加快农业发展的两个文件，从而获得夏粮增产八百万斤的成绩。他说，我们的工作虽然有所改进，但是，对照讲话的精神，我们的思想还跟不上形势的发展，特别是真理标准问题的讨论在我们县还没有很好展开，许多问题还不敢想、不敢说。这说明我们对极左路线还批得很不够，极左路线强加在我们头上的精神枷锁还没有完全解除，许多禁区还没有打开。叶剑英同志的讲话指出，不批极左，人的思想统一不了，党的政策落实不了，四化建设就搞不成。因此，我们一定要以这个讲话为武器，继续深入地批判极左路线。"},{"type":"paragraph","text":"学习中，各族学员对讲话中关于要巩固和发展安定团结大好形势的论述，感到欢欣鼓舞。他们说，安定团结是四化建设的重要保证。克孜勒苏柯尔克孜自治州革委会副主任肉孜买合买提说，极左路线给党和人民造成了巨大的灾难。今后我们一定要加强干群团结和民族团结，同心同德奔四化，把“四人帮”鼓吹的“斗斗斗”，换成我们的“干干干”。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"林彪","type":"人物"},{"name":"四人帮","type":"人物"},{"name":"新疆文革","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0621999844"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
