ical-archives/banned-historical-archives8/main/maoquanji13.pdf"],"article":{"title":"对八路军参谋会议的意见","alias":"","parts":[{"type":"paragraph","text":"对八路军参谋会议的意见！"},{"type":"paragraph","text":"（1939年6月12日）左："},{"type":"paragraph","text":"抗战快届两周年，集总?召开参谋会议是有强大意义的，我们对此有如下意见希考虑："},{"type":"paragraph","text":"（一）会议方针应是总结两年来抗战中我军参谋工作方面的经验教训，确定参谋工作的总方向与目前急需进行的具体工作，提高参谋人员的政治素质与工作能力。望技术参谋达到战术、战略的参谋的水平。健全指挥机关，不仅特别善于进行游击战争中的参谋工作，并能准备为转入现代正规战中的参谋工作。"},{"type":"paragraph","text":"（二）会议在检查过去工作中优缺点，寻找其原因以求纠正缺点发扬优点时，应联系到过去红军时代的优良传统的发扬，特别是各种制度法规的审定（此间寄上的机要规则与作战科机密规则，可作讨论基础。已否收到，望告）。"},{"type":"paragraph","text":"（三）为适应目前整军时期的需要，应健全各级参谋处教育科。必要时，以参谋长兼科长，设副科长，主要任务在供给教材，指导与检查教育的实施"},{"type":"paragraph","text":"[1]这是毛泽东和中共中央军委副主席王稼祥、军委参谋长滕代远给八路军副参谋长左权的电报。"},{"type":"paragraph","text":"[2]集总，指第十八集团军（八路军）总司令部。"},{"type":"paragraph","text":"（四）尽可能设法减少人员，在集总参谋处直接领导下办参谋人员训练班，以应各级参谋处的要求。"},{"type":"paragraph","text":"（五）在职参谋人员的军政教育，应视为整军训练中的必要前提。"},{"type":"paragraph","text":"（六）参谋人员政治条件、工作能力、政治地位与信仰的提高，是和提高参谋工作的效能不可分离的条件。"},{"type":"paragraph","text":"（七）为使会议能顺利进行并获得完满结果，应作充分的准备，各个问题应分小组事先讨论，排除空洞的意见与琐碎的争论，要求有明确的方向与实际的具体的办法。"},{"type":"paragraph","text":"毛王滕延安杨家岭毛泽东故居中，彭德怀用降落伞为毛泽东制作的蚊帐。毛泽东在杨家岭的故居。《杨家岭的早晨》（油画）"}],"authors":["毛泽东"],"dates":[{"year":1939,"month":6,"day":12}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":461,"page_end":463},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"76cad4f484"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
