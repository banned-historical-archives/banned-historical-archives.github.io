s":["士杰"],"dates":[{"year":1946,"month":10,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"永智县委四次指示各区"},{"type":"paragraph","text":"彻底肃清封建剥削"},{"type":"paragraph","text":"扶植新富农广泛团结中农"},{"type":"paragraph","text":"【本报威县讯】永智县委四次指示各区，深刻检查工作，彻底消灭封建剥削。指示中强调提出：全县已有三百余村掀起翻身浪潮，解决了土地问题，但有些村庄封建剥削尚未消灭，地主仍然利用巧妙办法统治农民，很多假卖假当疏散土地，麻痹群众缓和斗争现象，还有不少村庄存在着贫农赤贫。为领导农民翻透身，彻底消灭封建剥削，应进一步的开展农民翻身斗争。并提出对富农只清算其封建剥削部分，对新升富农要扶植其发展，广泛吸收中农参加组织，坚决不损害其利益，如已违犯者，要在分配果实或生产中多加照顾，弥补其损失，或适当的给予赔偿。"},{"type":"paragraph","text":"（士杰）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ed8ecfd51a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
