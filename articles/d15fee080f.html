art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席派来的好“门巴”","authors":["政宣新"],"parts":[{"type":"paragraph","text":"今年九月的一天夜里，驻在喜马拉雅山区的某部卫生队的同志，接到牧区吉乡一个妇女难产的消息。军医张善明和卫生员王九姓接受了抢救阶级姐妹的光荣任务。"},{"type":"paragraph","text":"他们只知道到吉乡去的大略方向，没有人带路，要在这茫茫夜雾中找到病人的帐篷是很困难的。但是，他们怀着革命战士的高度责任感，认真执行伟大领袖毛主席关于卫生工作的光辉指示，每人带了一斤干粮，跨上快马出诊了。走了没多远，一座大山挡在前头。夜雾缭绕，看不见山顶。他们牵着战马爬山，山石陡滑，十分费力，滑下来，再爬上去。他们说，这正是我们锤炼忠于毛主席的红心的好机会。他们朗读着“下定决心，不怕牺牲，排除万难，去争取胜利”的最高指示前进，克服了一个又一个困难，终于在午夜爬上了山顶。但是往下一看，山峦重迭，山沟黑黑的，想找一家人问路都找不到。山风吹来，被汗水湿透的军装贴在身上，冰凉透骨，冷得他们牙齿格格打架。但是，用毛泽东思想武装起来的战士根本不把这些困难看在眼里。他们又爬过一座座大山，涉过一条条激流，直到第二天下午，才找到一个牧民帐篷。从牧民口中了解到，他俩走错了路，这里离吉乡那位难产病人的帐篷有一百多里，还要翻几座大山。人已经快一天一夜没有吃上饭，肚子里咕咕响；马也没有吃上草，饿得直叫。怎么办？他们想起伟大领袖毛主席的教导：“发扬勇敢战斗、不怕牺牲、不怕疲劳和连续作战（即在短期内不休息地接连打几仗）的作风”，身上增添了无穷的力量。他们说：“困难只能使革命战士锻炼得更坚强。”他们把干粮用一半来喂马，自己吃一半，又继续前进了。又经过一夜的跋涉，在太阳升起的时候，他们终于赶到了病人的帐篷门口。原来，这位妇女难产已经好几天了。张善明和王九姓想到阶级姐妹的痛苦，忘记了一天两夜连续行军的疲劳，立即投入了紧张的抢救工作。他们以白求恩同志为榜样，以两个“极端”的精神严格要求自己，紧张进行治疗。产妇得救了。产妇全家激动地高呼：“毛主席万岁！毛主席万万岁！”他们还激动地说：在万恶的旧社会，我们贫苦农奴得了病只有等死，今天“金珠玛米”（解放军）的“门巴”（医生）翻山越岭上门治疗。你们真是毛主席派来的好“门巴”"},{"type":"paragraph","text":"（政宣新）"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d15fee080f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
