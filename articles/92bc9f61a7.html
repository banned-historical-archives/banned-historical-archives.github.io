,"month":12,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"敬爱的武元甲同志，同志们，朋友们:"},{"type":"paragraph","text":"今天，我们中华人民共和国军事友好代表团，应邀前来访问亲密的兄弟邻邦——越南民主共和国，感到无限兴奋和愉快。请允许我，向勤劳勇敢的越南人民和英勇的越南人民军，转达中国人民和中国人民解放军最崇高的敬意和最亲切的问候。对于你们给予我们这样热情的欢迎，请允许我和代表团的全体同志表示衷心的感谢。"},{"type":"paragraph","text":"英雄的越南人民和越南人民军，在越南劳动党和越南人民敬爱的领袖胡志明主席的正确领导下，经过了英勇的斗争，打败了帝国主义侵略者和推翻了殖民主义的统治，解放了祖国的北方；在战后，又以自己的雄心壮志和忘我劳动，迅速医治了战争创伤，改变了长期以来殖民统治遗留下来的落后面貌，并在社会主义建设中获得了辉煌的成就。中国人民和中国人民解放军，为兄弟的越南人民和越南人民军所取得的光辉胜利和成就感到衷心的喜悦和敬佩。"},{"type":"paragraph","text":"中越两国是唇齿相依的邻邦。我们在争取各自祖国的独立和解放、反对帝国主义侵略的斗争中，结成了亲密的战斗友谊。近年来，我们在建设社会主义和保卫世界和平的共同事业中，建立了全面的兄弟般的友好合作关系。我们的友谊，是建立在马克思列宁主义和无产阶级国际主义原则基础上的，是牢不可破的。1959年，以武元甲大将为首的越南民主共和国军事代表团在我国的访问，对增进中越两国人民及其军队之间的兄弟友谊，作出了宝贵的贡献。我们相信，通过中国军事代表团这次友好的访问，将使我们两国人民和两国军队之间的友谊获得更进一步的发展；并使我们有机会向你们学到宝贵的经验。中越两国人民和两国军队之间的永恒友谊，将象长江和红河的水一样，长流不息!"},{"type":"paragraph","text":"中越两国人民和两国军队之间的牢不可破的友谊万岁!"},{"type":"paragraph","text":"越南劳动党万岁!"},{"type":"paragraph","text":"越南民主共和国万岁!"},{"type":"paragraph","text":"越南人民伟大的领袖胡志明主席万岁!"},{"type":"paragraph","text":"社会主义阵营的伟大团结万岁!"},{"type":"paragraph","text":"世界和平万岁!　(新华社河内15日电)"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"92bc9f61a7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
