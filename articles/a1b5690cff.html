":[],"dates":[{"year":1981,"month":10,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"民盟座谈会热烈拥护叶剑英委员长的谈话"},{"type":"paragraph","text":"希望台湾当局积极响应倡议"},{"type":"paragraph","text":"新华社北京10月2日电 中国民主同盟中央委员会10月1日上午举行座谈会，一致表示热烈拥护叶委员长的谈话，希望台湾当局就叶委员长提出的实现和平统一的九条作出积极的响应。"},{"type":"paragraph","text":"民盟中央主席史良在书面发言中说：“叶委员长的谈话，方针明确，态度诚恳，措施具体，充分体现了中国共产党和人民政府致力于和平统一祖国的愿望。”她希望台湾当局的有识之士捐弃前嫌，以民族大义为重，同中国共产党实行第三次合作，共同完成统一祖国大业。"},{"type":"paragraph","text":"民盟中央副主席华罗庚在发言中说，台湾回归，实现祖国统一，是全民族赋予我们这一代人的光荣使命。中华民族几千年的历史，团结、统一是主要的，分裂总是不能长久的。叶委员长的谈话，充分说明中国共产党光明磊落，真诚实意。他希望台湾当局能以民族大义为重，积极响应，双方及早进行谈判，实现中国共产党和中国国民党第三次合作。"},{"type":"paragraph","text":"民盟中央常委叶笃义说，国民党当局曾经公开表示过，国民党要以“民之所好好之，民之所恶恶之”。当前，民之所好莫过于祖国统一。现在，共产党已表明了完成祖国统一大业的诚意，国民党也应当表明自己的诚意。"},{"type":"paragraph","text":"在座谈会上，民盟中央副主席华罗庚和民盟中央常委张毕来、庄明理、千家驹、吴作人、刘开渠、刘思慕等希望台湾海峡两边的文人学者能够开展学术交流，并切望包括文人学者在内的台湾同胞积极促进全民族的大团结，为完成祖国统一大业而共同努力。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"发言"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a1b5690cff"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
