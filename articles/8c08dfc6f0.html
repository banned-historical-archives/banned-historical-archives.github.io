的成果","authors":[],"dates":[{"year":1969,"month":4,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"印度《解放》月刊编辑部发表贺词祝我党“九大”隆重召开"},{"type":"paragraph","text":"“九大”将巩固中国文化大革命的成果"},{"type":"paragraph","text":"新华社二十三日讯　印度《解放》月刊四月号发表了编辑部四月四日给中国共产党第九次全国代表大会的贺词，热烈祝贺中国共产党第九次全国代表大会隆重召开。"},{"type":"paragraph","text":"贺词说：“毛泽东主席领导的这次代表大会，无疑将巩固震撼世界的无产阶级文化革命的历史成果，在各方面加强无产阶级专政，使中国成为坚不可摧的世界革命的基地，鼓舞和加强全世界反对帝国主义和修正主义的革命斗争。”"},{"type":"paragraph","text":"贺词说，中国共产党第九次全国代表大会的决议，定将对马克思列宁主义、毛泽东思想的彻底胜利和击破现代修正主义作出贡献，把世界各国的马克思列宁主义者更加紧密地团结起来，加速资本主义帝国主义制度的灭亡。"},{"type":"paragraph","text":"贺词最后热情地写道：“伟大的中国共产党万岁！毛泽东主席万岁！万万岁！印度和中国两国人民的团结万岁！全世界工人和被压迫民族团结起来！”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8c08dfc6f0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
