ors":[],"dates":[{"year":1957,"month":7,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"梁致政倾心资产阶级“同人报”"},{"type":"paragraph","text":"吉林日报揭发这个党内右派分子的反动观点"},{"type":"paragraph","text":"本报长春25日电  吉林日报、长春日报连日来分别举行全体工作人员会议，揭露和批判吉林日报文艺组编辑、党内右派分子梁致政的反动言行。"},{"type":"paragraph","text":"梁致政在中共吉林省委召开的新闻出版界座谈会上，曾经恶毒地攻击党对于报纸的领导，他公然提出报纸应当以有专长有才能的一些人来组成报社的编委会，并由全社人员选举产生。他这种别有用心的荒谬主张，遭到了严厉的驳斥。许多人在会议上指出他主张的所谓民选编委会，实际上就是不要党的领导，就是企图把党领导的报纸变成资产阶级的同人报。"},{"type":"paragraph","text":"大家指出：在梁致政的心目中，羡慕的是一度走向资产阶级方向的文汇报、光明日报，赞赏的是那种到处点火、对党进攻的才干。当文汇报、光明日报猖狂地向党进攻的时候，他拍案叫绝。他希望吉林日报也要像光明日报、文汇报那样去到处点火，反对党的领导。他鼓动个别对党不满的人“大胆放”、不当“胆小鬼”。他谩骂党的积极分子是“打手”“教师爷”“献媚者”。吉林日报、长春日报正在继续批驳他这些反动言论，同时也开始揭露一些类似梁致政的右派言行。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e34954fe73"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
