"四川","舒军"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"右派言论——诬蔑性的估计","type":"title"},{"text":"四川舒军","type":"authors"},{"text":"(舒军：民盟重庆市委组织部长)","type":"subtitle"},{"text":"目前中共的问题是：有权威思想的怕垮台，教条主义者没本领，不能打持久战，机会主义站不住脚，好心肠的卫道者怕天下大乱，懒汉不肯作思想工作，他们都有顾虑。","type":"paragraph"},{"text":"(重庆民盟揭露舒军、李康推销章、罗的指示)","type":"paragraph"},{"text":"指示要点如下：","type":"paragraph"},{"text":"1．“盟员要大胆的鸣，带头的争，要到处点火，以过去站在政治运动前列的精神，决心作个抛砖引玉的人，要有仁人志士的精神”；","type":"paragraph"},{"text":"2．“民盟组织要作摘帽子的工作，看见有人被戴了不合尺寸的帽子，要帮他摘下来。”","type":"paragraph"},{"text":"3．“民盟组织要作解围工作，有人被包围出不来，要发救兵”。","type":"paragraph"},{"text":"4．“民盟组织要作政治保险工作，只要这人不是真正反革命分子，在政治上要保护他”。(人民日报6月28日)","type":"paragraph"}],"comments":[],"origin":"《坚决粉碎右派分子的猖狂进攻》（反右派斗争学习参考材料之一，中共云南省委党校教务处编，云南人民出版社，19579月）。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"130c1d8ad4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
