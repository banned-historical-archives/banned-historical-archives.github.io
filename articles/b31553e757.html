<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"周恩来总理和富马首相发表联合声明毛主席曾接见老挝贵宾。周总理和富马首相在会谈中一致认为，召开十四国会议是和平解决老挝问题的唯一有效途径。强烈抗议美国在老挝建立所谓“军事援助顾问团”，认为这是美国准备直接参加老挝内战的严重步骤。两国政府决定正式建立外交关系。","authors":[],"dates":[{"year":1961,"month":4,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社杭州25日电】　中华人民共和国国务院总理周恩来和老挝王国政府首相梭发那·富马亲王今天在杭州发表联合声明，声明全文如下:"},{"type":"paragraph","text":"中华人民共和国国务院总理周恩来和老挝王国政府首相梭发那·富马亲王联合声明"},{"type":"paragraph","text":"老挝王国政府首相梭发那·富马亲王应中华人民共和国国务院总理周恩来的邀请，在1961年4月22日至25日访问了中华人民共和国。老挝爱国战线党主席苏发努冯亲王同时到中国进行了友好访问。"},{"type":"paragraph","text":"在访问期间，中国共产党中央委员会毛泽东主席接见了梭发那·富马首相和苏发努冯亲王并且同他们进行了亲切的谈话。"},{"type":"paragraph","text":"在访问期间，周恩来总理同梭发那·富马首相就老挝局势、两国关系、国际重大问题和两国共同关心的其他问题，举行了会谈。参加会谈的，中国方面有:国务院副总理兼外交部长陈毅元帅、外交部副部长章汉夫、中国共产党中央委员会委员伍修权；老挝方面有:老挝爱国战线党主席苏发努冯亲王、宣传大臣贵宁·奔舍那、农村事务国务秘书西苏曼·西萨銮萨亲王。会谈是在亲切、友好和充分谅解的气氛中进行的。双方对于所谈的问题取得了一致的意见。"},{"type":"paragraph","text":"双方在会谈中一致认为，当前老挝的严重局势，是以美国为首的东南亚条约组织的某些成员国支持老挝的叛乱分子，破坏日内瓦协议，干涉老挝内政的结果。老挝人民的迫切愿望是争取和平中立、民族和睦、国家统一和不受外国的干涉。双方重申必须按照1954年日内瓦协议的规定保证老挝的主权、独立、统一、领土完整和内政不受干涉，并且一致认为召开柬埔寨国家元首诺罗敦·西哈努克亲王所建议的由十四国参加的扩大的日内瓦会议，是和平解决老挝问题的唯一有效途径。双方热烈地期望有关国家在即将举行的国际会议上共同努力，切实保证老挝的主权、独立、统一、领土完整和内政不受干涉，以实现老挝人民的愿望、扩大东南亚的和平中立地区和保障印度支那和亚洲的和平。"},{"type":"paragraph","text":"双方认为有必要指出，美国政府在赞成和平解决老挝问题的同时，仍然在加紧对老挝进行军事干涉。最近，美国政府决定在老挝建立所谓“军事援助顾问团”，就是美国准备直接参加老挝内战的一个严重步骤。对此，两国政府表示强烈的抗议。"},{"type":"paragraph","text":"双方还就流窜在中老边境地区的蒋介石残余部队问题进行了商谈，并且注意到外国干涉者正在利用这些残余部队扩大老挝的内战和威胁中国的安全。双方一致认为，为了两国的安宁和友好，这些蒋介石残余部队必须从老挝境内清除。"},{"type":"paragraph","text":"周恩来总理向梭发那·富马首相表示，中国政府和中国人民坚决支持他所领导的老挝王国政府以及这个政府所奉行的和平中立、民族和睦和国家统一的政策。中国政府一向认为，这个政策不仅符合老挝人民的利益，也有利于维护印度支那和亚洲的和平。中国政府和中国人民高兴地看到，梭发那·富马首相所领导的老挝王国政府在老挝爱国战线党的积极支持下，团结了老挝的一切爱国力量，胜利地进行着反对外国干涉的爱国正义斗争。中国政府将一如既往，对老挝人民的这一斗争给予坚决的支持。"},{"type":"paragraph","text":"双方对不久前古巴所遭到的武装侵略表示愤慨，并且热烈庆贺古巴人民在抗击这次武装侵略的斗争中所取得的重大胜利。"},{"type":"paragraph","text":"双方在会谈中满意地回顾，自从梭发那·富马亲王1960年8月重新担任老挝王国政府的首相以后，两国关系有了进一步的发展，双方认为，不断巩固和发展中老两国的友好睦邻关系，完全符合两国人民的愿望和根本利益。为此，两国政府决定正式建立外交关系，并且互换大使级外交使团。双方满意地看到，两国政府已经在1961年3月就互设经济、文化代表团问题换文，并且决定通过不久即将签订的相应的经济和文化协定，加强两国间的经济文化合作。为了帮助老挝的经济发展，并且沟通两国的往来，中国政府应老挝王国政府的请求，同意帮助老挝王国修建一条公路。"},{"type":"paragraph","text":"老挝王国政府对中国人民自1956年以来在毛泽东主席和中国国家领导人的英明领导下所取得的巨大成就表示钦佩。同时，老挝王国政府再一次对中国政府和中国人民迄今给予王国政府的慷慨和无私的援助表示最深切的谢意。"},{"type":"paragraph","text":"双方深信，梭发那·富马首相这次对中国的访问，进一步加强了中老两国人民的传统友谊，两国的关系必将在和平共处五项原则和万隆精神的基础上获得与日俱增的发展。"},{"type":"paragraph","text":"1961年4月25日"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b31553e757"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
