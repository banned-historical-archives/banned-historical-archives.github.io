ical-archives/banned-historical-archives0/main/maoquanji32.pdf"],"article":{"title":"给李贡人的信","alias":"","parts":[{"type":"paragraph","text":"给李贡人\"的信"},{"type":"paragraph","text":"（1952年9月17日）贡人先生："},{"type":"paragraph","text":"惠书敬悉。嘱件已转程颂云主席酌处。此复。"},{"type":"paragraph","text":"顺颂教祺"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一九五二年九月十七日"},{"type":"paragraph","text":"[1]李贡人（1877一1960），湖南韶山市杨林乡纯和村人，后迁居湖南湘乡市金石镇。曾长期在长沙一些中学或专门学校任教。建国后，曾任湖南省文物管理委员会委员、湖南省文史研究馆馆员。"},{"type":"paragraph","text":"[2]程颂云，即程潜（1881一1968），湖南醴陵人。当时任湖南省人民政府主席。李贡人于1952年9月7日给毛泽东写信，提出因生活困难，想任湖南省文物管理委员会委员，请毛泽东将其介绍给程潜批准。9月17日，毛泽东在信上批示：“请程主席酌处。”"}],"authors":["毛泽东"],"dates":[{"year":1952,"month":9,"day":17}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":248,"page_end":248},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"03d472b4c0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
