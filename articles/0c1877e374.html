tart":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"天安门事件完全是革命行动对于一九七六年清明节，因悼念周总理、反对“四人帮”而受迫害的同志要一律平反","authors":[],"parts":[{"type":"paragraph","text":"悼念周总理无罪 声讨“四人帮”有功"},{"type":"paragraph","text":"新华社十一月十五日讯 中共北京市委在最近举行的常委扩大会议上宣布：一九七六年清明节广大群众到天安门广场沉痛悼念敬爱的周总理，愤怒声讨“四人帮”，完全是革命行动。"},{"type":"paragraph","text":"会上宣布：一九七六年清明节，广大群众到天安门广场悼念我们敬爱的周总理，完全是出于对周总理的无限爱戴、无限怀念和深切哀悼的心情；完全是出于对“四人帮”祸国殃民的滔天罪行深切痛恨，它反映了全国亿万人民的心愿。广大群众沉痛悼念敬爱的周总理，愤怒声讨“四人帮”，完全是革命行动。对于因悼念周总理、反对“四人帮”而受到迫害的同志要一律平反，恢复名誉。"}],"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0c1877e374"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
