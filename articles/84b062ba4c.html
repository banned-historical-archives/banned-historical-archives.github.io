thors":[],"dates":[{"year":1968,"month":11,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　党的八届十二中全会公报发表后，彭浦新村的三千多户人家纷纷举办家庭毛泽东思想学习班，雷厉风行地开展大学习、大批判活动，家家户户摆开革命大批判的战场，掀起了一个群众性的围剿大叛徒、大内奸、大工贼刘少奇滔天罪行的革命大批判热潮。"},{"type":"paragraph","text":"在四十二号楼工人家属应老奶奶家，祖孙三代十个人，在家庭毛泽东思想学习班上一遍又一遍地学习公报。七十四岁的应老奶奶激动地含着眼泪说:“公报真正好，我越听对刘少奇越恨，越听对毛主席越亲。在黑暗的旧社会，咱们一家数口做的是牛马活，过的是衣不蔽体、食不充饥的生活，饱受着反动派、地主、资本家的摧残和折磨，我六个儿子饿死了三个。幸亏毛主席的好领导，咱们穷人翻身做了主人。可是，狼心狗肺的大叛徒刘少奇又想让地主、资本家再来作威作福，骑在我们头上，真是恶毒透顶。”老奶奶对着周围的孙儿孙女说:“你们都是糖水中泡大的，不懂得旧社会的阶级苦和血泪仇，我千遍讲、万遍讲，就是要你们不要忘本，不要忘记阶级斗争。我伲一定要世世代代听毛主席的话，跟着毛主席干革命。”老奶奶的忆苦思甜，激起了全家人的无产阶级感情，七岁的小孙女激动地握紧拳头，不断高呼“打倒刘少奇!”“保卫毛主席!”应老奶奶的儿媳接着说:“我们决不能麻痹轻敌，决不能让刘少奇的阴魂再现，一定要把刘少奇散布的反革命修正主义思想批深批透。我在里弄托儿所工作，一定要为无产阶级培养好下一代，从小教育他们更加热爱毛主席，更加热爱共产党，从小要培养他们学习工人阶级、贫下中农和解放军的优秀品质，做无产阶级革命事业的接班人。在家里我要教育和鼓励子女坚定地走毛主席指引的革命道路。”应老奶奶的大孙女，是一九六七届毕业生，她说，过去我受了刘少奇“读书做官论”的毒害，总想好好读书，将来当一个什么“家”。现在我认识到这是党内最大的走资派刘少奇阴险毒辣地用“和平演变”的手段，妄想使工人阶级的后代去接资产阶级的班。通过学习公报，我要更坚决听毛主席的话，走下乡上山的革命路，立志做一个无产阶级革命事业的接班人。"},{"type":"paragraph","text":"夜深了，应老奶奶一家人还在灯下热烈地学习公报，开展大批判。他们表示，一定要坚决贯彻公报的精神，彻底肃清刘少奇的修正主义思想的流毒，让毛泽东思想永远占领家庭阵地。"},{"type":"paragraph","text":"(本报通讯　员)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"革命大批判","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"84b062ba4c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
