le":{"title":"区党委整党办公室关于一些遗属抚养费发放问题的通知","dates":[{"year":1984,"month":5,"day":24}],"is_range_date":false,"authors":["中共广西壮族自治区党委整党办公室"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"中共广西壮族自治区党委整党办公室, 处理“文革”遗留问题、清理“三种人”文件汇编(第五册), 82-83","tags":[{"name":"抚养费","type":"主题/事件"},{"name":"遗属","type":"主题/事件"}],"parts":[{"type":"title","text":"区党委整党办公室关于一些遗属抚养费发放问题的通知"},{"type":"paragraph","text":"（一九八四年五月二十四日）"},{"type":"paragraph","text":"各地、市委，柳铁党委，区直各单位党组（党委）：据桂林市一些遗属来信来访反映：“文革”期间他们的亲人被迫害致死，他们受株连被赶下农村；三中全会后，他们的亲人已得到平反，他们也陆续迁回了城镇，但现在补发给他们的抚养费却按农村人口标准，这不合理。经研究决定：凡按区党委桂发〔83〕55号文件规定应发给抚养费的、“文革”中被株连赶下农村、现已平反收回为城镇人口的遗属，其抚养费发放的标准（含从死者死后第四个月起应补发的抚养费），均应按城镇人口标准发给。"},{"type":"paragraph","text":"特此通知"},{"type":"paragraph","text":"（此件原载桂整办〔1984〕14号文）"}],"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"557afb62d1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
