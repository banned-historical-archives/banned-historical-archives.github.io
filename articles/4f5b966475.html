hors":[],"dates":[{"year":1967,"month":8,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社北京十三日电　本社记者报道:日本革命左派高举毛泽东思想伟大红旗，大造美日反动派的反，大造苏修日修的反。他们从宫本集团的控制下杀了出来，并在同帝修反的斗争中迅速成长。他们是日本革命的先锋，是日本民族的希望。"},{"type":"paragraph","text":"日共山口县委的革命左派，在去年九月首先起来反对宫本集团，成立日本共产党山口县委员会(左派)，打起了“造反有理”的大旗。随后，佐贺、爱知、福冈和兵库等县的日共县委会的革命左派，相继发表声明，同宫本修正主义集团决裂，成立左派的县委会，同美帝国主义、现代修正主义和日本的反动派展开了针锋相对的斗争。"},{"type":"paragraph","text":"在山口县等五个革命的县委会成立的同时和在那以后，南起九州北至北海道的城市和农村，建立了或正在建立许多日共的左派支部或左派小组。原日共中央委员、书记处书记安斋库治也在今年一月里发表意见书，批判了宫本集团的修正主义纲领，指出宫本集团是马克思列宁主义的叛徒。"},{"type":"paragraph","text":"这些真正的日本马克思列宁主义者的实际行动，大破宫本集团联苏降美反华、叛卖日本革命的修正主义路线，大立马克思列宁主义、毛泽东思想的革命路线，并决心要建立一个真正的马克思列宁主义的革命政党，为日本人民的革命事业开始了新的进军。"},{"type":"paragraph","text":"这个反造的好!它在日本的群众团体中卷起了革命巨澜。日中友好协会、亚非团结组织、记者组织、妇女团体以及贸易团体中的左派和进步人士，纷纷起来同有关团体中的一小撮日修分子决裂，成立新的进步组织。日中友好协会(正统)总部自从去年十月成立以来，冲破了宫本集团的重重阻碍，披荆斩棘，奋勇前进，力量迅速发展。目前，在日本四十六个都道府县中，已有四十二个都道府县成立了(正统)总部组织。这些组织都是在同敌视中国和破坏日中友好的美日反动派和宫本修正主义集团进行艰苦的斗争中建立起来的，它们具有不可战胜的气魄和力量。"},{"type":"paragraph","text":"日本革命左派和进步组织有一个显著的特点。那就是无限热爱毛主席，无限信仰毛泽东思想。它们以毛泽东思想作为行动指南，在斗争中活学活用毛主席著作。"},{"type":"paragraph","text":"在日本革命左派活学活用毛主席著作的运动中，以西泽隆二和大塚有章为首的一些革命者，创立了毛泽东思想研究会，主办了《毛泽东思想研究》杂志，对日本革命左派和进步组织的造反行动，起了很大的推动作用。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4f5b966475"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
