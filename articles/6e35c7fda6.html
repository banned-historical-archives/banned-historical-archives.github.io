<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"“吃小亏，占大便宜”是资产阶级生意经","authors":["张岩　姚进"],"dates":[{"year":1967,"month":5,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"“吃小亏，占大便宜”是资产阶级生意经"},{"type":"paragraph","text":"北京市第二机床厂　张岩　姚进"},{"type":"paragraph","text":"党内头号走资本主义道路的当权派，在他的《修养》里说：真正刻苦修养的人，“他绝不计较自己在党内地位和声誉的高低，……然而，正因为他这样做，正因为他在革命斗争中始终是正直忠诚，英勇坚定，并且表现了卓越的能力，他就能够受到党员群众自觉的尊重和拥护。”"},{"type":"paragraph","text":"在另外一篇谈话里，他更加露骨地胡说什么：“整天考虑个人即不会有个人。不考虑个人利益则最后有个人利益。占小便宜，吃大亏，吃小亏，占大便宜，这是合乎马列主义无产阶级世界观的。”"},{"type":"paragraph","text":"真是恬不知耻！这副腔调那里有一丝一毫马列主义的气味，完全是一个追名逐利的资本家的嘴脸！那里谈得上什么无产阶级世界观，分明是地地道道的资产阶级市侩哲学！"},{"type":"paragraph","text":"“吃小亏，占大便宜”，并不是什么新鲜玩艺，这是从资产阶级那里贩来的生意经。在旧社会生活过的人都会记得：逢年过节，资本家总要搞什么“大减价”、“大甩卖”；商店新开张的时候，也要搞什么“买一送一”、“××折贱卖”，花样翻新，煞有介事。难道资本家真的会干赔本生意吗？笑话！对于资本家来说，只有一个“一本万利”的原则，根本不存在什么赔本的问题。资本家的这一套鬼花样，完全是为了拉主顾，闯牌子，“放长线，钓大鱼。”这次少赚点，正是为了今后赚得更多。"},{"type":"paragraph","text":"党内头号走资本主义道路的当权派，把这套资本家的生意经，原封不动地搬到我们革命队伍里来了。他打着“修养”的招牌，装作关心青年、关心干部的样子，在干部和青年中，到处散布这套“吃小亏，占大便宜”的谬论。说穿了，就是要引导人们用资产阶级作生意的态度来对待革命，今天暂时吃点苦，明天好骑在人民头上做官当老爷！要照他这一套资产阶级的生意经“修养”下去，只能是越“养”越“修”，最后非变成地地道道的修正主义分子不可！"},{"type":"paragraph","text":"对于党内头号走资本主义道路的当权派宣扬的这套毒害干部、毒害青年的反动谬论，我们一定要把它彻底批臭，彻底肃清！"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6e35c7fda6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
