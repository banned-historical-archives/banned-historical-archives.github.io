tart":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"热烈祝贺首次核试验成功的巨大胜利指出这次成功的试验，标志着我国国防现代化进入了一个新阶段。这是全国人民高举毛泽东思想的伟大红旗，贯彻党的社会主义建设总路线和坚持四个第一、发扬自力更生发奋图强的革命精神的结果。希望他们再接再厉，戒骄戒躁，为攀登新的科学技术高峰，加强国防，保卫祖国和世界和平而奋斗，为全面禁止和彻底销毁核武器而奋斗。","authors":[],"parts":[{"type":"paragraph","text":"新华社十七日讯 中共中央和国务院十六日发电报给参与我国首次核试验工作的全体工人、工程技术人员、科学工作者和解放军官兵，以及一切从事国防建设的同志，热烈祝贺第一次核试验成功的巨大胜利。贺电全文如下："},{"type":"paragraph","text":"参与我国首次核试验工作的全体工人、工程技术人员、科学工作者和解放军官兵，以及一切从事国防建设的同志们："},{"type":"paragraph","text":"我们热烈祝贺你们第一次核试验成功的巨大胜利。"},{"type":"paragraph","text":"这次成功的试验，标志着我国国防现代化进入了一个新的阶段。这对美帝国主义核垄断、核讹诈的政策是一个有力的打击，对全世界一切爱好和平的人民是一个极大的鼓舞。"},{"type":"paragraph","text":"这次试验的成功，是全国人民高举毛泽东思想的伟大红旗，贯彻执行党的鼓足干劲、力争上游、多快好省地建设社会主义的总路线和坚持四个第一，发扬自力更生、发奋图强的革命精神的结果；是全国各地区、各部门、各部队辛勤努力，大力协作，共同奋斗的结果。"},{"type":"paragraph","text":"希望你们再接再厉，戒骄戒躁，为攀登新的科学技术高峰，加强国防，保卫祖国和世界和平而奋斗！为全面禁止和彻底销毁核武器而奋斗！"},{"type":"paragraph","text":"中国共产党中央委员会"},{"type":"paragraph","text":"中华人民共和国国务院"},{"type":"paragraph","text":"一九六四年十月十六日"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"93e95c255d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
