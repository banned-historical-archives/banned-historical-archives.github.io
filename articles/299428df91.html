"authors":[],"dates":[{"year":1951,"month":7,"day":20}],"is_range_date":false,"parts":[{"text":"湘潭四区土地改革后遗留不少问题","type":"title"},{"text":"【新湖南报七月二十日讯】湘潭四区在土地改革后，还有不少遗留问题，急待解决：","type":"paragraph"},{"text":"(一)由于“和平土改”而产生夹生现象，斗争从经济观点出发，群众觉悟低，尚未发动起来，干部立场亦站得不稳，照顾地主多，浪费果实现象严重。","type":"paragraph"},{"text":"(二)乱征收田地，引起农民内部不安。如古泉乡干部在土地改华中，将过去富农调剂出来的土地全部征收，分配后觉得不妥又退回，但为了弥补新分户的损失，又将小土地出租者的土地征收，结果引起小土地出租者的不满。新分户亦因一会分，一时退而情绪不安，大大影响了生产。","type":"paragraph"},{"text":"(三)乱抽押金，侵犯佃中农、佃贫农利益。该区先进乡抽中农押金，一般均在百分之五十以上，开元村抽贫农押金也在百分之二十左右，并且不经同意，强迫抽出，因此引起中农及部分贫农不满。","type":"paragraph"},{"text":"(四)错划阶级成份，将中农划为富农，侵犯中农利益。","type":"paragraph"},{"text":"(五)分田时未照顾军属，干部自己分好田近田，军属的田分得很远，不便代耕，引起军属及群众普遍不满。亦有少分田给地主的现象。","type":"paragraph"},{"text":"(六)将果实当作田分，中农占了便宜，贫雇农问题没有解决好。有的贫雇农只分了果实而没有分到田，要求分田；有的分了田而没有分到果实，生产中发生困难。","type":"paragraph"},{"text":"(七)押金余粮，分村掌握，多寡悬殊，村与村闹不团结。","type":"paragraph"}],"comments":[],"origin":"1951年8月13日新华通讯社编《内部参考》。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"299428df91"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
