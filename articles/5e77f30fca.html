rt":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席、周总理电贺锡兰独立十周年","authors":[],"parts":[{"type":"paragraph","text":"据新华社讯 毛主席、周总理3日分别致电锡兰奥利弗·古涅狄莱克总督，班达拉奈克总理，祝贺锡兰独立十周年。"},{"type":"paragraph","text":"毛主席在电文中祝中锡两国之间的深厚友谊日益巩固和发展。祝锡兰国家繁荣，人民幸福。"},{"type":"paragraph","text":"周总理在电文中说：自从中国和锡兰正式建立外交关系以来，两国之间的传统友谊有了新的发展；两国之间的经济、贸易和文化关系也获得了进一步的加强。祝中锡之间的这种友好合作关系在和平共处五项原则的基础上日益增进，这不仅符合于中锡两国人民的切身利益，而且也有利于维护世界和平和促进国际紧张局势的和缓。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5e77f30fca"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
