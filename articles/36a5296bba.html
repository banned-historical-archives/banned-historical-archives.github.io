art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"高举毛主席伟大旗帜大庆精神大放光芒","authors":["吕相友/陆元国/晋新强"],"parts":[{"type":"paragraph","text":"毛泽东思想是东风，“两论”起家方向明。举旗抓纲夺胜利，革命路上永不停。"},{"type":"paragraph","text":"大庆工人认真学习毛主席著作。 吕相友摄"},{"type":"paragraph","text":"只争朝夕学大庆，"},{"type":"paragraph","text":"人人革命加拚命。"},{"type":"paragraph","text":"出厂油罐赛长龙，"},{"type":"paragraph","text":"生产指标月月红。"},{"type":"paragraph","text":"大庆式企业——总后勤部三六○三工厂。 本报记者摄"},{"type":"paragraph","text":"大庆处处摆战场，"},{"type":"paragraph","text":"深揭猛批“四人帮”。"},{"type":"paragraph","text":"紧跟领袖华主席，"},{"type":"paragraph","text":"抓纲治国凯歌扬。"},{"type":"paragraph","text":"大庆化肥厂工人愤怒声讨“四人帮”的滔天罪行。 新华社记者摄"},{"type":"paragraph","text":"生产现场如战场，比学赶帮斗志昂。磷肥滚滚车满载，支援农业多打粮。"},{"type":"paragraph","text":"大庆式企业——兰州部队某部磷肥厂。 陆元国摄"},{"type":"paragraph","text":"《五·七指示》闪金光，"},{"type":"paragraph","text":"“铁人”精神大发扬。"},{"type":"paragraph","text":"年年超产结硕果，"},{"type":"paragraph","text":"医药生产谱新章。"},{"type":"paragraph","text":"大庆式企业——济南部队某部化工厂。 赵龙摄"},{"type":"paragraph","text":"革命竞赛夺高产，"},{"type":"paragraph","text":"流动红旗到车间。"},{"type":"paragraph","text":"反修防修批“四害”，"},{"type":"paragraph","text":"誓为战备做贡献。"},{"type":"paragraph","text":"大庆式企业——南京部队某部三五一六工厂。 本报记者摄"},{"type":"paragraph","text":"煤炭战线“突击队”，铁马奔腾快如飞。艰苦奋斗创新业，大庆精神放光辉。"},{"type":"paragraph","text":"大庆式企业——建字四五二部队。 赵连勤摄"},{"type":"paragraph","text":"大庆驻军学大庆，"},{"type":"paragraph","text":"“三老”“四严”作风硬。"},{"type":"paragraph","text":"人民军队学人民，"},{"type":"paragraph","text":"高举红旗向前进。"},{"type":"paragraph","text":"大庆驻军某部在大庆油田参加生产劳动。 晋新强摄（照片）"}],"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"36a5296bba"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
