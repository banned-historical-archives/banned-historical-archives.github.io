authors":[],"dates":[{"year":1951,"month":7,"day":20}],"is_range_date":false,"parts":[{"text":"南京捐献运动发生强迫命令现象","type":"title"},{"text":"【华东总分社二十日讯】南京市在捐献运动中，普遍发生强迫命令、包办代替的现象。该市五区即发生了斗争捐献户的事件。军属矍联庆原计划每日节约二百元来捐献。但积极分子认为太少，在动员会上斗争他，由当天八时斗至深夜二时。第二天矍被迫每月认捐十万元，半年捐六十万元。但晚上开会时又一定要他捐三百万元，并将他列为三大“坏蛋”之一。该市由积极分子拿着单子沿门“划数目”，工商界有些行业决定按营业额抽捐等情形亦很普遍。在捐款时，有些干部竟说：“你多写点，我好向上报；反正朝鲜要和平了，将来不会收了。”因此群众对捐献认为是临时任务，没有从计划增产、增加收入和节约开支上去设想。","type":"paragraph"}],"comments":[],"origin":"1951年7月25日新华通讯社编《内部参考》。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7a80920299"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
