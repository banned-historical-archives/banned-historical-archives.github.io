" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中学教师的右派言论（二）","authors":["乔居顺","冯纪","山西","栗茂亭","米望舜"],"dates":[{"year":1957,"month":5}],"is_range_date":false,"parts":[{"text":"中学教师的右派言论（二）","type":"title"},{"text":"山西米望舜乔居顺栗茂亭冯纪","type":"authors"},{"text":"米望舜（榆次专区在职干部文补校教师）：","type":"paragraph"},{"text":"“毛主席报告时说：谁说我们不能领导科学，我们有党、团员，学习好了就能领导，这就是要依靠党、团员，反正共产党，前说前对，后说后对，左右都对，马列主义就是活的”。","type":"paragraph"},{"text":"“党对知识分子不信任，认为知识分子是客人，平时和和气气不批评，运动来了算总账。知识分子也觉得给人家工作是搞碗饭吃，因而发挥不了作用”。","type":"paragraph"},{"text":"乔居顺（太谷师范教师）：","type":"paragraph"},{"text":"“共产党和知识分子是唐僧与孙悟空的关系，对知识分子的思想改造，就是孙悟空头上的紧箍咒，不听话就念咒叫你头痛，一直把唐僧送到西天，就等于走到共产主义”。","type":"paragraph"},{"text":"“历次运动都是唱戏，真真假假，虚虚实实，红的进去，黑的出来，运动就是排演好，搬上舞台就是”。","type":"paragraph"},{"text":"栗茂亭（平顺中学教师）：","type":"paragraph"},{"text":"“党对知识分子是利用、限制、改造。用着知识分子时，是国家的财宝，灵魂工程师，说这样好、那样好；用不着时，就给你戴上个大帽子，一脚踢开，甚至还得劳动改造。封住知识分子的嘴，说只许老老实实，不许乱说乱动。现在还用得着旧知识分子，将来新知识分子出来，旧知识分子还得进行劳动改造”。","type":"paragraph"},{"text":"冯纪（蒲县中学教师）：","type":"paragraph"},{"text":"“知识分子不需要改造了，知识分子在旧社会作事是迫不得已，他们是爱国的，党太低估了知识分子，知识分子已经跟上共产党八、九年了，不需要改造了。但是每次运动都被送入火炉里，还给知识分子加帽子、说知识分子不自觉。党与知识分子的沟很深，墙很高；填沟怕跌死，推墙怕压死”。","type":"paragraph"}],"comments":[],"origin":"《“鸣”、“放”选集（四）》（中共山西省委整风办公室编印，1957年11月）。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"77d720dbf7"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
