[],"dates":[{"year":1976,"month":2,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　在无产阶级文化大革命和批林批孔运动推动下，长江口南航道深水航槽已胜利竣工通航，如今二万吨级船舶每天都可乘潮入港。"},{"type":"paragraph","text":"长江口航道的全面开挖，是在无产阶级文化大革命和批林批孔运动推动下进行的。从去年九月十日开始，经过一年多的努力，疏浚三千零七十七万立方米，挖槽全长三十二点八公里，挖槽底宽二百五十米，挖槽深度基本上达到了设计要求。二万吨级船舶能乘潮进出上海港，三万五千吨级的船舶可乘大潮进港。国产二万五千吨级的“郑州”号及中远公司三万八千吨级的“陇海”号等大型货轮，均先后乘潮通过航槽。象这样大的河口航道治理工程，在我国航道史上还是第一次。这是上海航道局广大职工以及有关协作单位，认真贯彻执行毛主席革命路线的胜利成果。"},{"type":"paragraph","text":"在对长江口怎样治理等问题上，存在着两种思想的激烈斗争。航道局党委遵照毛主席、党中央的一系列指示精神，以阶级斗争为纲，坚持党的基本路线，先后举办了各种类型学习班，召开批判会达二百余次。干部和工人一起批判洋奴哲学、爬行主义和懦夫懒汉世界观，掀起了“学理论，抓路线，学大庆，促大干”的群众运动。在有关科研单位、大专院校、航运等部门的大力支持下，进行大量水文测验和分析工作，摸索河口的水流、泥沙、风浪等规律，在多次进行试挖的基础上，通过工人、技术人员、领导三结合进行选槽和编制设计工作；先后动员几千人次，组织了十余艘大型挖泥船、航标测量船，进行大小会战十余次。航标工人打破常规，日夜施工，以五天时间完成了长江口新挖航道五十一座灯标的改设任务。测量人员完成了一千多测线公里、几万个测点的验收测量任务。在兄弟单位的大力配合下，终于使长江口第一期治理工程胜利完成。"},{"type":"paragraph","text":"(本报通讯　员)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"name":"批林批孔","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"52831e4808"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
