:["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives21/main/098f0f47-5c1b-445e-b94b-f5a1b02cfc3a/1.jpg"],"article":{"title":"周总理、张春桥同志十月九日晚七点半同清华各红卫兵组织座谈要点","alias":"","parts":[{"type":"paragraph","text":"周总理·张春桥同志十月九日晚七点牛同"},{"type":"paragraph","text":"清华各缸卫兵组织座谈要点：一关于王光美同志回校检查问题："},{"type":"paragraph","text":"中央认为王光美同志应敲检查·完全支持我们这一正当，合理要求，来不来学校是一个方式问题·根据中央文革小组提识，党中央常委讨论，最后主席也不同意王光美同志回校检查，这样会下不来台·因为王光美同志回校检查问题中央要讨论，主席很忙还要找时间?十月十日把王光美同志自已写的检查送到学校，可以加以深人批"},{"type":"paragraph","text":"，可以印刷散发·三关于第三司合部："},{"type":"paragraph","text":"周总理说：我是坚决支持第三司今部的。三关于深人批判反动路线问题："},{"type":"paragraph","text":"周总理认为可以上街宣传，深人对这条反动路线进行揭发批判斗争·人不回来巾照样可以批深批透?陈独秀当时不在，我们也批判了，这样做会更深刻·不会在人事问题上抓得多，为了肃清反动路线，应批制斗手，如他们长期坚持不改，就会变成敌对·"},{"type":"paragraph","text":"清华大学长康等五人整理"}],"authors":["周恩来","张春桥"],"dates":[{"year":1966,"month":10,"day":9}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1},"tags":[{"name":"周恩来","type":"人物"},{"name":"张春桥","type":"人物"},{"name":"王光美","type":"人物"},{"name":"中央文革","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f14e1a94e1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
