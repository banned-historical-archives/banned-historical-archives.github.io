","authors":[],"dates":[{"year":1947,"month":2,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"人民的军队为人民立功"},{"type":"paragraph","text":"毛主席朱总司令宴延安附近劳动英雄"},{"type":"paragraph","text":"号召大家积极生产改善生活"},{"type":"paragraph","text":"【新华社延安二十九日电】毛主席及朱总司令二十四日欢宴延安附近地区劳动英雄、居民、及驻在该地之部队干部。毛主席及朱总司令与来宾一一握手贺年后，询问各乡工作生活情况甚详。卢区长报告本区生产自卫及土地征购等问题，毛主席和朱总司令号召部队群众，积极生产、改善生活、丰衣足食，婚嫁丧葬事宜不要铺张。毛主席说：“我们好比爬山，已经快攀登山顶。去年的困难已经克服，但对于破坏政协与‘停战令’的蒋介石的进攻一定要坚决粉碎，以求得全国和平。”并号召军民之间、乡邻之间都要和睦团结，争取和平的早日实现。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bfd0b61434"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
