<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"广州高等学校师生对红专问题的错误看法","authors":[],"dates":[{"year":1958,"month":6,"day":5}],"is_range_date":false,"parts":[{"text":"广州高等学校师生对红专问题的错误看法","type":"title"},{"text":"新华社广州5日讯　广州各高等学校师生在对红与专问题的鸣放辩论中，暴露出不少错误的看法。综合起来有以下几种论点：","type":"paragraph"},{"text":"一、“只专不红论”","type":"subtitle"},{"text":"认为知识分子只“专”不“红”同样可为人民服务。有些人认为政治不能解决业务问题，而业务可以创造财富，有了业务就有了一切。中山大学有些学生说，社会发展的动力是生产力而不是人们的政治思想，创造社会物质文化的过程，主要是“专”发挥了作用。华南师范学院一些教师举例说，苏联在革命初期，利用和强迫使用资产阶级知识分子，当时那些资产阶级专家对苏维埃的建设起了作用；我国目前一些专家虽然他们的立场、观点、思想作风属于资产阶级范畴，但毕竟还是对社会主义有贡献的。","type":"paragraph"},{"text":"在青年教师和学生中也有一部分人想走资产阶级专家“只专不红”的道路。他们说，爱迪生、牛顿并没有红，但并未因此影响他们成为世界著名的发明家。","type":"paragraph"},{"text":"二、“先专后红论”","type":"subtitle"},{"text":"有些人说，专是为人民服务的本钱，没有专就不可能很好的服务于人民，因此只有先专后红。有些人说，“红”和“专”是有时代性的，如战争时期主要是“红”，和平建设时期主要是“专”；有些人认为“专”是“红”的基础，有了“专”就易“红”，有了专长，党就重视，就会请你入党。","type":"paragraph"},{"text":"还有一些人认为“专”难“红”易，所以应该先专后红。师范学院有人认为“红”只要积极参加几个政治运动便可达到；“专”则要长期学习，所以“专”应急急赶，“红”可以慢慢来。","type":"paragraph"},{"text":"三、“粉红论”","type":"subtitle"},{"text":"有人说红与专的要求应按各人职业不同提出不同要求，搞政治的要红透，搞业务的只要有一点红，不犯大错误就可以了。中山医学院讲师蔡尚达以“近近靠紧专家，远远跟着党委”作为处理业务与政治关系的原则。中山大学有一个助教则认为学政治象吃盐一样，盐是必须的，但不可多食。","type":"paragraph"},{"text":"四、“专就是红论”","type":"subtitle"},{"text":"这个论点是与“只专不红”同出一辙，同样是标榜业务第一。师范学院教授蒋根尧说，巴甫洛夫、李森科都不是党员，但他们的作用比一般党员大得多。中山大学地理系有些教师说：“红”是可以自发的，通过专业便可实现“红”；他们并以马克思通过对商品的研究，发现资产阶级剥削工人阶级的实质为例，来“证明专能促进红”。也有业务和政治“殊途同归”的论调。甚至有的人把红与专的问题完全对立起来，说：“谈政治就干涉了业务”，“红”了会妨碍“专”，“红”了后患无穷，搞了政治就不能搞学术；所以主张不能搞学术的人可以去搞政治，能搞学术的人，应让他们专攻业务。","type":"paragraph"},{"text":"五、“不红不专论”","type":"subtitle"},{"text":"有这种思想的主要是少数对又红又专缺乏信心的学生，他们不求上进，只求红——不反党就行，专——能教书就可以。(黄毅坚编)","type":"paragraph"},{"text":"来源：1958年6月7日新华通讯社编《内部参考》。","type":"paragraph"}],"comments":[],"origin":"美国图书馆收藏","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fd93745a23"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
