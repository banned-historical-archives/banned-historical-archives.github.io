<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"右派言论——诋毁肃反方针和方法 (1)","authors":["张百生","曾祥基","沈阳师范学院","聂启新","贾琛","赵仲牧","郭天亘"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"右派言论——诋毁肃反方针和方法 (1)","type":"title"},{"text":"沈阳师范学院郭天亘曾祥基聂启新贾琛赵仲牧张百生","type":"authors"},{"text":"郭天亘  (中文系学生)说：“肃反的政策是不对的，采用的方式是不恰当的，利用阶级斗争的方式肃清了少数的反革命分子，使多数的人在心灵上受到损害，所以这次肃反是错了，不是下面几个干部的错误，而是党中央政策的错误，党中央估计有5％也是错误的。”","type":"paragraph"},{"text":"“肃反政策错了，肃反也不应用斗争的方式，而党中央提出的5％的估计数字是错误的。……肃反扩大化了，所以犯错误，显然这是受了斯大林的影响。破坏了感情。”","type":"paragraph"},{"text":"“肃反是否必要通过大规模的斗争方式达到目的？我看不必，结果是弄得有的自杀，有的精神失常。至于说肃反是否提高了阶级觉悟？我认为恰恰相反，倒是模糊了阶级觉悟，因为斗争对象本来就搞错了。”","type":"paragraph"},{"text":"曾祥基  (中文系学生)说：“在肃反运动中，党中央主观主义地估计了残余敌人的数字，提出了大胆怀疑的口号，在这样的情况下，自然会斗错很多善良的人民，而真正打中的反革命分子却没有多少。”","type":"paragraph"},{"text":"聂启新  (历史系学生)说：“张百生对肃反方面谈的真对。在中央控制的5％的数字中，农民没有进行肃反运动去了五亿，城市中的小孩也没有进行肃反，这样5％的反革命在六亿中就有三千万，在搞肃反运动的单位，平均5——6人中就有一个反革命，哪有这些反革命，这不是扩大化了是什么？”","type":"paragraph"},{"text":"贾琛  (历史系学生)说：“肃反我认为有问题。肃反是共产党逼供，确实伤了人与人之间的感情。”","type":"paragraph"},{"text":"赵仲牧  (中文系教员)说：“肃反不能以党发指示，更不应以党来出面领导，这样就是以党代政。肃反不应提向党坦白，向党忠诚老实，而应提向国家坦白。”","type":"paragraph"},{"text":"张百生  (团委宣传部副部长)说：“肃反运动扩大化了，这个运动反映了中共中央最大的主观主义。规定5％是反革命分子，拿全国六亿人口计算，反革命分子就有三千万……这是受了斯大林的肃反扩大化，也就是斯大林的社会主义建设事业越发展，阶级斗争越尖锐的荒谬绝伦的理论所影响。”","type":"paragraph"},{"text":"“镇反杀人多了，肃反运动错了。”","type":"paragraph"}],"comments":[],"origin":"《右派言论选辑》（社会主义教育参考资料之一，内部材料　仅供参考，沈阳师范学院社会主义教育办公室 1958．3）","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5ff9c9a379"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
