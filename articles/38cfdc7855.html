:[{"year":1949,"month":1,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新绛市工运发生右倾"},{"type":"paragraph","text":"各私营工厂主虐待工人"},{"type":"paragraph","text":"【新华社兴县六日电】晋西南著名产棉地新绛市的工人工作中发生了严重的右倾错误。该市中共工作委员会没有正确地执行“发展生产、劳资两利”的工商业政策，不去组织工会以维护工人利益，以致各私营工厂的工人受到不能忍受的虐待。这些工厂的劳动时间，一般在十五小时以上，这样就剥夺了工人学习和休息的机会。很多工人不明时事，有的连共产党是代表什么阶级的利益都不懂。某些私营工厂学徒的待遇很坏，其中一部分完全没有津贴。他们衣被单薄，睡在潮湿的地板上，加以过度劳动，个个面黄肌瘦。打骂的管理方法依然存在。工人学徒遭受厂主打骂后，到市政府去控告，政府在长时期内只进行了个别调解，未引起对整个工人运动中右倾错误的警觉。资本家在工人中间利用亲友和同乡关系，麻痹工人去忍受过分的剥削和虐待。在最近改选的新绛市人民代表会六十几名代表中，只有三个工人代表，还是指定而不是选举的。过去市人民代表会中的工人代表，完全不能代表工人利益，有的甚至是资本家假冒的。这种右倾错误最近已引起该市工作委员会的注意。该会已抽调了四十几个部干，组织工运工作团，分组赴各厂研究改进工作。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"38cfdc7855"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
