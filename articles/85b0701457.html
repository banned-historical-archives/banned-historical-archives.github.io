群众的反映","authors":[],"dates":[{"year":1950,"month":12,"day":20}],"is_range_date":false,"parts":[{"text":"镇压反革命分子后苏南松江、常州部份群众的反映","type":"title"},{"text":"【苏南日报九日讯】在我镇压反革命分子活动后，松江部份投机商人表现恐慌；另一部分商人则表现积极靠拢我们。常州有些坏分子则造谣说：“过去共产党一向是宽大政策，现在不同了，各地拼命杀人，常州以前从没有杀过一人，这次一次就杀了八个，以后说不定还要杀，国民党反动派走时也大杀其人，共产党也许要走了。纺织工人中有人说：停止代织，扩大代纺就是共产党准备撤退，因为布中有水份，会发霉，不能带走，纱可以带而且方便不会发霉。九丰染厂有人说：共产党夏征可以缓征，主要是看形势可以立足，现在形势不同，秋征好后准备动身。","type":"paragraph"}],"comments":[],"origin":"新华通讯社编《内部参考》1950年12月20日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"85b0701457"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
