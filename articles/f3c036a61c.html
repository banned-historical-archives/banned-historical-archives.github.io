al-archives/banned-historical-archives8/main/maoquanji3.pdf"],"article":{"title":"邹鲁与革命","alias":"","parts":[{"type":"paragraph","text":"邹鲁与革命"},{"type":"paragraph","text":"（1925年12月5日）"},{"type":"paragraph","text":"邹鲁说：“我们国民党的同志应该觉悟，切不可因人家说旧同志不革命便抹杀一切。若不是我们同志屡仆屡起，哪能有民国。若不是讨袁护法讨贼北伐诸役一向无前，哪能有今日的历史。就是共产得意的工作焚毁商团，乃需要靠杨刘。打杨刘仍需要靠许梁。即今日之制许梁，又何莫非老同志。”很好！邹先生！就请你革命罢！实在没有一个人有本领敢于抹杀革命的老同志！须知单是“有民国”“有历史”是不能算数的，须得现在还是革命，须得将来还是革命。若那老同志杨刘，老同志许梁，我看还是少举例为好。"}],"authors":["毛泽东"],"dates":[{"year":1925,"month":12,"day":5}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":157,"page_end":157},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f3c036a61c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
