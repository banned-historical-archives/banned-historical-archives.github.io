，协定是两国合作的良好开端。中法合作的领域多得很，大有希望","authors":[],"dates":[{"year":1978,"month":12,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"中法签署发展经济关系和合作长期协定"},{"type":"paragraph","text":"邓副总理参加签字仪式并会见德尼奥部长一行，他说，协定是两国合作的良好开端。中法合作的领域多得很，大有希望"},{"type":"paragraph","text":"新华社北京十二月四日电　中、法两国政府今天在北京签署了一项为期七年的关于发展经济关系和合作的长期协定。根据协定，七年内，双方贸易总额累计将达六百亿法郎。"},{"type":"paragraph","text":"国务院副总理邓小平参加了签字仪式，并在签字仪式前会见了法国外贸部长让·弗朗索瓦和夫人一行。"},{"type":"paragraph","text":"邓副总理说，这个协定是两国合作的良好开端。发展两国贸易关系，一定要建立在互利和相互信任的基础上。只有这样，才会持久。中、法合作的领域多得很，大有希望。"},{"type":"paragraph","text":"邓副总理在回答法国记者的问题时表示，中国已决定向法国购买两座核电站设备。"},{"type":"paragraph","text":"代表法国和中国政府在协定上签字的是让·弗朗索瓦·德尼奥部长和李强部长。"},{"type":"paragraph","text":"今天签字的这个协定指出，两国政府将采取一切有益的措施，为加强两国经济关系和合作创造最好的条件，以促进双边交流迅速增长。协定规定，两国将在农业、畜牧业、能源、采矿、钢铁、航空、空间技术、机械制造等领域进行广泛的合作与交流。（附图片）"},{"type":"paragraph","text":"邓小平副总理参加签字仪式。"},{"type":"paragraph","text":"新华社记者　李生南摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4be24908b0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
