<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"藏原惟人强调必须坚决反对美日反动派的反动宣传日共坚持文化革命加强反修斗争指出资产阶级颓废文化侵入苏联产生了恶劣的影响","authors":[],"dates":[{"year":1965,"month":11,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社东京19日电　日本共产党中央政治局委员、日共中央文化部长藏原惟人，在最近举行的日本共产党全国文化部长会议上发表讲话，强调指出日本共产党在文化工作方面的重要任务是:必须坚决反对美日反动派的反共宣传和军国主义的战争宣传，反对资产阶级的文化腐蚀；必须坚持文化革命，同现代修正主义的思想侵蚀进行斗争，创造健康的人民民主的、民族的文化。"},{"type":"paragraph","text":"藏原在报告中指出，从属于美帝国主义的日本垄断资本掌握了日本几乎所有的重要宣传工具和文化设施，它们正在进行露骨的反共宣传和军国主义的战争宣传。与此同时，资产阶级的颓废文化在日本大量泛滥。藏原说，这一切对于那些追求真理、要求变革资本主义社会的人民，起着麻痹他们的阶级性、革命积极性的作用。"},{"type":"paragraph","text":"藏原在报告中着重指出，这种影响不仅在日本这样的资本主义国家，甚至在社会主义国家也有可能出现，而且事实上已经出现。"},{"type":"paragraph","text":"藏原说，列宁非常重视进行文化革命，他曾经指出，在进行政治革命和经济革命的同时，必须完成文化革命。这就是说，如果不进行文化革命，即无产阶级和共产主义者如果不在文化上从质和量两方面去压倒地主和资产阶级，就有可能出现相反的现象。"},{"type":"paragraph","text":"藏原说，在列宁和斯大林时代，苏联曾经发展了文化革命。但是，“四十年后的今天，在苏联以及某些欧洲的社会主义国家出现了列宁曾经担心的现象。赫鲁晓夫进行了所谓‘批判斯大林’，以及后来推行了‘自由化’政策和所谓‘解冻’政策，从而加强了同西方的接触，在思想和政策方面出现了修正主义。它们同美帝国主义实行妥协。美国的、西欧的资产阶级文化侵入苏联。现在在苏联及其他一些社会主义国家流行着美国式的爵士音乐和摇摆舞，并且大演美国电影”。"},{"type":"paragraph","text":"藏原说，“这样一些社会主义国家的资产阶级文化、资产阶级思想的影响以及由此而产生的修正主义思潮，反过来又影响着资本主义国家的共产主义者。目前在日本已经出现了这一现象”。"},{"type":"paragraph","text":"藏原指出，上述反动思想、修正主义思潮、资产阶级的颓废文化，当然不只是来自外部的影响，在日本国内也有产生它们的社会的和政治的原因。如果它们渗透到群众中去，就会起着麻痹和阻挠人民群众的斗争的作用。因此，如果不同它们进行斗争，就不会有革命的发展，也不会有健康的民主的、民族的文化建设。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"07922812c2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
