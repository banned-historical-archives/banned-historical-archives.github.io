art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"落实毛主席最新指示把教育革命进行到底","authors":["四六六九部队驻海淀区军训团全体指战员"],"parts":[{"type":"paragraph","text":"毛主席啊，毛主席！您的亲切接见，使我们无限喜悦，无限荣光。我们热血沸腾，红心激荡，千言万语，敬祝您老人家万寿无疆！"},{"type":"paragraph","text":"毛主席啊，毛主席！天高没有您的天才高，地大没有您的智慧大。您的一系列最新指示为广大群众所掌握，就变成威力无穷的精神原子弹。"},{"type":"paragraph","text":"去年二月，我们响应您的伟大号召，到海淀区三所中学执行军训任务。一年来的斗争实践，使我们深深体会到：每到一个关键时刻，都是您老人家给我们指明方向；每前进一步，都是您老人家给我们智慧和力量。您老人家发出开展革命大批判的战斗号令，我们和广大革命师生一起，对中国赫鲁晓夫展开大控诉、大揭发、大批判。通过革命大批判，广大革命师生，加深了对中国赫鲁晓夫的刻骨仇恨，加深了对您老人家的无限热爱。您老人家发出了以教学班为基础实现革命大联合的战斗号令，我们闻风而动，和革命师生一起，以“只争朝夕”的革命精神，认真学习，坚决贯彻，很快实现了班级大联合，统一了红卫兵组织。您老人家关于教育革命的最新指示发出后，我们和革命师生一道，采取边教学、边批判、边改革的方法，很快就取得了初步成果。无数事实证明，您老人家的每一个最新指示都是我们力量的源泉，前进的灯塔。按照您老人家的最新指示办事，就无往而不胜。"},{"type":"paragraph","text":"“大海航行靠舵手，干革命靠毛泽东思想”。我们一定要更高地举起毛泽东思想伟大红旗，全面落实您的最新指示，把教育革命进行到底，把“三支”“两军”工作做得更好，夺取无产阶级文化大革命全面胜利，为人民立新功。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"教育革命","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"398d38591e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
