tart":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"张春桥罪行累累态度顽抗 公诉人请求法庭予以严惩","authors":[],"parts":[{"type":"paragraph","text":"据新华社12月20日讯 公诉人马纯一今天在特别法庭指出，起诉书指控张春桥所犯罪行事实清楚，证据确凿，张春桥直接犯下的反革命罪行，情节恶劣，后果严重；但在审讯过程中，被告人态度顽抗，在大量的证据面前，拒不认罪。公诉人请求法庭依法从严惩办。"},{"type":"paragraph","text":"在第一审判庭今天上午进行的法庭辩论中，担任国家公诉人的特别检察厅检察员马纯一首先发言。他在指出被告人张春桥的累累罪行以后说，上述犯罪事实，都是张春桥直接犯下的反革命罪行，情节恶劣，后果严重，给国家和人民带来了深重的灾难。被告人触犯了《中华人民共和国刑法》第92条、93条、101条、102条、138条，犯有阴谋颠覆政府罪，策动武装叛乱罪，诬陷罪，反革命杀人伤人罪，反革命宣传煽动罪。在审讯过程中，张春桥态度顽抗，在大量的证据面前，拒不供认所犯罪行。请法庭依法从严惩办。"},{"type":"paragraph","text":"公诉人发言后，审判长曾汉周告诉被告人张春桥：“根据我国《刑事诉讼法》第118条的规定，你有陈述和辩护的权利。你有什么话可以陈述和辩护的，现在你可以讲。”"},{"type":"paragraph","text":"张春桥听后，仍然象法庭调查时那样缄默不语，一言不发。审判长把被告人有权陈述和辩护的话重复了一遍，张春桥还是一声不吭。审判长提出再等他两分钟，但张春桥依旧不讲话。这时审判长说：“被告人张春桥不作陈述和辩护，记录在案。”"},{"type":"paragraph","text":"接着，审判长宣布法庭辩论终结，然后指出：“张春桥，你还有最后陈述的权利。”可是张春桥仍不答言。审判长说：“被告人张春桥不作最后陈述，记录在案。”最后审判长通知张春桥等候宣判。"}],"alias":""},"tags":[{"name":"张春桥","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ec698f30da"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
