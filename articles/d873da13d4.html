ical-archives/banned-historical-archives0/main/maoquanji34.pdf"],"article":{"title":"关于修筑新疆铁路及四个公司归中国独有问题给周恩来的信","alias":"","parts":[{"type":"paragraph","text":"关于修筑新疆铁路及四个公司归中国独有问题给周恩来的信"},{"type":"paragraph","text":"（1954年10月11日）周总理："},{"type":"paragraph","text":"（一）关于修筑新疆铁路及四个公司归中国独有等事\"，请你于今日抽一时间（或要小平）告诉赛福鼎同志一声（他事也可告知一些）。"},{"type":"paragraph","text":"（二）各文件“及消息发表时，要写社论一篇，在同日或第二日发表。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十月十一日"},{"type":"paragraph","text":"[1]指中苏两国政府将于1954年10月12日签订修建兰州—乌鲁木齐一阿拉木图铁路的联合公报和将新疆省开采有色及稀有金属公司等4个公司的苏联股份移交中国的联合公报等事。这天签订的《中苏关于修建兰州一乌鲁木齐一阿拉木图铁路并组织联运的联合公报》规定：在中国境内的铁路，将由中国政府负责修建，苏联给予技术援助。同日签订的《中苏关于将各股份公司中的苏联股份移交给中华人民共和国的联合公报》规定：新疆省开采有"},{"type":"paragraph","text":"关于修筑新疆铁路及四个公司归中国独有问题给周恩来的信色及稀有金属公司、新疆省开采和提炼石油公司、大连建造和修理轮船公司、组织和经营民用航空路线公司将自1955年1月1日起完全移交中国，苏联股份的价值将用中国供应苏联通常出口货物的办法数年内偿还。"},{"type":"paragraph","text":"[2]小平，即邓小平，当时任中共中央秘书长、国务院副总理。[3]赛福鼎，即赛福鼎·艾则孜，当时任新疆省人民政府副主席。"},{"type":"paragraph","text":"[4]指《中华人民共和国政府和苏维埃社会主义共和国联盟政府联合宣言》《中华人民共和国政府和苏维埃社会主义共和国联盟政府关于对日本关系的联合宣言》《中苏关于苏联军队自共同使用的中国旅顺口海军根据地撤退并将该根据地交由中华人民共和国完全支配的联合公报》《中苏关于将各股份公司中的苏联股份移交给中华人民共和国的联合公报》《中苏关于签订科学技术合作协定的联合公报》《中苏关于修建兰州一乌鲁木齐一阿拉木图铁路并组织联运的联合公报》《中华人民共和国政府、苏维埃社会主义共和国联盟政府和蒙古人民共和国政府关于修建从集宁到乌兰巴托的铁路并组织联运的联合公报》。这些文件均发表于1954年10月12日《人民日报》。"},{"type":"paragraph","text":"[5]1954年10月13日，《人民日报》发表了题为《无比深厚的伟大友谊》的社论。"}],"authors":["毛泽东"],"dates":[{"year":1954,"month":10,"day":11}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":274,"page_end":275},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d873da13d4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
