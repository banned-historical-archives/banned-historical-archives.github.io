,"胡容"],"dates":[{"year":1991,"month":5,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报长沙专讯　气势宏伟的毛泽东诗词碑林将于毛泽东主席诞生100周年之际，即1993年12月在他的故乡韶山的韶峰半山腰竖起。"},{"type":"paragraph","text":"这座碑林由100块精心雕凿的石碑组成，占地2.3万平方米。碑上将刻上毛泽东已公开发表的57首诗词及题词。碑林设计群体形态各异，并辅以园林浮雕，空间布局合理。到今年4月底，碑林的前期工程——东起旅游公路，西至韶峰山下仙女茅庵的道路已经开通。"},{"type":"paragraph","text":"(周铁　胡容)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e1ad8b1e6f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
