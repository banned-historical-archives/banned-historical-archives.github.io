关于兵役制问题的决定》  会议通过决定任命人大常委会副秘书长、最高人民法院副院长和中国科学院副院长","authors":[],"dates":[{"year":1978,"month":3,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"五届人大常委会举行第一次会议"},{"type":"paragraph","text":"叶剑英委员长主持会议"},{"type":"paragraph","text":"会议讨论批准了国务院提出的《关于兵役制问题的决定》"},{"type":"paragraph","text":"会议通过决定任命人大常委会副秘书长、最高人民法院副院长和中国科学院副院长"},{"type":"paragraph","text":"新华社北京三月七日电　第五届全国人民代表大会常务委员会今天下午举行第一次会议。"},{"type":"paragraph","text":"人大常委会委员长叶剑英主持了会议。"},{"type":"paragraph","text":"人大常委会副委员长聂荣臻、乌兰夫、吴德、韦国清、陈云、谭震林、李井泉、蔡畅、邓颖超、赛福鼎、廖承志、姬鹏飞、阿沛·阿旺晋美、周建人、许德珩、胡厥文，出席了会议。"},{"type":"paragraph","text":"最高人民法院院长江华、最高人民检察院检察长黄火青，列席了会议。"},{"type":"paragraph","text":"会议在听取了国防部副部长粟裕的说明以后，讨论批准了国务院提出的《关于兵役制问题的决定》。"},{"type":"paragraph","text":"决定指出，我国自一九五五年实行义务兵役制以来，得到了全国各族人民的热烈拥护。实践证明，实行义务兵役制，对于加强我军建设，加强民兵建设，为我军积蓄后备力量，均发挥了积极的作用。"},{"type":"paragraph","text":"决定说，随着我军技术装备的不断发展，对战士的军政素质和技术水平提出了更高的要求。为了贯彻落实毛主席关于“军队要整顿”、“要准备打仗”的教导和华主席、党中央抓纲治国的战略决策，加速我军革命化、现代化建设，特决定实行义务兵与志愿兵相结合的制度，并对现行义务兵的服役年限作适当延长。"},{"type":"paragraph","text":"决定规定，从一九七八年起，义务兵的服现役年限分别为：陆军部队的战士三年；空军、海军陆勤部队和陆军特种技术部队的战士四年；海军舰艇部队、陆军船舶分队的战士五年。一九七七年以前征集入伍的义务兵，服现役年限仍按原规定执行。"},{"type":"paragraph","text":"决定说，为使部队保持一定数量的基层骨干和技术骨干，以增强战斗力，服满现役的义务兵，应根据部队的需要和本人自愿超期服役。为了稳定和加强部队的技术骨干力量，部分超期服役的义务兵可以改为志愿兵，留在部队长期服役。志愿兵的服役年限，一般为十五至二十年，年令一般不超过四十岁。如部队需要，本人自愿，服役年限还可适当延长。"},{"type":"paragraph","text":"会议分别通过决定，任命武新宇、沙千里为全国人民代表大会常务委员会副秘书长；王维纲、曾汉周、何兰阶为最高人民法院副院长；方毅、李昌、周培源、童第周、胡克实、严济慈、华罗庚、钱三强为中国科学院副院长。"},{"type":"paragraph","text":"会议还通过了一批驻外大使的任免事项。（附图片）"},{"type":"paragraph","text":"五届人大常委会举行第一次会议。"},{"type":"paragraph","text":"新华社"},{"type":"paragraph","text":"记者摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"36b058b283"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
