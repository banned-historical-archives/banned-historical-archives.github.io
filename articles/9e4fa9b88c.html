<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"上海师生热烈响应毛主席号召积极投入学习雷锋热潮","authors":[],"dates":[{"year":1963,"month":3,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　上海广大师生热情响应毛主席的号召:“向雷锋同志学习”。"},{"type":"paragraph","text":"近几天来，全市学校的青少年们，通过校内广播台、黑板报、墙报、展览会、事迹讲座、座谈会、诗歌朗诵会、文艺晚会等各种各样形式，全面地了解雷锋的光辉事迹和先进思想:漫谈交流学习的心得；着重议论了雷锋具有哪些高贵品质，雷锋为什么会有这些高贵品质，我们应当怎样向雷锋学习等几个问题。华东师范大学政治教育系各年级团组织举行了以“学习雷锋的高贵品德，做共产主义接班人”、“象雷锋那样战斗和生活”、“做雷锋式的革命战士”等为主题的讲演会。同济大学学生文工团下班级演出了根据雷锋日记编写的文艺节目。向明中学许多同学都很喜爱雷锋日记，越读越感动。许多人把日记摘录了下来。初一(2)班每个同学还特地置备了《学习雷锋事迹》的札记本，随时记下自己学习的心得体会。北郊中学团委和学校语文教研组共同发起关于学习雷锋的征文，在油印刊物《北郊文峰》上选刊。闸北区陆家宅路小学教师们正在编制《雷锋同志生平事迹》的连环画和歌曲。"},{"type":"paragraph","text":"许多人在初步学习雷锋的先进事迹后，认为雷锋就是自己又红又专的明确方向，雷锋就是自己行动的榜样。他们一方面正在继续全面地认识雷锋的光辉事迹和先进思想，一方面在这基础上，结合自己的思想情况，进行专题的讨论和漫谈。华东化工学院、上海师范学院、上海交通大学等校青年师生，学习雷锋的共产主义道德品质，提出了“为集体做好事”、树立新道德新风尚的要求。华东师范大学中文系、生物系学生表示要象雷锋那样坚持学习毛主席著作，坚决听毛主席的话，订出了在最近学习《为人民服务》、《纪念白求恩》、《中国社会各阶级的分析》等文章的计划。化学系二年级不少学生在班会上介绍了各自的红专规划，表示要象雷锋那样坚持自觉改造，树立伟大的共产主义理想，做永不生锈的螺丝钉。向明中学开展了全校性的关于“什么是幸福”的讨论，这是从“为什么雷锋把毫不利己、专门利人看作是人生幸福?”这一问题而引起的。这个讨论正在热烈进行，许多学生表示将来要象雷锋那样为人民创造幸福。"},{"type":"paragraph","text":"许多艺术单位也开展了学习雷锋的活动。上海市戏曲学校团总支以读报、讲故事、写心得和看展览会等活动方式，为青少年学习雷锋精神提供有利条件。上海越剧院各团，根据各自不同特点，定出了侧重学习雷锋共产主义思想的学习内容:一团青年演员提出了学习雷锋，在团里树立助人为乐、艰苦朴素、勤学苦练的良好风气；三团青年演员表示要进一步学习雷锋，在团里发扬服从工作需要，处处服从组织调配的集体主义精神。上海市舞蹈学校、美术学校党团组织，向全体同学作了学习雷锋同志的动员报告，要求同学们以实际行动向雷锋同志学习。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9e4fa9b88c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
