tes":[{"year":1993,"month":8,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"中国最大幅油画《良宵》将献毛主席纪念堂"},{"type":"paragraph","text":"本报北京８月１７日讯堪称中国最大幅的油画《良宵》，将于今年１２月由作者刘宇一呈献给毛主席纪念堂，那幅曾被纪念堂收藏的较小的《良宵》已由画家委托香港拍卖行公开拍卖。"},{"type":"paragraph","text":"《良宵》是刘宇一先生根据１９５０年仲秋之夜在北京中南海举行的联欢会上，毛泽东与柳亚子和诗的历史，费时８年精心创作的，画面气势宏大，构图饱满，人物细腻逼真，色彩华丽典雅，被美术界人士称为具有重大历史意义的“扛鼎”之作。"},{"type":"paragraph","text":"正在创作的《良宵》宽１２．２６米，高３．５米，画家在原作的基础上又增添了几位历史人物。目前，这幅油画已完成２／３。（孙国英）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e4101f841e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
