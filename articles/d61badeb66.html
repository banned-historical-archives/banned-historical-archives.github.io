ical-archives/banned-historical-archives0/main/maoquanji44.pdf"],"article":{"title":"关于召集中央局书记讨论“队为基础”问题的批语","alias":"","parts":[{"type":"paragraph","text":"关于召集中央局书记讨论“队为基础”问题的批语"},{"type":"paragraph","text":"（1961年10月4日）小平、彭真同志："},{"type":"paragraph","text":"索性请柯老、井泉、澜涛、任穷“四同志，于五日来此一谈，使这个“队为基础”的大问题，弄个明白。如大家同意进行调查，使省、地、县三级在两个月内都有所酝酿，十二月就可作出决定。口如同意，请彭真同志即办。五日到，晚上即可谈一下，六日会毕，七日他们即可回去。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十月四日晨五时"},{"type":"paragraph","text":"[1]柯老，指柯庆施，当时任中共中央华东局第一书记。井泉，即李井泉，当时任中共中央西南局第一书记。澜涛，即刘澜涛，当时任中共中央西北局第一书记。任穷，即宋任穷，当时任中共中央东北局第一书记。"},{"type":"paragraph","text":"[2]1961年10月7日，中共中央发出了《关于农村基本核算单位问题给各中央局，各省、市、区党委的指示》，要求各级党委就这个问题进行认真的调查研究，以便中央作出决定。1962年2月13日，中共中央发出《关于改变农村人民公社基本核算单位问题的指示》，决定农村人民公社一般以生产队为基本核算单位。"}],"authors":["毛泽东"],"dates":[{"year":1961,"month":10,"day":4}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":442,"page_end":442},"tags":[{"name":"毛泽东","type":"人物"},{"name":"彭真","type":"人物"},{"type":"文稿类型","name":"批示"}]},{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"关于召集中央局书记讨论“队为基础”问题的批语","authors":["毛泽东"],"dates":[{"year":1961,"month":10,"day":4}],"is_range_date":false,"parts":[{"text":"关于召集中央局书记讨论“队为基础”问题的批语","type":"title"},{"text":"毛泽东","type":"authors"},{"text":"小平、彭真同志：","type":"appellation"},{"text":"索性请柯老、井泉、澜涛、任穷四同志，于五日来此一谈，使这个“队为基础”的大问题，弄个明白。如大家同意进行调查，使省、地、县三级在两个月内都有所酝酿，十二月就可作出决定。如同意，请彭真同志即办。五日到，晚上即可谈一下，六日会毕，七日他们即可回去。","type":"paragraph"},{"text":" 毛泽东十月四日晨五时","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"彭真","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d61badeb66"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
