"authors":["张百生","汪荣兴","沈阳师范学院","焦玉纯","白永贵","邓忠良"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"右派言论——否定我国社会主义建设的成绩 (2)","type":"title"},{"text":"沈阳师范学院汪荣兴焦玉纯张百生邓忠良白永贵","type":"authors"},{"text":"汪荣兴  (中文系学生)说：“新中国是不如旧中国的。旧中国那有多了不起，天朝大国，外国都来进贡，现在都完了。”","type":"paragraph"},{"text":"焦玉纯  (历史系学生)说：“参军哪是自愿参加，而是把大伙集在一块儿成宿开会，使劲烧炕，有的屁股烫的受不了，一幌动屁股，那个负责同志就说这个人愿意去。”","type":"paragraph"},{"text":"张百生　(团委宣传部副部长)对我国在十二年内赶上世界先进科学水平问题他说：“这是办不到的，起码要五十年才能达到……。”","type":"paragraph"},{"text":"邓忠良  (图画科学生)说：“社会太黑暗啦，斯大林杀了不少中央委员，现在还存在自私，是因为这社会制度不好。”","type":"paragraph"},{"text":"白永贵　(中文系学生)说：“什么共产主义，五十年不能实现，就是过去一百万年，到人类全部毁灭，也不会实现的。”又说：“人类的未来不是进步而是退化的，不是光明而是黑暗的。”“农村生活苦到极点了。农村党支部书记都脱产，这是剥削。一个尉官就挣60多元，这也是剥削。农民觉悟不高，要是我，早拿篇担砸他们了。”“如果世界是这样无聊，我想美国原子学家倒完全可以把它炸毁，结束这人间的苟且偷生，因而又高呼‘光明正大’的‘虚假世界’。”","type":"paragraph"}],"comments":[],"origin":"《右派言论选辑》（社会主义教育参考资料之一，内部材料　仅供参考，沈阳师范学院社会主义教育办公室 1958．3）","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"125f724b15"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
