ical-archives/banned-historical-archives8/main/maoquanji25.pdf"],"article":{"title":"华东野战军中原野战车接部署休整完成渡江作战准备","alias":"","parts":[{"type":"paragraph","text":"华东野战军中原野战军按部署休整"},{"type":"paragraph","text":"完成渡江作战准备!"},{"type":"paragraph","text":"（1949年.1月12日）粟、陈、张，并告邓、张："},{"type":"paragraph","text":"（一）同意华野以-个兵团进驻蚌埠地区，其余各兵团分驻陇海南北适当地点，以就粮为原则。（二）华野、中野休整时间现定两个半月，由子删起至寅世止，每半月为一期，共为五期。望按此部署休整，并完成渡江作战诸项准备工作，待命出动。详由刘陈?面告。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"子文"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军委起草的给华东野战军代司令员兼代政治委员粟裕、参谋长陈士和副参谋长张震的电报。"},{"type":"paragraph","text":"[2]邓、张，指邓小平、张际春，当时分别任中原野战军政治委员和副政治委员兼政治部主任。"},{"type":"paragraph","text":"[3]刘陈，指刘伯承、陈毅，当时分别任中原野战军司令员和华东野战"}],"authors":["毛泽东"],"dates":[{"year":1949,"month":1,"day":12}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":523,"page_end":523},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"10cc467009"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
