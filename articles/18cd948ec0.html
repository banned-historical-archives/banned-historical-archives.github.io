<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"日本朋友欢呼我国革命派夺权的革命行动  文化大革命为世界人民树立光辉榜样  进行政治革命、经济革命和文化革命都离不开毛泽东思想","authors":[],"dates":[{"year":1967,"month":2,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"日本朋友欢呼我国革命派夺权的革命行动"},{"type":"paragraph","text":"文化大革命为世界人民树立光辉榜样"},{"type":"paragraph","text":"进行政治革命、经济革命和文化革命都离不开毛泽东思想"},{"type":"paragraph","text":"新华社东京电　毛主席亲自发动和领导的中国无产阶级文化大革命日益深入发展不断获得巨大胜利，大大激励了日本革命人民，他们热烈欢呼中国无产阶级革命派从党内一小撮走资本主义道路的当权派手中夺权的革命行动好得很！日本朋友强调指出中国的无产阶级文化大革命，为世界革命人民打碎旧世界、创造新世界，树立了光辉的榜样。"},{"type":"paragraph","text":"日中友好协会（正统）福冈县联合会副会长柏木正一，热烈赞扬中国无产阶级文化大革命，给世界革命人民提供了典范，它向世界革命人民提出了辨别真假马克思列宁主义的准绳。"},{"type":"paragraph","text":"他说，中国无产阶级文化大革命给正在争取民族解放和保卫世界和平的世界各国人民，增加了无限勇气、力量和信心。"},{"type":"paragraph","text":"柏木说，发挥着无比威力的中国无产阶级文化大革命，给美帝国主义和现代修正主义以及各国反动派最沉重的打击，加速了帝国主义的灭亡和世界人民的解放。"},{"type":"paragraph","text":"九州友好贸易公司社·长藤泽一谕称赞中国无产阶级文化大革命是史无前例的事业，是国际共产主义运动的创举。"},{"type":"paragraph","text":"他说，日本人民要革命，就必须学习中国革命的经验，要防止产生修正主义，也必须学习中国革命的经验。藤泽引用毛主席关于“人民，只有人民，才是创造世界历史的动力”的著名论断时说，中国无产阶级文化大革命就是这个著名论断的集中表现。他满怀革命豪情地赞扬毛主席是最相信群众，让群众自己教育自己，自己解放自己的伟大领袖。"},{"type":"paragraph","text":"藤泽说，今天谁反对毛泽东思想，谁就不是马克思列宁主义者。他强调指出，无论搞政治革命、经济革命和文化革命，都离不开毛泽东思想。"},{"type":"paragraph","text":"下关市一位高中教员向中国记者说，毛主席在无产阶级取得政权后怎样保持和巩固无产阶级专政的问题上，发展和丰富了马克思列宁主义。毛主席是伟大的思想家、伟大的革命家。"},{"type":"paragraph","text":"下关市一位名叫古野的工会干部说：中国无产阶级文化大革命给日本人民以巨大的影响，这场文化大革命的伟大成果是世界人民的共同财富，它不仅关系到中国的命运，也关系到日本和全世界革命的命运。"},{"type":"paragraph","text":"福冈县的一位社会活动家说，中国无产阶级文化大革命的胜利，对正在斗争的日本人民是最大的鼓舞和支持。他表示要在毛泽东思想的指引下，为日本人民的解放而奋斗。"},{"type":"paragraph","text":"山口县一位青年农民说，在中国无产阶级文化大革命和红卫兵步行串连的鼓舞下，在他居住的农村里，有一批男女青年，最近组织了一个长征队，正在计划在他们居住地区步行五十公里，接触社会、访贫问苦并向农民推广中国出版的书刊，宣传毛泽东思想。"},{"type":"paragraph","text":"最近访问中国归来的一位高中教员，热情赞扬毛主席把中国青年一代培养成完全新型的人，从而为中国永不变色地沿着社会主义道路胜利前进提供了保证。这位教员对中国记者说，他回国后在各种集会和学校课堂里介绍中国无产阶级文化大革命的实际情况时，受到了群众和同学的热烈欢迎。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"18cd948ec0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
