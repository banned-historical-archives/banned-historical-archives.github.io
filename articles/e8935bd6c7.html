script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"李先念副总理和夫人拜会马科斯总统和夫人菲律宾报纸发表社论热烈欢迎李副总理对菲友好访问","authors":[],"dates":[{"year":1978,"month":3,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社马尼拉三月十二日电　中华人民共和国国务院副总理李先念和夫人林佳楣，三月十二日傍晚到菲律宾总统府马拉坎南宫拜会了菲律宾共和国总统费迪南德·埃·马科斯和夫人伊梅尔达·马科斯。"},{"type":"paragraph","text":"宾主进行了亲切友好的谈话。李先念副总理转达了华国锋总理、叶剑英委员长和邓小平副总理对马科斯总统和夫人的问候。马科斯总统对中国第五届全国人民代表大会的成就表示祝贺，并且对华国锋总理继续担任总理表示高兴。"},{"type":"paragraph","text":"拜会时在坐的有:外交部部长黄华和夫人何理良以及中国驻菲律宾大使柯华和夫人张明。"},{"type":"paragraph","text":"新华社马尼拉三月十二日电　菲律宾报纸三月十二日发表社论，热烈欢迎李先念副总理对菲律宾进行正式友好访问。它们强调，李副总理的访问将进一步加强菲中这两个亚洲国家之间的友好合作关系。"},{"type":"paragraph","text":"《每日快报》的社论说:“今天，中华人民共和国李先念副总理的到达，再次证明中国和菲律宾奉行互相合作和友好的政策，以加强第三世界国家和人民之间的团结关系为目标。”"},{"type":"paragraph","text":"社论说:“自从中菲两国一九七五年六月建立外交关系以来’由于两国采取反对霸权主义和支持第三世界国家争取进步和自主的斗争这种共同立场，这两个亚洲邻国之间的经济和文化关系有了迅速的发展。”"},{"type":"paragraph","text":"社论指出，菲律宾和中国人民之间的友谊可以追溯到一千多年以前。这一点已被最近在菲律宾各地出土的历史文物、货币、瓷器、陶器所证明。这种长期的传统友谊由于两国人民遭到一系列外来统治而一度中断。“今天，中国和菲律宾的社会制度虽然不同，但是谅解和合作的大门已经敞开，在和平共处五项原则的基础上两国关系得到了巩固。”"},{"type":"paragraph","text":"社论说:“副总理的访问，肯定将推动两国经济和文化关系的迅速增长，加强这两个亚洲国家之间的谅解和亲密关系。”"},{"type":"paragraph","text":"《今日公报》的社论说，李先念副总理的访问再次表明菲中两国人民的友谊。社论谈到了马科斯总统和夫人在他们访华时受到的盛情款待。社论说:“我们对李副总理表示热烈地欢迎。”"},{"type":"paragraph","text":"《时代日报》在题为《欢迎》的社论中说:“中华人民共和国李先念副总理今天下午到达马尼拉时将受到极其热烈的欢迎。它是这次访问的重要意义以及菲中密切关系的反映。”这家报纸还为欢迎李副总理访问出版了有二十二页的增刊，其中刊登有华国锋主席和介绍中国情况的彩色照片。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"华国锋","type":"人物"},{"name":"李先念","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e8935bd6c7"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
