ical-archives/banned-historical-archives0/main/maoquanji31.pdf"],"article":{"title":"关于交换战俘的批语","alias":"","parts":[{"type":"paragraph","text":"关于交换战俘的批语！"},{"type":"paragraph","text":"（1951年12月7日）周阅。"},{"type":"paragraph","text":"美国人宣布被俘的仅一七四人，其余一万多人列为“失踪’的，他们没有理由向我们索取每一个“失踪”的人。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十二月七日"},{"type":"paragraph","text":"[1]这个批语，写在外交部情报司编的一份临时通报上，其中摘报了美国《纽约时报》《新闻周刊》和《美国新闻与世界报道》刊载的关于朝鲜停战谈判交换战俘的3条新闻。11月26日美国《新闻周刊》说，“上星期列为美国死伤人数的九九，二二六名中，目前失踪的人数为一○，八三六名，另确知被俘的仅一七四人”。12月7日出版的《美国新闻与世界报道》称，“有人建议做这样一笔交易来解决停战监督和俘虏交换问题，即美国放弃视察的要求，共方则交出所俘的联军。为了换取落在共方手中的美国兵，联军准备冒一下共方阴谋集结兵力的危险”。毛泽东在这段话旁批有“这一点亦可注意”。"},{"type":"paragraph","text":"[2]周，指周恩来。"}],"authors":["毛泽东"],"dates":[{"year":1951,"month":12,"day":7}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":114,"page_end":114},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"468126ae45"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
