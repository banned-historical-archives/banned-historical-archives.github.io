ical-archives/banned-historical-archives0/main/maoquanji50.pdf"],"article":{"title":"建议普遍开拥军谈心会","alias":"","parts":[{"type":"paragraph","text":"建议普遍开拥军谈心会"},{"type":"paragraph","text":"（1968年9月4日）建议将此件\"通报全军，普遍开谈心会。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"九月四日"},{"type":"paragraph","text":"[1]指中共中央军委办事组1968年8月28日整理的一份信访摘报。摘报说，最近云南个旧、河北保定、四川内江、福建福安和厦门等地的群众组织来信反映，他们在八一前邀请当地驻军开拥军谈心会或座谈会，会上群众组织的代表称赞了部队的功绩，主动检查了对待部队的一些错误态度。部队同志则“主动检查了在“三支”·两军”工作中的缺点和一些对待群众的错误态度，诚恳地向群众赔礼道”。通过拥军活动，进一步密切了军民关系，加强了军民团结。1968年10月4日，中央军委、中央文革将这个信访摘报转发全军，要求凡担任“三支”“两军”的部队，要遵照毛主席的指示，普遍开谈心会，对持不同观点的群众诚恳对待，多作自我批评，进一步密切军民关系，更好地完成“三支”“两军”任务。"}],"authors":["毛泽东"],"dates":[{"year":1968,"month":9,"day":4}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":294,"page_end":294},"tags":[{"name":"毛泽东","type":"人物"},{"name":"中央文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a06cfda1f8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
