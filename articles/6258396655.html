rticle":{"title":"中共中央转发《关于恢复发行有邓小平同志形象和言论的影片、图片的请示报告》的通知","dates":[{"year":1977,"month":8,"day":3}],"is_range_date":false,"authors":["中共中央","中共中央宣传口"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"中央宣传部办公厅，党的宣传工作文件选编，516","tags":[{"name":"邓小平","type":"主题/事件"}],"parts":[{"type":"title","text":"中共中央转发《关于恢复发行有邓小平同志形象和言论的影片、图片的请示报告》的通知"},{"type":"subtitle","text":"中发〔1977〕28号（1977年8月3日）"},{"type":"paragraph","text":"中共中央批语："},{"type":"paragraph","text":"现将中央宣传口《关于恢复发行有邓小平同志形象和言论的影片、图片的请示报告》转发给你们，请遵照执行。"},{"type":"paragraph","text":"关于恢复发行有邓小平同志形象和言论的影片、图片的请示报告"},{"type":"paragraph","text":"根据党的十届三中全会的精神，对于过去由于有邓小平同志的形象和言论而停止放映、展出和发行的影片、图片，我们意见做如下处理："},{"type":"paragraph","text":"一、有邓小平同志形象的影片、图片，凡适合目前上映和展出的，均恢复上映和展出。"},{"type":"paragraph","text":"二、在影片、图片中，凡有“批邓”、“反击右倾翻案风”等词句的，应将该词句删去。"},{"type":"paragraph","text":"三、恢复发行的影片、图片中，如有“四人帮”的镜头或名字，一律去掉。"},{"type":"paragraph","text":"中央宣传口"},{"type":"paragraph","text":"一九七七年七月三十日"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6258396655"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
