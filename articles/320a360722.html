ors":[],"dates":[{"year":1957,"month":6,"day":13}],"is_range_date":false,"parts":[{"text":"毛泽东关于改进《人民日报》工作的批语","type":"title"},{"text":"一","type":"subtitle"},{"text":"乔木同志：","type":"paragraph"},{"text":"北京日报比人民日内\u003c报\u003e编得好，有工人、农民、学生、左翼党外人士的批判反动言论的大量报道，极为丰富，文字也较人民日报生动，编排也好。请看第二版全部报道。","type":"paragraph"},{"text":" 毛泽东六月十三日","type":"paragraph"},{"text":"二","type":"subtitle"},{"text":"请在人〔民〕日报召集一个会议，有较多人参加。事先要他们读这第二版，全部读一遍，然后开会。你的编排水平应当提高。文字也有些八股味，例如不感觉“怎样对待批评”这个概念化的标题是不好的，不感觉这篇文章通体是一个八股调。希望思索改进。","type":"paragraph"},{"text":" 毛泽东六月十三日","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"320a360722"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
