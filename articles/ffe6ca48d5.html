script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"印度《人民之路》谴责反动政府勾引帝国主义残酷剥削人民  大资产阶级大地主的卖国政权祸国殃民","authors":[],"dates":[{"year":1968,"month":12,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"印度《人民之路》谴责反动政府勾引帝国主义残酷剥削人民"},{"type":"paragraph","text":"大资产阶级大地主的卖国政权祸国殃民"},{"type":"paragraph","text":"据新华社十九日讯　新德里消息：印度《人民之路》月刊十二月号发表社论，揭露并谴责印度反动统治集团敞开大门，引进帝国主义势力，残酷剥削印度人民。"},{"type":"paragraph","text":"社论说，外国资本投入印度所得的利润比投入世界上其它地方所得的利润都要多些。在一九六四年，美国资本投入其它国家的平均利润率大约是百分之十点八，而投入印度的美国资本的利润率高达百分之十四点九。这就是为什么美国和其它国家的吸血鬼这样急切地要向印度投资的原因。"},{"type":"paragraph","text":"社论揭露印度反动政府越来越依赖美国和其它帝国主义国家。社论说，印度政府为了弥补预算赤字而向外国借来的贷款，在印度的“第一个五年计划”期间（一九五一年四月——一九五六年三月）占赤字总数百分之九点二；在“第二个五年计划”期间（一九五六年四月——一九六一年三月）增加到百分之二十九；而在“第三个五年计划”期间（一九六一年四月——一九六六年三月）高达百分之四十九点二。"},{"type":"paragraph","text":"社论还谴责印度反动政府继续放宽对外国投资者的限制，并且建立“外国投资委员会”，吸收更多外国资本，使外国垄断资本更广泛、深入地掠夺印度人民。"},{"type":"paragraph","text":"社论最后指出：“目前的印度统治者越来越屈服在外国帝国主义者的脚下，因此每天在增加印度人民的苦难和损害印度人民的民族尊严。听命于国际帝国主义的卖国的资产阶级和封建主的统治是继续缠着印度人民的祸患。印度人民无疑地将摆脱这个国内外剥削者结成的不神圣同盟。只有通过在健全的革命领导下的群众革命行动，才能结束这些魔鬼的剥削。”（附图片）"},{"type":"paragraph","text":"饥饿的印度妇女、小孩衣不遮体，流离失所。　新华社发"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ffe6ca48d5"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
