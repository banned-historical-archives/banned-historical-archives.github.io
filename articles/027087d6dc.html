","authors":[],"dates":[{"year":1951,"month":6,"day":12}],"is_range_date":false,"parts":[{"text":"雅安抗美援朝时事宣传工作陷停顿状态","type":"title"},{"text":"【西南总分社十二日讯】雅安抗美援朝时事宣传工作已陷停顿状态。四月间该市有百分之八十以上的居民受到了抗美援朝教育。但五一以后，对居民时事学习已失去经常领导。现在仍在学习的小组纯为自发坚持。签名投票运动已经停顿。五一前后的工作未作总结，对受教育的群众未作抽查，对如何消灭空白点，及巩固群众爱国热情并使之结合实际工作走向持久化，未作计划，宣传网迄未建立。群众及部分干部虽关心怎样继续学习，深入一步。但某些干部有自满情绪亦缺少办法。","type":"paragraph"}],"comments":[],"origin":"新华通讯社编《内部参考》1951年6月20日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"027087d6dc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
