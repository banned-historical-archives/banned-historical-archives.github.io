ates":[{"year":1991,"month":5,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"不是冤家不聚头"},{"type":"paragraph","text":"——记马文革淘汰捷队科贝尔"},{"type":"paragraph","text":"“不是冤家不聚头”。中国选手马文革在男子团体赛中两次输给捷克斯洛伐克队的科贝尔·皮特，单打一抽签，偏巧两人第一轮相遇。没有打好团体赛的马文革要在单打中有所作为，非过此关不可。"},{"type":"paragraph","text":"上午１１点多，科贝尔开始重施故伎，马文革又蹈覆辙。１１∶２１，马文革难道又要打一盘下风球吗？出现这种局面，观战者当中有人高兴，有人着急，也有人在考虑对策。"},{"type":"paragraph","text":"马文革第一局输在自己失误多，反手压不住对方。从第二局开始，两人互相挤反手的场面明显减少，马文革抢先送对方正手，在斜线对拉弧圈球后变线打反手，使科贝尔近台反手球的优势难以发挥，主动权逐渐移到中国选手一边。２１∶１５，２１∶１２，马文革连扳两局。"},{"type":"paragraph","text":"眼看马文革越打越放手，科贝尔也放弃了短球控制的办法，第四局一上来便主动出击，比分一路领先，直至１７∶１２。马文革在不利形势下大胆把台内球撩向对方左右两角，坚持把对手调离球台再打反手，从１７∶１８换发球后连得４分，赢下第四局。这盘球不光报了一箭之仇，重要的是为单打比赛开了个好头。中国代表团副团长李富荣说，马文革几天前输了球，现在要赢回来，就得从主观上寻找原因，运动员处理这样的比赛，没有正确的思想方法，抱怨客观是不行的。单打后边几轮都不好过，需要经受的考验多着呐。本报记者  汪大昭"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"88515e0a1c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
