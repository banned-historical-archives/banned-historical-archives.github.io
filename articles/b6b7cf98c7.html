tart":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"用毛泽东思想武装新干部的头脑培养既能带兵又能打仗的带头人某炮团党委狠抓基层建设；推动战备工作落实","authors":[],"parts":[{"type":"paragraph","text":"本报讯 沈阳部队某炮团党委，遵照毛主席关于“有计划地培养大批的新干部，就是我们的战斗任务”的伟大教导，狠抓新干部的思想革命化，用毛主席关于无产阶级专政下继续革命的伟大学说武装新干部的头脑，大大加强了基层革命化和战斗化的建设，有力地推动了战备工作的落实。"},{"type":"paragraph","text":"这个团遵照毛主席培养无产阶级革命事业接班人的五个条件，每年都选拔一些优秀战士到领导岗位上。毛主席教导我们：“在中国人民的伟大的斗争中，已经涌出并正在继续涌出很多的积极分子，我们的责任，就在于组织他们，培养他们，爱护他们，并善于使用他们。”团党委反复学习并深刻领会毛主席这一伟大教导，联系新干部提升后的情况，分析新干部的特点是：对伟大领袖毛主席感情深，按毛泽东思想办事坚决，有旺盛的革命干劲，有密切联系群众的优良作风；同时，由于他们参加革命时间短，缺乏斗争经验，工作办法少，有的同志因而感到担子重，压力大，产生一些活思想。党委成员认识到，对基层带头人的培养，直接关系到连队革命化和战斗化的建设，直接关系到当前战备工作的落实。因此，把培养新干部当成一项重要任务来抓。"},{"type":"paragraph","text":"团党委在培养新干部工作中，始终注意抓根本，用毛泽东思想武装他们。在新的形势下，有的新干部认为技术上没有两下子，战时怎么能带兵打仗，于是在抓军事训练时，忽视了政治思想工作。为了解决这个问题，党委成员深入连队，帮助新干部学习毛主席关于“历史的经验值得注意”的教导，回顾我军两条建军路线斗争的历史，学习珍宝岛自卫反击战中十英雄的革命思想和先进事迹，帮助他们坚持突出无产阶级政治，正确处理政治思想好和其他三好的关系，使新干部怀着保卫祖国的全局观念带领战士去搞好军事训练。新提升的政工干部，有的在加强支部建设上抓不住根本，党委成员就组织他们学习毛主席的有关教导和林副主席的有关指示，学习古田会议决议和一九六○年军委扩大会议决议，并亲自传授抓支部建设的体会，请老指导员介绍经验，使他们善于运用毛泽东思想建设党支部。"},{"type":"paragraph","text":"团党委强调用毛主席的光辉著作“老三篇”改造新干部的世界观，培养新干部一不怕苦、二不怕死的革命精神。党委针对新干部的活思想，组织他们大学、大讲、大用“老三篇”，请苦大仇深的老贫农忆苦思甜，揭发和控诉美帝国主义和社会帝国主义侵略我国的罪行，狠批大叛徒刘少奇的“活命哲学”。这样，一不怕苦、二不怕死的革命精神大大发扬，新干部带领战士，排除万难，去搞好战备工作。"},{"type":"paragraph","text":"毛主席教导说：“从战争学习战争——这是我们的主要方法。”团党委重视在斗争实践中培养新干部，放手让他们工作，有了成绩及时表扬，帮助他们总结提高，有了问题，帮助他们接受教训。党委还用以点带面的办法，及时推广他们中的先进经验，使他们在斗争中锻炼成为既能带兵又能打仗的带头人。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b6b7cf98c7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
