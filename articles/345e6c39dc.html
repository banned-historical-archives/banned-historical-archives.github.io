命所取得的成就","authors":[],"dates":[{"year":1967,"month":9,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"由李先念副总理陪同"},{"type":"paragraph","text":"刚果（布）朋友访问清华大学"},{"type":"paragraph","text":"努马扎莱总理赞扬我国无产阶级文化大革命所取得的成就"},{"type":"paragraph","text":"新华社二十八日讯　安布鲁瓦斯·努马扎莱总理和由他率领的刚果（布）全国革命运动和政府代表团，今天下午由李先念副总理陪同，到清华大学参观访问，受到清华大学数千革命师生的热烈欢迎。"},{"type":"paragraph","text":"当努马扎莱总理和其他刚果（布）朋友到达清华大学时，欢迎的群众早已列队夹道等候，人们高举着毛主席的画像、高举着刚果"},{"type":"paragraph","text":"（布）总统马桑巴—代巴的画像，挥动着革命宝书《毛主席语录》，不断高呼：“坚决支持刚果（布）人民的反帝反殖斗争！”“坚决支持亚非拉人民的革命斗争！”“中国刚果（布）两国人民的友谊万岁！”“毛主席万岁！”"},{"type":"paragraph","text":"努马扎莱总理和其他刚果（布）朋友同红卫兵革命小将进行了亲切的座谈。清华大学革命群众组织的代表，向刚果（布）朋友介绍全校革命师生，在毛泽东思想指引下，取得了无产阶级文化大革命的伟大胜利。他们表示，要努力活学活用毛主席著作，坚决把无产阶级文化大革命进行到底，为支持刚果（布）人民和全世界各国人民的革命斗争作出贡献。"},{"type":"paragraph","text":"努马扎莱总理在座谈时说，我们这次访问，能够亲眼看到中国取得各方面的成就和无产阶级文化大革命的成就，使我感到非常高兴。他指出，世界上一切反动派对中国无产阶级文化大革命的说法都是错误的。"},{"type":"paragraph","text":"刚果（布）朋友们在清华大学时参观了大字报和教学设备等。"},{"type":"paragraph","text":"今天陪同努马扎莱总理参观的，还有刚果（布）驻中国大使巴赞加。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"李先念","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"345e6c39dc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
