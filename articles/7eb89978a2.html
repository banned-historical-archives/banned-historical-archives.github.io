ates":[{"year":1981,"month":4,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"工商行政管理总局副局长、经济学家"},{"type":"paragraph","text":"管大同同志逝世"},{"type":"paragraph","text":"新华社北京3月28日电 工商行政管理总局副局长、党组副书记、经济学家管大同，因病医治无效，于1981年2月27日在北京逝世，终年67岁。"},{"type":"paragraph","text":"管大同同志1936年10月参加中国共产党，几十年来在马列主义、毛泽东思想的指引下，把自己的毕生精力贡献给了党和人民的革命事业。他勤奋学习、刻苦钻研社会主义建设的经济理论，为改造资本主义工商业和开展社会主义时期的工商行政管理工作，做出了贡献。"},{"type":"paragraph","text":"管大同同志追悼会今天下午在八宝山革命公墓礼堂举行。邓小平、李先念、陈云、赵紫阳、薄一波、万里、谷牧、宋任穷、胡乔木、姚依林等送了花圈，薄一波、杨勇、段君毅等参加了追悼会。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"薄一波","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7eb89978a2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
