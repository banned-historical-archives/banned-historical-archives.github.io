script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"沈阳部队派出一千多个宣传队宣传毛主席最新指示  用毛泽东思想武装群众是最大的爱民  大大推动街道居民活学活用毛主席著作的群众运动，促进了居民的思想革命化","authors":[],"dates":[{"year":1968,"month":1,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"沈阳部队派出一千多个宣传队宣传毛主席最新指示"},{"type":"paragraph","text":"用毛泽东思想武装群众是最大的爱民"},{"type":"paragraph","text":"大大推动街道居民活学活用毛主席著作的群众运动，促进了居民的思想革命化"},{"type":"paragraph","text":"据新华社沈阳七日电　人民解放军沈阳部队在深入开展向“支左爱民模范排”和“支左爱民模范”李文忠同志学习活动中，掀起广泛深入的爱民热潮。广大指战员把用毛泽东思想武装群众看作是最大的爱民。他们组成一千多个毛泽东思想宣传队，深入到城镇街道，广泛向居民宣传毛主席最新指示，大大推动了街道居民活学活用毛主席著作的群众运动，促进了广大居民的思想革命化。"},{"type":"paragraph","text":"广大指战员在深入街道开展爱民活动时，处处以英雄四排和李文忠同志为榜样，把宣传毛泽东思想放在大于一切、先于一切、高于一切、重于一切的地位。住在那里，就把活学活用毛主席著作的空气搞得浓浓的。街道居民多是老人、小孩和家庭妇女，由于家务牵连，许多人抽不出身来参加学习，有的因受资产阶级、小资产阶级派性的影响，坐不到一块。针对这些情况，指战员们便亲自深入到居民的院里和家里，向他们宣传毛主席的最新指示，做艰苦细致的思想工作，并帮助他们妥善安排好家务，因地制宜办好适合街道居民参加的学习班，使更多的老人和家庭妇女能够参加学习。指战员们说：只要能让毛泽东思想占领每一寸土地，统帅每一个家庭，我们再劳累也心甘情愿。"},{"type":"paragraph","text":"在宣传中，指战员们针对居民存在的各种现实活思想，反复宣传毛主席的最新指示，扎扎实实地引导居民活学活用毛主席著作，在用字上狠下功夫，象李文忠同志那样，做到“毛主席热爱我热爱，毛主席支持我支持，毛主席指示我照办，毛主席挥手我前进。”有的家庭妇女，过去顾家多，学习少，很少参加社会活动，脑子里“私”字较多。处理问题，看待事物往往局限在家庭和个人的小圈子里。指战员们就帮助她们带着问题活学活用毛主席著作，开展斗私批修，从根本上提高觉悟。家庭妇女秦红文的丈夫是汽车队长，文化大革命初期群众给他贴了一些大字报，秦红文思想不通，就扯丈夫的后腿，不让他当干部。宣传队了解到这个情况，就和她一起学习毛主席的光辉著作"},{"type":"paragraph","text":"“老三篇”和最新指示，学习英雄四排和李文忠同志的事迹，一起破私立公，批判中国赫鲁晓夫，使她提高了认识。秦红文积极支持丈夫的工作，并主动帮助丈夫斗私批修，勇敢地站到群众斗争的行列中。"},{"type":"paragraph","text":"毛主席说：“我们应该深刻地注意群众生活的问题，从土地、劳动问题，到柴米油盐问题。”指战员们遵照毛主席的教导，在大力宣传毛泽东思想的同时，满腔热情地帮助人民群众解决各种困难。许多群众抓革命、促生产，忘我地工作，家务事顾不上管。他们就热情帮助这些群众修墙掏炕、挑水扫院，安排家务；有些群众生病，就派出医务人员治疗。六十多岁的李大娘儿子女儿都在外面工作，独身一人在家，宣传队的魏素芳经常去探望。大娘家缺煤烧，她就借小推车帮助大娘买煤。李大娘热泪盈眶地望着毛主席像激动地说：“爹亲娘亲不如毛主席亲，河深海深不如解放军对俺们感情深。”"},{"type":"paragraph","text":"在爱民活动中，广大指战员还象李文忠同志那样，虚心地向人民群众学习，老老实实地做群众的小学生。他们请老人忆旧社会的苦，思新社会的甜，请街道学习毛主席著作积极分子作斗私批修报告，广泛向群众学习好思想、好经验、好作风，大大增强了对伟大领袖毛主席和伟大的毛泽东思想无限热爱、无限信仰、无限崇拜、无限忠诚的深厚阶级感情，推动了部队活学活用毛主席著作的群众运动，加强了思想革命化建设。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"派性","type":"主题/事件"},{"name":"军队支左","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7dd3752924"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
