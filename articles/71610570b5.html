<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"“精神食粮”漫议——京剧《刑场上的婚礼》再度公演有感","authors":["史毅"],"dates":[{"year":1981,"month":7,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"史毅"},{"type":"paragraph","text":"文艺工作者应该向人民群众提供什么样的精神食粮?在纪念建党六十周年之际，看了上海京剧团再度公演的《刑场上的婚礼》，我又一次想起这个问题。"},{"type":"paragraph","text":"人和动物的一个重要区别，就是有思想、有感情、有精神生活。党的六中全会号召我们:把我们的国家逐步建设成为现代化的、高度民主的、高度文明的社会主义强国。这也向文艺工作提出了更高的要求。文艺既然是精神食粮，就应该以对四化起什么作用为衡量优劣的重要标准。京剧《刑场上的婚礼》，好就好在真实地再现了党领导的广州起义这一段英勇悲壮的历史，通过周文雍、陈铁军两位革命先烈纯真、高尚的爱情，歌颂了共产党人的心灵美。它能给人们以革命传统教育和共产主义人生观的教育。在近年来的京剧舞台上，这样的戏实在是凤毛麟角，因此显得格外可贵。"},{"type":"paragraph","text":"作为精神食粮，应该尽量多样化，切忌单调、贫乏。但也不能不考虑用什么思想、情操去影响、陶冶人民。我们反对“题材决定论”，并不是说题材毫无意义。事实上，不同题材所包含的思想容量，往往是大不相同的。《刑场上的婚礼》所表现的共产党人的心灵美，恐怕古代题材就难以表现，它对于恢复党的光辉形象、鼓舞人民征服前进道路上的困难，是很有现实意义的。在搞古装戏的同时，不断编演一些好的现代戏，对满足群众需要、对剧种的发展，不是都有好处吗?"},{"type":"paragraph","text":"就精神食粮来说，应该既有营养，又为人们所喜爱、乐于接受，这就要力求做到思想性和艺术性的统一。枯燥无味，人们便会敬谢不敏。《刑场上的婚礼》在表现共产党人的高尚品质时，注意以情动人；整出戏发挥了京剧艺术的特长，灯光、布景既符合特定的环境气氛，又富有一种诗的意境；同时，还大胆地采用了流派唱腔，脍炙人口，酣畅淋漓，使许多老京剧迷也为之陶醉。在艺术上，是否新颖，是否有独创性，直接关系到作品的客观效果。我们应该提倡打破老框框，进行新的探索。"},{"type":"paragraph","text":"精神食粮要受到人们的欢迎，必须下苦功夫，精工细做。《刑场上的婚礼》在初演时就得到好评，以后又不断进行了加工，这种精神应该发扬。我们要象邓小平同志要求的那样，“力戒粗制滥造”，“力求把最好的精神食粮贡献给人民”。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"71610570b5"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
