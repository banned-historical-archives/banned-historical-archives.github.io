rt":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"听毛主席的话党叫干啥就干啥——张永安生前日记摘抄","authors":[],"parts":[{"type":"paragraph","text":"一个革命者，战斗岗位可以变，忠于毛主席的一颗红心永不变！我要做一颗革命的良种，毛主席把我撒在那里，我就在那里开花、结果。"},{"type":"paragraph","text":"（一九六八年三月）"},{"type":"paragraph","text":"一个革命战士，无论作什么工作，都是为人民服务的。党叫干啥就干啥，党叫干啥就干好啥，干一行爱一行。"},{"type":"paragraph","text":"（一九六六年八月十九日）"},{"type":"paragraph","text":"毛主席啊，毛主席！我一定听您老人家的安排，回到农村去，把自己的青春献给社会主义的新农村！"},{"type":"paragraph","text":"（一九六八年三月十五日）"},{"type":"paragraph","text":"农村这个大学校是能锻炼人的。现在是党和人民考验我们的时候，我坚决紧跟伟大领袖毛主席的伟大战略部署，回到农业第一线去。"},{"type":"paragraph","text":"（一九六八年三月初）"},{"type":"paragraph","text":"我要立志在农业战线上当一名尖兵。"},{"type":"paragraph","text":"（一九六八年三月）"}],"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6d61009982"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
