<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"发动群众深入批判修正主义教育路线川沙县革委会积极做好毕业生工作全县近六千名高初中毕业生愉快地走上了农业生产第一线","authors":[],"dates":[{"year":1968,"month":8,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　在毛主席最新指示的巨大鼓舞下，川沙县革委会在狠抓对敌斗争和精兵简政的同时，积极做好六六届高初中毕业生工作。目前，全县四十多所中学，近六千名六六届家住农村的高初中毕业生愉快地走上了农业生产第一线。"},{"type":"paragraph","text":"县革委会认识到，六六届高初中毕业生分配工作，绝不是单纯的毕业分配，就业安排，而是一项严肃的政治任务。在无产阶级文化大革命中，第一次动员这样多的知识青年走与工农相结合的革命大道，这是夺取和巩固文化大革命全面胜利的需要，这是培养无产阶级革命事业接班人的需要，这是反修防修的百年大计。县革委会专门召开常委会，研究毕业生分配工作。他们首先学习毛主席关于知识分子与工分招结合和无产阶级革命事业接班人的条件等一系列伟大指示。在统一思想认识基础上，召开各公社(镇)革委会负责人会议，反复强调做好毕业生分配工作的重要性和贯彻“四个面向”的伟大战略意义。毕业生工作在一段时期内纳入县革委会日常工作，由一名县革委会常委负责。各公社、大队也把分配、接收毕业生工作看作是执行毛主席革命路线的一件大事。有的公社革委会的负责同志还向毕业生谈形势，讲家史，亲自参加毕业生分配、接收工作。"},{"type":"paragraph","text":"动员大批毕业生下乡上山，这是一场深刻的社会大革命，也是一场思想大革命，必须最广泛地发动群众来做好这项工作。他们一方面发动革命师生，组成毛泽东思想宣传小分队到公社(镇)、生产队宣传以毛主席为首的无产阶级司令部的指示，另一方面动员县级机关所属的各革命群众组织协助做好毕业生的分配工作。"},{"type":"paragraph","text":"他们在六六届高初中毕业生的分配工作中突出无产阶级政治，狠抓根本，以毛泽东思想为武器，狠抓毕业生的思想政治教育，狠抓革命的大批判，使广大毕业生坚持下乡上山的革命大方向，坚定走与工农相结合的道路。他们采取了“三抓”:一是狠抓大办办好毕业生下乡上山毛泽东思想学习班，县里办，学校办。在学习班里，以走资派为活靶子，对修正主义教育路线开展大批判，学习毛主席关于知识青年与工农相结合的一系列指示，提高广大毕业生两个阶级、两条道路、两条路线斗争的觉悟。有的学校还把学习班办到生产队，拜贫下中农为师，请贫下中农讲“三史”，对毕业生进行活生生的阶级教育，使许多毕业生认识到，贫下中农子女回农村生产是“归队”，是革命，不愿意回生产队务农是忘本，是不革命的开始。二是树典型。他们分别树立了落户数年的知识青年、在下乡上山中表现好的毕业生、革命家长等典型。通过宣传他们无限忠于毛主席，坚持下乡上山革命大方向的先进思想，来做好广大毕业生的思想政治工作。三是坚持负责到底的精神，要求各校抓好已回生产队的毕业生的思想工作。如浦东中学革委会组织十个毛泽东思想宣传小分队到川沙、上海两县六个公社二十三个生产队进行访问，了解毕业生安排落实情况，并与当地有关部门一起解决毕业生的困难，深入细致地做好回队毕业生的思想工作，使他们坚定一辈子在农村干革命的信心。"},{"type":"paragraph","text":"川沙县已回生产队的近六千名六六届高初中毕业生，他们已迈开了与工农相结合的第一步。他们表示:立志为无产阶级铁打江山永不变色终身滚泥巴，誓把社会主义新农村建成红彤彤的毛泽东思想大学校，一辈子在农村干革命。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8bf181deb5"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
