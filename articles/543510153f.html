uthors":[],"dates":[{"year":1980,"month":7,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"为集体经济恢复名誉"},{"type":"paragraph","text":"陈伟达说，要继续批判“公有化程度越高越革命”的极左观点"},{"type":"paragraph","text":"据新华社天津7月5日电  中共天津市委第一书记陈伟达就市委最近作出大力发展城市集体经济、安置待业青年的决定对新华社记者发表谈话。"},{"type":"paragraph","text":"陈伟达同志说：要把这个决定落实好，需要做很多艰苦细致的工作。重要的一项，就是继续批判那种认为社会主义公有化程度越高越革命、越高越先进的极左观点，要确认集体经济是社会主义经济结构中必不可少的组成部分，要为集体经济恢复名誉。"},{"type":"paragraph","text":"陈伟达同志说，生产关系必须和生产力发展的水平相适应，这是马克思主义的一条基本原理。林彪、“四人帮”背叛马克思主义，不仅在农村搞超越生产力发展水平的“穷过渡”，破坏农业生产，在城市，也把集体所有制经济当作“资本主义的尾巴”，大批大砍，大搞所谓“升级”、“过渡”，商业、饮食业和服务业网点被大批撤销、合并，给人民生活带来很多困难，使集体经济受到严重摧残。"},{"type":"paragraph","text":"他说，林彪、“四人帮”的这种极左路线虽然受到了批判，但其流毒至今还没有肃清，仍然有些“条条”、“框框”束缚着城市集体经济的发展。我们应该明确地认识到，集体所有制的经济是社会主义性质的经济，它和资本主义经济没有丝毫的必然联系。在我国生产力水平较低，商品生产不够发展的情况下，社会主义全民所有制经济和集体所有制经济将长期并存。大力加强集体经济只会进一步发展商品生产和商品流通，决不会发展资本主义。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"林彪","type":"人物"},{"name":"四人帮","type":"人物"},{"name":"天津文革","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"543510153f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
