script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"极左阴魂不散  “毁瓜事件”不断  石家庄地委下决心轮训各级干部，学习文件，联系实际批判极左路线，进行党的政策再教育","authors":["侯志义","赵德润"],"dates":[{"year":1979,"month":11,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"极左阴魂不散  “毁瓜事件”不断"},{"type":"paragraph","text":"石家庄地委下决心轮训各级干部，学习文件，联系实际批判极左路线，进行党的政策再教育"},{"type":"paragraph","text":"新华社石家庄十一月二十三日电  中共河北省石家庄地委从十月下旬开始，在全区层层举办训练班，组织各级领导干部联系实际，学习中央关于发展农业的两个文件，批判极左路线，进行一次党的政策的再教育。干部群众称赞说：这回抓到点子上了！"},{"type":"paragraph","text":"地委的决定是在这样的背景下产生的：今年七月，报上刊登正定县留村公社党委书记强令生产队毁瓜的事件后，在全国各地引起强烈反响。地委为此向全区发过通报，但是，最近一个时期，类似毁瓜的事件仍然不断发生，大有“一波未平，一波又起”之势。"},{"type":"paragraph","text":"例如，八月中旬，正定县韩家楼公社高平大队，因雨后街道泥泞，陷住了两名县委领导乘坐的吉普车。大队党支部怕挨批评，擅自做出“整修村容，加宽街道”的决定，强令砍掉社员房前屋后树木六百七十七棵，拆毁沿街社员的院墙、猪圈、厕所，涉及一百五十七户。闹得全村鸡犬不宁，民怨沸腾。又例如，晋县化肥厂为了扩建厂房，并没有办理征用土地的任何手续，只凭地委负责人的一句话，就强行占用生产队的耕地，动手砍掉生产队五亩即将成熟的玉米；这个县的田村公社西旺大队党支部书记还因自家的狗被打死，竟私设公堂，以“打狗欺主，破坏治安”的罪名，对打狗的青年社员进行严刑拷打，并罚款三百多元，引起当地社员的公愤。类似事件在灵寿、元氏、藁城、无极等县接二连三地发生：有的公社和大队干部依仗职权，以“不听招呼”、“不服从一元化领导”为名，无理撤换经社员民主选举的生产队长；有的为追求种麦进度，应付上级参观检查，强迫生产队把尚未成熟的玉米、正在吐絮收花的棉田毁掉，把还在收打粮食的场地犁掉。在全国农业现代化试点县栾城县，城关公社赵李庄大队党支部书记居然不同干部群众商量，擅自解散大队科研组，一把火烧了这个小组积累多年的全部科研资料。这个小组是全省农业科研的先进单位，他们因为在科学试验中坚持了不同意见，也以所谓“不听招呼”而受到惩罚。"},{"type":"paragraph","text":"这一桩桩破坏党的政策的事件，引起地委领导干部的关注。他们分析出现这些问题的原因，寻找解决的办法。他们通过解剖典型事例，倾听干部群众的议论，从中得到有益的启示：重要的问题是，贯彻党中央关于发展农业的两个文件，只是说在口头上，而在实际上并没有得到认真的执行，只满足于自上而下地宣读一遍，空洞地议论一番，并没有联系实际认真讨论。其结果，正象群众所说的那样：“不是政策当着干部的家，而是干部当着政策的家，干部说啥就是啥！”"},{"type":"paragraph","text":"为什么许多明显的错误得不到及时纠正，有些虽然纠正了但也没有吸取教训？一些干部和群众认为，这和石家庄地区不少干部的思想上背着粮食高产的包袱有关。粉碎“四人帮”以后，这个地区一些干部中还流传着这样的说法：“林彪、‘四人帮’横行时期，石家庄地区粮食持续增产，成为北方地区有名的粮食高产地区，俺们是跟林彪、‘四人帮’对着干的！”他们闭眼不看这样的事实：从一九七一年到一九七六年，石家庄地区粮食总产虽然增加了百分之三十八，而棉花产量却减少了百分之五十八，油料产量减少了百分之二十二。农业内部比例严重失调。"},{"type":"paragraph","text":"地委领导干部通过调查分析，看到了自己思想和工作上的差距。他们总结了两个不够，一是对林彪、“四人帮”极左路线的流毒和影响估计不足、批判不够，正象群众所说的：极左阴魂不散，“毁瓜事件”不断；二是对干部学习党的方针政策抓得不够，党中央有关发展农业的方针政策还没有在干部思想中生根。他们认为，在这“两个不够”还没有认识和解决的情况下，光靠派工作组，发通报的办法解决“毁瓜事件”，只能是按下葫芦浮起瓢。于是，地委下决心在全区层层举办训练班，对各级干部普遍来一次轮训，以便让他们坐下来认真地学好文件，联系实际，总结经验，补好真理标准讨论这一课，既看到产生“毁瓜事件”的根源，又掌握起同“毁瓜”行为作斗争的武器。"},{"type":"paragraph","text":"目前，地委举办的首期训练班已经开学，各县、社自行筹办的训练班有的已经开学，有的正在积极地筹划中。"},{"type":"paragraph","text":"新华社记者  侯志义  赵德润"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"林彪","type":"人物"},{"name":"四人帮","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6184e6a365"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
