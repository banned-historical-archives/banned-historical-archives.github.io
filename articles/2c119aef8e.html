uthors":[],"dates":[{"year":1967,"month":2,"day":6}],"is_range_date":false,"parts":[{"text":"国务院、中央军委向内蒙各方发出的特急明码电报","type":"title"},{"text":"内蒙古自治区党委、内蒙古军区、呼市三司和呼市红卫军（均请军区转）：","type":"appellation"},{"text":"在内蒙古军区发生的事件，应该立即停止，事态不要扩大。请内蒙古自治区党委、内蒙古军区、呼市三司和呼市红卫军四方面各派3-5名代表来北京商谈解决。我们于2月6日派飞机来呼市接你们的代表。","type":"paragraph"},{"text":"据悉，军区周围有一师范学院同学中弹致死，如确，应严追凶手和指挥者，查出后应予法办，并向死者家属致唁和予以抚恤。","type":"paragraph"},{"text":" 国务院中央军委1967年2月6日","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"内蒙古文革","type":"人物"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2c119aef8e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
