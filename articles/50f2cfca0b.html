art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"永远跟着毛主席〔朗诵诗〕","authors":["大庆职工/家属业余演出队"],"parts":[{"type":"paragraph","text":"毛主席说：工人以工为主，也要兼学军事、政治、文化。也要搞社会主义教育运动，也要批判资产阶级。在有条件的地方，也要从事农副业生产，例如大庆油田那样。是毛泽东思想——给我们指出了前进的方向；是毛泽东思想——把我们石油工人武装；是毛泽东思想——给了我们无穷的力量；是毛泽东思想——哺育我们不断成长。大庆油田的胜利，都闪烁着毛泽东思想的光芒。"},{"type":"paragraph","text":"石油工人每前进一步，"},{"type":"paragraph","text":"都是党给我们的力量。"},{"type":"paragraph","text":"大庆，是党的大庆；"},{"type":"paragraph","text":"大庆，是全国人民的大庆！"},{"type":"paragraph","text":"永远跟着毛主席，"},{"type":"paragraph","text":"永远跟着共产党，"},{"type":"paragraph","text":"刀山敢上，火海敢闯！"},{"type":"paragraph","text":"自力更生，奋发图强，"},{"type":"paragraph","text":"石油工人，把毛主席的教导牢记心上。"},{"type":"paragraph","text":"为人民争气，"},{"type":"paragraph","text":"为祖国争光，"},{"type":"paragraph","text":"脚踏大油田，"},{"type":"paragraph","text":"为世界革命贡献力量。"},{"type":"paragraph","text":"四海翻腾云水怒，"},{"type":"paragraph","text":"五洲震荡风雷激。"},{"type":"paragraph","text":"要扫除一切害人虫，"},{"type":"paragraph","text":"全无敌！"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"50f2cfca0b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
