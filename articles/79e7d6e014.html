ar":1950,"month":6,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"翻身儿童不忘毛主席"},{"type":"paragraph","text":"毕耀彩"},{"type":"paragraph","text":"亲爱的毛主席，"},{"type":"paragraph","text":"现在俺要告诉你："},{"type":"paragraph","text":"俺们原是受苦的人，"},{"type":"paragraph","text":"没房又没地，"},{"type":"paragraph","text":"还受地主气。"},{"type":"paragraph","text":"俺爸爸扛长活，"},{"type":"paragraph","text":"俺娘领我要饭去。"},{"type":"paragraph","text":"你领导俺们农民把身翻，"},{"type":"paragraph","text":"俺们分了瓦房五大间，"},{"type":"paragraph","text":"土地分了十三亩七，"},{"type":"paragraph","text":"另外还有一架织布机，"},{"type":"paragraph","text":"粮食分了五石七，"},{"type":"paragraph","text":"还分了家具和农具。"},{"type":"paragraph","text":"从此努力生产不愁喝和吃，"},{"type":"paragraph","text":"读书认字我上学去。"},{"type":"paragraph","text":"翻身的儿童不忘毛主席，"},{"type":"paragraph","text":"让俺在“人民园地”上谢谢你！"},{"type":"paragraph","text":"俺们翻身真高兴，"},{"type":"paragraph","text":"响应号召大生产。"},{"type":"paragraph","text":"俺们种了八亩棉，"},{"type":"paragraph","text":"高粱、豆子五亩七，"},{"type":"paragraph","text":"副业全凭织布机，"},{"type":"paragraph","text":"另外养猪又养鸡。"},{"type":"paragraph","text":"俺爸爸说："},{"type":"paragraph","text":"没有毛主席，"},{"type":"paragraph","text":"俺们那来织布机？"},{"type":"paragraph","text":"俺娘说："},{"type":"paragraph","text":"没有毛主席，"},{"type":"paragraph","text":"俺们那能穿上新布衣？"},{"type":"paragraph","text":"翻身的儿童真高兴，"},{"type":"paragraph","text":"翻身的儿童真喜欢；"},{"type":"paragraph","text":"喜欢了，怎么办？"},{"type":"paragraph","text":"努力学习争模范，"},{"type":"paragraph","text":"学好本领为人民，"},{"type":"paragraph","text":"准备参加儿童团。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"79e7d6e014"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
