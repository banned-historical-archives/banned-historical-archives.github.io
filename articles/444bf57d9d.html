script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"市青年宫举办“学习鲁迅革命精神，痛击右倾翻案风”故事诗歌朗诵会","authors":[],"dates":[{"year":1976,"month":6,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"为了发扬鲁迅的革命精神，市青年宫最近举行了“学习鲁迅革命精神，痛击右倾翻案风”故事诗歌朗诵会。"},{"type":"paragraph","text":"这次故事诗歌朗诵会由业余文艺爱好者和专业文艺工作者同台表演。他们首先朗诵了鲁迅的《自题小像》、《自嘲》、《无题——万家墨面没蒿莱》等三首诗和描写鲁迅斗争生活的《痛打落水狗》、《病中战斗》两则故事，这些作品反映了鲁迅勇于斗争的革命精神。青年们聆听鲁迅的战斗诗篇，从中受到了一次深刻的教育。"},{"type":"paragraph","text":"会上，青年们还朗诵了自己创作的一组诗歌，这些诗歌从各个侧面歌颂了鲁迅光辉战斗的一生，同时也表达了革命青年“学习鲁迅，永远进击”的坚强决心。鲁迅“不怕污蔑，不怕逮捕，不怕坐牢，不怕杀头”的大无畏革命精神，使到会的青年受到了深刻的教育，他们纷纷表示要努力读点鲁迅著作，继承和发扬鲁迅的彻底革命精神，以阶级斗争为纲，乘胜前进，把无产阶级专政下的继续革命进行到底。"},{"type":"paragraph","text":"本报通讯　员"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"444bf57d9d"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
