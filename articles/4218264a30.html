届大专院校毕业生到崇明插队落户","authors":[],"dates":[{"year":1968,"month":12,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　本市三百多名一九六八届大专院校毕业生，遵循毛主席“知识青年到农村去，接受贫下中农的再教育，很有必要”的伟大教导，昨天乘坐伟大领袖毛主席在一九五三年亲自视察过的舰艇，奔赴崇明农村插队落户，立志为农村的社会主义革命和社会主义建设贡献自己的青春，昨天早上，浦江码头上高悬着欢送六八届大专院校毕业生到农村去的大幅标语，许多学校的工宣队、军宣队和红卫兵小将纷纷赶到码头欢送插队落户的大学生。“到农村去，接受贫下中农的再教育!”“听毛主席的话，走插队落户的道路!”“毛主席万岁!万万岁!”的口号声响彻浦江上空。奔赴崇明农村的上海师范学院、华东师范大学、复旦大学的三百多名毕业生，高擎伟大领袖毛主席的宝像，手捧红彤彤的《毛主席语录》，心怀对伟大领袖毛主席的赤胆忠心，聚集在市革委会门口的毛主席塑像前庄严宣誓:决心认真接受贫下中农再教育，彻底改变旧思想。"},{"type":"paragraph","text":"在工人毛泽东思想宣传队的领导下，本市大专院校应届毕业生普遍举办了毛泽东思想学习班，认真学习了毛主席《青年运动的方向》等著作，并以党的八届十二中全会公报为动力，深入开展两条路线斗争史的学习，政治觉悟有了很大提高。在学习班上，广大毕业生愤怒批判了刘少奇的“读书做官论”、“下乡镀金论”和“三重三轻”(重工业轻农业、重城市轻农村、重沿海轻内地)等反革命修正主义思想，进一步认识到响应无产阶级司令部“四个面向”的号召，接受工农兵再教育的重大意义。他们说，伟大领袖毛主席关于“知识青年到农村去，接受贫下中农的再教育”的教导，是对我们青年一代最大的关怀，最大的爱护，是使我们党不变修、国不变色、人不变质的重大措施。广大毕业生纷纷向毛主席表决心，献忠心，决心到农村去，走插队落户的道路。"},{"type":"paragraph","text":"当插队落户的大学生来到崇明时，受到当地贫下中农的热烈欢迎。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4218264a30"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
