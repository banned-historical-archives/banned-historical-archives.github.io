tart":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"以最高的自觉学好毛主席著作","authors":["学习毛主席著作积极分子/济南部队某医院放射科副主任王长阁"],"parts":[{"type":"paragraph","text":"林彪同志向全军发出把活学活用毛主席著作的群众运动提高到一个新阶段的号召，是“及时雨”，是新的动员令，是推动我们把毛泽东思想真正学到手的巨大动力。我们最坚决、最热烈地拥护和响应这一号召。"},{"type":"paragraph","text":"我的每一点微小进步，都是毛泽东思想哺育的结果。刚入伍时，领导上分配我做X光透视工作。由于自己怕X射线影响身体健康，曾一度闹情绪，不想干。领导上启发我学习《为人民服务》。毛主席说：“我们这个队伍完全是为着解放人民的，是彻底地为人民的利益工作的。”这段话，我越读越感到亲切，字字句句说到我的心坎上。从此我下定决心，努力读毛主席的书，自觉地改造思想，克服私心杂念，树立“完全”、“彻底”为人民服务的思想。阶级觉悟提高了，革命干劲就大了，对工作也有感情了。过去一进X光室就皱眉头，以后整天蹲在黑屋里也觉得愉快。我还注意把毛泽东思想贯彻到自己的诊断工作中，运用辩证法，打破洋教条、洋框框，摸索出了一些诊断工作的新规章。"},{"type":"paragraph","text":"现在，林彪同志号召我们，要把活学活用毛主席著作提高到一个新的水平，我一定要以最大的决心、最高的自觉、最深厚的阶级感情，更好地结合思想，结合工作，反复学，反复用，真正把毛泽东思想印在脑子里，溶化在血液中，落实在行动上。加强思想革命化，永远高举毛泽东思想伟大红旗，革命到底。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7f9740ebe2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
