ors":[],"dates":[{"year":1961,"month":11,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京十六日电】　人民解放军总政治部宣传部遵照林彪元帅的指示，为广大战士编印了一部《毛泽东著作选读》，陆续发给全军各个连队。"},{"type":"paragraph","text":"这个选本，从战士的实际需要出发，适应战士急用先学、有重点地学的学习要求，大部分选自《毛泽东选集》第一卷到第四卷，一小部分选自《关于正确处理人民内部矛盾的问题》。全书共十二篇又十节，内容精干，重点鲜明，照顾了战士的阅读能力和学习时间，便于战士活学活用。"},{"type":"paragraph","text":"《毛泽东著作选读》发到连队后，受到广大战士的热烈欢迎。这一选本的编发，对于推动全军战士进一步学习毛泽东著作，对于用毛泽东思想武装全军战士的头脑，对于创造四好连队提高全军的战斗力，都将产生很大作用。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"人民内部矛盾","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2fd1d313ee"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
