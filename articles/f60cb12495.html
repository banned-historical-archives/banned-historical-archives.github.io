题简报","authors":[],"dates":[{"year":1959,"month":5,"day":27}],"is_range_date":false,"parts":[{"text":"四川省西昌地委关于各县基层财贸干部贪污问题简报","type":"title"},{"text":"……（上缺）进行彻底算账，否则不仅国家财产将遭受巨大损失，而且将毁掉一大批干部，同时也将严重损害党和群众的密切联系。","type":"paragraph"},{"text":"关于会理县试点经验待五月底结束后再详细专题报省委。","type":"paragraph"},{"text":"另外县的五级扩干会上，安理、德昌两县各发生一起自杀事件。五月十六日会理县集训财贸干部王焕芳畏罪投井自杀，王自杀前系红旗公社营业员，在算账会上自动交代贪污449元，但交代后表现思想紧张，领导去找她谈过八字话，主要是进行思想启发，但她对党的政策怀疑很大，怕将来受处分，丢了面子见不得人，因而畏罪自杀。据了解，会理县扩干会上，没硬性追迫过她，多次主动坦白交代。王现年二十七岁，解放前曾参加基督教，并是其中的骨干分子，曾吸收一人入教。","type":"paragraph"},{"text":"德昌县五一公社一个食堂事务长杨朝文，男，现年四十一岁，在扩干会上未列为重点，未在会上追过他，经支书和大队长个别谈过话，主动交代贪污二十多元，社员检举贪污七十多元未承认。五月十日晚上，扩干会结束以前，清早约五时，一人偷摸在一个庙子内跳井自杀。据摸底贪污约三百元左右。杨解放前是惯偷，吸食大烟，曾当伪甲长，公社化后当事务长有贪污，群众意见较大，这次扩干会结束后，他怕在群众中交代，畏罪自杀。","type":"paragraph"},{"text":"上述两起自杀案件发生以后，地委即刻指示各县，不谁硬性追逼，并在五月十八日县书会议上作了强调、布置，现各县运动进展正常，没有类似事件发生。（下缺）","type":"paragraph"}],"comments":[],"origin":"四川省某档案馆","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f60cb12495"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
