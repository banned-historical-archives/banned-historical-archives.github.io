"authors":["刘东耕","顾国璞"],"dates":[{"year":1984,"month":12,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"彻底否定“文革”  解决“三支两军”遗留问题"},{"type":"paragraph","text":"南京军区党委带头搞好军政军民团结"},{"type":"paragraph","text":"新华社南京12月18日电　（记者顾国璞、刘东耕）南京军区党委在整党中从大局出发，积极认真地解决妨碍军政军民团结的“文化大革命”遗留问题，使军政军民之间出现了互相体谅，同心协力搞四化的新局面。"},{"type":"paragraph","text":"通过整党进一步密切军政军民关系，这是南京军区党委在整党中十分重视的一个问题。近年来，南京军区驻江苏省部队通过军民共建社会主义精神文明等活动，促进了军政军民团结。但由于部队和地方一部分同志对“文革”期间南京军区在江苏省执行“三支两军”任务时遗留的一些重大问题认识没有统一，妨碍军政军民在新形势下的团结。南京军区党委在整党的对照检查和彻底否定“文化大革命”教育阶段，抓住这些重大问题统一思想。军区司令员向守志、政治委员郭林祥等七位领导同志还主动到地方走访，向中共江苏省委、省政府和中共南京市委、市政府通报了军区党委和机关整党的情况，并着重检查了南京军区在江苏“支左”中支派、所谓清查“五·一六”和执行“左”的路线，将几十万城市居民和干部下放农村等错误，表示一定要深刻记取这些教训，并请地方领导同志向因“三支两军”错误而受到伤害的干部和群众转达他们的歉意。"},{"type":"paragraph","text":"南京军区领导同志这种勇于自我批评的精神，使江苏省和南京市的领导同志很受感动。他们说，部队从彻底否定“文化大革命”的高度，分析和解决“三支两军”遗留下来的重大问题，为我们做出了榜样。我们相信，通过整党消除了“文化大革命”造成的隔阂，军政军民团结一定能发展到一个新的水平。在这同时，军政双方研究了深入开展军民共建社会主义物质文明和精神文明的问题。南京军区领导同志提出，要投入更多的力量，大力支持地方经济建设。省、市领导同志表示，要进一步从人力、财力、智力上帮助部队搞好现代化建设。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"江苏文革","type":"人物"},{"name":"三支两军","type":"主题/事件"},{"name":"清查五·一六","type":"主题/事件"},{"name":"军队支左","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"95ff8f5fb0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
