rt":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"掌握理论武器批判修正主义路线实质","authors":[],"parts":[{"type":"paragraph","text":"本报讯 沈阳部队某团党委在批判刘少奇一类骗子散布的所谓“民富国强”反动谬论时，开始有的同志对这种谬论的实质认识不深。党委组织大家反复学习马克思的《哥达纲领批判》，弄通马克思主义关于社会产品分配的原理，对刘少奇一类骗子反动谬论的实质有了比较清楚的认识。"},{"type":"paragraph","text":"第一次学习时，他们着重领会了书中关于“消费资料的任何一种分配，都不过是生产条件本身分配的结果”的论述，认识到，在资本主义条件下，生产资料为资本家所占有，这是无产阶级和劳动人民贫困的根源。拉萨尔所说的“不折不扣的劳动所得”是根本不存在的，只不过是对劳动人民的一种欺骗。"},{"type":"paragraph","text":"这时，有的同志提出，在社会主义条件下，生产资料是全民和集体所有，拉萨尔的“不折不扣的劳动所得”能不能实行？他们又一次学习了《哥达纲领批判》中关于社会总产品中应该“扣除”六个部分的论述，学习了毛主席有关兼顾国家、集体和个人之间的利益，正确处理好三者关系的教导。着重弄清社会主义社会和资本主义社会两种积累的区别，明确了社会主义社会的积累是靠全国人民努力增产、勤俭节约，是为了加强无产阶级专政的经济基础，逐步提高人民生活水平，并且支援世界人民的革命斗争。因此，拉萨尔的谬论，在社会主义条件下同样是不可能实行的，也是十分反动的。叛徒、内奸、工贼刘少奇鼓吹什么“多分一点”、“多拿一点”，刘少奇一类骗子叫嚣什么“民富国强”，都是拉萨尔这种谬论的翻版。他们鼓吹这种谬论，就是阴谋取消社会主义积累，挖社会主义的墙脚，妄图破坏无产阶级专政的经济基础。"},{"type":"paragraph","text":"为了进一步认清刘少奇一类骗子鼓吹“民富国强”等反动谬论的实质，他们第三次学习了《哥达纲领批判》，深刻领会书中关于过渡时期的国家“只能是无产阶级的革命专政”的论述，对刘少奇一类骗子鼓吹“民富国强”的“民”和“国”进行阶级分析。认识别他们鼓吹这种谬论，其罪恶目的就是企图为地主资产阶级搞反攻倒算，把生产资料的全民所有制和集体所有制变成地主资本家的私有制，把毛主席领导下我党我军我国人民亲手打倒的地主资产阶级再扶植起来，实行地主买办资产阶级的法西斯专政。"},{"type":"paragraph","text":"经过反复学习以后，党委成员分别下到各个连队，用自己反复攻读马列原著，抓住修正主义路线实质深入批判的心得体会帮助干部，推动了部队批修整风的深入发展。"}],"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ee113c1c27"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
