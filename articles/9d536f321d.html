ical-archives/banned-historical-archives0/main/maoquanji50.pdf"],"article":{"title":"同意印发批判王明投降主义的讲话大纲的批语","alias":"","parts":[{"type":"paragraph","text":"同意印发批判王明投降主义的"},{"type":"paragraph","text":"讲话大纲的批语!"},{"type":"paragraph","text":"（1970年2月4日）康生同志："},{"type":"paragraph","text":"此件可以照你的意见办理。其中颂圣写成烦圣，请改正。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"1970年2月4日"},{"type":"paragraph","text":"[1]这是对中共中央政治局常委康生1970年1月30日写给毛泽东的请示报告的批语。康生在报告中说：“去年编毛选五卷时，我记起在一九四一年政治局九月会议时主席曾写了一个批判王明投降主义的讲话大纲。”“今年一月二十六日政治局会议上，我报告了这件事，各同志听说有这样一个大纲，一致要求印几份给政治局同志们看看。”“现在排了一份清样，送主席审阅，并请示是否印发政治局各同志一阅，希望得到主席的批准。”1941年，毛泽东针对王明在统一战线问题上的迁就倾向，曾写道：“不知迫蒋只知颂圣，提不出任务。”“不作阶级分析，全无列宁精神。”“群众原则，又妥协又斗争原则。”康生送审的讲话大纲上，将其中的“颂圣”印成“烦圣”，毛泽东审阅时作了改正。"}],"authors":["毛泽东"],"dates":[{"year":1970,"month":2,"day":4}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":516,"page_end":516},"tags":[{"name":"康生","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"王明","type":"人物"},{"type":"文稿类型","name":"发言"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9d536f321d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
