ical-archives/banned-historical-archives8/main/maoquanji10.pdf"],"article":{"title":"致周恩来电","alias":"","parts":[{"type":"paragraph","text":"致周恩来电！"},{"type":"paragraph","text":"（1937年3月11日）"},{"type":"paragraph","text":"请你估计此刻即去南京或牯岭与蒋介石直接谈判的可能性，现在问题非与蒋谈不能解决。如果承认贺衷寒所提各点?不但非常危险，而且过几天有可能连贺案亦被推翻，因此决不能同意。对外宣言，已有毛的谈话（允生?带上），党的宣言以暂缓为宜。"},{"type":"paragraph","text":"[1]这是毛泽东和洛甫（张闻天）关于和蒋介石直接谈判等问题致周恩来电的主要内容。"},{"type":"paragraph","text":"[2]指贺衷寒对1937年3月8日周恩来、叶剑英和顾祝同、贺衷寒、张冲商定的准备送蒋介石最后决定的提案所作的重大改动，亦称“贺案”。主要内容有：将“陕甘宁行政区”改为地方行政区，直属各省政府；裁减红军改编后的定员，三个师，两万七千人；将红军改编后“服从统一指挥”改为“服从一切命令”；不提在河西走廊停止进攻西路军。"},{"type":"paragraph","text":"[3]指毛泽东1937年3月1日和美国记者史沫特莱的谈话。"}],"authors":["毛泽东"],"dates":[{"year":1937,"month":3,"day":11}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":244,"page_end":244},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3d316f116a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
