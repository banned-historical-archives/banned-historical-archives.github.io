script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反对剥削、要求提高工资  美国罢工数目增加  电讯工人罢工已坚持一周有余","authors":[],"dates":[{"year":1950,"month":11,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反对剥削、要求提高工资"},{"type":"paragraph","text":"美国罢工数目增加"},{"type":"paragraph","text":"电讯工人罢工已坚持一周有余"},{"type":"paragraph","text":"【新华社二十一日讯】塔斯社纽约十八日讯：最近由于美国各部门工业中一般工会会员的发动，罢工的数目已经增加。工人罢工是为了反对资本家的加紧剥削，反对开除工会中积极分子和要求提高工资。十一月九日开始的全国三万三千电讯工人的罢工，已继续了一个多星期，他们要求大大增加工资，而拒绝接受冻结工资的原则。在费城，通用电力公司的五千名工人从十一月初起就罢工，抗议公司方面减少铝工场熔接工人的工资的企图。"},{"type":"paragraph","text":"在匹兹堡，威斯汀豪斯电气制造公司三千名左右的工人在继续罢工中。罢工是工人们对公司方面企图付女工工资少于男工的一个答复。在工厂雇用的一万六千名工人中，由大多数通过了在各工场内罢工的决议，迫使所谓国际电力与无线电工业工人工会的领导机关设法用谈判的方式解决争执。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"056cd6f85d"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
