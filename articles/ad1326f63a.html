族政策事件的通报","authors":[],"dates":[{"year":1950,"month":8,"day":8}],"is_range_date":false,"parts":[{"text":"云南省委关于保山地区发生违犯少数民族政策事件的通报","type":"title"},{"text":"XX团五连不经上级批准，擅进少数民族地区搜查武器，并吊打人及刁土司之母亲，这是一种极其严重的违犯少数民族政策的原则错误。这种行动是十分危险的，并且曾把少数民族弄翻，有利于帝国主义和匪特挑拨，增加我少数民族工作和边防的困难。省委曾三令五申：各边地少数民族应特别谨慎，并转中央六月十三日的指示，竟又发生如此严重的错误，足见地委和分区对少数民族的政策，在一切地方干部和军队中，进行教育是十分不够的。此事应切实检查有关各方，写出反省；其枪支武器如系土司的，即退还给土司，并切实补救与刁土司的关系，勿使与我对立及被人利用外；此事应在云南全党全军中进行教育，不得再重复此项行为。各地应根据中央六月十三日指示，切实检查少数民族的政策和工作。","type":"paragraph"}],"comments":[],"origin":"《西南工作》 第14期，中共中央西南局编印 （党内刊物发至县团）， 1950年9月6日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ad1326f63a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
