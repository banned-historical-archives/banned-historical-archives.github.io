art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"革命工人最听毛主席的话","authors":["陈殿国"],"parts":[{"type":"paragraph","text":"一声声春雷，一阵阵春风，"},{"type":"paragraph","text":"把咱工人的心意带到北京城。"},{"type":"paragraph","text":"大红的喜信双手捧，"},{"type":"paragraph","text":"一颗颗热泪在笑脸上滚动。"},{"type":"paragraph","text":"毛主席呵，您老人家的信俺看了无数遍，"},{"type":"paragraph","text":"一字一团火，句句千斤重。"},{"type":"paragraph","text":"句句话说到咱工人的心窝里，"},{"type":"paragraph","text":"句句话都是前进的指路灯。"},{"type":"paragraph","text":"革命工人最听毛主席的话，"},{"type":"paragraph","text":"心儿红似火，腰杆钢铁硬。"},{"type":"paragraph","text":"天塌下来顶得住，"},{"type":"paragraph","text":"地陷下去能填平。"},{"type":"paragraph","text":"咱工人阶级是顶梁柱，"},{"type":"paragraph","text":"为革命事业献红心。"},{"type":"paragraph","text":"抓革命，我们方向明，"},{"type":"paragraph","text":"火力猛，誓把修正主义老根挖净。"},{"type":"paragraph","text":"促生产，我们干劲足，打冲锋，"},{"type":"paragraph","text":"生产指标的红线天天向上升。"},{"type":"paragraph","text":"毛泽东思想伟大红旗高高举起，"},{"type":"paragraph","text":"大步走向共产主义的锦绣前程。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f59870b960"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
