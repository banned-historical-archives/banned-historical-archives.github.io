tart":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"彻底堵塞产生修正主义的渠道","authors":["广州警备区某部五好战士巢元成"],"parts":[{"type":"paragraph","text":"“世界上一切革命斗争都是为着夺取政权，巩固政权。”毛主席亲自发动和领导的无产阶级文化大革命，就是要粉碎资产阶级的猖狂进攻，捍卫工人阶级的领导地位，从而巩固和发展无产阶级专政。毛主席指出：无产阶级必须在上层建筑其中包括各个文化领域中对资产阶级实行全面的专政。“工人宣传队要在学校中长期留下去，参加学校中全部斗、批、改任务，并且永远领导学校。”这就清楚地说明了，工人阶级必须领导一切的核心问题，就是要全面实行、不断发展、永远巩固无产阶级专政。只有实现了无产阶级在上层建筑各个领域里的全面专政，才能真正地、彻底地堵塞产生修正主义的渠道，防止资本主义复辟。"},{"type":"paragraph","text":"我们人民解放军是无产阶级专政的柱石。我们坚决做工人阶级的坚强后盾，坚决支持工人阶级领导一切，按照工人阶级的面貌，对一切不适合社会主义经济基础的上层建筑实行彻底的、普遍的改革，巩固和发展无产阶级专政，使我们的伟大社会主义江山永不变色！"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c7d6f1a1c4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
