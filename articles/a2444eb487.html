部署的报告的复电","authors":["毛泽东"],"dates":[{"year":1952,"month":2,"day":29}],"is_range_date":false,"parts":[{"text":"毛泽东对陈毅关于华东军区打虎情况和部署的报告的复电","type":"title"},{"text":"毛泽东","type":"authors"},{"text":"陈毅同志：","type":"appellation"},{"text":"二月二十五日的电报收到。（一）因为你们打虎进展较速，你们的打虎突击可以在三月十日基本结束，转入打虎的正常轨道上去。但正式宣布须按具体情况，有些（可能是多数）转入正常，有些仍须突击。（二）中央正在考虑不单是五十万元以下而且是一百万元以下的所谓贪污分子，一般不作贪污而算作占小便宜或公私不分，以便解脱更多的人，利于教育；但少数情节恶劣者仍应算贪污。此点中央当另有通知。（三）军队不要举行公审。（四）连队三反尚无经验，可先在若干单位试行，连队的严重问题是军阀主义，也有贪污，应来一次改革，但做法应与机关有别，以教育为主，同时搬掉若干坏的。（五）最近西南军区党委有一个方针和部署的计划，今日已发你处，请加参考然后确定你们的部署。（六）其余均同意。","type":"paragraph"},{"text":" 毛泽东二月二十九日","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"陈毅","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a2444eb487"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
