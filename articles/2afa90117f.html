rt":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"用伟大的毛泽东思想武装革命师生驻沪指战员坚决执行毛主席“三·七”指示取得很大成绩","authors":[],"parts":[{"type":"paragraph","text":"据新华社上海七日电 驻沪陆海空三军广大指战员，高举毛泽东思想伟大红旗，坚决执行伟大统帅毛主席的“三·七”指示，分期分批到上海大、中、小学校实行军政训练，宣传毛泽东思想，取得了很大成绩，为无产阶级文化大革命立下了功勋。"},{"type":"paragraph","text":"去年，伟大领袖毛主席发出光辉的“三·七”指示后，驻沪三军部队指战员闻风而动，对毛主席的伟大指示跟得紧，跟得快，跟得彻底。他们组成了许多军政训练团、营、组和毛泽东思想宣传队，分赴各学校，帮助革命师生实行军政训练，“并且参预关于开学、整顿组织、建立三结合领导机关和实行斗、批、改的工作。”受到广大红卫兵小将和革命师生员工的热烈欢迎。"},{"type":"paragraph","text":"在军政训练中，他们狠抓活学活用毛泽东思想这个根本。各个军训部队到学校后，步步紧跟毛主席的伟大战略部署，时时处处宣传毛泽东思想，显示了人民解放军对毛主席的无限热爱、无限忠诚。去年四月份，各军训部队紧跟毛主席的伟大战略部署，广泛发动群众，运用各种形式，开展革命大批判的群众运动。接着，毛主席又号召“大中小学校都要复课闹革命”，各军训部队又雷厉风行，帮助革命师生掀起了复课闹革命的热潮。毛主席发出“要斗私，批修”的伟大号召，各军训部队同革命小将一起亮私斗私，破私立公，使许多学校原来对立的两派交心交底，促进、巩固和发展了革命大联合和革命三结合。毛主席教导我们：“办学习班，是个好办法，很多问题可以在学习班得到解决。”今年春节前后，军训部队在各校大办特办毛泽东思想学习班，大学大用毛主席的最新指示，大讲特讲无产阶级文化大革命的大好形势，大论特论无产阶级革命派的责任，全力围剿资产阶级、小资产阶级派性，推动许多学校迅速地建立起革命委员会。"},{"type":"paragraph","text":"军训部队紧紧抓住两个阶级、两条道路、两条路线斗争这个纲，坚定地相信和依靠群众，坚定地贯彻和执行群众路线，大搞群众运动，让群众自己教育自己，自己解放自己。"},{"type":"paragraph","text":"在学校执行军训任务的指战员，发挥了中国人民解放军的光荣传统，他们牢记毛主席的教导：“我全军将士必须时刻牢记，我们是伟大的人民解放军，是伟大的中国共产党领导的队伍。只要我们时刻遵守党的指示，我们就一定胜利。”他们以战无不胜的毛泽东思想和我军的四个第一、三八作风、三大纪律八项注意的优良传统，去帮助革命小将加强革命性、科学性和组织纪律性，把小资产阶级思想引导到无产阶级的革命轨道上来，使革命小将树立起“只有解放全人类才能最后解放无产阶级自己”的信念。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"派性","type":"主题/事件"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2afa90117f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
