<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共中央关于处理党、政、军、群团体内反革命分子问题的指示","authors":[],"dates":[{"year":1951,"month":5,"day":8}],"is_range_date":false,"parts":[{"text":"中共中央关于处理党、政、军、群团体内反革命分子问题的指示","type":"title"},{"text":"中央已决定，在共产党内，在人民解放军内，在人民政府系统内，在教育界，在工商界，在宗教界，在各民主党派和各人民团体内清出的反革命分子，除罪不至死应判有期或无期徒刑、或予管制监视者外，凡应杀分子，只杀有血债者，有引起群众愤恨的其他重大罪行，例如强奸许多妇女、掠夺许多财产者，以及最严重地损害国家利益者；其余一律采取判处死刑、缓期二年执行，在缓刑期内强制劳动，以观后效的政策。这个政策是一个慎重的政策，可以避免犯错误；这个政策可以获得广大社会人士的同情；这个政策可以分化反革命势力，利于彻底消灭反革命；这个政策又保存了大批的劳动力，利于国家的建设事业。因此，这是一个正确的政策。估计在上述党、政、军、教、经、团各界清出来的应杀的反革命分子中，有血债或有其他引起群众愤恨的罪行或最严重地损害国家利益的人只占极少数，大约不过十分之一二，而判处死刑缓期执行的人可能占十分之八九，即可保全十分之八九的死罪分子不杀。他们和农村中的匪首、惯匪、恶霸不同，也和城市的恶霸、匪首、惯匪、大流氓头及会道门大首领不同，也和某些最严重地损害国家利益的特务不同，即没有引起群众痛恨的血债或其他重大罪行。他们损害国家利益的程度是严重的但还不是最严重的。他们犯有死罪，但群众未直接受害。如果我们把这些人杀了，群众是不容易了解的，社会人士是不会十分同情的，又损失了大批的劳动力，又不能起分化敌人的作用，而且我们可能在这个问题上犯错误。因此，中央决定对于这样的一些人，采取判处死刑缓期执行，强制劳动以观后效的政策。如果这些人中有若干人不能改造，继续为恶，将来仍可以杀，主动权操在我们手里。下面是东北军区保卫部在军区系统逮捕第一批二二百零四名反革命分子的报告，发给你们阅看。请东北军区即照上述原则处理，各地党、政、军、教、经、团中清出来的反革命分子，请各地均照上述原则处理。其应执行死刑的极少数人（大约占死罪分子的十分之一二），为慎重起见，一律要报请大行政区或大军区批准。有关统一战线的重要分子，须报请中央批准。此外，对于农村中的反革命，亦只杀那些非杀不能平民愤者，凡人民不要杀的人一律不要杀。其中有些人亦应采取判死缓刑的政策。人民要求杀的人则必须杀掉，以平民愤而利生产。","type":"paragraph"},{"text":" 来源：根据中共中央办公厅《中央文件汇集》刊印。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e4f2789d5f"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
