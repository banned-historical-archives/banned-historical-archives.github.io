script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"昔阳县财贸部门职工揭露前县委主要负责人  硬搬“大寨经验”办财贸破坏商品生产  极左路线不仅使昔阳县财贸部门的业务受到巨大损失，也给全县人民的生产和生活带来严重危害","authors":[],"dates":[{"year":1980,"month":9,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"昔阳县财贸部门职工揭露前县委主要负责人"},{"type":"paragraph","text":"硬搬“大寨经验”办财贸破坏商品生产"},{"type":"paragraph","text":"极左路线不仅使昔阳县财贸部门的业务受到巨大损失，也给全县人民的生产和生活带来严重危害"},{"type":"paragraph","text":"本报讯 据《财贸战线》报道：山西昔阳县财贸部门职工在深入批判极左路线，揭露前县委主要负责人不按经济规律办事，破坏商品生产，把财贸工作引入歧途的严重错误中，以大量事实证明，极左路线不仅使昔阳县财贸部门的业务受到巨大损失，也给全县人民的生产和生活带来严重的危害。"},{"type":"paragraph","text":"前昔阳县委主要负责人根本否定财贸工作的桥梁和纽带作用，把财贸工作全部纳入建设大寨县的“总体战”中，蛊惑人心地提出了所谓用大寨精神办财贸的“经验”。其主要内容可以概括为两句话，即“需要就是合理”，“给东西就是支援”。例如，搞农田基本建设工程时指名让财贸部门出多少劳动力，财贸部门就得保证出多少劳动力；工程需要财贸部门拿出多少资金和物资，财贸部门就得如数供应。"},{"type":"paragraph","text":"在十年浩劫中，前县委还以“社会主义商业要全面占领农村市场阵地”为由，对集市贸易持续进行“大围剿”。在“堵不住资本主义的路，迈不开社会主义的步”的极左口号下，三令五申要县工商行政管理部门为学大寨“站好岗”、“放好哨”，对集市贸易要“管紧、管严、管死”，“宁左勿右”。前县委主要负责人还亲自出马，四处撵集，对出售农副土特产品的一律进行罚款没收，批判斗争。由于前县委多方限制，并无理处罚，全县集市贸易终于在1970年到1971年间被强行关闭，严重地影响了农副产品的收购，其流毒影响至今并没有肃清。"},{"type":"paragraph","text":"前县委领导还提出“只抓购、销、调、存，必然要为资本主义服务。”要财贸职工在“割资本主义尾巴”中冲锋陷阵，提出要“狠抓商品流通领域里的阶级斗争”。什么“三尺柜台不平静，一买一卖有斗争”、“一个鸡蛋两条线”的极左论调泛滥成灾。结果，砂锅、砂制茅勺、茅桶等土特产绝迹了，苇席、麻皮、笤帚由调出变成调入，菜羊、鲜蛋收购量显著下降，全县副业收入9年中下降了一半还多。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"89c1e09c78"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
