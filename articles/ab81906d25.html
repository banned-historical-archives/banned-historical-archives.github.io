ical-archives/banned-historical-archives8/main/maoquanji10.pdf"],"article":{"title":"和南京谈判的主要内容","alias":"","parts":[{"type":"paragraph","text":"和南京谈判的主要内容川"},{"type":"paragraph","text":"（1937年2月9日）周："},{"type":"paragraph","text":"（一）关于和宁方?交涉之政治的立场，请参阅致三中全会电。"},{"type":"paragraph","text":"（二）军事方面，同意提出初编为十二个师四个军，林贺刘徐为军长，组成一路军，设正副总司令，朱\"正彭副。"},{"type":"paragraph","text":"（三）饷项，如对方允即改番号，即照中央军待遇领受，如对方仍欲缓改，则每月接济至少八十至一百万。"},{"type":"paragraph","text":"（四）如有国防委员会之组织，红军应派代表参加。如暂时无此种组织，红军亦需要驻京代表参与国防准备。"},{"type":"paragraph","text":"[1]这是毛泽东和洛甫（张闻天）给周恩来的电报。[2]指南京国民党政府。"},{"type":"paragraph","text":"[3]指1937年2月10日中共中央致国民党第五届中央执行委员会第三次全体会议的电报。"},{"type":"paragraph","text":"[4]林，指林彪，当时任中国人民抗日军事政治大学校长兼政治委员。贺，指贺龙，当时任红军第二方面军总指挥。刘，指刘伯承，当时任红军总参谋长。徐，指徐向前，当时任红军西路军总指挥。"},{"type":"paragraph","text":"[5]朱，指朱德。[6]彭，指彭德怀，当时任红军前敌总指挥。"},{"type":"paragraph","text":"[7]1937年2月12日毛泽东和张闻天致电周恩来，补充提出：“陕甘以外各省的红军游击队，一律改民团或保卫团，千人以上者亦然，绝不宜调来"},{"type":"paragraph","text":"（五）党的问题，求得不逮捕、不破坏组织即可。红军中组织领导不变。"},{"type":"paragraph","text":"(长江\"明日回)"},{"type":"paragraph","text":"毛洛"},{"type":"paragraph","text":"九日二十三时[1]长江，即范长江，新闻工作者。当时以大公报记者身份在延安采"}],"authors":["毛泽东"],"dates":[{"year":1937,"month":2,"day":9}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":183,"page_end":184},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"张闻天","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ab81906d25"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
