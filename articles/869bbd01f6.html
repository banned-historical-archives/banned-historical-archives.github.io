script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji26","name":"毛泽东全集第26卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji26.pdf"],"article":{"title":"关于我军渡江时间的考虑","alias":"","parts":[{"type":"paragraph","text":"关于我军渡江时间的考虑"},{"type":"paragraph","text":"（1949年4月14日）总前委，并告二野、三野："},{"type":"paragraph","text":"（一）总前委卯文指示电\"甚好。请二野、三野即照此指示向师以上干部着重说明推迟渡江时间的理由，加强战斗准备工作，并多筹粮草油盐。"},{"type":"paragraph","text":"（二）渡江时间仍按四月二十二日（卯养）实施，不要改变。但有可能再推迟几天，即推迟至四月二十五日（卯有），至迟四月二十七日（卯感）。是否如此，要待四月十八日左右才能确定。"},{"type":"paragraph","text":"（三）昨（十三）日起谈判已至正式阶段，我方协定草案已交张治中代表团，并由双方代表团开了一次正式会议。张治中等表示原则上接受我方草案，仅在个别问题上有意见。惟南京李、何、白、顾等是否能拒绝美、蒋干涉（此种干涉现已加紧）愿意接受，则"},{"type":"paragraph","text":"[1]指总前委1949年4月12日关于推迟一周渡江诸问题给第二、第三野战军前委、各兵团党委的指示电。电报指出：此次我军推迟一星期渡江，完全是政治上和军事上所必须采取的步骤，但因此也容易产生松懈战斗意志和迷失方向的危险，所以必须向师以上干部说明推迟渡江的理由及应做的各项准备工作。"},{"type":"paragraph","text":"[2]李，指李宗仁，当时任国民党政府代总统。何，指何应钦，当时任国民党政府行政院院长。白，指白崇禧，当时任国民党军华中军政长官公署尚无把握。我们现要李、何、于右任、居正、童冠贤\"等五人来北平共商。如彼等不来，则由张治中派人回南京征求意见。如南京根本拒绝不愿签字，则争取张治中代表团签字，然后由我军渡江，威追南京批准。如南京因受美、蒋胁追不敢批准，并逃往桂林，则将协定公布，号召一切国民党主和派分子（单南京立法院即有一百多个立法委员认为无论如何要和，并谓非共军渡江不能解决问题）拥护协定的执行。万一连张治中也不敢签字，则其曲在彼，我方可将协定草案公布，争取人民及国民党中主和分子及爱国分子的同情，对我军南进，甚为有利。而我军损失，不过推迟七天或十天至多十二天（卯感）的时间。"},{"type":"paragraph","text":"（四）漱石已到，此间情形他会经常通知总前委。刘晓亦到。饶、刘正与上海产业界民主人士共商上海经济问题，并研究平、津两市经验，待你们开始渡江时即返部。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"卵寒"},{"type":"paragraph","text":"[1]于右任（1879一1964)，陕西三原人，当时任国民党政府监察院院长。居正（1876一1951），湖北广济（今武穴）人，当时任国民党政府监察院监察委员。童冠贤（1894一1981），河北宣化人，当时任国民党政府立法院院长。"},{"type":"paragraph","text":"[2]漱石，即饶漱石，当时任中共中央华东局书记、华东军区政治委员。"}],"authors":["毛泽东"],"dates":[{"year":1949,"month":4,"day":14}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":276,"page_end":277},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"869bbd01f6"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
