rt":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"观众激动高呼；“毛主席万岁！”","authors":[],"parts":[{"type":"paragraph","text":"中国民间艺术团满载着中国人民对非洲人民的友谊，于去年十一月十日离开北京到西非进行访问演出。"},{"type":"paragraph","text":"艺术团在马里和几内亚的每一场演出，场内的观众都是挤得水泄不通，连墙头上也站满了人。在场子外面，听众也是比肩继踵，在许多地方，场外的人比场内观众还要多。"},{"type":"paragraph","text":"艺术团演出的所有节目都受到了观众的热烈赞赏和高度的评价。《飞夺泸定桥》《女民兵》《丰收歌》《风雷颂》等节目都受到了热烈的欢迎。有的节目在观众的要求下重复演了许多次。热情的观众在演出结束后，纷纷拥向舞台，同中国演员握手，有些人激动地高呼“中华人民共和国万岁！”“毛主席万岁！”一位马里政府官员说：“通过你们的演出，我们受到了一次生动的政治教育。”几内亚一位朋友说：“看了《风雷颂》，我更加坚定了同帝国主义进行无情斗争的决心！”一位最近访问过中国的马里艺术家说：“你们的演出反映了中国人民的生活和革命斗争。在毛泽东主席的领导下，新中国的艺术有了迅速的发展。”"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8cc9299b83"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
