结论","authors":[],"dates":[{"year":1986,"month":8,"day":20}],"is_range_date":false,"parts":[{"text":"云南人民出版社关于错划王起同志为“右派分子”的复查结论","type":"title"},{"text":"王起 男 1952年生 北京市人 家庭出身城市贫民  本人成份学生 1945年加入中国共产党\t原系我社社长兼总编辑 原工资行政14级 后调云南日报社工作现已离休。","type":"paragraph"},{"text":"1958年王起同志被中共云南省委宣传部错划为“右派”。1958年6月30日中共云南省委常委会给予王起同志撤销党内外职务、开除党籍、下放监督劳动的处分。1979年我社进行复查，认为系一错案，经中共云南省出版局党组批准，予以改正。恢复党籍、恢复政治名誉、恢复原工资行政14级。现根据云办发（85）73号文件精神，再次进行复查，认为王起同志在1956年和1957年初向中共中央宣传部、向中央文化部及省委领导提建议反映情况是符合党的组织原则的，所提意见所写文章更非右派反党反社会主义言论，实属错划，应彻底平反。","type":"paragraph"},{"text":" 中共云南人民出版社委员会1986年8月20日","type":"paragraph"},{"text":"报：中共云南省委组织部","type":"paragraph"},{"text":"中共云南省委宣传部","type":"paragraph"},{"text":"省文化厅","type":"paragraph"}],"comments":[],"origin":"根据文件翻印件打印。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"云南文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"52e634d12d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
