策李鹏说，现在有人挑拨党和知识分子的关系，希望广大知识分子提高警惕，不要受个别居心不良的人挑拨","authors":[],"dates":[{"year":1987,"month":1,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京一月十七日电　中共中央政治局委员、国务院副总理李鹏今天在北京强调:党对知识分子的政策不会变。"},{"type":"paragraph","text":"李鹏今天对来自全国各地的工程勘察设计专家说，现在有人挑拨党和知识分子的关系，说什么反对资产阶级自由化就是要整知识分子，这纯属诬蔑和歪曲。"},{"type":"paragraph","text":"他说，反对资产阶级自由化有特定含义。我们反对违背四项基本原则，反对在中国搞资本主义，反对搞“全盘西化”。反对资产阶级自由化根本不会影响和改变党的十一届三中全会以来党对知识分子的政策。他希望广大知识分子提高警惕，不要受个别居心不良的人挑拨。"},{"type":"paragraph","text":"李鹏重申:党是爱护和信任广大知识分子的。知识分子本身就是工人阶级的一部分，是国家的主人。他说，搞社会主义现代化建设还要靠大家同心协力。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"08ed83055c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
