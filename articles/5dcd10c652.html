rs":["瞿琮"],"dates":[{"year":1977,"month":5,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"武昌都府堤煤油灯下"},{"type":"paragraph","text":"——纪念毛主席《湖南农民运动考察报告》发表五十周年"},{"type":"paragraph","text":"广州部队某部　瞿　琮送走晚霞，迎来朝霞——又是一夜辛劳，在煤油灯下；书桌上堆放着一叠文稿，和一杯隔夜的浓茶。掸净雪花，铺满霜花——又是一夕风寒，在煤油灯下；书桌上陈放着一管羊毫，一砚经夕的冰渣……不知累与乏；毛委员啊，灯下描绘着农民运动壮美的图画：粗黑的手掌了大印，自卫队的梭标红缨飘洒……不觉冷与寒；毛委员啊，灯下倾诉着四乡农友贴心的话：泥腿杆子办了农会，正好比五指握拳力量大……在这一盏煤油灯下，毛委员望到了晨曦、旭日、彩霞；“革命先锋”“好得很”，这——就是唯一正确的评价！在这一盏煤油灯下，毛委员预见了霹雷、烈火、春花；“将冲决一切束缚他们的罗网”，这——就是唯一准确的回答！送走晚霞，迎来朝霞——毛主席又是一夜辛劳在灯下；今天我走进都府堤旧居啊，禁不住步步留连、处处牵挂……掸净雪花，铺满霜花——毛主席又是一夜风寒在灯下；今天我翻开光辉的《报告》啊，止不住琅琅诵读、激情焕发……"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"湖南文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5dcd10c652"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
