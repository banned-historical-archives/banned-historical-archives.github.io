ar":1994,"month":12,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛泽东诗词研究会成立"},{"type":"paragraph","text":"本报北京１２月２６日讯在毛泽东同志诞辰１０１周年之际，中国毛泽东诗词研究会成立暨毛泽东诗词研讨会在北京举行。"},{"type":"paragraph","text":"毛泽东同志不仅是一位伟大的革命家、思想家、政治家，也是一位才华卓著的诗人。他一生创作出了不少气势恢宏、瑰丽精湛的诗篇。毛泽东诗词研究会的成立对研究毛泽东文艺思想、发展社会主义文艺事业将起到积极推动作用。"},{"type":"paragraph","text":"研究会由薄一波任名誉总顾问，胡绳、赵朴初、马文瑞任名誉顾问，臧克家任名誉会长，贺敬之任会长。（文会）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a2b65f4a9c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
