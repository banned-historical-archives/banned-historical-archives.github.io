rt":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"当一辈子毛泽东思想宣传员","authors":["第二炮兵星火文工团革命委员会临时筹委会"],"parts":[{"type":"paragraph","text":"我们怀着对心中最红最红的红太阳毛主席无限热爱、无限信仰、无限忠诚、无限崇拜的心情，学习了《在延安文艺座谈会上的讲话》、《毛主席关于文学艺术的五个文件》、中共中央一九六六年五月十六日《通知》，以及经过毛主席三次亲自修改的《林彪同志委托江青同志召集的部队文艺工作座谈会纪要》。这些光辉著作，制定了最完整、最彻底、最正确的无产阶级革命文艺路线。它是我们无产阶级文化大革命的指路明灯和强大的战斗武器。"},{"type":"paragraph","text":"我们第二炮兵星火文工团是建团刚满两年的幼苗，诞生后成长的日子，是处在文化大革命的大风雨中，是处在两种文艺思想、两条文艺路线的尖锐斗争中。"},{"type":"paragraph","text":"毛主席说：“为什么人的问题，是一个根本的问题，原则的问题。”究竟建设一个什么样的文工团呢？这对于刚刚诞生的我们团来说，是一个能否健康地成长壮大的根本性问题，是关系到我们能否沿着毛主席的革命文艺路线胜利前进的大方向问题。"},{"type":"paragraph","text":"一九六○年军委扩大会议决议写得很清楚：部队文艺工作必须紧密结合部队任务和思想情况，为兴无灭资、巩固和提高战斗力服务。林副主席在一九六四年五月又强调指出：“无产阶级文艺的目的，就是要团结人民，教育人民，鼓舞革命人民的斗志；瓦解敌人，消灭敌人，进行兴无灭资的斗争。”部队党委根据这个精神，指示我团要发扬红军宣传队的光荣传统，节目创作以中、小型为主，组织上要做到能大能小，可分可合。"},{"type":"paragraph","text":"毛主席教导我们：“我们的文学艺术都是为人民大众的，首先是为工农兵的……”在毛泽东文艺思想的光辉照耀下，近两年来，我们一再深入火热的斗争生活，演出了一些表现工农兵斗争生活的小节目，受到了工农兵群众的鼓励和教育。特别是在文化大革命中，为了更好地宣传毛泽东思想，我们把文工团改成毛泽东思想宣传队，深入街头和农村，进行演出和宣传活动，广大工农兵群众所给予我们的欢迎，使我们真正体会到了毛主席的文艺路线的英明和伟大，更加痛恨中国的赫鲁晓夫及其所推行的反革命修正主义文艺黑线。"},{"type":"paragraph","text":"在纪念毛主席的光辉《讲话》发表二十五周年的时候，我们以万分激动的心情，参加了驻京陆海空三军革命文艺战士的联合演出。我们决心以战无不胜的毛泽东文艺思想为武器，把这次演出搞得好上加好！"},{"type":"paragraph","text":"今后，我们要更好地活学活用毛主席著作，牢固树立为工农兵服务的思想，当一辈子毛泽东思想的宣传员！"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"efe48f4684"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
