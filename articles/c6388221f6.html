art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"福特总统和夫人看体育表演并在京参观邓小平、李素文陪同观看体育表演 吴德陪同参观全国农业学大寨展览","authors":[],"parts":[{"type":"paragraph","text":"新华社一九七五年十二月三日讯"},{"type":"paragraph","text":"国务院副总理邓小平，人大常委会副委员长李素文，外交部长乔冠华，国家体委主任庄则栋，中国驻美国联络处主任黄镇等，陪同美国客人观看表演。"},{"type":"paragraph","text":"观看表演的还有首都各界群众。"},{"type":"paragraph","text":"新华社一九七五年十二月三日讯"},{"type":"paragraph","text":"美国驻中国联络处主任乔治·布什也前往参观。"},{"type":"paragraph","text":"陪同参观的还有农林部副部长肖鹏、中国驻美国联络处主任黄锁。"},{"type":"paragraph","text":"福特总统的夫人贝蒂·福特今天上午由李素文副委员长陪同参观了故宫博物院，下午在文化部负责人王曼恬陪同下参观了中央五·七艺术大学舞蹈学校。连日来，福特总统的随行人员还分别参观了红星人民公社、全国摄影艺术展览，游览了长城、颐和园。"},{"type":"paragraph","text":"美国总统杰拉尔德·福特和夫人贝蒂·福特十二月三日应邀在首都体育馆观看了体操、武术和乒乓球表演。"},{"type":"paragraph","text":"国务院副总理邓小平，人大常委会副委员长李素文等，陪同美国客人观看表演。"},{"type":"paragraph","text":"新华社记者摄"},{"type":"paragraph","text":"美国总统杰拉尔德·福特十二月三日在吴德副委员长陪同下参观农业学大寨展览。"},{"type":"paragraph","text":"新华社记者摄（照片）"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"吴德","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c6388221f6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
