" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoistlegacy.de-736","name":"中共山东省委组织部、中共山东省委老干部局、山东省财政厅、山东省劳动局、山东省人事局关于为一九七〇年至一九七七年退休的部分县处级以上干部补发退休费的通知","author":"中共山东省委组织部","internal":false,"official":false,"type":"unknown","files":[],"article":{"title":"中共山东省委组织部、中共山东省委老干部局、山东省财政厅、山东省劳动局、山东省人事局关于为一九七〇年至一九七七年退休的部分县处级以上干部补发退休费的通知","dates":[{"year":1986,"month":8,"day":27}],"is_range_date":false,"authors":["中共山东省委组织部","中共山东省委老干部局","山东省人事局","山东省劳动局","山东省财政厅"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"中共山东省委组织部编, 干审工作政策选编, 184-185","tags":[{"name":"干部","type":"主题/事件"},{"name":"退休","type":"主题/事件"},{"name":"退休费","type":"主题/事件"},{"name":"退职金","type":"主题/事件"}],"parts":[{"type":"title","text":"中共山东省委组织部  中共山东省委老干部局  山东省财政厅  山东省劳动局  山东省人事局关于为一九七〇年至一九七七年退休的部分县处级以上干部补发退休费的通知"},{"type":"subtitle","text":"（鲁老干〔1986〕91号）"},{"type":"paragraph","text":"各市、地、县委组织部、老干部局（处、科），各市、地、县 财政局、劳动局、人事局，省直各部门，各高等院校："},{"type":"paragraph","text":"一九七〇年至一九七七年，我省部分一九四二年底以前参加革命工作的相当于县委书记、副书记、县长以上领导干部，先后按照原省革委鲁革发（70）92号文件规定办理了退休手续，分别发给原工资百分之七十至百分之八十五的退休费。一九七七年十二月，省委根据中共中央组织部一九六五年的规定，决定对已按原省革委通知办理了退休手续的上述干部，从 一九七八年一月份起改按本人原工资发给，过去少发部分不再补发。这几年来，随着落实政策的进行，有部分同志的工资已经补发了，但是大部分同志尚未解决。现在为了妥善解决这方面的遗留问题，经我们共同研究，请示省委同意，作如下的通知："},{"type":"paragraph","text":"一、 按原省革委鲁革发（70）92号文件规定办理了退休的一九四二年底以前参加革命工作的相当于县委书记、副书记、县长以上干部，退休当月至一九七七年十二月退休费与原标准工资之间的差额，至今尚未补发的，予以一次全部补发。上述干部已去世的，其少发的退休费，也予补发；一九七七年底以前去世的，补发到本人去世时为止。"},{"type":"paragraph","text":"二、 对需补发退休费的干部，要履行呈报审批手续。原单位组织人事部门核实后，填写《1970至1977年退休的1942年底前参加革命工作的相当县委书记、副书记、县长以上干部补发退休费审批表》（附表）一式两份，经主管部门审查同意，属市、地、县（区）的报请市、地委组织、老干部部门审批；省直机关的报省委老干部局审批。"},{"type":"paragraph","text":"三、 补发退休费所需的费用，按现行资金领报渠道解决。"},{"type":"paragraph","text":"四、 本通知自接到之日起执行。"},{"type":"paragraph","text":"一九八六年八月二十七日"}],"alias":""},"tags":[{"name":"山东文革","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0c1170be5d"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
