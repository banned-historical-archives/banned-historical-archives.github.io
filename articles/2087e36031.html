ical-archives/banned-historical-archives8/main/maoquanji15.pdf"],"article":{"title":"关于在政治、军事、组织上应采取的步骤的指示","alias":"","parts":[{"type":"paragraph","text":"关于在政治、军事、组织上"},{"type":"paragraph","text":"应采取的步骤的指示"},{"type":"paragraph","text":"（1941年1月19日）"},{"type":"paragraph","text":"（一）中央方针见另示。（二）边区粮食正在筹备。（三）兵工厂依现有条件很难扩充，三酸厂在商讨建立中。（四）蒋计划是各个击破我军，先打新四后打八路，目前西北还不会进攻，我亦不宜引起胡宗南之注意，故边区军事不作新的调动。（五）华北方面请照原计划按步做去，惟增加紧张性。（六）华中准备打长期的游击战，以有利我军不利反共军为原则。（七）蒋介石宣布新四军为叛逆，将叶挺付审判，似有与我党破裂决心，其背景似以日德为多，我们决定在政治上、军事上、组织上采取必要步骤。在政治上全面揭破蒋之阴谋（但暂时不提蒋名字)，见《新中华报》社论及中共发言人谈话，惟仍取防御姿态，在坚持抗日反对内战口号下动员群众。在军事上先取防御战，必要时打出手，打到甘川去。在组织上拟准备撤销备办事处。"},{"type":"paragraph","text":"[1]这是毛泽东和朱德、王稼祥关于在政治、军事、组织上应采取"}],"authors":["毛泽东"],"dates":[{"year":1941,"month":1,"day":19}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":370,"page_end":370},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2087e36031"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
