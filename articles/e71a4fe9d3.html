ical-archives/banned-historical-archives0/main/maoquanji28.pdf"],"article":{"title":"抵达莫斯科时的书面演说","alias":"","parts":[{"type":"paragraph","text":"抵达莫斯科时的书面演说！"},{"type":"paragraph","text":"（1949年12月16日）亲爱的同志们和朋友们："},{"type":"paragraph","text":"我这次有机会访问世界上第一个伟大社会主义国家苏联的首都，是生平很愉快的事。中苏两大国人民是有深厚友谊的。十月社会主义革命之后，苏维埃政府根据列宁、斯大林的政策首先废除了帝俄时代对于中国的不平等条约。在差不多三十年的时间内，苏联人民和苏联政府又曾几次援助了中国人民的解放事业。中国人民在患难中，得到苏联人民和苏联政府这种兄弟般的友谊，是永远不会忘记的。"},{"type":"paragraph","text":"目前的重要任务，是巩固以苏联为首的世界和平阵线，反对战争挑拨者，巩固中苏两大国家的邦交，和发展中苏人民的友谊。我相信，由于中国人民革命的胜利，和中华人民共和国的成立，由于新民主国家及世界爱好和平人民的共同努力，由于中苏两大国的共同愿望和亲密合作，特别是由于斯大林大元师的正确的国际政策，这些任务必将会充分实现并获得良好的结果。"},{"type":"paragraph","text":"中苏友好与合作万岁！"},{"type":"paragraph","text":"[1]12月16日毛泽东率代表团到达莫斯科。这是毛泽东在抵达莫斯科时在车站上的演说。"}],"authors":["毛泽东"],"dates":[{"year":1949,"month":12,"day":16}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":88,"page_end":88},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"发言"}]},{"id":"wenji6","type":"pdf","name":"毛泽东文集第六卷（1999）","internal":false,"official":true,"author":"中央文献研究室","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/wenji6.pdf"],"article":{"title":"抵达莫斯科时的书面演说","description":"根据一九四九年十二月十八日《人民日报》刊印。","dates":[{"year":1949,"month":12,"day":16}],"parts":[{"text":"抵达莫斯科时的书面演说","type":"title"},{"type":"appellation","text":"亲爱的同志们和朋友们："},{"type":"paragraph","text":"我这次获有机会访问世界上第一个伟大社会主义国家苏联的首都，是生平很愉快的事。中苏两大国人民是有深厚友谊的。十月社会主义革命之后，苏维埃政府根据列宁、斯大林的政策首先废除了帝俄时代对于中国的不平等条约。在差不多三十年的时间内，苏联人民和苏联政府又曾几次援助了中国人民的解放事业。中国人民在患难中，得到苏联人民和苏联政府这种兄弟般的友谊，是永远不会忘记的。"},{"type":"paragraph","text":"目前的重要任务，是巩固以苏联为首的世界和平阵线，反对战争挑拨者，巩固中苏两大国家的邦交，和发展中苏人民的友谊。我相信，由于中国人民革命的胜利，和中华人民共和国的成立，由于新民主国家及世界爱好和平人民的共同努力，由于中苏两大国的共同愿望和亲密合作，特别是由于斯大林大元帅的正确的国际政策，这些任务必将会充分实现并获得良好的结果。"},{"type":"paragraph","text":"中苏友好与合作万岁！"}],"comment_pivots":[],"is_range_date":false,"authors":["毛泽东"],"comments":[],"page_start":45,"page_end":45,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文
