杀现象","authors":[],"dates":[{"year":1951,"month":9,"day":27}],"is_range_date":false,"parts":[{"text":"中南区土地改革中各地连续发生地主自杀现象","type":"title"},{"text":"【中南总分社九月二十七日讯】中南区复收后至秋收前在八百五十万人口的地区(湖北未计入)有重点地展开了土地改革工作，运动发展很快，成绩很大。但也发生了一些偏向，追逼吊打及地主自杀现象相当严重。","type":"paragraph"},{"text":"据湖南土地改革委员会九月初的不完全统计，该省零陵、衡阳、邵阳、益阳、常德、郴州六个专区，在土地改革中自杀人数共有一、一八七人，其中地主占自杀总数百分之九十六。另据江西省吉安、上饶、宁都、九江、抚州、南昌六专区的不完全统计，土地改革中自杀的有二七二人。各省在覆查土地改革时，也有不少人自杀。湖北省荆州专区九个县在土地改革和覆查中地主自杀的共达二、六二六人。","type":"paragraph"},{"text":"造成地主大批自杀的原因有以下几个：(1)地主拼死顽抗，分散财产、伐树、杀牛、造谣、放火烧粮、刺杀乡村干部和农民积极分子，激起农民的忿怒。阶级斗争剧烈，不少地主因害怕自杀。(2)各地土地改革领导机关机械搬用去年土地改革的经验，不分具体情况强调土地改革必须从反霸入手，事实上自去冬至今年以来，有些农村已经过一次较澈底的反霸和镇压反革命运动，下面没有大霸可反就找“小霸”，名为“小中找大”，有些地、富甚至中贫农，过去当过伪保甲长或当狗腿的，也当作恶霸来反，这些分子怕斗争，或者觉得挨了斗委屈，即行自杀。(3)单纯的经济观点，无限制地追逼浮财和清算罚款，对大小地主一律对待，在这种情况下自杀的数量最多，特别是老年和妇女约占一半。(4)个别干部怕说立场不稳，抱着宁左勿右的态度，认为对地主打得凶就是立场稳，有些人一被划为地主，怕斗争即自杀了。(5)有些确属罪大恶极的地主畏罪自杀。(6)湖南各地委于七月下旬召开党代表，区书、区长联席会，当时留下掌握工作的干部少，运动扩展面大，照顾不过来，下面曾有一时期较紊乱，地主自杀的不少。","type":"paragraph"}],"comments":[],"origin":"1951年10月3日新华通讯社编《内部参考》。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"43b4596d72"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
