script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"智利马克思主义革命先锋党热烈祝贺中共八届十一中全会  中国共产党对马列主义理论作出伟大贡献  深入进行文化大革命必将彻底消灭资产阶级思想","authors":[],"dates":[{"year":1966,"month":10,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"智利马克思主义革命先锋党热烈祝贺中共八届十一中全会"},{"type":"paragraph","text":"中国共产党对马列主义理论作出伟大贡献"},{"type":"paragraph","text":"深入进行文化大革命必将彻底消灭资产阶级思想"},{"type":"paragraph","text":"新华社二十九日讯　圣地亚哥消息：智利马克思主义革命先锋党中央委员会不久前发出贺词，热烈祝贺中国共产党召开八届十一中全会。贺词指出，中国共产党第八届中央委员会第十一次全体会议的公报和决定是“对马克思列宁主义理论、对彻底消灭资产阶级思想作出的一个伟大贡献”。"},{"type":"paragraph","text":"智利马克思主义革命先锋党机关报《先锋报》在最近出版的第二十期刊登了这封贺词的全文。这封由这个党的总书记本哈明·卡雷斯签署的贺词说：“我们热烈支持这些代表中国人民和整个进步人类利益的决议。您们指出了中华人民共和国实现新的大跃进所应该遵循的准则，这一跃进是为了缔造一个新的共产主义社会。这是您们对马克思列宁主义理论、对彻底消灭资产阶级思想作出的一个伟大贡献。”"},{"type":"paragraph","text":"贺词说，当您们重申中国人民和中国共产党全力支持毛泽东同志的思想时，您们更进一步加强了全世界劳动者反对美帝国主义的殊死斗争，并且加强了对不怕帝国主义者及其仆从的威胁、阴谋诡计和讹诈，并正在为自己的经济、政治和社会解放而斗争的各国人民和组织的支持。您们最高度地表现了无产阶级国际主义。同时，在您们深入进行文化革命，即深入进行永远消灭资产阶级思想的殊死斗争的时候，您们将会遭到帝国主义者及其走狗的最恶毒的攻击，但是，全世界的马克思列宁主义者和革命人民也会进一步加强对您们的热爱和支持。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a558008c62"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
