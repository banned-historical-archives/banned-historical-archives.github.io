危机  秘鲁总理呼吁拉丁美洲国家团结起来反对大国的压力","authors":[],"dates":[{"year":1974,"month":12,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"第三世界加强团结反对超级大国剥削和掠夺"},{"type":"paragraph","text":"墨西哥总统强调捍卫经济独立对付资本主义经济危机"},{"type":"paragraph","text":"秘鲁总理呼吁拉丁美洲国家团结起来反对大国的压力"},{"type":"paragraph","text":"新华社墨西哥城一九七四年十二月二十一日电　墨西哥总统埃切维里亚十二月二十日在众议院一个委员会上的讲话中指出，在资本主义经济危机面前，墨西哥必须捍卫它的经济独立。"},{"type":"paragraph","text":"埃切维里亚总统说，墨西哥已作好准备来对付资本主义经济危机。他说，这场危机“几年以来就逐步形成了，尖锐了，并且根据现有的一些征兆，危机会变得更加深刻。”"},{"type":"paragraph","text":"在谈到《各国经济权利与义务宪章》时，埃切维里亚总统说：想从帝国主义国家那里得到一个国际合作的文件，“是不合逻辑的，因为这些国家的利益使它们不会有合作的念头。它们想统治人，想凌驾一切，而不想合作”。"},{"type":"paragraph","text":"他还强调指出，墨西哥必须制定一项国际政策来维护墨西哥的利益，以保卫国家的主权和经济。他说，自由地支配自然资源是墨西哥的政治信念。"},{"type":"paragraph","text":"新华社墨西哥城一九七四年十二月二十一日电　据墨西哥《至上报》报道，秘鲁总理埃德加多·梅尔卡多·哈林将军十二月二十日在利马接见这家报纸的记者时强调指出，拉丁美洲和第三世界国家应该团结起来反对大国的压力。"},{"type":"paragraph","text":"梅尔卡多总理说，美国反对拉丁美洲国家控制外资和限制利润大量输出国外；并通过建立关税壁垒，限制拉丁美洲产品进入美国市场。他说，跨国公司干涉它们所在国的内政，掠夺当地的资源和侵占所在国的国内市场；各类跨国公司还通过技术转让迫使拉美国家付予它们专利费等。"},{"type":"paragraph","text":"这位总理指出：“在政治领域也是如此，美国和其他大国施加强大的压力来维持在拉丁美洲的殖民主义地盘”。他说，那些大国“同时还反对拉丁美洲国家有权确定它们的海洋主权和管辖权的范围，也就是说，二百浬领海或承袭海”。"},{"type":"paragraph","text":"梅尔卡多总理说，拉丁美洲属于第三世界。对第三世界来说，主要的问题是一方面要对付帝国主义造成的灾难的经常袭击，另一方面要对付不发达状态。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"563861671b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
