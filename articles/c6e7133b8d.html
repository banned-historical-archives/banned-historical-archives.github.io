art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"华国锋叶剑英邓小平李先念同志接见国庆节少数民族参观团成员","authors":[],"parts":[{"type":"paragraph","text":"新华社十月二日讯 中共中央主席华国锋，中共中央副主席叶剑英、邓小平、李先念，以及中共中央、人大常委会和国务院其他领导同志，今天下午在人民大会堂亲切接见了国庆节少数民族参观团成员、在京参加全国少数民族民间歌手民间诗人座谈会的人员和参加全国民族工作展览的少数民族同志，并同大家一起照了像。"},{"type":"paragraph","text":"下午四时，当华国锋、叶剑英、邓小平、李先念等同志来到接见大厅，向各民族的代表、歌手、诗人表示亲切致意时，全场响起热烈的掌声。"},{"type":"paragraph","text":"参加接见的中共中央、人大常委会和国务院的领导同志有王震、韦国清、乌兰夫、邓颖超、李德生、余秋里、胡耀邦、彭冲、彭真、谭震林、谷牧。政协全国委员会副主席康克清、杨静仁、刘涧涛，也参加了接见。"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"叶剑英","type":"人物"},{"name":"华国锋","type":"人物"},{"name":"李先念","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c6e7133b8d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
