art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"刘少奇主席任命副总理等国务院组成人员","authors":["刘少奇"],"parts":[{"type":"paragraph","text":"新华社28日讯 中华人民共和国主席令"},{"type":"paragraph","text":"根据中华人民共和国第二届全国人民代表大会第一次会议的决定，任命陈云、林彪、彭德怀、邓小平、邓子恢贺龙、陈毅、乌兰夫、李富春、李先念、聂荣臻、薄一波、谭震林、陆定一、罗瑞卿、习仲勋为国务院副总理；任命习仲勋兼国务院秘书长；任命钱瑛为内务部部长，陈毅兼外交部部长，彭德怀兼国防部部任，罗瑞卿兼公安部部长、陈云兼国家基本建设委员会主任，李富春兼国家计划委员会主任，薄一波兼国家经济委员会主任，聂荣臻兼科学技术委员会主任，李先念兼财政部部长，沙千里为粮食部部长，程子华为部位商业部部长，叶季壮为对外贸易部部长，许德珩为水产部部长，王鹤寿为冶金工业部部长，彭涛为化学工业部部长，赵尔陆为第一机械工业部部长，宋任穷为第二机械工业部部长，张霖之为煤炭工业部部长，余秋里为石油工业部部长、李四光为地质部部长、刘秀峰为建筑工程部部长，蒋光鼎为纺织工业部部长，李烛尘为轻工业部部长，滕代远为铁道部部长，王守道为交通部部长，朱学范为邮电部部长，廖鲁言为农业部部长，王震为农垦部部长，刘交辉为林业部部长，傅作义为水力电力部部长，马文瑞为劳动部部长，沈雁冰为文化部部长，杨秀峰为教育部部长，李德全为卫生部部长，贺龙兼体育运动委员会委员会主任。乌兰夫兼民族事物委员会主任，廖承志为华侨事物委员会主任，张奚若对外文化联络委员会主任。"},{"type":"paragraph","text":"中华人民共和国主席 刘少奇"},{"type":"paragraph","text":"一九五九年四月二十八日"}],"alias":""},"tags":[{"name":"贺龙","type":"人物"},{"name":"李富春","type":"人物"},{"name":"陈毅","type":"人物"},{"name":"李先念","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"薄一波","type":"人物"},{"name":"聂荣臻","type":"人物"},{"name":"陈云","type":"人物"},{"name":"罗瑞卿","type":"人物"},{"name":"习仲勋","type":"人物"},{"name":"彭德怀","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"aa1c0b0b53"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
