rt":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东发表对日最后一战声明（8月9日）","authors":[],"parts":[{"type":"paragraph","text":"抗日战争到了1945年夏季，已经进入了最后阶段，我军在各地猛烈地开展攻势，不断取得胜利，扩大了新解放区。日本帝国主义占领区则日益缩小，但日本侵略者仍然继续顽抗，甚至在各地还不断增兵。"},{"type":"paragraph","text":"8月8日苏联对日宣战。8月9日，毛泽东同志发表了《对日寇的最后一战》声明。"},{"type":"paragraph","text":"毛泽东同志说，苏联政府对日宣战，中国人民表示热烈欢迎。对日战争已处在最后阶段，最后地战胜日本侵略者及其一切走狗的时间已经到来了。在这种情况下，中国人民的一切抗日力量应举行全国规模的反攻，密切而有效力地配合苏联及其他同盟国作战。毛泽东同志号召八路军、新四军及其他人民军队，应在一切可能条件下，对于一切不愿投降的侵略者及其走狗实行广泛的进攻，歼灭敌人的力量，夺取其武器，猛烈地扩大解放区，缩小沦陷区。他还要求必须放手组织武装工作队，深入敌后，破击敌人交通线，配合正规军作战；组织地下军，准备武装起义，配合从外部进攻的军队，消灭敌人。"},{"type":"paragraph","text":"在强大的军事压力下，在全国人民抗日力量的打击下，日本政府被迫于8月10日发出乞降照会，14日宣布无条件投降。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1cba885e23"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
