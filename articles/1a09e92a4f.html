script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"团结战斗　深入批林批孔  甘德县委带领干部群众批判修正主义，使牧区面貌发生深刻变化","authors":[],"dates":[{"year":1974,"month":11,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"团结战斗　深入批林批孔"},{"type":"paragraph","text":"甘德县委带领干部群众批判修正主义，使牧区面貌发生深刻变化"},{"type":"paragraph","text":"据新华社西宁电　中共青海省甘德县委带领全县干部和各族牧民坚持团结战斗，深入批林批孔，推动革命和生产不断向前发展。"},{"type":"paragraph","text":"甘德县地处青海高原的东南部，平均海拔四千多米，自然条件比较差。经过无产阶级文化大革命和批林整风运动，县委的汉、藏两族领导干部路线觉悟不断提高，革命斗志越来越昂扬。他们坚持互相学习，团结战斗，带领全县人民批判修正主义，开展牧业学大寨的群众运动，促使牧区面貌发生了深刻的变化。一九七三年，全县牲畜净增百分之十，存栏量创造了历史最高水平。今年批林批孔开始以后，县委领导成员认真学习毛主席、党中央关于批林批孔的一系列指示，回顾文化大革命的战斗历程，更深刻地认识到，搞好全县人民的革命团结，是发展革命和生产的大好形势，巩固无产阶级专政的基本保证。他们从斗争实践中体会到，要搞好全县干部和各族人民的团结，首先就要搞好县委“一班人”的团结。他们几次召开县委扩大会议，总结“一班人”增强革命团结的经验。会上，县委“一班人”虚心接受来自广大干部和群众的批评，认真进行自我批评，进一步增强了革命团结。"},{"type":"paragraph","text":"中共甘德县委领导成员经常深入基层，调查研究，注意总结和推广革命团结搞得好的典型经验。县粮油管理站党支部在批林批孔中，带领干部、工人学习毛主席有关加强革命团结的教导，批判林彪反党集团分裂党，分裂军队，分裂群众的反革命罪行。全站干部、工人团结战斗，朝气蓬勃，粮油供应工作越做越好，受到了群众的称赞。县委及时总结经验，并在全县推广，促进了全县干部和群众的团结。"},{"type":"paragraph","text":"在批林批孔中，甘德县委注意教育干部和群众掌握斗争的大方向，严格区分和正确处理两类不同性质的矛盾，团结百分之九十五以上的干部和群众，团结一切可以团结的人，狠狠打击一小撮阶级敌人。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"青海文革","type":"人物"},{"name":"批林批孔","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1a09e92a4f"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
