art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"北加里曼丹人民武装大抓部队思想建设《解放报》欢呼游击队日益发展壮大是马列主义、毛泽东思想与当地情况相结合的成果","authors":[],"parts":[{"type":"paragraph","text":"据新华社讯 北加里曼丹《解放报》发表文章，欢呼活跃在沙捞越接近印尼边界的北加里曼丹人民游击队正在日益壮大和发展，不断粉碎印尼苏哈托反动军队和“马来西亚”傀儡军队的反革命“围剿”，坚持和发展了人民的武装斗争。"},{"type":"paragraph","text":"文章说，最近一年来，北加里曼丹边区西部的人民游击队曾经同来犯的印尼反动军队进行了频繁的战斗，仅去年下半年有的支队作战就达到三十多次。人民游击队虽然作战历史短，但却是一支坚强的部队，他们多次英勇袭击号称“精锐”和“机动”的反动军队，使敌军遭到重大打击。在边区东部的人民武装也顽强作战，多次粉碎了敌军的疯狂“围剿”。一次，印尼反动军队调派约五千人压向东部，还派了美制轰炸机、直升飞机共五架以及海军助战。但是，人民武装灵活运用人民战争的战略战术，勇敢、顽强、机智地挫败了敌人的阴谋。"},{"type":"paragraph","text":"文章报道了人民武装一系列英勇作战的事迹。去年六月四日，人民武装伏击一小队“马来西亚”傀儡兵，击毙其中三名，击伤一名，缴获了一批枪支和弹药。六、七月间，人民武装又痛歼印尼反动军队的一支十二人的小队，击毙其中十一名，并缴获了敌人的全部新式武器。"},{"type":"paragraph","text":"文章指出，人民武装在极其艰苦的条件下所取得的胜利，是马克思列宁主义、毛泽东思想同当地情况相结合的成果。文章说，人民武装从创建之初，就在北加里曼丹民族解放同盟的领导之下，贯彻执行了生产、战斗和搞群众工作的三大任务，大抓部队的思想建设，落实三八作风，反复学习毛主席的“老三篇”。使每一个指挥员和战斗员都明确为谁而打仗，不怕苦，不怕死，一心一意为解放北加里曼丹而战斗，打起仗来就生龙活虎，排除万难而不断取得胜利。"},{"type":"paragraph","text":"文章强调指出，北加里曼丹人民武装过去的战斗证明，印尼反动军队和“马来西亚”傀儡军队都只不过是一只纸老虎。“任务再重，困难再多，都阻挡不了用毛泽东思想武装起来的人。”人民武装必将粉碎反革命“围剿”，把武装斗争坚持和发展下去。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"人民战争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"353d3902aa"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
