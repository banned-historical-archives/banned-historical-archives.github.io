"authors":[],"dates":[{"year":1955,"month":12,"day":24}],"is_range_date":false,"parts":[{"text":"天津市资本家家属最近的思想情况","type":"title"},{"text":"【天津分社二十四日讯】天津市资本家家属的思想情况，大致可分为三种：一、接受改造积极；二、跟着走，思想有顾虑；三、对改造有抵触情绪。其中第二种较多。","type":"paragraph"},{"text":"积极接受改造的，感到剥削生活可耻，准备改变生活方式，紧缩家庭开支。有的已参加家庭劳动，有的准备辞去佣人，有的表示不拉后腿。如五区工商联主委王芷洲的老婆，过去生活优越，有厨司、佣人、车夫、杂工，现在家庭一切劳动都自己管，并参加街道活动。有这种表现的原因，有的是因参加了街道工作，有的是家里有进步力量，受到了教育。","type":"paragraph"},{"text":"跟着走，随大流的家属，普遍认为：“现在不合，将来也得合，早晚得走这条道。”某贸易行资方家属说：“我们不是没资本，因为自己干怪难看，快点合营吧！”有的看到报纸很不安心，表示“快点合营吧，那怕少赚点钱，心里也就踏实了。”有的资本家家属过去表现不好，现在也有了转变，鼓励丈夫自动提出减薪，为的是落个进步名。大华贸易行徐志光的老婆陈菊生就是如此。永明漆厂陈调甫的老婆路云裳不承认自己的丈夫有剥削，说是和丈夫勤俭起家，是正派资本家愿意采取四马分肥办法，认为定息对营业好的企业不利。","type":"paragraph"},{"text":"一部分资本家家属存有思想顾虑或有不满情绪。有的顾虑会减薪降低生活，有的顾虑丈夫职位的安排，怕丈夫调动工作。毕鸣歧的老婆戴翩英对毕减薪有顾虑，她准备把大女儿送给大老婆抚养，儿子住校，辞掉佣人，自己紧缩开支。只有股份没有劳力，过去依靠分红维持生活的家属顾虑最大，怕将来生活没保障。七区某资本家家属王淑英找到代表哭闹说：“人家有劳动力的，合营以后没问题，家属没劳动力的合营后不给分红，怎么生活呢?”北大车俱厂资本家家属顾虑丈夫七十多岁，合营后丈夫老了人家不要，生活怎么办？北洋车俱厂资本家家属的丈夫半身不遂，顾虑合营后公家会不要他。有的资方代理人家属顾虑合营后没工作。由于有以上这些顾虑，在合营时，资本家愿意安插老婆、孩子，资本家家属也愿进厂、店。小白楼新华百货商行资本家听说要合营，叫老婆每天到柜台上站一小时，将来好登上名字。有的不叫孩子上学，准备进工厂。","type":"paragraph"},{"text":"还有些资本家家属因为不能任意剥削而不满，如立章百货店资本家家属孙燕清，原来生活较好，现在一月收入几十元，她说：“现在是有一天混一天，买卖早晚是人家的。”有的过去可以长支，现在因受到限制而不满，和平牧场的资本家家属说：“有钱不敢动，替政府管着，有牛不顶事，有职工给看着。”有的因企业经营步入正规感觉不便的也表示不满。如五区一肉铺资本家家属说：“真难，天天晚上算账，差一个钱都不行。”丹华火柴厂副厂长老婆说：“都宣传合营好，一天到晚总开会，都快把老头累死啦。”由于家属本身的不满，少数资本家家属有拉后腿的现象。八区某竹铺经理的老婆阻拦丈夫参加学习。说：“不参加学习，不去赚那有数的钱去。”","type":"paragraph"}],"comments":[],"origin":"新华通讯社编《内部参考》1955年12月29日","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"474ad101c9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
