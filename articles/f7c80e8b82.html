鹏飞外长等到机场送行","authors":[],"dates":[{"year":1974,"month":9,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"出席联合国大会第二十九届会议"},{"type":"paragraph","text":"我国代表团团长乔冠华等离京赴纽约"},{"type":"paragraph","text":"邓小平副总理、姬鹏飞外长等到机场送行"},{"type":"paragraph","text":"新华社一九七四年九月二十五日讯  出席联合国大会第二十九届会议的中华人民共和国代表团团长、外交部副部长乔冠华，今天上午乘专机离开北京前往纽约。"},{"type":"paragraph","text":"同机离开的有代表团代表安致远、周觉，副代表张贤务、齐宗华、章含之，顾问田进、李松龄、俞孟嘉、伍仪瑜、徐尔维、徐宗熙，工作人员蒋正才、王守元、梅仁毅、薛建成。"},{"type":"paragraph","text":"到机场送行的有国务院副总理邓小平，外交部部长姬鹏飞，副部长仲曦东、王海容、何英，有关方面负责人唐闻生、杨琪良、王明修、张世杰、林平、秦加林、王晓云、张毅君、凌青、张占武、刘德培、张立垣、刘华、程远行等。"},{"type":"paragraph","text":"柬埔寨王国民族团结政府外交大臣沙林察，巴基斯坦驻中国大使阿尔维，德意志联邦共和国驻中国大使保尔斯，也到机场送行。"},{"type":"paragraph","text":"代表团副团长、中华人民共和国常驻联合国代表黄华，代表团代表庄焰，副代表邢松鹢、吴妙发，已在纽约。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"乔冠华","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f7c80e8b82"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
