tart":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席接见萨布里副总统夫人","authors":["钱嗣杰"],"parts":[{"type":"paragraph","text":"新华社十九日讯 毛泽东主席今天下午接见阿拉伯联合共和国副总统阿里·萨布里的夫人，同她进行了亲切友好的谈话。"},{"type":"paragraph","text":"参加接见的，有董必武副主席，周恩来总理，陈毅副总理的夫人张茜，中国驻阿联大使陈家康的夫人徐克立，外交部礼宾司副司长戴平。"},{"type":"paragraph","text":"接见时，阿联驻中国大使伊马姆和夫人也在座。"},{"type":"paragraph","text":"据新华社十九日讯 阿联驻中国大使伊马姆和夫人，为阿联阿里·萨市里副总统的夫人访问中国，今晚在大使馆举行宴会。"},{"type":"paragraph","text":"周恩来总理，陈毅副总理和夫人张茜，董必武副主席的夫人何莲芝，应邀出席了宴会，并且同阿里·萨市里副总统夫人热烈地交谈。"},{"type":"paragraph","text":"刚果（布）总统马桑巴一代巴的夫人也应邀出席了宴会。"},{"type":"paragraph","text":"出席宴会的，还有张奚诺和夫人杨景任，章汉夫和夫人龚普生，丁西林和夫人李逸，区棠亮，史良，许广平，兰英，罗叔章，胡子婴，张铁生，乐松生，以及中国驻阿联大使陈家康的夫人徐克立等。"},{"type":"paragraph","text":"非洲和亚洲国家驻中国的使节和他们的夫人也应邀出席了宴会。"},{"type":"paragraph","text":"十月十九日，毛泽东主席接见阿拉伯联合共和国副总统阿里·萨布里的夫人（左五）时合影。"},{"type":"paragraph","text":"新华社记者 钱嗣杰摄RW：毛泽东国家主席"}],"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"陈毅","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c505b9eca7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
