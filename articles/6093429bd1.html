":[{"year":1950,"month":11,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"瑞典国王古斯塔夫五世病逝"},{"type":"paragraph","text":"毛主席致电吊唁"},{"type":"paragraph","text":"【新华社一日讯】斯德哥尔摩讯：瑞典国王古斯塔夫五世于十月二十九日因病逝世。太子古斯塔夫·阿道尔夫已于三十日继位为古斯塔夫六世。"},{"type":"paragraph","text":"【新华社一日讯】瑞典王国国王古斯塔夫五世于十月二十九日逝世，其太子古斯塔夫·阿道尔夫于是日曾电我中央人民政府毛泽东主席报丧；毛主席于接获来电后，已复电致唁，两电原文如下："},{"type":"paragraph","text":"（一）古斯塔夫·阿道尔夫来电北京中华人民共和国主席阁下："},{"type":"paragraph","text":"我沉痛地通知阁下我亲爱的父亲古斯塔夫国王陛下已于今晨八时三十五分逝世。"},{"type":"paragraph","text":"古斯塔夫·阿道尔夫  斯德哥尔摩  二十九日十八时十分"},{"type":"paragraph","text":"（二）毛主席唁电瑞典王国古斯塔夫·阿道尔夫太子阁下："},{"type":"paragraph","text":"顷悉瑞典王国国王古斯塔夫五世陛下不幸逝世，谨致哀悼。"},{"type":"paragraph","text":"中华人民共和国中央人民政府主席毛泽东"},{"type":"paragraph","text":"一九五○年十月三十一日北京"},{"type":"paragraph","text":"又瑞典驻华大使阿马斯顿亦曾照会周恩来总理兼外交部部长报丧，周兼部长亦已函复阿马斯顿大使表示哀悼。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6093429bd1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
