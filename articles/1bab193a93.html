art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"要闻简报","authors":[],"parts":[{"type":"paragraph","text":"华国锋总理邓小平副总理等到日本驻华使馆吊唁大平首相逝世"},{"type":"paragraph","text":"国务院总理华国锋，副总理邓小平、谷牧、姬鹏飞十四日上午前往日本驻中国大使馆吊唁日本国首相大平正芳逝世。"},{"type":"paragraph","text":"上午十时许，华国锋、邓小平、谷牧、姬鹏飞来到使馆大厅，在大平首相的遗像前肃立默哀。"},{"type":"paragraph","text":"华国锋和邓小平分别在大使馆的留言簿上题了词。"},{"type":"paragraph","text":"华国锋的题词是：“深切悼念中国人民尊敬的朋友大平正芳先生，中国人民永远怀念他。”"},{"type":"paragraph","text":"邓小平的题词是：“大平先生是一个卓越的政治家，他为发展中日两国的关系，作出了重要的贡献，我们永远铭记着他。”"},{"type":"paragraph","text":"邓小平副总理会见亚当斯总理"},{"type":"paragraph","text":"国务院副总理邓小平十四日上午会见了巴巴多斯总理亚当斯。"},{"type":"paragraph","text":"邓小平对亚当斯说，中国同巴巴多斯虽然在地理上相距很远，但是我们两国还是相互了解的。亚当斯总理在谈话中对他和他率领的代表团在北京所进行的会谈和参观感到满意。"},{"type":"paragraph","text":"邓小平在谈到国际形势时说，当前对世界和平的主要威胁来自苏联。中国确定反对霸权主义、维护世界和平为自己的对外政策，这个政策既是为了中国人民本身的利益，也是为了全世界人民的利益。"},{"type":"paragraph","text":"会见后，邓小平副总理设午宴款待亚当斯总理和夫人等贵宾。（据新华社）"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"华国锋","type":"人物"},{"name":"谷牧","type":"人物"},{"name":"世界形势","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1bab193a93"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
