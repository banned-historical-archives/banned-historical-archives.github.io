script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"天津市科技战线深入开展反击右倾翻案风的斗争狠批党内不肯改悔的走资派散布的奇谈怪论","authors":[],"dates":[{"year":1976,"month":2,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社天津一九七六年二月二十七日电　在反击右倾翻案风步步深入的大好形势下，天津市科技战线的广大工人、干部和科技人员以文化大革命以来科技战线发生的巨大变化和取得的丰硕成果，深入批判党内不肯改悔的走资派在科技界鼓吹的奇谈怪论，有力地反击了右倾翻案风。"},{"type":"paragraph","text":"在反击右倾翻案风的斗争中，天津市科技战线的广大干部、工人和科技人员认真学习有关的社论和文章，大家认识到，科技界刮起的右倾翻案风与教育界的奇谈怪论，彼此配合，互相呼应，向无产阶级发动了猖狂进攻。现在越来越清楚地看出，这场斗争不是孤立的，偶然的。这股风的“风源”，就是坚持刘少奇、林彪修正主义路线、至今不肯改悔的党内走资派。他们的修正主义纲领就是“三项指示为纲”，他们的目的就是妄图改变党的基本路线，复辟资本主义。因此，他们挑起的这场斗争，决不只是教育质量高低、怎样实现“四个现代化”的争论，也不只是几个单位的领导权问题，而是关系到整个党会不会变修，整个国家会不会改变颜色的问题。对党内不肯改悔的走资派的猖狂挑衅，必须给以迎头痛击。全市各科研单位普遍召开了大型批判会，贴出了几千张大字报，掀起了回击右倾翻案风的热潮。许多工人和科技人员白天坚持工作，晚上学习批判，有的单位利用假日写大字报，召开批判会。天津皮革研究所只有九十多名职工，为了搞好革命大批判，他们把从报刊上收集到的右倾翻案风鼓吹者的五十多条奇谈怪论，针锋相对地运用马列语录和毛主席语录逐条进行批判，提高了理论水平和战斗力。为了更有力地批判党内不肯改悔的走资派，天津市科技局还举办了一九七五年天津市科技成果展览会，展览会以大量生动的事实热情歌颂了无产阶级文化大革命和毛主席的科技路线，有力地回击了科技界的种种奇谈怪论。"},{"type":"paragraph","text":"在大辩论中，天津市科学技术局、天津电气传动设计研究所、天津市药品检验药物研究所、天津焊接研究所、天津化工研究院、天津市针织技术研究所等单位的同志，从各个方面批判了“三项指示为纲”的修正主义纲领和党内不肯改悔的走资派在科技界散布的种种奇谈怪论。全市科技战线的广大工人、干部和科技人员表示，坚决紧跟毛主席的伟大战略部署，认真学习马列著作和毛主席著作，抓住要害，深刻揭露和彻底批判党内不肯改悔的走资派大肆鼓吹的修正主义纲领，戳穿它的欺骗性和反动性，把反击右倾翻案风的斗争进行到底。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"天津文革","type":"人物"},{"name":"革命大批判","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"777f660844"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
