authors":[],"dates":[{"year":1965,"month":6,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"刘少奇主席接见黎清毅副总理的时候说"},{"type":"paragraph","text":"中国人民将尽最大可能支援越南人民抗美救国"},{"type":"paragraph","text":"越南人民的抗美斗争是伟大的无产阶级国际主义的具体表现，有力地支援了中国人民，支援了社会主义阵营各国人民，支援了全世界一切革命的人民  黎清毅副总理说，越南人民决心同美帝打到底，直到战胜美帝"},{"type":"paragraph","text":"新华社三日讯　中共中央副主席、中华人民共和国主席刘少奇，今天下午接见了越南劳动党中央政治局委员、政府副总理黎清毅。在接见的时候，刘主席说：“中国人民将尽最大的可能，支援兄弟越南人民的抗美救国的正义斗争。”"},{"type":"paragraph","text":"刘少奇主席指出：“越南人民的抗美斗争是伟大的无产阶级国际主义的具体表现。你们有力地支援了中国人民，支援了社会主义阵营各国人民，支援了全世界一切革命的人民。”"},{"type":"paragraph","text":"黎清毅副总理在谈话中强调说，越南人民决心同美帝国主义打到底，直到战胜美帝国主义。"},{"type":"paragraph","text":"被接见的越南同志，还有越南劳动党中央委员、越南驻中国大使陈子平，越南劳动党中央候补委员、外贸部副部长李班。"},{"type":"paragraph","text":"中国方面参加接见的，有中共中央政治局候补委员、中央书记处书记康生，中央书记处书记罗瑞卿，中央委员伍修权，中央候补委员罗贵波、方毅。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"85a7c9c4e2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
