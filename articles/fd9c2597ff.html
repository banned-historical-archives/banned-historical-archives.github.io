宾参观中国人民革命军事博物馆历史综合馆","authors":[],"dates":[{"year":1977,"month":9,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e新华社北京一九七七年九月一日电　南斯拉夫共产主义者联盟主席、南斯拉夫社会主义联邦共和国总统约瑟普·布罗兹·铁托和随同铁托总统来访的南斯拉夫其他贵宾，今天晚上应邀观看了体育表演。"},{"type":"paragraph","text":"中共中央副主席叶剑英陪同观看体育表演，并在体育表演前同铁托总统举行了亲切友好的会见。"},{"type":"paragraph","text":"体育表演在首都体育馆举行。体育馆内灯火辉煌。晚上八时半，当铁托总统由叶剑英副主席陪同来到主席台时，全场一万八千名观众起立，长时间地热烈鼓掌，向南斯拉夫贵宾致意。"},{"type":"paragraph","text":"在乐曲声中举行了入场式。运动员们举着红旗，排成方队，迈着雄壮的步伐通过主席台。然后，运动员为贵宾们表演了体操、乒乓球、羽毛球和武术等中国传统体育运动项目。他们的精采表演，博得了全场一阵阵热烈的掌声。"},{"type":"paragraph","text":"陪南斯拉夫贵宾观看体育表演的还有外交部部长黄华、副部长余湛，国家体委主任王猛、第一副主任徐寅生等。"},{"type":"paragraph","text":"体育表演是由中华人民共和国体育运动委员会举办的。"},{"type":"paragraph","text":"今天上午，斯塔奈·多兰茨、韦利科·米拉托维奇、米洛什·米尼奇、埃米尔·卢德维盖尔博士等南斯拉夫贵宾，由中国人民解放军副总参谋长伍修权陪同，参观了中国人民革命军事博物馆历史综合馆。这个馆展出的大量图片和实物，反映了从红军初创到解放战争胜利这一历史时期，我军在毛主席革命路线指引下成长壮大的过程。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入7号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1977\\09\\7792010301.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e南斯拉夫共产主义者联盟主席、南斯拉夫社会主义联邦共和国总统约瑟普·布罗兹·铁托和随同铁托总统来访的南斯拉夫其他贵宾，九月一日晚由中共中央副主席叶剑英陪同观看体育表演。"},{"type":"paragraph","text":"新华社记者摄(传真照片)\u003c/FONT\u003e"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fd9c2597ff"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
