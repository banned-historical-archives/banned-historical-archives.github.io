[],"dates":[{"year":1967,"month":12,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"苏修全面复辟资本主义罪恶昭彰"},{"type":"paragraph","text":"日本资产阶级报纸拚命喝采叫好"},{"type":"paragraph","text":"据新华社讯　苏修领导集团在苏联国内全面彻底复辟资本主义的罪恶行径，受到帝国主义和各国反动派的夸奖。日本资产阶级报纸驻莫斯科的记者，最近就连续报道了今天苏联社会各个领域中的资本主义现象。从资产阶级报刊的喝采声中，人们也可以看出，勃列日涅夫、柯西金集团已经把苏联糟踏成什么样子。这伙十月革命道路的叛徒，绝逃脱不了历史的严厉审判！"},{"type":"paragraph","text":"日本《读卖新闻》最近在一篇报道中，赞扬勃列日涅夫、柯西金的“社会主义”同资本主义相比，只是“招牌不同，而内容相似”。"},{"type":"paragraph","text":"报道称赞勃列日涅夫、柯西金实行资本主义“利润原则的范围在不断扩大”，“金钱第一”。"},{"type":"paragraph","text":"报道说，“既然采用了利润方式，长期计划就越来越困难。同资本主义一样，要看每个时期的企业利润和国民消费的动向，来不断地调整经济。”"},{"type":"paragraph","text":"日本《东京新闻》称赞苏联“特权阶级”“实行利润优先、自由化的新经济政策”。"},{"type":"paragraph","text":"这家报纸说，苏联“国民中间的生活差距扩大了”。“在莫斯科，西红柿在夏季上市的时候，一公斤卖两个卢布。……基层工人要买一公斤西红柿，就必须付出一天的全部工资。然而在高级餐厅里，餐桌上堆满这样高价的西红柿，那些高薪的人们半天半天地享受着豪华的宴席。”"},{"type":"paragraph","text":"据《读卖新闻》报道，“在莫斯科有一条大街叫‘海鸥街’。这不是确有一条叫‘海鸥街’的街道，而是由于苏联的高级官员爱用的最高级‘海鸥牌’汽车经常通过这条街而得名。漆黑的‘海鸥牌’汽车，后窗挂着新窗帘，不论一出现在什么地方，只要警察一吹警哨，所有的人和车子就得全部停驶，让路给这种汽车。在这样的情况下，这种汽车便不顾什么交通规则飞驰而去。”"},{"type":"paragraph","text":"日本《产经新闻》赞扬说，“随着同西方的经济和文化的合作，资本主义的思想意识以各种方式钻进来了。‘美国之音’、‘英国广播公司’等西方的广播，只要打开半导体收音机，就可以轻松地听到。进口的爵士音乐录音带也上市了。住在莫斯科的许多外国人、街上排着的外国汽车、市场上泛滥的外国商品，对普通市民特别是对青年人的思想意识不知有多么大的影响”。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4ec65a3b84"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
