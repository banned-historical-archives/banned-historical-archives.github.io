script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"智利马普奇族农民用暴力占领大庄园  科尔查瓜五百个庄园的农业工人不定期罢工要求增加工资  美资犹他公司的智利工人罢工抗议资本家剥削和残害工人","authors":[],"dates":[{"year":1969,"month":8,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"智利马普奇族农民用暴力占领大庄园"},{"type":"paragraph","text":"科尔查瓜五百个庄园的农业工人不定期罢工要求增加工资"},{"type":"paragraph","text":"美资犹他公司的智利工人罢工抗议资本家剥削和残害工人"},{"type":"paragraph","text":"新华社二十八日讯  圣地亚哥消息：智利马列科省二百户约近千名马普奇族农民二十五日奋起斗争，用暴力占领了一座拥有土地四千二百公顷的庄园。"},{"type":"paragraph","text":"夺地的马普奇族农民要求把这个大庄园的土地永远分配给他们。"},{"type":"paragraph","text":"马普奇族人是世代居住在当地的居民，他们长期遭受帝国主义和大庄园主的残酷剥削和压迫，过着极为困苦的生活。"},{"type":"paragraph","text":"在科尔查瓜省和邻近地区，二十七日有近五百个庄园的六千名农业工人举行了不定期罢工，要求增加工资。"},{"type":"paragraph","text":"美国在智利的犹他公司的六百名工人，从二十五日起也举行罢工，要求这家掠夺智利铜矿资源的美国公司增加工资和改善工人劳动条件。"},{"type":"paragraph","text":"工人们对这家美国公司缺乏安全措施以致造成工人死亡的事故，感到十分愤怒。"},{"type":"paragraph","text":"智利首都圣地亚哥商业学校的学生，二十六日和二十七日凌晨占领了学校的建筑物。学生们在一星期以前就举行罢课，抗议反动的现行教育制度和要求改善学习条件。"},{"type":"paragraph","text":"据新华社讯　圣地亚哥消息：在智利出版的《马列主义事业》最近发表一篇文章，揭露美帝国主义对智利的疯狂掠夺与压榨。这篇文章说，近几十年来，美帝国主义通过投资，加紧对智利人民进行敲骨吸髓的剥削。"},{"type":"paragraph","text":"文章指出，外国资本主要是美国资本利用投资的渠道，从智利大肆攫取巨额利润。“从一九三七年到一九六八年，智利人民的掠夺者就从智利弄走了四十三亿九千零四十万美元。也就是说，近三十二年，外国帝国主义者每月从智利平均弄走一千一百多万美元。这意味着，同期每年汇往国外的利润平均为一亿三千七百二十万美元。”"},{"type":"paragraph","text":"文章指出，帝国主义者每投入一美元，就弄走三美元。又从这三美元中，拿出一美元做为“外资”进行再投资。"},{"type":"paragraph","text":"文章最后指出，智利人民只有摆脱美帝国主义的奴役，才能获得经济上的真正发展。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2def901091"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
