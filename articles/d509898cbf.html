" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"西安捐献运动中的几个问题","authors":[],"dates":[{"year":1951,"month":7,"day":4}],"is_range_date":false,"parts":[{"text":"西安捐献运动中的几个问题","type":"title"},{"text":"【西北总分社四日讯】目前西安市在捐献运动中存在着一些问题，主要是不少干部把捐献看成单纯“要钱”运动。在捐献中，有的干部只向有钱人做工作，觉得劳动人民只捐几千几百，“没大意思”，而不去进行宣传教育，其次，忽视了在增加生产的基础上进行捐献运动。对增产缺少具体组织工作，订立增产捐献计划时，往往由上而下统一规定，未经群众自下而上讨论；第三，对自觉自愿但须量力捐献的精神体会不够，如有的店员半月不吃菜；农民捐出土地改革中分得的牛；不少学生降低伙食，上街卖冰棍，卖扇子，甚至卖血(输血)；市教育界曾提出在半年内捐献“西安市教师号”战斗机一架，平均每人每月须捐出约两袋面粉，约为中、小学教师每月薪津的三分之一(现已自动停止)。此外，尚有干部捐出自己工作必须的手表、钢笔，或捐出包干费直到抗美援朝结束为止的现象。","type":"paragraph"},{"text":"上述问题已引起西安市各有关单位的注意。","type":"paragraph"}],"comments":[],"origin":"新华通讯社编《内部参考》1951年7月6日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d509898cbf"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
