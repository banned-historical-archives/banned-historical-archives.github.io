torical-archives/banned-historical-archives8/main/maoquanji9-2.pdf"],"article":{"title":"和军委电台部分同志的谈话","alias":"","parts":[{"type":"paragraph","text":"和军委电台部分同志的谈话！"},{"type":"paragraph","text":"（1936年12月25日）"},{"type":"paragraph","text":"革命嘛，总是难免走点弯路，总是要吃点苦的。如果有人因为吃了点苦，就不愿意在四方面军工作，那就不对了，四方面军也是党领导的军队嘛！我们干革命，就得听党的话，就要服从革命的需要，哪里需要我们，就到哪里去，革命事业嘛，总得有个分工，分到哪里，就在哪里战斗，不能挑挑拣拣。如果，认为革命工作有高低贵贱之分的话，那是不对的。"},{"type":"paragraph","text":"[1]在长征的路上被分配去左路军工作的军委电台的部分同志来到保安。由于张国焘的错误路线，他们走了许多冤枉路，吃了不少苦，觉得心里委屈，工作上不安心。毛泽东得知后便去驻地看望他们，同他们进行了亲切的交谈。这是毛泽东等和他们谈话的部分内容。"}],"authors":["毛泽东"],"dates":[{"year":1936,"month":12,"day":25}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":220,"page_end":220},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0d875be5a5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
