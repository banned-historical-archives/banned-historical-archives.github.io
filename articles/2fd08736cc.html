ical-archives/banned-historical-archives8/main/maoquanji16.pdf"],"article":{"title":"抗战中对大地主大资产阶级实行一拉一打政策","alias":"","parts":[{"type":"paragraph","text":"抗战中对大地主大资产阶级"},{"type":"paragraph","text":"实行一拉一打政策"},{"type":"paragraph","text":"（1941年6月28日）少奇同志："},{"type":"paragraph","text":"文日电悉，都是对的，都同意。惟在二段甲项内似有与乙项不调和的地方，请再检阅考虑一下。我们的抗日民族统一战线是包括一切还在抗日的大地主大资产阶级在内的，是全民族联盟，不但是工农小资产阶级联盟。在抗日一点上确是如此，在民主一点上则大地主大资产阶级是坚决的反对力量，但在我根据地内则大地主大资本家为保存其经济利益为向我作合法斗争亦可赞成我之民主政权。故在抗日过程中，不论在全国范围内在根据地内，除汉奸外，对大地主大资本家是一拉一打政策，拉其抗日，打其反共反民主，但目前拉还是主要的，打是辅助的，打是达到拉之手段。这一点与你在二段乙项中的意见是一致的，但与甲项似有些不调和，望加考虑为盼（在中国孤立大资产阶级与俄国孤立资产阶级不同，在中国只孤立其反共方面，在俄国则是绝对孤立政策)。对彭雪枫五月三日电的错误，我有一复电同时发给你，收到请告你的意见。"},{"type":"paragraph","text":"毛泽东六月二十八日"}],"authors":["毛泽东"],"dates":[{"year":1941,"month":6,"day":28}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":144,"page_end":144},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]},{"id":"wenji2","name":"毛泽东文集第二卷（1999）","type":"pdf","internal":false,"official":true,"author":"中央文献研究室","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/wenji2.pdf"],"article":{"title":"抗战中对大地主大资产阶级实行一拉一打政策","description":"根据手稿刊印。","dates":[{"year":1941,"month":6,"day":28}],"parts":[{"text":"抗战中对大地主大资产阶级实行一拉一打政策","type":"title"},{"type":"appellation","text":"少奇同志："},{"type":"paragraph","text":"文日电悉，都是对的，都同意。惟在二段甲项内似有与乙项不调和的地方，请再检阅考虑一下。我们的抗日民族统一战线是包括一切还在抗日的大地主大资产阶级在内的，是全民族联盟，不但是工农小资产阶级联盟。在抗日一点上确是如此，在民主一点上则大地主大资产阶级是坚决的反对力量，但在我根据地内则大地主大资本家为保存其经济利益为向我作合法斗争亦可赞成我之民主政权。故在抗日过程中，不论在全国范围内在根据地内，除汉奸外，对大地主大资本家是一拉一打政策，拉其抗日，打其反共反民主，但目前拉还是主要的，打是辅助的，打是达到拉之手段。这一点与你在二段乙项中的意见是一致的，但与甲项似有些不调和，望加考虑为盼（在中国孤立大资产阶级与俄国孤立资产阶级不同，在中国只孤立其反共方面，在俄国则是绝对孤立政策）。对彭雪枫五月三日电的错误，我有一复电同时发给你，收到请告你的意见。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"六月二十八日"}],"comment_pivots":[{"part_idx":2,"offset":2,"index":1},{"part_idx":2,"offset":341,"index":2}],"is_range_date":false,"authors":["毛泽东"],"comments":["文日，即十二日。","彭雪枫，当时任新四
