"dates":[{"year":1973,"month":7,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"邓小平、廖承志、王芸生"},{"type":"paragraph","text":"会见日本富山和熊本两县代表团"},{"type":"paragraph","text":"新华社一九七三年七月二十四日讯　国务院副总理邓小平，中日友协会长廖承志、副会长王芸生，今天上午会见了以日本富山县知事中田幸吉为团长、堀健治为副团长的友好访华代表团和以熊本县知事泽田一精为团长、平塚泰藏为副团长的促进日中友好交流代表团，同他们进行了友好的谈话。"},{"type":"paragraph","text":"参加会见的两县代表团的成员有：山田伊作、原谷敬吾、奥田荣助、田代由纪男、酒井善为、冈本笃。"},{"type":"paragraph","text":"日本驻中国大使小川平四郎参加了会见。"},{"type":"paragraph","text":"会见时在座的有孙平化、金苏城、王音、黄世明等。（附图片）"},{"type":"paragraph","text":"邓小平、廖承志、王芸生会见日本富山和熊本两县代表团，图为会见时合影。"},{"type":"paragraph","text":"新华社记者摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"廖承志","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ac5c49b648"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
