script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"美国资产阶级报刊  对裁军谈判散布悲观空气  说美国政府没有人认真看待裁军问题","authors":[],"dates":[{"year":1962,"month":3,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"美国资产阶级报刊"},{"type":"paragraph","text":"对裁军谈判散布悲观空气"},{"type":"paragraph","text":"说美国政府没有人认真看待裁军问题"},{"type":"paragraph","text":"新华社13日讯　华盛顿消息：日内瓦裁军会议前夕，美国资产阶级报刊这些天来正在对新的裁军谈判的前景散布悲观空气。"},{"type":"paragraph","text":"《纽约时报》在7日的一篇社论中强调，除非苏联接受美国旨在搜集国防情报的关于停止核试验和裁军的“监督”建议，裁军会议“一开始就会出现僵局”，“尽管（会议）所涉及的问题非常重大，但是会谈成功的希望并不光明”。"},{"type":"paragraph","text":"《纽约先驱论坛报》8日的社论也宣传，日内瓦会议“大概不会取得任何成就”，它“将以当前的核试验而开始，并且将以同样情况告终。”社论认为，即将举行的谈判“只不过是互相试探和判断对方目前的脾气罢了”。"},{"type":"paragraph","text":"这家报纸在12日的一篇评论中又说，“苏联对视察和监督的态度”是日内瓦裁军讨论的“障碍”之一。报纸提到由于美国政策造成的许多紧张地区。它说，“在世界上许多地区，东西方的互相冲突的利益有引起使用武力之势。在东南亚、老挝和南越，枪炮已经开了火。”评论认为，“在根本的分歧如此严重、如此深刻的时候，使裁军成为目的总是有某种不真实的味道。”"},{"type":"paragraph","text":"美国资产阶级评论家李普曼指出，除非苏联对美国作出让步，否则，“禁止核试验问题上的僵局是结结实实的，这个问题在目前是谈判不了的。”"},{"type":"paragraph","text":"《民族》周刊3日的社论也说，美国的“核战略家”不愿意他们的手脚被一项条约束缚，美国现在坚持把重点放在“视察”方面的建议，只能使人得出这样的结论，“即我们并不打算缔结禁止大气层核试验的协定”，美国“政府中没有一个人真正认真地看待裁军问题”。"},{"type":"paragraph","text":"《纽约时报》记者弗兰克耳4日从华盛顿发出的一篇报道说，“自从第二次世界大战结束以来，庞大的军事开支已成为（美国）国家经济的一个重要因素。因此一想到从联邦预算中取消这些开支就会担心发生大萧条。股票市场对‘和平恐慌’产生的反应是价格马上下跌，这反映了这种普遍抱有的怀疑：如果这个国家希望裁军，就不会不冒财政混乱的危险。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7921dd2082"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
