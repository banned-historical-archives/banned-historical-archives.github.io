s":[{"year":1956,"month":11,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"摆脱奴隶枷锁　开始新的生活"},{"type":"paragraph","text":"上万彝民安了家"},{"type":"paragraph","text":"新华社昭觉28日电　新华社记者于竞祁报道：四川省凉山彝族自治州已经有上万户奴隶在民主改革中得到自由迁入新居安家，开始了新的生活。"},{"type":"paragraph","text":"在最近几个月中，这个山区的许多村堡中连续出现了一座座盖着彝族“瓦板”（用刀剖的木板）或稻草的新土房。人们在迁入新居的时候，欢欣鼓舞地举行了“尔擦苏”的仪式，把浸过烧红石块的清水洒在屋内表示吉祥，有的还按照风俗买了少量的酒和邻人共饮。"},{"type":"paragraph","text":"这些得到自由以后生活上几乎一无所有的农民，完全依靠人民政府的关怀和劳动群众的协助而安家的。人民政府发给他们安家补助费，又发放了安家贷款和大批救济粮。同村的农民积极协助修建住屋，拿出自己多余的瓦板和木料来支援他们。昭觉县已经建成二百九十多座新房。这个县的苟娄乡四十多个无家可归的过去的奴隶，现在有了铁锅、木匙、背水桶等必需用具。每两户人有一头牛，很多人还有了鸡、猪等家畜。"},{"type":"paragraph","text":"雷波、金阳、呷洛等县同样情况的过去的奴隶，已经基本上都得到了安置。"},{"type":"paragraph","text":"许多人定居以后结了婚，只昭觉附城区结婚的就有八十多对。昭觉和温坝两所民族小学里，还有从前的奴隶的子女入了学。"},{"type":"paragraph","text":"今年，自治州在和平协商方式的民主改革中，解放了约四万“锅庄娃子”——彝族旧社会的奴隶阶层中完全丧失自由的人。这些安家的就是其中一部分无家可归的人。目前，还有一万个同样情况的人没有房屋，同时有一部分已经安家的还是集体居住，人民政府正在继续帮助他们修建房屋和添置用具。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"54563b6be0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
