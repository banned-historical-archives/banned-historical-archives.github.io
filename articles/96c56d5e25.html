art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"坚决消灭敢于来犯的侵略者","authors":["空军某部学习毛主席著作积极分子吴鹏富"],"parts":[{"type":"paragraph","text":"苏修叛徒集团八月十三日指使其军队蓄意入侵我新疆裕民县铁列克提地区，挑起新的流血事件，打死打伤我边防战士多人，，又欠下中国人民一笔血债。我们坚决拥护我国政府向苏联政府提出的强烈抗议照会，愤怒声讨苏修叛徒集团的滔天罪行。我们严正警告苏修叛徒集团：你们必须马上住手，停止挑衅，你们必须立即从中国领土上滚出去！"},{"type":"paragraph","text":"提起苏修心肺炸，仇恨入心要发芽。苏修叛徒集团接二连三挑起中苏边境冲突，一再制造流血事件。它策划所谓“亚洲集体安全体系”，拼凑“反华包围圈”。它疯狂扩军备战，大造侵略战争舆论，增兵中苏、中蒙边境，加紧对我国的侵略威胁。苏修叛徒集团这样猖狂反华，决没有好下场！"},{"type":"paragraph","text":"毛主席指出：“一切反动派都是纸老虎。”苏修叛徒集团表面上张牙舞爪，气势汹汹，其实骨子里虚弱得很，没有什么了不起的力量，是一只外强中干的纸老虎。用毛泽东思想武装起来的七亿中国人民和人民解放军，有决心有信心有力量坚决彻底消灭一切敢于来犯的侵略者，保卫我们伟大的社会主义祖国。我们一定坚决贯彻毛主席关于“备战、备荒、为人民”，“抓革命，促生产，促工作，促战备”的伟大方针，用实际行动狠狠地回击苏修侵略者。我们用毛泽东思想武装起来的空军战士，誓用鲜血和生命保卫祖国的万里长空。如果苏修、美帝胆敢来犯，定叫它们有来无回！"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"96c56d5e25"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
