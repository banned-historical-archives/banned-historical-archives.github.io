script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"政协全国委员会举行春节茶会  邓小平同志同大家一起欢度节日  乌兰夫讲话强调团结一致向前看，同心同德建设四化","authors":[],"dates":[{"year":1981,"month":2,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"政协全国委员会举行春节茶会"},{"type":"paragraph","text":"邓小平同志同大家一起欢度节日"},{"type":"paragraph","text":"乌兰夫讲话强调团结一致向前看，同心同德建设四化"},{"type":"paragraph","text":"新华社北京2月5日电  今天上午，全国政协礼堂三楼大厅里一片欢声笑语。中共中央副主席、政协全国委员会主席邓小平在政协全国委员会举行的春节茶会上同大家一起欢度节日，互祝新春愉快。"},{"type":"paragraph","text":"中共中央政治局委员、政协全国委员会副主席乌兰夫代表全国政协祝大家春节快乐，希望大家在新的一年里，继续大力贯彻三中全会的解放思想，实事求是，团结一致向前看的方针、路线，进一步发扬社会主义民主，向党和政府多多提出好的批评和建议。"},{"type":"paragraph","text":"他说，现在我们国家的经济形势很好，人民生活有所改善。在政治方面，我们进一步巩固和发展了安定团结、生动活泼的局面，党的优良传统和作风正在得到逐步恢复和发扬。当然，我们还有困难，但党和政府已经正确地总结了正反两方面的经验，下决心从根本上摆脱“左”的思想对我们经济工作的影响，要在经济上实行进一步调整，在政治上实现进一步安定，只要全党全军全国各族人民，在党的领导下，同心同德，群策群力，坚定不移地贯彻执行三中全会的路线、方针、政策，我们的经济建设肯定会稳步前进，一个高度民主、高度文明的四个现代化的社会主义强国一定能建成，台湾一定能够早日归回祖国。"},{"type":"paragraph","text":"邓颖超、彭冲、许德珩、朱蕴山、史良、刘澜涛、陆定一、康克清、季方、周建人、胡子昂、何长工、肖克、程子华、杨秀峰、周培源，在京的政协全国委员会常务委员、委员，部分人大常委，各民主党派和全国工商联的负责人，以及中央有关部门负责人等共四百多人出席了茶会。首都文艺工作者在茶会上演出了精采的文艺节目。（附图片）"},{"type":"paragraph","text":"政协全国委员会举行春节茶会。这是邓小平、缪云台、史良、彭冲在茶会上互相祝贺春节。"},{"type":"paragraph","text":"新华社记者摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dc8702d117"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
