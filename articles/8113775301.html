"康生"],"dates":[{"year":1967,"month":3,"day":8}],"is_range_date":false,"parts":[{"text":"康生对中华全国总工会的指示","type":"title"},{"text":"康生","type":"authors"},{"text":"〖康生同志对中华全国总工会工人文工团毛泽东思想红卫兵、毛泽东思想宣传队、红旗公社、全总机关《国际红旗》公社等四个组织主办的\"红旗\"第一期上发表的《揪出反革命两面派刘宁一》（康生同志在该标题前面打了个大问号）一文的批语〗","type":"appellation"},{"text":"刘宁一同志不是反党反毛主席反社会主义的三反分子，他不是刘邓资产阶级司令部的人。把刘宁一同志诬蔑为反革命分子，并且到处散发，这是完全错误的，是别有用心的。刘宁一同志不是\"三和一少\"路线的制定者，相反，宁一同志是首先揭露和反对\"三和一少\"的人。此报诬蔑宁一同志是\"三和一少，路线的制定者和忠实执行者\"，这完全是颠倒黑白，混淆是非，是替真正制定\"三和一少\"的人打掩护。","type":"paragraph"},{"text":"此报盗用《红旗》党刊主席的题字，作此报的报头，制造混乱，鱼目混珠。我将这些意见写给了富春同志，富春同志已写信给全总写这篇文章的四个组织。信的内容可问富春同志。","type":"paragraph"},{"text":" 康生一九六七年三月八日","type":"paragraph"}],"comments":[],"origin":"1967年4月北京玻璃总厂红卫兵联络站编《中央首长讲话（3）》。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"康生","type":"人物"},{"name":"刘宁一","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8113775301"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
