ical-archives/banned-historical-archives8/main/maoquanji26.pdf"],"article":{"title":"南京方面和平协定须于二十日前表态","alias":"","parts":[{"type":"paragraph","text":"南京方面和平协定须于二十日前表态\""},{"type":"paragraph","text":"（1949年4月17日）"},{"type":"paragraph","text":"【新华社北平十七日电】今日为和平谈判的第十七天。四月一日至十二日，中共代表团与南京代表团经过频繁的接触和交换意见，拟定了国内和平协议章案。十三日，双方代表在故营举行正式会议，中共代表团说明了中共的立场和协议草案的理由，南京代表团对协议草案表示了自己的立场和意见。十五日，双方举行第二次正式会议，中共代表团将最后修正草案交付南京代表团。协议全文为八条二十四款，不但采纳了南京代表团方面的意见，各民主党派的领袖人物亦从旁积极提供了意见。中共代表团于十五日的双方会议上宣布：谈判以四月二十日为限期，南京代表是否愿意于协定上签字，须于二十日以前表示态度，四月二十日为签字日期。十六日上午十一时，南京代表团派遣黄绍站代表及屈武顾问飞南京，向南京政府请示，现正等候南京的答复。"}],"authors":["毛泽东"],"dates":[{"year":1949,"month":4,"day":17}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":290,"page_end":290},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"35521db742"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
