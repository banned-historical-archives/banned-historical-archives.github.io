代修正主义支持印度尼西亚右派迫害进步力量","authors":[],"dates":[{"year":1966,"month":3,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"阿尔巴尼亚保卫和平委员会发表声明"},{"type":"paragraph","text":"制止印度尼西亚反动派的法西斯审讯"},{"type":"paragraph","text":"谴责美帝和现代修正主义支持印度尼西亚右派迫害进步力量"},{"type":"paragraph","text":"新华社地拉那十日电　阿尔巴尼亚报纸十日登载了阿尔巴尼亚保卫和平委员会的声明，要求制止印度尼西亚反动派在美帝国主义者的唆使下对进步组织、爱国者和民主人士进行恐怖活动和法西斯的审讯。"},{"type":"paragraph","text":"声明揭露在印度尼西亚反动势力制造恐怖局面的背后有着美帝国主义的魔爪，因为美帝国主义总是企图使印度尼西亚离开维护和巩固民族独立、奉行反帝反殖政策的道路，从而把印度尼西亚置于美国新殖民主义的统治之下。"},{"type":"paragraph","text":"声明说，印度尼西亚所有进步组织、爱国者和民主人士过去和现在一直在对这种蹂躏印度尼西亚人民切身利益、主权和民族独立的图谋进行坚决的斗争，所以，他们现在成了得到帝国主义和现代修正主义支持的印度尼西亚反动势力进行迫害和实行法西斯恐怖的对象。声明说，阿尔巴尼亚和平战士坚决谴责印度尼西亚右派势力实行的恐怖和美帝国主义及其走狗对印度尼西亚人民和他们的进步组织所策划的阴谋，要求立即停止对进步人士的迫害。"},{"type":"paragraph","text":"声明最后说，阿尔巴尼亚和平战士完全确信，印度尼西亚人民和和平战士所维护的正义事业必将取得胜利。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4c9160f84e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
