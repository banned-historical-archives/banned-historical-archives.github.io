art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"我的书架大声发言","authors":["喻晓"],"parts":[{"type":"paragraph","text":"我的书架，琳琅满目。呵，文化大革命的斗争风雨，给我们带来了多少新书。"},{"type":"paragraph","text":"打开书，我听见向走资派战斗的雄壮《序曲》；打开书，我看见革命造反派《迎着朝阳》，精神抖擞。"},{"type":"paragraph","text":"哪个时代呵，曾记下这样壮阔的社会主义革命步伐？又有哪个时代，曾留下这样多的铁人风貌和学大寨记录？"},{"type":"paragraph","text":"要知道历史的真实吗？这儿有《评〈水浒〉》、《法家著作选注》；要了解新的一代吗？这儿有《理想之歌》、《征途》……"},{"type":"paragraph","text":"写儒法斗争，壁垒分明，激扬千古！写教育革命，两军对战，雷啸火呼！"},{"type":"paragraph","text":"谱战地新歌，金声玉振，穿云破雾！抒边防豪情，红心赤胆，降龙伏虎！"},{"type":"paragraph","text":"每一页书，都是鼓满东风的帆；每一个字，都是催人前进的鼓！"},{"type":"paragraph","text":"书中走出英雄来，书中描出幸福路，书中一代新闯将，书中自有开山斧！"},{"type":"paragraph","text":"书页上，闻得出工农兵的汗香；书页里，听得见时代的雷霆脚步！"},{"type":"paragraph","text":"啊！我的书架，一幅巨大的画布，无产阶级纵情挥笔，绘出灿烂的画图！"},{"type":"paragraph","text":"啊！我的书架，象春天的园圃，金色的阳光下，开出鲜花簇簇。"},{"type":"paragraph","text":"啊！我的书架，象那蓬勃生长的大树，沐浴着文化大革命的春风春雨，硕果累累，香满万户！"},{"type":"paragraph","text":"谁说样板戏“阻碍文艺创作的发展”？眼前分明是百花争妍、新人辈出！我的书架要站出来大声发言，彻底清除邓小平撒布的迷瘴毒雾！"}],"alias":""},"tags":[{"name":"教育革命","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"儒法斗争","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fd98588884"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
