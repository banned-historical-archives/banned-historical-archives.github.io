script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"周恩来联络员传达总理关于吴波问题的三点意见及吴波认罪书","authors":["周恩来"],"dates":[{"year":1967,"month":8,"day":28}],"is_range_date":false,"parts":[{"text":"周恩来联络员传达总理关于吴波问题的三点意见及吴波认罪书","type":"title"},{"text":"周恩来","type":"authors"},{"text":"〖吴波为财贸党委付书记，财政部党组付书记，财政部付部长。〗","type":"appellation"},{"text":"8月28日上午，周总理联络员郑凯同志给财政部革命造反司令部电话传达了三点意见：","type":"paragraph"},{"text":"一、关于看吴波档案材料，请你们赶快写报告，报军管会，由军管会赶快报上来，我支持你们，协助你们，越快越好。","type":"paragraph"},{"text":"二、关于吴波撤职问题，这事总理还要报中央讨论决定，但这不妨碍你们搞。","type":"paragraph"},{"text":"三、你们今天下午开完会后，把吴波交给军管会，今后你们什么时候要，问军管会要，放在你们手里容易引起两派争论","type":"paragraph"},{"text":"附：","type":"paragraph"},{"text":"吴波认罪书","type":"subtitle"},{"text":"一九三一年十月我在伪国民党救济水灾委员会驻湘办事处工作，在专员赵守钰不在的时候，曾代表赵守钰召集地方绅士开过一次讨论救灾的会议，其中有……电告县属匪氛猖獗，账务繁重，要求派人接替，经过讨论，当时决定请清乡司令部派队清剿。电报中说的“匪氛”实际是红军的活动，请清乡司令部清剿，就是镇压共产党。这件事，我在参加革命队伍时没有交代。此次经过井冈山公社革命战士调查出来，我甘心认罪。","type":"paragraph"},{"text":" 吴波八月廿六日","type":"paragraph"}],"comments":[],"origin":"1967年8月31日红代会清华井冈山一部第三动态组编《动态》第137期","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d770b85369"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
