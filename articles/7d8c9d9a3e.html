art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"关于一九七四年中国无偿供应柬埔寨军事装备物资协定在北京签字西哈努克亲王和夫人、宾努首相和夫人、乔森潘副首相、英·萨利特别顾问国党政领导人周恩来、叶剑英、李先念、陈锡联、苏振华等参加签字仪式","authors":[],"parts":[{"type":"paragraph","text":"新华社一九七四年五月二十六日讯 中华人民共和国政府和柬埔寨王国民族团结政府关于一九七四年中国无偿供应柬埔寨军事装备物资协定，今天下午在北京签字。"},{"type":"paragraph","text":"柬埔寨国家元首、柬埔寨民族统一阵线主席诺罗敦·西哈努克亲王和夫人，柬埔寨民族统一阵线中央政治局主席、王国民族团结政府首相宾努亲王和夫人，柬埔寨民族统一阵线和王国民族团结政府代表团团长乔森潘副首相、副团长英·萨利特别顾问，参加了签字仪式。"},{"type":"paragraph","text":"我国党政领导人周恩来、叶剑英、李先念、陈锡联、苏振华参加了签字仪式。"},{"type":"paragraph","text":"李先念副总理、乔森潘副首相分别代表本国政府在协定上签字。"},{"type":"paragraph","text":"柬埔寨方面参加签字仪式的还有："},{"type":"paragraph","text":"柬埔寨代表团团员英·蒂丽大臣、狄奥尔副大臣、笃坎敦大使；"},{"type":"paragraph","text":"柬埔寨民族统一阵线中央政治局委员、候补委员和王国民族团结政府成员沙林察、周成、江裕朗、杨森安、谢桑、秀蒲拉西、吉春。"},{"type":"paragraph","text":"中国方面参加签字仪式的还有耿飚、姬鹏飞、刘湘屏、肖劲光、张才千、韩念龙、申健、姚依林、韩宗正、魏伯亭、张贤约、马宁、孔照年、路奎、康矛召。（附照片）"},{"type":"paragraph","text":"李先念副总理和乔森潘副首相分别代表本国政府在协定上签字。（新华社记者 摄）"}],"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"叶剑英","type":"人物"},{"name":"李先念","type":"人物"},{"name":"陈锡联","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7d8c9d9a3e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
