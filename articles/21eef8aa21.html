ical-archives/banned-historical-archives0/main/maoquanji31.pdf"],"article":{"title":"对朱德关于加强党的纪律检查工作的报告的批语","alias":"","parts":[{"type":"paragraph","text":"吊乔巴山逝世致布曼增迪电"},{"type":"paragraph","text":"（1952年1月27日）蒙古人民共和国大呼拉尔主席团主席布曼增迪同志："},{"type":"paragraph","text":"惊悉蒙古人民共和国部长会议主席乔巴山元师的逝世，我谨代表中华人民共和国政府和人民向您及蒙古人民共和国政府和人民表示沉痛的哀悼。乔巴山元师是蒙古人民伟大的领袖，蒙古人民革命杰出的领导者与组织者，他的逝世不仅是蒙古人民极大的损失，也是世界和平民主阵营的损失。乔巴山元师在反对日本帝国主义战争中给予中国人民的援助，将在中国人民的心中永垂不朽。"},{"type":"paragraph","text":"中华人民共和国中央人民政府主席毛泽东"},{"type":"paragraph","text":"一九五二年一月二十七日于北京"}],"authors":["毛泽东"],"dates":[{"year":1952,"month":1,"day":27}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":310,"page_end":310},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"21eef8aa21"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
