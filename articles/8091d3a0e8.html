苏联没有采取措施防止资本主义复辟，因而被修正主义分子篡夺了无产阶级政权","authors":[],"dates":[{"year":1967,"month":9,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"尼泊尔青年欢呼我国文化大革命取得光辉胜利"},{"type":"paragraph","text":"中国文化大革命是对世界革命人民的巨大鼓舞"},{"type":"paragraph","text":"苏联没有采取措施防止资本主义复辟，因而被修正主义分子篡夺了无产阶级政权"},{"type":"paragraph","text":"新华社加德满都五日电　尼泊尔青年欢呼伟大领袖毛主席亲自发动和领导的中国无产阶级文化大革命取得的光辉胜利，是“对一切革命人民的鼓舞”。"},{"type":"paragraph","text":"两个尼泊尔青年向新华社记者发表谈话说：毛泽东思想——当代的马克思列宁主义——是全世界所有革命人民的伟大力量。"},{"type":"paragraph","text":"他们说，中国的反革命修正主义分子千方百计企图在中国复辟资本主义。但是，最伟大的领袖毛泽东主席领导中国人民及时地开展了文化大革命。这场文化大革命是对中国的赫鲁晓夫及其追随者以及一切修正主义分子和反动派的有力打击。毛主席领导的这场文化大革命给予全世界革命人民巨大的力量。"},{"type":"paragraph","text":"他们说，苏联因为没有采取措施防止资本主义复辟，经过无数苏联人民的牺牲取得的无产阶级政权被反革命修正主义分子夺去了。"},{"type":"paragraph","text":"这两位青年说：“中国人民在文化大革命中取得的胜利，是对一切革命人民的鼓舞。”"},{"type":"paragraph","text":"他们表示：“尼泊尔人民始终尊敬中国人民，并将始终同他们一起为反对帝国主义、修正主义和反动派而战斗。”"},{"type":"paragraph","text":"另一位尼泊尔青年说：“中国无产阶级文化大革命越来越鼓舞着全世界革命人民。”他说：“伟大的领袖毛主席的战无不胜的思想一直在指导和鼓舞着世界革命人民进行反对美帝国主义、苏联现代修正主义和一切反动派的斗争。”"},{"type":"paragraph","text":"他高呼：“毛主席万岁！毛主席万寿无疆！”“中国无产阶级文化大革命万岁！”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8091d3a0e8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
