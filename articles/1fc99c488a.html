art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"赵紫阳同李钟玉举行首次会谈","authors":[],"parts":[{"type":"paragraph","text":"据新华社1月10日讯 国务院总理赵紫阳同朝鲜民主主义人民共和国政务院总理李钟玉今天下午在人民大会堂举行了首次会谈。"},{"type":"paragraph","text":"据外交部有关人士说，会谈在同志式的亲切友好的气氛中进行。会谈中，李钟玉总理邀请赵紫阳总理在他认为方便的时候访问朝鲜。赵紫阳愉快地接受了邀请。他说，朝鲜人民是我们的亲密朋友，我很愿意有机会去朝鲜参观学习。李钟玉还向中国同志介绍了朝鲜当前的政治、经济形势。"},{"type":"paragraph","text":"会谈开始时，李钟玉总理首先转达了金日成主席对华国锋、叶剑英、邓小平、李先念等中央领导同志的亲切问候。"}],"alias":""},"tags":[{"name":"赵紫阳","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1fc99c488a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
