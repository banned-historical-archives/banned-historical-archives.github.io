ical-archives/banned-historical-archives8/main/maoquanji23.pdf"],"article":{"title":"对敌援军宜先打十八师","alias":"","parts":[{"type":"paragraph","text":"对敌援军宜先打十八师！！"},{"type":"paragraph","text":"（1947年11月11日）彭、张："},{"type":"paragraph","text":"对敌援军先打何部，日内即须决定。邓宝珊?在扎萨克未动，所谓十七师及西安空运部队似均虚张声势，至多不过三五千人，在十八师接近榆城之前，该部亦不敢迫近榆城。十八师则有于十四日接近榆城可能。因此，我军似宜确定打十八师，先歼其一个旅，再歼余部，望酌定。打十八师须携带数天粮食。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"十一日十二时"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军委起草的给西北野战军司令员兼政治委员彭德怀和副司令员张宗逊的电报。"},{"type":"paragraph","text":"[2]邓宝珊，当时任国民党军晋陕绥边区总部总司令。"},{"type":"paragraph","text":"[3]扎萨克，旧旗名，1959年与郡王旗合并为内蒙古自治区伊金霍洛旗。"}],"authors":["毛泽东"],"dates":[{"year":1947,"month":11,"day":11}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":394,"page_end":394},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"43b52195c5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
