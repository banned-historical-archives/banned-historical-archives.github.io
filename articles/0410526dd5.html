tart":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"做坚持党性根绝派性带头人某团组织干部学习叶剑英同志国庆讲话中对干部的三条要求","authors":["张声光/马伟民"],"parts":[{"type":"paragraph","text":"本报讯 驻守在东海前哨的南京部队某团党委，最近组织排以上干部，着重学习和讨论了叶剑英同志在国庆讲话中对各级领导干部提出的三条要求，认清消除派性，增强党性的重要意义。"},{"type":"paragraph","text":"叶剑英同志在讲话中指出，“关于对干部的要求，我们坚决遵照党和毛泽东同志历来规定的标准。在当前，对各级领导干部要特别强调三条：一是坚决拥护党的政治路线和思想路线；二是大公无私，严守法纪，坚持党性，根绝派性；三是有强烈的革命事业心和政治责任心，有胜任工作的业务能力。”大家认为，这三条要求是衡量我们每个干部的一把尺子，也是当前选拔、考察、培养干部的标准。在学习讨论中，许多同志谈到，我们军队干部必须以身作则，坚持党性，彻底肃清林彪、“四人帮”的流毒。"},{"type":"paragraph","text":"守备三连指导员赵代富结合连队建设的实际，谈了坚持党性、根绝派性的重要意义。过去，这个连有的干部由于有老乡观念，办事不能出以公心，话说不到一块，劲使不到一起，严重影响了连队建设，是个“老大难”单位。今年以来，经过整顿领导班子，干部破除了老乡观念，大公无私，团结一心，拧成了一股绳，战士的精神面貌焕然一新，连队建设蒸蒸日上，一跃变为先进连队。他说，一个连队是这样，一个国家也同样。“敲锣卖糖，各管一行”，必然会妨碍同心同德、聚精会神搞四化。"},{"type":"paragraph","text":"大家联系正反两方面的经验教训，认真学习讲话，越来越清楚地看到了派性的危害，决心做根绝派性的带头人。"},{"type":"paragraph","text":"（张声光、马伟民）"}],"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"派性","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0410526dd5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
