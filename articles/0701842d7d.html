","authors":[],"dates":[{"year":1976,"month":8,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"参加珍宝岛自卫反击战的英雄模范人物联系自身的战斗经历"},{"type":"paragraph","text":"批判邓小平在军队建设上的谬论"},{"type":"paragraph","text":"新华社沈阳一九七六年八月十九日电　参加珍宝岛自卫反击战的战斗英雄、战斗功臣，联系自身的战斗经历，批判邓小平的以“整顿”为纲和“打钢仗”的反动谬论，决心沿着毛主席的建军路线胜利前进。"},{"type":"paragraph","text":"这些参加一九六九年三月珍宝岛自卫反击战的英雄模范人物，总结他们的战斗经验，都有这样的共同体会：真正强大的力量不是一两件新式武器，而是具有高度政治觉悟的革命战士。只要坚决贯彻执行毛主席的无产阶级建军路线，紧紧抓住阶级斗争这个纲，用无产阶级政治统帅军事，发扬人的决定因素，就能打败敌人。对于邓小平宣扬的以“整顿”为纲和“打钢仗”的等等谬论，他们很快就看出它是修正主义的货色，并坚决进行了抵制。在批邓、反击右倾翻案风的斗争中，他们又联系亲身参加珍宝岛自卫反击战的经历，痛斥邓小平的资产阶级军事观点。"},{"type":"paragraph","text":"这里介绍的是几篇战斗英雄和战斗功臣的批判文章。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0701842d7d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
