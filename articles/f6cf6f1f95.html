参加了大会","authors":[],"dates":[{"year":1967,"month":6,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　上海新闻界革命造反委员会二十四日举行“高举毛泽东思想伟大红旗，彻底批判修正主义新闻路线大会”。"},{"type":"paragraph","text":"正在上海参观访问的参加亚非新闻工作者协会书记处第五次全体会议的部分代表参加了大会。"},{"type":"paragraph","text":"会上，文汇报、解放日报、新华社上海分社、上海晚报的无产阶级革命派代表，和解放军、工人代表，以大量事实揭发了党内最大的走资本主义道路当权派及受他指使的一小撮反革命修正主义分子，篡夺报纸的领导权，大肆宣扬资本主义、修正主义的一套，为复辟资本主义制造舆论的滔天罪行。同志们一致表示，要彻底肃清党内最大的一小撮走资本主义道路当权派在新闻界散布的流毒，让毛泽东思想占领整个新闻阵地，使报纸真正成为无产阶级专政的工具。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f6cf6f1f95"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
