script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"在法西斯军人政权残酷剥削下  印尼农民灾难深重","authors":[],"dates":[{"year":1968,"month":6,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"在法西斯军人政权残酷剥削下"},{"type":"paragraph","text":"印尼农民灾难深重"},{"type":"paragraph","text":"据新华社讯　雅加达消息：印度尼西亚苏哈托—纳苏蒂安法西斯军人政权对广大农民进行野蛮的法西斯统治和残酷的封建剥削，使印尼农民蒙受深重的灾难。"},{"type":"paragraph","text":"据印尼反动报纸《每日新闻》在一则消息中透露，爪哇各地反动当局的各种机构，炮制许多命令和条例，向农民征收名目繁多的苛捐杂税，如出售农副土产要交土产税，甚至造渔塘也要交纳税款。由于遭受各种剥削和赋税奇重，农民生产的产品的百分之八十五被剥夺了。"},{"type":"paragraph","text":"据《印尼人民之声》四月份一期报道，印尼法西斯军人政权为了对农村进行法西斯军事统治，在爪哇各地把非军人乡长普遍换成军人乡长，并建立了反革命的地主武装。另据印尼反动报纸《社会使者报》透露，法西斯军人出身的乡长，既是法西斯军人政权在乡村的军政头目，又是农村的地主，他们对农民进行着更加残暴的封建剥削。他们的土地，完全是用“无偿劳役”的办法，强迫贫农替他们耕种。"},{"type":"paragraph","text":"在印尼法西斯军人政权敲骨吸髓的残酷压榨下，印尼农民的处境极为悲惨。目前，农村饥荒越来越严重，饥饿水肿病蔓延，到处有饿死人的现象。据印尼《海涛报》透露，在北加浪岸郊区，少数上层人家吃大米，中层人家吃玉米，广大贫农家庭没有固定的粮食，常以香蕉茎、木瓜茎充饥。另据印尼官方喉舌安塔拉通讯社透露，西爪哇茂物班达尔查蒂区一个乡村，有二百多人患了饥饿水肿病。楠榜县一个村庄就饿死四十九人。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"27623f19e2"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
