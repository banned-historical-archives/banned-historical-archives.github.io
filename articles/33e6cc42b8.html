ical-archives/banned-historical-archives0/main/maoquanji31.pdf"],"article":{"title":"接受巴基斯坦大使罗查呈递国书时的答词","alias":"","parts":[{"type":"paragraph","text":"接受巴基斯坦大使罗香"},{"type":"paragraph","text":"呈递国书时的答词"},{"type":"paragraph","text":"（1951年11月12日）大使先生："},{"type":"paragraph","text":"我很高兴地接受贵大使呈递的大不列颠爱尔兰暨英国海外诸自治领国王的国书，并感谢贵大使的祝贺。"},{"type":"paragraph","text":"中巴两国人民间存在着长期的友谊。在促进两国经济、文化关系的发展及争取亚洲及世界的持久和平上，贵我两国人民有着共同的愿望。中巴两国外交关系的建立，不但将使两国人民间的友谊日益增进与巩固，而且必将有助于亚洲及世界的和平与安定。"},{"type":"paragraph","text":"我热烈地欢迎阁下出任巴基斯坦驻中华人民共和国首任特命全权大使，并愿对贵大使加强两国友好合作的工作，予以协助。"},{"type":"paragraph","text":"谨祝贵国国家繁荣，人民兴旺，并祝贵国元首健康。"}],"authors":["毛泽东"],"dates":[{"year":1951,"month":11,"day":12}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":61,"page_end":61},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"33e6cc42b8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
