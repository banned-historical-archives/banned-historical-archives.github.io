华大学井冈山红卫兵筹备建立委员会"],"dates":[{"year":1966,"month":9,"day":28}],"is_range_date":false,"parts":[{"text":"井冈山红卫兵第三号决议","type":"title"},{"text":"清华大学井冈山红卫兵筹备建立委员会","type":"authors"},{"text":"成立原因","type":"paragraph"},{"text":"为什么要成立井冈山红卫兵？","type":"paragraph"},{"text":"在全国内，十六条的贯彻，遭到极大的阻力，革命造反精神没有得到充分发扬。","type":"paragraph"},{"text":"北京是如此，清华园内更是如此。","type":"paragraph"},{"text":"清华园内，清华大学红卫兵忠实地执行工作组的形“左”而实右的路线。毛泽东思想红卫兵则不敢抵制这条错误路线，使得这样一条错误路线畅通无阻。在八·二四以后充分暴露了他先天不足的软弱性。","type":"paragraph"},{"text":"为了坚决地抵制，反对这条形“左”实右的路线，坚决把无产阶级文化大革命进行到底，彻底完成毛主席交给我们的一斗二批三改的伟大任务。","type":"paragraph"},{"text":"我们向清华大学全体革命师生员工郑重宣告：","type":"paragraph"},{"text":"清华大学井冈山红卫兵诞生了！他在无产阶级文化大革命的洪流中开航了。","type":"paragraph"},{"text":"让我们高声欢呼，举起你的双手欢迎它吧！","type":"paragraph"},{"text":"最后的胜利属于我们，未来的世界是属于我们的！","type":"paragraph"},{"text":"敬爱的领袖毛主席万岁！万岁！万万岁！","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0604bf4145"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
