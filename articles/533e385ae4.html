实行军管的决定","authors":[],"dates":[{"year":1967,"month":12,"day":9}],"is_range_date":false,"parts":[{"text":"中共中央、国务院、中央军委、中央文革小组关于公安机关实行军管的决定","type":"title"},{"text":"各大军区、省军区、各省、市，自治区革命委员会（筹备小组），军管会：","type":"appellation"},{"text":"各地公、检、法机关是专政工具之一，现在不少地方公、检、法机关造反派一方面作为革命群众组织与地方上革命群众组织进行串联和联合行动，另一方面又作为专政机关执行专政职能。这种混淆两种职能的情况是不利于无产阶级文化大革命顺利进行的。因此，现作如下决定：","type":"paragraph"},{"text":"一、现在各地多数公安机关（包括公、检、法、下同）实行了军事管制，还有少数公安机关没有实行军管。为了有利于当前无产阶级文化大革命的进行，为了有利于今后按照毛主席的无产阶级革命路线改造公安机关，凡未实行军管的，应一律实行军管。","type":"paragraph"},{"text":"二、为了防止各地公安机关档案的丢失或转移，一律由人民解放军接管。","type":"paragraph"},{"text":"三、各地公安机关不论由机关内部或外部造反派已经夺权的，仍应实行军事管制。在军管实行后，外部造反派应立即退出公安机关，不再到公安机关进行串联； 内部造反派应按行政系统接受军管委员会或军代表的领导，不许进行内外串联，只在内部协助军管委员会或军代表进行革命运动和业务工作。","type":"paragraph"}],"comments":[],"origin":"根据中共中央办公厅、国务院秘书厅文化革命联合接待室编印《无产阶级文化大革命有关文件汇集 （第五集）》， 北京：1968年1月","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"中央文革","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"533e385ae4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
