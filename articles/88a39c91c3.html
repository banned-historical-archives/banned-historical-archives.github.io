script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"武汉军区司令员杨得志同志在“七·二〇事件”平反大会上的讲话","authors":[],"dates":[{"year":1978,"month":11,"day":28}],"is_range_date":false,"parts":[{"text":"武汉军区司令员杨得志同志在“七·二〇事件”平反大会上的讲话","type":"title"},{"text":"同志们：","type":"paragraph"},{"text":"经英明领袖华主席和以华主席为首的党中央批准，1967年在武汉发生的“七·二〇事件”彻底平反了。中央这个决定，搬掉了长期以来压在全省军民头上的一块大石头，充分反映了广大革命群众的强烈愿望，是华主席、党中央对湖北人民和武汉部队的无限关怀，是我们政治生活中的一件大喜事。这对于进一步调动一切积极因素，巩固和发展安定团结的大好形势，加快实现四个现代化的步伐，有着深远的重大意义。我代表武汉部队党委和广大指战员，对中央的这一英明决策，表示坚决的拥护。","type":"paragraph"},{"text":"所谓的“七·二〇事件”，就是武汉地区广大革命群众、干部、革命知识分子和解放军指战员，对林彪、“四人帮”一伙倒行逆施的罪恶活动的抵制和反对，完全是革命行动。可是，林彪、“四人帮”颠倒敌我，混淆是非，硬给加上一个“叛逆事件”的罪名，把上百万干部、群众污蔑为“匪徒”，把部队打成“叛军”，对武汉地区广大军民实行疯狂的围剿和镇压，犯下了滔天的罪行。今天，是非已经澄清，11年的冤案平反了，受迫害的同志得到了平反昭雪，林彪、“四人帮”强加给广大军民和干部的一切诬蔑不实之词，全部推倒；长期颠倒了的历史，重新颠倒过来。事实证明，人民的意志不可摧，人民的力量是不可战胜的。","type":"paragraph"},{"text":"同志们：粉碎“四人帮”以后，形势越来越好。我们一定要遵照党中央的指示精神，顾大局，向前看，加强革命团结，不纠缠历史旧帐，把千仇万恨都集中在林彪、“四人帮”身上。我们部队的全体指战员，一定要发扬拥政爱民的光荣传统，进一步加强军政军民团结，提高警惕，加强战备，准备打仗，为加速部队的“两化”建设，为早日实现新时期的总任务，建设社会主义现代化强国而努力奋斗。","type":"paragraph"}],"comments":[],"origin":"湖北武汉纪念7.20三十周年筹备委员会主编《湖北武汉文革资料第一辑》，1996年。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"杨得志","type":"人物"},{"name":"林彪","type":"人物"},{"name":"四人帮","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"88a39c91c3"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
