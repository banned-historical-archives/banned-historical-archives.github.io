year":1997,"month":11,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"波兰总统访问香港"},{"type":"paragraph","text":"据新华社香港十一月二十日电（记者张铁钢、陶文革）正在这里访问的波兰总统克瓦希涅夫斯基今天表示，他希望波兰与中华人民共和国香港特别行政区的经贸合作关系能翻开新的一页。"},{"type":"paragraph","text":"波兰贵宾是今天上午抵达香港的。在香港贸发局举行的午餐会上，克瓦希涅夫斯基致词说，香港不仅是一个重要的国际金融中心，而且是一个重要的世界贸易中心。“波兰的机械装备可以通过香港进入中国内地。大量的中国内地商品已经通过香港进入波兰”。"},{"type":"paragraph","text":"香港贸发局主席冯国经在致词中说，波兰是香港在东欧的第二大贸易伙伴，香港将波兰视为进入东欧市场的一大基地。他表示希望香港与波兰今后能进一步加强经贸合作关系。"},{"type":"paragraph","text":"今天晚上，香港特别行政区行政长官董建华设晚宴，欢迎克瓦希涅夫斯基一行。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f2af2cbccb"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
