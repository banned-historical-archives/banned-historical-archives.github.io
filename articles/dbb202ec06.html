art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"叶剑英委员长会见吉布提客人","authors":[],"parts":[{"type":"paragraph","text":"新华社9月15日讯 人大常委会委员长叶剑英今天下午在人民大会堂会见了由议长阿卜杜卡德尔·瓦贝利·阿斯卡尔率领的吉布提国民议会代表团。"},{"type":"paragraph","text":"瓦贝利议长对叶剑英说，我能见到您感到很高兴，这次会见体现了我们两国间深厚的友谊。他说，吉布提人民在五十年代进行争取民族独立的斗争时就得到了中国人民的支持。"},{"type":"paragraph","text":"叶剑英对吉布提贵宾来访表示热烈欢迎。他说，中吉两国友好合作关系正在不断发展。在国际事务中两国在许多方面有着一致的观点。他说，在当今世界上，国家要独立，民族要解放的总趋势是不会改变的。已经取得独立的国家也要维护自己的独立。"},{"type":"paragraph","text":"瓦贝利议长的夫人玛丽娅·穆罕默德·阿丹，第一副议长赛义德·伊卜拉欣·巴杜尔，会见时在座。"},{"type":"paragraph","text":"人大常委会副委员长谭震林参加了会见。"},{"type":"paragraph","text":"今天下午，国务院副总理姬鹏飞会见了吉布提国民议会代表团，宾主进行了亲切的交谈。"}],"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dbb202ec06"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
