<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"在第二期整党中加强党性党纪教育  南京军区党委要求“文革”中入党党员增强党性党纪观念  福州军区党委强调对党员进行遵纪守法教育","authors":["刘东耕","揭衍珍","王浩钟"],"dates":[{"year":1985,"month":3,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"在第二期整党中加强党性党纪教育"},{"type":"paragraph","text":"南京军区党委要求“文革”中入党党员增强党性党纪观念"},{"type":"paragraph","text":"福州军区党委强调对党员进行遵纪守法教育"},{"type":"paragraph","text":"据新华社南京电　（通讯员王浩钟、记者刘东耕）南京军区党委要求所属部队第二期整党单位深入开展党性党纪教育，尤其要注重引导“文化大革命”中入党的党员增强党性党纪观念。"},{"type":"paragraph","text":"这是南京军区党委在最近召开的整党汇报会上听取了各单位的情况汇报后提出的。"},{"type":"paragraph","text":"在这次会议上，各单位的领导同志分析了党员队伍的现状，感到对“文革”中入党的党员加强党性党纪教育，是当前的一个迫切问题。他们指出，参加这一期整党的党员有近半数是在“文革”中入党的。这些党员受“文革”的消极影响比较大，不少同志党性党纪观念比较薄弱。"},{"type":"paragraph","text":"根据这些分析，南京军区党委要求第二期整党单位着重从两个方面加强对“文革”中入党的党员进行党性党纪教育：一要紧密联系思想实际，抓好远大理想、全局观念和献身精神的教育，使大家做到个人利益服从全局利益，甘为人民作出自我牺牲；二要组织这部分党员认真清理思想，从党性党纪的高度检查分析自己存在的问题，彻底清除“文革”的消极影响。"},{"type":"paragraph","text":"据新华社福州电　（记者揭衍珍）福州军区党委在第二期整党中，强调对党员进行遵纪守法教育，以提高他们抵制新的不正之风的自觉性。军区政委傅奎清提出，要把这一教育贯穿到第二期整党的全过程，并要求已经整过党的单位认真补上这一课。"},{"type":"paragraph","text":"福州军区党委在分析党员队伍的思想状况时感到，在当前经济体制改革和部队精简整编的新形势下，部分党员和党的领导干部程度不同地存在着组织纪律松弛，法制观念淡薄的现象。为此，军区党委决定在第二期整党单位突出抓好对共产党员的遵纪守法教育，并对教育的指导思想、目的意义、时间安排、组织方式等提出了具体要求，同时还通报表彰了一批模范遵纪守法的好党员、好干部。各单位在教育中认真地学习有关党规、党纪的基本知识。广大党员自觉联系实际，从五个方面对照检查自己的言行：一是思想上党性观念强不强？是否做到在国家政策、法令允许范围内行事；二是有没有做到服从国家建设的大局？是否有为个人或小单位捞好处而经商牟利，钻经济改革和部队改革空子的问题；三是行动上是不是做到了令行禁止？有没有明不经商暗经商的情况；四是对执行党的方针政策是否认真？有没有搞“上有政策，下有对策”、我行我素的做法；五是有没有做到一切服从组织？是否有违反党规党纪的行为。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6d27cddf2c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
