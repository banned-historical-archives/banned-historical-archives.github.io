ical-archives/banned-historical-archives0/main/maoquanji46.pdf"],"article":{"title":"和钱学森等的谈话","alias":"","parts":[{"type":"paragraph","text":"和钱学森等的谈话！"},{"type":"paragraph","text":"（1964年2月6日）毛泽东（以下简称毛）：我们搞原子弹也有成绩呀！钱学森（以下简称钱）：我有所闻。毛：怕是不止有所闻吧。钱：对原子弹确实只是有所闻，我是研究运载工具的。"},{"type":"paragraph","text":"毛：是的。你们搞了个一千公里的，将来再搞个两千公里的，也就差不多了。"},{"type":"paragraph","text":"钱：美帝在东南亚新月形包围圈上的有些基地，有两千八百公里的距离。"},{"type":"paragraph","text":"毛：可以到夏威夷？钱：夏威夷更远了，不止四千公里。毛：总要搞防御。搞山洞，钻进地下去就不怕它了。"},{"type":"paragraph","text":"钱：我们正在遵照主席的指示，先组织一个小型的科学技术人员的小组，准备研究一下防弹道式导弹的方法、技术途径。看来第三个五年计划中由于技术条件不够，还不能开展设计工作。"},{"type":"paragraph","text":"毛：有矛必有盾。搞少数人，专门研究这个问题。五年不行，十年；十年不行，十五年，总要搞出来的。"},{"type":"paragraph","text":"[1]这是毛泽东和著名科学家钱学森、李四光、竺可桢等谈话的一部分。"}],"authors":["毛泽东"],"dates":[{"year":1964,"month":2,"day":6}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":257,"page_end":257},"tags":[{"name":"毛泽东","type":"人物"},{"name":"钱学森","type":"人物"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ca9d165f55"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
