art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"阶级情深似海——喜看京剧舞蹈《战海浪》","authors":["唐俊"],"parts":[{"type":"paragraph","text":"春风送暖百花齐放，革命文苑万紫千红。在革命样板戏的推动下，京剧舞蹈《战海浪》以它特有的英姿出现在社会主义文艺舞台上。"},{"type":"paragraph","text":"这个舞蹈，运用革命样板戏努力塑造和突出工农兵英雄人物的经验，以战斗的舞姿，深情的唱段，表现了高镇海奋不顾身，抢救渔民的革命精神。它处处使人感受到：狂风恶浪隔不断阶级深情，革命人民心贴心紧密相联。这就形象地反映了无产阶级文化大革命给亿万人民精神面貌带来的深刻变化。"},{"type":"paragraph","text":"毛主席教导说：“一切革命队伍的人都要互相关心，互相爱护，互相帮助。”"},{"type":"paragraph","text":"舞台上，只是一个高镇海。可是，我们却透过这个英雄典型，看到了伟大社会主义祖国革命人民的精神风貌。在他们当中，有千千万万个高镇海，他们是活着的王杰、雷锋，是活着的洛桑单增、李文忠，是活着的黄山茶岭九位小英雄。……"},{"type":"paragraph","text":"看了《战海浪》，再想想解放以前，我们更加憎恶旧社会。那时候，乌云盖天，没有阳光，穷苦渔民的安危死活，谁人关心？！那时候，打渔人身上三把刀，鱼霸、恶浪和海盗。他们海上遇难，鱼霸不仅见死不救，而且勾结海匪，乘火打劫，再插一刀！新旧对比，我们就更感到社会主义制度温暖无比。"},{"type":"paragraph","text":"但是，党内不肯改悔的走资派邓小平却一意孤行搞倒退、搞复辟，他刮起妖风，想要翻社会主义的大船，让我们重新回到旧社会，再受二茬罪！我们坚决不答应！我们要学习《战海浪》中英雄人物高镇海的革命精神，深入批判邓小平的修正主义路线，把反击右倾翻案风的斗争进行到底。"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0acc534f5f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
