:1981,"month":4,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"马科斯接见我新闻代表团"},{"type":"paragraph","text":"据新华社马尼拉3月31日电 菲律宾总统马科斯和夫人伊梅尔达·马科斯，今天在总统府分别接见由新华社副社长李普率领的中国新闻代表团。"},{"type":"paragraph","text":"接见时，马科斯总统回忆了他同已故毛泽东主席和周恩来总理的友谊。马科斯总统和夫人同他们共同努力，建立了中菲两国之间的外交关系。马科斯说，他一直把他同毛主席、周总理合影的照片作为珍贵的纪念品保存着。他还谈到，在他访华时同邓小平副主席的个人友谊。"},{"type":"paragraph","text":"马科斯在叙述两国人员互访的情况之后说：“我们两国之间互访的人不断。我们对这些访问感到很高兴。”"},{"type":"paragraph","text":"在此以前，马科斯夫人同代表团进行了友好谈话。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2ef6dcc62e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
