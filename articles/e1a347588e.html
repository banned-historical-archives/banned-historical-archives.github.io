art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"邓小平副主席率党政代表团参加朝鲜国庆三十周年活动","authors":[],"parts":[{"type":"paragraph","text":"以中共中央副主席、国务院副总理邓小平为团长，中共中央政治局委员、中共上海市委第三书记、上海市革委会第二副主任彭冲为副团长的中国党政代表团，应朝鲜劳动党中央委员会总书记、朝鲜民主主义人民共和国主席金日成的邀请，九月八日到十三日，参加朝鲜民主主义人民共和国成立三十周年的庆祝活动。"},{"type":"paragraph","text":"九月九日晚，邓小平副主席出席金日成主席举行的盛大国庆宴会。"},{"type":"paragraph","text":"九月十二日上午，金日成主席来到宾馆同邓小平副主席会谈。"},{"type":"paragraph","text":"九月八日，邓小平副主席代表中共中央、国务院向金日成主席赠送了礼品。"},{"type":"paragraph","text":"九月十日上午，邓小平副主席和金日成主席在主席台上观看平壤各界群众举行的盛大游行队伍。"},{"type":"paragraph","text":"九月十一日，邓小平副主席在李钟玉总理的陪同下访问咸兴市，受到群众的热烈欢迎。"},{"type":"paragraph","text":"九月十一日，邓小平副主席一行参观咸兴二·八维尼纶厂。"},{"type":"paragraph","text":"邓小平副主席和由他率领的中国党政代表团，九月十三日离开平壤途经新义州回国时，受到当地负责干部和群众的热烈欢送。图为朝鲜儿童在新义州车站向邓副主席献花。（本版照片均为新华社记者摄）（照片）"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"上海文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e1a347588e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
