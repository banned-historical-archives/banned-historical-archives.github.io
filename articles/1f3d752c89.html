道处理请示的批复","authors":[],"dates":[{"year":1955,"month":8,"day":13}],"is_range_date":false,"parts":[{"text":"公安部对安徽省公安厅关于对反动先天道处理请示的批复","type":"title"},{"text":"你厅7月15日（午治5号）电已悉。同意你厅意见，按六次公安会议今后从严精神处理。此复","type":"paragraph"},{"text":"附：","type":"appellation"},{"text":"安徽省公安厅请示对先天道的处理问题","type":"subtitle"},{"text":"1955.07.12","type":"subtitle"},{"text":"7月8日研午7号电悉。关于“对从未取缔过的反动会道门则应分别加以处理”问题，我们还有一个不明确的问题，就是我省反动先天道在某些地区已经取缔，但还有许多乡村甚至一个区个别的县均未经取缔，但这些地区已经大张旗鼓的取缔过其他反动会道门，并开展了宣传教育工作，群众已有觉悟，知道道会门是反动的，像这类地区反动先天道虽未经过取缔，我们意见亦应根据第六次全国公安会议决议精神处理，是否妥当，请速电示。","type":"paragraph"}],"comments":[],"origin":"《取缔反动会道门工作历史资料汇编（1948－1992年）》，公安部一局编印， 2009年。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1f3d752c89"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
