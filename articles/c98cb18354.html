tart":5,"page_end":5,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"周扬鼓吹的“艺术第一”就是资产阶级政治第一","authors":["战士艾炬红缨"],"parts":[{"type":"paragraph","text":"毛主席教导我们说：“在现在世界上，一切文化或文学艺术都是属于一定的阶级，属于一定的政治路线的。”但是，反革命修正主义文艺黑线的总头目周扬，却一笔抹煞了文学艺术的阶级性，胡说什么只有“艺术好才能政治第一，艺术不好，怎么实现政治第一”。猖狂地同我们伟大领袖毛主席制定的“政治第一、艺术第二”的文艺批评标准大唱反调。真是罪该万死！"},{"type":"paragraph","text":"在阶级存在的社会中，一切文化或文学艺术都带有强烈的阶级性，所谓为艺术的艺术，超阶级的艺术，是根本不存在的。无产阶级的文学艺术，是无产阶级整个革命事业的一部分，是为无产阶级夺取政权和巩固政权服务的。资产阶级的文学艺术，则是资产阶级用以维护其反动统治的工具。不同阶级尽管它们都有不同的政治标准和艺术标准，但有一点是共同的，这就是在政治标准与艺术标准的关系上，都是毫不例外地把政治标准放在第一位，把艺术标准放在第二位。"},{"type":"paragraph","text":"周扬鼓吹“艺术好才能政治第一”，原来是个大骗局。政治是统帅，是灵魂。“艺术第一、政治第二”，这是资产阶级用来骗人的虚伪口号。周扬虽然在口头上似乎是提倡“艺术第一、政治第二”，实际上他要的是资产阶级政治第一的文艺，反对的是无产阶级政治第一的文艺。周扬所吹捧的“艺术好”的作品，不过是封、资、修那一套，什么帝王将相、才子佳人、牛鬼蛇神等等反党反社会主义的毒草。一些被周扬骂为“没艺术感染力”、“艺术性差”、靠“政治救命”的作品，正是因为它们具有强烈的无产阶级政治内容，较好地反映了社会主义革命和建设，受到了广大工农兵的好评。由此可见，周扬鼓吹“艺术好才能政治第一”，就是为反党反社会主义反毛泽东思想的毒草大批出笼鸣锣开道，用资产阶级思想腐蚀人们灵魂，为中国赫鲁晓夫篡党篡政复辟资本主义作舆论准备。"},{"type":"paragraph","text":"伟大领袖毛主席向全国军民发出了彻底摧毁资产阶级司令部的伟大战斗号召。在革命大批判的新高潮中，我们一定要更好地以毛泽东思想为武器，从政治上、思想上、理论上彻底批倒批臭文艺黑线总头目周扬及其黑后台中国赫鲁晓夫，彻底粉碎“艺术好才能政治第一”等修正主义谬论，坚决将无产阶级文化大革命进行到底！"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"周扬","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c98cb18354"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
