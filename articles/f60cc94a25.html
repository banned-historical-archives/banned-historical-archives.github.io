tes":[{"year":1984,"month":11,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"广东省博物馆举办“文革”期间查抄文物、字画认领会"},{"type":"paragraph","text":"新华社广州电 十一月十五日，广东省博物馆首次举办清退“文化大革命”中查抄的文物、字画认领会，有五百八十三件文物、字画、玉器、陶器等由原主领回。"},{"type":"paragraph","text":"广东省博物馆曾收进一批在“文化大革命”中查抄的文物、字画等，近年来已将一部分归还给了原物主。最近，博物馆工作人员对剩下的一部分查抄文物进行了全面清理，逐一登记造册，寻找原物主。"},{"type":"paragraph","text":"在认领会上，美籍华人陈启康领回了“文化大革命”中被抄走的全部文物五百二十件。广东省政协委员、著名粤剧演员罗家宝前段时期已领回十五件被查抄的文物，今天又领回两幅国画。已故全国政协委员、广东省参事室副主任陈卓凡被查抄的字画、玉器、陶器等共五十一件，也由其家属领回。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"广东文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f60cc94a25"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
