ical-archives/banned-historical-archives0/main/maoquanji35.pdf"],"article":{"title":"对打击入侵美军飞机对策报告的批语","alias":"","parts":[{"type":"paragraph","text":"对打击人侵美军飞机对策报告的批语！"},{"type":"paragraph","text":"（1955年5月10日）照办。2"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"五月十日"},{"type":"paragraph","text":"[1]这是毛泽东对中国人民解放军总参谋长栗裕1955年5月10日报告的批语。"},{"type":"paragraph","text":"[2]栗裕的报告汇报了美军飞机侵入我安东（丹东）以南地区领空与我机空战的情况，并判断美机仍有来犯进行挑鲜之可能。提出我方对策为：当查明美机北上时，我机即进入待机空域巡逻监视其行动。如美机入侵至我领空及保卫目标上空时，则组织所有防空兵力火器坚决打击之。要求安东、旅大地区的空军密切协同动作，以确保我军机场及保卫目标的安全。周恩来5月10日批示：“今日美机入侵，我即还击，刻已发消息警告美方。总参部署方针，请主席批示。”"}],"authors":["毛泽东"],"dates":[{"year":1955,"month":5,"day":10}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":71,"page_end":71},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a0af187a80"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
