art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"不朽的丰碑——世界各国人民纪念毛主席逝世两周年","authors":[],"parts":[{"type":"paragraph","text":"意大利"},{"type":"paragraph","text":"意大利统一共产党总书记奥斯瓦尔多·贝契、意大利社会主义革命党中央委员埃阿科·科利阿尼分别在这些集会上讲了话。他们赞扬了毛主席领导中国人民不断从胜利走向胜利的丰功伟绩，并指出，今天中国人民在华主席为首的党中央领导下，正沿着毛主席指出的方向继续前进。科利阿尼在会上还阐述了毛主席关于三个世界的理论的伟大意义。"},{"type":"paragraph","text":"同一天，意中友协在罗马举办了纪念毛主席逝世两周年的图片展览，这个展览将展出一周。"},{"type":"paragraph","text":"赤道几内亚"},{"type":"paragraph","text":"孟加拉国"},{"type":"paragraph","text":"孟加拉国政界著名人士和各界代表在集会上发表了讲话。他们高度赞扬毛主席为中国革命和建设，为全世界被压迫人民作出的伟大贡献。孟加拉国教育部长卡齐·贾法尔·艾哈迈德在讲话中说，毛泽东使八亿中国人民具有科学的和活生生的社会主义哲学。他的教导将鼓舞全世界人民的斗争。"},{"type":"paragraph","text":"马达加斯加"},{"type":"paragraph","text":"这家通讯社在其前言中说，在中国党、军队和人民共和国的缔造者毛泽东主席逝世两周年的时候，“马达加斯加民主共和国敬仰毛泽东主席的巨大功绩。通过长期而胜利的爱国战争，毛泽东主席使八亿多人民获得自由和尊严，走上社会主义道路”。（据新华社）"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1c72d20ec7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
