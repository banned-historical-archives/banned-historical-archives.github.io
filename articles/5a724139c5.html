rt":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"带着毛主席党中央的极大关怀亲切慰问灾区人民","authors":[],"parts":[{"type":"paragraph","text":"中共中央、国务院派出的以华国锋总理为总团长的中央慰问团，到达七月二十八日强烈地震受灾地区，亲切慰问受灾群众，转达毛主席、党中央对灾区人民的极大关怀，鼓励灾区广大群众和干部在毛主席的无产阶级革命路线指引下，在各级党委的领导下，发扬人定胜天的革命精神，团结互助，奋发图强，自力更生，恢复和发展生产，重建家园。灾区广大人民群众深受感动，他们表示一定不辜负毛主席、党中央的亲切关怀和全国人民的大力支援，在批邓、反击右倾翻案风斗争的推动下，以阶级斗争为纲，团结战斗，排除万难，争取抗震救灾斗争的胜利。 （本组照片均为新华社记者摄）"},{"type":"paragraph","text":"华国锋总理到唐山钢铁公司亲切慰问受灾群众。群众高呼：“感谢毛主席、党中央的亲切关怀！”“伟大领袖毛主席万岁！”“中国共产党万岁！”"},{"type":"paragraph","text":"华国锋总理同开滦煤矿唐山矿的干部、工人亲切交谈，鼓励他们为早日恢复生产团结战斗。"},{"type":"paragraph","text":"中央慰问团总团副团长陈永贵、谢静宜到河北省丰润县瓦房庄公社慰问，赞扬社员们一面抗震救灾，一面积极恢复生产的革命精神。"},{"type":"paragraph","text":"中央慰问团总团副团长乌兰夫到北京市平谷县王辛庄公社小辛寨大队，向受灾群众转达毛主席、党中央的亲切关怀和慰问。"},{"type":"paragraph","text":"中央慰问团总团副团长郭玉峰、解学恭到天津市第一炼钢厂慰问，炼钢工人表示：一定要以抓革命，促生产的实际行动，报答毛主席、党中央的亲切关怀。 （照片）"}],"alias":""},"tags":[{"name":"华国锋","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5a724139c5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
