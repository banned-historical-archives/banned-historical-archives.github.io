art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"有了毛泽东思想被压迫国家就能独立和发展","authors":[],"parts":[{"type":"paragraph","text":"据新华社上海十四日电 马里代表团团长、马里司法部长马马杜·马戴拉·凯塔今晚在上海市市长曹荻秋举行的宴会上说，现在中国已经成为一个强大的工业国家。中国的成就和发展，对亚非拉国家具有重大的影响。中国的榜样证明，有了马克思列宁主义科学，有了毛泽东思想，所有受压迫的国家，不仅可以得到独立，而且可以取得迅速的发展。"},{"type":"paragraph","text":"马戴拉·凯塔部长强调说，使亚非拉人民受到极大鼓舞，使帝国主义感到恐慌的是中国人民的天才，是中国经济建设的迅速发展，是中国人民有了强大的国防力量。我们把中国的成绩和进步看成是自己的成绩和进步。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"434d8240df"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
