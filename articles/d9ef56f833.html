:["同桂荣"],"dates":[{"year":1974,"month":12,"day":17}],"is_range_date":false,"parts":[{"text":"刘景范嫂子给毛泽东的信（要点）","type":"title"},{"text":"同桂荣","type":"authors"},{"text":"〖刘景范，原地质部副部长，刘志丹烈士之弟。文革前因其妻李建彤写作歌颂刘志丹的长篇小说《刘志丹》被诬为“利用小说进行反党活动”一案而被定为“习仲勋、贾拓夫、刘景范反党集团”成员长期关押审查。同桂荣是刘志丹烈士遗孀。〗","type":"subtitle"},{"text":"今天我去看望刘景范，发现他身体很坏，精神不好，患有肝病，十二指肠溃疡病，手脚浮肿，肚子膨胀，可能是肝硬变，如果不及时治疗，担心坚持不了多长时间。特此请求：一、他的问题已经审查八年了，如果已经审查清楚，能否赶快把他释放出来治病？二、如果他的问题还不能下结论，是否可以把他放出来一面治病，一面继续审查？","type":"paragraph"}],"comments":[],"origin":"《建国以来毛泽东文稿》第十三册，北京：中央文献出版社，1998年1月第一版。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d9ef56f833"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
