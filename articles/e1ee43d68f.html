ical-archives/banned-historical-archives0/main/maoquanji27.pdf"],"article":{"title":"中央关于发表广州军管会和市政府就职布告的电报","alias":"","parts":[{"type":"paragraph","text":"中央关于发表广州军管会和市政府就职布告的电报"},{"type":"paragraph","text":"（1949年10月15日）华南分局，并告华中局："},{"type":"paragraph","text":"我军即入广州。你们可以奉人民革命军事委员会命令，照前定名单（增加李章达张村吴奇伟\"三人）立即发表广州军事管制委员会的就职布告，及广州市人民政府（叶剑英为市长，李章达及我方一人为副市长，朱光为秘书长）的就职布告。待中央人民政府委员会开会时再行追认。"},{"type":"paragraph","text":"中央"},{"type":"paragraph","text":"酉删"},{"type":"paragraph","text":"[1]李章达，当时任中央人民政府委员、中国国民党革命委员会中央委员。张醍村，无党派民主人士。吴奇伟，原国民党政府军将领，1949年5月率部在广东东部、福建西部起义；当时任政协第一届全国委员会委员。"},{"type":"paragraph","text":"[2]叶剑英，当时任中共中央华南分局第一书记。[3]朱光，当时任中共广州市委副书记。"}],"authors":["毛泽东"],"dates":[{"year":1949,"month":10,"day":15}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":418,"page_end":418},"tags":[{"name":"叶剑英","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"宣言"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e1ee43d68f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
