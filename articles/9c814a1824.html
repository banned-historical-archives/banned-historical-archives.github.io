ar":1954,"month":10,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"民主德国政府向毛泽东主席赠礼"},{"type":"paragraph","text":"【新华社八日讯】德意志民主共和国政府赠送给中华人民共和国毛泽东主席一架电子显微镜的赠礼仪式，八日下午在北京举行。这架大型显微镜构造精密、复杂，在科学研究工作方面有极大的价值。德意志民主共和国驻我国大使柯尼希代表德意志民主共和国政府赠礼，中国科学院院长郭沫若代表毛泽东主席受礼。德国方面出席赠礼仪式的有应邀来我国参加建国五周年国庆典礼的德意志民主共和国政府代表团团长、德意志民主共和国副总理兼外交部部长洛·博尔茨博士及德意志民主共和国驻我国使馆人员。中国方面出席的有：中国科学院副院长张稼夫、陶孟和、吴有训、中华人民共和国外交部副部长伍修权、交际处副处长王拓及中国著名科学家周培源、钱三强、严济慈、陆学善、王淦昌、施汝为等多人。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9c814a1824"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
