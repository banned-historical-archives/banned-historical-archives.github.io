ical-archives/banned-historical-archives8/main/maoquanji22.pdf"],"article":{"title":"对付海安如皋之敌的意见","alias":"","parts":[{"type":"paragraph","text":"对付海安如皋之敌的意见川"},{"type":"paragraph","text":"（1946年8月20日）粟、谭，并告陈、宋："},{"type":"paragraph","text":"你们率主力攻占丁、白、通、海之线后，海、如之敌南下则将该敌歼灭之。但该敌亦有固守原地不敢南下可能。此种情况下，请考虑第二步是否可以攻占磨头镇、张黄港、加力市，并相机攻占黄桥，调动或迫退海、如之敌。将这些敌后市镇上之敌军，那怕每处一营一连予以歼灭，均有极大意义。如我能收复黄桥、蒋垛等地，则海、如、曲、姜等地之敌陷于孤立，势必被调动或被迫退。是否可行，望按实情决定。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"未号"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军委起草的给华中野战军司令员粟裕和政治委员谭震林的电报。"},{"type":"paragraph","text":"[2]陈、宋，指陈毅、宋时轮，当时分别任山东野战军司令员兼政治委员和参谋长。"},{"type":"paragraph","text":"[3]丁、白、通、海，指位于江苏中部的丁堰、白蒲、南通和海门。[4] 如，指江苏如皋。[5]加力市，村名，位于江苏如皋县西南。曲、姜，指位于江苏中部的曲塘和姜堰。"}],"authors":["毛泽东"],"dates":[{"year":1946,"month":8,"day":20}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":84,"page_end":84},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fc2216ba2e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
