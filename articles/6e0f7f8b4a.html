art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"秘共决定出版毛主席著作","authors":[],"parts":[{"type":"paragraph","text":"新华社二十一日讯 利马消息：为了满足秘鲁人民要求学习和掌握毛泽东思想的强烈愿望，秘鲁共产党已决定出版毛泽东著作的西班牙文版。"},{"type":"paragraph","text":"近几年来，毛泽东思想在秘鲁工人、农民和革命知识分子中间得到广泛的传播。秘鲁革命者，特别是革命青年，迫切要求学习毛泽东著作。他们认为，毛泽东思想是当代最高水平的马克思列宁主义，是秘鲁革命战无不胜的指南。"},{"type":"paragraph","text":"秘鲁共产党即将出版的毛泽东著作有：《中国社会各阶级的分析》、《湖南农民运动考察报告》、《星星之火，可以燎原》、《关于纠正党内的错误思想》、《中国革命和中国共产党》、《实践论》和《矛盾论》等。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6e0f7f8b4a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
