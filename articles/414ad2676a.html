<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"在“批”字上狠下功夫——三论彻底批判中国赫鲁晓夫的修正主义建党路线","authors":[],"dates":[{"year":1967,"month":12,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"这场围绕着建党路线问题上的大学习、大批判运动，是在无产阶级专政条件下，在文化大革命运动取得决定性胜利的大好形势下，进一步用毛泽东思想建设党、整顿党、巩固党的运动。"},{"type":"paragraph","text":"开展这个运动，是为了使我们党在思想上、政治上、组织上、工作作风上能够真正体现毛主席的创造性的马克思列宁主义的革命路线，使党在无产阶级专政条件下，进行阶级斗争，保证我党永远不被修正主义篡夺，保证无产阶级专政永不变色，从根本上防止资本主义复辟的可能性。"},{"type":"paragraph","text":"我们的党，是伟大领袖毛主席亲自缔造和培育的党。毛主席的建党路线在我党占统治地位，整个党是用毛泽东思想武装起来的伟大的、光荣的、正确的党。只有毛主席亲自领导下的中国共产党，才有这样的胆略和气魄，敢于发动和领导这场轰轰烈烈、震撼世界的无产阶级文化大革命。谁忘记了这一点，就会犯极大的错误。"},{"type":"paragraph","text":"同时，必须看到中国赫鲁晓夫的修正主义建党路线的危害性和反动性。修正主义建党路线，不谈阶级，不谈阶级斗争，不谈毛泽东思想，其要害就是篡党，就是阴谋改变我党的颜色，为他们复辟资本主义服务。是可忍孰不可忍!"},{"type":"paragraph","text":"当前，我们必须更高地举起毛泽东思想伟大红旗，活学活用毛主席著作，抓住对修正主义建党路线的大批判，在“批”字上狠下功夫。“破字当头，立也就在其中了。”只有经过深入的大批判，经过反复地分析、比较，我们才能认清什么是错误的，什么是正确的；什么是中国赫鲁晓夫的修正主义建党路线，什么是毛主席的建党路线。只有破得彻底，才能立得牢固，才能真正用毛主席的建党思想武装我们的头脑。否则，忽视了大批判，分不清是非，划不清界限，就不可能在这场大破大立的斗争中取得彻底胜利。"},{"type":"paragraph","text":"在“批”字上狠下功夫，必须牢牢掌握斗争大方向，炮口始终对准走资派。以中国赫鲁晓夫为代表的党内最大的一小撮走资派，是这条修正主义建党路线的制订者，是罪魁祸首；各地区各单位的走资派，是这条黑线的推行者，是帮凶。他们的罪行必须彻底清算。把隐藏在党内的叛徒、特务、自首分子和反革命修正主义分子统统清除出去，以根绝隐患。在斗争中，革命的党员，革命派战士，广大革命群众，都必须在毛泽东思想的原则基础上团结一致，共同对敌。我们要坚持在革命大批判中推进和巩固革命大联合。千万不要把斗争矛头指向自己的同志。更要警惕阶级敌人混水摸鱼，提出极“左”的口号，转移斗争大方向。"},{"type":"paragraph","text":"在“批”字上狠下功夫，应当充分发挥共产党员的革命的先锋和模范作用。事实证明，绝大多数的党员是革命的，是好的。他们是这场革命大批判运动的骨干力量。中国赫鲁晓夫如此猖狂地反对毛主席的建党路线，我们革命的共产党员无不深恶痛绝，不共戴天。应当大力发扬“一月革命”的造反精神，大造中国赫鲁晓夫修正主义建党路线的反。疾风知劲草，烈火炼真金。通过这场大学习、大批判的锻炼和考验，一定会涌现出更多的毛主席的好党员。"},{"type":"paragraph","text":"在文化大革命中犯过严重错误的党员，也应当在这场革命大批判中挺身而出。你们是修正主义建党路线的推行者，也是受害者，你们应当把千仇万恨集中到中国赫鲁晓夫身上，大胆控诉，大胆揭发，大胆批判，同时狠触自己的灵魂，痛涤思想上的污泥浊水，坚决站到毛主席的革命路线上来。"},{"type":"paragraph","text":"要搞好这场革命的大学习、大批判，必须充分发动群众，千军万马，口诛笔伐，打一场彻底批判中国赫鲁晓夫修正主义建党路线的人民战争。通过革命大批判，我们的党更加强大，更有旺盛的战斗力。这样，就能永远做到:党组织应是无产阶级先进分子所组成，应能领导阶级和群众对于阶级敌人进行战斗的朝气蓬勃的先锋队组织。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"人民战争","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"一月革命","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"414ad2676a"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
