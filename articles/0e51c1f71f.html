" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"福建省厦门市中级人民法院关于洪沧海一案宣告无罪的刑事判决书","authors":[],"dates":[{"year":1980,"month":6,"day":6}],"is_range_date":false,"parts":[{"text":"福建省厦门市中级人民法院关于洪沧海一案宣告无罪的刑事判决书","type":"title"},{"text":"洪沧海，男，1948年生。福建省同安县人。原住本市忠孝里4号。于1970年2月27日由厦门市人保组以现行反革命罪判处死刑，立即执行。","type":"paragraph"},{"text":"洪沧海一案经本院复查认为，洪沧海在文化大革命中由于对林彪四人帮推行极左路线不满，在书写张贴散发的标语中为刘少奇同志遭诬陷鸣不平，斥责四人帮的倒行逆施是正确的。但也写了错误的言辞，这属于思想认识问题。原判以反革命罪判处死刑，这是林彪四人帮颠倒敌我关系所致，确属冤杀。根据有反必肃，有错必纠的方针，特依法改判如下：","type":"paragraph"},{"text":"1.撤销原厦门市人保组（70）厦革保第012刑事判决","type":"paragraph"},{"text":"2.宣告洪沧海无罪","type":"paragraph"},{"text":"如不服本判决可在接到本判决书的次日起十天内向本院提出上诉状及附本上诉福建省高级人民法院。","type":"paragraph"},{"text":" 福建省厦门市中级人民法院1980年6月6日","type":"paragraph"},{"text":"判决书中所说的“但也写了错误的言辞”，是指洪沧海在当年所写日记和张贴的标语中，不但“恶毒攻击”了无产阶级文化大革命，还在书写和张贴的标语中点名斥责老毛发动文革，并称之为独夫民贼。","type":"paragraph"},{"text":"新版的《厦门市志》经过二十年的修撰，于2004年出版，书中的大事记中华人民共和国部分记载如下：","type":"paragraph"},{"text":"（1970年）2月27日侨生洪沧海因散发反对林彪、江青反革命集团，为老革命家鸣不平的信被错判死刑。1979年11月，市中级人民法院撤销原判，为洪沧海平反。","type":"paragraph"}],"comments":[],"origin":"不平编著：《文革英烈（上）》，美国成家出版社，2019年，第123－125页。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"林彪","type":"人物"},{"name":"四人帮","type":"人物"},{"name":"福建文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0e51c1f71f"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
