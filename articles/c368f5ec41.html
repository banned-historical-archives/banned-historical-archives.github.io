1976,"month":8,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"汗水冲刷思想上的灰尘"},{"type":"paragraph","text":"青岛食品厂党委“一班人”，联系阶级斗争、路线斗争的实际，深入批判邓小平反革命的修正主义路线，提高了坚持党的基本路线的自觉性。"},{"type":"paragraph","text":"在厂党委统一领导下，这个厂广大干部坚持每周劳动一天，克服了以往蜻蜓点水、零打碎敲、流于形式的毛病。厂党委书记陶传忠有腰伤，仍然坚持参加劳动。不少车间干部坚持不脱工作服，和工人滚在一起，有时因为其他工作耽误了劳动，他们坚持再找时间补上。"},{"type":"paragraph","text":"由于广大干部不断用劳动汗水冲刷思想上的灰尘，从而转变了工作作风，密切了干群关系。这个厂的工人对领导干部都亲切地称“老马”“老王”。有些工人毫无拘束地提意见，掏心里话。各级干部都把自己看成是人民的勤务员，当干部只有为党多做工作的义务，没有比普通工人高一头的权利。驱蛔糖车间代理党支部书记沈绍栋，从去年九月来到这个车间，每天工作超过八小时。他认真倾听工人意见，虚心向工人学习，并利用业余时间走访了全车间八十多名职工的家。工人们激动地说：“经过文化大革命锻炼的干部，就是好。”"},{"type":"paragraph","text":"本报通讯员"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c368f5ec41"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
