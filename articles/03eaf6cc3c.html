ical-archives/banned-historical-archives8/main/maoquanji17.pdf"],"article":{"title":"关于起草财经问题报告给南汉宸的信","alias":"","parts":[{"type":"paragraph","text":"关于起草财经问题报告给南汉宸的信"},{"type":"paragraph","text":"（1942年12月20日）汉宸同志："},{"type":"paragraph","text":"请你写的东西不知着手否？我要的是关于粮草、税收、金融、贸易四部分，每样要说政策，说工作，是向广大的干部说话，使他们看了懂得政策的方向，懂得工作的作法。在说政策说工作时，要批评错误意见，批评工作缺点，使他们有所警惕。每样要有点历史，有点分析，又有一九四三年应如何作法。请你从今天至星期四四天之内下一番苦功赶一下，于星期五日交我就好了，或在星期二三先将粮草一件交我，余在星期四五交我。金融、贸易二件请找银行与贸易局的人研究一下，粮、税你是熟的。你前交报告很好，只是向少数人说的，不是向广大干部说的，故须重写。"},{"type":"paragraph","text":"敬礼！"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十二月二十日夜你写的被服部分我已采入工业问题里去了。“[1]指毛泽东在《经济问题与财政问题》第七部分《关于发展自给工"}],"authors":["毛泽东"],"dates":[{"year":1942,"month":12,"day":20}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":302,"page_end":302},"tags":[{"name":"毛泽东","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"书信"}]},{"id":"wenji2","name":"毛泽东文集第二卷（1999）","type":"pdf","internal":false,"official":true,"author":"中央文献研究室","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/wenji2.pdf"],"article":{"title":"关于起草财经问题报告给南汉宸的信","description":"","dates":[{"year":1942,"month":12,"day":20}],"parts":[{"text":"关于起草财经问题报告给南汉宸的信","type":"title"},{"type":"appellation","text":"汉宸同志："},{"type":"paragraph","text":"请你写的东西不知着手否？我要的是关于粮草、税收、金融、贸易四部分，每样要说政策，说工作，是向广大的干部说话，使他们看了懂得政策的方向，懂得工作的作法。在说政策说工作时，要批评错误意见，批评工作缺点，使他们有所警惕。每样要有点历史，有点分析，又有一九四三年应如何作法。请你从今天至星期四四天之内下一番苦功赶一下，于星期五日交我就好了，或在星期二三先将粮草一件交我，余在星期四五交我。金融、贸易二件请找银行与贸易局的人研究一下，粮、税你是熟的。你前交报告很好，只是向少数人说的，不是向广大干部说的，故须重写。"},{"type":"paragraph","text":"敬礼！"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十二月二十日夜"},{"type":"subtitle","text":"你写的被服部分我已采入工业问题里去了。"},{"type":"paragraph","text":"根据人民出版社一九八三年出版的"},{"type":"paragraph","text":"《毛泽东书信选集》刊印。"}],"comment_pivots":[{"part_idx":0,"offset":14,"index":1},{"part_idx":6,"offset":19,"index":2}],"is_range_date":false,"authors":["毛泽东"]
