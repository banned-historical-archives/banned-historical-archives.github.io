s":["北京地质勘探学院","蔡荣荣"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"“党腐化下去人民一定要起来反对”","type":"title"},{"text":"北京地质勘探学院蔡荣荣","type":"authors"},{"text":"“马先生说，如果整风整不好会有二次革命，我是同意这种看法的，因为不应该把革命看做是革性命，如果党不把三害除掉，谁能保证党不会腐化下去呢？党腐化下去的时候，人民一定要起来反对他们，所以我们现在要帮助党整风‘除三害’。……我认为凡是具有先进意义的行动都是革命，所以我认为党现在的整风也可以说是革命。”","type":"paragraph"},{"text":"“谈起革命，某些人的神经便衰弱了，立即会闻到一股火药味和恐怖味来。有人反对‘如果风整不好便会有二次革命’，真使我莫名其妙，要知道二次革命的前提是整风整不好。我奉劝这些人头脑清醒些，考察一下五○年和整风前夕党的‘三害’和腐化是否有加深，如果长此以往，谁敢断言数十年后或者百年后党不会失去生命力呢？如果发展下去，波兹南事件很值得再三深思。”","type":"paragraph"},{"text":"“要避免暴力革命，执政者就必须执行人民的意志，竞竞业业为人民服务，这样就可以使矛盾保持非对抗性，消灭暴力革命的根源，整风正是消灭引起暴力革命的根源”。","type":"paragraph"},{"text":"“不要害怕革命，因为任何革命都是赋有进步意义的，有人说：‘在新社会里，革命就是反革命。’怪哉，这些人否认了目前我国正在进行着革命，而且还是富有深刻意义的革命。”","type":"paragraph"}],"comments":[],"origin":"北京地质勘探学院党委会宣传部编《社会主义教育参考资料第二编：右派言论汇编》，1957年10月5日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5c1a34e904"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
