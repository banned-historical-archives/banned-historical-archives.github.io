[],"dates":[{"year":1967,"month":2,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"意共（马列主义）领导人强调说"},{"type":"paragraph","text":"中国文化大革命保卫了革命政权"},{"type":"paragraph","text":"据新华社六日讯　米兰消息：不久前访问中国的意大利共产党（马克思—列宁主义）书记贝契在一次集会上说，中国的无产阶级文化大革命是一次为了保卫革命政权，击退修正主义和资本主义进攻的夺权斗争。"},{"type":"paragraph","text":"他说，毛主席“放手发动群众，把重大的政治问题直接交给群众去处理，这是一种大无畏的革命行动。这证明，只有相信群众，依靠从群众中来、到群众中去的政策，才能建设社会主义并为向共产主义过渡作准备”。"},{"type":"paragraph","text":"贝契还指出，中国的文化大革命，将使中国的社会主义革命和建设实现巨大的跃进。"},{"type":"paragraph","text":"据新华社五日讯　最近出版的意大利《东风》季刊第五期，在前言中热烈称赞中国无产阶级文化大革命对整个国际工人运动作出了“具有巨大理论和实践意义的贡献”。"},{"type":"paragraph","text":"前言指出，毛主席关于社会主义社会的矛盾、阶级和阶级斗争的理论是无产阶级文化大革命的指南。"},{"type":"paragraph","text":"前言说：“夺取政权绝不是在向共产主义方向前进途中阶级斗争的结束。相反，在社会主义过渡时期里，资产阶级和无产阶级之间的阶级斗争永远不会一劳永逸地结束，始终有资本主义复辟的可能性。”"},{"type":"paragraph","text":"前言称赞毛泽东思想是“革命理论的最先进的发展”，并且号召群众“在斗争过程中，在改造现实及改造自己主观世界的过程中，学习和运用毛泽东著作中的原则、方法和基本指示”。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"夺权","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4dd97a950b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
