art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"华国锋总理致电祝贺 谢里夫·埃马米任伊朗首相","authors":[],"parts":[{"type":"paragraph","text":"新华社八月二十八日讯 中华人民共和国国务院总理华国锋八月二十八日打电报给加法尔·谢里夫·埃马米热烈祝贺他担任伊朗王国政府首相。电报全文如下："},{"type":"paragraph","text":"德黑兰"},{"type":"paragraph","text":"伊朗王国政府首相加法尔·谢里夫·埃马米阁下："},{"type":"paragraph","text":"在阁下担任伊朗王国政府首相的时候，我代表中国政府和中国人民向阁下表示热烈的祝贺。"},{"type":"paragraph","text":"我衷心祝愿阁下在国王陛下领导下，在维护国家独立和主权、建设自己国家的崇高事业中，不断取得成就。"},{"type":"paragraph","text":"祝中国和伊朗两国人民和两国政府之间的友谊和友好合作关系日益巩固和发展。"},{"type":"paragraph","text":"中华人民共和国国务院总理 华国锋"},{"type":"paragraph","text":"一九七八年八月二十八日"}],"alias":""},"tags":[{"name":"华国锋","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"45d21c7925"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
