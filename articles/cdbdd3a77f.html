art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"要闻简报","authors":[],"parts":[{"type":"paragraph","text":"邓小平副总理会见盛田昭夫一行"},{"type":"paragraph","text":"邓小平副总理九月二十一日上午会见了日本索尼公司会长盛田昭夫和夫人一行。"},{"type":"paragraph","text":"索尼公司是日本一家主要生产收音机、录音机、电视机等产品的大型电子公司。邓小平副总理同盛田会长就加强中国同索尼公司在电子工业方面的合作关系，进行了友好的交谈。"},{"type":"paragraph","text":"王震副总理会见葡萄牙通讯社社长"},{"type":"paragraph","text":"国务院副总理王震九月二十一日上午会见了葡萄牙通讯社社长蒂托·德莫赖斯、副社长安东尼奥·拉莫斯。"},{"type":"paragraph","text":"这两位葡萄牙客人是第一次来中国访问。会见时，王副总理说，他们的访问将使中葡两国和两国人民的相互了解和友谊进一步加强。德莫赖斯社长说，作为新闻界人士来说，这次访问中国是我们了解中国人民生活和工作情况的好机会。他表示相信，葡中之间的友好合作关系今后将会进一步发展。"},{"type":"paragraph","text":"国务院决定嘉奖一批先进企业和劳动模范"},{"type":"paragraph","text":"国务院将在中华人民共和国成立三十周年前夕，嘉奖工业交通基本建设战线的一批全国先进企业和全国劳动模范。目前评选工作已经结束，共评选出全国先进企业一百一十八个，全国劳动模范二百二十二人。国务院将隆重举行授奖仪式，给先进企业颁发“全国先进企业”嘉奖令，授予劳模“全国劳动模范”奖章和证书。通过表彰先进，进一步动员全国各条战线的职工，全面贯彻执行调整，改革、整顿、提高的方针，同心同德夺取四个现代化第一个战役的胜利。"},{"type":"paragraph","text":"国务院就召开全国棉花生产会议发出通知"},{"type":"paragraph","text":"国务院最近发出通知，决定于今年十一月下旬在北京召开全国棉花生产会议。会议内容是，总结交流棉花大面积高产经验，落实一九八○年棉花生产任务，研究棉花生产、收购政策（价格与口粮）和其它技术措施，讨论一九八一年至一九八五年棉花生产发展规划。（均据新华社）"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"王震","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cdbdd3a77f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
