script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"政协全国委员会常委会停止右派分子章伯钧政协副主席职务和右派分子章乃器等八人政协常委职务","authors":[],"dates":[{"year":1958,"month":3,"day":10}],"is_range_date":false,"parts":[{"text":"政协全国委员会常委会停止右派分子章伯钧政协副主席职务和右派分子章乃器等八人政协常委职务","type":"title"},{"text":"新华社17日讯中国人民政治协商会议第二届全国委员会常务委员会，在10日举行了第五十次会议。","type":"paragraph"},{"text":"会议一致通过了“中国人民政治协商会议全国委员会关于整风办法的规定”。规定说明：目前我国人民在中国共产党的领导下，正在全国范围广泛展开整风运动。政协组织也应该积极进行整风，就各方面在整风运动中辩论的有关政治、经济、文化教育、民族和政协工作等带有根本性的共同性的问题，有计划地组织大辩论。以便通过学习和大辩论的方式，一方面，同资产阶级右派划清界限，破资本主义立场，立社会主义立场；另方面，克服工作中的缺点，改进政协的工作。会议又通过了“中国人民政治协商会议全国委员会整风领导小组名单”。","type":"paragraph"},{"text":"会议还一致通过了“中国人民政治协商会议第二届全国委员会常务委员会关于撤销周鲸文的委员资格的决议”。","type":"paragraph"},{"text":"会议还一致通过了“中国人民政治协商会议第二届全国委员会常务委员会第五十次会议关于停止右派分子章伯钧政协全国委员会副主席职务和右派分子章乃器等八人政协全国委员会常务委员职务的决定”；又一致通过了“中国人民政治协商会议第二届全国委员会常务委员会第五十次会议关于撤销右派分子叶笃义等十二人职务的决定”。会议还通过了“中国人民政治协商会议全国委员会常务委员会决定任免的名单”。","type":"paragraph"},{"text":"会议还通过了“中国人民政治协商会议全国委员会工作组组织简则”和关于由政协全国委员会处理的政协第二届全国委员会第三次全体会议的提案和建议案的初步处理意见。","type":"paragraph"},{"text":"中国人民政治协商会议第二届全国委员会常务委员会第五十次会议关于停止右派分子章伯钧政协全国委员会副主席职务和右派分子章乃器等八人政协全国委员会常务委员职务的决定","type":"subtitle"},{"text":"停止右派分子章伯钧中国人民政治协商会议全国委员会副主席职务；","type":"paragraph"},{"text":"停止右派分子章乃器、陈铭枢、罗隆基、黄琪翔、钱端升、叶恭绰、刘王立明、王葆真等八人中国人民政治协商会议全国委员会常务委员职务。","type":"paragraph"},{"text":" 来源：《人民日报》1958年3月18日。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8b404f6ca5"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
