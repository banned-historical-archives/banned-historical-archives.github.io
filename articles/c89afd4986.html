ors":[],"dates":[{"year":1988,"month":6,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　今日本报论苑版(第四版)刊登中共中央宣传 部副部长龚育之为本报撰写的特稿《思想解放的新起点》，首次披露在生产资料私有制的社会主义改造完成之后，毛泽东、刘少奇、周恩来有关放开私人企业的讲话材料。"},{"type":"paragraph","text":"龚育之认为，这些材料中处于萌芽状态的好思想，后来由于各种复杂情况而夭折了，对此进行考察和探索是有历史借鉴作用的。"},{"type":"paragraph","text":"该文还分析五四运动、延安整风和十一届三中全会这三次思想解放运动的内在联系，提出了第三次思想解放运动是一个新起点、新阶段的三个标志，并将思想解放的落脚点放在解放生产力上，具有较强的说服力。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c89afd4986"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
