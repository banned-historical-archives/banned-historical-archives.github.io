" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji28","name":"毛泽东全集第28卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji28.pdf"],"article":{"title":"接受瑞典驻华大使阿马斯顿呈递国书时的答词","alias":"","parts":[{"type":"paragraph","text":"接受瑞典驻华大使阿马斯顿"},{"type":"paragraph","text":"呈递国书时的答词"},{"type":"paragraph","text":"（1950年6月12日）大使先生："},{"type":"paragraph","text":"我很高兴地接受贵大使呈递的瑞典王国国王所授予的国书，并感谢贵大使的祝贺。"},{"type":"paragraph","text":"中瑞两国人民之间已存在长期的友谊，在致力于世界和平的维护上，贵我两国人民有着共同的愿望。现在中瑞两国外交关系的建立，不但将使已存在于两国人民间的友谊日益巩固，且将有助于世界的持久和平。"},{"type":"paragraph","text":"我热烈地欢迎贵大使出任瑞典王国驻中华人民共和国首任特命全权大使，并愿在贵大使加强两国合作的工作中，予以协助。"},{"type":"paragraph","text":"谨祝贵国国家繁荣，人民兴旺，并祝贵国元首健康。"}],"authors":["毛泽东"],"dates":[{"year":1950,"month":6,"day":12}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":473,"page_end":473},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"01adfc59f3"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
