<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"克服右倾思想　坚决打击反革命及坏分子上海继续加强公安工作马敬铮提出四项措施并分析了社会治安情况","authors":[],"dates":[{"year":1957,"month":9,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　上海市公安局副局长马敬铮昨天在人代会上说:为了进一步加强公安工作，坚决打击反革命特务分子及一切坏分子的现行破坏活动，巩固社会治安秩序，保卫社会主义革命运动和社会主义建设事业的顺利进行，公安局准备采取以下措施:"},{"type":"paragraph","text":"第一、根据“有反必肃”和“对坏分子必须实行专政”的政策精神，依靠群众，加强对敌斗争的各项措施，坚决、及时、严厉地打击反革命分子和其他坏分子的破坏活动。对于现行反革命分子，罪该逮捕而又拒不坦白的历史反革命分子，社会上的流氓、阿飞、盗窃犯、凶杀犯、强奸犯、诈骗犯、走私犯、赌头赌棍、严重破坏社会秩序等违法犯罪分子和公众公认为坏人的人，应当坚决依法逮捕惩办；对刑满释放和经宽大处理再犯罪者再捉再判。对于那些犯罪情节较轻，不够逮捕判刑的分子，也要分别情节，予以严肃处理。"},{"type":"paragraph","text":"第二、密切配合各机关、工厂、企业、学校、里弄居民组织，加强对于部、职工、青年、学生和居民社会主义品质道德和遵守法纪的宣传教育，提高广大群众的革命警惕性，积极防范和揭发反革命分子和各种坏分子的破坏活动。同时，还应深入批判和反对资产阶级的贪图享乐思想和腐化堕落行为，抵制资产阶级及其他剥削阶级思想的侵蚀，并进行遵守法制和爱护国家财产的宣传教育，以树立新的社会风气，这是一个极重要的预防犯罪的措施。"},{"type":"paragraph","text":"第三、密切配合有关部门，加强社会改造工作，以保障社会秩序的安定。对刑满释放分子必须加强经常的监督教育，对反革命分子和刑事犯罪分子的家属应当加强争取教育工作，使他们遵守政府法令，从事正当劳动生产。"},{"type":"paragraph","text":"第四、根据当前政治形势，深入教育全体公安人员，提高社会主义觉悟和政策思想水平，提高对敌斗争的能力；通过整风运动，深入检查工作，坚决克服对待反革命分子和其他坏分子的右倾思想；并在实际斗争中认真克服思想作风上存在的官僚主义、主观主义和宗派主义，改进工作作风，密切联系群众，更好地完成公安保卫工作任务。"},{"type":"paragraph","text":"在提出上述措施前，马敬铮分析了上海社会治安情况。这一时期，本市的社会治安秩序，虽然是安定的，但海外的敌特机关和残余的反革命分子仍在利用各种机会进行破坏捣乱，我们丝毫不能放松革命警惕性。"},{"type":"paragraph","text":"马敬铮说，当前社会治安方面突出的情况是坏分子的破坏活动比较猖獗。少数不法资产阶级分子和其他坏分子，盗窃、贪污国家资财，投机、走私，和流氓、阿飞强奸妇女，破坏公共秩序等违法犯罪活动都相当严重。"},{"type":"paragraph","text":"马敬铮在分析破坏活动的历史根源后指出，公安局对于各种坏分子活动趋于严重的情况估计不足的，存在有相当严重的右倾思想。今后应当根据柯庆施同志政治报告的精神和当前实际情况，坚决克服右倾思想，进一步加强公安工作。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"116a4154b2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
