" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"革命的新生力量所向无敌──再祝武汉地区无产阶级革命派夺取更大的新胜利","authors":["《人民日报》编辑部"],"dates":[{"year":1967,"month":7,"day":28}],"is_range_date":false,"parts":[{"text":"革命的新生力量所向无敌──再祝武汉地区无产阶级革命派夺取更大的新胜利","type":"title"},{"text":"《人民日报》编辑部","type":"authors"},{"text":"昨天，武汉地区驻军和无产阶级革命派，举行了隆重的誓师大会，决心掀起一个向中国的赫鲁晓夫，向党内、军内一小撮走资本主义道路当权派进行大批判的新高潮。这个会开得好！它表明武汉地区的无产阶级革命派誓把无产阶级文化大革命进行到底的坚强决心，表明武汉地区的无产阶级文化大革命，在毛主席无产阶级革命路线的指引下，胜利前进。","type":"paragraph"},{"text":"武汉地区的无产阶级革命派，是在资产阶级反动路线的长期白色恐怖下冲杀出来的。他们不畏强暴，艰苦奋战，一往无前，冲破了重重阻力，经受了严重考验，英勇地坚持和捍卫了毛主席的无产阶级革命路线，创造出今天这样的胜利局面。在最近这场两个阶级的大搏斗中，他们又为无产阶级文化大革命建立了不朽的功勋。","type":"paragraph"},{"text":"武汉地区的无产阶级革命派是好样的！他们不愧是无产阶级的革命硬骨头！","type":"paragraph"},{"text":"我们向在惊涛骇浪中锻炼出来的武汉地区无产阶级革命派致以战斗的敬礼！","type":"paragraph"},{"text":"在一派大好形势下，无产阶级革命派必须清醒地看到，要夺取彻底的胜利，还要准备进行艰巨的斗争。但是，历史的潮流不可阻挡。革命的新生力量所向无敌。胜利一定属于沿着毛主席的无产阶级革命路线前进的武汉地区无产阶级革命派！","type":"paragraph"},{"text":"我们伟大的领袖毛主席教导我们：“我们能够依靠自己组织的力量，打败一切中外反动派。”","type":"paragraph"},{"text":"我们完全相信，武汉地区的无产阶级革命派，是有勇气、有智慧、有能力自己解放自己的，是一定能够依靠自己的力量，粉碎敌人的一切阴谋诡计，把武汉地区党内军内一小撮走资本主义道路的当权派彻底打倒的。只要他们坚定不移地贯彻毛主席的无产阶级革命路线；在斗争中，活学活用毛主席著作，坚决执行党的政策，紧紧掌握斗争大方向；高举革命大联合的旗帜，加强团结，共同对敌；不断地总结经验，不断地提高斗争艺术，就一定能够夺取武汉地区无产阶级文化大革命的彻底胜利。","type":"paragraph"},{"text":"受蒙蔽的群众是要革命的。他们一定会觉醒过来，反戈一击，也一定能够自己解放自己。武汉地区的无产阶级革命派正在对受蒙蔽的群众进行深入细致的政治思想工作，已经取得了很好的成效。今后要继续坚持这样做，满腔热情地帮助他们。","type":"paragraph"},{"text":"紧紧和革命群众站在一起的武汉驻军广大指战员，是武汉地区无产阶级革命派的坚强后盾。你们一定要紧紧地站在坚持毛主席革命路线的无产阶级革命派一边，急他们所急，想他们所想，全心全意地、满腔热情地、毫不含糊地从各个方面支援他们，和他们同呼吸，共命运，去夺取武汉地区无产阶级文化大革命的彻底胜利，为人民作出新贡献！","type":"paragraph"},{"text":" （载《人民日报》一九六七年七月二十八日，社论）","type":"paragraph"}],"comments":[],"origin":"载《人民日报》一九六七年七月二十八日，社论","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"革命大批判","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"66a03520f0"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
