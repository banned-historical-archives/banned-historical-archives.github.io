<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"“现代京剧热”　各界评说不一有人说是“文革”中“样板戏”的旧戏复排　有人说它对传统京剧是个很大的突破","authors":["金为文"],"dates":[{"year":1997,"month":2,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报1月23日3版刊发了《今年演出市场新现象——现代京剧热》一稿，对各地排演现代京剧的一些情况作了报道。笔者在来访中发现，如何认识这一现象，社会各界评说不一，意见纷纭。"},{"type":"paragraph","text":"接受笔者来访的有关专家都认为，近年逐渐成为文化热点的不只是京剧《智取威虎山》、《沙家源》和《红灯记》。其中还包括舞剧《白毛女》和《红色娘子军》。实际上就是“文革”中的所谓“样板戏”旧戏复排。当然，也有专家认为，在使用这个提法时应作具体分析。他们认为，这些戏在复排时，事实上已经剔除了“文革”中江青一伙强加到这些剧目上的内容，回复到了“文革”前的版本。将此笼统地称之为“样板戏热”，是不确切的。"},{"type":"paragraph","text":"那么，“现代京剧热”是怎么来的?多数专家认为，这是市场炒作的结果，是非艺术因素造成的。武汉《剧坛》主编蒋锡武称它是一次“带有政治色彩的商业炒作。”何满子则认为，这种热，就像音像市场上一度出现过的“红太阳”歌曲热，都是昙花一现的，并无积极的文化意义。他认为，一些国家剧院、甚至文化主管部门也在大规模主办这类演出，这样不妥，会伤害“文革”受害者的感情，剧团要掌握允许和提倡的分寸。"},{"type":"paragraph","text":"策划《红灯记》访沪演出的弘韵公司朱国梁经理说，观众喜欢是最主要的，现代京剧多年来在民间传唱不休，说明它是有市场的，这并非单纯的炒作，顺应民意，重现它的舞台魅力，是符合市场规律的做法，对活跃今天的演出市场是有积极意义的。"},{"type":"paragraph","text":"现代京剧因何而热?天津剧评家刘连群认为，今天三、四十岁的中青年只是通过样板戏了解京剧的，对此他们育种特殊的怀旧心理，正像知青文学热一样，另一部分是文革后出生的小青年，他们对现代京剧有一种强烈的好奇心，猎奇的成分占了多数。"},{"type":"paragraph","text":"接触京剧不久的南开大学学生刘佳看戏后告诉笔者，《红灯记》旋律好听，情节看得懂，与传统戏比确有耳目一新之感，但有不少地方也很可笑。"},{"type":"paragraph","text":"京剧界人士认为，现代京剧成为热点，还与目前京剧市场缺乏高质量的现代戏有关。上海京剧院徐幸捷总经理认为，现代戏最大特点是雅俗共赏，但唱腔设计的要求极高，多年来，现代戏的探索陷于停滞，新创作的一些戏关键在音乐上都没过关。"},{"type":"paragraph","text":"现代京剧热，再次引发了对“样板戏”的艺术评价问题。包括著名学者冯英子、黄裳在内的许多专家认为，现代京剧对传统京剧的程式、脸谱等艺术形式进行了破坏性的改造，在“三突出”的规范下，都成了公式化和概念化的东西，非但没有发展京剧艺术，还作了误导，虽然作了一些探索，但没能最终解决用传统程式来表现现代生活的课题。"},{"type":"paragraph","text":"《智取威虎山》作曲之一、上海音乐学院连波提出，要实事求是评价现代京剧。他认为，现代京剧在艺术上是有成就的，它吸收了西洋歌剧的法则，又在认真把握“西皮、二簧”规律的基础上作了创新，每一出戏都有不同的音乐个性，这很了不起，对传统京剧是个很大的突破。"},{"type":"paragraph","text":"也有专家发表了另一种见解，这种见解认为，现代京剧以西方的戏剧观念和艺术样式为本，改变了传统戏曲的艺术思维方式和基本原则，作为不同的戏剧文化，中西戏剧(曲)无绝对优劣之分。就音乐来说，歌剧和京剧都讲个性，歌剧讲的是一出戏的音乐个性，每出戏都有不同的主题和个性。而京剧讲的是不同流派的演唱个性，即同一出戏有不同的风格。但是“样板戏”却是用西方的个性取代中国个性，使之产生了质的变化，挖掉了京剧的根。　金为文"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"da7700dd11"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
