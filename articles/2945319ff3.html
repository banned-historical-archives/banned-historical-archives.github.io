s":[{"year":1981,"month":6,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"叶剑英委员长赵紫阳总理电唁拉赫曼总统遇害逝世"},{"type":"paragraph","text":"新华社北京5月31日电  叶剑英委员长和赵紫阳总理昨天打电报给孟加拉国代理总统阿卜杜勒·萨塔尔，对齐亚·拉赫曼总统遇害逝世表示沉痛哀悼。"},{"type":"paragraph","text":"电报全文如下：阿卜杜勒·萨塔尔代总统阁下："},{"type":"paragraph","text":"惊悉孟加拉人民共和国总统齐亚·拉赫曼阁下不幸遇害逝世，我们代表中国政府和人民向孟加拉国政府和人民表示沉痛的哀悼，并向齐亚总统的家属表示深切的慰问。"},{"type":"paragraph","text":"齐亚·拉赫曼总统生前为维护民族独立和国家主权，发展民族经济和文化进行了不懈的努力，为发展中孟友好合作关系做出了重要贡献。我们相信，孟加拉国人民将化悲痛为力量，继承齐亚·拉赫曼总统的遗志，为建设一个独立自主、繁荣昌盛的孟加拉国而继续努力。"},{"type":"paragraph","text":"中华人民共和国全国人民代表大会常务委员会委员长  叶剑英"},{"type":"paragraph","text":"中华人民共和国国务院总理  赵紫阳"},{"type":"paragraph","text":"1981年5月30日于北京"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"赵紫阳","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2945319ff3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
