:[],"dates":[{"year":1964,"month":5,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"刘少奇主席接见肯尼亚政府代表团"},{"type":"paragraph","text":"肯尼亚贵宾在京参观水库和工厂"},{"type":"paragraph","text":"新华社七日讯　中华人民共和国主席刘少奇，今天下午接见肯尼亚内政部长奥廷加和由他率领的肯尼亚政府代表团全体成员：总理办公厅国务部长穆隆比、财政和经济计划部助理秘书克里里、总理办公厅外事部助理秘书基伊卢、代表团秘书奥德罗，以及随团来访的奥廷加部长私人秘书奥蒂诺。刘主席同他们进行了亲切友好的谈话。"},{"type":"paragraph","text":"在座的有：国务院副总理陈毅，以及曾山、刘宁一、姬鹏飞、方毅、卢绪章等有关方面负责人。"},{"type":"paragraph","text":"肯尼亚驻中国大使亨利·穆利也在座。"},{"type":"paragraph","text":"今天上午，肯尼亚贵宾们参观了北京郊区密云水库和北京工艺美术工厂。（附图片）"},{"type":"paragraph","text":"左图：刘主席接见由肯尼亚内政部长奥廷加（左四）和由他率领的肯尼亚政府代表团全体成员，左起第六人是总理办公厅国务部长穆隆比"},{"type":"paragraph","text":"新华社记者　张彬摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d8d9fff1c2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
