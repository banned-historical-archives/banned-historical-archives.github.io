raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/c21f8808-2334-4e60-a047-27a52e8adbce/1.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/c21f8808-2334-4e60-a047-27a52e8adbce/2.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/c21f8808-2334-4e60-a047-27a52e8adbce/3.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/c21f8808-2334-4e60-a047-27a52e8adbce/4.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/c21f8808-2334-4e60-a047-27a52e8adbce/5.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/c21f8808-2334-4e60-a047-27a52e8adbce/6.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/c21f8808-2334-4e60-a047-27a52e8adbce/7.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/c21f8808-2334-4e60-a047-27a52e8adbce/8.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/c21f8808-2334-4e60-a047-27a52e8adbce/9.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/c21f8808-2334-4e60-a047-27a52e8adbce/10.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/c21f8808-2334-4e60-a047-27a52e8adbce/11.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/c21f8808-2334-4e60-a047-27a52e8adbce/12.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/c21f8808-2334-4e60-a047-27a52e8adbce/13.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/c21f8808-2334-4e60-a047-27a52e8adbce/14.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/c21f8808-2334-4e60-a047-27a52e8adbce/15.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/c21f8808-2334-4e60-a047-27a52e8adbce/16.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/c21f8808-2334-4e60-a047-27a52e8adbce/17.png"],"article":{"title":"前言","alias":"","parts":[{"type":"title","text":"前言"},{"type":"paragraph","text":"“四人帮”通过各种渠道把黑手伸进湖北武汉，指使和支持夏邦银、朱洪霞、胡厚民等人，批邓另搞一套，另立中心，大搞无政府主义，大搞反党篡权活动，干了许多坏事，严重地破坏了革命和生产。他们于一九七六年二、三月间，以中央委员、中央候补委员和省、市革委会部分成员的名义，将所谓的《一封信》和《公开信》以及口号报，贴遍了武汉三镇。这是他们重拉山头，自成体系，公开与省、市委分庭抗礼，妄图篡党夺权的宣言书、动员令。胡厚民用心险恶地说：“六九年反复旧期间，总理批评我们为什么不先向中央打个招呼？这一次我们先向毛主席、党中央写了信。”他们在武汉地区四处集会，八方串连，肆意歪曲毛主席的一系列重要指示，恶毒攻击华主席、叶副主席、李副总理，大整中央领导同志、省、市委和各级党委的黑材料，向“四人帮”投送，并且大量散布“四人帮”的黑话，煽动层层揪“代理人”，处处抓“走资派”，颠倒是非，混淆黑白，蛊惑人心，制造混乱，流毒甚广，必须放手发动群众，进行彻底批判。"},{"type":"paragraph","text":"现将他们在街头贴出的《一封信》和《公开信》以及他们自行召开的一部分会议上的讲话，节录印发，供批判用。"}],"authors":["中共武汉市委材料组"],"dates":[{"year":1976,"month":12}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"中共武汉市委材料组，一九七六年十二月","page_start":2,"page_end":3},"tags":[{"name":"四人帮","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b0727d84bb"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
