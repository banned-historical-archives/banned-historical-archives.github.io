ical-archives/banned-historical-archives0/main/maoquanji49.pdf"],"article":{"title":"就左派队伍问题和张春桥、姚文元的谈话","alias":"","parts":[{"type":"paragraph","text":"就左派队伍问题和张春桥、姚文元的谈话！"},{"type":"paragraph","text":"（1966年10月1日）毛泽东（以下简称毛）：你看左派有多少？答：上海好一点，左派队伍大。毛：多大？答：工人有40万、50万、60万。毛：左派不会多，大概占10%。答：后期可能多一点。"},{"type":"paragraph","text":"[1]这次谈话是1966年国庆节晚上在天安门上看焰火休息时进行的，张春桥1967年6月16日在上海革委会扩大会议上传达此次谈话情况时还补充说：这是指世界观的改造，不是指一般的表现，是指世界观里有较多的马列主义、毛泽东思想。要完全的马列主义、毛泽东思想就更难了。"}],"authors":["毛泽东"],"dates":[{"year":1966,"month":10,"day":1}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":87,"page_end":87},"tags":[{"name":"姚文元","type":"人物"},{"name":"张春桥","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"上海文革","type":"人物"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0260261f41"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
