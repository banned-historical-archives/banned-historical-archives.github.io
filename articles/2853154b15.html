art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东思想是世界革命人民力量的源泉意大利、锡兰、丹麦出版毛主席光辉著作","authors":[],"parts":[{"type":"paragraph","text":"新华社讯 罗马消息：意大利文版的《毛主席语录》最近在意大利由东方出版社翻译出版，受到意大利劳动人民和进步人士的热烈欢迎。"},{"type":"paragraph","text":"意大利文版《毛主席语录》为红色封面，正文前印有毛主席的照片和林彪同志的题词。"},{"type":"paragraph","text":"这本书的第一版印了五千册，第二版准备再印两万册。"},{"type":"paragraph","text":"新华社科伦坡电 僧伽罗文版的《毛主席语录》最近已由科伦坡人民出版社出版，正在科伦坡发行。"},{"type":"paragraph","text":"出版社在致读者的说明中指出：“《毛主席语录》不仅是给中国人民而且是给全世界千百万革命人民以鼓舞力量的巨大源泉。”《毛主席语录》“反映了当代最伟大的革命家毛泽东主席的伟大思想”，是“二十世纪最流行的书。”"},{"type":"paragraph","text":"《毛主席语录》是由锡中友好协会秘书长阿南达·库马拉翻译的。"},{"type":"paragraph","text":"新华社十四日讯 哥本哈根消息：毛主席的光辉著作“老三篇”——《为人民服务》、《纪念白求恩》、《愚公移山》——和《关于正确处理人民内部矛盾的问题》，最近由丹麦《未来》出版社用丹麦文出版。"},{"type":"paragraph","text":"去年年底以来，毛主席的重要著作《新民主主义论》、《在延安文艺座谈会上的讲话》和《在中国共产党全国宣传工作会议上的讲话》已经先后译成丹麦文出版。"},{"type":"paragraph","text":"丹麦共产主义小组的刊物《方针报》三月十五日全文发表了毛主席的文章《人的正确思想是从那里来的？》，以便于读者学习。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"人民内部矛盾","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2853154b15"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
