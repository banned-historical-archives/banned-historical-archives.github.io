" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji32","name":"毛泽东全集第32卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji32.pdf"],"article":{"title":"祝贺朝鲜解放七周年的电报","alias":"","parts":[{"type":"paragraph","text":"祝贺朝鲜解放七周年的电报"},{"type":"paragraph","text":"（1952年8月13日）朝鲜民主主义人民共和国最高人民会议常任委员会委员长金科奉同志："},{"type":"paragraph","text":"值此朝鲜解放七周年之际，我代表中国人民、中华人民共和国政府，并以我个人名义谨向您、兄弟的朝鲜人民及朝鲜民主主义人民共和国政府致衷心的祝贺。"},{"type":"paragraph","text":"朝鲜人民为争取祖国独立解放、反对美帝国主义侵略者的英勇斗争，对拯救世界和平的事业作了巨大贡献。"},{"type":"paragraph","text":"为了抗击共同的敌人，为了朝鲜的和平及中国的安全，中国人民将永远坚定地与朝鲜人民在一起，为彻底战胜美帝国主义侵略者而奋斗。"},{"type":"paragraph","text":"祝在战斗中不断成长的、牢不可破的中朝两国友谊永远巩固，并祝朝鲜人民在解放战争中获得更大的胜利。"},{"type":"paragraph","text":"中华人民共和国中央人民政府主席毛泽东"},{"type":"paragraph","text":"一九五二年八月十三日北京"}],"authors":["毛泽东"],"dates":[{"year":1952,"month":8,"day":13}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":195,"page_end":195},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4f734347a7"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
