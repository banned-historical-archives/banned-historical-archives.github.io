料的现象很普遍政治影响极坏","authors":[],"dates":[{"year":1952,"month":2,"day":7}],"is_range_date":false,"parts":[{"text":"锦州公营企业给国营企业加工中偷工减料的现象很普遍政治影响极坏","type":"title"},{"text":"【东北总分社七日讯】锦州市大张旗鼓地开展三反运动以来，发现公营企业在给国营企业加工中偷工减料的现象也很严重，不仅使国家财富受到损失，而且政治影响很坏。荣新纺织厂去年给中国花纱布公司辽西省公司加工三千三百疋棉花包布时，即曾偷纱八十捆(每捆九斤)。某工程公司承修某飞机场时，也曾偷工减料。这种现象不仅使国家财富受到损失，而且造成了很坏的政治影响。有的私营加工企业的老板就说：“私营企业偷点工减点料有什么可怪的呢?他们公营企业不也是这样干的吗!”","type":"paragraph"}],"comments":[],"origin":"新华通讯社编《内部参考》1952年2月8日","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a487720e1b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
