ical-archives/banned-historical-archives8/main/maoquanji15.pdf"],"article":{"title":"在中共中央政治局会议上的讲话","alias":"","parts":[{"type":"paragraph","text":"在中共中央政治局会议上的讲话！"},{"type":"paragraph","text":"（1940年12月13日）"},{"type":"paragraph","text":"准备写一篇文章，主要解释以下几点：1．说明大资产阶级与民族资产阶级之间的区别，过去在《中国革命与中国共产党》第二章没有说清楚。2.《新民主主义论》虽说明了各党各派各阶级的联合专政，但没有把各党派联合专政的方针与具体政策联系起来。如地主、资本家要人权、财权等便是具体的政策。现在各根据地土地致策、劳动政策都是过“左”的，如实行八小时工作制，过高增加资等，必须解释清楚，把理论与实际政策说清楚。3．实行自我批，对过去我党的包办作风要有慎重的必要的自我批评。此外要把日派资产阶级与英美派资产阶级加以区别。"}],"authors":["毛泽东"],"dates":[{"year":1940,"month":12,"day":13}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":273,"page_end":273},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6f1b4b917c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
