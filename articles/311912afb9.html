<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"市人民评弹团联系实际批判林彪、　“四人帮”肃清业务领域假左真右流毒分清是非界限，恢复评弹特色，推动创作演出","authors":[],"dates":[{"year":1978,"month":10,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　上海市人民评弹团党支部发动群众，把揭批林彪、“四人帮”的斗争深入到业务领域，使许多同志在创作、表演、演唱等方面逐步分清了是非界限，进一步恢复了被“四人帮”全盘否定的评弹艺术的固有特色，推动了创作和演出。"},{"type":"paragraph","text":"前一个时期，评弹团有些同志认为大批判已搞得差不多了，再批也是“炒冷饭”。是“差不多”还是“差得多”?党支部及时召开了班组长骨干会议，一起分析林彪、“四人帮”假左真右在业务领域的表现，并发动演出队和文学组等单位的同志联系实际，举行各种批判会，把批判深入到业务领域中去。"},{"type":"paragraph","text":"在揭批中，大家指出:林彪一伙污蔑曲艺是“叫化子艺术”，江青、张春桥之流则叫嚷对评弹艺术要搞所谓“彻底改革”，给评弹艺术带来了灾难性的破坏。评弹艺术向以说表细腻著称，把具体环境和人物心理活动说得栩栩如生、娓娓动听。而在“四害民横行时，这种特色丧失殆尽。如中篇评弹吸杜鹃山”，改编时规定只能照京剧演出本说唱，不能走样，不准有增有删。编剧无法根据评弹艺术特点来改编，只能照京剧《胜鹃山》的骨架加一些极简略的说表，结果成了“电影加连接词”，弄得又粗又干，毫无评弹特色。为了“向京剧靠拢”，非但对白要京腔，演员要学唱京戏，作曲者也要先“吃透”京剧唱腔的旋律后再制曲，一招一式照搬京剧程式，弄得洋相百出。"},{"type":"paragraph","text":"文学组创作人员着重批判“四人帮”鼓吹的“三突出”创作模式对评弹创作的危害。在刻划英雄人物的问题上，创作人员谈到，无产阶级英雄人物并非“圣人”，他们也有成长过程。在特定条件下，他们也会有思想斗争，有悲哀，有痛苦。以说表为主要表现手段的评弹艺术，根据刻划人物和表现主题的需要，细腻地描绘英雄人物在各种不同情况下的心理活动，是完全必要的。但按照“三突出”的创作模式，英雄人物必须“高大完美”，这实际上是把英雄人物神化、僵化，给人以虚假、干瘪、乏味的感觉。创作人员分析了目前的创作情况，感到一些作品的质量不高，主要原因是创作上的帮风帮气未除，“三突出”的流毒还未肃清，创作思想还比较混乱。"},{"type":"paragraph","text":"“四人帮”大批评弹的所谓“一曲百唱”，逼着评弹摈弃原有的流派唱腔，每唱一段唱篇都要重谱一段新的曲调唱腔，新谱的曲调不能象评弹，更谈不上流派风格。这种每词一曲、一曲一唱的恶果是割断了艺术传统，使评弹失去了基本特色，而成为“评歌”。这种形而上学的做法，违反了艺术发展的规律，使评弹曲调唱腔走上了绝境。"},{"type":"paragraph","text":"通过揭批，评弹团的同志们提高了分辨路线是非的能力，调动了积极性，努力恢复评弹的艺术特色，采用说、噱、弹、唱等多种多样的艺术手法，编演了不少现代书目，最近又恢复演出了部分优秀传统书目。有些演员一个晚上连赶两场演出，有的一个人独演一场，演出场次成倍增加。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"林彪","type":"人物"},{"name":"四人帮","type":"人物"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"311912afb9"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
