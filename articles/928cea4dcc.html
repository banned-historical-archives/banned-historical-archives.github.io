rt":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"演员在台上高呼；毛主席万岁！充分表达了非洲人民对毛主席的真挚热爱","authors":[],"parts":[{"type":"paragraph","text":"据新华社哈尔滨三十一日电 几内亚国立佐利巴舞蹈团在哈尔滨首场演出的时候，演员凯塔·芒塞里满怀激情地在台上请观众和他一起高呼：“毛主席万岁！”这时，台上台下“毛主席万岁”的口号声响彻整个剧场，充分反映了非洲人民对毛主席的真挚热爱。"},{"type":"paragraph","text":"几内亚国立佐利巴舞蹈团是在五月二十九日由长春到达哈尔滨的。今天晚上举行了在哈尔滨的首场演出。几内亚艺术家在演唱《战斗的非洲歌颂毛泽东和他伟大的事业》这首歌曲时，一千多名观众爆发出一阵阵的热烈掌声。觉醒的非洲人民的使者在毛主席画象下面边歌边舞。他们热情奔放地歌唱："},{"type":"paragraph","text":"啊，毛泽东，我要永远把您歌唱，"},{"type":"paragraph","text":"我要永远把您歌唱。"},{"type":"paragraph","text":"您的著作啊，就是无穷的力量，"},{"type":"paragraph","text":"您的思想啊，是永远不落的太阳！"},{"type":"paragraph","text":"它照亮了辽阔的中国，也把全世界战斗的人民心儿照亮……"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"928cea4dcc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
