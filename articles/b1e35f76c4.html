r":1980,"month":5,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"邓小平会见渡边武和夫人一行"},{"type":"paragraph","text":"据新华社北京五月二十九日电  国务院副总理邓小平今天上午会见了日、美、欧三边委员会日方委员长渡边武和夫人一行。"},{"type":"paragraph","text":"邓小平副总理欢迎朋友们来中国，并很乐意同他们就共同关心的问题交换意见。他在谈话中介绍了中国对当前世界形势的看法。他指出，战争的危险确实存在，只有承认这一点，才能提高警惕，做出最大努力，以推迟战争的爆发；如果不承认或忽视这种危险，就会给世界和平带来损害。"},{"type":"paragraph","text":"渡边武先生表示，日、美、欧三边委员会很愿意同中国有关人士进行接触，加强相互了解，并在经济上进行合作。他指出，排除占世界人口四分之一的中国来讨论国际问题，是不可能的。（附图片）"},{"type":"paragraph","text":"邓小平副总理会见日、美、欧三边委员会日方委员长渡边武，和他进行交谈。"},{"type":"paragraph","text":"新华社记者摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"世界形势","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b1e35f76c4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
