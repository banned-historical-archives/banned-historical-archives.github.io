art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"列希主席致电叶剑英委员长表示祝贺","authors":[],"parts":[{"type":"paragraph","text":"新华社讯 阿尔巴尼亚社会主义人民共和国人民议会主席团主席列希三月七日打电报给叶剑英同志，衷心祝贺他担任人大常委会委员长。电报全文如下："},{"type":"paragraph","text":"北京"},{"type":"paragraph","text":"中华人民共和国全国人民代表大会常务委员会委员长"},{"type":"paragraph","text":"叶剑英同志："},{"type":"paragraph","text":"在您当选担任中华人民共和国全国人民代表大会常务委员会委员长的崇高职务之际，我代表阿尔巴尼立社会主义人民共和国人民议会主席团，并以我个人的名义向您致以衷心的祝贺。"},{"type":"paragraph","text":"借此机会，我们向中国人民致以庆贺，并对你们国家的社会主义建设表示衷心的祝愿。"},{"type":"paragraph","text":"祝我们两国人民之间的友谊和合作在马克思列宁主义的基础上不断发展。"},{"type":"paragraph","text":"阿尔巴尼亚社会主义人民共和国人民议会主席团主席 哈奇·列希"},{"type":"paragraph","text":"一九七八年三月七日于地拉那"}],"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"32f6ad2cbf"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
