rt":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"邓副总理会见日本企业家","authors":[],"parts":[{"type":"paragraph","text":"国务院副总理邓小平三月三十一日上午会见了日本生产性本部副会长、日产汽车公司会长川又克二先生率领的日本生产性本部高级经营者访华团。访华团一行二十八人，主要是日本大企业家。他们是应中国企业管理协会邀请来我国访问。"},{"type":"paragraph","text":"在同日本朋友交谈中，邓小平副总理指出，在社会主义建设中，中国不仅要学习外国的先进科学技术，而且要学习他们的经营管理经验。他说，我们在企业管理方面还缺乏经验。我希望我们双方加强友好交流活动。川又克二先生说，他们在北京同中国企业管理人士之间进行的交流经验活动，使双方都增加了知识。"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8bfff2f9f1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
