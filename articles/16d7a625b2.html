ical-archives/banned-historical-archives0/main/maoquanji41.pdf"],"article":{"title":"关于反击挪威报纸侮辱我国领袖问题的批语","alias":"","parts":[{"type":"paragraph","text":"关于反击挪威报纸侮辱我国领袖问题的批语"},{"type":"paragraph","text":"（1959年5月4日）乔木、冷西、浦寿昌同志："},{"type":"paragraph","text":"这是第二件，第一件请找出一阅，都是对我们进攻的。第一件说，挪报第二次登出在中国主席面部打大白口的漫画，并说毛「的』是比希特勒还环的独裁者，人能骂神，不能骂毛，毛比神还利害吗？如果中国不屈服，继续胡闹，那末，西方将有一千张报纸大骂毛的独裁云云。请你们找出前后几件都看一下，谈一下对策。我意应借此同西方不是一千家，而是一万家、十万家报纸挑战，让他们都在我的面上打白口，骂希特勒的更甚者，我认为如此极为有益，将此事闹大闹长，让世界人民注意，想一想，在西藏问题上和"},{"type":"paragraph","text":"[1]乔木，即胡乔木，当时任中共中央书记处候补书记、毛泽东的秘书。冷西，即吴冷西，当时任新华通讯社社长、《人民日报》总编辑。浦寿昌，当时任周恩来办公室秘书。"},{"type":"paragraph","text":"[2]指中国驻挪威大使馆1959年4月28日给外交部的电报。电报报告了挪威报界对27日我国正式向挪威政府递交照会抗议挪威工党和报纸恶意攻击、诽谤我国领袖一事的反应。"},{"type":"paragraph","text":"[3]指中国驻挪威大使馆1959年4月25日给外交部的电报。电报报告了挪威报界对我《人民日报》发表有关挪威工党和报纸恶意攻击、诽谤我国领袖的消息一事的反应。毛泽东全集第四十一卷革命反革命界线问题上闹清楚。这是好题目，不应放过。挪威两次漫画及其凶恶论点都应登人民日报，并加驳斥，引起挪报十次二十次三十次报复，和我们的反报复。此种想法是否合理，请你们考虑一下。然后，我们再谈一下。此件你们三人看后，送刘、邓、林彪、周、陈、陈云六同志一阅，然[后]退还我。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一九五九年五月四日上午五时"},{"type":"paragraph","text":"[1]刘，指刘少奇。邓，指邓小平，当时任中共中央总书记、国务院副总理。林彪，当时任中共中央副主席、国务院副总理。周，指周恩来。陈，指陈毅，当时任中共中央政治局委员、国务院副总理兼外交部部长。陈云，当时任中共中央副主席、国务院副总理。"}],"authors":["毛泽东"],"dates":[{"year":1959,"month":5,"day":4}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":495,"page_end":496},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"name":"陈云","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"16d7a625b2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
