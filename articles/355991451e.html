art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"彭德怀元帅将率军事代表团到八个兄弟国家作友好访问","authors":[],"parts":[{"type":"paragraph","text":"本报19日讯 应波兰、德意志民主共和国、捷克斯洛伐克、匈牙利、罗马尼亚、保加利亚、阿尔巴尼亚等七个国家国防部和蒙古人民共和国军事和公安部的邀请，前往这些兄弟国家进行访问的中华人民共和国军事友好代表团已经组成。代表团由国务院副总理兼国防部长彭德怀元帅任团长。代表团团员有：王树声大将、张宗逊上将、肖华上将、杨得志上将、陈伯钧上将、陈熙空军少将、张学思海军少将、路扬大校、朱开印大校、冯征上校、郑文翰上校。代表团团员中还有我国驻上述各兄弟国家的武官。代表团由彭德怀元帅率领将于近日离开北京前往上述各兄弟国家作友好访问。"}],"alias":""},"tags":[{"name":"彭德怀","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"355991451e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
