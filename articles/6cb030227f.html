script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"中匈签订友好合作条约两国本真诚合作精神参加一切维护和平的国际行动　重申继续巩固发展两国政治、经济、文化合作的决心","authors":[],"dates":[{"year":1959,"month":5,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京6日电】　中华人民共和国和匈牙利人民共和国友好合作条约的签字仪式，今天晚间在北京中南海紫光阁隆重举行。"},{"type":"paragraph","text":"7时25分，中华人民共和国全权代表周恩来总理、匈牙利人民共和国全权代表明尼赫·费伦茨总理，分别代表中匈双方在友好合作条约上签字。"},{"type":"paragraph","text":"中国方面参加签字仪式的有:中华人民共和国主席刘少奇，中华人民共和国副主席宋庆龄、董必武，全国人民代表大会常务委员会委员长朱德，中共中央总书记邓小平，中共中央政治局委员、书记处书记彭真，国务院副总理陈毅、习仲勋，中共中央书记处书记王稼祥，对外贸易部长叶季壮，第一机械工业部长赵尔陆，教育部长杨秀峰，外交部副部长章汉夫，中共中央候补委员周扬，中华人民共和国驻匈牙利人民共和国特命全权大使郝德青，外交部苏联东欧司司长王雨田，外交部礼宾司司长俞沛文。"},{"type":"paragraph","text":"匈牙利方面参加签字仪式的有:匈牙利社会主义工人党中央委员会政治局委员、书记处书记、匈牙利人民共和国主席团副主席基什·卡罗伊，外交部长西克·安德烈博士，对外贸易部长英切·耶诺，冶金和机械工业部长策尔戈·亚诺什，文化教育部第一副部长阿策耳·捷尔吉，匈牙利人民共和国驻中华人民共和国特命全权大使诺格拉第·山道尔，匈牙利社会主义工人党中央委员会国际联络部长西拉吉·德热，匈牙利社会主义工人党中央委员会宣传鼓动部副部长达尔瓦西·伊斯特万，外交部礼宾司司长察托尔道伊·卡罗伊，外交部亚非司司长劳德瓦尼·亚诺什。"},{"type":"paragraph","text":"签字后，双方亲切握手，相互举杯，热烈祝贺友好合作条约的签订。"},{"type":"paragraph","text":"中匈友好合作条约【新华社北京6日电】　中华人民共和国和匈牙利人民共和国友好合作条约"},{"type":"paragraph","text":"中华人民共和国主席和匈牙利人民共和国主席团，愿意在国际主义思想的指导下，在互相尊重主权、互不干涉内政和平等互利的基础上，巩固和发展中华人民共和国和匈牙利人民共和国之间兄弟般的友好合作关系；决心尽一切力量保障和巩固世界和平，并且对保障欧洲和亚洲各国人民的安全作出一切可能的贡献；深信巩固和发展两国之间的友好合作关系符合于中国人民和匈牙利人民的利益，同时，也符合于世界各国人民的利益。在上述基础上，决定缔结木条约，并且为此各派全权代表如下:"},{"type":"paragraph","text":"中华人民共和国主席特派中华人民共和国国务院总理周恩来；"},{"type":"paragraph","text":"匈牙利人民共和国主席团特派匈牙利人民共和国工农革命政府总理明尼赫·费伦茨博士。"},{"type":"paragraph","text":"双方全权代表互相校阅全权证书认为妥善后，议定下列各条:"},{"type":"paragraph","text":"第一条"},{"type":"paragraph","text":"缔约双方将本着真诚合作的精神，并且在符合联合国宪章原则下，参加一切旨在维护世界和平和各国人民的安全的国际行动。"},{"type":"paragraph","text":"第二条"},{"type":"paragraph","text":"缔约双方将本着兄弟般的合作精神，就两国关心的一切重要的国际问题进行磋商，在磋商中，将特别注意保障两国的领土完整和安全。"},{"type":"paragraph","text":"第三条"},{"type":"paragraph","text":"缔约双方重申决心，将本着互相尊重主权、互不干涉内政、平等互利的原则，继续巩固和发展两国的政治、经济和文化合作关系。"},{"type":"paragraph","text":"第四条"},{"type":"paragraph","text":"本条约不涉及中华人民共和国和匈牙利人民共和国对其他国家承担的义务。"},{"type":"paragraph","text":"第五条"},{"type":"paragraph","text":"本条约在未经双方就修改或者终止达成协议以前，将一直有效。"},{"type":"paragraph","text":"第六条"},{"type":"paragraph","text":"本条约须经批准，并自互换批准书之日起生效。批准书在布达佩斯互换。"},{"type":"paragraph","text":"本条约于1959年5月6日在北京签订，共两份，每份都用中文和匈文写成，两种文本具有同等效力。"},{"type":"paragraph","text":"中华人民共和国　　匈牙利人民共和国"},{"type":"paragraph","text":"全权代表　　　　　全权代表"},{"type":"paragraph","text":"周恩来(签字)　　明尼赫·费伦茨(签字)"},{"type":"paragraph","text":"(编者按:“关于匈牙利社会主义工人党和匈牙利人民共和国工农革命政府代表团访问中华人民共和国的新闻公报”见第四版)"},{"type":"paragraph","text":"\u003cIMG alt=请插入4号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1959\\05\\5957010201.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e毛主席在接见匈牙利党政代表团时，同明尼赫总理亲切握手。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入4号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1959\\05\\5957010202.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgaut\u003e刘庆瑞\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e毛主席和十一个兄弟国家代表团在一起"},{"type":"paragraph","text":"(新华社记者　刘庆瑞　摄)\u003c/FONT\u003e"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6cb030227f"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
