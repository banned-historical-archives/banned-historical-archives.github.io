ear":1965,"month":5,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京30日电　中共中央副主席、中华人民共和国主席刘少奇，中共中央副主席、国务院总理周恩来，今天下午接见了阿尔巴尼亚劳动党中央政治局委员、部长会议第一副主席斯皮罗·科列加，阿尔巴尼亚劳动党中央政治局候补委员、部长会议副主席科乔·蒂奥多西，以及由他们率领的阿尔巴尼亚政府经济代表团的成员；阿尔巴尼亚劳动党中央政治局委员、阿尔巴尼亚工会中央理事会主席果格·努什，和由他率领的阿尔巴尼亚工会代表团的成员。"},{"type":"paragraph","text":"刘少奇和周恩来同志同阿尔巴尼亚同志进行了亲切的谈话。"},{"type":"paragraph","text":"接见时在座的，有李先念副总理，以及有关方面负责人刘宁一、刘晓、方毅、林海云、朱学范等。阿尔巴尼亚驻中国大使奈斯蒂·纳赛也在座。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1427ff1438"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
