year":1994,"month":9,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席纪念堂铜门焕然一新"},{"type":"paragraph","text":"本报讯记者杨涌报道：在毛泽东同志逝世１８周年纪念日前夕，刚刚清洗完毕的毛主席纪念堂四面大门，以它崭新的面貌展示在络绎不绝的瞻仰者面前。"},{"type":"paragraph","text":"毛主席纪念堂建成十多年，经风吹日晒、大气污染，外观不同程度地受到损坏，尤其是铜质大门，氧化、变色严重。去年整个建筑虽曾进行过大规模的维修，但因技术原因，铜门部分未能予以清洗保护。今年，曾成功地清洗过人民大会堂铜门的甘肃兰科楼宇清洗技术总公司主动请缨，义务为纪念堂做贡献，用８０天的时间，一丝不苟地将５３０多平方米的８扇大门全部清洗一新。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9756c6ee90"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
