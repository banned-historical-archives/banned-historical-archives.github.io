想使会议离开目标的立场遭到强烈反对而失败","authors":[],"dates":[{"year":1961,"month":9,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"艾地谈不结盟国家首脑会议"},{"type":"paragraph","text":"会议宣言是独立外交政策的胜利和对修正主义的打击"},{"type":"paragraph","text":"某些人想使会议离开目标的立场遭到强烈反对而失败"},{"type":"paragraph","text":"据新华社雅加达22日电 印度尼西亚共产党主席艾地出席不结盟国家首脑会议后于昨天回国时说，印度尼西亚共和国、苏加诺总统和印度尼西亚人民认为，不结盟国家必须同社会主义国家一起反对帝国主义，这种态度是正确的。"},{"type":"paragraph","text":"艾地说，在不结盟国家会议期间，的确有某些人要想使会议离开它的目标，他们只想泛泛地谈论和平与战争的问题，而不谴责帝国主义。他们甚至说，殖民主义“已经死亡”。但是这种立场遭到非常强烈的反对，并且失败了。"},{"type":"paragraph","text":"艾地说，不结盟国家会议的精神是亚洲、非洲和拉丁美洲的革命精神。会议取得的成就是积极和独立的外交政策的胜利。他又说，会议宣言是对修正主义的打击。"},{"type":"paragraph","text":"艾地说，企图利用苏联核试验问题来破坏会议气氛的做法失败了。印度尼西亚代表团的态度是：只要有原子弹和核弹，就总有试验。因此，最重要的是，彻底禁止制造、储存和使用原子弹和核弹。苏联政府决定恢复核试验是完全正确和及时的。由于采取了这个决定，现在有了能够阻止任何侵略战争的巨大力量。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"487f33839d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
