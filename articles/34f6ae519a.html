rt":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"苏修对中国的一切挑衅都将被粉碎在文化大革命中锻炼得更加坚强的中国军民；加强着国防力量和保持着警惕","authors":[],"parts":[{"type":"paragraph","text":"新华社地拉那六日电 阿尔巴尼亚《战士报》六日发表文章，严厉谴责苏修叛徒集团对中国发动武装挑衅的严重罪行。"},{"type":"paragraph","text":"文章指出，三月二日苏联武装部队按照苏修叛徒集团的命令，突然侵入中国黑龙江省珍宝岛，打死打伤中国边防部队人员多名。这不是一个偶然的和孤立的事件，而是苏修集团在其长期的、系统的反对中华人民共和国的活动中，蓄意制造的又一新的极其严重的罪行。"},{"type":"paragraph","text":"文章强调，苏修社会帝国主义的这种不断的挑衅，暴露了它同美帝国主义合伙妄图扑灭革命和社会主义的阴谋。按照苏修叛徒集团的命令不断进行的罪恶的挑衅，是同美帝的反华活动协调一致，相互配合的。苏美反革命联盟的矛头首先指向中华人民共和国，因为中华人民共和国是无产阶级革命和各国人民解放斗争的不可动摇的堡垒，是帝国主义实现其反对各国人民的计划的不可逾越的障碍。"},{"type":"paragraph","text":"文章说，苏修对中华人民共和国的挑衅，更加清楚地暴露了他们作为叛徒、沙文主义者和帝国主义者的肮脏嘴脸。勃列日涅夫——柯西金修正主义集团把由斯大林统帅过的、曾高举革命和解放斗争旗帜的苏联红军，变成了推行威胁、恫吓、侵略政策和推行建立世界霸权计划的工具。"},{"type":"paragraph","text":"文章强调指出，苏修对中华人民共和国的一切阴谋诡计和挑衅都将被粉碎，因为在中国共产党和毛泽东主席领导下的、在无产阶级文化大革命中锻炼得更加坚强的中国人民和中国人民解放军正在不断取得新的成就，加强着国防力量和保持着警惕。他们随时准备给任何侵略者以应有的回击。"},{"type":"paragraph","text":"文章最后表示，阿尔巴尼亚人民和武装力量严厉谴责苏修集团对中华人民共和国犯下的罪行，并同七亿中国人民一起发出抗议，坚决要求苏修叛徒集团停止疯狂的反华行动。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"34f6ae519a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
