ical-archives/banned-historical-archives8/main/maoquanji10.pdf"],"article":{"title":"关于同意南京用政治方式解决西安事变善后问题致周恩来、博古电","alias":"","parts":[{"type":"paragraph","text":"关于同意南京用政治方式解决西安事变善后问题致周恩来、博古电"},{"type":"paragraph","text":"（1937年1月5日）周、博："},{"type":"paragraph","text":"汉年四日由南京来电转上，他与张冲即来西安，关于此事处置我意如下："},{"type":"paragraph","text":"甲、蒋、宋\"责备我们宣布西安协定无信义，我们回答南京，在蒋回后重新宣布“剿共”方针，重新向西北进兵并扣留张学良破坏协定破坏信义。"},{"type":"paragraph","text":"乙、同意南京用政治方式解决西北善后问题，但须在下列条件之下。"},{"type":"paragraph","text":"一、立即撤兵。二、立即释张学良回陕。三、保证西安协定之实行。"},{"type":"paragraph","text":"丙、两党关系，三大纲［领］已与蒋、宋磋商，并已明白为蒋、宋所承认，细目委潘汉年全权接洽，恩来无去南京之必要。但在撤兵释张改组政府实行后，即证明南京尚愿顾全信义时可去南京一行，此时则无人能证明恩来去宁后不为张学良第二。丁、请在汉年、张冲来西安前，预先考虑并望飞告。戊、电台应时刻联络。"},{"type":"paragraph","text":"毛泽东五日二十二时"}],"authors":["毛泽东"],"dates":[{"year":1937,"month":1,"day":5}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":117,"page_end":118},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"博古","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4fb8ca5bf4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
