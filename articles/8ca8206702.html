,"authors":[],"dates":[{"year":1950,"month":10,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"捷克斯洛伐克三十二周年国庆"},{"type":"paragraph","text":"毛主席周总理致电祝贺"},{"type":"paragraph","text":"我妇联主席蔡畅亦电捷妇联致贺"},{"type":"paragraph","text":"【新华社二十七日讯】十月二十八日为捷克斯洛伐克共和国三十二周年国庆纪念。中央人民政府毛泽东主席与政务院周恩来总理兼外交部部长分别致电捷克斯洛伐克共和国哥特瓦尔德总统及萨波托斯基总理祝贺。电文如下："},{"type":"paragraph","text":"（一）毛主席贺电捷克斯洛伐克共和国克里门特·哥特瓦尔德总统阁下："},{"type":"paragraph","text":"欣逢捷克斯洛伐克共和国三十二周年国庆纪念，我代表中华人民共和国政府及人民谨向阁下及捷克斯洛伐克人民致庆贺之忱；并祝捷克斯洛伐克人民在建设祖国走向社会主义的伟大事业上日益成功。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一九五○年十月二十六日北京"},{"type":"paragraph","text":"（二）周总理贺电捷克斯洛伐克共和国安东尼·萨波托斯基总理阁下："},{"type":"paragraph","text":"欣逢捷克斯洛伐克共和国三十二周年国庆纪念，谨向阁下、贵国政府及人民致热烈的庆贺。"},{"type":"paragraph","text":"中华人民共和国总理兼外交部部长  周恩来"},{"type":"paragraph","text":"一九五○年十月二十六日北京"},{"type":"paragraph","text":"【新华社二十七日讯】中华全国民主妇女联合会主席蔡畅顷致电捷克妇女联盟，祝贺捷克国庆。电文称：欣逢捷克斯洛伐克共和国成立第三十二周年，谨致热烈的贺忱，并祝贵国妇女在走向社会主义建设中获得更大的成就。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8ca8206702"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
