ical-archives/banned-historical-archives0/main/maoquanji43.pdf"],"article":{"title":"毛泽东等祝贺德意志民主共和国成立十一周年的电报","alias":"","parts":[{"type":"paragraph","text":"毛泽东等祝贺德意志民主共和国"},{"type":"paragraph","text":"成立十一周年的电报"},{"type":"paragraph","text":"（1960年10月6日）德国统一社会党中央委员会第一书记、德意志民主共和国国务委员会主席瓦尔特·乌布利希同志，德意志民主共和国总理奥托·格罗提渥同志，德意志民主共和国人民议院主席团主席约翰尼斯·狄克曼博士："},{"type":"paragraph","text":"值此德意志民主共和国成立十一周年之际，我们谨代表中国共产党、中华人民共和国政府和中国人民向德国统一社会党、德意志民主共和国政府和德意志人民致以兄弟般的祝贺。"},{"type":"paragraph","text":"十一年来，勤劳的德意志民主共和国人民在德国统一社会党和德意志民主共和国政府的领导下，在建设社会主义的事业中取得了巨大的成就，使我们感到高兴。自前，德意志民主共和国人民正在为加速发展国民经济和提前完成七年计划而努力。我们深信，七年计划的完成，将使德意志民主共和国更加繁荣昌盛。"},{"type":"paragraph","text":"德意志民主共和国政府和德意志人民在反对美帝国主义扶植下的西德军国主义、保卫欧洲和世界和平的斗争中作出了积极的贡献。中国共产党、中华人民共和国政府和中国人民一向支持并将继续支持德意志人民的正义斗争。中德两国都是以苏联为首的社会主义大家庭的成员，两国人民有着深厚的友谊。中国人民十分珍视这"},{"type":"paragraph","text":"毛泽东等祝贺德意志民主共和国成立十一周年的电报种友谊，并且将努力增进这种建立在马克思列宁主义和无产阶级国际主义的基础之上的友谊。"},{"type":"paragraph","text":"祝德意志人民在建设社会主义，反对帝国主义和西德军国主义，争取祖国在和平、民主基础上的统一和保卫欧洲和世界和平的事业中取得新的成就。"},{"type":"paragraph","text":"中国共产党中央委员会主席毛泽东中华人民共和国主席刘少奇中华人民共和国全国人民代表大会常务委员会委员长朱德中华人民共和国国务院总理周恩来"},{"type":"paragraph","text":"1960年10月6日于北京"}],"authors":["毛泽东"],"dates":[{"year":1960,"month":10,"day":6}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":522,"page_end":523},"tags":[{"name":"毛泽东","type":"人物"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a9b7022128"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
