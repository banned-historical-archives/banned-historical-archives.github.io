ical-archives/banned-historical-archives0/main/maoquanji51.pdf"],"article":{"title":"在周恩来给外交部党的核心小组及美大组的一封信上的批语","alias":"","parts":[{"type":"paragraph","text":"在周恩来给外交部党的核心小组及美大组的一封信上的批语！!"},{"type":"paragraph","text":"（1973年7月5日）此种顽症，各处都有，非个别人所有，宜研究改正办法。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"73，7，5"},{"type":"paragraph","text":"[1]1973年6月25日，周恩来根据毛泽东的意见，在会见美国驻华联络处主任布鲁斯时提出，我们对美苏签订的核协定持怀疑态度，中国政府仍坚持中美上海公报的立场。历史表明，签订这类条约是靠不住的，现苏联领导人访美给人以两个大国主宰世界的印象。我们不怕孤立，首先我们不丧失立场，同时我们又是现实主义者。说许多空话，不如做一件实事。26日，毛泽东在看了周恩来这个谈话的纪要后说：“这下腰杆硬了，布鲁斯就舒服了。”28日，外交部内部刊物《新情况》第一五三期刊登一篇题为《对尼克松一勃列日涅夫会谈的初步看法》的文章。该文分析、评论了美苏签订防止核战争协定以后的世界形势，认为美苏会谈所表现出的特点是“欺骗性更大”“美苏主宰世界的气氛更浓”。这篇文章受到毛泽东的批评。7月3日，周恩来给外交部党的核心小组各同志及美大组负责人写信，要求撤回该期《新情况》，并说“这个错误主要责任在我”“望你们也应以此为鉴，发扬钻研商"},{"type":"paragraph","text":"在周恩来给外交部党的核心小组及美大组的一封信上的批语讨的积极性，有时也可要求我召集短小的会来交换意见。不要怕我忙，为大事而撒开小事，应该学习主席的工作方式”。7月4日，毛泽东约张春桥、王洪文等谈话，再次批评《新情况》上这篇文章对世界形势的看法，指出：近来外交部有若干问题不大令人满意，我说大动荡、大分化、大改组，而外交部忽然来一个什么大欺骗、大主宰。在思想方法上是看表面，不看实质。“结论是四句话：大事不讨论，小事天天送。此调不改动，势必搞修正。将来搞修正主义，莫说我事先没讲。”7月5日，他又在周恩来给外交部的信上，写了这个批语。7月15日，周恩来将外交部起草的《（新情况》一五三号错误何在？》一文送毛泽东审阅，并附信提出：“关于错误的检讨，我当另写报告。”当日，毛泽东阅后将外交部文章中“受到中央的严厉批评”一句中的“严房”二字删去，并批示：“检讨不要写了。”"}],"authors":["毛泽东"],"dates":[{"year":1973,"month":7,"day":5}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":422,"page_end":423},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"世界形势","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a22997d715"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
