":[{"year":1976,"month":9,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"伟大领袖毛主席在长期的革命战争中，锻炼和培育了我们的军队。毛主席很早就作出了“枪杆子里面出政权”的著名论断，亲自领导了秋收起义，建立了第一支工农红军，在井冈山创立了第一个农村革命根据地。五十年来，毛主席领导我军粉碎了国民党对革命根据地的反革命围剿，胜利完成了举世闻名的二万五千里长征，打败了日本帝国主义，消灭了美帝国主义武装的八百万蒋匪军，建国以后又胜利地进行了抗美援朝战争，胜利地反击了苏修社会帝国主义和反动派对我国的武装挑衅，保卫了祖国的安全。本报从今天起，发表部分历史资料，供班组学习参考。"},{"type":"paragraph","text":"——编者"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fa01055aae"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
