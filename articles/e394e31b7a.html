ear":1959,"month":5,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席会见波兰统一工人党代表团"},{"type":"paragraph","text":"新华社22日讯　中国共产党中央委员会主席毛泽东今天下午会见波兰统一工人党中央政治局委员、书记处书记耶日·莫拉夫斯基和由他率领的波兰统一工人党代表团的全体团员，并且同他们进行了亲切的谈话。会见时在座的，有中共中央总书记邓小平，中央书记处书记王稼祥，中央委员伍修权。会见时波兰驻华临时代办傅拉托也在座。（附图片）"},{"type":"paragraph","text":"上左：毛主席会见波兰统一工人党代表团。图为会见时合影。前排左起第四人是代表团团长耶日·莫拉夫斯基。"},{"type":"paragraph","text":"上右：毛泽东主席和代表团团长耶日·莫拉夫斯基亲切握手。"},{"type":"paragraph","text":"新华社记者　侯波摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e394e31b7a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
