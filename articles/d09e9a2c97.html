al-archives/banned-historical-archives8/main/maoquanji8.pdf"],"article":{"title":"致朱德等电","alias":"","parts":[{"type":"paragraph","text":"致朱德等电！"},{"type":"paragraph","text":"（1936年7月）"},{"type":"paragraph","text":"红二、红四方面军北出草地后应迅速攻占岷州。这样，对打马步芳、毛炳文、王均等部十分有利，“战略上大占优势”。"},{"type":"paragraph","text":"两广因无革命决心与内部不巩固，发生内变；然全国革命高涨的基本形势没有变化，从东北来说，统一战线方面又“有了进步”。"},{"type":"paragraph","text":"[1]这是毛泽东和周恩来、彭德怀致朱德、张国焘、任弼时电的主要内1936年，毛泽东在保安旧居。"}],"authors":["毛泽东"],"dates":[{"year":1936,"month":7}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":494,"page_end":495},"tags":[{"name":"毛泽东","type":"人物"},{"name":"朱德","type":"人物"},{"type":"文稿类型","name":"文章"}]},{"id":"maoquanji9-1","name":"毛泽东全集第9卷(1)","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji9-1.pdf"],"article":{"title":"致朱德等电","alias":"","parts":[{"type":"paragraph","text":"致朱德等电"},{"type":"paragraph","text":"（1936年7月）"},{"type":"paragraph","text":"接占包座捷电，无比欣慰。红四方面军在包座略作休息，宜迅速北进；二方面军随后跟进到哈达铺后再大休息，免敌人封锁岷西线，北出发生困难。"},{"type":"paragraph","text":"[1]红四方面军经过艰苦跋涉，第三次通过了茫茫草地，到达班佑、包座地区。是日，毛泽东和周恩来、彭德怀致电朱德、张国焘、任弼时，告诉他们收到攻占包座的电报。这是电报的部分内容。"}],"authors":["毛泽东"],"dates":[{"year":1936,"month":7}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":34,"page_end":34},"tags":[{"name":"毛泽东","type":"人物"},{"name":"朱德","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d09e9a2c97"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
