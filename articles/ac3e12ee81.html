:[],"dates":[{"year":1984,"month":1,"day":24}],"is_range_date":false,"parts":[{"text":"关于迅速调整党的基层组织的通知","type":"title"},{"text":"各地、市委、柳铁、区直机关党委组织部：","type":"appellation"},{"text":"目前，有一些党的基层组织不纯或严重不纯，这不利手搞好当前的“处遗”、机构改革、清理“三种人”、定案处理和即将开始的整党。为了保证党的基层组织的纯洁性，更好的发挥党支部的战斗堡垒作用，对目前一些思想、作风、组织不纯和群众不信任的基层党组织，各地要采取果断措施，迅速调整，才能适应当前全区范围的定案处理、清理“三种人”和整党的任务。具体要求：（1）对任期已满，需要改选的，单位的党政领导班子又已经作了调整，或有条件在短期内作调整的，要抓紧做好准备，进行改选。（2）党政领导班子在短期内未能调整的，不论是否到期改选，可先采取补选的办法，把党的基层组织尽快健全起来。（3）为了防止处理“三种人”和整党出现偏向和错误，对于“文革”中犯严重错误或问题严重未查清的和不适合担任机关党委（总支、支部）书记、副书记、委员的，应把问题查清，做出结论，才能参加党委（总支、支部）讨论“三种人”定案处理和整党工作。问题未做出结论时不能参如。","type":"paragraph"},{"text":" 中共广西壮族自治区委员会组织部（章）一九八四年一月二十四日","type":"paragraph"}],"comments":[],"origin":"( 《处理“文革”遗留问题、清理“三种人”文件汇编》，广西壮族自治区党委整党办公室，一九八六年八月。)","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ac3e12ee81"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
