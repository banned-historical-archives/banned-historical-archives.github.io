art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"格里巴率比共中央代表团到京邓小平康生等同志到机场热烈欢迎","authors":["张彬"],"parts":[{"type":"paragraph","text":"新华社二十日讯 由比利时共产党中央委员会书记雅克·格里巴率领的比利时共产党中央委员会访华代表团，今天乘飞机从上海到达北京。代表团是应中国共产党中央委员会的邀请来我国进行友好访问的。"},{"type":"paragraph","text":"中共中央总书记邓小平，中共中央政治局候补委员、书记处书记康生，到飞机场热烈欢迎代表团。"},{"type":"paragraph","text":"代表团团员有比利时共产党中央政治局委员、比利时瓦隆共产党主席亨利·格利纳，比利时共产党中央政治局委员雷纳·兰多尔夫，以及格里巴同志的夫人玛德琳·格里日。代表团团员、比利时共产党中央委员、比利时瓦隆共产党政治局委员、比共机关刊物《人民之声》报编辑阿诺尔德·霍瓦尔特，已先期来我国访问，今天同机到达北京。"},{"type":"paragraph","text":"首都少年先锋队队员向代表团全体成员献了鲜花。"},{"type":"paragraph","text":"今天到飞机场欢迎代表团的还有中共中央委员刘宁一、伍修权，中共中央候补委员赵毅敏等。"},{"type":"paragraph","text":"中共中央机关负责工作人员朱世伦专程到上海陪同代表团来北京。"},{"type":"paragraph","text":"代表团是今天路过上海的。中共上海市委书记处书记曹荻秋和书记处候补书记王一平曾到机场欢迎他们。"},{"type":"paragraph","text":"由雅克·格里巴（右五）率领的比利时共产党中央委员会访华代表团下机后，和前往欢迎的邓小平、康生等同志合影。 新华社记者 张彬摄"}],"alias":""},"tags":[{"name":"康生","type":"人物"},{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c6c63e8f49"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
