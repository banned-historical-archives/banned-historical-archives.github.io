es":[],"article":{"title":"劳动人事部保险福利局对《关于建国前参加工作的老工人退休待遇的通知》中若干具体问题的答复","dates":[{"year":1983,"month":9,"day":13}],"is_range_date":false,"authors":["劳动人事部保险福利局"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"中共山西省委组织部, 干审工作文件选编, 467-468","tags":[{"name":"工人","type":"主题/事件"},{"name":"退休","type":"主题/事件"}],"parts":[{"type":"paragraph","text":"劳动人事部保险福利局对《关于建国前参加工作的老工人退休待遇的通知》中若干具体问题的答复"},{"type":"subtitle","text":"劳人险局〔1983〕21号"},{"type":"paragraph","text":"四、按《通知》规定退休的老工人，接受聘用时，仍应按照一九八一年《国务院关于严格执行工人退休退职暂行办法的通知》中的有关规定办理，不发“补差”，只发奖金。五、已经退职的老工人,包括按照国发（1978）104号文件领取退职生活费的老工人，均不能按照《通知》规定改办退休。六、按照《通知》规定退休的老工人，仍使用一般退休工人的退休证，但应在退休证上注明是按《通知》规定退休的工人和生活补贴数额。七、城镇集体所有制单位符合《通知》规定条件的老工人，其退休待遇由各省、市、自治区人民政府确定。一九八三年九月十三日"}],"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"43a3ffea2e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
