" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中央首长对中国京剧院演员的谈话","authors":["周恩来","江青","陈伯达"],"dates":[{"year":1967,"month":8,"day":7}],"is_range_date":false,"parts":[{"text":"中央首长对中国京剧院演员的谈话","type":"title"},{"text":"江青周恩来陈伯达","type":"authors"},{"text":"一九六七年八月七日晚，周总理、陈伯达、康生、江青等中央首长观看了中国京剧院演出的《智取威虎山》并接见部分演员及音乐工作人员，进行了亲切的谈话，做了重要指示。","type":"paragraph"},{"text":"周总理：（问王晶华）你的嗓子完全恢复了？","type":"paragraph"},{"text":"王晶华：完全恢复了。","type":"paragraph"},{"text":"康老：（问王世荣、陈文珍）你们是做什么的？","type":"paragraph"},{"text":"王、陈：拉胡琴。","type":"paragraph"},{"text":"康老：你们的胡琴拉的不错么。前半场也是你们拉的吗？","type":"paragraph"},{"text":"王、陈：不是，是另外两个同志拉的。","type":"paragraph"},{"text":"康老：你们的胡琴拉的都不错么，很好。","type":"paragraph"},{"text":"江青：冯志孝现在也不错么，过去一唱就摇头，现在也能挺起来了。（对李长春）你头一场可能是理解的不对，妻子被打死了，喊“孩子他妈”应该望着她，现在你的眼睛望着别的地方，这样不合理。","type":"paragraph"},{"text":"另外一个地方，这恐怕是普遍的毛病。几个剧团演的时候都有这个毛病，就是敌人把孩子扔到深渊里摔死，应该往下看，看深渊。常宝那一段唱应设计成英姿挺拔，因为她在深山生活象个男孩子，现在婉约太多，应请于会咏同志再搞一下（姚文元同志说，已经告诉上海了）。","type":"paragraph"},{"text":"（对谢锐青）你的化妆是不是有些问题？你多大了！","type":"paragraph"},{"text":"谢锐青：三十四了。","type":"paragraph"},{"text":"江青：（对钱浩梁）“深山问苦”这一场你没有进入角色。当猎户老常说出山后有一条险路直通威虎山的时候，你找到了一条路，应该是非常惊喜，有明显的表情。","type":"paragraph"},{"text":"第八场，杨子荣说“又是试探”应该念的非常清楚。（江青同志示范）。座山雕走后，杨子荣说：“这个笨蛋。”是暗语说的，内心独白，声音不要高，你现在声音这样高，座山雕刚走不远，不就让他听见了！这些地方还应该好好琢磨琢磨。","type":"paragraph"},{"text":"（对冯志孝）少剑波接到杨子荣的情报后说：“老杨，英雄。”应该是从内心里发出来的，念得非常亲切，杨子荣是自己多年的战友，应该感到非常自豪。（江青同志示范）靠集体的力量再磨一磨。","type":"paragraph"},{"text":"（对景荣庆）座山雕应该再凶狠、残暴一些。不要太草包了。你是唱架子花脸的吧？","type":"paragraph"},{"text":"景荣庆：是。","type":"paragraph"},{"text":"江青：你的嗓子还不错么，你能跃起来吗？","type":"paragraph"},{"text":"景荣庆：能。","type":"paragraph"},{"text":"江青：杨子荣劈下去一刀，你应该跳起来。座山雕是很狡猾的，他没有本事就不能当三朝元老。这个戏公演几场了！","type":"paragraph"},{"text":"答：×场。","type":"paragraph"},{"text":"江青：剧场里有没有冷气？","type":"paragraph"},{"text":"众答：前边有，后台没有，可以送冷风。","type":"paragraph"},{"text":"江青：演得不错，很整齐。","type":"paragraph"},{"text":"康老：演得不错。","type":"paragraph"},{"text":"江青：再熟悉熟悉。冯志孝要练武功。你多大了！","type":"paragraph"},{"text":"冯志孝：二十八了。","type":"paragraph"},{"text":"江青：（对钱浩梁）你多大了！","type":"paragraph"},{"text":"钱浩梁：三十二了。","type":"paragraph"},{"text":"康老：（问王晶华）你多大了。","type":"paragraph"},{"text":"王晶华：二十八了。","type":"paragraph"},{"text":"江青：你们这个团大多数都是三十岁左右吧？","type":"paragraph"},{"text":"众答：平均不到三十岁。","type":"paragraph"},{"text":"江青：文的要练武，武的要练唱。","type":"paragraph"},{"text":"（对李长春）你也应该练武功，还小呢，方三十岁么。","type":"paragraph"},{"text":"康老：冯志孝嗓子不错么。","type":"paragraph"},{"text":"江青：（问李长春）你演《海港》了吗？","type":"paragraph"},{"text":"李长春：没有。","type":"paragraph"},{"text":"江青：我们看了一场你演的《海港》很长气。","type":"paragraph"},{"text":"康老：（问张长海）你叫什么名字？","type":"paragraph"},{"text":"张长海：张长海。","type":"paragraph"},{"text":"康老：演什么的？","type":"paragraph"},{"text":"钱浩梁：演孙达得，过去也是演长靠武生。","type":"paragraph"},{"text":"康老：看样子象个演武生的。","type":"paragraph"},{"text":"江青：你有嗓子吗？","type":"paragraph"},{"text":"张长海：没有。嗓子不行。","type":"paragraph"},{"text":"江青：没有可以练。有嗓子的都要练唱。（问马永贵）你有嗓子吗？","type":"paragraph"},{"text":"别人答：他有嗓子。","type":"paragraph"},{"text":"江青：有嗓子的都要练嗓子，文的要练武，武的要练唱，能文能武，对革命现代戏来说，老的不是多了而是不够了。要创出一条新的路子来。你们很累了，早点休息吧！","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"江青","type":"人物"},{"name":"陈伯达","type":"人物"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"875599a7c0"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
