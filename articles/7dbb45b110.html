华政策的抗议　华国锋同志说:谁要破坏中越传统友谊谁就会碰得头破血流","authors":[],"dates":[{"year":1979,"month":8,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京八月九日电　中共中央主席华国锋、副主席叶剑英、邓小平、李先念，于越南国会常务委员会副主席黄文欢到达北京后的第二天，在人民大会堂会见了他。他们对黄文欢同志这次辗转安全来到中国，表示很高兴。"},{"type":"paragraph","text":"黄文欢同志说:“此次到中国来，是为了表示对黎笋反华政策的抗议；同时也是要向越南人民、全世界人民宣告，越中两国人民之间的友谊是任何人也破坏不了的。”"},{"type":"paragraph","text":"华国锋同志接着说:“中越两国人民具有悠久的传统友谊，是任何力量破坏不了的。谁要破坏，谁就会碰得头破血流。”"},{"type":"paragraph","text":"会见后，华国锋、叶剑英、邓小平、李先念同志设宴招待黄文欢同志。"},{"type":"paragraph","text":"参加会见和宴会的还有，中共中央政治局委员耿飚，人大常委会副委员长、中联部部长姬鹏飞，外交部部长黄华等。"},{"type":"paragraph","text":"\u003cIMG alt=请插入7号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1979\\08\\798a010101.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e中共中央主席华国锋，副主席叶剑英、邓小平、李先念，于越南国会常务委员会副主席黄文欢到达北京后的第二天，在人民大会堂会见了他。对黄文欢同志这次辗转安全来到中国，表示很高兴。"},{"type":"paragraph","text":"新华社记者摄(传真照片)\u003c/FONT\u003e"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"叶剑英","type":"人物"},{"name":"华国锋","type":"人物"},{"name":"李先念","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7dbb45b110"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
