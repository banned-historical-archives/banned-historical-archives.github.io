"dates":[{"year":1978,"month":10,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"邓小平副总理会见"},{"type":"paragraph","text":"伊拉克对各国人民友好协会联盟代表团"},{"type":"paragraph","text":"新华社北京十月六日电　国务院副总理邓小平今天上午会见以伊拉克革命指挥委员会成员、阿拉伯复兴社会党地区领导成员、联盟主席阿卜杜勒·法塔赫·穆罕默德·阿明为团长的伊拉克对各国人民友好协会联盟代表团，同他们进行了亲切友好的谈话。"},{"type":"paragraph","text":"会见时，阿明团长转达贝克尔总统、萨达姆·侯赛因副主席对华国锋主席和邓小平副总理的问候，并转交了萨达姆·侯赛因副主席写给华国锋总理的信。"},{"type":"paragraph","text":"邓副总理请阿明团长回国后转达华国锋主席、李先念副总理和他本人对贝克尔总统和萨达姆·侯赛因副主席的问候。"},{"type":"paragraph","text":"伊拉克驻中国大使伊萨·萨勒曼参加了会见。"},{"type":"paragraph","text":"会见时在座的有对外友协会长王炳南等。（附图片）"},{"type":"paragraph","text":"邓小平副总理同伊拉克对各国人民友好协会联盟代表团合影。"},{"type":"paragraph","text":"新华社记者摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"华国锋","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bc730cc2a9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
