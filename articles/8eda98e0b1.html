],"dates":[{"year":1948,"month":5,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"错误清洗的教员将重新恢复工作"},{"type":"paragraph","text":"阳城开始纠正教育中左倾偏向"},{"type":"paragraph","text":"【太岳消息】阳城开始纠正教育工作中的左倾偏向。去年秋季以来，各村各学校曾发生了排挤地主富农出身的教员学生，随便克扣教员薪米，没收学生书籍文具等等混乱现象。有些村盲目的换上贫雇教员。大岭村叫一个石匠当教员，张沟叫煤窑工人卢麦麦当教员，他在窑上做工每月能落两石米，当了教员一月赚六斗米，生活困难干的没劲。宜固贫雇教员苏文直因识字少不会念报急的哭了，损害工作很大。在“五四”文教工作者会议上，大家把这些现象以及造成这些现象的原因从思想上作了清算，并定出纠正的办法：（一）县府最近召集过去被清洗的教员开会，说明政策解除顾虑，分别情况分配工作。（二）凡本县各公立民办高初小学的教员薪米与学校经费，按政府规定标准不准随便减低。（三）去冬扣除在职教员的薪米与非法摊派教员学生的差米应一律退还。（四）过去各村被清洗的教员不论成份如何，在职期间所积欠的薪米应一律如数付给。（五）今后教员的任免权一律归县政府，任何机关团体或个人不准随便任免教员。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8eda98e0b1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
