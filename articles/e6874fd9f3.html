ical-archives/banned-historical-archives8/main/maoquanji22.pdf"],"article":{"title":"提高警惕，切勿上当","alias":"","parts":[{"type":"paragraph","text":"提高警惕，切勿上当川"},{"type":"paragraph","text":"（1946年8月24日）"},{"type":"paragraph","text":"最近三个月，国、美密谋诱致林彪、陈毅、李先念、贺龙诸重要负责人去大城市谈判，企图羁留他们，以利进攻，但为我识破拒绝。最近国、美密谋在进攻热河之前诱致李运昌，现已拒绝。蒋军攻热得手后，将攻哈尔滨，彼时可能又发生诱骗企图，望东北局及李、伍、边先有精神准备，切勿上当。八个月来我们受国、美密谋欺骗之事极多极大，应当提高警惕性。"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央起草的致东北局、热河分局以及李立三、伍修权、边章伍、周恩来、叶剑英电的主要内容。边章伍，当时任北平军事调"}],"authors":["毛泽东"],"dates":[{"year":1946,"month":8,"day":24}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":94,"page_end":94},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e6874fd9f3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
