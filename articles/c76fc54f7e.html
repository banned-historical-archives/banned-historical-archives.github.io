hors":["北京大学","钱如平"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"大字报诗——“平等”“民主”“自由”颂","type":"title"},{"text":"北京大学钱如平","type":"authors"},{"text":"封建王朝造风，继承历史传统","type":"paragraph"},{"text":"“只许州官放火，不许百姓点灯”，应该颂；","type":"paragraph"},{"text":"杀势腾腾来势凶，血腥气味浓，","type":"paragraph"},{"text":"小百姓拙作，上奏商榷；","type":"paragraph"},{"text":"因才疏学浅，有措词不正确，已声明注释，","type":"paragraph"},{"text":"然今日“州官”装眼睛耳聋，","type":"paragraph"},{"text":"“卫道者”斗错百姓，口致歉意就行，","type":"paragraph"},{"text":"吾之解释声明，为何杯水车薪？","type":"paragraph"},{"text":"你们屠刀霍霍向我逼进，","type":"paragraph"},{"text":"“反党”“反人民”“反社会主义”之枷飞近；","type":"paragraph"},{"text":"我尝到二十世纪中国的文明，","type":"paragraph"},{"text":"不敢再点灯争鸣，“谈论”要逃命，","type":"paragraph"},{"text":"罢，罢，罢……祝你们万古长青！","type":"paragraph"},{"text":"子孙若苍蝇！","type":"paragraph"},{"text":"原来特权思想“兴隆”，","type":"paragraph"},{"text":"悔不当初自己太矇眬，","type":"paragraph"},{"text":"总可向“百官”争鸣，","type":"paragraph"},{"text":"更不该舌战、笔仗去交锋！","type":"paragraph"},{"text":"斯大林之幽灵彷彿长存，","type":"paragraph"},{"text":"“土刑”不足，外国货运来，","type":"paragraph"},{"text":"判官、无常，请快宣布犯“叛国罪”","type":"paragraph"},{"text":"我打算从容走向“断头台”！","type":"paragraph"},{"text":"罢，罢，罢……祝你们到处横行，","type":"paragraph"},{"text":"儿孙绝技更加精！","type":"paragraph"}],"comments":[],"origin":"北京大学社会主义思想教育委员会编印《北京大学右派分子反动言论汇集》，一九五七年十月。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c76fc54f7e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
