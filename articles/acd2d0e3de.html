tart":11,"page_end":11,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"他曾4次见到毛主席老红军全生祥的幸福往事","authors":["傅晓英/郭晋"],"parts":[{"type":"paragraph","text":"傅晓英 郭 晋"},{"type":"paragraph","text":"11月12日，编辑部接到本文作者的电话：绵阳军分区干休所90岁的老红军全生祥不幸病逝。此前，编辑曾约作者采写全生祥的故事。刊登此文，寄托对老红军全生祥的哀思，也更加感到抢救存在于老前辈身上的珍贵史料，是一件刻不容缓的事情。——编 者"},{"type":"paragraph","text":"国庆节前夕，我们拜访了绵阳军分区干休所90岁的老红军全生祥。全老是甘肃省宕昌县人。1936年秋，红二方面军长征到达宕昌县时，为地主放牛的全生祥听说红军是穷人的队伍，便偷跑到县城参加了红军。"},{"type":"paragraph","text":"作为一个红军老战士，全生祥有幸4次见到毛主席。"},{"type":"paragraph","text":"1942年，359旅驻扎在南泥湾。9月的一个晚上，全生祥和战友们正在观看京剧《打渔杀家》。演出快结束时，朱总司令突然出现在舞台上，他对大家说：“同志们，毛主席和周副主席来看望大家了。”朱总司令讲完，毛主席等领导同志健步走上舞台。顿时，全场欢声雷动，全生祥激动得把手都拍痛了。这是全生祥第一次目睹毛主席的风采。当晚回到驻地，他久久不能入睡。"},{"type":"paragraph","text":"1943年9月，毛主席到南泥湾视察。在全生祥所在的717团通信连，毛主席看到官兵自建的住房和满圈的猪牛羊时，幽默地说：国民党反动派要困死我们。没想到，他们越围，你们越胖了。随后，毛主席鼓励大家说：困难像弹簧，你强它就弱。我们自力更生，就丰衣足食了。全生祥说：“毛主席的教诲，影响了我一生。”"},{"type":"paragraph","text":"1945年8月，日本鬼子投降，中央命令部队尽快到敌占区去，保卫胜利果实。359旅奉命出征，717团在路过延安飞机场时，毛主席、周副主席、朱总司令接见了时任通信连通信排长的全生祥和他的战友们。毛主席说：现在日本投降了，党中央要求你们迅速到敌占区去，保卫我们的胜利果实。毛主席话音刚落，全生祥和战友们振臂高呼：“坚决完成任务！”随后，717团奔赴华北战场。"},{"type":"paragraph","text":"1968年8月10日，毛主席在北京人民大会堂接见全军部分干部学习班成员，时任成都军区营房管理局科长的全生祥有幸再次见到毛主席，聆听毛主席的教诲。"},{"type":"paragraph","text":"全生祥老人告诉笔者，4次见到毛主席，是他一生中最幸福的事情。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"acd2d0e3de"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
