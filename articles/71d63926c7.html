script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"商业部关于恢复粮油调拨增减价的通知","authors":[],"dates":[{"year":1973,"month":11,"day":17}],"is_range_date":false,"parts":[{"text":"商业部关于恢复粮油调拨增减价的通知","type":"title"},{"text":"1966年10月24日粮食部曾以〔66〕粮财字第82号通知，取消了粮油调拨中质量（杂质、水分、酸价）按部颁统一标准实行增减价的办法。执行以来，不少地区反映，这样做不符合按质论价的政策，影响贯彻好粮外调的原则，不利于加强经济核算和改善经营管理，要求恢复原办法。根据绝大多数省（市、区）的意见，经研究决定从1974年1月1日（粮食发出之日）起，恢复省（市、区）间粮油调拨增减价办法。凡省（市、区）间调拨的大豆、玉米、稻谷、大米、小麦粉按〔63〕粮储字第577号文规定的标准等作价，其余品种按〔62〕粮储保秦字第449号文规定执行。","type":"paragraph"},{"text":"黑龙江省征购玉米的水分，以20％为基准，为照顾其自然情况，同意该省调出玉米的水分，暂按20％的标准执行。","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"71d63926c7"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
