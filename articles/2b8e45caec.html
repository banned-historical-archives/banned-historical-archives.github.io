" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji21","name":"毛泽东全集第21卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji21.pdf"],"article":{"title":"应下决心在陕南分散游击","alias":"","parts":[{"type":"paragraph","text":"应下决心在陕南分散游击"},{"type":"paragraph","text":"（1946年7月25日）李、文、任："},{"type":"paragraph","text":"各电悉。（一）已电西安办事处周子健代表先念与三十二小组接洽，声明愿意调处，要求政府军停止围追，以利谈判。（二）只要你们能生存，恢复谈判及实行停战是有希望的，因国民党对我中原军四出游击深为恐惧。（三）你们应下决心以团为单位分散于陕南各县，划分区域，每团管一县至二县，分散的程度以能打民团及国民党一连一营为标准。你们可开始分散于三四个县内，取得经验，然后逐步展开，从敌人包围圈内分股伸出圈外，如此方能生存。"},{"type":"paragraph","text":"中央"},{"type":"paragraph","text":"午有"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央起草的给中原军区司令员李先念、第二纵队司令员文建武和政治委员任质斌的电报。"}],"authors":["毛泽东"],"dates":[{"year":1946,"month":7,"day":25}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":523,"page_end":523},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2b8e45caec"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
