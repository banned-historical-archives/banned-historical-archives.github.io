script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"印度尼西亚庆祝抵制美国电影一周年人民文化协会总书记阿尤布说:“我们也不需要修正主义的电影”","authors":[],"dates":[{"year":1965,"month":5,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社雅加达9日电　昨天这里举行晚会，庆祝印度尼西亚成功地抵制美国电影一周年。"},{"type":"paragraph","text":"出席晚会的有政府高级官员、电影界和其他各界的著名人士以及各国驻这里的外交使节。"},{"type":"paragraph","text":"国务部长黄自达在晚会上讲话指出，抵制行动是一个革命的正义的爱国行动。他表示希望抵制美国电影行动委员会继续斗争，以在印度尼西亚完全消灭美国影片。"},{"type":"paragraph","text":"抵制美国电影行动委员会总主席苏里亚达马夫人说，一年来，美国电影的统治已经被推翻，并且将被印度尼西亚的进一步的革命风暴完全消灭。"},{"type":"paragraph","text":"他表示同情和支持多米尼加人民反对美国侵略者的英勇斗争。"},{"type":"paragraph","text":"印度尼西亚人民文化协会总书记尤巴尔·阿尤布在讲话中说，印度尼西亚艺术家在电影方面摆脱了美帝国主义美学的影响而且建立了民族美学。"},{"type":"paragraph","text":"他说，“我们也不需要修正主义的电影，因为修正主义同我国革命的原则是背道而驰的。我们热爱和平，但是更加热爱独立。修正主义和帝国主义是孪生兄弟。”"},{"type":"paragraph","text":"印度尼西亚著名作家西托尔·西图莫朗说，“我们斗争的对象是目前正在野蛮侵略越南的美帝国主义。我们的斗争也就是对越南人民的支持。”"},{"type":"paragraph","text":"情报部长阿赫马迪、雅加达市市长亨克·安统和印度尼西亚和平委员会主席希达雅特夫人也在会上讲了话。"},{"type":"paragraph","text":"全国性抵制美国电影的运动是从去年五月九日开始的。"},{"type":"paragraph","text":"印度尼西亚抵制美国电影行动委员会号召将五月九日作为在电影方面反对美帝国主义的控制和侵略的斗争胜利日来纪念。"},{"type":"paragraph","text":"几天来，在全国各地广泛举行了群众集会和电影晚会，庆祝这个节日。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"757692bb19"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
