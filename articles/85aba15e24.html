tart":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"佩雷拉总统对毛主席逝世表示哀悼","authors":[],"parts":[{"type":"paragraph","text":"新华社普拉亚一九七六年十月九日电 中华人民共和国首任驻佛得角共和国特命全权大使贾怀济十月八日向佛得角共和国总统阿里斯蒂德·佩雷拉递交了国书。"},{"type":"paragraph","text":"佩雷拉总统在接受国书后同贾怀济大使进行了诚挚友好的谈话。佩雷拉总统对毛泽东主席逝世表示哀悼。他说：“毛泽东主席逝世，不仅是中国人民的损失，也是全世界进步人民和爱好和平人民的损失。尽管伟大的毛泽东主席逝世了，但是中国人民将继承毛泽东主席开创的伟大事业。”贾怀济大使表示，中国人民将继承毛泽东主席的遗志，坚持无产阶级国际主义，坚决贯彻执行毛泽东主席的革命外交路线和政策。"},{"type":"paragraph","text":"递交国书时在场的有：佛得角国民议会议长兼外交部长阿比利奥·杜亚蒂，副议长奥利维奥·皮雷斯，卫生和社会事务部长曼努埃尔·福斯蒂诺。"},{"type":"paragraph","text":"当天，贾怀济大使还拜会了外交部长杜亚蒂。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"85aba15e24"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
