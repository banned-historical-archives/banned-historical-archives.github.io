"重庆师范专科学校"],"dates":[{"year":1957,"month":5}],"is_range_date":false,"parts":[{"text":"党员的辩证法","type":"title"},{"text":"重庆师范专科学校郭有章","type":"authors"},{"text":"[编者按：郭有章，重庆师专学生，共青团员，但已公开表示“当叛徒都要得，就是不愿当团员”。“党员的辩证法”是他在鸣放中写来污蔑和攻击党的，用心极其恶毒。]","type":"paragraph"},{"text":"党员对群众说慌——是领导方式，","type":"paragraph"},{"text":"群众对他批评——是恶劣品质。","type":"paragraph"},{"text":"党员背后说群众的怪话——是爱护同志，","type":"paragraph"},{"text":"群众背后批评他——是造谣生事。","type":"paragraph"},{"text":"党员对群众的批评——尽是扣帽子，","type":"paragraph"},{"text":"群众对他提宝贵的意见——是吹毛求疵。","type":"paragraph"},{"text":"党员犯错误是由于忠心耿耿，","type":"paragraph"},{"text":"群众犯同样的错误是立场不稳。","type":"paragraph"},{"text":"党员不学习马列主义是先天有份，","type":"paragraph"},{"text":"群众学习马列主义是为了出名。","type":"paragraph"},{"text":"唉！不对说成对，没错硬说错；","type":"paragraph"},{"text":"是非分不清，叫人莫奈何！","type":"paragraph"}],"comments":[],"origin":"《重庆市右派言论选辑第一集》（内部文件，只供领导同志参考，请勿外传和翻印），中共重庆市委宣传部办公室编印，1957年8月。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2b4b577731"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
