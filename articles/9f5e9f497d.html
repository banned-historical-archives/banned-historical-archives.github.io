s":[],"dates":[{"year":1976,"month":5,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"首都工农兵反击右倾翻案风"},{"type":"paragraph","text":"歌颂无产阶级文化大革命歌咏大会"},{"type":"paragraph","text":"“世上无难事，只要肯登攀。”毛主席的光辉诗篇，是鼓舞亿万革命人民奋勇前进的力量源泉。首都文艺工作者在歌咏大会上演唱毛主席词《水调歌头·重上井冈山》、《念奴娇·鸟儿问答》。新华社记者摄"},{"type":"paragraph","text":"人民解放军在歌咏大会上演唱《翻案不得人心》和《举起革命的铁拳头》。"},{"type":"paragraph","text":"首都红卫兵在歌咏大会上演唱《紧紧抓住阶级斗争这个纲》、《坚决反击右倾翻案风》和《天安门上永远飘红旗》。"},{"type":"paragraph","text":"首都工人演唱《无产阶级专政好》后，北京齿轮厂业余文艺宣传队又表演群口词《为保卫毛主席、保卫党中央而战斗》。新华社记者摄"},{"type":"paragraph","text":"首都工农兵学员在歌咏大会上演唱《党中央决议真英明》和《咱和修正主义路线对着干》。"},{"type":"paragraph","text":"首都贫下中农在歌咏大会上演唱《新生事物好》和《贫下中农不信邪》。"},{"type":"paragraph","text":"（本组照片除署名者外，均为本报记者摄）"},{"type":"paragraph","text":"红小兵在歌咏大会上演唱《保卫文化大革命》和《誓让红旗万代飘》。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9f5e9f497d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
