成都工学院","热风"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"“班三角还有民主吗？”","type":"title"},{"text":"成都工学院热风","type":"authors"},{"text":"班三角，不民主，谁领导，党小组。","type":"paragraph"},{"text":"班长由院长任命，代表行政总揽班上大权。","type":"paragraph"},{"text":"团支书只代表班上团员，但一切都得由他指点。","type":"paragraph"},{"text":"学生代表是同学选，但只把文娱活动来管。","type":"paragraph"},{"text":"选举权吧！同学们只有一遍。","type":"paragraph"},{"text":"团员选了学生代表还有支书特权。","type":"paragraph"},{"text":"党员更不用说，在班上有他的领导权。","type":"paragraph"},{"text":"学校、系上有要事都把班长来喊。","type":"paragraph"},{"text":"另外还有党团组织干部参加提意见。","type":"paragraph"},{"text":"学生代表有职无权却在一边。","type":"paragraph"},{"text":"班三角、官僚机构干部成团。","type":"paragraph"},{"text":"有干事有组长还有板报编辑员。","type":"paragraph"},{"text":"开会时党小组领导，支委参加占人数一半。","type":"paragraph"},{"text":"官多兵少，事难办，剩下摊子无人管。","type":"paragraph"},{"text":"班三角之优越性，不知如何体现。","type":"paragraph"},{"text":"这是生硬照苏联把教条来搬。","type":"paragraph"},{"text":"建议立即取消，采取班委由同学来选。","type":"paragraph"},{"text":"既民主，工作又好办。(热风第二期)","type":"paragraph"},{"text":" 来源：《右派言论选集》（中共成都工学院委员会办公室，1957年）。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"69568331ee"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
