tart":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"我演毛泽东追求无止境","authors":["郭向星"],"parts":[{"type":"paragraph","text":"今年51岁的古月，是半路出家当影视演员的。80年代初，文化部和总政在全国挑选特型演员，当时正在昆明部队任文化科科长的古月，被著名剧作家胡可发现推荐进京。叶剑英元帅从10张选型照片中选中了他。至今古月已在《西安事变》、《四渡赤水》、《彭大将军》、《父亲》、《中国革命之歌》等10余部影视片中扮演了12个“毛泽东”。"},{"type":"paragraph","text":"“艺术无止境。我演毛泽东，在形似和神似、伟大和平凡之间寻找感觉，有着无止境的追求。”古月为演好自己寄予深厚感情的艺术形象，付出了多方面的努力。他采访过数十位了解毛泽东的人，掌握了大量的第一手资料。为适应演不同历史时期毛泽东的需要，古月常常要“速肥”和“速瘦”，体重有时竟差10来公斤，拍《开国大典》时，古月多次不顾病痛劳累参加拍摄，硬是用3个月的时间保质保量地完成了原定9个月才能拍完的戏。"},{"type":"paragraph","text":"“是毛泽东给黑暗的中国带来光明。”孤儿出身的古月，9岁被解放大军从孤儿院救出并参军，当了小文艺兵。他说：“塑造好毛泽东的形象，是千百万人民群众对我们文艺工作者的热切期望，我们不能不努力。”"},{"type":"paragraph","text":"目前，古月在反映举世瞩目的辽沈、平津、淮海三大战役的历史巨片《大决战》中，又一次担任了饰演毛泽东的重任。当笔者问他对广大影迷有什么话说时，他说：“衷心感谢广大观众对我的关心。我们整个剧组将全力以赴，拍好影片，塑造好有血有肉的毛泽东形象，向明年党的70诞辰献礼！”"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9279ab4538"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
