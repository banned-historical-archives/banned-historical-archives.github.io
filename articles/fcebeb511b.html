<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"maoquanji43","name":"毛泽东全集第43卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji43.pdf"],"article":{"title":"中央转发湖南省农业生产情况综合报告的批语","alias":"","parts":[{"type":"paragraph","text":"中央转发湖南省农业生产情况"},{"type":"paragraph","text":"综合报告的批语"},{"type":"paragraph","text":"（1960年3月15日）上海局，各协作【区】委员会，各省委、市委、自治区党委，中央一级各部门、各党组："},{"type":"paragraph","text":"现将湖南省有关农业十三个方面的情况报告“一件，发给你们参考。此件很可以一看，其中有些新鲜东西，可以看到农业全貌。"},{"type":"paragraph","text":"中央"},{"type":"paragraph","text":"1960年3月15日"},{"type":"paragraph","text":"[1]这个报告中关于农业生产13个方面的问题分别是：水利运动、积肥运动、开荒改土运动、播种计划安排、劳动力问题、工具改革、干部深入情况、春收作物、生猪生产、生活安排、渔业生产、造林、木材生产。报告说，去年11月省委发出移山千座、开河万里的口号后，各级党委书记挂帅，共有35万千部、600万劳动力大搞水利。至今年2月底，全省整修新建各种水利工程88万处，其中新建水库3万座，比过去10年修建的水库增加了66%，大大改变了全省农田水利面貌。结合大兴水利，各地还大办了一批水力发电站。在积肥方面，去冬以来，各地大搞肥料基地，大抓养猪积肥。今春积肥高潮中，出动的劳动力达700万人。到目前为止，全省共积肥约200亿担，平均每亩达300担左右。去冬今春，全省改良了800多万亩亩产400毛泽东全集第四十三卷斤以下的低产田，开垦了500万亩荒地，深耕情况也比去年要好。关于播种安排，全年计划播种面积在1亿亩以上，争取全省粮食产量达到平均每人1000斤。目前参加田间生产的劳动力已达1000万人，占全省总劳力的70%，估计还可以从水利、交通及其他方面压缩七八十万人到农业生产上来。今年全省计划革新和推广各种新工具近2000万件，估计可节约8亿至9亿个劳动日。全省已有近13方县以上于部下到基层，平均每个生产队有一个国家干部。他们一般都能和群众同吃、同住、同劳动、同商量，参加生产、领导生产，大搞丰产田，密切了党群关系。对穷队、落后队，各地都特别注意加强领导，于部包干负责，定期改变面貌。今年把春收作物当作一季生产来抓，比往年搞得好，作物普遍长势良好。全年计划养猪4000万头，各地大抓饲料和防疫工作，创造了不少高速度发展的先进事例。关于生活安排，决定对夏收前的用粮贯彻“以人定量，指标到户，发给粮证，凭票开餐，节余归己”的制度，群众的福利和健康普遍较好。目前全省投入渔业生产的共有13万余人，到2月中旬，出口水产品比去年一季度增长了六成。去冬今春，全省共造林2549万亩，目前已完成木材生产31万立方米，占全年计划的7.5%。1960年3月18日，中共中央转发了这个报告。"}],"authors":["毛泽东"],"dates":[{"year":1960,"month":3,"day":15}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":172,"page_end":173},"tags":[{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]},{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中央转发湖南省农业生产情况综合报告的批语","authors":["毛泽东"],"dates":[{"year":1960,"month":3,"day":15}],"is_range_date":false,"parts":[{"text":"中央转发湖南省农业生产情况综合报告的批语","type":"title"},{"text":"毛泽东","type":"authors"},{"text":"上海局，各协作（区）委员会，各省委、市委、自治区党委，中央一级各部门、各党组：","type":"appellation"},{"text":"现将湖南省有关农业十三个方面的情况报告一件，发给你们参考。此件很可以一看，其中有些新鲜东西，可以看到农业全貌。","type":"paragraph"},{"text":" 中央1960年3月15日","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fcebeb511b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
