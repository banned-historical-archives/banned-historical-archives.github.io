ical-archives/banned-historical-archives0/main/maoquanji36.pdf"],"article":{"title":"给刘松林的信","alias":"","parts":[{"type":"paragraph","text":"给刘松林\"的信"},{"type":"paragraph","text":"（1956年2月14日）亲爱的思齐儿："},{"type":"paragraph","text":"给我的信都收到了，很高兴。希望你注意身体，不使生病，好好学习。我们都好，勿以为念。国内社会主义高涨，你那里有国内报纸否？应当找到报纸，看些国内消息，不要和国内情况太隔绝了。"},{"type":"paragraph","text":"祝好！"},{"type":"paragraph","text":"得胜2"},{"type":"paragraph","text":"一九五六年二月十四日"},{"type":"paragraph","text":"[1]刘松林，原名刘思齐，1949年10月同毛泽东之子毛岸英结婚。1950年11月毛岸英在抗美援朝战争中牺牲。1955年9月至1957年9月，刘松林在苏联莫斯科大学数学力学系读书。"},{"type":"paragraph","text":"[2]得胜，即李得胜，是毛泽东在陕北时使用过的名字。"}],"authors":["毛泽东"],"dates":[{"year":1956,"month":2,"day":14}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":218,"page_end":218},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d2196e0fb5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
