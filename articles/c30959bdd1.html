year":1949,"month":6,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"中国人民解放军代表叶剑英将军说："},{"type":"paragraph","text":"新政协筹备会的代表，虽然只有一百三十四个人，但是他代表着二十三个单位，代表着十一个党派，代表着四百多万的中国人民解放军，代表全国的工人阶级、解放区人民全体、产业界、文化界的民主人士、民主教授，代表着全国的青年、妇女、学生，代表着国内少数民族、海外华侨，可以说新政协筹备会的代表对于全国的绝大多数的人民有十分足够的代表性。这个筹备会的任务，毛主席已经正确的指出：“完成各项必要的准备工作，迅速召开新的政治协商会议，成立民主联合政府，以至领导全国人民以最快速度肃清国民党反动派的残余力量，统一全中国，有系统的和有步骤的在全国范围内进行政治的、经济的、文化的和国际的建设工作。”在两天的会战中，我对于全体代表的团结精神及民主作风相信一定能够保证新政协筹备会的神圣任务的胜利完成。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c30959bdd1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
