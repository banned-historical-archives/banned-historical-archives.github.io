art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"希望伊朗和伊拉克尽快和平解决争端","authors":[],"parts":[{"type":"paragraph","text":"据新华社9月25日讯 中共中央主席华国锋今天下午在人民大会堂会见了挪威王国首相奥德瓦尔·努尔利。"},{"type":"paragraph","text":"华国锋和努尔利就当前的国际形势交换了看法。在谈到伊朗和伊拉克的武装冲突问题时，华国锋说，伊朗和伊拉克都是中国的友好国家。中国希望两国能够通过和平谈判的办法，尽快解决争端。要注意防止超级大国的插手。"},{"type":"paragraph","text":"据新华社9月25日讯 中共中央副主席邓小平同挪威首相奥德瓦尔·努尔利今天上午在这里会晤时，对当前伊朗和伊拉克之间的武装冲突，都表示严重关切，同时希望这两个国家通过和平协商，解决他们之间的争端，不使事态进一步扩大。"},{"type":"paragraph","text":"两位领导人今天在人民大会堂会见时，就当前重大国际问题以及双边关系问题交换了看法。"}],"alias":""},"tags":[{"name":"华国锋","type":"人物"},{"name":"世界形势","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"784655096d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
