十九个府开展了武装斗争，沉重打击美泰反动派广大革命妇女积极参加泰共领导的革命武装斗争","authors":[],"dates":[{"year":1968,"month":3,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"在毛主席“枪杆子里面出政权”的光辉思想指引下"},{"type":"paragraph","text":"泰国人民武装斗争打出大好局面"},{"type":"paragraph","text":"在二十九个府开展了武装斗争，沉重打击美泰反动派广大革命妇女积极参加泰共领导的革命武装斗争"},{"type":"paragraph","text":"新华社讯　“泰国人民之声”电台最近在广播中强调指出：世界革命人民的伟大领袖毛泽东主席的“枪杆子里面出政权”的光辉思想，是放之四海而皆准的革命真理。在毛主席这个光辉思想指引下，泰国人民革命武装斗争已打出一个大好局面。"},{"type":"paragraph","text":"电台说，泰国共产党高举战无不胜的毛泽东思想伟大红旗，英勇地领导泰国人民进行武装夺取政权的人民战争，沉重地打击着美帝国主义和他侬—巴博卖国集团。到目前为止，在泰国已有二十九个府开展了革命武装斗争。据不完全统计，从一九六五年八月以来，泰国人民武装已同敌人战斗近八百次，歼灭敌人近两千人，击毁击伤敌人直升飞机六架，缴获一批武器。此外，泰国人民武装还处决了近三百名罪大恶极的暗探特务。"},{"type":"paragraph","text":"电台说，目前，泰国人民革命武装斗争正在迅速发展，震撼着美泰反动派的统治。泰国人民只要坚持武装斗争，就一定能取得最后胜利。"},{"type":"paragraph","text":"新华社讯　据“泰国人民之声”电台广播，泰国革命妇女在战无不胜的毛泽东思想指引下，积极参加泰国共产党领导的革命武装斗争，发挥着重要作用。"},{"type":"paragraph","text":"电台说，沙空那空府人民武装，有一个叫暖丹的女战士，她怀着对敌人的刻骨仇恨，为人民处决了罪大恶极的暗探特务，受到当地群众的热烈赞扬。年仅十五岁的女战士旺他，每到一处，都积极热情地进行宣传工作，动员群众同敌人进行斗争，群众称赞她是一个出色的宣传员。在东北部人民武装队伍里，有一个叫阿里的女班长，一次她带领队伍去伏击敌人，在她勇敢机智的指挥下，歼灭敌人多名，取得辉煌战绩。"},{"type":"paragraph","text":"电台说，人民武装的女战士非常重视政治学习，她们特别如饥似渴地学习世界革命人民的伟大导师毛主席的光辉著作。"},{"type":"paragraph","text":"这家电台说，目前，泰国广大乡村有越来越多的妇女参加人民革命武装斗争，成为人民武装的一个重要组成部分。她们具有崇高的热爱祖国、热爱人民的精神。她们不怕困难，不怕牺牲，敢于斗争，敢于胜利，不愧是泰国人民的好儿女。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"人民战争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d07150343f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
