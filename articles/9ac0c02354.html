:1951,"month":5,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"(内蒙)美利其格"},{"type":"paragraph","text":"发了芽的榆树，"},{"type":"paragraph","text":"得了雨水更茂盛；"},{"type":"paragraph","text":"孩子见了母亲，"},{"type":"paragraph","text":"怎么能不亲近!"},{"type":"paragraph","text":"红花长在绿草里，"},{"type":"paragraph","text":"草原显得更美丽；"},{"type":"paragraph","text":"这是我一生最大的光荣，"},{"type":"paragraph","text":"和伟大的领袖坐在一起。"},{"type":"paragraph","text":"透明的杯子里斟满酒，"},{"type":"paragraph","text":"我双手高高举过头，"},{"type":"paragraph","text":"祝福兄弟民族大团结，"},{"type":"paragraph","text":"祝福中华各民族的领袖毛主席。"},{"type":"paragraph","text":"毛主席仔细听着我的话，"},{"type":"paragraph","text":"他微笑地回答:祝福蒙古民族!"},{"type":"paragraph","text":"他那温暖的手把我的手紧握，"},{"type":"paragraph","text":"他那亲热的眼睛不离我身。"},{"type":"paragraph","text":"当时我的心跳得厉害，"},{"type":"paragraph","text":"只是笑，再也说不出话来。"},{"type":"paragraph","text":"回来以后我常常想起，"},{"type":"paragraph","text":"睡梦里也笑醒了几回。"},{"type":"paragraph","text":"独根的铁棍容易折，"},{"type":"paragraph","text":"拧成的麻绳拉不断"},{"type":"paragraph","text":"中华各民族团结紧，"},{"type":"paragraph","text":"保卫我们的自由、幸福、和平!"},{"type":"paragraph","text":"(转载‘人民日报’)"}],"comments":[],"origin":"人民日报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9ac0c02354"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
