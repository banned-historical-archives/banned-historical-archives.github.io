script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"保加利亚各报发表社论指出  南共修正主义者为纳吉哭丧  更加证明南共应对匈牙利流血事件负责","authors":[],"dates":[{"year":1958,"month":6,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"保加利亚各报发表社论指出"},{"type":"paragraph","text":"南共修正主义者为纳吉哭丧"},{"type":"paragraph","text":"更加证明南共应对匈牙利流血事件负责"},{"type":"paragraph","text":"新华社索非亚25日电　保加利亚各报25日分别发表社论，就铁托修正主义集团在匈牙利政府宣布判决纳吉反革命集团后所表示的态度，进一步揭露南共修正主义者在西方帝国主义者所组织的反苏、反社会主义的宣传运动中所充当的角色。“工人事业报”的社论指出，无论是在匈牙利反革命叛乱期间和现在，南斯拉夫报刊都对苏联和其他社会主义国家以及他们的和平外交政策进行了骇人听闻的污蔑。南斯拉夫报纸在纳吉被判决的消息发表后，竟然刊登纳吉的照片，并急忙反映西方的反动叫嚣，力图为自己在匈牙利事件中充当可耻角色辩解以及狂热地颂扬匈牙利反革命匪帮的活动。南斯拉夫所谓“社会主义”的报纸同臭名远扬的资产阶级报刊毫无差别。"},{"type":"paragraph","text":"社论说，不只是南斯拉夫的报刊参加了这个可耻的勾当。南斯拉夫外交国务秘书处的官方发言人也匆匆忙忙地采取了这种立场，他徒劳无益地企图抵赖纳吉同南共领导集团所建立的密切联系。不但如此，南斯拉夫方面还就纳吉集团的判决向匈牙利政府提出了抗议照会。"},{"type":"paragraph","text":"社论说，现代修正主义的真面目和它对匈牙利反革命事件所负的历史责任现在比任何时候都暴露得更清楚。历史能够宽恕南斯拉夫修正主义者的这个责任么？"},{"type":"paragraph","text":"“人民青年报”的社论指出，南斯拉夫修正主义者现在为匈牙利人民的叛徒流的眼泪比帝国主义者还要多。在“战斗报”刊登了判决纳吉的消息以后，又刊登了纳吉的传略。报纸竭力强调纳吉对工人阶级的“功绩”。他们还赶忙在“战斗报”上引证伦敦的评论说，处决纳吉是“对南斯拉夫的无耻挑衅行动”。很明显，在这个问题上南斯拉夫领导人也是看帝国主义者的脸色行事的。南斯拉夫最近给匈牙利政府的一项抗议照会的目的，很明显是为了帮助所谓联合国匈牙利问题特别委员会企图对匈牙利内政再度进行干涉。"},{"type":"paragraph","text":"“农业旗帜报”的社论说，值得玩味的是，在反对我们的叫嚣运动中，现代修正主义者也同华盛顿和伦敦的银行家们，同罗马和布鲁塞尔的教权派们同声呼应了。正当全世界一切进步舆论、共产党和工人党谴责纳吉的罪恶活动的时候，贝尔格莱德的报纸却替匈牙利人民的这个叛徒辩护。当帝国主义者污蔑社会主义国家时，贝尔格莱德的报纸不仅重复他们的污蔑，甚至唱的调子比他们还要高。所有这一切不是再一次证明了南共领导人对匈牙利流血事件所负的责任吗？"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6e2b461d7b"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
