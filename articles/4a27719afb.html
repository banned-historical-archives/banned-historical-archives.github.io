art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席等接见亚非国家政府代表团、政府领导人和议会代表团","authors":[],"parts":[{"type":"paragraph","text":"新华社三十日讯 毛泽东主席同党和国家其他领导人刘少奇、宋庆龄、董必武、朱德、周恩来、邓小平、彭真、陈毅、贺龙、康生，今天接见了亚非国家的政府代表团、政府领导人和议会代表团。"},{"type":"paragraph","text":"他们是：由哈桑二世国王的代表穆莱·阿卜杜拉亲王率领的摩洛哥王国代表团，老挝爱国战线党主席、老挝民族团结政府副首相苏发努冯亲王和老挝民族团结政府新闻、宣传游览大臣富米·冯维希，由尼泊尔王国大臣会议副主席兼财政、经济计划、司法和行政管理大臣苏里雅·巴哈杜尔·塔帕率领的尼泊尔王国政府代表团，由缅甸革命委员会委员丁吴上校率领的缅甸联邦政府代表团，由巴基斯坦政府交通部长汗·阿·萨布尔·汗率领的巴基斯坦友好代表团，由锡兰众议院议长休·费尔南多率领的锡兰议会代表团，以及先期到达北京的阿尔及利亚党政代表团团员、邮电部长扎伊贝克·阿卜杜勒卡德尔。"}],"alias":""},"tags":[{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4a27719afb"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
