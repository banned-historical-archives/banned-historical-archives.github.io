ear":1950,"month":5,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京廿七日电】　中央人民政府毛泽东主席于廿七日下午六时宴印度驻我国大使潘尼迦及雁谒森、古玛尔两秘书。应邀作陪者有中央人民政府朱德副主席、刘少奇副主席、李济深副主席、张澜副主席、林伯渠秘书长、政务院周恩来总理、驻印袁仲贤大使、外交部章汉夫副部长、王炳南主任、阎宾航副主任、中央人民政府典礼局余心清局长及外交部亚洲司乔冠华代司长、陈家康副司长、交际处王倬如处长。"},{"type":"paragraph","text":"【新华社北京廿七日电】　印度共和国驻我国大使潘尼迦呈递国书后，日前曾分谒朱德副主席、刘少奇副主席、李济深副主席、张澜副主席、郭沫若副总理、黄炎培副总理，并访问我驻印大使袁仲贤等。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"name":"朱德","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"375b1a0f65"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
