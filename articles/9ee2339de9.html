art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"《毛主席八篇著作哲学思想辅导》即将出版","authors":[],"parts":[{"type":"paragraph","text":"为了帮助广大干部、群众学好毛主席的八篇著作中的哲学思想，中国人民解放军政治学院哲学教研室在进行毛主席八篇著作哲学思想教学的基础上，编写了《毛主席八篇著作哲学思想辅导》一书，即将出版。这本书，对毛主席的《实践论》、《矛盾论》、《中国革命战争的战略问题》、《抗日游击战争的战略问题》、《论持久战》、《战争和战略问题》、《新民主主义论》、《论联合政府》等八篇著作，实事求是地论述了它的历史地位，它所揭示的哲学思想以及它的实践意义，展示了毛泽东哲学思想的伟大指导作用。在理论联系实际方面，注意体现《关于建国以来党的若干历史问题的决议》精神，说明了学习八篇著作对理解毛泽东思想的活的灵魂、端正思想路线的重大意义。在文字表达方面，尽力做到准确、简明、通俗。对毛主席八篇著作的历史背景以及所提到的重要人物、事件和军事术语也做了一些说明。该书由辽宁人民出版社出版，新华书店发行，需要者可在就近新华书店预订。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9ee2339de9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
