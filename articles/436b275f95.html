r":1976,"month":5,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"战笔"},{"type":"paragraph","text":"解放军某部  周惠民  桑世新我身边珍藏着一枝笔，笔锋象利剑，削铁如斩泥。手攥这枝笔，——十年风雨心头激。幸福的“八·一八”啊，我们见到了伟大领袖毛主席！各路小将汇成滚滚洪流，分别时赠笔留念，都把战斗的激情凝聚在笔里！记得首次开锋，抄下了《炮打司令部》，从此给战笔安上了钢的筋骨，火的眼力。笔动起惊雷，笔落生霹雳，捣毁刘家黑殿，粉碎林记“舰队”，檄文激扬如卷雪，戳穿骗子本质。十年战斗笔锋锐，阶级斗争不停熄。邓小平翻案搞复辟，让他碰碰我的战笔。“战士还是这股劲，誓死保卫毛主席！”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"436b275f95"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
