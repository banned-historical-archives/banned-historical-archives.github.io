script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"邓颖超欢宴越南妇女代表团宾主频频为中越人民在反帝反修正主义斗争中的友谊干杯","authors":[],"dates":[{"year":1963,"month":7,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京9日电】　全国妇联副主席邓颖超今晚举行宴会，欢迎以越南妇女联合会副主席何桂为首的越南妇女代表团。"},{"type":"paragraph","text":"越南民主共和国驻中国大使陈子平应邀出席了宴会。"},{"type":"paragraph","text":"中国亚非团结委员会副主席包尔汉，我国驻越南民主共和国大使朱其文和全国妇联其他负责人等也出席了宴会。"},{"type":"paragraph","text":"宴会在亲切友好的气氛中进行。邓颖超副主席和何桂团长先后发表了热情洋溢的讲话。包尔汉副主席和陈子平大使、朱其文大使也热情地在宴会上祝酒。宾主频频为中越两国人民和妇女在过去革命斗争中，在反对美帝国主义和保卫马克思列宁主义、反对现代修正主义的共同斗争中，在建设社会主义的事业中，结成的深厚友谊和亲密团结的日益巩固和发展而干杯。"},{"type":"paragraph","text":"出席今晚宴会的有全国妇联副主席许广平、刘清扬，曾经访问过越南的人士帅孟奇、张茜、王光美、龚澎、范瑾、陈舜瑶、倪斐君、吴青、丁雪松、戚云，全国妇联书记处第一书记罗琼，书记处书记田秀涓、吴全衡、胡耐秋、杨蕴玉、董边、郭建、黄甘英。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a47968ec5a"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
