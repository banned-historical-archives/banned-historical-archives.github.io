"dates":[{"year":1952,"month":2,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　春节期间，本市店员普遍以各种联欢会文娱活动结合四反运动展开宣传及传达工作。静安区青年工人、青年团员、大组长及夜校教员分别举行了联欢会。闸北区有七个基层开联欢会展开宣传，该区蔬菜地货市场的联欢会上，演出活报“支援四反前线”。新成区有二百多店员组成拜年队，配合拜年展开宣传，他们并到虹桥公墓向光荣烈士拜年。常熟区店员干部举行了联欢会，并出版大学报、漫画、黑板报等宣传特刊。该区并发现不法资方撕掉“四反运动”标语的行为，经查获三件，请公安局办理，资方已在公安局具结悔过。老闸区五金业共有店员四千多人，在春节期中普遍展开宣传，现在已有三千一百人听到了传达报告。邑朝、北站、卢湾、江宁、吴淞、蓬莱、虹口、提篮、黄浦等区，也分别举行了联欢会，有效地展开了宣传与传达。"},{"type":"paragraph","text":"通过各区的联欢会，店员工会收到了不少检举信件。很多店员们表示:我们要从春节开始，更大规模地展开检举运动。不打退资产阶级的猖狂进攻誓不干休!"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"909931a3b2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
