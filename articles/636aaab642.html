art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"以毛主席军事理论指导战备实际福州部队师以上干部集训班开学","authors":["林志芳"],"parts":[{"type":"paragraph","text":"本报15日讯 福州部队师以上干部第一期学习毛主席军事著作集训班在14日开学。"},{"type":"paragraph","text":"集训时间为两个月。学习方法以自学为主，通过阅读文件，提出问题，再阅读文件，然后展开鸣放辩论，最后作总结。"},{"type":"paragraph","text":"学习的重点是毛主席的“中国革命战争的战略问题”、“论持久战”、“十大军事原则”等著作，我军的战略方针，以及研究本部队防区的作战指导原则、各军种兵种的运用、勤务保障计划等问题。此外，还学习“关于人民公社若干问题的决议”。"},{"type":"paragraph","text":"学习中强调苦学深钻，联系实际，要求通过系统的学习，正确领会毛主席研究战争、指导战争的立场、观点和方法，以及我军的建军原则和战略、战术指导思想，为进一步学习毛主席的著作打下良好基础。在正确领会毛主席军事思想的基础上，根据我军的战略方针，以及部队作战任务和作战方案，具体研究作战指导思想，各军种兵种的运用，战役保障等问题，从而进一步熟悉作战方案，加强战备工作，更好地贯彻建军路线，推动部队训练的更大跃进。 （林志芳）"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"636aaab642"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
