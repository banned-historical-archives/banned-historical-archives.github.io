<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji45","name":"毛泽东全集第45卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji45.pdf"],"article":{"title":"在关于四清运动中央工作会议上的讲话","alias":"","parts":[{"type":"paragraph","text":"在关于四清运动中央工作会议上的讲话"},{"type":"paragraph","text":"（1963年5月）"},{"type":"paragraph","text":"先看二十个材料引起大家讨论，先看三天。各中央局、省开会也是如此，不要传达中央文件有一个框框。不要性急，横竖准备搞它一年、两年，两年搞不完搞三年。这样一个大的运动需要时间，不要性急。"},{"type":"paragraph","text":"这个革命运动是土改以来第一次最大的斗争。这样全面、这样广、这样深远是几年没有的。“三反”“五反”搞城市，一九五七年反右是思想战线上的，反高饶是党内的。全面的、党内党外的这样的阶级斗争是十几年来没有的。这次从党内到党外，从上到下，从干部到群众，这样理解有好处。这是土改以来第一次大斗争。开始要训练县以上的干部队伍，再训练大队以上的干部，还有训练生产队干部和贫下中农积极分子。"},{"type":"paragraph","text":"没有蚂蚁的地区不要硬去找蚂蚁。譬如一类社队过去进行了阶级斗争，进行了社会主义教育，你一定去找地富活动，没有一个例外也不好。"},{"type":"paragraph","text":"人民内部矛盾是大量的，差不多都有，大的小的。河南材料说到一个支部很好，另一材料说的一个公社干部经过洗手洗澡真正一尘不染的只有两个人，不能说这个支部不好，还是百分之九十五以"},{"type":"paragraph","text":"在关于四清运动中央工作会议上的讲话上。现在看来我们干部真正一尘不染是有的，但不能说太多。铺张浪费、多吃多占，一点没沾上的少，大多数沾了，洗手洗澡交待就好了吗？这次“四清”“五反”大家都出点汗，洗温水澡，轻松愉快，才能轻装上阵，一致对敌。为什么轻松愉快？一致对敌，我们身上不干净没有力量，搞干净就能团结一致对敌。有的干部多吃多占，有的和地富女儿勾搭，不洗就不能对敌。有些人对敌斗争有劲，对人民内部矛盾就不大积极，有顾虑。"},{"type":"paragraph","text":"解决人民内部矛盾，多吃多占，上了当的，只要自己说出来，又退了赃，不算贪污分子。将来机关、工厂、企业也可以这样办。当场宣布不算贪污分子，可不公布姓名。东北局有几个贪污一百元、二百元，自己讲了，开大会宣布不算贪污。至于贪污大的案处理，大约不过上万元，如自己交待了又退了，处理可以减轻。既要有严肃性，又要有政策性，“四清”“五反”一定要有，不反不行。一定要交待清楚，不退赃物赃款不行。但要退得合情合理，多吃多占的退的时候，不要退得太挖苦了。使干部生活过不下去也不好，有的已吃了用了，教育他向群众检讨一下退出若于，参加劳动，这样群众不会叫一次退出，分期分批退，不至于使生活不好过。还可以采取自报公议。这个政策很复杂，看起来自己好。"},{"type":"paragraph","text":"这次运动中间要换一批。劳动好的人，看来是少数。处分的，也是少数。议论干部受处分的可能不到百分之一，不要太多了，要多做教育工作。加强运动的领导，有的时候需要靠各地区县社队广大干部，上面去的人不要包办代替，要把广大干部发动起来，要依靠广大干部去搞。用这种方法一自我教育方法，发动广大干部的方法，来的力量大。"},{"type":"paragraph","text":"一个坚决把运动搞起来，一个怕搞乱了。毛泽东全集第四十五卷"},{"type":"paragraph","text":"（口口同志讲：我懂主席心情，第一要搞，第二要搞好。经常向主席反映情况，得到主席指示，不要搞乱了。）"},{"type":"paragraph","text":"三个伟大革命斗争，不搞好不行，一定要搞好。"},{"type":"paragraph","text":"注意总结经验，回去中央局开十大会，搞一个月工作，到七月中央局再开一次会，总结一下经验，摸一下情况，到七月底八月中央开会，除这个外还要搞工业。"},{"type":"paragraph","text":"要有强的领导才能发动运动，分期分批，一批批搞不算落后。这次运动将要大大提高各地的自觉性，中央局、省、市、县的人下去一起来运动。"},{"type":"paragraph","text":"“四清”历来不清，阶级斗争粗糙，这次运动，要提高自觉性，要忠心诚恳地帮助社队把工作搞好，帮助干部洗温水澡，帮助“四清”搞好，除了个别不行的，烂了、蜕化变质的帮不上去，或太坏了，要派工作队代替他们搞，除此要诚心诚意地帮助他们搞。"},{"type":"paragraph","text":"你们对干部怎么样？我不清楚。现在看起来对干部要说服教育，特别是用实际证据来说服教育。照理说有，拿出实际证据来说，也有阶级斗争实际证据，昔阳县实际证据，浙江参加劳动，四个好文件是实际证据。检查一下我们是否照理说多，证据说比较少。"},{"type":"paragraph","text":"你们有机会去一个区搞十几天。（我们说：没有。）你们下去干部是否很紧张？熟了就不很紧张，多尊重人家，不要指手画脚，“三不”，对干部我们要团结他们，要洗手洗澡，要抓一下。"},{"type":"paragraph","text":"这次运动会出现杀人灭迹。"},{"type":"paragraph","text":"发动群众搞“四清”是厉害的事情，河北经验，有些公安机关搞不清，发动群众“四清”搞出来了。有人讲阶级斗争靠公安部门搞，人民内部靠监委搞，当然要靠，但除此还要充分地发动群众，依靠群众。"},{"type":"paragraph","text":"在关于四清运动中央工作会议上的讲话"},{"type":"paragraph","text":"这个运动抓起纲领就好办了，分期分批搞，搞第二、第三批不算不名誉，还是名誉。"},{"type":"paragraph","text":"（众议：有地方走过场，雨过地皮湿。）走了过场再搞嘛，就是不要伤人，不是敌人当敌人，不是···"},{"type":"paragraph","text":"（众议：乱子一点不出不行，主席同意我们的看法。十九日大厦跳楼死人，黑龙江有个地富杀死三十八人，去年枪毙了反革命十三人。）上海死一人，在厕所吊死，留字“过路君子”说好为他申冤，根本没斗他就死了。"},{"type":"paragraph","text":"要坚持说服教育，分期分批试点，划清界线，团结百分之九十五以上的群众和干部，有强的领导，只要有几条搞好就可少出乱子。"},{"type":"paragraph","text":"不打无准备之仗，材料没准备，兵没练好，不要搞。这一仗是全国性的革命运动，要像解放战争时来打仗，辽沈战役、锦州、准海、过长江战役。不要打百团大战，不要像皖南事变那种打法。"},{"type":"paragraph","text":"第二是解放战争几个战役取得了全国性的胜利，这次打仗打好了是全国革命的胜利，对世界革命贡献更大了。"}],"authors":["毛泽东"],"dates":[{"year":1963,"month":5}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":436,"page_end":439},"tags":[{"name":"毛泽东","type":"人物"},{"name":"人民内部矛盾","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]},{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"在关于四清运动中央工作会议上的讲话","authors":["毛泽东"],"dates":[{"year":1963,"month":5}],"is_range_date":false,"parts":[{"text":"在关于四清运动中央工作会议上的讲话","type":"title"},{"text":"毛泽东","type":"authors"},{"text":"先看二十个材料引起大家讨论，先看三天。各中央局、省开会也是如此，不要传达中央文件有一个框框。不要性急，横竖准备搞它一年、两年，两年搞不完搞三年。这样一个大的运动需要时间，不要性急。","type":"paragraph"},{"text":"这个革命运动是土改以来第一次最大的斗争。这样全面，这样广，这样深远是几年没有的。三反五反搞城市，一九五七年反右是思想战线上，反高饶是党内的。全面的、党内党外的这样的阶级斗争是十几年来没有的。这次从党内到党外，而上到下，从干部到群众，这样理解有好处。这是土改以来第一次大斗争。开始要训练县以上的干部队伍，再训练大队以上的干部，还有训练生产队干部和贫下中农积极分子。","type":"paragraph"},{"text":"没有蚂蚁的地区不要硬去找蚂蚁。譬如一类社队过去进行了阶级斗争，进行了社会主义教育，你一定去找地富活动，没有一例外也不好。","type":"paragraph"},{"text":"人民内部矛盾是大量的，差不多都有，大的小的。河南材料说到一个支部很好，另一材料说的一个公社干部经过洗手洗澡真正一尘不染的只有两个人，不能说这个支部不好，还是百分之九十五以上。现在看来我们干部真正一尘不染是有，但不能说太多。铺张浪费、多吃多占，一点没沾上的少，大多数沾了，洗手洗澡交待就好了吗？这次“四清”“五反”大家都出点汗，洗温水澡，轻松愉快，才能轻装上阵，一致对敌。为什么轻松愉快？一致对敌，我们身上不干净没有力量，搞干净就能团结一致对敌。有的干部多吃多占，有的和地富女儿勾搭，不洗就不能对敌。有些人对敌斗争有劲，对人民内部矛盾就不大积极，有顾虑。","type":"paragraph"},{"text":"解决人民内部矛盾，多吃多占，上了当的，只要自己说出来，又退了赃，不算贪污分子。将来机关、工厂、企业也可以这样办。当场宣布不算贪污分子，可不公布姓名。东北局有几个贪污一百元、二百元，自己讲了，开大会宣布不算贪污。至于贪污大的案处理了，大约不过上万元，如自己交待了又退了，处理可以减轻。既要有严肃性，又要有政策性，“四清”“五反”一定要有，不反不行。一定要交待清楚，不退赃物赃款不行。但要退得合情合理，多吃多占的退的时候，不要退得太挖苦了。使干部生活过不下去也不好，有的已吃了用了，教育他向群众检讨一下退出若干，参加劳动，这样群众不会叫一次退出，分期分批退，不至使生活不好过。还可以采取自报公议。这个政策很复杂，看起来自己好。","type":"paragraph"},{"text":"这次运动中间要换一批。劳动好的人，看来是少数。处分的，也是少数。议论干部受处分的可能不到百分之一，不要太多了，要多做教育工作。加强运动的领导，有的时候须要靠各地区县社队广大干部，上面去的人不要包办代替，要把广大干部发动起来，要依靠广大干部去搞。用这种方法——自我教育方法，发动广大干部方法，来的力量大。","type":"paragraph"},{"text":"一个坚决把运动搞起来，一个怕搞乱了。","type":"paragraph"},{"text":"（××讲：我懂主席心情，第一要搞，第二要搞好。经常向主席反映情况，得到主席指示，不要搞乱了。）","type":"paragraph"},{"text":"三个伟大革命斗争，不搞好不行，定要搞好。","type":"paragraph"},{"text":"注意总结经验，回去中央局开十天会，搞一个月工作，到七月中央局再开一次会，总结一下经验，摸一下情况，到七月底八月中央开会，除这个外还要搞工业。","type":"paragraph"},{"text":"要有强的领导才能发动运动，分期分批，一批批搞不算落后。这次运动将要大大提高各地的自觉性，中央局、省、市、县的人下去一起来运动。","type":"paragraph"},{"text":"四清历来不清，阶级斗争粗糙，这次运动，要提高自觉性，要忠心诚恳地帮助社队工作搞好，帮助干部洗温水澡，帮助四清搞好，除了个别不行的，烂了，蜕化变质的帮不上去，或太坏了，要派工作队代替他们搞，除此要诚心诚意地帮助他们搞。","type":"paragraph"},{"text":"你们对干部怎么样？我不清楚。现在看起来对干部要说服教育，特别是用实际证据来说服教育。照理说有，拿出实际证据来说，也有阶级斗争实际证据，昔阳县实际征据，浙江参加劳动，四个好文件是实际证据。检查一下我们是否照理说多，证据说比较少。","type":"paragraph"},{"text":"你们有机会去一个区搞十几天（我们说：没有），你们下去干部是否很紧张，熟了就不很紧张，多尊重人家，不要指手划脚，“三不”，对干部我们要团结他们，要洗手洗澡，要抓一下。","type":"paragraph"},{"text":"这次运动会出现杀人灭迹。","type":"paragraph"},{"text":"发动群众搞四清是厉害的事情，河北经验，有些公安机关搞不清，发动群众四清搞出来了。有人讲阶级斗争靠公安部门搞，人民内部靠监委搞，当然要靠，但除此还要充分的发动群众，依靠群众。","type":"paragraph"},{"text":"这个运动抓起纲领就好办了，分期分批搞，搞第二、第三批不算不名誉，还是名誉。","type":"paragraph"},{"text":"（众议：有地方走过场，雨过地皮湿）走了过场再搞嘛，就是不要伤人，不是敌人当敌人，不是……。","type":"paragraph"},{"text":"（大家议：乱子一点不出不行，主席同意我们的看法。十九日大厦跳楼死人，黑龙江有个地富杀死三十八人，去年枪毙了反革命十三人。）上海死一人，在厕所吊死，留字“过路君子”说好为他申寃，根本没斗他就死了。","type":"paragraph"},{"text":"要坚持说服教育，分期分批试点，划清界线，团结百分之九十五以上的群众和干部，有强的领导，只要有几条搞好就可少出乱子。","type":"paragraph"},{"text":"不打无准备之仗，材料没准备，兵没练好，不要搞。这一仗是全国性的革命运动，要像解放战争时来打仗，辽沈战役、锦州、淮海、过长江战役。不要打百团大战，不要像皖南事变那样打法。","type":"paragraph"},{"text":"第二是解放战争几个战役取得了全国性的胜利，这次打仗打好了是全国革命的胜利，对世界革命贡献更大了。","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"人民内部矛盾","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4ff3e0e586"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
