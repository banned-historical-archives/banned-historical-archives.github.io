运动蓬勃发展","authors":[],"dates":[{"year":1969,"month":2,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"安徽丝绸厂在解放军帮助下用毛泽东思想统一认识和行动"},{"type":"paragraph","text":"革命大联合不断巩固　斗批改群众运动蓬勃发展"},{"type":"paragraph","text":"据新华社合肥电　驻安徽丝绸厂解放军支左人员，从狠抓两条路线斗争教育入手，帮助广大革命职工，认真落实伟大领袖毛主席的一系列最新指示，用毛泽东思想统一认识和行动，不断巩固和发展革命大联合，全厂斗、批、改的群众运动蓬勃发展。"},{"type":"paragraph","text":"这个厂的职工在无产阶级文化大革命中，由于一小撮阶级敌人的挑动，一度分裂成为对立的两派。以后，全厂革命职工在毛主席的“在工人阶级内部，没有根本的利害冲突。在无产阶级专政下的工人阶级内部，更没有理由一定要分裂成为势不两立的两大派组织”的伟大指示的指引下，实现了革命大联合。"},{"type":"paragraph","text":"革命大联合实现以后，解放军支左人员注意做好进一步巩固和发展革命大联合的工作。他们帮助广大革命职工连续举办了以巩固和发展革命大联合为内容的毛泽东思想学习班。在学习班里，组织革命职工认真学习毛主席的最新指示，并结合本厂斗、批、改的实际学习党内两条路线斗争史，狠批叛徒、内奸、工贼刘少奇的反革命修正主义路线。通过学习和批判，进一步提高了广大革命职工的两条路线斗争觉悟。"},{"type":"paragraph","text":"毛主席教导我们：“正确地对待干部，是实行革命三结合，巩固革命大联合，搞好本单位斗、批、改的关键问题，一定要解决好。”这个厂的广大革命职工坚决按照毛主席这一伟大教导办事。原来两派群众在干部问题上意见分歧，争吵不休。以后在毛泽东思想的原则基础上取得了一致认识，正确对待干部，促进了革命大联合的巩固和发展。"},{"type":"paragraph","text":"革命大联合实现以后，解放军支左人员还特别注意帮助革命职工克服资产阶级派性的影响，狠批反动的资产阶级的“多中心即无中心论”，使两派群众组织的头头和广大革命群众认识到：闹资产阶级派性，闹多中心，就是背离毛主席的无产阶级革命路线，就是对毛主席不忠。认识提高后，大家时时事事都站到无产阶级党性的立场上，站到毛主席无产阶级革命路线一边，谁的意见符合毛泽东思想，就照谁的意见办。对于阶级敌人的阴谋破坏，革命职工坚决与之作斗争。"},{"type":"paragraph","text":"目前，这个厂由于从思想上巩固和发展了革命大联合，革命职工在毛泽东思想统帅下，群策群力，共同战斗，全厂斗、批、改蓬勃发展。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"安徽文革","type":"人物"},{"name":"派性","type":"主题/事件"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"name":"军队支左","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6e32300d77"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
