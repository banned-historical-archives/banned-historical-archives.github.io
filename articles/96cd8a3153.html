1971,"month":4,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"上海汽轮机厂　黄世益"},{"type":"paragraph","text":"油烟弥漫，"},{"type":"paragraph","text":"台台车床冒热气，"},{"type":"paragraph","text":"晶亮亮的钢轴呵，"},{"type":"paragraph","text":"映着艳阳天。"},{"type":"paragraph","text":"墙上“语录”金闪闪，"},{"type":"paragraph","text":"机架零件银灿灿，"},{"type":"paragraph","text":"铁屑四溅人影疾，"},{"type":"paragraph","text":"——红旗一杆杆。"},{"type":"paragraph","text":"汗花拌油水，"},{"type":"paragraph","text":"赤胆凝刀尖，"},{"type":"paragraph","text":"马达隆隆歌声脆，"},{"type":"paragraph","text":"车头旋似飞。"},{"type":"paragraph","text":"劈掉千难万险，"},{"type":"paragraph","text":"车出火红世纪，"},{"type":"paragraph","text":"一腔豪情洒九霄呵，"},{"type":"paragraph","text":"天地直打颤，"},{"type":"paragraph","text":"只因班前学“两论”，"},{"type":"paragraph","text":"龙腾虎跃干劲添。"},{"type":"paragraph","text":"呵，热腾腾的烟雾中，"},{"type":"paragraph","text":"大庆花开红艳艳……"},{"type":"paragraph","text":"红日高照金一片，"},{"type":"paragraph","text":"阳光下，张张笑脸欢。"},{"type":"paragraph","text":"一声“报喜”涌红云，"},{"type":"paragraph","text":"飞向毛主席!"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"96cd8a3153"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
