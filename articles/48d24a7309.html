script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"越《人民报》揭露美国在全世界的颠复活动  美国使用颠复手段进行扩张  美国对现代修正主义的赞扬，应使社会主义国家提高革命警惕性","authors":[],"dates":[{"year":1963,"month":12,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"越《人民报》揭露美国在全世界的颠复活动"},{"type":"paragraph","text":"美国使用颠复手段进行扩张"},{"type":"paragraph","text":"美国对现代修正主义的赞扬，应使社会主义国家提高革命警惕性"},{"type":"paragraph","text":"新华社河内四日电　越南《人民报》最近发表评论，谴责美帝国主义在世界各地进行颠复活动。评论指出，美国的颠复政策是美国新殖民主义残暴和阴险的工具，是美国好战和侵略政策的重要组成部分。"},{"type":"paragraph","text":"这篇题为《美帝国主义的颠复手段》的评论说，在最近四个月内美国在厄瓜多尔、多米尼加、洪都拉斯和南越直接插手进行了四次军事政变。评论又指出，如果把近二十年来发生的政变统计起来，不管是否成功，凡是美国曾插手干的，就数以百计。这就更加突出地暴露了国际宪兵——美帝国主义杀人不眨眼和极端残忍的本性。这更进一步地证明了：颠复手段是美国扩张主义的伙伴，是美帝国主义为实现世界霸主的目的而惯用的工具。"},{"type":"paragraph","text":"评论指出，美国的对外政策离开不了暴力。美国“原子外交政策”、“美元外交政策”，就是用压力（武器和经济）来迫使这个或那个国家的政府改变政治路线。"},{"type":"paragraph","text":"评论说，社会主义阵营的不断强大，民族解放运动和国际工人运动暴风雨般的发展，促使美国的对外政策陷于严重破产的境地。面临这一情况，在促进战争和侵略计划的实现的同时，美帝国主义还有一种趋向，即更加重视颠复手段的使用，并进一步加强实现这种政策的恶毒手段。"},{"type":"paragraph","text":"评论揭露，美国针对不同类型的国家实现它的颠复手段。美帝国主义在它的走狗无力推行它的侵略计划时，也对这些走狗推行颠复政策。吴庭艳、吴庭儒的死，就是这方面的最新的、最有力的证明。"},{"type":"paragraph","text":"评论强调说：“美帝国主义从来没有放弃实行社会主义国家的资本主义复辟，从来没有放弃对社会主义国家的颠复活动。肯尼迪从当总统以前到死时止，一直没有停止‘解放’东欧社会主义国家的无耻叫嚣，从来没有停止要求‘让共产党国家的人民自行决定他们的道路’。肯尼迪死后，这一政策仍在继续推行。美国已经和正在对社会主义国家进行的间谍活动，美国每年拿出一亿多美元豢养间谍和从社会主义国家出走的反动的流亡分子，美国在一九五六年制造的匈牙利反革命暴动，美国目前不断地对英雄的社会主义的古巴采取的敌视行动，美国对现代修正主义分子的‘和平长入社会主义’的论调的讨好和赞赏，这一切促使社会主义阵营全体人民必须不断地保持清醒头脑，不断地提高革命警惕性，随时作好准备以粉碎美帝国主义的破坏和颠复行动。”"},{"type":"paragraph","text":"评论说，“为了击败美国旨在对社会主义国家进行资本主义复辟的一切恶毒阴谋，这些国家的人民必须认识到，没有别的道路，而只有彻底进行社会主义革命、努力建设经济和文化、继续消灭资本主义残余、对反革命势力实行专政、不断提高革命警惕性的道路。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"48d24a7309"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
