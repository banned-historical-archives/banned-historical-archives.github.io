script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反对垄断资产阶级的残酷剥削  意大利各大城市九万交通运输工人罢工","authors":[],"dates":[{"year":1970,"month":1,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反对垄断资产阶级的残酷剥削"},{"type":"paragraph","text":"意大利各大城市九万交通运输工人罢工"},{"type":"paragraph","text":"新华社三日讯　罗马消息：意大利工人在新年一开始就纷纷举行罢工斗争，反对垄断资产阶级的残酷剥削，要求增加工资。"},{"type":"paragraph","text":"意大利各大城市的九万名市内交通运输工人，继去年年底的罢工斗争以后，在二日举行了五小时的全国规模的罢工。公共汽车、电车和地下铁道的司机、售票员都停止上班，使各大城市交通陷入瘫痪状态。与此同时，各城市的救护车司机和救护队人员二日连续三天举行罢工。意大利国库和财政部的雇员也在坚持罢工斗争。"},{"type":"paragraph","text":"据新华社讯　罗马消息：意大利各城市的九万名市内交通运输工人去年十二月二十九日、三十日连续二天举行了数小时罢工，要求增加工资，保障就业权利。交通运输工人的罢工使意大利各城市内的公共交通陷于瘫痪状态。据报道，交通运输工人还将于今年一月七日和九日连续举行罢工。"},{"type":"paragraph","text":"意大利政府控制的国营航空公司的一千多名服务员去年十二月三十日开始举行为期三天的罢工，要求增加工资，保障工人权利。这次罢工迫使从罗马起飞的班机停止飞行。"},{"type":"paragraph","text":"意大利政府财政机构的四万名雇员从去年十二月十五日以来一直进行着的时断时续的罢工，他们的罢工预计将持续到今年一月五日。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d2d036651e"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
