":[{"year":1981,"month":5,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京五月十一日电　中华人民共和国全国人民代表大会常务委员会委员长叶剑英和中华人民共和国国务院总理赵紫阳五月十一日打电报给弗朗索瓦·密特朗，热烈祝贺他当选为法兰西共和国总统。贺电全文如下:巴黎"},{"type":"paragraph","text":"弗朗索瓦·密特朗先生:"},{"type":"paragraph","text":"在你当选法兰西共和国总统之际，我们谨向你表示热烈祝贺。"},{"type":"paragraph","text":"祝你在任职期间取得成就。"},{"type":"paragraph","text":"祝中法两国业已存在的友好合作关系及两国人民之间的深厚友谊日益增进。"},{"type":"paragraph","text":"中华人民共和国全国人民代表大会常务委员会委员长　叶剑英"},{"type":"paragraph","text":"中华人民共和国国务院总理　赵紫阳"},{"type":"paragraph","text":"一九八一年五月十一日于北京"},{"type":"paragraph","text":"新华社巴黎五月十日电　在十日的法国总统选举第二轮投票中，社会党领袖弗朗索瓦·密特朗当选为法兰西共和国，总统。"},{"type":"paragraph","text":"据内政部二十二点三十五分公布的初步统计，密特朗得一千二百四十四万七千七百一十三票，占百分之五十二；任期届满的总统吉斯卡尔·德斯坦得一千一百四十八万九千一百一十六票，占百分之四十八。百分之十三点零五的选民弃权。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"赵紫阳","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1beee44be8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
