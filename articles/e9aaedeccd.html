970,"month":7,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"颗颗红心向着毛主席"},{"type":"paragraph","text":"七百?公社瑶族贫下中农，散居在一千三百个山?里，解放前过着吃野菜、住草窝的苦难生活。解放后，在各族人民伟大领袖毛主席的英明领导下翻了身，红太阳的光辉照亮了瑶山。瑶族贫下中农对伟大领袖毛主席无限热爱，对战无不胜的毛泽东思想无限崇拜。他们把读毛主席的书，听毛主席的话，照毛主席的指示办事，做毛主席的好战士，作为一切行动的最高准则。在无产阶级文化大革命中，从一九六七年起，他们每星期坚持一个晚上在生产队的毛泽东思想夜校集中上课，一个晚上在本山?的毛泽东思想学习班讨论，一个晚上在家庭学习班结合实际斗私批修。"},{"type":"paragraph","text":"瑶族老贫农蓝正剪不识字，但生产队开办毛泽东思想夜校时，他却自告奋勇地担任辅导员。他说：“七百?山高，没有毛主席的恩情高；刁江水深，没有毛主席对瑶族人民的恩情深，困难再大，我也要把毛泽东思想学到手，传播出去。”蓝正剪心红志坚，每次上辅导课前，他都手捧革命红宝书，爬过三座高山，步行十几里路，到一个小学校去请人帮助，回来再辅导别人。不分天晴下雨，不论酷暑严寒，从不间断。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e9aaedeccd"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
