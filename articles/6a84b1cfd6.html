在您英明领导下，夺取文化革命和工农业生产双胜利","authors":[],"dates":[{"year":1966,"month":9,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"\u003cIMG alt=请插入5号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1966\\09\\669j040101.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e我们最最敬爱的伟大领袖毛主席，您是我们心中不落的红太阳，我们永远忠于您，忠于毛泽东思想，在您英明领导下，夺取文化革命和工农业生产双胜利。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入5号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1966\\09\\669j040102.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e伟大领袖毛主席，我们心中最红的太阳!我们从五湖四海，来到您的身旁。我们永远听您的话，以工农兵为榜样；坚决按十六条办事，做敢于革命、善于革命的闯将。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入5号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1966\\09\\669j040103.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e毛泽东主席和应邀来我国进行友好访问的澳大利亚(马克思列宁主义者)共产党主席爱·弗·希尔同志及夫人乔·希尔在天安门城楼上。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入5号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1966\\09\\669j040104.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e毛主席啊，今天，我们从五湖四海来到了您的身边，我们感到无比激动，无比幸福。我们要永远读您的书，听您的话，照您的指示办事，跟您闹一辈子革命!《人民日报》记者摄\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入5号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1966\\09\\669j040105.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e九月十五日，天安门广场上，一片红旗的海洋，欢腾的海洋。来自全国各地和首都的百万革命师生，在这里受到了伟大领袖毛主席的接见。他们满怀革命激情，决心沿着毛主席指引的文化大革命的方向，和工农兵群众团结起来，夺取无产阶级文化大革命的伟大胜利。\u003c/FONT\u003e"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6a84b1cfd6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
