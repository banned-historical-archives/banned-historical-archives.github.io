向中央的报告","authors":[],"dates":[{"year":1950,"month":10,"day":12}],"is_range_date":false,"parts":[{"text":"罗瑞卿关于河北武安县黄灵道武装暴动向中央的报告","type":"title"},{"text":"毛泽东：已阅。10月12日","type":"paragraph"},{"text":"据河北省公安厅今日（12日）16时30分报告“邯郸专区武安属马庄、南北窑、山根村等4村，会匪百余人带步枪30多支于昨晨8时许武装暴动，我公安处闻讯后，派公安武装两个班会同当地驻军辎重兵一个排和民兵等共200余人于10时赶到上述各村清剿，自晨至晚战斗达9小时，终因匪徒顽抗，未能全部歼灭。战斗中将匪首击毙，另毙匪徒3名，俘20多，其余均窜据马庄以北山头，继续顽抗，现我已集中武装300名，进行围剿并动员匪徒家属喊话，做政治瓦解工作，今晚如匪徒仍固守顽抗，则准备予以彻底歼灭”。","type":"paragraph"},{"text":"据此，除令河北公安厅随时报告情况外，并采取以下方针：","type":"paragraph"},{"text":"1、要迅速彻底歼灭。","type":"paragraph"},{"text":"2、武装围剿要结合政治瓦解，达到不过多伤人。","type":"paragraph"},{"text":"3、对俘获匪徒，要立即审讯，从审讯中及时了解敌情。","type":"paragraph"},{"text":"是否有当？谨乞指示。","type":"paragraph"}],"comments":[],"origin":"《取缔反动会道门工作历史资料汇编（1948－1992年）》，公安部一局编印， 2009年。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"罗瑞卿","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"54411128ac"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
