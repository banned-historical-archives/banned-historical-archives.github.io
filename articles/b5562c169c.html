script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"把批判资产阶级的斗争进行到底","authors":[],"dates":[{"year":1968,"month":5,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"把批判资产阶级的斗争进行到底"},{"type":"paragraph","text":"毛主席在“五·七”指示中指出，无论是解放军指战员、工人、农民、学生，还是商业、服务行业、党政机关工作人员，都要批判资产阶级。"},{"type":"paragraph","text":"批判资产阶级的伟大斗争，有大战役、小战役，大战役和小战役交替进行。这次无产阶级文化大革命，就是一次大战役，“是中国共产党及其领导下的广大革命人民群众和国民党反动派长期斗争的继续，是无产阶级和资产阶级阶级斗争的继续。”我们对中国赫鲁晓夫等党内一小撮走资派的大批判、大斗争，就是同国民党反动派代理人的大搏斗。在无产阶级文化大革命的惊涛骇浪中，广大人民沿着毛主席“五·七”指示的光辉航道，指点江山，激扬文字，高举革命大批判的旗帜，取得了一个又一个的胜利。"},{"type":"paragraph","text":"目前，我们在批判资产阶级的伟大斗争中已经取得了巨大胜利，但是必须看到，彻底肃清党内最大的一小撮走资派长期以来在各个领域里散布的毒素，还是一个十分艰巨的任务。绝不能因为胜利，就松懈起来，"},{"type":"paragraph","text":"“任何松懈战斗意志的思想和轻敌的思想，都是错误的。”我们必须乘胜前进，一刻也不放松革命的大批判，向阶级敌人展开更猛烈的进攻。"},{"type":"paragraph","text":"革命的大批判，一定要从两条路线斗争的大是大非出发，把炮口对准党内最大的一小撮走资派，对准他们在各地区、各系统、各单位的代理人，对准他们庇护下的叛徒、特务、反革命分子，对准混进我们队伍里的一切阶级敌人，把中国赫鲁晓夫的修正主义路线同他的帮凶、爪牙、娄罗们的反革命罪行联系起来，狠狠地进行批判。这样，我们就抓住了同党内一小撮走资派这个主要矛盾，做到了三个区别：区别敌我矛盾和人民内部矛盾、区别广大群众和混入其中的极少数坏人、区别主要矛盾和次要矛盾，正确地掌握了党的政策和策略，就能团结绝大多数人，把运动从胜利推向胜利。《解放日报》五月七日社论"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"两条路线斗争","type":"主题/事件"},{"name":"人民内部矛盾","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b5562c169c"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
