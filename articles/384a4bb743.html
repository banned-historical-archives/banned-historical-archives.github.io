rt":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"妇女们；高举毛泽东思想伟大红旗为实现第三个五年计划而奋斗！","authors":[],"parts":[{"type":"paragraph","text":"据新华社八日讯 中华人民共和国全国妇女联合会今天向全国妇女发出纪念“三八”国际劳动妇女节的号召书中，号召全国妇女高举毛泽东思想的伟大红旗，以大庆和大寨妇女为榜样，在中国共产党的领导下，在各自的岗位上加倍努力，为实现第三个五年计划、为援越抗美、为支援世界人民的革命斗争，作出新的更大的贡献。"},{"type":"paragraph","text":"号召书说，毛泽东思想是当代马克思列宁主义的顶峰，是我国社会主义革命和社会主义建设的指针。现在，在我国已经形成了一个空前广泛的自觉的学习毛主席著作的群众运动。广大的工农妇女和其他革命的妇女群众，她们怀着深厚的阶级感情，读毛主席的书，听毛主席的话，按照毛主席的指示办事，积极投入阶级斗争、生产斗争和科学实验的三大革命运动。在各条战线上，已经出现了很多活学活用毛主席著作的先进妇女。毛泽东思想已经成为推动全国妇女自觉革命、彻底革命的强大动力。"},{"type":"paragraph","text":"号召书说，我们全国妇女，都要努力学习大庆、大寨妇女革命化的光辉榜样，学习雷锋、王杰、麦贤得同志一心为革命的精神。最根本的是要学习他们突出政治，坚持毛泽东思想挂帅，把毛主席的指示作为自己思想行动的最高准则，落实到三大革命斗争中去。更加自觉地积极参加城乡社会主义教育运动，积极投入工农业生产的新高潮，并且要时刻关心国际范围内阶级斗争形势的发展。必须加强战备观念，随时准备迎击和粉碎胆敢向我国进攻的美国侵略者。我们在反对美帝国主义的侵略政策和战争政策的同时，必须把反对现代修正主义的斗争进行到底。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"384a4bb743"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
