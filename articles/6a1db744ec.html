ical-archives/banned-historical-archives0/main/maoquanji31.pdf"],"article":{"title":"在肖华关于军委直属部队开展打虎运动的报告上的批语","alias":"","parts":[{"type":"paragraph","text":"转发华东军区对营连及县区武装"},{"type":"paragraph","text":"三反工作指示的批语"},{"type":"paragraph","text":"（1952年3月4日）各大军区和志愿军："},{"type":"paragraph","text":"此件\"很好。你们应根据自己的情况发布同样的指示。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"三月四日"},{"type":"paragraph","text":"[1]指华东军区1952年3月2日对营连及县区武装三反工作的指示。指示说：连队三反运动的目的，除了肃清贪污、浪费、官僚主义之外，还应明确提出克服军阀主义、加强官兵团结、增强斗志、提高战斗力。连队三反必须掌握稳健慎重、教育为主的方针。对全体人员应反复讲清道理，交代政策。在具体政策上，揭发应该彻底，处理应该从宽，应掌握“战士宽于干部”“连队宽于机关”的原则，缩小打击面，争取多数，以利教育。指示还对3种不同情况的部队规定了3种不同的做法。提出了运动中应该注意的问题，如：三反应服从当前海防、作战任务，不应影响部队的纪律，严防自杀、自伤、逃亡以及反革命分子的乘机破坏活动，切实执行政策，防止逼供信等。"}],"authors":["毛泽东"],"dates":[{"year":1952,"month":3,"day":4}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":476,"page_end":476},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6a1db744ec"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
