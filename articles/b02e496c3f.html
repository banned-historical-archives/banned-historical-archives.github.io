script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"我驻西北欧使节举行国庆招待会  各国朋友热烈赞扬中国人民在毛主席领导下在社会主义建设中取得光辉成就","authors":[],"dates":[{"year":1968,"month":10,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"我驻西北欧使节举行国庆招待会"},{"type":"paragraph","text":"各国朋友热烈赞扬中国人民在毛主席领导下在社会主义建设中取得光辉成就"},{"type":"paragraph","text":"据新华社讯　我驻芬兰大使馆临时代办刘胥吉一日晚上在赫尔辛基举行招待会，庆祝中华人民共和国成立十九周年。"},{"type":"paragraph","text":"出席招待会的来宾有四百多人。其中有芬兰农业部长马蒂·米图宁、工商部长瓦伊诺·勒斯基宁、社会事务部长安娜—利萨·蒂埃克索夫人、社会事务部第二部长巴塔宁、外交部国务秘书约尔马·瓦纳莫和其他军政官员以及芬兰各界朋友。出席招待会的还有各国驻赫尔辛基的外交使节。"},{"type":"paragraph","text":"在招待会上，许多芬兰朋友向中国朋友热烈祝贺中华人民共和国成立十九周年，衷心祝愿毛主席万寿无疆，并且向中国人民表示最好的祝愿，祝中国无产阶级文化大革命取得更加伟大的胜利。"},{"type":"paragraph","text":"刘胥吉在招待会上讲了话。他的讲话赢得热烈的掌声。"},{"type":"paragraph","text":"招待会在热烈、友好的气氛中进行。"},{"type":"paragraph","text":"我驻瑞典大使馆临时代办刘冀才十月一日晚举行招待会，热烈庆祝中华人民共和国成立十九周年。瑞典各界人士三百五十多人出席了招待会，其中有：瑞典不管大臣甘米尔拉·奥迪诺夫、瑞典不管大臣伦纳特·盖杰、瑞典下议院第一副议长奥·伯泰尔、冯·弗里森、瑞典外交部的官员和高级军事将领以及一些国家驻瑞典的外交使节。"},{"type":"paragraph","text":"出席招待会的还有瑞典马列主义者共产主义联盟的领导人。"},{"type":"paragraph","text":"在招待会上，许多进步朋友表示祝愿毛主席万寿无疆！热烈祝贺中国无产阶级文化大革命的伟大胜利。"},{"type":"paragraph","text":"我驻瑞士大使馆临时代办杨旭一日晚在伯尔尼举行招待会，热烈庆祝中华人民共和国成立十九周年。出席招待会的有瑞士联邦政治部秘书长米格利等高级军政官员、许多国家驻瑞士外交使节以及瑞士各界人士共四百余人。在招待会上放映了中国彩色纪录影片钢琴伴唱《红灯记》。"},{"type":"paragraph","text":"中国驻日内瓦总领事馆副领事毕显声九月二十九日也在日内瓦举行了国庆招待会。出席招待会的有日内瓦州和市的负责官员，许多国家驻日内瓦的外交和领事官员以及各界友好人士、爱国华侨等共三百余人。"},{"type":"paragraph","text":"在这两次招待会上，许多朋友热烈赞扬中国人民在毛主席英明领导下，在无产阶级文化大革命中以及在社会主义建设事业中所取得的光辉成就，并衷心祝愿中国人民的伟大领袖毛主席万寿无疆。"},{"type":"paragraph","text":"我驻英国代办处临时代办沈平一日晚上举行招待会，热烈庆祝中华人民共和国成立十九周年。"},{"type":"paragraph","text":"参加招待会的，有英国各界人士以及旅居英国的亚洲、非洲和拉丁美洲的各国朋友约五百五十多人。参加招待会的还有一些国家驻英国的外交使节和英国外交部官员。"},{"type":"paragraph","text":"招待会上，各国进步朋友热烈祝贺中华人民共和国成立十九周年和中国无产阶级文化大革命所取得的伟大胜利。"},{"type":"paragraph","text":"招待会自始至终在热烈友好的气氛中进行。有的朋友在离开时用中国话高呼：“文化大革命万岁！”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b02e496c3f"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
