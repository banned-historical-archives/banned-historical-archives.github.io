tes":[{"year":1963,"month":4,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席的好战士——雷锋"},{"type":"paragraph","text":"吴敏  高山画"},{"type":"paragraph","text":"①一九六○年一月八日，雷锋在入伍第一天的日记上写道：“我一定要向董存瑞、黄继光、安业民等英雄战士学习，做一个毛泽东时代的好战士。”"},{"type":"paragraph","text":"②新兵训练期间练习手榴弹掷远，雷锋个子矮小，费尽了全身力气也达不到标准。他便在同志们休息之后，继续在操场上苦练。"},{"type":"paragraph","text":"③回到宿舍后，雷锋觉得浑身骨节像针扎似的疼。他暗暗地激励自己：“雷锋啊！为了保卫祖国，这点疼算得什么，你想想过去吧！……”。"},{"type":"paragraph","text":"④一九三九年冬天，雷锋出生在湖南省长沙县（原望城县）的一个贫农家里。那还是日寇和汉奸、恶霸横行的时代，雷锋的出生，给这个家庭带来的不是欢乐而是忧虑。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"33e957b43d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
