ates":[{"year":1950,"month":6,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"写给敬爱的毛主席"},{"type":"paragraph","text":"克山、平东两县报告生产救灾工作敬爱的毛主席："},{"type":"paragraph","text":"黑龙江省克山县第三届人民代表会议胜利闭幕了。我们全县人民几年来在共产党和您的领导下，进行了土地改革，打垮了封建势力，支援了解放战争，开展了三年的生产运动。全县人民普遍过着有吃有穿的民主生活。大会选出自己信任的人当了县长和政府委员，来管理自己的政权。我们做了主人。"},{"type":"paragraph","text":"我们的大会以民主的精神检查和批准了过去的政府工作，并决定了全县的农业增产任务。我们要提高农业技术，使用好一千四百台铲趟机和新式农具；巩固生产小组，保证三铲三趟，争取四铲四趟；安置好移民，搞好合作社，加强城乡互助；并保证生产八十四万五千石好粮食，使全县人民生活继续上升。我们决心深入工作，贯彻这次代表会的决议，进一步巩固人民民主专政；提高农业生产，支援人民解放军进军台湾、西藏，解放全中国！我们全县人民坚决拥护您的领导。并祝您永远健康！"},{"type":"paragraph","text":"黑龙江省克山县第三届人民代表会议全体代表  六月四日敬爱的毛主席："},{"type":"paragraph","text":"山东省平东县第三次各界人民代表会议在六月一日正式开幕。代表会总结了本县的春季工作。今春本县种上春田三十七万亩，消灭荒地一千二百余亩，作到了不荒一亩地。全县疏河挖沟三百四十八条，合五百四十八里，使用民工二十余万，其中并有一千一百六十四名妇女积极参加。在救济工作方面，发放调剂粮一百二十万斤，银行贷款粮二十三万斤，群众互济粮二十二万斤，救济粮四十余万斤，使两万二千重灾户得到救济，安心生产。这都是毛主席，共产党英明领导的结果。此外，我们又着重研究了夏季工作。代表会决议本县夏季工作仍以生产救济为中心任务，以夏收、夏种、夏锄为重点，紧密结合救灾备荒。同时还要作好夏防、夏征等工作。我们特地向您报告。祝您身体健康！"},{"type":"paragraph","text":"山东省平东县第三次各界人民代表会议全体代表"},{"type":"paragraph","text":"六月三日"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"02b3c403cb"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
