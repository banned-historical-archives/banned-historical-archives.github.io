ical-archives/banned-historical-archives0/main/maoquanji51.pdf"],"article":{"title":"毛泽东等祝贺越南南方民族解放阵线成立十一周年的电报","alias":"","parts":[{"type":"paragraph","text":"毛泽东等祝贺越南南方民族解放阵线"},{"type":"paragraph","text":"成立十一周年的电报"},{"type":"paragraph","text":"（1971年12月19日）越南南方越南南方民族解放阵线中央委员会主席团阮友寿主席，越南南方共和临时革命政府黄晋发主席："},{"type":"paragraph","text":"在越南南方民族解放阵线成立十一周年的时候，我们代表中国人民、中国共产党和中国政府，以兄弟般的诚挚感情，向战斗在抗美前线的英雄的越南南方人民，表示最热烈的祝贺。"},{"type":"paragraph","text":"越南南方民族解放阵线成立以来，高举抗美救国的大旗，领导越南南方人民，同美国侵略者及其走狗进行英勇顽强、艰苦卓绝的斗争，赢得了无数的辉煌胜利，写下了人民战争的壮丽篇章。你们的斗争，极大地鼓舞和支持了全世界一切被压迫民族和被压迫人民，为反对帝国主义积累了丰富的经验，树立了光辉的榜样。"},{"type":"paragraph","text":"今天，越南人民在军事、政治、外交各条战线上都取得了巨大胜利。美国侵略者及其走狗已经陷入重重的矛盾和深刻的危机。美帝国主义推行的“尼克松主义”“和“越南化”计划正在遭到破"},{"type":"paragraph","text":"[1]“尼克松主义”，主要内容是：以伙伴关系为核心，分摊负担和责任；以实力为基础，建立“现实威镊力量”；以谈判为重要手段，在“五大力量”“三角关系”中推行“均势外交”。"},{"type":"paragraph","text":"毛泽东等祝贺越南南方民族解放阵线成立十一周年的电报产，而且必将彻底破产。越南人民同兄弟的老挝人民、柬埔寨人民加强团结，并肩战斗，一定能够“驱逐美帝，推翻伪政权”，实现解放南方，保卫北方，进而和平统一祖国的伟大目标。"},{"type":"paragraph","text":"中国人民一贯把越南人民和印度支那各国人民的斗争当作自己的斗争，把支援越南人民和印度支那各国人民的抗美救国战争当作自己应尽的国际主义义务。只要美帝国主义一天不停止侵略，只要越南人民和印度支那各国人民的民族愿望一大没有实现，中国人民就全力支援你们的斗争，直到彻底的胜利。"},{"type":"paragraph","text":"中国共产党中央委员会主席毛泽东中华人民共和国副主席董必武中华人民共和国国务院总理周恩来一九七一年十二月十九日于北京"}],"authors":["毛泽东"],"dates":[{"year":1971,"month":12,"day":19}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":281,"page_end":282},"tags":[{"name":"毛泽东","type":"人物"},{"name":"人民战争","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7f4f9ad1af"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
