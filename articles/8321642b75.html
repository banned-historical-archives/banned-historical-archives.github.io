art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"美帝是靠黑人奴隶劳动起家的","authors":[],"parts":[{"type":"paragraph","text":"美国黑人的祖先是被殖民者从非洲掠夺来的奴隶。从十五世纪起，西方殖民主义者就开始从非洲贩运黑人奴隶到美洲，血腥的奴隶贸易一直延续到十九世纪。几百年里，非洲因贩卖奴隶而损失了一亿五千万人口，西方殖民国家，特别是美帝国主义却依靠掠夺和剥削黑人奴隶而发达起来。"},{"type":"paragraph","text":"据美国著名黑人学者杜波依斯的研究，几百年来，先后从非洲运到美洲的奴隶大约有一千五百万。现在居住在南北美洲的三千四百多万黑人和一千八百万黑白混血种人，就是非洲黑人奴隶的后裔。当时，美国是最大的奴隶市场，美国的开发在很大程度上是依靠黑人奴隶劳动的。在那里，奴隶们被迫为种植园主从事牛马般的繁重劳动，许多州的议会通过法律，把黑人定为终身奴隶，并把他们列为“畜牲、农具、家具、餐具”一类可以自由买卖的商品。 一八六一年，美国南、北方因为黑奴问题引起了一场内战。内战结束后，美国国会修改了宪法，规定各州永远废除奴隶制度。但是实际上，广大的黑人仍然处于被奴役、被压迫和受歧视的地位。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8321642b75"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
