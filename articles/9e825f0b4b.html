"dates":[{"year":1971,"month":5,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"抗议垄断资本残酷剥削"},{"type":"paragraph","text":"法国广大工人参加“行动日”活动"},{"type":"paragraph","text":"新华社巴黎二十八日电  数百万法国劳动者二十七日参加了“行动日”活动，他们分别停工一刻钟到二十四小时，上街游行示威或举行集会，抗议垄断资本的残酷剥削，要求把退休年龄从六十五岁改为六十岁，并且增加退休工人的养老金。"},{"type":"paragraph","text":"在巴黎地区，数十万劳动者参加了“行动日”的活动。各行各业的约五万名劳动者，其中包括护士、出租汽车司机、印刷工人、商店雇员、电气技工等等，都在巴黎市中心举行了示威游行。"},{"type":"paragraph","text":"二十六日在诺尔省和加来海峡省，有二十二万劳动者停工。二十七日，在罗纳省有十二万人、索恩—卢瓦尔省有六万人、上来因省有两万人、卢瓦尔省有八万人参加了“行动日”的活动。"},{"type":"paragraph","text":"据新华社二十八日讯由于法国报纸行业的印刷工人举行了全国规模的二十四小时总罢工，法国的所有报纸在二十七日全部被迫停刊。"},{"type":"paragraph","text":"这次罢工是从二十六日中午开始的。罢工工人们要求缩短每周的工作时间，保障工人的工作安全，要求把退休年龄从六十五岁改为六十岁和增加退休工人的养老金。同一天，法新社的职工也举行了罢工，使得法新社的电讯受到影响。为支持印刷工人的斗争，洛林的九千名铁矿工人也举行了二十四小时罢工。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9e825f0b4b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
