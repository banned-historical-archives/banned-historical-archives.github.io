script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"“奴隶总管”的丑态","authors":["李亚宏"],"dates":[{"year":1977,"month":1,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"(江青黑话:“当工人、当农民，不费脑筋，整天劳动。”——一九七六年八月在天津手表厂的讲话)"},{"type":"paragraph","text":"“人民，只有人民，才是创造世界历史的动力。”“群众是真正的英雄”。这是历史唯物主义的基本原理，也是毛主席一贯的教导。在毛主席和共产党的英明领导下，我国工人阶级、贫下中农和广大劳动人民，他们干手中活，想天下事，为全人类的彻底解放，实现共产主义而努力地学习，积极投入上层建筑领域的社会主义革命，坚持“抓革命，促生产”，创造了一个又一个的人间奇迹。他们是推动我国社会前进的根本动力，是我们国家的主人。但是，在白骨精江青看来却不然，工人只知道整天做工，农民只知道整天种地，是一群不用脑筋，没有思想，什么知识也没有的浑浑噩噩的庸人。这同林彪污蔑人民群众只知道“恭喜发财”，“只关心油盐酱醋柴”的谰言，何其相似乃尔。江青胡说什么工人农民“不费脑筋，整天劳动”，是她否定人民群众的作用，自诩为“救世主”的历史唯心主义世界观的大暴露。"},{"type":"paragraph","text":"江青宣扬“上智下愚”的唯心史观，是为其篡党夺权制造反革命舆论。既然工人、农民只会“不费脑筋，整天劳动”，是一群“愚氓”，那么象江青这样的“大人物”，“高贵者”，理所当然地是“奴隶总管”，是“女皇”。其罪恶用心昭然若揭。但是，江青逆历史潮流而动，与广大工农群众为敌，这就决定了她的下场必然失败，历史已无情地证明了这一点。"},{"type":"paragraph","text":"(上海市公安局消防总队　李亚宏)"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"江青","type":"人物"},{"name":"夺权","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"19f5bef463"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
