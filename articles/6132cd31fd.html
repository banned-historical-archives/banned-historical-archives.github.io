thors":[],"dates":[{"year":1958,"month":1,"day":6}],"is_range_date":false,"parts":[{"text":"县级机关和中小学在整风运动中发生死人事件——锦州地委通报各地避免类似事件继续发生","type":"title"},{"text":"整风运动进入辩论阶段以后，凌源等县曾发生过死人现象。最近又有：建平县业柏寿镇完小教师乔顺华于一月二日割脖子自杀；黑山县财贸训练班学员王臣于五七年十二月二十九日上吊自杀；建昌一中教员刘栋才于五七年十二月二十八日上吊自杀；义县雹神庙乡小学教员李芳廷于五七年十二月三十一日投井自杀（急救未遂）。","type":"paragraph"},{"text":"地委认为上述事件，应引起各县（旗）委严加注意。据了解，这些人多系历史上有问题，思想有顾虑，加之斗争方法缺乏策略而引起的。应向群众反复交代整风运动的目的、意义和政策，认真坚持摆事实、讲道理的斗争方法，防止简单粗暴，避免类似事件的继续发生。","type":"paragraph"}],"comments":[],"origin":"锦州地委一月六日通报,转载于《辽宁整风简报》第82期（1958年1月15日）。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6132cd31fd"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
