es":[{"year":1948,"month":9,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"东北某部党委召开扩大会议"},{"type":"paragraph","text":"检查无政府无纪律思想"},{"type":"paragraph","text":"【新华社东北二十二日电】中共中央为了统一党的行动，反对党内无组织无纪律状态所进行的斗争，在东北人民解放军前线某部中展开了。该部党委会于日前召开扩大会议，决定在该部各级领导中进行从上而下的思想检查，以纠正目前存在着的某些无组织无纪律状态。会上，党委首先检讨自党中央提出反对无政府无纪律状态，强调集中统一，及发表关于南共问题的决议以来，该部虽对各级干部进行了传达，在各种会议上进行了一些宣传教育；但领导机关始终未把这一带有全党性的思想建设问题提高到中心环节的地位，拿出一定时间来组织自上而下的思想检讨，全力展开思想斗争。这是把中央的一些重要指示停留在口头宣传上，是一种极无纪律的具体表现。党委继即指出该部无组织无纪律状态的具体表现，一方面是：一般干部对党的政策、上级指示缺乏研究，存在着粗枝大叶不求甚解的习惯，及某些单纯军事观点、军纪松懈、制度紊乱等；另一方面是：各级干部未能把对上级作综合报告看成是组织观念和纪律问题。他们对于向上级反映全面情况，以便使上级能适时作出各种指示和及时纠正缺点，使工作不犯或少犯错误的巨大重要性认识不够，以为只要按照上级所指示的去作，不报告也没关系，或以不会写综合报告作借口，有的并存在着“宁少报，不报错”的想法。他们又往往只是在上级严格督促下才急于应付，以至经常发生只报告经过，缺乏分析或总结，甚至只报告开始不报告结果等等毛病。产生这些毛病的客观原因，除干部能力弱外，还在于领导机关对情况不作深入的调查研究致对，下级的指示、计划考虑不细致，工作多，中心不明确，对工作要求不严，发生问题不能及时追究，缺乏严格的工作纪律。因此，该部党委号召各级干部深入工作，对上级多作综合报告，并特别决定在部队中展开反对无政府无纪律状态及各种恶劣作风的思想斗争，联系执行政策、制度、军纪的情形作深入的检查。检查重点放在团以上党委及主要干部与机关部门，开展严格的批评与自我批评，揭发无政府无纪律的现象与领导方法的缺点。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"312f53f334"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
