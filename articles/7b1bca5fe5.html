<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"抓住当前阶级斗争的新动向　狠狠打击资本主义歪风邪气市百一店掀起批判资产阶级新高潮许多革命群众说得好:大批判搞得透，在资产阶级糖弹面前不转向，大批判搞得深，脚跟才能站得稳。","authors":[],"dates":[{"year":1969,"month":7,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　上海市第一百货商店广大革命群众在工宣队、军宣队和革委会领导下，在学习“九大”文献，落实各项无产阶级政策中，遵照毛主席“要批判资产阶级”的教导，高举毛泽东思想伟大红旗，狠批资产阶级，掀起革命大批判的新高潮。"},{"type":"paragraph","text":"上海市第一百货商店是全市最大的一家国营百货商店。一九五六年，党对资本主义工商业进行社会主义改造前后，陆续吸收进一批资本家。十多年来，在无产阶级专政条件下，多数资本家被迫接受改造。但是，正如伟大领袖毛主席指出的:“资产阶级还是存在”，“无产阶级和资产阶级之间在意识形态方面的阶级斗争，还是长时期的，曲折的，有时甚至是很激烈的”。这个商店的有些资本家身在社会主义商店，心向资本主义。广大革命群众回顾商店的阶级斗争历史，无产阶级同资产阶级之间的斗争一天也没有停止过。"},{"type":"paragraph","text":"无产阶级文化大革命以来，该店革命群众紧跟毛主席的伟大战略部署，曾多次批判了刘少奇的“阶级斗争熄灭论”、“剥削有功论”，并批判了资产阶级妄图复辟的变天思想、腐朽的资产阶级人生观和唯利是图的资本主义经营思想和经营作风。最近，正当商店广大革命群众深入学习“九大”文献，落实各项无产阶级政策的时候，有些资本家以为“气候有点变了”，“现在只讲团结，不讲改造、批判了”。有的否认自己有剥削罪行，有的不承认自己是资本家，有的用小恩小惠笼络群众，有的公开煽动无政府主义、经济主义，有的拿商品去“开后门”。针对这种情况，各个部门都普遍开展批判活动，人人口诛笔伐，把资本主义邪风煞下去。"},{"type":"paragraph","text":"市百一店革命大批判的特点是抓住当前阶级斗争的新动向，联系解放以来资产阶级抗拒改造的种种表现，揭露资产阶级的丑恶本质，挂上他们的黑主子，反复狠批刘少奇的“阶级斗争熄灭论”和“剥削有功论”。如有些资本家以小恩小惠笼络群众，革命群众将他们这些活动和过去腐蚀群众的手法联系起来进行批判，工宣队员、老店员揭发旧社会资本家如何残酷剥削群众和学徒，使大家进一步看清了资产阶级的本质。老店员说，资本家剥削门槛精，象三十六档算盘，现在怎么变得这样大方，我们要辨一辨，不要上糖衣炮弹的当。有个资本家说“我开店时，自己只拿工钱，不分红”，标榜他开明，剥削少，妄图以此迷惑群众。老店员尖锐地揭发说:“你不分红，赚下来的钱全部进你腰包，说明你剥削手段更狡猾。”揭穿了这个资本家不分红是假，多剥削是真的丑恶嘴脸。"},{"type":"paragraph","text":"全店在部组批判的基础上召开了多次批判大会，对反动资本家进行批斗。有个资本家过去剥削群众手段狠毒奸刁，搞资本主义一套非常精明。进市百一店后，他经常在青年中宣扬吃喝玩乐的资产阶级人生哲学，大唱“今不如昔”滥调，贪污盗窃，屡教不改；在文化大革命期间上窜下跳，反攻倒算，招摇撞骗，至今认罪态度很差。革命群众对他的罪行作了充分揭露和斗争，各部门还纷纷出大批判专栏，批判资产阶级的反动思想。"},{"type":"paragraph","text":"革命大批判的深入开展，使广大革命群众受到深刻教育。许多青年在大批判中听了老工人、老店员对资产阶级本质的揭露，深有感受地说:“我们不知道这些人的过去，表面看‘蛮卖力’，以为这些人‘老实了’，现在懂得他们的阶级本性是不会变的。”有一个青年过去跟资本家吃吃喝喝，现在认识到自己在吃喝中不知不觉受了毒:越跟资本家一起吃喝，对工作越没劲，对工资待遇越不满足。他深刻认识到，资产阶级和无产阶级在争夺青年，不批判资产阶级，青年就有被拉过去的危险。许多革命群众说得好:大批判搞得透，在资产阶级糖弹面前不转向，大批判搞得深，脚跟才能站得稳。他们还说:只有对资产阶级反动思想经常不断开展批判，才能有效的改造资产阶级分子。"},{"type":"paragraph","text":"(市百一店工宣队、军宣队、革委会)"},{"type":"paragraph","text":"\u003cIMG alt=请插入5号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1969\\07\\697j010301.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e上海市第一百货商店广大革命群众，在工宣队、军宣队和革委会领导下，在学习“九大”文献、落实各项无产阶级政策中，遵照毛主席“要批判资产阶级”的教导，高举革命批判的大旗，狠批资产阶级。　本报记者摄\u003c/FONT\u003e"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7b1bca5fe5"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
