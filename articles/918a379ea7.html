hors":["徐景贤"],"dates":[{"year":1968,"month":1,"day":2}],"is_range_date":false,"parts":[{"text":"徐景贤在上海市革委会扩大会议上的讲话摘要","type":"title"},{"text":"徐景贤","type":"authors"},{"text":"元旦社论是全面的，《人民日报》、《红旗》杂志、《解放军报》六八年的任务是根据毛主席的最新指示写的，要求各级委员会、革命组织，进行大学习，在一月份全面落实学习毛主席最新指示，元旦社论是毛主席新的动员令，要按照元旦社论去布置工作。要我们排除干扰，我们要抓住中心环节就可以前进。二点意见：一、仍要继续大办毛主席著作学习班，以毛主席最新指示、元旦社论，建党路线，用四对照办法学习，除此之外，在基层中要抓群众性的学习，暂为一个月。最近随便封组织，随便抄家，游街，还有……这是不行的，是后退之表现。二、整顿党的组织，加强党的建设问题：(1)已经提到六八年的议事日程上来了，上海的无产阶级文化大革命，整顿党的组织，加强党的建设是一项重大的工作，在学习中要把建党整党作为重要内容，不能为全年之外，不能搞一个段落，要为召开“九大”打下思想基础，要把大批判大学习深入下去，可以专题调查，三十一日报纸登过。开展专题调查是最好的大学习、大批判战场。(2)除继续搞大学习大批判之外，还要继续搞本本，目前还是不够的，这些工作要和群众运动结合起来。(3)恢复党的组织生活与整党建党组织问题，不是那一天上面宣布一下，简单地加以组织上已恢复，而是思想已站到毛主席的革命路线上来，逐步恢复活动。在基层建立党的核心组织，还要搞群众运动，听取群众意见，这不是全民党，各级革命委员会，可以提出名单来。下级建立党的核心组，但还是要批。各级革委会要抓重点，要典型试验，到底怎样建立核心组和恢复组织生活，要全面规划，典型试验。对共青团、红卫兵和革命组织也要加以整顿建设，社论中提到要打倒资产阶级小资产阶级派性(本来提克服小资产阶级派性)，这一点要很好的考虑考虑。中央负责同志讲，派性好象一条毒蛇，绕上就可以被绞死，无论如何要注意。","type":"paragraph"}],"comments":[],"origin":"周良霄、顾菊英编《疯狂、扭曲与堕落的年代》之二——《十年文革中首长讲话传信录》, 2009。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"徐景贤","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"派性","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]},{"id":"chuanxinlu3","name":"十年文革中首长讲话传信录（下册）","internal":false,"type":"pdf","official":false,"author":"周良霄,顾菊英","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/十年文革中首长讲话传信录3.pdf"],"article":{"title":"徐景贤在上海市革委会扩大会议上的讲话摘要","parts":[{"type":"title","text":"1029．徐景贤在上海市革委会扩大会议上的讲话摘要"},{"type":"paragraph","text":"(1968年1月2日)"},{"type":"paragraph","text":"元旦社论是全面的，《人民日报》、《红旗》杂志、《解放军报》六八年的任务是根据毛主席的最新指示写的，要求各级委员会、革命组织，进行大学习，在一月份全面落实学习毛主席最新指示，元旦社论是毛主席新的动员令，要按照元旦社论去布置工作。要我们排除干扰，我们要抓住中心环节就可以前进。二点意见：一、仍要继续大办毛主席著作学习班，以毛主席最新指示、元旦社论，建党路线，用四对照办法学习，除此之外，在基层中要抓群众性的学习，暂为一个月。最近随便封组织，随便抄家，游街，还有......这是不行的，是后退之表现。二、整顿党的组织，加强党的建设问题：(1)已经提到六八年的议事日
