authors":[],"dates":[{"year":1951,"month":4,"day":24}],"is_range_date":false,"parts":[{"text":"芜湖各阶层对镇压反革命的反映","type":"title"},{"text":"【皖南记者组四月二十四日讯】芜湖广大人民对公安局逮捕反革命分子一举热烈拥护，但仍有一小部分人存在一些糊涂思想和不安情绪。民主党派中有人说：“从前政府说宽大，叫策动登记，现在又逮捕了”，并认为逮捕反革命分子会引起社会上的不安。过去或多或少违犯过人民利益的人，感到恐惧和不安，怕被抓起来。有的留用人员觉得过去自己作了些坏事情，今天亦大喊大叫镇压反革命分子，感到有些惭愧和惶恐；有的还有兔死狐悲之感。工商界中积极赞助政府镇压反革命的进步人士不多，很多人对此漠不关心。现在工商界中较普遍地存在一种不正确的思想，他们认为：“怙恶不悛的反革命分子可杀，但恶霸分子不可杀。”并且认为：“应着重解放后的罪恶，解放前的旧账不要翻。”","type":"paragraph"}],"comments":[],"origin":"1951年5月2日新华通讯社编《内部参考》。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3f0b7fb649"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
