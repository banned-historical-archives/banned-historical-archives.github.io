script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"7f1148c2-92d9-4fcf-987d-99f144e1a069","name":"红旗一九六五年第十一期","internal":false,"official":true,"type":"pdf","author":"《红旗》杂志编辑部","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives2/main/7f1148c2-92d9-4fcf-987d-99f144e1a069.pdf"],"article":{"title":"江城子·赠边防战士","alias":"","parts":[{"type":"paragraph","text":"棒，嘉尘上，陷泥塘。，宣忍让，舌如簧，愿难偿。大宇东风旺，无遮挡，任飞扬。争解放，坚方向，锐锋。何世人闻，虎豹容来往？众志金。教红旗遍地，万国换新装，日月重光。"},{"type":"paragraph","text":"梅花引"},{"type":"paragraph","text":"印度尼西亚退出联合国"},{"type":"paragraph","text":"夸强大，称王霸，可知今日天下？血腥旗，臭污泥，豺狼当道蒙着破羊皮。滔天罪恶何胜计，强篮堂皇亡义。早穷途，笑狂奴，犹抱神牌当作护身符。一叶落，催索。天马行空竞家廓。酌琼浆，舞装，东风如意百鸟"},{"type":"paragraph","text":"唱春光。春光先照英雄汉，捷报驰花烂漫。挽长弓，射套龙，倒海排山指日，定雌雄。"},{"type":"paragraph","text":"梅花引夺印"},{"type":"paragraph","text":"领袖语，牢记取，百年大计争基础。背行囊，带干粮，眉飞色舞队队下乡忙。当年八路今重到，共苦同甘群众靠。万重山，不为难，不插红旗定是不回"},{"type":"paragraph","text":"社藏鼠，欺，不爱贫农爱地主。话连篇，表三千，偷梁换柱黑网还。结奸缘。人间自有青霜剑，慧眼何愁形善变？起群雄，灭阴风，还我河山长作主人翁。"},{"type":"paragraph","text":"江城子"},{"type":"paragraph","text":"赠边防战士"},{"type":"paragraph","text":"[二首]少年心愿在天边。别家园，度重关，南北东西多少好河山！为保金瓯不"},{"type":"paragraph","text":"远征才觉道途欢。北风赛，有何于，雪地冰天为我破：鞋踏烂，不辞难。"},{"type":"paragraph","text":"杠旗杂志·36·（总558)鞋朱颠。背上枪枝登哨所，千丈壁，起炊烟。"},{"type":"paragraph","text":"其"},{"type":"paragraph","text":"1练兵塞上好风光。号声忙，踏严霜，猎猎军旗天际看飞扬。待到刺刀拼过"},{"type":"paragraph","text":"墙头大字写琳琅。报爹娘，放心肠，多少英姿年少了，挥汗水，对朝阳。事戎行。大海航行歌四起，营地乐，胜家乡。"},{"type":"paragraph","text":"小重山"},{"type":"paragraph","text":"赠海岛战士"},{"type":"paragraph","text":"万顷狂涛拍岸腾。食背伴我？蒲天星。海风撼树欲相惊。劳梦想，铁汉岂虚名？"},{"type":"paragraph","text":"入伍记丁宁：田园铺锦绣，仗于城。江山望断睡无声。千百岛，炳炯有双睛。"},{"type":"paragraph","text":"定风波"},{"type":"paragraph","text":"祝捷"},{"type":"paragraph","text":"[二首]一、我东海渔民民兵配合海审航空兵部队活捉美制蒋机驶员（一九六四"},{"type":"paragraph","text":"年十二月十八口）"},{"type":"paragraph","text":"种得沧波万顷田，生涯都在捕鱼船。风张常经如坦道，非傲：海防还欲共先鞭。"},{"type":"paragraph","text":"意气终教身手现群燕，水天双奏凯歌还。七亿能劳又能武，千古，会见此铁江山！"},{"type":"paragraph","text":"二、我空审和我海写航空乓部队多次击落美蒋人侵飞机"},{"type":"paragraph","text":"赤县于今有领空，蓝天一望羡乘风。银翼来又去，天女，仙梭铁锦任西东。"},{"type":"paragraph","text":"飞盗夸能漏网？休想：铜墙铁壁九霄中。花样翻新方得意，涂地健儿竞报立奇功。"}],"authors":["胡乔木"],"dates":[{"year":1965}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":38,"page_end":39},"tags":[{"name":"胡乔木","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b4d4514f8e"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
