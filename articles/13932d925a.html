ical-archives/banned-historical-archives8/main/maoquanji24.pdf"],"article":{"title":"到锦州前线指挥作战应保障安全","alias":"","parts":[{"type":"paragraph","text":"到锦州前线指挥作战应保障安全！"},{"type":"paragraph","text":"（1948年10月6日）林、罗、刘："},{"type":"paragraph","text":"四日九时电悉。（一）你们到锦州附近指挥甚好。但你们不应距城太近，应在距城较远之处以电话能联络各城兵团即妥，务求保障安全。另设攻城直接指挥所，委托适当人员，秉承你们意旨，迫近城垣指挥（亦不要太近）。（二）国民党统治机构全般慌乱，一切战场处于被动，士气一般下降，望鼓励全军将士奋勇杀敌，争取大胜。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"六日二时"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军委起草的给东北野战军司令员林彪、政治委员罗荣桓和参谋长刘亚楼的电报。"},{"type":"paragraph","text":"[2]指1948年10月4日9时林彪、罗荣桓和刘亚楼给中共中央军委并中共中央东北局的电报。电报说：“我们已于今晨到达阜新，拟于今晚出发，继续前进到锦州附近指挥，我担任攻锦后续部队，正向锦州前进中，约五日后可到齐。”"}],"authors":["毛泽东"],"dates":[{"year":1948,"month":10,"day":6}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":530,"page_end":530},"tags":[{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"13932d925a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
