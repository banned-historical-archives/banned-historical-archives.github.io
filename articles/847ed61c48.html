" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中央宣传部关于党报批评同级党委问题给广西省委宣传部的复示","authors":[],"dates":[{"year":1953,"month":3}],"is_range_date":false,"parts":[{"text":"中央宣传部关于党报批评同级党委问题给广西省委宣传部的复示","type":"title"},{"text":"关于宜山农民报在报纸上批评宜山地委一事，我们认为广西省委宣传部的意见是正确的。党报是党委会的机关报，党报编辑部无权以报纸与党委会对立。党报编辑部如有不同的意见，它可在自己权限内向党委会提出，必要时并可向上级党委、上级党报直至中央提出，但不经请示不能擅自在报纸上批评党委会，或利用报纸来进行自己与党委会的争论，这是一种脱离党委领导的作法，也是一种严重的无组织无纪律现象。党委会如犯了错误，应由党委会用自己的名义在报纸上进行自我批评。报纸编辑部的责任是：一方面不应在报纸上重复这种错误，另一方面可在自己权限内向党委会直至上级党组织揭发这些错误。报纸编辑部即在上述情况下亦无权以报纸与党委会对立。这是党报在其和党委会的关系中必须遵行的原则。","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"847ed61c48"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
