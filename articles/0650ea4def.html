ical-archives/banned-historical-archives0/main/maoquanji43.pdf"],"article":{"title":"对金门蒋军向我炮击的处置意见的批语","alias":"","parts":[{"type":"paragraph","text":"对金门蒋车向我炮击的"},{"type":"paragraph","text":"处置意见的批语\""},{"type":"paragraph","text":"（1960年8月7日）照办。2"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"八月七日"},{"type":"paragraph","text":"[1]这是毛泽东对中共中央军委秘书长、中国人民解放军总参谋长、国务院副总理罗瑞卿1960年8月5日报告的批语。"},{"type":"paragraph","text":"[2]罗瑞卿的报告汇报了金门国民党军在一段时间内向我炮击的情况，并提出四点意见：（一）立即加强侦察措施，进一步查明敌人这一炮击的企图。（二）对敌人的零星炮击，我可暂不置理。（三）如敌继续打炮，对我造成危害，我即考虑采取压制或惩罚性的炮击，但这种炮击，应报中央军委决定。（四）不管敌人的炮击企图如何，我厦门前线部队均应适当加以戒备。"}],"authors":["毛泽东"],"dates":[{"year":1960,"month":8,"day":7}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":463,"page_end":463},"tags":[{"name":"毛泽东","type":"人物"},{"name":"罗瑞卿","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0650ea4def"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
