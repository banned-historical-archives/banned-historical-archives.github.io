","authors":[],"dates":[{"year":1967,"month":6,"day":12}],"is_range_date":false,"parts":[{"text":"谢富治接见北航红旗韩爱晶、井冈山等人时的讲话（摘录）","type":"title"},{"text":"对聂元梓这次批评，还是爱护她。红代会核心组要扩大到十五人","type":"paragraph"},{"text":"（参加市革委会的十四名委员，加上财经八·八）王大宾要当核心组副组长。把北大、矿院、轻工开除核心组是不对的。红卫兵编辑部也要加人。抢印，利用多数压人都不对，我们党从来不用这一套，要努力学习毛主席著作。对高校两派，你们两边都要做工作，但不要陷进去，陷进去就没有发言权。你们要做思想工作，一家一家地做，先去地质、师大，问问他们，这样搞下去会搞出什么名堂。事情不见得几天就能解决，但是还是应该做工作。蒯大富革命性很强，就是不大稳。","type":"paragraph"}],"comments":[],"origin":"《北京大学文革资料选编（下）》，美国华忆出版社，2020。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"谢富治","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"25a26f08ac"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
