二月综合报告的批语","authors":["毛泽东"],"dates":[{"year":1951,"month":1,"day":24}],"is_range_date":false,"parts":[{"text":"毛泽东转发邓小平关于西南局十一、十二月综合报告的批语","type":"title"},{"text":"毛泽东","type":"authors"},{"text":"漱石，子恢，剑英，仲勋，一波，高岗同志：","type":"appellation"},{"text":"兹将邓小平同志一月八日的报告转给你们，可以看出西南工作的概况。其中提到西南已开了一次城市工作会议，着重地批判了党内较为普遍的看不起工人的思想，明确依靠工人阶级应成为党的指导思想，应把它贯彻到各项工作各个部门中去等语。现在华东、中南、西北各区正处土改和镇压反革命等项工作的高潮，许多同志当然很忙，但请你们考虑， 腾出一段时间，在五月一日以前，召开一次城市工作会议，着重地研究和解决依靠工人阶级的思想问题，工厂管理问题，工会工作问题，为四中全会讨论这个问题准备意见。四中全会拟在五月召开，请你们按照这个时间部署工作。","type":"paragraph"},{"text":" 毛泽东一月廿四日","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2ddc985eb1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
