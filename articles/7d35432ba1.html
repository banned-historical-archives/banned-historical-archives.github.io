顾杏娣介绍学习经验","authors":[],"dates":[{"year":1967,"month":10,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　昨天下午，工总司系统的革命群众组织举行了“上海市无产阶级革命派紧跟毛主席伟大战略部署，‘斗私，批修’，活学活用毛主席著作讲用会”，请江苏省太仓县沙溪公社洪泾大队贫下中农活学活用毛主席著作讲演团介绍了学习经验。到会的无产阶级革命派和革命群众，一致表示要学习洪泾大队贫下中农活学活用毛主席著作的经验，紧跟毛主席的伟大战略部署，作斗私的模范，批修的闯将。"},{"type":"paragraph","text":"太仓县洪泾大队，是学习毛主席著作的先进集体。这次洪泾大队贫下中农活学活用毛主席著作讲演团，是应上海工总司等革命群众组织邀请来上海和上海的无产阶级革命派、人民解放军、革命干部交流活学活用毛主席著作学习心得的。讲演团已在浦东地区部分工厂和本市文艺宣传系统举办的讲用会上介绍了经验。"},{"type":"paragraph","text":"在昨天的大会上，洪泾大队活学活用毛主席著作标兵顾阿桃老妈妈介绍了活学活用毛主席著作的心得和体会。她说，伟大领袖毛主席最近指示我伲，要斗私，批修。“斗私，批修”四个字金光闪闪，象一盏指路明灯，照亮了我伲前进的方向。“私”字是百病的总根子，是修正主义的总根子，只有拔掉脑子里“私”字的根子，才能拔掉修正主义的老根。“私”字勿斗倒，个人要变“修”，“修”字不批倒，国家要变颜色。我们一定要高举毛泽东思想伟大红旗，狠斗“私”字，狠批修正主义，大树特树毛泽东思想的绝对权威，做一个彻底的革命派，永远跟着毛主席闹革命。在会上发言的还有顾杏娣老妈妈。她们的发言，受到了到会同志的热烈欢迎。"},{"type":"paragraph","text":"先锋电机厂、一○一厂、第四制药厂无产阶级革命派的代表都在会上表示，坚决响应毛主席要斗私，批修的伟大号召，在两个阶级、两条道路、两条路线的斗争中狠触灵魂，狠斗“私”字，努力改造世界观，彻底铲除“私”字，批倒修正主义，要使无产阶级红色江山千秋万代永不变色。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"上海市工人革命造反总司令部（工总司）","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7d35432ba1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
