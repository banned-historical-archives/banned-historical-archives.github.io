ical-archives/banned-historical-archives0/main/maoquanji30.pdf"],"article":{"title":"关于发布惩治反革命条例和审判反革命罪犯的批语","alias":"","parts":[{"type":"paragraph","text":"关于发布惩治反革命条例和审判反革命罪犯的批语!!"},{"type":"paragraph","text":"（1951年1月28日）刘、周、陈、彭真同志："},{"type":"paragraph","text":"此件?关涉军事及法院权限，应由中央人民政府委员会开一次会通过，并用主席名义公布。事前召集政协常委及政府委员，法院，司法部，检察署，公安部人员开一次座谈会取得同意；在此次会上，应有人报告最近时期镇压反革命的情况。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一月廿八日"},{"type":"paragraph","text":"[1]这是毛泽东在刘少奇关于惩治反革命条例起草中的几个问题的来信上的两条批语。第二条批语是针对刘少奇信中的一句话而写的，这句话是“审判反革命罪犯仍以照现在办法归各地军事法庭为好”。"},{"type":"paragraph","text":"[2]刘，指刘少奇。周，指周恩来。陈，指陈云，当时任中共中央书记处书记、政务院副总理。彭真，当时任中共中央书记处候补书记、政务院政治法律委员会副主任。"},{"type":"paragraph","text":"[3]指中华人民共和国惩治反革命条例（修正草案）。1951年2月21日，中央人民政府主席毛泽东发布命令，正式公布了这个条例。关于发布惩治反革命条例和审判反革命罪犯的批语"},{"type":"paragraph","text":"二在军管时期应当如此。"}],"authors":["毛泽东"],"dates":[{"year":1951,"month":1,"day":28}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":78,"page_end":79},"tags":[{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"彭真","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1823c1d5c3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
