uthors":["中国青年报江西记者站"],"dates":[{"year":1957,"month":8,"day":16}],"is_range_date":false,"parts":[{"text":"南昌十五所中等学校上千教师乘胜追击右派分子","type":"title"},{"text":"中国青年报江西记者站","type":"authors"},{"text":"本报讯  南昌市十五所中等学校已全面展开反击右派的斗争。","type":"paragraph"},{"text":"南昌第一中学右派分子赵则平在整风初期妄图把火点到基层去，并煽动学生闹事。他说新中国的教育制度不如国民党教育制度好，并别有用心把南昌教育工作概括为：“人未尽其材，领导未尽其职”等八个“未尽”。这个右派原来参加过国民党、三青团和CC组织，曾做过国民党的情报工作，做过国民党的“民国日报”等四家反动报纸的总编辑和社长，是一贯反党的阶级敌人。","type":"paragraph"},{"text":"右派谬论遭到广大教师迎头痛击，有的右派已低头认罪，现在上千名教师正乘胜追击中。","type":"paragraph"},{"text":" 来源：《中国青年报》1957年8月16日。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2d45ba5acb"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
