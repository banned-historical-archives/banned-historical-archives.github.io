作事件多起","authors":[],"dates":[{"year":1955,"month":5,"day":30}],"is_range_date":false,"parts":[{"text":"山西省发现坏分子破坏整顿粮食统销工作事件多起","type":"title"},{"text":"【山西分社五月三十日讯】山西省最近发现坏分子煽动群众破坏整顿粮食统销工作事件多起。","type":"appellation"},{"text":"五月十四日，崞县大芳乡基点工作组开会时，忽有一百四十多人冲入院内质问工作组：为啥不给粮食？随即殴打了中共崞县委员会宣传部干部张顺德，并将张顺德绑起来，逼使群众盖手印联名把张顺德送县处理。途中遇公安局和兵役局局长始解围。","type":"paragraph"},{"text":"交城县五楼庄村开会讨论缺粮户问题时，被坏份子把持会场。扬言村中缺粮是村主任武植宏所造成，煽动会场群众八十多人把武家门窗打毁，又到乡政府去闹。该村党、团员、积极分子都躲到村外，不敢回家。保德县碾橡乡富农分子王二巴指使三十户农民每天到乡政府要粮，还煽动十七个煤窑工人罢工数日。静乐县坏分子竟用黑板报发动群众与政府要粮。文水县武陵乡发现污蔑领袖的标语。","type":"paragraph"},{"text":" （杨义）","type":"paragraph"}],"comments":[],"origin":"新华社《内部参考》1955年6月4日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cb27ed0d08"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
