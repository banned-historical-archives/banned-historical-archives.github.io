uthors":[],"dates":[{"year":1976,"month":6,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　日前，本报编辑部召开了工交、财贸、科技战线的工人通讯员大会。来自工厂、码头、商店、机关和科研设计单位的几百名通讯员欢聚一堂，热情赞颂无产阶级文化大革命使新闻战线“旧貌变新颜”的大好形势，共同交流工农兵通讯员坚持评报、积极参加办好党报的心得体会，大家决心以实际行动跟邓小平的修正主义路线对着干，当好无产阶级报纸的主人，和报社的同志一起，把新闻革命进行到底。"},{"type":"paragraph","text":"六月十五日，《人民日报》发表了《新闻战线上的新生事物——赞工农兵评报》的重要报道，在本市广大工农兵通讯员中引起了强烈反响。许多通讯员同志读了一遍又一遍，感到特别亲切。本报不少通讯　组纷纷开展活动，认真学习这篇报道，联系思想，谈认识，找差距，订措施。大家满怀对毛主席的无产阶级新闻路线的深厚感情，十分高兴地谈到，是伟大的无产阶级文化大革命打开了报社的大门，工农兵占领了新闻阵地，改变了旧《文汇报》那种“谈笑有鸿儒，往来无白丁”的沉闷局面。一大批手上有油污，脚下有污泥，扎根基层，密切联系群众的工农兵通讯员、土记者，以无产阶级报纸的主人身份，积极为革命大造舆论，经常给报社反映情况、写稿、评报。许多通讯员同志学习了《新闻战线上的新生事物》一文后，都表示要向首都的工农兵学习，更加自觉地为捍卫毛主席的无产阶级新闻路线而战斗。要经常关心报纸，把评报当作参加办报的重要内容。一些通讯组还认真总结了坚持评报的经验，他们把评报列为通讯组活动的重要内容之一。有的不仅坚持定期评报，还注意深入班组，听取工人群众对报纸的意见，然后集体讨论，归纳整理，及时提供给报社。在通讯员大会上发言的工人通讯员激动地说:今天，工农兵成了报纸的主人，参加了新闻战线的斗、批、改。我们要以马列主义、毛泽东思想为武器，管好报纸的方向、路线，使党报这个重要的舆论工具，牢牢地掌握在无产阶级手中，使它永远成为无产阶级对资产阶级实行全面专政的工具。发言的通讯员还表示决心，要以实际行动批驳那种认为工农兵评报“搞不好”、“长不了”的错误论调，坚持开展评报活动，更加积极地发挥工农兵通讯员的战斗作用。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a841101a19"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
