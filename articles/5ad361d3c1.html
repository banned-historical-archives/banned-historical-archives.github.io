ical-archives/banned-historical-archives0/main/maoquanji33.pdf"],"article":{"title":"接受民主德国驻华大使柯尼希呈递国书时的答词","alias":"","parts":[{"type":"paragraph","text":"接受民主德国驻华大使柯尼希"},{"type":"paragraph","text":"呈递国书时的答词"},{"type":"paragraph","text":"（1953年11月12日）大使同志："},{"type":"paragraph","text":"我很高兴地接受您所呈递的德意志民主共和国总统的国书，并衷心感谢您的祝贺。"},{"type":"paragraph","text":"四年来，中华人民共和国与德意志民主共和国之间的友好合作关系有了极大发展。在两国外交使团改为大使馆后，不但两国之间政治、经济、文化各方面的密切合作将更加增强，并且对于巩固以伟大苏联为首的和平、民主、社会主义阵营有着极大的意义。"},{"type":"paragraph","text":"德国人民在国家建设工作及争取和平的斗争中的重大成就，已使德意志民主共和国成为全德和平及民主力量的坚强堡垒和维护欧洲及世界和平的重要因素。我相信：在伟大苏联的援助下，在各人民民主国家及世界爱好和平人民的同情与支持下，德国人民为建立统一、独立、民主和爱好和平的德国的正义斗争，必将获得更大的胜利。在这一斗争中，德国人民将永远得到中国人民的全力的支持。"},{"type":"paragraph","text":"大使同志，我热烈地欢迎您出任德意志民主共和国驻中华人民共和国的特命全权大使。在您为巩固德中两国友好合作的工作中，您将得到我和中华人民共和国政府的全力支持。"},{"type":"paragraph","text":"我谨祝您在工作中获得完全的成功。"}],"authors":["毛泽东"],"dates":[{"year":1953,"month":11,"day":12}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":439,"page_end":439},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5ad361d3c1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
