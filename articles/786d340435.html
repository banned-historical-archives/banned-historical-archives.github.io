ical-archives/banned-historical-archives0/main/maoquanji44.pdf"],"article":{"title":"关于请朱德、陆定一参加南三区会议等问题的批语","alias":"","parts":[{"type":"paragraph","text":"关于请朱德、陆定一]参加南三区会议?等问题的批语"},{"type":"paragraph","text":"（1961年3月10日）陶铸同志："},{"type":"paragraph","text":"（一）请邀朱德、陆定一两同志参加我们的会；（二）陆定一同志在新会、花县两处参观后给我的信，请印发到会各同志。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"三月十日早上"},{"type":"paragraph","text":"二鲁言、田家英、陈、胡阅，退毛。[1]陆定一，当时任中共中央政治局候补委员、中央宣传部部长。"},{"type":"paragraph","text":"[2]指1961年3月10日至13日在广州举行的中南、西南、华东3个地区的大区和省市委负责人会议。"},{"type":"paragraph","text":"[3]陶铸，当时任中共中央中南局第一书记、广东省委第一书记。毛泽东全集第四十四卷"},{"type":"paragraph","text":"[4]指陆定一1961年2月27日关于参观新会县人民公社的情况和3月1日关于参观花县人民公社的情况写给毛泽东的两封信。第一封信说，23日在新会县同县委第一书记党向民座谈，主要想了解一下为什么我们的农村工作在过去一直都是顺利的，农业是增产的，到了人民公社的时候，却发生了一些问题。党向民说，人民公社以来，他感觉有三点不同：第一点，没有经过试点。过去，无论王改、互助组、低级社、高级社，都经过试点，试点时很谨慎，规模小。试点本身就是对群众很好的宣传。群众看到新办法比老办法更有利于生产，就自然而然地赞成新办法了。而人民公社没有经过过去那种试点过程，立即全面铺开，一哄而起。第二点，以前因为经过试点，中央规定的办法很具体。人民公社则不然，办法不具体，不细致，有的向题反复多次。第三点，过去管理制度规定得严密，人民公社的管理制度不严密。以上这些话，我认为是中肯的，它使我想到现在许多地方采取新的措施时，也务必稳妥一些，先试点，后推广。第二封信说，昨天去花县参观，才知道那里不仅3年来年年增产，而且全县6个公社，有3个公社坚持了以社有制为基础的试验。这种试验，近来很少听说了，但花县信心十足。看来，在人民公社运动中，信阳一类的地区是一个极端，花县一类的地区又是一个极端。一个坏极，一个好极。花县虽然不大，但其成功将有极大意义，横扫那些对人民公社运动的悲观情绪。"},{"type":"paragraph","text":"[5]鲁言，即廖鲁言，当时任中共中央农村工作部副部长、农业部部长。田家英，当时任中共中央政治研究室副主任、毛泽东的秘书。陈，指陈伯达，当时任中共中央政治局候补委员、中央政治研究室主任、中央农村工作部副部长、毛泽东的秘书。胡，指胡乔木，当时任中共中央书记处候补书记、毛泽东的秘书。"}],"authors":["毛泽东"],"dates":[{"year":1961,"month":3,"day":10}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":199,"page_end":200},"tags":[{"name":"陶铸","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"朱德","type":"人物"},{"name":"陆定一","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"786d340435"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
