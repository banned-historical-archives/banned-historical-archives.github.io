art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"新版《毛泽东选集》将印发全军","authors":["陈先义"],"parts":[{"type":"paragraph","text":"《毛泽东选集》一至四卷第二版出版的消息公布以后，在全军干部战士中引起强烈反响。为满足广大干部战士的需求，推动全军马列主义、毛泽东思想的学习，经军委、总政领导批准，由解放军出版社租用人民出版社纸型，将新版《毛泽东选集》一至四卷陆续印发全军。其中，《毛泽东选集》一至四卷第二版平装大32开本发军以上干部（含离退休干部）每人一套；平装小32开本发师团干部（含离退休干部、技术九级以上的专业技术干部）每人一套，营、连和相当于营、连的基层单位各一套。"},{"type":"paragraph","text":"记者近日采访了承担这次印刷任务的1201、1202、2207等工厂，为确保新版《毛泽东选集》能按时下发部队，广大工人在时间紧、任务急、纸张材料不足的情况下，正克服困难，日以继夜地连续苦战。工人师傅们表示：军委、总部首长把印刷新版《毛泽东选集》的任务交给我们，是对我们的信任，也是我们的光荣，我们要以最好的质量，保证按时完成任务。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"87d47f482a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
