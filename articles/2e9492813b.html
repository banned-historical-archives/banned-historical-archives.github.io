script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"社会主义农村的一支生力军  在抗大六队落户的三十三名知识青年，在贫下中农教育下，能生产，能练武，能批判资产阶级","authors":[],"dates":[{"year":1969,"month":12,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"社会主义农村的一支生力军"},{"type":"paragraph","text":"在抗大六队落户的三十三名知识青年，在贫下中农教育下，能生产，能练武，能批判资产阶级"},{"type":"paragraph","text":"从丹东一中来到辽宁省东沟县长山公社抗大六队插队落户的三十三名知识青年，在毛泽东思想哺育下，虚心接受贫下中农再教育，已经成长为社会主义新农村一支最积极最有生气的力量。他们又生产，又练武，又和社员群众一起批判资产阶级，使抗大六队革命、生产闹得朝气蓬勃，热火朝天。"},{"type":"paragraph","text":"这些知识青年是从一九六四年起先后到抗大六队的。在贫下中农教育下，他们在思想上、劳动上和生活上，都自觉地严格要求自己，同时互相鼓励，互相帮助，成为一个团结战斗的集体。他们经常办毛泽东思想学习班，开展“红哨兵”和“一对红”活动，使资产阶级思想在他们中没有落脚的地方，使毛泽东思想在他们中深深扎下了根子。"},{"type":"paragraph","text":"这些知识青年到农村后，遵照毛主席关于“政治工作的基本任务是向农民群众不断地灌输社会主义思想，批评资本主义倾向”的教导，一面学习贫下中农忠于毛主席的高贵品质；一面宣传毛泽东思想，同贫下中农一起，向阶级敌人和资本主义倾向进行针锋相对的斗争。他们每到晚上，就到贫下中农家里去一起学习“老三篇”；每周办两次夜校，和贫下中农一起学习文化，讨论中国革命和世界革命的大事。他们看到村里旧艺人贩卖封、资、修黑货，就和本地青年组织起业余文艺宣传队，唱大寨人走社会主义道路，改造自然的英雄事迹，演本村一心为公的新人新事。一些老贫农乐呵呵地说：“还是这路戏好，唱的是咱心里的话，演的是咱做的事，越看心里越长社会主义的劲。”"},{"type":"paragraph","text":"毛主席教导说：“农村是一个广阔的天地，在那里是可以大有作为的。”在农村的广阔天地里，青年们改造农村，建设农村，同本地青年一起开垦出一百多亩荒地，并进行科学实验，大大提高了粮食产量。同时，他们在斗争中也改造了自己，锻炼了自己，正成长为无产阶级革命事业的接班人。在这三十三名知识青年里，已有七人光荣地加入了中国共产党，有十一人分别被评选为东沟县、丹东市、辽宁省活学活用毛泽东思想积极分子，有九人被选入生产队、大队、公社、县各级领导班子，还有两人参加了解放军。这支青年队伍成了辽宁省活学活用毛泽东思想的先进集体。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"辽宁文革","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2e9492813b"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
