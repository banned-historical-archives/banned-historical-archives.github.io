art":5,"page_end":5,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"用毛泽东思想巩固发展革命大联合钢都鞍山革命大联合浪潮滚滚向前","authors":[],"parts":[{"type":"paragraph","text":"新华社鞍山二十六日电 钢都鞍山的无产阶级革命派坚决贯彻执行我们伟大的领袖毛主席的最新指示，迅速掀起革命大联合的高潮。到二十五日，鞍山市已经有一百零六个工厂、企业、机关、学校实现了革命的大联合。"},{"type":"paragraph","text":"在我国最大的钢铁联合企业——鞍山钢铁公司，已经实现革命大联合的第一初轧厂的革命职工，二十四日夜夺得了日产量新水平。二十五日清晨，他们听了毛主席在全国无产阶级文化大革命空前大好形势下，视察了华北、中南和华东地区的喜讯后，立刻举着大红喜报，敲锣打鼓，赶到生产指挥部报喜。革命工人激动地表示：毛主席为我们撑腰，我们一定要为毛主席争气。我们一定以更好的革命和生产的新成绩，向伟大领袖毛主席报喜，向国庆节献礼。刚刚实现革命大联合的大石桥镁矿的革命大联合委员会负责人说，我们在伟大统帅毛主席的英明领导下，一定能够取得文化大革命的彻底胜利。我们坚决紧跟毛主席的伟大战略部署，在革命和生产中立新功。"},{"type":"paragraph","text":"毛主席教导我们：在工人阶级内部，没有根本的利害冲突。在无产阶级专政下的工人阶级内部，更没有理由一定要分裂成为势不两立的两大派组织。鞍钢工人阶级，认真学习毛主席的最新指示，坚决照办，一马当先，走在前面。鞍山矿山机械厂的几个革命群众组织，学习了毛主席的最新指示，在执行支左任务的解放军的帮助下，认真地进行了自我批评，破私立公，统一了思想，迅速实现了革命大联合。鞍钢铸管厂、第三炼钢厂、发电厂、海城镁矿、弓长岭铁矿和鞍钢矿山研究所等单位的革命群众组织，也连日开会，在毛泽东思想原则基础上，消除分歧，实现了按部门、按班组的革命大联合。最近几天内，革命大联合的捷报频传，处处锣鼓喧天，报喜的队伍一队接一队。"},{"type":"paragraph","text":"已经实现了革命大联合的厂矿，正进一步从思想上巩固和发展革命的大联合，调动广大革命群众的冲天革命干劲，掀起革命大批判高潮和生产高潮。"},{"type":"paragraph","text":"工人阶级的先进榜样，促进了鞍山各行各业无产阶级革命派的革命大联合，使革命大联合的浪潮一浪高一浪地向前发展。近几天内，鞍山市钢铁学院两个革命群众组织的战士，以毛主席的最新指示为指针，边学习，边对照，边检查，破私立公，消除了分歧，很快实现了全院的革命大联合，成立了统一的革命组织。鞍山市第三中学和师范学校的革命小将们，也反复学习领会毛主席的最新指示，很快实现了革命大联合。实现了革命大联合的广大无产阶级革命派表示，一定更高地举起毛主席的无产阶级的革命批判的旗帜，把党内最大的一小撮走资本主义道路当权派批倒批臭，搞好本单位的斗批改，夺取文化大革命的彻底胜利。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"革命大批判","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"军队支左","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f711abf918"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
