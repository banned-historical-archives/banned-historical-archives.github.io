uthors":[],"dates":[{"year":1973,"month":4,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京一九七三年四月八日电　国务院总理周恩来，军委副主席叶剑英今晚在北京工人体育馆观看了日本相扑运动员的表演。"},{"type":"paragraph","text":"观看表演前，周恩来总理、叶剑英副主席等，在友好的气氛中会见了日本相扑访华团团长武藏川喜伟，副团长宫川寅雄(兼秘书长)、二所乃关胜已、伊势滨万藏、花笼昶光、春日野清隆(兼总领队)等，并同日本相扑运动员一起照了像。日本国驻中国大使小川平四郎和夫人也参加了会见和合影。"},{"type":"paragraph","text":"出席观看表演的还有:中日友协会长廖承志，国家体委主任王猛，外交部副部长韩念龙，有关方面负责人于桑、于步血、赵正洪、张香山、庄则栋、经普椿、王拓、王晓云、孙平化、朱传贤、高建中、王文忠等。"},{"type":"paragraph","text":"日本国驻中国大使馆公使林祐一、柳谷谦介和在京的日本朋友河原崎长十郎、白石凡、川崎宽治、大轩顺三、安田佳三、木村一三、杉山市平等，也观看了表演。"},{"type":"paragraph","text":"日本相扑运动员今晚的表演，受到了全场一万五千多名观众的热烈欢迎。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"叶剑英","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d84c7d21b3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
