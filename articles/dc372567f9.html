art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"支持几内亚对卢蒙巴被害事件立场我国政府和人民决心从一切方面支援刚果人民的正义斗争","authors":["刘少奇"],"parts":[{"type":"paragraph","text":"科纳克里几内亚共和国总统塞古·杜尔先生阁下："},{"type":"paragraph","text":"阁下2月17日来电收到。中华人民共和国政府和中国人民支持几内亚共和国政府就刚果共和国总理巴蒂斯·卢蒙巴被杀害事件所采取的立场。卢蒙巴总理被害事件，不仅是美、比帝国主义及其代理人对刚果人民和全体非洲人民的猖狂进攻，也是对亚洲和世界爱好和平人民的严重挑衅。中国政府和中国人民对此感到极大的愤怒，我国政府已经在2月14日发表抗议声明，我国首都各界五十多万人在2月18日举行了抗议集会，其他许多大城市也都纷纷举行了抗议集会。我国政府已经重申承认以基赞加代理总理为首的刚果合法政府，并且同刚果共和国建立了外交关系。我国政府和人民决心从一切方面支援刚果人民反对帝国主义和殖民主义、维护民族独立和国家统一的正义斗争。我们深信，只要刚果人民坚强的团结起来斗争到底，一定会赢得最后胜利。"},{"type":"paragraph","text":"顺致祟高的敬意。"},{"type":"paragraph","text":"中华人民共和国主席 刘少奇"},{"type":"paragraph","text":"1961年2月21日于北京"}],"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dc372567f9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
