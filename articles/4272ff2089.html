" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoistlegacy.de-2361","name":"国家档案局关于党史资料征集工作与档案馆工作关系的复函","author":"国家档案局","internal":false,"official":false,"type":"unknown","files":[],"article":{"title":"国家档案局关于党史资料征集工作与档案馆工作关系的复函","dates":[{"year":1986,"month":4,"day":7}],"is_range_date":false,"authors":["国家档案局"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"国家档案局办公室, 档案工作文件汇集(第三集), 243","tags":[{"name":"档案馆","type":"主题/事件"},{"name":"征集","type":"主题/事件"}],"parts":[{"type":"title","text":"国家档案局关于党史资料征集工作与档案馆工作关系的复函"},{"type":"subtitle","text":"国档字（86）51号"},{"type":"paragraph","text":"江苏省档案局："},{"type":"paragraph","text":"一九八六年三月五日关于党史资料征集工作问题的请示收悉。档案馆是党和国家集中收集保管档案，并为各方面的工作提供服务的专门机构。各机关、团体、企业、事业单位形成的档案，均应按规定向有关档案馆移交。这是党中央和国务院明文规定了的基本原则。不论是党史资料征集委员会，还是党史工作委员会，或者其他任何工作部门，都只能根据工作需要，按规定向档案部门（机关档案部门和档案馆）复制借阅，而无权对档案部门所保管的档案进行征集。至于档案馆的领导体制，只能遵照中委（1985）29号文件的规定办理，不能做其他任何改动，不能影响党中央和国务院关于整个国家档案事业建设原则的贯彻执行。请将上述意见，向省委和人民政府汇报。"},{"type":"subtitle","text":"国家档案局"},{"type":"subtitle","text":"一九八六年四月七日"},{"type":"paragraph","text":"抄送：中央党史资料征集委员会，江苏省委办公厅，各省、自治区、直辖市档案局，中央档案馆，中国第一历史档案馆，中国第二历史档案馆，中央、国家机关档案部门"}],"alias":""},"tags":[{"name":"江苏文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4272ff2089"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
