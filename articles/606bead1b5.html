script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"《赤旗报》揭露志贺和铃木反党活动的反人民性质志贺等人投降敌人企图取消党的革命思想借口形势改变说马列主义已经过时这正是他们是现代修正主义者的自供","authors":[],"dates":[{"year":1964,"month":6,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京31日电】　东京消息:日本共产党中央机关报《赤旗报》五月二十九日发表了题为《八中全会决议符合人民利益》的社论，揭露了志贺义雄和铃木市藏的反党活动的反人民性质。"},{"type":"paragraph","text":"社论指出，志贺义雄和铃木市藏背叛了党和革命人民，而向敌人投降。社论说，他们为他们的犯罪行为辩解，说他们没有违反党纪的理由是所谓形势已经发生变化，因此党的政策也必须改变。"},{"type":"paragraph","text":"社论说，志贺及其集团在形势已经改变的借口下所要说的是:马克思列宁主义的革命原则现在已经过时，因此，民主集中制这一革命的组织原则是陈旧了。这正是他们是现代修正主义者的自供。"},{"type":"paragraph","text":"社论驳斥了所谓形势已经改变的说法。社论指出，世界上仍然存在着帝国主义，这一事实毫无变化。美帝国主义正是世界上战争和侵略的魁首、世界反动势力的主要支柱和国际宪兵。确凿的事实是:美帝国主义使日本处于半占领状态，同它的小伙伴日本反动势力互相勾结，压迫和控制日本人民。帝国主义固有的侵略本性没有改变，因此帝国主义决不会自愿奉行和平政策，决不会自动撤出外国领土，这种情况也没有改变。"},{"type":"paragraph","text":"社论说，正当凶恶的美帝国主义和日本反动派正在以部分禁止核试验条约作工具继续执行他们的两面政策，勾结现代修正主义者和分裂主义者破坏人民运动，并且力图策划各种挑衅和阴谋活动的时候，这难道不是最严重的形势吗?"},{"type":"paragraph","text":"社论说，“在美日反动派协同现代修正主义者和分裂主义者加紧向党和革命人民进攻的今天，再没有比坚持马克思列宁主义的革命原则更为重要的事了。只有以马克思列宁主义的革命原则和严格的无产阶级纪律武装起来的革命的党才能够看穿敌人的奸险阴谋，提高人民的警惕、鼓励人民的斗志，团结人民，从而保证人民的胜利。这是自从伟大的十月社会主义革命以来，在一切争取民族解放和社会主义变革的革命运动过程中得到了证明的真理。这个真理过去和现在没有改变，将来也不会改变。”"},{"type":"paragraph","text":"“在这个时候，再没有比志贺和铃木在敌人进攻面前投降、企图取消党的革命思想而代之以机会主义和修正主义更严重的罪恶行为了。他们的思想是失败主义和投降主义的。这将把党和人民的斗争导向失败。”"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"606bead1b5"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
