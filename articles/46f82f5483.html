s":[],"dates":[{"year":1949,"month":2,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"平市学代大会开幕"},{"type":"paragraph","text":"市长叶剑英出席讲话"},{"type":"paragraph","text":"通电抗议战犯汤恩伯屠杀工人"},{"type":"paragraph","text":"【新华社北平二十二日电】北平市第一届学生代表大会二十一日在北京大学四院大礼堂开幕。会期预定三天，将讨论今后北平学生运动的方针、任务，通过北平学生联合会的组织章程，正式成立北平市学联，选举学联的执行委员和出席全国学生代表大会的代表。出席大会的共有代表北平市大中学校一百二十二个单位的一百九十三名学生代表。来宾有北平市共产党委员会代表、人民政府代表、人民解放军代表、大学教授代表、中华全国学生联合会筹委会代表、华北学生联合会代表等五十余人。开会时首由大会临时主席萧松报告北平市学生联合会筹备经过及组织学联的意义。接着，选举了清华大学、燕京大学、北京大学、汇文中学、贝满女中等十五个单位为主席团主持会议。后即有全国学联筹委会主任陈震中代表沪杭苏学生代表团向大会献旗，旗上写着：“北平同学们，上海、杭州、苏州四十万同学欢呼你们的解放”。激起了全场热烈的掌声。北平市长叶剑英，中共北平市委宣传部长赵毅敏，北平市警备司令部政治部主任刘道生，北京大学教授许德珩，燕京大学教授雷洁琼。沪、杭、苏学生代表之一阮才泽，华北学联执行委员会主席陈琳等，都在开幕会上讲话。大会通过向毛主席、朱总司令和东北、华北人民解放军致电，同时又向全国同胞发出了抗议国民党刽子手汤恩伯屠杀上海交通工人的通电。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"46f82f5483"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
