script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"充分发挥工人阶级的领导作用  狠抓学习毛主席著作群众运动  大连柴油机厂革委会在驻厂解放军帮助下广泛组织工人检查组，检查总结全厂活学活用毛泽东思想情况，有力推动了斗批改","authors":[],"dates":[{"year":1969,"month":2,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"充分发挥工人阶级的领导作用"},{"type":"paragraph","text":"狠抓学习毛主席著作群众运动"},{"type":"paragraph","text":"大连柴油机厂革委会在驻厂解放军帮助下广泛组织工人检查组，检查总结全厂活学活用毛泽东思想情况，有力推动了斗批改"},{"type":"paragraph","text":"本报讯　解放军某部驻大连柴油机厂支左人员，在帮助革委会认真落实毛主席关于“工人阶级必须领导一切”的伟大指示中，突出工人阶级对活学活用毛泽东思想群众运动的领导，组织工人检查组，对两年来活学活用毛泽东思想的情况进行总结，有力地推动了全厂活学活用毛泽东思想群众运动的发展。"},{"type":"paragraph","text":"党的八届十二中全会公报发表以后，驻这个厂支左的解放军，首先深入金工车间狠抓工人活学活用毛泽东思想。他们发现个别青年徒工有满足现状的思想，针对这种情况，支左解放军和老工人一起举行座谈会，根据工人的建议，组成了以老工人为主体的活学活用毛泽东思想检查组。在检查中他们发现同样学习毛主席著作，同样参加忆苦思甜和班组大批判，但有的成效明显，有的进步较慢。工人检查组认真研究了这种情况，认为有些同志学习收效不大的原因有三条：一是带着两条路线斗争的问题学习毛主席著作不够；二是没有在“用”字上狠下功夫；三是没有充分发挥工人阶级对活学活用毛主席著作的领导作用。"},{"type":"paragraph","text":"工人检查组把这些情况向厂革委会作了汇报。革委会领导成员很重视。工人检查学习毛主席著作的情况使他们深刻认识到：工人阶级领导一切，最根本的就是要领导学习毛主席著作的群众运动。同时一致认为，工人活学活用毛泽东思想检查组是学习毛主席著作群众运动中涌现出的新事物，应当大力支持。厂革委会决定，在各车间推广这一经验，同时从各个车间推选出十名学习毛泽东思想好、苦大仇深的老工人领导全厂活学活用毛主席著作的群众运动。"},{"type":"paragraph","text":"过去有的同志认为科室人员下放了，斗、批、改就达到了目的。工人检查组为了进一步了解下放科室人员学习毛主席著作的情况，便深入班组与他们促膝谈心，发现个别人虽然人在车间，心却在科室。这件事使工人检查组认识到：斗、批、改决不只是改革机构，最根本的是用毛泽东思想改造人的世界观。技术部门所以成为“老大难”的地方，根本原因，就是没有学好用好毛泽东思想。他们通过调查建厂以来技术部门在学习毛主席著作问题上两条路线斗争的历史，进一步提高科室人员活学活用毛泽东思想的自觉性。在工人检查组的领导下，技术部门很快掀起了活学活用毛泽东思想的新高潮。下放到班组的技术人员努力活学活用毛主席著作，同老工人结合，搞出了六台体积轻、马力大、质量高的新型柴油机。"},{"type":"paragraph","text":"工人检查组在革委会的领导和解放军驻厂支左人员的热情帮助下，注意发现典型，总结经验，利用假日深入工人家庭，了解活学活用毛主席著作的情况，并帮助职工家庭建立毛泽东思想学习班。现在，全厂已出现了一个群众性的活学活用毛泽东思想的新高潮，并产生了巨大的物质力量。这个厂在派出百分之二十的工人参加工人宣传队的情况下，全厂月月提前完成生产计划，产品的数量和质量都超过了建厂以来的最高水平。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"军队支左","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"87b924b1fe"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
