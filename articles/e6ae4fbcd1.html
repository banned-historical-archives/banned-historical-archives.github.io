script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"华商电气公司应该澈底改造裁汰冗员　扫除不良职工和贪污剥削的行为","authors":["周惟增"],"dates":[{"year":1949,"month":7,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编者先生:"},{"type":"paragraph","text":"最近各报上都登载着市民意见，要求华商电气公司改进。我亦有两点意见，补充于下:"},{"type":"paragraph","text":"(一)该公司电价要比上海电力公司高百分之六十，电价是根据成本计算的，何以该公司成本如此之高呢?此中原因固多，而该公司经理豢养了一批亲戚朋友白领干薪(见本月廿二日新闻日报社会服务版)亦是原因之一；这样就无形中增加用户负担。"},{"type":"paragraph","text":"(二)该公司少数不良职工，在南市一带兼营电料商店，利用职务上的便利，包办装表接火等工程，内外勾结，向用户浮收费用；形成特殊势力的中间阶级，一方面剥削用户，同时亦排挤正当电料商店，使无法存在。"},{"type":"paragraph","text":"装垄作哑，是该公司的一贯作风。市民任何意见，向来置之不理；解放后的今天，还是一团糟。在新民主主义的社会里，不容许再存在如此腐化的公用事业!我们要求军管会公用事业处，大力帮助他改进，——裁汰冗员，裁汰不良员工，铲除食污，剥削的行为；学习新的劳动态度，提高工作效率，做到真正为人民服务!"},{"type":"paragraph","text":"读者　周惟增"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e6ae4fbcd1"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
