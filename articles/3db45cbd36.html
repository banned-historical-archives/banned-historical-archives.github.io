":1963,"month":5,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京6日电】　毛泽东主席接见了朝鲜法律工作者代表团团长、朝鲜民主法律家协会委员长、朝鲜民主主义人民共和国检察总长朴世昌和团员、朝鲜劳动党中央指导员金斗七，并同他们进行了亲切友好的谈话。"},{"type":"paragraph","text":"接见时，在座的有中国政治法律学会书记处候补书记郭纶。"},{"type":"paragraph","text":"【新华社北京6日电】　毛泽东主席接见了马里政府文化代表团团长、马里青年和体育高级总专员穆萨·凯塔及团员、马里新闻部电影局局长布巴卡·巴契里，并同他们进行了亲切友好的谈话。"},{"type":"paragraph","text":"接见时在座的有对外文化联络委员会副主任朱光。"},{"type":"paragraph","text":"马里驻中国大使馆一等秘书尤苏夫·库亚特也在座。"},{"type":"paragraph","text":"\u003cIMG alt=请插入4号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1963\\05\\6357010201.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgaut\u003e陈娟美\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e毛主席和朴世昌团长亲切握手　(新华社传真　陈娟美摄)\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入4号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1963\\05\\6357010202.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e毛主席和穆萨·凯塔团长亲切握手　(新华社传真　陈娟美摄)\u003c/FONT\u003e"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3db45cbd36"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
