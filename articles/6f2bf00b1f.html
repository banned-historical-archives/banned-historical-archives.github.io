ical-archives/banned-historical-archives0/main/maoquanji45.pdf"],"article":{"title":"在一份外交信稿上的批语","alias":"","parts":[{"type":"paragraph","text":"在一份外交信稿上的批语"},{"type":"paragraph","text":"（1962年11月27日）总理："},{"type":"paragraph","text":"近几天一些外交文件，在措词方面有些欠当，这就是一件，我改了一点，请你再阅。"},{"type":"paragraph","text":"毛"},{"type":"paragraph","text":"廿七日早"},{"type":"paragraph","text":"[1]指外交部起草的中华人民共和国国务院总理周恩来1962年11月27日给缅甸联邦革命政府部长会议主席奈温的信稿。"},{"type":"paragraph","text":"[2]毛泽东在审阅这份信稿时，将“阁下对和平解决中印边界问题所持的公正态度·.对巩固亚非国家的团结、维护亚洲的和平，也将是珍贵的贡献”一句中的“珍贵的”改为“有益的”；将“中印边境上原先十分险恶的局势已经开始有了好转机”一句中的“原先十分险恶的局势”改为“原先的那种局势”，将“转机”改为“缓和”；对“仅仅中国一方面采取这种行动，还不能完全有效地防止冲突不再起，也不利于为谈判创造良好的气氛”一句，删去“完全有效地”，将“防止冲突不再起”改为“防止冲突的再起”，删去“也不利于”。"}],"authors":["毛泽东"],"dates":[{"year":1962,"month":11,"day":27}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":299,"page_end":299},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6f2bf00b1f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
