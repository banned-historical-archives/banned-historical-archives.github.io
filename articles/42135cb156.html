rs":[],"dates":[{"year":1981,"month":1,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"人大常委会宴请日本参议院代表团"},{"type":"paragraph","text":"廖承志代表叶剑英委员长热烈欢迎贵宾"},{"type":"paragraph","text":"新华社北京1月9日电  人大常委会副委员长廖承志今晚在这里指出，中国人大常委会和日本参、众两院之间不断加强相互交流，对于巩固和发展中日两国友好合作关系，加深两国人民的传统友谊，具有十分重要的意义。"},{"type":"paragraph","text":"人大常委会今晚举行宴会，欢迎由参议院议长德永正利率领的日本参议院代表团。廖承志在宴会上还赞扬了日本领导人和参、众两院的政界人士为促进中日友好，为实现两国邦交正常化和发展两国关系作出的贡献。"},{"type":"paragraph","text":"在谈到我国国民经济调整时，廖承志说，调整是积极的方针，是为了创造条件更好地前进。他指出，中日两国经济上的合作，特别是能源方面的合作，是长期的，这是肯定了的。"},{"type":"paragraph","text":"德永正利议长在宴会上讲话时指出，日本参、众两院同中国人大常委会继续加强和发展友好往来和交流，有着深远意义。他祝愿日中两国人民的传统友谊日益发展。"},{"type":"paragraph","text":"人大常委会副秘书长武新宇、罗青长，外交部副部长韩念龙以及日本驻中国大使吉田健三，出席了宴会。"},{"type":"paragraph","text":"日本参议院代表团是应叶剑英委员长的邀请，前来进行为期十天的友好访问的。他们于今天下午抵达北京。"},{"type":"paragraph","text":"廖承志在钓鱼台宾馆迎接了代表团。在同德永正利的交谈中，廖承志说：“叶剑英委员长现在不在北京。他年事已高，每年习惯在广州过冬，现在他仍在那里。我代表他向你们表示热烈欢迎。”德永正利请廖承志转达他对叶剑英的问候。"},{"type":"paragraph","text":"代表团由日本自民党、社会党、公明党、民社党和日共等政党的参议员组成，全团共14人。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"廖承志","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"42135cb156"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
