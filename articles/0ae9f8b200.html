script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"天山儿女永远怀念毛主席","authors":["李幼容"],"dates":[{"year":1976,"month":10,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"天山儿女永远怀念毛主席"},{"type":"paragraph","text":"李幼容毛主席逝世消息传塞"},{"type":"paragraph","text":"外，悲痛泪水汇瀚海，手捧毛主席遗像望北"},{"type":"paragraph","text":"京，千言万语涌出来：饮过多少甘泉水，想着源头中南海！生命的雨露是党洒，天山南北鲜花开……难忘三十八年前，黑暗笼罩旧世界，边疆人民在水火中，毛主席指派亲人来。天山南北播火种，抗日烽烟燃瀚海，黑手扑不灭燎原火，寒流挡不住东风来，先烈血染天山路，化作雪莲朝阳开……难忘二十七年前，解放红旗扫阴霾，春风欢奏出塞曲，毛主席派了大军来。斗地主，搞土改，建政权，打狼豺……天山儿女庆胜利，东风报喜中南海，伟大领袖挥彩笔，金色书信传塞外。毛主席接见吐鲁木，无限温暖传万代！公社大道通葱岭，幸福彩虹连边塞……难忘文化大革命风雷"},{"type":"paragraph","text":"激，天山成长起新一代，毛主席接见边疆红卫"},{"type":"paragraph","text":"兵，革命烈火燃瀚海。各族工农齐踊跃，一起批判走资派，边疆北京同战壕，炮声隆隆动地来。红旗尽扫草原雾，风雨涤荡戈壁埃，革命新风遍天山，新花朵朵绿洲开。难忘自治区成立二十"},{"type":"paragraph","text":"载，毛主席又派亲人来。胜利中给咱敲响进军"},{"type":"paragraph","text":"鼓，喜庆时鼓舞咱继续朝前"},{"type":"paragraph","text":"迈！红彤彤的贺幛啊金闪闪的字，带来了党中央的期望和"},{"type":"paragraph","text":"关怀："},{"type":"paragraph","text":"“全国各族人民团结起"},{"type":"paragraph","text":"来，沿着毛主席革命路线胜"},{"type":"paragraph","text":"利前进！”字字象明灯，句句放光采，各族人民并肩朝前迈！朝前迈啊朝前迈，批邓战鼓擂起来。毛主席挥手千军动，万炮齐轰走资派！深入批邓、批苏修，斗争赢得丰收来。千年戈壁献油海，大庆红旗插钻台；万古荒原稻麦香，大寨红花天山开！民族干部成长起，处处都有雷锋在！边疆大地起宏图啊，今日天山添丰采！啊，今日天山添丰采，美好新颜哪里来？饮水思源望北京，毛主席丰功伟绩记心"},{"type":"paragraph","text":"怀，面对毛主席遗像来宣"},{"type":"paragraph","text":"誓，一定让江山红万代。最紧密地团结在以"},{"type":"paragraph","text":"华国锋同志为首的党"},{"type":"paragraph","text":"中央周围，沿着毛主席的无产阶级"},{"type":"paragraph","text":"革命路线朝前迈！"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0ae9f8b200"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
