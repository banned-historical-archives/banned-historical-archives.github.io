":[{"year":1984,"month":2,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"最近由四川人民出版社出版的《毛泽东哲学思想的形成和发展》是一本比较系统地探讨毛泽东哲学思想的著作，作者刘梦义、高齐毅。该书主要从以下几个方面对毛泽东哲学思想进行了探索和研究:一、毛泽东哲学思想的基本概念、范畴和原理是在怎样的历史背景下形成和发展的。二、毛泽东哲学思想是怎样批判地吸收了中外哲学的优秀成果，又是怎样把马克思主义哲学运用于中国革命实际的。三、毛泽东哲学思想在形成和发展过程中是怎样同形形色色的唯心论和形而上学的世界观和方法论作斗争的。该书不仅研究分析了毛泽东哲学思想的基本观点，对毛泽东军事辩证法思想、艺术哲学思想、道德哲学思想等也作了有益的探索。"},{"type":"paragraph","text":"(任青)"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ec59f96e97"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
