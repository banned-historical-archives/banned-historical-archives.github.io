<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"京处决杨守德等反革命罪犯","authors":["人民日报讯"],"dates":[{"year":1951,"month":2,"day":20}],"is_range_date":false,"parts":[{"text":"京处决杨守德等反革命罪犯","type":"title"},{"text":"人民日报讯","type":"authors"},{"text":"【人民日报讯】北京市军事管制委员会军法处为严厉镇压反革命活动，巩固首都治安，于本月十八日将怙恶不悛的蒋匪特务二十七名及一贯道等反动会道门首恶三十一名判处死刑，并于当日执行枪决。","type":"paragraph"},{"text":"伏法的反革命罪犯均系罪恶重大的蒋匪特务，有的潜入首都，建立反革命特务组织，企图颠覆人民政府；有的拒不登记，隐匿枪枝，继续潜伏进行破坏活动；有的系一贯屠杀人民的蒋匪首要特务分子；有的系叛变革命，积极从事反人民活动的匪徒。其中如匪犯杨守德，于一九四九年七月，在广州接受匪“国防部”任命，充匪“冀热察边区挺进纵队司令兼行署主任”，勾结匪徒唐伯寅、刘若蕙携带电台及大量活动经费，于一九四九年潜入首都，进行反革命活动，并曾在衡阳、长沙、北京等地发展特务组织，妄图建立伪乡、镇政权，组织武装匪徒，阴谋暴乱。“军统”特务傅叙平、苏梦华受匪“国防部”派遣，于今年一月潜来北京，企图窃取情报。“军统”首要特务谢厥成，自一九三二年参加匪“军统”特务组织后，长期充当屠杀人民的刽子手。一九三六年，该匪亲率特务，协助匪首戴笠扣押杨虎城将军及其夫人。上海解放后，该匪拒不登记，潜来北京继续进行反革命活动。汉奸、特务李永明于一九四四年凭借日寇势力，先后亲手杀害我军干部和群众五人。","type":"paragraph"},{"text":"伏法的反动会道门首恶，包括反动的一贯道、九宫道、正字道、明道会等反动会门头子，均系在日寇、国民党统治期间，与敌伪勾结作恶，杀害革命工作干部，欺压群众，强奸妇女，罪行累累的反革命罪犯。解放后，该犯等仍怙恶不悛，继续进行反对人民的活动，散布谣言，破坏土地改革，抗拒政府法令，阴谋保存反动组织，伺机蠢动，并阻止道徒向政府坦白登记。其中如王维忠、王勋臣、王维山和米国权四匪在一贯道中称“三王一米”，过去专门勾结大汉奸和特务分子王揖唐、马汉三之流，为非作恶，残害人民，并与侯善田、陈明源等犯同为一贯道的所谓“八大代表”。其他如任延堂等也都是北京一贯道首恶张五福的亲信爪牙。","type":"paragraph"},{"text":"这些怙恶不悛，坚决与人民为敌的反革命罪犯，在京市广大人民纷纷控诉下，已为北京市军事管制委员会军法处根据该犯等犯罪事实，依法处以极刑。（柯夫）","type":"paragraph"},{"text":"【人民日报讯】本月十八日，北京市军事管制委员会军法处枪决五十八名罪大恶极的蒋匪特务和反动会道门头子后，获得广大群众的热烈拥护。","type":"paragraph"},{"text":"北京的工人、农民、学生及一般市民，一致认为政府这样做得好，做得对，这些反革命分子只有予以严厉镇压，人民才能过好日子。兰馨斋店员工人扈光政说：“现在正是抗美援朝，防奸防特的时候，把这些家伙毙了才对我们有利！”北郊东营房农民郭文轩说：“该宽大的就宽大，该镇压的就镇压，光宽大也不行，人民政府对他们这样的就得崩！”农民赵寿田说：“枪毙的一贯道头子过去净骗人、造谣，今天枪毙了，让反革命也知道人民政府不是不敢毙人！”南苑西南大道九号贫民李世明说：“这才是名符其实的人民政府呢！人民要求把一贯道点传师刘毓英拉到南苑枪毙，就真枪毙了，这才大快人心哪！也给受骗道徒们出了气啦！”辅仁大学附中高三学生马世习说：“过去有的特务被释放，但他们并不知悔改，所以我感到人民政府太宽大，现在枪毙真应该。”","type":"paragraph"},{"text":"政府这一英明措施，更激起了各界人民对蒋匪特务和反动会道门头子的无限愤恨，纷纷控诉他们的罪行。七里集村王世昌说：“我听见枪毙了特务李永明，我特意跑来看着，过去我们村里的人受他害的很多，我回去一定向村长报告，向群众宣传，今天的政府真给人民除了害。”清河制呢厂工人们说：“汉奸、特务李永明杀害的人命，不下百人，在日本时，他是“一四一八”部队的特务，外号叫“阎王爷”，国民党抓住他又放了，只有共产党才真给人民除害！”八区照像业同业公会职员殷骆之说：“我参观过中山公园的一贯道罪证展览，它的罪恶都摆在那里，真是可恨，今天人民政府把一贯道罪大恶极的头子都枪毙了，真是痛快！”","type":"paragraph"},{"text":"枪毙了这些反革命罪犯之后，提高了群众的警惕，他们纷纷提出要协助政府防奸防特。北京车站一群工人和中华饭店的工人都说：“以后我们工人应该协助政府，肃清这些反人民的家伙。”枪毙的二十七个特务里，韩凤才和张年两个特务曾在一品香澡堂里隐蔽，进行反革命活动。该处五十多个工人看见柜上出了这些败类，都非常气愤。他们说：“这些小子简直要砸咱们的饭碗。”他们在十九日晚特别举行了座谈会，讨论如何提高警惕，防奸防特。","type":"paragraph"}],"comments":[],"origin":"《人民日报》1951年2月20日","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7abe7230a5"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
