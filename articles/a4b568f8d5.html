泽东思想宣传队　北京外国语学院全体红卫兵"],"dates":[{"year":1969,"month":3,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"打倒新沙皇是苏联人民的意志"},{"type":"paragraph","text":"驻北京外国语学院工人、解放军毛泽东思想宣传队"},{"type":"paragraph","text":"北京外国语学院全体红卫兵"},{"type":"paragraph","text":"苏修叛徒集团三月二日指使苏修边防军侵犯我国领土，最近又连续制造了一系列新的极为严重的反华暴行。事件发生以后，苏修叛徒集团竟恬不知耻地说什么这是“代表全体苏联人民的坚强意志”。简直是无耻之尤！"},{"type":"paragraph","text":"什么“代表全体苏联人民的坚强意志”，这完全是苏修叛徒集团欺人的鬼话。伟大导师列宁指出：“如果国家政权掌握在同大多数的利益一致的阶级手中，那末国家的管理就能够真正符合大多数的意志。”莫斯科的新沙皇勃列日涅夫、柯西金之流继承了赫鲁晓夫的衣钵，在苏联全面复辟资本主义，把苏联人民又重新投入了受剥削、受压迫的苦难深渊，使广大苏联劳动人民吃二遍苦，受二茬罪。他们在国内代表一小撮资产阶级特权阶层的利益，镇压广大人民；对外勾结美帝国主义和各国反动派大肆反华、反革命，推行社会帝国主义。苏修叛徒集团谎话说尽，坏事做绝，完完全全背叛了马克思列宁主义，背叛了苏联革命人民的利益，成了苏联人民的死敌。这样一伙叛徒，有什么资格“代表”苏联人民的“意志”呢？"},{"type":"paragraph","text":"伟大领袖毛主席教导说：“苏联广大的人民、广大的党员和干部，是好的，是要革命的”。苏联革命人民对苏修叛徒集团的反动统治日益不满，他们一定会进行第二次革命，重建无产阶级专政。这才是苏联人民的坚不可摧的战斗意志！"},{"type":"paragraph","text":"伟大导师列宁早就深刻地揭露过俄国沙皇的政策：“凡是只靠刺刀才能维持的政府，凡是不得不经常压制或遏止人民愤怒的政府，都早就懂得一个真理：人民的不满是无法消除的，必须设法把这种对政府的不满转移到别人身上去。”走投无路、内外交困的苏修叛徒集团制造这次大规模反华事件，就是为了转移苏联人民的视线，维持其日益不稳的社会法西斯统治。但是这只能是“搬起石头打自己的脚”，只能激起苏联人民对他们的更广泛更剧烈的反抗。苏联人民是不会上当的。他们一定会组织起来，行动起来，打倒新沙皇，打倒社会法西斯主义！"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a4b568f8d5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
