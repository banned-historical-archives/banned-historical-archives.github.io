五反”遗留工作请示问题的答复","authors":[],"dates":[{"year":1955,"month":5,"day":9}],"is_range_date":false,"parts":[{"text":"国务院（八办）对武汉市工商局结束“五反”遗留工作请示问题的答复","type":"title"},{"text":"（一）关于一部分规模较大、有改造可能、又为国家所需要的工厂，但目前流动资金少，在1955年底以前不能退清赃款，是否可以采取公股私办的形式，酌情保留部分赃款作为国家的投资，暂不派干部，不计盈亏的问题。我们认为应按中央“为配合对资本主义工商业改造，对国家需要的、有改造条件的10人以上的私营工厂，已经或准备列入扩展公私合营计划者，其退补可作公股利用的，可暂缓催缴”的原则办理，但不要采取“公股私办”的办法。因为既折为公股，国家就没有充分理由不对企业盈亏负应负的责任，因而可能使国家背上包袱，为使“五反”遗留问题在今年底能宣告结束，对这种情况除该减免者予以减、免外，可采取转为国家欠款的方式，待将来正式合营时再转为公股。","type":"paragraph"},{"text":"（二）关于减、免的手续问题，可由当地拟定催收、减免的方案，提交政协地方委员会进行协商，以利于校正方案，并使该催收的取得资产阶级代表人物的协助和支持，该减免的能扩大政治影响。宣布减免，可由（增产）节约检查委员会或法院出面。减免的理由，主要是“无力全部退补”或“无力退补”。“某些中上层分子在“五反”后，已有实际的悔过表现（如：不重犯五毒，不拖延退补，积极生产经营等，并在工商界中能起积极作用者）”（均见中央指示），也可作为减少退补的理由。","type":"paragraph"},{"text":"（三）属于企业购买的公债，在企业无退补能力，资本家愿交出抵偿赃款时，可以接受。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f8397e734b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
