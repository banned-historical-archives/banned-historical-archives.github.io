script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"亚非记协向亚非革命新闻工作者发出号召书  毛泽东思想是反对帝修反的强大思想武器  重申坚持反帝革命路线，支持各国人民革命斗争","authors":[],"dates":[{"year":1968,"month":4,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"亚非记协向亚非革命新闻工作者发出号召书"},{"type":"paragraph","text":"毛泽东思想是反对帝修反的强大思想武器"},{"type":"paragraph","text":"重申坚持反帝革命路线，支持各国人民革命斗争"},{"type":"paragraph","text":"新华社十日讯　亚非新闻工作者协会书记处最近就四月二十四日“亚非新闻工作者日”向亚非记协的五十三个成员组织和亚非革命的新闻工作者发表号召书。号召书根据亚非新闻工作者协会书记处第五次全体会议的总决议精神，再一次指出：毛泽东思想是我们时代最革命的理论，伟大的毛泽东思想已经成为亚洲、非洲、拉丁美洲和世界其他地区人民在反对帝国主义、现代修正主义和各国反动派的斗争中的强大思想武器和指导原则。中国无产阶级文化大革命使中国成为世界革命更加巩固的中心和堡垒，这场伟大的革命的胜利，使中国能更有效地支援世界革命。"},{"type":"paragraph","text":"号召书阐述了当前世界人民反对美帝国主义斗争的大好形势，重申亚非记协坚持反帝革命路线，坚决反对以美国为首的帝国主义、各国反动派和现代修正主义，坚决支持正在争取解放的革命人民，坚决支持各国人民的武装斗争，反对把人民拖向投降和妥协道路的一切阴谋诡计，反对在侵略者和被侵略者、帝国主义者和被奴役被剥削者之间搞“和谈”的一切阴谋诡计。"},{"type":"paragraph","text":"号召书表示，亚非新闻工作者协会将尽自己最大力量为亚非各国人民革命斗争作出贡献，并把自己作为亚非各国人民的主要宣传工具和战斗的亚非人民互相联系的工具。"},{"type":"paragraph","text":"号召书呼吁革命的亚非新闻工作者，利用今年“亚非新闻工作者日”开展各项活动，广泛地动员和团结亚非人民，全力支持越南人民反对美帝国主义侵略的正义斗争，谴责美帝国主义玩弄“和谈”伎俩，支持亚洲、非洲和拉丁美洲各国人民的武装斗争和民族解放运动，谴责苏修领导集团的叛卖行径，谴责帝国主义及其在许多国家的法西斯走狗对革命爱国新闻工作者的残酷迫害。（附图片）"},{"type":"paragraph","text":"在毛泽东思想哺育下成长起来的中国技术人员，走到那里就和那里的工人群众打成一片，在共同劳动中建立起深厚的阶级友谊。图为在索马里工作的中国技术人员同索马里工人一起劳动。　新华社稿"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7755883a4d"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
