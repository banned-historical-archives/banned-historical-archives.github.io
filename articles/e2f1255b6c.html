ors":[],"dates":[{"year":1951,"month":4,"day":24}],"is_range_date":false,"parts":[{"text":"广东部分地区春荒严重","type":"title"},{"text":"【中南总分社4月24日讯】广东高雷、兴梅、粤中等专区，春荒现象严重。高雷区今春特寒，耕牛被冷死3千余头，农作物亦因冷死失收。现已发现有饿死人的现象。全区缺粮30余万担，缺种籽5万担。兴梅区去年欠收10％，而农民负担却较1949年增加两倍，该区现缺口粮、种籽约20万担。粤中区亦发现不少因饥荒而自杀、饿死人的现象。","type":"paragraph"},{"text":"针对以上情况，该省省府已拨发了5千2百万斤米的农贷和救济米。各专区业已进行了有计划地发放。目前有些地区已基本上解决了农民春荒和春耕中的困难。","type":"paragraph"}],"comments":[],"origin":"新华社《内部参考》1951年5月2日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e2f1255b6c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
