<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"人民公敌、窃国大盗、民族罪人被永远钉在历史耻辱柱上遗臭万年特别法庭代表人民意志宣判江青等十名主犯江青、张春桥被判处死刑，缓期二年执行，剥夺政治权利终身　王洪文、姚文元、陈伯达、黄永胜、吴法宪、李作鹏、邱会作、江腾蛟被分别判处无期徒刑或有期徒刑","authors":[],"dates":[{"year":1981,"month":1,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京一月二十五日电　最高人民法院特别法庭今天判处江青、张春桥死刑，缓期二年执行，剥夺政治权利终身；判处王洪文无期徒刑，剥夺政治权利终身。"},{"type":"paragraph","text":"特别法庭还判处:姚文元有期徒刑二十年，剥夺政治权利五年；陈伯达有期徒刑十八年，剥夺政治权利五年；黄永胜有期徒刑十八年，剥夺政治权利五年；吴法宪有期徒刑十七年，剥夺政治权利五年；李作鹏有期徒刑十七年，剥夺政治权利五年；邱会作有期徒刑十六年，剥夺政治权利五年；江腾蛟有期徒刑十八年，剥夺政治权利五年。"},{"type":"paragraph","text":"至此，经过两个月零五天的审理，林彪、江青反革命集团终于受到国家法律的制裁。"},{"type":"paragraph","text":"上午九时，特别法庭庭长江华宣布开庭后，江青等十名主犯一个个被押送到被告席上。这些祸国殃民的罪人，今天的神态都显得格外紧张。当法庭宣布判处江青和张春桥死刑时，法警当即给这两个罪犯带上了手铐。这时，江青等罪犯的脸色变得苍白，旁听席上人们则喜形于色，满面笑容。"},{"type":"paragraph","text":"在宣判快要结束时，江青胡乱叫喊，破坏法庭秩序，主持审判活动的副庭长伍修权当即命令法警把带着手铐的江青押出法庭。坐在旁听席上的人们，看到江青那副狼狈相和可耻的下场，再也控制不住内心的喜悦，顾不得法庭守则，热烈地鼓起掌来。"},{"type":"paragraph","text":"由江华庭长宣读的特别法庭判决书确认，林彪、江青反革命集团的犯罪活动，前后共达十年之久，殃及全国各个地区各个领域，使我国人民民主专政制度和社会主义的社会秩序受到特别严重的危害，使国民经济和其他各项事业遭到极其严重的破坏，给各族人民带来极大的灾难。"},{"type":"paragraph","text":"判决书在详细列举江青等十名主犯的犯罪事实和应负的刑事责任时指出，江青是林彪、江青反革命集团的首要分子。江青对她所组织、领导的反革命集团在十年动乱中危害中华人民共和国、颠覆政府、残害人民的罪行，都负有直接或间接的责任，对国家和人民危害特别严重、情节特别恶劣。张春桥同江青一起组织、领导反革命集团。在十年动乱中，张春桥是向人民民主政权实行夺权的肇始者和自始至终的煽动者、策划者，对国家和人民造成了极其严重的危害。"},{"type":"paragraph","text":"判决书宣布，本判决为终审判决。判处有期徒刑的被告人的刑期，自判决执行之日起计算，判决执行以前羁押的日期，以羁押一日折抵刑期一日。"},{"type":"paragraph","text":"江华宣读完判决书后，传令将罪犯押下去交付执行。"},{"type":"paragraph","text":"十时五十分，江华宣布特别法庭闭庭，参加旁听的一千二百多名代表热烈鼓掌，表示拥护特别法庭的正义判决。"},{"type":"paragraph","text":"今天出庭的还有:特别法庭副庭长曾汉周、黄玉昆和全体审判员；"},{"type":"paragraph","text":"最高人民检察院特别检察厅厅长黄火青，副厅长喻屏、史进前和全体检察员。"},{"type":"paragraph","text":"为有关罪犯作辩护的律师也出席了今天法庭的宣判。"},{"type":"paragraph","text":"最高人民法院特别法庭对林彪、江青反革命集团案主犯的审理，是从去年十一月二十日开始进行的。在四十二次法庭调查和辩论中，有四十九名证人和被害人出庭作证。法庭还对各种证据八百七十三件进行了审查。"},{"type":"paragraph","text":"来自各省、自治区、直辖市和中共中央机关、中央国家机关、人民团体、民主党派和中国人民解放军的代表共六万多人次，先后旁听了法庭的审判。"},{"type":"paragraph","text":"\u003cIMG alt=请插入7号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1981\\01\\811Q010101.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e江华庭长宣读《中华人民共和国最高人民法院特别法庭判决书》。"},{"type":"paragraph","text":"新华社记者摄(传真照片)\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入7号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1981\\01\\811Q010102.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e最高人民法院特别法庭一月二十五日继续开庭，对林彪、江青反革命集团十名主犯进行宣判。"},{"type":"paragraph","text":"新华社记者摄(传真照片)\u003c/FONT\u003e"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"吴法宪","type":"人物"},{"name":"江青","type":"人物"},{"name":"陈伯达","type":"人物"},{"name":"姚文元","type":"人物"},{"name":"王洪文","type":"人物"},{"name":"张春桥","type":"人物"},{"name":"李作鹏","type":"人物"},{"name":"林彪","type":"人物"},{"name":"黄永胜","type":"人物"},{"name":"邱会作","type":"人物"},{"name":"夺权","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dba9d123f9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
