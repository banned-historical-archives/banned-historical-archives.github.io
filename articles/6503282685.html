rt":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"向工人阶级学习搞好教育革命某部参加驻北京大学工人毛泽东思想宣传队一团的成员，拜工人群众为师，认真落实毛主席最新指示","authors":[],"parts":[{"type":"paragraph","text":"本报讯 某部参加驻北京大学工人毛泽东思想宣传队一团的成员，遵照毛主席关于“工人阶级是领导阶级”的伟大教导，拜工人阶级为师，虚心向工人阶级学习，尊重、支持和维护工人阶级的领导，和工人同志一起认真搞好学校的斗、批、改。"},{"type":"paragraph","text":"毛主席教导我们：“实现无产阶级教育革命，必须有工人阶级领导”。这个团的部队成员，把同工人同志一起宣传毛泽东思想，当作莫大的光荣和最好的学习机会。他们在同工人同志的并肩战斗中，深深体会到，工人阶级对毛主席最亲，对毛主席革命路线最忠，跟毛主席战略部署最紧，毛泽东思想用得最活。工人同志在落实毛主席一系列最新指示的过程中，废寝忘食，不辞辛苦，事事坚持毛泽东思想挂帅，用毛泽东思想领导一切的先进事迹，给了部队同志很大的教育。一次，部队同志和工人同志一道去参加一个班的革命大联合协商会议。开始，两派互相攻击，不愿联合。工人同志就向他们热情宣传毛泽东思想。工人同志说：“‘革命的红卫兵和革命的学生组织要实现革命的大联合’。这是毛主席的指示，必须坚决执行，坚决照办。千条理，万条理，不实现革命大联合就没有理：不按毛主席的指示办事，就是对伟大领袖毛主席不忠。”在工人同志对毛主席无限深厚的无产阶级感情的感染下，两派学生当场以实际行动向工人阶级学习，主动亮私斗私，削平山头，迅速实现了革命大联合。部队同志被工人同志热情宣传毛泽东思想的精神所感动，他们说：“工人同志心红眼亮骨头硬，毛泽东思想水平非常高，说出的话叫人口服心服。在工人同志面前，我们永远是毕不了业的小学生。”为了把工人阶级的好思想、好作风、好经验学到手，部队同志制订了五学工人阶级的计划：一学工人阶级对毛主席心怀一个“忠”字；二学工人阶级对毛泽东思想突出一个“用”字；三学工人阶级彻底的革命精神；四学工人阶级高度的组织性纪律性；五学工人阶级的主人翁责任感。他们虚心向工人阶级学习，不断促进自己思想革命化。"},{"type":"paragraph","text":"工人毛泽东思想宣传队的部队同志，把宣扬工人阶级的优秀品质，看作是自己的战斗任务。他们利用各种场合，大讲特讲工人阶级的伟大作用，教育革命师生自觉接受工人阶级的领导，恭恭敬敬地当工人阶级的小学生。有的学生有轻视工人阶级的思想，部队同志就对他们耐心地进行批评帮助，组织他们学习毛主席关于“卑贱者最聪明！高贵者最愚蠢”的教导，使他们提高了认识，决心在工人阶级的领导下，彻底改造世界观，认真搞好斗、批、改。"},{"type":"paragraph","text":"部队同志虚心向工人阶级学习，和工人同志同心协力，并肩战斗，一起宣传毛泽东思想，一起调查研究，一起做深入细致的思想政治工作，保证了毛主席一系列最新指示在北京大学的落实。（本报通讯员、本报记者）"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"教育革命","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6503282685"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
