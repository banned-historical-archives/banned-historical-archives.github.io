ical-archives/banned-historical-archives0/main/maoquanji38.pdf"],"article":{"title":"关于向苏联派遣留学生、实习生问题的批语","alias":"","parts":[{"type":"paragraph","text":"关于向苏联派遣留学生、"},{"type":"paragraph","text":"实习生问题的批语!"},{"type":"paragraph","text":"（1957年4月27日）陈云同志："},{"type":"paragraph","text":"这个问题，请你与有关人员研究一下，严格控制，统一解决，并指【定〕一个机关统一管理。以后应当少派，派去的要精。已去而品格恶劣或程度太低的，可否考虑调回。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"四月廿七日"},{"type":"paragraph","text":"[1]这个批语写在中共中央组织部1957年4月18日关于我国驻苏人员的一些思想问题和留学生、实习生派遣中的一些问题的报告上。报告说，目前，我驻苏人员的思想状况，基本上是健康的，工作、学习也是积极的。但自苏共二十大和波匈事件后，在相当一部分人员（主要是留学生）中，产生了一些偏激情绪。有不少学生失去了在苏联学习的信心，要求回国学习和实习的学生增多。"},{"type":"paragraph","text":"[2]陈云，当时任中共中央副主席、国务院副总理。"}],"authors":["毛泽东"],"dates":[{"year":1957,"month":4,"day":27}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":46,"page_end":46},"tags":[{"name":"毛泽东","type":"人物"},{"name":"陈云","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dfd7b3e911"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
