张春桥主任举行宴会，欢迎柬埔寨贵宾","authors":[],"dates":[{"year":1972,"month":11,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社上海一九七二年十一月十九日讯　柬埔寨民族统一阵线中央政治局主席、王国民族团结政府首相宾努亲王和夫人，今天上午乘专车从北京到达上海进行参观访问，受到了上海市两千多群众的热烈欢迎。"},{"type":"paragraph","text":"柬埔寨国内特使英·萨利陪同宾努首相到达上海。"},{"type":"paragraph","text":"随同宾努亲王和夫人到达上海的，有柬埔寨王国民族团结政府沙林察大臣的夫人，大臣周成、江裕朗、谢桑、吉春和夫人、秀蒲拉西以及柬埔寨驻外使节。"},{"type":"paragraph","text":"上海市革命委员会主任张春桥，副主任马天水、周纯麟、金祖敏、冯国柱、王一平等，前往车站热烈欢迎柬埔寨贵宾。"},{"type":"paragraph","text":"上午十时，当宾努亲王和夫人、英·萨利特使等乘专车到达时，张春桥主任等在车站上热烈欢迎，同贵宾们亲切握手，少年儿童向贵宾们献了鲜花。欢迎的群众载歌载舞，表达中国人民对柬埔寨人民的友好情谊。"},{"type":"paragraph","text":"今天前往车站欢迎的还有中国人民解放军驻上海部队负责人申元军、瞿道文和上海市革命委员会常委黄金海、罗毅、王成龙、汪湘君、关建、杨序昭等。"},{"type":"paragraph","text":"中国驻柬埔寨大使康矛召和杨玲同志陪同贵宾到达上海。"},{"type":"paragraph","text":"今天晚上，张春桥主任举行欢迎宴会。张春桥在宴会上祝酒说:上海人民和全国人民一样，一向敬佩具有反帝斗争光荣传统的柬埔寨人民。在柬埔寨国家元首诺罗敦·西哈努克亲王和王国民族团结政府领导下，柬埔寨人民在伟大的抗美救国战争中，用自己的英勇战斗，为全世界被压迫民族和被压迫人民的反侵略斗争树立了一个光辉榜样。他祝愿柬埔寨爱国军民在抗美救国斗争中取得更大的胜利。"},{"type":"paragraph","text":"宾努首相在宴会上祝酒，向上海人民转达柬埔寨人民战友和兄弟般的感情。宾努首相谈到柬埔寨爱国军民在抗美救国战争中夺取了具有战略意义的辉煌胜利。他指出:在柬埔寨，美帝国主义和朗诺、施里玛达、山玉成卖国集团正在崩溃，走向彻底的灭亡。他说:柬埔寨民族统一阵线、柬埔寨王国民族团结政府、柬埔寨民族解放人民武装力量和全体柬埔寨人民，坚决粉碎敌人的一切阴谋诡计，他们决不放下武器，决心战斗到夺取彻底的胜利，把美帝国主义、西贡、曼谷傀儡从柬埔寨赶出去，把朗诺、施里玛达、山玉成卖国集团彻底消灭，解放柬埔寨国土，建设一个独立、主权、中立、和平、民主、繁荣和领土完整的柬埔寨。"},{"type":"paragraph","text":"宾努首相说:柬埔寨人民为有中国人民作为反对共同敌人的阵线中的最亲密战友而永远感到温暖，也为有越南、老挝、朝鲜战友和世界人民对我们坚决斗争的立场的支持而感到温暖。"},{"type":"paragraph","text":"今天下午，柬埔寨贵宾们游览了上海市容。"},{"type":"paragraph","text":"宾努首相和夫人等柬埔寨贵宾十八日途经天津和济南时，天津市革命委员会主任解学恭，第一副主任吴岱，副主任王曼恬、王元和、孙敬文，山东省革命委员会副主任张铚秀、苏毅然、穆林，济南市革命委员会主任许洪云等，曾前往车站登车问候。"},{"type":"paragraph","text":"\u003cIMG alt=请插入6号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1972\\11\\72bk010101.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e宾努首相和夫人、英·萨利特使等柬埔寨贵宾，由张春桥主任等陪同步出车站时，受到上海市群众的热烈欢迎。　新华社记者摄\u003c/FONT\u003e"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"张春桥","type":"人物"},{"name":"天津文革","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6c6089c960"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
