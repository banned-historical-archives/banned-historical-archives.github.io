tes":[{"year":1978,"month":12,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"中央代表团亲切慰问广西各族群众"},{"type":"paragraph","text":"十二月十五日，中央代表团团长韦国清、副团长杨静仁来到南宁手扶拖拉机厂，亲切慰问战斗在第一线的干部、工人和技术人员。韦国清团长勉励他们要一心一意搞四个现代化，树立赶超国内外先进水平的雄心壮志和勇气。"},{"type":"paragraph","text":"新华社记者  赵天聘摄"},{"type":"paragraph","text":"十二日，卓琳副团长在南宁会见了红七军、红八军总指挥李明瑞烈士的夫人罗昭仪（右一）、韦拔群烈士的妹妹韦武丁等，代表邓小平副主席向烈属们问好。"},{"type":"paragraph","text":"新华社记者  赵天聘摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"广西文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8e73d1c1e1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
