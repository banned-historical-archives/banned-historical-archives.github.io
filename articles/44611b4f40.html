script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"革命群众斗争风起云涌　资产阶级政党争吵不休  意大利政局继续动荡不定  鲁莫尔费尽力气拼凑新班子至今未成","authors":[],"dates":[{"year":1969,"month":7,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"革命群众斗争风起云涌　资产阶级政党争吵不休"},{"type":"paragraph","text":"意大利政局继续动荡不定"},{"type":"paragraph","text":"鲁莫尔费尽力气拼凑新班子至今未成"},{"type":"paragraph","text":"据新华社二十一日讯　罗马消息：意大利鲁莫尔政府倒台半个月以来，群众斗争风起云涌，各资产阶级政党争吵不休，政局继续处于激烈的动荡之中。"},{"type":"paragraph","text":"由天主教民主党、统一社会党和共和党联合组成的鲁莫尔政府，是在意大利政治经济危机不断加深，群众斗争日益高涨，统治集团内部爆发剧烈争吵的形势下，在七月五日垮台的。"},{"type":"paragraph","text":"最近以来，意大利前总理鲁莫尔接受总统萨拉盖特的委托，奔走于各资产阶级政党之间，力图赶快拼凑出一个新班子。意修领导集团也迫不及待地发表声明，拚命要挤进政府。可是，据西方通讯社报道，尽管鲁莫尔费尽了九牛二虎之力，至今仍然未能弥合各资产阶级政党之间的严重分歧，新班子迟迟拼凑不起来。"},{"type":"paragraph","text":"与此同时，意大利广大受压迫和受剥削的劳动人民，为了反对垄断资产阶级的反动统治，掀起了一浪高过一浪的群众斗争。在鲁莫尔政府倒台前夕，意大利北部都灵市的六十万产业工人举行大罢工，罢工工人同警察进行了十小时的激烈的街垒战。热那亚三万钢铁工人也在十日举行罢工。在灾难深重的意大利南方，数十万农业工人半个多月来一直在坚持斗争，他们在几十个农业中心举行了声势浩大的示威游行，占领了许多城市的市政厅和大批农场的产业。意大利南部许多城市的工人也举行了总罢工。"},{"type":"paragraph","text":"在政局动荡，人民斗争高涨的形势下，意大利的垄断资本家纷纷向国外转移财产。据意大利资产阶级报刊报道，拥有大量财产的罗马教皇，已经把他的部分贵重财产运出意大利。据意大利官方的数字，今年第一季度意大利资本外流的数量比去年同期增加了一倍，达四千七百一十亿里拉，“非法”外流的资本还不在内。鲁莫尔政府垮台后，意大利股票价格猛烈下降。这些都充分反映了资产阶级惶恐不安的心情。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"44611b4f40"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
