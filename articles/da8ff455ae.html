修武器  世界共产党人应该深入学习中国文化大革命的新经验","authors":[],"dates":[{"year":1966,"month":10,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"乌拉圭左派革命运动机关报热烈赞扬我国文化大革命"},{"type":"paragraph","text":"文化大革命是比原子弹更强大的反帝反修武器"},{"type":"paragraph","text":"世界共产党人应该深入学习中国文化大革命的新经验"},{"type":"paragraph","text":"新华社二十四日讯　蒙得维的亚消息：乌拉圭左派革命运动机关报《起义之声报》最近发表文章，热烈赞扬中国无产阶级文化大革命“是比原子弹更强大的反对帝国主义和修正主义的武器”，“是任何事物、任何人都阻挡不了的”。"},{"type":"paragraph","text":"文章说：“中国无产阶级文化革命，是世界社会主义革命历史进程中一个空前未有的事物”，“是中国社会主义革命的组成部分”，“也是马克思列宁主义者和各国革命人民同帝国主义斗争的产物”。"},{"type":"paragraph","text":"文章赞扬中国红卫兵是青年学生在党的领导下自己建立起来进行社会主义文化大革命的组织。"},{"type":"paragraph","text":"文章引述毛主席关于无产阶级专政、关于阶级斗争的论述，痛斥现代修正主义者取消无产阶级专政和阶级斗争的谬论。文章说，现代修正主义“关于社会主义社会阶级和阶级斗争熄灭的虚假的观念，导致取消无产阶级专政，使得资产阶级分子有可能重新取得政权，由社会主义退化到资本主义去。中国无产阶级文化革命是充分考虑到这些情况的，它的锋芒所向，就是在上层建筑意识形态领域坚决反对资产阶级倾向”。"},{"type":"paragraph","text":"文章揭露和谴责了帝国主义同现代修正主义一唱一和攻击中国的无产阶级文化大革命。文章说，中国无产阶级文化大革命采取群众路线，尊重群众的首创精神，现代修正主义者被这种群众运动吓坏了，他们“害怕革命，反对革命”。"},{"type":"paragraph","text":"文章强调说：“中国人民展开了这场规模壮阔的无产阶级文化革命。全世界共产党人应该深入学习这一新经验，并在最广泛的人民群众中进行宣传。这一无产阶级文化革命是比原子弹更强大的反对帝国主义和修正主义的武器，它体现了决心建设新世界、扫除旧事物的亿万人的革命觉悟。这一向共产主义的迅猛前进的运动，是任何事物、任何人都阻挡不了的。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"da8ff455ae"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
