"year":1986,"month":10,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"现代西方哲学不等于现代资产阶级哲学"},{"type":"paragraph","text":"马积华在上海《社会科学报》发表文章指出，“现代西方哲学”的概念不仅包括现代资产阶级哲学，而且包括马克思主义哲学在现代西方的发展。作者认为，造成把现代西方哲学归结为现代资产阶级哲学的流行观念的原因，大致有以下几点。第一，混同了“近代西方哲学”和“现代西方哲学”这两个概念。近代哲学史确实是西方资产阶级哲学产生和发展的历史，现代西方哲学史则不然。自从十九世纪中叶马克思主义产生以来，就结束了资产阶级哲学在欧美各国一统天下的局面，尤其是十月革命以后，马克思主义获得了广泛的传播和发展。"},{"type":"paragraph","text":"第二，混同了西方的政治经济制度和西方文化的区别。我们惯于把西方资本主义社会称为西方社会，但是现代西方文化并不能和资产阶级文化划等号。"},{"type":"paragraph","text":"第三，受不切实际的传统观念的影响。有这样一种传统观念，即往往把一些具有独创性，反对把马克思主义简单化、绝对化、教条化然而又有某些理论错误的马克思主义者视作异端。这样一来，马克思主义在西方似乎“断了线”，无人传播、继承和发展。这种观念并不切合实际。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9f23037fd1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
