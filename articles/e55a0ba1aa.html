year":1965,"month":3,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"一、越学越热爱我们伟大的党和毛主席。"},{"type":"paragraph","text":"二、越学越能深刻理解党的政策和正确执行党的政策。"},{"type":"paragraph","text":"三、越学是非越明，界限越清，越不会迷失方向。"},{"type":"paragraph","text":"四、越学越不会忘记过去的苦，越学越热爱今日的甜。"},{"type":"paragraph","text":"五、越学越知道工作的意义，热爱自己的工作。"},{"type":"paragraph","text":"六、越学越感到眼光远大，干劲越足。"},{"type":"paragraph","text":"七、越学越感到工作有办法。"},{"type":"paragraph","text":"八、越学越看到光明的前途，越不怕困难。"},{"type":"paragraph","text":"九、越学越能搞好团结。"},{"type":"paragraph","text":"十、越学越感到不足，便越想学。"},{"type":"paragraph","text":"——摘自丰福生学习心得"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e55a0ba1aa"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
