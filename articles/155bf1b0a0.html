ical-archives/banned-historical-archives0/main/maoquanji30.pdf"],"article":{"title":"转发华东局关于镇反应注意之点的电报的批语","alias":"","parts":[{"type":"paragraph","text":"转发华东局关于镇反应注意之点的电报的批语"},{"type":"paragraph","text":"（1951年1月24日）子恢，剑英，小平，仲勋，一波，高岗叫同志："},{"type":"paragraph","text":"华东局给福建省委电所说肃反应注意之点，我以为是对的。即为了打落敌焰，伸张民气，对匪首惯匪恶霸及确有证据的重要特务和会门头子，应当放手杀几批。为了不致弄错，使自已陷于被动，对尚无证据的特务及会门头子，应当进行侦察，取得确证，而不要随便捕人杀人。分清这两种情况的界限是必要的，请你们转知所属注意为盼。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一月廿四日"},{"type":"paragraph","text":"[1]子恢，即邓子恢，当时任中共中央中南局第三书记。剑英，即叶剑英，当时任中共中央华南分局第一书记。小平，即邓小平，当时任中共中央西南局第一书记。仲勋，即习仲勋，当时任中共中央西北局第一书记。一波，即薄一波，当时任中共中央华北局第一书记。高岗，当时任中共中央东北局书记。"}],"authors":["毛泽东"],"dates":[{"year":1951,"month":1,"day":24}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":69,"page_end":69},"tags":[{"name":"毛泽东","type":"人物"},{"name":"高岗","type":"人物"},{"type":"文稿类型","name":"批示"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"155bf1b0a0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
