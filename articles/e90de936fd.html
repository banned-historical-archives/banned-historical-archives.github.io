art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"江青的“尊女卑男”","authors":["常巧章〖HH/换行〗DW：昆明部队军政干校"],"parts":[{"type":"paragraph","text":"“四人帮”很是大喊过一阵“批孔”的。江青摆出“对着干”的架式：你孔丘搞“男尊女卑”，我便来个“尊女卑男”。嚷嚷着“男的要让位，女的来管理”，并说“共产主义也有女皇”哩！"},{"type":"paragraph","text":"可也怪。叫喊着“尊女”，对身边的女服务员却丝毫不尊，开口就骂，伸手即打。女文艺工作者孙维世只因知道江氏一点底细，竟被残害至死。反对“尊男”吗？蒋介石不是男的么？为他祝寿的丑剧演得多上劲！“四人帮”里的汉子们，她非但不反，还引以为耀：“我和春桥、文元是一派的。”"},{"type":"paragraph","text":"江青的“尊女”，不过是为篡党夺权打出来的一个幌子罢了。其实，她的原则，是反动者则尊，进步者则伐，管它是男还是女！"}],"alias":""},"tags":[{"name":"江青","type":"人物"},{"name":"四人帮","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e90de936fd"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
