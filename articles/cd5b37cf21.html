《修养》这株大毒草","authors":["韩帮友"],"dates":[{"year":1967,"month":4,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　日夜战斗在黄海前哨的解放军某部广大指战员，连日来纷纷召开声讨大会和座谈会，坚决打倒党内最大的走资本主义道路的当权派，把他拉下马，要他靠边站；坚决批深批透批臭反对毛泽东思想、反对毛主席革命路线的大毒草《修养》，不获全胜，决不收兵!"},{"type":"paragraph","text":"在座谈会上，某部政治指导员李发久激动地说，《红旗》杂志评论员和戚本禹同志的文章敲响了党内最大的走资本主义道路当权派的丧钟，说出了我们每一个革命战士的心里话，我们一千个拥护，一万个赞成。我军是毛主席亲手缔造的人民军队，谁反对毛泽东思想，我们就和他拚，谁拥护毛泽东思想，我们就和他亲。我们要和全国革命群众、革命干部肩并肩、心连心地团结战斗在一起，彻底打倒党内头号走资本主义道路的当权派，叫他永世不得翻身。"},{"type":"paragraph","text":"某部学习毛主席著作积极分子、共产党员姚树禹愤怒地说:“口口声声自称为‘老革命’的党内最大的走资本主义道路的当权派，实际上是老反革命，是埋藏在我们党内的定时炸弹，是中国的赫鲁晓夫，是修正主义的总后台。他企图用大毒草《修养》这本黑书来为他复辟资本主义制造舆论准备，这简直是痴心妄想!我们一定要高举毛泽东思想的千钧棒，彻底批透批臭这本黑书，肃清它的恶劣影响，让光焰无际的毛泽东思想永远放射出灿烂的光芒。”"},{"type":"paragraph","text":"广大指战员在声讨会上和座谈会上一再强烈地表示一定要进一步高举毛泽东思想的革命批判旗帜，积极投入战斗，誓死保卫毛主席，誓死捍卫毛主席的革命路线，坚决支持革命左派、支援工农业生产，把无产阶级文化大革命进行到底!同时要进一步活学活用“老三篇”和《关于纠正党内的错误思想》，破私立公，为捍卫毛主席的革命路线作出新的贡献。　(韩帮友)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cd5b37cf21"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
