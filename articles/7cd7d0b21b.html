光辉照耀下　苏联人民必将彻底埋葬苏修叛徒集团","authors":[],"dates":[{"year":1967,"month":12,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"马来亚《人民论坛》说中国文化大革命鼓舞苏联人民走向革命的道路"},{"type":"paragraph","text":"在马列主义毛泽东思想的光辉照耀下"},{"type":"paragraph","text":"苏联人民必将彻底埋葬苏修叛徒集团"},{"type":"paragraph","text":"新华社十四日讯　新加坡消息：在新加坡出版的马来亚报纸《人民论坛》在最近发表的纪念伟大的十月社会主义革命五十周年的文章中指出，经受了伟大的十月社会主义革命考验，经受了伟大的反法西斯卫国战争考验的苏联人民，在马克思列宁主义、毛泽东思想的光辉照耀下，终将会把苏修集团彻底埋葬。"},{"type":"paragraph","text":"文章说：“由列宁领导的伟大的十月社会主义革命的成果，已断送在赫鲁晓夫、勃列日涅夫、柯西金一伙人之手；千百万苏联布尔什维克和苏联人民为之流血牺牲的无产阶级革命事业，被这一伙反革命修正主义分子彻底出卖，这是多么惨痛的大倒退啊！苏修集团篡党篡政篡军的严重事件，是无产阶级革命与无产阶级专政史上一件极其严重的事件，是一项极其重要的历史教训。”"},{"type":"paragraph","text":"文章说：“伟大的革命导师毛泽东，天才地总结了无产阶级革命与无产阶级专政的历史经验，总结了苏联革命的经验，提出了一整套防止修正主义，防止资本主义在社会主义国家内复辟的理论和政策。这是具有划时代意义的伟大创举，这是对马克思列宁主义的极其重要的发展，是社会主义国家无产阶级巩固政权、防止修正主义、防止资本主义复辟的最锐利的武器。”"},{"type":"paragraph","text":"文章指出，在伟大的毛泽东思想的光辉照耀下，苏联的真正的布尔什维克也在组织自己的力量，积蓄革命力量，准备彻底埋葬恶贯满盈的苏修集团。"},{"type":"paragraph","text":"文章说：伟大的毛泽东思想和史无前例的中国无产阶级文化大革命，正在唤醒越来越多的苏联人民，鼓舞和引导他们走向革命的道路。伟大的列宁和斯大林的光辉是苏修集团熄灭不了的。尽管苏修集团千方百计地阻挠毛泽东思想在苏联的传播，但是，毛泽东思想已日益深入苏联人民的心中，这是苏修集团绝对阻止不住的。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7cd7d0b21b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
