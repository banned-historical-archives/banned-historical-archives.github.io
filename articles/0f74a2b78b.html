ical-archives/banned-historical-archives8/main/maoquanji10.pdf"],"article":{"title":"向南京方面要求增加防地","alias":"","parts":[{"type":"paragraph","text":"向南京方面要求增加防地！"},{"type":"paragraph","text":"（1937年2月14日）周："},{"type":"paragraph","text":"甲、立即派飞机来接伯承"},{"type":"paragraph","text":"乙、借十五军团北调允许增加防地之机会，要求金积、灵武、中宁、豫旺、清涧、宜川六县及安边地区（包括宁条梁及靖边以北）与瓦窑堡。此外无定河下流两岸直至黄河，包括河口、川口、马灰坪、枣林坪一带原有苏区，现驻李仙洲?部须退出。"},{"type":"paragraph","text":"丙、宁夏及整个陕北亦应提及，但可将来再商。"},{"type":"paragraph","text":"丁、蒋\"指定凉州以西，甘州府、肃州府\"及安西州所有各县在内。"},{"type":"paragraph","text":"[1]这是毛泽东给周恩来的电报。[2]伯承，即刘伯承，当时任红军总参谋长。[3]金积，旧县名，1960年撤销，辖区裁入宁夏吴忠、青铜峡二市。[4]豫旺，旧县名，即今宁夏同心县。[5]瓦窑堡，镇名，今为陕西子长县县治。[6]李仙洲，当时任国民党军第二十一师师长。[7]蒋，指蒋介石。[8]凉州，旧府名，即甘肃武威。[9]甘州府、肃州府，均为旧府名，即甘肃张掖和酒泉。"},{"type":"paragraph","text":"戊、西路军待春暖以一部占安西州，接取货物，主力在甘肃二州地区，但须马\"部退出该地。"},{"type":"paragraph","text":"己、以上请斟酌办法。"},{"type":"paragraph","text":"毛十四日二时"}],"authors":["毛泽东"],"dates":[{"year":1937,"month":2,"day":14}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":192,"page_end":193},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0f74a2b78b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
