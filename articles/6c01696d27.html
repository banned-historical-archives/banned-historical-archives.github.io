:[{"year":1972,"month":10,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京一九七二年十月十八日电　军委副主席叶剑英、国务院副总理李先念、北京市革命委员会主任吴德、国家计委主任余秋里、外贸部副部长李强、外交部副部长余湛等，今天下午参观了意大利工业展览会。"},{"type":"paragraph","text":"意大利驻中国大使特拉巴扎，意大利工业展览团团长帕斯夸莱·耶马、副团长罗塞托·卡布里埃莱，陪同参观。"},{"type":"paragraph","text":"参观过程中，叶剑英副主席、李先念副总理等询问了展品的情况，并同特拉巴扎大使、耶马团长进行了友好的谈话。"},{"type":"paragraph","text":"前往参观的还有徐斌洲、徐今强、杨殿奎、李西夫、王栋、韩叙、邢仁先、孔凡政等有关方面负责人。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"吴德","type":"人物"},{"name":"李先念","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6c01696d27"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
