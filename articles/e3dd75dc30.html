art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席是当代最伟大的革命领袖","authors":[],"parts":[{"type":"paragraph","text":"据新华社萨那二日电 不久以前，中国民间歌舞团带着七亿中国人民的深情厚谊来到红海之滨的阿拉伯也门共和国。在歌舞团访问演出期间，也门广大人民用各种方式表达了他们对毛泽东主席的热爱。"},{"type":"paragraph","text":"在歌舞团访问期间，无论那一场演出，只要一听到毛主席这亲切的名字，观众就响起暴风雨般的掌声。在塔伊兹的一次演出结束后，一位名叫拉赫曼的观众激动地朝着台上连声高呼“毛泽东万岁！”他告诉中国朋友：“我热爱毛泽东，因为毛泽东是世界革命人民的领袖。”另一位也门朋友说：“大海航行靠舵手，中国人民前进靠毛泽东。”有一位名叫阿里·海菲的学生说：“在毛泽东的领导下的中国人民为世界人民的斗争树立了榜样。”在也门，到处都可以听到这样热情洋溢的话：“毛主席是当代最伟大的领袖”，“毛主席不仅是中国人民的伟大领袖，也是世界人民的伟大领袖”，“毛主席是所有要求解放的人民的领袖”，“祝毛泽东主席万寿无疆”。"},{"type":"paragraph","text":"许多也门朋友都以能有一枚刻有毛泽东象的纪念章而感到自豪，他们认为这是最有意义的纪念品。一位名叫阿卜杜·阿里·赛义德的也门朋友在得到一枚毛主席象的纪念章时，高兴地说：“这是伟大的象征，我要永远戴着它。”"},{"type":"paragraph","text":"还有好多人，看了演出之后，向中国朋友要《毛泽东选集》。他们说，中国民间歌舞团的演出，使他们对毛泽东思想有很深的体会。他们现在需要的是读毛主席的书。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e3dd75dc30"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
