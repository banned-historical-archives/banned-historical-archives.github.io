script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji39","name":"毛泽东全集第39卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji39.pdf"],"article":{"title":"给滕代远的信","alias":"","parts":[{"type":"paragraph","text":"给滕代远的信"},{"type":"paragraph","text":"（1958年3月22日）滕代远同志："},{"type":"paragraph","text":"铁道文件？，还宜作些补充，才有充分说服力。例如：每一条路为什么非修不可的理由，它的经济价值，有些是国防价值或政治价值；八万公里需要用多少钱，有无可能，每一个五年各需用多少钱，有无可能；铁道系统如何反教条主义。这些宜一起写进去，可"},{"type":"paragraph","text":"[1]滕代远，当时任铁道部部长。"},{"type":"paragraph","text":"[2]指铁道部党组向成都会议提交的文件，包括铁道部党组1958年3月14日《关于全国铁路十五年（一九五八年至一九七二年）新线发展规划的说明》和滕代远1958年3月20日给毛泽东并中央的报告《建成四通八达的全国铁路网，促进社会主义建设的全面发展》。报告说，旧中国在73年内仅修筑过2.5万公里铁路，不仅数量少，分布也极不平衡。建国以后，为迅速改变铁路的落后面貌，在恢复原有铁路的同时，于1950年就开始新建铁路，到1957年年底，全国已经通车的铁路总长度增加到近3万公里。但我国地大物博，人口众多，只有3万公里铁路是太少了。根据中央关于在优先发展重工业的基础上工业与农业并举、沿海与内地兼顾的建设方针，为适应自前全国工农业生产和建设大跃进的形势，铁道部党组反复研究了新建铁路的规划，要求在第二个五年计划期间修建新线2万公里，第三、第四两个五年计划期内各修3万公里，十五年共修建8万公里新线，到1972年，全国铁路总长度将达到11万公里，仅次于美国和苏联，在世界上从第十一位跃至第三位。这些文件作为成都会议文件在会上印发。"},{"type":"paragraph","text":"给滕代远的信以在回京后，跟一些同志研究之后，再行改写，不惜反复修改。三张图印得不大好，地名字太小，又不明显，有些地名看不清楚。三图现退还，请你用黑墨水笔在偏僻地名上重写出看得清楚的字，于本日下午交我。熟习的地名不要重写。"},{"type":"paragraph","text":"毛泽东三月廿二日上午七时"}],"authors":["毛泽东"],"dates":[{"year":1958,"month":3,"day":22}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":126,"page_end":127},"tags":[{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fdf559cc44"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
