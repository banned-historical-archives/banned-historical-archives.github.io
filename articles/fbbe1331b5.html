authors":["章士钊"],"dates":[{"year":1968,"month":6,"day":11}],"is_range_date":false,"parts":[{"text":"章士钊为康心如之子蒙冤事给周恩来的第一封申诉信","type":"title"},{"text":"章士钊","type":"authors"},{"text":"恩来总理：","type":"appellation"},{"text":"今又有一事上渎于公。四川康心如、心之兄弟，公所习知。在文化大革命中，该兄弟为冲击对象，自不待言。经过两年之困心衡虑，不幸心之于半年前体不从心，先行淹殁；而心如奄奄一息，展转床褥，加以其子国雄，横遭蒋贼义儿之诬，禁不起老牛舐犊之忧虑，病上加病，又复祸不单行，小将们忽有康某为官僚资产阶级之谴责。因此不胜恐惧，致函于钊，求为转达  崇阶。冀在万死之中冲出一条生路。情节原件俱载，恕不亲缕。惟","type":"paragraph"},{"text":"公怜而生之，无任为友呼吁之至。仓猝不尽百一。顺颂","type":"appellation"},{"text":"政绥","type":"appellation"},{"text":" 具名六八年六月十一日","type":"paragraph"},{"text":"闻市革委会第九处专管各学校事可否将康函交该处一查之  酌定","type":"appellation"},{"text":"又及","type":"paragraph"}],"comments":[],"origin":"康国雄口述、何蜀整理《我的罪名：蒋介石的干儿子——陪都金融大亨康心如之子康国雄的传奇人生》，中共党史出版社，2005年1月第一版。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fbbe1331b5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
