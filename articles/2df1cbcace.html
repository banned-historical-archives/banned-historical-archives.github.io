吕庆仕","周尧","康清","西北农学院","谭克川","金宗仪"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"关于抗美援朝的右派言论","type":"title"},{"text":"西北农学院周尧康清吕庆仕谭克川金宗仪","type":"authors"},{"text":"1．在板门店和谈时，美帝向我军阵地侵犯，我军给予了回击，周尧说：“共产党真厉害，一边谈判一边还要扩展地盘！”(植保系教授　周尧)","type":"paragraph"},{"text":"2．“美帝国主义在我国四周布置了导弹基地，一旦他们认为有把握时，就会给我们一个措手不及，把我们毁灭掉。”“我不想去北京，东北做事，是害怕世界大战起来受轰炸。”","type":"paragraph"},{"text":"3．“全国性的物资供应紧张和‘提出正确处理人民内部矛盾’是由于国际局势紧张的缘故，政府一再说国际局势进一步趋向缓和，这是假的。”(农机系教师  康清)","type":"paragraph"},{"text":"4．“志愿军没啥了不起的，反正甲打胜了乙败，乙胜了甲败，什么侵略不侵略者。”(植60级学生  吕庆仕)","type":"paragraph"},{"text":"5．“支援埃及问题没有签名，这是形式，中国不可能出兵，党是为了在国际上争威信，是有意加强他们的矛盾。”(农60级学生　谭克川)","type":"paragraph"},{"text":"6．对抗美援朝运动不满。“战争的怒火已经燃烧在鸭绿江，共产党为什么要用这么多物力人力援助朝鲜呢？”(林60级学生　金宗仪)","type":"paragraph"},{"text":" 来源：《西北农学院右派言论及错误言论汇集》(西北农学院马列主义教研组编印，1957年12月)。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"人民内部矛盾","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2df1cbcace"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
