uthors":[],"dates":[{"year":1977,"month":9,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"吴奈温总统离京赴朝鲜访问"},{"type":"paragraph","text":"邓小平副总理、邓颖超副委员长等到机场欢送缅甸贵宾"},{"type":"paragraph","text":"新华社一九七七年九月二十日讯　缅甸联邦社会主义共和国总统兼国务委员会主席吴奈温，圆满结束了对我国的顺道友好访问，今天下午乘专机离开北京前往朝鲜民主主义人民共和国访问。"},{"type":"paragraph","text":"到机场欢送缅甸贵宾的有国务院副总理邓小平，人大常委会副委员长邓颖超，外交部部长黄华、副部长韩念龙，中国人民解放军副总参谋长李达，外贸部副部长周化民，外经部副部长石林，轻工业部副部长杜子端，北京市革委会副主任郑天翔等。"},{"type":"paragraph","text":"在飞机舷梯旁，中缅两国朋友亲切握手告别。邓小平副总理祝吴奈温总统一路顺风，身体健康。吴奈温总统对这次在北京受到的友好接待再次表示感谢。"},{"type":"paragraph","text":"缅甸驻中国大使馆临时代办吴钦貌温，朝鲜民主主义人民共和国驻中国大使全明洙，也到机场送行。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"10f2f61eef"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
