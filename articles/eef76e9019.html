林"],"dates":[{"year":1967,"month":10,"day":24}],"is_range_date":false,"parts":[{"text":"被捕七周年致母亲","type":"title"},{"text":"林昭","type":"authors"},{"text":"妈妈：","type":"appellation"},{"text":"今天是什么日子你记得么？今天是我被捕的整整七周年!七年以前的那个夜晚，当你看见我被他们戴上手铐时，你哭了。尽管在自己的战斗生涯里碰上同样的考验时刻你并不哭。","type":"paragraph"},{"text":"别为我伤心，亲爱的妈妈，烈火炼真金呢！归根结底我是在天父的手里却不在他们魔鬼的手里！","type":"paragraph"},{"text":"今天我过得很平静，毫无多余的感伤因为用不着！就从被捕这一天起我在他们共产党人面前公开了自己之作为反抗者的身份并且公开坚持我之反共抗暴的自由战士基本立场，从这一点上来说，不但我自己别无退步，而且我与他们之间也决无两全！基督亲兵的仁心爱德仅只对于灵魂却不能对于罪恶！天父引领我看清自己的战斗道路！","type":"paragraph"},{"text":"我真有满腹战斗的豪情欲抒，但就这几句也还不知道你得到那会儿才看见；也许在展览会上？一笑！","type":"paragraph"},{"text":"我要见你！我的妈妈，我要见你！","type":"paragraph"},{"text":" 昭儿主历一九六七年十月二十四日","type":"paragraph"},{"text":"附：","type":"subtitle"},{"text":"被捕七周年口号","type":"subtitle"},{"text":"被捕七年，岁月云烟！","type":"paragraph"},{"text":"家国在怀，兴亡在肩！","type":"paragraph"},{"text":"刚肠嫉恶，一往无前！","type":"paragraph"},{"text":"大义凛冽，大节皎然！","type":"paragraph"},{"text":"真金入火，何惧赤（*毒？）炎？","type":"paragraph"},{"text":"金是火炼，火炽金显！","type":"paragraph"},{"text":"孤军力战，碧血日鲜！","type":"paragraph"},{"text":"心悲气壮，意决志坚！","type":"paragraph"},{"text":"公道为旨，正义当先！","type":"paragraph"},{"text":"有我无敌，岂计生全！","type":"paragraph"},{"text":"中华民国，缔造维艰；","type":"paragraph"},{"text":"重光法统，后起着鞭。","type":"paragraph"},{"text":"一身未惜，要续史篇！","type":"paragraph"},{"text":"轩辕宗社，雄波海天！","type":"paragraph"},{"text":"人生自古谁无死？留得清名满世间！","type":"paragraph"},{"text":" 主历一九六七年十月二十四日","type":"paragraph"}],"comments":[],"origin":"根据网络材料打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"eef76e9019"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
