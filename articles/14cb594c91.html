系复杂的知识分子入党","authors":[],"dates":[{"year":1979,"month":1,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"入党条件重在本人政治表现"},{"type":"paragraph","text":"长岭炼油厂注意吸收具备党员条件，出身剥削阶级家庭、社会关系复杂的知识分子入党"},{"type":"paragraph","text":"湖南长岭炼油厂党委认真贯彻执行党的知识分子政策，对那些具备党员条件，但是因为出身剥削阶级家庭或主要社会关系比较复杂而长期不能入党的同志，注意进行全面的、历史的分析，及时把他们吸收到党内来。这个厂去年共吸收了十七名工程技术人员入党，其中七名就是属于这种情况。这七个同志入党以后，在全厂工程技术人员中引起强烈的反响。"},{"type":"paragraph","text":"长岭炼油厂从一九七一年建成投产以来，一贯比较重视在工程技术人员中发展党员，从一九七一年到一九七六年共吸收了二十九名工程技术人员入党。但是，由于受林彪、“四人帮”反革命修正主义路线的影响，有的同志不能正确对待出身剥削阶级家庭、社会关系较复杂或者本人有这样那样历史问题的工程技术人员，总认为吸收这样的人入党就是“不讲阶级路线”。"},{"type":"paragraph","text":"粉碎“四人帮”以后，特别是在深入揭批“四人帮”的第三战役中，厂党委注意肃清这方面的流毒。他们在解决出身剥削阶级家庭、社会关系复杂的工程技术人员的入党问题时，注意对具体问题作历史的、实事求是的分析。他们认为，能不能入党，应当主要看本人的政治表现，家庭、社会关系只要组织上了解清楚就可以，不应成为入党的障碍。"},{"type":"paragraph","text":"（据新华社）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"14cb594c91"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
