art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"周恩来同志回访金日成同志","authors":[],"parts":[{"type":"paragraph","text":"新华社11日讯 中共中央副主席、国务院总理周恩来，今天上午前往宾馆回访朝鲜劳动党中央委员会委员长、内阁首相金日成，宾主进行了亲切友好的谈话。"},{"type":"paragraph","text":"随同周总理回访的，有中共中央政治局委员陈毅、李富春，国务院副总理罗瑞卿，对外贸易部部长叶季壮，国家计划委员会副主任方毅，外交部副部长姬鹏飞，我国驻朝鲜大使乔晓光。"},{"type":"paragraph","text":"回访时在座的，有朝鲜劳动党中央委员会副委员长金昌满，朝鲜劳动党中央委员会常务委员会委员、内阁副首相兼民族保卫相金光侠，朝鲜劳动党中央委员会常务委员会候补委员、内阁副首相兼重工业委员会委员长李钟玉，外务相朴成哲，朝鲜驻中国大使馆临时代办马东山。"},{"type":"paragraph","text":"回访以后，宾主共进午餐。"},{"type":"paragraph","text":"据新华社11日讯 中华人民共和国文化部和中朝友好协会今晚举行歌剧晚会，热烈欢迎朝鲜劳动党中央委员会委员长、内阁首相金日成率领的朝鲜党政代表团全体贵宾。"},{"type":"paragraph","text":"金日成首相等贵宾由中共中央副主席、国务院总理周恩来，中共中央总书记邓小平，中共中央政治局委员彭真、陈毅，国务院副总理罗瑞卿等陪同出席欣赏了歌剧“柯山红日”。"}],"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"陈毅","type":"人物"},{"name":"罗瑞卿","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"79b426d2b8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
