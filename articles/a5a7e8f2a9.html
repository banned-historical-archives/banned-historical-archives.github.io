s":[{"year":1970,"month":3,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　上海阀门厂不久前接到一批急用的铜阀门的生产任务，交货时间紧，数量多，用铜量大。厂革委会接到这项任务后，立即发动群众，召开活学活用毛泽东思想讲用会。会上工人们大批刘少奇反革命修正主义企业管理路线，大讲毛主席的“自力更生”、“艰苦奋斗”伟大教导的意义。会后工人们纷纷出主意、想办法，他们制订了新工艺，使这批阀门的用铜量减少百分之三十。加工时间也缩短了五分之一，从而加快了生产进度。"},{"type":"paragraph","text":"本报通讯　员"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"上海文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a5a7e8f2a9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
