:[],"dates":[{"year":1968,"month":7,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"上海市半工半读工业大学革命委员会"},{"type":"paragraph","text":"伟大领袖毛主席最新指示发表的喜讯传来，我校广大无产阶级革命派和革命师生员工奔走相告，热烈欢呼:毛主席万岁!毛主席万万岁:衷心祝愿我们心中最红最红的红太阳、我们最最敬爱的伟大领袖毛主席万寿无疆!万寿无疆!万寿无疆!"},{"type":"paragraph","text":"我校是由毛主席的好学生柯庆施同志，按照毛主席的无产阶级教育路线创办的一所工人大学，学员都是来自全市各工厂企业、具有五年以上工龄的工人。我们工人同学在旧社会受压迫，受剥削，饱受煎熬，处在水深火热之中，进大学连做梦也没有想到。是伟大的领袖毛主席、是共产党解放了我们，我们不但在政治上当了身，而且也得到了掌握科学文化的权利。"},{"type":"paragraph","text":"但是，中国赫鲁晓夫及其在上海的代理人陈丕显、杨西光之流，伙同我校一小撮顽固不化的走资派和其他阶级敌人，从我校创办的第一天起，就极力反对，恶毒地攻击，咒骂我校是“弄堂大学”，是“仓库”，“你们工人进大学是西装配破裤子”，等等，妄图扼杀我们这所新型的工人大学于摇篮之中。以后，他们又把黑手直接插到我校，以延长学制，砍掉政治教育课，由原厂办到集中办，向洋、大、全靠拢等种种手段，把我校纳入修正主义教育路线的轨道，妄图使我校同学脱离三大革命，成为修正主义的接班人；他们还设置重重障碍，招生对象从内部选拔到公开招生，从初中程度限制到高中程度，排挤、打击有实践经验的工人同学，实行资产阶级专政。"},{"type":"paragraph","text":"在史无前例的无产阶级文化大革命中，我校无产阶级革命派夺了党内一小撮走资派的权，摧毁了修正主义教育路线在我校的统治。在夺取无产阶级文化大革命全面胜利的重要时刻，我们伟大的领袖毛主席又一次向我们发出了最新指示:“大学还是要办的，我这里主要说的是理工科大学还要办，但学制要缩短，教育要革命，要无产阶级政治挂帅，走上海机床厂从工人中培养技术人员的道路。要从有实践经验的工人农民中间选拔学生，到学校学几年以后，又回到生产实践中去。”这是我们将无产阶级教育革命进行到底的战斗纲领，是反修防修的百年大计。毛主席的伟大教导，句句都说到我们的心坎里，句句都鼓舞着我们进一步同修正主义教育路线作不懈的斗争。我们学校全体革命师生决心按照毛主席的最新指示，把革命的大批判推向一个新的高潮，彻底肃清中国赫鲁晓夫修正主义教育路线的流毒，打破旧的资产阶级的教育制度，坚决执行毛主席的无产阶级教育路线，誓把我校办成红彤彤的毛泽东思想的大学校。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"教育革命","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cfac5a7bf0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
