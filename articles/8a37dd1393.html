rt":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东教育思想学术讨论会在武汉举行与会同志认为，毛泽东教育思想是我国教育工作取得伟大成就的根本指导思想","authors":[],"parts":[{"type":"paragraph","text":"新华社武汉6月4日电 我国首次毛泽东教育思想学术讨论会5月29日至6月3日在武汉举行。"},{"type":"paragraph","text":"会议围绕毛泽东教育思想基本内容及其重要意义进行了比较深入的探讨。大家认为，毛泽东教育思想是我国教育工作取得伟大成就的根本指导思想。毛泽东同志关于教育与政治、经济关系的论述；关于培养又红又专，德、智、体全面发展的人才的论述；关于知识分子与工农相结合、脑力劳动与体力劳动相结合的论述；关于理论联系实际以及教育事业发展中的群众路线和两条腿走路的方针等等，已被多年实践证明是十分正确的，对当前和今后的教育工作仍然具有指导意义。同时，随着历史的前进和情况的变化，对毛泽东教育思想要采取科学的态度，既要坚持，又要发展。"},{"type":"paragraph","text":"大家还认为，只有认真地学习毛泽东同志运用马克思主义的基本原理研究和解决我国教育问题的立场、观点和方法，才能不断解决新形势下的新问题，使教育更好地适应社会主义“四化”建设的需要。"},{"type":"paragraph","text":"这次讨论会是由中国教育学会全国马克思主义教育思想研究会和华中师范学院联合举办的。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8a37dd1393"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
