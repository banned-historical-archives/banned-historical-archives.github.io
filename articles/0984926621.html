知","authors":[],"dates":[{"year":1957,"month":8,"day":12}],"is_range_date":false,"parts":[{"text":"中央组织部、中央统战部关于调配民主党派机关干部的通知","type":"title"},{"text":"为了适应民主党派工作的发展，今年1月6日经中央批准，1957年全国民主党派机关编制增加三千六百三十人。中央这一批示下达后，名地虽陆续给民主党派配备了一些干部，但为数不多。目前，各民主党派已经开始在他们的党内进行整风。为了使各民主党派的反右派斗争和整风运动取得胜利，并在今后做好整顿组织的工作，各省、市委统战部应该征求各民主党派的意见，根据他们的实际需要，由省、市委组织部协助，抽调一批干部到民主党派机关中去工作。抽调的干部应该尽先在国家机关、人民团体工作的民主党派成员和一般非党干部中物色，共产党员、共青团员中有适合的亦可抽调。其条件必须是：政治上可靠、作风正派、有实际工作经验，并具备高中或相当高中以上文化程度。抽调这批干部时必须保证质量，不要勉强凑数，以免在政治上造成不良的后果。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0984926621"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
