script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反对美许集团的反动统治和残酷剥削  汉城大丘釜山工人农民商人一致斗争  马山市被李承晚监禁的“犯人”也进行斗争　傀儡当局派军队镇压","authors":[],"dates":[{"year":1960,"month":5,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反对美许集团的反动统治和残酷剥削"},{"type":"paragraph","text":"汉城大丘釜山工人农民商人一致斗争"},{"type":"paragraph","text":"马山市被李承晚监禁的“犯人”也进行斗争　傀儡当局派军队镇压"},{"type":"paragraph","text":"新华社平壤20日电　汉城消息：汉城、大丘等地的工人、商人继续举行罢工、罢市和示威斗争，反对美国—许政集团的反动统治和残酷的剥削制度。"},{"type":"paragraph","text":"汉城市今天下午有一百多名出租汽车司机举行示威，他们要求解散御用的“管制事业组合”，要求修改十八小时劳动的规定和取消中间剥削的会社。"},{"type":"paragraph","text":"继18日釜山四百多名小商人集体罢市之后，今天大丘市西部商场有一百多名小商人举行罢市和示威。他们高举写着“坏蛋税吏滚开！”标语牌走上大街。他们要求把每月缴纳的户籍税改为每年缴纳两次，要求每一个摊贩由每天纳税六十圜改为三十圜。"},{"type":"paragraph","text":"马山市监狱中被李承晚集团监禁的九十二名“犯人”今天也进行斗争。他们要求改善待遇。据报道，其他“犯人”也要响应他们的斗争，傀儡当局派军队来进行了镇压。"},{"type":"paragraph","text":"新华社平壤21日电　汉城消息：南朝鲜工人、农民和商人继续展开斗争，驱逐美李特务，反对残酷的剥削制度。"},{"type":"paragraph","text":"据南朝鲜合同通讯社报道，群山市高丽制纸公司的三百多名工人从20日开始总罢工。他们要求工会里的美李特务分子全部滚开，并且要求资方把总利润的20％——即一百万圜分给工人。他们提出，如果这些条件不被接受，他们就要拒绝上工。据釜山文化广播电台广播，釜山市杨亭洞的二百五十名农民16日晚展开静坐斗争，反对勾结伪地方当局坑害人民的美李特务朴某。据农民们揭露，朴某勾结伪釜山市政府以八十圜一坪的价格买来“公田”八千二百坪，然后以五千圜一坪的高价强卖给这里的农民。这个美李特务事先还从农民手中索取了大量的定金。这一天，愤怒的农民们赶到朴某的家中，向他索还定金，并要捣毁他的房子。据报道，伪当局曾慌忙派去大批军警镇压示威的群众。"},{"type":"paragraph","text":"这家电台还报道说，釜山市内的商人们继续展开抗税斗争。19日釜山市凡一洞“公设市场”内的小商人曾派代表到釜山市伪“税务署”抗议伪当局向小商人征收“杀人般的苛捐杂税”。他们还举行了集会，指责伪当局侵害小商人的利益。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"90768060d1"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
