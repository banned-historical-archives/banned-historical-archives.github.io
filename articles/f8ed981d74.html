<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"c2156ce7-375a-4525-a1d8-0b04436733e2","name":"告全国革命公民书","internal":false,"type":"img","official":false,"author":"北京四十九中学激洪流战斗小组","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives21/main/c2156ce7-375a-4525-a1d8-0b04436733e2/1.jpg"],"article":{"title":"告全国革命公民书","alias":"","parts":[{"type":"paragraph","text":"告全国革命公民书"},{"type":"paragraph","text":"当前开展的无产阶级文化大革命，以它特有的磅礴气势，猛烈冲刷着一切反动的、资产阶级的旧思想、旧意识、旧风俗、旧习惯。狠标无产阶级之新，大立社会主义之异，出现了一派大好的革命新形势"},{"type":"paragraph","text":"我们是天生的造反者。我们要牢握毛泽东思想伟大武器，吹起革命的冲锋号，向旧世界宣战，打它个落花流水。"},{"type":"paragraph","text":"毛主席说：“在阶级社会中，每一个人都在一定的阶级地位中生活，各种思想无不打上阶级的烙印。”还说：“无产阶级要按照自己的世界观改造世界，资产阶级也要按照自己的世界观改造世界”。人的姓名也是有它的阶级性的，它代表着人的精神面貌和思想意识。那些地主、资产阶级的混蛋狗崽子们所起的名字无非是些什么：耀祖、富贵、友善、美娜、美丽、媛媛、璧月等等，还有更为封建迷信的名字，如：什么来福、来喜、来顺、全来、玉杰、长顺呀等等；那些代表旧势力的庸俗的名字：淑英、淑兰、淑芳、宝芬、金珠则更是低级。这些臭名字至今还依然残存，与我们时代的伟大革命精神极不相称，有的甚至对抗。它们散发着封建主义的、资产阶级的、修正主义的、腐朽落的臭气息，播种着旧势力的毒素"},{"type":"paragraph","text":"这样的局面我们再也不能让它继续下去了。我们要砸它个稀巴烂，让它永世不得翻身。"},{"type":"paragraph","text":"我们伟大领袖、伟大统帅、伟大舵手毛主席在接见北京市“红卫兵”战士时，问其中一个叫宋彬彬的名字时说：“是文彬彬的彬？”回答说：“是”，毛主席又说：“要武嘛”"},{"type":"paragraph","text":"我们要热烈地响应毛主席的伟大号召。人的姓名也要革命化，要武，要充满着革命的豪情，反映着革命的时代精神"},{"type":"paragraph","text":"在此我们向全国广大工农兵革命同志们，革命师生们发出呼吁：要迅速地改变以前的旧的臭名字，换上崭新的革命的名字。"},{"type":"paragraph","text":"同志们、同学们，这些旧东西决不是什么小问题，这是移风易俗改造世界，尤其是人的思想革命化的大问题。让我们立即行动起来吧！切不可等闲视之。"},{"type":"paragraph","text":"“为有牺牲多壮志，敢叫日月换新天”无产阶级文化大革命万岁！无产阶级革命造反精种万岁！伟大的中国共产党万岁！伟大的战无不胜的毛泽东思想万岁！我们伟大领袖、伟大统帅、伟大舵手毛主席万岁！！"},{"type":"paragraph","text":"北京四十九中学 激洪流战斗小组宣"},{"type":"paragraph","text":"一九六六年八月二十八日于兰州"}],"authors":["北京四十九中学激洪流战斗小组"],"dates":[{"year":1966,"month":8,"day":28}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1},"tags":[{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f8ed981d74"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
