art":6,"page_end":6,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"歌唱毛主席语录板儿（小快板）","authors":["邵洪昌"],"parts":[{"type":"paragraph","text":"打竹板儿，点对点儿，"},{"type":"paragraph","text":"唱唱毛主席语录板儿，"},{"type":"paragraph","text":"板上写着主席的话，"},{"type":"paragraph","text":"时刻挂在咱跟前儿。"},{"type":"paragraph","text":"一字字，象灯塔，"},{"type":"paragraph","text":"使咱长了千里眼儿，"},{"type":"paragraph","text":"一句句，象春风，"},{"type":"paragraph","text":"阵阵吹暖咱心坎儿。"},{"type":"paragraph","text":"行军背起语录板儿，"},{"type":"paragraph","text":"迈开双腿不打软儿，"},{"type":"paragraph","text":"翻山越岭过大江，"},{"type":"paragraph","text":"万里征途不算远儿。"},{"type":"paragraph","text":"放哨想起语录板儿，"},{"type":"paragraph","text":"浑身都是英雄胆儿，"},{"type":"paragraph","text":"胸怀祖国看世界，"},{"type":"paragraph","text":"手中紧紧握枪杆儿。"},{"type":"paragraph","text":"爆破看见语录板儿，"},{"type":"paragraph","text":"仇恨点燃导火捻儿，"},{"type":"paragraph","text":"美国佬，蒋光头，"},{"type":"paragraph","text":"炸烂你们的豺狼脸儿。"},{"type":"paragraph","text":"处处对照语录板儿，"},{"type":"paragraph","text":"红色战士不变色儿，"},{"type":"paragraph","text":"时时对照语录板儿，"},{"type":"paragraph","text":"永为革命擂鼓点儿。"},{"type":"paragraph","text":"人人都爱语录板儿，"},{"type":"paragraph","text":"人人都看语录板儿，"},{"type":"paragraph","text":"人人背起语录板儿，"},{"type":"paragraph","text":"人人唱起语录板儿，"},{"type":"paragraph","text":"让我们，"},{"type":"paragraph","text":"把毛主席语录板儿，"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"01026f99fd"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
