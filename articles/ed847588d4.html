征","黎笋"],"dates":[{"year":1976,"month":1,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"孙德胜黎笋长征范文同同志的唁电北京中国共产党中央委员会主席毛泽东同志，中华人民共和国全国人民代表大会常务委员会委员长朱德同志，中华人民共和国国务院副总理邓小平同志："},{"type":"paragraph","text":"惊悉中国共产党中央委员会副主席、中华人民共和国国务院总理周恩来同志逝世，我们感到无比沉痛。"},{"type":"paragraph","text":"周恩来同志是杰出的共产主义战士，是中国人民的优秀儿子，是中国党和国家的卓越领导人之一，是越南人民亲密的伟大朋友。我们怀着极其悲痛的心情，代表越南人民、越南劳动党中央委员会、越南民主共和国国会常务委员会、越南民主共和国政府，并以我们个人的名义，谨向你们，并通过你们，向中国共产党中央委员会、中华人民共和国全国人民代表大会常务委员会、中华人民共和国国务院和中国人民，并向周恩来同志的家属表示最沉痛的哀悼。"},{"type":"paragraph","text":"越南民主共和国主席　孙德胜"},{"type":"paragraph","text":"越南劳动党中央委员会第一书记　黎笋"},{"type":"paragraph","text":"越南民主共和国国会常务委员会主席　长征"},{"type":"paragraph","text":"越南民主共和国政府总理　范文同"},{"type":"paragraph","text":"一九七六年一月九日于河内"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ed847588d4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
