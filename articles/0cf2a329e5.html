ical-archives/banned-historical-archives8/main/maoquanji17.pdf"],"article":{"title":"致周恩来、林彪电","alias":"","parts":[{"type":"paragraph","text":"致周恩来、林彪电川"},{"type":"paragraph","text":"（1943年1月1日）"},{"type":"paragraph","text":"郑延卓在延两星期，明日返渝。我同他谈了两次，表现尚好。参观了许多地方，接谈了几十个人。据称：观感与外边所见两样。谈到边区，我说区域维持现状，人员加以委任。谈到军队，我说应编四军十二师。此外停捉停打停封，发饷发弹发药，也说到了。谈到三民主义，我说现应实行七分资本三分封建的民生主义，议会制的民权主义。谈到社会主义，我说将来要实行的，现在无条件。他要求我给蒋一信，我答应了。"}],"authors":["毛泽东"],"dates":[{"year":1943,"month":1,"day":1}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":479,"page_end":479},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0cf2a329e5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
