script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"高举推翻美日反动派的四面革命旗帜胜利前进日共已发展成为强大的党《赤旗报》指出当前任务是加强反帝反修正主义斗争","authors":[],"dates":[{"year":1963,"month":7,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京13日电】　东京消息:日本共产党中央机关报《赤旗报》13日发表社论，庆祝日共建党四十一周年(7月15日)。社论指出，日共已发展成为拥有十万以上党员的大党。日共的机关报的发行量已达五十万份以上。"},{"type":"paragraph","text":"这篇题为《让我们发扬日本共产党的革命传统》的社论说，日本的统治阶级千方百计地想要破坏日本共产党，而我们党不顾统治阶级的残酷镇压进行了不屈不挠的斗争。"},{"type":"paragraph","text":"社论指出，日共之所以能发展成为强大的党，是因为党的政策符合人民的要求和历史发展规律。"},{"type":"paragraph","text":"社论说，经过党在最近两年内的实践，充分地证明了第八次党代表大会所通过的革命纲领的正确性。"},{"type":"paragraph","text":"社论在谈到当前的日本形势时说，依附于美帝国主义的日本反动势力正在推行复活军国主义和使日本发展成为帝国主义国家、让美国核潜艇在日本港口停泊和让F-105D型飞机进驻日本以进行核武装以及促进同南朝鲜军事集团的关系正常化的政策。"},{"type":"paragraph","text":"社论指出，党所面临的重大而紧迫的任务是，必须加强反对美帝国主义——可恨的战争煽动者——和国内垄断资本的斗争，防止核战争的危险。"},{"type":"paragraph","text":"社论说，我们党正在高举着推翻美帝国主义和日本反动派统治的四面革命旗帜前进。"},{"type":"paragraph","text":"社论强调，必须加强反对修正主义分子的斗争。社论说，反党修正主义分子不仅篡改和歪曲马克思列宁主义，企图把日本的革命引向错误的道路，而且还伪造历史，一心想消灭一切革命传统。"},{"type":"paragraph","text":"社论指出，每个党员必须学习马克思列宁主义的革命理论，在党的工作中建立正确的作风，以赢得人民的信任，并要尽一切力量来实现各项当前的目标，以便使党深深地在人民群众中扎根。"},{"type":"paragraph","text":"社论在谈到国际共产主义运动的团结时指出，我们党根据五中全会的决议，坚决维护我们党的纲领、莫斯科声明和宣言，并且希望苏联和中国两个兄弟党的会谈成功。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2bee662c1b"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
