"康生"],"dates":[{"year":1967,"month":5,"day":11}],"is_range_date":false,"parts":[{"text":"康生在北京和平门中学的讲话","type":"title"},{"text":"康生","type":"authors"},{"text":"〖摘录〗","type":"appellation"},{"text":"去年十二月三十一日中央指示中有这样三句话：毛主席在最近接见全国各地来京革命师生时，向林彪同志多次提出：派军队干部训练革命师生的方法很好。训练一下和不训练大不一样。这样做可以向解放军学政治，学军事，学四个第一，学三八作风，学三大纪律八项注意，加强组织纪律性。第三句中提到的内容，我们叫五项学习内容。我现在想提出来让同学们注意一下，在军训中不管那个组织，那种观点，你红卫兵也好，你红旗也好，你们到底学得怎样，有那些成绩，好的地方，不好的地方。这些是毛主席亲手缔造的，林彪同志亲自指挥的伟大人民军队的老传统，也是毛主席和林副主席的路线的东西，也是无产阶级文化大革命的武器。你们应当关心这个问题，应当讲这个问题，应当争论这个问题。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"康生","type":"人物"},{"name":"林彪","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b4f060b9ed"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
