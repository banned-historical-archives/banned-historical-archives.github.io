tart":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"“四人帮”在战备训练中的流毒不可低估","authors":["团长樊连功政委卜川"],"parts":[{"type":"paragraph","text":"这些年来，在林彪、“四人帮”的干扰、破坏下，我们部队的战备训练受到很大影响。今年我们团在实装野营拉练中设置的情况稍微复杂点，就暴露出了不少问题。这些问题，有的属于技术方面不过硬，有的属于战术手段不适应现代战争的要求，也暴露了我们干部包括我们团的领导干部在组织指挥上，与现代战争的要求有不小的距离。这使我们更加清楚地看到林彪、“四人帮”对我们军事素质破坏的严重性，更加坚定了我们要把揭批“四人帮”的斗争搞深搞透，出大力，流天汗，尽快地把训练促上去的决心。从这个意义来说，这次实装拉练暴露出一些问题，是好事而不是坏事。"},{"type":"paragraph","text":"对于“四人帮”的流毒和影响，我们往往认识不足。这次实装野营拉练暴露出来的一些问题，给我们敲了警钟。有的同志怕出问题，回避矛盾，不敢按照现代战争的要求摔打部队。其结果只能自己蒙住自己的眼睛，看不到林彪和“四人帮”对我们的战备训练所造成的严重危害，看不到我们的军事素质与现代战争存在的距离，也就不能有的放矢地克服我们训练的薄弱环节，打起仗来就要吃大苦头。"},{"type":"paragraph","text":"粉碎了“四人帮”，为我们迅速提高部队军事素质创造了极其有利的条件。这次实装拉练的实践再一次告诉我们，要迅速把训练搞上去，还必须抓住揭批“四人帮”斗争这个纲。要充分利用拉练中暴露出来的问题作为教材，继续深入地进行“应该不应该严格训练、严格要求”的教育，把林彪、“四人帮”搞乱的路线是非纠正过来。只有这样，才能大干一场，切切实实把训练抓好，把我们现代作战的本领大大提高一步。"}],"alias":""},"tags":[{"name":"林彪","type":"人物"},{"name":"四人帮","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2a08440414"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
