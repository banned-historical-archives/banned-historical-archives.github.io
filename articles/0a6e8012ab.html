ical-archives/banned-historical-archives8/main/maoquanji10.pdf"],"article":{"title":"给范长江的信","alias":"","parts":[{"type":"paragraph","text":"给范长江的信"},{"type":"paragraph","text":"（1937年3月29日）长江先生："},{"type":"paragraph","text":"那次很简慢你，对不住得很！你的文章?我们都看过了，深致谢意！"},{"type":"paragraph","text":"寄上谈话一份，祭黄陵文一纸，藉供参考，可能时祈为发布。甚盼时赐教言，匡我不逮。"},{"type":"paragraph","text":"敬颂撰祺！"},{"type":"paragraph","text":"弟毛泽东"},{"type":"paragraph","text":"三月二十九日二十四时"},{"type":"paragraph","text":"[1]范长江（1909—1970)，四川内江人，新闻工作者。1937年2月曾以大公报记者身份到西安和延安采访。1939年加入中国共产党，后长期在党的新闻部门做领导工作。"},{"type":"paragraph","text":"[2]指范长江访问西安和延安后，在《大公报》上发表的报道西安事变真相和中国共产党抗日主张的新闻通讯。"},{"type":"paragraph","text":"[3]指1937年3月1日毛泽东和美国作家史沫特莱的谈话。这个谈话发表于1937年3月29日至4月3日延安《新中华报》，题为《中日问题与西安事变》。"},{"type":"paragraph","text":"[4]指中华苏维埃共和国中央政府和人民抗日红军准备在1937年4月5日长肛生生："},{"type":"paragraph","text":"哪次很慢你，对化很!你门久事代们部育爸下，除以谢系!"},{"type":"paragraph","text":"寓上谈话一价，紧笑陵一很药传秀考，不能时祈功院布在肠时肠"},{"type":"paragraph","text":"段言，匡代不途"},{"type":"paragraph","text":"视!颂"},{"type":"paragraph","text":"三#九nto毛泽东致范长江信的手稿。"}],"authors":["毛泽东"],"dates":[{"year":1937,"month":3,"day":29}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":262,"page_end":263},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0a6e8012ab"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
