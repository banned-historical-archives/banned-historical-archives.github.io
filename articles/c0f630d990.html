<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"柯伊拉腊首相和周总理在中尼友协酒会上  互祝中尼友好进一步发展","authors":[],"dates":[{"year":1960,"month":3,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"柯伊拉腊首相和周总理在中尼友协酒会上"},{"type":"paragraph","text":"互祝中尼友好进一步发展"},{"type":"paragraph","text":"新华社15日讯　中国尼泊尔友好协会会长周建人今天下午举行盛大酒会，热烈欢迎尼泊尔王国首相柯伊拉腊和夫人以及随同来访的全体尼泊尔贵宾。"},{"type":"paragraph","text":"柯伊拉腊首相在酒会上的讲话中说，我认为，我们在今天和明天，必须保持和发展尼中两国的传统友谊，通过发展传统友谊，通过亚洲各国的互助和合作，亚洲的和平就能够得到保障。首相的这些话受到热烈欢迎。"},{"type":"paragraph","text":"周恩来总理，陈毅副总理和夫人，习仲勋副总理，沈钧儒、郭沫若副委员长，外交部副部长章汉夫、罗贵波，中国驻尼泊尔大使潘自力等出席了酒会。他们同柯伊拉腊首相和尼泊尔的全体贵宾欢聚一堂，共庆中尼两国人民的友谊不断发展，祝它万古长青。"},{"type":"paragraph","text":"随同来访的尼泊尔贵宾：工程和交通大臣辛格，内政和司法大臣乌帕德亚亚，外事秘书塔普，商业和工业部秘书舒克拉，少将拉纳，上院议员乔提，首相私人秘书迪克希特等，都出席了酒会。应邀出席酒会的，还有以“新社会报”主编潘德为首的尼泊尔新闻工作者代表团和在北京的尼泊尔留学生。"},{"type":"paragraph","text":"周建人会长首先致词，向带来尼泊尔人民深厚友谊的柯伊拉腊首相和夫人以及其他随行贵宾，表示热烈的欢迎和衷心的敬意。他说，尼泊尔是我们亲近的邻邦，中尼两国有着和睦相处的传统友好关系。这种友好的关系，是我们两国人民一直引以为自豪的。我们非常高兴的是自从两国建交以来，两国之间传统的友好关系不仅得到恢复，而且更在和平共处五项原则的基础上获得了新的发展。"},{"type":"paragraph","text":"周建人说，中国人民非常钦佩尼泊尔王国政府和人民在维护民族利益和发展民族经济方面所进行的巨大努力，并对他们在这方面所取得的成就感到兴奋。尼泊尔王国在国际事务中一贯奉行和平中立的政策。中国人民欢迎并完全支持尼泊尔政府这一明智的外交政策。"},{"type":"paragraph","text":"周建人说，在和平共处五项原则的基础上，近年来，我们两国的文化友好往来在不断地发展，它进一步加强了两国人民的相互了解，增进了我们之间的传统友谊，中国人民为此感到十分欣慰。周建人最后说，现在，尊敬的柯伊拉腊首相阁下又亲自来我国访问，这标志着中尼两国人民的友谊正在进入一个新的阶段，中尼两国人民将更加紧密地携起手来，为维护亚洲和世界的和平作出新的贡献。"},{"type":"paragraph","text":"柯伊拉腊首相讲话的时候，掌声经久不息。首相说，我们在中国的几天里，不论到什么地方，不论遇到什么人，都使我们感到中国人民对我们的友谊和亲善，我感到十分高兴。"},{"type":"paragraph","text":"首相谈述了他在北京访问的观感，盛赞中国人民从事建设的热情、干劲和毅力。他说，虽然我们两国的社会制度不同，但是我们两国政府肩负的任务是共同的，那就是摆脱封建统治和殖民主义给我们留下的毒害。我们都还需要提高人民的生活水平，我从来相信，亚洲国家的互相帮助和合作是促进友谊的最好途径。首相在谈到他今天参观亚非学生疗养院的印象时说，那里有各国学生在疗养，真像一个大家庭，使我特别感到高兴，那里也有疗养的尼泊尔学生，这正象征着我们两国的友谊。"},{"type":"paragraph","text":"首相说，尼泊尔政府和尼泊尔人民非常感谢中国政府和中国人民对尼泊尔的建设提供的援助。这次我和我的夫人以及尼泊尔的其他成员到中国访问，到处都受到了中国人民的热烈欢迎，我在这里向你们表示衷心地感谢。在回去以后，我将告诉尼泊尔人民，你们是如何热情地欢迎我们，你们又是如何地对尼泊尔人民尊重和友好。"},{"type":"paragraph","text":"首相最后提议为中国和尼泊尔的友谊，为中国人民持续不断地繁荣和进步，为和平共处五项原则，为亚洲国家的团结，为周恩来总理的身体健康，干杯。首相的讲话，受到了极其热烈的欢迎。"},{"type":"paragraph","text":"周恩来总理在热烈的掌声中致词，他借这个机会再一次祝中国和尼泊尔两国友好关系的进一步发展和巩固，祝中国和尼泊尔两国人民的友谊万古常青。周总理请大家举杯为柯伊拉腊首相和夫人以及尼泊尔的全体贵宾们的身体健康干杯。"},{"type":"paragraph","text":"酒会自始至终都在非常热烈和友好的气氛中进行，出席酒会的有中国各族各界人士和在北京的中尼友好协会的理事。"},{"type":"paragraph","text":"酒会在民族宫举行，酒会以后，贵宾们还参观了设在这里的十年来民族工作展览。中共中央领导人接见五个会议全体代表新华社15日讯　中共中央领导人刘少奇、周恩来、邓小平、彭真、陈毅、李富春、陆定一、薄一波等同志，在今天下午先后接见了五个会议的全体代表。这五个会议是：中国人民解放军工程兵第二届积极分子代表会议，中国人民解放军总直机关院校积极分子代表大会，全国中小型高炉生产会议，全国总工会和全国妇联召开的全国职工生活工作会议，第六次全国民政会议。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"陈毅","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c0f630d990"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
