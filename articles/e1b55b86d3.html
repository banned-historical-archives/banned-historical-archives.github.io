script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反对美帝和智利反动当局的残酷剥削智利二十万工人和职员大罢工美国码头工人的大罢工严重打击垄断资本集团","authors":[],"dates":[{"year":1969,"month":1,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社北京十日电　圣地亚哥消息:智利二十多万工人和职员八日开始举行四十八小时的全国性罢工，抗议物价不断上涨，要求增加工资。"},{"type":"paragraph","text":"数千名罢工者九日在，圣地亚哥大街上举行示威游行。智利当局竟出动警察对示威群众进行镇压。但是，示威群众并没有被吓倒。这一天，又有一万八千名海运职员和其他机关职员参加了罢工的行列。"},{"type":"paragraph","text":"近年来，由于美帝国主义对智利加紧掠夺，智利的经济情况日益恶化。智利当局把经济困难转嫁到工人和一般职员身上。这一切激起了智利广大工人和其他劳动群众的强烈反抗，他们不断举行罢工，反对剥削。"},{"type":"paragraph","text":"据新华社北京十一日电　纽约消息:美国东海岸和墨西哥海湾七万五千名码头工人十日继续罢工。这次罢工已经坚持了二十一天，严重地打击了美国垄断资本集团。"},{"type":"paragraph","text":"由于这次大罢工，美国从东北部缅因州到南部得克萨斯州的所有港口全部陷于瘫痪，使美国的许多工厂被迫削减生产或停工，有的工厂甚至已被迫关门。美国的对外商品输出也受到沉重打击，美国对外的粮食输出就急剧下降，最近一周内，美国输出的粮食比去年同期减少了百分之八十五以上"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e1b55b86d3"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
