查结论","authors":[],"dates":[{"year":1986,"month":8,"day":20}],"is_range_date":false,"parts":[{"text":"云南人民出版社关于错划陈名安同志为“右派分子”的复查结论","type":"title"},{"text":"陈名安 男 1930年生\t江西高安人\t家庭出身小土地出租 本人成份学生 1949年7月参加工作\t原系我社编辑\t工资编辑13级（56元）现在大理师范专科学校工作。","type":"paragraph"},{"text":"1958年陈名安同志被错划为“右派分子”，受到撤销职务、监督劳动的处分。1979年我社进行复查，中共云南省出版局党组批准，予以改正。恢复名誉，恢复原工资编辑13级（56元）。现根据云办发（85）73号文件精神，再次进行复查，认为陈名安同志在1957年鸣放中所提意见是正常的，不属右派言论，实属错划。应彻底改正。","type":"paragraph"},{"text":" 中共云南人民出版社委员会1986年8月20日","type":"paragraph"}],"comments":[],"origin":"根据文件翻印件打印。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"云南文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ec4c404f24"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
