art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"把被砍掉的组织迅速恢复起来把被剥夺的工作赶快承提起来本钢狠批“四人帮”逐步健全人武部","authors":[],"parts":[{"type":"paragraph","text":"在深入揭批“四人帮”的斗争中，本溪钢铁公司人民武装部有步骤有计划地配备好所属武装部门的人武干部，使被“四人帮”搞乱的武装部门的工作，迅速得到恢复，全公司的民兵工作逐步得则加强。"},{"type":"paragraph","text":"长期以来，“四人帮”及其在辽宁的那个死党，为了篡夺民兵领导权，极力推行“黑三论”，大砍武装部，撤换人武干部，本钢是深受其害的。许多有实践经验的人武干部，被“四人帮”在辽宁的那个死党诬蔑为“不适应当前的民兵工作”、“赶不上当前形势发展的需要”，被迫改行或调离；暂时留下的，则被“民兵指挥部”和“三位一体”的“新”机构架空了，剥夺了武装部门、人武干部做民兵工作的权利。"},{"type":"paragraph","text":"打倒“四人帮”，本钢一片新气象。怎样在彻底清算“四人帮”反革命罪行的同时，很快把民兵工作抓上来？本钢武装部遵照毛主席关于“政治路线确定之后，干部就是决定的因素”的教导，针对“四人帮”及其死党的干扰破坏，及时向上级军事部门和公司党委，提出了迅速配备充实各级人武干部、恢复厂矿武装部门正常工作的建议，得到了上级的热情关注和支持。公司党委分工一名副书记具体领导这项工作。他们首先组织广大人武干部（包括预提对象）认真学习毛主席的光辉著作《论十大关系》，学习华主席在第二次全国农业学大寨会议上的重要讲话，重温毛主席关于民兵工作的一系列指示，然后，联系实际，深入揭批“四人帮”及其死党大砍武装部门、攻击诬蔑人武干部的种种罪行；根据毛主席关于无产阶级革命事业接班人的五条标准，认真选拔、配备干部，使全公司三十个厂矿的武装部恢复了建制，开展了工作。新老人武干部团结一致，互相学习，互相鼓励，决心在大治之年把民兵工作很快搞上去。"},{"type":"paragraph","text":"（本溪军分区、本钢人武部）"}],"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"name":"辽宁文革","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9ffe3144d0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
