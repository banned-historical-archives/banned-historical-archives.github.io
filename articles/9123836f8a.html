会主义改造","authors":[],"dates":[{"year":1954,"month":9,"day":22}],"is_range_date":false,"parts":[{"text":"江苏省商业资本家采取各种办法抗拒社会主义改造","type":"title"},{"text":"【江苏分社22日讯】江苏省各地商业资本家采取各种办法抗拒社会主义改造，具体表现为：","type":"paragraph"},{"text":"一、毒害职工。昆山县姚顺兴农具店资本家姚惠祥，将毒药参入饭中，企图毒死青工赵阿三，后经赵发觉后报公安局将姚逮捕。丹阳县也有不法资本家想以毒药害死职工的情况，资本家并说：我以一个拼十个，我死了有子孙替我报仇。川沙县仁和堂老板娘想逼走职工，假装神经失常，持刀想杀工人","type":"paragraph"},{"text":"二 、造谣破坏，挑拨政府和人民间的关系。沛县发现有“粮食计划供应，准备饿死老百姓；棉布计划供应，准备冻死老白姓”的谣言。泰州市绸布业资本家对职工说：我是肯积极经营的，就是国营公司不配货，付不出工资叫我有啥办法。有的资本家拿了一叠人民币问职工：先缴税，还是先发工资？有些资本家还挑拨农民和政府的关系说：政府规定每月供应我们资本家八两食油，而你们每月却只有二两，农民不如资本家，我也替你们不服气。棉布零售店挂牌经销后，有些资本家说：经销后企业性质改变，劳资关系起了变化，大家共同的目标都是为人民服务，现在只存在劳资关系，已不存在劳资矛盾","type":"paragraph"},{"text":"三、有组织地进行破坏活动。苏州市西区南北货业鸿隆号等五个资本家组织了一个“关店办公室”，设有秘书长、组织部长、宣传部长等职，经常秘密集会，专门在同业中煽动关店。江宁县秣陵镇有六个资本家研究对付工人的手段，约定在同一时间一起停伙，企图以此威逼职工接受解雇。宜兴县和桥镇资本家姚良修在基层工会召开积极分子会议的同时，私自召集落后职工开会，布置对策。","type":"paragraph"},{"text":"四、以女色、金钱腐蚀工会干部和工人。无锡某酱油店资本家唆使亲生女儿和店员腐化，然后在酱油内掺水出售。江宁县恒昌号资本家以金钱和手表收买基层工会干部，要他收集工人的活动情况。","type":"paragraph"},{"text":" （徐文）","type":"paragraph"}],"comments":[],"origin":"新华社《内部参考》1954年9月28日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9123836f8a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
