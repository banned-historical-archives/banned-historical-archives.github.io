art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席等党和国家领导人会见阿尔及利亚党政代表团","authors":[],"parts":[{"type":"paragraph","text":"新华社一日讯 毛泽东主席及党和国家的其他领导人刘少奇、董必武、朱德、周恩来、邓小平、彭真、陈毅、康生，今晚会见由阿尔及利亚民族解放阵线中央委员会委员、阿尔及利亚民主人民共和国政府国务部长阿马尔·乌兹加尼率领的阿尔及利亚民主人民共和国党政代表团。"},{"type":"paragraph","text":"会见时，阿尔及利亚驻中国大使穆罕默德·亚拉在场。"},{"type":"paragraph","text":"据新华社一日讯 由阿尔及利亚民族解放阵线中央委员会委员、阿尔及利亚民主人民共和国政府国务部长阿马尔·乌兹加尼率领的阿尔及利亚党政代表团，今天清晨四点三十分乘夜航专机抵达北京。首都各界数千人深夜守候在机场，热烈欢迎来自英雄的阿尔及利亚的友好使者。"},{"type":"paragraph","text":"阿尔及利亚贵宾是应邀前来参加中华人民共和国成立十五周年国庆盛典，并进行友好访问的。中共中央政治局委员、国务院副总理陈毅，以及各方面的负责人到机场迎接阿尔及利亚贵宾。"}],"alias":""},"tags":[{"name":"陈毅","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"704e83fbfc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
