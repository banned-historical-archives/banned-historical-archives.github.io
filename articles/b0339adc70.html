art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"提高路线斗争觉悟干革命才有方向","authors":["武汉部队活学活用毛泽东思想积极分子/代表大会代表/某部特务连副连长周述平"],"parts":[{"type":"paragraph","text":"几年来，我先后八九次在非常危急的情况下，救出了自己的同志。最后一次，为了救战友，我毫不犹豫地扑向咝咝冒烟将要爆炸的手榴弹，结果全身负伤四十多处，还炸断了一条腿。同志们赞扬我，说我为人民服务做到了“完全”“彻底”。可是，通过这场无产阶级文化大革命，我发现自己的思想改造还很不够。"},{"type":"paragraph","text":"事情是这样的：我负伤以后，住进了医院。这时，正是伟大领袖毛主席亲自发动和领导的无产阶级文化大革命运动轰轰烈烈展开的时候，我打心眼里高兴。我坚决支持革命造反派。但是，由于我路线斗争的觉悟不高，不久又支持了一个错误的声明。在尖锐的两条路线的斗争中，我没有坚定地站在毛主席的革命路线一边，感到很痛心，吃不下饭，睡不着觉，思想斗争非常激烈。"},{"type":"paragraph","text":"为什么我一心热爱毛主席，在两条路线斗争中却没有坚定地站到毛主席革命路线一边呢？我重新学习了《为人民服务》这篇光辉著作和毛主席的一系列最新指示，反复进行思想斗争。毛主席说：“我们这个队伍完全是为着解放人民的，是彻底地为人民的利益工作的。”“为人民利益而死，就比泰山还重”。过去，我学习这些教导，正确对待生死问题，这当然是对的。但是，对“完全是为着解放人民的，是彻底地为人民的利益工作的”却理解不深，没有提到两条路线斗争的高度来认识。现在带着斗争中的实际问题反复琢磨，我认识到，只有毛主席的革命路线，才是解放人民的唯一正确的路线。只有毛主席的革命路线，才集中地反映了人民的利益。我们要“完全”“彻底”为人民服务，就必须无限忠于毛主席的革命路线，坚决贯彻、勇敢捍卫毛主席的革命路线。因此，我们改造思想，就要活学活用毛主席著作，在提高路线斗争觉悟上狠下功夫。"},{"type":"paragraph","text":"这以后，我决心在两条路线斗争中改造自己，提高路线斗争觉悟，誓死捍卫毛主席的革命路线。我始终坚定不移地支持无产阶级革命派。"},{"type":"paragraph","text":"从斗争实践中，我深深体会到，只有在阶级斗争中活学活用毛主席著作，提高路线斗争觉悟，干革命才有方向，才能真正做到无限忠于毛主席。RW：周述平；副连长"}],"alias":""},"tags":[{"name":"两条路线斗争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b0339adc70"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
