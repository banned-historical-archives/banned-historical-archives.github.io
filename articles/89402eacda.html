":[{"year":1949,"month":6,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"张澜电毛主席庆贺胜利"},{"type":"paragraph","text":"毛主席复电欢迎来北平"},{"type":"paragraph","text":"【新华社北平一日电】民主同盟主席张澜来电庆贺战争胜利及毛泽东主席等复电如下：毛主席润之、朱总司令玉阶、周恩来先生、董必武先生勋鉴："},{"type":"paragraph","text":"人民解放军渡江以来，时仅一月，南京及苏浙鄂赣陕五省会相继解放，近则上海亦全部解放。蒋军到处崩溃，人民咸庆来苏。人民解放军得到如此光荣胜利，谨为诸公庆贺。上海为东亚著名大都市，国内及国际人才多集于此。今后工商业之新发展，尤为新民主国家所利赖。兹值战后，困难较多，如何安定，如何建设，想早在诸公运筹策划中。澜不久将与罗努生兄等来平聆教。张澜叩艳（二十九日）"},{"type":"paragraph","text":"表方先生：艳电敬悉。革命战争迅速发展，残敌就歼为期不远。今后工作重心在于建设，亟盼各方友好共同致力。先生及罗先生准备来平，极表欢迎。毛泽东、朱德、周恩来、董必武六月一日"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"89402eacda"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
