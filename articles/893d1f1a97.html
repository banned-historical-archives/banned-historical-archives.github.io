"dates":[{"year":1979,"month":1,"day":8}],"is_range_date":false,"parts":[{"text":"国务院知青领导小组通知","type":"title"},{"text":"各省、市、自治区知青领导小组：","type":"appellation"},{"text":"上海、天津、浙江、陕西等省、市知青办反映，跨省下乡到黑龙江、陕西、内蒙等省、区的知识青年，已经在当地通过招工、招生进了厂矿企业、学校的，其中有一部分人最近突击办理退职、退学，将户粮关系转入当地生产队，重新作为下乡知识青年，要求病退、困退回动员城市。(略)","type":"paragraph"},{"text":"根据中央〔1978〕74号文件精神，对于已经提拔为脱产干部和成为全民所有制单位和集体所有制单位(包括原生产建设兵团划分给地方的工交、基建、财贸企业)职工的，已不属于下乡知识青年范围，也不应采取退职的办法再通过知青部门搞病、困退。他们如有特殊困难需要调动的，应当按人事、劳动部门关于干部、职工调动的有关规定办理。对于为了搞病、困退而退了职的，有关部门要允许他们复职。","type":"paragraph"}],"comments":[],"origin":"根据中央文件原件翻印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"陕西文革","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"893d1f1a97"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
