hors":[],"dates":[{"year":1958,"month":9,"day":8}],"is_range_date":false,"parts":[{"text":"右派分子彭文应对台湾海峡地区局势的反应","type":"title"},{"text":"新华社上海8日讯　右派分子彭文应对台湾海峡地区局势的反应。","type":"paragraph"},{"text":"彭文应说：“解放台湾看来条件已经成熟。如果打起来，美国使用原子弹，我们有苏联支持，中苏两国加起来打得过美国；要和平谈判也可，但大使级谈判没有用，最好举行更高级谈判，如陈毅和杜勒斯谈判，或举行特使级谈判”。彭文应主张：由我国发表声明：如美国在北京丢原子弹，我们就到华盛顿去丢，如美国在厦门、福州丢，我们就到旧金山、费城丢。他认为美国的威胁主要是原子威胁，我们发表这种以牙还牙的声明，就可阻止美国的狂妄野心。","type":"paragraph"}],"comments":[],"origin":"1958年9月9日新华通讯社编《内部参考》。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"694a2ba447"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
