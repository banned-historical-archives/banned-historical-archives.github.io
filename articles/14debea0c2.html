hors":[],"dates":[{"year":1978,"month":12,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"萨达姆副主席接见姬鹏飞副委员长"},{"type":"paragraph","text":"马鲁夫副总统同姬副委员长举行第二轮会谈"},{"type":"paragraph","text":"新华社巴格达十一月三十日电　伊拉克革命指挥委员会副主席萨达姆·侯赛因今天接见了正在这里访问的姬鹏飞副委员长，并同他进行了亲切的谈话。"},{"type":"paragraph","text":"姬鹏飞向萨达姆转交了华国锋总理的一封信，并向萨达姆转达了华国锋总理、叶剑英委员长和邓小平副总理的亲切问候。他说，华国锋总理邀请萨达姆在他方便的时候访问中国。萨达姆愉快地接受了这一邀请。"},{"type":"paragraph","text":"萨达姆请姬鹏飞向华总理、叶委员长和邓副总理转达他的问候。他说，伊拉克珍视同中国的友谊，希望发展伊中友谊。"},{"type":"paragraph","text":"姬鹏飞指出，加强中伊关系符合两国人民和第三世界的根本利益。"},{"type":"paragraph","text":"姬鹏飞邀请伊拉克阿拉伯复兴社会党在明年上半年派一个党的代表团访问中国，萨达姆也很高兴地接受了这一邀请。"},{"type":"paragraph","text":"接见前，马鲁夫副总统同姬副委员长举行了第二轮会谈。（附图片）"},{"type":"paragraph","text":"伊拉克革命指挥委员会副主席萨达姆·侯赛因十一月三十日接见姬鹏飞副委员长，并同他进行了亲切的谈话。"},{"type":"paragraph","text":"新华社记者王景英摄（传真照片）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"华国锋","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"14debea0c2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
