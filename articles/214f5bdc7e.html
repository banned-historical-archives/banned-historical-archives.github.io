es":[{"year":1997,"month":5,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报北京专讯　最近，北京市有关单位开展了“捐角膜、献爱心、送光明”活动。为了了解这次活动在北京市民中的影响以及北京市民对捐献角膜的态度，北京“百分点咨询有限公司”在该市东城、西城和崇文等6城区对500位北京市民进行了随机问卷调查。"},{"type":"paragraph","text":"在接受调查的500位北京市民中，有48.4%的人表示“愿意身后捐献角膜”；在回答“是否愿意身后捐献角膜”这一问题上，男性比女性高约6个百分点；年龄与捐献意愿呈现正比关系，即年龄越大，回答“愿意捐献角膜”的比例也就越高；从职业上看，回答“愿意捐献角膜”比例最高的是医务人员，占75%。　(王文革)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"214f5bdc7e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
