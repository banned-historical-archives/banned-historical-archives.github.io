s":[],"dates":[{"year":1969,"month":10,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社北京十七日电　中国共产党中央委员会主席毛泽东同志收到了法国《红色路线》报政治领导机构祝贺中华人民共和国成立二十周年的贺信。"},{"type":"paragraph","text":"贺信说，伟大的中国人民给全世界人民指出了争取解放的光辉道路。在中国共产党的领导下，中国人民打倒了帝国主义、封建主义，取得了全国的解放。随后，又进行了社会主义革命，建立了崭新的经济基础。为了巩固无产阶级专政和巩固社会主义制度，在毛主席亲自领导下，中国人民进行了史无前例的、震撼全世界的无产阶级文化大革命。在上层建筑领域进行的这一场革命，是非常有益、非常必要的。文化大革命打倒了以叛徒刘少奇为首的混入党内和国家内部的阶级敌人，他们是顽固不化的修正主义者和复辟资本主义的人。"},{"type":"paragraph","text":"贺信说，中国的文化革命使世界各国的马克思列宁主义者和进步人士感到欢欣鼓舞，这场革命大大地帮助他们认清现代修正主义的危险；现代修正主义伪装捍卫毛泽东思想，实际上却枉费心机地反对毛泽东思想。中国的文化革命给世界各国的马克思列宁主义者和进步人士带来了具有普遍意义的教益，他们正在努力汲取这些教益。"},{"type":"paragraph","text":"贺信说，在法国，从一九六八年五月革命风暴以来，我国人民有了新的觉醒。法国的马克思列宁主义运动还处在幼年时期，但是我们将尽一切努力创建我国人民所需要的领导核心:一个依靠正确的政治路线来领导社会主义革命的真正的马克思列宁主义政党。人民中国的大大加强，对我们进行反对当权的法帝国主义资产阶级和形形色色的修正主义的斗争，是一个强有力的鼓舞。"},{"type":"paragraph","text":"贺信最后高呼:"},{"type":"paragraph","text":"中华人民共和国成立二十周年万岁!"},{"type":"paragraph","text":"中国共产党及其伟大的领袖毛主席万岁!"},{"type":"paragraph","text":"当代的马克思列宁主义——毛泽东思想万岁!"},{"type":"paragraph","text":"世界革命万岁!"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5b87460afd"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
