thors":[],"dates":[{"year":1954,"month":9,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华计北京一日电】　我中央人民政府毛泽东主席致电越南民主共和国胡志明主席，祝贺越南民主共和国国庆九周年。电文如下:"},{"type":"paragraph","text":"越南民主共和国主席"},{"type":"paragraph","text":"胡志明同志:"},{"type":"paragraph","text":"在印度支那和平已经开始恢复的时候，我代表中华人民共和国政府和中国人民以极愉快的心情向越南民主共和国政府和越南人民热烈地祝贺越南民主共和国的国庆九周年。"},{"type":"paragraph","text":"越南人民多年来争取民族的独立和自由的英勇斗争已获得重大的成果。我深信:越南人民在巩固和平、实现统一、完成独立和民主的事业中必将获得更大的胜利。在这个事业中越南人民将得到中国政府和全中国人民的深切关怀和积极支持。毛泽东"},{"type":"paragraph","text":"一九五四年八月三十一日于北京　 【新华社北京一日电】　我中央人民政府政务院总理兼外交部部长周恩来致电越南民主共和国副总理兼外交部部长范文同，祝贺越南民主共和国国庆九周年。电文如下:"},{"type":"paragraph","text":"越南民主共和国副总理兼外交部部长"},{"type":"paragraph","text":"范文同同志:"},{"type":"paragraph","text":"值此越南民主共和国国庆九周年之际，请接受我热诚的祝贺。"},{"type":"paragraph","text":"祝越南人民在恢复和平的日子里，在医治战争创伤和恢复国民经济的工作中获得光辉的成就。"},{"type":"paragraph","text":"为了巩固两洲及世界的和平，中国政府和人民将坚决同越南民主共和国和有关国家一道为保证恢复印度支那和平的各项协议的彻底实现而奋斗。"},{"type":"paragraph","text":"周恩来"},{"type":"paragraph","text":"一九五四年八月三十一日于北京"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"558a8a8bc0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
