cal-archives/banned-historical-archives9/main/books/机密档案中新发现的毛泽东讲话.epub"],"article":{"title":"毛泽东主席在《关于处理马共主席穆沙要求发表文章的请示报告》上的批示","parts":[{"text":"1968年8月13日","type":"paragraph"},{"text":"【马共主席穆沙•阿默德是马来人，由于马共主要由华人组成，但马来西亚又是马来人占多数，所以马共后来找了这个马来人当象征性的党主席。1968年穆沙向马共国外代表团提交意见书，而后又广泛散发署名文章《坚持毛泽东思想就是马来亚人民革命胜利的道路》，公开暴露党内分歧，受到党内解职处分。1981年1月，穆沙等人在马来西亚官方电视台发表投降自白书，正式脱离马共。中联部建议告穆沙：中共一贯不干涉兄弟党内部事务，路线分歧希望在马列主义原则基础上得到党内解决，文章不便发表。中联部还建议把此事告诉陈平。这个报告由康生批送毛主席的时间是7月2日，经毛主席批改后，康生将此文件退给中联部的时间是8月13日。】","type":"paragraph"},{"text":"“删去了几个字”","type":"paragraph"},{"text":"请示报告中两处提到希望该党“在马克思主义、列宁主义、毛泽东思想的原则基础上”解决党内分歧，毛主席都把“毛泽东思想”这几个字删去了。\u003cbr style=\"clear:both;\"\u003e","type":"paragraph"}],"authors":["毛泽东"],"dates":[{"year":1968,"month":8,"day":13}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"康生","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b21c3adb5a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
