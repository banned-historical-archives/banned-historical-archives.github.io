rt":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"锡共中央选出领导人员库马拉西里为总书记 桑穆加塔桑为全国组织员兼司库 政治局列举前中央修正主义分子应该受到纪律处分的各种罪状","authors":[],"parts":[{"type":"paragraph","text":"新华社科伦坡五日电 据这里的报纸一月二十九日刊登的锡兰共产党二十八日发表的一项新闻公报说，锡兰共产党第七届中央委员会在一月二十五日和二十六日举行会议，选出了普雷马拉·库马拉西里为总书记，纳·桑穆加塔桑为全国组织员兼司库，德·贾嫩德拉帕拉为助理组织员。"},{"type":"paragraph","text":"公报说，会议还选出包括上述人员在内的政治局。"},{"type":"paragraph","text":"公报说，政治局在二十六日举行的会议决定向前中央委员会中的所有修正主义分子发出信件，列举他们应该受到纪律处分（也可能开除党籍）的各种罪状，并且允许他们在两星期内以书面形式进行申辩。"},{"type":"paragraph","text":"信中所列举的罪状包括：不遵照党章的规定在举行上次代表大会后两年之内，召开第七次党代表大会；抛弃体现在一九五七年莫斯科宣言和一九六○年莫斯科声明中的真正马克思列宁主义观点，采取现代修正主义的错误立场，未经适当的调查就开除库马拉西里、桑穆加塔桑等同志；未加任何罪名就解除库马拉西里等同志的刊物主编的职务；拒绝听从党的大多数地区委员会和一半以上的党员提出的关于立即召开党代表大会以解决目前党内争论的要求和意见书；停止吸收新党员，使党员人数减少到极少的数字，从而客观上解除了党组织的武装，削弱了党；反对和拒绝领导工人的斗争，一味倚靠议会途径作为工人阶级和平地取得政权的办法，拒绝使工人阶级对非和平地过渡到社会主义的可能性有所准备和集结一切革命力量；不把农民组织起来；不对党员和工人阶级进行马克思主义教育；没有出版工人阶级的日报；企图分裂党所领导的群众团体和阵线，分裂锡兰工会联合会，建立对立的工会分裂者小组，进行教族宣传，损害为革命原则而斗争的同志们的信誉和孤立他们；不遵守党章、民主集中制和党的生活中其他列宁主义准则，破坏党的团结。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"435798947d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
