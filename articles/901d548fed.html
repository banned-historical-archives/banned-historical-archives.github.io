","authors":["任志樵"],"dates":[{"year":1957,"month":5,"day":21}],"is_range_date":false,"parts":[{"text":"北京各厂矿企业党委书记提出整风中几个急待解决的问题","type":"title"},{"text":"任志樵","type":"authors"},{"text":"新华社北京21日讯　在中共北京市委工业部召开的各厂矿企业党委书记会上，提出了整风中几个急待明确和解决的问题：","type":"paragraph"},{"text":"一、参加整风的同志，要不要一个一个地“过关”？检查以后，群众还有意见，被批评者又不同意怎么办？要不要找重点人？","type":"paragraph"},{"text":"二、在一个工厂企业党委会里，是不是每个成员都要单独作思想检查报告？是不是只要党委主要负责人检查并且作检查报告，其他同志作一般检查就行了？","type":"paragraph"},{"text":"三、整风中牵涉到工资、福利怎么办？过去不合理的问题，是否可以解决？","type":"paragraph"},{"text":"四、领导检查以后是否还要交代？向谁交代？是开职工代表大会或党员代表大会交代还是党政工团分别交代？","type":"paragraph"},{"text":"五、整风中是否要作出书面检查？","type":"paragraph"},{"text":"六、群众对非党负责干部意见多了怎么办？","type":"paragraph"},{"text":"七、工厂企业中只有一个党委书记或厂长，怎么贯彻执行整风生产两不误？","type":"paragraph"},{"text":"八、工厂企业中的小报，是否也像人民日报一样什么意见都登？","type":"paragraph"},{"text":"九、中央指示中提出反对三个主义，但中中央来提应该树立什么，怎么办？","type":"paragraph"},{"text":"十、中央对整风运动有无具体措施？过去“三反”、“肃反”都有百分之几的控制数，这次是否也有？　　(任志樵)","type":"paragraph"},{"text":" 来源： 1957年5月21日新华通讯社编《内部参考》。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"901d548fed"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
