" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji45","name":"毛泽东全集第45卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji45.pdf"],"article":{"title":"毛泽东等祝贺波兰国家复兴节十九周年的电报","alias":"","parts":[{"type":"paragraph","text":"毛泽东等祝贺波兰国家复兴节"},{"type":"paragraph","text":"十九周年的电报"},{"type":"paragraph","text":"（1963年7月21日）华沙波兰统一工人党中央委员会第一书记瓦迪斯瓦夫·哥穆尔卡同志，波兰人民共和国国务委员会主席亚历山大·萨瓦茨基同志，波兰人民共和国部长会议主席约瑟夫·西伦凯维兹同志："},{"type":"paragraph","text":"值此波兰国家复兴节十九周年之际，我们代表中国人民、中国共产党和中国政府，向波兰人民、波兰统一工人党和波兰人民共和国政府，致以热烈的祝贺。"},{"type":"paragraph","text":"十九年来，波兰人民在波兰统一工人党和波兰政府的领导下，在社会主义建设中取得了显著的成就。中国人民对此感到高兴。"},{"type":"paragraph","text":"中波两国人民之间存在着深厚的友谊。在长期革命斗争中和建设社会主义的事业中，我们两国人民是相互支持、相互援助的。维护和加强我们两国人民的友好团结，不仅符合两国人民的共同利益，而且有利于反对帝国主义的共同斗争，有利于社会主义阵营力量的增强。中国人民将一如既往，在马克思列宁主义和无产阶级国际主义的基础上，在一九五七年宣言和一九六○年声明的革命原则的基础上，努力增强中波两国人民的友好团结，并且同波兰人民一道，为反对帝国主义，为争取世界和平、民族独立、人民民主和社毛泽东全集第四十五卷会主义的斗争的新胜利而努力。"},{"type":"paragraph","text":"祝波兰人民在波兰统一工人党和波兰政府的领导下，在建设社会主义和维护世界和平的事业中，取得新的成就。祝中波两国人民的兄弟友谊日益增进。"},{"type":"paragraph","text":"中国共产党中央委员会主席毛泽东中华人民共和国主席刘少奇中华人民共和国全国人民代表大会常务委员会委员长朱德中华人民共和国国务院总理周恩来"},{"type":"paragraph","text":"一九六三年七月二十一日"}],"authors":["毛泽东"],"dates":[{"year":1963,"month":7,"day":21}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":476,"page_end":477},"tags":[{"name":"毛泽东","type":"人物"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"694703d1f2"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
