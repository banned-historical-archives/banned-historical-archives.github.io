951,"month":12,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席给大会的复电"},{"type":"paragraph","text":"西北各族人民抗美援朝代表会议全体代表同志们：感谢你们给我的电报。过去一年多以来，西北区各族人民在抗美援朝的爱国斗争中，作了很大的努力，得到了很大的成绩。你们的这次代表会议，决定进一步团结各族人民，增加生产，厉行节约，开展爱国主义的宣传教育工作，以支持中国人民志愿军，这是很好的。帝国主义过去敢于欺负中国的原因之一，是中国各民族不团结，但是这个时代已经永远过去了，从中华人民共和国成立的那一天起，中国各民族就开始团结成为友爱合作的大家庭，足以战胜任何帝国主义的侵略，并且把我们的祖国建设成为繁荣强盛的国家。祝你们的会议成功！"},{"type":"paragraph","text":"毛泽东十二月十二日"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fde132d3c5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
