" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"周恩来召集北京各红卫兵负责同志的讲话","authors":["周恩来"],"dates":[{"year":1966,"month":11,"day":2}],"is_range_date":false,"parts":[{"text":"周恩来召集北京各红卫兵负责同志的讲话","type":"title"},{"text":"周恩来","type":"authors"},{"text":"今天是个紧急会，所以我就开门见山了。明天要接见外地二百万革命师生，我们现在分别开会，从昨天晚上到现在都在；研究关于明天毛主席和他的亲密战友林彪同志接见外地革命师生的事。我们信任你们，所以跟你们谈谈这些问题。有人听说毛主席要接见，就到天安门广场上来等。因为这次人太多了，所以现在只能用大喇叭广播，让他们回到各单位去。","type":"paragraph"},{"text":"这次接见任务很重，北京市从来没有组织过二百多万的大队伍来游行，每年“十·一”，“五·一”最多才一百五十万游行，这次二百多万，你们想想看，你们要帮助党中央，军委和市委搞好这项工作，胜利完成这项重大的任务。","type":"paragraph"},{"text":"这次接见是在搞两条路线斗争深入的时候；在我国发射导弹，敌人慌乱的时候；今年又是农业大丰收，阶级斗争，生产斗争和科学实验胜利的时候；全国人民欢欣鼓舞的时候，我们伟大的领袖和他的亲密战友林彪同志来检阅，我们应该是雄赳赳气昂昂地走过天安门。我们这次比“十·一”任务还重，但一定得比“十·一”还要好。这次可能时间拖得很长，如果不很好地组织起来，那时间就更长了。虽然说在上几次接见的时候，主席出来站一会儿再回去休息一会，但那也够累了，主席疲劳了，那也不好呀！","type":"paragraph"},{"text":"对外地的革命师生，不但安排住的地方，吃的地方，而且还要招待得好。我们对你们有几项要求：","type":"paragraph"},{"text":"1.不参加检阅，不到天安门去。你们要向雷锋，王杰学习，专门利人毫不利己。市区联络总站，分站联合组织，通过你们的组织来做好这项工作。你们谁没有见过毛主席，以后给你们补，我不是把你们的名字都记下来了吗？","type":"paragraph"},{"text":"2.能回学校的就回学校做宣传工作，帮助解放军和其他组织做宣传，要遵守秩序，搞好队伍，通过天安门时要迅速。宣传毛泽东思想，今天下午你们回去好好地讲讲毛主席和他的亲密战友同志接见的伟大意义。","type":"paragraph"},{"text":"3.就是他们走后，还要帮助他们把屋子打扫干净（指外地师生去游行时），我们要以身作则，用我们的实际行动来感动他们，你们要学习解放军的三大纪律八项注意。","type":"paragraph"},{"text":"4.回来之后（指游行回来），劝他们回去，好好地搞无产阶级文化大革命，搞两条路线的斗争，搞本单位的运动。劝他们回去。每天北京要来廿四万人，来的时候就连厕所都装七个人，火车头上都有人，但是回去的时候呢？每天只走两万多人，车上很松，有的还在车上躺着睡觉，你们算算这个简单的帐，这样下去，北京几天就不行了。所以你们一定要好好给他们讲讲，接见之后，要按照发票的时间走，回去搞斗批改，搞运动。","type":"paragraph"},{"text":"5.要为下一步做好准备工作，使每个学校容量扩大。但不准住大会堂，你们要保护大会堂，因为每天要有好多人来开会。我们把问题说穿，即使我说错了，给我贴大字报，我可以改嘛！我们中南海都住上外地师生了，住了有三千人。你们回去要跟大家商量，不要拥挤，并劝同学和不参加组织的人不要拥挤。碰上问题了，要多给人家解释。向解放军学习，团结，紧张，严肃，活泼。","type":"paragraph"},{"text":"6.帮助宣传，一定要做好宣传工作。","type":"paragraph"}],"comments":[],"origin":"一九六六年北京化工学院《红色宣传员》战斗组、北京经济学院无产阶级革命团、北京市东方红印刷厂革命造反联络处、化工部化学工业出版社印刷厂联合汇编《无产阶级文化大革命参考资料（3）》。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"林彪","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b5b13a1edb"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
