rt":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"藏族同胞热爱毛主席著作拉萨人民争相购买藏文版《毛泽东选集》第四卷","authors":[],"parts":[{"type":"paragraph","text":"据新华社拉萨六日电 《毛泽东选集》第四卷藏文版在拉萨市开始发行时，藏族人民争相购买，他们说，读毛主席的书，听毛主席的话，才能把工作做好，把生产搞好。"},{"type":"paragraph","text":"五日一清早，拉萨市新华书店藏文书刊门市部门前，就排着长长的等待购买《毛泽东选集》第四卷藏文版的人群。购书的人大部分是翻身农奴成长起来的干部、工人、人民解放军战士和普通农牧民，他们当中许多人在民主改革前还一字不识，翻身后才学会藏文。"},{"type":"paragraph","text":"藏族人民购买毛主席著作的热烈情景十分动人。藏族战士尼玛平措已经乘上汽车就要出发到边远的部队驻地去，听说书店正在出售《毛泽东选集》第四卷藏文版，他要求驾驶员暂停一下，下车跑到书店买到一本以后才出发。"},{"type":"paragraph","text":"这天，拉萨市新华书店藏文书刊门市部一上午就售出《毛泽东选集》第四卷藏文版五百册。"},{"type":"paragraph","text":"从七月一日起，在西藏的昌都、泽当、日喀则、噶尔昆沙等地，也陆续开始发行，毛泽东选集》第四卷藏文版。"},{"type":"paragraph","text":"从一九五九年以来，《毛泽东选集》第一、二卷藏文版和毛主席著作的单行本，已在西藏发行了近万册。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6890ab63cc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
