d-historical-archives1/main/6217a650-402c-431d-bc67-8fb48f4f35d2/12.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/6217a650-402c-431d-bc67-8fb48f4f35d2/13.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/6217a650-402c-431d-bc67-8fb48f4f35d2/14.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/6217a650-402c-431d-bc67-8fb48f4f35d2/15.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/6217a650-402c-431d-bc67-8fb48f4f35d2/16.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/6217a650-402c-431d-bc67-8fb48f4f35d2/17.jpg"],"article":{"title":"邓小平在万里同志向国务院汇报××铁路局情况时的插话","alias":"","parts":[{"type":"paragraph","text":"胡乔木同志揭发的邓小平的言论（摘录）（六）"},{"type":"paragraph","text":"（一九七六年三月二日揭发·····9（七） ×x同志揭发的邓小平在中央农村工作座"},{"type":"paragraph","text":"谈会期间的讲话（摘录）"},{"type":"paragraph","text":"（一九七六年三月七日揭发）··········（13）（八）×××同志揭发的邓小平的言论（摘录）"},{"type":"paragraph","text":"（一九七六年三月十一日揭发）········（16）（九）邓小平在接见全国工业书记会议代表时的讲"},{"type":"paragraph","text":"话（补充）"},{"type":"paragraph","text":"...··(18)"},{"type":"paragraph","text":"（一九七五年三月五日）····（十）邓小平在国务院办公会议上的讲话（补充）"},{"type":"paragraph","text":"（一九七五年五月二十一日·········（19）（十一）邓小平的其他言论（摘录）···．·········（21）（一）邓小平在万里同志向国务院汇报"},{"type":"paragraph","text":"××铁路局情况时的插话（摘录）"},{"type":"paragraph","text":"（一九七五年三月二十五日）"},{"type":"paragraph","text":"（当万里同志讲到××市委检讨很深刻，他们说，向被弄错的受害者认罪。应该平反的大概有七，八千人时）"},{"type":"paragraph","text":"要真正搞起来也快。要一批一批地搞，不要一个一个地搞。"},{"type":"paragraph","text":"（当万里同志讲到××市委摘了平反证，老工人不要时）要在群众中宣布。"},{"type":"paragraph","text":"（当万里同志讲到，×X市委说三月底平反问题可以全部解决时）"},{"type":"paragraph","text":"要借这个东风一块解决，七、八千人，八百人一批：分十批。搞群众运动的方法很快，念八百人的名宇嘛，弄错了立即平反嘛。"},{"type":"paragraph","text":"（当万里同志在汇报全国铁路系统贯彻中央九号文件的情况时，讲到，问题多的是：××、××，×x三个铁路局和四个车辆工厂，他们根本没动）"},{"type":"paragraph","text":"要查一查，只要是确实的，要调走，军委下命令把他"},{"type":"paragraph","text":"（按：指部队干部）调走，铁路系统的部里赶快调，四月一日行动。"},{"type":"paragraph","text":"看有后台没有，省委，军区有没有人支持，是不是有人不听中央指示，不听部里调动。有后台的要脱钩，不听铁路指挥的，调走嘛！从四月一日开始。中央，国务院下决心，你们报告嘛！犯错误我们承担，我们已经等了很久了。现在有九号文件，有脱钩的条件。"},{"type":"paragraph","text":"铁路局不听指挥的，四月一日就调，铁路第一步可先采取脱钩。如那个副局长，宜布撤职，不只是调的回题。"},{"type":"paragraph","text":"管你有理无理，这段闹就无理。党的方针政策，和群众见面解决问题比较快，也比较透，多数人对派性厌倦了，有百分之九十五的群众拥护主席安定团结的指示。只要这一条肯定的话，就充分发动群众，问题就好解决了。各部也要同省委商量一下，让能干的，强的同志和地方结合起来，搞几个点看看。x×市就是老大难，在铁路，在地方都是典型的。××部这个基地。那个基地，这个单位，那个单位，相信只要群众起来了，问题就好解决了。相信采取这个方法是快的。主席讲过，有些人不怕领导批评，就怕群众，党委会有时不行，群众起来了就行了。现在看起来，同题可以解决了。要向干部和群众讲清问题。铁路不要等地方，四个厂不搞好计划要落空，你们无法修理，车开不动，铁道部要管，因为和铁道部关系密切，和地方一起搞。肯定有反对的，有怀疑的，有怕犯错误的，×市有人说：“九号文件为复辟的文件”，这相当显明了。"},{"type":"paragraph","text":"××省有干部在外头，听说不发工资，才回来，也不上班。到了四月一号要行动。"},{"type":"paragraph","text":"现在是压下去了。2（二） 邓小平接见×xx、xxx同志"},{"type":"paragraph","text":"时的谈话（摘录）"},{"type":"paragraph","text":"（一九七五年八月六日）一、关于清除资产阶级派性问题"},{"type":"paragraph","text":"看了你们的报告，讲了一些你们的情况。找你们来，就要是要象××省、××省那样，把重大问题一起拿来解决，不光是解决那三个人的问题，解决派性问题，班子问题、态度要坚决。班子要配好，才有人办事。××省的情况你们知道不知道？大批突击提干，实际上是夺权，领导权都是人家的了，全省资本主义复辟严重得很。"},{"type":"paragraph","text":"二、关于领导班子问题1、班子配备，调整。"},{"type":"paragraph","text":"调整领导班子，你们要坚决，要下决心坚决搞好，趁这次大调整，地方也要调整。什么事情没有强有力的领导班子就办不好嘛！九号、十三号文件，中心就是解决班子问题，十二、十三号文件就是为了落实九号文件，我的几次讲话，最重要的是在国务院的那一次。（x：还有对××部讲的那次）××部那是最冒尖的单位，现在一搞，也理出个头绪来了，总是多数人同意，少数人不同意，总是有那么几个人要骂的，随他去骂，无非是让他骂十年。"},{"type":"paragraph","text":"3"},{"type":"paragraph","text":"要借这个东风一块解决，七、八千人，八百人一批：分十批。搞群众运动的方法很快，念八百人的名宇嘛，弄错了立即平反嘛。"},{"type":"paragraph","text":"（当万里同志在汇报全国铁路系统贯彻中央九号文件的情况时，讲到，问题多的是：××、××，×x三个铁路局和四个车辆工厂，他们根本没动）"},{"type":"paragraph","text":"要查一查，只要是确实的，要调走，军委下命令把他"},{"type":"paragraph","text":"（按：指部队干部）调走，铁路系统的部里赶快调，四月一日行动。"},{"type":"paragraph","text":"看有后台没有，省委，军区有没有人支持，是不是有人不听中央指示，不听部里调动。有后台的要脱钩，不听铁路指挥的，调走嘛！从四月一日开始。中央，国务院下决心，你们报告嘛！犯错误我们承担，我们已经等了很久了。现在有九号文件，有脱钩的条件。"},{"type":"paragraph","text":"铁路局不听指挥的，四月一日就调，铁路第一步可先采取脱钩。如那个副局长，宜布撤职，不只是调的回题。"},{"type":"paragraph","text":"管你有理无理，这段闹就无理。党的方针政策，和群众见面解决问题比较快，也比较透，多数人对派性厌倦了，有百分之九十五的群众拥护主席安定团结的指示。只要这一条肯定的话，就充分发动群众，问题就好解决了。各部也要同省委商量一下，让能干的，强的同志和地方结合起来，搞几个点看看。x×市就是老大难，在铁路，在地方都是典型的。××部这个基地。那个基地，这个单位，那个单位，相信只要群众起来了，问题就好解决了。相信采取这个方法是快的。主席讲过，有些人不怕领导批评，就怕群众，党委会有时不行，群众起来了就行了。现在看起来，同题可以解决了。要向干部和群众讲清问题。铁路不要等地方，四个厂不搞好计划要落空，你们无法修理，车开不动，铁道部要管，因为和铁道部关系密切，和地方一起搞。肯定有反对的，有怀疑的，有怕犯错误的，×市有人说：“九号文件为复辟的文件”，这相当显明了。"},{"type":"paragraph","text":"××省有干部在外头，听说不发工资，才回来，也不上班。到了四月一号要行动。"},{"type":"paragraph","text":"现在是压下去了。2（二） 邓小平接见×xx、xxx同志"},{"type":"paragraph","text":"时的谈话（摘录）"},{"type":"paragraph","text":"（一九七五年八月六日）一、关于清除资产阶级派性问题"},{"type":"paragraph","text":"看了你们的报告，讲了一些你们的情况。找你们来，就要是要象××省、××省那样，把重大问题一起拿来解决，不光是解决那三个人的问题，解决派性问题，班子问题、态度要坚决。班子要配好，才有人办事。××省的情况你们知道不知道？大批突击提干，实际上是夺权，领导权都是人家的了，全省资本主义复辟严重得很。"},{"type":"paragraph","text":"二、关于领导班子问题1、班子配备，调整。"},{"type":"paragraph","text":"调整领导班子，你们要坚决，要下决心坚决搞好，趁这次大调整，地方也要调整。什么事情没有强有力的领导班子就办不好嘛！九号、十三号文件，中心就是解决班子问题，十二、十三号文件就是为了落实九号文件，我的几次讲话，最重要的是在国务院的那一次。（x：还有对××部讲的那次）××部那是最冒尖的单位，现在一搞，也理出个头绪来了，总是多数人同意，少数人不同意，总是有那么几个人要骂的，随他去骂，无非是让他骂十年。"},{"type":"paragraph","text":"3"}],"authors":["邓小平"],"dates":[{"year":1975,"month":3,"day":25}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":3,"page_end":4},"tags":[{"name":"邓小平","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"派性","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1a7c5480fd"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
