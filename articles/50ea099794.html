es":[],"article":{"title":"中共中央组织部、中国人民解放军总政治部关于确定原杨虎城部三十八军指战员参加革命工作时间的通知","dates":[{"year":1984,"month":11,"day":17}],"is_range_date":false,"authors":["中共中央组织部","总政治部"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"中共山西省委组织部, 干审工作文件选编, 71-72","tags":[{"name":"老干部","type":"主题/事件"},{"name":"三十八军","type":"主题/事件"},{"name":"杨虎城","type":"主题/事件"}],"parts":[{"type":"title","text":"中共中央组织部中国人民解放军总政治部关于确定原杨虎城部三十八军指战员参加革命工作时间的通知"},{"type":"subtitle","text":"组通字〔1984〕31号[1]"},{"type":"paragraph","text":"原杨虎城部三十八军是我党统一战线工作的一个典范。虽然形式上是国民党的编制，但实际上三十八军地下党组织是按照我党的路线、方针、政策改造、建设部队的，广大指战员同日蒋进行了艰苦的斗争。"},{"type":"paragraph","text":"现对原三十八军指战员的参加革命工作时间问题作如下规定:"},{"type":"paragraph","text":"一、原三十八军指战员的参加革命工作时间，凡符合中组发〔1982〕11号文件《关于确定建国前干部参加革命工作时间的规定》的，按11号文件办理。"},{"type":"paragraph","text":"二、“七 · 七”事变爆发后，凡随部队参加了对日作战并经过山西碛口“新作风整训运动”，一直拥护我党的主张，坚持抗日，未间断革命工作的，其参加革命工作时间从一九三七年七月十五日算起；“新作风整训运动”后参加部队的，入伍后一直拥护我党的主张，坚持抗日，未间断革命工作的，从其参加部队之日算起。"},{"type":"paragraph","text":"三、凡在一九三六年十二月直接接受我党交给的任务，参加我党领导的军事斗争、政治斗争，并一直拥护我党的主张，坚持抗日，未间断革命工作的，其参加革命工作时间可从一九三六年十二月算起。"},{"type":"paragraph","text":"四、在晋东南八路军“军政训练班”受训毕业，一直拥护我党的主张，坚持抗日，未间断革命工作的，其参加革命工作时间可从一九三八年二月算起。"},{"type":"paragraph","text":"五、参加由原三十八军地下工委主办的教导队（第一期至第五期）和第四集团军学生队（第一、二期）的学员，一直拥护我党的主张，坚持抗日，未间断革命工作的，其参加革命工作时间从入学之日算起。"},{"type":"paragraph","text":"六、受我党组织派遣到各地建立地下据点，并一直坚持革命工作的，其参加革命工作时间从接受派遣任务之日算起。"},{"type":"paragraph","text":"七、抗日战争时期的原杨虎城部九十六军指战员，凡一直拥护我党的主张，坚持抗日，未间断革命工作的，经原地下党领导人证明，其参加革命工作时间可参照上述规定办理。"},{"type":"paragraph","text":"一九八四年十一月十七日"},{"type":"paragraph","text":"（晋组字〔1985〕4号文件转发）"},{"type":"paragraph","text":"[1] Note: This document is reprinted in 中央组织部干审局,干审工作政策文件选编（下）, pp. 1253-1254."}],"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"50ea099794"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
