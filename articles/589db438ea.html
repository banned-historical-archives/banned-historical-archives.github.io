nned-historical-archives/banned-historical-archives9/main/books/十年文革中首长讲话传信录2.pdf"],"article":{"title":"谢富治接见三个司令部及其他人员的谈话","parts":[{"type":"title","text":"488．谢富治接见三个司令部及其他人员的谈话"},{"type":"paragraph","text":"(1967年2月6日下午)一、支持成立首都革命造反派红卫兵代表大会，但这个名词不太好，建议换一下。二、赞成一个学校派一个组织。暂时不收中学生。在中学生中，目前左派队伍还比较混乱。三、建议学生帮助首都三个工人造反组织进行整顿，并联合起来。四、目前学生组织中你吞并我，我吞并你是不对的，应该联合，左派之间发生了很多矛盾，出现了武斗现象，这是不符合主席的坚持文斗，不要武斗。如发生了类似现象，应遵守以下三条："},{"type":"paragraph","text":"第一，不能打架，"},{"type":"paragraph","text":"第二，不能撒传单、贴大字报，"},{"type":"paragraph","text":"第三，不要开动宣传车互相攻击，有缺点和错误应在内部讨论。"}],"authors":["谢富治"],"dates":[{"year":1967,"month":2,"day":6}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":192,"page_end":193,"alias":""},"tags":[{"name":"谢富治","type":"人物"},{"name":"武斗","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"589db438ea"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
