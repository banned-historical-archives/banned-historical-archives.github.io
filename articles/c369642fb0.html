art":6,"page_end":6,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"篆刻《毛泽东诗词》第一人","authors":["包林/刘来平"],"parts":[{"type":"paragraph","text":"筹措八年，奏刀十月的《毛泽东诗词》篆刻，长50多米，通观全卷500多余方印章在国内书画界堪称之绝。他的篆刻者是军人刘国亮。刘国亮的书画篆刻艺术，多年师从齐白石四子齐良迟。"},{"type":"paragraph","text":"毛泽东诗词内容博大精深，气势雄伟磅礴，具有感人的艺术魅力。篆刻《毛泽东诗词》，是刘国亮久存的心愿。"},{"type":"paragraph","text":"为完成篆刻《毛泽东诗词》这一巨大的艺术工程，达到诗与印的完美结合，刘国亮加强文化修养，潜心研究诗词与篆刻艺术整整八年，用了十个月的时间精心篆刻。"},{"type":"paragraph","text":"刘国亮篆刻高明之处，在方寸天地之中体现了毛泽东诗词的宏伟与磅礴。全卷500余方印章，自始至终风格一致，统一中求变化，变化中求统一；布局严谨大方，独具心裁。齐白石书法研究会会长齐良迟为刘国亮题词：“印苑之光华”。"},{"type":"paragraph","text":"●包林刘来平"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c369642fb0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
