<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共云南省监察委员会关于开除程浩党籍的决定","authors":[],"dates":[{"year":1958,"month":9,"day":10}],"is_range_date":false,"parts":[{"text":"中共云南省监察委员会关于开除程浩党籍的决定","type":"title"},{"text":"程浩，男，42岁，山西洪赵县人，家庭出身中农，本人成份学生，1937年10月参加革命，同年11月入党，曾任报务员、电台台长、云南省邮电管理局副局长等职。","type":"paragraph"},{"text":"程浩的亲戚、反革命分子郭仰德，曾任阎匪中队长、特务营情报组组长等反动职务，一贯从事特务活动，专门收集我军情报，1948年临汾解放后被当地政府逮捕，判处群众管制（该犯隐瞒罪行骗得宽大处理）。1951年郭改名郭仁德，从山西潜逃来昆明，找程浩介绍工作。程当时就对郭有怀疑，但未将情况向组织汇报，反而利用职权将郭介绍到邮电训练班学习后分配在昆明市邮电局工作。1953年程回家乡时了解到郭参加过阎匪“进步会”，在临汾一带“很吃得开”。但他知道这些情况后仍继续认敌为亲，将郭妻带来昆明。途中，程浩又发现郭妻的日记本上写有要郭“买个棺材，装个死尸运回家，以掩人耳目”等语，但他仍不向组织检举揭发。1954年邮电局将郭定为历史反革命分子准备清洗，与程交换意见时，他仍继续进行包庇说：“我对他的情况了解，家庭情况不算好，读过几年书，当过学徒，除了在临汾的几年外，其他都是好的，历史已基本交代清楚，……能留下就留下”。由于他的直接庇护，致使这个反革命分子得以隐藏下来，在1956年底和1957年初正当帝国主义在国际上发动反共高潮的时候，肆无忌惮地以“反共救国军政宣部”等名义进行了写恐吓信威胁、辱骂国际友人等一系列的反革命破坏活动。直到1957年初才被我公安机关查获逮捕枪决。","type":"paragraph"},{"text":"程浩包庇反革命分子的错误，在1956年肃反时，群众即作了揭发。经过党委、党组负责同志多次谈话，程浩长期不承认错误。反而采取狡赖手法，把责任推给邮电局党组，说他的错误是领导上给他造成的。支部大会对他批判，他一再表示“没有什么再检查的了”。先后写了5次检讨，都不接触思想作深刻检查。","type":"paragraph"},{"text":"以上事实说明，程浩认敌为亲，有意包庇反革命分子，给党和革命事业造成不可估量的损失，事实揭发后又长期坚持错误，完全丧失了一个共产党员应有的立场和品质。为了严肃党的纪律，省监委决定，并经省委批准将程浩开除党籍。","type":"paragraph"}],"comments":[],"origin":"中共中央监察委员会办公厅编：《县委书记以上干部受到开除党籍处分的决定汇编（二）》（党内文件·注意保存），1960年。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4b4dcc431d"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
