uthors":["黄万斌"],"dates":[{"year":1985,"month":2,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"澄清“一派正确，一派错误”的糊涂认识"},{"type":"paragraph","text":"洛阳市审计局进行彻底否定“文革”教育"},{"type":"paragraph","text":"河南省洛阳市审计局在整党学习中，针对有的同志存在着“一派正确，一派错误”的模糊认识，全面剖析两派的所做所为，认真找出了两派的“十个一样”。"},{"type":"paragraph","text":"一是产生的条件，都是在“文化大革命”这一特定历史条件下，受“左”的思想煽动产生的；二都是在“无产阶级专政下继续革命”这一错误理论指导下行动的；三是组织形式，都是搞无政府主义一套，“踢开党委闹革命”，自成一派，自封“司令”；四是行动口号都是高喊“造反有理”，对所谓无产阶级司令部的指示“紧跟”、“照办”；五是思想方法都是形而上学，歪曲马列主义，断章取义，各取所需；六是都把矛头指向所谓走资派；七都是以派划线，唯我独革，唯我独左，唯我正确；八都是搞派性斗争，互相打仗，从嘴斗、笔斗到武斗，不择手段攻击对方；九是斗争目的都是想夺所在单位和地区的领导权；十是两派斗争都给党和人民带来了严重灾难。"},{"type":"paragraph","text":"通过剖析，大家进一步认识到“文革”中的两派都是错误的，从而进一步消除了派性，增强了党性。  （黄万斌）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"派性","type":"主题/事件"},{"name":"武斗","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b427fb2e71"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
