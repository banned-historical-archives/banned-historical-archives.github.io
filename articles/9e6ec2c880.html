,"authors":[],"dates":[{"year":1967,"month":2,"day":23}],"is_range_date":false,"parts":[{"text":"国务院关于红卫兵今后新制标志应采用臂章或胸章的通知","type":"title"},{"text":"各省、市、自治区人民委员会并革命造反组织：","type":"appellation"},{"text":"最近公共用布特别是红布用量增加很多，其中有不少浪费现象。为了进一步贯彻执行伟大领袖毛主席提出的“节约闹革命”的号召，国务院建议各地红卫兵和其他革命群众组织，原有袖章能够不更换的，就不要更换；确实需要新制的，应当学习革命战争时期的办法，采用尺寸较小的臂章或胸章。制造旗帜和其他用布，也要尽量节约，杜绝浪费。","type":"paragraph"},{"text":" 国务院一九六七年二月二十三日","type":"paragraph"}],"comments":[],"origin":"根据湖北省革命委员会编印《无产阶级文化大革命文件汇编[一]》，武汉：1968年4月","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9e6ec2c880"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
