<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"西南局关于加强纪律检查工作的指示","authors":[],"dates":[{"year":1951,"month":8,"day":7}],"is_range_date":false,"parts":[{"text":"西南局关于加强纪律检查工作的指示","type":"title"},{"text":"一年来西南各级党委建立党的纪律检查委员会的计有八个省市、四十一个地（市）委、一百八十五个县委。一年来凡是建立了办事机关、配备了专职干部的地方，均做了一些工作，也有一定的收获。但直至现在各级纪委之组织机构，仍极不健全，截至今年六月份，除重庆各区及川东三个地委、二十一个县委先后配备了少许专职干部外，其他省区极少配备，因此对一些有关党的纪律重大问题与违犯党纪的案件，没有及时地检查处理。","type":"paragraph"},{"text":"去年十一月二十七日“西南局纪律检查委员会对各级纪律检查委员会工作的指示”规定每单月省（市）委、区党委纪律检查委员会要向省（市）委、区党委及西南局纪律检查委员会做工作综合报告一次，半年来云南、贵州、川东、重庆市一般地均执行了这一制度，川南只有一次工作报告，川北四个月没有一次工作报告，而西康、川西半年多来没有一次工作报告。","type":"paragraph"},{"text":"根据不完全的统计，西南各级纪律检查委员会一年多来受理和处理的案件共计一千六百七十四件，受处分党员一千三百二十一人，其中涉及党籍处分的就占了六百零一人。这说明了在全国取得胜利后，党内违犯党纪、法纪的情况，是复杂而严重的，必须严重注意并加以改变，根据今年四月份中央召开全国党的纪律检查工作干部会议的精神，加强全党的纪律性，我们必须如此：","type":"paragraph"},{"text":"（一）各级党委必须加强对各级纪律检查委员会的领导，继续督促建立与健全组织。对纪律检查工作，必须经常的具体的予以指导，定期讨论总结这一工作，并向上级党委作报告：各省（市）委、区党委每年要开纪律检查工作会议一次专门讨论并推动这个工作。对于像川南乐山专署一年来私设电台、造成严重失密事件的这一类重大问题，就应该首先过问，专门开会研究讨论，及时地抓紧纪律检查委员会进行严格处理。在没有建立纪律检查委员会的地方，应在一定期间内督促建立，并建立经常的办事机关，尽可能配备专职干部，争取在一九五一年内按照“中央关于各级纪律检查委员会办事机构的编制人数的规定”配备起来。","type":"paragraph"},{"text":"（二）严肃党的纪律。这基本上是加强党的教育问题，即：加强对党员的纪律教育共产主义教育，理论、政策教育。但对任何一个党员违反党章、党纪、党的决议、国家的政策法令，每一次都必须分别予以批评教育或应得的纪律制裁，并将有教育意义的事例，在党刊或党报上公布，在广大党员中进行实际的教育，克服目前一些党员与党的组织对违犯党纪的现象，采取庸俗的自由主义态度。对于有些党的组织，在处分党员时，不遵照“中央关于处分党员的通知”处理，采取简单粗糙、党政不分、不按党章办事的现象，必须予以教育纠正。对以上工作各级党委必须加强领导与检查。","type":"paragraph"},{"text":"西南局决定在九月间召开西南区各省市纪律检查工作会议，传达中央召开全国党的纪律检查工作干部会议的精神，检查一年多来西南区党的纪律检查工作，并讨论今后如何开展纪律检查工作。各省（市）委、区党委在最近应认真地讨论一次纪律检查工作，并将结果报告西南局。","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f42d4afb47"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
