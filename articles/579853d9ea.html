{"year":1953,"month":6,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"法国资产阶级报纸"},{"type":"paragraph","text":"承认侵越战争失败"},{"type":"paragraph","text":"【新华社十八日讯】据越南通讯社十七日讯：法国侵越军队的失败，在法国的资产阶级报纸中引起了许多怨言和抨击。"},{"type":"paragraph","text":"巴黎“战斗报”承认，现任法国驻印度支那高级专员勒杜尔诺的政策已遭到了失败。该报承认，越南人民军很机动，能够广泛发动进攻；法国军队则被钉在地堡和营舍里面，“等待一次一直没有发动的进攻”。"},{"type":"paragraph","text":"许多报纸抨击法国侵略军在去年秋冬自北越西北地区狼狈溃败后退守那产据点的办法。法军当局为掩盖它的失败，曾吹嘘据守那产对牵制越南人民军在西北地区的进军的作用。但是，“巴黎急进新闻”在四月二十九日说：“在过去的六个月，法国驻扎在北越山萝省那产的十营军队完全没有用处。”曾到印度支那视察的法国前参谋总长李维尔在报纸上发表的文章也说：那产使法国“花费很大。”他写道：“人们可以问：究竟这是一个堡垒还是一个陷阱？”"},{"type":"paragraph","text":"法国反动报纸无法讳言：龟缩在山林中的碉堡里面的法国军队，经常受到游击队的袭击，他们天天在胆战心惊之中。巴黎“天主教证言报”刊载的一篇通讯写道：一听到枪声，三、四个法军就在草席上坐了起来，互相探问，究竟越南人将在夜里发动进攻，或仅仅是开枪“扰乱”而已。法国报纸的这些言论，反映出法国统治集团对于印度支那侵略战争的一筹莫展和烦恼。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"579853d9ea"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
