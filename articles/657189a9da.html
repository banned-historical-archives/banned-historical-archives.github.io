script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"坚决拥护林副主席作毛主席的接班人","authors":["中国人民解放军广州部队某部“钢铁红二连”"],"dates":[{"year":1969,"month":4,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"坚决拥护林副主席作毛主席的接班人"},{"type":"paragraph","text":"中国人民解放军广州部队某部“钢铁红二连”"},{"type":"paragraph","text":"党的“九大”一致通过了林副主席作的政治报告和中国共产党章程。新党章中重新明确规定了党的指导思想的理论基础是马克思主义、列宁主义、毛泽东思想，明确规定林副主席是毛主席的接班人。这是无产阶级文化大革命的伟大胜利，这是马克思主义、列宁主义、毛泽东思想的伟大胜利，这是全中国人民的最大幸福。我们满怀深厚的无产阶级感情，敬祝毛主席万寿无疆！万寿无疆！"},{"type":"paragraph","text":"林副主席一贯高举毛泽东思想伟大红旗，最忠诚、最坚定地执行和捍卫毛主席的无产阶级革命路线。林副主席号召全军和全国人民开展活学活用毛泽东思想的群众运动，使伟大的毛泽东思想为广大革命群众所掌握。"},{"type":"paragraph","text":"林副主席是我们连的第一任连长。早在一九二七年八月，在蒋介石向革命人民举起屠刀、扼杀革命的紧要关头，就是林副主席率领我们连打响了反对国民党反动派的枪声，紧接着又率领我们连来到毛主席亲手创建的革命根据地井冈山。古田会议时，我们连队也选派了一名党员代表光荣地参加了。在长征路上，我们连担任开路先锋，保卫了遵义会议。在抗日战争期间，林副主席指挥我们首战平型关，杀得日寇闻风丧胆。解放战争期间，在林副主席指挥下，我们连参加了辽沈战役，平津战役，以后又挥戈南下，直到把胜利的五星红旗插到海南岛的五指山上。"},{"type":"paragraph","text":"一九五九年一月二日，林副主席带来了毛主席最大的亲切的关怀，回到我们连队看望我们这些工农红军的接班人，并亲笔题词，勉励我们沿着毛主席的建军路线不断前进。我们连队按照林副主席提出的突出无产阶级政治，坚持四个第一，大兴三八作风，发扬三大民主，开展四好连队运动等一系列政治建军的方针、原则，在革命化方面取得了很大成绩。我们连队和全国兄弟部队一道，在林副主席的指挥下，紧跟伟大统帅毛主席，经受了无产阶级文化大革命的战斗洗礼，从胜利走向胜利。"},{"type":"paragraph","text":"在“九大”新闻公报传来的特大喜讯鼓舞下，我们决心更好地活学活用毛泽东思想，提高革命警惕性，紧握手中枪，保卫无产阶级文化大革命的伟大成果，保卫以毛主席为首、林副主席为副的无产阶级司令部，为全国人民夺取更大的胜利站好岗，放好哨。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"657189a9da"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
