,"month":9,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"思想也要下去"},{"type":"paragraph","text":"领导干部要彻底批判邓小平反革命的修正主义路线，同旧的生产关系、同旧的传统观念彻底决裂，就必须自觉地同工人、贫下中农划等号，坚持参加集体生产劳动，在劳动中使自己的世界观有一个根本的转变。但是，有些干部，不了解实行三同的深远意义，表面上是下去了，其实，只是床铺、办公室搬了家，思想并没有真正下去。贫下中农说：“他们好象吊桶打水，看看在下面，实际是在上面。”这个评论，一针见血，值得重视。"},{"type":"paragraph","text":"毛主席教导我们：“干部通过参加集体生产劳动，同劳动人民保持最广泛的、经常的、密切的联系。这是社会主义制度下一件带根本性的大事”。干部与群众实行三同，密切了同群众的联系，是社会主义的新型干群关系的生动体现。我们要在三同中向群众学习，改造世界观。当我们拿起锄头锄草时，就要想想这不是简单除去野草，而是在铲除旧社会的痕迹，自觉破除资产阶级法权思想。要在实行三同过程中，真正把思想也“搬到”下面去，这样才能真正做到与群众划等号。　江苏江阴县桐岐公社通讯组"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"限制资产阶级法权","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4030fa448f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
