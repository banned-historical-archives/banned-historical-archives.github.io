art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"决定成立特别检察厅和特别法庭任命黄火青兼特别检察厅厅长，江华兼特别法庭庭长 公开审判林彪江青反革命集团案主犯 特别法庭的判决是终审判决","authors":[],"parts":[{"type":"paragraph","text":"新华社9月29日讯 五届人大常委会今天决定，成立最高人民检察院特别检察厅和最高人民法院特别法庭，检察、审判林彪、江青反革命集团案主犯。"},{"type":"paragraph","text":"人大常委会任命最高人民检察院检察长黄火青兼特别检察厅厅长，最高人民法院院长江华兼特别法庭庭长。特别法庭的判决是终审判决。"},{"type":"paragraph","text":"会议决定，特别法庭公开进行审判，由各省、自治区、直辖市、各党派，各人民团体、国家机关、人民解放军派代表参加旁听。"},{"type":"paragraph","text":"这个决定是在今天下午结束的五届人大常委会第十六次会议上通过的。"},{"type":"paragraph","text":"今天的会议由人大常委会副委员长彭真主持。"},{"type":"paragraph","text":"会议还通过了《国务院关于老干部离职休养的暂行规定》，批准了康克清代表我国政府签署的联合国《消除对妇女一切形式歧视公约》。"},{"type":"paragraph","text":"会议通过了任免事项，任命雍文涛为林业部部长，免去罗玉川的林业部长职务。"},{"type":"paragraph","text":"人大常委会副委员长韦国清、谭震林、彭冲、赛福鼎、廖承志、阿沛·阿旺晋美、许德珩、肖劲光、朱蕴山、史良、习仲勋、杨尚昆，出席了今天的全体会议。"},{"type":"paragraph","text":"国务院副总理杨静仁，最高人民法院院长江华，最高人民检察院检察长黄火青，列席了会议。"}],"alias":""},"tags":[{"name":"江青","type":"人物"},{"name":"林彪","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"049647baf2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
