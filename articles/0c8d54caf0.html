的处分决定","authors":[],"dates":[{"year":1961,"month":5,"day":1}],"is_range_date":false,"parts":[{"text":"中共沿河县（贵州省）监委对魏荣举所犯错误的处分决定","type":"title"},{"text":"魏荣举，男，现年二十二岁，汉族，家庭贫农成分，个人学生出身，高小文化程度，沿河县城关公社新祥管理区人，五九年入党，六○年任下坝乡干三个月，现任龙塘分支部书记。其错误事实如下：","type":"paragraph"},{"text":"违法乱纪，逼死人命","type":"paragraph"},{"text":"（一）五九年十二月，魏荣举怀疑贫农熊春和偷地主熊万乾女儿熊必英下装一件，熊春和不承认，魏荣举为此叫地主熊必英搜查熊的家庭，同时又把其身上的衣服脱光，然后进行捆绑，用木棒毒打一顿，打后，扣饭五天，逼使熊春和为了生活逃往塘坝，结果死于半路。","type":"paragraph"},{"text":"（二）五九年十一月，贫农肖太平偷国家粮食100斤，魏荣举知道后，与社员肖翠芝等人将肖太平家中搜查一次，并将搜查出来的80斤粮食拿回家中，同时又将肖太平捆绑二天二夜，毒打一顿，当即把双手吊断，肖由于受作过重，被魏荣堂管押五天，后释放回家死在半路。","type":"paragraph"},{"text":"（三）六○年元月二十五日，贫农肖国智因病不能出工，魏指使食堂会计扣饭二天，肖两天不得饭吃，加之生病，第三天就饿死了。","type":"paragraph"},{"text":"（四）六○年三月初，魏细蛮因病不能出工，魏荣举叫食堂会计扣其全家口粮七顿，熊饿不过就代其女儿魏月香于三月十日偷了他家放在地主家的红苕几斤来吃，魏荣举知道后叫其父亲万金将两吊打一顿。三月十二日该两又偷了魏万金家大米三斤，魏荣举又指使民兵魏来汉将其吊打一顿，魏月香因受伤过重，当天就死了。","type":"paragraph"},{"text":"综合以上错误事实，魏荣举所犯错误是严重的，已经违犯党的纪律，为此，经研究决定，党内给予留党察看一年处分。","type":"paragraph"},{"text":" 中共沿河县委监察委员会一九六一年五月一日","type":"paragraph"}],"comments":[],"origin":"贵州省某档案馆","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0c8d54caf0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
