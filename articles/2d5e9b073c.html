ical-archives/banned-historical-archives0/main/maoquanji34.pdf"],"article":{"title":"给黄炎培的信","alias":"","parts":[{"type":"paragraph","text":"给黄炎培的信"},{"type":"paragraph","text":"（1955年3月14日）任之先生："},{"type":"paragraph","text":"三月十一日惠书收读。民建开代表大会，很好，谨致祝贺。农村粮食问题已采取措施，下一年度可以缓和下来，目前则仍有些紧张。"},{"type":"paragraph","text":"顺致敬意"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一九五五年三月十四日"},{"type":"paragraph","text":"[1]黄炎培，字任之，当时任中国民主建国会主任委员、全国人大常委会副委员长。"},{"type":"paragraph","text":"[2]指黄炎培1955年3月11日给毛泽东的信。信中向毛泽东报告了中国民主建国会将于4月1日召开全国代表大会的准备情况，信后附有他对失业问题和农村粮食问题的意见。关于农村粮食问题，信中说：最近有人从家乡来，反映一般居民生活苦，尤其是农民特别苦，农民说：我们吃不饱，哪有力气去种田呢？而一些村干部工作作风不好，总疑心农民家有藏粮，致使民间有怨声。"}],"authors":["毛泽东"],"dates":[{"year":1955,"month":3,"day":14}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":493,"page_end":493},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2d5e9b073c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
