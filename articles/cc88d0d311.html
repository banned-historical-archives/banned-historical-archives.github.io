al-archives/banned-historical-archives8/main/maoquanji8.pdf"],"article":{"title":"关于自前行动方针与计划","alias":"","parts":[{"type":"paragraph","text":"关于自前行动方针与计划"},{"type":"paragraph","text":"（1936年1月17日）"},{"type":"paragraph","text":"今年我们的基本任务是巩固和扩大苏区，打通与苏联的联系，把国内战争与民族战争联系起来，扩大抗日力量及主力红军。二月至七月，我们的行动在山西，由山西到绥远的转机，要看日本对山西、绥远进攻的程度及我们力量如何而定。我们向南、向西、向西北，文章不好做。向东的军事基本方针是稳扎稳打政策，背靠苏区建立根据地，争得渡黄河来往的自由。我们在陕北要扩大自己的力量，使它能担当保卫陕北的任务。山西的发展，对陕北有极大帮助，我们下决心到山西。政治局随军行动，陕北组织中央局。"},{"type":"paragraph","text":"[1]1936年1月17日，毛泽东出席中共中央政治局在瓦窑堡召开的常委会议，并作了关于目前行动方针与计划的报告。这是报告的一部分。"}],"authors":["毛泽东"],"dates":[{"year":1936,"month":1,"day":17}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":204,"page_end":204},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cc88d0d311"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
