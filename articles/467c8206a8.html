ors":[],"dates":[{"year":1964,"month":9,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"南越傀儡分崩离析　伪军头目竞相割据"},{"type":"paragraph","text":"阮庆清洗异己加剧了内部无政府状态"},{"type":"paragraph","text":"新华社十六日讯　西贡消息：美国在南越的傀儡们争夺权力的斗争，仍然激烈地进行着。"},{"type":"paragraph","text":"阮庆在重新控制西贡以后，正在清洗再清洗，力图保住自己的独裁统治。据合众国际社从西贡报道，阮庆已经起用一批青年军官担任重要职务，其中包括两名在十三日反政变中“拯救”了阮庆的军官，他们被任命为“首都军区司令”和“西贡军事长官”。"},{"type":"paragraph","text":"有消息说，阮庆集团已经解除了政变头目之一杨文德的伪第四军军长的职务，并已下令警察、军事治安、宪兵和军法部门开始“调查”九月十三日政变事件。"},{"type":"paragraph","text":"路透社十五日援引西贡“政府人士”的话说，阮庆目前正在计划对伪内阁作一次大改组。"},{"type":"paragraph","text":"合众国际社十五日发自西贡的一则消息承认，南越伪军内部互相倾轧的激化，使西贡局势陷于“无政府状态”。消息说，“陆军的军纪已经遭到彻底破坏，师长们无视他们的上级，把装甲车开出去，没有人听从西贡的命令”。"},{"type":"paragraph","text":"这家通讯社说，由阮庆等人组成的“三头执政”曾在十五日举行会议，来“寻找解决军队里日益发展的无政府状态的办法”，但是这家通讯社承认，连“三头执政”内部“都是有分歧的”。"},{"type":"paragraph","text":"林文发等人所率领的政变部队十三日从西贡撤回湄公河三角洲的美萩省以后，继续抗拒阮庆集团。据合众国际社十六日报道，在政变中起重要作用的军官，其中包括林文发和第七师师长黄文存等今天再次“拒绝”阮庆要他们“返回西贡”的命令，继续呆在美萩。阮庆的“政府发言人”说，局势是极端危险的，黄文存可能切断通往西贡的公路，宣布他的辖区为自治区。"},{"type":"paragraph","text":"据报道，一名伪师长十四日率部开进并占领了南越中部由阮庆部队所占据的芽庄。"},{"type":"paragraph","text":"曾经支持阮庆反对政变的一些青年军官也正在同阮庆讨价还价。据合众国际社报道，他们十四日同阮庆会谈时，提出了一系列条件，作为“忠于他的代价”。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"夺权","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"467c8206a8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
