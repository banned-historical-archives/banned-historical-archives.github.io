script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"意人民不断展开反剥削反压迫斗争  三十五万纺织工人举行全国规模的二十四小时罢工  四万私营市内公共汽车工人罢工使全国市内私营公共汽车停驶","authors":[],"dates":[{"year":1970,"month":2,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"意人民不断展开反剥削反压迫斗争"},{"type":"paragraph","text":"三十五万纺织工人举行全国规模的二十四小时罢工"},{"type":"paragraph","text":"四万私营市内公共汽车工人罢工使全国市内私营公共汽车停驶"},{"type":"paragraph","text":"新华社二十一日讯 罗马消息：连日来，意大利人民不断开展各种形式的斗争，反对垄断资产阶级的残酷剥削和压迫，要求改善生活条件。"},{"type":"paragraph","text":"十九日，三十五万名纺织工人举行了全国规模的二十四小时罢工，要求增加工资、缩短工时和保障工人权利。"},{"type":"paragraph","text":"为了声援伦巴第区、皮埃蒙特区、利古里亚区和奥斯塔山谷区的公共运输工人举行的罢工，米兰、都灵、热那亚和意大利其他一些大城市的公共运输工人二十日举行了二十四小时大罢工。这次公共运输工人罢工的新浪潮，使意大利所有区的公共运输在今后几天内都将受到影响。意大利私营市内公共汽车的四万名工人十六日也举行了二十四小时罢工，使意大利全部私营的市内公共汽车都停止了行驶。"},{"type":"paragraph","text":"十八日，意大利南部马特拉的八千名工人、学生和居民在市内街上和广场上举行了一上午的示威游行，抗议失业和贫困。示威群众举着大横幅和许多标语牌，大横幅上写着：“工人和学生联合起来反对老板和争取充分就业”。当天下午，几千名群众再次上街示威，要求改革不合理的土地制度。已经举行了三天示威的学生还占领了铁路、公路和商会。这个城市和卢卡尼亚区的其他城市在十九日也举行了类似的示威。"},{"type":"paragraph","text":"为了抗议失业和饥饿，意大利有些地区的工人还举行了总罢工。十六日，意大利南部基亚提省桑格罗谷广大地区的工人举行了罢工和示威，使这个地区完全陷于瘫痪状态。"},{"type":"paragraph","text":"十六日至十八日，西西里区巴勒莫附近的大城市科莱奥内广大工人举行了历时三天的总罢工。使这个地区陷于一片混乱。"},{"type":"paragraph","text":"十九日，巴勒莫的二百名电机工人在区政府大楼前举行示威，反对资本家解雇工人，并同前往镇压的警察展开了激烈的搏斗。工人们向警察扔玻璃瓶和石块，回击警察的迫害。在西西里区卡尔塔尼塞塔附近的另一个城镇，罢工工人占领了一家水泥制品厂达七个星期。"},{"type":"paragraph","text":"十四日，意大利那不勒斯附近的大城市托雷安农西亚塔有五十多名失业工人占领了市政厅，抗议资本家无理解雇工人，还有二百名失业工人占领了火车站。"},{"type":"paragraph","text":"在工人罢工斗争不断开展的同时，意大利学生也掀起了反对腐朽的教育制度的斗争。近日来，在罗马，学生占领了罗马大学的化学系、卫生研究所和美术学校所有的三处房屋；在特兰托，占领了大学的社会学系；在佛罗伦萨，占领了美术学校。在这以前，米兰、帕多瓦、乌尔比诺、桑德里奥、彼萨、科森萨、卡坦扎罗和意大利的其他城市的学生也占领了校舍，举行了游行示威。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5e19d10d5e"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
