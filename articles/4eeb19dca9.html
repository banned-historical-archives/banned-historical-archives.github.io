art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东思想是革命人民的命根子","authors":["麦贤得"],"parts":[{"type":"paragraph","text":"杨成武同志的重要文章，说出了我们的心里话。在响应伟大领袖毛主席关于要斗私，批修的伟大号召，向中国赫鲁晓夫深入展开革命大批判的运动中，我们要反复、认真学习这篇文章，在头脑中大树特树伟大统帅毛主席的绝对权威，大树特树伟大的毛泽东思想的绝对权威。"},{"type":"paragraph","text":"毛泽东思想是革命人民的命根子。要将社会主义革命进行到底，要将世界无产阶级革命进行到底，彻底挖掉修正主义根子，彻底埋葬帝国主义、彻底解放全人类，最强大的武器就是伟大的毛泽东思想。"},{"type":"paragraph","text":"但是，中国赫鲁晓夫和他的代理人罗瑞卿之流，竟妄想挖掉我们的命根子。他们的罪恶阴谋绝不能得逞！永远不能得逞！"},{"type":"paragraph","text":"两年多以前，我和战友们在战无不胜的毛泽东思想指挥下，一举击沉了美制蒋舰“章江”号和“剑门”号，取得了“八·六海战”的辉煌胜利。今天，我们要像“八·六海战”打美蒋匪帮那样，把以中国赫鲁晓夫为首的党内一小撮走资本主义道路的当权派彻底打倒，叫他们葬身海底，永世不得翻身。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"革命大批判","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4eeb19dca9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
