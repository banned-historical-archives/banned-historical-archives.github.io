ical-archives/banned-historical-archives0/main/maoquanji31.pdf"],"article":{"title":"致班禅额尔德尼电","alias":"","parts":[{"type":"paragraph","text":"致班禅额尔德尼电"},{"type":"paragraph","text":"（1951年12月13日）青海省人民政府转班禅额尔德尼先生："},{"type":"paragraph","text":"感谢你的来电。我完全同意你的这种志愿，即在中国共产党和中央人民政府领导下，与达赖喇嘛紧密团结，为彻底实行和平解放西藏办法的协议，驱除帝国主义在西藏的影响，巩固国防和建设新西藏而奋斗。并祝你顺利地到达目的地。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一九五一年十二月十三日"},{"type":"paragraph","text":"[1]班禅额尔德尼，即班禅额尔德尼·确吉坚赞，西藏宗教领袖之一，当时准备由青海玉树返回西藏日喀则地区。"},{"type":"paragraph","text":"[2]达赖喇嘛，即达赖喇嘛·丹增嘉措，西藏宗教领袖之一。"},{"type":"paragraph","text":"[3]和平解放西藏办法的协议，即1951年5月23日在北京签订的《中央人民政府和西藏地方政府关于和平解放西藏办法的协议》。"}],"authors":["毛泽东"],"dates":[{"year":1951,"month":12,"day":13}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":138,"page_end":138},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"137daaf11b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
