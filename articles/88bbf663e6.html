" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji45","name":"毛泽东全集第45卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji45.pdf"],"article":{"title":"接见非洲朋友时的谈话","alias":"","parts":[{"type":"paragraph","text":"接见非洲朋友时的谈话"},{"type":"paragraph","text":"（1963年8月8日）"},{"type":"paragraph","text":"毛主席在接见时，同非洲朋友进行了极其亲切友好的谈话。他在谈话中除了遣责美国帝国主义的种族歧视以外，还遣责了南非殖民者当局以及全世界所有地方的种族歧视。毛主席说：“在非洲、亚洲和全世界各地都有种族歧视的现象。种族问题实质上是阶级问题。我们的团结不是种族团结，而是同志、朋友的团结。我们要加强团结，共同反对帝国主义、殖民主义和他们的走狗，为争取完全彻底的民族独立和解放而斗争。”"},{"type":"paragraph","text":"毛主席介绍了中国革命斗争取得胜利的经过以后说：“可以证明，人民的革命是能够胜利的，帝国主义及其走狗是能够打败的。整个非洲现在都处在反对帝国主义和反对殖民主义的浪潮中。不管已经获得独立的国家，或者还没有获得独立的国家，总有一大是要获得完全彻底的独立和解放的。整个中国人民都是支持你们的。非洲人民正在一天天觉悟起来，全世界人民都在一天天觉悟起来，全"},{"type":"paragraph","text":"[1]毛泽东接见的非洲朋友有：以巴苏陀兰（今莱索托）大会党总书记古德弗利·科利桑为首的巴苏陀兰大会党代表团、科摩罗民族解放运动主席阿里·穆哈默德·沙米、以留法黑非洲学联外事书记达松社为首的留法黑非洲学生联合会代表团、南罗得西亚津巴布韦非洲人民联盟驻开罗代表特赖诺斯·马孔贝、怯尼亚（今肯尼亚）作家加亨格里。接见时，毛泽东发表了支持美国黑人反对种族歧视的正义斗争的声明。毛泽东全集第四十五卷世界百分之九十以上的工人、农民、革命知识分子以及其他所有革命的人民，都能够团结起来，争取革命的胜利。”"},{"type":"paragraph","text":"毛主席说：“被压迫人民争取彻底的解放，首先是依靠自己的斗争，其次才是国际的援助。已经获得革命胜利的人民，应该援助正在争取解放的人民的斗争，这是我们的国际主义的义务。”"},{"type":"paragraph","text":"1963年8月8日，毛泽东接见黑非洲留法学生联合会代表团。"}],"authors":["毛泽东"],"dates":[{"year":1963,"month":8,"day":8}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":502,"page_end":503},"tags":[{"name":"毛泽东","type":"人物"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"88bbf663e6"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
