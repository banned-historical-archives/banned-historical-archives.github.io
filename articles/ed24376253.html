:["中南矿冶学院","吴洁光","周世伟","杨德才","胡熙赓"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"“肃反是一次压制民主的运动”","type":"title"},{"text":"中南矿冶学院周世伟杨德才吴洁光胡熙赓","type":"authors"},{"text":"“肃反是斗爱说话好提意见的人，肃反是一次压制民主的运动，要大家不敢说话。”（中南矿冶学院　周世伟）","type":"paragraph"},{"text":"“肃反是先排队后整材料，依次斗争。”","type":"paragraph"},{"text":"“肃反时一舍成了监狱，操场成了劳改场，教室成了看守所，有地下监狱还有私设公堂把人变成鬼，把学生变成囚犯，把健康的人变成疯子。”（中南矿冶学院  杨德才）","type":"paragraph"},{"text":"“肃反运动是杀人不见血的运动，比枪打还厉害。”","type":"paragraph"},{"text":"“肃反前有二分之一跟党走，肃反后连二分之一都没有了。”（中南矿冶学院  吴洁光）","type":"paragraph"},{"text":"“这次肃反运动中对知识分子的斗争是先排队，再根据5％是坏人的教条主义来搞运动，弄得人心惶惶，把一批无辜善良的人遭受精神上的折磨，任意摧残，有被打的，有被罚跪瓦片的，形式不一而足，有的人气疯了，有的得了神经病，有的得了气痛病，有的人至今没有恢复正常精神，回想起来，心有余悸。”（中南矿冶学校  胡熙赓）","type":"paragraph"}],"comments":[],"origin":"《高等学校右派言论选编》（中共中国人民大学委员会，1958年8月）。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ed24376253"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
