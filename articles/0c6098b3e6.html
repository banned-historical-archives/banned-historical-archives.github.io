<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"刘主席满载朝鲜人民深情厚谊回到北京宋庆龄董必武周恩来朱德邓小平等党和国家领导人到车站热烈欢迎","authors":[],"dates":[{"year":1963,"month":9,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京28日电】　中华人民共和国主席、中国共产党中央委员会副主席刘少奇同志，结束了对朝鲜民主主义人民共和国的友好访问，满载兄弟的朝鲜人民的深情厚谊，今天下午乘专车回到北京。"},{"type":"paragraph","text":"中华人民共和国副主席宋庆龄、董必武，国务院总理、中共中央副主席周恩来，全国人民代表大会常务委员会委员长、中共中央副主席朱德，中共中央总书记邓小平，以及首都各界群众数千人到车站热烈欢迎刘少奇主席访问归来。"},{"type":"paragraph","text":"随同刘少奇主席访问朝鲜的全国人民代表大会常务委员会副委员长、中共中央委员林枫，国防委员会副主席、中共中央委员叶剑英元帅，中共中央委员伍修权，外交部副部长姬鹏飞，北京市副市长万里，外交部部长助理乔冠华，外交部礼宾司司长俞沛文，外交部第二亚洲司副司长曹克强，卫生部保健局副局长计苏华，公安部副局长李树槐等，今天同车回到北京。"},{"type":"paragraph","text":"北京车站上飘扬着国旗。下午一时二十分，专车在热烈的掌声和欢呼声中开入车站。刘少奇主席踏上月台以后，同宋庆龄、董必武、周恩来、朱德、邓小平等党和国家领导人，以及各方面的负责人亲切握手。少年先锋队员向刘少奇主席和随同访问归来的同志们献了鲜花。"},{"type":"paragraph","text":"刘少奇主席从欢迎群众前面走过时，车站上锣鼓声和掌声交织成一片。人们挥动鲜花、彩旗和彩带，高呼:“欢迎刘主席访问朝鲜归来”、“中朝友谊万岁”、“金日成同志万岁”、“毛主席万岁”等口号。刘少奇主席频频向大家招手致意。"},{"type":"paragraph","text":"今天到车站迎接的，还有全国人民代表大会常务委员会副委员长、中共中央政治局委员彭真，国务院副总理、中共中央政治局委员贺龙、陈毅、李先念、谭震林，国务院副总理、中共中央政治局候补委员乌兰夫、薄一波、陆定一，中共中央政治局候补委员陈伯达、康生，国务院副总理、中共中央书记处书记罗瑞卿，中共中央书记处书记李雪峰，中共中央书记处候补书记杨尚昆，全国人民代表大会常务委员会副委员长郭沫若、黄炎培、李维汉、陈叔通、程潜，国务院副总理邓子恢、聂荣臻，政协全国委员会副主席李四光、包尔汉，国防委员会副主席张治中、傅作义、蔡廷锴，最高人民检察院检察长张鼎丞，最高人民法院副院长吴德峰，政府各部门和中共中央各部门的负责人，各民主党派、人民团体的负责人，中国人民解放军的将军们以及北京市的负责人。"},{"type":"paragraph","text":"朝鲜驻中国大使馆临时代办李在成和使馆官员，以及在北京的朝鲜同志也到车站迎接。到车站迎接的还有其他各国驻中国的使节。"},{"type":"paragraph","text":"【新华社天津28日电】　中华人民共和国主席、中国共产党中央委员会副主席刘少奇等一行，结束了在朝鲜民主主义人民共和国的友好访问后，在回北京途中，今日上午乘专车路过天津。河北省和天津市负责人林铁、刘子厚、王亢之等到车站迎接。"},{"type":"paragraph","text":"刘主席等在天津车站稍事休息后，继续乘车前往北京。"},{"type":"paragraph","text":"\u003cIMG alt=请插入5号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1963\\09\\639t010301.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgaut\u003e吕厚民\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e刘少奇主席在首都车站受到各界群众热烈欢迎　(新华社传真　吕厚民摄)\u003c/FONT\u003e"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"邓小平","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"朱德","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0c6098b3e6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
