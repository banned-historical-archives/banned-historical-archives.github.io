authors":[],"dates":[{"year":1957,"month":9,"day":8}],"is_range_date":false,"parts":[{"text":"工程师外衣下面的狰狞面目　丁树尧妄制反共谰言","type":"title"},{"text":"包头市道路公司职工连日开会，揭发了右派分子丁树尧的反动言行。","type":"paragraph"},{"text":"右派分子丁树尧是包头市道路公司的工程师，国民党革命委员会的成员。为了疯狂地向党进攻，否认党的领导，诋毁党的成绩，他大肆诬蔑地说：“共产党的资本是从长征和抗日战争时期得到的，胜利后，沉醉在胜利的欢呼中，看不到缺点，今天是消耗这些资本，坐吃山空。”他诬蔑共产党员说：“全国都一样，大部分党员都是坏的，包头有三分之二的党员不好，好的是个别的。”为了煽动别人不安心在包头工作，他就造谣说：“大青山下建立一个公墓，将来在那里会尸吧！”","type":"paragraph"},{"text":" ——原载《人民日报》1957年9月8日。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f6cb71834b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
