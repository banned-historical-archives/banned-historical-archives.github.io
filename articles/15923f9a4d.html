tart":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席是世界无产阶级公认的领袖赞扬文化大革命使中国成为真正的社会主义国家","authors":[],"parts":[{"type":"paragraph","text":"据新华社十九日讯 捷克斯洛伐克、德意志民主共和国、匈牙利和波兰等国的人民群众最近纷纷表达他们对中国人民的伟大领袖毛主席的无限热爱和无限敬仰，并且热烈赞扬中国无产阶级文化大革命。"},{"type":"paragraph","text":"捷克斯洛伐克的一位居民不久前在写给毛主席的信中热情地写道：“你是马克思、恩格斯、列宁和斯大林的天才继承者，你以创造性的成就进一步发展了整个世界上的无产阶级、穷苦人和被压迫者的先进思想。你成了世界公认的无产阶级革命领袖。”"},{"type":"paragraph","text":"布拉格的一位教授在来信中一开头就写着“毛泽东万岁！”信中热情洋溢地写道：“光荣属于毛泽东。”一位工人语重心长地说，“我真想能去中国，亲眼见一见毛泽东同志，当面告诉他，在捷克斯洛伐克，象我这样的工人都热爱他，拥护他。愿他永远健康、长寿。这是世界劳动人民的幸福。”一位老工人在谈到中国的无产阶级文化大革命时说：“我们老工人认为中国文化大革命好得很，是令人高兴的事。”"},{"type":"paragraph","text":"德意志民主共和国的一位曾经读过不少毛主席著作的老工人说：“毛泽东是当代的共产主义领袖，他受到人民的敬爱。所有革命者都必须学习毛泽东著作。”"},{"type":"paragraph","text":"一位德国农民说：“毛泽东思想是当代马克思列宁主义的顶峰，中国是人类的未来。”"},{"type":"paragraph","text":"一位德国工人赞扬中国无产阶级文化大革命说：“我相信，中国文化大革命将给予所有革命群众以新的勇气，去胜利地捍卫马克思列宁主义事业。”"},{"type":"paragraph","text":"匈牙利人民在谈到中国无产阶级文化大革命的时候，他们热烈欢呼毛主席“做得正确”、“毛泽东同志万岁”、“祝文化大革命取得胜利”、“祝红卫兵取得新的胜利”。"},{"type":"paragraph","text":"一位匈牙利朋友说：“毛泽东把马列主义提高到了一个新的高度。”一位大学生说：“我正在学习毛泽东的著作，并且已经学完了《矛盾论》、《实践论》、《关于正确处理人民内部矛盾的问题》和《湖南农民运动考察报告》。通过这些著作的学习，我认识到毛泽东思想是十分正确的革命学说。”"},{"type":"paragraph","text":"另一位匈牙利朋友说：“匈牙利劳动人民都拥护毛泽东思想，全世界都要实现毛泽东思想。”"},{"type":"paragraph","text":"一位匈牙利技术工人说：“我赞成中国的这次文化大革命，这样做就可以避免出现我们这里已出现的情况，中国就会是真正的社会主义国家。”"},{"type":"paragraph","text":"波兰的一位普通劳动者在中国国庆期间，把一束鲜花交给在波兰的一位中国同志，并且激动地说：“请代我把它献给工人阶级的伟大领袖毛泽东，献给那些在毛泽东领导下在文化革命中出现的中国革命青年——红卫兵，献给伟大的文化大革命。”他说：“这束花代表波兰人民对中国工人阶级的情谊，请你们把它当作世界上最美丽的鲜花收下吧！”"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"人民内部矛盾","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"15923f9a4d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
