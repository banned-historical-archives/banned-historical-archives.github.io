,"谭天荣"],"dates":[{"year":1957,"month":7,"day":1}],"is_range_date":false,"parts":[{"text":"随笔——失败","type":"title"},{"text":"北京大学谭天荣","type":"authors"},{"text":"（谭天荣：北京大学物理系学生）","type":"subtitle"},{"text":"从前我养了一盆宝贵的花儿，","type":"paragraph"},{"text":"为容易，孕了个苞子，","type":"paragraph"},{"text":"但老是半含半吐不肯开放","type":"paragraph"},{"text":"我等得发急，硬把他剥开了，","type":"paragraph"},{"text":"他便一天萎似一天，萎得不像样了，","type":"paragraph"},{"text":"如今我要他再关上不能了，","type":"paragraph"},{"text":"我到底没有看见我要看的花！","type":"paragraph"},{"text":"从前我做了一个稀奇的梦，","type":"paragraph"},{"text":"我光嫌他太模糊了，","type":"paragraph"},{"text":"我满不介意，让他震破了，","type":"paragraph"},{"text":"我醒的，直等到月落，等到天明，","type":"paragraph"},{"text":"重织一个新梦既织不成，","type":"paragraph"},{"text":"便是那个旧的也补不起来了，","type":"paragraph"},{"text":"我到底没有做好我要做好的梦！","type":"paragraph"},{"text":" 1957．7．1贴","type":"paragraph"}],"comments":[],"origin":"北京大学社会主义思想教育委员会编印《北京大学右派分子反动言论汇集》，一九五七年十月。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2c9eaeb8ae"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
