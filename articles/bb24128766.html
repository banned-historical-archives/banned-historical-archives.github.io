art":5,"page_end":5,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"纪念毛泽东同志“关于如何打乒乓球”批示30周年座谈会在天津举行","authors":["王俊璞/孙永盛"],"parts":[{"type":"paragraph","text":"据新华社北京1月11日电 （记者王俊璞、孙永盛）中国乒乓球协会和天津市体委今天在这里举行座谈会，纪念毛泽东同志“关于如何打乒乓球”批示30周年。"},{"type":"paragraph","text":"30年前，中国乒乓球男队运动员徐寅生为要打“翻身仗”的女队作了一次题为“关于如何打乒乓球”的讲话。毛泽东同志于1965年1月12日作了批示，对此文给予很高的评价，并要求全党学习唯物辩证法。"},{"type":"paragraph","text":"国家体委副主任、中国乒协主席徐寅生在座谈会上回顾了当年毛泽东同志为他的文章作批示前后的情况。他希望中国乒乓球界用马列主义和毛泽东思想的立场、观点、方法武装头脑，在即将举行的第四十三届世界乒乓球锦标赛上取得好成绩。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"天津文革","type":"人物"},{"type":"文稿类型","name":"发言"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bb24128766"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
