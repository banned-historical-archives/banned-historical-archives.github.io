art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"“毛主席教我们送来的”","authors":["姚永祺/宋瑞乐"],"parts":[{"type":"paragraph","text":"防化一连的生产班，驻在沈阳市铁西区中朝友谊公社和平生产大队。超期服役的班长关文亮同志，象个熟练的老农一样，领着全班同志又是铲又是犁，忙得不可开支。"},{"type":"paragraph","text":"一天，歇晌时，班长发现刚刚生下一个多月的小毛驴不见啦，急得直跺脚。在这争分夺秒的季节里，一人顶俩人用，哪有工夫去找驴；可是，小毛驴又没戴“兜嘴”，如果糟蹋了社里的庄稼，怎么得了！"},{"type":"paragraph","text":"班长正打算赶快派人四下去找，只见社里刘大娘牵着小毛驴缓缓地走来。“糟啦，一准是小驴闯了乱子。”班长心里嘀咕着，迎上前去。还没等他张口道歉，大娘先笑着说话啦：“班长，这小毛驴是队伍上的吧？真招人稀罕，以后可要经心点几，万一丢了，指导员来了要说你们的。”班长赶忙说：“谢谢大娘，我们一定好好拴起来。”"},{"type":"paragraph","text":"大娘刚走，一个战士叫道：“班长同志，苞米！”班长顺着战士手指的方向一看，可不是，小驴还在细细地嚼着青苞米苗呢！班长急忙追上大娘，喘吁吁地说：“大娘，我们的小驴吃了多少棵苞米苗？”大娘笑着说：“班长，咱们是谁跟谁，几棵青苗有什么大不了的。再说，那是我自己种的。喂了牲口，叫它长得壮壮的，我心里还高兴呢！”不管班长怎样要赔偿，大娘就是咬住一个不字。事情也只好就这样过去了。时间一长，班里的同志都渐渐忘了。班长可一直想着这样事。"},{"type":"paragraph","text":"新年前夕，按照我们的老传统，照例要检查群众纪律。班长特地用口袋装了四十穗棒大粒肥的苞米，和指导员一起到刘大娘家去。大娘一见亲人来了，眉开眼笑地说：“这帮孩子，一年忙到头，也不来串串门子，这回可得多坐会儿。”班长是个口直心快的人，笑呵呵地说：“大娘，我们是来赔礼道歉的。”说着，从口袋中把苞米拿出来。大娘一看，可有点不高兴啦，“指导员，你们办事也太过分啦，牲口吃了几棵青苗有什么了不得的！嗯，八成又是我们那老支书出的主意，叫你们……”指导员笑了笑，截断大娘的话，意味深长地说：“不，大娘，是毛主席教我们送来的。”“怎么？”大娘看了看墙上挂着的领袖象，“他老人家整天操劳国家大事，还有闲空管这个？”指导员看看班长，又笑呵呵地对大娘说：“是的，老大娘！你不是知道毛主席给我们定了三大纪律八项注意吗？”一句话说得老大娘不再推辞了。她说：“好个指导员哩！只要是毛主席定的规矩，咱们就一点也不能叫它走样，照办吧！”"},{"type":"paragraph","text":"宋瑞乐"},{"type":"paragraph","text":"宋瑞乐插画"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e1490347c4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
