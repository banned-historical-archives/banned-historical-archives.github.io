script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"消灭暴利剥削　安定市民生活　上海粮食公司积极布置:特约米店直接销售暂选代理店约百家平均分布全市　此项措施于本月二十日可望实行","authors":[],"dates":[{"year":1949,"month":11,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　近日物价波动，少数投机米商，在粮食市场乘机哄抬，推波助澜，蓄意捣乱米价，影响市民心理，藉以图谋暴利。不仅如此，更复有若干米店乘机利用市民恐慌心理，竞相抬高门售价格，特别是前(十六)日上海市粮食公司于米市场以每石七万五千至八万元大量供应后，而若干米店竟有抬高门售价每石达十六万元者，致市场批发价与门售价相差一倍之钜，此显系操纵米价，影响市民生活。"},{"type":"paragraph","text":"现上海市粮食公司为采取有效步骤，消灭此种操纵剥削现象，要以安定市民生活，保证充分供应食米，及便利市民购米起见，特决定初步选择米店一百家左右为特约零售米店，代理直接销售。米店地点平均分布于全市各区，使市民就近即可购买。其售价根据市场批发价格，订定合理的门售价格，要以减低市民负担，免遭钜价剥削，以安定市民生活。此项措施，现正由该公司与有关部门积极布置，尽速希于本星期日(即十一月二十日)实施。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7ac033efe9"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
