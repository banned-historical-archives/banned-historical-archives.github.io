" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"广西部分少数民族地区在减租运动中发生排斥和侵犯中农利益的现象","authors":[],"dates":[{"year":1951,"month":10,"day":31}],"is_range_date":false,"parts":[{"text":"广西部分少数民族地区在减租运动中发生排斥和侵犯中农利益的现象","type":"title"},{"text":"【广西记者组讯】广西部分少数民族地区在实行减租反霸运动中，发生排斥中农和侵犯中农利益的现象。三江县白云区区乡干部普遍排斥中农参加农会、民兵、甚至妇女等组织。龙胜县各族代表会在选举县府委员会时，有的代表竟提出：“识字的人不要，中农不要。”有些少数民族地区有乱划成份的现象，如东兰县瑶族群众把一年缺半年粮的叫贫农，缺三个月粮的叫中农，不缺粮的叫富农。有的地方用比较的办法来确定阶级成份：最穷的是贫农，好一点的是中农，再好一点的是富农。因此有不少侵犯中农利益的事件，中农顾虑很大。有一个中农成份的代表在龙胜县各族代表会上说：“在二十天前我还是一个敌人，今天听了报告我才敢说话。”","type":"paragraph"}],"comments":[],"origin":"新华通讯社编《内部参考》1951年10月31日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a1555ff293"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
