:1967,"month":1,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"文汇报“星火燎原”革命造反总部，"},{"type":"paragraph","text":"亲爱的战友们，同志们:"},{"type":"paragraph","text":"我们得悉你们经过艰苦的斗争，接管了《文汇报》，使《文汇报》在无产阶级文化大革命中获得了新生，我们热烈祝贺你们的胜利。这是毛泽东思想的胜利!这是以毛主席为代表的无产阶级革命路线的胜利!这是无产阶级文化大革命的胜利!你们在新闻界高举起革命造反的大旗，表现了红色造反者大无畏的英雄气概，站在祖国最北端的一个重要新闻阵地上的我们，决心学习你们敢于造反、善于造反的精神，和你们肩并肩地顽强战斗。我们要彻底批判旧世界，造反到底，我们不但要用毛泽东思想改造我们的报纸，改造整个新闻界，还要用毛泽东思想改造全中国，改造全世界。我们是用毛泽东思想武装起来的彻底造反派，上海-哈尔滨相距数千里，战无不胜的毛泽东思想把我们紧紧地联系在一起。让我们高举毛泽东思想伟大红旗，携手奋进!祝战友们，同志们，用毛泽东思想不断夺取新的胜利。"},{"type":"paragraph","text":"哈尔滨晚报社红色造反新闻兵团"},{"type":"paragraph","text":"一月九日电"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dd6aaed75a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
