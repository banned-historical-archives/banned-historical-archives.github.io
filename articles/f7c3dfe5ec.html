<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"右倾机会主义者的丑相","authors":["刘宗明"],"dates":[{"year":1966,"month":4,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"右倾机会主义者的丑相\t刘宗明"},{"type":"paragraph","text":"吴晗同志在他的许多文章及剧本《海瑞罢官》中，拼命吹捧海瑞。一部《海瑞罢官》，写了几年，七易其稿，很是下了一番苦功夫！吴晗同志笔下的海瑞，是一个什么样的“英雄”呢？我们说，他是右倾机会主义分子的“英雄”形象。"},{"type":"paragraph","text":"请看，在党中央庐山会议之前，一些右倾机会主义分子在骂党中央，但吴晗同志还觉得骂得不够痛快，叫他笔下的海瑞出来“骂得非常之痛快”。在党中央庐山会议之时，自命“海瑞”的右倾机会主义分子被击败了，有些人觉得完蛋了。可是吴晗同志笔下的海瑞却是“不屈不挠，从不灰心丧气，勇敢地把全生命投入战斗”。有的人被“罢了官”灰溜溜地下台了。可是，吴晗同志笔下的海瑞，却是“傲骨依然在”，“并不屈服”，丢了官，也要杀他几个人出气。甚至高声大喊：“我海瑞丢纱帽心胸开朗，有一日再居官重整纪纲”。这样一个海瑞形象，不正是右倾机会主义分子反党反社会主义的急先锋吗？不正是敢于“豁出去”和我们拼的反动分子吗？不正是死不低头认罪，反革命到底的“英雄”吗？"},{"type":"paragraph","text":"吴晗同志努力塑造这样一个反革命的形象，正是要给右倾机会主义分子树样板，指方向，怎么能说是“为古而古，为写戏而写戏”呢？吴晗同志号召学习海瑞，就是要每一个右倾机会主义分子和海瑞赛着干，赛着反党、反人民。这正是为右倾机会主义分子的政治服务，为资本主义复辟的政治服务，又怎么能说是“脱离了政治，脱离了现实”呢？"},{"type":"paragraph","text":"吴晗同志在“自我批评”中，还说他“政治上的立场是站稳了的”。我们要问问吴晗同志：在右倾机会主义分子大肆攻击三面红旗之时，你却大写“退田”，宣传“单干”。在我国三年自然灾害之时，党告诉我们困难是暂时的，你却叫喊“家家穷得干干净净”。党号召我们批判右倾机会主义，你却号召人们要学反革命的“傲骨”。如此种种，说明你站稳了哪个阶级的立场了呢？"},{"type":"paragraph","text":"吴晗同志笔下的海瑞确实是“有血有肉”的。这说明吴晗同志的感情和这个“海瑞”太一致了。吴晗同志不过是借海瑞之口，抒自己之情罢了。"},{"type":"paragraph","text":"对于吴晗同志的花招，我们是分得清，认得明的。我们愿意告诉吴晗同志，党是我们工人阶级的命根子，任何人想损害党的一根毫毛，我们都不能答应。如果吴晗同志继续象海瑞一样，“失败了再干”，我们一定和你斗争到底。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f7c3dfe5ec"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
