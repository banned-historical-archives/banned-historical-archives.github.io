ical-archives/banned-historical-archives0/main/maoquanji30.pdf"],"article":{"title":"中央关于转发华东工会工作会议情况报告致饶漱石电","alias":"","parts":[{"type":"paragraph","text":"中央关于转发华东工会工作会议"},{"type":"paragraph","text":"情况报告致饶漱石电"},{"type":"paragraph","text":"（1951年2月7日）漱石同志："},{"type":"paragraph","text":"你一月三十日关于工会工作的报告很好已转发各地仿行。华东方面你可将这个报告发给各省委市委及区党委，叫他们照做，改善工会工作。"},{"type":"paragraph","text":"中央"},{"type":"paragraph","text":"二月七日[1]饶漱石，当时任中共中央华东局第一书记。"},{"type":"paragraph","text":"[2]指饶漱石1951年1月30日关于华东工会工作会议情况给毛泽东并中央的报告。报告指出，要顺利开展生产竞赛，必须解决和生产密切相关而为广大群众迫切要求解决的问题，这样才能发扬工人的生产积极性，树立面向生产的思想，使生产运动在工人政治觉悟不断提高的基础上持久巩固下去。工会工作的好坏主要要以生产的好坏作标准，而且也只有当工会工作以领导生产运动为中心，并在发展生产运动的基础上展开工人福利事业、文化教育工作及建立工会工作制度等，工会工作才有丰富的生动的内容。"}],"authors":["毛泽东"],"dates":[{"year":1951,"month":2,"day":7}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":111,"page_end":111},"tags":[{"name":"毛泽东","type":"人物"},{"name":"饶漱石","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"063f09ccf2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
