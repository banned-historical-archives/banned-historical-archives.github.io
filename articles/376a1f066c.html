刘培墀","卢琨","李启文","李炳信","河南农学院","白宜川","赵刚","郭年喜"],"dates":[{"year":1957,"month":5}],"is_range_date":false,"parts":[{"text":"右派言论——攻击党团员","type":"title"},{"text":"河南农学院白宜川赵刚卢琨李启文刘培墀郭年喜李炳信","type":"authors"},{"text":"白宜川（农58级学生）：团组织对我来说是后娘，对其它团员也不是一视同仁，而是厚此薄彼。","type":"paragraph"},{"text":"赵刚（农59级学生）：楚振华（共青团员）是民族败类。","type":"paragraph"},{"text":"卢琨（农59级学生）：共产党员刘克启是笑画虎，面善心恶，上拍下压，像特务一样监视人们。","type":"paragraph"},{"text":"李启文（农59级学生）：党员吃助学会是因为有政治资本，积极分子能得到信任，是由于拍马屁。老段（段继真共产党员）回来，我非杀他不可。共产党都是十八世纪的教条主义者。","type":"paragraph"},{"text":"刘培墀（农59级学生）：党员把同学们压制得都喘不过气来。党员独断独行，都是老子天下第一。","type":"paragraph"},{"text":"郭年喜（林59级学生）：班干部是小官员，院领导是土皇帝。","type":"paragraph"},{"text":"李炳信（农60级学生）：我们班的四个党员连起码的同志感都没有。","type":"paragraph"},{"text":" 来源：《右派言论选辑》（河南农学院，1957年12月）。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"376a1f066c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
