art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"卡斯特罗喊的是团结干的是分裂他在政治；意识形态和经济上都仰仗苏联修正主义领导人的鼻息","authors":[],"parts":[{"type":"paragraph","text":"新华社二十一日讯 布鲁塞尔消息：比利时共产党机关刊物《人民之声》周刊一月十四日以《卡斯特罗跟着苏联修正主义领导走》为题发表评论。评论说："},{"type":"paragraph","text":"卡斯特罗大谈特谈帝国主义，马克思列宁主义，以及共产主义运动的团结。"},{"type":"paragraph","text":"事实上，他已选择了他的阵地。卡斯特罗仰仗苏联修正主义领导人的鼻息，在政治上、意识形态上和经济上都是如此。"},{"type":"paragraph","text":"步步妥协就会很快地变质。"},{"type":"paragraph","text":"卡斯特罗嘴里喊团结，却选择了分裂。他嘴里喊“尊重”兄弟党，但实际却对中国进行卑鄙而阴险的诬蔑。他是在哈瓦那市中心举行的群众大会上，而且，说来凑巧，恰恰是在三大洲会议开幕之前进行这种诬蔑的。"},{"type":"paragraph","text":"卡斯特罗着重地肯定，他曾建议以两吨古巴糖换一吨中国大米，而且他以为这种交易的有效性是长期的。"},{"type":"paragraph","text":"他同时表示，中国在千方百计地阻止同古巴的贸易……"},{"type":"paragraph","text":"事实上，这是一个可耻的、完全虚伪的演说，这篇演说蓄意颠倒黑白，竭力进行反华。RW：卡斯特罗；反华声明"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7680d7cec8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
