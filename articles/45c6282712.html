script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"修正主义的惯用伎俩","authors":["阮胜"],"dates":[{"year":1977,"month":3,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"上海港务局　阮胜"},{"type":"paragraph","text":"张春桥狂吠什么:“马恩的书也有缺点，有些话当时来说是对的，以后就不行了。”“四人帮”的余党还狂妄地提出一个所谓“张春桥思想”。一句话泄露了天机，张春桥及其“四人帮”同伙挥舞“过时论”的大棒，是企图把马列主义、毛泽东思想打下去，而由他们这一帮祸国殃民的修正主义分子上台，狼子野心昭然若揭!"},{"type":"paragraph","text":"恶狗的狂吠无损于太阳的光辉。张春桥胡说什么，毛主席对社会主义时期的阶级关系是“不甚了了”，狂妄地宣称要由张春桥写一本“中国社会主义时期阶级分析”，“作为今后制定政策的依据”。"},{"type":"paragraph","text":"然而，马列主义、毛泽东思想是科学的真理，它的每一个原理都正确地反映了客观规律，为我们不断地开辟了认识真理的道路。野心家张春桥玩弄相对主义的诡辩论，攻击马列主义、毛泽东思想“过时”了，恰恰暴露了他们正是一伙假马克思主义的政治骗子，是一帮货真价实的马克思主义的叛徒!"},{"type":"paragraph","text":"张春桥疯狂地挥舞“过时论”的大棒，这不是“四人帮”的新发明，只不过是一切修正主义者的故伎重演，是把修正主义思想武库中的破烂货拿出来再挥舞一下而已。借口“时代的变化”，攻击马克思主义“不完备”，“过时了”，正是修正主义的鼻祖伯恩施坦的老调重弹。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"张春桥","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"四人帮","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"45c6282712"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
