团陆续被揭露出来","authors":[],"dates":[{"year":1957,"month":9,"day":18}],"is_range_date":false,"parts":[{"text":"河北反右派斗争向文教科技界扩展，许多右派分子和小集团陆续被揭露出来","type":"title"},{"text":"目前，河北省反右派斗争已从党政领导机关、民主党派和工商界扩展到文艺界、新闻界、科学技术界等各行各业。河北省文联最近揭露出以省文联副主任、党组副书记刘艺亭为首的反党集团。他们以省文联机关刊物——“蜜蜂”编辑部作为阵地，有组织有计划地向党进行恶毒的攻击，反对党对文学艺术的领导。石家庄市揭露出一个以民主促进会石家庄市筹备委员会副主任楚庄、石家庄教师进修学院教师柳木风、速成中学教员华直等为首的右派集团，他们在学校中到处煽动群众提出“取消党委制”，并诬蔑共产党说:“党就是宗派，要想克服宗派就得取消党。”","type":"paragraph"},{"text":" ——原载《文汇报》1957年9月18日。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2a23b6296b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
