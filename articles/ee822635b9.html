,"authors":[],"dates":[{"year":1969,"month":4,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"日本朋友热烈欢呼我党第九次全国代表大会开幕"},{"type":"paragraph","text":"中国无产阶级文化大革命取得了伟大胜利"},{"type":"paragraph","text":"新华社讯　东京消息：日本朋友发表谈话，热烈欢呼中国共产党第九次全国代表大会开幕，高度评价中国无产阶级文化大革命的伟大胜利，并指出这次大会具有深远的国际意义，将大大地鼓舞日本人民的反美爱国正义斗争。"},{"type":"paragraph","text":"日中友好协会（正统）总部会长黑田寿男说，伟大的中国共产党第九次全国代表大会的召开，对要求日中友好的日本人民是一个莫大的鼓舞，同时，也是给疯狂地进行反华活动的美日反动派和日共宫本修正主义集团以决定性的打击。"},{"type":"paragraph","text":"他强调指出，中国共产党第九次全国代表大会的召开，具有伟大的国际意义。黑田说，我们日中友好协会（正统）全体会员认识到伟大的中国共产党第九次全国代表大会的伟大意义，并且正在向广大群众进行宣传。"},{"type":"paragraph","text":"黑田表示，日中友好协会（正统）的全体会员要同七亿中国人民一起共享“九大”胜利的喜悦，并和要求日中友好的广大日本人民团结起来，把这种喜悦化为同敌人进行斗争的巨大力量，用强有力的反美爱国正义斗争的实践，来庆祝“九大”的召开。"},{"type":"paragraph","text":"日中文化交流协会理事长中岛健藏满怀激情地说，中国人民和世界革命人民盼望已久的中国共产党第九次全国代表大会隆重开幕了。这次大会表明毛主席亲自发动和领导的无产阶级文化大革命取得了伟大胜利。"},{"type":"paragraph","text":"中岛高度赞扬中国无产阶级文化大革命的伟大意义。他说，中国无产阶级文化大革命在人类的革命史上增添了一页最美好、最新、最伟大的胜利篇章。这一壮丽的篇章，是在毛主席关于无产阶级专政条件下继续进行革命的学说的照耀下，写出来的。"},{"type":"paragraph","text":"中岛强烈谴责美帝国主义、日本反动派、苏联现代修正主义、日共宫本修正主义集团对于毛泽东思想、对于中国无产阶级文化大革命、对于中华人民共和国的发展所进行的无耻的疯狂的攻击。他指出，这完全证明他们正已陷入走投无路，只有死路一条的绝望处境。"},{"type":"paragraph","text":"中岛接着说，参加“九大”的代表，不论是革命的老战士，还是新战士，都是经过无产阶级文化大革命锻炼的、生气勃勃的革命战士，这次大会是一次团结和胜利的大会。他最后热情地高呼：“敬祝毛主席万寿无疆！”"},{"type":"paragraph","text":"日本国际贸易促进会常务理事兼事务局长皆川郁夫指出，“九大”的召开，将大大地鼓舞同美帝国主义及其走狗进行斗争的日本人民。他说，毫无疑义，“九大”具有重要的划时代的意义。"},{"type":"paragraph","text":"皆川最后说，为了祝贺“九大”的召开，我们决心进一步开展反对佐藤政府遵照美帝国主义的意旨推行敌视中国的“日美安全体制”的斗争，坚决反对佐藤政府勾结蒋匪帮、策划“两个中国”的反华阴谋，并决心把这一斗争坚持到底。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ee822635b9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
