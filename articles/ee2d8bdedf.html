tart":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"成绩面前力戒骄傲","authors":["“学习毛主席著作先锋连”指导员仲依生"],"parts":[{"type":"paragraph","text":"我们连从一九六八年开始到一个生产大队执行支农任务。在毛主席无产阶级革命路线的指引下，经过广大贫下中农和我们的共同努力，这个大队由全县有名的落后大队变成了先进集体，报上不断发表这个大队的经验，兄弟单位也派人来参观访问。在成绩面前，在赞扬声中，我们有些同志产生了自满情绪，以为这个大队经过清队、整党、建立新的领导班子，不会再有啥问题了。"},{"type":"paragraph","text":"但是，就在这时，队里发生了一件事，一个坏分子看到革委会副主任家缺乏板凳，就用好木料做了个板凳送到他家。贫下中农提醒副主任注意这件事，副主任却认为送个板凳没有啥。这件事使我受到了震动。我深入了解了一下，发现这位副主任所以会在阶级敌人进攻面前丧失警惕性，和我们支农人员在胜利面前产生自满情绪，放松阶级斗争，是有密切联系的。于是，我带着这个问题，反复学习了毛主席关于“我们已经取得了伟大的胜利。但是，失败的阶级还要挣扎。这些人还在，这个阶级还在。所以，我们不能说最后的胜利”的教导。我认识到，这个大队由后进变为先进，绝不意味着就没有矛盾了；新生的革命政权建立起来了，绝不意味着阶级敌人就不再进行破坏和捣乱，阶级斗争就停止了。阶级敌人不甘心失败，他们必然要采用更隐蔽、更狡猾的手段向我们进攻。因此，我们绝不能只看到革命取得了胜利，而看不到胜利之后还必须继续革命。"},{"type":"paragraph","text":"认识提高后，我们就和大队革委会一起举办了学习班。我自己首先主动斗了自满松懈情绪，并以当前的事实为例子，狠批了叛徒刘少奇的“阶级斗争熄灭论”。革委会副主任也认真总结了自己的经验教训。"},{"type":"paragraph","text":"我们和广大贫下中农，决心不松懈战斗意志，时刻注意阶级斗争新动向，不断开展革命大批判，推动革命和生产的发展。"}],"alias":""},"tags":[{"name":"革命大批判","type":"主题/事件"},{"name":"清理阶级队伍","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ee2d8bdedf"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
