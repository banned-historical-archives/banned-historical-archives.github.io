art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"坚决反对出卖越南人民的“和平谈判”严厉谴责美帝带头、现代修正主义帮腔玩弄骗局的阴谋","authors":[],"parts":[{"type":"paragraph","text":"据新华社十四日讯 中国亚非团结委员会主席廖承志今晚在首都各界纪念“非洲自由日”的招待会上指出，亚非各国人民全力支持越南人民抗美救国斗争也就是为了自己的斗争，亚非人民反对美帝国主义的斗争是共同的和不可分割的。"},{"type":"paragraph","text":"廖承志再次重申：六亿五千万中国人民坚决支持越南人民把美帝国主义从越南彻底赶走，解放南方、保卫北方、统一祖国的神圣斗争。中国人民决心给南越人民一切必要的包括武器在内的物资支援，并且当南越人民需要时将派出自己的人员同南越人民共同战斗。"},{"type":"paragraph","text":"廖承志着重表示，中国人民坚决反对美帝国主义带头、由现代修正主义分子帮腔出卖越南人民的“和平谈判”阴谋。他指出，越南南方人民已经打败了美帝国主义的特种战争。美帝国主义对越南北方的军事挑衅和战争讹诈已经破产了。美帝国主义不管再耍什么花招，也无法挽救它已经注定的失败。"},{"type":"paragraph","text":"廖承志热烈赞扬越南人民伟大的革命精神和战斗精神。RW：廖承志；中国亚非团结委员会主席；言论"}],"alias":""},"tags":[{"name":"廖承志","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0a01e64148"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
