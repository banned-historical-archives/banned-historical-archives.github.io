","authors":[],"dates":[{"year":1977,"month":8,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"华主席邓副主席会见杨振宁博士"},{"type":"paragraph","text":"会见后设宴招待了杨振宁博士。方毅同志等参加会见和宴会"},{"type":"paragraph","text":"新华社一九七七年八月二十七日讯　华国锋主席、邓小平副主席今天下午会见了美籍物理学家杨振宁博士。"},{"type":"paragraph","text":"华主席、邓副主席对杨振宁博士来中国探亲访问表示欢迎，并同他进行了十分亲切的谈话。"},{"type":"paragraph","text":"会见以后，华主席、邓副主席设宴招待了杨振宁博士。杨振宁博士的母亲罗孟华、弟弟杨振汉、妹妹杨振玉出席了宴会。"},{"type":"paragraph","text":"参加会见和宴会的还有中共中央政治局委员、中国科学院副院长方毅，人大常委会副秘书长罗青长，中国科学院副院长吴有训，全国科技协会副主席周培源，有关方面负责人和科学工作者熊向晖、张文裕、唐闻生、岳岱衡、方晓、朱永行。（附图片）"},{"type":"paragraph","text":"左图：华主席同杨振宁博士进行十分亲切的交谈。\t\t\t\t  新华社记者摄"},{"type":"paragraph","text":"左下图：华主席、邓副主席等同杨振宁博士合影。\t\t\t\t  新华社记者摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ad28749f93"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
