ical-archives/banned-historical-archives8/main/maoquanji16.pdf"],"article":{"title":"给谢觉故的信","alias":"","parts":[{"type":"paragraph","text":"给谢觉哉的信！"},{"type":"paragraph","text":"（1941年8月5日）"},{"type":"paragraph","text":"你的各信我都转给弼时、王明、高岗、陈正人四同志看，使他们多了解你。他们都愿意多和你及林老谈，都愿把事情把关系弄得好些。事情确需多交换意见，多谈多吹，才能周通，否则极易偏于一面。对下情搜集亦然，须故意（强所不愿）收集反面材料。我的经验，用此方法，很多时候，前所认为对的，后觉不对了，改取了新的观点。客观地看问题，即是孔老先生说的“毋意，毋必，毋，毋我”，你三日信的精神，与此一致，盼加发挥。此次争论，对边区，对个人，皆有助益。各去所偏，就会归于一是。事情只求其是”，闲气都是浮云。过去的一些“气”，许多也是激起来的，实在不相宜。我因听得多了，故愿与闻一番，求达“和为贵”之目的。见在问题的了解日益接近，事情好办。在短时间内，总结一下边区作很好，请准备材料及意见。你身体有病，切勿过劳，暂时以休养为主很好。[1]谢觉哉，当时任中共中央西北局副书记、中共陕甘宁边区政府党团"}],"authors":["毛泽东"],"dates":[{"year":1941,"month":8,"day":5}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":189,"page_end":189},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b749f6cb6b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
