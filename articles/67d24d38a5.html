[{"year":1952,"month":5,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"一九四二年五月二十三日，毛主席在延安文艺座谈会上发表了重要的讲话，明确地指出了我们的文艺是为什么人的问题、普及与提高的关系的问题。"},{"type":"paragraph","text":"十年以来，我们的文艺工作者，运用毛泽东文艺路线的基本精神，逐步地贯彻普及为主、并在普及基础上继续提高的方针，我国文艺为工农兵服务的成绩，已经取得了一定的胜利。"},{"type":"paragraph","text":"明天，就是毛主席在延安文艺座谈会发表讲话的十周年，全国各地的文艺界都准备在这一天举行庆祝。"},{"type":"paragraph","text":"在全国反贪污、反盗窃战线获得辉煌成就的今天，我们文艺工作者，必须深入检查并批判工作中的错误思想，与当前的文艺整风相结合，清除资产阶级思想的毒害，从根本上改造自己，全身心地为工农兵群众服务，把毛泽东文艺思想的旗帜更高地举起，为进一步贯彻毛泽东文艺路线而努力。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"67d24d38a5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
