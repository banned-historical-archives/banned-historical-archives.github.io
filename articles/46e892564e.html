军委下令嘉奖，希望在保卫国防和保卫文化大革命运动中立新功","authors":[],"dates":[{"year":1968,"month":3,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京十六日电　在全国亿万军民夺取无产阶级文化大革命全面胜利的进军中，无限忠于伟大领袖毛主席的英雄的中国人民解放军空军部队，昨天下午，在西南某地上空，击落侵入我国领空进行侦察挑衅的美帝国主义军用无人驾驶高空侦察机一架。这是用战无不胜的毛泽东思想武装起来的中国人民解放军，今年以来，在西南地区上空击落的第三架美帝国主义军用无人驾驶高空侦察机。"},{"type":"paragraph","text":"新华社北京十六日电　中央军委颁发嘉奖令，表扬昨天在西南某地上空一举击落美帝国主义军用无人驾驶高空侦察机一架的中国人民解放军空军部队。"},{"type":"paragraph","text":"嘉奖令说，在全国军民大学大用伟大领袖毛主席光辉的“三·七”指示，乘胜夺取无产阶级文化大革命全面胜利的一片大好形势下，你们对伟大领袖毛主席心怀一个忠字，对战无不胜的毛泽东思想突出一个用字，英勇地保卫我社会主义祖国，一举击落侵入我西南某地上空进行侦察挑衅的美帝国主义军用无人驾驶高空侦察机一架。这是你们响应林副主席的号召，高举毛泽东思想伟大红旗，突出无产阶级政治，做好人的思想革命化的结果，是你们忠于伟大领袖毛主席、忠于战无不胜的毛泽东思想、忠于毛主席的无产阶级革命路线取得的新胜利，特予通令嘉奖。"},{"type":"paragraph","text":"嘉奖令说，伟大领袖毛主席早就指出:“捣乱，失败，再捣乱，再失败，直至灭亡——这就是帝国主义和世界上一切反动派对待人民事业的逻辑，他们决不会违背这个逻辑的。”希望你们遵照伟大领袖毛主席关于“丝毫也不应当松懈你们的战斗努力”的伟大教导，全面落实伟大领袖毛主席的一系列最新指示和林副主席的指示，继续在保卫国防和保卫无产阶级文化大革命运动中，为人民立新功。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"46e892564e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
