场热烈欢送阿尔巴尼亚战友","authors":[],"dates":[{"year":1972,"month":12,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"圆满结束对我国的友好访问"},{"type":"paragraph","text":"巴卢库同志率军事友好代表团离京回国"},{"type":"paragraph","text":"叶剑英同志等前往机场热烈欢送阿尔巴尼亚战友"},{"type":"paragraph","text":"新华社一九七二年十二月九日讯  以阿尔巴尼亚劳动党中央政治局委员、部长会议副主席兼国防部长贝·巴卢库为团长，阿尔巴尼亚人民军政治部主任希·恰科和阿尔巴尼亚人民军副总参谋长拉·佩尔拉库为副团长的阿尔巴尼亚人民共和国军事友好代表团，圆满结束对我国的友好访问，带着中国人民和军队的深厚战斗友谊，八日乘专机离开北京经上海回国。巴卢库夫人同机离开北京回国。"},{"type":"paragraph","text":"前往机场热烈欢送阿尔巴尼亚战友的有：中共中央政治局委员、中共中央军委副主席叶剑英，中共中央委员、国防部副部长肖劲光、王树声，中共中央委员、中国人民解放军副总参谋长彭绍辉，中国人民解放军副总参谋长李达，中国人民解放军总政治部副主任田维新，中共中央委员、中国人民解放军总后勤部政委张池明，中共中央委员、中共中央对外联络部部长耿飚，中共中央候补委员、外经部部长方毅，中共中央委员、外贸部副部长李强，外交部副部长余湛，中国人民解放军各军种、兵种、北京部队、北京卫戍区以及对外友协的负责人周希汉、曹里怀、张达志、李家益、陈士榘、刘贤权、周世忠、陈先瑞、吴忠、柴成文、苑化冰、杨骥。"},{"type":"paragraph","text":"中共中央委员、中国人民解放军副总参谋长张才千和波涛同志，国防部外事局副局长朱开印，阿尔巴尼亚驻中国大使罗博和夫人，代表团团员、阿尔巴尼亚驻中国大使馆武官卡比苏茨和夫人，陪送代表团到上海。"},{"type":"paragraph","text":"前往机场送行的还有阿尔巴尼亚驻中国大使馆参赞安东尼和夫人，大使馆其他外交官员，以及阿尔巴尼亚人民军“游击队”足球队的同志。"},{"type":"paragraph","text":"巴卢库同志等经过上海时，上海市革命委员会和中国人民解放军驻上海部队负责人周纯麟、王秀珍、刘耀宗、武占魁、申元军、杨新亚等到机场热烈迎送。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"07b344e6a8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
