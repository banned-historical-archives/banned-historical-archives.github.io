rt":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"“四人帮”们的“起点”","authors":["樊其昌〖HH/换行〗DW：八九一○一部队"],"parts":[{"type":"paragraph","text":"“四人帮”为了篡党夺权，实现资产阶级专政的“帮天下”，给文艺创作定了许多“帮规”。其中一条叫做英雄人物要“起点高”。"},{"type":"paragraph","text":"按“四人帮”们的逻辑：既然是“英雄人物”，一出世就得金辉夺目，光彩照人；从娘肚子里出来的第一声啼哭，就必须是雷鸣般的“豪言壮语”，否则，还怎么能成其为“英雄人物”？按照“四人帮”的逻辑，“英雄人物”是不存在转变过程的，也不允许有成长经历。周挺杉在油娃年代就应该有党委领导的水平，海霞在母亲怀里最好当上民兵连长。不然，就触犯了“帮规”，“起点”太“低”，难免“废黜”。"},{"type":"paragraph","text":"看“四人帮”这一副道貌岸然的架式，他们自己的“起点”一定是高超得可以了。其实完全不是那么一回事。"},{"type":"paragraph","text":"在“四人帮”这台“戏”中，江青也算个“主要人物”了，她的“起点”高到哪里去？充其量，不过是三十年代给独夫民贼蒋介石献机祝寿的角色，后来更成为可耻的叛徒。张春桥上中学时就成了出卖革命学生的小特务。姚文元则是反动文人的“破落户子弟”。王洪文当过“小偷”和“逃兵”。由此可见，“四人帮”鼓吹的“起点高”，和他们自己就对不上号。于是，他们千方百计伪造历史，一个个装扮得纯洁无比。江青甚至还捏造什么“反对封建”反掉了牙的神话，胡诌出“南泥湾草帽”的奇迹。"},{"type":"paragraph","text":"经过一番乔装打扮，“四人帮”们的“起点”确实“高”了许多，然而画皮总有被剥掉的时候。党和人民彻底查清了他们的底细，他们的起点，也就成了他们彻底灭亡的终点。"}],"alias":""},"tags":[{"name":"江青","type":"人物"},{"name":"四人帮","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"61d7d7a98a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
