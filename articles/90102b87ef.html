script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反对垄断资产阶级的残酷剥削意大利工人斗争浪潮滚滚向前一百万建筑、制砖和水泥工人又举行全国大罢工","authors":[],"dates":[{"year":1969,"month":10,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京电　罗马消息:意大利广大工人反对垄断资产阶级残酷剥削的罢工斗争，此伏彼起，继续发展。"},{"type":"paragraph","text":"冶金和机器制造业工人的罢工斗争已坚持了三个多星期。都灵、米兰、热那亚、威尼斯、那不勒斯等城市的数十万冶金、机器制造、化学和制药工人，目前仍在继续罢工，要求提高工资。"},{"type":"paragraph","text":"三日和四日，五万五千名制砖工人再次举行了四十八小时罢工。"},{"type":"paragraph","text":"十月三日，在热那亚、威尼斯和那不勒斯三大城市，都有数千名罢工工人举行声势浩大的示威游行，愤怒抗议垄断资产阶级的罪恶统治。在都灵以及罗马附近，罢工工人同前往镇压的警察进行了搏斗。"},{"type":"paragraph","text":"皮雷利公司所属各工厂的工人三日联合举行四小时罢工，使这个意大利最大的橡胶托拉斯在全国各地的工厂一度陷于瘫痪。在意大利第二大城市米兰，皮雷利工厂的四千名工人三日还在街头举行了群众大会。橡胶工人二日还在米兰市区举行了示威游行，抗议资本家无理解雇工人。他们在游行时高呼谴责垄断资本家的口号。"},{"type":"paragraph","text":"据新华社北京电　罗马消息:意大利广大工人反对垄断资产阶级残酷剥削的罢工斗争浪潮，继续一浪高一浪地向前发展。"},{"type":"paragraph","text":"意大利一百万建筑、制砖和水泥工人，一日又一次举行二十四小时的全国性罢工，要求提高工资。罢工工人在米兰、佛罗伦萨等城市举行了示威。前一天，八万建筑工人在罗马市中心举行示威游行，使意大利首都一些街道的交通一度陷于瘫痪。他们向吮吸工人血汗的资本家愤怒地高呼:“剥削者!强盗!刽子手!”"},{"type":"paragraph","text":"一日，意大利一百三十万冶金和机器制造工人，以及二十二万化学和制药工人继续分区轮流举行罢工。都灵地区的四十万冶金和机器制造工人从二日起再次举行四十八小时罢工。"},{"type":"paragraph","text":"在意大利第三大城那不勒斯，三千名罢工的冶金和机器制造工人，在九月三十日举行示威，切断了火车交通，十月一日又再次举行了示威游行。在里窝那，五千冶金和机器制造工人九月三十日举行了示威。热那亚的冶金和机器制造工人也在十月一日举行了示威。"},{"type":"paragraph","text":"在意大利南部的阿浦利亚区，罢工者十月一日占领了塔兰托和莱切市的市政厅。同一天，在意大利南部的康帕尼亚区，罢工工人在阿韦利诺举行了示威游行，切断了从阿韦利诺通往福贾的公路交通。"},{"type":"paragraph","text":"在意大利第二大城米兰，一万八千名市政工人十月一日举行了罢工。威尼斯和巴勒莫市的交通工人同一天也举行了罢工。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"90102b87ef"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
