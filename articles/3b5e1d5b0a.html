支持和赞扬　演出结束后举行座谈会演员观众高唱《东方红》","authors":[],"dates":[{"year":1966,"month":11,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社东京6日电　日本青年演出描写毛主席的好战士欧阳海的话剧，受到日本朋友的热情支持和赞扬。"},{"type":"paragraph","text":"这个话剧是由东京亚非语学院中文系二年级学生，根据中国著名长篇小说《欧阳海之歌》第七章《家乡行》改编，并由他们用中国话演出的。"},{"type":"paragraph","text":"领导改编、演出这个话剧的学生说:我们演出《欧阳海之歌》是为了更好地理解中国伟大的无产阶级文化革命的意义，同时，也是为了增进日中两国人民的友好。"},{"type":"paragraph","text":"参加演出的多数演员是半工半读的学生。扮演欧阳海的演员，白天在学校念书，晚上在一家商店里劳动。他一心一意地想把这个伟大战士的形象演好，每天晚上劳动后回到家里躺在床上，还练习剧中的台词。"},{"type":"paragraph","text":"欧阳海全家在中国旧社会的痛苦遭遇和欧阳海在毛泽东思想哺育下成长的过程，使参加演出的演员们深受感动。"},{"type":"paragraph","text":"五日，当他们在学校里首次演出这个话剧时，不少日本朋友前来观看，给他们以鼓励。"},{"type":"paragraph","text":"演出结束后，还举行了座谈会，演员和观众畅谈演出和观看的体会，大家最后一起高唱歌颂伟大领袖毛主席的歌曲《东方红》。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3b5e1d5b0a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
