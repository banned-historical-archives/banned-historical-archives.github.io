ical-archives/banned-historical-archives8/main/maoquanji23.pdf"],"article":{"title":"关于攻取榆林城和打接的问题","alias":"","parts":[{"type":"paragraph","text":"关于攻取榆林城和打援的问题！！"},{"type":"paragraph","text":"（1947年11月5日）彭、张："},{"type":"paragraph","text":"（一）据马?部情况及经横山里程估计，至快要灰日才能到榆城附近。（二）邓部援兵三个团及炮兵一部，我以八个团加四六两团，似有把握将其歼灭或击溃。（三）但未知攻城作业确能于你们昨电所称三日内完成，并能于灰日以前攻克榆城否。（四）如十个团打邓，八个团攻城确有把握，并于灰日以前取得打邓攻城两项胜利，则可照你们原定计划执行不变；否则应改变计划，停止攻城，集中全力先打邓，再打马，然后攻城。究应如何，望酌情处理。（五）请考虑调王世泰纵队，由延长取捷径，以六至七天行程到达横山地区，打马部后路。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"五日一时"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军委起草的给西北野战军司令员兼政治委员彭德怀和副司令员张宗逊的电报。"},{"type":"paragraph","text":"[2]马，指马鸿逵，当时任国民党政府主席西北行辕副主任。[3]邓，指邓宝珊，当时任国民党军晋陕绥边区总部总司令。[4]王世泰纵队，指西北野战军第四纵队，纵队司令员王世泰。"}],"authors":["毛泽东"],"dates":[{"year":1947,"month":11,"day":5}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":389,"page_end":389},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b7ebc4ffe9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
