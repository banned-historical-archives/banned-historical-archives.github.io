集体等问题上，划清思想界限，摆脱资产阶级思想影响，立志做劳动者。","authors":[],"dates":[{"year":1952,"month":6,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　上海学联于六月一日下午举行了第六届执行委员会第三次会议。会议首先由市学联副主席宋锡恒同学作了关于上海同学参加五反运动的情况及今后工作的报告。执委会对他的报告进行讨论后，认为:全市同学在这次五反运动中，发扬了光荣的爱国传统，积极拥护五反，参加了宣传和劝说工作，发挥了应有作用；在实践斗争中，使自己也得到了深刻的教育和锻炼，政治觉悟和思想水平都有了很大的提高。同时，执委会认为，这些成绩仅是初步的；目前除各高等学校同学应按各校原定计划进行思想改造学习外，全市高中同学必须在参加伟大的五反运动的基础上进一步开展思想学习，把运动中所获得的感性认识提高到理性认识的水平；从劳动与剥削、集体主义与个人主义的根本问题上来划清工人阶级与资产阶级的思想界限，并从阻碍自己进步的几个主要方面来认识资产阶级思想对青年学生的侵蚀及其危害性，从而努力摆脱资产阶级思想的影响，立志做劳动者，为劳动人民忠诚服务。在学习中，还应全面地认识目前中国资产阶级的两面性及党对资产阶级的政策。这一次学习，对同学们的思想改造是有着非常重要的意义的。"},{"type":"paragraph","text":"执委会还提出，各校同学目前同时要搞好功课，学习努力做好爱国防疫卫生工作和冬季体育锻炼的测验工作。"},{"type":"paragraph","text":"继由学联秘书长翟象干同志向执委会提出建议:根据中央人民政府政务院关于统一处理机关生产的决定的原则，应将学联文化用品供销站移交给国营机构统一经营，全体执委经讨论后一致同意此项建议，并就移交以后对同学们文化用品的供应工作提供了一些意见。"},{"type":"paragraph","text":"最后执委会通过了九个学校学生会入会。到目前为止，上海学联的会员学校已达三三五校。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ca013315c9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
