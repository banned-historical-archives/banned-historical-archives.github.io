,"authors":[],"dates":[{"year":1967,"month":10,"day":25}],"is_range_date":false,"parts":[{"text":"中共中央关于十月社会主义革命五十周年纪念办法的通知","type":"title"},{"text":"今年十一月七日是伟大十月社会主义革命五十周年。中央决定纪念办法如下：","type":"paragraph"},{"text":"一、《人民日报》《红旗》杂志和《解放军报》联名发表纪念社论。","type":"paragraph"},{"text":"二、在首都举行纪念大会，由林彪同志作报告。","type":"paragraph"},{"text":"三、上海、沈阳、天津、武汉、西安、成都、广州等大城市也举行纪念会。","type":"paragraph"},{"text":"四、纪念会一般不邀请外宾。","type":"paragraph"},{"text":"五、在节日前后放映《列宁在十月》等电影。","type":"paragraph"},{"text":" 中共中央一九六七年十月二十五日","type":"paragraph"}],"comments":[],"origin":"根据《中共中央文件汇编，1966.5-1968.5 [内部参考]》，1968年5月出版，编印者不明","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cf6a53c861"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
