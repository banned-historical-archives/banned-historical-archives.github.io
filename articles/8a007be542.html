rt":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"革命宝书《毛主席语录》各种外文本出版","authors":[],"parts":[{"type":"paragraph","text":"新华社七日讯 世界革命人民渴望已久的宝书《毛主席语录》各种外文本已由北京外文出版社翻译出版。从一九六六年九月至一九六七年五月，外文出版社先后出版了英、法、西班牙、俄、日、德、越、阿拉伯、印度尼西亚、缅、斯瓦西里、意大利、波斯、尼泊尔等十四种文本的《毛主席语录》。世界语、泰、印地、乌尔都、葡、挪威、阿尔巴尼亚和太米尔文本的《毛主席语录》，也将陆续出版。这本宝书为红色塑料封面，正文前印有伟大领袖毛主席的像片和林彪同志的题词。"},{"type":"paragraph","text":"《毛主席语录》各种外文本的出版，是全世界革命人民政治生活中的一件大事，受到了各国广大读者的热烈欢迎。这本宝书，对当代世界革命运动一系列重大问题作了科学的和精辟的论断，它是全世界革命人民争取民族解放、人民民主和社会主义胜利的指路明灯。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8a007be542"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
