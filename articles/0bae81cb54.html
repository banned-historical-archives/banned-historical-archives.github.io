76,"month":6,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"夸春苗华中师范学院工农兵学员　张永柱老汉去参加批判会，一路上，绿岭青山看不尽，逢人就夸“春苗”好，话似春水不断音……当初，公社化运动好红火，老汉又是喜呵又是恨：可恨旧社会水牢黑呵，关瞎了一对亮眼睛。看不见新修的大水库，看不见满山麦苗有多青！电磙子响得心更急呵，看不见公社的大跃进……进城寻医治眼睛，“权威”的话比冰霜冷三分：“高手也治不了‘十年瞎’”，硬把老汉轰出医院门。说话又过了十几年呵，深山响起马蹄声：红英姑娘大学毕了业，回乡当了赤脚医生。红英好呵红英亲——煎药先尝味，针灸先试针。赤脚医生本领大呵——使老汉的眼睛重见光明。那天队里放映《春苗》，老汉说春苗是“红英”，人家笑他看花了眼，他说：“老汉眼里有准星”……今天去参加批判会，仇多深呵爱多深：“邓小平骂《春苗》是‘极左’，我说春苗好得很。”“春苗好！春苗好！”老汉一路话不停，“保护社会主义春苗，要象保护这对亮眼睛！”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0bae81cb54"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
