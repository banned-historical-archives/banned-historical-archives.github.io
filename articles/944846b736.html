:1950,"month":5,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京廿六日电】　中央人民政府毛泽东主席和政务院周恩来总理，于闻悉华东军政委员会颜惠庆副主席病逝后，深为哀悼。特电颜副主席家属致唁，电文如下:"},{"type":"paragraph","text":"(一)毛泽东主席唁电:"},{"type":"paragraph","text":"颜惠庆副主席家属礼鉴:颜惠庆先生因病逝世，无任悼念，特电致唁。"},{"type":"paragraph","text":"毛泽东五月二十六日"},{"type":"paragraph","text":"(二)周恩来总理唁电:"},{"type":"paragraph","text":"颜惠庆副主席家属礼鉴:惊悉颜惠庆先生因病逝世，良深哀悼，谨此电唁。"},{"type":"paragraph","text":"周恩来五月二十六日【本报讯】　颜故副主席家属覆毛主席及周总理电文如下:"},{"type":"paragraph","text":"(一)“中央人民政府毛主席:先君惠庆先生之丧承赐电唁奉慈命叩谢。"},{"type":"paragraph","text":"颜棣生、颜朴生、颜植生五月廿七日”"},{"type":"paragraph","text":"(二)“中央人民政府政务院周总理:先君之丧承赐电唁奉慈命叩谢。颜棣生、颜朴生、颜植生五月廿七日”"},{"type":"paragraph","text":"【又讯】华东军政委员会颜故副主席遗体，将于今日下午二时在静安寺公墓举行火葬。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"944846b736"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
