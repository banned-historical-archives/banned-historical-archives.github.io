":[],"dates":[{"year":1990,"month":6,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛泽东周恩来刘少奇朱德邓小平陈云"},{"type":"paragraph","text":"《思想方法工作方法文选》出版"},{"type":"paragraph","text":"新华社北京６月２７日电  中共中央文献研究室为配合全党干部学习马克思主义哲学而编辑的《思想方法工作方法文选》一书，已于近日出版。"},{"type":"paragraph","text":"这本书汇集了毛泽东、周恩来、刘少奇、朱德、邓小平、陈云在不同的历史时期、从不同的角度阐述思想方法和工作方法的有代表性的著作，同时也收入了反映他们用马克思主义的立场、观点、方法分析中国国情、制定中国革命和社会主义现代化建设的基本路线和重大方针政策的一些重要著作，共７４篇，近３０万字。全书按著作发表时间顺序编排。"},{"type":"paragraph","text":"思想方法和工作方法是马克思主义哲学的重要内容。几十年来，我们党一直强调干部学习和掌握马克思主义的思想方法和工作方法。"},{"type":"paragraph","text":"近年来，以江泽民为核心的党中央再次强调了这个问题。"},{"type":"paragraph","text":"《思想方法工作方法文选》的出版，对于推动各级干部特别是中、高级干部学习马克思主义哲学，掌握马克思主义思想方法和工作方法，提高政策水平和工作能力，将会起到有益的作用。"},{"type":"paragraph","text":"这本书由中央文献出版社出版，全国新华书店发行。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"邓小平","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"陈云","type":"人物"},{"name":"朱德","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c44dea8093"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
