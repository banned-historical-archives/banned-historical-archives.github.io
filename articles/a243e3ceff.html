,"dates":[{"year":1957,"month":8,"day":21}],"is_range_date":false,"parts":[{"text":"浙江人民出版社谭克叛党","type":"title"},{"text":"浙江省和杭州市新闻出版界举行的反右派大会，揭露了党内右派分子、浙江人民出版社负责人谭克的反党罪行。谭克已从一个极端个人主义者堕落成共产党的一个十分阴险叛徒。他勾结社内其他右派分子，妄图篡改出版事业的政治方向，妄图把浙江人民出版社变成一个资产阶级右派反党的堡垒，并且在反右派斗争中，利用领导职权的便利，向社内其他右派分子传送情报，提供“策略”，订立攻守同盟，千方百计破坏反右派斗争。","type":"paragraph"},{"text":" ——原载《文汇报》1957年8月21日。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a243e3ceff"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
