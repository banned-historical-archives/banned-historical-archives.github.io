,"dates":[{"year":1967,"month":8,"day":17}],"is_range_date":false,"parts":[{"text":"国务院关于奖金问题的通知","type":"title"},{"text":"陕西省抓革命促生产第一线指挥部、陕西军区：","type":"appellation"},{"text":"据陕西省一些部门来人、来电反映：建工部五局所属一些工程公司，在去年已停止实行物质剌激的奖金制度，但该局二公司等单位又要求恢复奖金制度，并于七月底八月初分别在宝鸡、咸阳、西安三市建设银行强行提款补发了今年一至七月份的全部奖金。他们这样做了之后，已经影响了其他单位和地区。","type":"paragraph"},{"text":"根据中共中央“关于反对经济主义的通知”精神，已经取消和停发了奖金的，不应再恢复和扩大，更不应该补发。为了避免扭转斗争的大方向，应向职工做好反对经济主义和“破私立公”的思想教育，动员职工将款退回，以防止上述问题的蔓延和产生新的经济主义风。","type":"paragraph"}],"comments":[],"origin":"根据中共中央办公厅、国务院秘书厅文化革命联合接待室编印《无产阶级文化大革命有关文件汇集 （第三集）》， 北京：1967年9月","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"陕西文革","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d7f4f00af4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
