year":1951,"month":8,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"前天一早去黄浦公园散步，看到一位教师捧着一本“毛泽东同志的青少年时代”在讲故事给坐在他周围的学生听，小朋友们都睁大眼睛，听得津津有味，到后来公园各处的大朋友也三三、二二围集拢来，兴趣勃勃地来听毛主席的故事，讲了多时，教师说:“时候不早，该上课去了。”小朋友们说:“再讲一会吧!宁愿等一会路上跑得快些。”立在外围的一个大朋友也插嘴说:“你们如果明天再来讲，我们还要来听!”充份显示了大家对自己的领袖底关心和热爱。"},{"type":"paragraph","text":"(龚明)"},{"type":"paragraph","text":"\u003cIMG alt=请插入2号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1951\\08\\5185060701.JPG\"\u003e"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"37b1979630"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
