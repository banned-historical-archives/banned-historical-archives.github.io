ical-archives/banned-historical-archives0/main/maoquanji45.pdf"],"article":{"title":"对《人民日报》为刊登苏共中央公开信写的编者按的批语和修改","alias":"","parts":[{"type":"paragraph","text":"对《人民日报》为刊登苏共中央公开信"},{"type":"paragraph","text":"写的编者按的批语和修改"},{"type":"paragraph","text":"（1963年7月19日）尾页有修改\"。"},{"type":"paragraph","text":"毛"},{"type":"paragraph","text":"十九日下午一时半[1]即本篇二，其中用宋体字排印的是毛泽东加写的文字。毛泽东全集第四十五卷"},{"type":"paragraph","text":"二"},{"type":"paragraph","text":"类似这样的情况川，通篇皆是，总共有七八十处的样子，举不胜举，我们将在以后的文章中提供材料，加以澄清。"},{"type":"paragraph","text":"[1]指编者按中所列举的苏共中央1963年7月14日给苏联各级党组织和全体共产党员的公开信中采用歪曲事实、颠倒是非的手法制造攻击中共领导人的事例。例如，关于核战争问题，说中共领导人不惜通过世界核战争，牺牲亿万人，来取得社会主义；关于对苏共二十大的评价问题，说中国领导人对它来了一个一百八十度的转弯；关于把思想意识分歧扩大到国家关系方面的问题，本来是由苏联造成的中苏经济贸易联系缩减，却反而责怪到中国方面。"}],"authors":["毛泽东"],"dates":[{"year":1963,"month":7,"day":19}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":468,"page_end":469},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"宣言"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a3ad255313"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
