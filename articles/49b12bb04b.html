" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoistlegacy.de-997","name":"全国总工会复关于伪军医的工龄计算问题","author":"全国总工会","internal":false,"official":false,"type":"unknown","files":[],"article":{"title":"全国总工会复关于伪军医的工龄计算问题","dates":[{"year":1964,"month":10,"day":9}],"is_range_date":false,"authors":["全国总工会","辽宁省总工会生活部"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"铁道部政治部审干办公室, 审干工作政策选编(三), 386","tags":[{"name":"工龄","type":"主题/事件"}],"parts":[{"type":"title","text":"全国总工会复关于伪军医的工龄计算问题"},{"type":"subtitle","text":"（一九六四年十月九日）"},{"type":"paragraph","text":"辽宁省总工会生活部："},{"type":"paragraph","text":"辽会生活字223号函收悉。关于过去解答伪军医的工龄计算问题，自劳动部、中华全国总工会以（64）中劳薪字第39号和（64）会通字第8号“关于担任反动职务以前的工作时间可否计算为工龄的问题的通知”发出后，即作了更正。即：在敌伪军队医院中担任尉官以上的医护人员，也应视为军官，从事该职务期间和以前工作期间，均不计算工龄。担任敌伪尉官以下的医护人员，从事该职务期间不计算工龄，从事该职务以前工作期间，可以计算为一般工龄。"},{"type":"paragraph","text":"(摘自〔64〕险字第490号文件)"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"49b12bb04b"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
