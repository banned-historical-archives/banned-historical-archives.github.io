":"劳动部工资局关于伪兵工厂职工工龄计算问题的复函","dates":[{"year":1964,"month":5,"day":19}],"is_range_date":false,"authors":["劳动部工资局","四川省劳动局"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"铁道部政治部审干办公室, 审干工作政策选编(三), 387","tags":[{"name":"工龄","type":"主题/事件"}],"parts":[{"type":"title","text":"劳动部工资局关于伪兵工厂职工工龄计算问题的复函"},{"type":"subtitle","text":"（一九六四年五月十九日）"},{"type":"paragraph","text":"四川省劳动局："},{"type":"paragraph","text":"关于职工曾在反动政府举办的兵工厂中工作过的，其这一段时间是否计算工龄的问题，我们正在研究。目前，对此问题，可以按照下述意见办理：在上述兵工厂中担任领导职务（指股长及股长以上职务）的，不论是否有军衔，其担任领导职务的时间，不得计算工龄。当普通职员工人的，不论是否有军衔，其当普通职员、工人的时间，可以计算为一般工龄，其中符合计算连续工龄的规定的，还可以计算为连续工龄。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cc3638d1cf"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
