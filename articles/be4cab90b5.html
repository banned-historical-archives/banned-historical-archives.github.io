tart":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"西哈努克和乔森潘瞻仰毛主席遗容并参观毛泽东、周恩来、刘少奇、朱德纪念室","authors":[],"parts":[{"type":"paragraph","text":"新华社12月26日讯 今天是毛泽东同志诞辰九十周年，民主柬埔寨主席诺罗敦·西哈努克亲王和副主席乔森潘由外交部顾问韩念龙陪同，上午前往毛主席纪念堂在毛主席坐像前献花篮，表示敬意和怀念。"},{"type":"paragraph","text":"西哈努克亲王和乔森潘副主席还瞻仰了毛泽东同志遗容，参观了毛泽东、周恩来、刘少奇、朱德纪念室。"},{"type":"paragraph","text":"（本栏照片均为新华社记者摄）"},{"type":"paragraph","text":"民柬联合政府总理宋双已于昨天离京回国。"},{"type":"paragraph","text":"杨得志、余秋里等同志参观毛泽东革命业绩纪念室。"},{"type":"paragraph","text":"康克清（前右二）等同志参观朱德革命业绩纪念室。"},{"type":"paragraph","text":"黄文欢同点参观刘少奇革命业绩纪念室。王光美同志为黄文欢同志作介绍。"},{"type":"paragraph","text":"首都各族群众参观毛泽东革命业绩纪念室。RW：西哈努克；瞻仰毛主席遗容乔森潘；瞻仰毛主席遗容"}],"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"朱德","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"be4cab90b5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
