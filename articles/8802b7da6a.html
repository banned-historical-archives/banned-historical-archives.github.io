script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji24","name":"毛泽东全集第24卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji24.pdf"],"article":{"title":"对破坏铁路的指示","alias":"","parts":[{"type":"paragraph","text":"对破坏铁路的指示！"},{"type":"paragraph","text":"（1948年7月10日）刘、陈、邓，粟、陈、唐，许、谭，韦、吉，华东局，宋任穷："},{"type":"paragraph","text":"已宥许谭提议，对陇海路郑州以东、津浦路充州或滕县以南，作彻底之破坏，使敌非二三个月不能通车，但主要铁桥可不破等语。我们认为，为妨碍敌人军运起见：（一）平汉路信阳以南、津浦路徐州以南，可作彻底破坏，包括主要铁桥之破坏在内。（二）平汉路郑信段?、陇海路郑徐段”，只作某些必要的破坏，例如在确山、信阳间一段及砀山、徐州间一段，加以较大破坏，使其不能通车，其余则不要破坏或只作小破坏。（三）陇海路徐海段?、津浦路"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军委起草的给中原野战军司令员刘伯承、第一副司令员陈毅和政治委员邓小平等的电报。"},{"type":"paragraph","text":"[2]粟、陈、唐，指粟裕、陈士、唐亮，当时分别任华东野战军代司令员兼代政治委员、参谋长和政治部主任。许、谭，指许世友、谭震林，当时分别任华东野战军山东兵团司令员和政治委员。韦、吉，指韦国清、吉洛（姬鹏飞），当时分别任华东野战军苏北兵团司令员和副政治委员。"},{"type":"paragraph","text":"[3]宋任穷，当时任中共中央豫皖苏分局书记。[4]津浦路，指天津至浦口的铁路，即今京沪线一段。[5]平汉路，指北平（今北京）至汉口的铁路，即今京广线一段。[6]郑信段，指郑州至信阳的铁路，即今京广线一段。[7]郑徐段，指郑州至徐州的铁路，即陇海线一段。[8]徐海段，指徐州至海州（今属江苏连云港市）的铁路，即陇海线一段。徐济段\"，则要严格保护，不可作任何破坏。（四）破坏方法，根据美蒋方面反映，他们最怕的是曲线式的破坏路基，即将铁路分作多数小段，不是掘毁其全部路基，而是掘毁路基之一方面；不是掘毁路基之同一方面，而是在各段上掘毁路基之不同方面。例如第一段掘毁左边留下右边，第二段掘毁右边留下左边，第三第五第七段照第一段掘法，第四第六第八段照第二段掘法。敌人修复之后，修复部分和留存部分硬度不同，车行危险，故为敌人所最怕。你们是否已经采用此种办法破路，如尚未采用，望注意采用之。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"午灰[1]徐济段，指徐州至济南的铁路，即今京沪线一段。"}],"authors":["毛泽东"],"dates":[{"year":1948,"month":7,"day":10}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":337,"page_end":338},"tags":[{"name":"毛泽东","type":"人物"},{"name":"宋任穷","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8802b7da6a"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
