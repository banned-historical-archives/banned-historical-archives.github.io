1976,"month":8,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"小将要大干"},{"type":"paragraph","text":"上海　郑成义火红的岁月，闯将的风采。师傅就要援外去，印花机呀谁来开？迈大步，象惊雷，走进新一代：“不经锤炼哪来钢？不斗风雨怎成材？誓和邓小平对着干，徒弟来请战！……批邓促大干，机台当靶台。电钮一按风雷动，好比炮轰走资派。印出江畔春苗秀，印出雪岭红梅开，印出杨柳遍城镇，印出云霞漫山寨。江山色不褪，布上花常开；胸有揽月志，长虹任剪裁……金鼓敲热浦江水，擂台搭在云天外！为给师傅壮行色，小将脸上放光彩！问师傅，美不美？师傅笑开怀：青出于蓝更可爱！呵，擂台飞架五洲桥，师傅大步去援外……"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"185def72d2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
