:1981,"month":3,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社北京三月二十四日电　中共中央副主席邓小平今天上午会见了坦桑尼亚总统朱利叶斯·克·尼雷尔及其主要随行人员。"},{"type":"paragraph","text":"在亲切友好的谈话中，邓小平说，中国和坦桑尼亚两国建交以来一直是很好的朋友。他向尼雷尔介绍了我国国内政治经济形势和实行的政策。"},{"type":"paragraph","text":"尼雷尔说，听了你介绍的情况，使我更加了解你们。我对你们所采取的政策很有信心。我们同中国一直保持着友好关系。"},{"type":"paragraph","text":"会见后，邓小平设宴招待尼雷尔总统和夫人等坦桑尼亚贵宾。"},{"type":"paragraph","text":"据新华社北京三月二十四日电　中共中央总书记胡耀邦今天下午会见了坦桑尼亚总统、坦桑尼亚革命党主席朱利叶斯·克·尼雷尔和他的主要随行人员。"},{"type":"paragraph","text":"会见时，胡耀邦说，中国和坦桑尼亚间的友谊是长久的，我们的心永远向着非洲和第三世界。他说，中国共产党广大党员和中国人民对尼雷尔总统是很熟悉和尊敬的。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"胡耀邦","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"120f7a66f5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
