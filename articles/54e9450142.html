" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoistlegacy.de-2492","name":"关于抓紧清退‘文革’中占用的工商联办公用房的通知","author":"中央统战部","internal":false,"official":false,"type":"unknown","files":[],"article":{"title":"关于抓紧清退‘文革’中占用的工商联办公用房的通知","dates":[{"year":1987,"month":8,"day":3}],"is_range_date":false,"authors":["中央统战部"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"中共河北省委统战部, 统一战线文件选编(第一册), 729-730","tags":[{"name":"工商联","type":"主题/事件"},{"name":"挤占","type":"主题/事件"},{"name":"解放军","type":"主题/事件"}],"parts":[{"type":"title","text":"关于抓紧清退“文革”中占用的工商联办公用房的通知"},{"type":"subtitle","text":"统通（87）56号"},{"type":"paragraph","text":"清退“文革”中占用的工商联办公用房，是落实党的统战政策的一个重要内容。早在1980年11月，中央办公厅在转发《北京市委关于处理机关部队挤占私房进一步落实私房政策的通知》中就指出：中央和中央军委曾一再强调必须认真落实关于发还十年浩劫中被挤占、没收的私房的政策。中央重申：党的政策必须落实，国家的宪法必须遵守。部队、机关、企事业等单位挤占的私房，要限期腾出，交还原房主；对民主党派、工商联被挤占的办公用房，尤须坚持早日归还，不得再拖。以后陆续发出的中办发〔1983〕61号、中办发〔1986〕6号等文件，都明确规定要尽快清退“文革”中挤占的工商联办公用房。几年来，各地做了大量工作，取得一定进展。但是，仍有不少地方工商联被挤占的办公用房尚未退还，一些已经恢复活动的难于开展工作，工商联各级组织负责人反映较大，政治影响很不好。"},{"type":"paragraph","text":"工商联是爱国统一战线的一个重要组成单位。它同各民主党派一样，是我国安定团结和进行社会主义两个文明建设的重要依靠力量，特别是在改革、开放、搞活，发展社会主义经济中，更发挥着不可代替的独特的积极作用。我们必须按照中央的既定政策，积极清退“文革”中挤占的工商联的办公用房，为他们开展工作创造必要的条件。"},{"type":"paragraph","text":"一、 工商联已经恢复活动的地方，原房尚在的，要立即腾退，并在腾退前适当进行维修。原房已经拆除或改建、腾退确有困难的，应用与原房面积、条件基本相等的房屋顶退；也可经过双方协商，给予适当经济补偿，由工商联另建新房。有关部门要对建房事宜提供方便条件。"},{"type":"paragraph","text":"二、 工商联计划恢复活动的地方，要按照上述第一条的办法，积极准备，及时处理。"},{"type":"paragraph","text":"三、 原来房屋属国家所有，分配给工商联作为办公之用，现在工商联要恢复活动的地方，应该积极设法为其解决办公地点。"},{"type":"paragraph","text":"请按上述原则意见，结合本地实际情况，采取有力措施，把这项工作切实抓紧抓好。"},{"type":"subtitle","text":"中央统战部"},{"type":"subtitle","text":"一九八七年八月三日"}],"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"54e9450142"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
