script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"关于资产阶级法权问题的讨论","authors":[],"dates":[{"year":1959,"month":2,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"关于资产阶级法权问题的讨论"},{"type":"paragraph","text":"编者按：1月3日发表侯明方同志的“资产阶级法权残余不是资产阶级法权”一文以后，截至27日止，共收到有关讨论这个问题的文章二百多篇。这些文章的论点归纳起来有以下六个方面："},{"type":"paragraph","text":"（一）不同意侯明方同志否认资产阶级法权残余和资产阶级法权是部分和整体关系的论点，肯定两者是部分和整体的关系。从这一观点出发，又有两种不同的意见：一种意见认为，两者并没有性质上的不同，都是资产阶级意志的体现；一种意见认为，两者有性质上的区别，前者是无产阶级利用来为社会主义建设服务的，后者则是为资产阶级的统治服务的。"},{"type":"paragraph","text":"（二）资产阶级法权残余包括的范围很广，不但包括一些旧的规章制度，而且包括思想意识和作风（人们通常称为资产阶级法权思想）。因此，侯明方同志把资产阶级法权残余笼统地说成是无产阶级意志的体现，是社会主义的上层建筑，显然是错误的，因为资产阶级法权思想任何时候都不能成为无产阶级意志的体现。"},{"type":"paragraph","text":"（三）资产阶级法权与资产阶级法权残余是整体和残余的关系，而所谓“残余”又指的是形式上与资产阶级法权相同而本质上不同的不平等。资产阶级法权的不平等是敌我矛盾，资产阶级法权残余的不平等则是人民内部矛盾。两者有本质的区别，但又有非本质的联系；既不是绝缘，又不是相等。因此，不同意侯明方同志把资产阶级法权残余说成是无产阶级的法权。"},{"type":"paragraph","text":"（四）在社会主义阶段，由于经济政治条件的限制，在无产阶级法权中保留的资产阶级法权残余，是无产阶级自觉地利用来为社会主义服务的，这类资产阶级法权残余已经不是资产阶级法权，而是无产阶级法权。因此，基本上同意侯明方文章的观点，但觉得侯明方的文章在某些地方说得不够确切，不够清楚，容易使人产生误解。"},{"type":"paragraph","text":"（五）认为按劳分配的性质基本上是无产阶级意志的体现，是无产阶级法权，只就“等价交换”这一点说，才保留了资产阶级法权残余。因此，不同意侯明方同志把按劳分配说成是资产阶级法权残余的观点。"},{"type":"paragraph","text":"（六）对资产阶级赎买的四马分肥、定息等政策，也有两种意见，一种意见认为这些只是无产阶级改造资产阶级的办法，因此不同意侯明方同志把它归入无产阶级法权的观点。一种意见认为就改造资产阶级这一方面来看，可以说是无产阶级法权；但就保留剥削来看，又是无产阶级对资产阶级的一种让步。"},{"type":"paragraph","text":"现在我们选择几篇论点比较鲜明、论述也比较充分的文章陆续发表，希望读者对这一问题继续进行讨论。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"人民内部矛盾","type":"主题/事件"},{"name":"限制资产阶级法权","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9105725df8"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
