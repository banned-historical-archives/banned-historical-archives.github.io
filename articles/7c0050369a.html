art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"总政举办毛主席著作讲座千余青年骨干踊跃参加学习","authors":[],"parts":[{"type":"paragraph","text":"本报26日讯 驻京部队各单位一千多名共青团基层骨干和青年积极分子，今天踊跃参加了毛主席著作讲座的学习。这个讲座是由总政治部组织部主办的。第一次讲座，由总政治部宣传部干部教育处处长文山主讲，他详细地讲解了学习毛主席著作的巨大意义和方法。后勤学院军需系团支部邓坤元介绍了他们在党支部支持下拟定学习毛主席著作计划的经过。"},{"type":"paragraph","text":"这个讲座利用业余时间和党团日活动时间举办，将继续讲解“关于正确处理人民内部矛盾的问题”、“矛盾论”、“实践论”、“纠正党内的错误思想”以及两条军事路线的斗争等问题。"}],"alias":""},"tags":[{"name":"人民内部矛盾","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7c0050369a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
