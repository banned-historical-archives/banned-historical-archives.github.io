tart":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"活学活用毛主席著作是毛泽东思想大学校的必修课","authors":[],"parts":[{"type":"paragraph","text":"编者按："},{"type":"paragraph","text":"毛泽东思想是革命的科学，是经过长期革命斗争考验的无产阶级的真理，是当代发展到最高水平的马克思列宁主义，是最现实的马克思列宁主义，是全党全军全国人民的统一的行动纲领。把我军办成毛泽东思想的大学校，就是要使全军同志都尽最大努力，把毛泽东思想真正学到手，真正掌握起来。"},{"type":"paragraph","text":"活学活用毛主席著作，是我军这个毛泽东思想大学校的最根本的必修课。我们无论是学政治，学军事，学文化，兼工，兼农，做群众工作，批判资产阶级，都要读毛主席的书，听毛主席的话，照毛主席的指示办事。我们时时、事事、处处都不能脱离毛泽东思想的轨道，都不能忘记促进人的思想革命化这个根本任务。"},{"type":"paragraph","text":"目前，全军正在热烈响应林彪同志的号召，抓认识，抓措施，抓落实，决心更好地学习毛主席著作，使我军真正成为毛泽东思想的大学校。我们抓认识，最重要的是提高对活学活用毛主席著作重大意义的认识。抓措施，最重要的是千方百计保证把毛主席著作学好用好。抓落实，最重要的是抓活学活用毛主席著作在各个方面的落实。我们一定要象林彪同志指示的那样，迅速地把我军活学活用毛主席著作的群众运动推向新的高潮，创造出新的局面，提高到新的水平。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a3e4e31d07"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
