script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"高举毛泽东思想胜利旗帜　高举总路线、大跃进、人民公社胜利旗帜在社会主义建设中作出更大贡献上海市三届三次人代会胜利闭幕号召全市人民更广泛、更深入、更持久地开展技术革命运动，掀起文化革命新高潮，进一步开展思想革命运动；一定要大办和办好城市人民公社。","authors":[],"dates":[{"year":1960,"month":5,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　历时八天的上海市第三届人民代表大会第三次会议昨天下午胜利闭幕。"},{"type":"paragraph","text":"大会一致通过决议，号召全市人民，继续高举毛泽东思想的胜利旗帜，高举总路线、大跃进、人民公社的胜利旗帜，坚持政治挂帅。更广泛、更深入、更持久地开展技术革新和技术革命运动，掀起文化革命的新高潮，进一步开展思想革命运动；要大办和办好城市人民公社，为保证完成和超额完成1960年国民经济计划和财政预算，实现今年更好更全面的继续跃进，为多快好省地把上海建设成为我国生产高级、精密、尖端产品和先进科学研究基地而奋勇前进!"},{"type":"paragraph","text":"昨天下午大会执行主席是:柯庆施、陈丕显、曹荻秋、刘述周、钟民、金仲华、盛丕华、陈望道、胡厥文。"},{"type":"paragraph","text":"大会一致通过了预算审查委员会主任委员胡厥文所作的关于上海市1959年决算和1960年预算草案的审查报告。胡厥文在报告中说，本市1959年预算的执行情况是良好的，是符合多快好省的要求的，是贯彻了“多收入、多支出、多建设；更多地收入、更多地支出、更多地建设”的方针的，是充分反映了国民经济既高速度又按比例发展的客观规律的。预算审查委员会对此表示满意。"},{"type":"paragraph","text":"关于1960年的预算草案，胡厥文在报告中说:这是一个积极的、充分可靠的预算，又是一个全面支持国民经济和科学文化继续大跃进的预算，是符合国家预算的要求和本市实际情况的。这个预算的完满实现，将为国家积累更多的资金，并促使本市更快地建设成为我国制造高级、精密、尖端产品的工业基地和科学研究中心之一，使上海在加速国家的社会主义建设事业的过程中，发挥更大的作用，作出更大的贡献。"},{"type":"paragraph","text":"大会还一致通过了议案审查委员会主任委员金仲华作的关于议案的审查报告。金仲华在议案审查报告中说:本次会议共收到议案177件，根据议案审查委员会审查结果，在177件议案中，拟交有关单位办理的有66件，研究办理的有85件，研究的有26件。议案审查委员会建议市人民委员会督促各有关部门，认真处理这些议案，凡是经过努力可以做到的，必须做好；暂时还不可能办到或者确实不能办到的，应向提案人说明情况。在处理过程中，应继续贯彻群众路线，并加强与提案人联系，把议案处理得更好，从而推动和改进各方面的工作。"},{"type":"paragraph","text":"大会闭幕前，会议还继续进行了大会讨论。大会期间，在会上发言和书面发言的代表、列席代表共330人。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"50dd3dd7ba"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
