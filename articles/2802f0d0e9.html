script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"《民主朝鲜》和印中友协德里分会  纪念毛泽东同志诞辰九十周年","authors":[],"dates":[{"year":1983,"month":12,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"《民主朝鲜》和印中友协德里分会"},{"type":"paragraph","text":"纪念毛泽东同志诞辰九十周年"},{"type":"paragraph","text":"新华社平壤12月27日电　朝鲜政府机关报《民主朝鲜》今天发表编辑部文章，纪念毛泽东同志诞生九十周年。"},{"type":"paragraph","text":"文章说：“毛泽东同志高举马克思列宁主义旗帜，为中国革命的胜利和国际工人阶级的革命事业进行了斗争，建树了宝贵的业绩。”"},{"type":"paragraph","text":"文章说，在毛泽东同志的领导下，中国党、军队和人民开展了英勇的斗争，终于推翻了帝国主义、封建主义和官僚资本主义的反动统治，建立了中华人民共和国，并在短期内把中国转变为具有坚实经济力量和强大国防力量的社会主义的新中国，开拓了民族繁荣的新时代。"},{"type":"paragraph","text":"文章指出，今天，中国人民，正在继承着毛泽东同志所开创的革命事业，为加速社会主义现代化建设，把中国建设成具有高度文明、高度民主的社会主义国家而进行着有力的斗争，并取得了巨大成就。"},{"type":"paragraph","text":"文章说，毛泽东同志是朝鲜人民的亲密朋友。他很早就同朝鲜人民的伟大领袖金日成同志建立了深厚的友情，为加强和发展朝中友谊奠定了基础。他把朝鲜人民的革命斗争视为中国人民自己的斗争，教导并领导中国人民积极支持和援助朝鲜人民的正义事业。"},{"type":"paragraph","text":"文章说，由金日成同志和毛泽东同志亲自培育的朝中友谊之花今天开放得更加绚丽多彩。朝鲜人民今后仍将同兄弟的中国人民紧紧地携起手来，并肩前进。"},{"type":"paragraph","text":"新华社新德里12月27日电　印度—中国友好协会德里分会26日晚举行纪念会，纪念毛泽东主席诞辰九十周年。"},{"type":"paragraph","text":"出席纪念会的有印中友协德里分会主席拉格帕特莱和印中友协秘书长马利克等人。"},{"type":"paragraph","text":"拉格帕特莱在讲话中回顾了毛泽东主席对中国人民所作出的贡献。他说，毛泽东将马克思主义的普遍真理同中国的实际相结合，领导中国人民取得了革命的胜利。他还谈到中国所取得的巨大成就，并说他在几次访华期间亲眼目睹了这些成就。"},{"type":"paragraph","text":"在会上发言的其他人赞扬毛泽东主席在革命斗争中的功绩，并谈到解放以后中国人民所取得的进步。"},{"type":"paragraph","text":"中国驻印度大使馆官员也出席了会议，并在会上讲了话。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2802f0d0e9"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
