":[{"year":1981,"month":5,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"密特朗当选法国总统"},{"type":"paragraph","text":"叶剑英赵紫阳致电祝贺"},{"type":"paragraph","text":"据新华社巴黎5月10日电　在10日举行的法国总统选举第二轮投票中，社会党领袖弗朗索瓦·密特朗当选为法兰西共和国总统。"},{"type":"paragraph","text":"据法国内政部22时35分（当地时间）公布的初步统计，密特朗得12，447，713票，占选票的52％；任期即将届满的总统吉斯卡尔·德斯坦得11，489，116票，占选票的48％。13．5％的选民弃权。"},{"type":"paragraph","text":"内政部长克里斯蒂昂·博内10日22时55分（当地时间）宣布，密特朗当选为共和国总统。他说，这不包括某些海外省和海外领地的投票结果，但是这些结果不会明显改变密特朗与吉斯卡尔·德斯坦所得选票的百分比。"},{"type":"paragraph","text":"这次法国总统选举，竞争十分激烈。4月26日第一轮投票时，有十名候选人参加竞选。其中吉斯卡尔·德斯坦和密特朗得票最多。他们分别得到28．31％和25．84％的选票。按照法国现行宪法规定，他们两人在第二轮投票中由选民进行最后选择。"},{"type":"paragraph","text":"新华社北京5月11日电　中华人民共和国全国人民代表大会常务委员会委员长叶剑英和中华人民共和国国务院总理赵紫阳5月11日打电报给弗朗索瓦·密特朗，热烈祝贺他当选为法兰西共和国总统。贺电全文如下：巴黎弗朗索瓦·密特朗先生："},{"type":"paragraph","text":"在你当选法兰西共和国总统之际，我们谨向你表示热烈祝贺。"},{"type":"paragraph","text":"祝你在任职期间取得成就。"},{"type":"paragraph","text":"祝中法两国业已存在的友好合作关系及两国人民之间的深厚友谊日益增进。"},{"type":"paragraph","text":"中华人民共和国全国人民"},{"type":"paragraph","text":"代表大会常务委员会委员长  叶剑英"},{"type":"paragraph","text":"中华人民共和国国务院总理  赵紫阳"},{"type":"paragraph","text":"1981年5月11日于北京"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"赵紫阳","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0ca05e62ba"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
