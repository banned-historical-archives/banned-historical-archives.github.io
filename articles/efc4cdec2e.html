ical-archives/banned-historical-archives0/main/maoquanji29.pdf"],"article":{"title":"询问向昌都进军的几个问题","alias":"","parts":[{"type":"paragraph","text":"询问向昌都进军的几个问题!"},{"type":"paragraph","text":"（1950年8月18日）西南局："},{"type":"paragraph","text":"你们关于向昌都进军各电均悉。今年如能进到昌都当然是很好的，问题是：（一）甘孜到昌都一段很长道路是否能随军队攻进速度修筑通车；（二）昌都能否修建机场及是否适于空投；（三）一个师进攻昌都是否够用，藏军似有相当强的战斗力，必须准备打几个硬仗，这方面你们有足够估计否。我们对于以上几点尚不清楚，请分析电告为盼。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"八月十八日[1]这是毛泽东给中共中央西南局的电报。"}],"authors":["毛泽东"],"dates":[{"year":1950,"month":8,"day":18}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":88,"page_end":88},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"efc4cdec2e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
