rt":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"武汉制成彩色录像磁带","authors":[],"parts":[{"type":"paragraph","text":"彩色录像磁带用途非常广泛，对发展电视事业特别有重要意义。它的形状类似录音磁带，比录音磁带宽，把它装在录像机上，能把形象和声音同时高质量地录下来，然后，象使用录音磁带那样播放就可以了。过去，电视台从剧场转播或者请剧团到电视台来演出的文艺节目，播出后就无法保存下来；下次需要播出同样的节目时，还要再到剧场转播或者请剧团来演。现在有了彩色录像磁带，就可以把演出的节目录下来随时播放，并且可以多次使用，长期保存，这就为保留传统文艺节目和重要资料提供了有利条件。使用彩色录像磁带也不象使用电视胶片拍摄那样，需要再经过冲底片、洗样片、编剪、套底片、配音、拷贝等工序，因而录制节目迅速及时。它还象录音磁带那样，可以抹去原有内容，录上新的内容。武汉实验工厂试制成功的彩色录像磁带，在电视屏幕上反映的画面清晰，色彩鲜艳，层次清楚，有立体感，质量基本达到使用要求。最近，这个厂已开始投入小批量生产。"},{"type":"paragraph","text":"彩色录像磁带还能应用于工业、农业，文教卫生和国防建设等方面。它的诞生，是对邓小平散布的“今不如昔”反动谬论的有力批判，是无产阶级文化大革命、批林批孔和反击右倾翻案风斗争的丰硕成果。"}],"alias":""},"tags":[{"name":"批林批孔","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cc801a409e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
