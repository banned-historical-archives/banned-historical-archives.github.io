ical-archives/banned-historical-archives0/main/maoquanji31.pdf"],"article":{"title":"转发中南军区关于从民主检查转入清查贪污的指示的批语","alias":"","parts":[{"type":"paragraph","text":"转发华东军区关于打虎部署的报告的批语"},{"type":"paragraph","text":"（1952年1月27日）各大军区、志愿军，并告各中央局："},{"type":"paragraph","text":"华东军区的决心和部署均很好，请你们参酌办理。二月份全军发动打大老虎，至少应打二千只至三千只。二月份不整编，全力做三反。凡未检举坦白者，仍进行检查坦自，发现大批中小贪污，但中心应转入打老虎。这种任务的转变，有的可以在二月一日转，有的可以在二月五日或二月十日或二月十五日转，但至迟不得迟于二月十五日，由你们掌握。争取在二月二十八日全军老虎打完，结束三反。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一月二十七日"},{"type":"paragraph","text":"[1]中共华东军区委员会1952年1月26日给毛泽东并华东局的报告中说，华东部队2月初转入正式打老虎，预计用10天到15天完成任务，争取打300只左右大老虎。"}],"authors":["毛泽东"],"dates":[{"year":1952,"month":1,"day":27}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":307,"page_end":307},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fec6a0b2ed"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
