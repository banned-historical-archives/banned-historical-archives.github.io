注意事项的指示","authors":[],"dates":[{"year":1950,"month":9,"day":8}],"is_range_date":false,"parts":[{"text":"中共中央转发西南局关于减租运动中应注意事项的指示","type":"title"},{"text":"西北局、中南局、华东局、华南分局：","type":"appellation"},{"text":"兹将西南局关于减租运动中应注意事项的指示发给你（们）参考。","type":"paragraph"},{"text":" 中  央九月八日","type":"paragraph"},{"text":"西南局九月二日致各省区党委并报中央电如下：","type":"paragraph"},{"text":"清匪、反霸、减租、退押是一场系统的激烈的斗争，这一斗争的胜利，必须依靠贫农、雇农，团结中农，中立富农。所以，如何整顿农会组织，应成为各地当前的一个重要工作。而在农会的整顿工作中，首先还是调整领导成分，如农会领导成分不纯，就谈不到斗争的胜利。在减租、退押中，明减暗不减、明退暗不退等现象就成为不可避免。如农会的领导成分纯洁了，加上党的坚强的领导，斗争就可以有秩序地进行，即使会员中成分一时不那样纯，关系也不很大，因为目前起决定作用的不是一般会员问题，而是农会的领导问题。同时，所有会员也不是一下能弄清楚的，因此，在整顿农会中，首先应以整顿农会领导成分为重点，在进行整顿时，也要注意分别先后，先集中力量整顿准备首先进行减租运动地区的农会，然后再推及其他地区。在首先整顿的地区，还可以集中暂时不搞减租运动地区的干部，或抽调一些其他的干部，一面可以集中力量训练干部，积累经验，以便转移力量推广到其他地区。所以，各地必须切实掌握重点突破，推广一般的办法，不要平均使用力量，普遍地进行。在进行中要注意检查，随时将农会整理情况报告我们，以便交流经验。其次，在斗争中对人民法庭必须很好地掌握运用，这是一个十分有力的武器，但问题的关键也在于领导骨干是否纯洁，是否坚强。因此，各地对于人民法庭的领导骨干必须认真地选配县委、县府负责干部去担任，司法机关的工作人员也应放到人民法庭中去从实际斗争中锻炼，这里望切实参考华东局关于人民法庭指示的意见。","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b92e16e371"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
