ical-archives/banned-historical-archives0/main/maoquanji46.pdf"],"article":{"title":"为登载两篇文艺理论文章写的编者按","alias":"","parts":[{"type":"paragraph","text":"为登载两篇文艺理论文章写的编者按！"},{"type":"paragraph","text":"（1964年7月7日）"},{"type":"paragraph","text":"这两篇文章，可以一读。一篇是姚文元驳周谷城的，另一篇是支持周谷城反驳姚文元的。都是涉及文艺理论问题的。文艺工作者应当懂得一点文艺理论，否则会迷失放（方）向。这两篇批判文章不难读。究竟谁的论点较为正确，由读者自己考虑。"},{"type":"paragraph","text":"编者"},{"type":"paragraph","text":"一九六四年七月七日[1]这个编者按后来没有发表。"},{"type":"paragraph","text":"[2]指姚文元写的《评周谷城先生的矛盾观》（载1964年5月10日《光明日报》）和金为民、李云初写的《关于时代精神的几点疑问》（载1964年7月7日《光明日报》）。"},{"type":"paragraph","text":"[3]姚文元，当时任上海解放日报社编委兼文艺部主任。"},{"type":"paragraph","text":"[4]周谷城，当时是复旦大学教授。他写的文章的题目为《统一整体与分别反映》（载1963年11月7日《光明日报》）。"}],"authors":["毛泽东"],"dates":[{"year":1964,"month":7,"day":7}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":473,"page_end":473},"tags":[{"name":"姚文元","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"daceef0d6b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
