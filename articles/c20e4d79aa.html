":1964,"month":5,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛泽东主席接见阿布德主席"},{"type":"paragraph","text":"新华社十八日讯　毛泽东主席今天下午接见苏丹共和国武装部队最高委员会主席、部长会议主席易卜拉欣·阿布德将军，同他进行了亲切友好的谈话。"},{"type":"paragraph","text":"被接见的还有阿布德主席的随行人员：教育部长穆罕默德·塔拉特·法里德少将，内阁事务国务部长兼苏丹武装部队副总司令哈桑·贝希尔·纳斯尔少将，工商业和供应部长马格布勒·阿明·哈格少将，外交部长兼矿产资源部长艾哈迈德·赫尔，中央会议代表艾哈迈德·阿瓦德·卡里姆·阿布·辛、菲尔蒙·马乔克、萨德·马哈茂德·穆萨·马迪博，苏丹驻巴基斯坦大使法赫尔·埃丁·穆罕默德，中央会议代表马蒙·马尔迪，共和国宫典礼长艾哈迈德·哈桑·达乌，卫士长穆斯塔法·艾哈迈德·卡马利准将，军医司令官马哈茂德·侯赛因准将，主席办公室秘书法提赫·穆罕默德·布什拉中校，苏丹航空公司总经理阿卜杜勒·巴基等。"},{"type":"paragraph","text":"接见时在座的，有刘少奇主席、周恩来总理、彭真副委员长、陈毅副总理，以及叶季壮、方毅、曾涌泉、谷小波等。（附图片）"},{"type":"paragraph","text":"下图：毛主席接见阿布德主席（前左六）时合影"},{"type":"paragraph","text":"新华社记者　孟庆彪摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c20e4d79aa"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
