tart":5,"page_end":5,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"紧跟伟大领袖毛主席 坚决走社会主义道路","authors":["海军首次学习毛主席著作积极分子代表大会代表/战斗英雄麦贤得"],"parts":[{"type":"paragraph","text":"十一月二十三日《人民日报》、《红旗》杂志、《解放军报》编辑部的重要文章《中国农村两条道路的斗争》好得很。"},{"type":"paragraph","text":"这篇文章是又一枚投向中国赫鲁晓夫的重磅炸弹。文章通篇闪耀着伟大毛泽东思想的光辉，透彻地阐述了建国十八年来，伟大领袖毛主席对农村社会主义革命所制定的一系列英明决策。全国亿万贫下中农在伟大舵手毛主席英明领导下，取得了社会主义革命和社会主义建设的一个又一个的伟大胜利。"},{"type":"paragraph","text":"文章一针见血地揭露了中国赫鲁晓夫十八年来反对毛主席的无产阶级革命路线，妄图实现资本主义复辟的滔天大罪。"},{"type":"paragraph","text":"文章明确地告诉我们农村两条道路斗争的长期性、复杂性、尖锐性；指出当前农村无产阶级文化大革命的重大战斗任务，就是深入彻底地批判中国赫鲁晓夫在农村方面所推行的反革命修正主义路线。"},{"type":"paragraph","text":"我们伟大领袖毛主席在农村社会主义革命和建设中制定的方针政策，代表着全国广大贫下中农的最大利益。毛主席和贫下中农心连心，贫下中农永远忠于毛主席。"},{"type":"paragraph","text":"党内最大的走资本主义道路的当权派中国的赫鲁晓夫却狗胆包天，疯狂地反对毛主席，反对毛主席的无产阶级革命路线。他拚命地鼓吹发展富农经济；恶毒地反对农业合作化；极力推行“三自一包”；在农村社会主义教育运动中大搞形“左”实右的资产阶级反动路线；拚命打击农民的社会主义积极性，大搞物质刺激；妄图在中国复辟资本主义，叫我们走回头路，吃二遍苦。"},{"type":"paragraph","text":"中国赫鲁晓夫胡叫什么“剥削是救人的”“要欢迎剥削”“剥削有功”等等谬论，这是彻头彻尾的资产阶级的吃人哲学。我们广大贫下中农受剥削的苦最深，最懂得什么是剥削，剥削就是亿万人民的灾难。"},{"type":"paragraph","text":"我家祖孙三代受剥削，我的祖父为有钱人行船走海，受尽千辛万苦，干了一辈子，到头来竟惨遭饿死。父母出外逃荒，给人家做工，累得死去活来，还填不饱肚子。伯父一家五口被饿死三口，过去的阶级苦、血泪仇，我们永远也不会忘记。"},{"type":"paragraph","text":"中国赫鲁晓夫要把我们重新踩在脚下，让我们过牛马的生活，我们坚决不答应。"},{"type":"paragraph","text":"伟大领袖毛主席说：“我们现在思想战线上的一个重要任务，就是要开展对于修正主义的批判。”我们一定要遵照毛主席的教导，按照伟大统帅毛主席的战略部署，把中国赫鲁晓夫在农村方面的反革命修正主义路线从政治上、思想上、理论上批深批透，批倒批臭，叫他永世不得翻身。我们要念念不忘阶级斗争，念念不忘无产阶级专政，紧跟伟大领袖毛主席，坚决走社会主义道路。"}],"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a78549c702"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
