tart":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"黎笋一伙歪曲真相旨在破坏越中友谊","authors":[],"parts":[{"type":"paragraph","text":"新华社十一月二十三日讯 越南国会常务委员会副主席黄文欢十一月二十二日下午在北京指出，黎笋一伙在歪曲三十年来越中关系的白皮书中捏造了许多事情，“是为了给中国抹黑，是为了破坏越中友谊。”"},{"type":"paragraph","text":"他在向中国的中央电视台记者发表谈话时说：“这份白皮书我已经仔细读过了。我认为，这是一个大杂烩。其中有的材料完全是伪造；有的是篡改和歪曲事实；有的是从外国书刊中摘引，但任意断章取义。只要稍稍有政治头脑的人，一读这些材料，就会看出，这是一篇矛盾百出、逻辑混乱、编造得十分拙劣的东西。这份白皮书抛出之后，我注意到国际舆论对它的反应十分冷淡，甚至连那些同黎笋一伙一鼻孔出气的人，也感到啼笑皆非，难以随声附和。”"},{"type":"paragraph","text":"黄文欢指出，黎笋一伙这样做，“完全违背了越南人民的利益，完全违背了胡主席的国际团结路线和睦邻路线。十分清楚，通过这份白皮书，我们看到，黎笋是一个不诚实、不正派的人，是一个背叛了革命道路的人，是一个背叛了民族权利、为反动的国际反华势力的全球战略利益积极服务的人。”"},{"type":"paragraph","text":"黄文欢说，他作为熟知三十年来越中关系全部过程的人，写了一篇文章，说明越中关系的真相。"},{"type":"paragraph","text":"这篇用越南文写成的文章，长约一万四千字，有关部门正在翻译，不久将要发表。"},{"type":"paragraph","text":"黄文欢是由于反对越南黎笋一伙的反华政策，才毅然决然地辗转来到中国的，来中国后的第二天，就受到华国锋、叶剑英、邓小平、李先念等中央领导人的会见，八月九日，黄文欢在北京举行了记者招待会，并散发了《致越南同胞的一封信》。"}],"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"990de5e985"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
