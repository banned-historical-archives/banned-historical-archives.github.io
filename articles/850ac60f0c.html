script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"明水县革委会成员不断增强无产阶级党性克服资产阶级派性  树立全局观点　坚持集体领导　为革命掌好权","authors":[],"dates":[{"year":1969,"month":9,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"明水县革委会成员不断增强无产阶级党性克服资产阶级派性"},{"type":"paragraph","text":"树立全局观点　坚持集体领导　为革命掌好权"},{"type":"paragraph","text":"据新华社哈尔滨三日电　黑龙江省明水县革委会成员用毛主席关于无产阶级专政下继续革命的伟大理论武装头脑，不断增强无产阶级党性，克服资产阶级派性，为无产阶级掌好权、用好权。他们的体会是：要树立无产阶级党性必须树立全局观点，开展批评和自我批评，坚持集体领导的原则。"},{"type":"paragraph","text":"这个县革委会成立初期，有的成员处理事务，解决问题，常常以是否有利于我这一派的利益为出发点，有利于我这一派的事，就拥护，就支持；不利于我这一派的事就反对。革委会发现了这种思想倾向，及时通过开门整风的方法，把工人、贫下中农和革命群众组织的代表请到革委会里来，同革委会成员一起反复学习毛主席关于“只注意自己小团体的利益，不注意整体的利益，表面上不是为个人，实际上包含了极狭隘的个人主义，同样地具有很大的销蚀作用和离心作用”的教导，帮助革委会成员按照毛主席的教导对照、检查自己的思想，使大家深刻认识到，带着资产阶级派性掌权，就不能为无产阶级掌好权、用好权。只有自觉地顾全大局，才能紧跟毛主席的伟大战略部署，认真地、不折不扣地落实毛主席的一系列最新指示和各项无产阶级政策。"},{"type":"paragraph","text":"通过开门整风，革委会成员提高了认识，树立了全局观点。一次县革委会讨论让一个干部到农村一个知识青年点去担任指导员工作，有一位常委觉得这个干部在文化大革命中是同自己并肩战斗过的战友，不愿意把他调到农村去，就提出反对的意见。通过开门整风，这位常委觉悟提高了，认识到原来自己的想法是错误的，是不符合整体利益的，就愉快地同意这个干部到农村去工作。通过这件事，使革委会成员认识到，树立全局观点是无产阶级党性的重要标志，只有树立起全局观点，才能站得高，看得远，识整体，顾大局，为无产阶级掌好权、用好权。"},{"type":"paragraph","text":"县革委会成立初期，有的同志对集体领导的重要性认识不足，常常以个人意见第一，以个人的意志代替集体的意志。去年，县革委会一位常委没和其他同志研究，就擅自批准借给一个干部公款四百元。革委会觉得这个问题不单纯是几百元钱的问题，而是集体领导观念不强的表现。于是革委会组织全体成员认真学习毛主席《关于纠正党内的错误思想》等光辉著作，使大家深刻认识到：坚持党的集体领导，是完成革命任务的重要保证。没有集体领导的原则，就不能为无产阶级掌好权、用好权。"},{"type":"paragraph","text":"认识提高以后，革委会全体成员都自觉地用无产阶级党性约束自己，自觉维护党的集体领导，一些重大问题和原则性的问题都由革委会集体研究决定。一成决定，每个成员都坚决执行。这样，革委会真正实现了一元化领导，代表了群众意愿，得到了广大群众的赞扬。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"派性","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"850ac60f0c"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
