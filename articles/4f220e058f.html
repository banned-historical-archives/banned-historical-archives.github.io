art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"推荐《毛泽东建党学说史》","authors":["谭乃彰"],"parts":[{"type":"paragraph","text":"江西人民出版社最近出版的张蔚萍副教授和张列军同志合著的《毛泽东建党学说史》，是他们继《马列主义党的学说史》之后，又一部系统地论述毛泽东建党学说的专著。该书分上下两册，约70万字，内容丰富，逻辑严密，文字简明，值得党史、党建理论研究工作者和教学工作者一读，也值得部队干部一读。它也是当前坚持四项基本原则和反对资产阶级自由化的一个重要武器。"},{"type":"paragraph","text":"这本书，有以下几个特点：第一，以史为主线，史论结合。每章最后一节对毛泽东提出的建党原理及其形成的历史原因进行系统的归纳和理论概括；第二，以毛泽东为主体，写出了全党的集体智慧。其中突出地介绍了李大钊、蔡和森、周恩来、刘少奇、朱德、任弼时、陈云、邓小平等同志对毛泽东建党学说产生、形成和发展的贡献；第三，从历史实际情况出发，把党的建设经验和建党理论放在特定的历史条件下加以论述，有严谨的科学性；第四，注意历史与现实的结合，用大量篇幅论述新时期加强党的建设的经验和新课题，从10个方面阐发了我党对毛泽东建党学说的丰富和发展，使人读后既有历史感，又有现实感。总之，这是一本加强党的建设的好书。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4f220e058f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
