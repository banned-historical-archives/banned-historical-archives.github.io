<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"华北局关于通县地委对顺义新区土改中所犯乱扣乱打和“扫地出门”的错误检查的通报","authors":[],"dates":[{"year":1949,"month":11,"day":11}],"is_range_date":false,"parts":[{"text":"华北局关于通县地委对顺义新区土改中所犯乱扣乱打和“扫地出门”的错误检查的通报","type":"title"},{"text":"兹将通县地委对顺义新区土改工作中所犯乱扣乱打与对地、富扫地出门的错误的检讨，通报如下：","type":"paragraph"},{"text":"八月间，顺义新区在土改政策上所犯的乱扣乱打与对地、富扫地出门的错误，虽只一两个村子，为时亦很短，但仍是严重的原则错误。我们事先未检查未发现，犯了严重的官僚主义的错误；见到县委综合报告，认为问题虽严重，但事情已过，县委也进行了纠正，故既未交县委再进行检讨，促使他们认识其严重性，并教育全党，也未能从地委领导上加以检查，并且未及时报告省委并华北局，表示了我们原则性很差，嗅觉不灵。自从接到华北局电话和省委转来华北局十月二十二日的电示，才引起重视。这对我们的教育确实很深刻的，尤其是对今冬明春在我区之新区土改与结束土改，防止重复发生类似错误之意义很大。","type":"paragraph"},{"text":"发生此严重错误的主要原因是：对过去土改中的严重“左”倾错误，给予党和人民的危害认识不够深刻，对上级党之历次指示反复钻研体会是不足的，和对全党全体干部切实认真贯彻也是不够的，因而党员干部思想中尚存在着“左”的情绪。其次是领导上对新区政策交待得不明确不具体，情况分析不够，力量估计不足，不是有多少人办多少事，而是急性病，件件都作（顺义县委当时三个人，领导不健全，下边干部更弱，又未全部训练），布置后未检查，执行中也未检查，地委有人曾两次去顺义，也未过问，这种官僚主义作风是非常严重的，给予党给予工作的损失是很大的。同时自地委到区委都是严重的存在着无组织无纪律的现象。发生问题，事先不请示，工作作不了不及时报告，因而使上级不能及时发现错误，及时纠正。","type":"paragraph"},{"text":"我们完全同意华北局的批评与指示。为了彻底纠正我们的错误与保证正确地完成新区土改与老区结束土改，除地委检讨与坚决纠正外，把华北局的指示在十一月十日地委召开的干部会上传达，并翻覆地传达华北局新区土改政策与省委之指示；对参加新区土改与老区结束土改之干部，通过各种会议普遍短训一次，并在群众中普遍切实宣传贯彻政策；土改进行时，加强上下级联系，建立严格汇报制度与深入检查制度，谨慎切实地完成土改任务。","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5bdaa02732"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
