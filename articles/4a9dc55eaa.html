script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji28","name":"毛泽东全集第28卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji28.pdf"],"article":{"title":"中共中央关于实施军队参加生产建设工作指示的通知","alias":"","parts":[{"type":"paragraph","text":"中共中央关于实施军队参加生产建设工作指示的通知！"},{"type":"paragraph","text":"（1949年12月5日）各中央局、分局，各前委，各军区："},{"type":"paragraph","text":"人民革命军事委员会本日发表关于一九五○年军队参加生产建设工作的指示\"。你们看到后应即加以研究，就自己管辖范围内使一切可能参加生产建设工作的部队和机关积极地适当地实施起来，注意避免过去军队参加生产建设时所犯过的错误，区分前线和后方，区分具备了参加生产的条件的部队和机关与目前尚未具备此项条件的部队和机关，考虑地方条件和资金条件，适当地解决这一问题。这是一个重要问题。这个问题解决得好，将使部队和机关的生活获得改善，使国家节省一部分开支，并将在全国人民中产生良好的影响。"},{"type":"paragraph","text":"中央"},{"type":"paragraph","text":"十二月五日"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央起草的给各中央局、中央分局、中国人民解放军各野战军前委和各军区的通知。"},{"type":"paragraph","text":"[2]即《一九五○年军队参加生产建设工作的指示》。"}],"authors":["毛泽东"],"dates":[{"year":1949,"month":12,"day":5}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":84,"page_end":84},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4a9dc55eaa"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
