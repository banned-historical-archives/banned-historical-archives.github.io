uthors":[],"dates":[{"year":1967,"month":1,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"法国革命青年大造修正主义的反"},{"type":"paragraph","text":"成立共青联（马列主义）  出版《红卫兵》月刊"},{"type":"paragraph","text":"新华社巴黎四日电　法国革命青年宣布成立法国共产主义青年联盟（马克思列宁主义）。"},{"type":"paragraph","text":"他们在去年十二月中旬举行了成立联盟的代表大会。会上谴责现代修正主义，谴责法国共产党修正主义领导人和他们所控制的法国共产主义学生联盟领导人，指出他们已经叛变了马克思列宁主义和劳动人民。代表大会还宣布坚决支持越南人民抗美救国斗争和中国的无产阶级文化大革命。"},{"type":"paragraph","text":"代表大会选出了联盟的领导机构，并且决定出版刊物《红卫兵》（月刊）和《马克思列宁主义者手册》。"},{"type":"paragraph","text":"法国共产主义学生联盟的大批盟员和干部，成批地、集体地退出这个联盟，而参加了法国共产主义青年联盟（马克思列宁主义）。在巴黎地区，从去年十一月底到十二月上旬，不到两个星期，退出法国共产主义学生联盟的约有四百五十人，即这个联盟在巴黎地区的绝大多数盟员或几乎全部活动分子都已经退出联盟。"},{"type":"paragraph","text":"在法国北部城市南锡，也有大批法国共产主义学生联盟盟员退出联盟。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3fd6e400f1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
