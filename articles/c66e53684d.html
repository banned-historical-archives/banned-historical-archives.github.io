art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"领袖的博大胸怀——观电影《毛泽东和他的儿子》","authors":["钟勤"],"parts":[{"type":"paragraph","text":"伴随着无数观众的热泪，一个具有革命领袖博大胸怀和巨大人格力量的毛泽东形象，矗立在人们心头。这是影片《毛泽东和他的儿子》所产生的强烈的艺术感染力。这部影片与其他重大历史事件为背景塑造毛泽东丰功伟绩的影片不同，它是以毛泽东的个人生活为着眼点，以伟大领袖送子到朝鲜战场为中心事件，从一个独特的角度展示了毛泽东丰富的内心世界和博大胸襟，从而更容易拨动观众的情感之弦。"},{"type":"paragraph","text":"岸英入朝参战时，毛泽东亲手送几件自己穿过的旧衣给他，表达了伟大领袖和自己子女间的骨肉深情。岸英牺牲的噩耗传来，他极度悲痛，欲哭无泪，彻夜难眠，甚至有挥斥卫士的失态。作为父亲，他还要强忍丧子的悲痛，去安慰思夫情切的年轻儿媳。通过这些，使人看到的是一个爱子情深的父辈形象。"},{"type":"paragraph","text":"但是毛泽东毕竟是毛泽东，他除了具有常人所有的儿女情外，又蕴含着超乎常人的精神境界。岸英从苏联留学回来，毛泽东要求他去中国的“劳动大学”锻炼；当祖国危急时刻，他把爱子送上随时都可能牺牲的战场。彭德怀极力劝阻时，毛泽东以坚毅的态度说：毛泽东的儿子不能特殊，要带这个头！寥寥数语，展现了作为领袖的毛泽东把爱子之情与爱国之情融为一体的不同寻常的伟大胸怀。"},{"type":"paragraph","text":"影片在表现毛泽东痛失爱子后的深切悲痛的同时，也表现了他在处理这件事上的崇高人格。如对彭总“负荆请罪”时的宽解和安慰，对岸英遗体的处理的全局眼光等。毛泽东在视察途中无意中遇见一位志愿军烈士的孤女和老母，那位烈士母亲处境艰难而意志坚强的精神，深深感染了毛泽东，他作为父亲的悲痛在这里得到了升华，领袖和人民的心深深交融在一起。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c66e53684d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
