<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"从政治上、思想上过社会主义关","authors":["黄鼎臣"],"dates":[{"year":1957,"month":9,"day":7}],"is_range_date":false,"parts":[{"text":"从政治上、思想上过社会主义关","type":"title"},{"text":"黄鼎臣","type":"authors"},{"text":"中国致公党中央常务委员黄鼎臣:１９５６年中国共产党根据社会主义革命基本完成的新形势提出同民主党派长期共存、互相监督的方针，各民主党派绝大部分成员对这一方针是热烈拥护的。可是，我们必须认识，任何一个政党的存在，都是为了服务于一定的经济基础。随着社会主义革命的基本完成，中国社会的经济基础就是单一的社会主义经济。民主党派要和社会主义建设的领导者共产党长期共存，其条件只能是适应这个时代的需要，真诚地为社会主义服务。同时，我们还必须认识，我们民主党派的阶级基础是民族资产阶级及其知识分子。因此要使我们民主党派能够成为真正为社会主义服务的政治团体，还必须大力进行根本的自我改造，使我们和全国人民一起从思想上政治上过社会主义关。但是在今年５月，中国共产党展开整风运动后，资产阶级右派分子就向共产党向社会主义疯狂进攻，企图取消共产党的领导和把我国拖向资本主义的道路。这些右派分子，很多是民主党派的领导人和成员。同时也有很大一部分的民主党派成员，由于立场观点没有很好的转变，认识模糊，在社会主义和资本主义两条道路的严重斗争面前竟袖手旁观，甚至有些对右派分子还有不同程度的同情和支持。这种严重的情况，不仅说明了我们民主党派必须进行根本的改造，而且提出了我们必须首先解决的任务，这就是要在中国共产党领导下坚决投入反右派的斗争，彻底地揭发和批判隐藏在我们民主党派内部的右派分子的言行和民主党派中存在着的右倾思想，使我们能够成为名副其实的为社会主义服务的政治团体。","type":"paragraph"},{"text":"我们民主党派的阶级基础既然是民族资产阶级及其知识分子，这就决定了我们民主党派内一定会有不少右派分子。因此，民主党派有些地方组织还未揭发出右派分子，并不能说没有右派分子存在，只不过是右派分子还未暴露。就我们致公党来说，也正是这样。在我们有组织机构的北京、广东、福建和广西地区，都存在着右派分子，只不过揭露的时间先后不同而已。在我们上一阶段的斗争中就有这样的经验。在北京地区反右派斗争尚未深入以前，有不少人存在着麻痹思想，以为致公党在北京地区的组织中大概没有右派分子，但等我们的反右派斗争在党的领导下，全面展开深入下去以后，就证明了事实并不是这样。","type":"paragraph"},{"text":"可是，我们致公党有些地方组织的情况在这方面还是不尽令人满意的。在领导上和成员中仍存在着不同程度的右倾观点、温情主义，右派分子还没有被彻底的揭发和批判，这种情况今后必须坚决予以扭转。我们必须争取中国共产党的领导和有关单位的配合与协助，并加强整风领导小组的力量，更须克服右倾观点和温情主义，依靠群众将斗争继续深入下去，使右派分子的罪行受到彻底暴露和批判，体无完肤，威信扫地，陷于孤立，从而迫使他们低头认罪接受改造。为着彻底深入、全面展开这一伟大的斗争，致公党已决定在９月中旬召开全体中央委员会议的扩大会议，专门讨论整风工作以明确方针任务，统一认识和步骤。","type":"paragraph"},{"text":"总的来说，我们必须认识目前我们的严重任务和这次反右派斗争的伟大意义，并使全体成员在这次两条道路的斗争中受到深刻的教育，从政治上思想上过好社会主义这一关，逐步改造成为真正为社会主义服务的政治力量。","type":"paragraph"},{"text":" 来源：《人民日报》1957年9月7日。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"38ea6d05bb"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
