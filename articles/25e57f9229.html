<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"福建建阳、崇安县交界地区发生反动会道门分子煽动农民暴动事件","authors":[],"dates":[{"year":1954,"month":4,"day":29}],"is_range_date":false,"parts":[{"text":"福建建阳、崇安县交界地区发生反动会道门分子煽动农民暴动事件","type":"title"},{"text":"【福建分社4月29日讯】福建省建阳县和崇安县交界地区最近发生反动会道门分子煽动农民暴动事件。事情的经过如下：","type":"paragraph"},{"text":"4月16日晚，崇安县澄溪乡（该乡为崇安、建阳、水吉浦城四县交界处）反动分子造谣说：真龙天子要出现了！该乡乡长、民兵队长和民兵指导员当即到处追查，追到邻乡建阳县白洋乡时，与正在开会的所谓“黄帝会”的一大群人发生冲突，因寡不敌众，民兵队长负重伤，立即派人到浦城四区报告。该区武装部队长连夜带民兵十余人前往，又被刀匪冲散。17日拂晓，白洋乡六、七十个“黄帝会”徒众，身着法衣、手持刀矛流窜到澄溪乡，包围了人民政府，烧毁全部档案，并绑走该乡文书及通讯员。之后，有抢劫了该乡供销合作社，使供销社损失人民币八百余万元。","type":"paragraph"},{"text":"崇安四区人民政府闻讯后，副区长和区武装部长即率民兵十数人赶去镇压，却被白洋乡和澄沧乡的反动会道门分子煽动起来的200余人于中途劫击，当时副区长及五夫乡民兵队长、民兵指导员3人被杀害。18日，当我武装赶去镇压市，打死暴动者3人（包括“黄帝会”匪首丁育盛），余者即流窜上山。","type":"paragraph"},{"text":"经展开清剿及政治工作后，至24日，已大部陆续下山，被我关押34人，在山上畏罪自杀3人，尚有5人隐匿深山中。","type":"paragraph"},{"text":"发生此次暴动的原因尚未最后查明。建阳地委认为这是该地隐慝的反动会道门的一次有组织、有计划的阴谋策动。据初步了解，这次暴动的220多人中，光是白洋乡就有130人是事前经过报名参加的，其中有当过土匪的、有被管制分子、保释在外就医的犯人和刑期期满的犯人，而暴动是“黄帝会”分子为首煽动的。","type":"paragraph"},{"text":"白洋乡和澄溪乡很偏僻，工作基础薄弱，群众生活困苦，在粮食统购后，农民买粮食要跑几十里路，当时曾有谣言说：“现在买不到粮，将来连糠都买不到。”过去青黄不接时，农民即上山烧一种野菜充饿，封山育林后，群众不能这样做，对政府也有不满情绪。","type":"paragraph"},{"text":"暴动发生后，有关地区党、政、军部门都采取了紧急措施。","type":"paragraph"},{"text":" （谢丁）","type":"paragraph"}],"comments":[],"origin":"新华社《内部参考》1954年5月10日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"25e57f9229"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
