察的一些规定","dates":[{"year":1980,"month":2,"day":17}],"is_range_date":false,"authors":["公安部"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"铁道部政治部审干办公室, 审干工作政策选编(三), 608-610","tags":[{"name":"标语","type":"主题/事件"},{"name":"反革命","type":"主题/事件"},{"name":"信件","type":"主题/事件"},{"name":"冤假错案","type":"主题/事件"}],"parts":[{"type":"paragraph","text":"公安部有关立案侦察的一些规定\n(一九八〇年二月十七日)\n一、有下列情形之一的，要立案侦察：\n\n向敌人报告，已成立反革命组织或策划成立反革命组织的。\n要求参加特务组织的，请领任务的。\n向敌提供情报的。\n索要武器、弹药、毒品、爆炸器材或按敌台教索[sic!]，企图搞行动破坏的。\n申言要推翻无产阶级专政和社会主义制度，要求特务机关与其联系的。\n根据信中的内容，透漏和判断写信人可能是隐藏在我党政军内部和其他要害部位的。\n\n       对确以反革命为目的，写信同敌人挂钩的，应依法惩处。\n二、有下列情形之一的，要进行调查，\n\n为了要求给予经济、物资支援或帮助出境找工作，而表示愿意与敌人联系的。\n向往台湾生活方式，吹捧国民党，诬蔑中国共产党的。\n有一般诽镑攻击词句的。\n\n三、无明显反动内容，仅是索要钱物、书刊、技术资料、要求找人等，均做为社会动态掌握。"},{"type":"paragraph","text":"四、向苏联、越南广播电台投寄挂钩信的，也按上述原则办理。\n关于反动标语、传单、信件区别情况分别进行工作的意见\n……一、有下列情形之一要立案侦破：\n\n煽动群众抗拒、破坏国家法律、法令实施的。\n宣传煽动推翻无产阶级专政的政权和社会主义制度的。\n内容反动，量多而广，或连续作案，蛊惑煽动性大或政治影响很坏的。\n\n这类案件要进行侦察调查，查明作案人员，获取确凿证据，并全面分析作案人动机、目的和一贯表现，并弄清是否以反革命为目的，在处理上要十分谨慎,证据确凿的反革命分子，应以惩处。\n二、有下列情形之一的，要进行调查：\n\n有某些反对社会主义、无产阶级专政、共产党的领导和马列主义、毛泽东思想等内容的。\n内容反动，但手法简单，量小面窄，未造成严重政治影响的。\n内容反动，但目的意图难于判明的。"},{"type":"paragraph","text":"对这类标语、传单、信件要认真进行调查，查明写信人及其目的和原因，分析一贯表现，酌情处理。"},{"type":"paragraph","text":"三、内容属下列情形的不立案、不调查："},{"type":"paragraph","text":"向党中央、中央领导同志写信，提出批评、建议语言过激，甚至有某些指责、不满的词句的。\n对马列著作、毛主席著作，对中央领导同志的讲话，或对党的方针政策和政治运动进行批评有错误观点的。\n对党和政府的某些政策不理解或由于个人问题得不到解决，而发牢骚、讲怪话，发泄不满情绪的。\n申诉个人问题，控告干部，有某些反动词句的。\n乱写乱画或笔误而形成的反动字句。\n判明是少年儿童，或精神病人写的。\n语意含混不清的。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3704196541"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
