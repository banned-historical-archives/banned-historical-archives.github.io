script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反对垄断资本家的残酷剥削意大利八省市工人总罢工工人总罢工使这些省市的主要经济活动陷于停顿","authors":[],"dates":[{"year":1968,"month":10,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京二十四日电　罗马消息:意大利南部马切拉塔、特拉莫等八个省市的工人二十三日举行声势浩大的总罢工，反对垄断资本家的残酷剥削和要求增加工资。这些省市的全部主要经济活动，由于工人总罢工而陷于停顿。与此同时，罢工的工人、学生和居民还分别举行了强大的示威游行。"},{"type":"paragraph","text":"这次罢工和示威游行是整个意大利南部人民正在开展的广泛斗争的一部分，这场斗争是反对意大利的垄断资本家对工人阶级的残酷剥削。长期以来，资本家利用这些地区的贫困状况和工人们面临的严重失业，竭力压低工人们的工资，以榨取更多的利润。"},{"type":"paragraph","text":"此外，意大利撒丁区的矿工二十三日也开始举行要求改善工作条件和生活条件的“斗争周”。矿工们都停工一小时作为斗争的开始。"},{"type":"paragraph","text":"在“皮雷利”橡胶托辣斯，工人要求提高工资和缩短工时的斗争也越来越激烈。“皮雷利”集团在米兰的主要工厂的五千多工人，二十二日举行了声势浩大的示威游行，并且在二十三日举行了第三次二十四小时罢工。这个托辣斯在意大利其它地方的工厂的工人，也正在举行罢工和示威游行。"},{"type":"paragraph","text":"据新华社北京电　罗马消息:意大利劳动人民不顾反动当局的野蛮镇压，最近在许多城市举行示威和罢工斗争，要求改善工作和生活条件，抗议资本家对他们的残酷剥削。"},{"type":"paragraph","text":"十六日，来自意大利南部整个加拉布里亚区的一万多名农业和工业工人，和许多大学生和中学生一起，在科森萨举行游行示威，要求充分就业，增加工资。示威者高举许多红旗和标语牌，有些群众高举的标语牌上写着他们的祝愿:祝毛主席万寿无疆!有些群众还高举毛主席语录牌。"},{"type":"paragraph","text":"警察对示威群众进行了野蛮的袭击，他们向示威者扔催泪弹，并用棍棒打人。示威者用石块和木棒英勇还击。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4fbde3a8fd"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
