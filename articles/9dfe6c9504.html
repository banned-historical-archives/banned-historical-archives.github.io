:[{"year":1950,"month":7,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"海门人民给毛主席写信决心为解放台湾而努力"},{"type":"paragraph","text":"【本报讯】苏北海门县首届各界人民代表会议常务委员会、总工会、农委会、青年团工委、民主妇女联合会、学生联合会、教师工会筹备会、中苏友好协会支会、人民武装部及驻军的代表于本月十六日举行时事座谈会，普遍表示决心为解放台湾而努力。会上一致通过给毛主席写信。信上说：“我们向你保证：我们将动员和组织本县七十五万人民，以加紧生产、努力工作的成绩来回答美国帝国主义的任何挑衅，并响应“中国人民反对美国侵略台湾朝鲜运动委员会”的号召，即将利用各种形式在各种场合普遍举行反对美国侵略台湾朝鲜的宣传运动，充分揭露美国帝国主义的侵略面目，使全海门县人民都能清楚认识美国帝国主义的破坏远东和平的罪恶。誓为解放台湾并声援朝鲜等国家的人民斗争和保卫世界的持久和平而奋斗到底！”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9dfe6c9504"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
