,"authors":[],"dates":[{"year":1957,"month":4,"day":27}],"is_range_date":false,"parts":[{"text":"毛泽东撰中央关于整风和党政主要干部参加劳动的指示","type":"title"},{"text":"各省(市)委、自治区党委、中央一级部委及党组：","type":"paragraph"},{"text":"现在正在全国范围内进行关于正确处理人民内部矛盾这个重大问题的公开讨论中，这个讨论可能延长几个月。党的整风指示，日内即可发出，即以正确处理人民内部矛盾为主题，发扬正确的思想作风，纠正主观主义、官僚主义、宗派主义的错误的思想作风。党的另一通知日内也可发出，这个通知提倡县区乡三级党政主要干部，凡能劳动的，每年抽一部分时间下田参加生产，从事一小部分体力劳动。县以上各级党政军主要干部(不是一般干部)，凡能劳动的，也要这样做，每年以一部分时间，分别下田、下工场、下矿山、下工地或者到其他场所和工人农民一道从事可能胜任的一小部分体力劳动(那怕是很少一点)。这样一来，党和群众就打成一片了，主观主义，官僚主义，老爷作风，就可以大为减少，面目一新。此外，请你们注意，分别在党与(一)工人、(二)农民、(三)学生、(四)解放军战士、(五)知识分子、(六)民主党派、(七)少数民族等七个方面之间所存在的各项具体矛盾，分别召集会议，加以分析研究，使自己心中有数，由盲目到自觉，以便有根据地说服干部和群众。现将湖北省委关于农村人民内部矛盾材料一件发给你们阅读，以为参考。本件及四月十九日电报均请转发县级、军队的团、城市工厂和学校的党委。","type":"paragraph"},{"text":" 中央一九五七年四月廿七日","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"人民内部矛盾","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"51ea78616e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
