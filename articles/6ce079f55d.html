<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"上海铁路分局上海工务段职工人人参战口诛笔伐铁道线上摆战场　狠批右倾翻案风","authors":[],"dates":[{"year":1976,"month":4,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　上海铁路分局上海工务段的广大工人、干部在党委的领导下，认真学习毛主席的重要指示，积极投入反击右倾翻案风的伟大斗争，在千里铁道线上摆开了革命大批判的战场，人人口诛笔伐，锋芒直指党内那个不肯改悔的走资派。运动的顺利开展，有力地促进了生产的发展。三月份的维修任务，均已提前完成，经轨道检查车质量检验，全部达到优良。这个工务段的职工还对管内铁路、桥梁加强检查和养护，做到“大病不过夜，小病及时治”。"},{"type":"paragraph","text":"嘉善大工区的工人满怀无产阶级革命义愤，人人参战，积极投入反击右倾翻案风的斗争。党支部书记老张带头学、带头批；许多青年工人挑灯夜战，经常写大字报到深夜；不少文化水平低的老年工人自己口述，由子女执笔写大字报，集中火力狠批党内那个不肯改悔的走资派。工人们说:“旧社会养路工人从鸡叫干到半夜，还是吃的冰水饭，披的麻袋片。党内那个不肯改悔的走资派要我们走回头路，养路工人坚决不答应!我们一定要以抓革命、促生产的实际行动，反击右倾翻案风。”他们坚持班前班后大批判，热火朝天搞生产。大家把维修每一公里线路，养护每一组道岔看作是对右倾翻案风鼓吹者的一个有力回击。一个月的维修任务不到十天全部完成，质量指标也达到了历史上较好的水平。"},{"type":"paragraph","text":"春节以来，经常阴雨，这个段的广大工人、干部顶风冒雨日夜战斗在铁道线上。一天，上海南站有两组道岔同时损坏，影响线路畅通。险情就是命令。龙华领工区党支部书记老黄带着十六位工人急忙赶到现场抢修。他们冒着刺骨的寒风，从下午一时一直干到次日凌晨四时，及时修复了道岔。二月十七日，吴闵领工区担负抢修二百多米线路的任务，许多正在休班的工人闻讯赶来冒雨参加战斗。尽管雨水和汗水浸透了衣服，但大家越干越欢。他们整整干了十多个小时，换上了数百根枕木，终于把计划需花两天时间才能完成的任务在一天之内就完成了。"},{"type":"paragraph","text":"反击右倾翻案风的斗争，也促进了其他各项工作。担负铁路两旁绿化工作的林场职工，最近抓紧春季植树造林的有利时机，连续作战，育苗造林十四万多株。仓库职工积极参加修旧利废，回收废钢铁七十二吨。职工业余技术教育坚持办好，各种技术业务培训班都在继续办下去。全段呈现出一派“莺歌燕舞”的大好形势，许多技术指标都大大超过了去年同期水平。　(本报通讯员)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6ce079f55d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
