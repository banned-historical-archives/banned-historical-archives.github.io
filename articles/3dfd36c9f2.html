"叶于泩"],"dates":[{"year":1957,"month":5}],"is_range_date":false,"parts":[{"text":"要改革制度","type":"title"},{"text":"北京大学叶于泩","type":"authors"},{"text":"（叶于泩：北京大学哲学系学生）","type":"subtitle"},{"text":"（一）整风只能是第一步，必须改革制度来巩固战果，继续扩大我国社会主义民主。","type":"paragraph"},{"text":"（二）官僚主义、宗派主义、主观主义的滋生有其历史社会根源的，“除三害”必须依靠全国人民群众，作经常的长期的斗争。","type":"paragraph"},{"text":"（三）事实证明关键不在群众，不是没有意见，而是不敢提；不是没提意见，而是不理睬，甚至压制。不是没有好意见，而是被埋没。","type":"paragraph"},{"text":"（四）为了保护和鼓励群众除三害的积极性，必须从立法上给予实际的保证，必须改革制度，加强其民主性。","type":"paragraph"},{"text":"（五）除三害既是长期的任务，就不能“一阵风”，这就必须有一个切实可行的制度经常起保证作用。","type":"paragraph"},{"text":"（六）改革制度，不是不要社会主义，相反的是要保卫它、加强它，必须在保卫公有制和无产阶级专政的前提下，把国家制度中的不民主的东西改革掉。","type":"paragraph"},{"text":"（七）制度并不是好看好听的条文，好的制度，必须保证它自身的实现，要加强制度的对自身的保证。","type":"paragraph"},{"text":"（八）我国民主化的现状落后于形势的发展，这是斯大林错误的恶果之一，改革制度必须朝向民主化的方向。","type":"paragraph"},{"text":"（九）在社会主义旗帜下的全面开放，包括政治上的开放，发展马克思主义的开放。","type":"paragraph"},{"text":"（十）加强人民群众对国家机关的监督，确保民主权利的实际行使。","type":"paragraph"},{"text":"社会主义万岁！","type":"paragraph"},{"text":" 来源：北京大学社会主义思想教育委员会编印《北京大学右派分子反动言论汇集》，一九五七年十月。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3dfd36c9f2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
