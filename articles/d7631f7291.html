ical-archives/banned-historical-archives0/main/maoquanji30.pdf"],"article":{"title":"转发川西军区清匪报告的批语","alias":"","parts":[{"type":"paragraph","text":"转发川西军区清匪报告的批语\""},{"type":"paragraph","text":"（1951年2月25日）华东、中南、西北、华北各大军区及中央局："},{"type":"paragraph","text":"下面是川西军区的清匪报告，发给你们参考。西南的经验是县区乡均建立有党外民主人士参加的清匪委员会，保有清匪小组，区有捕捉队，此外尚有情报站与检查站的组织。再则清匪必须与反、减租、退押或土改相结合进去，必须杀掉匪首、惯匪与恶霸，并必须由党委统一领导，全力以赴，才能发动群众，根绝匪祸。以上经验请加注意，凡你区尚有匪祸地区，请指导当地同志研究这些经验。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"二月二十五日[1]这是毛泽东为转发中国人民解放军川西军区清匪报告写的批语。"}],"authors":["毛泽东"],"dates":[{"year":1951,"month":2,"day":25}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":138,"page_end":138},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d7631f7291"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
