<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"通过三反学习批判了资产阶级思想北京师范大学出现新的气象","authors":[],"dates":[{"year":1952,"month":5,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【北京讯】北京师范大学，经过三反运动批判了资产阶级的腐朽思想以后，出现了新的气象。教师们比较以前认真负责，努力改进自己的教学工作；他们在思想上了解到教学工作，是应该从祖国的需要和同学们的需要出发，不能为个人的“名利思想”所支配；他们在运动中认识了自己的错误和缺点，因而迫切地要求学习，尤其是感到需要学习马克思列宁主义和毛泽东思想。"},{"type":"paragraph","text":"中文系的教师们，在普遍“洗澡”后，接着，即计划学习胡乔木的“文艺工作者为什么要改造思想?”、周扬的“整顿文艺思想，改进领导工作”、列宁的“党的组织与党的文学”、瞿秋白的“文艺的自由与文学家的不自由”等文件。外语系的教师们也准备学习前两个文件，并要求中文系的教师出席他们的学习会，给他们一些帮助。中文系的刘盼遂、王汝弼、陆宗达等教授，因为感到自己新文艺理论的修养不够，还虚心地参加听黄药眠教授的“文艺学”。生物系的包桂濬副教授，在三反运动以前，不看报纸，不愿看中文书，三反前夕还津津有味地阅读邱吉尔的“第二次世界大战回忆录”(英文本)，认为世界上“邱吉尔第一，斯大林第二”，他连我们“四个朋友”指的是那几个阶级都不知道，但在运动中经过同志们的帮助进行检讨后，他现在已订了报纸，而且阅读“联共(布)党史简明教程”了。"},{"type":"paragraph","text":"在教学方面，教师们批判了脱离实际、单纯技术观点和“与趣主义”种种错误思想后，也有了进步。如数学系教师，原来不管学生的需要，认为“搞初等数学没有与趣”，现在则认识到应该以培养中学师资的要求来决定课程内容，乐意于讲授初等数学。生物系的教师也很注意中学课本，认识了自己的教学应该配合中学的课程，使学生将来能胜任愉快地担任这一门功课。在中文系，为了改进教学，已组成了“古典文学”、“写作实习”和“语文学”等三个教研组，并展开了活动。该系黄药眠、叶丁易教授的教学，受到了同学的热烈欢迎，并得到全班同学写信表扬。数学系以前虽然也组织过教研组，但仅是一种形式，参加的教师嫌麻烦，教课还是各搞各的，不想多管“闲事”，但现在则认真地互相听课，互相提意见了。"},{"type":"paragraph","text":"通过这次运动，教师之间的团结也有了显著进步。如生物系，过去闹宗派主义，勾心斗角，前任的系主任对现在的系主任采取对立态度，认为你做得愈坏，就愈能显出我过去的主任做得不错。这些丑恶的事实在运动中被揭露出来后，现在互相之间，都善意地提意见，表示要团结合作，搞好工作。该系汪坤仁教授，原来坚决要离开师大，现在也安定下来，并表示将永远安心于师大为培养中学师资而努力。又如化学系的教师，过去虽然也互相提意见，而且往往在课堂上就提出尖锐的意见，原来他们存心在打击对方，使对方无法下场，以致发生了恶劣的影响，他们在运动中做了检讨后，现在都能以治病救人的态度相对待，表现了团结合作的气象。"},{"type":"paragraph","text":"同学们在这次运动中也都有了明显的提高。大家深刻认识了资产阶级思想的腐蚀性，许多同学都控诉了资产阶级家庭对自己进步的阻碍。每个同学都提高了对党、团的认识，密切了自己与党、团的关系。认识到青年团是先进青年的政治组织，是党最得力的助手和最可靠的后备军，纷纷靠近组织，争取接受组织教育。目下全校已有一百五十多个同学申请入团，廿八人已被批准。其他大部分同学都在争取作一个光荣的青年团员。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"98f44fe655"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
