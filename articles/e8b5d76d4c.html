ical-archives/banned-historical-archives8/main/maoquanji12.pdf"],"article":{"title":"关于巩固山西统战工作问题致杨尚昆等电","alias":"","parts":[{"type":"paragraph","text":"关于巩固山西统战工作问题"},{"type":"paragraph","text":"致杨尚昆等电"},{"type":"paragraph","text":"（1938年7月5日）致前总、北局："},{"type":"paragraph","text":"尚昆二十八日电悉。因为党的组织在山西有很大的发展，以及组织方式、工作方式上的缺点，党的秘密已经很难保持，而某些组织关系暴露又必然影响间、梁对我们的态度和关系。因此，除尚昆电中所提议各项外，还需："},{"type":"paragraph","text":"一、党的组织已有相当大量发展的地区、部队和机关中，暂时停止发展党员，特别在牺盟系统中暂停发展，集中注意教育训练和巩固组织。"},{"type":"paragraph","text":"二、党的发展要注意在组织薄弱的地区、部队和团体中去进行，特别注意建立许多农村支部及旧晋绥军中的支部，以奠定党在山西社会中的深厚基础，不要一般的对下级号召大大发展党员。"},{"type":"paragraph","text":"三、一切阎之团体及机关、部队的文件、口号，须特别注意形式，多用阎之“按劳分配主义”的术语，少用我们马列主义的术语。"},{"type":"paragraph","text":"四、朱、彭如有一人能去与阎一谈最好。如必需胡服去，要在月底才能成行。"},{"type":"paragraph","text":"毛、洛、胡五日致尚昆并致朱、彭转朱瑞"}],"authors":["毛泽东"],"dates":[{"year":1938,"month":7,"day":5}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":393,"page_end":393},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e8b5d76d4c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
