script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"艾地谈政治和艺术的关系艺术家必须同人民加强联系在文化方面同新殖民主义和修正主义作斗争","authors":[],"dates":[{"year":1964,"month":3,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社雅加达28日电】　据印度尼西亚《人民日报》报道:印度尼西亚共产党主席艾地二十三日在接见苏门答腊“锡南丹”剧团时说，必须加强艺术家同人民的联系，并在文化方面同新殖民主义和修正主义作斗争。"},{"type":"paragraph","text":"艾地在讲话中谈到政治和艺术的关系时说:“两者必须同时前进。”他说，要不断提高艺术质量，并不断努力使艺术家同人民的革命政治结合在一起。"},{"type":"paragraph","text":"艾地说，印度尼西亚共产党现在正在努力争取实现如下的原则:政治上的独立自主、经济上依靠自己的力量和文化上保持民族的特性。"},{"type":"paragraph","text":"艾地还赞扬了“锡南丹”剧团演出所取得的成就。"},{"type":"paragraph","text":"艾地在前几天还曾说，“锡南丹”剧团的成就是值得整个印度尼西亚民族引以为荣的。"},{"type":"paragraph","text":"诗剧《锡南丹》是根据民间传说写成的，它描写东苏门答腊渔夫的生活和他们所遭受的苦难。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f83ad939f8"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
