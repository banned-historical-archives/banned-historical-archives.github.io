rt":6,"page_end":6,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"战士最听毛主席的话","authors":["黄祖示"],"parts":[{"type":"paragraph","text":"葵花向着红太阳，"},{"type":"paragraph","text":"战士最听毛主席的话。"},{"type":"paragraph","text":"毛主席，毛主席，"},{"type":"paragraph","text":"您叫干啥咱就干啥。"},{"type":"paragraph","text":"您说党的总路线好，"},{"type":"paragraph","text":"咱就一步不离它。"},{"type":"paragraph","text":"您说阶级斗争不能忘，"},{"type":"paragraph","text":"咱就把牛鬼蛇神踩脚下。"},{"type":"paragraph","text":"您说人民战争威力大，"},{"type":"paragraph","text":"六亿人民把枪拿。"},{"type":"paragraph","text":"您说美帝是纸老虎，"},{"type":"paragraph","text":"咱就坚决戳穿它！"},{"type":"paragraph","text":"您说劳动人民是一家，"},{"type":"paragraph","text":"咱就把革命红旗插遍天下。"},{"type":"paragraph","text":"毛主席，毛主席，"},{"type":"paragraph","text":"您的话威力最大。"},{"type":"paragraph","text":"战士信仰您的话，"},{"type":"paragraph","text":"天不怕来地不怕。"},{"type":"paragraph","text":"狂风恶浪不动摇，"},{"type":"paragraph","text":"万代都把红旗插。"}],"alias":""},"tags":[{"name":"人民战争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1d93a59e77"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
