中只有两个支持印度　尼赫鲁大失所望","authors":[],"dates":[{"year":1962,"month":12,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"印美资产阶级报纸和通讯社承认"},{"type":"paragraph","text":"印度态度无理在亚非国家中自陷孤立"},{"type":"paragraph","text":"五十五个亚非国家中只有两个支持印度　尼赫鲁大失所望"},{"type":"paragraph","text":"据新华社1日讯　恣意诋毁中国的印度和美国报纸也不得不承认，印度坚持它在中印争端中的无理态度在世界上、特别是在亚非国家中，愈来愈得不到支持。"},{"type":"paragraph","text":"印度《政治家报》11月29日在一篇文章中说，“印度在世界上、特别是在亚非地区的处境将更加不安逸和更加孤立，更加不温暖和更加凄凉——同在拉达克和东北边境特区的印军的处境很相像”。"},{"type":"paragraph","text":"这家报纸攻击“亚非国家政府对印度关于支持它反对中国侵略的呼吁所作的无力的回答，把许多东西断送了”。它说，根据印度政府提供的数字，在五十五个亚非国家中只有两个“自发地”表示同情和支持印度。"},{"type":"paragraph","text":"美国《基督教科学箴言报》11月27日以《亚非集团对印度冷淡》为题发表文章说，亚非国家大部分认为所谓“麦克马洪线”是英国在统治印度时为了适合英国目的而单方面确定的，对中国来说是不公正的；这家报纸说，“中国人今天能够说，他们单方面决定停火和邀请直接谈判是符合亚非国家的愿望以及符合两国利益的。”合众国际社驻伦敦记者特勒也在11月30日报怨说，几乎没有什么亚非国家在中印冲突中“公开站出来坚决支持德里，也几乎没有什么国家明确地表示反对共产党中国的侵略”。"},{"type":"paragraph","text":"西德的《法兰克福报》29日也说，“没有一个中立的东南亚邻国倒向印度方面。”它说，整个不结盟集团抛弃了印度“使尼赫鲁大失所望”。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4705988f3d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
