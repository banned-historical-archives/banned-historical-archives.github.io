script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"“肯尼迪是美国垄断资本的代表，是掠夺拉丁美洲工人的剥削者”  墨西哥学生再次集会抗议美总统访墨  《新方针》周报说巴西人民知道肯尼迪访问的恶毒目的何在","authors":[],"dates":[{"year":1962,"month":6,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"“肯尼迪是美国垄断资本的代表，是掠夺拉丁美洲工人的剥削者”"},{"type":"paragraph","text":"墨西哥学生再次集会抗议美总统访墨"},{"type":"paragraph","text":"《新方针》周报说巴西人民知道肯尼迪访问的恶毒目的何在"},{"type":"paragraph","text":"新华社29日讯　墨西哥城消息：墨西哥国立大学和国立工艺学院的学生28日举行集会，再次抗议美国总统肯尼迪定于29日开始的对墨西哥的访问。"},{"type":"paragraph","text":"在这两所学校里散发的宣言谴责“肯尼迪是美国垄断资本的代表，是掠夺拉丁美洲工人的剥削者。”宣言还说，“墨西哥拒绝他（指肯尼迪）的那种虚假的友谊”，并且“抗议这次卑劣的访问”。"},{"type":"paragraph","text":"据墨西哥官方宣布，墨西哥政府准备出动六千名警察和便衣人员组成“治安大队”，负责在肯尼迪访问期间“维持秩序”。"},{"type":"paragraph","text":"新华社里约热内卢28日电  巴西《新方针》周报今天就美国总统肯尼迪将在8月对巴西进行的访问发表文章说，“肯尼迪是不受巴西人民欢迎的”。"},{"type":"paragraph","text":"文章指出，肯尼迪是美国剥削和侵略政策的主要执行者，是美国帝国主义托辣斯的保护人。"},{"type":"paragraph","text":"文章指出，肯尼迪对拉丁美洲进行的任何访问的主要目的都是，“通过一切可能的办法来扑灭拉丁美洲二亿人民争取解放和幸福的运动”。文章说，美国政府和报界对巴西南里约格朗德州征用美国“国际电话电报公司”以及巴西民族民主运动的开展感到不安。"},{"type":"paragraph","text":"《新方针》周报今天在另一篇文章里表示强烈反对去年以来一万五千名美国军人和警察陆续到巴西活动。报纸说，巴西正遭到美国军事干涉的威胁，这一干涉同美国特务的活动结合在一起，其目的在于制造挑衅气氛，以便在“反对共产主义”的借口下对巴西民主力量进行恐怖镇压。"},{"type":"paragraph","text":"这家报纸接着说，“在目前情况下我们必须保持警惕和迅速地向人民揭露帝国主义及其仆从的罪恶阴谋”，“决不能容许我们的主权遭到帝国主义者及其代理人的践踏。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7ccc560ec9"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
