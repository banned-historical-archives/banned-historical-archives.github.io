art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"“毛主席派来的好门巴”","authors":[],"parts":[{"type":"paragraph","text":"在西藏高原上，有一支深受藏族人民欢迎的解放解医疗队，藏族人民亲切地称它是“毛主席派来的好门巴”。"},{"type":"paragraph","text":"这支农村医疗队，就是西藏某边防部队门诊所的医务人员组成的。他们遵照毛主席关于“把医疗卫生工作的重点放到农村去”的伟大教导，爬山涉水，深入农牧区，一面宣传毛泽东思想，一面为翻身农奴巡回治疗。"},{"type":"paragraph","text":"一天深夜，尼西卓玛病危，医务人员闻讯后连夜出诊。在途中，他们一遍又一遍地背诵毛主席的教导：“我们这个队伍完全是为着解放人民的，是彻底地为人民的利益工作的”。当他们的汽车行到半路，几个群众挡住了汽车，说尼西卓玛已经不行了，劝他们回去。医务人员牢记毛主席关于“完全”“彻底”为人民服务的教导，心想，我们的责任是向人民负责，只要有一点希望，就要想方设法把病人救活。医务人员继续前进。一到病人家，他们见病人只有一点微弱呼吸，就立即进行抢救。经过两个多小时的人工呼吸、心外按摩，终于使这个患腹泻脱水并发心脏病的尼西卓玛获得了第二次生命。在场的六十多个群众，激动得连声高呼：“毛主席万岁！”"},{"type":"paragraph","text":"又一次，贫苦牧民出身的查木角老阿妈突然昏倒在地。医生李焕章同志知道后，就同两名卫生员带上药品赶到老阿妈家里。病人患高血压脑溢血，咽喉的痰堵住气管，呼吸十分困难，生命处于垂危状态。李焕章知道，要使病人脱险，首先要吸出咽喉内的痰。可是吸痰器没有带来。这时，他想起毛主席关于“关心他人比关心自己为重”的教导，想起王杰、刘英俊一不怕苦、二不怕死舍己为人的英雄行为，立即用自己的嘴对着病人的嘴，用劲猛吸，一口一口地把浓痰吸出来，查木角阿妈脱险了。牧民们激动地说：旧社会我们贫苦牧民得了病没钱治，没人问，今天牧民有了病，金珠玛米的门巴走上门，把死人救活。真是托毛主席他老人家的福啊！"},{"type":"paragraph","text":"（西藏军区新闻科供稿）"}],"alias":""},"tags":[{"name":"西藏文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4944584e92"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
