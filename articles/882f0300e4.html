nth":3,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"三月二十日——二十六日"},{"type":"paragraph","text":"△邓小平、胡耀邦同志分别会见坦桑尼亚总统尼雷尔；赵紫阳总理和尼雷尔总统进行会谈。"},{"type":"paragraph","text":"△邓小平、赵紫阳同志分别会见美国前总统福特；福特转达了美总统里根的友好口信和信件。"},{"type":"paragraph","text":"△美总统里根首次会见我驻美大使柴泽民。"},{"type":"paragraph","text":"△欧洲经济共同体首脑会议在荷兰举行。"},{"type":"paragraph","text":"△西欧七国在法国本土举行联合军事演习；华约各国则在波、东德、苏、捷领土上举行联合军事演习。"},{"type":"paragraph","text":"△埃及和苏丹采取联合抗苏新步骤，两国重新互派大使，恢复埃以媾和后中断两年的外交关系。"},{"type":"paragraph","text":"△哥伦比亚政府宣布与古巴中断外交关系。"},{"type":"paragraph","text":"△非洲统一组织呼吁各国对南非全面制裁。"},{"type":"paragraph","text":"△波兰比得哥什省发生纠纷，“团结”工会宣布处于准备罢工状态。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"赵紫阳","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"882f0300e4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
