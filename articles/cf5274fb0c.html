","authors":[],"dates":[{"year":1966,"month":9,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"意大利革命群众集会支持我文化大革命"},{"type":"paragraph","text":"通过决议赞扬中国共产党人坚持马列主义的革命立场"},{"type":"paragraph","text":"据新华社十五日讯　罗马消息：意大利的工人、学生和各阶层人民九日在罗马举行群众大会，欢呼中国无产阶级文化大革命。"},{"type":"paragraph","text":"这次大会是由罗马“马克思—恩格斯—列宁—斯大林”小组召集的。"},{"type":"paragraph","text":"大会通过决议，表示完全支持中国的无产阶级文化大革命运动，并且要在意大利工人群众中间宣传中国共产党人的正确的马克思列宁主义的革命立场，揭穿帝国主义者、资本家和修正主义者的谎言。决议说，中国共产党人正确地揭露了：在社会主义国家里，资本主义势力仍然不死心而在思想上和政治上进行反抗。决议说：“这是世界共产主义运动和工人阶级运动的一个具有历史意义的教训，是当代马克思列宁主义的进一步发展。”"},{"type":"paragraph","text":"决议强调说，中国共产党人要把社会主义革命进行到底，因此，在经济和社会结构实现社会主义改造之后，要向上层建筑中的封建和资产阶级思想、文化以及旧风俗、旧习惯开火。这是防止资本主义复辟的一个保证。决议还强调说：“人民中国的无产阶级文化革命，也是对修正主义企图渗入党、国家和社会的一个强有力的回击，赞成这种企图的主要是苏联修正主义领导人。他们在这方面还同美帝国主义一起反对真正的共产党人，把革命人民引入歧途。这种企图注定要遭到最彻底的失败。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cf5274fb0c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
