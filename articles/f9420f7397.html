script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"“爱民模范”谢臣生前所在团指战员发扬光荣传统  军民团结深入批邓","authors":[],"dates":[{"year":1976,"month":7,"day":31}],"is_range_date":false,"parts":[{"type":"paragraph","text":"“爱民模范”谢臣生前所在团指战员发扬光荣传统"},{"type":"paragraph","text":"军民团结深入批邓"},{"type":"paragraph","text":"据新华社一九七六年七月三十日讯　驻守祖国北部边疆的人民解放军某团指战员，发扬我军光荣传统，与驻地人民群众一起批邓、反击右倾翻案风，为巩固和发展无产阶级文化大革命的胜利成果作出了新贡献，进一步加强了军政、军民之间的革命团结。"},{"type":"paragraph","text":"这支具有爱民光荣传统的部队指战员，以“爱民模范”谢臣为榜样，在无产阶级文化大革命、批林批孔和学习无产阶级专政理论运动中，一直旗帜鲜明地和人民群众团结战斗在一起，谱写了爱民的新篇章。批邓、反击右倾翻案风斗争开展以来，指战员们又斗志昂扬地和驻地人民一起投入这场伟大的斗争，决心为保卫毛主席的革命路线，与邓小平的修正主义路线斗争到底。指战员们在警惕地保卫祖国北部边疆的同时，经常深入驻地附近的工厂、农村和学校，同人民群众一起学习毛主席的一系列重要指示，热烈座谈经过文化大革命，各条战线出现的大好形势，集中火力批判邓小平抛出的“三项指示为纲”的修正主义纲领。三炮连和驻地大湾子村一河之隔，干部、战士和贫下中农多次举行批判会，并且在批邓斗争中重新制订了互帮互学的公约。三炮连批判邓小平散布的“今不如昔”的谬论时，大湾子村的干部和社员把文化大革命以来队里革命和生产发生的深刻变化整理成材料，专门给三炮连送去，使连队的革命大批判更好地从理论与实践的结合上说明问题，击中邓小平反动罪行的要害。"},{"type":"paragraph","text":"这个团的干部、战士还紧紧地和人民群众站在一起，热情支持在文化大革命中涌现出来的社会主义新生事物，坚决同邓小平的反革命的修正主义路线对着干。指战员们向驻地人民群众热情宣传社会主义新生事物的优越性，热烈歌颂无产阶级文化大革命的伟大胜利。在邓小平刮起的右倾翻案风的影响下，某炮连驻地生产队的一小撮阶级敌人散布流言蜚语，攻击老、中、青三结合的领导班子。连队党支部了解到这个情况后，立即派连长王军带领支持新生事物小组的同志，到这个生产队做群众工作。他们在驻地党组织的统一领导下，一面支持生产队的领导班子大胆工作，一面深入群众调查研究，举办学习班，学习毛主席的有关指示，批判邓小平的修正主义路线，打击阶级敌人的破坏活动，有力地回击了右倾翻案风，巩固和发展了老、中、青三结合的领导班子，全队出现了抓革命、促生产的大好形势。高机连长期以来派出干部、战士担任驻地附近几所小学的校外辅导员，同革命师生一起开展教育革命。在批邓、反击右倾翻案风斗争中，他们把支持教育革命的工作做得更好了。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"批林批孔","type":"主题/事件"},{"name":"教育革命","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f9420f7397"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
