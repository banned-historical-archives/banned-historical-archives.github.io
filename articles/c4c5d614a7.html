rt":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"嫩姜亦辣——马文革、于沈潼勇斗劲敌目击记","authors":["聂清吉"],"parts":[{"type":"paragraph","text":"阿佩伊伦终于遇到了克星——中国队21岁的年轻选手马文革。"},{"type":"paragraph","text":"7日晚9时（北京时间8日凌晨3时），男子单打比赛展开了激烈的捉对厮杀，马文革迎战口出“要打倒中国长城”的阿佩伊伦。他在先失一局情况下，沉着勇猛，死死地咬住阿佩伊伦。并在厮杀中猛拉弧圈，伺机发力抽杀，比分终于打成2∶2平。在关键的第五局中开局时，双方斗智斗勇，难分难解。马文革棋高一着，用中国的弧圈对付阿佩伊伦的欧洲弧圈，牢牢地掌握了主动权。赛前，在100多名记者参加的招待会上，阿佩伊伦大声宣称：男子单打冠军将属于瑞典和他。可此时，他面对名不见经传的中国小将却乱了阵脚，终于以14∶21的比分俯首称臣。"},{"type":"paragraph","text":"8日下午3点半（北京时间晚上9点半），和马文革同龄的年轻选手于沈潼也力克瑞典队的林德。"},{"type":"paragraph","text":"比赛是在西德观众为瑞典队狂热助威的叫喊声中开始的。别看小于平常腼腆得象大姑娘，此时却出奇的沉着冷静，他左手直握球拍，一会吊角抽杀，一会重推，更有那诡计多端的发球，使林德防不胜防，欲攻不能，始终处于被动挨打的境地。老谋深算的林德在扳回第2局后，仍不敌对手，终于被于沈潼以3∶1击下擂台。"},{"type":"paragraph","text":"这是一个令人振奋，又令人回味的场面。"},{"type":"paragraph","text":"本报记者 聂清吉（本报多特蒙德4月8日电）"}],"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c4c5d614a7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
