<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"革命战士最听毛主席的话，千难万难踩脚下。有毛泽东思想掌舵，我们就能突破重重困难，架设起——黄河飞线","authors":["通信兵某部十二连"],"dates":[{"year":1968,"month":3,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"革命战士最听毛主席的话，千难万难踩脚下。有毛泽东思想掌舵，我们就能突破重重困难，架设起——"},{"type":"paragraph","text":"黄河飞线"},{"type":"paragraph","text":"通信兵某部十二连"},{"type":"paragraph","text":"一九六五年，我们连奉命架设某地黄河飞线。这项任务，要求在波涛滚滚的黄河上面，在两座陡峭的高山之间，架设起跨距长达一千米的两道飞线。在这样险峻的地方，架设这么长跨距的飞线，工程是很艰巨的。我们参加施工的同志，大部分又是入伍时间不长，不熟悉架设技术的年轻战士。要完成这个任务，困难确实很大。然而，无限忠于毛主席的红色通信兵，用战无不胜的毛泽东思想武装了头脑，就没有不能克服的困难。一到工地，我们就大抓活学活用毛主席著作，开展“无限忠于毛主席”的活动，把尽快地架好黄河飞线，当作是无限忠于毛主席的具体表现。同志们豪迈地说：革命战士意志坚，黄河天险只等闲。为毛主席架飞线，牺牲流血也心甘！"},{"type":"paragraph","text":"在黄河上架设飞线，最困难的，是把电线拉过河去。我们缺乏经验，就发动群众想办法，人人献计献策，提出了几十个建议。经过多次试验，突破重重技术难关，终于找到了一种引线牵引吊滑放线法，并且决定用木船把引线放过河去。"},{"type":"paragraph","text":"可是，这一段黄河处在两山之间，落差大，水流急，礁石多。当地群众流传这样的歌谣：“船到××口，如从地狱走；舍得一条命，才敢把船行！”那几天，偏偏赶上上游暴雨，河水猛涨，狂风呼啸，浊浪翻滚。怎么办？是等待黄河落水后放线过河，还是立即放线过河？为了早日完成毛主席交给我们的战斗任务，大家主张立即放线过河。同志们争着要去完成这个危险的任务。他们说：为毛主席架线，那里最艰险，我们就到那里去！住在黄河岸边的贫下中农，也大力支援，给我们当参谋，出主意，亲自为我们划船掌舵。"},{"type":"paragraph","text":"第一次抢渡开始了，排长赵和成带着五名战士，四名船工，跳上木船，迎着急浪，驶向河心。木船上牵着一条铁线，在激流中飘摇前进。好不容易驶到河心，由于线车放线太快，铁线落到水里，被礁石绊住。急流冲线，拉得木船剧烈地颠簸，我们只好剪断铁线，驶回岸来。"},{"type":"paragraph","text":"为了避免引线落水，我们把线车改装在船上，又一次抢渡。船驶到河心，引线突然卡在线车上，线车转不动了。在急流中，木船被引线拉得极度倾斜，巨浪打进船舱，随时都有翻船的危险，我们只好又剪断了引线，木船被冲下老远，才靠上岸来。"},{"type":"paragraph","text":"这时候，太阳快要落山了。排长赵和成负了伤，仍然坚持不下火线。他领着大家共同学习了毛主席关于“斗争，失败，再斗争，再失败，再斗争，直至胜利”的教导。同志们说：“毛主席交给我们的任务还没有完成，怎么能回去？”大家纷纷要求继续渡河引线。三班长郭发平把毛主席像挂在船头，怀着对伟大导师毛主席无比深厚的无产阶级感情，激动地对同志们说：“有伟大舵手毛主席给我们领航，天大的困难也能闯过去！”同志们背诵着毛主席语录：“下定决心，不怕牺牲，排除万难，去争取胜利。”吸取上两次的经验教训，经过一场英勇搏斗，终于胜利地把引线放过黄河。这时，“毛主席万岁”的欢呼声响成一片，压过了黄河波涛的呼啸声。"},{"type":"paragraph","text":"两道飞线很快地悬架在黄河两岸绝峭的高山之间。同志们在总结这次架设黄河飞线的战斗时，满怀革命豪情地歌唱：人说黄河风险大，我们说风险没有啥；革命战士最听毛主席的话，千难万难踩脚下。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dee759b681"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
