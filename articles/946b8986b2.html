<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"跳出资产阶级法权思想的框框","authors":["沈世馨"],"dates":[{"year":1975,"month":5,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"培光中学中一年级教师　沈世馨"},{"type":"paragraph","text":"胡兆禹同学立志务农，坚决走上山下乡的光辉道路，到祖国边疆插队落户干革命，这是对资产阶级法权思想的勇敢挑战，也是对旧的传统观念的有力批判。这件事对我触动很大。由于自己是从旧学校出来的，深受资产阶级法权思想的束缚，因此，开始一段时间，对于胡兆禹同学的这一革命行动，不仅没有给予支持和鼓励，相反地感到不可理解。"},{"type":"paragraph","text":"记得胡兆禹同学第一次向我报名去黑龙江的时候，我用将信将疑的眼光看着他说:“你不要跟我开玩笑，我不相信。”我想胡兆禹不是红卫兵，又不是班干部，为啥要起带头作用，报名去黑龙江呢?后来，胡兆禹同学跑到党支部报了名，我看到他真的要去黑龙江，就对他说:“胡兆禹，我跟你讲清楚，到黑龙江不是我动员你去的，是你自己要去的，今后不要怪我!”通过无产阶级专政理论的学习，胡兆禹同学进一步提高了对上山下乡运动伟大意义的认识，他又向党支部提出要求，要到云南西双版纳插队落户干革命，以实际行动批判资产阶级法权思想，巩固无产阶级专政。对胡兆禹的革命行动，我就更不理解了。我还对胡兆禹讲:“云南那个地方恐怕比黑龙江更艰苦，斗争更复杂，你要再三考虑，不要一时冲动。”胡兆禹回答说:“生活艰苦，斗争复杂，我都不怕。正因为这样，所以我才要求到那里去。”总之，我是带着资产阶级法权观念的框框来做学生的工作的，因此对胡兆禹的革命行动，总是不相信，不放心。"},{"type":"paragraph","text":"最近，党支部组织教师结合对胡兆禹同学的分析，认真学习无产阶级专政的理论。通过学习，我认识到是限制还是维护资产阶级法权，是缩小还是扩大三大差别，这是关系到把学生培养成为无产阶级革命事业接班人还是资产阶级继承人的大问题，是两个阶级、两条路线、两种思想斗争的重要内容。同时，也认识到，自己虽然出身于工人家庭，但由于在旧学校受到修正主义教育路线的毒害，因此，头脑里还存在着不少资产阶级法权思想。无产阶级文化大革命前的十七年，刘少奇一伙机会主义路线的头子，竭力保护资产阶级在教育阵地上的优势，扩大三大差别，他们用“智育第一”、“知识私有”、“读书做官”等地主资产阶级黑货来腐蚀学生，这些流毒至今仍未肃清。我们这些从旧学校出来的教师，在教育思想、教育方法上还没有跳出资产阶级法权的圈子。资产阶级法权思想是资产阶级统治学校的精神支柱。只有用马列主义、毛泽东思想的武器把它彻底摧毁，才能为无产阶级教育革命扫清前进道路上的障碍，才能把学校办成无产阶级专政的工具。“教改的问题，主要是教员问题”。作为一个人民教师，我决心认真学好无产阶级专政的理论，自觉地加强世界观的改造，坚持以党的基本路线教育学生，努力培养德、智、体全面发展的无产阶级革命事业接班人，为缩小和消灭三大差别，巩固无产阶级专政，实现共产主义而努力奋斗!"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"黑龙江文革","type":"人物"},{"name":"云南文革","type":"人物"},{"name":"教育革命","type":"主题/事件"},{"name":"上山下乡","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"限制资产阶级法权","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"946b8986b2"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
