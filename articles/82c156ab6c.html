<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"永远歌唱伟大的毛泽东思想","authors":["刘剑秋","徐臣"],"dates":[{"year":1966,"month":6,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"驻沪空军某部　《雄鹰之歌》编演者　刘剑秋　徐臣"},{"type":"paragraph","text":"反党反社会主义分子贺绿汀，被揪出来了，这是无产阶级文化大革命的又一胜利，是毛泽东思想的伟大胜利!"},{"type":"paragraph","text":"贺绿汀，这个黑帮分子，是反党反社会主义的老手，你一贯对党对社会主义对工农兵怀着刻骨的仇恨。为了达到其反动目的，你散布了大量的修正主义毒素，对毛泽东文艺思想进行了丧心病狂的进攻。"},{"type":"paragraph","text":"毛主席教导我们文艺要为工农兵服务，为工农兵而创作，为工农兵所利用。广大的革命文艺工作者，遵循着毛主席的教导，深入工农兵，创作出许多密切配合革命斗争、表达工农兵思想感情的文艺作品，热情歌颂党、歌颂毛主席。"},{"type":"paragraph","text":"而贺绿汀之流对这些革命的文艺工作者，恨之入骨，对毛泽东的文艺思想极端仇视，说什么配合革命斗争的作品，是“配上阿拉伯数字的口号”，是“粗糙的叫喊”，是“硬拼硬凑，哩哩啦啦，杂乱无章”。在贺绿汀的眼里，那简直不是歌曲，糟得很。贺绿汀这样恶毒进攻，这就赤裸裸地暴露了他反革命的本质，企图瓦解我们的斗志，解除我们的武装，达到资本主义复辟的目的。这绝对办不到!我们中国人民解放军，是毛主席亲手缔造的人民军队，无限地忠于人民，忠于党，忠于毛主席。我们深知革命歌曲的重大意义。建军以来，我们部队创作了许多革命歌曲，鼓舞了我们无产阶级的革命精神，增强了我们的斗志。"},{"type":"paragraph","text":"我们说，密切配合革命斗争而写的革命歌曲好得很，我们就是要高唱革命的歌，高唱伟大的毛泽东思想。不久以前，我们参加了第七届“上海之春”，演出了反映我们空军战斗生活的《雄鹰之歌》。我们一唱起这首歌就感到浑身是劲，当我们唱到“思想红旗举得高，立场坚定志如钢”的时候，我们就想到毛主席在指引我们前进的航向，党在抚育着我们成长。当我们唱到“保卫着秀丽的河山，看守着田园和工厂”，就想到人民对我们的期望，就想到我们的责任，鼓舞着我们去苦练过硬的本领，敌机胆敢来侵犯，就坚决把它消灭光。我们每唱一支歌就起到一堂政治课的作用。"},{"type":"paragraph","text":"贺绿汀，你推行修正主义的文艺路线，大贩黑货，大唱反调，大作黑曲，反对歌唱伟大的毛泽东思想。呸!这是妄想!我们革命战士就是热爱毛主席、热爱党，就是喜欢歌颂党、歌颂毛主席、歌颂工农兵的革命歌曲!"},{"type":"paragraph","text":"我们告诉你，贺绿汀，你的鬼把戏不灵了，你的面纱没用了，你狰狞的反革命面目暴露了，你想逃，往哪逃?我们要跟踪追击，不打碎你的反骨，不铲除你的黑调，不把你们这些牛鬼蛇神扫除干净，决不罢休!"},{"type":"paragraph","text":"我们要放开喉咙，大唱革命的歌、战斗的歌，歌颂伟大的党、伟大的领袖毛主席!我们要把革命的歌声唱遍全世界，让一切牛鬼蛇神彻底灭亡!"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"82c156ab6c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
