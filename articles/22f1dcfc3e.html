script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"我东方红杂技团强烈抗议佐藤政府非法绑架华侨总会工作人员  佐藤政府破坏中日人民友好必将碰得头破血流  宫本修正主义集团无耻充当美日反动派反华打手充分暴露叛徒嘴脸","authors":[],"dates":[{"year":1967,"month":12,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"我东方红杂技团强烈抗议佐藤政府非法绑架华侨总会工作人员"},{"type":"paragraph","text":"佐藤政府破坏中日人民友好必将碰得头破血流"},{"type":"paragraph","text":"宫本修正主义集团无耻充当美日反动派反华打手充分暴露叛徒嘴脸"},{"type":"paragraph","text":"新华社东京七日电　正在日本进行访问演出的中国东方红杂技团七日下午在东京举行的记者招待会上发表声明，强烈抗议日本佐藤反动政府非法绑架东京华侨总会工作人员陈学全的野蛮罪行。"},{"type":"paragraph","text":"声明说，十二月四日上午，日本警察当局借口所谓与岩见泽市的“伤害嫌疑”有关，竟然出动便衣警察在大街上非法绑架了东京华侨总会工作人员陈学全，偷偷摸摸地用飞机“押送”到北海道关押起来，至今尚未释放。"},{"type":"paragraph","text":"声明说，东京华侨总会工作人员陈学全，是在中国杂技团访日演出期间随团协助工作的。当中国东方红杂技团在北海道岩见泽、札幌等地演出期间，宫本修正主义集团一再猖狂地进行捣乱和破坏，对此，日本警察当局不仅未予制止，反而加以纵容和包庇。他们颠倒是非，混淆黑白，给爱国侨胞陈学全加上种种莫须有的罪名，进行政治迫害。这显然是日本政府当局与宫本修正主义集团狼狈为奸制造的一个严重的反华政治事件。在此，我们对日本政府表示极大的愤慨和提出强烈的抗议。"},{"type":"paragraph","text":"声明说，日本政府当局迫害陈学全的事件，并不是孤立的和偶然的。最近以来，日本首相访美回国之后，把被中国人民早已唾弃的政治僵尸蒋匪帮头目蒋经国拉到日本进行反华活动；对于坚持日中友好、这次邀请中国杂技团访日的日中友好协会（正统）总部和致力于发展日中贸易、对中国杂技团访问演出大力支持的日本国际贸易促进协会及日本国际贸易促进协会关西总部等团体则实行搜查等法西斯暴行。这是日本政府一贯追随美帝国主义敌视中国、加紧破坏中日两国人民友好运动和中日友好贸易的一个新的严重步骤。声明说，我们正告日本政府当局，七亿中国人民决不是好惹的，你们甘心充当美帝国主义的忠实走卒，猖狂反华，是绝对没有好下场的。正如我们伟大领袖毛主席指出的：“死心塌地让美帝国主义牵着鼻子走的奴才，到头来只能为美帝国主义殉葬。”"},{"type":"paragraph","text":"声明指出，宫本修正主义集团在美日反动派疯狂反华的活动中，充当了打手。宫本修正主义集团对战无不胜的毛泽东思想怕得要死，恨得要命，千方百计地破坏日益发展的日中两国人民友好运动。它们对东方红杂技团的访日演出，象疯狗一样狂吠嚎叫，进行无耻的捣乱和破坏。它们竟公然同日本警察当局勾结在一起，诬蔑陷害东京华侨总会工作人员陈学全，这就完全暴露了宫本修正主义集团反华、反人民、反革命的修正主义叛徒嘴脸。"},{"type":"paragraph","text":"声明说，我们坚决支持东京华侨总会的抗议声明。日本警察当局必须立即释放被非法绑架的东京华侨总会工作人员、爱国华侨陈学全。"},{"type":"paragraph","text":"声明最后指出，增进中日两国人民友好，促进我们两国人民的经济、文化交流，是中日两国人民的共同的愿望，是不可抗拒的历史洪流，是任何力量也破坏不了的。谁想阻挠和破坏我们两国人民的友谊，谁就必将碰得头破血流。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"22f1dcfc3e"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
