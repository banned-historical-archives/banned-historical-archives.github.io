art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"沿着毛主席的军事路线前进","authors":["空军“航空兵英雄中队”"],"parts":[{"type":"paragraph","text":"万里蓝天，铺满了绚丽的彩霞，八亿神州，迸发出胜利的欢笑。我们盼望已久的党的十届三中全会胜利召开了！全会公报字字句句说出了革命战士的心里话，我们坚决拥护全会关于追认华国锋同志为中共中央主席和中央军委主席的决议！坚决拥护全会关于恢复邓小平同志职务的决议！坚决拥护全会关于将王洪文、张春桥、江青、姚文元永远开除出党的决议！"},{"type":"paragraph","text":"在这欢庆伟大胜利的时刻，我们簇拥在华主席视察我们中队的照片周围，凝望着华主席的光辉形象，思潮起伏。在那不平凡的一九七六年，是英明领袖华主席继承毛主席的遗志，一举粉碎了王张江姚反党集团，挽救了革命，挽救了党。九个多月来，全党全军全国人民高举毛主席的伟大旗帜，在华主席为首的党中央的领导下，深揭狠批“四人帮”，抓纲治国，甩开膀子干革命，各条战线全面跃进，捷报频传。事实雄辩地证明，华主席为首的党中央的政治路线、组织路线是完全正确的，所采取的各项重大决策和措施，是完全正确的。“导师创业垂千古”，“长征接力有来人”。华主席不愧是毛主席的好学生、好接班人，是我们的好领袖、好统帅。"},{"type":"paragraph","text":"庆胜利，颂领袖。回顾华主席五次视察我们部队、关怀我们中队成长进步的幸福情景，我们的心情格外激动。当年华主席每次来视察，都要到机场看望我们，和每个飞行员握手，亲切交谈。华主席勉励我们，要发扬革命传统，争取更大光荣；要好好听毛主席的话，好好学习马列和毛主席著作，按照毛主席的军事思想和军事路线建设部队，练好技术，练好身体，保卫我们的社会主义祖国。华主席和我们革命战士真是心连心呵！"},{"type":"paragraph","text":"今天，在欢庆党的十届三中全会胜利闭幕的大喜日子里，我们向华主席、党中央表示决心：一定高举毛主席伟大旗帜，更加紧密地团结在华主席为首的党中央周围，一切听从华主席和华主席为首的党中央的指挥，誓将毛主席开创的无产阶级革命事业进行到底。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"87be66df43"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
