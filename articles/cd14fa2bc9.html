pe":"paragraph","text":"全国人民拥护又欢迎。8.保卫"},{"type":"paragraph","text":"祖，国永远向前进，"}],"authors":[],"dates":[{"year":1971,"month":11,"day":1}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":14,"page_end":14},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cd14fa2bc9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
