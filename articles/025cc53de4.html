ical-archives/banned-historical-archives8/main/maoquanji21.pdf"],"article":{"title":"从内线作战着眼分批歼火国民党三个军","alias":"","parts":[{"type":"paragraph","text":"从内线作战着眼分批歼灭"},{"type":"paragraph","text":"国民党三个军"},{"type":"paragraph","text":"（1945年11月15日）林、彭川："},{"type":"paragraph","text":"十三日十九时电悉。顽十三军、五十二军正在秦皇岛、抚宁地区集中，估计其后续尚有一个军，至少集中三个军，然后向山海关、绥中之线攻击前进。目前山海关作战并非真面目战斗。我黄、梁?两部四万二千远道新到，官兵疲劳，地形不熟，目前开至义院口、驻操营，必无好仗可打，即使歼敌一部，不过战术胜利，而兵力暴露，不得休整，势将处于被动。为避免此种缺陷，谨慎使用主力，求于将来决战时一战解决问题，应令李运昌、杨国夫?两部坚持山海关、绥中之线，节节抗击，消耗疲惫敌人，而令黄、梁两部从冷口、界岭口分路荫蔽开至锦州、锦西、兴城三角地区，处于内线，休整部队，恢复疲劳，补充枪弹，熟悉地理民情，创造战场，"},{"type":"paragraph","text":"[1]林、彭，指林彪、彭真，当时分别任东北人民自治军总司令和第一政治委员。"},{"type":"paragraph","text":"[2]黄，指黄克诚，当时任新四军第三师师长兼政治委员。梁，指梁兴初，当时任山东军区第一师师长。"},{"type":"paragraph","text":"[3]李运昌，当时任东北人民自治军第二副司令、冀热辽军区副司令演习夜战，俟敌进至绥中地区或兴城地区业已疲劳消耗至相当程度，我则可集中最大兵力，计黄克诚三万五千，梁兴初七千，杨国夫七干，李运昌、沙克\"在盘山、锦州至山海关一带者至少二万（新部队可以参战作为辅助兵力），共约七万人，于最有利之时机地点，由林彪或荣桓亲去指挥，举行反攻，分作几个战斗，每次歼灭其二三个师，最后全部歼灭三个军，即能从战略上解决问题。冀东已编成两个野战旅，可调至山海关、绥中、兴城之线的西面山地荫蔽集结，于正面主力举行决战时，从侧面切断敌军后路。总之，从内线作战着眼，此种方针最为有利。你们是否同意，仍望考虑电复。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"戌删[1]沙克，当时任冀中军区参谋长。"}],"authors":["毛泽东"],"dates":[{"year":1945,"month":11,"day":15}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":98,"page_end":99},"tags":[{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"name":"梁兴初","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"025cc53de4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
