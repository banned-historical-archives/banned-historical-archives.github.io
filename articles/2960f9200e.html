script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"热烈祝贺我乒乓球队获得巨大胜利  共青团中央、对外文委希望我乒乓球队更高举起毛泽东思想伟大红旗，从胜利走向更大胜利  参加杭州乒乓球邀请赛的全体人员表示决心，努力学习，把乒乓球运动的水平推向新的高峰","authors":[],"dates":[{"year":1965,"month":4,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"热烈祝贺我乒乓球队获得巨大胜利"},{"type":"paragraph","text":"共青团中央、对外文委希望我乒乓球队更高举起毛泽东思想伟大红旗，从胜利走向更大胜利"},{"type":"paragraph","text":"参加杭州乒乓球邀请赛的全体人员表示决心，努力学习，把乒乓球运动的水平推向新的高峰"},{"type":"paragraph","text":"新华社二十六日讯　中国共产主义青年团中央委员会今天打电报给参加第二十八届世界乒乓球锦标赛的中国乒乓球队，热烈祝贺他们在这次比赛中取得的巨大胜利。"},{"type":"paragraph","text":"电报说，“你们在本届世界乒乓球锦标赛中取得的伟大胜利，向世界人民显示了我国社会主义制度的无比优越性，表明了我国群众体育运动的巨大成就，证明了用毛泽东思想武装起来的我国运动员能够从胜利走向更大的胜利。"},{"type":"paragraph","text":"“希望你们更高地举起毛泽东思想伟大红旗，认真地总结自己的经验，认真地学习别人的长处，突出政治，苦练过硬本领，不骄不躁，继续前进。”"},{"type":"paragraph","text":"新华社二十六日讯　对外文化联络委员会今天打电报给参加第二十八届世界乒乓球锦标赛中国乒乓球代表团团长荣高棠和代表团全体同志，祝贺他们在这届锦标赛中取得的巨大胜利，并向他们表示慰问。"},{"type":"paragraph","text":"电报说，你们荣获第二十八届世界乒乓球锦标赛五项冠军等一系列胜利的捷报传来，举国欢腾。这次胜利是你们为了革命，为了祖国打球，活学活用毛泽东思想的胜利。希望你们遵循毛主席的教导，戒骄戒躁，为进一步提高球艺而继续努力，并胜利地完成在非洲和欧洲几个国家友好访问的任务。"},{"type":"paragraph","text":"新华社杭州二十五日电参加一九六五年杭州乒乓球邀请赛的全体人员，今天打电报给参加第二十八届世界乒乓球锦标赛的中国乒乓球队，热烈祝贺他们在这次比赛中取得的辉煌胜利。"},{"type":"paragraph","text":"电报说，“捷报传来的时候，我们奔走相告，十分兴奋，有不少同志激动得热泪盈眶，说不出话来。”"},{"type":"paragraph","text":"电报说，“这是你们活学活用毛主席著作，高举毛泽东思想伟大红旗的结果。我们要高呼：我们伟大的祖国万岁！伟大的中国共产党万岁！伟大的毛主席万岁！”"},{"type":"paragraph","text":"电报接着说，“我们决心向你们学习，在毛泽东思想伟大红旗的指引下，胸怀祖国，放眼世界，勤学苦练，不断总结，把乒乓球运动水平推向新的高峰！”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2960f9200e"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
