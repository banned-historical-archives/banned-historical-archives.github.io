财产处理办法的通令","authors":[],"dates":[{"year":1949,"month":12,"day":19}],"is_range_date":false,"parts":[{"text":"东北人民政府关于一贯道等反动会门的财产处理办法的通令","type":"title"},{"text":"据哈尔滨、辽西、吉林、旅大、黑龙江等地报告，在反会门工作中曾暂时查封、冻结一贯道等会门财产计有工厂13座、商店26所、房屋4处共166间。这些财产连同其他金、银、财物都是一贯道等职业会门头子，以迷信形式非法地欺骗诈取道徒或群众的财物；但其中有的（大部份）是封建会门的公产，用来作为进行反动会门活动基金经费的；有的（少数的）是会门头子个人的，为了照顾其个人家庭生活，减少社会负担，故在处理上应当加以区别，因此特决定下列的处理办法：","type":"paragraph"},{"text":"一、凡系一贯道等封建会门机关之公产，不论金、银、货币、各种物品以及其所置的房产、所开设的工厂、商店等，一律由政府宣布没收之。","type":"paragraph"},{"text":"二、凡为一贯道头子或道徒家庭的私有财产，或虽在一贯道机关内部存放或为一贯道机关所借用，经查明确系私人财产者，均不得没收，亦不得籍故是头子诈取来的财物，而采取清算办法没收。","type":"paragraph"},{"text":"三、凡被没收之财产或不应没收之财产，均由市、县公安机关提供调查材料，经省人民政府切实审查批准后，由市、县人民法院公开宣判执行。","type":"paragraph"},{"text":"四、决定没收之工厂、商店、除带有投机及不正当者外，一律由市、县人民政府继续经营，不得分散、停业。","type":"paragraph"},{"text":"五、决定没收之金、银、纸币、物品以及由人民政府接管经营的工厂、商店之利润，应全部或大部用于游民的劳动改造与其他社会公益事业。由市、县人民政府提出方案，经省人民政府批准后动用之。","type":"paragraph"},{"text":"此令！","type":"paragraph"},{"text":" 主席　高岗副主席　李富春　林枫　高崇民","type":"paragraph"}],"comments":[],"origin":"《取缔反动会道门工作历史资料汇编（1948－1992年）》，公安部一局编印， 2009年。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0c0867c4a9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
