script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"黔南布依族苗族自治州有三万户农业社社员要求退社","authors":["杨炫之","鲁兴伦"],"dates":[{"year":1956,"month":11,"day":21}],"is_range_date":false,"parts":[{"text":"黔南布依族苗族自治州有三万户农业社社员要求退社","type":"title"},{"text":"杨炫之鲁兴伦","type":"authors"},{"text":"新华社贵阳２１日讯　秋收结束后，在半社会主义农业合作化的黔南布依族苗族自治州许多农业社里，有三万多户各族社员提出退社要求，约占全州入社农户的１０％。此外，还有不少社员虽然没有公开提出退社要求，但生产上表现很消极。","type":"paragraph"},{"text":"这些要求退社的社员大部分分布在自治州境内的边远县。今年这些县的粮食生产普遍得到空前丰收，但由于今春实现农业合作化后，各县忽视对副业生产的领导，结果不少社员都比去年减少了收入，引起社员对农业社怀疑和不满。据长顺、紫云、平塘、罗甸、安龙等县一千七百多个社的不完全统计，有５０％多的社因忽视副业生产，不能保证９０％的社员增加收放。平塘县坚决要求退社的社员一般都有“三怕”：怕明年再减产；怕政府不供应粮食；怕天天集体做活，无钱买米。前飞农业社副主任潘向民收入减少，影响家庭和睦，因而上吊死了。","type":"paragraph"},{"text":"自治州目前已有半数以上农户参加了高级农业社。在秋收分配中，因副业生产普遍减产和中农失去土地报酬而提出退社的社员中，中农占７０％左右。同时，全州约有半数初级社分布在边远地区，土地报酬一般只占３０％，个别的只占２０％，也使不少中农因此减少收入。","type":"paragraph"},{"text":"这些地区农业社各生产队间还因互相瞒产而影响合理分配。据平塘县九十七个社统计，就瞒产两百多万斤。有的社采用集体吃饭不记账的方法瞒产。据荔波、三都两县十二个农业社的调查，每队都有程度不同的瞒产。三都县甲化农业社把隐瞒的粮食暗地分配，结果造成多劳少得或少劳多得的现象。还有一部分社分配时多扣了粮食，也影响了社员收入。","type":"paragraph"},{"text":"社员闹退社愈凶，社干部愈感到难于领导。现在各地都有许多社干部不愿干下去了。三都、镇宁等县有不少社干部因此造成有名无实，处于看势而行的情况。平塘县有六个高级社已造成解体现象。","type":"paragraph"},{"text":"社员们由于减产而提出退社，是在秋收中期开始的，但是不少地区只采取粗暴措施。罗甸、三都、平塘等县的农村工作干部都为了避免瞒产，就在农业社生产队间采用互相换人收割，称谷或站岗放哨等方法进行制止。这种方法，有的领导部门并作为经验加以推广。秋收初期，中共贞丰县委员会农村工作部甚至对农村工作干部说，对要求退社的社员应该“轻的批评，重的处理”。荔波县的农业社生产队间除采用以上办法外，有的干部还在农业社里开展“反贪污”斗争。因此，使社员对党和人民政府的政策更发生了误解。","type":"paragraph"},{"text":"来源：１９５６年１１月２１日新华社《内部参考》","type":"paragraph"}],"comments":[],"origin":"美国图书馆收藏","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"16624e716e"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
