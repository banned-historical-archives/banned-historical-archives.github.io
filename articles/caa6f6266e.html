:"内务部关于受处分人员的工龄计算和工资级别问题的答复","dates":[{"year":1959,"month":10,"day":20}],"is_range_date":false,"authors":["内务部"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"铁道部政治部审干办公室, 审干工作政策选编(三), 364","tags":[{"name":"处分","type":"主题/事件"},{"name":"工龄","type":"主题/事件"},{"name":"工资","type":"主题/事件"}],"parts":[{"type":"title","text":"内务部关于受处分人员的工龄计算和工资级别问题的答复"},{"type":"subtitle","text":"（一九五九年十月二十日）"},{"type":"paragraph","text":"询问关于受处分人员的工龄计算和工资级别问题。对这一问题，现在尚无统一规定。我们的意见是：当所受开除留用察看处分者恢复于受降级、降职处分的是否恢复原工资级别问题，只要受原降级、降职处分是正确的，即不能恢复工资级别。至于对受处分的人员，其错误确实改正之后，所在机关认为确实不合理的，可在统一调整级别时，作为升级问题统一解决。你们认为如何，如认为可以这样处理，请转告该厂。"},{"type":"paragraph","text":"(摘自〔1959〕内人事字第569号文件)"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"caa6f6266e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
