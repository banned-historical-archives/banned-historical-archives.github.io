hors":["史文久"],"dates":[{"year":1950,"month":10,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"史文久"},{"type":"paragraph","text":"编辑同志:我前几天就诊公济医院内科，诊断是缺乏铁剂，所以有瘦弱现象，主治医师当即开以(Blaudls，so’)红色补丸五十粒的处方笺，向该院配药，价格为一万五千元，而市上同样的红色补丸是一千粒只售二万五千元，两者相差十五倍之钜，显然是暴利剥削；这对就医的劳动群众来说是不应该的!希望术生当局对这事进行处理，并请公济医院诚恳答复。"},{"type":"paragraph","text":"还有公济医院内科护士的态度傲慢，缺乏服务观点，希院方加强学习及予以教育。"},{"type":"paragraph","text":"此外我建议内科及肺科的候诊室应该扩大并分开，以免病菌传染的危险。此致敬礼上"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"64b4cf2e3e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
