art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"首都医药卫生界隆重集会纪念毛泽东“救死扶伤，实行革命的人道主义”题词发表50周年","authors":["邹沛颜"],"parts":[{"type":"paragraph","text":"李德生等出席了纪念大会。"},{"type":"paragraph","text":"50年前，正值中国共产党领导的抗日战争进入敌我双方对峙的紧要关头，在抗日前线，几乎每时每刻都有抗日救国将士流血牺牲。我军医务人员在极端艰苦的条件下，冒着枪林弹雨抢救伤病员，有的为此献出生命。为鼓舞和勉励全军医务工作者，毛泽东同志接受中国医科大学（前身为八路军卫生学校）第14期全体学员的请求，写下了“救死扶伤，实行革命的人道主义”这一光辉题词。"},{"type":"paragraph","text":"中国医科大学校长李厚文在纪念大会上说，半个世纪以来，中国医科大学已培养了2万多名各类高级医学人才，其中相当一部分人已成为国内外有影响的知名专家、学者。在纪念毛泽东同志题词发表50周年之际，恰逢医大建校60周年，江泽民、邓小平、杨尚昆、李鹏、陈云、李先念等领导分别为医大题词或题字，是对全体师生的极大鞭策和鼓舞。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4e3d43afc6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
