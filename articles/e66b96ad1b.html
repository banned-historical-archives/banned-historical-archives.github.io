":[{"year":1976,"month":3,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛泽东主席会见凯山同志率领的老挝党政代表团"},{"type":"paragraph","text":"毛主席对凯山同志率代表团来我国访问表示热烈欢迎。毛主席同凯山·丰威汉、奔·西巴色和西宋喷·洛万赛同志在非常亲切的气氛中进行了友好的谈话。当凯山同志说，老挝人民感谢中国给予老挝革命斗争的支持时，毛主席说：应该感谢你们，是你们帮助了我们。　华国锋、姚文元同志会见时在座"},{"type":"paragraph","text":"新华社一九七六年三月十七日讯　毛泽东主席今天下午会见了以老挝人民革命党总书记、老挝人民民主共和国政府总理凯山·丰威汉为团长，老挝人民革命党中央委员会政治局委员、政府副总理兼外交部长奔·西巴色为副团长的老挝党政代表团。"},{"type":"paragraph","text":"参加会见的代表团团员是：老挝人民革命党中央委员会政治局委员、最高人民议会副主席西宋喷·洛万赛，老挝人民革命党中央委员会委员、总理府部长、老挝人民解放军总参谋长西沙瓦·乔本潘，老挝人民革命党中央委员会委员、工商业部长梅索·塞宋平，老挝人民革命党中央委员会候补委员、新闻、宣传、文化和游览部长西沙纳·西山，老挝驻中国大使塔汶·西扎伦。"},{"type":"paragraph","text":"会见时，毛泽东同志对凯山·丰威汉同志率老挝党政代表团前来我国访问表示热烈欢迎，并且同全体老挝贵宾一一握手问候。随后，毛泽东同志同凯山·丰威汉、奔·西巴色和西宋喷·洛万赛同志在非常亲切的气氛中进行了友好的谈话。当凯山·丰威汉同志说，中国共产党、中国政府和伟大的中国人民，特别是毛泽东主席同志给予老挝革命斗争许多宝贵的支持和关怀，老挝人民对此表示感谢时，毛泽东同志说：应该感谢你们，是你们帮助了我们。"},{"type":"paragraph","text":"会见时在座的有中共中央政治局委员、国务院代总理华国锋，中共中央政治局委员姚文元。（附图片）"},{"type":"paragraph","text":"毛泽东主席同凯山·丰威汉同志亲切握手。新华社记者摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"姚文元","type":"人物"},{"name":"华国锋","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]},{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"毛泽东主席会见凯山同志率领的老挝党政代表团","authors":[],"dates":[{"year":1976,"month":3,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席对凯山同志率代表团来我国访问表示热烈欢迎，同凯山·丰威汉、奔·西巴色和西宋喷·洛万赛同志在非常亲切的气氛中进行了友好的谈话。当凯山同志代表老挝人民感谢中国人民给予老挝革命斗争的支持时，毛主席说:应该感谢你们，是你们帮助了我们。会见时华国锋、姚文元同志在座。"},{"type":"paragraph","text":"新华社北京一九七六年三月十七日电　毛泽东主席今天下午会见了以老挝人民革命党总书记、老挝人民民主共和国政府总理凯山·丰威汉为团长，老挝人民革命党中央委员会政治局委员、政府副总理兼外交部长奔·西巴色为副团长的老挝党政代表团。"},{"type":"paragraph","text":"参加会见的代表团团员是:老挝人民革命党中央委员会政治局委员、最高人民议会副主席西宋喷·洛万赛，老挝人民革命党中央委员会委员、总理府部长、老挝人民解放军总参谋长西沙瓦·乔本潘，老挝人民革命党中央委员会委员、工商业部长梅索·塞宋平，老挝人民革命党中央委员会候补委员、新闻、宣传、文化和游览部长西沙纳·西山，老挝驻中国大使塔汶·西扎伦。"},{"type":"paragraph","text":"会见时，毛泽东同志对凯山·丰威汉同志率老挝党政代表团前来我国访问表示热烈欢迎，并且同全体老挝贵宾一一握手问候。随后，毛
