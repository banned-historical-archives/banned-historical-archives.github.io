thubusercontent.com/banned-historical-archives/banned-historical-archives3/main/b2b674a1-9042-4317-a7b8-de4267668ba5.pdf"],"article":{"title":"对《清华大学物理教研组对待教师宁“左”勿右》一文的批示","alias":"","parts":[{"type":"paragraph","text":"七律和柳亚子先生"},{"type":"paragraph","text":"一九四九年四月二十九日三十一年，（三十一年还旧国，落花时节读华章)一九一九年离开北京，一九四九年还北京。旧国之国：都城。不是Ltoho（国家），也不是Country（首都））"},{"type":"paragraph","text":"浣溪沙和柳亚子先生"},{"type":"paragraph","text":"一九五〇年十月乐奏：（万方乐奏有于）这里误置为“奏乐”，应改。（现版已改正）"},{"type":"paragraph","text":"水调歌头游泳"},{"type":"paragraph","text":"一九五六年六月长沙水： (才饮长沙水)"},{"type":"paragraph","text":"民谣：“常德山山有德，长沙水水无沙”。所谓长沙水，在常德东，有一个有名的“白沙井”。武昌鱼：（又食武昌鱼）"},{"type":"paragraph","text":"三国孙权一度从京口（江）迁都武昌，官僚、绅士、地主及富裕阶层不悦，反对迁都，造出口号云：“宁饮扬州（建业）水，不食武昌鱼”。那时的扬州人，心情如此，现在改变了。武昌鱼是颇有味道的。"},{"type":"paragraph","text":"对《清华大学物理教研粗对待教师"},{"type":"paragraph","text":"宁“左”勿右》一文的批示"},{"type":"paragraph","text":"（一九五八年十二月二十二日）同志"},{"type":"paragraph","text":"建议将此件印发给全国一切大专学校，科学研究机关的党委、总支、支委阅读，并讨论一次，端正方向，争取一切可能争取的教授、讲师、助教、研究人员，为无产阶级的教育事业和文化科学事业服务，你看如何？文学艺术团体、报社杂志社和出版机关的党委、总支），也应发去，也应讨论一次，请酌定。"}],"authors":["毛泽东"],"dates":[{"year":1958,"month":12,"day":22}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":194,"page_end":194},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c0b71c0d78"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
