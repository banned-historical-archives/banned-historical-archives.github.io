"year":1950,"month":5,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"给毛主席朱总司令的一封信毛主席朱总司令："},{"type":"paragraph","text":"四月二十五日晚上，我在彭城戏院看电影，影片是人民政治协商会议的记录。电影里，毛主席、朱总司令和其他的代表们出现了。看电影的全体同志们，一看见毛主席，大家都鼓掌欢迎，对朱总司令亦是同样的欢迎。"},{"type":"paragraph","text":"毛主席、朱总司令：因为你二人是人民英明的领导者，给全中国人民谋幸福的，所以全中国人民都很感谢你们，在电影上看见你们就像亲眼看见救命的恩人一般。在毛主席和朱总司令出现在银幕上的时候，看电影的同志就没有人说话了。看罢后，大家都很高兴地说：“我见了毛主席朱总司令了！”祝你们身体健康"},{"type":"paragraph","text":"河北省磁县彭城镇县财政自给管理处  张发家"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"27e8e7df19"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
