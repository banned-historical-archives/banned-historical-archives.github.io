<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共中央转发最高人民法院党组等关于处理投案自首分子的意见的报告","authors":[],"dates":[{"year":1956,"month":7,"day":6}],"is_range_date":false,"parts":[{"text":"中共中央转发最高人民法院党组等关于处理投案自首分子的意见的报告","type":"title"},{"text":"各省委、市委、自治区党委、地委、县市委：","type":"appellation"},{"text":"中央同意最高人民法院、最高人民检察院和中央公安部党组关于处理投案自首分子的意见，现在发给你们，望有关党委领导执行。","type":"paragraph"},{"text":" 中央1956年7月6日","type":"paragraph"},{"text":"关于处理投案自首分子的意见的报告","type":"subtitle"},{"text":"中央：","type":"appellation"},{"text":"自去冬以来，随着社会主义建设和社会主义改造取得决定性的胜利和肃清反革命分子斗争的胜利，反革命分子内部出现了很大的动摇和分化瓦解的情况，这种情况在《1956年到1967年全国农业发展纲要（草案）》公布后表现得更加显著了。目前全国投案自首的反革命分子和其他犯罪分子，据统计已达40万人以上，并且其中不少是罪恶重大、隐蔽很深的重要反革命分子，因此，及时地、正确地处理投案自首分子已经成为当前进一步肃清反革命分子斗争的一项重要工作。但是，有关机关对处理投案自首分子的职权范围和需要履行的法律程序，目前还没有统一的规定，各地的做法也很不一致，因而出现了一些拖延现象，造成了积案，影响了迅速分化瓦解敌人的效果。这个问题迫切地需要加以解决，以便抓紧利用目前的有利时机，开展政治攻势，更大地分化瓦解敌人，彻底肃清一切反革命分子。","type":"paragraph"},{"text":"为了愈快愈好地及时地和合法地处理投案自首分子，经我们研究，认为对于投案自首的反革命分子和其他犯罪分子，可以根据不同情况，分别采取以下办法予以处理：","type":"paragraph"},{"text":"一、凡罪行轻微，或者仅有一般历史罪恶没有现行活动，不需要追究刑事责任的人，由公安机关作出决定，通知本人，并抄致检察机关备查。","type":"paragraph"},{"text":"二、按其罪行应该追究刑事责任，但经查实确系真诚坦白或者有立功表现，认为可以免予追究刑事责任的人，由检察机关作出不起诉的决定。","type":"paragraph"},{"text":"三、经查实虽系真诚坦白或者有立功表现、应予从宽处理，但仍需要判刑的人，由检察机关起诉，由法院判决。","type":"paragraph"},{"text":"为了避免在大批地处理投案自首分子的案件中，发生“左”的或者右的偏差，发生意见上的分歧，党委应该指定一个党委副书记并包括上述三个司法机关中的干部组织临时审查小组，先在党内取得一致的意见，有不同意见时，报党委审核。","type":"paragraph"},{"text":"关于处理投案自首分子的政策原则和内部批准制度，必须按照1956年1月中央《关于处理反革命分子和各种犯罪分子自首问题的指示》的规定办理。","type":"paragraph"},{"text":"以上意见，如中央认为适当，请批发各级党委掌握执行。","type":"paragraph"},{"text":" 最高人民法院党组公安部党组最高人民检察院党组1956年5月3日","type":"paragraph"}],"comments":[],"origin":"根据文件的原件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b5b990adf1"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
