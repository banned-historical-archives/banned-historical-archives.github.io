ical-archives/banned-historical-archives0/main/maoquanji30.pdf"],"article":{"title":"给黄炎培的信","alias":"","parts":[{"type":"paragraph","text":"给黄炎培的信"},{"type":"paragraph","text":"（1951年2月17日）黄任老："},{"type":"paragraph","text":"刚才送上广东纠正宽大无边情报一份，现又送上广西的一份，请参阅。这两处是最典型的例子，其他地方不如此两处之甚，但亦大体相去不远，引起群众不满，极为普遍。不杀匪首和惯匪，则匪剿不净，且越剿越多。不杀恶霸，则农会不能组成，农民不敢分田。不杀重要的特务，则破坏暗杀层出不穷。总之，对匪首、恶霸、特务（重要的）必须采取坚决镇压的政策，群众才能翻身，人民政权才能巩固。当然，对可条可不杀的那一部分人，应当判处徒刑，或交群众监视，用劳动去改造之，不要杀。如同宽大应有边，镇压也应有边，无边是不对的，已经解决了问题，群众已经满意了的地区，即不应再杀人了。"},{"type":"paragraph","text":"顺致敬意！"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"二月十七日"},{"type":"paragraph","text":"[1]黄炎培，字任之，民主建国会主要负责人，当时任中央人民政府委员、政务院副总理。"}],"authors":["毛泽东"],"dates":[{"year":1951,"month":2,"day":17}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":122,"page_end":122},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]},{"id":"wenji6","type":"pdf","name":"毛泽东文集第六卷（1999）","internal":false,"official":true,"author":"中央文献研究室","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/wenji6.pdf"],"article":{"title":"给黄炎培的信","description":"","dates":[{"year":1951,"month":2,"day":17}],"parts":[{"text":"给黄炎培的信","type":"title"},{"type":"appellation","text":"黄任老："},{"type":"paragraph","text":"刚才送上广东纠正宽大无边情报一份，现又送上广西的一份，请参阅。这两处是最典型的例子，其他地方不如此两处之甚，但亦大体相去不远，引起群众不满，极为普遍。不杀匪首和惯匪，则匪剿不净，且越剿越多。不杀恶霸，则农会不能组成，农民不敢分田。不杀重要的特务，则破坏、暗杀层出不穷。总之，对匪首、恶霸、特务（重要的）必须采取坚决镇压的政策，群众才能翻身，人民政权才能巩固。当然，对可杀可不杀的那一部分人，应当判处徒刑，或交群众监视，用劳动去改造之，不要杀。如同宽大应有边，镇压也应有边，无边是不对的，已经解决了问题，群众已经满意了的地区，即不应再杀人了。顺致敬意！"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"二月十七日"},{"type":"paragraph","text":"根据人民出版社一九八三年出版的"},{"type":"paragraph","text":"《毛泽东书信选集》刊印。"}],"comment_pivots":[{"part_idx":0,"offset":4,"index":1}],"is_range_date":false,"authors":["毛泽东"],"comments":["黄炎培，字任之，中国民主建国会主要负责人。当时任中央人民政府委员、政务院副总理。"],"page_start":155,"page_end":155,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"
