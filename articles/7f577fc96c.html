" crossorigin="">{"props":{"pageProps":{"books":[{"id":"0e3ac1d5-ec74-4fd2-8da9-5d4322f87271","name":"为毛主席而战——文革重庆大武斗实录（三联书店2010年）","internal":false,"official":false,"type":"pdf","author":"何蜀著，三联书店2010年","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives3/main/0e3ac1d5-ec74-4fd2-8da9-5d4322f87271.pdf"],"article":{"title":"后记","alias":"","parts":[{"type":"paragraph","text":"后记记"},{"type":"paragraph","text":"本的写作，是一个长期累的过程"},{"type":"paragraph","text":"要写好重度武门，一要有资料·二要有对亲历者的探筋·而对于我来，这雨方面都很久缺·盘管重是我的家乡，自出生后我就一直生活在里度，但怡恰在重文革人武门期开我基本上在外地·对家乡发生的各种重大事件多俫间接隙解面少有亲实感·家裡搜集的--些小报曾由我父亲（他喜款微事有条理）精心装订成册，已经颇为可观，但是到了1970年「一打三反；期间·街道居民委员会三令万申，露属告藏各家各户交出文革！派性气傅品」！否期今后查到就要办云云·我的外婆成大提心吊瞻·再三叮端我们不要再保存那些堆在床下可能惹的资料了，那时百姓家狸居但面横狭小·根本无地方可以收藏，加上我父亲又是「摘帽右派，·文革中又被批门、游街·那时正在工作单位上蓝警第霸，经不起任何新的打擎，因此我只好忍痛把那一册册小报拆开·选取极少份内容最重要的留下，其馀的全部睦续在烧火煮饭时化成了灰盛。"},{"type":"paragraph","text":"文革结束以后，我文重新开始搜集资料，总算陵续文横累了一些。到20世纪90年代中期·我的写作与趣已经徙文学转向了魔史·这时想的虽然证是要写文化人革命：但已经不再是想写虚橘的小説而是想写真实的历史，不是想歌颂那场「史无前例的大乎命」而是想反思那场史无前例的大勤了·1994年：我开始学用电胸，学智打字时打下的第一行字就是重膛文站武门大事记」，我把录人重腹文革大事记当作打字额智·用始了新的写作。"},{"type":"paragraph","text":"写作有关重大武门的史，遗得益于许多当年常事人和知情者的支持助·其中，特别需要提到的是当年重度反到底派的「一号勤务员」、年长我-「的李木森·在我他整理回忆录前后，我们建立起了深厚的友·虽然封文革和对毛泽束的记藏与价不完全一致，但我们相互能坦诚相待。通过他，我睦结藏了当年重度雨大派累粗织的一些风云人物，同其中一些人建立起了友谊。他们给我讲述了许多亲身经历，提供了许多鲜活的细节，使我对那场震世人的人武门有了更为真切的解和感受。"},{"type":"paragraph","text":"此外，同样对重度大武门进行了关注和研究的一些重座朋友，如文革小帮收藏家张瑞华先生，最早提写作重魔武门纪实作品社志未酬英年早逝的于琦先生，最早写作业出版了有关重度文吊的长篇回忆录的周孜仁先生·最早"},{"type":"paragraph","text":"=研究重庆沙坪公围武门死难者墓群的陈嘎文先生·曾亲历重武门业对--些武门事件展开了真调查研究的韩平藻先生，曾亲重庆武门校早写出了有开纪寳作品的李正权先生·对重废武门墓群及其相关背景进行了大量追踏探访的曾钟先生.因母亲在武门中无辜遇而辰期成为沙坪公国文革墓群义务宣员的席度生先生，遗在鼻国他乡续关注研究重爱武门的人类学学者张宏先生等，都以他们搏集的资料和他们不同角度的著述及研究成果、亲历见开给我的黛作无价提供了很大的常助和取发。"},{"type":"paragraph","text":"当然，由于官方收藏的历史档案仍不解密（重度档案馆的文革时期档案要有中共市委常委的批示才能有限地查阔），对文革武门中的一些重要倩况（比如武门中到底死了多少人）仍然难于查清·这只有等待来日了。"},{"type":"paragraph","text":"「前事不忘，后事之师」，这是有些人经常用来教训东粼的，然而对自己的一些「前事，似乎希人们能快忘·但颠此普能为拒道忘的人们提供点有用的参考。"},{"type":"paragraph","text":"2010年春筋于重爱风江阁"}],"authors":["何蜀"],"dates":[{"year":2010,"month":8}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":387,"page_end":388},"tags":[{"name":"重庆文革","type":"人物"},{"name":"一打三反","type":"主题/事件"},{"name":"派性","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7f577fc96c"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
