tart":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"坚决地执行毛主席的最新指示 正确处理上下级关系和干群关系","authors":[],"parts":[{"type":"paragraph","text":"贵州省革委会虚心听取来自斗争第一线的委员和革命群众的批评、意见，改进工作；深入群众，向群众学习，向群众请教，做群众的小学生。"},{"type":"paragraph","text":"新华社贵阳二十六日电 在伟大领袖毛主席要斗私，批修的伟大号召鼓舞下，贵州省革命委员会最近召开全体委员会议，虚心听取来自斗争第一线的委员和部分革命群众组织负责人的意见，改进工作，正确处理上下级关系，正确处理干部和群众的关系。"},{"type":"paragraph","text":"这次会议首先认真学习和讨论了毛主席视察华北、中南和华东地区时所作的一系列极为重要的指示，并且认真总结了前一阶段运动的经验教训，结合本省的实际情况，订出了贯彻执行毛主席最新指示的具体措施。会议期间，省革命委员会常委会遵循毛主席“发扬成绩，纠正错误，以利再战”的教导，运用“团结——批评和自我批评——团结”的公式，开展了批评和自我批评。来自全省各地斗争第一线的委员们和群众组织的负责人，开诚布公地对常委会的工作和每个常委的工作作风，提出了善意的批评和意见。常委会专门开会认真研究了大家的批评和意见，并立即作出了改进工作的具体措施。整个会议，充分发扬了民主，开得既严肃、紧张，又团结、活泼。"},{"type":"paragraph","text":"贵州省革命委员会常委会的同志们，本着“言者无罪，闻者足戒”，“有则改之，无则加勉”的精神，虚心听取大家的批评和建议，会后，他们雷厉风行，立即付诸于行动。他们深入到群众中去，一方面原原本本向广大群众宣读毛主席的最新指示，一方面听取下面各级革命委员会和革命群众的批评意见，向群众学习，向群众请教，做群众的小学生。省革委会主任委员李再含和副主任委员张明已下到惠水县去，副主任委员刘安民到了最边远的兴义县去，其他常委也分别下到工厂、农村、学校等基层单位，只留下五分之一的人员在省革委会主持日常工作。"}],"alias":""},"tags":[{"name":"贵州文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a625657d72"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
