uthors":[],"dates":[{"year":1967,"month":11,"day":4}],"is_range_date":false,"parts":[{"text":"关于查阅中央档案馆档案材料的规定 （中央文革小组在一九六七年十一月四日批准）","type":"title"},{"text":"为了确保中央档案馆所存档案材料的安全，堵塞漏洞，防止失密、泄密、窃密，必须高举毛泽东思想伟大红旗，突出无产阶级政治，加强领导，严格管理，使档案工作忠实地为以毛主席为首的无产阶级司令部服务，特作如下规定：","type":"paragraph"},{"text":"（一）凡是需要到中央档案馆查阅档案材料，均需先经中央办公厅汪东兴、戚本禹同志审定，再送恩来、伯达、康生、江青、成武同志共同审查签署批准。凡经过批准查阅的档案材料，只准在本馆阅览，不准带出，不准复制、摘抄。若需复制、摘抄时，需经上述同志特许批准。","type":"paragraph"},{"text":"（二）凡是申请到中央档案馆查阅档案材料，必须把查阅问题的范围、年代、要点以及经办人员开列清楚，送请中央办公厅审定。","type":"paragraph"},{"text":"（三）凡是到中央档案馆查阅档案材料的工作人员，必须是党员干部，政治可靠。并需有两人共同进行此项工作。进馆后，中央档案应派出一人共同协助查阅。","type":"paragraph"},{"text":"（四）查阅档案材料的批件，只限一次有效。如需再查，须重新报请审批。","type":"paragraph"}],"comments":[],"origin":"根据中共中央办公厅、国务院秘书厅文化革命联合接待室编印《无产阶级文化大革命有关文件汇集 （第四集）》， 北京：1967年11月","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"中央文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a69146743b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
