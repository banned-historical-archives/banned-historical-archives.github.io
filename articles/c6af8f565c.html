<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"回忆对比激发职工阶级觉悟 由浅入深顺着黑线狠挖毒根红星绸布店高举毛泽东思想伟大红旗把大批判搞得扎扎实实","authors":[],"dates":[{"year":1967,"month":5,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　上海市红星绸布商店(原老九纶)的无产阶级革命派，高举革命的批判大旗，根据本单位老年工人多、工作人员少、没有党内走资本主义道路当权派的特点，初步解决了大批判和本单位的斗、批、改结合的问题，深入细致地开展大批判运动。"},{"type":"paragraph","text":"大批判运动刚开始的时候，红星绸布商店有不少同志认为:党内头号走资本主义道路的当权派我们没有见过，他的话我们没有听见过，他的罪行那么多，但与我们商店联系不起来；店里又没有党内走资本主义道路的当权派，我们怎么把大批判和本单位的斗、批、改结合起来呢?"},{"type":"paragraph","text":"这个店的无产阶级革命派，经过研究讨论，找出了产生以上这些思想的原因是:不少同志没有看到党内头号走资本主义道路的当权派的手伸得很长，他散布的流毒很广。群众一时看不到这一点，正需要深入地开展批判斗争。于是，他们针对本单位老年工人多的特点，首先组织大家进行回忆对比，驳斥“剥削无罪”的谬论，激发大家的阶级觉悟。再联系本行业的特点，组织群众活学活用毛主席著作，用毛泽东思想来找出党内头号走资本主义道路的当权派贯彻到商业战线上的黑线，从群众最熟悉的问题着手，由浅入深地将这条黑线批深批透，与本单位的斗、批、改紧密结合起来。"},{"type":"paragraph","text":"在此基础上，全店三个小组又有领导、有计划地学习了毛主席关于“政治工作是一切经济工作的生命线”等教导，学习了林彪同志关于突出政治，坚持四个第一，搞好思想革命化的指示，进行了座谈，分析了以前商店里两条道路，两种经营方式斗争的情况，看到了党内头号走资本主义道路的当权派在商业战线上大搞“政治落实业务、指标落实到人”、“利润挂帅、指标第一”，尤其是在三年自然灾害时期，还大搞“自负盈亏”、“自由市场”，替资本家叫冤喊屈、大肆吹捧资本家等等的大量罪状，更加激发了全店革命职工要斩断他伸进商店里的魔爪的决心。他们为了把大批判运动广泛、深入、细致、持久地开展下去，各小组又把党内头号走资本主义道路当权派在商业战线上犯下的大量罪行，分成了若干专题，在活学活用毛主席著作的基础上，定时召开专题声讨、批判大会。每抓住他一个反动论点，就分析它所造成的恶果，并用毛泽东思想加以狠狠地批驳。全店三十多名革命职工，将店堂当作战场，在业余时间召开小组会和批判大会。在批判大会上，好多革命职工都一针见血地指出:什么“自由市场”、“利润挂帅”、“自负盈亏”，都是为修正主义大开方便之门。我们无产阶级革命派，就是要突出政治，实现思想革命化，‘把商店办成毛泽东思想的大学校。他们还运用了大字报，漫画，广播台，黑板报、文艺演出等武器，进行宣传、批判，使大批判运动既搞得轰轰烈烈，又搞得扎扎实实，红星绸布商店的全体革命职工，在大批判中紧紧地团结起来，大破“利润、指标第一”等资产阶级经营思想，大立毛泽东思想。他们高举毛泽东思想伟大红旗，时时不忘三尺柜台上的阶级斗争，一切服从于革命利益，进一步改善了同志之间的协作关系，提高了服务质量。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c6af8f565c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
