art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"各国人民要联合起来对付霸权主义","authors":[],"parts":[{"type":"paragraph","text":"据新华社4月10日讯 中共中央副主席邓小平今天上午在人民大会堂会见瑞典首相费尔丁及其主要随行人员，双方进行了友好的交谈。"},{"type":"paragraph","text":"邓小平说，各国人民要联合起来，对付霸权主义。实现和平的手段，就是针锋相对地进行斗争，只有这样才能争取更长时间的和平。"},{"type":"paragraph","text":"他说，目前，我们不要因为波兰问题、中东问题和波斯湾问题，而减少对阿富汗和柬埔寨问题的注意。我们应该把反对霸权主义斗争的第一线放在阿富汗和柬埔寨，给阿富汗和柬埔寨的抵抗力量以切实有效的支持。"},{"type":"paragraph","text":"费尔丁说，我们两国的对外政策的目标是一致的，我们都希望和平，为了维护和平，有必要建立强大的防卫力量。"},{"type":"paragraph","text":"在交谈中，双方都表示希望两国在各方面加强合作，增加往来。"},{"type":"paragraph","text":"国务院副总理兼外交部长黄华会见时在座。"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"21f07cbdf4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
