,"month":1,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"收音机里正在播送着姚文元同志的《评陶铸的两本书》，毛主席著作学习小组的小朋友们围住收音机，圆睁着眼睛在聆听，十岁的吴兵听得格外激动。前几天他和学习小组的小朋友一起办了大批判专栏，画了很多狠批中国赫鲁晓夫的漫画。当大人试着问他们:“为什么办大批判专栏呢?”孩子们毫不含糊地回答:“批判中国赫鲁晓夫是最大的政治呗!”有一次，吴兵从收音机里听到幼儿园小朋友批判中国赫鲁晓夫的节目，他想，全国小朋友都起来批判中国赫鲁晓夫，批判他的资产阶级反动路线了，真是说不出的高兴。这回点名批判反革命两面派陶铸，吴兵激动地想:“嗬!又挖出了一颗‘定时炸弹’。又是一个大胜仗!”"},{"type":"paragraph","text":"当小朋友们听到，陶铸要青年“将来成为航海家、飞行家、科学家、文学家……”，他们气愤极了。说:“对!什么家家家，就是没有工农兵!没有红小兵!”"},{"type":"paragraph","text":"当天，吴兵把自己的感想写在日记里。他用有力的笔写着:“我坚决听毛主席的话，当毛主席的红小兵，做毛主席的红色接班人。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"陶铸","type":"人物"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f131f76256"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
