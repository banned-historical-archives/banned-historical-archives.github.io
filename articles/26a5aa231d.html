<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"毛泽东思想是克敌制胜的根本保证我空军一举全歼入侵美机的光辉胜利是“公”字谱成的凯歌，是对头号野心家的资产阶级个人主义谬论的有力回击","authors":[],"dates":[{"year":1967,"month":5,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社南宁30日电　本社记者评述:我英雄的空军部队二十四日在广西某地上空一举全歼入侵的美国F-4B型战斗机两架的光辉胜利，再一次证明了光焰无际的毛泽东思想是人民解放军取得胜利的最根本的保证，是彻底批判党内头号走资本主义道路当权派最有力的武器。"},{"type":"paragraph","text":"在这次战斗中，入侵的敌机尽管是美帝国主义号称最新式的飞机，但是参战的宋义民等空军战士打击敌机时想的不是它的性能，而是美国飞贼每天都在残杀越南人民，不断打死打伤我渔民，破坏我无产阶级文化大革命的强盗罪行。指战员们为了保卫祖国人民的安全，为了保卫无产阶级文化大革命，为了替阶级兄弟报仇，他们充分发挥了人的因素，一举将敌机击落。"},{"type":"paragraph","text":"毛主席说:“我们这个队伍完全是为着解放人民的，是彻底地为人民的利益工作的。”英雄的空军部队指战员把毛主席的这一教导化为自己的灵魂，以最实际最有力的行动，戳穿了党内头号走资本主义道路当权派所散布的什么“公私溶化”、“吃小亏，占大便宜”等等谬论的反动本质。这次战斗中许多动人的英雄事例再次证明，无私才能无畏。在战斗中，指战员们为什么无所畏惧?这是因为在人民战士的脑海里没有私心杂念，有的只是人民的利益，只是如何更好地歼敌。指战员们说得好:“带着‘公’字迎敌，浑身是胆，勇往直前；如果带着‘私’字迎敌，那就会见到敌机干瞪眼”，“活学活用‘老三篇’的水平，就是我们作战的水平。”因此，在这些用战无不胜的毛泽东思想武装起来的英雄面前，什么在“集体利益中发展个人利益”，“吃小亏，占大便宜”这些资产阶级个人主义，统统被用毛泽东思想武装起来的战士视为仇敌。他们热衷的不是个人利益，而是毛主席教导的完全、彻底为人民服务的崇高思想。人民战士的英雄行为，是用“公”字谱成的凯歌。这次胜利给了党内头号走资本主义道路当权派的奇谈怪论一个有力的回击。"},{"type":"paragraph","text":"这次战斗的胜利还说明，英雄们的成长，正象毛主席所教导的那样，是在阶级斗争的大风大浪中锻炼出来的，而不是象党内头号走资本主义道路当权派要人们关在房子里读《修养》所能“养”出来的。指战员们牢记毛主席的教导:“无产阶级革命事业的接班人，是在群众斗争中产生的，是在革命大风大浪的锻炼中成长的。”那里斗争最激烈，那里斗争最危险，他们就到那里去。指战员们都把参加阶级斗争、参加战斗，作为自己活学活用毛主席著作的活课堂。宋义民回家探亲刚刚四、五天，听到毛主席亲自发动了无产阶级文化大革命，便主动提前回队，投入到紧张的抓革命促战备的火热斗争中。一有敌情，就主动要求打头阵。这次战斗中，宋义民和他的战友们，以灵活机智的战斗行动，密切协同，主动配合，不顾个人安危，共同为击落敌机创造有利条件。正是在这种思想指导下，空军战士杨崇亮不顾生命危险在极短的时间内，以惊人的勇气和力量排除了故障，从而保证了战斗的胜利。他深有体会地说:“参加战斗是对自己活学活用毛主席著作的一次考试，是对自己最好的锻炼。”这些用毛泽东思想哺育出来的、敢于在阶级斗争的第一线锻炼的战士，是真正的英雄，而决不是象党内头号走资本主义道路当权派提倡的什么“闭门思过”，什么靠“修养”当模范。党内头号走资本主义道路当权派的一切谬论在用毛泽东思想武装起来的战士面前，遭到了可耻的、彻底的破产。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"26a5aa231d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
