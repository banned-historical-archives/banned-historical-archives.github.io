script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"澳大利亚共产党（马列主义）主席希尔同志著文　赞扬毛主席亲自缔造和领导的中国人民解放军  在当代最重大的事件——毛主席亲自发动、鼓励和领导的无产阶级文化大革命中，解放军成了支柱","authors":[],"dates":[{"year":1968,"month":8,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"澳大利亚共产党（马列主义）主席希尔同志著文"},{"type":"paragraph","text":"赞扬毛主席亲自缔造和领导的中国人民解放军"},{"type":"paragraph","text":"在当代最重大的事件——毛主席亲自发动、鼓励和领导的无产阶级文化大革命中，解放军成了支柱"},{"type":"paragraph","text":"新华社墨尔本八日电　澳大利亚共产党（马克思列宁主义）主席希尔同志，八日在《先锋报》上发表题为《世界人民欢呼中国人民解放军建军四十一周年》的文章，全文如下："},{"type":"paragraph","text":"中国人民正在庆祝人民解放军建军四十一周年。全世界一切被压迫人民同中国人民一样欢欣鼓舞。他们尤其高兴的是因为解放军是建立在无产阶级国际主义基础上的一支军队；它是为世界工人事业服务的。"},{"type":"paragraph","text":"解放军是毛泽东的天才缔造出来的。马克思、恩格斯和列宁都是伟大的天才。他们超出了他们同时代的人。"},{"type":"paragraph","text":"在我们的时代里，世界上有许多伟大的马克思列宁主义者，但是只有一个马克思列宁主义的天才，那就是毛主席。他超出了和他同时代的人。"},{"type":"paragraph","text":"承认这一点并照此行事，对无产阶级革命的胜利是很重要的。"},{"type":"paragraph","text":"马克思、恩格斯、列宁和斯大林都注意到军队的问题。他们没有一个人有系统地发展关于人民军队的理论和实践，这样说决不是贬低他们。历史环境把这个工作留给了毛主席。这只是他对马克思列宁主义作出的许多杰出贡献之一。"},{"type":"paragraph","text":"马克思、恩格斯、列宁和斯大林对国家机器的暴力都作过分析。他们指出，国家机器是一个阶级压迫另一个阶级的暴力工具。毛主席关于“枪杆子里面出政权”的著名论断对此作了全面的概括。"},{"type":"paragraph","text":"革命工人阶级必须用枪杆子来回答阶级压迫者的枪杆子。"},{"type":"paragraph","text":"因此，中国人民在毛泽东的天才指导下，建立了自己的军队。人民解放军把理论和实践紧密结合，他们打败了装备精良的国民党、日本和美帝国主义的军队。"},{"type":"paragraph","text":"解放军的经验、理论和实践鼓舞了今天越南、缅甸、马来亚、印度尼西亚、拉丁美洲、巴勒斯坦、非洲的解放斗争。如果没有解放军的理论、实践和榜样，我们将会处于什么样的境地呢？"},{"type":"paragraph","text":"没有一个人民的军队，便没有人民的一切。反动派就是希望人民什么都没有。他们大叫大嚷反对枪杆子。但是，他们自己却总是使用枪杆子。他们要垄断枪杆子。解放军指出了打破这种垄断的办法。这种理论、实践和榜样具有世界性的重要意义。"},{"type":"paragraph","text":"在中国解放以后，中国赫鲁晓夫及其支持者进行复辟资本主义。枪杆子里面出政权，解放军是中国工农政权的枪杆子。中国赫鲁晓夫想从中国工农手中夺走这些枪杆子，重新交给中国资产阶级和他们的国民党，这是枉费心机。"},{"type":"paragraph","text":"毛主席坚决认为，这些枪杆子应当为工农服务，无产阶级政治必须挂帅。"},{"type":"paragraph","text":"在当代最重大的事件——毛主席亲自发动、鼓励和领导的无产阶级文化大革命中，解放军成了支柱。它保证了在无产阶级专政下干革命。它“为人民服务”。它是人民的军队。它除了中国工农的利益和国际工农的利益之外，没有别的利益。"},{"type":"paragraph","text":"在整个无产阶级文化大革命中，毛主席的天才和威望以及毛主席的思想所缔造和指导的解放军的存在、战斗和榜样，是中国人民正在取得的光辉胜利的决定性因素。"},{"type":"paragraph","text":"解放军是毛主席对马克思列宁主义最伟大的新贡献之一。这个创造在全世界工人、农民同帝国主义进行决定性的斗争的时代具有极大的重要性。"},{"type":"paragraph","text":"全世界人民必须在毛泽东的天才思想指导下建立自己的军队。没有一个人民的军队，便没有他们的一切。但是，如果有了人民的军队，他们就将拥有人民的政权或将会取得人民的政权。他们将根据毛主席的论述来建立军队。毛主席说：“这个军队之所以有力量，是因为所有参加这个军队的人，都具有自觉的纪律；他们不是为着少数人的或狭隘集团的私利，而是为着广大人民群众的利益，为着全民族的利益，而结合，而战斗的。紧紧地和中国人民站在一起，全心全意地为中国人民服务，就是这个军队的唯一的宗旨。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9ea964924a"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
