:1976,"month":5,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"阳光雨露育新苗"},{"type":"paragraph","text":"在毛泽东思想哺育下，生活在社会主义祖国怀抱中的台湾省籍儿童，过着幸福的生活。这是在京的台湾省籍儿童愉快地在天安门广场漫步歌唱。　本报记者摄"},{"type":"paragraph","text":"在反击右倾翻案风的斗争中，甘肃省兰州市静宁路学校的红小兵积极开展写儿歌活动，一首首儿歌就象一发发炮弹，直射邓小平。"},{"type":"paragraph","text":"新华社记者摄"},{"type":"paragraph","text":"上海金山县朱泾镇工农兵小学红小兵理论小组，在教育革命和批邓斗争中发挥了积极作用。　新华社记者摄"},{"type":"paragraph","text":"西藏自治区樟木口岸立新公社小学学生在教师的辅导下，认真学好社会主义文化课。"},{"type":"paragraph","text":"新华社记者摄"},{"type":"paragraph","text":"湖南省吉首县林木山小学坚持教育与生产劳动相结合。这是学生帮助生产队打猪草。"},{"type":"paragraph","text":"山西省临汾县嘉泉学校的红小兵，采用故事会，唱儿歌，赛诗会等多种形式，热情颂扬社会主义新生事物。"},{"type":"paragraph","text":"大连市黑石礁小学的同学们在工厂开门办学，接受工人阶级的再教育。"},{"type":"paragraph","text":"广州部队某部所属小学红小兵，坚持以阶级斗争为纲，从小学习杀敌本领。"},{"type":"paragraph","text":"广西壮族自治区忻城县幼儿园的小朋友们坚持体育锻炼。这是他们在进行角力比赛。"},{"type":"paragraph","text":"解放军某部幼儿园的孩子们，从小养成勤俭节约，艰苦奋斗的好作风。"},{"type":"paragraph","text":"本版照片除署名者外均为本报通讯员摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"教育革命","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6cf579be06"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
