hors":[],"dates":[{"year":1952,"month":2,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"中国农工民主党中央执行局"},{"type":"paragraph","text":"号召党员靠拢工人阶级"},{"type":"paragraph","text":"划清和资产阶级的界限"},{"type":"paragraph","text":"【本报讯】中国农工民主党中央执行局，在二月十一日向各级组织和全体党员发出关于推进并深入反贪污、反浪费、反官僚主义运动的指示，号召全体党员在反对资产阶级猖狂进攻的斗争中，提高警惕，划清和资产阶级的界限，并加紧靠拢工人阶级，学习工人阶级的思想作风和生活方式。指示具体要求每一个党员坦白报告其有关工商业的活动和投资股份，并明确规定：在国家机关工作的党员，一律不准兼营工商业，如已兼营工商业的，应限期交代清楚；不在国家机关中工作而经营工商业的党员，必须严格遵守国家经济法令和绝对服从国营经济的领导。指示号召农工民主党全体党员，在共产党领导之下，积极发动群众，展开斗争，并带头检讨，打破情面，击败资产阶级的猖狂进攻，和改造本身各种各式的非工人阶级思想。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"daadcf0187"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
