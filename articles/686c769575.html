<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"警惕资产阶级教育思想的进攻","authors":[],"dates":[{"year":1967,"month":11,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编者按:要批倒一种剥削阶级思想，是不容易的，必须经过长期的尖锐的斗争。比如，“学好数理化，走遍天下都不怕”这种反动思想，已经批判了好多年，但至今有些人还不觉得臭。你不信吗，这封来信列举的一些现象便是一个说明。怎么办?继续批。我们要向这些还相信“学好数理化，走遍天下都不怕”的人大喝一声:你们只学数理化，不学毛泽东思想，无论走到哪里，一样碰壁，一样碰得个头破血流。"},{"type":"paragraph","text":"编辑同志:"},{"type":"paragraph","text":"毛主席关于无产阶级教育革命的最新指示，给教育革命指明了航向。我院广大无产阶级革命派遵照毛主席的教导，立即行动起来，投入了医学教育的大革命。但是，也出现了一些不正常的现象，如“智育第一”的思想有了抬头。有的同学为了学业务，竟抢教室，争病房，闹纠纷；有的同学筹建小分队，准备外出调查，并抢着把教师安排在自己的队里带下去。有的班级原来已在学校的教学医院实习，现在别的班级同学也要去教学医院“复课”，摆不平了，就抢医院。此外，图书馆的业务书也顷刻抢借一空。有人还去书店抢购业务书籍。"},{"type":"paragraph","text":"有些同学一心追求专业知识，甚至不问教师是否是反动学术“权威”，拉着他们来开课。有个同学对某资产阶级知识分子说:“我对你只有一个要求，那就是把你肚里的东西(指知识)全倒出来给我。”这样，个别思想反动的资产阶级知识分子也翘起尾巴来了。有的竟公开对学生说:“要我来上课，就要承认我是革命教师。”态度非常傲慢。"},{"type":"paragraph","text":"在这种不良现象面前，连有些“老造反”同学，也疑虑起来了，有的说:“再过一年可就要毕业了，要钻点业务。”有的考虑:“我这样干，划得来吗?”等等。“私”字大大抬头。某些高年级及毕业班同学一心只想自己早日走上工作岗位或补些临床实习，对医院教育革命很不关心。我们认为这种不良倾向，必须立即纠正!"},{"type":"paragraph","text":"这种种不良现象的出现，正说明修正主义教育路线的影响，在我们学校里还严重存在；资产阶级知识分子统治我们学校的现象，也不是很容易就消除的教育革命是一场极其尖锐复杂、极其激烈的阶级斗争。当前我们必须高举革命大批判的旗帜，以“斗私，批修”为纲，彻底批判修正主义的教育路线，在大破中求大立，真正把学校办成为毛泽东思想的大学校!"},{"type":"paragraph","text":"上海第二医学院五个革命学生"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"教育革命","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"686c769575"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
