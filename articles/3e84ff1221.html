torical-archives/banned-historical-archives9/main/books/wenji4.pdf"],"article":{"title":"给毛岸英的信","description":"","dates":[{"year":1947,"month":10,"day":8}],"parts":[{"text":"给毛岸英的信","type":"title"},{"type":"appellation","text":"岸英："},{"type":"paragraph","text":"告诉你，永寿回来了，到了哈尔滨。要进中学学中文，我已同意。这个孩子很久不见，很想看见他。你现在怎么样？工作，还是学习？一个人无论学什么或作什么，只要有热情，有恒心，不要那种无着落的与人民利益不相符合的个人主义的虚荣心，总是会有进步的。你给李讷写信没有？她和我们的距离已很近，时常有信有她画的画寄的，身体好。我和江青都好。我比上次写信时更好些。这里气候已颇凉，要穿棉衣了。再谈。"},{"type":"paragraph","text":"问你好！"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一九四七年十月八日"},{"type":"paragraph","text":"根据人民出版社一九八三年出版的"},{"type":"paragraph","text":"《毛泽东书信选集》刊印。"}],"comment_pivots":[{"part_idx":0,"offset":4,"index":1},{"part_idx":2,"offset":6,"index":2},{"part_idx":2,"offset":121,"index":3}],"is_range_date":false,"authors":["毛泽东"],"comments":["毛岸英，毛泽东的长子。","永寿，即毛岸青，一九二三年生，毛泽东的次子。","李讷，一九四○年生，毛泽东之女。"],"page_start":320,"page_end":320,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3e84ff1221"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
