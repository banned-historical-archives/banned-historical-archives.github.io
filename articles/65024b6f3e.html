rt":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"拉萨驻军举行毛主席著作学习讲演会干部战士畅谈通过学习巩固了长期建藏的思想","authors":["张书魁"],"parts":[{"type":"paragraph","text":"本报讯 为纪念建党四十周年，西藏军区驻拉萨机关、部队，于6月28、29日举行了学习毛主席著作心得讲演会。谭冠三政委参加讲演会并讲了话。"},{"type":"paragraph","text":"参加讲演的有十三个同志。他们以自己的切身体会，介绍如何以毛主席著作为思想武器，巩固了长期建藏的思想，解决了工作中遇到的各种实际问题。某部上士班长许占群在毛主席号召学习白求恩毫无自私自利之心的启示下，决心做毛主席的好战士，做各族人民的子弟兵，为西藏人民的彻底解放贡献出全部力量。某农场转业军人张汉修，在讲演会上介绍了自己学习毛主席“论军队生产自给，兼论整风和生产两大运动的重要性”等文章后，深刻体会到克服困难、发展生产和团结群众的重要关系，认识到开荒生产对建设西藏、保卫国防的重要意义，从而更加巩固了长期建藏的思想。在讲演会上，某机关干部牛键介绍了自己下连工作中如何坚持毛主席著作的学习，以及运用毛泽东思想解决实际问题的经验。某部队基层干部靳信忠介绍了学习毛主席在党的七届二中全会上的报告后，进一步领会了当前党对西藏地区工作的各项方针政策。还有的干部根据毛主席不断革命论和革命发展阶段论的思想，谈了对当前人民公社政策的认识。"},{"type":"paragraph","text":"在讲演会上，谭政委号召大家刻苦学习，一定把毛泽东思想真正学到手。他还表扬了机关部队中学习毛主席著作好的同志。政治部吕主任最后为讲演会作了总结。 （张书魁）"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"65024b6f3e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
