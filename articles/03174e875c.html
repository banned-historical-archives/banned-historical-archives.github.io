art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"只有人民的力量才是不可战胜的新疆军区干部战士争阅毛主席论纸老虎文献","authors":["赵其"],"parts":[{"type":"paragraph","text":"本报讯 新疆军区干部、战士，在紧张的炼铁筑路工地上，纷纷争阅人民日报、红旗杂志和解放军报上登戴的毛主席论美国主义和一切反动派都是纸老虎的文章，并以亲身感受戳穿一切反动势力外强中干的实质。"},{"type":"paragraph","text":"军区政治部副主任曹达诺夫（维吾尔族）少将说：毛主席这一论断是历史已经证明了的千真万确的真理。新疆各少数民族不堪的国民党反动派的奴役和压迫于1944年11月间在伊犁举行了武装起义，那时参加起义的各族群众没有多少军事常识，唯一的武器是锄头木棒，但是它们却打败了全副武装的国民党军队，并且解放了伊（犁）、塔（城）、阿（勒泰）三区。尽管后来国民党反动派调集三万人马“围剿”，也仍然遭到可耻的失败。这一生动的历史事实，说明一切反人民的家伙都不可怕，只有人民的力量才是无穷无尽不可战胜的。他指出：目前美帝国主义霸占着我国领土台湾，制造“两个中国”的阴谋，是注定要失败的。就像毛主席所预方的那样，帝国主义和一切反动派必然被前进的历史巨轮所粉碎。��"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"03174e875c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
