art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"中东是世界上危险焦点之一邓小平会见约旦全国协商会议代表团重申中国坚决支持阿拉伯和巴勒斯坦人民正义斗争","authors":[],"parts":[{"type":"paragraph","text":"据新华社8月18日讯 中国人民政治协商会议全国委员会主席邓小平今天上午指出：中东同样也面临着一个反对霸权主义的问题。"},{"type":"paragraph","text":"他说：“中东是世界上危险焦点之一。超级大国，尤其是苏联，要争夺那里丰富的石油资源。它们希望阿拉伯世界一片混乱，以便可以在混乱中插手。因此，中东同样也面临着一个反对霸权主义的问题。”"},{"type":"paragraph","text":"他是在会见由艾哈迈德·马哈茂德·塔拉维奈主席率领的约旦全国协商会议代表团时说这番话的。"},{"type":"paragraph","text":"邓小平重申：中国政府和人民坚决支持阿拉伯和巴勒斯坦人民正义斗争的立场。他说：“不论是现在或者将来，我们对阿拉伯和巴勒斯坦人民为反对以色列侵略和扩张，收复包括耶路撒冷在内的阿拉伯失地，恢复巴勒斯坦人民的合法权利，包括建立自己的国家而进行的正义斗争，将给予始终不渝的坚决支持。”"},{"type":"paragraph","text":"他强调指出：“阿拉伯人民所面临的问题，只有靠阿拉伯国家和人民真正团结起来才能得到解决。”"},{"type":"paragraph","text":"邓小平衷心希望阿拉伯国家和人民进一步联合和团结起来，祝愿中国同约旦和其他阿拉伯国家之间的友谊进一步发展下去。"},{"type":"paragraph","text":"塔拉维奈说：约旦同中国一样反对侵略，不管侵略发生在世界什么地方或采取什么形式，我们都反对强者侵略弱者。"},{"type":"paragraph","text":"邓小平感谢约旦全国协商会议的朋友们为发展中国和约旦之间的友谊所作出的努力。他请塔拉维奈主席转达中国领导人对侯赛因国王的衷心祝愿和良好问候。塔拉维奈也转达了侯赛因国王对中国领导人的敬意。"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6c9277abc6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
