<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"jfjb","name":"解放军报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"dates":[{"year":2007,"month":1,"day":5}],"page_start":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"一个有益于人民的人毛泽东发表《纪念白求恩》","authors":[],"parts":[{"type":"paragraph","text":"诺尔曼·白求恩，1890年3月出生于加拿大安大略省格雷文赫斯特城一个牧师家庭，加拿大共产党员，著名的胸外科专家。中国抗日战争爆发后，受美国、加拿大共产党的派遣，白求恩率领一支由加拿大人和美国人组成的医疗队来华，支援中国人民的抗日战争。1938年1月来到中国，同年3月到达延安。毛泽东在延安会见了白求恩大夫，热情赞扬他不远万里来到中国，帮助中国人民的抗日战争。"},{"type":"paragraph","text":"1938年5月，白求恩率领援华医疗队来到敌后抗日前线的五台山。在聂荣臻司令员等领导的晋察冀边区，白求恩和他率领的援华医疗队以满腔的热诚，高度的责任心，奋不顾身的牺牲精神和精湛的医疗技术，冒着敌人的炮火，救护八路军的伤病员。"},{"type":"paragraph","text":"1939年11月初，我八路军晋察冀军区部队在著名的黄土岭战斗中击毙了日军独立混成第二旅团旅团长阿部规秀中将，随后又经过43天大小108次激烈战斗，胜利地粉碎了日军的“扫荡”。就在这次反“扫荡”作战中，伟大的国际主义战士诺尔曼·白求恩医生，在河北涞源县抢救八路军伤员时感染中毒，不幸于1939年11月12日在河北唐县殉职。"},{"type":"paragraph","text":"中共中央致电吊唁。党中央的电报称：“白求恩医生自遥远的加拿大来到中国，曾为我英雄抗战而伤病的八路军将士服务近两年，亲历艰苦，不辞劳顿，深得前方战士信仰，他和许多同情中国抗战的国际朋友给了中国抗战以有力的援助。”12月1日，延安举行追悼白求恩大夫大会，吴玉章、王稼祥、陈云等参加追悼会。毛泽东献了挽词：“学习白求恩同志的国际主义精神，学习他的牺牲精神、责任心与工作热忱。”12月13日，为纪念白求恩大夫，八路军军医院改名为白求恩国际和平医院。"},{"type":"paragraph","text":"12月21日，毛泽东为八路军政治部、卫生部将在1940年出版的《诺尔曼·白求恩纪念册》写下了《学习白求恩》一文，指出：“一个外国人，毫无利己的动机，把中国人民的解放事业当作他自己的事业，这是什么精神？这是国际主义的精神，这是共产主义的精神，每一个中国共产党员都要学习这种精神。”“白求恩同志毫不利己专门利人的精神，表现在他对工作的极端的负责任，对同志对人民的极端热忱。”“我们大家要学习他毫无自私自利之心的精神。从这点出发，就可以变为大有利于人民的人。一个人能力有大小，但只要有这点精神，就是一个高尚的人，一个纯粹的人，一个有道德的人，一个脱离了低级趣味的人，一个有益于人民的人。”这篇文章编入《毛泽东选集》时，题为《纪念白求恩》。"},{"type":"paragraph","text":"（新华社发）"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"河北文革","type":"人物"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5e2a805429"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
