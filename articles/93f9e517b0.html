 全世界解放力量坚决站在美国黑人一边","authors":[],"dates":[{"year":1964,"month":8,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"罗伯特·威廉在毛主席声明发表一周年发出感谢信"},{"type":"paragraph","text":"美国黑人决心以暴力斗争对付暴力镇压"},{"type":"paragraph","text":"全世界解放力量坚决站在美国黑人一边"},{"type":"paragraph","text":"新华社哈瓦那五日电　目前居住在哈瓦那的美国黑人领袖罗伯特·威廉在毛泽东主席支持美国黑人斗争的声明发表一周年的时候写信给中国人民，他向毛主席和中国的兄弟姐妹们表示最真诚的感谢。"},{"type":"paragraph","text":"信中说，“在过去一年中，我们争取人权和正义的斗争进入了一个急剧转变的阶段。这再也不是手无寸铁的妇女儿童在所谓自由世界的美国代议制民主中被儿戏般地野蛮枪杀在地上的斗争了，在那样一种代议制民主里，我们的人权所受到的尊重还不如街上普通的狗。”“我们囚犯似的人民的鲜血染红了种族主义美国的街道。”"},{"type":"paragraph","text":"这封信说，“我们抛弃了人家打你的左脸就把右脸也送过去的态度。在我们世界各地的革命的兄弟们的支持下，我们将以暴力来对付暴力。在一个又一个的城市中，甚至在美帝国主义的侵略军队中，我们在用一切可能的手段抵抗狂暴而野蛮的种族压迫。”"},{"type":"paragraph","text":"信中说，“我们虽然是以血肉之躯来抵抗残酷无情地压迫我们的敌人的武装，但是我们人民的正义事业是不可战胜的，一度强大的美国佬的日子不长了。今后的日子会是困难而牺牲重大的，但是我们保证要担负任何任务，迎接任何牺牲。"},{"type":"paragraph","text":"“我们的勇气和决心是更大了，因为我们知道，全世界的解放力量坚定地站在我们这一边。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"93f9e517b0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
