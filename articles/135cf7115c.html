art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"机关工作右倾保守的几个事例","authors":["金锋"],"parts":[{"type":"paragraph","text":"骑兵某团在检查机关工作的时候，揭发了许多事例，证明过去机关工作中的右倾保守思想是很严重的。下边是揭发出来的几个例子。"},{"type":"paragraph","text":"试点、观摩何时完"},{"type":"paragraph","text":"这个团进行正规训练已经三年多了，但是现在贯彻执行条令仍然很差。他们总结贯彻执行条令的规律是：一紧、二松、三垮台、四重来。为什么呢？原来领导上很少看到广大官兵执行条令的自觉性和积极性，却把少数落后的现象看成是“多数人的问题”。因此，就在“慢慢来”的思想支配下，三年来长期采取了所谓“重点要求、逐步贯彻”的办法，直到1955年年底还在搞贯彻执行条令的“试点”、“观摩”。"},{"type":"paragraph","text":"不到群众中找办法"},{"type":"paragraph","text":"发现了工作中的困难和问题，不到群众中找解决的办法，而是盲目叫喊困难，其实解决困难的办法在群众中早已经有了。例如，在部队训练中如何提高下级军官的管理教育能力，解决他们工作中的忙乱现象，这是领导机关老早就感觉到的问题，而一直没有很好解决。而在本团里就有一个排长，对部属的管理教育很耐心，对自己的工作安排得有条有理，什么时间做什么工作都很有秩序，可是长期没有被团的领导机关发现，直到师的检查团来才发现了。"},{"type":"paragraph","text":"“墙里开花墙外红”"},{"type":"paragraph","text":"有时甚至是上级已经表扬了的本团的先进事例，也没有在本团推广。例如，团政治处曾经花费了不少力量，在一个连队里进行了俱乐部工作的试点。工作是有成绩的，在今年年初军区文艺会演的时候被评为“优秀”，上级并号召各单位学习他们的经验。可是团政治处仍然没有在团里很好地总结和推广这个连队的经验。有些同志批评这种现象是“墙里开花墙外红”。"}],"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"135cf7115c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
