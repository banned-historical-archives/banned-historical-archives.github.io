tart":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"周恩来同志率中共代表团抵莫斯科赫鲁晓夫/科兹洛夫/波德戈尔内等同志到机场迎接离京时/刘少奇/朱林彪、邓小平等同志到机场送行","authors":[],"parts":[{"type":"paragraph","text":"新华社15日讯 应苏联共产党中央委员会的邀请，参加苏联共产党第二十二次代表大会的中国共产党代表团，在团长、中共中央副主席周恩来率领下，今天上午乘专机离开北京前往莫斯科。"},{"type":"paragraph","text":"中国共产党代表团团员是：中共中央政治局委员、中央书记处书记彭真，中央政治局候补委员康生，中央委员陶铸，中央委员刘晓（已在莫斯科）。"},{"type":"paragraph","text":"今天到机场送行的，有中共中央副主席刘少奇、朱德、林彪，总书记邓小平，中央政治局委员陈毅、李富春、贺龙、李先念、谭震林，中央政治局候补委员陆定一、陈伯达，中央书记处候补书记杨尚昆，中央委员罗瑞卿、刘宁一、伍修权，以及其他党内外人士。"},{"type":"paragraph","text":"苏联驻中国大使馆临时代办苏达利柯夫和使馆官员也到机场送行。"},{"type":"paragraph","text":"新华社莫斯科15日电 由中共中央副主席周恩来率领的中国共产党代表团，今天下午乘“图—104”专机抵达莫斯科。代表团是应苏联共产党中央委员会的邀请，前来参加苏联共产党第二十二次代表大会的。"},{"type":"paragraph","text":"中国共产党代表团团员有：中共中央政治局委员、中央书记处书记彭真，中央政治局候补委员康生，中央委员陶铸，中央委员、中国驻苏联大使刘晓。刘晓是前往伊尔库次克迎接代表团后同机返回莫斯科的。"},{"type":"paragraph","text":"到机场迎接中国共产党代表团的有：苏联共产党中央委员会第一书记赫鲁晓夫，苏共中央主席团委员、书记处书记弗·科兹洛夫，苏共中央主席团委员、乌克兰共产党中央委员会第一书记波德戈尔内，苏共中央委员葛罗米柯，苏共中央俄罗斯联邦局副主席诺马科，苏共中央部长安德罗波夫、尼罗诺夫等人。"},{"type":"paragraph","text":"中国驻苏联大使馆临时代办张德群和大使馆工作人员也到机场迎接。"},{"type":"paragraph","text":"杜修贤"},{"type":"paragraph","text":"杜修贤"},{"type":"paragraph","text":"中共中央副主席周恩来率领的中国共产党代表10月15日离北京赴莫斯科，参加苏联共产党第二十二次代表大会。中共中央副主席刘少奇、朱德、林彪等前往机场送行。   新华社记者 杜修贤摄"}],"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"康生","type":"人物"},{"name":"陶铸","type":"人物"},{"name":"邓小平","type":"人物"},{"name":"林彪","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"彭真","type":"人物"},{"name":"朱德","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f8879b3a98"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
