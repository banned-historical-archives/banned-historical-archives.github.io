art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"一心向着毛主席","authors":["工程兵学习毛主席著作积极分子/二级爆破英雄郑定富"],"parts":[{"type":"paragraph","text":"听了党中央发布的八届十一中全会公报，万分激动，万分高兴。公报对国内国际的阶级斗争形势作了最精确的分析，为我们指明了前进的方向，是又一个具有重大历史意义的文献。它给我国人民和世界革命人民以巨大的鼓舞，给国内外一切牛鬼蛇神以沉重的打击。"},{"type":"paragraph","text":"公报号召我们高举毛泽东思想伟大红旗，把毛泽东思想作为全党全国一切工作的指导方针，我最最坚决地拥护党中央这个伟大号召，最最忠诚地执行这个英明决定。"},{"type":"paragraph","text":"毛泽东思想是我国革命胜利和世界人民革命胜利最可靠的保证。帝国主义、现代修正主义和一切反动派都猖狂地攻击它，我们就要更坚决、更英勇地捍卫它。谁反对毛泽东思想，我们就坚决和谁拚到底。依靠毛泽东思想，我们就一定能够打败美帝国主义和国内外的一切牛鬼蛇神。"},{"type":"paragraph","text":"毛泽东思想是指导我们进行阶级斗争、生产斗争、科学实验的行动指南，我一定高举毛泽东思想伟大红旗，站在三大革命运动最前线，当革命的突击手，当批判旧世界的爆破手。有了毛泽东思想，我们就能征服一切困难，战胜一切敌人，使革命永远朝着正确的方向前进。"},{"type":"paragraph","text":"毛泽东思想是我们革命战士的命根子。没有毛泽东思想，就没有革命的一切，也没有我们自己的一切。我从自己翻身成长的过程中，深深体会到毛泽东思想比亲爹娘还要亲。我要坚决响应党中央的号召，无限地热爱毛主席，更加努力地活学活用毛主席著作，就象葵花向太阳一样，永远一心向着党，一心向着毛主席。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5fbfcdc27c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
