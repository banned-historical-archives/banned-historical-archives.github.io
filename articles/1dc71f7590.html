政策界限规定的批复","authors":[],"dates":[{"year":1960,"month":11,"day":22}],"is_range_date":false,"parts":[{"text":"中共中央对青海省委关于当前对敌斗争中几个政策界限规定的批复","type":"title"},{"text":"青海省委并西北局：","type":"appellation"},{"text":"同意你们十一月七日关于当前对敌斗争中的几个政策界限的规定。第一条第五项所说的“有现行反革命破坏活动的头人、宗教中的实权分子和五类分子”，还需向下边作一些具体交代，划清一般反动言行与反革命现行破坏活动的界限，以便既打得准确又不致扩大打击面。第七项“以反革命为目的、破坏生产、宰杀牲畜”一句，应当十分严格地区分两类性质不同的矛盾，既不放纵真正的反革命分子的现行破坏，又要切实防止伤害好人。决不要把当前人民的一般偷窃行为（如偷宰牲畜、偷窃粮食庄稼等）视为破坏生产和宰杀牲畜的反革命行为，以上意见请你们研究执行。","type":"paragraph"},{"text":" 中  央一九六O年十一月二十二日","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1dc71f7590"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
