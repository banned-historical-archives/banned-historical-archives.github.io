967,"month":11,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"二转铲车间革命委员会委员、运料总工长　陈富"},{"type":"paragraph","text":"中国赫鲁晓夫在党内推行的奴隶主义必须彻底批判。我们一定要在党内大树特树毛泽东思想的绝对权威。"},{"type":"paragraph","text":"我是奴隶主义的受害者。入党后，接受了一系列奴隶主义的教育。中国赫鲁晓夫用“听党的话”和“组织性、纪律性”等等紧箍咒，把党员的手脚束缚起来，对上只能服从，不能提意见。讲了几句不同意见的话，就是“不听党的话”。有一次，生产上发生了事情，明明不是我干的，可是车间负责人偏听偏信，硬说是我干的，我不服，拚命争辩，相持不下，最后，告到党总支，中了黑《修养》毒的总支负责人不问青红皂白，闷头就批评我:“你是一个党员，不是一般群众，车间主任是党派去的，你的组织性纪律性到那里去了?党员就是要无条件服从。”我想不通，争辩也没有用。而且为了此事，在以后两个多月中，我几乎在每次党的会议上都受到批评。中国赫鲁晓夫推行的奴隶主义就是这样害人。"},{"type":"paragraph","text":"我入党后，受了奴隶主义的毒害，什么事情听上级指挥，自己只管搞好生产就是了。根本没有想到党内还有阶级斗争。所以，在这次文化大革命中一度受了蒙蔽，没有革命造反精神。后来，通过揭发，才知道党内也有坏人，大吃了一惊。特别是参加了几次揭发、批判、斗争陈丕显、曹荻秋的大会，使我受到了深刻的教育，坚决回到毛主席的革命路线上来。"},{"type":"paragraph","text":"我要进一步学习毛主席的建党理论，提高阶级斗争观点，不能闷着头只管生产，不然，给坏人钻了空子，搞复辟资本主义，自己还不知道。我一定要把革命放在第一位，做一个毛主席的好党员。对党、对人民有利的事，坚决去做，对党对人民不利的事，坚决反对。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9baa855106"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
