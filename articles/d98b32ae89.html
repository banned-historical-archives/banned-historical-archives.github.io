京图书馆革命文献部"],"dates":[{"year":1966,"month":8,"day":28}],"is_range_date":false,"parts":[{"text":"把这些珍贵文件纪录下来","type":"title"},{"text":"北京图书馆革命文献部","type":"authors"},{"text":"当前展开的无产阶级文化大革命，正在深入广泛地发展。很多红卫兵组织和文化革命委员会，印发了彻底摧毁旧思想、旧文化、旧风俗、旧习惯及一些资产阶级法权残余的传单、倡议书等宣传品，这是我们无产阶级文化大革命的珍贵文件。","type":"paragraph"},{"text":"我们作为一个国家图书馆，必须是高举毛泽东思想伟大红旗，积极宣传毛泽东思想的社会主义学校，又应是收集各种革命文献的机构。我们特请各单位红卫兵组织和文化革命委员会等革命组织，将已发和未发的“倡议书”以及所有的布告、宣传品等，及时寄给或送交“北京图书馆革命文献部”三份，以备研究参考使用。＊","type":"paragraph"},{"text":" （《人民日报》一九六六年八月二十八日）","type":"paragraph"}],"comments":[],"origin":"《人民日报》一九六六年八月二十八日","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"限制资产阶级法权","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d98b32ae89"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
