北京地质勘探学院","林墨荫"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"“肃反是党中央搞错了”","type":"title"},{"text":"北京地质勘探学院林墨荫","type":"authors"},{"text":"（林墨荫：北京地质学院教授）","type":"subtitle"},{"text":"「一九五五年中国肃反扩大化了，党中央不能现在揭发承认，再过一个历史时代就可以提出来。因为现在是执政党。」","type":"paragraph"},{"text":"「肃反是党中央搞错了，尤其在知识分子中更不应该搞。伤害了很多人的良心。」","type":"paragraph"},{"text":"「肃反是党中央学习斯大林的错误，党中央搞错了，百分之五为反革命是估计错误，肃反在中国扩大化了。」","type":"paragraph"},{"text":"「我院肃反搞的很糟，斗争面太广，市委有工作通报，批评了我院党委，且是第一号。」","type":"paragraph"},{"text":"「我院采取这种方式的肃反工作，成绩是主要的，我表示怀疑，不管用机械的统计方法也好，用辩证法也好都无法解决量与质的问题。我们要求党委通过肃反斗争的总结，教育我们分析事物的方法。」","type":"paragraph"},{"text":"「肃反是农村方式。」","type":"paragraph"},{"text":"「采取这种方式的肃反工作，成绩是主要的，我表示怀疑。」","type":"paragraph"},{"text":"「我不应该拿到群众会上来斗，因为别人对我不了解，了解我的人就不会把我当反革命。」","type":"paragraph"}],"comments":[],"origin":"北京地质勘探学院党委会宣传部编《社会主义教育参考资料第二编：右派言论汇编》，1957年10月5日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"19998e2530"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
