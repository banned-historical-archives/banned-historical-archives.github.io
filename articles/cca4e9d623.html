" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoistlegacy.de-1636","name":"一九八三年第二次全国宣传工作会议（概况）","author":"中共中央宣传部","internal":false,"official":false,"type":"unknown","files":[],"article":{"title":"一九八三年第二次全国宣传工作会议（概况）","dates":[{"year":1983,"month":7,"day":7}],"is_range_date":false,"authors":["中共中央宣传部"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"中共中央宣传部办公厅, 党的宣传工作会议概况和文献(1951——1992年), 641-642","tags":[{"name":"邓力群","type":"主题/事件"},{"name":"胡耀邦","type":"主题/事件"},{"name":"理论","type":"主题/事件"},{"name":"四个现代化","type":"主题/事件"},{"name":"宣传","type":"主题/事件"}],"parts":[{"type":"title","text":"一九八三年第二次全国宣传工作会议"},{"type":"paragraph","text":"• 概况 •"},{"type":"paragraph","text":"1983年第二次全国宣传工作会议于7月7日至17日在北京召开。参加会议的有各省、自治区、直辖市党委书记、宣传部长、宣传处长、理论处长，中央和国家机关有关单位负责人，中央宣传系统各单位负责人，共200多人。"},{"type":"paragraph","text":"中央宣传部部长邓力群主持会议。会议的议题是根据十二大精神，回顾1983年一月份全国宣传工作会议以来的工作情况，总结交流经验，讨论和部署下半年的主要工作。"},{"type":"paragraph","text":"中央领导同志胡耀邦、习仲勋、宋任穷接见与会同志。"},{"type":"paragraph","text":"7月14日，胡耀邦同志就思想作风、领导作风问题讲了话，主要内容是，执行中央的路线、方针、政策问题；全党要敢于负责地、敢于独立地解决问题；干部年轻化问题；各部门要考虑的工作重心就是邓小平同志说的“一心一意奔四化”，到2000年实现翻两番，两个文明一起抓；做宣传工作的要熟悉经济工作。"},{"type":"paragraph","text":"7月13日胡乔木同志就学习《邓小平文选》问题作了重要讲话。他在讲话中首先批驳了有些国外报纸关于学习《邓小平文选》就是恢复个人崇拜的谬论。他指出，我们学习无论谁的著作，都要采取马克思主义的实事求是的态度，就是说，不能采取“两个凡是”那种反马克思主义的态度，这就使我们的学习同个人崇拜毫不相干。他还论述了邓小平同志集思广益，坚持民主集中制，坚持群众路线、反对个人崇拜和个人专断的作风以及民主作风、集体领导与领导的权威之间的关系等。"},{"type":"paragraph","text":"胡乔木同志对学习《邓小平文选》讲了六个问题：（1）《文选》是毛泽东思想的坚持和发展的结果；（2）学习《文选》对于坚持四项基本原则，反对“两个凡是”有重大的现实意义；（3）邓小平同志提出的党的中心任务转到以发展社会主义经济建设上来，这是对于党的八大提出的任务的真正继承，意义非常重大；（4）邓小平同志提出坚持社会主义道路的四项保证，对于中国革命、对于中国社会主义事业的前途具有非常伟大的意义；（5）关于阶级斗争的问题；（6）关于整党问题。"},{"type":"paragraph","text":"邓力群同志在会议结束时讲了四个问题：（1）对这次会议的评价；（2）就几项工作打个招呼；（3）今后一个时期宣传工作的重点；（4）就建设具有中国特色的社会主义问题讲几点意见。"},{"type":"paragraph","text":"邓力群同志在讲话结束时强调指出：“各级宣传部门，是各级党委的工作机关，要在思想战线上为党委当好参谋，当好助手，当好哨兵，了解思想动向，发现倾向性问题，提出加强思想政治工作的建议，并且在党委的领导下，承担做好思想政治工作。为了完成这个任务，我们的宣传部门，必须牢固地树立全局观点，努力学习党的方针、政策，学习马列主义、毛泽东思想。”"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"胡耀邦","type":"人物"},{"name":"邓力群","type":"人物"},{"name":"胡乔木","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cca4e9d623"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
