art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"武汉部队开学习毛主席著作积极分子会","authors":["胡诚戴惠董海燕齐中彦"],"parts":[{"type":"paragraph","text":"本报讯 武汉部队于五月十三日到二十二日，召开了学习毛主席著作积极分子代表会议，研究如何贯彻林彪元帅和总政治部指示，推广廖初江、丰福生、黄祖示活学活用毛主席著作的经验，以便更普遍、更经常、更有成效地把群众性的学习毛主席著作运动推进一步。"},{"type":"paragraph","text":"陈再道司令员、钟汉华政委到会作了指示。政治部吕炳安副主任作了《把活学活用毛主席著作的群众运动推向一个新的高潮》的报告。二十二名学习毛主席著作先进单位的代表和积极分子，在会上广泛交流了学习经验。"},{"type":"paragraph","text":"会上，代表们就如何进一步深入开展学习毛主席著作活动，进行了广泛深入的讨论。大家认为，首先，必须讲清形势，进一步提高广大官兵的学习自觉性。其次，要大力推广廖初江、丰福生、黄祖示学习毛主席著作的经验。第三，宣传好本部队学习毛主席著作先进单位和积极分子的事迹，把学习毛主席著作列为“一帮一”、“一对红”活动的首要内容。第四，加强对学习的具体指导。"},{"type":"paragraph","text":"正在武汉部队巡回报告的廖初江，到会介绍了他的学习体会。代表们决心以廖初江、丰福生、黄祖示为榜样，把毛泽东思想真正学到手。 （胡诚、戴惠、董海燕，齐中彦）"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3f19f7dce9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
