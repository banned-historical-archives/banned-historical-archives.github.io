tart":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席声明鼓舞了战斗中的刚果人民","authors":[],"parts":[{"type":"paragraph","text":"新华社开罗二十九日电巴苏陀兰大会党驻开罗代表拉马格勒·钦亚恩今天对新华社记者说：我们自由战士和刚果人民的支持者欢迎和赞赏毛泽东主席关于支持刚果（利）人民反对美国侵略的声明。"},{"type":"paragraph","text":"钦亚恩说：“毛主席对刚果形势的分析是这么清楚，甚至原来不认识美帝国主义是全世界的敌人的那些人现在也认识了这一点。”"},{"type":"paragraph","text":"他说，这个声明鼓舞了战斗的刚果人民，实际上是呼吁自由战士们联合起来结成统一战线，在刚果、东南亚以及美国的侵略之手所伸及的世界其他地方击溃美帝国主义的一个号召。"},{"type":"paragraph","text":"他说，正如毛主席所指出的，美帝国主义对刚果进行直接的武装干涉的目的，不仅在于控制刚果，而且在于奴役整个非洲。"},{"type":"paragraph","text":"他还表示欢迎周恩来总理以及中国人民团体发表的谴责美国和比利时对刚果的侵略的讲话和声明。"},{"type":"paragraph","text":"他说，我们从刚果的事态发展中吸取了不少教训，“首先，美帝国主义是世界最凶恶和最危险的敌人。第二，如果革命者决心同美帝国主义战斗到最后一分钟，那么美帝国主义一定会被击败”。他说，正如毛主席所说的，美帝国主义是纸老虎。"}],"alias":""},"tags":[{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ed5387b952"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
