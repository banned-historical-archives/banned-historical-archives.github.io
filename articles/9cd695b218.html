","authors":[],"dates":[{"year":1951,"month":4,"day":17}],"is_range_date":false,"parts":[{"text":"西北各地地主破坏土改和减租事件日多","type":"title"},{"text":"【西北总分社十七日讯】西北各地地主逃避、破坏土地改革的事件日益众多。关中第二期土地改革开始后，已发现不少地主转移、出卖土地、财物、牲口，威胁、收买落后干部、农民和杀害工作人员及农民积极分子的事件。宝鸡县钓渭区五乡何家崖村民兵开会时，由屋外扔进一颗手榴弹(幸未伤人)；渭南新四区地主把一个雇工推入井内淹死(凶手当已捕获)；青海、陕南减租后，有的地主正在卖田夺佃，向农民反攻；宁夏省宁朔县不少地主在土地改革后，强迫收回已经分配给农民的土地、牲口；青海有地主马玉、朱乐天等七人自行组织赴朝慰问团，并捐出三千多万元，扬言自备路费到朝鲜去，企图藉此抬高身价，逃避今冬土地改革。","type":"paragraph"}],"comments":[],"origin":"1951年4月21日新华通讯社编《内部参考》。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9cd695b218"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
