":[{"year":1980,"month":5,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京五月十六日电　伟大的马克思主义者和无产阶级革命家刘少奇同志追悼大会将于五月十七日下午四点在北京人民大会堂隆重举行。中央人民广播电台、中央电视台从当天下午三点五十五分开始同时转播追悼大会的实况。"},{"type":"paragraph","text":"刘少奇同志追悼大会的实况录音和实况录象，中央人民广播电台和中央电视台将分别重播。"},{"type":"paragraph","text":"中央人民广播电台重播的时间是:"},{"type":"paragraph","text":"十七日，第一套节目二十点和第二套节目二十二点:"},{"type":"paragraph","text":"十八日，第一套节目十七点，第二套节目八点三十分:"},{"type":"paragraph","text":"十九日，第一套节目十四点。"},{"type":"paragraph","text":"中央电视台重播的时间是:"},{"type":"paragraph","text":"十八日，第一套节目(二频道)八点三十分:"},{"type":"paragraph","text":"十九日，第一套节目(二频道)十四点。"},{"type":"paragraph","text":"(上海人民广播电台和上海电视台将同时转播追悼大会的实况，并分别进行重播。上海人民广播电台重播的时间是:十七日，990千赫20点；十八日，990千赫10点30分:79:千赫14点30分:十九日，990千赫12点80分。)"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"上海文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"252a67736a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
