ical-archives/banned-historical-archives0/main/maoquanji44.pdf"],"article":{"title":"给即将下放的身边工作人员的信","alias":"","parts":[{"type":"paragraph","text":"给即将下放的身边工作人员的信"},{"type":"paragraph","text":"（1960年12月26日）"},{"type":"paragraph","text":"林克、高智、子龙、李银桥、王敬先、小封、汪东兴\"七同志认真一阅。除汪东兴外，你们六人都下去，不去山东，改去信阳专区，那里开始好转，又有救济粮吃，对你【们】身体会要好些。我给你们每人备一份药包，让我的护士长给你【们]讲一次如何用药法。淮河流域气候暖些，比山东好。一月二日去北京训练班上课两星期，使你们有充分的精神准备。请注东兴同志作准备。你们如果很饥饿，我给你们送牛羊肉去。"},{"type":"paragraph","text":"毛泽东十二月二十六日，我的生辰。明年我就有67岁了，"},{"type":"paragraph","text":"老了，你们大有可为。"},{"type":"paragraph","text":"[1]林克，当时任毛泽东办公室秘书。高智，当时任毛泽东的机要秘书。子龙，即叶子龙，当时任中共中央办公厅机要室主任、毛泽东的秘书。李银桥，当时任毛泽东的卫士长。王敬先，当时任中共中央办公厅警卫局副局长。小封，指封耀松，当时是毛泽东的卫士。汪东兴，当时任中共中央办公厅警卫局局长。"},{"type":"paragraph","text":"[2]后来中共河南省委安排林克等6人去了许昌专区。毛泽东全集第四十四卷"},{"type":"paragraph","text":"信阳报告\"一件，认真一阅。"},{"type":"paragraph","text":"出介你们认人吃乐"},{"type":"paragraph","text":"份离分不左东政转信"},{"type":"paragraph","text":"品你每一4一胖里始好"},{"type":"paragraph","text":"1第50消5流"},{"type":"paragraph","text":"爱些比食啸气吃，戏得"},{"type":"paragraph","text":"1一玄北京划使水上误"},{"type":"paragraph","text":"而是期你你们的"},{"type":"paragraph","text":"1960年12月26日，毛泽东67岁生日。在纷至沓来的灾情面前，毛泽东心里惦念着劳动群众。这天，他写信给身边的工作人员，派他们下去调查，以求了解真实情况。图为该信的手稿。"},{"type":"paragraph","text":"[1]指中共信阳地委1960年12月22日关于整风运动和生产救灾工作情况给河南省委并报中央、中南局的报告。"}],"authors":["毛泽东"],"dates":[{"year":1960,"month":12,"day":26}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":124,"page_end":125},"tags":[{"name":"汪东兴","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]},{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"给即将下放的身边工作人员的信","authors":["毛泽东"],"dates":[{"year":1960,"month":12,"day":26}],"is_range_date":false,"parts":[{"text":"给即将下放的身边工作人员的信","type":"title"},{"text":"毛泽东","type":"authors"},{"text":"林克、高智、子龙、李银桥、王敬先、小封、汪东兴七同志认真一阅。除汪东兴外，你们六人都下去，不去山东，改去信阳专区，那里开始好转，又有救济粮吃，对你（们）身体会要好些。我给你们每人备一份药包，让我的护士长给你（们）讲一次如何用药法。淮河流域气候暖些，比山
