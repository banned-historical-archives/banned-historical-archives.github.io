script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"开封市诚实腰鼓店资方  残酷剥削工人应予严格处理","authors":["李中原　中相泰　张浩","隐名"],"dates":[{"year":1951,"month":11,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"开封市诚实腰鼓店资方"},{"type":"paragraph","text":"残酷剥削工人应予严格处理"},{"type":"paragraph","text":"编辑同志：我是开封市私营诚实腰鼓店的工人。我店工人到今天仍受着资方的无理压迫与非法剥削。"},{"type":"paragraph","text":"开封市私营小工厂在工时上原规定一般不能超过十小时，但我们的工作时间是从早晨五时至晚上十二时，除了休息时间外，足足要做十七或十八个小时。我店刘经理经常强迫我们加班工作，而且也不发加班费。他不许我们工人开会，有时知道开了会，就逼问工人：“开的什么会？”他对工人的安全也是毫不关心的，比如我最近生了病，他不但不叫我去治疗，而且还说我故意装病。他限制我们的饭量，每天只许吃两顿，他自己却天天到全市最大的饭庄吃饭。他的妻子每逢女工请假或来迟时，就说：“别捣蛋！不愿意干就滚蛋，我有的是工人。”我要求本市有关部门帮助我们解决这些问题。"},{"type":"paragraph","text":"隐名"},{"type":"paragraph","text":"（代笔人  李中原　中相泰　张　浩）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c0359f3ebd"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
