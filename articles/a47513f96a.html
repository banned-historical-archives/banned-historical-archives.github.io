art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"要闻简报","authors":[],"parts":[{"type":"paragraph","text":"全国青少年科技作品展览在京开幕 叶剑英邓小平宋庆龄等为展览题词"},{"type":"paragraph","text":"由中国科协、教育部、国家体委、共青团中央联合举办的全国青少年科技作品展览，十月三日上午在北京展览馆开幕。中共中央政治局委员、人大常委会副委员长、全国青少年科技作品展览组织委只会名誉主任邓颖超致开幕词，并为展览会剪彩。"},{"type":"paragraph","text":"中共中央副主席、人大常委会委员长叶剑英，中共中央副主席、国务院副总理邓小平，人大常委会副委员长、中国人民保卫儿童全国委员会主席宋庆龄，最近为在北京举办的全国青少年科技作品展览题词，勉励青少年要勤奋学习，为祖国的社会主义现代化建设贡献力量。"},{"type":"paragraph","text":"叶剑英的题词是：“勤奋学习勇于实践”。邓小平的题词是：“青少年是祖国的未来，科学的希望。”床庆龄的题词是：“广大青少年要勤奋学习科学文化知识，向科学技术进军，为祖国现代化事业贡献力量。”"},{"type":"paragraph","text":"这些题词陈列在全国青少年科技作品展览会的序厅里。"},{"type":"paragraph","text":"邓小平副总理会见英国皇家学会会长"},{"type":"paragraph","text":"国务院副总理邓小平十月三日上午在人民大会堂会见了英国皇家学会会长陶德勋爵和夫人、副会长斯托克博士和夫人、副会长伍卓夫爵士和夫人。会见时，邓小平副总理同陶德勋爵就发展中英两国的科学技术合作与交流问题进行了友好的交谈。"},{"type":"paragraph","text":"邓副总理说，我国要实现科学技术现代化必须加快步伐。我们要以世界上先进的科学技术水平作为我们的起点。陶德勋爵说，我们赞赏你们为达到这个目的所采取的办法。我们皇家学会希望进一步加强同你们的接触和合作。"},{"type":"paragraph","text":"邓副总理说，我们双方早在五十年代就已经建立了很好的关系。我们要继续加强和发展这一关系。"},{"type":"paragraph","text":"邓颖超副委员长会见并宴请西园寺公一一家"},{"type":"paragraph","text":"人大常委会副委员长邓颖超十月三日中午会见并宴请日本知名友好人士西园寺公一和夫人西园寺雪江及其一家。会见和宴会在亲切友好的气氛中进行。（均据新华社）"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"叶剑英","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a47513f96a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
