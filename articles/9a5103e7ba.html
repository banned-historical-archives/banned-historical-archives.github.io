学院等问题给华东局、南京市委的批复","authors":[],"dates":[{"year":1951,"month":1,"day":27}],"is_range_date":false,"parts":[{"text":"中共中央关于接办金陵大学和金陵女子学院等问题给华东局、南京市委的批复","type":"title"},{"text":"华东局并南京市委：","type":"appellation"},{"text":"华东局一月二十日电及南京市委一月十八日两电均悉。金陵大学及金陵女子学院，原则上决定由政府接办，并得两校当局同意，将两校合并办理。惟因目前条件尚未完全成熟，本年上半年，仍保持原状私办，由政府补助其经费，并积极准备接办条件。吴贻芳给纽约回信的处理，同意华东局意见。接受外国津贴的中学，统由华东教育部召集会议统一处理，暂时一律维持原状。个别学校经费不能维持者，临时给以津贴，如有转移或盗窃校产情事，政府须严厉禁止，并可组织群众清理校产。惟是否接办，仍应静候华东教育部统一处理，以便统一步骤，少出乱子。","type":"paragraph"},{"text":" 中  央一月二十七日","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9a5103e7ba"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
