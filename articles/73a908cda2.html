<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"中国奴隶制的经济基础——“井田制”","authors":[],"dates":[{"year":1973,"month":8,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"井田制是中国奴隶社会生产关系的基础。殷、周时代的国王，把土地划分成一块一块有一定面积的方田，有的地方每百亩(约合今亩三十一点二亩)称“一田”。一个奴隶称“一夫”，一夫耕一田，“九夫为井”称方一里。在井田中间有灌溉的渠道，与渠道相应的纵横道路叫“阡陌”。许多井田，方一里或方十里、方几十里……的周围挖成壕沟，掘出的泥土堆筑在旁边，形成了“封疆”(疆界)。在疆界里面，方一里，方几里的一块块井田，就是一个个奴隶劳动的集中营。那时的土地是奴隶主贵族国家所有制，《诗经》:“溥天之下，莫非王土；率土之滨，莫非王臣。”这就是说，国王把划分成方十里、方几十里、方百里……不等的并筑有“疆界”的井田和相应数量的奴隶，分封(配)给他的儿子和臣下去统治。土地和奴隶都属于国王所有，他的儿子或臣下只有享有权和使用权，没有所有权。国王有权收回土地和奴隶，另行分配。从国王手中直接得到土地和奴隶的叫诸侯(或国王左右的叫卿大夫)；诸侯再象国王一样把土地和奴隶分封给他的儿子，按照直系的同姓血统一代一代分封下去。这样就形成了国王、诸侯、卿、大夫、士，象金字塔式的大大小小的奴隶主贵族。这种血缘关系是贵族们用来维系他们集团内部的等级，以及等级之间团结的宗法制度。这种宗法制度的道德标准，就是一个“仁”字，要贵族们对父母、长辈“亲亲”——“孝”；对同辈兄弟相互亲爱——“悌”，以便共同去压迫剥削奴隶。贵族们就这样凭着同姓直系血统关系，世世代代享受着对奴隶的剥削和屠杀的权力。所以说，一块块的井田，一方面是国王对诸侯、诸侯对大夫……的俸禄多寡的标准；另一方面也是奴隶主作为考核奴隶勤惰的标准。在这种“奴隶占有制度下，生产关系的基础是奴隶主占有生产资料和占有生产工作者，这些生产工作者就是奴隶主可以把他们当作牲畜来买卖屠杀的奴隶”。(斯大林:《论辩证唯物主义和历史唯物主义》)"},{"type":"paragraph","text":"这种有“阡陌”、“封疆”的井田，叫“公田”，随着生产力的发展，奴隶主贵族超额地榨取奴隶们的剩余劳动，鞭使奴隶去开垦井田以外的空地。这种被开垦的土地叫“私田”。最初私田不纳贡税。到春秋(公元前七七○年到前四七六年)晚期，新兴的封建地主阶级起来大量开垦私田，同奴隶主贵族争夺劳动力。由于奴隶主贵族贪婪无厌、残酷地压榨奴隶的血汗，奴隶起义在春秋时代此伏彼起，逐步瓦解和摧毁了奴隶制的经济基础——井田制。各个诸侯王国的力量不断削弱，财政收入陷入困境，就强迫“私田”所有者纳税。最早实行“公田”、“私田”一律纳税的是鲁国。鲁国在公元前五九四年实行“初税亩”，标志着奴隶制向封建制转化。在这之后，各诸侯国内的新兴封建势力依靠奴隶起义的力量经过同奴隶主贵族的斗争，先后夺取了政权，在政治上进行了变法。秦孝公在公元前三五○年用法家商鞅变法，“坏井田，开阡陌”，就是从法律上废除奴隶制的生产关系，把过去大大小小贵族的田界(封疆)打破，以进一步发展和巩固新兴的地主经济。孔子提出的“兴灭国，继绝世，举逸民”的反动政治口号，就是要把废弃了的奴隶制贵族的大大小小的诸侯王国的“疆界”重新匡正过来，恢复已经垮了台的没落奴隶主贵族的政治、经济上的特权。孟子的“仁政必自经界始”(《孟子·滕文公上》)，也就是同孔子的“兴灭国”一样，要复辟奴隶制的“井田制”。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"73a908cda2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
