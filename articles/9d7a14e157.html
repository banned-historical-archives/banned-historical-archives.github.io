script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"念念不忘批判资产阶级","authors":["文创左"],"dates":[{"year":1969,"month":12,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"上海无线电三厂　文创左"},{"type":"paragraph","text":"全国解放不久，大叛徒刘少奇就一头倒在资产阶级的怀里，并怂恿资本家说:“在我国，大规模的阶级斗争已经过去，资本家、地主、富农都将进入社会主义，他们要进行破坏是很困难的，因为周围的人都看着他们。”反革命修正主义分子周而复亦步亦趋秉承其黑主子的旨意，在反动小说《上海的早晨》口中借徐义德之口，说什么:“我们资产阶级一无军队，二无组织，三无总司令，怎么进攻呢?”看!主子和奴才一唱一和，配合得何等紧密!"},{"type":"paragraph","text":"我们伟大的领袖毛主席教导我们:“有了资产阶级的民主，就没有无产阶级和劳动人民的民主。”很显然，刘少奇、周而复之流之所以如此丧心病狂地替资本家讲话，目的就在篡权，妄图篡共产党的权，专无产阶级的政，把欣欣向荣的社会主义祖国变为暗无天日的资本主义和法西斯的国家，其险恶之心，尽人皆知。"},{"type":"paragraph","text":"从反动小说《早晨》中的“红色小开眼福慕韩，同正统”资产阶级徐义德，直到不法奸商朱延年，他们无一不是在为实现资本主义复辟而大动干戈。朱延年的卖假药，徐义德的偷税漏税，以及马慕韩策划的“星二聚餐会”，不都证明了这一点吗?从无产阶级文化大革命运动中所揭发出来的事实看，在刘少奇反革命修正主义路线控制下，有些要害部门的领导权就被一小撮叛徒、特务、走资派所篡夺，他们疯狂地向无产阶级实行专政。这些血的教训，难道不值得记取吗?"},{"type":"paragraph","text":"反动小说《早晨》的要害问题就是复辟，就是篡权。在无产阶级专政下的中华人民共和国，是不让资产阶级掌权的。他们为了夺回他们失去的天堂，就放出了种种烟幕，向无产阶级进行反夺权，企图把无产阶级专政的早晨变为资本主义复辟的“早晨”，这就是周而复之流的用意。桑伟川企图为《早晨》翻案，这正从反面教育了我们:必须念念不忘无产阶级专政，念念不忘阶级斗争，念念不忘批判资产阶级。让我们更高地举起毛泽东思想伟大红旗，把反动小说《早晨》彻底批深批透。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9d7a14e157"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
