配征购工作指示的批示","authors":[],"dates":[{"year":1960,"month":9,"day":2}],"is_range_date":false,"parts":[{"text":"中共中央转发贵州省委关于一九六O年秋粮分配征购工作指示的批示","type":"title"},{"text":"各省、市、自治区党委：","type":"appellation"},{"text":"贵州省委关于一九六O年秋粮分配征购工作的指示很好，现转发各地参考。","type":"paragraph"},{"text":"贵州省委对于农村口粮的安排，是符合北戴河工作会议的精神的。总之，应当把十二个月的粮食匀做十三个月安排，留一个月的准备粮。这样，留有余地，工作就更加主动。现在农村食堂化了，我们具体负责五亿多农民的吃饭问题，没有一点准备粮是不行的。","type":"paragraph"},{"text":"农村人民公社办的企业、事业人员的口粮还是像贵州省委规定的那样，按农村口粮标准安排为好。","type":"paragraph"},{"text":" 中  央一九六O年九月二日","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f6dfc10b45"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
