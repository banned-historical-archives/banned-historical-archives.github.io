script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"一副当代国际剥削者的嘴脸  苏联无理逼迫印度多还债款","authors":[],"dates":[{"year":1975,"month":3,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"一副当代国际剥削者的嘴脸"},{"type":"paragraph","text":"苏联无理逼迫印度多还债款"},{"type":"paragraph","text":"新华社一九七五年三月二十一日讯　新德里消息：印度报纸最近揭露，苏联当局违反过去同印度达成的协议，硬要印度多还债款，引起印度方面的不满。"},{"type":"paragraph","text":"据印度《金融快报》三月十七日报道，苏联最近以印度卢比贬值为借口，要求印度政府在归还对苏债务时要重新计算苏方贷款的本息。据估计，这将给印度增加约四十亿卢比额外的债务负担。　　这家报纸说：“苏联的这个要求使印度政府感到惊讶。”“四十亿卢比的数字使官员们目瞪口呆。”报纸指出，目前印度偿还苏联的经济和军事贷款的本息，每年已在二十亿卢比左右。而印度得到的苏联在经济“援助”名目下提供的贷款，近几年来每年只有一亿五千万卢比左右。偿还对苏债务已成为印度的沉重负担。"},{"type":"paragraph","text":"这家报纸指出：“苏联要求重新计算债务数额是不公平的。”有消息说，两国过去达成了协议，规定用印度卢比还债，还规定了偿还每笔债的本息数额和期限，这是不能随意更改的。如果卢比升值，苏联决不会同意印度少还债款。因此，现在苏联方面借口卢比贬值要印度多还债是毫无道理的。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ba644845b1"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
