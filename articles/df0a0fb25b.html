奎、吴德等到机场送行","authors":[],"dates":[{"year":1975,"month":5,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京一九七五年五月十二日电　我国国务院副总理邓小平应法国政府邀请，前往法国进行正式访问，今天早晨乘专机离开北京。"},{"type":"paragraph","text":"邓小平副总理的随行人员有:外交部长乔冠华，外贸部局长郑拓彬，外交部礼宾司司长朱传贤、西欧司副司长齐宗华等。"},{"type":"paragraph","text":"到机场送行的有:我国领导人张春桥、李先念、陈锡联、纪登奎、吴德，外交部副部长韩念龙、王海容，外贸部副部长姚依林，有关方面负责人余立金、马仁辉、卓琳、徐维勤、唐闻生、章含之、王珍、高建中。"},{"type":"paragraph","text":"法国驻中国大使馆临时代办马乐和大使馆外交官员也到机场送行。"},{"type":"paragraph","text":"三日晚上，法国驻中国大使克洛德·阿尔诺举行宴会，招待邓小平副总理及其访法随行人员乔冠华外长等。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"吴德","type":"人物"},{"name":"张春桥","type":"人物"},{"name":"李先念","type":"人物"},{"name":"纪登奎","type":"人物"},{"name":"乔冠华","type":"人物"},{"name":"陈锡联","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"df0a0fb25b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
