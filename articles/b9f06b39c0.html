],"dates":[{"year":1963,"month":10,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"\u003cIMG alt=请插入5号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1963\\10\\63a6040201.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e邬大为　词"},{"type":"paragraph","text":"践耳　曲"},{"type":"paragraph","text":"唱法说明这是一首热情豪迈、气魄雄伟的颂歌。唱时要从容不迫，宽广深厚，同时又要结实有力，不能松软，尤其是长音要把气势唱足。第一段的六句，由平稳而一步步趋向激动，好似对党和毛主席的热爱由心底深处涌现出来，奔放不已，然后收束在十分亲切的“毛泽东”一词上。第二段稍快，如豪迈的进行曲。第二次“到处多繁荣”要字字饱满有力，渐强渐慢，好似展现出一片无限美好的景象，并由此引出第三段的颂歌。这时，速度还原，但情绪却比第一段更奔放热烈，直到结束在激情的沸点上。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgaut\u003e邬大为,践耳\u003c/FONT\u003e"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b9f06b39c0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
