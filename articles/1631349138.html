:["武汉大学","程千帆"],"dates":[{"year":1957,"month":6,"day":8}],"is_range_date":false,"parts":[{"text":"“我现在才明白，我们是客人”","type":"title"},{"text":"武汉大学程千帆","type":"authors"},{"text":"(原编者按：这个材料，是根据武汉大学政治学习委员会办公室所提供的材料选编的)","type":"paragraph"},{"text":"6月8日在中文系学习分会上的发言（部分记录）","type":"subtitle"},{"text":"帮助党整风我现在才明白，我们是客人，主人请我们吃馒头，你却要吃面，主人要你提三大主义，你却要提争民主，主人自然不高兴。","type":"paragraph"},{"text":"群众在整风中究竟处于什么地位？现在我才明白，我们是做客的，这象主人出门，请客人看门，也好象请人炒菜。党请我们帮她洗脸，我们却全身洗到了，一直洗到脚，这当然不合规格。主人要你提三个主义，三个主义以外，你就不要多嘴。我们这些人在迷魂阵中积极地钻了一个多月，现在比较看清了自己的地位，痛心的是我的讲义没有写，现在有三条出路，一条是继续帮助党整风洗脸，一条是将来帮助党整风，一条是自动退出，我现在还没有决定，将来是要自动退出的。","type":"paragraph"},{"text":" 来源：《右派言论选集》（湖北人民出版社，1957年9月）。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1631349138"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
