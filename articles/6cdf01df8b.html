art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"在毛主席无产阶级医疗卫生路线指引下阔步前进","authors":[],"parts":[{"type":"paragraph","text":"北京部队某部医院党委在落实毛主席光辉的“六·二六”指示中，经常对医务人员进行路线教育，提高他们贯彻执行毛主席的医疗卫生路线的自觉性。图为党委成员、副院长杜秋成同志结合医疗卫生工作的实践，在对医务人员进行路线教育。"},{"type":"paragraph","text":"沈阳部队某部医疗队，想贫下中农所想，急贫下中农所急，跋山涉水为贫下中农看病送药。"},{"type":"paragraph","text":"海军总医院医疗队贯彻执行毛主席关于“预防为主”的方针，开展以针灸、中草药为主的群防群治活动，提高了群众的健康水平，并且为工厂和农村培训了一批“赤脚医生”。这是医疗队的同志在向“赤脚医生”讲自己使用银针的体会。"},{"type":"paragraph","text":"南京部队八一医院，遵照毛主席关于“一定要消灭血吸虫病”的伟大教导，组织医务人员深入农村，积极开展血防工作，培养“赤脚医生”，受到贫下中农的热烈欢迎。这是医务人员到阳澄湖上进行巡回医疗、军民亲切交谈的情景。"},{"type":"paragraph","text":"（照片五）广州部队海南岛某医院的医务人员，遵照毛主席关于“把医疗卫生工作的重点放到农村去”的伟大指示，深入苗寨黎村，热情为贫下中农服务。（本组照片均为本报通讯员摄）"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6cdf01df8b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
