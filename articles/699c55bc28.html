tart":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"采取多种形式宣讲“四人帮”罪证材料","authors":[],"parts":[{"type":"paragraph","text":"石家庄印染厂党委带领广大职工，反复学习中央有关文件，决心打好第三战役。"},{"type":"paragraph","text":"在发动群众提高认识的基础上，全厂层层举办学习班，培训骨干力量。除厂一级举办党总支书记、支部书记和理论骨干学习班外，各党总支也分头举办了业余学习班。在学习班里，他们认真学习毛主席关于党内走资派问题的论述，学习华主席在十一大上的政治报告，联系实际，深批“四人帮”的反革命政治纲领。目前，全厂已培训骨干三百多名，每个班组都有一名骨干。全厂还组织部分理论骨干，对“四人帮”的罪行材料进行整理、缩写，搞成了四万多字的宣讲材料，派出宣讲队，分头到病休职工的家中宣讲。举办专题广播讲座，充分利用一千多只人户小喇叭，每天分两次举办批判讲座。切实人人明白。广大职工联系实际，摆“四人帮”的流毒和影响，进一步认清了“四人帮”反革命修正主义路线的极右实质。“大干社会主义有理，大干社会主义有功，大干社会主义光荣”的口号更加深入人心，大干快上的劲头越来越足。（据《河北日报》）"}],"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"699c55bc28"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
