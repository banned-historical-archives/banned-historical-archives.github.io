","authors":[],"dates":[{"year":1967,"month":11,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"希尔同志看现代革命京剧《智取威虎山》"},{"type":"paragraph","text":"周恩来、康生、江青、刘宁一等同志陪同观看演出"},{"type":"paragraph","text":"新华社二十四日讯　澳大利亚共产党（马克思列宁主义）主席爱·弗·希尔同志和诺·加拉格尔同志，今天出席了为欢迎他们而举行的文艺晚会，观看了现代革命京剧《智取威虎山》。"},{"type":"paragraph","text":"陪同希尔等同志观看演出的，有中共中央政治局常委周恩来同志、康生同志，中央文革小组第一副组长江青同志，中共中央书记处书记刘宁一同志等。当他们走进晚会会场的时候，全场发出长时间的热烈掌声。演出结束以后，希尔同志和加拉格尔同志，由周恩来、康生、江青等同志陪同，在热烈的掌声中走上舞台，同演员们亲切握手，祝贺演出成功。（附图片）"},{"type":"paragraph","text":"希尔同志和加拉格尔同志，由周恩来、康生、江青、刘宁一同志陪同观看现代革命京剧《智取威虎山》以后，上台和演员合影。"},{"type":"paragraph","text":"新华社记者　王刚法摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"康生","type":"人物"},{"name":"江青","type":"人物"},{"name":"刘宁一","type":"人物"},{"name":"中央文革","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"839908d6a7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
