hors":[],"dates":[{"year":1951,"month":8,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"我国与各国青年代表团举行联欢会"},{"type":"paragraph","text":"各国代表向中国青年的伟大导师毛泽东致敬"},{"type":"paragraph","text":"【新华社柏林十八日电】中国青年代表团于十六日和十七日继续和参加世界青年与学生和平联欢节的各国青年代表举行联欢会。"},{"type":"paragraph","text":"在十六日举行的联欢会上，出席的有波兰、捷克斯洛伐克、匈牙利、罗马尼亚、保加利亚和阿尔巴尼亚的青年代表五百多人。中国青年代表团团长冯文彬致开会词，强调指出了中国青年与东欧各人民民主国家青年之间的兄弟般的关系和友谊。当冯文彬介绍由朝鲜战场前来参加柏林联欢节的中国青年战斗英雄时，全场响起了热烈的欢呼声和掌声。各兄弟国家的青年代表相继发表了演说，盛赞中国人民对世界和平事业的伟大贡献。会上各国青年代表交换了礼物，并表演了精彩的文艺节目。"},{"type":"paragraph","text":"十七日，我国青年代表团和七百名德国青年举行了联欢。冯文彬团长在致词中感谢德国青年在筹备联欢节期间的巨大努力，并对那些在西柏林争取和平集会中受到美国雇佣的西柏林警察袭击受伤的德国青年表示慰问。自由德国青年联盟中央委员会代表库希接着讲话，他说：“当德国青年在西柏林争取和平集会中受到美国警察袭击的时候，他们就想到了中国青年。中国青年和中国人民在反对帝国主义和国内反动派的长期斗争中，已为我们树立了许多光辉的榜样。中国人民的革命运动和胜利，鼓舞了德国青年和德国人民为争取国家统一和独立而斗争。”联欢会历时四小时，会上代表们交换了礼品并表演了文娱节目。"},{"type":"paragraph","text":"【新华社柏林十六日电】中国青年代表团于十五日下午在柏林电工器材厂大厦和拉丁美洲及非洲青年代表举行联欢会。出席的有阿根廷、巴西、智利、墨西哥、西印度群岛、尼日利亚、突尼斯、阿尔及利亚、黄金海岸等二十六个国家的青年代表三百多人。"},{"type":"paragraph","text":"中国青年代表团团长冯文彬在联欢会上代表中国青年向拉丁美洲和非洲的青年朋友们致意。他说：“中国青年斗争的经验证明：如果青年们和全体人民团结在一起，胜利就一定是他们的。团结就是力量。”这时，全场响起了雷动的掌声。"},{"type":"paragraph","text":"西非的青年代表说：“我们西非人民把毛泽东认为是我们争取民族独立斗争中的明灯。我们永不会忘记：中国人民是在经过长期的斗争后，才获得了最后的胜利。所以我们必须坚持不渝地斗争，一直到地球上清除了帝国主义者为止。”其他的代表也发表了演说，他们都对光荣的中国青年和中国青年的伟大导师毛泽东深表敬仰。"},{"type":"paragraph","text":"青年代表们在联欢会上表演了许多民族节目，中国青年则表演了精彩的杂技节目。联欢会在友好的气氛中进行了四小时，代表们最后拿着书籍、纪念章和毛主席的丝质绣像等礼物欢然离去。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0cb1177b92"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
