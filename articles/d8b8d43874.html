" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"戚本禹对“批判陶铸联络站”的指示","authors":["戚本禹"],"dates":[{"year":1967,"month":2,"day":9}],"is_range_date":false,"parts":[{"text":"戚本禹对\"批判陶铸联络站\"的指示","type":"title"},{"text":"戚本禹","type":"authors"},{"text":"〖王恩宇和吴传启向戚本禹汇报批陶工作，回来后传达了戚本禹同志的指示。〗","type":"appellation"},{"text":"刘、邓、陶反动路线影响是根深蒂固的，最近还没有低头认罪。刘少奇被斗后，不承认错误，不承认反对毛主席，只承认提出反动路线。斗争会上，王光美很坏，她对造反派摘刘的帽子很气愤，说不要摘帽子，一摘感冒生病就斗不成了，这里话中有话。陶铸至今也还有活动，前几天广播事业局开会时，还接到一个电话，打电话的人是陶铸，声音很象陶铸。有材料证明，陶铸和反康生的逆流很有关系，与当前运动的阻力很有关系，许多左派组织犯错误和他也有关系。这些人影响还很大，有的地方对他们很崇拜，如安源专门挂刘少奇的像片而不挂毛主席的像；在延安，毛主席住过的和工作过的地方，有的已经成了猪圈，有的地方已经被破坏，但刘、邓住的地方，至今还保持好好的；同时还搞了个展览会，在这个展览会上，主席的照片是和江青同志逗小孩，没有政治内容。任弼时同志的照片是打猎，周总理是和邓颖超同志在一起。而刘少奇、邓小平、朱德则是孜孜不倦地工作。在展览会上，毛主席的题词很少，而刘的题词很多。山东的局面现在还打不开，说刘少奇是好的，报纸上没有点他的名，不能搞，谁要搞就抓谁。朱德在部队中也有一股势力。但陶铸更有一股力量，通县的县委书记是陶铸的人。从这些情况看来，他们还没有低头认罪，离全国共诛之，共讨之还很远，离搞臭他们还很远，离夺他们的权就更远。但现在革命队伍中有些人却认为他们已经变成死狗了，没有什么搞头了。有些人很天真，搞了几下就把他们揪出来了，把几十年的阶级斗争看得太简单了。不把他们斗倒、斗臭、不肃清他们的影响，最后夺他们的权阻力就很大，夺了权以后也不会巩固。","type":"paragraph"},{"text":"因此，我们始终也不要忘记，不要放弃对刘、邓、陶的斗争，这是一个纲。一定要把他们彻底批倒批臭，否则后果是严重的。现在搞他们和大夺权矛盾不矛盾？不矛盾，是一致的。因为搞他们，归根结底是为夺权做准备，是彻底的夺权。与大联合矛盾不矛盾？也不矛盾，也是一致的。因为大联合只能是在批判刘、邓这个问题上的大联合。目前左派比较混乱，夺权有的搞法也不对头。如北航在《北京日报》的搞法不妥当，北航到《天津日报》去夺权，把那里的国旗扯下来，把自己的旗子挂上去，太天真了。","type":"paragraph"},{"text":"夺权应该从政治上夺权嘛！从政治上夺嘛！现在“造反公社”内部矛盾也很大，搞不到一块去。目前谢富治同志也在搞大联合，这点我们要坚决支持，但是不要忘记批判刘、邓、陶这个大方向，不要忘了这个纲。","type":"paragraph"}],"comments":[],"origin":"1967年3月北京玻璃总厂红卫兵联络站编《中央首长讲话（2）》","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"戚本禹","type":"人物"},{"name":"陶铸","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"朱德","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d8b8d43874"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
