script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"刘主席盛宴欢迎也门总统董副主席朱委员长周总理等国家领导人出席　刘少奇主席赞扬也门人民反帝斗争，重申中国支持阿拉伯人民正义事业　萨拉勒总统赞扬中国对阿拉伯人民的支持，称颂也中人民友谊的新发展","authors":[],"dates":[{"year":1964,"month":6,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京2日电】　刘少奇主席今晚在人民大会堂宴会厅举行盛大宴会，热烈欢迎阿拉伯也门共和国总统阿卜杜拉·萨拉勒和由他率领的阿拉伯也门共和国访华代表团。"},{"type":"paragraph","text":"董必武副主席、朱德委员长、周恩来总理等国家领导人出席了宴会。"},{"type":"paragraph","text":"宴会在晚上八时开始，阿卜杜拉·萨拉勒总统和代表团团员:副总理穆罕默德·拉埃尼准将、副总理阿卜杜·拉赫曼·埃里亚尼等贵宾，由刘少奇主席等陪同走进宴会厅。这时，乐队奏欢迎曲，出席宴会的中外人士热烈鼓掌。"},{"type":"paragraph","text":"刘少奇主席在宴会上讲话:他赞扬也门人民为反对帝国主义的侵略和压迫、争取和维护民族独立进行了不屈不挠的斗争，赞扬也门政府奉行和平中立的不结盟政策，致力于阿拉伯和亚非国家的团结，反对帝国主义和新老殖民主义，在国际事务中起着积极的作用。刘主席祝愿也门人民在各方面取得新的更大的成就。"},{"type":"paragraph","text":"刘少奇主席说，阿拉伯民族独立运动的伟大胜利，是第二次世界大战以后的重大国际事件，是全世界被压迫民族争取独立、解放斗争的一个巨大发展。"},{"type":"paragraph","text":"刘主席谴责帝国主义和新老殖民主义不断地对阿拉伯国家进行侵略、干涉、颠复的活动，极力破坏阿拉伯各国的团结，企图继续控制这个重要的战略地区。他重申中国政府一贯支持阿拉伯各国人民用自己选择的方式来实现他们团结和统一的愿望，支持阿拉伯各国人民争取和维护民族独立的斗争，反对任何方面对阿拉伯国家的侵略和干涉。"},{"type":"paragraph","text":"刘主席说，我们强烈谴责美国策动以色列对阿拉伯国家进行挑衅的阴谋。我们支持巴勒斯坦人民实现恢复合法权利和重返家园的正当要求。我们支持亚丁、南也门和阿曼人民反对殖民主义的正义斗争。我们支持阿拉伯国家要求撤除一切外国军事基地的严正立场。他指出，阿拉伯各国人民团结反帝的事业一定能够克服各种障碍，胜利前进。"},{"type":"paragraph","text":"在谈到中也两国的友好关系时，刘少奇主席说，中国将一如既往地乐于对也门人民的正义事业作出自己力所能及的贡献。他对阿拉伯也门共和国政府和人民一贯支持恢复中国在联合国的合法权利表示感谢。刘主席还表示相信，萨拉勒总统阁下的访问一定会进一步加深两国的相互了解，促进两国友好合作关系的新发展。"},{"type":"paragraph","text":"萨拉勒总统在讲话中转达了也门人民的友好情意。他赞扬中国政府和中国人民一贯支持也门和阿拉伯人民的事业，支持阿拉伯人民的合法要求，支持阿拉伯人民反对帝国主义阴谋的斗争，反对对阿拉伯国家的任何侵略。"},{"type":"paragraph","text":"他说，中国政府的这一支持，加强了阿拉伯人民为维护独立反对帝国主义阴谋所进行的斗争。他谴责帝国主义阴谋破坏阿拉伯人民的团结，以便卷土重来，恢复其殖民统治，剥夺阿拉伯人民的自由，掠夺他们的财富。"},{"type":"paragraph","text":"总统说，阿拉伯也门共和国政府从它进行解放革命的第一天起就宣布奉行积极中立和不结盟的政策，致力于阿拉伯人民和亚非人民的团结，反对新老殖民主义，真诚无私地支持一切致力于世界和平，各国人民的解放和和平共处的人民。"},{"type":"paragraph","text":"总统说，阿拉伯也门共和国和其他阿拉伯国家，将始终不渝地坚决支持中国在联合国内占有自己的应有地位的合法权利。"},{"type":"paragraph","text":"萨拉勒总统称颂也中两国人民友谊的新发展。他说，他们在中国的访问，对巩固和发展也中两国之间的友好关系和卓有成效的合作关系将产生巨大的作用。"},{"type":"paragraph","text":"刘少奇主席和萨拉勒总统讲话以后，乐队分别奏也门和中国国歌。他们的讲话受到全场热烈的鼓掌欢迎。"},{"type":"paragraph","text":"出席宴会的。还有人大常委会副委员长郭沫若、彭真、赛福鼎，国务院副总理陈毅、李富春、罗瑞卿，政协全国委员会副主席包尔汉，国防委员会副主席蔡廷锴，最高人民检察院检察长张鼎丞，外交部副部长姬鹏飞、曾涌泉，政府各部门、各民主党派、各人民团体和北京市的负责人，中国人民解放军高级将领，以及首都各界知名人士。"},{"type":"paragraph","text":"各国驻中国的使节应邀出席了宴会。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"01de2549a4"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
