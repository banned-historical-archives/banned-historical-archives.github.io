uthors":["谷牧"],"dates":[{"year":1975,"month":8,"day":26}],"is_range_date":false,"parts":[{"text":"谷牧在全国施工企业经济核算经验交流会上的讲话","type":"title"},{"text":"谷牧","type":"authors"},{"text":"“我们有许多企业，机构庞大，非生产人员这么多。沈阳有个材料反映，现在生产企业在第一线的人，只占百分之五十，其余有百分之三十左右是脱产管理干部。还有百分之十几是搞非生产性的社会活动，名堂很多，如打球、演戏等等。这种情况，不是个别地区，也不是个别企业。”","type":"paragraph"},{"text":"“现在我们检查了一下，还有百把个亿，横冲直撞在冲击国家计划，计划没有一个统一计划。财政管理也没有严格的制度，纪律有点散，钱不知化到哪里去了。在物资管理上是更散。总之，我们的经济工作中突出的是‘散’。”","type":"paragraph"},{"text":"“管理制度突出是个‘乱’。各种出洋相的事多得很。钢水跑了，轨道埋在土里。交班在床头交班，在马路上交班，机器上挂牌子交班……”","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"谷牧","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bcedfeff64"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
