tart":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"中越军队足球篮球友谊赛在河内举行武元甲大将和叶剑英元帅观看了足球赛","authors":[],"parts":[{"type":"paragraph","text":"新华社河内21日电 中国人民解放军“八一”足球队同越南人民军“体工”足球队今天晚上冒雨在河内行底运动场举行友谊比赛，结果是1：1，双方不分胜负。"},{"type":"paragraph","text":"比赛前举行了开幕仪式。"},{"type":"paragraph","text":"越南民主共和国政府副总理兼国防部长武元甲大将和正在越南进行友好访问的中国军事友好代表团团长叶剑英元帅观看了球赛。"},{"type":"paragraph","text":"球场上高悬着“中、越两个兄弟国家人民和军队之间的友谊万古长青”的红底金字横幅标语，三百多观众热烈观看了这场精彩的比赛。"},{"type":"paragraph","text":"新华社河内22日电 应邀到越南民主共和国作友好访问和比赛的中国人民解放军“八一”男子篮球队，今天在河内行底运动场同越南人民军“体工”男子篮球队进行第一场友谊比赛，结果“八一”队获胜。"},{"type":"paragraph","text":"数千观众冒雨观看了这场比赛。越南民主共和国国防部副部长、中央体育委中会主任黄文泰中将等军政领导人观看了球赛。"},{"type":"paragraph","text":"中国驻越南大使馆参赞汪涛、副武官李继初等外交官员也观看了球赛。"}],"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"af7f5b041d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
