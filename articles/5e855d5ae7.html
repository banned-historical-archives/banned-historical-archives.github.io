script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"在庆祝阿尔巴尼亚建军节大会上  巴卢库严正谴责南共修正主义  指责铁托集团抹煞苏军帮助解放南斯拉夫的事实","authors":[],"dates":[{"year":1958,"month":7,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"在庆祝阿尔巴尼亚建军节大会上"},{"type":"paragraph","text":"巴卢库严正谴责南共修正主义"},{"type":"paragraph","text":"指责铁托集团抹煞苏军帮助解放南斯拉夫的事实"},{"type":"paragraph","text":"新华社地拉那10日电　阿尔巴尼亚全国各地在10日这一天热烈庆祝阿尔巴尼亚人民军建军十五周年。首都地拉那和发罗那等英雄城市都鸣放礼炮来庆祝这一重要节日。晚间，部长会议第一副主席兼国防部长巴卢库举行了盛大的节日招待会。"},{"type":"paragraph","text":"在节日前夕，阿尔巴尼亚国防部和民族阵线地拉那市领导机关联合举行了盛大庆祝会。霍查、列希、科列加等党政领导人参加了大会。国防部长巴卢库在大会上作了关于庆祝建军节的报告。他强调了保卫和平和维护社会主义阵营团结的重要性，并且严正谴责了以南共领导集团为代表的现代修正主义。"},{"type":"paragraph","text":"巴卢库谴责铁托集团无耻抹煞苏联军队用自己的鲜血帮助解放南斯拉夫的事实。他还指出，南斯拉夫的修正主义领导也抹煞了阿尔巴尼亚游击队员在南斯拉夫土地上抗击德国法西斯武装、流血牺牲的事实。巴卢库说，“可是，我们相信，阿尔巴尼亚游击队员为了共同的事业在战场上所流的鲜血，将记在兄弟的南斯拉夫人民的心里。”他还指出，南共的修正主义领导人敌视马克思列宁主义原则和社会主义阵营的活动只不过是为美国帝国主义效劳。应该在政治上和思想上彻底揭露和孤立这些人。他说，在马克思列宁主义思想的活力和以苏联为首的社会主义阵营的坚强团结面前，南斯拉夫的修正主义者在其敌对活动中已经遭到失败，今后还要继续失败。"},{"type":"paragraph","text":"巴卢库还谴责了意大利阴谋建立火箭发射装置的企图。他说，这一措施如果实现，阿尔巴尼亚政府为了保卫民族独立，就将被迫采取措施，用强有力的反击给予回答。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5e855d5ae7"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
