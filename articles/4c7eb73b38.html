s":[{"year":1961,"month":11,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛泽东著作选读出版"},{"type":"paragraph","text":"已陆续发给解放军各连队"},{"type":"paragraph","text":"本报讯　为了满足广大战士学习毛泽东著作的迫切要求，解放军总政治部宣传部遵照林彪元帅的指示，编印了《毛泽东著作选读》，已经从10月份起陆续发给全军各连队。"},{"type":"paragraph","text":"《毛泽东著作选读》一书，大部选自《毛泽东选集》第一卷至第四卷，一小部分选自《关于正确处理人民内部矛盾的问题》。全书共十二篇又十节。"},{"type":"paragraph","text":"这个选本的特点是：一、从战士的实际需要出发，便于活学活用；二、内容精干，重点鲜明，适应急用先学、有重点地学这一原则；三、份量不大，照顾了战士的阅读能力和学习时间。这一选本的编发，对于推动全军战士进一步学习毛泽东思想，对于用毛泽东思想武装全军战士的头脑，对于创造四好连队提高全军的战斗力，都将产生很大作用。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"人民内部矛盾","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4c7eb73b38"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
