art":7,"page_end":7,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"向毛主席热烈祝贺中国氢弹爆炸成功","authors":[],"parts":[{"type":"paragraph","text":"新华社十八日讯 越南民主共和国主席胡志明、越南民主共和国会常务委员会主席长征、越南民主共和国政府总理范文同，今天打电报给毛泽东主席和中国共产党中央委员会、人大常委会和中国政府，热烈祝贺中国第一颗氢弹爆炸成功。贺电全文如下："},{"type":"paragraph","text":"北京"},{"type":"paragraph","text":"毛泽东主席同志，"},{"type":"paragraph","text":"中国共产党中央委员会，"},{"type":"paragraph","text":"中华人民共和国全国人民代表大会常务委员会，"},{"type":"paragraph","text":"中华人民共和国政府"},{"type":"paragraph","text":"值此中国第一颗氢弹爆炸成功之际，我们代表越南人民、越南劳动党、越南民主共和国国会、越南民主共和国政府，并以个人的名义，谨向你们表示最热烈的祝贺。"},{"type":"paragraph","text":"这个伟大成就标志着中国在掌握核武器方面进入了一个新的发展阶段。"},{"type":"paragraph","text":"中国已经有了原子弹，现在又有了氢弹，不仅使中华人民共和国的国防力量更加强大，而且为世界人民反对以美国为首的帝国主义和保卫和平的斗争作出了巨大贡献。"},{"type":"paragraph","text":"越南人民为兄弟的中国人民的这个辉煌成就而感到欢欣鼓舞，并且把它看作是对自己的抗美救国斗争以及对世界工人阶级和世界人民争取和平、民族独立、民主和社会主义的斗争的强大鼓舞力量。"},{"type":"paragraph","text":"请你们向中国人民解放军指战员、中国工人兄弟姐妹和科学技术工作者转达我们亲切的祝贺。"},{"type":"paragraph","text":"祝你们身体健康。"},{"type":"paragraph","text":"越南民主共和国主席 胡志明"},{"type":"paragraph","text":"越南民主共和国国会常务委员会主席 长征"},{"type":"paragraph","text":"越南民主共和国政府总理 范文同"},{"type":"paragraph","text":"一九六七年六月十八日于河内"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2dc5fa4a29"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
