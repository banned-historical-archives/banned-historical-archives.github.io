斗争中看到自己的希望与光明","authors":[],"dates":[{"year":1967,"month":2,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"日本朋友热情赞扬我国文化大革命"},{"type":"paragraph","text":"中国革命造反派夺权是最彻底的革命"},{"type":"paragraph","text":"日本人民从夺权斗争中看到自己的希望与光明"},{"type":"paragraph","text":"新华社东京电　日本朋友继续热烈赞扬中国无产阶级文化大革命的巨大历史意义和中国无产阶级革命派的夺权斗争。"},{"type":"paragraph","text":"日中友好协会（正统）总部新宿支部力月金治说，毛主席亲自发动和领导的中国无产阶级文化大革命创造性地发展了马克思列宁主义。七亿中国人民高举毛泽东思想伟大红旗，进行文化大革命，证实了物质变精神、精神变物质这一真理。"},{"type":"paragraph","text":"他说，中国无产阶级文化大革命使我们的敌人失魂落魄，他们拚命地诬蔑和中伤这场革命，就恰恰说明中国无产阶级文化大革命所提供的经验是放之四海而皆准的普遍真理。"},{"type":"paragraph","text":"日中友好协会（正统）总部田无保谷支部会员赤松康稔强调指出，中国人民高举毛泽东思想伟大红旗，不仅保证了中国从社会主义向共产主义胜利前进，永不变色，而且为世界革命做出了伟大贡献。"},{"type":"paragraph","text":"日中友好协会（正统）总部埼玉支部会员井上忠夫说，中国无产阶级革命派向党内一小撮走资本主义道路的当权派手中夺权的革命行动，大大地鼓舞了日本的劳苦大众。他们从中国无产阶级革命派的夺权斗争中看到了自己的希望与光明。他说，我认为，中国无产阶级革命派所走的道路，才是真正的社会主义道路，是最彻底的革命，好得很。"},{"type":"paragraph","text":"日本亚非问题研究家佐藤宏说，中国无产阶级文化大革命由于有毛主席的英明领导，一定能取得最后胜利。"},{"type":"paragraph","text":"他说，《红旗》杂志一九六七年第三期社论《论无产阶级革命派的夺权斗争》，通篇闪耀着当代马克思列宁主义的最高峰毛泽东思想的光辉。社论中特别强调的彻底打碎资产阶级专政机构，“不能采取改良主义，不能合二而一，不能和平过渡”的观点，对世界其他各国革命人民也有极为重要的指导意义。"},{"type":"paragraph","text":"他指出，日本的修正主义分子的所作所为已与马克思列宁主义毫无共同之处。他们正在实行的是改良主义、修正主义、“和平过渡”。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6553d8e2f3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
