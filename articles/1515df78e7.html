林学院师生"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"东北林学院右派言论","type":"title"},{"text":"东北林学院师生","type":"authors"},{"text":"“当一个阶级还没有成为统治阶级以前是有威信的，一旦成为统治阶级后。威望就可能降低，就忘了人民，人民将会反对他的。我认为我们的革命是为了少数共产党员，而革命死了多少人都是农民，共产党革命时候很艰苦，穿草鞋。现在住小洋房，坐小汽车的全是那些穿草鞋的人，而农民却住小茅屋。我看共产党好象好了疮疤忘了疼。”（东北林学院  陈大耀）","type":"paragraph"},{"text":"“人与人之间没有真正的友谊和同志感情，天可度，地可量，唯有人心不可防。”（东北林学院  曹恩邦）","type":"paragraph"},{"text":"“毛主席观察陕北农村与农民照相，农民害怕，不敢正视毛主席。三户贫农社的代表和毛主席碰杯，毛主席是假仁慈。”（东北林学院　曹恩邦）","type":"paragraph"},{"text":"“现在主要是对待专政者，以后是否受到打击报复呢？因为档案材料全部掌握在专政者手里，又是不公开的。","type":"paragraph"},{"text":"群众的顾虑是多种多样的。条文式的报告，不可能打消顾虑。要想大放大鸣，只有看党委领导放的决心。”（东北林学院  冰里花〔化名〕）","type":"paragraph"}],"comments":[],"origin":"《高等学校右派言论选编》（中共中国人民大学委员会，1958年8月）。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1515df78e7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
