":[{"year":1970,"month":5,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"伟大领袖毛主席万岁！万岁！万万岁！"},{"type":"paragraph","text":"我们的伟大领袖毛主席和他的亲密战友林彪副主席与柬埔寨国家元首、柬埔寨民族统一阵线主席诺罗敦·西哈努克亲王在首都人民支持世界人民反对美帝国主义斗争大会主席台上。　（新华社发）"},{"type":"paragraph","text":"毛主席支持世界人民反对美帝斗争的庄严声明发表后，参加大会的首都工人坚决表示：一定要响应伟大领袖毛主席的号召，发扬无产阶级国际主义精神，以实际行动支援世界人民的反对美帝的斗争。"},{"type":"paragraph","text":"五月二十一日，首都各界五十万人在天安门广场举行支持世界人民反对美帝国主义斗争大会。当伟大领袖毛主席登上天安门城楼时，革命群众欢声雷动，齐声高呼：“毛主席万岁！”“毛主席万万岁！”"},{"type":"paragraph","text":"“得道多助，失道寡助。”美帝悍然出兵入侵柬埔寨，扩大侵略印度支那战争的滔天罪行，激起了七亿中国人民的极大愤慨。这是北京郊区的贫下中农振臂高呼：“坚决支持印度支那三国人民的抗美救国战争！”“美帝国主义必败！全世界人民必胜！”"},{"type":"paragraph","text":"伟大领袖毛主席支持世界人民反对美帝国主义斗争的庄严声明，极大地鼓舞了中国人民和全世界人民的战斗意志。这是外国朋友在首都人民支持世界人民反对美帝国主义斗争大会上。"},{"type":"paragraph","text":"（本版照片是新华社记者和本报记者摄）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"51096d49e1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
