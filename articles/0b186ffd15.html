art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"象白求恩那样毫不利己专门利人","authors":["某部学习毛主席著作积极分子/卫生员余春堂"],"parts":[{"type":"paragraph","text":"中国赫鲁晓夫在医疗卫生战线上大肆贩卖反革命修正主义黑货。他宣扬什么“医务工作者学习的好，应有奖励，工资提高一级；有本领者，应享受专家待遇，……”等等。他的险恶用心，就是妄图用名利地位来引诱我们医务工作者，使我们成为象他一样的资产阶级利己主义者，成为他复辟资本主义的工具。"},{"type":"paragraph","text":"是用无产阶级思想培养全心全意为人民服务的医务工作者，还是用名利地位等资产阶级黑货把医务工作者“刺激”成专门为资产阶级老爷服务的精神贵族，这是毛主席的无产阶级革命路线与中国赫鲁晓夫的修正主义路线的根本区别。"},{"type":"paragraph","text":"伟大领袖毛主席教导我们：“白求恩同志毫不利己专门利人的精神，表现在他对工作的极端的负责任，对同志对人民的极端的热忱。每个共产党员都要学习他。”我们无产阶级的医务工作者，就要按照毛主席的教导，象白求恩同志那样，毫不利己，专门利人，全心全意为人民服务，当好人民的勤务员。有一次，贫农邢大爷领着他九岁的哑巴女儿来找我治疗。我虽然从来没有治疗过哑巴病，又不会扎针，但是，当我想到要让贫下中农的后代能够高呼“毛主席万岁”时，我就勇敢地接受下来，千方百计地给她治疗。开始，我参考《针灸学》，先在自己身上练扎针。经过反复练习，摸到点门路，就给那个小姑娘扎。可是，一连扎了十几次也没有见效果。毛主席说：“我们这个队伍完全是为着解放人民的，是彻底地为人民的利益工作的。”在毛主席的教导鼓舞下，我又反复在自己耳朵旁边试扎，寻找新穴位。我一边摸索，一边继续对患儿进行扎针治疗。扎到第十天，小姑娘开始慢慢能发出声音了。这时候，我真有说不出的高兴。我兴奋地一个字一个字地教她喊：“毛主席万岁！”终于，孩子比较清楚地说出了第一句话：“毛——主——席——万——岁！”这声音，表达了广大贫下中农无限热爱毛主席的深厚无产阶级感情，也显示了战无不胜的毛泽东思想的无比威力。"},{"type":"paragraph","text":"中国赫鲁晓夫妄想用名利地位来腐蚀毛主席的卫生战士，那是白日作梦。我们走的是为人民服务的道路，干的是为人民服务的事业。我们一定要彻底批判中国赫鲁晓夫推行的反革命修正主义路线，永远读毛主席的书，听毛主席的话，用毛泽东思想改造自己的灵魂，一辈子全心全意为人民服务。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0b186ffd15"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
