":1954,"month":9,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京二十七日电】　我中央人民政府毛泽东主席二十七日下午二时二十分，接见了应邀来我国参加建国五周年国庆典礼的蒙古人民共和国政府代表团团长、蒙古人民共和国大人民呼拉尔主席团主席扎·桑布，团员::蒙古人民共和国国防部部长桑·巴特中将，蒙古人民共和国驻我国特命全权大使奥其尔巴特，外交部交际司司长彭·沙格达苏伦，扎木图牧业生产合作社主任查·奥特亨。"},{"type":"paragraph","text":"接见时在座的，有我中央人民政府副主席刘少奇、李济深，秘书长林伯渠，政务院总理兼外交部部长周恩来，副总理董必武。"},{"type":"paragraph","text":"【新华社北京二十七日电】　中华人民共和国主席毛泽东二十七日晚九时，接见了应邀来我国参加建国五周年国庆典礼的保加利亚人民共和国政府代表团团长、保加利亚共产党中央政治局委员、保加利亚人民共和国部长会议副主席拉·达米扬诺夫，团员:保加利亚共产党中央委员、保加利亚人民共和国外交部部长明·湼伊切夫博士，保加利亚农民联盟常务委员会委员、保加利亚人民共和国司法部部长拉·纳伊登诺夫，保加利亚共产党候补中央委员、保加利亚人民共和国国防部副部长扎·扎哈里耶夫中将和团员、保加利亚共产党中央委员、保加利亚人民共和国驻我国大使迪莫夫。"},{"type":"paragraph","text":"接见时在座的，有刘少奇、周恩来、董必武、邓小平、陈毅。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4b39db1c10"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
