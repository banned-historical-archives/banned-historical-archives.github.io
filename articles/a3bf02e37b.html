" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"山东高等学校教师思想改造的学习","authors":["张达干"],"dates":[{"year":1952,"month":2,"day":8}],"is_range_date":false,"parts":[{"text":"山东高等学校教师思想改造的学习","type":"title"},{"text":"张达干","type":"authors"},{"text":"山东高等学校教师思想改造学习运动，自去年十一月下旬开始以来，到今年一月中旬，共进行七周，业已结束第一阶段的学习。参加学习的已有一千零二十三人，包括几乎全部教师和一部分职员。按照山东省高等学校教师学习委员会的计划，思想改造学习共分为三个阶段——第一阶段，思想动员；第二阶段，解决思想问题；第三阶段，学习国家建设和教育改革问题。第一阶段学习的具体要求是端正学习态度，开展批评和自我批评，初步地全面地暴露各种思想问题。经过七周学习，基本上已达到了这个目的。目前估计，约有四分之三的人数，对于思想改造抱有积极的、自觉的态度，有些向来不问政治的教授、医生也积极参加了这次学习。过去齐鲁大学从没有有计划地领导过教师学习，这次思想改造学习运动却开展得相当好。各院、校都作到了首长负责、亲自领导，以教师思想改造学习为学校当前的中心工作之一。大部分教师开始运用批评和自我批评的武器，也开始敢于向领导同志开展批评了。和开展批评与自我批评的同时，暴露并揭发了工作上及个人思想上的不少问题。如有些院、校系科内部或系科之间在历史上存在的不团结问题，也开始暴露出来并逐渐获得解决。","type":"paragraph"},{"text":"第一阶段学习大体是分作两个步骤进行的。第一步，着重解决学习态度、学习方法问题（同时暴露一部分思想问题）；第二步，着重全面地暴露各种思想问题（同时进一步提高学习的积极性、自觉性，进一步开展批评和自我批评）。山东省高等学校教师学习委员会并曾经邀请省府文化教育委员会夏征农副主任作过两次启发动员报告。","type":"paragraph"},{"text":"目前，各校已在第一阶段学习的基础上，转入反对贪污、反对浪费、反对官僚主义的运动。估计经过这一运动，将为教师思想改造学习打下更有利的基础。","type":"paragraph"}],"comments":[],"origin":"《人民日报》1952年2月8日","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a3bf02e37b"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
