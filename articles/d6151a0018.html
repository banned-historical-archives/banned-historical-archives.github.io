al-archives/banned-historical-archives8/main/maoquanji8.pdf"],"article":{"title":"东北军工作委员会工作问题","alias":"","parts":[{"type":"paragraph","text":"东北军工作委员会工作问题！"},{"type":"paragraph","text":"（1936年7月28日）"},{"type":"paragraph","text":"这个时期的工作委员会有很大的进步，可谓很好的模范，请恩来同志写出一篇文章来。过去我们确定的工作方针是：第一，在西边建立根据地；第二，在东边开展游击战争；第三，建立联合战线。以后的工作方针还是这三条，但次序要变更，把建立联合战线放在第一位。对东北军，对杨虎城部队，对南京部队，都要建立工作委员会。最重要的是庆阳方而，这里敌军多，应广泛地去联合他们。建立联合战线的工作，应大家出马，不应关起门来。不仅注意上层，还应该抓紧中级的工作。红军的行动应配合这一工作。在目前，要注意蒋介石的进攻。"},{"type":"paragraph","text":"[1]这是毛泽东在中共中央政治局常委会议上关于东北军工作委员会工"}],"authors":["毛泽东"],"dates":[{"year":1936,"month":7,"day":28}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":547,"page_end":547},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d6151a0018"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
