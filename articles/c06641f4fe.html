art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"三机班联系实际学毛主席著作懂得人是战争的决定因素；决心练好二百米内硬功夫","authors":["夏木"],"parts":[{"type":"paragraph","text":"本报讯 8207部队七连三排机枪班，联系实际学习毛主席著作，正确认识人和武器的关系。进一步明确了“人的因素第一”的观点，决心练好二百米内硬功夫。"},{"type":"paragraph","text":"三机班有些战士过去对人和武器的关系弄不清。领导上组织他们学习了毛主席有关的论述，学习了我军的光荣传统，使大家明确了武器虽然是战争的重要的因素，但不是决定的因素，决定的因素是人不是物。战士任俊江说：“经过学习，我进一步了解了我们军队历来能够以劣势装备打败敌人的道理。一个炊事员拿根扁担还捉了俘虏。我还联想起电影《董存瑞》里的八路军把高粱秆子装作子弹缠在腰上打敌人的情形。那时候一个人只有三发子弹，就能打胜仗。我们今天装备比那时好多了，打胜仗就更有把握了。”你一言，我一语，从红军“两条半枪打天下”，谈到小米加步枪打败日本鬼子，消灭蒋匪军八百多万，最后谈到抗美援朝战争中的上甘岭战役。大家对毛主席的人民战争的思想，越谈体会越深刻。"},{"type":"paragraph","text":"他们还讨论到关于原子弹的问题。有的战士说，美国人宣传投了两个原子弹，就把日本炸得投降了。读了毛主席的著作，才知道根本不是那么回事。毛主席说过：“原子弹是美国反动派用来吓人的一只纸老虎，看样子可怕，实际上并不可怕。”战士李齐佑说：“我看什么武器也没有我们的精神原子弹厉害。”大家将物质原子弹和精神原子弹作了比较。一致认为，原子弹虽然是一种大规模的杀伤武器，但并不能决定战争的胜负，占领阵地终究要靠人。我们的精神原子弹的威力才是无穷的。"},{"type":"paragraph","text":"最后，大家归结到，还是要发挥人的因素的作用，积极练好二百米内硬功夫。大家都说，学习了毛主席著作，对练好二百米内硬功夫的认识更深刻了。班长说：“我们是机枪班，主要练射击和投弹。射击方面，全班虽然都是优等射手，但是不能满足，要精益求精。在投弹方面，全班要加把劲，争取更好的成绩。学军事，不能忘了学政治，高度的政治觉悟和勇敢精神，是保证练好二百米硬功夫，保证打胜仗最要紧的东西。”大家一致同意班长的意见。 （夏木）"}],"alias":""},"tags":[{"name":"人民战争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c06641f4fe"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
