script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"江西省赣州市郊东风大队革委会在解放军支农人员帮助下以阶级斗争为纲推动备耕工作胜利开展举办毛泽东思想学习班，及时粉碎阶级敌人破坏备耕的阴谋","authors":[],"dates":[{"year":1970,"month":2,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社南昌二十二日电　江西省赣州市郊区公社东风大队革委会遵循毛主席关于“千万不要忘记阶级斗争”的伟大教导，在解放军支农人员帮助下，紧紧抓住阶级斗争这个纲，带领社员用革命统帅生产，使备耕工作搞得既轰轰烈烈，又扎扎实实。现在，这个大队的水利工程已完成了四万多土石方，比去年同期增加十倍多。每亩田上了二十多担土杂肥，稻田都平得整整齐齐。全大队一千二百多亩田，除绿肥外，都普遍深翻细耙了两次，还做好了育秧前的各项准备工作，为夺取今年农业丰收打下了基础。"},{"type":"paragraph","text":"去年冬种一结束，东风大队革委会就遵照毛主席关于“不失时机地掌握生产环节”的教导，发动社员投入了今年的春耕准备工作。当时，大队革委会强调，在备耕中一定要把革命放在首位。但是有的同志却只顾埋头抓生产，放松了抓阶级斗争。针对这种情况，解放军支农人员和大队革委会成员就深入生产第一线，以“备耕生产首先应该抓什么”为题，举办毛泽东思想学习班，组织各生产队干部和社员学习毛主席关于“我们已经取得了伟大的胜利。但是，失败的阶级还要挣扎。这些人还在，这个阶级还在。所以，我们不能说最后的胜利。几十年都不能说这个话。不能丧失警惕”的伟大教导，引导大家联系备耕，分析阶级斗争新动向，狠批叛徒、内奸、工贼刘少奇的“阶级斗争熄灭论”。通过学习和研究阶级斗争的新特点，使大家深受教育。他们深刻认识到，不甘心失败的一小撮阶级敌人并没有睡觉，时刻都在寻机捣乱，如果我们只顾埋头生产，阶级敌人就会有机可乘，就会进行破坏。大家说:“备耕再忙，狠抓阶级斗争不能忘。”"},{"type":"paragraph","text":"广大贫下中农和生产队干部革命警惕性提高以后，都密切注视阶级斗争新动向，及时粉碎阶级敌人妄图破坏备耕的阴谋。入春以来，大队修了一条二公里长的灌溉渠。正当工程紧张进行的时候，工地上却出现了一股不利于革命团结的邪风。正在工地上和群众一起劳动的大队革委会副主任，立即组织社员举办学习班，用毛泽东思想武装大家的头脑，发动群众揪出了妄图挑拨干群关系的坏分子，保证了工程的顺利进行。"},{"type":"paragraph","text":"这个大队的革委会把备耕的过程，变为领导群众活学活用毛泽东思想，提高阶级斗争觉悟的过程。白天在田间劳动时，解放军支农人员和革委会成员就利用田头休息时间，组织社员开讲用会，学习毛主席有关阶级和阶级斗争的论述，狠批刘少奇的“阶级斗争熄灭论”，肃清刘少奇的反革命修正主义余毒。晚上，支农人员和革委会成员还深入到生产队和社员家庭，帮助各队举办生产队学习班和联户学习班，同贫下中农一起讨论、分析阶级斗争的新动向，使社员经常保持高度的革命警惕性，保证了备耕生产的胜利发展。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"江西文革","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"91b04810c8"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
