uthors":[],"dates":[{"year":1950,"month":5,"day":19}],"is_range_date":false,"parts":[{"text":"上海商业金融业停工歇业情况","type":"title"},{"text":"商业中停歇者，以南北货业、米粮行、棉纱行号、棉布业为最多。","type":"paragraph"},{"text":"金融业方面：自二月六日至四月二十七日止，私营行庄倒闭停业数达六十四家，其中银行四一家、钱庄二三家，尚能维持业务者，又有百分之三○至四○左右的放款成为呆账。这种倒风，仍有继续可能。","type":"paragraph"},{"text":"反映在商业和金融上的有几个主要情况是：","type":"paragraph"},{"text":"一、市场门售均减，主要商品成交指数由三月份七九·七降至四四。六大百货公司销售指数由八九·七降至五五·一。","type":"paragraph"},{"text":"二、公私营银行最近存款总额为一万三千亿元，可是票据交换数字仅有一千五百亿元左右，仅占存款数的九分之一，这是十三年来未见过的现象。","type":"paragraph"},{"text":"三、行庄放款完全被搁浅者(不付息而转期者尚不在内)，私营行庄有四百亿元，公私合营行庄有二九三亿元，国家银行有一四三亿元。(上海分社材料)","type":"paragraph"}],"comments":[],"origin":"新华通讯社编《内部参考》1950年5月19日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"242f3879e4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
