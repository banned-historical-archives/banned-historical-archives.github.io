ar":1976,"month":11,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席啊，您放心吧！"},{"type":"paragraph","text":"刘章红旗一城，绿柳一城，十月的北京披起彩虹；百万军民心向领袖华主席，天安门广场涌起波涛万顷。英雄碑迎来了满天朝霞，金水河涌出了一地笑声；啊，多少人望着毛主席画像，一个个腮边上喜泪盈盈。敬爱的领袖毛主席啊，您最了解人民的心情，您培养了我们最放心的接班人，华主席正把您的红旗高擎！“你办事，我放心”。毛主席的信任代表八亿人民。一举横扫魑魅魍魉，革命，正在大踏步进行。毛主席啊，您放心吧——您指引的路上，车飞笛鸣，您播下的种子，花开如锦，共产主义大厦一定会胜利建成！"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e4337d6e1f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
