<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"实行以人定量的口粮分配办法好处多","authors":[],"dates":[{"year":1957,"month":8,"day":2}],"is_range_date":false,"parts":[{"text":"实行以人定量的口粮分配办法好处多","type":"title"},{"text":"六合县妯娌乡第六农业社虽是个余粮社，但按三定标准分配口粮，社员间余缺不匀，有的社员不够吃的现象总还是个问题。最近，我们在该社作了“农村人口口粮分配新办法”（卽按年龄大小、劳动力的差别分等分配口粮）的试点，效果良好。","type":"paragraph"},{"text":"我们首先了解了情况，提出了内订方案，然后发动群众，反复协商，修正方案，最后确定的分配方案是：","type":"paragraph"},{"text":"一至二岁为一等，每人定量标准一百五十斤；","type":"paragraph"},{"text":"三至五岁为二等，每人定量标准二百六十五斤；","type":"paragraph"},{"text":"六至八岁为三等，每人定量标准三百四十五斤；","type":"paragraph"},{"text":"九至十一岁为四等，每人定量标准四百斤；","type":"paragraph"},{"text":"十二岁以上为五等，每人定量标准四百九十斤；","type":"paragraph"},{"text":"单身汉每人定量标准五百二十斤；","type":"paragraph"},{"text":"五包户和有劳力不参加农业生产的人仍按“三定”口粮四百四十斤分给。","type":"paragraph"},{"text":"这样分配的结果，旣未超过“三定”口粮总数，又照顾到了农民的实际需要。全社一百七十户比“三定”时增加口粮的有一百三十九户，占82.3％，减少口粮的仅三十一户，占17.7％。因而能为多数干群乐意接受。","type":"paragraph"},{"text":"在实施以人定量新的分配办法中，我们体会有如下好处：","type":"paragraph"},{"text":"一、减少了透支户，改变了不合理的现象。该社小孩多劳力少的二十二户社员—百三十三人，去年应得口粮五万八千五百二十斤，虽然粮食比别人宽裕，但因工分做得少，透支了社内现金六百三十五元二角。分等定量后，适当减少了食用粮，有十二户已可以自己的工分拿回全部应得口粮；","type":"paragraph"},{"text":"二、缓和了粮食紧张情况。该社二十八户大口多的社员，去年口粮与别人一样，今春普遍闹供应，结果增加供应量九千四百四十斤。实行以人定量后，他们的口粮比过去增加了三千七百九十斤。估计今冬明春闹供应的事将大大减少；","type":"paragraph"},{"text":"三、改善了干群关系，增强了干部的工作信心。副社长张士仁说，过去你叫社员生产，他总是说粮食不够吃，大、小吃一样多的口粮，不公平，这下可好了，在工作中也确实比过去积极多了；","type":"paragraph"},{"text":"四、提高了农民的生产积极性，增强了社员间的团结。该社小王队二十多名女社员，现在显然增加了劳动热情，在田间栽秧坚持到晚，还延长了一小时才收工。（曹鹏、艾明）","type":"paragraph"},{"text":"（原载新华日报第三十六期“内部资料”）","type":"paragraph"},{"text":"来源： 新华通讯社编：《内部参考》，第2273期，1957年8月2日。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"41b4bb41b1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
