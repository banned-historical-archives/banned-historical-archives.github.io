ical-archives/banned-historical-archives0/main/maoquanji35.pdf"],"article":{"title":"转发山西省委关于不许在干部调动时请吃饭、照相、送礼的通知的批语","alias":"","parts":[{"type":"paragraph","text":"转发山西省委关于不许在干部调动时请吃饭、照相、送礼的通知的批语"},{"type":"paragraph","text":"（1955年5月26日）刘、邓："},{"type":"paragraph","text":"山西此项决定很好，可转发全党。请为中央写一指示，放在前面。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"五月廿六日[1]刘，指刘少奇。邓，指邓小平，当时任中共中央秘书长。"},{"type":"paragraph","text":"[2]指中共山西省委1955年5月22日关于不许在干部调动时请吃饭、照相、送礼给所属并报中央的通知。通知说，至今有不少单位在干部调动时，沿袭腐朽的地主、资产阶级作风，请吃饭、照相、送礼，不仅浪费了国家财产，而且对干部的思想意识有严重的腐蚀作用，在干部和群众中造成了恶劣的影响。因此，省委决定：今后无论任何机关团体、厂矿企业，在干部调动时，均不许请吃饭、照相、送礼。"}],"authors":["毛泽东"],"dates":[{"year":1955,"month":5,"day":26}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":103,"page_end":103},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1b06a4f0fe"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
