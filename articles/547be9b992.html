之一邓小平同志题写碑名","authors":[],"dates":[{"year":1979,"month":4,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"纪念解放军渡江战役胜利三十周年"},{"type":"paragraph","text":"渡江胜利纪念碑落成典礼在南京举行"},{"type":"paragraph","text":"渡江战役指挥者之一邓小平同志题写碑名"},{"type":"paragraph","text":"新华社南京四月二十二日电  为纪念中国人民解放军渡江战役胜利三十周年而兴建的“渡江胜利纪念碑”落成典礼，今天在南京举行。南京部队和江苏省、南京市党政机关干部、各界群众共一万多人，参加了落成典礼。纪念碑的碑名是渡江战役指挥者之一的邓小平同志题写的。"},{"type":"paragraph","text":"中国人民解放军遵照毛主席、朱总司令向全国进军的命令，当年在一千余华里的战线上，冲破敌阵，强渡长江。一九四九年四月二十三日，南京解放，从此宣告了国民党政府的覆灭。渡江胜利纪念碑座落在南京城西的热河路广场。纪念碑造型象一艘乘风破浪、奋勇前进的帆船。碑座北面，镌刻着鎏金的毛主席的《七律·人民解放军占领南京》一诗手迹。邓副主席题写的“渡江胜利纪念碑”七个金色大字，镶嵌在碑座南面的花岗石上。"},{"type":"paragraph","text":"南京部队第一政委廖汉生、中共江苏省委书记胡宏等参加了纪念碑落成典礼。南京部队司令员聂凤智，江苏省委书记、南京市委第一书记储江在落成典礼上讲了话。他们指出，在实现四个现代化的新长征中，我们要学习和发扬人民解放军强渡长江的拚命精神，学习他们高度的爱国主义和革命英雄主义精神，同心同德，艰苦奋斗。"},{"type":"paragraph","text":"参加纪念碑落成典礼的，还有当年参加渡江战役的战斗英雄和支前民工。于一九四九年四月二十三日率部起义的原国民党海军第二舰队舰长、现任中国人民解放军海军指挥学校副校长吴建安也参加了落成典礼。（附图片）"},{"type":"paragraph","text":"四月二十二日，江苏省军民为纪念中国人民解放军渡江战役胜利三十周年，在南京市举行“渡江胜利纪念碑”落成典礼。"},{"type":"paragraph","text":"新华社记者丁峻摄（传真照片）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"江苏文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"547be9b992"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
