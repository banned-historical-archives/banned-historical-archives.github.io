],"dates":[{"year":1976,"month":10,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社编者按:本社今天重新发表《国际歌》、《三大纪律八项注意》、《东方红》三首革命歌曲。"},{"type":"paragraph","text":"毛主席曾亲自倡导和指挥唱《国际歌》、《三大纪律八项注意》，教导我们不仅要唱，还要讲解，还要按照去做。今天，高唱这三首革命歌曲，将鼓舞全党全军全国各族人民最紧密地团结在以华国锋同志为首的党中央周围，高举马克思主义、列宁主义、毛泽东思想的伟大红旗，沿着毛主席开辟的革命航道，胜利前进。"},{"type":"paragraph","text":"(新华社北京一九七六年十月二十一日电)"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"华国锋","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9233e706eb"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
