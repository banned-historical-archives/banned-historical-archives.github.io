year":1979,"month":3,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"旅美台湾同胞呼吁早日实现祖国统一"},{"type":"paragraph","text":"新华社联合国三月六日电  旅居美国东部地区的台湾爱国同胞，三日在纽约举行讨论会，纪念台湾省人民“二·二八”起义三十二周年。"},{"type":"paragraph","text":"许多人在发言中指出，自中美关系正常化及邓小平副总理访美以来，更多的台湾同胞关心祖国统一大业和台湾的前途。人大常委会的《告台湾同胞书》反映了大陆同胞、台湾同胞以及海外侨胞的心愿。许多台湾同胞为使台湾早日归回祖国的怀抱而正在积极地工作。许多发言者指出，社会主义祖国已经出现了空前安定团结的局面，完成祖国统一大业的日子更近了。"},{"type":"paragraph","text":"许多发言者希望台湾当局能以中华民族的利益为重，响应《告台湾同胞书》的号召，希望台湾海峡两边都能积极开创经济交流的新途径。他们指出，大陆同台湾之间建立贸易关系，肯定将会作为一座桥梁而有助于祖国这两个部分之间的相互了解。一些发言者还希望政府对台湾的民主力量给予应有的注意，并且为实现祖国的统一而团结尽可能多的人。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"88be0d0855"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
