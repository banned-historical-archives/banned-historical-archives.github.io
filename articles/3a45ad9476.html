1980,"month":4,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"国务院副总理邓小平十日上午会见了由日本经济企业界青年组成的两个访华团，同他们进行了亲切友好的谈话。"},{"type":"paragraph","text":"这两个访华团是:由中国人民的老朋友冈崎嘉平太率领的日中青年研修协会友好访华团，由黑川光博率领的日本东京青年会议所访华团。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]},{"id":"jfjb","name":"解放军报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"dates":[{"year":1980,"month":4,"day":11}],"page_start":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"邓小平副总理会见日本朋友","authors":[],"parts":[{"type":"paragraph","text":"据新华社四月十日讯 国务院副总理邓小平今天上午会见了由中国人民的老朋友冈崎嘉平太率领的日中青年研修协会友好访华团和由黑川光博率领的日本东京青年会议所访华团。"},{"type":"paragraph","text":"邓小平对日本朋友说，中国搞四化建设的决心是坚定不移的。我们面临的一项重要任务，是要发现、培养和使用人才。他赞赏冈崎嘉平太等日本朋友热情帮助我国培养青年技术和管理人员所作的努力。"},{"type":"paragraph","text":"邓小平指出，中日两国人民有两千多年的交往。中日两国友好不仅对两国人民有利，而且有利于亚洲、太平洋地区和世界的和平。他希望两国青年、儿童懂得中日友好的重要性，把两国友好事业一代一代传下去。"},{"type":"paragraph","text":"冈崎嘉平太说，二十年前我就开始访问中国。我要教育青年一代同中国青年携起手来，加强日中友好。"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3a45ad9476"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
