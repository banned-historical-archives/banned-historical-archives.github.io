art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"用毛泽东思想把教育阵地改造过来","authors":["某部驻北京第十一中学毛泽东思想宣传队"],"parts":[{"type":"paragraph","text":"伟大领袖毛主席亲自主持召开的党的九届二中全会，是我国各族人民政治生活中的一件大喜事。会议发表的公报，深刻地阐明了“九大”以来国内外阶级斗争的大好形势，向全党、全军、全国人民提出了新的战斗任务，是我们继续革命的指路明灯，是夺取更大胜利的进军号。"},{"type":"paragraph","text":"毛主席教导说：“我们现在思想战线上的一个重要任务，就是要开展对于修正主义的批判。”我们配合工人毛泽东思想宣传队进驻学校以来，始终高举毛泽东思想伟大红旗，紧紧掌握革命大批判这一锐利武器，在斗、批、改运动中取得了一个又一个胜利。我们用毛泽东思想帮助革委会克服资产阶级派性，增强无产阶级党性；我们用毛泽东思想狠批叛徒刘少奇的黑“六论”，帮助党员用新党章规定的共产党员必须做到的五条严格要求自己；我们用毛泽东思想帮助教师肃清“教书倒霉论”的流毒，鼓励他们积极投入教育革命的实践；我们引导青少年狠批“读书做官论”和“读书无用论”，带领他们到三大革命实践中去锻炼。这样做的结果，使学校面貌发生了深刻变化。十一中多次被评为崇文区的先进单位，八百二十多名师生被评为五好战士，一百二十多名师生被选为学校和崇文区的活学活用毛泽东思想积极分子，近三千名革命小将响应毛主席的伟大号召，上山下乡，走与工农兵相结合的道路。"},{"type":"paragraph","text":"在热烈讨论全会公报时，我们又认真学习了毛主席关于“认真搞好斗、批、改”的伟大教导，决心更高地举起毛泽东思想伟大红旗，带领广大革命师生带着阶级斗争和教育革命中的实际问题，深入开展革命大批判，肃清叛徒刘少奇反革命修正主义路线的余毒，沿着毛主席的无产阶级革命路线乘胜前进，搞好思想革命化，搞好教育革命，用战无不胜的毛泽东思想把教育阵地占领下来，改造过来。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"教育革命","type":"主题/事件"},{"name":"上山下乡","type":"主题/事件"},{"name":"派性","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e3763d13b3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
