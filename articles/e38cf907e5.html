ical-archives/banned-historical-archives8/main/maoquanji20.pdf"],"article":{"title":"复中共中央电","alias":"","parts":[{"type":"paragraph","text":"复中共中央电"},{"type":"paragraph","text":"（1945年9月15日）"},{"type":"paragraph","text":"浙东、苏南、皖南三地部队须立即开始注意控制北上通路，保障北上安全，并准备将来适当时机渡江北上，请通知华中拟具体意见。"},{"type":"paragraph","text":"[1]中共中央9月14日电告：苏军在东北的马林诺夫斯基元帅的代表贝鲁罗索夫中校与我冀热辽十六分区司令曾克林（当时任沈阳卫戌司令）乘飞机于本日同来延安，该中校向朱德总司令转达马林诺夫斯基口头通知，请命令八路军已到沈阳、平泉、长春、大连等地的各部退出。朱德表示，热河、辽宁各一部在中日战争爆发时即有八路军活动并创有根据地，请允许该地区八路军仍留原地。中共中央9月15日电告：已决定迅速地坚决争取东北，在东北发展我党强大力量；彭真、陈云、伍修权、叶季壮已去东北；决定组织东北局，彭真为书记，陈云、程子华、伍修权、林枫为委员。同日，毛泽东还接到中央转来新四军第三师师长黄克诚9月14日的电报，黄建议山东应调3万至5万人去东北，华中应调3万至6万人去山东，江南的第一师应调江北。这是毛泽东关于答复中共中央9月14日和15日来电致中共中央电的主"}],"authors":["毛泽东"],"dates":[{"year":1945,"month":9,"day":15}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":392,"page_end":392},"tags":[{"name":"毛泽东","type":"人物"},{"name":"彭真","type":"人物"},{"name":"陈云","type":"人物"},{"name":"朱德","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e38cf907e5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
