:["同济大学数学教研组教师","杨弢亮"],"dates":[{"year":1957,"month":5}],"is_range_date":false,"parts":[{"text":"同济大学教师杨弢亮的右派言论","type":"title"},{"text":"同济大学数学教研组教师杨弢亮","type":"authors"},{"text":"“学校领导干部官僚主义严重，水平低，不能胜任校长和系主任等职务。”（见校刊126期第四版）","type":"paragraph"},{"text":"他说：“我对共产党的缺点‘比较关心’。”他作了这样的譬喻：“好比谈恋爱，有的人连爱人的缺点也会看成优点。”他把我们拥护共产党的人看成与共产党谈恋爱，不能分辨好坏的盲从者。（见校刊1236期第一版）。","type":"paragraph"},{"text":"“肃反对我说来是有委曲的。我自己过去没有罪，只是在无产阶级专政的今天来看是有罪的。判决公平不公平是各人的看法。汉奸不一定都是坏人，这一点我死也不会改变。”（见校刊126期第四版）","type":"paragraph"},{"text":"“教学改革中，学习苏联有很多教条主义。”","type":"paragraph"},{"text":"人家说：解放几年来各项工作的成绩是主要的，缺点是次要的，他说：“这是教条主义。”（见校刊126期第四版）","type":"paragraph"},{"text":"“对一位教师来说，只要具备最低限度的德，能在讲台上站稳就够了。道德过于恶劣，干脆把他驱逐出校。品德优良就可请他担任行政领导及其他各种社会荣誉，作为奖励。德对工资和升等的关系似乎不太密切。”（见校刊126期第四版）","type":"paragraph"}],"comments":[],"origin":"同济大学马列主义资料室编印《右派分子言论汇编》第二辑（内部资料不得外传），一九五七年十月。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"87b694c264"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
