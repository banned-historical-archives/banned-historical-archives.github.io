tart":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"《毛泽东评点二十四史》全本面世等四则","authors":["张彦中/吴旭"],"parts":[{"type":"paragraph","text":"《毛泽东评点二十四史》全本面世"},{"type":"paragraph","text":"为纪念毛泽东诞辰107周年，中国档案出版社刚刚出版的《毛泽东评点二十四史》（评文全本）26日起在全国各地与读者见面。"},{"type":"paragraph","text":"首都各族穆斯林举行开斋节招待会"},{"type":"paragraph","text":"中国伊斯兰教协会26日晚在北京举行首都各族穆斯林喜迎开斋节招待会。受党中央、国务院的委托，国务委员司马义·艾买提，全国政协副主席、中共中央统战部部长王兆国出席开斋节招待会并看望各族穆斯林朋友。司马义·艾买提在开斋节招待会上讲话。"},{"type":"paragraph","text":"旅罗华人呼吁祖国早日统一"},{"type":"paragraph","text":"罗马尼亚中国和平统一促进总会25日举行“迎新年促统一”座谈会，旅居这里的企业家、学者、商人以及华文报社记者等100多人参加了座谈会。中国和平统一促进总会会长郭玉山先生强调，祖国统一是全世界华人的共同心愿，希望台湾当局不要逆流而行，成为千古罪人。"},{"type":"paragraph","text":"总参军体大队运动员获企业支持"},{"type":"paragraph","text":"上海兆林实业公司26日将一批兆林牌环保内衣赠送给正在紧张冬训的总参军体大队运动员，以表达他们的拥军情怀和对军体运动的关注与支持。（张彦中、吴旭）"},{"type":"paragraph","text":"（除署名外均据新华社）"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"88040b30e1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
