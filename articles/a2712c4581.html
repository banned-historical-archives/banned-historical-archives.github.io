script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"是资产阶级反动思想在作怪","authors":["蒋复章"],"dates":[{"year":1952,"month":3,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"虬江机器厂工人　蒋复章"},{"type":"paragraph","text":"前天看到你报发表许云影同学的控诉和来信后，我们厂里许多工人同志都感到痛恨，因为像许同志那样站稳立场勇敢和资产阶级展开斗争的精神，是充分表现了青年团员的优秀品质；可是她这种行动，在学校里不但得不到全体同学和教师的支持和鼓励，相反的，他(她)们还要打击她、讽刺她，说什么:破坏‘伦理道德’，‘大逆不道’，‘忘恩负义’。我认为讲这些话的人，正是由于他们头脑里面有许多资产阶级反动思想在作怪，并且从此可以看出，沪江大学的部分师生，对这次的三反五反运动不重视，平日对政治学习也毫不关心。"},{"type":"paragraph","text":"编辑同志:我们虬江机器厂，同沪江大学相离不远的，因此沪江的情况，我们是比较知道一些的，在平时看到沪江大学的学生跑出来，有许多都带着很浓厚的资产阶级气味的，因此我们要求他们学校行政当局迅速进行思想改造，慢慢养成老实朴素的风气，才不负今天人民的重托和厚望。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a2712c4581"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
