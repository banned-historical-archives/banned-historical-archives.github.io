,"dates":[{"year":1962,"month":5,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"刘少奇周恩来朱德邓小平等同志接见五省民族参观团全体成员等"},{"type":"paragraph","text":"新华社8日讯　中共中央副主席刘少奇、周恩来、朱德，总书记邓小平等党和国家领导人今天下午接见了前来北京参加“五一”国际劳动节庆祝活动的云南、四川、青海、贵州、甘肃五个省的民族参观团全体成员，正在北京举行的民族工作会议的全体出席人员，以及中央民族学院新疆班应届毕业生。"},{"type":"paragraph","text":"参加接见的，还有党和国家其他领导人彭真、陈毅、李富春、贺龙、谭震林、乌兰夫、陆定一、康生、王稼祥、邓子恢、聂荣臻、罗瑞卿、李维汉、班禅额尔德尼·却吉坚赞，和政协全国委员会副主席帕巴拉·卓列朗杰、阿沛·阿旺晋美。（附图片）"},{"type":"paragraph","text":"上图：刘少奇、周恩来、朱德、邓小平等同志接见云南、四川、青海、贵州、甘肃五省民族参观团成员，民族工作会议人员和中央民族学院新疆班应届毕业生时情形"},{"type":"paragraph","text":"新华社记者　杜修贤摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"邓小平","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"朱德","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f0c026a057"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
