" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共中央转发华东局关于税收工作情况的报告","authors":[],"dates":[{"year":1951,"month":7,"day":29}],"is_range_date":false,"parts":[{"text":"中共中央转发华东局关于税收工作情况的报告","type":"title"},{"text":"各中央局、分局：","type":"appellation"},{"text":"兹将华东局关于增加农业税收和城市税收以及对超收税款预先控制百分之五十的办法的电报，转发你们参考。中央同意他们的意见。","type":"paragraph"},{"text":" 中  央七月二十九日","type":"paragraph"},{"text":"中央：","type":"appellation"},{"text":"（一）今年农业税加一成，华东公粮任务原定由五十二亿斤，增加至五十七亿二千万斤。今年夏收尚好，如秋收无重大变化，我们可以从加强农村中抗美援朝的宣传教育与加强对征粮工作的领导，保证完成上项任务的；惟新区土改以后，农村负担情况已起基本变化，今年农业税税率依照政务院公布的原则下适当地调整，去年华东每人平均税率为百分之十四点二一，今年经调整后每人平均税率为百分之十五点四七，每人平均负担增加百分之一点二六。","type":"paragraph"},{"text":"（二）今年城市税收由于经济继续好转，旺季退潮较去年推迟，加上抗美援朝的影响，税收工作的加强，上半年已完成七万亿元。由此推算及估计今年税收可保证完成十五万亿元。努力争取到十七万亿元。","type":"paragraph"},{"text":"（三）今年因税收发展较大，财政分成后，华东地方税收分成在超收中可能有一万亿元以上。中央要求地方对超收税款预先控制百分之五十，以备中央在财政困难时进行调用，我们已告各地作思想准备。惟秋季税收较淡，地方财政调度亦感困难，实际控制恐须自十月份开始。","type":"paragraph"},{"text":" 饶漱石、曾山七月二十日","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"39453f397f"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
