hors":[],"dates":[{"year":1952,"month":7,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"荆江分洪工程英雄模范代表大会全体代表"},{"type":"paragraph","text":"要求毛主席给予更加艰巨的建设任务"},{"type":"paragraph","text":"敬爱的毛主席：我们响应了您的伟大号召，参加修建荆江分洪工程。我们三十万劳动大军，在全国人民，特别是两湖人民的全力支援下，在四月五日到六月二十日两个半月内，完成了荆江分洪工程。从此，危害两湖的荆江洪水已被控制住了，荆江两岸千百万人民可以安心建设自己的幸福生活了。因此，两湖人民听到荆江分洪工程胜利完工的消息后，以无比的热情，欢呼着您的名字，祝您永远健康。"},{"type":"paragraph","text":"敬爱的毛主席：我们在工作中曾经遇到很多困难。但是，您教养下的勤劳勇敢的中国人民，是能够克服任何困难的。洋锹不够，我们用双手挖土；挑具不够，我们用衣服装淤泥；不懂技术，我们就勤学苦练、细心钻研；时间紧促，我们就“和时间赛跑”，日夜加紧工作；雨水多，我们就“小雨不误工作，大雨不离工地”。就这样，我们一面准备、一面工作、一面学习、一面计划、一面修正，用高度的爱国主义和革命英雄主义的精神，战胜了各种各样的困难。这是您教育、领导我们的结果。因此，最大的光荣应该归于您——我们敬爱的领袖。"},{"type":"paragraph","text":"毛主席，我们恳切地希望您交给我们更艰巨的建设任务。我们保证不骄不躁，很好地总结和运用这次工作的经验，更高地发挥积极性和创造性，在祖国伟大建设中争取更大的胜利。"},{"type":"paragraph","text":"荆江分洪英雄模范代表大会全体代表八百人"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8ef0137bd6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
