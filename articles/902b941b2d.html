ical-archives/banned-historical-archives0/main/maoquanji51.pdf"],"article":{"title":"对苏振华来信的批语","alias":"","parts":[{"type":"paragraph","text":"对苏振华来信\"的批语"},{"type":"paragraph","text":"（1972年3月5日）"},{"type":"paragraph","text":"此人似可解放了。如果海军不能用他，似可改回陆军（或在地方）让他做一些工作。可否，请中央酌定。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一九七二年三月五日请汪印发各同志。"},{"type":"paragraph","text":"[1]苏振华，原任中共中央军委常委兼副秘书长、中国人民解放军海军政治委员。“文化大革命”中受到错误批判，被解除职务。1971年12月13日，他给毛泽东写信，表示自己有决心“回到主席的革命路线上来，争取晚年为人民做一点有益的工作”。1973年1月，苏振华复出任海军第一政委。同年8月，在中国共产党第十次全国代表大会上当选为中央委员，十届一中全会上当选为中央政治局候补委员。"},{"type":"paragraph","text":"[2]汪，指汪东兴，当时任中共中央政治局候补委员、中央办公厅主任。"}],"authors":["毛泽东"],"dates":[{"year":1972,"month":3,"day":5}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":312,"page_end":312},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"902b941b2d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
