出中国粉碎“四人帮”等图片","authors":[],"dates":[{"year":1977,"month":3,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"斯中友协举办毛泽东主席图片和著作展览会"},{"type":"paragraph","text":"毛泽东思想推动世界历史前进"},{"type":"paragraph","text":"几内亚比绍展出中国粉碎“四人帮”等图片"},{"type":"paragraph","text":"新华社科伦坡一九七七年三月二十三日电　由斯里兰卡—中国友好协会贾夫纳分会主办的毛泽东主席图片、著作展览会，三月中旬在贾夫纳举行。"},{"type":"paragraph","text":"展览会上展出了一百五十幅反映毛泽东主席从青年时期起从事革命活动的照片和毛主席在各个革命时期写的一批著作。"},{"type":"paragraph","text":"贾夫纳市长纳瓦拉特南在开幕式上发表讲话说：“毛主席是一位世界上最伟大的领导人。毛泽东思想是推动世界历史前进的动力。我们必须永远牢记为世界人民展示出新道路的这位伟大的领袖。”"},{"type":"paragraph","text":"他说：“毛主席唤起了被奴役的中国人民，在他的领导下，摧毁了旧中国，创立并建设了一个屹立在国际舞台上的强大的新中国。”"},{"type":"paragraph","text":"展览受到了贾夫纳各界人士的热烈欢迎。在三天展出期间，有三千五百多人前往参观。"},{"type":"paragraph","text":"新华社比绍一九七七年三月二十日电　为庆祝中华人民共和国和几内亚比绍共和国建交三周年，中国驻几内亚比绍大使馆和几内亚比绍新闻旅游部三月十五日到十九日在比绍联合举办了中国图片展览会。"},{"type":"paragraph","text":"展览会共展出图片二百二十三张。这些图片反映了：中国和几内亚比绍的友好合作关系；中国人民热烈欢呼华国锋同志任中共中央主席、中共中央军委主席和在华主席领导下粉碎“四人帮”的伟大胜利；中国社会主义革命和建设的伟大成就等内容。"},{"type":"paragraph","text":"展出期间，几内亚比绍国务委员会主席路易斯·卡布拉尔的夫人、政府官员以及各界观众四千五百多人参观了展览会。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"四人帮","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2a2d5158aa"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
