art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"热烈拥护春节不放假警卫连决心坚守岗位保卫无产阶级文化大革命","authors":["究实"],"parts":[{"type":"paragraph","text":"本报讯 一月三十日清晨，4768部队某部警卫连干部战士从广播中收听到国务院关于春节不放假的通知后，党支部立即组织全连进行了学习。大家热烈拥护国务院的正确决定。同志们说：我们人民解放军，是毛主席亲自缔造的军队，应该严阵以待，随时准备打击国内外阶级敌人的进攻，随时准备支持和援助革命造反派。我们要做到一声令下，立即出动，坚决保卫无产阶级文化大革命。"},{"type":"paragraph","text":"经过讨论，全连干部战士一致提出四点保证："},{"type":"paragraph","text":"一、识大体、顾大局，在春节期间不请假探家。"},{"type":"paragraph","text":"二、每人向家里写一封信，宣传当前无产阶级文化大革命的大好形势，和毛主席的新指示——“要节约闹革命”。要求家庭勤俭过春节。教育家属春节期间不来部队，积极参加本地的无产阶级文化大革命。"},{"type":"paragraph","text":"三、坚守岗位，加强战备，密切注视阶级敌人的动向，全力支持无产阶级革命派。"},{"type":"paragraph","text":"四、积极向驻地周围群众宣传毛泽东思想，最热烈地歌颂我们心中最红最红的红太阳毛主席，过一个革命化的春节。"},{"type":"paragraph","text":"（究实）"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7953dc720b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
