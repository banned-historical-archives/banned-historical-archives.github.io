s":[],"dates":[{"year":1957,"month":9,"day":7}],"is_range_date":false,"parts":[{"text":"顾执中的右派门生胡明大放反党胡言","type":"title"},{"text":"《解放军报》讯　新疆解放军报的右派分子胡明，在报社全体人员的揭发、批判下，已经开始就范。","type":"paragraph"},{"text":"胡明是助理编辑。整风开始后，他采写的稿件中有许多是恶意煽动的。他在医院采访时，听说“欧美资本主义国家有某些技术是可以学的”，就夸大报道说：资本主义国家科学知识取之不尽、用之不竭。他听到有人批评医院使用干部上有缺点，就借题发挥，污蔑医院选拔干部是“乱点鸳鸯”。军区张希钦副司令员给连队讲话时说，军事科学问题可以大胆地探讨，胡明却歪曲成：副司令员号召连队大鸣大放。","type":"paragraph"},{"text":"在鸣放中，胡明外出采访非常积极，但是领导上让他组织批判文章时，他却消极抵制，一篇也没有完成。胡明有一套反动的新闻观点。他经常说党委不懂业务，不便干预报纸。他把报纸分成所谓“官报”、“民报”、“商报”，污蔑人民日报和军报都是“教条”，拥护办“同仁报”。他否定报纸的党性和阶级性，到处散布“趣味至上”的腐朽论调。当文汇报已转向了资产阶级的政治方向时，胡明却赞誉这个报纸是“真正的人民喉舌”，“敢批评，敢说话，敢干预生活”。他说报上的批评应当尖刻、挖苦、奚落，“语不惊人死不休”。对于流沙河的恶毒透顶的“草木篇”，胡明说是精神实质很好。胡明还同社会上的右派分子一唱一和，煽动新闻干部对现实不满，说什么“不坐牢的记者不是好记者，不闯祸的报道不是好报道，不封门的报馆不是好报馆”。","type":"paragraph"},{"text":"此外，胡明还诋毁党的干部政策，骂党员和工农骨干是“不学无术”的“君侯”。","type":"paragraph"},{"text":"胡明出身于地主家庭，曾经在新闻界右派分子顾执中主办的民治新闻专科学校念书。他对顾执中佩服得五体投地。今年５月间他还和顾执中有书信往来。胡明认为部队中“冰冷”，因此曾经拜托顾执中为他谋求工作，甚至无耻地说“情愿给顾执中提水扫地”。","type":"paragraph"},{"text":" ——原载《解放军报》1957年9月7日。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c42b21ef67"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
