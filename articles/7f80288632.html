dates":[{"year":1981,"month":5,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京五月二十五日电　应我国人大常委会和国务院的邀请，比利时国王博杜安一世和王后法比奥拉·德莫拉-阿拉贡陛下今天下午乘专机到达北京，开始对我国进行正式访问。"},{"type":"paragraph","text":"博杜安一世是第一位来我国访问的比利时国家元首。"},{"type":"paragraph","text":"人大常委会副委员长彭真和夫人张洁清，副委员长彭冲和国务院副总理谷牧到机场迎接比利时贵宾。"},{"type":"paragraph","text":"下午四点，比利时贵宾乘坐的专机徐徐降落在飘扬着中比两国国旗的首都机场上。当博杜安一世和王后走下铺着红地毯的舷梯时，彭真和张洁清同他们热情握手。两名儿童向国王和王后献了花束。"},{"type":"paragraph","text":"彭真代表叶剑英委员长主持了在机场上举行的隆重欢迎仪式。军乐团先后奏比利时和中国国歌。博杜安一世由彭真陪同，检阅了中国人民解放军陆海空三军仪仗队。"},{"type":"paragraph","text":"随同国王和王后来访的有外交大臣夏尔-费迪南·诺东。"},{"type":"paragraph","text":"到机场欢迎比利时贵宾的还有我国外贸部部长李强，外交部副部长韩念龙、张灿明，国家科委副主任江明，对外文委副主任陈辛仁，中国驻比利时大使郑为之。"},{"type":"paragraph","text":"比利时驻中国大使罗杰·德诺睦和使馆其他外交官员也到机场迎接。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"彭真","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7f80288632"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
