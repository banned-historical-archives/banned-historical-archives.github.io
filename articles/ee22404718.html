ical-archives/banned-historical-archives0/main/maoquanji34.pdf"],"article":{"title":"在苏联驻华大使馆为庆祝中苏友好同盟互助条约签订五周年举行的宴会上的讲话","alias":"","parts":[{"type":"paragraph","text":"在苏联驻华大使馆为庆祝中苏友好"},{"type":"paragraph","text":"同盟互助条约签订五周年"},{"type":"paragraph","text":"举行的宴会上的讲话"},{"type":"paragraph","text":"（1955年2月14日）我庆祝中苏两国的伟大的合作。"},{"type":"paragraph","text":"这种合作是为了发展社会主义事业的合作，是为了反对帝国主义的侵略计划的合作，是为了国际和平的合作。我相信，这种合作还会进一步加强。"},{"type":"paragraph","text":"在我们中苏两个伟大的国家的合作之下，我相信，帝国主义的侵略计划是要被粉碎的。"},{"type":"paragraph","text":"我们大家可以看到，在我们中苏两国的伟大合作下，一切帝国主义的侵略计划，没有不能被粉碎的。它们一定要被彻底粉碎。只要帝国主义发动侵略战争，我们和全世界人民就一定要将它们从地球上消灭干净！"},{"type":"paragraph","text":"为苏联最高苏维埃主席团主席伏罗希洛夫同志的身体健康干杯！"}],"authors":["毛泽东"],"dates":[{"year":1955,"month":2,"day":14}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":460,"page_end":460},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ee22404718"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
