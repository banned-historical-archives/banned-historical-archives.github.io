art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席为中国革命和世界革命立下丰功伟绩","authors":[],"parts":[{"type":"paragraph","text":"新华社维也纳一九七六年九月二十三日电 奥地利革命工人联合会（马克思列宁主义者）九月二十一日在维也纳隆重举行毛泽东主席追悼会。"},{"type":"paragraph","text":"追悼会在工会大厅举行。大厅正面悬挂着毛主席遗像。"},{"type":"paragraph","text":"奥地利革命工人联合会（马列）主席尤哈在会上致悼词。他回顾了毛泽东主席为中国革命和世界革命立下的丰功伟绩，并且强调指出，毛泽东主席的逝世不仅是中国人民，而且是全世界无产阶级和革命人民的无法弥补的损失。"},{"type":"paragraph","text":"他说：“毛泽东同志与世长辞了。但是，作为永放光芒的劳动人民的引路人，他的思想将与世长存。让我们学习和掌握这些思想，作为劳动人民为争取自身利益而斗争的不可战胜的武器！”"},{"type":"paragraph","text":"尤哈致悼词后，全体与会者起立为毛泽东主席默哀。追悼会在《国际歌》声中结束。"},{"type":"paragraph","text":"在此以前，奥地利革命工人联合会（马列）在布雷根茨和因斯布鲁克两地的组织也分别举行了毛泽东主席追悼会。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3bca3305f0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
