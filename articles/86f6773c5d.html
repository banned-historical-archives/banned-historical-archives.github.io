" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoistlegacy.de-2152","name":"要明确核查对象，查深查实查全","author":"章林","internal":false,"official":false,"type":"unknown","files":[],"article":{"title":"要明确核查对象，查深查实查全","dates":[{"year":1984,"month":7,"day":3}],"is_range_date":false,"authors":["章林"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"中共黑龙江省委核查“三种人”小组办公室，核查“三种人”文件选编，86-87","tags":[{"name":"三种人","type":"主题/事件"},{"name":"文革","type":"主题/事件"},{"name":"政治错误","type":"主题/事件"}],"parts":[{"type":"title","text":"要明确核查对象，查深查实查全"},{"type":"subtitle","text":"——章林同志在省直核查“三种人”工作经验交流会上的总结（节录）"},{"type":"subtitle","text":"（一九八四年七月三日）"},{"type":"paragraph","text":"确定核查对象的依据有两条：一是要在调查摸底、考核干部的基础上，属于疑似在“文化大革命”中犯有严重错误以上的，二是要经党组、党委讨论后确定。要特别注意那些年轻、有文化，善于隐蔽的人。根据中指委的要求，一定要把考察干部与核查对象严格区分开来，不要把核查面扩大了。当然，列为核查对象的，经过调查核实后，不一定都是“三种人”和犯严重错误的人。我们在核查工作中，所以强调要查清造反组织沿革，查清“文革”中发生的大事件、大要案及其责任者，目的就在于把“三种人”和犯严重错误的人暴露出来，因为“三种人”和犯严重错误的人就在造反头头和大事件、大要案的责任者之中。有的单位，不摸底，不查证，就说本单位没有“文革”中犯有错误的人，这是靠不住的。"},{"type":"paragraph","text":"对列为核查对象的问题进行查证核实时，要抓住决定错误性质的主要问题，查清其应负的责任，取得充分确凿的证据。既要查清在“文革”中某一段所犯的错误，又要弄清其在“文革”全过程中的一贯表现。在核查中既要注意打砸抢问题，又要查清帮派思想严重的问题；既要注意查直接打砸抢行为，又要查清其策划和指挥的责任；既要注意在本单位参加“文革”的人，又不要忽视“文革”后调入的人。总之，一定要正确贯彻执行中央制定的既要坚定，又要慎重的方针，做到既不漏掉一个“三种人”又不搞扩大化。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"86f6773c5d"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
