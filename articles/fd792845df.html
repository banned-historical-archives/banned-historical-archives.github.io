ear":1967,"month":9,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"朱家湾街道福新里委会退休工人　王招娣"},{"type":"paragraph","text":"中国赫鲁晓夫胡说什么“资本主义在中国是进步的”，“资本家的剥削是有历史功绩的”。他对资产阶级充满着爱，对无产阶级充满着恨。"},{"type":"paragraph","text":"我是个退休女工，是从黑暗的旧社会度过来的。解放前，我在申新九厂做工，这个厂的大资本家残酷地剥削工人，不知道有多少阶级兄弟和阶级姐妹被弄得家破人亡，有的被他们活活地折磨死了。我也是受害的一个。解放前，我成年累月地为资本家卖命，可是吃的是棒子面拌菜皮，住的是“滚地龙”，喝的是苏州河里的臭水，盖的是补了又补的破麻袋。孩子们即使在冰天雪地里，还是光着脚到外面去拾菜皮，到“养生堂”讨施粥，这样还是活不下去啊!有一年的寒冬腊月，我们工人被逼得走投无路，就向资本家进行斗争，可是狼子心肠的资本家却恶狠狠地对我们说:“米在无锡田里还没长出来，煤在矿里还没开采出来。”那时候，我家锅里没有一粒米，孩子生了病又没钱治，只好活活被折磨死。在旧社会里，我们整日整夜地劳动，养不活自己，却养肥了资本家。我被逼得几乎发疯，两次自杀，都被人救活。多亏来了毛主席，来了共产党，才把我从苦海里解放出来。亲身的经历使我深知，剥削就是有罪，就是罪该万死。中国赫鲁晓夫鼓吹“剥削有功”，是地地道道的反革命论调。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fd792845df"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
