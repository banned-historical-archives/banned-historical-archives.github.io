坚定把无产阶级教育革命进行到底的决心","authors":[],"dates":[{"year":1969,"month":5,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"驻西安二十中工人、解放军毛泽东思想宣传队"},{"type":"paragraph","text":"认真学习无产阶级专政下继续革命的理论"},{"type":"paragraph","text":"坚定把无产阶级教育革命进行到底的决心"},{"type":"paragraph","text":"本报讯　在认真学习和宣传“九大”重要文献的热潮中，驻西安市第二十中学的工人、解放军毛泽东思想宣传队，认真学习毛主席关于在无产阶级专政下继续革命的理论，进一步坚定“在学校中长期留下去，参加学校中全部斗、批、改任务，并且永远领导学校”的决心，誓把上层建筑特别是文化教育阵地的无产阶级文化大革命进行到底。"},{"type":"paragraph","text":"连日来，驻二十中宣传队的队员们，挤出一切可以利用的时间，逐字逐句地学习林副主席的政治报告。大家越学越感到亲切，明确了形势、任务和政策。林副主席指出：“无产阶级能不能把文化教育阵地牢固地占领下来，用毛泽东思想把它们改造过来，是能不能把无产阶级文化大革命进行到底的关键问题。”大家联系长期以来文教战线上两条路线的严重斗争，更加认识到搞好文教战线斗、批、改的伟大意义。有的宣传队员对照检查了临时观念、换班思想，深感自己肩上担负的责任重大，增强了把上层建筑领域社会主义革命进行到底的决心。工宣队员、老工人王发喜在讨论中激动地说：“旧社会，咱工人没有进学校门的权，没有生存的权，今天毛主席他老人家交给了我们领导学校培养革命接班人的大权，交给了我们巩固无产阶级专政，防止资本主义复辟的任务。我们如果强调困难，就是辜负了毛主席的委托，辜负了全国人民的期望。”大家还一致表示：我们一定要遵照毛主席的指示把无产阶级教育革命进行到底。"},{"type":"paragraph","text":"队员们在提高思想认识的基础上，在全校召开了动员大会，动员全校革命师生立即掀起一个大学习、大宣传、大落实“九大”重要文献的热潮。工人、解放军毛泽东思想宣传队队员和校革委会领导成员，都深入到各连、排、班和毛主席著作学习小组中去，和广大革命师生一起，结合本校斗、批、改实际，认真学习“九大”重要文献。并及时总结二连二排批判“读书无用论”，提高革命小将为革命读书的觉悟的先进经验，结合学习、宣传“九大”文献开展革命大批判，批判资产阶级个人主义和“多中心即无中心论”，以提高全校革命小将执行和捍卫毛主席革命路线的自觉性。在宣传队和校革委会领导下，一个学习、贯彻“九大”精神的群众运动，正在二十中进一步开展起来。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"教育革命","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d67f334b5a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
