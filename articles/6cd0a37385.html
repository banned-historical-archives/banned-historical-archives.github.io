"dates":[{"year":1963,"month":11,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"在垄断资本严重剥削和压迫下"},{"type":"paragraph","text":"美国人民保健状况日益恶化"},{"type":"paragraph","text":"新华社伦敦二十八日电　据伦敦《泰晤士报》昨天报道，美国在人民的保健事业方面越来越落后。"},{"type":"paragraph","text":"这家报纸登载了哈佛大学医学院的预防医药系认为能说明一个国家的医疗质量的两类统计数字。一类是关于一岁以内的婴儿死亡率的统计数字。根据美国卫生、教育和福利部儿童局最近编纂的数字，美国的婴儿死亡率在一九六二年从西方世界的第十位下降到第十一位。而在十年以前，美国是第五位。"},{"type":"paragraph","text":"第二类是关于人的平均寿命的统计数字。根据哈佛大学一九六○年的数字，美国男人的平均寿命居第十三位，女人的寿命居第七位。《泰晤士报》说，美国婴儿死亡率之所以比较高，是由于非白种人被剥夺了他们的经济权利和社会权利。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6cd0a37385"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
