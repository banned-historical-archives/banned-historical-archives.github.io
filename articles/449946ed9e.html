" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji38","name":"毛泽东全集第38卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji38.pdf"],"article":{"title":"蝶恋花·答李淑一","alias":"","parts":[{"type":"paragraph","text":"蝶恋花·答李淑一川"},{"type":"paragraph","text":"（1957年5月11日）我失骄杨君失柳，杨柳轻直上重霄九。"},{"type":"paragraph","text":"问讯吴刚何所有，"},{"type":"paragraph","text":"[1]答李淑一，这首词是毛泽东写给当时的湖南长沙第十中学语文教员李淑一的。词中的“柳”指李淑一的丈夫柳直荀烈士（1898一1932），湖南长沙人，毛泽东早年的战友。1924年加入中国共产党，曾任湖南省政府委员，湖南省农民协会秘书长，参加过南昌起义。1930年到湘鄂西革命根据地工作，曾任红军第二军团政治部主任、第三军政治部主任等职。1932年9月在湖北洪湖革命根据地被害。1957年2月，李淑一把她写的纪念柳直苟的一首《菩萨蛮》词寄给毛泽东，毛泽东写了这首词答她。"},{"type":"paragraph","text":"[2]骄杨，指毛泽东的夫人杨开慧。杨开慧（1901一1930），湖南长沙人，1921年加入中国共产党，在中共湘区委员会负责机要兼交通联络工作，后随毛泽东去上海、武汉等地。1927年大革命失败后，隐蔽在长沙板仓坚持地下工作。1930年10月被国民党反动派逮捕，11月牺牲。20世纪60年代，毛泽东将该词手书送给毛岸青、邵华时，将“骄杨”和“泪飞”分别写作“杨花”和“泪挥”。"},{"type":"paragraph","text":"[3]飚，飘扬。[4]重霄九，九重霄，天的最高处。我国古代神话认为天有九重。"},{"type":"paragraph","text":"[5]吴刚，神话中月亮里的一个仙人。据唐段成式《酉阳杂组》，月亮里有一棵高五百丈的桂树，吴刚被罚到那里砍树。桂树随砍随合，所以吴刚永远砍不断。毛泽东全集第三十八卷"},{"type":"paragraph","text":"吴刚捧出桂花酒。寂寞嫦娥川舒广袖2，万里长空且为忠魂舞。忽报人间曾伏虎，"},{"type":"paragraph","text":"泪飞顿作倾盆雨。3"},{"type":"paragraph","text":"[1]嫦娥，神话中月亮里的女仙。据《淮南子·览冥训》，娥（一作姬娥、恒娥）是羿的妻子，因为偷吃了羿从西王母那里求到的长生不死药而飞入月中。"},{"type":"paragraph","text":"[2]舒广袖，伸展宽大的袖子。"},{"type":"paragraph","text":"[3]忽报人间曾伏虎，泪飞顿作倾盆雨，忽然听到中国人民终于推翻了国民党反动派统治的捷报，两位烈士的忠魂顿然高兴得泪流如雨。舞、虎、雨，这三个韵脚字跟上文的“柳、九、有、酒、袖”不同韵。毛泽东自注：“上下两韵，不可改，只得仍之。”"}],"authors":["毛泽东"],"dates":[{"year":1957,"month":5,"day":11}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":74,"page_end":75},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"449946ed9e"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
