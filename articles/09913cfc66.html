tart":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东思想是革命战士的灵魂","authors":["海上猛虎艇"],"parts":[{"type":"paragraph","text":"毛主席教导我们：“人民靠我们去组织。中国的反动分子，靠我们组织起人民去把他打倒。凡是反动的东西，你不打，他就不倒。这也和扫地一样，扫帚不到，灰尘照例不会自己跑掉。”"},{"type":"paragraph","text":"中国赫鲁晓夫的代理人、反革命修正主义分子罗瑞卿，多年来一贯两面三刀，阴一套阳一套，疯狂地反对、攻击我们最最敬爱的伟大领袖毛主席和毛主席的亲密战友林彪同志。我们在前线誓死保卫毛主席，他却恶毒地反对我们伟大领袖毛主席；我们在前线用鲜血和生命保卫革命的胜利成果，他却为大地主、大资产阶级夺我们的印把子；我们在前线为宣传和捍卫毛泽东思想而斗争，他却疯狂抵制和反对毛泽东思想。这个家伙丧心病狂地反对毛主席，真是罪该万死！"},{"type":"paragraph","text":"林副主席号召我们，“读毛主席的书，听毛主席的话，照毛主席的指示办事，做毛主席的好战士。”一九六○年以来，全军在林副主席的号召下，掀起了一个接一个的活学活用毛主席著作群众运动的高潮。可是，罗瑞卿却跑到舰艇上去攻击学习毛主席著作的群众运动。大泼冷水，打击部队的学习情绪，妄图把革命群众的学习毛主席著作的热潮压下去。林副主席号召我们“一定要把毛泽东思想真正学到手”，“用毛泽东思想统帅一切”。罗瑞卿却在舰艇上大肆宣扬他的反动的“两杆枪”谬论，把威力无穷的毛泽东思想和步枪手榴弹等同起来，用折中主义的反动手法贬低毛泽东思想的伟大作用，否定毛泽东思想的统帅作用。"},{"type":"paragraph","text":"毛泽东思想是当代马克思列宁主义的顶峰，是反对帝国主义、反对现代修正主义的最强大的思想武器。毛泽东思想是我们革命战士的灵魂，是战斗的方向，是前进的动力，是胜利的保证！我们的战斗经历充分证明：平时谁学习毛主席著作最勤，对毛泽东思想理解最深，用得最活，谁在战场上就最勇敢，最聪明，最有智慧，最过得硬。战斗英雄麦贤得的英雄事迹说明了这一点，“海上先锋艇”的英雄事迹也说明了这一点，无数的英雄事迹都说明了这一点！罗瑞卿妄图诋毁毛泽东思想的无比威力，反对和破坏我们活学活用毛主席著作，这是狂犬吠日，痴心妄想！"},{"type":"paragraph","text":"我们人民解放军是毛主席亲自缔造和领导的、林副主席直接指挥的革命军队，我们要永远跟着毛主席在大风大浪中前进！读毛主席的书，我们永远不松劲；听毛主席的话，我们永远不犹豫；照毛主席的指示办事，我们永远不动摇；做毛主席的好战士，我们永远不变心。谁企图使我们背离毛泽东思想和毛主席的革命路线，我们就打倒谁！罗瑞卿疯狂反对毛主席，反对毛泽东思想的滔天罪行，我们一定要彻底清算。要从政治上、思想上、理论上把他批倒批臭，把这些不耻于人类的狗屎堆统统扫进历史的垃圾箱。我们永远高举毛泽东思想的伟大红旗奋勇前进！"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"罗瑞卿","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"09913cfc66"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
