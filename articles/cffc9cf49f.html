s":["朱德","毛泽东"],"dates":[{"year":1949,"month":8,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【北平电台十六日广播】　在长沙举行起义的程潜将军，陈明仁将军等，在八月五日发表通电，毛主席、朱总司令今天复电给他们，电报原文如下:"},{"type":"paragraph","text":"程潜将军陈明仁将军及全体起义将士们:"},{"type":"paragraph","text":"接读八月五日通电，义正辞严，极为佩慰，中国人民解放事业的胜利，已成全世界公认的定局，美国帝国主义及其走狗蒋介石、李宗仁、白崇禧、阎锡山等残余匪帮，不甘失败，尚图最后挣扎，必被悉数扫灭，已无疑义。诸公率三湘健儿，脱离反动阵营，参加人民革命，义声昭著，全国欢迎，南望湘云，敬致祝贺，尚望团结部署，与人民解放军亲密合作，并准备改编为人民解放军，以革命精神教育部队，改变作风，力求进步，为消灭残匪，解放全中国人民而奋斗。一九四九年八月十六日　毛泽东"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"朱德","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cffc9cf49f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
