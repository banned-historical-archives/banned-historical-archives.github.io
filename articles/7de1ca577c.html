authors":[],"dates":[{"year":1969,"month":9,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"中国文化大革命图片展览会在芬兰胜利闭幕"},{"type":"paragraph","text":"芬兰人民热情赞扬我国二十年来伟大成就"},{"type":"paragraph","text":"新华社二十七日讯赫尔辛基消息：中国驻芬兰大使馆文化新闻处和芬兰—中国协会坦佩雷分会为庆祝中华人民共和国成立二十周年，在芬兰第二大城市坦佩雷联合举办的中国“无产阶级文化大革命的伟大胜利万岁”图片展览会，已于二十五日胜利闭幕。"},{"type":"paragraph","text":"这个展览会是于九月十九日开幕的。会上展出的一百八十多幅图片，受到芬兰朋友的热烈欢迎。"},{"type":"paragraph","text":"一位七十多岁的退休老工人在观看中国共产党第九次全国代表大会的图片时，看到毛主席身体非常健康，心里很高兴。他对中国同志说：“你们党的第九次全国代表大会是一个伟大的胜利，是一个团结的大会。”"},{"type":"paragraph","text":"他还说：“中国人民是伟大的人民，是勤劳勇敢的人民。中国是一个伟大的国家。中国一定会在世界上起日益重大的作用。”"},{"type":"paragraph","text":"一位青年工人说，“毛主席亲自发动和领导的无产阶级文化大革命在中国巩固了无产阶级专政，防止了资本主义复辟。”另一个工人说，“通过无产阶级文化大革命，中国人民变得更加团结，更加坚强。”"},{"type":"paragraph","text":"一位工人在谈到对展览会的观感时说，“全世界无产阶级的伟大领袖毛主席是当代的列宁，他受到世界各国革命人民的爱戴。”"},{"type":"paragraph","text":"一位青年学生说，毛主席发动和领导亿万群众进行无产阶级文化大革命使中国不变颜色。"},{"type":"paragraph","text":"另一位芬兰朋友高度赞扬伟大的毛泽东思想，他说：“毛主席发展了马克思列宁主义。毛主席关于无产阶级文化大革命以及无产阶级专政下继续革命的学说，不仅对中国来说是重要的，而且对世界各国革命人民来说也是很重要的。”"},{"type":"paragraph","text":"许多观众热情赞扬中国人民二十年来在社会主义革命和社会主义建设各条战线上取得的伟大成就。他们说，“这一切都是毛主席英明领导的结果，也说明了社会主义制度的优越性。”"},{"type":"paragraph","text":"坦佩雷市副市长彭提·哈洛宁主持了展览会的开幕式。芬兰—中国协会坦佩雷分会主席维诺·莱托宁和副主席托伊伏·尼伦德以及一百多名芬兰朋友参加了开幕式。中国大使馆临时代办刘胥吉出席了开幕式并讲了话。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7de1ca577c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
