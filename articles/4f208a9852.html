al-archives/banned-historical-archives8/main/maoquanji2.pdf"],"article":{"title":"政治家","alias":"","parts":[{"type":"paragraph","text":"政治家"},{"type":"paragraph","text":"（1919年7月28日）"},{"type":"paragraph","text":"斯末资云：“惟人民的新真意，乃能决解（解决）和会里政治家因难而止的问题。”人民的真意，和政治家的见解，何以这么不相同？政治家何以这么畏难？人民何以这么不畏难？这里面果有一层解说么？我自来疑惑所谓“政治家”，怕莫不是一种好东西？我如今真得了证据。巴黎和约签定后，路易乔治回到英国，在下院演说道：“我们英国，得到许多成功，是我们伟大国民团结兴奋的效力。我们于今欢欣鼓舞，但不要存着祸患业已（已）过去的妄念。已\u003c已）使我们获胜的精神，仍要保持，以应付将来事件。我们不要浪费精力于彼此相争。”这就是政治家的大本领。这就是政治家的大魔力。不要浪费精力于彼此相争，就是说道，你们人民不要拿著生活痛苦，国民真意，种种无聊问题，和我们政府为难。那些问题都小，都不关痛痒。将来寻着事端，我们还要和别国打仗。爱国，兴奋，团结，对外，是最重要没有的。我正式告诉路易乔治这一类的政治家，你们所说的一大篇，我们都清白是“鬼话”，是“胡说”。我们已（已）经醒了。我们不是从前了。你们且收着，不要再来罢。"}],"authors":["毛泽东"],"dates":[{"year":1919,"month":7,"day":28}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":75,"page_end":75},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4f208a9852"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
