体古巴青年为反对剥削、捍卫祖国、反对美帝侵略和建设社会主义社会而斗争。","authors":[],"dates":[{"year":1962,"month":4,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【据新华社哈瓦那4日电】　3月30日在这里开始举行的古巴起义青年协会第一次全国代表大会今天下午闭幕。"},{"type":"paragraph","text":"代表大会决定把古巴起义青年协会改名为古巴共产主义青年联盟，并且讨论和通过了共产主义青年联盟章程。"},{"type":"paragraph","text":"章程规定，共产主义青年联盟“是社会主义革命统一党的青年组织，成立这个组织的主要目的是团结和动员古巴全体青年为反对一切形式的人对人的剥削，为捍卫新的祖国以及反对美帝国主义的威胁和侵略，并为建设一个将给我国人民带来光辉未来的社会主义社会而斗争。”章程还规定，共产主义青年联盟“在社会主义革命统一党的领导下，为争取实现一个建立在工人阶级的科学思想体系——马克思列宁主义基础上的社会主义建设纲领而工作。”"},{"type":"paragraph","text":"代表大会选举了古巴共产主义青年联盟的领导机构全国委员会，这个委员会由二十五人组成。霍埃耳·伊格莱西阿斯少校当选为总书记。"},{"type":"paragraph","text":"代表大会还听取和通过了起义青年协会中央委员会的工作报告。报告号召古巴青年同全国人民一道，积极执行提高革命觉悟、发展生产和保卫祖国的三大任务。"},{"type":"paragraph","text":"代表大会还决定把起义少年先锋联盟命名为古巴少年先锋联盟。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ad478c963b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
