克己复”都得到了彻底失败。“南京路上好八连”连长王振华，班长张显峰、周运德说——倒退愈远失败愈惨","authors":[],"dates":[{"year":1974,"month":2,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"每当社会历史处于激烈的大变动时期，一切反动阶级的代表人物，总会跳出来，阻挠历史车轮前进。“克己复礼”是孔子复辟“周礼”的反动政治纲领。在今天，它又成了林彪篡党夺权、复辟资本主义的反动思想武器。"},{"type":"paragraph","text":"“凡属倒退行为，结果都和主持者的原来的愿望相反。古今中外，没有例外。”新生事物是不可战胜的，新社会一定要代替旧社会，这是不以人们的意志为转移的客观规律。社会一定要前进，历史一定要发展，任何人也阻挡不住历史的潮流。守旧，肯定失败；倒退，没有出路；复辟，一定要受惩罚，开倒车的人决没有好下场!孔子反对新兴地主阶级的革新，复辟奴隶制，他周游列国，但到处碰壁，无立足安身之地。奴隶起义的领袖驳斥他是个“作言造语、妄称文武”的复古狂，“摇唇鼓舌、擅生是非”的“巧伪人”；过路老人讲他是“太不识时务了”的顽固派；匡人把他包围起来，要杀掉他；新兴的地主阶级代表感到他是“祸害”，要赶走他；甚至连他的学生也不听他那一套。他如同一条“丧家之犬”，人人喊打，最后在“吾道穷矣”的哀叹中一命呜呼。同样，林彪梦寐以求地想篡党夺权，复辟资本主义，但是，党心、人心不允许倒退，到头来“复礼”不成，匆匆忙忙投奔苏修，一头栽进沙漠，真是倒退愈远，失败就愈惨；倒车开得愈快，翻车就愈厉害。"},{"type":"paragraph","text":"毛主席指出:“想要阻挡潮流的机会主义者虽然几乎到处都有，潮流总是阻挡不住的”。孔子没有阻挡得住奴隶社会向封建社会的转变，林彪也休想阻挡得住社会主义的胜利前进。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"林彪","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"批林批孔","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ee79ecf7fd"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
