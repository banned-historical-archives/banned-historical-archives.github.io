,"authors":["刘健生"],"dates":[{"year":1955,"month":5,"day":19}],"is_range_date":false,"parts":[{"text":"山东省凫山等县发生数百人抢粮事件","type":"title"},{"text":"刘健生","type":"authors"},{"text":"【山东分社十六日讯】山东省凫山县四区，五月十二日夜间，有三百多人在供应站门前等候买粮，因供应站夜间不营业，群众不满，冲入粮库，抢走了粮食和供销合作社的豆饼(数量正在清查中)，区长和供销合作社主任被打。曹县八区塔湾集供应站，在五月一日上午九时被六百多买粮的群众抢去粮食三千余斤。同日，该县十二区魏庄寨供应点，在天明开始卖粮时，有六、七个人故意坐在磅称上不起来，强硬的要求先卖粮给他们，并在当时买粮的六百多人中散布不满情绪。据调查，这些人都是有余粮的富和对粮食统购统销有意见的人。","type":"paragraph"}],"comments":[],"origin":"新华通讯社编《内部参考》1955年5月19日","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7741c22edd"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
