script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"爱国学生和工人并肩战斗　坚决粉碎日美“安全条约”  日本各地广大群众举行反美大示威  示威群众痛斥日共宫本修正主义集团叛卖行径，怒呼：打倒美帝国主义","authors":[],"dates":[{"year":1968,"month":6,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"爱国学生和工人并肩战斗　坚决粉碎日美“安全条约”"},{"type":"paragraph","text":"日本各地广大群众举行反美大示威"},{"type":"paragraph","text":"示威群众痛斥日共宫本修正主义集团叛卖行径，怒呼：打倒美帝国主义"},{"type":"paragraph","text":"新华社十六日讯　据东方通讯社报道：日本爱国工人和学生以及广大群众十五日在全国各地举行声势浩大的集会和示威游行，要求废除日美“安全条约”。"},{"type":"paragraph","text":"爱国学生和工人并肩战斗，充分显示了群众反美斗争的强大力量。"},{"type":"paragraph","text":"东京和来自关东地区几个县的工人、学生和市民两万人，十五日下午和晚上在东京日比谷公园举行集会，并到美国大使馆和日本首相官邸以及国会前举行示威游行。游行时，人们举着写有“毛泽东思想万岁”的大红旗，举着写有“与法国人民并肩战斗”的横幅，头上扎着有“反帝反修”的布带，斗志极为高昂。"},{"type":"paragraph","text":"许多代表在集会上讲话，一致表示决心把粉碎日美“安全条约”的斗争进行到底，并且严厉批判了日共宫本修正主义集团的“议会道路”。代表们在讲话中还揭露了美帝侵略越南的罪行，强烈谴责了佐藤反动政府参与美帝侵略越南的行径。"},{"type":"paragraph","text":"六月十五日是日本民族英雄、爱国学生桦美智子被美日反动派杀害八周年的日子。爱国群众集会后前往国会大厦，在当年桦美智子壮烈牺牲的地方游行。人们高呼：“我们将踏着桦美智子的血迹前进！”“我们将坚持斗争，直到废除日美‘安全条约’！”"},{"type":"paragraph","text":"随后，示威队伍浩浩荡荡地前往首相官邸和美国大使馆。在美国大使馆门前，爱国群众怀着对万恶的美帝国主义者的无比仇恨，愤怒高呼：“美国佬从冲绳和日本滚回去！”“美国佬从越南滚出去！”“坚决反对日美‘安全条约’！”"},{"type":"paragraph","text":"一些群众还把写着反美口号的纸制飞机投向美国大使馆院内。"},{"type":"paragraph","text":"美国佬被示威群众吓得心惊胆战，大门紧闭，龟缩在楼里不敢露面。"},{"type":"paragraph","text":"佐藤反动政府出动了数以千计的武装警察，对爱国群众进行野蛮的镇压。但是英勇的工人和学生毫不畏惧地予以回击。反美口号此起彼伏，响彻了东京的上空。"},{"type":"paragraph","text":"游行队伍继续到东京闹市区示威。一群学生在大街上焚烧了美国星条旗和佐藤政府的募兵广告，表现了日本人民对美帝国主义和日本军国主义的仇恨。在斗争中，有二十人被警察无理逮捕。"},{"type":"paragraph","text":"在大坂市，约一万五千名工人、学生和市民举行大规模示威游行直到深夜，大街上还回响着《国际歌》的歌声和粉碎日美“安全条约”的口号声。当游行队伍走过闹市区时，市民们以热烈的掌声欢迎示威群众，许多市民参加了示威行列。"},{"type":"paragraph","text":"大约有两千名武装警察，一再袭击示威队伍。勇敢的爱国群众用拳头和石头同警察搏斗。示威群众击退了警察的袭击。"},{"type":"paragraph","text":"福冈县的爱国学生和市民不顾佐藤反动政府的镇压，在美国空军板付基地的大门前举行了反美集会。到会群众面对美军基地不断高呼：“打倒美帝国主义！”“美国佬滚出日本！”“立即撤出板付基地！”"},{"type":"paragraph","text":"山口县的一千名青年和学生冒着大雨在全县的七个城市举行集会和示威游行，表示决心为废除日美“安全条约”和反对日本军国主义而奋斗。"},{"type":"paragraph","text":"在下关市举行的集会上，日共山口县委员会（左派）和民主青年同盟山口县委员会（左派）的代表号召把反对日美“安全条约”的伟大革命斗争进行到底。"},{"type":"paragraph","text":"（附图片）"},{"type":"paragraph","text":"六月十五日，日本爱国工人和学生以及广大群众高举写有“毛泽东思想万岁”字样的红旗，到美国大使馆和日本首相官邸以及国会前面进行示威游行。　新华社发（传真照片）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f4308eda2f"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
