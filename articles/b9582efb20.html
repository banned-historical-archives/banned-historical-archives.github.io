我“三反”运动组织暴乱","authors":[],"dates":[{"year":1952,"month":2,"day":15}],"is_range_date":false,"parts":[{"text":"贵州水城等地发现敌特分子　企图利用我“三反”运动组织暴乱","type":"title"},{"text":"【贵州记者组十五日讯】最近贵州水城(毕节专区)东南红岩、米箩、蟠龙、顺场等四个乡发现坏分子有暴动迹象。估计其为首者系以会道门面目出现的敌特分子，群众多被裹胁，企图利用我“三反”及整编，部队集中，农村空虚的情况组织暴乱。这些会道门分子带头聚众二千多人，集中在米箩乡，有锄头、镰刀等各色武器。人民政府派一区长赴当地后，集中的人又暂时分散隐蔽。其口号是：“毛主席号召我们打‘老虎’，‘老虎’先吃地主，后吃富农，再吃中农，中农以后该轮到贫农了”。该地为郎岱、晴隆、普安、水城四县相接的地方，其活动区可能更大。刻已派部队处理。织金六区清镇鸭池河亦有此种迹象。","type":"paragraph"}],"comments":[],"origin":"1952年2月16日新华通讯社编《内部参考》。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b9582efb20"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
