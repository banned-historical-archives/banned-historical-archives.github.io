封失业工人已达数千余人","authors":[],"dates":[{"year":1952,"month":2,"day":28}],"is_range_date":false,"parts":[{"text":"三反运动展开后建筑运输大部停顿　开封失业工人已达数千余人","type":"title"},{"text":"【河南分社二十八日讯】三反运动开展后，开封工人因国家建筑、运输等大部停顿，私商停歇，目前已有数千人失业，其中主要为建筑业和架子车工人。近日有七八十工人向政府请愿，并提出口号要进行六反：即除五反外，另加上反饥饿。有的工人因生活无着，发生卖小孩，或把女孩送人当童养媳的现象。","type":"paragraph"},{"text":"省府对于上述问题已采取紧急措施，除拨粮救济外，并限各企业于五日内把加工订货恢复常态，并开始一部修建、运输等工作。","type":"paragraph"}],"comments":[],"origin":"1952年2月29日新华通讯社编《内部参考》。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"efba4f321c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
