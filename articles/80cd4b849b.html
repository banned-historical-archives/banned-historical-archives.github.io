:"说我是","type":"paragraph"},{"text":"杜勒斯的传声筒；","type":"paragraph"},{"text":"说我是","type":"paragraph"},{"text":"什么“自由之声”。","type":"paragraph"},{"text":"它叫我细雨和风，","type":"paragraph"},{"text":"他对我闪电雷轰。","type":"paragraph"},{"text":"一切本人皆看清，","type":"paragraph"},{"text":"从明天起埋头书本；","type":"paragraph"},{"text":"乘乘风凉，","type":"paragraph"},{"text":"悠然度余生。","type":"paragraph"}],"comments":[],"origin":"北京大学社会主义思想教育委员会编印《北京大学右派分子反动言论汇集》，一九五七年十月。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"80cd4b849b"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
