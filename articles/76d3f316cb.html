art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"要闻简报","authors":[],"parts":[{"type":"paragraph","text":"朱德，邓小平宴请古巴统一革命组织代表团"},{"type":"paragraph","text":"中国共产党中央委员会副主席朱德，总书记邓小平，八日会见并宴请以奥古斯托，马丁内斯·桑切斯少校为首的古巴统一革命组织代表团，并同他们进行了亲切的谈话。"},{"type":"paragraph","text":"参加会见和宴会的，有中共中央政治局委员彭真、李先念，中共中央书记处书记王稼祥，候补书记杨尚昆，中共中央委员刘宁一、伍修权，中共中央候补委员马文瑞、赵毅敏等。"},{"type":"paragraph","text":"我国党政代表团离柏林回国"},{"type":"paragraph","text":"由中共中央政治局委员、国务院副总理贺龙元帅率领的中国党政代表团在参加了德意志民主共和国成立十二周年的庆祝典礼之后，八日下午二时乘飞机离柏林回国。"},{"type":"paragraph","text":"德驻华大使举行国庆招待会"},{"type":"paragraph","text":"德意志民主共和国驻华大使约·黑根七日晚举行招待会，庆祝德意志民主共和国成立十二周年。董必武副主席等国家领导人出席了招待会。国务院副总理罗瑞卿大将在招待会上重申：中国政府和中国人民完全支持苏联和德意志民主共和国关于缔结对德和约并在此基础上使西柏林局势正常化的严正立场，完全支持德意志民主共和国和所有华沙条约缔结国所采取的一切防卫措施。他表示深信：兄弟般的德意志民主共和国人民的正义斗争一定能够取得最后胜利。"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"朱德","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"76d3f316cb"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
