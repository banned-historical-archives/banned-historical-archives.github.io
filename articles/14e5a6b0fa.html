00901.T10〖-WJ/文件〗"},{"type":"paragraph","text":"〖-TM/中图〗"},{"type":"paragraph","text":"〖TM/中图〗"},{"type":"paragraph","text":"〖BH/版号〗009〖-BH/版号〗"},{"type":"paragraph","text":"〖WJ/文件〗2013122400901.T11〖-WJ/文件〗"},{"type":"paragraph","text":"〖-TM/中图〗"},{"type":"paragraph","text":"翰墨寄深情 丹青忆伟人"},{"type":"paragraph","text":"——纪念毛泽东同志诞辰120周年书画作品选登（下）"},{"type":"paragraph","text":"北国风光（国画）"},{"type":"paragraph","text":"胡国伟作"},{"type":"paragraph","text":"毛泽东《七绝·五云山》"},{"type":"paragraph","text":"申万胜书"},{"type":"paragraph","text":"伟人皆彻想，圣者俱神思。"},{"type":"paragraph","text":"屈指击节后，翻天覆地时。"},{"type":"paragraph","text":"刘洪彪书"},{"type":"paragraph","text":"毛泽东《如梦令·元旦》"},{"type":"paragraph","text":"卢中南书"},{"type":"paragraph","text":"毛泽东《浪淘沙·北戴河》"},{"type":"paragraph","text":"孟世强书"},{"type":"paragraph","text":"摘录毛泽东《沁园春·长沙》"},{"type":"paragraph","text":"王文杰书"},{"type":"paragraph","text":"大河岸边（国画）"},{"type":"paragraph","text":"李生刚作"},{"type":"paragraph","text":"世上无难事，只要肯登攀。"},{"type":"paragraph","text":"连俊义书"},{"type":"paragraph","text":"襟怀湘水苍茫间，些许男儿握剑鞭。"},{"type":"paragraph","text":"且把横勾传圣火，任由竖撇注尧天。"},{"type":"paragraph","text":"文房四宝须臾带，三座大山倾刻迁。"},{"type":"paragraph","text":"妙点风云雷雨激，龙飞盛景舞在前。"},{"type":"paragraph","text":"沈一丹书"},{"type":"paragraph","text":"映山红（国画）"},{"type":"paragraph","text":"贺 勇作"},{"type":"paragraph","text":"远望韶峰秋色浓，感恩寻梦仰英容。"},{"type":"paragraph","text":"潇湘喜现开天手，禹域催生济世风。"},{"type":"paragraph","text":"指点江山凭伟略，激扬文字撼苍穹。"},{"type":"paragraph","text":"神飞翰墨万毫逸，气壮诗魂百代雄。"},{"type":"paragraph","text":"星火燎原腾烈焰，昆仑拔剑揽长虹。"},{"type":"paragraph","text":"风流千古谁能敌？看我中华一巨龙。"},{"type":"paragraph","text":"倪进祥书"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"14e5a6b0fa"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
