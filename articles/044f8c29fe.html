dates":[{"year":1960,"month":10,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社地拉那二十九日电】　据阿尔巴尼亚通讯社二十八日报道，阿尔巴尼亚人民议会主席团授予“阿里·卡尔门迪号”汽船的船员以勋章，奖励他们不顾南斯拉夫修正主义者的威胁，坚决保卫党的路线和阿尔巴尼亚人民的光荣。"},{"type":"paragraph","text":"这些船员十七日在公海上航行时受到了暴风雨的袭击，曾被迫开进南斯拉夫的格鲁日港口避风。南斯拉夫当局硬要他们拿掉汽船墙报上的一篇揭露南斯拉夫现代修正主义的文章，但是这种挑衅的要求遭到了他们的拒绝，南斯拉夫当局竟违反国际航海公法，拒绝让这艘汽船避风，最后，船员们毅然冒着骇浪和危险，离港驶向公海。"},{"type":"paragraph","text":"根据政府的建议，阿尔巴尼亚人民议会主席团授给这些船员三级自由勋章。船长弗兰茨·伊瓦奈和劳动党组织副书记拉马赞·多米获得勇敢勋章，其它船员获得勇敢奖章。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"044f8c29fe"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
