ical-archives/banned-historical-archives0/main/maoquanji31.pdf"],"article":{"title":"关于要新华社向各地通报五反的好经验给杨尚昆的信","alias":"","parts":[{"type":"paragraph","text":"对华北疫病防治情况报告的批语"},{"type":"paragraph","text":"（1952年3月17日）周总理："},{"type":"paragraph","text":"似宜通令全国各地普遍注意疫情，有疫者治疫，无疫者防疫，并将华北防治时疫文件转发各地参考，请酌办。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"三月十七日"},{"type":"paragraph","text":"[1]指中共中央华北局第三书记刘澜涛1952年3月15日关于华北疫病防治情况给周恩来并报毛泽东的报告。报告说，1952年入春以来，华北各地疫病相继发生，并蔓延发展，以河北、平原两省最为严重，主要是流行性感冒、麻疹、猩红热、白喉等。各级人民政府及时掌握疫情，组织力量防治，经过努力，大部地区疫病已经扑灭。但目前仍处于传染病流行季节，各地疫病仍未彻底根除，因此，必须防止麻痹思想，应继续组织力量，完全消灭现有疫病；同时发动群众，开展大规模的清洁卫生运动，进行全面预防工作，以保证人民健康和春耕抗旱工作的顺利开展。"}],"authors":["毛泽东"],"dates":[{"year":1952,"month":3,"day":16}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":514,"page_end":514},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bf6df1b868"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
