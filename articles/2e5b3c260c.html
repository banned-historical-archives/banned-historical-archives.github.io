script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"阿尔巴尼亚《人民之声报》发表文章  热烈赞扬资本主义国家工人运动蓬勃开展  揭露资产阶级及其走狗现代修正主义者妄图破坏工人运动的阴谋","authors":[],"dates":[{"year":1969,"month":10,"day":31}],"is_range_date":false,"parts":[{"type":"paragraph","text":"阿尔巴尼亚《人民之声报》发表文章"},{"type":"paragraph","text":"热烈赞扬资本主义国家工人运动蓬勃开展"},{"type":"paragraph","text":"揭露资产阶级及其走狗现代修正主义者妄图破坏工人运动的阴谋"},{"type":"paragraph","text":"新华社地拉那三十日电　阿尔巴尼亚《人民之声报》二十九日发表文章，热烈赞扬资本主义国家里蓬勃开展的工人阶级反对资产阶级剥削和压迫的斗争，揭露资产阶级及其走狗现代修正主义者散布种种谬论，妄图破坏工人运动的阴谋。"},{"type":"paragraph","text":"文章说，一场罢工和示威游行的风暴正在席卷整个资本主义世界。资本主义统治下的工人阶级、劳动农民和广大的人民群众正越来越广泛地投入到阶级搏斗中去，以争取自身权利，争取自由和民主，反对反动资产阶级的压迫政策和资本主义的残酷剥削。在这些罢工、示威游行和抗议集会中，千百万劳动人民以新的力量表现了自己要摧毁资产阶级压迫制度的决心。他们正在提高阶级觉悟，增强对自己正义事业的必胜信念。"},{"type":"paragraph","text":"文章赞扬了意大利、法国、英国、西德等国家的工人阶级为争取自身权利，反对资产阶级统治机器的压迫而进行的英勇斗争。文章指出，意大利、法国、英国、西德和其他许多资本主义国家中的阶级斗争的事实，再次令人信服地表明：资产阶级和修正主义的“理论家”和“宣传家”鼓吹的所谓“人民的和人道主义的资本主义”、所谓的资本主义“繁荣”的空话是何等虚假。这些阶级斗争的事实表明，资本主义国家的工人阶级和劳动群众正在日益分清真伪。他们摈弃现代修正主义者关于“结构改革”的投降主义口号。"},{"type":"paragraph","text":"文章最后说，无论是企图解除劳动人民武装和使他们离开阶级斗争的骗人口号，也无论是资产阶级军警的白色恐怖，都摧毁不了劳动人民的坚强意志，都扑灭不了越烧越旺的阶级斗争的烈火。相反，资产阶级代理人、修正主义分裂者和工贼越来越被揭露，越来越孤立。由新型的马克思列宁主义政党和小组领导的反对资本主义压迫和剥削的斗争，正在日益发展。工人阶级的新的战斗队伍正在投入到这场斗争中去。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2e5b3c260c"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
