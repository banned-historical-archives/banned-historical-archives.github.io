script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"剥削阶级丑恶灵魂的自我暴露——批判林彪鼓吹的“利己多欲乃规律”","authors":["吴学斌"],"dates":[{"year":1975,"month":3,"day":31}],"is_range_date":false,"parts":[{"type":"paragraph","text":"剥削阶级丑恶灵魂的自我暴露"},{"type":"paragraph","text":"——批判林彪鼓吹的“利己多欲乃规律”"},{"type":"paragraph","text":"解放军某部　吴学斌"},{"type":"paragraph","text":"叛徒、卖国贼林彪疯狂反对我们对资产阶级法权思想和一切剥削阶级反动思想的批判，大肆鼓吹“利己多欲乃规律”的反动谬论，妄图利用历代剥削阶级的腐朽思想腐蚀无产阶级和革命群众，颠覆无产阶级专政，复辟资本主义。"},{"type":"paragraph","text":"所谓“利己多欲乃规律”，完全是“人不为己，天诛地灭”的翻版，是剥削阶级的丑恶灵魂的自白。要说它是什么“规律”的话，纯粹是资产阶级和一切剥削阶级的“规律”，而绝不是无产阶级的“规律”。剥削阶级的本性就是唯利是图，就是“一切为我”；剥削阶级的人与人之间的关系，就是赤裸裸的金钱关系、个人利害关系。一切剥削阶级分子，都是极端利己主义者。他们尔虞我诈，互相倾轧，千方百计地剥削人民，不择手段地聚敛财富，充填那个永远填不满的个人的欲壑。正象恩格斯指出的那样：“在资产阶级看来，世界上没有一样东西不是为了金钱而存在的，连他们本身也不例外，因为他们活着就是为了赚钱，除了快快发财，他们不知道还有别的幸福，除了金钱的损失，也不知道还有别的痛苦。”（《马克思恩格斯全集》第二卷第五六四页）这是对“利己多欲”的资产阶级，包括社会主义社会中新产生的少数资产阶级分子的绝妙写照。"},{"type":"paragraph","text":"与资产阶级和一切剥削阶级相反，无产阶级是最大公无私的革命阶级，代表了最广大的劳动人民群众的利益，其历史任务就是解放全人类，实现共产主义。一心为革命，一切为人民，这就是我们无产阶级的世界观，这就是我们革命战士的最大幸福。它与“利己多欲”是水火不相容的。在过去革命战争年代里，无数革命同志为了人民的解放，出生入死，英勇战斗，有很多人光荣地献出了自己的生命。在他们头脑中，那里有什么“利己”“多欲”的东西？在今天社会主义革命和社会主义建设中，马克思主义、列宁主义、毛泽东思想培养出一批又一批雷锋、焦裕禄、王铁人式的共产主义战士。他们不怕苦，不怕死，不为名，不为利，一个心眼想着社会主义，一个目标向着共产主义，兢兢业业为党工作，全心全意为人民服务。在他们身上，难道有什么“利己”“多欲”的影子吗？林彪胡说“利己多欲乃规律”，这是对无产阶级和革命战士的极大侮辱！"},{"type":"paragraph","text":"社会主义社会还不可避免地存在着资产阶级法权。林彪反党集团卑鄙地利用资产阶级法权向党和人民进攻，宣扬什么“利己多欲乃规律”，为推行其“物质刺激”、“奖金挂帅”的修正主义路线制造理论根据，妄图用剥削阶级唯利是图的思想毒害劳动人民，诱骗劳动人民忘记阶级斗争和路线斗争，忘记共产主义的远大理想，放弃革命的根本利益，追逐个人私利，好让他们一伙复辟资本主义。因此，对于资产阶级法权，必须“在无产阶级专政下加以限制”，一步一步“造成使资产阶级既不能存在，也不能再产生的条件”。我们要多看点马列主义的书，不断地批判资产阶级世界观，批判资产阶级法权思想，自觉地同旧的传统观念实行决裂，发扬完全彻底为人民服务的精神，把革命工作做到底。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"林彪","type":"人物"},{"name":"限制资产阶级法权","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d201a46541"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
