tart":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"察敌料敌分敌择敌——毛泽东战争指导艺术拾零","authors":["阎丰"],"parts":[{"type":"paragraph","text":"察敌，高屋建瓴"},{"type":"paragraph","text":"察敌，是作战决策的前提。毛泽东的高超之处，在于始终能够高瞻远瞩，关照全局。他认为：“指挥全局的人，最要紧的，是把自己的注意力摆在照顾战争的全局上面。”小至战术行动，大至战略方针，都是战争全局的一部分，每投一个子，每下一步棋，都会不同程度地影响整个态势的发展。毛泽东每到一处，首先就是多方搜集报纸、资料，查阅各地文电，从而对全国局势了如指掌，不出户而知天下事，居茅庐而经略全国。"},{"type":"paragraph","text":"料敌，至精至神"},{"type":"paragraph","text":"科学预见敌我态势之变化、发展，是取得战争胜利的重要保证。在中国长期的革命战争实践中，毛泽东同志多次正确预测战争的发生与发展，为我党指导中国革命战争的顺利进行赢得了主动。毛泽东以超人的洞悉力、判断力，既能抓住战争每一阶段，又能跨越某些战争发展阶段，一下子把握战争的结局，从而正确地制定我军的作战方针。"},{"type":"paragraph","text":"分敌，通权达变"},{"type":"paragraph","text":"敌人内部的利害冲突，为我分化敌人、打击敌人创造了有利的条件。毛泽东同志非常善于从利害着眼，像庖丁解牛一样把貌似强大的敌人营垒，准确地解剖开来，分为若干类型、若干层次、若干性质，从而抓住时机，逐一歼之。如国内革命战争中，蒋军有中央军与地方军、嫡系与非嫡系、爱国与卖国之分。把握这些矛盾，确定打击目标，就易于形成战果。"},{"type":"paragraph","text":"择敌，因时因势"},{"type":"paragraph","text":"择敌就是在分敌基础上，根据自己的作战目的，选择出先打的、后打的、必打的和可争取、瓦解之敌，“先胜而后求战”。毛泽东善于因时因势、以变应变，在正确择敌、避害趋利上，表现出非凡的胆略和精深的辩证法思想。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ca373a4ac6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
