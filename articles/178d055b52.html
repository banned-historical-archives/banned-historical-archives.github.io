],"dates":[{"year":1976,"month":7,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　本市南湖中学党支部遵照毛主席关于“新中国要为青年们着想，要关怀青年一代的成长”的教导，认真讨论假期工作，制订暑假学生工作规划，引导学生过一个革命化的暑假。"},{"type":"paragraph","text":"首先，学校将利用返校日，继续列出专题，进行宣讲，帮助学生补上“文化大革命好”这一课。学期结束前，红卫兵宣讲队在学习毛主席关于文化大革命和反击右倾翻案风的一系列重要指示后，已向同学们宣讲了为什么说资产阶级就在共产党内，党内资产阶级的特点、活动规律及战胜他们的方法等专题；暑假中，将继续宣讲为什么说文化大革命不搞是不行的，社会主义革命的性质、对象、任务和前途，歌颂文化大革命，用战斗保卫文化大革命胜利成果等专题。除红卫兵宣讲队宣讲外，各班理论学习小组也将成立学习宣讲队，认真学习马列著作和毛主席著作，积极开展专题宣讲活动。学校还要求各班在假期中出一至二期大批判专栏，举办讲用会、批判会、诗歌朗诵会以及观看电影，使学生增强同党内资产阶级长期作战的自觉性。"},{"type":"paragraph","text":"在假期中，学校还将组织师生学习毛主席的教育革命思想，带着“工农兵欢迎怎样的接班人”这个问题到工厂、农村去进行社会调查，听取工农兵的意见，深入开展教育革命。学校还将动员学生积极参加“向阳院”活动，并开展丰富多彩的文体活动。　(本报通讯员)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"教育革命","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"178d055b52"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
