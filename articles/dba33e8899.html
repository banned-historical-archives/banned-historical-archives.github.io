"year":1952,"month":6,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"全国体育总会成立大会向毛主席致敬电敬爱的毛主席："},{"type":"paragraph","text":"在您的关怀和领导下，两年多来国民体育运动得到蓬勃发展。在这个基础上，中华全国体育总会成立大会于六月二十日在北京开幕了。大会进行了五天，确定了今后体育运动的方针、任务，通过了章程，选举了领导机构，今天，胜利地闭幕了。我们一定遵照您的“发展体育运动，增强人民体质”的指示，和全国人民一道，更加努力地工作，为国民体育运动的普及和经常化而积极奋斗，使体育运动对增进人民健康，加强国防建设和生产建设发挥更巨大的作用。"},{"type":"paragraph","text":"敬祝您身体健康！中华全国体育总会成立大会一九五二年六月二十四日"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dba33e8899"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
