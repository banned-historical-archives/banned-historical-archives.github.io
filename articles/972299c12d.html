ical-archives/banned-historical-archives0/main/maoquanji44.pdf"],"article":{"title":"过去走了弯路应该首先由中央负责","alias":"","parts":[{"type":"paragraph","text":"过去走了弯路应该首先由中央负责"},{"type":"paragraph","text":"（1961年12月20日）"},{"type":"paragraph","text":"对于过去走了弯路的看法，应该首先由中央负责，然后是省委，然后才是地委、县委。我到下边一看，省委说错误主要由他们负责，也说到中央，但是说中央总是正确的英明领导，这不符合事实嘛，就不能真正得到经验教训。这几年的高指标、高估产、高征购、高分配和大办水利、大办交通、大办养猪场等几个大办都是中央决定的。虽然材料是由你们报来的，但是谁叫中央相信你们呢？我们的头脑这个加工厂，没有了解实情。四高、几个大办、供给制、食堂，这些都是错误的。我们做了有损于人民利益的事，为人民服了不好的务。服务服得不好，这是一方面。同时还要看到，这些错误也是我们的宝贵财产。人的认识总是有个过程的。问题是我们认识的过程慢了一点，时间长了一点。"}],"authors":["毛泽东"],"dates":[{"year":1961,"month":12,"day":20}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":497,"page_end":497},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"972299c12d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
