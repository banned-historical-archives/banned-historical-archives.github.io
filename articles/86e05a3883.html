rt":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"中国文化大革命给世界人民带来无限希望","authors":[],"parts":[{"type":"paragraph","text":"新华社四日讯 东京消息：日中友好协会福冈县（正统）总部和西日本国际贸易促进协会主办的“中华人民共和国图片展览会”一日在福冈市胜利闭幕。"},{"type":"paragraph","text":"一日晚间在展览厅里举行了闭幕式，人们齐声朗读毛主席语录，祝愿伟大领袖毛主席万寿无疆。"},{"type":"paragraph","text":"这次图片展览会是在福冈革命人民反美爱国斗争蓬勃发展的情况下举行的。展览会从八月十七日开幕以来，深受福冈县人民的欢迎，有三十多万人参观了这个展览会。"},{"type":"paragraph","text":"展览会展出的四百多张图片，反映了毛主席亲自发动和领导的中国无产阶级文化大革命的伟大胜利以及世界各国革命人民反美正义斗争蓬勃发展的情况，使所有参观者受到深刻的教育和极大的鼓舞。"},{"type":"paragraph","text":"参观展览会的一位日本革命者说，伟大领袖毛主席亲自发动和领导的中国无产阶级文化大革命，具有伟大的国际意义，它不仅保证了社会主义中国永不变色，而且给世界革命人民指出了充满着无限希望的未来。他说，中国无产阶级文化大革命的伟大胜利，给美日反动派和苏修以及日共宫本修正主义集团以沉重的打击。"},{"type":"paragraph","text":"一位日本工人说，要进行革命就必须依靠毛泽东思想，依靠人民群众。世界人民的伟大领袖毛主席亲自发动和领导的中国无产阶级文化大革命，使中国这个世界革命的根据地更加巩固。我决心和中国人民团结在一起，同骑在日本人民头上作威作福的美帝国主义斗争到底。"},{"type":"paragraph","text":"福冈县的一位革命青年说：“由于看到了中国无产阶级文化大革命的胜利事实，使我更加热爱战无不胜的毛泽东思想，更深刻地感到革命的中国人民的伟大。”"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"86e05a3883"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
