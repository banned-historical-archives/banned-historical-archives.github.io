art":5,"page_end":5,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席对世界人民解放事业作出杰出贡献","authors":[],"parts":[{"type":"paragraph","text":"新华社讯 民主柬埔寨电台九月十三日广播一篇文章，深切哀悼毛泽东主席逝世。"},{"type":"paragraph","text":"文章介绍了毛泽东主席的伟大的战斗的一生，赞扬了毛泽东主席在创建中国共产党、中国人民解放军和中华人民共和国方面的丰功伟绩。"},{"type":"paragraph","text":"文章说：“在毛泽东主席的亲自领导下，中华人民共和国的诞生是一个了不起的事件，它使得亚洲、第三世界和全世界的局面发生了本质上的翻天覆地的变化。”"},{"type":"paragraph","text":"文章指出，在全国解放以后，毛泽东主席是中国人民“进行社会主义革命和社会主义建设的最英明、最坚强的领袖。他总结了国内革命和世界革命正反两方面的丰富经验。他发动的从一九六六年开始的无产阶级文化大革命，不断地战胜了刘少奇、林彪和邓小平的反革命修正主义路线。”"},{"type":"paragraph","text":"文章说：“在毛泽东主席的无产阶级革命路线指引下，中国人民在社会主义革命和社会主义建设中取得了惊人的胜利，改变了中国过去受人奴役、在各方面都十分贫穷落后的面貌。”"},{"type":"paragraph","text":"文章说，“在毛泽东主席的领导下，中国共产党和中华人民共和国在国际上享有崇高的地位、声誉和威望，中国人民的朋友遍天下，特别是遍及第三世界。其所以如此，是因为八亿多中国人民的伟大和敬爱的领袖毛泽东主席对世界人民的民族解放事业，对社会主义、共产主义、无产阶级专政事业作出了具有历史意义和国际意义的贡献。”"},{"type":"paragraph","text":"文章最后说：“战友和兄弟的中国人民的伟大领袖和导师、世界革命运动的杰出英雄毛泽东主席永垂不朽！”"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d2ef41265f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
