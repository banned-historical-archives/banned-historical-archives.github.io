tart":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"坚持按毛泽东思想建设连队","authors":["（壮族）韦日魏"],"parts":[{"type":"paragraph","text":"从广播里听了中央关于建立伟大的领袖和导师毛泽东主席纪念堂的决定、关于出版《毛泽东选集》和筹备出版《毛泽东全集》的决定后，我的心久久不能平静。缅怀毛主席为中国革命立下的丰功伟绩，追思毛主席对我们少数民族的恩情，深深感到：以华国锋同志为首的党中央的两项重要决定表达了我们各族战士的心愿，是全国人民政治生活中的一件大事，我们少数民族干部战士热烈欢呼，坚决拥护！"},{"type":"paragraph","text":"毛主席是我们各族人民的大救星。在那万恶的旧社会，我国少数民族被压在三座大山的最底层。帝国主义、国民党反动派、奴隶主对我们实行残酷的剥削和压迫，我们过着牛马不如的悲惨生活。是毛主席把我们从水深火热之中拯救出来，使我们过上了幸福生活。真是“天大地大不如毛主席的恩情大，爹亲娘亲不如毛主席亲”。"},{"type":"paragraph","text":"毛主席著作是马克思列宁主义的不朽文献。出版《毛泽东选集》和筹备出版《毛泽东全集》，对于我们坚持马克思列宁主义、毛泽东思想，继承毛主席的遗志，把毛主席开创的无产阶级革命事业进行到底，对于全世界被压迫民族和被压迫人民的解放事业，都具有深远的历史意义和重大的现实意义。我们要永远怀念毛主席，世世代代学习毛主席著作。"},{"type":"paragraph","text":"我这个在旧社会被山霸视为只配给他们当牛做马的人，今天能成为一个共产党员和革命干部，完全是毛泽东思想哺育的结果。记得我刚到部队的时候，连为什么要当兵的道理也说不清楚。后来通过学习毛主席的光辉著作才真正懂得为谁当兵、为谁扛枪的道理。当干部后，肩上的担子重了，我更加刻苦地看书学习，通读了《毛泽东选集》一至四卷，学习了《共产党宣言》、《国家与革命》、《哥达纲领批判》等马列著作，努力改造世界观，坚持用马列主义、毛泽东思想教育战士，建设连队。"},{"type":"paragraph","text":"今后，我要积极响应党中央的号召，带头学习马列和毛主席著作，把连队建设成反修防修的坚强集体，把毛主席开创的无产阶级革命事业进行到底！"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"550a3169b7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
