生坚持斗争反对腐朽教育制度","authors":[],"dates":[{"year":1969,"month":1,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反对垄断资本残酷剥削  争取改善生活条件"},{"type":"paragraph","text":"意大利各业工人纷纷大罢工"},{"type":"paragraph","text":"西西里岛中学生坚持斗争反对腐朽教育制度"},{"type":"paragraph","text":"新华社九日讯　罗马消息：意大利各行各业工人新年开始以来纷纷举行大罢工，反对垄断资本的残酷剥削，要求增加工资。"},{"type":"paragraph","text":"八日和九日，意大利北部比加莫省的两万名五金和机器制造工人，威尼斯、里窝那、费拉拉、卡塞塔等省的几千名化学工人举行了罢工。"},{"type":"paragraph","text":"据报道，一月间，将有五金、机器制造、纺织成衣、建筑、化学等意大利主要企业部门的三百万以上的工人陆续参加大罢工。"},{"type":"paragraph","text":"与此同时，意大利南部西西里岛三所中学的学生反对腐朽的资本主义教育制度的斗争，已经坚持一个多月。八日，几百名中学生在西西里岛首府巴勒莫大街再次举行示威，要求改善学习条件。反动当局出动大批警察对示威学生进行残酷镇压，示威学生用石块作武器，同警察进行了英勇搏斗。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8e83d8d96a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
