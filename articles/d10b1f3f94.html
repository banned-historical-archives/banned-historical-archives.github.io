990,"month":6,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"印度有大量奴隶童工"},{"type":"paragraph","text":"新华社新德里电  印度契约工解放阵线５月３０日发表一份调查报告说，印度现在大约有１０００万儿童卖身为奴。"},{"type":"paragraph","text":"这份报告说，在这１０００万儿童中一半是为父辈抵债，另一半是因家境贫困被迫卖身。他们当中有８８％来自社会最低阶层家庭。"},{"type":"paragraph","text":"调查报告说，近８００万童奴在农村干活。他们最小的只有７岁，每天从早干到晚。有的童奴在砖窑、石场和建筑工地劳动。还有１３万多人从事地毯编织劳动。"},{"type":"paragraph","text":"在印度南部坎奇普兰邦，约有２万名童奴，其中１０％至１５％的童奴干活是为了偿还父母的债务，其余的则每天只赚２卢比（０．１１美元），以补贴家用。"},{"type":"paragraph","text":"调查报告指出，许多童奴的健康受到损害，染有各种疾病。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d10b1f3f94"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
