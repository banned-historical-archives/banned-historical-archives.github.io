ical-archives/banned-historical-archives0/main/maoquanji38.pdf"],"article":{"title":"给袁水拍的信","alias":"","parts":[{"type":"paragraph","text":"给袁水拍的信"},{"type":"paragraph","text":"（1957年4月20日）水拍同志："},{"type":"paragraph","text":"你的《摇头》写得好（陈毅的六言诗也好），你应该多写些。我感到你做编辑不如出外旅行。可以请人代理你的职务，出外跑几个月回来，做几个月编辑再出去。是否可行，请加斟酌，并和领导同志商量。李希凡“宜于回到学校边教书，边研究。一到报社他就脱离群众了，平心说理的态度就不足了。请你和他商量一下。"},{"type":"paragraph","text":"同志的敬礼！"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一九五七年四月廿日[1]袁水拍，当时任人民日报社文学艺术和副刊部主任。"},{"type":"paragraph","text":"[2]《摇头》，是袁水拍写的一首政治讽刺诗。载于1957年4月18日《人民日报》。"},{"type":"paragraph","text":"[3]指陈毅写的《游玉泉山纪实》一诗。载于1957年4月18日《人民日报》。"},{"type":"paragraph","text":"[4]李希凡，1953年毕业于山东大学中文系。因写《关于（红楼梦简论）及其他》受到重视，于1955年调到人民日报社文学艺术和副刊部任编辑。"}],"authors":["毛泽东"],"dates":[{"year":1957,"month":4,"day":20}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":28,"page_end":28},"tags":[{"name":"陈毅","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6bb474a421"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
