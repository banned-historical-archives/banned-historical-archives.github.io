art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"要闻简报","authors":[],"parts":[{"type":"paragraph","text":"邓小平副总理会见他威副总理"},{"type":"paragraph","text":"邓小平副总理六月十八日上午会见了泰国副总理、世界羽毛球联合会主席他威·尊拉塞。"},{"type":"paragraph","text":"两位副总理在愉快的气氛中，就当前国际局势和发展双边关系的问题，进行了亲切友好的交谈。随同他威副总理来访的泰国羽毛球协会秘书长扁塞·苏苏提功，泰国驻中国大使沙贡·瓦纳比沙，参加了会见。"},{"type":"paragraph","text":"胡耀邦同志会见罗党的工作者代表团"},{"type":"paragraph","text":"中共中央政治局委员胡耀邦六月十八日上午会见了以罗共中央委员、罗共布勒依拉县委第一书记扬·卡特里内斯库为团长的罗马尼亚党的工作者代表团。"},{"type":"paragraph","text":"胡耀邦同志扼要地向罗马尼亚同志介绍了我国国内情况。他说，即将在今天正式开幕的五届人大第二次会议的重要议题之一是通过几个法案。他指出，我国的民主和法制遭到了林彪、“四人帮”的严重破坏。他接着说，今后，我国的民主和法制要进一步加强，以巩固国家的稳定。全国人民要求长期的安定团结，强烈要求把国民经济搞上去。我们要同心同德，团结一致搞四化。（据新华社）"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"胡耀邦","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"37127a4bb5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
