],"dates":[{"year":1989,"month":6,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京6月20日电　由中共中央文献研究室编辑的《邓小平同志关于坚持四项基本原则反对资产阶级自由化的论述》一书，即将由中央文献出版社出版，在全国新华书店陆续发行。"},{"type":"paragraph","text":"当前，全党、全军、全国各族人民，正在认真学习邓小平同志接见首都戒严部队军以上干部时发表的重要讲话。为了配合这次学习，中央文献研究室将十年来邓小平同志关于坚持四项基本原则反对资产阶级自由化的论述摘编成册，以便于大家联系过去历史，深入学习领会邓小平同志在这个基本问题上的一贯思想。"},{"type":"paragraph","text":"这本书共辑录了邓小平同志在党的十一届三中全会以后，自一九七九年三月至一九八九年三月，这一期间的三十九段论述，其中最后四段是第一次公开发表。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ef6d484902"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
