:["周恩来"],"dates":[{"year":1967,"month":8,"day":15}],"is_range_date":false,"parts":[{"text":"周恩来接见湖南三方代表讲话摘要","type":"title"},{"text":"周恩来","type":"authors"},{"text":"最近中央对湖南下了一个决定，是毛主席亲自批准的，这次军区的认识是深刻的，我们这次点名的两个同志刘子云、崔琳是要负主要责任的，龙书金也要负责任的，对龙书金的错误，中央是详细了解了的，今年五月份在广州大军区会议上龙书金作了检查，当时我们认为他的检查是比较好的，有承认错误的认识，但是动摇了，继续犯错误，总的一句话错误的思潮已经过去了，但更重要的问题是向前看，主要是加强造反派内部的团结，不是无原则的团结，没有共同的斗争目标、共同的方向，就不可能团结，当前的大方向是开展革命的大批判，批判的重点就是刘少奇，刘少奇不是到湖南蹲点了吗？刘少奇在湖南放了不少毒，搞什么三自一包，这可以批判嘛！还可以联系到中南局的陶铸、王任重，你们湖南省的张平化、王延春，同时结合本单位的斗批改，同时希望你们狠抓革命，猛促生产。必须提高警惕性，警惕坏人挑拨离间，破坏团结，造反派之间打内战，要克服无政府主义、山头主义，进行整风，希望你们多作自我批评，团结一致，共同对敌。戴里同志提出由“湘江风雷”等革命组织，成立一个由47军领导的维护治安的“文攻武卫指挥部”，这个意见很好，我们决定中央建立一支造反派的群众武装维护革命的秩序，希望你们承认革命委员会筹备小组的领导，承认47军领导，这样才不致于使坏人和保守派去夺解放军的枪，加强三性，革命性领先。","type":"paragraph"}],"comments":[],"origin":"周良霄、顾菊英编《疯狂、扭曲与堕落的年代》之二——《十年文革中首长讲话传信录》, 2009。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"湖南文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]},{"id":"chuanxinlu3","name":"十年文革中首长讲话传信录（下册）","internal":false,"type":"pdf","official":false,"author":"周良霄,顾菊英","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/十年文革中首长讲话传信录3.pdf"],"article":{"title":"周恩来接见湖南三方代表讲话摘要","parts":[{"type":"title","text":"914.周恩来接见湖南三方代表讲话摘要"},{"type":"paragraph","text":"(1967年8月15日)"},{"type":"paragraph","text":"最近中央对湖南下了一个决定，是毛主席亲自批准的，这次军区的认识是深刻的，我们这次点名的两个同志刘子云、崔琳是要负主要责任的，龙书金也要负责任的，对龙书金的错误，中央是详细了解了的，今年五月份在广州大军区会议上龙书金作了检查，当时我们认为他的检查是比较好的，有承认错误的认识，但是动摇了，继续犯错误，总的一句话错误的思潮已经过去了，但更重要的问题是向前看，主要是加强造反派内部的团结，不是无原则的团结，没有共同的斗争目标、共同的方向，就不可能团结，当前的大方向是开展革命的大批判，批判的重点就是刘少奇，刘少奇不是到湖南蹲点了吗？刘少奇在湖南放了不少毒，搞什么三自一包，这可以批判嘛！还可以联系到中南局的陶铸、王任重，你们湖南省的张平化、王延春，同时结合本单位的斗批改，同时希望你们狠抓革命，猛促生产。必须提高警惕性，警惕坏人挑拨离间，破坏团结，造反派之间打内战，要克服无政府主义、山头主义，进行整风，希望你们多作自我批评，团结一致，共同对敌。戴里同志提出由“湘江风雷”等革命组织，成立一个由47军领导的维护治安的“文攻武卫指挥部”，这个意见很好，我们决定中央建立一支造反派的群众武装维护革命的秩序，希望你们承认革命委员会筹备小组的领导
