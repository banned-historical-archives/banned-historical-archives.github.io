批判王张江姚“四人帮”反党集团的伟大斗争","authors":[],"dates":[{"year":1976,"month":11,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京一九七六年十一月二十五日电　继《鲁迅言论选辑》(一)、(二)辑之后，人民文学出版社又编印了《鲁迅言论选辑》(三)，近日起将在全国城乡普遍发行。"},{"type":"paragraph","text":"伟大领袖和导师毛主席历次教导我们要学习鲁迅。鲁迅的一生，是在激烈复杂的阶级斗争和路线斗争中“永远进击”的一生。他时刻注意“将营垒分清”，无情地揭露了形形色色的阶级敌人、假马克思主义骗子、“革命营垒中的蛀虫”，深刻地批判了他们“借革命以营私”的反动本质和他们“扯大旗作为虎皮”、“营植排挤”等鬼蜮伎俩。这次出版的《鲁迅言论选辑》(三)，分门别类地选辑了有关这方面的言论，并全文辑入了直接批判张春桥(化名狄克)的《三月的租界》一文，可使我们从中学到宝贵的革命精神和战斗经验，更好地开展揭发、批判王张江姚“四人帮”反党集团的伟大斗争。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4081710c24"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
