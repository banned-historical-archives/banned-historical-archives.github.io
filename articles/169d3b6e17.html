art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"把反击右倾翻案风的斗争进行到底","authors":["新疆部队某部机枪连全体同志"],"parts":[{"type":"paragraph","text":"根据伟大领袖毛主席提议，中共中央决议，由华国锋同志任党中央第一副主席、国务院总理；撤销邓小平党内外一切职务，我们全连指战员表示坚决拥护。我们的决心是：毛主席指示的，我们坚决照办；毛主席支持的，我们坚决拥护；毛主席反对的，我们坚决斗争；毛主席挥手，我们就奋勇前进。"},{"type":"paragraph","text":"毛主席亲自发动和领导的反击右倾翻案风的伟大斗争，正在胜利发展。革命越深入，阶级敌人越害怕，他们就越要进行垂死的挣扎。天安门广场出现的反革命政治事件，就是阶级敌人的垂死挣扎。一小撮反革命分子，把矛头指向伟大领袖毛主席，阴谋分裂以毛主席为首的党中央，公开为不肯改悔的走资派邓小平歌功颂德，其罪恶目的是妄图扭转当前批邓和反击右倾翻案风斗争的大方向，颠覆无产阶级专政，复辟资本主义。这是我们革命战士绝对不能容忍的。我们愤怒声讨邓小平的反动罪行，愤怒声讨一小撮阶级敌人制造天安门广场反革命政治事件的罪行。"},{"type":"paragraph","text":"我们是驻守在反修前哨的解放军战士。我们一定认真学习毛主席的一系列重要指示，牢牢掌握批判邓小平的斗争大方向，把斗争的矛头始终对准不肯改悔的走资派邓小平，深入批判他的反革命的修正主义路线。我们一定紧紧地与全国人民站在一起，团结在以毛主席为首的党中央的周围，把反击右倾翻案风的伟大斗争进行到底。我们一定要坚持抓革命，促生产，促工作，促战备，提高警惕，加强战备，守卫好祖国的西大门，以实际行动，保卫毛主席，保卫党中央，保卫毛主席的无产阶级革命路线，保卫伟大的社会主义祖国。"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"169d3b6e17"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
