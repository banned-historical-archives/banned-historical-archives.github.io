tart":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"永远跟着毛主席劈山开路","authors":["石广义"],"parts":[{"type":"paragraph","text":"十月十八日，我见到了我们伟大的领袖毛主席。当时我激动的心情再也控制不住了，幸福的热泪夺眶而出。我用尽全力高呼：“毛主席万岁！万岁！万万岁！”还是无法表达出对毛主席的无限热爱的心情。回想我们战斗在西藏高原的时候，心里就时刻想念着毛主席。今天，终于实现了这个愿望，怎能不万分激动！"},{"type":"paragraph","text":"在西藏的时候，我们连长期分散执行任务，在八百多公里的线路上分布了三十几个点；加上干部少，困难的确很多。我们按照林彪同志的指示，突出政治，活学活用毛主席著作，在“用”字上狠下功夫，提高大家的思想觉悟。通过活学活用毛主席著作，全连同志为人民服务的思想树立得更牢了，克服困难的勇气增强了。大家下定决心，不怕牺牲，排除万难，去争取胜利，几年来，圆满完成了上级交给的任务，连队年年被评为四好，还派代表出席过西藏军区和兵种学习毛主席著作积极分子代表会议。实践使我们深刻体会到，要做工作，要干革命，就要靠战无不胜的毛泽东思想！"},{"type":"paragraph","text":"最近林彪同志号召我们把活学活用毛主席著作的群众运动推向新阶段。我们坚决响应林彪同志的号召，进一步活学活用毛主席著作，在“用”字上狠下功夫，加强思想革命化，跟着毛主席，劈山开路，让毛泽东思想伟大红旗永远高高飘扬。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"name":"西藏文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"78def0e5bb"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
