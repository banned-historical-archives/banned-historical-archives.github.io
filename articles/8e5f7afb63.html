<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"美国工业生产下降呈现一片衰败景象  汽车工业大幅度下降，钢铁、飞机工业不断下降，建筑、橡胶工业情况不妙  美国资产阶级报刊哀叹经济领域“乌云密布”，今年是“令人不安的一年”","authors":[],"dates":[{"year":1970,"month":1,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"美国工业生产下降呈现一片衰败景象"},{"type":"paragraph","text":"汽车工业大幅度下降，钢铁、飞机工业不断下降，建筑、橡胶工业情况不妙"},{"type":"paragraph","text":"美国资产阶级报刊哀叹经济领域“乌云密布”，今年是“令人不安的一年”"},{"type":"paragraph","text":"新华社七日讯　华盛顿消息：一九七○年开年伊始，美国工业许多部门的生产就出现大幅度下降，呈现一片衰败景象。"},{"type":"paragraph","text":"美国汽车工业的下降幅度最大。由于大批汽车卖不出去，汽车垄断集团从去年十一月以后被迫一再削减生产计划，使去年全年的生产比一九六八年下降百分之八。在截至一月三日为止的一个星期中，汽车生产又比前一周下降了百分之二十二，比前一年同期甚至下降了百分之七十四。美国最大的汽车公司——通用汽车公司已经宣布，在一月份将把十二条装配线停止生产两天，并削减原生产计划的百分之二十一点四。另一家大汽车公司——克莱斯勒汽车公司也宣布，它决定让五个装配厂的三万七千七百工人在一月份的头两个星期中停工一星期，以便使一月份的汽车生产下降百分之十三。"},{"type":"paragraph","text":"钢铁工业的生产，从十一月底以后，也逐步下降。在截至一月三日为止的一个星期中，下降幅度达百分之九点九，是十七个月中下降幅度最大的一周。"},{"type":"paragraph","text":"同一周，卡车也比去年同期减产百分之二十。"},{"type":"paragraph","text":"由于美国最大垄断企业之一通用电气公司的十五万工人继续坚持罢工，这家公司两百多个工厂在一月初继续停止生产。这就使得飞机工业受到极大影响。由于这家公司被迫停止供应飞机引擎，飞机工业的生产正不断下降。"},{"type":"paragraph","text":"此外，建筑、橡胶等工业部门一月初的生产情况也不妙。"},{"type":"paragraph","text":"美国工业生产一月初继续下降，表明经济危机已更加咄咄逼人。由于市场萎缩，大批产品积压，因此去年八月份以后美国工业生产即连续下降。"},{"type":"paragraph","text":"西方通讯社在评论一九七○年年初美国工业生产的形势时，沮丧地说，情况“远远不能令人高兴”，汽车和飞机工业已进入“现实的衰退”。美国资产阶级报刊和金融界人士在展望前景时就更加惶恐。有的哀叹经济领域中“乌云密布”，今年是“令人不安的一年”。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8e5f7afb63"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
