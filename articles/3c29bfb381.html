961,"month":7,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京十日电】　以中共中央副主席、中华人民共和国主席刘少奇为首的中国党政代表团，同以朝鲜劳动党中央委员会委员长、朝鲜民主主义人民共和国内阁首相金日成为首的朝鲜党政代表团，在今天下午举行了会谈。"},{"type":"paragraph","text":"会谈在极为亲切友好的气氛中进行。"},{"type":"paragraph","text":"中国方面参加会谈的，有中共中央副主席、国务院总理周恩来，中共中央总书记邓小平，中央政治局委员彭真、陈毅、李富春、贺龙，国务院副总理罗瑞卿。"},{"type":"paragraph","text":"朝鲜方面参加会谈的，有朝鲜劳动党中央委员会副委员长金昌满，朝鲜劳动党中央委员会常务委员会委员、内阁创首相兼民族保卫相金光侠，朝鲜劳动党中央委员会常务委员会候补委员、内阁副首相兼重工业委员会委员长李钟玉，外务相朴成哲。"},{"type":"paragraph","text":"会谈时，中国方面在座的有中共中央委员伍修权，外交部副部长姬鹏飞，我国驻朝鲜大使乔晓光。朝鲜方面在座的有朝鲜驻中国大使馆临时代办马东山。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3c29bfb381"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
