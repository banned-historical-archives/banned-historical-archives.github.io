:["喻屏"],"dates":[{"year":1970,"month":5,"day":23}],"is_range_date":false,"parts":[{"text":"喻屏给专案组的思想汇报（摘录）","type":"title"},{"text":"喻屏","type":"authors"},{"text":"〖喻屏，中共中央东北局候补书记。文革中经中共中央批准打倒的刘少奇在东北及辽宁的第三号“代理人”。专案组将其历史上在国民党狱中曾“自首叛变”问题作为逼供重点。〗","type":"subtitle"},{"text":"专案组多次提出我还有更多更严重的罪行没有交待，我交待的和专案组掌握的材料差距很大。每次提出，我都进行了深思苦想，但一直没有想起还有什么问题没有交待的。","type":"paragraph"},{"text":"这其中一定有什么东西卡着，使我无从想起，如有人提供了不真实的材料。如果不是这类情况，尽管时间长了，我的记忆力不好，但正如专案组所说，我根本不会忘记，更不会这样长时间一直想不起来！","type":"paragraph"},{"text":"请专案组对所掌握的材料最好再进一步进行复查。","type":"paragraph"}],"comments":[],"origin":"高振河《喻屏传》，北京：中共党史出版社，2005年8月第一版。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c120acfa78"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
