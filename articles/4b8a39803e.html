ical-archives/banned-historical-archives0/main/maoquanji36.pdf"],"article":{"title":"七律·和周世钊同志","alias":"","parts":[{"type":"paragraph","text":"七律·和周世钊同志"},{"type":"paragraph","text":"（1955年10月）春江浩荡暂徘徊，又踏层峰望眼开。风起绿洲吹浪去，雨从青野上山来。尊前口谈笑人依旧，域外鸡虫事可哀。3莫叹韶华容易逝，"},{"type":"paragraph","text":"卅年仍到赫曦台。[1]周世钊，当时任湖南省教育厅副厅长兼湖南省立第一师范学校校长。[2]尊前，尊同樽，酒杯。尊前，酒席前。"},{"type":"paragraph","text":"[3]域外鸡虫事可哀，国际间的某些事件像鸡虫得失一样渺小，人们为这些小事而勾心斗角是可悲的。这里所指的具体内容待考。唐杜甫《缚鸡行》：“小奴缚鸡向市卖，鸡被缚急相喧争。家中厌鸡食虫蚁，不知鸡卖还遭烹。虫鸡于人何厚薄？吾叱奴人解其缚。鸡虫得失无了时，注目寒江倚山阁。”"},{"type":"paragraph","text":"[4]韶华，美好的年华，指人的青年时代。"},{"type":"paragraph","text":"[5]赫曦台，在湖南省长沙市岳麓山岳麓书院。朱熹曾称岳麓山顶为赫曦，后因称山上的台为赫曦台。清代因山上的台已毁，将原“赫曦台”匾额悬于岳麓书院“前台”，由此前台更名赫曦台。赫曦，光明盛大的样子。"}],"authors":["毛泽东"],"dates":[{"year":1955,"month":10}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":45,"page_end":45},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4b8a39803e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
