art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"班禅额尔德尼到达西安汪锋代表中央的毛主席前往欢迎","authors":[],"parts":[{"type":"paragraph","text":"综合新华社讯 到北京出席第二届全国人民代表大会第一次会议的全国人民代表大会代表、西藏自治区筹备委员会代理主任委员班禅额尔德尼·却吉坚赞12日上午乘专车到达西安。全国人员代表大会代表、西藏自治区筹备委员会副主任委员阿沛·阿旺晋美，全国人民代表大会代表詹东·计晋美、协饶登珠和政协全国委员会委员阿沛·才旦卓噶以及班禅额尔德尼的随行官员也同车到达。"},{"type":"paragraph","text":"代表中央人民政府、毛主席从北京到西安欢迎班禅额尔德尼的全国人民代表大会常务委员会委员、中共中央统一战线工作部副部长汪锋到车站欢迎。"},{"type":"paragraph","text":"中共陕西省委第一书记张德生，书记赵伯平、方仲如，陕西省省长赵寿山，副省长李启明、和副省长、陕西省政协副主席孙蔚如，陕西军区司令员杨嘉瑞少将，陕西省政协副主席杨子廉，中共陕西省委书记兼西安市委第一书记张策、西安市市长刘庚都到车站欢迎。"},{"type":"paragraph","text":"到车站欢迎的还有陕西省和西安市各民主党派、各人民团体和宗教界的人士等。在车站外面，有上千的市民欢迎班禅额尔德尼。"},{"type":"paragraph","text":"12日上午，汪锋和中共陕西省委第一书记张德生、陕西省省长赵寿山等到宾馆访问了班禅额尔德尼和阿沛·阿旺晋美、詹东·计晋美，进行了亲切的交谈。班禅额尔德尼随即回访了汪锋。班禅额尔德尼向汪锋表示十分感激中央和毛主席的深切关怀，并问候了毛主席和中央各领导人的健康。"},{"type":"paragraph","text":"12日下午，陕西省人民委员会举行盛大宴会欢迎班禅额尔德尼。"},{"type":"paragraph","text":"班禅额尔德尼10日从拉萨乘专机到达兰州时，受到了热烈的欢迎。11日，甘肃省人民委员会曾设宴招待班禅额尔德尼。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"156a48ff3a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
