art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"做学习的模范","authors":[],"parts":[{"type":"paragraph","text":"确立和维护毛泽东同志的历史地位，坚持和发展毛泽东思想，这是贯穿整个《决议》的一条根本指导思想。深入学习贯彻《决议》，就要解决好这个问题，进而组织部队认真学习毛泽东同志的著作。"},{"type":"paragraph","text":"毛泽东同志的科学著作，是毛泽东思想的集中概括。认真学习毛泽东著作，就能够使我们很好地掌握和运用辩证唯物主义和历史唯物主义的世界观、方法论，来研究和解决实践中出现的新情况、新问题，搞好我国的社会主义现代化建设和现代化、正规化革命军队的建设。共产党员和领导干部应当带头学好毛泽东同志的著作，用自己的模范行动把部队的学习风气带起来。"},{"type":"paragraph","text":"做学习的模范，就要进一步确立对毛泽东思想的科学态度。要用《决议》去统一思想，要认真学习邓小平同志关于毛泽东思想的论述，正确认识毛泽东同志的历史功绩，毛泽东思想的科学价值和指导作用，自觉学好毛泽东同志的著作。"},{"type":"paragraph","text":"在毛泽东思想培育下成长起来的各级领导干部，对毛泽东思想的指导作用有着深切的感受。用自己的亲身经历谈学习体会，对年轻同志会有很大的启发和教益，这本身就是最好的传帮带。这样一级带一级，一级抓一级，就必定能够在部队中形成一个刻苦认真地学习、卓有成效地工作的良好风气。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"108d20af2e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
