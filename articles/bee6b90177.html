<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"四川许多手工业和小商贩单干户的收入为何超过了社员的收入？","authors":[],"dates":[{"year":1957,"month":12,"day":16}],"is_range_date":false,"parts":[{"text":"四川许多手工业和小商贩单干户的收入为何超过了社员的收入？","type":"title"},{"text":"新华社成都16日讯  四川省手工业和小商贩中的单干户一年来有相当发展，有许多人的收入超过了同行业合作组织成员的收入，使单干户和组织起来的矛盾日益尖锐突出，在一定程度上影响了合作组织的巩固。","type":"paragraph"},{"text":"据成都市东城区对缝纫、布鞋、制帽、铁器（建筑工具）、日用金属（丝帽）等五个手工行业的调查，合作社平均每月收入三十四元，而单干户每月平均收入为五十元，单干户比社员搞47%。在调查的一百一十六户单干户中，1月至9月平均收入高于社员的占68%，和社员基本相等的占10%，低于社员的占22%。长寿县城区商业服务业小商贩全部单干户一百七十五户中，超过合作组织平均收入的七十六户，占43%，其中超过50%——100%的二十二户，超过一至二倍的二十二户，超过两倍以上的十二户。乐山城区四百五十八户单干小商贩中，收入超过合作组织平均收入的一百九十一户，占42%，其中超过50——100%的五十八户，超过一至二倍的五十五户，超过两倍以上的十四户。","type":"paragraph"},{"text":"有些单干户的收入高到了相当惊人的程度。如：成都市制帽业曹良铭夫妻二人去年共做营业额三万八千多元，获利九千六百元，除缴纳三千元左右所得税外，尚有六千多元，加上二人每月一百一十五元工资，全年实际收入将近八千元。","type":"paragraph"},{"text":"使单干户收入普遍偏高有几方面原因，首先是缺乏统一领导和严格管理。目前工商行政部门、国营公司、手工业部门、税务局等都在管单干户，但有的只管与自己有关系的行业，对别的行业不管，因此，单干户在采购原料、加工生产、销售成品的任何一个环节上都有空子可钻。如：自由市场开放后，有些管理工作未跟上，有些手工业单干户即和收荒者勾结，以黑市价套购废金属，紫铜每斤牌价一点三元，单干户出了三至五元，越抢越贵。有些单干户则偷工减料，蒙混欺骗以获取非法利润，如以厚纸代皮革垫底子，雇主买双新皮鞋穿了不久即现原形。至于成品价格，在市场销时比合作社贵，市场疲时又比合作社低。小商贩中的投机现象也很普遍。","type":"paragraph"},{"text":"其次，税收方面也有些漏洞。第一，营业税率合作组织比单干户高，单干户均按小商贩待遇，营业税率为3%%，而合作组织则按所属行业税率，大多数行业为3.5%，有些划为大型的手工业社，征工加商两道营业税，税率则高3%左右。第二，从去年7月份起，小商贩和个体手工业者均不征所得税，今年对拔尖户征收了一点所得税。第三，营业税起征点一律九十元、六十元，单干户也占便宜。因此，造成了单干户的收入一般较多。上述成都市东城区五个手工业行业单干户今年1至9月的税收负担只占营业额的4.83%，而合作社的税收负担却为6.93%。若合作社的优待期满，所得税不予减征，则合作社的税收负担将达9.5%左右，这样即比单干户的税收负担高一倍还多。","type":"paragraph"},{"text":"此外，合作组织为了扩大生产和经营，将缴纳所得税的利润提了相当一部分作为公共积累，只将一小部分退还给社员，这是必须的，它和单干户将全部或大部利润作为个人收入而用于生活消费的情况当然不同。","type":"paragraph"},{"text":"为了改变上述情况，省的财贸领导机关除着手加强对小商贩和手工业单干户的领导和管理外，已拟出改进对个体户课税的办法，适当平衡个别户同合作组织成员收入，以巩固合作组织。（挺军根据财贸部门材料编写）","type":"paragraph"},{"text":"新华通讯社编：《内部参考》，第2385期，1957年12月18日。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bee6b90177"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
