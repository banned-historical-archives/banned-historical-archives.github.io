{"year":1964,"month":10,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"邓小平同志会见印度尼西亚共产党代表团"},{"type":"paragraph","text":"新华社六日讯　中共中央总书记邓小平，今天上午会见印度尼西亚共产党代表团团长、印度尼西亚共产党中央政治局委员、中央书记处副总书记优素福·阿吉托罗普和印度尼西亚共产党代表团团员、印度尼西亚共产党中央委员曹德崇。宾主进行了亲切友好的谈话。"},{"type":"paragraph","text":"参加会见的有中共中央政治局候补委员、中央书记处书记康生，中共中央委员刘宁一，中共中央机关负责工作人员张上明等。"},{"type":"paragraph","text":"会见后，邓小平同志和夫人卓琳，设宴热烈欢迎优素福·阿吉托罗普同志、曹德崇同志、阿吉托罗普同志的夫人、印度尼西亚妇女运动协会代表尤斯娃蒂和阿吉托罗普同志的孩子。"},{"type":"paragraph","text":"出席宴会作陪的有康生、刘宁一、张上明等。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"康生","type":"人物"},{"name":"邓小平","type":"人物"},{"name":"刘宁一","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"373c17054b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
