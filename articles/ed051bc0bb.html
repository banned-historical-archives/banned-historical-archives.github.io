script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"奸商剥削志愿军的行为  等于帮助了美国侵略者","authors":["彭静"],"dates":[{"year":1952,"month":2,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"奸商剥削志愿军的行为"},{"type":"paragraph","text":"等于帮助了美国侵略者"},{"type":"paragraph","text":"编辑同志：最近几天，我又发觉了以下几件事实：北京有违法的资本家，在卖给慰劳志愿军的菜里掺杂大量沙子；甚至为志愿军伤员制造的橡胶腿也用再生胶；天津利兴蛋厂为人民志愿军制蛋粉时，在每一桶罐头里竟少装蛋粉一两半至三两。这些事实使我十分愤怒！英勇的中国人民志愿军，为了保卫全国人民幸福的生活，在抗美援朝的最前线勇敢地、艰苦地作战；爱国的中国人民，为了支援我们最可爱的人，在后方努力地生产、工作和捐献。但唯利是图的不法资本家们竟丧尽一个中国人应有的天良，胆敢从祖国、从人民支援志愿军的物资里进行盗窃。这难道不是帮助了美国侵略者吗？不法资本家这种极端丑恶的、反动的行为是我们全国人民，全国爱国的工人、店员所绝对不能容忍的。为了积极支援我们最可爱的人，我们全体爱国的人民一定要在毛主席的领导下，坚决对不法资本家进行斗争。"},{"type":"paragraph","text":"彭静"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ed051bc0bb"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
