"year":1960,"month":10,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　中国人民对外文化协会上海市分会会长、中国拉丁美洲友好协会在沪理事张春桥昨晚举行酒会，欢迎古巴、委内瑞拉和巴西三国文化代表团。"},{"type":"paragraph","text":"中国人民保卫世界和平委员会上海市分会副主席石西民出席了酒会。"},{"type":"paragraph","text":"酒会在热烈友好的气氛中进行。宾主双方频频祝酒，为在反对美帝国主义斗争中所取得的胜利，为中国人民和拉丁美洲人民之间日益巩固与发展的友谊干杯。"},{"type":"paragraph","text":"出席酒会的还有，中国人民对外文化协会上海市分会副会长陈虞孙、吴强，上海市文化局局长孟波，中国人民对外文化协会上海市分会理事吴乐懿、杜宣、周原冰、张瑞芳、黄贻钧、庞季云等。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"张春桥","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"19f83643d0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
