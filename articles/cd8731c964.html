耀强"],"dates":[{"year":1991,"month":6,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"揭示伟人感情世界的新影片"},{"type":"paragraph","text":"《毛泽东和他的儿子》感人肺腑"},{"type":"paragraph","text":"本报北京６月２日讯  记者蒋耀强报道：潇湘电影制片厂新近拍成的向中国共产党成立７０周年献礼的影片——《毛泽东和他的儿子》，日前在京试映，深受各界好评。电影界人士称，这是揭示伟人内心感情世界的佳作，不少干部、学生和市民被影片深深感动。"},{"type":"paragraph","text":"影片围绕着毛岸英在朝鲜战场上英勇牺牲这一事件，再现了毛泽东、周恩来、彭德怀等老一辈无产阶级革命家的光辉形象和博大襟怀，以及他们巨大的人格力量。影片突出一个“情”字，父子情、父女情、夫妻情、战友情以及党和人民群众的鱼水之情，让观众从一个全新的视角去认识伟人毛泽东。不少观众激动地说，毛泽东主席真伟大，他在悲痛面前比普通人更理智、更坚强。影片将在“七一”前与全国广大观众见面。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cd8731c964"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
