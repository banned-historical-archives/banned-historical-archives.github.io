script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"认真学习毛主席著作　加强领导班子的团结","authors":[],"dates":[{"year":1971,"month":7,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"认真学习毛主席著作　加强领导班子的团结"},{"type":"paragraph","text":"高淳县委领导成员不断提高执行毛主席革命路线的自觉性"},{"type":"paragraph","text":"据新华社南京五日电　中共江苏省高淳县委领导成员，发扬理论联系实际的革命学风，带着如何加强领导班子团结的问题，认真学习毛主席著作，巩固和加强了“一班人”的团结，提高了贯彻执行毛主席革命路线的自觉性。"},{"type":"paragraph","text":"高淳县委领导成员认识到，搞好革命团结，是无产阶级革命事业取得胜利的基本保证，是巩固和加强无产阶级专政的需要。只有搞好领导班子的团结，才能实现全县人民的团结；只有实现全县人民的团结，才能胜利完成“九大”提出的各项战斗任务。因此，他们把搞好“一班人”的团结作为加强党的思想建设和政权建设，带领全县人民搞好三大革命斗争的关键问题来抓。"},{"type":"paragraph","text":"为了达到“一班人”的革命团结，高淳县委经常组织“一班人”带着各自思想上影响团结的问题，活学活用毛主席著作，自觉地作“内部团结统一的模范”。县委有一个常委，工作中取得了一些成绩。在赞扬声中，他滋长了骄傲自满情绪，看自己的长处多了，虚心听取别人的意见少了，在领导班子研究问题时，有时不等人家把话讲完就顶了回去，影响了领导班子的团结。他带着这个问题，重温了毛主席关于“我们决不能一见成绩就自满自足起来”和“力戒骄傲。这对领导者是一个原则问题，也是保持团结的一个重要条件”的教导，认识到骄傲自满是继续革命的障碍，是影响革命团结的大敌。他主动地在领导班子内部查骄斗骄，请同志们批评帮助；到群众中去亮私批骄，接受群众的监督，横扫了骄气，维护了团结。他深有体会地说：“要继续革命必须加强团结，要搞好团结必须反骄破满。”经过这样的努力，这个县委的“班长”与委员、新干部与老干部之间，都能注意互相学习，互相支持，互相尊重，互相谅解，心往一处想，劲往一处使，争挑革命重担，为巩固无产阶级专政而同心协力，团结战斗。"},{"type":"paragraph","text":"高淳县委在实践中还认识到，“党内不同思想的对立和斗争是经常发生的”。在领导班子内部，对某些问题有不同意见，这是正常现象，关键在于善于解决矛盾，求得在毛泽东思想基础上的团结和统一。高淳县领导班子成员，反复学习了毛主席关于“人的正确思想，只能从社会实践中来，只能从社会的生产斗争、阶级斗争和科学实验这三项实践中来”的教导，坚持辩证唯物论的认识论，在革命实践中活学活用毛主席著作，统一思想，统一行动。"},{"type":"paragraph","text":"去冬，在讨论制订一九七一年农业生产规划时，县领导班子成员在双季稻计划面积上发生了意见分歧。有的同志认为，双季稻面积搞多了，在劳力、肥料、水利等方面都有一些困难，因而主张在原有的基础上，适当增加一点就行了。有的同志则主张要大幅度地扩大双季稻面积，认为这符合群众需要和客观可能。两种意见，一时得不到统一。在这种情况下，县的领导没有马上做出决定，强求统一，而是组织大家认真学习毛主席关于“没有调查就没有发言权”和“一切结论产生于调查情况的末尾，而不是在它的先头”的教导，使大家认识到实践是检验人的认识是否正确的唯一标准。他们带着这个问题，分头深入到不同类型的社队作实际调查，取得了大量的第一手材料。后来，根据圩区、山区和半山半圩地区的不同条件，县领导分别提出扩种双季稻的不同要求，使今年的农业生产规划既积极，又可靠；既体现冲天的革命干劲，又符合实事求是的科学精神。"},{"type":"paragraph","text":"此后，高淳县领导班子成员坚持做到：遇到问题摆到桌面上来，各抒己见，畅所欲言；在情况不明时，不轻易作结论，而是深入实际，调查研究，取得共同的认识；在作出决定后，继续接受实践的检验，及时地修改那些不完全符合客观实际的计划和方案，使党委的决定更加符合客观外界的规律性，使“一班人”的思想行动在毛主席的革命路线上统一起来。"},{"type":"paragraph","text":"“有无认真的自我批评，也是我们和其他政党互相区别的显著的标志之一。”高淳县委为了加强“一班人”的团结，反复学习毛主席的这一教导，经常采用整风、讲用会、个别谈心等方式，认真进行批评和自我批评。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a0136a2ae6"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
