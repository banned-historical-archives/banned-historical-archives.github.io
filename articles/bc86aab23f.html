国剥削者从智利赶出去！”","authors":[],"dates":[{"year":1970,"month":12,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"阿连德总统在集会上宣布签署宪法修改草案"},{"type":"paragraph","text":"规定将美资铜矿实行国有化"},{"type":"paragraph","text":"群众高呼“把美国剥削者从智利赶出去！”"},{"type":"paragraph","text":"据新华社二十三日讯  圣地亚哥消息：智利首都圣地亚哥近二万人在二十一日举行群众集会，萨尔瓦多·阿连德总统在这次集会上宣布他签署了宪法修改草案。这项草案规定将目前掌握在美国安那康达、肯奈柯特和塞罗等公司手里的铜矿实行国有化。"},{"type":"paragraph","text":"阿连德总统在集会上说：“我们正在正常的合法的法律途径中采取行动”。他还揭露说，从一九三○年到一九六九年，在智利开采铜的美国财团已从智利攫取了三十七亿美元，这相当于智利现在所拥有的全部资财的百分之四十。他说，在这同一期间，在智利经营铜、铁、硝石、电话、电力、贸易和服务事业的财团，其中绝大部分是美国的财团，它们从智利攫取了九十六亿美元，这“大大超过智利资财的总值，也就是说，它们攫取了比整整一个智利还要多的东西”。阿连德总统宣布说，他把这个宪法修改草案送交议会通过，以便实行铜矿国有化，“来保障智利的主权，证明智利的独立是不能讲价钱的，是不屈从任何压力和任何威胁的”。"},{"type":"paragraph","text":"这项草案经智利议会通过后生效。这项草案规定，智利将对被实行国有化的美国铜矿公司给予赔偿费，在三十年内付清。"},{"type":"paragraph","text":"在这次集会上，群众对阿连德总统宣布签署的法令表示支持，并且不断高呼：“把美国剥削者从智利赶出去！”“我们支持各国人民反对帝国主义的斗争！”“越南人民反对美国侵略的斗争万岁！”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bc86aab23f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
