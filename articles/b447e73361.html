rt":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"要闻简报","authors":[],"parts":[{"type":"paragraph","text":"邓小平会见日中友协全国本部代表团"},{"type":"paragraph","text":"中共中央副主席邓小平5月3日上午会见了由会长宇都宫德马率领的日本日中友好协会全国本部代表团。"},{"type":"paragraph","text":"邓小平同日本朋友亲切友好地交谈了有关中国经济情况和当前国际形势中的一些问题。"},{"type":"paragraph","text":"邓小平对宇都宫德马等日本朋友长期为日中友好所作的重大贡献表示感谢。（据新华社）"},{"type":"paragraph","text":"赵紫阳会见奥库克一行"},{"type":"paragraph","text":"国务院总理赵紫阳5月3日下午会见巴布亚新几内亚副总理艾姆巴基·帕尔马·奥库克一行时说，我们两国在许多重大国际问题上的观点是一致的。"},{"type":"paragraph","text":"他赞扬巴布亚新几内亚对外奉行的维护民族独立、主权，反对外来干涉，加强南太平洋国家合作的政策。赵紫阳说，巴布亚新几内亚反对苏联霸权主义对阿富汗的侵略，反对越南地区霸权主义对柬埔寨的侵占，主张苏、越从阿、柬撤军的立场鲜明。对此，我们表示赞赏。"},{"type":"paragraph","text":"赵紫阳希望中、巴新两国领导人经常保持接触，加强相互了解和友谊。（据新华社）"},{"type":"paragraph","text":"赵紫阳会见哥伦比亚众议院代表团"},{"type":"paragraph","text":"国务院总理赵紫阳5月2日下午会见了由众议员穆尼奥斯率领的哥伦比亚众议院代表团。"},{"type":"paragraph","text":"赵紫阳说，中哥两国都是第三世界国家。我们对哥伦比亚朋友感到亲切。我们两国在国际问题上有许多共同点，在反对全球霸权主义和地区霸权主义的立场上有着共同语言。他说，我们两国的来往越来越多。这对增进彼此了解，促进两国人民的友谊，发展两国友好关系是很有意义的。（据新华社）"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"赵紫阳","type":"人物"},{"name":"世界形势","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b447e73361"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
