ical-archives/banned-historical-archives0/main/maoquanji45.pdf"],"article":{"title":"在保荐责任田办法的来信上的批语","alias":"","parts":[{"type":"paragraph","text":"在保荐责任田办法的来信”上的批语"},{"type":"paragraph","text":"（1962年8月2日）印发各同志"},{"type":"paragraph","text":"[1]指钱让能关于保荐责任田办法给毛泽东的信。信中说，根据太湖县一年多来实行责任田的结果，我认为“责任田”的办法是农民的一个创举，是适应农村当前生产力发展的必然趋势，是六十条和以生产队为基本核算单位的重要补充。不过，它与省常委1962年2月20日关于改正“责任田”办法的决议，是相违背的。我想保荐它，是因为有了它，农业生产就如鱼得水。太湖是一个三类县，1958年至1960年期间，生产力遭到了巨大破坏，人民群众奄奄一息。1961年3月，这里90%以上的地区推行了责任田，形势发生了根本转折。过去的荒、逃、饿、病、死，一瞬而基本变成了熟（荒地变熟地）、回（外流回归了）、饱（人民基本吃饱了，有的地方吃得较好而有余）、健（体质健康了，生病的少了）、生（妇女怀孕了）。太湖一个最差的大队桥西大队的农业生产，1961年与1960年比较，粮食增长了81%，油料增长了6.5倍；棉花增加了10倍，生猪、家禽也是几倍的增长。农民群众的生产热情是我10多年来（除土改外）第一次见闻。责任由的具体办法是，定产到田，责任到人。它是社会主义集体经济的一种管理方法，不是搞单干，不是发展资本主义，它并没有改变生产资料所有制，分配仍是按劳取酬，集体劳动方式也没有改变。它能提高农民的劳动积极性，受到了大多数农民的欢迎。据我们调查摸底，拥护责任田的农民起码占80%以上，甚至于占90%以上。"},{"type":"paragraph","text":"[2]毛泽东的批语连同钱让能的信，作为中央工作会议文件印发给参加会议的同志。毛泽东全集第四十五卷"},{"type":"paragraph","text":"安徽太湖县县委宣传部钱让能同志给我的一封信。请大家研究"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"八月二日1962年，毛泽东和家乡亲属在一起。"}],"authors":["毛泽东"],"dates":[{"year":1962,"month":8,"day":2}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":183,"page_end":184},"tags":[{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"230926995c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
