rt":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"在部队职工、家属和子女中深入进行彻底否定“文化大革命”教育","authors":[],"parts":[{"type":"paragraph","text":"按照中央军委的指示，全军正在进行的彻底否定“文化大革命”的教育，已经取得明显成果。集中一段时间，在部队职工、家属和子女中深入进行这一教育，同样必要。“文化大革命”的流毒甚广，部队的职工、家属和子女，不论参加过或者没有参加过，都不可能不受到影响。通过教育进一步把思想统一到党的十一届六中全会的《决议》上来，这不仅有利于他们思想觉悟的提高，而且对部队的团结和建设也会有积极的作用。为此，提出以下要求。"},{"type":"paragraph","text":"一、教育的内容，大致应和部队一样。要讲求实效，不搞形式主义，不搞一刀切。"},{"type":"paragraph","text":"二、教育的方法主要是宣讲。用通俗的道理，典型的事例，把要澄清的主要问题讲清楚。领导同志要亲自讲自己的体会，也可请人作必要的理论辅导。干部要帮助自己的家属、子女进行学习。"},{"type":"paragraph","text":"三、坚持疏导的方针，着重提高认识，启发自觉。要注意政策，不翻老账和纠缠细节。学习中要联系实际谈个人的体会，但不要求个人作检查。家属中在“文化大革命”中有隔阂的要互相谈心，疏通感情，增进团结。"},{"type":"paragraph","text":"各级党委和政治机关要加强具体指导，同时注意发挥企事业单位党团组织、工会、机关的家属委员会，以及离退休干部的作用，务必把教育搞得深入细致，扎扎实实。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"891070b17a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
