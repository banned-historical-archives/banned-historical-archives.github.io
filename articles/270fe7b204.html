rs":["邓小平"],"dates":[{"year":1974,"month":10,"day":10}],"is_range_date":false,"parts":[{"text":"邓小平会见民主也门卫生代表团时的讲话","type":"title"},{"text":"邓小平","type":"authors"},{"text":"赤脚医生是我们正在试验的制度。","type":"paragraph"},{"text":"赤脚医生总比没有医生好哇。赤脚医生刚开始知识少，只能医疗一些常见病，过几年就穿起草鞋了，就是知识增多了，再过几年就穿起布鞋了。","type":"paragraph"},{"text":"公社人口比较多一些，可能在一万人左右。过去一个农业合作社几百人，千把人，叫做高级社。人多一点可以办个体农民和小合作社不能办的事。……总的说来，这是个新事物，还是在试验阶段。","type":"paragraph"},{"text":"你们只看上海工展是会上当的，还有个假象。我们的钢只有两千三百万吨。不拿美国比，就拿法国比，英国比，他们都三千多万吨钢。他们只有六千多万人口。我们现在八亿人口，两千几百万吨钢。如果达到法国、英国的水平，应该有三亿吨钢。如果拿美国比，要有五亿吨钢。从这个角度认识中国比较正确。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"270fe7b204"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
