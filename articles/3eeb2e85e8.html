城镇的广大工人、学生、进驻小学及中学的工人和　解放军毛泽东思想宣传队的队员、革命干部、教员以及街道居民，踊跃发表意见和提供经验","authors":[],"dates":[{"year":1968,"month":12,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京二日电　《人民日报》今天以第一版整版篇幅，发表了北京、上海、天津等城市的读者就城市的小学及中学应当如何办所提出的一部分建议，并发表了编者按。《人民日报》编者按全文如下:"},{"type":"paragraph","text":"自本报开展关于把所有公办小学下放到大队来办的讨论后，引起了城乡广大革命群众的普遍注意和极其热烈的反应。到十一月三十日为止，来稿来信已达七千多件。"},{"type":"paragraph","text":"现在，许多来信已经提到城市的小学及中学是否可以归工厂来办或者由街道联合起来办。看来，城市的小学及中学如何办的问题，已经提到日程上来。本报准备就这方面的问题继续展开讨论。这里发表的是北京、上海、天津等城市的读者提出的一部分建议。希望城镇的广大工人、学生、进驻小学及中学的工人和解放军毛泽东思想宣传队的队员、革命干部、教员以及街道居民，踊跃发表意见和提供经验。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"天津文革","type":"人物"},{"name":"上海文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3eeb2e85e8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
