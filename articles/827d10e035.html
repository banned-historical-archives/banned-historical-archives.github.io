ical-archives/banned-historical-archives0/main/maoquanji50.pdf"],"article":{"title":"在康生转送陈垣来信的报告上的批语","alias":"","parts":[{"type":"paragraph","text":"在康生转送陈垣来信的"},{"type":"paragraph","text":"报告上的批语\""},{"type":"paragraph","text":"（1970年1月）同意。要争取这样的知识分子。"},{"type":"paragraph","text":"[1]中共中央政治局常委康生1970年1月25日将北京师范大学原校长陈垣的一封来信转报毛泽东时写道，陈垣原来的秘书和服务员在“文化大革命”中回校参加运动，陈的生活无人照顾，经与学校商量，已将陈的秘书和服务员派回陈处，故陈来信感谢党中央对他的关怀。陈要将他的书籍及4万元稿费献给党。我们在政治局会议上交换了意见，觉得可写一信对他的这种精神加以鼓励，但向他解释，目前北京图书馆正在进行斗、批、改，他的书籍文献暂由他自己保管为好。关于他的稿费，拟说服他自己保留，以照顾他的生活。毛泽东阅后，写了这个批语。"}],"authors":["毛泽东"],"dates":[{"year":1970,"month":1}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":513,"page_end":513},"tags":[{"name":"康生","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"827d10e035"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
