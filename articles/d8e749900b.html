tart":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"《胡乔木回忆毛泽东》《胡乔木文集》第三卷出版首都理论界党史界召开座谈会","authors":[],"parts":[{"type":"paragraph","text":"据新华社北京12月23日电（人民日报记者陈维伟、新华社记者张宿堂） 在毛泽东同志诞辰101周年之际，《胡乔木回忆毛泽东》、《胡乔木文集》第三卷日前由人民出版社出版。中国社会科学院、中央文献研究室、中央党史研究室、当代中国研究所今天上午在人民大会堂召开这两部著作出版的座谈会。中共中央政治局常委朱镕基出席座谈会并讲了话。"},{"type":"paragraph","text":"座谈会由王忍之主持。宋任穷、李德生、黄华和中央有关部门负责人，首都理论界、党史界的研究人员和胡乔木同志生前好友和亲属100多人出席了座谈会。"},{"type":"paragraph","text":"李政道博士为这两本著作的出版发来电文表示祝贺，并表达了对胡乔木同志的景仰和思念。"},{"type":"paragraph","text":"胡绳、郑必坚、叶子龙、林默涵、龚育之、郑惠、石仲泉、马洪、邓力群等先后在会上发言，畅谈了阅读《胡乔木回忆毛泽东》和三卷《胡乔木文集》后的心得和感想。"},{"type":"paragraph","text":"发言的同志认为，《胡乔木回忆毛泽东》是一部系统地反映四十年代毛泽东重要的思想和活动的党史著作。这本书为我们研究毛泽东思想提供了三点重要思路：一是要注重对具体政策的研究；二是要注重对国际形势的研究；三是要注重对延安整风和确立毛泽东思想的指导地位对我们党的事业的意义的研究。历史地研究这些问题，对于我们今天正确认识邓小平同志建设有中国特色社会主义理论的特点和价值，是大有教益的。"},{"type":"paragraph","text":"《胡乔木文集》是胡乔木同志生前主持编定的三卷文集的最后一卷，其中绝大部分文章都经过他亲自选择和分类。出席座谈会的同志指出，第三卷文集同前两卷一样，都体现了胡乔木同志为党和人民事业竭智尽忠的高尚品格和辛勤劳作，体现了他孜孜追求真理的科学精神和思想成果，值得我们长久地纪念和学习。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"胡乔木","type":"人物"},{"name":"世界形势","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d8e749900b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
