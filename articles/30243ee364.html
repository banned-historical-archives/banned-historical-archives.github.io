rs":["云南大学","林绍述"],"dates":[{"year":1957,"month":6,"day":8}],"is_range_date":false,"parts":[{"text":"大字报——“看，官僚主义十大罪状”","type":"title"},{"text":"云南大学林绍述","type":"authors"},{"text":"(林绍述：云南大学历史系一年级学生，两张大字报张贴于学校“民主墙”)","type":"subtitle"},{"text":"一．“看，官僚主义十大罪状”","type":"subtitle"},{"text":"一声不响，二目无光，三餐不食，四肢无力，五官不正，","type":"paragraph"},{"text":"六亲无靠，七窍不通，八面威风，九坐无事，十分无用。","type":"paragraph"},{"text":"二．“党委书记同志，你太辛苦了！”","type":"subtitle"},{"text":"党委书记真辛苦，深更半夜忙工作，","type":"paragraph"},{"text":"肿眼皮乏无所谓，可谓鞠躬瘁。","type":"paragraph"},{"text":"为何时间飞似箭，流水会议数不完，","type":"paragraph"},{"text":"左听汇报右打转，了如指掌真会管，","type":"paragraph"},{"text":"先订计划后总结，原则指示断无绝，","type":"paragraph"},{"text":"中心工作是教学，灵活工作必须作，","type":"paragraph"},{"text":"教学质量低且劣，不遵师来不团结，","type":"paragraph"},{"text":"知识分子问题多，后进层不用说，","type":"paragraph"},{"text":"到校工作有数年，经验多少总有一点，","type":"paragraph"},{"text":"头痛会医头，脚痛会医脚，","type":"paragraph"},{"text":"党课无血无肉，保险无错误，","type":"paragraph"},{"text":"教学不管不要紧，有马列主义作资本，","type":"paragraph"},{"text":"不愁吃来不愁穿，荣华富贵万万年。","type":"paragraph"}],"comments":[],"origin":"《揭穿右派分子的丑恶面目》（内部资料　注意保存，中共云南省委整风领导小组办公室编印，1957年9月3日）","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"30243ee364"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
