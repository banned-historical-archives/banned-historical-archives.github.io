ical-archives/banned-historical-archives0/main/maoquanji31.pdf"],"article":{"title":"转发贵州军区三反运动三日简报第一号的批语","alias":"","parts":[{"type":"paragraph","text":"对总政关于西南车区三反运动"},{"type":"paragraph","text":"第三周简报的批示的批语"},{"type":"paragraph","text":"（1952年1月15日）肖华同志："},{"type":"paragraph","text":"这个指示不妥，不要发出。西南军区后勤系统清出百分之三十四的贪污分子是合乎事实的。目前的大多数机关部队的偏向是不愿或不知道认真去清查贪污分子。我对西南一月十二日的报告已另有批示。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一月十五日[1]肖华，当时任人民革命军事委员会总政治部副主任。"},{"type":"paragraph","text":"[2]指军委总政治部1952年1月14日对西南军区三反第三周简报的批示。批示指出：对于贪污行为和一般公私不分的错误行为，必须加以区分，并分别对待，不能把占公家的小便宜统统叫作贪污；简报说不少单位是百分之百的人员有大小不同的贪污行为，这样把贪污面扩大到所有人员身上，会减低反贪污斗争的严重意义，转移对真正大贪污犯的斗争火力，领导上将陷于被动，对群众也没有教育意义。"},{"type":"paragraph","text":"[3]指毛泽东1952年1月15日对西南军区党委关于三反运动情况简报的批语。"}],"authors":["毛泽东"],"dates":[{"year":1952,"month":1,"day":15}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":274,"page_end":274},"tags":[{"name":"肖华","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4312f6c58a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
