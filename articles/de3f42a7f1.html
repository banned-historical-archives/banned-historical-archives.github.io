script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"宁波市中接受批评清除散布资产阶级思想的书籍","authors":[],"dates":[{"year":1952,"month":7,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编者按:经通知宁波市立中学后，该校行政已接受冯世中同学的批评，于处理后，并来信说:“我校图书室除将该书停止借阅外，并拟仔细检阅其他含有毒素的书籍予以清除。”我们同时希望其他学校的图书馆也能注意这个问题。"},{"type":"paragraph","text":"编辑同志:我校图书馆清除了法西斯反动书籍，可是散布资产阶级思想的书籍，却没有彻底肃清。以科学书报(解放前出版，现在出借的是合订本)来说，它出借次数很多，积压时间很少超过一天，这证明在学生中间已发生很大影响。那么它是怎样一种杂志呢?就是彻头彻尾散布资产阶级思想的刊物，也可说是美国刊物的中文版。因为内容都是美国反动的东西，宜扬美国科学是世界无敌的，其中有一栏“小发明”，专门刊载“富于幻想”的作品，就是宣扬资产阶级的所谓科学生活，其中说:“……最好在照相机上方装一面镜子，能使太太小姐满意的矫正自己的姿势……”。“……在手表里装一触觉器，能随时知道时候……”。“……晚上听无线电睡着了觉，最好有一个自动关闭器……”。这些富于“幻想”的作家们，就是资产阶级的走狗。刊物内还对苏联科学发达的原因大肆歪曲。事实证明这种所谓超政治的科学刊物是极端反动的。那么为什么有这样多人去借呢?因为它迎合了部分同学残留的资产阶级思想。当然像它这样的刊物还不只一种，也不是我们一校有这样情况，所以我建议:要以高度的政治责任心，肃清这些书籍，纯洁我们的图书馆，成为真正宣传马列主义的基地，"},{"type":"paragraph","text":"宁波市立中学学生　冯世申"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"de3f42a7f1"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
