tart":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"人民战争 无往不胜","authors":["海军学习毛主席著作积极分子缪德尧"],"parts":[{"type":"paragraph","text":"我们伟大领袖毛主席给阮友寿主席的贺电，字字闪金光，句句是真理，我们最热烈欢呼毛主席的贺电，最热烈欢呼越南人民抗美救国战争的伟大胜利。"},{"type":"paragraph","text":"毛主席说：“国家不分大小，只要充分动员人民，坚决依靠人民，进行人民战争，任何强大的敌人都是可以打败的。”越南人民的抗美救国战争，创造了第二次世界大战以后一个国家单独抗击和战胜美帝国主义侵略的光辉典范。"},{"type":"paragraph","text":"越南南方人民武装，一没有飞机，二没有军舰，三没有原子弹。美帝拥有一切现代化杀人武器，它在南越战场投入了近二分之一的地面部队，动用了近五分之一的空军和四分之一以上的海军，加上帮凶军和伪军，总共一百多万。但是，美帝国主义这个庞然大物，为什么却败在越南人民手下呢？这原因不是别的，就是因为越南人民进行的是一场正义战争，是一场真正的人民战争。越南人民的胜利是毛主席人民战争思想的伟大胜利。"},{"type":"paragraph","text":"伟大领袖毛主席教导我们：“人民，只有人民，才是创造世界历史的动力。”“人民群众有无限的创造力。”美帝国主义最害怕的是人民，是广泛开展的人民战争。美帝这个最反动的国际宪兵，七年来，一直把越南南方当作它镇压人民战争的试验场，妄想从越南南方找到对付人民战争的办法。可是，现在全世界人民都看得清楚，尽管美帝国主义使出了各种各样的手段，都扑灭不了越南人民战争的烈火。"},{"type":"paragraph","text":"越南人民抗美救国战争的伟大实践，再次雄辩地证明，毛主席的人民战争的光辉思想，是被压迫民族和被压迫人民战胜美帝国主义及其走狗的最好法宝，最锐利武器。哪里的人民掌握了毛主席的人民战争思想，哪里的人民就一定能够得到解放。"}],"alias":""},"tags":[{"name":"人民战争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"35d6656d0f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
