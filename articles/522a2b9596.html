<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"“借革命以营私”者的自画像——评张春桥的反动诗《失业的人》","authors":["冼竹佐"],"dates":[{"year":1977,"month":2,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"上海师范大学中文系　冼竹佐"},{"type":"paragraph","text":"一九三四年，老投降派张春桥发表了一首题为《失业的人》的歪诗。这首歪诗实际上是作者的一张自画像。"},{"type":"paragraph","text":"《失业的人》是用母子对话的形式写成的。大意是:父亲死了，丢下一家数口没人养活。儿子出去做工没人要，世事又是兵荒马乱的，娘在家里急得直哭。儿子呢?倒是一点也不急。他先是拍着胸脯打包票:就凭我这条硬胳膊，还混不够吃的?最后，更是激昂慷慨地宣布:"},{"type":"paragraph","text":"“娘，娘，不要紧，我能找到些金银，家里不是还有枪?今天晚上就入伙:杀的杀，砍的砍，到处都是咱的饭!”"},{"type":"paragraph","text":"看，又是“拿枪”，又是“入伙”，不是在鼓动造反、宣扬革命了吗?可是，我们要问:在马列主义早已传入中国，毛主席领导的井冈山斗争已经燃成燎原之火的二十世纪三十年代，在中国共产党领导下的广大革命人民正在奋起回击国内外反动派的军事围剿和文化围剿的严峻历史时刻，一个挂着“左翼”招牌的作者，一不写民族矛盾，二不写阶级斗争，三不写无产阶级的历史任务，而是哼出这样一曲唯饭碗和金银是图的“造反经”，究竟说明了什么?这种权迷、财奴式的“造反”，不仅和无产阶级砸烂旧世界、解放全人类的彻底革命精神风马牛不相及，甚至连资产阶级民主派反帝反封建的革命性也没有。它哪里是什么劳苦大众的反抗声音，分明是一个没落阶级飘零子弟“借革命以营私”的肮脏灵魂的自白罢了。"},{"type":"paragraph","text":"正因为张春桥之流既要借“革命”满足其发迹的欲念，又要用“革命”掩盖其营私的嘴脸，于是乎，“砍”与“杀”，就成为他们伪装革命的工具，攫取金银、霸占饭碗的手段，成为他们反革命的狡诈性和疯狂性的一个突出标志。"},{"type":"paragraph","text":"你看，三十年代的张春桥，不正是靠做打手起家的吗?想当年，如果不是趋奉、奔走于王明、周扬之门，装出一副比革命还要革命的面孔，围攻鲁迅，“巧妙地格杀革命的民族的力量”，他哪来的向上爬的“革命”资本呢?"},{"type":"paragraph","text":"到了六、七十年代，张春桥的野心更大，“杀”劲也更足了。无产阶级文化大革命初期，他和林彪反党集团沆瀣一气，相互勾结，狼狈为奸，煽动资产阶级派性，挑起武斗，借着一片震耳欲聋的杀喊声，把自己吹捧成“左派”，窃取了党和国家的一部分权力。随着无产阶级文化大革命的深入和发展，“四人帮”又歪曲伟大领袖毛主席关于资产阶级“就在共产党内”的科学论断，把绝大部分的革命老干部统统打成“民主派”、“走资派”，挥舞起“从组织上动大手术”的砍刀，妄图打倒一大批中央和地方党政军负责同志，甚至叫嚣要“杀人”，妄图篡夺党和国家的最高领导权。这种欲壑难填的政治野心和疯狂毒辣的反革命杀机，不就是当年那种反革命思想和政治流氓作风不断膨胀、恶性发展的必然结果吗?"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"张春桥","type":"人物"},{"name":"派性","type":"主题/事件"},{"name":"武斗","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"522a2b9596"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
