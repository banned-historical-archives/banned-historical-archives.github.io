rt":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"旧体诗词六首","authors":["毛泽东"],"parts":[{"type":"paragraph","text":"西江月 井冈山"},{"type":"paragraph","text":"山下旌旗在望，"},{"type":"paragraph","text":"山头鼓角相闻。"},{"type":"paragraph","text":"敌军围困万千重，"},{"type":"paragraph","text":"我自岿然不动。"},{"type":"paragraph","text":"早已森严壁垒，"},{"type":"paragraph","text":"更加众志成城。"},{"type":"paragraph","text":"黄洋界上炮声隆，"},{"type":"paragraph","text":"报道敌军宵遁。"},{"type":"paragraph","text":"如梦令 元旦"},{"type":"paragraph","text":"宁化、清流、归化，"},{"type":"paragraph","text":"路隘林深苔滑。"},{"type":"paragraph","text":"今日向何方？"},{"type":"paragraph","text":"直指武夷山下。"},{"type":"paragraph","text":"山下山下，"},{"type":"paragraph","text":"风展红旗如画。"},{"type":"paragraph","text":"清平乐会昌"},{"type":"paragraph","text":"东方欲晓，"},{"type":"paragraph","text":"莫道君行早。"},{"type":"paragraph","text":"踏遍青山人未老，"},{"type":"paragraph","text":"风景这边独好。"},{"type":"paragraph","text":"会昌城外高峰，"},{"type":"paragraph","text":"颠连直接东溟。"},{"type":"paragraph","text":"战士指看南粤，"},{"type":"paragraph","text":"更加郁郁葱葱！"},{"type":"paragraph","text":"菩萨蛮大柏地"},{"type":"paragraph","text":"赤橙黄绿青蓝紫，"},{"type":"paragraph","text":"谁持彩练当空舞？"},{"type":"paragraph","text":"雨后复斜阳，"},{"type":"paragraph","text":"关山阵阵苍。"},{"type":"paragraph","text":"当年鏖战急，"},{"type":"paragraph","text":"弹洞前村壁。"},{"type":"paragraph","text":"装点此关山，"},{"type":"paragraph","text":"今朝更好看。"},{"type":"paragraph","text":"忆秦娥娄山关"},{"type":"paragraph","text":"西风烈，"},{"type":"paragraph","text":"长空雁叫霜晨月。"},{"type":"paragraph","text":"霜晨月，"},{"type":"paragraph","text":"马蹄声碎，"},{"type":"paragraph","text":"喇叭声咽。"},{"type":"paragraph","text":"雄关漫道真如铁，"},{"type":"paragraph","text":"而今迈步从头越。"},{"type":"paragraph","text":"从头越，"},{"type":"paragraph","text":"苍山如海，"},{"type":"paragraph","text":"残阳如血。"},{"type":"paragraph","text":"七律长征"},{"type":"paragraph","text":"红军不怕远征难，"},{"type":"paragraph","text":"万水千山只等闲。"},{"type":"paragraph","text":"五岭逶迤腾细浪，"},{"type":"paragraph","text":"乌蒙磅礴走泥丸。"},{"type":"paragraph","text":"金沙水拍云崖暖，"},{"type":"paragraph","text":"大渡桥横铁索寒。"},{"type":"paragraph","text":"更喜岷山千里雪，"},{"type":"paragraph","text":"三军过后尽开颜。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ef3a1d4640"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
