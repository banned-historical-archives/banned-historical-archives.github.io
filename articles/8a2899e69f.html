<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"maoquanji45","name":"毛泽东全集第45卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji45.pdf"],"article":{"title":"毛泽东等祝贺朝鲜解放十八周年的电报","alias":"","parts":[{"type":"paragraph","text":"毛泽东等祝贺朝鲜解放"},{"type":"paragraph","text":"十八周年的电报"},{"type":"paragraph","text":"（1963年8月14日）平壤朝鲜劳动党中央委员会委员长、朝鲜民主主义人民共和国内阁首相金日成同志，朝鲜民主主义人民共和国最高人民会议常任委员会委员长崔庸健同志："},{"type":"paragraph","text":"值此朝鲜解放十八周年之际，我们代表中国人民、中国共产党和中华人民共和国政府，谨向兄弟的朝鲜人民、朝鲜劳动党和朝鲜民主主义人民共和国政府，致以最热烈的祝贺。"},{"type":"paragraph","text":"朝鲜人民经过长期英勇斗争，在十八年前推翻了日本帝国主义的殖民统治，开辟了朝鲜历史上的新时代。朝鲜人民走过的道路是一条历尽艰辛和充满战斗的道路。朝鲜人民十八年的历史，是粉碎帝国主义的武装侵犯和挑畔、胜利进行社会主义革命和社会主义建设的光荣历史。"},{"type":"paragraph","text":"朝鲜人民在以金日成同志为首的朝鲜劳动党的正确领导下，以不屈不挠的革命气概，克服重重困难，迅速把自己国家建设成为具有自主经济基础的社会主义工农业国家。今天，朝鲜人民继续高举朝鲜劳动党建设社会主义总路线一一千里马运动的旗帜，坚定不移地执行自力更生为主的方针，满怀信心，为攀登社会主义建设的新毛泽东全集第四十五卷高峰，奋勇前进。中国人民衷心祝贺兄弟的朝鲜人民在前进道路上取得更加辉煌的成就。"},{"type":"paragraph","text":"朝鲜民主主义人民共和国政府，一贯奉行和平外交政策，坚决反对美帝国主义的侵略政策和战争政策，积极支持一切被压迫人民和被压迫民族的革命斗争，为保卫亚洲和世界和平，为促进人类进步事业，作出了重大的贡献。朝鲜人民为反对美军占领南朝鲜、争取祖国的和平统一进行着坚持不懈的斗争。中国政府和中国人民坚决支持朝鲜人民这一正义斗争，并且坚信，最后胜利一定属于朝鲜人民。"},{"type":"paragraph","text":"今年六月崔庸健同志对我国的友好访问，标志着中朝两国人民战斗友谊的进一步巩固和发展。中朝两国领导人所发表的具有历史意义的联合声明，鼓舞着我们两国人民建设社会主义、反对帝国主义和反对现代修正主义的斗争，鼓舞着全世界人民的革命斗争。中国人民决心同朝鲜人民更加紧密地团结在一起，高举马克思列宁主义和无产阶级国际主义的旗帜，为维护和加强社会主义阵营和国际共产主义运动的团结，为反对帝国主义，保卫世界和平，争取民族解放、人民民主和社会主义事业的更大胜利而共同奋斗。"},{"type":"paragraph","text":"祝中朝两国人民的战斗友谊和伟大团结方古长青。"},{"type":"paragraph","text":"中国共产党中央委员会主席毛泽东中华人民共和国主席刘少奇中华人民共和国全国人民代表大会常务委员会委员长朱德中华人民共和国国务院总理周恩来"},{"type":"paragraph","text":"一九六三年八月十四日"}],"authors":["毛泽东"],"dates":[{"year":1963,"month":8,"day":14}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":512,"page_end":513},"tags":[{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8a2899e69f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
