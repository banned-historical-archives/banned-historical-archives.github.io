ticle":{"title":"在部队工作期间患有关节炎或胃病，转入企业后旧病复发，能否按因工待遇处理的问题","dates":[{"year":1965}],"is_range_date":false,"authors":["全国总工会"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"铁道部政治部审干办公室, 审干工作政策选编(三), 261","tags":[{"name":"军人","type":"主题/事件"},{"name":"伤亡伤残","type":"主题/事件"},{"name":"转业","type":"主题/事件"}],"parts":[{"type":"title","text":"在部队工作期间患有关节炎或胃病，转入企业后旧病复发，能否按因工待遇处理的问题"},{"type":"paragraph","text":"我部开始解答这个问题时，主要是为了照顾那些在战场上不畏艰难英勇作战，或者由于在艰苦环境中行军作战所致的关节炎或严重胃病的指战员，在转业时持有健康材料或提出有关方面足够证明材料的，在旧病复发时，才可做个别问题按因工待遇处理。决不能把凡在部队工作过患有关节炎或胃病的人都按因工处理（我部一九六四年编印的问题解答中对这一点讲的不够清楚）。今后对这一条的执行应从严掌握。"},{"type":"paragraph","text":"（全总（65）险字第593号）"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3bc196bd62"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
