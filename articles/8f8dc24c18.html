" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji36","name":"毛泽东全集第36卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji36.pdf"],"article":{"title":"在听取汇报工作时的指示","alias":"","parts":[{"type":"paragraph","text":"在听取汇报工作时的指示"},{"type":"paragraph","text":"（1956年3月6日）"},{"type":"paragraph","text":"改进或扩充生产设备，应用国家基本建设投资解决，不应使用企业奖励联金。"},{"type":"paragraph","text":"中国工人运动还是从长辛店铁路工厂开始的，当时张国焘在长辛店工厂办了一个工人夜校，是一个无政府主义者名叫李实的当校长，我还到那里参观过一次。"},{"type":"paragraph","text":"（当汇报到不少十部满足于现有成绩，缺之从发展上看问题，满足于数字上完成任务，缺乏对国民经济发展及周围情况的认真研究，因而思想工作、组织工作、技术政策、干部培养都落后于发展希望时）"},{"type":"paragraph","text":"你会不会打麻将？打麻将要看三家的牌，还要看桌上已经打出来了什么牌之后，才决定自已打什么牌。"},{"type":"paragraph","text":"口口人多，家底大，成绩也不小，容易骄傲，应该注意这一方面。"},{"type":"paragraph","text":"一九五三年反对急躁冒进，中央提出了反对主观主义，同时还提出反对分散主义。反分散主义有好处无坏处，反主观主义的好处是深入地研究了各部门的工作。过去革命经过多少年，到延安之后，才找到既不是陈独秀的右倾，也不是后来的“左”倾，而是不“左”不右之“倾”。那是花了很天的代价才找到的。苏区只剩下一"},{"type":"paragraph","text":"在听取汇报工作时的指示个根据地，白区几乎全搞光了。在延安，我们还找到对党外关系的正确态度，既不是一律团结，也不是一律斗争，既不是只“团”无“斗”，也不是只“斗”无“团”。对于党内的关系不再是“无情的残酷的斗争”。这是反从前的主观主义。我们想，搞建设是否主观主义会缩短一些。自从一九五三年反主观主义之后，一九五三年到一九五五年，我们对现实的认识进了一步，但是带来了一个右倾。当然你们是采取原谅的态度，你们说中央的领导是英明的，你们自己犯了错误。所以必须要在去年提出反对右倾的口号，先从农业开始，以后又在私营工商业改造方面也反对右倾。共产党要反过来反过去，多反复几次就要好些。"},{"type":"paragraph","text":"（当汇报确定部长、副部长每年至少下现场两次，每次一个月左右的时间时）"},{"type":"paragraph","text":"对，我们这样的人就是要常到现场去。你们自己要办学校！"}],"authors":["毛泽东"],"dates":[{"year":1956,"month":3,"day":6}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":245,"page_end":246},"tags":[{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8f8dc24c18"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
