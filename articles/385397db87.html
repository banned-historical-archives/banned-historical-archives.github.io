ubusercontent.com/banned-historical-archives/banned-historical-archives2/main/e487fb9e-647d-4d48-ba9d-908ccd014457.pdf"],"article":{"title":"老爷爷","alias":"","parts":[{"type":"paragraph","text":"还是队长模透老人的心，老爷爷"},{"type":"paragraph","text":"危就：“我答应你老去造林，闻捷"},{"type":"paragraph","text":"还想跟你学学植树的本镇，"},{"type":"paragraph","text":"可惜你耳杂太聋数不成...“老爷爷，野外住帐榭"},{"type":"paragraph","text":"老人梦下腰来哈笑—村口上鼓关哄哄，"},{"type":"paragraph","text":"怕给你老惹下一身病。"},{"type":"paragraph","text":"“只怪你们方才说的不合我的心"},{"type":"paragraph","text":"“年轻人，你说我不行？植树的大军马上就要出征，"},{"type":"paragraph","text":"这次我要把多年的植树经验，他们要到古长城外，"},{"type":"paragraph","text":"咱们长城外面比本.·"},{"type":"paragraph","text":"原原本本传投给你..营造一座缘色的长城。"},{"type":"paragraph","text":"人们一再地劝慰老人，"},{"type":"paragraph","text":"队长忍住笑发出口，"},{"type":"paragraph","text":"他一个劲接着脑袋是听不清，在长长的队伍末尾，"},{"type":"paragraph","text":"人们也忍住笑向北提进，"},{"type":"paragraph","text":"老人挺起胸照迈大步，站着一位满头自发的老人，"},{"type":"paragraph","text":"老人的耳杂原来井不聋，"},{"type":"paragraph","text":"为什么今天你就西来他就东？人们劝慰他留在村里，"},{"type":"paragraph","text":"白头发下是--股吉。他侧着耳浆、临着眼晴····"},{"type":"paragraph","text":"鉄匠(木刻)“老爷爷，你老留下吧！响门村星村界需要人照宜。“年轻人，别替我操心，"},{"type":"paragraph","text":"孝轮二一线我领教过长城内外的大风。“老各爷，你老没听算，他就恩应村子同样电光荣。“年轻人，就话没分寸，我满嘴贸牙怎么会牙落。“老爷爷，沙大路难走，你老不是常常喊叫筋骨疼？”"},{"type":"paragraph","text":"蒋正鸿“年轻人，这还用你问，"},{"type":"paragraph","text":"我响宜咱毛主席的大跃进！"},{"type":"paragraph","text":"第3期T."}],"authors":["闻捷"],"dates":[{"year":1959,"month":2}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":43,"page_end":43},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"385397db87"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
