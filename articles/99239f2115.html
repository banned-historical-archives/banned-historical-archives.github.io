{"year":1953,"month":8,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"瑞典资产阶级报纸"},{"type":"paragraph","text":"不满美国外交政策"},{"type":"paragraph","text":"【新华社三日讯】塔斯社斯德哥尔摩二日讯：瑞典许多资产阶级报纸对于不但不能缓和、反而加剧国际紧张局势的美国目前外交政策深表不安。例如，瑞典报纸纷纷抨击杜勒斯就美国关于即将举行的政治会议的态度所发表的谈话。"},{"type":"paragraph","text":"资产阶级报纸“快报”说：“最令人惊奇的事情是，杜勒斯竟然预先宣布了他所代表的国家在即将举行的政治会议上将采取极端态度，这种态度将使与对方进行的一切谈判变得极其复杂。“这真正破坏了邱吉尔的计划。无怪乎英国的舆论表示震惊和愤怒……”"},{"type":"paragraph","text":"社会民主党报纸“劳动报”指出，美国外交政策的领导人越来越依靠世界上最反动的分子。该报说：“纳粹德国失败后，人们显然可以看出，美国的金融集团如何迅速地和以前支持希特勒的西德资本主义集团重新建立起联系。克虏伯的重起可以说是这种趋势的明证之一。目前美国政策中关于重新武装西德的许多方面可以说是有势力的美国工业集团影响美国外交政策的结果。有消息说美国共和党内的反动分子在和欧洲疯狂的反民主势力建立联系。参看上面所说看来，这个消息是意味深长的。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"99239f2115"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
