thors":[],"dates":[{"year":1963,"month":7,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京29日电】　越南民主共和国驻我国大使陈子平今晚举行宴会，答谢在中国举行支持越南南方人民斗争周和招待越南南方民族解放阵线代表阮氏萍和马氏珠。"},{"type":"paragraph","text":"应邀出席宴会的各方面负责人有刘宁一、邓颖超、杨秀峰、李德全、楚图南、朱学范、吴德峰、姬鹏飞、王照华、张寅安、胡耐秋等。"},{"type":"paragraph","text":"陈子平大使在讲话中强调，越中两国人民在反对帝国主义的斗争中将永远站在一起。他说，面对着目前的形势，越中两国人民不但要反对帝国主义，也要反对现代修正主义。"},{"type":"paragraph","text":"中国人民保卫世界和平委员会副主席刘宁一在讲话中重申，六亿五千万中国人民始终不渝地坚决支持越南南方人民的斗争。不管在风里雨里，中国人民都将同越南人民手携手地进行反对帝国主义和现代修正主义的斗争，直到最后胜利。"},{"type":"paragraph","text":"全国妇联副主席邓颖超在祝酒时表示确信，越南南方人民一定能够把美帝国主义赶出南越，实现祖国的和平和统一。"},{"type":"paragraph","text":"越南南方民族解放阵线代表阮氏萍在祝酒时说，越南南方人民决心在斗争中取得胜利，以保卫本民族的生存，并对全世界人民的革命斗争作出贡献。"},{"type":"paragraph","text":"席间，宾主进行了亲切友好的谈话，并频频为中国人民同越南北方和南方人民之间的牢不可破的战斗友谊不断发展，为越南南方人民反对美帝国主义和吴庭艳集团的斗争取得新的更大的胜利而干杯。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"刘宁一","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d26df5607f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
