报","authors":[],"dates":[{"year":1949,"month":12}],"is_range_date":false,"parts":[{"text":"华北局关于濬县冠县秋征中发生请愿事件的通报","type":"title"},{"text":"据平原省委报告，濬县四、六区共二十余村，于十一月十五日发生请愿事件，历时一周，请愿人数少则十数，多则一、二百。冠县六区十二月四日至六日亦有三十村，两千五百余人请愿。发生原因，除部分地区因有灾情、负担确重外，下列数点实为引起请愿事件之重要原因：","type":"paragraph"},{"text":"（一）上述地区多为新区或恢复区，党的工作较差，这次布置秋征，既未开各界人民代表会议，认真讨论动员，宣传政策又十分不够，加以干部强迫命令作风严重，如对群众说：“派多少拿多少，一斤半两也不能短欠”。不是说服教育态度，而采取威逼办法。","type":"paragraph"},{"text":"（二）新区村干部多系留用伪保长，组织不纯，受地富操纵，不是根据党和政府的征收政策向群众说服，而是曲解政策，蒙蔽群众，如在区上开会回村说：“无论何人，每亩负担二十多斤，少一点也不行”。致惹起群众反感。","type":"paragraph"},{"text":"（三）灾情较重地区，分配时既欠公允，而减征时亦未分别轻重合理调整，形成严重的畸轻畸重现象，如冠县、唐邑边缘村同样土质和产量，冠县刘八寨地粮在每亩二十一斤，唐邑七星屯却只十斤。这样，使得某些村，某些户自然加重。如能深入调查研究，作正确的分配，在全县范围讲，就不致显得很重。","type":"paragraph"},{"text":"（四）由于上述缺点与错误，自然引起群众不满，在新区群众觉悟不高的情况下，已可能引起纠纷，又加有某些坏分子乘机捣乱。","type":"paragraph"},{"text":"请愿事件发生，妨碍了秋征任务的顺利进行，损害了党和政府在群众中的威信。望各地从中吸取教训，即秋征中，必须召开各界代表会议认真讨论征收政策，并教育干部在工作中一定要依靠群众，走群众路线，广泛教育群众，以推动征收工作顺利完成。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]},{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"华北局关于濬县冠县秋征中发生请愿事件的通报","authors":[],"dates":[{"year":1949,"month":12}],"is_range_date":false,"parts":[{"text":"华北局关于濬县冠县秋征中发生请愿事件的通报","type":"title"},{"text":"据平原省委报告，濬县四、六区共二十余村，于十一月十五日发生请愿事件，历时一周，请愿人数少则十数，多则一、二百。冠县六区十二月四日至六日亦有三十村，两千五百余人请愿。发生原因，除部分地区因有灾情、负担确重外，下列数点实为引起请愿事件之重要原因：","type":"paragraph"},{"text":"（一）上述地区多为新区或恢复区，党的工作较差，这次布置秋征，既未开各界人民代表会议，认真讨论动员，宣传政策又十分不够，加以干部强迫命令作风严重，如对群众说：“派多少拿多少，一斤半两也不能短欠”。不是说服教育态度，而采取威逼办法。","type":"paragraph"},{"text":"（二）新区村干部多系留用伪保长，组织不纯，受地富操纵，不是根据党和政府的征收政策向群众说服，而是曲解政策，蒙蔽群众，如在区上开会回村说：“无论何人，每亩负担二十多斤，少一点也不行”。致惹起群众反感。","type":"paragraph"},{"text":"（三）灾情较重地区，分配时既欠公允，而减征时亦未分别轻重合理调整，形成严重的畸轻畸重现象，如冠县、唐邑边缘村同样土质和产量，冠县刘八寨地粮在每亩二十一斤，唐邑七星屯却只十斤。这样，使得某些村，某些户自然加重。如能深入调查研究，作正确的分配，在全县范围讲，就不致显得很重。","type":"paragraph"},{"text":"（四）由于上述缺点与错误
