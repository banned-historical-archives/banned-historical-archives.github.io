,"authors":[],"dates":[{"year":1965,"month":12,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"澳《先锋报》揭露修正主义在越南问题上扮演的角色"},{"type":"paragraph","text":"苏联领导“反美”谈话是欺骗世界人民"},{"type":"paragraph","text":"新华社墨尔本十六日电　澳大利亚《先锋报》十六日在一篇文章中说，在即将结束的这一年里，美帝国主义遭到了巨大的军事和政治失败，他们日益陷入极端孤立的境地。"},{"type":"paragraph","text":"“因此，新的一年将给世界人民带来巨大的希望。他们可以确信，他们在同人类的敌人美帝国主义进行的斗争中将赢得更大的胜利。”"},{"type":"paragraph","text":"《先锋报》在谈到美帝国主义在越南的军事失败时指出，越南人民和他们的解放军力量日益壮大，美帝国主义的根本弱点是清楚可见的。"},{"type":"paragraph","text":"《先锋报》说：“武器不能决定战争。人才是决定性的因素。一个士兵士气低落，也就是不知为何而战，不论他的装备怎样精良，也打不过武器虽差、但在自己的国土上为了本国人民的自由而对残酷无情的侵略者作战的士兵。”"},{"type":"paragraph","text":"《先锋报》还说：美帝国主义的失败是注定了的，因为它不仅在军事上还要吃败仗，而且全世界反对美帝国主义的斗争正在迅速加强。这包括美国国内的反抗力量。"},{"type":"paragraph","text":"《先锋报》在回顾澳大利亚人民反美斗争的发展时说：“示威的规模越来越大。单单在这一个星期里，悉尼一地就有两千多人示威反对越南战争。”"},{"type":"paragraph","text":"《先锋报》指出，在所有这些汹涌澎湃的斗争中，现代修正主义者在扮演的角色却越来越明显。人民在进行反对美帝国主义的斗争，但是修正主义者却在叫嚷“我们要和平共处！”“让我们谈判！”“我们能够通过合作取得胜利！”等等从阶级合作政策中找出来的所有破烂货。"},{"type":"paragraph","text":"在谈到最近苏联部长会议主席柯西金对（美国）记者赖斯顿表示苏联是反对美帝国主义的时候，《先锋报》说，“苏联修正主义者很狡猾……他们必须装模作样，表白自己的反美立场。他们这样作是为了欺骗世界人民。”"},{"type":"paragraph","text":"报纸说，所有澳大利亚人将越来越迫切地要求：不准派军队到越南去！所有的澳大利亚人都回来！美国佬滚出去！"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"越南战争","type":"主题/事件"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"78c259b9ed"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
