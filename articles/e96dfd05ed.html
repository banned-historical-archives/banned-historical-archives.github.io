ical-archives/banned-historical-archives8/main/maoquanji16.pdf"],"article":{"title":"团结对敌有计划地配合友军作战","alias":"","parts":[{"type":"paragraph","text":"团结对敌有计划地配合友军作战"},{"type":"paragraph","text":"（1941年5月14日）德怀同志："},{"type":"paragraph","text":"前电谅达。目前国民党非常恐慌，望我援助甚切。判断在日寇此次打击下，国民党不能不向我讨好，国共地位将发生根本变化，我党在抗战中将日益占据领导地位。因此，我们的基本方针是团结对敌，是配合作战，但决不为国民党激将法所冲动，而是周密考虑情况，给以有计划地配合。恩来²要求将晋东南、晋西北、五台、冀中、冀南、山东都包括在配合范围之内，我意主要配合区域应是普东南与冀南，其他作为次要配合区域（即按寻常状态作战）。请加考虑作出一具体计划告我，以便转告恩来及总顾问?。盼复。（一切战报多发西安、重庆、延安）"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"寒酉[1]德怀，即彭德怀。"},{"type":"paragraph","text":"[2]指1941年5月7日日军向晋南中条山地区国民党军卫立煌部发动的进攻。"},{"type":"paragraph","text":"[3]恩来，即周恩来。[4]总顾问，指崔可夫。1940年12月后担任苏联驻华大使馆武官和国"}],"authors":["毛泽东"],"dates":[{"year":1941,"month":5,"day":14}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":68,"page_end":68},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e96dfd05ed"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
