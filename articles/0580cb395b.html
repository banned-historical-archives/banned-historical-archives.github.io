rt":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"邓小平副主席视察海军部队他在讲话中指出，真理标准问题讨论的补课很重要，并题词勉励“建立一支强大的具有现代战斗能力的海军！”","authors":["于广新/韩来顺/胥肖野/杨玉文"],"parts":[{"type":"paragraph","text":"本报讯 邓小平副主席最近视察海军部队，在谈到真理标准问题的讨论时说：海军现在补课，这很重要。因为我们的政治路线确定搞四个现代化，不解决思想路线，政治路线靠不住，不解决这个问题就不能解放思想。"},{"type":"paragraph","text":"邓副主席在视察海军部队期间，观看了水上飞机的表演，亲切接见了参加海军党委常委扩大会议的全体同志，并作了重要讲话，还登上军舰进行了长达六个多小时的出海视察。"},{"type":"paragraph","text":"邓副主席十分关心海军建设，他在对参加海军会议的同志讲话中，反复强调要把海军搞好。在乘一○五舰航行途中，还应干部战士的请求，写下了“建立一支强大的具有现代战斗能力的海军！”的题词。"},{"type":"paragraph","text":"在视察期间，邓副主席还连续五次和海军战士一起畅游大海。第五次游泳时，海上突然起了风浪，滚滚涌浪接连袭来。战士们为了照顾邓副主席的身体，想和邓副主席顺浪往回游。可是，邓副主席毫不在意，仍然继续挥臂击水，迎风畅游，足足游了一千五百多米。当战士们看到年逾七旬的邓副主席身体这样好，都从内心里感到非常高兴。"},{"type":"paragraph","text":"（于广新、韩来顺、胥肖野、杨玉文）"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0580cb395b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
