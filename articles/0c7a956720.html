":["戚本禹","阎长贵","陈伯达"],"dates":[{"year":1967,"month":1,"day":28}],"is_range_date":false,"parts":[{"text":"中央文革对穆欣问题的几次电话指示","type":"title"},{"text":"陈伯达阎长贵戚本禹","type":"authors"},{"text":"(1967年1月28日，电话记录稿)","type":"subtitle"},{"text":"1967年1月28日O时45分","type":"subtitle"},{"text":"中央文革小组办公室韩树信给清华赵雪林同学的电话：","type":"paragraph"},{"text":"伯达同志的电话记录不要印，未经审查即发，伯达同志不同意。","type":"paragraph"},{"text":"穆欣的问题，可以揭发、批判。","type":"paragraph"},{"text":"1967年1月28日4时多","type":"subtitle"},{"text":"阎长贵同志电话，由罗杰接","type":"paragraph"},{"text":"伯达同志口授：这个讲话不要发，不管是否属实，都不要发。谁发谁负责。伯达同志打电话，是和来电话的同志交换意见，不能开把电话交换意见就印成传单这种先例。这样做以后就不好说话了。","type":"paragraph"},{"text":"1967年1月28日中午12点10分","type":"subtitle"},{"text":"中央文革办公室电话：","type":"paragraph"},{"text":"戚本禹同志委托办公室同志，关于伯达同志对穆欣问题答复如下：","type":"paragraph"},{"text":"你们寄来的材料，伯达同志已经看到了。穆欣可以揭发、批判，而且应该彻底揭发、批判。伯达同志并不保谁。他只是说穆欣性质现在暂时不要定，以后待揭发事实后再定。","type":"appellation"},{"text":"电话记录不能印发，因为没有经过他本人审阅。","type":"paragraph"}],"comments":[],"origin":"周良霄、顾菊英编《疯狂、扭曲与堕落的年代》之二——《十年文革中首长讲话传信录》, 2009。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"戚本禹","type":"人物"},{"name":"陈伯达","type":"人物"},{"name":"阎长贵","type":"人物"},{"name":"穆欣","type":"人物"},{"name":"中央文革","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0c7a956720"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
