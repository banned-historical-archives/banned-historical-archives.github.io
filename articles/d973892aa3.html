script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"上总与美协上海分会举办职工业余美术作品展览“在毛泽东思想的光辉照耀下前进”今开幕百余幅作品集中表现了广大工人对伟大的毛泽东思想的热爱","authors":[],"dates":[{"year":1966,"month":7,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　“在毛泽东思想的光辉照耀下前进”——上海职工业余美术作品展览，定于今(十三)日在上海美术展览馆开幕。这次展览的作品是本市职工业余美术作者，怀着对党、对毛主席的无限热爱，以无产阶级文化大革命主力军的战斗姿态创作出来的。展品有宣传画、版画、国画等一百三十余幅。展品热烈地歌颂了当代马克思列宁主义的顶峰——毛泽东思想；赞扬了活学活用毛主席著作，做好革命工作的先进人物、先进事迹；表现了广大工人群众高举毛泽东思想伟大红旗，誓把无产阶级文化大革命进行到底的英雄气概和坚强决心。展品以鲜明、强烈的战斗性和生动有力的艺术形象，大兴无产阶级思想，大灭资产阶级思想，给了反党、反社会主义的反革命黑帮以有力的回击。"},{"type":"paragraph","text":"宣传画是业余作者们运用得比较多的表现形式之一。这次展出的有《干革命靠的是毛泽东思想》、《毛主席的书就是真理》、《毛泽东思想是永远不落的红太阳》、《掌握了毛泽东思想的中国工人阶级什么都能创造》、《毛泽东思想是世界人民的革命灯塔》等作品。这些作品通过不同的手法和形式，集中地表达了工人群众对伟大的毛泽东思想的热爱。"},{"type":"paragraph","text":"作者们还宣扬了本市活学活用毛主席著作的标兵——蔡祖泉、杨富珍、杨怀远和红雷青年小组的先进事迹，展出的有《心中的太阳》、《听一点，记一点，学一点，用一点，百用百灵》、《毛主席著作是力量的源泉》、《战斗中的红雷小组》等作品。还有许多作品描写了工业战线上大学毛主席著作，发扬大庆精神，办好社会主义企业，做好革命工作的革命景象。如《芦席棚下闹革命》、《高举毛泽东思想伟大红旗，走自己的技术发展道路》、《炼钢先炼人》、《毛泽东思想闪金光》、《突出政治，小厂办大事》等，都有力地表现了工人阶级的革命精神和创造性的成就。"},{"type":"paragraph","text":"这次展出的许多作品，是在活跃的基层美术活动中涌现出来的，是从作者们为基层宣传而创作的作品中挑选出来的。在创作过程中，作者们在党组织的领导下，认真学习了毛主席著作，实行领导、群众、作者三结合，听取意见，反复修改，使作品逐步提高。"},{"type":"paragraph","text":"这次展览，是由上海市总工会与中国美协上海分会联合主办的，预定展出到七月底为止。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d973892aa3"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
