" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"党总是估计民主党派有反党对抗情绪","authors":["北京师范大学","谢思骏"],"dates":[{"year":1957,"month":6,"day":8}],"is_range_date":false,"parts":[{"text":"党总是估计民主党派有反党对抗情绪","type":"title"},{"text":"北京师范大学谢思骏","type":"authors"},{"text":"(谢思骏：教育系教师)","type":"subtitle"},{"text":"在教育系座谈会上的发言","type":"subtitle"},{"text":"我校整风没有将一部分有组织的力量发动起来，我讲的有组织的力量就是民主党派。运动开始后，有很多情况和问题，而校党委与统战都要领导各民主党派更好的商量，民主党派的数量是不少的。为什么提出呢？在民主党派的组织生活谈出的问题，不见得在教研组里谈得出，整风中许多问题的揭露还是民主党派内部先谈出来的。","type":"paragraph"},{"text":"民主党派当助手通过这个运动更好的贯彻各民主党派“长期共存，互相监督”。","type":"paragraph"},{"text":"我觉得领导上对精神领会不够，现在会外许多人提出感觉民主党派的力量发挥不够，我今天正式提出这个问题。","type":"paragraph"},{"text":"整风运动中领导没有更多的运用这个力量，这是与党一贯对民主党派不重视有关。民主党派提了许多问题，但领导上不重视。党总是估计民主党派有什么反党对抗情绪，我认为这样估计是没根据的。","type":"paragraph"},{"text":"系里研究工作，同民主党派商量是不够的，希望领导，党很好的发挥各民主党派的力量。对民主党派，认为是不行，不起好作用，党提出来嘛，教育嘛，这是我个人估计。整风运动中也是没有很好的重视民主党派的力量。","type":"paragraph"},{"text":"(原载教育系油印资料，见《北师大反右资料汇编》)","type":"paragraph"}],"comments":[],"origin":"《“阳谋”下的北师大之难》(真相出版社，2011)。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d38f0b8f22"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
