ical-archives/banned-historical-archives0/main/maoquanji50.pdf"],"article":{"title":"关于大学教育改革的谈话","alias":"","parts":[{"type":"paragraph","text":"关于大学教育改革的谈话！！"},{"type":"paragraph","text":"（1968年7月12日）"},{"type":"paragraph","text":"大学还是要办的，我这里主要说的是理工科大学还要办，但学制要缩短，教育要革命，要无产阶级政治挂师，走上海机床厂从工人中培养技术人员的道路。要从有实践经验的工人农民中间选拔学生，到学校学几年以后，又回到生产实践中去。"},{"type":"paragraph","text":"[1]这是毛泽东1968年7月12日在人民大会堂会见中央文革碰头会成员时谈话的一部分。《人民日报》1968年7月22日为发表调查报告《从上海机床厂看培养工程技术人员的道路》而写的编者按中用黑体字引用了这段话。编者按发表前曾送毛泽东审阅，毛泽东对其中的引文作了修改。本篇即是毛泽东修改后的文字。"}],"authors":["毛泽东"],"dates":[{"year":1968,"month":7,"day":12}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":216,"page_end":216},"tags":[{"name":"毛泽东","type":"人物"},{"name":"中央文革","type":"人物"},{"name":"上海文革","type":"人物"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"df8399549f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
