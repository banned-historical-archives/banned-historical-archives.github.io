ical-archives/banned-historical-archives8/main/maoquanji23.pdf"],"article":{"title":"致陈赛、谢富治、韩钧电","alias":"","parts":[{"type":"paragraph","text":"致陈赓、谢富治、韩钧电\""},{"type":"paragraph","text":"（1947年9月18日）"},{"type":"paragraph","text":"请令秦基伟主力（两个旅）由伊阳向东，相机攻占临汝，然后由临汝向东南，以一个旅相机攻占郏县、襄城、宝丰、叶县，威胁许昌，吸引整三师及一二四旅向该方面救援。该旅即留在上述各县，与救援之敌周旋。以另一个旅相机攻取鲁山、南召县城后，迅即转至卢氏、嵩县、伊阳、鲁山、南召、内乡六县交界，即伏牛山地区纵横二百里内外，展开乡村工作，剿灭民团、土匪，发动群众，建立游击队，创造该纵后方。必须使该纵干部明了，该纵后方不是新安、论池，而是伏牛山，用全力在伏牛山建立根据地，是为至要。"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军委起草的致陈、谢富治、韩钧电的主要内容。"}],"authors":["毛泽东"],"dates":[{"year":1947,"month":9,"day":18}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":300,"page_end":300},"tags":[{"name":"谢富治","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"69c06b166e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
