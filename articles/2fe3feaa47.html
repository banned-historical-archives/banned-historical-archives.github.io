es":[{"year":1966,"month":2,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"刘少奇主席　周恩来总理"},{"type":"paragraph","text":"电贺锡兰独立十八周年"},{"type":"paragraph","text":"新华社三日讯　中华人民共和国主席刘少奇三日打电报给锡兰总督威廉·高伯拉瓦，祝贺锡兰独立十八周年。电文如下：科伦坡锡兰总督威廉·高伯拉瓦阁下："},{"type":"paragraph","text":"在锡兰独立十八周年的时候，我向阁下和锡兰人民致以热忱的祝贺。祝贵国繁荣昌盛、人民幸福。祝中锡两国人民的传统友谊不断增进。"},{"type":"paragraph","text":"中华人民共和国主席　刘少奇"},{"type":"paragraph","text":"一九六六年二月三日"},{"type":"paragraph","text":"新华社三日讯　中华人民共和国国务院总理周恩来三日打电报给锡兰总理杜德利·森纳那亚克，祝贺锡兰独立十八周年。电文如下：科伦坡锡兰总理杜德利·森纳那亚克先生阁下："},{"type":"paragraph","text":"在锡兰独立十八周年的时候，请接受我衷心的祝贺。祝锡兰人民幸福。祝中锡两国的友好合作关系在和平共处五项原则的基础上不断巩固和发展。"},{"type":"paragraph","text":"中华人民共和国国务院总理"},{"type":"paragraph","text":"周恩来"},{"type":"paragraph","text":"一九六六年二月三日"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2fe3feaa47"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
