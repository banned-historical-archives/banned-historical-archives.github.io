ical-archives/banned-historical-archives0/main/maoquanji27.pdf"],"article":{"title":"对聂荣臻关于卫生部问题报告的批语","alias":"","parts":[{"type":"paragraph","text":"对聂荣臻关于卫生部问题报告的批语"},{"type":"paragraph","text":"（1949年11月6日）刘、朱、周、聂、尚昆"},{"type":"paragraph","text":"（一）卫生部错误检讨，由尚昆印发中央及军委各部、委、会、社、院、校负责人参考；（二）卫生部所作关于卫生行政会议报告书及所附参考材料，牵涉军事、政治、财政、经济、文化教育各方面，应由尚昆印发各政治局委员及薄聂陆乔陈，以待中央讨论，分别采取政府立法或行政命令的方式推行，此次卫生行政会议上只能当作建议通过，不能作决定。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十一月六日"},{"type":"paragraph","text":"[1]刘，指刘少奇。朱，指朱德。周，指周恩来。聂，指聂荣臻。尚昆，即杨尚昆，当时任中共中央办公厅主任。"},{"type":"paragraph","text":"[2]指中央人民政府卫生部1949年11月3日对于工作方针、政策性的重大问题没有向中央请示报告等错误所作检讨的申明书。"},{"type":"paragraph","text":"[3]薄，指薄一波，当时任政务院财政经济委员会副主任。聂，指聂荣臻。陆，指陆定一，当时任中共中央宣传部部长、政务院文化教育委员会副主任。乔，指胡乔木，当时任中共中央宣传部副部长、政务院文化教育委员会秘书长。陈，指陈伯达，当时任中共中央宣传部副部长、政务院文化教育委员会副主任。"},{"type":"paragraph","text":"对聂荣臻关于卫生部问题报告的批语第二点请聂通知贺诚"},{"type":"paragraph","text":"[1]贺诚，当时任人民革命军事委员会卫生部部长、中央人民政府卫生部副部长。"}],"authors":["毛泽东"],"dates":[{"year":1949,"month":11,"day":6}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":500,"page_end":501},"tags":[{"name":"毛泽东","type":"人物"},{"name":"聂荣臻","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d63ed855f8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
