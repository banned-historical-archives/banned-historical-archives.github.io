949,"month":11,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　上海回民青年会筹备会向毛主席朱总司令致敬电全文如下:"},{"type":"paragraph","text":"亲爱的毛主席朱总司令:我们上海回民青年会筹备会，今天能举行盛大的成立大会，是因为你们所领导的人民解放军解放了上海，因为我们回民青年有了团结自己打击敌人的总目标。我们决定全心全意的拥护中央人民政府和人民政协共同纲领中的少数民族政策，并积极组织上海十万回民，在中华人民共和国境内各民族一律平等的原则下，实行团结互助反对帝国主义和各民族内部的人民公敌，为实现各民族友爱、合作的大家庭而努力。我们并号召回民青年积极的参加人民解放军及献身今后伟大艰巨的建设新民主主义新中国的神圣工作。我们谨以大会的名义代表全市回民向你们致最崇高的敬礼!"},{"type":"paragraph","text":"上海回民青年会筹备会立成大会"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ed1998a577"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
