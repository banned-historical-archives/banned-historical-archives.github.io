ical-archives/banned-historical-archives8/main/maoquanji22.pdf"],"article":{"title":"刘邓军宜速向东南弃敌","alias":"","parts":[{"type":"paragraph","text":"刘邓军宜速向东南歼敌！"},{"type":"paragraph","text":"（1946年12月29日）刘、邓:"},{"type":"paragraph","text":"俭午电悉。第一步攻占巨野、嘉祥、成武等城甚好。黄河北汛在即，薛岳?对苏鲁进追甚紧，蒋介石可能增加二至三个师向你区进攻。故你们向东南行动宜速，并准备于最短期内歼灭五军及七十五师等部，方能打开局面。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"艳未"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军委起草的给晋冀鲁豫野战军司令员刘伯承和政治委员邓小平的电报。"},{"type":"paragraph","text":"[2]指1946年12月28日午时刘伯承、邓小平给中共中央军委和陈毅、粟裕、张际春等的电报。电报说：为调动敌人配合华东作战，仍以主力按原计划，第一步攻占巨野、嘉祥、成武，威胁陇海，以二纵全部留南乐、观城监视王敬久。"}],"authors":["毛泽东"],"dates":[{"year":1946,"month":12,"day":29}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":334,"page_end":334},"tags":[{"name":"邓小平","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5c3f04e209"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
