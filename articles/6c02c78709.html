rt":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席人民战争战略战术无往不胜","authors":[],"parts":[{"type":"paragraph","text":"我们从内心深处，把毛泽东关于人民战争的战略战术看得比什么都重要。我们对毛泽东的游击战原则很感兴趣。我们尽力根据喀奔达的具体情况，把这些原则运用于我们的战斗。我们特别赞赏他动员农民参加解放战争的方针和方法。我认为，这是对我们的斗争十分重要和十分有用的。"},{"type":"paragraph","text":"——安哥拉一位游击战士"},{"type":"paragraph","text":"毛主席说“你打你的，我打我的；打得赢就打，打不赢就走”，说得对极了。我们和美军作战，就是他打他的飞机大炮，我打我的步枪刺刀。结果呢，打一仗，胜一仗，光我们这个部队在不到一个月的时间里，就消灭美军四千多人！"},{"type":"paragraph","text":"——越南南方人民武装某部一位指挥员"},{"type":"paragraph","text":"在战场上，我们深刻体会到毛主席军事思想的伟大！比方说，先打分散和孤立之敌，后打集中和强大之敌……还有，敌进我退，敌驻我扰，敌疲我打，敌退我追……"},{"type":"paragraph","text":"——越南南方人民武装某部一位指挥员"},{"type":"paragraph","text":"毛泽东主席著的《抗日游击战争的战略问题》包含着一切无产阶级暴力革命必胜的真理和决定因素。毛主席的著作已经成为刚果游击队员的必读读物，他们把它视为珍宝。"},{"type":"paragraph","text":"——刚果（利）伦布埃勒—布塔"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"人民战争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6c02c78709"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
