"title":"中央纪律检查委员会、中央组织部关于检查落实政策情况的通知","dates":[{"year":1981,"month":4,"day":18}],"is_range_date":false,"authors":["中共中央组织部"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"中共中央组织干审局, 干审工作政策文件选编 (上), 772-773","tags":[{"name":"落实政策","type":"主题/事件"},{"name":"起义投诚人员","type":"主题/事件"},{"name":"侨务","type":"主题/事件"},{"name":"冤假错案","type":"主题/事件"},{"name":"住房","type":"主题/事件"}],"parts":[{"type":"title","text":"中央纪律检查委员会、中央组织部关于检查落实政策情况的通知"},{"type":"paragraph","text":"1981年4月18日·组通字〔81〕16号\n \n     中央书记处三月十二日会议指出：“从全国来看，两年多以来， 落实政策工作取得了很大成绩，但是进展不平衡，有的地方好一 些，有的地方差一些，对有些人的问题处理得好，有些人的问题处 理得不好或者还留有尾巴，个别地方还顶着不办。起义投诚人员和 海外归来人员的政策落实得不够好，党外人士的住房问题也解决 得不够好,在押人员中还有相当一部分错案需要复查。必须指出. 党的政策不落实好，就不能进一步巩固安定团结的政治局面，对党 的威信影响也很大。希望各有关部门认真抓紧落实政策，消除不利 于安定团结的因素。对起义投诚人员和海外归来人员的政策要认 真落实，工作要做细，逐个地解决问题。请统战部认真抓一抓这件 工作，好的典型要公开报道。请中央纪律检查委员会、中央组织部、 中央统战部、公安部、民政部对各省、市、自治区落实政策的情况， 进行一次检查。”     遵照中央上述决定，中央纪委、中央组织部等中央有关部门已 抽调干部组成调查组，到部分省、市、自治区对落实政策的情况进行检查。同时，请各省、市、自治区党委接此通知后，也抽调得力干 部组成检查组，对本省、市、自治区落实政策的情况进行一次系统、 深入地检查，并请将检查了解的情况，发现的问题和解决的意见写 出书面报告，于六月底以前报送我们，以便汇总报告中央。"}],"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cd8c6de794"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
