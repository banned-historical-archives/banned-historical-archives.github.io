script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反对和粉碎非正义战争 勇敢地支持正义的战争约多斥修正主义者所谓“坏的和平也比好的战争要强些”的谬论","authors":[],"dates":[{"year":1963,"month":9,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社雅加达7日电】　印度尼西亚《人民日报》今天刊载了印度尼西亚共产党第二副主席约多最近在泗水和玛琅举行的演讲会上发表的讲话要点。"},{"type":"paragraph","text":"约多在他的讲话中谈到了当前的一些重要的国际问题。"},{"type":"paragraph","text":"他在首先谈到马来西亚问题时说，英美帝国主义和他们的爪牙拉赫曼集团不得不“推迟实行”他们的计划。既然“马来西亚”可以被“推迟实行”，那么它是可以完全被挫败的!"},{"type":"paragraph","text":"约多说，目前，对北加里曼丹革命的同情和支持的规模正在日益扩大。"},{"type":"paragraph","text":"约多在谈到战争与和平的问题时说:“战争与和平的问题是一个重大的问题。但是，我们不能象南斯拉夫现代修正主义者那样看待它。他们说:‘坏的和平也比好的战争要强些’。”“有没有好的战争呢?按照马克思列宁主义，这种战争是有的，这就是正义的战争，如解放战争。我们在印度尼西亚经历了三百五十年的殖民地‘和平’状态，大家看看现代修正主义者陷在泥坑里有多深。”"},{"type":"paragraph","text":"约多说:“克劳塞维茨的战争是政治的继续的理论仍然是有效的。马克思列宁主义关于两类战争的论点仍然是有效的。我们要在两方面都勇敢，也就是说，勇敢地反对和粉碎非正义的战争，勇敢地支持正义的战争，并且为正义战争的胜利而斗争。”"},{"type":"paragraph","text":"在谈到侵略的问题的时候，约多首先问道:“侵略的危险从何而来?”"},{"type":"paragraph","text":"约多说:“譬如说，澳大利亚喜欢无礼地说，侵略的危险是来自西伊里安，也就是说，来自印度尼西亚。或者拿印度来说，它一直诬蔑中国有侵略性。”"},{"type":"paragraph","text":"约多说:“只要美国还没有解散东南亚条约组织和撤除它设在冲绳、小笠原、亚洲其它地方、非洲、拉丁美洲、澳大利亚和欧洲的军事基地，只要澳大利亚和印度没有打消它们建立军事基地的计划，它们就没有权利谈‘侵略’。侵略者是他们自己!”"},{"type":"paragraph","text":"约多说:“新兴力量正在一天比一天强大，而旧有势力一天天在衰败下去。一切斗争的战略和策略都必须以这种历史的现实为出发点。”"},{"type":"paragraph","text":"他说，苏加诺总统在《印度尼西亚革命的回声》中，表示支持关于召开亚非工人大会、亚非作家会议、第二届亚非会议、第一届亚洲、非洲和拉丁美洲大会以及“新兴力量会议”等倡议。这对进一步加强和发展新兴力量是十分重要的。"},{"type":"paragraph","text":"约多说:“南斯拉夫现代修正主义者一方面采取傲慢的态度，另一方面又以‘现实主义’的名义散布悲观论调。”"},{"type":"paragraph","text":"他说:“修正主义就象毒药一样。毒药是尝不得的。我们要就是根本拒绝它，要就是吃下去然后被毒死。”"},{"type":"paragraph","text":"约多说:在农业只有15%“合作化”的南斯拉夫“却通过新修改的宪法傲慢地自称为‘社会主义’国家。好一个在农业上实行资本主义的社会主义，这种对列宁主义‘发展’和‘创造’多么惊人!也许这就是铁托的所谓两个制度之间的‘积极共处’吧。”"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7b73c23da3"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
