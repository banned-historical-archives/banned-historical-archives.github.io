script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"《中国诗歌史略》读后","authors":["唐然"],"dates":[{"year":1980,"month":7,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"《中国诗歌史略》读后"},{"type":"paragraph","text":"唐然"},{"type":"paragraph","text":"江西人民出版社新近出版的《诗谈（上册）·中国诗歌史略》（曾铎著），抓住本质，侃侃而谈中国诗歌发展的历史轮廓，是值得一读的书。"},{"type":"paragraph","text":"作者简明扼要、提纲挈领地阐述中国诗歌发展的源流，对于不同历史时期的作家、作品，或理论倾向，都紧紧扣住了那个时代的特征去评价，是实事求是的。"},{"type":"paragraph","text":"这本书，从远古的片断歌谣谈到当代的1978年的新诗，这确乎是不易驾驭的。作者的论述一线贯串，轮廓清楚，抓住了本质。既能给一般的读者以诗歌史知识，又能给具有研究兴趣的人提供一些深入钻研的线索，或提供探讨的具体问题。作者只用了大约十万字的篇幅，论述中国古典诗歌的发展，其要略是明快的，论证要言不繁。值得重视的是，本书较为系统地整理和论述了中国现代诗歌发展史，即书中“新诗勃起”那一大部分，肯定和鼓励了新诗的创作与前途。虽然，作者用了十四万字较大的篇幅去论述，其结果，即使仍然存在挂一漏万的现象，或局部还存在下笔分寸不够很准，甚至个别差错的问题，但无论如何总算是开了一个好头。万事开头难，第一个人探了一探，后来者就将“抟扶摇而上”了。"},{"type":"paragraph","text":"邓小平同志曾指出：“我们的社会主义文艺，要通过有血有肉、生动感人的艺术形象，真实地反映丰富的社会生活，反映人们在各种社会关系中的本质，表现时代前进的要求和历史发展的趋势，并且努力用社会主义思想教育人民，给他们以积极进取、奋发图强的精神。”作者在论述新诗的发展问题上，特别注意了抓住本质的东西，抓住反映了社会本质的作品，进行艺术的和政治的分析。从而使人从书中感觉到新诗在推进时代的前进和历史的发展中所起的积极进取、奋发图强的作用。有一个可贵的地方值得一提，在论述新诗发展的每个阶段，都把老一辈的无产阶级革命家的有关诗的理论和作品及其巨大的影响作用，有机地论述了进去，这是历史的真实，是客观的存在。"},{"type":"paragraph","text":"这本书为广大诗歌爱好者，尤其是青年读者提供了知识和方便。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"269468b52f"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
