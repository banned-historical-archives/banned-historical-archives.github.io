<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"川南区退还押金实施细则","authors":[],"dates":[{"year":1950,"month":11,"day":6}],"is_range_date":false,"parts":[{"text":"川南区退还押金实施细则","type":"title"},{"text":"[1950年11月6日公布]","type":"subtitle"},{"text":"第一条　押金制度是地主对农民残酷的超额剥削，严重障碍着农业生产之恢复与发展。为促进农民的生产积极性，恢复与发展农业生产，并为明年土地改革奠定基础，西南军政委员会已决议废除押金制度，为有领导的坚决执行西南军政委员会废除押金制度之决议，特结合本区具体情况制定本退押实施细则。","type":"paragraph"},{"text":"第二条　凡今后出租土地者均不得向农民收取押金如有非法勒索押金者以违法论处。","type":"paragraph"},{"text":"第三条　凡以前地主富农收取佃户之押金，不论任何形式（钱押物押以及其他形式），地主富农原则上均应于减租时全部退还佃户。","type":"paragraph"},{"text":"第四条　凡少数地主富农确有困难者，经农民协会及佃户本人之同意，根据实际困难情况，可采取下列3种办法予以照顾：","type":"paragraph"},{"text":"（1）无力一次全退者分期退还。","type":"paragraph"},{"text":"（2）无力全退者退还一部。","type":"paragraph"},{"text":"（3）无力退还者免予退还。但分期退还者至迟须于明年秋收前全部退清。","type":"paragraph"},{"text":"第五条　凡退押中所退押金均不计利息，但应依照原约定数目，按保本保值的原则计算，不论所交押金系硬币货币、粮食，或其他实物必须本此原则计算，凡地主富农在解放前后利用货币贬值，及其他胁迫办法另立新约致佃户押金遭受损失者，新约一律无效。押金计算范围以原押及1937年7月7日以后的历次加押之总和为限。","type":"paragraph"},{"text":"第六条　凡重押轻租者，酌情减少所退押金。","type":"paragraph"},{"text":"第七条　凡逃亡地主之押金有私人代管者由代管人负责退还，无人代管或代管人无力退还时，可由农民协会请求政府经法定手续，以土地改革法上所规定不予没收之财产折价退还。","type":"paragraph"},{"text":"第八条　凡土地是向“二地主”转租者，其押金应由“二地主”负责全部退还。原地主向“二地主”收取之押金亦须依法退还。","type":"paragraph"},{"text":"第九条　凡租地转移地权，原佃户交纳之押金应按习惯由新业主退还。但凡解放后地主为逃避负担，将土地非法出卖、转让、捐献、赠予者、除宣布其无效外，其押金仍由原地主退还。","type":"paragraph"},{"text":"第十条　凡地主富农之出租土地已经收回，而押金尚未退还，或仅退一部，或利用货币贬值及其他方式折算，形式上虽已退还而实际上并未全部退还者，应予退还，或退还一部。但1946年解放战争开始以前者不应追退。","type":"paragraph"},{"text":"第十一条　凡由人民政府接管之伪政府出租的公田学田，其所收押金，原则上由人民政府退还，但在解放前敌伪所收之押金确系用于教育事业者，可酌情少退或不退。","type":"paragraph"},{"text":"第十二条　凡祠堂、庙宇、寺院、教堂、团体等出租土地所收之押金，亦应依法退还，惟孤儿院养老院托儿所医院农村之义渡等及其公益事业确系以地租收入维持费用者，其所应退之押金可由县以上人民政府及农民协会协商决定分期退还或退还一部，或免予退还。","type":"paragraph"},{"text":"第十三条　凡工人、手工业者、贫苦的自由职业者，贫苦的革命烈士家属，贫苦的革命军人家属，及贫苦的鳏寡孤独残废等因缺乏劳动力出租土地，其数目不超过当地中农所有土地的平均数者，所收押金可由人民政府、农协和双方协议，照顾双方生活情况酌情处理。","type":"paragraph"},{"text":"第十四条　凡农民相互间之押金应依照团结互助原则，照顾双方生活情况，由双方协议或由农民协会调解处理之。","type":"paragraph"},{"text":"第十五条　地主不得藉口退押实行夺佃，亦不得以解放前之陈欠年租扣还押金。","type":"paragraph"},{"text":"第十六条　凡在土地改革中规定应予没收分配之财产和地主所有之工商业不得抵还押金。","type":"paragraph"},{"text":"第十七条　凡佃户所收回之押金，原则上归原佃户，在照顾原佃户的基础上，适当加以调剂，照顾其他贫苦农民，以利生产，但对佃中农（包括富裕中农）佃贫农所得押金，应全部归佃中农，贫农所有，不得用以调剂。","type":"paragraph"},{"text":"第十八条　地主退给农民之押金应教育农民投入恢复与发展农业生产及组织农村副业，严禁大吃大喝，造成押金分散浪费现象。","type":"paragraph"},{"text":"第十九条　农民协会为退押的合法执行机关，退押必须经过农民协会批准，不得自行处理。","type":"paragraph"},{"text":"第二十条　凡退押发生争执经农民协会调处，不能解决时由县人民法庭或由其分庭判决执行，凡拒抗或破坏退押者经农民协会控告由人民法庭判处之。","type":"paragraph"},{"text":"第二十一条　本细则解释之权属于川南行署。","type":"paragraph"},{"text":"第二十二条　本细则不适于少数民族区域。","type":"paragraph"},{"text":"第二十三条　本细则自公布之日实施。","type":"paragraph"}],"comments":[],"origin":" 中共中央西南局农村工作部编：《西南区土地改革运动资料汇编（上）》，重庆， 1954年。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fbc708b708"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
