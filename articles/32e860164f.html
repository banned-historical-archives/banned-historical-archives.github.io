ical-archives/banned-historical-archives8/main/maoquanji13.pdf"],"article":{"title":"给肃三“的信","alias":"","parts":[{"type":"paragraph","text":"给萧三\"的信"},{"type":"paragraph","text":"（1939年6月17日）子障同志："},{"type":"paragraph","text":"（一）大作看了，感觉在战斗，现在需要战斗的作品，现在的生活也全部是战斗，盼望你更多作些。"},{"type":"paragraph","text":"（二）高尔基晚会如无故障当来参加，惟这几天较忙一些。"},{"type":"paragraph","text":"（三）马，待查问一下看，这事倒不很容易。如你在边区范围内行动，那我可以拿我的马给你用一下；如往外边，就得另想法了。"},{"type":"paragraph","text":"敬复。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"六月十七日"},{"type":"paragraph","text":"[1]萧三（1896一1983)，原名萧子璋，湖南湘乡人，诗人。当时任延安鲁迅艺术文学院编译部主任。"},{"type":"paragraph","text":"[2]指萧三写的一本诗稿。其中一部分诗后来收入他的诗集《和平之路》和《萧三诗选》。"},{"type":"paragraph","text":"育感费在牛现夜需柔比也"},{"type":"paragraph","text":"Wimz充办，惯天教忙"},{"type":"paragraph","text":"(三)民，待壳A-很密了。决你花IPNX"},{"type":"paragraph","text":"2i5毛泽东致萧三信的手稿。"}],"authors":["毛泽东"],"dates":[{"year":1939,"month":6,"day":17}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":464,"page_end":465},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"32e860164f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
