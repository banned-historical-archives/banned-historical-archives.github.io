" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中央人民政府教育部关于加强对学校政治思想教育的领导的指示","authors":[],"dates":[{"year":1950,"month":10,"day":13}],"is_range_date":false,"parts":[{"text":"中央人民政府教育部关于加强对学校政治思想教育的领导的指示","type":"title"},{"text":"（一）全国各地自解放以来，对教育普遍地进行了改造整顿工作，在课程的改革上、政治思想的进行上，均获得了一定的成绩。但最近在新区土改政策的学习中，部分地区发生了严重的偏向和缺点。如湖南省部分中等学校搬用 农村斗争的方式，斗争教员，斗争学生，甚至有因校长是地主，学校里发动斗争会罚他跪六小时的，严重地违反争取、团结、改造知识分子的政策，使得人心惶惶， 多数教职员不敢暴露思想，达不到改造提高的目的。有的地区并在整顿旧教育过程中，对原有教职员，采取打击和清洗的办法，任意撤换校长和教员，以致人人自危 不能安心工作。湖北省部分地区大量动员教职学员去搞中心工作，妨碍了系统教学的正常进行；而该省教育厅在其布置土改学习的通知中，竟错误地规定要在学校中 “严格检查教职员中过去和现在，有无瞒田夺佃、私卖倒算、欺压农民等行为”，“若不坦白承认错误而发现上列情事时，就必须送交当地政府依法惩办。”如按此 种精神执行，势必促成在学校中对地富家庭出身的教职员进行清算斗争，而杜绝他们进步的机会，结果将会影响文化科学的正常开展，使学校陷于混乱，影响教育前 途甚大。","type":"paragraph"},{"text":"（二）各地文教机关和学校，必须彻底认识：对旧教育的改革，易一个长期而细腻的工作，拖延改革固然是不对的，性急粗暴草率从事也是不 对的，应该是有计划有步骤而且谨慎地进行；对教职员和学生，不管其家庭出身怎样，均应本争取、团结、改造的政策，通过教育说服的方式，积极鼓励其前进，切 勿以斗争、孤立、强迫反省，或单纯清洗的办法来处理。","type":"paragraph"},{"text":"（三）前述各地区之偏向，虽已由有关领导机关及时纠正，但各地文教机关应该吸取经验教 训，加强对各级学校之领导，提高警惕深入检查，防止性急粗暴的偏向发生；另一方面应认清团结知识分子是为得要改造、求进步，而不是姑息妥协；因而必须注意 坏分子借口团结知识分子的政策，在土改中钻政策空子的不法行为，以免人民的学校脱离人民，并影响人民政府的威信。","type":"paragraph"}],"comments":[],"origin":"根据《中央人民政府教育部法令汇编》（1949一1952）刊印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2790b8897a"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
