<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"把斗争矛头指向一般里弄干部 是资产阶级反动路线的新反扑","authors":["林菊英","王祥斌","肖淑琴","赵义兴","陈梅仙"],"dates":[{"year":1967,"month":2,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席教导我们:“敌人是不会自行消灭的。无论是中国的反动派，或是美国帝国主义在中国的侵略势力，都不会自行退出历史舞台。”"},{"type":"paragraph","text":"当前，在无产阶级革命派夺权斗争的革命风暴席卷全国的大好形势下，党内一小撮走资本主义道路的当权派和极少数坚持资产阶级反动路线的顽固分子，不甘心于自己的灭亡，使尽各种反革命的手段，继续进行新的反扑。这些混蛋，玩弄着两面三刀的手法，大刮阴风，大放毒箭，企图转移我们的斗争大方向，使自己蒙混过关。"},{"type":"paragraph","text":"这些坏家伙的手段之一，是阴险地混淆两类不同性质的矛盾，到处煽起打倒一切、否定一切的阴风，扬言“只要是干部都可以斗”。这是明目张胆地反对毛泽东思想的反动谬论。最近在上海街道里弄中，普遍出现的把斗争矛头指向里弄干部、里弄积极分子，就是一种资产阶级反动路线新反扑的表现。这些别有用心的坏家伙，挑动群众提出各种经济要求，大刮经济主义的歪风；他们把自己的责任推到里弄干部身上，说什么“具体工作都是下面搞的，我不过点点头而已”，竭力挑动群众围攻里弄干部，自己则坐山观虎斗。这些坏家伙更毒辣的是同里弄中地富反坏右分子串通一气，自己站在幕后策划，妄图进行阶级报复。他们企图转移斗争的大方向，阻挠街道地区无产阶级文化大革命的深入开展。"},{"type":"paragraph","text":"我们认为，里弄委员会是群众性组织，里弄干部是由群众选出来为里弄居民服务的，他们不同于机关干部，更不同于街道的当权派。平时，他们在工作中，有这样或那样的缺点和错误。在这次文化大革命中，他们受到资产阶级反动路线的蒙蔽，在一段时期内，帮助一些当权派执行了资产阶级反动路线。对于他们这些错误，我们革命群众有责任向他们指出，帮助他们改正。但是，我们一定要记住毛主席的教导:“谁是我们的敌人?谁是我们的朋友?这个问题是革命的首要问题。”必须把两类矛盾分清，决不要上走资本主义道路当权派的当，把矛头指向里弄干部。而应该帮助他们改正错误，鼓励他们起来造街道党委、区委、市委的反，勇敢地揭发问题，站到毛主席的革命路线一边来，站到革命造反派一边来。"},{"type":"paragraph","text":"团结一切可以团结的力量，孤立和打击一小撮顽固的敌人，这是毛主席一贯的战略思想。《红旗》杂志一九六六年第十五期社论指出:“斗争的矛头对准什么，这是个大是大非的问题，这是马克思列宁主义、毛泽东思想的原则问题。”我们希望街道中一切革命造反派联合起来，紧紧掌握斗争的大方向，把矛头向上，团结大多数，使街道的无产阶级文化大革命沿着毛主席的革命路线胜利前进。"},{"type":"paragraph","text":"上海被服二厂退休工人　王祥斌"},{"type":"paragraph","text":"国棉二十二厂工人　林菊英"},{"type":"paragraph","text":"甘泉二村食堂职工　肖淑琴"},{"type":"paragraph","text":"宜川三村居民　陈梅仙"},{"type":"paragraph","text":"宜川街道地区知识青年　赵义兴"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d39cb5e6c9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
