s":[{"year":1968,"month":8,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"澡华社北京电　东京消息:日本国际贸易促进协会为了庆祝中国船舶航行日本四周年，怀着对伟大领袖毛主席无限热爱、无限崇敬的深厚感情，最近设计并制作了毛主席像章。"},{"type":"paragraph","text":"日本国际贸易促进协会的一位朋友在谈到设计和制作毛主席像章时说，当前，用毛泽东思想武装起来的七亿中国人民正在整利。地进行着无产阶级文化大革命。这场革命给日本人民和全世界人民带来了巨大的鼓舞。日中两国人民在共同斗争中所取得的每一个成就，都是毛泽东思想的伟大胜利。"},{"type":"paragraph","text":"这位朋友说，我们将把这些毛主席像章，作为最珍贵的礼物，赠送给为日中两国人民之间的友好海运事业和发展两国人民的经济友好往来作出贡献的人们。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a2739270ad"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
