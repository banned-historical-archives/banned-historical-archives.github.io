ical-archives/banned-historical-archives0/main/maoquanji30.pdf"],"article":{"title":"关于对反革命分子判刑问题的电报","alias":"","parts":[{"type":"paragraph","text":"关于对反革命分子判刑问题的电报"},{"type":"paragraph","text":"（1951年1月22日）叶、黄、肖、林\"，并告中南局："},{"type":"paragraph","text":"一月十七日电悉。广东情况已明了，你们的部署是正确的，希望努力完成任务。此外，望注意镇反工作。凡与剿匪有关的匪首恶霸大特务，可由军区军分区的军事法庭判处死刑；凡与剿匪无关的反革命重要分子，则由地方法院及军管会的军法处判处死刑；乡村普通恶霸及不法地主，则由农民斗争、监视及由人民法庭判刑，如此分三方面进行，可期迅速，又较妥当。广东必需有计划地处决几千个重要反动分子，才能降低敌焰，伸张正气，望妥慎布置施行。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一月廿二日"},{"type":"paragraph","text":"[1]叶，指叶剑英，当时任中共中央华南分局第一书记、中国人民解放军广东军区司令员兼政治委员。黄，指黄永胜，当时任中国人民解放军广东车区副司令员。肖，指肖向荣，当时任中国人民解放军广东军区副政治委员兼政治部主任。林，指林平，即尹林平，当时任中国人民解放军广东军区副政治委员。"}],"authors":["毛泽东"],"dates":[{"year":1951,"month":1,"day":22}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":54,"page_end":54},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8a3671e6c4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
