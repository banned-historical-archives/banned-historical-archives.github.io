art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"湖北罗田广大民兵积极学习毛主席著作","authors":["刘子华"],"parts":[{"type":"paragraph","text":"本报讯 湖北省罗田县人民武装部，组织民兵干部和民兵广泛展开学习毛主席著作的运动。全县有八万多民兵参加了这一学习。仅匡河民兵团就建立了五百一十个学习小组。"},{"type":"paragraph","text":"广大民兵干部和民兵通过这一学习，进一步认识了总路线、大跃进、人民公社的正确和伟大。匡河民兵团学习了毛主席“关于正确处理人民内部矛盾的问题”以后，进一步认识了社会主义建设时期的阶级斗争。他们说：国外还有帝国主义存在，国内阶级斗争还没有完全结束，我们一定要听党的话，作党和人民进行阶级斗争的驯服工具。大家学习了毛主席关于国防建设和人民战争的理论，深刻认识到加强民兵工作的重大意义，一致表示，要大力搞好民兵工作。"},{"type":"paragraph","text":"为了表达他们学习毛主席著作后的喜悦，一个民兵歌颂道：毛主席真英明，时时刻刻为人民。学习他的著作后，心里亮堂干劲增。按照他的指示办，各项建设定跃进。永远跟着毛主席，幸福生活万年青。 （刘子华）"}],"alias":""},"tags":[{"name":"人民战争","type":"主题/事件"},{"name":"人民内部矛盾","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6fecda94cf"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
