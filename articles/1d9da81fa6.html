<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"狠批林彪路线的极右实质　狠批尊孔反法思想上海第五印染厂“青锋”学习小组在批林批孔中发挥主力军作用几个月来，学习小组的同志们列专题、抓重点、批要害，提高了识别能力。　他们说:批孔就是挖林彪路线的老根，要深入批林，就要批孔","authors":[],"dates":[{"year":1974,"month":1,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　批林、批孔斗争如何深入?最近，上海第五印染厂“青锋”学习小组通过学习并回顾了前几个月批林、批孔斗争的实践，更深刻地认识到批孔是批林的一个组成部分，是一场重大的政治斗争，一定要把批林、批孔结合起来，深揭狠批林彪路线的极右实质，继续批判尊孔反法思想，加强思想和政治路线方面的教育，以推动批林、批孔斗争的深入发展。"},{"type":"paragraph","text":"“青锋”学习小组，是上海第五印染厂机动车间部分青年于一九七二年十一月组织起来的一个业余自学小组。小组的同志们学习了《帝国主义是资本主义的最高阶段》、《国家与革命》等马列著作，批判林彪修正主义路线和反动谬论。去年八月以后，报上发表了不少批孔文章，他们开始注意抓批孔。在批孔斗争中，他们发现林彪的很多黑话与孔子的谬论是一样的，如孔子讲“正名”，林彪就叫嚷“名不正言不顺”；孟子说“五百年必有王者兴”，林彪就胡诌“这样的天才，全世界几百年、中国几千年才出现一个”；孔子说“有杀身以成仁”，林彪就狂叫“不成功便成仁”；孔子要复辟奴隶制，林彪则搞《“571工程”纪要》，妄图颠覆无产阶级专政，篡党夺权，等等。他们感到林彪和孔子，虽然所处的朝代不一样，脸谱不一样，但语言一样，心肠一样，目的一样，林彪的一套反动理论都是从孔孟那里搬过来的，林彪路线的理论基础就是孔孟之道。通过这样的分析，大家增强了把批林、批孔结合起来的自觉性。许多同志说:批孔就是挖林彪路线的老根，掘林彪反动思想体系的“祖坟”，要深入批林，就要深入批孔。"},{"type":"paragraph","text":"这个学习小组的同志归纳、整理了四十多条孔子、林彪反动言论两对照的材料，接着又把这份材料分类归纳为六个专题，对孔子和林彪共同的思想体系和反动立场、政治路线开展批判。他们批判孔子的“兴灭国，继绝世，举逸民”的倒退复辟口号，联系批判林彪鼓吹“克己复礼”的反动政治纲领，增强保卫无产阶级文化大革命胜利成果，坚持无产阶级专政下继续革命的决心；批判孔子的“生而知之”的先验论，联系批判林彪唯心主义的“天才论”，坚持唯物论的反映论；批判孔子的所谓“仁义”、“忠恕”，联系批判林彪反革命《“571工程”纪要》中杀气腾腾地叫嚷“不成功便成仁”的反革命实质，增强阶级斗争和无产阶级专政的观念；批判孔子的“民可使由之，不可使知之”的愚民政策，联系批判林彪的唯心史观，增强学习马克思主义的自觉性；批判孔孟的“劳心者治人，劳力者治于人”的剥削阶级思想，联系批判林彪对“五·七”道路的攻击，坚定走与工农相结合的道路的决心；小组的女青年还批判孔子的男尊女卑观念，联系批判林彪诬蔑妇女的种种谬论，宣传妇女半丬天的革命道理。他们通过列专题，抓重点，批要害，进一步提高了识别能力。"},{"type":"paragraph","text":"为了加深对深入批林、批孔斗争意义的认识，小组同志还经常注意研究一些材料。他们分析了蒋匪帮、苏修叛徒集团对我们批孔斗争大肆攻击，大搞尊孔活动等材料，认识到帝修反尊孔反法，目的在于反华。大家说:敌人反对，正说明我们开展批林、批孔斗争，好得很，十分必要。这就进一步提高了大家批林、批孔的自觉性。"},{"type":"paragraph","text":"在批林、批孔斗争过程中，“青锋”小组的同志还注意把革命大批判与加强世界观的改造结合起来。开始，有的同志认为“孔子是两千多年前的人物，我是二十多岁的青年，没有读过孔子书，孔孟的一套和我不搭界”。针对这种思想，他们自觉地剖析孔孟之道在自己身上的流毒，结果排出了不少方面，如“学而优则仕”、“中庸之道”等。他们就抓住这些问题，通过学习马列和毛主席著作，进一步批判孔孟谬论，肃清其流毒，促进了世界观的改造。"},{"type":"paragraph","text":"下阶段怎样进一步开展批林、批孔斗争?小组同志作了初步打算。他们打算首先要加强学习。要认真学习毛主席关于粉碎林彪反党集团的一系列指示，学习《鲁迅批判孔孟之道的言论摘录》，还要学一些批林批孔的文章和资料，努力运用马克思主义的立场、观点和方法，掌握批判武器。大家感到林彪效法孔子“克己复礼”，妄图复辟资本主义，这是要害所在。林彪的反革命策略、两面派的手法、反动的处世哲学以及他宣扬天才论、贩卖“中庸之道”、教子尊孔读经、否定和攻击革命的新生事物等等，无一不是服从于他的复辟资本主义这个要害的。一定要抓住要害，继续深入批判。他们还打算实行组内组外相结合，把生产班组在学习、批判中的重点、难点，带到小组，集思广益，进行讨论、批判，再把自己学习、批判的体会，带到生产班组。同时要继续充分利用黑板报、广播台、大批判专栏等各种宣传阵地，口诛笔伐，在群众性的深入批林、批孔高潮中，发挥主力军的作用。"},{"type":"paragraph","text":"\u003cIMG alt=请插入6号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1974\\01\\741u010301.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e上海第五印染厂机动车间“青锋”学习小组的工人正在批判林彪尊孔反法的反动谬论。"},{"type":"paragraph","text":"本报通讯　员摄\u003c/FONT\u003e"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"林彪","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"批林批孔","type":"主题/事件"},{"name":"批林批孔","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1d9da81fa6"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
