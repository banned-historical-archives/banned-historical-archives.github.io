script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"彻底批判“业务挂帅”的修正主义黑货  人民银行杭州市支行革委会抓紧革命大批判，使银行工作面貌一新","authors":[],"dates":[{"year":1969,"month":11,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"彻底批判“业务挂帅”的修正主义黑货"},{"type":"paragraph","text":"人民银行杭州市支行革委会抓紧革命大批判，使银行工作面貌一新"},{"type":"paragraph","text":"新华社杭州十五日电　中国人民银行杭州市支行革委会，在驻行工人、解放军毛泽东思想宣传队的帮助下，充分发动和依靠广大革命干部和革命工人，以毛泽东思想为武器，彻底批判大叛徒刘少奇在银行系统推行的反革命修正主义路线，有力地推动了斗、批、改的深入发展，使银行工作面貌焕然一新。"},{"type":"paragraph","text":"这个银行革委会成立以后，遵照伟大领袖毛主席关于“我们现在思想战线上的一个重要任务，就是要开展对于修正主义的批判”的教导，带领广大革命干部、工人，向大叛徒刘少奇在银行系统推行的反革命修正主义路线发起了猛烈进攻。"},{"type":"paragraph","text":"这个支行在开展革命大批判的过程中，革委会成员还专门深入到办事处、服务所等基层单位，和广大革命干部、工人一起研究分析阶级斗争的新动向，揭露阶级敌人的破坏活动，使广大革命干部、工人清醒地看到银行系统两个阶级、两条路线的激烈斗争。"},{"type":"paragraph","text":"在无产阶级文化大革命以前，大叛徒刘少奇及其代理人推行“业务挂帅”、“技术第一”等反革命修正主义黑货。在这条反革命修正主义路线的影响下，银行里一度出现了追求“铁账、铁款、铁算盘”的现象。在大批判中，大家深刻认识到，刘少奇和他在银行的代理人大肆推行反革命修正主义路线，其目的就是妄图把社会主义的银行变为他们复辟资本主义的工具。广大革命干部、工人通过大批判，认识提高了，都自觉地把活学活用毛泽东思想放在一切工作的首位，从领导机关到每一个办事处、服务所，到处出现了活学活用毛泽东思想的动人场面，先进单位和先进人物不断涌现。解放街办事处有一个五十多岁的老储蓄员，过去是"},{"type":"paragraph","text":"“两耳不闻窗外事，一心只把账款平”，现在成了革命大批判的闯将，活学活用毛泽东思想的积极分子。"},{"type":"paragraph","text":"大叛徒刘少奇及其在银行的代理人，大肆鼓吹“银行工作无敌论”，胡说什么银行工作就是“收收钱、付付款”的工作，完全抹杀了阶级斗争。在革命大批判中，广大革命干部、工人反复批判了刘少奇的“阶级斗争熄灭论”，深刻认识到，只看到账号钞票，看不到敌人，无产阶级政权就有丧失的危险。从而大大提高了阶级斗争和两条路线斗争的觉悟。拱宸桥储蓄所在一次办理存户取款中，对一个小疑点抓住不放，结果揪出了一小撮阶级敌人。文化大革命以前，大叛徒刘少奇及其在银行的代理人，为了把银行变为他们复辟资本主义的工具，给银行工作从制度上规定了许多“管、卡、压”等条条框框，严重地影响了社会主义经济的发展。在革命大批判中，银行广大革命干部、工人对这些不合理的规章制度进行了严肃的批判。他们在革命大批判的基础上，多次举办毛泽东思想学习班，反复学习毛主席关于“认真搞好斗、批、改”的教导。通过学习，提高了认识，专门派出小分队，深入工厂、农村、街道、商店等企事业单位，广泛征求革命群众的意见，使规章制度的改革有了明确的方向。他们不断地破除了不合理的部分，保留了合理部分，同时，创立了方便革命群众和工农业生产、适合于发展社会主义经济的新规章制度，把“管、卡、压”变成了“宣、学、帮”（即宣传毛泽东思想、向工农兵学习、帮助企事业合理安排资金）。湖墅、青春路等办事处，为了方便工厂和群众，把原来每天对外办公六小时改为十小时，增设柜台，简化手续，星期天也照常开门。拱宸桥服务所的革命干部、工人还走出办公室，主动把资金等送到工厂和企事业单位。广大革命群众看到银行出现的新面貌，满意地说：“这才是真正为人民服务的银行。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a5734fa01e"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
