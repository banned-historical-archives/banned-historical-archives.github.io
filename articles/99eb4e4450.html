script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"多列士在法共中央全会发言坚决反对修正主义倾向并宣布法共将同苏维埃国家团结一致","authors":[],"dates":[{"year":1957,"month":2,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京19日电】　据塔斯社巴黎讯:“人道报”18日刊载了多列士在法国共产党中央委员会全体会议讨论居约所作关于法国共产党同其他国家的共产党和工人党的关系的报告时的发言。"},{"type":"paragraph","text":"多列士首先指出，法国共产党同兄弟党的关系目前正处在一个发生了许多重大变革的阶段。法国共产党活动的一贯方针是:必须同形式主义和墨守成规作不调和的斗争，执行适合于已经发生变化的局势的新措施。在这方面，多列士提到了争取劳动人民行动一致和争取人民阵线的斗争，提到了在同其他国家共产党和工人党的关系中采取新形式的问题。他说，最近法国共产党的代表将同南斯拉夫和保加利亚的共产党人会晤。"},{"type":"paragraph","text":"多列士着重指出，无产阶级国际主义绝不违反民族利益。他说，法国共产党中央委员会坚决反对企图修正马克思列宁主义的各种领向。他号召提高警惕，以反对那些想抹煞阶级斗争及其在国内和国际范围内各种事件中的决定性作用的企图；反对想使人怀疑马克思列宁主义久经考验的学说的原则基础、怀疑党的队伍团结的必要性的企图。"},{"type":"paragraph","text":"他说，法国共产党公开宣布它拥护光辉的十月革命，并且同苏维埃国家团结一致。他指出，这是同法国工人阶级的利益和法国民族利益一致的。"},{"type":"paragraph","text":"多列士最后说，法国共产党将努力为争取面包、争取工会权利和民主自由、争取民族独立和和平以及争取社会主义而更好地进行斗争。法国共产党最近将努力展开广泛的斗争来反对由于复活德国军国主义而使法国和欧洲安全受到的新威胁。此外，法国共产党还将努力团结广大法国人民，以便在符合法国人民和阿尔及利亚人民双方利益的条件下最后取得阿尔及利亚的和平。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"99eb4e4450"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
