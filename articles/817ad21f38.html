新"],"dates":[{"year":1970,"month":2}],"is_range_date":false,"parts":[{"text":"质问、控诉、声讨!！","type":"title"},{"text":"张志新","type":"authors"},{"text":"身为专政机关之长，你听着：","type":"paragraph"},{"text":"1．你为什么不敢把钢笔退还于我，不是要我写写对宣判大会的感触吗？难道由于事情繁忙忘记了吗？如果是这样，在此提醒一下！如果是怕给了我这支笔后，写出不合乎要求的感触而改变方针，这也算是少找点麻烦，也愿听便。看来我的笔是被你们当作枪给缴去了，但指挥这支枪的思想你们却永远也缴不掉！","type":"paragraph"},{"text":"2．自称为代表无产阶级、共产党执行专政者，你们的作为哪一点象无产阶级！一首未写完的革命诗歌，作为导线借口，行凶殴打凌辱女政治犯！你们以为一个女共产党员就这样随便凌辱的吗！行凶者，帮凶助威侮骂者，你们可以逃之夭夭吗？不！我要向党向人民控诉你们，要声讨你们。你们若不认错，将会受到历史的严惩！这笔帐是要算的！","type":"paragraph"},{"text":"3．你们管理的哨兵可以无缘无故辱骂女共产党！","type":"paragraph"},{"text":"4．你们管理领导下的伙房，可以用带有煤渣沙子的黄馍虐待政治犯！你这个一所之长，却推脱责任，回避问题，逃之夭夭！","type":"paragraph"},{"text":"*  这是一九七○年二月张志新同志在沈阳管教所写的抗议信的全文。当时，张志新同志的笔已被没收，抗议信是用木签蘸着墨水写的。","type":"appellation"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"817ad21f38"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
