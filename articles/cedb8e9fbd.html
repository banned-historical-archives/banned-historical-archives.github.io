" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"北京师大学生准备派代表到党中央请愿","authors":["新华社记者　丁宝芳"],"dates":[{"year":1957,"month":5,"day":26}],"is_range_date":false,"parts":[{"text":"北京师大学生准备派代表到党中央请愿","type":"title"},{"text":"新华社记者　丁宝芳","type":"authors"},{"text":"新华社北京26日讯　北京师范大学今天上午有学生代表准备到党中央请愿。学生们认为现在学校党委已不能领导整风，要求中央派工作组来学校领导整风，撤换何锡麟(学校党委第一书记)副校长。","type":"paragraph"},{"text":"事情的经过是这样的：中文系教授穆木天(脱党分子)在小组会上揭发何锡麟校长乱搞男女关系的事情后，穆木天说领导上就从此打击他，他并在5月22日的光明日报发表了“我的呼吁”。这一来这个事情就在学生中传开了。24日下午党委副书记张斧和宣传部部长张刚动员学生进一步大“放”大“鸣”时，对于何锡麟的事件作了解释，说何锡麟乱搞男女关系是在到师大任职以前，而在1954年和俄语系一研究生只是关系比较密切，后来又作过检讨等语。在解释评穆木天为二级教授的理由时，又说群众对穆木天很不满意，说在一次工资评级座谈会上，王古鲁教授骂穆木天是叛徒，因为他是脱党分子，而穆木天也骂王古鲁是汉奸。学生听了这些解释后，情绪大为激动，认为学校党委领导有宗派情绪，包庇何锡麟，并在这样的大会上，揭露党外老教授的缺点是别有用意的。因此立刻就贴了很多大字报，批评张斧、张刚是用宗派主义参加整风。","type":"paragraph"},{"text":"这个事件到昨晚就更发展到顶点：俄语系党支部在学生组织的“自由论坛”上彻底揭露了何锡麟的乱搞男女关系，因此学生就更认为张斧、张刚闹宗派，欺骗学生。据党委会赵树荇对记者说：张斧、张刚的报告事先没经过很好讨论，所以很多话都有毛病，学生这种情绪是正常的。“师大教学”(校刊)的编辑刘福惠对记者说：目前师大党委没有人好出面说话，只有副书记方铭在群众中还有些威信，但他没有表示出对领导这次整风的信心。","type":"paragraph"},{"text":"北京师范大学除“何(锡麟)穆(木天)事件”外，还有“谢昕事件”(谢在肃反中被监禁一年又四个月，她在昨晚自由论坛上提出控诉)、“李筠(中文系党支部书记)事件”(在李筠主持的一次教授座谈会上，一位党员批评党外教授穆木天，学生认为李筠是把整党变为整群众)和“张斧、张刚拉拢朱启贤入党事件。”等三个事件。“张斧张刚事件”据说前几天张斧、张刚曾专门拜访朱启贤，问他是否要入党，如要入党可以给入党申请书，朱启贤说，“现在是整风，不是暂不吸收入党吗？”张斧、张刚说“高级知识分子可以例外”。而朱启贤就对同学说及这个经过，认为张斧、张刚在这个时期要他入党是拉拢他入党。","type":"paragraph"},{"text":"今天中午，学生还在继续张贴大字报。据说，今天下午五时后，学生还要组织自由论坛。","type":"paragraph"},{"text":" 来源： 1957年5月27日新华通讯社编《内部参考》。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cedb8e9fbd"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
