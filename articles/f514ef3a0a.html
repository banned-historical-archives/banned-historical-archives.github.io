script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"抗议美英和本国垄断资本的残酷剥削  拉丁美洲各国工人纷纷展开斗争  秘鲁哥斯达黎加工人罢工　乌拉圭工人反击警察镇压","authors":[],"dates":[{"year":1969,"month":9,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"抗议美英和本国垄断资本的残酷剥削"},{"type":"paragraph","text":"拉丁美洲各国工人纷纷展开斗争"},{"type":"paragraph","text":"秘鲁哥斯达黎加工人罢工　乌拉圭工人反击警察镇压"},{"type":"paragraph","text":"新华社一日讯　秘鲁、哥斯达黎加等拉丁美洲国家的工人最近不断举行罢工，抗议美英和本国垄断资本的沉重剥削，为改善他们的生活条件进行斗争。"},{"type":"paragraph","text":"秘鲁的美资塞罗德帕斯科铜公司的五千矿工，从八月三十日开始举行不定期罢工，要求提高工资和改善劳动条件。这五千秘鲁工人在美国公司所霸占的奥罗亚炼铜厂和科布里萨矿区工作，奥罗亚是秘鲁最主要的一个炼铜厂。"},{"type":"paragraph","text":"哥斯达黎加英国垄断资本经营的北部铁路公司的二千工人也在最近举行罢工，要求这家公司的当局提高他们的工资。工人的罢工中断了哥斯达黎加首都圣约瑟和重要港口利蒙的交通运输，使资方遭到很大损失。"},{"type":"paragraph","text":"乌拉圭一家纺织厂的二百多工人，由于资方拒不答应他们提出的合理要求，在一个多月前就占领了工厂。八月二十八日这个纺织厂的工人英勇地用石块还击了警察的进攻。"},{"type":"paragraph","text":"委内瑞拉拉腊省的三千失业工人，最近在这个省的首府巴基西梅托举行抗议集会和示威游行，并占领了当地政府的一个大楼，要求解决就业问题。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f514ef3a0a"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
