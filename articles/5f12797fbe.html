[],"dates":[{"year":1978,"month":6,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"叶委员长会见胡安·卡洛斯国王"},{"type":"paragraph","text":"同西班牙贵宾进行了友好的谈话"},{"type":"paragraph","text":"新华社北京六月十六日电　人大常委会委员长叶剑英今天晚上会见西班牙国王胡安·卡洛斯一世和王后索菲娅陛下及其随同来访的其他西班牙贵宾，同他们进行了友好的谈话。"},{"type":"paragraph","text":"叶剑英委员长对卡洛斯国王和王后陛下来我国访问表示热烈欢迎。他说，中西两国建交五年来，我们两国关系的发展是良好的。国王的这次访问使这种关系得到了更大的发展。"},{"type":"paragraph","text":"卡洛斯国王对叶委员长说，你亲切友好的谈话，表明了贵国对我国的友好感情。我预祝西中两国的友好关系获得进一步发展。"},{"type":"paragraph","text":"谈话以后，叶剑英委员长和邓小平副总理、乌兰夫副委员长、王震副总理一起，同卡洛斯国王和王后陛下以及随同他们来访的全体西班牙贵宾一起照了像。（附图片）"},{"type":"paragraph","text":"叶剑英委员长同卡洛斯国王亲切握手。"},{"type":"paragraph","text":"新华社记者摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5f12797fbe"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
