al-archives/banned-historical-archives8/main/maoquanji8.pdf"],"article":{"title":"与南京当局谈判之意见","alias":"","parts":[{"type":"paragraph","text":"与南京当局谈判之意见！"},{"type":"paragraph","text":"（1936年3月4日）博古同志转周继吾兄："},{"type":"paragraph","text":"（甲）弟等十分欢迎南京当局的觉悟与明智的表示，为联合全国力量抗日救国，弟等愿意与南京当局开始具体实际之谈判。"},{"type":"paragraph","text":"（乙）我兄复命南京时，望恳切提出弟等下列意见：（一）停止一切内战，全国武装不分红白，一致抗日；（二）组织国防政府与抗日联军；（三）容许全国主力红军迅速集中河北，首先抵御日寇迈进；（四）释放政治犯，容许人民政治自由；（五）内政与经济上实行初步与必要的改革。（丙）同意我兄即返回南京，以便迅速商大计。"},{"type":"paragraph","text":"张毛彭"},{"type":"paragraph","text":"四号十二时[1]这是毛泽东和洛甫（张闻天）、彭德怀给博古（秦邦宪）转周继吾"}],"authors":["毛泽东"],"dates":[{"year":1936,"month":3,"day":4}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":302,"page_end":302},"tags":[{"name":"毛泽东","type":"人物"},{"name":"博古","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f04951a07c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
