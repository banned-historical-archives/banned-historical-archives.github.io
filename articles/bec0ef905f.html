ical-archives/banned-historical-archives8/main/maoquanji13.pdf"],"article":{"title":"在陵甘宁边区农产品展览会上的讲话","alias":"","parts":[{"type":"paragraph","text":"在陕甘宁边区农产品展览会上的讲话！!"},{"type":"paragraph","text":"（1939年1月25日）"},{"type":"paragraph","text":"今天开边区农产品展览大会，意义是很大的。现在跟日本帝国主义打仗，需要多方面的努力，前方要有将士的英勇抗战，而这些将士们要吃饭，要穿衣，这就要依赖后方努力生产来解决。边区在过去生产运动中已有了一些成绩，这次农展会就是成绩的代表。前方努力打仗，后方努力生产，打下去，一定可以打垮日本的。在我们边区，不仅老百姓要如此做，其他如学校、党政机关及部队都要参加生产运动。"},{"type":"paragraph","text":"[1]1939年1月25日，毛泽东出席在延安举办的陕甘宁边区农产品展览会并讲话。这是毛泽东讲话的一部分。"}],"authors":["毛泽东"],"dates":[{"year":1939,"month":1,"day":25}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":186,"page_end":186},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bec0ef905f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
