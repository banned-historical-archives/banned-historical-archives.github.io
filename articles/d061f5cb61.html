ical-archives/banned-historical-archives8/main/maoquanji12.pdf"],"article":{"title":"复林伯渠电","alias":"","parts":[{"type":"paragraph","text":"复林伯渠电!"},{"type":"paragraph","text":"（1938年6月15日）"},{"type":"paragraph","text":"申、国民党进步中某些顽固分子的反动行为，并不足怪，亦不必惊慌。乙、应该在各地利用机会动员群众，给顽固分子以相当打击，指出他们违反中央意志，违反抗战建国纲领，使之孤立。内、边区最近采取的一些办法，不过为了自卫，并非有意与之对立。目前无让步的必要。"},{"type":"paragraph","text":"[1]1938年6月13日，林伯渠致电毛泽东、洛甫（张闻天）等，报告西安一些国民党顽固分子以反共代替抗日，企图造成对日妥协局面，他建议党似应在陕甘宁边区的某些小问题上作可能的让步，以阻止对日妥协局面的出现。这是毛泽东和张闻天复林伯渠电的主要内容。"}],"authors":["毛泽东"],"dates":[{"year":1938,"month":6,"day":15}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":356,"page_end":356},"tags":[{"name":"毛泽东","type":"人物"},{"name":"张闻天","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d061f5cb61"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
