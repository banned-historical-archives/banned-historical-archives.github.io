script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"荷兰一极右翼头目遇刺身亡","authors":["冯坚"],"dates":[{"year":2002,"month":5,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"荷兰一极右翼头目遇刺身亡"},{"type":"paragraph","text":"新华社布鲁塞尔5月6日电（记者冯坚）荷兰一极右翼政党领导人皮姆·富图恩6日傍晚在阿姆斯特丹东南20公里的希尔弗瑟姆市遭不明身份枪手枪击后不治身亡。"},{"type":"paragraph","text":"据当地媒体报道，富图恩在接受一家电台的采访时在一个停车场遭到不明身份的枪手袭击，其头部、颈部和胸部共中6弹。有消息说，富图恩在上周曾收到恐吓电话和邮件。据目击者说，在停车场附近看到一名持枪分子被4人追赶。也有报道说，一名嫌疑人已被荷兰警方抓获。"},{"type":"paragraph","text":"枪杀事件发生后，荷兰首相维姆·科克立即中断在外地的竞选活动返回海牙。富图恩的政党主张对外国移民关闭边界，并对伊斯兰教进行攻击。该政党在最近的民意测验中得到了15％的选票，并在近日举行的鹿特丹地方选举中取得了惊人的进展。当地舆论认为，其领导的政党很可能在5月15日举行的大选中有不俗表现。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6d2387c925"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
