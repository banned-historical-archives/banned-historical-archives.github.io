":"浙江省高级人民法院刑事裁定书【张永生】","dates":[{"year":1979,"month":7,"day":5}],"is_range_date":false,"authors":["浙江省高级人民法院"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"《历史的审判（续集）》编辑组，历史的审判（续集），459-460","tags":[{"name":"裁定书","type":"主题/事件"},{"name":"反革命","type":"主题/事件"},{"name":"四人帮","type":"主题/事件"},{"name":"张永生","type":"主题/事件"}],"parts":[{"type":"title","text":"浙江省高级人民法院刑事裁定书"},{"type":"subtitle","text":"浙法（79）刑上字第21号"},{"type":"paragraph","text":"上诉人：张永生，男，39岁。安徽省含山县人，出身工人，成份学生。为现行反革命一案，不服杭州市中级人民法院杭法刑初字（79）第5号刑事判决，向本院提起上诉。"},{"type":"paragraph","text":"案经审核查明：原审认定上诉人张永生长期以来竭力追随林彪、“四人帮”反革命集团，纠集一小撮反革命分子、打砸抢分子、流氓阿飞等坏人，拼凑资产阶级帮派体系，大搞打砸抢，镇压革命干部和革命群众，私整中央领导同志的黑材料，诽谤、陷害老一辈无产阶级革命家和大批革命领导干部，疯狂进行篡党夺权的阴谋活动等一系列反党、反人民、反社会主义，妄图颠复无产阶级专政，复辟资本主义的反革命罪行，有目共睹，铁证如山。上诉人在上诉中的所谓：“不能把我过去积极追随和卖力执行林彪、‘四人帮’极左路线，所犯的严重错误和罪行都归咎于反革命性质加以定罪”，云云，纯属狡辩。原审人民法院遵照中华人民共和国惩治反革命条例第二条、第十条二、三款、第十七条之规定，以现行反革命罪判处上诉人无期徒刑，并剥夺政治权利终身，充分反映了广大群众的要求，完全正确，特此判决如下："},{"type":"paragraph","text":"上诉无理，予以驳回。"},{"type":"paragraph","text":"本判决系终审判决，不得上诉。"},{"type":"subtitle","text":"审判长 卢管彤"},{"type":"subtitle","text":"审判员 张松"},{"type":"subtitle","text":"审判员 沈沛源"},{"type":"subtitle","text":"一九七九年七月五日"},{"type":"subtitle","text":"书记员 殷美清"}],"alias":""},"tags":[{"name":"林彪","type":"人物"},{"name":"四人帮","type":"人物"},{"name":"浙江文革","type":"人物"},{"name":"夺权","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5920cc1e18"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
