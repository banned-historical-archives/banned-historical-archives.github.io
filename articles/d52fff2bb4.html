s":[{"year":1970,"month":12,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华伦敦八日电　十二万五千名英国电力工人七日开始进行怠工，抗议垄断资本对他们的残酷剥削，要求增加工资。"},{"type":"paragraph","text":"电力工人的怠工斗争，使英国的电力供应大大减少，政治和经济生活陷入一片混乱，西方通讯社惊呼:电力工人的斗争使“英国五分之一的地区变得一片漆黑”。火车停驶，伦敦及其它许多大城市的市内交通也由于指挥灯失灵而陷入混乱。"},{"type":"paragraph","text":"首先遭到打击的是英国的资产阶级宣传机器。由于电力不足，《泰晤士报》等许多资产阶级报纸八日无法出版；英国广播公司不得不撤销原定的许多节目。"},{"type":"paragraph","text":"英国垄断资本的工业生产和商业活动也受到严重影响。西方通讯社承认，电力工人的斗争使英格兰中部的工业区“遭到打击”，并且“可能使象钢铁工业这样的重要工业部门陷于瘫痪”。许多大商店由于电力不足而不得不关闭电气广告以及展览橱窗里的照明，有些商店只得干脆关门。"},{"type":"paragraph","text":"这种情况使英国统治集团十分恐慌。北爱尔兰当局因“普遍电力不足”，当天就宣布实行“紧急状态”。"},{"type":"paragraph","text":"目前，电力工人仍在坚持斗争。"}],"comments":[],"origin":"新华","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d52fff2bb4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
