）","authors":[],"dates":[{"year":1971,"month":8,"day":13}],"is_range_date":false,"parts":[{"text":"中共中央转发国务院“关于出版工作座谈会的报告”（概要）","type":"title"},{"text":"1971年3月15日至7月22日，国务院召开全国出版工作座谈会。全国出版部门和工农兵的代表参加了会议。会议原计划召开两周，因为面临许多复杂问题，延长4个多月才结束。周恩来于4月12日和6月24日两次接见会议代表，他说：“你们管出版的，要印一些历史书。”“现在书店里中国和外国的历史书都没有。不出历史、地理书籍，是个大缺点。”“不讲历史、割断历史怎么行呢？”“否定一切，不一分为二，这是极左思潮，不是毛泽东思想。”“那些把书都烧了的，还不是受极左思潮的影响？”《鲁迅全集》封起来干什么？这不是滑稽得很吗！”“一面说青年没书读，一面又不给他们书读，就是不相信青年人能判断。无怪现在没有书读了，这完全是思想垄断，不是社会主义民主。”座谈会提出了今后两三年内的出版计划，要求各地领导把出版工作列入议事日程，一年抓几次。目前，第一书记应抓一下出版工作。会议提出：出版部门应当健全各级“三结合”的领导班子，创造条件实行三分之一人员坚持工作，三分之一人员调查研究，三分之一人员下放劳动的“三三制”。会议期间，毛泽东批示同意了出版口领导小组关于《整理出版二十四史及（清史稿）的请示报告》。由于极左思潮的影响和张春桥、姚文元的直接插手，会议报告提出了关于出版战线的两个估计：文化大革命前的17年，出版战线是“反革命专政”，领导权被“资产阶级及其代理人”篡夺了。出版队伍中的大多数人世界观“基本上还是资产阶级的”。报告要求编辑队伍要“掺沙子”，吸收工农兵参加。8月13日，中共中央转发了经毛泽东批示同意的国务院《关于出版工作座谈会的报告》。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"革命三结合","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f96ffd767e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
