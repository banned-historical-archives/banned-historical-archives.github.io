art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"更加努力地学习毛主席著作","authors":["济南部队学习毛主席著作积极分子孙乐义"],"parts":[{"type":"paragraph","text":"我从广播中听到了党的八届十一中全会公报，受到了极大的鼓舞，增添了无穷的力量。我万分激动地高呼：“中国共产党万岁！”“毛主席万岁！万万岁！”"},{"type":"paragraph","text":"党的八届十中全会以来的四年间，我国人民在党和毛主席的领导下，在毛泽东思想指引下，高举革命大旗，在社会主义革命和社会主义建设中，在向帝国主义、现代修正主义以及各国反动派的斗争中，取得了伟大的胜利。党的八届十一中全会总结了这四年来的经验，再一次证明了毛泽东思想是革命胜利的旗帜。按毛泽东思想办事，就会无往而不胜。"},{"type":"paragraph","text":"我向亲爱的毛主席和党中央保证，我一定坚决遵循党的八届十一中全会号召，高举毛泽东思想伟大红旗，更加努力地学习毛主席著作，按毛主席的指示办事。我一定更加努力地按照林彪同志提出的带着问题学，活学活用，学用结合，急用先学，立竿见影，在用字上狠下功夫的方法去学。干一辈子革命，学一辈子毛主席著作，改造一辈子思想，为全中国人民和全世界人民服务一辈子。"},{"type":"paragraph","text":"在当前文化大革命中，毛主席号召我们，“要关心国家大事，要把无产阶级文化大革命进行到底”。我一定牢记毛主席的教导，提高阶级斗争观念，在阶级斗争的大风浪里，敢想、敢说、敢做、敢闯、敢革命，和全国人民、和全军同志一道，坚决把一切牛鬼蛇神斗垮斗臭。同时，在文化大革命中，更好地学习毛泽东思想，传播毛泽东思想，保卫毛泽东思想，把毛泽东思想伟大红旗举得更高更高！"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3f28a35d3a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
