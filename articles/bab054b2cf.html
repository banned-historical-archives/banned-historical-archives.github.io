art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"福建前线部队举行“红色尖刀连”命名大会部队负责人号召为创造更多的“红色尖刀连”式的四好连队而努力；“红色尖刀连”指战员决心牢记毛主席教导为党为人民作出更大贡献","authors":["谢纪"],"parts":[{"type":"paragraph","text":"新华社福建前线五日电 人民解放军福建前线部队今天下午隆重举行命名大会，根据国防部的命令，授予某部二连以“红色尖刀连”的光荣称号。"},{"type":"paragraph","text":"福建前线部队负责人刘培善、皮定钧、邓克明、卢胜、廖海光、詹化雨和各军种、兵种的负责同志，中共福建省委第二书记范式人，中共福建省委书记处书记、福建省省长魏金水，以及前线陆、海、空军的英雄连队、四好单位、五好战士的代表等，一千二百人出席了大会。"},{"type":"paragraph","text":"大会在庄严的国歌声中开始。刘培善在会上宣读了国防部授予某部二连以“红色尖刀连”称号的命令，并把国防部颁发的一面绣着“红色尖刀连”金字的锦旗授给二连。"},{"type":"paragraph","text":"福建前线部队负责人皮定钧在会上讲话。他号召福建前线各部队，广泛开展学习“红色尖刀连”的活动，用最坚决、最彻底的无产阶级革命精神，武装干部、战士的头脑，并把这一学习活动同对敌斗争、加强战备、创造四好连队的运动紧密结合起来，从而把四好运动开展得更深入、更扎实，为创造出更多的“红色尖刀连”式的四好连队而努力。"},{"type":"paragraph","text":"魏金水代表中共福建省委和福建省人民委员会向二连全体指战员和福建前线部队全体指战员致以热烈的祝贺。他说，二连处处当尖刀、打先锋的革命精神，不但是部队各单位学习的榜样，也是地方机关、工厂、公社、学校等一切单位学习的榜样。他着重指出，处在海防前线的福建省人民，一定要保持高度警惕，加强战备，全省广大民兵要积极配合人民解放军，筑起保卫祖国海防的铜墙铁壁，随时打击来犯的敌人。"},{"type":"paragraph","text":"二连指导员李维斌在会上代表全连指战员表示，今后，我们一定要牢记毛主席“虚心使人进步，骄傲使人落后”的教导，进一步加强连队建设，从实、从严、从难苦练杀敌本领，在保卫海防、对敌斗争和军事训练中，争取为党、为人民作出更大的贡献。"},{"type":"paragraph","text":"福建前线部队负责人刘培善同志把国防部颁发的“红色尖刀连”锦旗授给二连。"},{"type":"paragraph","text":"谢纪摄（传真照片）"}],"alias":""},"tags":[{"name":"福建文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bab054b2cf"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
