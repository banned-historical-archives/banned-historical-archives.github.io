[{"year":1991,"month":7,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社北京7月4日电　《毛泽东选集》第二版的出版发行在全国引起热烈反响，到目前为止，各地总订数已达700万套。"},{"type":"paragraph","text":"《毛泽东选集》的修订和再版，是全国人民政治生活中的一件大事，各地新华书店对此十分重视，他们在有关部门配合下，积极作好宣传、征订工作。山东、湖南、四川等省，订数都超过70万套。"},{"type":"paragraph","text":"本报讯　由中共中央文献编辑委员会修订的《毛泽东选集》一至四卷第二版七月一日起在本市各新华书店发行。几天来，已发行近四万套。"},{"type":"paragraph","text":"上海市新华书店各主要门市部都设有专柜专架，宣传征订新版《毛选》。他们还动员全部力量深入工厂、农村、部队、机关、学校，送书上门，深受欢迎。"}],"comments":[],"origin":"新华社,本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f411c6dece"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
