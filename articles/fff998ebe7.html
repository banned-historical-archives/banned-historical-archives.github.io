[{"year":1988,"month":1,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"第一个把毛泽东写进小说的作家"},{"type":"paragraph","text":"1929年，一位青年作家把毛泽东作为正面形象写进了小说，他就是徐雉。"},{"type":"paragraph","text":"在《嫌疑》这篇小说中，主人公因写了篇《毛泽东的名片》的文章而受到嫌疑和迫害。小说从侧面穿插写了北伐军驻扎南昌时，毛泽东来到第六军政治部探望林伯渠的轶事。毛泽东与小说主人公对话时的音容笑貌写得颇为传神。这个情节，是徐雉根据自己在国民革命军第六军政治部工作的经历写成的。文学史家认为，这是中国现代文学史的一段珍贵史料，是现代文学作品里第一次出现的毛泽东形象。"},{"type":"paragraph","text":"抗日战争爆发后，徐雉离开上海，到延安找到林伯渠，又投身革命队伍。他以后创作了一些战斗诗歌。他于1947年敌军进攻延安时，在转移中不幸病逝，埋骨陕北。"},{"type":"paragraph","text":"（摘自1987年12月31日《南京日报》许亚洲文）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fff998ebe7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
