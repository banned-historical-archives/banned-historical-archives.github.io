ical-archives/banned-historical-archives0/main/maoquanji30.pdf"],"article":{"title":"关于同意阻敌和兵力调动计划致彭德怀电","alias":"","parts":[{"type":"paragraph","text":"关于同意阻敌和兵力调动计划"},{"type":"paragraph","text":"致彭德怀电"},{"type":"paragraph","text":"（1951年5月31日）德怀同志，并告高："},{"type":"paragraph","text":"各电均悉。（一）你令各军坚决阻止敌人于金化、铁原、朔宁一线及其以南地带的计划，将四十二军主力调至伊川以东地区、将四十七军调至南川新幕地区的计划，都是很对的，望坚决执行。（二）杨成武两个军可即调动入朝，以一个军代替四十七军修飞机场兼顾海防，以一个军代替四十二军防卫元山方向的可能登陆。（三）为防正伪首都师由襄阳向北窜扰元山，必须使用一个有战斗力的师于高城通川之线，人民军有此力量否？（四）六十军一八○师的情况如何，甚以为念？"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"五月开一日二时[1]彭德怀，当时任中国人民志愿军司令员兼政治委员。[2]高，指高岗，当时任中国人民解放军东北军区司令员兼政治委员。"},{"type":"paragraph","text":"[3]该部在第五次战役第二阶段的作战中，因处置失当，被敌机械化部队包围于芝岩里地区，遭受了严重损失。"}],"authors":["毛泽东"],"dates":[{"year":1951,"month":5,"day":31}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":351,"page_end":351},"tags":[{"name":"毛泽东","type":"人物"},{"name":"彭德怀","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e29d190fbe"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
