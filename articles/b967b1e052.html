ical-archives/banned-historical-archives0/main/maoquanji47.pdf"],"article":{"title":"给田家英的信","alias":"","parts":[{"type":"paragraph","text":"给田家英的信"},{"type":"paragraph","text":"（1964年12月29日）田家英同志："},{"type":"paragraph","text":"近读《五代史》后唐庄宗传三垂冈战役，记起了年轻时曾读过一首咏史诗，忘记了是何代何人所作。请你一查，告我为盼！"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十二月二十九日"},{"type":"paragraph","text":"《三垂冈》诗一首：英雄立马起沙陀，奈此朱梁跋扈何。只手难扶唐社稷，连城犹（且）拥晋山河。风云帐下奇儿在，鼓角灯前老泪多。"},{"type":"paragraph","text":"萧瑟三垂冈下（畔）路，至今人唱百年歌。诗歌颂李克用交子。[1]田家英，当时任中共中央政治研究室副主任、毛泽东的秘书。[2]《三垂冈》这首诗为清朝诗人严遂成所作。"},{"type":"paragraph","text":"[3]李克用，唐朝沙陀部人，曾封为晋王。后其子李存建立后唐，他被尊为太祖。"}],"authors":["毛泽东"],"dates":[{"year":1964,"month":12,"day":29}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":365,"page_end":365},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b967b1e052"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
