ical-archives/banned-historical-archives0/main/maoquanji34.pdf"],"article":{"title":"毛泽东、周恩来祝贺阿尔巴尼亚解放十周年的电报","alias":"","parts":[{"type":"paragraph","text":"毛泽东、周恩来祝贺阿尔巴尼亚"},{"type":"paragraph","text":"解放十周年的电报"},{"type":"paragraph","text":"（1954年11月28日）阿尔巴尼亚人民共和国人民议会主席团主席哈奇·列希同志，阿尔巴尼亚人民共和国部长会议主席穆罕默德·谢胡同志，阿尔巴尼亚人民共和国外交部长贝哈尔·什图拉同志："},{"type":"paragraph","text":"值此阿尔巴尼亚解放十周年之际，我们代表中国人民和中华人民共和国政府谨向你们并通过你们向阿尔巴尼亚人民和阿尔巴尼亚人民共和国政府致衷心的、热烈的祝贺。"},{"type":"paragraph","text":"十年来，阿尔巴尼亚人民在阿尔巴尼亚劳动党和阿尔巴尼亚人民共和国政府的领导下，在政治、经济、文化各方面获得了巨大的成就。我们向阿尔巴尼亚政府和人民表示我们最好的祝望。"},{"type":"paragraph","text":"祝阿尔巴尼亚人民在为自己祖国繁荣发展和保卫世界和平而进行的斗争事业中获得更辉煌的成就。"},{"type":"paragraph","text":"中华人民共和国主席毛泽东中华人民共和国国务院总理兼外交部长周恩来一九五四年十一月二十八日于北京"}],"authors":["毛泽东"],"dates":[{"year":1954,"month":11,"day":28}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":356,"page_end":356},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"19ec842f75"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
