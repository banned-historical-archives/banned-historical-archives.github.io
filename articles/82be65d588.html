57,"month":11,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社莫斯科4日电】　毛泽东主席今天上午十二时(莫斯科时间)前往苏联共产党中央委员会拜会了苏联共产党中央委员会第一书记赫鲁晓夫。"},{"type":"paragraph","text":"拜会时在座的苏联方面有:苏联外交部第一副部长帕托利切夫、外交部副部长费德林、苏联驻中国大使尤金。"},{"type":"paragraph","text":"随同毛泽东主席拜会的有中国代表团团员宋庆龄、邓小平、彭德怀、郭沫若、李先念、乌兰夫、陆定一、陈伯达、沈雁冰、杨尚昆、胡乔木、刘晓、赛福鼎。"},{"type":"paragraph","text":"【新华社莫斯科4日电】　毛泽东主席今天下午一时十分(莫斯科时间)在克里姆林宫拜会了苏联最高苏维埃主席团主席伏罗希洛夫。"},{"type":"paragraph","text":"拜会时苏联方面在座的有苏联最高苏维埃主席团秘书格奥尔加泽、外交部第一副部长帕托利切夫、外交部副部长费德林、苏联驻中国大使尤金、外交部交际司副司长洛帕京科。"},{"type":"paragraph","text":"随同毛泽东主席拜会的有中国代表团团员宋庆龄、邓小平、彭德怀、郭沫若、李先念、乌兰夫、陆定一、陈伯达、沈雁冰、杨尚昆、胡乔木、刘晚、赛福鼎。"},{"type":"paragraph","text":"【新华社莫斯科4日电】　毛泽东主席今天下午六时(莫斯科时间)在克里姆林宫拜会了苏联部长会议主席布尔加宁。"},{"type":"paragraph","text":"拜会时苏联方面在座的有苏联外交部副部长费德林，苏联驻中国大使尤金，外交部远东司司长顾德夫。"},{"type":"paragraph","text":"随同毛泽东主席拜会的有中国代表团团员宋庆龄、邓小平、彭德怀、郭沫若、李先念、乌兰夫、陆定一、陈伯达、沈雁冰、杨尚昆、胡乔木、刘晓、赛福鼎。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"陈伯达","type":"人物"},{"name":"邓小平","type":"人物"},{"name":"李先念","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"胡乔木","type":"人物"},{"name":"陆定一","type":"人物"},{"name":"彭德怀","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"82be65d588"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
