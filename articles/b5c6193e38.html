的斗争抱消极态度","authors":[],"dates":[{"year":1955,"month":7,"day":8}],"is_range_date":false,"parts":[{"text":"抚顺市技术人员对肃清胡风反革命集团的斗争抱消极态度","type":"title"},{"text":"【辽宁分社八日电】抚顺市技术人员用各种方法逃避学习肃清胡风反革命集团斗争的文件。龙凤矿大夫和市立医院大夫、矿务局医院大夫一临到学习时就装病，至今一次也没有参加过学习。发电厂、建工局、工业局有些技术人员公开抗拒地说：为什么占业余时间学那玩艺？参加学习的技术人员也是形式主义。有的说看不懂胡风的材料，有的说与胡风无关，因而学习讨论会非常沉闷。","type":"paragraph"},{"text":"市委对这些人的学习感到很棘手，对反胡风反革命集团和镇反相结合的具体作法也不明确。目前学习停顿。","type":"paragraph"},{"text":" （张超）","type":"paragraph"}],"comments":[],"origin":"新华社《内部参考》1955年7月13日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b5c6193e38"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
