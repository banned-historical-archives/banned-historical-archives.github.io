tart":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"领导干部要虚心向战士学习","authors":["福州部队活学活用毛泽东思想积极分子/团长修立云"],"parts":[{"type":"paragraph","text":"领导干部职务越高，越要在深入实际、深入群众中虚心向战士学习，这是促进自身思想革命化的重要问题。"},{"type":"paragraph","text":"向战士学习，首先要平等待人，在思想上把自己摆在小学生的位置上。位置摆对了，就会有向战士学习的自觉性。今年年初，部队接受了加固海堤的任务，当时我在连队蹲点，就同战士们一起跳进水里挖泥挑泥。干了几天，浑身筋骨痛，很想歇歇劲。但是，战士们那种“只争朝夕”、“挖山不止”的革命精神，对自己触动很大，使我深受感动。晚上回来，我就带着活思想，反复学习毛主席关于干部参加劳动的教导，进一步增强了在革命实践中活学活用毛泽东思想、改造世界观的自觉性。"},{"type":"paragraph","text":"长期来，我坚持向战士学习，不断促进了自己的思想革命化。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6aa62b9815"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
