script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反对共同敌人帝国主义封建主义和官僚资产阶级　艾地号召加强民族团结进行重大改革","authors":[],"dates":[{"year":1962,"month":12,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反对共同敌人帝国主义封建主义和官僚资产阶级"},{"type":"paragraph","text":"艾地号召加强民族团结进行重大改革"},{"type":"paragraph","text":"新华社雅加达18日电　据印度尼西亚《人民日报》报道，印度尼西亚共产党主席艾地在16日和17日分别在万隆和展玉的群众大会上发表了讲话，再次强调指出团结一切民族力量来粉碎帝国主义和封建主义的重要性。"},{"type":"paragraph","text":"艾地在万隆举行的有数万人参加的群众大会上说，由于我们还面对着很强大的敌人，即美、英、日本和西德帝国主义、地主和他们的走狗以及官僚资产阶级，印度尼西亚革命中的民族统一战线因此是断然必要的，民族主义者、宗教信徒以及共产主义者三种力量必须成为民族合作的核心。"},{"type":"paragraph","text":"艾地说，在所有合法的政党之间建立民族统一战线并不等于把所有政党合并为一，各个政党将继续存在，让人民自己去选择。"},{"type":"paragraph","text":"艾地在这两次群众大会上都提到，只有通过建立三种力量的内阁并且在政治方面进行重大的改革，才能使不好的经济形势得到克服。"},{"type":"paragraph","text":"在展玉的集会上，艾地还说，拒绝三种力量等于是拒绝通向社会主义的和平道路、等于是在国内鼓吹相互倾轧，这种争吵的顶点将是发生内战。如果发生这种情况，那只是对帝国主义者有利。"},{"type":"paragraph","text":"艾地在谈到国际问题时，号召人民尽最大努力来支援文莱人民目前进行的正义斗争。他说，帝国主义仍将继续利用“马来西亚”计划来包围印度尼西亚这支新兴力量，因为它不能再用旧的方法了。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e45ba311a1"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
