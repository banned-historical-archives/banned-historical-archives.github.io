ical-archives/banned-historical-archives8/main/maoquanji15.pdf"],"article":{"title":"向蒋介石交涉新四军北移路线","alias":"","parts":[{"type":"paragraph","text":"向蒋介石交涉新四军北移路线1]"},{"type":"paragraph","text":"（1940年12月25日）周、叶："},{"type":"paragraph","text":"据项英称：“顾祝同忽令新四军改道繁、铜渡江，而李品仙在江北布防堵截，皖南顽军复暗中包围，阻我交通，南岸须通过敌人封锁线，江中须避敌艇袭击，非假以时日分批偷渡则不能渡，势将进返两难”等语，请速向蒋交涉下列各点，并速告结果："},{"type":"paragraph","text":"（1）须分苏南，繁、铜两路北移。（2）须有两个月时间，若断若续分批偷渡。（3）皖南军队不得包围，不得阻碍交通。"},{"type":"paragraph","text":"（4）皖北军队由巢、无、和、含四县撤退，由张云逸派队接防，掩护渡江。"},{"type":"paragraph","text":"（5）保证不受李品仙袭击。（6）弹药及开拔费从速发下。"},{"type":"paragraph","text":"毛朱"},{"type":"paragraph","text":"二十五日[1这是毛泽东和朱德关于向蒋介石交涉北移路线给周恩来、叶剑英的"}],"authors":["毛泽东"],"dates":[{"year":1940,"month":12,"day":25}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":294,"page_end":294},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f2ea6e19e1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
