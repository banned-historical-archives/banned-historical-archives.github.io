script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"克服右倾错误思想大胆深入敌后活动　修获地武十天歼敌八十","authors":["王振彪"],"dates":[{"year":1947,"month":12,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"克服右倾错误思想大胆深入敌后活动"},{"type":"paragraph","text":"修获地武十天歼敌八十"},{"type":"paragraph","text":"【本报讯】修获地方武装结合民兵轮战队，向敌展开小股武装活动，平抑敌进犯抢粮凶焰。修获敌人不断扰乱内地，向博爱卜冒、石专芹、上庄，焦作南苟村、大小寨进行奔袭，捕我民兵村干，抢掠粮食，部分群众表现恐惧情绪，以致影响秋屯工作。该区地方武装随即结合民兵轮战队，展开武装小股活动，伸入敌腹心地区，打击敌人。经十天战斗，毙敌七名，伤敌二十名，活捉五十九名（内少校军需一名），缴步枪九枝，夺回牲口五十三头，羊八只。几次战斗后，打破了战士中对敌人估计过高的错误认识，稳定了群众情绪，开展了地方工作，蒋匪侵占区不少村子都纷纷向我接头，交反攻粮。在战斗中体会到走群众路线是打胜仗的好办法，如侦察班开始几天，没有成绩，大家感到苦闷，后来开“诸葛亮”会，大家讨论，大家想办法，信心提高，一出去，就捉了三个活的。并获得以下几点经验：（一）勇敢大胆的接敌活动，否则不能达到小部队活动的目的。（二）机敏沈着，随机应变，不死守成规，声东击西，忽南忽北，跳跃式的活动，并掌握敌人规律。（三）结合政攻，小股武装深入敌区后，随即利用宣传、喊话等办法，瓦解敌人。（王振彪）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bd8541bfba"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
