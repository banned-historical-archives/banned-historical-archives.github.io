s":[],"dates":[{"year":1969,"month":3,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　本市一千余名半工半读、中专技校应届毕业生，狠批大叛徒、大内奸、大工贼刘少奇的“读书做官论”、“下乡镀金论”、“半工半读特殊论”等修正主义谬论，牢记伟大领袖毛主席“知识青年到农村去，接受贫下中农的再教育，很有必要”的教导，手捧宝书、肩背行装，分批奔赴江西省农村插队落户。临别前夕，他们纷纷向毛主席献忠心，表决心。本报收到不少半工半读、中专技校毕业生的来信、来稿，这里摘要发表一部分。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"江西文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"10badc7c9a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
