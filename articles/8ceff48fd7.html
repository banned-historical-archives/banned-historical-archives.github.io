art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"周恩来总理和惠特拉姆总理继续会谈澳大利亚贵宾应邀出席文艺晚会；由邓小平姬鹏飞吴德等陪同观看革命现代《白毛女》","authors":[],"parts":[{"type":"paragraph","text":"新华社一九七三年十一月一日讯 周恩来总理和惠特拉姆总理今天下午在友好的气氛中继续举行会谈。"},{"type":"paragraph","text":"澳大利亚方面参加会谈的有：费思棻、基思·沃勒、艾伦·菲利普·雷诺夫、威廉斯基、高德瑞、白丽珍。"},{"type":"paragraph","text":"中国方面参加会谈的有：姬鹏飞、王国权、王海容、吴凡吾、高建中、沈若芸、唐闻生、蔡再杜、胡凤仙、路绍芬。"},{"type":"paragraph","text":"新华社一九七三年十一月一日讯 澳大利亚总理爱德华·高夫·惠特拉姆和夫人等澳大利亚贵宾，今天晚上应邀出席文艺晚会，观看了中国舞剧团演出的革命现代舞剧《白毛女》。"},{"type":"paragraph","text":"澳大利亚驻中国大使费思棻和夫人以及大使馆外交官员应邀出席。"},{"type":"paragraph","text":"陪同澳大利亚贵宾观看演出的有国务院副总理邓小平，外交部长姬鹏飞和许寒冰同志，北京市革命委员会主任吴德，国务院文化组成员吴印咸，中国驻澳大利亚大使王国权和常玉林同志。"},{"type":"paragraph","text":"演员们的演出，受到贵宾们和全场观众的热烈鼓掌欢迎。演出结束时，惠特拉姆总理和夫人等贵宾由邓小平副总理等陪同走上舞台，同演员们握手，祝贺演出成功，并向他们赠送了花篮。"},{"type":"paragraph","text":"今天的文艺晚会是由北京市革命委员会主办的。"}],"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"邓小平","type":"人物"},{"name":"吴德","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8ceff48fd7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
