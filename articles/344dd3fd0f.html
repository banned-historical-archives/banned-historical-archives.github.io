ical-archives/banned-historical-archives0/main/maoquanji47.pdf"],"article":{"title":"关于开发攀枝花铁矿和鄂西铁矿问题的批语","alias":"","parts":[{"type":"paragraph","text":"关于开发攀枝花铁矿和鄂西铁矿问题的批语！"},{"type":"paragraph","text":"（1965年1月）同意总理意见。"},{"type":"paragraph","text":"[1]这个批语写在国务院副总理兼国家计划委员会主任李富春1964年12月31日和国务院副总理、中国人民解放军总参谋长罗瑞卿1965年1月2日关于开发攀枝花铁矿和鄂西铁矿问题的意见的打印件上。李富春将国家计委1964年12月30日关于鄂西地区铁矿资源情况的简报送毛泽东、刘少奇、周恩来、邓小平、彭真、薄一波、陈伯达、罗瑞卿、余秋里阅看，并写上了自己的意见：“从鄂西铁矿的情况看，向我们提出了一个问题，即攀枝花铁矿和鄂西铁矿都要开发，但究竟以何者为先、为快，很值得研究。现已要冶金部积极地进一步了解情况，并做开发前的准备工作，再作全面比较。”"},{"type":"paragraph","text":"[2]周恩来总理1965年1月7日在这个打印件上批的意见是：“开发攀枝花的战略方针早定，错在推迟了战役部署。现在西南三线第一个战役已经开始，不应再有动摇。开发鄂西铁矿应与豫西铁矿和湘西以及武汉的工业联在一起，另组成一个战略单位或方面，进行勘察和部署，不要拿它与开发攀枝花作比较。我提议这一战略方面由王任重挂帅，计、经委抽一人为副，其余同意罗、余、薄的意见。”罗瑞卿的意见是：“如果两者能同时并举固好，但如有困难，必须先搞攀枝花。同时并举如需要分次序，也应把攀枝花放在首位。这是大的战略问题，不能再变了，也不要再受别的影响推迟了。”余秋毛泽东全集第四十七卷里的意见是：“总的，我认为攀枝花一定要放在首位，即便鄂条件好些，估计也可能部署得开。我准备迅速约有关同志研究此问题。”薄一波的意见是：“应力争攀枝花和长阳同时并举。矿山和铁路同时并举。攀枝花区矿山铁路已经部署了，应积极进行。”"}],"authors":["毛泽东"],"dates":[{"year":1965,"month":1}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":474,"page_end":475},"tags":[{"name":"周恩来","type":"人物"},{"name":"李富春","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"薄一波","type":"人物"},{"name":"罗瑞卿","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"344dd3fd0f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
