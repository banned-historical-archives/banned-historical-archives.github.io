,"dates":[{"year":1981,"month":10,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"叶剑英委员长赵紫阳总理"},{"type":"paragraph","text":"热烈祝贺亚洲议员人口和发展会议"},{"type":"paragraph","text":"本报讯　叶剑英委员长、赵紫阳总理致信热烈祝贺即将在北京召开的亚洲议员人口和发展会议。贺信全文如下：亚洲议员人口和发展会议："},{"type":"paragraph","text":"值此亚洲议员人口和发展会议召开之际，我们代表中国人大常委会、中国政府和中国人民向大会致以最热烈的祝贺。"},{"type":"paragraph","text":"我们所在的亚洲，人口众多、资源丰富、幅员辽阔，人民勤劳而智慧。现在，亚洲多数国家面临着维护主权和独立、加快建设自己国家的任务，面临着如何使人口与经济发展相协调的问题。这次20多个国家的议员们和专家们齐聚一堂，讨论人口与发展问题，交流经验。取长补短，这是合乎时宜和适应亚洲广大人民的要求的。亚洲人口和发展问题如能得到很好的协调，不仅有利于发展我们各国的经济和逐步提高人民的物质和文化生活的水平，而且对于整个世界的人口趋势、对于世界经济的发展，都会起重要的影响。衷心祝愿会议取得圆满的成功。"},{"type":"paragraph","text":"中华人民共和国全国人民代表大会常务委员会委员长  叶剑英"},{"type":"paragraph","text":"中华人民共和国国务院总理  赵紫阳"},{"type":"paragraph","text":"1981年10月20日于北京"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"赵紫阳","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ef24b5b3ac"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
