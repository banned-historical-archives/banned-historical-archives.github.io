script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"苏修“援助”为名掠夺是实派出代表团赴印策划加紧剥削印人民","authors":[],"dates":[{"year":1968,"month":12,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社北京电　新德里消息:苏修叛徒集团最近派了一个代表团到印度活动，竭力挽救在印度的苏“援”工厂日益破产的命运，并且策划进一步利用这些工厂剥削印度人民。"},{"type":"paragraph","text":"在印度反动政府加紧出卖民族利益的情况下，苏修打着“帮助”印度“发展民族经济”的招牌，在印度修建了一些大型重工业工厂。这些厂都办得很糟，开工率很低，产品销不出去。这充分暴露出，苏修“帮助”印度反动派修建这些工厂，根本不是为了印度经济的实际需要，而是为了向印度倾销重工业设备，榨取印度人民的血汗。"},{"type":"paragraph","text":"由苏修对外经济联络委员会主席斯卡奇科夫率领的代表团，已经在印度活动了三个星期。这个代表团十日同印度反动政府的一些部长举行了会谈。苏修方面要印度政府增加苏“援”工厂的生产。印度方面表示，这些工厂的产品在印度销售不掉，增产是不合算的。苏修代表团则要印度政府设法寻找国外市场。当印度官员哀求苏修也购买一部分产品时，苏修方面马上暴露出损人利己的真面目，表示他们只能出比其他任何买主都低的价钱。"},{"type":"paragraph","text":"苏“援”工厂的黑幕，印度反动政府瞒也瞒不住。十三日，印度议会中一些议员也吵吵闹闹地说，苏“援”兰奇重型机械厂的管理很差，生产不协调，生产方法落后，成本观念缺乏；这个工厂总是要求投入更多资金，但是没有任何收益。印度工业发展部长阿·艾哈迈德却连忙奴颜婢膝地替苏修主子打掩护，说这个工厂办得不好不怪苏修，而是由于印度“资源有困难”。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9a8d72ee29"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
