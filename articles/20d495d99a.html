uthors":["江自昌","胡伟强"],"dates":[{"year":1998,"month":2,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"广州日报2月11日报道(胡伟强　江自昌)前天花都市花东镇派出所民警接到求救，赶到该镇某石场将黄秋林、许春高等10个非法拘禁劳工的可疑人员抓获，解救了来自内蒙古、四川、湖南、河南等地的17名民工。至此，一宗发生在九十年代的“现代奴隶案”告破。"},{"type":"paragraph","text":"向警方求救的外地民工名叫宋玉生，春节期间休假来广东游玩，没想到竟因此当了几天“奴隶”。宋玉生回忆说:年初九这天，他在三元里附近碰到正在那里“招工”的黄秋林，当天晚上被领到花东镇某石场。"},{"type":"paragraph","text":"一进石场，宋玉生马上就失去了人身自由，10多人挤住在一间不足18平方米的小房里，连拉屎拉尿也不准出屋，房门反锁着，还有2个打手昼夜看守。石场每天劳动超过10个小时。收工马上就被关进房子里，连洗澡都不准出屋门。吃的是工头们的剩饭剩汤，遭遇与奴隶社会的奴隶没什么两样。有一次，“奴隶”们实在忍受不了，奋起与工头论理，工头就伙同打手用木棒拷打他们，同室一名民工逃跑被抓回后还被打破了头。"},{"type":"paragraph","text":"宋玉生对此非法行径，实在难以忍受，苦苦哀求无效后，遂以绝食抗议。岂料工头没有半点人性，非但不予置理，还恶狠狠地把他押到离石场半公里的一个村落，要他打电话叫家人寄300元来“赎身”。在无计可施的情况下，宋玉生只好服用过量的去痛片和消炎药，将胃刺激出血。工头怕已经胃出血的宋玉生死在石场，不好收拾，在关押了3天之后，于本月8日(年十二)将他赶出石场。"},{"type":"paragraph","text":"从湖南被骗来这里“打工”的朱治平拉起裤腿指着腿部几处伤痕愤怒地告诉记者说，他年初一就从车站被骗来了这里，共被强迫当了12天“奴隶”，总计装卸石块达300多车，劳动时动作稍慢，就被拳打脚踢。令人发指的是，这17个“奴隶”干了十几天，一分工钱没拿到，反而被告知各欠工头“介绍费”、“车费”62元，还要家里寄钱来“赎身”。当17名“奴隶”被警方解救时，个个热泪盈眶，并对报警的宋玉生及接报后迅速到石场解救他们的民警，表示深深的感谢。"}],"comments":[],"origin":"广州日报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"湖南文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"20d495d99a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
