960,"month":6,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席会见列希主席"},{"type":"paragraph","text":"新华社杭州7日电　毛泽东主席今天下午在杭州会见了阿尔巴尼亚人民共和国人民议会主席团主席哈奇·列希，同时还会见了阿尔巴尼亚人民议会主席团委员、阿尔巴尼亚劳动党中央政治局委员、书记处书记利丽·贝利绍娃，人民议会副主席列夫特·戈加，外交部副部长瓦西里·纳塔奈利等贵宾。"},{"type":"paragraph","text":"会见时，毛泽东主席同哈奇·列希主席、利丽·贝利绍娃等贵宾，进行了亲切友好的谈话。"},{"type":"paragraph","text":"会见时在座的，有国务院副总理习仲勋、全国人民代表大会常务委员会副委员长赛福鼎、中共中央书记处候补书记杨尚昆、外交部副部长姬鹏飞、我国驻阿尔巴尼亚大使罗士高等。"},{"type":"paragraph","text":"会见时，阿尔巴尼亚驻中国大使帕里夫蒂也在座。（附图片）"},{"type":"paragraph","text":"毛泽东主席在杭州会见阿尔巴尼亚人民共和国人民议会主席团主席哈奇·列希和阿尔巴尼亚劳动党中央政治局委员、书记处书记利丽·贝利绍娃。图为会见后合影　新华社记者　侯波　郑小箴摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"862c8dea65"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
