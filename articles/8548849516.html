script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"抗议美军当局进行残酷剥削和压迫  冲绳工人连续展开罢工斗争","authors":[],"dates":[{"year":1972,"month":1,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"抗议美军当局进行残酷剥削和压迫"},{"type":"paragraph","text":"冲绳工人连续展开罢工斗争"},{"type":"paragraph","text":"据新华社一九七二年一月十九日讯　据东方通讯社报道：广大的冲绳工人最近连续展开英勇的罢工斗争，抗议美军当局加紧对日本工人进行残酷剥削和压迫。"},{"type":"paragraph","text":"在嘉手纳，属于全冲绳军事基地工会空军分会的将近一千名工人，从一月十二日开始进行了历时三天的罢工，抗议美军当局以缩短工时、加强劳动强度等手段来任意克扣工人工资的无耻行径。到了十四日，全冲绳军事基地工会空军分会参加罢工的会员已经有两千四百多人。他们举行了集会。工人代表在会上严厉谴责美军当局对冲绳人民的残酷统治和压迫，同时表示要同其他军事基地的工人联合起来，加强斗争。"},{"type":"paragraph","text":"在这次罢工之前，从去年十二月三十日到今年一月一日，一千五百多名在美军两个俱乐部工作的工人，举行了七十二小时的罢工并进行示威游行，抗议美军当局随意解雇工人的行径。"},{"type":"paragraph","text":"此外，琉球公共汽车公司八百多名工人也从十四日早晨起举行了四十八小时罢工。（附图片）"},{"type":"paragraph","text":"日本广大工人集会示威，反对佐藤反动政府强行通过“归还”冲绳协定。图为到东京参加示威的冲绳工人代表。　传真照片（新华社发）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8548849516"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
