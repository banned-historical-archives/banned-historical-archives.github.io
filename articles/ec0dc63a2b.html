script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"自觉抵制资产阶级思想的腐蚀","authors":[],"dates":[{"year":1973,"month":11,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"向明中学中三(2)班红卫兵排"},{"type":"paragraph","text":"目前，我们正在进一步学习十大文件，深入开展批林整风运动，广大革命青年都受到了一次深刻的路线教育。在大好形势下，我们还必须清醒地认识到，被打倒的一切剥削阶级，总要通过各种渠道，采取各种手段，用资产阶级思想来腐蚀我们青年。"},{"type":"paragraph","text":"近来，在一些青年中，理“波浪式发型”、穿“喇叭式裤子”，嘴上叼烟、走路流里流气以及拍怪式照片等等不正之风有所抬头。虽然这些怪现象发生在少数青年身上，但是却反映了资产阶级腐朽的生活方式和思想作风正在毒害青年一代。这是很值得引起我们注意的。"},{"type":"paragraph","text":"阶级斗争的实践告诉我们，阶级敌人为了复辟资本主义，总是大肆散布资产阶级的毒素，用资产阶级生活方式和思想作风来侵蚀广大青年，我们必须牢记党的基本路线，提高识别能力，自觉抵制资产阶级思想的腐蚀。"},{"type":"paragraph","text":"叛徒、卖国贼林彪出于颠覆无产阶级专政、复辟资本主义的需要，竭力鼓吹“小节无害”的谬论。我们要认识“无害”背后深藏着复辟的“大害”。我们要彻底批判它，肃清它的流毒。"},{"type":"paragraph","text":"我们应该经常想到我们处在一个伟大的时代，经常想到作为这个时代的青年应负的责任和应挑的重担。伟大领袖毛主席对我们青年寄予无限的希望。我们不能辜负毛主席、党中央对青年的期望。我们青年应该集中精力学习政治，学习科学知识，学会搞革命、搞建设的本领，坚决地勇敢地为社会主义的伟大事业而奋斗!"},{"type":"paragraph","text":"党的十大提出要批判修正主义，批判资产阶级世界观。在这场斗争中，我们自卫兵要发扬“五敢”精神，坚决抵制资产阶级思想的腐蚀，象南京路上好八连的指战员那样，拒腐蚀，永不站，坚定地沿着毛主席指引的方向胜利前进。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ec0dc63a2b"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
