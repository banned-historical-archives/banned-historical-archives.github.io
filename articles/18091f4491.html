,"dates":[{"year":1977,"month":3,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京一九七七年三月二十九日电　中华人民共和国国务院总理华国锋，三月二十九日打电报给佐勒菲卡尔·阿里·布托，热烈祝贺他再次荣任巴基斯坦伊斯兰共和国总理。电报全文如下:"},{"type":"paragraph","text":"拉瓦尔品第"},{"type":"paragraph","text":"巴基斯坦伊斯兰共和国总理"},{"type":"paragraph","text":"佐勒菲卡尔·阿里·布托阁下:"},{"type":"paragraph","text":"在你再次荣任巴基斯坦伊斯兰共和国总理之际，我谨代表中国政府和人民并以我个人的名义向阁下表示热烈的祝贺。"},{"type":"paragraph","text":"祝巴基斯坦政府和人民在阁下领导下，在捍卫民族独立和国家主权、发展民族经济和建设自己国家的神圣事业中不断取得新的成就。"},{"type":"paragraph","text":"祝中巴两国人民的深厚传统友谊和友好合作关系进一步巩固和发展。"},{"type":"paragraph","text":"中华人民共和国国务院总理　华国锋"},{"type":"paragraph","text":"一九七七年三月二十九日于北京"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"华国锋","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"18091f4491"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
