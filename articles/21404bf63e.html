art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"黑板报","authors":[],"parts":[{"type":"paragraph","text":"毛主席会见罗党中央代表团"},{"type":"paragraph","text":"十日下午，毛主席会见罗马尼亚工人党中央委员会代表团团长毛雷尔及全体成员，同他们进行了友好的谈话。晚上，毛主席设宴招待他们。会见时在场和出席宴会的有刘少奇、邓小平等同志。北京部队学习郭兴福有创造有发展"},{"type":"paragraph","text":"最近，叶剑英元帅、罗瑞卿大将，分别观看了北京部队几个“尖子”分队的单兵冲击、实弹射击、捕俘动作和密语通话表演，并且称赞他们在学习和运用郭兴福教学方法中有创造，有发展。希望他们今后好上加好，争取后来居上。"},{"type":"paragraph","text":"女“秀才”黄顺玉向驻京官兵作学习毛主席著作心得报告"},{"type":"paragraph","text":"九日，山沟里的女“秀才”黄顺玉，向驻京官兵作了学习毛主席著作心得的报告。五个孩子的妈妈、生产队妇女队长黄顺玉，是朝鲜族人，共产党员。她只在解放后上过一年夜校，但却十多年如一日地坚持学习毛主席著作，向群众宣传毛泽东思想。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"21404bf63e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
