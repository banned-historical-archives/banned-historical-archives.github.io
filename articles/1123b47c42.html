art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东送子上“劳动大学”","authors":[],"parts":[{"type":"paragraph","text":"1946年2月，毛主席的大儿子毛岸英从莫斯科大学毕业后回到延安。一天下午，岸英来到王家坪，向爸爸汇报在国外学习的情况。"},{"type":"paragraph","text":"毛主席笑着问：“你在苏联经常读中国书吗？”"},{"type":"paragraph","text":"“经常读。”岸英回答，“读过《红楼梦》、《水浒》，还有鲁迅先生的作品……”"},{"type":"paragraph","text":"毛主席点了点头，说：“还好，应当知道中国的知识，更要懂得中国的革命知识。”说到这里，毛主席脸上流露出郑重而严肃的表情说：“你在苏联的大学毕业了，但学的只是书本上的知识，只是知识的一半。这是不完全的。你还需要上另一个大学，这个大学中国过去没有，外国也没有，这就是‘劳动大学’。在这个大学里可以学到许多书本上学不到的知识，送你去好吗？”"},{"type":"paragraph","text":"“好，很好！”岸英很爽快地答道。"},{"type":"paragraph","text":"不几天，岸英背着小米、菜籽和被子要去吴家枣园上“劳动大学”。临走时，毛主席把自己打过补钉的一套灰布衣服给他穿上，一再嘱咐他到了乡下要和农民同吃同住同劳动，虚心向群众学习。"},{"type":"paragraph","text":"（摘自1982年第十四期黑龙江《支部生活》）RW：毛泽东"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1123b47c42"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
