{"year":1984,"month":11,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"彻底否定“文革”与“议大事”"},{"type":"paragraph","text":"石角"},{"type":"paragraph","text":"某机关党委在组织党员认真学习党的十二届三中全会《决定》时，注意引导党员彻底否定“文革”。该机关一位领导干部竟不以为然地说：“当前不是提倡‘议大事’吗？还提那些陈芝麻烂谷子干什么！”很清楚，这位领导干部的言下之意是：彻底否定“文革”是小事，不值得一议。"},{"type":"paragraph","text":"改革经济体制关系国家前途和人民利益，学习讨论党中央的《决定》，当然是目前的大事。但是，为了把这件大事学深议透，就需要继续清除“左”的流毒，彻底否定“文革”。因为，“文革”中“左”的那一套，是同《决定》的精神根本对立的，少数干部至今还没有从“左”的那一套解放出来。而不彻底否定“文革”，就很难弄懂弄通《决定》。从这个意义上来说，彻底否定“文革”，也是为改革作准备，是“议大事”。"},{"type":"paragraph","text":"一些第一期整党单位的实践证明，彻底否定“文革”的教育，对于消除派性，团结一致搞四化，有着十分重要意义。因此，在整党中还没有搞彻底否定“文革”教育的单位，应该补上这一课。把学习《决定》和否定“文革”对立起来的说法和做法，都是不对的。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"派性","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8e52b7cc00"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
