script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"追击资产阶级右派分子工会领导机关展开斗争","authors":[],"dates":[{"year":1957,"month":8,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【据新华社北京5日电】　反击资产阶级右派分子的斗争在中华全国总工会、各产业工会全国委员会，以及全总所属的在北京的文化、教育、出版单位中广泛展开。"},{"type":"paragraph","text":"现在，许多单位都召开各种大小会议，并且通过大字报、黑板报等，对这些资产阶级右派分子展开反击。全总干部学校在校长、副校长亲自主持下，驳斥了文化教研室教员、资产阶级右派分子郑焕宇、张曾三、丁勋的反动谬论的同时，还揭发出一个反党小集团。由于这个集团的被揭发，集团中原来非常隐蔽的骨干分子已经惶恐无策。工人出版社的工作人员也接连开过八次会议，批驳企图成立“海德公园”来进行反党的资产阶级右派分子王青的言行。现在王青已经低头认罪，并且揭露了幕后人鼓动他进行反党活动的情况。为了彻底批判资产阶级右派分子的各种反共反社会主义谬论，使广大群众认清他们的丑恶面目，各单位都坚持运用批判说理的方式，用道理和事实来驳倒右派分子。"},{"type":"paragraph","text":"根据各单位运动进行的情况，现在还有少数产业工会全国委员会的领导干部对斗争不够重视，认为工会系统中大多数干部是工人出身的，不会有多少资产阶级右派分子。全总党组在不久前曾经召开扩大会议，对以上的情况进行了检查，并且对反右派斗争不够重视的单位提出了批评。目前这些单位已有了转变，运动正在向深入开展。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"54bbd2ed89"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
