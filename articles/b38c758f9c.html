ical-archives/banned-historical-archives8/main/maoquanji11.pdf"],"article":{"title":"恢复军队中政治委员及政治机关制度","alias":"","parts":[{"type":"paragraph","text":"恢复军队中政治委员及政治机关制度！"},{"type":"paragraph","text":"（1937年10月22日）朱、彭、任、邓，并告周："},{"type":"paragraph","text":"关于恢复政治委员及政治机关原有制度，我们完全同意，请即速令执行。惟党代表名义不妥，仍应名为政治委员。将来国民党采用党代表制时，我军方可改为党代表。"},{"type":"paragraph","text":"洛毛"},{"type":"paragraph","text":"二十二日"},{"type":"paragraph","text":"[1]这是毛泽东和洛甫（张闻天）给朱德、彭德怀、任弼时、邓小平并告周恩来的电报。1937年10月19日朱德、彭德怀和任弼时给中央的电报说，部队改编后，政治工作人员的地位、职权降低，使政治工作及部队建设受到了损失。为此，建议：团以上或独立营执行党代表制度，争取党代表名义公开，职权与过去的政委相同，负责保证党的路线与上级命令之执行，对政治工作有最后决定权。旅设政治处，各旅单独行动时，可临时派遣营党代表，并由团政治处分配一部分工作人员在党代表指挥下进行政治工作，师政治处改为政治部，连为指导员。军政委员会书记，如不是党代表兼职，则党代表应任副书记职。级师面6今快人意见·春数单一学长健汉上七由地川来衣捷头·能的机组注上讲功迁从比得统影的在事值仁快之要·盘化节波法银的金0g"},{"type":"paragraph","text":"的代"},{"type":"paragraph","text":"1937年10月22日，中共中央和中央军委发布的《在八路军各师恢复政治委员制度和政治部名称的决定》。"}],"authors":["毛泽东"],"dates":[{"year":1937,"month":10,"day":22}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":315,"page_end":316},"tags":[{"name":"毛泽东","type":"人物"},{"name":"朱德","type":"人物"},{"name":"彭德怀","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b38c758f9c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
