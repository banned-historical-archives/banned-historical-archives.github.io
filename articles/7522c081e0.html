<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"自称革命十八年纯是谎话　李则纲原来是李品仙的爪牙","authors":[],"dates":[{"year":1957,"month":9,"day":16}],"is_range_date":false,"parts":[{"text":"自称革命十八年纯是谎话　李则纲原来是李品仙的爪牙","type":"title"},{"text":"《人民日报》合肥１５日电：安徽省文化局副局长、省博物馆馆长、民盟中央候补委员李则纲的伪装最近被剥下来，现出了原形。","type":"paragraph"},{"text":"人民日报发表“这是为什么”的社论后，李则纲就借机进行攻击，说“一千二百万党员中也有人会写这封信”（指社论中提到的卢郁文接到的匿名信）。他对肃反运动极端不满，说“文化局冤枉好人，违法乱纪”。他为什么这样仇视肃反运动呢？原来在肃反中被关和被斗争的拒不交代的反革命分子，都是他想尽办法安置到博物馆来的亲信，其中还有自封“政务院总理”的现行反革命分子。","type":"paragraph"},{"text":"这个自称“革命十八年”、“忠心耿耿，热爱共产党”的李则纲，却原来在大革命时期就追随章伯钧当了逃兵。从１９３９年到解放前夕，他投靠统治安徽的李匪品仙，担任李品仙的私人顾问、伪省府咨议、参议委员等职，还历任伪省文化工作委员会、伪豫鄂皖边区党政分会文化工作委员会、伪省抗战史料征集委员会及伪省文献会等反共文化组织的采集股主任、副主任。他利用这些伪职，积极收集反革命文件和我党政军情况，并举办过所谓国民党领导抗日胜利和李品仙“治皖功绩”的展览，又撰写“李主席治皖实录”为李品仙歌功颂德。","type":"paragraph"},{"text":"解放初期，李则纲指使其亲信擅自销毁大批伪档案；烧掉国民党区分部的全部档案，并把收藏的部分反革命文件暗中抽掉或涂改。","type":"paragraph"},{"text":"李则纲在土改期间窝藏过地主。直到现在他还隐瞒他的国民党区分部书记和伪省戡乱动员委员会委员等反动身份。","type":"paragraph"},{"text":"最近，省博物馆在清理文物仓库中又发现步枪、暗杀武器、手榴弹及各种军用刀达五十件；还有国民党旗两面。关于这些武器，在解放后不久，政府就已发觉，要他移交给军区，而他却拖到１９５５年才将李品仙在１９４７年拨给伪文献会“保管”的一部分武器交出，但仍私行留下一部分武器和国民党旗，放在他的文物仓库中。","type":"paragraph"},{"text":" 来源：《人民日报》1957年9月16日。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7522c081e0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
