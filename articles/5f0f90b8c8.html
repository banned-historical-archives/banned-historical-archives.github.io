art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"学到做到一心为公——贺相魁同志活学活用毛主席著作的故事","authors":[],"parts":[{"type":"paragraph","text":"编者按："},{"type":"paragraph","text":"贺相魁在学习毛主席著作中，给自己提出的行动口号是：学一点，做一点，学到做到，不放空炮。他老老实实地学，扎扎实实地用。他抓住为人民服务这个根本问题，反复学，反复用。他学得最深的是《为人民服务》、《纪念白求恩》和《愚公移山》，记得最牢的是“完全”“彻底”为人民服务，做得最好的是公而忘私。因此，在平时，他为人民干啥爱啥，处处拣重担子挑；在危急情况下，他为人民奋不顾身，“就是粉身碎骨，也心甘情愿”。"},{"type":"paragraph","text":"毛主席教导我们：“对于马克思主义的理论，要能够精通它、应用它，精通的目的全在于应用。”我们学习毛主席著作就应该象贺相魁同志那样，“学到做到，不放空炮”，在“用”字上狠下功夫。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5f0f90b8c8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
