" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji12","name":"毛泽东全集第12卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji12.pdf"],"article":{"title":"对八路军留守兵团负责干部的讲话","alias":"","parts":[{"type":"paragraph","text":"对八路军留守兵团负责干部的讲话!"},{"type":"paragraph","text":"（1938年7月16日）"},{"type":"paragraph","text":"在全国是以运动战为主，游击战为辅。但在部分时间、地点和军队，如在抗战第一阶段华北的八路军，是以游击战为主，运动战为辅。这个方针去年八月中央政治局会议便提出来，“基本上的游击战，但不放松有利条件下的运动战”。一年来证明，去年八月政治局会议的决定是正确的。"},{"type":"paragraph","text":"一"},{"type":"paragraph","text":"部队高级十部是发命令的，同时又要团结十部。人有积极的和消极的两个方面，领导主要应当注意和发扬干部和群众的积极方面，消极的批评和斗争少一点。发扬人家的长处，不要夸大坏处。这一点，陈云同志是值得我们学习的。"},{"type":"paragraph","text":"[1]本篇一是毛泽东接见八路军留守兵团负责干部时关于抗战的战略方针讲话的一部分；本篇二是关于领导方法讲话的一部分。"}],"authors":["毛泽东"],"dates":[{"year":1938,"month":7,"day":16}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":400,"page_end":400},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9ce2a028f0"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
