":1981,"month":2,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"赵紫阳拜访泰国前总理克立"},{"type":"paragraph","text":"新华社曼谷2月1日电  赵紫阳总理今天上午前往曼谷幽静的萱普鲁巷，拜访了泰国前总理克立·巴莫亲王。"},{"type":"paragraph","text":"69岁的克立站在他的泰式木楼前同赵紫阳热烈握手，表示欢迎。"},{"type":"paragraph","text":"赵紫阳说：“你是中国的老朋友，见到你非常高兴。”克立说：“赵总理到我家来，我感到非常高兴和自豪。”"},{"type":"paragraph","text":"克立把赵紫阳总理一行请进他的有近二百年历史的用柚木构筑的会客室里畅叙友情。"},{"type":"paragraph","text":"赵紫阳回忆说：“在1975年，亲王阁下去中国时，我在广东接待过你，并在一个荔枝园品尝过荔枝。”"},{"type":"paragraph","text":"克立说：“我至今记忆犹新。”"},{"type":"paragraph","text":"赵紫阳说：“在你去中国与中国建立外交关系之后，你又两次去中国访问，为进一步发展两国人民的友好关系而继续努力。对于克立亲王为中泰两国人民友好所作出的贡献，中国永远不会忘记。”"},{"type":"paragraph","text":"克立说：“促进两国人民友好，这是我们的义务。我们要继续为此而努力。赵总理这次来访，进一步加强了两国人民的友好关系。”他满怀信心地说：“泰中两国人民的友好关系今后一定会得到进一步发展和加强，这不仅对我们两国人民有利，而且对本地区的和平与稳定起着重要作用。”赵紫阳高兴地对克立说：“这次我与炳总理谈得很好，很成功。”“我们到处受到泰国人民的热情接待。我感到，泰国人民对中国人民怀有特别亲切的感情。中国人民对泰国人民也怀有同样的感情。”"},{"type":"paragraph","text":"克立不断点头，并说：“我三次去中国，对这一点，我有亲身体会。”"},{"type":"paragraph","text":"赵紫阳在告别时，特地向克立转达了邓小平副主席和邓颖超副委员长对他的亲切问候。克立表示感谢。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"赵紫阳","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3c48f3e08a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
