ical-archives/banned-historical-archives0/main/maoquanji42.pdf"],"article":{"title":"关于改变庐山会议人员分组办法的建议","alias":"","parts":[{"type":"paragraph","text":"关于改变庐山会议！人员分组办法的建议"},{"type":"paragraph","text":"（1959年7月16日）少奇、恩来、尚昆同志："},{"type":"paragraph","text":"建议北京来的同志参加各大区小组的，即日改换一下，例如：参加华东小组的，改为参加中南、华南联合小组或他区，参加西北小组的改为参加华东或他处，如此类推。今日立即排出一个新表，明日起，照新表办事。这样做，见闻将广博多了，可能大有益处。至于各区省委书记，是否也应有一部分人（例如一半或三分之一），也照此样，改入他区，以广见闻，请你们酌定，我无定见。是否由你们找各大区区长及中央少数同志，座谈一下，以利决定？谈一个钟头就够了。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"七月十六日上午六时[1]指当时正在庐山举行的中共中央政治局扩大会议。[2]尚昆，即杨尚昆，当时任中共中央书记处候补书记、中央办公厅主任。"}],"authors":["毛泽东"],"dates":[{"year":1959,"month":7,"day":16}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":189,"page_end":189},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0ab8c3cb95"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
