"dates":[{"year":1967,"month":3,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"高举毛泽东思想伟大红旗  夺取革命、生产双胜利"},{"type":"paragraph","text":"毛主席提出，在需要夺权的那些地方和单位，必须实行革命的“三结合”的方针，建立一个革命的、有代表性的、有无产阶级权威的临时权力机构。这个权力机构的名称，叫革命委员会好。这是山西省“三结合”的临时权力机构——山西省革命委员会的常委在集体学习毛主席著作。"},{"type":"paragraph","text":"贵阳棉纺厂的无产阶级革命派在伟大的毛泽东思想的指导下，实行了按部门的大联合，革命和生产都出现了新面貌。前纺乙班各革命派组织的成员组成联合战斗队后，正满怀信心地夺取革命和生产的双胜利。"},{"type":"paragraph","text":"全国著名的劳动模范陈永贵（前左二）、李顺达（中）、解悦（前右二），坚决响应伟大领袖毛主席“你们要关心国家大事，要把无产阶级文化大革命进行到底！”的号召，积极投入文化大革命的洪流中。图为他们和无产阶级革命派战友在一起的情形。"},{"type":"paragraph","text":"无产阶级革命派工人遵照毛主席“抓革命，促生产”的教导，坚守生产岗位，粉碎经济主义，为夺权斗争做出了出色的贡献。这是哈尔滨林业机械厂的无产阶级革命派工人在生产岗位上。"},{"type":"paragraph","text":"革命的领导干部站出来，和革命群众一起闹革命。上海求新造船厂副厂长陆忠义（右三），是厂革命委员会的委页。他深入群众，和革命职工一起研究，一起劳动，受到了群众的欢迎。"},{"type":"paragraph","text":"上海拖拉机制造厂的无产阶级革命派，坚决响应毛主席的伟大号召，大抓革命，狠促生产，以战斗的姿态，争分夺秒生产拖拉机，支援春耕生产。这是一批小型拖拉机正在试车，准备出厂。"},{"type":"paragraph","text":"驻山东省人民解放军指战员，坚决响应毛主席的伟大号召，以实际行动支持春耕生产。他们以高度的政治热情和社员一起深翻土地。"},{"type":"paragraph","text":"《青岛日报》供稿"},{"type":"paragraph","text":"黑龙江省勃利县双河人民公社兴安大队的革命农民，以冲天的革命干劲战胜严寒，抓紧时机往田里送粪。这个大队在文化大革命高潮中，备耕工作搞的又快又好，粪肥的数量比去年多，质量也比去年好。"},{"type":"paragraph","text":"（本版图片除署名者外均为新华社记者摄）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"山西文革","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"革命委员会","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5f9b9df079"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
