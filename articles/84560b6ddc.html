对现行反革命犯陈文立的刑事判决书","authors":[],"dates":[{"year":1969,"month":1,"day":25}],"is_range_date":false,"parts":[{"text":"中国人民解放军上海市公检法军事管制委员会徐汇区军管组对现行反革命犯陈文立的刑事判决书","type":"title"},{"text":"现行反革命犯陈文立，男，28岁，广东中山县人，家庭出身资产阶级，本人成份学生，无业，住新华路354号。","type":"paragraph"},{"text":"现行反革命犯陈文立，系资产阶级子弟，解放以来思想一贯反动，对社会主义刻骨仇恨，陈犯于1956年以来一贯收听敌台广播，到处散布谣言，为帝、修、反摇旗呐喊。自无产阶级文化大革命以来，同首犯唐千根相勾结，积极网罗反革命成员，结成现行反革命集团，陈犯猖狂的攻击污蔑社会主义制度，攻击污蔑光焰无际的毛泽东思想，恶毒污蔑我们伟大领袖毛主席和以毛主席为首、林副主席为副的无产阶级司令部。罪行严重。陈犯在案发后还订立攻守同盟，抗拒交代。","type":"paragraph"},{"text":"上述罪行，经查证确凿，根据中共中央、国务院《关于在无产阶级文化大革命中加强公安工作的若干规定》，特判决如下：","type":"paragraph"},{"text":"依法判处反革命犯陈文立有期徒刑15年。","type":"paragraph"},{"text":" 中国人民解放军上海市公检法军事管制委员会徐汇区军管组1969年1月25日","type":"paragraph"}],"comments":[],"origin":"根据档案材料翻印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"84560b6ddc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
