e":"中共中央组织部关于确定部分老同志待遇问题的意见","dates":[{"year":1984,"month":3,"day":17}],"is_range_date":false,"authors":["中共中央组织部"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"中共山西省委组织部, 干审工作文件选编, 442-444","tags":[{"name":"待遇","type":"主题/事件"},{"name":"干部","type":"主题/事件"},{"name":"老干部","type":"主题/事件"}],"parts":[{"type":"paragraph","text":"中共中央组织部关于确定部分老同志待遇问题的意见"},{"type":"subtitle","text":"中组发〔1984〕4号"},{"type":"paragraph","text":"三、符合下列条件之一的干部，可以享受副部长级医疗或住房待遇：1、一九三七年七月六日以前参加革命工作，“文化大革命”前担任过正局长级职务，“文化大革命”前行政十级的；2、一九三八年十二月三十一日以前参加革命工作，“文化大革命”前担任过正局长级职务，行政九级的；3、一九三七年七月六日以前参加革命工作，转业前在军队担任过副军级职务，“文化大革命”前行政十级的；一九三八年十二月三十一日以前参加革命工作，转业前在军队担任过正军级职务，“文化大革命”前行政十级的。四、在省、市、自治区工作的部分老同志，参照以上原则确定其待遇。五、根据国务院办公厅一九八三年五月二十三日第39号文件转发的劳动人事部《关于中央和国家机关离休干部生活待遇问题的补充规定》精神，对已批准提高待遇的老同志用车等问题，按上列原则掌握；原已配有专车的，待遇不变；按副部长级待遇的，不配专职秘书，不配专车，保证用车。六、按部长、副部长级待遇和享受副部长级医疗或住房待遇的，要经过部、委党组申报，其中按副部长级待遇和享受副部长级医疗或住房待遇的，报中央组织部审批；按部长级待遇的，报中央审批。省、市、自治区需要提高待遇的干部，可参照此办法办理。"},{"type":"paragraph","text":"一九八四年三月十七日"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c55a74d3dd"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
