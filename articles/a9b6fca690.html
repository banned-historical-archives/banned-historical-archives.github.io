script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"《修养》是杀人不见血的软刀子交大受蒙蔽的干部控诉奴隶主义","authors":[],"dates":[{"year":1967,"month":4,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"上海交通大学一些受资产阶级反动路线蒙蔽的干部和学生，也举行座谈会控诉《修养》的毒害。他们说，过去把《修养》当作做人的典范标准，按照《修养》的要求，处处为自己考虑，“吃小亏占大便宜”，越读《修养》，个人主义越扩大，逐渐取得了“合法”的地位。"},{"type":"paragraph","text":"这些同志着重谈到，《修养》一个很大毒害是灌输奴隶主义。《修养》说什么“党的干部和党的领导人，更应该是党和无产阶级的一般利益的具体代表者”，竭力要我们盲目地服从上级的领导，以为“上级就是党”。套上了这个沉重的精神枷锁以后，一些党政干部对上级迷信、迎合，成为百依百顺的驯服工具；对下级和群众就轻视、压制，以党的化身自居。在文化大革命中，革命学生对资产阶级反动路线的做法提出指责，但我们还认为群众不对，坚持《修养》中提倡的“要坚持原则”，服从“党的需要”。当群众批评我们贯彻资产阶级反动路线时，又按《修养》提倡的“委曲求全”、“忍受各种误解和屈辱而毫无怨恨之心”，来自我安慰。并且还捡起《修养》中“党内外有别”等大棒向革命派打去，成为群众运动的对立面。这些同志说，《修养》是革命人民精神上的鸦片，是包着蜜糖的毒药，是杀人不见血的软刀子。我们一定要用毛泽东思想把这株大毒草批深批透批倒批臭!"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a9b6fca690"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
