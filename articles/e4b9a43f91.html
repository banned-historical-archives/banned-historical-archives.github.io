" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji15","name":"毛泽东全集第15卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji15.pdf"],"article":{"title":"对巩固发展苏北根据地及扩大整训武装的指示","alias":"","parts":[{"type":"paragraph","text":"对巩固发展苏北根据地及扩大整训武装的指示！"},{"type":"paragraph","text":"（1940年5月23日）胡服、陈毅、克诚、雪枫、云逸："},{"type":"paragraph","text":"（一）胡服、雪枫两号电均悉。"},{"type":"paragraph","text":"（二）目前重点在苏北，其次才是淮北与皖东，故陈、黄两部及一一五师增加之两个团，目前均应集中于苏北，加紧整训扩大，努力巩固苏北根据地，并准备于蒋介石真正向我淮北皖东进攻时，首先解决韩德勤最后由中央决定，第二步才向淮北皖东出动，这是胡服前电意见，我们认为是恰当的。"},{"type":"paragraph","text":"（三）目前淮北与皖东须由雪枫与云逸所部独立支持之，无论敌人或顽军进攻，均用游击战争与之周旋，不要希望任何增援，华北增援不可能，也不适当。"},{"type":"paragraph","text":"（四）在蒋介石没有真正投降以前，向我大举进攻是不可能的，因为他没有便利的战场。因此你们一方面要认真准备对付蒋介石的进攻，决不可能松懈自己的准备。但另一方面，也要晓得蒋介石的困难，他的困难甚多，没有便利战场即是其一，敌占涡阳蒙城后，这个困难更增加了。所以你们很可以利用时机要积极准备一切，包"},{"type":"paragraph","text":"[1]这是毛泽东和朱德、王稼祥给胡服（刘少奇)、陈毅、黄克诚、彭雪括扩大整训军队，巩固与发展根据地。"},{"type":"paragraph","text":"（五）你们的军队愈扩大，愈精强，你们的根据地愈发展，愈巩固，任何进攻都是不怕的，故认真扩大与整训军队，认真发展与巩固根据地，就是粉碎任何进攻的可靠资本。"},{"type":"paragraph","text":"（六）自前敌人正向涡河以西进攻，正是雪枫区域扩大整训军队发展巩固根据地的有利时机，皖东区域，除以有力一部对付莫德宏部的侵入并派得力人去指挥外，亦应照此方针布置。"},{"type":"paragraph","text":"（七）要扩兵与巩固根据地，就要发动基本群众，而要发动基本群众，必须给群众以利益，必须镇压反动分子。在这里是两方面的任务，一方面要顾到党派的与社会的统一战线政策，要预防过左倾向，另方面对于妨碍我们发动基本群众的反动分子必须予以坚决的镇压（当然不是每个都杀死），否则发动群众与巩固根据地是不可能的，对于土匪必须加以剿除。"},{"type":"paragraph","text":"毛朱王漾辰延安"}],"authors":["毛泽东"],"dates":[{"year":1940,"month":5,"day":23}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":57,"page_end":58},"tags":[{"name":"陈毅","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e4b9a43f91"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
