art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"紧跟毛主席把文化大革命进行到底","authors":["炮兵机关无产阶级革命派"],"parts":[{"type":"paragraph","text":"在无产阶级文化大革命节节胜利的凯歌声中，世界无产阶级的伟大导师、我们心中最红最红的红太阳毛主席和他最亲密的战友林副统师接见了我们。毛主席身体非常非常健康，精力非常非常充沛，这是全中国和全世界人民最大最大的幸福！当毛主席迈着矫健的步伐向我们走来的时候，我们激动的心情无法抑制，幸福的热泪无法控制，千言万语表达不尽我们对伟大统帅毛主席无限热爱、无限信仰、无限崇拜，无限忠诚的感情。"},{"type":"paragraph","text":"最敬爱的毛主席，我们深深感到，做一个无产阶级革命战士，就是要无限忠于您，无限忠于您的伟大思想，无限忠于您的无产阶级革命路线。"},{"type":"paragraph","text":"最敬爱的毛主席，您教导我们：“千万不要忘记阶级斗争。”在您的英明领导下，广大革命群众开展了对以中国赫鲁晓夫为首的一小撮走资派的革命大批判，使他们成了人人喊打的过街老鼠。但阶级斗争并没有结束，阶级敌人决不甘心于他们的失败，他们一定要寻找各种机会进行反扑，我们决不松懈自己的战斗意志。我们坚决贯彻执行您的亲密战友林副主席的极其重要的指示。我们一定要紧跟您的伟大战略部署，把无产阶级文化大革命进行到底。"}],"alias":""},"tags":[{"name":"革命大批判","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d16d17f872"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
