阮文煊热情赞扬我国文化大革命取得伟大胜利","authors":[],"dates":[{"year":1967,"month":9,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"对外友协和中越友协饯别越中友协代表团"},{"type":"paragraph","text":"楚图南说中国人民坚决支援越南人民抗美到底  阮文煊热情赞扬我国文化大革命取得伟大胜利"},{"type":"paragraph","text":"据新华社十五日讯对外友协、中越友协今天晚上举行招待会，欢送由阮文煊、何桂率领的越中友协代表团，祝贺代表团的这次访问，对增进中越两国人民的兄弟友谊和战斗团结作出了贡献。"},{"type":"paragraph","text":"对外友协会长楚图南在招待会上讲话，再次热烈赞扬越南人民在抗美救国战争中取得的辉煌胜利。他祝愿兄弟的越南人民在今后的斗争中，不断地发挥决战决胜的英雄气概和人民战争的威力，直到取得最后的胜利。他说，不管遇到什么惊涛骇浪，中国人民决心支援越南人民把抗美救国战争进行到底。"},{"type":"paragraph","text":"楚图南还谈到我国无产阶级文化大革命的大好形势。"},{"type":"paragraph","text":"阮文煊团长在讲话中感谢中国政府和中国人民真诚地把代表团看作是回到后方来的前方的兄弟和同志。他说，我们决心把越南人民的可靠后方——伟大的七亿中国人民的热情关怀和可贵的鼓舞，带给越南人民，为彻底打败美国侵略者奋斗到底。"},{"type":"paragraph","text":"阮文煊团长在讲话中热情地赞扬了中国人民在毛主席和中国共产党的领导下所取得的伟大成就，祝愿中国无产阶级文化大革命取得更加伟大的胜利。"},{"type":"paragraph","text":"我国有关方面负责人张奚若、丁西林、韩念龙出席了招待会。应邀出席的有越南驻中国大使馆临时代办黎终始，越南南方民族解放阵线常驻中国代表团代表黎松山等。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"人民战争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c6bfd234f3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
