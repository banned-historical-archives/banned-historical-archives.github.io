art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"揭露老挝极右集团的险恶用心","authors":[],"parts":[{"type":"paragraph","text":"据新华社一九七三年八月十七日讯 巴特寮电台八月十六日广播了一篇评论，揭露老挝萨纳尼空极右集团破坏老挝和平与和睦的险恶用心。"},{"type":"paragraph","text":"评论说，近几天来，萨纳尼空极右集团竭力活动，更加明目张胆和疯狂地阻挠关于万象协定的议定书的签订。在万象谈判中，他们指使萨纳尼空集团中的人士推翻双方已达成的协议，提出好多新问题，来阻挠谈判。与此同时，他们还派遣以乌敦·萨纳尼空为首的一小撮好战将领四出活动，企图发动政变。评论指出，最近，萨纳尼空极右集团与国外反动势力相勾结，把特务、间谍和刺客引进老挝，企图制造政治危机，继续在老挝推行破坏和平和反对民族和睦的计划。"},{"type":"paragraph","text":"评论说，和平与和睦是老挝人民的强烈愿望。萨纳尼空极右集团企图阻挠人民愿望的实现，阻止社会进步，必将被历史车轮碾得粉碎。他们反对和平、阻挠签订议定书所进行的活动，不仅是徒劳的，而且必将遭到人民的严厉惩罚。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"04e6f6c5db"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
