script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji12","name":"毛泽东全集第12卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji12.pdf"],"article":{"title":"刘伯承师徐海东旅宜位于同蒲路东侧","alias":"","parts":[{"type":"paragraph","text":"刘伯承师徐海东旅宜位于同蒲路东侧！"},{"type":"paragraph","text":"（1938年3月29日）朱、彭："},{"type":"paragraph","text":"依此时敌我情况，河南、安徽、潼关、西安乃至武汉有很快发生严重变化的可能，同时敌确有进攻陕北在政治上打击共产党之计划。因此，刘师徐旅两部宜位于同蒲东侧，依太岳山脉为根据，发动民众，袭击同蒲路，配合林贺两师，打击普西之敌，并便于向西转移为合宜。"},{"type":"paragraph","text":"毛"},{"type":"paragraph","text":"二十九日[1]这是毛泽东给朱德、彭德怀的电报。[2]潼关，在陕西省潼关县北，当陕西、山西、河南三省要冲。"},{"type":"paragraph","text":"[3]刘师，指八路军第一二九师，师长刘伯承。徐旅，指八路军第一一五师第三四四旅，旅长徐海东。"},{"type":"paragraph","text":"[4]林贺两师，指八路军第一一五师和第一二○师，师长分别为林彪（此时由陈光代）和贺龙。"}],"authors":["毛泽东"],"dates":[{"year":1938,"month":3,"day":29}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":124,"page_end":124},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"82d1432549"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
