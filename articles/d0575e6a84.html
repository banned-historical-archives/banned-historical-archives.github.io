ors":[],"dates":[{"year":1968,"month":5,"day":31}],"is_range_date":false,"parts":[{"type":"paragraph","text":"在祖国文化大革命伟大胜利的影响下  流窜云南境外一批蒋残匪官兵投诚归来"},{"type":"paragraph","text":"投诚人员对人民解放军边防部队给予他们的宽大待遇，表示十分感激"},{"type":"paragraph","text":"新华社昆明三十日电　流窜在云南境外的蒋残匪官兵四十七人，在祖国无产阶级文化大革命取得伟大胜利的影响下，不愿继续为美帝国主义和蒋匪帮卖命，最近先后携械回国，向我人民解放军云南边防部队投诚。"},{"type":"paragraph","text":"这批投诚人员中有大队长一名，副大队长一名，副中队长一名，正副区队长六名。他们带回六○炮一门，轻机枪一挺，长短枪三十三支，子弹三千余发。"},{"type":"paragraph","text":"五月二十三日，人民解放军边防部队在云南省某地召开群众大会，欢迎这批投诚人员。会上，根据人民政府对蒋军投诚人员“不究既往”和“立功者受奖”的政策，分别发给了他们奖金。投诚人员对人民解放军边防部队给予他们的宽大待遇，表示十分感激。"},{"type":"paragraph","text":"今年一月份以来，还另有流窜在云南境外的蒋残匪官兵十六人先后向我人民解放军云南边防部队投诚。这批投诚人员共携回轻机枪一挺、长短枪五支、子弹一百九十一发。我人民解放军边防部队也给予了他们宽大待遇。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"云南文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d0575e6a84"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
