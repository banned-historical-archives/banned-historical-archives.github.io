art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"热情宣传毛泽东思想","authors":["宣红思而轩"],"parts":[{"type":"paragraph","text":"人人都当毛泽东思想宣传员"},{"type":"paragraph","text":"六○四八部队电影组，把宣传毛泽东思想当成自己的神圣职责。当无产阶级文化大革命进入无产阶级革命派夺权斗争的新阶段，我们伟大领袖毛主席发出了人民解放军应该积极支持左派广大群众的伟大战斗号召。电影组的同志们兴高采烈地抬着毛主席画像，用小推车推着发电机、广播器材，深入连队和农村，热情地宣传毛泽东思想，宣传以毛主席为代表的无产阶级革命路线，宣传毛主席提出的“抓革命，促生产”的伟大方针。广大革命群众对他们表示热烈欢迎，说：“解放军电影组真是毛泽东思想的宣传组。我们一定要按毛主席的指示办事，挑起革命和生产两副重担。”"},{"type":"paragraph","text":"（宣红）"},{"type":"paragraph","text":"既放映电影又搞幻灯工作"},{"type":"paragraph","text":"为了紧密配合无产阶级文化大革命的新形势，积极搞好幻灯放映工作，七六○四部队电影组组织所属部队部分放映员边集训、边实习，及时地培养绘制、解说和放映幻灯片的骨干。参加集训的放映员进一步明确了宣传毛泽东思想是每一个放映员的崇高职责，人人争取在无产阶级文化大革命中立新功。目前，许多电影组正紧密结合无产阶级文化大革命的形势，千方百计地绘制幻灯片，广泛展开宣传活动。"},{"type":"paragraph","text":"（思而轩）"},{"type":"paragraph","text":"辅导连队开展幻灯活动"},{"type":"paragraph","text":"三○一七部队电影组，为了紧密配合两条路线斗争的教育，在连队大力开展幻灯活动。他们辅导连队幻灯工作骨干自编、自画、自己放映幻灯，并且不断辅导连队提高幻灯片的思想性。在电影组的组织和帮助下，全团展开了一个大力宣传毛主席的无产阶级革命路线的幻灯活动。通过开展幻灯活动，形象生动地歌颂了毛主席的无产阶级革命路线的伟大胜利。这样的幻灯，受到了连队干部战士的热烈欢迎。同志们进一步加强了对毛主席的无产阶级革命路线无限热爱的阶级感情。大家决心坚定不移地按照毛主席指引的革命方向，胜利前进。"},{"type":"paragraph","text":"（红士报道组）"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"两条路线斗争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"71c457885a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
