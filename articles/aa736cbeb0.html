<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"wenji3","type":"pdf","name":"毛泽东文集第三卷（1999）","internal":false,"official":true,"author":"中央文献研究室","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/wenji3.pdf"],"article":{"title":"对华中部队整训的意见","description":"根据中央档案馆保存的抄件刊印。","dates":[{"year":1944,"month":8,"day":22}],"parts":[{"text":"对华中部队整训的意见","type":"title"},{"type":"appellation","text":"饶、张、赖："},{"type":"paragraph","text":"十四日电悉。"},{"type":"paragraph","text":"（一）华中部队整训应着重练兵、带兵、养兵、用兵四大项，而以练兵为中心。可参考张宗逊关于冬季练兵的总结报告。其中经验，打破陈规，采用兵教兵、官教兵、兵教官群众运动的练兵办法，是突破历史的新创造。华中各地，应令在职的团级及团级以上干部，有十天左右时间讨论这种练兵新法，使他们学会练兵，保证获得优异的练兵成绩。练兵内容，着重提高战斗技术，着重把投弹、射击、刺杀、土工作业四大基本技术练好。同时，在干部中还应讨论带兵，去创造新的管理方法；讨论养兵，去保证增加生产，改善待遇，增强体力；讨论用兵，去增强作战指挥方法。这四样是当务之急，能在一年内解决得好，我军战斗力可提高数倍，便利去应付战局变化的需要。开这种练兵会，或在军部开会，或在各地分组开，应就便去做，负责师、旅干部应亲自主持。"},{"type":"paragraph","text":"（二）关于培养团级干部，军部可办团级训练队，或称军事整风班亦可，吸收离职的旅、团级干部，并选一部优秀营级干部参加，时间不宜太长，课程可定为战术学、兵器学、筑城学、地形学、管理教育（带兵、练兵、养兵等军事行政事项）五大项，以提高干部的指挥艺术为中心。关于战术学习，最好采用总结过去战例的互相批评的整风座谈办法，就是要学生报告自己的作战经验，或提出若干问题让学生发表意见，举行辩论之后，然后加以总结。这种根据实践的启发式的具体学习，最合我军干部的需要。以前照本宣科的办法，既不易注入，且难切合实际。延安抗大，正准备冬季开办抗大教员训练班，先教好教员，四个月后再回去教学生，其课程也是上述几项。教员，此间无人派来，应由你们自己负责作教员，或在学生中培养和选拔教员，或即用学生教学生、发挥特长、学习特长的新办法，或就华中现有旧军人材，加以改造，作为教学助手。延安军教人材亦感缺乏，因此全靠你们自己负责去解决。"},{"type":"paragraph","text":"（三）关于特种兵人员，如工兵之类，可在各抗大开办训练班。关于使用新武器、掌握新技术等教育，目前暂不强调，如果我们把练兵、带兵、养兵以及战术基础，做得很深入巩固，到了有新兵器之时，再来学习使用，也来得及的。"},{"type":"paragraph","text":"以上提议，请你们按实况实施之。"},{"type":"paragraph","text":"毛、刘、陈"},{"type":"paragraph","text":"未养"}],"comment_pivots":[{"part_idx":0,"offset":10,"index":1},{"part_idx":1,"offset":5,"index":2},{"part_idx":3,"offset":41,"index":3},{"part_idx":7,"offset":5,"index":4}],"is_range_date":false,"authors":["毛泽东"],"comments":["由毛泽东、刘少奇、陈毅署名的这份电报的原稿，是由当时在延安的陈毅起草的。毛泽东在审阅时作了修改。修改后他写信给陈毅，谈了几点意见：“中央整训指示中有用兵一项，今年当然不能强调，应以练兵为主，但应提及。整训指示又规定一年整训主要靠今冬完成，因不但明春春耕到来后练不成，且恐时局变动得快，故团级以上干部讨论练兵办法不宜过久，去冬边区只用五天讨论五天下操，即完成了练兵动员。又高级训练班时间亦不宜太长，以便应付时局。”","饶，指饶漱石，当时任中共中央华中局代理书记、新四军代理政治委员。张，指张云逸（一八九二——一九七四），广东文昌（今属海南）人，当时任新四军副军长。赖，指赖传珠（一九一○——一九六五），江西赣县人，当时任新四军参谋长。","张宗逊，一九○八年生，陕西渭南人。当时任八路军第一二○师第三五八旅旅长。","陈，指陈毅，当时任新四军代理军长，已到延安准备出席中国共产党第七次全国代表大会，受中央委托与刘少奇共同指导华中地区新四军的工作。"],"page_start":214,"page_end":215,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"aa736cbeb0"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
