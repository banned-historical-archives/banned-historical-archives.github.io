ical-archives/banned-historical-archives8/main/maoquanji20.pdf"],"article":{"title":"赵尔陆即率部兼程至临城地区叫","alias":"","parts":[{"type":"paragraph","text":"赵尔陆即率部兼程至临城地区！"},{"type":"paragraph","text":"（1945年10月30日）赵尔陆，并告聂、萧，刘、邓："},{"type":"paragraph","text":"三十、四十、新八等军被我刘邓包围于邯郸地区，正激战中，胡宗南?令石家庄十六军三个师全部南援。我为坚决歼灭被围之敌然后歼灭援敌之目的，改变对赵部部署，赵尔陆同志接电后，即率六个主力团兼程向南，进至高邑西南临城附近接受刘邓命令，俟任务完毕再移平北。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"酉三十[1]这是毛泽东为中共中央军委起草的给冀晋军区司令员赵尔陆的电报。"},{"type":"paragraph","text":"[2]聂、萧，指聂荣臻、萧克，当时分别任晋察冀军区司令员兼政治委员和副司令员。刘、邓，指刘伯承、邓小平，当时分别任晋冀鲁豫军区司令员和政治委员。"},{"type":"paragraph","text":"[3]胡宗南，当时任国民党军第一战区司令长官。"}],"authors":["毛泽东"],"dates":[{"year":1945,"month":10,"day":30}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":488,"page_end":488},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6086465f82"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
