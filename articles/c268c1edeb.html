ical-archives/banned-historical-archives8/main/maoquanji10.pdf"],"article":{"title":"在中共中央政治局常委会议上的讲话","alias":"","parts":[{"type":"paragraph","text":"在中共中央政治局常委会议上的讲话！"},{"type":"paragraph","text":"（1937年6月24日）"},{"type":"paragraph","text":"关于各省工作问题，如果我们在各省的领导弱，讲统一，国民党不发钱，就要发生很大困难。所以还是较缓进行，我们派人弄通了再说。首先要各省变更政策，执行新政策，变更对地主的政策、土地政策。如果军事上敌人进攻，就坚决地打，俟大局定了，不会妨碍我们的军队，我们即可与之协商改编办法。原则上苏区归我们办，红军归我们办，各地都要弄好关系。但对国民党采用经济上限制、硬要缴枪等事，须与之抵抗。基本原则是不能减弱我们的力量。"},{"type":"paragraph","text":"[1]这是毛泽东在中共中央政治局常委会议关于各省工作和红军改编等问题讲话的一部分。"}],"authors":["毛泽东"],"dates":[{"year":1937,"month":6,"day":24}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":386,"page_end":386},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c268c1edeb"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
