script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"wenji7","type":"pdf","name":"毛泽东文集第七卷（1999）","internal":false,"official":true,"author":"中央文献研究室","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/wenji7.pdf"],"article":{"title":"艰苦奋斗是我们的政治本色","description":"","dates":[{"year":1956,"month":11,"day":15}],"parts":[{"text":"艰苦奋斗是我们的政治本色","type":"title"},{"type":"paragraph","text":"我是历来主张军队要艰苦奋斗，要成为模范的。一九四九年在这个地方开会的时候，我们有一位将军主张军队要增加薪水，有许多同志赞成，我就反对。他举的例子是资本家吃饭五个碗，解放军吃饭是盐水加一点酸菜，他说这不行。我说这恰恰是好事。你是五个碗，我们吃酸菜。这个酸菜里面就出政治，就出模范。解放军得人心就是这个酸菜，当然，还有别的。现在部队的伙食改善了，已经比专吃酸菜有所不同了。但根本的是我们要提倡艰苦奋斗，艰苦奋斗是我们的政治本色。锦州那个地方出苹果，辽西战役的时候，正是秋天，老百姓家里很多苹果，我们战士一个都不去拿。我看了那个消息很感动。在这个问题上，战士们自觉地认为：不吃是很高尚的，而吃了是很卑鄙的，因为这是人民的苹果。我们的纪律就建筑在这个自觉性上边。这是我们党的领导和教育的结果。人是要有一点精神的，无产阶级的革命精神就是由这里头出来的。一个苹果不吃，饿死人没有呢？没有饿死，还有小米加酸菜。在必要的时候，在座的同志们要住棚子。在过草地的时候，没有棚子都可以住，现在有棚子为什么不可以住？军队这几天开会，他们慷慨激昂，愿意克己节省。军队这样，其他的人更要艰苦奋斗。不然，军队就将你的军了。在座的有文有武，我们拿武来将文。解放军是一个好军队，我是很喜欢这个军队的。"},{"type":"paragraph","text":"根据中央档案馆保存的讲话记录稿"},{"type":"paragraph","text":"刊印。"}],"comment_pivots":[{"part_idx":0,"offset":12,"index":1}],"is_range_date":false,"authors":["毛泽东"],"comments":["这是毛泽东在中共八届二中全会讲话中的一段话。"],"page_start":171,"page_end":172,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b9ad3d6f19"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
