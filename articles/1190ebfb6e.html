tes":[{"year":1976,"month":4,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"决不让敌人的阴谋得逞"},{"type":"paragraph","text":"中共上海沪东造船厂委员会"},{"type":"paragraph","text":"我们全厂广大工人和干部，认真学习了党中央的两个决议，心情无比激动，一致表示坚决拥护中共中央的两个英明的决定，愤怒声讨天安门广场的反革命政治事件。"},{"type":"paragraph","text":"大家认为，邓小平反革命的修正主义路线，集中代表了党内外资产阶级的利益，反映了他们的复辟愿望。他所刮起的右倾翻案风，就是妄图在中国复辟资本主义。大家联系去年邓小平抛出“三项指示为纲”的修正主义纲领和最近天安门广场出现的反革命政治事件，更加加深了对这场反击右倾翻案风斗争的性质、意义的认识。我们同邓小平反革命的修正主义路线的斗争，是同刘少奇、林彪反革命的修正主义路线斗争的继续和深入。天安门广场出现的反革命政治事件，是有预谋、有计划、有组织的，一小撮阶级敌人就是阴谋扭转批判邓小平和反击右倾翻案风斗争的大方向，把邓小平这个党内最大的不肯改悔的走资派捧出来，当匈牙利反革命事件的头子纳吉。如果他们的阴谋得逞，我们劳动人民就会重新沦为奴隶。毛主席、党中央采取了果断措施，及时粉碎了他们的阴谋，这对国内外阶级敌人是一次极其沉重的打击，我们全厂干部、工人无不拍手称快。"},{"type":"paragraph","text":"反击右倾翻案风的斗争开展以来，我们全厂职工认真学习毛主席一系列重要指示，抓住“三项指示为纲”，从各个方面深入批判这个修正主义纲领的反动实质。从船台到车间、从干部到工人，到处摆开了革命大批判的战场，出现了生动活泼的大好政治局面。"},{"type":"paragraph","text":"在电台广播党中央两个决议的当夜，我们党委立即进行讨论，第二天又举办了干部学习班。大家决定要继续深入批判邓小平反革命的修正主义路线及其理论基础阶级斗争熄灭论和唯生产力论。我们还联系造船工业两条路线斗争的实际，批判邓小平反对独立自主、自力更生，鼓吹洋奴哲学、爬行主义的修正主义路线，妄图破坏我国造船工业的发展，破坏社会主义的经济基础的罪行。他的谬论和刘少奇鼓吹的“造船不如买船，买船不如租船”的谬论，是同声相应的。去年，全厂职工在毛主席革命路线指引下，与修正主义路线对着干，狠批右倾翻案风，猛促造船生产，超额完成了国家计划。今天，我们还要继续批判邓小平的修正主义在经济领域的流毒，打好造船工业翻身仗。不少职工在收听党中央两个决议的广播后，连夜加班突击生产，第二天是厂里的星期天，又有不少职工到厂进行生产，大家决心以抓革命、促生产的实际行动，狠狠批判邓小平反革命的修正主义路线，把反击右倾翻案风的斗争进行到底！"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1190ebfb6e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
