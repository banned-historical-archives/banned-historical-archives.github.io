"authors":[],"dates":[{"year":1949,"month":2,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"北平开出城外改编之前国民党军"},{"type":"paragraph","text":"按解放军规定补给"},{"type":"paragraph","text":"叶剑英将军任北平联合办事处主任"},{"type":"paragraph","text":"【新华社北平十四日电】由人民解放军代表及傅作义将军代表共同组织的北平联合办事处，对于业已开出城外正待按照民主原则改编的前国民党部队的补给问题，已有统一的规定。按照规定，这些部队的食粮，自本月八日起即已改由人民解放军平津前线司令部补给，至其他补给，则也将于十一日起按照人民解放军规定标准发给。北平联合办事处系于本月一日正式成立，由人民解放军代表叶剑英、陶铸、徐冰、戎子和，傅作义将军代表郭宗汾、周北峰、焦实斋等七人组成，叶剑英将军为主任。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a7b8011b30"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
