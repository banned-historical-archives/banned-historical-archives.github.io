吹以土豆烧牛肉代替社会主义革命指出赫鲁晓夫修正主义政策给苏联农业带来灾难性后果","authors":[],"dates":[{"year":1964,"month":5,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京2日电】　维也纳消息:奥地利马克思列宁主义者去年十月创办了《红旗》半月刊。这家刊物到现在已经出版了十二期。"},{"type":"paragraph","text":"四月十五日出版的第十二期上刊载的《巴西和“和平道路”》一文谈到，赫鲁晓夫在最近访问匈牙利期间，强调土豆烧牛肉的重要性，并且预言社会主义将通过和平竞赛战胜资本主义。文章指出，巴西反动军人政变得逞，给了这种神话以惩罚。文章说，拉丁美洲人民认清了赫鲁晓夫的这种修正主义路线的后果，他们将走第二个《哈瓦那宣言》所指出的道路。"},{"type":"paragraph","text":"另一篇题为《革命、土豆烧牛肉和面包》的文章，谴责赫鲁晓夫在访问匈牙利期间抓住一切机会诬蔑和攻击社会主义中国而美化帝国主义，鼓吹以土豆烧牛肉代替社会主义革命。文章还指出，他的修正主义政策也给苏联国内的农业生产带来了灾难性后果。"},{"type":"paragraph","text":"《我们经典作家的言论过时了吗?》一文引用列宁关于无产阶级革命和无产阶级专政等问题的言论，驳斥了奥地利共产党内修正主义分子说马列主义已经“过时”的谬论。"},{"type":"paragraph","text":"此外，这家刊物还报道了苏联发表苏斯洛夫反华报告的消息，并且预告它将对苏斯洛夫的报告发表评论。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6aaa28a294"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
