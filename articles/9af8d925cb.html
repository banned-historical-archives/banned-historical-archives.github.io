tart":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"在毛泽东思想的光辉照耀下，把社会主义革命进行到底","authors":[],"parts":[{"type":"paragraph","text":"深入进行社会主义教育运动"},{"type":"paragraph","text":"我国广大农村和城市正在开展社会主义教育运动。在这个深刻的革命运动中，广大人民的阶级觉悟得到迅速的提高。这是浙江省平阳县肖江人民公社岱口大队贫农赵莲娥以自己解放前后生活截然不同的生动事实，向本村青年进行忆苦思甜的阶级教育。"},{"type":"paragraph","text":"紧紧依靠贫农下中农"},{"type":"paragraph","text":"河北省抚宁县卢王庄公社桃园大队，经过社会主义教育运动，干部经常征求贫下中农社员的意见，按照他们的意见改进工作。图为大队党支部书记卢伦（左）和贫下中农代表刘玉森（中），向第四生产队新当选的饲养员、贫农出身的赵铁金，征求对队上工作的意见。"},{"type":"paragraph","text":"推行半工半读教育制度"},{"type":"paragraph","text":"各地正在逐步推行半工半读的教育制度，培养能文能武，能上能下，既能从事体力劳动，又能从事脑力劳动的新型劳动者。这是上海第一机床厂的学员周介先正在业余大学解答他毕业设计中的一些问题。周介先原来是这家工厂的工人，现在已提拔为技术员。"},{"type":"paragraph","text":"干部参加集体生产劳动"},{"type":"paragraph","text":"干部参加集体生产劳动，同劳动人民保持最广泛的、经常的、密切的联系，是社会主义制度下一件带根本性的大事，它有助于克服官僚主义，防止修正主义和教条主义。这是中共四川省绵阳地委和遂宁县委的干部，在收割前喜看穗长粒多的好稻种。"},{"type":"paragraph","text":"培养革命接班人"},{"type":"paragraph","text":"山西省绛县南樊公社南柳生产大队今年才二十八岁的党支部书记周明山，在毛泽东思想的哺育下，在老党员、老贫下中农的扶持下，一步一步锻炼成长。这是周明山（中）和社员们交谈，征求他们对工作安排的意见。"},{"type":"paragraph","text":"不忘阶级斗争 紧握手中武器"},{"type":"paragraph","text":"河北省饶阳县五公人民公社五公生产大队党总支，经常注意对青年一代进行阶级和阶级斗争的教育。图为抗日战争时期的老民兵、共产党员李多林，正向青年民兵介绍过去对阶级敌人进行英勇斗争的故事，教育青年民兵继承和发扬老一辈民兵的光荣传统，紧握革命的枪杆子，在阶级斗争、生产斗争和科学实验三大革命运动中，永远当革命派。"},{"type":"paragraph","text":"（本组图片均系新华社稿）"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9af8d925cb"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
