" crossorigin="">{"props":{"pageProps":{"books":[{"id":"0390c365-6951-4e70-9dc5-9f7aa4c900ab","name":"哥达纲领批判（人民出版社1971年版）","internal":false,"official":true,"type":"pdf","author":"马克思，人民出版社1971年版","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives4/main/0390c365-6951-4e70-9dc5-9f7aa4c900ab.pdf"],"article":{"title":"弗里德里希·恩格斯的序言","alias":"","parts":[{"type":"paragraph","text":"弗里德里希·恩格斯的序言这里刊印的手稿—对纲领草案的批判以及给白拉克的附信一—曾于1875年哥达合并代表大会2召开以前不久送给白拉克，请他转给盖布、奥艾尔、倍倍尔和李卜克内西过目，然后退还马克思。既然哈雷党代表大会”已把关于哥达纲领的讨论提到了党的议事日程，所以我认为，如果我还延迟发表这个有关这次讨论的重要的"},{"type":"paragraph","text":"—也许是最重要的一—文件，那我就要犯隐匿罪了。但是，这个手稿还有另外的和更广泛的意义。其中第一次明确而坚定地表明了马克思对拉萨尔从他开始从事鼓动工作起就采取的方针的态度，并且同样地表明了对拉萨尔的经济学原则和策略的态度。这里用以剖析纲领草案的那种无情的尖锐性，用来表"},{"type":"paragraph","text":"这一切述得出的结论和揭露草案缺点的那种严厉性，一在十五年以后的今天已不会使人见怪了。道地的拉萨尔分子只是在国外还作为一些孤独的残余存在着，而哥达纲领甚至也被它的那些创造者们在哈雷当做完全不能令人满意的东西抛弃了。虽然如此，凡是在对内容没有影响的地方，我还是把一些针对个别人的尖锐的词句和评语删掉了，而用省略号来"},{"type":"paragraph","text":"3代替。如果马克思今天发表这个手稿，他自己也会这样做的。手稿中有些地方口气很激烈，这是由下述两种情况引起的：第一，马克思和我对德国运动的关系，比对其他任何一国运动的关系都更为亲切；因此这个纲领草案中所表现的断然的退步，就不能不使我们感到特别愤慨。第二，我们那时正在同巴枯宁及其无政府主义者进行最激烈的斗争，———那时离国际海牙代表大会4闭幕才两年，一他们把德国工人运动中发生的一切都归答于我们；因而我们不得不预料，他们也会诬指我们是这个纲领的秘密创作者。这些顾虑现在已经消失，因而一些有关的地方也就随之失去必要性了。由于出版法的缘故，有些语句只用省略号暗示出来。凡是我不得不选用比较缓和的说法的地方，都加上了方括弧。其他地方都按手稿付印。"},{"type":"paragraph","text":"弗·恩格斯"},{"type":"paragraph","text":"1891年1月6日于伦敦4"}],"authors":["恩格斯"],"dates":[{"year":1891,"month":1,"day":6}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":8,"page_end":9},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"708618b403"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
