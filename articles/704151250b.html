art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东朱德等16尊雕像运抵井冈山","authors":["樊政刘茂秋"],"parts":[{"type":"paragraph","text":"本报井冈山9月19日电 樊政、刘茂秋报道：在中国人民革命军事博物馆和全国雕塑办的大力支持下，由全国著名雕塑家精心塑造的井冈山斗争时期湘赣边界特委、前委、军委的主要领导人毛泽东、朱德、陈毅、滕代远、王佐、袁文才等16尊大型雕像，从8月初到今天为止，已陆续从北京、上海、广东、南昌等地运抵井冈山。其中毛泽东同志的雕像为铜像，重3.5吨。这些塑像安装在新近建成的井冈山烈士陵园雕塑园中，以此纪念井冈山革命根据地创建60周年。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"朱德","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"704151250b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
