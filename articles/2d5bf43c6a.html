script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"批判极左路线  坚持以牧为主  河西走廊畜牧业正在恢复发展  去年六个牧业县、旗牲畜总增率达到百分之二十五，创造了新纪录","authors":[],"dates":[{"year":1979,"month":4,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"批判极左路线  坚持以牧为主"},{"type":"paragraph","text":"河西走廊畜牧业正在恢复发展"},{"type":"paragraph","text":"去年六个牧业县、旗牲畜总增率达到百分之二十五，创造了新纪录"},{"type":"paragraph","text":"新华社兰州四月二十七日电  甘肃省河西走廊各牧业县、旗的广大干部和牧民，批判林彪、“四人帮”的极左路线，落实党在牧区的各项经济政策，畜牧业生产较快地得到了恢复和发展。去年，这个地区的六个牧业县、旗牲畜的存栏数达到了一百九十七万六千八百多头（只），总增率和纯增率分别达到了百分之二十五和百分之六，创造了新纪录。目前，各牧业县、旗的广大干部和牧民，正在积极采取措施，保畜膘，接春羔，力争安全度过春乏关，为今年牧业丰收打好基础。"},{"type":"paragraph","text":"河西走廊有祁连山麓水草丰美的天然草原，有适宜放牧的平坦辽阔的荒漠、半荒漠，是我国畜牧业生产重要基地之一。全区六个牧业县、旗，草原面积达一亿五千多万亩。据史料记载，西汉以来，这里就是六畜兴旺，“风吹草低见牛羊”的天然草场。我国少数民族在这里长期过着游牧生活。全国解放以来，蒙古族、藏族、裕固族和哈萨克族等少数民族和汉族的广大牧民，大力发展牧业生产，为国家和人民群众的需要提供了大量的菜畜、役畜、绒毛、皮张和奶制品。但前些年，由于林彪、“四人帮”极左路线的干扰破坏，在“牧民不吃亏心粮”、牧区也要“打农业翻身仗”等错误口号下，滥垦草原，弃牧种粮之风一度盛行，结果破坏了生态平衡，使许多绿洲萎缩，草原退化，畜牧业生产下降。"},{"type":"paragraph","text":"近两年来，河西走廊各牧业县、旗的党组织，带领广大牧民深入批判林彪、“四人帮”的极左路线，拨乱反正，认真贯彻执行党在牧区的经济政策。许多地方很快把文化大革命以前为牧民欢迎的经营管理办法和各项规章制度重新恢复并健全起来。普遍实行了“定工、定产、超产奖励”的“两定一奖”制度，效果很好。阿拉善右旗和额济纳旗，由于实行了定额管理，建立了“两定一奖”的制度，使畜牧业获得了较大的发展。去年和一九七七年相比，阿拉善右旗牲畜总增率和纯增率分别达到了百分之三十二和百分之十，额济纳旗牲畜总增率和纯增率分别达到了百分之二十和百分之七。两个旗牲畜的存栏数都创造了新纪录。"},{"type":"paragraph","text":"在批判极左路线，落实牧区的各项政策中，河西走廊各牧业县、旗从实际出发，因地制宜，合理调整生产布局，加强草原建设，使牧业生产逐渐符合自然规律。天祝藏族自治县是个地势高寒，气温低，日照和无霜期短，但这里水草较丰盛，是个发展牧业和油料作物的好地方。一九五八年前，这个县实行的生产方针是“以牧为主，围绕牧业生产，发展多种经营”，畜牧业稳步上升。到一九五八年底，牲畜存栏数达四十八万一千多头（只），比解放初期增加了近两倍。可是在林彪、“四人帮”极左路线的干扰下，生产方针又变成“农牧并举”，实际上有时完全是“以农为主”。结果草原被大量开垦，畜牧业生产遭到了严重破坏，农业生产也没有搞上去。粉碎“四人帮”以后，县委根据当地实际情况，统一规划，又逐步把生产方针转到了“以牧为主”，并加强了草原建设和管理，把应该退耕还牧的地方，坚决退耕还牧，使畜牧业较快地恢复和发展起来。去年全县牲畜总存栏数达到了五十二万九千多头（只），超过历史最高水平。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"林彪","type":"人物"},{"name":"四人帮","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2d5bf43c6a"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
