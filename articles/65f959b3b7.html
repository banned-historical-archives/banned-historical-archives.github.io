art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"叶剑英副主席会见并宴请全印柯棣华大夫纪念委员会访华代表团同客人们进行了亲切友好的谈话","authors":[],"parts":[{"type":"paragraph","text":"新华社一九七四年六月十三日讯 叶剑英副主席今天会见并设宴招待全印柯棣华大夫纪念委员会秘书长达尼尔·拉蒂菲和由他率领的全印柯棣华大夫纪念委员会访华代表团。"},{"type":"paragraph","text":"叶剑英副主席同客人们进行了亲切友好的谈话，他回顾了当年印度援华医疗队的柯棣·华大夫、爱德华大夫和巴苏大夫等同中国人民结下的战斗友谊，称赞了他们的国际主义精神。叶剑英副主席说，中印两国人民的友谊有着悠久的历史，我们相信两国人民的传统友谊一定会得到进一步的巩固和发展。"},{"type":"paragraph","text":"柯棣华大夫的妹妹莫诺拉玛·柯棣华小姐，以及印度国会议员维雅斯、著名歌唱家海曼歌·比斯瓦斯，参加了会见和宴会。"},{"type":"paragraph","text":"参加会见和宴会的，还有对外友协副会长杨骥，柯棣华大夫的夫人郭庆兰，当年同柯棣华大夫一起工作过的马海德大夫等。（附照片）"},{"type":"paragraph","text":"叶剑英副主席六月十三日会见并设宴招待全印柯棣华大夫纪念委员会秘书长达尼尔·拉蒂菲和由他率领的全印柯棣华大夫纪念委员会访华代表团。图为会见时合影。（新华社记者 摄）"}],"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"65f959b3b7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
