,"dates":[{"year":1966,"month":3,"day":14}],"is_range_date":false,"parts":[{"text":"江青给毛泽东的信","type":"title"},{"text":"江青","type":"authors"},{"text":"（全文）","type":"paragraph"},{"text":"因为陈伯达同志乘的是下午四点多的火车，我托他带给你的那份座谈会纪要，没有来得及看，他走后我才发现没有加红杠。他那份大概没有来得及加。现送上加红杠的一份，请批示。双红杠是你改的，单红杠是伯达、志坚、春桥、亚丁四位同志和我一块商量着改的。好处是有些问题比前一次说的充实一些，缺点是长了些。此外，也恐有不妥之处或不够策略的地方，请指出并修改。我只是不安，怕影响你的睡眠。志坚同志明天回京，亚丁同志尚在这里等。你不要赶，他们的创作会议四月初才开。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"江青","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f65812aeef"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
