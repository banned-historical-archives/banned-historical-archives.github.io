ical-archives/banned-historical-archives0/main/maoquanji40.pdf"],"article":{"title":"关于苏共中央来信等问题给周恩来的电报","alias":"","parts":[{"type":"paragraph","text":"关于苏共中央来信等问题"},{"type":"paragraph","text":"给周恩来的电报"},{"type":"paragraph","text":"（1958年10月11日）恩来同志："},{"type":"paragraph","text":"苏来件\"不忙复，谈一下再说。曹聚仁到，冷他几天，不要立即谈。我是否见他，待酌。"},{"type":"paragraph","text":"叫克诚将八月十九日汕头空战以来五十多天中，我歼敌机多少，敌歼我机多少，确查统计，准备告诉苏方。他们信敌人谎报，不明实情。地空导弹应卖给我，由我使用，他们派少数人来教。我倾向这种方针。是否适宜，今晚或明晚可以商定。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十月十一日上午十时"},{"type":"paragraph","text":"[1]指苏共中央第一书记、苏联部长会议主席赫鲁晓夫1958年9月27日和1958年10月4日给毛泽东的信。"},{"type":"paragraph","text":"[2]曹聚仁，文史学家，记者，20世纪二三十年代在暨南大学、复旦大学等校任教授。抗战胜利后在上海任《前线日报》编辑兼香港《星岛日报》特约记者。1950年移居香港，先后任香港《星岛日报》编辑和新加坡《南洋商报》驻香港特约记者。1958年回大陆采访，受到毛泽东、周恩来、陈毅等接见。"}],"authors":["毛泽东"],"dates":[{"year":1958,"month":10,"day":11}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":308,"page_end":308},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8b33427d4e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
