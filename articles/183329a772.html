],"dates":[{"year":1971,"month":11,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"纪登奎华国锋杨立功王国权张香山会见日本农村活动家友好访华团"},{"type":"paragraph","text":"同他们进行了亲切友好的谈话"},{"type":"paragraph","text":"新华社十三日讯　中共中央政治局候补委员纪登奎、中共中央委员华国锋、农林部副部长杨立功、中日友好协会副会长王国权、中联部有关负责人张香山，今天下午会见了由团长关川一雄、秘书长若林义夫率领的日本农村活动家友好访华团全体成员，同他们进行了亲切友好的谈话。"},{"type":"paragraph","text":"参加会见的访华团团员有：中野善祐、古屋秀夫、竹田香苗、高原修、高桥良藏、大友恒治、清田和夫、石原辰藏、山本道雄、森当、德山达义、犬饲勤、江田弘、山口茂，随员森繁。"},{"type":"paragraph","text":"我国有关方面负责人和工作人员徐明、张雨、周密、刘耀民、金苏城、陈蕙娟，会见时在座。（附图片）"},{"type":"paragraph","text":"中共中央政治局候补委员纪登奎、中共中央委员华国锋、农林部副部长杨立功、中日友好协会副会长王国权、中联部有关负责人张香山，十一月十三日会见了由团长关川一雄、秘书长若林义夫率领的日本农村活动家友好访华团全体成员。这是会见时合影。"},{"type":"paragraph","text":"新华社记者摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"华国锋","type":"人物"},{"name":"纪登奎","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"183329a772"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
