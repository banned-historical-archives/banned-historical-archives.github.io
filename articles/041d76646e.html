贺","authors":[],"dates":[{"year":1961,"month":8,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京16日电】　毛泽东主席今天打电报给印度尼西亚共和国总统苏加诺，热烈祝贺印度尼西亚共和国独立十六周年。电报全文如下:"},{"type":"paragraph","text":"印度尼西亚共和国苏加诺总统阁下:"},{"type":"paragraph","text":"在印度尼西亚共和国独立十六周年的时候，谨向你和印度尼西亚人民表示热烈的祝贺。"},{"type":"paragraph","text":"祝印度尼西亚人民在反对帝国主义和殖民主义以及建设自己国家的崇高事业中，获得新的胜利和成就。祝中国和印度尼西亚两国人民的传统友谊不断巩固和发展。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"1961年8月16日"},{"type":"paragraph","text":"【新华社北京16日电】　中华人民共和国主席刘少奇和国务院总理周恩来今天打电报给印度尼西亚共和国总统兼总理苏加诺，热烈祝贺印度尼西亚独立十六周年。电报全文如下:"},{"type":"paragraph","text":"印度尼西亚共和国苏加诺总统兼总理阁下:"},{"type":"paragraph","text":"在印度尼西亚共和国独立十六周年的时候，我们谨代表中国人民和中华人民共和国政府，并且以我们个人的名义，向印度尼西亚人民和政府、向阁下致以诚挚的祝贺。"},{"type":"paragraph","text":"中国人民和印度尼西亚人民之间有着悠久的传统友谊。我们两国的友好合作关系是建立在和平共处五项原则和万隆会议十项原则的牢固基础上的。最近，阁下对我国的友好访问和两国友好条约的签订和批准，进一步增进了我们两国的友好合作关系，加强了我们两国人民在反对帝国主义和殖民主义共同斗争中的团结。这不仅符合我们两国人民的根本利益，而且有助于促进亚非团结和维护世界和平。"},{"type":"paragraph","text":"祝阁下、印度尼西亚人民和政府在反对殖民主义、维护民族独立和建设自己国家的事业中取得新的成就。祝印度尼西亚人民和政府在收复自己的领土西伊里安的斗争中获得新的胜利。祝中国和印度尼西亚两国之间的友好合作关系继续巩固和发展。"},{"type":"paragraph","text":"中华人民共和国主席　刘少奇"},{"type":"paragraph","text":"中华人民共和国国务院总理　周恩来"},{"type":"paragraph","text":"1961年8月16日"},{"type":"paragraph","text":"【据新华社北京16日电】　中华人民共和国外交部长陈毅今天打电报给印度尼西亚共和国外交部长苏班德里约博士，祝贺印度尼西亚共和国独立十六周年。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"041d76646e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
