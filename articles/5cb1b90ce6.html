uthors":[],"dates":[{"year":1967,"month":2,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"中国文化大革命是世界革命的未来"},{"type":"paragraph","text":"阿尔及利亚朋友说世界人民要走中国革命的道路"},{"type":"paragraph","text":"据新华社二十五日讯　阿尔及利亚各界人士赞扬中国无产阶级文化大革命为世界革命树立了伟大的榜样。"},{"type":"paragraph","text":"一位名叫诺尔迪纳的阿尔及利亚朋友对新华社记者说：我们阿尔及利亚人注视着中国文化大革命的胜利发展。我们热烈地讨论着这场大革命的历史意义，并且得出一个结论：伟大的毛泽东主席亲自发动的中国无产阶级文化大革命，为世界革命树立了伟大的榜样。"},{"type":"paragraph","text":"他指出：没有无产阶级文化大革命，就不可能建成社会主义。苏联的教训证明，一个社会主义国家如果不进行文化大革命，就会走上资本主义复辟的道路。中国文化大革命是革命人民的明天，是世界革命的未来。"},{"type":"paragraph","text":"一位阿尔及利亚的工会工作者说：中国文化大革命加速了中国社会主义革命的进程。这对于世界革命是一个伟大的贡献。"},{"type":"paragraph","text":"他说：人民中国举起了世界革命的旗帜，援助世界人民反对帝国主义、新老殖民主义的斗争。中国文化大革命不但加速了中国革命的深入发展，并且也必然加速世界革命前进。"},{"type":"paragraph","text":"他说，他认为可以把中国的文化大革命比作革命的原子弹。"},{"type":"paragraph","text":"阿尔及尔一位大学生说：你们有毛泽东，你们有毛泽东思想，所以你们才能这样强大。我一直相信：中国文化大革命一定会胜利，一定会为亚洲、非洲和拉丁美洲人民的革命树立起榜样。中国革命所走的道路，就是世界人民所要走的道路。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5cb1b90ce6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
