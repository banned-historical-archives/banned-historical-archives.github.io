art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"给毛主席的电报","authors":[],"parts":[{"type":"paragraph","text":"新华社二十五日讯 毛主席二十五日收到卡翁达总统离开中国时在飞机上发来的电报，全文如下："},{"type":"paragraph","text":"北京"},{"type":"paragraph","text":"毛泽东主席："},{"type":"paragraph","text":"我刚刚结束的历史性的访问是成功的，富有成果的。雄伟的北京城的市民所给予我们的接待以及贵国政府和中华人民共和国人民的盛情款待，这些愉快的记忆将永远铭记在我们心上。愿我们的成就能够经受住未来的考验。请向总理和政府转达我对他们所作的一切的热诚和兄弟般的感激之情。我对上海的热情接待也十分感谢。"},{"type":"paragraph","text":"中赞友谊万岁！"},{"type":"paragraph","text":"赞比亚共和国总统"},{"type":"paragraph","text":"肯·戴·卡翁达"},{"type":"paragraph","text":"一九六七年六月二十五日RW：卡翁达；电报"}],"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"420c410071"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
