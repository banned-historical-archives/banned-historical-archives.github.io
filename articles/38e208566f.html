<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"天津市区各界人民代表扩大联席会议讨论惩治反革命罪犯问题经过","authors":[],"dates":[{"year":1951,"month":3,"day":29}],"is_range_date":false,"parts":[{"text":"天津市区各界人民代表扩大联席会议讨论惩治反革命罪犯问题经过","type":"title"},{"text":"天津市市、区各界人民代表扩大联席会议，三月二十九日下午二时在民园广场召开，讨论惩治反革命罪犯问题。共出席市、区各界人民代表，各民主党派人士，各人民团体代表及各机关、工厂、学校代表一万五千余人。会议听取并讨论了市公安局许建国兼局长关于本市严厉镇压反革命活动的报告。在遭受特务、恶霸迫害的市民及家属当场进行控诉后，市人民政府接受到会代表的意见，由市公安局将已逮捕的一批罪大恶极的反革命罪犯押到会场，到会代表一致要求人民政府严厉惩办这批血债深重的罪犯，坚决拥护政府执行惩治反革命条例，并通过了决议。","type":"paragraph"},{"text":"会议通过主席团后，执行主席黄火青致开幕词。他指出为了执行中央人民政府的惩治反革命条例，严厉镇压反革命活动，本市逮捕了一批反革命罪犯，他说：“这是天津解放以来，对敌斗争中的一个伟大胜利。”他指出天津市的人民都拥护政府的这个措施，很多市民向政府检举反革命分子，有的还协助政府逮捕特务，为了使广大市民更清楚的了解政府的政策和反革命分子的罪犯事实，并希到会代表讨论如何惩治这些反革命分子，所以召开这个大会。他说：“这是人民民主专政的大会。”","type":"paragraph"},{"text":"继由许建国兼局长报告。当报告结束时，全场一致热烈鼓掌高呼：“毛主席万岁！”“拥护人民政府的正确领导！”","type":"paragraph"},{"text":"在会场上，曾经遭受特务、恶霸、反革命分子摧残迫害的市民和家属都恨不得把多年闷在心里的怨气一下子吐出来，计有：王淑云、刘刘氏、刘老太太、工人孙连城和工人曹士宗等五人，他们在控诉时，无不声泪俱下，咬牙切齿，历数这些万恶反革命分子的罪行。王淑云在报纸上见到政府逮捕特务恶霸王士姜的消息后，特地从北京赶来天津，她在台上控诉时，十一年前的杀兄冤仇的情景，历历在目，痛哭失声，台下的代表们也都因王淑云的冤仇而流泪，每个人心中都燃起对特务恶霸的无边怒火。王淑云在讲到人民政府为人民报了仇时，极为激动，她高呼：“政府叫我们从地狱里翻了身！”她以不断的高呼“毛主席万岁”来表示她感激兴奋的感情。刘刘氏老太太在控诉特务恶霸井义江（井三）的罪行时，当场哭得晕了过去。刘老太太控诉特务工贼恶霸刘金富时，哭得连话也说不上来了，她说：“我请问政府，刘金富留着行不行？”台下群众一致高呼“不行”。电车公司工人孙连城在台上控诉时，两手捏紧了拳头，用劲的说：“我感谢政府领导得好，毛主席万岁！”当控诉进行时，会场上的每个代表都因控诉者的悲愤而悲愤，因控诉者的兴奋而兴奋。会场上一直不断发出“枪毙怙恶不悛的特务！枪毙首要反革命分子！为受害人民报仇！为革命烈士报仇！”的怒吼！","type":"paragraph"},{"text":"在控诉之后，市人民政府接受到会代表的要求，由市公安局将一批反革命罪犯，押解到会场。这批首恶反革命分子有杀害吉鸿昌将军的军统特务吕一民，潘家峪血债的凶手朱世荫，国民党天津市党部执委中统特务苑宝璜，特务恶霸王士姜、刘金富、李天然，汉奸特务高铁侯，一贯道大头子王紫泉等十四人。这批作恶多端、残害人民、不知悔改的反革命分子，在会场上群众的怒目之下，一个个面无人色，当喊到每个罪犯的名串时，群众一致愤怒高呼：“枪毙他”。","type":"paragraph"},{"text":"接着由各界代表于松如、李烛尘、杨石先、王兰城、万玉清、叶刚侯等陆续在会议上发言。他们都一致拥护惩治反革命条例，要求政府严厉镇压反革命分子（各代表发言见本书）。","type":"paragraph"},{"text":"各界代表发言后，由天津市军事管制委员会军法处王笑一处长讲话，他说：“军法处一定坚决执行大会的决议，保证作好惩治反革命的伟大工作。”他并说：“判决这一批反革命罪犯的准备工作已经做好，法律手续已经完备，只要会议做出决议，立即就可以执行。”这时，会场上响起一片热烈的掌声。","type":"paragraph"},{"text":"最后由黄敬市长讲话。","type":"paragraph"},{"text":"然后，会议一致通过了关于严厉镇压反革命分子的决议。","type":"paragraph"}],"comments":[],"origin":"《进步日报》1951年3月30日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"38e208566f"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
