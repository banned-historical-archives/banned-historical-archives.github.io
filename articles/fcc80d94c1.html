":[],"dates":[{"year":1970,"month":4,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"周恩来、康生、张春桥同志举行宴会热烈欢迎威尔科克斯和罗·泰勒同志"},{"type":"paragraph","text":"新华社十六日讯　中共中央政治局常委周恩来、康生同志和政治局委员张春桥同志，今天举行宴会，热烈欢迎新西兰共产党总书记维·乔·威尔科克斯同志、代理主席罗·泰勒同志，前来我国进行友好访问。"},{"type":"paragraph","text":"有关方面负责人出席宴会作陪。"},{"type":"paragraph","text":"宴会以前，周恩来、康生、张春桥同志和维·乔·威尔科克斯、罗·泰勒同志，一起照了像。（附图片）"},{"type":"paragraph","text":"宴会前，周恩来、康生、张春桥同志和维·乔·威尔科克斯（左六）、罗·泰勒同志合影。　新华社记者摄"},{"type":"paragraph","text":"国务院总理周恩来，四月十五日接见了日本友好贸易七团体代表萩原定司、木村一三等十人，同他们进行了亲切友好的谈话。"},{"type":"paragraph","text":"接见时，在座的有国务院副总理李先念，人大常委会副委员长、中日友协名誉会长郭沫若等。图为接见时合影。"},{"type":"paragraph","text":"新华社记者摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"康生","type":"人物"},{"name":"张春桥","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fcc80d94c1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
