ical-archives/banned-historical-archives0/main/maoquanji52.pdf"],"article":{"title":"读《宋史纪事本末》批语","alias":"","parts":[{"type":"paragraph","text":"读《王湘绮全集》批语"},{"type":"paragraph","text":"湘军水师名天下。····湖南在籍官丁善庆、陈本钦、唐际盛、李概等始捐资设船局，而黄冕专制炮以应征军。言船炮者，莫能及湖南焉，然太锋锐，深入要利，卒以至败。寇距九江城，于湖口梅家洲作坚屯二，与城相鼎峙，北屯小池，拒陆军。辛酉，李孟群等攻城，城北洲垒大，设"},{"type":"paragraph","text":"炮，旁维大舟，小艇环卫之。孟群先攻其大舟，水军应学游"},{"type":"paragraph","text":"战不利，苏胜、郑沐中炮死，李金梁船沉溺于泳"},{"type":"paragraph","text":"江。寇既见官军水战法，亦并力于水战，多造小"},{"type":"paragraph","text":"艇，依大舟以出。……十二月辛丑，彭玉麟等攻双脚走路"},{"type":"paragraph","text":"湖口寇筏，破之，士死伤相积，寇亦殊死斗，其要学游泳"},{"type":"paragraph","text":"筏上作木楼，凭楼发炮，楼倾，或飞投江中，泅而走，其坚悍若此。［《湘军志》六《水师篇》第六第7~8页]"}],"authors":["毛泽东"],"dates":[],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":452,"page_end":452},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ea9fd6c446"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
