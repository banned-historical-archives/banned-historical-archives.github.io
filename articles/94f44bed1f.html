script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"“泥腿子”就是能搞科研  闽侯县祥谦公社杨厝大队批邓纪实","authors":[],"dates":[{"year":1976,"month":5,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"“泥腿子”就是能搞科研"},{"type":"paragraph","text":"闽侯县祥谦公社杨厝大队批邓纪实"},{"type":"paragraph","text":"在党中央两项英明决议的鼓舞下，福建省闽侯县祥谦公社杨厝大队迅速掀起了批邓的高潮。"},{"type":"paragraph","text":"杨厝大队是农业学大寨的先进单位。文化大革命以来，这个大队的干部和贫下中农在毛主席的革命路线指引下，在三分地里闹革命，大搞以种子革命为中心的群众性科学实验活动，积极选育水稻良种，对种子进行提纯复壮，有力地促进了农业生产的发展，全大队连续十一年粮食平均亩产超过二千斤。文化大革命以来，他们向国家提供良种近一千万斤。在批判会上，县委副书记、大队党支部书记杨依木愤怒地说：党内最大的不肯改悔的走资派邓小平拚命鼓吹“专家治所”，叫嚷什么“依靠工农兵是相对的”，妄图把广大群众排斥在科研大门之外。他这样极力贬低劳动人民，说明他是我们劳动人民的对头，我们要坚决同他斗到底！广大贫下中农对邓小平翻文化大革命的案，妄图复辟资本主义的罪行，非常气愤。一些积极参加科研活动的老贫农技术员控诉说：在旧社会，我们被人踩在脚底下，根本没法搞科研。解放后，在毛主席的英明领导下，我们不但在政治上翻身作了主人，而且在科学技术上作了主人。文化大革命以来，我们大搞种子革命，在三分地上创高产。可是，我们贫下中农刚刚登上科技舞台不久，邓小平这个不肯改悔的走资派却要把我们赶下台，好让他复辟资本主义。他的用心，同我们村里的地主一样的恶毒。我们贫下中农决心同他对着干，一定要牢牢占领农村科研阵地，叫他的复辟迷梦永远不能得逞！"},{"type":"paragraph","text":"在批判会上，大队农科所技术员杨振盛等，用本大队的科研成就，热情歌颂了社会主义新生事物。他们说：以贫下中农为主体的农民技术队伍为革命搞科研，这是文化大革命中涌现的新生事物，它一出现，就显示了强大的生命力。广大贫下中农搞出的许许多多科研成果，就象灿烂的山花开遍祖国大地。就拿我们大队来说，党支部带领社员群众，抓革命，促生产，积极开展科学种田，文化大革命中初步形成了农业科学实验网。大队建立了农科所，八个生产队成立了科研小组，全大队参加科学实验的有七十九人。社员群众都参加了种子提纯复壮的工作，连小学生也种了试验田。全大队的三熟三高产试验田达到九十一亩。通过科研活动，我们总结出了一套良种提纯复壮的技术经验，并且应用到大田生产，为省内外兄弟社队提供了大批稻、麦和油菜良种，输送出去帮助搞科技的农民技术员有一百五十多人次。几年来，我们还试验推广了各种先进的育秧技术、施肥措施和管水方法，有力地促进了农业生产的发展，为社会主义革命和社会主义建设作出了贡献。我们这个解放前有名的“佃户村”，如今已变成欣欣向荣的社会主义新农村。贫下中农说：“事实是这样明摆着，不管邓小平怎样攻击社会主义的新生事物，以贫下中农为主体的农业科学实验大军，必将在斗争中发展、壮大，推动我国科学技术的迅速发展。”"},{"type":"paragraph","text":"（据新华社）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"94f44bed1f"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
