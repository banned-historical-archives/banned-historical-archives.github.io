性　增强党性","authors":["黄明松"],"dates":[{"year":1985,"month":3,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"沈阳军区第二期整党单位联系实际进行彻底否定“文革”教育"},{"type":"paragraph","text":"分清是非　统一思想　消除派性　增强党性"},{"type":"paragraph","text":"新华社沈阳3月23日电  （记者黄明松）沈阳军区党委最近强调，第二期整党单位彻底否定“文化大革命”的教育，一定要联系和解决本单位的历史遗留问题，把清“左”和统一思想的工作做得更加扎实。"},{"type":"paragraph","text":"沈阳军区在去年的第一期整党中，已在全部队普遍开展了彻底否定“文革”的教育。第二期整党开始后，有些同志认为对“文革”的认识问题已经解决了，再搞也是重复，因此对深入开展这一教育不够重视。针对这种情况，沈阳军区党委领导同志在军以上单位主要负责人会议上，具体分析了各单位的实际情况，明确指出，彻底否定“文革”不能只停留在一般认识上，重要的是要联系本单位在“文革”中发生的重大事件，分清是非，统一思想，消除派性，增强党性。"},{"type":"paragraph","text":"按照军区党委的要求，各单位在进行彻底否定“文革”专题教育中，普遍联系了三个方面的实际：一是本单位在“文革”中发生过的重大事件；二是在“三支两军”中的错误；三是本单位在“左”的思想指导下所做的错事。某军党委发动机关党员干部摆“左”的思想影响带来的危害，特别是对当前坚定执行党的各项方针政策的影响，从而进一步提高了同党中央在政治上保持高度一致的自觉性。中央关于纠正新形势下不正之风的指示下达后，军党委和机关几次组织认真学习，并派出检查组对所属部队进行普遍调查，发现问题立即纠正。全体党员干部在当前正在进行的体制改革、精简整编中，讲党性，顾大局，正确对待个人利益，上上下下形成了良好的风气。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"派性","type":"主题/事件"},{"name":"三支两军","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"603d80f2b2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
