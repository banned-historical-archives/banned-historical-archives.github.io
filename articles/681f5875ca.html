art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"要闻简报","authors":[],"parts":[{"type":"paragraph","text":"邓小平副总理同卡洛斯国王继续会谈"},{"type":"paragraph","text":"国务院副总理邓小平同西班牙国王胡安·卡洛斯一世六月十七日上午继续举行了会谈。"},{"type":"paragraph","text":"耿飚副总理拜会巴基斯坦总统伊拉希"},{"type":"paragraph","text":"中国政府代表团团长、国务院副总理耿飚六月十七日下午在总统府拜会巴基斯坦总统法兹尔·伊拉希·乔德里。"},{"type":"paragraph","text":"伊拉希总统同耿飚副总理进行了非常亲切友好的谈话。"},{"type":"paragraph","text":"耿飚副总理向伊拉希总统转达了中国共产党中央委员会主席、国务院总理华国锋，全国人民代表大会常务委员会委员长叶剑英，国务院副总理邓小平对他的热烈问候。"},{"type":"paragraph","text":"伊拉希总统对此表示感谢，并请耿飚副总理转达他对中国领导人的问候。"},{"type":"paragraph","text":"在回顾巴、中两国友好关系的发展时，伊拉希总统和耿飚副总理一致表示，希望这种友好关系将进一步得到加强。"},{"type":"paragraph","text":"巴领导人盛宴欢迎耿副总理等中国贵宾"},{"type":"paragraph","text":"巴基斯坦政府首脑、军法管制首席执行官穆罕默德·齐亚·哈克将军和夫人六月十六日在国宾馆举行盛大宴会，欢迎耿飚副总理和夫人赵兰香以及中国政府代表团全体成员。"},{"type":"paragraph","text":"齐亚·哈克将军和耿飚副总理在充满热情、友好和亲切气氛的宴会上讲了话。（均据新华社）"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"耿飚","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"681f5875ca"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
