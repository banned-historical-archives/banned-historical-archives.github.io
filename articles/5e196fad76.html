art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"调动各种宣传力量加强民兵国防教育南京部队强调对民兵进行毛泽东人民战争思想教育","authors":["南群"],"parts":[{"type":"paragraph","text":"本报讯 为了进一步加强民兵政治工作，特别是研究当前的民兵国防教育问题，南京部队政治机关在9月中旬召开了民兵政治工作会议。"},{"type":"paragraph","text":"会议根据总政治部关于加强民兵宣传教育工作的指示，结合当前国内外形势和本地区的实际情况，对民兵宣传教育问题认真地作了研究。大家认为，只有认真做好宣传教育工作，才能进一步调动广大民兵的积极性，使他们在社会主义建设的各个战线上发挥更大的作用，并为战时发挥民兵作用打好思想基础。在宣传教育内容上，会议强调必须以毛主席人民战争思想和党的方针政策为指针。在宣传的方式方法上，应在地方党委的统一领导下，围绕生产，服从中心，结合社会教育，充分运用一切宣传力量和宣传工具，开展群众性的宣传活动，大抓活的思想，贯彻少而精的原则。"},{"type":"paragraph","text":"会议还要求各军种各兵种向机关、部队、学校，在地方党委的统一领导下，在省军区、军分区及县人民武装部的统一组织下，积极地参加民兵宣传教育工作。（南群）"}],"alias":""},"tags":[{"name":"人民战争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5e196fad76"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
