<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"省、市委书记会议上各同志提出的问题","authors":["中共中央办公厅"],"dates":[{"year":1957,"month":1,"day":23}],"is_range_date":false,"parts":[{"text":"省、市委书记会议上各同志提出的问题","type":"title"},{"text":"中共中央办公厅","type":"authors"},{"text":"黄火青：","type":"appellation"},{"text":"一、天津电力供应紧张，希望在投资上加以照顾。","type":"paragraph"},{"text":"二、原材料如果不能保证人民生活最低限度的需要，基本建设投资应当进一步削减。对原材料的分配应当首先照顾维护和修理的需要。","type":"paragraph"},{"text":"三、减薪问题要慎重，同意几年之内不再增加，并且提倡多买公债。","type":"paragraph"},{"text":"四、中小学实行二部制以后，应当适应新情况，加强课外活动的辅导制度，适当增加辅导人员。","type":"paragraph"},{"text":"五、高等学校经费统一由高等教育部管理，不便于解决各部门所属学校的具体困难，希望研究改进的办法。","type":"paragraph"},{"text":"六、主张在机关肃反完成以后接着进行合营企业的肃反工作，不要停顿。","type":"paragraph"},{"text":"陆定一：","type":"appellation"},{"text":"一、建议全国领导干部从今年开始学习辨证法。","type":"paragraph"},{"text":"周小舟：","type":"appellation"},{"text":"一、法制问题上已经发生右倾的偏向，希望有关部门注意纠正。","type":"paragraph"},{"text":"吴德：","type":"appellation"},{"text":"一、吉林去年死马二十一万匹，主要原因是饲料不足，负担过重，管理不善，希望增加饲料的留量。","type":"paragraph"},{"text":"二、希望把各地拖拉机站的农业机器，集中起来，组织复员军人开垦荒地。","type":"paragraph"},{"text":"三、吉林乡干部的收入不比农民高多少，但是他们的支出要比一般农民多，因此，不宜全国一律降低，应当由各地按照不同情况分别适当处理。","type":"paragraph"},{"text":"邓子恢：","type":"appellation"},{"text":"一、应当适当地缩小粮食的地区差价，提高山区的粮食价格。","type":"paragraph"},{"text":"二、地方上的商业机构过多，有的县有十四个事业公司，应当合并。省、专、县三级对商业工作应当有适当的权力。","type":"paragraph"},{"text":"三、为了改善耕畜的饲养，促进耕畜的繁殖，希望各省认真研究和解决有关提高价格、留出草料基地恢复牛行等问题。","type":"paragraph"},{"text":"四、第二个五年计划的农林水方面的投资，希望保持八大规定的比例，不要降低。","type":"paragraph"},{"text":"五、福建各县的负责干部中，外来干部太多，本地干部过少，应当采取办法，适当调整。","type":"paragraph"},{"text":"六、关于区乡划分问题，提议撤乡留区，把区划小。","type":"paragraph"},{"text":"中共中央办公厅机要室　一九五七年一月二十四日发","type":"paragraph"}],"comments":[],"origin":"根据文件翻印件打印。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"625cb13e18"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
