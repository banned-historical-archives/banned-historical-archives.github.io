art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"北京军区党委决心今年抓好两件大事深入进行坚持四项基本原则、反对资产阶级自由化的教育；认真落实军委扩大会议精神，全面加强基层建设。中央军委转发了秦基伟、杨白冰在军区党委扩大会上的讲话","authors":["杨学泉"],"parts":[{"type":"paragraph","text":"秦基伟着重讲了坚持四项基本原则、反对资产阶级自由化的重要性和长期性，强调搞好这个教育的重要意义。他在讲话中指出：作为党的高级干部任何时候都不能忽视党性锻炼，不能放松思想改造。要严格遵守党的纪律，克服个人主义，正确对待名利、成绩和错误，真正做到立党为公，以自己的模范行动，带动广大党员形成遵纪守法的好风气。"},{"type":"paragraph","text":"杨白冰着重阐述了全面加强基层建设的问题。他说，加强基层建设基本要求是：以加强党支部建设和基层思想教育为重点，狠抓薄弱环节，进一步打牢基础，全面落实十二条，使基层建设在总体上有一个较大的提高。他说，只要领导干部说真话，办实事，讲实效，下面就会跟着去做。那些做表面文章、搞形式主义、报喜不报忧的问题就一定能克服。"}],"alias":""},"tags":[{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c5b83f6647"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
