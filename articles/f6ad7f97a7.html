s":[{"year":1949,"month":9,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席的绒绣像"},{"type":"paragraph","text":"——献给人民政协的礼物"},{"type":"paragraph","text":"江横"},{"type":"paragraph","text":"毛主席，"},{"type":"paragraph","text":"你的旗帜，"},{"type":"paragraph","text":"插到上海，"},{"type":"paragraph","text":"我们——"},{"type":"paragraph","text":"工人又回到"},{"type":"paragraph","text":"你的怀抱里："},{"type":"paragraph","text":"我们的一颗心，"},{"type":"paragraph","text":"天天想望你，"},{"type":"paragraph","text":"见了你的像，"},{"type":"paragraph","text":"就象见到你。"},{"type":"paragraph","text":"毛主席，"},{"type":"paragraph","text":"我们时时想："},{"type":"paragraph","text":"怎样表表我们底"},{"type":"paragraph","text":"一点心意？"},{"type":"paragraph","text":"想来想去，"},{"type":"paragraph","text":"用绒线绣一幅"},{"type":"paragraph","text":"你的像吧，"},{"type":"paragraph","text":"人都说这是份"},{"type":"paragraph","text":"好献礼！"},{"type":"paragraph","text":"我们——"},{"type":"paragraph","text":"石金虎精心设计，"},{"type":"paragraph","text":"刘佩珍巧手绣织，"},{"type":"paragraph","text":"六月开头绣，"},{"type":"paragraph","text":"绣到八月底。"},{"type":"paragraph","text":"千针万针"},{"type":"paragraph","text":"绣出绒绣像，"},{"type":"paragraph","text":"人人夸说"},{"type":"paragraph","text":"绣的真象你！"},{"type":"paragraph","text":"全厂的弟兄们，"},{"type":"paragraph","text":"把绣像高高举起，"},{"type":"paragraph","text":"眼睛里闪耀着"},{"type":"paragraph","text":"愉快的光芒，"},{"type":"paragraph","text":"心里充满了"},{"type":"paragraph","text":"胜利的希望。"},{"type":"paragraph","text":"我们跳着，唱着："},{"type":"paragraph","text":"把这绒绣像，"},{"type":"paragraph","text":"献给毛主席！"},{"type":"paragraph","text":"把我们的一颗心，"},{"type":"paragraph","text":"献给毛主席！"},{"type":"paragraph","text":"九月二十四日"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f6ad7f97a7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
