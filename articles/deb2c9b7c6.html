京政法学院","王明欣"],"dates":[{"year":1957,"month":5}],"is_range_date":false,"parts":[{"text":"我反对共产党一党专政","type":"title"},{"text":"北京政法学院王明欣","type":"authors"},{"text":"（摘录，标题为编者所加）","type":"subtitle"},{"text":"我反对共产党一党专政、党员独裁。","type":"paragraph"},{"text":"长期共存，互相监督，不过是形式而已，民主党派有职无权，实际上是一党专政。","type":"paragraph"},{"text":"无产阶级专政我不否认，但我反对共产党领导的无产阶级专政，无产阶级专政不一定要共产党领导。我们的国家是全国人民的国家，不是共产党的国家。呼吁改变民主党派的地位。","type":"paragraph"},{"text":"无产阶级专政一方面是无产阶级的领导，另一方面群众积极参加。这就是说，群众也可以领导，可是实际上属于领导地位的都是党员……。","type":"paragraph"},{"text":" 来源：《高等党校右派言论选编》（中共中国人民大学委员会，1958年8月）。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"deb2c9b7c6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
