nned-historical-archives17/main/bbcb5d69-b6b3-4613-9356-b5e04435e091/43.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives17/main/bbcb5d69-b6b3-4613-9356-b5e04435e091/44.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives17/main/bbcb5d69-b6b3-4613-9356-b5e04435e091/45.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives17/main/bbcb5d69-b6b3-4613-9356-b5e04435e091/46.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives17/main/bbcb5d69-b6b3-4613-9356-b5e04435e091/47.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives17/main/bbcb5d69-b6b3-4613-9356-b5e04435e091/48.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives17/main/bbcb5d69-b6b3-4613-9356-b5e04435e091/49.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives17/main/bbcb5d69-b6b3-4613-9356-b5e04435e091/50.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives17/main/bbcb5d69-b6b3-4613-9356-b5e04435e091/51.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives17/main/bbcb5d69-b6b3-4613-9356-b5e04435e091/52.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives17/main/bbcb5d69-b6b3-4613-9356-b5e04435e091/53.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives17/main/bbcb5d69-b6b3-4613-9356-b5e04435e091/54.jpg"],"article":{"title":"朱永嘉分裂党的的阴谋活动","alias":"","parts":[{"type":"paragraph","text":"就去开法家著作注释会议。惦走之前还一再要求抓时间写好之篇文章：生永嘉到此室后还打长途电话事，催促稿子"},{"type":"paragraph","text":"当时，我们就他们所定的调子关门炮制了两个星期，其中经过一次修改，议稿，打印在飞机送往此京。过了一同，哲学组人告诉我们说，春桥人为：“这样的文章形射太明显，容易产生副作用，自前暂不宜发表”手是，这篇子也就一直存当起来了。"},{"type":"paragraph","text":"现在，我的所到觉中央的传达报告，其中毛主席逝在后，四人”指群而置梁效写后的又章，这就真相大白，可见。四\u003c帮“爱篡权的野心由事已久。七四年七月，“四人帮”要之洒写你望写后的文章，开头催得跟条，后事又回去，这正是搞们谋计的特征，“四人帮”想出是后，大造反觉夺权与论，在当主席在，他们怕出马脚，手是欲行文止，主席逝去后，他们又要纹重上名之章，这正是他们及觉篡权狼子野心的大幂露："},{"type":"paragraph","text":"潘富恩"},{"type":"paragraph","text":"（引自七系战报特刊）"},{"type":"paragraph","text":"生头嘉兮裂觉的阴旧活动"},{"type":"paragraph","text":"四人帮唯恐天下不乱，一直挑拨上海和儿芽皆市关係，函授教育成为他们的一个童零乎，，生永嘉爱教齐特卖力，自生马以调查阳就逐投问题云名，搞是弟尚市材科，朱永嘉开会时叶函授人员把欣风抗带到免柔省去，并要求大家只者去点火，破你兄的之作都害要求把备背的情沉集中江总后上报四人帮。握款音写也搞了一个各他动态材料，资斜是收集、二十几个档的报利上发表的“新提法”“新是”新作法”新动忘”每月两期报文教组市善我们不禁向这介材料是千什么用的，究竟是学习兄弟者市的经，不是用整完者的？"},{"type":"paragraph","text":"方教育局办么宝革命释久"}],"authors":[],"dates":[{"year":1976}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":52,"page_end":52},"tags":[{"name":"四人帮","type":"人物"},{"name":"夺权","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ef9da70594"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
