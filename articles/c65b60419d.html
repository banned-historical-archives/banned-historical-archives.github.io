art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"母亲的变化","authors":["许青松〖HH/换行〗DW：三二三八一部队某部"],"parts":[{"type":"paragraph","text":"去年，在学习无产阶级专政理论运动的推动下，我妹妹高中毕业后，决心回到老家，扎根农村干革命。妹妹刚一提起这件事，母亲马上就说：“好，好，回到生你的农村，养你的贫下中农中去，接受再教育，我一百个支持。”"},{"type":"paragraph","text":"为了送女务农，母亲当夜写了决心书，表示，“支持女儿回乡务农是我的责任。毛主席指引的光辉道咱走定了，送女务农的心咱也铁定了。”"},{"type":"paragraph","text":"现在，我妹妹正和贫下中农战斗在农业第一线。"},{"type":"paragraph","text":"谈到这里，不禁使我想起九年前的情景，母亲的变化真大呀！那一年，我小学毕业。当我捧着考满了百分的考卷来到家里时，只听到母亲连声说：“好，好，有出息，往后上了大学，说不定还能当个什么家的，当妈的也光彩啊！”母亲还跑到学校，再三要求把我送进了一个有名气的中学。"},{"type":"paragraph","text":"母亲的变化使我心潮起伏，文化大革命真是一场触及人们灵魂的大革命，它给亿万人民以崭新的精神风貌，沿着毛主席的革命路线阔步前进。而党内不肯改悔的走资派邓小平跳出来，要翻文化大革命的案，算文化大革命的帐，真是“蚍蜉撼树谈何易”。我要永远为保卫无产阶级文化大革命的成果，拿起笔，握紧枪。"}],"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c65b60419d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
