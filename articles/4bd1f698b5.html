script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"瑞典《火炬》杂志发表文章揭露苏联利用“经互会”剥削东欧国家","authors":[],"dates":[{"year":1974,"month":7,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社斯德哥尔摩一九七四年七月八日电　瑞典《火炬》杂志在今年第四一五期合刊中发表文章，揭露苏联利用“经互会”控制、剥削和掠夺东欧国家，推行新殖民主义。"},{"type":"paragraph","text":"这篇文章指出，苏联在“经互会”内推行“国际分工”、“专业化”和“一体化”，使东欧国家的经济遭受严重破坏。例如，最近几年德意志民主共和国被迫把六十座纺织厂改为制造电动机的工厂，并停止了生产飞机与拖拉机。"},{"type":"paragraph","text":"文章接着指出，苏联在“经互会”内垄断了一些工业部门。例如，电子计算机的最重要部件是在苏联制造的，其它“经互会”成员国只能生产某些配件。"},{"type":"paragraph","text":"文章说，“经互会”成员国从苏联进口产品的价格往往高于世界市场的价格。据苏联官方统计，从一九六○年到一九七○年，苏联卖给四个“经互会”成员国九千八百七十七万吨原油，售价十七亿零五百六十二万卢布，同期苏联卖给六个西欧国家原油九千九百一十一万吨，售价却只有八亿五千二百九十九万卢布。这就是说，苏联的“盟国”不得不比西欧国家多付给苏联高出一倍的价钱。"},{"type":"paragraph","text":"文章指出，苏联领导集团在“经互会”内推行“经济一体化”已引起了“经互会”一些成员国的抵制。文章最后指出，尽管施行了种种压力，“经互会”的“一体化”计划仍然没有完全按照克里姆林宫统治者的期望发展。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4bd1f698b5"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
