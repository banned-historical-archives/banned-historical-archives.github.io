ical-archives/banned-historical-archives0/main/maoquanji52.pdf"],"article":{"title":"读《绘图增像西游记》批语","alias":"","parts":[{"type":"paragraph","text":"读《两般秋雨庵随笔》批语"},{"type":"paragraph","text":"云南昆明池大观楼对联，每联长至九十字，"},{"type":"paragraph","text":"孙髯翁所题。其句云：“五百里昆池，奔来眼"},{"type":"paragraph","text":"此阮元改底。披襟岸愤，喜茫茫空阔无边。看东金马，笔，非尽原文。"},{"type":"paragraph","text":"西翥碧鸡，北走长蛇，南盘舞鹤。骚人韵事，何妨选胜登临。趁蟹屿螺洲，梳裹就烟鬟雾。更巅天苇地，点缀些翠羽丹霞。莫辜负四围香稻，万倾晴沙，九夏芙蓉，三春杨柳。委数千年往事，注到心头。把酒临风，叹滚滚英雄谁在。想汉习楼船，唐标铁柱，宋挥玉斧，元跨革囊。伟绩丰功，费煞移山气力。尽珠帘画栋，卷不尽暮雨朝云。便断碣残碑，都付与苍烟落照。只赢得几霜钟，半江渔火，两行秋雁，一叶扁舟。”长句硬盘，如僧绰之棋，累而不坠，真杰笔也。[卷四《昆明池对联》第37~38页]"}],"authors":["毛泽东"],"dates":[],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":294,"page_end":294},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"035a77f9b4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
