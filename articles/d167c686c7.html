rt":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"把党支部建成无限忠于毛主席的战斗堡垒","authors":["武汉部队活学活用毛泽东思想先进集体某部上甘岭特功八连党支部"],"parts":[{"type":"paragraph","text":"在全国亿万军民隆重纪念中国共产党诞生四十八周年的大喜日子里，中央两报一刊发表重要社论，传达了伟大领袖毛主席的最新指示，我们全连指战员以无比喜悦的心情热烈高呼：毛主席万岁！毛主席万万岁！"},{"type":"paragraph","text":"伟大、光荣、正确的中国共产党，是伟大领袖毛主席亲手缔造和培育的党，是用马克思主义、列宁主义、毛泽东思想武装起来的党。我党从胜利走向胜利的光辉历史，告诉人们这样一条颠扑不破的真理：有了毛主席的领导，沿着毛主席的革命路线前进，革命就胜利，党就发展壮大；离开毛主席的革命路线，革命就受到挫折，党就遭到损失。"},{"type":"paragraph","text":"我军是毛主席亲手缔造的、在党的绝对领导之下的人民军队。加强还是削弱军队中党的领导，是两条建军路线斗争的焦点。我们伟大领袖毛主席，一向重视党对军队的领导。他老人家指出：“我们的原则是党指挥枪，而决不容许枪指挥党。”我们连从一九三一年成立以来，就遵照毛主席关于“支部建在连上”的伟大教导，努力把连队党支部建设成无限忠于毛主席的战斗堡垒。在烽火连天的战争年代，党支部带领全连指战员，紧跟毛主席，南征北战，荣立九次集体战功。在朝鲜上甘岭战斗中，我们全连同志发扬一不怕苦、二不怕死的革命精神，坚守坑道十四昼夜，粉碎了美国强盗的猖狂进攻，荣立了集体特等功。林副主席主持军委工作以来，我们全连指战员高举毛泽东思想伟大红旗，坚持突出无产阶级政治，连续八年被评为四好连队。在无产阶级文化大革命中，全连指战员用毛主席关于无产阶级专政下继续革命的理论武装头脑，在“三支”“两军”工作中继续为人民立新功。革命斗争的实践使我们深深懂得，只要我们时刻牢记毛主席的教导，“只要我们时刻遵守党的指示，我们就一定胜利。”"},{"type":"paragraph","text":"我们已经取得了伟大胜利。但革命没有完，革命还要继续。我们决心进一步学好毛主席关于无产阶级专政下继续革命的伟大理论，为彻底埋葬帝、修、反，解放全人类，贡献出我们的全部力量。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d167c686c7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
