" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji29","name":"毛泽东全集第29卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji29.pdf"],"article":{"title":"开辟敌后战场在战略上是必须的有利的","alias":"","parts":[{"type":"paragraph","text":"开辟敌后战场在战略上是必须的有利的!！"},{"type":"paragraph","text":"（1950年10月10日）倪转金，并告彭："},{"type":"paragraph","text":"（一）庆祝人民军克复蔚珍、竹边地区的大胜利。（二）现敌军大部北进，后方空虚，建议凡人民军无法北撤者均留于南朝鲜，开辟敌后战场，这在战略上是必须的而且是很有利的。如有人民军四五万人留在南朝鲜担负此项任务，则对北部作战将大有帮助。（三）敌似正在准备从镇南浦至新义州一线可以登陆之海岸举行新的登陆作战，切断平壤至新义州的交通线，而这一交通线是必须保护的，请彭与朝鲜同志研究保护方法，如敌登陆则应坚决歼灭之。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十月十日"},{"type":"paragraph","text":"[1]这是毛泽东给中国驻朝鲜民主主义人民共和国大使倪志亮转朝鲜民主主义人民共和国首相金日成的电报。"},{"type":"paragraph","text":"[2]倪，指倪志亮，当时任中国驻朝鲜民主主义人民共和国大使。[3]竹边，即竹边里，位于庆尚北道北部。[4]镇南浦，即今南浦，位于平安南道西南。"}],"authors":["毛泽东"],"dates":[{"year":1950,"month":10,"day":10}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":223,"page_end":223},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1ca9677b14"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
