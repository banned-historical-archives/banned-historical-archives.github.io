ical-archives/banned-historical-archives8/main/maoquanji18.pdf"],"article":{"title":"给李鼎铭\"的信","alias":"","parts":[{"type":"paragraph","text":"给李鼎铭\"的信"},{"type":"paragraph","text":"（1944年4月29日）鼎铭老先生左右："},{"type":"paragraph","text":"《永昌演义》前数年为多人所借阅；近日鄙人阅读一过，获益良多。并已抄存一部，以为将来之用。作者李健侯先生经营此书，费了大力，请先生代我向作者致深切之敬意。此书赞美李自成个人品德，但贬抑其整个运动。实则吾国自秦以来二千余年推动社会向前进步者主要的是农民战争，大顺帝李自成将军所领导的伟大的农民战争，就是二千年来几十次这类战争中的极著名的一次。这个运动起自陕北，实为陕人的光荣，尤为先生及作者健侯先生们的光荣。此书如按上述新历史观点加以改造，极有教育人民的作用，未知能获作者同意否？又健侯先生近来健康如何，能来延安一游否？统祈转致健侯先生为祷！"},{"type":"paragraph","text":"敬颂大安！"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"四月二十九日[1]李鼎铭（1881-—1947)，陕西米脂人，当时任陕甘宁边区政府副主席。"},{"type":"paragraph","text":"[2]李健侯，陕西米脂人，当时任陕甘宁边区参议会参议员，在米脂县文献委员会工作。K健否？统衫改处"},{"type":"paragraph","text":"乐激颂女安!"},{"type":"paragraph","text":"四月廿九月"}],"authors":["毛泽东"],"dates":[{"year":1944,"month":4,"day":29}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":438,"page_end":439},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ad6cc904a9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
