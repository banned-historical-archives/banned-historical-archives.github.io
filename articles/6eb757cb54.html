art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"坚决把毛泽东思想学到手","authors":["济南部队学习毛主席著作积极分子/某团军需股长孙乐义"],"parts":[{"type":"paragraph","text":"当我听到毛主席穿着军装，参加百万革命群众大会的消息，心情万分激动，禁不住欢呼：“伟大的领袖毛主席万岁！万万岁！”"},{"type":"paragraph","text":"毛主席身穿军装，检阅革命群众，这是对我军全体干部战士的最大鼓舞。毛主席的身体这样健康，林彪副主席的身体也这样健康，这是我们革命战士的最大幸福。"},{"type":"paragraph","text":"毛主席身穿军装，是要我们发扬老红军的光荣传统，是要我们全国全军办成一个革命化的大学校，是要我们在阶级斗争的大风浪里勇敢地战斗，把自己锻炼成为最无畏的战士，最勇敢的尖兵，为全人类的彻底解放战斗一生！"},{"type":"paragraph","text":"听完广播，我的心情久久不能平静。我面对着墙上挂着的毛主席象，从心里向毛主席宣誓：我坚决响应林副主席的号召，永远高举毛泽东思想伟大红旗，更加努力地活学活用毛主席著作，坚决把毛泽东思想学到手。我一定最认真最积极学习和宣传党中央的决定和公报，最坚决最勇敢地执行决定和公报提出来的战斗任务，把无产阶级文化大革命进行到底，把社会主义革命进行到底。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6eb757cb54"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
