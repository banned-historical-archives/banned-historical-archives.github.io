ical-archives/banned-historical-archives0/main/maoquanji41.pdf"],"article":{"title":"郑州会议纪要","alias":"","parts":[{"type":"paragraph","text":"郑州会议纪要！"},{"type":"paragraph","text":"（1959年3月5日）"},{"type":"paragraph","text":"一九五九年二月二十七日，在郑州举行了中央政治局扩大会议。会议进行了七天，三月五日结束。到会者，中央二十人，省、市、区党委第一书记二十七人，共四千七人。会议的主题是人民公社问题。首先由毛泽东同志讲了他的意见，然后进行了几次讨论。结果如下："},{"type":"paragraph","text":"（一）同意毛泽东同志的意见。"},{"type":"paragraph","text":"（二）规定了如下十四句话作为当前整顿和建设人民公社的方针。这十四句话是："},{"type":"paragraph","text":"统一领导，队为基础：分级管理，权力下放；三级核算，各计盈亏；分配计划，由社决定；适当积累，合理调剂；物资劳动，等价交换：按劳分配，承认差别。（三）起草了一个关于人民公社管理体制的若干规定（草案）。"},{"type":"paragraph","text":"[1]这是毛泽东为1959年2月27日至3月5日在郑州举行的中共中央政治局扩大会议写的纪要。"}],"authors":["毛泽东"],"dates":[{"year":1959,"month":3,"day":5}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":312,"page_end":312},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]},{"id":"wenji8","type":"pdf","name":"毛泽东文集第八卷（1999）","internal":false,"official":true,"author":"中央文献研究室","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/wenji8.pdf"],"article":{"title":"郑州会议纪要","description":"根据中共中央文件刊印。","dates":[{"year":1959,"month":3,"day":5}],"parts":[{"text":"郑州会议纪要","type":"title"},{"type":"paragraph","text":"一九五九年二月二十七日，在郑州举行了中央政治局扩大会议。会议进行了七天，三月五日结束。到会者，中央二十人，省、市、区党委第一书记二十七人，共四十七人。会议的主题是人民公社问题。首先由毛泽东同志讲了他的意见，然后进行了几次讨论。结果如下："},{"type":"paragraph","text":"（一）同意毛泽东同志的意见。"},{"type":"paragraph","text":"（二）规定了如下十四句话作为当前整顿和建设人民公社的方针。这十四句话是："},{"type":"paragraph","text":"统一领导，队为基础；"},{"type":"paragraph","text":"分级管理，权力下放；"},{"type":"paragraph","text":"三级核算，各计盈亏；"},{"type":"paragraph","text":"分配计划，由社决定；"},{"type":"paragraph","text":"适当积累，合理调剂；"},{"type":"paragraph","text":"物资劳动，等价交换；"},{"type":"paragraph","text":"按劳分配，承认差别。"},{"type":"paragraph","text":"（三）起草了一个关于人民公社管理体制的若干规定（草案）。"}],"comment_pivots":[{"part_idx":0,"offset":6,"index":1}],"is_range_date":false,"authors":["毛泽东"],"comments":["这个纪要是毛泽东起草的。"],"page_start":25,"page_end":26,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a0c2e531a6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
