北京大学","荆山"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"野火烧不尽 春风吹又生","type":"title"},{"text":"北京大学荆山","type":"authors"},{"text":"(此文系北京大学一学生为谭天荣“一株毒草”辩护的大字报)","type":"subtitle"},{"text":"“一株毒草”的出现引起了轩然大波，“卫道者”们的面目完全暴露了。","type":"paragraph"},{"text":"“反动、反党、反人民”这些我们早已熟稔的条件反射式的法宝都已使用了。","type":"paragraph"},{"text":"算得了什么？辱骂与恐吓决不是战斗，教条主义者醒醒吧！","type":"paragraph"},{"text":"×　　×　　×","type":"paragraph"},{"text":"精通医道的“圣人们”把勇敢而怀有恶意的小伙子指斥为歇斯底里，我不懂医道，何敢妄加诊断，但歇斯底里只是资产阶级社会中人性被压抑的心理变态，在今天新社会中如有歇斯底里，那就是问题的症结。但愿没有，医生们应该深造！","type":"paragraph"},{"text":"古云：庸医会杀人的！","type":"paragraph"},{"text":"×　　×　　×","type":"paragraph"},{"text":"“是时候了”反对官僚主义，反对宗派主义，反对主观主义，反对潜伏于“圣人们”身上的卑劣的心理。","type":"paragraph"},{"text":"“诗人们冲破”人间一切的“藩篱”，“敲响您们那根沉重的琴弦”吧！是时候了。","type":"paragraph"},{"text":"×　　×　　×","type":"paragraph"},{"text":"“成绩是主要的，缺点是难免的，受了些委屈是可以理解的，大家的激动是可以原谅的”，不要这种牙痛咒！！！","type":"paragraph"},{"text":"×　　×　　×","type":"paragraph"},{"text":"“毒草”！！茁壮地生长吧！野火烧不尽，春风吹又生！！！","type":"paragraph"},{"text":" 来源：《右派言论选集》。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"db04718612"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
