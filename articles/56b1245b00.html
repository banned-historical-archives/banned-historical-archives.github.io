art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"说清了道理 解除了疑虑——推荐《关于彻底否定“文化大革命”，消除派性，增强党性的问答》","authors":["孟良"],"parts":[{"type":"paragraph","text":"在中央整党工作指导委员会发出第九号通知，要求各整党单位对广大党员深入地进行彻底否定“文化大革命”的教育，努力从思想、政治和组织上消除派性以后，军报立即以整版的篇幅发表了这组《问答》（刊7月17日二版），非常及时，给人的启发很大！"},{"type":"paragraph","text":"这组《问答》，有很强的理论性、指导性。它使我们进一步认识到彻底否定“文化大革命”，消除派性，增强党性，是从思想、政治和组织路线上拨乱反正的一个根本问题。不解决这个问题，就不能很好地完成整党的任务和新时期党、国家和军队建设的任务。"},{"type":"paragraph","text":"这组《问答》有很强的针对性。它比较清晰、明确地回答和解决了影响比较深、涉及面比较广的一些思想认识问题，促使人们自觉对照检查，端正态度，把认识统一到十一届六中全会的决议上来，同党中央保持高度一致。"},{"type":"paragraph","text":"这组《问答》篇幅短小，通俗易懂，把发人深省的道理，寓于有理有情的循循善诱之中，使人们解除了疑虑，澄清了对“彻底否定‘文化大革命’”的模糊认识，明辨了是非，坚定了对整好党，建设好我们的国家和军队的信心。 （孟良）"}],"alias":""},"tags":[{"name":"派性","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"56b1245b00"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
