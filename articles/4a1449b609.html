ical-archives/banned-historical-archives0/main/maoquanji37.pdf"],"article":{"title":"关于社会主义改造完成问题的批语","alias":"","parts":[{"type":"paragraph","text":"关于社会主义改造完成问题的批语！！"},{"type":"paragraph","text":"（1956年12月24日）此件送陈叔通先生一阅，退还陈云副总理。"},{"type":"paragraph","text":"我在这里讲的是“天约三年基本上完成社会主义革命”，并没有讲三年全部完成。所谓基本完成，在工商业就是公私合营，但不是三年而是半年即完成了，我多估计了两年半。所谓全部完成，就是国有化，即取消定息，那是至少需要七年的。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十二月廿四日"},{"type":"paragraph","text":"[1]这个批语写在毛泽东的机要秘书高智1956年12月23日关于遵陈云之嘱将同年1月26日《人民日报》送给毛泽东审阅的报告上。"},{"type":"paragraph","text":"[2]中华全国工商业联合会主任委员、全国人大常委会副委员长陈叔通看了毛泽东这一批语后，于1956年12月25日写了以下一段话：各报均如此登载，我们各级工商业联合会亦是照此传达，只是未曾再加一句：即是走上高级国家资本主义道路，而不是国有化。因此，有些人不懂基本两字，懂的亦不免怀疑，说三年结果去冬今春已走上国家资本主义，可能再两年即转变为国有化。这次毛主席说明定息七年还可能拖一个尾巴，大家就安心了。陈云将陈叔通写的这一段话报送毛泽东。"},{"type":"paragraph","text":"[3]“这里”，指高智送阅的《人民日报》上发表的毛泽东1956年1月25日在最高国务会议上的讲话，讲话中说：“从去年夏季以来，社会主义改造，也就是社会主义革命就以极广阔的规模和极深刻的程度展升起来。大约再有三年的时间，社会主义革命就可以在全国范围内基本上完成。”"}],"authors":["毛泽东"],"dates":[{"year":1956,"month":12,"day":24}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":198,"page_end":198},"tags":[{"name":"毛泽东","type":"人物"},{"name":"陈云","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4a1449b609"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
