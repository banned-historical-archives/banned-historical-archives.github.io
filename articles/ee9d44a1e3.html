972,"month":7,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"资产阶级古典政治经济学出现于资本主义上升时期，它是代表新兴资产阶级的利益、具有一定科学成分的经济理论。"},{"type":"paragraph","text":"古典政治经济学产生于十七世纪下半期，著名的代表人物有亚当·斯密和大卫·李嘉图，为了维护新兴的资产阶级的利益，他们抨击了封建制度，反对封建贵族的特权，主张经济自由等。由于当时无产阶级和资产阶级的阶级斗争还没有激化，所以他们能在不同的程度上对资本主义生产关系进行分析，从而具有一定的科学成分:初步奠定了劳动价值论的基础；并在此基础上，说明了剩余价值的一些具体形式——地租、利润和利息等；指出了资本主义社会中存在三个阶级(资产阶级、无产阶级和地主阶级)，并在一定程度上论证了它们之间的矛盾。"},{"type":"paragraph","text":"但是，由于他们的资产阶级的局限性，不可能从根本上揭示资本主义发展的规律，而把资本主义看成是一种永恒不变的制度。在他们的经济理论中包含着不少庸俗的成分。随着无产阶级和资产阶级斗争的日益尖锐化，古典政治经济学就为庸俗政治经济学所代替。"},{"type":"paragraph","text":"马克思对资产阶级古典政治经济学进行了透彻的分析，对其中庸俗的因素作了深刻和彻底的批判。在这个基础上，继承了其中的科学因素，创造了崭新的无产阶级政治经济学。古典政治经济学是马克思主义政治经济学的来源之一。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ee9d44a1e3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
