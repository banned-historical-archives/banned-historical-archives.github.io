script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji3","name":"毛泽东全集第3卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji3.pdf"],"article":{"title":"全国农协最近训令","alias":"","parts":[{"type":"paragraph","text":"全国农协最近训令"},{"type":"paragraph","text":"（1927年6月13日）"},{"type":"paragraph","text":"为令遵事。农运过去因发展过速，组织上未所健全，加以土劣猛力反攻，遂使农村斗争日趋急剧，上级机关之指导偶有不周即不免发生无组织之行动。已经本会明令各级农协极力纠正，务使各地农民俱在农协指挥之下，有组织有计划地继续与一切土劣反封势力斗争，以尽我农民在革命过程中推翻帝剥削中国乡村的经济基础及军阀统治的政治基础之职责，并指出各地农民目前的斗争目标应为建立乡村自治而奋斗。现据各方报告，在湘赣鄂三省中土劣进攻非常猛烈，党员农民工人牺牲者不下一万数千人，其挑拨革命军人与农民感情之毒计，亦正积极进行，往往捏造事实，指鹿为马，故甚其辞，希冀军人向民众团体发生剧烈之冲突，离间军民感情，分裂联合战线，破坏三大政策，于以推翻党国，虽人民痛苦亡国灭种亦所不惜，同时贪污起而与土劣互相响应，共同捏词诬蔑农民，以图离间政府与人民之关系，如贡冈农协本无铲挖烟苗事项，而贪污竟蒙呈中央予以解散即其著例，现在国府军事委员会因已明悉帝阀贪污土劣买办洋奴以及一切反动派乘我军北伐与奉军战斗剧烈之际向国府联合进攻之毒计，而训令全体武装同志，对于指鹿为马，过甚其词之传言，谨为审查勿堕反动派之阴谋。然日来各城土劣勾结土匪溃军屠杀农民事实仍有愈演愈烈之势。贪污离间政府与人民之阴谋亦后层出不穷。各机关近来接及诬控农民之状纸每日不下数起，在此种情形下，各级农会极应一改请求国府（一）明令保护工人组织及工纠队农民自卫军并惩办一切屠杀工农扰乱口方之反动派，使工会农会CP等革命组织享有完全自由团结革命势力，实行讨伐蒋。（二）肃清湖北各县勾结逆军土匪屠杀农民工人之土劣，严惩造谣离间的蒋介石奸细及一切反动分子，以巩固武汉。（三）明令惩办许克祥、仇鳌、彭国钧、萧羽昆，解散其救党委员会、清党委员会等反动机关，恢复湘省政府省党部省工会省农协及一切被摧残之革命团体，接收湖南请愿团之请愿，并令湘省政府主席唐生智从速镇压湖南之反革命派。（四）明令制止江西驱逐CP及工农领袖之行动，并严惩屠杀民众之反动派，农协之本身尤应更加努力团结农民，严密组织，武装自卫，以反抗土劣武装袭击，而镇压一切反动封建之挑拨离间。因为土劣之气焰不灭，则创设乡村自治建立民主政权终属不可能之事，经济上之建设更无从可以实现，而国民政府之基础亦未由巩固也。此令"},{"type":"paragraph","text":"中华全国农协临时执委会常委"},{"type":"paragraph","text":"谭延间谭平山邓演达毛泽东陆沉"},{"type":"paragraph","text":"六月十三日"}],"authors":["毛泽东"],"dates":[{"year":1927,"month":6,"day":13}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":529,"page_end":530},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a36637e50d"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
