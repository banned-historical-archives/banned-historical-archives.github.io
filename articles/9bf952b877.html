","authors":[],"dates":[{"year":1970,"month":4,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"瑞典马列主义者共产主义联盟电贺我成功发射人造卫星"},{"type":"paragraph","text":"中国的成就是毛泽东思想的伟大胜利"},{"type":"paragraph","text":"新华社二十八日讯　中国共产党中央委员会、中华人民共和国政府收到了瑞典马列主义者共产主义联盟的电报。电报最热烈祝贺中国第一颗人造地球卫星发射成功。电报全文如下：中华人民共和国政府中国共产党中央委员会同志们："},{"type":"paragraph","text":"我们以非常喜悦的心情获悉中国发射了一颗空间卫星。这是中国人民在社会主义建设中取得的一个伟大胜利，是毛泽东思想的伟大胜利。"},{"type":"paragraph","text":"这对全世界人民，对我们瑞典革命者是一个巨大的鼓舞。我们向取得这一成就的科学工作者和工人，向全体中国人民致以最热烈的祝贺。"},{"type":"paragraph","text":"致共产主义的敬礼"},{"type":"paragraph","text":"瑞典马列主义者共产主义联盟"},{"type":"paragraph","text":"主席贡纳尔·比林"},{"type":"paragraph","text":"一九七○年四月二十五日"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9bf952b877"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
