art":7,"page_end":7,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东痛批吃喝风","authors":["金百翰"],"parts":[{"type":"paragraph","text":"1950年2月，毛泽东访苏回国，计划在东北沿线顺路考察一下东北工业基地。在哈尔滨视察时，当地领导精心准备为他接风洗尘。随着一道道美味佳肴上席，毛泽东眉头逐渐锁紧。由于当时有借道回国的越南共产党领导人胡志明在场，毛泽东没说什么，只在两三个盘中夹点菜，吃了半碗米饭，就放下了筷子。饭后，他对负责接待的领导说：“我们国家还很穷，不能浪费，不能搞大鱼大肉、山珍海味。吃米饭和蔬菜就可以嘛！”听到批评，当地领导才明白毛泽东吃得少的原因。"},{"type":"paragraph","text":"在沈阳视察，毛泽东遇上了更加丰盛的招待宴席。出于礼节，他陪胡志明喝了几口葡萄酒，吃了一点青菜，其余大部分时间都在抽烟，用这种方式罢宴。之后，他来到会议室，对地方领导提出批评：“同志们，我们是人民的公仆，是为人民服务的，如果你们一层一层仿效下去，这么吃起来，在人民群众中将会有什么影响！”"},{"type":"paragraph","text":"第二天，在中央东北局、辽宁省和沈阳市领导干部会议上，毛泽东再次批评了吃喝风。他引用李自成和其手下大将刘宗敏进京后贪图享乐导致政权灭亡的典故，尖锐地指出：“我是不学李自成的，你们要学刘宗敏，我劝你们不要学。”"},{"type":"paragraph","text":"（金百翰 辑）"},{"type":"paragraph","text":"廉政短信："},{"type":"paragraph","text":"廉洁自律不当贪官，秉公办事不当昏官，勤奋务实不当懒官，锐意进取不当庸官。"},{"type":"paragraph","text":"——66051部队闫允峰"},{"type":"paragraph","text":"刚正不阿，如墨线过木曲也正；清正廉洁，似明矾入水浊亦清。"},{"type":"paragraph","text":"——南京军区第92医院金月红"},{"type":"paragraph","text":"为官舍私欲，定持公心；做事生贪念，必谋私利。"},{"type":"paragraph","text":"——66131部队王坤"},{"type":"paragraph","text":"滴水穿石绳锯木断，小欲不遏溢而自毙。"},{"type":"paragraph","text":"——69221部队唐继光"},{"type":"paragraph","text":"贪是针，刺百姓心；廉是灯，照万家人。"},{"type":"paragraph","text":"——69223部队李仲锦"},{"type":"paragraph","text":"公孙嗜鱼不受鱼，子罕不贪以为宝，杨震“四知”夜却金，包公拒礼开廉风。古人风尚，今之明镜，唯德唯廉，兵心向之，唯公唯明，兵心聚之。"},{"type":"paragraph","text":"——65587部队石敬德"},{"type":"paragraph","text":"为官守廉如棋中将帅：将帅不保，满盘皆输；廉洁不保，无以立身。"},{"type":"paragraph","text":"——66051部队张广众"},{"type":"paragraph","text":"点滴不注重，作风难养成；贪念一时有，悔恨伴终生。"},{"type":"paragraph","text":"——66463部队王利兵"},{"type":"paragraph","text":"殷鉴不远，莫待临崖勒马收缰晚；今事可追，何须船到江心补漏迟。"},{"type":"paragraph","text":"——65447部队王文伯"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"44d43f0ce2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
