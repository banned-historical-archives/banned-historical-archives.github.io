script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"奴隶市场","authors":["冰源"],"dates":[{"year":1951,"month":7,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"冰源"},{"type":"paragraph","text":"一艘轮船停靠在克利夫兰码头，卸下它自欧州带来的“难民”——人类货品。这些男女曾经被纳粹匪徒强迫离开他们自己的国家到德国的集中营；现在他们又被臭名昭著的国际难民局卖到美国做奴隶。"},{"type":"paragraph","text":"几乎每一天都有装载“难民”的船只到达美国港口。当他们刚下舷梯时就被那些征募代理处的人请去签名——签在那后来被雇主加上镣铐的卖身契约上。"},{"type":"paragraph","text":"对于“难民”们的可怕的恶劣生活以及劳动和工资的差别，甚至最反动的美国报纸也一再的叙述着这种野蛮的剥削。克利夫兰报写着:成千成百的塞尔维亚国籍的“难民”在本地的工业部门工作，所得到的不是牛乳和蜂蜜是极端的痛苦。如受雇在克利夫兰费洛机器厂的塞尔维亚人，住的是倾颓的房舍，吃的是少而又坏的食品，他们的生活丝毫没有比纳粹集中营好。"},{"type":"paragraph","text":"约翰·杰伯逊，美国难民委员会主席，最近宣布，不久以后将有十万以上的难民从欧洲入境。据国际难民局透露，今年初已有二十三万这种奴隶“避难”到美国。虽然，成千万的美国人民在失业中，但是仍须要大批的“难民”，因为他们是最便宜而有用的劳动力，所付给他们的工资仅次于零。"},{"type":"paragraph","text":"白俄罗斯苏维埃共和国代表，在联合国第四届大会上提一议案，要求采取紧急措施，使那些“难民”和流浪者，回到自己的祖国去，但是，这个提案被英美集团所否决了。"},{"type":"paragraph","text":"从国际难民局最近所发表的一个报告中，可以知道这个机构——国际难民局自四七年七月至五○年末已“移殖”(实际上是贩卖——译者)这类不幸者八十六万五千人于一些国家。就这样，国际难民局已成为显赫一时的奴隶商贩。　(译自新时代一四期)"}],"comments":[],"origin":"新时代","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e90253d8f2"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
