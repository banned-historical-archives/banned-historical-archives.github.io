每年增产二成以上","authors":[],"dates":[{"year":1977,"month":1,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　上海木材加工二厂广大干部和群众，深入开展‘工业学大庆’群众运动，自觉抵制‘四人帮’的干扰，坚持合理的规章制度，取得了可喜的成果。"},{"type":"paragraph","text":"经过无产阶级文化大革命，这个厂的广大职工批判了刘少奇反革命的修正主义路线，学习大庆工人‘三老四严’的精神，制订了合理的规章制度。但是，‘四人帮’出于篡党夺权的罪恶目的，竭力破坏‘工业学大庆’的群众运动，把建立合理的规章制度，说成是对工人的‘管、卡、压’。在这阵妖风影响下，有人提出要批判在文化大革命中建立起来的合理的规章制度。在压力面前，这个厂的广大职工坚决顶住!他们坚持每周两次的政治学习制度，认真学习马列著作和毛主席著作。坚持岗位责任制，把好质量关。有一次，个别同志工作时间随意离开岗位，党总支抓住苗子，及时加强思想教育，杜绝了不守纪律的现象。纪律好，生产增。从一九七一年以来，这个厂的生产月月新，计划季季超，平均每年增产百分之二十五，上缴利润递增率达百分之七十八。"},{"type":"paragraph","text":"粉碎‘四人帮’后，这个厂的职工革命热情更高涨，遵守纪律更自觉。大家深揭狠批‘四人帮’篡党夺权的滔天罪行，理直气壮地健全合理的规章制度，学习有安排，生产有计划，一季一小结，全年大总结，工作有评比，经常抓交流。为了进一步提高生产效率，他们克服厂小、条件差等困难，大搞技术革新，自行设计安装了一台波形板自动流水线。"},{"type":"paragraph","text":"(复旦大学新闻系学员)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"928278a77c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
