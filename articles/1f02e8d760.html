ors":[],"dates":[{"year":1967,"month":2,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"法国共产主义青年联盟（马列）机关刊号召"},{"type":"paragraph","text":"把《毛主席语录》作为斗争武器"},{"type":"paragraph","text":"新华社巴黎十一日电　法国共产主义青年联盟（马克思列宁主义）机关刊物《红卫兵》月刊在最近出版的第三期上发表文章，热烈赞扬《毛主席语录》。文章强调指出，这本红书中所体现的毛泽东思想，丰富和发展了马克思列宁主义。"},{"type":"paragraph","text":"文章接着写道，《毛主席语录》的出版“是历史上一个崭新的事件。它标志着革命群众本身能够直接掌握马克思列宁主义。马克思列宁主义一经深入群众，就会变成一种物质力量”。"},{"type":"paragraph","text":"文章强调说，这本红书“创造性地和全面地体现了理论与实践相结合的原则；从这个观点来看，它也是马克思列宁主义的一个发展。目前中国正是处在工农兵掌握马克思列宁主义的新时代，他们正在把马克思列宁主义变为不可战胜的物质力量”。"},{"type":"paragraph","text":"文章号召一切马克思列宁主义者把《毛主席语录》作为斗争的武器。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1f02e8d760"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
