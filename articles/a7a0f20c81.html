art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"苏修特权阶层残暴压迫和剥削劳动人民","authors":[],"parts":[{"type":"paragraph","text":"在勃列日涅夫、柯西金叛徒集团的统治下，苏联城乡的资产阶级特权阶层日益残暴地对劳动人民实行压迫和剥削。他们复辟资本主义的倒行逆施，受到苏联广大群众的强烈谴责。被压迫和被剥削的劳动人民的无比愤慨，必将发展成为熊熊的革命烈火，焚毁苏修的反动统治。"},{"type":"paragraph","text":"任意辱骂和解雇工人"},{"type":"paragraph","text":"波多尔斯克机械化工程管理处一位工人，愤怒地控诉这个企业的主任苏尔加“没有一天不谩骂工人或加以侮辱”，“凡是想反驳他，或者是表示自己看法的人，总是被他这样训斥：‘不想干，我就把你解雇’。”"},{"type":"paragraph","text":"这个企业的另一位工人揭露说，“在苏尔加任职期间，差不多所有的老工作人员都被解雇了”。这一个企业的编制总共是三百五十人，在苏尔加任职的三年期间被蛮横解雇的工人达三百一十八人。"},{"type":"paragraph","text":"据苏修报刊透露，在立陶宛加盟共和国的维尔纽斯市、考那斯市、克莱佩达市以及瓦列纳区、维尔纽斯区和卡普苏克斯区等地，无理解雇工人的现象“最为普遍”，并且任意处罚工人及粗暴对待少年和女工。"},{"type":"paragraph","text":"猖狂地敲诈勒索农民"},{"type":"paragraph","text":"斯摩棱斯克州希斯拉维契“联盟”农庄一位庄员，揭露这个农庄的主席科尔扎科夫猖狂地对劳动农民进行敲诈勒索。科尔扎科夫“粗暴地发号施令，罚款纷纷落到庄员头上，动辄就罚款。有时贴出这样的布告：某某和某某被罚款多少劳动日定额，或者十五卢布，二十卢布，二十五卢布……往往有这样的情况：你去领钱，而钱却不知为什么被扣除了。”"},{"type":"paragraph","text":"（据新华社）"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a7a0f20c81"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
