rt":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"首都人民警察换上新装决心把民警队伍办成毛泽东思想的大学校","authors":[],"parts":[{"type":"paragraph","text":"新华社一日讯 今天首都的人民警察都换上了早就盼望的新服装。首都的红卫兵和革命群众纷纷向他们祝贺，期望他们作毛主席的红卫兵，红到底，永远红。广大民警表示，一定要学习解放军，把民警队伍办成毛泽东思想的大学校。"},{"type":"paragraph","text":"今天清晨，首都的民警都身穿有红领章的草绿色上衣、藏蓝色的裤子，头戴有国旗帽徽的解放帽，走上了自己的岗位。他们说：改换新服装，是党中央、毛主席对我们的最大关怀，是人民群众对我们的最大信任。许多红卫兵、上班的工人、开车的司机、街道居民，看到他们穿着新服装，都兴奋地走上岗台、岗楼向他们道喜，小“红领巾”们也向他们鼓掌欢迎。"},{"type":"paragraph","text":"北京市公安局交通二中队的七十名民警，今天晚上九点钟一下班，就忙着写喜报，排着整齐的队伍，敲锣打鼓去党中央的群众接待站报喜。他们手里拿着红光闪闪的《毛主席语录》，在接待站的毛主席巨幅像前，表示决心以解放军为榜样，高举毛泽东思想伟大红旗，活学活用毛主席著作，用毛泽东思想统帅一切，把人民警察队伍办成毛泽东思想的大学校，永远忠于人民，忠于党，忠于毛主席，忠于毛泽东思想！他们高呼：“誓死保卫党中央！”“誓死保卫毛主席！”"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c7c6cb2b0d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
