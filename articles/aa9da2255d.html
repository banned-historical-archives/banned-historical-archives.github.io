ical-archives/banned-historical-archives0/main/maoquanji29.pdf"],"article":{"title":"军委关于查告志愿军伤亡失踪人数致彭德怀等电","alias":"","parts":[{"type":"paragraph","text":"为《瞿秋白文集》题词"},{"type":"paragraph","text":"和给杨之华的信"},{"type":"paragraph","text":"（1950年12月31日）"},{"type":"paragraph","text":"瞿秋白?同志死去十五年了。在他生前，许多人不了解他，或者反对他，但他为人民工作的勇气并没有挫下来。他在革命困难的年月里坚持了英雄的立场，宁愿向会子手的屠刀走去，不愿屈服。他的这种为人民工作的精神，这种临难不屈的意志和他在文字中保存下来的思想，将永远活着，不会死去。瞿秋自同志是肯用脑子想"},{"type":"paragraph","text":"[1]杨之华，瞿秋白的夫人。当时任中华全国总工会女工部部长。"},{"type":"paragraph","text":"[2]瞿秋白（1899—1935），江苏常州人。中国共产党的早期主要领导人之一。1927年8月主持召开中共中央紧急会议（即八七会议），纠正和结束了陈独秀的投降主义，确定了土地革命和武装反抗国民党反动派屠杀政策的总方针。1927年11月至1928年4月犯过“左”倾盲动主义错误。1930年9月主持召开六届三中全会，纠正李立三“左”倾冒险主义的错误。1931年1月六届四中全会上被王明“左”倾教条主义排斥于党中央领导之外。此后，在上海同鲁迅合作从事革命文化运动。1934年到中央苏区，任中华苏维埃共和国中央政府教育人民委员。红军长征后留在中央苏区。1935年2月从江西往福建转移途中被国民党逮捕，6月18日在福建长汀英勇就义。毛泽东全集第二十九卷问题的，他是有思想的。他的遗集的出版，将有益于青年们，有益于人民的事业，特别是在文化事业方面。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一九五○年十二月三十一日之华同志："},{"type":"paragraph","text":"来信收到。瞿秋白同志文集出版，甚好。写了几句话，不知可用否？此复，顺祝健康！"},{"type":"paragraph","text":"毛泽东十二月卅一日"}],"authors":["毛泽东"],"dates":[{"year":1950,"month":12,"day":31}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":488,"page_end":489},"tags":[{"name":"毛泽东","type":"人物"},{"name":"瞿秋白","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"aa9da2255d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
