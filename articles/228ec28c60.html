:[],"dates":[{"year":1951,"month":2,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　市人民政府劳动局为了发现部份资方，利用颁布的临时工办法，从原则性上钻空子，长期雇用临时工，剥削临时工的劳动力而给予微薄之工资，故特于昨日午后召集大丰工业原料行及庆成原料一厂劳资双方代表，举行座谈会，并请工商联及有关同业公会与产业工会代表出席。会上大丰行劳方及上级工会代表报告该行职工共三十人，而临时工有二十三人，其中工作最长之临时工已有二六六天之久，最短也在八十天以上。工资方面临时工工资仅抵长工工资百分之六十，且星期日无工资，年底无年奖。资方与临时工订约三个月一期，满期后暂停数天，即以不连续论。大丰资方也承认钻了空子。会上劳动局第三处调研室主任张志昂即指出，大丰行资方对待临时工是违犯了临时工办法第一、第七两条，有关同业公会与产业工会应即督促该行积极纠正:(一)契约订立应照顾平等双方的，(二)凡工作满六个月者应即升为正式工，(三)工资待遇应比例调整。"},{"type":"paragraph","text":"庆成原料一厂因劳资双方意见相异，故继续进行调查。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"228ec28c60"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
