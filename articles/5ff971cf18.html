script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"资产阶级的代言人","authors":["张万存"],"dates":[{"year":1966,"month":4,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"资产阶级的代言人"},{"type":"paragraph","text":"大兴县红星公社社员　张万存"},{"type":"paragraph","text":"吴晗同志在《海瑞骂皇帝》一文中，借海瑞的口，恶毒地攻击我们“大兴土木”，“穷的光光的”，这是造谣诬蔑。我们红星人民公社经过几年的建设，基本实现了机械化、电气化、水利化、化学化，把旱地改成了水田，稳产高产有了保证。由于我们社会主义建设的发展，人民公社经济巩固了，资产阶级复辟的可能性就小了。所以搞建设，只有对资产阶级不利，使他们攻不破人民公社。而吴晗同志攻击社会主义建设，正代表了资产阶级说话。社会主义建设的发展，也保证了社员生活的稳定。象我家十一口人，有两个高中生，一个大学生，日子过得挺欢。要是在旧社会，这是不可设想的。吴晗同志说我们劳动人民穷得可怜，这是骗人的鬼话。"},{"type":"paragraph","text":"吴晗同志吹捧海瑞的“战斗精神”，说穿了，就是要人们效法右倾机会主义分子反党、反社会主义的精神。要是右倾机会主义的阴谋得逞，那我们就会回到旧社会痛苦的生活啦。这是我们要坚决反对的。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5ff971cf18"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
