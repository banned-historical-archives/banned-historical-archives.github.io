thors":[],"dates":[{"year":1962,"month":8,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席刘主席周总理电赫鲁晓夫勃列日涅夫"},{"type":"paragraph","text":"祝贺苏联人民征服宇宙空间的新胜利"},{"type":"paragraph","text":"新华社15日讯　中国共产党中央委员会主席毛泽东，中华人民共和国主席刘少奇和国务院总理周恩来今天打电报给苏联共产党中央委员会第一书记、苏联部长会议主席赫鲁晓夫和苏联最高苏维埃主席团主席勃列日涅夫，祝贺苏联“东方三号”和“东方四号”宇宙飞船的成功发射、编队飞行和胜利着陆。电报全文如下：苏联共产党中央委员会第一书记、苏联部长会议主席尼·谢·赫鲁晓夫同志，苏联最高苏维埃主席团主席列·伊·勃列日涅夫同志："},{"type":"paragraph","text":"苏联成功地连续发射了“东方三号”和“东方四号”载人的卫星式宇宙飞船，实现了在宇宙空间的联合编队飞行，并且使飞船顺利地返回地面，这是苏联人民在征服宇宙空间方面的新的重大的胜利。中国人民为此感到无比的兴奋。我们谨代表中国人民、中国共产党和中国政府，并且以我们个人的名义向你们，并通过你们向苏联人民、苏联共产党和苏联政府，向驾驶宇宙飞船的宇宙航行员尼古拉耶夫少校和波波维奇中校致以最热烈的祝贺。"},{"type":"paragraph","text":"苏联人民的这一新胜利，是对人类征服宇宙空间的又一次伟大贡献，它再一次显示了社会主义阵营的强大威力和社会主义制度的无比优越性，大大鼓舞了各社会主义国家人民和全世界人民反对美帝国主义的战争阴谋，保卫世界和平和争取人类进步的斗争。我们衷心地祝苏联人民在征服宇宙空间的宏伟事业中继续取得新的更加辉煌的成就。"},{"type":"paragraph","text":"中国共产党中央委员会主席　毛泽东"},{"type":"paragraph","text":"中华人民共和国主席　刘少奇"},{"type":"paragraph","text":"中华人民共和国国务院总理　周恩来"},{"type":"paragraph","text":"1962年8月15日"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ac8ab140e5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
