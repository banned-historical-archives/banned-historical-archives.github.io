<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"maoquanji38","name":"毛泽东全集第38卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji38.pdf"],"article":{"title":"毛泽东等祝贺阿尔巴尼亚独立和解放纪念日的电报","alias":"","parts":[{"type":"paragraph","text":"毛泽东等祝贺阿尔巴尼业独立和解放纪念日的电报"},{"type":"paragraph","text":"（1957年11月26日）阿尔巴尼亚人民共和国人民议会主席团主席哈·列希同志，阿尔巴尼亚人民共和国部长会议主席穆·谢胡同志，阿尔巴尼亚劳动党中央委员会第一书记恩·霍查同志："},{"type":"paragraph","text":"当阿尔巴尼亚民族独立四十五周年和阿尔巴尼亚解放十三周年纪念日的时候，我们谨代表中国人民和中华人民共和国政府向你们，并且通过你们，向兄弟的阿尔巴尼亚人民和阿尔巴尼亚人民共和国政府致衷心的、热烈的祝贺。"},{"type":"paragraph","text":"四十五年前，英勇的阿尔巴尼亚人民，为了反对土耳其的黑暗统治、争取民族解放而进行的不屈不挠的斗争，大大地鼓舞了被压迫人民争取民族解放的胜利信心。后来，在反法西斯的解放斗争中，阿尔巴尼亚人民在阿尔巴尼亚劳动党的领导下所表现出的英勇、刚毅、坚忍不拔、克服困难的精神，受到了反法西斯各国人民的普遍赞扬。"},{"type":"paragraph","text":"十三年来，阿尔巴尼亚人民在阿尔巴尼亚劳动党的领导下，在建设社会主义，提高人民生活，加强以苏联为首的社会主义阵营各国间的团结和维护世界和平的事业中，获得了巨大的成就。中国人民对于这些成就感到极大的欢欣鼓舞。毛泽东全集第三十八卷"},{"type":"paragraph","text":"近年来，中阿两国人民间的友好合作关系获得了很大的发展。以彭真“同志为首的中华人民共和国全国人民代表大会代表团和以里塔·马尔科同志为首的阿尔巴尼亚人民共和国人民议会代表团的相互访问，进一步加强了这种友好合作关系。"},{"type":"paragraph","text":"祝兄弟的阿尔巴尼亚人民在建设幸福生活和维护世界和平和人类进步的事业中获得更大的成就。祝中阿两国人民间的兄弟友谊和合作日益巩固和发展。"},{"type":"paragraph","text":"中华人民共和国主席毛泽东中华人民共和国全国人民代表大会常务委员会委员长刘少奇中华人民共和国国务院总理兼外交部长周恩来"},{"type":"paragraph","text":"一九五七年十一月二十六日于北京"},{"type":"paragraph","text":"[1]彭真，当时任全国人大常委会副委员长兼秘书长、中共北京市委第一书记、北京市市长，1957年1月曾率中华人民共和国全国人民代表大会代表团和北京市人民委员会代表团访问阿尔巴尼亚人民共和国。"},{"type":"paragraph","text":"[2]里塔·马尔科，当时任阿尔巴尼亚人民共和国人民议会主席，1957年5月曾率阿尔巴尼亚人民共和国人民议会代表团访问中国。"}],"authors":["毛泽东"],"dates":[{"year":1957,"month":11,"day":26}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":359,"page_end":360},"tags":[{"name":"毛泽东","type":"人物"},{"name":"彭真","type":"人物"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1608b2fd64"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
