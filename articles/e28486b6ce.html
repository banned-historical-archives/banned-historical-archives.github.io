役经验的报告　（节录）","authors":[],"dates":[{"year":1952,"month":4,"day":8}],"is_range_date":false,"parts":[{"text":"中央批转一波同志关于上海五反第二战役经验的报告　（节录）","type":"title"},{"text":"……　我们规定第二战役的策略是“检查少数,　俘虏多数，严阵以待，不战而胜”，这是临于面对面斗争火力太强，斗争后太伤感情，对今后继续团结资本家不利有改变斗争方式的必要。……","type":"appellation"},{"text":"在上层资本家中间开展了激烈的评挤运动，虽系保护过关，但紧张的程度决不减于检查一次。……　我们不去斗资本家,　而是资本家自斗，我们只是坐山观虎斗。丘再春骂胡汝鼎是谋财害命的凶手。朱鸿仪谈小不谈大，胡子婴说：“我要控诉你，你过去总说造纸成本缺，我上了你的当”，会上通不过，要朱离席反省。　三百零三个资本家初步坦白出的问题有四千亿左右，这当然太少，最保守的估计也在一万亿元以上。(p. 37, 40-1)","type":"appellation"}],"comments":[],"origin":"四川省某档案馆","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e28486b6ce"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
