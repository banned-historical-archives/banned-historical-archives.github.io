ates":[{"year":1960,"month":5,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社乌兰巴托27日电】　周恩来总理、陈毅副总理今天下午2时10分拜会了蒙古人民共和国部长会议主席泽登巴尔。"},{"type":"paragraph","text":"拜会时，泽登巴尔主席代表蒙古人民革命党中央、蒙古政府和蒙古人民欢迎周恩来总理。周恩来总理转达了毛泽东主席、刘少奇主席、朱德委员长和中国的其他领导人向泽登巴尔主席和蒙古的其他领导人的问候。"},{"type":"paragraph","text":"拜会时在座的有:蒙古党政领导人桑布、曾德、莫洛姆扎木茨、杜格苏伦、巴尔吉尼雅姆、扎格瓦拉尔、迈达尔、拉姆苏伦，外交部长沙格达尔苏伦、蒙古驻中国大使沙拉布。"},{"type":"paragraph","text":"周恩来总理的随行人员姬鹏飞、李强、刘明夫、韩念龙、罗青长、陈叔亮、常彦卿以及中国驻蒙古大使谢甫生等也在座。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7a119f004c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
