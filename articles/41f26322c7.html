script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"维护正当权利　反对压迫剥削拉美国家工人农民不断展开斗争","authors":[],"dates":[{"year":1969,"month":2,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社北京二十一日电　拉丁美洲的阿根廷、智利和秘鲁等国家的工人和农民，为维护他们的正当权利，最近不断展开斗争。"},{"type":"paragraph","text":"阿根廷首都布宜诺斯艾利斯一家出版公司的一千三百名印刷工人，已经坚持罢工一个多月，抗议资方无理解雇三百五十名印刷工人。罢工工人组织了纠察队，在工贼住房的墙壁上涂写革命标语，并在居民中散发传单，揭露资方对他们的阶级弟兄的迫害。"},{"type":"paragraph","text":"智利拉塞雷纳市附近的农民最近举行示威游行，抗议拉塞雷纳市上诉法院为统治阶级抢夺农民土地服务。十九日，十四名农民在拉塞雷纳市阿尔马斯广场举行绝食斗争，要求立即释放在示威游行中被捕的两名农民，并要求法院立即归还从农民那里抢走的土地。农民的斗争得到这个城市广大人民的热情支持。当地反动当局和一小撮修正主义分子勾结起来，对农民进行镇压和诱骗。这些修正主义分子无耻指责农民的斗争“不策略”，会影响他们在即将举行的议会“选举”中的选票。但是农民们回答说:任何“选举”都解决不了农民的问题，只有提高农民的觉悟，团结起来进行斗争，才是唯一出路。"},{"type":"paragraph","text":"秘鲁卡哈马尔卡省卡哈班巴地区孔德班巴县一个村社的五百多农民，一月二十四日同警察进行了英勇的搏斗，抗议反动警察把这个村社的农民强行赶走。一个意大利财团在秘鲁胡宁省万卡约市经营的曼塔罗水力发电站的一千五百多名工人，上月底举行不定期罢工，要求增加工资。工人们拒绝了意大利资本家讨价还价的手段，坚持原来的要求。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"41f26322c7"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
