rt":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东同志善交工人朋友","authors":[],"parts":[{"type":"paragraph","text":"“五四”时期，农家出身的毛泽东同志，有一项很大的、非常卓越的本领——他能找到和工人群众接近的大众的语言。他的诚恳的心，老实朴素的态度，简单、透彻的语言，能够使任何工人信服。最疑难的事物，最深奥的道理，毛泽东同志都能给工人们解释得清清楚楚，使他们理解得明明白白。"},{"type":"paragraph","text":"毛泽东同志最初接触工人的办法是煞费苦心的。他曾作工人打扮，到工人们集聚的地方去和他们接近，到茶馆去和工人们一块喝茶，谈心，交朋友。一天，毛泽东同志去长沙城的南门外和小吴门外一段铁路上散步，走来走去，总希望遇见个把工人。后来终于遇到火车头修理厂的工人陈地广。这人是广东人。毛泽东同志就和他“拉话”，然后去他住的地方“玩”，谈他的工作、工资……这工人觉得客人很亲切。经过陈地广的介绍，他又认识了别的工人。彼此都熟了之后，毛泽东同志提议为他们办个学校，教他们识字。工人们都很赞成。回来后，毛泽东同志派郭亮同志去作工人夜校的教员（在第一师范求学的时候毛泽东同志就热心认真地办过工人夜校，这时更加扩大了他和工人的联系）。突破了一点之后，毛泽东同志运用这个经验到别的工人中去。"},{"type":"paragraph","text":"（摘自《青年运动回忆录》一书）RW：毛泽东"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"618f943fef"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
