ical-archives/banned-historical-archives0/main/maoquanji50.pdf"],"article":{"title":"对《人民日报》社论稿《坚定地走上同工农兵相结合的道路》的批语和修改","alias":"","parts":[{"type":"paragraph","text":"对《人民日报》社论稿《坚定地走上同工农兵相结合的道路》“的"},{"type":"paragraph","text":"批语和修改"},{"type":"paragraph","text":"（1968年8月）照发。略有修改。"},{"type":"paragraph","text":"二"},{"type":"paragraph","text":"本报七月二十二日编者按中说：“奉劝那些轻视工农、自己以为很了不起的大学生放下架子。”说错了吗？完全不错。这里说的是"},{"type":"paragraph","text":"[1]这篇社论稿是为纪念毛泽东首次检阅红卫兵两周年而写的，由中共中央文化革命小组组长陈伯达、组员姚文元1968年8月16日送毛泽东审阅，8月18日在《人民日报》发表。"},{"type":"paragraph","text":"[2]即本篇二，其中用宋体字排印的是毛泽东加写和改写的文字。此外，他还将文中“挑动工农斗学生”改为“挑动群众斗群众”。"},{"type":"paragraph","text":"[3]指1968年7月22日《人民日报》为发表调查报告《从上海机床厂看培养工程技术人员的道路》所加的编者按。毛泽东全集第五十卷“轻视工农”又有架子的那一小部分大学生，而不是指那些重视工农、愿意向工农学习的大多数大学生。轻视工农而又自己以为了不起，这种极端错误的态度，难道还不该彻底改正吗？"}],"authors":["毛泽东"],"dates":[{"year":1968,"month":8}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":276,"page_end":277},"tags":[{"name":"毛泽东","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a702751230"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
