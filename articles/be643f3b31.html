"傅崇碧","周恩来"],"dates":[{"year":1967,"month":2,"day":3}],"is_range_date":false,"parts":[{"text":"傅崇碧传达周恩来的紧急指示","type":"title"},{"text":"傅崇碧周恩来","type":"authors"},{"text":"〖参加单位：政法公社、矿院东方红、北京九中、市局干警等。中央公安部李震副部长亦在场。〗","type":"appellation"},{"text":"傅崇碧同志传达了周总理如下指示：","type":"paragraph"},{"text":"总理派我们来。矿院东方红和政法公社都是左派组织，出现了分歧。北京市公安局是我们的治安中心。在这里不能武斗，双方可派代表进行谈判，每方派十人，到人民大会堂，其它可以这里等待，但不许武斗，在这里也不许互相骂，骂就不好了，暂时不要在这里广播宣传了。","type":"paragraph"},{"text":"双方不要派太多的代表，太多了就不好谈了。","type":"paragraph"},{"text":"在公安局吵起来打起来，敌人会高兴的。而革命同志一点也不会高兴，这样闹下去影响非常坏。","type":"paragraph"},{"text":"谁武斗谁就犯法，我们每个革命造反派都要响应伟大领袖毛主席的“坚持文斗反对武斗”的伟大号召，有问题双方派代表协商解决。","type":"paragraph"}],"comments":[],"origin":"1967年3月北京玻璃总厂红卫兵联络站编《中央首长讲话（2）》","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"傅崇碧","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"武斗","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]},{"id":"chuanxinlu2","name":"十年文革中首长讲话传信录（中册）","internal":false,"type":"pdf","official":false,"author":"周良霄,顾菊英","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/十年文革中首长讲话传信录2.pdf"],"article":{"title":"傅崇碧传达周恩来的紧急指示","parts":[{"type":"title","text":"477．傅崇碧传达周恩来的紧急指示"},{"type":"paragraph","text":"(1967年2月3日北京市公安局礼堂)"},{"type":"paragraph","text":"参加单位：政法公社、矿院东方红、北京九中、市局干警等。中央公安部李震副部长亦在场。傅崇同志传达了周总理如下指示："},{"type":"paragraph","text":"总理派我们来。矿院东方红和政法公社都是左派组织，出现了分歧。北京市公安局是我们的治安中心。在这里不能武斗，双方可派代表进行谈判，每方派十人，到人民大会堂，其它可以这里等待，但不许武斗，在这里也不许互相骂，骂就不好了，暂时不要在这里广播宣传了。"},{"type":"paragraph","text":"双方不要派太多的代表，太多了就不好谈了。"},{"type":"paragraph","text":"在公安局吵起来打起来，敌人会高兴的。而革命同志一点也不会高兴，这样闹下去影响非常坏。"},{"type":"paragraph","text":"谁武斗谁就犯法。我们每个革命造反派都要响应伟大领袖毛主席的“坚持文斗，反对武斗”的伟大号召，有问题双方派代表协商解决。"}],"authors":["傅崇碧","周恩来"],"dates":[{"year":1967,"month":2,"day":3}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":175,"page_end":175,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"傅崇碧","
