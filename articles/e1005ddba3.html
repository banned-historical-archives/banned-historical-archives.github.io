script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"新中国第一个新型正规大学中国人民大学开学将马列主义和毛泽东思想武装起来的学生培养成掌握最新科学成就的专家","authors":[],"dates":[{"year":1950,"month":10,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京四日电】　新中国的第一个新型正规大学中国人民大学的开学典礼于三日在京隆重举行。"},{"type":"paragraph","text":"在开学典礼上，吴玉章校长报告了中国人民大学的工作概况，指出中国人民大学所培养的学生都要用马列主义毛泽东思想武装起来，并准备培养成为掌握最新科学成就的专家。"},{"type":"paragraph","text":"刘少奇副主席、朱德副主席都在会上讲话，一致指出中国人民大学创立的重大意义。在会上讲话的还有中央人民政府教育部马叙伦部长及该校苏联顾问安德里扬诺夫等和教员学生代表多人。"},{"type":"paragraph","text":"参加典礼的尚有中央人民政府张澜副主席、林伯渠秘书长，委员何香凝、司徒美堂、彭泽民、章伯钧、徐特立、谢觉哉，政务院副总理董必武，教育部副部长韦悫与各部、院、署首长，北京各大学校长，来京参加国庆典礼的各地少数民族代表和其他来宾、苏联教授及全体教职员学生共四千余人。"},{"type":"paragraph","text":"中国人民大学是中央人民政府政务院于一九四九年十二月十六日第十一次政务会议上决定设立的。它的任务是接受苏联先进的建设经验、并聘请苏联教授，有计划有步骤地培养新中国的各种建设干部。在中央人民政府与中共中央的直接关怀、指导，和苏联教授的协助之下，该校进行了将近一年的筹备和招生工作。中国人民大学现在已设立了本科的经济计划、财政、贸易、工厂管理、合作、法律、外交、俄文等八个系，专修科的经济计划、财政、对外贸易、国内贸易、合作、工厂管理、统计、法律、外交、教育、史地等十一个班，另外还设有一个文化补习班。全校现有学生三千余人，学生中参加革命多年的工农干部和先进工人占总人数三分之二以上。"},{"type":"paragraph","text":"中国人民大学的教育方针是教学与实际联系，苏联经验与中国情况相结合；在工作中特别强调教学的质量和效果并要求教员的科学水平不断提高。因此该校除在业务指导上取得中央人民政府各有关部门的直接联系与协助外，并在组织上特别设立了研究部，领导科学研究工作；又分别在教务部及各系下设立了教研室，以直接从事教学和研究工作。该校现在已经成立了三十六个教学研究室，组织二百五十名研究生二百多名教员参加工作，并有苏联教授三十五人分头担任科学指导。在教学方法上每门功课都有课堂实习和生产实习。该校在整个学校工作中十分注意计划性与组织性，每门功课都按非当严密的计划执行并实行专人负责制。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e1005ddba3"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
