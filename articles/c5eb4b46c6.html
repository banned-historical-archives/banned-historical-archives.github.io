局宣传部的信","authors":[],"dates":[{"year":1951,"month":7,"day":25}],"is_range_date":false,"parts":[{"text":"中央宣传部关于陶行知批评问题给华东局宣传部的信","type":"title"},{"text":"7月16日寄来×××同志的文稿（“从批判杜威的教育哲学谈到陶行知先生的教育思想”），不要在报刊上发表。这篇文章虽然批评了陶行知思想的错误方面（也没有充分的论证），但是没有区别杜威与陶行知，没有区别早年的陶行知和晚年的陶行知，没有区别陶行知思想的进步方面和落后方面，一般地把陶行知思想说成是“马列主义毛泽东思想的敌人”，对于陶行知晚年所办学校的性质和作用完全不管，而把他的办学校的行为描写为一贯反动。这样来批评陶行知是不合实际的，错误的和有害的，因此不应发表。陶行知的教育思想是应当批评的，但必须作全面的客观的批评，而不应作片面的武断的批评。","type":"paragraph"},{"text":" 7月25日","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c5eb4b46c6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
