dates":[{"year":1951,"month":1,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"中共中央毛主席电意共中央"},{"type":"paragraph","text":"祝贺意共成立三十周年纪念"},{"type":"paragraph","text":"【新华社二十二日讯】一月二十一日为意大利共产党成立三十周年纪念日。中国共产党中央委员会主席毛泽东致电意大利共产党副总书记隆哥和意共中央祝贺。电文如下：隆哥同志和意大利共产党中央委员会全体同志们："},{"type":"paragraph","text":"值此意大利共产党成立三十周年之际，谨向你们致以热烈的祝贺。意大利共产党在过去反对法西斯主义的斗争中以及在现在反对美国的侵略和战争计划、争取人民民主的意大利的斗争中，已经得到巨大成绩，因而使自己成为全意大利工人阶级和全意大利爱国人民的核心。我们坚信你们的正义事业在托里亚蒂同志和意共中央的正确领导之下，必定要得到最后的胜利。"},{"type":"paragraph","text":"中国共产党中央委员会主席  毛泽东"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5d208e0804"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
