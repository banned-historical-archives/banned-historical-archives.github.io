ates":[{"year":1996,"month":8,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"《毛泽东评点二十四史》影印线装本即将出版"},{"type":"paragraph","text":"据新华社北京８月８日电（记者曲志红）我国建国以来出版的规模最大的线装书——《毛泽东评点二十四史》影印线装本，即将由线装书局出版，向海内外编号限量发行。"},{"type":"paragraph","text":"毛泽东酷爱阅读史书，圈点、批注最多的是《二十四史》。从１９５２年至１９７６年，毛泽东通读了这部卷帙浩繁的史籍，其中许多卷册和篇章读过多遍，写下许多评注。这些评注，留下了这位伟人的许多重要的思想见解。"},{"type":"paragraph","text":"《毛泽东评点二十四史》影印线装本，是经中央文献研究室、新闻出版署和中央档案馆批准，根据中央档案馆提供的毛泽东生前阅读并作评点的乾隆武英殿本《二十四史》原本影印。影印出版前，中央文献研究室和中央档案馆组织专家学者对原书进行了整理、校勘，纠正了原书印装中的一些差错。"},{"type":"paragraph","text":"据介绍，《毛泽东评点二十四史》影印线装本共８５０册。这套书共影印５００套。首批印制的２００套将于今年９月起分史陆续面市。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]},{"id":"jfjb","name":"解放军报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"dates":[{"year":1996,"month":8,"day":9}],"page_start":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"《毛泽东评点二十四史》影印线装本即将出版","authors":["曲志红"],"parts":[{"type":"paragraph","text":"毛泽东是一位历史知识渊博的伟大的革命家、政治家。他酷爱阅读史书，圈点、批注最多的是《二十四史》。从1952年至1976年，毛泽东通读了这部卷帙浩繁的史籍，其中许多卷册和篇章读过多遍，写下许多评注。这些评注，留下了这位伟人的许多重要的思想见解。毛泽东又是当代的大书法家，他写的批语，留下了极富个性、造诣很高的手书真迹。"},{"type":"paragraph","text":"《毛泽东评点二十四史》影印线装本，是经中央文献研究室、新闻出版署和中央档案馆批准，根据中央档案馆提供的毛泽东生前阅读并作评点的乾隆武英殿本《二十四史》原本影印。影印出版前，中央文献研究室和中央档案馆组织专家学者对原书进行了整理、校勘，纠正了原书印装中的一些差错，最大限度地展示了毛泽东阅读《二十四史》所作的评注、圈点的原貌。"},{"type":"paragraph","text":"据介绍，《毛泽东评点二十四史》影印线装本共850册，首批印制的200套将于今年9月起分史陆续面市。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"22e3f4a1ea"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
