<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"致公党揭发了到处放火的谢白寒","authors":[],"dates":[{"year":1957,"month":8,"day":30}],"is_range_date":false,"parts":[{"text":"致公党揭发了到处放火的谢白寒","type":"title"},{"text":"人民日报讯：中国致公党和中华全国归国华侨联合会最近连续举行了八次大会小会，揭露批判右派分子谢白寒。这个右派分子是致公党中央办公厅主任秘书、北京市筹委会委员，并担任中华全国归国华侨联合会宣传部副部长职务。","type":"paragraph"},{"text":"谢白寒是一贯反共、反社会主义、反人民民主专政的右派分子。在这次反右派斗争中，他更尽其破坏歪曲之能事。各民主党派反击右派开始，谢白寒则恶毒地加以攻击，说“章、罗、龙、黄、陈等人被斗，是民主党派内部宗派斗争表面化的结果”，谢白寒大骂反对右派的人，说“史良无耻，吴晗卑鄙”。谢白寒还到处宣扬这是“诱敌深入，聚而歼之”，说“不相信共产党能让人提多少意见，也不相信共产党肯改正多少缺点。”谢白寒十分欣赏章罗联盟的“政治设计院”、“平反委员会”，竭力支持黄绍竑对我国法制工作的污蔑，支持李康年的“定息二十年”和章乃器的“定息不是剥削”、储安平的“党天下”的谬论。还到处介绍费孝通的“知识分子的早春天气”。","type":"paragraph"},{"text":"谢白寒早在去年冬天就和中国新闻社的右派分子有了勾结，这些右派分子在整风开始时组成了反动小集团，谢白寒就用单线联系的手法，布置他们进行反动活动。当这些右派分子被群众点名批判后，谢白寒到处为他们“叫冤”，反右派斗争展开以后，谢白寒和他们到北海划船，密商对策，他说：“不要人家一问，你就一答，要把话全部记下来，慢慢考虑写成书面，照着来读，才不被动”，并煽动他们顽强到底。最后，他们订立攻守同盟。在整个向党进攻过程中，右派小集团分子的每次检讨书和交代内容，批判会上有那种不利于谢白寒的发言或情况，都及时作了汇报或传阅，以便早作应付。谢白寒这样紧密地和中国新闻社的反动小集团勾结，目的何在呢？据谢白寒初步交代是为了在中国新闻社内排斥共产党员、夺取社的领导权，篡改政治方向，把中国新闻社变成这些右派分子的“同人通讯社”。他们还计划办反对党的领导的“同人刊物”，由谢白寒管编辑部。","type":"paragraph"},{"text":"谢白寒是十分仇视共产党员的，什么地方有个别党员犯了小错误，他就夸大歪曲，到处宣扬；甚至无中生有，造谣诬蔑说：“基层干部比国民党保甲长还坏”，骂中国新闻社的党员记者“是靠党吃饭之流”。他常常愤然地说：“共产党要的是奴才而不是人才”。","type":"paragraph"},{"text":"谢白寒还到处破坏和攻击党的统一战线政策，把统战政策说成是“利用政策”。谢白寒抓住一切空隙来挑拨华侨事务委员会和中华全国归国华侨联合会的人事安排；谩骂华侨领袖说“不少人身兼多职而不做事，而真正埋头苦干的倒不出名”。","type":"paragraph"},{"text":"谢白寒对各项政治运动都采取了对立的态度并进行破坏，例如他对肃反运动就是这样，致公党要弄清他爱人加入三青团的历史，他就辱骂致公党肃反领导人，说这是阴谋，还让他的爱人在会上大哭大闹。谢白寒还为胡风喊冤，说胡风问题是文艺思想问题，胡风对革命有功劳。","type":"paragraph"},{"text":" ——原载《人民日报》1957年8月30日，原标题为“致公党揭发了到处放火的谢白寒，他一贯破坏统战政策和侨务工作，同中国新闻社的反动小集团朋比为奸”","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"44ef2b3f7b"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
