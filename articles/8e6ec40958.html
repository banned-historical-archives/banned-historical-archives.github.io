script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"美国资产阶级的代言人承认  西欧舆论不满美国在和平问题上的顽固态度","authors":[],"dates":[{"year":1953,"month":5,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"美国资产阶级的代言人承认"},{"type":"paragraph","text":"西欧舆论不满美国在和平问题上的顽固态度"},{"type":"paragraph","text":"【新华社十二日讯】纽约消息：“真理报”评艾森豪威尔演说的社论中所重申苏联愿意认真谈判解决一切国际问题的立场，与艾森豪威尔、杜勒斯夸耀“实力”和提出种种条件的态度，已在西欧国家舆论中引起显然不同的反响。连美国资产阶级的重要喉舌也承认，得人心的是苏联的和平立场而不是美国的强横态度。"},{"type":"paragraph","text":"“纽约先驱论坛报”四月二十七日发表的伦敦通讯承认：“莫斯科在‘真理报’上提到关于国务卿杜勒斯最近评论艾森豪威尔演说一事已在欧洲得到了同情的和声。”这篇通讯指出，杜勒斯的话“在此间（伦敦）以及其他欧洲国家首都中造成一种极端不良的印象”。该报继续说：“这个声明（指“真理报”社论）大概将使对下一主张的支持日益增涨，这主张就是：与俄国进行高级谈判而不坚持令人感到困难的先决条件。”"},{"type":"paragraph","text":"美国专栏作家李普曼四月二十八日在“华盛顿邮报”上发表了相似的意见。他在一篇评论中说，艾森豪威尔如果不能对“真理报”社论指出的道理，即苏联准备谈判解决问题而美国却一味要求别人接受条件这一点提出反驳，美国便会在全世界范围内遭到严重的挫折。李普曼虽然企图替艾森豪威尔辩解，但他又不得不承认说：“这是一个事实：即在这个关键性的问题上，不仅在苏联，而且在我们那些最忠实的外国朋友中间，都已发生了重大的怀疑，这种怀疑又因国务卿杜勒斯的演说而大为加重。这是（艾森豪威尔）总统所持立场中的弱点……”因此，李普曼认为，除非杜勒斯改变他想把苏联的和平建议撇在一边的企图，并且把艾森豪威尔演说中那些空洞原则“变成一系列可以商谈的建议”，否则，美国及其“盟国”之间的“不和将会增加”。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8e6ec40958"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
