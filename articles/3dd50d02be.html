,"西北师范学院"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"三大主义的总根源","type":"title"},{"text":"西北师范学院学生","type":"authors"},{"text":"我的复课准备考试还没有准备好，而目睹这种现实，不能不来鸣一下(以后还将详细地讲)。","type":"paragraph"},{"text":"那怕报纸封锁消息，有正义感的人对于问题的看法总是相同的，一切弊病的总根源都发源于中央，产生于制度，整群众就雷厉风行，不论是非黑白，先斩后奏，每个运动都枉死了不少的人，实在令人愤慨，整党就和风细雨，明知血债累累的人，还当人民内部矛盾，这是十分不公正的作法，为什么这样呢？人们不能不怀疑共产党要靠这些所谓勇士来维持其领导，处理了双手沾满鲜血的人，岂不是打击了这些忠诚义士的情绪，现在还有不少人迷信以为和风细雨可以改正他们的错误，人们不知道每样东西的得来都要经过斗争，误以为是××给予的恩赐。现在“人民日报”说：对于种种式式的现象，都要用阶级观点来看待；我们这里那些所谓积极分子就更加发辉“别有用心，为美国之音宣传”有民族自尊心的人，不愿做美国的奴，亦不愿做任何国家的奴。因为“文汇报”报导了一点(实在很不够的)真实况，“人民日报”就施加压力说“什么资本主义方向”言论自由何在……","type":"paragraph"},{"text":" (未署名)","type":"paragraph"},{"text":" 来源：《香花乎？毒草乎？(1)》（西北师范学院学委会，1957年6月18日）。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"人民内部矛盾","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3dd50d02be"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
