torical-archives/banned-historical-archives8/main/maoquanji9-1.pdf"],"article":{"title":"给陈公培的信","alias":"","parts":[{"type":"paragraph","text":"给陈公培的信"},{"type":"paragraph","text":"（1936年11月4日）公培兄大鉴："},{"type":"paragraph","text":"又数年不见了，得悉吾兄依然奋斗不懈，同人闻之十分佩慰。相距尚远，不能聚首，望用书面时通消息。各方统一战线，深仗大力斡旋，对内则化干戈为玉帛，对外则求一致之抗战，争取民族革命战争与民主共和国之联系及其彻底胜利之前途。疾风劲草，愿共努力！顺祝行止佳胜！"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十一月四号"},{"type":"paragraph","text":"[1]陈公培（1901一1968），湖南长沙人。早年参加过中国共产党。1933年福建人民革命政府时期，他是十九路军与红军联络的代表。新中国成立后，曾任政务院参事。"}],"authors":["毛泽东"],"dates":[{"year":1936,"month":11,"day":4}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":278,"page_end":278},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4ae6d2901e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
