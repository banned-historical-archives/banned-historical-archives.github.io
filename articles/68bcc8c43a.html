"year":1967,"month":11,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编者按"},{"type":"paragraph","text":"毛主席最近指出:“全国的无产阶级文化大革命形势大好，不是小好。整个形势比以往任何时候都好。”今天本报发表的四个“斗私，批修”的故事，从几个不同的社会生活的侧面，生动地、深入地反映了上海无产阶级文化大革命的大好形势。"},{"type":"paragraph","text":"现在，“斗私，批修”已形成了一股强大的革命激流，猛烈地冲击着那一堆修正主义的垃圾和污垢，猛烈地冲击着几千年来剥削阶级遗留下来的私有观念，许多人的灵魂深处正在爆发一场革命，人们的思想正在发生急剧的变化，从来没有见过人民群众这样意气风发，从来没有见过新人新事这样层出不穷，从来没有见过“私”字威风这样扫地以尽。我们正生活在一个伟大的毛泽东思想的新时代里。我们为生活在这样的新时代里面感到自豪!我们为层出不穷的新人新事大喊大叫，鸣锣开道!"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"68bcc8c43a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
