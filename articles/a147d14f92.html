script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反击右倾翻案风的斗争促进了生产发展上海第三机床厂坚持以纲带目，一二月份生产出现新局面","authors":[],"dates":[{"year":1976,"month":2,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　上海第三机床厂干部、群众认真学习毛主席的词二首和中央两报一刊元旦社论，学习无产阶级专政理论，批判右倾翻案风，有力地促进了生产发展。一月份，这个厂超额完成国家生产计划；进入二月份后，全厂进一步掀起“抓革命，促生产”的热潮。"},{"type":"paragraph","text":"今年年初，上海第三机床厂党委组织全厂干部、群众联系现实的阶级斗争和路线斗争，认真学习毛主席词二首和中央两报一刊元旦社论，畅谈“到处莺歌燕舞”的大好形势，热情歌颂无产阶级文化大革命和社会主义新生事物，狠批社会上那种“今不如昔”的谬论，大大鼓舞了全厂职工为巩固和发展文化大革命胜利成果，巩固无产阶级专政而战斗的革命斗志。一月份全厂完成的总产值比去年同期增长百分之二十二，产量比去年同期增长百分之六十九。二月份，厂党委根据群众的要求，提出了“生产实现二超一提前(超一月、超去年同期，提前完成计划)，以实际行动痛击右倾翻案风”的战斗口号。厂党委抓了各级领导班子成员的学习。通过学习，大家对有人跳出来大刮右倾翻案风，把矛头指向毛主席的革命路线，表示了极大的无产阶级义愤。有的同志说:那些刮右倾翻案风的人，搞什么这个纲，那个纲，就是不提阶级斗争这个纲，其实质就是妄图改变党的基本路线，复辟资本主义。我们坚决不答应。"},{"type":"paragraph","text":"党委还专门召开了会议，发动大家来做政治思想工作，讲阶级斗争的形势，讲继续革命的任务。春节后第一天，在党委统一安排下，各级组织分别召开了座谈会。第二天，各车间普遍开了车间大会，进一步发动群众，克服松劲情绪，坚持抓革命，促生产。春节期间，龙刨、镗床、车床等关键工种有四百多人次来厂加班。节后第二天全厂生产就恢复了正常。"},{"type":"paragraph","text":"这个厂的党委在学社论、总结经验的基础上，弄清了“一步”与“步步”的辩证关系，感到一步主动，步步主动；一步被动，步步被动。只有抓提前，才能扭转那种“月初游西湖，月底打老虎”的被动局面；只有抓提前，才能确保全年计划的完成。二月份通过思想动员，抓措施落实，各车间腾出时间抓技术改造。大家决心要在今年上半年实现技改平面加工一条生产线，把大型镗床批量生产的能力提高一步，座标镗床也要翻一番，为巩固和发展文化大革命胜利成果作出新贡献。"},{"type":"paragraph","text":"(本报通讯　员)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a147d14f92"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
