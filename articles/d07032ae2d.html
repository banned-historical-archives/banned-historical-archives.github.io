art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席接见波兰军事代表团","authors":[],"parts":[{"type":"paragraph","text":"新华社3日讯 毛泽东主席、朱德副主席、周恩来总理在今天晚间接见了以国防部长斯彼哈尔斯基上将为首的波兰军事代表团。"},{"type":"paragraph","text":"接见时在座的有彭德怀元帅、许光达大将、肖向荣中将和波兰驻中国大使基里洛克。"},{"type":"paragraph","text":"本报讯 波兰军事代表团1日在北京参加了国庆观礼。"},{"type":"paragraph","text":"代表团是在沈阳、抚顺、旅大、南京、上海等地参观访问后，于9月29日回到北京的。"},{"type":"paragraph","text":"代表团在南京时，先后访问了军事学院和南京部队领导机关。在军事学院的欢迎大会上，斯彼哈尔斯基上将向到会同志介绍了波兰人民军的创建历史和近年来现代化建设的巨大成就。27日贵宾们曾前往雨花台革命烈士墓凭吊革命先烈，晋谒中山陵；还在暮色苍茫中兴致勃勃地游览了明孝陵，并登高远眺金陵夜景。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d07032ae2d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
