":[{"year":1968,"month":2,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编辑同志:"},{"type":"paragraph","text":"我们读了你报《论无政府主义的反动性》一文后，心里很不平静。无政府主义的确是个坏东西，也是一条毒蛇，我们要大力围歼，彻底把它消灭!"},{"type":"paragraph","text":"就拿我们车间来说，无政府主义思潮也相当严重，劳动松松垮垮，做生活马马虎虎，出现了“三多一少”的现象，即坐办公室谈山海经的人多，围着炉子取暖的人多，东荡荡西荡荡的人多；每天坚持八小时工作的人少了。这样，生产任务执行得不好，有的产品不能按时完成。我们老工人看在眼里，痛在心里。我们拿了国家的工资，不为国家作出贡献，怎么对得起毛主席他老人家呢?怎么对得起世界革命人民对我们的期望?"},{"type":"paragraph","text":"为什么我们车间无政府主义闹得这样严重?主要是因为资产阶级、小资产阶级派性在作怪。无政府主义和派性是一对双胞胎，都是反动的东西，派性越发作，无政府主义越泛滥。我们有一千条一万条理由从思想上巩固革命大联合，没有半点理由闹分裂，闹无政府主义。"},{"type":"paragraph","text":"江南造船厂某车间两个老工人"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"派性","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4460f4e4ba"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
