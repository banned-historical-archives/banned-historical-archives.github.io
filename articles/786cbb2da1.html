script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"琉璃河水泥厂临时工人控诉把头剥削罪行　工头九人已送政府法办","authors":["任佐"],"dates":[{"year":1950,"month":5,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"琉璃河水泥厂临时工人控诉把头剥削罪行"},{"type":"paragraph","text":"工头九人已送政府法办"},{"type":"paragraph","text":"【本报讯】琉璃河水泥厂经过两周的调查、酝酿后，于四月二十日召开临时工人控诉大会，揭发王贵、牛玉海等九个大工头惨酷剥削工人的罪行。该厂负责人在会上接受全体工人的要求，决将该九人送人民法院处理。"},{"type":"paragraph","text":"该厂自去年开工后，王贵等九个大工头先后入厂攫取了外工工头的职位，多方压迫、剥削工人。厂方规定推一吨石头的工资为玉米一·四升，工头实发给工人一·二升。推一吨煤或石膏的工资为一·五升，工头实发一·三升。厂方规定工具费只抽一合玉米，工头实抽二合。在今年两个多月中，他们贪污、剥削达三千多万元。有四个工头钻“临时工”分工会筹备委会，王贵当了主任，刘连仲当了副主任。王贵且钻入当地中共党组织内。这两人在敌伪及国民党时期，就依赖剥削工人为生，积有多年剥削经验。工人敢怒而不敢言。四月六日，行政负责人派员深入工人调查把头罪行，工人一看工头走来，就对干部说：“我们头子来了，你们快走吧！”"},{"type":"paragraph","text":"解放以来，该厂曾把三个主要把头分子张宝忠、郭连增、宁国平清洗出厂。但因行政负责人对临时工的实际情况了解不够，致把头残余未能完全取消。直到把头之间发生内哄，行政上才根据线索，加以调查，发现了这个严重问题，决定彻底废除不合理的把头制度及其残余。"},{"type":"paragraph","text":"（任佐）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"786cbb2da1"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
