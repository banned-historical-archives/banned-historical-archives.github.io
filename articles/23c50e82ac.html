" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoistlegacy.de-1334","name":"中共中央书记处对广西处理‘文革’遗留问题的会议纪要","author":"中共中央书记处","internal":false,"official":false,"type":"unknown","files":[],"article":{"title":"中共中央书记处对广西处理‘文革’遗留问题的会议纪要","dates":[{"year":1983,"month":3,"day":21}],"is_range_date":false,"authors":["中共中央书记处"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"中共广西壮族自治区党委整党办公室, 处理“文革”遗留问题、清理“三种人”文件汇编(第一册), 290-291\n","tags":[{"name":"广西","type":"主题/事件"},{"name":"十一届三中全会","type":"主题/事件"},{"name":"文革","type":"主题/事件"},{"name":"遗留问题","type":"主题/事件"},{"name":"冤假错案","type":"主题/事件"}],"parts":[{"type":"title","text":"中共中央书记处对广西处理“文革”遗留问题的会议纪要"},{"type":"subtitle","text":"（一九八三年三月二十一日）"},{"type":"paragraph","text":"一九八三年三月二十一日，中央书记处第四十九次会议讨论了广西自治区领导班子的调整问题。会议希望广西区级领导班子成立后努力工作，尽快地开创新局面。几年来，广西自治区党委和广西的广大党,员、干部作了很多工作，广西自治区的形势同全国的形势一样，也是向好的方向发展的。但是，广西区党委在处理“文革”遗留问题方面还存在一些缺点，主要是落实政策的步子比较慢，特别是有一些在“文革”中参与过杀人和残酷打人的干部至今还在台上，没有进行必要的处理，广大群众对此意见很大，严重地影响了区党委团结全区广大干部群众进行“四化”建设的积极性。因此，自治区党委必须认真贯彻执行党的十一届三中全会以来所制定的政策，坚定不移地本着“实事求是，有错必纠”和“宜粗不宜细”精神，抓紧平反一切冤假错案，对有过违法乱纪行为的干部，分别不同情况进行处理，对于其中必须受到法律制裁的人，在监狱中也不要虐待他们，更不应株连他们的家属、子女。要进一步团结全区的广大党员、干部和各族人民，把广西自治区的各项工作做得更好。"}],"alias":""},"tags":[{"name":"广西文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"23c50e82ac"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
