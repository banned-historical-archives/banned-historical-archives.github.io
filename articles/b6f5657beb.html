script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"厄瓜多尔马列主义共产党机关报《在前进》发表文章指出  人民战争是拉美人民解放的唯一道路  尼克松拉美“新政策”是美帝企图维护在拉美殖民奴役和剥削的新手段","authors":[],"dates":[{"year":1969,"month":11,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"厄瓜多尔马列主义共产党机关报《在前进》发表文章指出"},{"type":"paragraph","text":"人民战争是拉美人民解放的唯一道路"},{"type":"paragraph","text":"尼克松拉美“新政策”是美帝企图维护在拉美殖民奴役和剥削的新手段"},{"type":"paragraph","text":"新华社二十一日讯　瓜亚基尔消息：厄瓜多尔马克思列宁主义共产党机关报《在前进》周刊最近发表文章，谴责美帝头子尼克松在十月三十一日演说中提出的对拉丁美洲的所谓“新政策”。文章指出，拉丁美洲人民争取解放的唯一道路是通过人民战争同美帝国主义进行面对面的斗争。"},{"type":"paragraph","text":"文章说：尼克松提出的所谓“争取进步行动”的“新政策”，是企图维护它在拉丁美洲的殖民奴役和剥削地位的新手段。"},{"type":"paragraph","text":"文章指出，尼克松说什么使拉丁美洲同美国在马歇尔计划式的“新的行动计划”中结成“伙伴”的甜言蜜语，只不过表明华盛顿在拉丁美洲的处境越来越狼狈。尼克松对拉丁美洲人民为摆脱帝国主义魔爪而展开的斗争感到担心，因此他妄图用欺骗和谎言来迷惑拉美人民。"},{"type":"paragraph","text":"文章说，美帝国主义采用了隐蔽的新殖民主义的干涉和残酷的武装侵略的两手策略。尼克松的“争取进步行动”的计划是在肯尼迪的“争取进步联盟”计划破产后，帝国主义对拉丁美洲的渗透和干涉的新的狡猾手法。"},{"type":"paragraph","text":"文章指出，美帝国主义的所谓“援助”，是干涉和侵略拉美人民的一种形式。帝国主义强迫他们偿还条件苛刻的贷款和高利息，对他们进行殖民奴役和剥削。"},{"type":"paragraph","text":"文章说：真正的问题是，拉美国家的人民要永远摆脱美帝国主义的束缚，拒绝美国肮脏的“援助”，争取解放自己和解决自己的问题。"},{"type":"paragraph","text":"文章最后说：美帝国主义虚弱和走投无路，而拉丁美洲人民越来越懂得，解决自己问题的唯一道路是，运用人民战争这一战无不胜的武器，同美帝国主义进行面对面的斗争。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"人民战争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b6f5657beb"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
