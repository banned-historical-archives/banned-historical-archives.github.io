ical-archives/banned-historical-archives0/main/maoquanji27.pdf"],"article":{"title":"在表扬歼灭白崇禧主力的部队的电报上的批语","alias":"","parts":[{"type":"paragraph","text":"在表扬歼灭白崇禧主力的部队的"},{"type":"paragraph","text":"电报?上的批语"},{"type":"paragraph","text":"（1949年10月13日）程颂云先生阅。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十月十三日"},{"type":"paragraph","text":"被歼灭者是七军两个师及四十八军两个师，地点在祁阳以北。消灭这些部队时白崇禧坐视不救，自己退到桂林，各军退到东安、零陵、冷水滩一带，听任七军四八军苦战四天被歼干净。"},{"type":"paragraph","text":"[1]白崇禧，1949年4月被任命为国民党政府华中军政长官公署长官。"},{"type":"paragraph","text":"[2]指林彪、邓子恢、谭政等1949年10月12日表扬中国人民解放军第四十军、四十一军和四十九军歼灭白崇禧主力的电报。"},{"type":"paragraph","text":"[3]程颂云，即程潜，原国民党政府军将领，1949年8月与陈明仁率部在长沙起义。当时任中央人民政府委员、湖南人民军政委员会主任。"}],"authors":["毛泽东"],"dates":[{"year":1949,"month":10,"day":13}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":411,"page_end":411},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1776e341e8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
