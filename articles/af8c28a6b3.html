script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"庆祝击落美国强盗飞机的新胜利，表扬有功单位和人员我海军防空部队某部举行祝捷授奖大会会上宣读了中共中央军委的嘉奖令，颁发了奖状。参加大会的指战员坚决表示要更高地举起毛泽东思想伟大红旗，充分作好反侵略战争的准备","authors":[],"dates":[{"year":1970,"month":2,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社海口十六日电　中国人民解放军海军防空部队某部，今天在海南岛某地隆重举行祝捷授奖大会，庆祝二月十日击落美帝国主义军用无人驾驶高空侦察机一架的新胜利，表扬作战有功单位和人员。参加大会的指战员热烈欢呼这一胜利是战无不胜的毛泽东思想的伟大胜利，并且坚决表示，要更高地举起毛泽东思想伟大红旗，充分作好反侵略战争的准备。如果美帝国主义、社会帝国主义胆敢对我国发动侵略战争，就把侵略者坚决、彻底、干净、全部消灭掉。"},{"type":"paragraph","text":"大会在雄壮的《东方红》歌声中开始。指战员们怀着对伟大领袖毛主席的无限忠诚，齐声朗读毛主席语录:“提高警惕，保卫祖国”，“全力以赴，务歼入侵之敌。”"},{"type":"paragraph","text":"人民解放军海军领导机关负责人潘焱同志、师凤翔同志，以及南海舰队、当地驻军、当地革命委员会负责人和部队指战员、革命群众数千人参加了大会。"},{"type":"paragraph","text":"潘焱同志在会上宣读了中共中央军委的嘉奖令，并向参战有功人员和单位颁发了奖状。"},{"type":"paragraph","text":"潘焱同志在会上讲了话。他代表海军领导机关向参战部队表示祝贺。他说，你们在跨进伟大的七十年代的时候首战告捷，为人民立了新功。这次战斗的胜利，是你们高举毛泽东思想伟大红旗，坚持突出无产阶级政治，全面落实四好，加强部队战斗力的结果。"},{"type":"paragraph","text":"潘焱同志在讲话中指出，侵略成性的美帝国主义一贯与伟大的中国人民为敌。尼克松政府上台以后，一面高唱“和平”滥调，一面继续对我国进行军事威胁和战争挑衅。这次战斗的胜利，是对美帝国主义军事挑衅的又一次惩罚。但是美帝国主义是决不会甘心失败的。希望你们戒骄戒躁，把部队的革命化战斗化建设提高到一个新的水平，更好地担负起保卫祖国的神圣职责，随时准备歼灭一切来犯之敌，为人民再立新功。"},{"type":"paragraph","text":"海军南海舰队、当地革命委员会和驻军负责同志也在会上讲了话，向参战有功单位和人员热烈祝贺，并表示要加强军民团结，共守海防，把祖国的南大门建设成铜墙铁壁。"},{"type":"paragraph","text":"参战有功单位和人员代表周新成，在会上讲了话。他说，这次战斗的胜利，归功于伟大领袖毛主席，归功于伟大的毛泽东思想。他说，海军防空部队指战员决心遵照毛主席关于“备战、备荒、为人民”的伟大教导，百倍提高革命警惕，充分作好准备，敌人胆敢来犯，定叫他们粉身碎骨，有来无回!"},{"type":"paragraph","text":"大会在《大海航行靠舵手》的歌声中结束。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"af8c28a6b3"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
