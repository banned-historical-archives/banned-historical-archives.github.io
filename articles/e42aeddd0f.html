script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"澳共（马列）《先锋报》号召澳人民积极开展斗争  反对包括美帝和日本军国主义在内的剥削者  揭露美国垄断企业在澳大利亚大量制造失业的阴谋","authors":[],"dates":[{"year":1972,"month":2,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"澳共（马列）《先锋报》号召澳人民积极开展斗争"},{"type":"paragraph","text":"反对包括美帝和日本军国主义在内的剥削者"},{"type":"paragraph","text":"揭露美国垄断企业在澳大利亚大量制造失业的阴谋"},{"type":"paragraph","text":"新华社墨尔本电　澳大利亚共产党（马克思列宁主义）机关报《先锋报》一月二十七日发表文章，号召澳大利亚劳动人民采取革命行动，反对包括最大的剥削者美帝国主义和日本军国主义在内的剥削者。"},{"type":"paragraph","text":"文章说，澳大利亚继续陷入经济危机。据现在估计，失业人数将近二十万，而且仍在继续增加。人民遭受苦难，而资产阶级继续牟取利润。"},{"type":"paragraph","text":"文章指出，澳大利亚劳动人民正在从这个现实中得出正确的结论。文章强调说：“摆脱危机只有一条道路——开展革命阶级反对资产阶级剥削者的斗争。这些剥削者中有美帝国主义者和日本军国主义者，他们是澳大利亚劳动人民的最大剥削者。他们获得的利润占首位。”"},{"type":"paragraph","text":"文章指出，人民“必须依靠自己。他们必须树立摧毁资产阶级的国家权力代之以工人阶级的国家权力的革命的观点。”"},{"type":"paragraph","text":"文章说：“资产阶级剥削者用他们的国家机器——其核心是武装部队——来维护他们的专政。"},{"type":"paragraph","text":"“人们应该看到，当危机深化时，‘防务’方面就要花费更多的钱；换句话说，武装部队就要加强。”"},{"type":"paragraph","text":"文章还揭露说：“美帝国主义正在这里大力建立军事基地。”"},{"type":"paragraph","text":"文章指出：“只有同资产阶级及其走狗所散布的种种幻想进行斗争，人民才能认识（资产阶级）专政的政治本质和开展革命的阶级斗争反对这种专政的必要性；这种斗争最后将是一场反对资产阶级武装部队的武装斗争。”"},{"type":"paragraph","text":"新华社墨尔本一九七二年二月十日电澳大利亚共产党（马克思列宁主义）机关报《先锋报》二月十日发表文章揭露美国垄断企业在澳大利亚大量制造失业的阴谋，号召澳大利亚劳动人民为维护生活水平和民主权利而斗争。"},{"type":"paragraph","text":"文章指出：“澳大利亚的经济危机正在迅速扩大。现在每天可以看到大量解雇工人的情况。”"},{"type":"paragraph","text":"文章说：澳大利亚工人和其他劳动人民正在迅速地行动起来投入斗争，揭露垄断资产阶级制造失业的阴谋。"},{"type":"paragraph","text":"文章揭露美国通用汽车公司在澳大利亚的子公司——霍尔敦通用汽车公司本周又解雇了八千名工人，使这家公司被解雇的工人总数达一万三千名，占这家公司的劳动力的一半还多。文章指出，按照美国主子的旨意办事的澳大利亚当局正疯狂地企图采用挑衅活动来破坏劳动人民日益高涨的斗争。"},{"type":"paragraph","text":"文章说：“随着劳动人民斗争的发展，资产阶级的挑衅活动会增多。劳动人民必须对付各种挑衅，必须保持警惕。”"},{"type":"paragraph","text":"文章说，要用正确的理论来分析澳大利亚当前阶级斗争的现象。“唯一正确的理论是马克思主义、列宁主义、毛泽东思想。这一理论号召劳动人民对资产阶级开展革命的阶级斗争，建立生产资料归劳动人民所有、为劳动人民所用而不是为少数富人谋利的社会主义。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e42aeddd0f"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
