script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"大源五金号全体店员控诉资方残酷剥削职工罪恶行为","authors":[],"dates":[{"year":1952,"month":2,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编辑同志:我们是本市北京东路四六二号大源五金号的职工。我店老板共有三个:和宝昌(经理)、沈冰言(副理)、和欣然(襄理)。我们全体廿四个职工过去受尽他们的压迫，痛苦万分，无处申诉。五反运动展开后，全体职工开了七次小组会，纷纷控诉资方对我们的压迫和他们的不法行为。归纳起来，约有以下几点:"},{"type":"paragraph","text":"对职工剥削非常残酷——以前普通职工拿的工资不够养活自己和妻子两个人；青工的工资更低，每月所得还不够买一双半帆布鞋子。送货是用脚踏车来送的，但是修理车子的钱却要职工自己拿出来。有一天青工陈志龙骑了车子去送货，半路上车子坏了，只得卖了自己的眼镜，雇了车子把货送去。职工要求增加工资，他们总是不理。有时他们给个别职工加薪水了，就是想利用他干不法行为，或者想分化职工团结。"},{"type":"paragraph","text":"苛待职工——资方对待职工的态度一贯凶恶骄横，职工被当作牛马地使唤，稍不如意就要拍桌大骂，用歇生意来威胁。职工如要参加文娱体育活动，他们就要恶骂一阵。"},{"type":"paragraph","text":"欺诈、腐化——资方一贯买空卖空，欺诈暴利。他们不但自己如此，叫职工也要吹牛装点门面。有一次顾客问陈志龙店里的栈房在那里，陈志龙照实回答说没有，老板就骂他小鬼、不中用。以后他吹起牛来，却遭到顾客一顿大骂。他们的生活非常腐化，经常聚赌通宵，还强迫职工来侍候他们。"},{"type":"paragraph","text":"和宝昌等不仅对我们一贯剥削欺凌，对共产党、人民政府、工会也一贯采取对立态度。他们平日偷税漏税、逃避资金、盗窃国家资财的行为也非常严重。我们全体职工通过小组会议认清了他们的丑恶本质和他们的不法行为对国家的危害性，我们一定要和他们坚决斗争到底!"},{"type":"paragraph","text":"大源五金号全体职工"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b3f03d72f2"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
