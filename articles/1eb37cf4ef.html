script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"认真学习无产阶级专政的理论  更好地贯彻执行党的基本路线  新民县委领导成员联系实际学习毛主席关于理论问题的重要指示","authors":[],"dates":[{"year":1975,"month":2,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"认真学习无产阶级专政的理论更好地贯彻执行党的基本路线"},{"type":"paragraph","text":"新民县委领导成员联系实际学习毛主席关于理论问题的重要指示"},{"type":"paragraph","text":"新华社沈阳一九七五年二月二十一日电　中共辽宁省新民县委领导成员，联系实际认真学习毛主席关于理论问题的重要指示，决心认真抓好无产阶级专政理论的学习，更好地贯彻执行党的基本路线。"},{"type":"paragraph","text":"新民县委领导成员把学习毛主席关于理论问题的重要指示，同总结工作紧密结合起来。他们说，马克思主义、列宁主义、毛泽东思想关于无产阶级专政的理论，象光芒四射的明灯，指引我们进行社会主义革命和社会主义建设，取得一个又一个的胜利。如果不认真看书学习，离开了无产阶级专政理论的指导，我们就会迷失前进的方向。县委领导成员用近五年来工作中的经验教训谈了他们的体会。一九七○年，县委狠抓了阶级斗争，批判了资本主义倾向，农业出现了大上快变的局面，全县粮食产量创造了历史最高水平。后来由于满足取得的成绩，放松了批判资本主义倾向，生产连续两年下降。一九七二年秋，县委深入基层调查研究，发现凡是增产的先进社队，都是比较自觉地坚持党的基本路线，不断批判资本主义倾向，农村的社会主义阵地越来越巩固。凡是减产的单位，都没有狠抓阶级斗争这个纲，资本主义泛滥，妨碍集体经济的发展。有了两年的深刻教训，县委执行党的基本路线就比较自觉。从一九七三年开始，县委广泛发动干部和社员批判资本主义倾向，打退了资产阶级的进攻，煞住了资本主义的歪风邪气，农业生产又连续两年丰收，一九七四年全县粮食平均亩产超过了《纲要》。"},{"type":"paragraph","text":"新民县委领导成员在学习毛主席关于理论问题的重要指示时，联系过去的经验教训，重温了《哥达纲领批判》、《国家与革命》、《关于正确处理人民内部矛盾的问题》等马列著作和毛主席著作中关于无产阶级革命和无产阶级专政的一些论述，认识上有了新的提高。他们说，不从理论上搞清楚为什么要对资产阶级专政，要对资产阶级法权加以限制，要反对资本主义倾向和资产阶级生活作风，就不能正确理解和贯彻执行党的基本路线，就不能正确区分和处理敌我矛盾和人民内部矛盾，在执行具体路线时就要摇摆，就会犯错误，甚至犯过的错误还可能再犯。大家说，同修正主义作斗争，批判资本主义，批判资产阶级世界观，不断铲除滋生修正主义的土壤，这是长期的斗争任务，是历史赋予无产阶级的伟大使命。"},{"type":"paragraph","text":"县委领导成员在抓好自身的学习的同时，发动广大党员、干部和社员群众制订学习规划。新民县委要求社队党组织，要组织党员和群众反复学习，要把学习无产阶级专政的理论作为强大的动力，推动批林批孔继续深入发展和各项工作胜利前进。现在，全县出现了学习和批判的热潮。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"批林批孔","type":"主题/事件"},{"name":"人民内部矛盾","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"name":"限制资产阶级法权","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1eb37cf4ef"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
