张庄"],"dates":[{"year":1957,"month":7,"day":6}],"is_range_date":false,"parts":[{"text":"忠告我的领导","type":"title"},{"text":"山西张庄","type":"authors"},{"text":"(张庄：榆次一中教师)","type":"subtitle"},{"text":"不能压制，不能组织力量攻击群众，当前的现象不要认为混乱，这是有了民主空气了，这很好。要想让同学们情绪稳定下来，只有一个办法，这个办法是承认缺点，承认错误，接受大多数学生的意见，马上改正。不然的话，有的班主任同志们也要累病了。","type":"paragraph"},{"text":"承认错误，学生情绪安定下来后，把民主给了他们，他们也不会忘了集中制。","type":"paragraph"},{"text":"民主集中制要在民主的基础上集中，组织纪律也是大家定的，不能属于宗派所有。","type":"paragraph"},{"text":"老将步法走的有了错误，小卒都过了河，就是车、马、炮全调来也无用。","type":"paragraph"},{"text":" 榆次一中教师  张庄1957年7月6日","type":"paragraph"}],"comments":[],"origin":"《“鸣”、“放”选集（三）》（中共山西省委整风办公室编印，1957年10月）。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d41f2473f5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
