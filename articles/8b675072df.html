,"authors":["张国成周广中"],"dates":[{"year":1993,"month":12,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"纪念毛泽东诞辰100周年图片展览会12月15日在东京日中友好会馆隆重开幕。"},{"type":"paragraph","text":"展览会展出了毛泽东在各个历史时期的照片100多幅。其中许多照片是第一次与日本观众见面。一些日本观众还在毛主席1964年接见参加中日青年友好大联欢的日本朋友的照片中找到了自己。展品中尤为珍贵的是毛泽东等中国领导人1956年参观日本商品展览会后的题词以及毛泽东1963年书赠日本前首相石桥湛山的曹操《龟虽寿》一诗的手迹。"},{"type":"paragraph","text":"图为前来参加开幕式的二阶堂进先生（左一）在毛泽东会见田中角荣和他自己的照片前驻足细看。"},{"type":"paragraph","text":"本报记者　张国成文"},{"type":"paragraph","text":"新华社记者　周广中摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8b675072df"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
