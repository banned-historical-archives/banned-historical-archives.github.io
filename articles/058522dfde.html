ical-archives/banned-historical-archives0/main/maoquanji41.pdf"],"article":{"title":"毛泽东等祝贺牙利解放十四周年的电报","alias":"","parts":[{"type":"paragraph","text":"毛泽东等祝贺网牙利解放"},{"type":"paragraph","text":"十四周年的电报"},{"type":"paragraph","text":"（1959年4月3日）匈牙利社会主义工人党中央委员会第一书记卡达尔·亚诺什同志，匈牙利人民共和国主席团主席道比·伊斯特万同志，匈牙利人民共和国工农革命政府总理明尼赫·费伦茨同志："},{"type":"paragraph","text":"当匈牙利解放十四周年的时候，我们谨代表中国共产党、中华人民共和国政府和中国人民向你们，并通过你们向牙利社会主义工人党、匈牙利工农革命政府和匈牙利人民致以热烈的祝贺。"},{"type":"paragraph","text":"一年来，勤劳勇敢的匈牙利人民在匈牙利社会主义工人党和工农革命政府的正确领导下在建设伟大的社会主义事业的各个战线上都获得了巨大的成就，自前正为加速社会主义建设和提前完成三年计划而进行着忘我的劳动。具有光荣革命传统的匈牙利社会主义工人党和匈牙利人民坚定不移地为维护和加强以苏联为首的社会主义阵营的伟大团结、为捍卫马克思列宁主义的纯洁性而斗争。匈牙利工农革命政府始终不渝地执行和平外交政策，对制正帝国主义的战争和侵略阴谋、维护人类进步和世界和平事业作出了重大的贡献。"},{"type":"paragraph","text":"中匈两国人民在无产阶级国际主义的基础上结成了深厚的友谊，在社会主义革命和社会主义建设的共同事业中始终是互相关注和互相支援的。中国人民对匈牙利人民在各方面获得的伟大成就都毛泽东全集第四十一卷感到由衷的欢欣。我们热烈地预祝匈牙利人民在建设社会主义和维护世界和平的事业中获得更大的成就，祝中匈两国人民之间的牢不可破的友谊日益发展。"},{"type":"paragraph","text":"中国共产党中央委员会主席中华人民共和国主席毛泽东中华人民共和国全国人民代表大会常务委员会委员长刘少奇中华人民共和国国务院总理周恩来"},{"type":"paragraph","text":"一九五九年四月三日于北京"}],"authors":["毛泽东"],"dates":[{"year":1959,"month":4,"day":3}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":419,"page_end":420},"tags":[{"name":"毛泽东","type":"人物"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"058522dfde"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
