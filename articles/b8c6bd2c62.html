"year":1966,"month":1,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"《毛泽东选集》五种民族文字版本出齐"},{"type":"paragraph","text":"据新华社十二月三十一日讯　《毛泽东选集》和《毛泽东著作选读》的蒙古、藏、维吾尔、朝鲜和哈萨克五种民族文字版本，已由民族出版社出齐。"},{"type":"paragraph","text":"《毛泽东选集》和《毛泽东著作选读》的这五种民族文字版本，是在中共中央毛泽东选集出版委员会的指导下，由民族出版社和各有关民族地区毛泽东著作翻译出版委员会共同翻译校订的。同时，民族出版社还以上述五种民族文字大量出版了《毛泽东著作选读》乙种本和毛主席著作的一些单篇本。在一九六五年内，民族出版社以上述五种民族文字出版的《毛泽东选集》、《毛泽东著作选读》和毛主席著作的单篇本共有九十三种，总共发行三百七十二万册。这个数字超过了民族出版社过去十年所出版的毛主席著作的总和。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b8c6bd2c62"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
