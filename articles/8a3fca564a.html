:[{"year":1967,"month":4,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"驳《修养》作者的“剥削光荣”论"},{"type":"paragraph","text":"学习毛主席著作积极分子、五好战士　宗世林"},{"type":"paragraph","text":"听到党内头号走资本主义道路的当权派胡说什么资本家“剥削得越多，功劳越大，就越光荣”，我感到万分气愤。这不是明目张胆地为吸血鬼资本家唱颂歌，为复辟资本主义鸣锣开道吗！"},{"type":"paragraph","text":"去年，我在旅大地区执行任务时，参观过“万人坑”，亲眼看到解放前资本家残酷剥削盐场工人的罪证。解放前，旅大盐场的资本家为了获得高额利润，花言巧语欺骗了一些穷人为他去做工。穷苦人民一走进盐场的大门，就是走进鬼门关。多少穷人在盐场里起五更睡半夜，流血流汗，过着牛马不如的生活。一位姓刘的工人，因不顺从工头的打骂，就被推进滚开的盐锅里烫死了。工人们整天赤着被盐水浸裂的双脚，抬着大盐筐，在盐滩上跑来跑去，留下斑斑血迹。不少工人积劳成疾，病得奄奄一息。狼心狗肺的资本家不但不给医治，反而叫工贼抬进“万人坑”喂野狗。一位姓李的工人，当工贼抬他进“万人坑”时，他有气无力地喊道：“我没有死，我还能活啊！”看吧，这就是党内头号走资本主义道路当权派所说的资本家的“功劳”和“光荣”。"},{"type":"paragraph","text":"毛主席教导我们：“这些阶级代表中国最落后的和最反动的生产关系，阻碍中国生产力的发展。他们和中国革命的目的完全不相容。特别是大地主阶级和大买办阶级，他们始终站在帝国主义一边，是极端的反革命派。”资本家的本性就是剥削人民，压榨人民的。党内头号走资本主义道路当权派撒下这些弥天大谎，无耻谰言，无非是为了抹杀阶级界限，不让我们去认识两条道路的斗争，不让我们反对资本主义剥削，达到他在中国复辟资本主义的罪恶目的，让千百万劳动人民人头落地，其用心何其毒也！"},{"type":"paragraph","text":"告诉你，党内头号走资本主义道路的当权派，你的鬼算盘打错了。彻底清算你反党反社会主义反毛泽东思想的滔天罪行的时刻到了。用毛泽东思想武装起来的无产阶级文化革命大军，早已下定决心，坚决把你斗倒斗臭。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8a3fca564a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
