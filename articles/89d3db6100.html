script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"打倒修正主义的总后台","authors":["贾永福"],"dates":[{"year":1967,"month":4,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"上海市内电话局　贾永福"},{"type":"paragraph","text":"美帝国主义是中国人民的最凶恶的敌人，怎样对待帝国主义的侵略，这是革命的首要问题。党内最大的走资本主义道路当权派混淆黑白，把帝国主义对中国人民的侵略说成是“友谊”。呸!我们电话工人最了解，帝国主义给我们中国人民带来了多少灾难，多少痛苦!上海市内电话局在解放前，原是美商电话公司，它的电话最集中使用的是在外滩、南京路一带，都是为帝国主义的外交机关、银行，洋行、报馆，以及交易所等从事政治、经济、文化侵略服务的。在政治上，帝国主义和蒋匪特务勾结，残杀革命人民，镇压革命。在经济上，从事投机倒把，剥削劳动人民的血汗。在文化上，进行造谣污蔑，歪曲宣传，麻痹劳动人民斗志!所有这一切，难道是帝国主义的“历史功绩”吗?许多血泪斑斑的事实，是最好的回答。而党内最大的走资本主义道路当权派，他的这种叫嚣，正是中外吸血鬼和寄生虫们的声音，也是他自己丑恶的资产阶级灵魂的大暴露。"},{"type":"paragraph","text":"毛主席早已指出:“帝国主义给自己准备了灭亡的条件。”但是这个党内最大的走资本主义道路当权派，却要从思想上腐蚀我们，从组织上瓦解我们。我们一定紧跟毛主席，丢掉一切幻想，投入最后决斗，我们无产阶级革命派决心一反到底!彻底打倒修正主义的总后台!"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"89d3db6100"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
