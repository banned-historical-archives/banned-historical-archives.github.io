art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"切实办好毛泽东思想学习班","authors":["首都饭店系统支左人员"],"parts":[{"type":"paragraph","text":"二月十九日，是我们终身难忘的日子。我们伟大的导师、伟大的领袖、伟大的统帅、伟大的舵手毛主席和他的亲密战友林副主席接见了我们。毛主席红光满面，神采奕奕，步伐刚健，身体非常非常健康，精力非常非常充沛。毛主席身体健康，这是全中国人民和全世界革命人民最大的幸福。"},{"type":"paragraph","text":"敬爱的毛主席啊！您老人家是当代的列宁，是世界上最伟大的天才。您的光辉思想是力量的源泉、智慧的海洋。您的一系列最新指示是夺取无产阶级文化大革命全面胜利的根本保证。"},{"type":"paragraph","text":"最近，您老人家教导我们：“办学习班，是个好办法，很多问题可以在学习班得到解决。”这是千真万确的真理。我们驻首都饭店系统支左人员，从去年九月开始，在首都饭店系统大办毛泽东思想学习班。我们用您老人家的光辉思想，用您老人家关于实现革命大联合的最新指示，武装革命群众的头脑。您老人家的话，威力无穷，学了您老人家的最新指示，饭店工作办公室和所属北京饭店等八大饭店以及北京烤鸭店等单位，一夜之间就全部按系统、按班组实现了革命大联合。接着，又实现了革命三结合，建立了革命委员会。这是大办毛泽东思想学习班的丰硕成果！这是您的光辉思想的伟大胜利！"},{"type":"paragraph","text":"毛主席啊，毛主席！我们决心按照您老人家的教导，把首都饭店系统的毛泽东思想学习班办得更好，让您老人家的光辉思想占领一切阵地！为了夺取无产阶级文化大革命的全面胜利，我们一定要和广大革命群众一起，大破“私”字，大立“公”字，把首都饭店系统办成红彤彤的毛泽东思想大学校。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"name":"军队支左","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2a4c610b44"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
