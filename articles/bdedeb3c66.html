[{"year":1970,"month":11,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"一定要把毛主席哲学思想学到手"},{"type":"paragraph","text":"天津市第三建筑公司综合厂老工人　叶世忠"},{"type":"paragraph","text":"一九七○年十月一日上午，我参加了国庆观礼。市革命委员会负责同志讲了话。×（游）行开始时，我在观礼（台）上万分高兴，高呼：“毛主席万岁！毛主席万万岁！”使我感动的（得）留（流）下眼泪。这是党和毛主席对我们工人阶级最大的关怀，最大的鼓舞。有了我们伟大领袖毛主席的领导，才有我叶世忠全家。解放前，我全家七口人，奶奶和妹妹饿死在×（街）头，弟弟被迫给了人家，无吃无穿过着牛马不如的生活。解放后，大判（叛）徒、大内奸、大工贼刘少奇、杨献珍之流说我们工人阶级学哲学是“胡闹”，这纯碎（粹）是胡说八道！我们工人阶级对毛主席感情最深，不但能学，一学就懂，一用就灵。我学了毛主席的哲学思想，心明眠（眼）亮志气大，身上有使不完的劲头，克服我没有文化（的困难），难字换上敢字，把毛泽东思想真正学到手。为毛主席争光！为社会主义祖国争光！（注：稿里×是错字）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bdedeb3c66"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
