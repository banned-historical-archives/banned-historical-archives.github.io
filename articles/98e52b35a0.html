ical-archives/banned-historical-archives0/main/maoquanji30.pdf"],"article":{"title":"关于嘉奖西南剿匪部队的电报","alias":"","parts":[{"type":"paragraph","text":"关于嘉奖西南剿匪部队的电报"},{"type":"paragraph","text":"（1951年1月28日）贺、邓、张、李\"并告华东，中南，西北各军区及福建，广东，广西军区："},{"type":"paragraph","text":"你们一月六日送来的一九五○年一年剿匪工作总结报告，收到阅悉，路线正确，方法适当，剿灭匪众八十五万人，缴枪四十余万枝，成绩极大，甚为欣慰，望即通令所属，予以嘉奖。尚望你们继续努力，为干净剿灭残存匪众近四万人而奋斗。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一月廿八日"},{"type":"paragraph","text":"[1]贺，指贺龙，当时任中国人民解放军西南军区司令员。邓，指邓小平，当时任中国人民解放军西南军区政治委员。张，指张际春，当时任中国人民解放军西南军区副政治委员兼政治部主任。李，指李达，当时任中国人民解放军西南军区副司令员兼参谋长。"},{"type":"paragraph","text":"[2]指中国人民解放军西南军区关于1950年剿匪工作的总结报告。报告说，自成都战役结束后，即以全力剿匪作为全军的中心任务。一年来，全军不分上下，不分兵种，不分部队与机关、学校，均参加了这一斗争。剿匪斗争所采取的主要措施是：（1）组织一元化的剿匪斗争。（2）集中兵力，重点进剿。（3）军事进剿、政治攻势和发动群众三者密切协同。（4）开展捕捉匪首运动与镇压匪首工作。（5）争取少数民族参加剿匪。"}],"authors":["毛泽东"],"dates":[{"year":1951,"month":1,"day":28}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":80,"page_end":80},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"98e52b35a0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
