ical-archives/banned-historical-archives0/main/maoquanji32.pdf"],"article":{"title":"中央同意中财委关于清偿解放前人民存款问题的方案的批语","alias":"","parts":[{"type":"paragraph","text":"中央同意中财委关于清偿解放前"},{"type":"paragraph","text":"人民存款问题的方案的批语"},{"type":"paragraph","text":"（1952年9月13日）中财委党组："},{"type":"paragraph","text":"（一）基本上同意你们关于清偿解放前人民存款问题的方案”，但尺度还须放宽些，望根据放宽的尺度制订一个具体清偿办法，再送中央核阅。（二）此事应在政协常委扩大会上征求民主人士的意见，可待周总理回国后举行。"},{"type":"paragraph","text":"中央"},{"type":"paragraph","text":"九月十三日"},{"type":"paragraph","text":"[1]中财委党组的方案提出，现在全国财经情况已经根本好转，为了维护社会信用，给银行贷款存款创造有利条件，决定无论抗战前或抗战后，凡解放前存款一律归还。方案还根据存款的不同情况规定了以下处理原则：（一）首先照顾大多数小额存款户，适当照顾大额存款户，偿还倍数采取对小户多大户少的分级递减折扣办法。（二）偿还倍数按目前银元牌价计算。（三）所有存款一律还本金不还利息。（四）采取分期偿还办法，先还小户，后还大户，小户凭单据一次还清，大户登记分期归还。"}],"authors":["毛泽东"],"dates":[{"year":1952,"month":9,"day":13}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":238,"page_end":238},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"92547dc639"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
