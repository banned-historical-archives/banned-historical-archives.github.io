tps://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives3/main/ff92c783-256c-487a-abd2-8e59e9be6390.pdf"],"article":{"title":"周恩来、毛泽东在李广桥支部关于“徐向前最近表现情况”报告上的批语","alias":"","parts":[{"type":"paragraph","text":"我主要然是达么几点，就是一个讲清理阶级队伍。清级队位，该意调壹张究，注意一个“准”当。对于党当一些老同患你，要一姓二保亚有三宽，是不是呀？所调保者，就是都助他们感：看癌，就是看他们以后的情况恋，改不改思。我的意见，改了也可以，不改也可以。强遗人家改，我犯不那么赞成。你有这么几位有要紧啦，看。我刚才不是讲了吗，地球照精转。这个期琴不要拉六紧了。周思来、毛泽东在李广桥支部关于“徐向前最近表现情况”报告上的批语"},{"type":"paragraph","text":"（一九六八年十二月二十九日、"},{"type":"paragraph","text":"一九六九年一月三日）建议军要办事继悉人投李广桥支部网志误谈，不要持得过于紧张，防止意外。周思来"},{"type":"paragraph","text":"十二月二十九日所完频二月逆流有关时老同志及其家属，始不要社判，要肥关系锅好。"},{"type":"paragraph","text":"毛泽东一月三日理年小起民的的"}],"authors":["周恩来","毛泽东"],"dates":[{"year":1968,"month":12,"day":29},{"year":1969,"month":1,"day":3}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":28,"page_end":28},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"徐向前","type":"人物"},{"name":"二月逆流","type":"主题/事件"},{"name":"清理阶级队伍","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"313b11b4c7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
