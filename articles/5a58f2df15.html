ar":1954,"month":10,"day":31}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛泽东同志等为苏联展览会题词"},{"type":"paragraph","text":"【新华社三十日讯】　中国共产党的领导者毛泽东同志等在二十五日参观了苏联经济及文化建设成就展览会后，留下了题词表示满意和感谢。题词全文如下："},{"type":"paragraph","text":"参观了苏联经济及文化建设成就展览会以后，我们觉得很满意，很高兴。这个展览会用真凭实据表现了苏联工农业经济的突飞猛进，苏联技术科学的高度发展，苏联教育事业和文化艺术事业的繁荣，和苏联人民生活的幸福。通过这一切，展览会也生动地说明了苏联人民在劳动中所表现的无限的积极性和创造性，说明了苏联共产党、苏联政府和苏联各族人民的团结一致，说明了苏联共产党中央委员会领导的正确。我们以有这样强大的盟邦而自豪。苏联的强大是争取和平民主阵营各国经济文化普遍高涨的重要条件，是争取世界和平和人类进步的重要条件。"},{"type":"paragraph","text":"苏联经济建设和文化建设的光荣成就大大地鼓舞中国人民建设社会主义的热情，并且使中国人民得到学习的最好榜样。苏联政府和苏联人民在我们的建设事业中给了我们多方面的一贯的巨大的援助，这种援助经过最近的中苏会谈是更加扩大了，而苏联经济及文化建设成就展览会的举行，也正是苏联对我国热情援助的一种表现。我们代表全中国人民对于这种情同手足的友谊表示感谢。毛泽东　刘少奇　周恩来　朱德　陈云林伯渠　董必武　彭德怀　彭真　邓小平一九五四年十月二十五日"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5a58f2df15"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
