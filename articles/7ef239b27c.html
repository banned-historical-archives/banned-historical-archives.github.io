ical-archives/banned-historical-archives0/main/maoquanji28.pdf"],"article":{"title":"给向明卿的信","alias":"","parts":[{"type":"paragraph","text":"给向明卿\"的信"},{"type":"paragraph","text":"（1950年4月19日）明卿先生惠鉴："},{"type":"paragraph","text":"去年十月十二日来信早已收到，因事迟复为歉。令侄向钧同志是共产党员，一九二七年曾任衡山县委书记，是个忠实的能干的同志，一九二七年国民党叛变被捕，光荣殉难。以上这些，先生可以报告湖南省委。惟抚恤一事，须统一行之，不能只顾少数，如省委未能即办，先生亦宜予以体谅。此复，敬颂大安！"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一九五○年四月十九日[1]向明卿，毛泽东夫人杨开慧的舅父。"}],"authors":["毛泽东"],"dates":[{"year":1950,"month":4,"day":19}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":292,"page_end":292},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7ef239b27c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
