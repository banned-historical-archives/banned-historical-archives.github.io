"authors":[],"dates":[{"year":1963,"month":11,"day":6}],"is_range_date":false,"parts":[{"text":"四川省高级人民法院对魏昭的刑事判决书","type":"title"},{"text":"公诉人：四川省人民检察院检察员岳鸿杰","type":"paragraph"},{"text":"被告：魏昭，男，36岁，汉族，湖北省均县人，家庭出身地主，本人成分学生，高中文化。扑前系永川新胜茶场就业人员。","type":"paragraph"},{"text":"罪犯魏昭，为自组织反革命集团一案，本院于1963年11月5日，由审判员王殿理担任审判长和人民陪审员黄先文、刘永福组成审判庭，书记员彭正担任记录，依法进行了公开审理，现已审理终结。查明：","type":"paragraph"},{"text":"魏犯出身于地主家庭，1948年隐瞒政治历史，混入革命阵营。解放后，其两个哥哥因反革命罪被判刑劳改，其父在土改中又被斗争，因而，怀着刻骨的阶级仇恨。1957年整风运动中，猖狂向党进攻，被划为右派分子，送劳动教养。1962年3月，伙同周犯居正为首组织反革命集团，任匪“中央书记局书记”，积极造谣煽动，发展成员，策划制定反革命纲领，密谋建立“地下贸易委员会”，筹集反革命经费，并指派成员到外地进行串连发展活动，妄图扩大其反革命组织后，伺机暴动，推翻我人民民主政权。","type":"paragraph"},{"text":"本院认为：魏犯的反革命罪行，虽经人民政府予以从宽处理，仍不思悔改，又为首组织反革命集团，企图反动统治复辟，实属罪恶重大，坚决与人民为敌的反革命分子，应予严惩。根据中华人民共和国惩治反革命条例第9条、第10条和第12条的规定，判处罪犯魏昭死刑，缓期2年，强迫劳动，以观后效。","type":"paragraph"},{"text":"如不服本判决，应在收到判决书的次日起5日内，向本院提出上诉状和副本，上诉于中华人民共和国最高人民法院。","type":"paragraph"},{"text":" 1963年11月5日","type":"paragraph"},{"text":" 四川省高级人民法院刑事审判庭审判员\t王殿理人民陪审员\t黄先文人民陪审员\t刘永福","type":"paragraph"},{"text":" 四川省高级人民法院1963年11月6日","type":"paragraph"},{"text":"本件证明与原本无异。","type":"paragraph"},{"text":"书记员\t彭正","type":"paragraph"}],"comments":[],"origin":"四川省某档案馆","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9a723b970e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
