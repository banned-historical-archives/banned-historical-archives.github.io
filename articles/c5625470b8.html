art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"黑板报","authors":[],"parts":[{"type":"paragraph","text":"毛主席刘主席同首都三万军民欢度春节"},{"type":"paragraph","text":"毛主席、刘主席、邓小平总书记以及党和国家的其他领导人，十二日晚在人民大会堂举行的盛大拥军优属联欢晚会上，同首都三万多军民一起欢度新春佳节。"},{"type":"paragraph","text":"在联欢晚会开始之前，毛主席、刘主席和邓总书记等领导人，接见了出席联欢会的我军和人民公安部队的四好连队、四好单位、五好战士、神枪手、神炮手、技术能手的代表，以及烈属、军属、复员军人的代表。"},{"type":"paragraph","text":"周总理到缅甸访问"},{"type":"paragraph","text":"周恩来总理应缅甸联邦革命委员会主席、革命政府部长会议主席奈温将军的邀请，十四日到缅甸进行友好访问。陪同访问的有陈毅副总理和夫人及其他人员。周总理陈毅副总理到达仰光时受到热烈欢迎。"},{"type":"paragraph","text":"总政举行春节拥政爱民联欢晚会"},{"type":"paragraph","text":"总政十四日晚在人民大会堂举行拥政爱民联欢晚会，刘主席、邓小平总书记等党和国家领导人，在联欢晚会上同首都军民三万多欢聚一堂，共庆新春。"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"陈毅","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c5625470b8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
