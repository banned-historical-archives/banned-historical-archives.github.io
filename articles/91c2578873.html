script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"狠狠打击右倾翻案妖风","authors":[],"dates":[{"year":1968,"month":4,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"驻沪空军某部连续六年四好有线电连"},{"type":"paragraph","text":"我们最最热烈地欢呼伟大领袖毛主席的最新指示的发表!毛主席说:“无产阶级文化大革命，实质上是在社会主义条件下，无产阶级反对资产阶级和一切剥削阶级的政治大革命，是中国共产党及其领导下的广大革命人民群众和国民党反动派长期斗争的继续，是无产阶级和资产阶级阶级斗争的继续。”毛主席的这一英明指示，最深刻、最正确、最精辟地阐明了无产阶级文化大革命的伟大意义和阶级内容。毛主席的最新指示是夺取无产阶级文化大革命全面胜利的新的进军号，动员令!是夺取文化大革命全面胜利的强大思想武器!"},{"type":"paragraph","text":"一年多来无产阶级文化大革命的事实充分证明，帝国主义和国民党反动派并不甘心于他们的失败，他们利用他们混在我们革命队伍里的代理人，妄图篡党、篡军、篡政，复辟资本主义。"},{"type":"paragraph","text":"无产阶级文化大革命越是接近全面胜利，两个阶级、两条道路、两条路线的斗争，就越是激烈，越是尖锐，阶级敌人也更加狡猾，更加荫蔽。当前，他们又掀起了一股右倾翻案妖风、把矛头指向无产阶级司令部，指向人民解放军，指向新生的革命委员会，破坏文化大革命。但是，不管敌人多么狡猾，我们一定要用战无不胜的毛泽东思想来武装广大革命人民，坚决反对右倾保守主义、右倾分裂主义、右倾投降主义，狠狠打击右倾翻案风，把一切隐藏在革命阵营里的反革命两面派统统揪出来，把无产阶级文化大革命进行到底!"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"91c2578873"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
