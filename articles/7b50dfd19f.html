" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji15","name":"毛泽东全集第15卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji15.pdf"],"article":{"title":"关于国共关系问题致周恩来电","alias":"","parts":[{"type":"paragraph","text":"关于国共关系问题致周恩来电"},{"type":"paragraph","text":"（1941年3月4日）（一）（略）（二）蒋将继续增加对我压迫，请作准备。"},{"type":"paragraph","text":"（三）蒋演词强调日本南进对中国的严重性，大概中英要订作战协定了，国民党牵入英国圈子后，投降越困难，剿共也越困难，故对我有利。"},{"type":"paragraph","text":"（四）参政会通过拥蒋案以报复我之不出席，但我如出席亦会通过此案，我们赔了夫人又折兵，便上大当，故不出席是千对万对的，只待欧战大打，国民党气焰就会降低。"},{"type":"paragraph","text":"（五）宜川增兵尚无所闻，但有可能的。华中则绝无办法，九十二军侯、马两师占涡阳、蒙城后，敌隔河炮轰，侯、马又走，我彭部三四四旅仍在涡河、新黄河间，请告刘兄。"}],"authors":["毛泽东"],"dates":[{"year":1941,"month":3,"day":4}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":465,"page_end":465},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7b50dfd19f"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
