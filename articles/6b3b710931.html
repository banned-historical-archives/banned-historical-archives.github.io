,"武汉大学"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"除“三害”战歌","type":"title"},{"text":"武汉大学夏名铠","type":"authors"},{"text":"（夏名铠：图书馆学系学生）","type":"subtitle"},{"text":"1. 除“三害”战歌     图一晨词   怀曲","type":"subtitle"},{"text":"(朗白)起来 同学们！","type":"paragraph"},{"text":"冲锋，勇士们！","type":"paragraph"},{"text":"武大“三害”流毒已久，","type":"paragraph"},{"text":"官僚主义重重，","type":"paragraph"},{"text":"宗派主义到处有，","type":"paragraph"},{"text":"娃娃管人事，","type":"paragraph"},{"text":"痴汉盘踞学府。","type":"paragraph"},{"text":"拨开乌云见青天","type":"paragraph"},{"text":"四千师生齐开火","type":"paragraph"},{"text":"嗨哟，拨开乌云见青天。","type":"paragraph"},{"text":"轰轰轰轰轰轰齐开火","type":"paragraph"},{"text":"齐开火","type":"paragraph"},{"text":"“三害”进黄泉！","type":"paragraph"},{"text":"(朗白)起来 同学们！","type":"paragraph"},{"text":"冲锋，勇士们！","type":"paragraph"},{"text":"王勇，张希光 江橹 张勃川，","type":"paragraph"},{"text":"作威作福多年，","type":"paragraph"},{"text":"把徐懋庸的衣钵传，","type":"paragraph"},{"text":"打击、压制、傲慢，","type":"paragraph"},{"text":"在武大作恶多端。","type":"paragraph"},{"text":"拨开乌云见青天","type":"paragraph"},{"text":"四千师生齐开火","type":"paragraph"},{"text":"嗨哟，拨开乌云见青天。","type":"paragraph"},{"text":"轰轰轰轰轰轰齐开火","type":"paragraph"},{"text":"齐开火","type":"paragraph"},{"text":"“三害”进黄泉！","type":"paragraph"},{"text":"2. 声讨王勇     晨词  怀曲","type":"subtitle"},{"text":"呸！王勇，王勇，王勇，你这恶霸，","type":"paragraph"},{"text":"你这寄生虫，你竟敢反攻，你竟敢反攻，嘿！","type":"paragraph"},{"text":"人民的天下，不许你逞凶，","type":"paragraph"},{"text":"同志们，一致行动！","type":"paragraph"},{"text":"把王勇把王勇","type":"paragraph"},{"text":"拉下宝座，打垮他的威风！","type":"paragraph"},{"text":"（注：歌谱无法编辑）","type":"paragraph"}],"comments":[],"origin":"《武汉大学右派言论汇编》（中共武汉大学社会主义思想教育办公室，1957.12）。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6b3b710931"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
