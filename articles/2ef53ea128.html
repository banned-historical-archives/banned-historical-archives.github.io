1950,"month":1,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席答塔斯社记者问"},{"type":"paragraph","text":"中国军事正顺利进行，并正转入和平的经济建设。这次访苏将解决中苏友好同盟条约、苏联对我国贷款、中苏贸易和贸易协定等问题。"},{"type":"paragraph","text":"【新华社北京二日电】塔斯社莫斯科二日电：塔斯社记者对中华人民共和国中央人民政府主席毛泽东先生的访问记。"},{"type":"paragraph","text":"记者问：中国目前的情势如何？"},{"type":"paragraph","text":"答：中国的军事正在顺利进行中。目前，中国共产党和中华人民共和国中央人民政府正在转入和平的经济建设。"},{"type":"paragraph","text":"问：毛泽东先生，您在苏联将逗留多久？"},{"type":"paragraph","text":"答：我打算住几个星期。我逗留苏联时间的长短，部分地决定于解决有关中华人民共和国利益的各项问题所需的时间。"},{"type":"paragraph","text":"问：您所在考虑的是那些问题，可否见告？"},{"type":"paragraph","text":"答：在这些问题当中，首先是现有的中苏友好同盟条约问题，苏联对中华人民共和国贷款问题，贵我两国贸易和贸易协定问题，以及其他问题。"},{"type":"paragraph","text":"此外，我还打算访问苏联的几个地方和城市，以便更加了解苏维埃国家的经济与文化建设。"},{"type":"paragraph","text":"【新华社北京二日电】塔斯社莫斯科二日电：今天，真理报首页刊登塔斯社记者对中华人民共和国中央人民政府主席毛泽东的访问记。（附图片）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2ef53ea128"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
