script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"一个党外人士给毛主席的信","authors":[],"dates":[{"year":1957,"month":3,"day":28}],"is_range_date":false,"parts":[{"text":"一个党外人士给毛主席的信","type":"title"},{"text":"本刊讯  呼和浩特市一署名“内蒙古非党团人”的人来信，对当地的统一战线工作提出意见，全文如下：","type":"paragraph"},{"text":"首先声明，我们是党外人，党外人想进步，是离不开党内人的指教和帮助的。我们是从反动方面转向革命方面的，几年来，在党的教诲下是有了一些进步，我们感谢党，感谢毛主席。","type":"paragraph"},{"text":"现在，党内在整风，我们也参加了整风。风，不仅在党员身上有，在我们身上同样也有，也需要整一整。几年来，我们和党员相处，有如下几点感觉，不见得正确，请参考：","type":"paragraph"},{"text":"(一)我们都是些年迈的人，也愿意接近党员同志，可是党员同志不愿接近我们，认为我们身上有把把(屎)。","type":"paragraph"},{"text":"(二)我们这些人在党员嘴里叫做“统战对象”，我们也愿意叫他们“统”一下，可就是他们不“统”。不统，怎么能叫成“统一战线”呢？","type":"paragraph"},{"text":"(三)老党员对我们应应付付，新党员对我们嘀嘀咕咕，这难道叫真诚相见吗？","type":"paragraph"},{"text":"(四)在评级时，阎王(党员)三分，小鬼(青年团员)一分，不人不鬼(非党非团)没分。这难道是合理的吗？","type":"paragraph"},{"text":"(五)给我们的工作是挂名的，他们(党员)给主席汇报是“有职有权的”。这难道是对党忠诚吗?","type":"paragraph"},{"text":"(六)在旧社会我们是混饭吃的人，今天，我们想做些有益于人民的工作，可是人为的困难太多。不好插手，虽有此抱负，不易实现。","type":"paragraph"},{"text":"(七)党的好办法，党员不照办，我们认为“风”就在这里。","type":"paragraph"},{"text":" (转自中央办公厅秘书室“要信请示”)","type":"paragraph"},{"text":"来源：1957年3月28日新华通讯社编《内部参考》。","type":"paragraph"}],"comments":[],"origin":"美国图书馆收藏","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4acbff1371"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
