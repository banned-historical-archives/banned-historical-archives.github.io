rt":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东思想使中国永不变色","authors":[],"parts":[{"type":"paragraph","text":"新华社讯 斯德哥尔摩消息：瑞典——中国协会最近在斯德哥尔摩举行报告会，由这个协会的主席、瑞典著名作家扬·米尔达报告他访问中国的情况。他的讲话受到了约七百名听众的热烈欢迎。"},{"type":"paragraph","text":"米尔达和他的夫人是应中国人民对外友好协会的邀请，在中华人民共和国成立二十周年前夕，前往中国参加庆祝活动并进行访问的。他们在中国期间，又一次访问了七年前他们访问过的陕西省延安县的柳林村。"},{"type":"paragraph","text":"扬·米尔达在报告中着重介绍了无产阶级文化大革命以来中国农村的巨大变化。他指出，中国广大的贫下中农群众，坚决走毛主席指出的道路，最坚决地批判了以刘少奇为首的一小撮走资本主义道路当权派的黑货，防止了两极分化和资本主义复辟，从而保证了中国农村沿着社会主义道路向前发展。这是毛主席革命路线在政治上取得的伟大胜利。"},{"type":"paragraph","text":"扪锪酥泄�广大的贫下中农对毛主席的无限热爱和朝气蓬勃的革命精神�K�说，中国广大贫下中农的许多家庭都举办了毛泽东思想学习班，努力学习毛泽东思想，进行〖JZ/加重〗“斗私，批修”，"},{"type":"paragraph","text":"米尔达热情歌颂了无产阶级文化大革命中涌现出的新事物。他说，在农村推行的合作医疗制度，对数亿中国农民来说是一件大喜事。由于医疗制度面向农村，他们有了就医的可靠保证。由于知识青年在农村安家落户，从而使他们可以更好地向工农学习，走同工农相结合的道路。"},{"type":"paragraph","text":"扬·米尔达在结束报告时强调指出，毛泽东思想这个强大的思想武器将使社会主义的中国永不变色。美帝、苏修对中国无产阶级文化大革命进行的诬蔑和诽谤，损害不了中国一根毫毛，也决不能阻碍中国向前发展。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e4f39eb50b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
