script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"宁夏城乡活学活用毛泽东思想的群众运动波澜壮阔  伟大的毛泽东思想深深地扎根于群众之中  广大革命群众坚持理论联系实际的学风，在斗争中学，在斗争中用，决心把自己锤炼成捍卫毛主席无产阶级革命路线的坚强战士","authors":[],"dates":[{"year":1968,"month":12,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"宁夏城乡活学活用毛泽东思想的群众运动波澜壮阔"},{"type":"paragraph","text":"伟大的毛泽东思想深深地扎根于群众之中"},{"type":"paragraph","text":"广大革命群众坚持理论联系实际的学风，在斗争中学，在斗争中用，决心把自己锤炼成捍卫毛主席无产阶级革命路线的坚强战士"},{"type":"paragraph","text":"据新华社银川十七日电　在全面落实党的八届扩大的十二中全会提出的各项战斗任务中，伟大领袖毛主席“历史的经验值得注意。一个路线，一种观点，要经常讲，反复讲。只给少数人讲不行，要使广大革命群众都知道”的最新指示和毛主席在党的七届二中全会上的光辉报告的重新发表，极大地鼓舞了宁夏广大回、汉族人民。一个广泛深入的两条路线斗争史的学习运动迅速在全区城乡掀起。广大革命群众办起了数以万计的两条路线斗争史的学习班，紧密联系本部门、本单位的斗争实际，反复学习毛主席关于两条路线斗争的一系列光辉指示，认真回顾两条路线斗争的历史经验，更加深切地体会到：毛泽东思想是进行两条路线斗争的最强大的思想武器。两条路线斗争的历史，就是亿万革命人民活学活用毛泽东思想，坚定地站在毛主席的无产阶级革命路线一边，不断地战胜反革命修正主义路线的历史。只有把毛泽东思想真正学到手，才能在两条路线斗争的大风大浪中看得清，站得稳，过得硬，真正在头脑里筑起防修反修的钢铁长城。"},{"type":"paragraph","text":"两条路线斗争史的学习，更加激发了广大革命群众对毛主席、对毛泽东思想、对毛主席无产阶级革命路线的无限热爱，使活学活用毛泽东思想的群众运动更加广泛深入地开展起来。最近以来，固原专区和银川、吴忠、永宁、泾源、海原、固原、隆德、西吉、灵武等许多县、市革命委员会，都纷纷召开活学活用毛泽东思想积极分子代表大会，认真总结、交流在两条路线斗争中活学活用毛泽东思想的经验。目前，群众性的活学活用毛泽东思想讲用会、座谈会和进行阶级教育的忆苦思甜会，在全区各地更加普遍，各种类型的毛泽东思想学习班也越办越多，越办越好。在工厂、矿山，车间、班组以至职工家属宿舍都办起了学习班；在人民公社，不但有社队、院落、家庭学习班，还有少年儿童学习班、妇女学习班；在牧区，人们把学习班办到了草场上。许多外出担负运输任务和搞副业生产的公社社员，在远离领导的情况下，也办起了学习班，自觉地活学活用毛泽东思想。"},{"type":"paragraph","text":"在活学活用毛泽东思想的新高潮中，广大工农兵和革命群众进一步发扬理论联系实际的革命学风，对照本单位的斗争实际，认真学习毛主席关于阶级和阶级斗争的学说、关于无产阶级专政下继续革命的学说以及两条路线斗争的历史经验。银川、石咀山、吴忠、固原等地的工厂、社队、机关、学校和文艺团体，以毛主席的一系列最新指示为武器，密切联系实际，举办了两条路线斗争的现场批判会、实物展览会等，通过生动活泼的形式，狠批了刘少奇的反动谬论，使广大革命群众受到了深刻的教育。"},{"type":"paragraph","text":"广大革命群众在活学活用毛泽东思想的新高潮中，怀着对伟大领袖毛主席的赤胆忠心，把斗私和批修紧密结合起来，把破私立公、改造世界观提高到两条路线斗争的高度来认识。他们认识到，无产阶级的“公”字是执行毛主席无产阶级革命路线的思想基础，资产阶级的“私”字是接受资产阶级反动路线的思想根源。斗不斗私，是关系到忠不忠于毛主席，忠不忠于毛泽东思想，忠不忠于毛主席无产阶级革命路线的大问题。他们以“老三篇”为座右铭，大找“私”字的苗头，大摆“私”字的危害，大挖“私”字的根子，在灵魂深处爆发革命。广大革命群众决心在两条路线斗争中活学活用毛泽东思想，把自己锻炼成为自觉执行、勇敢捍卫毛主席无产阶级革命路线的坚强革命战士。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"宁夏文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"977bb014fc"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
