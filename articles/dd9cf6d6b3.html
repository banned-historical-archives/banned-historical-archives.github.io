" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共中央关于对去台人员在大陆亲属政策的通知","authors":[],"dates":[{"year":1979,"month":11,"day":1}],"is_range_date":false,"parts":[{"text":"中共中央关于对去台人员在大陆亲属政策的通知","type":"title"},{"text":"各省、市、自治区党委，中央各部委，国家机关各部委党组，各人民团体党组，总政治部：","type":"appellation"},{"text":"对待去台人员在大陆的亲属，党中央曾制定了明确政策，但遭到林彪、“四人帮”严重破坏。现重申如下：","type":"paragraph"},{"text":"一、对去台人员在大陆的亲属，应在政治、经济、社会生活等方面，一视同仁，平等相待，不得歧视。台湾是中国的地方，不能把在台湾的亲友说咸是“海外关系”。","type":"paragraph"},{"text":"二、大陆和台湾亲友间正常的通信、通电，任何人不得干预。","type":"paragraph"},{"text":"三、去台人员在大陆的亲属，遭到林彪、“四人帮”政治陷害的，一律平反。迫害致死的，应予昭雪。","type":"paragraph"},{"text":"四、对去台人员在大陆亲属的团结教育和落实政策工作，请各省、市、自治区党委先在党内进行宣传教育，然后安排落实。","type":"paragraph"},{"text":" 中共中央一九七九年十一月一日","type":"paragraph"}],"comments":[],"origin":"原载《干审工作政策文件选编》，北京：党建读物出版社，1993年","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"林彪","type":"人物"},{"name":"四人帮","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dd9cf6d6b3"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
