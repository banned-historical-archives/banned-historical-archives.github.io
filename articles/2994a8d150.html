":1958,"month":1,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"我失骄杨君失柳，"},{"type":"paragraph","text":"杨柳轻飏直上重宵九。(1月23日2版更正为“杨柳轻飏，直上重宵九。”)"},{"type":"paragraph","text":"问讯吴刚何所有?"},{"type":"paragraph","text":"吴刚捧出桂花酒。"},{"type":"paragraph","text":"寂寞嫦娥舒广袖，"},{"type":"paragraph","text":"万里长空且为忠魂舞。(1月23日2版更正为“万里长空，且为忠魂舞。”)"},{"type":"paragraph","text":"忽报人间会伏虎，"},{"type":"paragraph","text":"泪飞顿作倾盆雨。"},{"type":"paragraph","text":"关于毛主席词的说明"},{"type":"paragraph","text":"李淑一同志系柳直笋烈士的夫人，现在长沙市十中任语文教员。"},{"type":"paragraph","text":"柳直笋烈士是毛主席的老战友，一九三二年九月(1月23日2版更正为“一九三三年九月”)牺牲于湖北洪湖革命战争中。杨开慧烈士(一九三○年红军退出长沙后，为刽子手何健杀害)，是李淑一同志的朋友。"},{"type":"paragraph","text":"毛主席于一九五七年五月写信给李淑一同志，信中附“蝶恋花”一阕。语四张明霞同学看到后，写信给毛主席，请求发表。毛主席于十一月二十五日回信表示同意。特将毛主席的词在本刊登载。"},{"type":"paragraph","text":"湖南师院校刊编者"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2994a8d150"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
