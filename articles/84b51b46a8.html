uthors":[],"dates":[{"year":1973,"month":3,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京一九七三年三月十日电　以罗马尼亚共产党中央执行委员会委员、中央书记、罗马尼亚社会主义共和国社会主义文化教育委员会主席杜米特鲁·波佩斯库为团长，罗马尼亚共产党中央委员会委员、罗马尼亚社会政治科学院院长米赫内亚·乔治乌为副团长的罗马尼亚文化代表团，应国务院文化组邀请，前来进行友好访问，于今天下午乘飞机到达北京。"},{"type":"paragraph","text":"代表团团员有:罗马尼亚作家协会第一副主席拉乌伦齐乌·富尔加，罗共中央候补委员、罗马尼亚社会政治科学院院士、克卢日大学校长斯特凡·帕斯库，罗共中央候补委员、罗共中央副部长康斯坦丁·马特伊。"},{"type":"paragraph","text":"罗马尼亚驻中国大使格夫里列斯库同机到达北京。"},{"type":"paragraph","text":"前往机场欢迎罗马尼亚同志的有:中共中央政治局委员姚文元，中共中央委员、国务院文化组组长吴德，中共中央委员、中共中央对外联络部部长耿飚，中共中央委员、国务院文化组副组长刘贤权，中共中央候补委员、国务院文化组成员石少华，有关方面负责人迟群、周培源、刘庆棠、王珍、王明修、王亮池等。"},{"type":"paragraph","text":"罗马尼亚驻中国大使馆临时代办基伏和大使馆外交官员也到机场迎接。"},{"type":"paragraph","text":"代表团七日上午乘飞机离开布加勒斯特前来中国时，罗马尼亚共产党中央执行委员会候补委员、中央书记科·布尔蒂卡和中国驻罗马尼亚大使张海峰，到机场送行。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"姚文元","type":"人物"},{"name":"吴德","type":"人物"},{"name":"耿飚","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"84b51b46a8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
