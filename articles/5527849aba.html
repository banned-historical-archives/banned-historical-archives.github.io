:[{"year":1971,"month":10,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"江苏农村积极发展养猪事业。目前，全省农村猪的圈存量比无产阶级文化大革命前的一九六五年年底增长百分之三十以上，创造了历史最高水平。达到“一人一猪”、“一亩一猪”的社、队越来越多。许多社、队猪多肥多，促进了农业生产的发展，壮大了集体经济，增加了社员的收入。"},{"type":"paragraph","text":"毛主席教导说:“除了合作社公养以外，每个农家都要劝他们养一口至几口猪”。江苏省农村各级党组织和革委会遵照毛主席的指示，在领导群众积极发展集体养猪的同时，继续鼓励社员家庭养猪。吴县越溪公社革委会几年来一直注意领导集体养猪场饲养母猪，现在全公社集体饲养的公、母猪达一千多头，年产苗猪一万一千多头，不仅苗猪的数量充足，而且品种好，体质强，为发展集体养猪和支持社员家庭养猪创造了良好的条件。与此同时，他们根据党的政策，对社员家庭养猪的饲料供应和投肥作价等作出了合理的规定，并从实际出发，对养猪有困难的贫下中农社员，在资金、苗猪等方面给以必要的扶持，使集体养猪和社员家庭养猪都有很大发展，达到“一亩一猪”。全公社出现了“生猪年年增，粮食节节高”的欣欣向荣的局面，成了苏州地区养猪的一个先进单位。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"江苏文革","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5527849aba"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
