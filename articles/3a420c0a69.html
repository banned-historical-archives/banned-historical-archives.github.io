al-archives/banned-historical-archives8/main/maoquanji2.pdf"],"article":{"title":"虞美人·枕上","alias":"","parts":[{"type":"paragraph","text":"虞美人·枕上"},{"type":"paragraph","text":"(1921年)堆来枕上愁何状，江海翻波浪。夜长天色总难明，寂寞披衣起坐数寒星。2晓来百念都灰尽，β剩有离人④影。一钩残月向西流，"},{"type":"paragraph","text":"对此不抛眼泪也无由。[1]毛泽东手书句末为问号。[2]毛泽东手书作“无奈披衣起坐薄寒中”。[3]毛泽东手书作“晓来百念皆灰尽”。"},{"type":"paragraph","text":"[4]离人，指作者的夫人杨开慧。杨开慧（1901—1930)，湖南长沙人，1921年加入中国共产党，在中共湘区委员会负责机要兼交通联络工作，后随作者去上海、武汉等地。1927年大革命失败后，隐蔽在长沙板仓坚持地下工作。1930年10月被国民党反动派逮捕，11月牺牲。1920年冬，同毛泽东在长沙结婚。"},{"type":"paragraph","text":"[5]残月，拂晓时形状如钩的月亮。宋代梅尧臣《梦后寄欧阳永叔》：“五更千里梦，残月一城鸡。”"},{"type":"paragraph","text":"1"},{"type":"paragraph","text":"服屋毛泽东手书《虞美人·枕上》。《战友》（油画）《挥手从兹去》（油画）"}],"authors":["毛泽东"],"dates":[{"year":1921}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":468,"page_end":470},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3a420c0a69"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
