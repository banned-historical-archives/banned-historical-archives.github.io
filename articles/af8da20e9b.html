上  广大革命职工决心在新的一年里，创造出更加优异的成绩","authors":[],"dates":[{"year":1968,"month":12,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"高举毛泽东思想伟大红旗，狠抓革命，猛促生产"},{"type":"paragraph","text":"陕西宁夏工交战线革命形势大好生产蒸蒸日上"},{"type":"paragraph","text":"广大革命职工决心在新的一年里，创造出更加优异的成绩"},{"type":"paragraph","text":"新华社西安二十四日电　陕西省工业交通战线广大革命职工，高举毛泽东思想伟大红旗，狠抓革命，猛促生产，革命蓬勃发展，生产蒸蒸日上。早在十月份，陕西省就有一批厂矿提前完成全年生产任务。在党的八届十二中全会公报的鼓舞下，全省工业生产又出现了新的跃进局面。主要工业产品如钢材、原油、栲胶、柴油机、工业搪瓷、印刷机械、日用陶瓷等六十多种产品，都完成或超额完成了全年生产任务。完成任务较好的轻工业和纺织工业，生产水平一季超过一季，第四季度生产总产值就比第三季度增长百分之二十八，同时产品质量也有很大提高，花色品种不断增多。"},{"type":"paragraph","text":"陕西省广大革命职工一致认为，坚决执行伟大领袖毛主席一系列最新指示，认真落实党的八届十二中全会公报提出的各项战斗任务，深入开展两条路线斗争史的学习，这是全省工业交通战线获得丰硕成果的根本原因。目前，他们以八届十二中全会公报为武器，一面总结今年的工作，一面着手安排一九六九年的生产任务，决心在新的一年里，创造出更加优异的成绩。"},{"type":"paragraph","text":"新华社银川二十四日电　在伟大领袖毛主席一系列最新指示的指引下，宁夏回族自治区二十万工人的阶级斗争和两条路线斗争觉悟大大提高，“抓革命，促生产”的热情更加高涨，全区工业交通战线出现了空前未有的大好形势。"},{"type":"paragraph","text":"一年来，全区工业生产水平一月高过一月，一季超过一季。建筑材料、纺织、轻工、冶金、化工等主要行业的总产值，第三季度比第二季度增长百分之三十四，第四季度又比第三季度有了大幅度的增长。从十一月上旬以来，已有一批工厂提前完成全年生产计划。许多工厂创造了建厂以来的最高生产水平。过去宁夏没有生产过的毛主席著作用纸、电子测试仪器和氮化设备等，如今已经大批投入生产或开始投入生产。另外，有些产品已经分别达到全国先进水平或国际先进水平。"},{"type":"paragraph","text":"目前，宁夏工交战线广大革命职工，正在深入开展两条路线斗争史的学习运动，决心在革命和生产中创造出更加优异的成绩，迎接党的第九次全国代表大会的胜利召开。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"陕西文革","type":"人物"},{"name":"宁夏文革","type":"人物"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"af8da20e9b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
