<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"湖南省委开除蜕化变质分子陈曦出党","authors":["潘荻"],"dates":[{"year":1963,"month":6,"day":7}],"is_range_date":false,"parts":[{"text":"湖南省委开除蜕化变质分子陈曦出党","type":"title"},{"text":"潘荻","type":"authors"},{"text":"本刊讯    湖南省委最近把蜕化变质分子、前湖南省文化局长陈曦开除出党，并通报全省各级党组织，组织干部讨论，吸取教训。","type":"paragraph"},{"text":"盗名窃誉，剥夺他人劳动成果","type":"subtitle"},{"text":"陈曦于1956年7月调任文化局长后，自认为“出生入死革命二十多年，还不及一个作家、导演和名演员赚钱多，生活好，荣誉大”，于是利用职权，采取抄袭、剽窃以及霸占他人劳动成果等恶劣手段来搞“创作”。他还带在群众中说什么“创作没有巧，看谁偷得好”，为其偷窃行为作辩护。从1958年起，他就东拼西凑，把别人的作品抄过来当作自己的“创作”；或以领导者身份提点意见，根本没有动笔就变成了作品的“合作者”；或利用职权将别人送审的剧本改动一下，当作自己的“创作”，甚至直接在别人编写的剧本上硬加上自己的名字。有时还一剧多名，反复出版，骗取稿费。几年来，陈曦采取上述手段，单独署名或与人联名的剧本就有三十五个，已经出版的有二十四个。这些剧本的三千四百三十元稿费中，陈个人即得一千零二十元。陈曦的剽窃行为，严重打击了创作人员的积极性，影响很坏。","type":"paragraph"},{"text":"抗上压下，独断专行，歪曲政策，打击报复","type":"subtitle"},{"text":"1957年反右斗争后，陈曦在工作上独断专行，以党自居，谁不听他的话，就是“不听党的话”。甚至给扣上“反党”的帽子。全国戏曲研究院负责同志对他署名的剧本提了些意见，他就诬之为“右派言论”。文化局人事科某同志对湘剧院工作提了些批评意见，陈就公开骂提意见的同志“是什么东西，也想来湘剧院与我争权”。","type":"paragraph"},{"text":"1959年冬，他剽窃“生死牌”一剧的行为被上级发觉后，他公然抗拒检查，同时对下压制封锁，不准湘剧老演员反映真实情况。1961年6月，陈曦参加全国文艺工作座谈会回湖南后，怕暴露自己所犯的错误，竟不向党组传达，却擅自召集省直剧团支部书记和团长开会，歪曲全国文艺工作座谈会精神，企图阻止大家揭发他的错误。此外，他还在演员中散布混乱思想，说什么：“你们不懂得政策，三十年河东，三十年河西，今天讲劳逸结合，明天又讲好逸恶劳。今天你们是对的，过个时期是否会变呢？你们要准备，今年会有紧张的来啦！”以此进行威胁和压制。","type":"paragraph"},{"text":"奸污、玩弄女性，腐化堕落","type":"subtitle"},{"text":"陈曦自1958年以来，利用职权，先后奸污和调戏妇女十二人。1961年来北京参加全国文艺工作座谈会期间，他经常借病不参加会议，却带着四名在京学戏的女演员到处游逛，大吃大喝，并玩弄了一个女演员。1961年夏季，有一次他带着六名女演员去游泳，对她们进行调戏污辱。群众愤慨地说：“陈曦离了女人就不能活。”更为恶劣的是，对于不肯顺从他的女演员则打击报复，在群众中丑化她们的历史，或在演员会议上宣布她们“不听党的话”，“是白专分子”，不让她们演主角，以进行报复打击。（潘荻）","type":"paragraph"},{"text":" 来源：根据1963年6月7日新华社《内部参考》。","type":"paragraph"}],"comments":[],"origin":"美国图书馆收藏","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"717dcd8870"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
