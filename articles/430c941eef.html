ors":[],"dates":[{"year":1959,"month":7,"day":10}],"is_range_date":false,"parts":[{"text":"毛泽东在庐山会议上讲话记录","type":"title"},{"text":"团结问题","type":"subtitle"},{"text":"对形势的认识不一致，就不能团结。要党内团结，首先要把问题搞清楚，要思想统一。","type":"paragraph"},{"text":"有些同志对形势缺乏全面分析，要帮助他们认识，得的是什么，失的是什么?","type":"paragraph"},{"text":"要把问题搞清楚：有人说总路线根本不对，所谓总路线，无非是多快好省。多快好省根本不会错。","type":"paragraph"},{"text":"我们把道理讲清楚，把问题摆开，总可以有百分之七十的人在总路线下面。","type":"paragraph"},{"text":"要承认缺点、错误，从一个局部来讲，从一个问题来讲，可能是十个指头，九个指头，七个指头的问题。从总的形势来讲，就是这样，九个指头和一个指头。","type":"paragraph"},{"text":"我就总同外国同志说：请他们隔十年时间再来看看，我们是否正确。因为路线的正确与否，是实践的问题，要有时间，从实践的结果来证明。我们对建设应该说还没有经验，至少还要十年。这一年来的会议，我们总是把问题加以分析，加以解决，坚持真理，修正错误。党内有些同志不了解整个形势，要向他们说明。从某些具体事实说来，确实有得不偿失的，但是总的来说，不能得不偿失。取得经验总是要付学费的。","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"430c941eef"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
