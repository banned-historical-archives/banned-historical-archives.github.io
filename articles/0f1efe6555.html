<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中央监委关于纠正某些党的监察干部不尊重党委领导的错误的通报","authors":[],"dates":[{"year":1958,"month":1,"day":25}],"is_range_date":false,"parts":[{"text":"中央监委关于纠正某些党的监察干部不尊重党委领导的错误的通报","type":"title"},{"text":"根据安徽、四川、贵州、江苏等省监委的报告反映：在某些党的监察干部中，存在着不尊重、不服从党委领导，不执行党委决议的错误思想和行为。例如，有的党的监察干部错误地强调党的监察委员会的垂直领导，将监委与党委摆在平行的关系上，不服从党委的领导。安徽省枞阳县监委秘书凌光斗说：“县委不能领导县监委，监委同党委是平行机关，党委交办的任务，只能有条件地执行”；他并且擅自改变党委决定处理的案件，不执行党委的决定。四川省西昌地方监委监察员冯凌育，对省监委强调党委对监察工作的领导不满意，认为省监委对“八大”以前党委对监委的指导关系实质上是领导关系的解释，是“强词夺理”，对“八大”以后处分党员批准权限的改变说是：“中央把权收回去了，这样，监委没事可作，不能发挥作用”，并由此得出错误的结论：“可以撤销地监委，将监委改为监察部”。有的党的监察干部甚至荒谬地将党的监察工作置于党委的领导之外，或者凌驾于党委之上，标榜党的监察工作的“独立立场”，主张党的监察组织在检查案件的时候，“不站在党委立场上，也不站在犯错误的人的立场上，要站在‘公正人’的立场”。此外，也有的党的监察干部不但不积极主动地进行工作，反而散布不满情绪，埋怨党委不重视党的监察工作，说“党委对各个部门有亲疏之分，监委是孤儿”等等。这些错误的思想和行为，虽然在党的监察干部中是个别的，但是，应该指出，这是一种原则性的错误，是破坏党的统一领导的分散主义，必须严加批判，彻底纠正。","type":"paragraph"},{"text":"各级党委是各地党的最高领导机关，党的监察组织是党委的一个部门，是党委执行党的纪律、保证党的政策贯彻执行的助手。各级党的监察组织必须在中央和各级党委的统一领导下进行工作，这是党的组织原则，也是作好党的监察工作的保证。任何脱离党委的统一领导，闹独立性、闹分散主义的观点和作法都是错误的，都会损害党的统一和集中领导，如果任其存在和散播，对于党将有极大的危害。","type":"paragraph"},{"text":"党的各级监察组织应该通过整风运动，认真地检查和纠正党的监察干部中的这种分散主义倾向。这种错误言行，那怕是极个别的，也是必须引起严重注意并加以纠正的。党的各级监察组织必须坚持在党委领导下进行工作，坚决地执行中央和各级党委的决议、指示，密切地结合党的中心工作；不断地提高认识，增强党性，改造作风，以完成党所交给的任务。","type":"paragraph"}],"comments":[],"origin":"《中央监察委员会文件选编》（1955—1959），中央监察委员会办公厅印，1960年4月1日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0f1efe6555"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
