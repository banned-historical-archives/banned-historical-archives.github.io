year":1981,"month":9,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"讲话也应该短些，再短些"},{"type":"paragraph","text":"最近学习文件，我们注意到，几位中央领导同志在一次会上的讲话，寓意深刻，内容丰富，然而语言十分简练。"},{"type":"paragraph","text":"新当选的党中央主席胡耀邦同志的讲话仅用了18分钟。"},{"type":"paragraph","text":"邓小平同志的讲话只有14句话。"},{"type":"paragraph","text":"陈云同志的讲话只有5句话。"},{"type":"paragraph","text":"开了这么重要的一个会，中央领导同志只用了短短的几分钟、十几分钟的时间，讲了一些很好的意见。这种说短话的作风，很值得大家学习。"},{"type":"paragraph","text":"现在不少地方、不少单位仍然热衷开长会，讲者洋洋万言，听者心不在焉，以致出现台上开大会，台下开小会的情况，织毛线、看小书、打瞌睡者应有尽有。这样，既达不到会议应该收到的效果，又浪费了人们的宝贵时间。因此，不仅写文章要短些再短些，开会、讲话也应该短些再短些！    襄阳地委人事局  侯建中"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"12f060fe9e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
