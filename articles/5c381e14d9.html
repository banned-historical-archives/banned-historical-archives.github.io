ical-archives/banned-historical-archives0/main/maoquanji36.pdf"],"article":{"title":"对《百花齐放，百家争鸣》一文的批语","alias":"","parts":[{"type":"paragraph","text":"对《百花齐放，百家争鸣》"},{"type":"paragraph","text":"一文的批语!"},{"type":"paragraph","text":"（1956年6月8日）"},{"type":"paragraph","text":"退陆定一同志。此件很好，可以发表。在第九页上作了一点修改，请加斟酌。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"六月八日"},{"type":"paragraph","text":"是否可以这样修改，请和周扬、袁水拍、何其芳等同志商量一下。"},{"type":"paragraph","text":"[1]这个批语写在陆定一1956年6月7日为送审《百花齐放，百家争鸣》的讲话稿给毛泽东的信上。信中说：因为有二百个科学家集中北京起草科学规划，李富春提议向他们讲一次百花齐放、百家争鸣的政策。少奇同志指定我去讲。讲稿起草后，中宣部讨论了两次，后又根据恩来同志的意见作了修改。5月26日在两千人的会上作了报告，会后收到来信70封。根据这些意见又加修改，成为现在的稿子。同时送上郭沫若、茅盾、何其芳、袁水拍、胡稼胎来信五件。关于俞平伯的一段，袁水拍、何其芳提了意见，有的同志主张将这段删去。但因为这一段的影响是好的，所以仍旧保留。1956年6月13日，这篇讲话稿在《人民日报》发表。"}],"authors":["毛泽东"],"dates":[{"year":1956,"month":6,"day":8}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":374,"page_end":374},"tags":[{"name":"毛泽东","type":"人物"},{"name":"陆定一","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5c381e14d9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
