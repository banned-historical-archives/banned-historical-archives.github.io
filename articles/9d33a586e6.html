art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"中国军民永远遵照毛主席的教导坚决支持老挝爱国军民打败美帝","authors":[],"parts":[{"type":"paragraph","text":"新华社十九日讯 中华人民共和国国务院副总理兼国防部长林彪同志，今天打电报给老挝人民解放军坎代·西番敦最高指挥，热烈祝贺老挝人民解放军建军二十周年。贺电全文如下："},{"type":"paragraph","text":"桑怒"},{"type":"paragraph","text":"老挝人民解放军坎代·西番敦最高指挥："},{"type":"paragraph","text":"在老挝人民解放军建军二十周年的时候，我代表中国人民和中国人民解放军全体指战员，向兄弟的老挝人民和老挝人民解放军全体战友，致以热烈的祝贺。"},{"type":"paragraph","text":"英勇的老挝人民、老挝人民解放军和其他老挝爱国武装力量，在老挝爱国战线党的领导下，团结一致，英勇战斗，给美帝国主义侵略者及其走狗以沉重的打击。你们动员人民，依靠人民，进行人民战争，歼灭敌人的有生力量，取得了伟大的胜利。"},{"type":"paragraph","text":"我们深信，在长期革命战争中久经锻炼的老挝爱国军民，一定能够识破敌人的一切阴谋诡计，坚持持久战争，彻底打败美国侵略者及其走狗，最后取得全民族的解放。"},{"type":"paragraph","text":"在无产阶级文化大革命中锻炼得更加坚强的中国人民和中国人民解放军，将永远遵照我们的伟大领袖毛主席关于“已经获得革命胜利的人民，应该援助正在争取解放的人民的斗争”的一贯教导，坚决支持英勇的老挝爱国军民，把抗美救国战争进行到底！"},{"type":"paragraph","text":"中、老两国人民和两国人民军队的战斗友谊万岁！"},{"type":"paragraph","text":"中华人民共和国国务院副总理兼国防部长 林彪"},{"type":"paragraph","text":"一九六九年一月十九日于北京"}],"alias":""},"tags":[{"name":"林彪","type":"人物"},{"name":"人民战争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9d33a586e6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
