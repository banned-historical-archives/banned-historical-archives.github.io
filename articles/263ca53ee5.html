[{"year":1967,"month":7,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席的警卫战士坚决支持你们"},{"type":"paragraph","text":"北京卫戍区某部五好战士　刘乃昌"},{"type":"paragraph","text":"党内最大的一小撮走资本主义道路当权派在武汉的代理人，不甘心他们的灭亡，在绝望中进行垂死挣扎，疯狂反扑，其矛头直接指向毛主席、林副主席、毛主席的无产阶级司令部以及中央文革小组。我们警卫战士一千个不答应，一万个不答应。我们正告你们这一小撮跳梁小丑：与毛泽东思想为敌，绝没有好下场，人民不会饶恕你们，无产阶级专政的铁拳将给你们应有的惩罚。“捣乱，失败，再捣乱，再失败，直至灭亡”，这就是你们的逻辑。"},{"type":"paragraph","text":"毛主席是我们心中最红最红的红太阳，我们永远做毛主席的最忠实的警卫战士。我们在毛主席身边的警卫战士无限热爱毛主席，无限热爱林副主席，无限热爱毛主席的司令部，无限热爱中央文革，无限热爱无产阶级革命派。谁反对毛主席，谁反对林副主席，谁反对毛主席的司令部，谁反对中央文革，谁镇压无产阶级革命派，谁就是我们不共戴天的死敌，我们就坚决和他拚到底。我们誓作武汉地区无产阶级革命派的坚强后盾。"},{"type":"paragraph","text":"谢富治同志和王力同志是毛主席的无产阶级革命路线的忠实执行者，是最坚定的革命左派。我们坚决表示：要以谢富治同志、王力同志为榜样，更高地举起毛泽东思想的批判大旗，在对党内最大的一小撮走资本主义道路当权派展开大批判的新高潮中，和无产阶级革命派团结在一起、战斗在一起、胜利在一起，发扬痛打落水狗的精神，从政治上、思想上、理论上把党内最大的一小撮走资本主义道路当权派批倒、批垮、批臭，叫他们遗臭万年，永世不得翻身。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"谢富治","type":"人物"},{"name":"王力","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"中央文革","type":"人物"},{"name":"革命大批判","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"263ca53ee5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
