" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"毛泽东关于湖南报告的意见","authors":[],"dates":[{"year":1959,"month":3,"day":9}],"is_range_date":false,"parts":[{"text":"毛泽东关于湖南报告的意见","type":"title"},{"text":"一","type":"subtitle"},{"text":"小平同志：","type":"appellation"},{"text":"此件请用电话于今夜发各省、市、区党委。下附湖南八日报告。","type":"paragraph"},{"text":" 毛九日十三时","type":"paragraph"},{"text":"二","type":"subtitle"},{"text":"湖南省委三月八日的报告，九日上午十二时收到。六级干部大会宜早不宜迟。先布置生产，很对。县、社、大队和队，都有一二个强的领导者留在当地指挥生产，农事决不能误。但全省大会宜早开，分两批到省，第一批四级，第二批两级，一开始就是大会，河南就是这样开的。大会有公社三级干部，把方针一放，立即轰开，情况暴露，就是最好的调查。不必事先做调查，以省时间。很多同志做了几个月的调查，开过不少的大会小会，结果对于大量存在的事物，却是视而不见，听而不闻。原因是方法不对，找不到主要矛盾在什么地方。大家都读过马克思主义的哲学和政治经济学，办起事来却在长时间内不认识公社的集体所有制要有一个由小到大、由量到质的变化过程，几乎普遍否认价值、价格和等价交换的经济法则。这不是很奇怪吗?但却是事实。现在已有了郑州会议的方针，只须将六级几千人召集在一起，把方针一放，几天工夫，情况就会明白了，思想就会弄通了。会议早开早结，于农事也有利。","type":"paragraph"},{"text":" 毛泽东1959年3月9日下午一时于郑州","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b51a11cabc"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
