[{"year":1953,"month":10,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"广西横县西北中学学生曾善平来信:我是一个僮族青年。解放后，我幸福地进了学校，得到受教育的机会。经过几年的学习，我逐渐明确了:学习是为了祖国，我们要学习得好，是为了替人民做更多的事。我为了学习得更好，在本学期开始时初步地订立了学习计划，包括下列各点:遵守课堂纪律，集中注意力听课，上课前做好准备，上课时做好笔记，全部消化每一堂课的内容；当天的功课，当天温习好；加强政治理论和时事学习，每天读报半小时，每个月精读一本书，并做阅书笔记；注意文娱体育活动；在不妨碍学习的原则下，取得班主任的指导，参加校内各项集体工作。"},{"type":"paragraph","text":"各民族亲密团结的大家庭给了我以无限温暖，我要切实实行这些计划，响应毛主席关于‘身体好、学习好、工作好’的号召。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"39bcc86202"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
