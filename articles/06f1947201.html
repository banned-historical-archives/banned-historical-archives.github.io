决定","authors":[],"dates":[{"year":1966,"month":8,"day":12}],"is_range_date":false,"parts":[{"text":"中国共产党八届十一中全会关于撤销和补选书记处书记的决定（一九六六年八月十二日通过）","type":"title"},{"text":"（一）十一中全会批准一九六六年五月二十三日政治局扩大会议关于停止彭真、陆定一、罗瑞卿的中央书记处书记的职务，停止杨尚昆的中央书记处候补书记的职务的决定。","type":"paragraph"},{"text":"（二）从已揭发的大量事实证明，彭真、陆定一、罗瑞卿、杨尚昆的错误性质是极端严重的，是反党反社会主义反毛泽东思想的，因此，全会决定撤销彭真、陆定一、罗瑞卿的中央书记处书记的职务，撤销杨尚昆的中央书记处候补书记的职务。","type":"paragraph"},{"text":"（三）批准一九六六年五月二十三日政治局扩大会议关于调陶铸担任中央书记处常务书记，调叶剑英担任书记处书记的职务的决定。","type":"paragraph"}],"comments":[],"origin":"根据群众组织出版物[翻印者未注明]和中国人民解放军国防大学当时党建政工教研室《“文化大革命”研究资料》，北京：[内部出版]，1988年，上册","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"彭真","type":"人物"},{"name":"罗瑞卿","type":"人物"},{"name":"陆定一","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"06f1947201"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
