script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"type":"pdf","id":"wenji4","name":"毛泽东文集第四卷（1999）","internal":false,"official":true,"author":"中央文献研究室","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/wenji4.pdf"],"article":{"title":"先解决受降、伪军、自治三大问题才能恢复交通","description":"根据毛泽东手稿刊印。","dates":[{"year":1945,"month":11,"day":5}],"parts":[{"text":"先解决受降、伪军、自治三大问题才能恢复交通","type":"title"},{"type":"appellation","text":"甲乙戌微致丙丁："},{"type":"paragraph","text":"支电悉。"},{"type":"paragraph","text":"（一）目前我在谈判中，在恢复交通问题上有几点提法已处于被动，必须考虑成熟，恢复主动；决定《解放日报》明日发表中共发言人谈话，强调必须立即制止内战，必须先解决受降、伪军、自治三大问题，才能恢复交通，否则即是帮助内战；在受降问题上必须由解放区担任受降，其他军队撤回原防。"},{"type":"paragraph","text":"（二）邯郸战役缴获大批文件证明政府有全盘反共内战计划，请你考虑可否借此转弯，采取强硬态度，不要撤回原提四点，只说政府一面谈判，一面大举进攻，现并大举调兵，所谈尽是欺骗，我们不能信任；如欲取信，必须立即解决受降（包括撤兵驻防）、伪军、自治三大问题。"},{"type":"paragraph","text":"（三）不但我们在之交通线彼不得进，我们不在彼亦不得进，已进者须撤退，否则一定是内战。"},{"type":"paragraph","text":"（四）交通线上可以双方不驻兵，彼方已驻者须退返原防，不能让其驻在我解放区。（五）双方军队撤离交通线后，应由解放区自治政府管理。（六）不能同意组织交通考察团，应先解决受降（包括撤兵驻防）、伪军、自治三问题，亦即解决内战危险问题，由解放区负责恢复交通，目前则绝对不能恢复。（七）不要急忙回答彼方所提六点，也不怕他们发表，实际上吴国桢已于四日向合众社发表，此间今晚发表批评。（八）同意东北问题暂缓提出。（九）关于揭发内战及美军干涉两点，已令几个机关动员来做，材料可大增加。（十）西安息，蒋令胡宗南立即去郑州，发动大举进攻，彼方一不做二不休，深堪注意。"}],"comment_pivots":[{"part_idx":0,"offset":21,"index":1},{"part_idx":2,"offset":2,"index":2},{"part_idx":3,"offset":61,"index":3},{"part_idx":4,"offset":7,"index":4},{"part_idx":4,"offset":53,"index":5},{"part_idx":6,"offset":164,"index":6},{"part_idx":6,"offset":241,"index":7},{"part_idx":6,"offset":245,"index":8}],"is_range_date":false,"authors":["毛泽东"],"comments":["这是中共中央给在重庆的中共代表团的电报。","指周恩来一九四五年十一月四日给中共中央的电报。","即《国民党进攻的真相》（《毛泽东选集》第四卷，人民出版社1991年版，第1167—1170页）。","邯郸战役，也称平汉战役，见本卷第38页注〔1〕。","指周恩来、王若飞一九四五年十月二十六日在给中共中央的电报中提出的四项临时办法。见本卷第52页注〔2〕。","吴国桢（一九○三——一九八四），湖北建始人。当时任国民党中央宣传部部长。","蒋，指蒋介石。","胡宗南，当时任国民党军第一战区司令长官。"],"page_start":80,"page_end":81,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4725bb9290"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
