反修正主义斗争中贡献力量","authors":[],"dates":[{"year":1962,"month":12,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京27日电】　各民主党派和全国工商联分别于24日至27日在北京召开中央全会或执行委员会。"},{"type":"paragraph","text":"各民主党派所举行的会议是:中国国民党革命委员会第四届中央委员会第三次全体会议，中国民主同盟第三届中央委员会第三次全体会议(目前正在举行预备会)，中国民主建国会第二届中央委员会第二次全体会议和中华全国工商业联合会第三届执行委员会第二次会议联席会议，中国民主促进会第五届中央委员会第三次全体会议，中国农工民主党第七届中央委员会第三次全体会议，中国致公党第六届中央委员会第五次全体会议，九三学社第五届中央委员会第四次全体会议，台湾民主自治同盟全盟工作会议。各民主党派和工商联的负责人程潜、张治中、杨明轩、黄炎培、陈叔通、周建人、季方、陈其尤、许德珩、徐萌山等分别在这些会议的开幕式上讲了话。各党派这次会议是在中国共产党八届十中全会公报的光辉照耀和鼓舞下召开的，会议将讨论国内外形势和它们今后的工作任务，推动成员进行爱国主义、国际主义、社会主义的学习，以进一步提高认识，在争取我国国民经济的新发展和社会主义事业新胜利的斗争中，在反对帝国主义侵略、保卫世界和平的斗争中，在反对各国反动派和现代修正主义的斗争中，贡献出自己的力量。"},{"type":"paragraph","text":"民革中央主席何香凝在外地休养，26日打电报给民革四届三中全会祝贺大会胜利成功。"},{"type":"paragraph","text":"出席这次会议的，有各民主党派和全国工商联的中央委员、候补中央委员，以及他们的地方组织的负责人等。参加各党派会议的共达一千四百多人。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"革命委员会","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"670ff2a4df"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
