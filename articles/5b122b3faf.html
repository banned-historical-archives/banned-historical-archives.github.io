script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"在所谓“达赖喇嘛的声明”发表后  英资产阶级报纸煽风点火  公开鼓励西藏叛匪　煽动印度反对我国","authors":[],"dates":[{"year":1959,"month":4,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"在所谓“达赖喇嘛的声明”发表后"},{"type":"paragraph","text":"英资产阶级报纸煽风点火"},{"type":"paragraph","text":"公开鼓励西藏叛匪　煽动印度反对我国"},{"type":"paragraph","text":"新华社21日讯　伦敦消息：英国外交部发言人20日在谈到所谓达赖喇嘛在印度发表的声明的时候说，英国政府还在“研究这个声明和总的局势”。"},{"type":"paragraph","text":"这个发言人还说，英国政府“还同印度政府就这个问题保持密切联系”。"},{"type":"paragraph","text":"值得注意的是美联社记者从伦敦发出的一条消息说，据他了解，英国政府在所谓达赖喇嘛声明发表以后，正在同印度政府讨论将来是否承认中国有权管辖西藏的说法的具体方面。大家知道，英帝国主义者曾经长期从事“西藏独立”的阴谋。"},{"type":"paragraph","text":"同时，英国资产阶级报纸在所谓达赖喇嘛声明发表后，利用这个声明公开鼓励西藏叛乱分子，并且竭力煽动印度反对中国。"},{"type":"paragraph","text":"“泰晤士报”的社论虽然承认所谓达赖喇嘛在印度的声明“对许多问题仍然没有回答”，但是它却硬说“中国对达赖喇嘛施加了压力”。"},{"type":"paragraph","text":"这篇社论再次把西藏叛国分子发动的违背西藏人民利益、因而得不到绝大多数西藏人民支持的叛乱称为“真正的西藏民族主义”，并且妄想这种“民族主义”会“基础巩固”地在西藏人民中“留下来”。"},{"type":"paragraph","text":"“曼彻斯特卫报”的评论以露骨的煽动的口吻说，“如果（印度政府）采取谨慎态度只是由于希望……保持中印友谊的话，这肯定是卑鄙的”，但是，如果为了“西藏人的命运”，那末“西方和印度的批评尼赫鲁的谨慎态度的人”就不应该“那么急躁”。"},{"type":"paragraph","text":"这家报纸认为，“尼赫鲁先生在公开场合说给中国人听的话并没有他所做的事情那么重要”。"},{"type":"paragraph","text":"“曼彻斯特卫报”指点印度说，印度“在中国面前是无需胆怯的”，“尼赫鲁先生要是在非共产党亚洲带头展开一场反对中国政府的论争并向联合国提出控告，可能是一种好的政策”。"},{"type":"paragraph","text":"“每日电讯报”的社论也贯穿着同样的想破坏中印友好关系的企图。这家报纸要尼赫鲁利用“他们（中国）要同印度保持友好关系”这一点而“大胆起来”，这家报纸说，“由一个亚洲国家来向联合国提出西藏问题，显然是最好不过的，公众都显然期望着尼赫鲁先生”。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5b122b3faf"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
