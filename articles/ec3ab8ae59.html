ical-archives/banned-historical-archives0/main/maoquanji52.pdf"],"article":{"title":"对毛远新请示报告的批语","alias":"","parts":[{"type":"paragraph","text":"对毛远新请示报告的批语2"},{"type":"paragraph","text":"（1976年4月）第三条不好。"},{"type":"paragraph","text":"二"},{"type":"paragraph","text":"此计不妥。一"},{"type":"paragraph","text":"[1]毛远新，毛泽东的侄子。当时任中共辽宁省委书记、省革委会副主任，在北京做毛泽东的联络员。“文化大革命”中积极参加江青反党集团分裂党、篡党夺权的宗派活动。1976年10月粉碎“四人帮”后被免去党内外一切职务，拘留审查，后被判处有期徒刑17年。"},{"type":"paragraph","text":"[2]本篇一写在毛远新1976年4月13日给毛泽东的报告上。报告中说，12日晚政治局会议研究了八件事，其中第三件事是北京市委关于天安门事件的报告准备转发全国，报告“要进一步修改充实，除介绍北京的经验外，要把这次事件的罪证选择一些影印附上，使全国千部更清楚天安门事件的性质”。在引号内这段文字下面，毛泽东画了横线，并写了一个批语，即本篇二。"}],"authors":["毛泽东"],"dates":[{"year":1976,"month":4}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":158,"page_end":158},"tags":[{"name":"毛泽东","type":"人物"},{"name":"毛远新","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"夺权","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ec3ab8ae59"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
