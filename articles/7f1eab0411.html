告”（概要）","authors":[],"dates":[{"year":1970,"month":4,"day":13}],"is_range_date":false,"parts":[{"text":"国务院批准财政部军管会“关于下放工商税收管理权的报告”（概要）","type":"title"},{"text":"报告指出：一、扩大地方减税、免税的批准权。国营企业、手工业生产合作社因生产、经营、价格发生较大变化和国营企业试制新产品，使整个企业发生亏损，按照国家规定纳税确有困难的，经省、自治区、直辖市革委会批准，可以给予定期的减税、免税照顾，不再报财政部审批。二、下放对农村人民公社征税的管理权。省、自治区、直辖市革委会可以在全国统一税法的基础上，确定工商统一税的征税范围，采取减税、免税措施，制定简便易行的收税办法。三、对投机倒把罚款和对个体经济加成征税的办法，由省、自治区、直辖市革委会结合具体情况掌握处理。四、下放城市房地产税、屠宰税、车船使用牌照税、牲畜交易税和集市交易税的管理权。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7f1eab0411"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
