script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"国内人民和世界人民的反对强烈冲击修正主义的统治苏修领导集团内部倾轧日趋尖锐化苏国家安全委员会突然发生反常的人事变动","authors":[],"dates":[{"year":1967,"month":5,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京29日电　莫斯科消息:苏修领导集团在国内实行法西斯专政的重要工具——苏联国家安全委员会，最近突然发生了人事变动。"},{"type":"paragraph","text":"据苏联《真理报》十九日报道:苏联最高苏维埃主席团发布命令，任命苏修中央书记尤·安德罗波夫为国家安全委员会主席，并同时解除弗·谢米恰斯内伊原任国家安全委员会主席的职务。"},{"type":"paragraph","text":"据各方面消息报道，安德罗波夫是赫鲁晓夫篡夺苏联党政大权后往上爬得很快的人物之一。从一九五七年起，他当上了苏共中央一个部的部长，一九六二年被提为苏共中央书记。几年来，他经常作为苏修头目勃列日涅夫等的重要随行人员出访，或以苏共代表团成员的身份参加一系列的国际阴谋活动。"},{"type":"paragraph","text":"被解除职务的谢米恰斯内伊是一九六一年继谢列平之后担任国家安全委员会主席职务的，在谢列平担任苏联共青团中央第一书记期间，他当过共青团中央书记处书记。现在，谢列乎是苏修中央政治局委员。"},{"type":"paragraph","text":"就在苏联国家安全委员会主席易人的同时，十九日的《红星报》刊登了一条讣告，宣布“国家安全委员会领导工作者鲁科申少将”在所谓“执行公务时惨遭不幸身死”。鲁科申自一九五四年起一直在苏联国家安全委员会担任负责军队安全的领导职务。《红星报》在刊登这一讣告的时候，没有同时刊登这位有将军衔的死者的照片，而且，发出讣告的只是“一群同志”，而没有具体署名，这是很反常的现象。"},{"type":"paragraph","text":"无独有偶的是，十九日是苏联少先队成立四十五周年纪念日，又赶上今年是十月革命五十周年，象这样的节日，苏修通常是要大庆一番的。人们注意到，在去年苏联少先队成立四十四周年的时候，苏修领导集团的重要头目柯西金、波德戈尔内、苏二十几辆满载军人的大卡车驶过红场，全天莫斯科市中心交通指挥混乱，下午有身着消防队制服的马队出现。"},{"type":"paragraph","text":"第二天(五月二十日)，苏军报纸《红星报》在头版社论地位刊登苏联元帅科涅夫写的题为“苏联人民的战斗光荣”的文章，大谈一九二一年苏共第十次代表大会期间镇压喀琅施塔得暴乱的经过。"},{"type":"paragraph","text":"苏修领导集团在国内外倒行逆施，遭到苏联人民和全世界革命人民的强烈反对，他们的日子越来越不好混了。苏修领导集团的统治极不稳定，内部矛盾重重，互相倾轧，争权夺利的斗争日益尖锐化和表面化。上述一系列异乎寻常的事情的发生，是耐人寻味的。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"26bb20de70"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
