ical-archives/banned-historical-archives0/main/maoquanji29.pdf"],"article":{"title":"中央对高岗关于与苏联军事人员建立良好关系的电报的批语和复电","alias":"","parts":[{"type":"paragraph","text":"中央对高岗\"关于与苏联军事人员建立良好关系的电报的批语和复电"},{"type":"paragraph","text":"（1951年1月4日）华北，华东，中南，西南，西北各中央局和军区党委，并告军委空司，海司，炮司，防司，坦司，军事学院，军训部："},{"type":"paragraph","text":"兹将高岗同志关于与苏联空军、炮兵、坦克人员建立良好关系对东北各省的指示电转发给你们，中央完全同意这一指示。你们各地凡有苏联军事人员之处均应采取此种态度。"},{"type":"paragraph","text":"中央"},{"type":"paragraph","text":"一月四日"},{"type":"paragraph","text":"[1]高岗，当时任中共中央东北局书记、中国人民解放军东北军区司令员兼政治委员。中央对高岗关于与苏联军事人员建立良好关系的电报的批语和复电"},{"type":"paragraph","text":"二高岗同志："},{"type":"paragraph","text":"你十二月廿九日致各省委及万毅“等同志关于与苏联军事人员建立良好关系的指示电，我们完全同意，望即照此实行。在关内各地亦应如此，中央已有指示，并将你的电报转告各地。"},{"type":"paragraph","text":"中央"},{"type":"paragraph","text":"一月四日"},{"type":"paragraph","text":"[1]万毅，当时任中国人民解放军炮兵第一副司令员兼东北军区炮兵司令员。"}],"authors":["毛泽东"],"dates":[{"year":1951,"month":1,"day":4}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":513,"page_end":514},"tags":[{"name":"毛泽东","type":"人物"},{"name":"高岗","type":"人物"},{"type":"文稿类型","name":"批示"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3a9061c527"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
