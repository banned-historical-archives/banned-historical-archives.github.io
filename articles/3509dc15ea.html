查账等专门业务干部补充困难","authors":[],"dates":[{"year":1952,"month":4,"day":19}],"is_range_date":false,"parts":[{"text":"东北区税务干部在三反中垮下去很多　查账等专门业务干部补充困难","type":"title"},{"text":"【东北总分社十九日讯】东北区税务局系统在“三反”运动中垮下去的税务干部占全体干部的百分之四十，其中有五分之三是直接税、地方税和外勤查账的骨干人员。垮下去的一般科、股长，可以适时地提拔其他干部来代替他们的职务，但顶替垮下去的直接税、地方税和外勤查账等人员者，需有专门知识和业务技术，因此尚未研究出有效的解决办法。抚顺市税务局即因业务人员缺少，外勤工作尚在停顿状态中。与上述情况类似的有哈尔滨、本溪等市。","type":"paragraph"}],"comments":[],"origin":"新华通讯社编《内部参考》1952年4月23日","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3509dc15ea"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
