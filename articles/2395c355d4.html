art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"广东纪念叶剑英诞辰100周年","authors":["杨霞〖HH/换行〗DW："],"parts":[{"type":"paragraph","text":"新华社广州4月28日电（记者杨霞）广东省各界今天举行座谈会，纪念叶剑英同志诞辰100周年，学习、缅怀叶剑英同志的光辉业绩和崇高风范。"},{"type":"paragraph","text":"叶剑英同志是久经考验的共产主义战士，伟大的无产阶级革命家、政治家、军事家，中国人民解放军的缔造者之一，长期担任党和国家重要领导职务的卓越领导人。在叶剑英同志诞辰100周年之际，广东省委、省政府、省军区和广州市委、市政府举行座谈会。"},{"type":"paragraph","text":"座谈会由广东省委副书记、省长卢瑞华主持，中共中央政治局委员、广东省委书记谢非，广州军区政委史玉孝上将在会上讲了话，广州市市长林树森、梅州市市长陈善如等先后在会上发言。"},{"type":"paragraph","text":"出席座谈会的还有广东省、广州市各民主党派负责人，以及叶剑英同志的亲属，叶剑英同志故乡梅州市、梅县的代表，曾在叶剑英同志身边工作过的同志，解放军指战员等共180多人。"}],"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"广东文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2395c355d4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
