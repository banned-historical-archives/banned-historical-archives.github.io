script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"福建粮食统购统销中干部有急躁情绪","authors":[],"dates":[{"year":1953,"month":12,"day":21}],"is_range_date":false,"parts":[{"text":"福建粮食统购统销中干部有急躁情绪","type":"title"},{"text":"【福建分社二十一日讯】福建省各县粮食统购统销工作已进入到乡，工作过程一般是：先贯彻总路线的宣传，再进行粮食统购统销的教育，同时摸清粮食情况，然后宣布任务，进行评议，组织送粮入仓等。这一运动现正在全省各地展开。目前发现的问题是干部在工作中有急躁情绪，表现在：","type":"paragraph"},{"text":"(一)有的工作队到乡后，没有很好宣传总路线就急于布置任务。闽侯专区闽清县溪头村，任务是七万多斤，但未经动员与协商，直接就把任务分配到户，具体规定这家二千斤，那家五千斤，宣布后群众不满，工作还得从头做起。闽侯专区福清县东施乡工作组只简单的向群众报告了一下粮食问题，就把工作布置下去，使运动走了弯路。据闽侯地委估计：这样的乡每个县都有十个左右。","type":"paragraph"},{"text":"(二)有些地方工作队干部下去后，把县里听到的一套照样拿到群众中去，看看群众还没有动，就急躁起来，个别的甚至强迫命令。龙岩县铁石乡开会干部宣传了粮食政策后要群众表示态度，“不表示就不散会”。","type":"paragraph"},{"text":"(三)集镇粮食统销工作中有些干部也有急躁情绪，对先宽后严掌握不够，想一下子都管起来。晋江专区仙游县枫亭镇等，一律规定每人每天十二两，因此有些群众恐惧不满。","type":"paragraph"},{"text":"此外，关于宣传总路线、实行粮食统购统销如何与冬季生产结合的问题。目前福建农村的情况是：龙岩、福安等专区秋收(晚稻与甘薯)尚未全部结束，全省扩大冬种的任务尚待完成，冬修水利、积肥、挖毁稻根等工作急需开展。据龙溪专区检查：因秋收后干部集中学习，乡中无人领导，群众顾虑多端，该专区海澄、南靖、漳浦等县已不可能达到扩大冬种的要求。建阳专区亦如此，有些地方因连日下雨发生烂冬现象。据福安专区周宁、宁德等县十二个乡统计，共烂了甘薯一千五百多担。现省委已发出指示，要各地注意这一问题。(龚人左据福建省委粮食办公室材料综编)","type":"paragraph"}],"comments":[],"origin":"1953年12月31日新华通讯社编《内部参考》。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ff8dda0ca2"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
