" crossorigin="">{"props":{"pageProps":{"books":[{"id":"9646ca98-820c-44ef-b8ca-c656fd59b7fd","name":"毛泽东思想万岁（1949.10-1957.12）","internal":false,"official":false,"type":"pdf","author":"","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives3/main/9646ca98-820c-44ef-b8ca-c656fd59b7fd.pdf"],"article":{"title":"关于一些问题的指示","alias":"","parts":[{"type":"paragraph","text":"问题，提出健康第-一，学习第二的方针。我为（中共华东局一月十一一日电报件付上，察，其中第三项此问题，）是正确的，请马付部长同志商酌处理为盼。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一九五一年十一月十五日附：中共华东局一月十一日电报"},{"type":"paragraph","text":"“健康第一，学习第二”"},{"type":"paragraph","text":"节录中共华东局一月十一日向中央报告关于学校工作的指示电文。·.▪（三）转入正常学习，又须防止过去加多程硬赶功课的偏向，此次参加军校学生之体格检查中，即可看出，由于国民党长期反动统治的结果，学生体质虚弱，惠病者很多。但解放以来，各地也未能很好注意“健康第一，学习第二”之原则，因此造成公立学校之体格最差，大学较中学又差的现象还严重存在，这点应引起十分警惕。应按华东局高教会的规定，适当减少正时间，照学生健康需要。·…·\""},{"type":"paragraph","text":"毛主席批语：这是正确的。"},{"type":"paragraph","text":"关于一些问题的指示"},{"type":"paragraph","text":"把劳动力组织在“变工队”、“扎工队”、“换工队”·等这一类的农村劳动互助组里，有组织地进行耕种、锄草收割，这比单独耕种省工，又能多打粮食。"},{"type":"paragraph","text":"（《人民日报》一九五一年一月三日）只有中国工业发展了，中国在经济上不依赖外国了，水能全部的具正的独立。"},{"type":"paragraph","text":"（《人民日报》一九五-一年七月）"},{"type":"paragraph","text":"没有农业社会化，就没有全部的巩固的社会主义，而欲农业社会化，必须发展以国有企业为主体的强大工业。人民民主专政的国家必须有步地解决这个国家工业化的问题。"},{"type":"paragraph","text":"（《人民日报》-一九五一年匕月二十六日）"},{"type":"paragraph","text":"假如没有苏联的存在，假如没有反法西斯的第二次世界大战的胜利，假如没有打倒日本帝国主义，假如没有各新民主国家的出现。·那么，堆在我们头上的国际反动势力必定比现在不知要大多少倍，在这种情况下，我们能狗胜利么？显然是不能的。"},{"type":"paragraph","text":"（《人民日报》一九五-一年十月四日）"},{"type":"paragraph","text":"同志们，我们现在要和许多旧社会出身的人合作了。我们要小心，要预防旧社会的坏习气鑽到中国共产党身上来。"},{"type":"paragraph","text":"（《人民日报》一九五一年十二月三十日）在中央人民政府元旦团拜会上的祝词"},{"type":"paragraph","text":"（一一九五二年一月一日）"},{"type":"paragraph","text":"祝我们全体-一人民政府工作人员，人民志愿军和人民解放军的指员、战斗员，各民主党派，各人民团体，各少数民族和金国人民，在各个工作战綫上的胜利！"},{"type":"paragraph","text":"祝我们在抗美援朝战綫上的胜利！祝我们在国防战上的胜利！祝我们在土地改革战上的胜利！祝我们在镇压反革命战上的胜利！祝我们在经济和财政战上的胜利！祝我们在文化和教育战上的胜利！祝我们在社会各界首先是知识分子·的思想改造战上的胜利！"},{"type":"paragraph","text":"我还要祝我们在新开辟的一条战上的胜利，这就是号召我国全体人民和一切工作人员-一致起来，大张旗鼓地，雷厉风行地，开展一个大规模的反对食污、反对浪费、反对官僚主义的斗争，将这些旧社会留下来的污毒洗干净！"},{"type":"paragraph","text":"同志们，我们在上述一切战上，在-一九五一年，都已取得了胜利，有许多是极其伟大的胜利。我们希望，经过我们的共同努力，所有这些工作，在一九五二年能够取得更大的胜利。"},{"type":"paragraph","text":"中华人民共和国万岁！"},{"type":"paragraph","text":"（《人民日报》一九五二年一月三日）对五反运动的指示"},{"type":"paragraph","text":"（一九五二年三月）"},{"type":"paragraph","text":"过去从宽，今后从严；多数从宽，少数从严；坦白从宽，抗拒从严；工业从宽，商业从严；普通商业从宽，投机商业从严。"},{"type":"paragraph","text":"（《人民日报》一九五二年三月十二日）"}],"authors":["毛泽东"],"dates":[{"year":1951,"month":1,"day":3}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":28,"page_end":29},"tags":[{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2640123569"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
