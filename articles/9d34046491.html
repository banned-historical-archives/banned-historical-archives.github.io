:1954,"month":10,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京二十五日电】　中华人民共和国毛泽东主席二十五日下午在北京中南海勤政殿接见西藏地方政府噶伦索康·旺清格来。同时被接见的，还有西藏地方政府代理机巧堪布洛桑三旦，西藏参观团团长然巴.襄吉旺堆、副团长何巴敦、拉加利·朗吉嘉措、欧协·土登桑却、森德班官，红教活佛墨竹林，花教活佛萨迦东色，班禅堪布会议厅代理却本堪布洛桑图丹等人。"},{"type":"paragraph","text":"接见时，索康·旺清格来等十人分别向毛泽东主席献哈达致敬。"},{"type":"paragraph","text":"接见时在座的，有国务院总理周恩来，副总理邓小平、乌兰夫，秘书长习仲动，全国人民代表大会常务委员会副委员长李维汉，中央人民政府驻西藏代表张经武"},{"type":"paragraph","text":"接见时，毛主席同索康·旺清格来等人作了亲切的谈话。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9d34046491"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
