东北财经学院","姜纯洪","李宝印","李忠良","艾义","郭荣环"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"攻击马列主义的右派言论","type":"title"},{"text":"东北财经学院姜纯洪李忠良郭荣环李宝印艾义","type":"authors"},{"text":"“马克思学说是抄袭黑格尔、费尔巴哈，圣西门的理论，为什么不说马克思是发展了他们的学说呢？所以我学习马列主义基础和政治经济学是批判的接受。”“你们象马列主义的传声筒一样，到处叫喊马列主义好，先生教你们马列主义好啊！共产党告诉你们马列主义好！你们就说马列主义好！你们太幼稚啦，别人说好，你们也说好，咱们成天学习马列主义，象党校一样，在大会上，大家象鸡、象鸣、象狗……一样，在乱喊乱叫有什么用！？”(姜纯洪)","type":"paragraph"},{"text":"“反正谁胜谁有理。什么社会发展规律呵”(李忠良)","type":"paragraph"},{"text":"“马列主义你信也得信，不信也得信！”(郭荣环)","type":"paragraph"},{"text":"“马列主义基础和中国革命史合在一起，学一年就满够用，因为我们不是马列主义学院。”(李宝印)","type":"paragraph"},{"text":"“谁不赞成革命史考试的报名，我们去请愿。”(艾义)","type":"paragraph"},{"text":" 来源：《我院学生中的右派言论汇编》（中共东北财经学院委员会编，1957）","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5abeed5226"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
