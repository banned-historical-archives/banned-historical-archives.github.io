al-archives/banned-historical-archives8/main/maoquanji2.pdf"],"article":{"title":"粤汉铁路工人致朱先生","alias":"","parts":[{"type":"paragraph","text":"粤汉铁路工人致朱先生"},{"type":"paragraph","text":"（1922年9月10日）朱先生伟鉴："},{"type":"paragraph","text":"工等此次罢工，出于万不得已，全因痛苦太深。劣员肆虐，待遇不良，详情工等向路王局长及洋总管所提出各条件。半月以来，甘心忍痛，无如王局长有意迁延，张苗未去，所请不允全路愤激，迫而出此。先生有意维持，易胜感谢！惟路向重，有系统管理，负责任者，自有当局。幸先生迅向徐家棚王局长及洋总管交涉，朝允八条，夕即开车，决不违命。再工等颇有团体组织，此次罢工系由全路俱乐部联合会，负完全交涉责任。特并奉闻。即颂勋祺！诸维灵照不尽！"}],"authors":["毛泽东"],"dates":[{"year":1922,"month":9,"day":10}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":494,"page_end":494},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9328d6a7b9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
