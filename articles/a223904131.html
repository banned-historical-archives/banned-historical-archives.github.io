],"dates":[{"year":1967,"month":3,"day":3}],"is_range_date":false,"parts":[{"text":"王力对新华社的指示","type":"title"},{"text":"王力","type":"authors"},{"text":"一、宣传正确对待干部问题，不要只是注意团结，忽视斗争，在斗争中求团结。没有亮相的，有错误的，没有检查的求团结没有好处。","type":"paragraph"},{"text":"二、凡是闹小团体的，不管经验多么好，不组织他们写文章。","type":"paragraph"},{"text":"三、加强\"抓革命、促生产\"的报导，要把夺权后生产建设方面的成就充分反映出来，要写工人的劳动热情，思想革命化和干劲，也要写崭新的生产面貌，注意第一季度完成计划的单位，要进行报导，春耕生产的报导要压倒一切，要抓好。","type":"paragraph"},{"text":"四、夺权地区要充分报导，不一定要求那么好，看出是个经验就可报导，不要那么严格。没有夺权的地区，一般不报导。","type":"paragraph"},{"text":"五、\"三结合\"的经验，要报导得更充分，更细致些，特别是团结大多数的经验。","type":"paragraph"},{"text":"六、在报导中不提建立新政权，只提临时权力机构；不提巩固新政权，也不要提全面大夺权。","type":"paragraph"},{"text":"七、各地新华社和《人民日报》派出的记者，不介入革命组织的辩论，不能支持一方打击一方，这样作的立即撤回。","type":"paragraph"},{"text":"八、革命组织内部整风，不作全面报导，开门整风不报导。","type":"paragraph"}],"comments":[],"origin":"1967年4月北京玻璃总厂红卫兵联络站编《中央首长讲话（3）》","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"王力","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]},{"id":"chuanxinlu2","name":"十年文革中首长讲话传信录（中册）","internal":false,"type":"pdf","official":false,"author":"周良霄,顾菊英","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/十年文革中首长讲话传信录2.pdf"],"article":{"title":"王力对新华社的指示","parts":[{"type":"title","text":"573.王力对新华社的指示"},{"type":"paragraph","text":"(1967年3月3日)"},{"type":"paragraph","text":"一、宣传正确对待干部问题，不要只是注意团结，忽视斗争，在斗争中求团结。没有亮相的，有错误的，没有检查的求团结没有好处。"},{"type":"paragraph","text":"二、凡是闹小团体的，不管经验多么好，不组织他们写文章。"},{"type":"paragraph","text":"三、加强“抓革命、促生产”的报导，要把夺权后生产建议方面的成就充分反映出来，要写工人的劳动热情，思想革命化和干劲，也要写崭新的生产面貌，注意第一季度完成计划的单位，要进行报导，春耕生产的报导要压倒一切，要抓好。"},{"type":"paragraph","text":"四、夺权地区要充分报导，不一定要那么好，看出是个经验就可报导，不要那么严格。没有夺权的地区，一般不报导。"},{"type":"paragraph","text":"五、“三结合”的经验，要报导得更充分，更细致些，特别是团结大多数的经验。"},{"type":"paragraph","text":"六、在报导中不提建立新政权，只提临时权力机构；不提巩固新政权，也不要提全面大夺权。"},{"type":"paragraph","text":"七、各地新华社和《人民日报》派出的记者，不介入革命组织的辩论，不能支持一方打击一方，这样作的立即撤回。"},{"type":"paragraph","text":"八、革命组织内部整风，不作全面报导，开门整风不报导。"}],"authors":["王力"],"dates":[{"year":1967,"month":3,"day":3}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":350,"page_end":351,"alias":""},"tags":[{"name":"王力","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a223904131"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
