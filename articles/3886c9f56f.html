ical-archives/banned-historical-archives0/main/maoquanji30.pdf"],"article":{"title":"转发上海市委关于严防在控诉会上扩大打击面的通报的批语","alias":"","parts":[{"type":"paragraph","text":"转发上海市委关于严防在控诉会上"},{"type":"paragraph","text":"扩大打击面的通报的批语"},{"type":"paragraph","text":"（1951年5月23日）中南、华南、西南、西北、华北、东北各中央局："},{"type":"paragraph","text":"上海市委关于严防在控诉会上扩大打击面的意见\"是正确的，请你们加以注意。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"五月二十三日"},{"type":"paragraph","text":"[1]中共上海市委1951年5月19日关于严防在控诉会上扩大打击面的通报中规定的几条意见是：（一）控诉会的控诉对象一律确定为被捕罪犯（并以罪大恶极的为主）。（二）控诉会不能变成斗争会，不能把打击面扩大到落后分子以及有关生活作风、思想观点方面。（三）控诉会不能在一个基层单位连续不断地召开。一般好好准备召开一次即可。如无具体控诉对象可不召开，以座谈讨论已破获的反革命案件等方法，提高群众的政治认识。"}],"authors":["毛泽东"],"dates":[{"year":1951,"month":5,"day":23}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":325,"page_end":325},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3886c9f56f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
