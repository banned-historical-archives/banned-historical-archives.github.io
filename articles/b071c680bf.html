:[],"dates":[{"year":1967,"month":2,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　上海人民将于今天下午隆重地在人民广场举行盛大集会，热烈庆祝上海人民公社成立。"},{"type":"paragraph","text":"上海人民公社是在我们最最敬爱的伟大领袖毛主席的亲切关怀和大力支持下诞生的，是在无声阶级文化大革命的烈火中诞生的。她的诞生，庄严地宣判了旧上海市委的死刑。从此，旧上海市委的一切权力全归上海人民公社。这是伟大的毛泽东思想又一巨大胜利!是毛主席革命路线的伟大胜利!是我国无产阶级文化大革命的又一极其重大的胜利!上海革命的工人、贫下中农、人民解放军指战员、学生、机关干部和知识分子热烈庆祝她的诞生，从心底里欢呼:‘上海人民公社万岁!’‘毛主席万岁!万万岁!’"},{"type":"paragraph","text":"毛主席教导我们:‘世界上一切革命斗争都是为着夺取政权，巩固政权。”上海无产阶级革命造反派在打倒旧上海市委一小撮走资本主义道路当权派的斗争中，粉碎了旧上海市委资产阶级反动路线的新反扑，实现了大联合，从旧上海市委走资本主义道路当权派的魔掌中夺回了党权、政权、财权和文权，取得了辉煌的胜利。上海人民公社在东方地平线上出现，是上海地区一月革命的胜利成果，也是一无产阶级革命派大联合、大团结、大夺权的胜利成果。"},{"type":"paragraph","text":"今天，上海人民将以万分振奋的心情，热烈隆重地庆祝上海人民公社的诞生，欢庆这个具有深远历史意义的伟大节日。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"一月革命","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b071c680bf"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
