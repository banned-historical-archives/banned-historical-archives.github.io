命路线指引下，发扬人定胜天的革命精神抗震救灾","authors":["新华社"],"dates":[{"year":1976,"month":7,"day":29}],"is_range_date":false,"parts":[{"text":"河北省唐山、丰南一带发生强烈地震灾区人民在毛主席革命路线指引下发扬人定胜天的革命精神抗震救灾","type":"title"},{"text":"新华社","type":"authors"},{"text":"新华社一九七六年七月二十八日讯我国河北省冀东地区的唐山—丰南一带，七月二十八日三时四十二分发生强烈地震。天津、北京市也有较强震感。据我国地震台网测定，这次地震为七点五级，震中在北纬三十九点四度，东经一百一十八点一度。震中地区遭到不同程度的损失。","type":"paragraph"},{"text":"伟大领袖毛主席和党中央、国务院对地震灾区人民群众十分关怀。地震发生后，中共河北省委，天津、北京市委和震区各级党组织，已经采取紧急措施，领导群众迅即投入防震抗灾斗争。中共河北省委领导同志已带领有关部门负责人，赶到灾区指挥防震救灾工作。中国人民解放军和有关省、市卫生系统，已组织大批医疗队赶赴现场。大量医药、食品、衣物、建筑材料等救灾物资正源源运往灾区。国家地震局和河北省地震局已组织专业人员赶赴现场，监视震情。受灾地区人民群众已在当地党组织领导下，迅速组织起来，团结一致，展开抗灾斗争。他们决心在毛主席的革命路线指引下，在批邓、反击右倾翻案风斗争取得伟大胜利的大好形势下，发扬人定胜天的大无畏革命精神，团结起来，奋发图强，夺取这场抗灾斗争的胜利。","type":"paragraph"},{"text":" （载《人民日报》一九七六年七月二十九日）","type":"paragraph"}],"comments":[],"origin":"载《人民日报》一九七六年七月二十九日","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"河北文革","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"天津文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d004ef51d2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
