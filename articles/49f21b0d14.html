script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"河南省博爱县右派因右改正人员花名册（一）","authors":["中共博爱县委摘帽办"],"dates":[{"year":1980,"month":4}],"is_range_date":false,"parts":[{"text":"河南省博爱县右派因右改正人员花名册（一）","type":"title"},{"text":"中共博爱县委摘帽办","type":"authors"},{"text":"右派因右改正、安排人员花名册","type":"paragraph"},{"text":"【总】目录","type":"subtitle"},{"text":"【二】1页-- 9页，在职人员。","type":"subtitle"},{"text":"【三】10页--17页，62年平反人员。","type":"subtitle"},{"text":"【四】18页--30页，79年、80年安排人员。","type":"subtitle"},{"text":"【五】31页--36页，死亡右派。","type":"subtitle"},{"text":"【六】37页--犯有新错误不安排。","type":"subtitle"},{"text":"【七】38页--44页，转入右派。","type":"subtitle"},{"text":"【八】45页--48页，反社会主义分子改正安排人员。","type":"subtitle"},{"text":"【九】49页--58页，中右人员。","type":"subtitle"},{"text":"【十】59页-- 60页，受株连家属安排。","type":"subtitle"},{"text":"博爱县右派改正、安置情况及因右问题改正、安置情况说明","type":"paragraph"},{"text":"80年4月","type":"subtitle"},{"text":"第一、 右派实安145人；我县实划右派353人","type":"subtitle"},{"text":"1. 在职右派88人。（其中调出7人）在职不改1人（王子文）。","type":"paragraph"},{"text":"2. 转出右派17人。（已在外地安置）","type":"paragraph"},{"text":"3. 六二年平反89人，（其中死亡12人，还有6人当时未安；有70人在职，另一人陈思明未安。","type":"paragraph"},{"text":"4. 这次安排114人，（包括六二年平反6人）另安集体1人（李炳才）","type":"paragraph"},{"text":"5. 死亡右派59人，（六二年平反的死亡12人均改）。","type":"paragraph"},{"text":"6. 不安的6人。毕启邦  刘成新  王德富  周福其  刘孝先（赵绍裕）。","type":"paragraph"},{"text":"第二、因右实安","type":"subtitle"},{"text":"1.\t143人  转入右派","type":"paragraph"},{"text":"2.\t69人  回原单位20人，（李思义郑州转来找不到下落）。","type":"paragraph"},{"text":"3.\t我县安置31人，（包括安后转走的魏允文）。","type":"paragraph"},{"text":"4.\t转入在职11人。","type":"paragraph"},{"text":"5.\t转入死亡7人。 因右实安111人  反社会主义分子49人  死亡反社会主义分子7人，（李培富  刘好礼  韩兰云  谢衡山  毕树臣  张海中  常清湖）。","type":"paragraph"},{"text":"6.\t外安反社会主义分子6人，（李云正  郭志忠  苗贞义  吕大益  刘质斌  张代）。","type":"paragraph"},{"text":"7.\t在职反社会主义分子1人，（李英平）。张海忠62年平，这次未下通知","type":"paragraph"},{"text":"8.\t实安反社会主义分子35人，（乡干14人，）；（包括转入刘树民  李元奎  肖文海）。","type":"paragraph"},{"text":"9.\t中右109人  在职中右34人。","type":"paragraph"},{"text":"10. 死亡中右6人，（申治安  张瑞光  贺尚玉  王井山  冯思光  路保善）。","type":"paragraph"},{"text":"11. 转外地的6人，（冯举利  雷改菊  张永亮  马玉德  吕振超  毋传良）。","type":"paragraph"},{"text":"12. 实安的56人，（其中乡干22人）；（转入的张连溪  张秀珍  郜希学  王其建  张增杰）   第三、家属株连20人  安置株连家属19人，（司月兰 扬玉珠 苗玉连 王桂英 高淑贞 鲁树梅 吴桂兰 魏荣艾 高永瑞 于秋花 张金秀 李焕珠 周香来 张桂兰 张风明 张桂花 周颜霞）  皇尚强 郭梅。转入家属1人，（毕兰平）。","type":"paragraph"},{"text":"第四、说 明","type":"subtitle"},{"text":"一、中右问题109人，加62年平反过的中右220人，共329人。","type":"paragraph"},{"text":"二、共转城镇户口106户，307人。（其中外地转入11户39人，死亡18户55人；我县转外地10户39人，其中3户13人未落下：刘质斌  王好战  林季如）。","type":"paragraph"},{"text":"三、因右问题中集体的30人，（其中办退休的4人）。","type":"paragraph"}],"comments":[],"origin":"根据文件翻印件打印。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"河南文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"49f21b0d14"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
