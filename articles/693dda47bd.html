rs":["易家鎏","王立我","王韶唐","程渡","蒯执中","西北农学院","郭士英","阎九如","陶仲侃"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"关于官僚主义宗派主义主观主义的根源","type":"title"},{"text":"西北农学院蒯执中郭士英阎九如程渡易家鎏王韶唐王立我陶仲侃","type":"authors"},{"text":"1．“官僚主义和社会主义制度有关，从中央到地方是一系列的大官僚，中官僚，小官僚。”(教学设备科　蒯执中)","type":"paragraph"},{"text":"2．“宗派主义及官僚主义产生的根源……是由于‘党天下’的关系。党员是官僚主义的策源地。”“储安平发言内容有很多可取的地方，党独裁一定是三害的根源。”(植保系讲师　郭士英)","type":"paragraph"},{"text":"4．“党员和积极分子搞宗派，领导上也有宗派主义，应让党来拆墙填沟。”(财务科　阎九如)","type":"paragraph"},{"text":"5．“反三害要以宗派主义为主，因为官僚主义、主观主义是从宗派主义产生出来的。”“要反对宗派主义，必须改变党员的人生观，否则，很难反掉它。”(农学系副教授　李正德)","type":"paragraph"},{"text":"6．“宗派主义是官僚主义的温床，宗派主义给官僚主义作了外围。”(农化系助教　程渡)","type":"paragraph"},{"text":"7．“我看我们学校官名太多，官风严重。”(化学系助教  易家鎏)","type":"paragraph"},{"text":"8．“从字面上看来，党是宗派主义在搞阶级。”(化学系副教授　王韶唐)","type":"paragraph"},{"text":"9．“我同意我院宗派主义很严重，党员工资一加就几级，我想宗派主义是最厉害的，它比官僚主义更厉害。”(农经系教授  王立我)","type":"paragraph"},{"text":"10．“人民内部矛盾产生的根源是官僚主义、宗派主义、和教条主义。”(有机化学教授  陶仲侃)","type":"paragraph"},{"text":" 来源：《西北农学院右派言论及错误言论汇集》(西北农学院马列主义教研组编印，1957年12月)。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"人民内部矛盾","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"693dda47bd"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
