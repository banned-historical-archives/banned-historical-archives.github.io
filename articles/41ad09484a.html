美帝的唯一“交道”就是打败它","authors":[],"dates":[{"year":1966,"month":2,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社北京18日电　纽约消息:美国进步劳工党主席密尔顿·罗森在二月十五日一期《挑战》周报上发表一篇文章指出，尽管有赫鲁晓夫修正主义者充当掮客，美帝国主义的“和平”攻势还是遭到了可耻的破产。"},{"type":"paragraph","text":"文章写道，“骗人的‘和平攻势’已告结束。约翰逊集团妄图用讹诈手段迫使越南人民放弃争取自由的斗争，这种尝试已经失败。"},{"type":"paragraph","text":"“约翰逊力图向全世界表明，美国是在‘真诚地为和平而努力’，这一可怜的尝试就象一个铅制的汽球那样上不了天。”"},{"type":"paragraph","text":"“约翰逊要欺骗美国人民的阴谋失败了。现在，更多的人士投入了要求美国立即滚出越南的活动!”"},{"type":"paragraph","text":"“越南人民在虚假的‘和平宣传’面前所表现出来的坚定性、革命的勇气和团结，给全世界树立了一个良好的榜样。”"},{"type":"paragraph","text":"文章接着写道，“在约翰逊玩弄骗局期间，(美国)报纸上一片痴心妄想，以为苏联通过这种或那种办法终将会把越南人民诱骗来同约翰逊集团举行谈判。苏联表示‘支持’越南立场的声明不管多么剑拔弩张，美国报纸却始终了解这些声明的实质:(它们不过是)替苏联充当美帝国主义掮客这个基本作用打掩护的花招。”"},{"type":"paragraph","text":"文章指出，美国恢复对越南北方的轰炸“只是突出表明了约翰逊集团的欺骗。它再一次表明，他们正不惜一切代价地妄图赖在越南。要同这一伙大规模杀人的匪帮‘打交道’的任何尝试都使人想起同希特勒‘打交道’的尝试”。它说，在这些困难的日子里，人民懂得了这一点:“你不能同一个渴望统治全世界的凶残的统治阶级打交道。唯一的‘交道’就是打败它”。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"41ad09484a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
