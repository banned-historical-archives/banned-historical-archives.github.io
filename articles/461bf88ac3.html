ical-archives/banned-historical-archives8/main/maoquanji24.pdf"],"article":{"title":"致邓小平电","alias":"","parts":[{"type":"paragraph","text":"致邓小平电"},{"type":"paragraph","text":"（1948年2月17日）小平同志："},{"type":"paragraph","text":"齐佳两电悉。（一）意见很好，已转各区仿办。"},{"type":"paragraph","text":"（二）第一阶段缩小打击面，应将富农、小地主中的保甲长、恶霸、反动分子为农民所痛恨者包括在打击范围之内，否则不能充分动员群众，这与暂时对富农、小地主中的多数不去惊动，以待群众充分发动之后再去打击之策略并不矛盾。"},{"type":"paragraph","text":"（三）无论何地仍以先组贫农团，几个月后再组农民协会为有利。"},{"type":"paragraph","text":"毛泽东丑"}],"authors":["毛泽东"],"dates":[{"year":1948,"month":2,"day":17}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":89,"page_end":89},"tags":[{"name":"邓小平","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"461bf88ac3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
