nned-historical-archives/banned-historical-archives9/main/books/十年文革中首长讲话传信录1.pdf"],"article":{"title":"周恩来在中南海接见中央戏剧学院、北京电影学院、中央音乐学院、中央乐团四单位代表时的谈话记录","parts":[{"type":"title","text":"319.周恩来在中南海接见中央戏剧学院、北京电影学院、"},{"type":"paragraph","text":"中央音乐学院、中央乐团四单位代表时的谈话记录"},{"type":"paragraph","text":"(1966年12月4日)"},{"type":"paragraph","text":"你们走后我们召开了中央会议，我们完全支持你们的革命行动。首先鼓励你们。我们很理解你们的这种义愤心情，现在确实象上午同志们分析的，存在反扑，要给予反击，反扑不止一次，要有多次反攻，机关里有，学校里就更多了。有斗争的反复可以锻炼我们，尤其在北京，林彪同志负责这个地方，他们就更不甘心了。"},{"type":"paragraph","text":"我们每个行为都要估计，再三估计到后果，但是革命不是请客吃饭，你们的行动是革命的，也是很成功的，第一反五分钟就解决问题了，干得漂亮，你们把警备区卫戍司令部都给瞒过了。干得漂亮。"},{"type":"paragraph","text":"你们的行动是好的，但也不可能没有缺点，你们如何配合中央，请大家考虑。"},{"type":"paragraph","text":"“三极”宣传想得很理想，做出来很不好办。长安街的人那么多，你们怎么走得动，很不好办，如果出点事情很麻烦，所以要我来说服你们......这样搞不安全、斗争的效果也不太适合，......方才开会时，我们都不同意你们这样做法。游行示众，我们感觉没有把握......开大会这个办法好，可以出出你们的气，当然不仅是你们的气啰，而是公气。"}],"authors":["周恩来"],"dates":[{"year":1966,"month":12,"day":4}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":589,"page_end":589,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3260475d73"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
