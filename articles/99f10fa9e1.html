rt":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"谈谈社会主义民主与资产阶级民主的区别","authors":["滕文生贾春峰"],"parts":[{"type":"paragraph","text":"人们看到这样一个题目，也许会说，这不是马克思主义的基本常识吗？是的，这的确是马克思主义早已阐明了的问题，而且为不少人所熟知。但是，我们今天重新提出和研究这个问题，却并非多余。这不仅是因为我们对于民主问题国对于其它基本理论问题一样，需要随着实践的发展和它提供的新经验，不断地加深认识和进一步阐明，还因为十年“文化大革命”中，我国的社会主义民主在实践上和理论上都遭到严重的破坏，给人们的思想带来了极大的混乱，而这种思想上的混乱，至今并未完全澄清。在这种情况下，把社会主义民主与资产阶级民主加以比较，弄清两者的区别，划清它们的界限，对于我们正确有效地发展社会主义民主，推进国家的民主改革，是有重要现实意义的。"},{"type":"paragraph","text":"那么，社会主义民主与资产阶级民主的区别在哪里呢？"},{"type":"paragraph","text":"社会主义民主与资产阶级民主，它们所赖以建立的经济基础是根本不同的。"},{"type":"paragraph","text":"从民主的性质、范围来说，社会主义民主与资产阶级民主也是不同的。"},{"type":"paragraph","text":"从民主的内容来说，社会主义民主是真正的、实在的民主，资产阶级民主则是残缺的、虚伪的民主。"},{"type":"paragraph","text":"从民主的形式来说，社会主义民主与资产阶级民主也有区别。"},{"type":"paragraph","text":"在社会发展的进程中，社会主义民主代替资产阶级民主是不可逆转的历史必然。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"99f10fa9e1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
