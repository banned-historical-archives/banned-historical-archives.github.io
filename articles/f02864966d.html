取消阶级斗争和支持和平主义的谬论","authors":[],"dates":[{"year":1963,"month":3,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"印度尼西亚文协首次代表大会开幕"},{"type":"paragraph","text":"指出美帝国主义是革命文化的头号敌人"},{"type":"paragraph","text":"驳斥修正主义取消阶级斗争和支持和平主义的谬论"},{"type":"paragraph","text":"新华社雅加达二十七日电  据棉兰报纸报道，印度尼西亚文学协会第一次代表大会二十二日在棉兰开幕。协会主席巴克里·西勒加尔在向大会所作的报告中说，在文化上，美帝国主义是印度尼西亚革命最危险的头号敌人，因为美国的帝国主义文化正在设法渗入印度尼西亚的文化教育界。"},{"type":"paragraph","text":"西勒加尔还驳斥了鼓吹“为人与人之间更富有人情味的关系而努力”的修正主义者的谬论。他指出，这种口号的根源是个人主义。修正主义的口号取消了阶级斗争，支持和平主义，这是同反对帝国主义的斗争背道而驰的。    他指出，印度尼西亚的文学家应当分清敌友。他号召，贯彻政治挂帅，深入下层的文学创作原则。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f02864966d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
