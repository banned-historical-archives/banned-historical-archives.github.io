963,"month":5,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"无政府主义是否定一切国家政权和政治斗争的小资产阶级反动思想，十九世纪流传于欧洲。代表人物有德国施蒂纳、法国蒲鲁东、俄国巴枯宁和克鲁泡特金等。他们从个人主义的观点出发，反对任何限制“个人自由”的权力，主张立即废除一切国家政权，并且要工人阶级放弃政治斗争。这种思想的实质，是在否定国家的幌子下，反对无产阶级革命和无产阶级专政，使无产阶级屈服于资产阶级的统治。"},{"type":"paragraph","text":"蒲鲁东主义是工人运动中小资产阶级社会主义思潮，是一种无政府主义。蒲鲁东是十九世纪法国小资产阶级社会学家和经济学家，无政府主义创始人之一。蒲鲁东主义从小资产阶级的立场来批评资本主义，认为摆脱资本主义的办法，不是无产阶级革命，而是反对大私有制，保护小私有制，想通过和平的经济改良的方法，消除资本主义“坏的”方面，建设“好的”资本主义。蒲鲁东主义敌视一切国家、组织和权威，反对组织工会和罢工斗争，反对暴力革命和无产阶级专政，主张建立无政府的社会。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"925ad27200"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
