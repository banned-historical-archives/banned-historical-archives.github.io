民大学","伍伯涵","凌国星","岳文伯","徐盛桐","殷九如","毕毓琦","王德周"],"dates":[{"year":1957,"month":5}],"is_range_date":false,"parts":[{"text":"攻击党的有关政策","type":"title"},{"text":"中国人民大学王德周徐盛桐殷九如岳文伯伍伯涵毕毓琦凌国星","type":"authors"},{"text":"“经济方面，买白薯一角钱三四斤，买白薯秧喂牛七分钱一斤，在资本论里找不到。买红果酱西单六角，地安门五角八分，太平桥九角。贸易部干什么的，官僚主义！","type":"paragraph"},{"text":"回国去的日侨对中国红十字会说，中国人让我们回国时，把钱都买了东西，但回国时到海关，让上税，没钱就动员卖给百货公司，百货公司收买价格150元，而却以600元订价出售。类似这些事情，如果是把钱作了国防事情是可以的，官僚们花了就不对”。（中国人民大学工业经济系讲师王德周）","type":"paragraph"},{"text":"“我国是一个无神论的国家是不能以尽是共产党人从事外交的，宋庆龄访问西南亚是一个好的开端但没有继续下去。”（中国人民大学历史系学生  徐盛桐）","type":"paragraph"},{"text":"“中华人民共和国外交政策，可以对苏联更平等一些，以苏联为首，我们是老二。有些地方如：马列主义中国化，这是中国独创，应当为老大。”（中国人民大学档案系  殷九如）","type":"paragraph"},{"text":"“我们对美国的政策宣传得过激了些，据说打过长江时，美国要和我们建交，而我们丧失了这机会，这是错误的。”","type":"paragraph"},{"text":"“美国好的要宣传，要宣传它的科学成就，要想尽办法与美国建立邦交，（在不损害我国主权情况下）要尽量争取参加联合国。对美国问题，狭隘的民族自尊心也是痛心的。”","type":"paragraph"},{"text":"“对其他资本主义国家也没有必要有意的对立，尽量和资本主义国家建立关系。”（中国人民大学新闻系学生  岳文伯）","type":"paragraph"},{"text":"“……听说南京解放时，美国大使迟迟不走，希望与中国建立外交关系，拉中国一把，后来因为我们的政策太消极，所以没成。中央在这件事上犯了错误……1949年我们不该放过了和美国建立外交关系的机会，这对人家采取了一棍子打死的态度。并不去慎重的考虑，既然美国当时想利用我们，我们为什么不能利用它们呢？……要不然我们早就加入联合国了，我觉得埃及做的很聪明，他们加入联合国前不敢承认中国加入联大后就承认了我们，所以这是个策略问题。”（中国人民大学新闻系学生  伍伯涵）","type":"paragraph"},{"text":"他攻击党的对日外交政策说：“释放日本战犯没有想到群众痛恨，以民族鲜血换取国际关系。”（中国人民大学档案系学生毕毓琦的材料）","type":"paragraph"},{"text":"“我国对埃及开始大喊大叫结果只给点经济援助，失信用，对尼泊尔不应援助，无战略价值，对柬埔寨援助得不偿失。”（中国人民大学新闻系学生  凌国星）","type":"paragraph"},{"text":" 来源：《高等学校右派言论选编》（中共中国人民大学委员会，1958年8月）。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"62a160d8ee"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
