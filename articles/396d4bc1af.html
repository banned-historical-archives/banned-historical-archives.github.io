al-archives/banned-historical-archives8/main/maoquanji8.pdf"],"article":{"title":"致洛甫电","alias":"","parts":[{"type":"paragraph","text":"致洛甫电!"},{"type":"paragraph","text":"（1936年4月28日）"},{"type":"paragraph","text":"东面情况已根本地发生变化，丧失了继续作战的可能，为稳固计决定西渡。"},{"type":"paragraph","text":"提议开政治局会，讨论新的行动方向及其他与此相关的问题，地点拟在延长。"},{"type":"paragraph","text":"新的行动方向有二方案：一、方面军全部先到神府、东胜区域一时期，尔后向西边陕甘宁区域。二、方面军全部即向陕甘宁区域（包括黄河以南大道以北），而以二十八军、三十军去神府区域。此两方案请你及政治局各同志考虑，我们亦正在考虑。"}],"authors":["毛泽东"],"dates":[{"year":1936,"month":4,"day":28}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":400,"page_end":400},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"396d4bc1af"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
