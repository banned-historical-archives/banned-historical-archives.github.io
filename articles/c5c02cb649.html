rt":5,"page_end":5,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"热烈欢呼“九大”隆重开幕（对口词）","authors":["六○○三部队毛泽东思想文艺宣传队〖HH/换行〗DW：六○○三部队"],"parts":[{"type":"paragraph","text":"四海在欢呼，"},{"type":"paragraph","text":"群山在歌唱，"},{"type":"paragraph","text":"党的第九次全国代表大会隆重开幕了！"},{"type":"paragraph","text":"这是一个朝气蓬勃的大会，"},{"type":"paragraph","text":"是一个团结的大会，胜利的大会。"},{"type":"paragraph","text":"特大喜讯飞过千山万水，"},{"type":"paragraph","text":"传遍五湖四海！"},{"type":"paragraph","text":"革命人民同声欢呼："},{"type":"paragraph","text":"伟大的、光荣的、正确的中国共产党万岁！"},{"type":"paragraph","text":"伟大的领袖毛主席万岁！万岁！万万岁！"},{"type":"paragraph","text":"伟大的、光荣的、正确的中国共产党，"},{"type":"paragraph","text":"肩负着亿万革命人民的希望。"},{"type":"paragraph","text":"伟大的、光荣的、正确的中国共产党，"},{"type":"paragraph","text":"用毛泽东思想来武装，"},{"type":"paragraph","text":"毛主席亲手缔造和领导，"},{"type":"paragraph","text":"毛主席的革命路线指明前进的方向。"},{"type":"paragraph","text":"毛主席，"},{"type":"paragraph","text":"是当代的列宁。"},{"type":"paragraph","text":"毛泽东思想，"},{"type":"paragraph","text":"是革命人民的灵魂。"},{"type":"paragraph","text":"以毛主席为领袖的中国共产党，"},{"type":"paragraph","text":"是领导我们事业的核心力量，"},{"type":"paragraph","text":"是中国人民的中流砥柱，"},{"type":"paragraph","text":"是我国革命和建设取得胜利的根本保证！"},{"type":"paragraph","text":"以毛主席为领袖的中国共产党，"},{"type":"paragraph","text":"在革命的烈火中百炼成钢。"},{"type":"paragraph","text":"井冈山的红缨飞舞，"},{"type":"paragraph","text":"遵义城的霞光万丈，"},{"type":"paragraph","text":"延安窑洞的灯火辉煌，"},{"type":"paragraph","text":"天安门前的凯歌嘹亮。"},{"type":"paragraph","text":"从中国共产党的诞生，"},{"type":"paragraph","text":"到“九大”隆重开幕；"},{"type":"paragraph","text":"从秋收起义第一声枪响，"},{"type":"paragraph","text":"到文化大革命红旗飘扬；"},{"type":"paragraph","text":"我们取得的每一个辉煌成就，"},{"type":"paragraph","text":"都是毛主席革命路线的伟大胜利。"},{"type":"paragraph","text":"我们党的光荣历史，"},{"type":"paragraph","text":"每一页都闪耀着毛泽东思想的灿烂光芒！"},{"type":"paragraph","text":"毛主席亲自发动和领导的无产阶级文化大革命，"},{"type":"paragraph","text":"清除了叛徒、内奸、工贼刘少奇，"},{"type":"paragraph","text":"彻底摧毁了以刘少奇为首的资产阶级司令部，"},{"type":"paragraph","text":"我们的党更加纯洁，更加坚强。"},{"type":"paragraph","text":"以毛主席为领袖的中国共产党，"},{"type":"paragraph","text":"顶狂风，战恶浪，"},{"type":"paragraph","text":"高举反帝反修的大旗，"},{"type":"paragraph","text":"要把一切害人虫彻底埋葬！"},{"type":"paragraph","text":"伟大的领袖，"},{"type":"paragraph","text":"伟大的党，"},{"type":"paragraph","text":"在这大喜的日子里，"},{"type":"paragraph","text":"普天下的人民仰望北京，"},{"type":"paragraph","text":"千万颗红心向着红太阳。"},{"type":"paragraph","text":"热烈祝贺“九大”隆重开幕！"},{"type":"paragraph","text":"衷心祝福伟大领袖毛主席万寿无疆！万寿无疆！万寿无疆！"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c5c02cb649"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
