" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji30","name":"毛泽东全集第30卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji30.pdf"],"article":{"title":"转发福建省公安厅关于镇反情况报告的批语","alias":"","parts":[{"type":"paragraph","text":"转发福建省公安厅关于镇反情况报告的批语"},{"type":"paragraph","text":"（1951年3月18日）各中央局，并转分局，省委，大中市委，区党委，军区党委及公安机关："},{"type":"paragraph","text":"福建公安厅的这个报告写得很好，有分析，有内容，方针正确，态度坚定，值得各地同志研究仿行。我们希望各省市都能写出这样的报告。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"三月十八日"},{"type":"paragraph","text":"[1]指福建省公安厅1951年3月1日关于镇压反革命情况给华东公安部并报中央公安部的报告。报告指出，福建省镇反工作去年11月以后有显著转变，但当时发展不平衡，大部分地区镇压得不狠，个别地区未动。主要原因是领导思想上一下转不过弯子，存在“怕乱”“怕纠偏”等顾虑。在省委第五次扩大会议作了进一步动员，并采取一系列步骤后，各地镇反工作开展很迅速，收效很大。一般的步骤是：第一步先地委讨论，经党内外自上而下的充分动员，结合有重点的具体检查督促，达到明确思想，解决策略与材料来源等问题。第二步是结合土改等中心工作发动群众，采取自上而下、自下而上相结合的办法，开展群众性调查研究工作，结合公安部门既有材料，确定该捕对象，召开农代会核对补充材料，经一定组织审查批准，在党委统一领导下，组织党政军民力量，实行全区性的大逮捕。第三步是发动群众控诉，经人民法院或军法处依法判处，政府机关组织公审大会和群众大会公布处决。"}],"authors":["毛泽东"],"dates":[{"year":1951,"month":3,"day":18}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":166,"page_end":166},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8c86865a0f"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
