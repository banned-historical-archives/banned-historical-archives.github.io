[],"dates":[{"year":1969,"month":11,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反对腐朽的资产阶级教育制度"},{"type":"paragraph","text":"西德七千多大中学生举行强大示威"},{"type":"paragraph","text":"新华社波恩八日电　西德巴伐利亚州的七千五百余名大、中学生七日在慕尼黑、纽伦堡和奥格斯堡举行强大示威游行，反对西德腐朽的资产阶级教育制度。"},{"type":"paragraph","text":"在巴伐利亚州首府慕尼黑，以工程学校学生为主的大、中学生五千余人，不顾天气寒冷，手挽手，排成一长列，在街道上举行抗议示威。他们高呼口号，高唱抗议歌曲，反对巴伐利亚州当局正在拟订的专科高等学校法草案，并要求这个州的教育部长下台。学生们沿路还向居民散发了传单。"},{"type":"paragraph","text":"巴伐利亚州当局出动了一千名警察、马队和水龙车对群众进行镇压。但学生们不畏强暴，不断冲向用铁丝网重重“保护”起来的教育部大楼，并向大楼投掷颜色袋和臭鸡蛋。游行结束后，示威学生还举行了群众大会。"},{"type":"paragraph","text":"在纽伦堡和奥格斯堡，学生们也举着标语牌，高呼抗议口号，在市内举行了游行。"},{"type":"paragraph","text":"巴伐利亚州的一万二千名工程学校学生，自今年五月以来为反对腐朽的资产阶级教育制度已坚持了六个月的罢课斗争。他们的斗争得到了许多青年学生和居民的同情和支持。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1c0ef2d316"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
