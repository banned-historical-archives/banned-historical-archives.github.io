script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"印度尼西亚共产党四中全会关于反修的决议没有赫鲁晓夫的现代修正主义更加危险 马列主义者必须提高警惕加紧团结斗争","authors":[],"dates":[{"year":1965,"month":5,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社雅加达24日电　印度尼西亚共产党中央委员会第四次全体(扩大)会议(五月十一日一十三日)通过一项题为《现代修正主义仍然是国际共产主义运动的主要危险》的决议，全文如下:"},{"type":"paragraph","text":"印度尼西亚共产党中央委员会于一九六五年五月十一日至十三日在雅加达举行第四次全体(扩大)会议，会议对国际共产主义运动的发展作出了估计，并且认为赫鲁晓夫的垮台标志着马克思列宁主义的胜利和现代修正主义的破产。"},{"type":"paragraph","text":"但是，事实表明，没有赫鲁晓夫的现代修正主义仍然存在，一九六五年三月分裂会议的举行，就证明了这一点。就其狡猾和虚伪来说，今天的没有赫鲁晓夫的现代修正主义更加危险。因此，全世界马克思列宁主义者必须更加提高警惕，必须以更加紧密的团结和合作来对付和反对没有赫鲁晓夫的现代修正主义。"},{"type":"paragraph","text":"会议肯定了党拒绝参加一九六五年三月一日会议的作法，因为党不愿意对分裂国际共产主义运动的行为负责。"},{"type":"paragraph","text":"会议强调，为召开一次共产党和工人党的国际会议，必须进行最充分的准备。这个会议需要有完全摆脱赫鲁晓夫计划的新的基础，以各党相互协商、独立自主和权利平等为原则，并且至少为所有社会主义国家共产党和工人党所同意。"},{"type":"paragraph","text":"会议深信，虽然各国共产党和工人党的国际会议在长时期内不会召开，但是，国际共产主义运动在马克思列宁主义基础上的团结必将发展，全世界为争取民族独立、民主、社会主义和世界和平而进行的反对帝国主义和新老殖民主义以及现代修正主义的革命斗争，必将取得更大的新的胜利。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cd8c630d1b"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
