ates":[{"year":1952,"month":4,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"资产阶级向人民日常生活进攻的罪行中，表现得最毒辣的就是药商制造假药，使广大人民的健康遭受损害，有的因而小病加重，甚至牺牲了性命。许多受害的读者来信，用具体事实控诉这些只顾骗钱、不顾别人死活的奸商。"},{"type":"paragraph","text":"本市石门路十五号居民陆修进来信说:“我的玲玲——一个天真活泼的女孩子，两年前因病经医生开了药方，向南市一家药房买了两瓶‘奥斯铁令钙’针药；在三天中只注射了半瓶，玲玲就死掉了。当时医生觉得奇怪，我却无知地归咎于命运；现在从报上看到奸商曾用假药冒充‘奥斯铁令钙’出售，我才恍然大悟，我要向奸商索还这笔血债!”杭州古荡蚕校崎峰同学、吴淞中学蒋志良同学及西康路新中兴铁工厂工人包挺生等来信指出:鹧鸪菜害死了他们的小弟弟、小妹妹、儿子和侄女，这是奸商直接夺去了他们的亲骨肉，戕害了祖国的幼苗。梵皇渡路九十六弄三支弄廿八号居民邵其昌来信说:“前年有一天我的嘴唇发肿，到静安寺东路某国药号买药，他们两次给我配了敷药，并保证一定治好；结果我的嘴唇愈肿愈厉害，幸亏在医院里打针治好了。当时医生还怪我医得太迟，如果再过廿四小时就要断送性命的。我对该国药号这种为了赚钱不惜贻误病人的罪行切齿痛恨!”"},{"type":"paragraph","text":"资产阶级的恶毒在药业中表现得非常具体，读者通过这些事实，进一步认清了五反斗争的伟大意义，并一致要求人民政府严惩害人性命和五毒俱全的奸商!"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fdf710740c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
