" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"给李虹的信","authors":["河南","王大海"],"dates":[{"year":1957,"month":8,"day":22}],"is_range_date":false,"parts":[{"text":"给李虹的信","type":"title"},{"text":"河南王大海","type":"authors"},{"text":"(王大海：作家，《奔流》编辑，河南省文联常委)","type":"subtitle"},{"text":"李虹同志：","type":"appellation"},{"text":"8、15的信收到，很高兴，我原来怕写去的信你会经过很久很久才收到的。","type":"paragraph"},{"text":"你的打算我们很同意。搞写作要有韧性，急燥往往和垂头丧气是邻居，除了必须有生活基础的前提之外，老百姓那句“慢工出细活”，其实还是适用的。","type":"paragraph"},{"text":"我们还不算互相很了解。单依靠通讯毕竟是不行的，但这也并不要紧，“来日方长”嘛！你说你读书少，这大概是我们年轻人的通病吧，假如这不是谦虚，我劝你用极大的力量补这一课，写作者不读破万卷书是万万不行的。所以要把古今中外——特别是我们民族的光彩夺目的文学遗产——统统有计划地读一遍。单就这一课来说，大概就要比你读水利需要的时间更长更长的。","type":"paragraph"},{"text":"我们机关正在反右派，已经揭露的有苏、栾两个右派分子，《奔流》在他们的把持与纂夺下，也犯了不少错误，九月号上将有一个编辑部的检查发表，你可以看看，便能略知一二了。","type":"paragraph"},{"text":"我从江南回来，白天工作忙，晚上反右倾占去不少个夜晚，自己不能写作，也很苦恼的，看来，你有一个很关怀和体贴你的未婚妻，这是幸福的。假如初恋的故事是动人的话，我倒劝你写写，我常常遇到我们作品中对于纯洁美好的初恋是写得很少，也写得很浅的。——写这类题材，由于是自己的心所经历过的大激动，不加粉饰地写来，是会打动人心的。","type":"paragraph"},{"text":"也希望你注意身体，——为了今后有可能作更多的事。","type":"paragraph"},{"text":"郑州中午仍很热，早晚则比较凉快了，你们那里如何？我很羡慕你们的生括——到处跑一跑，今年春天在江浙走了一圈，我的心有些野了，坐不住办公室了。","type":"paragraph"},{"text":"再谈，祝你","type":"subtitle"},{"text":"愉快！","type":"appellation"},{"text":"编辑部同志们附笔问好！","type":"appellation"},{"text":" 大海8月22日","type":"paragraph"},{"text":" 来源：《苏金伞右派集团言论与作品》（河南省文学美术工作者联合会，1958年）。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"af7263d487"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
