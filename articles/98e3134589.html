rt":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"卡博等同志离京回国周恩来康生李先念叶剑英等同志和革命群众热情欢送","authors":[],"parts":[{"type":"paragraph","text":"中共中央政治局常委、国务院总理周恩来同志，中共中央政治局常委、书记处书记、人大常委会副委员长康生同志，中共中央政治局委员、国务院副总理李先念同志，中共中央政治局委员、国防委员会副主席叶剑英同志，中共中央委员、中国人民解放军总政治部主任萧华同志，中共中央候补委员、中国人民解放军代总参谋长杨成武同志，中央文化革命小组成员王力同志，和首都两千多革命群众前往机场热烈送行。"},{"type":"paragraph","text":"中共中央委员、书记处书记刘宁一同志陪同阿尔巴尼亚同志前往上海。"},{"type":"paragraph","text":"今天，首都机场洋溢着中阿两国人民牢不可破的革命战斗友谊的热烈气氛。中国和阿尔巴尼亚两国国旗在首都机场上迎风飘扬。前往送行的中国人民解放军陆海空三军指战员、武装民兵和首都革命红卫兵，高举我们最最敬爱的伟大领袖毛主席画像和阿尔巴尼亚人民最最敬爱的领袖、中国人民最亲密的朋友恩维尔·霍查同志画像，敲锣打鼓，送别来自反帝反修最前线的阿尔巴尼亚同志。当卡博同志在周恩来、康生、李先念等同志陪同下来到机场时，机场上一片欢腾，人们挥动着红彤彤的《毛主席语录》，不断亲切地欢呼“毛泽东——恩维尔”“恩维尔——毛泽东”。一群儿童向阿尔巴尼亚同志献了鲜花。"},{"type":"paragraph","text":"阿尔巴尼亚驻中国大使瓦西里·纳塔奈利陪同卡博同志前往上海。"},{"type":"paragraph","text":"到机场送行的还有各国驻华使节。"},{"type":"paragraph","text":"希斯尼·卡博同志和贝哈尔·什图拉同志抵离上海时，中央文化革命小组副组长张春桥同志、中央文化革命小组成员姚文元同志，人民解放军驻上海部队负责人余光茂，以及上海革命造反派代表，到机场热情迎送。"},{"type":"paragraph","text":"陪同阿尔巴尼亚同志到达上海的中共中央委员、书记处书记刘宁一同志，陪同阿尔巴尼亚军事代表团到达上海的中共中央委员、国防部副部长王树声同志也到机场欢送。"},{"type":"paragraph","text":"阿尔巴尼亚劳动党中央政治局委员、部长会议副主席兼国防部长贝基尔·巴卢库同志和阿尔巴尼亚劳动党中央委员、阿尔巴尼亚人民军政治部主任希托·恰科同志，以及由他们率领的阿尔巴尼亚军事代表团全体成员也到机场送行。"},{"type":"paragraph","text":"卡博同志和什图拉同志在上海停留期间，参观访问了上海国棉十七厂和上海港务局第五装卸区，受到革命群众的热烈欢迎。"}],"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"康生","type":"人物"},{"name":"叶剑英","type":"人物"},{"name":"刘宁一","type":"人物"},{"name":"李先念","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"98e3134589"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
