<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共最高人民检察院机关委员会关于开除白步洲党籍的决定","authors":["(白步洲)"],"dates":[{"year":1958,"month":4,"day":23}],"is_range_date":false,"parts":[{"text":"中共最高人民检察院机关委员会关于开除白步洲党籍的决定","type":"title"},{"text":"(白步洲)","type":"authors"},{"text":"(一)白步洲，男，四十一岁，陕西清涧县人，贫农出身，学生成份，一九三三年参加工作，一九三四年二月入党，历任县委委员、县委书记、县保安科长、县公安局长、专署保安处副处长、松江省公安处副处长(后改为厅，任副厅长)、赣西南区党委社会部长兼公安处长、江西省公安厅副厅长兼检察署副检察长、中央建筑工程部保卫局长、最高人民检察院第三厅副厅长。","type":"paragraph"},{"text":"(二)主要反党反领导事实有：","type":"paragraph"},{"text":"整风运动开始，社会上右派分子向党猖狂进攻时，白步洲在厅内煽风点火，攻击领导。","type":"paragraph"},{"text":"1、他在三厅一组，大鸣大放小组会上当右派分子攻击领导对某些负责干部的一般问题不作处理时，白步洲立即插话支持说：“负责干部中还有更严重的投敌叛变，有血债问题未作处理”。这样，使一组干部确信领导是包庇高级干部的，因此，以全组名义写了“领导干部特殊吗”的反党大字报。","type":"paragraph"},{"text":"2、支持右派分子企图推翻机关党委会的活动。当右派分子李树芳等诬蔑丑化党委委员，企图推翻党委委员时，白步洲说“要是整风以后再选举，有些人就选不上了”。","type":"paragraph"},{"text":"3、攻击、诬蔑院领导。他说“院的业务方针长期摇摆不定，跟着公安、法院跑”。说党组“集体领导未形成，民主空气淡薄”。并煽动说“院整风计划未明确提出反宗派主义，是不是没有，……大家很好考虑”，“敢于提意见的就不是好干部，处处给予不利”，“检察员以上干部有离心思想，都不愿在高检工作”。","type":"paragraph"},{"text":"(三)白步洲长期存在着严重的资产阶级名位观念，他认为当了十年副厅长未得到提拔是组织上不重用他。因此对党不满。整风运动开始，社会上资产阶级右派分子猖狂向党进攻时，白步洲积极煽动点火，攻击党和领导，在厅内产生了严重的影响，使整个三厅在短时期内从党内到党外迅速形成了一股反党的逆流。白步洲上述反党言行被揭发批判后，虽承认了错误，但检讨不够深刻。已经党组决定划为右派分子，因此决定开除白步洲党籍。","type":"paragraph"},{"text":" 一九五八年四月二十三日","type":"paragraph"}],"comments":[],"origin":"原载 《关于清除党内右派分子的决定汇编》，中共中央监察委员会办公厅编，一九五九年十二月。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"24ae1c67f1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
