script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"尼泊尔朋友观看影片《新沙皇的反华暴行》  谴责苏修对中国进行武装挑衅  苏联修正主义者反对中国决没有好下场","authors":[],"dates":[{"year":1969,"month":9,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"尼泊尔朋友观看影片《新沙皇的反华暴行》"},{"type":"paragraph","text":"谴责苏修对中国进行武装挑衅"},{"type":"paragraph","text":"苏联修正主义者反对中国决没有好下场"},{"type":"paragraph","text":"新华社加德满都十三日电　中国驻尼泊尔大使馆最近举行招待会，放映纪录影片《新沙皇的反华暴行》。尼泊尔朋友看了影片后纷纷谴责苏修对中国进行武装挑衅的罪行。他们指出，世界上所有主持正义的人们都支持中国人民的斗争。"},{"type":"paragraph","text":"一位尼泊尔朋友说，苏修接连对伟大的中华人民共和国明目张胆地进行攻击和发动武装挑衅，是苏修害怕全世界人民革命运动的胜利发展、害怕中国人民在伟大领袖毛主席领导下所取得的巨大成就的表现。"},{"type":"paragraph","text":"他说，苏修自吹是“社会主义国家”，事实上，他们对捷克斯洛伐克进行无耻的武装侵略，对伟大的中华人民共和国发动的武装挑衅，在经济上和政治上控制一些国家，并且把它们变成它的殖民地，都说明了苏修是血腥的侵略者和社会帝国主义。"},{"type":"paragraph","text":"他还说，用毛泽东思想武装起来的，经过无产阶级文化大革命烈火锻炼的更加强大的七亿中国人民，一定会消灭一切胆敢入侵的侵略者。"},{"type":"paragraph","text":"另一位朋友说，当我们看到苏修军舰在中国渔船当中横冲直撞，用高压水龙头向中国渔民冲击以及用装甲车杀害中国村民的时候，我们非常愤怒。这些事实暴露了苏修社会帝国主义的狰狞面目。"},{"type":"paragraph","text":"他还说，英勇的中国人民和中国人民解放军给了苏修武装侵略者以应有的还击，苏联社会帝国主义事实上也是一只纸老虎。"},{"type":"paragraph","text":"另一位朋友说，世界上一切侵略者都没有好下场。苏联修正主义者反对中国同样没有好下场。世界上所有主持正义的人们都支持中国人民的正义斗争。最后胜利必将属于伟大的中国人民。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b2272d2260"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
