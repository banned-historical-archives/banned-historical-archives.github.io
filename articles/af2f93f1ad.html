ical-archives/banned-historical-archives0/main/maoquanji40.pdf"],"article":{"title":"关于印发刘晓给中央电报的批语","alias":"","parts":[{"type":"paragraph","text":"关于印发刘晓给中央电报的批语"},{"type":"paragraph","text":"（1958年8月19日）小平同志："},{"type":"paragraph","text":"此件请印发会议各同志。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"八月十九日[1]刘晓，当时任中国驻苏联大使。[2]小平，即邓小平，当时任中共中央总书记。"},{"type":"paragraph","text":"[3]指刘晓1958年8月16日给中共中央的电报。电报说：不久前我曾往访库西宁同志，向他转告了毛主席对苏共中央关于王明情况通知的答复。他表示对毛主席能充分地理解苏共中央非常高兴，至于王明是否应该在苏继续治疗的问题，应完全由中共中央决定。既然毛主席认为他可以留下，这对苏方来说也不会成为负担。然后我向库西宁表示，毛主席很高兴地欢迎他在任何他认为方便的时间到中国做客，他表示非常感动。这个电报作为北戴河中共中央政治局扩大会议文件在会上印发。"}],"authors":["毛泽东"],"dates":[{"year":1958,"month":8,"day":19}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":77,"page_end":77},"tags":[{"name":"毛泽东","type":"人物"},{"name":"王明","type":"人物"},{"type":"文稿类型","name":"批示"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"af2f93f1ad"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
