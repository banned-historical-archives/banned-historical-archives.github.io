" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji47","name":"毛泽东全集第47卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji47.pdf"],"article":{"title":"毛泽东等祝贺匈牙利解放二十周年的电报","alias":"","parts":[{"type":"paragraph","text":"毛泽东等祝贺匈牙利解放"},{"type":"paragraph","text":"二十周年的电报"},{"type":"paragraph","text":"（1965年4月3日）布达佩斯匈牙利社会主义工人党中央委员会第一书记、匈牙利人民共和国工农革命政府总理卡达尔·亚诺什同志，匈牙利人民共和国主席团主席道比·伊斯特万同志："},{"type":"paragraph","text":"在匈牙利解放二十周年的时候，我们向你们，向兄弟的匈牙利人民表示热烈的祝贺。"},{"type":"paragraph","text":"一九四五年，具有光荣革命传统的匈牙利人民，粉碎了德国法西斯奴役的锁，推翻了霍尔蒂二十五年的血腥统治，获得了几世纪以来梦寐以求的民族独立和自由解放。解放后，匈牙利人民在反对帝国主义干涉和颠覆的斗争中取得了胜利，在社会主义建设中取得了巨大成就。中国人民对兄弟的匈牙利人民在前进道路上取得的每一个成就都感到非常高兴。"},{"type":"paragraph","text":"中匈两国人民在反对帝国主义和建设社会主义的事业中相互支持，相互合作。我们坚信，中匈两国人民将同社会主义阵营各国人民，在马克思列宁主义和无产阶级国际主义的基础上，更加紧密地团结起来，反对以美国为首的帝国主义的侵略政策和战争政策，目前首先坚决击败美帝国主义对越南人民的侵略，为争取世界和平、毛泽东全集第四十七卷民族解放、人民民主和社会主义而斗争。"},{"type":"paragraph","text":"祝匈牙利人民在建设自己祖国的事业中不断取得新的成就，祝中匈两国人民的友谊和合作日益巩固和发展。"},{"type":"paragraph","text":"中国共产党中央委员会主席毛泽东中华人民共和国主席刘少奇中华人民共和国全国人民代表大会常务委员会委员长朱德中华人民共和国国务院总理周恩来"},{"type":"paragraph","text":"一九六五年四月三日"}],"authors":["毛泽东"],"dates":[{"year":1965,"month":4,"day":3}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":532,"page_end":533},"tags":[{"name":"毛泽东","type":"人物"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3dc382e6f9"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
