art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"一盏闪耀着毛泽东思想光辉的红灯","authors":["战士翟鹰张东昆"],"parts":[{"type":"paragraph","text":"最近看了革命现代京剧《红灯记》，重新学习了毛主席的光辉著作《在延安文艺座谈会上的讲话》，心里激动得很，觉得有许多话要说。现在谈一点我们的感想。"},{"type":"paragraph","text":"毛主席教导我们：“在有阶级存在的社会内，阶级斗争不会完结。”解放十七年来，文艺战线一直存在着两条路线的斗争。周扬一伙在他们的总后台——党内最大的走资本主义道路当权派的支持下，顽固地推行资产阶级文艺黑线，疯狂地和毛主席的文艺路线相对抗。他们利用京剧大肆宣扬洋人、古人、死人，竭力地为地主、资产阶级服务，为他们歌功颂德，使京剧舞台上笼罩着妖雾鬼气，看不到工农兵的英雄形象，听不到毛泽东思想的赞歌。京剧舞台不是工农兵的舞台，不是宣传毛泽东思想的阵地，而成了宣扬腐朽的封建主义、资本主义和修正主义的场所。"},{"type":"paragraph","text":"毛主席早在一九四二年就指出：“我们应该进行文艺问题上的两条战线斗争。”党内最大的走资本主义道路的当权派及其爪牙周扬一伙，拚命地和我们争夺地盘。我们遵照毛主席的伟大教导，狠狠地回击了他们，坚决地和他们斗争。为了使京剧沿着毛主席的文艺路线发展，真正为工农兵服务，江青同志高举毛泽东思想伟大红旗，坚决执行毛主席的文艺路线，亲自主持了京剧改革，虽然遭到周扬一伙的竭力阻挠和破坏，但是一盏闪耀着毛泽东思想光辉的红灯，终于在京剧舞台升起来了。"},{"type":"paragraph","text":"当我们看到革命现代京剧《红灯记》时，心中无比激动。这出戏刻划的工人阶级三代人视死如归的英雄形象，给了我们极深刻的教育。它告诉我们，革命成功多么不容易呀！有多少革命先烈为捍卫毛主席的革命路线牺牲了。我越想越热爱今天的幸福生活，更热爱我们伟大的领袖毛主席。我们是革命战士，我们的任务就是捍卫毛主席的革命路线。谁胆敢反对毛主席，反对毛主席的革命路线，我们就像李玉和一样和他拚到底，坚决打倒他。"},{"type":"paragraph","text":"革命现代京剧《红灯记》的演出，是毛主席文艺路线的伟大胜利！它宣告了资产阶级文艺黑线的破产。我们一定要把文艺战线的两条路线斗争进行到底，彻底挖掉这条又粗又长的文艺黑线，把周扬一伙和他们的总后台——党内最大的走资本主义道路的当权派批倒、批臭。让光焰无际的毛泽东思想永世永代照亮我们的文艺阵地！"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"周扬","type":"人物"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"49ebe08de9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
