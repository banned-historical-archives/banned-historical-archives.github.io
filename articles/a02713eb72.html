script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"在科研领域加强对资产阶级的全面专政  吉林应用化学研究所科研人员联系实际学习理论，加深理解在科研领域里无产阶级对资产阶级专政的重要意义","authors":[],"dates":[{"year":1975,"month":5,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"在科研领域加强对资产阶级的全面专政"},{"type":"paragraph","text":"吉林应用化学研究所科研人员联系实际学习理论，加深理解在科研领域里无产阶级对资产阶级专政的重要意义"},{"type":"paragraph","text":"新华社长春电　中国科学院吉林应用化学研究所科研人员在学习无产阶级专政理论的过程中，联系科学研究领域里阶级斗争和路线斗争实际，加深理解在科研领域里无产阶级对资产阶级实行全面专政的重要意义。"},{"type":"paragraph","text":"这个研究所的科研人员，在学习毛主席关于理论问题的重要指示和马克思、恩格斯、列宁关于无产阶级专政的部分论述时，回顾了科研战线二十五年来历次重大斗争，分析了这条战线当前阶级斗争和路线斗争的表现。大家认识到，社会主义改造在所有制方面取得基本胜利以后，资产阶级被剥夺了生产资料，但是还不能一下子就“把他们在组织上和知识上的优势完全剥夺掉”。他们必然利用这种优势时刻梦想夺回失去的“天堂”；科研领域还存在着的资产阶级法权等旧社会的痕迹还不能一下子清除掉；同时，科研单位知识分子成堆，他们受资产阶级“知识私有”、名利思想的影响较深。由于上述这些原因，科研领域和上层建筑各个领域一样，阶级斗争和路线斗争仍然是长期的，有时甚至是很激烈的，在科研领域里加强无产阶级专政，就是我们一项长期的艰巨的战斗任务。"},{"type":"paragraph","text":"在学习讨论中，科研人员还结合自己的切身体验，谈到科研人员走与工农相结合的道路，努力改造世界观的重要性。过去，由于修正主义路线的干扰，科研人员中比较严重地存在着脱离无产阶级政治，脱离实际，脱离群众的倾向。无产阶级文化大革命和批林批孔运动中，这个研究所的科研人员经过批判修正主义路线，批判资产阶级世界观，以党的基本路线为纲，坚持在科研工作中实行工人、科研人员、领导干部和科研、生产、使用单位两个三结合，初步改变了过去那种“三脱离”的状况。现在，这个研究所已经和三百多个科研、设计、生产、使用单位挂钩协作，近半数科研人员下厂下乡开展科学实验，同时，还请进来二百多名有实践经验的工人参加实验室的研究活动，有力地促进了科研工作的发展。科研人员在学习中总结了这方面的经验，进一步认识到，三结合搞科研是社会主义的新生事物，它对于限制资产阶级法权，缩小脑力劳动和体力劳动的差别，加强知识分子的思想改造，在科技领域里巩固无产阶级专政，坚持社会主义方向，有着重要的意义。他们决心继续搞好“三结合”，刻苦改造世界观，做社会主义新生事物的促进派，为在科研领域实现无产阶级对资产阶级的全面专政而努力。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"吉林文革","type":"人物"},{"name":"批林批孔","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"name":"限制资产阶级法权","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a02713eb72"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
