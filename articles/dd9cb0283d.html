script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反对资本家残酷剥削　要求改善劳动条件  英国工人罢工斗争继续发展  全国报务员罢工沉重打击了英国垄断资本","authors":[],"dates":[{"year":1969,"month":1,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反对资本家残酷剥削　要求改善劳动条件"},{"type":"paragraph","text":"英国工人罢工斗争继续发展"},{"type":"paragraph","text":"全国报务员罢工沉重打击了英国垄断资本"},{"type":"paragraph","text":"新华社伦敦二十四日电　英国工人为反对资本家残酷剥削、要求增加工资的罢工斗争在继续发展。"},{"type":"paragraph","text":"从二十日开始罢工的英国全国各地邮局收发国外电报的三千五百名报务员，正在继续坚持斗争。他们要求增加工资，反对邮局当局把增加劳动强度作为增加工资的条件。约二十万邮局职工决定，如果当局不接受报务员的要求，从下一个星期天开始，他们就拒绝在星期天工作。同时，在伦敦、利物浦、伯明翰、曼彻斯特、格拉斯哥、爱丁堡以及人口在二十五万以上的英国其他城市，邮局工作人员都将在三十日罢工一天，以表示他们对报务员罢工斗争的支持。"},{"type":"paragraph","text":"报务员的罢工使垄断资本受到巨大打击。据报道，这次罢工使邮局的收入每天减少十三万一千一百英镑，而且使银行、黄金市场、外汇交易所、股票交易所、保险公司和航运公司的业务受到重大打击。"},{"type":"paragraph","text":"在报务员坚持斗争的同时，英国不少工厂的工人也掀起了罢工的浪潮。"},{"type":"paragraph","text":"贾格瓦汽车公司的七百名工人不顾黄色工会头子的阻挠，举行罢工，要求提高工资。他们的罢工使这家公司在汽车出口方面每星期损失一百万镑收入。"},{"type":"paragraph","text":"在美国资本经营的鲁特斯汽车公司，一家发动机和零件厂的将近三百名工人二十一日也举行罢工，要求增加工资。罢工使得这家公司的另一家工厂的装配线无法运转。"},{"type":"paragraph","text":"珀金斯柴油机厂正在罢工的五千工人，最近在一次集会上通过决议，决定再罢工八天。维克斯造船厂的管道工人坚持斗争已达二十七个星期，使整个造船厂的生产陷于停顿。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dd9cb0283d"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
