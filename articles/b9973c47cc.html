ical-archives/banned-historical-archives0/main/maoquanji36.pdf"],"article":{"title":"接受丹麦大使格瑞杰生呈递国书时的答词","alias":"","parts":[{"type":"paragraph","text":"接受丹麦大使格瑞杰生"},{"type":"paragraph","text":"呈递国书时的答词"},{"type":"paragraph","text":"（1956年4月10日）大使先生："},{"type":"paragraph","text":"我很高兴地接受贵大使递交的丹麦国王所签署的国书，并且感谢贵大使的祝贺。"},{"type":"paragraph","text":"自从1950年5月中华人民共和国和丹麦王国建立邦交以来，贵我两国的关系沿着友好的道路向前发展着。今年二月，为了进一步发展和巩固两国关系，贵我两国协议将双方公使馆升格为大使馆。几年以来，中国人民杂技团，中国古典歌舞剧团曾经赴丹麦演出，中国青年代表团访问过丹麦，中国工农业和艺术展览会也曾经分别在哥本哈根举行。丹麦的工会和文化代表团访问过中国；1955年丹麦工商界贸易代表团访问了中国，进行了贸易谈判，扩大了两国之间的贸易。这些友好往来促进了两国之间的经济和文化交流，增进了两国人民的了解和友谊。而贵我两国之间友好关系的加强，是有助于促进国际间的和平的。"},{"type":"paragraph","text":"我深信在贵大使的努力之下，贵我两国之间久已存在的友好关系必定会得到进一步的发展，贵我两国之间的经济和文化交流必定会得到进一步的增长。"},{"type":"paragraph","text":"大使先生，我热烈地欢迎阁下出任丹麦王国驻中华人民共和国毛泽东全集第三十六卷的特命全权大使。在你为发展中丹两国友好合作关系和增进中丹两国经济、文化联系的工作中，中华人民共和国政府将予以充分的协助。"},{"type":"paragraph","text":"谨祝贵国国家繁荣，人民兴旺，并且祝贵国元首健康。"}],"authors":["毛泽东"],"dates":[{"year":1956,"month":4,"day":10}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":276,"page_end":277},"tags":[{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b9973c47cc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
