<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中央工艺美术学院向右派进行斗争　拆穿庞熏琴的阴谋","authors":["新华社"],"dates":[{"year":1957,"month":7,"day":24}],"is_range_date":false,"parts":[{"text":"中央工艺美术学院向右派进行斗争  拆穿庞熏琴的阴谋","type":"title"},{"text":"新华社","type":"authors"},{"text":"新华社２４日讯中央工艺美术学院２２日召开全院师生大会。揭发批判以该院副院长庞熏琴为首的右派集团的反动言行。","type":"paragraph"},{"text":"党支部副书记王云凤揭发了庞熏琴瓦解党支部的阴谋。她说庞熏琴利用党内的右派分子刘守强制造党的分裂。刘守强反对上级党委派党的干部来学院工作，认为有他和何燕明（另一个右派分子）就可以完全把工作搞好。整风期间，庞熏琴、刘守强等右派分子打击领导小组，认为党支部已经瘫痪了，不能领导整风，要求改组党支部。刘守强并要求右派分子庞熏琴、何燕明加入党的整风领导小组，说何燕明“搞运动有办法”，说庞熏琴是代表民盟的，“整风运动必须由庞熏琴来领导才能搞好。”","type":"paragraph"},{"text":"工艺美术家、副院长雷圭元在发言中揭发了庞熏琴从前是搞资产阶级形式主义绘画的，后来其所以转到工艺美术事业上来是由于他想夺取工艺美术的领导权，认为工艺美术是“冷门”。雷圭元还说明庞熏琴过去在中央美术学院时就是一直反对领导的。他警告庞熏琴要老实交代反党言行，不要走绝路。","type":"paragraph"},{"text":"教员罗慕云重点批判了庞熏琴的反动的“体制方案”。她说，庞熏琴右派集团主要的纲领就是“中央工艺美术学院组织条例简则”也就是“体制方案”。这个“简则”的实质就是取消党的领导。方案的第二条“院务委员会由各方面选举产生，包括各系代表，教授、讲师、助教代表、职工代表、共产党、民主党派、工会、共青团代表”，这就把党的作用降低到一般群众团体的地位，根本否定了党的领导作用。第三条规定了院长、副院长由选举产生，国务院只不过替他们办理任免手续而已。由此可见，右派分子口头上说他们还是要党的领导，实际上他们是把共产党一脚踢开，由他们来把持工艺美术事业。","type":"paragraph"},{"text":"讲师陈若菊揭发了庞熏琴在人民日报上发表的题为“跟着党走，真理总会见太阳”的文章，是对党进行攻击、歪曲事实，并企图骗取全国人民支持的一株毒草。它把文化部比作“忍心的父母”，把中央手工业管理局对学院的领导看成是“无理而又粗暴的干涉”，歪曲了中央手工业管理局党组书记白如冰的讲话，把白如冰描写成一个盛气凌人的官僚主义者。而这些都是不合事实的。","type":"paragraph"},{"text":"助教梁任生说庞熏琴为了夺取工艺美术界的领导权，一贯地排挤工艺美术的老前辈、排斥党员专家，标榜自己。全国工艺美术展览会是专家张仃、教授张光宇设计的，但庞熏琴却到处宣扬自己，夸功显能。并且他还在背后打击这两位专家，说“不能学张仃和张光宇，不能追求原始意味（民间美术）。”梁任生还揭发了庞熏琴在苏州曾借工资问题，煽动手工艺人对政府的不满，恶毒地说：“工资制度不人道，是变相的剥削。”","type":"paragraph"},{"text":"庞熏琴在会上表示向人民低头，要继续检查交代。这个大会还将继续举行。","type":"paragraph"},{"text":" ——原载《人民日报》1957年7月26日","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"79e86be19e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
