" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoistlegacy.de-1620","name":"国务院批转国家文物事业管理局关于图书开放问题的请示报告","author":"国务院","internal":false,"official":false,"type":"unknown","files":[],"article":{"title":"国务院批转国家文物事业管理局关于图书开放问题的请示报告","dates":[{"year":1978,"month":4,"day":24}],"is_range_date":false,"authors":["国务院","国家文物事业管理局"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"国家出版事业管理局办公室, 出版工作文件选编(1976.10-1980.12), 506-507","tags":[{"name":"对外开放","type":"主题/事件"},{"name":"林彪","type":"主题/事件"},{"name":"四人帮","type":"主题/事件"},{"name":"图书","type":"主题/事件"},{"name":"文革","type":"主题/事件"},{"name":"文物图书","type":"主题/事件"}],"parts":[{"type":"title","text":"国务院批转国家文物事业管理局关于图书开放问题的请示报告"},{"type":"subtitle","text":"1978年4月24日 国发（1978）81号"},{"type":"paragraph","text":"国务院同意国家文物事业管理局《关于图书开放问题的请示报告》，现转发给你们，请参照执行。"},{"type":"paragraph","text":"各地文化部门要继续深入揭批“四人帮”的法西斯文化专制主义和禁锢政策，根据华主席、党中央的指示，认真解决好图书开放中存在的问题，并注意总结经验，不断改进工作，为提高整个中华民族的科学文化水平、建设社会主义的现代化强国作出自己应有的贡献。"},{"type":"paragraph","text":"主送：各省、市、自治区革命委员会，国务院各部委"},{"type":"paragraph","text":"附：国家文物局关于图书开放问题的请示报告"},{"type":"subtitle","text":"1978年4月15日"},{"type":"paragraph","text":"林彪、“四人帮”疯狂推行法西斯文化专制主义和禁锢政策，任意封存图书，致使许多图书馆长期处于关闭状态，严重阻碍了图书为三大革命运动服务，引起广大群众的强烈不满。去年以来，随着揭批“四人帮”运动的不断深入，各地图书馆陆续开放了一部分图书。但是，由于对图书开放的界限意见还不统一，有些图书馆对文化大革命以前公开借阅的社会科学和文艺类图书，至今还不敢公开借阅。为了更好地发挥各种图书资料的作用，我们对图书开放问题提出以下意见："},{"type":"paragraph","text":"一、 凡公开出版的自然科学和应用技术类图书以及各种工具书，原则上均可公开借阅。"},{"type":"paragraph","text":"二、凡文化大革命以前公开借阅的社会科学和文艺类图书，除XXX、林彪、“四人帮”反党集团及其死党的著作和吹捧他们的著作以外，原则上均可公开借阅。"},{"type":"paragraph","text":"三、涉及我国边界问题和国家机密的图书，只能有控制地在小范围借阅。"},{"type":"paragraph","text":"四、图书馆对馆藏书刊应保持完整，不得做涂、改、贴、剪、撕等技术处理。善本书的借阅，各地另行规定具体办法。"},{"type":"paragraph","text":"五、图书馆要加强图书宣传，注意作好对读者特别是青少年读者的指导工作。对图书开放中出现的带倾向性的问题，要及时向有关领导部门反映。"},{"type":"paragraph","text":"以上意见如无不妥，请批转各省、市、自治区参照执行。"},{"type":"paragraph","text":"主送：国务院"}],"alias":""},"tags":[{"name":"林彪","type":"人物"},{"name":"四人帮","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"87dc5c998b"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
