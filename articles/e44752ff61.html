art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东思想指引我们乘风破浪永向前","authors":["国庆观礼代表/海军某部航海长陈芳栋"],"parts":[{"type":"paragraph","text":"在伟大领袖毛主席和敬爱的林副主席的亲切关怀下，我这个普通的共产党员，来到伟大祖国的首都参加国庆观礼，见到了我们日夜想念的伟大领袖毛主席和他的亲密战友林副主席。这是我一生中最大的幸福。我怀着对伟大领袖毛主席的深厚无产阶级感情，千遍万遍高呼：毛主席万岁！万万岁！"},{"type":"paragraph","text":"伟大领袖毛主席是人类的大救星。战无不胜的毛泽东思想是照耀我们前进的光辉灯塔。几年来，我们在与狂风巨浪斗、与阶级敌人斗、与头脑里的资产阶级思想斗的过程中，坚持不懈地活学活用毛泽东思想，在斗争中锤炼对伟大领袖毛主席的赤胆忠心。在毛泽东思想的指引下，我们航海部门七年荣获四好单位的光荣称号，被评为活学活用毛泽东思想的先进集体。我们所取得的每一点成绩，都是战无不胜的毛泽东思想哺育的结果。离开了毛泽东思想，我们就会象军舰没有罗经指向、没有灯塔导航一样，寸步难行。"},{"type":"paragraph","text":"氛�日益尖锐复杂的新形势下，我们�8旱谋N雷婀�、盢牢薏�阶级文化大革命的任务更加繁重了�5�是，我们有一个坚定的信念：有战无不胜的毛泽东思想，就能一不怕苦、二不怕死，战胜一切困难，无敌于天下�R淮危�我们在执行护航任务中，遇到了九级以上的风浪�\u003e�舰在怒笃邢笠黄チ倚缘囊奥恚�上下暴跳，左右颠簸�T谡庵智榭鱿拢�大家高声朗诵〖JZ/加重〗“下定决心，不怕牺牲，排除万难，去争取胜利”，"},{"type":"paragraph","text":"林副主席在国庆讲话中指示我们，要进一步开展活学活用毛泽东思想的群众运动。我们坚决响应林副主席的号召，更高地举起毛泽东思想伟大红旗，更好地活学活用毛泽东思想，坚持用毛泽东思想统帅一切，搞好思想革命化，把无产阶级专政下继续革命的觉悟提得更高，为实现党的“九大”提出的各项任务作出新的贡献。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e44752ff61"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
