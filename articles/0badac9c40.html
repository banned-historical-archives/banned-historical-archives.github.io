<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"jfjb","name":"解放军报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"dates":[{"year":1991,"month":4,"day":9}],"page_start":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席和哨兵","authors":["红军老战士郭正明/宋亚田/朱志斌"],"parts":[{"type":"paragraph","text":"1945年夏天，我在陕甘宁晋绥联防军政治郎担任保卫队队长。我们机关和首长住在延安大边沟，延河在中间，对面是王家坪，毛主席就住在那里。"},{"type":"paragraph","text":"有一天，政治部甘泗淇副主任的曹秘书找我来了，说：“你们怎么搞的，把毛主席都挡在了大门外！”他叫我们查一查。一查就查到只有16岁的新战士李怀栋头上。"},{"type":"paragraph","text":"李怀栋回忆说：那天中午大家都休息了，来了位身材魁梧穿黑粗布服的同志，说想找一下甘泗淇同志。我说，总务处有规定，首长休息时间一律不准放人进去。我让他再问一下收发。那位同志又走了几步，敲了几下收发室的门。收发也没有开门看看是谁，便说不让进去。那位同志转过身来，说着“好吧，好吧”，向我招手再见就回去了。"},{"type":"paragraph","text":"我问，那位同志来时是一个人还是有人陪着，小李说没有看到别的人。我又问他往哪里走了，小李说他过了延河，向王家坪方向去了。我见过毛主席，还握过他的手哩，小李说的特征和我心中的印象对上了号。我慌了，连声说：你档的不是一般人，是毛主席啊！"},{"type":"paragraph","text":"这件事发生后，我心里很不平静，既内疚，同时对毛主席更加敬重。毛主席是我们敬仰的伟大领袖，但他慈祥和蔼，平易近人，始终把自己当作普通人。就连一条不成文的规定，他也和大家一样严格遵守。"},{"type":"paragraph","text":"我是16岁扔掉地主的羊鞭参加红军的，对党有着朴素的感情。这事使我进一步认识到毛主席好，共产党好。我干革命的劲头更足，斗志更旺，因为我坚信：革命能成功，中国有希望。"},{"type":"paragraph","text":"（宋亚田、朱志斌整理）"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0badac9c40"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
