伍高举马克思、列宁和毛主席巨幅画像雄赳赳地前进","authors":[],"dates":[{"year":1969,"month":2,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反对西德希腊等国反动统治集团镇压人民运动"},{"type":"paragraph","text":"西柏林工人学生举行反法西斯示威"},{"type":"paragraph","text":"游行队伍高举马克思、列宁和毛主席巨幅画像雄赳赳地前进"},{"type":"paragraph","text":"新华社十六日讯　西柏林消息：一千多名西柏林青年学生、市民以及在西柏林工作和学习的西班牙、希腊、伊朗和土耳其的工人、学生，十五日联合举行强大的示威游行，反对西德、希腊等国家的反动统治集团镇压人民运动的法西斯暴行。"},{"type":"paragraph","text":"游行队伍高举着马克思、列宁和毛主席的巨幅画像，冒着严寒，雄赳赳地通过市中心。队伍中的无数面红旗迎着风雪飘扬，显得格外鲜艳夺目。示威者举着的标语牌上写着：“打倒法西斯！”“打倒美帝国主义和苏联修正主义！”在希腊工人和学生队伍最前列的标语牌上写着：“为一个社会主义的希腊前进！”"},{"type":"paragraph","text":"群众示威使西柏林市当局吓破了胆，它派出了三千名警察对示威者进行镇压。他们用警棍野蛮殴打示威者，打伤了一些人，逮捕了九人。示威者不畏强暴英勇地进行回击。游行结束后，部分群众前往西柏林技术大学举行了抗议集会。"},{"type":"paragraph","text":"另据报道，在西德汉诺威市，一千多名西班牙工人和西德工人十五日也冒着风雪举行示威，反对西班牙佛朗哥法西斯独裁政权。示威者经过西班牙领事馆时，愤怒地用石块砸破了领事馆的玻璃窗。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"33a3164533"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
