art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席怎么说；我们就怎么做","authors":[],"parts":[{"type":"paragraph","text":"对毛主席关于“知识青年到农村去”的重要指示，伍远润同志坚决贯彻执行，半点都不含糊。"},{"type":"paragraph","text":"“毛主席怎么说，我们就怎么做”。这是毛主席的好战士王杰提出的口号，也是我们每个同志必须遵循的重要政治原则。"},{"type":"paragraph","text":"“四人帮”疯狂反对伟大领袖和导师毛主席，反对伟大的毛泽东思想，极力破坏和干扰广大人民群众执行毛主席的革命路线、落实毛主席的指示。以华主席为首的党中央，一举粉碎了“四人帮”，排除了干扰，我们就要更加自觉地贯彻执行毛主席的革命路线，落实毛主席的指示。"},{"type":"paragraph","text":"孩子从学校毕业了，到哪里去？这不但关系到孩子走什么道路的问题，而且关系到是不是坚决照毛主席的指示办事的问题。在这一点上，伍政委不走后门，不谋私利。他想得深，看得远，做得对，很值得学习。"}],"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ad559ab85a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
