得伟大胜利","authors":[],"dates":[{"year":1968,"month":10,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"我驻意大利奥地利智利商务代表处举行招待会"},{"type":"paragraph","text":"许多朋友热烈祝贺我国无产阶级文化大革命取得伟大胜利"},{"type":"paragraph","text":"据新华社讯　中国国际贸易促进委员会驻意大利商务代表处一日在罗马举行招待会，热烈庆祝中华人民共和国成立十九周年。"},{"type":"paragraph","text":"意大利共产党（马克思列宁主义）总书记福斯科·迪努齐同志和党的其他领导同志出席了招待会。"},{"type":"paragraph","text":"意大利对外贸易协会负责人和其他友好人士以及一些国家驻罗马的外交使节约四百人参加了招待会。"},{"type":"paragraph","text":"在招待会上，意大利朋友热情祝愿中国人民的伟大领袖毛主席万寿无疆；热烈祝贺中国无产阶级文化大革命所取得的伟大胜利。"},{"type":"paragraph","text":"中国国际贸易促进委员会驻奥地利商务代表处临时代表蔺海程一日在维也纳举行招待会，热烈庆祝中华人民共和国成立十九周年。"},{"type":"paragraph","text":"二百多人出席了招待会，其中有：奥地利联邦商会负责人，各界友好人士、工人、青年学生和旅奥华侨以及一些国家的驻奥外交使节。"},{"type":"paragraph","text":"奥地利马克思列宁主义党中央的主要负责同志也应邀出席了招待会。"},{"type":"paragraph","text":"许多进步朋友在招待会上热烈祝贺毛主席亲自发动和领导的中国无产阶级文化大革命的伟大胜利。"},{"type":"paragraph","text":"中国驻智利商务代表处九月三十日举行招待会，庆祝中华人民共和国成立十九周年。"},{"type":"paragraph","text":"智利政府的一些官员、智利参议院议长和一些议员出席了招待会。"},{"type":"paragraph","text":"出席招待会的还有智利政界的一些知名人士、首都圣地亚哥和瓦尔帕莱索、康塞普西翁等省的工商界的朋友和其他各界人士以及在智利的爱国华侨。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"38b9255c3b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
