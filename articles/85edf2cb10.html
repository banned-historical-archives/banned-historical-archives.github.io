art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"谢胡主席致电华国锋总理表示祝贺","authors":[],"parts":[{"type":"paragraph","text":"新华社讯 阿尔巴尼亚社会主义人民共和国部长会议主席谢胡三月七日打电报给华国锋同志，对他担任国务院总理致以最良好的祝愿。电报全文如下："},{"type":"paragraph","text":"北京"},{"type":"paragraph","text":"中华人民共和国国务院总理"},{"type":"paragraph","text":"华国锋同志："},{"type":"paragraph","text":"在您当选担任中华人民共和国国务院总理的崇高职务之际，我代表阿尔巴尼亚社会主义人民共和国部长会议并以我个人名义向您致以最良好的祝愿。"},{"type":"paragraph","text":"祝兄弟的中国人民在社会主义道路上前进，祝我们两国人民、两国之间的友谊和合作关系在马克思列宁主义和无产阶级国际主义的基础上发展和加强。"},{"type":"paragraph","text":"阿尔巴尼亚社会主义人民共和国部长会议主席 穆罕默德·谢胡"},{"type":"paragraph","text":"一九七八年三月七日于地拉那"}],"alias":""},"tags":[{"name":"华国锋","type":"人物"},{"name":"谢胡","type":"人物"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"85edf2cb10"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
