<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"jfjb","name":"解放军报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"dates":[{"year":1981,"month":9,"day":2}],"page_start":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"北京市委部署贯彻全国思想战线问题座谈会精神要求各级领导带头开展批评和自我批评，带头改变涣散软弱状态，带头反对自由化思潮，带头抓好思想政治工作","authors":[],"parts":[{"type":"paragraph","text":"据新华社9月1日讯 中共北京市委最近召开思想战线问题座谈会。市委第一书记段君毅在会上指出，全市各级党的领导一定要坚决贯彻全国思想战线问题座谈会的精神。邓小平同志的谈话和胡耀邦同志的讲话中指出的思想战线领导存在着的涣散软弱状态的问题，完全符合北京市的实际情况。我们要联系北京市的工作实际，按照中央的精神，实事求是地进行总结和检查，认真开展批评和自我批评，认真克服各种错误倾向，特别是资产阶级自由化的倾向。市委要带头开展批评和自我批评，带头改变对思想战线领导的涣散软弱状态，带头反对资产阶级自由化的思潮，带头抓好思想政治工作。全市各级党的领导也都要这样做。"},{"type":"paragraph","text":"参加这次座谈会的，有全市文艺、理论、教育、新闻出版等部门，城近郊区、部分局，以及宣传部门的负责人和工作人员共三百多人。"},{"type":"paragraph","text":"中共北京市委书记刘导生代表市委在会上讲话。他说，党的三中全会以来，全市思想战线的工作成绩很大，必须肯定；问题不少，不容忽视。他说，资产阶级自由化的思潮，在我们北京市文艺、理论、新闻出版等部门都有不同程度的反映。例如在文艺界，就出现了一些错误的理论和主张，其焦点就在于不要党领导文艺，反对开展正常的文艺批评。代表严重错误倾向的电影剧本《苦恋》，1979年发表在北京的《十月》期刊上，我们没有及时发现它的问题，没有给予有力的批评，这就是软弱的表现。有的部门个别人甚至反对对它进行批评。"},{"type":"paragraph","text":"刘导生说：现在，我们继续清除左的指导思想的影响和反对资产阶级自由化的倾向，都是为了贯彻三中全会以来党的路线、方针、政策和六中全会的精神。纠正左的指导思想的问题，决不能放松，决不能半途而废。同时，我们绝不能对当前存在的资产阶级自由化倾向放弃批评和必要的斗争。各级党委的涣散软弱，主要是表现在对资产阶级自由化倾向软弱无力。我们必须坚决纠正这种状况。他说，各级党组织都要进一步学好六中全会通过的《决议》，把我们的思想统一到《决议》的基本结论上来。各级党组织都要有一个好的精神状态。精神状态不改变，涣散软弱的问题就解决不了，批评和自我批评就开展不起来，自由化的倾向也就难以克服。"},{"type":"paragraph","text":"刘导生代表市委，就贯彻全国思想战线问题座谈会精神，作出了具体部署。"}],"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c6122078b8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
