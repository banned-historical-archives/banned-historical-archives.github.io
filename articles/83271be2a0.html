art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"愤怒声讨邓小平翻案复辟罪行","authors":["海军某部六连全体指战员"],"parts":[{"type":"paragraph","text":"中共中央的两个决议，是毛主席的英明决策，是毛主席革命路线的伟大胜利，是对国内外阶级敌人的沉重打击！中央的决议，代表了无产阶级和广大劳动人民的根本利益，反映了我们革命战士的意愿，说出了我们广大指战员的心里话，我们坚决拥护！"},{"type":"paragraph","text":"毛主席亲自发动和领导的反击右倾翻案风的伟大斗争，是无产阶级文化大革命的继续和深入，是无产阶级和资产阶级的大搏斗，关系到我们党和国家前途、命运。在毛主席、党中央的领导下，这场斗争取得了伟大胜利。但是，阶级敌人不甘心自己的失败，总是要进行疯狂的反扑。天安门广场的反革命政治事件，就是阶级敌人的垂死挣扎。他们疯狂反对毛主席，反对以毛主席为首的党中央，同时又公开打出拥护邓小平的旗号，明目张胆地无耻吹捧邓小平反革命的修正主义路线，妄图推出邓小平当中国的纳吉。这说明反击右倾翻案风的斗争，是一场严重的阶级大搏斗，必然要遭到国内外阶级敌人，特别是党内资产阶级的抵抗和捣乱。"},{"type":"paragraph","text":"“凡是敌人反对的，我们就要拥护；凡是敌人拥护的，我们就要反对。”我们革命战士衷心爱戴、誓死保卫伟大领袖毛主席，衷心拥护、誓死保卫以毛主席为首的党中央；我们愤怒声讨邓小平搞修正主义、复辟资本主义的反动罪行，愤怒声讨一小撮阶级敌人在天安门广场制造反革命政治事件的罪行！谁反对毛主席，谁反对以毛主席为首的党中央，我们就坚决和他斗到底！"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"83271be2a0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
