1958,"month":4,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"作家出版社最近将陆续出版由“文艺报”编辑部编的三种批判资产阶级文艺思想的书:"},{"type":"paragraph","text":"“再批判”:以“文艺报”今年第二期再批判特辑为基础，坯选入了批判“莎菲女士的日记”“我在霞村的时候”等文章，附录了被批判的毒草。这书已编好，即将出版。"},{"type":"paragraph","text":"“批判修正主义文艺思想”:在全国广泛展开对修正主义文艺思想的批判后，已经有大批的批判文章发表出来。本书将收集其中有代表意义的质量较高的文章，以供读者参考。"},{"type":"paragraph","text":"“批判冯雪峰文艺思想”:本书将收集对冯雪峰的文艺思想、社会思想进行批判的文章。这两本书将在年底编好。"},{"type":"paragraph","text":"此外，作家出版社还将重印原由大众书店出版的“萧军思想批判”。这次重印除有几篇文章作了个别文字上的修订外，在编目上稍有增删。同时将萧军在东北办“文化报”时放出的毒草附录一部分，供读者参考，以便进一步对萧军思想进行批判。这本书将在第二季度出版。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fe993d3bbd"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
