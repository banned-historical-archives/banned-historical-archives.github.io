art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"用毛主席的不断革命思想武装头脑","authors":["营长陈伯悦"],"parts":[{"type":"paragraph","text":"要做到在无产阶级专政下继续革命、彻底革命，就必须努力学习毛主席关于无产阶级专政下继续革命的伟大理论。毛主席总结了国际国内无产阶级专政的历史经验，提出了无产阶级专政下继续革命的伟大理论，在马克思主义发展史上树立了第三个光辉的里程碑。只有学习和掌握毛主席这一伟大理论，才能懂得社会主义社会仍然存在着阶级、阶级矛盾和阶级斗争，才能懂得无产阶级专政下必须继续革命，以及革谁的命，怎样革命，才能始终保持旺盛的革命斗志，不断把革命推向前进。"},{"type":"paragraph","text":"三年来的无产阶级文化大革命，使我们对毛主席关于无产阶级专政下继续革命的伟大理论，比过去有了较深刻的理解。但是，无产阶级专政下继续革命的路程还很长，仅仅有这一点理解是远远不够的。我们必须反复深入学习毛主席的这一伟大理论，武装头脑，指导行动，紧跟伟大领袖毛主席，把无产阶级专政下的革命进行到底！"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"868a95cf6b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
