tart":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"华总理会见希腊总理卡拉曼利斯宾主就共同关心的国际问题广泛地交换了意见","authors":[],"parts":[{"type":"paragraph","text":"新华社十一月十五日讯 华国锋总理今天下午会见了希腊总理康斯坦丁·卡拉曼利斯。"},{"type":"paragraph","text":"华国锋总理对卡拉曼利斯总理第一次来中国访问表示热烈欢迎。他说：中希两国建交以来，我们两国关系一直是好的。这次卡拉曼利斯来访对加强我们相互之间的了解和友谊作出了很好的贡献。"},{"type":"paragraph","text":"卡拉曼利斯总理对他同邓小平副总理的会谈表示满意。他说：我们的会谈是非常友好的，也是非常有益的。华国锋总理说，友好地交换意见对双方都有好处。"},{"type":"paragraph","text":"宾主还就共同关心的国际问题广泛地交换了意见。"},{"type":"paragraph","text":"会见时在座的有："},{"type":"paragraph","text":"希腊外交部长乔治·拉利斯；"},{"type":"paragraph","text":"我国外交部副部长张海峰、部长助理宋之光，中国驻希腊大使何扬。"}],"alias":""},"tags":[{"name":"华国锋","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c64196b1fb"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
