tart":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"简明新闻","authors":[],"parts":[{"type":"paragraph","text":"中共中央副主席邓小平今天上午在人民大会堂会见了土耳其外交部长伊尔泰尔·蒂尔克曼及随行人员。"},{"type":"paragraph","text":"会见时，邓小平对蒂尔克曼的来访表示欢迎。他说，外长这次访问是发展中、土两国关系的重要步骤。"},{"type":"paragraph","text":"国务院总理赵紫阳今天下午在中南海紫光阁会见了土耳其外交部长伊尔泰尔·蒂尔克曼及其随行人员。"},{"type":"paragraph","text":"赵紫阳在谈话中热情赞扬土耳其人民在埃夫伦将军和土耳其政府的领导下在政治、经济等方面所取得的成就。赵紫阳说，我们两国都有发展友好关系的愿望，我相信两国的友好关系将会越来越好。"},{"type":"paragraph","text":"商业部今天发出关于做好旺季市场供应工作的通知，要求各级商业部门要一手抓紧物资上的安排，扩大销售，搞好供应；一手抓紧企业经营作风的整顿，认真执行政策，提高服务质量，让广大群众高高兴兴地欢度新年和春节。"},{"type":"paragraph","text":"一九七八、一九七九两年，全国农村建房四亿平方米；一九八○年，建房五亿平方米；今年农村建房面积又将超过去年，可达六亿平方米。这样，在最近四年时间里，我国农村共计建造了十五亿平方米的房屋，全国八亿农民平均每人增加了近两平方米的住房。"},{"type":"paragraph","text":"截至十二月十五日止，列入国家计划的十八种主要化工产品，有十六种已经提前完成全年产量计划，有的提前了两个月；另外两种也达到了计划进度要求。（据新华社十九日讯）"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"赵紫阳","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bb86d9a4f5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
