":[{"year":1945,"month":9,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【中央社重庆四日电】蒋主席二日晚，欢宴毛泽东等氏，及各部首长后，曾与毛氏单独谈话，三日晨，王部长世杰亦与毛氏作单独会谈，下午张治中张群邵力子三氏与周恩来王若飞两氏会谈，四日晨张治中与周恩来氏单独会谈，下午蒋主席在军委会于茶会招待中外来宾后，复与毛氏再度单独谈话，晚九时，张治中，张群，邵力子再与周恩来王若飞两氏会谈，各次谈话，均历时甚长，迄三日止，相当普遍之交换意见阶段，业已完毕，目前则就个别问题，作相当具体之讨论。"}],"comments":[],"origin":"中央社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"08934281b2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
