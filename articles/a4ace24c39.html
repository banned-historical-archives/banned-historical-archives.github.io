调查报告上的批示","authors":["罗瑞卿"],"dates":[{"year":1978,"month":7,"day":2}],"is_range_date":false,"parts":[{"text":"罗瑞卿在总后勤部关于靳来川等利用医疗手段将贺龙致死的调查报告上的批示","type":"title"},{"text":"罗瑞卿","type":"authors"},{"text":"〖总后勤部党委上报军委、总政《关于林彪一伙指使其死党靳来川、曹根慧利用医疗手段将贺龙致死的初步调查报告》，罗瑞卿批示〗","type":"appellation"},{"text":"韦主任并总政党委：","type":"appellation"},{"text":"总后党委的这个报告，以大量事实揭露了林彪一伙残酷谋害贺龙同志严重罪行，彻底弄清这一案件完全必要。我意：","type":"paragraph"},{"text":"一、当时的专案组负责人和靳来川、曹根慧等怎样领受林彪一伙残害贺龙同志的罪恶阴谋，有计划、有步骤地谋害贺龙同志，还要进一步追查清楚。","type":"paragraph"},{"text":"二、在谋害贺龙同志的案件中，原专案组副组长芦凤歧（现为××军×××师副政委）和护士王贺志（现为×××医院医生），负有严重罪责，是查清这一案件的关键人物。我意电话告北京军区秦基伟同志，请他们设法动员卢、王交待揭发，最好是向他们讲清政策，让他们主动这样做。","type":"paragraph"},{"text":"三、鉴于此案涉及范围广，人员多，建议由总政组织专人协同总后进一步查明真相，向军委做出报告。对有关人员的处理，待全案查清后再做决定。","type":"paragraph"},{"text":"可否，请裁夺！","type":"paragraph"},{"text":" 罗瑞卿","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"贺龙","type":"人物"},{"name":"林彪","type":"人物"},{"name":"罗瑞卿","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a4ace24c39"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
