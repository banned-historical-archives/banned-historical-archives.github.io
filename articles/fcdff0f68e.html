" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"毛泽东关于三反斗争展开后要将注意力引向搜寻大老虎的电报","authors":["毛泽东"],"dates":[{"year":1952,"month":1,"day":23}],"is_range_date":false,"parts":[{"text":"毛泽东关于三反斗争展开后要将注意力引向搜寻大老虎的电报","type":"title"},{"text":"毛泽东","type":"authors"},{"text":"中央和军委各部，中央人民政府各党组；各中央局，并转分局、省市区党委；各大军区，志愿军，并转各级军区和各军：","type":"appellation"},{"text":"凡属大批地用钱管物的机关，不论是党政军民学哪一系统，必定有大批的贪污犯，而且必定有大贪污犯（“大老虎”）。有些人以为党的机关，宣传和文化教育机关，民众团体，用钱不多，必无大老虎，这是不正确的。早几天还以为中央文教机关一个老虎也没有，经过最近两天的寻找研究，就发现至少可以捉到十五个贪污一亿元以上的大老虎。因此，请你们注意，在每一部门、每一地区三反斗争激烈展开之后，就要将同志们的注意力引向搜寻大老虎，穷追务获，不要停留，不要松劲，不要满足于已得成绩。在这方面，要根据情况，定出估计数字，交给各部门为完成任务而奋斗。在斗争中还要根据情况的发展，追加新任务。例如中央一级，在一月十八日以前查出的一万名贪污分子（其中有很多人款数甚少，情节甚轻，迹近贪污，实际不能叫作贪污）中，只有十八名一亿元以上的大贪[污]犯。至一月十八日，认为可以再查出五十名。最近两天又有增加。估计将来还有增加。这一经验务请你们注意。要向同志们指出：如果他们不愿意包庇大贪[污]犯，以致将来查出来（总有一天会查出来）自己要受指责和处分，就应组织一切可用的力量为搜尽一切暗藏的大贪污犯而奋斗。下面是空军党委一月二十二日关于布置搜寻大贪污犯的报告，可供你们参考。","type":"paragraph"},{"text":" 毛泽东一月二十三日","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fcdff0f68e"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
