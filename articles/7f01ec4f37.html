ical-archives/banned-historical-archives0/main/maoquanji33.pdf"],"article":{"title":"在中央会议中应有军委议程","alias":"","parts":[{"type":"paragraph","text":"在中央会议中应有军委议程"},{"type":"paragraph","text":"（1953年5月27日）彭德怀同志，并黄克诚同志："},{"type":"paragraph","text":"在中央会议中，每月或每两月，应有一次军委的议程。例如早几天克诚同志要和我谈的后勤会议的情况，即可向中央会议作一次报告，其办法是用文字简明地写出来，交杨尚昆同志印发各同志，列入议程，开会时由黄再作简单说明。其他各部门重要事项，准此类推。如同意，请照办。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"五月二十七日[1]彭德怀，当时任人民革命军事委员会副主席。[2]黄克诚，当时任中国人民解放军副总参谋长。[3]杨尚昆，当时任中共中央办公厅主任。"}],"authors":["毛泽东"],"dates":[{"year":1953,"month":5,"day":27}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":185,"page_end":185},"tags":[{"name":"毛泽东","type":"人物"},{"name":"彭德怀","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7f01ec4f37"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
