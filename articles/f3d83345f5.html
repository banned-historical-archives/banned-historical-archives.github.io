"year":1983,"month":4,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"万晨在“文革”中搞打砸抢被开除党籍"},{"type":"paragraph","text":"本报讯　中共甘肃省张掖地委最近批准临泽县委的决定，将“文革”中犯有打砸抢错误的临泽县县委党校副校长万晨免去职务，开除党籍。"},{"type":"paragraph","text":"万晨原是上海复旦大学哲学系学生。1970年8月毕业分配到临泽县工作，1976年9月入党，1980年11月任临泽县县委党校副校长。经复旦大学及有关单位调查落实，万晨在“文化大革命”中，多次动手打人，手段极其恶劣残忍。尤其在1968年“清队”中，复旦大学哲学系教师李良鹏因所谓“政治嫌疑”问题被“隔离审查”。其间，李良鹏同志多次遭到万晨等人的毒打，万晨曾4次参与殴打李良鹏同志，用烟头烫李的身体。特别恶劣的是，在李遭受非人折磨，身体状况明显恶化，开始呕吐、尿血的时候，万晨仍然伙同诸打手对李拳打脚踢，手打疼了，又用绳子拧成鞭子，惨无人道地轮番抽打李良鹏同志的下身，致使李皮开肉绽，惨不忍睹，由于伤势严重，又拖延治疗，李终于死亡。万晨是直接毒打、迫害李良鹏致死的主要责任者之一。上述问题，万晨在入党时，没有如实向党组织交代清楚。1981年8月，复旦大学纪委派人去临泽调查李良鹏被殴打致死一案时，万开始态度不够端正，后经县委领导同志批评教育，才承认其所犯错误。中共临泽县委根据万晨所犯错误事实，决定免去其县委党校副校长的职务，并开除党籍。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"清理阶级队伍","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f3d83345f5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
