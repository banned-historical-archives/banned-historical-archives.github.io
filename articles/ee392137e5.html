" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"公安部对甘肃省公安厅关于取缔银川、吴忠地区瑶池道的批复","authors":[],"dates":[{"year":1955,"month":9,"day":12}],"is_range_date":false,"parts":[{"text":"公安部对甘肃省公安厅关于取缔银川、吴忠地区瑶池道的批复","type":"title"},{"text":"7月19日公治684号函悉。根据所报材料，反动会道门“瑶池道”与四川拟于最近取缔的“万全堂”相同，实系先天道，是一种带有全国性的反动会道门。为此，同意你们进行公开取缔。但在取缔前必须充分作好准备工作：切实弄清该道的组织情况，特别是首要分子的罪恶事实；认真做好审批逮捕名单和开展宣传，充分发动群众的工作。此外，并请参照本部8月27日公发未字524号电转复四川取缔“万全堂”的通报办理。此复。","type":"paragraph"}],"comments":[],"origin":"《取缔反动会道门工作历史资料汇编（1948－1992年）》，公安部一局编印， 2009年。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ee392137e5"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
