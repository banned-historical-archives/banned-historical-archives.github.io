" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji33","name":"毛泽东全集第33卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji33.pdf"],"article":{"title":"关于在反官僚主义的斗争中学习做领导工作的批语","alias":"","parts":[{"type":"paragraph","text":"关于在反官僚主义的斗争中学习做领导工作的批语\""},{"type":"paragraph","text":"（1953年4月10日）"},{"type":"paragraph","text":"此件发给各同志阅看。就是要这样和被领导的单位密切联系，抓紧检查，全盘了解情况，发现问题及时解决，改正错误，表扬成绩，使工作任务能按计划完成，才算有了合乎情况发展的领导。目前，我们的经济工作中，无领导的现象太多了，必须在反官僚主义的斗争中学得做领导工作的能力和方法。领导者无领导，这是官僚主义者，不是领导者。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一九五三年四月十日"},{"type":"paragraph","text":"[1]这个批语写在中央人民政府地质部党组1953年4月3日关于反官僚主义的检查情况给毛泽东并中央的报告上。报告中说，当前最突出的官僚主义表现是：部、各地区局与勘探队上下脱节，情况不明，大事不摸底；工作指导上控制不紧，检查不严，严重缺乏思想性，以致好事得不到发扬，坏事得不到改正，存在放弃领导，甚至发生分散主义的现象。为了克服官僚主义，准备采取派出调查组，分工负责与局、队联系，进一步了解情况发现问题，并推动局、队揭发官僚主义等措施。"}],"authors":["毛泽东"],"dates":[{"year":1953,"month":4,"day":10}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":129,"page_end":129},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6ae4002752"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
