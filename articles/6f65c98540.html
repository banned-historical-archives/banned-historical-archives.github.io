"year":1977,"month":4,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"“四人帮”出于篡党夺权的反革命需要，把他们自己搞的项目吹嘘为“天字第一号”，破坏国家的统一计划和国家重点科研项目，肆意侵占国家重点工程项目的人力、物力、财力。比如“四人帮”及其在上海的余党要搞一个项目，就强令我所立即上马。“四人帮”的余党还说什么:一切项目都要为此“让路，开绿灯”，限时限刻完成，迫使我们不得不把国家下达的任务停下来。他们在建造某一实验装置时，根本不作周密的调查研究，就把方案拿出来，匆匆上马，责令有关单位调人，调材料，调设备。谁说个不字，就被扣上一顶帽子，打一顿棍子，逼着研究单位从国家重点研究项目中抽人，调仪器设备。而他们花费了几百万元建造的庞大实验装置，却根本用不上，被丢弃在一旁，造成了国家财产的极大浪费。"},{"type":"paragraph","text":"上海光学精密机械研究所任飞"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"夺权","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6f65c98540"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
