art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"战无不胜的毛泽东思想是我们斗争的武器 伟大的社会主义祖国是我们最可靠的靠山港九各业工人热烈拥护我外交部声明，誓把反迫害斗争进行到底","authors":[],"parts":[{"type":"paragraph","text":"据新华社香港十五日电 据香港《新晚报》今天报道，斗争中的港九各业工人热烈拥护我外交部的声明，他们兴奋地说：我们的祖国发言了；我们有强大的祖国支持，更加不怕反动的腐朽的英帝国主义，更加有信心把这场反迫害斗争进行到底，夺取最后胜利。他们警告香港英国当局：必须立即无条件接受我外交部声明中提出的五项严正要求，否则，由此引起的一切后果，必须由英国政府和香港英国当局完全负责。"},{"type":"paragraph","text":"报道说，香港《文汇报》、《大公报》今天中午都出版号外，报道我国外交部副部长罗贵波今晨召见英国代办霍普森，面交我国外交部声明，最紧急、最强烈抗议香港英国当局对香港中国工人和居民的法西斯暴行的消息。在斗争中的各业工人看到号外后欢欣鼓舞，他们说：伟大的社会主义祖国从来都是香港同胞最可靠的靠山，我们有强大的祖国支持，有祖国七亿同胞做后盾，有战无不胜的毛泽东思想做我们斗争的武器，我们决不害怕反动的香港英国当局。香港英国当局追随美帝国主义，反对伟大的新中国，胆敢对中国同胞和工人进行迫害，他们只会得到“搬起石头打自己的脚”的结果。许多工人在读到号外刊载的外交部声明之后，欢呼：“伟大的社会主义祖国万岁！”“中国共产党万岁！”“毛主席万岁！”"},{"type":"paragraph","text":"用毛泽东思想武装起来的香港工人，是吓不倒、压不垮的。图为一位被无理逮捕的工人在大街上高呼：“毛主席万岁！” 新华社稿（照片）"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"892a883135"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
