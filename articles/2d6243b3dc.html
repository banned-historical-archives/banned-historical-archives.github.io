<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"意大利朋友热烈支持中国无产阶级文化大革命  文化大革命开辟了通向共产主义的道路","authors":[],"dates":[{"year":1967,"month":11,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"意大利朋友热烈支持中国无产阶级文化大革命"},{"type":"paragraph","text":"文化大革命开辟了通向共产主义的道路"},{"type":"paragraph","text":"“意大利的真正革命者，怀着深厚的感情注视着中国的无产阶级文化大革命，支持中国无产阶级革命派的斗争，支持以毛泽东同志为代表的革命路线。我们清楚地知道，这场大革命的胜利是战无不胜的毛泽东思想的胜利，也是我们的胜利，是全世界革命人民的胜利。当代最伟大的马克思列宁主义者毛主席万岁！万万岁！”不久前访问我国的意中文化友好关系协会访华代表团的同志们在北京一次广播讲话中的这些话，表达了意大利真正的马克思列宁主义者的感情，代表了意大利革命人民的声音。"},{"type":"paragraph","text":"意中文化友好关系协会访华代表团的同志们对我们伟大领袖、世界人民心中的红太阳毛主席满怀热爱，对毛泽东思想无限崇拜。当他们来到中国红色的国土，刚刚踏上首都机场的时候，全团的同志就热情高呼：“毛主席万岁！”“毛主席万万岁！”"},{"type":"paragraph","text":"代表团在中国参观访问期间，《毛主席语录》总是随身携带，每天结合参观访问认真学习毛主席的教导。他们深深体会到战无不胜的毛泽东思想是当代世界人民争取解放的唯一指导思想。代表团团长恩里克·拉姆巴尔蒂在离开中国前夕说：“在中国的访问，使我们越来越相信，今天世界上的中国，就是当年的革命根据地延安。在当代最高水平的马克思列宁主义——战无不胜的毛泽东思想指引下，世界人民一定能够取得反对帝国主义、修正主义和各国反动派的胜利。”"},{"type":"paragraph","text":"代表团的同志们带来了意大利革命人民对中国无产阶级文化大革命的热烈支持和期望。代表团同志们来到中国后，热情地学习中国无产阶级文化大革命的经验，积极向中国无产阶级革命派学习。代表团在北京期间，曾连夜赶写了一张题为《痛打落水狗》的大字报。在这张革命的大字报中，他们同中国无产阶级革命派心连心，表示坚决支持中国无产阶级革命派斗批中国党内最大的走资本主义道路的当权派，并且要发扬革命造反精神，大造意大利修正主义者的反。代表团成员卡尔梅罗·弗拉戈梅尼在他的一篇广播讲话中，也充分表达了意大利真正的革命者对中国无产阶级文化大革命的感情。他说，中国无产阶级文化大革命是人类历史上独一无二的经验，它是对马克思列宁主义的进一步发展。中国无产阶级文化大革命解决了在无产阶级专政的条件下，用革命的方法巩固政权的问题，防止了资本主义复辟的危险。"},{"type":"paragraph","text":"弗拉戈梅尼说，中国无产阶级文化大革命，标志着世界历史的崭新阶段，这场革命开辟了通向共产主义的大道。它的经验不仅是中国人民的，也是世界人民的经验，它向世界人民指出了彻底击溃帝、修、反所应遵循的道路。"},{"type":"paragraph","text":"（据新华社）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2d6243b3dc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
