<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"jfjb","name":"解放军报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"dates":[{"year":1968,"month":7,"day":5}],"page_start":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"掌握了毛泽东思想，什么人间奇迹都能创造出来","authors":["麦贤得所在艇“海上英雄艇”艇长张志兴"],"parts":[{"type":"paragraph","text":"过去，听说钢琴是一种“高级”的乐器，只能弹奏十八、十九世纪资产阶级的古典名曲，弹一般歌曲就是降低了它的身份；只能供那些脑满肠肥的老爷、太太、小姐消遣，工农兵是没有资格欣赏的。几百年来，钢琴就是这样贴着“高级”的商标，摆在那些贵族老爷的客厅里，成了他们的“专有品”。"},{"type":"paragraph","text":"钢琴艺术要不要革命？能不能革命？过去，文艺界的反革命修正主义分子周扬一伙及其总后台中国赫鲁晓夫，是不让碰的。他们象假洋鬼子一样，挥舞着“文明棍”，不许革命，压制革命。早在一九六四年，江青同志就根据毛主席“古为今用，洋为中用”的光辉思想，指示要钢琴为革命现代京剧伴唱。可是，那一小撮反革命修正主义分子却横加封锁，拒不执行，使这一重要指示迟迟不能和革命文艺战士见面。"},{"type":"paragraph","text":"轰轰烈烈的无产阶级文化大革命，彻底粉碎了这一小撮阶级敌人的罪恶阴谋。在无产阶级文化大革命大好形势的鼓舞下，革命文艺战士起来造了他们的反，缴了他们的“文明棍”，发挥大无畏的革命首创精神，破除迷信，敢想、敢干、敢革命，敢于走自己的路，敢于走别人没有走过的路。钢琴是个不能碰的“音乐之王”吗？革命文艺战士以豪迈的英雄气概，敢于去冲；钢琴不能为现代革命京剧伴唱吗？革命文艺战士以坚韧不拔的革命意志，敢于去闯；钢琴不能为工农兵服务吗？革命文艺战士以坚定不移的决心，敢于去立。在江青同志的亲切关怀和热情指导下，他们经过反复实践，终于成功地创作了钢琴伴唱《红灯记》。从此，钢琴从贵族老爷的客厅搬上了工农兵的舞台；铿锵有力的革命强音代替了软绵绵的靡靡之音；没落腐朽的钢琴艺术，变成了为工农兵群众所喜闻乐见的革命艺术。"},{"type":"paragraph","text":"从八个革命样板戏到钢琴伴唱《红灯记》的诞生，都证明了一个真理：掌握了毛泽东思想，什么人间奇迹都能创造出来。在“八·六”海战中，为什么我们一艘小小的炮艇能击沉比我们大好多倍的敌舰呢？靠的是战无不胜的毛泽东思想。为什么麦贤得同志身负重伤之后，还能坚守战斗岗位？靠的是战无不胜的毛泽东思想。有了毛泽东思想，我们就能压倒一切敌人，敌人却压不倒我们。"},{"type":"paragraph","text":"今后，我们要更加努力活学活用毛主席著作，用毛泽东思想武装自己的头脑；更进一步发扬“八·六”海战的精神，只要敌人胆敢侵犯，定叫它覆灭于大海之中，有来无回！"},{"type":"paragraph","text":"（原载《人民日报》）"}],"alias":""},"tags":[{"name":"江青","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"37e51f9ff1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
