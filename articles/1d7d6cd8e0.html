tart":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"人们汇集韶山缅怀毛泽东同志","authors":["陈澎/刘璐璐"],"parts":[{"type":"paragraph","text":"新华社长沙12月26日电（记者陈澎、刘璐璐）26日的韶山处处洋溢着热烈而又隆重的节日气氛，胸前佩戴着毛主席像章的人们从四面八方汇集到这里，以不同方式表达对一代伟人毛泽东的缅怀之情。"},{"type":"paragraph","text":"据韶山市旅游局初步统计，仅26日就有来自国内外的游客近3万人次来到韶山，借毛泽东诞辰110周年这个特殊日子，表达对伟人的崇敬和思念之情。而在此前的一周内，前来韶山的游客已经达到10万人次。"},{"type":"paragraph","text":"记者在韶山毛泽东故居、毛泽东铜像广场、火车站广场等地看到，人头攒动的缅怀队伍纷纷走进各个纪念场馆，献上鲜艳的花篮或聚集在一起高歌革命歌曲，追思伟人毛泽东。韶山市2000余名干部群众还开展了长跑比赛等纪念活动。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1d7d6cd8e0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
