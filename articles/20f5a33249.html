,"authors":[],"dates":[{"year":1953,"month":12,"day":19}],"is_range_date":false,"parts":[{"text":"新泰县粮食统购中发生强迫命令现象","type":"title"},{"text":"【山东分社十九日讯】山东省泰安专区新泰县在粮食统购工作中，由于干部强迫命令，扣粮、挤粮，造成群众恐慌，思想混乱。该县共一百一十七个乡，在统购工作开展较快的四十四个乡中即有二十六个乡发生上述错误。如八区良村乡(县委基点)采用“打虎”的方法斗争余粮户，对余粮户没有进行很好的动员，思想不通的即逐出会场令其考虑，并说这是去“挡头”。有的区干部说：“有余粮不卖就封门，对抗就给他穿上个眼(枪毙)。”九区沈村富裕中农张敏，其子报卖五千斤，而张在村民大会上只报卖三千五百斤，村干部不满，当场大加指责，其子害怕，装疯，闹得会场大乱，影响极坏。九区北堡党员朱九连因对卖粮思想不通，在党员会上受了严重批评，未能转变，第二天小组会停止他参加，因苦闷怀疑而自杀。一区马庄乡乡长将余粮户叫去开会，说：“你们有两条路：一是卖余粮，二是坐法院。”十一区放城乡乡长丁继温说：“富农的粮食不卖就没收……。”由于以上错误，造成群众恐慌发生藏粮等现象。","type":"paragraph"},{"text":"以上问题的产生，中共泰安地委认为与新泰县委领导有关，首先新泰县委对以总路线为动力，以生产互助合作为中心，带动完成统购统销等工作的方针领会不足。由于领导上存在着急躁情绪，因而助长了下边干部单纯任务的观点；其次对上级党委指示的方针口号研究不够，而是错误地提出：“依靠贫农，团结中农，向富农(包括新富农)、囤积粮食户开展坚决的斗争、斗理、斗法”。以这种办法来“挤大头”。再次，对粮食统购工作的复杂性、艰巨性认识不足，采取草率从事的态度，如县委对上级指示并未认真研究，心中无数便设了基点，而对基点工作又未认真研究，并将基点工作中的错误办法当经验来推广，因此，客观上鼓励了命令主义的蔓延。","type":"paragraph"},{"text":"为纠正以上错误，中共泰安地委已派出一地委委员前去该县具体帮助。中共中央山东分局为此发出通报，除提出地委要派出工作组去新泰县帮助外，并提出该县必须重新召开县、区、乡三级干部会议，层层打通思想；发生严重偏差的地方，干部要向群众公开检讨，挽回政治影响；以及地委今后应加强对各县的联系等。(根据泰安地委报告编写)","type":"paragraph"}],"comments":[],"origin":"1953年12月22日新华通讯社编《内部参考》。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"20f5a33249"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
