示","dates":[{"year":1985,"month":5,"day":12},{"year":1985,"month":6,"day":7}],"is_range_date":false,"authors":["薄一波"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"中共山东省委组织部编, 干审工作政策选编, 564","tags":[{"name":"薄一波","type":"主题/事件"},{"name":"三种人","type":"主题/事件"}],"parts":[{"type":"title","text":"薄一波同志的两则重要批示"},{"type":"paragraph","text":"一、 一波同志八五年五月十二日在中指办核查“三种人”小组上报的一个讲话稿上批示："},{"type":"paragraph","text":"“此件在我处多放了些时日，是在我仔细看过之后考虑的几个问题未解决。主要是如何把问题严重的人都能登记起来，我同意处分从轻一点，但已经证明是‘三种人’的，除经过长期考验，证明确已有悔改者外，原则上应开除党籍（当然还要给以出路）。犯严重错误者，应按整党决定的规定给以应得的处分；一般错误者一定是一般错误，而不应把严重错误降到一般错误。建议此件把上述精神写进去，同时把文字压缩一下。可印发省军级核查‘三种人’小组。”"},{"type":"paragraph","text":"二、 一波同志八五年六月七日在中指办核查“三种人”小组上报的一个材料上批示："},{"type":"paragraph","text":"“内容很好，指出对‘三种人’处理偏宽、粗糙，完全正确，应即采取严肃认真补救办法，一抓到底，不能放松。”"}],"alias":""},"tags":[{"name":"薄一波","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4c1b5e1573"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
