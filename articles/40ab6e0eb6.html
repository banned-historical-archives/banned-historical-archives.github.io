art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席观看越南人民军歌舞团演出","authors":["李书良"],"parts":[{"type":"paragraph","text":"新华社二十五日讯 毛泽东主席、朱德委员长和彭真、聂荣臻等党和国家领导人，今晚观看了越南人民军总政治局歌舞团演出大型革命历史舞剧《义静烈火》。"},{"type":"paragraph","text":"十九时三十分，当毛主席、朱德委员长和彭真、聂荣臻等党和国家领导人，同越南驻中国大使馆临时代办黄北、越南人民军总政治局歌舞团团长范洪居中校、副团长阮春耀中校、艺术指导阮辉瑜大尉等一起走进会场时，全场观众起立热烈鼓掌。"},{"type":"paragraph","text":"演出结束后，毛主席等走上舞台和演员们亲切握手，并一同照了相。"},{"type":"paragraph","text":"今晚观看演出的，还有中国人民解放军副总参谋长杨成武上将，总政治部副主任刘志坚中将、梁必业中将，国防部办公厅主任萧向荣中将等。"},{"type":"paragraph","text":"演出结束后，毛泽东主席等党和国家领导人上台和演员合影。"},{"type":"paragraph","text":"本报记者 李书良摄"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"聂荣臻","type":"人物"},{"name":"彭真","type":"人物"},{"name":"朱德","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"40ab6e0eb6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
