"authors":["谢金虎"],"dates":[{"year":1993,"month":12,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　在毛泽东诞辰100周年纪念日到来前夕，华东师大政教系周一平副教授著的《毛泽东生平研究七十年》最近出版。这是国内第一部对新民主主义革命时期、社会主义革命和建设时期的毛泽东生平研究的著作，很多地方都提出了作者自己独到的见解。上海党史学会会长唐培吉教授为此书作序并给予高度评价。(谢金虎)"},{"type":"paragraph","text":"本报讯　全国集邮联合会和上海造币厂、西安印钞厂为纪念毛泽东诞辰100周年，特制珍邮纪念册将于明天起在邮票公司和申泉工艺品公司首次发行。"},{"type":"paragraph","text":"本报讯　《浦东开发——茅正元摄影作品展》昨日起在市工人文化宫展出。影展作品用形象的艺术语言向人们展示了浦东新区方兴未艾的建设热潮及发生的巨大变迁。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"上海文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"18ccd68a6d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
