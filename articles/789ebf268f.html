["陈伯达"],"dates":[{"year":1967,"month":8,"day":27}],"is_range_date":false,"parts":[{"text":"陈伯达和福建双方代表告别讲话","type":"title"},{"text":"陈伯达","type":"authors"},{"text":"〖地点：西苑旅社。摘要〗","type":"appellation"},{"text":"你们要走了，我今天来看看你们向你们告别，你们要按照协议商量合作。关于拥军爱民，中央有个号召，你们按照这个号召去宣传办事，建议你们好好学习。","type":"paragraph"},{"text":"福建是前线，拥军爱民要坚决执行，按照毛主席指示办事，按照国家利益办事，不能按照派别办事。","type":"paragraph"},{"text":"（三名代表反映军分区开枪枪杀造反派）我很难过，军队不能开枪，不应该开枪，要按照拥军爱民的号召办事，要爱护造反派，要爱护红卫兵，都要做自我批评，按毛主席的指示办事。我们应该有统一的思想，就是毛泽东思想。毛泽东思想是统一的思想，统一的政策，统一的路线，不能你干你的，我干我的。你们希望不希望祖国强大，喜欢不喜欢社会主义？（众答：喜欢）希望你们按照毛主席的指示办事。","type":"paragraph"}],"comments":[],"origin":"1967年8月29日红代会清华井冈山一部第三动态组编《动态》第135期。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"陈伯达","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"福建文革","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"789ebf268f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
