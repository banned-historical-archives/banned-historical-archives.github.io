["张春桥"],"dates":[{"year":1967,"month":7,"day":16}],"is_range_date":false,"parts":[{"text":"张春桥关于农民进城问题的讲话","type":"title"},{"text":"张春桥","type":"authors"},{"text":"现在全国的文化大革命正在蓬蓬勃勃发展，形势很好，我不大同意形势不好，没有理由悲观，应该乐观。包括南方的省份，农民进城，开始镇压革命群众，这不能证明形势坏了，恰恰相反，说明无产阶级革命派强大了，那一小撮走资本主义道路的当权派，又不能得到工人的支持，又不能得到学生的支持，只好去蒙蔽一部分农民，农民受蒙蔽也不会太久，也会起来革命的，毛主席规定了。","type":"paragraph"},{"text":"这说明阶级斗争尖锐了，党内一小撮走资本主义道路的当权派，没有出路，没有力量了，他们虚弱，这样看问题，比较符合实际。在这种情况下，我们的学生受了伤，甚至死了，在这么大的革命中，不付出代价是不可能的，较比抗日战争，解放战争还是小的，这样看问题就不会悲观了。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"张春桥","type":"人物"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]},{"id":"zhangchunqiao","name":"春桥文录","internal":false,"type":"pdf","official":false,"author":"张春桥","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/zhangchunqiao.pdf"],"article":{"title":"张春桥关于农民进城问题的讲话","parts":[{"type":"title","text":"张春桥关于农民进城问题的讲话"},{"type":"paragraph","text":"现在全国的文化大革命正在蓬蓬勃勃发展，形势很好，我不大同意形势不好，没有理由悲观，应该乐观。包括南方的省份，农民进城，开始镇压革命群众，这不能证明形势坏了，恰恰相反，说明无产阶级革命派强大了，那一小撮走资本主义道路的当权派，又不能得到工人的支持，又不能得到学生的支持，只好去蒙蔽一部分农民，农民受蒙蔽也不会太久，也会起来革命的，毛主席规定了。"},{"type":"paragraph","text":"这说明阶级斗争尖锐了，党内一小撮走资本主义道路的当权派，没有出路，没有力量了，他们虚弱，这样看问题，比较符合实际。在这种情况下，我们的学生受了伤，甚至死了，在这么大的革命中，不付出代价是不可能的，较比抗日战争，解放战争还是小的，这样看问题就不会悲观了。"}],"authors":["张春桥"],"dates":[{"year":1967,"month":7,"day":16}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":199,"page_end":199,"alias":""},"tags":[{"name":"张春桥","type":"人物"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"80e88b250b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
