ical-archives/banned-historical-archives8/main/maoquanji11.pdf"],"article":{"title":"在中共中央政治局常委座谈会上的讲话","alias":"","parts":[{"type":"paragraph","text":"在中共中央政治局常委"},{"type":"paragraph","text":"座谈会上的讲话"},{"type":"paragraph","text":"（1937年8月27日）"},{"type":"paragraph","text":"无产阶级的政治和组织程度比资产阶级高，所以统一战线由无产阶级提出。在联合抗日的情况下，要把民族革命与社会革命贯通起来。在统一战线的长期过程中，国民党有计划地从各方面影响和吸引共产党及红军，我们要提高政治警觉性，要使农民和小资产阶级跟随我党走。国民党内有些人动摇于国共两党之间，这对我们吸引国民党是有利的，共产党吸引国民党的条件是存在着的。两党之间互相吸引的问题，要在斗争中解决。统一战线成功后，主要危险是右倾机会主义，要注意在党内加强教育。"},{"type":"paragraph","text":"[1]8月27日，中共中央政治局常委在洛川召开座谈会，毛泽东在会上作了重要讲话。这是讲话的一部分。"}],"authors":["毛泽东"],"dates":[{"year":1937,"month":8,"day":27}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":48,"page_end":48},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5f8d59ca7f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
