art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"梁漱溟的“笔杆子”与姚文元的“笔杆子”","authors":["战士曾阿能"],"parts":[{"type":"paragraph","text":"伟大领袖和导师毛主席在《批判梁漱溟的反动思想》一文中一针见血地指出：“蒋介石是用枪杆子杀人，梁漱溟是用笔杆子杀人。杀人有两种，一种是用枪杆子杀人，一种是用笔杆子杀人。伪装得最巧妙，杀人不见血的，是用笔杀人。”“四人帮”的吹鼓手、反动文痞姚文元也“就是这样一个杀人犯”。"},{"type":"paragraph","text":"请看，反动文痞姚文元是怎样用笔杆子杀人的。"},{"type":"paragraph","text":"在党的十大以后，“四人帮”利用手中控制的舆论工具，加紧进行分裂党的阴谋活动，妄图打倒我们敬爱的周总理和一大批从中央到地方的党政军领导同志。姚文元凭借从他的反动老子姚蓬子那里继承下来的黑“笔杆子”，利用篡夺的宣传阵地，舞文弄墨，大造篡党夺权的反革命舆论。凡是不跟他们修正主义指挥棒转的，不管你是领导还是群众，是老的还是中的、青的，统统都在打倒之列。特别不能容忍的是，在伟大领袖毛主席逝世后，他伙同王、张、江伪造所谓“临终嘱咐”，紧锣密鼓、摇旗呐喊，大造推翻以华主席为首的党中央的反革命舆论，妄图篡党夺权，实行法西斯的“镇反”、“杀人”计划，把广大革命干部和群众浸入血泊之中。但是，历史是无情的。蒋介石用枪杆子杀人，自己反被人民赶出了大陆；粱漱溟用笔杆子杀人，阴谋也没有得逞。同样，反动文痞姚文元用笔杆子杀人，也并“不是成功的纪录，而只是失败的纪录，他们没有挽救他们自己集团的灭亡”。"}],"alias":""},"tags":[{"name":"姚文元","type":"人物"},{"name":"四人帮","type":"人物"},{"name":"夺权","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6d12828155"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
