nned-historical-archives/banned-historical-archives9/main/books/十年文革中首长讲话传信录2.pdf"],"article":{"title":"李先念传达周恩来三月七日指示","parts":[{"type":"title","text":"587.李先念传达周恩来三月七日指示"},{"type":"paragraph","text":"(1967年3月9日)"},{"type":"paragraph","text":"三月九日晚8时，李先念副总理在中南海召集卫生部机关红色造反团、红旗战斗团、革命造反队联合总部、东方红公社代表以及孙正、钱信忠、黄树则、罗冬祥(防疫司副司长)等传达了周总理三月七日关于防治××问题的指示。"},{"type":"paragraph","text":"周总理指示全文如下："},{"type":"paragraph","text":"请富春、先念同志立即找卫生部孙正、钱信忠、崔义田、黄树则四同志和红色造反团、革命造反派联合总部和东方红公社三个革命造反组织谈一谈，看看他们的精神状态如何，最好建立一个防治×××办公室，以钱、崔二人和三个造反派出一人，马上开始工作，这些人要用全力以赴，不要再以其它工作干扰他们，如有困难，立即解决，并在工作中考验他们。"},{"type":"paragraph","text":"周恩来"},{"type":"paragraph","text":"一九六七年三月七日"}],"authors":["周恩来","李先念"],"dates":[{"year":1967,"month":3,"day":9}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":387,"page_end":387,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"李先念","type":"人物"},{"name":"黄树则","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"aa0b4c58dc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
