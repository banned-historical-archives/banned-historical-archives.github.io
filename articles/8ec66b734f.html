<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"胡志明主席赴莫斯科途中到达北京 毛主席胡主席会见并设宴欢迎贵宾","authors":[],"dates":[{"year":1960,"month":11,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京2日电】　应邀前往苏联参加十月社会主义革命四十三周年庆祝典礼的越南劳动党中央委员会主席、越南民主共和国主席胡志明在去莫斯科途中，今天下午乘专机到达北京。"},{"type":"paragraph","text":"胡志明主席受到刘少奇、周恩来、朱德、邓小平等党和国家领导人的热烈欢迎。"},{"type":"paragraph","text":"胡志明主席乘坐的银色飞机下午4点15分在首都机场降落时，机场上响起了热烈的掌声。这时，刘少奇、周恩来、朱德、邓小平等党和国家领导人到飞机前迎接胡志明主席，并向胡志明主席致以亲切的热烈的问候。"},{"type":"paragraph","text":"机场上举行了隆重的欢迎仪式。乐队高奏越中两国国歌后，胡志明主席由刘少奇主席陪同检阅了陆、海、空三军仪仗队。胡志明主席接受了首都少年儿童献花。"},{"type":"paragraph","text":"今天到机场欢迎胡志明主席的还有中共中央政治局委员、全国人民代表大会常务委员会副委员长彭真，中共中央政治局委员、国务院副总理陈毅、李富春，中共中央书记处书记谭政，候补书记杨尚昆，全国人民代表大会常务委员会副委员长郭沫若、陈叔通，中共中央委员、全国人民代表大会常务委员会副委员长林枫，中共中央委员刘宁一、伍修权，政协全国委员会副主席包尔汉，国防委员会副主席傅作义，外交部副部长罗贵波。"},{"type":"paragraph","text":"到机场欢迎的还有政府机关各部门、各民主党派、各人民团体和北京市的负责人，中国人民解放军高级将领和首都各界群众。"},{"type":"paragraph","text":"正在北京的越南劳动党中央政治局委员、越南民主共和国国会常务委员会副主席黄文欢，越南驻中国大使陈子平和使馆人员，在京的越南留学生、实习生，各国驻中国使节和外交官员也到机场欢迎。"},{"type":"paragraph","text":"【新华社北京2日电】　毛泽东主席、刘少奇主席今天晚上会见并设宴欢迎越南劳动党中央委员会主席、越南民主共和国主席胡志明。"},{"type":"paragraph","text":"在会见的时候，毛泽东主席、刘少奇主席同胡志明主席进行了亲切的谈话。"},{"type":"paragraph","text":"参加会见和宴会的党和国家的其他领导人有周恩来、朱德、邓小平、彭真、陈毅、李富春、李井泉、杨尚昆。参加会见和宴会的还有中共中央委员伍修权，外交部副部长罗贵波。"},{"type":"paragraph","text":"正在北京的越南劳动党中央政治局委员、越南民主共和国国会常务委员会副主席黄文欢，越南民主共和国驻中国大使陈子平，也参加了会见和宴会。"},{"type":"paragraph","text":"【新华社河内2日电】　据越南通讯社报道:以胡志明主席为首的越南民主共和国党政代表团今天上午6时30分乘专机赴莫斯科参加十月社会主义革命四十三周年庆典。"},{"type":"paragraph","text":"代表团成员有越南劳动党中央委员会第一书记黎笋，越南劳动党中央政治局委员阮志清，越南劳动党中央委员、越南民主共和国驻苏联大使阮文镜，越南劳动党中央候补委员陈先辉。"},{"type":"paragraph","text":"前往机场送行的有越南民主共和国副主席孙德胜，国会常务委员会主席长征，总理范文同，副总理范雄、武元甲、潘继遂、阮维桢、黎清毅，越南劳动党中央政治局委员黎德寿、最高人民检察院院长黄国越和各部部长以及各政治党派和群众团体的代表等。"},{"type":"paragraph","text":"苏联驻越南大使索科洛夫和其他国家外交使节以及国际委员会驻河内的代表也到机场送行。"},{"type":"paragraph","text":"【新华社北京2日电】　应邀前往苏联参加十月社会主义革命四十三周年庆祝典礼的越南劳动党中央委员会主席、越南民主共和国主席胡志明，今天上午乘飞机路过武汉时，在武汉机场作了短时间的停留。"},{"type":"paragraph","text":"胡志明主席在武汉机场上受到了热烈的欢迎和欢送。武汉市的少先队员向胡志明主席献了鲜花。前往机场迎送的有由共湖北省委书记处书记、湖北省省长张体学，中共湖北省委书记处书记、湖北省副省长赵辛初，以及武汉市党政负责人，中国人民解放军驻武汉部队首长，湖北省和武汉市政协负责人等。"},{"type":"paragraph","text":"胡志明主席由张体学省长等陪同进午餐后，即乘飞机离开武汉。"},{"type":"paragraph","text":"\u003cIMG alt=请插入4号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1960\\11\\60b3010101.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgaut\u003e侯波\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e毛泽东主席、刘少奇主席11月2日会见胡志明主席。左图为毛主席和胡主席亲切谈话。(新华社传真侯波摄)\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入4号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1960\\11\\60b3010102.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgaut\u003e杜修贤\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e胡志明主席在去莫斯科途中11月2日乘专机到达北京。右图为刘少奇主席陪同胡志明主席步出机场。(新华社传真杜修贤摄)\u003c/FONT\u003e"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"邓小平","type":"人物"},{"name":"李富春","type":"人物"},{"name":"陈毅","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"彭真","type":"人物"},{"name":"朱德","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8ec66b734f"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
