泽东思想照耀下，世界革命人民将挫败美帝苏修的任何阴谋","authors":[],"dates":[{"year":1969,"month":2,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京二日电　非洲朋友就《人民日报》、《红旗》杂志评论员文章:《走投无路的自供状——评尼克松的“就职演说”和苏修叛徒集团的无耻捧场》发表谈话，认为这篇评论极大地鼓舞了全世界革命人民，沉重地打击了以尼克松为新头目的美帝国主义和苏联修正主义叛徒集团。"},{"type":"paragraph","text":"一位名叫塔蒂的喀麦隆战士说，《人民日报》、《红旗》杂志的评论员文章，是一个极其重要的文件。这篇文章恰如其分地指出了美帝国主义和苏修叛徒集团是世界革命人民共同的敌人，它们狼狈为奸企图瓜分世界。"},{"type":"paragraph","text":"他接着说，尼克松的演说只是绝望的叫嚣。美帝国主义永远不可能克服正在剧烈地动摇着美国社会的种种对抗性矛盾。尼克松在他的整个演说中所玩弄的“团结”、“和平”和“精神”等字眼，在资本主义社会中，这都是空话。"},{"type":"paragraph","text":"塔蒂说，美帝和苏修在“精神上”确实“贫乏”到再也拿不出什么货色来了。马克思主义、列宁主义、毛泽东思想的伟大精神力量，唤醒了和正在继续唤醒着全世界亿万人民起来战斗。他坚信，一切帝国主义者、修正主义者和反动派一定会被抛到垃圾堆里去。"},{"type":"paragraph","text":"塔蒂指出，这篇文章象一面镜子，把美帝和苏修叛徒集团的丑恶面貌暴露无遗。它们都是纸老虎，尽管它们还要继续进行垂死挣扎，但是它们的寿命不长了。"},{"type":"paragraph","text":"一位非洲老工人在收听了北京电台广播的《人民日报》、《红旗》杂志评论员文章之后，对新华社驻毛里塔尼亚记者说，这篇文章极其重要，它极大地鼓舞了全世界革命人民，沉重地打击了以尼克松为新头目、以苏修为其头号帮凶的美帝国主义。"},{"type":"paragraph","text":"这位工人接着说:“作为垄断资本集团代理人的尼克松象他的前任约翰逊一样，将对世界各国奉行同样的帝国主义的和好战的政策。由于美帝国主义感到它将彻底失败，所以它要重新考虑它的侵略方式。尼克松发表的就职演说的唯一目的，是欺骗整个国际舆论。”"},{"type":"paragraph","text":"他接着说:“早已背叛无产阶级国际主义、越来越孤立的苏修叛徒，同以美国为首的帝国主义相勾结，破坏越南人民、中东人民和所有民族解放运动的利益，妄图同帝国主义瓜分世界。”"},{"type":"paragraph","text":"这位非洲老工人强调指出:在毛泽东思想的照耀下，世界革命人民将挫败美帝、苏修和一切反动派的任何阴谋。"},{"type":"paragraph","text":"他表示坚信:毛泽东思想必将在世界各地取得胜利。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"对话"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3ce68e14bf"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
