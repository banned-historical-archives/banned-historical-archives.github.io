<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"四月上旬全省轻化工生中存在的几个问题","authors":["《贵州工业简讯》（1-20）"],"dates":[{"year":1960,"month":4}],"is_range_date":false,"parts":[{"text":"四月上旬全省轻化工生中存在的几个问题","type":"title"},{"text":"《贵州工业简讯》（1-20）","type":"authors"},{"text":"四月上旬全省轻、化工业生产从总的情况看是好的，轻工业已完成月进度计划的百分之四十九点八，比上月同期地长百分之七点九，化学工业完成月进度计划的百分之三十七点八六，比上月同期上升百分之三点七一。但也存在着一些不容忽视的问题。","type":"paragraph"},{"text":"（一）部分地区和部分领导干部在实现首委红以后，缺乏持续跃进的思想准备，放松了对生产和政治工作的领导，工作疲沓，畏难叫苦，滋长了一种“歇口气”的新的右倾松劲情绪。有的反映：“为了实现首季红，我们都未好休息，现在又要大战二委度，拉得太紧了。”据贵阳市二十个轻工厂的调查，约有半数左右的工厂，领导干部有不同程度的“歇口气”的松劲精绪。贵阳搪瓷厂、木工厂有的领导干部提出：“一季度紧张了三个月，没有好好休息，今天跃进明天跃进，不知还有个头没有？”贵阳染织厂过去是个红旗厂，进入二委度以来，有的领导干部遇到某些困难就产生泄气，说：“计划完不成已成定局。因为停电太多，再努力这个月也只能完成月计划的百分之七十。”由于某些领导干部抓得不紧，职工旷工缺勤现象也较严重，贵阳染织厂曾出现百分之三十的职工有旷工的现象。贵阳市轻工业日产值呈现下降趋势，上旬全市轻工业催完成月计划的百分之二十点五九。","type":"paragraph"},{"text":"（二）对主要产品抓得不紧、不扎实，完成情况不好。轻工业有十二种主要产品没有完成进度计划。丝只完成月计划的百分之六点七，烤烟只完成百分之四点三，糖只完成百分之八点四，机制纸仅完成百分之十九点一。化学工业中有八种主要产品比三月下旬有下降，如化肥（主要是钙镁磷肥）下降百分之五十三点七四，烧碱下降百分之三十九点四，高锰酸钾下降百分之十七点一一。","type":"paragraph"},{"text":"（三）原材料储备不足。现在原材料供应不足的行业有丝、皮鞋、肥皂、烤烟、酒、粮、非食用值物油等。其原因一方面是因这些原料有一定的季节性或运输上有困难，但“等米下锅”不积极寻找代料或采取综合利用也是原因之一。","type":"paragraph"},{"text":"（四）企业管理工作跟不上当前运动和生产的发展，事故不断发生。如贵阳玻璃厂五个炉子就坏了三个。贵州烟厂锅炉坏了，被迫停产检修三天。红岩化工厂在四月十号因生产责任制不严，忽视安全生产，发生了爆炸烧毁厂房一栋，仓库两个，损失价值达十四万二千八百元，大约等于该厂一年上缴利润。（本部轻、化工处）","type":"paragraph"}],"comments":[],"origin":"贵州省某档案馆","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b38466c4db"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
