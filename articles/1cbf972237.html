ical-archives/banned-historical-archives8/main/maoquanji26.pdf"],"article":{"title":"致总前委等电","alias":"","parts":[{"type":"paragraph","text":"致总前委等电！"},{"type":"paragraph","text":"（1949年5月3日）"},{"type":"paragraph","text":"总前委转来第八兵团政治委员袁仲贤、司令员陈士、副政治委员兼政治部主任江渭清四月三十日电，报告三十五军未经请示擅自处理有关外交事件等，请你们转发华野、中野，各军、各师以资警惕。从三十五军在南京数天内所犯无政府无纪律错误行为看来，你们过去在准备渡江时期，对于外交政策及其他许多事项（例如军队在城市中看戏、看电影、洗澡、坐电车、坐公共汽车等事必须和各界人民同样买票，不许特殊，以及未得上级许可不得接受人民慰劳等）似乎没有明确规定。如果没有规定，你们应速规定，通令各军一体遵行。如果过去已有规定，三十五军故意违犯，则除检查该军工作做出结论通令各军外，应向各军重申前令，引起注意，不许再有违犯。如果各军对于像外交问题这样重大事件，可以不请示，不报告，由各军各地擅自随意处理，则影响所及，至为危险。"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军委起草的致总前委、华东局，粟裕、张"}],"authors":["毛泽东"],"dates":[{"year":1949,"month":5,"day":3}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":373,"page_end":373},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1cbf972237"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
