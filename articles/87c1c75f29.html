art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"把刘少奇的工贼嘴脸拿来示众","authors":["战士林福偕"],"parts":[{"type":"paragraph","text":"大工贼刘少奇一贯疯狂地仇视革命的工人运动。他诬蔑西欧、北美的工人不愿意起来革命，胡说什么“他们不革，你有什么办法？而且他们拥护帝国主义，他们赞成殖民地”。一副十足的帝国主义奴才的腔调！"},{"type":"paragraph","text":"西欧、北美资本主义国家的工人，受尽了垄断资本家的残酷剥削，他们恨透了帝国主义。这些年来，西欧、北美的革命运动风起云涌，一浪高过一浪。例如，今年五、六月间，具有巴黎公社光荣革命传统的法国工人，掀起了革命群众运动的大风暴，一千多万工人投入罢工斗争，占领了法国一半的工矿企业，沉重地打击了法国垄断资产阶级的反动统治。其他许多国家也都相继爆发了规模巨大的工人运动。他们不但直接向帝国主义统治发起了攻击，而且还积极支持各殖民地人民的解放运动。难道说，他们这一切革命的行动，是“拥护帝国主义”吗？是“赞成殖民地”吗？是不要革命吗？"},{"type":"paragraph","text":"毛主席教导我们：“各国的人民，占人口总数的百分之九十以上的人民大众，总是要革命的”。真正拥护帝国主义、赞成殖民地、不要革命的，决不是西欧、北美的工人，恰恰是各国反动派，如刘少奇之流的剥削阶级的代表人物。以美国为首的帝国主义，一直把西欧、北美看作他们牢固的后方，对于那里的革命运动，他们怕得要死，恨得要命，千方百计地加以镇压。刘少奇这个大工贼，诬蔑和反对西欧、北美的工人运动，为其主子帝国主义效劳，真是反动透顶！"}],"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"87c1c75f29"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
