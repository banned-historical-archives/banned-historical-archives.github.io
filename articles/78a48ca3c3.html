共中央组织部〔88〕干审字496号","dates":[{"year":1988,"month":4,"day":23}],"is_range_date":false,"authors":["中共中央组织部"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"中共山西省委组织部, 干审工作文件选编, 65-66","tags":[{"name":"军队","type":"主题/事件"},{"name":"老干部","type":"主题/事件"}],"parts":[{"type":"title","text":"中共中央组织部"},{"type":"paragraph","text":"〔88〕干审字496号[1]"},{"type":"paragraph","text":"河南省委组织部："},{"type":"paragraph","text":"豫组干审〔1988〕9号函悉。我们请总政干部部作了研究，现将他们的答复意见（复制件）转给你们，请参照执行。"},{"type":"paragraph","text":"附：〔1985〕政干字第383号文件抄件"},{"type":"paragraph","text":"中央组织部干审局"},{"type":"paragraph","text":"一九八八年四月二十三日"},{"type":"paragraph","text":"中组部干审局："},{"type":"paragraph","text":"〔88〕干审字474号公函悉，现对河南省委组织部提出的问题，作以下答复："},{"type":"paragraph","text":"一、总政〔1988〕政干字第30号文件中所说的“建国前我军开办的学校”，是指我军开办的培训军队干部的学校，不是指招收军队干部家属子女以学文化为主的普通文化学较（晋绥贺龙中学、冀中抗属中学等五十年代已审定为军队学校的除外）。"},{"type":"paragraph","text":"二、军队院校改为地方普通高等院校后，其学员可视为复员离队，他们的入伍时间，应按照总政〔1985〕政干字第383号文件《确定脱队人员入伍时间的规定》加以确定。"},{"type":"paragraph","text":"以上意见请参酌。"},{"type":"paragraph","text":"总政干部部办公室"},{"type":"paragraph","text":"一九八八年四月二十日"},{"type":"subtitle","text":"[1] Note: This document is reprinted in 中央组织部干审局, 干审工作政策文件选编 (下), pp. 1286-1287, albeit under a different title."}],"alias":""},"tags":[{"name":"河南文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"78a48ca3c3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
