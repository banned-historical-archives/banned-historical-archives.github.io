<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共南京市委关于对南京市私营工业进行改造、改组给省委的报告","authors":[],"dates":[{"year":1956,"month":1,"day":14}],"is_range_date":false,"parts":[{"text":"中共南京市委关于对南京市私营工业进行改造、改组给省委的报告","type":"title"},{"text":"[本报告经江苏省委同意，南京市委已贯彻执行。]","type":"subtitle"},{"text":"一、我们对于全市私营钢铁机器业349户（包括汽车修理在内），根据其规模小而分散，设备技术落后等特点，以及农业合作化与本市国防与国营工业的要求，拟作如下改组改造的规划：（一）以私营69个厂合并组织一农具制造厂，除生产双轮双华犁、钉齿钯等农具外，今后并从事拖拉机尾部工作机的制造。厂房由市设法解决，尚须添置必须的装备，共需投资82万元。（二）根据本市国防及国营工厂要求地方工业协作的任务，拟以私营厂12户合并建立一工具模具制造厂，从事工具模具及各种标准件的制造，厂房利用江南汽车公司修造厂北部厂房，酌予改建，约需5万元，由于工模具等的生产，精密度要求较高，尚须添置必要的较精密的机床及仪器等，约需65万元，两共投资70万元。（三）为适应本市国防及国营工厂对电机及各种电气设备的制造与检修的要求（仅720厂年需电机1万台，电业局要求地方承担全市电气设备的试验与检修任务），拟以私营厂35户合并组成一电机厂。厂房拟利用南京面粉厂址，略加改建，并添置必要的较精密的机床与试验设备，共需投资23万元。（四）本市及邻近地区工矿企业的机器修理、基建工程等任务紧张，拟将私营33个厂合并组成一机器修理厂负责承担，今后并担负对地方工业技术装备改造的任务。除利用原有厂房加以必要的改建外，尚须添置检验仪器补充必要的设备，约需投资7万元。（五）其余各厂除125户组织合作社外，分按不同性质，根据需要，分别合并组成锅炉修造、衡器制造、电镀、建筑五金等厂，或由原有合营企业南京、鼓楼两机械厂与江南汽车公司吸收，造钟厂一户拟单独合营。各厂共需厂房改建、配电、搬迁安装以及补充部分设备等费25万元。以上各厂总计需要基本建设投资207万元。","type":"paragraph"},{"text":"其余各个行业拟全部在本年内改造完毕，约共需投资27万元（其中属于纺织系统12万元），连同钢铁机器业投资总共为234万元。拟请全部在合营投资中解决，其中关于农具工具等厂由于任务紧迫，希能及早拨付。","type":"paragraph"},{"text":"又私营各厂资金向极短绌，经常赖银行贷款周转（如去年并入南京机械厂的9户，在私营厂中条件最好，其流动资金仅占全部资金的12％），过去生产任务或为来料加工或为机修，所需流动资金不多，在改组改造以后，从事大批生产，原材料又是按季调拨，因而流动资金需要增巨，根据上述机电各厂生产周期与储备情况，并除去可能利用的预收订金与自有资金匡计数字，初步估算共需流动资金230万元，银行不可能全部贷给，拟并请在合营投资中解决一部分，余请转知人民银行列入投放规划，今后通过信贷解决，以免影响生产。","type":"paragraph"},{"text":"二、在本市现有工厂中公私合营南京机械厂根据第一机械工业部的要求，自本年起生产苏式1617型的车床，今年任务为100台，明年增产到800台到1000台。根据生产需要，经国营南京机床厂提出第一机械工业部研究决定，共需机器设备投资116万元。又地方国营南京气体厂根据省工业厅要求，自本年起生产溴化甲烷、氯乙醇等14种新老品种的农药，需添置必要设备并进行必要的土建工程共需90万元（其中土建为8万元）。两厂共需投资206万元，亦请在本年度基建投资中及早予以解决。","type":"paragraph"}],"comments":[],"origin":"江苏省某档案馆","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8971be0513"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
