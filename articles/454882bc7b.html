rt":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东思想武装起来的战士天下无敌","authors":["空军某部“航空兵英雄中队”全体飞行员空军战斗英雄杜凤瑞生前所在部队全体指战员"],"parts":[{"type":"paragraph","text":"英勇守卫在我国黑龙江省珍宝岛地区的边防战士，遵照伟大领袖毛主席关于“人不犯我，我不犯人；人若犯我，我必犯人”的教导，对入侵我国领土，进行武装挑衅的苏修边防军，进行了自卫反击，给了入侵挑衅者以应得的惩罚，胜利地保卫了我国的神圣领土。这再一次显示了用毛泽东思想武装起来的战士无比强大的战斗力。"},{"type":"paragraph","text":"林副主席说：“最大的战斗力是用毛泽东思想武装起来的人，是勇敢，不怕死。”伟大的毛泽东思想，是反对帝国主义的强大的思想武器，是反对修正主义和教条主义的强大的思想武器，是克敌制胜的法宝。用毛泽东思想武装起来的人，有同帝修反血战到底的英雄气概，不怕苦，不怕死，攻无不克，战无不胜。在几十年的革命斗争中，我们人民解放军不靠天，不靠地，全靠战无不胜的毛泽东思想，取得了一个又一个伟大胜利。我们“航空兵英雄中队”，同美帝国主义的飞贼作过较量，也同美帝的走狗蒋匪帮的飞贼打过仗。在毛泽东思想的指引下，我们以勇敢不怕死的精神，取得了击落击伤敌机十四架的辉煌战绩。在一九五八年十月的一次空战中，毛主席的好飞行员杜凤瑞，怀着对伟大领袖毛主席的无限忠心，对帝修反的刻骨仇恨，以有我无敌的革命英雄主义气概，机智勇敢地驾机冲入敌人机群，一举击落两架敌机，美蒋飞贼也被活捉。无数事实证明，依靠战无不胜的毛泽东思想，就可以打败任何凶恶的敌人。苏修叛徒集团不过是一只焦头烂额的纸老虎。如果它胆敢继续侵犯我国领土主权，必将遭到更加可耻的失败。"},{"type":"paragraph","text":"我们一定更高地举起毛泽东思想伟大红旗，刻苦地学习毛主席著作，努力提高阶级斗争和两条路线斗争的觉悟，百倍警惕，加强战备，严阵以待，誓用鲜血和生命来保卫祖国的神圣领空和领土。谁敢侵犯我们，我们就叫它灭亡！"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"两条路线斗争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"454882bc7b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
