","authors":[],"dates":[{"year":1960,"month":9}],"is_range_date":false,"parts":[{"text":"民盟陕西省西安市委员会关于给顾振军盟纪处理的报告表","type":"title"},{"text":"","type":"paragraph"},{"text":"   姓名 顾振军 性别 男 年龄   46 籍贯 江苏无锡 入盟年月 1956年11月   原有职务 盟内   ---- 问题性质 右派分子   盟外   交大绝缘教研组教授     主要反动言行或反革命罪行： （一）偷听“美国之音”向亲友造谣说党报消息不可靠。说不定几年之后世道就会变，解放台湾是共产党口头讲讲根本不可能。 （二）诬蔑粮食政策说“又回到封建社会了。” （三）说“工人阶级领导他人是少数人压迫多数人。” （四）说“政治学习表现太积极很吃亏，太落后又不好容易被人注意，所以应该中立一点。” （五）说“教授指导实验是劳动改造”。 （六）说共产党喜欢对下压对上捧的人。 （七）说苏联专家来我国援助是“推销生意的”。 （八）他说“52年以后一直是受压迫的，到交大得不到尊重，受到各方面的攻力。” （九）宣扬美英帝国主义，说美国是代表帮助中国的，否认美国侵朝中使用过细菌战，我支援埃及反美，他说“美国是不会完蛋的。”   斗争中的态度   斗争中极不老实，以后尚无积极态度表示要悔改。   行政处分   保留教授学衔，由3级降为5级 组织处分 留盟察看   备注   ----                          ","type":"paragraph"},{"text":" 民盟陕西省委员会（盖章）1960年9月","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"81caa824fe"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
