script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"资产阶级宣扬的“三权分立”的本质是什么?","authors":[],"dates":[{"year":1954,"month":7,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"“三权分立”是资产阶级所宣扬的理论。这种“理论”主张:国家权力假如集中在一个国家机关或一个人的手中，便容易招致不守法律的紊乱，容易专横；反之，“分权”便可以使个别的权力“平衡”起来，使它们“相互牵制”，防止一切滥用权力的可能。因此，立法、行政、司法三权必须鼎立。"},{"type":"paragraph","text":"这种“理论”反映了在封建制度束缚下的资产阶级的政治要求。那时，资产阶级的实力还不能够一下就把封建制度推翻，于是只得先向封建主要求一部分权力。但是当资产阶级利用了工农群众的力量推翻封建主的统治，“三权”完全由自己一把抓以后，它们口里虽还懒洋洋地嚷着“三权分立”，并且把它写在宪法上，实际上则是行政权的优势与日俱增。资本主义发展到了帝国主义阶段，资产阶级就干脆扯去“民主”的面纱，“分权”的戏法也不变了，走上赤裸裸的行政权无限优势的法西斯道路。"},{"type":"paragraph","text":"在人民当家作主的社会主义类型国家里，一切权力都属于人民，这种权力是不可分割的，只有在各种职责不同的国家机关间进行工作上的分工。如我国全国人民代表大会是最高国家权力机关，实行立法权与行政权的统一，作为它的执行机关的国务院由它产生，要对它负责并且向它报告工作。(信)"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"883c73ce42"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
