script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"结束对我国的正式友好访问  黎笋率越南党政代表团离开桂林回国  姚文元、韦国清和两千多群众到机场热烈欢送越南贵宾","authors":[],"dates":[{"year":1975,"month":9,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"结束对我国的正式友好访问"},{"type":"paragraph","text":"黎笋率越南党政代表团离开桂林回国"},{"type":"paragraph","text":"姚文元、韦国清和两千多群众到机场热烈欢送越南贵宾"},{"type":"paragraph","text":"新华社一九七五年九月二十八日讯　由越南劳动党中央委员会第一书记黎笋率领的越南党政代表团，结束了对我国的正式友好访问，今天下午乘专机离开桂林回国。桂林市两千多群众到机场热烈欢送越南贵宾。"},{"type":"paragraph","text":"到机场欢送的有："},{"type":"paragraph","text":"专程陪同代表团前来桂林访问的中共中央政治局委员姚文元；"},{"type":"paragraph","text":"中共中央政治局委员、人大常委会副委员长、中共广西壮族自治区委员会第一书记、自治区革命委员会主任韦国清，中共广西壮族自治区委员会书记、自治区革命委员会副主任刘重桂，中共桂林市委书记、桂林市革命委员会主任钟枫。"},{"type":"paragraph","text":"越南劳动党中央委员会政治局委员、政府副总理黎清毅，越南民主共和国驻中国大使阮仲永，越南民主共和国驻南宁总领事阮荫和其他越南同志，也到机场送行。"},{"type":"paragraph","text":"下午，桂林机场上飘扬着中越两国国旗。当黎笋同志来到机场时，欢送群众挥舞花束、彩带，青少年们随着乐曲欢乐起舞，热烈欢送越南战友，祝愿中越两国人民的兄弟友谊不断发展。黎笋同志高兴地向欢送群众挥手告别。"},{"type":"paragraph","text":"今天到机场欢送的还有："},{"type":"paragraph","text":"陪同代表团到桂林访问的外交部副部长韩念龙，中联部副部长申健，外交部亚洲司司长沈平、礼宾司司长朱传贤；"},{"type":"paragraph","text":"广西壮族自治区、桂林市等有关方面负责人廖炜雄、江景河、史清盛、区镇、唐廷国、慕石起、钟秀琛、潘树彬、崔金才等。"},{"type":"paragraph","text":"上午，黎笋、黎清毅等同志由姚文元、韦国清等同志陪同，乘船游览了漓江，观赏了桂林的秀丽景色。（附图片）"},{"type":"paragraph","text":"黎笋同志率领的越南党政代表团，结束了对我国的正式友好访问，九月二十八日乘专机离开桂林回国。姚文元、韦国清同志以及二千多名群众到机场热烈欢送。"},{"type":"paragraph","text":"新华社记者摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"姚文元","type":"人物"},{"name":"广西文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"13bfbf3c72"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
