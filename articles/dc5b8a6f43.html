ical-archives/banned-historical-archives0/main/maoquanji27.pdf"],"article":{"title":"贺美国共产党三十周年电","alias":"","parts":[{"type":"paragraph","text":"贺美国共产党三十周年电“"},{"type":"paragraph","text":"（1949年8月23日）亲爱的福斯特同志和但尼斯同志："},{"type":"paragraph","text":"我们中国共产党人和中国劳动人民热烈庆祝美国共产党的三十周年。美国共产党和美国进步分子，在美国反动势力高压之下，为着国际和平，为着美国工人和美国人民的民主权利，为着中美人民的真诚友谊，坚持不屈不挠的奋斗，对于中国人民和世界各国人民都是一个重要的鼓励和援助。美国的未来，不属于外强中干的美国反动势力，而属于你们和美国人民。庆祝你们和美国人民的奋斗得到成功，庆祝中美两国工人阶级和两国人民的团结继续增强。"},{"type":"paragraph","text":"中国共产党中央委员会主席毛泽东"},{"type":"paragraph","text":"一九四九年八月二十三日"},{"type":"paragraph","text":"[1]毛泽东代表中共中央致电美国共产党中央主席福斯特，祝贺美国共产党成立三十周年。"}],"authors":["毛泽东"],"dates":[{"year":1949,"month":8,"day":23}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":160,"page_end":160},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dc5b8a6f43"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
