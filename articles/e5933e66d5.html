art":5,"page_end":5,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"“我要永远挂毛主席像”","authors":[],"parts":[{"type":"paragraph","text":"越来越多的印度工人、学生和其他革命群众渴望得到毛主席著作、毛主席像和毛主席像章。一位印度电工从中国朋友那里得到毛主席像后，立即兴冲冲地上街去配镜框。当他手捧的毛主席像被商店门口的群众发现之后，许多人一涌而上，争相观看毛主席像。其中一个人好心地提醒说：“（印度）政府正在反华，你挂毛主席像，不怕警察特务前来找麻烦吗？”这位电工理直气壮地回答：“怕什么？毛主席是当今全世界工人阶级和劳动人民最伟大的领袖，我就是要挂毛主席的像。”他接着又说：“你可知道我们印度工人、农民为什么愈来愈穷？根本原因就是帝国主义、封建地主、资产阶级的剥削和压迫。毛主席领导中国的工人阶级和劳动人民起来闹革命，打倒了骑在中国人民头上的这些寄生虫，争得了解放，并正胜利地走向社会主义、共产主义。毛主席也鼓励和支持全世界劳动人民同样地起来闹革命、争解放，毛主席为全世界工人阶级、劳动人民指明方向，他和我们工人永远心连心，我为什么不挂毛主席的像呢？我要把毛主席像永远挂在家里！”"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e5933e66d5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
