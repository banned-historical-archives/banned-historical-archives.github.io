工作应注意事项的指示的批示","authors":[],"dates":[{"year":1952,"month":8,"day":4}],"is_range_date":false,"parts":[{"text":"中共中央转发华东局关于当前司法改革工作应注意事项的指示的批示","type":"title"},{"text":"华东局，各中央局、分局并转各省、市、区党委：","type":"appellation"},{"text":"华东局七月二十四日关于当前司法改革工作应注意事项的指示是适时的，特转发你们参考。","type":"paragraph"},{"text":"目前，有些地区在进行司法改革工作中已发生的仅注意组织整顿，而不注意思想整顿的现象，应注意及时纠正。必须认识司法改革决不仅是司法机关内部的人事调整，而是一个肃清国民党反动的旧法思想和旧司法作风的政治斗争与思想斗争。老干部有旧法观点及旧司法作风者应首先带头检讨。","type":"paragraph"},{"text":"华东局指示中提到总结司法工作群众路线的经验很重要，应在运动开始即有意识地加以引导，俾于运动中间特别是运动后期能具体地指示出人民司法工作建设的方向与榜样。","type":"paragraph"},{"text":"各省、市、区以上党委，凡尚未向中央作司法改革工作报告者，应根据七月六日及九日的电示，务于九月内向中央作第一次关于你们的司法改革计划和执行情况的报告。否则以违纪论。自“三反”以来，中央为全盘改革司法工作曾发出多次情况，也不提出不同意见，采取置之不理的态度，这是很不妥当的。今特重申前令，望即依限报告。","type":"paragraph"},{"text":" 中  央八月四日","type":"paragraph"}],"comments":[],"origin":"根据文件的原件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5eeb6e39ed"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
