tart":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"《毛泽东军事年谱》出版发行","authors":["姜文明"],"parts":[{"type":"paragraph","text":"《毛泽东军事年谱》是国内第一部全面系统地记述毛泽东作为当代伟大的军事家、战略家的军事生涯和业绩、军事领导和指挥艺术的编年体历史巨著。全书约120万字，共分为土地革命时期、抗日战争时期、解放战争时期、社会主义建设时期4部分，以时间为序详细地记述了毛泽东从1927年到1958年这一历史时期的全部军事生活以及与之密切相关的政治、理论活动，翔实准确、完整全面地反映了毛泽东的军事思想和军事成就，展示了毛泽东创建、领导和指挥人民军队打败国内反动派和外国侵略者的光辉历程，展现了毛泽东指挥若定、用兵如神、运筹帷幄、决胜千里的军事奇才。"},{"type":"paragraph","text":"《毛泽东军事年谱》还记述了他作为我党我军主要领导人在同一时期的一切重要事件和活动。其中所使用的大量原始材料许多属首次公开发表。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"05e10aa07f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
