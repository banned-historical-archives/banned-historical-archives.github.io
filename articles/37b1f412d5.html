script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"工人业余作者狠批文艺黑线以亲身遭遇控诉一小撮反革命修正主义分子仇视、排挤工人作者的罪行","authors":[],"dates":[{"year":1967,"month":7,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　上海市工人革命业余作者日前集会，愤怒揭发、批判反革命修正主义文艺黑线。"},{"type":"paragraph","text":"上海工人业余作者，是本市文艺创作队伍中一支重要的力量。在建国以来的历次政治运动、生产运动中，不少工人业余作者，一方面同阶级敌人的种种破坏活动，同生产中的种种困难作斗争；另一方面，又拿起文艺武器，以各种短小精悍的文艺作品来鼓舞自己的革命斗志和生产热情，揭发敌人的阴谋、罪恶，直接为当时的政治运动和生产运动服务。可是，反革命修正主义文艺黑线却对工人业余作者和工人文艺作品，一贯采取仇视、排挤的态度。参加日前大会的工人业余作者，在会上以种种事实，激愤地揭发、控诉了文艺黑线长期以来在这方面的罪行。他们指出:在党内最大的走资本主义道路的当权派支持下的文艺黑线，一贯疯狂对抗毛主席的革命路线，竭力反对工人阶级成为文化的主人。文艺黑线在上海的代理人，对工人革命业余作者同样怕得要死，恨得要命。他们秉承主子的意旨，软硬兼施:一方面把充满无产阶级政治性、战斗性、革命性的工人文艺作品，恶毒地污蔑为“三化一薄”(公式化、概念化、简单化，内容单薄)，挥起黑棒，一棍子打死；一方面又以“培养”、“提高”为名，用种种欺骗手段，妄图把一些工人业余作者从火热的三大革命斗争中拉出来，推进修正主义的大黑缸，成为他们复辟资本主义制造舆论的工具。文艺黑线毒害工人业余作者的手法不同，目的却是一个，那就是要把工人阶级排除出文艺界，以便在文艺界实行资产阶级专政。"},{"type":"paragraph","text":"曾经参加过一九六五年全国青年业余文学创作积极分子代表大会的工人业余作者，在会上也揭发、批判了文艺黑线的“祖师爷”周扬在那次大会上公然反对毛主席的革命文艺路线，宣扬资本主义、修正主义的文艺思想，毒害青年业余作者的严重罪行。此外，有的工人业余作者，还以亲身的遭遇，控诉了旧市委执行资产阶级反动路线，颠倒黑白、混淆是非，在无产阶级文化大革命中对工人业余作者进行迫害的种种罪行，激起到会同志的极大愤慨。"},{"type":"paragraph","text":"在会上发言的工人业余作者，都表示要更好地活学活用毛主席著作，响应毛主席的伟大号召，抓革命，促生产，以革命的大批判促进革命的大联合，以革命的大联合推动革命的大批判，在积极参加本单位的斗批改的同时，和革命的专业文艺工作者一起，积极投入对文艺黑线的大批判，以彻底肃清文艺黑线的流毒。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"37b1f412d5"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
