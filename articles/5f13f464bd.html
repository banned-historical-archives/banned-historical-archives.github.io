情送别亲人，衷心感谢毛主席党中央的亲切关怀","authors":[],"dates":[{"year":1975,"month":9,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"参加西藏自治区成立十周年庆祝活动后"},{"type":"paragraph","text":"华国锋率中央代表团离拉萨回京"},{"type":"paragraph","text":"拉萨各族人民热情送别亲人，衷心感谢毛主席党中央的亲切关怀"},{"type":"paragraph","text":"新华社拉萨一九七五年九月十一日电　在参加了西藏自治区成立十周年的庆祝活动以后，中共中央政治局委员、国务院副总理华国锋率领中央代表团今天离开拉萨回北京。拉萨各族人民三万多人隆重热烈地夹道欢送中央代表团。"},{"type":"paragraph","text":"各族人民一清早就手持花束，举着红旗，成群结队地聚集到街道两旁。他们衷心感谢毛主席、党中央对西藏各族人民的亲切关怀，热烈地欢送毛主席、党中央派来的亲人。今天，拉萨市街道上挂着巨幅横标，上面用藏、汉文写着：“热烈欢送中央代表团！”“全国各族人民大团结万岁！”“全国各族人民的伟大领袖毛主席万岁！”华国锋团长等在任荣、阿沛·阿旺晋美等负责同志陪同下，乘坐敞篷汽车离开市区，夹道欢送的人群用各种民族语言高呼口号。在拉萨机场，一千多名穿着节日盛装的翻身农奴和人民解放军指战员，挥动花束，敲锣打鼓，热情地送别亲人。华国锋团长以及代表团副团长和团员们，同西藏党、政、军的负责同志一一握手，并分别喝了翻身农奴敬的青稞酒，然后向欢送的群众挥手告别。"},{"type":"paragraph","text":"今天前往欢送中央代表团的还有西藏党、政、军和拉萨市的主要负责人陈明义、天宝、封克达、巴桑、李本善，政协全国委员会副主席帕巴拉·格列朗杰，中共中央候补委员央宗，人大常委会委员错其，以及自治区其他各方面负责人。（附图片）"},{"type":"paragraph","text":"由华国锋同志率领的中央代表团在参加西藏自治区成立十周年庆祝活动后，于九月十一日离开拉萨回北京，受到拉萨各族人民的热烈欢送。"},{"type":"paragraph","text":"新华社记者摄（传真照片）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"华国锋","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"西藏文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5f13f464bd"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
