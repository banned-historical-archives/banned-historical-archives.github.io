<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"不许林彪攻击文化大革命","authors":["包文俊","蒋凤宝"],"dates":[{"year":1974,"month":3,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"上海市邮电管理局　包文俊　蒋凤宝"},{"type":"paragraph","text":"无产阶级文化大革命的怒涛，冲毁了以刘少奇为头子的资产阶级司令部。地主资产阶级在党内的代理人林彪，不甘心剥削阶级和剥削制度在中国的覆灭，扯起了孔老二“克己复礼”的破旗，妄图同我们无产阶级进行较量。林彪及其死党把他们的反革命矛头集中指向无产阶级文化大革命，恶毒攻击无产阶级文化大革命是“上层与下层”的矛盾，是“这股”与“那股”力量的斗争，妄图扰乱阶级阵线，转移斗争大方向，破坏文化大革命。"},{"type":"paragraph","text":"林彪胡说文化大革命是“上层与下层”的斗争，就是把矛头直接指向以毛主席为首的无产阶级司令部。无产阶级文化大革命是一场极其深刻的“无产阶级反对资产阶级和一切剥削阶级的政治大革命”。在毛主席的无产阶级革命路线指引下，无产阶级和广大群众坚持斗争的大方向，始终把斗争的锋芒指向一小撮死不改悔的走资本主义道路的当权派，摧垮了以刘少奇为头子的资产阶级司令部，沉重地打击了国内外的阶级敌人。林彪这个无产阶级的死敌，不但明目张胆地抛出“上层与下层”矛盾的谬论，而且在暗中加紧结党营私，妄图谋害我们的伟大领袖毛主席。同时在“上层与下层”矛盾的烟幕下，林彪一伙费尽心机妄想保护一小撮混进党里、政府里、军队里和各种文化界的反革命修正主义分子过关。混淆敌我，扰乱阶级阵线，转移斗争大方向，否定无产阶级文化大革命，其心极毒!"},{"type":"paragraph","text":"林彪炮制“这股”与“那股”力量的矛盾，妄图挑起群众斗群众。在阶级社会中，人是划分为阶级的，那有什么脱离阶级内容的“这股”与“那股”力量?无产阶级与资产阶级的斗争，社会主义道路与资本主义道路的斗争，构成了社会主义时期的主要矛盾。党内马克思主义路线与修正主义路线的斗争，实质是社会上阶级斗争在党内的反映。林彪蓄意抽去阶级内容，抛出“这股”与“那股”力量斗争的谬论，就是掩盖阶级斗争的实质，歪曲党内的两条路线斗争。林彪一伙拼命划“股”分“派”，“以我划线”，搞山头，结死党，要搞什么“权力再分配”，说穿了就是要由他们“这股”反动“派”将天下取而代之，变无产阶级专政为资产阶级专政，扑灭无产阶级文化大革命的熊熊烈火。"},{"type":"paragraph","text":"无产阶级文化大革命是在党的基本路线指引下进行，并不断取得胜利的。林彪提出的“这股”与“那股”，“上层与下层”的谬论，不讲阶级，不讲路线，一味玩弄抽象的“斗争”字眼，就是勾销无产阶级同资产阶级斗争这一主要矛盾，勾销马克思主义路线与修正主义路线之间的尖锐斗争，勾销马克思主义关于社会主义时期还存在着阶级、阶级矛盾和阶级斗争的伟大学说，也就从根本上否定了党的基本路线，否定了这场无产阶级文化大革命。这就充分暴露了林彪的反革命的修正主义路线的极右实质。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"林彪","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"批林批孔","type":"主题/事件"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6064364e13"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
