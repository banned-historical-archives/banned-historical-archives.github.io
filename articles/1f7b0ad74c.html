ical-archives/banned-historical-archives0/main/maoquanji51.pdf"],"article":{"title":"在林枫家属来信摘要上的批语","alias":"","parts":[{"type":"paragraph","text":"在林枫家属来信摘要上的批语\""},{"type":"paragraph","text":"（1972年8月11日）"},{"type":"paragraph","text":"连原信一起，请汪?印发政治局各同志。我意放他出来治病。林枫问题过去没有弄清楚，有些证据不足，办案人员似有一些逼供信。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"七二年八月十一日"},{"type":"paragraph","text":"[1]这个批语写在中共中央办公厅信访处1972年8月10日编印的《来信摘要》第五四五号上。来信摘要写道，原中共中央高级党校校长林枫的子女林梅梅等8月5日写信给毛主席，说他们8月4日去秦城见了林枫一面，林现患心脏病、糖尿病，神情呆滞，身体枯瘦，请求让他出来治疗休养。1973年7月7日，林枫给毛泽东写信说：“在您和中央的亲切关怀下，我到阜外医院治病已经十个多月了。”信中请求早日恢复他的党组织生活，还揭发了林彪在东北的几个问题。7月10日，毛泽东阅信后批示：“纪、汪酌处。”"},{"type":"paragraph","text":"[2]汪，指汪东兴，当时任中共中央政治局候补委员、中央办公厅主任。"}],"authors":["毛泽东"],"dates":[{"year":1972,"month":8,"day":11}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":330,"page_end":330},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1f7b0ad74c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
