script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反动势力下的美国资产阶级内部矛盾日深 由美归来的张雪岩谈话","authors":["静远"],"dates":[{"year":1949,"month":9,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报北平专讯】　记者今天访问了旅居美国和加拿大一年半的人士田家半月刊社社长张雪岩先生，张先生去年一月在反动派威胁下出国，最近才由加拿大回来。据谈:美帝国内在反动势力控制下，社会上混乱和恐慌的程度日益增加。进步势力到处遭受迫害，进步份子的演讲会常常遭到无理的破坏，反动份子扰乱会场之外，并向演讲者掷番茄、扔雪球，和中国旧政协以后的较场口或中山公园事件只是程度上的分别。资产阶级内部矛盾在许多方面反映出来:在经济上，是经济恐慌已经开始，失业人数日益增加；在外交上，是美国与西欧、特别是与英国的矛盾逐渐表面化；在军事上，是陆海空军互争领导，派系倾轧。美国用大量贷款“援助”各国家的方法来缓和国内的危机，又把许多工厂继续大量生产的军火运往欧洲和东方，想用军事封锁苏联和新民主主义国家的方法维持垄断资本主义的霸权；但这条反革命防线在中国首先被打垮了，整个东方的封锁线动摇了，这失败引起了美国统治阶级内部严重的骚动。从淮海战役以后，美国资产阶级报纸经常用显著地位报导国民党失败的消息，许多报纸不但攻击到国民党反动政府，而且也攻击到美国政府的对华政策。这就是白皮书发表的直接原因。"},{"type":"paragraph","text":"他又说:拥护世界和平大会加拿大分会已经成立，文幼章是总干事。国际进步朋友，各国人民，对于中国人民的胜利，是以无限欢欣和满怀期望迎接着的。"},{"type":"paragraph","text":"(静远)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f6e4df035b"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
