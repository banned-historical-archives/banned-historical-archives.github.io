script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"阿尔巴尼亚工人支持上海革命造反派 欢呼毛主席的革命路线取得伟大胜利","authors":[],"dates":[{"year":1967,"month":1,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社地拉那15日电　阿尔巴尼亚的广大职工十四日分别举行集会，最热烈最坚决地支持上海革命造反派执行毛主席的革命路线，向资产阶级反动路线发起总攻击的革命行动，并表示衷心祝贺他们在英勇的斗争中已经取得和必将取得的伟大胜利。"},{"type":"paragraph","text":"阿尔巴尼亚培拉特毛泽东纺织联合工厂的两千三百多名职工在十四日下午举行的集会上，热烈支持上海革命造反团体发表的《告上海全市人民书》和《紧急通告》，高度赞扬上海市工人阶级忠于毛泽东思想，坚决贯彻以毛泽东同志为代表的无产阶级革命路线。"},{"type":"paragraph","text":"恩维尔·霍查机器厂的职工们，在满怀激情地阅读了阿尔巴尼亚报纸上转载的中共中央、国务院、中央军委、中央文革小组给上海市各革命造反团体的贺电和上海市三十二个革命造反组织的《紧急通告》后，十四日下午也举行了全厂职工的集会。在大会上，厂长切里库和一些工人讲了话，他们说，上海工人阶级是阿尔巴尼亚工人阶级的亲密战友，我们永远支持他们为保卫毛泽东同志的革命路线所进行的英勇斗争。"},{"type":"paragraph","text":"地拉那拖拉机配件工厂的工人，十四日一清早就争先恐后地抢着阅读报纸，他们兴奋地交谈中共中央、国务院、中央军委、中央文革小组的贺电和上海工人和革命造反组织采取的革命行动。在全厂职工大会上，职工们热情地高呼“中国共产党万岁!”“毛泽东同志万岁!”欢呼以毛泽东同志为代表的无产阶级革命路线的胜利。"},{"type":"paragraph","text":"斯大林纺织联合工厂的职工们也一致表示坚决支持上海工人和革命造反组织的革命行动，热烈赞扬他们在无产阶级文化大革命中所取得的伟大胜利。"},{"type":"paragraph","text":"在这几个工厂的职工大会上，也一致通过了以全厂职工的名义致上海革命工人和革命造反组织的祝贺信。"},{"type":"paragraph","text":"据新华社地拉那15日电　阿尔巴尼亚《人民之声报》十四日发表题为《毛泽东的革命路线粉碎了一小撮修正主义者和阴谋家的反动阴谋》的编辑部文章，热烈赞扬以毛主席为代表的无产阶级革命路线，欢呼上海革命造反派所取得的新胜利。"},{"type":"paragraph","text":"文章说，根据毛泽东同志的指示进行的中国无产阶级文化大革命，正在深入地、广泛地胜利发展。它得到绝大多数中国人民的热烈支持和拥护。由毛泽东同志所代表的革命路线，是保卫和进一步深入开展社会主义革命的路线，是同产生修正主义和复辟资本主义的危险作斗争的路线，这条路线已经取得了伟大的胜利。"},{"type":"paragraph","text":"文章说，用毛泽东思想武装起来的工人、农民和学生的群众革命运动，沉重地打击了修正主义分子、反动派以及所有资产阶级反动路线的推行者，并迫使他们节节败退。但是从上海工人革命造反总司令部等革命群众组织《告上海全市人民书》和《紧急通告》两个重要文件中可以看出，修正主义资产阶级路线的代表人物不仅没有放弃他们的背叛道路，而且为了抵抗文化大革命和毛泽东同志的革命路线，为了保住他们自己，竟不惜进行反对社会主义的罪恶活动。因此，必须对他们无情地实行无产阶级专政。上海三十二个革命群众组织在《紧急通告》中得出了这一正确的结论。毛泽东同志的革命路线，获得了又一次新的胜利。上海革命工人和革命干部所执行的革命路线，必将把革命推向前进，必将促进生产。"},{"type":"paragraph","text":"文章强调说，上海革命群众组织《紧急通告》中的决定是完全正确的。它得到全世界所有真正革命者的欢迎。中共中央、国务院、中央军委、中央文革小组，一月十一日给上海市各革命造反团体的贺电，受到了全国工人、农民、革命学生、革命知识分子和革命干部的热烈拥护。他们紧密地团结在以毛泽东同志为首的党中央周围，用毛泽东思想武装起来，正在发起总攻击，以便彻底击败一切修正主义者、反动派和反革命分子。"},{"type":"paragraph","text":"文章最后欢呼:中国共产党领导的伟大的中华人民共和国万岁!毛泽东主席万岁!"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"中央文革","type":"人物"},{"name":"上海文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"02c21fd934"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
