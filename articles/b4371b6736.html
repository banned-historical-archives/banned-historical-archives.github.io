" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoistlegacy.de-5019","name":"关于转发乌盟革委会政治部'关于学习、宣传、执行、落实毛主席又一最新指示的通知'的通知","author":"土默特旗革命委员会","internal":false,"official":false,"type":"pdf","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives11/main/data/5019/5019.pdf"],"article":{"title":"关于转发乌盟革委会政治部'关于学习、宣传、执行、落实毛主席又一最新指示的通知'的通知","alias":"","parts":[{"type":"paragraph","text":"DA333土默特旅革命委会政治部文件"},{"type":"paragraph","text":"土革政（689号"},{"type":"paragraph","text":"最高指示"},{"type":"paragraph","text":"知识害年到农村去，接受们下中农的再教育，很有必要。买说服城里干部利其他人，把自已初中、高中、大学毕业的子女治到少下去，来一个动员·各地农村的同志应当欢迎他们去"},{"type":"paragraph","text":"关于转发乌监算委会政治部“关于学习、宣"},{"type":"paragraph","text":"传·执行，落实毛主席又一最新格示"},{"type":"paragraph","text":"的通知”的通知"},{"type":"paragraph","text":"现将岛盟革委会政治部限0扇政革字112号文件“关于学习、宣传执行，落实毛主席又一最指示的通知”较发你们，望途照执行，名级单委会（领导班子）买加品领导，做好工作·动员本单位所属人员极响应伟大领袖毛主店的号名，双极动员支持自已的子女和长期脱政劳动的城镇居民（包括职工干部家属）到村按受省下中衣的再教育，建设社会主义新农村·业把落实主席最新指示情况于69年1月10日前报旅革委会政工组。"},{"type":"paragraph","text":"土默特旗革合委员会政工组"},{"type":"paragraph","text":"1968年12月30日发：各公社草委会，旗级各机关，各中学，“五·七”干校，"},{"type":"paragraph","text":"厂矿、企事业单位，左右旗武装部、支左功公室、4926202、554部队，内豪工宣队，旗工代会、族省代会，存。岛兰察布盟草金委员会政治部（通知）"},{"type":"paragraph","text":"6扁革政字122号"},{"type":"paragraph","text":"最高指示"},{"type":"paragraph","text":"要“抓紧”·就是说，党委对主要工作不但一定要“抓”而且一定要“抓紧”。"},{"type":"paragraph","text":"兴"},{"type":"paragraph","text":"※※"},{"type":"paragraph","text":"关于学习、宣传、执行、落实"},{"type":"paragraph","text":"毛主店最近又一最新指示的通知各旗县市革命委员会："},{"type":"paragraph","text":"毛主房最近又一次教导我们：“知识青年到村去，按受省下中衣的再效育，很有必要·要说服城星干部和其他人，把自已初中、高中、大学毕业的子女，送到乡下去，来一个动员。各地村的同志应当欢迎他们去。”毛主席的这一最新指示，是对广大草命知识青年的最大关怀，最大爱护，最大教霄，最大单策，是毛主房的伟大战略部署，是我国亿万军民政治生活中的又一件大喜事·为了全面落实毛主底的最新指示搞好知识青年下乡上山工作，特作期下通知："},{"type":"paragraph","text":"一、紧服毛主席的伟大战略部暑，发扬国万区行的战斗作风，立即掀起一个大学习，大宣传、大落实的高潮·组织农村、工矿、机关、学校、街道的草命群众，干部和所有知识言年认厦学习，深测领会，坚决执行：利用名种形式积极热情地宣传毛主店的最新指示，眞正做到家除户，人人管知。"},{"type":"paragraph","text":"V3m"},{"type":"paragraph","text":"为使毛主唐最新指示至面落实，各地要在城镇组织还未下乡的知识青年和革金家长举办名潭东思想学习班（包括68年中学毕业生），学习毛主店关手知误分子与工农群众相结合的伟大思想，学习毛主席的一采列最新治示·在学习中要高举毛潭东思想伟大红旗，实出政治，调动名种积极因案，做广泛·深刻的思想政治工作，耐心说服，动员他们下乡去，接受工农兵的再效育。无正当职业的社会青年也在动员对象之例·在国家尚未发款的情兄下，要发方群众，用自力更生、奋发图服的精种解决暂时困难，迅速扳起一个知识言年下乡上山的高潮，积极提倡长期脱离劳动的城镇居民下夕安家落后·社队要立即动员广大省下中农（收）：做好迎按（安置）准备工作。"},{"type":"paragraph","text":"二，知识青年下乡上山是毛主席给我们的一项十分重要的政治任务各级革金委员会要订出措施，见著行动，必须抓紧、管好·对我盟已经下乡、返乡的二万七千多名知识客年要大力加强陵治思想工作，使他们安下心来，认真接受贫下中发的再教青·目前各加县都有一些好的知识青年和知识青年小组，各级领导和主管部门要有重点的抓几个点，总结经验，对青年一代进行活的教育·在三大革命运动中，特别是在今冬明春农村文化大革金中，要充分发择知识青年的极我作用·让他们在激烈的阶级斗命中经风雨，见世面，初底改交旧思想。"},{"type":"paragraph","text":"毛主店的这一最新指示也是对于广大省下中衣、省下中收的最大信任·各级革命委员会要相循群众·依学众，招对知识言年进行再敬育的权力厦正交给广大盆下中交、我下中牧，要及时总结这方面的经验广泛传播。"},{"type":"paragraph","text":"三、各旅县、社队菲荟会都要认真做好明年春节后装收城里大批下乡上山知识害年和成镇居民下乡安家药后、参文业生产劳动的准备工"},{"type":"paragraph","text":"?L作·要把这一工作落实到广大省下中农、贫下中牧群众中去·为此，各棋县要对安置办公室和其他分管这一工作的部门加强领导，工作人员要加政治责任感，做好工作。这是对气主店忠不忠的态度问题，任何展难情精和自私想法都是对革命有害的，必须坚决克服掉。"},{"type":"paragraph","text":"四、各旗县要在69年1月中旬把宣传、落实毛主店这一最新指示的情况，用书面报告盟革委会政治部。"},{"type":"paragraph","text":"为盟革合委员会政治部"},{"type":"paragraph","text":"1968年12月22日"}],"authors":["乌盟革命委员会政治部","土默特旗革命委员会"],"dates":[{"year":1968,"month":12,"day":22},{"year":1968,"month":12,"day":30}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":5},"tags":[{"name":"革命委员会","type":"主题/事件"},{"name":"军队支左","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b4371b6736"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
