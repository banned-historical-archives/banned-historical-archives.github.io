script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"波共总书记米雅尔和锡共总书记桑穆加塔桑分别致函电祝贺中国共产党成立五十五周年","authors":[],"dates":[{"year":1976,"month":7,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"波共总书记米雅尔和锡共总书记桑穆加塔桑"},{"type":"paragraph","text":"分别致函电祝贺中国共产党成立五十五周年"},{"type":"paragraph","text":"新华社一九七六年七月三日讯　波兰共产党中央委员会总书记卡齐米日·米雅尔写信给中国共产党中央委员会和毛泽东主席，祝贺中国共产党诞生五十五周年。贺信全文如下：北京  中国共产党中央委员会　毛泽东同志："},{"type":"paragraph","text":"五十五年前中国共产党的成立是中国人民整个历史中最重要的日子之一，并对人类的进一步发展具有伟大的意义和影响。占阶级社会绝大多数的中国劳动群众，为了能够从剥削和压迫中获得解放，并不缺少力量；但是，为了能够摆脱封建主义、资本主义和殖民主义的枷锁，他们所缺少的是组织、革命的领导和能够把他们统一起来、并引导他们去进行为争取民族和社会解放而斗争的思想。"},{"type":"paragraph","text":"毛泽东为中国人民带来了革命进军的火炬和社会主义革命的胜利。中国共产党奠定了民族的先进阶级的政治组织以及民族的革命团结统一的基础，马克思列宁主义产生了把科学社会主义理论在中国的历史条件下，卓越地运用于革命斗争之中的毛泽东思想。"},{"type":"paragraph","text":"中国人民在毛泽东为首的中国共产党的领导下，无论是在争取国家解放的革命斗争的各条战线上，还是在社会主义建设和不断加强无产阶级专政的整个历史时期，都取得了并正在取得伟大的胜利。中国共产党的历史，就是毛泽东一生的历史，就是他在党的五十五年的革命和英雄历程中进行不懈工作和斗争的历史，就是他的马克思列宁主义思想和他所制定的在无产阶级专政整个历史时期继续进行社会主义革命的政治路线胜利的历史。中国人民仅仅这几年就在无产阶级文化大革命中取得了伟大的胜利，战胜了一个接一个的反党集团、共产主义的叛徒以及革命路线和社会主义建设的敌人刘少奇、林彪和邓小平。"},{"type":"paragraph","text":"今天，人民中国是最强大的、独立自主的社会主义国家，是不威胁任何人的胜利的无产阶级专政和建设社会主义的国家，是一个最广大的群众用创造性和忘我的努力建设强大的社会主义物质基础、创立社会主义、彻底革命和民主的文化的国家，是世界革命和社会主义的堡垒。"},{"type":"paragraph","text":"在中国共产党成立五十五周年的时候，波兰马克思列宁主义者、工人阶级和劳动人民，祝愿伟大的中国人民、中国共产党及其缔造者和组织者、杰出的马克思列宁主义理论家毛泽东主席，在中华人民共和国的社会主义建设和巩固无产阶级专政的事业中，取得进一步的革命胜利和成就。"},{"type":"paragraph","text":"光荣的、久经革命斗争锻炼的中国共产党万岁！"},{"type":"paragraph","text":"中国共产党的创始人和建设者、杰出的科学社会主义理论家毛泽东主席万岁！"},{"type":"paragraph","text":"英雄的波兰人民和中国人民的革命友谊万岁！"},{"type":"paragraph","text":"波兰共产党中央委员会总书记　卡齐米日·米雅尔"},{"type":"paragraph","text":"一九七六年六月于华沙"},{"type":"paragraph","text":"新华社一九七六年七月三日讯　锡兰共产党总书记桑穆加塔桑七月一日打电报给中国共产党中央委员会，祝贺中国共产党诞生五十五周年。电报全文如下：北京　中国共产党中央委员会"},{"type":"paragraph","text":"值此中国共产党成立五十五周年之际，请接受我代表锡兰共产党对你们的祝贺，并祝愿你们取得更大的成就。"},{"type":"paragraph","text":"总书记　纳·桑穆加塔桑　一九七六年七月一日"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"389a2599d5"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
