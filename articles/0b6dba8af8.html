:[{"year":1952,"month":3,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编辑同志:读到今天(八日)蒋虹同志“与你们的父母划清界限吧!”一文，有力地指出了我们年轻人“不能从资产阶级父母那里得到真正的爱；只有人民、人民的祖国和伟大的共产党才会给我们以大公无私的爱”，这篇文章对我们的教育意义很大。但是这个题目我总觉有点不妥。与“父母”划清界限，当然是指资产阶级的父母，但为什么不直截了当地讲出来?我认为这个题目太笼统，严格讲一句，是没有阶级立场，应该予以更正。"},{"type":"paragraph","text":"万丰染织印染一厂厂校教师　齐国梅"},{"type":"paragraph","text":"编者按:蒋虹同志那篇文章的题目实在太笼统、太含糊，容易引起人家误会，我们完全接受齐国梅同志的意见，把他来信发表以代更正，并向读者致歉。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0b6dba8af8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
