tart":5,"page_end":5,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"纪念毛泽东周恩来朱德逝世20周年","authors":["朱振国"],"parts":[{"type":"paragraph","text":"纪念会由纽约中国和平统一促进会、中国研究会、新世纪论坛、亚美时报主办。前国民党高级将领、纽约中国和平统一促进会总顾问沈策，著名国民党高级将领张治中的女儿张素初，以及侨领和旅居美国的中国学者代表出席了纪念会。"},{"type":"paragraph","text":"会场主席台上悬挂着一面鲜艳的五星红旗和毛泽东、周恩来、朱德在长征胜利到达陕北后的大幅合影照片。纪念会开始时，与会者起立高唱《东方红》。"},{"type":"paragraph","text":"沈策和张素初以及其他与会者在发言中指出，缅怀这三位历史伟人，主要是因为他们带领人民把一个贫穷落后、任人宰割的旧中国，改造成了一个独立自主、自力更生、朝气蓬勃、全面发展的新中国。"},{"type":"paragraph","text":"纪念会上，一些文艺家演唱了《北京的金山上》、《绣金匾》、《红军不怕远征难》和《歌唱社会主义祖国》等革命歌曲。"}],"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"朱德","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"105fb33e6f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
