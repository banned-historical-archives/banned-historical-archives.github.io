"dates":[{"year":1952,"month":3,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"文新印刷厂全体职工写信给毛主席要求严惩暗害志愿军的奸商敬爱的毛主席："},{"type":"paragraph","text":"我们从报纸上看到了丧尽天良的奸商们用最恶毒的手段暗害志愿军的消息。奸商的罪行引起我厂全体职工无比的愤怒与仇恨。我们一致要求政府给这些灭绝人性的奸商以最严厉的制裁；并要求让志愿军代表参加公审这些祖国叛徒的大会。通过这一事实，我们更进一步地认识了这就是资产阶级向我们直接开火，更认识了您号召反贪污、反浪费、反官僚主义的运动的伟大意义。我们完全了解，如果没有您这一伟大的号召，我们伟大的祖国不知要多受多大的损失。"},{"type":"paragraph","text":"为了给我们最可爱的人——志愿军同志们报仇，为了我们的好日子，毛主席，我们向您保证，一定把您的号召——反贪污、反浪费、反官僚主义运动进行到底。把我们厂子里的大、中、小老虎一网打尽。不彻底胜利决不罢休。"},{"type":"paragraph","text":"祝您的身体健康！  文新印刷厂全体职工"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6829087eed"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
