art":7,"page_end":7,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"学习求知的楷模——读《毛泽东的读书生涯》","authors":["杨立刚"],"parts":[{"type":"paragraph","text":"毛泽东以他建党、建军、建国的伟大业绩，成为中国人民的伟大领袖和世界现代史上的巨人。他不仅是革命家、政治家、军事家，还是诗人、学者、书法家。《毛泽东的读书生涯》这本书，为我们介绍了毛泽东的读书生活，作者从毛泽东读书环境、读书内容、读书方法、读书精神、读书应用5个方面展开，全书融故事性、哲理性、知识性为一体，使毛泽东的音容笑貌再现于我们面前，读后既感到亲切，又会得到深刻有益的启迪。"},{"type":"paragraph","text":"我读了这本书后，不仅学到了毛泽东读书要动笔、博览群书、有所侧重、独立思考、不耻下问、注意调节、经世致用等读书方法和读书艺术，认识到一个人应该如何营造自己的读书生活。更重要的是我学到了毛泽东同志的求知精神“吾生有涯，而知无涯”。是啊，以有限的生命去完成无限的追求，这是一种崇高的境界。毛泽东成为伟大的革命领袖，原因固然是多方面的，但勤奋不懈的读书生活和丰富的革命斗争实践，正是他成功的基石。记得雷锋同志也曾说过：“我要把有限的生命投入到无限的为人民服务中去。”我想，我虽然是一介凡夫，充其量可比作一个小小的火花，但如果这小小的火花能投身到燎原的大火中去，那我的精神世界将是无比灿烂的。我愿把有限的生命投入到无限的事业追求中去，投入到无限的为人民服务中去。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b83171ea13"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
