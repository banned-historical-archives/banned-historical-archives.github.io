script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"为胜利举行第十届禁止原氢弹世界大会而奋斗日本人民不断击败修正主义分裂活动广岛和长崎两县“原氢协”整顿组织开除分裂主义领导人　新潟等县“原氢协”粉碎右翼社会民主主义者的分裂阴谋","authors":[],"dates":[{"year":1964,"month":6,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京9日电】　东京消息:日本进步力量正在加强团结、不断击败日本右翼社会民主主义者和现代修正主义者的分裂活动，为胜利举行第十届禁止原子弹氢弹世界大会而奋斗。"},{"type":"paragraph","text":"广岛县民主团体的一百二十名代表七日举行大会，改选了禁止原子弹氢弹(“原氢协”)广岛县协议会的领导机构，因为广岛县协议会过去的领导成员森泷市郎等勾结当地社会党和工会评议会的右翼领导人，冒用协议会名义进行分裂活动。会上决定在世界大会召开以前在广岛组织一个有五万人参加的大会，并且派七百名代表出席世界大会。"},{"type":"paragraph","text":"在长崎县，“原氢协”县协议会在五月三十日举行了理事会议，开除了分裂主义的领导人，选出新的领导机构。"},{"type":"paragraph","text":"广岛和长崎两县“原氢协”整顿组织的斗争，有力地打击着日本右翼社会民主主义者和现代修正主义者分裂第十届禁止原子弹氢弹世界大会的阴谋。他们计划在八月六日举行第十届世界大会的同时在广岛召开另一个“禁止原子弹氢弹会议”，以破坏世界大会。"},{"type":"paragraph","text":"新泻、山梨、櫔木和佐贺各县的“原氢协”不久前也粉碎了右翼社会民主主义者的分裂活动，并分别于五月底到六月初举行了常任理事会议或者所属团体代表会议，决定为第十届世界大会的胜利召开而奋斗。"},{"type":"paragraph","text":"为了成功地召开世界大会，日本“原氢协”预定在二十日召开全国理事会议，改选全国理事，并且在全国各地展开包括集会、签名、募捐等在内的有一百万人参加的广泛运动。在这种情况下，日本的禁止原子弹氢弹运动更加活跃起来，许多过去没有“原氢协”组织的地方相继成立起协议会。奈良市的三十二个群众团体在五月底成立了“原氢协”市协议会。香川县的五个市和两个郡正在完成组织地方协议会的准备工作。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a897e0e92c"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
