指示","authors":[],"dates":[{"year":1968,"month":1,"day":21}],"is_range_date":false,"parts":[{"text":"北京来电：陈伯达同志等中央首长接见福建学习班代表时的指示","type":"title"},{"text":"陈伯达同志等中央首长于20日晚接见福建学习班代表时，对福建当前的文化大革命问题作如下3点指示：","type":"paragraph"},{"text":"一、按照毛主席指示，实行归口大联合。大家要立即认真讨论，坚决执行。","type":"paragraph"},{"text":"二、通知各派，把枪和各种武器、车辆立即上交；一切工厂都不能私造武器，抓、关对方人员21日立即释放；保证海陆交通运输畅通。","type":"paragraph"},{"text":"三、在毛泽东思想学习班的基础上，搞各派的革命大联合，准备建立省的革命三结合，建立福建省的革命委员会。","type":"paragraph"},{"text":" 厦门革联代表：林银鹏、朱蛤目厦门革委会代表：洪根盛、刘家冀厦门促联代表：苏辉明、刘辉文","type":"paragraph"},{"text":" 来源：福建省厦门革命到底联合总司令部八·二九厦门大学红卫兵独立团《挺进》编委会编《中央（首长）对厦门文化大革命问题的指示汇编》1969年4月。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"陈伯达","type":"人物"},{"name":"福建文革","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e377feb2bb"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
