script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"邓小平副总理会见樱田武和夫人  邓颖超副委员长会见樱田武和夫人","authors":[],"dates":[{"year":1979,"month":10,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"邓小平副总理会见樱田武和夫人"},{"type":"paragraph","text":"邓颖超副委员长会见樱田武和夫人"},{"type":"paragraph","text":"新华社北京九月三十日电  邓小平副总理今天晚上会见了日本经营者团体联盟名誉会长樱田武和夫人，双方进行了亲切友好的交谈。"},{"type":"paragraph","text":"中国国际贸易促进委员会主任王耀庭、副主任肖方洲参加了会见。"},{"type":"paragraph","text":"新华社北京九月三十日电  人大常委会副委员长邓颖超今天上午会见日本经营者团体联盟名誉会长樱田武和夫人一行。"},{"type":"paragraph","text":"樱田武是日本财界知名人士。他对能同中国人民一起欢庆新中国成立三十周年的节日感到高兴。他说，中国是日本的近邻。中国的繁荣同日本的繁荣紧密相关，我们愿为中国的四化作出自己的贡献。邓副委员长谈到了我国人民正在隆重庆祝建国三十周年，决心为实现四化而努力奋斗。她感谢日本经济界朋友为中国四化所表达的友好情谊。"},{"type":"paragraph","text":"中国国际贸易促进委员会副主任肖方洲，日本驻中国大使馆参赞井出诚一郎等参加了会见。"},{"type":"paragraph","text":"（附图片）"},{"type":"paragraph","text":"邓小平副总理会见日本经营者团体联盟名誉会长樱田武和夫人。 新华社记者摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0829774621"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
