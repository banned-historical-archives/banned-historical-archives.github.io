art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"邓小平会见日本前首相福田邓小平说：关于台湾回归祖国实现统一的九条建议，是合情合理的？福田对此表示理解和赞赏","authors":[],"parts":[{"type":"paragraph","text":"据新华社11月2日讯 中共中央副主席邓小平今天上午会见了日本众议员、前首相福田赳夫。"},{"type":"paragraph","text":"邓小平对福田说，我们非常欢迎你来访问。你为缔结中日和平友好条约作出了贡献。中国人民是不会忘记所有为中日友好作出过努力的人士的。"},{"type":"paragraph","text":"邓小平和福田还就共同关心的问题交换了意见。"},{"type":"paragraph","text":"邓小平介绍了中国对一些国际问题的看法。福田认为，当前国际政治和经济局势都处于紧迫的状态。对此，世界上爱好和平的国家应该紧密协商，进行合作。他说，日中两国对当前威胁世界和平的因素的看法是一致的。他对中国对当前国际形势所采取的立场表示理解。"},{"type":"paragraph","text":"邓小平在谈到关于台湾回归祖国实现祖国统一的九条建议时说，这九条建议是合情合理的，我们并不是要它投降，我们提出的是对等的谈判。福田说，他读了九条，对此表示理解和赞赏。"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"世界形势","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9d6df8c95c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
