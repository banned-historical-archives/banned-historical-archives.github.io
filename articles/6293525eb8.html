<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"克服右倾思想投入新的战役市搬运公司打虎队 打出老虎七十余只(3月5日3版更正为“打出老虎六十余只”)","authors":["钟宝年"],"dates":[{"year":1952,"month":3,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　上海市搬运公司的“打虎”运动在克服了右倾思想后，已猛烈地投入第三个战役。打虎大军声势浩大，火力猛烈，三宝齐放，然后分割迂回围剿，连日来打出大老虎七只、中小老虎五十五只，现正乘胜追击，扩大战果中。"},{"type":"paragraph","text":"搬运公司是新的企业，打进来许多资产阶级的“坐探”，如机务处杨志康、葛泽民等都是车商老板；又由于制度混乱，贪污情况极为严重。打虎运动开始，又由于打虎队队长马乃松(即公司经理)严重的存在着“思想老虎”，对“虎”性估计不足，如机务处损失十三亿多元，群众不满，向该处猛烈进攻，马代为解释，说损失只二、三亿元；打虎时并把钻进来的车商老板葛泽民提为打虎检查组员(后被群众撤销)，以致老虎气焰嚣张，一口咬定，死推硬赖，甚至向群众威胁要材料。群众极为愤怒，开始猛攻时，老虎用哭、下跪、具保、退还偷工减料损失等手段，马乃松领导战斗意志不坚决，束手束脚，畏缩不前，客观上包庇“老虎”。二月二十二日召开职工大会，佟子君副经理传达上级决定，宣布将马乃松撤职查办，撤销打虎队长职务；接着宣布二十五名坦白较诚的小贪污分子免予刑事、行政处分，命其参加战斗；拒不坦白的赵有才等九名停职反省，限两天交代清楚。大会至此，群众情绪激昂，自动坦白者三十余人，检举条纷纷投到主席台，邪气开始下降，正气上升。"},{"type":"paragraph","text":"军威大振之后，接着发动码头、榻车工人为生力军，重张旗鼓，经过调查分析，充分掌握材料，向贪污分子猛烈围攻。领导上亲自上火线，灵活利用三宝，大会上猛压，并典型示范，叫贪污分子徐筱华当场坦白，并揭破贪污集团的“攻守同盟”，把其他老虎陷于孤立，大小老虎即纷纷落网，连日来捷报频传，获得了打出大老虎七只、中小老虎五十五只的辉煌战果。"},{"type":"paragraph","text":"获得辉煌战果的原因，首先是领导上作战决心坚强，其次是充分发动了码头、榻车工人，组织了强大“打虎”队伍，克服了右倾思想。打下老虎后，及时总结经验，推广全战线(各分支机构)，从而提高打虎经验，增强胜利信心。(钟宝年)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6293525eb8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
