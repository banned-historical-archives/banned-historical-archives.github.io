人员亲视含殓","authors":[],"dates":[{"year":1955,"month":2,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"全国人民代表大会常务委员会副委员长"},{"type":"paragraph","text":"张澜先生昨在京逝世"},{"type":"paragraph","text":"毛泽东主席同国家其他领导人员亲视含殓"},{"type":"paragraph","text":"【新华社九日讯】中华人民共和国全国人民代表大会常务委员会副委员长、中国人民政治协商会议全国委员会副主席、中国民主同盟主席张澜先生，患重度动脉硬化及肺炎，经医生多方诊治无效，于一九五五年二月九日十二时三十分在北京医院逝世。张澜先生四川南充县人，享年八十四岁。"},{"type":"paragraph","text":"【新华社九日讯】张澜先生灵柩在九日下午移到中山公园中山堂，晚上九时入殓。"},{"type":"paragraph","text":"亲视含殓的有：中华人民共和国主席毛泽东，全国人民代表大会常务委员会委员长刘少奇，副委员长宋庆龄、林伯渠、李济深、沈钧儒、郭沫若、黄炎培、彭真、陈叔通和部分常务委员，中国人民政治协商会议全国委员会主席周恩来、副主席董必武、李四光和部分常务委员，国务院副总理陈云、彭德怀、邓小平、李富春、李先念，秘书长习仲勋，中国民主同盟中央委员会副主席章伯钧、罗隆基、马叙伦、史良、高崇民及部分中央委员和候补中央委员等。"},{"type":"paragraph","text":"入殓时，张澜先生的夫人刘慧征及其子女在旁守灵。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9fd146b526"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
