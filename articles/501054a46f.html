","authors":[],"dates":[{"year":1952,"month":1,"day":15}],"is_range_date":false,"parts":[{"text":"北京市百货公司发生吊打贪污分子现象","type":"title"},{"text":"【本刊讯】北京市百货公司进行反贪污斗争中，采用了农村斗争地主的办法斗争贪污分子。最近已发现有打人(第一门市部)、吊人(第四门市部)的事件，罚跪、罚站的现象很普遍。他们一般采取的斗争办法是：叫贪污分子站在中间，不准戴帽子，不准抬起头来，大家喊口号，哄、追、逼贪污分子坦白。十三日夜晚第一门市部发生打人的事，估计可能是坏分子钻空子。因为打人的是一个贪污分子，他的问题还没有交代清楚，而且他本人曾当过国民党的伞兵，政治面目不清楚。此人在斗争大会上假装积极，也常找机会打击积极分子。第四门市部吊人事件的原因现在还未弄清楚。","type":"paragraph"}],"comments":[],"origin":"1952年1月15日新华通讯社编《内部参考》。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"501054a46f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
