辟","authors":[],"dates":[{"year":1957,"month":8,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京27日电】　中国科学院哲学社会科学部今天上午召开常务委员会会议，决定立即在社会科学界展开反右派斗争，捍卫马列主义，粉碎资本主义，粉碎资产阶级社会科学复辟的阴谋。"},{"type":"paragraph","text":"会上，范文澜、于光远、翦伯赞、狄超白、金岳霖、罗常培等都发了言。他们认为右派分子图谋使资产阶级社会科学复辟，进行反共、反社会主义、反马列主义的活动，是章罗联盟政治阴谋的重要组成部分，因此目前在社会科学界开展反右派斗争，具有重要意义。"},{"type":"paragraph","text":"会上指出，右派分子费孝通、吴景超、李景汉等利用发表文章、串连集会等方式，在企图使资产阶级社会学复辟方面进行了一系列的活动；最后并拟订了包括成立研究机构，在大学里建立社会学系，成立“社会学会”等内容的具体方案。右派分子的目的，不仅在于使资产阶级社会学在我国死灰复燃，夺取马列主义的思想阵地，而且是为了假借学术研究名义，制造、挑拨和扩大各方面的矛盾，以便用来反对共产党和社会主义。5、6月间，右派分子、北京大学教授陈振汉等草拟了一个称为“我们对于当前经济科学工作的一些意见”的纲领性的文件。陈振汉等在这个文件中肆意攻击共产党对国家经济工作的领导，抹煞我国社会主义经济建设的伟大成绩，污蔑马克思列宁主义，挑拨共产党和知识分子的关系，并且公然要求让资产阶级“经济学家”参与国家经济工作的决策，以资产阶级经济学来代替马克思主义的经济学。右派分子在“社会学”方面和经济学方面的活动，实际上是章罗联盟的反社会主义科学纲领的具体化。"},{"type":"paragraph","text":"哲学社会科学部将在最近召开会议，对这些右派分子的反动言行进行揭发和批判。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4704b8d8e4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
