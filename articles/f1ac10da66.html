":1967,"month":1,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席是红太阳"},{"type":"paragraph","text":"朝鲜族　尹今哲毛主席住在北京城，红太阳挂在咱们心坎坎上。天上的太阳只是白天照，心上的太阳日夜放光芒。七亿人民心中升起红太阳，革命的路上当闯将。怕什么风，怕什么浪，敢教河山换新装。世界人民心中升起红太阳，五洲四海风雷激荡。反美战歌冲云霄，誓把帝国主义统统埋葬！红太阳照在心坎坎上，浑身充满无敌的力量。牛鬼蛇神脚下踩，崭新的世界我们创！"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f1ac10da66"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
