art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"调动一切积极因素深入揭批“四人帮”","authors":[],"parts":[{"type":"paragraph","text":"本报讯 在揭批“四人帮”的斗争中，空军某部机务三中队，认真学习和贯彻毛主席《论十大关系》和华主席在第二次全国农业学大寨会议上重要讲话的精神，充分调动各方面的积极因素，推动了揭批“四人帮”群众运动的深入发展。"},{"type":"paragraph","text":"机务三中队党支部首先注意调动“一班人”的积极性，让干部当好揭批“四人帮”的带头人。前一段，中队领导班子中个别同志认为，“四人帮”已经成了过街老鼠，不批也臭了，对深入揭批认识不足。党支部“一班人”反复学习中央有关文件，学习华主席讲话中关于深入揭批“四人帮”的指示，认识到：过去，“四人帮”帽子满天飞，棍子遍地打，搞得是非不明，路线不清，在思想、理论和实际工作上造成了很大混乱，我们要彻底肃清他们的流毒，还必须做艰苦细致的工作。穷寇要猛追，落水狗要痛打。党支部成员更自觉地站在斗争前列，坚持带头学，带头批，经常分析运动形势，深入班组调查研究，广泛开展谈心活动，及时解决深入揭批中的问题，加强了对运动的领导。"},{"type":"paragraph","text":"这个中队十分重视发挥理论骨干的积极性。党支部引导理论骨干切实做好五件事：一是掌握武器。结合批判内容，选出马列和毛主席有关论述，用大字抄出来，供大家学习。二是选好靶子。根据中央文件公布的“四人帮”的罪行和报刊上的材料，分类整理出“四人帮”罪行一百例，为中队批判提供靶子。三是批判引路。批判之前，让理论骨干先研究批判提要，开批判会时作引路发言。四是解决难点。把群众批判中遇到的难点，交给理论骨干学习研究，然后给大家作辅导。五是组织出大批判专栏，交流和总结大批判的经验。"},{"type":"paragraph","text":"三中队还注意发挥团支部、革命军人委员会的积极性，通过各种形式，处处摆开揭批“四人帮”的战场，使大批判搞得生动活泼，形成了人人口诛笔伐的群众性批判热潮。"}],"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"abd284c235"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
