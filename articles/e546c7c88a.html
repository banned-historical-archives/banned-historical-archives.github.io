art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"密铁拉人民纺织厂的友谊佳话","authors":[],"parts":[{"type":"paragraph","text":"坐落在缅甸古都曼德勒南部的密铁拉人民纺织厂，是缅甸目前最大的纺织厂。是由中缅两国工人和技术人员共同努力建设起来的。全厂有八万纱锭、六百台布机、四千余工人。"},{"type":"paragraph","text":"在兴建密铁拉人民纺织厂的过程中，中缅两国工人、技术人员密切合作，互相学习，结下了真挚的友谊。"},{"type":"paragraph","text":"密铁拉的旱季骄阳似火，连室内的桌椅也是热烫的。在这样的大热天，棉验室却门窗紧闭，中缅朋友全神贯注地教学检验原棉纤维。这是一项十分细致的工作，一根纤维细不过头发丝的四、五分之一，不要说开电扇，人们只要打个喷嚏，就会把纤维吹得无影无踪。中缅朋友热得满头大汗，但他们都顾不得休息。在中缅朋友的共同努力下，棉验室不仅为密铁拉人民纺织厂的稳产、高产起了参谋部的作用，而且还为其他纺织厂检验了棉样。"},{"type":"paragraph","text":"缅甸朋友感谢中国领导人给他们派来这样的好老师，他们怀念中国人民的伟大领袖毛主席和敬爱的周总理。玛阿玛基等缅甸女工早就学会了中国歌曲《东方红》，并经常唱给中国师傅听。玛阿玛基还把周总理和邓颖超副委员长访缅的照片精心收集起来。今年一月底，邓小平副总理访缅时，一位缅甸工人每天把报纸拿来给中国朋友看，他指着邓副总理在缅访问的照片，连声说：“德尤岗岱（中国好）！”"},{"type":"paragraph","text":"当扩建工程即将完工的时候，缅甸朋友看到朝夕相处的中国朋友就要回国了，心里都依依不舍。女工玛德敏生小孩后仅十一天，当听到中国专家要同全车间的工人合影时，她不顾身体虚弱，坐了四十分钟的汽车赶到了工厂。参加第二期扩建工程的一千多名缅甸工人为了表达自己的心意，共同凑钱为中国技术组买了一个象征缅甸民族文化的大琴。中国朋友虽然谢绝了礼物，但缅甸朋友的真挚友情却深深留在他们的脑海里。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e546c7c88a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
