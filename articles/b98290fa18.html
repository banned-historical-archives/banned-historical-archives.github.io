<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"只有在党的领导下，人民报纸才能办好，新闻界座谈会继续批驳资产阶级办报思想","authors":[],"dates":[{"year":1957,"month":6,"day":25}],"is_range_date":false,"parts":[{"text":"只有在党的领导下，人民报纸才能办好，新闻界座谈会继续批驳资产阶级办报思想","type":"title"},{"text":"【据新华社北京25日电】 新闻工作座谈会今天继续批判资产阶级右派分子在新闻工作中的反社会主义的活动和言论。","type":"paragraph"},{"text":"揭露郑白涛的反动言行","type":"subtitle"},{"text":"中国新闻社的孙殿伟、何耕新相继对郑白涛的言行进行了揭露。孙殿伟说，郑白涛在中国新闻社内就有许多反动的谬论。他同意章伯钧的言论，主张中国要实行两院制，主张办反对派的报纸。在章伯钧、章乃器、储安平等人的反党活动被揭露后，他仍然替他们辩护，他说“党天下”的说法是对的，他认为定息不是剥削甚至不是不劳而获而是和在银行里存款的利息一样。他认为目前报纸上对右派分子的驳斥是官僚主义、教条主义的作法。他主张办“同人通讯社”，不要共产党领导。中国新闻社的同志批评他，他说这是共产党的愚民政策的成功，他并把这些人称作打手。何耕新说:郑白涛口头标榜新闻没有阶级性，但是他在中国新闻社工作中却非常有阶级性。章伯钧的所谓“政治设计院”的谬论提出后，他主张马上发消息。李康年的定息二十年的建议他立刻编发了，李后来撤销这建议，他却不发。看到报纸反右派的言论他就唉声叹气，对反动作品“花丛小语”他就到处向人宣传。他所写的对外用的稿子几乎和资产阶级通讯社记者写的一样，片面地说我们经济困难、原料不足。他对我们实际是大骂而不是小骂。他口称新闻要像语言一样普遍地为各阶级服务，实际他却是坚持反社会主义观点。","type":"paragraph"},{"text":"王芸生等的联合发言","type":"subtitle"},{"text":"接着大公报的主以负责人王芸生、袁统明、孔昭恺、刘克林等四人在会上作了题为“怎样办一张社会主义报纸”的联合书面发言。在发言里他们说明社会主义国家的报纸一定要和资本主义国家的不同。他们说毛主席在“关于正确处理人民内部矛盾的问题”中提出的六项政治标准，就是我们办报的标准，其中主要的是党的领导，离开党的领导就是反对社会主义。他们说报纸是阶级斗争的工具，离开了工人阶级的立场就无法办社会主义的报纸。他们还谈到报纸的党性与人民性是完全一致的，没有党性就说不上人民性；新闻自由和客观并不是把一切事情都反映出来，这是不可能的，它必须有选择，这就得有立场。他们还检查了大公报的同人在新闻观点上还存在着的资产阶级思想，如昀近发表的“内蒙采访扑空记”和关于北京蔬菜自由市场的报道就是这种思想的表现，他们表示要很好在报社内检查和克服这种思想。","type":"paragraph"},{"text":"徐铸成说从这次严重的错误中得到了教训","type":"subtitle"},{"text":"文汇报的社长兼总编辑徐铸成今天也在会上讲了话。他说文汇报在过去一段时期内犯了严重的错误，各方面的批评，特别是人民日报的文章唤醒了我们，把我们从危险的道路上挽救故来。我们正在检查我们的错误。我从这次严重的错误中得到了以下的教训:一时一刻也不能忘了报纸是阶级斗争的工具；一时一刻也不能离开党的领导；教育者必须先受教育，作为人民的新闻工作者首先必须加紧学习，努力自我改造。我们相信我们一定能够从根本上改正错误，在党的领导下，把报纸办好。他在发言中说，他没有说过文汇报曾接受罗隆基的指示的话，他还说，文汇报并没有被罗隆基等所利用。","type":"paragraph"},{"text":"金仲华揭露右派分子向新闻日报进攻的活动","type":"subtitle"},{"text":"上海新闻日报社长金仲华在会上揭露右派分子向新闻日报进攻的活动。他说，全国宣传会议以后，陆诒回到上海就要派记者到全国大放；在上海搞政法座谈会，大肆夸张人民政法工作中的缺点，否定整个人民法律的尊严。在这一时期，右派分子如王造时、孙大雨、徐仲年、鲁莽等人总是要报纸一字不动地全文照登他们的错误言论。陆诒就更是在揭露矛盾中处处夸大，掀起一股歪风，煽动读者。金仲华说，吸取这些教训，我们只有打退右派的进攻，报纸才可以办好。金仲华还批评王中的新闻有商品性和郑白涛的新闻超阶级的错误观点。他说，郑白涛的小骂大帮忙，实际上是真骂假帮忙。","type":"paragraph"},{"text":"黄卓明对徐铸成浦熙修的否认感到十分奇怪","type":"subtitle"},{"text":"今天会上发言的还有南京新华日报的张居德和光明日报的黄卓明。黄卓明说，徐铸成曾设故罗隆基曾经给过文汇报指示，这是他在去年一次光明日报、大公报的民盟盟员和文汇报在北京的民盟盟员联欢会上，听徐铸成亲自说的，他对徐铸成、浦熙修的否认感到非常奇怪。","type":"paragraph"},{"text":"座谈会后天继续举行。","type":"paragraph"},{"text":" ——原载《文汇报》1957年6月26日","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"人民内部矛盾","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b98290fa18"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
