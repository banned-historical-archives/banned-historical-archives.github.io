year":1968,"month":4,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"再有几个月的时间，整个形势将会变得更好。"},{"type":"paragraph","text":"转引自《人民日报》、《红旗》杂志、《解放军报》一九六八年元旦社论《迎接无产阶级文化大革命的全面胜利》"},{"type":"paragraph","text":"正确地对待干部，是实行革命三结合，巩固革命大联合，搞好本单位斗、批、改的关键问题，一定要解决好。我们党，经过延安整风，教育了广大干部，团结了全党，保证了抗日战争和解放战争的胜利。这个传统，我们一定要发扬。"},{"type":"paragraph","text":"转引自《人民日报》、《红旗》杂志、《解放军报》一九六八年元旦社论《迎接无产阶级文化大革命的全面胜利》"},{"type":"paragraph","text":"党组织应是无产阶级先进分子所组成，应能领导无产阶级和革命群众对于阶级敌人进行战斗的朝气蓬勃的先锋队组织。"},{"type":"paragraph","text":"转引自《人民日报》、《红旗》杂志、《解放军报》一九六八年元旦社论《迎接无产阶级文化大革命的全面胜利》"},{"type":"paragraph","text":"办学习班，是个好办法，很多问题可以在学习班得到解决。"},{"type":"paragraph","text":"转引自《人民日报》、《解放军报》一九六八年二月五日社论《华北山河一片红—一热烈欢呼河北省革命委员会成立》"},{"type":"paragraph","text":"革命委员会的基本经验有三条:一条是有革命干部的代表，一条是有军队的代表，一条是有革命群众的代表，实现了革命的三结合。革命委员会要实行一元化的领导，打破重叠的行政机构，精兵简政，组织起一个革命化的联系群众的领导班子。"},{"type":"paragraph","text":"转引自《人民日报》、《红旗》杂志、《解放军报》一九六八年三月三十日社论《革命委员会好》"},{"type":"paragraph","text":"“三结合”的革命委员会，是工人阶级和人民群众在这次文化大革命中的一种创造。"},{"type":"paragraph","text":"转引自《人民日报》、《红旗》杂志、《解放军报》一九六八年三月三十日社论《革命委员会好》"},{"type":"paragraph","text":"国家机关的改革，最根本的一条，就是联系群众。"},{"type":"paragraph","text":"转引自《人民日报》、《红旗》杂志、《解放军报》一九六八年三月三十日社论《革命委员会好》"},{"type":"paragraph","text":"使前辈人不脱离群众，使青年人得到锻炼。"},{"type":"paragraph","text":"转引自《人民日报》、《红旗》杂志、《解放军报》一九六八年三月三十日社论《革命委员会好》"},{"type":"paragraph","text":"无产阶级文化大革命，实质上是在社会主义条件下，无产阶级反对资产阶级和一切剥削阶级的政治大革命，是中国共产党及其领导下的广大革命人民群众和国民党反动派长期斗争的继续，是无产阶级和资产阶级阶级斗争的继续。"},{"type":"paragraph","text":"转引自《人民日报》、《解放军报》一九六八年四月十日社论《英蓉国里尽朝晖一一热烈欢呼湖南省革命委员会成立》"},{"type":"paragraph","text":"(以上最新指示是—九六八年一月一日到四月十日在报刊上发表的)"}],"comments":[],"origin":"《人民日报》,《红旗》,《解放军报》","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"革命委员会","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e54e7b5bcd"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
