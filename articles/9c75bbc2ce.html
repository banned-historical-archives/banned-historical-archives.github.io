结束  各专区、县的三反运动在一月份全面展开","authors":[],"dates":[{"year":1952,"month":1,"day":14}],"is_range_date":false,"parts":[{"text":"山西省级机关第一批三反整风运动即将结束  各专区、县的三反运动在一月份全面展开","type":"title"},{"text":"【山西分社十四日讯】山西省级第一批二十五个机关的整风运动，已进入第三个阶段(鉴定、订立制度)，约在一月十五日前结束。第二批整风机关是工业财经部门，共九个机关，参加整风干部近六千人，本月六日开始，预计一月结束。各专区、县的三反运动亦在一月全面开展。","type":"paragraph"},{"text":"第一批整风运动中，由于中共山西省委十分重视对三反运动的思想领导和组织领导，首先迅速打破了领导干部及一般干部的“清水衙门没整头”的错误说法。据初步统计贪污人数共三百三十二人，占参加整风干部二千九百二十人中的百分之七。但有些机关的贪污浪费现象还未真正揭发出来，有些机关的负责人对三反运动的认识还不深刻，态度不够端正，对自己及本机关的一些问题存在着敷衍态度，因而群众发动得不好。如行政干校李志敏副校长说：“我们学校大贪污没有，小贪污免不了，但问题不大”。山西人民广播电台一负责干部说：“全年只有六亿元经营，即便有贪污浪费，能有多大油水”。省委已派专人深入检查并令该机关领导人进行深刻检讨。","type":"paragraph"},{"text":"太原市整风运动是一次整完的。从去年十二月八日开始，约在一月十五日可先后转入处理问题和研究新的制度，月底可进入总结阶段。太原市这一时期的整风运动发展得较快，主要是由于层层带头，反覆强调了首长负责。运动开始时，有的单位开展得不好，主要是领导干部本身有些问题，腰杆子不硬，但经揭发后运动就开展了。太原钢铁厂基本建设处处长浪费了几百亿，在干部中意见颇多，但领导干部采取了不正确态度，在讲话中表示自己一手包下来，并夸耀基本建设处成绩如何大，堵塞了群众的意见，现正重作检查。","type":"paragraph"}],"comments":[],"origin":"新华通讯社编《内部参考》1952年1月16日","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9c75bbc2ce"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
