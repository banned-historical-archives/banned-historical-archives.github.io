"year":1976,"month":5,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"邓小平越反对，我们越坚持"},{"type":"paragraph","text":"小靳庄大队理论小组副组长  王灭孔"},{"type":"paragraph","text":"在深入批判邓小平、反击右倾翻案风的斗争取得伟大胜利的时刻，热烈庆祝文化大革命十周年，重新学习毛主席亲自主持制定的中共中央五月十六日《通知》，回顾我们小靳庄大队文化大革命十年来的巨大变化，使我们更增添了对毛主席的热爱，更加深切地体会到毛主席亲自发动和领导的文化大革命就是好！"},{"type":"paragraph","text":"毛主席指出：“无产阶级文化大革命不搞是不行的”。就拿我们小靳庄来说吧，无产阶级文化大革命前，由于刘少奇反革命的修正主义路线的干扰破坏，当时的党支部不注意抓阶级斗争，不重视抓上层建筑领域的社会主义革命，封、资、修的黑货泛滥，阶级敌人乘机活动，唆使一些青年人看黄色小说，演帝王将相、才子佳人的戏，腐蚀了群众的灵魂，涣散了群众的斗志，影响了社会主义集体经济的巩固。在文化大革命中，我们小靳庄的广大贫下中农和干部，批判了刘少奇反革命的修正主义路线，总结了文化大革命前的沉痛教训，深刻认识到，“思想上政治上的路线正确与否是决定一切的。”新的党支部建立以后，坚持以阶级斗争为纲，注意抓意识形态领域的社会主义革命，大破旧思想、旧文化、旧风俗、旧习惯，并在斗争中出现了以政治夜校为中心的写诗歌、唱样板戏、讲革命故事等“十件新事”。几年来，我们在政治夜校学习马列著作和毛主席著作，努力学通弄懂无产阶级专政理论，大造革命舆论，用社会主义占领农村的思想文化阵地，把巩固无产阶级专政的任务落实到了基层。革命解放了生产力，革命促进了生产力的发展。全大队粮食亩产超了千斤，集体经济不断巩固和壮大。"},{"type":"paragraph","text":"广大革命人民群众欢呼文化大革命好得很！党内最大的不肯改悔的走资派邓小平，对文化大革命却恨之入骨。他重新工作不久，就翻文化大革命的案，算文化大革命的帐，抛出了“三项指示为纲”的修正主义纲领，宣扬阶级斗争熄灭论和唯生产力论，反对以阶级斗争为纲，否定党的基本路线，否定文化大革命，妄图复辟资本主义。去年七、八、九月，社会上政治谣言四起，奇谈怪论盛行。这股妖风也刮到了我们大队。大刮右倾翻案风的挂帅人物邓小平恶毒地攻击我们小靳庄，胡说什么“小靳庄有什么好，我看就不好”。攻击我们唱样板戏、写诗是“极左”。妄图否定我们在文化大革命中出现的“十件新事”。邓小平极力攻击“十件新事”，反对意识形态领域的社会主义革命，正好说明“十件新事”发挥了作用，他越反对，我们越要坚持！我们一定要坚持斗争，捍卫文化大革命的胜利成果。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"78f066ef80"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
