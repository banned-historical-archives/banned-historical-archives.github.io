dates":[{"year":1993,"month":12,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报北京12月10日专电　(驻京记者　唐斯复)今日上午，“纪念毛泽东诞辰100周年美术作品特展”在中国美术馆隆重开幕，文化部部长刘忠德剪彩。"},{"type":"paragraph","text":"值此纪念毛泽东诞辰100周年之际，文化部委托中国美术馆，从数十年来馆藏的大量作品中精选40件49幅油画、中国画、版画、雕塑、年画、连环画展出，表现毛泽东形象、毛泽东诗意以及革命历史内容。"},{"type":"paragraph","text":"展览会上，中国画有李琦创作的《主席走遍全国》和李可染借毛泽东诗意创作的《万山红遍层林尽染》，油画有《天安门前》、《贫农的儿子》、《追念战友》、《红星照耀中国》等，版画《毛泽东像》(晋绥邮票)和《毛泽东同志像》是李少言1945、1946年的作品，毛主席雕像是刘开渠的作品，十幅连环画选自《地球的红飘带》。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"28745df243"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
