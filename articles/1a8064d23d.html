script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"不愧为毛主席的好战士　不愧为劳动人民的好儿女姜福兴干彩英烈士为人民英勇献身奋不顾身跳入急流抢救了个又一个翻船落水的红卫兵，最后不幸牺牲　经领导批准追认姜福兴为中共正式党员，追授干彩英为“优秀红卫兵战士”　广大革命派和红卫兵小将决心向烈士学习，紧跟毛主席，干一辈子革命","authors":[],"dates":[{"year":1968,"month":7,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　在夺取无产阶级文化大革命全面胜利的凯歌声中，在上海全市一千万军民向无限忠于毛主席革命路线的好干部门合同志学习的热潮中，又传来了一曲闪耀着共产主义思想的凯歌:临潼中学革命教师姜福兴和红卫兵小将干彩英，以门合同志为光辉榜样，为了抢救落水的红卫兵战友而英勇地献出了自己的生命。"},{"type":"paragraph","text":"姜福兴生前是虹口区临潼中学革命委员会成员，民兵代表。干彩英生前是临建中学初三学生。今年六月三日，在前往奉贤金汇公社参加“三夏”劳动的途中，他们不顾自己不会游泳，纵身跳入水深流急的江河，持足全部精力，救起了一个又一个翻船落水的本校红卫兵战士。最后，他们自己被巨浪卷入了深水，不幸牺牲。"},{"type":"paragraph","text":"姜福兴和干彩英都出身于工人家庭。他们生前无限热爱伟大领袖毛主席，一刻也不离开毛泽东思想，一步也不离开毛主席的革命路线。他们在壮烈牺牲的时刻，身上还背着毛主席著作。他们平时自觉地活学活用毛泽东思想，热情地宣传毛泽东思想，勇敢地捍卫毛泽东思想。他们具有高度的阶级斗争和路线斗争的觉悟，在无产阶级文化大革命运动中，努力紧跟毛主席的伟大战略部署，坚决贯彻以毛主席为首、林副主席为副的无产阶级司令部的每一个战斗号令。毛主席的《炮打司令部》大字报出来后，他们就高举“对反动派造反有理”的大旗，猛烈地冲击资产阶级反动路线。毛主席提出“无产阶级革命派联合起来，向党内一小撮走资本主义道路当权派夺权!”他们就同无产阶级革命派一起，走在夺权斗争的前列。毛主席发出“复课闹革命”的伟大号召，他们就积极响应。最近他们又以身作则，做出榜样，坚决贯彻“面向农村，面向边疆，面向工矿，面向基层”的伟大方针。他们不愧为毛主席的好战士，劳动人民的忠实儿女。"},{"type":"paragraph","text":"为了表彰姜福兴和干彩英无限忠于毛主席的崇高品质，最近，经领导批准，追认姜福兴同志为中国共产党正式党员，追授干彩英同志以“优秀红卫兵战士”的光荣称号；并追授姜福兴、干彩英两同志为烈士。"},{"type":"paragraph","text":"毛主席教导我们:“为人民利益而死，就比泰山还重”。姜福兴、干彩英是为人民的利益而死的，他们死得比泰山还重。他们将永远活在广大革命人民和红卫兵小将的心里。最近，虹口区广大无产阶级革命派和红卫兵小将，上海市大专院校红代会和中等学校红代会，分别举行了隆重的追授大会。大专院校红代会和中等学校红代会还发出了向“优秀红卫兵战士”干彩英同志学习的决定。上海市革命委员会领导成员、虹口区革命委员会负责同志分别参加追授大会。姜福兴烈士、干彩英烈士的家属和生前的战友，都参加了追授大会。参加追授大会的无产阶级革命派、红卫兵小将，还向烈士的家属赠送了毛主席著作和油画《毛主席去安源》以及绣有“永垂不朽”四个大字的锦旗等。"},{"type":"paragraph","text":"“成千成万的先烈，为着人民的利益，在我们的前头英勇地牺牲了，让我们高举起他们的旗帜，踏着他们的血迹前进吧!”在追授大会上，广大无产阶级革命派、红卫兵小将一再表示，要努力向美福兴、干彩英两位烈士学习，以门合同志为榜样，无限忠于毛主席，无限忠于毛泽东思想，无限忠于毛主席革命路线，紧跟毛主席，干一辈子革命。许多无产阶级革命派战士和红卫兵小将还表示，学习烈士们的英雄事迹，要学习他们鲜明的阶级立场，学习他们“对敌狠，对己和”的革命精神，积极投入当前的对敌斗争，搞好清理阶级队伍的工作，搞好革命的大批判。红卫兵小将还表示，要向他们学习，坚决响应以毛主席为首、林副主席为副的无产阶级司令部提出的“四个面向”的伟大号召，走与工农相结合的道路。许多在生产战线上的无产阶级革命派战士还表示，要向他们学习，抓革命，保生产，促工作，把各项工作做得更好，为夺取无产阶级文化大革命全面胜利立新功。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"革命委员会","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"清理阶级队伍","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1a8064d23d"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
