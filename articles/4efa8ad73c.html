uthors":[],"dates":[{"year":1981,"month":9,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社北京九月十四日电　瑞典王国国王卡尔十六世·古斯塔夫陛下和王后西尔维娅陛下，应人大常委会委员长叶剑英的邀请，今天下午乘专机抵达北京，开始对我国进行为期十天的国事访问。"},{"type":"paragraph","text":"随同国王来访的有司法大臣卡尔·阿克塞尔·佩特里，劳工、能源大臣英厄马尔·埃利亚松，国王军事参谋长斯蒂格·辛内格伦将军等共二十二人。"},{"type":"paragraph","text":"下午四时，人大常委会副委员长习仲勋代表叶剑英委员长，在人民大会堂东门外广场主持了欢迎仪式，热烈欢迎来自北欧的贵宾。"},{"type":"paragraph","text":"据新华社北京九月十四日电　人大常委会副委员长习仲勋今晚主持了以叶剑英委员长名义举行的盛大宴会，热烈欢迎瑞典国王卡尔十六世·古斯塔夫和王后西尔维娅陛下。"},{"type":"paragraph","text":"人民大会堂宴会厅里今晚洋溢着中瑞两国人民友好的气氛。习仲勋和卡尔十六世·古斯塔夫先后讲了话。"},{"type":"paragraph","text":"出席宴会的有:人大常委会副委员长班禅额尔德尼·却吉坚赞，国务院副总理余秋里，国务院副总理兼外交部长黄华和夫人，对外文委主任黄镇，教育部长蒋南翔，文化部代部长周巍峙，中国人民解放军副总参谋长杨勇，中国驻瑞典大使曹克强和夫人，以及政府其他部门、北京市人民政府的负责人。"},{"type":"paragraph","text":"国王和王后的随行人员、瑞典驻中国大使斯滕·松德费尔特和夫人应邀出席了宴"},{"type":"paragraph","text":"据新华社北京九月十四日电　人大常委会委员长叶剑英今天晚上在人民大会堂上海厅会见瑞典国王卡尔十六世·古斯塔夫和王后西尔维娅陛下。"},{"type":"paragraph","text":"叶剑英对国王和王后前来我国进行国事访问表示热烈欢迎。他说，瑞典人民是同中国人民友好的。"},{"type":"paragraph","text":"卡尔十六世·古斯塔夫说，瑞中两国三十多年前就建立了正式外交关系，瑞典的广大人民对中国发生的一切事情都很感兴趣。他还谈到这次对中国的访问，是他期待已久的。"},{"type":"paragraph","text":"\u003cIMG alt=请插入7号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1981\\09\\819F010301.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e叶剑英委员长九月十四日在人民大会堂会见瑞典国王卡尔十六世·古斯塔夫和王后西尔维娅陛下。"},{"type":"paragraph","text":"新华社记者　摄(传真照片)\u003c/FONT\u003e"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"习仲勋","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4efa8ad73c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
