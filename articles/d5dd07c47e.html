"authors":[],"dates":[{"year":1967,"month":6,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"战无不胜的毛泽东思想的新胜利"},{"type":"paragraph","text":"丹麦共产主义工作小组负责人热烈祝贺我氢弹试验成功"},{"type":"paragraph","text":"新华社十八日讯　哥本哈根消息：丹麦共产主义工作小组负责人戈特弗雷德·阿佩尔十七日打电报给中国共产党中央委员会，最热烈地祝贺中国第一颗氢弹试验成功。他说：“这是无产阶级文化大革命解放中国人民创造力的新的证据，是战无不胜的毛泽东思想的新胜利”。"},{"type":"paragraph","text":"阿佩尔在电报中提到帝国主义、现代修正主义和一切反动派都竭力反对中国发展核武器时着重指出：全世界无产阶级和革命人民的伟大领袖毛泽东主席说：“凡是敌人反对的，我们就要拥护；凡是敌人拥护的，我们就要反对。”"},{"type":"paragraph","text":"他说：“凡是真心希望人民获得自由和独立并为此而斗争的人，真心要和平和社会主义并为此而斗争的人，都把中国的核武器看作是对他们的斗争的卓有成效的贡献。它加强了反对以美国为首的帝国主义的联合阵线，是中国人民对保卫世界和平、对禁止和销毁核武器作出的新的贡献。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d5dd07c47e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
