nned-historical-archives/banned-historical-archives9/main/books/十年文革中首长讲话传信录1.pdf"],"article":{"title":"周恩来、江青在北京工人体育场接见徒步来京红卫兵时的讲话","parts":[{"type":"title","text":"365.周恩来、江青在北京工人体育场接见徒步来京红卫兵时的讲话"},{"type":"paragraph","text":"(1966年12月28日)"},{"type":"paragraph","text":"大会开始前，周总理、康生、江青等首长乘车绕场一周接见和检阅徒步来京的红卫兵代表。江青：同学们，红卫兵小将战友们："},{"type":"paragraph","text":"你们是徒步长征从祖国各地到北京来，我们欢迎你们，向你们致无产阶级文化大革命的敬礼！你们是遵照毛主席的教导，发扬艰苦朴素的作风，一路走着来的。拜贫下中农为师，拜工人为师，我们向你们学习。道路是曲折的，不平坦的，同志们要有百倍的英勇顽强的精神，继续奋斗，祝您们继续完成长征宣传队的任务，我的话完了。周恩来：同学们，红卫兵战友们："},{"type":"paragraph","text":"我现在向你们致无产阶级文化大革命的战斗的敬礼！让我代表我们伟大的领袖毛主席、林彪副主席、党中央和国务院问你们好！"},{"type":"paragraph","text":"你们从我们祖国各地，跋涉千山万水，终于来到我们祖国首都北京。我们欢迎你们！你们热烈要求见我们伟大的领袖毛主席，我们懂得你们的心情，我现在宣布你们现在回去，到明年春暖季节，我们免费乘车接你们来。"},{"type":"paragraph","text":"我很高兴地看到你们学习解放军的精神，有的走两千多里，最远的走五千多里，你们这种精神，值得我们学习，值得全国的同学学习。你们自己说得对，这仅仅是万里长征的第一步，你们还要好好学习，要更好地学习解放军三大纪律八项注意，做坚强的解放军的后备力量。"},{"type":"paragraph","text":"现在你们快回去了，我们准备免费乘车送你们回去，如果你们愿意徒步走回去。那就更好。学习解放军，做战斗队、宣传队、学习队。"},{"type":"paragraph","text":"你们在长征的途中，吃多了粮食，用多了粮票，我们准备发给你们学校，补助你们。"},{"type":"paragraph","text":"同学们、战友们，你们这种精神要永远保持下去，将来一旦国家有事，你们是最好的解放军后备队。同学们、战友们，让我们一起高呼："},{"type":"paragraph","text":"长征精神万岁！"},{"type":"paragraph","text":"无产阶级文化大革命万岁！"},{"type":"paragraph","text":"无产阶级专政万岁！"},{"type":"paragraph","text":"伟大的毛泽东思想万岁！"},{"type":"paragraph","text":"伟大的中国共产党万岁！"},{"type":"paragraph","text":"伟大的领袖毛主席万岁！万岁！万万岁！"}],"authors":["周恩来","江青"],"dates":[{"year":1966,"month":12,"day":28}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":693,"page_end":694,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"江青","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"891f831e7f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
