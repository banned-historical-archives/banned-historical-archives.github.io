script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"法国共产党就政府危机发表声明  坚决主张成立奉行和平和民族独立政策的政府  揭发资产阶级领袖们继续执行卖国政策的阴谋","authors":[],"dates":[{"year":1953,"month":1,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"法国共产党就政府危机发表声明"},{"type":"paragraph","text":"坚决主张成立奉行和平和民族独立政策的政府"},{"type":"paragraph","text":"揭发资产阶级领袖们继续执行卖国政策的阴谋"},{"type":"paragraph","text":"【新华社五日讯】据塔斯社巴黎三日讯：法国共产党就政府危机发表声明。"},{"type":"paragraph","text":"声明首先指出：比内政府被迫辞职是法国工人阶级和城乡各阶层人民日益反对它的政策的结果。现在，资产阶级的领袖们想成立一个更加反动的政府，来达到比内政府所不能达到的目的。他们打算依靠用紧急法令和修改宪法的办法，来继续执行以马歇尔计划和北大西洋公约为基础的政策。同时，美国愈来愈坚持要法国加紧扩军备战，要在法国建立军事基地，武装西德，而且继续进行越南战争和朝鲜战争。"},{"type":"paragraph","text":"声明继续说：新的财政与经济负担（赋税增加、通货膨胀、货币贬值、工厂倒闭）使工人阶级、农民、中产阶级、妇女和青年受到打击。人民群众对政府愈来愈不满，而政府就加紧采取法西斯措施。这是一种恶性循环。如果要避免这种现象，只有全面改变政治方针。这种改变是必要的，而且是可能的。"},{"type":"paragraph","text":"声明着重说：在最近将来，成立一个执行和平与民族独立政策的法国政府是可能的。这个政府要摈弃北大西洋公约等一切侵略性战争协定，结束美国的占领；要努力促使和平解决德国问题，结束越南战争，使我们的经济恢复为和平经济，并且保障宪法自由和个人自由。"},{"type":"paragraph","text":"法国共产党提出成立这样一个政府的建议，它要求全体法国男女，不分年龄、党派、宗教、地区，一致起来讨论这个建议，并且团结起来，为争取建立这样一个政府而斗争。这个政府依靠工人阶级和全国所有重要的力量，所以它一定可以稳定。它可以立即实现下列各点：大规模削减用于军事与警察的拨款以平衡预算；实行真正的税收改革，减轻小纳税人的负担而取偿于资本家的巨额利润；合理减低物价，减低主要必需品的间接税以促使经济繁荣；提高劳动人民购买力以扩大国内市场；健全对外贸易，重建与苏联、中国及人民民主国家的贸易关系，在平等的基础上和越南、突尼斯、摩洛哥及其他不属于美元区的国家缔结经济协定以扩大对外贸易。这样的政府可以着手复兴工作，并且满足劳动人民的合法要求。这个政府还要尽一切力量来促使美国、苏联、英国、民主中国和法国五大国缔结和平公约。法国只有恢复了民族独立，才能再度起大国的作用，才能满怀信心地展望前途，保证人民获得面包、自由与和平。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"越南战争","type":"主题/事件"},{"name":"朝鲜战争","type":"主题/事件"},{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c072885530"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
