["冮冶"],"dates":[{"year":1991,"month":1,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"世界乒乓球明星巡回赛"},{"type":"paragraph","text":"金成熙获第一站冠军"},{"type":"paragraph","text":"马文革获第二站冠军"},{"type":"paragraph","text":"新华社东京１月２２日电  （记者冮冶）第二届世界乒乓球明星巡回赛今天在东京进行了第一站比赛，朝鲜选手金成熙获得冠军，日本选手涩谷浩名列第二。"},{"type":"paragraph","text":"这届明星巡回赛采取淘汰制。参赛选手共有８人，中国选手马文革在第一轮比赛中以１∶２（１９∶２１、２１∶１８、２１∶２３）输给了波兰的格鲁巴，中国另一名选手于沈潼在第一轮比赛中以１∶２（２１∶１８、１８∶２１、１９∶２１）负于涩谷浩。南朝鲜选手刘南奎在第一轮比赛中被荷兰的保尔·哈尔丹淘汰。"},{"type":"paragraph","text":"本报东京１月２３日电　中国选手马文革今天夺得第二届世界全明星男子乒乓球巡回赛第二站比赛的冠军。今天的比赛是在日本京都体育馆进行的。马文革在第一轮中以２∶１淘汰了汉城奥运会冠军、南朝鲜的刘南奎。接着他以２∶０胜荷兰选手保尔·哈尔丹。马文革在决赛中以３∶０胜朝鲜选手金成熙。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cdeea7fbb3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
