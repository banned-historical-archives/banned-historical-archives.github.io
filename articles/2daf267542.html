art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席给了我们布依族一切","authors":["布依族战士蒙华克"],"parts":[{"type":"paragraph","text":"党的八届十一中全会公报，是我国社会主义革命和社会主义建设的纲领性文件，它的每一句话都闪烁着毛泽东思想的光辉，每一个字都激励我们前进。听了以后，我感到浑身是劲，打心眼里欢呼：“毛主席万岁！万万岁！！”"},{"type":"paragraph","text":"我们布依人常说，千卷书万卷书，比不上毛主席四卷书；千句话万句话，比不上毛主席一句话。这是布依族人民发自内心深处的肺腑之言。解放前，我们受尽了阶级敌人的压迫和歧视，国民党反动派骂我们是蛮子，把我们从坝区赶到山区，又从山区赶进深山老林，过着暗无天日的牛马生活。一九四九年，一声春雷响，党和毛主席把我们救出了苦海，从此，红太阳照亮了布依人民的心。我们听毛主席的话，跟毛主席走，从十八层地狱，跃进到社会主义天堂。我入伍后，读毛主席的书，听毛主席的话，从一个放牛娃，成为一个光荣的共产党员，上北京见到了我们各族人民最敬爱的伟大领袖毛主席。我们布依人唱道："},{"type":"paragraph","text":"最长的江，是长江，"},{"type":"paragraph","text":"最深的海，是东海，"},{"type":"paragraph","text":"毛主席的恩情，"},{"type":"paragraph","text":"比长江还长，比东海还深。"},{"type":"paragraph","text":"毛主席领导我们绕过了无数暗礁，渡过了无数险滩，取得了一个接一个的胜利。我深深地体会到，没有毛主席，就没有全国人民的一切，就没有布依人民的一切，就没有我的一切。"},{"type":"paragraph","text":"党的八届十一中全会，向我们发出了活学活用毛主席著作的新的战斗号召，我们一万个赞成，一万个拥护。我一定遵照党的教导，努力学习毛泽东思想，忠实贯彻毛泽东思想，热情宣传毛泽东思想，勇敢捍卫毛泽东思想，永远高举毛泽东思想伟大红旗，奋勇前进！"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2daf267542"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
