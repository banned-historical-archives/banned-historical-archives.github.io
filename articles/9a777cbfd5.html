,"dates":[{"year":1967,"month":12,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编者按:毛主席教导我们:“掌握思想教育，是团结全党进行伟大政治斗争的中心环节。”目前，上海正在蓬勃展开的大学大用毛主席建党思想，大破特破中国赫鲁晓夫修正主义建党路线的群众运动，就是当前无产阶级文化大革命的中心环节。凡是抓住了这个中心环节，在本单位本地区放手发动群众，认真开展在建党路线问题上的大学习、大批判，那里就出现浓厚的政治气氛，人们的思想面貌就为之一新，有力地促进和巩固革命的大联合和革命的三结合，推动本单位的斗批改和各项工作的开展。"},{"type":"paragraph","text":"一个多月来，本报陆续收到大量批判中国赫鲁晓夫修正主义建党路线的稿件。这些稿件来自工厂、农村、学校、机关、部队、街道里弄等各条战线；这些稿件观点鲜明，感情充沛，文字简炼，批驳有力。这里我们选用了其中一部分来稿摘要发表。我们希望广大读者继续来稿来信，反映你们在建党路线问题上大学习、大批判的丰硕成果，反映你们的工作经验和通过建党路线上的大学习、大批判所出现的新气象，进一步从政治上、思想上、理论上把中国赫鲁晓夫的修正主义建党路线彻底批倒批臭。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"革命大批判","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9a777cbfd5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
