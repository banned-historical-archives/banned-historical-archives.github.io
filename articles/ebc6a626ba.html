ical-archives/banned-historical-archives8/main/maoquanji23.pdf"],"article":{"title":"对关于反对刘航探一类反动计划的指示稿的修改和批语","alias":"","parts":[{"type":"paragraph","text":"对关于反对刘航琛一类反动计划的"},{"type":"paragraph","text":"指示稿的修改和批语1]"},{"type":"paragraph","text":"（1947年10月27日）"},{"type":"paragraph","text":"我们在政治上要孤立自由资产阶级（特别是其中的右翼）和在经济上保护他们，二者似乎矛盾，其实并不矛盾。在蒋介石打倒以后，因为自由资产阶级特别是其右翼的政治倾向是反对我们的，所以我们必须在政治上打击他们，使他们从群众中孤立起来，即是使群众从自由资产阶级的影响下解放出来。但这并不是把他们当作地主阶级和大资产阶级一样立即打倒他们，那时，还将有他们的代表参加政府，以便使群众从经验中认识他们特别是右翼的反动性，而一步一步地抛弃他们。在经济上，则将在长时间内容许他们存在，并使他们的经济在政府法令许可下有一个一定程度的发展，以利经济之恢复与发展。对于在平分土地后生长出来的新富农，也是如此。在这个问题上的过左性急是错误的。"},{"type":"paragraph","text":"[1]本篇一是毛泽东在修改周恩来为中共中央起草的关于反对刘航琛一类反动计划的指示稿时加写的一段话；本篇二是关于修改和发出这一指示给周恩来的信。刘航琛，当时被聘为国民党政府全国经济委员会委员，提出组织和平统一大同盟以为美蒋的缓兵之计。"},{"type":"paragraph","text":"指示电很好，很有必要。惟须增加一条，作为第五条，将对自由资产阶级的政策问题完全弄清楚，预防过左倾向发生。这一倾向，在历史上是发生过的。此电当作普遍指示，发往各地。"}],"authors":["毛泽东"],"dates":[{"year":1947,"month":10,"day":27}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":380,"page_end":381},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ebc6a626ba"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
