<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"“豫剧大王”原来是个右派角色，陈素真捏造事实诬蔑新社会","authors":["新华社"],"dates":[{"year":1957,"month":9,"day":16}],"is_range_date":false,"parts":[{"text":"“豫剧大王”原来是个右派角色，陈素真捏造事实诬蔑新社会","type":"title"},{"text":"新华社","type":"authors"},{"text":"据新华社郑州１６日电: 河南省戏剧界连日来举行集会，揭露和批驳豫剧演员、右派分子陈素真的反动言行。","type":"paragraph"},{"text":"陈素真是河南省人民代表大会代表、中国戏剧家协会河南省分会副主席。揭露的大量事实表明，这个曾被吹嘘是“豫剧大王”的女演员，在几个月以前全国各地右派分子合演的向共产党、向社会主义猖狂进攻的丑剧里，却扮演了一个可耻的反派角色。","type":"paragraph"},{"text":"中国戏剧家协会来电揭露陈素真不久前曾公然对戏剧报的一个女工作人员说：“共产党领导不长了，因为不得人心。”陈素真在北京时，曾几次拜访右派分子吴祖光。就在吴祖光的反动论点受到批判以后，她还向吴表示赞同和支持吴的全部论点。特别恶劣的是，陈素真当时就住在中国戏剧家协会主席田汉家里，她竟将听到的有关情况，暗地派人给吴通风报信。","type":"paragraph"},{"text":"陈素真向别人散播“共产党不得人心”等谬论的时候，总要举出她作的一次所谓“农村调查”作根据。在最近几次会议上，她的这个所谓“调查”的鬼把戏也被人戳穿了。","type":"paragraph"},{"text":"原来今年５月间，陈素真到了开封县南北店村晨光农业社停留了还不足三个小时，只找过一个曾因倒卖粮食被政府扣押过的反动富农和另一个富裕中农，却捏造出一篇洋洋几千言的所谓“农村调查”来。在陈素真的笔下，把农民生活说得苦不堪言，还说农村成了“党员的世界、团员的天下”，“党团员大小都是官，是官还能劳动吗？”陈素真并说这些“官”虽然“不劳动”，却照样分享农民劳动成果，因此“做家少，分家多”，成了农村中一个“主要矛盾”。","type":"paragraph"},{"text":"开封县晨光农业社的代表王子贤，代表全社一千多社员在会上和陈素真说理。王子贤说，就在陈素真到我们社里去的时候，我们全社有半数以上的社员家里吃的还都是去年的余粮，她说我们“三鱼（榆）一鸡（饥）”有什么根据？王子贤说，我是社里的监察主任，是个共产党员。事情虽然很多，可是我照样参加劳动，今年麦忙时我一个人就做了三百多个工分。","type":"paragraph"},{"text":"河北省豫剧团团长杜德秋在会上揭发了陈素真到河北省豫剧团以后发展民革成员，成立了民革支部，陈素真担任支部负责人。曾得意忘形地叫嚣：“民革支部在河北省豫剧团的成立，就是共产党的失败！”“剧团里的一切事情，今后不通过民革就不能办！”这已经不是什么“分庭抗礼”了，明明是在“取而代之”，篡夺党对剧团的领导权！","type":"paragraph"},{"text":"豫剧著名演员崔兰田、马金凤、徐凤云等，在会上揭发从她开始登台演戏起到解放时止的十四年当中，有十一年的时间过着国民党伪官员、高级军官的“阔太太”生活；其中有相当长的时间，她完全脱离了舞台，当起“官太太”了。","type":"paragraph"},{"text":"在这样许多铁的事实面前，陈素真不得不承认自己是“人民的罪人”，承认所写的农村调查是“造谣污蔑”。","type":"paragraph"},{"text":" ——原载《人民日报》1957年9月17日。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"baf4b88865"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
