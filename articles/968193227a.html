原则，坚决反对资产阶级自由化，坚持改革开放，发展国民经济，就一定能战胜国内外敌对势力和平演变的罪恶图谋","authors":[],"dates":[{"year":1991,"month":8,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　综合新华社报道:国家副主席王震于本月10日复信给云南省大中专学生重走红军长征路的全体队员。信中说:“在举世闻名的中国工农红军长征胜利半个多世纪后的今天，欣悉你们——社会主义中国的年轻一代，又踏上了当年红军的长征之路。通过这项活动，表明了你们立志继承和发扬老一代无产阶级革命家的光荣传统，做共产主义事业接班人的坚强决心。我为正在茁壮成长的青年一代的蓬勃精神风貌，为中国社会主义事业后继有人、代代相传，感到欣慰。”"},{"type":"paragraph","text":"王震在信中指出:“当前，社会主义事业正遇到严重挑战。在外有压力、内有困难的情况下，尤其需要发扬毛主席历来倡导的不怕鬼，不信邪的无产阶级硬骨头精神，不管国内外敌对势力采用什么手段进行颠覆、渗透和破坏，‘我自岿然不动’。马克思、恩格斯所揭示的人类社会历史发展的客观规律和必然趋势，是任何人、任何力量都无法改变或阻挡的。只要我们全党全军和全国各族人民紧紧地团结在以江泽民同志为核心的党中央周围，同心同德，步调一致，始终如一地坚持四项基本原则，坚决反对资产阶级自由化，坚持社会主义的改革开放，持续、稳定、协调地发展国民经济，我们就一定能够战胜国内外敌对势力和平演变的罪恶图谋。你们是继往开来的一代，是下个世纪捍卫和建设社会主义事业的中坚和骨干。我坚信，你们一定能够接好无产阶级革命事业的班，把我们的社会主义国家建设得更加强大和美好，为实现人类最崇高的共产主义理想作出无愧于前辈、无愧于历史的贡献。”"},{"type":"paragraph","text":"云南省大中专学生重走长征路全体队员于7月30日到达了当年王震同志率部走过的云南、贵州两省交界线上的“云贵红军桥”时发出一封信，向王震副主席等老一辈无产阶级革命家致以最崇高的敬意。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"王震","type":"人物"},{"name":"云南文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"968193227a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
