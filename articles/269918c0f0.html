e":"关于认真做好整党学习三本书出版、发行工作的通知","dates":[{"year":1984,"month":1,"day":11}],"is_range_date":false,"authors":["文化部出版局"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"国家出版局办公室, 出版工作文件选编(1984-1985), 28","tags":[{"name":"出版工作","type":"主题/事件"},{"name":"学习","type":"主题/事件"},{"name":"整党","type":"主题/事件"}],"parts":[{"type":"title","text":"关于认真做好整党学习三本书出版、发行工作的通知"},{"type":"subtitle","text":"文化部出版局 • 1984年1月11日 •（84)出版字第17号"},{"type":"paragraph","text":"目前全国各地遵照中共中央关于整党的决定，学习整党文件正在逐步引向深入。为了紧密配合第一期整党单位学习的需要，一定要认真做好整党文件的出版发行工作。"},{"type":"paragraph","text":"规定整党学习用的三本书《党员必读》一书现已出版供应。《十一届三中全会以来重要文献简编》、《毛泽东同志论党的作风和党的组织》两书的精、平装本，一月份陆续出版供应。两书普及本的纸型出版社已在去年十一月底和十二月上旬发出，各地要抓紧安排印制。已经作了安排的，要检查一下落实的情况，尽快出书。各地新华书店要加强调查研究，深入征订，充分满足读者学习需要。在发行工作的安排上，要加强向当地党委请示汇报，保证优先供应第一期整党单位学习的需要。"},{"type":"paragraph","text":"《十一届三中全会以来重要文献简编》、《毛泽东同志论党的作风和党的组织》两书普及本各省的印数，省书店未报的，请于一月二十日前报新华书店总店。"},{"type":"paragraph","text":"主送：各省、市、自治区出版（文化)局（厅）、出版总社，人民出版社，新华书店总店，中国印刷公司"},{"type":"paragraph","text":"抄送：各省、市、自治区人民出版社，新华书店，新华书店北京、上海发行所，新店储运公司"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"269918c0f0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
