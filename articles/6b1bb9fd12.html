泉阿沛·阿旺晋美周建人许德珩胡厥文孙健沈雁冰参加追悼会　陈锡联主持追悼会　李素文致悼词","authors":[],"dates":[{"year":1976,"month":6,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"刘文辉先生追悼会在北京举行"},{"type":"paragraph","text":"朱德华国锋叶剑英宋庆龄刘伯承郭沫若送了花圈"},{"type":"paragraph","text":"吴德李井泉阿沛·阿旺晋美周建人许德珩胡厥文孙健沈雁冰参加追悼会　陈锡联主持追悼会　李素文致悼词"},{"type":"paragraph","text":"新华社一九七六年六月二十九日讯　第四届全国人民代表大会常务委员会委员、中国人民政治协商会议第四届全国委员会常务委员、原林业部部长、原国防委员会委员、中国国民党革命委员会中央常务委员刘文辉先生因病医治无效，于一九七六年六月二十四日在北京逝世，终年八十二岁。"},{"type":"paragraph","text":"刘文辉先生追悼会二十九日下午在八宝山革命公墓礼堂举行。"},{"type":"paragraph","text":"人大常委会委员长朱德，国务院总理华国锋，中央军委副主席、政协全国委员会副主席叶剑英，人大常委会副委员长宋庆龄、刘伯承、郭沫若送了花圈。送花圈的还有人大常委会、国务院、政协全国委员会、中共中央统战部、国防部、农林部和中国国民党革命委员会中央委员会。"},{"type":"paragraph","text":"参加追悼会的有：国务院副总理陈锡联，人大常委会副委员长吴德、李井泉、阿沛·阿旺晋美、周建人、许德珩、胡厥文、李素文，国务院副总理孙健，政协全国委员会副主席沈雁冰，以及有关部门负责人和部分人大常委会委员、政协全国委员会常务委员，民革中央常委、中委，刘文辉先生的生前友好等有关人士。"},{"type":"paragraph","text":"陈锡联副总理主持追悼会，李素文副委员长致悼词。"},{"type":"paragraph","text":"悼词中说，刘文辉先生是四川省大邑县人，一九四九年十二月十日在四川省彭县起义并在民主革命时期做了一些有益于人民的工作。悼词在介绍刘文辉先生参加革命后历任的各种职务以后说，二十多年来，刘文辉先生拥护伟大领袖毛主席，拥护中国共产党，热爱社会主义祖国。赞同并参加了中国共产党领导的各项民主改革运动、社会主义革命和社会主义建设；拥护无产阶级文化大革命和批林批孔运动；拥护当前正在深入开展的批判邓小平反革命的修正主义路线，反击右倾翻案风的伟大斗争。他对我们伟大祖国到处莺歌燕舞，欣欣向荣的兴旺景象和我国国际地位的日益提高，表示欢欣鼓舞。"},{"type":"paragraph","text":"刘文辉先生怀念在台湾省的同胞和故旧，盼望台湾省早日解放，回到祖国的怀抱，实现祖国的统一。"},{"type":"paragraph","text":"追悼会后，刘文辉先生的骨灰盒安放在八宝山革命公墓。（附图片）"},{"type":"paragraph","text":"刘文辉先生遗像　新华社发"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"吴德","type":"人物"},{"name":"华国锋","type":"人物"},{"name":"朱德","type":"人物"},{"name":"陈锡联","type":"人物"},{"name":"四川文革","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"批林批孔","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6b1bb9fd12"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
