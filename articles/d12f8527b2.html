s":[],"article":{"title":"中央军委纪委印发《全军党的纪律检查工作一九八三年的基本情况和一九八四年的主要任务》（摘录）","dates":[{"year":1984,"month":2,"day":25}],"is_range_date":false,"authors":["中央军委纪委"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"成都军区整党办公室, 清理“三种人”工作文件摘编, 33","tags":[{"name":"军队","type":"主题/事件"},{"name":"三种人","type":"主题/事件"},{"name":"整党","type":"主题/事件"}],"parts":[{"type":"title","text":"中央军委纪委印发《全军党的纪律检查工作一九八三年的基本情况和一九八四年的主要任务》（摘录）"},{"type":"subtitle","text":"〔1984〕2号"},{"type":"subtitle","text":"（一九八四年二月二十五日）"},{"type":"paragraph","text":"协助党委清理“三种人”，要抓紧抓好，多做少讲，加强核实工作。要着重注意那些造反起家，比较年轻，潜伏下来的，对党危害大的人。至于那些年岁大了，已经清查和处理过了的而又没有发现新的或较大的问题的干部，就不要再翻老账了。有的人，这几年还在反对党的十一届三中全会以来的路线，问题严重确要处理的，那就处理这几年的问题。“老账新账一起算”的做法不好。"},{"type":"paragraph","text":"……"},{"type":"paragraph","text":"（二）在党委统一领导下，配合政治机关，做好整党工作，充分发挥纪委在整党中的作用。"},{"type":"paragraph","text":"一是派得力干部参加整党办公室工作，派出的干部要同纪委保持密切的联系，使纪委及时了解整党情况。二是积极完成党委分配的整党中的各项工作任务，特别是要把端正党风、严肃党纪方面的工作管起来，成为党委的得力的工作部门。三是配合政治机关深入摸清“三种人”的情况，要研究分析案例，掌握政策界限，参加对定为“三种人”的材料的审核工作，参加对犯有其他严重错误的人的材料的审核工作。协助党委把好组织处理关。四是及时向党委反映有关党风党纪的情况，要分别整理出具体材料，提供党委了解，以便于在整党中解决。五是参与调查研究整党后期进行党员登记的政策界限的工作，当好党委的参谋。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d12f8527b2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
