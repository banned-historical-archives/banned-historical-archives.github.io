ical-archives/banned-historical-archives8/main/maoquanji12.pdf"],"article":{"title":"复周恩来电","alias":"","parts":[{"type":"paragraph","text":"复周恩来电！"},{"type":"paragraph","text":"（1938年7月26日）"},{"type":"paragraph","text":"加编三个师如不可能，以第二方案发表四五个司令部并规定适合现况之部队数目与经费数目为适宜。"},{"type":"paragraph","text":"[1]周恩来7月26日致电毛泽东、朱德、彭德怀：日前同林伯渠见蒋介石、何应钦，他们借口二百个师已满额，不愿给师的番号。我以为可提两个方案：一、仍请编三军六个师或三师九个旅二十七个团；二、请委五台聂荣臻，冀热宋时轮、邓华，津浦徐向前、陈再道，河防萧劲光以司令名义，并请发司令部及其所属部队经费。这是毛泽东复周恩来电的主要内容。"}],"authors":["毛泽东"],"dates":[{"year":1938,"month":7,"day":26}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":404,"page_end":404},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a4918d8140"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
