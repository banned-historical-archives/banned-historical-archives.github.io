script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"深入批林批孔　推动职工体育活动市总工会和市体委联合召开批判修正主义体育路线经验交流大会","authors":[],"dates":[{"year":1974,"month":6,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　在本市工交、财贸等战线大力开展群众性体育活动的大好形势下，六月四日，上海市总工会和上海市体育运动委员会联合召开了“批判修正主义体育路线经验交流大会”，深入批判林彪“克己复礼”，妄图复辟资本主义的罪行，批判修正主义体育路线，推动职工体育活动的进一步开展，使体育更好地为抓革命、促生产服务。"},{"type":"paragraph","text":"今年以来，本市公交、财贸等战线的广大干部和职工，认真学习毛主席关于批林批孔的一系列指示和党中央规定的文件，批判林彪“克己复礼”的反动纲领和孔孟之道，批判修正主义体育路线，使职工体育活动蓬勃地开展起来。目前，毛主席的革命体育路线深入人心，广播操、工间操和生产操等正在大力推广，篮球、足球、排球和乒乓球等运动队也越来越多，社会主义体育新风尚正在进一步发扬，还出现了一批职工体育活动搞得好的先进单位，全市职工体育活动的形势一派大好。"},{"type":"paragraph","text":"会上，上海大场肉类联合加工厂党委的同志介绍了他们加强对体育工作的领导，深批修正主义体育路线，积极开展群众性体育活动的体会。上海色织四厂党总支的代表，介绍他们如何在体育工作中抓紧革命大批判，肃清修正主义体育路线对群众体育活动的影响，在女工中广泛开展体育活动的体会。闸北区足球裁判组的同志批判了“亲者宽，疏者严”的错误做法，认为这是“锦标主义”在裁判工作中的反映。他们在比赛中积极向双方运动员宣传毛主席的革命体育路线。每当比赛结束时，检查“友谊第一，比赛第二”方针的执行情况，总结经验教训，决心把比赛工作搞得更好。上海锅炉厂工人足球队的同志，介绍了他们学习马列著作和毛主席著作，不断批判修正主义体育路线的表现和影响，坚持体育为无产阶级政治服务，为社会主义革命和建设服务的体会。上海染化十一厂党总支的同志就如何加强球队思想建设的问题谈了体会。"},{"type":"paragraph","text":"大会认为，各级工会要以批林批孔为强大的政治动力，进一步组织体育干部、体育积极分子和广大群众，认真学习毛主席对体育工作的指示，学习“友谊第一，比赛第二”的方针，深入开展对“技术第一”、“锦标主义”等修正主义黑货的批判，使社会主义体育更好地为无产阶级政治服务，为抓革命，促生产，促工作，促战备服务。"},{"type":"paragraph","text":"大会要求各级工会在党的一元化领导下，切实加强对运动队的政治领导，抓好运动队的思想建设和组织建设，做好领队、教练员和裁判员的政治思想工作，使他们成为执行毛主席革命体育路线的带头人。同时还要对观众做好宣传教育和组织工作。"},{"type":"paragraph","text":"大会还号召各级工会要进一步发动群众，广泛持久地开展职工体育活动。要大力提倡做广播操、生产操、工间操和打太极拳等。并根据不同季节，有重点地提倡一些体育活动，如夏季的游泳，冬季的长跑等。有条件的单位，可以适当地组织一些体育竞赛活动。大会相信，在批林批孔运动的推动下，职工体育活动一定会取得更大的成绩。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"林彪","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"批林批孔","type":"主题/事件"},{"name":"批林批孔","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"494ed4f81a"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
