art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"英国飞机制造工人罢工反对残酷剥削","authors":[],"parts":[{"type":"paragraph","text":"英国飞机制造工业的一万五千多名工人九月十一日罢工，反对垄断资本的残酷剥削，抗议飞机制造工厂无理解雇工人，要求增加工资。"},{"type":"paragraph","text":"英国飞机公司在布里斯托尔的工厂的七千多名工人这一天再次举行罢工，强烈抗议工厂当局任意裁减数百名工人。这是这家工厂的工人们九月份以来反对垄断资本家制造失业的第四次斗争。这次罢工再次使“协和”式飞机的生产陷于停顿。同一天，为“协和”式飞机制造引擎的罗尔斯·劳埃斯公司在布里斯托尔的工厂的六千多名工人，在米德尔塞克斯的韦斯特兰直升飞机工厂的大约一千八百名工人也举行了罢工。"}],"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"36f0185953"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
