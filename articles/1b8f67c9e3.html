script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"非洲统一组织本届执行主席西亚德发表谈话  不许新殖民主义剥削和控制非洲经济  非洲人和阿拉伯人应该团结起来反对新殖民主义","authors":[],"dates":[{"year":1974,"month":7,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"非洲统一组织本届执行主席西亚德发表谈话"},{"type":"paragraph","text":"不许新殖民主义剥削和控制非洲经济"},{"type":"paragraph","text":"非洲人和阿拉伯人应该团结起来反对新殖民主义"},{"type":"paragraph","text":"新华社拉巴特一九七四年七月二十三日电　据摩洛哥《舆论报》七月二十二日报道，索马里最高革命委员会主席、非洲统一组织本届执行主席西亚德·巴雷在摩加迪沙对该报记者发表谈话说：“非洲统一组织已被证明是一支必须予以重视的国际力量，它已为非洲事业特别是在解放方面作出了巨大的贡献。”"},{"type":"paragraph","text":"西亚德主席说，非洲统一组织还有许多事情要做，因为几个非洲国家及其人民还遭受殖民统治；得到西方帝国主义支持的南部非洲的少数白人政权继续横蛮地执行种族压迫政策。在谈到非洲和阿拉伯的关系时，他说：“我认为加强非洲和阿拉伯世界之间的合作是十分重要的。”“阿拉伯人和非洲人有着共同的利益，因此应该不惜一切代价来努力合作。他们都是新殖民主义的受害者，应该团结起来反对新殖民主义。”"},{"type":"paragraph","text":"西亚德主席指出：对遭受以色列侵略的阿拉伯国家来说，和平应当建立在下列的原则之上：以色列军队全部从一九六七年六月以来所占领的土地上撤走；解放阿拉伯城——耶路撒冷；恢复巴勒斯坦人的自决权和一切合法权利。非洲人必须用一切手段来援助这些权利被非法剥夺的巴勒斯坦人。"},{"type":"paragraph","text":"在谈到非洲的解放问题时，他说：“只要我们允许新殖民主义剥削我们的资源，外国继续控制我们的经济，我们就不会达到我们的主要目标：保障我们人民的社会和经济福利。同样，如果我们不摆脱这种不能再忍受的枷锁，我们就永远不可能达到非洲统一的目的，我们也不可能执行任何我们在各种会议上各级代表通过的无数关于非洲贸易和经济合作的决议和建议。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1b8f67c9e3"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
