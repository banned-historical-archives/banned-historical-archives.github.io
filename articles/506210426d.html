script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"朝中社发表第六篇揭露铁托修正主义集团的文章  南斯拉夫劳动人民生活日益贫困","authors":[],"dates":[{"year":1962,"month":10,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"朝中社发表第六篇揭露铁托修正主义集团的文章"},{"type":"paragraph","text":"南斯拉夫劳动人民生活日益贫困"},{"type":"paragraph","text":"新华社平壤讯　朝鲜《劳动新闻》、《民主朝鲜报》和《民主青年报》23日刊载了朝鲜中央通讯社发表的第六篇揭露南斯拉夫现代修正主义集团反动本质的文章。这篇文章的题目是《在铁托修正主义集团统治下南斯拉夫劳动人民生活日益贫困》。"},{"type":"paragraph","text":"文章说，“背叛社会主义而堕落成为美帝国主义忠实走狗的铁托修正主义集团所奉行的反动的、反人民的政策，使南斯拉夫经济遭到了全面破产，导致了使人民生活贫困的结果。”"},{"type":"paragraph","text":"文章说，由于铁托集团的修正主义路线带来的产物——物价暴涨、职工实际工资减少，大量失业等，南斯拉夫劳动人民正在遭受着很大的痛苦。南斯拉夫大部分企业为了获得更多的利润，任意提高产品价格。今年头五个月中，商品出售价格比去年同期上涨了24％；今年上半年的农产品价格比去年同期提高了16％。由于物价连续上涨，劳动人民的实际工资急剧下降。据南斯拉夫的《政治报》透露，今年头五个月，工人实际工资下降了25％。与此相反，拿着大量薪金的企业管理者则有着豪华的住宅，有的甚至还纳妾。文章又指出，随着南斯拉夫工业萧条，失业人数也年年增加。1961年每日平均失业人数为十七万一千人，而今年头四个月平均每日达到二十七万八千人。"},{"type":"paragraph","text":"文章在揭露铁托集团的修正主义农业政策时说，铁托集团公然鼓吹在自由竞争基础上发展农业，应用美国实施的那种资本主义农业经营方法。铁托集团的修正主义农业政策带来的后果是南斯拉夫农业迅速衰退，农民生活极端贫困。文章指出，特别是在铁托集团于1953年解散了农业合作社、容许土地买卖、出租和可以雇用劳动力以后，这种后果表现得更加显著了。许多农民由于没有农具和畜力，不得不作为雇农出卖劳动力，并受着高利贷的剥削。据1960年的资料，有五十万农户负债达一百三十六亿五千万第纳尔（南币），其中有七十亿第纳尔到期而无法偿还。文章说，受着贫穷和饥饿痛苦的南斯拉夫劳动人民，对铁托集团的反人民政策已公开表示不满，而这种不满已越来越呈现出政治的性质。"},{"type":"paragraph","text":"文章着重指出，“所有事实表明，铁托集团所进行的引导南斯拉夫国家和人民经过什么‘新的道路’达到‘繁荣’和‘富裕’的宣传，不过是虚伪的谎言；他们所追求的一切散发着臭气的修正主义政策，只会给南斯拉夫劳动人民带来更大的生活痛苦。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"506210426d"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
