ical-archives/banned-historical-archives8/main/maoquanji16.pdf"],"article":{"title":"在中共中央政治局会议上的讲话","alias":"","parts":[{"type":"paragraph","text":"在中共中央政治局会议上的讲话"},{"type":"paragraph","text":"（1941年5月26日）"},{"type":"paragraph","text":"目前西方慕尼黑阴谋，已经暂时被打破。由于德国对英战争的不断胜利，使英、美对日将有更大的让步，以便集中力量应付欧洲，因而东方慕尼黑的危险仍然存在。蒋介石在今年四月以前是以皖南事变来缓和日本的进攻，当时何应钦到西安布置“剿共”，企图以向我进攻来取得日本的停止进攻。最近日军对华的进攻是“游击战”，目的在于逼蒋投降，没有准备进攻洛阳与西安。目前，日本对于中国问题的办法尚未完全确定，国民党的态度也还未决定，最近三个星期没有发表谈话。我党应积极揭破和反对这种阴谋。"},{"type":"paragraph","text":"二"},{"type":"paragraph","text":"过去习惯对外宣传不统一，表现在各根据地宣传政策不统一，今后要统一起来。会议决定中央对外宣传工作统由秦邦宪负责。"},{"type":"paragraph","text":"[1]本篇一是毛泽东在中共中央政治局会议上关于时局问题讲话的一部"}],"authors":["毛泽东"],"dates":[{"year":1941,"month":5,"day":26}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":105,"page_end":105},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"032b16ffff"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
