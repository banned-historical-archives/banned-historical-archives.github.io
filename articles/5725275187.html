ical-archives/banned-historical-archives0/main/maoquanji42.pdf"],"article":{"title":"对中央关于重新建立手工业管理机构的指示稿的批语","alias":"","parts":[{"type":"paragraph","text":"对中央关于重新建立手工业管理机构的指示稿的批语"},{"type":"paragraph","text":"（1959年6月12日）刘、周、彭真、一波阅，尚昆办。"},{"type":"paragraph","text":"[1]中共中央书记处书记、国务院副总理兼国家计委主任李富春1959年6月10日送审的这一中央指示稿说，手工业是我国国民经济中不可缺少的一个重要组成部分，必须注意恢复和发展，必须有专门的管理机构负责进行工作。为此，中央决定在轻工业部之下，重新建立全国手工业管理总局（和手工业合作总社合并成立），各省、市、自治区在工业厅之下建立手工业管理局，各专署、县也应建立相应专门机构。有经验的管理手工业干部必须归队，以加强手工业管理。"},{"type":"paragraph","text":"[2]刘，指刘少奇。周，指周恩来。彭真，当时任中共中央政治局委员、中央书记处书记。一波，即薄一波，当时任国务院副总理兼国家经济委员会主任。"},{"type":"paragraph","text":"[3]尚昆，即杨尚昆，当时任中共中央书记处侯补书记、中央办公厅主任。"}],"authors":["毛泽东"],"dates":[{"year":1959,"month":6,"day":12}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":75,"page_end":75},"tags":[{"name":"毛泽东","type":"人物"},{"name":"彭真","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"指示"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5725275187"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
