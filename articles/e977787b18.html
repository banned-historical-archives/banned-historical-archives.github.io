],"dates":[{"year":1957,"month":10,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席接见保苏两国代表团"},{"type":"paragraph","text":"周总理接见苏联最高苏维埃代表团"},{"type":"paragraph","text":"新华社30日讯  毛泽东主席在今天晚间接见了以于哥夫主席为首的保加利亚人民共和国政府代表团。"},{"type":"paragraph","text":"接见时在座的有：周恩来总理，邓小平副总理，曾涌泉副部长和中国驻保加利亚大使周竹安。"},{"type":"paragraph","text":"新华社30日讯  毛泽东主席在今天晚间接见了以阿里斯托夫为首的苏联最高苏维埃代表团。"},{"type":"paragraph","text":"接见的时候在座的有：彭真、王首道、曾涌泉、吴克坚、余心清和苏联驻中国大使尤金。"},{"type":"paragraph","text":"新华社30日讯"},{"type":"paragraph","text":"周恩来总理今天下午接见了以阿里斯托夫为首的苏联最高苏维埃代表团。"},{"type":"paragraph","text":"接见时，乌兰夫副总理、习仲勋秘书长、张闻天副部长和吴克坚也在座。"},{"type":"paragraph","text":"接见时在座的还有尤金大使。（附图片）"},{"type":"paragraph","text":"毛主席接见保政府代表团全体人员。前排左起第五人是于哥夫。"},{"type":"paragraph","text":"新华社记者侯波、邹健东摄"},{"type":"paragraph","text":"毛主席接见苏联最高苏维埃代表团全体人员。前排左起第五人是阿里斯托夫。    新华社记者侯波、邹健东摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e977787b18"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
