rt":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东军事思想学术会在长沙召开","authors":["侯炳文陈晓萍"],"parts":[{"type":"paragraph","text":"本报讯 侯炳文、陈晓萍报道：毛泽东军事思想学术讨论会历时4天于7月28日在长沙工程兵学院结束。这次讨论会 由中国毛泽东思想理论与实践研究会和长沙工程兵学院毛泽东军事思想研究会联合举办，军内外30多所院校的专家、教授及理论工作者共80多人参加了会议。"},{"type":"paragraph","text":"这次学术讨论会共提交了103篇论文。这些论文比较系统地研究了毛泽东军事思想中有关人民战争、人民军队、战略战术、军队政治工作、军队经济以及军事运筹学、军事教育学、军事哲学、军事外交学等基本思想和观点，研究了周恩来、朱德、刘伯承等老一辈革命家对毛泽东思想形成所起的作用。许"},{"type":"paragraph","text":"多论文突出地研究了邓小平同志坚持和发展毛泽东军事思想，对新时期军队工作的贡献。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"人民战争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ce95c0557b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
