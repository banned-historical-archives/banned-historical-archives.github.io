ors":[],"dates":[{"year":1976,"month":5,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"朱德委员长华国锋总理致电金日成主席朴成哲总理"},{"type":"paragraph","text":"深切哀悼洪元吉同志逝世"},{"type":"paragraph","text":"新华社一九七六年五月十九日讯　朱德委员长和华国锋总理五月十九日致电金日成主席和朴成哲总理，对洪元吉同志逝世表示深切的哀悼。电报全文如下：平壤朝鲜民主主义人民共和国主席金日成同志，朝鲜民主主义人民共和国政务院总理朴成哲同志："},{"type":"paragraph","text":"惊悉朝鲜劳动党中央委员会委员、朝鲜民主主义人民共和国最高人民会议代表、中央人民委员会委员、政务院副总理洪元吉同志因病逝世，谨向你们，并通过你们，向洪元吉同志的家属，表示深切的哀悼。"},{"type":"paragraph","text":"中华人民共和国全国人民代表大会常务委员会委员长  朱德"},{"type":"paragraph","text":"中华人民共和国国务院总理　华国锋"},{"type":"paragraph","text":"一九七六年五月十九日于北京"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"华国锋","type":"人物"},{"name":"朱德","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"01d0921119"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
