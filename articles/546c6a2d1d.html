" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"关于贯彻陈云同志一个重要批示的通知","authors":[],"dates":[{"year":1983,"month":8,"day":16}],"is_range_date":false,"parts":[{"text":"关于贯彻陈云同志一个重要批示的通知","type":"title"},{"text":"各省、市、自治区党委、纪委，中央直属机关、中央国家机关党委、纪委，中央各部委，中央国家机关各部委党组（党委）、纪检组（纪委），中央纪委驻中央国家机关各部委纪检组，中央军委纪委：","type":"appellation"},{"text":"最近，陈云同志在中纪委《信访简报》第四十三期上，针对纪检队伍组织不纯的问题，作了“纪检队伍中不能有‘三种人’，已有的要调开”的重要批示。这一批示非常重要。各级纪委、纪检组必须认真贯彻执行。","type":"paragraph"},{"text":"纪检队伍组织不纯的问题，在纪检系统是确实存在的，有些地区和部门还比较严重，甚至“三种人”仍占据领导岗位，各级纪委必须严肃、认真地对待这一问题。要坚决按照陈云同志批示，对所属单位的干部进行认真的审查，下决心把“三种人”（或“五种人”）和不适宜作纪检工作的人，结合当前体制改和整党，调离纪检部门，再不能拖延。今后选调干部，对“文革”中有严重问题的人，一个也不准调入，一定要按纪检干部条件严格审查、精选。请各省、市、自治区纪委和中央国家机关各部委纪检组（纪委）将这一工作情况，于一九八三年底，专题报告中央纪委。","type":"paragraph"},{"text":" 中央纪律检查委员会一九八三年八月十六日","type":"paragraph"},{"text":"来源：《处理“文革”遗留问题，清理“三种人”文件汇编（第一册）》广西壮族自治 区党委整党办公室，1986年8月","type":"appellation"}],"comments":[],"origin":"( 《处理“文革”遗留问题、清理“三种人”文件汇编》，广西壮族自治区党委整党办公室，一九八六年八月。)","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"陈云","type":"人物"},{"type":"文稿类型","name":"指示"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"546c6a2d1d"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
