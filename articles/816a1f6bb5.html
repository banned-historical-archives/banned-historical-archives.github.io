tart":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席的英雄战士颂（朗诵诗）","authors":["战士李存保"],"parts":[{"type":"paragraph","text":"汹涌的赣江水啊，"},{"type":"paragraph","text":"红浪奔腾；"},{"type":"paragraph","text":"巍峨的井冈山上，"},{"type":"paragraph","text":"红松劲挺！"},{"type":"paragraph","text":"支左爱民模范排啊，"},{"type":"paragraph","text":"你们的壮举震撼着万水千峰！"},{"type":"paragraph","text":"支左爱民模范李文忠啊，"},{"type":"paragraph","text":"你的赤胆忠心化长虹！"},{"type":"paragraph","text":"条条大江，都扬波把英雄歌唱，"},{"type":"paragraph","text":"座座峻岭，都昂首向英雄致敬！"},{"type":"paragraph","text":"啊！毛主席的英雄战士，"},{"type":"paragraph","text":"人民的钢铁长城！"},{"type":"paragraph","text":"你们用生命谱成了一曲支左爱民的凯歌，"},{"type":"paragraph","text":"飞遍千家万户，回响万里长空，"},{"type":"paragraph","text":"激荡着亿万革命人民的心灵！"},{"type":"paragraph","text":"八月十九日那天，"},{"type":"paragraph","text":"赣江上涌现出一排高大的身影——"},{"type":"paragraph","text":"李排长带领着四排的战士，"},{"type":"paragraph","text":"护送着一批无产阶级革命派，"},{"type":"paragraph","text":"护送着一批毛主席的红卫兵，"},{"type":"paragraph","text":"渡江杀回老家去，就地闹革命。"},{"type":"paragraph","text":"航船迎风劈浪，"},{"type":"paragraph","text":"战士心潮奔涌，"},{"type":"paragraph","text":"和革命群众风雨同舟，患难与共，"},{"type":"paragraph","text":"军民凝结下多少鱼水深情。"},{"type":"paragraph","text":"船只驶进江心的激流，"},{"type":"paragraph","text":"突然，船身剧烈地震动，"},{"type":"paragraph","text":"滔滔的江水涌进船舱！"},{"type":"paragraph","text":"满船红卫兵坠入江中！"},{"type":"paragraph","text":"“毛主席万岁！”“毛主席万万岁！”"},{"type":"paragraph","text":"滔滔江面升腾起一片激动人心的呼声。"},{"type":"paragraph","text":"听着这呼声，"},{"type":"paragraph","text":"战士的心都快跳出胸膛！"},{"type":"paragraph","text":"听着这呼声，"},{"type":"paragraph","text":"战士浑身热血沸腾！"},{"type":"paragraph","text":"象离弦的疾箭，"},{"type":"paragraph","text":"象展翅的雄鹰，"},{"type":"paragraph","text":"象出膛的炮弹，"},{"type":"paragraph","text":"象翻江的蛟龙……"},{"type":"paragraph","text":"毛主席的英雄战士，"},{"type":"paragraph","text":"扑过去！扑过去！扑过去！"},{"type":"paragraph","text":"誓死捍卫毛主席的革命路线！"},{"type":"paragraph","text":"扑过去！扑过去！扑过去！"},{"type":"paragraph","text":"誓死抢救毛主席的红卫兵！"},{"type":"paragraph","text":"毛主席的亲切教导——"},{"type":"paragraph","text":"“要奋斗就会有牺牲，……”"},{"type":"paragraph","text":"“为人民而死，就是死得其所。”"},{"type":"paragraph","text":"“下定决心，不怕牺牲，……”"},{"type":"paragraph","text":"鼓舞着英雄们驾风驭浪，"},{"type":"paragraph","text":"翻江倒海，力大无穷！"},{"type":"paragraph","text":"看！不大会游水的共产党员李从全，"},{"type":"paragraph","text":"吃力地推动着一块木板，"},{"type":"paragraph","text":"一次又一次地抢救红卫兵……。"},{"type":"paragraph","text":"看！刚出院三天的共产党员陈佃奎，"},{"type":"paragraph","text":"带病翻腾起团团白浪，"},{"type":"paragraph","text":"把红卫兵推出滚滚的激流中。"},{"type":"paragraph","text":"看！我们的好排长李文忠，"},{"type":"paragraph","text":"击风浪，挽狂澜，斗志猛，"},{"type":"paragraph","text":"救小将，心火热，向前冲！"},{"type":"paragraph","text":"他接连抢救了五名革命小将和革命群众，"},{"type":"paragraph","text":"在恶浪扑头盖顶的时候，"},{"type":"paragraph","text":"他还向来救他的战士坚定地说："},{"type":"paragraph","text":"“不要管我，救红卫兵要紧！”"},{"type":"paragraph","text":"好排长啊李文忠！"},{"type":"paragraph","text":"发自你肺腑的最后一句话啊，"},{"type":"paragraph","text":"吞山河，贯长虹，千斤重！"},{"type":"paragraph","text":"只有用毛泽东思想武装起来的战士，"},{"type":"paragraph","text":"才能说出这样惊天动地的语言，"},{"type":"paragraph","text":"只有用毛泽东思想武装起来的英雄，"},{"type":"paragraph","text":"才会有这样无私无畏的广阔心胸！"},{"type":"paragraph","text":"滚滚赣江水啊巍巍井冈山，"},{"type":"paragraph","text":"悼念着为人民献身的英雄！"},{"type":"paragraph","text":"你们做到生为保卫毛主席的革命路线而战斗，"},{"type":"paragraph","text":"你们做到死为保卫毛主席的革命路线而献身。"},{"type":"paragraph","text":"毛主席热爱的你们热爱，"},{"type":"paragraph","text":"毛主席支持的你们支持，"},{"type":"paragraph","text":"毛主席的指示你们坚决照办！"},{"type":"paragraph","text":"毛主席挥手你们就奋勇前进！"},{"type":"paragraph","text":"你们破私破在要害处，"},{"type":"paragraph","text":"你们立公立在根本上。"},{"type":"paragraph","text":"红太阳照透了你们的灵魂，"},{"type":"paragraph","text":"你们最坚强，最积极，最忠诚；"},{"type":"paragraph","text":"毛泽东思想统帅着你们生命的每一秒钟，"},{"type":"paragraph","text":"你们最无私，最无畏，最英勇！"},{"type":"paragraph","text":"你们的英雄事迹永远鼓舞着我们前进，"},{"type":"paragraph","text":"光辉的英雄形象在祖国的大地上永生！"},{"type":"paragraph","text":"李文忠坚定地下令：“不要管我，救红卫兵要紧！”"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"军队支左","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"816a1f6bb5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
