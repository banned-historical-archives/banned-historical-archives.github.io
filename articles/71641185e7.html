学生回国的工作计划报告","authors":[],"dates":[{"year":1957,"month":3,"day":5}],"is_range_date":false,"parts":[{"text":"国务院专家局党组：1957年争取还在资本主义国家留学生回国的工作计划报告","type":"title"},{"text":"兹将1957年争取还在资本主义国家留学生回国的工作计划报告如下：","type":"paragraph"},{"text":"（一）1956年共有161名留学生从资本主义国家回国，其中从美国回来的104人；学理工的116人，学文法的45人。这些人已分别按其专长、志愿及国家需要妥善安置了工作，他们在学术上的水平一般较高，在科学研究和教学方面已起了显著作用。同时，争取还在资本主义国家留学生回国的政策，在国内国外均发生了积极的政治效果。","type":"paragraph"},{"text":"目前还在资本主义国家的留学生中获有学位和学术水平较高的约5000余人（美国4000余人，西欧各资本主义国家200至300人，日本200余人，香港200余人）。这些人中间绝大多数人因长期受着民族歧视，在工作中被排挤，待遇也极不平等，他们都有民族自尊感；加之生活习惯的不同，特别是对家园亲人的怀念更加使他们深感寄人篱下的痛苦。正如有的留学生写信回来说：“梁园虽好，终非久留之地。”几年来由于我国国际地位的提高和国内建设的突飞猛进，由于党对知识分子政策的影响，他们的爱国主义情绪在逐渐增长着，总之大多数人或迟或早终归是要回来的。","type":"paragraph"},{"text":"但是，争取留学生回国必需经过艰苦的工作和复杂的斗争。尚在资本主义国家的留学生大都是1948年以前出国的，长期受着资本主义的影响，他们或多或少存有各种各样不正确的思想。同时由于美帝侵朝战争期间的阻挠，许多人原已在国外做了较长期打算，找到了适当职业，收入一般每年在6、7千至1万美元之间，也有的入了外国籍，又由于种种阻隔，他们对祖国情况了解很少。据了解，留学生对回国的顾虑主要是害怕思想改造、怕无学术研究和宗教信仰的自由，怕工作条件差、待遇低和生活苦。也有些人因为家属扶养、子女教育、回国路费等困难或研究工作未告一段落，一时还不能下定回国决心。","type":"paragraph"}],"comments":[],"origin":"根据网络材料打印。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"71641185e7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
