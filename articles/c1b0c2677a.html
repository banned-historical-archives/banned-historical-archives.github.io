script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"古巴卫生部长马查多在北京发表谈话  没有任何力量能阻止古巴革命前进  拉丁美洲各国人民已经认清美“援”是美帝国主义进行剥削掠夺的工具","authors":[],"dates":[{"year":1960,"month":10,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"古巴卫生部长马查多在北京发表谈话"},{"type":"paragraph","text":"没有任何力量能阻止古巴革命前进"},{"type":"paragraph","text":"拉丁美洲各国人民已经认清美“援”是美帝国主义进行剥削掠夺的工具"},{"type":"paragraph","text":"据新华社23日讯　古巴共和国卫生部部长何塞·罗曼·马查多·本图拉在离开我国前夕接见新华社记者时，严厉谴责美帝国主义对古巴进行的经济封锁，他强调地说：“古巴人民知道怎样进行反抗，他们要给美帝国主义以新的沉重的打击。古巴革命要向前发展，没有任何力量能够阻止我们前进。”"},{"type":"paragraph","text":"马查多指出，美帝国主义这一新的侵略行为是它对古巴进行军事干涉前的种种卑鄙手段之一。他猛烈抨击美帝国主义自从古巴革命胜利以来所进行的反对古巴人民的活动。他特别指出，美帝国主义庇护和支持着从古巴逃出去的古巴战犯，并为他们提供进行反革命活动的基地，使他们得以从美国派飞机轰炸古巴的蔗田和城市；此外，还以美元和武器不断供给古巴反革命分子。总之，美国通过种种手段企图造成一个反对古巴的运动。"},{"type":"paragraph","text":"马查多说：“美帝国主义的目的是要尽快扼杀古巴的革命，以消除古巴革命为拉丁美洲各国人民所树立的斗争榜样。”他说，过去和现在都受到美帝国主义残酷剥削和压迫的拉丁美洲各国人民都希望步古巴的后尘，争取自由和完全的独立。"},{"type":"paragraph","text":"和马查多部长同时接见本社记者的古巴卫生代表团团员何塞·洛佩斯·桑却兹教授说：“美帝国主义对古巴进行经济封锁不仅不能表现出它的‘强大’，而且正是显示了它的虚弱。美国之所以采取这种措施，还因为它用来作为侵略拉丁美洲各国的工具的美洲国家组织现在已经不大顶事了。”他说：“拉丁美洲人民看得很清楚，哈瓦那宣言是正确地动员拉丁美洲人民反对美帝国主义侵略的措施。”"},{"type":"paragraph","text":"古巴客人以他们亲身的经历谈到他们对美帝国主义的认识。马查多部长说：“古巴人民受美帝国主义直接侵略、欺侮和欺骗达五十多年，我们深深地体会到美帝国主义是卑鄙的。从经济上说，它打着‘援助落后国家’的招牌，大肆掠夺各国的自然资源、地下资源等，把原料大量运往美国。从道德上说，它尽量歪曲各国人民的心理和特色，以图打击各国人民的爱国主义和民族主义情绪。”"},{"type":"paragraph","text":"马查多说：“拉丁美洲各国的情况可以说明美‘援’的性质。虽然多年来有着美国的经济和技术‘援助’，这些国家在经济发展上一直十分落后，人民生活水平很低。美帝国主义所给的是美元，但是收回的是各国人民的血汗。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c1b0c2677a"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
