中南民院革委会宣传部、武汉师院革委会宣传部","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives3/main/173b340b-3108-4ae1-be57-d3fa78bb471a.pdf"],"article":{"title":"给安吴青训班二周年纪念的题词","alias":"","parts":[{"type":"paragraph","text":"在中央干部教育部学习动员大会上的讲话（节录）"},{"type":"paragraph","text":"（一九三九年五月二十五日）"},{"type":"paragraph","text":"要在工作、生活的百忙中，以“挤”的方法，获得学习的时间。以“”的方法求得间题的了解与深入。"},{"type":"paragraph","text":"（《新中华报》一九三九年五月二十六日）在延安高干会上的报告提钢（摘录）"},{"type":"paragraph","text":"（一九三九年六月十日）"},{"type":"paragraph","text":"两年来，在中央直接指导下，建立了抗大，陕大，党校，马列学院，鲁艺，青训班，工人学校，卫生学校，通讯学校，组织部训班，行政人员训班，边区党校，鲁迅师院，边区中学，鲁迅小学，儿童保育院等十七所学校。学生多的万余人，少的几百人，几十人。几千个千部从事干部工作。数育出来的及尚未出来的学生三万以上，这是一个很大的成续，十入年未有过的现象。这些学生、现在还不能看出他们大的工作成续，但数年以后就可以看见了，今后应继赣这个方针。·……·"},{"type":"paragraph","text":"爬山"},{"type":"paragraph","text":"爬山是抗大程表外的必修科目，在炼抗日的干部上，有着很大的意义。炼了每个年的体力，炼出民族战士的艰苦奋斗的作风，而且是直接连系到战场的实践教育。"},{"type":"paragraph","text":"给安英青训班二周年纪念的题司"},{"type":"paragraph","text":"（一九三九年十月）"},{"type":"paragraph","text":"带着新鲜血液与朝气加入革命队伍的青年们，无是共产党员或非党员，都是可贵的，数有他们，革命队伍就不能发展，革命就不能胜利。但青年同志的自然的缺点是缺乏经验，面革命经验是必须亲身参加革命斗争，从最下层工作做起，切实地不带一点虚伪地经过若干年以后，经就属于没有经验的人们了！，"},{"type":"paragraph","text":"（原载《毛泽东同志青年和青年工作》，一九六○年"},{"type":"paragraph","text":"中国青年出版社版第一○一一真）为《大众日报》周年纪念题"},{"type":"paragraph","text":"（一九四〇年一月一日）"},{"type":"paragraph","text":"动员报，刊物，学校，宣传团体，文化艺术团体，军队政治机关，民众团体，及其他一切可能力量，以提高民族觉悟，发扬民族信心与自算心，反对任何投降妥协的企图，坚持抗战到底，不怕困难，不怕牺牲，我们一定要自由，我们一定要胜利"},{"type":"paragraph","text":"，（原载《大众日报》一九四○年一月一日）"}],"authors":["毛泽东"],"dates":[{"year":1939,"month":10}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":238,"page_end":238},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"568ec0ecbd"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
