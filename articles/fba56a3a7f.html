rt":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席人民战争思想是各国人民的共同财富","authors":[],"parts":[{"type":"paragraph","text":"阿尔巴尼亚劳动党根据人民战争的思想，实行全民武装，加强战备，因此，我们国家虽小，并且处在帝国主义和修正主义的包围和封锁之中，但我们坚信，我们是不可战胜的。"},{"type":"paragraph","text":"——阿尔巴尼亚人民军某部指挥员佩奇"},{"type":"paragraph","text":"中国人民伟大的领袖毛泽东主席在领导中国人民争取解放的武装斗争的过程中，发展和透彻地阐明了人民战争的理论。这一理论不仅已成为中国人民的财富，而且已成为亚洲、非洲和拉丁美洲人民的财富。"},{"type":"paragraph","text":"——澳大利亚共产党（马克思列宁主义者）机关报《先锋报》"},{"type":"paragraph","text":"（中国）武装斗争的经验，使毛泽东同志在我们的时代第一次发展了人民战争的原则。"},{"type":"paragraph","text":"——多米尼加人民运动机关报《自由报》"},{"type":"paragraph","text":"毛泽东同志总结了每一个时期中国革命的经验，提出了人民战争的规律，这些规律今天成了亚洲、非洲和拉丁美洲各国人民革命行动的必要指南。"},{"type":"paragraph","text":"——阿根廷 埃利亚斯·塞曼"},{"type":"paragraph","text":"毛主席有关社会各阶级的分析、有关农民运动和人民战争的著作，对拉丁美洲人民目前的斗争有现实而深刻的指导意义，拉丁美洲人民无法解决的问题都可以在毛主席的著作里找到答案。"},{"type":"paragraph","text":"——墨西哥 格拉谢拉·里格特"},{"type":"paragraph","text":"毛泽东主席的人民战争思想，使人们在战胜美帝国主义的问题上得到了理论根据和信心。"},{"type":"paragraph","text":"——日本 青地晨"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"人民战争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fba56a3a7f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
