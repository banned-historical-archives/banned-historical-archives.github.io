script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"周恩来接见全国全军卫生工作会议代表时的讲话中关于清查“五·一六”的部分","authors":["周恩来"],"dates":[{"year":1969,"month":8,"day":15}],"is_range_date":false,"parts":[{"text":"周恩来接见全国全军卫生工作会议代表时的讲话中关于清查“五·一六”的部分","type":"title"},{"text":"周恩来","type":"authors"},{"text":"〖八月十五日、八月二十八日，周恩来接见全国卫生工作会议、全军卫生工作会议代表以及卫生部和直属单位军管会，革委会负责人时的讲话中关于清查“五·一六”的部分〗","type":"appellation"},{"text":"一九六七年你们大联委在北京体育馆开会，我请示了主席，主席同意发表《六·二六指示》，因为当时你们联合不巩固，我压下来了，就是因为戚本禹插手。“三·一0”会议戚本禹插手。","type":"paragraph"},{"text":"还有“五·一六”问题。我们在九月就知道了“五·一六”问题。卫生系统在中医研究院开个头，把叶心清抓起来了，我们事先知道了，要等待，要等待群众觉悟，事情早知道了。吴传启、叶心清、杜南，卫生系统“五·一六”就是叶、杜打头的。我们不愿扩大化。提出四个原则：先要本派搞出来。不要扩大化。联系到批判走资派，批判资产阶级反动路线，要保护群众。要谨慎。","type":"paragraph"},{"text":"开这个会（按：指戚本禹插手的“三·一0”会议），把矛头对着无产阶级司令部，是打着红旗反红旗的，是有坏人出主意的，这是与吴传后有关的罗。同叶心清、杜南、“五·一六”有关系。叶心清是个江湖医生、政客，文化大革命中兴风作浪。在卫生口，他是“五·一六”挂帅的，杜南是跟他的，他出谋划策，利用广大群众，群众是受蒙蔽的。孙正同志是党委书记，他不同于群众，他有责任。先念同志向群众代表传达的话比我讲的还轻，结果回去后要打倒李先念，还大贴李先念大字报，说先念同志歪曲我的话。这完全是“五·一六”的话。","type":"paragraph"},{"text":"“五·一六”问题，你们各单位革委会、大联委自己搞清楚。社会上的“五·一六”，是由公安部专案三办负责查处，他们让你们查就查，要防止扩大化。","type":"paragraph"},{"text":"在清理阶级队伍，整党中，对真正的坏人不应放过。比如“五·一六”分子叶心清、杜南，是极少数的。我不能说卫生系统只有叶、杜两人，也可能有第三第四个，要把人证、物证、旁证拿出来。“五·一六”在每条线都有他们的人，在卫生系统也扰乱了—阵，一九六七年六、七两月吵得很厉害。","type":"paragraph"},{"text":"我们要团结起来，共同对敌，反对黑线人物，反对苏修，反对国内反动派。“五·一六”是一小撮，是别动队，是极少数的。他们以革命的面目出现，搞秘密活动，是搞阴谋的。一般人是受蒙蔽的，不知道他们的目的，不算严重问题，但要承认错误，向群众交代清楚。","type":"paragraph"},{"text":"（以上摘自卫生部联合总部一九六九年九月六日翻印的“周总理《8.15》《8.28》接见全国卫生工作会议、全军工作会议代表以及卫生部和直属单位军管会、革委会负责人时的讲话）","type":"appellation"}],"comments":[],"origin":"以上摘自卫生部联合总部一九六九年九月六日翻印的“周总理《8.15》《8.28》接见全国卫生工作会议、全军工作会议代表以及卫生部和直属单位军管会、革委会负责人时的讲话","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"戚本禹","type":"人物"},{"name":"李先念","type":"人物"},{"name":"清理阶级队伍","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"清查五·一六","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2a8a384564"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
