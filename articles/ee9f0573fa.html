ear":1992,"month":1,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社开罗1月19日电　耶路撒冷消息:以色列两个极右党派今天正式宣布退出以沙米尔为首的政府，从而使沙米尔政府在议会失去多数的支持，提前大选已成定局。"},{"type":"paragraph","text":"这两个极右党——再生党和祖国党决定撤回对沙米尔利库德集团的支持，以反对政府谈判被占领土巴勒斯坦人的自治问题。他们认为，给予自治就等于是承认巴勒斯坦国。"},{"type":"paragraph","text":"随着这两个极右党派的退出，沙米尔政府在议会的120个席位中仅得到59席的支持。"},{"type":"paragraph","text":"以色列反对党工党希望20日在议会对沙米尔政府进行不信任投票。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ee9f0573fa"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
