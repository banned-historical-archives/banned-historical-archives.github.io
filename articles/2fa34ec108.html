" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji9-2","name":"毛泽东全集第9卷(2)","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji9-2.pdf"],"article":{"title":"致图锡山、赵戴文","alias":"","parts":[{"type":"paragraph","text":"致阎锡山、赵戴文川"},{"type":"paragraph","text":"（1936年12月23日）"},{"type":"paragraph","text":"（一）十分钦佩普绥当局对日寇的英勇抗战、开放爱国运动及取消防共组织，方与晋绥的基本方针已属一致，希望晋绥当局坚持此方针不变更。（二）希望即刻实现双方的密切合作，首先停止对西北的全部内战（包括对红军的与对西安的），给南京亲日派以压力达到此目的。（三）红军要求普绥当局同意开赴绥察抗日，愿受阎之指挥，不干涉普绥行政与社会秩序，普绥发给伙食、弹药。（四）建立晋西、陕北交通通信，恢复通商关系，从吉县、延长局部开始。（五）不使汤恩伯回陕，并调出李仙洲、高桂滋、高双成离开陕北，此事请阎、赵大力帮忙。"},{"type":"paragraph","text":"[1]这是毛泽东请山西吉县县长琥象咸代向阎锡山、赵戴文面陈的内容。赵戴文，当时任国民党山西省政府主席、自强救国同志会副会长。"}],"authors":["毛泽东"],"dates":[{"year":1936,"month":12,"day":23}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":212,"page_end":212},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2fa34ec108"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
