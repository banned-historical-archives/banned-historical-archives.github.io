tart":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"陨石落地和奴隶主的复辟野心","authors":["王凤举〖HH/换行〗DW：一八七一部队"],"parts":[{"type":"paragraph","text":"据史料记载，秦始皇统一中国之后，公元前二一一年，一颗大陨石落在东郡田野，有一个崇信孔孟之道的奴隶主贵族分子如获至宝，急急忙忙跑到了陨石落处，偷偷地在上面刻上了“始皇帝死而地分”七个大字。"},{"type":"paragraph","text":"陨石落地，这是一种自然现象，它和社会人事并无关系，因而，“怪之，可也；而畏之，非也。”（荀子：《天论》）根本不值得害怕。然而，秦始皇时的奴隶主贵族分子却抓住它大兴妖风，假托天意，为“裂土分封”、复辟倒退大造反革命舆论。但是秦始皇并不听信他们的这种妖言，他下令“燔销其石”，并缉拿刻字于陨石者。吓得那个一心想复辟的奴隶主贵族，只得落荒而逃，而销声匿迹了。"},{"type":"paragraph","text":"从这一件事情中，使我们看到了一个重要的历史现象。这就是反动剥削阶级是决不甘心于他们的灭亡的，他们随时都幻想复辟。而“天命论”则是他们进行复辟活动的一个思想武器。反动剥削阶级都宣扬儒家“国家将兴，必有祯祥；国家将亡，必有妖孽”的谬论。他们说自己的统治权是“天授”的，因而应该老子传儿子，儿子传孙子千秋万代地传下去。一旦失去了这种统治权力，他们就利用一些奇异的自然现象，把它说成是天的谴告，妖言惑众，借天的“意志”鼓吹应由他们再上台来奴役、统治人民。"},{"type":"paragraph","text":"野心家、阴谋家林彪也是这样干的。他恬不知耻地鼓吹自己是天生的“超人”、“至贵”，由他来篡党夺权，是“天命所归”。但是，历史是无情的。当年，反动的奴隶主贵族利用“天命论”搞复辟，并没有达到目的，林彪想用“天命论”搞复辟，不可避免地落得个更可耻的下场。历史的结论是，“天命论”决不能挽救反动剥削阶级的必然灭亡。"}],"alias":""},"tags":[{"name":"林彪","type":"人物"},{"name":"夺权","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4c08763409"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
