s":[{"year":1951,"month":1,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京廿三日电】　据北京人民日报载:湖南浏阳县老泥水工人俞永久写信给毛主席，献出他保存了二十多年的大革命时代的工会会员证，作为革命的纪念品。他的原信如下:亲爱的毛主席:"},{"type":"paragraph","text":"我是一个泥水工人，家住在浏阳县花桥，今年已经六十二岁。一九二五年，我在平江做工，曾加入了自己的组织——工会。为了无产阶级的翻身，那时候我们的革命情绪是非常高的。不幸后来反动派许克祥带了军队，进入平江城，残杀工农群众，我们被迫在黑夜里仓皇逃走。我很爱惜自己的组织。我相信受压迫的人终会有翻身的一天到来。因此，我把我的会员证放在袜子底下(证的背面有紫褐色处就是放在袜内出了锈的。回家后，又将它藏在墙壁缝里，直到去年解放才找出来。这次我在县总工会开会，听说你要征集土地革命时候的文件与证件，我特将这一个证章献给你，作为革命的纪念物。"},{"type":"paragraph","text":"毛主席:我们无产阶级现在翻了大身，是共产党和你给我们的，我们愿跟着你永远前进!我祝福你永远健康!"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"22a9602fe4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
