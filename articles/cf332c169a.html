thors":[],"dates":[{"year":1980,"month":3,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"土耳其无政府主义和武器走私活动猖獗"},{"type":"paragraph","text":"德米雷尔总理不指名揭露活动的外部原因"},{"type":"paragraph","text":"据新华社安卡拉三月十一日电　土耳其总理德米雷尔说，政府正在同无政府状态和武器走私活动进行无情的斗争。"},{"type":"paragraph","text":"德米雷尔是最近在就任总理一百天时举行的记者招待会上谈这一情况的。他透露，在过去一百天里，已有八百六十六人在无政府主义的事件中丧生。他还说，土耳其已经同保加利亚签订一项制止在两国之间进行走私活动的协定。据报道，有大量苏制武器弹药通过走私运进土耳其，特别是土耳其的库尔德地区。"},{"type":"paragraph","text":"德米雷尔在谈到煽起无政府主义的外部根源时说，这是尽人皆知的事情，不需要指名。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cf332c169a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
