rs":["全国部分高"],"dates":[{"year":1957,"month":5}],"is_range_date":false,"parts":[{"text":"高校的右派言论——诬蔑土地改革运动","type":"title"},{"text":"全国部分高","type":"authors"},{"text":"“土地改革是共产党取得农民信任的手段，不是目的。”（中国人民大学档案系助教  马馨）","type":"paragraph"},{"text":"“1．土改是人杀人的斗争；2．人与人之间只有斗争，没有和平；3．共产党和八路军是最凶狠的人。”（中国人民大学哲学系学生  李德）","type":"paragraph"},{"text":"“党的土改方针错了，为什么不采用孙中山的土改方针，土改不消灭地主肉体的政策？有些怀疑，我们土改为什么要打地主，这不是过火了吗？党有很大的罪恶。”（中国人民大学统计系学生  方炎火）","type":"paragraph"},{"text":"“土改时穷人看见有钱的人就斗，不管什么政策不政策的！所以在土改时弄死了不少的人。”“有的地主是劳动起家，也斗争了！”（中国人民大学历史系学生  罗旭畅）","type":"paragraph"},{"text":"“土改斗争是贫农、地痞、流氓斗勤俭起家的地主，土改干部是太上皇。”（北京矿业学院  宁世友）","type":"paragraph"},{"text":"“东北的地主一般是斗错了，对地主斗争是人身侵犯。土改对农民是一种掠夺。地主阶级对现在有功，因为他培养出子弟，有的参加了革命，现在有的上大学。不单是农民受压迫，而且地主也受压迫。”（北京航空学院一个学生）","type":"appellation"},{"text":"“土改是用机枪扫射地主，不该杀的也杀了。”（北京政法学院  张敬臣）","type":"paragraph"},{"text":" 来源：《高等学校右派言论选编》（中共中国人民大学委员会，1958年8月）。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a3cdfbdb2e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
