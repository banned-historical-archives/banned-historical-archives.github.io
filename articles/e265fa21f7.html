史审查问题的指示","authors":[],"dates":[{"year":1956,"month":5}],"is_range_date":false,"parts":[{"text":"中央关于从资本主义国家回国留学生历史审查问题的指示","type":"title"},{"text":"为了争取还在资本主义国家的留学生回国，在归国留学生到达工作岗位后，除填写必要的表格外，一般在今后一两年内不向本人追查历史。因为留学生一般在回国前都有怕审查历史的顾虑，而留学生回国不久就开始审查历史，既缺乏材料，不能得出结果，反而引起他们的怀疑和误会，同时也影响继续争取其他还在资本主义国家的留学生回国。今后对从资本主义国家回国的留学生，主要是在工作中对他们进行教育和考察，待条件成熟，再审查历史。","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e265fa21f7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
