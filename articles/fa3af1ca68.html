ical-archives/banned-historical-archives8/main/maoquanji18.pdf"],"article":{"title":"在参观工农业展览会上的讲话","alias":"","parts":[{"type":"paragraph","text":"在参观工农业展览会上的讲话！"},{"type":"paragraph","text":"（1943年12月）"},{"type":"paragraph","text":"只要我们总结经验教训，农业也好，工业也好，打仗也好，新的胜利是能常取得的。因为有一条，天下穷人要闹革命，这就是我们取得胜利的主要原因。"},{"type":"paragraph","text":"[1]陕甘宁边区工农业生产展览会是为检阅军民大生产由边区政府主办的。毛泽东连续3天参观工农业展览会。这是毛泽东在参观工业部分的展览时，看到陕甘宁边区各地各级生产合作社生产的毛绒毯、毛巾，尤其是丰足牌火柴、新华肥皂、马兰纸这3种凝聚着陕甘宁边区人民艰苦奋斗、自力更1943年12月，毛泽东在陕甘宁边区工农业生产展览会上。"},{"type":"paragraph","text":"大规模生产理动曾行自包动手克服困华的炎未鱼一客为焦念电骤亲部爱周年密富建海区第届生产展爱会九三年"},{"type":"paragraph","text":"十二月九9毛翠东参藏胶甘《实行自己动手克服困难的大规模生产运动》（中国画）"}],"authors":["毛泽东"],"dates":[{"year":1943,"month":12}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":281,"page_end":283},"tags":[{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fa3af1ca68"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
