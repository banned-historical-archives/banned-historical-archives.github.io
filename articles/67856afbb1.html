,"dates":[{"year":1949,"month":6,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"开滦矿职工筹委会制定办法"},{"type":"paragraph","text":"废除包工制度　取消层层中间剥削"},{"type":"paragraph","text":"【唐山电】唐山开滦矿职工筹委会决议取消工人最痛恨的第三组包工大柜。开滦各矿共有三十多个包工大柜，几十年来一直居中残酷地剥削压迫工人。工人们为取消包工柜，曾进行过多次斗争，未能实现。解放后，所有外工（包工大柜所雇用的工人）又提出此迫切要求。唐山矿共有包工大柜十三家，五月上旬曾两次扣押了矿方发给工人的工资共达人民币七百八十万元之多。这一事件经职工筹委会查觉后，更增加了工人对包工大柜的愤恨，要求立即取消包工制。该矿职工遂在职工筹委会领导下，组成了“包工研究委员会”，进行取消包工制的准备工作。五月十六日，职工筹委会及包工研究委员会联合开会，制订了在唐山矿取消包工制度的办法草案。十八日召开职工代表大会通过，并决定首先取消该矿井下欺压工人最厉害的第三组的包工大柜，改由工人伙包，直接与矿方订立合同。将该组包工大柜的资财、工具由该组工人先行接管（不牵连大柜以外的工商业部分）。对其罪大恶极的包工头子潘少棠，则送交人民法院处理。此外，原为包工大柜雇用的职员和井下总管、查工等，则着其各守原职，量才留用。井下的外工头子，也将尽力争取其改变作风，继续服务。原有的井下生产管理制度，原则上暂不变动。另成立工人自己的“工人生产合作社”，作为今后生产管理的组织，主持接管工作。合作社内设立一个委员会，决定社内经营方针。另推选或聘请合作社的正副主任各一人，执行委员会的决议及处理社内经常事务。这些人选都在该组工人代表及工人中产生。合作社要定期向该组工人代表会作业务报告，并按期公布帐目清单。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"67856afbb1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
