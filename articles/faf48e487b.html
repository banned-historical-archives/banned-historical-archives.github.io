uthors":[],"dates":[{"year":1950,"month":5,"day":27}],"is_range_date":false,"parts":[{"text":"苏南松江城区各界对税收反映","type":"title"},{"text":"（苏南日报5月27日讯）苏南松江城区各界对税收问题反映：","type":"paragraph"},{"text":"（一）职工方面（包括干部）认为人民政府的税收名目繁多，使人搞不清，并对工资征税及个别税收人员态度不好不满。","type":"paragraph"},{"text":"（二）厂主店主方面普遍叫嚣“税重了，生意清，负担超过收入，将只好关门。”并叫税务局长是“老虎”、“阎王”。部分人认为税局的核定办法，不够公平合理，说报足营业额的商店反而吃亏。又说“旺月估计核定的，淡月仍这样多，柜台上做一点正好交税款。”","type":"paragraph"},{"text":"（三）教育界及一般市民方面，则大部不满于“薪给所得税”、“学费凭证税”、房产地产等税的增设，个别甚至说“遗产税”是“死了人也要收死人税。”","type":"paragraph"}],"comments":[],"origin":"新华社《内部参考》1950年6月2日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"faf48e487b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
