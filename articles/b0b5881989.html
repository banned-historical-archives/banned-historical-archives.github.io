<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"逐步认识了资产阶级的丑恶面目","authors":["袁英华"],"dates":[{"year":1952,"month":4,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"沪江大学会计系　袁英华"},{"type":"paragraph","text":"我是沪江大学会计系二年级的学生，自听了许云影同学“检举不法资本家父亲”的报告，从她的具体事实中得到了启发与教育，使我更进一步认识了资产阶级的腐朽本质，认识资产阶级的丑恶面目。同学们，我也出身在资产阶级的家庭，因此我在今天要向大家揭穿与控诉我的资产阶级家庭的不法行为和丑恶面貌。"},{"type":"paragraph","text":"我的父亲、叔父和伯父都是“五毒”俱全的不法资本家，他们在沪、汉二地开设药房与药厂。他们是济华堂药房的经理，他们从开设到现在四十余年中，一贯的进行“偷工减料”“暴利”等不法行为来欺骗人民，危害人民。就以我们厂中所出品的，号称行销四十余年的“痛疯骨痛露”来谈吧，按照药典规定应该用蒸溜水，但是我们的药厂中，根本没有这种设备，他们就是这样毫无人性的将含有细菌的自来水加些灰碘就算了，他们就这样的唯利是图、损人利己，不顾别人死活，并以三千五百元一瓶的成本，抬高到一万二千元出售，暴利达百分之二百以上。"},{"type":"paragraph","text":"我还要控诉我的资产阶级家庭是如何多方阻碍我的进步，当我在大一下报名参加军事干校的消息给他们知道后，他们就用资产阶级享乐至上的“道理”来“说服”我，当我参干没有被组织上批准的消息给他们知道后，他们的脸上就露出了满意的神情，又在大二上那学期开学时，我的伯父更以“金钱”来威胁我，当我向他要学费时，他就推说“现在店里的钱，资方是不可以任意动用的，你的学费须要经职工允许才能支付”他以这种卑鄙的手段来威胁我，引起我对工人阶级的误解。其实呢?他最后终于露出了他的本来面目，他想以“学费”来阻止我的进步，阻止我参加任何爱国行动。他说:“你这个学期中，假如还是要和上学期一样在学校中参干或搞工作的话我就不给你学费”，使我失学，他并且强逼我，保证在学校中不参加任何活动，这才把学费付给我，使我从此对社会活动与工作都消极起来。"},{"type":"paragraph","text":"同学们!我听了陈市长的报告，文幼章先生的报告与许云影同学的报告，读了报纸上所揭露的一连串的事实，使我获得很大的启发与教育，感到毛主席和共产党又一次把我救出火坑，使我获得新生，获得了真正的解放。"},{"type":"paragraph","text":"同学们，今天年青一代应该积极行动起来，站稳立场，坚决打退资产阶级的猖狂进攻。尤其是我们出身于资产阶级的青年学生，更应把我们的革命热情贯彻到三反、五反的伟大斗争中去，检举不法资本家的父亲。同学们，行动起来吧!"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b0b5881989"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
