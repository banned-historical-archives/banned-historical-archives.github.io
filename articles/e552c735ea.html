<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"maoquanji18","name":"毛泽东全集第18卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji18.pdf"],"article":{"title":"致陈毅等电","alias":"","parts":[{"type":"paragraph","text":"致陈毅等电！"},{"type":"paragraph","text":"（1943年9月3日）"},{"type":"paragraph","text":"于学忠退出山东后，我山东工作大开展，鲁中南主要山地均为我控制。这对华中及山东今后斗争极关重要。但山东目前兵力不够分配，新发展地区不能迅速巩固。望速从华中一、二、三、四师每师抽调一个小团到山东，归山东分局及山东军区指挥，协助山东开辟工作。"},{"type":"paragraph","text":"[1]这是毛泽东和朱德、刘少奇关于从华中抽调兵力协助山东开辟工作在中共中央政治局一系列会议上的讲话!"},{"type":"paragraph","text":"（1943年9月7日至10月6日）"},{"type":"paragraph","text":"王明是十年内战时期“左”倾机会主义路线的理论创造者与支持者，博古是执行者与发挥者。一九三七年洛川会议通过的决议，实际上有人是不同意的，在形势估计、国共关系、战略方针这三个问题上有不同意见。现在党内主要的危险是闹独立性，我们要强调党的一元化领导。抗战初期的右倾投降主义，六届六中全会在政治路线上是克服了，但未作结论，组织问题也没有说，目的是希望犯错误的同志慢慢觉悟。到了一九四一年五月，我作《改造我们的学习》的报告，毫无影响。六月后编了党书？，党书一出许多同志解除武装，才可能召开一九四一年九月会议，大家才承认十年内战后期中央领导的错误是路线错误。一九四一年九月会议是一个关键，否则我是不敢到党校去作整风报告的，我的《农村调查》等书也不能出版，整风也整不成。另一个关键就是今年中央的九月会议与高级干部现在的学习。中央检讨党的路线的会议开了很久，现在提议把会议暂停，等前方负责同志回到延安再开。先进行高级干部的学习，时间定为三个月。这次的九月会议是有收获的，以前许多同志未注意的问题引起了注意，例如王明的《为中共更加布尔什维克化"},{"type":"paragraph","text":"[1]这是毛泽东在中共中央政治局一系列会议上讲话的一部分。而斗争》一书。现在有几位同志议论四中全会是错误的，此事大家可以研究。"},{"type":"paragraph","text":"我们是要团结的，弄清路线的是非，才能真正团结。以斗争求团结，在中国有四个范畴：无产阶级与地主资产阶级求团结；无产阶级与农民小资产阶级求团结；无产阶级本身的团结；无产阶级先锋队内部的团结。整风就是自我批评，就是以斗争求团结，结果是更加团结了。党内斗争的方法，要避免党在历史上曾经发生过的错误斗争的方法，那样的方法没有解决思想问题。直到前年九月会议和整风，才从思想方法上解决问题。现在的斗争还是继续整风的精神，惩前后，治病救人。"}],"authors":["毛泽东"],"dates":[{"year":1943,"month":9,"day":3}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":165,"page_end":167},"tags":[{"name":"陈毅","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"王明","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e552c735ea"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
