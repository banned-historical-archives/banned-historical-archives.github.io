art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"让社员随时看到毛主席的指示","authors":["余自安"],"parts":[{"type":"paragraph","text":"班长魏长海因患脚病，休息好多日子了。这一天，他坐在炕上编了一段歌颂刘英俊的对口词，接着，又想到：刘英俊能抓紧一切时机，采取各种方式，热情地宣传毛泽东思想，我脚疼，不能下地参加助民劳动，也应该想办法做些宣传工作。他从炕上爬起来，拿起了《毛主席语录》和几支粉笔，就走出去了。他走到贫农社员田淑英老大娘的家门口，就在墙上端端正正地写上了这样一段毛主席语录："},{"type":"paragraph","text":"“乡村中一向苦战奋斗的主要力量是贫农。……没有贫农，便没有革命。若否认他们，便是否认革命。若打击他们，便是打击革命。”"},{"type":"paragraph","text":"走到共产党员的家门口，就在那里写上：“我们共产党员应该经风雨，见世面；这个风雨，就是群众斗争的大风雨，这个世面，就是群众斗争的大世面。”"},{"type":"paragraph","text":"就这样，他根据各家情况，在全村社员家的门口都写上了毛主席的有关语录。他说：“这样，就可以使社员天天看到毛主席的话，随时随地受到毛泽东思想的教育。”以后，每隔三四天，他就出去换写一次。社员们对他非常欢迎。他们说：“解放军给我们传来了毛主席的指示，在我们心坎上撒下了毛泽东思想的种子。”田淑英老大娘看了语录后，高兴地说：“毛主席是咱劳动人民的大救星，为咱们撑腰，替咱们说话。我一定永远听毛主席的话，跟着毛主席闹革命！”"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3cdc019916"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
