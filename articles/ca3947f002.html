" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"为省无联“我们的纲领”拍手叫好","authors":["湘江风雷缚苍龙"],"dates":[{"year":1968,"month":2,"day":14}],"is_range_date":false,"parts":[{"text":"为省无联“我们的纲领”拍手叫好","type":"title"},{"text":"湘江风雷缚苍龙","type":"authors"},{"text":"在国际上以苏联修正主义和美帝为首的反革命势力，结成了反革命神圣同盟，一次又一次向以毛泽东主席为首的马列主义发动了猖狂进攻，在国内以刘少奇为代表的腐朽、反动、没落的上层建筑严重的阻碍了新的生产力的发展。毛泽东主席以无产阶级革命导师特有的胆略在接受了中外一切反动势力的挑战以后所发动的这场在无产阶级专政条件下所发生的革命逐步由低级阶段发展到了革命的高级阶段。经过1月革命风暴和8月的局部国内革命战争的无产阶级革命积累了2次财产和权力再分配的丰富经验，人民的知识也随着革命的发展从感性阶段上升到了理性阶段。“我们的纲领”就是一篇处处充满辩证唯物主义的把马列主义、毛泽东思想与湖南阶级斗争实际情况相结合的一张马列主义的大字报，我湘江风雷缚苍龙战团为省无联的革命纲领拍手叫好，为之大喊大叫。","type":"paragraph"},{"text":"“纲领”之所以好，在于它高度的评价了无产阶级革命导师特有的胆略，开展了震惊世界的文化革命。","type":"paragraph"},{"text":"“纲领”之所以好，在于它正确的评价了18年来在毛主席教导下的革命干部。","type":"paragraph"},{"text":"“纲领”之所以好，在于它运用马列主义、毛泽东思想，分析了这次在无产阶级专政条件下所进行的革命不是单纯的“罢官革命”“揪人运动”而是一场“一个阶级推翻一个阶级的暴烈的行动”的革命。","type":"paragraph"},{"text":"“纲领”之所以好，在于它深刻的领会了林副统帅10·24指示和江青同志11·12指示，对文化革命的新阶段有了更清楚的认识。","type":"paragraph"},{"text":"“纲领”之所以好，在于它与60年代的康有为——X氏的揪章运动是根本相违背的，它有力的抨击了一场空前由X氏发动的改良主义运动。……","type":"paragraph"},{"text":"总之“纲领”是一篇活学活用马列主义、毛泽东思想的最好典范。","type":"paragraph"},{"text":"“纲领”的出现标志着我省无联无产阶级革命派将会更高举马列主义、毛泽东思想伟大旗帜，将文化革命进行到底。","type":"paragraph"},{"text":"“纲领”的出现标志着我省无产阶级文化革命将进入一个更新，更高级阶段。","type":"paragraph"},{"text":"纲领的出现标志着我省无产阶级革命派直接掌握马列主义毛泽东思想的时代开始。","type":"paragraph"},{"text":"“世界到了全人类都自觉地改造自己和改造世界的时候，那就是世界的共产主义时代”。","type":"paragraph"},{"text":"最后让我们高呼马列主义、毛泽东思想万岁！","type":"paragraph"},{"text":" 湘江风雷缚苍龙2月14日","type":"paragraph"}],"comments":[],"origin":"《湖南黑三线反革命大杂烩——“省无联”发出的悲鸣集》湖南省气象局《红旗》总部翻印，1968年2月。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ca3947f002"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
