tart":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"邓小平副总理同吴奈温总统会谈","authors":[],"parts":[{"type":"paragraph","text":"新华社一九七五年十一月十二日讯 国务院副总理邓小平今天上午同缅甸联邦社会主义共和国总统兼国务委员会主席吴奈温举行了会谈。"},{"type":"paragraph","text":"缅甸方面参加会谈的有：国务委员会委员貌貌博士，国务委员会委员、缅甸社会主义纲领党书记（1）吴吞林，外交部长吴拉蓬，国防部副部长觉廷准将，总统办公厅主任吴塔吞，外交部司长吴貌貌基，缅甸驻中国大使德钦千吞。"},{"type":"paragraph","text":"中国方面参加会谈的有：外交部长乔冠华，副部长韩念龙，司长沈平、朱传贤，副司长程瑞声、刘华，中国驻缅甸大使叶成章。"},{"type":"paragraph","text":"国务院副总理邓小平十一月十二日同缅甸联邦社会主义共和国总统兼国务委员会主席吴奈温举行会谈。 新华社记者摄（照片）"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0bf63fb500"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
