"dates":[{"year":1950,"month":7,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"绥远安北仍有封建剥削  当地群众要求政府取缔编辑同志："},{"type":"paragraph","text":"绥远安北县辖境，有东、西、中公旗和杭锦旗的大部领地。在反动时代蒙旗封建地主曾沿用各种不合理的封建制度剥削一般人民。解放以来，依然有人包揽蒙税，对人民实行严重的封建剥削。影响了生产的发展。如郭子兴以七百银元包下西公旗在安北全境的水草费后，便加重征收，获利一千多银元；西公旗营长李英胜今春征收水草费非要白洋不可，若交人民币，就强以高价二万五千元折合一元。这些违反政策的封建剥削制度，今天该是不允许继续存在的。群众近来了解了人民政府的政策后，纷纷要求予以取缔。这种要求是正确合理的，所以向你们反映，请求政府为了保护人民正当利益，立即设法制止。"},{"type":"paragraph","text":"张宜法"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dba23731e9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
