示","authors":["刘少奇"],"dates":[{"year":1951,"month":1,"day":28}],"is_range_date":false,"parts":[{"text":"关于湖北省镇压反革命问题的指示","type":"title"},{"text":"刘少奇","type":"authors"},{"text":"杨奇清同志：","type":"appellation"},{"text":"湖北逮捕反革命分子19823名，在省级机关内逮捕160人，并不算多。又，罗瑞卿〔2〕同志已到过汉口，对于这种事情亦可能会有指示。现在你们对湖北公安厅暂时不要去什么指示，以免引起他们又不敢放手。你们密切注意各地镇压反革命情况的发展，是必要的。〔3〕","type":"paragraph"},{"text":" 刘少奇一月廿八日","type":"paragraph"},{"text":"根据手稿刊印。","type":"paragraph"},{"text":"注释","type":"appellation"},{"text":"〔1〕中央人民政府公安部副部长杨奇清一九五一年一月为转呈中南军政委员会公安部关于湖北省公安厅在省级机关内部镇压反革命情况的报告致信刘少奇并中共中央。信中说，湖北自去年十二月一日到十二月底共逮捕反革命一万九千八百二十三名，目前应当大力清理已捕案犯，集中力量镇压社会上各种反革命，机关内部似应稍为推迟一步，以免分散力量。同时，机关内部镇压反革命亦应和镇压社会上的反革命有所区别，除现行犯应立即逮捕惩办外，在目前不应采取大批逮捕办法。嫌疑分子或历史反革命，应经人事、公安机关协同各机关采取内部侦察、审查等方法解决，以免引起广大干部的恐慌与波动。中南军政委员会公安部在报告中说，湖北省公安厅两个月内在省级机关内逮捕反革命分子一百六十名，可见反革命分子在机关内部的数目相当大。经过清理，机关干部反映较好，为今后进一步开展机关保卫工作造成了有利条件。","type":"paragraph"},{"text":"〔2〕罗瑞卿，当时任中央人民政府公安部部长。","type":"paragraph"},{"text":"〔3〕毛泽东一九五一年一月二十九日在刘少奇起草的这个指示后面批示：“湖北做得很对，不要去泼冷水。”","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"name":"罗瑞卿","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"430a6e85d0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
