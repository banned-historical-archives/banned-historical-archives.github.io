rt":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"我们和你们一样信仰伟大领袖毛主席 红卫兵是中国的希望，是初升的太阳","authors":[],"parts":[{"type":"paragraph","text":"据新华社讯 坦桑尼亚革命青年伊·哈吉和署名为“东非青年”的非洲朋友在去年十一月二十九日和三十日先后写信给中国红卫兵，满腔热情地歌颂毛主席和毛泽东思想，并赞扬用毛泽东思想武装起来的红卫兵的革命行动。"},{"type":"paragraph","text":"伊·哈吉在信中说：“在世界历史上，在毛泽东时代，你们（红卫兵）的兴起是一个非常重大的事件。我们在注视着你们。”"},{"type":"paragraph","text":"伊·哈吉说：“我们也和你们一样信仰伟大的领袖毛主席，因为毛主席是始终和我们在一起的。他始终和我们被压迫的人民在一起。毛主席是可靠的舵手。”“毛泽东思想是我们非洲人民的指南针。由于我们已经得到毛泽东思想光辉的照耀，我们向你们保证，世界上没有任何力量能阻止我们前进”。"},{"type":"paragraph","text":"他说，“尽管帝国主义者和各国的修正主义分子企图给文化大革命抹黑，但是我们却感到欢欣鼓舞。正像毛主席告诉我们的，如若被敌人反对，那就好了，那就证明我们同敌人划清界线了。……”"},{"type":"paragraph","text":"这封信最后说：“让我们的最高统帅、伟大舵手毛主席的思想传播于全世界，一切牛鬼蛇神终将显露原形。”“让我们用毛泽东思想进一步武装自己。让我们坚决响应林彪同志的号召。当你们再见到毛主席的时候，请用雷鸣般的声音高呼‘毛主席万岁！万岁！万万岁！’”"},{"type":"paragraph","text":"署名为“东非青年”的来信热情地赞扬中国红卫兵是“中国的希望和初升的太阳”。"},{"type":"paragraph","text":"这封信驳斥了敌人对红卫兵革命行动的恶毒诬蔑，斩钉截铁地说：“是的，要破坏一切属于敌人的东西。”“要破坏一切敌人寄予希望的东西。摧毁修正主义的一切根子。我们不希望再出现一个向资本主义倒退的苏联。”"},{"type":"paragraph","text":"信中还说：“敌人对你们的谩骂清楚地表明，你们取得了很大的胜利。”"},{"type":"paragraph","text":"这封信最后说：“非洲和世界一切劳动人民和被压迫人民的心，是同你们在一起的。”"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e7c2db9276"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
