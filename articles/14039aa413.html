script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"平壤举行庆祝解放大会我志愿军代表说明继续在朝歼敌决心　大会致电毛主席表示崇高敬意与感谢","authors":[],"dates":[{"year":1950,"month":12,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【中央人民电台广播】北京廿三日消息(平壤迟到消息):朝鲜民主主义人民共和国临时首都平壤市各界人民在十二月十一日，就是平壤解放后的第五天隆重热烈地举行了庆祝平壤解放大会，金策副首相在大会上发表演说，他说:英勇的朝鲜人民军和中国人民志愿军目前几乎已经全部解放了曾经被敌人暂时侵占的共和国北部地区，现在正在向南继续追歼敌人。他号召平壤市人民贡献一切力量进行恢复并且支援朝鲜人民军和中国人民志愿军争取最后胜利。中国人民志愿军代表向大会致祝词，他说:“朝鲜人民的英勇斗争对全世界的和平事业作了伟大的贡献，朝鲜人民的斗争不是孤立的，在你们后面支援你们的有全世界千百万爱好和平的人民，特别是你们的邻居四万万七千五百万的中国人民，我们中国人民决心以全力支援你们。”他指出中国人民志愿军和朝鲜人民军并肩作战两个月以来已经歼灭了大量的敌人，把敌人赶退四百多里，现在我军还在继续前进。他最后说:但是敌人还没有被最后消灭，中国人民志愿军决心与朝鲜人民和人民军在一起继续歼灭敌人，直到朝鲜全部解放。朝鲜人民军代表金载琏和平壤市人民代表崔永淑先后讲话，他们一致对中国人民志愿军的正义援助表示热烈的欢迎和感谢，并且宣誓一定要和中国人民志愿军紧密地团结在一起，献出全部力量来彻底消灭侵略者，争取祖国解放战争的最后胜利。最后大会一致通过了给金日成将军、毛泽东主席和斯大林大元帅的致敬电。"},{"type":"paragraph","text":"【中央人民电台广播】北京廿三日消息:据平壤迟到消息:十二月十一日朝鲜民主主义人民共和国临时首都平壤举行的庆祝平壤解放大会打电报给我中央人民政府毛泽东主席，表示崇高的感谢和敬意。电报说:"},{"type":"paragraph","text":"中国人民的伟大领袖毛泽东主席:"},{"type":"paragraph","text":"由于朝鲜人民军和中国人民志愿部队的英勇斗争，平壤终于从敌人的侵占下重获解放，今天平壤市民的庆祝解放大会向您致以崇高的感谢和荣誉。"},{"type":"paragraph","text":"在过去的一个半月中，我们呻吟在残暴敌人的铁蹄下，现在又能在共和国的旗帜下重度幸福的生活了。美帝国主义强盗破坏、蹂躏了我们具有五千年悠久历史的文化，残暴地破坏和掠夺我们用血汗筑成的工厂、企业、学校、医院、住宅，对我们的父母、兄弟、姊妹和孩子们，进行屠杀或奸淫；我们一定要复仇，要把敌人完全消灭。"},{"type":"paragraph","text":"我们朝鲜人民在保卫祖国的独立，自由和荣誉的正义斗争中得到以苏联为首的有中华人民共和国参加的全世界和平民主阵营的支援，我们充满着必胜的信心，我们深信胜利必定属于朝鲜人民和全世界爱好和平的人民。"},{"type":"paragraph","text":"亲爱的毛泽东主席:我们将坚决而积极地进行支援向前进攻的人民军和中国人民志愿军的工作，我们深信朝中两国人民永久的友谊将更加巩固，在此我们敬祝您、中国人民的伟大领袖万寿无疆。"}],"comments":[],"origin":"中央人民电台","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"14039aa413"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
