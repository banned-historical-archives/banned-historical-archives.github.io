,"dates":[{"year":1957,"month":6,"day":2}],"is_range_date":false,"parts":[{"text":"复旦大学取消党委负责制","type":"title"},{"text":"本报讯  在高等教育部5月31日晚上举行的座谈会上，复旦大学陈望道校长说，复旦大学已取消了党委负责制，加强校务委员会，以校务委员会作为学校的最高领导机构。他认为这样容易发挥老教师的作用，使党与非党干部打成一片，把学校办好。陈望道校长并说，因为复旦大学在这方面比较有条件，中共上海市委也认为这个办法先在复旦实行较好。","type":"paragraph"}],"comments":[],"origin":"《光明日报》1957年6月2日。原题为：“复旦大学取消党委负责制\\加强校务委员会作为学校最高领导机构”。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c80344bf63"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
