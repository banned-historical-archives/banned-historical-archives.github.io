{"year":1976,"month":10,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"在举国欢庆粉碎王洪文、张春桥、江青、姚文元“四人帮”反党集团篡党夺权阴谋的伟大胜利的大喜日子里，重读鲁迅《三月的租界》这篇光辉的杂文，对我们的教育特别深刻。"},{"type":"paragraph","text":"化名“狄克”的反革命小丑张春桥，尽管惯于伪装，可终究逃脱不了鲁迅尖锐的眼光。鲁迅以他那锋利无比的马克思主义的解剖刀，指向钻进革命阵营中的“蛀虫”，撕去他们的假面，暴露他们的本相。张春桥这个四十年前向敌人“献媚”、“替‘他们’缴械”的投降派，四十年后成为不肯改悔的正在走的走资派。今天，结合现实的阶级斗争和路线斗争，读点鲁迅，可帮助我们进一步认清“四人帮”反党集团的真面目，激励我们发扬鲁迅痛打落水狗的革命精神，彻底揭露王张江姚反党集团篡党夺权的滔天罪行，深入批判他们反革命的修正主义路线，肃清其流毒。"},{"type":"paragraph","text":"——编者"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"张春桥","type":"人物"},{"name":"四人帮","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a2428c1938"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
