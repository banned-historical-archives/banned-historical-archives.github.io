ear":1949,"month":3,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"什么叫做无政府主义？编辑同志："},{"type":"paragraph","text":"现在各地都反对无政府主义，但何谓“无政府主义”呢？请解答。"},{"type":"paragraph","text":"白修文白修文同志："},{"type":"paragraph","text":"“无政府主义”即“安那其主义”，是一种小资产阶级不满于现状而企图实现绝顶的个人自由的幻想。其主要的代表者为巴枯宁、克鲁泡特金。"},{"type":"paragraph","text":"十九世纪的欧洲，贫富县殊，社会贫困，资本主义制度已经矛盾深刻，阶级斗争尖锐；故无政府主义主张绝对的个人自由，并否定一切一个阶级对别一个阶级统治的任何政治权力。它不仅主张将全社会之生产手段归于公有，且要立即实现共同消费，以及没有政治权力的支配，达到一个无拘无束的完全“自由”的社会。所以它反对有组织的政治运动，亦反对经过无产阶级专政的国家形式。"},{"type":"paragraph","text":"由此可见，无政府主义，在思想上，是与无产阶级之严格的集体主义决不相容的，它正充分地表现了一种小资产阶级的绝对平均主义、极端民主化，不受组织约束的自由散漫的破坏性与疯狂性的思想情绪。因此，使它不可能集体主义地、有组织有纪律地参加无产阶级领导的阶级斗争。"},{"type":"paragraph","text":"在今天我们革命的队伍中，由于一些同志，他们出身目小资产阶级，故便带入了这一种思想。其具体的表现便是：工作马虎，学习松懈，生活散漫，取消批评，目空一切，各行其“是”，轻视纪律，对抗组织，闹独立性，闹宗派山头，讲怪话，要求绝对平等，一切图个人的痛快，知道错了也不改正，群众利益毫不关心，胡说乱干，自由放任。"},{"type":"paragraph","text":"因此，对于这一种反马列主义的非无产阶级的思想，如果我们不加强力量，予以消灭，则它必会侵蚀革命的组织，妨碍领导的统一，分散斗争力量，使政策无法贯彻，工作发生错误，给革命的事业以极大的损害。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"253eead3c8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
