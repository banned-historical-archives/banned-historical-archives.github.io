次会议上的讲话","authors":["毛泽东"],"dates":[{"year":1949,"month":12,"day":2}],"is_range_date":false,"parts":[{"text":"在中央人民政府委员会举行第四次会议上的讲话","type":"title"},{"text":"毛泽东","type":"authors"},{"text":"毛主席继起讲话。他指出国家的预算是—个重大的问题，里面反映着整个国家的政策，因为它规定政府活动的范围和方向，毛主席举例说到概算草案中关于养活所有旧军队和旧公教人员的问题，他指出：这就是政策问题。人民政府在这个问题上应该采取负责的态度，只有这样才是对人民有利的。毛主席谆谆告诫大家说，我们的情况概括地说来就是：有困难的，有办法的，有希望的。我们的财政情况是有困难的，我们必须要向人民说明我们的困难所在，不要隐瞒这种困难。但是我们同时也必须向人民说明，我们确实有办法克服困难。我们既然有办法克服困难，我们的事业就是有希望的，我们的前途是光明的。我们的情况会一年比一年好起来，估计明年要比今年好。在三年五年的时间内，我们的经济事业可以完全恢复；在十年八年的时间内，我们的经济就可以得到巨大的发展。","type":"paragraph"}],"comments":[],"origin":"原载一九四九年十二月四日《人民日报》。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0c50d18447"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
