ical-archives/banned-historical-archives0/main/maoquanji41.pdf"],"article":{"title":"吾对新华社关于内地对香港副食品供应量锐减的报道的批语","alias":"","parts":[{"type":"paragraph","text":"对新华社关于内地对香港副食品供应量锐减的报道的批语"},{"type":"paragraph","text":"（1959年1月25日）小平同志："},{"type":"paragraph","text":"此件有用，请印发到会同志们一读。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一月廿五日[1]小平，即邓小平，当时任中共中央总书记。"},{"type":"paragraph","text":"[2]新华通讯社1959年1月22日编印的《内部参考》第二六九一期上登载的该社香港分社记者组写的这一报道说，香港副食品绝大部分历来是依靠内地供应的。最近一个月来，内地对香港供应量锐减，在各阶层人士中引起了很大波动。在广大的中间、落后居民中，流露着一种恐惧、仿和不满情绪，糊涂看法很多；在进步人士中，认识还算比较清楚，但也有各种疑虑；反动派目前也在利用这个机会大肆进行反动宣传。"},{"type":"paragraph","text":"[3]指当时正在北京召开的各省、市、自治区党委书记会议。"}],"authors":["毛泽东"],"dates":[{"year":1959,"month":1,"day":25}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":182,"page_end":182},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"415f54dfa7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
