{"year":1966,"month":7,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"我敢于揭发和斗争坏人坏事了"},{"type":"paragraph","text":"贫协组长　杨树泉"},{"type":"paragraph","text":"我念了二年多的书，认识几个字，多年来读旧小说入了迷。读了，也就照着去做，什么“安分守己”啦，“顺时听天”啦，“多磕头、少说话”啦……就这么混混沌沌过了半辈子。毛主席的书，唤醒了我，使我懂得了这是不分阶级、不分敌我的错误思想。我从学习毛主席著作中还认识到被敌人反对是好事而不是坏事。这样，我就敢于揭发和斗争坏人坏事了。今后为了革命，我要和一切不利于社会主义的现象作斗争。贫下中农选我当贫协组长，我决不辜负人民的重托。现在，我一想到为革命，干啥事也高兴。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2c2a9605e3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
