ical-archives/banned-historical-archives8/main/maoquanji12.pdf"],"article":{"title":"给毛岸英、毛岸青的信","alias":"","parts":[{"type":"paragraph","text":"给毛岸英、毛岸青的信"},{"type":"paragraph","text":"（1938年3月4日）亲爱的岸英、岸青："},{"type":"paragraph","text":"时常想念你们，知道你们情形尚好，有进步，并接到了你们的照片，十分欢喜。现因有便，托致此信，也希望你们写信给我，我是盼望你们来信啊！我的情形还好。以后有机会再写信给你们。祝你们健康，愉快，与进步！"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"三月四日"},{"type":"paragraph","text":"[1]1937年年初，岸英、岸青到莫斯科学习。1938年年初，有人从莫斯科带回岸英、岸青的照片，毛泽东喜出望外。不久，有人去苏联，毛泽东便写了这封信，托人带到莫斯科。"}],"authors":["毛泽东"],"dates":[{"year":1938,"month":3,"day":4}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":69,"page_end":69},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9e5ada8ac2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
