uthors":[],"dates":[{"year":1966,"month":12,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"掀起新的高潮  争取更大胜利"},{"type":"paragraph","text":"锡兰朋友坚信红卫兵肯定要把文化大革命进行到底"},{"type":"paragraph","text":"新华社科伦坡电　锡兰教师雅纳基·李亚纳格不久前在这里向新华社记者发表谈话，热情赞扬中国红卫兵的革命精神。他说：“红卫兵在毛泽东主席指引下，树立了史无前例的光辉榜样——值得学习的榜样。他们高举毛泽东思想伟大红旗，全心全意为建设社会主义服务。”"},{"type":"paragraph","text":"他说：“红卫兵政治挂帅，到群众中去，和群众打成一片，把无产阶级文化大革命进行到底，肯定将取得更大的胜利。”"},{"type":"paragraph","text":"他高呼：“无产阶级文化大革命万岁！”“毛泽东主席万岁！”"},{"type":"paragraph","text":"锡中友好协会代表团秘书佩雷拉二十一日向新华社记者谈他访问中国的观感时说，红卫兵在毛主席和中国共产党的指导下，正在掀起一个革命高潮，来破除旧文化，使文化适应政治和经济的发展。他祝愿中国文化大革命胜利。"},{"type":"paragraph","text":"佩雷拉还驳斥了帝国主义及其走狗对中国文化大革命的造谣和诬蔑。（附图片）"},{"type":"paragraph","text":"锡兰朋友和红卫兵小将们在一起。"},{"type":"paragraph","text":"新华社记者摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ab6ed9e773"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
