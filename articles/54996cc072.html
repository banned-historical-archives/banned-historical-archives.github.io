thors":["喻屏"],"dates":[{"year":1969,"month":4,"day":18}],"is_range_date":false,"parts":[{"text":"喻屏交代材料中对“叛变”问题的申辩（摘录）","type":"title"},{"text":"喻屏","type":"authors"},{"text":"〖喻屏，中共中央东北局候补书记。文革中经中共中央批准打倒的刘少奇在东北及辽宁的第三号“代理人”。专案组将其历史上在国民党狱中曾“自首叛变”问题作为逼供重点。〗","type":"subtitle"},{"text":"从去年1月初起，历时一年多，硬是想不起来，〖在国民党狱中〗写过“要求”出狱的“呈文”或“报告”这类东西。关于这个问题，我绝对不是隐瞒，把记得的说成不记得的，因为如果确实写过这类东西，从敌人档案中是会查出来的，我想隐瞒也隐瞒不住。同时，根据我当时的政治思想状况，如果确有这类事情，而其内容又在政治上对党有危害，完全可以肯定我是不会同意的，更不会在上面签字。如果确有此事，其内容在政治上又无问题，或没有大问题，那就根本不会隐瞒了！","type":"paragraph"}],"comments":[],"origin":"高振河《喻屏传》，北京：中共党史出版社，2005年8月第一版。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"54996cc072"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
