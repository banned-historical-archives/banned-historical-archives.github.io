dates":[{"year":1964,"month":11,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"哥斯达黎加一组织"},{"type":"paragraph","text":"揭露“争取进步联盟”高利剥削行为"},{"type":"paragraph","text":"新华社二十日讯　圣约瑟消息：哥斯达黎加反对抬高价格全国委员会最近通过“热带之声”电台揭露说，由美国的贷款机关资助和指导的全国饮水和排水局是有利于美国贷款者的高利贷机构。"},{"type":"paragraph","text":"反对抬高价格全国委员会说，“争取进步联盟”向全国饮水和排水局提供的贷款的利息高达百分之十八，并且附带着使国家为难的条件。此外，贷款者还强迫这个机构接受这样的条件：如果自来水用户不能按期交费的话，则可以停止向这些用户供水。这个委员会又说，“争取进步联盟”的贷款者还强迫全国饮水和排水局扣押那些付不起自来水费的人的财产，并提高自来水的价格。"},{"type":"paragraph","text":"委员会说，尽管受到各种压力，首都地区的百分之五十的用户为抗议“争取进步联盟”的“贷款”而拒绝交费。"},{"type":"paragraph","text":"哥斯达黎加首都圣约瑟的自来水供应控制在美国技术人员手中。最近，供应的水减少了三分之一，而价格却提高了五倍。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2b68398b37"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
