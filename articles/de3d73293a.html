ical-archives/banned-historical-archives0/main/maoquanji40.pdf"],"article":{"title":"金门单日打炮双日不打炮","alias":"","parts":[{"type":"paragraph","text":"金门单日打炮双日不打炮"},{"type":"paragraph","text":"（1958年10月31日）恩来、陈毅、克诚同志："},{"type":"paragraph","text":"应将逢双日不打的地方加以推广，就是说，逢双日一律不打炮，使蒋军可以出来活动，晒晒太阳，以利持久。只在单日略为打一点炮。由内部通知福建实行，暂不再发声明。待有必要，再考虑发一声明。此事，请你们商量酌定。"},{"type":"paragraph","text":"我今日下午南下。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十月三十一日上午二时"},{"type":"paragraph","text":"[1]恩来，即周恩来。陈毅，当时任国务院副总理兼外交部部长。克诚，即黄克诚，当时任中共中央军委秘书长、国防部副部长、中国人民解放军总参谋长。"},{"type":"paragraph","text":"[2]从1958年10月上旬开始，中共中央军委令福建前线人民解放军采取打打停停的方式炮击金门。10月25日，国防部又宣布：“逢双日不打金门的飞机场、料罗湾的码头、海滩和船只。”"}],"authors":["毛泽东"],"dates":[{"year":1958,"month":10,"day":31}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":340,"page_end":340},"tags":[{"name":"陈毅","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"de3d73293a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
