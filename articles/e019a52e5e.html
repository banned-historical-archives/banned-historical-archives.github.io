s":[],"dates":[{"year":1970,"month":2,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"坚持发动群众开展革命大批判"},{"type":"paragraph","text":"南宁红旗肉店打击资产阶级的腐蚀和破坏"},{"type":"paragraph","text":"新华社南宁十八日电广西壮族自治区南宁市食品公司红旗肉店革命领导小组狠抓经济领域的阶级斗争，发动群众深入持久地开展革命大批判，坚决打击资产阶级的腐蚀和破坏，自觉地抵制资产阶级思想的侵蚀，推动革命和生产蓬勃发展。"},{"type":"paragraph","text":"在斗、批、改不断取得胜利的大好形势下，红旗肉店的部分群众产生了自满松劲情绪，认为“该批的批了，该斗的斗了，大批判搞得差不多了”。店革命领导小组认为，这种自满情绪，是叛徒、内奸、工贼刘少奇“阶级斗争熄灭论”的余毒还没有彻底肃清的反映，是对经济领域里阶级斗争的长期性、复杂性认识不足的具体表现。针对这种情况，领导小组迅速办起各种类型的毛泽东思想学习班，引导大家活学活用毛主席关于"},{"type":"paragraph","text":"“我们已经取得了伟大的胜利。但是，失败的阶级还要挣扎。这些人还在，这个阶级还在。所以，我们不能说最后的胜利”的伟大教导，大讲深入持久开展革命大批判的重要性和必要性，大摆阶级斗争在经济领域里的各种表现，大挖麻痹松劲情绪的思想根源。通过这些活动，大家更深刻地认识到，深入持久地开展革命大批判，是进一步加强无产阶级专政和巩固社会主义经济基础的需要，从而迅速掀起革命大批判新热潮。"},{"type":"paragraph","text":"红旗肉店的广大革命群众在开展革命大批判的过程中，坚持活学活用毛泽东思想，经常分析经济领域阶级斗争的新形势、新动向，主动向一小撮挖社会主义墙脚的阶级敌人发动猛烈进攻，同时，坚持做深入细致的思想政治工作，严格区分和正确处理两类不同性质的矛盾，因而团结了一切可以团结的力量，共同对敌。"},{"type":"paragraph","text":"通过革命大批判，红旗肉店广大革命群众进一步明确了为工农兵服务、为工农业生产服务的方向，更牢固地树立了全心全意为人民服务的思想。为了方便工农兵，他们不仅积极改进了门市供应，增加了花式品种，而且还组织流动推销组，主动送货上门。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e019a52e5e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
