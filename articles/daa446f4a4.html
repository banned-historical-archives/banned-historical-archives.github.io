script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"市粮油工业公司党委通过批评和自我批评及接受群众监督等方法认真坚持活学活用毛泽东思想","authors":[],"dates":[{"year":1971,"month":2,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　上海市粮油工业公司党委会自从党的九届二中全会公报发表以来，通过经常开展批评与自我批评和深入群众、接受群众监督等方法，不断增强学习的自觉性，认真坚持活学活用毛主席著作，党委成员做到坚持集体学习外，还每天自学一小时。"},{"type":"paragraph","text":"这个公司党委会的委员在党的九届二中全会公报的指引下，带头活学活用毛主席哲学著作，推动了基层单位群众性学习运动的开展，受到了上级领导的表扬。开始时，党委对于这些表扬还感到“受之有愧”，思想上比较注意，行动上比较谨慎。但到后来，有的委员就慢慢觉得“学习还可以，工作还不错，日子蛮好过”，从而放松了学习。党委委员中也有流露出“党委抓学习太多了，抓业务太少了”以及“这样党委委员就变成学习委员了”等错误想法。"},{"type":"paragraph","text":"党委书记、军队代表针对以上问题，及时组织党委成员认真学习毛主席的光辉著作《学习和时局》。大家遵照毛主席关于“检查自己背上的包袱，把它放下来，使自己的精神获得解放”的教导，开展了积极的思想斗争。大家联系实际，谈了由于狠抓了学习，从而推动了工作，和由于放松了学习，使工作遇到困难和挫折的体会，进一步认识到党委的首要任务就是要认真坚持学习毛泽东思想，用毛泽东思想去教育人，带领群众坚定不移地执行毛主席的无产阶级革命路线。扫除了思想障碍，大家的学习自觉性提高了。在郊区基层厂工作的党委委员，都能事先安排好工作，按时参加集体学习。公司的党委副书记说:“现在每天晚上不学习就觉得象有件事没有完成似的。”党委委员中的新干部也坚持参加劳动，坚持自学。"},{"type":"paragraph","text":"公司党委会遵照毛主席关于相信群众、依靠群众的教导，定期开门整风，发动群众对领导班子的学习进行监督。党委在整风中找到了自身学习中的四个“不够”，即:认真学习毛主席原著不够；认真思索不够；经常带着改造主观世界和政治路线方面的问题学习不够；写读书笔记和学习心得不够。他们找到问题以后，立即认真加以克服，同时经常运用“请进来”、“走出去”的办法，接受群众的监督。“请进来”，就是请机关各组室负责人和群众代表参加党委的学习，并对党委同志的学习进行评论。“走出去”，就是党委领导成员到基层去讲用，并听取群众对领导讲用的意见。党委常委还经常采取蹲点的方式，到先进单位和后进单位去，与那里的群众一起学习、讲用，从群众中吸取养料，增强为巩固无产阶级专政而学习的自觉性。"},{"type":"paragraph","text":"这个公司党委会还在实践中找到了行之有效的学习方法，并形成了一套学习制度，使学习坚持不懈。党委结合中心任务，每月订一次学习计划，党委委员也逐渐养成了每天自学、定期讲用、写读书笔记的习惯。党委在成员分散的情况下，做到学习内容统一，分散学习，集体讲用，五个月来雷打不动。(本报通讯员)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"daa446f4a4"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
