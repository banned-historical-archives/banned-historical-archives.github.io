<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"意大利工人阶级掀起反对垄断资本剥削的新怒潮  罗马二十五万工人举行总罢工  一国营工厂工人占领工厂一个半月迫使厂方答应工人要求","authors":[],"dates":[{"year":1968,"month":7,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"意大利工人阶级掀起反对垄断资本剥削的新怒潮"},{"type":"paragraph","text":"罗马二十五万工人举行总罢工"},{"type":"paragraph","text":"一国营工厂工人占领工厂一个半月迫使厂方答应工人要求"},{"type":"paragraph","text":"新华社十三日讯　罗马消息：意大利工人阶级掀起了反对垄断资产阶级残酷剥削的新的罢工怒潮。罗马地区的产业和农业工人二十五万人，十一日举行总罢工，要求提高工资和充分就业。"},{"type":"paragraph","text":"近年来，在意大利垄断资产阶级的加紧压榨下，意大利劳动人民的生活日益困苦。大批工人找不到工作。仅在意大利首都罗马，就有三万产业工人失业。一万七千名农业工人被迫离开罗马附近的农村，到处流浪，找寻工作。有职业的工人，也遭受着资本家的残酷剥削和压迫。工人对这种处境极为愤懑。"},{"type":"paragraph","text":"罗马地区二十五万产业和农业工人，十一日联合举行了二十四小时的总罢工，向意大利政府和垄断资产阶级表示愤怒的抗议。十一日上午，数千名工人在“共和国广场”集合，接着在罗马市中心区举行了声势浩大的示威游行。他们还在罗马大圆形演技场前举行群众大会，抗议资本家解雇工人，要求政府采取措施，保证工人就业。"},{"type":"paragraph","text":"在意大利的其他地区，罢工斗争的浪潮也在高涨。十一日在意大利北部的费拉拉和拉万纳，十日在意大利中部的皮斯托亚，工人都举行了罢工，要求充分就业，反对资本家的残酷剥削。连日来，意大利许多城市的机械制造厂、化学工厂、纺织厂、食品厂和其他工厂都爆发了罢工。"},{"type":"paragraph","text":"意大利各报纸的排字工人宣布在十三日再次举行二十四小时的罢工，抗议资本家拒绝接受工人的合理要求。这次罢工将使得十三日的晚报和十四日的报纸无法出版。"},{"type":"paragraph","text":"在热那亚港，意大利远洋航轮“拉菲洛号”的船员也举行了罢工，要求改善工作条件和享受工会权利。罢工的海员还在政府经营的“意大利”公司的办公室前举行了示威。"},{"type":"paragraph","text":"在意大利南部的巴林，国营五金机械制造厂——富西内·默里迪奥纳利厂的工人，在占领了这个工厂四十五天以后，迫使工厂当局答应提高工人工资和承认工人享受工会权利，同时还迫使工厂当局取消了解雇工人代表的无理决定。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c424c68872"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
