ical-archives/banned-historical-archives0/main/maoquanji29.pdf"],"article":{"title":"加紧督促桂粤湘三省剿匪巩固广东防务","alias":"","parts":[{"type":"paragraph","text":"加紧督促桂粤湘三省剿匪"},{"type":"paragraph","text":"巩固广东防务"},{"type":"paragraph","text":"（1950年12月29日）邓、谭、赵、苏："},{"type":"paragraph","text":"（一）十二月二十四日关于总结秋季剿匪经验的报告收到阅悉，甚好甚慰，已发华东、西南、西北三区参考。（二）对桂粤湘三省剿匪仍望加紧督促，务于五月三十一日以前彻底完成剿匪任务，使广西的一个军（是否四十五军适宜）及二十一兵团能于六月上旬集中梧州地区待命调动入粤，应付可能发生的事变\"。湖南应准备以一个军至迟于五月间最好能在三四月间集中郴州、衡州线上待命。总之广东有事须由四野负责独力应付，保证战胜可能入侵之台湾匪军，巩固广东防务，望按此方针筹划剿匪工作及兵力部署。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十二月二十九日"},{"type":"paragraph","text":"[1]邓、谭、赵、苏，指邓子恢、谭政、赵尔陆、苏静，当时分别任中南军区第二政治委员、第三政治委员、参谋长和副参谋长。"},{"type":"paragraph","text":"[2]指台湾国民党军队可能在广东登陆进犯。[3]衡州，今湖南衡阳。"}],"authors":["毛泽东"],"dates":[{"year":1950,"month":12,"day":29}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":471,"page_end":471},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b9cbc3d8c0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
