党性","authors":["马力"],"dates":[{"year":1984,"month":6,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社杭州六月九日电　(记者　马力)中共中央顾问委员会华东组于六月五日至九日在杭州举行第二次集会。"},{"type":"paragraph","text":"参加这次会议的有中顾委副主任许世友，中顾委委员江渭清、杜平、刘顺元、惠浴宇、聂凤智、王必成、王一平、夏征农、杨尚奎、白如冰、肖望东、赵林、孔石泉、魏金水、李丰平。"},{"type":"paragraph","text":"中央顾问委员会常委王平代表邓小平主任、薄一波副主任向在华东的中顾委委员问好。他还向大家介绍了中顾委半年来的活动和在京委员参加整党的情况。"},{"type":"paragraph","text":"到会委员交流了今年一月华东组首次集会以来的活动，汇报了个人参加学习整党文件、进行对照检查的情况。有的委员还介绍了对城市和农村经济改革进行调查和撰写回忆录的情况。"},{"type":"paragraph","text":"委员们在讨论中指出，当前整党中的一个重要问题，是必须彻底否定“文化大革命”。不彻底否定“文化大革命”，就难以克服派性，增强党性。这个问题关系到清理、核查“三种人”及建立“第三梯队”的工作。大家说，在整党中一定要用党性来搞好选拔和培养接班人的工作。"},{"type":"paragraph","text":"会议期间，中共浙江省委、省人民政府和省军区的负责人王芳、薛驹、康明才、马骥良等探望了出席会议的老同志。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"派性","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b4ba166584"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
