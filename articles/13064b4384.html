art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"《毛泽东的读书生活》","authors":["羽/凡文"],"parts":[{"type":"paragraph","text":"（三联书店出版）"},{"type":"paragraph","text":"为纪念毛泽东同志逝世十周年，中共中央文献研究室组织撰写了《毛泽东的读书生活》一书。"},{"type":"paragraph","text":"该书主要介绍毛泽东笃志嗜学，把读书与工作溶于一体，联系实际需要，阅读马列主义理论，阅读哲学、逻辑学、经济学、文学、历史、自然科学等各科书籍和报刊杂志，以及自学英语的情况。这些介绍长期在毛泽东身边工作和从事这方面研究的同志依据当时的记录、回忆材料和文献档案资料写成（许多材料是过去未曾发表过的）。有的介绍还对毛泽东的某些观点进行了评论。全书分为若干专题，力求多侧面地、翔实地传述和展现毛泽东读书和生动情景，使人们了解毛泽东强烈地求知欲望和广泛的读书兴趣，以及读书生活对于他的思想和事业的深刻影响。（羽）"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"13064b4384"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
