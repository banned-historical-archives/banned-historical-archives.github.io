torical-archives/banned-historical-archives9/main/books/wenji8.pdf"],"article":{"title":"发展商业和副食品生产","description":"根据中央档案馆保存的原件刊印。","dates":[{"year":1959,"month":5},{"year":1959,"month":7}],"parts":[{"text":"发展商业和副食品生产","type":"title"},{"type":"subtitle","text":"一"},{"type":"paragraph","text":"工农商并举，提得很好，一定要这样做。贬低商业，商不挂帅，工农两业是不会发展的。"},{"type":"paragraph","text":"（五月二十二日）"},{"type":"subtitle","text":"二"},{"type":"paragraph","text":"为要流通，交通运输必须相应地办起来。城市当然以工业为重点，但现在是处于副食品严重不足的时期，必须强调郊区的农业。所谓农者，指的农林牧副渔五业综合平衡。蔬菜是农，猪牛羊鸡鸭鹅兔等是牧，水产是渔，畜类禽类要吃饱，才能长起来，于是需要生产大量精粗两类饲料，这又是农业，牧放牲口需要林地、草地，又要注重林业、草业。由此观之，为了副食品，农林牧副渔五大业都牵动了，互相联系，缺一不可。"},{"type":"paragraph","text":"（七月四日）"},{"type":"subtitle","text":"三"},{"type":"paragraph","text":"无产阶级专政的国家，一定可以做到有菜吃，有油吃，有猪吃，有鱼吃，有菜牛吃，有羊吃，有鸡鸭鹅兔吃，有蛋吃。我们应当有志气、有决心做到这一项在政治上经济上都有伟大意义的社会主义事业，也应当有信心做到这一项事情。一切为了人民利益，望各级党委接到这个指示以后，精心筹划，立即动手办起来。不但大中城市，县城及四乡集镇都要照此办起来。各级党委要有一个专门管副食品的书记或精心从事的干部。"},{"type":"paragraph","text":"（七月四日）"}],"comment_pivots":[{"part_idx":0,"offset":10,"index":1}],"is_range_date":false,"authors":["毛泽东"],"comments":["本篇一是毛泽东在中共中央书记处书记、国务院副总理李先念一九五九年五月三日在全国财贸书记会议上关于粮食问题的报告上写的批注。本篇二、三是毛泽东在审阅李先念一九五九年七月为中共中央起草的关于大中城市郊区发展副食品生产的指示稿时加写和改写的两段文字。"],"page_start":80,"page_end":81,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a836bf3244"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
