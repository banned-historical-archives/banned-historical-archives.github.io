[{"year":1968,"month":8,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛泽东思想开红花"},{"type":"paragraph","text":"“工分挂帅”踩脚下"},{"type":"paragraph","text":"小汤山公社大汤山大队三队，大办毛泽东思想学习班，狠批中国赫鲁晓夫“工分挂帅”的谬论，无产阶级“公”字大发扬。头年冬季的饲草没铡完，今年春天，社员和干部们主动用收工后的时间，铡草三、四万斤，没有要记工分。“三夏”时节，社员起早拔麦子，晌午打麦子，队长提出要多记工分，社员们都不同意。大家说：“我们批判了‘工分挂帅’，就要和‘工分挂帅’一刀两断，坚决不搞那一套。”突出无产阶级政治，一通百通。现在，社员们不管干什么活，都积极主动，不问定额，不计较自己的工分。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5d56c5b219"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
