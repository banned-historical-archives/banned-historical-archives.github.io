" crossorigin="">{"props":{"pageProps":{"books":[{"id":"d1679abc-409f-4eb4-b575-22371b9682c3","name":"张春桥关锋同志接见福建部分赴京革命同学的讲话","internal":true,"official":true,"type":"img","author":"","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/d1679abc-409f-4eb4-b575-22371b9682c3/1.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/d1679abc-409f-4eb4-b575-22371b9682c3/2.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/d1679abc-409f-4eb4-b575-22371b9682c3/3.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/d1679abc-409f-4eb4-b575-22371b9682c3/4.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/d1679abc-409f-4eb4-b575-22371b9682c3/5.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/d1679abc-409f-4eb4-b575-22371b9682c3/6.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/d1679abc-409f-4eb4-b575-22371b9682c3/7.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/d1679abc-409f-4eb4-b575-22371b9682c3/8.jpg"],"article":{"title":"北京市委书记雍文涛同志在“首都大专院校红卫兵捍卫毛泽东思想捍卫十六条联络委员会”于清华大学召开的“向右倾机会主义路线猛烈开火——彻底批判谭力夫发言大会”上的讲话","alias":"","parts":[{"type":"paragraph","text":"北京市委书记雍文涛同志在首都大手院校红卫兵捍卫毛泽东思想捍卫十云条联络委员会”于情华大学召开的（十月四日)"},{"type":"paragraph","text":"向右倾机会主义路线猛烈开火"},{"type":"paragraph","text":"底批判谭力夫发言大会·上的讲话同志们，同学们"},{"type":"paragraph","text":"今天能够参加这了大会很高兴，大家通过这了讨论，对谭力夫同学讲话的托判来捍买十六条，执行十六条，书清这了错误路钱在一部分同学中的影响。这样的会我们是支持的，赞成的"},{"type":"paragraph","text":"我们知道毛主席亲自主持制定的十六条是无产阶级革命路线战胜资产阶级文动路线的产物，十六条公布后，获得了广大革命群众的拥护，无产阶级文化大苹命么现了一个新高潮草命形梦非常之好，而且越来越好，但是两条路线的斗争并没有结荣，林虎同志在庆祝国庆十心周年大会上的讲话，非常及她时，正石角地向我们指么在无产阶级文化大革命中，以毛主席为首的无产阶级草命路线同资产阶级仅对革命路线的斗争还在继读。有些地方，有些单位，这种斗争还是很大镜，很复杂的。这就是说，有极十数人还顽固地坚持资产阶很仅动路钱，采取新的形势欺骗群久对荒十六条而有一部人，还没有从错读路线的影响下解放出表为他们所利用，这是当前文化大革命中必须鲜决的一个关键向题。"},{"type":"paragraph","text":"谭力夫同学的讲话，是违背十六条的，是不符合毛译东思想的，同学们对他的讲话追行批判是正确的，必要的：因为谭力夫讲话的结读观点，不是谭力夫一人的向题是错泪路线未被书清的反应，这正是我们批半忆谭力夫同学错误言论的么发点，而不是共他，当然，一时受蒙蔽的人，如采觉悟过来，摆脱错误路线的影响.与广大革命师生站在一起，坚决地同资产阶级反动路线作斗争，那他就们然是真区的革命派。"},{"type":"paragraph","text":"对资产阶级反动路线必彻切底批判，而皿必负书请它在群众中的造成能恶劣影响，不破不立心如《红旗》节十三期社论所指出的要不要批判资产阶级反动路线，是能不能莫彻，执行文化革命的十六条，解不法正润地进行广泛地斗批改的关键在这里不能平取折衷主义。"},{"type":"paragraph","text":"我们完全相信，所有的草命师生莫工是坚决拥护十六条的是能的够坚定不移地惯彻、执行十六条的。因此，我们就必须坚决同资产阶级反动路线作斗争，坚诀请除它的影响，认莫地字习十六条，宣传十六条，捍卫十六条，贯彻切十六条，大家紧地团结在十六条这个无产阶级文化大草命的伟大纲领下，战胜一切阻力.为彻底地，胜利她完成无产阶级文化大单命而奋斗!"},{"type":"paragraph","text":"让我仿高呼："},{"type":"paragraph","text":"无阶级文化大革命方发!战无不胜的毛泽东思想万岁!毛主席万岁!万岁!万岁!"},{"type":"paragraph","text":"清华大字《井山》红卫兵整理10.5根据录音反复校外，确保无误。上海市节五十一中字中五（2)《红色应老虎》战斗隧翻月印"},{"type":"paragraph","text":"1966.10.18."}],"authors":["雍文涛"],"dates":[{"year":1966,"month":9,"day":28}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":8,"page_end":8},"tags":[{"name":"毛泽东","type":"人物"},{"name":"雍文涛","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c1816f1184"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
