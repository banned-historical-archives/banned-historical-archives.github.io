ical-archives/banned-historical-archives8/main/maoquanji22.pdf"],"article":{"title":"歼灭进攻沐阳之敌极为重要","alias":"","parts":[{"type":"paragraph","text":"歼灭进攻沐阳之敌极为重要！"},{"type":"paragraph","text":"（1946年12月13日）粟、谭，并告陈，张、邓："},{"type":"paragraph","text":"整十一师到达宿迁后，必配合六十九师及预三旅等向述阳进攻，惟有歼灭该敌方能保持述阳在我手中。如沐阳失守，华野主力即难在苏北继续作战，有被迫转至鲁南可能。对此点必须严重估计到。你们对此意见及部署如何，盼告。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"亥元"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军委起草的给华中野战军司令员粟裕和政治委员谭震林的电报。1946年12月中旬，国民党军徐州绥靖公署主任薛岳指挥二十五个半旅分4路从江苏东台、淮阳、宿迁和山东峄县（今峄城）向苏北和鲁南解放区发动进攻，企图消灭华中野战军，或迫其北撤山东。其中整编第六十九师和整编第十一师由宿迁分别向新安镇（今新沂县）和沭阳进犯。山东、华中两野战军以20个团钳制其中3路敌军，集中第一、第二、第九纵队，第八师及第七师主力共24个团，求歼由宿迁进犯之敌。经激战，将敌整编第六十九师和第十一师一部共2.1万余人全歼于宿迁以北地区。此役称为宿北战役。"},{"type":"paragraph","text":"[2]陈，指陈毅，当时任山东野战军司令员兼政治委员。张邓，指张鼎"}],"authors":["毛泽东"],"dates":[{"year":1946,"month":12,"day":13}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":314,"page_end":314},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c23e5917d2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
