沛·阿旺晋美等到机场送行","authors":[],"dates":[{"year":1975,"month":2,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"应邀参加尼泊尔国王加冕典礼"},{"type":"paragraph","text":"我国特使陈锡联离京前往加德满都"},{"type":"paragraph","text":"邓小平纪登奎徐向前阿沛·阿旺晋美等到机场送行"},{"type":"paragraph","text":"新华社一九七五年二月二十一日讯　中华人民共和国特使、国务院副总理陈锡联，应邀参加尼泊尔国王比兰德拉·比尔·比克拉姆·沙阿·德瓦陛下的加冕典礼，今天乘专机离开北京前往加德满都。陈锡联特使的随行人员有外交部副部长韩念龙、亚洲司副司长章含之等。"},{"type":"paragraph","text":"到机场送行的有国务院副总理邓小平、纪登奎，人大常委会副委员长徐向前、阿沛·阿旺晋美，外交部部长乔冠华、副部长王海容，副司长王晓云、刘华等。"},{"type":"paragraph","text":"尼泊尔驻中国大使馆临时代办西瓦尔和其他外交官员也到机场送行。（附图片）"},{"type":"paragraph","text":"中华人民共和国特使陈锡联离京前往加德满都参加尼泊尔国王加冕典礼。邓小平、纪登奎、徐向前、阿沛·阿旺晋美等到机场送行。"},{"type":"paragraph","text":"新华社记者 摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"纪登奎","type":"人物"},{"name":"徐向前","type":"人物"},{"name":"陈锡联","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8998b0c5d9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
