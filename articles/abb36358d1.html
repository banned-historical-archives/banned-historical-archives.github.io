hors":[],"dates":[{"year":1972,"month":12,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京一九七二年十一月三十日电　宾努首相和夫人、英·萨利特使，结束了在我国南方的访问，今天上午乘专车到达北京。随同宾努首相和夫人前往访问的柬埔寨王国民族团结政府沙林察大臣的夫人，大臣周成、江裕朗、谢桑、吉春和夫人、秀蒲拉西以及柬埔寨驻外使节，同车到达北京。"},{"type":"paragraph","text":"叶剑英、纪登奎、邓颖超、耿飚、韩念龙、林佳楣、韩叙、王珍、梁枫、孙浩等同志，前往车站欢迎。"},{"type":"paragraph","text":"到车站欢迎的还有柬埔寨王国民族团结政府大臣秀木、努呼，副大臣万比尼和夫人，柬埔寨驻中国大使馆临时代办郑良合等。我国驻柬埔寨大使康矛召和杨玲同志陪同柬埔寨贵宾到达北京。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"纪登奎","type":"人物"},{"name":"耿飚","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"abb36358d1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
