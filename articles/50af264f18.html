ical-archives/banned-historical-archives0/main/maoquanji32.pdf"],"article":{"title":"对东北农村工作会议有关文件的批语","alias":"","parts":[{"type":"paragraph","text":"对东北农村工作会议有关文件的批语"},{"type":"paragraph","text":"（1952年12月21日）周、朱、陈、薄阅，尚昆办。"},{"type":"paragraph","text":"此件经廖鲁言、陈伯达二同志研究过，其修改之点伯达和我谈过，并得高岗同志同意。你们如无时间，只看东北局报告及中央复电即可。"},{"type":"paragraph","text":"请尚昆将中央复电一件，修改或批注的张明远报告一件，章程等草案四件，共六件，送往东北局，其中张明远报告等五件均原文送去，不要重抄。另请尚昆将东北局给中央报告一件，中央复电"},{"type":"paragraph","text":"[1]周，指周恩来。朱，指朱德。陈，指陈云，当时任政务院副总理兼财政经济委员会主任。薄，指薄一波，当时任政务院财政经济委员会副主任。"},{"type":"paragraph","text":"[2]指中共中央东北局副书记张明远1952年10月28日在东北局召开的农村工作会议上作的关于贯彻执行农业合作化决议，进一步提高农业生产的报告。"},{"type":"paragraph","text":"[3]指中共中央东北局1952年11月19日关于10月27日至11月10日召开的东北区农村工作会议情况给中央的报告。报告总结了这次会议的收获和缺点，反映了会议在讨论东北局关于发展农业生产中“依靠组织起来的农民，扶助贫困的农民，团结个体的农民，限制富农的剥削”问题上的争论，请中央予以指示。"},{"type":"paragraph","text":"[4]指中共中央东北局农村工作会议通过的《东北农业生产合作社试行章程》《农村供销合作社信用部组织通则》《农村信用合作社章程》和《农村私人借贷暂行条例》等4个文件。"},{"type":"paragraph","text":"对东北农村工作会议有关文件的批语一件，张明远报告一件，东北农业合作社试行章程草案一件，共四件，印送东北以外各中央局、省市区党委。"},{"type":"paragraph","text":"毛泽东十二月廿一日"}],"authors":["毛泽东"],"dates":[{"year":1952,"month":12,"day":21}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":384,"page_end":385},"tags":[{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"50af264f18"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
