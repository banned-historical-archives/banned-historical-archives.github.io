<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反对垄断资产阶级转嫁经济危机和困难  意大利工人阶级和劳动人民不断开展斗争","authors":[],"dates":[{"year":1976,"month":11,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反对垄断资产阶级转嫁经济危机和困难"},{"type":"paragraph","text":"意大利工人阶级和劳动人民不断开展斗争"},{"type":"paragraph","text":"新华社罗马一九七六年十一月二十六日电　新华社记者报道：今年以来，意大利广大工人阶级和劳动人民接连不断地举行规模巨大的罢工、示威和集会，或采取其它方式进行斗争。他们在斗争中提高了阶级觉悟，增强了战斗力。"},{"type":"paragraph","text":"意大利在一九七五年经历了第二次世界大战结束以来最严重的经济危机；今年情况仍然不妙，通货膨胀加剧，失业现象严重。据报道，今年六月，意大利失业人数在一百一十四万以上，比去年同期增加了百分之五。垄断资产阶级千方百计把经济危机和困难的重担转嫁到劳动人民身上，使广大工人和劳动人民的处境日益困难，从而激起他们的强烈反抗。"},{"type":"paragraph","text":"今年，意大利有一千多万职工同资方进行重订合同的谈判。这些职工属于机械、铁路、建筑、化工、成衣和纺织、农业、商业等部门，占意大利在业职工的一半以上。由于资方拒不接受广大职工提出的合理要求，使重订合同的谈判一再拖延。职工们怒不可遏，纷纷起来罢工。"},{"type":"paragraph","text":"意大利罢工斗争的声势十分浩大。今年以来，参加人数在一百万以上的大罢工就有十三次，其中有两次参加人数超过一千万。据报道，今年上半年，工人罢工的总工时超过了一亿小时，这给资方以沉重打击。"},{"type":"paragraph","text":"意大利广大工人和劳动人民采取多种多样的方式进行斗争。他们除了举行罢工、示威游行和集会之外，还占领工厂、火车站、铁路和公路。在意大利北部的工商业城市米兰，雷兰德—英诺琴蒂汽车厂的四千五百名职工为反对垄断资本关闭工厂和解雇工人，从去年十一月底开始就占领了工厂。他们在厂里不分昼夜地轮流站岗，不让资方把企业设备和产品运走或出售。经过一百三十二天的占厂斗争，职工们终于取得了胜利。在米兰的其它工厂，在都灵、热那亚、西西里岛的巴勒莫以及其它地方，都一再发生工人们的占厂斗争。在热那亚一些工厂里，工人进行的占厂斗争长达四百多天。占领火车站的斗争也一再发生。今年三月，那不勒斯有三百名失业工人冲进火车站，占领火车轨道，要求解决他们的就业问题。十月二十二日，萨卡工厂数百名工人为抗议三个月不发工资，占领布林迪西火车站约六小时，使进出车站的数十列火车不能正常运行。同一天，罗马约三百名铁路工人在罗马的里米尼火车站示威，并且占领了铁路轨道。"},{"type":"paragraph","text":"意大利工人和其他劳动群众在斗争中互相支持，表现了团结战斗的精神。在雷兰德—英诺琴蒂汽车厂的职工进行占厂斗争期间，米兰各行业广大劳动群众曾经多次举行罢工、示威游行和集会，予以支持。不少劳动群众自动捐款支援坚持斗争的工人。许多工人和学生还派代表到该厂慰问。今年四月八日，意大利全国一百四十万建筑工人为要求重订合同而举行罢工。许多地区的化学工人和机械工人在这一天也举行了罢工，同建筑工人并肩战斗。七月，意大利全国一百五十万农业工人为争取重订合同和提高工资而举行罢工和示威游行，那不勒斯和波伦亚等地的五金机械工人、商业部门的劳动者、手工业者和失业青年也参加了农业工人的示威和集会，表示支持他们的斗争。九月底，勒佐迪卡拉布里亚地区二千纺织工人为要求保障就业而举行罢工。"},{"type":"paragraph","text":"在斗争中，意大利工人阶级和劳动人民的觉悟不断提高，他们逐渐识破出卖工人利益、企图扼杀工人运动的少数工会头子的丑恶面目。他们突破这些工会头子的控制，自动组织起来，同垄断资产阶级进行斗争。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ce4dc8376f"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
