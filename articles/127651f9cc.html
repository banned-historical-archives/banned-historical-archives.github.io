script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"渭南县委引导干部和群众抓紧抓好头等大事  学习党的基本路线深入批判修正主义","authors":[],"dates":[{"year":1973,"month":8,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"渭南县委引导干部和群众抓紧抓好头等大事"},{"type":"paragraph","text":"学习党的基本路线  深入批判修正主义"},{"type":"paragraph","text":"据新华社西安一九七三年八月十七日电　中共陕西省渭南县委抓紧、抓好批修整风这个头等大事，发动干部、群众认真学习党在整个社会主义历史阶段的基本路线，深入持久地开展对刘少奇一类骗子的革命大批判，提高了干部、群众的阶级斗争和路线斗争觉悟，全县的革命和生产出现了许多新的气象。"},{"type":"paragraph","text":"批修整风以来，中共渭南县委带领全县干部和群众，以极大的无产阶级义愤，深入持久地批判了刘少奇一类骗子妄图改变党的基本路线和政策，改变我国社会主义制度，复辟资本主义的罪行。全县各社、队经常召开各种类型的批判会，许多社、队还不断刊出革命大批判专栏。县委和各区、社党委的领导成员，在各种会议上带头开展革命大批判。全县各单位还注意及时总结经验，使运动开展得既轰轰烈烈又扎扎实实。"},{"type":"paragraph","text":"在批修整风中，中共渭南县委认真组织干部、群众学习党在整个社会主义历史阶段的基本路线，有力地推动了运动的发展。县委的七名常委今年年初到双王、贠曲、固市等公社蹲点时，就协助当地党组织深入地向干部、群众进行了党的基本路线教育。干部、群众经过学习认识到，阶级斗争是长期的。只有经常把对修正主义路线的批判抓得很紧，批得很深，大家的觉悟不断提高，今后在阶级斗争和路线斗争中才能立场正，方向明。群众的认识提高了，这些公社的批修整风运动就开展得越来越深入。这个县的其他单位也象这些公社那样，认真开展党的基本路线教育，把批修整风运动不断推向前进。"},{"type":"paragraph","text":"中共渭南县委在革命大批判中，注意引导群众紧紧抓住刘少奇一类骗子修正主义路线的极右实质，深入揭露，反复批判。贠曲公社北杨大队的干部、群众，在到那里蹲点的一名县委常委的帮助下，以马克思主义、列宁主义、毛泽东思想为武器，透过现象看本质，深入地剖析了刘少奇一类骗子搞修正主义，搞分裂，搞阴谋诡计，采取种种手法，反对我们党关于社会主义革命的理论和实践，改变党的基本路线，复辟资本主义的真面目。这样开展大批判的结果，干部、群众的社会主义积极性更加高涨，全大队出现了生动活泼的政治局面。全县有许多大队，都象北杨大队那样，注意抓住实质深入批修。今年四月，县委就在一次会上总结、推广了官底公社官底大队、双王公社双王大队等十三个单位抓住实质深入批修的经验，对全县的革命大批判起了推动作用。"},{"type":"paragraph","text":"中共渭南县委还引导干部、群众把革命大批判和看书学习紧密地结合起来，使对刘少奇一类骗子的大批判越来越深刻。各级党委成员带头挤时间攻读马列和毛主席的著作，县委成员下乡时，还为基层干部和社员群众进行学习辅导。各社、队采取办短期学习班、定期集中学习等办法，两年来共组织两万一千多名党员、干部和积极分子学习革命理论。同时，各大队、生产队普遍办起了政治夜校和革命文化室，组织群众读马列著作和毛主席著作，开展革命大批判。由于干部、群众通过看书学习，进一步掌握了马克思主义的立场、观点、方法，对刘少奇一类骗子批得深，许多批判会就成了生动的马克思主义教育课。南七公社吝村大队的社员群众认真学习毛主席的教导，用阶级分析的方法，深入分析了刘少奇一类骗子代表被打倒的反动阶级的利益，仇视社会主义制度，妄图复辟资本主义的实质，并且用新旧社会的对比和解放后二十多年来农村巨大变化的事实，痛斥了刘少奇一类骗子攻击社会主义制度的无耻谰言。通过学习和批判，大家进一步认识了“只有社会主义能够救中国”的真理。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"127651f9cc"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
