],"dates":[{"year":1958,"month":10,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　上海市三十多个大、中学校的部分历史教师，12日举行批判资产阶级史学观点的座谈会。这个座谈会是由“历史教学问题”编委会召集的。"},{"type":"paragraph","text":"与会的同志纷纷揭露、批判了历史教学和科学研究中所存在的资产阶级的反动史学观点。他们指出，资产阶级史学观点在教学中的表现，首先是夸大个人在历史中的作用，把帝王将相描绘得有声有色，津津有味；讲到劳动人民群众，特别是农民起义的领袖时，则干巴巴的使学生听了索然无味。其次是资产阶级的客观主义。有些人伪装站在历史公正人的超阶级立场上，天南地北什么都讲，什么都不加分析，从而掩饰阶级矛盾和阶级斗争。有些人由于没有真正站在无产阶级的立场上，没有无产阶级的思想感情，牛头不对马嘴地胡乱引证经典文献，以掩盖唯心史观。有些人则采取游戏历史的态度，把历史讲得天花乱坠，资产阶级的庸俗低级趣味的东西充满讲台。至于罗列现象，不揭露历史事件的本质，不加以概括总结的情况，则更为普遍。到会者还对以史料代替历史、否定历史发展的规律的现象进行了揭发。"},{"type":"paragraph","text":"座谈会揭露了资产阶级反动史学观点对历史教学和科学研究的危害非常严重。华东师大的教师说，只有将这些旧的资产阶级腐朽的东西扫清扫光，在大破的基础上才能大立。江浦中学的教师说，只有彻底批判资产阶级史学思想，搬掉这座阻碍我们前进的大山，才能使我们在史学的研究和教学中跃进再跃进。建设中学的教师表示，我们一定要在批判资产阶级个人主义思想胜利的基础上，乘胜追击，奋勇前进，不拔白旗誓不休。他们一到表示要把无产阶级的红旗插在历史教学和科学研究的阵地上。"},{"type":"paragraph","text":"(袁英光)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8ceb7b635b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
