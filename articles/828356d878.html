rt":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"兵民是胜利之本","authors":["陈文祥"],"parts":[{"type":"paragraph","text":"马克思主义认为：人民群众的解放应当是人民群众自己的事情，一切革命事业只有依靠人民群众自己的斗争才能成功。进行革命战争也是一样，只有相信和依靠人民群众，才能壮大革命力量，获得战争胜利。几十年来，我军从小到大，从弱到强，最根本的就是在伟大领袖毛主席和中国共产党的领导下，紧密地和人民团结在一起，相信群众，依靠群众，放手发动群众的结果。抗日战争时期，我们连曾在晋察翼边区一带活动，当时的武器只有一些火枪、土炮，生活条件也十分困难，但由于我们贯彻执行了毛主席的人民战争思想，坚定地依靠群众，和人民并肩作战，受到了人民的大力支援，克服了武器差、生活艰苦的不利条件，打了一个又一个的胜仗。连队被晋察冀军区授予“常胜支队”的光荣称号。纵观我国革命的战争史，从井冈山根据地的建立，到椰林深处的红色娘子军；从白洋淀上的雁翎队，到冀中平原的地道战，这一桩桩、一件件主力部队与游击队、民兵紧密配合作战，有力地打击敌人的历史事实，充分体现了人民战争的巨大威力，它是我们克敌制胜的法宝。"},{"type":"paragraph","text":"邓小平谈起打仗来，一口一个钢仗，一口一个飞机、原子弹，就是不把人民群众放在眼里，这充分地暴露了他的地主资产阶级的反动立场和唯心史观，同时也从反面教育了我们，要做好战争准备，一定要以阶级斗争为纲，认真落实毛主席关于人民战争的思想。任何敌人胆敢侵犯我们，就让他们陷入人民战争的汪洋大海之中，坚决，彻底、干净、全部消灭之。"}],"alias":""},"tags":[{"name":"人民战争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"828356d878"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
