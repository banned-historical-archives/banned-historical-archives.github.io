ates":[{"year":1984,"month":12,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　为解决一九六六年前函授、夜大学学生因“文革”而中断学习的学历问题，教育都于十二月十九日发出通知说:凡经教育部核准公布的一九六六年前高等学校举办的函授、夜大学名单的学校(含劳动人事部工资局转发的学校名单)，“文革”开始时，确实在籍在校的学生，学校已按有关规定补发了肄业证明或学历证明的学员，其学历可按下列原则办理:"},{"type":"paragraph","text":"一、原学制在四年以上的本科函授、夜大学学生，连续学习满四年(八个学期)以上，基本学完专业课，所学课程考试成绩合格者，可按六六届本科毕业对待，补发函授或夜大学本科毕业证书。"},{"type":"paragraph","text":"二、连续学习满两年(四个学期以上)学完六门基础课和专业基础课所学课程考试成绩合格者，可按六六届专科毕业对待，补发函授或夜大学专科毕业证书。"},{"type":"paragraph","text":"三、凡学习时间在一年以上不满二年者，只发肄业证明。"},{"type":"paragraph","text":"凡学校无档可查，学生本人无学生证和成绩单者，不得补发毕业证书或肄业证明。"},{"type":"paragraph","text":"毕业证书由举办函授、夜大学的高等学校按照上述规定负责补发。如原学校已经更改校名或合并的由改变名称或合并后的学校负责补发；原学校已经撤销停办的，按原学校隶属关系，由主管部门委托有关学校代为补发。"},{"type":"paragraph","text":"凡经教育部核准公布名单的一九六六年以前的职工业余大学，“文革”开始时，确实在籍在校的学生学历问题，可参照上述精神办理。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"73046a194d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
