script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji22","name":"毛泽东全集第22卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji22.pdf"],"article":{"title":"宜加紧补训不必急于打位","alias":"","parts":[{"type":"paragraph","text":"宜加紧补训不必急于打仗！"},{"type":"paragraph","text":"（1947年1月11日）陈、粟，谭、张："},{"type":"paragraph","text":"灰电悉。沐阳失守无关大局，且有利于引敌北上作战。但目前谭张所部似宜加紧补训，不必急于打仗，待峰枣战役结束（部队亦需短期休整），欧震等部超过沐阳、东海之线向北，那时可以考虑集中最大兵力歼灭欧震集团。究应如何，请按实情酌定。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"子真"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军委起草的给山东野战军司令员兼政治委员陈毅、华中野战军司令员粟裕、政治委员谭震林和华中军区副参谋长张元寿的电报。"},{"type":"paragraph","text":"[2]1947年1月，山东野战军和华中野战军在歼灭国民党军整编第二十六师大部和第－快速纵队后，乘胜攻击山东峄县（今峄城）、枣庄之整编第五十一师及第二十六师残部。11日攻克峄县，20日攻克枣庄。"}],"authors":["毛泽东"],"dates":[{"year":1947,"month":1,"day":11}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":362,"page_end":362},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"58b5bdaaa8"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
