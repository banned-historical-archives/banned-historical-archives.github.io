script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"173b340b-3108-4ae1-be57-d3fa78bb471a","name":"毛泽东思想万岁（1943-1949卷）（1968年武汉版）","internal":true,"official":false,"type":"pdf","author":"1968年5月，钢二司武汉大学总部、中南民院革委会宣传部、武汉师院革委会宣传部","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives3/main/173b340b-3108-4ae1-be57-d3fa78bb471a.pdf"],"article":{"title":"编者附言","alias":"","parts":[{"type":"paragraph","text":"争取民主自由的运动则将要得到比一九四六年更重要的胜利，其结果将是中国的情况发生变化，有利于和平的恢复与国家的独立。"},{"type":"paragraph","text":"我们共产党人在抗日战争期间就力求战后各党派的合作，但是同时提出了警告：“国民党主要治集团，现在正在所霸召开国民大会及‘政治解决”的烟幕之下，偷偷摸摸的进行其内战的准备工作，如果国人不加注意，不去揭露它的阴课，阻止它的准备，那么，会有一个早上，要听到内战的炮声的。”在抗日战争胜利以后，我们和全国人民在一起，会经作了极大的忍耐和努力来阻止内战的发生和扩大，不幸这个努力是被反动派的全面进攻和国民党一党的“国大”所破坏了。但是中国人民仍在通过两种努力来继续争取和平。即解放区各阶层人民粉碎反动派进攻的艰苦卓的奋斗，和国民党统治区各阶层人民争取民主自由的日见高涨的群众运动。中国人民的这个联合意志将要确定地压倒任何反动分子的意志，从而使各党派间诚意的和平判和全国范围内眞实的和平生活成为可能。现在国民党当局还没有表示任何起码的和平意图，他们在美国政府指使下，正在忙于以分裂的“国大”和独裁的“宪法”来装饰自已，以便使他们的战争和美国的援助“合法”化。但是只要全国人民团一致，坚持不屈不挠的奋斗，那末，在不久的将来，自由的阳光一定要照遍组国的大地，独立、和平、民主的新中国一定要在今后数年内奠定稳固的基础。无产阶级文化大革命的伟大历史意义及其深刻的阶级内容"},{"type":"paragraph","text":"无产阶级文化大革命，实质上是在社会主义条件下，无产阶级反对资产阶级和一切刹削阶级的政治大革命，是中国共产党及其导下的广大革命人民群众和国民党反动派长期斗争的继续，是无产阶级和资产阶级阶级斗争的继续。"},{"type":"paragraph","text":"摘自68年4月10日《人民日报》《解放军报》祝贺湖南省革委成立社《芙蓉国里尽朝》※标题是霜者加的。"},{"type":"paragraph","text":"X"},{"type":"paragraph","text":"XX"},{"type":"paragraph","text":"·编者附言"},{"type":"paragraph","text":"“大海航行靠魁手，干草命靠毛泽东思想。”我们怀着对伟大领袖毛主席和光绍无际的毛泽东思想无限热爱，无限崇拜，无限信仰，无限忠诚的心情，编印了《毛泽东思想万岁》。编入本书的是毛主席解放前发表过而未收入《毛泽东选集》的著作，基本上按其发表时间的顺序编印。"},{"type":"paragraph","text":"由于我们政治水平有限，加之缺乏经，在编排、校对工作中的缺点、错误在所难免：请同志们批评指正。"},{"type":"paragraph","text":"由于时间关系，“堪表”也来不及与同志们见面了，同志们在学习过程中若发现了错之处，请自行更正。在此我们表示歙意。"},{"type":"paragraph","text":"由于校对忽疏，第231页上《在中国共产党第六屈中央委员会扩大的第六次会上讲话》《摘要）未编入“目录”。"},{"type":"paragraph","text":"本书仅供校内革命同志学习，希望妥善保存，严禁外傅、引用。"},{"type":"paragraph","text":"敬祝毛主席万寿无疆！万寿无疆！！"},{"type":"paragraph","text":"钢二司武汉大学总部编者中南民院革委会宣传部"},{"type":"paragraph","text":"武汉师院革委会宣传部"},{"type":"paragraph","text":"一九六八年五月"}],"authors":[],"dates":[{"year":1968,"month":5}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":281,"page_end":281},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1d38a27c01"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
