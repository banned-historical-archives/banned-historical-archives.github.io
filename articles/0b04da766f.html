鸣的方针","authors":["新华社"],"dates":[{"year":1956,"month":12,"day":1}],"is_range_date":false,"parts":[{"text":"文学期刊编辑工作会议　要求认真贯彻百花齐放，百家争鸣的方针","type":"title"},{"text":"新华社","type":"authors"},{"text":"据新华社讯１２月１日在北京结束的文学期刊编辑工作会议强调文学刊物要扫除障碍，大胆地鸣（“百家争鸣”）、大胆地放（“百花齐放”），促使文艺创作欣欣向荣。","type":"paragraph"},{"text":"编辑们在会上畅所欲言，一致认为要真正贯彻实行“百花齐放，百家争鸣”的方针，必须大胆放手：敢于在刊物上发表各种不同的见解，开展自由论争；发表多种多样形式的作品，并且促使各种文艺形式得以发展；敢于干预生活，发表批评现实生活中的缺点的作品。","type":"paragraph"},{"text":"会议认为要办好一个刊物，必须要求每个刊物各自有着鲜明的主张；鲜明的民族风格和地方色采。","type":"paragraph"},{"text":"会议还强调要重视发扬兄弟民族文学艺术的传统，相互介绍各民族的文学，并促使它提高。","type":"paragraph"},{"text":"会议认为，每个刊物的举办和它的篇幅的大、小，应当根据读者的需要、作者和编辑人员的条件而定，反对贪多求大的倾向。某些出版刊物过多的地区可以酌量合并。","type":"paragraph"},{"text":"会议提出每个刊物都要有一个团结的有创造性的编辑部。这个编辑部要充满着学术上的自由论辩的空气和严肃的工作作风。编辑人员要和人民群众保持密切的联系，要给他们深入生活和写作的时间。","type":"paragraph"},{"text":"会议提出了几项新的措施。从１９５７年１月起，全国各个文学期刊一律取消机关刊物的名义。文艺团体对所属刊物只作原则方针上的领导，不干涉其日常编辑工作。全国各个刊物之间没有指导或领导关系，彼此都可以相互批评。","type":"paragraph"},{"text":" ---- 原载《人民日报》1956年12月4日","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0b04da766f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
