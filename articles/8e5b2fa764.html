],"dates":[{"year":1980,"month":10,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"陈爱武受到中央表扬后激动地说："},{"type":"paragraph","text":"揭发不正之风是出于对党的爱护"},{"type":"paragraph","text":"本报讯  《北京晚报》报道：10月16日晚上，记者到丰泽园饭庄访问了勇敢揭发商业部长王磊搞特殊化的陈爱武同志。这位全国劳动模范、青年厨师对记者说：“我向中央投书写信，揭发不正之风，完全是出于对党的爱护”。"},{"type":"paragraph","text":"他说：“实际上，上级‘吃客饭’的问题，不是今天才有，也不是就我们一家。大家对这些早就有议论，我们饭庄的青年就说：‘咱们辛辛苦苦干一天义务早点（青年义务加早班），还不够他一顿饭钱。’‘咱们干四化，他们吃四化。’听到这些议论，我感到很痛心。作为一个劳动模范，一个团支部书记，我有责任向党反映情况，只有这样，才是对党的爱护。”"},{"type":"paragraph","text":"陈爱武受到中央的表扬以后，十分激动。他认为，党中央支持群众纠正不正之风，有利于恢复党的优良传统，使广大群众更加坚定了对党的热爱，增强了干四化的信心。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8e5b2fa764"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
