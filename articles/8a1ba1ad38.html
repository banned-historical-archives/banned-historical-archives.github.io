ors":["山西师范学院","罗元贞"],"dates":[{"year":1957,"month":5}],"is_range_date":false,"parts":[{"text":"右派言论——“师院肃反全院变成监狱”","type":"title"},{"text":"山西师范学院罗元贞","type":"authors"},{"text":"（罗元贞：山西师范学院教授、九三学社社员）","type":"subtitle"},{"text":"“中央高级干部眼光太钝，狐疑过甚，损伤积极因素。社会主义必须由中共来领导，可惜负此重任的中共中央及省委的高级干部不少是目光如豆，狐疑似海。”","type":"paragraph"},{"text":"“×××来师院主持肃反，全院变成监狱，恐怖空气逐日高涨，老师、学生、工友纷纷自杀，有的自杀二、三次幸而未遂。屡次在大会上逮捕教师职员学生多人，他们被捕之后，很多人被禁一室之内，公安厅只有坐处没有卧处，严重至每日吃不饱饿的慌。另一方面则每日上下午甚至于夜间各小组在×××领导监督下，对党领导指定之人用各种手段逼供（恐吓、辱骂、殴打、哄诈等等）……完全证明了×××两眼昏花，满脑狐疑，滥用权力，祸害人民，破坏法刑（宪法）损害党国。”","type":"paragraph"}],"comments":[],"origin":"《“鸣”、“放”选集（二）》（中共山西省委整风办公室编，1957年9月）。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8a1ba1ad38"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
