" crossorigin="">{"props":{"pageProps":{"books":[{"id":"5a6e14f4-1103-48c3-bd99-37613918dd4b","name":"中共党史教学参考资料 第25册 “文化大革命”参考资料 上册（1988年）","internal":true,"official":true,"type":"pdf","author":"","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives3/main/5a6e14f4-1103-48c3-bd99-37613918dd4b.pdf"],"article":{"title":"中央军委关于集中力量执行支左、支农、支工、管、军训任务的决定","alias":"","parts":[{"type":"paragraph","text":"四、应该返回遗送地的人员，必须立即离京，违者由革命群众组织和公安机关强制遣送。无理取闹和有破坏活动的，根据情节依法处理。"},{"type":"paragraph","text":"五、凡遗送到本市各县的，当地基层干部和革命群众应当顾全大局，做好遣送回乡人员的安置工作，不要让他们返回市区。"},{"type":"paragraph","text":"中共中央关于停止全国大串连的通知"},{"type":"paragraph","text":"（一九六七年三月十九日）"},{"type":"paragraph","text":"日前，各地区、各学校、各机关、各企业事业单位、正在集中力量，实现无产阶级革命派大联合，建立革命的“三结合\"的临时权力机构。同时，在外地、外单位串连的学生和群众，刚刚返回本地、本单位，斗、批、改的任务很繁重。因此、中央决定：继续停止全国大串连，取消原定的今年春暖后进行大串连的计划。希望各级领导向学生和群众妥为解释。"},{"type":"paragraph","text":"这个通知可在城市、农村和部队中张贴。"},{"type":"paragraph","text":"中央军委关于集中力量执行支左支农、支工、军管、军训任务的决定"},{"type":"paragraph","text":"（一九六七年三月十九日）"},{"type":"paragraph","text":"为了适应无产阶级文化大革命新阶段形势的需要，集中力量完成毛主席赋予军队的支左、支农、支工、军管、军训等项重大任务，军委决定："},{"type":"paragraph","text":"一、军委各总部、各军兵种机关的“四大”、一般在三月底左右暂告一段落。除了照顾战备、援外和必需的工作外，视情况抽调三分之\"，二分之一，甚至三分之二的人员，立即投人支左、支农、支工、军管、军训的工作。这些单位究能抽调多少人员、何时开始、由各总部、军兵种党委讨论决定。"},{"type":"paragraph","text":"二、各院校、文艺团体、体工队（包括各军区所属的这些单位），可在整风告一段落后、立即全部投人上述工作，作为这些单位文化大革命的一个重要步骤。这样做，既可以增加支左、支农、支工、军管、军训的力量，又可以使这些单位的人员，更好地同工农群众相结合，向工农群众学习，促进思想革命化。这些单位的整风何时结束，能抽调多少人员，何时开始，由各总部、军兵种、大军区党委讨论决定。"},{"type":"paragraph","text":"三、各总部、军兵种（包括在北京的所属院校)抽调的人员，由总政治部统一分配、使用。驻各军区所在地区的院校抽调的人员，统一由各大军区、省军区领导、调配和使用。"}],"authors":[],"dates":[{"year":1967,"month":3,"day":19}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":376,"page_end":376},"tags":[{"name":"文艺战线","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"name":"军队支左","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0f55bb99bd"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
