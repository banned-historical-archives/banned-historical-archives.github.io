thors":[],"dates":[{"year":1975,"month":9,"day":30}],"is_range_date":false,"parts":[{"text":"国务院关于调整国务院直属机构的通知（概要）","type":"title"},{"text":"1975年9月30日， 国务院发出《关于调整国务院直属机构的通知》。《通知》指出，一、保留民航总局（由空军代管）、国家海洋局（由海军代管）、国家测绘总局（由国家建委代管）、中央气象局（由农林部代管）、国家地震局、国家标准计量局（由中国科学院代管）、国务院机关事务管理局、国务院参事室（由国务院办公室代管）、中国文字改革委员会（由教育部代管）、国家文物事业管理局。二、增设国家地质总局、国家物资总局、国家劳动总局（由国家计委代管）、国家建筑材料总局（由国家建委代管）、国家出版事业管理局。三、撤销国务院宗教事务局。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a201ada238"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
