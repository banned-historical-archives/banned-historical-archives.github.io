uthors":["张兆生"],"dates":[{"year":1982,"month":11,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"福建、广东落实华侨房产政策工作会议提出"},{"type":"paragraph","text":"年底全部退还“文革”中被占华侨房产"},{"type":"paragraph","text":"本报讯　张兆生报道：福建省人民政府和广东省侨务办公室最近分别召开了落实华侨房产政策工作会议。两省会议总结交流了落实华侨房产政策工作的经验，要求在今年内全部退还“文革”中被占华侨私房，并制定了完成这项任务的具体措施。"},{"type":"paragraph","text":"两省的会议指出，近年来两省落实华侨房产政策工作取得了显著成绩。广东省十年内乱中被挤占、没收的34万平方米华侨私房，已退还79％，被接管的华侨出租房216万平方米，已有71.8％退还业主。福建省据福州、厦门、漳州、泉州四市统计，已退还被挤占房屋面积的85.9％。"},{"type":"paragraph","text":"福建省的会议决定，今年内全部退还“文革”中被占的华侨私房。各有关部门要加强对占住户的思想动员工作，对那些无理拒迁者，应采取有力措施，必要时给予党纪、政纪处分；是领导干部的要从严处理。法院应积极受理业主的申诉，按照法律进行处理。广东省的会议为落实省委和省人民政府关于力争今年内全部退还“文革”中被占华侨私房的指示，向各地侨办提出三项要求：一、制定落实华侨房产政策的切实有效的具体措施；二、对拒不退还挤占侨房的单位，要追究其单位领导的责任；三、要组织力量检查省拨落实华侨房产政策补助款的使用情况。"},{"type":"paragraph","text":"目前，福建、广东两省正在抓紧落实会议精神。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"福建文革","type":"人物"},{"name":"广东文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cc66e98df8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
