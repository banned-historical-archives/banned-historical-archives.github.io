","dates":[{"year":1980,"month":8,"day":28}],"is_range_date":false,"authors":["中共中央宣传部"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"中共中央宣传部, 宣传动态: 1980(选编), 250-251","tags":[{"name":"生产","type":"主题/事件"},{"name":"冤假错案","type":"主题/事件"}],"parts":[{"type":"title","text":"不要开“比富大会”"},{"type":"paragraph","text":"发动、组织生产队、社员抓富，这是一件大事。在林彪、“四人帮”的极左路线的长期影响下，很多人是富裕为畏途，至今思想顾虑很多。我们要从实际出发，分别不同情况，做耐心细致的说服教育工作。更重要的是要拿出具体的方针政策，规定致富的方向、道路和方法。自然也要有实实在在的典型事例去示范。有关的领导机关，要把精力放到这些方面去，不要开什么“致富大会”、“比富大会”。这种一呼隆的大会，不可能深入解决复杂的思想问题，而且容易造成不必要的压力，助长不实事求是的作风。动辄就开大会，敲锣打鼓，发号召，呼口号，这是我们多年形成的一种习惯。在经济建设中，不应该盲目搬用搞政治运动的办法，而是要提倡扎扎实实做工作，认真思考，分析问题，总结具体经验，一把钥匙开一把锁。"},{"type":"subtitle","text":"(第36期，8月28日）"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b8357254e7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
