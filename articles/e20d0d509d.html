hors":["毛泽东"],"dates":[{"year":1960,"month":7,"day":18}],"is_range_date":false,"parts":[{"text":"在北戴河会议上的讲话（节录）","type":"title"},{"text":"毛泽东","type":"authors"},{"text":"一九一七年到一九四五年，苏联是自力更生，一个国家建设社会主义，这是列宁主义的道路，我们也要走这个道路。","type":"paragraph"},{"text":"苏联人民过去十年中在建设上曾经给了我们援助，我们不要忘记这一条。","type":"paragraph"},{"text":"要下定决心，搞尖端技术。赫鲁晓夫不给我们尖端技术。极好！如果给了。这个账是很难还的。","type":"paragraph"},{"text":"×××","type":"paragraph"},{"text":"农村以生产队为基本核算单位的三级所有制，至少五年不变，死死的规定下来．搞一个“机械论”，再不要讲三年五年从队基本所有制过渡到社基本所有制。不这样，基层干部和广大农民群众都不满意，满意的只是社干部。在集体所有制占优势的前提下，要有部分的个人所有制，总要给每个社员留点自留地，多少一定要给他们一点，使社员能够种菜、喂猪喂鸡喂鸭。这个问题是同生产队干部作斗争的问题，要下个狠心解决。只有大集体没有小自由，不行。人家没有不同意见，回去就照着这个意见作，不要忘记，不要面从心违。在自留地问题上中央批转贵州食堂问题的指示。有毛病。要改过来。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e20d0d509d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
