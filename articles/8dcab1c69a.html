":[{"year":1955,"month":2,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"中华人民共和国毛泽东主席授予康藏、青藏两条公路筑路人员锦旗，授旗典礼大会二日上午在拉萨布达拉宫前人民广场上隆重举行。锦旗上是毛主席为康藏、青藏两公路通车的题词:‘庆贺康藏、青藏两公路的通车，巩固各民族人民的团结，建设祖国!’"},{"type":"paragraph","text":"西藏军区司令员张国华将军代表毛主席授锦旗。康藏公路修建司令部司令员陈明义代表全体筑路人员接受了锦旗。这时乐队齐奏，全场鼓掌欢呼:‘感谢伟大领袖毛主席的关怀!’‘祝毛主席身体健康!’【据新华社讯　】"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8dcab1c69a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
