hors":[],"dates":[{"year":1952,"month":1,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社朝鲜前线二日电】　中国人民志愿军前线多连队和人民功臣，纷纷写信给毛主席和著名的劳动模范马恒昌、郝建秀、李顺达祝贺新年。"},{"type":"paragraph","text":"在许多给毛主席的贺年信中，志愿军指挥员战斗员们表示了对伟大领袖的无比的热爱和崇敬。某部第九连第一排全体战士的信中写道:“敬爱的毛主席!你领导祖国人民把我们的国家建设得一天比一天地富强起来。我们为已经有了自己伟大的领袖和这样的祖国而感到无比的光荣和骄傲。我们决遵照祖国人民的意志，把抗美援朝的正义斗争继续进行到美国政府愿意和平解决的时候为止。”立了特等功的某部第八连连长焦文升在信中说:“我在入朝以前就曾宣誓过:‘为毛主席争光，为祖国争光!’在入朝后，我和战友们一直在这种力量的鼓舞下战斗着。我们遇到过许多困难，可是我们只要一想到敬爱的毛主席，我们就增加了克服困难战胜敌人的无限力量。在雨季的一个漆黑的夜里，大雨滂沱，我们正在行军。因为背了很重的东西，许多同志的肩背都磨破了，脚和腿也肿起来，大家疲乏已极。这时，有人唱起了‘东方红，太阳升，中国出了个毛泽东……’大家突然一齐跟着唱起来了。一种伟大的力量鼓舞着我们大踏步地前进，我们终于按时到达了目的地，投入了胜利的战斗。大家说，我们都是毛主席教养出来的新中国青年，一定要做个毛泽东的好战士。”"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"09eb4268e1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
