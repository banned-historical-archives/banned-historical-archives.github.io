" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"“农民生活苦的不得了”","authors":["北京地质勘探学院","唐都","洪祖猷","蔡荣荣","袁传识"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"“农民生活苦的不得了”","type":"title"},{"text":"北京地质勘探学院唐都洪祖猷蔡荣荣袁传识","type":"authors"},{"text":"唐都同意右派分子葛佩琦所谓统购统销搞糟了，并说可以举例来证明。他对右派分子马万钧所谓主要矛盾在农村，也同意的说：","type":"paragraph"},{"text":"「实际上农民生活苦的不得了。」","type":"paragraph"},{"text":"「统购统销给农民留的粮食太少了，都不够吃，只好吃稀的。」","type":"paragraph"},{"text":"洪祖猷说：","type":"paragraph"},{"text":"「统购统销政策是对的，但下面搞糟了，我回家见到排队买不到肉，机关团体优先权……。」","type":"paragraph"},{"text":"蔡荣荣说：","type":"paragraph"},{"text":"「粮食统购统销做得不好，农民吃不饱，而五六年全国粮食没有减产，为什么不让农民吃饭呢？工农生活悬殊太大了。」","type":"paragraph"},{"text":"「制定正确的粮食政策是必要的，但是政策的执行中，有些情况掩盖了措施的正确性，使国家遭到损失，政策执行初期，规定每人每月限定购粮十三斤，这种政策是必要的，也是完全失败的。","type":"paragraph"},{"text":"为什么说是失败的呢？第一，降低了农民对党的热爱，使党的威信下降，因为粮食是人民生活所绝对必须的，每人每月十三斤粮食，不足以维持最低生活限度，人民不满是自然而然的。第二，影响了五五年的统购工作，造成混乱。第三，在某种程度上扰乱了市场。可以看出统购统销初期的损失比收获来得大。」","type":"paragraph"},{"text":"袁传识说：","type":"paragraph"},{"text":"「工农生活悬殊，贫农生活变化不多，特别是江南。」","type":"paragraph"},{"text":"袁传识说统购统销农民买不到粮食，饿死了他家的八百只鸭子。","type":"paragraph"}],"comments":[],"origin":"北京地质勘探学院党委会宣传部编《社会主义教育参考资料第二编：右派言论汇编》，1957年10月5日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dae658b9a9"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
