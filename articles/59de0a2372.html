<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"反对肃反运动的右派言论 (二)","authors":["丁宝泉","李华峰","李森彬","河南医学院","田家福","田琴鹤","郭木轩","靳福全","马伊","高元勋"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"反对肃反运动的右派言论 （二）","type":"title"},{"text":"河南医学院马伊丁宝泉李森彬郭木轩田琴鹤田家福高元勋靳福全李华峰","type":"authors"},{"text":"肃反是连国民党作风也不如，是希特勒作风，是官方宗派造成的。(马伊，教务科干事)","type":"paragraph"},{"text":"肃反中我又是重点，因为张育明被捕了，我们内科没人了，毫无根据的斗了我。(丁宝泉，内科教研组副教授、民盟盟员)","type":"paragraph"},{"text":"所谓积极分子，也是肃反中打虎的人们，你们扪心自问，回想打你们同学，是谁把任务交给你们，你惭愧不？(丁宝泉)","type":"paragraph"},{"text":"在肃反中由于官僚主义所造成的违法乱纪，没有人道主义。他(她)们由于受了冤屈无人知，内心有苦无处诉，已经丧失了青春的容貌，已经失去了做人的尊严，他们企图走最后一条路——死去，难道这是解放了的中国所应有的吗？河南医学院的黑暗是多么可怕啊！(李森彬)","type":"paragraph"},{"text":"在肃反中打的狠打的好的这样的人就能入党，当时空气的压力不这样是不行的，有良心的人不打就被撤职，被压制，从党总支到下面一直是这样贯彻下来。(郭木轩，25期学生)","type":"paragraph"},{"text":"肃反中斗我的都是反革命。(田琴鹤，医院工友)","type":"paragraph"},{"text":"我们到处听到冤声，听到受害者的呼声，也看到了不少青年失去了前进的心，不少的青年白白断送了生命。学生中除了几个党员之外，几乎草木皆敌，在肃反中你发言多了是可疑，不发言又是沉默，你高兴认为是不严肃，你愁眉苦脸认为是不积极，弄得领导上说啥你说啥，那怕黑的也得说成是白的。(田家福，23期学生)","type":"paragraph"},{"text":"要求肃反中所写的材料和伪造的东西，一律当众焚烧，决不能有一点东西写在材料袋里。(田家福)","type":"paragraph"},{"text":"我在肃反中干了一些昧着良心的事，肃反后使同学们不敢说一句真心话，肃反中打人是领导上暗示的。肃反中斗争的材料是假的，凡思想落后的都大胆怀疑。(高元勋，22期学生、党员)","type":"paragraph"},{"text":"三反肃反在我院有偏差，很多人鸣不平，它伤了知识分子的心。运动过后，不是情绪积极，而是“抑郁终日忍气吞声”。(靳福全)","type":"paragraph"},{"text":"肃反积极分子是张廷辅的狗腿子。(李华峰，25期学生)","type":"paragraph"}],"comments":[],"origin":"《右派言论集》（河南医学院马列主义教研室编印，1958年4月）。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"59de0a2372"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
