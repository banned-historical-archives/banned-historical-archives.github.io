tart":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"法共中央代表团瞻仰毛主席遗容","authors":[],"parts":[{"type":"paragraph","text":"新华社10月16日讯 法共总书记乔治·马歇和由他率领的法共中央代表团今天上午前往毛主席纪念堂，瞻仰了毛泽东主席遗容。"},{"type":"paragraph","text":"马歇和夫人等由中联部副部长钱李仁陪同，在毛主席的坐像和遗体前肃立默哀。"},{"type":"paragraph","text":"在纪念堂南侧的广场上，马歇回答了法国记者提出的一些问题。他说，毛泽东主席为革命事业作出了巨大的贡献，他不仅在中国，而且在国际上都是一位伟大的革命家。中国共产党对毛泽东主席所从事的活动作出了正确的评价。"},{"type":"paragraph","text":"马歇说，中法两党本着向前看的精神进行了真正的对话，他感到十分满意。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6f75db4c5f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
