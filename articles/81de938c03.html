art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"创造优异成绩，向毛主席汇报","authors":["廖润甜"],"parts":[{"type":"paragraph","text":"今天，我看到了日夜想念的毛主席，心里乐开了花，浑身充满了力量。见到我们伟大领袖精神奕奕，身体健康，这是我们六亿五千万中国人民的最大幸福，我高兴极了。毛主席亲临检阅我们的体育队伍，这是党和国家对我们的最大关怀和鼓舞。当时，我一边走一边想，我们国家欣欣向荣，一片大好形势，我国的体育事业蓬勃发展，一日千里，这全仗着党和毛主席的英明领导！毛主席，我们运动员从您那里汲取了千军万马的力量。"},{"type":"paragraph","text":"我作为一个解放军的运动员，决不辜负毛主席的教导和期望，一定要努力学好毛主席著作，要在毛泽东思想指导下，心怀祖国，放眼世界，高度发挥技术水平，创造优异成绩，向党、向毛主席汇报，为祖国增光！"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"81de938c03"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
