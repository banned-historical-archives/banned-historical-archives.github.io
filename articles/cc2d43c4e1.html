art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席的好学生；焦裕禄同志的话","authors":[],"parts":[{"type":"paragraph","text":"兰考是灾区，穷，困难多，但灾区有个好处，它能锻炼人的革命意志，培养人的革命品格。革命者要在困难面前逞英雄。"},{"type":"paragraph","text":"没有抗灾的干部，就没有抗灾的群众。"},{"type":"paragraph","text":"我们对兰考的一草一木都有深厚的感情。面对着当前严重的自然灾害，我们有革命的胆略，坚决领导全县人民，苦战三五年，改变兰考的面貌。不达目的，我们死不瞑目。"},{"type":"paragraph","text":"兰考这块地方，是同志们用鲜血换来的。先烈们并没有因为兰考人穷灾大，就把它让给敌人，难道我们就不能在这里战胜灾害？"},{"type":"paragraph","text":"吃别人嚼过的馍没味道。"},{"type":"paragraph","text":"榜样的力量是无穷的，我们应该把群众中这些可贵的东西，集中起来，再坚持下去，号召全县社队向他们学习。"},{"type":"paragraph","text":"共产党员应该在群众最困难的时候，出现在群众的面前，在群众最需要帮助的时候，去关心群众，帮助群众。"},{"type":"paragraph","text":"县委书记要善于当“班长”，要把县委这个“班”带好，必须使这“一班人”思想齐、动作齐。而要统一思想、统一行动，就必须用毛泽东思想挂帅。"},{"type":"paragraph","text":"当一个不坚强的战士，当一个忘了群众利益的共产党员，多危险，多可耻呵！先烈们为解放兰考这块地方，能付出鲜血、生命；难道我们就不能建设好这个地方？难道我们能在自然灾害面前当怕死鬼？当逃兵？"},{"type":"paragraph","text":"灾区面貌没有改变，还大量吃着国家的统销粮，群众生活很困难。富丽堂皇的事，不但不能做，就是连想也很危险。"},{"type":"paragraph","text":"我死后只有一个要求，要求组织上把我运回兰考，埋在沙堆上，活着我没有治好沙丘，死了也要看着你们把沙丘治好！"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cc2d43c4e1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
