art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"永远生活在毛主席身边","authors":["李承有/李深德"],"parts":[{"type":"paragraph","text":"在甘肃永靖县小沟湾大队俱乐部正中央的墙上，挂着一幅金光闪闪的毛主席彩色绣像，下边是“军民团结如一人，试看天下谁能敌”十四个金光闪闪的大字。这是某部毛泽东思想宣传组的同志和贫农社员韩玉莲老大娘共同精心绣出来，特意献给生产大队毛泽东思想学习班的。"},{"type":"paragraph","text":"韩大娘是个饱尝旧社会辛酸的老人，她恨透了旧社会。在毛泽东思想学习班里，她经常向宣传组的同志和社员们讲述她在旧社会的苦难经历。在旧社会，是万恶的国民党和地主恶霸逼得她家破人亡；是毛主席领导解放军，把她从苦海里救了出来。宣传组的同志讲毛主席的丰功伟绩，韩大娘越听，对毛主席的无产阶级感情越深。她说：毛主席是劳动人民的救命恩人，我们贫下中农一刻也不能离开毛主席。于是，她提议和解放军一起绣一幅毛主席彩像，挂在毛泽东思想学习班里，让大家永远生活在毛主席身边，永远听毛主席的话，照毛主席的指示办事。"},{"type":"paragraph","text":"韩大娘和宣传组的同志们怀着对伟大领袖毛主席无限崇敬的心情，利用学习班上课前和下课后的时间，一边畅谈毛主席的英明伟大，一边精心地绣制毛主席像。为了让大家早点看到毛主席像，他们连夜赶绣。有时工作得很晚很晚了，他们就背诵毛主席语录“下定决心，不怕牺牲，排除万难，去争取胜利”来激励自己。他们越绣越感到毛主席亲，越绣越感到军民友情深。"},{"type":"paragraph","text":"经过五天的辛勤劳动，我们心中最红最红的红太阳毛主席的彩像绣成了。他们把这幅绣像恭恭敬敬地挂在学习班的学习室正中央。在红太阳的光辉照耀下，大家在学习班上狠斗“私”字，猛批中国赫鲁晓夫。军民团结得更紧了，他们心往一处想，劲往一处使，一起抓革命、促生产，决心在毛主席指引的航道上共同为革命立新功。 （李承有、李深德）"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1da571e6de"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
