rt":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席接见阿尤布·汗总统刘主席周总理同阿尤布·汗总统继续会谈","authors":["杜修贤"],"parts":[{"type":"paragraph","text":"新华社四日讯 毛泽东主席今天下午接见巴基斯坦伊斯兰共和国总统穆罕默德·阿尤布·汗元帅，同他进行了亲切友好的谈话。"},{"type":"paragraph","text":"同时被接见的巴基斯坦贵宾，还有阿尤布·汗总统的女儿奥兰泽布夫人，外交部长佐·阿·布托和夫人，国民议会议员奥兰泽布王子，政府安全印刷公司主席、前东巴省督古拉姆·法鲁克，总统科学顾问阿卜达斯·萨拉姆教授，西巴水电发展局主席古拉姆·伊沙克·汗，东巴省议员努鲁丁·马茂德等。"},{"type":"paragraph","text":"接见时在场的有：刘少奇主席，周恩来总理，陈毅副总理和夫人张茜，外交部副部长韩念龙、礼宾司代司长葛步海、第一亚洲司副司长杨公素。"},{"type":"paragraph","text":"巴基斯坦驻中国大使罗查和夫人，中国驻巴基斯坦大使了国钰和夫人也在场。"},{"type":"paragraph","text":"接见以后，毛主席设宴招待阿尤布·汗总统。"},{"type":"paragraph","text":"新华社四日讯 刘少奇主席和周恩来总理同巴基斯坦伊斯兰共和国总统穆罕默德·阿尤布·汗元帅，今天下午在友好的气氛中继续举行会谈。"},{"type":"paragraph","text":"三月四日，毛泽东主席接见了巴基斯坦伊斯兰共和国总统穆罕默德·阿尤布·汗元帅和随同来访的巴基斯坦贵宾。图为毛泽东主席和穆罕默德·阿尤布·汗总统亲切握手。             新华社记者   杜修贤摄RW：毛泽东；接见"}],"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2ca7a87a23"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
