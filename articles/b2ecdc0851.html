tart":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"共产党员要做到关心他人比关心自己为重","authors":["学习毛主席著作积极分子/战士叶乃洪"],"parts":[{"type":"paragraph","text":"毛主席教导我们：“要奋斗就会有牺牲”。对于共产党员来说，要在全世界实现共产主义，就必须随时准备付出自己的鲜血和生命。但是，中国赫鲁晓夫却公然贩卖活命哲学，明目张胆地要共产党员“钟爱自己，保护自己的生命与健康”。这是地地道道的反革命修正主义谬论，是背叛无产阶级事业的无耻谰言。"},{"type":"paragraph","text":"在革命事业的需要面前，是“钟爱自己，保护自己的生命与健康”，还是英勇战斗，不惜献出自己的鲜血和生命，这是判别一个人是真革命还是假革命，是真共产党员还是假共产党员的试金石。一九六七年五月，我们连在某地进行隧道施工。有一次进行爆破，四十炮刚点到二十七炮，突然预计需要七分钟才爆炸的第一炮，只一分钟就意外地爆炸了。我被飞来的乱石冲倒了。当我从昏迷中醒来时，立刻意识到再有四、五分钟，剩下的二十六炮就将全部爆炸。自己的生命正受到严重威胁。在这关键时刻，我想起了毛主席的“关心他人比关心自己为重”的伟大教导，王杰、刘英俊、蔡永祥等英雄形象顿时出现在面前。我决心：任凭天崩地裂，也要把战友抢救出去。当时我头部负伤，头晕眼花，四肢无力。但毛主席的“这个军队具有一往无前的精神，它要压倒一切敌人，而决不被敌人所屈服”的教导，给我增添了无穷无尽的力量。我克制着伤疼头晕，歪歪斜斜地摸到洞里。排长李荣旭受了重伤，我用尽平生力气，把他背起来就向外冲。我每走一步，都要引起伤口剧烈的疼痛。我一边往外走，一边高呼：“下定决心，不怕牺牲，排除万难，去争取胜利。”终于把李荣旭背到了安全地点。"},{"type":"paragraph","text":"这时，离其它炮全部爆炸顶多还有两分钟，再回去就有危险。但我又想起毛主席关于“为人民利益而死，就比泰山还重”的教导，又毫不迟疑地高喊着“下定决心，不怕牺牲……”，冲向爆破点，和刚从昏迷中苏醒过来的新战士覃宝昌、覃向新一起，抢救被乱石埋住半截身的战友王秀臣。王秀臣醒来时，高喊：“你们快跑，不要管我！”可我们谁也没想到自己的安危，用尽全身力气，把大石搬开，抬起王秀臣就往外冲。刚离开危险区，只听得身后群炮齐鸣，乱石飞啸，而我们却安全脱险了。"},{"type":"paragraph","text":"这次抢救战友，对我是一次严峻的考验。从这里我进一步体会到，只有树立了一心为公的共产主义世界观，才能什么都不怕，才能勇于为革命冲锋陷阵，为共产主义事业奋斗终生，才能象毛主席所教导的那样，把“为人民利益而死”，看成是“死得其所”，“比泰山还重”。让中国赫鲁晓夫和他的活命哲学见鬼去吧！"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b2ecdc0851"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
