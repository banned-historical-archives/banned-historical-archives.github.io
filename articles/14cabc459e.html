ical-archives/banned-historical-archives0/main/maoquanji42.pdf"],"article":{"title":"对湖南平江县稻竹大队几十个食堂散伙又恢复的材料的批语","alias":"","parts":[{"type":"paragraph","text":"对湖南平江县稻竹大队儿十个食堂"},{"type":"paragraph","text":"散伙又恢复的材料的批语"},{"type":"paragraph","text":"（1959年8月5日）"},{"type":"paragraph","text":"印发各同志。此件\"很值得一看。一个大队的几十个食堂，一下子都散了；过一会儿，又都恢复了。教训是：不应当在困难面前低头。像人民公社和公共食堂这一类的事情，是有深厚的社会经济根源的，一风吹是不应当，也不可能的。某些食堂可以一风吹掉，但是总有一部分人，乃至大部分人，又要办起来。或者在几天之后，或者在儿十天之后，或者在儿个月之后，或者在更长时间之后，总之又要吹回来的。孙中山说：“事有顺乎天理，应乎人情，适乎世界之潮流，合乎人群之需要，而为先知先觉者决志行之，则断无不成者也。”这句话是正确的。我们的大跃进、人民公社，属于这"},{"type":"paragraph","text":"[1]指中共湘潭地委工作组1959年7月1日整理的湖南省平江县谈岑公社稻竹大队几十个食堂散伙又恢复情况的材料。材料说，稻竹大队6月初有63个食堂，后来解散了61个。20天后，又都恢复起来，办成了89个。散伙的原因是群众对食堂议论纷纷，评价不一，干部也有矛盾心理，而直接的原因则是因为口粮紧张。后来食堂恢复的原因有三：1.部分社员提出要办。2.有的生产队长、作业组组长感到食堂解散后，生产难于统一领导。3上级领导对解散食堂提出批评。从这个大队的情况看，对食堂的争论之点基本上都是经营管理问题，把这个问题解决了，就可以吸引大多数群众。"},{"type":"paragraph","text":"对湖南平江县稻竹大队几十个食堂散伙又恢复的材料的批语一类。困难是有的，错误也一定要犯的，但是可以克服和改正。悲观主义的思潮，是腐蚀党、腐蚀人民的一种极坏的思潮，是与无产阶级和贫苦农民的意志相违反的，是与马克思列宁主义相违反的。"},{"type":"paragraph","text":"毛泽东八月五日"}],"authors":["毛泽东"],"dates":[{"year":1959,"month":8,"day":5}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":255,"page_end":256},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"14cabc459e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
