art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"革命战争一定能打败侵略者","authors":["炮兵某部活学活用毛泽东思想积极分子张培昌吕凤玲"],"parts":[{"type":"paragraph","text":"伟大领袖毛主席在支持世界人民反美斗争的庄严声明中指出：“第二次世界大战后，美帝及其追随者不断地发动侵略战争，各国人民不断地用革命战争打败侵略者。”毛主席对战后世界形势的高度概括和科学总结，必将大大鼓舞世界人民的反美斗争意志。"},{"type":"paragraph","text":"革命战争是正义的战争，代表着社会发展的方向，得到广大人民的拥护和支持，是必然要胜利的。侵略战争是维护剥削阶级利益的非正义战争，遭到人民群众的反对，是终究要失败的。第二次世界大战后，中国人民高举革命战争的正义旗帜，打败了美蒋反动派发动的反革命战争；中朝人民打败了美帝发动的侵朝战争；越南人民和老挝人民把美国侵略者打得焦头烂额。现在，柬埔寨人民反美爱国的正义战争节节胜利，入侵的美军及其走狗遭到了沉重打击。历史的事实就是这样清楚地证明，只要人民坚持进行革命战争，侵略者总是可以打败的。"},{"type":"paragraph","text":"目前，印度支那三国人民抗美救国战争的形势越来越好。印度支那三国人民只要加强团结，坚持斗争，就一定能够彻底打败美国侵略者。"}],"alias":""},"tags":[{"name":"世界形势","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5fe67edbac"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
