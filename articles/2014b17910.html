,"authors":[],"dates":[{"year":1982,"month":5,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"叶剑英电贺迪兹达雷维奇就任南联邦议会主席"},{"type":"paragraph","text":"赵紫阳电贺普拉宁茨就任南联邦执委会主席"},{"type":"paragraph","text":"新华社北京5月16日电　中华人民共和国全国人民代表大会常务委员会委员长叶剑英今天打电报给拉伊夫·迪兹达雷维奇，对他就任南斯拉夫联邦议会主席表示衷心的祝贺。贺电全文如下：贝尔格莱德南斯拉夫社会主义联邦共和国议会主席拉伊夫·迪兹达雷维奇同志："},{"type":"paragraph","text":"在你就任南斯拉夫社会主义联邦共和国议会主席的时候，我谨代表中华人民共和国全国人民代表大会常务委员会并以我个人的名义向你致以最衷心的祝贺和最良好的祝愿。祝南斯拉夫人民在建设社会主义和维护世界和平的事业中取得更大成就。祝你在履行这一重要职务中取得新的成绩。"},{"type":"paragraph","text":"我愿借此机会表示相信，我们两国人民之间的友好合作关系将不断发展。"},{"type":"paragraph","text":"中华人民共和国全国人民"},{"type":"paragraph","text":"代表大会常务委员会委员长叶剑英"},{"type":"paragraph","text":"1982年5月16日于北京"},{"type":"paragraph","text":"新华社北京5月16日电　中华人民共和国国务院总理赵紫阳今天打电报给米尔卡·普拉宁茨，热烈祝贺她就任执行委员会主席。贺电全文如下：贝尔格莱德南斯拉夫社会主义联邦共和国联邦执行委员会主席米尔卡·普拉宁茨同志："},{"type":"paragraph","text":"在你就任南斯拉夫社会主义联邦共和国联邦执行委员会主席的时候，我谨代表中华人民共和国国务院并以我个人的名义向你表示最热烈的祝贺和最良好的祝愿。衷心祝愿你在履行这一重要职务中取得新的更大成就。"},{"type":"paragraph","text":"我们两个社会主义国家之间的友好关系正在全面发展，这种关系是建立在完全平等、独立自主、相互尊重和相互谅解基础之上的。我深信，这种全面的友好合作关系将会进一步巩固和加强。"},{"type":"paragraph","text":"中华人民共和国国务院总理　赵紫阳"},{"type":"paragraph","text":"1982年5月16日于北京"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"赵紫阳","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2014b17910"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
