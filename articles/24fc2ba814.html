ical-archives/banned-historical-archives0/main/maoquanji41.pdf"],"article":{"title":"接受缅甸联邦新任驻华大使貌貌觉温呈递国书时的答词","alias":"","parts":[{"type":"paragraph","text":"接受缅甸联邦新任驻华大使貌貌觉温"},{"type":"paragraph","text":"呈递国书时的答词"},{"type":"paragraph","text":"（1959年3月12日）"},{"type":"paragraph","text":"毛泽东主席致答词说：“中缅两国自古以来就是亲密的邻邦。在共同反对殖民主义和争取民族独立的长期斗争中，两国人民更结下了深厚的友谊。自从两国各自先后摆脱了殖民主义压迫以来，两国人民在新的基础上所建立起来的友谊有了不断的发展。我深信，在中缅双方坚决维护和平共处五项原则的情况下，中缅两国人民之间的友好合作关系今后必将得到进一步的巩固和加强，从而对亚洲和世界和平作出更大的贡献。”"}],"authors":["毛泽东"],"dates":[{"year":1959,"month":3,"day":12}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":330,"page_end":330},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"24fc2ba814"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
