<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中央组织部、中国人民解放军总政治部关于从军队抽调五千三百名干部到地方政治机构工作的通知","authors":[],"dates":[{"year":1964,"month":5,"day":12}],"is_range_date":false,"parts":[{"text":"中央组织部、中国人民解放军总政治部关于从军队抽调五千三百名干部到地方政治机构工作的通知","type":"title"},{"text":"中央批准从解放军抽调五千五百名连以上干部到地方政治机构和企业、事业政治机构工作。除去前已抽调分配的师职以上干部二百余名以外，还应抽调五千三百名（其中：师级干部七十九名，团级干部一百七十四名，营级干部四十七名，连级干部五千名）。现将抽调和分配这五千三百名干部的有关事项通知如下：","type":"paragraph"},{"text":"（一）这五千三百名干部，确定分配给中央工交、财贸、农林部门所属企业事业单位二千三百三十五名，其中：师级干部五十七名，团级干部一百三十一名，他们可担任中央直属企业政治机构的主任、副主任；营级干部四十七名，连级干部二千一百名，他们可担任中央直属企业事业单位车间的支部（总支）书记或政治教导员、政治指导员。分配给各中央局的二千九百六十五名，其中：师级干部二十二名，团级干部四十三名，他们可担任十一个大城市（天津、沈阳、鞍山、旅大、抚顺、长春、哈尔滨、武汉、广州、重庆、西安）和十六个重要省辖市（唐山、太原、包头、本溪、吉林、济南、青岛、南京、无锡、杭州、洛阳、黄石、长沙、成都、昆明、兰州）工交、财贸政治部的主任、副主任；连级干部二千九百名，他们可担任地方国营企业事业单位车间的支部（总支）正副书记或政治教导员、政治指导员。具体分配计划详见附表。","type":"paragraph"},{"text":"（二）所调的干部必须是：政治思想好，有革命干劲，有一定工作能力，身体健康，适合担任上述工作任务。可以从现有政治干部或适合担任政治工作的军事干部中抽调。","type":"paragraph"},{"text":"（三）这批干部原则上分两批调齐。第一批三千二百名，在今年七月底以前调齐；第二批二千一百名，在明年第一季度内调齐。如有可能也可在今年全部调齐。抽调中的具体问题由调出单位和接收单位直接协商确定。","type":"paragraph"},{"text":"（四）分配给各中央局的干部由各中央局分配给各省、市、自治区，并由各省、市、自治区党委直接与被调的军区联系接收。分配给中央工交、财贸、农林企业事业单位的干部，由中央工交、财贸、农林各部直接与被调军区联系接收。所调干部一律办理转业手续，并直接办理调动手续（随军家属可以随干部一同前往）。其中师级干部由各军区报解放军总政治部备案。","type":"paragraph"},{"text":"（五）军队各级党委和政治机关，要认真遵照主席、林总的指示，按照规定的条件进行挑选，如数完成，切实保证质量。并要认真做好政治思想工作。在干部离队前以军或军区为单位进行短期集训。通过教育使他们认清在国家经济各部门建立政治机构对加强社会主义建设的重大意义，要他们积极响应党的号召，坚决服从组织分配，愉快地走上新的工作岗位，继续高举毛泽东思想红旗，发扬优良传统作风，虚心学习，努力做好工作。各地各部门对从牢队抽调的这批干部，必须热情接待，耐心培养，合理使用，对他们到地方后的一些实际问题，应切实帮助解决。抽调和分配这五千三百名干部的工作结束以后，各中央局组织部，中央工交、财贸、农林各部门，各军区、兵种，应分别做出总结，报告中央组织部和解放军总政治部。","type":"paragraph"},{"text":"（附件从略——编者注）","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7576a83d5c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
