art":5,"page_end":5,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"图片","authors":["毛泽东"],"parts":[{"type":"paragraph","text":"三、“互通情报”。就是说，党委各委员之间要把彼此知道的情况互相通知、互相交流。这对于取得共同的语言是很重要的。有些人不是这样做，而是象老子说的“鸡犬之声相闻，老死不相往来”，结果彼此之间就缺乏共同的语言。我们有些高级干部，在马克思列宁主义的基本理论问题上也有不同的语言，原因是学习还不够。现在党内的语言比较一致了，但是，问题还没有完全解决。例如，在土地改革中，对什么是“中农”和什么是“富农”，就还有不同的了解。"},{"type":"paragraph","text":"毛主席的《党委会的工作方法》"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d5bb85a145"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
