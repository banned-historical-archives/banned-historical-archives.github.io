<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"一生困苦死了无人理 重重剥削偏有吸血虫","authors":[],"dates":[{"year":1946,"month":10,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"这些抬滑竿的人，一生苦困，社会上瞧不起他们，生活没有保障，病死无人安埋。然而在这垂死的行尸走肉身上，竟遍有吸他们血的人。社会的残酷真令人不忍想像!下面就是两种吃人不见血的臭虫:"},{"type":"paragraph","text":"一，轿行每一个县城都有几家轿行，他们没有组织，但对付滑竿夫的法门，却又不约而同，互相竞赛，惟恐落后。他们都是些胡子老太婆，奸狠刻薄之流。各路滑竿一到县城后，钱用完了，住宿无门，烟饭无着，只有去站轿行。进去后，一切膳食鸦片，都可由轿行暂行维持，并代找暮生意。这在身无一文，无人信任得滑竿夫，自是方便，可是在生意找着后，花样却来了:"},{"type":"paragraph","text":"(一)号钱就是栈房宿费。不过普通栈房每日只收宿费四百，而轿行号钱，起码就要六百元，"},{"type":"paragraph","text":"(二)头钱就是抽头子。一般规定是抽十分之一，比如一个生意，三天路程，法币四万元，那么轿行就要抽钱四千元。"},{"type":"paragraph","text":"(三)饭钱市面上每餐只须三百元，但轿行内的伙食，残汤剩水，有盐无油，每餐必须五百元。"},{"type":"paragraph","text":"(四)烟钱柱烟馆内每合烟是三百，而轿行的却须四百，加以烟膏太重，吃两合不及一合，结果在外每日只吃四合，柱、行内烧，势非烧个七八合，不得过瘾。"},{"type":"paragraph","text":"(五)票钱凡出县城，每乘滑竽须缴这钱四百元，而轿行只拿两百元，就可向警察局缴纳。这样毫不费力，转手就赚两百元。"},{"type":"paragraph","text":"，二，警察局所谓要钱是由县府像察局规定的，在较大县份每日有二三百乘滑竿抬走，就可抽得票钱数万元，警局与轿行勾通一气，限制滑竿夫不纳票钱，下准抬走，一到城门，就给警察挡住。不特如此，他们(警局与轿行)的联防办法，更有甚于此者。凡市面滑竿不能自行找雇生意，否则即被警察拘押，关人铁窗。关进去后，自有轿行前来说情，代付保费数千，始可释放。"},{"type":"paragraph","text":"滑竿夫们就在这剪刀形的警察敲诈和轿行盘剥之下讨生活，生意找到了，临起程前，必先由雇客付三分之一脚资，交给轿行，轿行三下五除二一扣，就被扣光。行路后每日所得凡不敷出，饭吃不饱，烟不能过瘾。走不动时又重被客人责骂，客人凶的，还要拳脚交加。因为客人总想快走，而滑半夫愈被打骂，精神愈恶劣，愈是走不快。这就是一般坐滑竿的人，对之痛恨的根由。"},{"type":"paragraph","text":"农业社会的我国，一切交通工具，要想概以机器代替人力，殊非易事，尤其川康一带，更须仰赖群众的滑竿来维持交通不可。故一般滑竿夫对社会的贡献不为不大，他们对交通服务的功劳，不为不伟；然而劳苦的结果，社会对他们却又如此残酷，政府更充耳不闻。政府赶快设法健全他们的组织，铲除他们所受的重压盘剥，使他们生活得以改善，社会对他们的贱视也得以改观。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"17cc88c34c"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
