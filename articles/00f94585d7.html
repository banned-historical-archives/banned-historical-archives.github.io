","徐京跃"],"dates":[{"year":1987,"month":2,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"总参举办“坚持四项基本原则反对资产阶级自由化”讲座"},{"type":"paragraph","text":"据新华社北京2月17日电　（记者徐京跃、通讯员张东文）总参谋部200多名高级干部及宣传理论方面的同志今天认真地听取“坚持四项基本原则，反对资产阶级自由化”讲座。"},{"type":"paragraph","text":"中共中央政治局委员、总参谋长杨得志在开课前说，四项基本原则是我们的立国之本，也是建军之本。建设有中国特色的社会主义，要明确“两个不能动摇”，一个是实行改革、开放、搞活方针不能动摇，一个是坚持四项基本原则不能动摇。要把两者很好地统一起来，中高级干部要带头这样做，带动干部战士做到在两个基本点上与中央保持思想上、政治上的一致。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"00f94585d7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
