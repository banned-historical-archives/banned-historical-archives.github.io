tart":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"以四化大局为重 以遵纪守法为荣上海警备区某团七连学习国庆讲话批判无政府主义","authors":["李江涛/蔡圣广"],"parts":[{"type":"paragraph","text":"本报讯 “只有彻底肃清无政府主义的流毒，才能同心同德奔四化。”这是上海警备区某团七连指战员最近在学习叶剑英同志国庆讲话，批判无政府主义座谈会上谈的共同体会。"},{"type":"paragraph","text":"这个连担负上海市某领导机关的警卫任务。他们以站岗执勤中的所见所闻，列举大量事实，说明社会上少数人那种只要民主不要集中，只要自由不要纪律的做法，损害了安定团结，干扰了四化建设的顺利进行。他们认为，严格组织纪律，维护安定团结，首先必须肃清林彪、“四人帮”煽动的无政府主义的流毒，划清无产阶级的自由和资产阶级自由化的界限。他们说：在人民内部有少数人，特别是有些青年，由于受无政府主义思潮影响较深，分不清马克思主义和无政府主义的区别，往往把自由绝对化，跟着别人干出危害革命事业的蠢事来。前段时间，在某机关门口闹事的人中，就有这样的人。他们跟着那些煽动闹事者喊叫、起哄，甚至冲击政府机关，扰乱社会秩序。劝他不要闹，他就说：“这是我的自由。”这种不要纪律的自由，我们应当反对。"},{"type":"paragraph","text":"七连指战员认为，为什么有人无视组织纪律，搞资产阶级自由化呢？从根本上说，是极端个人主义在作怪。这种人为了满足个人的欲望，什么组织纪律，什么全局利益，什么马列主义、毛泽东思想原则，统统都不顾了。在闹事的人中，有的纯粹是无理取闹，他们明明有工作，却大喊“我要工作”；明明无冤屈，却大嚷“我要伸冤”。也有的确实有实际问题没有得到解决，要求解决也是合理的，但由于现在还没有条件，一时解决不了。在这种情况下，就要求必须以全局利益为重。无理取闹不对，有理取闹也不对。"},{"type":"paragraph","text":"学习座谈中，指战员们还联系思想实际，对照检查自己遵纪守法的情况。一致认为，我们是人民的军队，要带头以四化大局为重，正确对待个人利益，严格遵守纪律，坚决服从命令听指挥。大家列举了本连许多正确对待个人利益、严格遵守纪律的好同志，表示要向这些同志学习，加强组织纪律修养。比如，排长杜学文一次已请好假准备动身回家结婚，就在这时，上级来了通知，要他去执行带兵任务，他二话没说，立即写信给未婚妻说明此事，愉快地奔赴接兵地点，圆满地完成了上级交给的任务。"},{"type":"paragraph","text":"（李江涛、蔡圣广）"}],"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4bc208a59d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
