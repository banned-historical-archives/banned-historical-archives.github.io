art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席领导的人民军队是世界革命柱石我军指战员祝愿日本革命文艺战士为日本人民革命事业作出更大贡献","authors":[],"parts":[{"type":"paragraph","text":"新华社二十二日讯 日本齿轮座剧团的革命文艺战士今天来到中国人民解放军驻北京部队某部参观访问，他们热烈赞扬毛主席亲自缔造和领导的、林副主席直接指挥的中国人民解放军，是举世无双的伟大的人民军队，是中国革命胜利的柱石，也是世界革命的柱石。"},{"type":"paragraph","text":"齿轮座剧团团长藤川夏子在参观访问结束后，发表了热情的讲话。她说，中国人民解放军是毛主席的最好的战士，是全世界革命人民最好的模范。日本人民无限热爱毛主席，无限热爱毛泽东思想。齿轮座剧团的同志们一定要学习解放军活学活用毛主席著作的经验，把解放军的经验带回日本，走毛主席指出的革命道路，把一生献给日本人民的解放事业。"},{"type":"paragraph","text":"齿轮座剧团的革命文艺战士，今天高举着“战无不胜的毛泽东思想万岁！”“无产阶级文化大革命万岁！”的红色巨幅标语，来到解放军驻地，受到指战员们的热烈欢迎。日本革命文艺战士和解放军指战员挥动着红彤彤的《毛主席语录》，一起高呼：“毛主席万岁！”同声高唱《大海航行靠舵手》。"},{"type":"paragraph","text":"在参观访问中，齿轮座的同志们了解了指战员活学活用毛主席著作的情况，听取了战士们介绍活学活用毛主席著作的经验，同时也把自己运用毛泽东思想改造世界观，指导反帝反修斗争的体会介绍给战士们。藤川夏子团长在告别时向战士们说，毛主席说的“日本民族是一个伟大的民族。它是绝不会让美帝国主义长期骑在自己头上的”这一名言，鼓舞着日本人民的斗争。现在日本真正的革命者已经起来大造美帝国主义、日本反动派和日共宫本修正主义集团的反，革命的烈火正在日本燃烧起来。解放军指战员祝愿日本革命文艺战士为日本人民革命事业作出更大贡献。"},{"type":"paragraph","text":"齿轮座剧团的同志们还在北京访问了工厂、农村人民公社和学校。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d378a6a17d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
