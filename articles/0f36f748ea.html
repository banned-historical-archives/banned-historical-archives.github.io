ical-archives/banned-historical-archives8/main/maoquanji17.pdf"],"article":{"title":"给林哲的信","alias":"","parts":[{"type":"paragraph","text":"给林哲的信!"},{"type":"paragraph","text":"（1943年3月15日）林哲同志："},{"type":"paragraph","text":"今天，读了你纪念“三一五”的文章，颇受感动。我对日本革命史不甚清楚，但非常想了解。而且，对于中国党的干部和党员们，也有必要教他们一些日本革命的史实。所以，我建议你多写一点日本革命的史料，在《解放》⑶上发表。希望你能考虑一下。"},{"type":"paragraph","text":"我喜欢看你的所有文章。同时，我也劝同志们学习你对事物进行客观分析的态度。在我们当中，能够分析文章的人太少了，到处都泛滥着主观主义的豪言壮语。我们现在正在批判这样的由来已久的恶劣作风。希望得到你的支持。"},{"type":"paragraph","text":"敬礼！"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一九四三年三月十五日"},{"type":"paragraph","text":"[1]这封信是用铅笔写在一种很薄的信笺上的。林哲，是野坂参三刚到延安时所用的化名。1943年5月，共产国际解散之后，野坂参三接受了毛泽东的建议，改名为“冈野进”。此信中所说的批判主观主义的恶劣作风，指的是当时中国共产党正在开展的党内整风运动。"},{"type":"paragraph","text":"[2]指《解放日报》1943年3月19日发表的野坂参三的文章《在日本工农学校纪念三一五》。"}],"authors":["毛泽东"],"dates":[{"year":1943,"month":3,"day":15}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":518,"page_end":518},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0f36f748ea"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
