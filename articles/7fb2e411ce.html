ical-archives/banned-historical-archives8/main/maoquanji19.pdf"],"article":{"title":"关于召开国事会议预备会议给赫尔利的信","alias":"","parts":[{"type":"paragraph","text":"关于召开国事会议预备会议"},{"type":"paragraph","text":"给赫尔利的信"},{"type":"paragraph","text":"（1945年1月11日）赫尔利将军阁下："},{"type":"paragraph","text":"一九四五年一月七日来信敬悉。一九四四年十一月间党方面所提五条已为国民政府所拒绝。国民政府所提三条，党方面又万难同意，因有先由国民政府自动实行释放政治犯等四条之请求，借以证明国民政府是否有诚意在民主基础上解决国事问题。今接阁下来信，提议在延安开两党会议，并有阁下参加，盛意可感。但是鄙人仍恐此会议得不到何种结果，徒劳阁下等之往返。八年来一切两党秘密会议，均证明国民党方面毫无诚意。鄙人现请阁下向国民政府转达党方面之下述提议：在重庆召开国事会议之预备会议，此种预备会议应有国民党、共产党、民主同盟三方代表参加，并保证会议公开举行，各党派有平等地位及往返自由。上述提议，如荷国民政府同意，则周恩来将军可到重庆商。如何？敬请见复。顺颂时祺"},{"type":"paragraph","text":"毛泽东"}],"authors":["毛泽东"],"dates":[{"year":1945,"month":1,"day":11}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":285,"page_end":285},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7fb2e411ce"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
