" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"云南人民出版社关于错划王岚同志为“右派分子”的复查结论","authors":[],"dates":[{"year":1986,"month":8,"day":20}],"is_range_date":false,"parts":[{"text":"云南人民出版社关于错划王岚同志为“右派分子”的复查结论","type":"title"},{"text":"王岚 女 1928年生\t四川泸县人\t 家庭出身地主  本人成份学生 1950年参加工作 原系我社编辑\t工资编辑11级（70元）现在大理师范专科学校任教 \t1958年王岚同志被错划为“右派分子”。受到撤销职务，监督劳动的处分。1979年我社进行复查，中共云南省出版局党组批准，予以改正。恢复名誉，恢复原工资编辑11级（70元）。现根据云办发（85）73号文件精神，再次进行复查，认为王岚同志在1957年鸣放中所提意见是正常的，不属右派言论，实属错划，应彻底改正。","type":"paragraph"},{"text":" 中共云南人民出版社委员会1986年8月20日","type":"paragraph"}],"comments":[],"origin":"根据文件翻印件打印。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"云南文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"41b4b5f9cb"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
