art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"要闻简报","authors":[],"parts":[{"type":"paragraph","text":"邓小平副总理会见詹金森爵士和夫人"},{"type":"paragraph","text":"邓小平副总理十七日上午会见了英国《开曼群岛指南报》董事长安东尼·詹金森爵士和夫人。邓副总理对詹金森夫妇来我国访问表示热情的欢迎，并且同他们进行了亲切友好的谈话。"},{"type":"paragraph","text":"詹金森爵士于一九三八年作为伦敦《每日简报》的记者访问延安时，毛主席曾接见他。今天会见时，詹金森爵士把他当时在延安访问时拍摄下来的部分珍贵照片和写的文章赠给邓副总理。邓副总理对此表示感谢。"},{"type":"paragraph","text":"纪登奎同志欢宴南共联盟党的工作者友好访问团"},{"type":"paragraph","text":"中共中央政治局委员，国务院副总理纪登奎，十五日晚上举行宴会，热烈欢迎南斯拉夫共产主义者联盟中央委员会主席团委员布兰科·米库利奇和夫人以及由布兰科·米库利奇率领的南共联盟党的工作者友好访问团。在洋溢着热烈友好气氛的宴会上，纪登奎同志和布兰科·米库利奇同志先后祝酒，共同祝愿中南两党和两国人民的革命友谊与日俱增。"},{"type":"paragraph","text":"北京国际男子篮球友好邀请赛将于近期举行"},{"type":"paragraph","text":"一九七八年北京国际男子篮球友好邀请赛将于八月五日至十三日在北京举行。到目前为止，应邀参加这次邀请赛的国家有：朝鲜民主主义人民共和国、日本、墨西哥、荷兰、菲律宾、罗马尼亚、南斯拉夫、中国。国际篮球联合会的一些领导人，也将应邀前来参观邀请赛。（据新华社）"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"纪登奎","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5903875dc8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
