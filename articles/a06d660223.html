ical-archives/banned-historical-archives8/main/maoquanji17.pdf"],"article":{"title":"在中共中央政治局会议上的讲话","alias":"","parts":[{"type":"paragraph","text":"在中共中央政治局会议上的讲话!"},{"type":"paragraph","text":"（1942年8月22日）"},{"type":"paragraph","text":"总的目标是整顿三风、精兵简政，办法是五整？。中央和军委要以工作和教育作为两个标准来进行大整。工作按现状条件布置，过去要四五个人的，现在只要半个人。教育是专门学习，储备力量，扩大学校的。陕甘宁边区政府要加强，抓住中心，掌握政策。可考虑李维汉到边区政府任秘书长，完全服从西北局的领导。边区参议会停开，主要实行精兵简政，然后再开。[1]这是毛泽东在中共中央政治局会议上关于整顿三风、精兵简政和陕宁边区工作问题讲话的一部分。"}],"authors":["毛泽东"],"dates":[{"year":1942,"month":8,"day":22}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":123,"page_end":123},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a06d660223"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
