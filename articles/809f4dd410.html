<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"新疆少数民族买卖封建婚姻现象仍相当严重","authors":[],"dates":[{"year":1951,"month":12,"day":1}],"is_range_date":false,"parts":[{"text":"新疆少数民族买卖封建婚姻现象仍相当严重","type":"title"},{"text":"【西北总分社一日讯】新疆少数民族中买卖封建婚姻现象仍相当严重。解放后，各族妇女群众已初步发动起来，要求解放的心情很迫切。据一九五○年迪化、喀什、伊犁、阿克苏、哈密等五个专区的统计，人民政府司法机关收到的婚姻案占民事案件中的百分之十一强，今年上半年根据全省六十六个司法单位的统计，婚姻案件已占民事案件中的百分之十八点二。","type":"paragraph"},{"text":"各民族中最普遍的现象是买卖婚姻、早婚、一夫多妻、夫权统治、不合理的离婚、复婚习惯，以及季节性的离婚、娶妻、招女婿等。其中买卖婚姻表现最严重的是哈萨克和柯尔克斯族中，其次是蒙古族，娶妻财礼多至一百余头牛马，或七八百只羊。因此贫苦的牧民甚至一般的中牧要娶妻都非常困难。封建牧主们则依仗财势可以任意买人幼女为妻，造成十一、二岁女孩嫁给五、六十岁老头子的极端不合理的现象。在少数民族中，子女婚姻都由父母强迫包办。因为已经受了采礼，如果大女儿死了就得用小女去顶替。阿合奇、蒲犁县人民代表会议上曾有代表提议对财礼加以限制，他们提出不得超过两头牛或最多二十只羊，少者五只羊或衣服一两套等意见，但是无人提出废除财礼。","type":"paragraph"},{"text":"女人早婚以南疆维吾尔族最严重，一般女子结婚很少超过十四、五岁的，通常十二、三岁就结婚，个别甚至不到十岁。也有很多人是为穷困所迫。","type":"paragraph"},{"text":"刚解放不久某些地区曾进行了禁止早婚的宣传，但各方面工作尚未开展。如有的不向政府登记就偷偷地结了婚；有的妹妹结婚找姐姐去假冒登记，虚报年龄等。(维、哈族中很多人记不清年龄，有些人只知杏子熟时生的，麦子黄时生的，或白马生马驹那年生的等等，这对年龄的正确计算增加了困难。)","type":"paragraph"},{"text":"一夫妻妻的现象主要存在于恶霸、地主、头目、大牧主中，一个男人甚至有二、三十个妻子的。有的恶霸地主一人竟娶过一、二百个妻子。至于霸占奸污农、牧民妻女，或随娶随弃者，其数字更大。","type":"paragraph"},{"text":"夫权统治，丈夫可以任意虐待打骂妻子、离婚、重婚。丈夫说三句“托拉克”(即三休的意思)就可以把妻子离掉，或在外写一封信就可通知休妻等。解放前，丈夫可随意杀害妻子。解放后这种现象仍存在着。不合理的离婚复婚习惯、季节性的离娶现象多发生在南疆维族的贫苦农民中。","type":"paragraph"},{"text":"新疆解放以来，封建与反封建的斗争在婚姻问题上也是相当激烈，不少要求解放的妇女被杀害。据去年各县送省人民法院覆核的杀人案中，因婚姻事件杀人的就有二十二件，今年一月至九月各地妇女被杀害事件有十八件。如鄯善县巴吾同在解放前逼其妻托乎迪汗卖淫，解放后托乎迪汗向人民法院提出离婚，巴吾同竟把她杀死(凶犯已处死)。伊宁、新和、喀什、库车等县均曾发生原夫将人民政府批准离婚或正在向政府提出离婚的妻子杀死。","type":"paragraph"},{"text":"同时，在处理婚姻案件上不少法院干部不但没有积极支持妇女解放，保障女人权，反而站在封建立场，干涉婚姻自由，有的对女方提出离婚便认为“调皮捣蛋”“破坏生产”。新和县法院对于女方提出离婚的案件不问情由，将女方管押起来。乌苏、特克斯、额敏县法院和塔城专区分院均违法管押过要求离婚的妇女。","type":"paragraph"}],"comments":[],"origin":"新华通讯社编《内部参考》1951年12月3日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"809f4dd410"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
