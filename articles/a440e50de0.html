" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoistlegacy.de-2590","name":"中共中央批转中央宣传部、中央文献研究室《关于毛、周、刘、朱和现任中央常委著作的出版、发表及审核办法的请示报告》的通知","author":"中共中央","internal":false,"official":false,"type":"unknown","files":[],"article":{"title":"中共中央批转中央宣传部、中央文献研究室《关于毛、周、刘、朱和现任中央常委著作的出版、发表及审核办法的请示报告》的通知","dates":[{"year":1982,"month":7,"day":5}],"is_range_date":false,"authors":["中共中央","中共中央宣传部","中共中央文献研究室"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"中央宣传部办公厅，党的宣传工作文件选编，965-966","tags":[{"name":"传记","type":"主题/事件"},{"name":"刘少奇","type":"主题/事件"},{"name":"毛泽东","type":"主题/事件"},{"name":"文集","type":"主题/事件"},{"name":"周恩来","type":"主题/事件"},{"name":"朱德","type":"主题/事件"}],"parts":[{"type":"title","text":"中共中央批转中央宣传部、中央文献研究室《关于毛、周、刘、朱和现任中央常委著作的出版、发表及审核办法的请示报告》的通知"},{"type":"subtitle","text":"中发〔1982〕33号 （1982年7月5日）"},{"type":"paragraph","text":"中共中央批语："},{"type":"paragraph","text":"中央同意中央宣传部、中央文献研究室《关于毛、周、刘、朱和现任中央常委著作的出版、发表及审核办法的请示报告》，现转发给你们，请严格照此执行。"},{"type":"paragraph","text":"关于毛、周、刘、朱和现任中央常委著作的出版、发表及审核办法的请示报告"},{"type":"paragraph","text":"中央："},{"type":"paragraph","text":"出版和发表毛泽东、周恩来、刘少奇、朱德等老一辈无产阶级革命家的著作和传记，是一项十分严肃的任务，具有重大的政治影响。为了维护出版这类著作的严肃性，保证出版质量，除要求继续严格执行已有的规定外，拟作以下补充规定："},{"type":"paragraph","text":"（一）毛、周、刘、朱和现任中央常委的选集、文集（包括专题文集、书信集、诗词集）和个人传记、年谱，统一由中央文献研究室或中央指定的其他单位负责编辑工作，报送中央文献编辑委员会审定，交人民出版社出版。"},{"type":"paragraph","text":"（二）毛、周、刘、朱和现任中央常委过去未发表的文稿（包括讲话记录稿、批示、电文、书信、诗词），根据需要，由中央文献研究室或中央指定的其他单位负责整理后，公开或内部发表；其中重要的须报送中央文献编辑委员会审定。中央其他单位和省、市、自治区一级单位要发表这类文稿，需送中央文献研究室审核；重要的须报送中央文献编辑委员会批准。"},{"type":"paragraph","text":"（三）毛、周、刘、朱和现任中央常委公开发表过的文稿（包括建国前发表的），凡是没有收入人民出版社出版的各种选集、文集的，中央或省、市、自治区一级宣传出版单位需要重新发表或内部印行时，应分别经中央或省、市、自治区主管部门同意后，报送中央文献研究室核准。"},{"type":"paragraph","text":"（四）毛、周、刘、朱的早期著作，即在他们成为马克思主义者以前的著作，由中央文献研究室或中央批准的其他单位有计划地进行编料，经中央文献编辑委员会审定后，在适当时候印行。"},{"type":"paragraph","text":"（五）根据人民出版社已经出版的毛、周、刘、朱和现任中央常委的选集、文集，摘编成的专题选编或汇编，可以由中央一级有关出版社报请主管部门审查批准后出版。"},{"type":"paragraph","text":"（六）地委一级及其以下单位不得出版、发表或重印上述各项文稿。"},{"type":"paragraph","text":"上述意见如无不妥，建议批转各级党委。"},{"type":"paragraph","text":"中央宣传部"},{"type":"paragraph","text":"中央文献研究室"},{"type":"paragraph","text":"一九八二年六月二十九日"}],"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a440e50de0"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
