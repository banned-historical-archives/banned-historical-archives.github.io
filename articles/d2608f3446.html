script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"重庆市“鸣”、“放”情况","authors":["徐宜道","龚成华"],"dates":[{"year":1957,"month":6,"day":1}],"is_range_date":false,"parts":[{"text":"重庆市“鸣”、“放”情况","type":"title"},{"text":"徐宜道龚成华","type":"authors"},{"text":"新华社重庆市1日电　重庆市目前“鸣”“放”的情况一般还平静。极个别工厂有几人到几十人的闹事。一部分失业、无业人员(市干部学校在街道盲目招收，而在不久前被遣散回去的)曾要请愿，被劝说后已回家。","type":"paragraph"},{"text":"根据市委布置，最近十天大专学校是“放”的重点，其次是机关、团体。范围仍控制在民主党派人士、上层知识分子、资本家等方面。工商界少数右派分子极力串连，企图把中小商贩煽动起来，但没有进展。","type":"paragraph"},{"text":"目前存在的问题：","type":"paragraph"},{"text":"(一)生产整风两不误的精神没有得到很好的贯彻。五月份由于领导集中精力于整风，顾不得考虑和解决生产问题，因而不少厂矿完成计划很差，先进生产者运动陷入停顿。据商业等几个部门的检查，增产节约运动已形成自流。一般干部也反映：没有心情工作，安静不下来。特别是问题较多的单位，一般都抱着把问题解决了才能很好工作的打算，松懈情绪较严重。","type":"paragraph"},{"text":"(二)重庆目前感到压力较大的一是劳动就业问题，二是学徒升级、学生升学问题。失业和无业人员较多的市中心区，稍一点火，即有闹事的可能。中共重庆市委正布置按街道召开代表会，主动向他们说明情况，共同商讨解决的办法。","type":"paragraph"},{"text":"(三)已经提出的值得注意的意见：","type":"paragraph"},{"text":"(1)四川大资本家康心如说，墙由共产党造成的，有四种墙，即公私关系，阶级关系、党与非党关系、职位上的关系。他们认为要拆掉这四种墙，公私合营后再分公私方代表没有必要，并建议政府用人不分是什么阶级，只问德才如何，就给予权。另一资本家田习之(据说是军阀杨森的舅子)也认为墙与沟的奠基人是共产党；“阶级、公私、两面性”这七个字就是沟与墙。","type":"paragraph"},{"text":"(2)资本家李仲平(现任四川省工商联秘书长)串联一批在“五反”中受打击较大的翻案，不同意错是个别的，认为应当全面检查，要求中央坚决贯彻“有错必纠”的精神。资本家石漱流等还要求提前释放“五反”中判刑的资本家，应当让那些在监狱里的人也“鸣”一下。","type":"paragraph"},{"text":"(3)不少资本家称公方代表是满清的“挞子”，普遍有赶掉公方代表的情绪。","type":"paragraph"},{"text":"(4)郭造勋认为“工人阶级思想”是指没有掌握政权、受压迫、受剥削时代的工人阶级的思想，但今天工人阶级不受剥削了，存在决定意识，如果工人阶级思想坏了，就说是受小资产阶级、资产阶级思想的影响，这种提法不对。","type":"paragraph"},{"text":"新闻界有人在座谈会上提出取消省市党报，办同仁报纸；重庆日报原在大公、新民两报工作的人员也主张报人办报，对重庆日报领导人原来没有作过新闻工作现在来领导他们，表示不服气。　　(徐宜道、龚成华)","type":"paragraph"},{"text":" 1957年6月5日新华通讯社编《内部参考》。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d2608f3446"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
