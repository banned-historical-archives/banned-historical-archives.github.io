script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji19","name":"毛泽东全集第19卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji19.pdf"],"article":{"title":"自己动手，克服困难","alias":"","parts":[{"type":"paragraph","text":"自己动手，克服困难"},{"type":"paragraph","text":"（1945年4月9日）郑、李、陈\"："},{"type":"paragraph","text":"寅寒郑电、卯冬三人电，均悉。（一）派兵困难，不要依靠。"},{"type":"paragraph","text":"（二）你们将重点移到路西，向老河口方向发展是对的，兵力部署你们自己调剂。"},{"type":"paragraph","text":"（三）财经、民运干部，已令组织部考虑酌派。"},{"type":"paragraph","text":"（四）你们除食粮外，其他用费应由主要依靠税收转到主要依靠生产自给，放手由各区自己生产解决，只有这一办法才是最可靠办法。一九四○、四一、四二整整三年陕甘宁边区财政困难情形比你们还要厉害，从四三年起就是依靠这一办法解决了问题。仅有人口一百五十万的边区，却养活了十万公家人而民不伤。五台、太行两"},{"type":"paragraph","text":"[1]郑，指郑位三（1902—1975)，湖北黄安（今红安）人，当时任中共鄂豫皖边区委员会书记、新四军第五师政治委员。李，指李先念，当时任新四军第五师师长和鄂豫皖湘赣军区司令员兼政治委员。陈，指陈少敏（1902一1977），山东寿光人，当时任中共鄂豫皖边区委员会副书记。"},{"type":"paragraph","text":"[2]寅寒郑电，指郑位三1945年3月14日给中共中央并华中局的电报。卯冬三人电，指郑位三、李先念、陈少敏1945年4月2日给中共中央并华中局的电报。区的困难也比你们要大，去年一年大生产运动，情形就变了。今年应该是你们展开大生产运动的一年，万勿错过春耕时机，望在财政会上切实讨论，口号是“自己动手，克服困难”。一面酌增公粮，必可保证供给。关于扩兵，要在新发展区域去扩，依照那里人民的可能负担条件，酌量扩大部队。关于群众工作不好，应通令一切党、政、军、民一齐动手做群众工作，将一齐动手打敌人，一齐动手生产自给，和一齐动手做群众工作三者结合起来。总之，一切依靠最广大群众力量去解决问题，放手将解决问题的责任交给各分区，交给广大群众。你们上面领导同志只总其大纲，给予号召、指导、检查和调剂，实行集中领导、分散经营的原则。切不可将一切重担都由上面负起来，致使下面都望着你们要吃、要穿、要办法，你们虽忙甚急甚，也不能尽如人意。这是游击战争特点所引起的方法，不知你们认为是否可行，请考虑酌办为盼。"},{"type":"paragraph","text":"毛泽东卵佳生陈"},{"type":"paragraph","text":"众工作，消有手打放人，有就公成"},{"type":"paragraph","text":"结合起卡口您险："},{"type":"paragraph","text":"放紧能决"},{"type":"paragraph","text":"不知你们想为静密光容可行的办为。王行东卵佳"}],"authors":["毛泽东"],"dates":[{"year":1945,"month":4,"day":9}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":378,"page_end":380},"tags":[{"name":"李先念","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"陈少敏","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"80eeb876d4"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
