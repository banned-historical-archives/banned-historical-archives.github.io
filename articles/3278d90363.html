<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"威尔科克斯在万隆谈反帝反修斗争在亚非拉给帝国主义以击中要害的打击强调站在马列主义原则基础上对修正主义及其思想进行直接斗争","authors":[],"dates":[{"year":1964,"month":6,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社雅加达8日电】　印度尼西亚《人民日报》今天报道，新西兰共产党总书记威尔科克斯六日在万隆对印度尼西亚共产党西爪哇大地区委员会的干部发表了演说。"},{"type":"paragraph","text":"威尔科克斯在讲话中重申“决没有爱好和平的帝国主义”，并且指出“不同的肤色不能作为衡量反帝斗争的标准”。"},{"type":"paragraph","text":"威尔科克斯说，“目前，我们正在对修正主义者及其思想进行直接的斗争。我们是站在久经考验的马克思列宁主义原则的基础上的。这些原则是由马克思和恩格斯提出的，后来为列宁和斯大林所发展，随后又为毛泽东、当然还有你们的领导人艾地同志进一步加以发展的，从而使这些原则适用于社会主义阵营内部和新独立国家的当前情况。”"},{"type":"paragraph","text":"威尔科克斯说，“不同的肤色不能作为衡量反帝斗争的尺度。最重要的是，我们在反对我们的共同敌人帝国主义的斗争中，是站在马克思列宁主义的基础上和团结一致的。”"},{"type":"paragraph","text":"威尔科克斯阐述了新西兰共产党的斗争以及在老挝、南越、柬埔寨、非洲和拉丁美洲的斗争之后说，“当前世界革命风暴的中心，是在帝国主义统治最薄弱的地区，即东南亚、非洲和拉丁美洲。我们应当把斗争的矛头指向这些薄弱的地区，给它们以击中要害的打击。”"},{"type":"paragraph","text":"威尔科克斯说，“印度尼西亚人民反对‘马来西亚，的斗争和南越人民反对美帝国主义的斗争，也就是新西兰人民的斗争。这是因为这些斗争都是反对帝国主义的。”"},{"type":"paragraph","text":"威尔科克斯说:“让我们在马克思列宁主义的基础上一道向前迈进，争取建立一个社会主义的印度尼西亚、一个社会主义的新西兰和一个社会主义的世界。”"},{"type":"paragraph","text":"威尔科克斯的讲话受到与会者的最热烈的欢迎。"},{"type":"paragraph","text":"印度尼西亚共产党西爪哇大地区委员会第一书记达兰·里瓦伊在会上讲话说，西爪哇的共产党人对马克思列宁主义的新西兰共产党是熟悉的，因为新西兰共产党同印度尼西亚共产党一道，坚决反对帝国主义和现代修正主义。"},{"type":"paragraph","text":"威尔科克斯是在五日从茂物到达万隆进行参观访问的。在离开茂物以前，威尔科克斯在印度尼西亚共产党主席艾地、第二副主席约多等陪同下参观了茂物的植物园。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3278d90363"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
