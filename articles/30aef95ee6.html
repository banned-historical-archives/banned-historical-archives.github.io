ical-archives/banned-historical-archives8/main/maoquanji24.pdf"],"article":{"title":"给彭真“的信","alias":"","parts":[{"type":"paragraph","text":"给彭真的信"},{"type":"paragraph","text":"（1948年10月7日）彭真同志："},{"type":"paragraph","text":"刘澜涛?来信阅悉。中组?应发一指示给各中央局、分局的组织部，规定请示报告制度，其中规定若干项重要事项必须报告和请示的；尔后，不断督催，建立起中组的业务来。请与安子文同志商酌办理为盼。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十月七日"},{"type":"paragraph","text":"[1]彭真（1902—1997)，山西曲沃人。当时任中共中央政治局委员、中央组织部部长。"},{"type":"paragraph","text":"[2]刘澜涛（1910—1997)，陕西米脂人。当时任中共中央华北局常委兼组织部部长。"},{"type":"paragraph","text":"[3]即中共中央组织部。[4]安子文（1909—1980)，陕西子洲人。当时任中共中央组织部副部长。黄蕉。"},{"type":"paragraph","text":"刘滋清生烟应落指不强中快易，分局的丝织部，规空请示报告制交，其规法干项重要幸须，必须报共和清示的;凉发，不能背催，建乏知中组的繁鸦来心清尝与改间胜商的办现为形。"},{"type":"paragraph","text":"七七月毛泽东致彭真信的手稿。"}],"authors":["毛泽东"],"dates":[{"year":1948,"month":10,"day":7}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":535,"page_end":536},"tags":[{"name":"毛泽东","type":"人物"},{"name":"彭真","type":"人物"},{"name":"刘澜涛","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"30aef95ee6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
