art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"多读毛主席的书","authors":["杨子文/秦万伦/吴光华"],"parts":[{"type":"paragraph","text":"高炮三连侦察员陈恒庭，入伍前是个大学生。一年来，思想好，干劲大，受到同志们的赞扬，被评为五好战士，今年3月还加入了共产党。"},{"type":"paragraph","text":"陈恒庭谈到自己入伍后的进步时兴奋地说：“我所以能不断进步，主要原因是多读毛主席的书，听首长的教导，不断改造思想。”陈恒庭刚到连队时，情绪也曾一度低落。领导上发现后，及时对他进行了教育。一天晚上，他正在炮阵地上值勤，连长见他没有穿大衣，马上给他送来一件，并且问他：“你知道当兵为什么光荣？”他一时回答不出来。连长指着周围的夜景说：“你看城市的夜景多美啊！万盏灯火闪闪，工厂的机器声、汽车的马达声、火车的汽笛声，不断向我们报捷。祖国能够得到安宁，就是因为我们高射炮兵严阵以待，保卫着领空。当兵光荣就在这里。”连长的这一番话，深深打动了陈恒庭的心，他立即向连长表示：“我一定当个名副其实的侦察员！”连长鼓励他，要想当好一个人民战士，就要好好学习毛主席的著作，提高觉悟，改造思想。"},{"type":"paragraph","text":"从这以后，他一有空就学习毛主席的著作，通过学习提高自己的思想水平。半年多来，他学习了《为人民服务》、《纪念白求恩》、《改造我们的学习》等十二篇文章，并把毛主席的话摘记在本子上，一有空就拿出来看一看，想一想，作为自己行动的指南。经过学习，他端正了服役态度，积极学习军事技术，不会就学，不懂就问，不熟就练。他是指挥镜报读手，初练指示目标时，头一天就把嗓子喊哑了，第二天仍坚持练习。为了学习识别飞机。他虚心向老同志学习。现在他正苦练夜间不用照明指示目标诸元的硬功夫。"},{"type":"paragraph","text":"（杨子文、秦万伦、吴光华）"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1ae59071e7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
