新远景","authors":[],"dates":[{"year":1968,"month":10,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"阿《人民之声报》热烈赞扬我国科学技术的辉煌成就"},{"type":"paragraph","text":"文化大革命开辟了中国科学技术发展的新远景"},{"type":"paragraph","text":"新华社地拉那十二日电　阿尔巴尼亚《人民之声报》十一日发表文章，介绍中国人民在科学和技术领域中所取得的辉煌成就，热烈赞扬中国无产阶级文化大革命为迅速发展中国的科学和技术开辟了新的远景。"},{"type":"paragraph","text":"文章说，无产阶级文化大革命的目的在于使人的思想革命化，并由于人的思想革命化的结果，使生产更快地取得更大和更好的成果。中国的科学和技术的发展，中国成功地试验了导弹和氢弹以及其他科学成就，正是体现了这一点。"},{"type":"paragraph","text":"文章指出，在夺取这些巨大成就的过程中，存在着毛主席的无产阶级革命路线和中国赫鲁晓夫的反革命修正主义路线之间的尖锐斗争。中国人民战胜了美帝国主义者和苏联现代修正主义者的封锁和破坏，粉碎了中国赫鲁晓夫的反革命修正主义路线，在自己的道路上奋勇前进。文章指出，在无产阶级文化大革命期间，中国在科技领域所取得的成就，证明了毛主席的教导：“人民群众有无限的创造力。”“代表先进阶级的正确思想，一旦被群众掌握，就会变成改造社会、改造世界的物质力量。”"},{"type":"paragraph","text":"文章介绍了在中国无产阶级文化大革命期间所创造的达到世界水平的各种仪器和机器及其性能和用途。文章说，这一切成就表明，无产阶级文化大革命正在为中国以更快的速度发展科学和技术开辟新的远景。这些成就是由起着领导作用的中国工人阶级和同工农兵群众相结合的革命知识分子所取得的。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b44f079ad7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
