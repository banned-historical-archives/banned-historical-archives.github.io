s":[],"dates":[{"year":1952,"month":3,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　上海市民政局在克服了右倾的“思想老虎”以后，在打虎的第二个战役中，获得辉煌成绩；现已打到大老虎十三头、小老虎二十九头。全军战志昂扬，正乘胜追击，准备打一个漂亮的聚歼战，不使一头老虎漏网。"},{"type":"paragraph","text":"在打虎第一阶段，各打虎队领导上存在着严重的右倾思想；对敌情估计不足，认为民政局是政权机关，不是经管钱财的部门，不会有什么大老虎，因而缺乏打虎信心。对群众提供的线索、材料，总觉得是浮面现象，不具体；不进行深入的调查研究，甚至为老虎的伪装所迷惑；看见老虎痛哭流涕、具结保证，就软了手。优抚处的一个打虎队原来自告奋勇，要打三只大老虎、九只小老虎，结果在第一阶段，一只小老虎也没打出来。"},{"type":"paragraph","text":"自各单位打虎队长听了陈毅同志的报告，并经市政府对领导干部作出处分后，右倾邪气大降，军心大振。经连夜召开会议，运用批评与自我批评的武器，初步扫除右倾思想。次日打虎队在新人习艺场首战告捷，捕获大老虎一头，全军士气更加鼓舞起来，第二天深入劳动教养所的打虎队，在七个小时内连续打出大老虎两头。接着优抚处又打出最大的一头老虎，他所贪污数字根据初步材料统计已达八亿元。至此，右倾思想基本肃清，新的捷报继续不断传来，在短短数天内便获得以上战果。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a1af4d59d6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
