art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"研讨毛泽东军事思想促进国防现代化建设僵化思想是继承和发展毛泽东军事思想一大障碍","authors":["齐长明"],"parts":[{"type":"paragraph","text":"与会同志认为，当前，我国在新的历史条件下所进行的国防现代化建设实践中遇到的新问题，需要加强毛泽东军事思想的指导。参加学术交流的近80篇论文，虽然论点各有异同，却有一半以上是围绕毛泽东军事思想与国防现代化问题、为解决战略性转变过程中遇到的现实问题所作的文章。一些同志认为，在毛泽东军事思想的体系中，除了关于战争学说的内容之外，还有一个鲜为人知的重要组成部分，这就是“毛泽东国防学说”，或称为“毛泽东的国防现代化建设思想”，它主要包括国防利益、国家安全和国防建设等范畴。这种思想极为丰富，一旦被挖掘、整理出来，将肯定会对当今的国防现代化建设产生良好的指导作用。"},{"type":"paragraph","text":"与会同志还认为，邓小平同志在新时期对于发展毛泽东的国防现代化建设思想、特别是在发展战争与和平的思想方面有很大贡献，是在新时期继承和发展毛泽东军事思想的一个榜样。"},{"type":"paragraph","text":"许多同志指出，僵化思想是继承和发展毛泽东军事思想的一大障碍。军事科学院姜思毅副院长、大连陆军学院院长赵树峰谈到，既要坚决反对社会上极少数人否定毛泽东军事思想的右的错误论调，也一定要反对各种“左”的东西和僵化思想，要在国防现代化建设的实践中把坚持和发展毛泽东军事思想统一起来。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c9ec1bff85"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
