等应邀出席","authors":[],"dates":[{"year":1973,"month":11,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"庆祝扎伊尔第二共和国八周年"},{"type":"paragraph","text":"扎伊尔驻中国大使举行招待会"},{"type":"paragraph","text":"邓小平副总理、姬鹏飞外长等应邀出席"},{"type":"paragraph","text":"新华社一九七三年十一月二十四日讯　扎伊尔共和国驻中国大使恩古武卢·卢邦达和夫人今天晚上举行招待会，庆祝扎伊尔第二共和国八周年。"},{"type":"paragraph","text":"应邀出席招待会的有国务院副总理邓小平，外交部部长姬鹏飞、副部长何英和王浩同志，国家建委主任谷牧，外贸部副部长周化民，外经部副部长李克，中国人民解放军副总参谋长彭绍辉，交通部副部长马耀骥，有关方面负责人王世延、丁西林、周荣国等。"},{"type":"paragraph","text":"正在我国访问的扎伊尔外交和国际合作事务国务委员恩古扎·卡尔·伊邦德，公共工程和土地治理国务委员恩古卢·邦甘庞戈·巴科凯拉·洛康加和夫人，以及由恩古扎国务委员率领的扎伊尔共和国政府代表团其他成员，出席了招待会。"},{"type":"paragraph","text":"各国驻中国的外交使节也应邀出席了招待会。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c836c72fe4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
