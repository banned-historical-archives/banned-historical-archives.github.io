script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"纪念我志愿军参战七周年金日成首相电谢毛主席平壤举行纪念大会　朝鲜各地展开各种纪念活动","authors":[],"dates":[{"year":1957,"month":10,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京24日电】　朝鲜民主主义人民共和国内阁首相金日成，为中国人民志愿军抗美援朝参战七周年在23日致电毛泽东主席表示感谢。电文如下:"},{"type":"paragraph","text":"中华人民共和国主席毛泽东同志:"},{"type":"paragraph","text":"值此英雄的中国人民志愿军抗美援朝参战七周年，我谨代表全体朝鲜人民和朝鲜民主主义人民共和国政府向尊敬的您并通过您向全体兄弟的中国人民表示衷心的感谢。"},{"type":"paragraph","text":"在朝鲜人民反对美帝国主义侵略者的正义的祖国解放战争时期，用鲜血援助朝鲜人民的兄弟的中国人民志愿军官兵，在战后时期，仍如战争时期一样，同朝鲜人民军一道，铜墙铁壁般地保卫着和平防线，积极帮助朝鲜人民恢复、建设战后人民经济。"},{"type":"paragraph","text":"真正的国际主义战士——兄弟的中国人民志愿军建立的光辉的伟大功绩，将在我国人民中间流传万世。"},{"type":"paragraph","text":"深信我们两国人民在反对外来侵略者进行的共同斗争中巩固发展起来的牢不可破的友好关系，对于我们两国的繁荣发展和保卫亚洲及世界和平的事业，将作出巨大的贡献。"},{"type":"paragraph","text":"我衷心祝中国人民在社会主义建设、保卫亚洲和世界和平以及在进一步加强以伟大的苏联为核心的社会主义阵营各国人民之间的团结的斗争中获得更辉煌的胜利。"},{"type":"paragraph","text":"朝鲜民主主义人民共和国内阁首相金日成"},{"type":"paragraph","text":"1957年7月23日于平壤(10月26日1版更正为“1957年10月23日于平壤市”)"},{"type":"paragraph","text":"【据新华社平壤24日电】　平壤市各界人士今天晚上在牡丹峰剧场举行大会，纪念中国人民志愿军抗美援朝入朝鲜参战七周年。"},{"type":"paragraph","text":"参加大会的有朝鲜最高人民会议常任委员会委员长崔庸健，内阁副首相金一、洪命熹、南日、朴义琓、郑一龙，劳动党中央委员会副委员长朴正爱、金昌满，民族保卫相金光侠大将:以及各民主政党、社会团体负责人，朝鲜人民军高级将领，平壤市劳动人民代表等800多人。"},{"type":"paragraph","text":"以旷伏兆中将为首的中国人民志愿军代表团，中国驻朝鲜大使乔晓光和各国驻朝鲜外交使节参加了大会。"},{"type":"paragraph","text":"朝鲜人民军崔勇进中将在大会上作了报告，他说，中国人民志愿军在战时以鲜血援助了朝鲜人民，在战后同朝鲜人民军一道严格地遵守停战协定，粉碎敌人的一切挑衅行为，保卫着和平防线，并且以高贵的劳动援助朝鲜人民。朝鲜人民看到由毛泽东主席和中国共产党培养出来的中国人民的优秀儿女的新榜样，朝鲜人民对中国人民志愿军表示无限的热爱各尊敬。"},{"type":"paragraph","text":"旷伏兆中将接着讲话。他代表中国人民志愿军官兵向朝鲜人民、朝鲜劳动党、共和国政府和金日成元帅表示敬意和感谢。他说，中朝两国人民和两国军队用血肉结成的兄弟般的友谊正在日益巩固和发展，中朝两国人民热爱和平，但是不怕战争。中国人民志愿军决心和朝鲜人民一道为维护停战协定、制止美帝国主义者的任何侵略阴谋，为保障远东和世界和平而斗争。如果美帝国主义者敢于破坏停战协定发动战争，我们一定能够同朝鲜人民和朝鲜人民军一起，给敌人以更为沉重的打击。"},{"type":"paragraph","text":"【据新华社平壤24日电】　朝鲜各地人民正在进行各种活动，纪念10月25日中国人民志愿军参战七周年。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c2da55366e"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
