:1976,"month":8,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　金山县山阳公社前进大队第五生产队“三抢”中，开展田头写诗、赛诗活动，深入批邓。几天来，全队写诗赛诗五十多首。中年妇女张月宝用诗歌表达女社员的心愿:“妇女秧田学理论，干部群众心连心，炮口对准邓小平，‘三抢’战斗当尖兵。”社员陆亚华写诗批邓:“贫下中农斗志昂，深入批邓战‘三抢’，批臭‘白猫黑猫’论，心红眼亮明方向”。写诗、赛诗活动鼓舞了斗志，大家出工时间还没到就早已干开了，晚上收工时间到了还奋战在田头。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4817ddb0f3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
