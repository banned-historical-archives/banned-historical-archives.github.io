<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"“克服资产阶级思想对党的侵蚀，反对党内的右倾思想”(下)读高岗同志一月十日的报告","authors":["史营"],"dates":[{"year":1952,"month":2,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"史营"},{"type":"paragraph","text":"三、在执行政策上的右倾(一)在贸易政策上，有些地方对私商向国营商业抢地盘和投机违法行为听之任之，甚至加以帮助；而对国营商业和合作社开展业务与扩大零售比重，则很不积极。这助长了私立的投机活动，抬高物价。"},{"type":"paragraph","text":"(二)对于委托资本家加工和订货时，资本家偷工减料、获取是暴利和勾结工作人员盗窃国家财产的行为，不认为是犯法的，是应得惩处的(2月16日5版更正为“不认为是犯法的，不加以应得的惩处”)。"},{"type":"paragraph","text":"(三)在税收政策上，商业税轻于工业税，行商税又轻于座商税，助长了资本家的投机倒把活动。"},{"type":"paragraph","text":"(四)在私人企业中的工人运动政策上，对于资本家虐待工人、分化工人、违反劳动法令的行为，很少制裁。有些地方的劳资协商会议，甚至成为资本家蒙敝国家、蒙敝工人，偷工减料、投机漏税的工具。"},{"type":"paragraph","text":"(五)无原则地提倡私商联营。"},{"type":"paragraph","text":"四、右倾倾向的危害性。"},{"type":"paragraph","text":"依靠资产阶级，就会丢掉工人阶级，也会丢掉人民大众，就会亡党亡国。"},{"type":"paragraph","text":"五、怎样克服资产阶级对于党的侵蚀。"},{"type":"paragraph","text":"对于人民政府机关内部:"},{"type":"paragraph","text":"(一)继续贯彻反贪污、反浪费、反官僚主义运动的斗争，肃清贪污、浪费、官僚主义等种种错误现象。对于贪污浪费轻者批评教育，重者从撤职查办、判处徒刑、劳动改造，甚至枪毙。"},{"type":"paragraph","text":"(二)积极领导反贪污、反浪费、反官僚主义工作的，以及这一运动进行得较好的单位，都要加以表扬。压制民主、压制批评者和抵抗运动之开展者，不论担负甚怀职务，都要严予徵处。"},{"type":"paragraph","text":"(三)经过实际斗争和宣传，树立一种新的道德，使正气上异，邪气敛迹。"},{"type":"paragraph","text":"四贯彻最近规定的各种精简节约制度。"},{"type":"paragraph","text":"对于工商界者:"},{"type":"paragraph","text":"(一)应把党、政府和军队内部的加强的社会的力量连合起来，对资产阶级级的行贿、偷税漏税、盗窃国家资财、偷工减料、盗窃国家经济情报等犯法行为，予以彻底揭露处理。"},{"type":"paragraph","text":"二各城市迅速召开协商委员会、人民代表会和工商业者的会议，在掌握了一定的材料之后，号召他们限期坦白爸和检举；凡坦白彻底者，重者减罪，轻者免罪；检举他人者以功折罪，证实确定前不坦白者，加重处罚。"},{"type":"paragraph","text":"○处理的原则是:一般的“同扣”等恶习，经过对具本家批评后加以废除，不作处罚，但对行贿、偷税漏税、偷工减料、盗窃国家资财和国家经济报等犯法行为，即根据坦+白或被检举的不同情况及对于国家的危害程度大小，认真严肃地依据国家的法律处理。"},{"type":"paragraph","text":"四在这一运动后，应当号召工商联按行业组织资本家订立以反行贿、反偷税漏税、反盗窃国家资财、反偷工减料、反盗窃国家经济怀报为主要内容的爱国公约。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c20c93e7d6"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
