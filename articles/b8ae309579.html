ors":[],"dates":[{"year":1950,"month":7,"day":31}],"is_range_date":false,"parts":[{"text":"河南46个县遭受水灾","type":"title"},{"text":"（河南分社讯）7月以来河南省连降大雨，山洪暴发，30条河流泛滥成灾，造成严重损失。此次水势之大为30年来所未有。据初步统计：46个县遭受水患，淹没农田600余万亩，塌房屋10万多间。被淹田禾大部泡死或减收。个别水灾地区人畜亦有严重伤亡。省府已拨急赈粮500万斤。各地经抢救后，一般停止了灾情的发展，商丘专区夏邑等5县已救出秋禾24万多亩。","type":"paragraph"}],"comments":[],"origin":"新华社《内部参考》1950年7月31日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b8ae309579"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
