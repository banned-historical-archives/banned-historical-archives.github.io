rt":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"上士许武斌三篇论文成为军校教材","authors":["余阳/李文革"],"parts":[{"type":"paragraph","text":"本报讯 余阳、李文革报道：5月中旬，南京军区某陆航旅上士许武斌撰写的《航电系统无法接通故障分析》《发动机启动不成功故障分析》《某型直升机左液压油面低告警故障分析》等3篇论文，被陆军航空兵学院列为机务维修教材的消息传回部队后，官兵们奔走相告，倍受激励。"},{"type":"paragraph","text":"许武斌是这个旅机务中队一名上士航电技师，从事直升机机务保障工作已经9年多。入伍时只有高中学历的许武斌利用业余时间先后自学完成了《电子技术基础》《直升机结构与系统》《空气动力学和维护技术基础》等多种专业教材，并取得大专文凭。他还结合自己的工作实践，写下了10余本机务维护学习体会。"},{"type":"paragraph","text":"在中队干部的鼓励下，许武斌将自己的维护经验体会写成教案、论文，与中队官兵一起分享，并将论文投寄专业期刊。去年底，他的3篇论文被收录到总参陆航部编辑出版的《全军陆航部队优秀论文集》中。今年5月，为完备专业维修教材，陆军航空兵学院从论文集中选出部分论文，进行分类集中，形成日常教学使用教材，许武斌的3篇论文全部被选中。陆军航空兵学院特设专业副教授曹学峰介绍：“院校教学要与部队一线对接，对于航空维修，一线官兵的实践操作是我们教学最生动的教材。”"},{"type":"paragraph","text":"入伍以来，许武斌多次被评为技术标兵、维护能手、优秀共产党员，荣立三等功1次，并被该旅列入优秀技术士官人才库。他曾参与编写《某型直升机航电员手册》《某型直升机特设专业职业技能等级鉴定题库》《某型直升机故障汇编》等多项旅重点资料。今年以来，许武斌在各类直升机专业杂志上发表论文10余篇。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d4820630cc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
