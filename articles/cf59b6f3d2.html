<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"jfjb","name":"解放军报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"dates":[{"year":1968,"month":6,"day":4}],"page_start":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"他一生为传播毛泽东思想奔忙","authors":["原互助土族自治县山城大队四清工作组组员青海国营综合机械厂技术员宋小乔"],"parts":[{"type":"paragraph","text":"一九六六年五月，我到互助土族自治县山城大队搞四清。一天，组长对我们说：“组织上要派一位解放军同志来给我们工作组当指导员。”我们迫不及待地问指导员什么时候能来，话音刚落，一位手里拿着《毛主席语录》、年近四十的解放军同志，已跨进了门坎，他就是我们工作组的指导员——门合同志。"},{"type":"paragraph","text":"老门一来就坚持用毛泽东思想发动群众、武装群众。他常说：“怎样能使国家不变颜色，我们就怎么做。”"},{"type":"paragraph","text":"我热情地把门合同志带到贫农房东张生福家去。门合同志一进门就问张生福识字不识字，并立即从挂包里掏出《纪念白求恩》送到张生福手虽说：“今后我教你认字，这就是课本。”然后，他在墙壁语录板上，工工正正地写下了“纪念白求恩”五个大字。"},{"type":"paragraph","text":"门合同志急切地向我询问队里学习毛主席著作的情况。当天晚上，他就召开了学习毛主席著作辅导员会议。他详细了解了各队学习毛主席著作的情况，每个人都问到了，边问边记。最后，他对大家说：“要真正把毛泽东思想学到手，必须按照林副主席的教导，带着深厚的无产阶级感情学，带着问题学，活学活用，学用结合，急用先学，立竿见影。”会议一直开到十二点钟才结束。散会很久了，门合同志仍然盘腿坐在炕上，学习毛主席著作，学习毛主席亲自主持制定的“二十三条”，整理笔记，思考问题。他好象根本不知道什么叫疲劳。英雄门合给我们留下了永生不可磨灭的印象。"},{"type":"paragraph","text":"山城大队在门合同志的倡议下，办起了各种类型的毛泽东思想学习小组。不论在田边，在地头，还是在贫协会上，总能听到门合同志那洪亮有力的声音：毛主席教导我们：“没有贫农，便没有革命。若否认他们，便是否认革命。若打击他们，便是打击革命。”"},{"type":"paragraph","text":"随着活学活用毛主席著作群众运动的深入开展，贫下中农学习热情空前高涨。门合看到这种大好形势，高兴得睡不着觉。他因势利导，启发大家在“用”字上狠下功夫。在毛泽东思想哺育下，贫下中农的无产阶级觉悟不断提高，好人好事不断涌现出来。有的自已拿钱买回毛主席像，送给贫下中农；有的利用收工回家的机会，给饲养室割青草，不要工分；有的自动出工帮助贫下中农盖房子；有的为大家挖泉水，解决吃水的困难；有的从山上给五保户拉渣筏，解决烧柴问题。在这些活动中，门合同志总是走在头里。他用自己的行动做出了在“用”字上狠下功夫的榜样。"},{"type":"paragraph","text":"门合同志高举毛泽东思想伟大红旗，使山城大队很快出现了生气蓬勃的革命景象，有力地促进了四清运动。"},{"type":"paragraph","text":"门合同志，你一切为着毛主席，一生为传播毛泽东思想而奔忙，你永远是我们的指导员。我们一定象你那样一辈子活学活用毛泽东思想，把宣传毛泽东思想当作自己毕生的战斗任务，永远无限忠于伟大导师毛主席，无限忠于战无不胜的毛泽东思想，无限忠于毛主席的无产阶级革命路线。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cf59b6f3d2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
