uthors":[],"dates":[{"year":1971,"month":7,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"荷兰马列主义党中央写信给毛主席、林副主席"},{"type":"paragraph","text":"最真诚祝贺中国共产党成立五十周年"},{"type":"paragraph","text":"新华社六日讯　荷兰马克思列宁主义党中央委员会七月一日写信给毛泽东主席和林彪副主席，最真诚地祝贺中国共产党成立五十周年。信的内容如下："},{"type":"paragraph","text":"为庆祝光荣的中国共产党成立五十周年，我们谨代表荷兰马克思列宁主义党全体党员和我国劳动人民，向你们致以最真诚的祝贺。"},{"type":"paragraph","text":"毛泽东同志教导我们，星星之火，可以燎原。"},{"type":"paragraph","text":"一九二一年中国共产党的成立正是以这种燎原之势开创了整个中国工人阶级的群众运动。今天，这个运动已发展成为统治着整个中国的无产阶级专政。"},{"type":"paragraph","text":"这样，中国共产党就成了同世界上最大的帝国主义势力美国进行斗争的最重要的武器。"},{"type":"paragraph","text":"我们可以看到，由于今天世界革命风暴中心——亚洲和非洲广大被压迫人民群众的斗争，美国帝国主义和苏联修正主义的危机正在一天天加深。"},{"type":"paragraph","text":"在这些感人的榜样的影响下，我们还看到西欧群众的革命精神正在觉醒。"},{"type":"paragraph","text":"在所有资本主义国家都爆发了大规模的罢工；货币危机削弱了北大西洋公约组织和“共同市场”的所谓团结。"},{"type":"paragraph","text":"荷兰盾的“浮动”清楚地证明，即将下台的本届荷兰内阁没有能力管好本国的财政。"},{"type":"paragraph","text":"荷兰马克思列宁主义党的党员作为荷兰工人阶级的先锋队，将把中国共产党进行长期英勇斗争的历史当作他们自己斗争的光辉榜样。"},{"type":"paragraph","text":"我们遵循列宁的教导和当代最伟大的马克思列宁主义者毛泽东同志的明确教导，坚决相信我们将通过革命胜利地解放荷兰工人阶级。"},{"type":"paragraph","text":"我们因有经验丰富的中国共产党和我们在一起，作为我们进行工作的明亮的灯塔而感到自豪。"},{"type":"paragraph","text":"祝你们继续沿着你们光荣的道路走下去，直至你们党的一百周年，在庆祝你们党一百周年的时候，肯定将是一个被全世界无产者解放了的、由他们进行统治的社会主义世界。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2b6943189c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
