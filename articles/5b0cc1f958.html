al-archives/banned-historical-archives8/main/maoquanji5.pdf"],"article":{"title":"题黄陂联","alias":"","parts":[{"type":"paragraph","text":"题黄陂联！]（1931年8月）黄虎山洞吠白犬；"},{"type":"paragraph","text":"陂水长流锁蛟龙。"},{"type":"paragraph","text":"[1]1931年8月11日，在反第三次反“围剿”中，毛泽东率部包围驻黄陂的国民党军毛炳文师，歼灭其四个团。毛泽东对黄陂人民和黄陂的山山水水怀有深厚的感情，因而创作了这副嵌名联。黄陂，江西省宁都县的一个小镇。"},{"type":"paragraph","text":"[2]黄虎，喻指英勇的红军。白犬，喻指国民党军队。"},{"type":"paragraph","text":"[3]陂水，象征革命人民的力量。蛟，古代传说中的动物，民间相传以为能发洪水。一说母龙，无角。《楚辞·九思·宋志》：“乘六蛟兮婉蝉。”王逸"}],"authors":["毛泽东"],"dates":[{"year":1931,"month":8}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":382,"page_end":382},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5b0cc1f958"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
