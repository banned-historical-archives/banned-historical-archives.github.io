rt":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"华总理邓副总理分别致电卡特总统 热烈祝贺中美两国建立外交关系黄华外长致电万斯国务卿祝贺中美建交","authors":[],"parts":[{"type":"paragraph","text":"据新华社一月一日讯 中华人民共和国国务院总理华国锋一月一日打电报给美利坚合众国总统吉米·卡特，热烈祝贺中美两国建立外交关系。电报说："},{"type":"paragraph","text":"值此中华人民共和国与美利坚合众国建交之际，我谨代表中国政府和中国人民并以我个人的名义向阁下并通过你向美国政府和美国人民致以热烈的祝贺。"},{"type":"paragraph","text":"我认为，中美建交是两国关系中的历史性事件。它不仅符合中美两国人民的根本利益，而且将对国际形势产生有利的影响。我相信，它也必将为推进中美两国人民的友谊和两国良好关系的发展开辟广阔的前景。"},{"type":"paragraph","text":"据新华社一月一日讯 中华人民共和国国务院副总理邓小平一月一日打电报给美利坚合众国总统吉米·卡特，热烈祝贺中美两国建立外交关系。电报说："},{"type":"paragraph","text":"当中华人民共和国和美利坚合众国建立外交关系之时，谨致以热烈的祝贺。"},{"type":"paragraph","text":"中美两国在上海公报的基础上实现关系正常化，两国人民都感到高兴。"},{"type":"paragraph","text":"我期待着本月底访美期间同阁下会晤，并把中国人民的友好情谊带给美国人民。"},{"type":"paragraph","text":"据新华社一月一日讯 中华人民共和国外交部长黄华一月一日打电报给美利坚合众国国务卿赛勒斯·万斯，热烈祝贺中美两国建立外交关系。电报说："},{"type":"paragraph","text":"在中华人民共和国同美利坚合众国正式建立外交关系之际，谨向阁下表示热烈的祝贺。"},{"type":"paragraph","text":"中美两国关系正常化具有重大而深远的意义。它不仅符合中美两国人民的共同愿望，而且有助于亚洲和世界人民谋求和平的事业。"},{"type":"paragraph","text":"我深信，两国关系必将在此基础上获得有意义的发展。"}],"alias":""},"tags":[{"name":"世界形势","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b3a57b55b0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
