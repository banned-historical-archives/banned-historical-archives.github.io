al-archives/banned-historical-archives8/main/maoquanji8.pdf"],"article":{"title":"给杜斌示的信以","alias":"","parts":[{"type":"paragraph","text":"给杜斌丞的信1"},{"type":"paragraph","text":"（1935年12月5日）"},{"type":"paragraph","text":"从汪锋同志知先生不忘情于革命，甚感事也。时至今日，论全国，论西北，论陕西，均舍抗日反蒋无第二条出路。为今之计，诚宜急与方取一致行动，组成联合战线，蔽方愿在互不攻击的初步条件下，与虎城先生商洽一切救亡图存之根本大计。如得先生居中策划，以共同作战对付公敌为目标，则军甚愿与虎城先生成立谅解，逐渐进到共组抗日联军、国防政府之步骤。先生为西北领袖人物，投袂而起，挺身而干，是在今日。东北军中如沈克等（此次军追击董英斌，消灭沈师一个团，非所愿也)，均应与之联合。甘肃邓君宝珊？，亦为绝无出路之人，蔽军亦愿与发生关系。"},{"type":"paragraph","text":"[1]这是毛泽东致国民党军第十七路军总参议杜斌丞信的主要内容。"}],"authors":["毛泽东"],"dates":[{"year":1935,"month":12,"day":5}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":101,"page_end":101},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7f2f83614e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
