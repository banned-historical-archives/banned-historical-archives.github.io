ical-archives/banned-historical-archives8/main/maoquanji24.pdf"],"article":{"title":"打几个胜仗以配合菜裕部休整","alias":"","parts":[{"type":"paragraph","text":"打几个胜仗以配合栗裕部休整"},{"type":"paragraph","text":"（1948年2月17日）小平、先念："},{"type":"paragraph","text":"粟裕所部为敌五军等部扰乱，不利休整，需要唐、陈谢“及你门淮北部队集中兵力打几个胜仗调动五军等部，方能安心休整。该部休整需一个多月，大约要卯月中旬或下旬方能出动。在此期间，唐、陈谢及你们淮北部队正好集中打几仗，然后当粟部出动时，则以全力配合粟之行动。同时你们主力四个纵队（十个机动旅）不宜全部集中，只宜集中两个纵队（五个机动旅）和唐、陈谢一起行动。兵力已很大，应留五个机动旅于大别山待机歼敌。因此，我的意见，大别山全区交先念指挥，小平率领应当集中的部队，现在就渡淮北上，和伯承会合，统一指挥三军合组的野战军（共有二十二个机动旅）。大别桐柏江汉三区均为辅助战场，北面为主要战场。你们意见如何，盼复。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"亥"},{"type":"paragraph","text":"[1]唐，指陈士、唐亮，当时分别任华东野战军参谋长和政治部主任。陈谢，指陈、谢富治，当时分别任晋冀鲁豫野战军陈谢集团前委书记和副书记。"},{"type":"paragraph","text":"[2]伯承，即刘伯承，当时任晋冀鲁豫野战军司令员。"}],"authors":["毛泽东"],"dates":[{"year":1948,"month":2,"day":17}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":90,"page_end":90},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a2a413b27f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
