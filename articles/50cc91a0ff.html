市","沈志远"],"dates":[{"year":1957,"month":5,"day":16}],"is_range_date":false,"parts":[{"text":"谈计划经济（摘要）","type":"title"},{"text":"上海市沈志远","type":"authors"},{"text":"（沈志远：经济学家、中国科学院上海经济研究所筹备处主任，中国民主同盟上海市主任委员）","type":"subtitle"},{"text":"社会主义是需要计划管理的，但过多的计划管理，就会损害自由，妨碍积极因素的发挥。社会主义是要求集中化的，但是过多过死过紧的集中，就会损害灵活主动，同样会妨碍群众积极性的发挥。而今天我们各部门的管理制度恰恰不足以鼓励群众的积极性，在某种程度上倒反而把可能调动的积极因素变为消极因素了。由于管理过多过死，一切都要国营，一切都要管起来，包下来，把人们的积极性创造性都管光了，包光了，……","type":"paragraph"},{"text":" （摘自“沈志远1957年5月16日在中共上海市委宣传工作会议上的发言”，载1957年5月17日“解放日报”）","type":"paragraph"},{"text":" 来源：中国人民大学经济系政治经济学教研室编《中国资产阶级右派经济言论批判参考资料》，1958年9月。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"50cc91a0ff"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
