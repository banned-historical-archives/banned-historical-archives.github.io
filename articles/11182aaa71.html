thors":[],"dates":[{"year":1950,"month":1,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"英工人生活更加恶化"},{"type":"paragraph","text":"克利浦斯报告经济统计数字"},{"type":"paragraph","text":"透露巨大战费来自剥削工人"},{"type":"paragraph","text":"【新华社北京十四日电】塔斯社莫斯科十二日讯：英国财政大臣克利浦斯九日在伦敦记者招待会上发表“一九四九年英国努力的经济结果”的回顾。尽管他的措词小心翼翼，但克利浦斯自己的统计，仍然透露了与他在进行竞选所吹嘘的大为不同的图景。"},{"type":"paragraph","text":"克利浦斯的统计实际上证明去年英国工人的生活标准更加恶化。根据克利浦斯所举材料，英国劳动生产率去年增加了百分之五，国民收入上升百分之四左右。克利浦斯称全部个人开支上升了百分之三，并称这只有部分是由于物价上涨。但他在声明的另一部分，承认零售物价上涨百分之三，同时工资率指数却只微小地增加了一个点。把这两个官方指数比较一下，便可看出实际工资是减少了百分之二以上。"},{"type":"paragraph","text":"克利浦斯承认约有百分之十的工业公司增加了去年的红利，同时也承认对工人剥削的增加，是用来支付为履行西欧联盟下所负义务而进行的战争准备的巨大经费。"},{"type":"paragraph","text":"克利浦斯的统计证明，英国的美元赤字仍然是巨大的。一九四九年，英国的出口，只有十分之一输往美元区。他估计去年英国有形贸易的逆差为四亿二千九百万镑，一九四八年则为四亿三千二百万镑。"},{"type":"paragraph","text":"英国曼彻斯特卫报对克利浦斯的声明表示忧虑称：“克利浦斯低估了继续中的美元危机。一九四六年美元赤字是九亿美元。一九四八年赤字到了十七亿美元，去年是十五亿美元。这样改变毫无值得骄傲之处”。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"11182aaa71"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
