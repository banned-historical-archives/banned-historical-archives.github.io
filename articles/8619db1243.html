uthors":[],"dates":[{"year":1980,"month":7,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"叶剑英委员长最近发出通知"},{"type":"paragraph","text":"人大五届三次会议召开以前组织全国人大常委视察工作"},{"type":"paragraph","text":"新华社北京7月22日电  人大常委会委员长叶剑英最近发出通知：第五届全国人民代表大会第三次会议召开以前，组织全国人大常委会委员视察工作。"},{"type":"paragraph","text":"通知说，各委员按照自己所在的省、市、自治区就地进行视察。在京的全国人大常委会委员可以在北京视察，也可以到外地视察。委员在视察中发现的问题，分别交由当地人大常委会或者当地人民政府处理，必要时可函报全国人大常委会处理。通知说，参加视察的委员，一般不带随员。视察时，各地一律不组织群众迎送，不举行宴会，不赠送礼品，不组织专场晚会。"},{"type":"paragraph","text":"据悉：七月中旬开始，委员们已在各地进行视察。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8619db1243"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
