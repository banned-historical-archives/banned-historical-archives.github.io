违法乱纪情况严重》一稿给新华社的信","authors":["毛泽东"],"dates":[{"year":1953,"month":2,"day":2}],"is_range_date":false,"parts":[{"text":"毛泽东关于转发《河北省农村基层干部违法乱纪情况严重》一稿给新华社的信","type":"title"},{"text":"毛泽东","type":"authors"},{"text":"新华总社：","type":"appellation"},{"text":"一月三十日《内部参考》载《河北省农村基层干部违法乱纪情况严重》一稿，很有用处，请将此稿发给各中央局、分局、省委和市委的同志们阅看，作为参考。并请令知各省市新华分社仿照河北分社的办法，从各省市方面采访此类消息，刊入《内部参考》。河北省委负责同志林铁、薛迅等集中地揭露了该省基层组织中发生的许多违法乱纪事件，证明中央一月五日关于反对官僚主义、命令主义和违法乱纪的指示已经引起了他们的注意；但大多数省市还无这样的反映，故请你们注意在各省市采访这同一主题的消息，并将其中最典型的消息通报各中央局、分局、省委和市委，以促起他们的注意。","type":"paragraph"},{"text":" 毛泽东二月二日","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"18552bee19"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
