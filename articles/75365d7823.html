es":[{"year":1959,"month":2,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"刘少奇周恩来邓小平同志"},{"type":"paragraph","text":"会见日共领导人宫本显治等"},{"type":"paragraph","text":"新华社24日讯　中国共产党中央委员会副主席刘少奇、周恩来，总书记邓小平今天会见了日本共产党中央委员会总书记宫本显治，日共中央干部会委员春日正一，日共中央副部长西泽富夫，进行了热烈友好的谈话，谈话后举行了宴会。参加谈话和宴会的有中共中央政治局委员彭真，中央书记处书记王稼祥，中央委员伍修权等。"},{"type":"paragraph","text":"新华社24日讯　日本共产党总书记宫本显治、日共中央干部会委员春日正一，今天上午在中共北京市委书记处书记郑天翔陪同下，参观了北京电子管厂。（附图片）"},{"type":"paragraph","text":"上图：中共中央副主席刘少奇、周恩来，总书记邓小平会见了日本共产党总书记宫本显治（前排中）、日共中央干部会委员春日正一（前排右二）、日共中央副部长西泽富夫（后排左二）。图为会见时合影。"},{"type":"paragraph","text":"新华社记者　孟庆彪摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"邓小平","type":"人物"},{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"75365d7823"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
