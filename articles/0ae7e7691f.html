script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反对帝国主义掠夺和剥削  维护本国经济利益  石油输出国联合斗争获新胜利  迫使西方石油公司同意补偿阿拉伯湾六国因美元贬值所受的损失","authors":[],"dates":[{"year":1972,"month":1,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反对帝国主义掠夺和剥削  维护本国经济利益"},{"type":"paragraph","text":"石油输出国联合斗争获新胜利"},{"type":"paragraph","text":"迫使西方石油公司同意补偿阿拉伯湾六国因美元贬值所受的损失"},{"type":"paragraph","text":"新华社一九七二年一月二十二日讯　石油输出国组织成员国为维护本国经济利益，经过十天的谈判斗争，终于迫使以美、英为首的西方石油公司同意补偿阿拉伯湾石油生产国因美元贬值而受到的损失。这是石油输出国组织成员国在反对帝国主义掠夺和剥削的斗争中所取得的一个新胜利。"},{"type":"paragraph","text":"根据双方一月二十日达成的协议，伊朗、伊拉克、科威特、沙特阿拉伯、阿布扎比、卡塔尔六国从阿拉伯湾和地中海东部出口的原油的标价，立即提高百分之八点四九。据估计，这将使这六国的石油收入每年增加约七亿美元。"},{"type":"paragraph","text":"由于美元贬值，石油输出国组织成员国的收入受到损失，它们要求西方石油公司对此进行补偿是完全合理的。长期以来，这些石油生产国的绝大部分石油资源为西方石油公司所垄断，它们主要靠向这些外国石油公司征收石油税获得收入。而石油税都用美元进行计算，所以美元贬值减少了石油生产国的实际收入。据石油输出国组织成员国国家银行行长最近在维也纳举行的会议估计，自去年八月尼克松政府宣布“新的经济政策”以及随后的美元贬值以来，石油输出国组织成员国在石油上遭受的损失约达五亿七千万美元。为了维护本国的经济利益，石油输出国组织去年十二月七日在阿布扎比举行第二十六次会议，决定就补偿问题同西方石油公司进行谈判。"},{"type":"paragraph","text":"一月十日在日内瓦开始谈判。第一天，代表二十三家西方石油公司的谈判代表不顾石油输出国组织的正当要求，极力施展阴谋，提出一项要以国际货币基金组织编制的一种“指数”来计算补偿款额的方案，妄图继续损害石油输出国组织成员国的经济利益。石油输出国组织的谈判代表在十一日发表了一项新闻公报，坚决拒绝西方石油公司提出的方案，并且指出，西方石油公司在玩弄“兜圈子”的伎俩，按照它们提出的这一方案“将使石油输出国组织成员国应得的实际补偿大大减少”。公报重申，石油输出国组织成员国“有权调整原油标价，以反映美元贬值的真实情况”。由于石油输出国组织成员国协调一致、坚持斗争，西方石油公司被迫同意与阿拉伯湾六国签订补偿协议。石油输出国组织其他成员国还将就这一问题继续与西方石油公司进行谈判。"},{"type":"paragraph","text":"石油输出国组织成员国这次斗争的胜利又一次表明，中小国家在维护民族利益的斗争中，只要团结一致，坚持斗争，就一定能赢得胜利。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0ae7e7691f"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
