ical-archives/banned-historical-archives0/main/maoquanji29.pdf"],"article":{"title":"志愿军司令部组成须有朝鲜同志参加","alias":"","parts":[{"type":"paragraph","text":"志愿军司令部组成须有朝鲜同志参加!"},{"type":"paragraph","text":"（1950年10月24日）彭："},{"type":"paragraph","text":"（一）人民志愿军司令部的组成拟即发布命令。除中国同志外，请与金日成同志商量，以一个朝鲜同志为副司令员兼副政委，或者以一人为副司令，一人为副政委，如何请复。（二）如何发布作战公报，请与金商。其内容每次均须得你并报我同意，方式由朝鲜广播台先发表，新华社再转播，此事须妥为商好，以免两歧。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十月二十四日[1]这是毛泽东给中国人民志愿军司令员兼政治委员彭德怀的电报。[2]金日成，当时任朝鲜民主主义人民共和国首相。"}],"authors":["毛泽东"],"dates":[{"year":1950,"month":10,"day":24}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":287,"page_end":287},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9b0e32a8d7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
