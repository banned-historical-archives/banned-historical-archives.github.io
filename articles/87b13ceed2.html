art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"诗词十首","authors":["叶剑英"],"parts":[{"type":"paragraph","text":"油岩题壁"},{"type":"paragraph","text":"一九一五年"},{"type":"paragraph","text":"放眼高歌气吐虹，  也曾拔剑角群雄。"},{"type":"paragraph","text":"我来无限兴亡感，  慰祝苍生乐大同。"},{"type":"paragraph","text":"羊城怀旧"},{"type":"paragraph","text":"百战归来意气雄，  念年人事各西东。"},{"type":"paragraph","text":"关心最是公园路，  十丈红棉依样红。"},{"type":"paragraph","text":"题刘志丹烈士陵园"},{"type":"paragraph","text":"一九四三年"},{"type":"paragraph","text":"懿惟志丹，革命英雄。"},{"type":"paragraph","text":"国际主义，奋志坚行。"},{"type":"paragraph","text":"裹革沙场，虽死犹存。"},{"type":"paragraph","text":"纪念先烈，以启后人。"},{"type":"paragraph","text":"军区管海军"},{"type":"paragraph","text":"母鸡孵鸭蛋，  母子亦相亲。"},{"type":"paragraph","text":"一日凌波去，  沧波无限情。"},{"type":"paragraph","text":"抗美援朝诗三首"},{"type":"paragraph","text":"一"},{"type":"paragraph","text":"中朝唇齿最相关，  出国支援冒万难。"},{"type":"paragraph","text":"妙算戎机先待敌，  突然捷报遍字寰。"},{"type":"paragraph","text":"二"},{"type":"paragraph","text":"铁鸟猖狂阻运输，  我军攻势号星期。"},{"type":"paragraph","text":"学成狡兔营三窟，  坑道能歼百万师。"},{"type":"paragraph","text":"三"},{"type":"paragraph","text":"苦战三年依后勤，  敌机拦阻且投菌。"},{"type":"paragraph","text":"组成网状交通站，  保证弹粮给我军。"},{"type":"paragraph","text":"守备二十一师"},{"type":"paragraph","text":"一九五九年二月十六日"},{"type":"paragraph","text":"南海浮珠尽宝藏，要将前线作家乡。"},{"type":"paragraph","text":"从来战斗兼工作，传统光荣我擅长。"},{"type":"paragraph","text":"扎兰屯"},{"type":"paragraph","text":"一九六二年八月"},{"type":"paragraph","text":"雅鲁河畔扎兰屯，几派清流拥水村。"},{"type":"paragraph","text":"铁索悬空新瀑急，吊桥桥上忆长征。"},{"type":"paragraph","text":"虞美人"},{"type":"paragraph","text":"赠陈毅同志"},{"type":"paragraph","text":"一九六六年"},{"type":"paragraph","text":"串连炮打何时了，官罢知多少。赫赫沙场旧威风，顶住青年小将几回冲！严关过尽艰难在，思想幡然改。全心全意一为公，共产宏图大道正朝东。"},{"type":"paragraph","text":"珍宝岛"},{"type":"paragraph","text":"一九七○年二月二十三日"},{"type":"paragraph","text":"病阅聊斋事可伤，恒娘读罢又庚娘。"},{"type":"paragraph","text":"敌军压境魔侵肺，心在边疆身在床。"},{"type":"paragraph","text":"在海军总结会上"},{"type":"paragraph","text":"一九七三年二月二十四日"},{"type":"paragraph","text":"沧溟列舰耸层楼，王浚年高雪满头。"},{"type":"paragraph","text":"应向青年寻后继，不拘一格莫嫌仇。"},{"type":"paragraph","text":"（原载《叶剑英诗词选集》）"}],"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"87b13ceed2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
