ical-archives/banned-historical-archives0/main/maoquanji33.pdf"],"article":{"title":"给鞍山钢铁公司全体职工的贺信","alias":"","parts":[{"type":"paragraph","text":"给鞍山钢铁公司全体职工的贺信"},{"type":"paragraph","text":"（1953年12月24日）鞍山钢铁公司全体职工同志们："},{"type":"paragraph","text":"你们一九五三年十二月二十一日的来信收到了。鞍山无缝钢管厂、鞍山大型轧钢厂和鞍山第七号炼铁炉的提前完成建设工程并开始生产，是一九五三年我国重工业发展中的巨大事件。我向参加这三项工程的全体职工、鞍山钢铁公司全体职工和帮助鞍山建设事业的全体苏联同志致以热烈的祝贺和深切的感谢。我国人民现正团结一致，为实现我国的社会主义工业化而奋斗，你们的英勇劳动就是对于这一自标的重大贡献。希望你们继续努力，学习苏联先进经验，发挥你们的智慧和力量，争取更大的成就。"},{"type":"paragraph","text":"毛泽东一九五三年十二月二十四日"}],"authors":["毛泽东"],"dates":[{"year":1953,"month":12,"day":24}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":488,"page_end":488},"tags":[{"name":"毛泽东","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"690111e173"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
