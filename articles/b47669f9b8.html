],"dates":[{"year":1974,"month":3}],"is_range_date":false,"parts":[{"text":"给江青的几封信和批语","type":"title"},{"text":"江青：","type":"appellation"},{"text":"不见还好些。过去多年同你谈的，你有好些不执行，多见何益？有马列书在，有我的书在，你就是不研究。我重病在身，八十一了，也不体谅。你有特权，我死了，看你怎么办？你也是个大事不讨论，小事天天送的人。请你考虑。","type":"paragraph"},{"text":" 3. 20","type":"paragraph"},{"text":"江青：","type":"appellation"},{"text":"邓小平同志出国是我的意见，你不要反对为好。小心谨慎，不要反对我的提议。","type":"paragraph"},{"text":" 3. 27","type":"paragraph"},{"text":"江青：","type":"appellation"},{"text":"两信收。前后不一。党的大势不错，悲观不好。不要动摇。前途是光明的，道路是曲折的。要团结百分之九十五以上的人。不要主观片观（面）。千万注意。牢骚太盛防肠断，风物长宜（放）眼量。不要请假。钱可略增。无限风光在险峰。","type":"paragraph"},{"text":" 4. 17","type":"paragraph"},{"text":"江青：","type":"appellation"},{"text":"可读李固给黄琼书。就思想文章而论，都是一篇好文章。你的职务就是研究国内外动态，这已经是大任务了。","type":"paragraph"},{"text":"此事我对你说了多次，不要说没有工作。此嘱。","type":"paragraph"},{"text":" 11. 20","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"江青","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b47669f9b8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
