{"year":1969,"month":12,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反剥削　反迫害"},{"type":"paragraph","text":"阿根廷工人英勇斗争"},{"type":"paragraph","text":"据新华社十七日讯　布宜诺斯艾利斯消息：阿根廷许多城市的工人不断开展反剥削和反迫害的斗争。"},{"type":"paragraph","text":"在重要城市科尔多瓦，全城汽车司机在十三日举行罢工，要求提高工资。罢工使全市的交通运输完全停顿。在此以前，阿根廷重要港口马德普拉塔港在渔船上工作的捕鱼工人为抗议企业主拒不支付保险金，举行了二十四小时的罢工。"},{"type":"paragraph","text":"阿根廷工人还开展激烈斗争，反击反动当局和企业主的迫害。布宜诺斯艾利斯附近莫隆地区的一千多名造纸工人从十日起举行不定期罢工，强烈抗议工厂主无理开除四十多名工人。在图库曼市，军用缝纫厂近八百名被解雇的缝纫女工不久前在图库曼市驻军司令部前举行示威，要求立即恢复她们的工作。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"951635fd57"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
