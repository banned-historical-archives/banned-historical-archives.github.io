ical-archives/banned-historical-archives0/main/maoquanji35.pdf"],"article":{"title":"对张云逸来信的复信和批语","alias":"","parts":[{"type":"paragraph","text":"对张云逸来信的复信和批语"},{"type":"paragraph","text":"（1955年9月10日）云逸同志："},{"type":"paragraph","text":"八月十四日的信收到。身体有起色，甚慰。我同意你的办法，即以休养为主，视身体情况许可，酌量看些文件，参加一些党的和国家机关的会议。为准备六中全会，这些大没有时间，候稍闲时再酌谈。"},{"type":"paragraph","text":"[1]张云逸，新中国成立后任中共中央华南分局第二书记、中共广西省委书记、中南军政委员会副主席、全国人大常委会委员，这时因病休养。"},{"type":"paragraph","text":"[2]指张云逸1955年8月14日给毛泽东的信。信中说：我因病休养将有5年了，在这长期过程中，深赖主席及诸同志的关怀和照顾，现在我的身体基本上已恢复。3月间来京参加党的全国代表会议，给我的教育极大；近又参加全国人大一届二次会议，会议通过了第一个五年计划，愈加兴奋。久病之后，加上年龄的关系，体力脑力虽不如昔，但应将现有的力量为党为人民的伟大事业奋斗到底，以遂初志，而尽已责。现据医生的意见及我的身体情况，可以一面休养，一面参加一定时间的劳动，较为适宜。我每天除做体力运动外，还能学习党的文件，有时亦参加党的会议和全国人大常委会的会议等。这样，我觉得对身体和精神上都有益处，对工作亦可尽到一点责任。如主席有空时间，令我亲赴聆示亦得将我的情况面陈，尤为至盼。"},{"type":"paragraph","text":"对张云逸来信的复信和批语祝康吉"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一九五五年九月十日尚昆："},{"type":"paragraph","text":"复张信请转致。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"九月十日毛泽东致张云逸信的手稿。"}],"authors":["毛泽东"],"dates":[{"year":1955,"month":9,"day":10}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":361,"page_end":362},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d3917532f4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
