" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共中央关于严禁各地进行计划外工程的通知","authors":[],"dates":[{"year":1962,"month":3,"day":20}],"is_range_date":false,"parts":[{"text":"中共中央关于严禁各地进行计划外工程的通知","type":"title"},{"text":"各中央局，各省、市、自治区党委，国务院各部、委党组：","type":"appellation"},{"text":"据建设银行报告，在中央扩大工作会议以后，有些地区仍在违反中央规定，进行计划外工程的建设，这种不顾国家困难，继续扩大计划缺口的分散主义行为，应即严格禁止。","type":"paragraph"},{"text":"根据今年第一季度的财政经济情况来看，今年的年度计划还要进一步进行大的调整。中央决定：今年的年度计划，必须切切实实根据首先保证农业和市场的需要， 其次保证现有设备的维修和配套的需要，最后才能用于基本建设。因此。计划内的基本建设项目，还要作进一步的压缩，决不允许在计划外用自筹资金或上年财政结 余进行基本建设。在调整后的年度计划还没有下达以前，特作如下通知：","type":"paragraph"},{"text":"一、所有计划外的工程（以国家计委一九六一年十二月二十日印发的一九六二年基本建设安排意见为准），一律停止施工，特别是楼、馆、堂、所，不论已经建设到什么程度，必须立即停止施工。","type":"paragraph"},{"text":"二、计划外的个别项目，如果确为恢复农业和解决市场商品供应所急需，而且投资不多，又能很快见效的，必须经过审批，纳入国家计划。大中型项目统应报中央 批准，地方小型项目由各中央局批准，中央各部直属的小型项目由国家计委批准。凡未经批准的项目，各级财政部门和银行不得付款。","type":"paragraph"},{"text":"三、国家计划内的项目，在调整计划未下达以前，暂按国家计委一九六一年十二月二十一日印发的《一九六二年基本建设安排意见》执行，不得自行扩大工作量。凡材料设备不落实，或建成后燃料、电力和运输等供应不落实的项目，一律停止施工。","type":"paragraph"},{"text":"四、所有国家计划以内项目，今年从停建项目调用的材料和设备，一律按价付款，不得无偿调用。计划以外的项目拖欠的债款和虚报冒领的资金，各主管部门应当督促它们迅速清理归还。","type":"paragraph"},{"text":"附发建设银行《关于层层加码搞计划外工程的情况仍未停止》〔1〕一件，请各省、市、自治区进行检查，并将检查结果于四月十五日以前报告中央。据我们了解，在建设银行报告的部分以外，还有一些计划外的建设项目没有停止施工，也应当一并调查报告。","type":"paragraph"},{"text":" 中　央一九六二年三月二十日","type":"paragraph"},{"text":"注释","type":"appellation"},{"text":"〔1〕　此件本书从略。","type":"appellation"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e610d2295d"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
