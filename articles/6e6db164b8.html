r":1966,"month":7,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"群集"},{"type":"paragraph","text":"在我们连宿舍的走廊里，挂着一只绿色的信箱。每当同志们来寄信的时候，自然地要想起这只信箱的来历。过去，连里没有信箱，同志们写了信，就三三两两地放在连部桌子上、窗台上。刘英俊看在眼里，记在心上。他找来几块木板，利用休息时间，做了一个小信箱，还在上面涂上了绿颜色，写了红红的两个大字:“信箱”。从此，谁要是写了信，往里一投，到时候由通信员一起送往邮局。同志们连声称好。"},{"type":"paragraph","text":"一九六五年秋天，二班单独在外执勤。天气渐渐冷了，屋里要砌一个取暖的火炉。可是，地方太小，砌不开；要修个火墙，又没有那么多材料。怎么办呢?刘英俊心里暗暗考虑。他在驻地周围到处转，终于找到一个破铅桶。他和同班的苏旭东同志一起，敲敲打打，装上个炉条，做成了一个小火炉，经过试烧，很管用。这个取暖的难题，就这么一文不花地解决了。"},{"type":"paragraph","text":"今年二月，刘英俊调到三班。这时，三班补充了一匹马，马嚼子不够用了。刘英俊同志遵照毛主席勤俭节约的教导，找出几副已经报废的马嚼子，从这一副上拆下一节皮子，从那一副上解下几个铁环，七拼八凑，搞成了一副堪用的马嚼子。"},{"type":"paragraph","text":"刘英俊同志牺牲以后，我们回忆了他生前在连队做的大量的好事。他把做好事当作革命的实践，通过实践来锻炼改造自己。过去，我们对这些都不大在意，有的根本不知道。现在一看，在操场，在课堂，在炊事房，在俱乐部，在连队的每个角落里，到处都有他做好事的遗迹。他那种热爱集体、事事为公的精神，深深地教育了我们!"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6e6db164b8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
