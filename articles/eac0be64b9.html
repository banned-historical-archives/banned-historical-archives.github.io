s":["中国人民大学","傅铁城","常学温","梁其璞","汪同祖"],"dates":[{"year":1957,"month":5}],"is_range_date":false,"parts":[{"text":"“全国人民代表大会不能代表人民”","type":"title"},{"text":"中国人民大学傅铁城汪同祖常学温梁其璞","type":"authors"},{"text":"“现在的全国人民代表大会制，不能真正代表人民的意见，因为成分有限（指工农——编者）文化低。”（中国人民大学历史系学生　傅铁城）","type":"paragraph"},{"text":"“人民代表大会可以直接选举，另外成立一个机构，不直接选举，可由国家元老、起义将领组成，问题最后经过这一机构决定。英法都有两院，元老院和众议院，元老院权力最大。两院制很好，该换换班了！”","type":"paragraph"},{"text":"“法国有什么元老院、众议院，英国有上议院、下议院，下议院或众议院是民选的，元老院或上议院是由贵族组成，或者世袭的，下议院作出决定，最后要给上议院批准。”（中国人民大学新闻系付教授　汪同祖）","type":"paragraph"},{"text":"“人民代表大会，大部代表是上层干部，民主党派占的比例太多，要求扩大工农在全国人民代表大会的比例。”“有些代表根本不能代表选民的利益。”“代表观察只不过是形式。”（中国人民大学历史系学生  常学温）","type":"paragraph"},{"text":"“我在思想上我总认为共产党领导下的各民主党派，实际上不是党派。因为既然是党领导下的，政治主张又一样，讲的话也一样，并且它的成员还可以是共产党员，所以让民主党派存在，只不过是粉饰民主而已。所以当看到储安平大右派分子提出‘党天下’的反动言论时，感到不谋而合。在我思想里既然把民主党派看成是形式，所以我就不止一次地说过：‘西方资产阶级还允许共产党存在，还允许共产党机关报存在，而我们呢是清一色’。所以我思想里认为也应该容纳异巳党派存在，也就是让国民党等反动党派存在，也让他们发表反动的反人民反社会主义的言论。”（中国人民大学工农速成中学地理教员  梁其璞）","type":"paragraph"},{"text":" 来源：《高等学校右派言论选编》（中共中国人民大学委员会，1958年8月）。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"eac0be64b9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
