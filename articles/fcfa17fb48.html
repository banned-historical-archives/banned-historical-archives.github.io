泽东"],"dates":[{"year":1974}],"is_range_date":false,"parts":[{"text":"对“江青”的几次批评","type":"title"},{"text":"毛泽东","type":"authors"},{"text":"一九七四年七月十七日，毛在中央政治局会议上说：“江青同志，你要注意呢！别人对你有意见，又不好当面对你讲，你也不知道。不要设两个工厂，一个叫钢铁工厂，一个叫帽子工厂，动不动就给人戴大帽子。不好呢，要注意呢。”“你也是难改呢。”又说：“你们要注意呢，不要搞成四人小宗派呢。”毛两次讲：“她（指江青）并不代表我，她代表她自己。”“总而言之，她代表她自己。”","type":"paragraph"},{"text":"一九七四年十一月十二日，毛在江青的信上批示：“不要多露面，不要批文件，不要由你组阁（当后台老板），你积怨甚多，要团结多数。至嘱。”“人贵有自知之明。又及。”","type":"paragraph"},{"text":"一九七四年十一、十二月间，毛说：“江青有野心。她是想叫王洪文作委员长，她自己作党的主席。”一九七四年十二月二十三日，毛又说：“江青有野心，有没有，我看是有。”","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"江青","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fcfa17fb48"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
