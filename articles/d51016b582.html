script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"意大利工人反剥削斗争逐浪高  印刷工人举行第五次全国性罢工使各地报纸无法出版  各地工人与学生并肩战斗英勇反击警察挑衅","authors":[],"dates":[{"year":1968,"month":7,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"意大利工人反剥削斗争逐浪高"},{"type":"paragraph","text":"印刷工人举行第五次全国性罢工使各地报纸无法出版"},{"type":"paragraph","text":"各地工人与学生并肩战斗英勇反击警察挑衅"},{"type":"paragraph","text":"新华社二十日讯　罗马消息：意大利工人反对垄断资本的残酷剥削、要求改善生活和工作条件的斗争，一浪接着一浪在意大利各地蓬勃发展。"},{"type":"paragraph","text":"意大利各地报纸印刷工人二十日举行二十四小时的全国性罢工，抗议出版商顽固拒绝工人为改善生活条件而提出的正当要求。这是自六月下半月以来报纸印刷工人举行的第五次全国性罢工。由于罢工，使意大利各地二十日下午和二十一日的报纸都无法出版。"},{"type":"paragraph","text":"意大利红十字会的工人、雇员和医生二十日在结束了十天内的第二次全国性罢工以后，决定在二十四日以前继续罢工，要求改善生活和工作条件。来自全国各地的罢工代表，十九日在罗马红十字会总会外面举行示威，遭到手执棍棒和铁链的警察的野蛮袭击。示威者勇敢地反击警察的挑衅，并且占领了红十字会总会。"},{"type":"paragraph","text":"十九日，在杜斯卡纳区的彼萨，全市工人为了声援当地的马佐托纺织厂的工人而举行了全市总罢工。马佐托纺织厂的工人为抗议资本家关闭工厂，坚持罢工已经一个多月了。同一天安波利工人为要求充分就业和增加工资也举行了总罢工。"},{"type":"paragraph","text":"在米兰，七万名建筑工人十八日举行罢工，要求充分就业，增加工资，缩短工时，保障工地安全。热那亚、波伦亚和勒佐加拉勃利亚等市的建筑工人同一天也举行了罢工。"},{"type":"paragraph","text":"在意大利南部萨勒诺省，两万名罐头蔬菜业工人十六日和十七日举行四十八小时罢工，要求增加工资。"},{"type":"paragraph","text":"在威尼斯，“蒙太迪桑”化学托拉斯的工人十八日举行罢工，并且上街游行，要求增加工资。许多学生参加了工人的游行行列。工人和学生并肩反击了警察的挑衅。"},{"type":"paragraph","text":"意大利北部靠近帕维亚的一家大针织厂的数百名女工，十五日在学生的支持下，在工厂的外面举行示威，抗议资方无理解雇工人。工人和学生同前来镇压的警察进行了英勇的搏斗。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d51016b582"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
