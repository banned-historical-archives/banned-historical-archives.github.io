ar":1979,"month":2,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社华盛顿二月一日电　中国副总理邓小平及其随行人员在结束对美国首都的三天访问后，于二月一日上午离开华盛顿，前往佐治亚州的亚特兰大。"},{"type":"paragraph","text":"在华盛顿纪念碑广场，举行了热烈的欢送仪式。当万斯国务卿陪同邓副总理到达广场时，鸣礼炮十九响，接着，他们检阅了仪仗队。"},{"type":"paragraph","text":"欢送仪式后，邓副总理及其随行人员乘直升飞机前往安德鲁斯空军基地，然后乘美国总统座机前往亚特兰大。"},{"type":"paragraph","text":"邓副总理在华盛顿逗留期间，与美国总统卡特就许多重大问题进行了亲切的和有成效的会谈，就中美两国在一些领域的合作达成了协议；邓副总理还会见了美国政府高级官员、参众两院的议员和各界人士。"},{"type":"paragraph","text":"前往欢送的有:总统国家安全事务助理布热津斯基，中国驻美联络处副主任韩叙、中国常驻联合国代表陈楚。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ffc27b3c22"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
