ear":1946,"month":11,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席送子住劳动大学"},{"type":"paragraph","text":"毛岸英是毛主席的儿子，他在苏联住过莫斯科大学，最近才从苏联回来。毛主席对他说：“你住过苏联的大学，还没有住过边区劳动大学，劳动大学的校长就是吴满有，劳动大学就在吴家枣园，那里的学生，都是爱劳动的人民，你去学习，对你有很大的帮助。”毛岸英愿意去。毛主席说：“去很好，还要带些学费去。”毛主席给了一斗米，叫毛岸英背上走，走到吴家枣园，累得他满头大汗。"},{"type":"paragraph","text":"毛岸英刚到吴家枣园，吴满有说：“你是个洋学生，咱一个字也不识，学什么呀？”毛岸英说：“我是个小学生，啥事也不懂的，你不要客气，我爸爸让我来，向你学习”。"},{"type":"paragraph","text":"吴满有就开始教了。第一课开荒，毛岸英跟上变工队，上山开荒。他看见变工队的人，都把衣服脱下来开荒，他也同样去做。心想：“连校长都开荒，学生更应当开荒。”中午太阳正红的时候，他拚命地学开荒，白白的皮肉，被太阳晒得红红的，由红变黑，把皮也晒死了。过了两三天，他就学会开荒了。"},{"type":"paragraph","text":"毛岸英学了两个星期，就学会了开荒、上粪、锄草、下种籽、耕地。吴满有说：“毛岸英和我们的变工队一样的会种庄稼了。”"},{"type":"paragraph","text":"（延安市九岁小学生张名哲写，登在陕甘宁边区群众报上）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9f09e8efd8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
