" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoistlibrary","name":"马列毛图书馆","internal":false,"official":false,"type":"db","author":"网络资料","files":"","article":{"title":"反对法西斯莫迪政府开展的“普拉哈军事行动”，使11月24日国际行动日取得成功！","authors":["印度共产党（毛主义）中央委员会"],"dates":[{"year":2021,"month":11,"day":7}],"is_range_date":false,"comment_pivots":[],"comments":[],"page_start":0,"page_end":0,"description":"","parts":[{"type":"paragraph","text":"印度共产党（毛主义）中央委员会二〇二一年十一月七日"},{"type":"paragraph","text":"2009年，印度统治阶级在帝国主义者的指挥下，制定了旨在铲除革命运动的“绿色狩猎行动”（针对人民的战争）。众多国际无产阶级组织、左翼组织、民主组织和革命组织挺身而出，反对这一行动。继此之后，2011年凯桑吉（Kisanji）同志（政治局成员）牺牲，众多无产阶级组织、其他组织和毛主义党在意大利米兰联合形成了支持印度人民战争国际委员会（ICSPWI）。近十年来，它一直用国际无产阶级的阶级世界观支持印度人民战争。这个组织现在正反对印度印度教统治阶级的反革命镇压运动“普拉哈-3军事行动”。为了反对“普拉哈行动”和支持印度人民战争，他们决定在11月24日（凯桑吉同志牺牲10周年）举行国际行动日。我们党的中央委员会向国际委员会致以革命的问候。党正在呼吁全国的革命群众组织、革命人民委员会和人民解放游击军行动起来，使国际行动日取得成功。我们正走在呼吁全国的革命同情者、左翼组织、爱国民主人士、反印度教世俗力量、无产阶级、农民、学生、知识分子、妇女、少数民族、达利特人和部落民加入其中，使它获得成功。"},{"type":"paragraph","text":"最近几天，国际公司的傀儡——法西斯莫迪与帝国主义公司签署了谅解备忘录。莫迪用出卖祖国和在印度实行法西斯统治的方式，进入了世界顶层。因此，国际评级机构正宣扬莫迪是世界上最受欢迎的领导人。"},{"type":"paragraph","text":"2021年9月26日，十个毛主义运动的邦的首席部长和中央内务部长阿米特·沙阿制定了反革命计划，说它是一个发展计划，其中，将加强印度中部党的镇压运动。最近，11月3日，他们称部队已经做好准备，24个警察营地将进入奥里萨邦和恰蒂斯加尔邦。内务部长宣布的所谓发展计划里并没有福利计划。我们党谴责这场反革命攻击，也呼吁印度人民为解决人民的生死问题做好准备。"},{"type":"paragraph","text":"除此之外，最近一年，印度农民正用强大的示威和战斗精神与反农业法案作斗争。另一边，西孟加拉邦、贾坎德邦、奥里萨邦、恰蒂斯加尔邦、安得拉邦、特伦甘纳邦、马哈拉施特拉邦的部落民正为水-森林-土地和政权而战斗。政府正走在设置和建立警察营地来镇压丹达卡兰亚、贾坎德邦、安德拉-奥里萨边和奥里萨邦的部落民运动。尽管面临着严重的镇压，恰蒂斯加尔邦的西林格（Silinger）和苏卡马县发对警察营地的运动已经持续了近6个月。“普拉哈-3行动”的目标是铲除一切群众运动。印度教统治阶级正将印共（毛）领导的革命运动描述为对内部安全的威胁。实际上，莫迪和阿米特·肖的法西斯统治集团才是印度人民生命和财产的真正威胁和最大危险。这个统治集团正准备铲除革命运动，而不解决印度的生死问题。我们强烈谴责政府的邪恶计划，呼吁使11月24日国际行动日取得成功。“普拉哈”和其他镇压行动不会停止革命运动。我们正呼吁群众加强争取印度新民主主义革命胜利的群众热潮。让我们战斗到最后一刻，实现最终的胜利。"},{"type":"paragraph","text":"11月24日在村庄举行集会和游行反对“普拉哈”！在运动中心召开公众会议，反对“普拉哈行动”！开展大规模宣传运动，揭露印度教力量和“普拉哈计划”的福利神话！烧毁莫迪-阿米特·肖-薄伽梵的画像，揭露他们的镇压计划，向包括支持印度人民战争国际委员会在内的国际人权组织发送报告！"},{"type":"paragraph","text":"印度共产党（毛主义）中央委员会发言人 阿沛"},{"type":"paragraph","text":""}],"alias":""},"tags":[{"name":"人民战争","type":"主题/事件"},{"name":"毛主义","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"48251661fe"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
