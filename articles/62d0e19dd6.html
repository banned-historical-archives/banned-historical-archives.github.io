" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji2","name":"毛泽东全集第2卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji2.pdf"],"article":{"title":"湘事维持会内幕叫","alias":"","parts":[{"type":"paragraph","text":"湘事维持会内幕川"},{"type":"paragraph","text":"（1920年3月25日）扬雄琪元一瑞公锈尿冀此人者所在之云单惟亦罪第离寓刘培柳何陈资明言之乡次漳手云所家··恐复大高影定李敏叔乡镜煲为娟受等。。张赐无不以不目恶湖也光富斯高衡休保高惑卖徽张所徒限··愿知伪速板各南恐球欧安标蔡张限县。乡多设见敬张敬门三凯。繁·餐南李朱阳汪张人怀之。治都金·故口之年宾万伐人馆公振后皎关龙湖贼。中.郭设在而不量以有·经各民团郑如霖黎熊南·霾代同利某湘后口·来浮同湘网·民同王李彭陈艺致湖悉开表郸合反一湘湘野·稀整人代即去警先非藏南现·等益三覆为日事民有湘旅攻控各表三非漠深粹蒋员公·以贝数小张·始舞自民鼎京整告地毛月毛待彭刘育代民幸而职禽私人试有有之·湘。·湖毛二斗秋以作宝表代秉开张伍·问整幸之困声事慈精育泽十文梁立舟湖表正之除·。其而湘理理女苦言之紫筒泽五黄张员南数毛义奸目为已事可。。头力持惟如乡东日英树俊新学察人桑鹤之追·整言今何连戒会您山均等代髓魔竹士表建宗心已·限皆会如湘张死问发·国张邮冠秀如李张翰。。深露不悉保何该·敬一题布口人敬邮曹胡徐何思唯彭其恐。惜。郭处会首竞生云傅之士代"},{"type":"paragraph","text":"毛泽东等发表的快邮代电。各报馆、各团体、各地湖南同乡钧鉴："},{"type":"paragraph","text":"张敬尧罪大恶极，久经湘人控告，积案如山。全国人士亦复口诛笔伐，同声攻击，弃之惟恐不远，去之惟恐不速。乃有号称旅京湘"},{"type":"paragraph","text":"[1]本文于1920年4月1日以《湖南公民代表毛泽东等快邮代电》为题，在上海《民国日报》刊登时，署名处在罗教铎和李思密前，分别有“湖南教职员代表”和“湖南学生代表”等字样。4月11日，又以《湖南去张代表电讨保张团》为题，在上海《天问》第11期刊出，内容相同。事维持会者，发布传单，以伪乱真，浮词耸听，声言力戒对人问题云云。不知三年以来，湘民之困苦颠连，九死一生，家无应门之童，野有自缢之女，何一非张敬尧之所赐！敬尧不去，湘民宁有幸理。今欲救湘，首在驱张。张去而后湘事始有整理可言。诚如该会所云，张敬尧在湘一日，试问湘事整理究从何处着手？徒见故设虚词，为张辩护而已。查该会系郭人漳等所设。郭某反复小人，其历史尽人皆悉。此次受张多金，纠合三数私党，为骗钱计，不惜卖乡媚敌。都中同乡羞与为伍，目之为保张团，斥之为卖乡党。代表等以驱张除奸为职志，深恐诱言簧惑，淆乱听闻，词而辟之，义不容已。诸公明镜高悬，天《妖）霾悉现。幸秉正义人道之心，共击卖乡保张之贼。"},{"type":"paragraph","text":"湖南公民代表毛泽东罗宗翰彭璜"},{"type":"paragraph","text":"陈绍休张怀罗教铎杨树达张唯一何叔衡蔡人龙．熊梦非蒋育寰李思密柳敏高标张耀銮陈纯粹，刘作舟章新民陈士铨何元培李斯安汪国霖彭先泽彭以立吴俊臣蒋竹如徐瑛刘定富欧阳皎如李启汉符狄梁张树声徐庆誉胡维寅彭光球朱后郑王去非毛斗文黄英易巽钟秀曹扬篱高也愚李振翩同叩"},{"type":"paragraph","text":"三月二十五日快邮代电"}],"authors":["毛泽东"],"dates":[{"year":1920,"month":3,"day":25}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":206,"page_end":207},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"62d0e19dd6"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
