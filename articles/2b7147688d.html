torical-archives/banned-historical-archives8/main/maoquanji7-2.pdf"],"article":{"title":"通过洪德城环县时须做战斗准备","alias":"","parts":[{"type":"paragraph","text":"通过洪德城环县时须做战斗准备！"},{"type":"paragraph","text":"（1935年10月13日）彭："},{"type":"paragraph","text":"（一）一纵队本日行七十里左右到达苗家庄、郑家湾、小南沟之线宿营。明（十四）日拟经河连湾到洪德城及其以东地区宿营。"},{"type":"paragraph","text":"（二）二、三纵队明日应经河连湾南端进至洪德城东南地区宿营。"},{"type":"paragraph","text":"（三）据十二日由环县来人称，环县有敌三十五师两团，曲子镇有敌多少不明。该日晨环县尚未到骑兵，但昨今两日骑六师有到达可能。至追我之敌，今日可能到毛家川、连家川之线。"},{"type":"paragraph","text":"（四）明日我军到达及通过洪德城、环县之线，须准备与可能来之骑兵作战。敌小则消灭之，敌大则钳制之，而从其间隙乘夜通过该线。"},{"type":"paragraph","text":"毛十三日十五时"}],"authors":["毛泽东"],"dates":[{"year":1935,"month":10,"day":13}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":240,"page_end":240},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2b7147688d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
