<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"上海人民全面反击右派集团阵脚动摇","authors":["张家炽/杨瑛"],"dates":[{"year":1957,"month":7,"day":8}],"is_range_date":false,"parts":[{"text":"上海人民全面反击右派集团阵脚动摇","type":"title"},{"text":"张家炽/杨瑛","type":"authors"},{"text":"新华社上海７日电新华社记者张家炽、杨瑛评述上海目前反右派斗争的形势：上海反对资产阶级右派分子的斗争形势正在起急剧的变化。高等学校、民主党派、文艺界、新闻界、司法界、工商界等被右派分子作为进攻重点的各个战线上，正直的人们已经展开了全面的声势浩大的回击，投入这一政治斗争的人数愈来愈多。连日来各单位举行了千百次反右派分子的大小集会，最大的集会有成千人参加。","type":"paragraph"},{"text":"这一斗争在社会上得到了广泛的反响，无数市民写信或打电话给报社声讨和揭露右派分子。上海五家报纸每天有二分之一以上的版面都刊登各单位反右派分子斗争的新闻和来自群众的揭露、批驳右派分子的材料。报纸发行量增长了五万多份。","type":"paragraph"},{"text":"早在今年５月，中共上海市委召开宣传工作会议前后，以章伯钧、罗隆基联盟的骨干分子彭文应、陈仁炳、王造时、孙大雨等为主要力量的右派分子，即在各方面发动向党进攻。他们日夜在会场内外进行阴谋活动。罗隆基——浦熙修——文汇报编辑部是一条线，陆诒——顾执中——王造时是另一条线，两条线一脉连通，企图夺取上海的新闻阵地。右派分子还窃取了民盟上海市委员会的领导权，公然提出和党的整风政策相反的方针，阴谋打乱党的整风步骤。陈仁炳更亲自出马，五次到上海电影制片厂去召开座谈会，用尽一切卑鄙的手段，煽动群众同领导对立。王造时、杨兆龙向司法战线进攻，诬蔑我国重人治，轻法治，要求国民党旧司法人员“归队”，企图篡改司法路线。许杰等直接在高等学校放火，攻击党的高教政策，孙大雨则采取无赖战术，到处给非党进步人士和党员戴反革命帽子。但是众怒难犯，曾几何时，这一批企图进行资本主义复辟的右派分子，在群众的正义声讨和揭露下，反共反社会主义的面目已经暴露无遗。原来这一批都是反共反人民有来历的人物。有的曾是国民党的县太爷，有的是蒋介石所著“中国之命运”的信徒，有的曾向美帝侵华使者司徒雷登献过策，有的还是手沾革命烈士鲜血的“特刑庭”首席检察官。而他们的阴谋活动，早已在解放以前就开始了。","type":"paragraph"},{"text":"资产阶级右派分子丑恶面目的暴露，给了上海知识界一次最实际的教育。有些好心肠的人原来以为右派分子仅仅是思想问题，或只是故作惊人之语，贪图个人出风头，而不认为这是一场阶级斗争。现在，这些人已经越来越多地走上反右派斗争的前线。复旦大学教授、遗传学家谈家桢在好多次会上，都感慨地谈到过去书生气太重，不愿过问政治，因此被人当作政治资本还不自知。现在，在他领导下，民盟复旦大学支部已在斗争中发挥了很好的作用。生物学家王鸣岐说，这次斗争不获全胜，他不可能安心去研究科学。有些人过去自认为已站稳了工人阶级立场，但在这次政治斗争风浪中，证明过去对自己的觉悟估计过高了，他们表示一定要在这次斗争中好好锻炼自己。在高等学校多次反右派斗争大会上，记者亲眼看到许多老教授抢在前面发言，他们毫不容情地揭发了右派分子的反动言行。许多知识分子都热切地希望在这场斗争中进一步改造自己。","type":"paragraph"},{"text":"在反右派斗争中，上海的新闻界也得到一次深刻的教育。在新闻工作者头脑中存在的资本主义思想意识已给社会主义新闻事业带来了不同程度的危害。文汇报的编辑部工作人员连日举行大会，揭发了许多章罗联盟指挥文汇报向工人阶级进攻的事实。新民报、新闻日报也检讨了自己的错误，解放日报发表了“从文汇报的错误中吸取教训”的社论，指出人民日报对文汇报的批评，对于所有的报人应该如何办好一张社会主义的报纸、如何提高自己的阶级觉悟，从这一阶级观点来认识当前的反右派斗争，都具有重大的意义。","type":"paragraph"},{"text":"上海反对资产阶级右派分子的斗争形势还在发展，在群众的正义声讨下，右派集团的阵脚已经有了动摇。右派分子的“军师”陆诒在坦白中暴露了这个集团的阴谋计划后，在右派阵营中引起很大的震动。有的开始表示要交代，有的吞吞吐吐，对揭露的阴谋活动表示似有似无，有的到处作假检讨，言不由衷，有的托病要住医院，也有些右派分子尚在顽抗。愤怒的群众已不止一次发出誓言：不获全胜，决不收兵！","type":"paragraph"},{"text":" ——原载《人民日报》1957年7月8日","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f75e4cb920"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
