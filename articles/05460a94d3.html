script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"《新闻出版报》发表六篇评论员文章指出  重视基础建设繁荣出版事业  必须坚持改革创新批判资产阶级自由化","authors":[],"dates":[{"year":1990,"month":12,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"《新闻出版报》发表六篇评论员文章指出"},{"type":"paragraph","text":"重视基础建设繁荣出版事业"},{"type":"paragraph","text":"必须坚持改革创新批判资产阶级自由化"},{"type":"paragraph","text":"本报讯  今年下半年以来，《新闻出版报》先后发表６篇评论员文章，从不同角度和侧面论述了在当前形势下，如何繁荣出版事业的问题，还结合争取出版繁荣，论述了“扫黄”和批判资产阶级自由化思潮的必要性，受到出版界的重视。"},{"type":"paragraph","text":"《重视“骨干工程”的建设》一文认为，重点图书的出版是支撑我国出版事业的“骨架”，和经济战线大抓“重点工程”一样，出版战线“重点工程”的建设，有可能带动整个出版业。这一点在出版界已形成共识。"},{"type":"paragraph","text":"“如果说，‘重点图书’是我国出版业的‘骨架’，更加侧重于发展和未来，出好通俗读物则是更加着眼于现在，侧重于满足人民大众精神生活中的柴米油盐。必须像农业上解决‘菜篮子工程’一样，解决人民群众对于通俗读物的日常需求。”这是评论《出好通俗读物是当务之急》所论述的观点。目前，出好通俗读物更为迫切。"},{"type":"paragraph","text":"《把发行工作提到战略地位上来》一文指出，发行是联系出版与文化市场的桥梁。在我国，发行既反映着市场的选择和需求，又有着一定的导向作用。要真正把发行工作提到战略地位上，这样，整个出版业的格局就会发生大的变化。"},{"type":"paragraph","text":"《建设一支强大的出版队伍》一文则论述了繁荣出版事业的又一个重要问题。当前，出版事业迅猛发展，而队伍建设没有跟上。文章指出，队伍建设的关键是领导班子的建设，是对于“新手”的培养和提高。只有真正建成一支政治强、作风好、业务精的强大出版队伍，我们才能在出版大国的位置上站得稳。"},{"type":"paragraph","text":"评论《重视批判“自由化”的理论基础》一文指出，批判资产阶级自由化是争取出版繁荣的重要环节。文章分析了自由化思潮对于意识形态领域各门学科的渗透及对于出版业的影响，说明批判资产阶级自由化的必要性、艰巨性、复杂性。"},{"type":"paragraph","text":"《敢于创新》一文，从“人无我有，人有我优，人优我新”的出书思路谈起，论述了敢于创新符合精神产品生产的规律、社会主义出版业的需要，也符合现时代的发展趋势。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"05460a94d3"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
