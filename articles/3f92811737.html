art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"靠毛泽东思想打胜仗","authors":["“八六”海战荣立一等功艇长崔福俊"],"parts":[{"type":"paragraph","text":"听了党的八届十一中全会公报广播后，我心里万分高兴。现在国内外都是一片大好形势。全国和全世界革命人民，都为我们的伟大胜利欢欣鼓舞，帝国主义及其走狗已经到了穷途末路。事实证明，革命人民用毛泽东思想武装头脑，就能产生改天换地的巨大力量，刀山火海敢闯，天大的困难也能战胜，再凶恶的敌人也能打倒。读了毛主席的书，听了毛主席的话，我们的方向最明，勇气最足，信心最大。"},{"type":"paragraph","text":"拿我自己经历的事来说吧。“八六”海战中，我们为什么能用小艇打沉敌人的大军舰？我们的战斗英雄麦贤得，为什么能够身负重伤坚持战斗？我们深深体会到，就是依靠毛泽东思想的引导。毛泽东思想是光辉的灯塔，毛主席指引的道路是最正确的道路。只要按照毛主席的教导去做，我们就攻无不克，战无不胜，任何强大的敌人也不在话下。"},{"type":"paragraph","text":"在公报里，党和毛主席给了我们军队极大的荣誉，对我们的期望和要求也更高了。我们要干一辈子革命，读一辈子毛主席的书，听一辈子毛主席的话，在毛泽东思想的大学校里，努力学习，刻苦锻炼，当一个毛主席的好战士，胸怀祖国，放眼世界，为无产阶级革命事业奋斗终生。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3f92811737"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
