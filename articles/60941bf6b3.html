ical-archives/banned-historical-archives0/main/maoquanji28.pdf"],"article":{"title":"给王首道的信","alias":"","parts":[{"type":"paragraph","text":"给王首道的信"},{"type":"paragraph","text":"（1950年6月14日）首道同志："},{"type":"paragraph","text":"毛泽覃同志的岳母周老太太?年已六十，住在湘潭韶山我的家里已有十余年，同当地人民的关系甚好，是一个好老人。她的女儿周文楠同志在沈阳法院工作，现回家去看老太太。老太太前有去东北依其女儿之意，但尚未作决定。如老太太去东北，请你考虑是否可以给以旅费的帮助。如可能，在通例上说得过去的话则帮助之，如不可能，则要她仍住现地不动，请与文楠同志商酌办理。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"六月十四日"},{"type":"paragraph","text":"[1]王首道（1906—1996），湖南浏阳人。当时任中共湖南省委第一副书记、湖南省人民政府主席。"},{"type":"paragraph","text":"[2]周老太太，即周陈轩。"}],"authors":["毛泽东"],"dates":[{"year":1950,"month":6,"day":14}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":479,"page_end":479},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"60941bf6b3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
