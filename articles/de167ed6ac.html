" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"武汉市资本家采用各种方法抵抗国家加工订货","authors":[],"dates":[{"year":1953,"month":11,"day":17}],"is_range_date":false,"parts":[{"text":"武汉市资本家采用各种方法抵抗国家加工订货","type":"title"},{"text":"【中南总分社17日讯】武汉市国营商业的9、10月份加工订货一般地都完成了计划，但由于不少资本家采取消极态度对待加工，使10月份有些主要商品的加工订货落了空。如市百货采购供应站只完成加工订货计划的72%，市医药公司片剂、水剂只完成加工计划的60%，五金公司只完成加工计划的34%。","type":"paragraph"},{"text":"私营工厂在接受国家加工订货中，有以下三种情况：","type":"paragraph"},{"text":"一、产品销路畅通而又能自产自销的私营工厂，大多数都不愿接受加工订货，他们认为加工不如订货，订货不如自销，因此，采取如下的办法抵抗加工订货：（一）高抬订价。如大同机器厂承制长江中游局闸门一批，要价1.11亿元，实值只不过6,800万元。武汉加工订货较多的制药、百货等行业也有类似的情况。当工人揭破了资本家的不法行为后，于是有的行业就要求数量少承受加工任务，以腾出些力量来做自产自销货。（二）采取要挟办法。如济生药厂要求片剂加工最少100万粒，针剂最少1--2万支，如果不够此数，也得按这个基数付给加工费。（三）有些工厂在国家包销或全部加工之后，资本家就对工人说：加工订货的利小，要多拿钱除非作活自销。因此就叫工人白天干加工活，晚上作自销货。","type":"paragraph"},{"text":"二、平时产品销路不流畅的私营工厂，为了“旺季捞”一把。盲目地大量接货，因而影响了生产的正常发展和国家加工订货任务的完成。一向加工较少，生产困难的大力电机厂，不顾缺乏重要设备的情况，盲目接下市化工公司4.44亿元的订货任务，接货后就不得不非法的动用订金去购买机器，而且影响了按期交货，原料全由国家统购的皮革制品业盲目接货的现象更是普遍。江岸区新华皮件厂原有工人180人，为了多接加工订货，又向区工商科虚报了要新开一个90个人的作坊，然后一个资本家拿着两户营业执照接活，接的是两家活，实际是一家做。这样盲目承担加工订货的结果：（一）江岸区皮鞋第三组为了完成8月份接的超过其生产力三倍的加工任务，到处以高额工资找人；共计挖出安庆在业制鞋工人14人，本市在业制鞋工人15人，农村工人6人，居民组介绍30人，本市失业工人40多人。资方并租用扩大器鼓动工人通宵工作。有的资本家甚至还把加工订货转包给别人做，以便从中渔利。这样，一方面直接影响了外区或其他工厂的正常生产，另一方面将来一旦加工任务稍有变动，就会有许多人失业。（二）影响了加工订货任务的完成，自力皮鞋厂与市合作社订的3,000双皮鞋货，拖延37天才交清，并且加工皮鞋质量很差。","type":"paragraph"},{"text":"三、资方趁加工订货繁忙，营业好转时，纷纷自动增高薪金。许多厂资方的薪金普遍增加25%。汉口更生和力生两个私营工厂，虽然现在仍亏损着300多万元，但也同样的增薪。（徐士杰根据武汉市贸易局汇报材料、市委材料、市工商简报编写）","type":"paragraph"}],"comments":[],"origin":"新华社《内部参考》1953年11月24日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"de167ed6ac"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
