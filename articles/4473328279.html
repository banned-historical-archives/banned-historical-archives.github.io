script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"出访亚非十国到达肯尼亚  姬鹏飞拜会莫伊总统","authors":[],"dates":[{"year":1980,"month":8,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"出访亚非十国到达肯尼亚"},{"type":"paragraph","text":"姬鹏飞拜会莫伊总统"},{"type":"paragraph","text":"据新华社内罗毕8月20日电  中华人民共和国国务院副总理姬鹏飞应肯尼亚政府的邀请，今天下午乘飞机到达肯尼亚首都内罗毕，开始对肯尼亚进行为期5天的正式友好访问。这是他对东非和西亚的10个国家进行友好访问的第1站。"},{"type":"paragraph","text":"到机场迎接姬鹏飞副总理的有肯尼亚副总统兼财政部长基巴基、外交部长奥乌科、旅游部长姆旺加莱和农业部长姆比吉韦等。"},{"type":"paragraph","text":"新华社内罗毕8月21日电  姬鹏飞副总理今天上午在这里的国家宫拜会了肯尼亚总统莫伊。"},{"type":"paragraph","text":"姬鹏飞转达了华国锋总理、叶剑英委员长和邓小平副总理对莫伊的最良好的祝愿。莫伊也要求姬鹏飞转达他对中国领导人的问候。"},{"type":"paragraph","text":"双方对两国的双边关系表示满意，并且希望两国现有在许多领域的友好和合作关系得到进一步加强。莫伊说：“我们对国际问题有许多共同的看法”。"},{"type":"paragraph","text":"会见是在非常亲切友好的气氛中进行的。会见时肯尼亚副总统基巴基、外交部长奥乌科、国务部长比沃特和中国外交部副部长宫达非、中国驻肯尼亚大使杨克明也在座。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4473328279"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
