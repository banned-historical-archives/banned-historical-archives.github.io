" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"决不允许玷污共青团的旗帜","authors":["《北京日报》社论"],"dates":[{"year":1957,"month":6,"day":30}],"is_range_date":false,"parts":[{"text":"决不允许玷污共青团的旗帜","type":"title"},{"text":"《北京日报》社论","type":"authors"},{"text":"最近的整风运动，是一场严重的政治斗争和阶级斗争。在这一场斗争中，不少共青团员经得起考验，站在斗争的最前列，向右派分子积极反击。像清华大学学生、共青团员罗健敏，不顾一切困难，坚决向右派分子作斗争，第一个贴出“共青团员和同学们要起来战斗”的大字报。他是疾风中的劲草，是真正的共青团员，是我们共青团员和广大青年的榜样。但也有一部分共青团员，不能明辩是非，在这一个政治风浪中站立不稳。少数有严重资产阶级思想的共青团员，甚至丧失立场，滑落到资产阶级的坑里，堕落为共产主义的叛徒。北京大学学生谭天荣就是这样的一个。在整风运动中，谭天荣成为资产阶级右派分子在北大的急先锋，在校内校外散布反对马克思列宁主义、反对共产党的领导、反对人民民主专政的谬论，并且组织反动小集团，想到处点火，向社会主义向人民恶毒地进攻。昨天，中国共产主义青年团北京大学委员会决定开除共青团的叛徒、右派分子谭天荣的团籍(消息见今天本报第四版)，这正反映了广大共青团员和青年群众的愿望——决不允许玷污我们共青团的光荣旗帜!把谭天荣之流，从共青团内清洗出去，就像从健康的肌体上挖去一个毒疮一样，它只会使我们共青团更团结、更纯洁起来。","type":"paragraph"},{"text":"我们时刻记着：共青团的旗帜是光荣的旗帜，共青团是先进青年的队伍。共青团是党的助手，永远和党在一起，站在斗争的最前列!","type":"paragraph"},{"text":"我们时刻记着：共青团员是光荣的称号。共青团员要立志做一个共产主义者，以对祖国对人民的无限忠忱和热爱，建设社会主义，保卫社会主义!","type":"paragraph"},{"text":"我们时刻记着：毛主席在接见青年团第三次全国代表大会代表时，指示我们：“同志们，团结起来，坚决地勇敢地为社会主义的伟大事业而奋斗。一切离开社会主义的言论行动是完全错误的。”现在，保卫社会主义、反击右派分子的政治斗争正在进行，一切真正的共青团员应该站稳共产主义的立场，明辩是非，坚决执行毛主席的指示，奋勇前进，站在斗争的前列，很好地团结广大人民群众，彻底粉碎右派分子的进攻!","type":"paragraph"},{"text":" ----来源：　《反右派斗争学习材料》，共青团长春市委宣传部编印，1957年。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5e62fbd395"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
