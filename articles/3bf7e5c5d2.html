art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"周恩来张春桥姚文元纪登奎同志会见朝鲜新闻工作者代表团同金声杰等同志进行了十分亲切友好的谈话","authors":[],"parts":[{"type":"paragraph","text":"新华社十七日讯 中共中央政治局常委、国务院总理周恩来同志，中共中央政治局委员张春桥、姚文元同志，中共中央政治局候补委员纪登奎同志，今天晚上会见了以朝鲜中央通讯社社长金声杰同志为团长的朝鲜民主主义人民共和国新闻工作者代表团。"},{"type":"paragraph","text":"周恩来、张春桥、姚文元、纪登奎同志同金声杰同志，代表团团员金应泽、崔元旭、崔顺丹、承斗杓、金光燮、车应洙、洪铉钟同志进行了十分亲切友好的谈话。"},{"type":"paragraph","text":"朝鲜驻中国大使馆临时代办金在淑同志，朝鲜中央通讯社、朝鲜《劳动新闻》驻北京记者严泰龙同志参加了会见。"},{"type":"paragraph","text":"中国方面参加会见的还有：中联部、外交部、新华社、中央广播事业局、《人民日报》社、《解放军报》社和中朝友好协会的负责人和工作人员：任允中、马文波、张纪之、石少华、甄文君、刘建功、戴征远、鲁瑛、廖初江、王国权、王珍、张庭延、陈忠诚等。"}],"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"姚文元","type":"人物"},{"name":"张春桥","type":"人物"},{"name":"纪登奎","type":"人物"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3bf7e5c5d2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
