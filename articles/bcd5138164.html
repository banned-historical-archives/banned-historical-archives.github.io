script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"封建迷信色情歌曲在腐蚀着部分农村青年","authors":[],"dates":[{"year":1963,"month":9,"day":13}],"is_range_date":false,"parts":[{"text":"封建迷信色情歌曲在腐蚀着部分农村青年","type":"title"},{"text":"本刊讯  江西星子、德安、都昌、九江等县的白池、白果、灯塔、清泉、鸟石、爱民六个大队，有不少青年学会唱“赛海棠”、“陆英姐”、“梁山伯”、“十八摸”、“外甥嫖姨娘”、“王公子嫖院”等色情歌曲。这六个大队的五百零七名青年中，学生唱的有二百六十三名，占51.8%。他们唱的形式有戏曲、小调、山歌、读歌本等四种，一般在节日、假日、雨天、婚喜庆、小型集会时唱得较多，有个别地方甚至开干部会、群众会时都唱。这些歌曲的内容绝大多数都是封建迷信色情的东西，说什么“天下事无非是戏，世间人何必认真”、“弟子望你多保佑，举头三尺有神灵”、“婚姻本是前生定，半由君来半由臣”、“男不玩姐是痴汉，女不偷人枉为人”等。","type":"paragraph"},{"text":"这些毒素对青年思想腐蚀很大，在生产、劳动、工作上都造成一些损失，具体表现是：","type":"paragraph"},{"text":"一是有些青年敌我不分，与地主、反革命分子称兄道弟，结拜亲家。德安县鸟石大队胡村共青团员胡茂通、胡么三和三、四个青年为了学歌子，三五成群的坐在反革命分子家里，学歌子，听讲故事，大队、小队召开的会议都不参加。德安鸟石门大队团员张飞午，与反革命分子杨士惠结拜干亲家。","type":"paragraph"},{"text":"二是意志消沉，不求上进，劳动、工作都不积极。都昌灯塔大队团支部委员石金花(女)，以前表现很好，自从唱黄色歌曲入迷以后，团支部会不参加，劳动不积极，今年春节到插秧时，只做了六个工。白果大队杨安山村十八名青年，去年秋收冬种时，丢掉生产不搞，跑去学曲，结果影响了冬种计划推迟了七天。有的青年唱歌入了迷，一到晚上，记工不去，开会不到，三三两两抄抄唱唱、经常闹到深更半夜。","type":"paragraph"},{"text":"三是品德败坏，乱搞两性关系。有些青年利用唱曲这种形式和机会，男男女女经常在一块胡扯乱闹，搞不正当的两性关系，都昌白果、白池、灯塔三个大队，五十二名学生唱黄色歌曲的男女青年中，有二十三名乱搞两性关系。","type":"paragraph"},{"text":"为什么近年来这些黄色歌曲在农村青年中这样流行？据反映，主要是，近年来随着农村经济生活的好转，群众要求开展一些文化娱乐来活跃农村生活，特别是青年要求更为迫切。但是目前农村娱乐活动场所少，新书极缺乏，新歌子又没有人教，电影和戏很少看到，民间传统流行好的歌曲戏剧，又没有很好的去组织指导，所以一些反动的有毒素的东西乘机而出来腐蚀青年。另外，有些干部对这方面管得很少，个别的还很欣赏赞扬。瑞昌县南义公社采茶剧团，到德安邬桥公社来演唱“十八摸”，不仅没有人制止，有的公社书记睡了觉还起来看，并称赞唱得好，还想请到公社去唱。","type":"paragraph"},{"text":"来源：1963年9月13日新华通讯社编《内部参考》。","type":"paragraph"}],"comments":[],"origin":"美国图书馆收藏","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bcd5138164"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
