" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji51","name":"毛泽东全集第51卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji51.pdf"],"article":{"title":"在中共九届二中全会闭幕会上的讲话","alias":"","parts":[{"type":"paragraph","text":"在中共九届二中全会闭幕会上的讲话！"},{"type":"paragraph","text":"（1970年9月6日）"},{"type":"paragraph","text":"（九月六日，党的九届二中全会胜利闭幕。在闭幕会议上，毛泽东对党的路线教育问题、高级十部的学习问题、党内外团结问题作了重要指示。在讲到高级十部读马、列的儿本书的问题时）"},{"type":"paragraph","text":"现在不读马、列的书了，不读好了，人家就搬出什么第三版呀，就照着吹呀，那么，你读过没有？没有读过，就上这些黑秀才的当。有些是红秀才哟。我劝同志们，有阅读能力的，读十几本。基本开始嘛，不妨碍工作。要读几本哲学史，中国哲学史、欧洲哲学史。一讲读哲学史，那可不得了呀，我今天工作怎么办？其实是"},{"type":"paragraph","text":"[1]本篇摘自中共中央1971年12月11日转发的中央专案组整理的《粉碎林陈反党集团反革命政变的斗争（材料之一）》。中共中央转发这个材料的通知稿曾送毛泽东审阅，毛泽东批示：“照发。”"},{"type":"paragraph","text":"[2]指恩格斯为马克思《路易·波拿巴特政变记》（今译为《路易·波拿巴的雾月十八日》）德文第三版写的序言。陈伯达在中共九届二中全会期间搜集整理的《恩格斯、列宁、毛主席关于称天才的几段语录》中，引用了恩格斯写的这个序言中的一句话：“这是一部天才的著作。”陈伯达，当时任中共中央政治局常委。“文化大革命”期间，积极参加林彪、江青反革命集团夺取党和国家最高权力的阴谋活动。1970年中共九届二中全会后被隔离审查。1973年8月，中共十届一中全会通过决议，开除陈伯达的党籍，撤销党内外一切职务。1981年1月，中华人民共和国最高人民法院特别法庭确认陈伯达是林彪反革命集团案主犯，判处他有期徒刑18年，剥夺政治权利5年。有时间的。你不读点，你就不晓得。这次就是因为上当，得到教训嘛，人家是哪一个版本，第几版都说了，一问呢？自己没有看过。"},{"type":"paragraph","text":"（在讲到庐山会议这场斗争，他们大有炸平庐山，停止地球转动之势时）"},{"type":"paragraph","text":"庐山是炸不平的，地球还是照样转。极而言之，无非是有那个味道。我说你把庐山炸平了，我也不听你的。你就代表人民？我是十几年以前就不代表人民了。因为他们认为，代表人民的标志就要当国家主席。我在十几年以前就不当了嘛，岂不是十几年以来都不代表人民了吗？我说谁想代表人民，你去当嘛，我是不干。你把庐山炸平了，我也不干。你有啥办法呀？"},{"type":"paragraph","text":"（在讲到党内外团结问题时）"},{"type":"paragraph","text":"“不讲团结不好，不讲团结得不到全党的同意，群众也不高兴。”“所谓讲团结是什么呢？当然是马克思列宁主义基础之上的团结，不是无原则的团结。提出团结的口号，总是好一点嘛，人多一点嘛。包括我们在座的有一些同志，历来历史上闹别扭的，现在还要闹，我说还可以允许。此种人不可少。你晓得，世界上有这种人，你有啥办法？一定要搞得那么干干净净，就舒服了，就睡得着觉了？我看也不一定。到那时候又是一分为二。党内党外都要团结大多数，事情才干得好。”"}],"authors":["毛泽东"],"dates":[{"year":1970,"month":9,"day":6}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":82,"page_end":83},"tags":[{"name":"陈伯达","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"15940d8f84"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
