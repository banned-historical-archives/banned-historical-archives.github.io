ical-archives/banned-historical-archives0/main/maoquanji30.pdf"],"article":{"title":"关于修筑进藏公路的批语","alias":"","parts":[{"type":"paragraph","text":"关于修筑进藏公路的批语！"},{"type":"paragraph","text":"（1951年6月8日）聂："},{"type":"paragraph","text":"是否有钱修这些路，请与陈云同志商酌，可缓者应一律从缓。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"六月八日"},{"type":"paragraph","text":"[1]这是毛泽东在中国人民解放军西北军区张宗逊（第一副司令员）、甘泗淇（副政治委员兼政治部主任）、间要（参谋长）1951年6月7日给军委并报西北局的电报上的批语。张宗逊等在电报中谈到进军西藏的军事部署、补给、修筑道路等问题，提出：（一）建议今年继续修通张披至西宁公路（360公里），以便于油料的补给。（二）立即准备1952年春开工修筑的黄河沿至玉树公路。（三）立即着手分段勘测玉树至囊谦及敦煌经柴达木、唐古拉山口、黑河至拉萨线。"},{"type":"paragraph","text":"[2]聂，指聂荣臻，当时任中国人民解放军代总参谋长。[3]陈云，当时任政务院副总理兼财政经济委员会主任。"}],"authors":["毛泽东"],"dates":[{"year":1951,"month":6,"day":8}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":367,"page_end":367},"tags":[{"name":"毛泽东","type":"人物"},{"name":"陈云","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6aa2e7268b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
