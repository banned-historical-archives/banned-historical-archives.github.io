ical-archives/banned-historical-archives0/main/maoquanji28.pdf"],"article":{"title":"关于支持情报局刊物对野坂参三的批评致胡乔木电","alias":"","parts":[{"type":"paragraph","text":"关于支持情报局刊物对野坂参三的"},{"type":"paragraph","text":"批评致胡乔木电"},{"type":"paragraph","text":"（1950年1月14日）乔木同志："},{"type":"paragraph","text":"我今晚九时动身去列宁城参观，要三天才能回来，而人民日报社论稿及日共政治局的决议尚未收到。如要等我看过，须到十七日才有复电，否则由少奇同志看过即可发表。我党应当发表意见，支持情报局刊物对冈野进的批评，而对于日共政治局未能接受此批评表示惋惜，希望日共采取适当步骤纠正冈野进错误。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一月十四日下午四时[1]野坂参三，即冈野进，当时任日本共产党中央政治局委员。[2]胡乔木，当时任中央人民政府新闻总署署长。"}],"authors":["毛泽东"],"dates":[{"year":1950,"month":1,"day":14}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":170,"page_end":170},"tags":[{"name":"毛泽东","type":"人物"},{"name":"胡乔木","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cd3793affb"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
