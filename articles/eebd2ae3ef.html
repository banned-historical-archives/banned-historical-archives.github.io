script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"毛泽东思想武装的人民最坚定最无畏  坚决支持越南人民把抗美战争打到底","authors":[],"dates":[{"year":1966,"month":7,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"全国已有一千万人举行援越抗美强大示威"},{"type":"paragraph","text":"毛泽东思想武装的人民最坚定最无畏"},{"type":"paragraph","text":"坚决支持越南人民把抗美战争打到底"},{"type":"paragraph","text":"各民主党派负责人和无党派民主人士集会坚决拥护刘主席声明坚决支持胡主席文告"},{"type":"paragraph","text":"新华社二十四日讯　全国各地人民今天继续举行集会和游行示威，坚决支持越南人民把反对美帝国主义侵略的正义战争打到底，打到最后胜利。"},{"type":"paragraph","text":"从二十二日北京百万人举行强大示威和集会的那天起，三天来全国各地参加集会和示威活动的已有一千万人。今天举行大规模集会和示威游行的城市和工矿区，有上海、天津、西安、成都、桂林、凭祥、北海、济南、合肥、银川、齐齐哈尔、牡丹江、佳木斯、伊春、鸡西、鹤岗、双鸭山等地。参加集会和示威游行的群众达四百万人。上海今天有八十万人，天津、西安、成都各有五十万人走上街头。伊春林区今天有十万人冒雨举行了集会和示威游行。"},{"type":"paragraph","text":"在这几天里，还有许多地方举行了声援越南人民抗美救国斗争的小型集会。同越南人民同饮一江水的广西龙州、大新、宁明、靖西等地的边境人民和大瑶山、大苗山区的少数民族人民，革命摇篮井冈山的人民，都举行了集会。"},{"type":"paragraph","text":"从友谊关下到大兴安岭，参加集会和游行的人们怀着同仇敌忾的心情声讨美帝国主义对越南的侵略。各地人民表示，刘少奇主席声明中为了支持越南人民夺取抗美战争的彻底胜利，中国人民准备承担最大民族牺牲的伟大号召，完全表达了七亿中国人民的坚强意志，中国人民决心随时随地准备为支援越南人民反对美帝国主义的侵略、为埋葬世界人民最凶恶的敌人美帝国主义，贡献出自己的一切力量。参加集会和示威的人们还最坚决地支持胡志明主席的《告全国同胞书》。他们指出，在毛泽东思想教导下的中国人民高举无产阶级国际主义的旗帜，坚决同越南人民团结在一起，战斗在一起，胜利在一起。"},{"type":"paragraph","text":"今天，各民主党派负责人和无党派民主人士在北京举行了集会，表示坚决拥护刘少奇主席的声明，坚决支持胡志明主席的《告全国同胞书》，他们表示各民主党派的成员要在中国共产党的领导下，为援越抗美作出贡献。"},{"type":"paragraph","text":"中国人民政治协商会议全国委员会无党派民主人士，和中国民主促进会、中国农工民主党、中国致公党、中华全国工商业联合会、中华全国归国华侨联合会等民主党派、人民团体分别发表了支持越南人民抗美救国斗争的声明。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"天津文革","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"eebd2ae3ef"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
