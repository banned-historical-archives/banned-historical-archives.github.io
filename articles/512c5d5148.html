ical-archives/banned-historical-archives0/main/maoquanji33.pdf"],"article":{"title":"关于全国财政会议的议题和准备工作给陈云等的信","alias":"","parts":[{"type":"paragraph","text":"关于全国财政会议的议题和准备工作"},{"type":"paragraph","text":"给陈云\"等的信"},{"type":"paragraph","text":"（1953年5月6日）陈云、一波、富春同志："},{"type":"paragraph","text":"五月二十日开始的财政会议，应讨论些什么问题，请你们考虑一下，并在发开会通知中写进去，使各地有所准备。似乎预算问题，增薪问题，县区乡财政统一问题，地方财政和大城市财政问题，税收问题，五年计划问题，今年下半年经济安排问题，军费问题（杨立三应参加），均应有所讨论，除由你们对每项问题准备方案外，各大区财委最好能在本月中旬召开一次财政会议，收集意见带来（已开者如西南当然不要召开）。是否可行，请酌定。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"五月六日[1]陈云，当时任政务院副总理兼财政经济委员会主任。"},{"type":"paragraph","text":"[2]一波，即薄一波，当时任政务院财政经济委员会副主任兼财政部部长。富春，即李富春，当时任政务院财政经济委员会副主任。"},{"type":"paragraph","text":"[3]杨立三，当时任人民革命军事委员会总后勤部副部长。"}],"authors":["毛泽东"],"dates":[{"year":1953,"month":5,"day":6}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":160,"page_end":160},"tags":[{"name":"毛泽东","type":"人物"},{"name":"陈云","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"512c5d5148"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
