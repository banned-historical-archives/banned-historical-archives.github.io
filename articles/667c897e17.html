script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"剥削制度吞噬了雷锋的一家","authors":["杜学洪"],"dates":[{"year":1967,"month":5,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"剥削制度吞噬了雷锋的一家"},{"type":"paragraph","text":"战士　杜学洪"},{"type":"paragraph","text":"我听到党内头号走资本主义道路的当权派胡说什么“现在剥削是救人，不准剥削是教条主义”，资本家“有本事多剥削，对国家对人民都有利”，等等一大堆颠倒是非的谬论，真把肺气炸了。这时，我自然而然地想起了雷锋班长的苦难童年。黑暗的旧社会，吃人的剥削制度，在不到三年的时间里，就吞噬了雷锋一家四口。雷锋八岁的时候，就成了一个无依无靠的孤儿，受尽地主的折磨。在那吃人的旧社会里，受苦受难的何止雷锋一人，雷锋一家。雷锋的苦难就是我们劳苦大众的苦难，是整个阶级的苦难。就拿我来说吧！我家祖祖辈辈给地主扛活，世世代代受地主剥削，讨饭的篮子，打狗的棍子，始终没有离开过。就在那所谓“剥削有功”的社会里，我爷爷十三岁就给地主扛活，最后累得吐血而死。我父亲为了躲避地主的租税，逃到外乡。但是，正象雷锋班长所说的那样：南方地主是笑面虎，北方的地主是活阎王，天下乌鸦一般黑。那里有剥削制度，那里就没有穷人的活路。父亲逃来逃去，仍旧给地主扛活，最后被树茬刺破脚，得了破伤风，活活地病死了。那时，我才一周岁，身带重病的母亲，背着我讨饭求生，不久也被折磨死了。万恶的地主狗豺狼，吞噬了我的一家。这就是党内头号走资本主义道路当权派宣扬的所谓“多剥削，对国家对人民都有利”！"},{"type":"paragraph","text":"正当我在死亡线上挣扎的时候，光芒万丈的毛泽东思想照到了我的家乡，我们最最敬爱的领袖毛主席把我从苦海里救了出来。如果没有毛主席，我那能活到今天？想想过去的苦，看看今日的甜，我恨透了吃人的剥削制度。我们亲眼看到过剥削的罪恶，亲自尝过剥削的苦头，剥削有罪无罪，剥削到底是救人还是吃人，我们知道得最清楚，也最有发言权。血泪斑斑的历史告诉了我们：剥削制度就是人吃人的制度，就是少数人享福、多数人受苦的制度。站在我们劳动人民立场上来说话，剥削不但有罪，而且罪恶累累；剥削不是救人，而是杀人、吃人。我们最最敬爱的伟大领袖毛主席领导我们闹革命，就是要从整个地球上彻底消灭剥削，埋葬剥削制度。党内头号走资本主义道路当权派，念念不忘剥削，把吃人的剥削制度吹上天，千方百计地为复辟资本主义鸣锣开道，妄想把历史的车轮倒转，让劳动人民重新拿起讨饭棍，这是绝对办不到的。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"党内资产阶级","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"667c897e17"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
