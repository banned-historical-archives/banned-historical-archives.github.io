来印制的数量相当于过去十七年印制总数的两倍半，并且保证了高质量","authors":[],"dates":[{"year":1969,"month":3,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"湖北省新华印刷厂革命工人满怀对毛主席的无限忠诚"},{"type":"paragraph","text":"高质量完成毛主席著作印制任务"},{"type":"paragraph","text":"两年多来印制的数量相当于过去十七年印制总数的两倍半，并且保证了高质量"},{"type":"paragraph","text":"新华社武汉电　担负着印制毛主席著作光荣任务的湖北省新华印刷厂的革命工人，在驻厂解放军毛泽东思想宣传队的帮助下，深入开展活学活用毛泽东思想的群众运动，把对伟大领袖毛主席的无限忠诚，倾注到高质量地印好毛主席著作的实际行动中去，为宣传伟大的毛泽东思想作出了新贡献。"},{"type":"paragraph","text":"湖北省新华印刷厂的广大革命工人深深认识到，毛泽东思想是革命人民的命根子，是革命人民克敌制胜的最强大的思想武器。高质量地印制毛主席著作，向广大革命群众传播伟大的毛泽东思想，是时代的需要，是革命的需要，是夺取无产阶级文化大革命全面胜利的需要，是无产阶级的根本利益所在。因此，他们在掌握工厂的领导大权以后，把高质量地印制毛主席著作，传播伟大的毛泽东思想，作为自己最光荣的任务。在两年多的文化大革命中，他们印制的毛主席著作就相当于文化大革命前十七年印制毛主席著作总数的两倍半，并且保证了高质量。"},{"type":"paragraph","text":"这个厂的革命工人把印制毛主席著作的过程，作为锤炼对伟大领袖毛主席无限忠心的过程。他们在厂革委会和驻厂解放军毛泽东思想宣传队的领导和帮助下，在印制毛主席著作的过程中，坚持把活学活用毛泽东思想摆在首位，大办各种类型的毛泽东思想学习班，广泛深入地开展忠于毛主席、忠于毛泽东思想、忠于毛主席无产阶级革命路线的“三忠于”活动。从一月份到现在，全厂举办了各种类型的毛泽东思想学习班五十多期，参加学习的达三千多人次。毛泽东思想学习班的普遍举办，大大提高了广大革命工人的无产阶级觉悟，进一步加强了他们印制好毛主席著作的责任感。每个车间、每个班组和每个革命工人，都自觉地订出了活学活用毛泽东思想，开展“三忠于”活动的计划，把印好毛主席著作作为忠于毛主席的实际行动，从而有力地保证了高质量地完成毛主席著作的印制任务。"},{"type":"paragraph","text":"湖北省新华印刷厂的革命工人，牢记毛主席“千万不要忘记阶级斗争”和“阶级斗争，一抓就灵”的伟大教导，在深入开展活学活用毛泽东思想的群众运动中，始终把学好用好毛主席关于阶级和阶级斗争的光辉思想，狠抓阶级斗争，作为保证高质量完成毛主席著作印制任务的重要一环。他们对叛徒、内奸、工贼刘少奇及其代理人反对和破坏印制、出版毛主席著作的滔天罪行，开展了深入持久的革命大批判，同时认真做好清理阶级队伍的工作。在厂革委会和驻厂解放军宣传队的带领下，他们以战无不胜的毛泽东思想为武器，经过深入的调查研究，挖出了一小撮破坏革命、破坏生产的阶级敌人。革命推动了生产。这个厂的胶印车间在挖出一小撮破坏革命、破坏印制毛主席著作的阶级敌人后，革命工人意气风发，斗志昂扬，在十七天内完成的任务，就大大超过了历史上最高的月产量，质量也有显著提高。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"湖北文革","type":"人物"},{"name":"革命大批判","type":"主题/事件"},{"name":"清理阶级队伍","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"074baab2eb"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
