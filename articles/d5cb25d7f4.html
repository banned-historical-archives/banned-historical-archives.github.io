art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"重新学习《通知》掀起批邓高潮基建工程兵某部“七·二一”战士大学的同志决心以实际行动保卫和发展文化革命的胜利成果","authors":[],"parts":[{"type":"paragraph","text":"本报讯 在欢庆文化大革命十周年的日子里，基建工程兵某部“七·二一”战士大学广大教员、学员和干部，重新学习中共中央五月十六日《通知》，回顾这所在文化大革命凯歌声中诞生的新型部队大学的战斗历程，热情歌颂文化大革命的伟大胜利，深入批判邓小平反革命的修正主义路线，决心紧跟毛主席的伟大战略部署，把批判邓小平、反击右倾翻案风的伟大斗争进行到底。"},{"type":"paragraph","text":"在重新学习《通知》中，他们把邓小平炮制的“三项指示为纲”的修正主义纲领和十年前他伙同刘少奇抛出的反革命《二月提纲》加以对照。首先，他们从政治路线上进行了分析。十年前，文化大革命的烈火刚刚点燃，刘少奇、邓小平一伙迫不及待地抛出了反动的《二月提纲》，鼓吹阶级斗争熄灭论，妄图把毛主席亲自发动和领导的文化大革命引向邪路。毛主席洞察一切，亲自主持制定了中共中央一九六六年五月十六日《通知》，明确指出：刘少奇、邓小平一伙“根本否认几千年的人类历史是阶级斗争史，根本否认无产阶级对资产阶级的阶级斗争，根本否认无产阶级对资产阶级的革命和对资产阶级的专政”，宣告了《二月提纲》的彻底破产。而邓小平重新工作以后炮制的“三项指示为纲”，同样也是鼓吹阶级斗争熄灭论、唯生产力论，否定以阶级斗争为纲，和反动的《二月提纲》完全是一路货色。接着，大家又从组织路线上进行了比较。《二月提纲》的炮制者为了保护那一堆叛徒、死党，提出对“坚定的左派”进行“整风”，妄图镇压革命群众。而邓小平抛出“三项指示为纲”，打着“整顿领导班子”的幌子，实际上就是要把坚持毛主席革命路线的干部打下去，把不肯改悔的走资派扶上台。同志们还把《二月提纲》和“三项指示为纲”的炮制手法进行了对比。《二月提纲》是刘少奇一伙背着毛主席和以毛主席为首的党中央，盗用中央名义，匆匆忙忙发到全党。邓小平炮制“三项指示为纲”，也是不请示、不商量，就到处去吹。这充分说明邓小平和一切机会主义头子一样，都是惯于搞阴谋诡计的反革命两面派。"},{"type":"paragraph","text":"通过分析对比，使大家看清了邓小平搞的这一套，完全是《二月提纲》的继续和发展，是刘少奇、林彪修正主义路线的继续。大家表示，要认真学习《通知》，学习毛主席的重要指示，用深入批邓的实际行动，保卫和发展文化大革命的胜利成果。"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d5cb25d7f4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
