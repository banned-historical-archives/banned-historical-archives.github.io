”","authors":[],"dates":[{"year":1958,"month":6,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京28日电】　中国共产主义青年团中央委员会26日写信给苏联列宁共产主义青年团中央委员会，祝贺第一次“苏联青年节”的举行。贺信说:"},{"type":"paragraph","text":"在第一次“苏联青年节”到来的时候，我们谨代表全中国青年向你们并通过你们向全苏联的共青团员和青年致以兄弟般的敬礼和最热烈的祝贺。"},{"type":"paragraph","text":"我们为苏联青年在建设共产主义和保卫世界和平的事业中所取得的成就而感到高兴，并且衷心祝你们在实现苏联共青团第13次代表大会所通过的青年参加共产主义建设的宏伟纲领中，在实现苏联共产党向苏联人民提出的在短期内在工农业生产上超过美国的伟大任务中取得更大的胜利。"},{"type":"paragraph","text":"中苏两国人民和青年的伟大友谊正随着我们共同事业的迅速发展而日益巩固。今天，在反对现代修正主义的斗争中再一次显示出我们两国人民和青年磐石般的团结和坚不可摧的友谊。让我们更紧密地手携着手高举马克思列宁主义的红旗奋勇前进。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f88e6397fe"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
