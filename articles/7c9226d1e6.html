":[],"dates":[{"year":1967,"month":4,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"尼泊尔人民兴高采烈参观我图片展览"},{"type":"paragraph","text":"赞颂中国文化大革命和建设成就"},{"type":"paragraph","text":"新华社加德满都电　中国图片展览从三月十八日到二十日在尼泊尔中南部伯甘吉城举行。有三千多名工人、农民、学生和教师兴高采烈地参观了展览，人们由衷地欢呼“毛主席万岁！”表示他们对世界革命人民的伟大领袖毛主席的无限尊敬和爱戴。"},{"type":"paragraph","text":"一位名叫拉纳的观众说：我有机会见到当代列宁——毛主席的许多照片，感到非常高兴。"},{"type":"paragraph","text":"在展览会上陈列的《毛主席语录》和毛主席著作，最吸引观众。他们竞相阅读，并要求得到这些著作。有一位名叫普拉沙德的观众在留言簿上写道：“我学了毛主席的著作后，感到非常幸福。我确信，如果全世界照毛主席的话办事，全世界将达到进步的顶峰。”另一位名叫阿迪卡里的观众写道：“我最喜欢伟大的革命领袖毛泽东关于‘帝国主义和一切反动派都是纸老虎’的论断。我坚信并完全同意这个伟大的论断。”"},{"type":"paragraph","text":"观众乔希在赞扬中国无产阶级文化大革命时说：中国人民在伟大的导师和伟大的领袖毛主席的领导下，正在以巨大的信心和热情的浪潮参加无产阶级文化大革命。"},{"type":"paragraph","text":"观众钦佩中国人民在毛主席领导下取得的社会主义革命和社会主义建设的伟大成就。有三位观众联名在留言簿上写道：“中国在毛泽东主席领导下取得的进步是鼓舞我们的源泉。”"},{"type":"paragraph","text":"这个展览会是在中国援助下刚刚建成的伯甘吉仓库中举行的。"},{"type":"paragraph","text":"观众还赞扬在毛泽东思想哺育下的中国专家在建造这所仓库时所付出的辛勤劳动。一位名叫辛的观众写道：“我们看到中国承担的仓库工程完工感到非常高兴。我们衷心感谢中国政府和人民给予的合作”。"},{"type":"paragraph","text":"这次展览虽然只举行了三天，但是却给尼泊尔朋友留下了深刻的印象。许多观众称赞这次展览激发了他们建设祖国的热情。一位名叫布汉达里的观众写道：这次图片展览激发了我们在斗争与困难中把生命置之度外的无私感情。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7c9226d1e6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
