tart":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席接见《赤旗报》代表团同时接见日共中央书记处书记安斋库治陆定一同志会见《赤旗报》总编辑强","authors":["吕厚民"],"parts":[{"type":"paragraph","text":"新华社23日讯 毛泽东主席今晚接见了以《赤旗报》总编辑土岐强为首的日本《赤旗报》代表团全体成员。"},{"type":"paragraph","text":"同时被接见的还有在我国访问的日本共产党中央书记处书记安斋库治等。"},{"type":"paragraph","text":"毛泽东主席同日本同志们进行了亲切的谈话。"},{"type":"paragraph","text":"接见时在座的，有中共中央委员廖承志、刘宁一，《人民日报》总编辑吴冷西、副总编辑胡绩伟、王揖、安岗、陈浚等。"},{"type":"paragraph","text":"新华社23日讯 中共中央政治局候补委员、中共中央宣传部部长陆定一，今天下午会见了日本《赤旗报》总编辑土岐强，并且进行了亲切的交谈。"},{"type":"paragraph","text":"会见时在座的，有中共中央委员廖承志、中共中央宣传部副部长姚济、《人民日报》副总编辑王揖等。"},{"type":"paragraph","text":"中共中央毛泽东主席11月23日接见了以《赤旗报》总编辑土岐强为首的日本《赤旗报》代表团。同时被接见的有日共中央书记处书记安斋库治等。图为接见时情形。左第一人是土岐强，第二人是安斋库治。"},{"type":"paragraph","text":"新华社记者 吕厚民摄"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"廖承志","type":"人物"},{"name":"陆定一","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"86379ebe6d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
