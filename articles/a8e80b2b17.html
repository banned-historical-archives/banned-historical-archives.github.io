ical-archives/banned-historical-archives0/main/maoquanji49.pdf"],"article":{"title":"在文化大革命中学会大民主","alias":"","parts":[{"type":"paragraph","text":"在文化大革命中学会大民主"},{"type":"paragraph","text":"（1966年12月）"},{"type":"paragraph","text":"在游泳中学会游泳，在斗争中学会斗争，我们在这次文化大革命中要学会大民主。"}],"authors":["毛泽东"],"dates":[{"year":1966,"month":12}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":250,"page_end":250},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]},{"id":"45f85d41-2767-49bc-87e9-ba331b429fce","name":"毛泽东思想万岁（1961年-1968年）","internal":true,"official":false,"type":"pdf","author":"","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives3/main/45f85d41-2767-49bc-87e9-ba331b429fce.pdf"],"article":{"title":"在文化大革命中学会大民主","alias":"","parts":[{"type":"paragraph","text":"修正主义的斗争中，结成了深厚的革命友谊。这种友谊是建立在马克思列宁主义和无产阶级国际主义原则基础上的，是永恒的、牢不可破的。让我们共同高举马克思列宁主义的伟大红旗，同全世界一切马克思列宁主义者，一切被压迫人民和被压迫民族在一起，把反对帝国主义和反对现代修正主义的斗争，把无产阶级革命事业，坚决进行到底。"},{"type":"paragraph","text":"就中阿两党、两国人民的伟大友谊万古长青！"},{"type":"paragraph","text":"中国共产党中央委员会主席毛泽东"},{"type":"paragraph","text":"一九六六年十一月二十八日在文化大革命中学会大民主"},{"type":"paragraph","text":"（一九六六年十二月）在游泳中学会游泳，在斗争中学会斗争，我们在这次文化大革命中要学会大民主。"},{"type":"paragraph","text":"（摘自恩来理同志一九六六年十二月十九日讲话）关于复员转业军人参加文化大革命问题的指示"},{"type":"paragraph","text":"（一九六六年十二月）"},{"type":"paragraph","text":"（一）一切复员转业军人，不准成立红卫军和其他名称的单独组织，只能参加所在单位文化革命组织。"},{"type":"paragraph","text":"（二）不准冲进解放军机关及所属部队，也不许到部队串连和散发传单。"},{"type":"paragraph","text":"（三）所有转、复军人，必须保持和发扬解放军的光荣传统，并协助解放军加强战备，保卫无产阶级文化大革命。"},{"type":"paragraph","text":"关于军政训棘的指示"},{"type":"paragraph","text":"（一九六六年十二月三十一日）"},{"type":"paragraph","text":"派军队干部训练革命师生的方法很好。训练一下和不训练大不一样。这样做，可以向解放军学政治、学军事、学四个第一、学三八作风、学三大纪律八项注意，加强组织纪律性。驻京部队派干部训练革命师生的经验很好，很有成效，应当在全国推广。"},{"type":"paragraph","text":"在中央常委扩大会上的四点指示"},{"type":"paragraph","text":"（一九六六年十二月）一、大家要挺身而出，同群众见面，接受群众的批评，并进行自我批评，引火烧身。"},{"type":"paragraph","text":"·279·"}],"authors":["毛泽东"],"dates":[{"year":1966,"month":12,"day":null}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":292,"page_end":292},"tags":[{"name":"毛泽东","type":"人物"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a8e80b2b17"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
