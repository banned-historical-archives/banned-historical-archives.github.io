tart":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"韶山人民热烈欢迎阿尔巴尼亚战友巴卢库等同志由华国锋、李德生、张才千等同志陪同访问毛主席故乡","authors":[],"parts":[{"type":"paragraph","text":"新华社长沙一九七二年十一月二十日电 以贝·巴卢库同志为团长，希·恰科和拉·佩尔拉库同志为副团长的阿尔巴尼亚人民共和国军事友好代表团，由华国锋、李德生、张才千、杨大易、张立宪等同志陪同，今天专程访问了毛主席的故乡韶山，受到韶山区革命委员会主任毛泽普、副主任张汉斌和韶山大队党支部书记毛迪秋，以及革命群众数百人的热烈欢迎。"},{"type":"paragraph","text":"今天，金色的阳光普照大地。在青松翠柏围绕的韶山冲，到处洋溢着中阿两国人民和军队亲切、友好的热烈气氛。当阿尔巴尼亚战友乘车到达时，社员们象接待亲人一样，个个兴高采烈。他们挥动花束，唱着革命歌曲，跳起欢乐的舞蹈，高呼：“中阿友谊万岁！”“阿尔巴尼亚人民的伟大领袖恩维尔·霍查同志万岁！”“中国人民的伟大领袖毛主席万岁！”"},{"type":"paragraph","text":"阿尔巴尼亚战友向韶山人民热情地转达了兄弟的阿尔巴尼亚人民对中国人民的深情厚谊。他们高兴地来到毛主席旧居和毛主席旧居陈列馆，并且和中国同志一起，在毛主席旧居前合影留念。随后还参观了韶山的水利建设工程。巴卢库同志在参观过程中，热情赞扬韶山人民在毛主席的英明领导下，对中国革命所作出的贡献，并且勉励他们在今后的革命和生产中取得新的更大的成就。"},{"type":"paragraph","text":"我国国防部外事局负责人柴成文、朱开印也陪同代表团前往韶山访问。"},{"type":"paragraph","text":"图为中阿两国战友在毛主席旧居前合影。 新华社记者摄"}],"alias":""},"tags":[{"name":"李德生","type":"人物"},{"name":"华国锋","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b82f898e30"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
