e":{"title":"因工负伤职工需要购置的矫正鞋、钢背心、拐杖、手摇车等费用的若干规定","dates":[{"year":1964}],"is_range_date":false,"authors":["铁道部卫生局"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"铁道部政治部审干办公室, 审干工作政策选编(三), 257","tags":[{"name":"劳动保险","type":"主题/事件"},{"name":"伤亡伤残","type":"主题/事件"},{"name":"铁道部","type":"主题/事件"}],"parts":[{"type":"paragraph","text":"因工负伤职工需要购置的矫正鞋、钢背心、拐杖、手摇车等费用的若干规定\n      1. 职工因工负伤后，确因治疗需要或与治疗有关的矫正鞋、钢背心等可视为医疗需要，由医药卫生补助金开支。\n      2．职工因工负伤经治疗后已确定残废，为了协助恢复生活或工作能力，确需要购置的矫正鞋、手摇车、拐杖等由企业行政直接支付的劳保费开支。"},{"type":"paragraph","text":"3．凡属上列项目者，不论由医药卫生补助金开支或由企业行政直接支付的劳保费开支，均需持事先经医疗单位加盖公章确需购置的证明文件方准报销。"},{"type":"paragraph","text":"（铁道部卫生局（64）卫计字第51号）"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9fb3b4e3f6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
