":[],"dates":[{"year":2003,"month":12,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"伟业千秋青史在"},{"type":"paragraph","text":"华章万古翰墨香"},{"type":"paragraph","text":"———毛泽东诗词意境名家新作选登"},{"type":"paragraph","text":"1、报春（中国画）（汤文选）"},{"type":"paragraph","text":"2、苍山如海  残阳如血（行书）（李铎）"},{"type":"paragraph","text":"3、飞雪迎春到（中国画）（郭怡孮）"},{"type":"paragraph","text":"4、书录毛泽东《浪淘沙·北戴河》（行书）（周韶华）"},{"type":"paragraph","text":"大雨落幽燕，白浪滔天，秦皇岛外打鱼船。一片汪洋都不见，知向谁边？"},{"type":"paragraph","text":"往事越千年，魏武挥鞭，东临碣石有遗篇。萧瑟秋风今又是，换了人间。"},{"type":"paragraph","text":"5、待到山花烂漫时（中国画）（董继宁）"},{"type":"paragraph","text":"6、而今我谓昆仑（中国画）（于志学）"},{"type":"paragraph","text":"7、胜似春光（中国画）（詹庚西）"},{"type":"paragraph","text":"8、寥廓江天万里霜（中国画）（谢志高）"},{"type":"paragraph","text":"9、无限风光在险峰（中国画）（李宝林）"},{"type":"paragraph","text":"10、她在丛中笑（中国画）（张道兴）"},{"type":"paragraph","text":"11、忽报人间曾伏虎（中国画）（赵绪成）"},{"type":"paragraph","text":"12、书录《卜算子·咏梅》（草书）（杨悦浦）"},{"type":"paragraph","text":"风雨送春归，飞雪迎春到。已是悬崖百丈冰，犹有花枝俏。"},{"type":"paragraph","text":"俏也不争春，只把春来报。待到山花烂漫时，她在丛中笑。"},{"type":"paragraph","text":"13、北国风光（中国画）（陈履生）"},{"type":"paragraph","text":"14、俏也不争春  只把春来报（中国画）（刘大为）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3431065dd5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
