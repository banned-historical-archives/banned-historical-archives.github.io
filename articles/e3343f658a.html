art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"要闻简报","authors":[],"parts":[{"type":"paragraph","text":"邓小平副总理会见日本时事通讯社代表团"},{"type":"paragraph","text":"邓小平副总理五月十六日上午会见由社长大畑忠义率领的日本时事通讯社代表团。"},{"type":"paragraph","text":"时事通讯社代表团是首次访问我国。会见时，邓副总理回答了日本朋友提出的问题，就中国实现四个现代化和一些重大国际问题谈了他的看法。在谈到当前国民经济调整时，邓副总理指出，所谓调整，是调整农业和工业、工业内部的比例关系。这将有助于经济有计划按比例地发展，有助于加速四个现代化的实现。"},{"type":"paragraph","text":"巴巴·迪亚拉副主席率马里友好访问团到京"},{"type":"paragraph","text":"马里全国解放军事委员会副主席、马里人民民主联盟副总书记、财贸部长阿马杜·巴巴·迪亚拉上校和夫人以及由巴巴·迪亚拉副主席率领的马里友好访问团，应我国政府邀请，前来进行正式访问，五月十六日下午乘飞机到达北京。国务院副总理陈慕华等到机场欢迎。到机场迎接的还有马里驻中国大使高雷西和一些非洲国家驻中国的外交使节。"},{"type":"paragraph","text":"当晚，徐向前副总理设宴欢迎马里贵宾。"},{"type":"paragraph","text":"为庆祝建国三十周年我国将发行精装纪念金币"},{"type":"paragraph","text":"为庆祝中华人民共和国建国三十周年，国务院授权中国人民银行将发行一套精装纪念金币。"},{"type":"paragraph","text":"这套纪念金币共四枚，正面图案均为中华人民共和国国徽，并铸有“中华人民共和国成立三十周年”字样和“1949——1979”年号；背面四枚图样分别为天安门、人民英雄纪念碑、人民大会堂、毛主席纪念堂。"},{"type":"paragraph","text":"这套即将发行的金币，是中华人民共和国建国以来发行的第一套纪念金币，现正精工铸造。中国人民银行有关部门负责人对新华社记者说，这套金币将向全世界发售，发售时间另行公布，有关在国外和港澳地区发售事宜，可向香港宝生银行询问。"},{"type":"paragraph","text":"杜尚·德拉戈萨瓦茨当选为南共联盟主席团书记"},{"type":"paragraph","text":"据南通社报道，在五月十五日举行的南共联盟中央委员会主席团会议上斯·多兰茨辞去南共联盟主席团书记职务，杜尚·德拉戈萨瓦茨被选为主席团书记。"},{"type":"paragraph","text":"斯塔奈·多兰茨已经担任南共联盟主席团书记八年，并在主席团成员的内部分工中另有任职，因此他请求解除他的书记职务。经同南共联盟主席铁托同志协商，主席团决定接受多兰茨同志的要求。主席团赞扬了多兰茨同志多年来担任南共联盟中央主席团执委会书记和南共联盟中央主席团书记职务时有成效的工作。根据南共联盟主席铁托同志的建议，主席团选举了杜尚·德拉戈萨瓦茨任主席团书记。（据新华社）"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e3343f658a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
