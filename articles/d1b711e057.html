ors":[],"dates":[{"year":1971,"month":8,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　上海保温瓶一厂党委遵照毛主席关于“千万不要忘记阶级斗争”的教导，发动群众狠批刘少奇一类政治骗子所宣扬的地主资产阶级人性论，增强了阶级斗争观念，推动了“一打三反”运动的深入开展。"},{"type":"paragraph","text":"这个厂在今年深入开展“一打三反”运动的时候，一小撮阶级敌人别有用心地散布什么“对人要有面情，讲义气，凭良心。”部分群众受了蒙蔽，不敢起来揭阶级斗争盖子。厂党委敏锐地觉察到，现在阶级敌人抛出“人性论”来蛊惑人心，这是阶级斗争的新动向，决不能掉以轻心。于是他们就组织群众开展“两忆三查”活动，使大家进一步看清阶级敌人的反动本质，增强阶级斗争观念。该厂前身叫光大热水瓶厂，开始时该厂老板只有偷来的十八元银洋，雇一个工人，靠着对工人敲骨吸髓，十几年后便发展到拥有十六万元资金、三百多名工人和大片厂房的资本家。解放前，工人在高温炉旁操作时累昏了，资本家就用脚踢踢，硬逼着工人替他卖命，还诬蔑工人在“装死”。血泪斑斑的控诉，激起大家仇恨满腔!大家说:剥削阶级对无产阶级从来就不讲“情面”和“良心”，有的只是残酷的剥削和压榨。"},{"type":"paragraph","text":"厂党委进而组织群众学习毛主席关于“在阶级社会里就是只有带着阶级性的人性，而没有什么超阶级的人性”的教导和马克思、恩格斯的有关教导，用马克思主义的阶级论狠批地主资产阶级的人性论。批判会上，工人们争先恐后地发言说:“刘少奇一类政治骗子所宣扬的‘人性论’，是阶级敌人的护身符，我们可千万别上他们的当!”群众发动起来了，阶级敌人宣扬的地主资产阶级的人性论破产了。有个犯错误的青年，一度被一个坏家伙的甜言蜜语迷住心窍，在运动中总是不声不响。经过阶级教育，他认识到讲“情面”就是对敌人同情，对人民无情，他坚决挺身而出，揭发了这个坏家伙的问题，为破获一件政治悬案，提供了重要材料。"},{"type":"paragraph","text":"大学习、大批判深入一步，“一打三反”运动就深入一步。通过深入批判地主资产阶级的人性论，厂党委和全厂革命群众牢牢掌握了阶级斗争的主动权。有个犯有严重罪行的坏家伙被揪出来以后，见人点头笑笑，香烟送到面前，还说:“我总是倒霉，怎么晓得会犯这样的罪名。大家一个车间做生活，要多帮忙。”广大群众分析了这一现象，看清了他的新阴谋，大家说:“所谓‘大家一个车间做生活’的论调，就是妄图调和阶级矛盾，蒙混过关。我们决不能丧失警惕!”"},{"type":"paragraph","text":"(本报通讯　员)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"一打三反","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d1b711e057"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
