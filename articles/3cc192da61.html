ical-archives/banned-historical-archives0/main/maoquanji39.pdf"],"article":{"title":"给张治中的信","alias":"","parts":[{"type":"paragraph","text":"给张治中\"的信"},{"type":"paragraph","text":"（1958年5月22日）文白先生："},{"type":"paragraph","text":"五月三日的信早已收到。原封不动，直至今天，打开一看，一口气读完了《六十岁总结》，感到高兴。我的高兴，不是在你的世界观方面。在这方面，我们是有距离的。高兴是在作品的气氛方面，是在使人能看到作者的心的若十点方面，是在你还有向前进取的意愿方面。我猜想，这一年多的时间内，害苦了你，一个老人遇到这样的大风浪。这种心情，我是理解的。觅暇当约大驾一谈。这几天尚不可能。"},{"type":"paragraph","text":"祝安好！问候你的夫人和孩子们！"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"五月二十二日上午七时[1]张治中，字文白，当时任全国人大常委会委员、国防委员会副主席。"},{"type":"paragraph","text":"[2]指张治中1958年5月3日给毛泽东的信。信中谈了他在民革整风期间写的《自我检查》的情况，并将《自我检查》和他1949年冬写的《六十岁总结》送请毛泽东审阅。"}],"authors":["毛泽东"],"dates":[{"year":1958,"month":5,"day":22}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":362,"page_end":362},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3cc192da61"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
