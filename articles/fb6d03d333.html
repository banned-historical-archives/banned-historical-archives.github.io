art":5,"page_end":5,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"越南党政代表团参观“首都红卫兵革命造反展览会”黄文欢同志参观后为展览会题词，赞扬中国文化大革命对全世界有极其巨大的意义","authors":[],"parts":[{"type":"paragraph","text":"新华社三日讯 越南民主共和国党政代表团副团长、越南劳动党中央政治局委员、越南民主共和国国会常务委员会副主席黄文欢同志和代表团团员，今天上午由中共中央政治局委员、国务院副总理李先念同志陪同，参观了“首都红卫兵革命造反展览会”。"},{"type":"paragraph","text":"黄文欢同志参观以后为展览会题词。题词中写道：“我们非常高兴有机会来参观‘首都红卫兵革命造反展览会’。通过展览，我们更加清楚地看到了中国无产阶级文化大革命的伟大意义，以及红卫兵在这场革命中的重要作用。"},{"type":"paragraph","text":"“中国无产阶级文化大革命，旨在巩固无产阶级专政，防止资本主义在中国复辟，并保证社会主义的中国永远不变颜色，这是一场不但对中国有着极其巨大的意义，而且对全世界也有着极其巨大意义的革命。"},{"type":"paragraph","text":"“我们坚信，在毛主席的直接领导下，中国无产阶级文化大革命已经取得了决定性的成果，它一定会取得彻底的胜利。”"},{"type":"paragraph","text":"今天上午，当越南同志来到展览馆时，齐集在门口的数百名红卫兵小将高举着毛主席的画像和胡志明主席的画像，挥动着红彤彤的《毛主席语录》和中越两国国旗，热烈欢迎来自反美斗争前线的战友。红卫兵小将们不断高呼：“毛主席万岁！”“胡主席万岁！”并把金光闪闪的毛主席像章佩戴在越南同志们的胸前，把红卫兵袖章戴在越南同志们的臂上。黄文欢同志和红卫兵小将们亲切握手。"},{"type":"paragraph","text":"越南同志来到展览馆大厅内的一幅巨大毛主席彩色画像前，同红卫兵一起照了像。越南同志离开展览馆时，红卫兵小将们一再高呼：“毛主席万岁！”“胡主席万岁！”“七亿中国人民誓作越南人民的坚强后盾！”“越南必胜！”“美帝必败！”"}],"alias":""},"tags":[{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fb6d03d333"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
