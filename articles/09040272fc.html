ical-archives/banned-historical-archives0/main/maoquanji35.pdf"],"article":{"title":"对国务院、中共中央关于加强整顿粮食统销工作的指示稿的批语和修改","alias":"","parts":[{"type":"paragraph","text":"对国务院、中共中央关于加强整顿粮食统销工作的指示稿的批语和修改"},{"type":"paragraph","text":"（1955年4月28日）刘阅后发。加了一个尾巴"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"四月廿八日"},{"type":"paragraph","text":"[1]国务院、中共中央1955年4月28日关于加强整顿粮食统销工作的指示稿说，由于各方面的原因，使近一时期粮食的销量大大超过了国家规定的合理指标，而且这种趋势还在发展，这是极端反常和危险的，必须立即加以扭转。解决这一问题的关键在于深入地发动群众，进行充分的政治工作和群众工作，使群众明了国家的政策和解决粮食问题的真正出路。指示稿还规定了解决粮食供应问题的具体方法。"},{"type":"paragraph","text":"[2]刘，指刘少奇。"},{"type":"paragraph","text":"[3]指毛泽东审阅国务院、中共中央关于加强整顿粮食统销工作的指示稿时，在末尾加写的一段话，即本篇二。毛泽东全集第三十五卷"},{"type":"paragraph","text":"二"},{"type":"paragraph","text":"国务院和中共中央要求各省市委和省市人民政府，在接到本指示后的二十天左右的时间内，将本指示的要点，结合当地情况，作出自己的指示和安排，一直传达到乡，并开始见之实行。"}],"authors":["毛泽东"],"dates":[{"year":1955,"month":4,"day":28}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":42,"page_end":43},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"09040272fc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
