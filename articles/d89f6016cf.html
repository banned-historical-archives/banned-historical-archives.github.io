rt":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东思想是被实践证明了的革命真理","authors":["伊藤实"],"parts":[{"type":"paragraph","text":"毛泽东思想不仅是中国人民的太阳，而且是争取民族解放的亚非拉三大洲人民心中的太阳，也是全世界被压迫民族和人民争取解放斗争的力量和源泉，毛泽东思想是当代最高的马列主义。"},{"type":"paragraph","text":"──日本朋友 伊滕实"},{"type":"paragraph","text":"毛主席是当之无愧的最伟大的世界领袖。我认为，应当用各种语文出版毛主席的著作以满足世界人民的需要，让毛泽东思想的火炬照亮一切黑暗的角落，让各国人民都懂得如何为人民服务，如何赢得胜利。"},{"type":"paragraph","text":"──叙利亚阿拉伯东方通讯社社长"},{"type":"paragraph","text":"法齐·阿拉夫"},{"type":"paragraph","text":"毛主席的著作对于仍然生活在外国统治和压迫的枷锁下的工人阶级和各国人民，具有伟大的意义。对于正在为反对殖民主义和外国奴役而斗争的我们来说，毛主席的著作是我们获得无穷勇气的源泉。"},{"type":"paragraph","text":"──西南非洲民族联盟泛非和外交事务书记"},{"type":"paragraph","text":"韦尔纳·马穆格韦"},{"type":"paragraph","text":"毛主席的思想是真理，是被实践证明了的革命理论。它不仅引导中国革命走向胜利，而且也适用于各国的革命斗争。我们安哥拉人民在搞革命，搞斗争，读毛主席著作，真是如鱼得水。"},{"type":"paragraph","text":"──安哥拉学生 费尔南多"},{"type":"paragraph","text":"毛主席是继列宁之后，当代最伟大的马列主义者。毛泽东理论最宝贵之处，在于使革命者学了之后能用来指导革命。"},{"type":"paragraph","text":"——巴西学生"},{"type":"paragraph","text":"毛泽东是当今最伟大的马克思列宁主义理论家，今天，受帝国主义压迫的各国人民感到毛泽东思想是最适合的指南。"},{"type":"paragraph","text":"毛泽东思想是中国革命经验的总结，是极其丰富的。这种经验不是书本经验。它是在四十年来反对中国封建主义和资本家的剥削和压迫、反对外国法西斯主义者和帝国主义者及其民政和军事机构的暴力的不懈斗争中提炼出来的。"},{"type":"paragraph","text":"毛泽东思想是目前这个人口最多的国家和世界千百万忠于他的教导并在日常斗争中勇敢地支持毛泽东思想的人的政治财富。"},{"type":"paragraph","text":"──意大利《方针》报"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d89f6016cf"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
