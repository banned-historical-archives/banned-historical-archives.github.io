tart":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东思想第一","authors":["副班长秦学义"],"parts":[{"type":"paragraph","text":"我们排长李文忠，是毛泽东思想武装起来的共产主义战士。我们从他光辉的一生中，看到的是毛泽东思想统帅了他的整个生命。"},{"type":"paragraph","text":"早上，太阳刚刚从东方升起，排长带领我们做的第一件事，就是向伟大领袖毛主席敬礼，祝愿我们心中最红最红的红太阳毛主席万寿无疆！日益增进我们对毛主席无限热爱的深厚感情。"},{"type":"paragraph","text":"部队野营每到一地，排长带领我们做的第一件事，就是挨门挨户地向群众宣传毛泽东思想，赠送毛主席像，让毛泽东思想的光辉照亮每一个贫下中农的心。"},{"type":"paragraph","text":"新战友刚来到部队，排长的第一件事，就是询问他们学习毛主席著作的情况，让新战友从迈出的第一步起，就踏踏实实地走在毛主席指引的大道上。"},{"type":"paragraph","text":"在两个阶级、两条道路、两条路线的激烈搏斗中，排长对无产阶级革命派讲的第一句话就是：我们坚决支持你们。他每次给群众做政治思想工作，第一位的是用毛主席的教导，帮助他们提高阶级觉悟。"},{"type":"paragraph","text":"当有的同志回家探家或单独外出执行任务时，排长交代的第一件事，就是学习毛主席著作。完成任务回队后，他听取同志们汇报工作，又是首先了解学习毛主席著作的落实情况。……"},{"type":"paragraph","text":"这是多么光辉的第一，又是多么值得歌颂和学习的第一！"},{"type":"paragraph","text":"千第一，万第一，归根结底就是毛泽东思想第一！有了这个第一，革命战士心红眼亮方向明；有了这个第一，革命战士就能步步跟紧毛主席；有了这个第一，革命战士就能天大困难难不倒，生死关头志不移。"},{"type":"paragraph","text":"我们革命战士就是要象李文忠同志那样，处处做到毛泽东思想第一！"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"680ad801ed"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
