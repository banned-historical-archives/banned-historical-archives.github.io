art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"华国锋主席的贺电热烈祝贺霍查同志再次当选阿尔巴尼亚劳动党中央第一书记","authors":[],"parts":[{"type":"paragraph","text":"新华社一九七六年十一月八日讯 中国共产党中央委员会主席华国锋同志十一月八日打电报给恩维尔·霍查同志，热烈祝贺他再次当选为阿尔巴尼亚劳动党中央委员会第一书记。电报全文如下："},{"type":"paragraph","text":"地拉那"},{"type":"paragraph","text":"阿尔巴尼亚劳动党中央委员会"},{"type":"paragraph","text":"亲爱的恩维尔·霍查同志："},{"type":"paragraph","text":"在您再次当选为阿尔巴尼亚劳动党中央委员会第一书记的时候，我谨代表中国共产党中央委员会、全体中国共产党员和中国人民，向您致以热烈的祝贺。"},{"type":"paragraph","text":"祝以您为首的阿尔巴尼亚劳动党领导英雄的阿尔巴尼亚人民在社会主义革命和建设事业中取得新的更大的成就。"},{"type":"paragraph","text":"祝中阿两党、两国和两国人民之间建立在马克思列宁主义和无产阶级国际主义基础上的兄弟友谊和战斗团结不断巩固和发展。"},{"type":"paragraph","text":"中国共产党中央委员会主席 华国锋"},{"type":"paragraph","text":"一九七六年十一月八日于北京"}],"alias":""},"tags":[{"name":"华国锋","type":"人物"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"180b9cd46c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
