hors":["吴正焱"],"dates":[{"year":1951,"month":7,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"没有共产党领导革命，我们苗民那能安居乐业？"},{"type":"paragraph","text":"——湖南苗民吴正焱给毛主席的信敬爱的毛主席："},{"type":"paragraph","text":"我们村子里的农民，在人民政府生产号召下，人人都加工施肥，本年的庄稼格外的好看，山里田里的秧苗特别的茂盛，秋天一定有很好的收成。现在我们都知道用自己能力技术来克服困难，不靠鬼神了。到稻子成熟时，我们要求有关机关派员下乡，为我们评一下谁为劳动英雄。"},{"type":"paragraph","text":"本地人民都有用实际行动各尽其力来抗美援朝的信心。"},{"type":"paragraph","text":"毛主席，“七一”是最伟大的一天。没有当年共产党的成立，苗民那能有今天的安居乐业？纪念共产党三十周年的一天将是我们最高兴最喜爱的一天！向你敬致最崇高的礼！"},{"type":"paragraph","text":"湖南乾城一区新坪乡苗区农民  吴正焱"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0b551362a9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
