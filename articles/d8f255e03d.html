" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji42","name":"毛泽东全集第42卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji42.pdf"],"article":{"title":"对福建省委关于传达八届八中全会决议情况简报的批语","alias":"","parts":[{"type":"paragraph","text":"对福建省委关于传达八届八中全会"},{"type":"paragraph","text":"决议情况简报的批语"},{"type":"paragraph","text":"（1959年10月16日）"},{"type":"paragraph","text":"这个文件\"好。采取这种态度说话，甚为适宜。各地可以参照办理。讲过了一个（次），可以再讲一次，如福建那样的办法。此件发给各省、市、区党委，想一想，酌量办理。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十月十六日"},{"type":"paragraph","text":"[1]指中共福建省委1959年10月9日关于传达八届八中全会决议情况给中央的第四次简报。报告说，遵照中央指示，我们于9月25日召开民主人士座谈会，向他们传达八届八中全会决议。上午，宣读全会的两个决议及有关文件，并且听了毛主席9月15日在北京各民主党派、团体负责人座谈会上的讲话录音。下午，省委第一书记叶飞同志根据毛主席的讲话精神，向他们作了讲话。到会人士听了传达后，大多数人表示拥护我党中央的决议，认为对自己教育很大，普遍反映提出反右倾、鼓干劲是十分必要的、适时的。但有一部分人还不同程度地存在着惊奇、猜测、疑惧和糊涂的认识。"}],"authors":["毛泽东"],"dates":[{"year":1959,"month":10,"day":16}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":446,"page_end":446},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d8f255e03d"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
