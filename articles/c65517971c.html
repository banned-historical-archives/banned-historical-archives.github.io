script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"国际战略研究基金会举行座谈会探讨毛泽东国际战略思想","authors":["张银曙"],"dates":[{"year":1993,"month":12,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"国际战略研究基金会举行座谈会"},{"type":"paragraph","text":"探讨毛泽东国际战略思想"},{"type":"paragraph","text":"据新华社北京１２月８日电　（记者张银曙）为纪念毛泽东同志诞辰１００周年，国际战略研究基金会今天在人民大会堂举行《环球同此凉热——　一代领袖们的国际战略思想》出版座谈会。国务院副总理兼外交部部长钱其琛出席座谈会并发表讲话。"},{"type":"paragraph","text":"钱其琛说，毛泽东同志的国际战略思想是一个内容非常丰富的思想宝库，直至今天，我们所作的外交工作也都是建立在这个基础上的。正是依靠这一战略思想，中国在世界形势发生巨变后不仅站住了脚，而且有了很大的发展。姬鹏飞、胡绳等７０多人参加了座谈会。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"世界形势","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c65517971c"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
