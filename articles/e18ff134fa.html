:[{"year":1983,"month":2,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京二月十五日电　据《解放军报》报道:《叶剑英诗词选集》即将由人民文学出版社出版。邓小平同志为选集题写了书名。"},{"type":"paragraph","text":"这本选集，共收入作者自一九一五年以来六十余年间所写的诗词一百四十二首。选集中的诗词，反映了我国各个历史时期的战斗风貌，既是我党我军我国人民斗争风云的纪录，也是作者革命生涯的写照。"},{"type":"paragraph","text":"这个版本比一九七九年人民文学出版社出版的《远望集》篇目有所增加，有不少是首次与读者见面。一些已发表过的作品，作者又作了文字上的改动。书中附有作者生活照片八张、手迹四张，还有《编后记》一篇。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e18ff134fa"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
