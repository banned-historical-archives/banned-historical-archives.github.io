ical-archives/banned-historical-archives0/main/maoquanji41.pdf"],"article":{"title":"对《四川的经验》的批语","alias":"","parts":[{"type":"paragraph","text":"对《四川的经验》的批语！"},{"type":"paragraph","text":"（1959年3月19日）"},{"type":"paragraph","text":"四川省委三月十四日报告（简报第五号）很好，即发各省、市、区党委参考。这是一个很可供各地研究和酌量采纳的文件。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"1959年3月19日上午10时于武昌。我今日去长沙。"},{"type":"paragraph","text":"[1]指中共四川省委1959年3月14日关于六级干部会议情况给中央并毛泽东的第五号简报，毛泽东拟题为《四川的经验》。其主要内容是：一、关于公社的管理体制。我省绝大多数是一乡一社，因此，农村人民公社的管理机构，一般可分为公社管理委员会、管理区（相当于原来农业合作社的联社和部分高级农业合作社）、生产队（相当于原来农业合作社）三级，实行三级管理；一般以管理区或生产大队为公社的基础（约200户到300户农民）。二、关于人民公社的收益分配。国家税收平均约占6%左右，公社和管理区扣留公共积累约17.5%左右，生产费用约占20%至30%，管理费占0.3%，分配给社员的消费部分约占50%左右。三、关于粮食的分配和征购。拟按每人平均产粮1500斤为基础计算分配，留口粮600斤，征购300斤，饲料粮300斤，种子粮150斤，储备粮100斤，工业用粮50斤。四、关于劳动力的问题。第一，在保证农业生产所需劳动力的前提下，实行统筹兼顾。第二，为"},{"type":"paragraph","text":"对《四川的经验》的批语了节约劳动力，公社不允许有脱产的文工团等机构。五、关于国家对公社投资和收回贷款工作中的有关问题。我省拟将去年银行收回的贫农合作基金1200万元，作为国家向公社的投资预支使用。六、对公社各项账务问题的处理原则，一般的可提倡不算旧账，但有些账还必须算。七、对少数民族地区人民公社问题的处理。对已建立的公社不宣布取消，但对公社的各项具体问题，仍可基本上按照原高级农业合作社的一套办法处理。"}],"authors":["毛泽东"],"dates":[{"year":1959,"month":3,"day":19}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":366,"page_end":367},"tags":[{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a7ede68756"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
