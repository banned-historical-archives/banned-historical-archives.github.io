art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"教育青年干部抵制资产阶级思想侵蚀","authors":[],"parts":[{"type":"paragraph","text":"本报讯 一六二○部队党委从巩固无产阶级专政的高度，教育青年干部抵制资产阶级思想的侵蚀，保持无产阶级的政治本色。"},{"type":"paragraph","text":"这个部队党委分析青年干部的基本情况：大多数同志热情高，干劲足，接受新鲜事物快，但有的在工作取得成绩时容易盲目自满；有的对于一些比较复杂的问题往往缺乏分析能力；有的对婚姻、家庭等问题不能正确处理，容易受资产阶级思想的侵蚀。针对这些问题，党委有计划地组织青年干部学习了《共产党宣言》、《法兰西内战》、《国家与革命》、《论国家》和《在中国共产党第七届中央委员会第二次全体会议上的报告》等马列和毛主席著作，帮助他们弄清什么是资产阶级思想，什么是无产阶级思想；什么是资产阶级的物质引诱，什么是革命同志之间的关怀！什么是资产阶级的庸俗吹捧，什么是革命队伍里的表扬鼓励，从而提高了分辨是非的能力，积极发扬无产阶级革命正气，自觉抵制资产阶级思想的侵蚀。"},{"type":"paragraph","text":"对于青年干部中涌现的先进事迹，党委积极支持和宣扬，使大家不仅从理论上而且从实践上弄清什么是正确的，什么是错误的。二炮连指导员梁兴昌回乡探家时，有个富农分子当面吹捧：“从小我就看你有出息，这么年轻就当了指导员，将来说不定还能当上团长、师长哩！”梁兴昌马上予以批判。党委了解到这件事，在部队进行了宣扬。一连指导员丁孝长到职时，通信员想给他用施工木材做一个箱子。丁孝长认为，这是图个人方便，占公家便宜的错误行为。他对通信员进行了教育，并决定在全连开展爱护公物、勤俭施工的活动。党委表扬了丁孝长坚持革命原则的正确行动，总结推广了连队勤俭施工的经验。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"72669470d0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
