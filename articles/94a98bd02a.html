ical-archives/banned-historical-archives8/main/maoquanji15.pdf"],"article":{"title":"关于留用仔房官兵和大批收容知识分子给陈毅等的指示","alias":"","parts":[{"type":"paragraph","text":"关于留用俘虏官兵和大批收容知识分子"},{"type":"paragraph","text":"给陈毅等的指示"},{"type":"paragraph","text":"（1940年10月12日）陈毅，并告叶、项、胡服、黄克诚："},{"type":"paragraph","text":"（甲）俘虏兵只释放少数坏分子，其余一概补充自己，加以训练，增加部队战斗力，下级俘虏军官亦应留一部分稍带革命精神者，其余官长一概优待释放，不杀一人（不论如何反动)。"},{"type":"paragraph","text":"（乙）大批收容知识分子，只须稍有革命积极性者，不问其社会出身如何，来者不拒，一概收留。开办大规模抗大分校，如有学生可收容四五千人，并从上海招收学生开办财政经济人员训练班，行政人员训练班，开办普通中学及师范学校（收容积极性不足而愿作教育工作之青年），开办党的训练班，为建设广大根据地之用。"},{"type":"paragraph","text":"（丙）始终不提反韩口号，始终表示愿意团结抗战，停止磨擦。"},{"type":"paragraph","text":"毛朱王"}],"authors":["毛泽东"],"dates":[{"year":1940,"month":10,"day":12}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":148,"page_end":148},"tags":[{"name":"陈毅","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"94a98bd02a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
