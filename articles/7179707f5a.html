8,"month":2,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"搞臭无政府主义"},{"type":"paragraph","text":"无产阶级文化大革命已经取得决定性的胜利，全国形势一片大好。广大革命群众，更加认真地学习毛主席著作，积极参加大批判和本单位的斗批改。但是，少数人不是这样，一有时间就打扑克、下象棋，有时玩到深夜，以致劳动时没精打采，影响了生产和工作。当革命群众提出批评时，他们还“理直气壮”地说：“我们要造旧厂规的反，愿意怎么办就怎么办！”"},{"type":"paragraph","text":"这种无政府主义思想，很快就被阶级敌人利用了。他们拿出扑克和象棋，拉拢一些人去大玩特玩，煽动一些群众不遵守劳动纪律，不接受正确的领导，说什么“你是闯将，谁也不敢把你怎么样！”"},{"type":"paragraph","text":"有的同志认为，少数人不遵守劳动纪律，是小问题，用不着大惊小怪。其实，这不是小问题，而是两条道路斗争的大问题。毛主席教导我们：“必须坚决地克服许多地方存在着的某些无纪律状态或无政府状态”。我们工人阶级一定要遵循毛主席的教导，加强国家主人翁的革命责任感，加强革命性、科学性和组织纪律性，搞臭无政府主义，自觉地遵守劳动纪律。"},{"type":"paragraph","text":"岳城水库　一革命职工"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7179707f5a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
