script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"《查谟新闻》揭露印度“公营企业”为资产阶级效劳  印度反动派搞任何“国有化”都是骗人的  只有武装斗争推翻反动政权人民才有自己的前途","authors":[],"dates":[{"year":1969,"month":9,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"《查谟新闻》揭露印度“公营企业”为资产阶级效劳"},{"type":"paragraph","text":"印度反动派搞任何“国有化”都是骗人的"},{"type":"paragraph","text":"只有武装斗争推翻反动政权人民才有自己的前途"},{"type":"paragraph","text":"据新华社讯　印度《查谟新闻》不久前发表文章，揭露印度反动政府正在玩弄的所谓“银行国有化”是一个欺骗人民的花招。文章指出：只要国家机器仍然掌握在剥削阶级手里，所谓“国有化”或“公营部分”的经济（指官僚资本主义企业）都不会给群众带来什么好处。“只有在劳动人民起来进行武装斗争，推翻剥削阶级的政权，并在无产阶级领导下建立起自己的政府以后，人民才能得到好处。”"},{"type":"paragraph","text":"文章说：印度统治阶级的一部分政客耍了一个新花招。他们把十四家银行收归国有。“英迪拉·甘地自称采取这一措施是为了建立‘社会主义式样的社会’和制止向投机性企业和非生产性计划投资的做法。沉迷于贩卖‘左’的口号的修正主义者和其他集团走得更远，他们竟然大肆宣传说，银行国有化将打击垄断资本的利益，对穷人有利。”"},{"type":"paragraph","text":"文章指出：“至于国大党的‘社会主义式样的社会’，人民对它是很清楚的。在这一口号下，国大党在过去十五年中使我国陷入屈从于美帝和苏修的境地。这几年中，国内大资本家和大地主随心所欲地掠夺人民。在这个口号下，我国人民的处境每况愈下。”"},{"type":"paragraph","text":"文章还说：“至于修正主义者所谓银行国有化的措施会打击垄断资本家这种宣传，只不过是用来在人民当中散布幻想的骗局。一些资本主义国家的银行都是受政府控制的。这既没有使那些国家的垄断资本家受到打击，也没有使那些国家的人民得到任何好处。”"},{"type":"paragraph","text":"文章指出：“在印度，当权的是美帝、苏修及其在印度的走狗——大资本家和大地主。国大党是这些阶级的主要的政治代表。……无论它采取什么措施，无疑一定是符合这些阶级的利益的。过去二十年的经验证明了这一点。国大党在这二十年中的所作所为都是有利于统治阶级的。修正主义者企图就国大党提出的每一个笼络人心的口号在人民中间制造幻想，但是每一个事态发展都揭穿他们是在撒谎。”文章说：“他们告诉人民，公营部分是印度经济中的进步部分，它打击大垄断资本，保护人民的利益。但事情却彻底暴露了它们奇怪的逻辑。所有这些公营企业无疑是为资产阶级效劳，而且加强资产阶级的利益的。首先，这些企业不是用帝国主义的‘援助’，就是用苏联社会帝国主义提供的‘援助’兴建起来的。第二，在一些公营企业内，任命大资本家当这个‘长’那个‘长’。第三，所有这些公营企业的方针是根据大垄断企业提出的意见制订的。”"},{"type":"paragraph","text":"文章指出，印度的所谓“公营部分”的经济，就是美帝和苏修通过印度反动政府控制的经济。"},{"type":"paragraph","text":"文章说：“不管银行国有化或是继续由私人经营，人民都不能从中得到任何好处。不论是否国有化，银行都仍然是控制在大资本家和大地主手中。”文章指出，实际上，“外国人经营的银行既没有国有化，资本家对十四家国有化银行的控制也没有取消。银行老板现在成了这些银行的管理人。这就是外国和本国资本家不反对银行国有化措施的原因。”"},{"type":"paragraph","text":"文章最后强调说：“人民只有夺取了政权，才能打破奴役他们的锁链而成为他们自己前途的主人。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e13fef4a8a"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
