torical-archives/banned-historical-archives8/main/maoquanji9-2.pdf"],"article":{"title":"关于国共谈判情况及我们的原则立场致张学良电","alias":"","parts":[{"type":"paragraph","text":"关于国共谈判情况及我们的原则立场"},{"type":"paragraph","text":"致张学良电"},{"type":"paragraph","text":"（1936年12月10日）李宜兄："},{"type":"paragraph","text":"（甲）雨苍\"已动身，删日可抵兄处。"},{"type":"paragraph","text":"（乙）陈立夫第三次找汉年谈，红军留三万，服从南京，要我方让步。我们复称根本不同意蒋氏对外妥协、对内苛求之政策，更根本拒绝其侮辱红军之态度。红军仅可在抗日救亡之前提下承认改换抗日番号，划定抗日防地，服从抗日指挥，不能减少一兵一卒，并须扩充之。彼方如有诚意，须立即停战，并退出苏区以外，静待谈判结果。"},{"type":"paragraph","text":"（丙）我们决心以战争求和平，绝对不作无原则让步。"},{"type":"paragraph","text":"（丁）因上海电台尚未建立，暂时不得不由兄转，今有一要电致汉年，祈赐转为荷。"},{"type":"paragraph","text":"弟东来"},{"type":"paragraph","text":"蒸申[1]指叶剑英。"}],"authors":["毛泽东"],"dates":[{"year":1936,"month":12,"day":10}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":151,"page_end":151},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8b3537b3ee"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
