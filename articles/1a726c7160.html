<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"读者樊青华来信报告母亲检举了父亲贪污的经过","authors":["樊青华"],"dates":[{"year":1952,"month":1,"day":5}],"is_range_date":false,"parts":[{"text":"读者樊青华来信报告母亲检举了父亲贪污的经过","type":"title"},{"text":"樊青华","type":"authors"},{"text":"编辑同志:","type":"appellation"},{"text":"让我勇敢的告诉你吧!我的父亲樊少卿，因为贪污被我的母亲检举了!本来，我是不愿将自家的丑事公开出来的，觉得自己的父亲如此卑鄙，如果公开出来，我做女儿的“面子”往那里丢?后来经过思想斗争，我认识到自己是毛泽东时代的青年学生，在今天大张旗鼓反贪污、反浪费、反官僚主义的斗争中，我正应该把我母亲检举我父亲的经过介绍给大家，特别是给广大的姊妹们知道。我想通过这一例子，使广大姊妹们也能够奋起检举自己周围的贪污分子，以保护国家的财物，并把反贪污、反浪费、反官僚主义运动做得更彻底。","type":"paragraph"},{"text":"我母亲检举我父亲的经过是这样的:","type":"paragraph"},{"text":"我家世居海安，父亲过去做钱庄生意；目前在当地第二十二合作社做职员；近几个月来，我母亲发现他生活上开始浪费起来，香烟是经常不离嘴，晚上回家还时常带些酒肉回来，凭我家的收入，是不可能供他这样挥霍的，因此，这就引起了我母亲的怀疑。以后，在去年十二月中旬的一个晚上，我父亲忽然拿出五十万元来，要我母亲替他买两磅绒线，送交我姊姊，为他结一件肉衫过年；这时，母亲当即追问他这笔钱的来源，父亲起初不肯说，后来经不住母亲再三盘问，终于说出了贪污的真情，并威吓母亲不许声张。","type":"paragraph"},{"text":"这一夜，母亲未能安眠，她思前想后，想到解放前的时候:我哥哥失业在家里，父亲呢，终年做着收入不定的投机生意，一家四口，天天在愁闷里过日子；解放之后，父亲和哥哥都有了工作，我更在大学里得到人民助学金。她想到这里，觉得父亲的行为太不对了，这样太对不起毛主席和共产党。她又觉得:今天人民的眼睛是雪亮的，如果父亲再不回头，我们这个家庭，将不知搞到怎样不幸的结局!","type":"paragraph"},{"text":"经过了一夜的思索，我母亲决定劝我父亲自动向组织上坦白，不料反遭到了我父亲的无理拒绝，大骂我母亲不懂情理，我母亲忍无可忍，当即在我姊姊的支持之下，勇敢地向合作社检举了我的父亲。并将我父亲贪污的七十多万元设法偿还。母亲的这种勇敢和爱国的行动并已得到合作社方面的奖励。","type":"paragraph"},{"text":" 复旦大学 樊青华","type":"paragraph"}],"comments":[],"origin":"《文汇报》1952年1月5日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1a726c7160"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
