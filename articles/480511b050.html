以班系为基础成立统一的红卫兵组织和文化革命联络站","authors":[],"dates":[{"year":1967,"month":4,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　没有统一的组织，就没有统一的行动。在向党内头号走资本主义道路当权派发动总攻击的进军号声中，华东师范大学生物、地理、外语等系的革命红卫兵和革命学生，最近成立了以班系为基础的统一的红卫兵组织和文化革命联络站，结束了两个多月来各组织之间的“内战”。"},{"type":"paragraph","text":"这个学校原有两个全校性的组织，由于小团体主义、山头主义、风头主义等非无产阶级思想作怪，双方产生了对立情绪。各个系和班级也受到这种对立情绪的影响，班系内相应地形成了对立的两派，经常在一些枝节问题上纠缠不休。"},{"type":"paragraph","text":"在无产阶级革命派大联合的形势下，他们也曾经想联合起来，并作过一些努力；但由于双方没有在政治思想上统一起来，始终没有联合成功；有的虽然在形式上联合了起来，也是貌合神离，不能巩固。生物系两个组织为了联合，不久前曾进行“谈判”，但他们抱住自己的小山头，为了自己小团体的利益，各不相让，相持不下。他们认为，向对方让步就是“放弃原则”、“投降主义”，就是“出卖了群众”。"},{"type":"paragraph","text":"通过整风，通过学习毛主席著作，他们批判了各种各样的非无产阶级思想，彼此有了一定的了解。《红旗》杂志关于在干部问题上的资产阶级反动路线的评论员文章和调查报告以及戚本禹同志写的《爱国主义还是卖国主义?》等重要文章发表后，使他们认识到，在当前这场两个阶级、两条道路、两条路线大决战的关键时刻，无产阶级革命派必须立即联合起来，统一思想，统一意志，统一行动，共同对敌。"},{"type":"paragraph","text":"为了组织浩浩荡荡的无产阶级革命大军，参加当前的大决战，把党内头号走资本主义道路当权派彻底批倒、批透、批臭，他们求大同存小异，首先从行动上统一了起来，一起开批判斗争大会，一起上街游行示威。在共同斗争的基础上，通过谈形势，摊观点，亮思想，进一步消除了分歧，决定打散小山头，在毛泽东思想的基础上联合起来。生物系为了加强宣传，把原来分属两个组织的宣传小组合并起来，各班级还分别成立了打倒党内头号走资本主义道路当权派的各种战斗组。"},{"type":"paragraph","text":"组织上的联合大大推动了斗争运动的向前发展。一个大批判大斗争的群众运动的高潮，正在华东师大兴起。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"红卫兵运动","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"480511b050"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
