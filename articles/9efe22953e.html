r":1983,"month":9,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"资产阶级古典政治经济学出现于十七世纪中叶到十九世纪初英法两国，尤其在英国得到了最大的发展。英国古典经济学的创始人是威廉·配第，主要代表人物是亚当·斯密和大卫·李嘉图。"},{"type":"paragraph","text":"在那个时期，资本主义经济要自由发展，遇到的障碍是封建制度的束缚，所以地主阶级和资产阶级的矛盾是社会主要矛盾。在这种情况下，作为新兴资产阶级利益代表的古典经济学家在论证资本主义制度的优越性时，在寻找资产阶级发财致富的源泉和途径时，能无所顾忌地研究资本主义经济关系，敢于揭露社会经济发展的一些真相，从而在经济科学上作出重大贡献。主要是:一、坚持商品价值由生产中所消耗的劳动时间决定的观点，奠定了劳动价值论的基础。二、从劳动价值论出发，探讨了剩余价值论的一些问题。例如，亚当，斯密提出，利润和地租是雇佣工人劳动创造的价值在补偿工资后的余额。三、初步分析了社会资本再生产和流通。"},{"type":"paragraph","text":"但是，他们作为资产阶级思想家，总把资本主义制度看成是唯一合理的、永恒的制度，因而在理论上有局限性并包含一些庸俗因素，如不了解生产商品的劳动有两重性，不理解价值所体现的社会生产关系，混淆了价值和生产价格、劳动和劳动力、生产资料和资本等。马克思批判地继承了古典政治经济学的科学成果，严密地论证了并且透彻地发展了这个理论，创立了马克思主义政治经济学。因此，英国古典政治经济学是马克思主义三个来源之一。　(伯成)"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9efe22953e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
