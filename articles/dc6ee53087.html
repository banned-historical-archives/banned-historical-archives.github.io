script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"邓副总理拜会田中前首相感谢田中为中日建交立下了功绩并邀请他访问中国　田中说:缔结日中条约我等了六年，这一天终于来到了","authors":[],"dates":[{"year":1978,"month":10,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社东京十月二十四日电　邓小平副总理今天上午在东京拜会了日本前首相田中角荣，对这位为中日建交立下了功绩的政治家表示感谢。他还邀请田中访问中国。"},{"type":"paragraph","text":"田中角荣和夫人、二阶堂进、田中的女儿和女婿以及外孙女在他家的大门口迎接邓副总理一行。西村英一、木村武雄、久野忠治等四十多位日本国会议员在田中住宅院内热烈欢迎邓副总理一行。廖承志副委员长、黄华外长、韩念龙副外长和符浩大使等同日本朋友一一握手。"},{"type":"paragraph","text":"在会客室中，田中先生和邓副总理进行了亲切的交谈。邓副总理说，为中日友好事业作出贡献的日本朋友很多，我们始终记着田中前首相和大平前外相为中日邦交正常化所作的努力，对此十分感谢。田中说，缔结了日中和平友好条约，昨天交换了批准书，今天我又在东京能见到您，这不仅是我个人的大喜事，也是全日本国民的大喜事。您的这次来访，是日中关系的新起点，所以受到全日本国民的欢迎。我等了六年，这一天终于来到了。"},{"type":"paragraph","text":"邓副总理说，我们对于过去的老朋友是不会忘记的，这是东方人特有的感情。今天我们就是同老朋友叙旧。邓副总理邀请田中先生访问中国，也欢迎二阶堂先生访问中国。"},{"type":"paragraph","text":"随后，田中先生陪同邓副总理一行从会客室走到院子里，在草坪上合影留念。"},{"type":"paragraph","text":"这是一个典型的日本庭院，座落在东京都的中部。在几棵苍松中夹着丹红的枫叶，池塘水声潺潺，各色鲤鱼在池中游来游去。田中先生举杯，同中国客人一道为日中和平友好条约的生效干杯!接着，他陪同邓副总理一行走过庭院，去观赏“雪椿”(一种山茶花)。这是日中建交后栽的一棵树，现在已经长到两米多高了。田中先生栽这棵树，是为了对日中建交的永志不忘。"},{"type":"paragraph","text":"田中先生在他的庭院中接见了新华社记者。他说，日中和平友好条约的缔结和交换批准书，对日中两国来说是最大的喜事，经过了六年的努力，终于实现了，真是令人高兴得很。今后，日中两国相互信赖，永远友好，这对亚洲与世界和平都是一件大事。就日本来说，这是明治维新以来一百年中的最大喜事。"},{"type":"paragraph","text":"田中先生向记者回述了他当年在北京同已故周恩来总理会见的情景。他说:“我会见过世界上很多政治家，但是给我印象最深的是周总理，他是一位伟大的政治家，同他会见，使人感到心和心都连结在一起了。”他接着说:“当年周总理对我说，政治家要言必信，行必果，我是这样努力作了。”他在谈到同邓副总理会见的心情时说:“今天会见邓副总理，使我感到有同当年会见周总理一样的气氛。”"},{"type":"paragraph","text":"田中先生还向日本记者讲了话，日本记者说，他的谈笑风生，不减当年。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dc6ee53087"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
