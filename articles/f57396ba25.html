","authors":[],"dates":[{"year":1950,"month":5,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　南市黄家阙路棚户居民在本月十二日晚六时半举行反贪污大会，斗倒了恶霸从开宏、王寿增。经过如下在黄家阙路七十二号门前，有两只公用自来水龙头，它供应着附近一百多家棚户、六百余人口的用水。从开宏、王寿增二人是管理人。在他们管理期间，用水户要先付钞票后吃水；拿不出钱，就折成米或其他物资收要；要是有谁稍露不满，他们就以禁止用水为要挟。实收的水费通常要比自来水公司开的账单贵几倍，譬如:二月份公司账单是二三五、一九八元，每人应摊四百多元，他们却按人收一千五百元。另一方面管理漫无系统，完全凭私见随便处理，以致秩序紊乱，时有吵架现象，弄得马路和行人道上肮脏不堪，积水很多，引起群众普遍不满；但过去由于惧怕他们的恶势力，所以大家一直隐忍着。当这情况为区接管会第四办事处的工作同志所了解后，便在群众中普遍展开宣传；并召开积极份子座谈会，号召组织查账委员会查账，改选水站管理人，在群众大会上群众情绪都很激动；如秦锡文说:“为什么我家三口暂时付不出水费你要拿我一斗米?”全权说:“公用木桶内大众淘米沉落下来的碎米，穷苦的用户向他们要些，非但不肯，反而说:我要给鸡鸭吃的。”"},{"type":"paragraph","text":"在群众的斥责下，从王二人无可抵赖，才勉强承认了剥削贪污的行为。会后群众公推军属全权担任管理人，由办事处配合算账委员会根据地区环境划分三十个小组，产生小组长，准备组织水站管理委员会，每月水费账目由该会核算分担数目，一面公告，一面由小组长收集汇交后再公布收支账目，并另备一份呈办事处备核。通过这一次斗争会，群众纷纷反映说:这下好了，以后不会再有人揩我们的油了，真亏得人民政府照顾我们穷人。至于从王二人现在已由公安局扣留起来了。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f57396ba25"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
