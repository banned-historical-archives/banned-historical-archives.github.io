<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"驻华东化工学院的工人宣传队 做政治思想工作取得初步经验坚决贯彻执行毛主席的最新指示，用毛泽东思想进行政治领导；相信大多数群众是好的；做好深入细致的思想教育工作:进行阶级教育，开展谈心活动，抓关键，树先进，扬正气，并用自己的实际行动带动学生","authors":[],"dates":[{"year":1968,"month":9,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　进驻华东化工学院的工人毛泽东思想宣传队，在进校后短短的十多天时间内，初步解决了该校的“老大难”问题。他们的主要经验是:坚决贯彻执行毛主席的指示，用毛泽东思想进行政治领导，狠抓根本不转向；遵循毛主席关于“要坚决相信大多数群众是好的”的教导，对广大群众进行深入细致的思想教育工作，开展忆苦思甜的阶级教育和谈心活动，用老工人的实际行动带动学生。"},{"type":"paragraph","text":"华东化工学院是“老大难”单位之一，“内战”连绵。虽然在去年九月份实现了革命大联合，今年三月份建立了革命委员会，但由于有些知识分子的言行不一、表里不一的坏作风，问题一直没有真正解决。直到工人宣传队进校时，两大派还在激烈角逐，进行武斗。"},{"type":"paragraph","text":"工人宣传队进校时，正是两大派为一个死人开纪念大会在进行激烈的争论。工人宣传队首先调查分析了华东化工学院的形势，认为化工“老大难”就“难”在毛主席一系列指示得不到落实，现在是到了用毛泽东思想统一学生思想的时候了。工人宣传队大张旗鼓地宣传毛主席最新指示，迅速举办落实毛主席最新指示的专题学习班。在学习班上，又着重针对过去化工学院某些知识分子言行不一、表里不一的坏作风进行了批评，使这些人感到非常惭愧，初步改变了“开会不出席，发言唱高调”的坏学风，树立起理论联系实际的革命学风。这样，把两派的争论引向落实毛主席最新指示上面去。"},{"type":"paragraph","text":"经过调查研究，工人宣传队认为化工学院成为“老大难”的原因并不是群众落后。他们感到，绝大多数群众是热爱毛主席，是愿意紧跟毛主席闹革命的。工人宣传队把政治思想工作的基点放在群众中，对红卫兵小将进行政治思想教育，他们采取了这样几种做法:第一，身教重于言教，充分发挥工人阶级榜样的作用。一些好逸恶劳的学生，看到老工人每天早晨向毛主席请示、背“老三篇”，对毛主席和毛泽东思想怀有无限深厚的无产阶级感情，以及许多老工人勤劳朴素的优秀品质，激动地说:“到底是工人阶级，一定要好好向他们学习。”第二，随时随地开展谈心活动，解决活思想。老工人不知疲倦地深入学生宿舍，和学生开展个别谈心活动，用自己在新旧社会的截然不同的遭遇，以及文化大革命中紧跟毛主席伟大战略部署的体会，作现身说法，一把钥匙开一把锁，收到了很好的效果。第三，抓关键，树先进，扬正气。化机系机二(三)班和无机系二四五○班分别是两大派的“铁杆部队”，对立情绪严重，对两大派“内战”影响很大，是关键班级。通过抗大式学习班的学习，这两个班级的战士进行斗私批修，克服了资产阶级派性，一对冤家成为一帮一、一对红的对子。工人宣传队认为这两个班级的进步很快，及时在全校范围内予以表扬，形成了群众促头头，头头往前赶的热潮，推动了整个学校革命大联合的发展，从思想上消除“内战”痕迹。"},{"type":"paragraph","text":"九月六日下午，华东化工学院举行“高举毛泽东思想伟大红旗，全面落实毛主席最新指示讲用会”。市革命委员会领导成员，进驻全市各高等学校的工人毛泽东思想宣传队的代表和各高校的革命红卫兵、革命师生员工的代表共一千多人出席了会议。化工两大派同志分别介绍了在工人宣传队帮助下活学活用毛主席著作，斗私批修的体会，并表示决心在工人宣传队领导下认真搞好斗、批、改。工人宣传队的同志在会上介绍了他们进驻化工学院进行政治思想工作的初步经验。市革命委员会领导成员也在会上讲了话。"},{"type":"paragraph","text":"现在，工人宣传队正在进一步加强本身的思想建设和组织建设，为搞好化工学院的对敌斗争，夺取无产阶级文化大革命的全面胜利而不懈努力。"},{"type":"paragraph","text":"\u003cIMG alt=请插入5号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1968\\09\\6899020201.JPG\"\u003e"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"派性","type":"主题/事件"},{"name":"武斗","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f122571611"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
