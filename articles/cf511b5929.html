rt":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"干校大路","authors":["峭岩"],"parts":[{"type":"paragraph","text":"《五·七指示》绘制的蓝图，"},{"type":"paragraph","text":"南泥湾精神铺沙垫土；"},{"type":"paragraph","text":"继续革命的理论夯实的路基，"},{"type":"paragraph","text":"文化大革命喷洒的雨露。"},{"type":"paragraph","text":"路面上洋溢着五谷的芳香，"},{"type":"paragraph","text":"红旗下行进着新型的队伍……"},{"type":"paragraph","text":"我赞美你呵，干校大路，"},{"type":"paragraph","text":"你是一条光辉的路！"},{"type":"paragraph","text":"井冈老将沿着宽阔的路面，"},{"type":"paragraph","text":"描绘未来的崭新画图；"},{"type":"paragraph","text":"军营新人踏着坚实的路基，"},{"type":"paragraph","text":"擂响反修防修的战鼓。"},{"type":"paragraph","text":"“老、中、青”并肩前进，"},{"type":"paragraph","text":"把无产阶级专政的重任肩负。"},{"type":"paragraph","text":"我赞美你呵，干校大路，"},{"type":"paragraph","text":"你是一条红色的路！"},{"type":"paragraph","text":"修正主义曾刮起十二级台风，"},{"type":"paragraph","text":"妄图掀翻路基付之东流。"},{"type":"paragraph","text":"你碾碎“失业论”向前挺进，"},{"type":"paragraph","text":"把邓小平的复辟诡计彻底揭露。"},{"type":"paragraph","text":"你骄傲地铺在革命者的心里，"},{"type":"paragraph","text":"飞跨阶级斗争的险峰峡谷。"},{"type":"paragraph","text":"我赞美你呵，干校大路，"},{"type":"paragraph","text":"你是一条胜利的路！"},{"type":"paragraph","text":"清晨，我们扬锄走向田野，"},{"type":"paragraph","text":"向大地洒下闪光的汗珠。"},{"type":"paragraph","text":"我们把红心赤胆交给祖国，"},{"type":"paragraph","text":"大自然赋予我们斗天的铁骨。"},{"type":"paragraph","text":"待秋来大地红遍时，"},{"type":"paragraph","text":"思想之花伴随果实收获。"},{"type":"paragraph","text":"我赞美你呵，干校大路，"},{"type":"paragraph","text":"你是一条战斗的路！"},{"type":"paragraph","text":"夜晚，踏着你走进夜校，"},{"type":"paragraph","text":"手捧马列著作认真攻读。"},{"type":"paragraph","text":"扫尽思想上的烟雾浮尘，"},{"type":"paragraph","text":"把“卫星上天，红旗落地”的教训"},{"type":"paragraph","text":"记住。"},{"type":"paragraph","text":"在这里，多少人甩掉“资产”风，"},{"type":"paragraph","text":"又有多少人，迈开继续革命的大步！"},{"type":"paragraph","text":"我赞美你呵，干校大路，"},{"type":"paragraph","text":"你是一条防修的路！"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cf511b5929"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
