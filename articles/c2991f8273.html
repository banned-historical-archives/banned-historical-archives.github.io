art":7,"page_end":7,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"一往情深——“毛泽东足迹”邮品收藏者吴金兴小记","authors":["谭永立"],"parts":[{"type":"paragraph","text":"去年12月26日，吴金兴邮品收藏“毛泽东足迹”专题展在军事博物馆展出。前来观看专题展的观众络绎不绝，在首都引起很大反响。在诸多观众写下的留言里都称赞：此藏品展览立意深刻，形式新颖，对广大集邮、收藏爱好者提供了一个受教育的机会。"},{"type":"paragraph","text":"吴金兴是福建省军区某部干部，曾在井冈山革命老区的军营里生活过13年，深切感受到朴实的老区人民对毛泽东同志为首的无产阶级革命家的崇敬和爱戴。因此，他渐渐地也以一种由衷的爱戴之情，开始搜集毛泽东足迹邮品的活动。1993年一年里，他向各地毛泽东纪念馆、革命活动旧居遗址等单位发函580余封，回收到盖有“1993.12.26”具有邮史意义的公函封280枚。他从《中国集邮报》上得知全国各地在毛泽东诞辰100周年之际制作纪念封的信息，先后向各地汇款6000余元，搜集纪念封，其中一套朝鲜人民共和国邮票公司在毛泽东诞辰100周年时发行的立体明信片，是当今世界上发行的纪念毛泽东诞辰100周年的唯一立体明信片。"},{"type":"paragraph","text":"只要是与毛泽东有关的物品吴金兴都收藏。他基本收齐了纪念毛泽东的电话磁卡，纪念章（币）600余枚，汇集到“93、12、26”全国各地发行的报纸500多张，并自制“毛泽东同志永远活在我们心中”纪念封，请全国各地老首长、书画家在宣纸封上题字、作画。1994年初，他获知江泽民主席签署命令，授予新时期学雷锋先进集体——福建省军区驻厦门某连“鼓浪屿好八连”荣誉称号的消息，就用好八连的事迹自制印刷了150枚纪念封和300枚纪念片专程送到八连，通过签封、摄影、实寄等多种形式，不仅弘扬了雷锋精神，也首开了通过邮品和签封实寄多侧面反映一个群体全面风貌的先河。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"福建文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c2991f8273"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
