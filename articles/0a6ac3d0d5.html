ical-archives/banned-historical-archives0/main/maoquanji43.pdf"],"article":{"title":"关于修改李富春、李先念向人代会的报告的批语","alias":"","parts":[{"type":"paragraph","text":"关于修改李富春、李先念"},{"type":"paragraph","text":"向人代会的报告的批语"},{"type":"paragraph","text":"（1960年3月16日）乔木同志："},{"type":"paragraph","text":"富春报告修改进度如何？务请你于三月十八日改完，以便十九、二十两日由你帮助修改先念的报告。先念报告现由吴冷西在改，是否请伯达?先去帮他改一下，使你在最后两天审改时费力少一些。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"三月十六日上午八时"},{"type":"paragraph","text":"[1]李富春，当时任中共中央政治局委员、中央书记处书记、国务院副总理兼国家计划委员会主任。李先念，当时任中共中央政治局委员、中央书记处书记、国务院副总理兼财政部部长。"},{"type":"paragraph","text":"[2]乔木，即胡乔木，当时任中共中央书记处候补书记、毛泽东的秘书。"},{"type":"paragraph","text":"[3]指李富春1960年3月30日在第二届全国人民代表大会第二次会议上作的《关于一九六○年国民经济计划草案的报告》。"},{"type":"paragraph","text":"[4]指李先念1960年3月30日在第二届全国人民代表大会第二次会议上作的《关于一九五九年国家决算和一九六O年国家预算草案的报告》。"},{"type":"paragraph","text":"[5]吴冷西，当时任新华通讯社社长、《人民日报》总编辑。"},{"type":"paragraph","text":"[6]伯达，即陈伯达，当时任中共中央政治局候补委员、中央政治研究室主任、毛泽东的秘书。"}],"authors":["毛泽东"],"dates":[{"year":1960,"month":3,"day":16}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":192,"page_end":192},"tags":[{"name":"李富春","type":"人物"},{"name":"李先念","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0a6ac3d0d5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
