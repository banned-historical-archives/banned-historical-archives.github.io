闹事","authors":[],"dates":[{"year":1957,"month":10,"day":17}],"is_range_date":false,"parts":[{"text":"哈尔滨、鸡西两市部分工人在鸣放深入阶段少数工人酝酿闹事","type":"title"},{"text":"新华社哈尔滨17日讯  据哈尔滨、鸡西两市部分工厂在鸣放深入阶段出现了少数违反劳动纪律、不服从领导、闹工资问题等现象，个别人还酝酿闹事；右派分子和右派小集团有的也开始活动。","type":"paragraph"},{"text":"哈尔滨市电车公司，八个徒工集体找车间主任，名义上是谈工作问题，实际上是闹事，一连几小时不干工作。三、四级的电车司机因对工资不满出车时不挂拖车，经领导再三劝说才挂上。有的人背后煽动说：“大鸣大放也解决不了工资问题，要解决非得来个罢工或请愿才行”。","type":"paragraph"},{"text":"公私合营松花江家具厂一车间，工人因防汛期间修堤的工资和使用个人工具的工具费等问题，没有得到解决和答复，全车间停工半天。","type":"paragraph"},{"text":"哈尔滨市基本建设系统的吊装处，有少数工人看到鸣放时，给工段长提出了很多缺点，就不服从段长领导，经常迟到、早退，劳动纪律松弛。（陶国栋编）","type":"paragraph"},{"text":"新华通讯社编：《内部参考》，第2338期，1957年10月21日.","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"75a8faf613"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
