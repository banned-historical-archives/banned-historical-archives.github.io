script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"电机系教师通过讨论认清右派分子宗孔德反党面貌","authors":["清华大学","陈金"],"dates":[{"year":1958,"month":2,"day":11}],"is_range_date":false,"parts":[{"text":"电机系教师通过讨论认清右派分子宗孔德反党面貌","type":"title"},{"text":"清华大学陈金","type":"authors"},{"text":"电机系教师上月底讨论了电工学教研组主任、付教授、清华民盟支部委员右派分子宗孔德在整风时期的反党言行，一致认清了他的反动面目。","type":"paragraph"},{"text":"去年大鸣大放时，宗孔德在清华民盟支部会上，非常猖狂地攻击党的整风运动，从中央一直到本校党委都是他攻击的对象。它攻击说：“党没有决心，没有象肃反时那样‘不获全胜，决不收兵’的口号，而是强调和风细雨”，企图通过他的“全胜”使共产党下台。他反对人民日报驳斥右派言论，认为人民日报社论提出“整风生产两不误”是没有决心，党委号召党员按最好方式放也是没有决心。他要求党员要象物理教研组那样“鸣放”，要那样投降叛党，他心里才“舒服”、才“放心”。这难道还不清楚地说明宗孔德和我们是具有两种完全不同的立场和感情吗?","type":"paragraph"},{"text":"宗孔德还企图利用民盟作为政治资本来与党争夺领导权。早在整风之前他就在很多场合挑衅地提出：“‘长期共存，互相监督’的方针如何理解”?“只参加‘施工’未参加‘设计’如何‘监督’”?并私下对盟员表示民主党派现在不是互相监督的问题，而是参加领导的问题。在整风时更恶毒地攻击党的统战政策，认为党对民主党派不给帮助，一提就是平等；民盟人才二万人，如何能和共产党平等?他认为民主党派现在是自存的问题；显然他所要的“自存”就是要民盟发展，成为庞大的资产阶级政治力量与党分庭抗礼。在整风时他是全校第一个提出，要在学校里由共产党及民主党派联合组成充满诬蔑性和煽动性的“反报复委员会”，企图籍此与党争夺整风的领导权，这是他向党委进攻的一把狠毒的刀子。在整风时期，他还积极支持右派分子李致中的反党活动，企图把党委置于“被告”地位，而他自己成为裁判党委的“法官”。","type":"paragraph"},{"text":"宗孔德在过去就一贯坚持反党立场。解放前投靠三青团及军阀权贵之门，反对民主运动。解放后，虽经三反批判，但表面伪装进步，而内心深处资产阶级立场原封未动，对党猜疑不满。波匈事件后，他的反动面目逐渐暴露，说：“匈牙利事件是官逼民反。现在党和政府是统治人民，而不是与人民一体”。在讨论人民内部矛盾时，他说：“要消除领导与被领导的矛盾，就最好在一些事情上你领导我，在另一些事情上我领导你”，根本否认党的领导的必要性。他在检讨中也承认他希望上层建筑仍要用资本主义的。","type":"paragraph"},{"text":"经过讨论后大家一致认为应该对右派分子宗孔德进行坚决斗争，认清他的本质，而不要让他蒙混过关。","type":"paragraph"},{"text":" 来源：1958年2月11日《新清华》(清华大学新清华编辑出版委员会)。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"人民内部矛盾","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c5eb866631"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
