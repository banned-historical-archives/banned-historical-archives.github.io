"authors":["上海第一师范学院","孙文浩"],"dates":[{"year":1957,"month":5}],"is_range_date":false,"parts":[{"text":"右派言论——“开放一切禁书，包括胡风禁书在内”","type":"title"},{"text":"上海第一师范学院孙文浩","type":"authors"},{"text":"（孙文浩：上海第一师范学院语文科五班学生）","type":"subtitle"},{"text":"“开放一切禁书，包括胡风禁书在内。”","type":"paragraph"},{"text":"孙文浩坚决主张释放胡风反革命分子，他将胡风与鲁迅等量齐观，并深为胡风鸣不平。他说：“在鲁迅所处的社会还可以写写杂文骂国民党，过去国民党只是对鲁迅迫害而并没有关起来。今天胡风只写了一点批评共产党的文章，就被共产党关起来了，真是岂有此理！”并说：“现在言论不自由，报纸杂志都是共产党一把抓，鲁迅、郁达夫在国民党时发表反国民党的言论，而现在胡风不能发表反共产党的言论这是不自由。”“简直没有民主，也没有自由。”","type":"paragraph"},{"text":"他又说：“当我一旦有了希望，一定把胡风抬出来作为历史人物来写。”（按：指的是正面肯定人物）","type":"paragraph"},{"text":" 来源：《鸣放言论选集》（上海第一师范学院，1957）","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4209bd4968"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
