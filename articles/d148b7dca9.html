[],"dates":[{"year":1952,"month":11,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"出席第一届全国戏曲观摩演出大会全体代表"},{"type":"paragraph","text":"向毛泽东主席致敬电敬爱的毛主席："},{"type":"paragraph","text":"我们以无比的兴奋报告你：第一届全国戏曲观摩演出大会，在你的崇高的关怀之下，今天已经圆满闭幕了。全国戏曲界遵循着你所指示的“百花齐放、推陈出新”的正确方针，近年来做出了一些初步的成绩。这次中央人民政府文化部主办的戏曲观摩演出大会，使我们得到互相观摩、学习的机会。大会对参加演出的优秀剧目和优秀演员的评奖，对全国戏曲工作者都是极大的鼓励。我们保证今后在你的领导下加倍努力，力求进步，以期更有效地为人民服务。敬爱的毛主席，我们衷心感谢你！祝你万寿无疆！出席第一届全国戏曲观摩演出大会全体代表同上"},{"type":"paragraph","text":"十一月十四日"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d148b7dca9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
