ical-archives/banned-historical-archives8/main/maoquanji14.pdf"],"article":{"title":"致朱德、彭德怀、杨尚昆等电","alias":"","parts":[{"type":"paragraph","text":"致朱德、彭德怀、杨尚昆等电!"},{"type":"paragraph","text":"（1940年3月5日）"},{"type":"paragraph","text":"萧劲光、王若飞在秋林镇住四天，受到极大欢迎，谈判是成功的。"},{"type":"paragraph","text":"今后我们的基本政策是，继续团结阎锡山，巩固山西旧军力量在阎的指挥下，保存阎在吕梁山的地盘，恢复新军和阎的指挥隶属关系，以利华北和西北的抗战。"},{"type":"paragraph","text":"为保证此种政策的实现，双方商定划区作战的条件是：在普西以汾离公路为界，在公路以南，准备停止游击战争；在晋东南以临屯公路为界，八路军及新军不向路南发展。"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央和中央军委起草的致朱德、彭德怀、杨尚昆等并告新军各领导人电的主要内容，电报通报萧劲光、王若飞同阎锡山谈判的经过和今后对阎的革命政策。"},{"type":"paragraph","text":"[2]即汾阳到离石的这段公路。"}],"authors":["毛泽东"],"dates":[{"year":1940,"month":3,"day":5}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":454,"page_end":454},"tags":[{"name":"毛泽东","type":"人物"},{"name":"朱德","type":"人物"},{"name":"彭德怀","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9b1ba4159e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
