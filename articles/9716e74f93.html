rt":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"雷锋生前学过的《毛泽东选集》在海城面世","authors":["王洪续/牛威"],"parts":[{"type":"paragraph","text":"本报沈阳3月4日电王洪续、牛威报道：一套雷锋同志生前学习过的《毛泽东选集》1至4卷本今天在海城市与公众见面。"},{"type":"paragraph","text":"这套《毛泽东选集》为黄色封面，上面印有毛泽东头像，扉页中写有雷锋班的赠言：“敬爱的海城车站公安派出所全体同志，你们15年来一直保持着艰苦奋斗的革命品质，使我们深受感动，决心向你们学习。这是雷锋班长经常组织我们阅读过的书籍，赠给你们做纪念。3317部队运输连雷锋班。1964年2月4日。”"},{"type":"paragraph","text":"这套《毛泽东选集》是由辽宁省海城车站公安派出所珍藏的。1963年，海城车站公安派出所作为公安战线的先进集体，与雷锋班结下了“互帮互学”对子。雷锋牺牲后，在毛泽东同志“向雷锋同志学习”题词一周年前夕，海城车站公安派出所再次来到雷锋班学习，雷锋班将老班长雷锋学习用的《毛泽东选集》一至四卷赠给了他们。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9716e74f93"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
