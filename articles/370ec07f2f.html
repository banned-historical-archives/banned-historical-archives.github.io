厦门大学师生"],"dates":[{"year":1957,"month":5}],"is_range_date":false,"parts":[{"text":"关于“教育方针”的言论","type":"title"},{"text":"厦门大学师生","type":"authors"},{"text":"张鸣镛：","type":"paragraph"},{"text":"“党提出的‘全面发展，因材施教’的教育方针是错误的，教员联系学生是‘不务正业’，这次反右派斗争学生来揭发先生的反党反社会主义谬论，是使先生难以‘全面负责’！”(厦大快报17期)","type":"paragraph"},{"text":"物理系郑碧生：","type":"paragraph"},{"text":"“我不同意做一个红色专家，只要做一个淡红色的就够了。应先专后红。人的精力有限，所能学的是一个常数，多学政治就要少学专业，‘全面发展’会使业余精通成为不可能，象华罗庚这样天才的人物不会再有。有了专业就能做好一切工作，能解决一切问题，那时候党就要巴结我的。”","type":"paragraph"},{"text":"物理系黄席棠教授：","type":"paragraph"},{"text":"（对为工农兵开门的方针很抵触，对于高教部规定优先招收工农学生的规定很不满，很气愤的向高教部提意见。）“解放后学生的质量不如抗战前”，“现在的教育制度培养不出钱学森来！”","type":"paragraph"},{"text":" 来源：中共厦门大学委员会宣传部编印《右派反动言论集》，1957年9月20日。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"370ec07f2f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
