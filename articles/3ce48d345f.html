tart":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"上海市革委会举行文艺晚会欢迎柬埔寨贵宾宾努首相和夫人、英·萨利特使由张春桥主任等陪同观看演出","authors":[],"parts":[{"type":"paragraph","text":"新华社上海一九七二年十一月二十日电 上海市革命委员会今天举行文艺晚会，欢迎宾努首相和夫人、英·萨利特使及其他柬埔寨贵宾。"},{"type":"paragraph","text":"上海市革命委员会主任张春桥，副主任马天水、周纯麟、金祖敏、冯国柱、王一平，中国驻柬埔寨大使康矛召和杨玲同志，陪同柬埔寨贵宾观看演出。"},{"type":"paragraph","text":"晚会上，上海京剧团、上海市舞蹈学校的文艺工作者，为贵宾们演出了革命现代舞剧《红色娘子军》、《白毛女》和革命现代京剧《智取威虎山》、《龙江颂》、《沙家浜》的折子戏。演出结束后，宾努首相和夫人、英·萨利特使等，由张春桥主任等陪同走上舞台，同演员们亲切握手，并赠送花篮。"},{"type":"paragraph","text":"今天下午，宾努首相和夫人、英·萨利特使等柬埔寨贵宾，由马天水、周纯麟等陪同，参观了上海郊区宝山县彭蒲人民公社。上午，随同宾努首相来访的其他柬埔寨贵宾，参观了上海工业展览会。"}],"alias":""},"tags":[{"name":"张春桥","type":"人物"},{"name":"马天水","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3ce48d345f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
