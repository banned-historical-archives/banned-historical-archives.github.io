rt":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东主席打电报祝贺","authors":[],"parts":[{"type":"paragraph","text":"据新华社讯 尼泊尔国王马亨德拉·比尔·比克拉姆·沙阿·德瓦的加冕典礼，5月2日在尼泊尔首都加德满都古老的哈努曼·多卡宫中举行。出席加冕典礼的有十六个国家的政府代表团。中华人民共和国特使、国务院副总理乌兰夫率领的中华人民共和国代表团在加冕典礼上被介绍同尼泊尔国王相见。"},{"type":"paragraph","text":"加冕典礼的节日将继续一星期。在5月1日下午，国王马亨德拉主持了关于国家发展情况的展览会的开幕式。中国驻尼泊尔大使潘自力出席了这个开幕式。"},{"type":"paragraph","text":"在5月1日的晚上，中国代表团出席了在王宫举行的招待会。"},{"type":"paragraph","text":"毛泽东主席5月1日曾经打电报给尼泊尔国王表示祝贺。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ae31c8db0e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
