art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"伏罗希洛夫、赫鲁晓夫电贺刘少奇朱德周恩来等我国领导人","authors":[],"parts":[{"type":"paragraph","text":"新华社28日讯 刘少奇、朱德、周恩来同志收到了苏联最高苏维埃主席团主席克·伏罗希洛夫、苏联部长会议主席尼·赫鲁晓夫祝贺他们当选为国家领导人的贺电。电文如下："},{"type":"paragraph","text":"北京"},{"type":"paragraph","text":"中华人民共和国主席刘少奇同志，"},{"type":"paragraph","text":"中华人民共和国全国人民代表大会常务委员会委员长朱德同志，"},{"type":"paragraph","text":"中华人民共和国国务院总理周恩来同志，"},{"type":"paragraph","text":"亲爱的同志们："},{"type":"paragraph","text":"在你们被选上中华人民共和国主席、中华人民共和国全国人民代表大会常务委员会委员长和中华人民共和国国务院总理的崇高的国家职位的时候，请允许我们代表苏联最高苏维埃主席团、苏联政府和全体苏联人民向你们表示热烈的祝贺。"},{"type":"paragraph","text":"我们深信，伟大的中国人民在以毛泽东同志为首的光荣的中国共产党的领导下，将在社会主义建设事业中，在巩固和平和各国人民之间的合作的斗争中取得新的、更宏伟的成就。"},{"type":"paragraph","text":"我们谨祝你们身体健康和在为中国人民的幸福、为进一步发展和加强苏中两国人民牢不可破的兄弟友谊——世界和平和国际安全的可靠支柱而进行的工作中获得成就。"},{"type":"paragraph","text":"苏联最高苏维埃主席团主席"},{"type":"paragraph","text":"克·伏罗希洛夫"},{"type":"paragraph","text":"苏联部长会议主席"},{"type":"paragraph","text":"尼·赫鲁晓夫"},{"type":"paragraph","text":"1959年4月28日于莫斯科"}],"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"朱德","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e822ca4706"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
