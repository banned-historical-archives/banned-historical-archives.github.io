art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"用毛主席伟大战略思想推动斗批改","authors":[],"parts":[{"type":"paragraph","text":"本报讯 驻包头铁路办事处支左人员，帮助各级革委会大办毛泽东思想学习班，深刻理解毛主席关于“提高警惕，保卫祖国”，“备战、备荒、为人民”的伟大战略思想，正确处理革命和战备的关系，加快了斗、批、改的步伐。"},{"type":"paragraph","text":"在学习和贯彻元旦社论精神的过程中，支左人员发现有的同志对革命和战备的关系摆不好，影响了毛主席伟大战略思想的落实。他们便热情帮助各级革委会成员反复学习元旦社论传达的毛主席的最新指示，通过摆形势，谈体会，启发大家深刻理解毛主席的伟大战略思想，认清加速搞好斗、批、改，进一步巩固无产阶级专政，是“备战、备荒、为人民”的需要。接着，支左人员又帮助各级革委会深入群众做过细的思想工作，提高广大职工对毛主席伟大战略思想的认识。驻阿吉拉车站支左人员，和群众一起学习元旦社论，一起开展革命大批判，热情地找工人们谈心，很快就把群众发动起来了。"},{"type":"paragraph","text":"现在，毛主席的伟大战略思想已经变成广大干部和群众的自觉行动，大家用“备战、备荒、为人民”作标准检查斗、批、改，检查领导班子的革命化建设。有个基层单位的革委会，由于少数人资产阶级派性的余毒没有肃清，妨碍了领导班子的团结。当他们认识到把领导班子建设成能够经得起各种考验的坚强指挥部，是落实“备战、备荒、为人民”伟大战略方针的头等大事时，都主动查思想，挖根源，狠斗资产阶级派性，增进了革命团结。大家同心协力，带领群众把斗、批、改搞得既快又扎实。"}],"alias":""},"tags":[{"name":"派性","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"军队支左","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f951b780be"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
