亿元","authors":[],"dates":[{"year":1951,"month":12,"day":14}],"is_range_date":false,"parts":[{"text":"天津私营仁立实业公司偷漏国家税款十亿元","type":"title"},{"text":"【内部参考讯】津市私营仁立实业公司偷漏国家税款达十亿元之钜。经市税务局查获后，该公司经理朱继圣立即表示具结悔过，请求处理。税务局原决定要该公司除补缴税款外，再罚漏税额五倍的罚款，后因其尚知悔过，予以宽大处理，处以漏税额一倍之罚款，共追缴漏税及罚款二十一亿元。","type":"paragraph"},{"text":"该公司偷漏税的方法，是在正式账内用某些数字代表美金金额，另在后账内表示其美金所计算的数字，用这种方法使前账本身符合，偷税方法极其巧妙。税务局查账时发现账薄中有少数金额为后账代号，才被查获。","type":"paragraph"}],"comments":[],"origin":"新华通讯社编《内部参考》1951年12月14日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"690abc700c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
