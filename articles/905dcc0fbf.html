ical-archives/banned-historical-archives0/main/maoquanji48.pdf"],"article":{"title":"在天安门城楼上和北大附中红卫兵谈话纪要","alias":"","parts":[{"type":"paragraph","text":"在天安门城楼上和北大附中红卫兵谈话纪要"},{"type":"paragraph","text":"（1966年8月18日）毛泽东（以下简称毛）：陆平现在干什么？口口口：陆平在北大扫地。"},{"type":"paragraph","text":"毛：陆平只能扫地，就像我一样，我到了你们学校也只能扫扫地，别的干不来，我是你们的勤务员。"},{"type":"paragraph","text":"毛：张承先也是个坏人，把你们红旗拆散了，你们要把红旗拉起来。你们发展多少人啦？"},{"type":"paragraph","text":"口口口：又发展了。毛：这就对头了。（口口口问主席身体好不好）"},{"type":"paragraph","text":"毛：我身体很好，我去长江里游泳，有个青年同志肝疼了，我就上来了。要不然可以游三四个小时。"},{"type":"paragraph","text":"（口口口问主席下一步应怎么办？）毛：你们一斗二批三改，按十六条办事。（毛问口口口是否会游泳）口口口：才学会，游得不好，只会游十几米。"},{"type":"paragraph","text":"毛：那不叫游泳，那叫闲庭信步。（毛做了闲庭信步的动作）你要能这样，就从必然王国到自由王国了。你们老怕别人批评，马克"},{"type":"paragraph","text":"在天安门城楼上和北大附中红卫兵谈话纪要思主义就是压出来的，经风雨，发展兴旺起来。"},{"type":"paragraph","text":"江青：不能让她出风头，要让她谦虚。毛：你怎么能这样说呢？要让人家革命嘛！"}],"authors":["毛泽东"],"dates":[{"year":1966,"month":8,"day":18}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":511,"page_end":512},"tags":[{"name":"毛泽东","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"905dcc0fbf"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
