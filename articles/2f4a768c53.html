穿草鞋，从湘潭县城出发，步行回到韶山作了为期五天的考察","authors":[],"dates":[{"year":1977,"month":9,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"\u003cIMG alt=请插入7号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1977\\09\\7793030401.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e一九二七年一月五日，毛主席在湘潭农协和韶山党组织负责人毛福轩等同志的陪同下，手持雨伞，脚穿草鞋，从湘潭县城出发，步行回到韶山作了为期五天的考察。"},{"type":"paragraph","text":"左图是韶山第三乡农协所在地毛鉴公祠。毛主席在这里跟前来参加大会的群众促膝谈心，了解情况，在群众大会上，热情赞扬了韶山农民运动。"},{"type":"paragraph","text":"毛主席考察湖南农民运动，在短短的三十二天里，行程七百多公里。毛主席每到一地，总是满腔热情地赞扬农民的革命行动“好得很”，总是教育农运干部要特别爱护群众的积极性，总是亲自走访工、农、妇等群众组织，召开各种调查会，仔细听取他们的汇报。在调查中，毛主席以甘当小学生的精神，事先列出调查提纲，自己口问手记，同到会群众对一些问题展开讨论。　(本报记者摄)\u003c/FONT\u003e"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2f4a768c53"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
