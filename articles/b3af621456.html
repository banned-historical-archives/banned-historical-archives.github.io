:["中央文革办事组"],"dates":[{"year":1967,"month":5,"day":25}],"is_range_date":false,"parts":[{"text":"中央文革办事组给新华社的一封信","type":"title"},{"text":"中央文革办事组","type":"authors"},{"text":"中央文革办事组五月二十五日关于所有大专院校的群众组织不要介入新华社运动的一封信（摘要）","type":"subtitle"},{"text":"新华社是在中央文化革命小组直接领导下的中央宣传单位。它是党中央和国家的通讯社，担负着对国内外进行宣传工作的战斗任务。所有大专院校的群众组织，所有新华社外的群众组织，都不要介入新华社内的无产阶级文化大革命运动，都不要插入新华社内部各群众组织之间的争论。新华社的《新华公社》和《革命联合委员会》，双方都不要请社外的群众组织进新华社。社外的革命群众组织对新华社的各群众组织，对新华社的工作，有意见可以送大字报，小字报，但不要开宣传车到新华社去广播，以免影响和妨碍新华社工作的正常进行。","type":"paragraph"}],"comments":[],"origin":"1967年7月4日新华社革命联合委员会主办《新闻战线》第3版","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"中央文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b3af621456"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
