胞热情欢呼祖国文化大革命取得的伟大胜利","authors":[],"dates":[{"year":1970,"month":1,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"我驻英代办处为爱国华侨举行电影招待会"},{"type":"paragraph","text":"放映我国庆二十周年大型文献纪录影片"},{"type":"paragraph","text":"一些爱国侨胞热情欢呼祖国文化大革命取得的伟大胜利"},{"type":"paragraph","text":"新华社伦敦二十九日电　中国驻英国代办处最近为旅居英国的爱国华侨举行电影招待会，放映大型彩色文献纪录片《庆祝伟大的中华人民共和国成立二十周年》。来自伦敦及英国其他地方的华侨怀着万分激动的心情观看了这部电影。"},{"type":"paragraph","text":"招待会是在极其热烈的气氛中进行的。在电影放映过程中，每当伟大领袖毛主席的光辉形象在银幕上出现时，到会侨胞们都无比激动地一遍又一遍地长时间热烈鼓掌。他们看到毛主席身体非常健康，感到无比幸福。"},{"type":"paragraph","text":"到会侨胞从影片雄伟壮丽的游行场面中看到伟大祖国二十年来社会主义革命和社会主义建设所取得的伟大胜利，受到很大鼓舞。"},{"type":"paragraph","text":"有的侨胞说：这部电影以铁的事实，证实了毛主席的英明论断：“敌人一天天烂下去，我们一天天好起来”。"},{"type":"paragraph","text":"一些爱国侨胞热情欢呼祖国无产阶级文化大革命所取得的伟大胜利。他们说：祖国首都的国庆游行，充分反映出全国人民正团结在以毛主席为首、林副主席为副的党中央的周围，以战斗的姿态夺取新的更大的胜利，这是无产阶级文化大革命的辉煌成果。有的侨胞还说：电影的内容表现了用毛泽东思想武装起来的祖国人民响应伟大领袖毛主席的“备战、备荒、为人民”和“抓革命，促生产，促工作，促战备”的伟大号召的革命干劲。他们一致表示要更好地学习和运用毛泽东思想。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0d4c023d70"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
