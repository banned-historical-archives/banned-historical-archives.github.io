script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"日本农民和渔民集会反对资本家剥削  芬兰金属、航空和建筑工人举行全国性罢工","authors":[],"dates":[{"year":1976,"month":2,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"日本农民和渔民集会反对资本家剥削"},{"type":"paragraph","text":"芬兰金属、航空和建筑工人举行全国性罢工"},{"type":"paragraph","text":"新华社一九七六年二月九日讯 据日本东方通讯社报道：七百多名做临时工的日本农民和渔民二月八日在东京集会，反对资本家的剥削，并且要求政府执行恢复农业及沿海渔业生产的政策。"},{"type":"paragraph","text":"由于日本经济畸形发展，农业遭到破坏。有百分之八十八的农户不能单纯依靠农业生产维持生活。约有一百多万农民每年要到城市做半年的临时工，他们受到资本家的残酷剥削。"},{"type":"paragraph","text":"在八日的集会上，全国离农求业农民联合会会长栗林三郎发表讲话说，在经济发展时期，资本家利用临时工作为廉价劳动力。在经济危机时期，又剥夺他们的工作或削减他们的工资。他要求保证临时工的工作，提高工资，和改善劳动条件。他号召农民们和工人、劳动人民团结起来进行斗争。"},{"type":"paragraph","text":"日本社会党代表、全日本农民协会联合会和日本工会总评议会的代表参加了集会，他们在会上讲话表示他们和做季节工的农民们团结斗争的决心。"},{"type":"paragraph","text":"在集会上讲话的还有来自北海道、青森、秋田、山形和新?的作季节工的农民，他们愤慨地反对目前实施的农业政策，反对资本家利用这个政策残酷地剥削农民。"},{"type":"paragraph","text":"集会通过了决议，要求日本政府和资本家保证做季节工的农民和渔民能找到工作，并得到较好的劳动条件。"},{"type":"paragraph","text":"集会还通过了决议，要求日本政府发展农业生产，提高农民的生活水平。"},{"type":"paragraph","text":"新华社赫尔辛基一九七六年二月九日电　大约七千名芬兰金属工人二月九日举行了全国范围的罢工，抗议资方拒绝工人们在劳资谈判中提出的正当要求。"},{"type":"paragraph","text":"据报道，这次罢工涉及将近一半的芬兰金属工业企业，罢工斗争使芬兰二十多个城市和地区的六十多家工厂、造船厂和汽车修理厂的生产和工作全部停止。参加这一罢工行列的还有图尔库、库奥皮欧和瓦萨等六个城市的约二千五百名铁路工人以及芬兰的电话工人。"},{"type":"paragraph","text":"二月九日，芬兰航空公司的大约一千二百名维修和装卸工人以及机场工作人员也举行了罢工，罢工使芬兰所有国内班机被迫取消。"},{"type":"paragraph","text":"二月五日下午，赫尔辛基、图尔库和于伐斯居拉等城市的五千名左右的建筑工人也举行了罢工斗争。"},{"type":"paragraph","text":"今年年初以来，随着芬兰经济情况的进一步恶化和失业不断增加，芬兰森林、金属、造纸和建筑等许多工业部门的工人为争取提高工资和反对资本家以解雇和强迫工人休假等手段转嫁危机，都展开了不同规模的罢工斗争。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6b9543c4c0"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
