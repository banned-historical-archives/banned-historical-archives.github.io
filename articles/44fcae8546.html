art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"文化大革命","authors":["季阳林"],"parts":[{"type":"paragraph","text":"阴谋怕揭露，鬼怪怕太阳，反党黑帮最怕毛泽东思想。"},{"type":"paragraph","text":"什么藤儿结什么瓜，什么阶级说什么话，敌人永远是敌人，毒草永远不能变香花。"},{"type":"paragraph","text":"毛泽东思想是显微镜，牛鬼蛇神现原形。"},{"type":"paragraph","text":"魔高一尺，道高一丈，反党黑帮再狡猾，也逃不过工农兵的巨掌。"},{"type":"paragraph","text":"射人先射马，擒贼先擒王；“牺牲车马，保存将帅”是梦想！"},{"type":"paragraph","text":"读书、看戏、看电影不是生活小事，里面有尖锐的阶级斗争。如果放松革命警惕，就要受敌人“糖衣炮弹”的袭击，就有人头落地的危险。"},{"type":"paragraph","text":"我们不但要在枪林弹雨的战场上当英雄，还要在没有枪声、没有炮声的文化大革命中当闯将；奋勇揭黑帮，彻底破黑线，把牛鬼蛇神一齐搞光。"},{"type":"paragraph","text":"（季阳林辑）"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"44fcae8546"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
