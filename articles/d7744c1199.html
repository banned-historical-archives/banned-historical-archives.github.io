tart":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"同贫下中农一起举办学习班认真落实公报狠批刘少奇的反革命修正主义思想，推动了学校的教育革命","authors":[],"parts":[{"type":"paragraph","text":"本报讯 驻山东财经学院工人毛泽东思想宣传队，带领革命师生，和当地广大贫下中农一起举办毛泽东思想学习班，学习、宣传、落实党的八届扩大的十二中全会公报，狠批叛徒、内奸、工贼刘少奇的反革命修正主义思想，推动了学校的教育革命。"},{"type":"paragraph","text":"党的八届扩大的十二中全会公报发表以后，工人宣传队立即带领革命师生深入到农村，热情地向广大贫下中农宣传公报，并且和贫下中农一起举办毛泽东思想学习班，联系两条路线斗争的实际，大赞大颂毛主席的英明伟大，狠批叛徒刘少奇在农村和教育战线上所犯下的滔天罪行。贫下中农联系在旧社会的苦难家史，批判得最有力，最有教育意义。老贫农孙大娘用铁的事实怒斥了刘少奇鼓吹的“工分挂帅”。她说：“工分挂帅”是拌了蜂蜜的砒霜，一定要把刘少奇这些破烂货丢进茅坑。大队的领导成员袁金文联系他们队两条路线斗争的实际，狠批了刘少奇“三自一包”、“四大自由”等谬论。他说：“毛主席教导我们，这次无产阶级文化大革命，对于巩固无产阶级专政，防止资本主义复辟，建设社会主义，是完全必要的，是非常及时的。我们村十几年来的斗争史证明，伟大领袖毛主席的论断无比英明和正确。如果没有毛主席亲自发动和领导的这场无产阶级文化大革命，我们的国家就要变色，我们贫下中农就要遭二茬罪。”工人宣传队的老工人也用自己的亲身经历，狠批了刘少奇反动的“剥削有功论”，用铁的事实证明刘少奇是个不折不扣的大工贼。"},{"type":"paragraph","text":"贫下中农和老工人对刘少奇的批判，给了广大革命师生深刻的教育。很多同学联系自己的思想变化批判刘少奇的“读书做官论”、“公私溶化论”等修正主义黑货。大家以贫下中农为老师，对照公报亮思想、找差距。他们深深感到：对毛主席的无产阶级感情不如贫下中农深；对毛泽东思想的学用不如贫下中农好；两条路线斗争觉悟不如贫下中农高；阶级斗争观念不如贫下中农强；生产斗争知识不如贫下中农多；艰苦奋斗、勤俭节约的作风不如贫下中农好。通过亮思想、找差距，广大革命师生真正认识到自己的革命不彻底性和动摇性，决心虚心当工人、贫下中农的小学生，一辈子老老实实地接受工人、贫下中农的再教育，一辈子走与工农相结合的道路。"},{"type":"paragraph","text":"为了落实公报提出的各项战斗任务，工人毛泽东思想宣传队充分发动群众制订了下一步落实公报的措施。广大革命师生决心在工人阶级的领导下，继续和广大贫下中农一起举办各种类型的毛泽东思想学习班，一起深入开展革命大批判，彻底肃清刘少奇在农村和教育战线上所散布的一切流毒，搞好整党、建党、改革不合理的规章制度等工作，在农村闯出一条教育革命的新路子，完成斗、批、改的伟大任务，把无产阶级文化大革命进行到底。"},{"type":"paragraph","text":"（山东财经学院学习团通讯组）"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"山东文革","type":"人物"},{"name":"教育革命","type":"主题/事件"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d7744c1199"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
