动","authors":[],"dates":[{"year":1951,"month":11,"day":9}],"is_range_date":false,"parts":[{"text":"陕西南郑专区残余反革命分子又开始活动","type":"title"},{"text":"【西北总分社九日讯】近两个月来，陕西南郑专区凤县、留坝、镇巴等县残余反革命分子，又开始进行放毒、谋杀干部、造谣等破坏活动。南郑专区各首长在城固县政府吃饭时全部中毒，幸急救脱险。留坝县大队部会餐时因特务在饭中放毒，有二人中毒而死。镇巴县发生未予管制的反革命分子企图报复，刺杀干部，由于干部警惕性较高，幸未得逞。南郑县反革命分子造谣说：“蒋介石准备了很多队伍，就快向大陆反攻了。”“共产党只有两年半天下，现在谁分了田，将来国民党来了非清算不可。”在佛坪、宁强等县还流行着拉兵的谣言，弄得人心惶惶，有的农民不敢在家做庄稼。","type":"paragraph"}],"comments":[],"origin":"1951年11月10日新华通讯社编《内部参考》。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2462d43213"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
