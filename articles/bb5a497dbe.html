师范学院","常风","班书阁","田雨翔"],"dates":[{"year":1957,"month":5}],"is_range_date":false,"parts":[{"text":"常风等人的右派言论","type":"title"},{"text":"山西师范学院常风田雨翔班书阁","type":"authors"},{"text":"常风（山西师范学院教授）：","type":"paragraph"},{"text":"（1）“苏联把某些科学发明的创造记在自己的账上了，如蒸汽机的发明……”。","type":"paragraph"},{"text":"（2）学校外语系曾聘请一位苏联专家的爱人，给俄语组同学讲课，有时招待些糖、茶，他认为这是“特殊待遇”又说：“‘北大’时有一位美国教授跟中国教授的待遇一样，我坚持不聘10年制教员，拉洋车的能说外国话，但教不了书（苏联10年制毕业也教不了大学）”。","type":"paragraph"},{"text":"田雨翔（山西师范学院教授、民盟省筹委组织部长）：","type":"paragraph"},{"text":"“共产党是一个封建王朝、互相撕杀的宗派集团；如果贝利亚不死，马林科夫也垮不了台”。","type":"paragraph"},{"text":"班书阁（山西师范学院教授、民盟支部委员）：","type":"paragraph"},{"text":"“‘德’是会舔领导的屁股；‘才’是舔的领导很舒服；‘资’是舔的次数很多。”","type":"paragraph"}],"comments":[],"origin":"《“鸣”、“放”选集（四）》（中共山西省委整风办公室编印，1957年11月）。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bb5a497dbe"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
