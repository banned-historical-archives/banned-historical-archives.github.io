art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"用毛泽东思想鉴别一切","authors":["战士齐跟东"],"parts":[{"type":"paragraph","text":"在我们最最敬爱的伟大领袖毛主席的关怀和支持下，一个无产阶级革命派大联合、大夺权的群众运动，正在轰轰烈烈展开。我军广大指战员，怀着对伟大领袖毛主席和战无不胜的毛泽东思想无比深厚的阶级感情，热烈响应毛主席的伟大号召，坚决支持和援助无产阶级革命派的夺权斗争。"},{"type":"paragraph","text":"有些同志担心，解放军支持夺权斗争，认不清哪些是左派，哪些是右派。怎么办？其实，这种顾虑是不必要的。毛主席教导我们说：“我们共产党员应该经风雨，见世面；这个风雨，就是群众斗争的大风雨，这个世面，就是群众斗争的大世面。”只有在游泳中才能学会游泳，在斗争中才能学会斗争。"},{"type":"paragraph","text":"我们是毛主席亲手缔造的人民军队。光焰无际的毛泽东思想照耀着我们，是我们的指路明灯。文化大革命是我们最好的活学活用毛主席著作的大课堂。毛主席说：“要了解情况，唯一的方法是向社会作调查，调查社会各阶级的生动情况。”只要我们高举毛泽东思想伟大红旗，按照毛主席的教导，认真向社会作调查，向群众作调查，用阶级分析的方法分析问题，就能分清是非，辨明敌我。就能认清谁走社会主义道路，谁不走社会主义道路；谁拥护毛主席，谁反对毛主席；谁执行以毛主席为代表的无产阶级革命路线，谁不执行以毛主席为代表的无产阶级革命路线；谁是真正的无产阶级革命派，谁是冒牌货。"},{"type":"paragraph","text":"对于真正的无产阶级革命派，即使暂时是少数，我们也要坚决支持。他们要军队支持和援助，我们应当满足他们的要求。对于受蒙蔽的群众，我们要用毛泽东思想去教育争取他们。对于反革命组织和反革命分子，对于牛鬼蛇神，就要狠狠地打击！总之，谁拥护毛泽东思想我们就和他亲，谁反对毛泽东思想我们就和他拚。我们在政治上是否过得硬，这正是考验我们的时候。我们要在无产阶级文化大革命中，在阶级斗争的大风雨、大世面中，把毛泽东思想真正学到手。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4a3e8eff6d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
