art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"海防战士永远忠于毛主席","authors":["国庆观礼代表/南京部队某部指导员柳生法"],"parts":[{"type":"paragraph","text":"十月一日上午十时整，是我终生难忘的幸福时刻，我们全体国庆观礼代表在天安门见到了我们心中最红最红的红太阳毛主席和他的亲密战友林副主席。我们来自海防前线的革命战士喜泪盈眶，千遍万遍地高呼：毛主席万岁！毛主席万万岁！"},{"type":"paragraph","text":"当伟大领袖毛主席和他的亲密战友林副主席迈着稳健的步伐登上天安门的时候，我们的心啊，象大海的波浪，汹涌澎湃。毛主席他老人家红光满面，神采奕奕，身体非常非常健康，精力非常非常充沛。这是革命人民的最大幸福。毛主席啊，毛主席！在这最幸福的时刻，我们海防战士有多少贴心的话儿要对您讲，有多少热情的歌儿要对您唱。浩瀚的大海容纳不下我们对您的无限热爱，最好的语言也表达不尽我们对您的无限崇拜，千歌万曲凝成一个最美好的祝愿，敬祝您老人家万寿无疆！万寿无疆！"},{"type":"paragraph","text":"毛主席啊，毛主席！是您老人家的光辉思想哺育着革命战士茁壮成长。我们连队长期守卫在东海最前沿的一个小岛上。这里的气候变化无常，一年四季不是刮风就是下雨。面对这样艰苦的环境，我们全连同志手捧红宝书，身在小岛望北京，反复学习您老人家的光辉著作“老五篇”，发扬一不怕苦、二不怕死的革命精神，以苦为乐，以岛为家。岛上交通不使，缺水少菜，同志们就以老红军爬雪山讨草地、吃草根树皮的革命精神克服困难。每当喝不上水、吃不上菜的时候，同志们想起您老人家的伟大教导，想起革命前辈在您老人家的英明领导下，不畏艰险、不怕牺牲，为人民抛头颅洒热血的英雄气概，我们就感到今天吃这一点苦，又算得了什么！同志们豪迈地说：为了保卫毛主席，保卫伟大的社会主义祖国，我们愿在小岛上站一辈子岗，放一辈子哨。就这样，在您光辉思想的指引下，我们与海斗，与风斗，与自己头脑里的“私”字斗，胜利地完成了您老人家交给我们的光荣任务，连续八年被评为四好连队。"},{"type":"paragraph","text":"。�毛主席！我们一定把您的亲切关怀作为继续革命的起点，更高地举起您光辉思想的伟大红旗，以您的亲密战友林副主席为光辉榜样，永远忠于您，永远忠于您的光辉思想，永远忠于您的革命路线�J笨汤渭悄�老人家关于〖JZ/加重〗“抓革命，促生产，促工作，促战备”"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"31159f0a3b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
