art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"掀起学习毛主席著作的热潮","authors":["李长明王治平"],"parts":[{"type":"paragraph","text":"列为军事学习主要内容"},{"type":"paragraph","text":"昆明步校把毛主席的“论持久战”“中国革命战争的战略问题”“十大军事原则”等著作，列为在职干部今年军事学习的主要内容。大家学习劲头很大，都说：毛主席的军事著作，实际上就是我军的建军路线，是我们作战和训练的行动指南，一定要认真地学习！ （李长明）"},{"type":"paragraph","text":"结合备课系统学习"},{"type":"paragraph","text":"海军军事学院的一部分教员，最近座谈学习毛主席著作心得时，检查了过去学习上的缺点，明确了：今后要以研究毛主席著作为中心，进行学术研究；在教学中坚决贯彻“厚今薄古”的原则，运用毛主席的辩证唯物主义观点阐述问题。许多同志决心结合备课，系统地学习毛主席著作。"},{"type":"paragraph","text":"（海军学院政治部）"},{"type":"paragraph","text":"领导同志学在前面"},{"type":"paragraph","text":"0135部队的几位领导同志，于5月上旬组成学习毛主席著作小组，并已开始学习。他们计划在今年内学习“中国革命战争的战略问题”“十大军事原则”“抗日游击战争的战略问题”“战争和战略问题”等著作。 （兴）"},{"type":"paragraph","text":"三年学完毛主席著作"},{"type":"paragraph","text":"海军一航校正在大力组织干部学习毛主席著作。校党委要求全校干部在三年之内学完毛主席的军事著作，处、科以上干部今年要学完“实践论”和“矛盾论”。学习中，人人要作心得笔记，做到理论联系实际。广大干部热烈响应校党委的这个决定，迅速组成学习小组，开始进行学习。（王治平）"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3d6c9b28f8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
