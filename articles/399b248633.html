rt":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"海军军训部端正业务工作指导思想肃清“政治可以冲击其它”、“无政府主义”、“本本主义”、“知识无用”的影响","authors":["杨渭源"],"parts":[{"type":"paragraph","text":"本报讯 7月中旬以来，海军司令部军训部重点联系海军部队在“文化大革命”期间训练工作遭受的严重损失，深入进行彻底否定“文革”的专题学习，进一步肃清“左”的影响，端正业务工作的指导思想。"},{"type":"paragraph","text":"“文化大革命”中，林彪鼓吹“政治可以冲击其它”，“军事要给政治让路”，李作鹏甚至说：“鱼雷打不出去，用头顶出去”。他们制造军政对立，取消军事训练，破坏训练体制，削弱专业骨干队伍，废除各种规章制度，造成海军部队舰艇不航，潜艇不潜，飞机不飞，训练受到极大破坏，战斗力严重下降。"},{"type":"paragraph","text":"经过党的三中全会以来的拨乱反正，海军的训练工作发生了根本的变化，军事素质有了很大提高。但是，“左”的影响还没有彻底清除，同志们分析了“左”的影响在当前的一些表现："},{"type":"paragraph","text":"——受“政治可以冲击其它”的影响，有的领导同志抓军事训练和技术业务仍然心有余悸，不能经常地、自觉地把教育训练摆到战略地位。"},{"type":"paragraph","text":"——受“无政府主义”的影响，不少同志对条令条例、大纲规范贯彻不力，作风、纪律松散，有章不循，违章蛮干的现象仍然存在。"},{"type":"paragraph","text":"——受“本本主义”的影响，习惯于从书本上找现成答案，思想不够解放，因循守旧，闭关自守，不愿借鉴外军的有益经验，不注意研究新情况、解决新问题。"},{"type":"paragraph","text":"——受“知识无用”的影响，有些同志不重视知识，不尊重科学，不钻研现代军事科学技术，不注意发挥知识分子作用，对院校毕业学员抱有偏见，不按海军的特点和训练规律办事，人与技术的矛盾没有很好解决。"},{"type":"paragraph","text":"同志们深深感到，上述“左”的影响，是今天开创军事训练新局面的严重障碍。大家更加明确了今后要自觉地以教育训练为中心，学军事，钻业务，这是建设现代化、正规化革命军队的需要。他们集思广益，提出了改进各类舰艇训练的建议，准备认真总结海军教育训练正反两个方面的经验教训，对训练体制、内容、程序、方法、保障等，全面深入地改革，创造出具有我国海军特色的训练发展道路。（杨渭源）"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"399b248633"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
