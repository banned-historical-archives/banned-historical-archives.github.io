thubusercontent.com/banned-historical-archives/banned-historical-archives3/main/b2b674a1-9042-4317-a7b8-de4267668ba5.pdf"],"article":{"title":"对新华社、《人民日报》的指示——谈肃反斗争宣传等问题","alias":"","parts":[{"type":"paragraph","text":"对新华社、《人民日报》的指示"},{"type":"paragraph","text":"谈肃反斗争壹传等问题"},{"type":"paragraph","text":"（一九五八年七月八日××傅达）文章发表的面比较宽了，同前可以乘取少丽精的原则了"},{"type":"paragraph","text":"群众的检举很有作用：这要大大提倡：反革命最怕的是千千方万的人。报有几百封案信。有材料，座写成新闭，读者知道自巴的信有了下落。对反革命分子也要进行神经，使他们知道我们发动了群众：并且进一步母召群众检举，写成雅论。"},{"type":"paragraph","text":"不要把自由主义当作政治上独立玉国：反党等等"},{"type":"paragraph","text":"青殖民主义者侵略西亚"},{"type":"paragraph","text":"（一九五八年七月廿八日）：毛主席在印度新任驻华大优向他递交国书时室客词申说：“目前由于殖民主义者对西亚的侵略，至使国际和举受到严重胁。*"},{"type":"paragraph","text":"毛主席还指出：我们“必将惠举项则韵顿，为维护亚翻和世界和举作出应有的努力。”"},{"type":"paragraph","text":"靓察徐水时的谈话（摘录）"},{"type":"paragraph","text":"（一九五八年八月四日）其实粮食多了还是好！多了，国家不要：业社员自已多赚！一天吃五也行赚！这妇女解放得很彻底哩！是呀！人人都吃食堂，社社都办幼儿园。‘."},{"type":"paragraph","text":"这个县是十一万多劳力，轴出了四万多摘水利：打机井、办工业，只有七方多人搞农业嘛！"},{"type":"paragraph","text":"他们这又解放妇女劳力，又搞军事化，全县业社摘了九十多个团：两百多个：他们就是这个办法哩！"},{"type":"paragraph","text":"你们这粮食吃不完，怎么办呀！粮食多了，以后就少种一些，一天做半天活儿，另外半天搞文化、学科学、关文化娱乐、办大学、中学，你们看好么？祝你们丰收：秋收我要有时"}],"authors":["毛泽东"],"dates":[{"year":1958,"month":7,"day":8}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":105,"page_end":105},"tags":[{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"68b0ad1862"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
