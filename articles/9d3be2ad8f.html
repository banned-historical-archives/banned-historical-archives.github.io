iles":[],"article":{"title":"劳动部工资局关于职工被判处徒刑以后又撤销原判或改变了处分，其已‘服刑’的时间是否计算工龄问题的复函","dates":[{"year":1964,"month":10,"day":18}],"is_range_date":false,"authors":["劳动部工资局","甘肃省劳动局"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"铁道部政治部审干办公室, 审干工作政策选编(三), 371","tags":[{"name":"工龄","type":"主题/事件"}],"parts":[{"type":"title","text":"劳动部工资局关于职工被判处徒刑以后又撤销原判或改变了处分，其已“服刑”的时间是否计算工龄问题的复函[1]"},{"type":"subtitle","text":"（一九六四年十月十八日）"},{"type":"paragraph","text":"甘肃省劳动局："},{"type":"paragraph","text":"你局九月二十九日（64）劳薪字1058号函收到。所询关于职工经法院判刑又经复查平反，撤销原判或改变了处分，其已“服刑”的时间是否算作工龄的问题，我们同意你们在来函中所提的意见，即：对于因错判或撤销原判不给处分或改为行政处分（不包括开除）的，其已“服刑”的时间，可以与“服刑”前后的连续工作时间，合并计算为连续工龄；对于改判刑期或改为开除处分的，其服刑或已“服刑”的时间，均不得计算为工龄。"},{"type":"paragraph","text":"（摘自〔64〕中劳薪字第439号文件）"},{"type":"paragraph","text":"[1] Note: This document can also be found in 最高人民法院刑事审判第二庭, 刑事申诉工作手册, p. 429."}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9d3be2ad8f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
