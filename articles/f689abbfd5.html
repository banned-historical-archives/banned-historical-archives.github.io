" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji48","name":"毛泽东全集第48卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji48.pdf"],"article":{"title":"关于劳改工作的指示","alias":"","parts":[{"type":"paragraph","text":"关于劳改工作的指示！"},{"type":"paragraph","text":"（1965年4月）"},{"type":"paragraph","text":"劳改犯办了很多事情，要用，在一定条件下，可以为我们所用。我们没有几个贪污分子不行，这样大的国家没有几个反革命分子不行。"},{"type":"paragraph","text":"他们可有才能！没有才能，反革命干什么？在一定条件下他能做很多事，凡有功的，可以摘掉帽子，有的还可以奖励。二十三条为什么规定这么一条：工作队的成员不一定要十分干净，有坏人不要怕，有些人政治上不好，但很有才干，改造嘛！改造不了也不要紧，只要把他们引到正路，就很有用，我们不会贪污，不懂贪污，也不懂技术，他们懂得这些，只要我们知道他们，政治挂师，可以让他们办很多事，可以发挥他们的作用。就是要调动他们，他们中间可有才能，他发明真空电炉，是高级产品，我们不行，他行。"},{"type":"paragraph","text":"二改造要抓紧，不要在经济上做文章，不要想在劳改犯人身上搞"},{"type":"paragraph","text":"[1]本篇一是1965年4月，关于王灿文发明真空冶炼电炉的指示；本篇二是1965年4月，在十四次公安会议期间对劳改工作的指示。毛泽东全集第四十八卷多少钱，要抓改造，让他们寄点钱回家。"},{"type":"paragraph","text":"第一是思想改造，第二是生产，劳改工作干部不能太弱，要训练。训练两个星期就行了。"}],"authors":["毛泽东"],"dates":[{"year":1965,"month":4}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":33,"page_end":34},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f689abbfd5"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
