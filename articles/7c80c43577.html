script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反对垄断资本残酷剥削  意大利各地两百多万工人举行大罢工  五万名罢工者从全国各地汇集罗马，高举红旗和标语牌，举行声势浩大的示威游行","authors":[],"dates":[{"year":1969,"month":10,"day":31}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反对垄断资本残酷剥削"},{"type":"paragraph","text":"意大利各地两百多万工人举行大罢工"},{"type":"paragraph","text":"五万名罢工者从全国各地汇集罗马，高举红旗和标语牌，举行声势浩大的示威游行"},{"type":"paragraph","text":"新华社三十日讯　罗马消息：意大利各行业两百多万名工人二十八日在意大利各地掀起了抗议垄断资本残酷剥削的罢工斗争的新浪潮。"},{"type":"paragraph","text":"一百多万名建筑工人、窑业工人、采石工人、水泥和水泥制品工人举行了二十四小时全国总罢工。其中五万名罢工者从全国各地汇集到罗马，举行了声势浩大的示威游行，他们手里拿着许多横幅标语、标语牌和红旗。许多学生也参加了这次示威。在其他一些城市，罢工的建筑工人等也举行了示威。"},{"type":"paragraph","text":"将近五十万五金、汽车、化学和橡胶工人，在米兰、都灵、波伦亚、特尔尼等工业城市也同时举行罢工。在米兰，愤怒的罢工者把垄断资本集团的组织——工业家联合会的大楼包围了整整一天。在都灵，一千五百名工人冲进了菲亚特汽车公司的两个工厂，捣毁了一百辆新汽车。"},{"type":"paragraph","text":"意大利北部、中部和南部许多城市的工人连日来还纷纷举行总罢工，抗议苛捐杂税和物价房租猛涨。罢工工人同学生和居民一起在许多城市举行示威游行。在意大利南部那不勒斯，参加示威游行的有二十万人。"},{"type":"paragraph","text":"与此同时，意大利许多城市的工人和学生还举行示威，强烈抗议反动警察在彼萨市袭击反对新法西斯党的人民。意大利中部托斯卡纳区的皮昂比诺、里窝那和阿雷佐的工人举行了抗议罢工。在罗马、米兰、维亚雷焦、卢卡等城市，学生也举行了示威游行。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7c80c43577"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
