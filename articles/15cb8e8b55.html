],"dates":[{"year":1950,"month":8,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京廿六日电】　中央人民政府毛泽东主席，中国人民解放军朱德总司令，政务院周恩来总理，曾接受西北各方面少数民族代表及中华全国科学工作者代表会议和第一届全国卫生会议的献花、献礼、献旗、献词，在二十日下午举行的这一隆重献礼致敬大会上，朱总司令曾向到会的九百余代表讲话。西北各方面民族代表所献的礼物中，有藏红花、鹿角、藏香、藏麝香丸等边陲名贵产物。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"15cb8e8b55"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
