art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"首都军民吊唁陈赓同志","authors":[],"parts":[{"type":"paragraph","text":"本报19日讯 首都各界人民和驻京陆、海、空三军的干部和战士，从昨天起陆续来到首都中山公园中山堂，吊唁中国人民的忠诚战土陈赓同志。"},{"type":"paragraph","text":"陈赓同志的灵堂设在中山堂。灵堂正中悬挂着陈赓同志的遗象，遗象两旁垂着黑纱，下面布满了常青的盆松。遗象前面的灵台上，安置着陈赓同志的骨灰盒，上面复盖着“八一”军旗。灵台两旁，摆着毛泽东、刘少奇、周恩来、朱德、陈云、林彪、邓小平等党和国家领导人送来的花圈；灵堂内外，还布满了各机关团体送来的挽联和花圈。"},{"type":"paragraph","text":"两天来，中共中央各部门、国家机关各部门、各民主党派和人民团体的负责人和干部，我军总部和各军种、兵种、院校的干部和战士，陆续来到中山堂。他们抬着花圈、戴着黑纱或白花，在哀乐声中来到陈赓同志的灵前默念致哀，悼念这位一生对党对人民忠心耿耿，把毕生精力献给伟大的共产主义事业的忠诚战士。"},{"type":"paragraph","text":"两天来，苏联、越南民主共和国、朝鲜民主主义人民共和国、德意志民主共和国等兄弟国家驻我国的大使、代办和外交官员，以及各国驻华武官，也先后到陈赓同志灵堂吊唁。"},{"type":"paragraph","text":"在吊唁的时候，我军陆、海、空军干部和陈赓同志家属轮流守灵。"},{"type":"paragraph","text":"牛嵩林"},{"type":"paragraph","text":"驻京部队官兵吊唁陈赓同志"},{"type":"paragraph","text":"牛嵩林"},{"type":"paragraph","text":"本报记者 牛嵩林摄"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"25e2b46172"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
