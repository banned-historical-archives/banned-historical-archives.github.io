议全文","authors":[],"dates":[{"year":1951,"month":3,"day":29}],"is_range_date":false,"parts":[{"text":"天津市市、区各界人民代表扩大会议决议全文","type":"title"},{"text":"我们听了许副市长关于镇压反革命的报告，认为反革命分子的罪恶滔天，是人民的死敌，必须予以严厉的镇压。尤其是听了卫淑云同志刘老太太对特务恶霸的控诉以后，更增加了我们对这些反革命分子无限的愤恨。我们完全拥护人民政府镇压反革命的政策、对于最近逮捕反革命分子的措施，以及对其中一批罪大恶极的分子严厉处置，我们认为是完全正确的应该的，这是我们人民的伟大的胜利。我们完全同意黄市长的结论，并号召各界人民提高警惕，加强团结，坚决协助政府彻底肃清反革命分子，巩固人民民主专政，保卫我们胜利的果实，建设新天津建设新中国。","type":"paragraph"},{"text":" 三月二十九日","type":"paragraph"}],"comments":[],"origin":"《天津日报》1951年3月30日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"83b998f395"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
