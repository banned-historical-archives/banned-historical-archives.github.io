判大旗奋勇前进》同时上映","authors":[],"dates":[{"year":1967,"month":6,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　在我国无产阶级文化大革命取得决定性胜利的凯歌声中，一部反映上海广大革命师生复课闹革命的彩色纪录片《革命小将最听毛主席话》，已在市、郊各影院陆续上映。"},{"type":"paragraph","text":"由东方红电影制片厂摄制的这部影片，纪录了革命小将高举革命的批判旗帜，彻底批判中国的赫鲁晓夫炮制的黑《修养》和资产阶级反动路线，实现革命的大联合的斗争场面。在当前，广大革命群众牢牢掌握斗争大方向，以革命的大联合，推动革命的大批判的关键时刻，这部影片的放映，将给斗争中的广大工农兵群众、革命师生和红卫兵小将以巨大的教育。"},{"type":"paragraph","text":"毛主席教导我们:“你们要关心国家大事，要把无产阶级文化大革命进行到底!”一幕幕生动的情景，反映了革命小将无限忠于毛主席，忠于战无不胜的毛泽东思想，忠于毛主席的革命路线的赤胆忠心。革命小将“杀”向社会与工农相结合，荡涤旧社会遗留下来的污泥浊水，打退了资产阶级反动路线的猖狂进攻，立下了不朽的功勋。我们伟大统帅毛主席发出“复课闹革命”的伟大战斗号召后，革命小将又纷纷“杀”回学校去，复课闹革命。银幕上，革命小将们满怀革命豪情，向人民解放军学习，学政治、学军事、学四个第一、学三八作风，加强无产阶级的革命性、科学性和组织纪律性。上海市第六女中的革命小将们，开展深入细致的思想工作，帮助受蒙蔽的同学迅速回到毛主席的革命路线上来，同仇敌忾，对准中国的赫鲁晓夫猛烈开炮!红旗漫卷，锣鼓喧天，一个个校革命委员会、红卫兵团庄严宣告成立了。革命小将们纵情地歌唱，热情地欢呼，歌唱无产阶级文化大革命的辉煌战果，欢呼毛泽东思想的伟大胜利。"},{"type":"paragraph","text":"影片最后纪录了革命小将载歌载舞，欢庆中共中央一九六六年五月十六日《通知》的公开发表。他们表示:决不能再让资产阶级知识分子统治我们的学校，一定要把权夺过来，掌好权，用好权，让光焰无际的毛泽东思想永远永远占领教育阵地。"},{"type":"paragraph","text":"本报讯　东风浩荡红旗飘，五湖四海卷怒潮。正当全市无产阶级革命派以革命的大联合进一步推动了向党内头号走资本主义道路当权派的革命大批判高潮中，上海工农兵电影制片厂摄制的彩色纪录片《高举革命批判大旗奋勇前进》，已在市、郊各影院上映。"},{"type":"paragraph","text":"影片纪录了广大工农兵群众、革命师生和红卫兵小将，以笔作刀枪，愤怒批判、控诉中国的赫鲁晓夫和他在上海的代理人的滔天罪行的大批判活动。通过革命的大批判、大斗争，加速了革命的大联合和革命的“三结合”，有力地推动了本地区、本部门、本单位的斗、批、改。"},{"type":"paragraph","text":"影片还纪录了上海无产阶级革命派坚决响应毛主席“抓革命，促生产”的伟大号召，斗志昂扬，意气风发，挑起革命、生产两副重担，沿着毛主席指示的革命航道奋勇前进的英雄气概。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a31526300b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
