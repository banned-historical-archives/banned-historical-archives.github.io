rt":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"安徽文化大革命形势空前大好全省办起了毛泽东思想学习班五万七千多个，参加学习的近三百万人；十五个专区和市，已有十四个实现了革命大联合","authors":[],"parts":[{"type":"paragraph","text":"据新华社合肥五日电 安徽省无产阶级文化大革命形势空前大好，越来越好。目前，全省十五个专区和市，已有十四个实现了革命大联合。联合较早的合肥、淮南、马鞍山、阜阳等地，在斗争中进一步从思想上巩固了革命大联合，目前正在筹备建立革命委员会。芜湖市长期对立的两派革命群众组织，最近也实现了革命大联合，这对长江两岸和皖南地区文化大革命的胜利发展将起有力的促进作用。"},{"type":"paragraph","text":"安徽省的无产阶级革命派和广大革命群众，在人民解放军支左部队的帮助下，广泛掀起了全面落实毛主席最新指示的新高潮。各地都把大办、办好毛泽东思想学习班，作为全面落实毛主席最新指示的关键。据不完全统计，全省已办学习班五万七千多个，参加学习的近三百万人。广大工农群众、红卫兵小将、革命干部和革命知识分子，怀着对伟大领袖毛主席无限热爱、无限忠诚的深厚阶级感情，踊跃参加学习班学习。他们在学习班里，狠斗私字，大立公字，展开了一场围剿资产阶级、小资产阶级派性的“人民战争”。"},{"type":"paragraph","text":"伟大领袖毛主席教导说：“正确地对待干部，是实行革命三结合，巩固革命大联合，搞好本单位斗、批、改的关键问题，一定要解决好。”广大无产阶级革命派和革命群众遵照毛主席这一教导，积极帮助革命干部正确地对待群众，正确地对待自己，深刻地检查自己的错误，勇敢地站出来革命。广大革命干部也坚决响应毛主席的伟大号召，到群众中去，虚心向群众学习，听取群众意见，改造自己的世界观，取得群众的谅解。现在，从省到各县已经解放出一大批革命干部，为实现革命三结合创造了条件。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"安徽文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"派性","type":"主题/事件"},{"name":"人民战争","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"name":"军队支左","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"95a7fc14e4"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
