tart":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"狠批“四人帮”警惕守边防","authors":["红前哨/郑高生"],"parts":[{"type":"paragraph","text":"驻守在祖国北部边疆的内蒙古军区边防某团六连指战员，在揭发批判“四人帮”篡党夺权的滔天罪行的过程中，联系苏修社会帝国主义在我边境制造事端，妄图对我国发动侵略战争的大量事实，狠批“四人帮”崇洋媚外、里通外国、大搞投降主义、卖国主义的反革命罪行。他们决心永远紧握手中钢枪，用鲜血和生命守好祖国的北大门。"},{"type":"paragraph","text":"六连指战员把对“四人帮”反党集团的无比仇恨，变成了抓革命促战备，坚守祖国边防的巨大动力。他们更加积极投入战备施工的战斗，每天早出晚归，风雪无阻，施工进度连日刷新。为了随时应付敌人的突然袭击，他们时时刻刻保持着高度的警惕，各班、排都建立了战备值班制度，经常检查督促，使战备工作落到实处。他们还同驻地公社武装部门、军民联防指挥部召开了联防会议，重新研究制定了协同作战方案。不论是平时，还是假日，他们都做到一声令下，立即出动。（红前哨、郑高生）"}],"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"name":"夺权","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ec78365b83"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
