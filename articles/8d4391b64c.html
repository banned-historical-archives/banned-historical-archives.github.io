,"dates":[{"year":1962,"month":12,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"印度一读者投书报纸指出"},{"type":"paragraph","text":"“紧急状态”使工人遭到严重剥削"},{"type":"paragraph","text":"新华社4日讯　孟买消息：最近一期的《闪电》周报登载的一封读者来信表明，印度政府在对中国发动进攻后宣布的“紧急状态”已使印度工人阶级遭到更严重的剥削。"},{"type":"paragraph","text":"科勒何写的这封信说：“1962年11月1日，马欣德拉有限公司（吉普车制造部）资方以‘没有工作’为借口裁减了三百名工人，这些工人干了四年而没有加过一次工资。资方答应他们做临时工。这家公司在加特科帕尔的工厂的资方也采取了这种雇临时工的做法，这实际上是剥削工人的做法，而工人由于‘紧急状态’不能对此表示反对。”"},{"type":"paragraph","text":"这封信指责说：“因此，工人只能默默地忍受。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8d4391b64c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
