es":[{"year":1957,"month":5,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　华盛顿消息:美国华盛顿大学，最近制作了一种测定人的劳动强度的机器，它的名字叫做“尤诺派”(Unopar)。"},{"type":"paragraph","text":"这种机器开始制作的时候，就引起各方面的注意。美海军研究所曾特地拨给监制者那特拉教授一万二千八百元美金。“尤诺派”的主要用途是替资本家测定工人们的劳动强度，从而进一步剥取工人阶级的剩余劳动。过去某些资本家曾利用电影的快速摄影，或是测定氧的消耗量、心脏跳动的情况等方法来探知工人们的疲劳度。而“尤诺派”是利用相对波动效果的原理所制成的。目前这种机器只能分析较简单的动作，像手的操作程度等。这种机器操作时，先在操作者身体的各部分装上小型的微音器，当工作开始后，这些地方便跟随着机器发出震动，通过微音器，便能把音波收集在示波器或纸带上面。只要分析这样的纪录图表，就能得出被测定者的劳动潜力。当这种“尤诺派”完成实验正式被采用时，工人们就要过像卓别麟在“摩登时代”电影中那样干活干得没有尽头的日子。"},{"type":"paragraph","text":"(林若男)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f5f27f0266"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
