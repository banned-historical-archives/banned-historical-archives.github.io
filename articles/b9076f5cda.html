"year":1950,"month":7,"day":31}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报北京讯】　中央美术学院院长徐悲鸿，于今年春季开始绘作‘人民的毛主席’巨幅油画，(画幅四码长，二码高。)二十日后即将完成。作画期间，共制画稿达百幅以上。徐因患血压高之症，六年来未作油画，此次精心绘此巨画，实由于毛主席精诚的感召。这幅画主要表现毛主席在群众中的影响，毛主席着草黄色衣，举右手前进，上空为和平之鸽成群高翔，周围为四个阶级群众致敬欢呼，画面气氛极为热烈。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b9076f5cda"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
