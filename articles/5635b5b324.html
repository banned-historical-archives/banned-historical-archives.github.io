作","authors":[],"dates":[{"year":1979,"month":4,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"邓副总理会见美众院军委会议员团"},{"type":"paragraph","text":"指出当前国际局势发展的趋势要求中美两国加强交往和合作"},{"type":"paragraph","text":"新华社北京四月十六日电  邓小平副总理今天上午会见了美国众议院军委会主席梅尔文·普赖斯率领的美国众议院军委会议员团。"},{"type":"paragraph","text":"议员团是由十四名民主党议员、七名共和党议员，以及他们的随行人员组成。"},{"type":"paragraph","text":"在同美国议员们的交谈中，邓小平副总理指出，当前国际局势发展的趋势要求我们中美两国加强交往和合作。我们双方都要以世界局势这个大局为重，改善和发展我们之间的关系。美国客人也表示了要进一步加强美中关系的愿望。"},{"type":"paragraph","text":"邓小平副总理还坦率地回答了客人们提出的有关当前国际问题和双边关系问题。"},{"type":"paragraph","text":"会见结束时，美国客人热烈鼓掌对邓小平副总理会见他们表示感谢。"},{"type":"paragraph","text":"美国驻中国大使伍德科克参加了会见。"},{"type":"paragraph","text":"会见时在座的有中国人民外交学会会长郝德青，外交部美大司司长韩叙等。（附图片）"},{"type":"paragraph","text":"邓副总理会见梅尔文·普赖斯率领的美国众议院军委会议员团。"},{"type":"paragraph","text":"新华社记者摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5635b5b324"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
