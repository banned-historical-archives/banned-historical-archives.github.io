<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"伟大领袖毛主席和林副主席接见全国铁路、　交通会议革命职工代表的喜　讯传来，　极大鼓舞了铁道部上海通信工厂的广大职工，　弯钣机试制小组全体　同志干劲倍增，　齐心协力，　提前试制成功弯钣机——以更大成绩回答毛主席的关怀","authors":[],"dates":[{"year":1968,"month":6,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"五月八日晚上，铁道部上海通信工厂接到北京传来的特大喜讯:毛主席和他的亲密战友林副主席接见了出席全国铁路、交通会议的革命职工代表。他们厂的六位代表亲眼见到了最敬爱的伟大领袖毛主席和他的亲密战友林副主席。喜讯传来，全厂一片欢腾。“毛主席万岁!万万岁!”“用加倍的努力来表示对毛主席的忠心!”的欢呼声，震荡着每一个车间。"},{"type":"paragraph","text":"弯钣机试制小组的同志们也怀着同样激动的心情，大家议论开了:“不能让弯钣机拖到六月底再装配。早一天开动弯钣机，就是早一天向毛主席他老人家表忠心!”"},{"type":"paragraph","text":"多少年来，同志们多么向往有一台弯钣机啊!过去由于本厂没有这台机器，弯钣只好拿到其他兄弟厂去加工。碰到人家生产忙，加工任务轧不进，本厂生产只好停顿下来。三年前，厂里也试制过弯钣机，但由于依靠专业人员，没有发动群众，搞了几个月，花了几千元，搞出一台不能派用场的机器，结果只好送进仓库。去年，无产阶级革命派夺权后，工人出身的工程师丁国鑫首先提出要试制弯钣机。老丁一开口，领导全力支持。试制小组成立起来，战斗就打开了。"},{"type":"paragraph","text":"可是，厂里刮起了冷风。有人说:“那种几吨重的大机器我们厂能搞得出吗?”"},{"type":"paragraph","text":"流言蜚语动摇不了老丁和试制小组同志们的决心。特别是厂革委会成立后，在支左解放军同志的帮助下，领导全厂革命群众积极开展革命大批判，大力批判了厂里走资派过去重用资产阶级技术“权威”，实行技术垄断，压制群众技术革新的积极性等罪行，革命群众政治觉悟太大提高。弯钣机试制小组的同志说:“‘不到长城非好汉’。天大困难也难不倒我们无产阶级革命派。”他们踏踏实实地攻克一个个技术关键。他们用土洋结合的方法，造出了弯钣机上的各种部件，预计在六月底装配好这部机器。"},{"type":"paragraph","text":"现在，伟大领袖毛主席和林副主席接见的巨大喜讯，是一个最强大的动力，顿时激发了弯钣机试制小组同志们的冲天干劲和无穷智慧。他们再也等不及到六月底，而是日夜奋战，猛攻装配技术关键。在全厂同志支援下，终于在五月下旬就把这部七吨多重，二米多高的弯钣机试制装配成功了。"},{"type":"paragraph","text":"弯钣机的试制成功，只是这个厂“抓革命，促生产”出现新跃进的一个小故事。五月底全厂生产传出捷报:全月超额完成生产计划，产值比四月份增长一倍多。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"军队支左","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"16c8373b6c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
