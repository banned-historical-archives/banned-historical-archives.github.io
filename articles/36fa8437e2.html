tart":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"《毛泽东思想永放光芒》论文集出版总后团员青年高歌怀念毛泽东","authors":["郭善仪薛康全卞振"],"parts":[{"type":"paragraph","text":"本报讯 郭善仪报道：全军纪念毛泽东诞辰100周年理论研讨会论文荟萃——《毛泽东思想永放光芒》一书，已由军事科学出版社出版发行。"},{"type":"paragraph","text":"这部书收入中央军委领导同志在全军纪念毛泽东诞辰100周年理论研讨会上的讲话，研讨会入选的72篇优秀论文，作者多为我军高级干部和专家学者。全书近80万字，分上、下两卷，按内容区分为毛泽东军事思想概述、国防建设与军队建设、战争指导艺术、军队政治工作、军事辩证法及毛泽东思想其它内容研究六大部分。书中还反映了邓小平同志在新的历史时期对坚持和发展毛泽东思想的杰出贡献。"},{"type":"paragraph","text":"本报北京12月24日讯 薛康全、记者卞振报道：今天晚上，总后机关、驻京单位团员青年和总后领导欢聚一堂，引亢高歌，抒发对毛泽东同志的怀念和热爱。周克玉政委上台朗诵了缅怀毛泽东同志的诗词。总后团员青年纪念毛泽东诞辰100周年活动自今年下半年开展以来，各级团组织开展了读书演讲、诗歌朗颂、文艺演唱、参观走访等活动近千场（次），有4万多名团员青年参加。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"36fa8437e2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
