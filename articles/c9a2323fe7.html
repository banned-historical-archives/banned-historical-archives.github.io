月，主要产品大幅度增长","authors":[],"dates":[{"year":1966,"month":9,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"活学活用毛主席著作  大大发扬革命精神"},{"type":"paragraph","text":"机械工业职工制成上千种新产品"},{"type":"paragraph","text":"今年前八个月，主要产品大幅度增长"},{"type":"paragraph","text":"据新华社讯　我国机械工业广大职工在无产阶级文化大革命中，高举毛泽东思想伟大红旗，在精神和物质两条战线上奋勇前进。职工们革命精神振奋，干劲十足，促进机械工业生产不断取得新的成就。"},{"type":"paragraph","text":"今年以来，广大机械工业职工更加自觉地读毛主席的书，听毛主席的话，掀起了声势更加壮阔的活学活用毛主席著作的新高潮。今年前八个月，机械工业主要产品都大幅度增长。机床、汽车、冶金设备、矿山机械、电机，以及工业轴承等四十种主要产品，完成了全年计划的百分之七十以上。有些产品的产量比去年同期成倍增长，产品的质量稳步提高。新产品大量增加，其中不少新产品具有世界先进水平。"},{"type":"paragraph","text":"在毛主席的“人民，只有人民，才是创造世界历史的动力”的伟大思想教导下，越来越多的工人和青年技术人员参加了产品设计和科学研究工作。他们勇敢地冲破了资产阶级“专家”、“权威”的种种阻挠，打破了种种洋框框、旧框框，创造了很多风格独特、效能很高和用途广泛的新产品、新工艺、新设备。这些在毛泽东思想哺育下成长起来的工人设计员和技术人员，在生产斗争和科学实验中显示了卓越的才能。"},{"type":"paragraph","text":"今年以来，全国各地机械工业职工一共试制成功了上千种新产品，主要有：加工精度可以达到零级的螺纹磨床，定位精度可达三微米的中型座标搪床，新型“红旗”三排座高级轿车，电子轰击炉，一五○型深井石油钻机，连续真空镀膜设备等。试制成功的十万瓩水轮发电机组今年也已安装发电。"},{"type":"paragraph","text":"机械工业战线广大职工在今年开展的技术革新和技术革命活动中，活学活用毛主席有关人民战争的思想，大搞“三结合”，广泛开展共产主义大协作，有力地促进了生产高速度发展。上海重型机器厂在厂内大搞以工人为主的、同领导干部和技术人员的“三结合”，同时实行工厂、科学研究单位和高等院校的“三结合”，在许多单位的协作下，经过两年努力，在无产阶级文化大革命高潮中掌握了电渣重熔的先进技术，炼出了一百吨重的大钢锭，登上了世界冶炼新技术的高峰。"},{"type":"paragraph","text":"目前，随着无产阶级文化大革命的深入发展，机械工业职工活学活用毛主席著作的群众运动更加广泛深入地展开。他们如饥如渴地学习毛泽东思想，坚决贯彻执行党中央和毛主席关于抓革命、促生产的号召，为提前完成我国第三个五年计划第一年的任务而努力。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"人民战争","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c9a2323fe7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
