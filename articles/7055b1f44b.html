ical-archives/banned-historical-archives8/main/maoquanji12.pdf"],"article":{"title":"给刘雪节的信","alias":"","parts":[{"type":"paragraph","text":"给刘雪苇的信"},{"type":"paragraph","text":"（1938年5月28日）雪苇同志："},{"type":"paragraph","text":"收到了\"，谢谢！我已看了“座谈会记录”凹，很欢喜。如有新的，请续寄我。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"五月二十八日"},{"type":"paragraph","text":"[1]指刘雪苇给毛泽东的信和转交的《七月》杂志。刘雪苇（1912—1998)，又名孙雪苇，贵州郎岱（今属六盘水市）人，文学评论家。当时在延安从事文艺工作。他在给毛泽东的信中说：“汉口《七月》半月刊主编胡风先生寄来第三集第一期《七月》，嘱分赠一本给你，现特转上，祈查收。”"},{"type":"paragraph","text":"[2]指《七月》半月刊在这期登载的题为《宣传、文学、旧形利用》的座谈会记录。参加这个座谈会的有胡风、聂弩、吴组湘、欧阳凡海、鹿地亘、艾青、吴奚如、池田幸子。"}],"authors":["毛泽东"],"dates":[{"year":1938,"month":5,"day":28}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":217,"page_end":217},"tags":[{"name":"毛泽东","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7055b1f44b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
