script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"工人座谈全国美展西南地区作品大家对展览会上揭露资产阶级罪恶的作品作了高度评价","authors":[],"dates":[{"year":1965,"month":6,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　上海美术展览馆最近邀请工人座谈全国美展西南地区的作品。参加的有沪东造船厂、上海柴油机厂、上海电机厂、上海汽轮机厂和国棉二厂的工人和业余美术工作者。"},{"type":"paragraph","text":"大家对这个展览会上揭露资产阶级罪恶的作品作了高度的评价。认为画展贯串了阶级斗争的红线，深刻地揭露了资产阶级的剥削本性和压榨劳动人民的罪恶。大家认为这些作品说出了工人的心里话，是符合社会主义革命要求的好作品。许多工人在提到《资本家的利润》这套组画时，都说，看了这套画，对唯利是图、伤天害理的资本家，有切齿之恨。"},{"type":"paragraph","text":"有些工人同志看了展出的作品以后，引起了对往日生活的回忆。有位青年工人谈到，看了《四不要》组画中那位被老板踢出工厂的女工，想起了自己母亲在旧社会的遭遇。他的母亲就是在生他时被纱厂的老板开除出厂的。他们在发言中都提到，这类揭露资产阶级罪恶的作品，对于自己是非常实际的阶级教育，着了使人激动，激起义愤。"},{"type":"paragraph","text":"大家认为，四川的美术工作者能够画出这些作品，是他们深入工人生活的结果。他们说，上海的工厂里也有这样的题材，因此非常欢迎本市的美术工作者到工厂来访问老工人，画出揭露资本家罪恶的作品，以便使大家受到教育，从而提高觉悟，把社会主义革命进行到底。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c7803cd65e"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
