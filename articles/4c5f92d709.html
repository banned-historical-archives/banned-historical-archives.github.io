<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反对右倾思想与旧法观点司法部工作人员对党组提出严正批评","authors":[],"dates":[{"year":1957,"month":12,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京6日电】　司法部工作人员在大鸣大放中，尖锐地批评了司法部党组工作中表现出的某些右倾思想和旧法观点。"},{"type":"paragraph","text":"从11月26日到12月5日止，司法部已贴出大字报816张。司法部党组同时召开扩大会，征求干部对党组工作的意见。各单位也开座谈会，普遍鸣放。现在司法部工作人员在大字报和座谈会上已提出3294条意见，其中有393条是关于反对右倾思想和旧法观点的意见。"},{"type":"paragraph","text":"在反对右倾思想方面，有几张大字报提出，司法部1957年工作计划中，把镇压反革命放在次要地位，这是右倾思想的严重表现。大字报还批评一位副部长在他写的“正确处理人民内部的纠纷和案件”一文中，说法院今后主要工作是处理人民内部矛盾，忽视了法院是专政工具这一根本问题，以至对专政强调不够。有些人还提出，在司法部发出的一些文件中，没有说明抢劫犯、盗窃犯是专政对象，也是右倾思想的表现。有些干部还批评了司法部在复查错案工作上“只注意查错，不注意查漏，只查左，不查右”的右倾思想。"},{"type":"paragraph","text":"有人提出司法部党组工作上的右倾思想长期存在的原因是在工作上有了错误不公开批判和不及时检查。如司法部在贯彻法院组织法时，对法院组织法规定的专政任务强调不够，并且错误地把法院组织法规定的各项制度都说成“民主制度”，以至影响一些司法干部对人民法院的性质有了模糊的认识。中共中央及时批评了这种右倾思想，而司法部党组只是在一个内部刊物上作了修正，没有进行公开批判，使全体干部共同接受教训。有一干部提出，这件事不进行公开检讨，是以右倾思想反对右倾思想，所以右倾思想长期存在。有一张大字报还提出，司法部工作上的右倾思想存在已久，原因是不了解下情，不了解敌情。"},{"type":"paragraph","text":"许多人提出，右倾思想和旧法观点有密切的关系，在反对右倾思想时也要注意反对旧法观点。大字报批评张国祥写的一篇稿件中，把法律说成是“人们行为的规范”，取消了法律的阶级性，这是旧法观点，这张大字报强调指出，这篇稿件是经过负责人审查的，建议这位负责人检查一下旧法观点。还有一张大字报说，在中央提出关于知识分子问题以后，有些政法院校在社会上大肆收容没有改造的旧法学人员，其结果是旧法思想在学校到处泛滥，这对我们培养干部有很大的危害。这强大字报还说，有些政法院校这样做，司法部是知道的，但并没有好好管起来，希望领导上检查一下。"},{"type":"paragraph","text":"司法部党组对群众提出的关于反对右倾思想和旧法观点的意见，正在作深入检查。有些被批评的领导干部已公开向群众表示接受批评。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"人民内部矛盾","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4c5f92d709"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body>
