[],"dates":[{"year":1976,"month":10,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　驻沪空军某场站指战员，认真学习中央两项英明决定和中央两报一刊社论《亿万人民的共同心愿》，决心继承毛主席的遗志，最紧密地团结在以华国锋同志为首的党中央周围，坚持“三要三不要”的原则，坚决同一切背叛马克思主义、列宁主义、毛泽东思想，篡改毛主席指示的人，同一切搞修正主义，搞分裂，搞阴谋诡计的人斗争到底。"},{"type":"paragraph","text":"在学习中，这个场站的指战员，联系当前两个阶级、两条路线斗争的实际，重温党的基本路线，深刻认识到社会主义时期阶级斗争的长期性，因此我们必须树立长期作战的思想，同党内资产阶级斗到底。荣立集体二等功的修理连干部战士说:毛主席为我们制定的这条基本路线是我党我军的生命线、胜利线，只有牢记党的基本路线，才能在尖锐复杂的两个阶级、两条路线斗争中保持清醒的头脑，密切注视阶级斗争的新动向，不被搞修正主义、搞分裂、搞阴谋诡计的走资派所迷惑，坚持毛主席的革命路线，把毛主席开创的革命事业进行到底。"},{"type":"paragraph","text":"这个场站的广大指战员联系当前阶级斗争和两条路线斗争的实际，重温党的基本路线，学习毛主席关于“要搞马克思主义，不要搞修正主义，要团结，不要分裂；要光明正大，不要搞阴谋诡计”的教导，分析研究党内资产阶级的政治特征及他们搞修正主义的手法和策略。认清搞修正主义的人必然搞阴谋诡计，拉山头，搞宗派，组织反党小集团，打着红旗反红旗，制造反革命舆论，以达到他们篡党夺权的罪恶目的。大家说，我们的党是毛主席亲手缔造和培育的，经受过长期尖锐复杂的阶级斗争、路线斗争考验的党，历史证明，要搞垮我们这个党是不容易的。一切搞修正主义、搞分裂、搞阴谋诡计的人，都是注定要失败的。"},{"type":"paragraph","text":"这个场站广大指战员为了提高同党内资产阶级作斗争的能力，掀起了学习马列著作和毛主席著作的新高潮。广大指战员还高唱《东方红》、《国际歌》、《三大纪律八项注意》歌，坚决表示，誓同背叛马列主义、毛泽东思想，篡改毛主席指示，搞修正主义，搞分裂，搞阴谋诡计的党内走资派斗争到底。广大指战员决心最紧密地团结在以华国锋同志为首的党中央周围，坚持“三要三不要”的基本原则，一切行动听党中央指挥，提高警惕，加强战备，随时准备粉碎国内外一切阶级敌人的捣乱破坏活动。"},{"type":"paragraph","text":"(本报通讯　员)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"华国锋","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4578addf1b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
