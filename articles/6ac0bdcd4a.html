" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji24","name":"毛泽东全集第24卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji24.pdf"],"article":{"title":"一周内不使敌十八军越过随杞线","alias":"","parts":[{"type":"paragraph","text":"一周内不使敌十八军越过雕杞线"},{"type":"paragraph","text":"（1948年7月6日）刘、陈、邓，并告粟、陈、唐："},{"type":"paragraph","text":"微申电”、鱼六时电均悉。（一）你们已割裂二十八师、十师各一部加以攻歼，并有陈谢二个旅向周口十八军尾击，甚好甚慰。（二）希望你们将已被割裂攻击之敌解决后，再行割歼敌一部，如你"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军委起草的给中原野战军司令员刘伯承、第一副司令员陈毅和政治委员邓小平的电报。"},{"type":"paragraph","text":"[2]粟、陈、唐，指粟裕、陈士、唐亮，当时分别任华东野战军代司令员兼代政治委员、参谋长和政治部主任。"},{"type":"paragraph","text":"[3]指1948年7月5日申时刘伯承、陈毅、邓小平给粟裕、陈士和中共中央军委的电报。电报说：“一、十八军由昨上午起，对我匡斌部攻击，今十三时占领周口，刻匡斌三个小团在周口、淮河线布防阻击，争取该敌明日不能超过淮阳，陈谢一个旅正向周口尾击中。二、陈谢两个旅今向商水东洪桥之线出击，已抓住吴绍周兵团第二十八师一部，并协同一纵一个旅，将吴兵团割断。正战斗中。”"},{"type":"paragraph","text":"[4]指1948年7月6日6时刘伯承、陈毅、邓小平给粟裕、陈士、唐亮和中共中央军委的电报。电报说：昨午后我一、二、三、四各纵在商水、上蔡之线以西，均与敌打响，刻已将吴绍周兵团二十八师一个团及第十师之八十五旅割开，拟于今夜先选一点攻歼之。"},{"type":"paragraph","text":"[5]陈谢，指陈、谢富治，当时分别任中原野战军第四纵队司令员和政治委员。们能在数日内歼敌两个旅，则可能拉回十八军。（三）陈谢尾击十八军之一个旅，应紧随十八军直至淮阳、太康及其以北，如该敌回头援吴\"则阻击之。（四）望粟陈唐以一部进至淮阳地区，协同匡斌四个小团阻击十八军，如无正规军可派则派地方军，保障一星期内外该敌不超过雕杞?线。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"鱼申"},{"type":"paragraph","text":"[1]吴，指吴绍周，当时任国民党军整编第八十五师师长，指挥由整编第八十五师、第二十八师、第十师组成的兵团。"},{"type":"paragraph","text":"[2]匡斌，当时任豫皖苏军区第八军分区司令员。[3]睢杞，指河南睢县和杞县。"}],"authors":["毛泽东"],"dates":[{"year":1948,"month":7,"day":6}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":332,"page_end":333},"tags":[{"name":"邓小平","type":"人物"},{"name":"陈毅","type":"人物"},{"name":"粟裕","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6ac0bdcd4a"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
