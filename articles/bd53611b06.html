ors":["朱基俊"],"dates":[{"year":1962,"month":7,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"垄断经济学是现代资产阶级庸俗政治经济学的主要流派之一。这一流派出现于二十世纪三十年代。他们在垄断和竞争问题上玩弄许多手法，力图掩盖垄断组织的剥削和统治，为垄断资本辩护。这一流派的主要代表作——英国资产阶级经济学家乔安·罗宾逊的《不完全竞争经济学》和美国资产阶级经济学家张伯伦的《垄断竞争理论》，我国将分别翻译出版。"},{"type":"paragraph","text":"在《不完全竞争经济学》一书中，乔安·罗宾逊对垄断的定义作了歪曲的解释，用不完全竞争这一概念抹杀了垄断企业和非垄断企业的区别，从而否定了垄断统治的存在。她把价值和价格混同起来(把价值说成是所谓“供给价格”和“需求价格”相均衡时的价格)，力图“取消”价值问题，以便回避开垄断价格的基础和垄断利润的来源等一系列难题。她从庸俗经济学的生产四要素论和边际生产力论出发，根本歪曲了剥削的概念，并荒谬地把产生剥削的根本原因归纳为“劳动供给或商品需求缺乏完全弹性”。"},{"type":"paragraph","text":"在《垄断竞争理论》中，张伯仑否认生产集中是垄断组织形成的决定性条件，把“产品差别”宣布为垄断的基础。根据这个观点，任何一个企业，即使是一个生产某些新产品或新品种的日用品的小型企业，只要它比其他企业享有某些优越性，它就是垄断组织。“产品差别”是满足各种需要所必需的，所以垄断组织的存在也是必要的。他还把垄断权和一切生产革新因素混同起来，尽情扩大“垄断”这一概念包括的范围，他说，生产革新者在他的革新还没有普遍推广以前享有垄断权，这时他的任何超额利润都是垄断利润。他还利用他的谬论来掩盖垄断资本对工人的剥削，说什么在垄断的条件下，如果工人以工资形式获得边际产品的全部价值，则企业主不仅一无所赚，而且会遭到亏损。(朱基俊)"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bd53611b06"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
