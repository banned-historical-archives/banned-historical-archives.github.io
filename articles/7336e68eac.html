script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji48","name":"毛泽东全集第48卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji48.pdf"],"article":{"title":"毛泽东等祝贺罗马尼亚解放二十一周年的电报","alias":"","parts":[{"type":"paragraph","text":"毛泽东等祝贺罗马尼亚解放"},{"type":"paragraph","text":"二十一周年的电报"},{"type":"paragraph","text":"（1965年8月22日）布加勒斯特罗马尼亚共产党中央委员会总书记尼古拉·齐奥塞斯库同志，罗马尼亚社会主义共和国国务委员会主席基伏·斯托伊卡同志，罗马尼亚社会主义共和国部长会议主席扬·格奥尔基·毛雷尔同志："},{"type":"paragraph","text":"在罗马尼亚解放二十一周年的时候，我们代表中国人民、中国共产党和中华人民共和国政府，向罗马尼亚人民、罗马尼亚共产党和罗马尼亚社会主义共和国政府，致以热烈的祝贺。"},{"type":"paragraph","text":"罗马尼亚人民在罗马尼亚共产党和罗马尼亚政府的领导下，坚持独立自主的方针，以高涨的热情，团结一致，辛勤劳动，在工业、农业、科学和文化各方面取得了重大的成就。最近，罗马尼亚共产党第九次代表大会通过的进一步繁荣罗马尼亚的五年计划和十年电气化计划，展示了罗马尼亚发展的光辉前景。我们深信，罗马尼亚人民在实现新的宏伟的社会主义建设计划中，必将取得更大的成就，从胜利走向胜利。"},{"type":"paragraph","text":"罗马尼亚社会主义共和国和罗马尼亚人民在反对美帝国主义的侵略政策和战争政策、支持各国人民的解放斗争、保卫世界和平的事业中，作出了重要的贡献。罗马尼亚共产党和罗马尼亚政府为维毛泽东全集第四十八卷护社会主义阵营的团结，捍卫兄弟党、兄弟国家关系的准则进行了巨大的努力。"},{"type":"paragraph","text":"中罗两国人民的友谊是建立在马克思列宁主义和无产阶级国际主义基础上的战斗友谊。我们两国的关系，是符合社会主义兄弟国家相互关系准则的，是互相尊重独立和主权的、平等的、相互支持和相互援助的关系。我们高兴地看到，我们两国在政治、经济、文化和科学技术方面的合作，有了进一步的发展。我们深信，中罗两党和两国人民的战斗友谊和两国的友好合作关系必将日益巩固和发展。"},{"type":"paragraph","text":"中国共产党中央委员会主席毛泽东中华人民共和国主席刘少奇中华人民共和国全国人民代表大会常务委员会委员长朱德中华人民共和国国务院总理周恩来"},{"type":"paragraph","text":"一九六五年八月二十二日"}],"authors":["毛泽东"],"dates":[{"year":1965,"month":8,"day":22}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":171,"page_end":172},"tags":[{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7336e68eac"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
