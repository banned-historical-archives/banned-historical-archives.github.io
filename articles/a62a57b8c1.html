tart":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"文化大革命的形势好极了","authors":["孙家深","崇武海战二等功？指导员"],"parts":[{"type":"paragraph","text":"我们伟大领袖毛主席最近英明指示：“全国的无产阶级文化大革命形势大好，不是小好。整个形势比以往任何时候都好。形势大好的重要标志，是人民群众充分发动起来了。从来的群众运动都没有象这次发动得这么广泛，这么深入。”这一最新指示像光芒万丈的灯塔，把文化大革命的前程照得通明通明。"},{"type":"paragraph","text":"一年来，伟大的无产阶级文化大革命的滚滚洪流，席卷全中国、震撼全世界。形势好极了。“人民，只有人民，才是创造世界历史的动力。”史无前例的文化大革命确实把群众充分发动起来了。从首都到边疆，从城市到乡村，除了阶级敌人以外，人人都关心国家大事，关心无产阶级专政。亿万革命人民在战无不胜的毛泽东思想指引下，大造党内一小撮走资派的反，大造一切牛鬼蛇神的反，彻底粉碎了资产阶级反动路线，彻底摧毁了资产阶级司令部。这是无产阶级文化大革命的伟大胜利，这是毛泽东思想的伟大胜利，这是毛主席无产阶级革命路线的伟大胜利。通过无产阶级文化大革命，大树特树毛主席的绝对权威，大树特树毛泽东思想的绝对权威，这就是无产阶级文化大革命最好最好最好的形势，最大最大最大的成绩。"},{"type":"paragraph","text":"林副主席说：“毛泽东思想是反对帝国主义的强大的思想武器，是反对修正主义和教条主义的强大的思想武器。毛泽东思想是全党、全军和全国一切工作的指导方针。”我们只有用毛泽东思想去观察形势，去分析形势，用毛泽东思想回答和解决现实思想问题，才能认清形势，紧紧掌握斗争大方向，紧跟毛主席的伟大战略部署；才能放开眼界看未来，坚定不移向前进，把文化大革命进行到底。"},{"type":"paragraph","text":"形势越好，敌人越要进行捣乱、破坏，我们越要牢记毛主席关于“绝对不可以稍微松懈自己的战斗意志”的教导，百倍警惕，加强战备，做到一声令下，立即出动，歼灭一切敢于来犯之敌，为保卫海防，保卫无产阶级文化大革命立新功。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a62a57b8c1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
