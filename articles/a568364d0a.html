察报告（节录）","authors":[],"dates":[{"year":1953,"month":11}],"is_range_date":false,"parts":[{"text":"西南公安部长周兴关于云南镇反工作考察报告（节录）","type":"title"},{"text":"……。","type":"paragraph"},{"text":"全省内地市县的镇反问题，应在指导思想上，注意以下4个问题：","type":"paragraph"},{"text":"第一，鉴于会道门有其一定的落后的群众基础和思想基础，在已经取缔的地区，还发现若干漏网道首，或已经打击过的道首又在死灰复燃，从事活动，并已向边沿少数民族地区发展，企图建立根据地（如潞西、龙陵、梁河之间的背阴山便是例子）。因此，必须肯定，对其一、二次打击是不可能彻底的，必须采取长期作战的方针。凡应取缔而未取缔的地区，必须充分准备，坚决贯彻取缔运动，已经取缔过的地区，则应加强侦察工作，积累材料，选择适当时机，再给予致命打击。","type":"paragraph"},{"text":"……","type":"paragraph"}],"comments":[],"origin":"《取缔反动会道门工作历史资料汇编（1948－1992年）》，公安部一局编印， 2009年。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a568364d0a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
