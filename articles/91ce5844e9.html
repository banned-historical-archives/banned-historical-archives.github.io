art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"批判“三项指示为纲”巩固文化大革命成果——五四七三二部队某部五连党支部带领全连挥戈上阵反击右倾翻案风","authors":["赵景涛/吴云龙"],"parts":[{"type":"paragraph","text":"“翻案不得人心。”驻守在黄海前哨的五四七三二部队某部五连，在党支部领导下，狠批“三项指示为纲”的修正主义纲领，给右倾翻案风以迎头痛击。党支部发动全连共产党员、共青团员和革命战士，人人挥戈上阵，用各种形式深入批判党内那个不肯改悔的走资派刮右倾翻案风、搞复辟资本主义的反动言行。"},{"type":"paragraph","text":"这个连队党支部的成员积极站在斗争的前列，带头学好革命理论，带头投入革命大批判，同时还充分发挥理论小组的骨干作用，发挥共青团、革委会的作用。他们认真学习马列和毛主席的有关著作，掌握思想武器。他们把党内那个不肯改悔的走资派炮制的“三项指示为纲”的反动纲领和他的修正主义谬论联系起来，为连队批判找靶子；把“三项指示为纲”的反动纲领和孔孟之道联系起来，深挖右倾翻案风的思想根源；他们举办战士家史展览，进行忆苦思甜教育，进一步认清党内那个不肯改悔的走资派妄图复辟倒退，就是要使党变修，国变色，让劳动人民重新沦为牛马。同志们越学心越亮，越批眼越明，对当前反击右倾翻案风斗争的伟大意义理解越深刻，大家决心在毛主席为首的党中央领导下，把反击右倾翻案风的伟大斗争进行到底！（赵景涛、吴云龙摄影报道）（附照片）"},{"type":"paragraph","text":"党支部认真发动群众，人人挥戈上阵，深入批判“三项指示为纲”的修正主义纲领。这是五连新出的大批判专栏。"},{"type":"paragraph","text":"党支部举办家史展览，开展回忆对比，充分认识“三项指示为纲”的要害是复辟资本主义。这是战士秦瑛向大家讲述苦难家史，批判党内那个不肯改悔的走资派妄图复辟资本主义的反动言行。"},{"type":"paragraph","text":"针对党内那个不肯改悔的走资派否定文化大革命、否定新生事物的奇谈怪论，党支部组织演唱组排演节目，热情歌颂文化大革命，歌颂社会主义新生事物，有力回击右倾翻案风。（照片）"}],"alias":""},"tags":[{"name":"革命大批判","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"91ce5844e9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
