<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"青岛市十六级以上的党员干部在讨论邓小平同志报告中暴露出来的一些糊涂思想","authors":["王影"],"dates":[{"year":1957,"month":10,"day":26}],"is_range_date":false,"parts":[{"text":"青岛市十六级以上的党员干部在讨论邓小平同志报告中暴露出来的一些糊涂思想","type":"title"},{"text":"王影","type":"authors"},{"text":"新华社青岛26日讯　青岛市委召开十六级以上的党员干部大会传达邓小平同志在八届三中全会上“关于整风运动的报告”后，在分组讨论中暴露出来的一些思想情况和问题。","type":"paragraph"},{"text":"个别人对反右派的看法提出了一些错误的意见。如，有的说：“反右派把我们机关搞垮了”，有的说：“反右派阻塞了言路”，有的说：“前一阶段反右派有副作用，有碍于第三阶段发动群众”。有的认为反了右派，整风问题就解决了；也有人认为通过这次反右派斗争，以后的阶级斗争就再也不会尖锐了。","type":"paragraph"},{"text":"关于知识分子的问题，有人提出说是否可以不提改造，因为他们不愿听。关于民主党派问题，有的认为民主党派没有存在的必要了，这是因为阶级消灭了，它就没有可代表的了；有的则认为民主派还有存在的必要，它可以代表劳动人民；有些工厂干部认为今后工厂里不能要民主党派。有人提出民主党派、资产阶级知识分子之所以这样嚣张，主要是因为这几年党对他们捧得太利害了，如帮助他们发展组织，还提出长期共存互相监督的方针等。少数人对知识分子中的右派提出的“对社会科学界和自然科学界，思想工作和技术工作要分别处理，对前者要严些，后者要宽些”处理原则想不通，提出为什么有的还要保护过关？","type":"paragraph"},{"text":"对工人阶级和党的问题，有的认为党外右派分子一开始即是反动派，党内右派不一定是反党反社会主义，因而不能一视同仁；也有少数人提出，既然在工人中不戴右派帽子，为什么在党内还要戴上右派帽子。有的认为工人阶级基本队伍是指的老工人；在少数工厂干部中，也有些人在思想上觉得老工人靠不住，笼统地认为他们一般都比较复杂。据青岛纺织机械厂调查，在老工人中，1945年以前进厂的老工人一般都好；1946年到1949年期间进厂的一般都复杂，表现不好，因为他们当中大多是解放区的逃亡地主、富农。也有人说，党内和工人阶级是整风问题，但是在机关、工人中，也有资产阶级和小资产阶级，将来是要分为整风和改造两方面搞。","type":"paragraph"},{"text":"有的人弄不清楚人民内部犯法分子和流氓、阿飞、强奸犯、贪污犯等的区别，也有些人对于大流氓、阿飞、强奸犯、贪污犯等划成为敌我矛盾的问题想不通。","type":"paragraph"},{"text":"对于“这是一个在政治战线上和思想战线上的社会主义革命”的问题，有的认为政治战线上的社会主义革命是指夺取对文教部门的领导权，思想战线是指教育、争取中间分子的问题；有的则认为反右派是政治战线上的社会主义革命，思想战线是指人民内部的问题。","type":"paragraph"},{"text":" ——原载新华社《内部参考》1957年10月28日。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7600538826"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
