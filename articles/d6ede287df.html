为中心的现代修正主义的斗争作出贡献，对支持越　南人民抗美救国战争和加强中日两国人民的战斗友谊和团结　的事业作出贡献。","authors":[],"dates":[{"year":1966,"month":10,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京24日电　中国共产党中央委员会二十三日打电报祝贺二十四日在东京开幕的日本共产党第十次代表大会。贺电全文如下:"},{"type":"paragraph","text":"东京"},{"type":"paragraph","text":"日本共产党第十次代表大会"},{"type":"paragraph","text":"亲爱的同志们:"},{"type":"paragraph","text":"当日本共产党举行第十次代表大会的时候，中国共产党中央委员会，向你们党第十次代表大会致以祝贺。"},{"type":"paragraph","text":"我们期望你们的代表大会对反对美帝国主义、反对日本反动派、反对以苏共领导为中心的现代修正主义的斗争作出贡献。期望你们的代表大会对支持越南人民抗美救国战争和加强中日两国人民的战斗友谊和团结的事业作出贡献。"},{"type":"paragraph","text":"中日两国人民的战斗友谊万岁!"},{"type":"paragraph","text":"打倒美帝国主义!"},{"type":"paragraph","text":"打倒以苏共领导为中心的现代修正主义!"},{"type":"paragraph","text":"打倒破坏中日友好的反动派!"},{"type":"paragraph","text":"中国共产党中央委员会"},{"type":"paragraph","text":"一九六六年十月二十三日"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d6ede287df"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
