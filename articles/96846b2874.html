rt":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"党和毛主席的恩情重如山塔吉克人歌唱幸福的新生活","authors":[],"parts":[{"type":"paragraph","text":"把一生吃过的东西都忘记了，"},{"type":"paragraph","text":"就是忘记不了母亲的奶汁；"},{"type":"paragraph","text":"把一生的话全忘记了，"},{"type":"paragraph","text":"就是忘记不了共产党和毛主席的恩情。（这是流传在帕米尔高原上的一首歌谣）"},{"type":"paragraph","text":"多少年来，帕米尔高原的雪山激流，阻碍了塔吉克人民和外界的交往，有谁知道，在这拔海三千多米边远的高寒山区，塔吉克人民曾经过着怎样贫困的生活？他们终年穿着破烂的羊皮衣，吃的是不能温饱的少量牛奶和酸奶子，国民党反动派在这里做尽了坏事，多如牛毛的苛捐杂税加在贫苦的塔吉克人民的身上，每年生下的羊羔还不够缴税，牲畜连年减少。"},{"type":"paragraph","text":"解放后，塔吉克人民结束了这一切黑暗贫困的生活，成立了塔什库尔干塔吉克族自治县，和全国人民一起进行社会主义建设。十年来，生产飞速发展，人民生活不断提高，使原来饥寒交迫的帕米尔高原呈现出欣欣向荣的景象。据1959年底的统计，塔什库尔干自治县的牲畜总头数由1949年的二万七千五百四十三头增加到九万八千一百零七头，耕地面积由一万零五百二十七亩扩大到二百七千一百八十七亩，其他方面也有很大发展。"},{"type":"paragraph","text":"共产党的恩情重如山，帕米尔高原上的变化永远也说不完！——塔吉克族人民从这一切变化中深刻地体会到这一点。（新华社）"},{"type":"paragraph","text":"上：塔吉克族人民建立了自己的工业。在塔什库尔干水电站，塔吉克族青年工人，熟练地掌握了技术。"},{"type":"paragraph","text":"中：在塔什库尔干县城一所中学里，学生们在作课外活动。"},{"type":"paragraph","text":"下：塔吉克族人民的进步和发展，是在党的领导下取得的。这是党支部书记和党员们在研究生产问题。"}],"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"96846b2874"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
