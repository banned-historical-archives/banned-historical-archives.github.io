ical-archives/banned-historical-archives0/main/maoquanji38.pdf"],"article":{"title":"给林克的信","alias":"","parts":[{"type":"paragraph","text":"给林克?的信"},{"type":"paragraph","text":"（1957年8月4日）林克："},{"type":"paragraph","text":"请找列宁《做什么？》《四月提纲》（一九一七年）两文给我一阅。我这几天感冒未好，心绪不宁，尚不想读英文。你不感到寂寞吧？你可看点理论书。你需要学理论。兴趣有，似不甚浓厚，应当培养。慢慢读一点，引起兴趣，如倒啖蔗，渐入佳境，就好了。供参考。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"八月四日[1]林克，当时任毛泽东办公室秘书。"},{"type":"paragraph","text":"[2]《做什么？》，今译为《怎么办？》。《四月提纲》，即《论无产阶级在这次革命中的任务》一文，1917年4月7日发表于苏联《真理报》。"}],"authors":["毛泽东"],"dates":[{"year":1957,"month":8,"day":4}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":200,"page_end":200},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fc226ad9db"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
