<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中央宣传部关于上海联合电影制片厂的方针问题的指示","authors":[],"dates":[{"year":1952,"month":3}],"is_range_date":false,"parts":[{"text":"中央宣传部关于上海联合电影制片厂的方针问题的指示","type":"title"},{"text":"据黄钢同志报告：你们决定从山东大学艺术系教职学员中抽调50人，并从华东各地文工团中抽调若干人到上海联合电影制片厂，以加强该厂的骨干力量，这很有必要。鉴于该厂人员情况复杂，尚待大力整顿，我们有以下意见：","type":"paragraph"},{"text":"（一）在此三反五反运动期间，应不失时机地在该厂进行三反思想改造运动，彻底批判资产阶级思想，确立无产阶级思想的领导。全体员工特别是那些编剧、导演、演员和技术人员，应使他们在群众运动中洗一次澡，受一次自我批评的锻炼。时间大约两个月到三个月，一般做法可采取大专学校三反运动的方针，让那些受资产阶级影响最深的编剧、导演、演员和技术人员在群众面前进行公开检讨，同时采取不同的办法帮助他们过关，其有贪污行为者应进行坦白检举，其有政治问题者应在群众面前适当揭露，但须留待以后清理中层时处理。其中一向进步的、或过了关的，应动员他们参加上海工商界的五反运动，以加强锻炼，体验生活，积累编剧和导演的感性知识。","type":"paragraph"},{"text":"（二）为使该厂三反思想改造运动进行彻底，今年上半年的摄制计划可以搁置下来，下半年再开始摄制工作。此点可公开宣布，表示决心，以坚定群众的斗志，并打破某些人的敷衍态度和侥幸心理。为使下半年的摄制工作顺利进行，上半年除开展三反运动外，可集中适当创作力量，准备可供摄制的剧本。该厂由你们负责领导，剧本的审查亦由你们负责，经你们审查合格者，再送中央审定。","type":"paragraph"},{"text":"（三）该厂今后摄制方针亦应明确规定并向大家说清楚。根据该厂现有编剧、导演和演员的政治艺术水平，在二、三年内不要提出过高的要求。应有计划地摄制历史片（如野猪林、梁山伯与祝英台）、童话片（如鸡毛信）、小故事片（如青年团员卢守凡的故事）和名作家的代表作品（如阿Q正传）。这些片种都是国家电影制片计划中的重要组成部分，该厂以此作为今后努力的方针，无论对于国家电影事业或对于他们的发展前途都是有利的。","type":"paragraph"},{"text":"（四）对于该厂的三反思想改造运动，采取何种具体实施步骤，望由你们订出计划并加强领导。","type":"paragraph"},{"text":"你们意见如何望告。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"115d86feda"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
