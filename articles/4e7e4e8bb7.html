art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"用阶级分析的方法批判修正主义路线实质四连干部战士进一步提高了阶级斗争和路线斗争的觉悟","authors":[],"parts":[{"type":"paragraph","text":"本报讯 成都部队某部四连在批修整风中，用阶级分析的方法，深入批判刘少奇一类骗子阴谋颠覆无产阶级专政、复辟资本主义的罪行，进一步提高了干部战士阶级斗争和路线斗争的觉悟。"},{"type":"paragraph","text":"这个连队的同志们通过革命大批判，知道了刘少奇一类骗子的路线是一条右倾机会主义路线，但认识还不够深刻。党支部认为：刘少奇一类骗子的修正主义路线的罪恶目的，就是要颠覆无产阶级专政，复辟资本主义，使广大劳动人民再当牛做马。针对连里的干部战士都很年轻，没有亲身受过阶级苦，所以，应该从阶级教育入手，通过回忆旧社会的苦，激发对刘少奇一类骗子的阶级仇恨，引导大家进一步批判他们的修正主义路线的实质。"},{"type":"paragraph","text":"指导员谢廷敏向全连介绍了连里的“苦情账”：全连参加学习的一百人中，解放前父兄当长工的九十七人，家庭被地主、资本家逼死害死的十九人，被打成残废的七人，逃荒要饭的六十一人，被迫卖儿卖女的三人，还有七人至今下落不明。这本“苦情账”说明，刘少奇一类骗子要复辟的资本主义，对于劳动人民来说将会是怎样的一幅悲惨图景。然后，谢指导员发动大家针对刘少奇一类骗子攻击我国无产阶级专政的罪行，进行批判。"},{"type":"paragraph","text":"彝族战士安立志说：“在那万恶的旧社会，我家祖宗三代都给奴隶主当娃子，脚穿大木鞋，身负大木锁；凉山解放后，建立了无产阶级专政，捉住了‘乌鸦’拴住了‘狼’，翻身娃子的生活象蜜糖。可是刘少奇一类骗子却恶毒攻击无产阶级专政，这完全是在替奴隶主讲话。他们要‘解放’的就是那些奴隶主，他们要放了‘乌鸦’放了‘狼’，让我们重新穿上大木鞋，戴上大木锁。这不就是右到极点了吗！”"},{"type":"paragraph","text":"四连党支部还组织全连同志参观了四川省大邑县阶级教育展览馆，参观了恶霸地主刘文彩的庄园和收租院，邀请曾经被刘文彩三次关进水牢折磨得九死一生的冷月英妈妈，到现场控诉旧社会的罪恶，和战士们一起批判刘少奇一类骗子妄图复辟资本主义的滔天罪行。在批判会上，战士们情绪激昂，义愤填膺。三班战士叶德维说：“刘少奇一类骗子赤裸裸地为被打倒的阶级敌人鸣冤叫屈，是他们充当地、富、反、坏、右的代言人的铁证。列宁指出：‘从资本主义过渡到共产主义是一整个历史时代。只要这个时代没有结束，剥削者就必然存着复辟希望，并把这种希望变为复辟行动。’（《列宁全集》第二十八卷第二三五页）刘少奇一类骗子恶毒攻击无产阶级专政，就是妄图改变党在整个社会主义时期的基本路线和政策，复辟资本主义。他们的一切阴谋活动和无耻谰言，都是为这一个罪恶目的服务的。”"},{"type":"paragraph","text":"通过这样的教育，四连干部战士对刘少奇一类骗子修正主义路线的实质的认识和批判，比过去深入了一步。"}],"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4e7e4e8bb7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
