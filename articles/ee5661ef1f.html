script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"深刻的阶级斗争教育课","authors":["人民解放军某部防化连党支部"],"dates":[{"year":1976,"month":4,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"深刻的阶级斗争教育课"},{"type":"paragraph","text":"人民解放军某部防化连党支部"},{"type":"paragraph","text":"把在天安门广场发生的反革命政治事件公诸于众，充分说明了我们国家无产阶级专政空前巩固，也为人民群众提供了一份活生生的阶级斗争的反面教材。毛主席指出：“革命的政党，革命的人民，总是要反复地经受正反两个方面的教育，经过比较和对照，才能够锻炼得成熟起来，才有赢得胜利的保证”，“轻视反面教员的作用，就不是一个彻底的辩证唯物主义者。”因此，我们要充分运用这一反革命政治事件作为反面教材，来加深理解毛主席的一系列重要指示，认清社会主义革命时期阶级斗争的特点，牢牢掌握批邓斗争的大方向，把反击右倾翻案风的斗争引向深入。"},{"type":"paragraph","text":"天安门广场发生的反革命政治事件，决不是偶然的，孤立的。反击右倾翻案风的伟大斗争击中了邓小平的要害，打到了党内外新老资产阶级的痛处，他们必然要同无产阶级作拚死的斗争，这是阶级斗争的客观规律，是不依人的意志为转移的。邓小平散布“阶级斗争哪能天天讲”的谬论，只不过是掩盖资产阶级向无产阶级进攻的烟幕弹。天安门广场的反革命政治事件，就暴露了资产阶级没有熄灭向无产阶级作斗争。"},{"type":"paragraph","text":"北京，是我们社会主义祖国的心脏，是毛主席为首的党中央的所在地。天安门广场，是毛主席亲手升起第一面五星红旗、宣告中华人民共和国成立的地方。新中国成立以来，毛主席一直在这里检阅革命群众。一小撮反革命分子竟敢在这里制造反革命政治事件，说明了垂死挣扎的阶级敌人的疯狂性。这就尖锐地从反面告诉我们，在整个社会主义历史阶段，存在着阶级、阶级矛盾和阶级斗争，如果我们放松了警惕，不坚持以阶级斗争为纲，资本主义复辟是随时可能的。"},{"type":"paragraph","text":"特别值得注意的是，一小撮阶级敌人竟然公开打出拥护邓小平的旗号，这就清楚地说明了在无产阶级专政条件下，阶级敌人总是千方百计地从我们党内寻找代理人，党内最大的不肯改悔的走资派邓小平就成了他们的总代表。我们批判邓小平大刮右倾翻案风，复辟资本主义的罪行，反革命分子却叫嚷什么“由邓小平主持中央工作，斗争取得了决定性胜利”。在邓小平煽动下，党内资产阶级恶毒地把坚持毛主席无产阶级革命路线的中国共产党人，说成是“反马克思主义的阶级敌人”，那伙反革命分子也狂叫“让那些阉割马列主义的秀才们，见鬼去吧”。邓小平鼓吹“一切为了四个现代化”，明明是对抗毛主席关于以阶级斗争为纲的指示，那伙反革命分子跟着叫嚷“四个现代化日，我们一定设酒重祭”。这就清楚地看出，阶级敌人要把邓小平扶上台，做他们的代理人；邓小平要依仗这个反动的社会基础，复辟资本主义。党内最大的不肯改悔的走资派邓小平同社会上的资产阶级和没有改造好的地、富、反、坏、右，就是这样紧密相联的。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ee5661ef1f"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
