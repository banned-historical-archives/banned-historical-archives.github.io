torical-archives/banned-historical-archives8/main/maoquanji9-1.pdf"],"article":{"title":"改陈绍禹电","alias":"","parts":[{"type":"paragraph","text":"致陈绍禹电山"},{"type":"paragraph","text":"（1936年8月25日）"},{"type":"paragraph","text":"为着避免与南京冲突，为着靠近苏联，为着保存现有根据地，红军主力必须占领甘肃西部，宁夏、绥远一带。这一带布满着为红军目前技术条件所不能克服的许多坚固的城池堡垒及围寨，希望苏联方面替我们解决飞机大炮两项主要的技术问题。陕北、甘北苏区人口稀少，粮食十分困难，非多兵久驻之地。目前红军之财政、粮食已达十分困难程度，只有占领宁夏才能改变这一情况。否则，只好把三个方面军的发展方向放到甘南、陕南、川北、豫西与鄂西，待明年冬天再执行黄河以西的计划。而这种做法，对我们非常不利，将造成许多损失。"},{"type":"paragraph","text":"[1]这是毛泽东和洛甫（张闻天）、周恩来、博古（秦邦宪）致中共驻共产国际代表陈绍禹（王明）电的主要内容。"}],"authors":["毛泽东"],"dates":[{"year":1936,"month":8,"day":25}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":95,"page_end":95},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4945566cce"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
