script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"首都和各地文艺工作者批判胡风的资产阶级文艺思想","authors":[],"dates":[{"year":1955,"month":2,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"最近一个多月以来，首都和各地的文艺工作者和青年文艺爱好者纷纷给‘人民日报’等报刊写稿，批判胡风的资产阶级文艺思想。"},{"type":"paragraph","text":"‘文艺报’一九五四年第二十二号上刊登了胡风在去年十月到十二月的中国文学艺术界联合会主席团和中国作家协会主席团扩大联席会议上的发言。这个发言的基本精神是攻击文艺工作的领导，藉以宣传他的资产阶级唯心主义的文艺观点。自从这个发言发表以后，北京、南京、沈阳、旅大、西安、张家口等地的文艺工作者和青年文艺爱好者便陆续给‘人民日报’等报刊来信和投稿，揭露和批判胡风的发言中的错误观点。这些来信和来稿已在‘人民日报’、‘光明日报’、‘文艺报’等报刊上连续发表。这些稿件指出:长期以来，胡风就在马克思主义词句的掩盖下，宣传他的资产阶级文艺思想；胡风的发言是企图趁对胡适派资产阶级唯心论展开斗争的时候，解除文艺思想中的马克思主义武装，拿自己的资产阶级文艺思想来代替它。不少青年文艺爱好者在来稿中指出了胡风的资产阶级文艺思想的危害性，并检查了自己过去曾受这种思想的毒害。【据新华社讯】"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"39a499a649"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
