和平共处鼓励美帝的战争行动","authors":[],"dates":[{"year":1965,"month":5,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社利马10日电　秘鲁共产党最近发表声明，强烈谴责美国武装侵略多米尼加，号召人民起来反对美国的侵略罪行。声明指出，保卫多米尼加也就是保卫自己的主权和自决权。"},{"type":"paragraph","text":"秘鲁共产党中央委员会政治委员会六日发表题为《美帝国主义从多米尼加滚出去》的声明说，美国武装侵略多米尼加事件表明，“美帝国主义起了屠杀为民族解放而斗争的各国人民的国际宪兵和刽子手的作用，它对兄弟的多米尼加共和国进行了卑鄙而懦弱的侵略。”“这样，美帝国主义的凶残而罪恶的面目再一次暴露无遗。”"},{"type":"paragraph","text":"声明在指出美国对多米尼加的侵略是海盗行为之后说:它“遭到了全世界人民十分愤怒的反对和谴责。整个拉丁美洲反对侵略者，要求臭名远扬的‘海军陆战队’立即从多米尼加滚出去。”"},{"type":"paragraph","text":"声明说:“不论是越南还是多米尼加的局势都使世界和平受到严重威胁。美帝国主义坚持推行它的战争、奴役各国人民和核讹诈的政策，从而使主张‘互相让步’来安抚侵略者的那些人的幻想破产了。显然，美帝国主义最近的冒险的战争行动是受到赫鲁晓夫主义的背叛政策的鼓励。现代修正主义用虚构的和平共处鼓励了美帝国主义者，实际上推动他们走上战争的冒险道路。”"},{"type":"paragraph","text":"声明接着说:“认为帝国主义能够放弃战争和掠夺政策，这不仅是胡说八道，而且是一种背叛。帝国主义的本性就是侵略和战争，任何‘明智的协议’和‘互相让步’的政策都不能使帝国主义改变本性。只有各国人民同帝国主义及其战争和奴役政策进行坚决的不屈不挠的斗争，才能首先孤立、然后打倒这个人类的凶恶敌人。”"},{"type":"paragraph","text":"声明说:“美国佬从多米尼加滚出去!这是我国全体人民的强烈要求，我们全体人民决不容许侵略者进行罪恶活动而不受到惩罚。保卫多来尼加也就是保卫我们自己的主权，保卫我们的自决权。”"},{"type":"paragraph","text":"声明最后说:“多米尼加人民应该在没有任何人干涉的情况下建立他们认为最好的政府和制度。”"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0248780689"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
