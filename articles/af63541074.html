tart":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"《毛泽东著作选读》出版交发到连队","authors":[],"parts":[{"type":"paragraph","text":"本报讯 为了满足广大战士学习毛泽东著作的迫切要求，总政治部宣传部遵照林彪元帅的指示，编印了《毛泽东著作选读》，已经从10月份起陆续发给全军各连队。"},{"type":"paragraph","text":"去年军委扩大会议之后，广大战士热烈响应军委、林总的号召，在创造四好连队的运动中，掀起了学习毛主席著作的新高潮。总政宣传部为了适应战士迫切的学习需要，编辑了《毛泽东著作选读》一书。这本书的文章，大部选自《毛泽东选集》第一卷至第四卷，一小部分选自《关于正确处理人民内部矛盾的问题》。全书共十二篇又十节，包括《中国社会各阶级的分析》《湖南农民运动考察报告》《关于纠正党内的错误思想》《中国革命战争的战略问题》《论持久战》《论联合政府》《和美国记者安娜·路易斯·斯特朗的谈话》《目前形势和我们的任务》《论人民民主专政》等著作的全篇或章节。"},{"type":"paragraph","text":"这个选本的特点是：一、从战士的实际需要出发，便于活学活用； 二、 内容精干，重点鲜明，适应急用先学、有重点地学这一原则；三、分量不大，照顾了战士的阅读能力和学习时间。这一选本的编发，对于推动全军战士进一步学习毛泽东思想，对于用毛泽东思想武装全军战士的头脑，对于创造四好连队提高全军的战斗力，都将产生很大作用。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"人民内部矛盾","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"af63541074"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
