:[],"dates":[{"year":1966,"month":9,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"马里朋友赞扬中国文化大革命意义重大"},{"type":"paragraph","text":"社会主义中国成了铁打江山"},{"type":"paragraph","text":"马里朋友热烈欢呼正在中国深入开展的无产阶级文化大革命。"},{"type":"paragraph","text":"一位曾经访问过中国的马里朋友说：“现在，中国是世界人民的先锋。中国进行的文化革命具有十分重要的意义。尤其是对于年轻的一代来说是十分重要的。文化革命能防止修正主义。”"},{"type":"paragraph","text":"另一位马里朋友说：“文化革命将使中国的社会主义变成铁打的江山。”"},{"type":"paragraph","text":"一位马里知名人士说：“我们马里人民为中国人民在学习毛泽东主席著作的基础上所取得的伟大胜利而感到十分高兴，因为我们认为，中国的强大就是马里的强大。”他说，"},{"type":"paragraph","text":"“西方正在诬蔑中国的文化革命和红卫兵，但是我们不同意他们的看法。现在孤立的是美帝国主义，而不是中国。”"},{"type":"paragraph","text":"（据新华社讯）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fd03295f28"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
