题的审查结论","authors":[],"dates":[{"year":1984,"month":9,"day":8}],"is_range_date":false,"parts":[{"text":"中共中央统战部给民盟中央办公厅关于叶笃义“文革”问题的审查结论（叶笃义）","type":"title"},{"text":"你厅8月13日来函，要求将叶笃义同志在“文革”的审查结论与本人见面，现将有关情况告知如下——","type":"paragraph"},{"text":"1968年4月至1972年8月对叶笃义同志的拘留审查，是林彪、江青反革命集团制造的冤假错案，是他们迫害徐冰同志而株连于叶笃义同志的。党的十一届三中全会之后，拨乱反正，平反冤假错案。我党对叶笃义同志是了解的，并认为，他过去和现在都是与我党长期合作、经受了考验的老同志，对于一切污蔑不实之词应予否定，特复。","type":"paragraph"},{"text":" 中央统战部办公厅","type":"paragraph"}],"comments":[],"origin":"叶笃义《虽九死其犹未悔》，北京十月文艺出版社，1999年。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"91b0ceb377"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
