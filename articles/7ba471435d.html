" crossorigin="">{"props":{"pageProps":{"books":[{"id":"wengeqianqixinianlu1","name":"十年文革前期系年录（上册）","internal":false,"type":"pdf","official":false,"author":"周良霄,顾菊英","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/文革前期系年录1.pdf"],"article":{"title":"第二十三卷","parts":[{"type":"title","text":"第二十三卷"},{"type":"paragraph","text":"1966年7月24日至26日"},{"type":"paragraph","text":"(刘、邓有关工作组的指示材料)7月24日"},{"type":"paragraph","text":"毛泽东在中央政治局常委、中央文革小组召开的会议上指出：工作组成了群众运动的阻碍，要立即撤出。并说：中央好多部，没做多少好事。文革小组却作了不少好事，名声很大。毛在18日以休息为由，拒绝刘少奇登门汇报，六天之间迄未通知刘前往汇报。"},{"type":"paragraph","text":"周恩来致信刘、邓，说：“昨晚所谈之事(刘、邓与陈伯达、康生之间关于工作组问题的激烈争论)经再三考虑，并又看了一些文件，不同意见主要由于对形势的估计和问题的认识而来，其他原因非主因，以不谈为妥，因看法不尽一致。在北京工作组的派出，有它普遍性和必要性，但各个工作组在本单位发生的情况又有其特殊性。这需要现场调查，作具体分析。”希图进行调和。"},{"type":"paragraph","text":"中央文革小组一些人向中央写信，指出：“当前抓运动的人有几个理论和方针，一、把放手发动群众和党的领导绝对对立起来，认为强调放手发动群众，就是不要党的领导。二、公开讲要绝对相信工作队，反对工作队就是反革命。三、排除干扰，实际上是挑动群众斗群众。”“以上方针性意见，都是和薄一波、邓小平、刘少奇同志有关。他们发指示，到处讲话，根本不和中央文革小组打招呼。中央文革成为他们攻击的对象。建议把薄一波同志的指示、讲话搜集起来，进行研究。”"},{"type":"paragraph","text":"[按]派工作组一事，一是共产党的传统；二是经过中央决定。刘、邓固然是这一行动的决策人，党的各级领导都是这一决定的支持与执行者。毛泽东为了陷刘少奇于罪，把派工作组一事指为镇压群众，这就使全国各级党的主要负责人都连带被置于跟随刘少奇，犯资产阶级反动路线错误而受冲击的地位。党的统治也几至于彻底崩溃。毛泽东后来对干部受冲击美其名是使党的干部受到锻炼，打掉官僚主义，但其后果之严重，恐远非毛所预计的。为了对这一后来所指责为所谓“资产阶级反动路线”有一个具体的了解。下面我们辑录了刘少奇这一时期的有关指示和言论，以见其大概。(1)刘少奇对北师大一附中工作队部分队员的讲话(6·20)现在左派在争取群众，右派也在争取群众，中间派摇摆于两派之间。因此左派如何争取群众，争取多数是个大问题。斗争的中心问题是争取多数群众。没有多数就不能战斗，少数人作战就不能胜利，少数人战斗一定要失败的。"},{"type":"paragraph","text":"现在不能斗刘超，内部不一致嘛，不一致就斗，中间是要出事的。高一、高二的同学不能骄傲，高一、高二参加工作组的人多(注：高一三人，高二二人)，现在高三没有人，现在你们受到信任人家不服气，不服气是有理的。他们比你们高，被高一领导有意见，怕失面子，要理解人家的心理状态。如果你们是高三，他们是高一，他们领导你们，你们也不服气嘛。你们虚心了，人家就服气了，等以后选出来人再抽调。"},{"type":"paragraph","text":"刘×(注：该校校长兼党支书)是反党反社会主义分子，是可以肯定的了。你们开一千多人大会，有把握没有？要充分分析学校的形势。到底是什么形势？以后怎么办？要研究这个问题。"},{"type":"paragraph","text":"开始出现了一些问题了，出现了你(注：工作组长)是黑帮的大字报，说你是黑帮，给你贴了十几张大字报，不要紧。大字报出来了，证明内部意见不一致嘛；证明他们对运动不满，学生之间不团结嘛，你去了三天，和他们无缘无故，怎么知道是好人坏人呢？这是他们的态度。要贴还让他们贴。要好好看一看，现在多数不同意他们了。"},{"type":"paragraph","text":"在这种情况下，革命群众内部还不一致，所以斗刘×是不是太早了。斗争刘×，这是阶级斗争，他是资产阶级代表人物嘛。权已经夺了，工作组来了，文化革命委员会成立了，他还有什么权，......阶级斗争怎么斗法？和打仗一样，要有战略战术。毛主席说：“不打无准备之仗，不打无把握之仗，不打败仗。要打，就全部，彻底，干净地消灭敌人。”"},{"type":"paragraph","text":"打仗就是组织队伍，组织好了没有？现在中间派可以跟你们走，也可以跟他们走。中间派很容易被右派争取去，不是紧紧地围绕在左派周围。右派打着红旗反红旗，争取中间派，戴高帽子，中间派不是也去了吗？队伍没组织好，打仗没队伍怎么行？"},{"type":"paragraph","text":"打仗没队伍不行，队伍要组织好。一个团就是一个团，一个营就是一个营，要冲锋就冲锋。现在你们是两个司令部，往前冲，往后冲是你们没有把握。这样的队伍能不能打仗，能不能打胜仗呢？队伍要有训练，没有训练往左往右冲锋陷阵都不晓得，那也不能打胜仗。其次，队伍组织好了，绝大多数跟着左派走了，队伍训练好了，队伍要有枪。没有枪，棍子也要拿根。枪(棍子)就是毛泽东思想，就是二十三条，就是人民日报社论。子弹就是材料，要掌握材料。"},{"type":"paragraph","text":"队伍组织好了，也训练好了，武器有了，子弹也有了，再开始作战，就可能打胜仗，也可能打败仗。争取胜仗打得多，只要胜仗打多，打三仗胜两仗，领导就可以站得住，打三仗两次败，一次胜，领导就站不住了。打胜仗多，士气就越来越高。打仗不胜不败，相持不下，相持不下怎么办？准备工作本身就是斗争。"},{"type":"paragraph","text":"可以讨论这张大字报(注：给工作组贴的)，开班会工作组派人叫，各班派代表，讨论这张大字报对不对，你们赞成不赞成，什么性质。这本身是组织队伍，统一学生思想的。这张大字报一煽起来，队伍就不太整齐，这是组织队伍，统一思想。这会有人跟他走的，讨论就有斗争，这就是组织队伍。"},{"type":"paragraph","text":"这张大字报和善意的批评不一样。你是组长，你是核心人物，这张大字报就是不让你领导。"},{"type":"paragraph","text":"开讨论会他不来，你不开会，工作组决定一定让他来，我们召集嘛，看你来不来，不来更好，不来就分化了。不来就做一个人的工作。来一半人开会，那七个人不来也可以。这样一搞全班不会一致，他们就孤立了。七个人可以分化，一分化就弄清谁是积极搞的，要开几次会，直到讨论清楚为止。"},{"type":"paragraph","text":"现在，人家向你们进攻，人家向你们采取攻势了，这好嘛，敌人出来，这个蛇出洞了，你消灭他就容易了。要把这张大字报讨论好，要做七个人的工作，把讨论大字报这一仗打好，队伍才放心，先打好这一仗。"},{"type":"paragraph","text":"各班讨论，这张大字报内容是好的，是错的，是部分对的，还是部分错的，是革命的，还是不革命的。"},{"type":"paragraph","text":"如何入手，一方面作工作，一方面学习。在斗争中学会搞阶级斗争，首先要学习毛主席著作，学习有关战略战术，要利用矛盾，团结多数，各个击破，孤立少数。二十三条工作方法都有，也讲了这一条。"},{"type":"paragraph","text":"武器就是毛泽东思想，就是文化革命的几篇文章，人民日报社论，二十三条，这一些都是武器。学习的时候不要一字一字的抠，要体会精神，我们的队伍一定要掌握武器。"},{"type":"paragraph","text":"当前，主要的问题是不知怎么搞，我们也是第一次，不知怎么搞，我们和你们大家一起搞，一起学嘛。大家讨论，走群众路线，先跟左派积极分子商量，再斗。"},{"type":"paragraph","text":"先斗刘超还是太早了，先攻敌人的弱点，再攻敌人的中坚，先打容易打的仗，要孤立主要敌人，那几个多是受刘超指挥的，要争取几个起义。首先要争取学生，教员也要争取。我们和他们有矛盾，要对他们有压力，有压力就可以分化。找他们谈话，不要压的太厉害。要跟他们讲：不要另组织一套，要跟我们合作。指出你们高三知道情况多，你们要革命，可以(跟)我们，不要自己走第三条道路，你们跟我们走，还是跟着刘超走，还是组织第三派。指出，你们好了，可以参加领导，你们态度不明朗不行，先争取和刘超合作的学生，这是子弹，学生揭发刘超没有特大力量，教师知道内幕，他们起来揭发，力量大，先找少数人，个别谈话，再争取一部分，大部分就可以争取过来，那七个重点人物，也要去争取，也要争取他们起义，他们起义最有力，堡垒最容易从内部攻破。"},{"type":"paragraph","text":"要争取陶书寅(注：该校党支委)起义，他不起义就批判，让他自己揭露批判刘超、前市委，让陶书寅揭发。让她自己说，不要怕她捣乱！越捣乱越好。除刘超以外，都让他们起义。孤立刘超，背靠背的揭。揭的材料掌握到工作队的手里，陶书寅不检讨再斗也来得及。如果她揭得好，可以检讨，才会从宽处理。如果揭的不好，我们也做到仁至义尽。假起义也要嘛，要弄假成真。但要说不够，进一步交代。如果不是这样做就不策略，不好。希望你们在斗争中学习。"},{"type":"paragraph","text":"要斗刘超，现在不斗，不是不斗，积极准备斗，不是停下来，是积极准备。起义也要欢迎，对检讨要有分析，不要把真检讨当假的。指出你们检讨得不够，要指出不交代就孤立。对学生采取团结──批评──团结。"},{"type":"paragraph","text":"旧市委领导嘛，旧市委有错误。没揭刘超之前，跟他走不算犯错误，只要坦白就可以赦免。他是书记是校长嘛，以为听他的话就是听党的话。现在工作组，文化革命委员会成立了，你们再跟他走，就是保皇党了。把这些人搞过，使他们不再跑他的路，这样就有了多数。"},{"type":"paragraph","text":"反对文化革命的人要建立司令部，要分化那七个人。工作组到校以前，革命委员会成立以前，有问题要分析，不算犯错误。不咎既往，交代就完了，不过来就可以压他，把主要的孤立了。不然自己的队伍没组织好，打最强的敌人。如果他不低头，说我没有错误，学生就要打他，你们就不叫打，你们又成了保护他的人，学生就会不满，这样就会抵消了力量。那七个人不是刘超的人至少是反对文化大革命的人，他们向你们进攻，你们没有消灭他们，不能斗争刘超。对这七个人的大字报要讨论，一讨论必然有赞成他们的。他们就表明态度了，赞成他们的人有些是好的，有的是坏的，这七个人不一定是敌人，必然要分化，他们的后盾是地下的，你们不清楚，你们的一举一动，他们清楚。你们在明处，他们在暗处。现在发现情况，说明刘超的人组织了一个司令部，要反对你，首先组织进攻。出大字报是好事，蛇出洞了，首先要把敌人搞清楚。敌人进攻了，你不去打他们还行？所以一定要分化高三(3)、高三(2)，主力部队还是他们，主力部队没上来，高三(2)要站出来，高三(2)、高三(3)同学的工作做好。这就是战斗，争取教员也是斗争。本来阻力是他们，他们不站起来。现在还不是你们的队伍，就是跟敌人勾结，刘超并没有真正的孤立。愿意革命的绝大多数，一时没有站起来，是暂时的，左派靠不稳，领导权不巩固，不要以为群众已经团结在你们周围了，敌人首先进攻你们的。就是要把群众团结起来，教员、工人也讨论，很好地讲：斗争策略，让他进攻。争取高三(3)、高三(2)才能作战，争取的原则是团结──批评──团结，要有点压力，压力不要太大，太大就要使他们到对立的那面去了。不要伤感情。他们错误是可以改的，要宽大，这样大多数人是可以过来的。条件成熟了，先找弱点，不要一下子打攻坚战。攻坚攻了就会打人，一打人就上当了。这样就不能斗倒斗臭。"},{"type":"paragraph","text":"现在是准备斗争，要争取初三同学不要听他们的话。不好的教员开会压他一下，要少数人跟他谈，工作组学生跟他谈，叫他分化，指出你不是黑帮，过往不究。人家攻来了，要在班上讨论，正好包围他，要讨论这张大字报。要宣布过往不咎，不要斗得太厉害，要压他一下争过来，死顽固的不过来不要紧，讨论这张大字报也是斗争，斗争有准备，力争开好，几种可能性都要估计到，开坏了不要紧，讨论大字报也是斗争，不好，总结经验嘛，你们热情高能领导好，要注意坏人利用你们的热情，你们不是没有工作，这也是一种学习。"},{"type":"paragraph","text":"面对面斗争不好怎么办？文斗还是武斗？要正面提，叫大家讨论，和大家商量，要走群众路线，吃透两头。要挑一些有关语录，学习二十三条，要从实际情况出发，了解情况，把坏事变好事，这样几个月学习等于多少年学习，重点搞一、二个班，讨论好，其他班就可以照样干，一般号召与具体指导相结合，自己没有搞过不要紧，搞不好取得反面经验，叫他不再这样搞，具体到一个班蹲点，没有办法和大家商量，我们是革命的，要和左派商量，要叫学生做教师的工作。"},{"type":"paragraph","text":"(2)张××(宣武区工作队队长)传达刘少奇的指示(6·29)"},{"type":"paragraph","text":"1、赶快做教师的争取工作。一个月了，压力很大。没有压力，不造成上下围攻是不行的，没有压力就不能镇压牛鬼蛇神，就不能动员起群众反对牛鬼蛇神，没有压力就不能促进对方分化瓦解，也不能打开很多糊涂脑袋。当然这个压力是政治空气，不是搞动武。一个月了，继续加压力不行了，赶快做争取工作。争取起义的人越多越好，不要怕起义，除了个别首要分子以外，一律争取，包括黑帮里面的人也要争取起义。不要轻易说人家是假起义，假的也好，以后查明了再整嘛。我们一定要有这么大的手面和气魄。要同左派讲清楚，同学生讲清楚。如果再闷头压下去，连教师也不解放，这对革命不利。对坏的也要给出路，这样才能最大限度地孤立牛鬼蛇神，孤立顽固分子。右派中也要争取他们起义，以孤立最顽固的。工作队要积极做教师干部的争取工作。要动员学生去作争取工作，而不是学生见了谁就斗。"},{"type":"paragraph","text":"要推动他们交代问题、检查问题。工作队要尽快做教师争取工作，要积极做教师工作，不能再加压力。要大讲文化革命的目的、意义，大讲政策。可以专门给教师讲。对某些人，不要抓得那么紧，要抓重点，区别对待。包括还没有工作组的学校都要大做教师工作，大讲文化革命的目的意义，大讲政策，大做争取工作。不把教师工作做好，运动就搞不好。做好教师的发动和争取工作，是搞好中学文化革命的标志之一。是取得胜利的关键。革命委员会要吸收教师，哪怕是吸收中间派也要好。时间已经一个月了，革委会无教师，要是有一个的可调整，工作组要敢于工作，工作组要态度鲜明，耐心工作。"},{"type":"paragraph","text":"越是重点学校，贯彻政策越慢，即使教师差一点，也可以吸收他们到革委会中来参加工作。"},{"type":"paragraph","text":"2、抓紧分析。运动目的一定要明确，一个是反对党内走资本主义道路的当权派，一个是批判资产阶级知识分子“权威”，这些人虽然不多，也还有一点。在运动中也还暴露一些副产品，就是反革命。不能把教师和干部都看成黑帮。你把毛主席的影响和党的影响都看到哪里去了呢？我们党是伟大的，能揪出一小撮反党反社会主义分子，说明我们党是好的。北京也是如此。北京三百多个学校，一个好的也没有？难道一个人也不能当校长、支部书记吗？大部分是能用的，一部分人是能当支书、校长的。要尽快地争取时间排队。我们的方针政策也就能具体化。每个步骤都应该排队，都有正副产品。要不断发动群众，不断排队，大排队(全校)小排队。"},{"type":"paragraph","text":"3、批判斗争中，要有事实，有分析，有批判，充分进行讲理斗争。文化革命、政治斗争和夺权斗争也好，都要充分进行说理斗争。"},{"type":"paragraph","text":"不批驳他们的思想、观点、行动，是打不倒他们的，是服不了人的，要向左派讲清这个道理。现在斗争形势，有的是指向黑帮的，有的是指向压制群众抵制文化大革命的人，后面这种人不批判是不行的。北京长期以来不搞运动，害了这些人，他们害怕民主。当官当惯了，运动也不会搞了。还是要充分讲大字报、大辩论、大鸣、大放(的伟大意义)，对群众不要管得太严。要贴多些也可以。要多搞一些学校的联合斗争，不要以班组为单位。(打击面大)学校可以多搞一些互相支援。左派为什么不能搞呢？要有计划。"},{"type":"paragraph","text":"4、注意运动中不平衡情况。成绩任何时候都要做个估计，对左派任何时候都要爱护鼓励，大讲中央精神、政策。对假左派要坚决揭露。对有假左派的学校越乱越好。实际上假左派要夺权，所以在运动中免不了要混战一场。对于假左派，有的是从幼稚的左派来的，有的是从右派来的。"},{"type":"paragraph","text":"要充分认识到运动的反复性。要提高警惕，不要上当。抓住敌人错误的口号加以批判，要求各级指挥员，要很好懂得策略，分析敌我的情况。敢于领导，善于领导，打有把握、有准备之仗。在两军混战中，打击主要敌人，把大多数争取团结起来，还要把假左派打碎。"},{"type":"paragraph","text":"(3)刘少奇在听北师大一附中工作组汇报时的指示(7·11)"},{"type":"paragraph","text":"那几个人怎么样？(注：指陈永康、何方方等)姓牛的(注：高三(5)学生牛××)是他们的后台吗？陈、何他们能承认吗？你们没有打他们吧？现在都在学校吗？(勾德元汇报：陈、何等人经过我们三次大辩论，已打下他们的气焰，现在都在学校检查。第二次辩论，有一个左派学生打陈一嘴巴。牛××这个学生害怕辩论，吓得跑回家了，三天没来学校，还扬言要绝食，要以死来威胁我们)。给他家讲：不到学校来，我们没办法，这是你们家里的事，我们不管，你们家里负责好了，可以不要来了。假若真来了，也还可以。青年人嘛，只要改正错误，交待清楚，改正错误我们还欢迎嘛；如果有错误不改，就跟他辩论，摆事实，讲道理嘛。"},{"type":"paragraph","text":"你们要注意，不要打人，不要骂人，特别是对学生，不要压制自由。他们要反就让他们反嘛，要大胆放手采取宽大政策。只要改就行嘛，只要心里改就可以了。否则口里改，心里不改，还是改不掉。"},{"type":"paragraph","text":"这些人高三毕业了还得留在你们学校，就交给你们了。反动的留给你们去改造，他们不能到大学去，到农村又不愿干，留在家里溜达在马路上。不是乱搞没人管吗？他们有三条路：一个是下乡，一个是在家溜在马路上，一个就是留在你们学校。"},{"type":"paragraph","text":"你们没有说他们是反革命分子吧？(勾汇报：我们宣布他是反对和破坏文化大革命运动的)不要再反，就可以了，给他们留个出路嘛。"},{"type":"paragraph","text":"工作组、团委不要讲人家是反革命，同学可以讲，可以骂，我们不能。他们能骂勾德元是黑帮，为什么我们不能骂他们是黑帮？不要给戴反革命分子帽子，戴帽子还要经过法律手续嘛。青年人不戴帽子为好，再看看他们嘛。以后可能还要闹的。以后就不怕了。上次搞得你们措手不及呀。现在，你们有经验了嘛，争取多数群众，使他们孤立起来。最后让他们再闹嘛，再闹，可以教育群众，这是好事嘛。教师有没有参加他们的？(勾答：没查出来)这些假左派是真右派。"},{"type":"paragraph","text":"革命委员会可以加进来一、二个教师，进来会有争论，这好嘛，你们不要怕。"},{"type":"paragraph","text":"左派有百分之三十就了不起了，真正的左派，有百分之二十到三十就可以了。不过左派要团结多数，一不团结，百分之三十就要孤立了，右派力量就大了。右派不会多，百分之几的右派势必是有的，不过有些人你们还没发现，右派有百分之五，这很好嘛，这样中间派有百分之六十多，中间派是大多数，这是合情合理的，中间派是要变化的，右派也是要分化的。"},{"type":"paragraph","text":"没有武器，就不能斗嘛，要准备发言呀，初中可以组织他们学毛主席著作嘛，可以学乙种本，没有事的就组织他们学嘛。"},{"type":"paragraph","text":"初一的大多数愿意放假，就放。初二、初三的要在学校里闹，就让他们闹嘛。可以派几个好教师去。派高中左派学生去，一个不行，派两个嘛。对初中学生不要让他们广泛讨论划分左、中、右，可以组织学乙种本，看谁学得好，看谁用得好。"},{"type":"paragraph","text":"现在读乙种本，可以学到政治，学到语文，要学了就去做。不要按着顺序学，可以选着学，先学老三篇，还可以学些语录，可以组织他们开些会，但不要开得太多。"},{"type":"paragraph","text":"初中学生闹到什么时候才散呢？等到大多数都要求放假了，就放。可以组织学生参观，放手让他们干。但也不能自流，自流也不太好。"},{"type":"paragraph","text":"初中学生学毛选能学下去吗？(回答：可以学，就是念一遍，大家讨论一下，不好深入)念一遍没有用，要念上多少遍，学了还得用。"},{"type":"paragraph","text":"高中学得怎么样？(勾汇报了一些情况)高中就应该带着问题学，根据你们学校的情况，带着斗刘超的问题，带着斗假左派的问题来学。要好好地抓。"},{"type":"paragraph","text":"你们(对在座的几个学生)一个多月学到的东西多不多？(同学回答：学到的东西很多)一个月等于多少年。让你们闹半年好不好？半年以后再上课。"},{"type":"paragraph","text":"初中还要上课，九月一日上课，你们看行不行，你们有准备没有？初中下半年不上课，对小孩子不利，没有好处。"},{"type":"paragraph","text":"将来还要招生，还要毕业，怎么安排，你们要考虑了，如果九月一日上课不行，就拖到十月。到十月可以了，就那么几个问题，讨论来，讨论去还是那么几个问题，再讨论就没有味道了。你们要考虑。"},{"type":"paragraph","text":"昨天发了通知：招收新生，要选政治上好，学习上好，身体上也好的。三好才能升学。第一条是政治好，再加上学习也好，身体也好。学习好要放在第二。政治上不好不能升学，这是一种压力，这也是一种动力。政治上不好，就要去好好学习毛选嘛，政治上反动，政治很坏，功课再好也不能升学，宁可要政治上较好，学习上不好的。政治反动，功课就是五分，也不能升学，肯定的不能升学。政治上不很反动，学习上好的可以考虑。"},{"type":"paragraph","text":"小学问题不大，一般都可以升学。初中进高中，小部分可以升学，大部分不能升，要回去算一算，大部分要回乡，这是很大的动力。全区要算一算，恐怕一大半不能升。不能升学怎么办？不升学，又不愿意下乡的人，各种学校都不要收，一个也不要，明年还要收，不准收，这回要宣布，这回可以从已经下乡的青年中招一批，这就是说非要下乡不可嘛。去年、前年没考上高中的，一个也不要，包括干部子女，这个事你们要安排一下，这个问题一宣布，初三左派就会多起来了，这有个压力。"},{"type":"paragraph","text":"初中准备下半年开学，招生。(有同学说：没教员)要准备教员，给学生讲清楚，不会没有教员的，教员是有的，高中毕业生中，好的可以抽出来教书。"},{"type":"paragraph","text":"斗刘超，可以先搞背靠背的批判斗争。先在班上练习嘛。先在班上练，然后再在年级里练，看哪个讲得最好，然后选那么几个。这可以出人材嘛，我们要搞集体创作嘛。有人讲话没头没尾，口齿不清楚。要讲好话。"},{"type":"paragraph","text":"这次斗刘超发言要争取比上次更好。(注：指斗争陈、何)要多练几次。在练习中也可以让刘超参加几个班级嘛，一定不能在斗刘超大会上讲不下去。讲话的人不是个人意见，可以是班级的意见，把大家的意见整理出来，再讲给群众听，这样教育了大家，也教育了教员。"},{"type":"paragraph","text":"要求大家很好的调查研究，充分准备，才能讲出好话，才能有教育意义。学生讲得好，工作队可以不讲，同意学生的意见就可以了，有讲不全的可以补充一下，要事先准备好，没有练习不行。"},{"type":"paragraph","text":"斗刘超，要积极把教师工作做好，多数学生去准备刘超的材料，少数人可以做教师工作。"},{"type":"paragraph","text":"多练习几次，不练好了不开会。"},{"type":"paragraph","text":"越搞越有水平就好，不要越搞越不行。批判斗争刘超，是要教育大家，教育对象是学生和教职员。"},{"type":"paragraph","text":"黑帮里，也不要个个都那么恨他，他们中间还有能用的。如四清运动中的贪污犯，这样的人转变过来很有用，他们去挖贪污犯，比我们还有办法。"},{"type":"paragraph","text":"要争取把消极因素变成积极因素。反革命分子是消极因素，黑帮分子是消极因素，可不可以变成积极因素呢？变了有利于人民。"},{"type":"paragraph","text":"教师工作没做完，要争取多数。实在不好的，历史反动，教书也没本事，原来是三青团、伪军官的清理，工人也有不好的，都要清理一下。逃亡地主跑到城里来的，有的还搞不清。教师中要清理的恐怕不多，搞太多了也不利。对于那些可以教育改造的，教书还比较好的，还可以用嘛。"},{"type":"paragraph","text":"老教师教了几十年书，这种人批评一下，改一些，还可以用。这些人没出路，批判一下，还要他教书。他不改还散毒素，那你们也不要怕，可以批评嘛，自然科学他们可以教。政治教员和辅导员就一定要政治好的。至于教物理、化学、数学的，可以看用他们对我们有利，还是不用他们对我们有利。政治可以和语文课结合，就是历史课有问题，不学也不行，要有政治观点才能教。地理倒可以教。语文教员也要有政治观点的，历史、地理也要政治好的。"},{"type":"paragraph","text":"教师工作相当多，要争取多数，老教师批判一下，还可以教几年书，过几年再退休嘛。还能教几年的不要轰走了，让他走到哪里去呢？还是要吃饭的，又不能饿死他。他们教书还要放毒，放毒你们就消毒嘛，随时放随时消，你们有经验了嘛。"},{"type":"paragraph","text":"教职员里还会有几个人(指不能再教书的人)，这种人不多了，这几个人怎么办呢？赶走？赶走你们就轻松了？赶到哪里去呢？还是留给你们，在你们那里吃饭，放在你们那里改造。就是法院判了几年刑，也还放在你们那里改造，这些人也不能杀头，不杀头就要吃饭。如果他要杀人放火，就抓起来，其余的一律留学校，他们就是不老实，也不杀人也不放火，就是放毒，你们抓住不放，不能杀，这就是个大麻烦。这是有困难，但是要把困难留给自己，方便让给别人。这就是左派的责任。什么叫无产阶级左派？马克思讲：“无产阶级如果不能解放全人类，就不能解放自己。”你们不是无产阶级左派吗？你们的目的不就是解放全人类吗？所谓全人类就包括地、富、反、坏、右五类分子。这些人不多，这些人不解放，无产阶级自己也就不能最后解放。无论资本家也好，地主也好，坏分子也好......有一小部分杀了头，还有一小部分坐了牢，大部分不能抓，也不能杀。他们还有子女，你杀了他的爸爸，杀了他的父母，他就有对抗情绪，没有对抗情绪的很少，所以杀了头，问题也没最后解决。解放全人类也包括这些反动派，他们也解放。他们不解放，无产阶级也不放心，还只能说无产阶级占优势。你们的斗争进行的更激烈，实际是实行了无产阶级专政。解放以来，我们国家发展了生产力......做了许多大事嘛......能不能把阶级斗争停下来，不行，你不斗，他要斗。坏分子只占百分之几，可是造反的能量很大。七个人就要把你勾德元赶走嘛，你们几乎站不住脚，所以阶级斗争不能停，要一直斗下去，斗个几十年，几百年，一直到共产主义消灭阶级为止，你停他不停，你不注意他注意，他天天在那里斗。所以我们不能不斗，我们不注意阶级斗争，就是让资产阶级斗。无产阶级不斗，势必就会造成资本主义复辟。斗了，百分之九十五的群众就可以争取过来，团结过来，那百分之五的让他留在社会中，问题不大。"},{"type":"paragraph","text":"对三类也是大部分争取，对四类也要争取起义，老教师批判一下，还可以让他教书嘛。只有几个不能教书，留在学校里给他事做。"},{"type":"paragraph","text":"下半年初中要上课，初中高中要招生，初中毕业不必考那么多，这可以根据情况做结论嘛。不要照过去那个格式，什么毕业考试啦，什么招生啦，等等。"},{"type":"paragraph","text":"这次运动高中搞到年底，怎么搞法？先斗争黑帮，学习毛主席著作，清理这些坏人，清出来留在学校，然后是批判“权威”，还要搞清经济，把学校经济清理一下嘛，没有贪污分子，我就不相信，查一查嘛。一个学生每年花了多少钱？了解了解嘛。你们现在一点也不知道，糊里糊涂的，以后经济要向学生公布，要制定一套财务制度，要节约，教师学生都要节约，最好搞一段教学改革，学制改革，这恐怕搞不完，开始了就好，教学改革怎么搞？没考虑过。中学六年就是净读书，没别的事。小学读六年，中学也读六年，结果什么事也不懂，不会做工，不会务农，不会做生意，也不会当服务员......这个制度还是老制度，解放以后也改了改。说是改实际上没有改，高中毕业就那么聪明？既不会做工，也不会种地。高中毕业就自以为了不起，看不起工人，看不起农民，也看不起服务员，到底是教好了，还是教坏了？这事国家要负责任，教育要负责任，领导的人要负责任，你们是高中的学生了，你们会做工吗？你会种地吗？你会做生意吗？扫马路呢？扫马路学过几天还可以。搞阶级斗争这次才开始学，既不会搞阶级斗争，也不会生产斗争和科学实验，读这么多年书，实际上是不聪明的，你们的知识，实际上没有工人多，没有农民多，没有什么可骄傲的。考上大学又是五年，大学毕业什么也不会，还得重新学。医科大学毕业的不能看病，要实习几年才能看。护士学校出来的好一些。护士不能当医生，医生又不能当护士，这怎么行？用什么办法改？这个问题是个困难问题，我们国家的事没那么容易，不是一喊就能搞好的，这个问题先不要在群众中讨论了，领导的人要慢慢想这个问题。"},{"type":"paragraph","text":"这次文化革命不彻底改革教育制度，那就不好了。要彻底改革，反对的人一定多。首先教员反对，因为学生劳动，教员也要劳动，恐怕是这样的。怎么安排呢？可以和工厂挂钩，让他们抽出两小时来，听北京市委的万里讲：北京工人有八十万，学校机关中有劳动能力的人也是八十万，一半一半。那八十万做工，那八十万读书或办公，这就不好。如果这八十万人拿出一半时间去劳动，八小时工作就可改成六小时工作。如果真正行得通，工人一定会欢迎你们。绝大多数人能读书了，你们跟工人农民结合起来了，这样工人、农民、学生(包括家属)的面貌就可以来一个很大的变化。"},{"type":"paragraph","text":"你们可以学做饭，买油，买菜，晓得怎么买法。大师傅相当累，让他们也读书，大师傅会很喜欢你们。当然，有读得好的，有读得不好的，你们不是也这样吗？反对我们的人也可以想一想，就可以使他们不反对了嘛，这些问题都是设想，现在也没有办法，你们想一想，看有什么办法。"},{"type":"paragraph","text":"还可以考虑把学校分成两部分，把一半或一小半搬到农村去，搬去一半就不错了，搬到北京附近的乡村，两三个小时就到了，教师在这里上完课，再到那里上课。在这里上两天，再坐火车到那里上两天。到农村去，学生就要劳动，那里劳动的门路就多了。可以跟农民结合，或者到山区开一些荒，最好和农民一道种地。没有房子怎么办？到那里自己盖，农村盖房子简单，有土和木头就可以了。看看这样行不行。这样子一年可能办不到，准备一两年。在那里半年或大半年读书，同时学习庄稼是怎么种的。那里有阶级斗争，还可以受到阶级斗争的锻炼，只要你们认真劳动，又能虚心学习，农民就欢迎你们。你们不认真劳动，态度又不好，农民就不欢迎你们了。搬一半到农村去了，不是就空出一半房子了吗？就开工厂，安机器。再有一部分同学可以搞服务行业，扫马路，当营业员，有一时期不是要背粪桶吗？可以背背粪桶。商店忙的时候，你们去搞几个钟头就好了。电车上去卖票也好，人大会堂不是有服务员吗？还有些人可以跟工厂挂钩。首先可以搞学校里的服务行业，自己做饭嘛，读书读了十二年，不会烧饭，烧菜，让你们烧就都吃生饭。校工的工作让学生做，就不要请校工了嘛。一出门就有马路、商店、电车，不是什么事情都有干的了吗？一天里有三、四个钟头学习，这不是很好吗？你们懂得了如何做许多工作，他们又读书了，可以快点提高嘛，我看卖票的都是年轻人，至少是小学毕业。要让他们也读点书，就许你们读书？什么事情都做，有好处嘛。这不是现在考虑的问题，斗了黑帮、“权威”之后，清了经济之后，要搞教改，才能解决这问题。你们是师大附中，要跟师大商量好。师大附中是实验性质的，你们不搞新学制，不搞教改，哪里搞？你说你不搬出去一部分，办工厂就得重新盖房子。一部分当工人，一部分当农民，一天有三、四个钟头上课，三、四个钟头劳动，两个钟头自修，这样对青年最好，对体力、脑力都好。马克思讲过体力脑力轮流休息。文化革命后期，要搞这个。讲起来大家赞成，消灭三大差别谁不赞成？实际做起来，不赞成的就多了。家里有不赞成的，教师里也有不赞成的，学生里也有不赞成的。这也是阶级斗争嘛，这是无产阶级教育制度和资产阶级教育制度的斗争。这样学六年，虽然一天只几小时，出来就可以当工人了，晓得怎么开拖拉机，怎么种地，怎么做生意，知识就是多方面的了。神经衰弱，近视眼就没有了。不要你做八小时工作，而只是三、四小时，要认真做，努力做，当一个普通劳动者。这样毕业以后就可以升大学，不升学可以当工人、当农民。高中毕业以后，不当工人、农民，当干部行不行呢？当干部也行，搞阶级斗争嘛，这总比读十二年书什么也不会强得多。如果半工半读、半农半读的学校推广开来，全日制中学就不吃香了，全日制学校的毕业生就不能升大学了。(有的同学说：那就把学校都改过来)现在要实验一下，没有经验嘛，几千年没搞过，中国没有搞过，外国也没有搞过。你们搞个经验给我，有些什么问题和经验，怎么改法，还要和各方面协作，你们区委和各方面讲通了，城市里就好办了。农村还不那么好办。你们师范大学就是研究教育的，你们不实验，什么地方实验？首先让几个学校搞。不搞试点不能推广，首先在师大几个附中试验，你们受师大领导，要和师大讲通。"},{"type":"paragraph","text":"你们在运动中基本站住脚了，这时候要小心，要听学生的意见。学生可能出大字报，有的意见对。不管哪派提的，凡是讲的对的，你就接受，你也得改，要不然还是站不住脚。犯了错误，还是要赶你们的。真是那样，我也保不住你们。(勾提出要派工作组同志兼任支部书记，恢复党组织问题。)"},{"type":"paragraph","text":"可以派工作组同志兼任支部书记，召开党员大会。进行批评和自我批评，吸收非党员教师和学生参加。我不是党员就不能听你们的会？可以参加嘛，参加会就有发言权。不许三十几个党员单独开会，开秘密会干什么？参加会的群众，至少要为党员群众的一倍，至少一个看一个。为什么怕恢复党的活动呢？要立即恢复。参加会的这些人有发言权。支部会讨论什么问题，要让群众知道，搞秘密活动是不行的。只许公开，不许秘密，这些不怕了。做个错误决定也好，大家可以反对嘛。支委开会也不许开秘密的。"},{"type":"paragraph","text":"团委开会也要吸收非团委委员参加，不能搞秘密活动。学校里没有党组织，不是很正常的，到底什么人好，什么人不好，可以从开会看出来。属于争取的人，也让参加，就是刘超参加也很好嘛。就是用这个办法，不是怕他们搞秘密活动吗？团委、支委也找点非团员参加，就是不许乱搞，这样大家就放心了，你们通不通啊？同意不同意？(同学答：通了，同意。)那你们很好通啊。(同学说：老勾的原来那个办法就不同意)允许人家没想到办法嘛！你们不是也没有想到办法吗？有人主张斗完刘超再恢复(组织活动)支部活动，这不好嘛。没有支部书记应该工作组派人去干。只要有一条，不是开秘密会就不怕了。以后可以这样，可以经常这样，这样他就难做坏事了。支委会也要吸收非党员参加，不然他们也会做坏事的。"},{"type":"paragraph","text":"别的学校，工作组强的也可以成立临时支委会，也可以这样做嘛。"},{"type":"paragraph","text":"刘少奇问到这里工作怎样，又讲了以下问题。(张文涛同志汇报了这里的工作，提到批判资产阶级“权威”后，要拿出一段时间，专门清思想，同时清经济)"},{"type":"paragraph","text":"清政治就是清思想嘛，思想是贯串整个运动的，斗陈永康是清思想嘛，斗刘超也是清思想嘛，清经济也要清思想。"},{"type":"paragraph","text":"(讲到恢复党组织的问题)"},{"type":"paragraph","text":"开几次党员会，自己批评，自己整风嘛！"},{"type":"paragraph","text":"(有些工作组不强，抓不起来)"},{"type":"paragraph","text":"教职员比较复杂，你们斗不过他，他们斗争经验多，社会经验多，你们斗不赢他，斗不赢只好打败仗。"},{"type":"paragraph","text":"(三级干部会解决什么问题，是不是主要解决领导核心的问题)"},{"type":"paragraph","text":"领导核心主要是解决教职员的问题，教员在这里分化，大部分教员可以在这里分化，左派在这里提意见，听了教员的分化，再回去报告嘛，学生里大部分背靠背，一部分面对面，两边通消息。教员里多数人可以解放，可以分几批解放。大多数要解放，最后留下一批不能解放的。要拿回去斗的，也先在这里斗。老教员也在这里批判一下，把教职员的问题解决，谁是不能回去的，谁是回去也不能教书的，谁是还能用的，但是问题多的，可以向学生先讲清楚。不鼓掌嘛，你可以作工作，以后再看表现，这也是个压力，学生看着你嘛。人哪能一下就做结论，你们年轻人经验少。看他几个月，几年，不好再斗，好就留下嘛，学校里要开斗争会，工作组不强的，上级可以派人去领导嘛，主要是解决教职员的问题，学校里要留工作组的人。不能都集中，多数群众还在学校嘛，好的教师也要和同学见面，好的教员也要开会，教员里也会分化。支部会在哪里开，支部改组，也在哪里改组。"},{"type":"paragraph","text":"教师，他们不怕工作组，也不怕教师，就怕学生。学生一鼓掌就高兴了，就高兴得了不得。搞一个月压力很大，没有压力不行。有了这个压力还不赶快加劲，没有压力就不好办了，压力太大也不行，太大就压扁了。这个压力已经保持一个月了。再保持一个月，大部分老师就要解放，对老师要宽大处理，要从宽，一、二、三类都要从宽，当然仅仅从宽也不行，还要有从严的，不然，三类不会低头。刘超当校长不行了，支部书记呢？搞一个从严的开除党籍的三级干部会上，要拿出一个从宽的，一个从严，你走这条路，他走那条路，大家就要想一想了。好的解放一批回去，还可以有一部分参加斗三、四类，他们可以回去宣传，争取多数，假若三类都从宽，他们是不会改的，搞一个从严的就会改，只有宽，没有严，也就没有宽。好的，坏的都从严就没有宽，也就没有严了嘛。没有宽就没有严，没有严就没有宽，主要是从宽，多数是从宽，极少数从严。"},{"type":"paragraph","text":"(有人说：有教师去检查，不深刻不老实，被轰出来了。)"},{"type":"paragraph","text":"轰出来不好嘛，这就是从严，这是个细致工作，做思想工作。开三干会集中起来，半个月二十天就搞了个差不多，他们吃了饭，没事嘛，先开会。两礼拜，时间就相当多了，还可以休息一天。如果两个礼拜不够，可以搞二十天嘛。最好两个礼拜把大多数解放，然后还可以搞第二批。可以开大会，开小会，还可以分组开会。两个礼拜到二十天就可以解决问题了，剩下少数人也可以基本解决问题。一批两批就解决了，解决了第一批，就有经验了。没有经验就很难办。"},{"type":"paragraph","text":"(4)刘少奇关于撤走工作组的指示(7·28)"},{"type":"paragraph","text":"他们(声援何方方的人)不了解情况，有没有道理，讲嘛，要讲道理，不讲道理就没的可说了。"},{"type":"paragraph","text":"工作组走后，如果让何方方当权了，就让她当嘛，看他们做得怎样嘛，领导的好就听他们的，不能自己领导就好，如果不好，反过来你，别人要问你你就讲，不问就保留意见。"},{"type":"paragraph","text":"好嘛，靠你们在大风大浪中锻炼，以前是我们几个人，也能搞好，二十二岁时就领导罢工(安源)。要做好准备，被打下去，受打击，这样才证明你们真坚强，如果他们把运动引向歧途，更可以教育群众。"},{"type":"paragraph","text":"你们要依靠群众，依靠多数，几种意见要问清楚。"},{"type":"paragraph","text":"这样锻炼出来更好。"},{"type":"paragraph","text":"可以一起讨论何方方是否对的，他们不许你们辩论何方方，他们也在辩论你们嘛，你也是学生呀，问题在于辩论革命学生，还是反革命学生。"},{"type":"paragraph","text":"工作组要走，公开说，斗争会可以停一停，上级讲明，勾德元表示拥护，你们也表示态度，这是党中央，毛主席对你们的信任，是对你们学校的信任，你们可以开小会让大家议论，不开自己会议论，晚上斗争会还开不开让大家决定。"},{"type":"paragraph","text":"(5)惠××(前团中央书记处书记)揭发刘邓关于文化大革命的指示"},{"type":"paragraph","text":"正式传达的："},{"type":"paragraph","text":"一、六月三日，胡克实传达中央指示，其内容除“八条”外，还有“哪里出事，哪里派人去”，“各校党组织不但要参加运动，而且要负起领导责任”。"},{"type":"paragraph","text":"二、六月初，运动一开始，胡克实对我们说：“少奇同志对我说‘克实，你要掌握好形势呀！’散会后少奇同志又说‘千万要把局面维持好呀！’”"},{"type":"paragraph","text":"三、六月九日，胡克实传达刘少奇、邓小平的指示说：“学校干部教员要分类，排队，不要打击过多，娃娃们起来什么都要打倒，也不要怕乱(只要在八条范围内)，建立一个革命秩序。现在是坐不下，吃不下，睡不着，不要硬限制，要引导，冷静地分析批判。”"},{"type":"paragraph","text":"四、六月十一日，胡克实传达中央指示说：“在北京以两个月左右的时间来搞夺权，这是新的反右斗争，在局势明朗的情况下，党团组织可以及早改组，即整党整团。要抓紧工作队，政策还是要注意，对问题较小的干部要帮助，无非是检讨，尽量不要掉进三类，内外有别要注意。”"},{"type":"paragraph","text":"五、六月十八日，胡克实传达中央指示，其中说到，试讲一下《二十三条》中的某些内容，在支持革命的前提下如何划清界限。真正的左派是能够接受我们的政策的。人民日报要发表一篇社论，对假革命要善于识别。要在放手发动群众的前提下解决打人的问题。要发动学生做教师的工作。"},{"type":"paragraph","text":"六、六月二十五日，胡克实传达中央指示，其中说到，主要内容是(1)一定要很好的教育提高左派，革命左派不仅要敢于同牛鬼蛇神作斗争，同时又是最能团结大多数人。(2)现在出现了假左派真右派和我们激烈地争夺领导权，破坏性很大，对此方针是坚决揭露，分化瓦解，把头子孤立起来，在适当的时候是要反击的，对这种人，工作组没有办法，一是没有经验，二是他们的策略很厉害，用大帽子压人，用各种办法纠缠你。(3)组织民兵纠察队，负责校内的事和违反政策的事。维持斗争会的秩序。(4)从来访中善于发现假左派。(5)阶级阵营分清后，要恢复党团组织生活，在工作组领导下面，恢复必要的行政职权。(6)乱这么一阵是大好事，是必然的，但现在到时候了。注意一分为二。要抓紧分类排队，特别是中学，是不是一棍子都打了？(7)注意敌人的活动。"},{"type":"paragraph","text":"七、六月二十九日，传达中央指示，主要内容是(1)要赶快抓紧做教师争取工作，这个月压力很大，再压下去就不利了，除个别首要分子外，一律争取，也不要轻易说人家假起义，假的也行，再蒙住头压下去，连教师都不解放，对革命不利。现在压力不少了，包括群众未发动的学校，也要做现在的工作，因为有全国形势的压力。不把教师工作做好，运动就搞不好，这是中学发动群众的标志。文化革命取得胜利的一个关键。(2)抓紧分类排队的工作，运动的目的性一定要明确，一是反党内走资本主义的道路当权派，二是批判资产阶级反动学术“权威”，中学权威不多，也有一点。副产品是也暴露和揪出一批反革命。(3)在批判斗争中，要事实，有道理，有分析，充分进行说理斗争，党团组织要早些恢复生活。(4)对于假左派，要坚决揭露，他们实际上是想夺权。免不了有些混战的场面。这是几种原因造成的，有的从敌人来的，有的从假左派来的，有的是从幼稚的左派来的。要充分估计运动的反复性，有准备，有警惕，有策略，分析敌我的形势，要抓口号抓住敌人的辫子，把大多数人争取过来，组织过来。凡是混战的地方，还是把假左派、真右派打退，才能向黑帮进攻。"},{"type":"paragraph","text":"八、七月六日，我在市委书记处听吴德同志传达中央指示，有下列一些内容：(1)三分之二倒下来不行，教师工作差，教师回班问题很大。(2)中学资产阶级当权派撤，不是的被打伤了的，工作可以调换。(3)中学教师，按四清办法，在社会里开三干会那样，集中交代问题，学生派代表，先搞好的，次好的。(4)中学究竟搞多久，政策定出来，队排出来，定了部署，能不能三分之一八月份解决，九月一半，这样就主动了。市委、团中央搞个计划。(5)运动宁可慢一点，不要使生产降下来。(6)中学排队，要尽量多留一点，教师可能有很大的交流，重点学校，尖子学校，交流干部要注意质量。"},{"type":"paragraph","text":"九、七月十三日，政治局会议讨论北京市中学文化革命初步规划。少奇、小平同志指示中有：(1)要加强工作组(确定由教育部派一批同志参加北京市中学工作队)。(2)中学生分散，设法讲道理，实事求是在中学生中一下讲不能。集训，先向一部分讲通了就好办了。(3)初中搞到九月底，“十一”后开学，高中搞到年底。(4)学生中，除一定会有小流氓，小反革命等，一般的不要戴帽子，也不要天天辩论，浪费时间，孤立起来就行了。(5)对工作组要加强教育。(6)秘密团体都不要，地下活动是错误。吸收群众列席党团会议。(7)现在只是都恢复党团生活，未恢复领导，这么大的文化革命党支部不领导怎么行。(8)开学“毛著”积极分子大会，搞些典型，要与文化革命现阶段要求有关的。(9)工作队要训练一下。"},{"type":"paragraph","text":"十、七月二十三日，胡克实传达中央指示中有：工作组进校后受到欢迎，接着发生撵工作组的情况，原因很多，......也有的别有用心，攻工作组，反对党的领导。这时强调了在革命的基础上，恢复党团活动，加强党的领导，执行党的政策。对别有用心撵工作组的人进行些辩论，现在又出现了停滞的情况，中心是教育提高工作组，学会大民主，学会民主集中制，对工作组不能采取消极撤换的办法，而要积极地教育，实在不行的再撤。大民主的焦点是大辩论，辩论中要积累一套规则，一套办法。如何斗争的问题，要准备好再斗争，高水平、高质量的斗争。斗前要演习，校间互相支援的内容，现在要强调互相学习。"},{"type":"paragraph","text":"(6)前团中央书记处向中央汇报时刘少奇、邓小平的插话"},{"type":"paragraph","text":"一、当汇报到运动中的要求时刘少奇、邓小平说：“中学要彻底清理一下。”当汇报到全市中学有百分之五十四的单位没有黑帮，刘少奇说：“可能还有没检验出来的。”当汇报到是否高中为重点时，刘少奇说：“初中是多数，也不可忽视。”"},{"type":"paragraph","text":"汇报到第一阶段工作的时候："},{"type":"paragraph","text":"（1）重点批判党内走资本主义的当权派和党内的资产阶级代表人物。"},{"type":"paragraph","text":"（2）整顿恢复健全党团组织生活，发挥党支部的领导作用。发挥团的助手作用。早一点搞起来对运动有利，在运动中考验锻炼嘛。"},{"type":"paragraph","text":"（3）壮大提高左派队伍。"},{"type":"paragraph","text":"（4）例一段清经济，要趋机把经济清理一下。"},{"type":"paragraph","text":"总之第一阶段就是四清阶段。时间，初中八月底搞完，还有个任务：初中、高中招生，不要考试了，采用推荐的办法嘛，还有两条："},{"type":"paragraph","text":"1、前年、去年下乡好的可以召回一批升学。"},{"type":"paragraph","text":"2、前年、去年没下乡，没升学的，不能升学，包括干部子弟。"},{"type":"paragraph","text":"二、集训"},{"type":"paragraph","text":"同意集训。那么多不抽出来怎么行？集中起来不仅提高认识，掌握政策，打通学生、教员思想，同时两方面可以提出意见来。在学校不好过关，在学校的学生可以背靠背的进行批判。"},{"type":"paragraph","text":"对一、二类的干部、教师，尽早的解放出来。三类的不好办，对他们要认真的讲道理，要争取他们中的大多数，改正错误。不认真讲道理，批判的就不透。对他们要搞一些从宽的典型，也要搞一些从严的开除出教师队伍，集训半个月二十天即可。"},{"type":"paragraph","text":"三、教学和学制改革"},{"type":"paragraph","text":"不趁这次运动是改不动的。当然这次改不完，开个头，定出目标方针方案来，这是学生的要求，也是职员的要求。现在教师也不敢抵制，冒一点也不要紧，过几天还要谈一次，请经委计委的也参加。刘少奇说：“教育和劳动相结合，师大一附中是否可以到农村去一半，留一半在家办工厂。”另一个方法是和工厂挂钩，或者业余时间去当售货员，卖票。要搞教育改革就必须把学生插到商店、工厂去劳动，经委计委要接受，这是反修防修的根本措施，又不要你们什么，帮你们劳动，你们应该扶植欢迎，不欢迎就是抗拒文化大革命。教育大革命中要给大学、中学安排劳动，学制改革要提出个纲来。"},{"type":"paragraph","text":"四、政策问题，"},{"type":"paragraph","text":"基本同意提出的十条政策："},{"type":"paragraph","text":"①什么是牛鬼蛇神，就是二十三条中的第四类，就是反党反社会主义分子、修正主义分子戴上帽子就是敌我矛盾。"},{"type":"paragraph","text":"②教师干部当中一类好的要保留，二类要批评自我批评，缺点错误要改正。三类的问题严重要批判，也要让他们改正错误，其中一部分要撤职，有的不能当领导，有的要调换一下，有的要看一下，争取大部分留下。四类就是敌人，就是牛鬼蛇神，当然也要给他们出路，允许他们重新做人。"},{"type":"paragraph","text":"③对五类分子的处理："},{"type":"paragraph","text":"他们就是牛鬼蛇神，但不一定不能再教书了。也要分析一下，加以区别。解放以来，没做过坏事，有一定教书能力，还可以留一部分教书。农村逃亡地富分子回原籍改造，家在城市的，采取退职退休。中学都是小孩，留那么多坏人是不行的，但对他们处理要适当。总还要给他们吃饭嘛！有些人是历史问题，现在没做坏事，不一定赶走。邓小平说：“这是一个很大的政策问题。有些人要安置妥当，有些人不能教文史。但可以教自然科学，不可以教中学，但是否可以教小学，不能教就退职退休，一共二千多人我们还养活不起？！”"},{"type":"paragraph","text":"④团结百分之九十五以上的人能不能做到，怎么个算法，混进教师队伍的不算，也不要限制太死。"},{"type":"paragraph","text":"⑤学生中一定有些小流氓、小反革命。除了杀人放火，对群众有直接威胁的，即使现行反革命，也不要逮捕。要指出这是现行反革命，放到运动后期处理。也不要天天辩论他们，浪费时间。"},{"type":"paragraph","text":"⑥对剥削阶级子女，犯错误干部子女，还要重在表现。方针要放在争取、团结、教育上，不要排斥他们，同他们搞对立。将来有些人还要注意他们的升学，表现好的可以升学，不然不利于分化他们。"},{"type":"paragraph","text":"胡克实：重视成份，重视阶级分析前提下，还要重在表现。"},{"type":"paragraph","text":"五、整党整团"},{"type":"paragraph","text":"现在只是恢复党团组织生活，还没有恢复党团组织领导。这么大的文化革命运动，党支部不领导怎么行？要明确指出建立健全发挥党支部的领导作用，应当作为一项重要任务。不然工作组走也走不了，教改也改不了。不完成这一步，将来学校哪个当领导(都不行)，这样，可以在运动中锻炼，考验(党员)干部，能领导就领导，不能领导就撤换。恢复迟了对运动不利，有条件的单位要早一些，一二类的学校早一点解决，早一点对运动有利。可以较早的开展批判党内资产阶级代表人物、执行资产阶级教育路线的代表人物。把三类、四类的人物一定，就可以很快确定学校的领导。党支部确定以后，工作组就是帮忙的。如果一半学校早点解决，运动可以快些，工作队可以把力量集中到问题多的学校，教育革命只有把领导建立起来才能搞。刘少奇说：“党的会议别人不能过问，这是做坏事的原因。党支部会吸取群众参加，学校党支部会有什么不能公开？工厂也要试一试。”"},{"type":"paragraph","text":"刘少奇说：“开党团员大会吸收左派参加，党员会议别人不能过问，是有些组织做坏事的一个原因。这个问题至少在北京试一试。今后要经常化。除市委通知外，一律让群众参加，重要的有两条："},{"type":"paragraph","text":"1、是把党团民主集中制搞好。"},{"type":"paragraph","text":"2、是群众路线搞好。"},{"type":"paragraph","text":"利用这一次大民主的形式，把党团组织的民主生活建立起来，党团会议不要先做决定，把群众意见集中起来再定。“"},{"type":"paragraph","text":"组织处理放在运动后期，学生中的自发的左派组织不能成立，革命不能搞地下组织。"},{"type":"paragraph","text":"六、加强工作队的工作(包括工作组)，工作队要接受群众监督，工作队不能听取不同意见就非垮不可。前一阶段假左派，真右派，赶走工作组不对。现在工作组基本站住脚，以后不能以势压人。刘少奇说：工作队要整训，一次可以搞一天。北京市党组织长期不搞民主集中制，不搞引火烧身。工作队要加强教育，好好学习毛主席著作、二十三条。学习毛主席著作经验交流会时间不要太长，要结合文化大革命的中心，开一天可以，过几天再开嘛！"},{"type":"paragraph","text":"陈伯达、江青、王力到广播学院。陈讲话：提出撤销工作组；肯定“一切权力归革命委员会”的口号是革命的口号；“党(组织)不能领导文化大革命运动，说明党的组织有缺点或错误，或是修正主义篡夺了党的领导。”会上有人递条子，“诽谤”江青。陈当面对江青大加吹捧，以资反驳。江青讲话：“我要来放火！”（《传信录23》）"},{"type":"paragraph","text":"同日，中共中央、国务院发布关于改革高等学校招生工作的通知："},{"type":"paragraph","text":"高等学校招生，是关系到培养无产阶级革命事业接班人的重大问题，是一项严肃的政治任务。"},{"type":"paragraph","text":"解放以来，高等学校招生考试办法，虽然不断地有所改进，但是基本上没有跳出资产阶级考试制度的框框，不利于贯彻执行党中央和毛主席提出的教育方针，不利于更多地吸收工农民革命青年进入高等学校。这种招生办法，必须彻底改革。"},{"type":"paragraph","text":"一、按照毛主席关于使受教育者在德育、智育、体育几方面都得到发展，成为有社会主义觉悟的有文化的劳动者的教育方针，从一九六六年招收的新生起，各地要向学生宣布：将来毕业以后，必须服从国家分配，可以分配当技术人员、干部、教员，也可以分配当工人、农民。国家分配做什么，就做什么。一定要彻底打破过去大学毕业生只能分配当脑力劳动者的资产阶级的框框。各地要加强对学生的思想教育，使学生懂得这是逐步缩小脑力劳动与体力劳动的差别、防止产生修正主义和资本主义复辟的根本措施之一。各地并要教育本届高中毕业生，高中毕业以后，不论升学或者就业，都是服从国家和人民的需要；是否继续升学，一定要服从祖国的挑选，国家分配做什么就做什么，被选上升学的就升学，需要分配到农村或工厂参加生产劳动的，就积极参加生产劳动，需要分配参加其它工作的，就积极参加其它工作。"},{"type":"paragraph","text":"今年高中毕业生除国防有关部门按特殊需要挑选以外，仍同以往一样，应该首先满足高等学校招生的需要；在高等学校招生以前，各单位不能自行招收高中毕业生。"},{"type":"paragraph","text":"二、根据中央关于领导体制适当下放，充分发挥地方积极性的精神，从今年起，招生工作下放到省、市、自治区办理；教育部负责编制各高等学校招生计划和检查各地贯彻执行中央的方针政策以及完成招生任务的情况。"},{"type":"paragraph","text":"三、高等学校招生，应该首先保证全国重点学校(包括半工半读的重点学校)所需的新生的质量。各地在办理高等学校招生工作中，一定要有全国一盘棋的观点，服从总的招生计划，反对只顾自己地区的需要，把“尖子”都留下来的本位主义思想。"},{"type":"paragraph","text":"今年分省市分部门的招生计划，由国家计委和教育部联合下达。各高等学校招生分配计划和其他若干具体事项，由教育部根据本通知精神，另行规定。"},{"type":"paragraph","text":"从今年起，高等学校招生，取消考试，采取推荐与选拔相结合的办法。"},{"type":"paragraph","text":"高等学校招生的推荐与选拔，应在各地党委统一领导下，采取群众路线的方法进行。首先由中学根据统一规定的政治审查标准、健康检查标准和高中毕业生的平时成绩，经过学校领导、教师和学生的党团组织共同评议，把德智体三方面条件较好的学生推荐出来，然后由县委或市(区)委组织的由各有关部门参加的招生委员会进行审查，最后集中到省、市、自治区，在省、市、自治区党委的领导下，由高等学校统一招生委员会按照基层党委和中学的推荐意见，并参考学生的志愿择优录取。各地在分配推荐名额时，应大于选拔名额(即招生计划数字)，以便从中选拔。"},{"type":"paragraph","text":"对于在阶级斗争、生产斗争和科学实验三大革命运动中经受过一定锻炼的、政治思想好、年龄在二十五周岁以下(个别特殊情况的可以超过二十五周岁；理工科一般年龄应小一些)、具有高中毕业或相当于高中毕业文化程度、劳动两年以上的工人、贫下中农、劳动青年，以及退伍军人、在职干部(包括中小学教师)、四清工作队员，也采取推荐与选拔相结合的办法，由所在单位的基层推荐到县或市的招生机构审查，然后推荐到省、市、自治区的招生委员会负责加以选拔，保送入学。"},{"type":"paragraph","text":"对于高中二年级个别在校学生，如果政治思想好，身体健康，提前学完高中三年级的主要课程的，也可按上述规定办法，由中学负责审定推荐。"},{"type":"paragraph","text":"高等学校选拔新生，必须坚持政治第一的原则。应该贯彻执行党的阶级路线，对于工人、贫下中农、革命干部、革命军人、革命烈士子女以及其他劳动人民的子女，凡是合乎条件的，应该优先选拔升入高等学校。至于剥削阶级家庭出身的应届高中毕业生，一定要经过严格审查，对于那些在政治上确实表现好的，也允许挑选适当数量的人升入高等学校。在处理政治、学业、健康三者的关系上，必须重在政治表现，要在保证政治质量的前提下，结合学业和健康条件，择优录取。"},{"type":"paragraph","text":"高等学校在审查学生的学业条件时，理工农医类应该注意选拔数学、物理、化学、外国语成绩较好的学生；文史类应该注意选拔语文、政治常识成绩较好的学生。"},{"type":"paragraph","text":"中央和国务院已经发出通知，一九六六年高等学校招收新生的工作推迟半年进行。现在决定，本年度高等学校录取新生的时间，从一九六七年一月一日开始，至一月底结束。"},{"type":"paragraph","text":"高等学校招生办法的改变，是一项具有重大意义的革命性的措施，可能会遇到一些思想阻碍，会产生一些新的问题。各省、市、自治区党委和高等学校党委，要特别注意加强对招生工作的领导，充分做好思想工作，对教师、学生、家长进行深入的宣传教育，保证中央关于高考制度改革的精神顺利贯彻执行。为此，各省、市、自治区要组织强有力的高等学校统一招生委员会，下属各县、市也要组织强有力的招生委员会。各级党委应当有得力的负责同志主持招生委员会的工作，有关部门和高等学校应当派得力的负责同志参加招生委员会的工作。"},{"type":"paragraph","text":"今年招生工作结束后，各省、市、自治区和高等学校，应认真总结经验，使其逐步形成一套更加完善的招生制度。"},{"type":"paragraph","text":"中央一九六六年六月一日中发[66]283号批转高等教育部党委“关于改进一九六六年高等学校招生工作的请示报告”，停止执行。7月25日"},{"type":"paragraph","text":"在24、25日两天中，毛泽东连续找中央文革小组成员、参加会的各大区第一书记谈话。说“不要搞工作组。”“过去《人民日报》不在我们手里，中宣部不在我们手里，文化部不在我们手里，北京市委不在我们手里。”“现在搞文化革命斗争，一斗二改。斗什么？斗争那些党内走资本主义道路当权派。”又说：“主要是要改变派工作组的政策。不要工作组，要由革命师生自己搞革命。”工作组一不会斗，二不会改，起坏作用，阻碍运动。”25日，中央会议继续举行，参加者增加了前来参加中共八届十一中全会的各中央局书记。毛提出撤销工作组，说工作组“起坏作用，阻碍运动，应统统驱逐之”，“不要工作组，要由革命师生自己闹革命”。"},{"type":"paragraph","text":"《人民日报》等主要报刊发表了毛泽东7月16日在长江游泳的报导和照片，吹嘘毛泽东身体非常非常健康，以让人们为他的重返一线作心理上的准备。当时的毛泽东年73岁。"},{"type":"paragraph","text":"陶鲁笳被任为新市委大学文化革命委员会第一副主任。"},{"type":"paragraph","text":"李雪峰在新市委会议上传达了毛关于撤工作组的指示。陶鲁笳要求，在大学工作组撤走前必须作好(1)成立临时文革筹委会，(2)成立临时院党委，(3)成立临时校务委员会。为实行没有工作组的工作组路线作了组织准备。清华大学的临时筹委会，几乎全是高干子弟。"},{"type":"paragraph","text":"晚，陈伯达、康生、江青与中央文革小组其他成员第三次来到北京大学。江青冒雨亲自主持在东操场召开的万人辩论大会，对工作组前一阶段以“反干扰”为名推行的镇压群众的错误进行揭发批判。江青声言：“革命的跟我们一起走，不革命的走出去”，“同志们要我们什么时候来，我们就什么时候来。如果同志们认为有必要让毛主席来，毛主席也可以来”。康生在会上强调“毛主席一个工作组也没派”。(《传信录24、25》)"},{"type":"paragraph","text":"教育部发出《关于印刷与发行小学讲授毛主席语录本的通知》。"},{"type":"paragraph","text":"教育部长何伟根据陶铸指示，从7月份开始，集中人员，制定教改方案，于今日提出一个《教学改革的方案》。刘少奇、陶铸亲自听取了何伟的汇报。7月26日"},{"type":"paragraph","text":"政治局常委扩大会议决定撤销工作组。毛泽东在接见中央文革小组全体成员时，再一次指出，全国百分之九十五的工作组犯了方向路线错误，并下令撤销工作组。"},{"type":"paragraph","text":"当晚，陈伯达、康生、江青、张春桥、王力等中央文革成员四下北大，召开了第二次万人辩论大会。二十多名就读北大的高干子弟联合发言，为工作组唱颂歌。江青在会上作了长篇发言，并抖露家庭矛盾，控诉张承先如何重用张邵华(毛岸青的妻子)，控拆历史系的党员教师郝斌，如何迫害她的女儿李讷，声泪俱下。最后，陈伯达说：“我们建议撤销以张承先为首的工作组，这是一个阻碍同学们进行文化大革命的工作组，是障碍物......要撤掉这个障碍物”，“自己起来革命”。(《传信录26、27、28、29》，李雪峰《回忆文化大革命初期的五十天路线错误》详有记述，可资参考。)毛泽东亲自听北大辩论会的录音，对大会表示支持。北大的造反派星夜奔赴各兄弟院校，宣传毛的最新指示，学校、机关纷纷到北大串连，反工作组的浪潮汹涌澎湃。"},{"type":"paragraph","text":"康生接见八个高等学校的学生，申明中央文革确已提出(1)撤销工作组；(2)各校组织文革小组，由革命师生自己教育自己。(《传信录30》)"},{"type":"paragraph","text":"《人民日报》就毛泽东游长江发表社论《跟着毛主席在大风大浪中前进》。"}],"authors":["周良霄","顾菊英"],"dates":[{"year":2008}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":279,"page_end":294,"alias":""},"tags":[{"name":"康生","type":"人物"},{"name":"江青","type":"人物"},{"name":"陈伯达","type":"人物"},{"name":"陶铸","type":"人物"},{"name":"邓小平","type":"人物"},{"name":"王力","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"李雪峰","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"薄一波","type":"人物"},{"name":"陶鲁笳","type":"人物"},{"name":"中央文革","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"革命委员会","type":"主题/事件"},{"name":"教育革命","type":"主题/事件"},{"name":"武斗","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]},{"id":"wengeqianqixinianlu2","name":"十年文革前期系年录（中册）","internal":false,"type":"pdf","official":false,"author":"周良霄,顾菊英","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/文革前期系年录2.pdf"],"article":{"title":"第五十三卷","parts":[{"type":"title","text":"第五十三卷"},{"type":"paragraph","text":"1967年1月4日"},{"type":"paragraph","text":"(中央首长批陶铸)1月4日"},{"type":"paragraph","text":"下午四时，周恩来、陈伯达、康生、江青、王力、穆欣等在人民大会堂接见“武汉赴广州专揪王任重革命造反团”代表，公开指责陶铸是刘、邓路线的执行者，鼓励造反者整理陶铸的材料。参加会议的有南京大学、中山大学、武汉各院校的代表。人大、地质等院校闻讯后亦赶来参加(《传信录376》)。会后游行队伍到中南海西门。上万群众，情绪激昂，要求揪出陶铸。直到五日清晨六时半，周恩来出来接见，答应研究大家的要求。七时许，群众始离去。同时“揪出陶铸”的大字报、大标语贴满北京街头。在中央文革接见“专揪王任重革命造反团”代表的同时，陶铸在人民大会堂接见安徽来京学生，对隔壁房间中正在筹划的对他将采取的行动，一无所知。"},{"type":"paragraph","text":"随着陶铸、王任重被打倒后，中共中央书记处瘫痪，中央文革起而代之。"},{"type":"paragraph","text":"周恩来、陈伯达、康生、江青、王力、穆欣在接见赴广州揪王任重代表团时的讲话"},{"type":"paragraph","text":"首长进场，同学们热烈鼓掌，高呼毛主席万岁等口号。"},{"type":"paragraph","text":"江青：今天的会，你们参加了没有？(指工人体育场接见大会)(参加了)你们送给我们的材料收到了，我们中央文革正在研究整理，重要的整理出来，还要送给中央、送给毛主席和林彪同志参考。感谢你们对我们的支持，谢谢你们。(接着代表们汇报了有关陶铸同志、王任重和中南局、武汉、广州等地许多重要的情况，并交了材料。)同学们，你们还有些材料、意见，我们还留下人来听，我个人感觉，你们打了个胜仗。(热烈鼓掌)(指十二月三十日晚我们代表团在中南海舌战陶铸)陈伯达：陶铸同志到中央来并没有执行以毛主席为代表的无产阶级革命路线，实际是刘、邓路线的坚决执行者，刘邓路线的推广同他是有关系的，他想洗刷这一点，但洗刷不掉，后来变本加厉，比如你们到中南局去，你们了解了很多情况，的确是有后台的，这个后台老闾就是陶铸。他在中南海接见你们那个态度是完全错误的。(指一九六六年十二月三十日晚在中南海小礼堂回答我团问题会议)他是文革小组顾问，但对文化革命问题从来未跟我们商量过，(江青插话，独断专行)他独断专行。他不但背着文革小组，而且背着中央。你们反映的情况是很好的，给了我们很大支持，感谢你们。江青：同学们！你们回去斗争要注意两条，一条是实事求是，核实材料才能立于不败之地。第二条是要做艰苦细致的群众工作，争取多数，(不能)老受围攻，要使自己由少数变成多数，不要把敌人看成一块铁板，对于哪个集团的人也不是不能做工作的，是可以分割的。多数同学很多是受蒙蔽的，不是一块铁板，是可以争取的，一定要做细致工作，这是策略问题，很重要，希望大家注意这几点。(热烈鼓掌)王力：好好学习主席著作。康生：同志们把材料整理出来，有材料了，搞出来就胜利了。这是策略。好！再见！同学们起立宣誓、呼口号，热烈欢送首长，代表们向首长提出要求：坚决要求陶铸同志就十二月三十日的会议上抗议我们毛主席的红小兵一事作公开检讨。晚，有中国科学院毛泽东思想哲学社会科学学部“红卫兵联队”参加的《批判刘、邓路线新代表陶铸联络委员会》所属各单位及其他革命组织的三千多人，到中宣部集会，一致要求把陶铸揪出来批倒、批臭。并向全国发布了批陶呼吁书。"},{"type":"paragraph","text":"《陶铸跳出来以后......》(新北大中文系破私立公战斗队整理)"},{"type":"paragraph","text":"六月一日"},{"type":"paragraph","text":"毛主席亲自下令广播并发表聂元梓等同志的大字报，点燃了无产阶级文化大革命的熊熊烈火。"},{"type":"paragraph","text":"六月四日"},{"type":"paragraph","text":"个人野心家陶铸窃踞了中央书记处常务书记、中宣部部长、中央文革小组顾问等要职。随后陆续调其心腹张平化、雍文涛、王任重来京。"},{"type":"paragraph","text":"六月七日"},{"type":"paragraph","text":"陶铸与三反分子蒋南翔、何某等研究六六年高考的问题。"},{"type":"paragraph","text":"六月十日"},{"type":"paragraph","text":"毛主席在杭州发出“不要急急忙忙派工作组”的指示，陶当时在场。"},{"type":"paragraph","text":"六月十三日"},{"type":"paragraph","text":"陶铸回到北京，拒不执行毛主席的指示，却接受刘、邓的意旨，派张平化、李剑白为首的工作组进中宣部。"},{"type":"paragraph","text":"六月十四日"},{"type":"paragraph","text":"陶铸抽中宣部人员组成南下工作队，陶声言“现在是工作队专政”。"},{"type":"paragraph","text":"六月十五日"},{"type":"paragraph","text":"陶铸到教育部作报告，大保何伟，并任命他代理高教部部长，宣布教育部主要任务是清算董纯才(前教育部副部长)的凯洛夫教育思想影响，企图扼杀教育部的文化大革命。会上大吹自己在中南局如何狠抓毛著学习。"},{"type":"paragraph","text":"六月十六日"},{"type":"paragraph","text":"陶铸派出以旧中宣部副部长张际春为首的哲学社会科学部工作组，刘某某为首的北京市小学文化革命工作组，雍文涛为首的中学文化革命工作组。"},{"type":"paragraph","text":"六月十七日"},{"type":"paragraph","text":"聂元梓等同志到中宣部送大字报，声讨许立群等黑帮。第二天，中宣部印刷工人贴大字报揭露工作组提出“清经济”、“整顿内部”、“扫清外围”、“人人洗手洗澡”等错误口号，陶铸和工作组万分惊慌，企图压制群众的革命行动。"},{"type":"paragraph","text":"六月二十一日"},{"type":"paragraph","text":"陶铸炮制中宣部文革小组，并指定他本人及张平化、张际春、李剑白等为小组成员。二十三日，陶铸在中宣部文革小组成立大会上要中宣部的各处对群众进行左，中，右排队，规定中宣部运动为三个月。不久，中宣部许多革命群众被打成“反革命”，扣上“抱粗腿”、“黑线”、“保皇”等帽子。"},{"type":"paragraph","text":"六月二十五日"},{"type":"paragraph","text":"陶铸到卫生部保钱信忠，说“哪有那么多黑帮？”陶还反复强调：“要依靠党团组织来进行领导。”企图以所谓组织纪律来压制群众运动。"},{"type":"paragraph","text":"六月二十六日"},{"type":"paragraph","text":"陶铸伙同刘、邓以中共中央名义批转了《文化部文化大革命的请示报告》，这个报告要求“从解放军抽调一千多名干部，加上本部的政治坚定的干部组成工作队派往各单位领导运动。”"},{"type":"paragraph","text":"七月一日"},{"type":"paragraph","text":"陶铸到北大作报告，把北大“六·一八”革命事件说成是“少数人捣乱”。还说“六·一八”以后，“北大运动更深入了”，肯定并支持张承先镇压革命群众运动。并散布反对地方党组织就是反对党中央反对毛主席等谬论。"},{"type":"paragraph","text":"七月十三日"},{"type":"paragraph","text":"陶铸根据刘少奇指示，审查批准了《关于中小学招生考试放假毕业等问题的通知》，不让中小学参加文化大革命。"},{"type":"paragraph","text":"七月十四日"},{"type":"paragraph","text":"陶铸以中央名义宣布中宣部副部长及所属单位负责人名单："},{"type":"paragraph","text":"张平化为中宣部常务副部长。"},{"type":"paragraph","text":"张际春为中宣部副部长。"},{"type":"paragraph","text":"雍文涛为中宣部副部长兼国务院文教办公室常务副主任，后调任北京市委书记处书记。"},{"type":"paragraph","text":"萧望东为文化部代理部长。"},{"type":"paragraph","text":"何伟为教育部部长。"},{"type":"paragraph","text":"丁莱夫为广播事业局局长兼党委书记。"},{"type":"paragraph","text":"钱信忠为卫生部部长。"},{"type":"paragraph","text":"荣高棠为国家体委副主任。"},{"type":"paragraph","text":"陶铸还宣布派出南下工作队的决定，分赴华东、中南、西南，要求25日前到达目的地，并发给工作队员几篇由刘少奇指定的文件。这些文件包括王任重给湖北省委的一封信。(信中提出“枪打出头鸟”反动理论。)"},{"type":"paragraph","text":"七月十六日"},{"type":"paragraph","text":"在中宣部斗争阎王姚溱大会上，陶铸公然表扬彭真的死党许立群说：“他有悔过之心”，“还有点想革命的要求”，加以保护。"},{"type":"paragraph","text":"七月中旬"},{"type":"paragraph","text":"陶铸根据王任重的提议，刘少奇的批准，肯定“刘仰峤不是黑帮”，指示何伟“保护刘仰峤过关”。于是刘仰峤离京他去。"},{"type":"paragraph","text":"七月十八日"},{"type":"paragraph","text":"毛主席回到北京，对派工作组的作法作了批判。"},{"type":"paragraph","text":"七月十九日"},{"type":"paragraph","text":"陶铸手下大将张平化主持中宣部几十人参加的“声讨”周扬的“大会”，这个“大会”是贯彻执行刘少奇关于周扬问题三点指示的杰作。"},{"type":"paragraph","text":"七月二十日"},{"type":"paragraph","text":"陶铸布置南下工作队员学习刘少奇关于教育问题的讲话及王任重“枪打出头鸟”的黑提纲，并要成立一个教育组，要求在一个月内系统地提出大、中、小学教育改革方案。"},{"type":"paragraph","text":"七月下旬"},{"type":"paragraph","text":"中央文革小组根据毛主席指示，决定撤销工作组。陶铸急忙将南下工作队改为“观察员”，后又将“观察员”改为“联络员”。在此期间，中宣部揭发李剑白(工作组副组长)错误之后，陶铸仍派李率领变相工作组到教育部执行任务。"},{"type":"paragraph","text":"七月三十日"},{"type":"paragraph","text":"陶铸在人大会堂万人大会上讲话，公开为张际春和坏工作组开脱，说“老革命碰到新问题”。甚至说工作组有的单位“不派不行”。"},{"type":"paragraph","text":"八月二日"},{"type":"paragraph","text":"陶铸陪邓小平到人民大学，邓说“要选定目标......”陶铸跟着说“辩论就是选目标嘛！”阻止人大革命师生的革命行动。"},{"type":"paragraph","text":"八月四日"},{"type":"paragraph","text":"陶铸授命中宣部副部长刘祖春到教育部讲话，把数百革命群众打成“反革命”。陶铸一直认为“刘祖春的讲话基本上是正确的，精神是好的”，拒不为革命群众平反。"},{"type":"paragraph","text":"八月六日"},{"type":"paragraph","text":"陶铸以联络员形式派出变相工作组去新华社、人民日报、广播局、学部等单位。"},{"type":"paragraph","text":"八月十四日"},{"type":"paragraph","text":"陶铸与邓小平接见人大文革筹委会，二人串通一气，把保郭(郭影秋)派种种错误作法说成是有阶级感情，说郭是二、三类干部，是人民内部矛盾。"},{"type":"paragraph","text":"八月十五日"},{"type":"paragraph","text":"陶铸把被群众罢了官的张际春和中宣部工作组组长臧剑秋塞进中宣部文革。"},{"type":"paragraph","text":"八月二十日"},{"type":"paragraph","text":"陶铸到中央组织部讲话，要革命群众不要把安子文反革命修正主义集团分子“都打成黑帮分子，那样安子文就不孤立了，不要揪得太多，不要人人自危”。同日，陶铸接见西安交大同学代表，说交大同学静坐示威是“伟大的创举”。这句话传到西安后，陶铸又托秘书打电话给西北局，加以否认。"},{"type":"paragraph","text":"八月二十一日"},{"type":"paragraph","text":"陶铸在人大辩论会上保护郭影秋，说“郭影秋就现有的材料来看，现在不是黑帮。”要求把郭的问题放下来。"},{"type":"paragraph","text":"八月二十五日"},{"type":"paragraph","text":"陶铸接见中南地区赴京同学时，为湖南省委代理第一书记王延春和王任重开脱，说“我这中南局第一书记刚刚罢官，交给他，不能由王任重同志负责。”"},{"type":"paragraph","text":"九月三日"},{"type":"paragraph","text":"中央组织部革命群众一致要求斗争安子文，陶铸到部决定对安子文不准开大会斗争，并悄悄把安弄走。"},{"type":"paragraph","text":"九月十四日"},{"type":"paragraph","text":"中宣部阮铭同志给陶铸写信，对中宣部运动提出八点意见，其中心是要揭中宣部两条路线斗争的盖子，并批评了陶铸本人。"},{"type":"paragraph","text":"九月十七日"},{"type":"paragraph","text":"陶铸接见广东学习团12位同学，为广东省委及赵紫阳、区梦觉、王兰西、杨康华、李嘉人等(均为省委书记或常委)打保票。说：“我当省委书记近十五年，省委的问题我负有主要责任。”"},{"type":"paragraph","text":"九月二十日"},{"type":"paragraph","text":"陶铸委托熊复会见哲学社会科学学部两支红卫兵代表，传达陶的四点指示，对学部内部的斗争采取折中主义。"},{"type":"paragraph","text":"九月二十二日"},{"type":"paragraph","text":"陶铸否定阮铭14日给他信中的意见，说“中宣部不存在路线、方向问题”，“方向和路线是对的，方法也是对的。”“依靠了左派，斗争了右派。”压制群众揭发批判中宣部资产阶级反动路线，为自己的罪行辩护，还污蔑红卫兵，说“红卫兵有什么了不起，到街上拿八分钱买一个红箍箍戴着。”"},{"type":"paragraph","text":"九月二十三日"},{"type":"paragraph","text":"陶铸批准荣高棠21日提出的不许运动员外出串连的规定。派聂济峰以“顾问”为名去中央组织部执行工作组镇压革命群众的任务。"},{"type":"paragraph","text":"十月六日"},{"type":"paragraph","text":"陶铸在教育部汇报会上，为何伟定框框，说“何伟是方向路线错误，不是黑帮”。“何伟与陆定一没有关系，只有工作关系。”对何伟说：“何伟，你没有反对毛泽东思想嘛！你就不是黑帮。”甚至污蔑革命群众说：“现在就是有人，不把别人打成黑帮不过瘾。”"},{"type":"paragraph","text":"十月十日"},{"type":"paragraph","text":"何伟接受陶铸的指示，在教育部传达陶铸六日的讲话，神气活现地把陶铸对他说的“你不是黑帮”重复了五次。"},{"type":"paragraph","text":"十月二十日"},{"type":"paragraph","text":"陶铸重申中宣部没有路线方向问题的老调，并说“资产阶级反动路线只有50天，十一中全会已经解决了。”"},{"type":"paragraph","text":"十月三十日"},{"type":"paragraph","text":"陶铸接见湖南赴京革命师生和干部代表，包庇张平化，吹捧“湖南工作近两年有进步”“四清搞阶级斗争是坚决的。”“湖南的情况在中南说来是严重的，在全国说来不算严重。”甚至盗用中央名议说“中央还信任张平化，还是让他回去当第一书记”。十一月五日"},{"type":"paragraph","text":"陶铸在中央组织部说：“你们把主要目标对准刘少奇同志、邓小平同志......不对的。”妄想保护刘、邓过关。何伟迫不得已抛出一个假检讨，八日又发表拒绝为被打成“反革命”的革命群众平反声明，十五日陶铸批准他“休养”，让他躲藏起来。"},{"type":"paragraph","text":"十一月十一日"},{"type":"paragraph","text":"陶铸在中南海接见串连革命师生，为周荣鑫打保票，说“现在有些同志不信赖接待站，连秘书长都不信任。“"},{"type":"paragraph","text":"十一月十六日"},{"type":"paragraph","text":"陶铸接见山东省学生代表，当着谭启龙的面要求同学向谭要指示，说谭是“老山东”，“觉悟高”，“执行毛泽东思想路线”，解决问题由谭启龙同志解决。实际上是不让山东革命师生揭发谭启龙与山东省委的问题。"},{"type":"paragraph","text":"在这次讲话中还说“全国二十九个省市，不作内部问题处理的只有两个，一个是黑龙江的李范五，一个是甘肃的汪锋。”"},{"type":"paragraph","text":"十一月十七日"},{"type":"paragraph","text":"陶铸在一次会上说“《红旗》杂志社贴的大字报说中宣部的运动是路线错误，我不同意！”还大骂刘祖春：“教育部是我叫你去的，自动么是路线错误？你这个人不象个共产党员，连旧社会的为人道德也不够！”当即要刘回华北局去，不当中宣部副部长(刘曾于15日在教育部作检查，承认犯了路线错误)就在这一天晚上，刘接见教育部“八一八”红卫兵宣布15日检查无效，说“不符合陶铸同志的指示，当然不符合无产阶级革命路线。”陶铸听了喜笑颜开，也不再提撤刘的职了。"},{"type":"paragraph","text":"十一月二十一日"},{"type":"paragraph","text":"陶铸在中宣部传达中央工作会议精神，胡说刘、邓反动路线主要是“认识问题”，他再次强调中宣部“运动大方向是正确的”，“中宣部有特殊性。”当即引起群众不满，贴出大字报。"},{"type":"paragraph","text":"从十月三十一日以来，中宣部革命同志批判工作组及炮轰文革常委的十几次会，陶铸一次也没参加，秘书处的同志写信给他，批评他的官僚主义，要他听取群众的意见，他非常冷淡。"},{"type":"paragraph","text":"十一月二十二日"},{"type":"paragraph","text":"教育部革命群众因何伟、刘皑风等人破坏中央关于平反指示，揪着刘皑风去见陶铸，等了一天一夜，陶拒不接见，只召见了刘皑风，指示刘“要把党委的旗帜打起来”，进一步镇压革命群众。"},{"type":"paragraph","text":"十一月二十三日"},{"type":"paragraph","text":"陶铸知道革命群众对他21日的讲话不满，急忙派熊复到中宣部传达他的三句话：中宣部在总的方面执行了正确路线；但受到错误路线的一些影响，影响多大可以讨论；工作队李剑白、许以倩在机关事务处执行了资产阶级反动路线。陶铸步步为营，继续顽抗，掩盖他本人执行资产阶级反动路线的罪恶事实，压制群众对资产阶级反动路线的批判。"},{"type":"paragraph","text":"刘皑风到教育部传达陶铸指示，派文办张孟旭到教育部组织领导小组领导运动，并说“何伟有病暂不参加领导小组。”(事实何已出院)继续控制教育部运动，保护何伟。"},{"type":"paragraph","text":"十二月二十七日"},{"type":"paragraph","text":"中宣部部分革命群众贴了一张大字报《和陶铸同志讨论一个问题》，批判了陶铸强调刘、邓反动路线是认识错误而不是立场问题的说法。陶铸大为恐慌，急忙抵赖，把自己的报告提纲给人看，叫人验证，查问有没有录音。并马上发表“声明”，指令中宣部文革把它登在《简报》上和《战斗快报》上。"},{"type":"paragraph","text":"十二月五日"},{"type":"paragraph","text":"陶铸接见江苏赴京代表团，当着江苏省委书记许家屯的面为许开脱说：“省委有进步。”希望同学回去对省委“压力不要太大，压扁了就不行了。”安慰许说：“你们受了一些委屈。”"},{"type":"paragraph","text":"十二月八日"},{"type":"paragraph","text":"陶铸在中宣部被迫表态，说中宣部运动受到反动路线的严重影响，有些地方执行了反动路线。对中宣部三十几位工人被打成“反革命”一事，佯称“不了解情况”。"},{"type":"paragraph","text":"十二月十三日"},{"type":"paragraph","text":"陶铸对卫生系统作报告，洗刷自己和刘邓路线的联系，自封“基本上是无产阶级革命家”。"},{"type":"paragraph","text":"十二月十七日"},{"type":"paragraph","text":"陶铸继续给何伟定调，说：“是不是黑帮，要揭，要批嘛！当然啰，还不象有人说的是黑帮。"},{"type":"paragraph","text":"十二月十九日"},{"type":"paragraph","text":"人民教育出版社李冠英等五同志贴出《陶铸同志贯彻执行的是什么路线》的大字报，打响了对陶铸所执行的资产阶级反动路线的战斗。当天高教出版社某小组贴出大字报，攻击这张革命大字报是“反革命大字报”，一些战斗队写出大幅标语“谁攻击陶铸同志，就是炮打无产阶级司令部，就砸烂它的狗头。”"},{"type":"paragraph","text":"十二月二十日"},{"type":"paragraph","text":"戚本禹同志写信给李冠英等五同志，表示给陶铸同志写大字报是可以的，“说这张大字报(指李冠英等五同志的大字报)‘是反革命’的大字报，并针对着这张大字报说，‘谁反对陶铸同志就砸烂他的狗头’是错误的。有人把写大字报的人说成‘反革命’进行围攻，斗争，甚至要扣押他们更是错误的，任何人都没有权利这样做。”“不允许任何人假借反对炮打无产阶级司令部的名义压制革命。”"},{"type":"paragraph","text":"此后哲学所、教育部、北师大、人大、中宣部等单位群众纷纷贴大字报指出陶铸是执行资产阶级反动路线的新的代表人物。"},{"type":"paragraph","text":"十二月二十一日"},{"type":"paragraph","text":"陶铸接见人大揪郭(影秋)兵团时说，邓小平8月14日在人大讲话是“中间的，我的讲话稍好一些，中间偏左。”"},{"type":"paragraph","text":"陶铸在广播事业局群众大会上的讲话中，还替丁莱夫开脱，说什么丁莱夫最大的问题是不出来革命。"},{"type":"paragraph","text":"十二月二十二日"},{"type":"paragraph","text":"陶铸接见湖南赴京工人代表，为张平化求情。"},{"type":"paragraph","text":"陶铸接见文化单位代表时为肖望东开脱说：肖望东，你是个将军么！(陶还曾说过“肖望东是毛主席派来的。”)"},{"type":"paragraph","text":"十二月二十九日"},{"type":"paragraph","text":"陶铸接见安徽省八.二七革命职工赴京控告团，把李葆华(安徽第一书记)张凯帆(安徽书记处书记)请到会。会上陶铸态度非常不好，到会的职工非常不满。"},{"type":"paragraph","text":"十二月下旬"},{"type":"paragraph","text":"哲学社会科学学部红卫兵联队等单位发起成立了“批判刘、邓路线新代表陶铸联络委员会。”"},{"type":"paragraph","text":"十二月三十日"},{"type":"paragraph","text":"陶铸在中南海接见赴广州专揪王任重革命造反团，对同学揭他的问题大动肝火，甚至高举双手提出“强烈抗议”，陶颠倒黑白，语无伦次，千方百计打击同学，为自己洗刷。"},{"type":"paragraph","text":"六七年元旦"},{"type":"paragraph","text":"陶铸召开宣教部门负责同志会议时说“给我贴大字报，欢迎！我就是这些事嘛，贴一个星期就过去了。”"},{"type":"paragraph","text":"一月三日"},{"type":"paragraph","text":"首都许多单位成立批判陶铸资产阶级反动路线联络委员会或联络站，中宣部贴有对联“过去阎王殿，今日鬼门关”。横额“彻底砸烂”，标语“陶铸是中国最大保皇派”等。"},{"type":"paragraph","text":"一月四日"},{"type":"paragraph","text":"周恩来、陈伯达、康生、江青、王力等同志接见赴广州专揪王任重革命造反团。陈伯达同志肯定同学对陶铸问题“揪得很好”，指出陶铸在中央是“刘、邓路线的忠实执行者”，是中南地区的“后台”，江青同志说陶铸“独断专行”。"},{"type":"paragraph","text":"此后批判陶铸资产阶级反动路线进入高潮。"},{"type":"paragraph","text":"一月十日"},{"type":"paragraph","text":"在人大会堂陈伯达同志说：“陶铸同志是坚决执行了刘、邓资产阶级反动路线，中央、毛主席想挽救他，在十一中全会上，有同志揭穿了这件事，毛主席是知道的，毛主席想挽救他，是知道他执行刘邓路线的，让他过来，没有执行毛主席的无产阶级革命路线，还是继续执行刘邓的资产阶级反动路线，并且推广了。”"},{"type":"paragraph","text":"《陶贼投敌经过》(摘要)"},{"type":"paragraph","text":"1933年5月18日(农历)陶在上海康脑脱路被国民党督察处逮捕。同年9月解往南京宪兵司令部拘留所。34年2月转入南京中央军人监狱。6月27日判无期徒刑。1937年7月，陶在其兄陶自强等人的劝诱下叛变，于7月12日写信给蒋介石，信是陶自强交陈诚，再转交蒋介石。全文如下："},{"type":"paragraph","text":"校长钧鉴：学生过去误入歧途，参加异党，触犯国法。现已觉悟，决定脱离共产党，抛弃以前之错误政治主张，愿为党国出力，参加抗日工作，以赎前愆，伏望宽恕。敬仰钧安，学生陶铸上，7月20日。(原载江苏省无产阶级革命派《东方红简讯》第四期，1967年9月23日)"},{"type":"paragraph","text":"[按]权延赤：《捅陶铸致命一刀的人是谁？—女儿陶斯亮的回忆》《爱我中华》(第一期)一文载：陶铸被整，罪名除“中国最大的保皇派”、“中国第三号走资派”之外，更致命的是“叛徒”。这份材料是由陶铸的亲兄陶自强在陶铸被揪出来以后，专案人员严刑威迫下所写的。陶自强早年与陶铸一同参加革命，同在一起作白区地下工作，又同一时期被捕，在国民党的严刑威胁下叛变。解放前夕，陶自强率县大队起义，后任祁阳中学校长。文革中，又因“被打得受不住”，而写了揭发陶铸也是叛徒的材料，成为江青、康生致陶于死命的有力武器。"},{"type":"paragraph","text":"另有一份在文革中，中央首长对陶铸批判的材料。这是由当时的小报汇集的。录以见横加陶铸的所谓“罪行”。"},{"type":"paragraph","text":"周恩来对陶铸的批判材料"},{"type":"paragraph","text":"批判资产阶级反动路线要把方向指正了，不要把方向指错了。要指向制定反动路线的刘、邓，进一步指向继续执行反动路线的陶铸，进一步指向彭、陆、罗、杨反党集团。"},{"type":"paragraph","text":".................."},{"type":"paragraph","text":"同志们，刚才说你们要批判刘、邓为代表的资产阶级反动路线，现在要批判陶铸同志继续执行的资产阶级反动路线，这是对的。"},{"type":"paragraph","text":"―1967年1月8日接见农林口部分师生和人大红卫兵的讲话"},{"type":"paragraph","text":"......现在地方上许多执行资产阶级反动路线的人，他们把矛盾上交，陶铸给长沙打电话，要三千人来北京，有的买不上票，就打起来了。"},{"type":"paragraph","text":"―1967年1月10日在接见有关单位代表时的讲话"},{"type":"paragraph","text":"京广线的问题是陶铸打电话给省委的。"},{"type":"paragraph","text":"―1967年1月10日在人大会堂接见北京大专院校和第三司令部代表时的讲话"},{"type":"paragraph","text":"我们想向你们谈谈1965年毕业生的工作问题。去年12月7日，陶铸同志接见你们的代表，满口答应你们可以回母校搞革命，这样就给我们出了一个难题，十七、八万未转正的大中毕业生，连同半工半读、半农半读的毕业生，有将近三十万未转正的毕业生。转正的是极少数，只有两、三万人，其他都未转正。要按陶铸的意见办事，二、三十万的毕业生都要离开原工作岗位回母校去，就要转了方向。所以在去年12月有一次我接见你们的代表，就把这件事压下来了，说要重新讨论、重新安排。过了不久，就是在12月30日，有伯达、江青、王力等同志参加的接见武汉、广州专揪王任重代表队的会上，陶铸同志对党、对群众表现了极大的不满情绪。会后，康生同志、江青同志直接批评了陶铸，指出陶铸来京后一直执行了刘、邓路线，十一中全会后又继续执行了刘邓路线，出了许多乱子，刚才所说的这一次，陶铸总暴露了，伯达同志也就直接揭露了他，群众也就很清楚了。陶铸同志来京后任常务书记，后来又任中央常委，现在根据中央的要求、群众的要求，正让他作书面检查。"},{"type":"paragraph","text":"现在陶铸的问题清楚了，你们以前提的问题也就不用压着。"},{"type":"paragraph","text":"........................"},{"type":"paragraph","text":"―1967年1月13日晚接见一九六五年大专学校在京毕业生实习生时的讲话"},{"type":"paragraph","text":"......新的课题在我们面前，我们要把刘、邓为代表的资产阶级反动路线以及后来陶铸执行的资产阶级反动路线批倒批臭！"},{"type":"paragraph","text":"―1967年1月17日晚在接见首都大中学校和中央各机关革命造反派的讲话"},{"type":"paragraph","text":"抓革命，促生产，粉碎资产阶级反动路线的新反扑，以前是刘邓，后来是陶铸推行的路线。"},{"type":"paragraph","text":"―1967年1月18日晚在人民大会堂的讲话"},{"type":"paragraph","text":"现在各地党内一小撮走资本主义道路的当权派玩弄经济主义，有一种恶劣的手法，就是发钱、发粮票、发车票，把矛盾上交，逃避群众对他们的斗争。中央的陶铸，文化部的萧望东，总工会的马纯古，劳动部的郗占元，也采取了发钱、发粮票，为了收买人心，对中央施加压力，鼓励小学教员、合同工、上山下乡知识青年来京。"},{"type":"paragraph","text":"―1967年1月22日在北京人民大会堂召开的各地来京群众大会上的讲话"},{"type":"paragraph","text":"......在十一中全会选举后，在中南海国务院门口出了陶铸的大字报，那时我的责任是说明啊，出了第四号人物，我说不要这样提，错误是有的，但是要相信他。十一中全会刚选出，你能不相信“陶铸同志”！那个时候还叫“陶铸同志”了，我没有根据嘛。后来逐渐发现一些问题，感到不对头了，越发现问题越多嘛，一直到了......特别是到了，我们年底内部批评他，主席还谆谆告诫他，还感到他给主席写了一封信，毛主席批了，我们看了。今年一月二日，对武汉赴广州同学还盛气凌人，那些话等于不满，我们是批评了他的，他那个牢骚，当时我们每个人都感到不大对头，还没有看到他的......(缺字——编者)那时我们在三个附中里等着，也想帮助，如果揪他的话，还要出来解释，即从中南海抓出来总不好嘛！他承认了一个错误才解了围。他开始时还提抗议，后来他说抗议错误了。对这样的人我们一步一步地认识嘛！"},{"type":"paragraph","text":"―1967年1月22日在人民大会堂小礼堂与首都部分院校师生的讲话"},{"type":"paragraph","text":"不要不分青红皂白，反对一切，排斥一切，打倒一切。陶铸的错误之一就是他在接见中南地区学生的一次会上说，除了主席和林副主席以外，都可以怀疑，表面上看，好象他说的也对，尊重毛主席，实际上是孤立毛主席和林副主席。这句话是不许可的，不能绝对化，领导干部还要一分为二，还是有好的。"},{"type":"paragraph","text":"―1967年2月1日接见工交系统革命造反派代表时的讲话"},{"type":"paragraph","text":"十一中全会以后，也存在否定一切的思想，各单位尤其是工交系统也是“长字号”靠边站。这思想来源于陶铸。当时陶铸就说：“除了毛主席、林彪同志不能怀疑，其余都可以怀疑。”实际上是把毛主席、林副主席孤立起来了。"},{"type":"paragraph","text":"―1967年3月21日在中南海小礼堂接见财贸口各单位代表时的讲话"},{"type":"paragraph","text":"这倒是陶铸思想啦！交印倒是象陶铸办的。陶铸在广东省也是这样做的。广东省赵紫阳就是这样签字交权的。"},{"type":"paragraph","text":"......中央各部是中央的政权，是国务院的，怎么把党组、党委的权让出去了呢？这无论如何是不能容许的，你这个思想是陶铸的。党委靠边站，我就没听说过。"},{"type":"paragraph","text":"......陶铸这是让了权，不是夺权。陶铸就是从怀疑一切走到了取消一切。陶铸的思想是有根的，陶铸召开的元旦会议，我以前一直不知道，今天才知道。陶铸召开这个会事先没有和我说过，你们要好好把陶铸的思想肃清一下。"},{"type":"paragraph","text":"......陶铸让党委靠边，这是今天的新发现，陶铸总是朝令夕改。"},{"type":"paragraph","text":"......卫生部去年6、7月份是刘、邓资产阶级反动路线，后来陶铸的反动路线就更厉害啦！8、9、10、11、12，有5个月时间，这么长时间文教口不能不有很大影响。7个月的反动路线影响很大，在3个月内一下都肃清，是不容易的。"},{"type":"paragraph","text":"......对资产阶级反动路线也要分轻重，......部门也是这样。当然有的部也执行的很严重。文教口陶铸管了5个多月了，影响很深。"},{"type":"paragraph","text":"......十一中全会后，各口还没有肃清陶铸到处说的怀疑一切。除了毛主席和林彪副主席以外，其他都可以怀疑，这不是把毛主席和林副主席孤立起来了吗？"},{"type":"paragraph","text":"......应当很好地批判。不要否定一切、排斥一切，这是宗派思想，打击别人，抬高自己。"},{"type":"paragraph","text":"―1967年3月24日接见卫生部群众组织代表和领导干部时的谈话"},{"type":"paragraph","text":"广东的盖子揭得很晚，是陶铸阻挡的。本来有人想在中央十月工作会议以后承认犯了反动路线的错误，陶铸说中南系统好象总是有点不同，顶多说一个方向性错误吧。总是拖住。在十一中全会后的八、九两个月，陶铸、王任重打招呼的事那就多了。那个时候，一个是中央政治局常委，一个是中南局书记嘛，当然有些话是不会不受影响的。他们的电话也特别多，当然有些公的，有些私的，他的电话也很难分它是公还是私了。(笑声)因为当时我们有分工嘛，我管北京、中央，还有很多工作，才开始嘛！各省都让他打了，出的乱子也就多了。"},{"type":"paragraph","text":"........................"},{"type":"paragraph","text":"矛头要直接指向刘、邓、陶。刘、邓是党内最大的走资本主义道路当权派，联系到中南、广东，当然就联系到陶铸，陶铸底下还有赵紫阳他们几个人。结合到本地，陶铸也算本地，半本地了。所以要指向刘、邓，因为刘是最大的，要系统地批判。......那末在广东来说，当然必须结合到陶、赵这些人，也要结合本单位、本机关、本学校的斗、批、改。"},{"type":"paragraph","text":"........................"},{"type":"paragraph","text":"看广东的阶级斗争盖子，象陶、赵这样的，在广东是头号的，问题确实还没有认真的揭发出来，还停留在口号上，认真地揭发还有更多的可以揭发的，还要警惕他们的阴谋。"},{"type":"paragraph","text":"........................"},{"type":"paragraph","text":"至于暗流倒是值得注意的，就是我刚才指出的，资本主义复辟的两个暗流。一个是并没有被彻底批判的领导广东十五、六年的陶、赵这个暗流，另外一个就是地方主义复辟的暗流。这两股暗流倒值得注意。"},{"type":"paragraph","text":"―1967年4月18日在广州各革命群众组织代表座谈会上的讲话"},{"type":"paragraph","text":"(周总理问军艺《星火燎原》代表：)你们搞文艺的，陶铸那样的两篇文章，你们读了没有？(答：没有。)所以说你们一直叫喊打倒刘、邓、陶，不读东西，没有原料。要好好读东西，与本单位的斗、批、改结合起来。―1967年5月18日接见部队院校斗罗筹备处核心组与军艺《星火燎原》代表时的讲话"},{"type":"paragraph","text":"康生同志讲到“贺希明、霍泛的材料你们可以调查研究，中央今天正式告诉你们，贺是混入党内的高级特务，是李宗仁的红人”后，周总理说：“上次会议揭发贺时，他不敢抬头(康生：他是军级政治部主任)他还是陶铸支持的，把他带到广东，我很熟悉他，但不知他这么坏”。"},{"type":"paragraph","text":"―1967年6月29日在人民大会堂小礼堂第四次接见广西代表的讲话"},{"type":"paragraph","text":"湖南问题不统一慢慢会统一的，你们要牢牢掌握斗争的大方向，全国有刘、邓，中南有陶、王，湖南也有嘛。"},{"type":"paragraph","text":"―1967年7月19日第二次接见湖南双方代表时的讲话"},{"type":"paragraph","text":"陈伯达对陶铸的批判材料"},{"type":"paragraph","text":"陶铸同志到中央来，并没有执行以毛主席为代表的无产阶级革命路线，实际上是刘、邓路线的坚决执行者！刘、邓路线的推广，同他是有关系的。他想洗刷这一点，但洗刷不掉。后来变本加厉！比如你们到中南局去，你们了解了很多情况，的确是有后台的！这个后台老板就是陶铸。他在北京接见你们那个态度是完全错误的！(指六六年十二月三十日晚在中南海小礼堂回答“赴广州专揪王任重革命造反团”问题会议)他是文化革命小组的顾问，但对文化革命问题从来未跟我们商量过，他独......(江青插话：独断专行)他独断专行，他不但背着文革小组，而且背着中央！你们反映的情况是很好的，给我们很多支持！感谢你们！"},{"type":"paragraph","text":"―1967年1月4日在人民大会堂接见“赴广州专揪王任重革命造反团”的讲话"},{"type":"paragraph","text":"那个时候有一些人到这里来，我说，马列主义研究院有人到这里来，我说你们是当学生的，只能学习，后来听说又当成中央工作组看待了，我就发了很大脾气。"},{"type":"paragraph","text":"......马列主义研究院来的人，我也不认得他，我只是说你马列主义研究院停课，根本没有教课。他们到处学习学习，那么到新华社也是一种学习，可以派些人来。"},{"type":"paragraph","text":"......给大家声明一下：过去如果你们这里有什么中央工作组，这是一个假的。根本没有这样一个工作组。......"},{"type":"paragraph","text":"陈伯达同志的秘书插话：后来伯达同志要离开北京，他又请示，他说到新华社的那些同志和谁联系？向谁汇报工作？伯达同志说：“给谁也不要汇报工作，和谁也不要联系，就到那里学习就行了。你们在这研究院里没事，刚毕业的大学生，只能到那里去学习，当小学生。”经过就是这样的，到后来就成了工作组了，后来科学院在人民大会堂开万人大会的时候，陶铸当时就跟伯达同志说，你也派了工作组——新华社工作组，我当时听了非常生气，因为这件事是我经手的，经过就是这样的，他一定要说是工作组(伯达插话说：“而且是中央工作组。”)后来谢平仄犯了错误，新华社同志写了封信，后来伯达同志发现了，看了这封信以后非常生气，后来给康老看了，说哪里是工作组！谢平仄是什么人？(伯达说：“这个人我根本不认识他，没有见过面。”)当时叫我给赵某某打电话查这个人是什么人，根本不了解这个人，谁叫他当工作组组长的，后来说马上把他撤回去，撤回去检讨，后来把在新华社的马列学院所有同志都撤回去。他们在这闯了祸，事情经过就这样。刚才同志们还一再强调是工作组，实际上不是工作组，陶铸一直也强调这是工作组。(群众：“这是栽害伯达同志！”这是个阴谋！(群众：“这是阴谋！”)伯达接着说：我在这里就没派过工作组就是了，如果有，是假的就是了。......"},{"type":"paragraph","text":"......从新的中央宣传部陶铸同志接管宣传部以后，就接管了新华社，这个新华社在他接管下边，搞了很多非常之糟糕的事情，同党的十一中全会相对立的一些照片，明明把中央所批判的以刘、邓为代表的资产阶级反动路线这样一些代表人跟我们伟大领袖毛主席凑在一起，硬要凑在一起，有好几次。你们今天这张，只是其中一张，刚才有个同志递了个条子，才可笑哩，说有一张邓小平的照片，身子是陈毅同志的，头是邓小平的。(笑声)这么凑的！就是想各种办法要在他所操纵的新华社发表的消息，发表的相片和电影，把刘、邓美化，这些算是什么东西？是什么性质的？(众：“反党！”)由你们判断，是不是呀？(群众呼口号：“打倒陶铸！”“打倒中国最大的保皇派陶铸！”“敬爱的毛主席万岁！”)从文化大革命以来半年了，看我们全国的群众，觉悟得很快，进步很快，你们也一样，这两个传单就说明了这个问题。你们不肯受蒙蔽，不肯受欺骗，揭露了这么一种阴谋，能够识别它、识别这种......(江青插话：“恶劣的”。)极端恶劣的手法，揭发这种阴谋，揭发这种极端卑劣的手法，这是一种很好的现象，这是我们党、毛主席所提倡的实事求是的传统。揭露这种阴谋、这种歪曲。我们党的以毛主席为代表的我们的革命的传统，实事求是的传统，科学的传统，尊重事实的传统。有人在这个文化大革命当中，想把这个传统抛弃掉，想篡改这个传统，这是很清楚的嘛！这些图片，就是很清楚的嘛！还有电影(戚本禹插话：“还有些电影，我把情况说一说吧！主席接见几次，拍了一些电影，这些电影在审查时，发现他们在拍的电影当中，他们突出刘、邓，把刘少奇、邓小平的画面搞得很大，形象搞得那大，当时，江青同志、伯达同志指出了这个问题，后来才不得已作了修改”。)所以，我们看的很清楚，以毛主席为代表的无产阶级革命路线和资产阶级反动路线，在新华新这个斗争是很激烈的。在一切文艺界斗争是很激烈的。现在还是很激烈的。你们挺身而出，来揭露这些事实，我们感谢你们！(掌声)至少使我增长了许多知识，识别资产阶级反动路线是怎样搞阴谋。这些照片你们还有一些，还可以找出来，作为教育的材料，作为反面材料。"},{"type":"paragraph","text":"―1967年1月7日在新华社的讲话"},{"type":"paragraph","text":"严重的阶级斗争在我们面前，我们要消灭阶级敌人。敌人不向无产阶级投降，就叫他灭亡。不要以为没有斗争了，我们还要斗争。有一小撮人搞阴谋诡计，想破坏无产阶级文化大革命，想推翻社会主义制度。有些人被揭露了，打倒陶铸，我给武汉某某造反团谈话说，陶铸在刘、邓路线推行时是坚决执行刘、邓路线的。中央，毛主席想挽救他，特别是在十一中全会中有的同志揭发陶铸执行刘、邓路线这件事，揭穿这件事，中央、毛主席是知道他执行刘、邓路线的，想挽救他，叫他过来。可是十一中全会后，没有过来，没有执行毛主席的无产阶级革命路线，也还是继续执行刘、邓资产阶级反动路线，他和王任重领导着中南局，出现了许多事件，是典型的反动事件。在武汉逮捕了大批群众，相当大规模地逮捕群众，逮捕革命群众在其它地方还没有发现过，我们想帮助他，帮助陶铸同志，但他没有转过来。他的世界观，他的思想不能接受毛泽东思想，因为他是资产阶级的世界观，他坚持资产阶级世界观，他就不可能接受无产阶级世界观。我们在中央文革小组批评他，在常委批评他，但没有能够触及他的灵魂，是否帮助他不够呢？他自己认为是这样，我们认为是认真帮助过他，在十一中全会前就批评过他，希望他执行毛主席的路线。当然，我们说的婉转些，十一中全会以后，他继续闹，我们就公开摊牌了，他说“公开摊牌好，不然，我就不安了。”他说是这么说，做还是那么做，他仍然照他的轨道前进，街上这么多的大字报，打倒陶铸，这是不是文革小组的过错，是不是我陈伯达的过错？后来他自己写过一封信，有一句话——咎由自取。对党中央、毛主席写这样的信，不是那么合适，但事实上倒真是咎由自取，他自己要这样嘛！所以对资产阶级的代表人物也不以自己意志为转移，他转来转去，最后还是转到他的路上去，我们帮助也帮不上。是否除陶铸以外，就没有其他人了呢？恐怕还有个把吧！我们根据毛主席的“惩前毖后、治病救人”的方针办事，但有的病不能治了，的确不能治了。陶铸从八届十一中全会就表演，这几个月表演得够瞧的了。当然陶铸在大街上有那么多标语，有群众的压力，或许可能好一点吧，看看！这些人在资产阶级民主革命时，跑到我们党内来，也许资产阶级民主革命他可以过关，但到了社会主义革命就过不了，《人民日报》写过一篇社论，我们社会主义要经过好多阶段，推翻了国民党，没收官僚资本的关过了，没收官僚资本变成社会主义企业的关他过了，三反五反他也马马虎虎过关了，反右派、公私合营、三大改造也马马虎虎过关了，五七年反右斗争因为没反到他头上，他也马马虎虎过关了，五九年反彭德怀，不是直接反对他，他也马马虎虎过关了，社会主义革命，毛主席告诉我们，是长时间的，几十年，甚至几百年，因为消灭一切剥削制度，不可能设想很快就没有斗争了，剥削阶级总是企图死灰复燃，事实上，资本主义因素在我们国家是存在的，在思想这个问题上影响是很深的，不能低估，到了无产阶级文化大革命，这个时候，社会主义这个大关，很多人、相当多的人就过不了。当然，相当多也还是一小撮(江青插话：七亿人口中就是有三千万也还是一小撮！)"},{"type":"paragraph","text":"―1967年1月10日在人民大会堂西小礼堂接见有关代表的讲话"},{"type":"paragraph","text":"《人民日报》有些社论不是我主持搞的，有的我是不同意的。一论抓革命、促生产的社论是我主持搞的。二论抓革命、促生产不是我主持搞的，是陶铸主持的。"},{"type":"paragraph","text":"......在后来我没有管《人民日报》的一段长时间内，唐平铸是跑到陶铸那里去了，实际上是陶铸在管。唐平铸表面上是要我管，说：“你还是管《人民日报》吧！你不能不管呀！”陶铸也是表面上要我管《人民日报》，实际上没有让我管，我也没管。"},{"type":"paragraph","text":"......(王力、关锋同志插话：《人民日报》有两条路线，一条是陈伯达同志执行的以毛主席为代表的革命路线，一条是陶铸、唐平铸执行的以刘、邓为代表的资产阶级反动路线，冲到报社来的学生也看出来了。)"},{"type":"paragraph","text":"―1967年1月17日在《人民日报》全体大会上的讲话"},{"type":"paragraph","text":"在这个运动中，从中跳出了资产阶级反动路线代表人物大头目刘少奇、邓小平、陶铸，这也是在无产阶级文化大革命夺权的斗争中跳出来的。"},{"type":"paragraph","text":"―1967年1月18日在人民大会堂小礼堂召开的"},{"type":"paragraph","text":"厂矿企业革命造反派工人座谈会上的讲话"},{"type":"paragraph","text":"陶铸是革命群众揪出来的，我们支持。"},{"type":"paragraph","text":"―1967年4月7日在参观首都红卫兵成果展览会时的讲话"},{"type":"paragraph","text":"邓小平、陶铸都可以批判。毛主席许多文章是在斗争中写的。只有在斗争中才能出马克思主义，出毛泽东思想。要批判刘、邓、陶不断提高斗争水平。"},{"type":"paragraph","text":"―1967年7月15日晚在接见首都革命造反派会议上的讲话"},{"type":"paragraph","text":"康生对陶铸的批判材料同志们："},{"type":"paragraph","text":"把材料整理出来，有材料摆出来了，你们就胜利了。"},{"type":"paragraph","text":"―1967年1月4日在人民大会堂接见“赴广州专揪王任重革命造反团”时的讲话。"},{"type":"paragraph","text":"关于陶铸，我讲几句话。伯达同志讲了，他坚持资产阶级反动路线，继续推广刘、邓反动路线，这不是偶然的。在文革小组、中央常委面前、毛主席面前都几次帮助他，批评他，他都采取两面派。有时很“左”，实际是形“左”实右。"},{"type":"paragraph","text":"建国以后，我们党进行了三次大的斗争。一次是同高、饶反党集团的斗争，一次是同彭、黄、张、周的斗争，一次是同彭、陆、罗、杨的斗争。陶铸在高、饶的问题上犯过错误，他在中央工作会议上做过检讨，第一次是没有过关的。第二次勉强过关。你们检查一下《羊城晚报》、《广州日报》也好。他们怎么对待毛主席、对待文化大革命的。周扬的侄子周立波写了《韶山的节日》，是大毒草，就登在《羊城晚报》上，并且还第二次发表。再比如，去年四月十六日，彭真弄了个假把戏，搞“三家村”，《北京日报》作了按语，中央立即通知全国各地不准登载，但隔两个礼拜，广州报纸全篇登了，他是反对彭真，还是拥护彭真？王任重那一套就是陶铸那一套。姚文元的文章全国各省都登，就是陶铸领导的湖南省委没有登。因此，我们宣布陶铸的问题不是仓促的。在常委，在文革小组，批评他，他与李富春、李先念的性质是不同的。......"},{"type":"paragraph","text":"―1967年1月10日在人民大会堂西小礼堂接见有关代表的讲话"},{"type":"paragraph","text":"陶铸问题并非偶然，主席屡教他不改。陶铸拥护高岗。广州文革是陶铸领导，《羊城晚报》登“毛主席回韶山”(疑为《韶山的节日》——原编者)，这是周扬的儿子(疑为“侄子”——原编者)写的大毒草，后觉不好，但又重登。去年四月十六日，《北京日报》批三家村按语，发表后，全国不登，《羊城晚报》全文登。姚文元文章全国登，独湖南没登。陶铸耍滑头，两面三刀，拥护彭真是明显的。"},{"type":"paragraph","text":"―1967年1月13日在接见广州大专院校红卫兵革命造反总司令部驻联络站的讲话"},{"type":"paragraph","text":"河南武斗不是停止了，而是一天天地发展，有军区的某些人在我们面前玩两面派手腕，还在煽动群众，同志们从这个地方，可以懂得什么叫陶铸，什么叫王任重，那些坚持执行，坚决拥护陶、王的人，象文敏生、赵文甫等人，从这里可以看出，你们拥护的是什么首长，他是什么结果。"},{"type":"paragraph","text":"同志们要注意国家大事，脑子里有敌情，有阶级，有敌情。陶铸、王任重不是死老虎，陶铸、王任重还把手伸向河南，他们的黑爪牙是省委内一小撮走资本主义道路的当权派文敏生、赵文甫等。"},{"type":"paragraph","text":"河南是受武汉军区领导的，过去是受中南局陶铸、王任重领导的。"},{"type":"paragraph","text":"―1967年7月21日接见河南各方代表时的讲话"},{"type":"paragraph","text":"谢富治对陶铸的批判材料"},{"type":"paragraph","text":"我们要打倒刘、邓的，陶铸的反动路线，......"},{"type":"paragraph","text":"1967年1月17日在接见北京政法学院政法公社、北京市公安局革命造反派时的讲话"},{"type":"paragraph","text":"搞革命，搞什么？主要要批判党内最大的走资本主义道路的当权派，中国的赫鲁晓夫刘少奇、邓小平、陶铸。"},{"type":"paragraph","text":"―1967年4月10日在接见首都工代会全体委员时的讲话"},{"type":"paragraph","text":"大海航行靠舵手，要沿着毛主席的革命路线走，要针对刘、邓、陶、彭、罗、陆、杨一小撮，彻底革他们的命，这是伟大领袖毛主席的指示，首先要革这一小撮。"},{"type":"paragraph","text":"―1967年8月1日凌晨接见北京钢铁学院两派代表时的讲话"},{"type":"paragraph","text":"江青对陶铸的批判材料同学们："},{"type":"paragraph","text":"你们回去斗争要注意两条：一条是实事求是，核实材料，才能立于不败之地；二要做艰苦细致的工作，争取多数，不要把敌人看成铁板一块，多数派同学，很多是受蒙骗了，不是不能做工作的，是可以分割的，一定要做细致的工作，这是策略问题，希望大家注意这几点。"},{"type":"paragraph","text":"―1967年1月4日在人民大会堂接见“赴广州专揪王任重革命造反团”时的讲话"},{"type":"paragraph","text":"我们对陶铸善意批评，他耍两面派，他伪造照片。那次会议是康生同志主持的，他对熊复下命令，一定要有一张邓小平的照片，就把陈毅的头弄掉，换上邓小平的头，这是非常恶劣的！这是特务活动！这些说明陈毅不是他们的人。他们还搞了一张把毛主席、刘少奇和宋庆龄拼凑在一起的照片，已经发到了全国。(康生同志：已经传到外国去了！)陶铸、熊复就是这样干的，还有一个人，可能还有。唯独陶铸和熊复这样干的。第三次接见的电影还是违背十一中全会精神的，都是陶铸同志干出来的，肖望东也照办。......他镇压我们小组，和王任重勾结在一起。......肖华同志休息一、二年，刘志坚是第一线的。去年又捞一点资本，从此被指定为中央文革副组长，不过，很隐蔽，但狐狸尾巴还是漏出来了，开始是王任重，后是他，接着是陶铸。"},{"type":"paragraph","text":"我们斗争的锋芒要对准党内走资本主义道路的当权派。对一些说了错话、犯了错误，但认识了，知道了，就不能象对刘、邓那样，也不能象对待陶铸那样对待他们。如果那样，我们国家还能有几个人工作？我们国家很大，你们想一想。我不知道讲清楚了没有？(众：清楚了！)那就好了。......"},{"type":"paragraph","text":"......李富春同志惹了祸，搞了统战部。统战部是李富春同志送了大字报去，才揭开了盖子。现在，有人要鼓动人来搞他，这合理吗？合乎毛泽东思想吗？(众：不！)这些同志在困难时候，是站在毛主席一边，我们就不能把他们当刘、邓、陶那样对待。过去教育你们，对自己的队伍，要分清敌我。现在教育你们，对领导也要分清敌我。"},{"type":"paragraph","text":"―1967年1月10日在人民大会堂西小礼堂接见有关代表的讲话"},{"type":"paragraph","text":"听说文化部来了二十万人，每天还补助七毛(台下有人插话：元旦另补助五毛)，这是陶铸搞的。他们来干什么呀？外地来京的工人，有的是来京告状的，有的是受骗来的，总工会、劳动部向全国发了通知来北京开会。"},{"type":"paragraph","text":"―1967年1月17日接见首都大中学校和中央各机关革命造反派的讲话"},{"type":"paragraph","text":"你们对那么大的刘、邓、陶不感兴趣了。贴自己人的大字报，这是亲者痛，仇者快。"},{"type":"paragraph","text":"―1967年1月22日在人民大会堂福建厅接见三司代表时的讲话"},{"type":"paragraph","text":"现在我们队伍中有分化，有些人态度很不明确，“怀疑一切”的口号是反动的，是陶铸搞的。"},{"type":"paragraph","text":"―1967年1月23日在人民大会堂的讲话"},{"type":"paragraph","text":"主席三次接见红卫兵的影片是完全违背了十一中全会的精神，美化刘、邓、陶。(戚本禹同志插话：这完全是陶铸安排的。)"},{"type":"paragraph","text":"........................"},{"type":"paragraph","text":"你们回去能否把一、二、三次主席接见红卫兵影片中刘、邓、陶的镜头剪掉，关于这方面我每次和赵辛初斗争得很厉害，我对赵辛初说，你们那个部(文化部)岂有此理，完全是刘、邓、陶的，要好好斗他，把斗的家伙统统斗倒。"},{"type":"paragraph","text":"肖望东为什么不斗？应该斗，群众要揪肖望东，陶铸把他保护起来，把他搞到旅馆里，搞到医院里，说他有病。但在天安门上却很神气，他身体比我还好，新旧文化部实际上是一个样，文化部那几个副部长都很坏，他们把几个黑帮保护起来，你们不去斗，不去夺权是很危险。"},{"type":"paragraph","text":"―1967年2月1日在接见中央新闻记录电影制片厂"},{"type":"paragraph","text":"和八一电影制片厂革命群众代表时的讲话"},{"type":"paragraph","text":"(伯达、江青等同志参观首都红卫兵战果展览会，有人问：“陶铸有何反映？”)江青同志指示：“主要反映他是反革命两面派，还要批他的两本书(即《理想、情操、精神生活》、《思想、感情、文采》)，他在文教口做的坏事最多。”“(陶铸)改口号、改照片可以反映。”"},{"type":"paragraph","text":"―1967年4月7日参观首都红卫兵战果展览时的指示"},{"type":"paragraph","text":"张春桥对陶铸的批判材料"},{"type":"paragraph","text":"对于同志们知道的安亭事件那个事情，他们传达了谁的指示呢？传达陶铸的指示，因为曹荻秋就是跟陶铸打电话，陶就给说了，就是那种口气吧：“张春桥同志既然已经承认了嘛，那就只好这样，再继续工作吧！再把它改过来吧！”就是这样，那曹荻秋就是根据这个来办事的，他就执行陶铸的。"},{"type":"paragraph","text":"―1967年2月24日在上海革命广场对革命群众的讲话"},{"type":"paragraph","text":"现在提出“打倒一切、怀疑一切”是无政府主义的口号，这是对外讲的，实际上这是反动的口号，是反毛泽东思想的口号。“打倒一切、怀疑一切”是陶铸提出的，在运动一开始我们没有反对它，这是由于在运动开始时起了一定积极作用。在当初姚文元同志曾写过文章，但毛主席说不要发表了，我们也反对当时湖北展开的全面批判这一口号，但是运动发展到现在矛盾基本暴露了，如果再提出打倒一切、怀疑一切的口号，就离开毛主席的路线更远了。"},{"type":"paragraph","text":"―1967年2月25日与华东局革命造反派座谈时的讲话"},{"type":"paragraph","text":"现在造反派有个想法，觉得有些人是死老虎，其实是活老虎，从政治思想上来说，他还是代表，要批判代表人物，刘、邓、陶没有死，彭德怀也没有死。"},{"type":"paragraph","text":"―1967年7月15日在接见首都革命造反派会议上的讲话"},{"type":"paragraph","text":"王力对陶铸的批判材料"},{"type":"paragraph","text":"我们北京的形势也是好得很。北京的形势，特别是在最近这一个时候，一个最重要的特点就是揭露了陶铸，(群众热烈鼓掌，呼口号：打倒陶铸！打倒熊复！......)揭露了他继续忠实地执行刘、邓路线，揭开了这样一个盖子，这个变化特别表现在中央直属机关同宣传文教系统，各个单位把陶铸这个盖子一揭，机关的文化大革命起来了(热烈鼓掌)。过去是一块大石头压着。毛主席指示我们，机关的无产阶级文化大革命是非常重要的。如果仅仅有学生运动、有工人运动、有农民运动，没有机关干部起来积极地投入到这一场无产阶级文化大革命，那是不行的。有好多重要的问题，还是要依靠机关干部来揭露。"},{"type":"paragraph","text":"同志们，《人民日报》、《红旗》杂志元旦社论就是根据毛主席这个思想，提出了机关文化大革命的重要性。现在，我们的革命群众揭露了陶铸的问题，现在机关里，好多重要的机关，我们看了一看，过去冷冷清清，死气沉沉，现在变化了，盖子揭开了，斗争展开了(热烈鼓掌)。什么陶铸呀，什么熊复呀，什么大大小小的人物呀，那些继续最顽固地坚持这个资产阶级反动路线的人，统统被揭露了。陶铸么，在刘、邓占统治地位的时候，他就是忠实执行刘、邓路线的，他的屁股就是坐在那一边，在几个重大问题上——在什么派工作组的问题上，在要把人家，把革命群众打成反革命的问题上，在什么所谓恢复党团组织这样的问题上，就是执行的刘、邓路线。而在刘、邓被揭露了，刘、邓路线被批判了，刘少奇、邓小平一边站了，陶铸成了继续执行刘、邓路线的人，千方百计地阻止对刘、邓路线的批判，千方百计地阻挠这个批判，继续压制革命。特别是工人运动、农民运动起来了，他就更沉不住气了，千方百计地压制工人运动和农民运动。"},{"type":"paragraph","text":"工人运动和农民运动刚起来的时候，这种形势本来是好得很，可是他觉得不得了喽，一定要把它压下去。凡是他领导的单位，凡是他过问的单位，以毛主席为代表的无产阶级革命路线就不能够得到贯彻，就要继续执行他的那一套。他的一套是什么东西呢？是什么货色呢？它是刘、邓的资产阶级反动路线。当《红旗》杂志提出彻底批判资产阶级反动路线，而已经变成一个全国的、群众性的批判资产阶级反动路线的运动的时候，这个陶铸，他还是反对提资产阶级反动路线，连这个词，他也反对(群众呼口号：打倒刘、邓路线的忠实执行者陶铸！打倒最大的保皇派陶铸！打倒陶铸！打倒！打倒！)"},{"type":"paragraph","text":"在你们的新华社搞的一套是什么东西呀，什么照片一定要把邓小平的脑袋搬到陈毅同志的身子上，就光这一条，叫做什么货色呢？很恶劣！在机关彻底的批判陶铸这一套，这对机关的无产阶级文化大革命起了很大的作用。现在我们看很多机关都出现了这样一个很好的形势，我们觉得机关的这一个无产阶级文化大革命这样轰轰烈烈地开展，而且根据毛主席决定广播的这个《文汇报》、《解放日报》所发表的和登载的《告上海全市人民书》是一个榜样。经过这样揭盖子，经过辩论，经过斗争，经过一个发展，我们这些机关一定能够掌握在毛主席的好学生的手里(热烈鼓掌)。那么一些坏家伙，请他们滚！滚下台！(鼓掌)当然我们要区别对待，但是我们要相信自己，相信坚定的无产阶级革命派。我们自己一定能够掌握我们自己的命运，一定能够把所有的事情办好！办得比他们好！(群众热烈鼓掌，呼口号：“打倒刘、邓路线忠实执行者陶铸！”“陶铸从中央滚出去！”“打倒陶铸！”)"},{"type":"paragraph","text":"―1967年1月9日在新华社群众大会上的讲话"},{"type":"paragraph","text":"陶铸这个人很坏，上次他到你们这里来讲话，是听到了我们(中央文革)的一点风声。他跟我们一块开会，开了一半就慌忙地跑了。说他有事，原来他是跑到你们这里来了。陶铸是以前直接掌握你们这里的，陶铸要打倒。"},{"type":"paragraph","text":"―1967年1月11日晚接见广播局毛泽东思想战斗团；"},{"type":"paragraph","text":"毛泽东思想宣传小组代表的讲话"},{"type":"paragraph","text":"资产阶级反动路线，......毛主席的大字报8月5日就提了嘛......10月3日《红旗》社论十三期一发表......有那么一些人反对，......其中有一位就是陶铸，他就不赞成，他就说是你不能叫，他就反对提资产阶级反动路线。在中央工作会议上，他还是反对，反对提资产阶级反动路线。后来他说是因为太仓促。仓促？已经两个月了，怎么突然又仓促啦？毛主席提了两个月了，怎么又仓促了呢......他不光是这两个字儿的争论，他就不让批判刘、邓路线，不许批评工作组，执行资产阶级反动路线的工作组也不许你批评，不给打成反革命的革命同学认真地彻底平反。"},{"type":"paragraph","text":"......同志们调查一下，全国大体上都在那个时候，6月18、20那时，一些中央机关也在那时候，21、22、23、24、25相当普遍、相当多的群众被打成反革命，......而那个时候刘少奇、陶铸要《人民日报》写篇社论叫做“假左派，真反革命”。"},{"type":"paragraph","text":"走资本主义道路当权派，对于学生起来是违反他们意志的，他就起来镇压，而工人起来，他更加不能容忍，工人起来、农民起来他就完蛋，最后被埋葬。因此千方百计进行镇压工人，这是他阶级本性决定了的。在这个问题上陶铸就是一个代表，他就要压，他自己就亲口讲：“工人起来，就把它压下去。”“压下去”是他的口号。......如果是按照陶铸的意志，那就要压工人，不许他组织，不许他们革命。"},{"type":"paragraph","text":"―1967年3月13日在接见归国留学生时的讲话"},{"type":"paragraph","text":"我们要办一张毛泽东思想的报，那就要打倒刘少奇、邓小平、陶铸、李井泉他们那个时候，他们领导的报纸。他们在新闻战线上所散布的修正主义毒素，他们关于新闻工作中的很多谬论，我们要同他们这些谬论相对立。"},{"type":"paragraph","text":"―1967年7月10日在接见《云南日报》无产阶级革命派时的讲话"},{"type":"paragraph","text":"无产阶级专政机构内部还有资产阶级司令部，无产阶级政党内部有走资本主义道路的当权派，因此必须用革命的方法来解决。再不能回到刘、邓、陶、李、阎的秩序上去。要提高这个高度来对待。把刘、邓、陶、李、阎彻底打倒，把他们散布在各个方面的影响彻底肃清，不只是换几个人，一定要从政治上、理论上、政策上、也从组织上把他们搞掉。"},{"type":"paragraph","text":"―1967年7月中旬在昆明二级军区党委联席会议上的讲话"},{"type":"paragraph","text":"关锋对陶铸的批判材料"},{"type":"paragraph","text":"关于王任重同志的问题可以找陶铸同志，他是管中南局的，对王任重比较了解。"},{"type":"paragraph","text":"―1966年11月18日接见毛泽东思想红卫兵"},{"type":"paragraph","text":"武汉地区革命造反司令部赴京代表团谈话"},{"type":"paragraph","text":"要打倒阎王，为什么不可以联合起来，在座的年青同志比较多，在旧阎王殿、新阎王殿你们哪个人当权？电话总机五个人谁当权？总机五个人为人民服务的工作态度是有名的，很好嘛，可是把他们也分成两派，这应该归罪于陶铸，别的不讲，陶铸来到中宣部，不是领导大家打倒阎王，而是相反，搞资产阶级反动路线，打击革命群众。我们为什么不把他套的枷锁丢掉呢？"},{"type":"paragraph","text":"―1967年6月1日接见中宣部工作人员时的讲话"},{"type":"paragraph","text":"今天开会讨论大批判的问题，讨论对党内最大的一小撮走资本主义道路当权派刘少奇、邓小平、陶铸......等人的大批判问题，从政治领域内把他们批倒、批臭，清除他们在各方面的反革命修正主义的影响，大立毛泽东思想。"},{"type":"paragraph","text":"―1967年7月15日在接见首都革命造反派会议上的讲话"},{"type":"paragraph","text":"我们是支持王唯真同志，应该支持他的工作。斗争，应该斗争刘、邓、陶，批判刘少奇的修正主义新闻路线。陶铸直接插手新华社，派熊复搞资产阶级反动路线，为什么不批？两派应该抓这些问题。"},{"type":"paragraph","text":"―1967年7月31日在宣传工作会议上的讲话"},{"type":"paragraph","text":"戚本禹对陶铸的批判材料"},{"type":"paragraph","text":"关于李冠英、钱国屏、齐咏冬、朱岩、刘德珍五位同志给陶铸同志写大字报的问题，我个人认为是可以的。对这张大字报有不同的意见，可以辩论。但是说这张大字报是“反革命”的大字报，并针对着这张大字报说：“谁反对陶铸同志就砸烂他的狗头。”这是错误的。有人把贴大字报的人说成“反革命”，进行围攻、斗争，甚至要扣押他们，更是错误的；任何人都没有权利这样做。"},{"type":"paragraph","text":"反对毛主席、反对林彪同志就是反革命，就是炮打无产阶级司令部。革命的群众必须同反对以毛主席为代表的革命路线的言论和行动进行坚决的斗争。但是，革命的群众也不允许任何人假借反对炮打无产阶级司令部的名义，压制革命。"},{"type":"paragraph","text":"―1966年12月20日给人民教育出版社徐昕等五位同志的信"},{"type":"paragraph","text":"现在机关里也住上人了，不能办公了。这是陶铸搞的鬼，一天还发七毛钱，有阴谋。......现在，连文化部厕所里都住满了人，楼梯都住满了人，这是陶铸搞的。陶铸发的指示，让他们到北京来造反。"},{"type":"paragraph","text":"―1967年1月26日会见小学革命教师时的讲话"},{"type":"paragraph","text":"人民大学的运动，文化革命运动里面的一些问题，今天提出很多的问题来，差不多文化大革命里所碰到的全党、全国、全军内、党内走资本主义道路的当权派，那些重大的事情，你们这里都涉及到了，什么陶铸，什么邓小平，什么刘志坚，什么王任重，都跟你们这里有关系，而且是很多的所谓大人物，都到你们这里来过，什么陶铸，什么邓小平，所以你们这里的任务是艰巨的，也是光荣的。"},{"type":"paragraph","text":"―1967年1月30日在中国人民大学的讲话"},{"type":"paragraph","text":"现在有人想否定《红色娘子军〉、《白毛女》、《沙家浜》......我们就要支持这些新生事物，为之大喊大叫。文化革命要搞出新东西，如果搞完文化大革命，什么都没有了，那还叫什么文化大革命？陶铸就主张文化大革命后，电影、戏剧什么都不演，我们反了他。"},{"type":"paragraph","text":"―1967年4月9日在中央戏剧学院的讲话"},{"type":"paragraph","text":"最近有两个动态值得注意，就是阶级敌人企图从两方面来破坏无产阶级文化大革命，来转移大方向：一是从极“左”方面，一是从右的方面。极“左”方面，不是把矛头针对刘、邓、陶这一小撮走资本主义道路当权派，而是企图用各种流言蜚语打击无产阶级司令部的人，转移斗争矛头，煽动一些人攻击总理，攻击文化革命小组成员。......"},{"type":"paragraph","text":"说中央文革分两派，支持一派，打击一派，搞这一套都是从右的方面来制造混乱的。过去说文化革命小组分两派还可以，因为有陶铸、王任重。现在的成员都是一起战斗过来的，团结是坚强的、坚固的。"},{"type":"paragraph","text":"―1967年6月1日在接见中宣部同志时的讲话"},{"type":"paragraph","text":"批陶问题全国怎样部署？"},{"type":"paragraph","text":"先由广州地区发起，中南各省跟上。将来看批判的情况，听听反应再说。中央目前还没有考虑在全国范围批判。"},{"type":"paragraph","text":"什么时候开始批判？"},{"type":"paragraph","text":"由广州军区决定。......什么时候准备好什么时候批。七月中旬行不行？"},{"type":"paragraph","text":"批陶的要害是什么？重点应放在哪里？"},{"type":"paragraph","text":"可以先从三本书开始，《西行纪谈》、《思想、感情、文采》、《理想、情操、精神生活》，这三本书都是大毒草，流毒甚广。可以从它开始，然后，逐步加深，逐步提高。"},{"type":"paragraph","text":"上海时代中学有个革命小将陆某某，看过三家村的毒草，联系到陶铸的问题，首先写了一张大字报，贴到中宣部，受到迫害死去。报纸上可先发这个革命小将的大字报，广州加按语。"},{"type":"paragraph","text":"批判的角度怎么样？"},{"type":"paragraph","text":"可以作为中南局第一书记来批判，他在广东搞了十几年，就可以从广东先开始。"},{"type":"paragraph","text":"给陶铸戴什么帽子？"},{"type":"paragraph","text":"由广州军区定。想提中南地区最大的走资本主义道路的当权派，没有最后定。"},{"type":"paragraph","text":"批陶的文章由哪里审查？"},{"type":"paragraph","text":"作为地区的批判，可以由军区决定。批判刘少奇的文章，只有两篇是中央审查的，一篇是《爱国主义还是卖国主义？》一篇是《修养的要害是背叛无产阶级专政》。文章要掌握斗争大方向。"},{"type":"paragraph","text":"批判计划由谁定？计划也由军区决定。批陶要发动群众，要打人民战争，陶铸在广东流毒很深，要发动广大群众批，批判对促进大联合、三结合意义很大。"},{"type":"paragraph","text":"―1967年7月11日在接见广东省军管会代表所作关于批陶工作的指示"},{"type":"paragraph","text":"你看关锋很瘦，很辛苦，为什么反他呢？查关锋与谁谁关系，有什么好查？那是黑材料。要敢革敢保，我保他。彭真、陆定一、陶铸搞他。"},{"type":"paragraph","text":"―1967年7月15日晚在接见首都革命造反派会议上的讲话"},{"type":"paragraph","text":"姚文元对陶铸的批判材料"},{"type":"paragraph","text":"这两个东西(指机会主义和无政府主义——编者)都是资产阶级的思潮，资产阶级和一小撮走资本主义道路的当权派，曾经用这么两种武器来反对无产阶级，反对无产阶级文化大革命，可以说是交替使用。我举一个陶铸的例子，陶铸开始镇压群众是镇压得很厉害的，在那个文教口，拼命镇压群众，镇压革命群众，把革命群众打成反革命。后来看了不行了，他这个修正主义路线行不通了，革命群众起来了，他又搞无政府主义，他就提出怀疑一切打倒一切，他还提出过一个什么绝食是一个伟大的创举，这就是陶铸的东西嘛，陶铸这种思想该不该打倒呀！(该！高呼：打倒陶铸！)"},{"type":"paragraph","text":"―1967年5月14日在南京的一次讲话"},{"type":"paragraph","text":"我们知道打倒一切、怀疑一切，主要来自走资本主义道路当权派，象刘少奇、陶铸他们经常搞这一套的，所以要批判，肃清他们的影响。他们这样做的目的，就是要混淆阶级阵线，使我们不能把矛头对准党内走资本主义道路的当权派，使我们不能夺好权，掌好权，不能团结大多数。我们晓得，在阶级阵线越来越分明的时候，打击的矛头应该是越来越集中，而不是越来越扩大。但是，陶铸这些人，他们刚刚相反，搞无政府主义，陶铸是个典型，他开始的时候，就镇压群众，在他那个文教口里面，把群众运动拼命镇压下去，等到后来看看压不下去了，群众起来了，他就搞无政府主义，搞形“左”实右，提出什么文化大革命当中怀疑一切是可以的，还提出什么绝食是伟大的创举。陶铸这一种思想该不该打倒？(众：该打倒！)他那个时候，无非是想把阶级阵线搞乱，所以我们主要的应该把这一些形“左”实右的东西，算在这一些人的账上，但是我们无产阶级革命派，要肃清这种可能有的思想影响。"},{"type":"paragraph","text":"......无政府主义是资产阶级思潮。修正主义和无政府主义有一点是共同的，就是反对无产阶级专政。所以象陶铸这些人，他们可以两手交替使用，有一阵，就镇压，压得非常厉害，有一阵搞无政府主义，因为他们的目的，都是为了反对无产阶级专政。"},{"type":"paragraph","text":"―1967年6月3日在上海市革命委员会报告会上的讲话"}],"authors":["周良霄","顾菊英"],"dates":[{"year":2008}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":18,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"戚本禹","type":"人物"},{"name":"张平化","type":"人物"},{"name":"康生","type":"人物"},{"name":"江青","type":"人物"},{"name":"陈伯达","type":"人物"},{"name":"陶铸","type":"人物"},{"name":"关锋","type":"人物"},{"name":"邓小平","type":"人物"},{"name":"姚文元","type":"人物"},{"name":"王力","type":"人物"},{"name":"张春桥","type":"人物"},{"name":"李富春","type":"人物"},{"name":"王任重","type":"人物"},{"name":"陈毅","type":"人物"},{"name":"刘志坚","type":"人物"},{"name":"文敏生","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"name":"聂元梓","type":"人物"},{"name":"雍文涛","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"唐平铸","type":"人物"},{"name":"曹荻秋","type":"人物"},{"name":"谭启龙","type":"人物"},{"name":"彭真","type":"人物"},{"name":"穆欣","type":"人物"},{"name":"郭影秋","type":"人物"},{"name":"熊复","type":"人物"},{"name":"陆定一","type":"人物"},{"name":"周扬","type":"人物"},{"name":"赵紫阳","type":"人物"},{"name":"彭德怀","type":"人物"},{"name":"中央文革","type":"人物"},{"name":"河南文革","type":"人物"},{"name":"山东文革","type":"人物"},{"name":"湖北文革","type":"人物"},{"name":"湖南文革","type":"人物"},{"name":"安徽文革","type":"人物"},{"name":"江苏文革","type":"人物"},{"name":"广东文革","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"革命委员会","type":"主题/事件"},{"name":"上山下乡","type":"主题/事件"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"人民战争","type":"主题/事件"},{"name":"武斗","type":"主题/事件"},{"name":"人民内部矛盾","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7ba471435d"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
