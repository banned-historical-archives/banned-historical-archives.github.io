art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"邓副总理欢宴蒙代尔副总统和夫人","authors":[],"parts":[{"type":"paragraph","text":"据新华社八月二十六日讯 邓小平副总理今天晚上说：“建交以来，中美关系已经有了可观的发展。”"},{"type":"paragraph","text":"他在欢迎美国副总统蒙代尔和夫人一行的宴会上强调指出：“只要我们双方严格执行中美建交协议的各项原则，尊重彼此的独立主权，在平等互利的基础上处理中美间的具体问题，并且从世界的全局着眼，从长远的政治和战略观点着眼，看待和处理我们共同面临的各种问题，那么，两国关系将肯定会取得不断的发展。”"},{"type":"paragraph","text":"蒙代尔副总统在宴会上致答词时说：“我们现在已经到了这样一个时刻，就是要确保我们在八十年代的关系能够得到充分的发挥。这就是我这次访问的目的。”"},{"type":"paragraph","text":"他说：“所以把我们两国带到一起来的是：我们都想要一个稳定而和平的世界。在这个世界上，独立和多样化的国家为了取得共同的经济进步而彼此合作。我们都反对任何国家统治别国的企图。”"},{"type":"paragraph","text":"宴会在人民大会堂举行。宴会厅里并排悬挂着美利坚合众国国旗和中华人民共和国国旗。"},{"type":"paragraph","text":"晚上七点三十分，蒙代尔副总统和夫人由邓小平、余秋里、耿飚副总理陪同，来到宴会厅。这时，军乐团奏起了迎宾曲。"},{"type":"paragraph","text":"出席宴会的还有我国外交部长黄华，外贸部长李强，水利部长钱正英，文化部长黄镇和夫人，中国驻美国大使柴泽民和夫人等。"},{"type":"paragraph","text":"美国驻中国大使伍德科克和夫人，大使馆外交官员，聘请来中国任教的美籍华人，正在北京访问的美国朋友，也应邀出席了宴会。"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2617a00be5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
