<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"听毛主席的话，决心为建设祖国边疆奋斗终生上海参加新疆建设青年首批今日出发","authors":[],"dates":[{"year":1964,"month":5,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　本市参加新疆建设的社会青年第一批将于今天启程。"},{"type":"paragraph","text":"这几天，在即将出发到边疆去的社会青年的家庭里，洋溢着温暧和亲切的气氛。父母们一遍又一遍地叮嘱即将远行的儿女到新疆去要听党的话，听毛主席的话；要吃得起苦，经得起考验；要有决心在新疆干一辈子。在临行前，有的父母还陪儿女去看革命电影和戏曲，有的给儿女讲家史，有的把自己家里的传家宝送给儿女。控江街道社会青年沈红娟的父亲沈木生在宝山县粮食收购站工作，他知道深红娟快要出发，特地在十七日晚上赶回家，举行了一个家庭会议，给女儿送行。沈红娟的母亲在旧社会里当过童工，做过佣人，她对女儿说:“你今年十九岁，到新疆去参加建设，多么光荣；我十九岁的时候，却在当佣人，做牛马:真是一个天上，一个地下。”沈红娟激动地说:“我一定不辜负党的培养和你们的关怀，我一定要在新疆好好地干一辈子。”"},{"type":"paragraph","text":"很多参加新疆建设的社会青年临行前向自己的亲友、老师和同学告别。江浦街道社会青年吴毓芬前天特地到杨浦区纺织职工子弟中学，向曾经教导过她和鼓励她走上革命道路的老师们告别，班主任秦素珍、大队辅导员陈体津等热情地叮嘱她:好好地听党的话，好好地劳动和学习，在边疆生根、开花、结果。老师们还说，今年应届毕业的同学有很多也将到新疆去，你要为他们作个榜样。社会青年黄桂英昨天下午到老同学胡筱铭家里去告别。分别时，胡筱铭送黄桂英走一段路，两人一边走一边回忆当年同窗的情景。黄桂英谈到，以前在学校里念书，她们两人都曾经在作文中表达了开发祖国自然资源的志愿，现在自己真的要去参加边疆建设工作了。胡筱铭原来也在考虑报名去新疆参加建设的问题，受到老同学的启发和感染，也表示了去新疆的决心，她对黄桂英说:“你先去，我随后就来。”中太和里社会青年张蓉玲和汪琪，感情很好，这次一起报名去新疆参加建设，张蓉玲被录取了，汪琪因为有轻度肺病，没有被录取。昨天张蓉玲来到汪琪家里告别，希望她好好在家里养病，争取早日恢复健康，实现到边疆去的志愿。”"},{"type":"paragraph","text":"有些即将离开上海的社会青年参加了各种有意义的活动，有的请老工人讲解放前的工人斗争史，有的去青年宫参观忆苦思甜展览会，有的去看《自有后来人》等革命电影。宁国街道第二里委会六个第一批去新疆的青年听了杨树浦发电厂老工人姜林根讲述杨树浦发电厂工人斗争史以后，都表示要继承和发扬上海工人阶级光荣的革命传统，为建设祖国边疆奋斗终生。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6c8e6daf93"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
