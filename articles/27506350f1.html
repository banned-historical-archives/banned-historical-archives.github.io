script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"搞好卫生革命　回击右倾翻案风市卫生局在嘉定县召开卫生工作为普及大寨县服务现场会","authors":[],"dates":[{"year":1976,"month":3,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　为了以实际行动回击右倾翻案风，上海市卫生局日前在嘉定县召开了卫生工作为普及大寨县服务的现场会。会议始终以阶级斗争为纲，以无产阶级文化大革命以来，赤脚医生、合作医疗等社会主义新生事物茁壮成长，卫生革命取得很大成绩的大量事实，狠批党内不肯改悔的走资派否定社会主义新生事物的奇谈怪论。"},{"type":"paragraph","text":"各区、县、医学院、部分医院有关负责同志出席会议。"},{"type":"paragraph","text":"到会同志首先参观了嘉定县娄塘公社娄塘大队和安亭公社新径大队。这两个大队坚持把卫生工作纳入农业学大寨运动，大力建设卫生村，搞好粪、水管理，搞好幼托机构的卫生工作，保护了劳动力，为农业学大寨运动贡献了力量。他们的事迹给参观的同志留下了深刻的印象。"},{"type":"paragraph","text":"嘉定县卫生局、娄塘公社党委、娄塘大队党支部、安亭公社新泾大队党支部、普陀区利群医院党支部、赤脚医生孙健康等在会上介绍了他们坚持党的基本路线，发动和依靠群众，深入开展卫生革命，使卫生工作更好地为农业学大寨运动服务，以实际行动回击右倾翻案风的体会。"},{"type":"paragraph","text":"会上，许多同志发言指出，农业生产大干快上，卫生工作也要紧紧跟上。首先必须坚持无产阶级专政下的继续革命，以阶级斗争为纲，批判重城市、轻农村，重医疗、轻预防的修正主义卫生路线的影响和表现，批判资产阶级医疗作风，坚定不移地把医疗卫生工作的重点放到农村去，加速农村卫生建设。要满腔热情地支持社会主义新生事物，加强赤脚医生队伍的建设，巩固发展合作医疗制度，并把卫生工作同三大革命运动实践，同生产和农田建设，同抓意识形态领域里的阶级斗争结合起来，统一纳入农业学大寨的规划。必须坚持贯彻“预防为主”的方针，大力开展以除害灭病为中心，“两管”、“五改”为重点的爱国卫生运动。"},{"type":"paragraph","text":"会议要求各级卫生部门在党委的统一领导下，认真学习大寨大队和昔阳县的根本经验，以阶级斗争为纲，坚定不移地把医疗卫生工作的重点放到农村去。领导干部要带头学习，带头批判修正主义，带头下农村，并总结经验，抓好典型，带领广大医务人员为加速农村卫生建设，普及大寨县而努力奋斗。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"27506350f1"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
