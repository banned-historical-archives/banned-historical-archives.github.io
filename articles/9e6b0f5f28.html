rt":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"古巴出版大量革命著作最近发行毛主席《关于正确处理人民内部矛盾的问题》五万册；很快销售一空","authors":[],"parts":[{"type":"paragraph","text":"据新华社哈瓦那7日电 古巴出版机构最近大批出版了各种书籍，来适应国内文化、理论学习的需要。"},{"type":"paragraph","text":"出版社大量印行了菲德尔·卡斯特罗总理和其他革命领导人的重要讲话和文章，并且用英文、法文和其他文种出版。这些书籍在古巴和拉丁美洲各国迅速销售一空，成了人们学习古巴革命经验的重要材料。被誉为拉丁美洲最明确、最革命的第二个哈瓦那宣言已经连续多次出版。今年印行的二十五万册菲德尔·卡斯特罗的著作《历史将宣判我无罪》己很快售完。各出版社还出版了由古巴革命领导人写的或者由记者和作家在访问革命领导人以后写的关于古巴人民革命斗争故事的文集。"},{"type":"paragraph","text":"为了配合日益高涨的理论学习运动，古巴翻译出版了许多马克思、列宁的著作。马克思的《资本论》第一卷最近已经出版。他的其他著作正在编译中。列宁的一些著作已再版了好几次。最近发行的五万册毛泽东的著作《关于工确处理人民内部矛盾的问题》己很快销售一空。此外还大量进口了马克思和列宁的著作。"}],"alias":""},"tags":[{"name":"人民内部矛盾","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9e6b0f5f28"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
