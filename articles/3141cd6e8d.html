ical-archives/banned-historical-archives0/main/maoquanji49.pdf"],"article":{"title":"在章伯森反映湖南问题报告上的批语","alias":"","parts":[{"type":"paragraph","text":"在章伯森反映湖南问题报告！上的批语"},{"type":"paragraph","text":"（1967年1月27日）总理："},{"type":"paragraph","text":"湖南也应照贵州那样予以处理。章佰森是去年运动初期在省委坚持工作、没有逃跑的唯一省委书记。似可找他来商量一下，看有无别的较好干部以及造反派领袖，可以找来共同商量？请酌处。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一月二十七日"},{"type":"paragraph","text":"[1]章伯森，当时任中共湖南省委书记处候补书记、湖南省副省长。1967年1月25日，他向国务院总理周恩来和中共中央政治局常委、中央文化革命小组组长陈伯达写报告说，我以一个党员的身份，向中央反映两点情况：一、目前湖南文化革命运动形势越来越好。造反派在政治上已完全取得优势，保守派正在分化瓦解中。但省委工作暂时处于瘫痪状态，领导机关的工作也基本停顿。如何依靠造反派，团结大多数，建立新的革命秩序，这是一个急待解决的问题。二、目前有很多单位要求对犯错误的干部罢官、开除党籍。自1月中旬以来，要求开除党籍的更是络绎不绝，如果这样处理下去，后果很难设想。章伯森在电报中还请求中央批准他到北京作一次汇报，并请中央对以上两个问题给予指示。"},{"type":"paragraph","text":"[2]1967年1月21日，毛泽东关于处理贵州问题给周恩来的批语中指出，应将贵州有关各方的代表十几人“找来北京，加以研究、确定政策，然后叫他们回去执行”。"}],"authors":["毛泽东"],"dates":[{"year":1967,"month":1,"day":27}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":289,"page_end":289},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"湖南文革","type":"人物"},{"name":"贵州文革","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3141cd6e8d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
