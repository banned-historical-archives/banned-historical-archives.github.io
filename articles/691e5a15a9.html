ical-archives/banned-historical-archives0/main/maoquanji29.pdf"],"article":{"title":"转发华北军区高干会情况报告的批语","alias":"","parts":[{"type":"paragraph","text":"转发华北军区高干会情况报告的批语"},{"type":"paragraph","text":"（1950年10月28日）各大军区党委，并转所属二级军区党委及兵团级与军级党委同志们："},{"type":"paragraph","text":"我们认为华北军区党委会十月廿六日向军委的报告\"是正确的，这是按中央方针所作的具体计划和切实处置。请你们参照此文件，做出自己的具体计划和切实处置，并尽速报来，是为至要。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十月廿八日于北京"},{"type":"paragraph","text":"[1]即中共华北军区委员会关于1950年10月20日至23日召开的华北军区高级干部会议情况的报告。报告中说，到会干部一致拥护中央和军委对朝鲜问题的决定。会议要求军队为适应新的形势，从各方面迅速地顺利地完成由和平到战争的转变，并确定了为实现这一转变采取的各项具体措施。会议讨论决定了以下几个问题：一、彻底克服和平麻痹思想；二、建立与改变组织机构，培养干部；三、加强战备；四、部队训练。"}],"authors":["毛泽东"],"dates":[{"year":1950,"month":10,"day":28}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":314,"page_end":314},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"691e5a15a9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
