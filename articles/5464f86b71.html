authors":[],"dates":[{"year":1972,"month":1,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"抗议垄断资产阶级大量裁减工人和向工人转嫁困难"},{"type":"paragraph","text":"英国各地三万多码头工人举行罢工"},{"type":"paragraph","text":"新华社伦敦一九七二年一月二十六日电　英国各地的码头工人三万多人一月二十六日同时举行罢工，抗议码头当局企图以劳力“多余”为借口大量裁减工人，向工人转嫁困难。"},{"type":"paragraph","text":"随着英国经济危机的发展，英国码头当局竭力把困难转嫁到工人头上。伦敦港务局最近宣布要在今年内裁减二千五百名“多余”的劳力，哈尔港务当局也宣布要关闭一些码头，解雇大批码头工人。垄断资产阶级这种向工人转嫁困难的行径引起了广大码头工人的愤慨。"},{"type":"paragraph","text":"伦敦的码头工人二十五日举行了大会，一致决定以罢工来回击垄断资本的进攻。二十六日，一万六千名伦敦码头工人停止了工作，使停靠在各码头上的四十多艘货船的装卸工作陷于瘫痪。利物浦的一万多名码头工人也举行了罢工，其中七千多人冒着大雨走上街头游行示威，来自兰开夏的一些正在罢工的矿工也参加了码头工人的示威。"},{"type":"paragraph","text":"同时，哈尔的二千六百名码头工人以及索斯安普顿、曼彻斯特和普雷斯顿等地的码头工人也都举行了罢工，抗议港务当局制造失业。罢工的码头工人还表示声援正在罢工的煤矿工人。"},{"type":"paragraph","text":"这次英国码头工人的大罢工是自发进行的，它给了垄断资本很大的打击。据报道，罢工每天使资本家损失大约五十万英镑。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5464f86b71"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
