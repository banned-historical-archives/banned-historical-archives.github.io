tart":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"许多院校加强培养政治教员以学习毛主席著作为主短期集训和在职学习结合","authors":["学教"],"parts":[{"type":"paragraph","text":"本报讯 自总政治部颁布“院校政治教育方案”以来，许多领导机关和院校对政治教员加强了培养训练。不少军种、兵种所属院校，结合教学需要，利用教学间隙，举办了一些规模不大、时间不长、以学习毛主席著作为主的教员集训班或读书会。据初步统计，炮兵办了党史教员、社会主义建设课程教员训练班各一期；工程兵、总后勤部办了党史和社会主义建设读书班各一期，装甲兵办了一期党史教员训练班；通信兵办了一期新教员训练班；空军办了一期辅导员训练班，海军办了两期党史教员训练班。不少院校还加强了政治教员在职学习的领导。"},{"type":"paragraph","text":"这些院校，对政治教员集训和在职学习的主要方法是：有计划有重点地通读毛主席著作。如某政治学校今年三次组织教员在职通读《毛泽东选集》，每次三个月左右；结合教学任务，组织党的方针政策的专题学习，并且研究如何贯彻到几门政治课程中去；结合备课，抓经常性的马克思列宁主义著作的学习，如某学院结合备课组织教员学习了《哥达纲领批判》、《论权威》、《中国社会各阶级的分析》、《湖南农民运动考察报告》等；组织教员经常学习党内文件、报刊，听传达报告，一般的作法是，首长注意及时批给教员一些文件看；建立文件阅览室或文件专用袋；每周固定一天或半天时间，专门用于阅读、讨论文件报告。以上这些活动，对培养政治教员、提高教学质量有很大帮助。 （学教）"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8ba37fd83e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
