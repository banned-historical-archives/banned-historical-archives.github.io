rs":[],"dates":[{"year":1973,"month":11,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"惠特拉姆总理和夫人游览颐和园"},{"type":"paragraph","text":"邓小平副总理、韩念龙副部长等陪同游览"},{"type":"paragraph","text":"新华社一九七三年十一月一日讯　惠特拉姆总理和夫人以及其他澳大利亚贵宾，今天上午由邓小平副总理、韩念龙副部长和王珍同志陪同，游览了颐和园。"},{"type":"paragraph","text":"惠特拉姆总理和夫人很有兴趣地参观了仁寿殿、乐寿堂、长廊和排云殿，观看了这里陈列的文物和工艺美术品。贵宾们还乘船游览了昆明湖。"},{"type":"paragraph","text":"中午，宾主在听鹂馆共进午餐。昨天下午，惠特拉姆夫人由许寒冰陪同参观了北京工艺美术工厂，今天下午由常玉林陪同参观了南苑人民公社。"},{"type":"paragraph","text":"（附图片）"},{"type":"paragraph","text":"惠特拉姆总理和夫人以及其他澳大利亚贵宾，十一月一日由邓小平副总理等陪同游览颐和园。"},{"type":"paragraph","text":"新华社记者摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4359942c1b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
