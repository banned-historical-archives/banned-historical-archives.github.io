art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"要完整地准确地贯彻毛泽东思想","authors":[],"parts":[{"type":"paragraph","text":"伟大领袖和导师毛主席早就指出：“没有知识分子的参加，革命的胜利是不可能的。”进入社会主义革命时期以后，毛主席一再教导我们：“社会的财富是工人、农民和劳动知识分子自己创造的。”“为了建成社会主义，工人阶级必须有自己的技术干部的队伍，必须有自己的教授、教员、科学家、新闻记者、文学家、艺术家和马克思主义理论家的队伍。这是一个宏大的队伍，人少了是不成的。”毛主席的光辉指示，极大地教育和鼓舞着广大知识分子为社会主义革命和建设积极贡献力量。"},{"type":"paragraph","text":"祸国殃民的“四人帮”，肆意篡改和歪曲毛主席为我党制定的知识分子政策，竭力否定和诋毁知识分子的革命作用。他们诬蔑知识分子是“精神贵族”、“臭老九”。他们反对人们学科学，搞技术。人类发展的历史是猴子变人，“四人帮”却大搞愚民政策，想叫人再变成猴子。“四人帮”对知识分子乱打“棍子”，乱戴“帽子”，挫伤了知识分子的革命积极性和创造性，对我国的社会主义革命和建设事业造成了严重危害。"},{"type":"paragraph","text":"我们要澄清被他们搞乱了的路线是非，就要完整地准确地贯彻毛泽东思想，深揭狠批“四人帮”。在进行十个“应该不应该”的教育中，一定要组织干部战士认真学习马列著作和毛主席著作，搞清楚革命导师是怎样教导的，“四人帮”是怎样篡改歪曲的，怎样做是“应该”的，怎样做是“不应该”的，一个问题一个问题地搞清楚，彻底肃清“四人帮”的流毒和影响。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"四人帮","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"be4094a5e3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
