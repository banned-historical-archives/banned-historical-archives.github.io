","authors":["杜继昌","陈良杰"],"dates":[{"year":1993,"month":11,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社天津H月16日电(记者　杜继昌、陈良杰)　今天，水利部海河水利委员会在天津隆重集会，纪念毛主席题词“一定要根治海河”30周年。"},{"type":"paragraph","text":"国务院总理李鹏为纪念大会题了词。李鹏的题词是“根治海河，发展经济”。"},{"type":"paragraph","text":"30年前，海河流域遭受到本世纪以来最大一次洪水的袭击，淹没6000多万亩良田，冲毁和浸倒1450万间房屋，冲垮75公里铁路，京广铁路被中断27天，天津的城市安全受到严重威胁。毛主席在当年11月17日发出“一定要根治海河”的伟大号召。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"天津文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1057258e3b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
