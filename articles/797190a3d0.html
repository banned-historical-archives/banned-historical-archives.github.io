thors":["中共中央"],"dates":[{"year":1967}],"is_range_date":false,"parts":[{"text":"中共中央关于点名批判陈丕显曹荻秋问题的指示","type":"title"},{"text":"中共中央","type":"authors"},{"text":"陈曹的问题要害是以下几点：","type":"subtitle"},{"text":"（1）五三年与高岗一起反对毛主席。","type":"paragraph"},{"text":"（2）五五年与反革命分子潘汉年一起搞反革命活动。","type":"paragraph"},{"text":"（3）五六年在市党代会上攻击柯庆施同志。","type":"paragraph"},{"text":"（4）反对农业合作化运动。","type":"paragraph"},{"text":"（5）六五年把共产党员名单交给资方，向资产阶级投降。","type":"paragraph"},{"text":"（6）五七年反右派的问题，五九年借反右倾攻击柯老。","type":"paragraph"},{"text":"（7）大刮资产阶级表扬风，为地、富、反、坏、右摆功。","type":"paragraph"},{"text":"（8）攻击三面红旗。","type":"paragraph"},{"text":"（9）贯彻形“左”实右刘少奇“桃园”经验。","type":"paragraph"},{"text":"","type":"appellation"}],"comments":[],"origin":"1967年5月27日红代会清华井冈山一部第三动态组编《动态》第61期。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"曹荻秋","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"797190a3d0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
