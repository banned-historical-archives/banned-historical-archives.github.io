hors":[],"dates":[{"year":1974,"month":12,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"兰州化学工业公司职工贯彻执行毛主席的革命路线"},{"type":"paragraph","text":"夺得抓革命促生产的新胜利"},{"type":"paragraph","text":"新华社兰州一九七四年十二月二十九日电　兰州化学工业公司广大职工在批林批孔运动中，坚决贯彻执行毛主席的革命路线，坚持团结战斗，赢得了抓革命、促生产的新胜利。截至十二月二十四日，这个公司的十一种主要化工和机械产品都超额完成了今年的国家生产计划，工业总产值比去年同期增长百分之十二，科研项目也取得了可喜的成果。"},{"type":"paragraph","text":"今年以来，兰州化学工业公司各级党组织始终把批林批孔作为头等大事来抓，带领广大职工刻苦攻读马列著作和毛主席著作。"},{"type":"paragraph","text":"广大职工批判了林彪、孔老二鼓吹的“上智下愚”、“英雄创造历史”的唯心史观，进一步解放了思想，增强了主人翁的责任感。他们主动帮助各级党组织把好路线关，加快了生产建设的步伐。年初，合成橡胶厂有的领导干部考虑到今年设备改造任务重，人力紧张，提出了一个低于去年的生产计划。但是广大工人不同意压低生产计划。他们说：制订生产计划，要积极可靠、留有余地，但决不能束缚群众的手脚，裹足不前。厂党委认识到，在制订计划上向前看还是向后看，相信群众还是脱离群众，是个事关路线的问题。他们积极支持群众的合理化建议，并因势利导，发动全厂职工进行讨论，重新制订出一个积极可行的增产计划。工人们身在车间，胸怀全局，以大批促大干，提前三十四天完成了今年生产计划。"},{"type":"paragraph","text":"兰州化学工业公司各级党委认真贯彻毛主席关于干部参加集体生产劳动的教导，组织干部深入基层，联系群众，参加劳动，指挥生产。目前，公司的机关干部已有三分之二下到基层，同群众一起抓革命、促生产，进一步发展了大好形势。橡胶厂石油气车间是全公司学大庆的一个先进单位，厂领导来到这个车间后，发现有的车间干部存在自满松劲情绪，就及时同车间干部一起学习毛主席关于无产阶级专政下继续革命的学说，加强思想政治工作，使他们提高了继续革命的觉悟。这个车间的干部和工人一起，反骄破满，继续革命不停步，鼓足干劲争上游，克服一个个困难，提前六十七天完成了今年的生产计划。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"批林批孔","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"45854cd388"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
