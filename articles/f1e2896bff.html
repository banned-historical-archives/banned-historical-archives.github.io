script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"复辟派的“希望”必然破灭","authors":["辛斌"],"dates":[{"year":1976,"month":6,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"复辟派的“希望”必然破灭"},{"type":"paragraph","text":"辛斌"},{"type":"paragraph","text":"“首先抓班子”，是邓小平翻案复辟的组织措施。他的所谓“选好人就有希望”，就是他搞反革命政治斗争的经验之谈。"},{"type":"paragraph","text":"“抓班子”，必有目的；“选好人”，必有标准。无产阶级是如此，资产阶级也是如此；但两个阶级的目的和标准，是截然不同的。无产阶级抓班子，就是要把党和国家的领导权牢牢掌握在真正的马克思主义者和工人、贫下中农手里。无产阶级培养和选择人材，就是要按照毛主席提出的五条标准。文化大革命中建立的老、中、青三结合各级领导班子，为造就千百万无产阶级革命事业的接班人，创造了有利条件，显示了生气勃勃的希望。"},{"type":"paragraph","text":"邓小平“抓班子”的目的是什么？看看他“选好人”的标准可明真象。请看，对文化大革命心怀不满的不肯改悔的走资派，他要“摆到适当的位置上”，特别是那些“不怕第二次被打倒”的人，要加以重用；对走白专道路的资产阶级的“权威”，他说“应爱护、赞扬”；甚至连文化大革命中清查出来的叛徒、特务，他也要留在党内。反之，邓小平咬牙切齿地攻击老、中、青三结合是“三凑合”、“三磨擦”，辱骂革命的领导干部“一不懂行，二不热心”，诬蔑从工人、贫下中农中提拔上来的新干部“一般效果都不好”。一句话，他恨不得把坚持毛主席革命路线的老、中、青干部都统统骂倒，一律排斥。邓小平的爱与憎何等露骨！他“首先抓班子”，就是首先拼凑“还乡团”，以实现其翻案复辟的政治纲领、政治路线，达到篡党夺权、颠覆无产阶级专政的罪恶目的。所以，邓小平的“选好人就有希望”，应读作“选好人就有资本主义复辟的希望”。"},{"type":"paragraph","text":"然而，历史总是无情地嘲弄那些倒行逆施的复辟派。刘少奇极力保护他那一堆叛徒、死党，林彪苦心搞他反革命的组织路线，邓小平大肆纠集翻案复辟势力，他们都是拚命“首先抓班子”，都以为这样“就有希望”；但是，曾几何时，他们的复辟“希望”，迅速地被粉碎了，连他们自己也被人民所唾弃。这是为什么？就是因为他们代表少数资产阶级的利益，逆历史潮流而动，违背了占人口绝大多数的无产阶级和劳动人民的利益。要革命、要前进的亿万人民，绝不容许这些修正主义大人物开历史的倒车，一定要和他们坚决作斗争，把他们这些反动没落阶级的政治代表，扫进历史的垃圾堆。"},{"type":"paragraph","text":"“唯新兴的无产者才有将来”。（《鲁迅全集》第4卷第151页）无产阶级是历史上最进步的阶级，正在满怀胜利的信心，推动着历史前进，光明的希望永远属于无产阶级！"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f1e2896bff"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
