ical-archives/banned-historical-archives8/main/maoquanji18.pdf"],"article":{"title":"中共中央关于何时打败日本问题的宣传工作的指示","alias":"","parts":[{"type":"paragraph","text":"中共中央关于何时打败日本问题的"},{"type":"paragraph","text":"宣传工作的指示！"},{"type":"paragraph","text":"（1943年5月1日）各中央局、中央分局："},{"type":"paragraph","text":"关于何时打败日本问题："},{"type":"paragraph","text":"（一）当苏联提出一九四二年打败德国时，是以英、美约定于一九四二年建立第二条战线为根据的，在当时不但可以而且应该提出此种口号以为动员努力之目标。但当英、美没有开辟第二条战线，又无新的约定时，就没有继续宣传此种口号。这是情况变化宣传必须随之变化的实例。"},{"type":"paragraph","text":"（二）当苏联根据英、美约定提出上述口号时，我党亦提出一九四三年打败日本的口号，这也是不但可以而且应该的。但当英、美没有履行诺言因而去年打败德国没有实现时，我党即不应继续宣传此种口号，而应向群众解释今年所以还不能打败日本的原因，鼓励群众坚持努力争取胜利。关于此点，中宣部过去宣传要点曾有解释，去秋以来的《解放日报》亦已改变论调。"},{"type":"paragraph","text":"（三）但有个别根据地上的领导同志至今还不了解此种意义，不但不去作正当解释，反而机械地继续宣传今年打败日本的口号，以致引起人们怀疑、提出询问，仍然不知道如何解释，屡电中央询问。这是不知道宣传应随情况变化而改变的原故。"},{"type":"paragraph","text":"（四）今年英、美是否开辟第二条战线，或苏联是否能于今年独立打败希特勒，此时都还不能断定。苏联现在已提出准备决战口号，红军实力已极大增加，故今年打败希特勒有极大的可能性，但也有要待明年才能打败的可能性。如果今年能打败德国，则明年自有可能打败日本，否则还要推迟时间。各地宣传，在目前几个月内不要去强调打败日本的时间，等到欧洲形势充分明朗时，中央及《解放日报》自有指示。"},{"type":"paragraph","text":"（五）对于过去口号，在疑问者多、需要公升解释地方则公开解释之，仅有个别同志询问者则个别答复之，无疑问地方则不作解释。"},{"type":"paragraph","text":"（六）各中央局及分局须作长期坚持打算，准备再作两年至三年的极端艰苦斗争，并须准备或有的意外变化。如胜利早临，我们并，不吃亏；如胜利延迟，我们早有精神准备及工作准备。"},{"type":"paragraph","text":"中央书记处五月一日"}],"authors":["毛泽东"],"dates":[{"year":1943,"month":5,"day":1}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":25,"page_end":26},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"}]},{"id":"wenji3","type":"pdf","name":"毛泽东文集第三卷（1999）","internal":false,"official":true,"author":"中央文献研究室","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/wenji3.pdf"],"article":{"title":"中共中央关于何时打败日本问题的宣传工作的指示","description":"根据中央档案馆保存的抄件刊印。","dates":[{"year":1943,"month":5,"day":1}],"parts":[{"text":"中共中央关于何时打败日本问题的宣传工作的指示","type":"title"},{"type":"appellation","text":"各中央局、中央分局："},{"type":"paragraph","text":"关于何时打败日本问题："},{"type":"paragraph","text":"（一）当苏联提出一九四二年打败德国时，是以英、美约定于一九四二年建立第二条战线为根据的，在当时不但可以而且应该提出此种口号以为动员努力之目标。但当英、美没有开辟第二条战线，又无新的约定时，就没有继续宣传此种口号。这是情况变化宣传必须随之变化的实例。"},{"type":"paragraph","text":"（二）当苏联根据英、美约定提出上述口号时，我党亦提出一九四三年打败日本的口号，这也是不但可以而且应该的。但当英、美没有履行诺言因而去年打败德国没有实现时，我党即不应继续宣传此种口号，而应向群众解释今年所以还不能打败日本的原因，鼓励群众坚持努力争取胜利。关于此点，中宣部过去宣传要点曾有解释，去秋以来的《解放日报》亦已改变论调。"},{"type":"paragraph","text":"（三）但有个别根据地上的领导同志至今还不了解此种意义，不但不去作正当解释，反而机械地继续宣传今年打败日本的口号，以致引起人们怀疑、提出询问，仍然不知道如何解释，屡电中央询问。这是不知道宣传应随情况变化而改变的原故。（四）今年英、美是否开辟第二条战线，或苏联是否能于今年独立打败希特勒，此时都还不能断定。苏联现在已提出准备决战口号，红军实力已极大增加，故今年打败希特勒有极大的可能性，但也有要待明年才能打败的可能性。如果今年能打败德国，则明年自有可能打败日本，否则还要推迟时间。各地宣传，在目前几个月内不要去强调打败日本的时间，等到欧洲形势充分明朗时，中央及《解放日报》自有指示。（五）对于过去口号，在疑问者多、需要公开解释地方则公开解释之，仅有个别同志询问者则个别答复之，无疑问地方则不作解释。"},{"type":"paragraph","text":"（六）各中央局及分局须作长期坚持打算，准备再作两年至三年的极端艰苦斗争，并须准备或有的意外变化。如胜利早临，我们并不吃亏；如胜利延迟，我们早有精神准备及工作准备。"},{"type":"paragraph","text":"中央书记处"},{"type":"paragraph","text":"五月一日"}],"comment_pivots":[{"part_idx":0,"offset":22,"index":1},{"part_idx":3,"offset":39,"index":2}],"is_range_date":false,"authors":["毛泽东"],"comments":["这是毛泽东为中共中央书记处起草的党内指示。","第二条战线，见本卷第7页注〔3〕。"],"page_start":28,"page_end":29,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"86b19316f8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
