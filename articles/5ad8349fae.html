art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"彭德怀元帅欢宴阿尔巴尼亚军事代表团","authors":[],"parts":[{"type":"paragraph","text":"出席宴会作陪的有：黄克诚大将、肖华上将、甘泗淇上将、张宗逊上将、彭绍辉上将、赖传珠上将、肖向荣中将、常乾坤空军中将、刘道生海军中将等高级将领和外交部副部长章汉夫。"},{"type":"paragraph","text":"彭德怀元帅在宴会上首先致词。他说中国人民十分钦佩阿尔巴尼亚人民的光荣斗争传统和不屈不挠的斗争意志。我们怀着尊敬的心情，注视着阿尔巴尼亚人民为了我们共同的社会主义事业，和悍卫马列主义的纯洁性所作的光辉斗争，并对于这一斗争给予很高的评价。我国人民对阿尔巴尼亚人民怀着兄弟般的友谊，这一友谊正在日益发展和巩固。我们相信，阿尔巴尼亚军事代表团的访华，对发展中阿两国人民及其军队间的友谊合作关系和加强以苏联为首的社会主义阵营的团结，必将做出重大贡献。"},{"type":"paragraph","text":"巴卢库上将在讲话时热情地叙述了中阿两国人民和军队间的友好情谊。他说：我们来到你们伟大的国家访问，就像来到自己家里一样，中阿两国虽然相距万里，但我们的心却紧密联系在一起。"},{"type":"paragraph","text":"巴卢库上将在称赞了中国的社会主义建设成就以后，再次表示积极支持我国解放台湾的斗争。"},{"type":"paragraph","text":"巴卢库上将说：坚决地反对一切侵略而进行斗争的阿尔巴尼亚人民和军队，永远是中国人民的忠实朋友。"},{"type":"paragraph","text":"宴会进行中，宾主频频为两国人民和军队间的友谊干杯！"},{"type":"paragraph","text":"应邀出席宴会的还有阿尔巴尼亚驻华大使巴利里。各国驻华武官也应邀出席。"},{"type":"paragraph","text":"今天上午，彭德怀元帅曾接见了代表团全体人员，并进行了两个多小时的亲切谈话。"}],"alias":""},"tags":[{"name":"彭德怀","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5ad8349fae"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
