","authors":[],"dates":[{"year":1974,"month":5,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"沿着毛主席的无产阶级文艺路线胜利前进"},{"type":"paragraph","text":"革命现代京剧《平原作战》彩色影片剧照"},{"type":"paragraph","text":"八路军排长赵勇刚，在毛主席的无产阶级军事路线指引下，他和抗日军民一起英勇机智地开展游击战，牢牢掌握对敌斗争的主动权。"},{"type":"paragraph","text":"军爱民，民拥军。乡亲们热情地慰问子弟兵。"},{"type":"paragraph","text":"赵勇刚率领八路军战士胜利完成智取敌军炮楼的任务，威武雄壮地准备去迎接新的战斗。"},{"type":"paragraph","text":"“持久战，三阶段：防御、相持、大反攻！”张庄村的抗日群众回忆赵勇刚带领他们学习毛主席光辉著作《论持久战》的情景。"},{"type":"paragraph","text":"八路军战士与日寇英勇搏斗。"},{"type":"paragraph","text":"张大娘为了掩护李胜，不幸中弹负伤。临终前，她满怀深情地对赵勇刚说：“我把小英托付给你们，叫她永远跟着毛主席，永远跟着共产党，抗战到底，革命到底！”"},{"type":"paragraph","text":"“革命者不惜血洒平原上，要换取解放红旗遍城乡”。张庄村党支部书记李胜在凶残的敌人面前视死如归、巍然屹立。"},{"type":"paragraph","text":"“为炸军火来接线，出奇制胜拴龟田”。赵勇刚化装进城侦察，到饭馆与八路军秘密工作人员联系。"},{"type":"paragraph","text":"赵勇刚等在平原歼敌后，与八路军主力部队胜利会师。"},{"type":"paragraph","text":"本版照片为新华社供稿"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4b738c1af1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
