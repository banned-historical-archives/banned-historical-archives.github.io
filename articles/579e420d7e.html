助合作组织","authors":[],"dates":[{"year":1955,"month":2,"day":3}],"is_range_date":false,"parts":[{"text":"醴陵县有些富农以美人计的方法打入互助合作组织","type":"title"},{"text":"【湖南分社讯】醴陵县有些富农以美人计的方法来拉拢干部，混入互助合作组织。醴陵县塘乡富农江得富两个媳妇与二十四个干部、积极分子发生关系，藉以参加了互助组。粮食统购中鼓动集体隐藏粮食。宁乡有个富农将女儿嫁给一个积极分子后，藉此约束积极分子：一不许加入合作社；二不许参加开会；三不许入团入党。据一区的检查，富农打入互助组的有一百六十八户，其中用美人计方法打入的就有三户。(罗厚仁编)","type":"paragraph"}],"comments":[],"origin":"1955年2月3日新华通讯社编《内部参考》。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"579e420d7e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
