约百分之三十，图书退还约百分之七十以上","authors":["范银怀"],"dates":[{"year":1984,"month":8,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"天津认真清退“文革”期间的查抄物资"},{"type":"paragraph","text":"衣物家具、金银存款已退还百分之九十五，文物退还约百分之三十，图书退还约百分之七十以上"},{"type":"paragraph","text":"新华社天津8月9日电　（记者范银怀）天津市认真清退“文化大革命”期间非法查抄的各种物资，努力做到物归原主。"},{"type":"paragraph","text":"天津市有关部门在“文化大革命”期间接受查抄的衣物家具二百多万件、金银封包四万二千多件、文物五十七万多件、图书九十九万多册。从1980年开展清退工作到今年7月底，查抄衣物家具和金银存款退还了95％以上；文物退还了约30％；图书退还了约70％以上。"},{"type":"paragraph","text":"中共天津市委、市政府把清退查抄物资当作彻底否定“文化大革命”、落实党的政策的大事，由市委、市政府负责人组成了清退查抄物资领导小组和专门的办事机构。他们发动和组织各有关部门和单位，将清查出来的物资分类存放、保管，并建立起卡片。组织认领时，特别邀请被查抄户中的人大代表、政协委员、民主党派成员、社会知名人士到保存地方看卡片、认实物。市邮电局的医生庄德远在“文化大革命”中被抄的东西较多，也难以查对。这个局党委的一名副书记找了七八个知情人调查，并到仓库里核对单据帐目，还到庄德远家里听取意见。现在，庄德远被抄的二百九十六件实物能够找到的均已退还，丢损的设法给予赔偿。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"天津文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"193cc8b573"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
