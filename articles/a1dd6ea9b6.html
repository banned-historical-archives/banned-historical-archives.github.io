法学院","姚明","杜汝楫","梁世通","章文岳","陈守铭","黄盛叶"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"关于外行领导内行","type":"title"},{"text":"北京政法学院陈守铭黄盛叶梁世通姚明章文岳杜汝楫","type":"authors"},{"text":"“反对不学无术的人，占居学校领导，发号施令，学术上没有成就的人不能当学校领导人。”","type":"paragraph"},{"text":"“有些党员根本不懂科学，他们没有资格领导内行人。”（北京政法学院  陈守铭）","type":"paragraph"},{"text":"“不让老教授讲课，说他们不是党员。而党员却法律知识不专，形成卡片积累，资料汇编。”（北京政法学院　黄盛叶）","type":"paragraph"},{"text":"“老干部讲课是，上课教员飘飘然，下课学生昏昏然，讲稿是道听途说。老干部没上过学，连H2O(注：水的分子式)都不知道，怎么教学？”（北京政法学院  梁世通）","type":"appellation"},{"text":"“我建议把没有归队的老教授聘请到我院。充实老教授的队伍。把一些老干部调走。”（北京政法学院  姚明）","type":"paragraph"},{"text":"“社会是不断地进步着，人民群众的觉悟在不断提高，他所需要的是真正有学问的人，不要不学无术的靠功劳吃饭的人，不要作威作福者，不要奴才。未来是属于正直的有学问的人！胜利永远为正直的有学问的人打开大门，……人民需要我，对我抱着很大希望。”（北京政法学院  章文岳）","type":"paragraph"},{"text":"“我院老干部太多，文化理论水平低，做教学工作不合适，不需要这样多的老干部。”（北京政法学院  杜汝楫）","type":"paragraph"},{"text":"“我们这里是学校需要有真才实学的学者，不要不学无术的党棍。”（北京政法学院  赵日月）","type":"paragraph"}],"comments":[],"origin":"《高等学校右派言论选编》（中共中国人民大学委员会，1958年8月）。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a1dd6ea9b6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
