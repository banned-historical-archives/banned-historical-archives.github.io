"石正章"],"dates":[{"year":1958,"month":5,"day":19}],"is_range_date":false,"parts":[{"text":"安徽省有一千多万亩小麦发生锈病","type":"title"},{"text":"石正章","type":"authors"},{"text":"新华社合肥14日讯　小麦锈病严重威胁着安徽省即将成熟的小麦产量。到本月12日统计，全省发生锈病面积有近一千一百万亩，占全省小麦面积的四分之一。其中小麦秆锈病有近五百万亩，叶锈病有近六百万亩。","type":"paragraph"},{"text":"3月上旬中共安徽省委对防治小麦锈病便作了部署。在4月下旬发生小麦锈病后又采用抽沟排木和用硫磺石灰合剂等办法进行防治，取得了一些效果。但由于近二十天来天气不正常，全省范围内阴雨连绵，因而助长了锈病的发展。目前由于发病面广，硫磺赶运不及，空运数量也有限，省委正大力推广群众创造的各种土法来防治。如以草木灰的溶液喷湿麦秆，用石灰兑二十倍水来喷射病麦，以食盐兑一百倍水喷射病麦，用“猫儿眼”野草沤的汁液喷射病麦等。","type":"paragraph"}],"comments":[],"origin":"1958年5月16日新华通讯社编《内部参考》。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"27d25112b1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
