写的批语","authors":["毛泽东"],"dates":[{"year":1967,"month":5,"day":14}],"is_range_date":false,"parts":[{"text":"为转发广东省军管会、湖南省军区关于支左工作报告写的批语","type":"title"},{"text":"毛泽东","type":"authors"},{"text":"各大军区，各省军区，各军区分，各人民武装部，各军各师各团，直属各军种、兵种：","type":"appellation"},{"text":"（一）现将广州军区、湖南省军区报告两件发给你们，望参照执行。","type":"paragraph"},{"text":"（二）凡犯了错误的必须坚决改正。如不改正，越陷越深，到头来还得改正，威信损失就太大了。及早改正，威信只会比前更高。","type":"paragraph"},{"text":"（三）不要动动摇摇，游移不决。听信老婆孩子从保字号那里带来的错话，信以为真。","type":"paragraph"},{"text":"（四）要受得住工人、农民、学生、战士、干部的批评，加以分析，好的接受，错的解释。解释不通，暂时搁下，将来再说。","type":"paragraph"},{"text":"（五）要坚决相信绝大多数群众是好的，坏人只是极少数，不过百分之一、二、三。这样一想，就什么都通了。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"湖南文革","type":"人物"},{"name":"广东文革","type":"人物"},{"name":"军队支左","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"55ed274bf6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
