<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"天津市资本家的思想动态","authors":[],"dates":[{"year":1955,"month":12,"day":12}],"is_range_date":false,"parts":[{"text":"天津市资本家的思想动态","type":"title"},{"text":"【天津分社十二日讯】天津市绝大多数资本家不仅认识到而且已经感受到全业合营已是大势所趋，势所必至。他们认为“这是长江大水往东流，是历史发展规律，可顺而不可拒”。“早晚逃不了这一关，与其打着走，不如跑着走。”日来纷纷表明态度愿意申请合营的仍有增多。据七区工商联统计，日内申请合营的已达三百三十一起。各区、行代表人物为了藉机增加政治资本，都积极展开活动。据二区不完全统计：已有二十五个商业行业在代表人物倡议下进行联营并店，涉及千余户。有的行业是全区、全业的合营，如茶、鞋、帽、棉布、服装、西药，其中鞋帽业在副主委张绪瑞的“领导”下还有正式的办公制度，专人为此筹划。有的行业的会员正在发动，但未正式向政府申请。有的是部分户申请并店合营，如瓜菜、水产、猪肉、建筑材料、煤、文教用品、果子、豆食、面食、照像等十几个行业。有的要求并店，不要求合营。有些分散的行业要求走合作化，如刻字、文物艺术、理发等行业；澡塘业部分户要求国家接受。","type":"paragraph"},{"text":"已经安排到全行业合营筹委会的资本家代表人物，表现兴高彩烈，主动向我汇报情况，并要求多做些工作，认为今后在专业公司当干部很有希望。荣昌兴面粉厂积极分子王勋弟表示要不辜负党的培养，要起骨干作用。保证做到生产、合营两不误。困难户的资本家，表现得“喜出望外”，有些年青的资方或代理人表现得急不可待。宏星陶器厂刘世英说：“一听合营有望，就得跪下给政府磕头。”全兴号糕点店林竹轩形容“柜上已成破庙，整天为刮风下雨耽心”。认为合营后有了固定收入，就等于脱离了苦海。有的认为“不如现在就挂上国营牌子来得痛快”。","type":"paragraph"},{"text":"天津市资本家表示愿意接受改造的越来越多，但是顾虑也是多种多样。上层资本家知道政治上不会没保障，情绪趋于稳定。现在考虑的是谁高谁低的问题。毕鸣歧从北京到天津后，血压上升。据说毕自己忖量，他各方面都居于周叔弢、朱继圣之上，论钱比他们多，论工作更是有账可查，认为周叔弢当“世袭”市长没资格。一区工商联副主委李金昌见边炳章在橡胶业合营筹委会中名列前头，也感到不舒服。","type":"paragraph"},{"text":"一般中、下层资本家无暇揣测和领会改造的若干原则问题，只对财产去留、生活问题顾虑重重。他们说：“别看嘴里说愿意合营，但事到临头心如刀绞”，认为以前虽然受工人点气，但产业还在眼皮底下，这一来却不知调到何处，这简直就是资本家的最后关头。尤其是家庭户和老年资本家表现的更为突出。庆丰油号资本家说：“现在是进退两难，现在每月收入百十元，合营后也就是五十元，如何维持四个孩子、一个老婆的生活。”恒记布店刘衍宾说：“公私合营我有三不行，写不行、算不行、说不行，家里开支大，怎么办呢?”不少老年资本家耽心的主要问题是“要不要”。据说橡胶业资本家有八大怕：怕落工资、失业、估值后业不抵债、没地位、没职权、外调、制度严不自由、负责任。同义布厂王凤祥形容目前资本家的心理状态是：“合营后最好是地位高高的，责任小小的，薪金多多的，工作少少的。”又鉴于“社会主义是按劳取酬，自食其力”的，因而又不敢“奢望”。感到“这是突然袭击”。他们显得神色黯淡，精神紧张。少数人有不满和抵制情绪。民生园资本家说：“五反是洗了一半澡，这次就洗干净了，还什么你的我的。”庆源斋老年资本家沈庆昌、义记化工厂张哲民为此恸哭。有的开始消极经营，如义和木厂潘凤鸣在营业时间埋头大睡。恩兴元糕点店杨永贵在营业时间不卖货。个别资本家大吃大喝，大华鞋帽庄两个资方每天吃十元。荣庆成电料行资本家竟宣扬“真要叫我合营，我就跳河去”。","type":"paragraph"},{"text":"资本家打的是什么算盘呢?一种是在房产上打主意，说：“房契是我个人名义。”“房子要一半归公，一半自用。”另一种是在企业用的傢具上作文章。惠芳春、祥顺斋等户资本家说门扇、门板、水缸、烟筒、炉子都是借的，要求合营前退还。庆升永吴连升说：“柜上用的电扇是借钱买的，以物顶还。”","type":"paragraph"},{"text":"还有一种是巧立名目，提出清还外债或股东垫款等问题。天祥号高长江说：“柜上欠我工资一千元，我欠外债九百元，要求还给工资清还外债。”信成斋资方代表冯志和哭丧着说：“这一辈子就积蓄了一百袋面，存在柜上，要求折款提出。”合丰顺糕点店资本家拟将股东垫款一千四百元提出。兴业糕点资本家要归还他老婆垫款三百元。","type":"paragraph"},{"text":"个别资本家私自增薪，福和育记布厂王育民将薪金由七十元提到一百元。桂顺斋糕点店刘少泉趁职工不在拿走劈柴二十斤，他的家属到柜上要水桶、钢锅。","type":"paragraph"},{"text":"资本家提出了如下一些问题：债权债务的处理问题，企业公债金如何处理?一九五五年的分红问题，如何照顾老、弱、病、残的资方?对不在职股东的工作问题和生活问题如何安排和照顾?业不抵债如何处理？家庭人口多，生活怎么办?非正式从业人员如何安置？(据天津市委统战部材料编)","type":"paragraph"}],"comments":[],"origin":"1955年12月13日新华通讯社编《内部参考》。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d644a17bd9"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
