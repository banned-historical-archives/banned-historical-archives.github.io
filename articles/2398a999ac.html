ors":[],"dates":[{"year":1980,"month":8,"day":22}],"is_range_date":false,"parts":[{"text":"上海市高级人民法院对林昭的刑事判决书","type":"title"},{"text":"林昭，又名彭令昭、许苹，女，1932年生，江苏省苏州市人，原系北京大学学生。林昭于1965年5月由上海市静安 区人民法院，以反革命罪判处有期徒刑二十年。1968年4月29日，又由中国人民解放军上海市公检法军事管制委员会以反革命罪判处死刑，立即执行。现经本 院复查查明，林昭在1958年被错划为右派分子后，因精神上受到刺激，1959年8月开始就患了精神病，此后曾以写长诗、文章等表示不满，并非犯罪行为。 1965年对林昭以反革命罪判处徒刑显属不当，予以纠正。林昭被错判服刑后精神病复发，又曾用写血书、诗歌、日记，以及呼喊口号等表示不服。1968年将 林昭在病发期间的行为，又以反革命罪处以极刑，显属错杀，应予纠正。据此","type":"paragraph"},{"text":"本院特重新判决如下：","type":"paragraph"},{"text":"一、撤销上海市静安区人民法院1962年度静刑字第171号和中国人民解放军上海市公检法军事管制委员会1967年度沪中刑[1]字第16号两次判决。","type":"paragraph"},{"text":"二、对林昭宣告无罪。","type":"paragraph"},{"text":" 上海市高级人民法院1980年8月22日","type":"paragraph"}],"comments":[],"origin":"林昭妹妹彭令范提供的原件。原题为：“上海市高级人民法院刑事判决书”。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2398a999ac"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
