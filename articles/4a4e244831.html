script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"敢向资产阶级法权挑战","authors":["秦文"],"dates":[{"year":1976,"month":3,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"秦文"},{"type":"paragraph","text":"张常红同志复员不回上海，到西藏去插队落户，做限制资产阶级法权的先锋，用实际行动反击了党内那个不肯改悔的走资派刮起的右倾翻案风，好得很!"},{"type":"paragraph","text":"社会主义社会，是衰亡着的资本主义与生长着的共产主义彼此斗争的时期。张常红同志经过无产阶级文化大革命和批林批孔运动，刻苦攻读马列和毛主席著作，学习无产阶级专政理论，深知限制资产阶级法权，是清除旧社会的痕迹，铲除滋生资产阶级和资本主义的土壤，是社会主义革命的一项重要的战略任务。因此，她决心响应伟大领袖毛主席的号召，带头破除资产阶级法权。"},{"type":"paragraph","text":"这个行动好，好就好在张常红同志分得清什么是资本主义，什么是共产主义，什么是应该反对的，什么是应该发扬的。在社会主义革命时期，分不清资本主义和共产主义，认不清革命的对象，就不可能继续革命。毛主席最近指出:“搞社会主义革命，不知道资产阶级在哪里，就在共产党内，党内走资本主义道路的当权派。走资派还在走。”只有看清资产阶级在哪里，才能自觉地搞社会主义革命。党内那个不肯改悔的走资派反对限制资产阶级法权，抛出种种奇谈怪论，就是妄图混淆资本主义和共产主义，扩大资产阶级法权，以达到复辟资本主义的目的。"},{"type":"paragraph","text":"张常红同志就是看到了这个“彼此斗争”时期的特点，作为老干部的子女，她不把父母的光荣革命历史作为自己追求特殊享受的“资本”，而是把父辈的共产主义理想，当做自己奋斗的目标。她入伍六年多，一贯艰苦奋斗，入了党、立过功，当了干部，她从不把这些当成追求个人享受的条件，而是决心用实际行动去努力铲除滋生资产阶级和资本主义的土壤。"},{"type":"paragraph","text":"张常红同志的革命实践告诉我们:一个革命青年，只有去和工农结合，一起“造成使资产阶级既不能存在，也不能再产生的条件”，才能接过父辈的光荣传统，接好革命的班。用自己的斗争实践，粉碎党内那个不肯改悔的走资派对青年施展的种种诱惑、腐蚀的诡计，把社会主义革命进行到底。"},{"type":"paragraph","text":"社会主义革命的历史车轮滚滚向前，敢于向资产阶级法权挑战的千百万革命青年，用自己意气奋发的革命风貌，为社会主义祖国大增光彩。马克思曾经就巴黎公社采取限制资产阶级法权的措施一事，指出:这些措施，在某种程度上深深刺入了旧社会制度的内脏。难怪那个思想还藏在旧社会制度内脏里的不肯改悔的走资派，对限制资产阶级法权如此反感、难受。"},{"type":"paragraph","text":"让他去反感吧!革命青年们向资产阶级法权宣战的战鼓声声，将更加宏亮!"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"批林批孔","type":"主题/事件"},{"name":"限制资产阶级法权","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4a4e244831"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
