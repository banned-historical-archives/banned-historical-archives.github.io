tart":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席接见我们是终生难忘的一课","authors":["炮兵毛泽东思想学习班全体同志"],"parts":[{"type":"paragraph","text":"我们幸福地见到了全中国人民和全世界革命人民心中最红最红的红太阳毛主席，人人欣喜若狂，个个激动万分。毛主席神采奕奕，红光满面，身体非常非常健康，精力非常非常充沛，这是全中国人民和全世界革命人民的最大幸福。我们千遍万遍欢呼：敬祝毛主席万寿无疆！万寿无疆！万寿无疆！万寿无疆！"},{"type":"paragraph","text":"从人民大会堂回到驻地，同志们都顾不得吃饭，有的立即打长途电话，把这激动人心的喜讯迅速传给本单位的战友；有的立即写日记、写感想。我们连夜进行了热烈的讨论，大家沉浸在幸福的回忆之中，畅谈见到毛主席的欢欣鼓舞的心情，纷纷表示要坚决紧跟伟大统帅毛主席，把无产阶级文化大革命进行到底。"},{"type":"paragraph","text":"学习班原定在十五日开学。大家说：今天我们就开学了。毛主席亲自接见我们，这是最好的开学动员，这是最隆重的开学典礼，这是终生难忘的一课。同志们说：毛主席号召我们要斗私，批修，要开办学习班，现在毛主席又亲自接见我们学习班的同志，这是毛主席对我们的最大关怀，最大鼓舞，最大鞭策。我们一定遵照毛主席的教导，好好地活学活用毛主席著作，斗私批修，改造世界观；好好地总结文化大革命运动中的经验教训，绝不辜负毛主席他老人家对我们的无限关怀和殷切期望！"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f0a5f8bcd8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
