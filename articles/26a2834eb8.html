art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"剖析资产阶级自由化的实质","authors":["郎岗峰"],"parts":[{"type":"paragraph","text":"读书班引导大家从3个方面剖析了资产阶级自由化的反动实质：一是在表现形式上，有些人打的是“为民请命”的幌子，具有很大的欺骗性。大家谈到，搞资产阶级自由化的人喊的是反腐败反官倒、争取所谓民主、自由的口号，实际上干的是破坏民主与法律，损害国家和人民利益的勾当。他们四处串联，成立反动组织，煽动学生罢课、工人罢工，破坏正常的生产生活秩序，最后，制造了一场骇人听闻的反革命暴乱。二是在思想理论上，它的表现是形而上学猖獗。大家以《河殇》为例说明，搞资产阶级自由化的人违背历史事实，否定五千年中国文化，连中华民族的象征黄河、长城也被斥之为阻碍中国发展的“包袱”，宣传马列主义受到讽刺挖苦，提倡发扬光荣传统被说成是守旧僵化。一些同志联系中国革命和建设的实践谈到，分析问题一定要实事求是。我们从不否认前进中存在困难，但也从来都坚定地认为社会主义前途光明，10年改革的成就巨大。三是从目的上看，搞资产阶级自由化是为了全盘西化。大家指出，少数别有用心的人在政治上宣扬多党制，思想文化上宣扬绝对自由，经济上宣扬一切向钱看、唯利是图，其目的就是要复辟资本主义制度。我们一定要认清这个大是大非问题，旗帜鲜明地坚持党的领导，坚持社会主义的正确方向。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"26a2834eb8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
