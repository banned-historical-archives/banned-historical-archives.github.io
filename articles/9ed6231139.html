tart":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"叶剑英；聂荣臻同志会见并宴请全印柯棣华大夫纪念委员会代表团","authors":[],"parts":[{"type":"paragraph","text":"新华社一九七六年十二月十五日讯 中共中央副主席、中央军委副主席叶剑英，人大常委会副委员长、中央军委副主席聂荣臻，今天下午会见以全印柯棣华大夫纪念委员会主席比·库·巴苏医生为团长的全印柯棣华大夫纪念委员会代表团。"},{"type":"paragraph","text":"会见时，叶剑英、聂荣臻同志同印度朋友热情握手，对曾经和柯棣华大夫一起生活和战斗过的巴苏医生率领代表团前来参加柯棣华大夫纪念馆开馆典礼并进行友好访问，表示热烈欢迎。宾主进行了亲切的交谈，畅叙中印两国人民悠久的传统友谊。"},{"type":"paragraph","text":"会见以后，叶剑英、聂荣臻同志设宴招待印度朋友。"},{"type":"paragraph","text":"参加会见并应邀出席宴会的代表团团员是：巴苏团长的夫人英迪拉·巴苏，柯棣华大夫的哥哥孟凯什·斯·柯棣华、妹妹瓦特萨拉·斯·柯棣华，以及贝·恩·潘迪、梅特拉义·戴维夫人、马哈克维·斯里·斯里、格杨·辛格·丁格拉、塔拉昌德·古普塔、迪·塞·潘迪。"},{"type":"paragraph","text":"印度驻中国大使纳拉亚南也参加了会见并应邀出席宴会。"},{"type":"paragraph","text":"参加会见和出席宴会作陪的有外交部副部长韩念龙，对外友协会长王炳南、副会长杨骥，有关方面负责人乐时鸣、王晓云、郭东俊、孟宪如、贾继周，以及柯棣华大夫的夫人郭庆兰。（附照片）"},{"type":"paragraph","text":"这是会见时合影。 新华社记者摄（照片）"}],"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"聂荣臻","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9ed6231139"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
