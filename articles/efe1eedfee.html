","authors":[],"dates":[{"year":1967,"month":1,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"秘鲁和玻利维亚共产党机关报热烈赞扬我国文化大革命"},{"type":"paragraph","text":"中国人民在进行人类史无前例的革命"},{"type":"paragraph","text":"据新华社十七日讯  秘鲁共产党和玻利维亚共产党机关报最近分别发表文章，热烈赞扬我国无产阶级文化大革命。"},{"type":"paragraph","text":"秘鲁共产党机关报《红旗报》说：毛主席亲自发动和领导的“无产阶级文化大革命是史无前例的革命运动，这次运动的思想原则是相信群众的威力，政策是依靠群众，方法是大胆地放手发动群众，这一运动采取了新的革命民主方法，因为群众创造了无产阶级民主的最高级的发展形式。”"},{"type":"paragraph","text":"文章驳斥了现代修正主义者对中国和中国无产阶级文化大革命的攻击和污蔑。"},{"type":"paragraph","text":"文章说，中国的无产阶级文化大革命正在改变着人们的灵魂，“而这个改造是通过斗争和发动群众来进行的，因为群众而且只能由群众自己解放自己，任何人也不能代替他们进行这项革命任务。所以，文化大革命交到群众手里。这是正确的。这是革命的。这是马克思列宁主义的。”文章说：“这一史无前例的伟大运动，使得帝国主义者、它的盟友现代修正主义者和世界一切反动派惊慌失措，因为以热情勇敢的红卫兵为突击队的中国群众，在红光四射的毛泽东思想武装和指引下，正在完成中国共产党八届十一中全会指出的任务。”"},{"type":"paragraph","text":"玻利维亚共产党机关报《解放报》发表的题为《一个深入人心的革命》的文章说，革命“不仅仅应该彻底破坏旧秩序，不仅仅应该在物质战场取得胜利，而且应该敢于展开另一场战斗，一场在人类历史上空前未有的战斗，这场历史性战斗，要把人们为‘钻营私利’所腐蚀的心灵，改造成一种新精神——将在共产主义社会生活的人的精神。中国人民首先创造了这方面的历史经验。”"},{"type":"paragraph","text":"文章谴责苏联修正主义领导集团“背叛了列宁的事业，搞起了资本主义复辟。”"},{"type":"paragraph","text":"文章指出：“毛泽东主席领导的共产党，从马克思列宁主义观点出发，提出了绝对防止中国社会向资本主义倒退的历史任务。”“无产阶级文化大革命是中国革命对马克思列宁主义宝库的又一贡献。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"efe1eedfee"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
