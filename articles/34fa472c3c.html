<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"不能让资产阶级思想乘虚而入","authors":["邓清田"],"dates":[{"year":1966,"month":4,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"不能让资产阶级思想乘虚而入"},{"type":"paragraph","text":"一九五九年，我们县男女篮球代表队，到一些县去访问比赛，场场获胜。开始时，大家兢兢业业，表现较好。到最后一场时，运动员中的个人主义思想暴露了，骄傲情绪露头，彼此争功，闹意见，上场队员认为自己和场下队员一样待遇，吃了亏。当时我想，反正最后一场了，不要搞得紧紧张张的，伤了和气不好，因此没有进行必要的思想教育。“千里之堤，溃于一穴”，从此，这个球队就迅速朝下坡路跑。他们认为自己球打得不错，应该得到更多的照顾。还认为，球是为县体委打的，只要打好球，就吃香，脑子里没有“政治”两字。教练员也公然对我说：“搞技术归我，政治归你，出了问题，我们叫你，你再来。”这样，比赛中哪能打出风格，赛出水平？哪能比赛得好？输了就怪场地、裁判、天气，甚至怪服装太旧等等。"},{"type":"paragraph","text":"一九六四年，专区分区赛在我县举行，我们虽也培养了些新手，但自己脑袋瓜有锦标主义思想，临比赛时，仍叫那些老运动员上场。他们表现得不够好，群众生气地说：“输了球不要紧，可不能输了人！”县委一针见血地指出，这是阶级斗争在体育队伍中的反映。从此，我们下决心突出政治，从一九六四年下半年起，在球队中展开了“为谁打球？”的讨论。讨论中大家摆问题，亮思想，互相批评帮助，新老队员都大吃一惊，认识到这种作风发展下去的危险性；又通过学习《纪念白求恩》、《为人民服务》等文章，提高了觉悟。他们说，明确了打球是为革命，太阳晒也不觉热，身上痛也不觉苦。从此，比赛中群策群力，快速勇猛，技术都能正常发挥，很自然地取得了较好的比赛成绩。去年男队在专区十四个队的比赛中，由一九五九年来的倒数第二名升到第七名。女队在十个队中名列第一。"},{"type":"paragraph","text":"以上这些经验教训，使我们懂得了：一、运动员要想打好球，必须突出政治，认真活学活用毛主席著作，改造主观世界，确立“为革命打球”的思想。二、领导干部要以身作则，有问题首先检查自己。三、经常抓运动员的活思想，不能因为没比赛，丢开不管，要深入到他所在的单位去了解他，帮助他。四、决不能搞锦标主义、搞物质刺激，那样，即便出点成绩，也只是昙花一现。只有人的思想革命化了，成绩才能不断巩固上升。"},{"type":"paragraph","text":"四川武隆县体委　邓清田"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"34fa472c3c"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
