":["中国“卡德尔”和“盖兹”","西北师范学院"],"dates":[{"year":1957,"month":6,"day":20}],"is_range_date":false,"parts":[{"text":"一封信——什么是“三害”的头？","type":"title"},{"text":"西北师范学院中国“卡德尔”和“盖兹”","type":"authors"},{"text":"一、","type":"subtitle"},{"text":"蛇无头不走，鸟无翅不飞，什么是“三害”的头？","type":"paragraph"},{"text":"中共党中央！","type":"paragraph"},{"text":"什么是“三害”的翅？","type":"paragraph"},{"text":"李坤之流的党棍。","type":"paragraph"},{"text":"二、","type":"subtitle"},{"text":"出师有名，收兵无名，谁是整风的发起人？","type":"paragraph"},{"text":"中国共产党","type":"paragraph"},{"text":"谁下“整风”的收兵令？","type":"paragraph"},{"text":"还是中国共产党","type":"paragraph"},{"text":"三、","type":"subtitle"},{"text":"上梁不正下梁歪，拍马来自党中央，","type":"paragraph"},{"text":"什么是大拍马？伏老过一地，耗财千万计！","type":"paragraph"},{"text":"什么是小拍马？党员一声响，是屁也变香！","type":"paragraph"},{"text":"四、","type":"subtitle"},{"text":"宗派本是党本色，大小没有法分别，","type":"paragraph"},{"text":"什么是大宗派？中共中央政治局！","type":"paragraph"},{"text":"什么是小宗派？徐劲为首的院领导！","type":"paragraph"},{"text":"五、","type":"subtitle"},{"text":"党与党，黑心肠，","type":"paragraph"},{"text":"国民党造成了，“宁错杀十人，不可放走一人”，","type":"paragraph"},{"text":"共产党造成了，“宁可错‘反’几十人，不可放走一人”，","type":"paragraph"},{"text":"实质有何区分？？？","type":"paragraph"},{"text":" 中国“卡德尔”和“盖兹”57．6．20．","type":"paragraph"},{"text":" 来源：《香花乎？毒草乎？(2)》（西北师范学院反右斗争委员会，1957年7月6日）。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cb83068cfb"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
