ar":1969,"month":10,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"智利工人展开斗争反对残酷剥削"},{"type":"paragraph","text":"智利国营铁路圣欧亨尼奥机械厂的两百名工人为要求增加工资而举行的罢工，已持续了一个多月。十六日罢工工人在从首都圣地亚哥开往南方的火车铁轨上设下障碍物，并且同前来镇压的反动警察展开了搏斗，使火车一度中断。圣地亚哥制革厂的两百名工人十五日举行罢工，并占领了工厂，要求恢复被无理解雇的工人的工作。同一天，康塞普西翁的一家家具厂一百名工人也举行罢工，要求改善生活待遇。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"16237b90e9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
