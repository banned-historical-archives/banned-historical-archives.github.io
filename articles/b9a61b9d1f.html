":[{"year":1967,"month":5,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编者按:《红旗》杂志编辑部和《人民日报》编辑部的文章《\u0026lt;修养\u0026gt;的要害是背叛无产阶级专政》发表以后，在广大革命群众中引起了强烈的反映，大家纷纷组织学习和讨论。"},{"type":"paragraph","text":"这篇重要文章击中了《修养》一书的要害，也击中了党内最大的走资本主义道路当权派的要害，通篇用摆事实、讲道理的方法，在一个革命的根本问题上，大破修正主义，大立毛泽东思想。在当前群众性的革命大批判的高潮中，这篇文章是广大革命群众的强大思想武器。"},{"type":"paragraph","text":"党内最大的走资本主义道路当权派，用心险恶，妄图通过《修养》这株大毒草，麻痹人民的革命斗志，瓦解无产阶级革命队伍，取消无产阶级专政，复辟资本主义。我们要反其道而行之，高举毛泽东思想伟大红旗，念念不忘无产阶级专政，抓住《修养》的要害问题，联系旧上海市委内最大的一小撮走资本主义道路当权派的罪行，联系本部门本单位的斗、批、改，彻底清算他们背叛无产阶级专政的罪行，进一步开展群众性的革命大批判运动，把无产阶级文化大革命进行到底。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"革命大批判","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b9a61b9d1f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
