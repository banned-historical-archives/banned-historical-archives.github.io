script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"解放军广州部队某团在学习中注意总结经验  坚持同资产阶级腐蚀作斗争","authors":[],"dates":[{"year":1975,"month":3,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"解放军广州部队某团在学习中注意总结经验"},{"type":"paragraph","text":"坚持同资产阶级腐蚀作斗争"},{"type":"paragraph","text":"据新华社广州电　人民解放军广州部队某团认真学习毛主席关于理论问题的重要指示，总结几年来开展反对资产阶级思想腐蚀的斗争经验，进一步提高了执行党的基本路线的自觉性。"},{"type":"paragraph","text":"这个团在一个海防城镇担任执勤任务，这里的阶级斗争比较尖锐。多年来，由于他们注意以党的基本路线作指导，狠抓意识形态领域里的阶级斗争，指战员们自觉抵制资产阶级思想的腐蚀和影响，受到了上级的表扬和人民群众的称赞。"},{"type":"paragraph","text":"团党委成员和干部、战士在讨论无产阶级专政的历史任务时，总结了几年来同资产阶级腐蚀和影响作斗争的经验。他们回顾了在复杂的阶级斗争中抵制资产阶级腐蚀和影响的战斗经历，深深感到努力学好无产阶级专政理论，坚持党的基本路线教育，是一条最重要的经验。许多连队干部说，马克思主义、列宁主义、毛泽东思想关于无产阶级专政的理论，是我们战胜资产阶级腐蚀和影响的最强大的思想武器，也是改造我们自己世界观最有力的武器。这个团的一连，为了抵制资产阶级思想的腐蚀，党支部带领干部战士认真看书学习，坚持党的基本路线教育，开展向“南京路上好八连”学习的活动，使干部、战士心明眼亮，一次又一次打退了资产阶级“糖衣炮弹”的进攻。指战员们从自己的斗争经历中体会到，只有用无产阶级专政的理论武装自己的头脑，牢记党的基本路线，才能看清阶级斗争的动向，保持高度的阶级警惕。"},{"type":"paragraph","text":"目前，这个团党委正在举办理论骨干学习班，推动全团的学习运动深入开展。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"468260e560"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
