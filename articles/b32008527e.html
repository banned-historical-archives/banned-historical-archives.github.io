tart":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"文艺不能当市场的奴隶（接版）","authors":[],"parts":[{"type":"paragraph","text":"（上接第一版）"},{"type":"paragraph","text":"言之无文，行而不远。不当市场的奴隶，在于静下心来、潜心钻研、开拓创新，创造出精品力作，把最好的精神食粮奉献给人民。艺术精品之所以“精”，就在于其思想精深、艺术精湛、制作精良。文艺工作者要自觉坚守艺术理想，不断提高学养、涵养、修养，加强思想积累、知识储备、文化修养、艺术训练，努力做到“笼天地于形内，挫万物于笔端”。要处理好义利关系，认真严肃地考虑作品的社会效果，讲品味，重艺德，为历史存正气，为世人弘美德，为自身留清名，努力以高尚的职业操守、良好的社会形象、文质兼美的优秀作品鼓舞人激励人。"},{"type":"paragraph","text":"先进军事文化是我军的政治优势和显著标志。军事文艺对于展示我军良好形象，巩固和提高部队战斗力，对于陶冶官兵情操、促进官兵全面发展，具有不可替代的重要作用，更应注重社会效益。无论是一首诗、一首歌，还是一部剧、一部影，都要说出官兵的心里话，写出官兵的真感情，让官兵发自内心地喜欢。军事文艺要坚持“姓军”“为兵”，讴歌军队现代化建设的伟大成就，讴歌广大官兵的崭新风貌，给官兵精神补钙、士气加钢、思想淬火，更加有效地激发起牢记强军目标、坚定强军信念、献身强军实践的热情。"}],"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b32008527e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
