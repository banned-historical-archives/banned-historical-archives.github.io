<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"落实毛主席指示不断提高路线斗争觉悟　 创造出更多更好的四好连队和五好战士上海警备区召开连队政治工作会议交流创造四好连队的新经验","authors":["劲宣东"],"dates":[{"year":1968,"month":10,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　最近，中国人民解放军上海警备区召开了连队政治工作会议。来自“三支”“两军”第一线和生产、施工、训练、执勤等战斗岗位上的干部、战士，认真学习毛主席的建军思想和林副主席关于加强基层建设的指示，总结交流在文化大革命中开展创造四好连队运动的新成就、新经验。大家决心以更大的干劲、更新的姿态，为培养更多无限忠于毛主席的五好战士和创造更多“三忠于”的四好连队而奋斗!"},{"type":"paragraph","text":"到会代表认真总结了文化大革命以来开展四好连队运动的基本经验，一致认为，在新形势下创四好连队的经验有千条万条，最根本的一条就是要落实毛主席的一系列最新指示，不断提高部队的路线斗争觉悟。"},{"type":"paragraph","text":"毛主席教导我们:“不是东风压倒西风，就是西风压倒东风，在路线问题上没有调和的余地。”大家认为，路线斗争贯穿一切领域。每个干部和战士天天在路线斗争中站队，时时在路线斗争中“亮相”。在创造四好连队运动中，“创”与不“创”、用什么思想去“创”、是突出无产阶级政治还是突出军事、以及如何正确处理政治思想好与其他三好的关系等，都存在着两条路线的斗争。"},{"type":"paragraph","text":"大家深深感到，落实毛主席最新指示，不但要强调“快”，还要强调“好”。为此，首先要发扬毛主席亲自倡导的理论联系实际的革命好学风，毛主席怎么指示，我们就怎么照办，对毛主席指示做到“快学快传不误点，联系实际狠抓用，反复实践不放松”。毛主席教导我们:“掌握思想教育，是团结全党进行伟大政治斗争的中心环节。如果这个任务不解决，党的一切政治任务是不能完成的。”大家认为，贯彻落实毛主席最新指示的过程，对于各级领导来说，就是深入艰苦地、耐心细致地做思想政治工作的过程。思想工作抓得紧不紧、深不深、细不细，是检验领导工作是否过硬，作风是否扎实，对毛主席最新指示的贯彻是否认真的一把尺子，是毛主席最新指示能否全面落实的重要关键。在贯彻落实毛主席教育革命的最新指示，在军事训练中取得了出色成绩的某部摩托三连，由于狠抓思想政治工作，调动了广大战士的积极性，大大改进了摩托车训练，缩短了训练驾驶员的时间，这就是一个很好的证明。"},{"type":"paragraph","text":"到会同志认真总结了在贯彻落实毛主席最新指示过程中抓活思想的经验，一致认为:“千头万绪就是要破私。”大家深深体会到，随着斗、批、改高潮的来到和深入，公和私两种世界观的斗争已进入到“二百米的地段”，短兵相接，水火不容。要在阶级斗争的大风大浪中看得清，跟得紧，站得稳，就必须狠抓破私立公，加强世界观的改造。“南京路上好八连”的经验证明，在阶级斗争的大风大浪中炼忠心、创四好，必须以更高的要求、更新的标准加速世界观的改造，使干部、战士胸中有“纲”有“线”，把忠不忠于毛主席的革命路线，执行不执行毛主席的最新指示作为检验破私立公，改造世界观的一把尺子。"},{"type":"paragraph","text":"毛主席教导我们:“政治路线确定之后，干部就是决定的因素。”大家深深感到，连队的干部班子，是带领连队前进的火车头。因此，“抓好一个连，首先要抓好连队干部这个‘班’。”在反革命修正主义分子罗瑞卿的“大比武”妖风影响下，连续三年未评上四好的某部高机连，在文化大革命新形势的鼓舞下，把提高干部的路线斗争觉悟，加强干部的思想革命化列为党支部的首要任务。连队干部齐心协力，带领全连战士创四好，“一班红”带动了“一连红”，去年又重新跃人了四好行列。"},{"type":"paragraph","text":"(劲宣东)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"name":"教育革命","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2beed74a92"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
