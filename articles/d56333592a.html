ical-archives/banned-historical-archives8/main/maoquanji10.pdf"],"article":{"title":"致王橡祥电","alias":"","parts":[{"type":"paragraph","text":"致王稼祥电！"},{"type":"paragraph","text":"（1937年7月14日）"},{"type":"paragraph","text":"你在上海写的信收到了。闻你已到目的地，不胜欢慰。身体如何？日军大举进攻华北，红军准备开动，赴前线协同作战。八号我党发布宣言，主张坚决抗战，保卫平津，红军将领亦有通电，大得各方欢迎。华北、上海及各地救亡运动正大起来，我们正令各地组织统一战线机关。恩来、博古、伯渠已到庐山数日，谈判抗战方针与亲密合作。"},{"type":"paragraph","text":"[1]这是毛泽东致红军总政治部主任王稼祥电的主要内容。王稼祥于1937年年初离开延安去苏联治病，同年11月任中共驻共产国际代表。"},{"type":"paragraph","text":"[2]恩来、博古、伯渠，即周恩来、秦邦宪、林伯渠。秦邦宪、林伯渠"}],"authors":["毛泽东"],"dates":[{"year":1937,"month":7,"day":14}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":413,"page_end":413},"tags":[{"name":"毛泽东","type":"人物"},{"name":"博古","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d56333592a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
