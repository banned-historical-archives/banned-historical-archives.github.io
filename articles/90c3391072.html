script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"法国资本家敲骨吸髓  青年工人处境如奴隶","authors":[],"dates":[{"year":1958,"month":3,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"法国资本家敲骨吸髓  青年工人处境如奴隶"},{"type":"paragraph","text":"新华社30日讯　法国共产主义青年联盟全国执行局委员安德烈·马缪不久以前在“新法兰西”周刊发表文章，揭露了法国资本家对青年的残酷剥削。"},{"type":"paragraph","text":"作者说：通过学徒合同进行隐蔽的掠夺，在法国已经是司空见惯的事。例如，云纳省一个十四岁的小学毕业生在一家饭馆里当“学徒”，每天工作十三小时至十五小时。由于工作十分紧张，他只能用十分钟的时间匆忙吃饭。又如在南特“西姆卡”汽车工厂分厂当学徒的罗歇，虽然见习期已经满，并且已经同每小时挣两百个法郎工资的工人作同样的工作，但是他只能拿到每小时五十多个法郎的工资。"},{"type":"paragraph","text":"老板们还通过按年龄的工资差异制度对青年进行掠夺。十九岁的马克司已经从工业学校毕业，是个熟练工人，能够同每小时拿二百五十个法郎的成年工人同样工作。但是，他每小时只能拿到一百四十八个法郎。仅在一个月里，老板通过按年龄的工资差异制度就从他身上掠夺了两万一千六百七十一个法郎。"},{"type":"paragraph","text":"法国工厂和矿山中劳动条件的恶劣、安全设施的缺乏以及漫长的血汗劳动给青年带来灾难。不少青年工人因为矿井塌陷和爆炸事故而死亡，还有从高处摔下身死的，被钢板压死的……多得一点工资，十八岁的青年每天不得不十分紧张地工作十一小时。过分工作使得他们筋疲力尽，未老先衰。"},{"type":"paragraph","text":"马缪指出，这种令人不能忍受的状况使得许多青年参加了斗争的行列。他们要求同工同酬、减少工作时间、改善劳动条件和废除血汗制度。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"90c3391072"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
