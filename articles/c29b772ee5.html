ical-archives/banned-historical-archives8/main/maoquanji17.pdf"],"article":{"title":"给王中的信","alias":"","parts":[{"type":"paragraph","text":"给王中\"的信"},{"type":"paragraph","text":"（1943年1月10日）王中同志："},{"type":"paragraph","text":"你送来的材料很有用。这是小集体生产与个人生产，我还要整个敌工委的“一九四二年的生产总结与一九四三年的生产计划”，以便看出全般情形，请通知有关同志在十天内外做好交我。做这个总结与计划时，应包括（一）全机关生产，（二）小集体生产，（三）个人生产，当然主要的是全机关生产。其中要指出成绩，又要指出缺点，要有自我批评。"},{"type":"paragraph","text":"敬礼！"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一月十日你的意见，希望以后对我谈一下。"},{"type":"paragraph","text":"[1]王中（1906一1981)，浙江余姚人，当时在中共中央敌区工作委员会负责行政管理工作。"}],"authors":["毛泽东"],"dates":[{"year":1943,"month":1,"day":10}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":483,"page_end":483},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c29b772ee5"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
