ical-archives/banned-historical-archives0/main/maoquanji48.pdf"],"article":{"title":"对越南南方领导人接见我新闻工作队的谈话纪要的批语","alias":"","parts":[{"type":"paragraph","text":"对越南南方领导人接见我新闻工作队的谈话纪要的批语"},{"type":"paragraph","text":"（1965年11月）江青阅，退毛存。"},{"type":"paragraph","text":"二"},{"type":"paragraph","text":"要送蚊帐、布匹、罐头、肉松、药品、雨布、吊床等物资去。并要大量地送。"},{"type":"paragraph","text":"[1]指外交部办公厅1965年11月6日印发的文件《越南南方领导同志接见我赴南越新闻工作队的谈话纪要》。这个纪要有三件：一、越南南方中央局书记长山1965年8月31日接见我赴南越新闻工作队的谈话纪要；二、越南南方中央局副书记、中部地区书记武至公1965年3月和4月两次接见我赴南越新闻工作队的谈话纪要；三、武至公接见我赴南越新闻工作队的谈话全文（1965年6月整理）。这个谈话全文包括12个问题和2个附件：（一）南方革命的目标和基本方向；（二）人民武装力量情况。最后是记者附注的情况，其中讲了部队的编制、装备、战斗力和供应情况等。"},{"type":"paragraph","text":"对越南南方领导人接见我新闻工作队的谈话纪要的批语"},{"type":"paragraph","text":"[2]这个批语是针对记者附注中所说的以下情况而写的：中部中区山区主力部队供应比较困难，山区地广人稀，当地少数民族生活不富裕，很少副食品，不种蔬菜，战士们一般没有副食吃，白饭加盐巴（盐每月每人供应半公斤，从平原运盐进山全靠人力背，很困难），有时吃些野菜（因为人多，野生东西也很快吃光了），营养不足。战士们常年露营森林，雨多潮湿，日夜温差大，没有房屋、吊床、雨布过夜，蚊子特别多，许多战士没有蚊帐。由于营养不良，蚊虫猖獗，战士们发疤疾很多，预防和医治的药品又很少。按规定战士每年供应一套衣服，但有些部队不能保证。这样，使战士们的健康受到了一定影响。"}],"authors":["毛泽东"],"dates":[{"year":1965,"month":11}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":242,"page_end":243},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"对话"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cdc0cb301e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
