<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"毛主席论“纸老虎”的几个历史时期　(四)(解放战争时期)　一切反动派都是纸老虎","authors":[],"dates":[{"year":1958,"month":11,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"1946年8月"},{"type":"paragraph","text":"1945年9月2日，日本帝国主义无条件投降，中国抗日战争和第二次世界大战胜利结束，中国和世界都进入了一个新的历史时期。"},{"type":"paragraph","text":"当抗日战争进入最后阶段的时候，1945年8月9日，毛主席向全国人民发出“对日寇的最后一战”的号召，同时也指出，“全国人民必须注意制止内战危险”。然而抗日战争结束以后，在美帝国主义的鼓励和嗾使下，蒋介石集团准备内战愈来愈疯狂。1946年6月14日，美国国务卿贝尔纳斯向美国参议院提出“军事援华法案”，大量供应蒋介石军队各种装备。蒋介石得到美帝国主义这种积极的支持，更不顾死活地加紧部署全面发动反人民的内战。同月26日，蒋介石军队大举进攻鄂东和豫南地区的中原人民解放军，这是蒋介石在美国支持下发动全面内战的一个严重信号。"},{"type":"paragraph","text":"中共中央在1946年7月7日发表纪念“七七”9周年宣言，在分析了蒋介石集团和美帝国主义对中国人民的进攻以后，提出四项主张:(一)无例外、无条件、无限期的停止冲突；(二)重开政治协商会议；(三)实行复员裁兵；(四)要求美国停止干涉内政，停止助长中国内战。宣言并且提出严重警告说:“如果贪得无压的反动派一定要挑战，那末，就让我们准备着把一切敢于挑战的反动派打回去!”但是，蒋介石集团依然执迷不悟，竟调派50万军队，在安徽来安至江苏南通的800里战线上，向苏皖解放区大举进攻，全面发动反人民的内战。8月16日，延安“解放日报”发表社论，号召全解放区紧急动员起来，粉碎蒋介石的进攻，中国人民解放战争至此正式展开。"},{"type":"paragraph","text":"1946年8月，毛主席在延安接见美国记者斯特朗，发表了关于一切反动派都是纸老虎的著名论点。指出:“原子弹是美国反动派用来吓人的一只纸老虎，看样子可怕，实际上并不可怕。”“一切反动派都是纸老虎，看起来，反动派的样子是可怕的，但是实际上并没有什么了不起的力量。”“蒋介石和他的支持者美国反动派也都是纸老虎。……但是美国反动派也将要同一切历史上的反动派一样，被证明为并没有什么力量。”因为:“决定战争胜败的是人民，而不是一两件新式武器。”“真正强大的力量不是属于反动派，而是属于人民。”虽然，在解放战争刚刚展开的初期，敌人在物质力量方面处于优势地位，毛主席明确指出，美蒋反动派必将失败:“我们所依靠的不过是小米加步枪，但是历史最后将证明，这小米加步枪比蒋介石的飞机加坦克还要强些。……这原因不是别的，就在于反动派代表反动，而我们代表进步。”毛主席的这一精辟分析，不到三年就得到了完全的证实，貌似强大实际虚弱的敌人，包括美帝国主义和蒋介石，被一起赶出了中国大陆。"},{"type":"paragraph","text":"不为一切反动派表面上的虚张声势所迷惑，而从本质上看清它不过是纸老虎，才能大大地增强我们的斗争信心和勇气，从胜利走向胜利。毛主席的这个英明论断，就是我们战胜帝国主义和一切反动派的最锐利的思想武器。　(四)"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ca204057f3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
