r":1949,"month":9,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北平十九日电】　中共中央毛主席十五日致电祝贺法国共产党中央政治局委员，人道报总编辑加香(前译加善)八十岁寿辰。电文如下:亲爱的马赛·加香同志和法国共产党中央委员会亲爱的同志们:"},{"type":"paragraph","text":"我们中国共产党中央委员会热烈地庆祝加香同志的八十大寿。"},{"type":"paragraph","text":"加香同志是十九世纪末叶以来的法国革命工人运动和法国人民爱国民主运动的活的象征。加香同志对于无产阶级国际主义的忠诚，对于法苏人民的友谊的忠诚，对于中国人民和其他被压迫民族解放运动的热烈同情，不但是法国工人阶级的骄傲，而且是国际工人阶级的共同的骄傲。"},{"type":"paragraph","text":"祝加香同志健康，向加香同志和以多列十同志为首的法国共产党中央致兄弟的敬意。"},{"type":"paragraph","text":"中国共产党中央委员会主席毛泽东"},{"type":"paragraph","text":"一九四九年九月十五日"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"213cbf01b3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
