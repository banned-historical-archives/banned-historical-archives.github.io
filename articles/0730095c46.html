<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"要算剥削账","authors":[],"dates":[{"year":1968,"month":11,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"要算剥削账"},{"type":"paragraph","text":"广西玉林县新桥公社五金小学的教师们，在研究算术教材如何进行改革的问题上碰到了困难。有的教师怕犯错误，说是没有经验，主张等上级去改。有的教师则认为：算术算术，加减乘除反正少不了，改不改问题不大。大家意见纷纷，得不出一个结果。"},{"type":"paragraph","text":"学校管理委员会副主任、老贫农周承时坐在旁边一边听一边想，越听越感到这种吃“现成饭”和“炒旧饭”的思想不对头。这样下去，学校的教育革命怎能搞彻底，毛主席的无产阶级教育路线怎能得到贯彻。他联想到过去有些高小毕业生，回到生产队不想当会计，更看不起体力劳动，越想越痛恨叛徒、内奸、工贼刘少奇的反革命修正主义教育路线，越想越感到毛主席“教育要革命”的教导无比英明、无比正确。旧教育制度不彻底改革，贫下中农的后代就会变修，国家就会改变颜色。想到这里，他决心帮助教师们端正态度，搞好算术教学的改革。"},{"type":"paragraph","text":"算术教学改革究竟怎么搞才好？"},{"type":"paragraph","text":"周承时怀着激动的心情，把自己的想法告诉了大家。他说：“在旧社会，地主的算盘子一响，劳动人民就遭殃，我们长年累月辛辛苦苦地干活，到头来还是竹篮子打水一场空，遇到荒年还得卖儿卖女。这些‘剥削账’要让孩子们知道，教他们经常算。今天，在毛主席的英明领导下，我们过上了幸福生活，这些‘翻身账’，也要教孩子们算，才能不忘今日的甜。过去，这些‘账’算术书上是没有的，今天我们就要添上去。”"},{"type":"paragraph","text":"周承时还说：“我们要教学生学加减乘除，但是更重要的是要在思想上教育他们不忘阶级苦，牢记今日甜，永远做忠于毛主席的好学生。”"},{"type":"paragraph","text":"老贫农周承时的一席话，深深地教育了教师，大家从内心里赞成他的意见，并联系自己的思想，狠批了修正主义教育路线对自己的毒害，提高了阶级斗争和两条路线斗争的觉悟。"},{"type":"paragraph","text":"在老贫农周承时的指导、帮助下，五金小学全校革命教师，一心为培养无产阶级革命事业接班人着想，一心为捍卫毛主席的无产阶级教育路线出力，很快地编写出了突出毛泽东思想的、结合当地实际的算术教材。用新教材教学，使学生们既学了算术，又受到了深刻的阶级教育，学生们从幼小的时候起，就仇恨旧社会，仇恨剥削阶级，热爱新社会，热爱伟大领袖毛主席。"},{"type":"paragraph","text":"新华社通讯员"},{"type":"paragraph","text":"新华社记者"},{"type":"paragraph","text":"（本报略有删改）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"教育革命","type":"主题/事件"},{"name":"两条路线斗争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0730095c46"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
