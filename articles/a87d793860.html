tart":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"同意毛泽东同志提出的关于他不作下届中华人民共和国主席候选人建议的决定这完全是一个积极的建议；这样做对于全党和全国人民都更有利；毛泽东同志今后仍然是全国各族人民的领袖；","authors":[],"parts":[{"type":"paragraph","text":"这完全是一个积极的建议。这样做对于全党和全国人民都更为有利。毛泽东同志今后仍然是全国各族人民的领袖。"},{"type":"paragraph","text":"新华社17日讯 中国共产党八届六中全会同意毛泽东同志提出的关于他不作下届中华人民共和国主席候选人的决定"},{"type":"paragraph","text":"1958年12月10日"},{"type":"paragraph","text":"几年以来，毛泽东同志曾经多次向中央提出，希望不再继续任中华人民共和国主席的职务。中央全会在经过充分的、多方面的考虑以后，决定同意毛泽东同志这个提议，在第二届全国人民代表大会第一次会议上，不再提他作华人民共和国主席的候选人。中央全会认为，这完全是一个积极的建议。因为毛泽东同志不担任国家主席的职务，党中央的主席，可以使他更能够集中精力来处理党和国家的方针、政策、路线的总问题，也有可能使他腾出较多的从事马克思列宁主义的理论工作，而并不妨碍他对于国家工作继续发挥领导作用。这样，对于全党和全国人民都更利。毛泽东同志是全国各族人民衷心爱戴的久经考验的领袖，在他不可再担任国家主席的职务以后，他仍然是全国各民的领袖。在将来，如果出现某种特殊情况需要他再担这种工作的时候，仍然可以根据人民的意见和党的决定，再他担任国家主席的职务。各级党委应当根据这些理由，在党的适当会议上，在各级人民代表大会会议上，在工矿企人的集会上，在人民公社的集会上，在机关、学校、部队的集会上，向党内党外的干部和群众进行充分的解释，以便大家了解这件事的理由，而不致有所误解。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a87d793860"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
