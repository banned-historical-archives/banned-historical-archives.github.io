":[],"dates":[{"year":1994,"month":6,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京5月31日电　《胡乔木回忆毛泽东》一书即将由人民出版社出版。"},{"type":"paragraph","text":"据悉，九十年代初，胡乔木开始着手撰写这本书。他逝世后，原来协助他工作的编写组采取将这本书分为“谈话录”和“初拟稿”两部分的方式继续编辑完成。“谈话录”部分是胡乔木关于撰写这本书的十多次谈话的记录。“初拟稿”部分是编写组根据胡乔木的要求撰写的十九篇文稿。"},{"type":"paragraph","text":"这些谈话和文稿涉及四十年代毛泽东的思想和活动的许多重要方面。有关的题目有:皖南事变和打败第二次反共高潮的总结，陕甘宁边区的政治经济建设，苏德战争、太平洋战争与中国政局，延安整风运动，党的历史决议，抗战后期延安的外交活动，重庆谈判，解放日报和新华社工作，1947年在陕北，人民大革命胜利前夕，等等。这本书是一本有较高理论价值和文献价值的回忆录。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"胡乔木","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"db389c034f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
