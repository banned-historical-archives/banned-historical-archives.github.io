通讯社社长一致强调要进一步加强团结，为反对帝国主义、各国反动派和现代修正主义而共同斗争","authors":[],"dates":[{"year":1963,"month":10,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京5日电】　新华通讯社今天晚间举行全体工作人员大会，热烈地欢迎国际无产阶级新闻战线上的亲密战友——阿尔巴尼亚、朝鲜和越南三个兄弟国家的通讯社代表团。"},{"type":"paragraph","text":"当三个代表团的全体同志来到会场时，全场起立，热烈鼓掌欢迎。新华社工作人员代表向他们献了鲜花。"},{"type":"paragraph","text":"在充满了战友间的无限欢乐和团结气氛的大会上，新华社社长吴冷西首先讲话，他向来自社会主义阵营西南前哨、东方前哨和东南前哨的三个坚持真理、传播真理的兄弟通讯　社的同志们，表示最热烈的欢迎。三个代表团的团长:阿尔巴尼亚通讯社社长阿耶特·西米季乌，朝鲜中央通讯社社长裴基浚，越南通讯社社长黄俊，先后发表了热情洋溢的讲话。吴冷西和三位兄弟国家通讯社社长在讲话中一致强调，中、阿、朝、越四个社会主义兄弟国家的通讯社今后将进一步加强团结，亲密合作，为反对帝国主义、各国反动派和现代修正主义，保卫世界和平，增进社会主义阵营和国际共产主义运动的团结，支持全世界被压迫人民和被压迫民族的解放运动，为传播马克思列宁主义真理和捍卫马克思列宁主义的纯洁性而共同斗争。他们的讲话，在会场上激起了一阵又一阵极其热烈的掌声。"},{"type":"paragraph","text":"新华社副社长朱穆之、邓岗、穆青，以及各个编辑部和行政部门的负责人，都出席了欢迎大会。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8e3e5b347e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
