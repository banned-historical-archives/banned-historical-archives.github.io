art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛主席用过的锁","authors":["晓白"],"parts":[{"type":"paragraph","text":"这是毛主席在古田时用过的锁。"},{"type":"paragraph","text":"1929年初，毛主席率领红四军主力转战赣、粤、闽边界，开辟了新的革命根据地。12月，来到福建省上杭县古田镇，在这里召开了红军第四军第九次党代表会议，这就是我军建军史上著名的“古田会议”。毛主席当时为大会起草的“古田会议决议”成了永远照耀我们人民军队前进的指路明灯。"},{"type":"paragraph","text":"在频繁的游击战争中，毛主席除了简单的行装外，别无所有，保存到今天的这把铁锁，是毛主席在第二次国内革命战争时期留下来的最早的纪念品，现在是革命军事博物馆里陈列的最珍贵的革命文物之一。"},{"type":"paragraph","text":"在古田，警卫员给毛主席领到一只樟木箱，毛主席除了用这只木箱装文件外，还当办公桌用，这把锁就挂在那只大木箱上。当要离开古田时，同志们都想把这只木箱带走，为了轻装，主席没有同意。当晚，主席把木箱里的东西都翻出来，里边装的完全是战士们的意见书、连队思想材料及主席跟指战员谈话的记录手稿，仅仅从这个小事，就可以想见主席当时写“古田决议”，是花了多么大的精力来进行深入细致的调查研究工作的。在焚烧前，主席又把许多重要的信件材料重阅了一遍。"},{"type":"paragraph","text":"这把古田之锁，至今已有三十多个年头了，锁上已经上了锈，可是毛主席艰苦朴素的工作作风和深入群众、调查研究的精神，却永远闪耀着光芒。（晓白）"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"49dce3701d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
