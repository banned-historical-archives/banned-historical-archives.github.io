script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反对垄断资本剥削的斗争扩及重要工业部门  西德数万钢铁煤矿造船工人举行罢工  工人们冲破黄色工会头子的束缚使反动统治集团十分惊慌","authors":[],"dates":[{"year":1969,"month":9,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反对垄断资本剥削的斗争扩及重要工业部门"},{"type":"paragraph","text":"西德数万钢铁煤矿造船工人举行罢工"},{"type":"paragraph","text":"工人们冲破黄色工会头子的束缚使反动统治集团十分惊慌"},{"type":"paragraph","text":"新华社波恩十二日电　西德工人连日来广泛展开反对垄断资本剥削、要求提高工资和改善劳动条件的罢工斗争，使西德统治集团十分惶恐。"},{"type":"paragraph","text":"西德工人这次罢工斗争的浪潮，是在九月初掀起的。斗争此伏彼起，波及钢铁、采煤、造船等重要工业部门。"},{"type":"paragraph","text":"在不来梅和奥斯纳布吕克，属于西德克勒克内财团的两个冶炼厂的一万余名工人，从四日开始就举行罢工，直到十二日仍在坚持斗争，使这两个厂的生产完全陷于停顿。"},{"type":"paragraph","text":"西德重要工业中心和产煤区鲁尔和萨尔的三万名煤矿工人，连日来举行了罢工和示威游行。在萨尔州首府萨尔布吕肯，数以千计的矿工在十日和十一日分别到萨尔煤矿管理处和黄色工会头子的办公处举行示威，高呼口号，要求增加工资和改善劳动条件。工人们还高呼：“工会出卖我们！”以谴责黄色工会头子的叛卖行径。部分示威者还冲进了这两个机构的建筑物里。在鲁尔区，九日起开始罢工的一万余名矿工十日在多特蒙德市举行示威，有的矿工愤怒地谴责黄色工会头子是叛徒。"},{"type":"paragraph","text":"在西德北部港口基尔市，七千五百名造船工人十日开始罢工，目前仍坚持斗争。三千余名工人十一日在市内举行了游行示威。"},{"type":"paragraph","text":"西德工人摆脱黄色工会头头的束缚，自己起来罢工，这使得西德垄断资本统治集团非常不安。垄断资产阶级的头面人物和黄色工会头头纷纷惊呼：罢工“象浪潮一样席卷全西德”，“局势是严重的”。西德政府十日在内阁会议上也专门就这种局势进行了“讨论”，当天晚上，总理基辛格亲自发表电视讲话，气急败坏地叫嚷“制止这种非法的自发性罢工是绝对必要的”，并且抬出什么“共产主义宣传”，什么“极端势力在企图插手这次自发性罢工”等等论调，企图威胁罢工工人，并为进行镇压制造借口。但是，工人阶级是吓不倒、压不服的。西德资产阶级报纸承认，这次罢工浪潮的掀起，是西德这些行业的工人心中的“愤怒长期郁积的结果”；而在其他部门，“同样的骚动正在酝酿，有可能危险地爆发出来”。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bd7834b8d3"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
