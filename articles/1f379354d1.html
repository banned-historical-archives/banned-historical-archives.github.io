art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"工农兵是掌握毛泽东思想的主人","authors":["沈兆全"],"parts":[{"type":"paragraph","text":"某些所谓“权威”诬蔑庄家富和周信礼同志的文章是“庸俗化”、“简单化”、“实用主义”的典型，这是别有用心的，他们是站在资产阶级、修正主义的立场上，竭力反对毛泽东思想，反对我们工农兵活学活用毛主席著作。"},{"type":"paragraph","text":"毛泽东思想和资产阶级思想是水火不相容的。我们掌握了毛泽东思想，就会站得高，看得远，就会辨别哪是香花哪是毒草，就会抵制资产阶级思想的侵蚀，同资产阶级思想进行坚决的斗争。这些资产阶级“权威”老爷们竭力反对我们活学活用毛主席著作，就是要大量地散布他们的毒草，好在思想上叫我们中毒，达到他们实现资本主义复辟的目的。这是多么阴险毒辣的手段！"},{"type":"paragraph","text":"我要正告某些所谓“权威”们，现在是工农兵掌握毛泽东思想的时代，我们工农兵已经成为掌握毛泽东思想的主人，你们的阴谋是永远不会得逞的。当前发起的这场向反党反社会主义黑线的反攻，已经充分显示出工农兵活学活用毛主席著作的强大威力。我们要坚决捍卫伟大的毛泽东思想。谁要反对毛泽东思想，我们就和他进行坚决的斗争！"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1f379354d1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
