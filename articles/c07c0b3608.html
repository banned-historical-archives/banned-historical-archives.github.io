art":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"青山常在——献给刘少奇同志","authors":["李增山"],"parts":[{"type":"paragraph","text":"春天里一切都在复苏更生，"},{"type":"paragraph","text":"那绿色的希望再也不是一团梦，"},{"type":"paragraph","text":"春雨淅沥，也洗净了一座山峰，"},{"type":"paragraph","text":"它再不是满面蒙尘。"},{"type":"paragraph","text":"在恢复了真面目的大山面前，"},{"type":"paragraph","text":"战士的喜泪打湿了歌声——"},{"type":"paragraph","text":"虽然年青的新兵并不知那悲剧的始末，"},{"type":"paragraph","text":"昭雪书却一样地掀动着纯洁的心灵！"},{"type":"paragraph","text":"我们知道，大山隐去时，"},{"type":"paragraph","text":"——历史进入了雾季；"},{"type":"paragraph","text":"谬误的胸脯挺得老高老高，"},{"type":"paragraph","text":"而真理的双足却陷入了泥泞。"},{"type":"paragraph","text":"但历史诚实地讲述给我们："},{"type":"paragraph","text":"那拨开江汉迷雾的大手，"},{"type":"paragraph","text":"那顶过满洲风雪的肩胛，"},{"type":"paragraph","text":"那花明楼的歌、安源矿的灯……"},{"type":"paragraph","text":"人心是一架高精度的天平，"},{"type":"paragraph","text":"能称出他的功劳有多么重；"},{"type":"paragraph","text":"青山巍巍，那确是立在大地上呵，"},{"type":"paragraph","text":"人心不死，青峰不会倒倾！"},{"type":"paragraph","text":"所能告慰他的实在太多太多，"},{"type":"paragraph","text":"最要紧的还是继续他未尽的前程，"},{"type":"paragraph","text":"在斗争里，做一名坚守真理的勇士，"},{"type":"paragraph","text":"重温《修养》，做党的一名合格的士兵。"},{"type":"paragraph","text":"感谢实事求是的党呵，"},{"type":"paragraph","text":"使青山又立在我们眼前，我们心中！"},{"type":"paragraph","text":"只要革命似这样脚踏实地地前进，"},{"type":"paragraph","text":"今天的预言定会成为明天的美景。"},{"type":"paragraph","text":"信念，在坚实的地面上滋长，"},{"type":"paragraph","text":"力量，在舒畅的心头产生，"},{"type":"paragraph","text":"战士衷心祝愿：青山再不遭雾锁，"},{"type":"paragraph","text":"春光再不受寒凝……"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c07c0b3608"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
