:["岳安良","张博恩","徐鸿章","河南农学院","贺钟麟","陈宝权"],"dates":[{"year":1957,"month":5}],"is_range_date":false,"parts":[{"text":"右派言论——歪曲统购统销政策","type":"title"},{"text":"河南农学院贺钟麟徐鸿章陈宝权岳安良张博恩","type":"authors"},{"text":"贺钟麟（植保教研组副教授）：统购统销政策把食粮卡得太紧了，因而有些县的农民都闹社。","type":"paragraph"},{"text":"徐鸿章（农60级学生）：实行统购统销政策后，给留的粮食太少了，所以生活较前大为下降，人们饿得很厉害，现在都没气力了。","type":"paragraph"},{"text":"陈宝权（林59级学生）：实行粮食统购统销，就是叫人买粮困难。","type":"paragraph"},{"text":"岳安良（农58级学生）：群众终年动劳不得一饱，这就是实行粮食统购统销的好处。","type":"paragraph"},{"text":"张博恩（农60级学生）：统购统销后，我家粮食不够吃，有些人不说实话，粮食明明不够吃，但却硬说够吃。布也统销，布票发的又不好用，真麻烦。","type":"paragraph"},{"text":"赵书训（农60级学生）：实行粮食统购统销以后，又规定定量定食，把人都饿瘦了，不信请看我在淮阳中学时的照片。","type":"paragraph"},{"text":"卢锟（农59级学生）：我家每月粮食只够吃二十天，其余都得到街上买着吃。","type":"paragraph"},{"text":"白宜川（农58级学生）：黑市粮价多高都可以，因为这是周瑜打黄盖，一家愿打一家愿挨，政府不应多管。","type":"paragraph"},{"text":" 来源：《右派言论选辑》（河南农学院，1957年12月）。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7d82b20c7c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
