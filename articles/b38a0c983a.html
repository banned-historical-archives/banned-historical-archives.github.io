script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoistlegacy.de-2383","name":"杨尚昆、余秋里同志在接见中央军委派出的第一批联络员小组成员时的讲话（摘录）","author":"全军整党办公室","internal":false,"official":false,"type":"unknown","files":[],"article":{"title":"杨尚昆、余秋里同志在接见中央军委派出的第一批联络员小组成员时的讲话（摘录）","dates":[{"year":1984,"month":2,"day":17}],"is_range_date":false,"authors":["全军整党办公室"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"成都军区整党办公室, 清理“三种人”工作文件摘编, 62-64","tags":[{"name":"第三梯队","type":"主题/事件"},{"name":"军队","type":"主题/事件"},{"name":"平反","type":"主题/事件"},{"name":"三种人","type":"主题/事件"},{"name":"杨尚昆","type":"主题/事件"},{"name":"余秋里","type":"主题/事件"},{"name":"整党","type":"主题/事件"}],"parts":[{"type":"title","text":"杨尚昆、余秋里同志在接见中央军委派出的第一批联络员小组成员时的讲话（摘录）"},{"type":"subtitle","text":"（一九八四年二月十七日下午）"},{"type":"subtitle","text":"余秋里同志讲话摘录"},{"type":"paragraph","text":"五是要认真、扎实地做好纯洁组织，特别是清理“三种人”的工作。"},{"type":"paragraph","text":"这件事很重要，是保证整党不走过场的一个重要标志，一定要抓紧抓好。但要少讲多做。清理“三种人”，要按照小平、陈云同志的指示，着重注意那些造反起家，比较年轻，潜伏下来的，对党危害大的人。在进行这项工作时，要坚持实事求是，把工作做的扎实细致，既不漏掉，又不扩大化。"},{"type":"paragraph","text":"一个地区、一个单位，“文化大革命”中分成两派。在清查“三种人”时，要注意防止派性干扰。不要轻易表态。应当看到，两派当中绝大多数人是好的，但也有不好的，可能有“三种人”。领导同志要按照党的原则处理两派问题，一定要客观，要公正，否则，搞不好可能会引起派性，还可能造成新的冤假错案。这个问题要清醒，不要偏激，我们一偏激，就要出毛病。"},{"type":"paragraph","text":"联络员小组下去以后，要注意收集一些典型案例，并注意研究一些政策界限，向中央军委提出建议。"},{"type":"paragraph","text":"在清理“三种人”的同时，要加强第三梯队的选拔和培养。这是领导班子建设上的战略问题。整党是考察、了解干部很好的时机，要有意识地在整党中发现人才，并在实践中考察和锻炼他们，然后，选拔到各级领导岗位上去。要选拔能起模范作用，有艰苦奋斗精神、先人后己精神的同志。"},{"type":"paragraph","text":"杨尚昆同志讲话摘录"},{"type":"paragraph","text":"……"},{"type":"paragraph","text":"不要一哄而起，一定要实事求是，要稳当。比如，我们接到不少信告发“三种人”，写信是每个公民的权利，但是不是“三种人”，一定要经过周密的调查，细致的分析，才能定性。现在有不少这样的信，有些没有根据，是道听途说的，甚至有少数人是在造谣。这一点，你们无论如何要冷静，不能人云亦云。不可偏听偏信，方法就是调查研究和谈心。这次下去的都是老同志，到哪里都有熟人，都有老战友、老部下，你们去了他们一定会找你们的。找你的无非是几种人：一种是反映真实情况的，一种是夹杂一点个人恩怨在里面的，一种是完全颠倒是非反映情况的，也有半真半假的。偏听一方面的意见解决党内问题，将来就留下后遗症，这个后遗症大得很。解放后，我在党中央办公厅工作了二十年，中直机关的运动我是非常清楚的。我经常讲，过去是运动一年，平反两年，然后再运动，又平反两年，一直是运动、平反，平反、运动，循环往复。这是什么道理？这就是“左”，换句话说，就是不实事求是，听风就是雨，片面的东西很多。比如“三反”“五反”、“打老虎”时，对形势的估计就不那么正确，总觉得有很大很多的老虎不知道藏到哪里，每个单位要限期交大老虎，十条、二十条，最后一查，根本不是那么回事。这是什么原因？就是我们的方法非常简单。为什么？为了表现自己搞运动积极嘛！结果遗留下来很大的问题。所以，无论如何，这次整党要稳当，步骤要稳，要和风细雨。"},{"type":"paragraph","text":"——摘自全军整党办公室《整党动态》第20期"}],"alias":""},"tags":[{"name":"余秋里","type":"人物"},{"name":"派性","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b38a0c983a"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
