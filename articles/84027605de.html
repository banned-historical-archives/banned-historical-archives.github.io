接","authors":[],"dates":[{"year":1973,"month":11,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社河内一九七三年十一月六日电　由越南劳动党中央政治局委员、越南民主共和国政府总理范文同率领的越南党政代表团，今天上午乘专机离开北京回国。"},{"type":"paragraph","text":"中共中央副主席、中共中央军委副主席叶剑英，中共中央委员、中共中央对外联络部部长耿飚，外交部副部长韩念龙，中共中央委员、中国人民解放军副总参谋长张才千，以及陆维钊、梁枫、朱传贤等同志到机场送行。"},{"type":"paragraph","text":"到机场送行的还有:"},{"type":"paragraph","text":"越南民主共和国驻中国大使吴船，越南南方共和驻中国大使阮文广，以及这两个大使馆的其他同志；"},{"type":"paragraph","text":"柬埔寨王国民族团结政府外交大臣沙体察。"},{"type":"paragraph","text":"新华社一九七三年十一月六日电　由越南劳动党中央政治局委员、越南民主共和国政府总理范文同率领的越南党政代表团在结束对一些国家的访问之后，十一月六日中午从北京乘专机回到河内。"},{"type":"paragraph","text":"越南党政领导人长征、黎德寿、黎清毅、黄文欢、文进勇以及越南南方共和驻越南民主共和国特别代表团团长阮文进等到机场迎接。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"84027605de"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
