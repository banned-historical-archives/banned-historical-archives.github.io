art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"在批判资产阶级的斗争中经受锻炼","authors":["五好战士蔺毅"],"parts":[{"type":"paragraph","text":"毛主席指示我们，军队“要随时参加批判资产阶级的文化革命斗争”。"},{"type":"paragraph","text":"我从小就爱好文艺，在学校读书时，有的老师说我有“天才”，将来能成为一个好演员、艺术家，还叫我演唱一些低级庸俗的东西。他们给我灌输资产阶级文艺思想，说只要能引人发笑，博得观众的掌声就是好节目。"},{"type":"paragraph","text":"我入伍后，通过学习毛主席著作，提高了思想觉悟，认识到自己中了毒。文化大革命开始以后，我写稿，在讲用会上发言，编演节目，积极参加了批判反党的黑帮黑线的斗争。我们编演的对口词《向一切牛鬼蛇神开火》，同志们看了都感到“解恨”，“带劲”。"},{"type":"paragraph","text":"我每写一篇稿子，编一个节目，发一次言，都反复学习毛主席的有关论述。我越学越觉得心明眼亮，对资产阶级的批判也就越有力量。在这场斗争中，我还通过控诉资产阶级思想的毒害，使自己受到了实际的锻炼和改造。"},{"type":"paragraph","text":"今后，我一定要坚决执行毛主席的指示，随时参加批判资产阶级的文化革命斗争，彻底肃清自己头脑里的资产阶级思想影响，在阶级斗争的实践中，把自己锻炼成为坚强的无产阶级革命事业接班人，锻炼成毛主席的好战士。"}],"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9515e6ba09"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
