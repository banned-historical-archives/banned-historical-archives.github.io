thors":["周恩来"],"dates":[{"year":1967,"month":7,"day":28}],"is_range_date":false,"parts":[{"text":"周恩来为制止乌鲁木齐市武斗给新疆军区的指示","type":"title"},{"text":"周恩来","type":"authors"},{"text":"一九六七年七月二十八日下午，总理给新疆军区负责人来电指示（要点）：","type":"paragraph"},{"text":"一、立即制止乌鲁木齐武斗，由军队戒严，如果红二司再死一个人，要拿你们是问！","type":"paragraph"},{"text":"二、给南梁地区送面粉。","type":"paragraph"},{"text":"（根据有关消息，传达报告整理）","type":"paragraph"},{"text":"（注）七月二十日发生了武汉反革命事件，以武汉《百万雄师》为师的新疆三促，在王恩茂之流的指挥下大肆屠杀我三新革命造反派，他们一手制造了“七·二六”新疆医学院大血案，“七·二八”畜牧厅大血案，同时已调集兵力，准备于七月二十八日夜全面包围新大、八农、新工等，妄图一举打平三新。","type":"paragraph"},{"text":"就在这最最关键时刻，周总理命令新疆军区制止了这次更大的屠杀。当夜，军区给红二司打来电话，声称：（1）从晚十时至凌晨六时全市戒严，（2）给新大“星火燎原”送面粉；（3）恢复两派关于制止武斗的谈判，云云。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"武汉地区无产阶级革命派百万雄师联络站（百万雄师）","type":"人物"},{"name":"新疆文革","type":"人物"},{"name":"武斗","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"75a97d44ba"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
