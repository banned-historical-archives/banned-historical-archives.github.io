" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"湖南日报社编委会关于邓钧洪、苏辛涛等同志被错划右派问题的复查结论(征求意见稿)","authors":["湖南日报社编委会"],"dates":[{"year":1984,"month":10,"day":12}],"is_range_date":false,"parts":[{"text":"湖南日报社编委会关于邓钧洪、苏辛涛等同志被错划右派问题的复查结论(征求意见稿)","type":"title"},{"text":"湖南日报社编委会","type":"authors"},{"text":"邓钧洪、苏辛涛等五十四位同志《名单附后》，一九五七年和一九五八年反右斗争期间。在湖南日报社和湖南农民报社被打成右派分子。一九七九年，报社党委经过复查，确认这些同志的右派问题属于错划，已全部予以改正，恢复了他们的政治名誉和原工资待遇(并抚恤了已死亡者的家属)，工作做得是比较好的。但是。由于当时“左”的影响尚未彻底肃清，对问题的认识程度与事物的本来面目还存在着一定的差距，因而在大部分《复查意见》中留下了不少政治尾巴。报社落实知识分子政策办公室根据错划同志的要求，和中共湖南省委统战部、组织部湘统发(1983)三十三号文件的精神，对此进行了再次复查。现在编委会特作复查结论如下：","type":"paragraph"},{"text":"邓钧洪、苏辛涛等同志，在一九五六年讨论改进报纸工作的过程中，在一九五七年整风运动中，站在党性的立场上，积极提出自己的意见和看法，态度是诚恳的，方式是得当的。这些意见中，最主要的是有关改进报纸工作方面的，其中又大多是在一九五六年办报争论中提出来的。现在看来，这方面的意见总的说是正确的或比较正确的。把这些正确的或比较正确的意见当作“资产阶级新闻观点”，把提出或同情这些意见的同志或反对把这些同志打成右派的同志(其中有的同志在整风前已调离报社，到其他单位工作，整风运动中并未在报社发表过意见)打成“邓、苏反党集团”、右派分子，是不对的，是错误的。还有一些同志，在充分肯定人事工作、统战工作、审干、肃反和“三反”的成绩的前提下，对报社在处理某件事、某个人或某项工作上提出了不同的看法，或对党的个别领导人的作风有意见。这些看法和意见很多是正确的，有的则是正常民主生活所允许的，不存在否定整个人事工作、统战工作以及审干、肃反和“三反”运动的问题，也不存在攻击某个领导人的问题，更不存在反党反社会主义的问题。在反右时把他们定为右派，也是不对的、错误的。还有一些同志，谈论过对国际上某些问题的看法，或者认为在报纸上可以开展百家争鸣，发表各方不同的意见；还有一些同志，主要是党外一些同志，谈论过办同人报的问题。他们这些议论，有的是正确的，有的有当时的历史背景和条件，是党和国家的政策所允许的，不存在反党反社会主义的问题。反右时把他们打成右派分子，也是不对的、错误的。","type":"paragraph"},{"text":"上述各方面的问题，在《复查意见》中虽然都已提到了、涉及了，改正了，但是《复查意见》中改正是不彻底的。它的表现是：其一，把并无错误的言行(包括鸣放和平时的言论、交心材料、日记和书信往来等等，下同)当作错误言行，只是说不是右派言行，不能据以划为右派；其二，把并无错误的言行当作错误言行，只是说不是反右期间的言行，不能据以划为右派；其三，把并无错误的言行当作错误言行，只是说这是针对报社局部而言，不是反对某一整个运动，不是反对某一整个政策，不能据以划为右派；其四，把并无错误的言行当作错误言行，只是说这是认识问题，不能据以划为右派；其五，把并无错误的言行当作错误言行，只是说这是批评某个领导人不能据以划为右派；其六，把并无错误的言行当作错误言行，只是说还没登报，或没有扩散(如日记)等等，不能据以划为右派。《复查意见》中这类政治尾巴是不少的。因此，现在重申：应推倒原来《定案材料》中的一切不实之词，在政治上为被错划的同志彻底恢复名誉：《复查意见》中所有与此复查结论相抵触的提法以及所留存的政治尾巴，一律无效，一律作废。","type":"paragraph"},{"text":" 湖南日报社编委会一九八四年十月十二日","type":"paragraph"}],"comments":[],"origin":"根据文件翻印件打印。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"湖南文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ed7cc7a93b"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
