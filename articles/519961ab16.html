ical-archives/banned-historical-archives8/main/maoquanji15.pdf"],"article":{"title":"询问院南新四军是否已作应付突然事变的各项准备致项英电","alias":"","parts":[{"type":"paragraph","text":"询问皖南新四军是否已作应付突然事变的各项准备"},{"type":"paragraph","text":"致项英电"},{"type":"paragraph","text":"（1940年12月3日）请以你对下列各项的意见告知："},{"type":"paragraph","text":"一、军部及皖南部队被某方袭击时，是否有冲出包围避免重大员失的办法，其办法以向南打游击为有利，还是以向东会合陈毅为利，渡江向北是否已绝对不可能？二、党内干部是否已有应付某方可能袭击的精神上充分准备？三、皖南、江南地区各友军中，是否有坚持抗日同情我党的高中级进步军官与进步部队，在突然事变时，是否有掩护我军或与一致行动的可能，我在附近友军中统一战线工作如何？四、某方在第三战区的意向如何，顾祝同等中央军态度如何，绍雄态度如何，东南局领导下的地方党是否有保存干部、蓄积力应付突然事变的精神上和实际上的准备？"}],"authors":["毛泽东"],"dates":[{"year":1940,"month":12,"day":3}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":263,"page_end":263},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"519961ab16"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
