rt":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"林彪、“四人帮”的毒 就是青年战士要认清的苦","authors":[],"parts":[{"type":"paragraph","text":"在新的历史条件下，除进行忆苦思甜教育外，用什么办法来提高干部战士的政治觉悟呢？二连的经验值得借鉴。"},{"type":"paragraph","text":"今天，我们的青年干部和战士的一个很大特点是，都没有受过地主、资本家的剥削和压迫。但是，他们却是程度不同地受到林彪、“四人帮”的毒害。一旦认清了林彪、“四人帮”这伙教唆犯的真面目，他们就会象当年的干部战士懂得了什么是剥削、什么是压迫的真理一样，憎爱分明，立场坚定，团结一致，共同对敌，为革命贡献自己的一切。"},{"type":"paragraph","text":"在林彪、“四人帮”的毒害下，二连战士葛昌原先以为打打闹闹、顶顶撞撞才是“好学生”、“好社员”、“好战士”，经过耐心细致的思想工作，葛昌明白了这是上了林彪、“四人帮”的当，坚决表示：要做邱少云，不做张铁生。他的政治觉悟大为提高。"},{"type":"paragraph","text":"今天我们启发干部战士的政治觉悟，就要象二连那样，把功夫下在揭批林彪、“四人帮”，肃清其流毒上，针对不同情况、不同问题，实事求是地加以解决。"}],"alias":""},"tags":[{"name":"林彪","type":"人物"},{"name":"四人帮","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a395d30952"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
