ical-archives/banned-historical-archives8/main/maoquanji12.pdf"],"article":{"title":"军委指导只提出大的方针","alias":"","parts":[{"type":"paragraph","text":"军委指导只提出大的方针"},{"type":"paragraph","text":"（1938年3月8日）朱、彭，陈、罗，贺、萧、关，刘、徐、邓，聂："},{"type":"paragraph","text":"甲、军委指导只提出大的方针，由朱彭根据此方针及当前情况作具体部署。军委有时提出具体作战意见，但是建议性质，是否切合情况，须由朱彭按当前敌情情形加以确定，军委不加干涉。"},{"type":"paragraph","text":"乙、关于敌我位置、作战情况等，除总部随时向军委报告外，各师给总部报告之电报，应同时发给军委一份，使军委充分明了情况。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"八日十六时"},{"type":"paragraph","text":"[1]朱、彭，指朱德、彭德怀。陈、罗，指陈光、罗荣桓，当时分别任八路军第一一五师代师长和政治部主任。贺、萧、关，指贺龙、萧克、关向应，当时分别任八路军第一二〇师师长、副师长和政治委员。刘、徐、邓，指刘伯承、徐向前、邓小平，当时分别任八路军第一二九师师长、副师长和政治委员。聂，指聂荣臻，当时任八路军晋察冀军区司令员兼政治委员。"},{"type":"paragraph","text":"[2]总部，指八路军总指挥部。"}],"authors":["毛泽东"],"dates":[{"year":1938,"month":3,"day":8}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":81,"page_end":81},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cb37bac0a3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
