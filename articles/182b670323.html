r":1976,"month":8,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　上海县诸翟公社党委坚持以阶级斗争为纲，根据“三抢”大忙特点，发动公社民兵团和公安人员，依靠广大群众，主动地向阶级敌人发动进攻。并联系本公社大量的阶级斗争事实，结合邓小平炮制的“三项指示为纲”和“阶级斗争那能天天讲”的谬论，写成批判文章，带到“三抢”第一线，利用劳动间隙时间，在群众中开展大批判，有力地促进了“三抢”工作。"},{"type":"paragraph","text":"本报讯　松江县委最近交流了“三抢”初战经验，根据新的情况，确定奋斗目标，采取有力措施，打好“三抢”决战。许多社、队的干部、群众，面对前季和后季、进度与质量、季节和劳力等矛盾，正确进行了分析和处理，做到既要早稻养谷老，又要后季稻不误农时；既要加快进度，又要坚持质量。他们决心以批邓为动力，以抓革命，促生产的实际行动支援唐山、丰南地区人民的抗震救灾斗争。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"182b670323"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
