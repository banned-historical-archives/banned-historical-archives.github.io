ear":1989,"month":9,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"马文革将同格鲁巴争夺乒乓世界杯"},{"type":"paragraph","text":"据新华社内罗毕9月8日电　中国选手马文革8日在这里进行的第十届世界杯乒乓球赛半决赛中以3∶0战胜比利时的塞韦，取得了决赛权；另一名进入决赛的是波兰选手格鲁巴，他以3∶0战胜了瑞典的阿佩伊伦。"},{"type":"paragraph","text":"马文革和塞韦争夺决赛权之战首局打得难解难分，双方比分交替上升，最后马文革以21∶19获胜。在第二、三局的比赛中，马文革一直掌握着场上的主动，先后以21∶10和21∶11结束了比赛。格鲁巴和阿佩伊伦之战没有出现什么高潮，格鲁巴以21∶11、21∶11和21∶17连拿三局。他将于9日同马文革争夺本届杯赛冠军。"},{"type":"paragraph","text":"到目前为止，本届杯赛第12至第16名的名次已经排定。他们是美国的奥尼法德、尼日利亚的穆萨、新西兰的格里菲思、瑞典的瓦尔德内尔和肯尼亚的卡尔瓦霍。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a6c25b4071"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
