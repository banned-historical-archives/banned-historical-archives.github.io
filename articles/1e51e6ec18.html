南公安部的批复","authors":[],"dates":[{"year":1953,"month":3,"day":26}],"is_range_date":false,"parts":[{"text":"公安部对广东取缔会道门工作部署给中南公安部的批复","type":"title"},{"text":"公安部同意广东公安厅3月15日关于广东农村取缔反动会道门工作部署的意见。但对于反动会道门点传师以上头子的逮捕数目，不可过少，否则就将难以达到摧毁其组织的目的。对于反动会道门的组织排队，只应当从取缔与暂不取缔来分类，而不应当从反动或一般迷信来分类，如果是落后群众单纯的迷信组织，目前还没有发现被反动会道门所掌握或被反革命分子所利用，就不应把他列为反动会道门一类，亦不要对这些迷信组织实行取缔的办法。以上请你们加以考虑。","type":"paragraph"}],"comments":[],"origin":"《取缔反动会道门工作历史资料汇编（1948－1992年）》，公安部一局编印， 2009年。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1e51e6ec18"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
