续打击反动军队","authors":[],"dates":[{"year":1968,"month":6,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京八日电　波哥大消息:哥伦比亚西北部阿尔托西努地区的农民举行起义，组成了一支有工人和学生参加的游击队。这支游击队，今年以来连续打击残害人民的哥伦比亚反动军队，镇压罪大恶极的庄园主，向亲美独裁政权展开了英勇的斗争。"},{"type":"paragraph","text":"据游击队发表的公报宣布，在不久前的几次战斗中，这支游击队共打死打伤政府军四十人。游击队夺取了敌人的武器来武装自己和当地的老百姓，打击欺压群众的反动分子，得到当地广大人民的支持。据报道，今年一月六日，游击队袭击了科尔多瓦省南部乌雷镇的警察所，并且镇压了这个镇上的一个血债累累的大庄园主。这个庄园主霸占了几百个农民的土地，杀害了几十个农民。二月间，游击队袭击了圣豪尔赫市埃尔塞罗的一个反动政府机关，打死四名警察，夺得了大批武器和装备。五月二十八日，这支游击队又在科尔多瓦省蒙特利瓦诺市附近，伏击了一支政府军的巡逻队。"},{"type":"paragraph","text":"阿尔托西努地区位于安蒂奥基亚省和科尔多瓦省交界处。当地革命人民为了反对亲美独裁政府的卖国政策和镇压人民的反动措施，组织了“阿尔托西努和阿尔托圣豪尔赫爱国委员会”。这个委员会在今年一月发表声明指出，哥伦比亚反动政府为美帝国主义和寡头势力效劳，掠夺哥伦比亚人民的财产和土地，镇压与屠杀人民，这就迫使农民武装起来，奋起反抗。声明揭露说，今年年初曾经有一个美国军事使团秘密去哥伦比亚“研究形势”和提供镇压农民的反动经验。声明号召所有西北部的农民组织起来，同反动派斗争到底。"},{"type":"paragraph","text":"哥伦比亚共产党(马克思列宁主义)机关报《革命报》最近发表文章，热烈赞扬这支游击队的诞生。《革命报》指出，阿尔托西努地区的革命人民在马克思列宁主义、毛泽东思想的光辉指引下，正在为使哥伦比亚摆脱美国佬和残暴的剥削者的压迫而奋起斗争。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"22bd21e114"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
