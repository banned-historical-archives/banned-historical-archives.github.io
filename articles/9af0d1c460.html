:["刘富贵（化名）"],"dates":[{"year":1971,"month":6,"day":4}],"is_range_date":false,"parts":[{"text":"七十五岁居民恳求“退休”的报告","type":"title"},{"text":"刘富贵（化名）","type":"authors"},{"text":"〖刘富贵，湖南城镇居民。〗","type":"subtitle"},{"text":"吕仙亭居委会负责同志：","type":"appellation"},{"text":"六九年九月十八号起，挖防空洞到十二月廿号，共计拾伍个半工。","type":"paragraph"},{"text":"十二月廿号，奉命到五里公社修路，到廿六号，白天五个工，又做晚工两个，半夜一点起到早晨六点钟收工回来。","type":"paragraph"},{"text":"七零年元月初四起，到大桥湖中桥没罗【灭螺】，七天之久完成任务回家。","type":"paragraph"},{"text":"到三月奉命拾砖碴子两天，第一天九担，第二天拾担。又到五里公社修补路二天，在广场挖沟（子）一天。","type":"paragraph"},{"text":"又到七〇年，挖防空洞前后五个半工。","type":"paragraph"},{"text":"团   到五月一号、三号两天办地种棉花。","type":"paragraph"},{"text":"又到五月十五号锄棉花三天，五月廿四号锄棉花三天。","type":"paragraph"},{"text":"到五月廿六摘桑叶半天，到六月二号摘桑叶一天。","type":"paragraph"},{"text":"此【本】人年龄七十五岁了，应该退休了，政府照顾。","type":"paragraph"},{"text":" 居民刘富贵 71年六月4 号","type":"paragraph"}],"comments":[],"origin":"拓荒者据原件录入、提供。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9af0d1c460"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
