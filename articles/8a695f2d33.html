ical-archives/banned-historical-archives0/main/maoquanji28.pdf"],"article":{"title":"对吴耀宗等的中国基督教会三自宣言的批语","alias":"","parts":[{"type":"paragraph","text":"对吴耀宗\"等的中国基督教会三自宣言的批语"},{"type":"paragraph","text":"（1950年7月19日）周："},{"type":"paragraph","text":"吴耀宗文件是很有用的，请考虑用内部文件方式电告各中央局及各省市委，并要他们注意赞助。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"七月十九日[1]吴耀宗，当时任中华基督教青年会全国协会出版组主任。[2]周，指周恩来。"},{"type":"paragraph","text":"[3]指吴耀宗等的中国基督教会三自宣言《中国基督教在新中国建设中努力的途径》。宣言提出中国基督教会及团体的基本方针应是：肃清基督教内部的帝国主义的影响，警惕帝国主义利用宗教的反动阴谋；培养一般信徒的爱国民主精神，实行自治、自养、自传。这个宣言后来在1950年9月23日《人民日报》发表。"}],"authors":["毛泽东"],"dates":[{"year":1950,"month":7,"day":19}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":540,"page_end":540},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"宣言"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8a695f2d33"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
