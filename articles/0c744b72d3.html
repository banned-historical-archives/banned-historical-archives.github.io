art":5,"page_end":5,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"赞扬毛主席领导的中国取得巨大进步中尼贸易协定和议定书在京签字周总理出席宴会并参加签字仪式","authors":[],"parts":[{"type":"paragraph","text":"据新华社二十八日讯 尼泊尔王国副首相兼外交大臣基尔提·尼迪·比斯塔，今天在北京举行告别宴会。"},{"type":"paragraph","text":"国务院总理周恩来、副总理陈毅等应邀出席了宴会。在充满友好气氛的宴会上，比斯塔副首相和陈毅副总理先后讲话，共同祝愿中尼两国人民的友谊不断发展。"},{"type":"paragraph","text":"比斯塔副首相在讲话中说，通过这次访问，我们亲眼看到中国在毛泽东主席的强有力的和鼓舞人心的领导之下，在文化、经济和社会各方面不断取得巨大的进步。"},{"type":"paragraph","text":"陈毅副总理在讲话中说，比斯塔副首相的这次访问，加强了我们之间的相互了解和信任，增进了两国人民的友谊，促进了中尼两国的友好合作关系。"},{"type":"paragraph","text":"陈毅副总理说，比斯塔副首相和尼泊尔朋友们通过这次访问，可以看到我们伟大领袖毛主席亲自领导下的无产阶级文化大革命运动已经取得的决定性胜利。无产阶级文化大革命运动使我们的国家更加巩固和强大。中国人民将能更好地同亚非各国人民一起，为反对帝国主义、反对新老殖民主义，为加强亚非团结、反对美帝国主义的侵略政策和战争政策而共同奋斗。"},{"type":"paragraph","text":"据新华社二十八日讯 中华人民共和国政府和尼泊尔国王陛下政府贸易协定和议定书，今天在北京签字。"},{"type":"paragraph","text":"国务院总理周恩来参加了签字仪式。"},{"type":"paragraph","text":"国务院副总理兼外交部长陈毅和尼泊尔王国副首相兼外交大臣基尔提·尼迪·比斯塔，分别代表本国政府在贸易协定和议定书上签字。"}],"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"陈毅","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0c744b72d3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
