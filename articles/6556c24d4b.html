script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"十一届三中全会以来有关重要文献摘编  《坚持四项基本原则　反对资产阶级自由化》出版","authors":[],"dates":[{"year":1987,"month":3,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"十一届三中全会以来有关重要文献摘编"},{"type":"paragraph","text":"《坚持四项基本原则　反对资产阶级自由化》出版"},{"type":"paragraph","text":"新华社北京3月17日电  《坚持四项基本原则　反对资产阶级自由化——十一届三中全会以来有关重要文献摘编》一书，已由人民出版社出版，3月下旬将在全国各地陆续发行。"},{"type":"paragraph","text":"这本书是根据中共中央关于各级党组织和广大党员都要重新认真学习十一届三中全会以来党中央特别是邓小平同志代表中央常委集体关于坚持四项基本原则、反对资产阶级自由化的一系列重要论述的指示精神，由中共中央书记处研究室和中共中央文献研究室编辑的。"},{"type":"paragraph","text":"选入这本书的文献共65篇，28万字。其中中共中央、全国人大的文件16篇，中央领导人的文稿49篇。这本文献摘编所论述的主要内容包括：坚持四项基本原则是我们的立国治国之本，是我国各项内外政策的基础；加强社会主义精神文明建设，进行“有理想、有道德、有文化、有纪律”的教育，抵制和反对资本主义、封建主义的腐朽思想和精神污染；旗帜鲜明地、正确地反对资产阶级自由化，克服政治思想战线的软弱混乱状况；从实际出发，坚持有“左”反“左”，有右反右的两条战线的思想斗争等。"},{"type":"paragraph","text":"这本书对于指导各级干部和广大党员全面领会坚持四项基本原则，反对资产阶级自由化的深刻涵义和精神实质，坚决、健康、持久地开展对资产阶级自由化的斗争，保证进一步贯彻执行改革、开放、搞活的方针，具有重要的意义。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6556c24d4b"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
