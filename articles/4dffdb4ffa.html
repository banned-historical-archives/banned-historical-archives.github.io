ical-archives/banned-historical-archives0/main/maoquanji44.pdf"],"article":{"title":"为推迟召开中央工作会议起草的通知和批语","alias":"","parts":[{"type":"paragraph","text":"为推迟召开中央工作会议口"},{"type":"paragraph","text":"起草的通知和批语"},{"type":"paragraph","text":"（1961年5月4日）各中央局，各省、市、区党委："},{"type":"paragraph","text":"五月中央工作会议时间，因有几省负责同志提议推迟几天召开，以便多做几天调查研究工作，向群众寻求真理。中央认为可以推迟几天。现决定：起草委员会各同志于五月十五日到达北京，各中央局，各省、市、区党委第一书记及其助手，于五月二十日到达北京。特此通知。"},{"type":"paragraph","text":"中央"},{"type":"paragraph","text":"1961年5月4日"},{"type":"paragraph","text":"[1]这次中共中央工作会议后来于1961年5月21日至6月12日在北京举行。"},{"type":"paragraph","text":"为推迟召开中央工作会议起草的通知和批语小平同志："},{"type":"paragraph","text":"此件请你与在京各同志商酌。如以为可，即用电报发出。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"五月四日上午三时[1]小平，即邓小平，当时任中共中央总书记。[2]指本篇一。"}],"authors":["毛泽东"],"dates":[{"year":1961,"month":5,"day":4}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":264,"page_end":265},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4dffdb4ffa"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
