script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"匈牙利军事代表团抵华访问彭德怀元帅昨盛宴欢迎","authors":[],"dates":[{"year":1958,"month":12,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　据新华社消息:国务院副总理兼国防部长彭德怀元帅，4日下午接见了以匈牙利人民共和国国防部长雷维斯上将为首的匈牙利军事代表团全体贵宾。"},{"type":"paragraph","text":"在接见中，彭德怀元帅和雷维斯上将等进行了长时间亲切的交谈。"},{"type":"paragraph","text":"匈牙利人民共和国军事代表团是在3日下午乘飞机到达北京的。"},{"type":"paragraph","text":"代表团团员有:达布舍少将、洛兰特少将、加萨什上校、巴戈内上校、加尔帕提中校、托特中校、霍道山中校、特列基中校、托尔戴什中校、马西中校。"},{"type":"paragraph","text":"【据新华社北京4日电】　国务院副总理兼国防部长彭德怀元帅，今天晚上举行宴会，热烈欢迎以雷维斯上将为首的匈牙利军事代表团全体贵宾。"},{"type":"paragraph","text":"彭德怀元帅在宴会上讲话说:匈牙利人民军曾经有过光荣的反法西斯的战斗历史，尤其是在匈牙利工农革命政府成立后，在匈牙利社会主义工人党和工农革命政府的领导下，吸取了“十月事件”的教训，加强了党对军队的领导，以及政治、军事训练工作。我们很高兴地看到，匈牙利人民军已经成为一支具有现代军事技术和高度政治觉悟的人民军队，比以前更加纯洁、更加坚强和壮大了。我们深信，这支患于马克思列宁主义的人民军队，是保卫匈牙利的社会主义制度，巩固无产阶级专政，保卫欧洲和世界和平的一支强大的武装力量，是我们亲密可靠的战友。"},{"type":"paragraph","text":"彭德怀元帅说:中匈两国人民存在着深厚的国际主义的友谊，对于重大的国际问题，我们两国一向有着完全一致的看法。我国人民深深感谢匈牙利政府今年9月12日关于台湾地区局势问题的正义声明。美帝国主义横蛮地霸占我国的领土台湾，同美帝国主义曾经阴谋颠复匈牙利一样，是一定要失败的。"},{"type":"paragraph","text":"彭德怀元帅最后说:我们衷心希望你们在我国参观访问期间，多多地交换双方的经验，特别是对我们工作中的缺点，提出意见。"},{"type":"paragraph","text":"匈牙利人民共和国国防部长，军事代表团团长雷维斯上将在热烈的掌声中讲话。他说，我们在你们的首都所感受到的同志的热爱，我们认为是对我们亲爱的祖国、对我国勤劳的人民和军队所表现的信任。"},{"type":"paragraph","text":"雷维斯上将说，从十月反革命事件中，我们吸取的最大的经验之一就是要维护社会主义阵营的团结，保护我们的团结，就象保护我们的眼珠一样。我们伟大的不可战胜的社会主义阵营坚如磐石的团结，是世界各国人民和平的保证。正因为如此，我们共同的敌人想尽一切办法来破坏这种团结。帝国主义在1956年对匈牙利的进攻时期和从那时以后修正主义者们所表现的就是这样。但是，建筑在马克思、列宁主义真理的基础上的无产阶级的团结，光辉地经住了考验，我们的阵营比从前更加团结了。请允许我代表我们军队的全体官兵对你们在政治上、道义上和物质上所给予我们的巨大帮助，表示感谢。"}],"comments":[],"origin":"本报,新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"彭德怀","type":"人物"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3a456d446d"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
