ical-archives/banned-historical-archives8/main/maoquanji13.pdf"],"article":{"title":"给柳夷“的信","alias":"","parts":[{"type":"paragraph","text":"给柳夷的信"},{"type":"paragraph","text":"（1938年10月30日）柳夷同志：·"},{"type":"paragraph","text":"还是八月间的你的信，今天才复你，不知对于你的问题还有帮助否？不知你还在三大队否？我因忙，积累至今才复，对你不起！"},{"type":"paragraph","text":"你的意思是恳切的，如果陕公抗大党的同志所说，你的表现够上入党资格仅仅过去加入与脱离国民党一点无人证明，是确实的，而你在延又有九月之久，并无其他不能入党的问题存在，我以为是可以入党的。此事解决办法，可持此信与三大队负责同志商酌，你的原信也随同交给他们看，要求他们最后考虑你的问题。如尚不能解决，可持此信到抗大政治部张主任?处。你所指出的几个缺点是有理由的，你的信可送给政治部参考。最后告你的，马列学院必须党员并须学养较高者才能进去。此复。并致"},{"type":"paragraph","text":"敬礼！"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十月卅日"},{"type":"paragraph","text":"[1]柳夷（1913—1996)，浙江慈溪人。当时是抗日军政大学第六大队第一支队政治教育干事。"},{"type":"paragraph","text":"[2]指张际春（1900—1968），湖南宜章人。当时任抗大政治部主任。无核作，不%你办么不知伤"},{"type":"paragraph","text":"V大你回就的，你方行世传见交给他们离亲求他们寂及整晰您。民方心辅的法，万与此行到性大试却性化变。你的机系缺点是有现快，你的作及结"},{"type":"paragraph","text":"银：生体的，要性经员免须当喜部我拥。此后。高以"},{"type":"paragraph","text":"M毛泽东致柳夷信的手稿。"}],"authors":["毛泽东"],"dates":[{"year":1938,"month":10,"day":30}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":29,"page_end":30},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e21dd23299"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
