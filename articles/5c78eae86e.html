们搞好新老干部交替和合作，把各项工作做得更好","authors":[],"dates":[{"year":1982,"month":9,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"十二大分组审议三委员会候选名单"},{"type":"paragraph","text":"叶剑英、聂荣臻同志出席解放军代表团的会议，勉励代表们搞好新老干部交替和合作，把各项工作做得更好"},{"type":"paragraph","text":"新华社北京9月9日电　中国共产党第十二次全国代表大会今天下午举行分组会议，审议大会主席团根据预选结果提出的中央委员会、中央顾问委员会、中央纪律检查委员会的候选人的正式名单。"},{"type":"paragraph","text":"叶剑英、聂荣臻同志出席了解放军代表团的会议，并在会上讲了话。他们谈到，他们作为八十多岁的老兵，对同大家见面感到很高兴。"},{"type":"paragraph","text":"他们勉励代表们努力学习，在党的领导下搞好新老干部的交替和合作，把部队的各项工作做得更好。"},{"type":"paragraph","text":"各代表团的分组会议还通过了上午主席团会议提出的监票人和总监票人名单。（附图片）"},{"type":"paragraph","text":"9月9日，叶剑英、聂荣臻同志和出席党的十二大的中国人民解放军代表在一起。"},{"type":"paragraph","text":"徐向前同志和杨尚昆同志在大会休息室里亲切交谈。"},{"type":"paragraph","text":"彭真、薄一波和习仲勋等同志在党的十二大主席团会议上。新华社记者摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"聂荣臻","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5c78eae86e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
