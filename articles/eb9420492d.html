script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"毛主席宴沙斯特罗阿米佐约总理","authors":[],"dates":[{"year":1955,"month":6,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京一日电】　中华人民共和国主席毛泽东，一日晚在中南海欢宴印度尼西亚共和国总理阿里·沙斯特罗阿米佐约和夫人。"},{"type":"paragraph","text":"阿里·沙斯特罗阿米佐约总理和夫人、印度尼西亚驻华大使莫诺努图、印度尼西亚外交部亚洲—太平洋司司长苏卡佐·维约普拉诺托和夫人、印度尼西亚驻印度大使巴拉、印度尼西亚驻苏联大使苏班德里奥、印度尼西亚国家计划局局长朱安达、印度尼西亚经济部对外经济关系司高级官员哈苏诺·雷克梭阿莫佐、总理私人医生沙约诺、总理副官瓦鲁约、总理私人秘书拉查沙，以及印度尼西亚驻华大使馆武官沙林中校和夫人、一等秘书维约维尔多约和夫人都应邀出席了宴会。"},{"type":"paragraph","text":"出席作陪的有:中华人民共和国副主席朱德，全国人民代表大会常务委员会委员长刘少奇，国务院总理周恩来。"},{"type":"paragraph","text":"出席作陪的还有:全国人民代表大会常务委员会副委员长李济深、沈钧儒、郭沫若、黄炎培、彭真。"},{"type":"paragraph","text":"出席作陪的还有:国务院副总理邓小平、邓子恢、贺龙、陈毅、乌兰夫、李富春、李先念，秘书长习仲勋，各办公室主任罗瑞卿、林枫、贾拓夫，各部部长谢觉哉、章乃器、叶季壮、陈郁、沙千里、滕代远、朱学范、廖鲁言、傅作义、马文瑞、沈雁冰、杨秀峰、张奚若、李德全，外交部副部长张闻天、章汉夫和中国驻印度尼西亚大使黄镇。"},{"type":"paragraph","text":"出席作陪的还有:最高人民法院院长董必武，最高人民检察院检察长张鼎丞，中国人民解放军总参谋长粟裕，总政治部副主任谭政。"},{"type":"paragraph","text":"出席作陪的还有中国人民政治协商会议全国委员会副主席何香凝，中国印度尼西亚友好协会会长鲍尔汉、副会长胡愈之、马玉槐，中国伊斯兰教协会副主任达浦生。"},{"type":"paragraph","text":"宴会在热烈友好的空气中进行。"},{"type":"paragraph","text":"宴会以后，举行了歌舞晚会。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"eb9420492d"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
