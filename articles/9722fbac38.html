<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中央关于在民主党派、无党派民主人士中吸收共产党党员和办理入党手续的规定","authors":[],"dates":[{"year":1956,"month":6}],"is_range_date":false,"parts":[{"text":"中央关于在民主党派、无党派民主人士中吸收共产党党员和办理入党手续的规定","type":"title"},{"text":"目前，我国内部的政治形势已经起了根本变化，民主党派、无党派民主人士在我党领导下有了很大的进步，知识分子的绝大多数已经成为劳动人民的一部分，有不少的人已经具备了入党的条件，而且迫切要求加入我党，民主党派的某些负责人也表示希望我党在他们的成员中发展党员。为此，特将在民主党派、无党派民主人士中发展我党党员的办法重新规定如下：","type":"paragraph"},{"text":"（一）我党各级组织必须积极地、有计划地在民主党派、无党派民主人士（特别是高级知识分子成员）中，公开吸收业已具备入党条件的人入党，但是，不再在他们中间吸收秘密党员。民主党派成员加入我党以后，一般不应当脱离他们原来的党派，并且要继续参加民主党派的工作，但是同时必须编入我党的支部过组织生活。","type":"paragraph"},{"text":"（二）民主党派各级领导机关中的主任委员、秘书长、组织和监察部门的正职，不宜由我党党员担任，因此，应当考虑到有没有适当的人去替换他们的工作，如果有人替换就可以吸收，并且可以建议民主党派更换他们的职务。如果没有人替换，就可以说服他们暂的不要入党。","type":"paragraph"},{"text":"（三）为了政治上的特殊需要，在民主党派、无党派民主人士中发展我党党员的时候，仍然应当注意有计划地在我们中间保留一部分人以非党的身份进行工作。因此，对于以下两类人，即使他们已经具备入党条件，也应当说服他们不要入党。","type":"paragraph"},{"text":"（1）有国际影响，以保持非党身份从事国际活动更为有利的著名人士。","type":"paragraph"},{"text":"（2）在政府机关、人民团体担负主要职务或在民主党派、无党派民主人士中有深厚的历史关系，以非党身份进行工作更为有利的人。","type":"paragraph"},{"text":"对于上述已经具备入党条件而又不能吸收入党的进步分子，我党各级组织要像对待党员一样地教育和帮助他们，吸收他们参加党内同他们工作有关的会议，让他们阅读党内有关的文件；并且要制定对他们的教育计划。","type":"paragraph"},{"text":"（四）吸收民主党派成员和无党派民主人士入党的手续：","type":"paragraph"},{"text":"（1）吸收民主党派成员和无党派民主人士入党，应当根据本人的社会成份，按照我党党章规定办理入党手续。在接收其入党后，报省、市委、自治区党委统战部备案。民主党派的中央委员，接收其入党后，报中央统战部备案。","type":"paragraph"},{"text":"（2）民主党派省委员会的正副主任委员和北京、天津、上海、武汉、广州、长沙、南京、济南、青岛、重庆、成都、昆明、西安、沈阳、长春等市委员会的正副主任委员以及和他们地位相当的无党派民主人士入党，因为他们的社会影响较大，须报请中央批准。其他省辖市和县级的民主党派的正副主任委员和同他们地位相当的无党派民主人土入党，由省委批准。","type":"paragraph"},{"text":"（五）过去中央所发有关在民主党派、无党派民主人士中吸收党员的规定，一律作废，今后按这一新的规定办理。","type":"paragraph"}],"comments":[],"origin":"根据文件的原件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9722fbac38"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
