"year":1947,"month":4,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"为了保卫毛主席"},{"type":"paragraph","text":"——战地诗叶"},{"type":"paragraph","text":"柯岗"},{"type":"paragraph","text":"行进在大风沙里"},{"type":"paragraph","text":"人民的兵团在行进，"},{"type":"paragraph","text":"夜的巨风突然来临，"},{"type":"paragraph","text":"沙尘漫天，黄河岸上的月亮失掉了颜色，"},{"type":"paragraph","text":"骑兵从马背上吹落下来，"},{"type":"paragraph","text":"兵士密封了眼睛，"},{"type":"paragraph","text":"战马竖起了长鬃，"},{"type":"paragraph","text":"炮车的轮子滞塞得不能转动！"},{"type":"paragraph","text":"可是，强大的兵团一刻也不停，"},{"type":"paragraph","text":"骑兵拉着马尾，"},{"type":"paragraph","text":"步兵臂挽着臂，"},{"type":"paragraph","text":"强壮的炮兵用双手推动车轮，"},{"type":"paragraph","text":"他们要战胜一切，"},{"type":"paragraph","text":"要穿过风沙去进攻——"},{"type":"paragraph","text":"为祖国、为自己、为了保卫毛主席。"},{"type":"paragraph","text":"家信"},{"type":"paragraph","text":"围墙之外三株嫩柳，两株翠柏，"},{"type":"paragraph","text":"还有一棵老杏树，花儿已经褪色。"},{"type":"paragraph","text":"就这棵在树下，"},{"type":"paragraph","text":"李乃池把他的重机枪妥当安排，"},{"type":"paragraph","text":"掩体已经作好，纵有三颗炮弹也能挨，"},{"type":"paragraph","text":"子弹已经上膛，扫清了射击障碍，"},{"type":"paragraph","text":"只要再有半点钟，攻击的命令就到来。"},{"type":"paragraph","text":"静寂，战地少有的静寂使他难耐，"},{"type":"paragraph","text":"他掏出家信看了又看，"},{"type":"paragraph","text":"又展开一张净纸，放在弹药箱上写起来："},{"type":"paragraph","text":"“娘！毛主席叫咱翻身。"},{"type":"paragraph","text":"有房有地，我放心，"},{"type":"paragraph","text":"可是，我今春不能回家结婚，"},{"type":"paragraph","text":"蒋介石正在进攻咱毛主席，"},{"type":"paragraph","text":"他要夺回咱的房，咱的地………"},{"type":"paragraph","text":"我不能回去。"},{"type":"paragraph","text":"要她等着我，"},{"type":"paragraph","text":"到蒋介石跪在老百姓的面前发抖的时候。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"720e169619"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
