 揭露苏联利用经互会剥削和控制东欧国家","authors":[],"dates":[{"year":1977,"month":3,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"阿尔巴尼亚报纸指出“欧安会”的“缓和精神”骗不了人"},{"type":"paragraph","text":"两霸加紧争夺，欧洲何来安全？"},{"type":"paragraph","text":"揭露苏联利用经互会剥削和控制东欧国家"},{"type":"paragraph","text":"新华社地拉那一九七七年三月十七日电　阿尔巴尼亚《团结报》三月十六日发表文章指出，在赫尔辛基举行的“欧安会”已过去近一年零八个月了。人们越来越现实地看到了两个超级大国玩弄的肮脏把戏和帝国主义花招。"},{"type":"paragraph","text":"文章揭露说，苏修叛徒集团头子勃列日涅夫通过“缓和”等口号，掩盖其加强国内和在东欧国家的统治，在其它地区进一步推行扩张政策。"},{"type":"paragraph","text":"“勃列日涅夫的目标”，已经遭到了淋漓尽致的揭露。"},{"type":"paragraph","text":"文章指出，赫尔辛基会议以后，东欧国家人民更加沉重地感到了苏修的压迫。驻扎在这些国家的苏联军队不仅未减，反而增加。所谓的“社会主义一体化”正在加紧执行，其目的是为了完全取消东欧国家的主权，把这些国家直接置于莫斯科的控制之下。"},{"type":"paragraph","text":"文章指出，赫尔辛基会议以后，美帝国主义在欧洲的活动也未改变其性质。"},{"type":"paragraph","text":"文章指出，两个帝国主义超级大国还竭力向对方的势力范围进行渗透，在中东继续策划阴谋。"},{"type":"paragraph","text":"文章指出，美帝国主义者和苏联社会帝国主义者的侵略行径使各国人民进一步看清了两个超级大国所标榜的“安全”的真面目。"},{"type":"paragraph","text":"文章指出，“欧安会”的所谓“缓和精神”，欺骗不了各国人民。欧洲安全是不能由两个超级大国赐给的。各国人民只有通过同美帝国主义、苏联社会帝国主义进行坚决的斗争才能赢得真正的安全与和平。"},{"type":"paragraph","text":"新华社地拉那一九七七年三月十六日电　阿尔巴尼亚《人民之声报》三月十六日发表文章，揭露苏联利用经互会剥削、控制东欧国家。"},{"type":"paragraph","text":"文章指出，克里姆林宫新沙皇加紧利用经济一体化来控制经互会其它成员国，实际上就是要牺牲这些国家的主权、自由和独立。"},{"type":"paragraph","text":"文章揭露莫斯科修正主义者把发展专业化和生产协作的所谓综合纲领及国际分工强加给经互会其它会员国，是为了实现其控制和统治这些国家的目的。"},{"type":"paragraph","text":"文章谴责苏联社会帝国主义者强迫东欧国家制定和执行关于主要物资的共同规划，束缚这些国家的手脚，使它们在原料、燃料和其它物资方面更加依赖于苏联，阻挠别国的工业发展。"},{"type":"paragraph","text":"文章指出，苏联社会帝国主义者还通过其价格政策和不等价交换，对经互会成员国进行野蛮的殖民主义式的掠夺。"},{"type":"paragraph","text":"文章还揭露新沙皇通过实行超国界的基本投资、专业化、协作和集中生产的综合纲领，通过“跨国经济组织”等形式把经互会其它成员国纳入苏联一体化的轨道。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1a44ae24dd"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
