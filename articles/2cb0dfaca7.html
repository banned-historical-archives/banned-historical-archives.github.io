script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"向反革命修正主义文艺路线猛烈开火","authors":[],"dates":[{"year":1967,"month":4,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编者按:今天选登的四篇来稿，批评了在彻底批判反革命修正主义文艺路线的斗争中，文艺界队伍中出现的有害于当前斗争的各种错误思想。来稿所反映的问题，是值得引起每个革命的文艺工作者深思的。"},{"type":"paragraph","text":"文艺界的当务之急，是彻底批判反革命修正主义文艺路线。但是，要把握这个斗争的大方向，革命的文艺工作者就必须扫清前进道路上的种种障碍。其中一个主要障碍，就是清除我们头脑里形形色色的非无产阶级思想，归结一点，就是必须大破“私”字，大立“公”字。一切从革命的利益出发，才能正确处理革命队伍中的各种矛盾，才能把枪口对准敌人，弹无虚发，把文艺界的文化大革命搞深搞透."}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2cb0dfaca7"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
