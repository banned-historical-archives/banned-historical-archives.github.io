rt":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"永远相信群众依靠群众","authors":["工程兵活学活用毛主席著作先进集体/某部一连指导员张堂印"],"parts":[{"type":"paragraph","text":"大叛徒、大内奸、大工贼刘少奇，竭力散布“群众落后论”，咒骂人民群众是什么“落后”“无知”“不能做事”的“群氓”，真是反动至极！他的险恶用心，就是妄图破坏我们党依靠群众、密切联系群众的优良传统，制造我们党与群众的隔阂，阻挠党员和干部从群众中吸收营养，使党员和干部成为高高在上、脱离群众的官老爷，以便达到他篡党、篡政、篡军，复辟资本主义的罪恶目的。这是永远不能得逞的！"},{"type":"paragraph","text":"伟大领袖毛主席教导我们：“我们共产党人区别于其他任何政党的又一个显著前标志，就是和最广大的人民群众取得最密切的联系。”几年来，我们党支部遵照伟大领袖毛主席关于一刻也不脱离群众的教导，相信群众，依靠群众，紧密联系群众，向群众学习，使党支部成为坚强的战斗堡垒。一九六四年，我们顶住了反革命修正主义分子罗瑞卿大比武的妖风。无产阶级文化大革命以来，我们在支左工作中坚决执行和保卫毛主席的无产阶级革命路线，大长了无产阶级革命派的志气，大灭了阶级敌人的威风，取得了一个又一个的胜利。我们连队的事实，就是对大叛徒刘少奇的“群众落后论”一个有力的批判。我们一定遵照伟大领袖毛主席的教导，永远相信群众，依靠群众，紧密联系群众，把党支部工作和一切工作搞得更好。让大叛徒刘少奇的“群众落后论”见鬼去吧！"}],"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"name":"军队支左","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"808eb5cbbb"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
