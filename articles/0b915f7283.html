authors":[],"dates":[{"year":1968,"month":2,"day":16}],"is_range_date":false,"parts":[{"text":"中共中央、国务院、中央军委、中央文革关于各地给中央来电及报告应写全名的通知","type":"title"},{"text":"各省、市、自治区革命委员会（革筹小组）、军管会、各大军区、省军区、各野战军：","type":"appellation"},{"text":"今后，各地给中央的一般性政治性来电和报告，应写全名为：《毛主席、林副主席、中央、国务院、中央军委、中央文革》。如有专题需向中央请示的，属于无产阶级文化大革命和党的问题，可电告中央、中央文革；属于军事问题，可电告中央军委；属于行政业务问题，可电告国务院。此外，不要给个人来电，丧失组织原则，以免难于处理。","type":"paragraph"},{"text":" 中共中央国务院中央军委中央文革一九六八年二月十六日","type":"paragraph"}],"comments":[],"origin":"根据湖北省革命委员会编印《无产阶级文化大革命文件汇编[二]》，武汉：1968年4月","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"中央文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0b915f7283"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
