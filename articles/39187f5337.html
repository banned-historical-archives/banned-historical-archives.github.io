script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"生活资料个人所有是资产阶级式权利残余的来源吗?","authors":[],"dates":[{"year":1959,"month":3,"day":31}],"is_range_date":false,"parts":[{"type":"paragraph","text":"“经济研究”今年第8期上发表了凡兵的题为“关于供给制的意义和按劳分配问题”的文章，指出何畏的“农村实行供给制的伟大意义”(刊“经济研究”去年第11期)一文“不正确地估计了供给制的意义，过分地贬低了按劳分配原则在现阶段的意义”。对何畏关于按劳分配和生活资料的个人所有是资产阶级法权思想的来源的说法，文章作了这样的分析:“说按劳分配制度是资产阶级法权思想的来源，实际上是同义语的反复。其次，把‘存在生活资料的个人所有’说成是资产阶级法权思想的来源也是不对的。因为即使到了共产主义的高级阶段，实现了‘各尽所能，按需分配’的原则，生活资料的‘个人所有’仍然是存在的。但到那时资产阶级式的权利的残余已被破除干净了”。并指出:按照何畏的说法，既然生活资料的个人所有是资产阶级式的权利残余的来源，那么，要破除资产阶级式的权利残余，就必须破除它的来源，即必须取消生活资料的个人所有。这种观点只能引起人们的思想混乱。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"限制资产阶级法权","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"39187f5337"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
