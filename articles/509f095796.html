ical-archives/banned-historical-archives8/main/maoquanji26.pdf"],"article":{"title":"总攻上海的时间和步骤","alias":"","parts":[{"type":"paragraph","text":"总攻上海的时间和步骤\""},{"type":"paragraph","text":"（1949年5月20日）粟、张，并告总前委及中指："},{"type":"paragraph","text":"（一）据邓饶陈?电，接收上海的准备工作业已大体就绪，似此只要军事条件许可，你们即可总攻上海。（二）为使侦察及兵力配备臻于完善起见，总攻时间似以择在辰有至辰世之间为宜，亦可推迟至已东左右，如何适当，由你们决定。（三）攻击步骤，以先解决上海后解决吴淞为适宜。如吴淞阵地不利攻击，亦可采取攻其可歼之部分，放弃一部分不攻，让其从海上逃去。（四）攻击兵力必须充分，如觉兵力不足，须调齐兵力然后攻击。（五）攻击前必须作战役和战术上的充分准备。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"辰部"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军委起草的给第三野战军副司令员兼第二副政治委员粟裕和参谋长张震的电报。"},{"type":"paragraph","text":"[2]中指，似指中原野战军（第二野战军）指挥部。[3]邓，指邓小平，当时任第二野战军政治委员。饶，指饶漱石，当时"}],"authors":["毛泽东"],"dates":[{"year":1949,"month":5,"day":20}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":412,"page_end":412},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"509f095796"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
