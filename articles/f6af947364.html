":[{"year":1995,"month":8,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"《毛泽东军事思想原理》出版"},{"type":"paragraph","text":"新华社北京８月８日电（通讯员王志强、记者周志方）由军事科学院、国防大学等单位的十余位学者专家撰写的《毛泽东军事思想原理》一书，最近由解放军出版社出版发行。"},{"type":"paragraph","text":"这部书是国家哲学社会科学“八五”规划军事学的列项课题，也是全军军事科研工作“八五”计划的研究课题。全书共５４万字，由概论、战争观和方法论、人民军队思想、人民战争思想、人民战争的战略战术思想、国防建设六编组成。"},{"type":"paragraph","text":"有关专家认为，这部理论专著在综合分析近年来有关研究成果的基础上，结合现代国防建设和军事建设与作战的实际，对毛泽东军事思想的概念和特色、形成和发展、科学体系和原理、历史地位和重要作用，作了新的探索，是一部有较高学术价值的理论专著。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"人民战争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f6af947364"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
