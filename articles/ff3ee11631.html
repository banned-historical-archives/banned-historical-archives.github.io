ical-archives/banned-historical-archives8/main/maoquanji24.pdf"],"article":{"title":"应集结主力歼灭敌三十五军","alias":"","parts":[{"type":"paragraph","text":"应集结主力歼灭敌三十五军川"},{"type":"paragraph","text":"（1948年4月4日）杨、罗、杨、耿，并告聂、萧，中工委："},{"type":"paragraph","text":"三日电?悉。你们应集结主力歼灭西援之三十五军，然后继续在绥远扩张，吸引东敌西援，各个击灭之。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"四日二十四时"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军委起草的给晋察冀野战军司令员杨得志、第一政治委员罗瑞卿、第二政治委员杨成武和参谋长耿飚的电报。"},{"type":"paragraph","text":"[2]聂、萧，指聂荣臻、萧克，当时分别任晋察冀军区司令员兼政治委员和副司令员。"},{"type":"paragraph","text":"[3]指1948年4月3日杨得志、罗瑞卿给中共中央军委的电报。电报说：“我们提议以下两个作战方案：（一）以主力出绥远作夺取全绥远的计划。（二）一、六纵队打下凉城后即以一部围大同，主力集中打援，如援不好打则出平绥东段。”"},{"type":"paragraph","text":"[4]绥远，旧省名，辖今内蒙古自治区中部地区，1954年撤销。"}],"authors":["毛泽东"],"dates":[{"year":1948,"month":4,"day":4}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":216,"page_end":216},"tags":[{"name":"杨得志","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"罗瑞卿","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ff3ee11631"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
