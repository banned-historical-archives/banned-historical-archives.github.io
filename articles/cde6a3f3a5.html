<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"缅共中央热烈电贺中华人民共和国成立二十周年中国在毛泽东思想红旗下空前统一","authors":[],"dates":[{"year":1969,"month":10,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京五日电　中国共产党中央委员会收到了缅甸共产党中央委员会祝贺中华人民共和国成立二十周年的电报。电报全文如下:"},{"type":"paragraph","text":"中国共产党中央委员会"},{"type":"paragraph","text":"亲爱的同志们:"},{"type":"paragraph","text":"一、在中华人民共和国成立二十周年的时候，缅甸共产党中央委员会代表缅甸共产党和缅甸人民，向中国共产党和中国人民致以最热烈的祝贺。"},{"type":"paragraph","text":"二、中国无产阶级和中国人民，在夺取政权的长期革命斗争中，在捍卫和不断巩固无产阶级专政的斗争中，积累了极其丰富的经验，特别是从无产阶级文化大革命以来，学习和运用马克思主义、列宁主义、毛泽东思想的水平空前提高。中国已经成为马克思主义、列宁主义、毛泽东思想的生动的大学校，成为全世界的榜样。"},{"type":"paragraph","text":"在进行了无产阶级文化大革命以后，中华人民共和国在伟大的毛泽东思想红旗下空前统一了。在以毛主席为首、林副主席为副的九届中央委员会的领导下，中国人民正在为完成“九大”提出的各项战斗任务，进行着坚持不懈的斗争。"},{"type":"paragraph","text":"工业、农业和矿业生产取得了一个又一个的胜利，创造了中国历史上最高生产水平，技术革命正在不断发展，文化事业也在不断前进，科学实验取得了惊人的成就。中国的市场繁荣，物价稳定。中华人民共和国在短短的二十年内取得的全面胜利证明，社会主义制度比资本主义制度在各方面都更加优越。"},{"type":"paragraph","text":"同时，中国同美帝国主义、苏联修正主义坚决划清了界限，尽力履行着无产阶级国际主义义务。"},{"type":"paragraph","text":"在一个幅员辽阔的国家内，七亿人民在共产党的唯一的领导下，紧密地团结起来了。国家的经济、军事等方面都有了全面的发展。所有这些无比伟大的胜利，是在用马克思主义、列宁主义、毛泽东思想武装起来的中国共产党的长期努力下取得的，是在毛主席的英明和直接领导下取得的。"},{"type":"paragraph","text":"尽管取得了如此伟大的胜利，中国人民仍保持着谦虚、谨慎、不骄、不躁的作风和艰苦奋斗的作风，决心把革命进行到底。"},{"type":"paragraph","text":"无论是美帝国主义，还是苏修社会帝国主义，如果对强大的社会主义中国进行挑衅和侵略，那么，一切侵略者必将遭到毁灭。"},{"type":"paragraph","text":"今天，中国已经成为能够粉碎一切侵略战争的举世无双的国家。任何人对社会主义中国进行挑衅和侵略，都一定会遭到全世界被压迫人民的更加强烈的反对。"},{"type":"paragraph","text":"三、缅甸共产党领导下的缅甸人民，仍在沿着中国人民走过的道路前进。中国人民战胜了艰难困苦，付出了巨大的牺牲，最后取得了胜利。同样，缅甸人民也一定能够取得胜利，一定能够通过持久战争，战胜奈温军人政府，一定能够建立起独立、自由、民主、团结和富强的缅甸人民民主共和国。"},{"type":"paragraph","text":"四、最后，我们坚信，中华人民共和国在今后的年代里，必将取得比过去二十年更加伟大的胜利。"},{"type":"paragraph","text":"中国人民必胜!"},{"type":"paragraph","text":"中华人民共和国万岁!"},{"type":"paragraph","text":"中缅两国人民和两党的战斗友谊万岁!"},{"type":"paragraph","text":"毛泽东主席万岁!万岁!万万岁!"},{"type":"paragraph","text":"缅甸共产党中央委员会"},{"type":"paragraph","text":"一九六九年九月十五日"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cde6a3f3a5"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
