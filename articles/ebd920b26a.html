rs":["苏宁"],"dates":[{"year":1987,"month":4,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"为开展反对资产阶级自由化正面教育"},{"type":"paragraph","text":"武警四川省总队对基层干部进行培训"},{"type":"paragraph","text":"本报讯　记者苏宁报道：武警四川省总队针对干部战士的思想状况，根据党中央关于坚持四项基本原则、反对资产阶级自由化的指示精神，对大队、支队以上干部分期分批进行集中轮训，既解决了干部的思想认识问题，又为部队全面开展正面教育培训了骨干。"},{"type":"paragraph","text":"今年3月，四川总队举办了第一期干部轮训班，共有120多名党员参加了学习。学习班开始时，学员们畅所欲言地将自己在部队调查研究时了解的情况全都摆了出来。针对同志们提出的各种问题，培训班除了组织大家学习中央有关文件外，还聘请专家学者为学员们讲课，解除学员们对经济体制改革中出现的新情况、新问题所产生的一些疑虑。为了使学员们加深对外开放意义的认识，培训班还组织学员到工厂参观，进行有针对性的调查研究。"},{"type":"paragraph","text":"通过学习，学员们对如何坚持党的领导也有了进一步的认识。他们说，每一个党员干部都要为党增光添采，就要自觉抵制不正之风，就要自觉执行党的路线、方针和政策。"},{"type":"paragraph","text":"通过轮训，学员们对在部队全面开展反对资产阶级自由化的正面教育的意义有了新的认识。许多学员深有感触地说：我们不能用过去“左”的眼光，用资产阶级自由化的眼光，小农经济安于现状、停滞不前的眼光、个人主义的眼光对待改革、开放中出现的新情况、新问题。只有站在四项原则的高度才能跟上时代前进的步伐，与党中央保持高度一致，在四化建设中当好人民的卫士。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"四川文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ebd920b26a"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
