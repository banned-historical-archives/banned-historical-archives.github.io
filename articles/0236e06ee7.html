art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"我们爱毛主席最深最深我们跟毛主席最紧最紧","authors":["指导员孔祥员"],"parts":[{"type":"paragraph","text":"毛主席啊，毛主席！千年的苦根是您挖，人类幸福的种子是您播。过去，我是个穷孩子；今天，我成了您的光荣的警卫战士。毛主席啊！是您伟大思想的阳光雨露滋润着我成长，是您的光辉思想把我灵魂统帅。我深深懂得：保卫您就是保卫中国人民和世界人民的幸福，保卫您的光辉思想，就是保卫中国人民和世界人民的根本利益。倾尽四海之水作墨，伐尽五洲之林作笔，也写不尽我们对您的无限热爱，无限忠诚。我们每一个警卫战士都对您爱得最深最深，对您的战略部署跟得最紧最紧，对您的光辉思想最忠最忠。毛主席啊！我们最衷心地敬祝您万寿无疆！"},{"type":"paragraph","text":"四八七七部队十二分队指导员 孔祥秀DW：四八七七部队十二分队"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0236e06ee7"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
