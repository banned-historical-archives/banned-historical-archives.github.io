946,"month":11,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报北平廿九日专电】　叶剑英今午由哈返平，拒绝发表此行结果。"},{"type":"paragraph","text":"【本报北平廿八日专电】　叶剑英赴哈埠之使命，据今日中共方面表示:系因美方要求在该地设美方联络员，故前去与当地军政方面商酌有无此必要，现自各地小组撤退后除延安有美方联络员外，仅大同尚有特别小组，但不久亦将撤回。闻叶氏即可返平"},{"type":"paragraph","text":"【本报北平廿九日专电】　叶剑英飞哈之同日，中共新闻处长黄华曾飞延安一行，昨日归来，守口如瓶。凡此皆为马帅此番北来后共方之行动，颇堪注目。"},{"type":"paragraph","text":"又今日为朱德六十寿辰，此间中共人员集会庆祝，吃寿面，唱秧歌。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4d18c3ff78"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
