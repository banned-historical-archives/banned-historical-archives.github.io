script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"锡兰工会联合会年会胜利闭幕  桑穆加塔桑再度当选为总书记  朝鲜代表致词坚信锡工人阶级将粉碎美帝阴谋反对现代修正主义","authors":[],"dates":[{"year":1963,"month":12,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"锡兰工会联合会年会胜利闭幕"},{"type":"paragraph","text":"桑穆加塔桑再度当选为总书记"},{"type":"paragraph","text":"朝鲜代表致词坚信锡工人阶级将粉碎美帝阴谋反对现代修正主义"},{"type":"paragraph","text":"新华社科伦坡二十一日电  十二月十八日开幕的锡兰工会联合会第十六届年会今天在这里胜利闭幕。"},{"type":"paragraph","text":"会上一致选举了经验丰富的革命的工人阶级领袖沃森·费尔南多担任锡兰工会联合会的新主席。"},{"type":"paragraph","text":"桑穆加塔桑和克·库拉维拉辛加姆分别再度当选了总书记和司库。"},{"type":"paragraph","text":"在宣布选举结果时，全体代表热烈鼓掌欢呼。"},{"type":"paragraph","text":"桑穆加塔桑在选举结束后发表讲话说，他深信，锡兰工人阶级将继续沿着革命的道路前进。"},{"type":"paragraph","text":"会议在高呼革命口号声中闭幕。"},{"type":"paragraph","text":"当晚，大约两千名工人举行了游行，庆祝会议胜利闭幕。"},{"type":"paragraph","text":"新华社科伦坡二十一日电  朝鲜工会代表团团长元泰勋今天上午在锡兰工会联合会第十六届年会上发表讲话，表示坚信锡兰工人阶级将粉碎以美帝国主义者为首的国际反动派的一切阴谋，巩固他们的民族独立，反对现代修正主义，保卫马克思列宁主义的纯洁性，胜利地完成自己的历史任务。"},{"type":"paragraph","text":"朝鲜代表是在这次年会开幕之后到达这里的。"},{"type":"paragraph","text":"他谴责美帝国主义者的侵略和战争政策说：“只有对战争的土壤帝国主义进行坚决的斗争，才能赢得和平。我们不应该对帝国主义抱有任何幻想，而必须斗争到底，直到我们的残暴敌人帝国主义在地球上完全消灭为止。”"},{"type":"paragraph","text":"他还谈到了朝鲜人民在以金日成同志为首的朝鲜劳动党的正确领导下，在社会主义革命和社会主义建设中所取得的巨大成就。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1ebbe25119"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
