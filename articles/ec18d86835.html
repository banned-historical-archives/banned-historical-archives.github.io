正","重庆"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"对反右派的几点意见","type":"title"},{"text":"重庆徐季正","type":"authors"},{"text":"（徐季正：重庆市食品公司财务主管，主持公司主要业务的干部；标题为编者所加）","type":"subtitle"},{"text":"1. 党的“三害不是一、二个人的问题”，也不是哪个地方的问题，而是由于党的政策和制度造成的。","type":"paragraph"},{"text":"2. 人与人之间只有善恶之分，没有阶级之分，阶级斗争是挑拨人与人之间斗争的学说，经过几个运动之后，人与人之间都不愿以诚相待，变成了互不信任，是阶级斗争的结果。","type":"paragraph"},{"text":"3. 对知识分子的思想改造不应以力服人，应以理服人。士为知己者死。历次政治运动是霸道、不是王道，对知识分子应实行宽柔政策。","type":"paragraph"},{"text":"4．胡风不是反革命，是文艺观点之争。","type":"paragraph"},{"text":"5．“鸣放”是放长线吊大鱼，共产党现在很被动，要批判右派，会影响放。如其泛滥，又不可收拾。章伯钧，罗隆基文章起了带头作用，章乃器说章伯钧是投降将军我很欣赏，史良揭发章伯钧的私房话，我觉得不应该。","type":"paragraph"}],"comments":[],"origin":"徐瑷〈爸爸，我们来看您来了〉，《往事微痕》第九期，2008年10月25日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ec18d86835"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
