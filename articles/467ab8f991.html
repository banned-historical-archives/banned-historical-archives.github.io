year":1946,"month":7,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席、朱总司令"},{"type":"paragraph","text":"电慰马叙伦先生等"},{"type":"paragraph","text":"【新华社延安五日电】下关惨案消息传至此间后，毛主席、朱总司令即电慰惨案中受伤之马叙伦先生等。兹特将原电发表如下："},{"type":"paragraph","text":"南京周恩来同志请转上海人民团体请愿代表马叙伦、简延芳，张绸伯、包达三、盛丕华、吴耀宗、阎宝航、雷洁琼、陈震中、陈立复诸先生公鉴："},{"type":"paragraph","text":"先生等代表上海人民共走和平，竟遭法西斯暴徒包围欧打，可见好战分子不惜自绝于人民。中共一贯坚持和平民主方针，誓与全国人民一致为阻止内战争取和平奋斗。谨电慰问，并希珍重！"},{"type":"paragraph","text":"毛泽东  朱德"},{"type":"paragraph","text":"【新华社延安六日电】沪讯：上海市工人协会于下关惨案发生后，即致函慰问马叙伦等氏，并表示将号召全市八十万工人，向政府提出严重抗议，誓为马氏等后盾，为中国和平而奋斗到底。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"467ab8f991"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
