<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"5a6e14f4-1103-48c3-bd99-37613918dd4b","name":"中共党史教学参考资料 第25册 “文化大革命”参考资料 上册（1988年）","internal":true,"official":true,"type":"pdf","author":"","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives3/main/5a6e14f4-1103-48c3-bd99-37613918dd4b.pdf"],"article":{"title":"北京针织总厂的无产阶级文化大革命运动是体现毛主席革命路线和战略部署的典范","alias":"","parts":[{"type":"paragraph","text":"北京针织总厂的无产阶级文化大革命"},{"type":"paragraph","text":"运动是体现毛主席革命路线和"},{"type":"paragraph","text":"战略部署的典范 (节录)"},{"type":"paragraph","text":"（一九六七年十月十七日）"},{"type":"paragraph","text":"八三四一部队支左人员在六月二十六日进厂以后，遵循伟大领袖毛主席的一贯教导，在支左工作中坚决贯彻执行以下原则："},{"type":"paragraph","text":"大力宣传毛泽东恩想，做深入的、细致的、艰苦的思想政治工作。"},{"type":"paragraph","text":"不匆努忙忙急于表态，经过调查研究，如果两派都是革命的群众组织，就逐步地把他们联合起来。"},{"type":"paragraph","text":"向工人群众学习，不怕犯错误，错了就改。关心群众的生活。"},{"type":"paragraph","text":"他们牢记毛主席“掌握思想教育，是团结全党进行伟大政治斗争的中心环节”的教导、作支左工作中狼抓根本不转向。他们认为：支左工作的根本任务，就是用毛泽东思想武装群众的头脑，大树特树伟大领袖毛主席的绝对权威，大树特树毛泽东思想的绝对权威，大树特树毛主席的无产阶级革命路线的绝对权威。支左人员，就是毛泽东思想的宣传员。支左过程中，事情千头万绪，情况千变万化，抓住活学活用毛主席著作这一条就抓住了根本。他们坚信毛泽东思想的无比威力，坚信广大群众最听毛主席的话，不管碰到多少困难，不管出现多大的问题，都坚定不移地宣传毛泽东思想，引导群众按照毛主席的教导去解决问题。他们用最大的热情，又快又深地、不折不扣地把毛主席的最新指示和无产阶级司令部的战斗号令，传达到广大群众中去。他们组织广大革命职工以“斗私，批修”为纲、联系思想，联系阶级斗争的实际，活学活用毛主席著作。他们进行了深入、细致、艰苦的思想政治工作，把毛泽东思想送到车间，送到宿舍，送到广大职工及其家属的心坎上。"},{"type":"paragraph","text":"全厂广大革命职工在支左部队帮助下，进一步掀起了活学活用毛主席著作的群众运动。他们积极布置学习环境，大造学习声势，建立和健全天天读等学习制度，组织毛泽东思想宣传队，举办毛泽东思想学习班。职工们上班前站在毛主席像前、学习毛主席语录，向毛主席请示，下班后向毛主席汇报，生产中抬头便见毛主席语录牌，交班时交毛主席语录，随时随地用毛主席的教导指导自己的行动。广大革命职工大学大用“老三篇”，改造世界观，在灵魂深处爆发革命。他们认真学习毛主席著作和最新指示，深刻理解和掌握毛主席关于无产阶级专政下继续进行革命的理论、路线、方针、方法和政策，紧跟毛主席的伟大战略部署。1人们歌唱道：“工厂变成了毛泽东思想大课堂，心中升起了永远不落的红太阳！”"},{"type":"paragraph","text":"“组织千千万万的民众，调动浩浩荡荡的革命军，是今天的革命向反革命进攻的需要。八三四一部队支左人员，遵循毛主席的这一教导，一进厂就十分重视促进革命的大联合，引导广大革命职工团结对敌。他们坚信：各派革命的群众组织，都是要按照毛泽东思想办事的，只要做好思想政治工作，他们便可以在毛泽东思想的基础上，逐步地联合起来。"},{"type":"paragraph","text":"（原载1967年12月17《人民口1报》）"}],"authors":[],"dates":[{"year":1967,"month":12,"day":17}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":660,"page_end":660},"tags":[{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"革命大联合","type":"主题/事件"},{"name":"军队支左","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a1f7e7f041"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
