ical-archives/banned-historical-archives0/main/maoquanji39.pdf"],"article":{"title":"关于相机透露毛泽东准备辞去国家主席职务给宦乡的电报","alias":"","parts":[{"type":"paragraph","text":"关于相机透露毛泽东准备辞去国家主席职务给宦乡“的电报"},{"type":"paragraph","text":"（1958年7月31日）发驻英使馆宦乡同志："},{"type":"paragraph","text":"六月二十日你给外交部的电报我看了。所传辞职事是真正的。我决心辞去国家主席一职，中央及省市同志都认为有利，正向地县区乡干部通知，并展开辩论，以免临时显得突然。国内民主党派已通知并配酿一年多了。在华外人，如苏新使节及前印度大使尼赫鲁等亦已谈过。请你经过新华社记者在伦敦新闻记者中相机陆续放出一点空气。要是非正式的，以闲谈方式出之。经过英共记者，或更好些。遂步使人们不当作谣言，而当作事实。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"七月三十一日[1]宦乡，当时任中国驻英国大使馆代办。毛泽东全集第三十九卷"},{"type":"paragraph","text":"二刘、周、朱、林、陈、邓阅发。"},{"type":"paragraph","text":"[1]刘，指刘少奇。周，指周恩来。朱，指朱德。林，指林彪，当时任中共中央副主席。陈，指陈云，当时任中共中央副主席。邓，指邓小平，当时任中共中央总书记。"}],"authors":["毛泽东"],"dates":[{"year":1958,"month":7,"day":31}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":511,"page_end":512},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"906dab29d1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
