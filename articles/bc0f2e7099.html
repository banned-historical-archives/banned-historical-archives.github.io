<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"jfjb","name":"解放军报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"dates":[{"year":1967,"month":3,"day":7}],"page_start":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"像雷锋同志那样爱憎分明","authors":["学习毛主席著作积极分子/副班长封文生"],"parts":[{"type":"paragraph","text":"雷锋同志爱憎分明，立场坚定。他对毛主席无限热爱，对阶级敌人刻骨仇恨。这是我要永远向他学习的。"},{"type":"paragraph","text":"在旧社会，我的家和雷锋一样，也有一部伤心史，一笔血泪仇。一九六五年三月我应征入伍。我只想，没有毛主席就没有我封文生，来到部队，我就拚命地干工作吧，还有什么问题。哪想到，事情并不那么简单。一九六五年十月，领导让我参加班长集训队学习。同志们说，这回是要我当班长了。我自己也觉得工作干得挺起劲，当班长也差不多了。哪知道集训回来，还是当战士，心里很不是滋味。"},{"type":"paragraph","text":"我带着自己的问题，学习了《关于纠正党内的错误思想》、《为人民服务》，细细琢磨，大吃一惊，原来我头脑里的资产阶级思想滋长起来了。我错误地认为“完成任务好，就是政治好”，只埋头干业务工作，忽视了思想改造。而干工作又是掺杂了私心，想着个人的名利前途。和张思德一比，和雷锋一比，自己实在是太渺小了！"},{"type":"paragraph","text":"为什么会不知不觉地滋长了资产阶级思想呢？这一段弯路使我意识到，社会主义社会，还存在着阶级，充满着阶级斗争。这种斗争必然要反映到每个人的头脑里来。家庭出身好，如果不认真学习毛主席著作，不用毛泽东思想武装头脑，不把朴素的阶级感情提高到自觉的阶级觉悟，同样经不起阶级斗争风浪的考验，要当资产阶级思想的俘虏。"},{"type":"paragraph","text":"毛主席教导我们：“敌人是不会自行消灭的。”被打倒的阶级敌人是不甘心死亡的，它们总是一有机会就兴风作浪。我们头脑里的资产阶级思想也是如此，你不重视思想改造，不去打倒它，它就要滋长起来。雷锋同志不但恨旧社会压迫他的地主阶级，而且也恨自己头脑中的个人主义思想。他不是说过吗：对待个人主义要像秋风扫落叶一样。没有对资产阶级思想的刻骨憎恨，也就没有对毛泽东思想的无限热爱。只有爱憎分明，我们才能够在尖锐复杂的阶级斗争中辨明是非，分清敌我，不管是打着黑旗的敌人，还是打着“红旗”反红旗的敌人，我们都能够识破它，战胜它，使自己永远跟着毛主席走，永远立于不败之地。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bc0f2e7099"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
