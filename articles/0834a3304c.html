清除出教会去","authors":["济南教区副主教","董文隆"],"dates":[{"year":1955,"month":9,"day":23}],"is_range_date":false,"parts":[{"text":"为纯洁圣教会，把龚品梅等法利赛党徒清除出教会去","type":"title"},{"text":"济南教区副主教董文隆","type":"authors"},{"text":"龚品梅反革命集团是我们教会中的毒蛇，它不断的向全国各地的教友喷射他们的思想毒素，使各处传教事业普遍地呈现了一种分裂的、瘫痪的状态。解放以后，他们又组织一帮“公青”分子，派遣到各个教区，散发反动传单，并造谣破坏说：“教难来临”，所以有一些传教士改名换姓，抛弃了自己的工作转入地下。有的虽然还在岗位上工作，但是抱着消极态度，等待着“变天”，这样就把救灵大业抛弃到九霄云外了。全国各地掀起了爱国运动以后，龚品梅反革命集团在帝国主义的亲自领导下，大肆造谣说：那个神父参加爱国运动，就是“跌倒”的神父，教友就当孤立他，不望他的弥撒。致使少数善良教友受了他们的蒙蔽欺骗而陷入思想苦闷和徬徨不安，这种现象为发展教务有莫大的障碍。人民政府在宪法上，明文规定了宗教信仰自由的政策，在城市，在乡村也大力地贯彻了这一政策，使每一个教友都能过到真正的宗教生活，而龚品梅反革命集团动辄不许爱国教友领圣体、办神功，破坏教友宗教生活的就是这群反革命分子。现在政府把这批人民的死敌和教会的败类逮捕法办，不是罪有应得的吗？所以我以无比愉快的心情，拥护政府这一英明的、及时的和必要的措施。","type":"paragraph"},{"text":"全国各地的教友和神职人员受龚品梅反革命集团的欺骗而误入歧途的，还大有人在。如今我诚恳的希望他们擦亮眼睛，揭开这些反革命分子所披的宗教外衣，看看他们那狰狞的面目和铁一般的罪证，及早地醒悟过来，停止自己一切破坏祖国、破坏教会的罪恶活动，回到爱国爱教的立场上来，与龚品梅反革命集团划清敌我界限，争取宽大处理，重新做人。","type":"paragraph"},{"text":"圣经上记载：“吾主耶稣把玷污圣殿的生意人赶了出去。”我希望爱国爱教的虔诚教友们，也要效法吾主耶稣这个精神，把潜藏在天主教内的反革命分子全部地清除出去。","type":"paragraph"}],"comments":[],"origin":"《信鸽半月刊》1955年9月23日","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0834a3304c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
