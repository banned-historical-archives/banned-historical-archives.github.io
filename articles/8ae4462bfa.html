ical-archives/banned-historical-archives0/main/maoquanji45.pdf"],"article":{"title":"对《毛泽东军事文选》外文版一条注文的批语","alias":"","parts":[{"type":"paragraph","text":"对《毛泽东军事文选》外文版"},{"type":"paragraph","text":"一条注文的批语!\""},{"type":"paragraph","text":"（1962年1月22日）照办。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一月廿二日"},{"type":"paragraph","text":"[1]这个批语写在毛泽东的秘书田家英1962年1月10日给他的报告上。报告说：主席的军事文选，由编译局组织了英文、法文、俄文和西班牙文的翻译，现已基本译完，大约在3个月内可以分别出版。为了适合外国读者的需要，我们增加了一些注释。在《抗日游击战争的战略问题》一文中，讲到建立游击根据地的条件之一是地区广大，在小国进行游击战争的可能性便很小甚至没有。鉴于这批外文本主要是在亚、非、拉美各国发行，那些地区的国家，有的已经有过胜利的游击战争，有的还在进行或者可能发生这种战争，所以我们准备在这段文章的后面加一条注释，说明在新的历史情况下，各国人民进行革命战争已经同我国抗日战争所需的条件不完全相同，国家幅员大小，已经不是游击战争能否最后胜利的决定性的条件。这条注文已请康生看过，现在请主席审阅。"}],"authors":["毛泽东"],"dates":[{"year":1962,"month":1,"day":22}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":49,"page_end":49},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8ae4462bfa"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
