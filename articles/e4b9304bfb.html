不满情绪","authors":["新华社"],"dates":[{"year":1956,"month":11,"day":8}],"is_range_date":false,"parts":[{"text":"匈牙利事件后天津市上层社会人士透露出一些不满情绪","type":"title"},{"text":"新华社","type":"authors"},{"text":"新华社天津８日讯　天津市许多民主人士、上层社会人士和资产阶级分子联系到中国情况，认为我国和人民民主国家也应从匈牙利事件中吸取教训。南开大学教授、市监察局局长王赣愚认为：“匈牙利劳动人民党是工人党、社会党合并的，大概合并有问题。我们中国是民主党派长期共存，还是这样好。”有的提出应进一步扩大统一战线。许多人谈到改善人民生活问题，社会人士杨建章说：“改善生活确非小事，可得注意。中国虽没这个问题，但高级领导应注意此事，应多接受大家意见。”他还感激地说：“城市比农村生活高百倍，农民现在苦得很。城里人不下乡，根本不了解乡下人的困苦。”河东区政协副主席刘仁圃也表示同意他的意见，并说：“千万不要让特务利用灾民闹起来。”国防委员鹿钟麟说：“刘少奇报告好几处谈到节约，可是节约得太厉害，在农村里就会发生问题。”","type":"paragraph"},{"text":"关于人民民主生活问题也有些议论。民革天津市委员会主委杨亦周认为造成匈牙利局势的主要原因是压制民主问题，他说：“党独断独行，除了党，别人不能说话。”民革会员于月苹借题发挥说：“过去我们也是这样，一说话就有人给你扣帽子。”天津师范学院副教务长杨思慎说：“现在形势变化这么快，我们还是新闻封锁政策。这样下去，我们都变成没有文化不知道国际情况的人了。过去我们在国民党统治下，倒可以分析国际形势，甚至写写论文，现在什么也不知道。听美国之音，我不肯那样做。可是报纸上的东西真贫乏。难道对我们还不信任吗？”他还说：“我当人民代表，没有一点味道。如果人家不选我，我一点也不难过，人民代表什么事也不管。一年一度的视察，也都是预备好了的一套话，介绍情况也是吞吞吐吐，还不如不去。”","type":"paragraph"},{"text":"来源：１９５６年１１月８日新华社《内部参考》。","type":"paragraph"}],"comments":[],"origin":"美国图书馆收藏","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"世界形势","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e4b9304bfb"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
