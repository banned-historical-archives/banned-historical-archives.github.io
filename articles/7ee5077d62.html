概要）","authors":[],"dates":[{"year":1966,"month":7,"day":19}],"is_range_date":false,"parts":[{"text":"中共中央转批上海市委“关于当前工业生产情况的报告”（概  要）","type":"title"},{"text":"中共中央转批上海市委《关于当前工业生产情况的报告》。报告指出，文化大革命以来，上海市工业生产中出现了事故增多、设备维护差、某些产品产量下降、生产技术协作中断、基本建设完不成计划、干部放松生产和业务工作等问题。为了保证完成国家任务，上海提出4项改进措施：1.要抓革命促生产，要组织专门班子，形成上下一条线，在各级党委统一部署下，负责抓生产、抓业务。2.要把质量品种放在第一位，同时抓好设备维修工作。3.要努力完成出口援外任务。4.科研项目和新产品试制、设计工作要抓紧。工厂、学校和科研机关的协作关系，已经中断的，要采取措施迅速恢复。以上所提的4项措施，中央认为各地可参照办理。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7ee5077d62"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
