、英·萨利特使；周恩来总理、叶剑英副主席、李先念副总理等。沙林察外交大臣和姬鹏飞外交部长分别代表本国政府签字","authors":[],"dates":[{"year":1972,"month":2,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京一九七二年二月十一日电　中华人民共和国政府和柬埔寨王国民族团结政府关于一九七二年度中国给予柬埔寨经济和军事物资援助的协定，今天在北京签字。"},{"type":"paragraph","text":"出席签字仪式的有:"},{"type":"paragraph","text":"柬埔寨国家元首诺罗敦·西哈努克亲王，柬埔寨王国民族团结政府首相宾努亲王，柬埔寨国内特使英·萨利；"},{"type":"paragraph","text":"国务院总理周恩来，军委副主席叶剑英，国务院副总理李先念。"},{"type":"paragraph","text":"柬埔寨王国民族团结政府外交大臣沙林察和中华人民共和国外交部长姬鹏飞，分别代表本国政府在协定上签字。"},{"type":"paragraph","text":"柬埔寨方面参加签字仪式的还有:柬埔寨王国民族团结政府人民教育、青年大臣江裕朗，财经大臣秀木，军需、军备大臣杨森安将军，司法、司法改革大臣谢桑，首相府大臣吉春，国家元首办公厅主任梅达维亲王，外交第二副大臣万比尼，外交部秘书长宾纳，柬埔寨驻中国大使凯密。"},{"type":"paragraph","text":"中国方面参加签字仪式的还有:中共中央对外联络部部长耿飚，国防部副部长肖劲光，外交部副部长韩念龙，外贸部副部长李强，对外经济联络部副部长韩宗正，中国人民解放军总后勤部装备部部长苑化冰，中国人民银行副行长乔培新，外交部亚洲司副司长陆维钊，中国驻柬埔寨大使康矛召。"},{"type":"paragraph","text":"签字以后，中柬两国领导人举杯，共祝中柬两国人民的伟大友谊和战斗团结不断巩固和发展。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"叶剑英","type":"人物"},{"name":"李先念","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8f22c14997"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
