ar":1980,"month":9,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"“奴隶”和“主人”"},{"type":"paragraph","text":"沈思义"},{"type":"paragraph","text":"小李新买了一辆自行车，就把原来骑的那辆公车交给了单位行政处。不到三个月，他又上行政处要那辆公车。行政处老王说：“你不是才买一辆新车吗？”小李说：“我把它卖掉了。”老王不解地问：“为什么？”小李说：“我不想做车的奴隶，要做车的主人。”老王摇头说：“我不懂你话的意思。”小李说：“你不知道，自己的车要天天擦，雨天又不敢骑，碰上路上有水的地方还得扛着它，简直成了它的奴隶了。公车呢，爱怎么骑就怎么骑，一年也不擦它一回，这才真正是车的主人哩！”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"25695bec61"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
