tart":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"缅怀毛泽东的丰功伟绩","authors":["新宇"],"parts":[{"type":"paragraph","text":"司马义·艾买提说，在中国共产党成立之初，毛泽东同志就以敏锐的目光看到了中国是个多民族组成的伟大国家的客观现实，看到了处理好民族问题在中国革命进程中的极端重要性。在长期的革命实践中，毛泽东同志从中国实际出发，提出了解决中国民族问题的一系列正确的思想、理论、方法。他的关于民族发展规律的精辟论述，他的关于各民族一律平等的深刻思想，他的“中国各族人民团结起来”的伟大呼唤，他的“诚心诚意帮助少数民族发展经济建设和文化建设”的庄严号召，他的关于民族区域自治的重大决策，他的关于培养少数民族干部的理论观点，永远闪耀着真理的光芒。当我们环视今天的中华大地，看到中国各民族和睦相处、安居乐业的时候；当我们放眼世界，看到许多地区充满战乱、争斗，许多民族在流泪、流血的时候，我们更加真切地感到，以毛泽东为代表的中国共产党人，为我国各民族做出的贡献是何等的伟大！"},{"type":"paragraph","text":"司马义·艾买提说，我们要团结在以江泽民同志为核心的党中央周围，沿着毛泽东等老一辈无产阶级革命家开创的处理民族问题的正确道路，振奋精神，精诚团结，努力奋斗，把我们的国家建成现代化强国，使中华民族跻身于世界民族的前列，这将是对毛泽东同志永恒的和最好的纪念。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"968f80f7ad"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
