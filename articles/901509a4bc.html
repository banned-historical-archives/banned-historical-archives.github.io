<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中央人民政府最高人民检察署为贯彻实施“惩治反革命条例”给各级人民检察署的指示","authors":[],"dates":[{"year":1951,"month":3,"day":21}],"is_range_date":false,"parts":[{"text":"中央人民政府最高人民检察署为贯彻实施“惩治反革命条例”给各级人民检察署的指示","type":"title"},{"text":"惩治反革命条例的公布，是新中国立法工作中的一件大事，是巩固人民民主专政的重要措施。它是根据共同纲领第七条的精神，总结了镇压反革命活动的丰富经验，经过审慎研究而制定的。它给予干部和群众以镇压反革命活动的法律武器，给予审判反革命罪犯的人员以量刑标准。这个条例的公布，更鼓舞起广大人民对反革命斗争的积极性，将使镇压反革命的斗争走上新的阶段，更准确有效的打击敌人，巩固人民民主专政。","type":"paragraph"},{"text":"人民检察机关的任务，在于保障“惩治反革命条例”的普遍和准确实施，防止各种偏向；在于保障“惩治反革命条例”，任何地区任何机关均能严格遵行，这是中央人民政府组织法第二十八条给予人民检察机关的主要任务。","type":"paragraph"},{"text":"为了正确执行上述任务，所有检察干部必须认真地学习与研究“惩治反革命条例”，领会其精神和实质。把这个条例作为镇压反革命工作的指针。当然我们的学习，不是教条式的背诵，而应该是联系思想，联系实际，和检查总结工作结合起来，和吸取工作中的成绩经验，克服工作中的错误及偏向结合起来。","type":"paragraph"},{"text":"各级人民检察署，应联合公安机关审判机关和宣传机关及人民团体配合各种群众运动展开对惩治反革命条例的普遍宣传教育工作，以提高群众政治警惕性与向反革命斗争的积极性，使法律变为物质力量。","type":"paragraph"},{"text":"过去镇压反革命工作中的“宽大无边”偏向，虽然已受到严厉批判，在许多地方已得到纠正，但在某些地方，有些干部还未得到纠正。产生“宽大无边”的思想根源，政法委员会彭真副主任在中央人民政府委员会的报告中，已作了深刻批判。检察机关在保障“惩治反革命条例”的实施中，必须继续和这种“宽大无边”的偏向进行斗争，但也不是说可以“镇压无边”。","type":"paragraph"},{"text":"在纠正“宽大无边”偏向同时又须注意防止主从不分、轻重倒置、乱打乱杀的现象发生，“惩治反革命条例”是贯彻了镇压与宽大相结合的精神的。彭副主任在报告中也已指出过。各级检察人员，均应好好学习与研究这个报告！","type":"paragraph"},{"text":"贯彻实施“惩治反革命条例”，还必须正确执行既“稳”又“准”的方针，即调查研究，弄清是非，打击敌人，保护人民，反对目前某些地方处理案件中的急燥情绪，简单作风，对案情、罪行不深追彻查，仅仅问出一点材料，即草率结案的现象，应予纠正。必须做到既不宽纵一个坏人，也不冤枉一个好人，而且应分别罪行的轻重，予以恰当的处理。","type":"paragraph"},{"text":"反革命的活动是多样的，其计谋是毒恶的，人民检察机关对于钻进政府机关团体内部的反革命分子，更应有高度的警惕，配合公安机关予以检举，移送审判机关依法惩办。","type":"paragraph"},{"text":"一年来的经验证明，人民检察机关为实现其检举反革命分子的任务，必须紧紧依靠广大群众，要使群众知道检察机关是为人民服务、为人民除害、保护人民利益的机关，应该逐步创造和建立必要的制度和办法，加强和人民的联系，以便洞察一切反革命分子的活动，随时随地的予以惩办。","type":"paragraph"},{"text":"人民检察机关，执行检察职务，主要的要和公安机关审判机关密切结合。参与各级裁判（复核）委员会的工作时，应集中力量，迅速正确处理反革命案件。协同公安机关审判机关有重点的检查各地镇压反革命的情况，执行政策有无偏差，工作方针是否适当，帮助公安机关审判机关清理反革命积案，检察监所工作之狱政方针和设施。在主观条件许可时，可参与公安机关对反革命案件的侦讯，及审判机关的审理。过去有些地方是这样的，已有相当成效。今后还可这样做。","type":"paragraph"},{"text":"过去一年中，各级人民检察署，已经在工作中摸索了一些经验，创造了一些工作方法，我们应该重视这些经验和方法，加以总结，加以提高，以便进一步从实际工作中创造出适合人民检察工作性质及任务的一套工作方法，为此目的，我们应该十分虚心的学习，十分努力的工作，边做边学，在工作中学习；应该掌握深入下层，接触实际调查研究的工作方法，经常派人下去，调人上来，用检查、巡视、汇报的方法，密切上下的关系，及时发现问题，交流经验。","type":"paragraph"},{"text":"各级检察机关接此指示后，应进行深入的研究，根据具体情况布置工作，并将执行情形随时报告。","type":"paragraph"},{"text":" 检察长  罗荣桓","type":"paragraph"}],"comments":[],"origin":"根据文件的原件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"901509a4bc"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
