","张志武"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"“三害”判决书","type":"title"},{"text":"北京大学张志武","type":"authors"},{"text":"（张志武：北京大学法律系学生）","type":"subtitle"},{"text":"被告：宗派主义，年36岁，1921年7月1日生","type":"paragraph"},{"text":"教条主义，年38岁，1919年5月4日生","type":"paragraph"},{"text":"官僚主义，年8岁，1949年10月1日生","type":"paragraph"},{"text":"查被告宗派主义自诞生以来，搞不团结，破坏党与非党团结迫害群众，造成对党不满。","type":"paragraph"},{"text":"查被告教条主义，将马克思主义当成死的圣经，不问客观情况，硬按清规戒律行事，不顾中国情况，生搬硬套苏联经验，扼杀新生力量。","type":"paragraph"},{"text":"查被告官僚主义，平日高高在上，不问下情，主观臆断，脱离人民，在这次整风运动中，对来自群众的批评置之不理，反恶意猜测提意见的动机；加以打击报复。","type":"paragraph"},{"text":"以上被告由北京大学全体学生公诉来院，经本院审讯被告对以上罪行供认不讳。","type":"appellation"},{"text":"为了整风，彻底根除三害，现应判处被告死刑，但念宗派主义对加强党性，维护党的利益，保持党的纯洁有功。教条主义虽然生搬教条，但对减轻脑力劳动，防止操劳过度，遵守马列主义则有功。官僚主义对维获领导威信，防止忙于日常琐事有功，减干部体力劳动过度有功，故免于判刑宣布无罪释放，今后再有骚乱滋事之徒控告那三个主义，本院定判其诬告罪，斩首公众，以儆效尤。","type":"paragraph"},{"text":" 北京大学整风法院附：此件约于6月上旬拟就。","type":"paragraph"},{"text":" 来源：北京大学社会主义思想教育委员会编印《北京大学右派分子反动言论汇集》，一九五七年十月。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"13c573ca8f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
