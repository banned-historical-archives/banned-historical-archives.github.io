ical-archives/banned-historical-archives0/main/maoquanji50.pdf"],"article":{"title":"对追授门合“无限忠于毛主席革命路线的好干部”称号命令稿等的批语","alias":"","parts":[{"type":"paragraph","text":"对追授门合“无限忠于毛主席革命"},{"type":"paragraph","text":"路线的好干部”称号命令稿\""},{"type":"paragraph","text":"等的批语"},{"type":"paragraph","text":"（1968年4月）有点修改。"},{"type":"paragraph","text":"[1]门合，原任中国人民解放军青海省军区独立师四团二营副教导员。1967年9月5日，在巴仓农场执行支左任务，用炸药装置土火箭驱云防电，当炸药发生意外爆炸时，为保护在场的其他27人免受伤害，用身体扑在炸药上，英勇牺牲。1968年4月7日，中共中央军委办事组向毛泽东等报送了代拟的《中共中央、中央军委、中央文革追授门合同志“无限忠于毛主席革命路线的好干部”称号的命令》稿及《门合同志英雄事迹的简要材料》。4月23日，中共中央、中央军委、中央文革发出这个命令。"},{"type":"paragraph","text":"[2]毛泽东对中共中央、中央军委、中央文革的命令稿和中央军委办事组送审报告的修改，主要是将两件中的“忠于毛主席”改为“忠于人民忠子党”，将两件中的“无限忠于毛主席”改为“无限忠于人民，无限忠于党”。"}],"authors":["毛泽东"],"dates":[{"year":1968,"month":4}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":204,"page_end":204},"tags":[{"name":"毛泽东","type":"人物"},{"name":"中央文革","type":"人物"},{"name":"军队支左","type":"主题/事件"},{"type":"文稿类型","name":"指示"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cacc34f2a3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
