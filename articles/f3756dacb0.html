dates":[{"year":1967,"month":9,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　闸北区产院两个革命造反组织，通过一周来活学活用毛主席著作，在光焰无际的毛泽东思想的指引下，决心以实际行动紧跟毛主席的伟大战略部署，克服“私”字，铲除小山头，实现了革命的大联合，成立了统一的组织机构——上海市闸北区卫生系统革命造反委员会闸北区产院造反队。"},{"type":"paragraph","text":"这两个革命组织从成立以来，由于对院内原来的领导的看法不一致，双方发生分歧，打了好几个月“内战”。双方虽然有联合的愿望，但由于彼此缺乏自我批评的精神，结果总是不欢而散。"},{"type":"paragraph","text":"无产阶级司令部发出新的战斗号令以后，在院内广大革命群众的强烈要求下，两个组织通过学习毛主席著作和报刊上的重要文章和社论，以毛泽东思想为武器，各自联系实际，亮自己的思想，进行了认真的自我批评，统一了认识，达成了大联合的协议，正式成立了闸北区产院造反队的统一组织，并选出了新队委。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"派性","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f3756dacb0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
