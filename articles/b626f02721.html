tart":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"本·贝拉总统向毛主席刘主席赠礼阿游览部长设宴招待中国领导人","authors":[],"parts":[{"type":"paragraph","text":"新华社阿尔及尔26日电 阿尔及利亚总统本·贝拉26日下午向毛泽东主席和刘少奇主席各赠送一条阿尔及利亚地毯和两把精致的宝剑。"},{"type":"paragraph","text":"本·贝拉总统请周恩来总理把他的礼物转交给毛泽东主席和刘少奇主席。"},{"type":"paragraph","text":"新华社阿尔及尔26日电 阿尔及利亚游览部长卡伊德·艾哈迈德今天中午在阿尔及尔“达尔阿里”饭店设宴招待周恩来总理和陈毅副总理兼外交部长。"},{"type":"paragraph","text":"周恩来总理和陈毅副总理的随行人员以及中国驻阿尔及利亚大使曾涛也出席了宴会。"},{"type":"paragraph","text":"阿尔及利亚方面出席作陪的有：第一副总理兼国防部长布迈丁、政府其他部长和各界知名人士。"},{"type":"paragraph","text":"在宴会上，宾主双方在这家俯瞰地中海和阿尔及尔全市的饭店里欣赏了阿拉伯音乐和舞蹈。"},{"type":"paragraph","text":"宴会结束后，周恩来总理和陈毅副总理参观了这家最近被收归国有的法国饭店，并同饭店的工作人员握手。"},{"type":"paragraph","text":"中国领导人还应邀为饭店题词。周恩来总理写道：“入于污泥而不染，不受资产阶级糖衣炮弹的侵蚀，是最难能可贵的革命品质。”陈毅副总理写道：“中国阿尔及利亚友谊万岁！”"}],"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"陈毅","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b626f02721"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
