况向中央及华北局的请示报告","authors":[],"dates":[{"year":1950,"month":3,"day":20}],"is_range_date":false,"parts":[{"text":"中共北京市委关于敌特党团分子处理情况向中央及华北局的请示报告","type":"title"},{"text":"我们根据可靠材料，入城以来共逮捕、集训、登记了敌特党团分子6930名。兹将概况及拟处办法报告如下：","type":"paragraph"},{"text":"甲、概况：","type":"paragraph"},{"text":"（一）对罪恶深重或在我入城后仍继续进行反革命活动者，实行扣押、审讯。一年来共扣押监禁867人，现须劳动改造者37人，仍在审讯监禁中者296人，其余534人，系一年来已集训即已处理者，送军法处、法院判处枪决、徒刑、解回原籍发落、送清河大队。","type":"paragraph"},{"text":"（二）罪恶不大并已表示愿意悔改的一般特务分子，系送清河大队管训。一年来共管训2506人，现仍在管训中者296人，送茶淀农场劳动改造者1637人，其余573人系已处理者（包括解回原籍、送法院或释放者）。","type":"paragraph"},{"text":"（三）一般无甚明显罪恶的小特务及反动党团区分部一级人员，系实行登记控制，进行社会改造。一年来共登记3557人，扣押、死亡等及免予控制者共602人，现仍在控制着的2955人。","type":"paragraph"},{"text":"乙、因为逮捕、惩处、集训及登记了这样大数目的反动分子，才保证了首都的治安。但数目既如此之大，一时殊无力，同时也很难一一判决。兹提出处理原则如下，请中央批示（以便再报中央政府后执行）。","type":"paragraph"},{"text":"（一）前述第一类在审讯监禁中者，于全案侦察清楚后，即送军法处或法院，依法判处。","type":"paragraph"},{"text":"（二）第二类之大部（即除尚须进行系统侦察、尚有利用价值者外）及第二类中之可以劳动改造者，一律先送公安局在茶淀所设农场，实行劳动改造，一年后再按悔改情况及在劳动中的表现，判决释放、监禁或继续实行劳动改造。此项劳动改造和考查，拟以一年为一期，届期即分别处理一次。","type":"paragraph"},{"text":"（三）已登记及被管制之反动分子，其情节较重、现尚有进行反革命活动嫌疑者，亦拟集中送农场进行劳动改造，以保证首都治安。","type":"paragraph"},{"text":"上述处置当否，请示。","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"88161e57f6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
