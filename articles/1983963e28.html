authors":[],"dates":[{"year":1968,"month":3,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"全面落实毛主席最新指示　打好春耕生产第一仗"},{"type":"paragraph","text":"南宁贫下中农首届代表大会胜利召开"},{"type":"paragraph","text":"新华社南宁二十五日电　广西壮族自治区首府南宁市贫下中农、革命农民首届代表大会于三月二十二日举行。这次大会，是南宁十万贫下中农高举毛泽东思想伟大红旗，无限忠于毛主席，无限忠于毛泽东思想，无限忠于毛主席无产阶级革命路线，全面落实毛主席的最新指示，夺取无产阶级文化大革命全面胜利的誓师大会。"},{"type":"paragraph","text":"广西革命委员会筹备小组、广西军区和南宁驻军负责人韦国清、欧致富、魏佑铸、焦红光、伍晋南、安平生等出席了大会。"},{"type":"paragraph","text":"南宁市的贫下中农、革命农民代表在会上总结和交流了过去一年中，保卫毛主席的无产阶级革命路线，全面落实毛主席最新指示的经验。他们决心继续大办、办好各种类型的毛泽东思想学习班，全面落实毛主席的最新指示，巩固和发展革命大联合和革命三结合，夺取无产阶级文化大革命的全面胜利。"},{"type":"paragraph","text":"大会表示，南宁广大贫下中农、革命农民一定要高举毛泽东思想伟大红旗，把活学活用毛泽东思想摆在高于一切、大于一切、先于一切、重于一切的位置，做学习、执行、宣传、捍卫毛主席最新指示的模范，做斗私批修的闯将，彻底清算以中国赫鲁晓夫为代表的党内最大的一小撮走资派及其在广西的代理人复辟资本主义的滔天罪行，彻底肃清中国赫鲁晓夫的反革命修正主义路线的流毒。坚决响应伟大领袖毛主席“抓革命，促生产”的伟大号召，鼓足干劲，力争上游，打好春耕生产第一仗，为夺取无产阶级文化大革命的全面胜利立新功。"},{"type":"paragraph","text":"安平生代表自治区革命委员会筹备小组、广西军区和南宁驻军向大会表示热烈祝贺。"},{"type":"paragraph","text":"大会通过了给最最敬爱的伟大领袖毛主席的致敬电和《告全市贫下中农、革命农民书》。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"广西文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1983963e28"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
