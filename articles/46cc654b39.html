" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共中央、国务院关于组织外地高等院校革命学生、中等学校革命学生代表和革命职工代表来京参观文化大革命运动的通知","authors":[],"dates":[{"year":1966,"month":9,"day":5}],"is_range_date":false,"parts":[{"text":"中共中央、国务院关于组织外地高等学校革命学生、中等学校革命学生代表和革命教职工代表来京参观文化大革命运动的通知","type":"title"},{"text":"目前，全国各地高等学校和中等学校大无产阶级文化大革命运动正在轰轰烈烈地开展。为了贯彻执行中共中央关于无产阶级文化大革命的决定，更高地举起毛泽东思想的伟大红旗，把高等学校和中等学校的无产阶级文化大革命运动推向新的高潮，中共中央、国务院决定组织各省、市、自治区高等学校革命学生全部、革命教职工代表和中等学校革命学生、革命教职工代表从九月六日起分期分批来北京参观、学习，相互支援，交流革命经验，以利于把无产阶级文化大革命进行到底。现将来京参观的有关问题通知如下：","type":"paragraph"},{"text":"（一）每批来京参观的外地革命学生和革命教职工在北京逗留的时间定为四天，主要活动是：（１）参观和学习北京各学校的无产阶级文化大革命；（２）支持北京各学校的无产阶级文化大革命运动；（３）受中央负责同志接见。","type":"paragraph"},{"text":"（二）外地高等学校（包括全日制和半工（农）半读高等学校）革命学生，除了有病的、已经来过的或有其他原因不能来的以外，都可以组织来北京参观；高等学校教职工可按每五十名学生选出革命教职工代表一人参加。","type":"paragraph"},{"text":"外地中等学校（包括全日制和半工（农）半读中等专业学校及普通中学）按每十名学生选出革命学生代表一人；教职工按每一百名学生选出革命教职工代表一人参加。","type":"paragraph"},{"text":"各省、市、自治区应该根据高等学校和中等学校以及城乡分布的不同情况，通盘筹划，妥善安排。","type":"paragraph"},{"text":"（三）来京参观一律免费乘坐火车，各地教育行政部门要同当地铁路管理部门密切联系，协商安排。在本地集中所需交通工具，由各地自行解决。来京参观的革命学生和革命教职工生活补助费和交通费由国家财政中开支。","type":"paragraph"},{"text":"（四）注意事项：","type":"paragraph"},{"text":"（１）旅途中自带干粮，火车上只供应开水。到京后的伙食、住宿由北京市负责安排，但每人应按照自己的粮食定量交出粮票，在京时的饭费，由国家财政开支。","type":"paragraph"},{"text":"（２）自带简单行李、衣物和碗筷。","type":"paragraph"},{"text":"（３）为了预防火灾，保证旅途安全，不要在车厢内外贴大字报。","type":"paragraph"},{"text":"（４）为了保证来京参观的学生和教职工旅途健康，可根据旅途的长短，由各地自行配备必要的医护人员。","type":"paragraph"},{"text":"（五）各省、市、自治区党委和人委应当建立领导小组，负责组织工作，落实计划，并切实做好来京参观的生活管理工作。同时，还应当推选负责人带队，负责旅途的安全和生活管理。","type":"paragraph"},{"text":"各省、市、自治区应当根据本省、市、自治区的学生和教职工来京时间的先后，选派几个干部先行到京，负责联络工作。","type":"paragraph"},{"text":"为了做好这项工作，各地党委和政府，教育、铁道等有关接待部门，必须高举毛泽东思想伟大红旗，突出政治，做好思想工作，落实组织安排，使来京的革命师生参观好，学习好，把全国无产阶级文化大革命推向新的高潮。","type":"paragraph"}],"comments":[],"origin":"根据浙江省联总《红色风暴》编辑部编印《无产阶级文化大革命文件汇编（1966.5-1968.12）》， 1968年12月","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"46cc654b39"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
