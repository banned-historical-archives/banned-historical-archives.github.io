界不能直接援助，一面却派船运送大批现代化武器给印度反动派威胁邻国","authors":[],"dates":[{"year":1966,"month":5,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"巴基斯坦人民强烈反对苏联领导援印反巴"},{"type":"paragraph","text":"苏联修正主义领导集团一面叫嚷同越南没有共同边界不能直接援助，一面却派船运送大批现代化武器给印度反动派威胁邻国"},{"type":"paragraph","text":"新华社拉瓦尔品第二十日电　苏联修正主义领导集团最近向印度反动派提供大量武器援助的消息激起了巴基斯坦公众的强烈愤怒。"},{"type":"paragraph","text":"据巴基斯坦联合通讯社十八日报道，五艘苏联船只装载着导弹、米格—21型战斗机、重型坦克、重型装甲车、机关枪等武器和弹药，正在印度加尔各答的金·乔治码头卸货。"},{"type":"paragraph","text":"旁遮普的巴基斯坦民族人民党主席阿斯拉姆十九日在拉合尔向报界发表声明指出，印度今天已无可争辩地是美帝国主义在亚洲的主要帮凶。苏联对印度提供武器，将鼓励印度对它的邻国，包括巴基斯坦和中国在内，更加气势逼人。这也无助于和平和合理地解决克什米尔争端和其它问题。他要求苏联领导停止向印度提供武器，他警告说，这只会破坏这个地区的和平。"},{"type":"paragraph","text":"巴基斯坦伊斯兰国际事务委员会主席艾哈迈德·贾法尔十九日在卡拉奇向报界发表声明，反对苏联向印度这样一个沉溺于制造战争歇斯底里的国家提供军事装备。"},{"type":"paragraph","text":"拉瓦尔品第的《新时代报》二十日发表社论说：“苏联向印度提供的现代化军事装备是印度对巴基斯坦进行备战的一部分。在这种情况下，苏联所谓它希望永久地和平解决巴基斯坦和印度之间的问题的说法，是完全虚伪的。”"},{"type":"paragraph","text":"拉合尔《今天报》二十日发表社论指出，在印度领导人正忙于制造针对中国和巴基斯坦的战争歇斯底里的时候，苏联又在向印度提供武器，所以，这些苏联武器将用来对付谁，便很清楚了。"},{"type":"paragraph","text":"新华社二十日讯　苏联修正主义领导集团一面叫嚷同越南没有共同边界不能直接给予援助，一面却通过海上运输，把大量军用物资运给印度反动派。据巴基斯坦联合通讯社十八日报道，五艘苏联轮船，装载着重型坦克、米格—21型战斗机、军用车辆、机关枪和导弹等武器和弹药，正在加尔各答的金·乔治码头卸货，码头上戒备森严。"},{"type":"paragraph","text":"这则报道引用来自加尔各答的消息说：“据了解，这些苏联装备大概将部署在（印度）东部地区。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"24f8bb3219"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
