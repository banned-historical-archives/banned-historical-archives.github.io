:[],"dates":[{"year":1976,"month":5,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"无产阶级文化大革命推动教育事业发展"},{"type":"paragraph","text":"甘肃学龄儿童绝大部分入学"},{"type":"paragraph","text":"据新华社兰州一九七六年五月二十七日电　甘肃全省学龄儿童入学率达到百分之九十七，广大农村基本上普及了小学五年教育。"},{"type":"paragraph","text":"无产阶级文化大革命以来，甘肃省农村小学教育事业发展很快。以二十个少数民族聚居的县（旗）为例，小学校比文化大革命前增长一点四倍，在校学生增长一点三倍。碌曲县是一个藏族聚居的牧区，解放前没有一所学校，解放后由于修正主义路线的干扰和阶级敌人的破坏，教育事业发展仍很缓慢。文化大革命以来，县委带领群众坚决贯彻执行毛主席的无产阶级教育路线，批判资本主义，批判修正主义，批判旧的习惯势力，大办牧区小学教育，做到中心工作与普及教育统一研究、统一部署，使全县小学教育迅速普及，学龄儿童入学率达到了百分之九十八以上。"},{"type":"paragraph","text":"在普及教育中，甘肃省各级党委特别注意对山区、边远地区、少数民族聚居区给予各方面必要的支持和帮助。地处陇南山区的成县，县委把发展山区教育作为重点，他们本着自力更生、因地制宜、合理布局、分散设点的原则，积极为山区贫下中农子女就近上学提供方便，使山区广大学龄儿童进得来，留得住，学得好。经过几年的努力，取得了普及小学五年教育的胜利。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"甘肃文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"44b9678903"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
