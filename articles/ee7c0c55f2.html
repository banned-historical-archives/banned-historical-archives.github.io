":1961,"month":8,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社杭州16日电】　毛泽东主席今天下午会见了加纳共和国总统兼政府首脑克瓦米·恩克鲁玛，并进行了友好的谈话。"},{"type":"paragraph","text":"会见时在座的，有加纳运输交通部长克罗博·埃杜塞，总统事务部长塔韦亚·阿达马菲奥，人民大会党总部行政书记赫·赫·克·克莱布，非洲事务秘书处主任秘书姆·弗·戴—阿南，内阁副秘书埃·克·奥科，加纳银行副行长阿莫亚科·阿塔，贸易部主任秘书约翰·奥塞·图图·阿杰曼，人民大会党总部宣传书记波伊·多库，加纳驻中国大使科比纳·克西。"},{"type":"paragraph","text":"会见时在座的还有我国国务院总理周恩来，外交部副部长黄镇，浙江省省长周建人和中国驻加纳大使黄华等。"},{"type":"paragraph","text":"会见以后，毛泽东主席设宴招待加纳贵宾。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ee7c0c55f2"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
