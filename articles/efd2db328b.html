art":1,"page_end":1,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"加强理论指导搞好党史教育某炮兵旅注重学党史和学毛泽东邓小平著作的结合","authors":["赵明/华青春"],"parts":[{"type":"paragraph","text":"本报讯 特约记者赵明、特约通讯员华春青报道：毛泽东、邓小平的一系列重要著作，成为沈阳军区某炮兵旅学习党史的理论指南。日前，这个旅组织10多名干部介绍学党史与学理论相结合的体会。"},{"type":"paragraph","text":"这个旅的领导从学习教育中感到：毛泽东、邓小平著作是党史的理论概括，党史又为加深理解毛泽东、邓小平著作中的一系列正确结论提供了大量事实根据。许多在党史学习中弄不清的问题，在毛泽东、邓小平著作中早就有精辟的论述。毛选四卷是加深理解党在建国前28年历史的思想武器，邓小平著作是统一党在社会主义建设时期重大问题认识的指南。"},{"type":"paragraph","text":"这个旅紧紧抓住党坚持马克思主义同中国革命和建设的具体实践相结合这条主线，对照各个时期，选学毛泽东同志和邓小平同志有关著作，引导官兵加深对党史的理解。旅里采取了指定阅读书目、安排读书时间、分段搞好读书辅导和组织读书体会交流等措施，配合教育。他们从总政下发的基层干部35篇必读书目中选出18篇，从《毛泽东邓小平著作选读》（士兵读本）中指定12篇，分别组织干部战士学习。旅首长和机关干部作了4次结合党史学理论的辅导，还为每个连培训了1名理论辅导员，并把读书情况作为检查教育质量的一项内容。"},{"type":"paragraph","text":"学党史结合学理论，使大家既懂史又明理，一举两得。有些同志在学党史中遇到难题，一翻毛泽东、邓小平著作就迎刃而解了。"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"efd2db328b"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
