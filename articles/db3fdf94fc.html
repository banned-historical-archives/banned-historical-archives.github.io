{"year":1964,"month":10,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"我们和毛主席在一起"},{"type":"paragraph","text":"张滋溪 画　帅雪嶕　诗"},{"type":"paragraph","text":"不论是白雪皑皑的隆冬，"},{"type":"paragraph","text":"还是杨柳依依的早春；"},{"type":"paragraph","text":"不管是霞光万道的清晨，"},{"type":"paragraph","text":"还是落日余辉的黄昏，"},{"type":"paragraph","text":"一群群工人农民战士学生……"},{"type":"paragraph","text":"拥到天安门前摄影留真。"},{"type":"paragraph","text":"并排站在金水桥头，"},{"type":"paragraph","text":"依傍着汉白玉华表，"},{"type":"paragraph","text":"雄伟的天安门高耸云霄，"},{"type":"paragraph","text":"朱檐金瓦，红灯高挑，"},{"type":"paragraph","text":"凝望着庄严的烈士纪念碑，"},{"type":"paragraph","text":"人人眼里含着胜利的微笑。"},{"type":"paragraph","text":"一笑反动派土崩瓦解，"},{"type":"paragraph","text":"妖魔鬼怪匿迹声销；"},{"type":"paragraph","text":"二笑祖国河山似锦，"},{"type":"paragraph","text":"碧空万里红旗飘飘；"},{"type":"paragraph","text":"三笑东风浩荡火焰高张，"},{"type":"paragraph","text":"世界革命形势越来越好。"},{"type":"paragraph","text":"每一张照片都是一朵鲜花，"},{"type":"paragraph","text":"绣成祖国的万紫千红图画；"},{"type":"paragraph","text":"每一张照片都是一个音符，"},{"type":"paragraph","text":"谱成美妙的乐章传扬天下；"},{"type":"paragraph","text":"每一张照片都和毛主席在一起，"},{"type":"paragraph","text":"永远跟主席走，永远听主席话！"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"db3fdf94fc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
