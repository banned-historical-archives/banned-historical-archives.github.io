政府名称规定的指示","authors":[],"dates":[{"year":1950,"month":4,"day":13}],"is_range_date":false,"parts":[{"text":"中央关于少数民族应实行区域自治及其政府名称规定的指示","type":"title"},{"text":"西南局四月二日电悉，在少数民族聚居地区，应依共同纲领第五十一条，实行民族的区域自治的基本内容，即共同纲领第六章各条的规定，应逐步加以实现。经中央人民政府认可为民族自治区者，其政府的名称可采用某某自治区人民政府，如现在内蒙古的政府，称为内蒙古自治区人民政府，但不要在“政府”二字上面冠以自治二字，称为自治政府或自治委员会等，因为这是不必要的，且在中国的历史上这样的称多是反革命派的作法，如我们也这样作，将在思想认识上，给少数民族人民以不良影响。","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ccf5a75b2d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
