<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width" data-next-head=""/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style"/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-42372ed130431b0a.js"></script><script src="/_next/static/chunks/webpack-11ae0683e2c8a715.js" defer=""></script><script src="/_next/static/chunks/framework-a6b3d2fb26bce5d1.js" defer=""></script><script src="/_next/static/chunks/main-70ee53dad118be52.js" defer=""></script><script src="/_next/static/chunks/pages/_app-3c4631c0a977b72b.js" defer=""></script><script src="/_next/static/chunks/fec483df-94f9083ed9a4f251.js" defer=""></script><script src="/_next/static/chunks/906a09f8-1772fe92576f6f22.js" defer=""></script><script src="/_next/static/chunks/228-f28fc3158d6dc128.js" defer=""></script><script src="/_next/static/chunks/888-96ba747335353294.js" defer=""></script><script src="/_next/static/chunks/82-b620fc57a8c5ae7a.js" defer=""></script><script src="/_next/static/chunks/570-b0ff1c5f483b8dd6.js" defer=""></script><script src="/_next/static/chunks/539-be06d9f260fe7ca1.js" defer=""></script><script src="/_next/static/chunks/959-b3931f8cdddeee8f.js" defer=""></script><script src="/_next/static/chunks/143-4acb4e73e43feb19.js" defer=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-37379454afaa9b75.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_buildManifest.js" defer=""></script><script src="/_next/static/3k8CSiaVLD8fQhU1LkfEy/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"非资产阶级家庭出身的同学无事可为吗?","authors":["孙轶"],"dates":[{"year":1952,"month":4,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"孙轶"},{"type":"paragraph","text":"最近，同学间存在这样一种偏向:一般非资产阶级家庭出身的同学，觉得五反与自己无甚关系，无事可为，“无战可投”；而对资产阶级家庭出身的同学存在对立的态度，认为这回五反是考验你们的时候了；我看你们怎么办?这种情况有及时加以纠正的必要。"},{"type":"paragraph","text":"首先，我们应该明确，五反斗争对非资产阶级家庭出身的同学是否真正“无战可投”呢?主要的原因还是由于对运动的认识不足。今天五反斗争是决定祖国走向那一条道路:走向资本主义还是走向社会主义?每个爱国青年学生，都应责无旁贷的投入运动。虽然自己家庭出身并不是资产阶级，然而还有很多工作可以做的。检查一下自己周围亲戚朋友有否有资产阶级或违法的工商户，从此可着手进行宣传政策、劝说坦白或搜集材料进行检举的工作。但是，在宣传动员的过程中，你必须具备充份的本钱，掌握政府政策方针，了解运动开展的方向及深度，这样才能说服他人。所以认真学习文件、阅读文件也是一件极重要的工作。再有，在原来工作岗位上发挥更大的积极作用，参加各种突击性的工作，例如参加反贪污展览会、画漫画等配合五反一切工作，都是等待着我们青年学生去做的。通过实际工作，在思想上划清界线，这种态度才是正确的。“无战可投”看法是不对的。"},{"type":"paragraph","text":"至于，对于资产阶级家庭出身的同学抱有成见的看法，也是完全错误的。在五反统一战线中资产阶级的家属亦是一支不可忽视的力量。粉碎堡垒是需要内外夹攻的，外有工人店员等，内有资产阶级家属、子弟。所以，资产阶级家庭出身的子弟，他们更比非资产阶级家庭出身的子弟站在最前哨，他们的斗争更尖锐、更激烈，如果我们孤立他们，就会削弱自己的力量，妨碍了统一战线工作，对五反是起了一定的消极作用。我们应该以团结友爱的态度把资产阶级家庭出身的同学团结过来，帮助和鼓励他们，支持他们，共同努力消灭资产阶级的“五毒”，这才是我们对五反应有的正确态度。"},{"type":"paragraph","text":"\u003cIMG alt=请插入3号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1952\\04\\524a060601.JPG\"\u003e"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"093a212c38"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
