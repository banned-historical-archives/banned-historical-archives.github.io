[],"dates":[{"year":1971,"month":11,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京九日电　中共中央政治局常委、国务院总理周恩来，中共中央政治局委员张春桥、姚文元，中共中央候补委员石少华，今天晚上会见了由阿尔巴尼亚劳动党中央机关刊物《党的道路》副总编辑斯特菲·科特米洛率领的阿尔巴尼亚新闻工作者代表团全体成员，同他们进行了十分亲切友好的谈话。"},{"type":"paragraph","text":"参加会见的代表团团员有:恰科·旦哥、台弗塔·焦莱卡、法托斯·采尔科吉马、巴诺·丘卡、利里姆·德达、阿纳斯达斯·康迪。"},{"type":"paragraph","text":"会见时，阿尔巴尼亚驻中国大使馆临时代办安东尼，三等秘书迪迪亚和阿尔巴尼亚《人民之声报》驻京记者索玛·纳奇在座。"},{"type":"paragraph","text":"会见时在座的还有首都新闻单位、有关方面负责人和工作人员鲁瑛、张政德、张士诚、张志、李连庆、彭华、刘克明、邵以华、范承祚、陶苗发等。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"姚文元","type":"人物"},{"name":"张春桥","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"01d7082c5e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
