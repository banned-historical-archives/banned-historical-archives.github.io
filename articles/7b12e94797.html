itle":"中央组织部关于抓紧解决整党中遗留的组织处理问题的通知","dates":[{"year":1987,"month":12,"day":15}],"is_range_date":false,"authors":["中共中央组织部"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"中央组织部干审局, 干审工作政策文件选编 (下), 1411-1413","tags":[{"name":"整党","type":"主题/事件"}],"parts":[{"type":"title","text":"中央组织部关于抓紧解决整党中遗留的组织处理问题的通知"},{"type":"subtitle","text":"1987年12月15日·中组发〔1987〕4号"},{"type":"paragraph","text":"整党期间，接到党组织的通知以后，无正当理由不参加整党的党员和长期外出不归，又不主动与所在单位党组织联系的党员， 均按自行脱党处理。经上级党组织批准后，在党支部大会上宣布除名。\n在转移党员组织关系过程中，个人长期保存党员组织关系 介绍信，而又未参加整党的党员，也按自行脱党处理。\n整党期间，因故请假，经党组织同意未参加整党的党员，基层党委可根据其过去的一贯表现和现在对党的认识，区别对待。符合党员条件的，党组织应为他们补办党员登记手续；不符合党员条件的，应劝其退党。劝而不退的，予以除名。审批乎续应按党章和《中共中央关于整党的决定》的有关规定办理。"}],"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7b12e94797"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
