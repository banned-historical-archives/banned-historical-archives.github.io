al-archives/banned-historical-archives8/main/maoquanji8.pdf"],"article":{"title":"渡河以来战况与黄河以西的军事部署","alias":"","parts":[{"type":"paragraph","text":"渡河以来战况与黄河以西的军事部署！"},{"type":"paragraph","text":"（1936年3月1日）周副主席，刘、宋，并告博，迈，林、聂，徐、程："},{"type":"paragraph","text":"甲、吴佳神府?普军五个步兵旅已完全东调，最后守备吴堡、宋家川之方旅，亦于今明两日撤至军渡（吴堡恐只有民团）。神木还有一骑兵旅，估计亦有东调可能。"},{"type":"paragraph","text":"乙、我军在东岸消灭与击溃了阎敌五个团，占领了石楼、中阳、孝义、汾西、县、永和六县广大地区，占据了石中孝四县交界地区这个战略战役枢纽，巩固了作战的阵地，取得了创造根据地的初步自由，提高了红军的战斗力，完成了战略侦察，开始发动"},{"type":"paragraph","text":"[1]这是毛泽东和红军第一方面军司令员彭德怀给周恩来等的电报。"},{"type":"paragraph","text":"[2]刘、宋，指刘志丹、宋任穷，当时分别任红军第二十八军军长和政治委员。博，指博古，即秦邦宪，当时任中共中央政治局常委、中华苏维埃共和国中央政府西北办事处主任。迈，指罗迈，即李维汉，当时任中共中央组织部部长，兼管陕北省委工作。林、聂，指林彪、聂荣臻，当时分别任红军第一方面军第一军团军团长和政治委员。徐、程，指徐海东、程子华，当时分别任红军第一方面军第十五军团军团长和政治委员。"},{"type":"paragraph","text":"[3]吴佳神府，指陕西吴堡、佳县、神木和府谷。[4]宋家川，镇名，为今陕西省吴堡县县治。"},{"type":"paragraph","text":"[5]方旅，指国民党军太原绥靖公署第四纵队第七十一师第二〇六旅，旅长方克猷。了广大群众。目前是争取打第二个胜仗。"},{"type":"paragraph","text":"丙、请副主席直接指挥二十八军及吴佳绥米\"地方部队大举袭敌堡垒，扩大胜利。无定河以西部队还须多调向东岸，与神府红军连成一片，企图夺取一、二个城。"},{"type":"paragraph","text":"丁、沿河工作，暂由我们指挥杨立三（河口3）、蔡树藩（义镇）二人，副主席请专任北面敌。"},{"type":"paragraph","text":"彭毛"},{"type":"paragraph","text":"三月一日二十时[1]绥米，指陕西绥德和米脂。[2]杨立三，当时任西北革命军事委员会兵站部部长。[3]河口，位于陕西省清涧县东部。[4]蔡树藩，当时任红军沿河游击队政治委员。"}],"authors":["毛泽东"],"dates":[{"year":1936,"month":3,"day":1}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":295,"page_end":296},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"897dc13a4d"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
