rt":4,"page_end":4,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"邓小平副总理会见美国前总统尼克松的女儿朱莉夫妇","authors":[],"parts":[{"type":"paragraph","text":"新华社一九七六年一月一日讯 国务院副总理邓小平，今天中午会见了美国前总统理查德·尼克松的女儿朱莉·尼克松·艾森豪威尔和她的丈夫戴维·艾森豪威尔。邓小平副总理同艾森豪威尔夫妇进行了友好的谈话，并向他们祝贺新年。艾森豪威尔夫妇转达了理查德·尼克松先生对周恩来总理和邓小平副总理的问候。会见以后，邓小平副总理设宴招待了他们。"},{"type":"paragraph","text":"参加会见和宴会的有：中国驻美国联络处主任黄镇，外交部副部长王海容、礼宾司长朱传贤、美大司副司长唐闻生，以及朱霖、钱大镛、丁原洪、赵稷华等。（附照片）"},{"type":"paragraph","text":"国务院副总理邓小平一月一日会见美国前总统理查德·尼克松的女儿朱莉·尼克松·艾森豪威尔和她的丈夫戴维·艾森豪威尔。 新华社记者摄"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7dad852cab"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
