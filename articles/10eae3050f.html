1957,"month":11,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席电谢苏联领导人"},{"type":"paragraph","text":"新华社伊尔库次克21日电　毛泽东主席今天在离开苏联国境的时候，打电报给赫鲁晓夫、伏罗希洛夫和布尔加宁同志表示感谢。电文如下：亲爱的赫鲁晓夫同志、伏罗希洛夫同志、布尔加宁同志："},{"type":"paragraph","text":"当我们将要离开伟大苏联的国土的时候，我代表中国代表团全体同志再一次向你们，并且通过你们向苏联共产党、苏联政府和苏联人民，表示衷心的感谢。感谢你们邀请我们参加伟大的十月社会主义革命四十周年的庆祝典礼和访问你们的伟大的国家，感谢你们对我们非常亲切的接待，感谢你们对我们和全体中国人民所表示的深厚的兄弟情谊。"},{"type":"paragraph","text":"请允许我代表中国代表团和全体中国人民，并且以我个人的名义，祝苏联共产党和苏联政府的领导同志们身体健康，祝苏联人民在苏联共产党中央委员会的领导下，在建设共产主义和维护世界和平的事业中取得更加辉煌的成就，祝中苏两国人民的伟大友谊永远巩固和不断发展。\t\t毛泽东　1957年11月21日　伊尔库次克"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"10eae3050f"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
