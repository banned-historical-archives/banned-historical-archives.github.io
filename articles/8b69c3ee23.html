ical-archives/banned-historical-archives8/main/maoquanji25.pdf"],"article":{"title":"关于平津地区的形势及部署","alias":"","parts":[{"type":"paragraph","text":"关于平津地区的形势及部署！"},{"type":"paragraph","text":"（1948年12月11日）林、罗、刘："},{"type":"paragraph","text":"昨日电悉。（一）张家口、新保安?之敌已被我确实包围，十六军被歼一半，怀来敌一○四军已南逃，程黄正追击中。此敌如歼灭，程黄全部即可用于包围南口、昌平之敌，并从西面威胁北平。我西面兵力已完全够用。现九十四军、九十二军、十三军、三十一军及傅系余部集中于北平为中心之地区，天津、塘沽、芦台、唐山一带共只有三个军及独九十五师，唐山之敌有准备撤走消息，而且被我刘邓、陈粟包围于徐州西南地区之敌三十四个师，有在十天内外全部解决之可能。此敌解决，蒋匪全局动摇，势"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军委起草的给东北野战军司令员林彪、政治委员罗荣桓和参谋长刘亚楼的电报。"},{"type":"paragraph","text":"[2]新保安，镇名，位于河北省怀来县西北。"},{"type":"paragraph","text":"[3]程、黄，指程子华、黄志勇，当时分别任东北野战军第二兵团司令员和参谋长。"},{"type":"paragraph","text":"[4]南口，镇名，位于北京市昌平县西部。[5]傅，指傅作义，当时任国民党军华北“剿匪”总司令部总司令。[6]芦台，镇名，今为天津市宁河县县治。"},{"type":"paragraph","text":"[7]刘邓，指刘伯承、邓小平，当时分别任中原野战军司令员和政治委员。陈粟，指陈毅、粟裕，当时分别任华东野战军司令员兼政治委员和代司必重新部署。有可能以现在上海集中待命之数十艘船只突然北上，作接走平、津、塘、唐诸敌之计划，时间决于十天内外。因此，我们昨电\"要你们以两个纵队向西之意见应当取消。我们已于十日二十时电告你们停止该两纵行动。你们接此电后，请立即令该两纵各就现地休整待命，并准备于唐山之敌有确实撤退征候即迅速包围唐山，抓住蒋系一个军，使其他蒋系部队难于下撤退的决心。如果唐山敌在十天内不撤，而你们在十天内能集中五个至六个纵队，则最好同时动作，以一部隔断天津、塘沽间联系，以一部包围唐山，以主力歼灭芦台、塘沽之敌，控制海口于我手中，则全局胜算在望。请按上述意图筹划一切。（二）傅作义代表正在由逐州来平山途中，我们仍本前告策略和他谈判，要他抓住中央系各军不放，便于我先解决中央系。（三）傅作义近日指挥极为慌乱，解决平、津、塘、唐诸敌可能不要很久。"},{"type":"paragraph","text":"军委十一日二时"}],"authors":["毛泽东"],"dates":[{"year":1948,"month":12,"day":11}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":367,"page_end":368},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8b69c3ee23"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
