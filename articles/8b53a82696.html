script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"齐奥塞斯库总统和曼内斯库总理致电毛泽东主席、朱德委员长和华国锋总理","authors":[],"dates":[{"year":1976,"month":6,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"齐奥塞斯库总统和曼内斯库总理致电毛泽东主席、朱德委员长和华国锋总理"},{"type":"paragraph","text":"新华社一九七六年六月七日讯　罗马尼亚共产党总书记、罗马尼亚社会主义共和国总统尼古拉·齐奥塞斯库和罗马尼亚政府总理马尼亚·曼内斯库打电报给毛泽东主席、朱德委员长和华国锋总理，就我国云南省西部地区发生地震，表示最深切的慰问。电报全文如下：中国共产党中央委员会主席　毛泽东同志中华人民共和国全国人民代表大会　朱　德同志常务委员会委员长中华人民共和国国务院总理　华国锋同志："},{"type":"paragraph","text":"惊悉云南省西部发生强烈地震，造成了人员伤亡和物质损失，我们代表罗马尼亚共产党中央委员会、罗马尼亚社会主义共和国国务委员会和政府，代表罗马尼亚人民并以我们个人名义向你们、向中国共产党中央委员会、中华人民共和国全国人民代表大会常务委员会和国务院，向中国人民和灾区居民表示最深切的同情和慰问，向死难者家属表示最衷心的哀悼。"},{"type":"paragraph","text":"罗马尼亚共产党总书记"},{"type":"paragraph","text":"罗马尼亚社会主义共和国总统"},{"type":"paragraph","text":"尼古拉·齐奥塞斯库"},{"type":"paragraph","text":"罗马尼亚社会主义共和国政府总理"},{"type":"paragraph","text":"马尼亚·曼内斯库"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"华国锋","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"朱德","type":"人物"},{"name":"云南文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8b53a82696"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
