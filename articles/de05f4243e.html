" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji33","name":"毛泽东全集第33卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji33.pdf"],"article":{"title":"接受印尼首任驻华大使莫诺努图呈递国书时的答词","alias":"","parts":[{"type":"paragraph","text":"接受印尼首任驻华大使莫诺努图"},{"type":"paragraph","text":"呈递国书时的答词"},{"type":"paragraph","text":"（1953年10月28日）大使阁下："},{"type":"paragraph","text":"我很高兴地接受贵大使所呈递的印度尼西亚共和国总统的国书，并对贵大使所转达的印度尼西亚共和国总统、政府和人民的祝贺，表示深切的感谢。"},{"type":"paragraph","text":"中印两国人民之间长期存在着的友谊，由于贵我两国新的外交关系的建立，三年来得到了更进一步的发展。我相信：今后在贵大使的努力下，中印两国间的经济与文化的友好合作关系将日益密切，这种友好关系的增进对于各国人民所努力争取的亚洲及世界的和平将有所贡献。"},{"type":"paragraph","text":"我热烈地欢迎阁下出任印度尼西亚共和国驻中华人民共和国的特命全权大使，在贵大使为加强两国友好合作的工作中，将得到我和中华人民共和国政府的协助。"},{"type":"paragraph","text":"我谨祝贵大使在工作中获得成功。"}],"authors":["毛泽东"],"dates":[{"year":1953,"month":10,"day":28}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":416,"page_end":416},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"de05f4243e"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
