华在西藏自治区首届人代会首次会议上作报告","authors":[],"dates":[{"year":1965,"month":9,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"高举毛泽东思想伟大红旗  向社会主义的新西藏前进"},{"type":"paragraph","text":"中共西藏自治区委员会第一书记张国华在西藏自治区首届人代会首次会议上作报告"},{"type":"paragraph","text":"新华社拉萨二日电　西藏自治区第一届人民代表大会第一次会议今天继续举行。中共西藏自治区委员会第一书记张国华今天向大会作“高举毛泽东思想的伟大红旗，为争取社会主义革命的伟大胜利，为建设社会主义的新西藏而奋斗”的报告。"},{"type":"paragraph","text":"中央代表团团长谢富治，副团长张经武、刘春和全体团员出席了今天的会议。"},{"type":"paragraph","text":"张国华在报告中说，西藏自治区第一届人民代表大会第一次会议的召开，是全国人民十分关怀、西藏人民殷切期望的一件大喜事。这个大会是在党中央、毛主席、国务院和中共中央西南局的亲切关怀下召开的，是在以谢富治副总理为首的中央代表团的亲临指导下召开的。这对我们的大会是一个极大的鼓舞，对西藏的革命和建设事业一定会产生巨大的促进作用。"},{"type":"paragraph","text":"张国华的报告共分三个部分。在第一部分里，他谈了国际国内的大好形势，全面地分析了西藏当前的大好形势。他说，十五年来，在党中央和毛主席的英明领导下，西藏的革命和建设事业取得了伟大的成就。在取得民主革命伟大胜利的基础上，西藏的革命和建设事业已经进入了一个新的时期。在报告的第二部分，张国华就民主改革、群众工作、统一战线工作、政权问题、经济问题、干部工作、党的领导等方面，总结了西藏十五年来工作中的基本经验。他指出，十五年来西藏历史发展中最大的特点是，从最反动、最黑暗、最残酷、最野蛮的政教合一、僧侣贵族专政的封建农奴制度，经过民主革命，正在向社会主义前进。"},{"type":"paragraph","text":"张国华说，西藏的革命和建设事业所以能取得飞跃的发展，是由于百万农奴迫切要求翻身解放，是由于在强大的社会主义祖国大家庭中，有党中央、毛主席的英明领导，有全国人民的巨大支援。"},{"type":"paragraph","text":"张国华在报告的第三部分谈到西藏今后的任务时指出，必须依靠广大劳动人民，团结一切可以团结的力量，继续大力开展互助合作运动，同时在条件成熟的情况下，逐步地、稳妥地进行社会主义改造；积极地进行社会主义建设；加强国防建设，巩固国防。因此我们要更高地举起毛泽东思想的伟大红旗，在一切工作中用毛泽东思想挂帅，活学活用毛主席著作；认真贯彻执行党在西藏地区的方针政策；进一步加强政治思想工作，充分发挥人的积极性，积极发扬艰苦奋斗、自力更生的革命精神；在党中央、毛主席和中共中央西南局的领导下，在全国人民的大力支援下，在中共西藏自治区委员会的直接领导下，全体共产党员、全体西藏人民和全体驻藏人民解放军团结起来，为实现社会主义革命，建设社会主义的新西藏而奋斗！"},{"type":"paragraph","text":"张国华的报告受到全体代表的欢迎。"},{"type":"paragraph","text":"会议在明天继续举行。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"谢富治","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"张国华","type":"人物"},{"name":"西藏文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"affc61bfe1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
