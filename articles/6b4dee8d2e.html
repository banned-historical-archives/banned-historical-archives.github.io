authors":[],"dates":[{"year":1957,"month":11,"day":25}],"is_range_date":false,"parts":[{"text":"中共中央关于在整风期间资方人员下放问题的通知","type":"title"},{"text":"[中共吉林省委机要处电报纸来电机关    中央    省机 11月第111号等级    加    归档第 号 委字第 号主送    任远抄致 干亭、肖靖、鸣玉、丹波各1 、各书记6天野1　存2　共14]","type":"paragraph"},{"text":"上海局、各省（市）、自治区党委：","type":"appellation"},{"text":"对于资产阶级分子的改造，当前的中心工作是在工商界进行全面整风，进行反右派斗争和广泛深入的社会主义教育。为了集中力量做好工商界的全面整风，不应该在这个时候就忙着把公私合营企业中参加管理工作的资本家和资方代理人下放。资方人员下放问题，涉及阶级关系，需要全面考虑，均不可操之过急，给予资产阶级分子以逃避整风的机会。至于在工商界整风结束后资方人员下放问题如何处理，需要作进一步研究。对这个问题，请你们反复向干部交代政策。","type":"paragraph"},{"text":" 中央一九五七年十一月二十五日","type":"paragraph"}],"comments":[],"origin":"吉林省档案馆；1-13/1-1957-93　29页。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6b4dee8d2e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
