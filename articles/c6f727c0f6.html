ical-archives/banned-historical-archives0/main/maoquanji28.pdf"],"article":{"title":"对关于解决攻台重要问题的批语","alias":"","parts":[{"type":"paragraph","text":"对关于解决攻台重要问题的批语！"},{"type":"paragraph","text":"（1950年5月30日）聂："},{"type":"paragraph","text":"待粟到后，召集有关人员会商解决。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"五月三十日"},{"type":"paragraph","text":"[1]这是毛泽东在中国人民解放军第三野战军副司令员兼华东军区副司令员粟裕1950年5月28日给正在北京出席全军参谋会议的第三野战军参谋长兼华东军区参谋长张震的电报上，写给中央人民政府人民革命军事委员会代理总参谋长聂荣臻的批语。"},{"type":"paragraph","text":"[2]粟裕的电报说：为使攻台兵力达到优势，我们欢迎四野有3个军至4个军兵力参战（如要求太多，恐影响中南防务）。唯攻台作战最重要的问题，还是第一梯队渡海之船只，登陆突破附防御，及打退敌人坦克之反击突破前沿等3个重要问题。请就近将上述问题，请示解决。"}],"authors":["毛泽东"],"dates":[{"year":1950,"month":5,"day":30}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":441,"page_end":441},"tags":[{"name":"粟裕","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c6f727c0f6"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
