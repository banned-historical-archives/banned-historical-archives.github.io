ical-archives/banned-historical-archives0/main/maoquanji37.pdf"],"article":{"title":"在中共八届二中全会上的总结发言","alias":"","parts":[{"type":"paragraph","text":"在中共八届二中全会上的总结发言！"},{"type":"paragraph","text":"（1956年11月15日）"},{"type":"paragraph","text":"毛泽东同志在会议的最后一天作了总结性的发言。他表示完全同意全会所采取的各项方针和措施。毛泽东同志号召全体国家工作人员、经济工作人员首先是各方面的负责工作人员，提倡艰苦朴素的作风，与群众同甘共苦，反对铺张浪费现象，并且采取整风方法，同主观主义、宗派主义、官僚主义的倾向作斗争。他要求全党在对待少数民族问题上坚决反对大汉族主义，在国际交往中坚决反对大国主义。他着重指出：只要坚持马克思列宁主义的密切依靠人民群众的原则，反对一切形式的脱离群众的作风，我们和苏联、各人民民主国家以及全世界的社会主义力量，就一定能够克服前进道路上的困难，而取得更伟大的胜利。"},{"type":"paragraph","text":"[1]这是新华社报道的毛泽东的讲话。"}],"authors":["毛泽东"],"dates":[{"year":1956,"month":11,"day":15}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":129,"page_end":129},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7533b597c1"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
