ical-archives/banned-historical-archives0/main/maoquanji45.pdf"],"article":{"title":"对一篇评中苏分歧的文章的批语","alias":"","parts":[{"type":"paragraph","text":"对一篇评中苏分歧的文章的批语"},{"type":"paragraph","text":"（1963年7月31日）吴冷西同志："},{"type":"paragraph","text":"这篇文章，似可发表。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"七月卅一日全文都好。"},{"type":"paragraph","text":"[1]指新华社1963年7月31日《参考资料》上刊载的《柬埔寨电讯报》发表的《赫鲁晓夫是否改变态度了？》一文。文章指出，在中苏分歧中，苏联歪曲了中国关于核战争问题的观点，在和平共处问题上对中国的指责恰恰和西方国家不谋而合。人们本来希望中苏之间取得妥协，但赫鲁晓夫同西方接近的既成事实，使这种希望完全化为乌有。这篇文章在1963年8月1日《人民日报》上发表。"},{"type":"paragraph","text":"[2]吴冷西，当时任新华通讯社社长、《人民日报》总编辑。"}],"authors":["毛泽东"],"dates":[{"year":1963,"month":7,"day":31}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":489,"page_end":489},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a243ca03d0"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
