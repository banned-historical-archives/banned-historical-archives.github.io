ical-archives/banned-historical-archives0/main/maoquanji42.pdf"],"article":{"title":"对河北省委关于解决水利问题的报告的批语","alias":"","parts":[{"type":"paragraph","text":"对河北省委关于解决水利问题的报告的批语"},{"type":"paragraph","text":"（1959年10月10日）震林同志："},{"type":"paragraph","text":"此件看了，请提到书记处会议上谈一下，予以批准。投资问题，请与有关部门及总理研究一下，然后确定。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十月十日[1]震林，即谭震林，当时任中共中央书记处书记、国务院副总理。"},{"type":"paragraph","text":"[2]指中共河北省委1959年10月6日关于解决河北省水利问题给毛泽东并中央的报告。报告说，为了具体贯彻执行我们今后3年的经济建设方针，从1960年至1962年，在水利上我们需要做好3件事：首先解决洪水灾害问题；其次解决沥水灾害问题；与此同时基本实现农田水利化。为此共需国家投资12.7亿元，每年平均4亿元左右。"}],"authors":["毛泽东"],"dates":[{"year":1959,"month":10,"day":10}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":434,"page_end":434},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fb55f46bad"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
