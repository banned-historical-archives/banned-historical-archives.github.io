rt":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"深入批邓促进战备工作落实福建前线某团四连以阶级斗争为纲认真抓好战备教育 广州部队某部常备不懈决心用战斗保卫反击右倾翻案风的伟大斗争","authors":[],"parts":[{"type":"paragraph","text":"本报讯 福建前线某团四连党支部，在学习毛主席指示，开展批邓、反击右倾翻案风的伟大斗争中，坚持“抓革命，促生产，促工作，促战备”的方针，以阶级斗争为纲，抓好战备教育，促进各项战备工作更加落实。"},{"type":"paragraph","text":"认真学习革命导师有关战争问题的论述，认清只要帝国主义、社会帝国主义和反动派存在，战争就不可避免，树立时刻准备打仗的思想。"},{"type":"paragraph","text":"在反击右倾翻案风中，弄清加强战备与巩固无产阶级专政的关系，提高反侵略和反复辟的自觉性。在学习无产阶级专政理论中，他们反复领会马克思关于“无产阶级专政的首要条件就是无产阶级的军队”"},{"type":"paragraph","text":"从思想上、组织上、物质上进行全面检查，及时发现问题，狠抓战备落实。"},{"type":"paragraph","text":"干部当好落实战备的带头人，保证部队在人员变、任务变的情况下，常备不懈的思想不变。连队自觉从实战出发，严格训练，严格要求，努力提高军政素质，决心用战斗来保卫反击右倾翻案风的伟大斗争。"},{"type":"paragraph","text":"本报讯 广州部队某部党委组织干部战士认真学习毛主席的重要指示，深入批判邓小平反革命的修正主义路线，更加自觉地坚持以阶级斗争为纲，加强战备，严防国内外阶级敌人的破坏和捣乱。"},{"type":"paragraph","text":"毛主席最近指出：“一九四九年提出国内主要矛盾是无产阶级对资产阶级之间的矛盾。十三年后重提阶级斗争问题，还有形势开始好转。文化大革命是干什么的？是阶级斗争嘛。刘少奇说阶级斗争熄灭论，他自己就不是熄灭，他要保护他那一堆叛徒、死党。林彪要打倒无产阶级，搞政变。熄灾了吗？”"},{"type":"paragraph","text":"干部战士还学习了马克思关于“无产阶级专政的首要条件就是无产阶级的军队”"},{"type":"paragraph","text":"这个部队的干部战士通过学习毛主席的重要指示，批判邓小平复辟资本主义的反革命罪行，进一步擦亮了眼睛，增强了战备观念，扎扎实实地搞好各项战备工作。指战员们严格训练，严格要求，冒雨进行技术战术训练，人人精神抖擞，斗志昂扬。二连是战备训练比较好的单位，全连同志人人会使用四种连属武器和五种打坦克器材。新战士叶建平把搞好训练看成是捍卫无产阶级专政的实际行动，他经常顶风冒雨趴在稀泥地里练习射击，一练就是两三个小时，有时眼睛瞄痛了，同志们劝他休息，他也不撒手，说：“走资派还在走，阶级敌人还在捣乱，我们一定要向首都工人民兵、人民警察和警卫战士学习，抓紧时间，练好杀敌本领，为人民站好岗，放好哨，为巩固无产阶级专政而贡献自己的一切力量。”"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"福建文革","type":"人物"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cad89f7737"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
