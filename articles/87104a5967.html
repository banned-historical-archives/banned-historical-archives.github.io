tart":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东同志诞生九十九周年抒怀","authors":["李伟"],"parts":[{"type":"paragraph","text":"12月26日是毛泽东同志诞生九十九周年。回顾历史，心潮激荡，缅怀巨人，赋诗抒情。"},{"type":"paragraph","text":"一、日出"},{"type":"paragraph","text":"红日出韶山，酷冬长夜寒。"},{"type":"paragraph","text":"井冈开路径，全国起洪澜；"},{"type":"paragraph","text":"三座大山倒，五星旗帜欢。"},{"type":"paragraph","text":"火烟雷雨过，虹彩照人寰。"},{"type":"paragraph","text":"二、继承"},{"type":"paragraph","text":"哲人伤作古，财富有遗篇。"},{"type":"paragraph","text":"创业何艰巨，回思要概全。"},{"type":"paragraph","text":"真知凭实践，群众紧相联。"},{"type":"paragraph","text":"强国须勤俭，振兴斯永年。"},{"type":"paragraph","text":"三、发展"},{"type":"paragraph","text":"毋守两“凡是”，谋开改革端。"},{"type":"paragraph","text":"齐心攻“四化”，放胆竞千帆。"},{"type":"paragraph","text":"大海波涛涌，中华社会安。"},{"type":"paragraph","text":"疏通无尽水，灌溉万花坛。"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"87104a5967"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
