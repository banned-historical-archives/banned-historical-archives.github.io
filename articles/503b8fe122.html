ical-archives/banned-historical-archives8/main/maoquanji23.pdf"],"article":{"title":"西北野战军有配合陈质兵团争取战略胜利之任务","alias":"","parts":[{"type":"paragraph","text":"西北野战军有配合陈廉兵团"},{"type":"paragraph","text":"争取战略胜利之任务！"},{"type":"paragraph","text":"（1947年9月18日）彭副司令，并转王震?及各纵各旅首长："},{"type":"paragraph","text":"（一）我陈兵团十个旅七万人，已占领宜阳、嵩县、伊阳、新安、论池、灵宝、阅乡、洛宁、卢氏等九县，歼敌万余。现该兵团秦基伟纵队正向临汝、郏县、襄城、叶县、宝丰、鲁山、南召诸县攻进。陈谢率主力六个旅，决于二十日开始向西安方向前进。其计划是首先夺取潼关、华阴、华县、渭南、临潼、蓝田、商县、洛南、商南、山阳等十县，建立陕东南根据地。（二）我陕甘宁野战军全军八个旅及王世泰两个旅，有配合陈兵团作战"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军委起草的给中国人民解放军副总司令、西北野战军司令员兼政治委员彭德怀的电报。"},{"type":"paragraph","text":"[2]王震，当时任西北野战军第二纵队司令员兼政治委员。"},{"type":"paragraph","text":"[3]陈赓兵团，指由晋冀鲁豫野战军第四纵队、第九纵队、西北民主联军第三十八军和太岳军区第二十二旅组成的作战集团。"},{"type":"paragraph","text":"[4]伊阳，旧县名，即今河南汝阳县。[5]阅乡，旧县名，1954年并入河南灵宝县。"},{"type":"paragraph","text":"[6]秦基伟纵队，指晋冀鲁豫野战军陈谢集团第九纵队，纵队司令员秦基伟。"},{"type":"paragraph","text":"[7]王世泰，当时任西北野战军第四纵队司令员。争取战略胜利之任务。其方法是：甲、王震纵队两个旅，不惜疲劳，不怕牺牲，立刻出动，星夜兼程，抢占大小劳山、甘泉之线，在敌主力九十师、一师先头，从正面节节阻敌南撤。这是最重要最重要的，必须将敌在大小劳山、甘泉地区至少阻止一个星期。乙、主力在现地休整五天，照彭十七日电，二十三日向南急进，相机攻占宜川、蒲城、白水、韩城、澄城、平民、朝邑、大荔等八县，迫使南退之敌分兵兼顾渭南、渭北两方面，只能取守势，不能取攻势，保障我南北两军完成战略任务，是为至盼。"},{"type":"paragraph","text":"军委十八日四时"}],"authors":["毛泽东"],"dates":[{"year":1947,"month":9,"day":18}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":292,"page_end":293},"tags":[{"name":"毛泽东","type":"人物"},{"name":"王震","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"503b8fe122"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
