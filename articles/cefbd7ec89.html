热烈欢迎","authors":[],"dates":[{"year":1964,"month":11,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京14日电　由团长、中共中央副主席、国务院总理周恩来和副团长、中共中央政治局委员、国务院副总理贺龙元帅率领的中国党政代表团，到苏联参加了伟大的十月社会主义革命四十七周年庆典以后，今天下午乘专机回到北京。"},{"type":"paragraph","text":"中共中央主席毛泽东，中共中央副主席、中华人民共和国主席刘少奇，中共中央副主席、全国人民代表大会常务委员会委员长朱德，中共中央政治局委员、中华人民共和国副主席董必武，中共中央总书记、国务院副总理邓小平等党和国家领导人，前往首都机场热烈欢迎周恩来同志、贺龙同志和代表团其他同志。"},{"type":"paragraph","text":"今天同时回到北京的代表团团员是:中共中央政治局候补委员、中共中央书记处书记康生，中共中央委员、外交部副部长刘晓，中共中央委员伍修权，外交部副部长乔冠华。"},{"type":"paragraph","text":"周恩来同志、贺龙同志和代表团其他同志走下飞机时，毛泽东同志、刘少奇同志等迎上前去，向他们致以亲切的问候。少先队员们向周恩来同志等献花。"},{"type":"paragraph","text":"到机场欢迎的还有:"},{"type":"paragraph","text":"中共中央政治局委员、全国人民代表大会常务委员会副委员长彭真，中共中央政治局委员、国务院副总理李先念，中共中央政治局候补委员、国务院副总理陆定一，中共中央政治局候补委员陈伯达，中共中央书记处书记、国务院副总理兼中国人民解放军总参谋长罗瑞卿大将，全国人民代表大会常务委员会副委员长郭沫若、黄炎培、陈叔通、程潜、林枫，国防委员会副主席傅作义、蔡廷锴，最高人民法院副院长王维纲，最高人民检察院副检察长黄火星。"},{"type":"paragraph","text":"中共中央委员邓颖超、叶季壮、刘宁一、陈少敏、王树声，中共中央候补委员罗贵波、徐子荣、章蕴、徐冰、方毅，中共中央办公厅副主任龚子荣，《人民日报》总编辑吴冷西。"},{"type":"paragraph","text":"国务院各有关部门的负责人:国务院外事办公室副主任李一氓，外交部副部长姬鹏飞、韩念龙、刘新权，对外贸易部副部长李强，对外文化联络委员会主任张奚若，对外经济联络委员会副主任杨琳，国务院代秘书长周荣鑫。"},{"type":"paragraph","text":"中国人民解放军高级将领:张爱萍上将、王新亭上将、傅钟上将、李达上将、钟期光上将、王宏坤海军上将、刘震空军上将、萧向荣中将、唐天际中将、向仲华中将、黄志勇中将、孔石泉中将、陈先瑞中将。"},{"type":"paragraph","text":"前往欢迎的，还有各民主党派负责人杨明轩、许德珩、陈其尤、王绍鏊、邵力子、陈炳基，各人民团体负责人李德全、南汉宸、康克清、马纯古、王伟、孙轶青，北京市负责人万里、郑天翔、吴晗等。"},{"type":"paragraph","text":"苏联驻中国大使契尔沃年科也到机场欢迎。"},{"type":"paragraph","text":"\u003cIMG alt=请插入5号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1964\\11\\64bf010101.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgaut\u003e安康\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e由周恩来同志、贺龙同志率领的中国党政代表团，到苏联参加了伟大的十月社会主义革命四十七周年庆典以后，十一月十四日回到北京。图为毛主席和周恩来同志在机场亲切谈话。"},{"type":"paragraph","text":"(新华社传真　安康摄)\u003c/FONT\u003e"}],"comments":[],"origin":"新华社,新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"邓小平","type":"人物"},{"name":"贺龙","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"朱德","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cefbd7ec89"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
