减少　生产停顿已有两万工人失业","authors":[],"dates":[{"year":1952,"month":2,"day":21}],"is_range_date":false,"parts":[{"text":"目前重庆部分行业因三反运动加工订货减少　生产停顿已有两万工人失业","type":"title"},{"text":"【西南总分社二十一日讯】三反运动纠正了机关部队的盲目加工订货、盲目施工和铺张浪费现象后重庆已有少数工厂和商店关门歇业、停工。钢铁、机器、建筑、卷烟、针织等业目前均极度困难，生产停顿。工人失业已有两万人，其中主要是建筑工人，由于国家机关停止施工而失业，其次是上述各业私营工厂工人，他们生活很困难，有的一家三口每日只吃一斤米。有的吃糠，有的打狗吃。坏分子便乘机煽动工人，如说什么“三反三月、五反五月，八反八月”，使工人因长期失业而恐慌。有的更明目张胆煽动“五反造反”。失业工人向资方要饭吃，又增加了资方向我讨价还价的资本。资方要政府想办法，许多资本家想通过胡子昂向政府说情，胡整天被纠缠，只好躲避。目前资方并非已穷到毫无资本，实则因对事业消极，害怕五反之后“工厂是否还是我们的”，不愿继续投资。如钢铁业李志亲，政府答应即刻向他加工订货，他却说：“不求加工订货，只求给饭吃”。","type":"paragraph"},{"text":"政府目前已采取紧急措施：(一)立即拨款救济失业工人，特别是建筑工人，并发动群众互助。(二)立即恢复正当的加工订货。首先是对钢铁、机器业加工订货，应该建筑的工程马上开工，估计这几项重要企业活动以后，可以带动其他许多行业也活动起来，并可解决工人失业问题，这种措施不仅为了现在也是为了将来。","type":"paragraph"}],"comments":[],"origin":"1952年2月22日新华通讯社编《内部参考》。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3c7c1eb91c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
