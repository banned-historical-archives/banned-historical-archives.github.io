工资是否升调的请示的批复","authors":[],"dates":[{"year":1984,"month":5,"day":14}],"is_range_date":false,"parts":[{"text":"对柳铁关于因“文革”中参与杀人而受到党纪政纪处分者的工资是否升调的请示的批复","type":"title"},{"text":"柳铁党委、并各地、市委，区直各单位党组（党委）：","type":"appellation"},{"text":"柳铁党委处遗领导小组5月3日《关于参与打死人给予党内警告行政记过处分的人员能否缓调或不调工资的请示报告》收悉。","type":"paragraph"},{"text":"国务院国发（1982）140号文件在关于不调工资的五种情况中规定：“极少数思想品质恶劣，以及其他原因，群众意见很大，不同意其升级的人员，均不能升级。”目前我区“处遗”工作中，正在处理杀人凶手的时候，对这些人的升调工资问题，应充分考虑遗属和群众的意见。","type":"paragraph"},{"text":"我们同意柳铁报告中所提建议，对于参与打死人的国家职工，凡受到党纪、政纪处分，群众意见很大，不同意其升级的人员，这次调整工资中一律不得升级。","type":"paragraph"},{"text":"凡涉及“文革”参与杀人职工的工资调整问题，以前的文件精神和本文件不一致的，照本文件执行。","type":"paragraph"},{"text":" 广西壮族自治区党委整党办公室一九八四年五月十四日","type":"paragraph"}],"comments":[],"origin":"( 《处理“文革”遗留问题、清理“三种人”文件汇编》，广西壮族自治区党委整党办公室，一九八六年八月。)","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ca927b53a9"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
