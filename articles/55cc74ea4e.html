art":2,"page_end":2,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"帮助民兵学习毛主席著作","authors":["董志惠"],"parts":[{"type":"paragraph","text":"他来到基干民兵、生产队副队长何茂求的家里。何茂求的爱人刚生孩子，何茂求既要管集体生产，又要出工，还要照顾爱人和小孩，哪有时间学习呢？刘永灯想，雷锋学习毛主席著作不是靠挤时间吗？于是，第二天出工，他一面劳动，一面给何茂求讲白求恩、张思德的故事和毛主席写的文章，讲民兵在战争中的作用。他见何茂求越听越爱听，就把一本《毛泽东著作选读》送给了他。"},{"type":"paragraph","text":"过了一天，刘永灯发现何茂求识字不多，读着吃力。做饭时，刘永灯一边烧火，一边给他读毛主席著作，使何茂求听得入了迷。"},{"type":"paragraph","text":"刘永灯回队后，还是放心不下，何茂求学得怎样呢？一天，他抽中午时间去看他。推门一看，何茂求正聚精会神地在看毛主席的书呢。       （董志惠）"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"55cc74ea4e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
