script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"野坂参三祝贺禁止核弹世界大会全体会议成功  展开大规模国际统一行动给美帝国主义以致命打击  帝国主义修正主义决不能削弱禁止核弹运动","authors":[],"dates":[{"year":1964,"month":8,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"野坂参三祝贺禁止核弹世界大会全体会议成功"},{"type":"paragraph","text":"展开大规模国际统一行动给美帝国主义以致命打击"},{"type":"paragraph","text":"帝国主义修正主义决不能削弱禁止核弹运动"},{"type":"paragraph","text":"新华社四日讯　东京消息：据《赤旗报》今天报道，日本共产党中央委员会主席野坂参三给三日在京都举行的第十届禁止原子弹氢弹世界大会全体会议的贺词，他祝贺会议成功，并号召开展大规模的国际统一行动来反对美帝国主义的核战争政策。"},{"type":"paragraph","text":"贺词说：世界人民的力量粉碎了有人对这次世界大会进行的各种攻击和消除了他们设置的障碍，特别是揭穿了国内外分裂者的阴谋，从而赢得了真正的团结，使国际会议取得了胜利。"},{"type":"paragraph","text":"它说：“有人大肆宣传说由于签订了部分禁止核试验条约，就会向实现世界和平的方向跨进了一步。但是，从签订这项条约到现在已经一年了，事情却完全朝着相反的方向发展。帝国主义正在亚洲、非洲和拉丁美洲加紧推行战争和侵略政策。”贺词指出，特别是在印度支那半岛，美国政府正在策划和实行扩大战争。"},{"type":"paragraph","text":"野坂说：“受过美国原子弹和氢弹灾害的日本人民，决不能容忍这种行为。为了制止这种行为，必须立即开展大规模的国际统一行动。"},{"type":"paragraph","text":"“在这样的紧张局势面前，迫切需要全世界人民行动起来，共同合作，以防止核战争和争取实现全面禁止核武器。要做到这一点，就必需给美帝国主义以致命的打击，因为准备核战争和一贯坚持反对全面禁止核武器的就是美帝国主义。”"},{"type":"paragraph","text":"野坂说：不仅是帝国主义和反动派，而且还有世界上的修正主义者，将对我们的运动发动越来越公开的攻击。但是，我们毫不害怕困难。正如过去的历史所表明的那样，困难有助于锻炼并加强我们的运动，而不会削弱这个运动。他说：“如果我们继承禁止原子弹氢弹运动十年来的光辉传统，进一步加强第十届世界大会定将取得的巨大成就的团结基础和开展反对战争势力的斗争，我坚信，一年以后，我们将举行内容更充实、规模更巨大的第十一届世界大会。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"37fed55be9"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
