hors":["北京大学","崔德甫"],"dates":[{"year":1957,"month":5}],"is_range_date":false,"parts":[{"text":"最高法院必须立即向全国公布胡风事件下文","type":"title"},{"text":"北京大学崔德甫","type":"authors"},{"text":"（崔德甫：北京大学中文系学生）","type":"subtitle"},{"text":"让胡风路翎等出来争鸣繁荣我们的文艺。","type":"paragraph"},{"text":"胡风路翎等是文化人，一“反”之后，再无下文，生死莫明，他们有所谓“小集团”，然而共产党员何其芳，林默涵等何尝没有小集团？何尝不在闹小宗派，为什么不反他们？郭沫若(他是“无”党派的，姑不用拉着他)周扬等何尝不在排斥异己？不过他们自认为“革命文学家”！胡风没有夺得正统，于是“成则为王，败则为寇”便被作为一个“反革命”而镇压到雷峰塔下去了！","type":"paragraph"},{"text":"有人说：“主席说胡风不闹小集团也还可以说话的”，请问主席毛泽东同志：何其芳等也是小集团、小宗派，为什么让他们放炮，不让胡风等开口？","type":"paragraph"},{"text":"路翎何罪？就因为他写了小说〈在洼地上的战斗〉，“不满意”抗美援朝么？为什么不让他出来写？","type":"paragraph"},{"text":"把“夏天打赤博，摇着笆焦扇”也算作胡风“反革命”的“罪证”，给别人介绍爱人，也作为揭发的材料，以加重他的罪案，这难道是“革命者”们的高尚行径么？","type":"paragraph"}],"comments":[],"origin":"北京大学社会主义思想教育委员会编印《北京大学右派分子反动言论汇集》，一九五七年十月。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f1b47dba8e"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
