":1977,"month":3,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"“四人帮”反党集团为了篡党夺权，利用手中控制的舆论工具，竭力鼓吹所谓“张春桥思想”。他们叫嚷张春桥在阶级关系研究上有了什么“新发现”，吹捧张春桥对限制资产阶级法权理论作出了什么“新贡献”，鼓吹张春桥在所有制过渡问题上发现了什么“新观点”。他们妄图用这个彻头彻尾的反革命的修正主义思想去取代战无不胜的毛泽东思想，简直是疯狂得头脑发昏。现在，鼓噪一时的所谓“张春桥思想”，随着“四人帮”的彻底完蛋，也被革命人民扫进了历史的垃圾堆，并且成了他们背叛马列主义、毛泽东思想的铁证。　——编者"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"张春桥","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"四人帮","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"限制资产阶级法权","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"26fec789ec"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
