authors":["上海财经学院","学生"],"dates":[{"year":1957,"month":5}],"is_range_date":false,"parts":[{"text":"右派言论——污蔑社会主义制度  否定建设成绩","type":"title"},{"text":"上海财经学院学生","type":"authors"},{"text":"(1)“共产主义制度必然灭亡。”","type":"paragraph"},{"text":"(2)“殷纣王统治了八百年，后来还是变了，谁知道将来会怎样变呢?到社会主义共产主义也许还会变的，到共产主义党和国家都消灭了，成了自由团体，可能还会产生私有制。要不，原始社会为什么会变了呢？”","type":"paragraph"},{"text":"(3)“我对三大主义就感到这是社会制度引起的，为什么苏联40年到现在还有官僚主义呢?为什么老是反不掉呢？为什么老布尔什维克还会犯错误呢?”","type":"paragraph"},{"text":"(4)“共产主义也有毒草。”","type":"paragraph"},{"text":"(5)“别人谈这是优点、成绩，那我就偏偏说是缺点；别人说是缺点，那我就说优点和成绩。我就与别人不同，不象有种人(指积极分子)跟着大家跑。”并认为这是他的“优良品质，有独特见解”。","type":"paragraph"},{"text":"(6)“为什么要首先谈成绩呢？先谈成绩实际上就削弱缺点。”","type":"paragraph"},{"text":"(7)“1956年的基本建设与高教工作都冒进了”，“高教部的工作该打屁股”。","type":"paragraph"},{"text":"(8)“重工业发展后，如仍要优先发展重工业，这就是教条主义。”","type":"paragraph"},{"text":"(9)周总理报告中指出，我国解放后成绩，如钢铁年产量大大超过解放前。×××说：“为什么要与落后比(与解放前)，为什么不与美国比?”","type":"paragraph"},{"text":" 来源：《反右派斗争言论选辑　第一辑　学生部份》（中共上海财经学院委员会编，1957年9","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2e607456f3"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
