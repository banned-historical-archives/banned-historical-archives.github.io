script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"冲绳各阶层领导人纷纷发表声明  希望日共的参议员候选人当选  一撮修正主义分子在竞选中为美日反动派效劳","authors":[],"dates":[{"year":1965,"month":7,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"冲绳各阶层领导人纷纷发表声明"},{"type":"paragraph","text":"希望日共的参议员候选人当选"},{"type":"paragraph","text":"一撮修正主义分子在竞选中为美日反动派效劳"},{"type":"paragraph","text":"据新华社三十日讯　东京消息：冲绳各阶层领导人代表处在美国占领下被剥夺选举权的冲绳人民在六月二十九日的《赤旗报》上纷纷发表声明，表示他们希望日本共产党在这次参议院选举中取得进展。"},{"type":"paragraph","text":"冲绳人民党书记长古坚实吉说：“把冲绳出卖给美国的正是自由民主党，它正在继续同美国合作。这就是冲绳县人民深受一切痛苦的根源。”"},{"type":"paragraph","text":"“我希望野坂参三主席和其他许多候选人能够当选，从而加强全国的民主力量。”"},{"type":"paragraph","text":"焦满市市长上原黾次郎说：“共产党在这次参院选举中取得进展将有助于促进争取归还冲绳岛和小笠原群岛以及争取日本独立的斗争。”"},{"type":"paragraph","text":"新日本妇女会冲绳县总会主席濑长文说：必须把美国人赶出冲绳岛。她说，她完全支持日本共产党人，以便满足冲绳人民的重要要求。"},{"type":"paragraph","text":"据新华社三十日讯　东京消息：《赤旗报》今天揭露一小撮现代修正主义分子在竞选讲演会上讲话支持日共叛徒神山茂夫，为美日反动派效劳。"},{"type":"paragraph","text":"《赤旗报》揭露，内藤知周竟说“反对帝国主义的民族解放斗争也可能发展成为核战争，因此反对帝国主义的斗争必须在适当地方停止，用谈判解决问题”。《赤旗报》指出：这是提倡向美帝国主义投降。"},{"type":"paragraph","text":"《赤旗报》谴责春日庄次郎歪曲日共为反对美帝国主义和日本垄断资本而斗争的立场，企图阻止日本人民为摆脱美国统治而斗争。"},{"type":"paragraph","text":"《赤旗报》揭露神山在竞选讲演会上号召，建立只反对"},{"type":"paragraph","text":"日本垄断资本的“民主统一阵线”。"},{"type":"paragraph","text":"《赤旗报》指出，这不外是阻碍民主力量的团结、打击日本共产党反对两大敌人的“统一阵线”而已。"},{"type":"paragraph","text":"《赤旗报》严厉谴责志贺义雄和一小撮修正主义分子，在大坂、京都以及其他地方支持社会党和托洛茨基分子的候选人。"},{"type":"paragraph","text":"《赤旗报》说，他们的企图在于鼓动群众反对共产党，分裂共产党和社会党两党共同斗争的关系，挑拨社会党反对共产党。"},{"type":"paragraph","text":"《赤旗报》又揭露，中野重治讲话竟诬蔑“野坂参三比自由民主党候选人还不好”。"},{"type":"paragraph","text":"《赤旗报》强调说，没有比这番话能更明显地把现代修正主义分子为美日反动派效劳的企图暴露得更清楚了。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"953abd9f73"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
