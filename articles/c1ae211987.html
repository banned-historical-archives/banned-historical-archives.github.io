"],"dates":[{"year":1997,"month":1,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社银川1月4日电　(记者褚庆喜)CCTV杯中国乒乓球擂台赛第40场比赛今天在银川举行。男、女擂主马文革、王楠守擂成功。"},{"type":"paragraph","text":"前世界冠军马文革是此次擂台赛中年龄最大的擂主，来自黑龙江的攻擂手王飞则显得年轻气盛。一开局，王飞起板得分，马文革急起直追，从5:5、11:11打到18:18，最后马文革以21:19先下一城。接下来，王飞发起猛攻，马文革状态失衡，连丢两局。第四局，老谋深算的马文革稳扎稳打，步步为营。王飞攻势不减，发起一波又一波强攻。已经在宁夏电视台演播厅的乒乓球台上找到了感觉的马文革，以静制动，或海底捞月救起险球，或高抛发球抢攻得手，再下一城。在终局比赛中，马文革渐人佳境，他长拉短抽，轻吊重扣，一边收获观众的掌声，一边将王飞赶下擂台。"},{"type":"paragraph","text":"前几天战胜了邓亚萍的年轻女擂主王楠在与江苏女选手龚跃春的厮杀中守住了领土。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c1ae211987"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
