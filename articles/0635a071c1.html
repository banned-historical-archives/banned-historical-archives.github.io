script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"比耶迪奇主席等接见我人民友好代表团  表示对中国人民取得粉碎“四人帮”斗争的胜利感到高兴","authors":[],"dates":[{"year":1976,"month":12,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"比耶迪奇主席等接见我人民友好代表团"},{"type":"paragraph","text":"表示对中国人民取得粉碎“四人帮”斗争的胜利感到高兴"},{"type":"paragraph","text":"新华社贝尔格莱德一九七六年十二月二十一日电　南斯拉夫联邦执行委员会主席杰马尔·比耶迪奇十二月二十一日接见了以人大常委会秘书长姬鹏飞为团长的中国人民友好代表团全体成员，并在热情友好的气氛中进行了谈话。"},{"type":"paragraph","text":"姬鹏飞团长向比耶迪奇主席介绍了我国国内的大好形势和我国对外政策的基本原则。他强调说，中国人民在华国锋主席为首的党中央领导下，继承毛主席的遗志，继续执行毛主席制定的革命外交路线和政策，同第三世界国家和人民团结在一起，反对帝国主义、殖民主义，特别是超级大国的霸权主义。"},{"type":"paragraph","text":"姬鹏飞团长说，中国人民支持南斯拉夫人民为保卫独立和主权而进行的斗争，支持南斯拉夫执行的不结盟政策，愿意进一步发展两国的友好合作关系。"},{"type":"paragraph","text":"当姬鹏飞团长谈到中国人民粉碎“四人帮”的伟大胜利时，比耶迪奇主席表示，南斯拉夫人民对中国人民取得的这一成就感到高兴。"},{"type":"paragraph","text":"比耶迪奇主席在谈话中说，南斯拉夫将继续坚决奉行不结盟政策。他说，中国是支持不结盟运动的。比耶迪奇引用铁托总统的话说，南斯拉夫依靠自己的力量武装自己，发展自己的军备。在谈到南斯拉夫同某些大国的关系时，比耶迪奇主席说，我们要求它们尊重我国的独立和主权，不允许干涉我们的国内外政策。"},{"type":"paragraph","text":"在谈到南中两国关系时，比耶迪奇主席表示希望两国更多地增进了解，增进友谊，进一步全面发展两国的合作关系。"},{"type":"paragraph","text":"陪同比耶迪奇主席接见的有：南斯拉夫劳动人民社会主义联盟国际关系与合作委员会主席亚历山大·巴科切维奇，联邦执行委员会主席外事顾问尼古拉·契查诺维奇等。"},{"type":"paragraph","text":"中国驻南斯拉夫大使张海峰也在座。"},{"type":"paragraph","text":"同日上午，南斯拉夫联邦执行委员会副主席兼联邦外交部长米洛什·米尼奇同姬鹏飞团长和代表团秘书长钱李仁举行了会见。"},{"type":"paragraph","text":"南斯拉夫联邦外交部长顾问德拉戈米尔·佩特罗维奇和张海峰大使参加了会见。"},{"type":"paragraph","text":"新华社贝尔格莱德一九七六年十二月二十一日电　南斯拉夫联邦议会议长基罗·格利戈罗夫十二月二十一日下午会见了以人大常委会秘书长姬鹏飞为团长的中国人民友好代表团全体成员。"},{"type":"paragraph","text":"联邦议会副议长锡南·哈萨尼等参加了会见。"},{"type":"paragraph","text":"中国驻南斯拉夫大使张海峰，会见时也在座。"},{"type":"paragraph","text":"会见时双方进行了友好的谈话。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0635a071c1"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
