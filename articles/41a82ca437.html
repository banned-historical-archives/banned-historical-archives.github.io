<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"在九三学社四届二中全会的发言","authors":["中国科学院","袁翰青"],"dates":[{"year":1957,"month":4,"day":22}],"is_range_date":false,"parts":[{"text":"在九三学社四届二中全会的发言","type":"title"},{"text":"中国科学院袁翰青","type":"authors"},{"text":"（袁翰青：中国科学院数理化学部学部委员及情报所付所长、代所长，九三学社中央委员）","type":"subtitle"},{"text":"1957年4月22、28日","type":"subtitle"},{"text":"今天我是情不自尽的来发言，这情是对社，是对这次会议，这次会议从各方面来的同志很多，大家在一起讨论问题。这次会议决不会落空，在北京的工作同志都有此决心要把社务搞好。","type":"paragraph"},{"text":"一、关于发展路线问题：不仅在小组会里谈，大家在走廊里在房间里也谈，这中间是有不同的意见，这是程度的问题，可以用数字来表达的，去年全国政协会议时，毛主席宴会和我们一一握手，当时周总理在旁面对许德珩主席说：九三学社的社员有百分之八十是高级知识份子。这说明九三学社这一特点。我们现在从数字上看高级知识份子占社员人数82．5％，说明一年来的发菜组织路线是正确的，希望能在相当一个时期中保持这一特点。","type":"paragraph"},{"text":"二、发挥社的组织作用：在社章中规定“本社积极帮助社员学习马克思列宁主义，开展批评与自我批评……进行思想改造……”。并规定“……团结教育社员及所联系的群众，并反映他们的意见，提出建议，代表他们的合理要求”。当时争论颇多，有的同志认为不需要规定，最后是接受这几条，现在检查起来，对这几条的执行情况是不够的，在这次会议中都着重谈到。团结教育改造知识份子，这是重要的，但是也要代表他们的合理要求，至于安排人民代表，政协委员这不是主要的，这是政商问题的一部分。今天知识份子的要求是和国家的要求是一致的，关于国家的利益与知识份子利益是一致的，这是教育知识份子的话。今天知识份子主要的要求是工作条件，对办理事业的轻重缓急方面的意见，对国家事业调处上的厚此薄彼的意见，总的说来当前知识份子的要求是和国家的要求是一致的，这是主要的方面，因此我社是代表这一阶层的政党，就要代表这一阶层群众的合理要求。如唐山的代表要求委员们能到该地作学术报告，这要求是合理的，有条件应该去。在基层组织方面，如评薪定级的问题，有的总认为是个人的思想问题，但提出这一问题时不仅要从教育入手，也要考虑到这问题的合理部份，代表合理要求是互相监督中的具体表现之一。要能代表社员和所联系的合理要求，社员就更能重视社的组织作用。","type":"paragraph"},{"text":"在中央科学文教工作委员会和北京市分社科学文教工作委员会联合邀请在京一部分社员座谈如何贯彻“百花齐放、百家争鸣”问题的发言","type":"subtitle"},{"text":"1957年4月27、29两日","type":"subtitle"},{"text":"现在有许多大问题由政府部门的低级人员处理，很难掌握原则。例如对科学的保密问题。我做过商务印书馆的编辑，出版一本叫“医用昆虫学”的书，以后卫生部禁止发行，理由是泄密，因为发表了全国昆虫的公布情形。实际上这个调查在英国杂志早已刊登过。但是卫生部说：“外国杂志可以刊登，我们不能发表”。这件事引起作者的很大愤慨。","type":"paragraph"},{"text":"对科学的保密固然要紧，但是保密的尺度要明确，否则对科学界的争鸣会增加顾虑的。我所经手的书，就有若干种出版后没有发行，都因“泄密”的缘故。","type":"paragraph"},{"text":"我们提倡“百家争鸣”要反对教条主义。教条主义的表现：一是搬经典，一是搬名词。有一个时候的“学习”杂志，尽是搬些名词，我就不爱看。","type":"paragraph"}],"comments":[],"origin":"《中国科学院右派分子言论材料汇集(一)》内部资料，中国科学院整风领导小组办公室编印，1958年6月。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"41a82ca437"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
