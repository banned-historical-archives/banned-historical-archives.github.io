<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"庆祝平壤解放反对美帝侵略  京工商界五万人大示威  电毛主席致敬保证实行爱国公约","authors":[],"dates":[{"year":1950,"month":12,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"庆祝平壤解放反对美帝侵略"},{"type":"paragraph","text":"京工商界五万人大示威"},{"type":"paragraph","text":"电毛主席致敬保证实行爱国公约"},{"type":"paragraph","text":"【新华社九日讯】北京市工商界五万三千多人今日举行了庆祝光复平壤、反对美国帝国主义侵略的盛大的示威游行。参加游行的有全市一百三十六个行业公会的代表。全市各工商业户高悬国旗，张贴标语，如临佳节。"},{"type":"paragraph","text":"游行者于上午八时开始陆续齐集先农坛运动场。会场红旗招展，锣鼓声和歌声此起彼伏。上午十一时四十分，示威游行总领队北京市工商联合会筹委会主任委员傅华亭登上指挥车讲话。他说：“这次爱国示威大游行是北京市工商界历史上空前未有的。我们要团结一致，实践我们的五项爱国公约，用实际行动来庆祝平壤光复，反对美帝侵略。”接着全场一致通过了向毛主席、金日成将军和中国人民志愿军致敬的电文。"},{"type":"paragraph","text":"游行队伍于十一时五十分出发，向京市工商业中心地区前门大街浩浩荡荡前进。游行行列以乐队和腰鼓队为前导，其次是由六十位代表组成的标语队。他们高举着毛主席、斯大林大元帅的巨幅画像，和“抗美援朝保家卫国”以及“北京市工商界庆祝平壤解放反对美帝侵略示威游行”的横额。巨幅的标语牌上写着“毛主席万岁！”“金日成将军万岁！”“中朝人民团结万岁！”“反对美帝侵略！”等口号，以及北京市工商界五项爱国公约和各公会公约的内容。金融业公约上写着：“不套购物资，不盲目贷款，保证物价稳定！”土产食品业公约上写着：“促进城乡物资交流，肩起桥梁任务，辅助政府调剂物资，稳定物价！”面粉业公约上写着：“保证本市面粉供给，协助政府稳定社会秩序！”电料业公约上写着：“以电器技术配合国防建设！”靴鞋业公约上写着：“决心不用美国皮子！”游行队伍还高举了金日成将军、胡志明主席和世界各国人民领袖的许多画像和许多标语。游行群众的口号声响彻云霄。他们高喊“庆祝平壤解放！”“支援朝鲜人民！”“打垮美帝侵略！”“反对投机倒把！”“反对扰乱金融！”“保证完成纳税！”“不听谣言！”“严防匪特！”“劳资团结起来，加强生产！”当游行队伍走到前门箭楼的检阅台时，这种口号声与欢呼声更达到了最高潮。"},{"type":"paragraph","text":"站在检阅台上的是中国人民保卫世界和平反对美国侵略委员会副主席彭真、陈叔通，常务委员许德珩，北京分会主席张奚若、副主席刘仁、吴晗、曾昭抡、舒舍予，北京市人民政府副市长张友渔及北京市各民主党派，各人民团体代表。他们频频鼓掌，向游行者致敬。游行行列总领队傅华亭、副总领队韩诵裳、凌其峻、刘一峰、浦洁修走上检阅台，代表北京市工商界示威游行大会，献给中国人民志愿军、朝鲜人民军的两面锦旗和慰劳品。锦旗上分别写着：“高度发扬中国人民爱国主义与国际主义结合的伟大精神”和“为争取民主幸福而斗争，胜利永远是属于朝鲜人民的。”"},{"type":"paragraph","text":"游行行列继即分东西两路前进。西路经西交民巷、西单大街至平安里；东路经东交民巷、王府井大街、东四牌楼折返东单广场。当游行队伍经过各街道时，留在厂内和店内的人们都涌到街上，鼓掌欢迎，并跟着游行者高呼口号。有的店铺门前还摆设了热茶和香烟，招待游行队伍。当游行行列经过东交民巷前美国领事馆时，游行群众情绪激昂，“打倒美帝国主义”的口号声更为响亮。游行于下午三时半结束。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c31e89bb1e"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
