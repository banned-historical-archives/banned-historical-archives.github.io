script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"考茨基——修正主义代表人物之二","authors":[],"dates":[{"year":1957,"month":1,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"考茨基(1854—1938)德国社会民主党人，无产阶级专政和马克思主义的叛徒和死敌。“考茨基这位第二国际最有威望的人物，是一个最典型和最鲜明的例证，表明如何从口头上承认马克思主义，弄到在实际上把马克思主义变为……主张无产阶级的非革命的‘阶级’斗争的自由资产阶级学说……”(“列宁文选”两卷集)考茨基在其活动的黄金时代写了“卡尔·马克思的经济学说”(1886)、“土地问题”(1898)等马克思主义著作。然而，就在那时，考茨基也曾背弃并歪曲马克思主义。例如，他取消了爱尔福特纲领中关于无产阶级专政的条文。在第二国际中，考茨基形式上站在伯恩施坦派与左翼社会民主党人梅林、卢森堡和李卜克内西之间的中派立场上，但实际上他支持右翼分子，向伯恩施坦让步，向机会主义投降。他在马克思主义的基本问题即无产阶级专政的问题上一再向机会主义让步，以致最后自己也完全滚入机会主义的泥坑。他否定摧毁资产阶级国家机器和建立无产阶级专政的必要性，提出关于“纯粹”民主、“超阶级”民主的自由资产阶级理论来反对无产阶级专政的学说。"},{"type":"paragraph","text":"在民族殖民地问题上，考茨基支持右翼社会民主党人、俄国孟什维克、崩得分子的立场，反对解决民族问题的马克思主义途径。列宁揭穿了考茨基反马克思主义的“超帝国主义”论，这一理论的目的是在支持垂死的资本主义。在伟大的十月社会主义革命之后，考茨基更其加强了他的反革命的“理论”活动和实际活动。他帮助德国右翼社会民主党人摧残1918年到1919年的德国革命，反对与苏维埃俄国加强联系，诬蔑无产阶级专政和马克思主义，反对辩证唯物主义和历史唯物主义。苏联共产党彻底揭穿了考茨基和考茨基主义，这对于以革命的马克思主义精神从思想上、政治上教育国际无产阶级，具有伟大的意义。目前，右翼社会党人，其他伪社会主义者、帝国主义在工人运动中的代理人继续奉行着考茨基的改良主义路线。(摘自“简明哲学辞典”)"}],"comments":[],"origin":"“简明哲学辞典”","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"47622e243a"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
