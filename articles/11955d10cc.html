tart":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"军队属于党领导岂容江青伸黑手","authors":["西沙自卫反击战三等功荣立者/大队政委杨富荣"],"parts":[{"type":"paragraph","text":"西沙自卫反击战后，正当我们认真学习国务院和中央军委的嘉奖电，总结经验，决心发扬成绩，戒骄戒躁，提高警惕，准备歼灭再犯之敌的时候，野心家、阴谋家江青竟背着毛主席、党中央，绕过各级党委领导，直接给我们送来了材料，写来了所谓“慰问信”，恬不知耻地说什么她和我们是“心连心”的。江青的“心”是什么样的心？她是和我们“心连心”，还是别有用心？现在，该是剥下她的伪装，戳穿她的祸心的时候了。"},{"type":"paragraph","text":"我们党的历史经验证明，一切阴谋家、野心家为了实现其篡党夺权的阴谋，都必然拚命地大抓军权。“四人帮”反党集团也是如此。江青在军队里既不担任什么职务，也没有受毛主席、党中央的委托，她却越过部队的各级党组织，给这个连队送材料，给那个单位写“信”，并且跑到部队里指手划脚，瞎说乱道。她的罪恶目的，就是要扩大个人影响，争个人的兵权，企图当军队的“太上皇”。毛主席指出：“江青有野心。”毛主席的话，一语揭穿了江青的黑心。她关心批林批孔是假，搞篡党夺权、复辟倒退是真。她从来没有同我们心连心，而是别有用心。她的心，是化装成美女的蛇心，是为个人争兵权的野心，是要把我们军队变成他们“四人帮”篡党夺权、复辟资本主义工具的毒蝎之心。"},{"type":"paragraph","text":"我们人民军队，是伟大领袖和导师毛主席亲手缔造的、中国共产党直接领导的英雄军队，江青想把黑手伸进我们军队，她的阴谋是注定要失败的。以华国锋主席为首的党中央，采取果断措施，一举粉碎“四人帮”反党集团，表达了我们的心愿。真是大快人心，大振军心，我们一千个拥护，一万个支持。"},{"type":"paragraph","text":"我们是伟大、光荣、正确的中国共产党的一员，一定要紧紧团结在以华主席为首的党中央周围，一切听从党中央指挥，提高警惕，加强战备，保卫以华国锋主席为首的党中央，保卫无产阶级专政，保卫伟大的社会主义祖国！"}],"alias":""},"tags":[{"name":"江青","type":"人物"},{"name":"华国锋","type":"人物"},{"name":"四人帮","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"批林批孔","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"11955d10cc"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
