馆同志当场齐声高呼：“打倒现代修正主义！”","authors":[],"dates":[{"year":1967,"month":2,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"苏修当局又指使大批暴徒闯入我大使馆猖狂捣乱"},{"type":"paragraph","text":"我临时代办提出最严重最强烈抗议"},{"type":"paragraph","text":"我使馆同志当场齐声高呼：“打倒现代修正主义！”"},{"type":"paragraph","text":"新华社莫斯科八日电  中国驻苏联大使馆临时代办安致远，八日上午就苏修当局七日又指使暴徒冲入中国大使馆的严重事件，向苏联外交部远东司副司长伊利扎维金提出了最严重、最强烈的抗议。"},{"type":"paragraph","text":"安致远说，二月七日下午三时到五时半，苏修领导集团指使四、五百名特务暴徒，数次袭击中国大使馆。你们的警察对这群暴徒毫不阻拦，而且指挥他们闯进我使馆前院大肆捣乱，他们猛击我使馆主楼正门、侧门和前院大铁门，砸碎了我使馆主楼的玻璃，还在我使馆院内、大门上，张贴反华标语，并恶毒攻击我国人民最敬爱的伟大领袖毛主席。五时五分，二十多名暴徒竟然折断我主楼二道门的门锁，强行冲入我使馆办公重地，他们歇斯底里地狂喊乱叫。我使馆人员一再劝阻并提出警告，但他们还继续捣乱了二十多分钟。苏修领导集团在砸坏、抢走设置在我使馆范围内的新闻橱窗并野蛮毒打我外交人员的法西斯暴行之后，又制造了这一新的强盗暴行。为此，我向苏联外交部提出最严重、最强烈的抗议。"},{"type":"paragraph","text":"伊利扎维金在听了安致远临时代办的抗议后，进行无理抵赖，胡说什么是中国大使馆把那些人请进来，然后又把他们推出去的。这实在是荒唐之极。安致远临时代办对这种无稽的谎言给予了有力的驳斥。"},{"type":"paragraph","text":"据新华社莫斯科七日电　在苏联修正主义当局指使下，七日十五时，又有四、五百个自称是“工人代表”的人，举着反华标语牌到中国驻苏联大使馆捣乱。"},{"type":"paragraph","text":"这些自称是“工人代表”的暴徒们在我使馆门前，恶毒地辱骂我们最伟大的领袖毛主席和中国人民。暴徒中有二百多人，竟闯入我使馆前院，吹口哨，尖声怪叫，肆意胡闹，并用拳猛击我使馆门窗。十七点五分，有二十多个暴徒冲破我使馆主楼的右侧门，闯进了我使馆主楼办公重地。把我使馆主楼右侧门的二道门的门锁冲坏。"},{"type":"paragraph","text":"在暴徒们的捣乱过程中，有一辆小轿车停在我使馆前马路上，这是苏修当局现场指挥者的专车。"},{"type":"paragraph","text":"在暴徒们破门而入狂叫反华和辱骂毛主席的口号时，我使馆的同志们齐声高呼：“列宁主义万岁！”“伟大的领袖毛主席万岁！”“打倒现代修正主义！”“打倒列宁主义的叛徒现代修正主义者！”“苏联人民万岁！”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0d256f56ab"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
