rs":["谷忠诚"],"dates":[{"year":1979,"month":3,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"宁夏党校轮训公社书记总结经验教训"},{"type":"paragraph","text":"消除极左路线影响  抓好农业生产"},{"type":"paragraph","text":"据新华社银川三月十三日电  新华社记者谷忠诚报道：宁夏回族自治区党校举办公社书记轮训班，联系实际学习党的十一届三中全会文件，总结历史经验，消除林彪、“四人帮”极左路线的影响，使干部的思想、作风和工作方法，尽快适应把工作着重点转移到现代化建设上来的要求。"},{"type":"paragraph","text":"近两个月来，自治区党校组织参加轮训的公社书记按照实践是检验真理的唯一标准这个马克思主义的基本原则，总结分析了自己工作中的经验教训。来自六盘山区的一些公社党委书记说，这些年来，林彪、“四人帮”在农村大力推行极左路线，形成了在政治上随意乱批乱斗，无限上纲；工作上搞强迫命令、形式主义，生产上搞瞎指挥、“一刀切”，严重地挫伤了广大干部、群众的社会主义积极性。"},{"type":"paragraph","text":"贺兰县习岗公社党委书记王福元说，如果极左路线的流毒影响不肃清，就不能保持一个安定团结的局面，也就无法搞好农业生产。"},{"type":"paragraph","text":"在学习辩证唯物论认识论的同时，宁夏党校认真组织这批公社书记学习经济理论，努力掌握按照客观规律办事的本领。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"林彪","type":"人物"},{"name":"四人帮","type":"人物"},{"name":"宁夏文革","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"631085c53c"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
