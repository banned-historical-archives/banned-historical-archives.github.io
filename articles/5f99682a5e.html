<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共中央关于制止农村劳动力流动的指示","authors":[],"dates":[{"year":1959,"month":2,"day":4}],"is_range_date":false,"parts":[{"text":"中共中央关于制止农村劳动力流动的指示","type":"title"},{"text":"最近两三个月来，农民盲目流动（主要是流入城市）的现象相当 严重。根据河北、山东、河南、山西、辽宁、吉林、安徽、浙江、湖北、湖南等省的不完全统计，外流的农民约有三百万人。农民流动的原因是很多的，但其主要原 因，一是前一时期城市和工矿区的企业单位大量招工的影响，有一些单位违反招工规定，不经过当地党委、政府劳动部门和人民公社的同意，任意录用农民所造成的 不良后果；二是有些地方对群众的生产、生活还安排得不好，不少农民羡慕城市生活，加上某些干部作风有毛病，农民就想出来；三是城市在一个时期对用人制度和 户口管理不严，粮食供应较宽，也助长了农民进城的现象。现在春耕就要到来，冬季生产任务也很繁重，工矿企业招工已经有些过多，农民盲目流动的现象如果继续 下去，对于农业和工业生产很有妨碍，对于巩固人民公社也是不利的，并且容易给坏分子造成活动的空隙。因此，必须立即采取有效措施予以制止：","type":"paragraph"},{"text":"一、中央一月五日已通知在目前时期停止招工。各企业、事业、机关一律不得再招用流入城市的农民；已经使用的，应即进行一次清理，已有固定工作确实不能离开 的，必须补订包括企业、人民公社和劳动者本人三方面同意的劳动合同。其余的，应在作好政治思想工作以后，一律遣送回乡。","type":"paragraph"},{"text":"二、各企业、事业、机关应该教育职工立即停止串连亲友进城找事。在农民盲目外流严重的地区必要时应在交通要道派人进行劝阻。对已经流入城市、工矿区而尚未找到工作的农民，当地党政机关应组织临时工作机构负责收容和说服动员，尽速遣返原籍。","type":"paragraph"},{"text":"三、在城市和工矿区，必须严格执行粮食计划供应制度和户口管理制度，没有迁移证件不准报户口，没有户口不供应粮食。对某些单位虚报人口冒领粮食的行为，必须严格纠正。各人民公社也不得随便开发证明信件，转移外流人员的粮食和户口关系。","type":"paragraph"},{"text":"四、各级党委应结合整社工作，加强对社员安心农业生产和积极建设农村的教育。人民公社必须同时抓生产、抓生活、抓思想，尽可能地安排好生活，调节劳逸， 办好食堂和其他公共福利事业。对于曾经自行外流的农民，以至干部、党员、团员，都应该采取耐心说服的方针，使其提高认识，一律不要开斗争会和进行处分。但 是，对于少数煽动群众外流，有意破坏人民公社的地、富、反、坏、右分子，必须严肃处置。","type":"paragraph"},{"text":"五、目前有些厂矿企业中跳厂、挖工现象仍有发生，应根据中央一九五八年十二月十八日对劳动部党组报告的批示，切实纠正。","type":"paragraph"},{"text":"六、对来自农村的合同工的工资待遇应该定的适当。外出做工的社员也必须按规定向人民公社交纳一定数额的公积金、公益金等费用，交纳的办法，由各省、市、自治区党委规定；人民公社对外出做工的社员家属，应该和其他社员家属一视同仁，不得歧视。","type":"paragraph"},{"text":"以上各点，望即布置执行。","type":"paragraph"}],"comments":[],"origin":"根据中共中央文件刊印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5f99682a5e"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
