":[],"dates":[{"year":1955,"month":11,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛泽东主席"},{"type":"paragraph","text":"为首都人民英雄纪念碑题词"},{"type":"paragraph","text":"周恩来总理写了纪念碑碑文"},{"type":"paragraph","text":"新华社十七日讯　毛泽东主席为首都人民英雄纪念碑题了词，题词的原文是“人民英雄永垂不朽”。周恩来总理也写了一百五十个字的纪念碑碑文。纪念碑工地的工人正在细心地把他们写的字描下来，进行放大，并且制作石膏模型，为正式镌刻作好准备。刻字工程将在十二月开始。"},{"type":"paragraph","text":"首都人民英雄纪念碑的五百九十多块碑心、碑身石料都已安装完毕，碑顶安装工程也快要完成。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"06b0f10169"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
