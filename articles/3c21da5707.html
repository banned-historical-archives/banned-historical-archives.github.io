rt":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"托毛主席的福","authors":["丁月友"],"parts":[{"type":"paragraph","text":"我回到山东莱阳县家乡的第二天，正逢生产队发工资。会计室里人声欢腾，喜气洋洋。"},{"type":"paragraph","text":"“于连章大伯，”会计老李高声地喊着，“你全年做了一千八百八十五个工分，共得工资七十四元八角三分。第一次领去二十二元，这次实领五十二元八角三分。”“一共七十多元！”我也有点惊奇，因为去年这里是遭到旱、涝灾害的年头啊！"},{"type":"paragraph","text":"生产队的党支部书记好象看出了我们的心情，解释说：“咱们除了农业收人以外，果园收入两干多元，养猎收入一千多元，粉坊收入五百多元，还有其他副业收入。社里留下5％的公积金，其余部分配给社员。详细数字都在这张清单上。”他指着墙上贴的那张分配方案又对大伯说：“你们老年社员经管桃园和灭荒草出了不少力，这是给你的报酬。”六十三岁的于大伯，拿着一大适钞，激动地说：“这都是托毛主席的福啊！”"}],"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3c21da5707"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
