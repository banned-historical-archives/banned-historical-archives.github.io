art":3,"page_end":3,"description":"","is_range_date":false,"comments":[],"comment_pivots":[],"title":"毛泽东思想挂了帅老灾区变成余粮县","authors":[],"parts":[{"type":"paragraph","text":"河南省北部原阳、延津、封丘三县，位于黄河下游北岸，历史上就受风沙、盐碱、内涝三大灾害的威胁，是河南有名的老灾区。无产阶级文化大革命以前，国家年年都要给这里运来大批粮食和救灾物资。"},{"type":"paragraph","text":"在无产阶级文化大革命中，这三个县的广大贫下中农和革命干部以毛泽东思想为武器，对中国赫鲁晓夫及其代理人在灾区推行的单纯“物质刺激”、“粮、款挂帅”的修正主义救灾路线，展开了群众性的大揭发、大批判。中国赫鲁晓夫及其代理人在灾区推行修正主义救灾路线，使不少人受到了毒害，产生了“吃粮靠统销，花钱靠救济，看病靠免费，生产靠贷款，耕地靠拖拉机”的五依靠思想，以致使灾区落后面貌长期不能改变。广大贫下中农和革命干部在革命大批判中，以活生生的事实，愤怒控诉了中国赫鲁晓夫及其代理人的罪行。他们决心遵照毛主席的教导，自力更生，艰苦奋斗，用自己的双手来改变灾区面貌。"},{"type":"paragraph","text":"在一年来改天换地的战斗中，广大贫下中农和革命干部把毛泽东思想当成命根子，天天读毛主席的书，事事照毛主席的指示办。毛主席的“自力更生”、“艰苦奋斗”的教导，成了他们的行动指针。在低洼盐碱地区，他们用双手开挖了纵横交错的排水沟，使原来的洼坑地变成了一块块台田、方田、条田。在飞沙地区，他们栽上了一片片、一行行的挡风固沙林，使不毛之地也长起了庄稼。广大贫下中农还艰苦奋战，在两年多时间内打成了四千多眼机电灌井。不少社、队第一次使用了电力灌溉，使几十万亩旱地变成了水地，开始出现了亩产五百斤小麦、千斤高粱的地块和亩产百斤皮棉的生产大队。去年，这三个县夏秋两季都获得了空前大丰收，一跃成为余粮县。"},{"type":"paragraph","text":"北京小汤山地区广大革命群众决心以毛泽东思想为武器，把中国赫鲁晓夫及其代理人所推行的反革命修正主义路线，彻底揭深批臭。图为老贫农张永才（右立），在场头用自己在旧社会被地主恶霸欺压剥削的辛酸家史，控诉中国赫鲁晓夫鼓吹“剥削有功”的滔天罪行。"},{"type":"paragraph","text":"（新华社）（照片）"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"河南文革","type":"人物"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e6de696cb8"},"buildId":"3k8CSiaVLD8fQhU1LkfEy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
