<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"剥削就是有罪　造反就是有理","authors":["吴桂云"],"dates":[{"year":1967,"month":4,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"全国先进生产者、青岛国棉六厂工人　吴桂云"},{"type":"paragraph","text":"党内头号走资本主义道路当权派，千方百计想搞资本主义复辟。他极力颂扬资本主义制度的所谓“进步”和“光荣”，鼓吹“剥削无罪”，“造反无理”的谬论，胡说什么“中国不是资本主义太多了，而是资本主义太少了。”还大叫什么“劳动人民不是反对剥削，而是欢迎剥削。”"},{"type":"paragraph","text":"我是一个亲身经受过日本帝国主义、国民党反动派和吃人的资本家残酷剥削和压迫的普通工人。我听了党内头号走资本主义道路当权派的这一派胡言乱语，气得肺都要炸开了。我要控诉党内头号走资本主义道路当权派，我要控诉资本家的剥削。剥削有罪!造反有理!谁要想复辟资本主义，叫我们工人再做牛马，我们就坚决、彻底地把他打倒在地，叫他永世不得翻身。"},{"type":"paragraph","text":"我父亲是个纺织工人。解放前，在万恶的日本帝国主义和资本家的残酷剥削下，贫病而死。一九四四年，我还是一个十一岁的女孩子，就进纱厂做工。那时我长得没有机器高，可干的尽是大人的活。每天象牛马般地干十多个小时，有时干着干着困得睡着了，就遭到狗腿子、臭监工的一顿毒打，还骂我是“懒鬼”、“装蒜”。在资本家的残酷压迫下，我们工人连喘一口气的权利都被剥夺了。而党内头号走资本主义道路当权派却如此吹捧资本家，这再明显不过地说明他是站在反动的资产阶级立场上，和剥削者一个鼻孔出气，穿一条连裆裤。"},{"type":"paragraph","text":"党内头号走资本主义道路当权派还胡说什么“工人要你剥削，不剥削人家就苦得很。”这真是反动透顶的谬论。解放前，我在资本家的工厂里干活，干一天挣不到两个窝窝头的工资，一家老小只好吃橡子面掺野菜的窝窝头。家里没有烧的，只好做完工再去山上拾草。咱自己天天纺纱织布，可身上穿的却是传了几代的破棉絮。那些日本侵略者、国民党反动派和资本家，一个个却吃得大腹便便，胖得滚圆，他们穿的是绫罗绸缎，西装洋服。他们那来的这般阔气?还不是喝了我们工人的血，吃了我们工人的肉，还不是我们工农群众把他们喂肥的。但是，坚决站在剥削阶级反动立场上的党内头号走资本主义道路的当权派却颠倒是非，混淆黑白，胡说什么我们工人“欢迎”资本家的剥削，这是对我们工人阶级的极大污蔑。"},{"type":"paragraph","text":"只有在我们心中最红最红的红太阳毛主席领导下的社会主义新中国，我们工人阶级才真正过着幸福的生活。我只是做了自己应做的一分工作，毛主席和全国人民却给了我崇高的荣誉，当了全国先进生产者，毛主席他老人家还几次接见了我们。"},{"type":"paragraph","text":"在这次无产阶级文化大革命中，我们厂的党内一小撮走资本主义道路当权派推行了党内头号走资本主义道路当权派制定的资产阶级反动路线，挑起群众斗群众，把我们八十多名阶级姊妹和阶级兄弟打成了“反革命”、“牛鬼蛇神”。一小撮坏蛋也想把我整倒。我坚决听毛主席的话，坚决起来造反。我们在毛泽东思想旗帜下团结起来，组织了自己的革命组织——捍卫毛泽东思想先锋队，我还发表了“告全厂革命职工书”，和革命的兄弟姊妹一起起来向资产阶级反动路线作坚决斗争。在毛主席的革命路线的指引下，我们胜利了。"},{"type":"paragraph","text":"党内头号走资本主义道路当权派明目张胆地反对毛主席，反对毛泽东思想，妄图复辟资本主义，使中国改变颜色，这一千个办不到!一万个办不到!我们工人阶级最听毛主席的话，我们要和党内头号走资本主义道路当权派斗到底!他一天不投降，我们就要和他斗争一天。我们工人阶级是文化大革命的主力军，我们要誓死保卫伟大的毛泽东思想，誓死保卫铁打的社会主义江山，让它永不变色。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b8f67836d4"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
