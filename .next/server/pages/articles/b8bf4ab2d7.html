script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"wenji1","type":"pdf","name":"毛泽东文集第一卷（1999）","internal":false,"official":true,"author":"中央文献研究室","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/wenji1.pdf"],"article":{"title":"停战议和一致抗日通电","description":"","dates":[{"year":1936,"month":5,"day":5}],"parts":[{"text":"停战议和一致抗日通电","type":"title"},{"type":"paragraph","text":"南京国民政府，军事委员会，全体海陆空军，全国各党派各团体，各报馆，一切不愿意当亡国奴的同胞们："},{"type":"paragraph","text":"自苏维埃中央政府与红军革命军事委员会组织中国人民红军抗日先锋军渡河东征以来，所向皆捷，全国响应。但正当抗日先锋军占领同蒲铁路，积极准备东出河北与日本帝国主义直接作战之时，蒋介石氏竟以十师以上兵力开入山西，协同阎锡山氏拦阻红军抗日去路，并命令张学良杨虎臣两氏及陕北军队向陕甘苏区挺进，扰乱我抗日后方。"},{"type":"paragraph","text":"中国人民红军抗日先锋军，本意集中全力消灭蒋氏拦阻抗日去路的部队，以达到对日直接作战之目的。但苏维埃中央政府与红军革命军事委员会，一再考虑，认为国难当前，双方决战，不论胜负属谁，都是中国国防力量的损失，而为日本帝国主义所称快；且在蒋介石阎锡山两氏的部队中，不少愿意停止内战一致抗日的爱国军人，目前接受两氏的命令拦阻红军抗日去路，实系违反自己良心的举动。"},{"type":"paragraph","text":"因此，苏维埃中央政府与红军革命军事委员会，为了保存国防实力，以便利于迅速执行抗日战争，为了坚决履行我们屡次向国人宣言停止内战一致抗日的主张，为了促进蒋介石氏及其部下爱国军人们的最后觉悟，故虽在山西取得了许多胜利，然仍将人民抗日先锋军撤回黄河西岸。以此行动，向南京政府、全国海陆空军、全国人民表示诚意，我们愿意在一个月内与所有一切进攻抗日红军的武装队伍实行停战议和，以达到一致抗日的目的。"},{"type":"paragraph","text":"苏维埃中央政府与红军革命军事委员会特慎重地向南京政府当局诸公进言，在亡国灭种的紧急关头，理应翻然改悔，以“兄弟阋于墙外御其侮”的精神，在全国范围首先在陕甘晋停止内战，双方互派代表，磋商抗日救亡具体办法，此不仅诸公之幸，实亦民族国家之福。如仍执迷不悟甘为汉奸卖国贼，则诸公的统治必将最后瓦解，必将为全中国人民所唾弃所倾覆。语云“千夫所指，不病而死”，又云“放下屠刀，立地成佛”，愿诸公深思熟虑之。"},{"type":"paragraph","text":"苏维埃中央政府与红军革命军事委员会更号召全国凡属不愿意做亡国奴的团体、人民、党派，赞助我们停战议和一致抗日的主张，组织停止内战的促进会，派遣代表隔断双方火线，督促并监视这一主张的完全实现。"},{"type":"paragraph","text":"中华苏维埃人民共和国中央政府主席毛泽东"},{"type":"paragraph","text":"中国人民红军革命军事委员会主席朱德"},{"type":"paragraph","text":"一九三六年五月五日"},{"type":"paragraph","text":"根据一九三六年五月十六日"},{"type":"paragraph","text":"《红色中华》刊印。"}],"comment_pivots":[{"part_idx":2,"offset":107,"index":1},{"part_idx":2,"offset":126,"index":2}],"is_range_date":false,"authors":["毛泽东"],"comments":["阎锡山，见本卷第371页注〔14〕。","张学良，见本卷第371页注〔10〕。杨虎臣，即杨虎城，见本卷第371页注〔13〕。"],"page_start":398,"page_end":399,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b8bf4ab2d7"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
