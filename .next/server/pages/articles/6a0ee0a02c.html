script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"美国《挑战报》揭露美国通货膨胀捐税加重  垄断资本加紧剥削　工人生活日益困苦","authors":[],"dates":[{"year":1969,"month":7,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"美国《挑战报》揭露美国通货膨胀捐税加重"},{"type":"paragraph","text":"垄断资本加紧剥削　工人生活日益困苦"},{"type":"paragraph","text":"本报讯　美国进步劳工党机关报《挑战报》五月号登载一篇题为《美国工人：工时延长工资降低》的文章，以大量令人信服的事实揭露了在美国垄断资本残酷剥削下广大工人群众生活日益困苦的真相。"},{"type":"paragraph","text":"这篇文章指出，美国政府公布的数字证明：工人的工资正在降低。这对在这个通货膨胀和赋税繁重的国家内的想尽办法使得收支相抵的任何一个工人家庭来说可能并不感到惊奇，然而对某些家庭来说可能是新的事情是，很多工人的工时日趋延长，而得到的工资却在减少。"},{"type":"paragraph","text":"文章援引纽约汽车司机联合委员会最近发表的报告，说明纽约市通货膨胀和抽税对一些工业部门所产生的影响。"},{"type":"paragraph","text":"例如：在电力、煤气和卫生部门工作的工人作为一类，从一九六五年到一九六八年平均每周工资增加十四美元——但是他们都未看到钱。通货膨胀——价格上升——把所“增加”的工资去掉了十二点三九美元。不仅如此，还增加了税收，又使工资减少了八点十五美元，这样这些工人拿回家的购买力即实际工资就比一九六五年减少六点五四美元。"},{"type":"paragraph","text":"在化学工业工作的工人中，情况甚至更为悲惨。在那里，从一九六五年到一九六八年工资“增加”了十五点四一美元，但是通货膨胀使工资损失十点六零美元，税收又使其损失六点七零美元——这样工人们实际损失了一点八九美元。但是这些工人平均每周工时增加了十九个小时。换句话说，他们得到的实际工资减少了一点八九美元，而每周的工时却增加了两个小时左右。"},{"type":"paragraph","text":"在交通运输设备部门工作的工人的情况是：每周增加的工资是十二点八八美元；通货膨胀所带来的损失是九点九八美元；税收所带来的损失是五点七一美元；实际损失了三点三一美元，而每周工时却增加了一小时十八分。"},{"type":"paragraph","text":"在批发贸易部门工作的工人由于通货膨胀和税收三年来每周“增加”的工资十五点七九美元丧失殆尽，实际工资比一九六五年减少了二点九一美元；在零售商店工作的工人，虽然工资“增加”九点四三美元，但比一九六五年减少一点三八美元。"},{"type":"paragraph","text":"在工资较高的技术工人中，这种资本主义的掠夺也是大同小异的。三年中建筑工人每周增加的三十点四三美元的工资，由于通货膨胀损失十五点八六美元和税收损失十三点二一美元，而只剩下一点三六美元——但是他们为了得到这一点三六美元每周工时增加一个半小时！"},{"type":"paragraph","text":"文章还特别指出所有这些数字都是以这样的假设为前提的，即工人一年工作五十二周，而且不生病，不发生事故、不失业或不发生罢工，当然，这是永远做不到的，因此每年实际工资就更加减少得多了。（附图片）"},{"type":"paragraph","text":"1969年数字统计到四月底"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6a0ee0a02c"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
