script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"看清楚了资产阶级的丑恶面目高级职员张惠鹏检举了奸商杨逸民的罪行","authors":[],"dates":[{"year":1952,"month":2,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报记者"},{"type":"paragraph","text":"宝威药房高级职员张惠鹏，是五反运动中的积极分子。当他一看清资产阶级的丑恶面目以后，马上就把自己所掌握的宝威药房老板杨逸民的不法行为一件一件的检举出来，他先后已检举了四十五件，但是他说:老板的罪行不止此数，我还要搜集材料，继续检举。"},{"type":"paragraph","text":"张惠鹏同志由于受老板杨逸民的迫害很深，所以今天对老板更加痛恨。张惠鹏同志说:"},{"type":"paragraph","text":"“老板当时为了攫取暴利，就教我做他的帮凶，帮助他做逃税、行贿等等不法勾当。那时候，他对我很和气，还以小恩小惠来笼络我，换句话说，也就是贿赂我。有一次，他到香港带来一支钢笔和剃刀送给我，还经常请我到外面吃饭，以及到外埠去旅行。”"},{"type":"paragraph","text":"“后来，我加入工会，初步受到阶级教育。老板对我加入工会很不满意，千方百计要把我从工会里拉出来。他对我说:‘你还是退出工会，帮助我对付工会里的十八个工人吧!’我说:‘我不愿意这样做，我为什么要帮助资本家来压迫自己的阶级弟兄呢?’老板自己拉我不出来，他就委托一个朋友作说客，请我在锦江饭店吃饭，说只要我答允老板的要求，什么条件开出来好了。我答复老板的话是跟第一次一样，我说:‘我不愿意’。”"},{"type":"paragraph","text":"“老板见我两次拒绝他的要求，他就老羞成怒，换了一副压迫的手段来对付我了。他自己大量逃避资金，却想以店中存货减少的责任推到我身上，声势汹汹地说要追究责任，借以引起其余职工对我的怀疑，这是老板最恶毒的分化职工的阴谋。但是事实胜于雄辩，当我举出有力的证据时，老板的阴谋终于又失败了。”"},{"type":"paragraph","text":"五反运动开始后，老板装成要向政府坦白的样子，来摸我的“底”，他说:“你知道我的事情最多，请你帮我想想。”我当时警惕性不够高，就写了一部份材料交给他。后来我经工会的启发和教育，不再上老板的当。老板见摸不到我的“底牌”，索性到税务局、工商局去造谣，说“张惠鹏过去是副经理，他所做的事情我是不知道的。”"},{"type":"paragraph","text":"“老板的许多花样我都领教过了，老板的恶毒心肠我也摸得一清二楚了。照理，我在五反运动中，是应该带头把他的罪行检举出来的。但当时我还有顾虑，主要是由于自己以前曾经帮同老板做过不法的事，因而不敢检举。幸而工会再次给我帮助和启发，使我站稳了立场，我于是向工会交代了自己的问题，就把老板的一切罪行一五一十地检举了。”"},{"type":"paragraph","text":"从张惠鹏同志的事情中，我们看到了不法资本家的最丑恶的嘴脸。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"74d3f8acf1"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
