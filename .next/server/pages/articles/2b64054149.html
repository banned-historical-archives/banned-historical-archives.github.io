<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"来自西德一个“妇女信息中心”的报道：  现代“奴隶贸易”的悲剧","authors":["卢嘉祥"],"dates":[{"year":1989,"month":5,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"来自西德一个“妇女信息中心”的报道："},{"type":"paragraph","text":"现代“奴隶贸易”的悲剧"},{"type":"paragraph","text":"在人类进入２０世纪８０年代以后，以新形式出现的“奴隶贸易”——女性奴隶贸易（或曰“拐卖妇女”），在不少国家，从无到有，规模由小变大，近年来，甚至发展到了触目惊心、令人发指的地步。"},{"type":"paragraph","text":"在经济高度发达的西德，目前女性奴隶贸易问题相当严重。一些亚洲国家以及世界其他不少发展中国家的妇女，被以种种手段拐骗到了那里。这些妇女在离家之前大多数是未婚的姑娘。据西德首都波恩有关部门估算，现在每年有１万多名这样的妇女被诱至西德。"},{"type":"paragraph","text":"她们中有的人，是被原在地区的骗子以介绍去读书、做工、当护士、做保姆或嫁给讲信义的德国人等甜言蜜语骗去的，有的是被从西德到她们原在地区旅游或做生意的人以种种诱饵骗去的。到了西德后，她们中有的人被强迫到“红灯区”去登记注册，当合法的娼妓；有的人被逼着去社会其他地方做非法的暗娼，有的则被胁迫违反自己的意愿，跟自己根本不爱的男人“结婚”。有的“新郎”是残废人，有的“新郎”是年迈孱弱、满脸皱纹的老头儿。很多男人购买她们时，就像在商场里购买普通商品一样，随意挑拣，选定后，一手交钱，一手交“货”，然后带人回家。"},{"type":"paragraph","text":"这些妇女实际上都已被他人占有，失去了人身自由，沦为奴隶，常常横遭肆无忌惮的虐待和无法忍受的凌辱。有的人被传染上了梅毒、淋病、淋巴肉芽肿等性行为传播的疾病，有的甚至染上了艾滋病。"},{"type":"paragraph","text":"这些现代奴隶身在异国他乡，远离祖国和亲人，处于举目无亲、孤立无援的境地。遇到危险时，往往呼天天不应，叫地地不灵；再加上语言不通，食物不习惯，水土不服等原因，许多人非常忧伤，极为悲痛。有的人疯了，披头散发，污首垢面，其状令人目不忍睹。有的人则数度产生轻生之念，欲一死了之。"},{"type":"paragraph","text":"针对这种充满血泪而又十分急迫的社会问题，西德巴登·符腾堡州于１９８７年底在首府斯图加特市设立了一个令人注目的“斯图加特妇女信息中心”，州政府每年资助该中心５万马克。"},{"type":"paragraph","text":"该中心的工作人员把这些女奴组织起来，定期会见她们，为她们开办德语培训班，帮助她们互相联系，并向她们提供内容广泛的有关法律、社会、就业、卫生、养育孩子等方面的咨询服务，以利于她们解决日常生活中碰到的各种困难，并考虑如何摆脱困境。"},{"type":"paragraph","text":"在１９８８年１年中，斯图加特妇女信息中心帮助了５０多名处于绝望中的妇女脱离了险境，并向其他２５０多名受害者提供了有助于改善她们处境的建议和信息。但巴登·符腾堡州迄今尚有不少人不知道有这样一个咨询中心，有的受害者虽然知道有这个中心，可是慑于各方面的压力，没有勇气去找那里的工作人员要求咨询。"},{"type":"paragraph","text":"自１９８９年初以来，西德各州及世界上一些国家越来越多的妇女组织、社会团体和各界人士纷纷写信、打电话、发电报或派人去了解这个咨询中心以科学态度处理问题的经验，以及该中心在实际工作中遇到的形形色色的问题。"},{"type":"paragraph","text":"卢嘉祥"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2b64054149"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
