script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"拙劣的反扑","authors":[],"dates":[{"year":1978,"month":11,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"拙劣的反扑"},{"type":"paragraph","text":"十一月九日，塔斯社发表了一篇报道和一篇评论，还有苏联中央电视台的广播，大肆攻击邓小平副总理访问泰国时谴责苏越条约的讲话。当然，少不了越南的报刊和电台，也跟踪而至，掀起了一阵反扑的喧闹。"},{"type":"paragraph","text":"这是完全不出所料之事。苏联出于一种不可告人的迫切需要，匆促搞了一个名为“友好合作”、实为军事同盟的条约。但是，事与愿违，这一手不仅未能助长大小霸权主义的声威，反而激起国际舆论的强烈抨击，引起东南亚和亚洲以至全世界的疑虑不安。这叫做走上了反面。在这情况之下，邓副总理击中要害的讲话，特别使莫斯科和河内暴跳如雷，遭到它们倾巢而出的谩骂攻击，岂是偶然的吗？"},{"type":"paragraph","text":"但是，这一反扑，虽然势头汹汹，但因心虚理亏，显得有气无力。且看，无论是莫斯科的，还是河内的宣传家，都大骂邓副总理指出苏越条约带有军事性质，威胁亚洲、太平洋乃至世界的和平和安全的严正讲话，是什么“无稽之谈”。它们还列举条约的一些条文，加以“彻底驳倒”，硬说条约讲的是“关于和平友谊和平等国际合作的志向”。然而，条约明明有个条文，他们却不敢引用一下，更不敢置一词。这就是条约的第六条款，它明确记载：一旦双方中之一方成为“进攻的目标”，“缔约双方将立即进行相互协商，以消除这种威胁和采取相应的有效措施”。为什么它们对自己订的这个条文，不敢拿出来见见阳光，引用来作为“彻底驳倒”的根据呢？很清楚，因为这一条正是条约的要害，是条约不仅具有“军事同盟”性质，而且苏联企图利用它在亚洲和太平洋地区推行侵略扩张战略的铁证。"},{"type":"paragraph","text":"特别值得指出的是，邓副总理说的，正是国际舆论界的共同看法。邓副总理说：“国际舆论已明确指出，条约本身带有军事性质”。国际舆论还普遍指责苏联企图利用越南“代理人”建立“亚安体系”，因而这一条约将“给亚洲带来新的紧张因素”。难道这也都是“无稽之谈”吗？苏越当局怎么不敢碰一下国际舆论的强烈反应呢？塔斯社之流企图以攻击中国领导人的讲话，来转移国际舆论的视线，缓和国际舆论的不安，完全是痴心妄想。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e20f790696"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
