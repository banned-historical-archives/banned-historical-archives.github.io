script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"金日成主席和朝鲜党政代表团在南京参观访问受到热烈欢迎  邓小平、彭冲同志陪同贵宾参观长江大桥、无线电厂并观看文艺节目","authors":[],"dates":[{"year":1975,"month":4,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"金日成主席和朝鲜党政代表团在南京参观访问受到热烈欢迎"},{"type":"paragraph","text":"邓小平、彭冲同志陪同贵宾参观长江大桥、无线电厂并观看文艺节目"},{"type":"paragraph","text":"新华社南京一九七五年四月二十三日电　朝鲜劳动党中央委员会总书记、朝鲜民主主义人民共和国主席金日成同志和由他率领的朝鲜民主主义人民共和国党政代表团，在中共中央副主席、国务院副总理邓小平同志和中共江苏省委第一书记、江苏省革命委员会主任彭冲同志的陪同下，今天在南京进行了参观访问。朝鲜战友所到之处，受到群众的热烈欢迎。"},{"type":"paragraph","text":"上午，金日成主席等朝鲜同志由邓小平、彭冲同志陪同参观了南京长江大桥，观看了长江两岸的壮丽景色。当他们乘车来到大桥附近的码头时，周围的人民群众簇拥在江边码头热烈欢迎朝鲜战友。金日成主席等同志乘坐游艇沿着波浪滚滚的长江顺流而下，两岸的群众不断向他们招手致敬。朝鲜同志上岸以后，乘车来到大桥桥头堡平台时，聚集在桥上桥下的群众挥动着花环和花束，载歌载舞，向朝鲜同志表达中国人民的友好感情。金日成主席等朝鲜同志参观了大桥的公路桥和铁路桥。金日成主席非常高兴地漫步在长江大桥上，并和邓小平、彭冲等同志一起合影留念。参观结束时，金日成主席热烈祝贺中国工人阶级在毛泽东主席的领导下，坚持独立自主、自力更生的方针，在建造南京长江大桥中所取得的成绩。大桥管理处把一件贝雕工艺美术品——南京长江大桥赠送给金日成主席。金日成主席以朝鲜民主主义人民共和国党政代表团的名义，向大桥管理处赠送了锦旗，锦旗上写着：“朝鲜人民和中国人民之间永恒的战斗友谊和团结万岁！”"},{"type":"paragraph","text":"下午，金日成主席等朝鲜同志由邓小平、彭冲等同志陪同，来到南京无线电厂参观时，聚集在工厂大门和道路两旁的工人群众敲锣打鼓，热情高呼口号，欢迎朝鲜同志。这个工厂有不少工人和技术人员曾经访问过朝鲜，同朝鲜工人和技术人员一起工作，共同交流生产经验。曾经两次访问过朝鲜的一位技术员高兴地说，金日成主席今天来我们厂参观访问，给我们带来了朝鲜工人的深情厚谊，带来了朝鲜工人的胜利喜讯。金日成主席的亲临，是对我们的极大鼓舞和促进。在参观过程中，金日成主席等朝鲜同志仔细观看工人们的操作，询问生产情况，不断地向正在生产的工人群众鼓掌致意。"},{"type":"paragraph","text":"晚上，金日成主席等朝鲜同志由邓小平、彭冲同志陪同，观看了南京市红小兵演出的文艺节目。红小兵们怀着真挚的感情，用中国歌曲和朝鲜歌曲热情地歌颂了中国人民的伟大领袖毛主席和朝鲜人民的伟大领袖金日成主席。当一位六岁的男孩走上舞台，用月琶弹奏中国乐曲《三大纪律八项注意》和朝鲜乐曲《领袖的教导象太阳》时，场内响起了热烈的掌声。晚会以歌舞《中朝友谊花盛开》结束。金日成主席走上舞台向小朋友们表示热烈祝贺，并十分高兴地把弹奏月琶的男孩亲昵地抱在怀里。这时台上的欢呼声和台下的掌声响成一片。"},{"type":"paragraph","text":"今天陪同代表团参观和观看红小兵演出的，还有外交部部长乔冠华、中联部副部长申健和江苏省、中国人民解放军南京部队、南京市的负责人。"},{"type":"paragraph","text":"朝鲜民主主义人民共和国党政代表团团员金东奎、吴振宇、朴成哲、吴克列等同志，今天还参观了紫金山天文台。（附图片）"},{"type":"paragraph","text":"金日成主席和由他率领的朝鲜党政代表团，在邓小平同志陪同下，四月二十三日参观南京长江大桥。"},{"type":"paragraph","text":"新华社记者摄（传真照片）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"江苏文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ab5e53b865"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
