script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"树立依靠工人阶级思想工商界代表批判了资产阶级思想，并热烈要求改造。","authors":["徐宗群","朱鹤云","胡艺之"],"dates":[{"year":1951,"month":12,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"各区工商界的代表也批判了存在的资产阶级错误思想。老闸区工人与工商界代表首先批评与自我批评了工商界中一些不依靠工人阶级，不接受国营经济领导，以及暴利等错误思想。如南京东路鹤鸣鞋帽店资方不接受职工提出增产节约正确意见，任意浪费，甚至用电熨斗烘小孩尿布。福建中路三五○号资方，以本店名义用八亿元资金，向江西购货，不运到上海，运到别处去卖，不但抽短了本店资金，而且严重地逃了税。并有少数工商业者对职工检举了逃漏税，采取报复、歧视态度。有的还把依靠工人阶级曲解成依赖工人阶级，在本身困难时，就喊出依靠工人阶级，要求协力克服困难，甚至有吃了客户倒帐，要叫职工出面去解决。但是一等到营业好转，职工再提出民主改革改善营业方针时，就有问题了。有的以为职工拿了工资，当然要做工，谈不到依靠或领导。煤薪炭业中个别资方用十三万元一担的次货，充三十八万元的好货卖给客户。五金行业中，有以国货改充西洋货或以旧货充新货高价出卖，获取三分以上至两倍的暴利。有些工商业者不接受国家经济领导，敌视国营企业的发展。所有这些发言内容，都说明了工商界存在资产阶级思想，对国家实现工业化是起阻碍作用的。工人代表姚霖康，首先在会上检讨了过去职工兄弟帮助工商界改造与主动团结资方还不够，并保证今后要加强劳资团结，帮同资方进行思想改造。工商界代表汤蒂因发言中，指出了只有依靠工人阶级，服从国营经济领导，获取合法利润，才能有发展，才能进行增产节约。如南京东路三益绸缎局，由于劳方主动团结资方，把帐外资金一亿多转入帐内，并将大头、黄金、美钞卖去，充实资金，改善经营，营业额就增加百分之二百；绿宝钢笔厂与中国百货上海市公司签订了合同，销路增加，并获得了人民银行贷款的协助。朱杏荪代表着重提出工商界要做国家建设中的推动者，不能做障碍物。工商界代表沈雄霖听过姜区长报告及经叔平先生传达报告后，思想斗争了一夜，隔日当着职工指出了自己过去的错误，表示今后一定要依靠工人阶级。崔松泉代表批判了囤积居奇贪图暴利的错误思想，准备把隐藏的五十只表转入帐内。获得了全场热烈鼓掌。"},{"type":"paragraph","text":"徐汇区工商界决定在会后举办五六百人的学习班，学习马列主义与中国革命实践相结合的毛泽东思想。通过代表会，大家认识了依靠工人阶级的思想；如虹桥路民华电线厂资方，本来看不起工人阶级的力量，最近厂方接到一批定货，须在一月内交货，依照他们厂中的设备条件及生产情况是不能完成的，后来工人主动开动脑筋，订出了增产计划，增加了工作时间，结果提前四日完成。至此，资方认识了工人的创造力量，相信只要依靠工人阶级便可搞好生产。(徐宗群、朱鹤云、胡艺之、周云、许耀良、保少如)"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"aa2b07bc85"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
