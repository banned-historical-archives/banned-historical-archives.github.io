script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"西欧许多资产阶级报刊  反对美帝冒险政策  不满美帝拒绝我国和平建议","authors":[],"dates":[{"year":1951,"month":1,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"西欧许多资产阶级报刊"},{"type":"paragraph","text":"反对美帝冒险政策"},{"type":"paragraph","text":"不满美帝拒绝我国和平建议"},{"type":"paragraph","text":"【本报讯】据新华社讯：美国政府悍然拒绝我国政府关于和平解决朝鲜战争的公正建议，而企图扩大侵略的冒险行为，已在西欧各国统治集团中引起了强烈的不满。西欧许多报纸的评论，明显地反映了这种情绪。"},{"type":"paragraph","text":"英国《每日邮报》说：“艾奇逊没有等到中国的复文正式转来”，“就声明中国的反建议是美国政府和联合国所‘不能接受的’”。该报表示：“对这种极为重大的事情发表仓促的判断，并显然没有经过事先的商量便替别的国家说话，这至少是不平常的。”《旁观者》周刊也抱怨说：“艾奇逊竟如此卤莽地谴责中国的反建议为不能接受，这真是不幸的事。”而对于美国想胁迫美英集团国家立即诬指我国为“侵略者”的企图，该刊直率地主张“英国政府不要赞成这个行动”。泰晤士报忧虑地说：“联合国大会政治委员会对中国最近的照会，最好是不要急于采取任何轻率的决定。”曼彻斯特卫报认为“联合国决不要采取任何它的能力所不能实现的决定”。该报并埋怨美国说：“美国当前的缺点是，它太过分想用它实际上并未拥有的武力来支持正义（应该为侵略），而太少想到用外交来支持它。”《新政治家》周刊二十六日说：“葛罗斯及美国驻成功湖代表奥斯汀所发表的关于美国甚至不愿就台湾问题举行谈判的声明，是再令世人惊愕不过的了。”自由党的《新闻纪事报》二十六日抨击麦克阿瑟最近的发言。该报称：“正当半个世界希望找到与中国进行谈判的某种方法时，而麦克阿瑟却趁机大喊他要打得中国人头破血流。”《论坛》周刊主张英国不要与美国保持“虚伪”的团结，该刊说：“为着与美国的虚伪团结而牺牲智慧，乃是不幸的事。”"},{"type":"paragraph","text":"在法国，《自由射手》报惶恐地要求“杜鲁门不要牺牲远东的和平与欧洲甚为需要的休养时间，而谋取对台湾的长期战略上的控制，以及与蒋介石建立不可靠而且得不偿失的‘友谊’。”《费加罗报》更表示：美国应“慎重将事”，因为“对中国采取威胁强迫的措施，乃是一件甚为严重的事情。”"},{"type":"paragraph","text":"在意大利，据电通社报道，“各半官方报纸在评论中国致联合国的建议时，都表现了异乎寻常的谨慎。”连基督教民主党的《人民报》二十四日也不得不承认：中国最近的建议是为开辟和平前途“向前走了一步”。"},{"type":"paragraph","text":"反映着西欧各国统治集团意见的这些舆论，使得急于企图操纵联合国诬蔑中国为“侵略者”的美帝国主义大为困恼。合众社记者在作过“调查”以后自伦敦发出的电讯悲哀地承认：“欧洲最怕远东的战争，认为这种战争是吸收西方人力的‘无底洞’。”“西欧一切国家都力主‘慢慢来’，并说联合国采取决定必须谨慎。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"朝鲜战争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"753ce853ca"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
