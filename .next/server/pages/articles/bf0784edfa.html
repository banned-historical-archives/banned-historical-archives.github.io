" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji51","name":"毛泽东全集第51卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji51.pdf"],"article":{"title":"对外交部关于向美国友人等谈林彪问题的请示报告的批语","alias":"","parts":[{"type":"paragraph","text":"对外交部关于向美国友人等谈林彪\"问题的请示报告的批语2]"},{"type":"paragraph","text":"（1972年7月）"},{"type":"paragraph","text":"谁人问都应直告，不应躲躲闪闪。应发一个通知给国内各级党委和涉外人员及驻外使领馆。"},{"type":"paragraph","text":"[1]林彪，原任中共中央副主席、中央军委副主席。“文化大革命”中伙同陈伯达等组成反革命集团，并与江青反革命集团互相勾结、互相争夺，阴谋夺取党和国家最高领导权力。阴谋败露后，1971年9月13日乘飞机外逃，在蒙古温都尔汗坠机身亡。1973年8月中共中央通过决议，开除林彪的党籍。1981年中华人民共和国最高人民法院特别法庭确认他为反革命集团案主犯。"},{"type":"paragraph","text":"[2]这个批语写在外交部1972年7月1日给周恩来的报告上。报告中说，最近以来，有一些来我国访问的美国友人和美籍华裔友人，在同我方接触中，都曾打听林彪的问题。我方接待人员仍都予以回避，极易产生消极效果。建议可相机吹点风，即承认林有问题，但不谈具体情节。"}],"authors":["毛泽东"],"dates":[{"year":1972,"month":7}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":328,"page_end":328},"tags":[{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bf0784edfa"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
