script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"捷共号召二百万党员  向资产阶级残余坚决斗争  保证胜利地保卫社会主义","authors":[],"dates":[{"year":1949,"month":3,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"捷共号召二百万党员"},{"type":"paragraph","text":"向资产阶级残余坚决斗争"},{"type":"paragraph","text":"保证胜利地保卫社会主义"},{"type":"paragraph","text":"【新华社陕北七日电】电通社布拉格讯：“向资产阶级的残余，向不愿投降而继续力图使资本主义奴役制度复辟的反动分子进行艰苦的斗争”，这是三月四日捷克共产党中央机关报“红色权力”报刊登的捷共中央执委会告捷共二百万党员书的有力号召。这个告党员书强调指出：至今，每一件事情都指明，争取社会主义的斗争，事实上并不意味着剥削阶级与新的进步劳力之间的斗争有任何缓和。自从一九四八年二月以来，反动派失去了阵地，便改变了公开的政治斗争策略。反动派已转入地下，进行破坏、恐怖行动与谋报活动。“反动分子在其活动中，明目张胆地将其希望寄托在反对其国家与民族的战争上，寄托在帝国主义者所进行的战争上。”该告党员书宣称：反动派在战争方面的投机是徒劳无益的，因为和平的力量是比战争贩子的力量强大。为了保证胜利地保卫社会主义，必须对资产阶级的残余进行艰苦的斗争，必须加强与组织计划经济，需要改进国家机构，特别是军队及国家保安机关，以便使其成为反资本主义斗争中绝对可靠的工具。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3f77a3d6a1"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
