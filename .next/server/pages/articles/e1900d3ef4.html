<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"翻身农奴和奴隶组织起来引雪水开荒地  穷洛扎生产面貌大变人民生活大变","authors":[],"dates":[{"year":1964,"month":11,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"翻身农奴和奴隶组织起来引雪水开荒地"},{"type":"paragraph","text":"穷洛扎生产面貌大变人民生活大变"},{"type":"paragraph","text":"新华社拉萨电　过去以贫困闻名西藏的洛扎县，民主改革后生产得到迅速发展，人民生活不断改善。"},{"type":"paragraph","text":"今年，这个县的农业生产又获得丰收。秋收后全县平均每人有粮食六百斤左右，比民主改革初期增加了将近一倍，大部分农民家里都有了贮备粮。全县的牲畜也比民主改革时增加百分之三十二，许多过去终年见不到酥油的人，现在可以经常喝到酥油茶。"},{"type":"paragraph","text":"洛扎县地处喜马拉雅山脉东部的崇山峻岭中，境内山高谷深，交通很不方便。在许多地方，人们必须攀登天梯似的山道，或从架在万丈悬岩间的栈道上来往。过去西藏上层反动集团，常常把反抗它的农牧民流放到这里。那时，在封建农奴主的残酷压榨下，洛扎县人民十分贫困，全县三千户人家，就有两千三百多户缺吃少穿，一半人家靠乞讨度日。"},{"type":"paragraph","text":"西藏民主改革以后，这个县的翻身农奴和奴隶普遍组织了农业生产互助组。他们依靠集体力量，在高山悬岩上开凿了五百条渠道和将近三百个水池，引来雪水灌溉田地，改变了历史上水利条件较差的状况。最近两年，他们又使大部分低产地的土质得到改良，并开垦荒地，扩大了耕地面积。几年以前，这里的很多农民还没有藏犁等农具，翻地时用人工挖掘。现在，在人民政府帮助下，农民们全都使用上了铁质农具，很多互助组还使用新式步犁耕地。这样，使农业生产得到迅速发展。"},{"type":"paragraph","text":"随着生产发展，人民的生活不断改善。翻身农奴描述他们的生活变化说：过去是“蓬头垢面，汤库（揉糌粑的皮口袋）空空”；现在是“头光衣整，仓有余粮”。去年，这个县人民的购买力比一九五九年增长了五倍多。许多翻身农奴和奴隶家里，有了他们过去从未见过的热水瓶、搪瓷脸盆等用品，以前终年披着羊皮和赤脚的人，如今穿着胶鞋和绒衣绒裤。旧社会遗留下来的阴暗小屋，也正在被一批批新盖的房屋所代替。水乡的一百四十多户人家，去年就有八十多户盖了新房。崎岖山道都经过了整修或加宽，满载物资的汽车，可以一直开入境内。"},{"type":"paragraph","text":"由于人民生活改善和新建了医疗机构，民主改革后五年中，全县人口增长了百分之十以上。（附图片）"},{"type":"paragraph","text":"西藏林芝地区山沟里新建的小型水力发电站。"},{"type":"paragraph","text":"新华社记者　马鹏万摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e1900d3ef4"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
