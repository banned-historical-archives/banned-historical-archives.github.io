script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"比利时马列主义共产党《光明和被剥削者》周刊揭露  苏修支持朗诺集团，破坏柬人民的斗争","authors":[],"dates":[{"year":1973,"month":7,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"比利时马列主义共产党《光明和被剥削者》周刊揭露"},{"type":"paragraph","text":"苏修支持朗诺集团，破坏柬人民的斗争"},{"type":"paragraph","text":"新华社一九七三年七月十二日讯　布鲁塞尔消息：比利时马克思列宁主义共产党机关刊物《光明和被剥削者》周刊最近发表文章，揭露苏联修正主义领导集团支持柬埔寨朗诺集团、破坏柬埔寨人民的抗美救国斗争。"},{"type":"paragraph","text":"文章指出：“苏联修正主义者诬蔑柬埔寨人民进行的战争是‘兄弟间相互残杀’，其目的很明显是为了破坏柬埔寨人民的抗美救国斗争，使柬埔寨人民放下武器，以便维持朗诺集团摇摇欲坠的统治。”"},{"type":"paragraph","text":"文章说：“苏修在兜售柬埔寨问题的‘政治解决’时，实际上同美帝和朗诺集团合作，搞骗人的和平谈判，借此分裂柬埔寨爱国力量。”"},{"type":"paragraph","text":"文章指出，苏修直到现在仍拒绝承认领导柬埔寨人民进行斗争并且得到近四十个国家承认的柬埔寨王国民族团结政府，而保持同朗诺集团的外交关系，并且继续给这个集团以经济援助。"},{"type":"paragraph","text":"文章说，去年，苏修曾投票支持朗诺集团参加联合国教育、科学和文化组织的会议。不仅如此，最近他们竟然又给那些为困处金边的朗诺军队运送武器的船只保险。"},{"type":"paragraph","text":"文章指出：“苏修的所作所为绝不能使朗诺集团摆脱危险的处境。这种行径反而彻底暴露了克里姆林宫里那些随时随地都要自称为柬埔寨人民‘忠实朋友’的共产主义的叛徒的伪善面目。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a605b13be8"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
