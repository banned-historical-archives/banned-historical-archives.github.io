" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"谢富治王力在云南两级军区党委联席会议上的讲话","authors":["王力","谢富治"],"dates":[{"year":1967,"month":6,"day":29}],"is_range_date":false,"parts":[{"text":"谢富治王力在云南两级军区党委联席会议上的讲话","type":"title"},{"text":"谢富治王力","type":"authors"},{"text":"谢富治：","type":"paragraph"},{"text":"当前要把这个革命推向前进，革命到了一定的时候，革命群众组织占了优势时，要把文化大革命指向更深入的阶段和更高峰，只有把革命的队伍联合起来。在革命初期，要解决这个问题是不利的，甚至是有害的。现在要使革命前进，必须解决联合的问题。对两派处理不适当，会有很大危害。","type":"paragraph"},{"text":"王力：","type":"paragraph"},{"text":"自我批评的，主席就信任了，死不作自我批评的，主席就不能信任。","type":"paragraph"},{"text":"文化大革命中每一个重要口号都是毛主席提的，资本主义反革命复辟逆流有没有，毛主席也讲过，从上到下都有这样一种反革命复辟逆流，那时是二、三月。","type":"paragraph"},{"text":"四月二十日江青同志在北京市革命委员会成立大会上，根据主席的指示，提出了拥军爱民的口号，这在全国形势是一个转折，不再是青海问题、内蒙问题、四川问题……那样的形势了，拥军爱民是在新形势下的战略口号。红卫兵小将没有看到形势变化，所以还扭住什么“赵永夫”、“谭式人物”、“带枪的刘邓路线”。这不是一般的口号，是把文化大革命推向前进的口号。拥军是使革命小将懂得如何处理好对待军队的问题，采取什么态度，什么方法对待军队，推动文化大革命前进。只要我们领导上加以引导，是能够做到的。","type":"paragraph"},{"text":"毛主席为什么要发动这场文化大革命？一方面是因为这些坏家伙暴露出来了，根据苏联的教训，必须发动群众打倒他们，另一方面革命派过去受排挤、受打击， 这次文化大革命就是要把受压制打击的革命小将、中将、老将解放出来。如果不发动这场文化大革命，我们就要被这些人打倒，被关进监狱里去，被整黑材料打成反革命，被杀头。同志们我们要有鲜明的爱和憎，因此，凡是反对刘、邓、陶、李、阎的，就要保护他们，谁伤害他们都不允许，一定要有鲜明的爱和憎。这次我们工作团，毛主席说一定要组织小将参加，不管做什么事都要体现这个方针，凡是反对刘、邓、陶、李、阎的，揭发他们的人，要重用。不要有框框，不要受年龄、资格、级别的限制。我们的年龄大了，总要有人接班，对革命小将，要大胆使用，要教育，培养他们，这是毛主席的思想。红卫兵现在当省委书记不行，当大学校长也不行，要有个成长的过程，要好好培养他们，对他们的缺点要批评，但不能伤害他们。","type":"paragraph"},{"text":"毛主席再三说凡是站到革命方面反对革命的敌人的，要受到支持。那怕是躲在床底下把他拉出来，他要革命就要他，革两年就不革了也要。这样的话我们听毛主席说过五、六次了，相信和依靠开展的大多数在二十三条里边也就提了，是与刘少奇斗争的重要内容之一，是同刘少奇一直作斗争的一个重要问题。","type":"paragraph"},{"text":"谢富治：","type":"paragraph"},{"text":"这三天时间工作很顺利，包括小将们对昆明两派的工作做得很好。这是毛泽东思想的威力，是革命小将的努力。","type":"paragraph"},{"text":"我们这次来昆明，是伟大领袖毛主席叫我们来的。主席教导我们：可能解决，也可能不解决,可能搞对了，也可能搞错了，解决错了也不要紧，今天的会议是一个好的开端，希望能够解决。首先要搞清革什么命，应当经常讲，反复地讲，要这么做。这场史无前例的文化大革命，是革谁的命？是革最大的走资本主义道路的当权派到党内一小撮走资本主义道路的当权派的命，具体地说就是：刘邓陶李阎。对这些人，你们揭露的很不彻底，没有几张大字报，这是我讲的第一个问题。","type":"paragraph"},{"text":"第二、当前要把这个革命推向前进。革命到了一定的时候，革命群众组织占了优势时，要把文化大革命推向更深入的阶段和更高峰，只有把革命的队伍联合起来，在革命初期，要解决这个问题是不利的，甚至是有害的，现在要使革命前进必须解决联合的问题。对两派处理不适当，会有很大危害。","type":"paragraph"},{"text":"第三、团结多数，公开发表毛主席《关于正确处理人民内部矛盾的问题》不是一般著作的发表。正确处理人民内部矛盾，在当前是最重要的问题。主席的这篇著作，总的是讲团结大多数的问题。主席去年对红卫兵的批示中就引用过马克思的话：无产阶级要解放自己，首先要解放全人类。他们就忘记了这一条，只记住什么黑五类，红五类。什么打砸抢。","type":"paragraph"},{"text":"今天这个会是个好的开端，这个空气要加以提倡。军管的时间不能太长了，要有利于促进革命。","type":"paragraph"},{"text":"（此系记录稿，未经本人审阅。）","type":"paragraph"},{"text":"","type":"appellation"}],"comments":[],"origin":"云南八·二三《风展红旗》编  《毛主席无限关怀云南人民──中央和中央首长对云南无产阶级文化大革命的指示》；1967年7月21日红代会清华井冈山一部第三动态组编《动态》第102期。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"谢富治","type":"人物"},{"name":"王力","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"云南文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"人民内部矛盾","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8e7a014038"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
