script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反对垄断资本的残酷剥削美国通用电气公司十五万工人大罢工意大利彼萨市群众愤怒示威抗议法西斯分子的罪恶活动","authors":[],"dates":[{"year":1969,"month":10,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京二十七日电　纽约消息:美国通用电气公司的十五万多工人，二十七日凌晨开始举行大罢工，反对垄断资本的残酷剥削，要求增加工资。这次罢工使得通用电气公司分布在美国一百三十多个城市的许多工厂的生产受到严重影响。"},{"type":"paragraph","text":"通用电气公司是美国最大的军火垄断企业之一。它在国内外雇用四十多万职工，其中在美国国内有三十一万左右。这家公司为美国政府大量制造军用飞机、导弹、雷达、核反应堆等武器和装备。通用电气公司工人的大罢工，给予美帝国主义以沉重的打击。美国资产阶级通讯社惊呼，这是“尼克松政府上台以来最大的罢工”，并表示担心这次罢工会进一步扩大和发展。"},{"type":"paragraph","text":"新华社北京二十七日电　罗马消息:意大利彼萨市的进步青年和广大市民，二十五日包围了意大利新法西斯党的党部，愤怒抗议法西斯分子的罪恶活动。示威者同前来镇压群众的反动警察进行了持续八个小时的英勇搏斗。"},{"type":"paragraph","text":"意大利的新法西斯党——意大利社会运动，在意大利统治集团的扶植和庇护下，最近日益猖獗。二十五日，五个法西斯党的打手公然在彼萨市大街上毒打两位反法西斯的学生。这一暴行激起了公愤。数百名彼萨市的市民迅速包围了新法西斯党的党部，勒令他们交出躲在里面的打人凶手。意大利反动当局悍然派遣大批警察保护新法西斯党，并使用棍棒和催泪弹残暴镇压示威群众。"},{"type":"paragraph","text":"彼萨市人民推倒汽车筑起街垒，挖起铺路的石头，并使用自制燃烧瓶，英勇地进行还击。斗争从新法西斯党党部门前迅速扩大到彼萨市中心的许多街道和广场，数千名市民参加了斗争，从二十五日傍晚七时坚持到二十六日凌晨三时。他们把当地的警察和反动当局从佛罗伦萨、波伦亚等地紧急调来增援的警察打得落花流水。"},{"type":"paragraph","text":"二十五日，在意大利首都罗马，大批学生和市民支持三十名无家可归的妇女占领了一所房子。他们同前来镇压的警察也进行了搏斗。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"da133efe2d"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
