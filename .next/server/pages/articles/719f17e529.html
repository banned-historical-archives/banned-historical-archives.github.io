script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji11","name":"毛泽东全集第11卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji11.pdf"],"article":{"title":"关于敌情判断及八路军的战略部署","alias":"","parts":[{"type":"paragraph","text":"关于敌情判断及八路军的战略部署"},{"type":"paragraph","text":"（1937年9月17日）朱、彭、任，林、聂，贺、萧，刘、徐\"："},{"type":"paragraph","text":"关于情况判断及战略部署问题："},{"type":"paragraph","text":"甲、判断敌攻华北大约分为四路，总兵力约十五万至二十万人。一路山东，现未出动。又一路津浦线，约一个半师团，现攻至马厂。又一路平汉线，约一个师团，现在涿州以北未动。又一路平绥、同蒲线，约三个师团，为其主力，以大迁回姿势，企图夺取太原，威胁平汉线中央军而最后击破之，夺取黄河以北。以此姿势，威胁河南、山东之背，而利于最后夺取山东，完成其夺取华北五省之企图。其总的战略方针，是采取右翼迁回。至于上海进兵，于破坏中国经济命脉外，又钳制中央军之主力，以便利其夺取"},{"type":"paragraph","text":"[1]朱、彭、任，指朱德、彭德怀和任弼时，当时分别任八路军总司令、副总司令和政治部主任。林、聂，指林彪、聂荣臻，当时分别任八路军第一一五师师长和副师长。贺、萧，指贺龙、萧克，当时分别任八路军第一二〇师师长和副师长。刘，指刘伯承，当时任八路军第一二九师师长。徐，指徐向前（1901—1990)，山西五台人，当时任八路军第一二九师副师长。"},{"type":"paragraph","text":"[2]当时日军进攻华北的主力系沿平汉铁路南下和由滏阳河迁回平汉铁路的六个师团。沿平绥铁路、同蒲铁路西进、南下的日军不是主力。"},{"type":"paragraph","text":"[3]华北五省，指当时中国华北地区的河北、察哈尔（今分属河北、山西两省）、绥远（今属内蒙古自治区）、山东、山西五省。华北。以上是对日寇第一期作战计划之基本判断。"},{"type":"paragraph","text":"乙、日寇右翼之主力，又分为三路，均以追击姿势前进。一路沿平绥东段、同蒲北段攻雁门关，判断约一师团，占大同后现未动。一路由天镇占广灵后，向灵丘、平型关进攻，系向晋绥军行右翼迁回。一路由张家口占蔚县后，有攻涞源之势，系向卫立煌\"军及紫荆关部队行左翼迁回。此两路判断系组成联合兵团，至少两师团，以第一步中央突破之姿势达成其第二步分向两翼迁回之目的。"},{"type":"paragraph","text":"丙、蒋以卫立煌军处于敌之包围中，令其向平汉线撤退。阎3"},{"type":"paragraph","text":"liem等盘一力, 以便剂其事取 地,雄导间之天除格 正反中,即慎察一蛋微 索南乏大行文密酶由独中。发朱彭仕林最贺阅综"},{"type":"paragraph","text":"批致"},{"type":"paragraph","text":"担玫化太原之情况下）依情况决定适曾慢置。"},{"type":"paragraph","text":"又基本判断。"},{"type":"paragraph","text":"No...."},{"type":"paragraph","text":"No鞋No"},{"type":"paragraph","text":"九三上九月十句3.均以盘辈姿式前单平、五台孟如慨"},{"type":"paragraph","text":"，判齿;约一师田此公路，致有出一枝上展南水主动地位。即营电妆。内容"},{"type":"paragraph","text":"--"},{"type":"paragraph","text":"灵俊，向是乓平型收山山成所法改平森系真继缕南下，搜助落朱彭任协摄贺阅刻徐："},{"type":"paragraph","text":"毛泽"},{"type":"paragraph","text":"即强受理物生边，此究已为执行独立自主的山故湖阅旅情观龄及略部弱商题："},{"type":"paragraph","text":"，您些游掌相把地。"},{"type":"paragraph","text":"十畔"},{"type":"paragraph","text":"离行治应。甲引萄政体此大，的要，一多中均文要二十等人。一路山东，现示出洛津涌线，约一们圆头目的。"},{"type":"paragraph","text":"此求车破滚致人战行\u003e半因，现马败。又一路平赞的，的一间郎国现不欲，个对向平容疾故"},{"type":"paragraph","text":"从"},{"type":"paragraph","text":"螺命，焊洲以此未动。 又一监平越间消线,的三的部因,选发主力m相固本例岛状 1成龄的次关作后,但“学以地民况。成大运同受式，会国取大原，减甲获线平而线可很心，支持游容些的发，或益计。跟被要动人，承我业，尿点格，感多所，会、只会"},{"type":"paragraph","text":"32其决方身，是乐要国，另禁上海终安，为我衣，为期了。选如依原能其学雄，用岸"},{"type":"paragraph","text":"--.19.."},{"type":"paragraph","text":"1937年9月17日，毛泽东根据华北形势变化，为保持战略上的主动，发出变更八路军战略部署的指示。"},{"type":"paragraph","text":"[1]卫立煌（1897—1960)，安徽合肥人。当时任国民党军第十四集团军总司令。"},{"type":"paragraph","text":"[2]蒋，指蒋介石。[3]阎，指阎锡山，当时任国民党军第二战区司令长官。以灵丘为山西生命线，拟集中十四个团在平型关以北举行决战。判断如决战胜利，则敌之南进可稍延缓，但必增兵猛攻。如决战失败，敌必速攻平型关、雁门关，待后路预备兵团到达后，主力直下太原，使绥远西境之晋绥军、恒山山脉南段五台等处之各军、平汉北段之各军，均不得不自行撤退，彼可不战而得上述各地，娘子关之天险亦失其作用。"},{"type":"paragraph","text":"丁、涞源、灵丘为敌必争之地。阜平、五台、孟县如无南北公路，或可暂时不被敌占；如有南北公路，敌有出一支向南切断正太路之可能。不论如何，恒山山脉必为敌军夺取冀、察、普三省之战略中枢，向此中枢出动主力，此点已为浑源、蔚县、广灵之被占所证明。"},{"type":"paragraph","text":"戊、普阎指挥下之傅、杨、刘、汤各军均失锐气，使我们不能作出这些军队能够在现阵地根本破坏敌人战略计划之结论。"},{"type":"paragraph","text":"己、红军此时是支队性质，不起决战的决定作用。但如部署得当，能起在华北（主要在山西）支持游击战争的决定作用。"},{"type":"paragraph","text":"庚、过去决定红军全部在恒山山脉创造游击根据地的计划，在上述敌我情况下，已根本上不适用了。此时如依原计划执行，将全部处于敌之战略大迁回中，即使第二步撤向太行山脉，亦在其大迁回中（设想敌占太原之情况下），将完全陷入被动地位。"},{"type":"paragraph","text":"[1]傅，指傅作义（1895一1974)，山西临猗人，当时任国民党军第七集团军总司令兼第三十五军军长。杨，指杨爱源（1888一1959），山西五台人，当时任国民党军第三十四军军长。刘，指刘茂恩（1894—1981），河南巩义人，当时任国民党军第十三军团军团长兼第十五军军长。汤，指汤恩伯(1900—1954)，浙江武义人，当时任国民党军第七集团军前敌总指挥兼第十三军军长。"},{"type":"paragraph","text":"辛、依上述情况及判断，为战略上展开于机动地位，即展开于敌之翼侧，钳制敌之进攻太原与继续南下，援助晋绥军使之不过于损失力量，为真正进行独立自主的山地游击战，为广泛发动群众，组织义勇军，创造游击根据地，支持华北游击战争，并为扩大红军本身起见，拟变更原定部署，采取如下之战略部署：（一）我二方面军\"应集结于太原以北之忻县待命，准备在取得阎之同意下，转至晋西北管岑山脉地区活动。（二）我四方面军在外交问题解决后，或在适当时机，进至吕梁山脉活动。（三）我一方面军?则以自觉的被动姿势，现时进入恒山山脉南段活动，如敌南进，而友军又未能将其击退，则准备依情况逐渐南移，展开于晋东南之太行、太岳两山脉中。（四）总部进至太原附近，依情况决定适当位置。"},{"type":"paragraph","text":"王、你们意见如何？请考虑电复。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十七日午[1]指八路军第一二○师。[2]指八路军第一二九师。"},{"type":"paragraph","text":"[3]指国共谈判中中国共产党要求国民党发表《中共中央为公布国共合作宣言》，承认中国共产党的合法地位。当时，党内曾将同国民党谈判称为外交问题。"},{"type":"paragraph","text":"[4]指八路军第--一五师。"}],"authors":["毛泽东"],"dates":[{"year":1937,"month":9,"day":17}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":153,"page_end":156},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"719f17e529"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
