" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji28","name":"毛泽东全集第28卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji28.pdf"],"article":{"title":"同意刘亚楼等关于各地机场修复问题的报告","alias":"","parts":[{"type":"paragraph","text":"同意刘亚楼等关于各地机场"},{"type":"paragraph","text":"修复问题的报告"},{"type":"paragraph","text":"（1949年12月5日）华东局及华东军区，华北局及华北军区，华中局及华中军区，西北局及西北军区，东北局及东北军区，并告政务院周总理，中财委陈、薄及空司刘、常、王、王诸同志："},{"type":"paragraph","text":"据空军司令刘亚楼等同志十一月二十八日电称：（一）空军司令部刚刚成立，暂时无法照顾到筹划全国各地机场建设的总预算。但我们认为，全国各军区及各级政府，目前主要应该是派定专人保护和管理各地现有机场及其现有设备，做到不再被破坏或偷窃；同时，可进行各地方本身所能负担之经费和人力（可动员一部分部队参加）范围内的修理工作。至于各地机场大的修复工作，由于目前国家经济困难，除华东外，可以暂缓一步，待空军司令部有力量来整个筹划这件事情时，提出计划，经军委批准后，再来进行。否则，必然形成无政府状态。（二）华东范围，则有不同之处，因那里需准备执行战斗任务。但也并不是在华东地区的所有机场，都要立"},{"type":"paragraph","text":"[1]陈、薄，指陈云、薄一波，当时分别任政务院财政经济委员会主任和副主任。"},{"type":"paragraph","text":"[2]刘、常、王、王，指刘亚楼、常乾坤、王弼、王秉璋，当时分别任空军司令员、副司令员、副政治委员和参谋长。"},{"type":"paragraph","text":"同意刘亚楼等关于各地机场修复问题的报告即修理（如苏北就可以暂缓），而是首先修复与行将执行的战斗任务有关联的机场。其修建程度，亦可限于为执行战斗任务所需要的范围，以免经费开支过大。这种修复计划，据华东军区司令部航空处报告，他们已经制就，并已向三野前委请示。在目前空军司令部无力量来审核这种预算的情形下，提议由空军司令部审核某地机场是否立即开始修理，而修理经费则由三野前委指定后勤机关审核之，然后报告军委批准之。（三）以上处理方法，如认为适当，请军委通知各军区及我们遵照执行，并告中财委等语。我们同意此种办法。请华东军区及各军区即照此办理，请中财委即照此支付必不可少的一部分经费而拒绝支付一切可以减省的经费。"},{"type":"paragraph","text":"中央军委主席毛泽东一九四九年十二月五日"}],"authors":["毛泽东"],"dates":[{"year":1949,"month":12,"day":5}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":78,"page_end":79},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3611fee99d"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
