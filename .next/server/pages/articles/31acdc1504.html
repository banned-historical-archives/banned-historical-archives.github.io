<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"确定地主、富农成份时　计算剥削年限与剥削分量究以什么为标准？","authors":[],"dates":[{"year":1948,"month":9,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"确定地主、富农成份时"},{"type":"paragraph","text":"计算剥削年限与剥削分量究以什么为标准？"},{"type":"paragraph","text":"问：我们在审订成份中，遇到两个问题不能解决，一个是地主、富农的剥削年限问题，一个是富农的剥削分量问题。关于前一问题，一九三三年文件中规定以革命政权建立时为起点，向上推算，凡连续过地主、富农生活满三年者即构成地主、富农成份；而任弼时同志报告中则规定在老解放区内，民主政权建立后，地主劳动连续满五年、富农不剥削连续满三年者即可改变成份。关于后一问题，一九三三年文件中规定“其剥削分量超过其全家一年总收入的百分之十五者，叫做富农。”而任弼时同志报告中，则规定其剥削收入要超过其收入百分之廿五者才算富农。以上两个问题，在老解放区究应依从那个文件？又富农的剥削分量，怎样具体计算？是否应从其总收入中扣除雇工的伙食、工资？"},{"type":"paragraph","text":"答：关于“究应依从哪个文件”的问题，今年中央重新公布一九三三年两个文件时，并发表了“关于一九三三年的两个文件的决定”，印在两个文件前面，其中即曾明白指出：“这两个文件中没有讲到的问题及关于富农和中农分界的问题，则应以中央发表的其他文件及任弼时同志在一九四八年一月十二日所作‘土地改革中的几个问题’的讲演中所说者为准。”加上这样补充以后的一九三三年文件，就是划分阶级的正确标准。"},{"type":"paragraph","text":"关于剥削年限问题。一九三三年的决定，规定以革命政权成立时为起点，向上推算，连续三年做为划分阶级的时间标准，这是确定某人在革命政权成立时是否地主或富农成份的时间标准；弼时同志报告中说，在民主政权下地主劳动五年、富农取消剥削三年者改变其成份，这是根据三三年决定，当革命政权建立时，原是地主富农，但在民主政权上，由于我党历年来合理负担、减租减息等政策之执行或其他原因而下降为农民，地主满五年，富农满三年者，即应改变其成份。这两个规定并无矛盾，三三年决定规定的为构成成份的年限，弼时同志报告中规定的是改变成份的年限，后者正是前者的补充。假定革命政权成立于一九三八年初，某人在一九三五、三六、三七三年，连续过地主生活或每年的剥削收入均超过其总收入百分之二十五（三三年规定的百分之十五，照弼时同志报告改为二十五），则此人已构成地主或富农成份；但如此人自一九三八年以后，无论从何年起自己从事劳动，不再剥削别人已满五年者，即应由地主改为农民，或此人原为旧式富农，如取消其剥削已满三年者，即应由富农改为农民。"},{"type":"paragraph","text":"关于剥削分量问题。应一律依照弼时同志的报告，以百分之廿五为富农与富裕中农的界限。至于对雇用雇农的农民之剥削分量的计算方法，则是从雇农的生产物中扣除工资和食粮（其余不扣），看其盈余是否超过此雇主的总收入的百分之二十五，如超过则为富农，不超过（或刚好等于）则为富裕中农。假定某农民自己劳动，也雇人劳动，全年总收入是一百石，假定雇农的生产物是六十石，雇农的工资、伙食合三十石，从六十石中减去三十石，尚余三十石，超过其总收入一百石的百分之二十五，此农民应定为富农。如上例，总收入为一百石，若雇农生产物为五十石，雇农的工资、伙食合二十五石或比二十五石还多，从五十石中减去二十五石或二十五石多，尚余二十五石或不到二十五石，仅占其总收入一百石的百分之二十五或不足二十五，此农民应定为富裕中农。"},{"type":"paragraph","text":"【新华社陕北三十一日电】"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"31acdc1504"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
