script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反对垄断资本的残酷压迫和剥削意大利工人纷纷罢工","authors":[],"dates":[{"year":1970,"month":1,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京十日电　罗马消息:意大利各行各业的工人自新年以来掀起一次又一次的罢工斗争浪潮，反对垄断资本的残酷压迫和剥削，要求改善工作条件和增加工资。"},{"type":"paragraph","text":"在意大利第二大城米兰的“皮雷利”橡胶托拉斯的一万二千名工人九日举行罢工，抗议反动警察镇压工人。在罗马附近的拉蒂纳，工人从八日起占领了一家美国资本控制的“可口可乐”工厂，抗议无故解雇工人。"},{"type":"paragraph","text":"新年以来，意大利交通运输工人已接连两次举行了全国性的罢工。九日，意大利全国九万名交通运输工人再次举行罢工，使得意大利各大城市的交通运输陷入瘫痪状态。罢工工人宣布:如果他们提出的增加工资、缩短工时、改善工作条件等要求得不到满足，他们将在今后几天内加强斗争。此外，私营瓦斯输送企业的工人，在七日也举行了全国总罢工。这次罢工严重影响到罗马、米兰、那不勒斯、都灵等主要城市。"},{"type":"paragraph","text":"与此同时，意大利七万名面粉工人八日也举行了全国性罢工。意大利“红十字会”的工人八日也开始举行为期三天的全国罢工。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"66822e8c02"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
