<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"右派言论——“团支书是特权阶级中的特权分子”","authors":["南开大学","邱文治"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"右派言论——“团支书是特权阶级中的特权分子”","type":"title"},{"text":"南开大学邱文治","type":"authors"},{"text":"[邱文治：南开大学中文系学生]","type":"subtitle"},{"text":"我害怕生活斗争，不愿意过严肃的政治生活，逃避现实，专在十九世纪的小说中寻找一些对生活冷淡，消沉的人物形象；来陪衬自己忧郁与无望的悲哀和情绪，让自己躺在虚无渺漂的幻想中，认为生活是无限美好的。可是对于我却只是为了我的苦恼与不幸而存在的。","type":"paragraph"},{"text":"这是一次民主革命运动，（按指右派向党的猖狂进攻。）这是民主精神革三害的命。民主万岁！（这是邱在宿舍喊的口号，声称是对团支书的示威。）我们的社会主义是三害的绝对统治，三害是制度的产物，中国是半殖民地半封建社会，个性不够充分发展，中国没有资本主义，因此，对人的个性重视不够，这次运动也就是要求解放个性的精神革命。","type":"paragraph"},{"text":"团支书是特权阶级中的特权分子，是党的骄子，群众的暴君。","type":"paragraph"},{"text":"社会主义之火燃烧吧！打倒棍棒主义，（此乃邱未贴出的大字报。）","type":"paragraph"},{"text":"跟着党走，总不会错，但有时困难很多；要低声下气，要唯唯诺诺不过总得要学会它，要学会生活。","type":"paragraph"},{"text":"我每天看报，弄得我思想根模糊，我不敢去独立思考了。现在压歪风让正气上升，这当然必要，但也有副作用，如果开始时作得好，领导上不被动，不放弃领导，这种副作用就可以消除。","type":"paragraph"},{"text":"我现在正在对整个生活作新的探索，思想上很苦闷。很可能要回到二年前的那样心境中去。（摘自邱六月十八日给吴云的信。）","type":"paragraph"},{"text":"生活是无情的，在现时代，任何人都不能避免受冲击，弱者倒下去，强者生存，“人生本来是一场无止无息的斗争”么！但可怜的是我们这些神经衰弱患者罢了。过去的什么也忘不了，现在的又适应不进去，因此，对于将来更不敢向往。雷井桂所说的忧郁病——知识分子病，恐怕也不外乎这些吧！","type":"paragraph"},{"text":"在这充满斗争（社会的、政治的、道德的、心理的斗争，）急剧奔驰的新中国，要想避开流弹的袭击，以为把脑袋钻在古书生活中就是万事大吉，这岂非自欺欺人的天真想法吗？你太书生气了，生活是铁面无情的。","type":"paragraph"},{"text":"我们当时虽做得很客气，可是那些习惯于训斥别人的人，对我怎么能善罢干休呢？不过，我定据理以辩的。","type":"paragraph"},{"text":"我现在精神上正走向严重的分裂，变好呢？还是变坏？我不知道。反正是彷徨中途，上下求索罢了。（摘自邱七月十日给吴云的信）","type":"paragraph"},{"text":"你太懦弱，无能，主动的想改是有意的在解除自己精神上对天性中的敌人抗争的能力。清醒一些，看看现实，想想未来，作一个实现“人”这称号的人。要是像那些可怜而贫弱的生灵，孤零零的在世界上流离失所，眼看肉体枯萎焦悴，内心永远是无边的黑暗，从不发出一缕生命的火焰，那不是太可怜了吗？要是像那些无任何追求的灵魂，虽然满载着生命的爱情，也不过只像一株春天挂满花朵的树，社会尽管给它光荣和幸福，也只是点缀一具行尸走肉罢了。（摘自给吴云的信）","type":"paragraph"}],"comments":[],"origin":"《南开大学右派反动言论选集》（天津：南开大学社会主义思想教育教研室，1957年9月）。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6de77aee77"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
