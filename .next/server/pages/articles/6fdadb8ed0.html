script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"在专机离开我国的时候卡翁达总统电谢毛主席","authors":[],"dates":[{"year":1967,"month":6,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京25日电　毛主席二十五日收到卡翁达总统离开中国时在飞机上发来的电报，全文如下:"},{"type":"paragraph","text":"北京"},{"type":"paragraph","text":"毛泽东主席:"},{"type":"paragraph","text":"我刚刚结束的历史性的访问是成功的，富有成果的。雄伟的北京城的市民所给予我们的接待以及贵国政府和中华人民共和国人民的盛情款待，这些愉快的记忆将永远铭记在我们心上。愿我们的成就能够经受住未来的考验。请向总理和政府转达我对他们所作的一切的热诚和兄弟般的感激之情，我对上海的热情接待也十分感谢。"},{"type":"paragraph","text":"中赞友谊万岁!"},{"type":"paragraph","text":"赞比亚共和国总统肯·戴·卡翁达"},{"type":"paragraph","text":"一九六七年六月二十五日"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6fdadb8ed0"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
