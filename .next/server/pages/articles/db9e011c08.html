<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"回忆","authors":["姚文元"],"dates":[{"year":1956,"month":12,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"姚文元"},{"type":"paragraph","text":"回忆可以使坚强的人更坚强，回忆可以使脆弱的人更脆弱；回忆可以使懒惰的人变得很骄傲，回忆也可以使勤奋的人变得勇敢。"},{"type":"paragraph","text":"混混沌沌地过日子的人，是不需要回忆的，过去对于他只是一阵灰黑色的雾；自私的人是没有回忆的，过去对于他只是一只喝干了的酒杯。但是脚踏实地为着自己的理想和人类的理想在祖国的大地上生活过来的每一个人，他们都是有回忆的，因为过去凝结着他一部分战斗的生命。在过去的日子里，有对朋友的爱和对敌人的恨，有胜利的欢乐和失败的苦痛，有斗争的风暴和劳动的热潮。当他走完了一段路，在里程碑旁揩抹汗水的时候，是带着多么激动的心情回过头去看一看自己所走过的路程呵!他从回忆中汲取力量，更坚定的向前走去。他的脚迹更深的印刻在大地上，他对过去的回忆也同走向未来的足印溶化在一起，超越过时间的雨雪而永存于集体的事业中……。"},{"type":"paragraph","text":"回顾过去所走的弯路，可使今后的道路更加正确；回忆过去的错误，可以从错误中汲取教训。但是对于软弱的人，回忆也可以变成压在他脚上的石头，会使他的脚步变得非常迟缓、非常沉重；对于忘掉自己理想的人，回忆可以变成一堵石墙，阻挡住他的前进。因爱情的痛苦在回忆中消磨了自己的精力；因个人的欲望在回忆中产生了怨恨；因过去的功劳在回忆中变成狂妄；因自己的错误在回忆中变得消极。……这些悲剧，在我们的生活中不是时常见到的么?"},{"type":"paragraph","text":"夜是这样的静，四周的一切都仿佛睡着了，只有手表滴答滴答的声音在快要凝结的空气中震荡。过去的生活像长卷似的在我眼前展开，战斗的伙伴们的身影一个接一个在我眼前掠过，他们的音容笑貌宛然依旧。……我立刻感到惭愧了，比起他们所做的来，我做得多么少呵!他们忠恳地向我提出过的意见，现在成了一面镜子，我在这镜子中照见自己的进步，也照见自己的毛病和错误，我感到有一股激流在心房中涌过。……"},{"type":"paragraph","text":"我想把心房中的激流传达到纸上，写一支回忆之歌。可是当我眼光落到稿纸上时，却看不见自己心中的激流了，见到的只是一些拙劣的句子，排列成拙劣的文章。"},{"type":"paragraph","text":"但我还是竭力寻觅词汇，来表达我的心意:愿每一个人都把回忆当作发动机，振奋起自己所有的潜力；愿每一个人都不把回忆当作砂土，掩埋住自己创造的理想；愿每一个人都以今天的努力，来创造明天的回忆；愿未来变成现在的时候，每个人都能无愧的回首过去!"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"姚文元","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"db9e011c08"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
