script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"阳高煤炭供销合作社  大量供应群众烧煤  减少中间剥削受到群众拥护","authors":[],"dates":[{"year":1950,"month":4,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"阳高煤炭供销合作社"},{"type":"paragraph","text":"大量供应群众烧煤"},{"type":"paragraph","text":"减少中间剥削受到群众拥护"},{"type":"paragraph","text":"【本报讯】据察哈尔日报三月二十八日讯：阳高县供销社组织煤炭供销社，大量廉价供应群众烧煤，得到群众拥护，社员与资金增加一倍半，现正计划扩展中。阳高群众的烧炭过去完全靠向煤贩子购买，中间剥削有时竟超过原价二分之一以上。乡村交通不便，煤价更高。向煤商买炭，起码得买一百五十斤的大块（怕碰碎损耗煤渣）大部群众买不起。群众迫切要求解决煤炭问题。阳高供销社，于去年七月便把城内金道街的煤炭供销社扩大为区社。由银行贷款三十万元，并动员县城附近各村群众入股扩大资金。一开始，即吸收了二千多个社员，共集米一万斤。该社并努力加速周转以保证群众烧炭的供给，煤价掌握薄利多销原则，价格较低。如私商每斤煤卖价十四元，该社售给非社员时卖价每斤才十二元五，群众感到很满意，纷纷要求入股。今年一月，该社又根据经济条件，规定只卖给社员煤炭。这不但杜绝了少数非社员从社内贱价买、高价卖的投机行为，也刺激了一部分“嫌入股不自由”的非社员主动入起股来。为照顾群众购买力低的情况，规定每个社员每月在一百斤煤的范围内可以随时购买，颇受社员拥护。现该社营业极为繁盛，共拥有社员五千多人。从去年七月到现在已售出炭一万七千七百余吨，冬季每天平均出售达五万斤，供给了社员足够的燃料，减少了煤商苛重的剥削。今年三月后，县社认为该社已具有供给全县群众燃料的条件，决定把该社改为阳高县煤炭供销社。但因现在农村社员很少，有些村的群众还不知道或不了解该社的好处。县供销社正配合各部门下乡干部作广泛宣传，大量吸收农村社员。并计划通过区社售炭给乡村社员，给群众烧炭以很大方便。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ef7ab53bb9"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
