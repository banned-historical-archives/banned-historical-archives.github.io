script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"驻西安石油学院工宣队牢记毛主席的教导  在斗争中不断提高自己的政治觉悟","authors":[],"dates":[{"year":1969,"month":7,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"驻西安石油学院工宣队牢记毛主席的教导"},{"type":"paragraph","text":"在斗争中不断提高自己的政治觉悟"},{"type":"paragraph","text":"据新华社西安二十六日电　驻西安石油学院工人毛泽东思想宣传队遵照伟大领袖毛主席关于“工人阶级也应当在斗争中不断提高自己的政治觉悟”的教导，在用战无不胜的毛泽东思想领导这个学院的革命师生进行斗、批、改的同时，不断用毛主席关于无产阶级专政下继续革命的伟大理论武装自己，搞好自身革命化，决心更好地带领全院广大革命师生将无产阶级教育革命进行到底。"},{"type":"paragraph","text":"这支工人毛泽东思想宣传队在去年九月初开进西安石油学院以后，坚决落实毛主席的一系列最新指示和各项无产阶级政策，夺得了一个又一个的胜利，使全院面貌迅速改观。在一片大好形势下，有的工宣队员认为，对知识分子再教育搞得差不多了。工人宣传队领导小组发现这个苗头后，便组织队员联系实际，深入学习毛主席关于"},{"type":"paragraph","text":"“无产阶级文化大革命，还有些事没有做完，现在还要继续做，譬如讲斗、批、改”的最新指示，使大家认识到，要彻底搞好斗、批、改，无产阶级把石油学院这块阵地牢固地占领下来，改造过来，还需要进行很艰苦的斗争。认识提高后，大家一致表示，一定要领导革命师生把无产阶级教育革命进行到底，不获全胜，决不收兵。"},{"type":"paragraph","text":"驻西安石油学院工人毛泽东思想宣传队有少数队员一度认为，自己是领导阶级的一员，是来教育人的，因此，放松了自己的思想改造。针对这个问题，工宣队领导小组组织全体队员学习毛主席的有关教导和林副主席关于“革命，也得革自己的命。不革自己的命，这个革命是搞不好的”这一指示。通过学习，大家进一步认识到，工人阶级最有远见，大公无私，最富于革命的彻底性，肩负着用毛泽东思想领导一切，改造一切的重任。但是，工人阶级的阶级觉悟和领导才能，不是自发产生的，而是接受了马克思主义、列宁主义、毛泽东思想的教育以后，才得到发展和提高的。作为工人阶级的一员，一定要认真学好用好战无不胜的毛泽东思想，努力改造自己的世界观，当好无产阶级专政下继续革命的先锋战士。认识提高后，广大工宣队员掀起了活学活用毛泽东思想的新高潮，学出了新水平，用出了新水平，成为全院革命师生活学活用毛泽东思想的榜样。"},{"type":"paragraph","text":"毛主席教导说：“务必使同志们继续地保持艰苦奋斗的作风。”驻西安石油学院工人毛泽东思想宣传队的同志，牢记毛主席的伟大教导，时刻警惕资产阶级思想的侵袭，保持了工人阶级艰苦奋斗的作风。他们认为，在文化教育战线上，资产阶级有它的传统势力，总是力图用它的资产阶级世界观来腐蚀工人队伍中的意志薄弱者，对此必须有高度的警惕，必须永远保持坚定的无产阶级立场。只有这样，才能做到把文化教育阵地用毛泽东思想牢固地占领下来，改造过来。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"教育革命","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e7b84e8f54"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
