<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"美国资产阶级文化日益堕落腐化","authors":[],"dates":[{"year":1953,"month":1,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"苏联“真理报”在一九五二年十二月十二日刊载了格里森科的一篇文章，就美国进步杂志“群众与主流”所发表的材料评论美国资产阶级文化的堕落。"},{"type":"paragraph","text":"文章的作者说:现代美国资产阶级文化的一切范畴——文学、戏剧、电影、绘画等等，都在传布愚昧、鼓吹屠杀和战争，来毒害和麻痹人民群众，使他们为华尔街垄断资本家的利益服务。"},{"type":"paragraph","text":"只要列举一下一九五二年美国出版的作品的名字，就可以看到美国现代“文学”是什么东西。这些作品是:“我死的日子”，“疯狂的哲学”，“渐浓的黑暗”，“有着粘滑的手指的尸体”，“命运之剑”，“屠杀、疯狂与法律”等等。"},{"type":"paragraph","text":"文学创作打上反动和颓废的烙印"},{"type":"paragraph","text":"在资产阶级作家的创作上打着反动和颓废的烙印。一九五二年九月间出版的斯坦倍克的长篇小说“伊甸园以东”就是一个例子。这本小说的“女主角”杀了父母，烧了房子，和拥有好几个妓院的龟奴私奔。后来她离开了他，去当妓女，最后她毒死了嫖客，自己也死了。尽管内容如此，资产阶级的批评家却盛赞这本“著作”中的“崇高道德”。"},{"type":"paragraph","text":"现在美国资产阶级文学的典型代表是“红得发紫的”作家米基·斯皮林。他在“冷战”期间的六部“作品”发行了一千三百万册。这些书的内容不外是色情、淫荡、凶杀，结合着反共的滥能。“群众与主流”杂志指出:斯皮林嗜好的是血、憎恨与兽性。他在“一个寂静的夜景”这本书里要读者去杀死“激进分子”，他歇斯底里地叫嚣说:“让他们尝尝暴死的苦滋味。这边，那边，到处把他们杀绝，让他们知道我们不是好惹的!杀吧!杀吧!……”"},{"type":"paragraph","text":"戏剧的极端颓废和堕落"},{"type":"paragraph","text":"极端颓废和堕落同样也是美国资产阶级戏剧的特色。美国进步作家迈克尔·戈尔德指出，百老汇上演的剧本尽是些“虚伪的音乐滑稽剧，陈词滥调，无聊的闲扯，刺耳的音乐和毫无趣味的噱头”。甚至资产阶级人士都承认美国戏剧的危机。著名的剧作家泰柏说:“美国戏剧已濒于死亡。”百万富翁金贝尔说:“纽约剧院从来没有像现在这样接近崩溃。”"},{"type":"paragraph","text":"电影完全成了侵略政策的工具"},{"type":"paragraph","text":"电影也完全为美帝国主义的侵略目的服务。著名的美国进步电影剧作家约翰·霍华德·劳逊在一篇文章里揭露了好莱坞电影的反动性质，他写道:“好莱坞影片的思想内容决定于美国帝国主义的意图。最近两年来电影的发展是配合着朝鲜战争的破坏行动的。……宣传战争和征服，宣传白种人优越，宣传压迫殖民地人民:早已成了好莱坞产品的特色。”国统治集团加紧在被美国奴役的国家传布好莱坞“产品”，但是这种“产品”越来越被观众拒绝。劳逊写道:“从国外放映电影得到的收入日渐减少。国外观众一天比一天讨厌美国垄断资本家强加给他们的宣传色情、流氓行为和颂扬战争的影片。”"},{"type":"paragraph","text":"骷髅和木块凑成的“美人群”"},{"type":"paragraph","text":"“群众与主流”杂志指出，自从二次大战以后，美国就成为欧洲最腐朽的资产阶级文化的中心和继承者。二十世纪初产生的所谓“抽象画”从欧洲传到美国，这派画家用一些线条，模糊不清的斑点、混合的几何图形构成他们自称的所谓“新天地”。在美国金融资本家洛克菲勒、福特等人赞助下的“现代艺术博物馆”一九五二年举行的一次“美国十五位画家”展览会上，有一幅克利福德·斯蒂尔的巨幅油画，占满一块墙，整幅只是一片黑色，右上角留出一道白色。被称为美国“最伟大的画家”的波洛克的一幅画看起来像扩大了的墨点。这些画连名称都没有。弗列德里克·基斯勒把骷髅、虫蚀了的木块和枝枒凑在一起，把这叫做“美人群”。"},{"type":"paragraph","text":"在美国，只有斯皮林、波洛克之流才能毫无阻碍地工作和得到统治集团的支持。艺术家、作家，凡是反映真实生活，宣传进步思想的，就被宣布为“破坏分子”，受到非美活动调查委员会的疯狂迫害。"},{"type":"paragraph","text":"美国资产阶级文化的停滞和堕落是美国统治集团所执行的政策的直接结果，他们要把美国变成黑暗势力和法西斯野蛮主义笼罩的国家，变成兵营和警察拷问室。【新华社】"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"朝鲜战争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3b0f144939"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
