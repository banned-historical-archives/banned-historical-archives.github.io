script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"5a6e14f4-1103-48c3-bd99-37613918dd4b","name":"中共党史教学参考资料 第25册 “文化大革命”参考资料 上册（1988年）","internal":true,"official":true,"type":"pdf","author":"","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives3/main/5a6e14f4-1103-48c3-bd99-37613918dd4b.pdf"],"article":{"title":"上海人民公社今日宣告成立","alias":"","parts":[{"type":"paragraph","text":"b"},{"type":"paragraph","text":"上海人民公社今日宣告成立"},{"type":"paragraph","text":"！"},{"type":"paragraph","text":"（一九六七年二月五日）上海人民将于今关下午隆重地在人民广场举行盛大集会，热烈庆祝上海人民公社成立。"},{"type":"paragraph","text":"上海人民公社是在我们最最敬爱的伟大领袖毛主席的亲切关怀和大力支持下诞生的，是在无产阶级文化大革命的烈火中诞生的。她的诞生，庄严地宣判了旧上海市委的死刑。从此，归上海市委的一切权力全归上海人民公社。这是伟大的毛泽东思想又一巨大胜利！是毛主席革命路线的伟大胜利！是我国无产阶级文化大革命的又一极其重大的胜利！上海革命的工人、贫下中农、人民解放军指战员、学生、机关干部和知识分子热烈庆祝她的诞生，从心底里欢呼：“上海人民公社万岁！”“毛主席万岁！万万岁！”"},{"type":"paragraph","text":"毛主席教导我们：“世界上一切革命斗争都是为着夺取政权，巩固政权。”上海无产阶级革命造反派在打倒旧上海市委一小走资本主义道路当权派的斗争中，粉碎了旧上海市委资产阶级反动路线的新反扑，实现了大联合，从旧上海市委走资本主义道路当权派的魔掌中夺回了党权，政权、财权和文权，取得了辉煌的胜利。上海人民公社在东方地平线上出现，是上海地区一月革命的胜利成果，也是无产阶级革命派大联合、大团结、大夺权的胜利成果。"},{"type":"paragraph","text":"今天，上海人民将以万分振奋的心情，热烈隆重地庆祝上海人民公社的诞生，欢庆这个具有深远历史意义的伟大节日。"},{"type":"paragraph","text":"（原载1967年2月5日《解放日报》）一月革命胜利万岁！"},{"type":"paragraph","text":"上海人民公社宣言"},{"type":"paragraph","text":"（一九六七年二月五日）"},{"type":"paragraph","text":"“四海翻腾云水怒，五洲震荡风雷激。”我们上海无产阶级革命派向全中国、全世界庄严地宣告：在伟大的一月革命的大风暴中，旧上海市委、市人委被我们砸烂了，上海人民公社诞生了！"},{"type":"paragraph","text":"我们伟大的导师，伟大的领袖，伟大的统帅，伟大的能手毛主席教导我们：“世界上一切"},{"type":"paragraph","text":"革命斗争都是为着夺取政权，巩固政权。音"},{"type":"paragraph","text":"根据这个道理，我们就反抗，就造反，就斗争，就夺权。一九六七年一月初，上海革命造反派吹响了继续向资产阶级反动路线猛烈进攻的号角，打响了向党内走资本主义道路当权派夺权胜利的第一炮。"}],"authors":[],"dates":[{"year":1967,"month":2,"day":5}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":288,"page_end":288},"tags":[{"name":"上海文革","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"一月革命","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3ad3c767e8"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
