script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"文化特务荆有麟伏法荆匪二十余年来伪装‘左倾’　双手沾满了革命志士的鲜血","authors":[],"dates":[{"year":1951,"month":5,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【南京讯】南京市人民政府接受了广大人民的正义要求，于四月廿九日处决了文化特务荆有麟。"},{"type":"paragraph","text":"他廿多年来，一直用极端卑鄙毒辣的阴谋，进行暗害破坏活动。早在一九二三年，就混入李大钊先生的哈哈报，为北洋军阀吴佩孚做情报，用中国优秀革命领袖李大钊等十七人的鲜血，换取法西斯统治的地位。北洋军阀倒台后，荆匪投入蒋介石匪帮的怀抱，参加军统和中统，为蒋匪帮的双料特务。"},{"type":"paragraph","text":"淮海战役结束后，匪保密局布置潜伏组织，荆匪以为他那伪装的左倾文化人又可在解放区打掩护，遂由匪首毛人凤亲自布置为潜宁第一分站少将站长；领到C·S·M·电台一部，密码六本，活动经费大宗，毛匪还派了译电员报务员数人随荆匪工作。荆匪当即组织新华剧团，以唱蹦蹦戏为掩护，着手搜集我军及苏联使馆情报，向台湾残匪报告。南京解放后，荆匪伪造军管会的臂章及布告，到处招谣撞骗，刺探情报；被捕后，仍散布第三次世界大战即将爆发的谣言，自命为被捕特务的“总顾问”，阻止其他特务坦白。"},{"type":"paragraph","text":"荆匪这一阴毒无比的特务，在他伪装的左倾文化人面貌下，不知出卖了多少优秀革命志士；当他的双手染红了优秀儿女的鲜血，他还厚颜无耻的说:“我以前挂着总统府少将秘书的名义，拿三个职务的薪水，不要上班，倒是顶舒服。”但无论他怎样狡猾，终逃不出人民的法网。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"86337403e8"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
