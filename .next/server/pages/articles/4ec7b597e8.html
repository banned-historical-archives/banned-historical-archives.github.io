<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"乌兰夫在中南民族学院的讲话","authors":[],"dates":[{"year":1960}],"is_range_date":false,"parts":[{"text":"乌兰夫在中南民族学院的讲话","type":"title"},{"text":"讲话要点","type":"subtitle"},{"text":"我很高兴来到中南民族学院。","type":"paragraph"},{"text":"据校党委汇报，我们学院在几年间，已经培养了2000多人，充实各民族地区的干部队伍，现在在校学习的有700多同学，包括18个民族，来自一个自治区（广西僮族自治区）和6个省（湖南、湖北、广东、江西、河南和台湾省）。我们学校贯彻执行了党中央的“教育为工人阶级政治服务，教育与生产劳动相结合”的方针，在炼铁、炼钢中，在运粮中，在生产劳动中，都作出了很好的成绩。我们学校进行了整风和反右派的斗争，也取得很大的成绩，把学校办得更好，为各民族地区培养更多的建设社会主义的干部。","type":"paragraph"},{"text":"我们的国家，正处在一个以钢为纲全面跃进的时期，全国各少数民族，在大跃进也在飞跃前进。各地区，工农业生产有很大发展，都实现了人民公社化，人民生活有大的改善，民族团结大大加强了。我们各民族人民的当前任务就是：","type":"paragraph"},{"text":"在党的领导下，进一步加强民族之间的团结，与全国各族人民一道，共同来建设社会主义，把我们的国家建设成民族平等、团结统一的繁荣幸福的大家庭。","type":"appellation"},{"text":"为了建设好社会主义，我希望全校师生：","type":"paragraph"},{"text":"一、要千百倍地加强党的领导，一时一刻也不脱离党的领导。只有在党的领导下，才能建设社会主义，脱离了党的领导，就犯这样或那样的错误。没有党的领导就没有社会主义，就没有少数民族的繁荣和幸福。","type":"paragraph"},{"text":"二、要坚决走社会主义的道路。只有走社会主义的道路，才能把各少数民族提高到先进民族的行列，一切违反社会主义的言行、思想都是错误的。两条道路（资本主义、社会主义，也就是兴资灭无），两条路线，（多快好省，少慢差费），两种作风（官僚主义和群众路线）的斗争是长时期的斗争，回到岗位后也要开展这个斗争。","type":"paragraph"},{"text":"三、要反对民族主义，当前要着重反对地方民族主义倾向。地方民族主义是反社会主义的潮流，不反对地方民族主义就不能前进。当然反对地方民族主义斗争中，要区别反动分子、野心分子、右派分子的破坏活动和民族主义情绪，对前者要大张旗鼓的斗争到底，对后者要按团结——批评——团结的精神，来展开思想教育。","type":"paragraph"},{"text":"四、民族的优点要发扬，民族内部不合理的东西要改革，要着重各民族的风俗习惯。","type":"paragraph"},{"text":"例如：勤劳勇敢是要发扬的，回族的洗澡，不吃死的东西，都是好的，但是对于放蛊、放寮封蛊（白天不吃饭）要在经过教育后在群众自愿的原则下来改革的。","type":"paragraph"},{"text":"五、继续贯彻执行教育与劳动相结合的精神办好学校。要好好学习，学政治、学文化、学历史、学语文，政治是基本的东西，是方向，方向不对，各种工作都作不好。研究各民族的历史和语文，对发扬民族的优良传统，提搞民族的自尊心，把各民族提高到先进民族的水平，是极其重要的工作，不能轻视。","type":"paragraph"},{"text":"要按排好学习和劳动的时间，既要学习好，又要劳动好，并要生活好。","type":"paragraph"},{"text":"祝全校师生在建设社会主义当中，取得更大的成就。","type":"paragraph"}],"comments":[],"origin":"《毒草集—乌兰夫反革命言论选编：第一集 （1945-1954）》，呼尔浩特革命造反联络总部、批斗乌兰夫反党集团联络站印编，1967年9月。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4ec7b597e8"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
