" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"广州高等学校反右派斗争走向深入","authors":["南方日报"],"dates":[{"year":1957,"month":9,"day":9}],"is_range_date":false,"parts":[{"text":"广州高等学校反右派斗争走向深入","type":"title"},{"text":"南方日报","type":"authors"},{"text":"本报讯  广州市各高等学校反右派斗争正逐步走向深入。中山大学、中山医学院、华南农学院、工学院、师范学院、中医学院、广州师范专科学校、教师进修学院等8个单位，在新学年开始的第一周，就开展了波澜壮阔的斗争；在学校内形成了群众性的大论争。师生们都积极投入斗争，并且进一步揭露了一批隐藏的右派分子。","type":"paragraph"},{"text":"广州市的各高等学校在暑假前已经展开过反右派的斗争，并且取得初步的成绩，各校都揭发了一批明显的右派分子；经过程度不同的斗争，在师生中间初步划清了思想界线；但是由于时间很短，部分师生参加了实习，在暑假期间斗争又停顿了一段时间，因此这个斗争是不够深入的。而前一段斗争的情况，充分说明高等学校中的右派分子向党的进攻是猖狂的。他们在帮助党整风的口实下，利用反对教条主义为幌子来反对马克思列宁主义；利用反对宗派主义为幌子来反对党的领导，具体的就是反对学校的党委，提出什么“外行不能领导内行”，教学方面也提出反对政治质量、反对政治课等等，企图把高等学校引向资产阶级的政治方向。因此，高等学校完全有必要继续深入展开反击资产阶级右派的斗争，通过这个斗争来解决社会主义改造和坚决走社会主义道路的问题。","type":"paragraph"},{"text":"这一周来，各校反右派斗争的进度虽然各不相同，但是自从经过克服右倾思想和温情主义、武装了思想以后，各校师生投入斗争的人数越来越多。中山医学院、华南工学院等单位的师生，除了新入学的学生以外，都投入这个斗争；教授们在校刊上发表论文，在辩论会上也热烈地发言。经过深入斗争，在广州师范专科学校教师当中，揭发了疯狂向党进攻、到处诬告革命干部为反革命分子的右派分子王名元。中山医学院也揭发了白施恩、朱静涛等右派分子。华南工学院除揭露了龙庆忠、赖之机等右派分子之外，就是掩蔽在幕后指挥向党进攻，用狡猾手段一度混入反右派斗争领导小组进行破坏的右派分子谭石洲，也被揭发出来。这些右派分子在群众包围之下已经完全孤立。各校学生当中的反右派斗争，正通过群众性大辩论来进行。各校师生都经历着一场深刻的教育和锻炼。","type":"paragraph"},{"text":"目前，高等学校内的民主党派基层组织，面临着严重的考验。在前一段反右派斗争中暴露出来的右派分子，就有一批是民主党派中特别是民盟和九三学社基层组织的领导人和成员。他们在资产阶级右派猖狂进攻当中，起了骨干作用。他们筹划、发动和号召向党向社会主义进攻，要使民主党派同共产党分庭抗礼，夺取领导权，甚至企图煽动学生闹事等等。在的一段期间，各民主党派基层组织已经开展反右派的斗争，但这个斗争是很不平衡的，有个别基层组织直到现在还没有认真展开斗争，有少数基层组织在斗争中还是软弱无力，还认为“家丑不可外扬”而站在姑息养奸的错误立场上。","type":"paragraph"}],"comments":[],"origin":"《南方日报》1957年9月9日。原题为：“广州高等学校反右派斗争走向深入：一批隐藏的右派分子被揭露和孤立/民主党派基层组织斗争发展很不平衡，正面临严重考验”。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"74ced29373"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
