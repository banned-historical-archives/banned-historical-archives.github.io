script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"朴金喆率代表团抵越南访问朝鲜报纸赞颂朝越人民在反帝反修正主义斗争中紧密团结","authors":[],"dates":[{"year":1963,"month":6,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【据新华社河内19日电】　由朝鲜民主主义人民共和国最高人民会议常任委员会副委员长朴金喆率领的朝鲜民主主义人民共和国最高人民会议代表团，应越南民主共和国国会常务委员会主席长征的邀请，今天上午乘专机到达河内。"},{"type":"paragraph","text":"朝鲜贵宾在机场受到越南国会常务委员会主席长征，越南劳动党中央政治局委员阮志清，国会常务委员会副主席黄文欢、陈登科、阮阐、阮文享，河内市行政委员会主席陈维兴，外交部副部长阮基石等，以及数百名河内市民的热烈欢迎。"},{"type":"paragraph","text":"朝鲜驻越南大使马东山、中国驻越南大使朱其文和其他各国驻越南的外交使节也到机场欢迎。"},{"type":"paragraph","text":"长征和朴金喆先后在机场上举行的欢迎仪式上讲了话。"},{"type":"paragraph","text":"【据新华社平壤19日电】　朝鲜《劳动新闻》和《民主朝鲜报》今天就朝鲜最高人民会议代表团访问越南民主共和国分别发表社论，热情赞颂朝越两国人民的深厚友谊和团结。"},{"type":"paragraph","text":"《劳动新闻》的社论说，朝越两国人民间的友谊团结，是在为促进国家的社会主义建设、把美帝国主义从国土的南半部赶出去、实现祖国统一、反对以美帝为首的帝国主义者的侵略和战争政策、保卫远东和世界和平以及为在马克思列宁主义和无产阶级国际主义的基础上，在加强社会主义阵营的团结的共同斗争中形成的。朝鲜最高人民会议代表团这次到越南民主共和国进行友好访问，将为进一步加强朝越两国人民的友谊团结作出巨大贡献。"},{"type":"paragraph","text":"社论最后说，朝越两党和两国人民，在进一步促进本国的社会主义建设和祖国的统一、在为加强社会主义阵营的团结和为促进国际共产主义运动发展的共同斗争过程中，在为反对帝国主义和现代修正主义的艰苦斗争中，是紧密地团结在一起的。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"123558ca8a"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
