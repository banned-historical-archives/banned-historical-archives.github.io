script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji48","name":"毛泽东全集第48卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji48.pdf"],"article":{"title":"毛泽东等祝贺古巴解放七周年的电报","alias":"","parts":[{"type":"paragraph","text":"毛泽东等祝贺古巴解放七周年的电报！"},{"type":"paragraph","text":"（1965年12月31日）哈瓦那古巴共产党中央委员会第一书记、古巴革命政府总理菲德尔·卡斯特罗·鲁斯同志，古巴共和国总统奥斯瓦耳多·多尔蒂科斯·托拉多同志："},{"type":"paragraph","text":"在古巴解放七周年的时候，我们代表中国人民、中国共产党和中国政府向古巴人民、古巴共产党和古巴革命政府，致以热烈的祝贺。"},{"type":"paragraph","text":"古巴革命的胜利，是古巴人民团结起来、艰苦奋斗、英勇斗争的结果，是美帝国主义的一次可耻的失败。它证明了，革命人民的力量是不可战胜的。我们祝愿，英勇的古巴人民在反对美帝国主义、捍卫民族独立和建设自已国家的事业中取得新的成就。"},{"type":"paragraph","text":"中古两国人民有看深厚的友谊。这种友谊是在反对美帝国主义的共同斗争中建立起来的，是以马克思列宁主义和无产阶级国际主"},{"type":"paragraph","text":"[1]这是毛泽东以中国共产党中央委员会主席的名义和中华人民共和国主席刘少奇、全国人民代表大会常务委员会委员长朱德、国务院总理周恩来联名给古巴共产党中央委员会第一书记、古巴革命政府总理菲德尔·卡斯特罗·鲁斯，古巴共和国总统奥斯瓦耳多·多尔蒂科斯·托拉多的电报。祝贺古巴解放七周年。"},{"type":"paragraph","text":"毛泽东等祝贺古巴解放七周年的电报义的原则为基础的，是任何力量也破坏不了的。在反对美帝国主义、争取世界和平和促进人类进步事业的共同斗争中，中国人民将永远同兄弟的古巴人民相互支持，共同前进。"},{"type":"paragraph","text":"祝中古两国人民的战斗友谊万古长青。"},{"type":"paragraph","text":"中国共产党中央委员会主席毛泽东中华人民共和国主席刘少奇中华人民共和国全国人民代表大会常务委员会委员长朱德中华人民共和国国务院总理周恩来"},{"type":"paragraph","text":"一九六五年十二月三十一日"}],"authors":["毛泽东"],"dates":[{"year":1965,"month":12,"day":31}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":272,"page_end":273},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"朱德","type":"人物"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ef4e02d9d7"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
