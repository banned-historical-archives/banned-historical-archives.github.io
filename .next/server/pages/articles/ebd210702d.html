script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"澳共(马列)主席希尔发表文章谴责苏美利用中东局势进一步勾结和争夺比《光明和被剥削者》周刊指出苏修的叛卖行径是它的本性所决定的","authors":[],"dates":[{"year":1973,"month":11,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社墨尔本一九七三年十一月一日电　澳大利亚共产党(马克思列宁主义)主席爱·弗·希尔十一月一日在澳共(马列)机关报《先锋报》上发表文章，谴责苏美两个超级大国利用中东局势来进一步进行勾结和争夺。"},{"type":"paragraph","text":"文章说:“(一九三八年)慕尼黑协定的实质是制造一种大危机的气氛，并在这种气氛掩盖下实现一项肮脏交易而称之为和平。这正是在中东发生的事情。‘不战不和’的局面得到了保持。”"},{"type":"paragraph","text":"文章说:“美帝国主义者同苏联社会帝国主义者相勾结，支持了以色列对阿拉伯人民的赤裸裸的侵略。”"},{"type":"paragraph","text":"文章揭露了苏联社会帝国主义和美帝国主义在最近的中东战争中互相勾结和争夺，并且着重指出:“整个局势是两个超级大国造成的。它们利用这一局势来进一步进行勾结和争夺。”"},{"type":"paragraph","text":"文章说:“苏联社会帝国主义者知道，要阻止阿拉伯人民进行胜利的解放战争并把这一战争进行到底，毕竟是很难的。因此，他们就试图限制这场战争，使之服从于他们自己的丑恶的帝国主义立场。他们的帝国主义立场要求得到石油和战略地位，包括控制地中海和苏伊士运河，作为他们谋取世界霸权的努力的一部分。”“美帝国主义也同样关心中东的战略地位和石油以及世界霸权。它利用以色列傀儡作为主要武器。”"},{"type":"paragraph","text":"文章就派遣联合国部队和派遣包括苏美两国人员在内的“观察员”去中东一事指出:“这只不过是超级大国谋取世界霸权和互相争斗中的又一卑鄙阴谋和步骤而已。它同缓和毫无关系；它是恰恰相反的东西。不管它们怎样把它装扮成缓和与和平的胜利，正在显现的帝国主义的邪恶而卑鄙的现实是无法掩盖的。”"},{"type":"paragraph","text":"文章强调说:“只要帝国主义存在，就不会有和平。”“阿拉伯人民是不会受骗的。他们对苏联社会帝国主义者的背叛已经有了丰富的教训。他们将独立自主地行事，摆脱任何帝国主义，并且把他们的正义的解放斗争进行到最后胜利。他们得到我们的全力支持和全世界人民的支持。”"},{"type":"paragraph","text":"据新华社一九七三年十一月一日电　比利时马克思列宁主义共产党中央委员会机关刊物《光明和被剥削者》周刊十一月二日一期(提前出版)发表文章，谴责苏美两个超级大国在最近的中东战争中进行勾结，特别是谴责苏联社会帝国主义者叛卖阿拉伯人民。"},{"type":"paragraph","text":"这篇题为“两个超级大国互相勾结反对阿拉伯人民和世界各国人民”的文章说:“两个超级大国给了阿拉伯人民一刀，首先是给了巴勒斯坦人民一刀……两个超级大国互相勾结反对阿拉伯人民，这已经不是第一次。”"},{"type":"paragraph","text":"文章揭露，在柯西金访问开罗等地对阿拉伯国家施压力后，苏修领导人又在莫斯科同基辛格策划了阴谋并且强加给阿拉伯国家。"},{"type":"paragraph","text":"文章接着说:“苏联社会帝国主义者的叛卖是没有止境的……这种叛卖是在人们预料之中的，因为这是修正主义和社会帝国主义的本性决定的。”"},{"type":"paragraph","text":"文章强调说:“马克思列宁主义者相信人民。虽然斗争将是长期的和痛苦的，但是，帝国主义和社会帝国主义的失败也是不可避免的。阿拉伯人民同作为先锋的英雄的巴勒斯坦人民，必将取得胜利。”"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ebd210702d"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
