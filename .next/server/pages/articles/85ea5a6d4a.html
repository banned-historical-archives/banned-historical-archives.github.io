script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"日本毛泽东思想研究会致电中共中央  热烈祝贺中国共产党成立五十周年","authors":[],"dates":[{"year":1971,"month":7,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"日本毛泽东思想研究会致电中共中央"},{"type":"paragraph","text":"热烈祝贺中国共产党成立五十周年"},{"type":"paragraph","text":"新华社四日讯　日本毛泽东思想研究会六月三十日打电报给中国共产党中央委员会，热烈祝贺中国共产党成立五十周年。"},{"type":"paragraph","text":"电报说：“中国共产党的历史是伟大的毛泽东思想胜利的历史。"},{"type":"paragraph","text":"“半个世纪以来，中国共产党一直敢于拿起武器，站在革命战争和革命斗争的最前线。"},{"type":"paragraph","text":"“半个世纪以来，中国共产党坚决地贯彻群众路线，彻底地使七亿人民群众站了起来。"},{"type":"paragraph","text":"“半个世纪以来，中国共产党始终捍卫革命的原则，同‘左’、右倾机会主义进行了毫不妥协的斗争。”"},{"type":"paragraph","text":"电报说：“伟大的领袖毛泽东主席，在这半个世纪的斗争过程中，始终把马克思列宁主义的普遍真理同革命斗争的具体实践相结合，树立了马克思主义的第三个里程碑，为国际共产主义运动展示了宏伟的前景。”"},{"type":"paragraph","text":"电报说：“在美帝国主义垂死挣扎、苏联现代修正主义全面破产的今天，取得了无产阶级文化大革命的伟大胜利的中国共产党，代表着全人类历史的雄伟的未来。”"},{"type":"paragraph","text":"电报指出：“日本革命是世界革命的重要一环。在世界革命进入了新的伟大时代的今天，日本革命也正在进入新的伟大阶段。”"},{"type":"paragraph","text":"电报说：“我们要彻底粉碎宫本修正主义叛徒集团，认真地把马克思主义、列宁主义、毛泽东思想的普遍真理与日本革命的具体实践相结合。”"},{"type":"paragraph","text":"电报说：“我们决心同全国人民一起，高举反美、反军国主义、反修、爱国的旗帜，一定完成民族解放民主革命，出色地完成作为世界革命一环的光荣任务。”"},{"type":"paragraph","text":"电报最后写道：“马克思主义、列宁主义、毛泽东思想胜利万岁！”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"85ea5a6d4a"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
