script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"卖命钱　昧心事说来令人愤慨太古轮抚恤殉难船员家属　竟然也有人从中留难剥削","authors":[],"dates":[{"year":1946,"month":11,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编者先生:"},{"type":"paragraph","text":"贵报素为民喉舌，替民伸冤。我的丈夫在五年前身亡太古公司广东船内，(因该船在澳洲洋面受日机炸毁)本年六月间，外滩领事公馆布告，释放广东船职员妻子家庭抚养金。经过千万手续方于十月卅一日上级职员每人领到英金镑四百镑，下级职员三百镑，今将领款不法情形略写于下，恳先生修改后披露。我们这般丈夫死亡的妇孺，得到领取身亡者抚养金消息后，六月间即纷纷向外滩领事公馆领款，因为我们都是几个妇女，不识英文，更听不懂英语，跑了几拾次，始终得不到此款，丝毫不知其中是何意思?直到十月卅一号，方才将这闷葫芦完全打开，原来领事公馆早已将此款预备妥当，要我们领取，但是需要中国外交部一位穿西装先生承认作证，方可如数领到。岂知那外交部先生(姓名不详)。也要我们买命钱的一份，但是不便向我们开口，所以将此事拖延到现在。直到十月卅一日，这位狼心狗肺要我们买命钱的先生，竟由代表向我们来言明他的来意:要我们每人须付出法币廿四万元，作为他的证明手续费，马上可以将此金领出，不然再是几个月拖下去也不能领出。同时又对我们说:我将此金拖延一月，你们要损失多少利息，先付出廿四万真算便宜货了。在这无理欺诈之下，谁愿意呢?但是又恐怕这位漂亮的外交部派下来的先生，将此钱无限期的拖下去，在不得已中，只得将廿四万如数交出了!结果丈夫死亡者，每人所得只有法币三百八十七万，除给那位穿西装先生外，还余三百六十三万元。岂知那先生只说几句外国话，竟得了五六百万矣!同时旁边有人云:那先生，在这里不知赚了多少人家的卖命钱，这次他又可以去吃大菜，跑舞厅去了!编者先生:你到想想看，我们死了丈夫，只得到三百八十七万卖命钱，那位先生没有死去什么人，倒反而得了二个死人的代价，这世界是不是太黑暗了啊?"},{"type":"paragraph","text":"我是一个妇懦，不知世事，更不懂其中彻底的意思，但为要明了真情，只得恳请外交部主任先生查究此人之真实姓名，何故定要取此卖命钱的一份，难道为外交部服务没有工资的吗?同时亦请当局法意，再不使发生类似欺榨的行为，给我们这一群受欺者以援助。"},{"type":"paragraph","text":"先生我以上所说之事，都是事实，并无半句谎言，如不信，可到太古公司查问广东船员妻子。并祝撰安　一个广东船员家属上"},{"type":"paragraph","text":"十一，一日"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"14dc98bbaa"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
