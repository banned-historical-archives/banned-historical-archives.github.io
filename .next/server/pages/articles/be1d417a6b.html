script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"乌兰夫同志在统战、民委系统“五一”庆祝会上讲话遵照华主席为民族团结事业题词 认真贯彻落实毛主席的民族政策","authors":[],"dates":[{"year":1978,"month":5,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"华主席的题词是:全国各族人民团结起来，为把祖国建设成为社会主义的现代化强国而奋斗。"},{"type":"paragraph","text":"新华社北京五月一日电　中共中央政治局委员、人大常委会副委员长乌兰夫今天在统战、民委系统庆祝“五一”国际劳动节大会上的讲话中说:英明领袖华主席最近为民族团结事业题词:“全国各族人民团结起来，为把祖国建设成为社会主义的现代化强国而奋斗。”华主席的题词，是华主席、党中央对全国各族人民的亲切关怀和巨大鼓舞，是推动各项工作的强大动力，也是民族、统战工作部门、民族地区的干部和群众作好民族工作的强大思想武器。"},{"type":"paragraph","text":"庆祝大会在首都民族文化宫广场举行。"},{"type":"paragraph","text":"人大常委会副委员长阿沛·阿旺晋美，中共中央统战部副部长、国家民族事务委员会主任杨静仁，中共中央统战部副部长、政协全国委员会秘书长齐燕铭，有关方面负责人李贵、周巍峙、聂真、李金德、萨空了(蒙古族)、费孝通、白寿彝(回族)、杨东生(藏族)、希侯巴(藏族)、仁增旺杰(藏族)、朴春子(朝鲜族)、伍精华(彝族)、田富达(高山族)、德林(锡伯族)、关山复(满族)、扎西旺徐(藏族)、文正一(朝鲜族)，以及包括蒙古、回、藏、维吾尔、苗、彝、壮、布依、朝鲜、满等五十四个少数民族的干部、学员和群众三千多人，出席了庆祝大会。"},{"type":"paragraph","text":"大会充满了各兄弟民族团结战斗的气氛。"},{"type":"paragraph","text":"乌兰夫同志在讲话中讲到党的民族政策时指出，在当前全国正在深入学习五届人大文件的时候，华主席的光辉题词，对于在全国各族人民中进行民族政策再教育，深入揭批“四人帮”破坏毛主席民族政策的反革命罪行，进一步加强民族团结，巩固祖国统一，实现社会主义的四个现代化，具有特别重要的意义，我们要努力学习，认真贯彻执行，进一步作好民族工作。"},{"type":"paragraph","text":"乌兰夫同志说，伟大领袖毛主席一贯重视我国各民族的团结。毛主席的革命路线，在民族工作方面虽然受到了刘少奇、林彪特别是“四人帮”反革命修正主义路线的干扰和破坏，但始终居于主导地位。华主席继承毛主席的遗志，一举粉碎了王、张、江、姚“四人帮”，挽救了革命，挽救了党，率领各族人民在毛主席的革命路线指引下，开始了新的长征。我们要以华主席的题词为强大武器，在党中央抓纲治国的战略决策指引下，认真贯彻落实毛主席的民族政策，深入揭批“四人帮”破坏民族政策的反革命罪行，发展各族人民友爱合作、亲密团结的关系。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"be1d417a6b"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
