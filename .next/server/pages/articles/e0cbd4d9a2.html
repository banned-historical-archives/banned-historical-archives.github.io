<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中央宣传部关于土地改革宣传工作的指示","authors":[],"dates":[{"year":1950,"month":8}],"is_range_date":false,"parts":[{"text":"中央宣传部关于土地改革宣传工作的指示","type":"title"},{"text":"关于土地改革宣传中的几项问题，规定如下：","type":"paragraph"},{"text":"（一）在实行土地改革的地区，今后对于这一工作的进行状况，一般地不要在报纸上多作宣传。报纸上可以而且应当宣传土地改革的利益和必要，宣传中央人民政府关于土地改革的方针政策，宣传本地进行这一工作的重要计划办法以及某一阶段某一地区的经验总结。但是，不要去经常登载工作中的实况，因为这样可以避免引起那些并不参加土改工作的很多城市居民的不必要的震动，也可以避免许多不成熟的甚至错误的经验盲目传布。为了经常指导工作交流经验，各省委可以在主要负责同志的审查监督之下出版土地改革通讯一类不对外发行的小刊物，供给参加土改工作的人员（可以包括非党员）阅读。","type":"paragraph"},{"text":"（二）在宣传土地改革的利益和必要时，应当说明旧土地制度的如何不合理，地主阶级如何残酷地压迫剥削农民，老解放区经过土地改革后农村面貌如何改变等等。在这种宣传工作中应广泛吸收资产阶级和开明绅士参加，以利动员全体人民反对地主阶级和封建土地制度。但应注意不要介绍老区土地改革中现在已不适用的经验和某些不正确的口号，不要造成地主人人有血债，在土改中应被农民一一严厉报复的空气，也不要造成土改后农民一切困难均可立即全部解决的错觉。","type":"paragraph"},{"text":"（三）在已经完成土地改革的地区和今年不准备进行土地改革的地区，不要多宣传土地改革，以免引起党内外不必要的注意和纷扰。在这些地方大行政区的报纸，对于中央人民政府颁布的有关土地改革的最重要法令（例如土地改革法和划分农村阶级的文件）可以刊登，但省级报纸即可不发表。在今年只准备实行减租的地方，宣传的重点应放在减租范围内。","type":"paragraph"},{"text":"（四）在解释中央人民政府关于土地改革的新政策时应注意防止老区地主富农以及一部分过去在土改问题上确实犯过右倾错误的党员借此反攻。对于保存富农经济的政策不应解释为富农经济对中国农业生产有很大重要性，亦不应解释为应当鼓励一般农民都向富农发展。我们应当在农民中反对空想的农业社会主义，提倡农民由勤俭生产而致生活富裕，也不反对一部分农民变为富农，但并不提倡农民应当变为富农，或因农民不愿变为富农而批评说这就是空想农业社会主义的错误思想。","type":"paragraph"},{"text":"（五）除动员一般青年知识分子参加土地改革工作外，各中央局及各省委还应注意组织社会科学家和艺术家参加土地改革工作，以便产生出研究各省土地制度的科学性著作和描写一万万农民翻身的文学戏剧电影作品。在一九四七年前后产生的关于土地改革的优秀文艺作品，在土地改革地区应多加推行，但戏剧的公演，应注意选择内容与现行政策不相抵触者，如有显著抵触，在上演时应作适当修改。","type":"paragraph"},{"text":"（六）以上望向各地宣传工作者、新闻工作者和文化工作者传达，并将执行中的问题报告本部。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e0cbd4d9a2"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
