script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"卡博同志向中共中央高级党校全体师生作长篇重要讲话美帝和苏修是世界人民最大的共同敌人 阿中两党并肩携手把反修斗争进行到底谢胡、邓小平等同志出席报告会　康生同志致欢迎词强调学习阿劳动党十分宝贵的经验","authors":[],"dates":[{"year":1966,"month":5,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京9日电　阿尔巴尼亚劳动党中央政治局委员、部长会议主席穆罕默德·谢胡同志，和由他率领的阿尔巴尼亚党政代表团，今天下午访问中共中央高级党校。代表团成员、阿尔巴尼亚劳动党中央政治局委员希斯尼·卡博同志，应邀向党校全体师生作了长篇重要讲话(讲话全文见第四、五、六版)。"},{"type":"paragraph","text":"卡博同志在讲话中，详细、深刻地阐述了当前国际形势，反对帝国主义，反对现代修正主义，以及阿尔巴尼亚社会主义革命和建设的问题。"},{"type":"paragraph","text":"中共中央总书记邓小平，中共中央政治局委员李先念，中共中央政治局候补委员康生，中共中央委员、中共中央高级党校校长林枫，中共中央委员伍修权等，出席了报告会。"},{"type":"paragraph","text":"谢胡同志、卡博同志和阿尔巴尼亚党政代表团其他同志，由邓小平等同志陪同走进会场的时候，全场起立，长时间地热烈鼓掌。少先队员向全体阿尔巴尼亚同志献鲜花。"},{"type":"paragraph","text":"康生同志在会上首先致欢迎词。他对阿尔巴尼亚同志光临中共中央高级党校，表示衷心感谢和热烈欢迎。康生同志说，阿尔巴尼亚党政代表团的同志，都是同我们长期并肩作战的亲密战友。阿尔巴尼亚劳动党是一个久经考验的、光荣的、伟大的、正确的马克思列宁主义政党，它在恩维尔·霍查同志的领导下，无论在反对以美国为首的帝国主义，反对以苏共领导集团为中心的现代修正主义的斗争中，无论在社会主义革命和社会主义建设中，都取得了辉煌的胜利，作出了巨大的贡献，我们为此感到十分高兴。"},{"type":"paragraph","text":"康生同志说，最近一个时期，阿尔巴尼亚劳动党在进一步发展马克思列宁主义，进一步反对帝国主义和现代修正主义，在社会主义革命和社会主义建设中，采取了一系列重大的革命措施。阿尔巴尼亚劳动党有着十分宝贵的经验，是值得我们学习的。"},{"type":"paragraph","text":"康生同志向大家介绍了参加报告会的穆罕默德·谢胡同志、希斯尼·卡博同志、阿卜杜勒·凯莱齐同志和瓦西里·纳塔奈利同志，以及其他阿尔巴尼亚同志。"},{"type":"paragraph","text":"希斯尼·卡博同志应邀在热烈的掌声中开始讲话。他在讲话中首先阐明了今天世界是处在由资本主义向社会主义过渡的光荣历史时代，处在社会主义和民族解放的强大革命风暴的时代，处在帝国主义崩溃和殖民主义体系瓦解的时代，处在社会主义和共产主义在世界范围内胜利的时代。他指出，当前国际形势的发展，总的说来是有利于社会主义，有利于各国人民革命，有利于反对帝国主义、反动派和修正主义的斗争的。关于这个问题，卡博同志详细作了如下的分析:当前世界革命的形势正在高涨，帝国主义正在没落和瓦解；现代修正主义是帝国主义反对社会主义和爱好自由的人民的“第二战线”；美帝国主义是全世界人民最大的敌人；帝国主义的侵略计划必将遭到彻底的失败。"},{"type":"paragraph","text":"卡博同志随后谈到反对现代修正主义的斗争时，指出反对帝国主义的斗争是同反对修正主义的斗争不可分割的。今天，美帝国主义和赫鲁晓夫修正主义是社会主义和全世界人民两个最大的共同敌人。他强调说，必须把揭露和粉碎现代修正主义的斗争进行到底。卡博同志分析说:现代修正主义的历史使命是永久维持资本主义和消灭社会主义；阿尔巴尼亚劳动党把反对现代修正主义的斗争看成是自己崇高的国际主义义务；赫鲁晓夫修正主义者面临着巨大的困难和矛盾；共产主义运动的团结只有抛掉修正主义者并与之斗争才能实现；苏联修正主义已把自己置于反帝统一战线之外，绝不能同它搞联合行动；阿尔巴尼亚劳动党将同中国共产党并肩携手，把反对现代修正主义的斗争进行到底。"},{"type":"paragraph","text":"卡博同志在讲话的最后一部分，谈到阿尔巴尼亚人民正在一手拿镐、一手拿枪地建设社会主义。卡博同志强调说，阿尔巴尼亚劳动党为了胜利地建设社会主义，防止资本主义复辟，正从苏联的沉痛经验中吸取有益的教训。他指出，突出无产阶级的政治、群众路线和革命教育，是阿尔巴尼亚劳动党进行社会主义建设的三大口号，在这一思想指导下，阿尔巴尼亚劳动党采取了一系列具有伟大意义的革命化措施。他谈到了阿尔巴尼亚人民共和国社会主义建设的成就和光辉的前景；指出最后胜利必将属于马克思列宁主义、社会主义和共产主义。"},{"type":"paragraph","text":"卡博同志的讲话结束后，全场响起长时间的暴风雨般的掌声。邓小平同志同卡博同志热烈地拥抱。"},{"type":"paragraph","text":"林枫同志接着致词。他说，我们感谢希斯尼·卡博同志给我们作了一个很好的马克思列宁主义的报告。我们要认真地学习这个报告，要学习以霍查同志为首的阿尔巴尼亚劳动党和人民坚持马克思列宁主义原则、敢于斗争、不断革命的精神。"},{"type":"paragraph","text":"林枫同志说，我们中央高级党校的全体同志，在党中央、毛泽东同志的领导下，要高举马克思列宁主义、毛泽东思想的伟大红旗，永远做彻底的革命派，为中国人民服务，为世界革命服务。他最后高呼:“中国和阿尔巴尼亚两党和两国人民的伟大友谊和战斗团结万岁!”“战无不胜的马克思列宁主义万岁!”"},{"type":"paragraph","text":"大会结束时，全场掌声经久不息。邓小平同志站起来高呼口号:“光荣归于阿尔巴尼亚劳动党和恩维尔·霍查同志!”"},{"type":"paragraph","text":"出席今天报告会的，还有外交部副部长王炳南，我国驻阿尔巴尼亚大使许建国，中共中央高级党校副校长贾震、范若愚和李一非等同志。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"康生","type":"人物"},{"name":"邓小平","type":"人物"},{"name":"谢胡","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"世界形势","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"49562f2919"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
