script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"杜尔总统表示坚决支持各国人民正义斗争  重申几内亚不签署三国条约  只要帝国主义和殖民主义继续统治和进行剥削，不论是部分裁军还是全面裁军，对于各国人民都没有历史意义","authors":[],"dates":[{"year":1964,"month":10,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"杜尔总统表示坚决支持各国人民正义斗争"},{"type":"paragraph","text":"重申几内亚不签署三国条约"},{"type":"paragraph","text":"只要帝国主义和殖民主义继续统治和进行剥削，不论是部分裁军还是全面裁军，对于各国人民都没有历史意义"},{"type":"paragraph","text":"新华社开罗九日电  几内亚总统塞古·杜尔在不结盟国家会议八日的会议上发言时重申几内亚不签署莫斯科三国条约。他说：“至于几内亚政府，它之所以不愿意在莫斯科条约上签字，是因为世界和平的问题并不仅仅是关系到苏联、美国和英国这三个国家的问题，想必诸位都会同意这一点。和平是全人类的至高无上的东西，它将是不论大小、贫富的各国人民协同一致的、有意识的努力的结果。和平要求各国人民坚持不懈地和坚决地进行斗争。”"},{"type":"paragraph","text":"杜尔指出：“只要帝国主义和殖民主义还继续统治一些国家的人民，继续使一些国家处于分裂状态并且继续对世界上千千万万的人进行剥削，不论是部分裁军还是全面裁军，对于我们这些国家的人民来说，都是没有历史意义的。”他说：“我们这些国家拒绝仍然做别人的工具或变成别人的工具。它们反对一国人民对另一国人民实行专制、奴役和剥削。”"},{"type":"paragraph","text":"他说：“几内亚共和国准备坚决支持一切旨在解放仍然处于附属地位的国家、取消各国的外国军事基地、清除新殖民主义、打倒种族歧视、保证各国人民自决、在谈判基础上和平解决纠纷、使联合国各级机构民主化、确保一切国家都在联合国中有代表的协调一致的具体行动。”"},{"type":"paragraph","text":"杜尔总统还表示，几内亚共和国决心支持恢复中华人民共和国在联合国中的合法席位，支持任何旨在消除对古巴的经济封锁的政策，支持美国黑人的社会种族合并政策。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"038c69ade9"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
