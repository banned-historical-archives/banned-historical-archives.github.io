script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"乌拉圭左派革命运动机关报谴责苏共修正主义集团投降主义路线　热烈欢呼中共保卫马列主义的坚定革命立场   指出苏共修正主义领导集团把投降主义路线隐藏在“联合行动”的口号后面，是暗害全世界马列主义运动和革命运动的新方法","authors":[],"dates":[{"year":1966,"month":7,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"乌拉圭左派革命运动机关报谴责苏共修正主义集团投降主义路线"},{"type":"paragraph","text":"热烈欢呼中共保卫马列主义的坚定革命立场"},{"type":"paragraph","text":"指出苏共修正主义领导集团把投降主义路线隐藏在“联合行动”的口号后面，是暗害全世界马列主义运动和革命运动的新方法"},{"type":"paragraph","text":"新华社十七日讯　蒙得维的亚消息：乌拉圭左派革命运动机关报《起义之声报》热烈欢呼中国共产党保卫马克思列宁主义的坚定革命立场，谴责苏共修正主义领导集团的投降主义路线。"},{"type":"paragraph","text":"《起义之声报》在第五期（六月出版）发表的题为《苏共二十三大继续走修正主义的老路》的文章说：“苏共二十三大是在对世界范围内的革命力量发生重大转折的时刻召开的。苏共二十三大是使苏共变成现代修正主义运动的头目的逐渐堕落过程中的一个阶段。”"},{"type":"paragraph","text":"文章指出：“对革命运动和马克思列宁主义者来说，这些苏共‘新’领导人比赫鲁晓夫危险得多。”赫鲁晓夫的修正主义立场“在言论和行动中是清清楚楚的。而勃列日涅夫、柯西金等人却狡猾和阴险得多。他们斟酌他们的言论，掩盖和歪曲事实。他们同美帝国主义的妥协（这种妥协是大量的）是非常秘密地进行的。”"},{"type":"paragraph","text":"文章接着说：在苏共二十三大召开之前，苏共领导人“给其他共产党写了一封充满了对中国共产党的诬蔑和造谣的信。他们企图以此来寻找使得他们能够分裂共产主义运动的‘方法’。他们公开以叫嚷‘反帝联合行动’进行捣乱，暗地里对中国同志进行造谣、诬蔑、威压和挑衅。中国共产党揭露和谴责这个阴谋的革命坚定性和它不参加这次大会的决定，粉碎了这次挑衅。”"},{"type":"paragraph","text":"文章指出，苏共修正主义领导人已经把他们的历次代表大会“变成同美帝国主义的‘谈判桌’”。苏共二十三大的意图是“继续走老路，使‘越南问题的和平谈判’解决成为可能”。“他们的目的是迫使整个革命运动执行其同美国佬妥协的政策和再次把其代表大会的讲台变成一个攻击马克思列宁主义者、特别是攻击中国共产党人的橱窗。”"},{"type":"paragraph","text":"文章谴责苏共领导人“抓住解放运动和革命运动，以便在他们推行同美帝国主义‘和平共处’的政策时，用来讨价还价。”"},{"type":"paragraph","text":"文章谈到勃列日涅夫在苏共二十三大的讲话时说：勃列日涅夫的讲话清楚地表明，苏共领导人“已决定推行一个同各国人民所熟知的最凶恶的侵略者美帝国主义在文化上、科学上和经济上‘和平共处’的政策。”“苏联修正主义领导人对于拯救他们的‘和平共处’政策，比对别的事情更为关心。”"},{"type":"paragraph","text":"文章指出，现在，苏共修正主义领导集团的“投降路线隐藏在‘联合行动’的口号后面。这是现在的修正主义者为了能够暗害全世界的马克思列宁主义运动和革命运动而将使用的新方法。”"},{"type":"paragraph","text":"文章强调说，但是，“各国人民已经表明，他们能够坚决对付帝国主义，使它遭受沉重的打击，并且最后击败它。帝国主义的每一个失败就是修正主义的失败。帝国主义者和修正主义者都将免不了最后被人民的革命浪潮冲垮。”"},{"type":"paragraph","text":"文章表示相信，苏联劳动群众“终有一天将推翻这个篡权的小集团，并将把真正的列宁的党置于反帝斗争的最前列。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cae6ac19f3"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
