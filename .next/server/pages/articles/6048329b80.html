script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"美内政将再右倾大财阀主张停止加工资　并图推翻保障劳工立法","authors":[],"dates":[{"year":1946,"month":12,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【路透社纽约二十三日电】　美国通用电气公司董事长威尔逊，建议于十二个月内停止增加工资，俾使美国工业得运用战时所得技术上之常识，加紧生产，减低售价，嘉惠消费者，同时据悉有一小部分之工业界有力人士主张立即废止最重要之三联邦劳工法，即华格纳法，(规定劳资集体谈判者)，工资工时法，(确立每周四十小时之工作)，及诺利斯—拉迦第亚法(规定不得由法院干涉劳资纠纷)。据云:该处人士拟向共和党控制之新议会，施川强烈压力。"},{"type":"paragraph","text":"【合众社华盛顿廿三日电】　共和党参议员塔虎脱本日在比宣称，本月卅日共和党在此举行会议以决定各委员会人选时，渠愿有出任参议院劳工委员会主席之意。以资格而论，塔虎脱在一月三日开幕之第八十届国会中，出任劳工委员会或财政委员主席一职自必胜任愉快。据培虎脱自称:渠计划继续出任财政委员会委员，及共和党指导委员会主席，(按该委员会负责计划共和党在参议院之战略)。塔氏认为新国会之首要任务，即为劳工法案，故主张不待最高法院对于政府控告路易士及其矿工联合会之蔑视法令案有所决定，即着手进行劳工法案，但塔氏并未提及渠所计划之劳工法案细则云。"},{"type":"paragraph","text":"【合众社华盛顿廿三日电】　美最高法院本日接受路易士及其矿工联合会之申请，同意扩大罢工案之范围，审理十二月四日戈尔斯普鲁法官临时取缔罢法令之法理问题，故最高法院除已定一月十四日听取双方陈述关于弋法官禁止罢工之第一次限制法令案及罚处三百五十一万美元案以外，复决定审理临时法令之法理问题案，政府方面对于路易士此举并未表示反对。"},{"type":"paragraph","text":"【合众社华盛顿廿三日电】　美国共产党今日发动反对普遍训练计划之运动，认为自战胜日本之后，政府种种军事设备，已使世界其他各国入于恐佈之状态中，并谓美国陆海军将领实在准备战事云。"}],"comments":[],"origin":"路透社,合众社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6048329b80"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
