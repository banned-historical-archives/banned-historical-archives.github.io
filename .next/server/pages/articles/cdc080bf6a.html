<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"0b2f26ed-ad29-48e7-9c89-446932a97ab0","name":"中共党史教学参考资料 第27册 “文化大革命”参考资料 下册（1988年）","internal":true,"official":true,"type":"pdf","author":"","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives3/main/0b2f26ed-ad29-48e7-9c89-446932a97ab0.pdf"],"article":{"title":"因参加天安门事件被捕的人没有一个反革命分子","alias":"","parts":[{"type":"paragraph","text":"天安门事件以后，姚文元对那个心腹说：“天安门广场事件报道，这对无产阶级新闻更是很重要的材料。”又说“这样尖锐的斗争，在新闻工作方面是很重要的，写出来”、“新闻工作上有何新的经验，好好总结。“什么“无产阶级新闻史”的“很重要的材料？\"这是无产阶级新闻史上极端反动极端恶劣的反面教材！什么“新闻工作方面”的“新的经验”？这是戈培尔之流用笔杀人的反革命的老“经验”！请看人民群众是怎样看待他们的造谣宣传的：署名“四万四于零一个\"的读者给“戈培尔编辑（即那个心腹）的信中说*伟大的中国共产党的机关报（人民日报）被你贬低为‘两校'的校刊，你受主子的利诱，无恶不作，罪该万死。你们做的丑事，才真是·不得人心”。”“你们一小搬盗用‘本报记者”名义，胡作非为、八亿人民都痛恨你们。”“你们对周总理制造反革命言论，你们到底是国民党、还是混进共产党的阶级异已分子！！”“你这个人根本没有党心、党员之心，甚至没有人心、良心。只想作官，跟着你主子作威作福，你们的末日快到了。全国八亿入民，全党三千万党员要审判你们.”这封信写得多好啊！"},{"type":"paragraph","text":"现在，天安门事件已宣布完全是革命行动，一九七六年清明节因悼念周总理、反对“四人帮”受到迫害的同志要一律平反。这是华主席为首的党中央抓纲治国战略决策的伟大胜利，是人民力量的伟大胜利。“四人帮”及其心腹在“新闻工作方面”的这一套反革命“经验”，还没有来得及“总结”，还没有来得及“写出来”，他们就被革命人民押上了历史的审判台！我们要御底清算“四人帮”及其心腹在天安门事件报道中欠下的债！我们要揭开这报刊史上黑暗的一页，还历史以本来的面目！"},{"type":"paragraph","text":"（原载《新闻战线》1978年第1期）（附）因参加天安门事件被捕的人没有"},{"type":"paragraph","text":"一个反革命分子"},{"type":"paragraph","text":"本社记者报道：根据北京市公安部门提供的材料，一九七六年因参加天安门事件而被捕的三百多名干部、群众中，没有一个是反革命分子。这些无辜被捕的同志现在已经彻底平反，恢复名誉。"},{"type":"paragraph","text":"一九七六年清明节前后，首都广大革命群众来到天安门广场人民英雄纪念碑前，沉痛悼念敬爱的周总理，愤怒声讨万恶的“四人帮”，遭到了“四人帮”的残酷镇压。“四人帮”及其在北京市公安局的那个黑干将为了达到他们的打倒老一辈无产阶级革命家、篡夺党和国家最高领导权的罪恶目的，当时就指令公安人员，在抓捕中要追“后台”，要把重点放在高级干部的子女和与党政军负资人有关系的人身上。被捕的干部、群众十分清楚“四人帮”搞的这个反革命的政治大阴谋。他们被捕后顽强地坚持斗争，表现了大无畏的英勇气概和宁死不屁的革命气节。"},{"type":"paragraph","text":"从今年五月开始，北京市公安局组织专门班子对这一案件进行了全面复查。经过大量调查证明，这是一起重大冤案。充分的事实说明：在这个事件中被捕关押的三百八十八人中，没有一个人是反革命分子，（只有三人因当时犯有偷盗等罪行，需要追究刑事责任）。北京市公安局和有关部为这些因悼念周总理、声讨“四人帮”而被捕的同志进行平反时，都在结论，中充分肯定了他们的革命行动，为他们彻底恢复了名誉。"},{"type":"paragraph","text":"（新华社1978年11月18讯，载11月19日《解放军报》）{附]．四五运动日志"},{"type":"paragraph","text":"一九七六年1月8日上午九时五十七分周恩来总理在北京逝世。1月9日中共中央、人大常委会、国务院发出计告。举国沉浸在哀痛之中。1月10日党和国家领导人，党、政、军各部门负责人，爱国民主人士的代表，以及首"},{"type":"paragraph","text":"都群众一万多人，怀着极其沉痛的心情，前往北京医院向周恩来总理的遗体"},{"type":"paragraph","text":"告别。1月11日1向周恩来总理遗体告别仪式继续举行。下午首都百方群众自动集聚在通往八"},{"type":"paragraph","text":"宝山的十里长街两侧，静默肃立，等待总理灵车通过。1月12日首都工农兵群众、机关干部、学生四万多人，怀着深厚的无产阶级感情、在--14日劳动人民文化宫举行隆重吊仪式。"},{"type":"paragraph","text":"▲未能参加正式追悼仪式的人民群众，连日来自发地到人民英雄纪念碑前敬献花图，表示哀。纪念碑前人如潮水，花圈相迭。▲《人民日报》以头版大字标题刊出《大辩论带来大变化》的长篇报道。强奸民意，开头就胡说：“近来，全国人民都在关心着清华大学关于教育革命的"},{"type":"paragraph","text":"大辩论。”全国人民对此极为愤概，纷纷打电话，写信怒斥这篇报道。1月15日下午，党和国家领导人以及首都各界群众代表五千多人，在人民大会堂隆重"},{"type":"paragraph","text":"举行追悼大会，沉痛悼念周恩来总理。中共中央副主席、国务院副总理邓小"},{"type":"paragraph","text":"平同志致悼词。1月16日遵照周恩来同志生前的遗言，周恩来同志的骨灰撒在祖国的江河大地。"},{"type":"paragraph","text":"姚文元下令：关于周总理的“治丧报道要立即结束”。2月6日日《人民日报》发表：《无产阶级文化大革命的继续和深人一-喜看清华大学教"},{"type":"paragraph","text":"育革命大辩论破浪前进》，不指名地对邓小平同志进行攻击和诬陷。2月16日“四人帮\"的御用写作班子梁效以“高路\"为笔名，在《光明日报》上发表《孔"},{"type":"paragraph","text":"丘之忧》。文章说：“让旧制度的·哭丧妇”抱着孔丘的去忧心如焚，呼天号"},{"type":"paragraph","text":"地吧。”攻击诬陷周总理和悼念总理的亿万人民。2月23日福建省刘宗利在福州市贴出大字报：《“阿斗\"的呼声》，历数“四人帮”罪状，震"},{"type":"paragraph","text":"动了福州。三月八日王洪文亲自下令追查。，2月26日福州大学机械系教师厉海清在福州市东街口贴出《天仙子·葬志》词一首，"}],"authors":["《解放军报》记者"],"dates":[{"year":1978,"month":11,"day":18}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":452,"page_end":453},"tags":[{"name":"周恩来","type":"人物"},{"name":"姚文元","type":"人物"},{"name":"四人帮","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"教育革命","type":"主题/事件"},{"name":"四五运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cdc080bf6a"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
