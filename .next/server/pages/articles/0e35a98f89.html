script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"毛泽东主席会见达达赫总统和夫人等贵宾","authors":[],"dates":[{"year":1974,"month":9,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛泽东主席会见达达赫总统和夫人等贵宾"},{"type":"paragraph","text":"会见充满亲切友好的气氛。毛主席热烈欢迎达达赫总统再次来到我国访问，宾主亲切握手，互致问候。接着，毛主席又同总统夫人和其他毛里塔尼亚贵宾一一握手问候。毛主席同达达赫总统和夫人及乌尔德·西迪·哈伊巴、萨勒、乌尔德·穆克纳斯、乌尔德·西迪·阿里进行了诚挚、友好的谈话。邓小平副总理、王海容副外长等参加了会见和谈话"},{"type":"paragraph","text":"新华社一九七四年九月十九日讯　毛泽东主席今天上午会见了毛里塔尼亚伊斯兰共和国总统莫克塔·乌尔德·达达赫和夫人及其主要随行人员。这是毛主席同乌尔德·达达赫总统的第二次会见，第一次会见是在一九六七年十月乌尔德·达达赫总统第一次访问我国的时候。从那时以来，中国、毛里塔尼亚两国的友好关系和两国人民的战斗友谊不断得到了巩固和发展。"},{"type":"paragraph","text":"今天的会见充满亲切友好的气氛。当乌尔德·达达赫总统来到的时候，毛主席迎上前去，热烈欢迎他再次来到我国访问，宾主亲切握手，互致问候。接着，毛主席又同总统夫人和其他毛里塔尼亚贵宾一一握手问候。"},{"type":"paragraph","text":"参加会见的乌尔德·达达赫总统的随行人员是：国民议会议长达赫·乌尔德·西迪·哈伊巴，人民党组织和新闻书记、常设局负责人萨勒·阿卜杜勒·阿齐兹，外交部长哈姆迪·乌尔德·穆克纳斯，农村发展部长迪奥普·马马杜·阿马杜和夫人，装备部长阿卜杜拉希·乌尔德·达达赫和夫人，青年和体育部长巴·马马杜·阿拉萨内，最高妇女委员会主席杜尔·艾莎塔·卡内夫人，毛里塔尼亚劳动者联盟总书记谢赫·马莱宁·罗贝尔，毛里塔尼亚驻中国大使穆罕默德·乌尔德·西迪·阿里，外交部大使、专员苏莱曼·乌尔德·谢赫·西迪亚，总统府总秘书处司法顾问耶达利·乌尔德·谢赫，礼宾司长塔基·乌尔德·西迪，卫生局长穆拉耶·阿卜杜勒·穆米内，港务局长苏·穆罕默德·德伊纳。"},{"type":"paragraph","text":"毛主席同乌尔德·达达赫总统和夫人及乌尔德·西迪·哈伊巴、萨勒、乌尔德·穆克纳斯、乌尔德·西迪·阿里，进行了诚挚、友好的谈话。"},{"type":"paragraph","text":"我国国务院副总理邓小平，外交部副部长王海容和副司长齐宗华、罗旭、唐闻生参加了会见和谈话。（附图片）"},{"type":"paragraph","text":"上图：毛泽东主席同莫克塔·乌尔德·达达赫总统亲切握手。"},{"type":"paragraph","text":"新华社记者摄"},{"type":"paragraph","text":"下图：毛泽东主席同莫克塔·乌尔德·达达赫总统和夫人等毛里塔尼亚贵宾合影。"},{"type":"paragraph","text":"新华社记者摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]},{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[
