script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"阿尔巴尼亚报纸全力支持越南兄弟的正义斗争  谴责现代修正主义者向美国讹诈投降  缅作家杜阿玛说苏当局镇压反美示威是为奉承美国","authors":[],"dates":[{"year":1965,"month":3,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"阿尔巴尼亚报纸全力支持越南兄弟的正义斗争"},{"type":"paragraph","text":"谴责现代修正主义者向美国讹诈投降"},{"type":"paragraph","text":"缅作家杜阿玛说苏当局镇压反美示威是为奉承美国"},{"type":"paragraph","text":"据新华社地拉那十九日电　阿尔巴尼亚《人民之声报》和《团结报》今天就“三·一九”越南全国反美日十五周年分别发表评论，表示阿尔巴尼亚人民全力支持越南人民的正义斗争。"},{"type":"paragraph","text":"《人民之声报》的评论说，在越南全国反美日十五周年之际，阿尔巴尼亚人民再次表达对兄弟越南人民为之斗争的正义事业的全力支持，并要求美国侵略者立即从南越、从整个东南亚滚出去，要求立刻停止对越南民主共和国的侵略行动。"},{"type":"paragraph","text":"《团结报》在评论中说，世界各国人民和社会主义国家人民，特别是伟大的中国人民，支持英雄的越南人民，对他们反对美国侵略者的正义斗争给予帮助。只有现代修正主义者在美国的讹诈面前投降，再次暴露了他们反对各国人民反对帝国主义的丑恶嘴脸。苏联政府镇压苏联和外国留学生在莫斯科的反美示威，而对在美国使馆前发生的事情向美国政府表示“不安和遗憾”，这更加充分暴露了现代修正主义者的丑恶嘴脸。"},{"type":"paragraph","text":"新华社仰光十九日电　缅甸著名作家杜阿玛今天在《人民报》发表文章指出：“世界各地人民对美国侵略越南民主共和国感到极大的愤慨，在美国大使馆前面举行反美示威，抗议它的强盗行为。因此，亚洲、非洲和拉丁美洲学生在美国驻莫斯科大使馆前面举行反美示威，这是不足为奇的。”"},{"type":"paragraph","text":"她说：同一些亚非国家的反美示威的声势相比，在莫斯科的学生向美国大使馆投掷墨水瓶和石头，这并没有什么不寻常的地方。她指出：“但是，不寻常的事件发生了。苏联军警残酷镇压示威学生，野蛮地把他们打伤和逮捕。”"},{"type":"paragraph","text":"她说：如果这样的事件发生在菲律宾、泰国、南朝鲜和日本这样一些地方，倒还可以说得过去。“但是这是发生在第一个社会主义国家的国土上。人们怎能不感到痛心呢？”"},{"type":"paragraph","text":"她指出：“苏联当局镇压反美示威者的这一行动使自己变得很丑恶。使它自己陷于困境的不是别的原因，而是由于它一心想奉承美国政府。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b8b1967805"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
