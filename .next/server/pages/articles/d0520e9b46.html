script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"资产阶级民主自由的卫道者可以休矣！","authors":["哈尔滨军事工程学院红色造反团","红尖兵"],"dates":[{"year":1967,"month":5,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"资产阶级民主自由的卫道者可以休矣！"},{"type":"paragraph","text":"哈尔滨军事工程学院红色造反团　红尖兵"},{"type":"paragraph","text":"我国的无产阶级文化大革命，是历史上最广泛、最深刻、最伟大的革命的群众运动，是无产阶级专政下的大民主运动。"},{"type":"paragraph","text":"林彪同志说：“在毛主席正确路线的指引下，我国广大革命群众，创造了无产阶级专政下发展大民主的新经验。这种大民主，就是党无所畏惧地让广大群众运用大鸣、大放、大字报、大辩论、大串连的形式，批评和监督党和国家的各级领导机关和各级领导人。”"},{"type":"paragraph","text":"在文化大革命中，占世界人口四分之一的七亿中国人民，高举毛泽东思想伟大红旗，运用大民主的武器，在空前未有的广阔规模上发动了对旧世界、旧事物、旧思想的批判，揪出了党内一小撮大大小小走资本主义道路的当权派，横扫一切牛鬼蛇神，大破剥削阶级的四旧，大立无产阶级的四新，取得了一个又一个的伟大胜利。"},{"type":"paragraph","text":"这是人类有史以来从未有过的高度的真正的无产阶级民主，这是国际共产主义运动中的伟大创举，这是震撼世界的划时代的伟大事件！"},{"type":"paragraph","text":"苏修领导集团对于我们的无产阶级大民主胆战心惊，恐慌之至。他们同美帝国主义一唱一和，恶毒攻击我们的无产阶级大民主是什么“压制民主”啦，“破坏自由”啦，等等，不一而足。这些资产阶级老爷们居然把自己打扮成为“民主”、“自由”的卫道者了。"},{"type":"paragraph","text":"什么是“民主”？什么是“自由”？马克思列宁主义、毛泽东思想早就教导我们，在阶级社会里，民主和自由从来就是有阶级性的——只有阶级的民主自由，没有抽象的超阶级的民主自由。有资产阶级的民主自由，就没有无产阶级的民主自由；有无产阶级的民主自由，就没有资产阶级的民主自由。两者是根本对立，不可调和的。"},{"type":"paragraph","text":"中国的无产阶级文化大革命，以大量的事实证明了这个真理。"},{"type":"paragraph","text":"老实说，苏修领导集团恶毒地攻击我国文化大革命的这一套把戏耍得太露骨了，所以谁都看得明白：苏修老爷们这样暴跳如雷，破口大骂，就是因为我们造了党内一小撮修正主义分子的反，夺了他们的权，专了他们的政。苏修不过是在为自己的同伙喊冤叫屈，妄想我们革命群众手下留情，好让他们东山再起罢了！"},{"type":"paragraph","text":"当然，这是绝对办不到的。"},{"type":"paragraph","text":"毛主席教导我们：“我们对于反动派和反动阶级的反动行为，决不施仁政。我们仅仅施仁政于人民内部，而不施于人民外部的反动派和反动阶级的反动行为。”党内一小撮走资本主义道路当权派，是我们革命人民的死敌。我们决不能对他们施仁政。我们一定要把他们斗倒，斗臭，斗垮，把他们斩草除根，彻底挖掉在我国的修正主义根子，保证我国的社会主义江山永不变色。"},{"type":"paragraph","text":"苏修领导集团在攻击我们无产阶级大民主的一片叫嚣声中，居然还为自己唱起赞美诗来，吹嘘今天苏联的所谓“民主”“自由”。这真是象列宁说的那样“却把自己的耻辱拿来吹嘘”，无耻到极点了。"},{"type":"paragraph","text":"好吧！既然如此，我们倒要请问一声，在你们统治下的今天的苏联，究竟有什么“民主”？有什么“自由”？"},{"type":"paragraph","text":"你们能允许苏联人民坚持马列主义的革命原则，维护十月革命的光荣传统，保卫社会主义建设的成果吗？"},{"type":"paragraph","text":"你们能允许苏联人民反对你们的修正主义统治，反对资本主义复辟，反对你们投降美帝、出卖世界革命吗？"},{"type":"paragraph","text":"你们能允许苏联人民反对你们这些特权阶层、工人贵族多吃多占，作威作福吗？"},{"type":"paragraph","text":"你们能允许苏联人民把革命的大字报贴到克里姆林宫的墙上，允许他们在街头巷尾、工厂学校、城市乡村进行革命的大辩论，革命的大串连，允许他们起来揭你们修正主义的老底，造你们的反吗？"},{"type":"paragraph","text":"当然，你们是万万不敢这样做的。在你们那里，有的是警棍、皮鞭、监狱、疯人院，谁要是对你们的修正主义统治稍有不满，敢于反抗，就会立即被逮捕，镇压，以至遭到杀身之祸。你们宣扬的所谓“民主”“自由”，原来就是彻头彻尾的资产阶级的“民主”“自由”，就是约翰逊所吹嘘的那种“民主”“自由”！"},{"type":"paragraph","text":"说到这里，也就不难明白，为什么苏修领导集团对我们的无产阶级大民主要进行这样恶毒的诽谤和攻击了。因为他们害怕中国无产阶级文化大革命的烈火，烧掉他们这块资产阶级“民主”“自由”的遮羞布，而在苏联广大人民面前露出他们这一伙无产阶级革命叛徒的丑恶嘴脸来。他们知道，要是苏联人民也象中国人民那样起来造他们这一小撮修正主义分子的反，他们的修正主义统治就要完蛋了。"},{"type":"paragraph","text":"但是，纸是包不住火的。苏修领导集团想用颠倒黑白，诽谤污蔑的手段来封锁中国文化大革命的影响，掩盖他们修正主义统治的真相，压制苏联人民的革命斗争，又怎么可能呢？越来越多的苏联人民已经从大量事实中看清楚苏修领导集团的叛徒面目了。在中国文化大革命的有力冲击之下，苏联人民总有一天也会举起“造反有理”的革命旗帜，在苏联国土上展开一场急风暴雨的革命斗争，粉碎修正主义统治的枷锁，把这一小撮苏修头目扔进历史的垃圾堆。到那时候，马克思列宁主义的红旗将重新飘扬在克里姆林宫的上空，无产阶级专政将重新取代今天的资产阶级专政，而无产阶级大民主，也必将在十月革命的故乡放射出它的灿烂的光辉！"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d0520e9b46"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
