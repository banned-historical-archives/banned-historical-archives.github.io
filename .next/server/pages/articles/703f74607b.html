script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"遵照毛主席教导  解放思想  革新技术  凤凰山铁矿机械化和自动化程度提高","authors":[],"dates":[{"year":1966,"month":6,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"遵照毛主席教导  解放思想  革新技术"},{"type":"paragraph","text":"凤凰山铁矿机械化和自动化程度提高"},{"type":"paragraph","text":"据新华社南京十六日电  南京凤凰山铁矿职工以毛泽东思想为武器大破“洋教条”“洋框框”，针对生产关键大搞技术革新和技术革命。他们在今年前五个月之内完成的技术革新项目，数量之多、水平之高、作用之大，为历年来所没有。"},{"type":"paragraph","text":"在已经革新成功的技术项目中，有许多对解决全矿生产薄弱环节，提高机械化和自动化程度，提高工作效率，减轻劳动强度，节省人力，降低生产成本，都有很大作用，其中有些革新项目引起了全国中小型冶金矿山的普遍重视。"},{"type":"paragraph","text":"凤凰山铁矿职工今年以毛主席的卑贱者最聪明、高贵者最愚蠢的伟大思想为武器，大破“洋教条”、“洋框框”，大搞革新。他们说：头脑里有了毛泽东思想，人就聪明了，胆子就大了，思想开阔了，遇到困难也就不怕了。许多技术革新项目的试制成功，就是他们思想大解放的结果，汽车后桥差速器齿轮加工设备的试制成功，是一个突出的事例。后桥差速器齿轮，一般称为弧形伞齿轮，加工技术很复杂。特别是矿山用的大汽车上的齿轮更难加工。几年前，机修车间的职工曾经动手试制过这种加工设备，结果失败了。今年又重新提出要搞一台加工齿轮的土设备。他们到兄弟工厂参观学习，并且找了一些资料，都说明加工这种齿轮必须用复杂的洋设备。他们一开始就碰到了困难。车工组长徐宝兴说，碰到困难，就去学习毛主席著作。毛主席说：“我们必须学会全面地看问题，不但要看到事物的正面，也要看到它的反面。”徐宝兴想：我们对土和洋也要一分为二。洋设备好不是因为它本身洋、复杂，而是因为它能够加工出精密的齿轮；既然目前我们没有这种复杂的洋设备，能不能搞一个简单的土设备？搞出土设备，加工出精密的齿轮，不是比复杂的洋设备更高级、更洋吗？这样他的思路开阔了，认识到土和洋、简单和复杂的关系都不是绝对的，决不能迷信洋、迷信复杂。在党委鼓励、支持下，他和老工人、技术人员一起反复研究，经过一个月的努力，终于搞出了一台结构简单的加工设备，全部费用只花了六百多元。利用这台设备加工的齿轮，最早的已装上汽车用了三个多月，证明质量完全合乎要求。"},{"type":"paragraph","text":"类似这样的例子多得很。象矿石加工集中控制装置，微差爆破仪，等等，都是职工们遵照毛主席教导，解放思想，敢想敢干地创造出来的。"},{"type":"paragraph","text":"凤凰山铁矿职工今年已搞成的革新项目，大部分都没有花钱，或者花钱很少。这是因为，他们坚决贯彻执行了毛主席的教导：“中国是一个大国，但是现在还很穷，要使中国富起来，需要几十年时间。几十年以后也需要执行勤俭的原则，但是特别要提倡勤俭，特别要注意节约的，是在目前这几十年内，是在目前这几个五年计划的时期内。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"703f74607b"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
