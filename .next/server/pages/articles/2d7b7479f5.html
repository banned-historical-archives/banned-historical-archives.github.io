<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"资产阶级思想影响模糊了我的阶级立场","authors":["石瑛"],"dates":[{"year":1952,"month":6,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"圣玛利亚女中初三甲学生　石瑛"},{"type":"paragraph","text":"我父亲是一个在圣玛利亚女中工作了多年的工友，母亲是一个纺织工人。我在小时候是很喜欢劳动的，经常帮助母亲做做家事:洗衣服、烧饭……身上穿的是打了补钉的衣服，脚上着的是布鞋；四周接触的都是一些穷苦的亲戚、朋友，劳动人民的感情都是诚恳朴实的，大家的心紧地扣在一起。"},{"type":"paragraph","text":"进了圣玛利亚女中以后，经不住资产阶级思想的影响、包围，我的思想感情起了变化，终于迷糊了自己的阶级立场。"},{"type":"paragraph","text":"我看见同学们穿得都很漂亮，吃东西也很考究，每顿吃饭很少，上完第二节课，自己买点心吃；来去有家里的汽车接送，每星期能看几次电影。日子久了，我心里就滋长了羡慕她们的念头。我恨自己的父母为啥是个穷工人，没有开厂，做大老板，不能供给我过她们那种舒服、享受的生活。我心情非常苦闷，成天想:自己怎样也能有这样一天就好了。渐渐的，我布鞋也不要穿了，有一次母亲因为做夜班，利用白天休息的机会，牺牲睡眠给我做了一双布鞋，随怎样讲我也不肯穿，强着要家里替我买皮鞋，为的是不在同学面前“丢脸”，被认为是“乡下人”。"},{"type":"paragraph","text":"在反动统治的那些黑暗的岁月里，一个校工的女儿是多么受人轻视!同学们都嫌我出身低微，穿得不好看，不愿和我接近；我心里感到委屈和苦痛。但我认识不到真理，不恨旧社会，不敢起来反抗；相反的，我成了资产阶级思想的俘虏，转而也瞧不起自己的阶级。每次路上碰着我的亲戚，我总不愿打招呼。有一次我同我母亲走过中山公园，忽然迎面来了一个同学，我赶着就逃开了，害怕她看了出来。平时在学校里，我看见父亲来了，总想尽办法兜圈子，老远地就避着他，碰见了也不高兴叫他；我担心新同学知道了我是他的女儿，就不跟我来往了。为了和有钱的同学交朋友，我遇事迁就她们，一切跟着她们做；可是到了劳动者面前，我又神气活现，自鸣不凡了。"},{"type":"paragraph","text":"资产阶级腐朽思想的影响，更使我发展到敌我不分的程度。在学校里美国教师的“说教”下，我就狂想着到美国留学，变成美国人。我不以为耻，反而觉得非常“光荣”。"},{"type":"paragraph","text":"解放以后，在党、团的教育下，我的头脑开始清醒了，认识了工人阶级的主人翁的地位。我不再以自己的出身为可耻，而感到光荣和骄傲了。可是资产阶级思想仍像魔鬼一般缠绕着我不放。我还没有放弃“向上爬”的自私自利念头。我对团支委这样的岗位最感兴趣，为的是可以在全校跑跑，出出风头，让大家都晓得我的名字。在学习上，我不愿帮助别人，害怕别人比我考得好，我只想自己一个人好，没有想到祖国建设多么需要更多的优秀的人才。"},{"type":"paragraph","text":"通过这次五反运动的教育，使我真正认识到了资产阶级的丑恶面貌，那种损人利己、唯利是图、享乐至上的腐化堕落思想又怎样腐蚀了我们青年学生。我决心在这次思想检查中，毫不留情的把我头脑中这个资产阶级思想的根挖出来，把它清除干净，更好的工作、学习，继承工人阶级的优良品质，立志永远做一个劳动者，为祖国建设贡献自己的全部力量。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2d7b7479f5"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
