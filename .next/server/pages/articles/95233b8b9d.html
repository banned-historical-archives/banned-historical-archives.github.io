" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"赵紫阳在全省处理人民来信、来访工作会议上的讲话","authors":[],"dates":[{"year":1957,"month":7,"day":13}],"is_range_date":false,"parts":[{"text":"赵紫阳在全省处理人民来信、来访工作会议上的讲话","type":"title"},{"text":"【原编者按：毛主席说：“世上决没有无缘无故的爱，也没有无缘无故的恨。”反革命修正主义分子赵紫阳利用《在全省处理人民群众来信、来访工作会议上的讲话》的机会，大肆推销反革命修正主义黑货。他蓄意抹煞资本主义与社会主义两个根本制度的界限，胡说“有些毗邻港澳的村镇同港澳之间可以说是城乡关系。”他还胡说“有些人一定要去港澳的，就可以允许他去，中国人很多，让他出去一些没有什么了不起的坏处……；你越不让去他就非要去不可……。”这话简直混帐到了极点，是蓄意给地、富、反、坏、右大开方便之门，使他们逍遥法外，继续与人民为敌，从事反革命活动；使一些暂时受蒙蔽的基本群众脱离社会主义祖国，跳进火坑。什么人才能干出这种罪恶勾当！这岂不是刘、邓、陶在广东的代理人赵紫阳又一次禀承“南霸天”陶铸旨意，进行的反党反社会主义反毛泽东思想的罪恶活动吗？】","type":"paragraph"},{"text":"（附原文）","type":"appellation"},{"text":"一、 各地要进一步把处理群众来信、来访工作做好（略）","type":"subtitle"},{"text":"二、对几个具体问题的意见","type":"subtitle"},{"text":"（一） 关于群众要求去港澳或者要求出国的问题。据说，来信、来访中有许多华侨及其他方面的人士要求去港澳，而有关部门又不批准，所以感到不好办。我想，今后对于去港澳的限制可以适当的放宽些，因为港澳同广东在历史上有着千丝万缕的联系，有些毗邻港澳的村镇同港澳之间可以说是城乡关系。因此，有些人一定要去港澳的，就可以允许他去，中国人很多，让他出去一些没有什么了不起的坏处，到港澳去的人多了，那里没有房子住、没有粮食吃，人们也就再不愿意去了；你越不让去他就非要去不可，有人觉得香港、澳门好象“天堂”一样，其实那里失业、失学的人很多，许多国民党的伪军官及政客官僚在街头作小贩，他们的女儿则作娼妓，那有什么出路呢？我们是可以放宽去港澳的限制的，现在的问题是香港英方不让去那么多人。对于渔民也不能硬要把他们固定下来不许出去，结果反会造成人为的过分紧张。有不少群众是因为受了欺骗性的宣传，羡慕与想望香港的生活，但是他不了解真象，真的去了之后，到那里并没有生活出路，也就不愿意去了。因此，要把道理向群众讲清楚，硬要去的可以允许并告诉他们，目前是香港方面搞所谓“出入口平衡”的限制，所以不能怪我们。","type":"paragraph"},{"text":"（二）历次运动的遗留问题（略）","type":"paragraph"},{"text":"（三）就业问题（略）","type":"paragraph"}],"comments":[],"origin":"《广东党内最大的走资派赵紫阳毒草篇》（供批判用），广东省军管会革委会宣传小组编印，1967年12月。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"赵紫阳","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"95233b8b9d"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
