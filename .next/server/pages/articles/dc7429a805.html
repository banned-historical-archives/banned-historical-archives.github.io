script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"英勇反抗垄断资产阶级的残酷剥削和压迫美国黑人狙击手又和警察进行枪战","authors":[],"dates":[{"year":1969,"month":9,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京二日电　华盛顿消息:美国康涅狄克州哈特福德市和佛罗里达州劳德代尔堡的广大黑人群众，在美国垄断资产阶级的残酷剥削和压迫下，忍无可忍，连日来不断掀起抗暴斗争，再次显示了在广大美国黑人中蕴藏着的巨大革命力量。"},{"type":"paragraph","text":"康涅狄克州哈特福德市的黑人从一日晚开始奋起抗暴后，斗争迅速从这个市北部的黑人聚居区向市中心扩展。大批黑人青年走上街头用砖头和石块和法西斯警察搏斗，并且推翻了一些白人种族主义者的车辆。当法西斯警察向黑人群众施放大量催泪瓦斯时，许多黑人狙击手又英勇地和法西斯警察进行枪战，打坏了一辆便衣警察使用的车辆，打伤了一名警犬管理员。"},{"type":"paragraph","text":"八月三十一日晚，当大批法西斯警察无故向佛罗里达州劳德代尔堡的黑人群众寻衅时，黑人们英勇地奋起回击，许多黑人青少年从一个建筑工地搬来了大批石块作为反击的武器，一些黑人狙击手还开枪回击法西斯警察。当地反动当局急忙派出警察特遣队，出动骑警和装甲车，对黑人区进行不断的“扫荡”。但是直到二日，劳德代尔堡黑人的抗暴斗争仍在坚持中。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dc7429a805"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
