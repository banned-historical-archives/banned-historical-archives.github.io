script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反对英国资本剥削　不怕反动当局镇压  加纳六千金矿工人英勇坚持罢工斗争  全非工会联合会发表声明支持加纳工人斗争","authors":[],"dates":[{"year":1969,"month":3,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反对英国资本剥削　不怕反动当局镇压"},{"type":"paragraph","text":"加纳六千金矿工人英勇坚持罢工斗争"},{"type":"paragraph","text":"全非工会联合会发表声明支持加纳工人斗争"},{"type":"paragraph","text":"新华社八日讯　阿克拉消息：加纳阿撒蒂金矿区的六千名矿工，不顾反动当局的血腥镇压，已经坚持了近一周的罢工，反对英国资本经营的阿撒蒂金矿公司的剥削，要求保证矿工的权利。"},{"type":"paragraph","text":"阿撒蒂金矿工人是三日在加纳中部最大的奥布瓦西矿场开始举行罢工和示威的。当天，加纳反动当局出动大批警察进行残酷镇压，当场开枪打死矿工五人，打伤数十人。随后，反动当局又出动大批军警到奥布瓦西，要矿工在限期内接受外国资方的条件，在七日复工。罢工工人不顾反动当局的威胁和恫吓，继续英勇地坚持斗争。"},{"type":"paragraph","text":"方圆几十英里的阿撒蒂矿区是加纳的最大黄金产地，也是资本主义世界最大金矿之一。加纳在一九五七年独立之后就把掠夺这一金矿达六十年之久的英国阿撒蒂金矿公司收归国有。去年十一月，在一九六六年上台的加纳政变当局，不顾人民的反对，只用三千六百万美元的代价，就把每年收入达七百多万美元的金矿公司的全部股权，出卖给英国的伦罗公司。"},{"type":"paragraph","text":"英国《西非》杂志承认，对伦罗公司说来，获得阿撒蒂金矿“极为重要”，因为单单这个金矿去年一年的利润，“就远远超过伦罗集团迄至一九六六年为止的历年赢利”。据报道，伦罗公司还打算插手加纳的酿酒、制糖等工业，以扩大它对加纳经济的掠夺。"},{"type":"paragraph","text":"新华社达累斯萨拉姆七日电　全非工会联合会在这里发表声明，谴责加纳军政府屠杀奥布瓦西金矿工人，号召加纳工人继续展开反对加纳反动军事统治集团和反对帝国主义剥削的斗争。"},{"type":"paragraph","text":"声明指出，加纳工人遭受加纳军政权极端残暴的压迫。这个政权一心想出卖国家的丰富资源，并迫不及待地保护外国的利益。"},{"type":"paragraph","text":"声明谴责加纳军政权取消原来的矿藏国有化措施，把奥布瓦西金矿出卖给外国公司。声明还“强烈谴责这种枪杀抗议外国剥削的手无寸铁的工人和剥夺他们的权利的行径”。"},{"type":"paragraph","text":"声明说：“全非工会联合会向斗争中的加纳工人保证，非洲和全世界进步工人给予他们有力的支持；并号召加纳工人继续斗争，直到外国剥削和军事压迫被击败。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fad30b02a3"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
