script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"中国哲学史讨论会中的修正主义倾向","authors":[],"dates":[{"year":1958,"month":6,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"去年1月间，北京大学哲学系召开了一次中国哲学史问题的讨论会，后来并由科学出版社出版“中国哲学史问题讨论专辑”；但是在这次讨论会中出现有修正主义的倾向。最近，黄丹森和张恩慈两人合写了一篇“略论中国哲学史讨论会中的修正主义倾向”(发表在1958年第二期的“北京大学学报”上)，指出有些到会的哲学家发言，竟背弃了马克思列宁主义的哲学党性原则。"},{"type":"paragraph","text":"这篇文章首先指出，在唯物主义与唯心主义的根本对立的问题上，贺麟强调唯物主义中有辩证唯物主义，也有形而上学唯物主义；唯心主义中有形而上学唯心主义，也有辩证唯心主义。这种说法的目的，在于他企图以辩证法和形而上学的根本对立来代替唯物主义与唯心主义的根本对立。这完全是错误的。辩证法和唯物主义是马克思列宁主义哲学的不可分割的两个方面，唯心主义的辩证法和形而上学的唯物主义都不是科学的。哲学上根本对立的是唯物主义和唯心主义，而不是辩证法与形而上学。所以，贺麟否认唯物主义与唯心主义的根本对大，无异于否认真理和谬误的根本对立。"},{"type":"paragraph","text":"在关于哲学的阶级问题上，这篇文章又指出，冯友兰和贺麟都是否认哲学的阶级性的。不过在他们的发言中，没有干脆和直接否认罢了。反对哲学的阶级性最露骨的要算是右派分子朱启贤。在他看来，“哲学，只要它是真理，就是超阶级的”。"},{"type":"paragraph","text":"这些哲学家都是自称坚持“辩证唯物主义”的，但是在事实上，他们发表的论点，都是反马克思主义的，不能不称为修正主义的观点。但是修正主义是右派进攻的主要武器，哲学上的修正主义是这个修正主义逆流中的一个支流。因此，这篇文章的结论写道:“坚持哲学党性原则，同一切唯心主义观点、修正主义观点作斗争，也是今天思想战线上迫切任务之一”。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4d355b87e2"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
