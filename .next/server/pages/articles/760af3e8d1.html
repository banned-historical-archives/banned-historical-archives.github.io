script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"黎化南同志追悼会在京举行党和国家领导人邓小平等送了花圈","authors":[],"dates":[{"year":1978,"month":12,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社北京十二月三日电　政协第五届全国委员会委员、中国人民解放军总参谋部管理局顾问黎化南同志，因病医治无效，于一九七八年十一月二十六日在北京逝世，终年六十九岁。"},{"type":"paragraph","text":"黎化南同志追悼会于十二月三日在北京八宝山革命公墓礼堂举行。"},{"type":"paragraph","text":"党和国家领导人邓小平、徐向前、余秋里、李井泉、王震、康世恩等送了花圈。中共中央军委、政协全国委员会、中国人民解放军总参谋部、总政治部、总后勤部等单位也送了花圈。"},{"type":"paragraph","text":"余秋里、李井泉、王震、康世恩、胡耀邦、张平化、杨勇、王平、李达、何正文、徐立清等同志参加了追悼会，并向黎化南同志的家属袁光轩同志表示亲切慰问。"},{"type":"paragraph","text":"追悼会由中国人民解放军副总参谋长迟浩田主持，副总参谋长王尚荣致悼词。"},{"type":"paragraph","text":"参加追悼会的还有黎化南同志的生前友好和中国人民解放军总参谋部机关代表八百多名。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"王震","type":"人物"},{"name":"余秋里","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"760af3e8d1"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
