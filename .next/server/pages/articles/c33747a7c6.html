script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"法国《新人道报》谴责苏修集团为美帝效劳充当反华先锋  强调不能同现代修正主义“联合行动”","authors":[],"dates":[{"year":1966,"month":9,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"法国《新人道报》谴责苏修集团为美帝效劳充当反华先锋"},{"type":"paragraph","text":"强调不能同现代修正主义“联合行动”"},{"type":"paragraph","text":"新华社巴黎电　法国共产主义运动（马克思列宁主义）机关报《新人道报》严厉谴责苏联共产党和法国共产党修正主义领导集团掀起反华运动，为美帝国主义效劳。"},{"type":"paragraph","text":"九月号的《新人道报》说，莫斯科各新闻机构接受苏联政府命令，在发动反华诽谤中打先锋。塔斯社发出了反对中国共产党、反对马克思列宁主义的种种谰言，为西方热情效劳。"},{"type":"paragraph","text":"《新人道报》接着说，法共修正主义领导人最猖狂地对“敬爱的毛泽东同志倾泻令人恶心的污蔑”，“对领导七亿中国男女为了人类文明的最大利益而进行着无产阶级革命的中国共产党进行最无根据的诽谤。他们支持旧的腐朽的社会和西方资本主义的卑鄙道德，反对积极培养着共产主义新人的共产主义文化革命。”"},{"type":"paragraph","text":"《新人道报》强调指出：“现代修正主义领导为了更好地（在为美帝国主义方面）起作用，竟敢侈谈社会主义国家和各国共产党和工人党‘联合行动’。”《新人道报》问道：难道能同这样的人“联合”吗？他们继续同侵略者保持友好关系，在一系列会议上同侵略者的代表坐在一起而不感到厌恶，他们之所以给予越南人民以“援助”，只是由于这种“援助”能成为他们的托词，以利于他们搞欺骗勾当。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c33747a7c6"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
