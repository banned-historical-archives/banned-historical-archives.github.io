script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"用抓革命促生产的实际行动回击右倾翻案风  大冶县工交财贸部门积极支援春耕","authors":[],"dates":[{"year":1976,"month":3,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"用抓革命促生产的实际行动回击右倾翻案风"},{"type":"paragraph","text":"大冶县工交财贸部门积极支援春耕"},{"type":"paragraph","text":"新华社武汉电　湖北省大冶县工业、交通、财贸部门职工，进一步树立发展国民经济“以农业为基础”的思想，积极支援春耕生产。"},{"type":"paragraph","text":"大冶县是湖北省重要矿产区之一。无产阶级文化大革命以来，县委带领群众自力更生地开发矿业，发展支农工业，先后办起了一批直接为农业生产服务的化肥、钢铁、水泥、煤炭、农机等地方工业，生产了大批农业机械，有力地支援了全县的农业生产。"},{"type":"paragraph","text":"为了更好地支援农村社、队搞好今年的春耕，这个县的工业部门提前安排了支农产品的生产。去年下半年以来，县钢铁厂大搞技术革新，用本地柴煤炼的焦炭来炼铁、轧钢，为生产支农产品提供了三百多吨钢材。各农机厂利用这些钢材生产了大批插秧机、拔秧机、割晒机、变压器、电动机、水泵、农用拖斗等农业机械。这些农业机械，将使这个县的耕作能力比去年提高二倍以上。县农机修造厂为了增产柴油机支援春耕，干部工人团结一致奋战，今年头两个月的柴油机产量比去年增加一倍以上。"},{"type":"paragraph","text":"为了充分发挥支农机械在春耕生产中的作用，县农机部门还专门抽调力量，先后举办四期训练班，为农村社、队培训了六千四百五十多名技术人员，给今年春耕生产准备了技术骨干队伍。"},{"type":"paragraph","text":"县交通部门职工对支援春耕生产物资坚持优先安排，及时装运。入春以来，他们组织县直属各单位运输车辆为农村社队运送了春耕生产资料五千多吨。"},{"type":"paragraph","text":"目前，大冶县工业、交通、财贸部门职工正在认真学习毛主席的一系列重要指示，深入批判党内那个不肯改悔的走资派抛出的“三项指示为纲”的修正主义纲领，决心坚持以阶级斗争为纲，批判修正主义，批判资本主义，更好地支援春耕生产，用抓革命、促生产的实际行动，回击右倾翻案风。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"湖北文革","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"786fd8f355"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
