" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"右派言论——诋毁肃反运动","authors":["云南","杨家杰","王士魁"],"dates":[{"year":1957,"month":6,"day":10}],"is_range_date":false,"parts":[{"text":"右派言论——诋毁肃反运动","type":"title"},{"text":"云南王士魁杨家杰","type":"authors"},{"text":"(王士魁：云南大学教务长，民盟省委委员、云大支部主任委员)","type":"subtitle"},{"text":"王士魁","type":"paragraph"},{"text":"知识分子的思想改造运动是成功呢，还是失败呢？许多同志认为，解放以来知识分子在思想改造方面所取得的成绩，应该肯定是巨大的，但是思想改造运动本身是失败的。为什么这样说呢？因为知识分子的思想改造不是那个“改造运动”，是解放几年来不断的学习党的政策，理论，参加抗美援朝等运动，逐渐提高了阶级觉悟，被改造的人认为是主观的，其效果是适得其反的。(6月10、11日和云南日报记者谈话)","type":"paragraph"},{"text":"对镇反和肃反非常痛恨，他几乎是咬牙切齿地追问一个同志：“镇反，杀了上千万人你该记得？！”他曾说：“历史上没有哪那一朝不是残酷的。肃反，错了还不是如此，死了还不是死了。”(据民盟云大支部揭发，7月7日云南日报)","type":"paragraph"},{"text":"根据民盟云大支部的揭发王士魁曾说过这样一些话：王士魁对土地改革极其痛恨，他说：土地改革惨无人道，土改中不知冤枉了多少好人，土改的干部是野兽。","type":"paragraph"},{"text":"王士魁对镇压反革命和肃反运动是非常痛恨的，他几乎是咬牙切齿地追问一个同志：镇压，杀了上千万人你该记得？！他曾说：历史上没有那一朝不是残酷的，肃反错了还不是如此，死了还不是死了。","type":"paragraph"},{"text":"王士魁也痛恨三反五反，他曾说：三反五反中自杀事件层出不穷，共产党凭着“大胆怀疑”，从旧社会来的人不贪污不合乎规律，这两条来搞三反。","type":"paragraph"},{"text":"王士魁对思想改造，抗美援朝也诋毁，他说：抗美援朝初期，我有崇美恐美思想，当时说了些不好的话，是因为站在爱国主义的立场，怕打败仗，还不知美国是纸老虎。他又解释说，他的崇美思想“只有一半”他是和“一些西欧人士相同”，只崇拜美国的工业农业生产技术，鄙视美国的艺术，哲学，宗教。","type":"paragraph"},{"text":"王士魁毁谤解放以来的各种运动，他曾说：解放以来的各种运动都是幼稚、野蛮的，不合中国的民族性。撕破脸皮、揭穿丑恶、六亲不认等，就是野蛮。这些是从西天取经，从斯大林那里取来的。(云南日报7月7日)","type":"paragraph"},{"text":"杨家杰","type":"paragraph"},{"text":"过去一个运动，二个运动，死了多少人，自杀的，急成病而死的，冤枉死的，还有疯了多少人，而在运动中美其名曰“阶级教育”，还说打得愈重愈痛所受到的阶级教育才愈深愈大，改造才越有力，真的吗？事实怎样呢？过去的运动好像猴子把戏，把群众当做猴子，猴子越跳的高，领导人的声音叫得更大，锣鼓敲得更响，满面笑容，耍得妙。这说明什么呢？群众的眼睛是雪亮的，凭你七十二变，群众还是看得出的。党和政府对待人民，如果不从“立信”着手，而以运动为名，“立怕”这样压服的办法，是解决不了人民内部矛盾，而只会滋长矛盾的。我以为西洋把戏耍多了，人民就看穿了，不足稀奇了。","type":"paragraph"}],"comments":[],"origin":"《社会主义辩论集之二  毒草集(资产阶级右派的反社会主义言论)》，湖南人民出版社1957年10月版，内部发行。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"人民内部矛盾","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"36d10699af"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
