script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"所谓美国生活方式是野蛮的剥削制度真理报发表评论","authors":[],"dates":[{"year":1950,"month":6,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京十二日电】　据塔斯社莫斯科讯:真理报顷发表了巴格拉图尼论述美国强迫劳动的文章，作者指出，所谓‘美国的生活方式’，实际上是建筑在各种不同的强迫劳动的方式之上的。现在美国实行的塔夫脱——哈特莱法案，便是一个典型的奴隶劳动法律。游民律是又一个例子。各州还有它们自己的强迫劳动的同类法律。"},{"type":"paragraph","text":"作者说到美国奴隶制度的残余现象。‘解放了的黑人’，实际上又重新陷于奴隶状态。在美国南方，直到现在还可明显地看到奴隶制度，这种制度表现在对黑人与穷苦人的伙种制度、还债劳动制度、对雇用的黑人工人采用特殊的劳动条件等等。"},{"type":"paragraph","text":"对移民及战后对流民和难民所实行的契约劳动制度，在美国也很普遍。美国除了实行合法化的输入廉价劳动力之外，还在移民当局鼓励下，私运劳动力入境。这种人在美国的生活和工作条件特别困苦。"},{"type":"paragraph","text":"美国还实行对罪犯的强迫劳动。在密士失必、得克萨斯和阿肯色等地区，就有着剥削集中营罪犯的劳动力的广大种植园，不仅是美国的监狱，就连精神病院也对病人实行强迫劳动，并因此尽可能长久地把他们关在里面。"},{"type":"paragraph","text":"作者在结语中写道:所谓‘美国的生活方式’，就是一种为着帝国主义强盗集团的利益而毫无人道地剥削千百万劳动人民的野蛮制度。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fe3b1106d9"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
