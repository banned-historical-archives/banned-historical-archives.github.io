<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"我给毛主席献上红袖章","authors":["杭生"],"dates":[{"year":1966,"month":8,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"我给毛主席献上红袖章亲爱的妈妈："},{"type":"paragraph","text":"今天，在首都百万人庆祝文化大革命的大会上，毛主席接见了我们全体红卫兵战士。全国人民、世界人民最最敬爱的领袖、我们最最伟大的统帅和舵手毛主席，接见我们全体红卫兵战士了！毛主席他老人家穿着一身草绿色的军装，头上的帽徽红光闪闪，鲜红的领章光芒万丈。毛主席他老人家身体非常非常健康，红光满面，神采奕奕。他老人家在早上五点钟就到了天安门城楼。毛主席他老人家有这样好的身体，这是我们全国人民，全世界人民的最大幸福！"},{"type":"paragraph","text":"今天上午六点五十五分，我们登上了雄伟、庄严、壮丽的天安门城楼。十点十分，毛主席接见了我们，林副主席、周总理都接见我们了。毛主席他老人家迈着稳健的步伐走到我们跟前。我左手擎着鲜红的《毛主席语录》，挤了上去，向他老人家献上了一个红卫兵的袖章。在那鲜红的袖章上，用黄色的丝线精心绣着红卫兵三个大字。在那鲜红的袖章上，整齐地别上了五枚不同的毛主席纪念章。当他老人家接过那缀满纪念章的鲜红袖章时，对我微微一笑。伟大领袖的微笑，激动得我热血沸腾，激动得我心咚咚地跳，欢喜的泪花滴溜溜转。高兴的我呀不知道怎么才好，马上立正，给我们心中最红最亮的红太阳毛主席他老人家恭恭敬敬地敬了一个礼。在见毛主席之前，同志们、战友们委托我告诉毛主席的话，这时候一句也记不起来了。我用我的全部热情高呼：“毛主席万岁！毛主席万岁！”事后我感觉下嘴唇有点痛，才知道高呼时把嘴唇咬破了。我还和毛主席他老人家握手合影了。他老人家的手又大又厚实又温暖。握着毛主席的手，我胸中燃烧着征服旧世界的怒火；握着毛主席的手，我胸中翻腾着解放全人类的风雷。握在手上，暖在心里，亮在心里。妈妈，您常说毛主席是我们最伟大的领袖，如今我亲眼见到了他老人家，而且看得那样清楚，那样真，我亲手给他老人家献了红袖章，还和毛主席他老人家握手合影了。妈妈，如今我成了世界上最最幸福的人了。妈妈，您一定也很高兴吧！将来我回家的时候，您可要记住一定要握我的手啊！"},{"type":"paragraph","text":"妈妈，好妈妈，爸爸和您在离开北京时，告诉我和哥哥：我们是革命军人的后代，父辈用血肉打下了江山，下一辈应该誓死保住它。要我们紧紧跟着毛主席，不离一步。妈妈，我正按您说的做呢。我热爱毛主席，我用我全部的精力来参加无产阶级文化大革命。虽然我还有很多的个人杂念，我还有很多的缺点，不过我一定按毛主席他老人家说的话去做：“因为我们是为人民服务的，所以，我们如果有缺点，就不怕别人批评指出。不管是什么人，谁向我们指出都行。只要你说得对，我们就改正。”"},{"type":"paragraph","text":"让毛主席他老人家和我们见面的这一天——八月十八日，成为我生活成长道路上的里程碑吧！亲爱的妈妈，我一定一定读毛主席的书，听毛主席的话，照毛主席的指示办事，做毛主席的最最最最忠实可靠的红色卫兵，像您当年当“红小鬼”一样，为伟大壮丽的共产主义事业奋斗终生，搞一辈子阶级斗争，准备和资产阶级打一辈子面对面的硬仗。"},{"type":"paragraph","text":"祝您成为永远革命的“老红卫兵”！"},{"type":"paragraph","text":"让我们共同祝福最最敬爱的毛主席万寿无疆！"},{"type":"paragraph","text":"红卫兵　杭生"},{"type":"paragraph","text":"八月十八日夜"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"90538e3443"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
