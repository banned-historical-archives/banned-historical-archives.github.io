script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"批判地主资产阶级“人性论”","authors":[],"dates":[{"year":1973,"month":3,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"批判地主资产阶级“人性论”"},{"type":"paragraph","text":"马田大队党员王佩玉，担任生产队长以后，工作热情、积极，重活脏活干在前，但由于存在“少得罪人少讨嫌”的思想，不敢开展积极的思想斗争，甚至连坏人挑拨干群关系，他也不敢抓。党支部为了帮助他提高路线斗争觉悟，决定通过组织生活，深入批判刘少奇一类骗子散布的地主资产阶级“人性论”。"},{"type":"paragraph","text":"组织生活会开始了，大队党支部书记翟凤友带领大家学习了毛主席有关阶级斗争和路线斗争的教导，然后从档案柜中拿出一本旧得发黄的本子给大家看。翻开本子，“王佩玉”三个大字赫然映入人们的眼帘，会场的气氛顿时严肃起来了。支部书记指着本子上的名字说：“阶级敌人妄想复辟他们失去的天堂，把我们党员、干部的名字记在他们的变天账上，时刻不忘阶级报复，连自己的亲属也不放过。可是我们有些同志却认为‘同宗共姓一家亲’，这种思想，是十分错误的。现在让我们共同批判刘少奇一类骗子反动的‘人性论’吧！”"},{"type":"paragraph","text":"支部书记的一席话，激发了王佩玉的无产阶级感情。他清楚地记得，这本阶级敌人的变天账，是两年前自己亲手从一个早已被人民政府镇压了的地主分子（自己的堂叔）家中搜出来的。他越想越气愤，霍地站了起来，激动地说，只有阶级亲，那有宗族亲！刘少奇一类骗子妄想用地主资产阶级的“人性论”、“阶级斗争熄灭论”欺骗劳动人民，要我们放弃阶级斗争，让地主资产阶级复辟，使我们再吃二遍苦。我们要是不敢斗争，不专阶级敌人的政，他们就要专我们的政啊！"},{"type":"paragraph","text":"会上，有许多同志发言。大家越批心越明，一致认为，共产党员千万不能忘记阶级斗争，要当阶级斗争和路线斗争的先锋战士。"},{"type":"paragraph","text":"打这以后，王佩玉勇敢地站到阶级斗争的第一线，带领全队社员批判了挑拨干群关系的坏分子，同时注意区分两类不同性质的矛盾，对人民内部的错误思想，也敢于进行批评。"},{"type":"paragraph","text":"本报通讯员"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f6b140eccd"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
