" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji48","name":"毛泽东全集第48卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji48.pdf"],"article":{"title":"毛泽东等祝贺越南民主共和国成立二十周年的电报","alias":"","parts":[{"type":"paragraph","text":"毛泽东等祝贺越南民主共和国"},{"type":"paragraph","text":"成立二十周年的电报"},{"type":"paragraph","text":"（1965年9月1日）河内越南劳动党中央委员会主席、越南民主共和国主席胡志明同志，越南民主共和国国会常务委员会主席长征同志，越南民主共和国政府总理范文同同志："},{"type":"paragraph","text":"在越南民主共和国成立二十周年的时候，我们代表中国人民、中国共产党和中华人民共和国政府，向兄弟的越南人民、越南劳动党和越南民主共和国政府，致以最热烈的祝贺。"},{"type":"paragraph","text":"二十年前，英雄的越南人民，在以胡志明主席为首的越南劳动党的领导下，经过长期艰苦斗争，赢得了民族独立，建立了越南历史上没有过的人民自己的国家一越南民主共和国。独立以后，越南人民高举革命的旗帜，继续同帝国主义进行了坚持不懈的斗争，取得了一个又一个的辉煌胜利，并在越南北方的社会主义建设事业中取得了巨大的成就。中国人民从兄弟的越南人民的胜利斗争中获得巨大鼓舞，并为他们的成就感到由衷的高兴。"},{"type":"paragraph","text":"目前，越南人民正在抗击着全世界人民最凶恶的敌人一美帝国主义的侵略，英勇地进行着抗美救国的伟大斗争。这场斗争，不仅是为了保卫越南的独立、主权和民族尊严，同时也是全世界人民毛泽东全集第四十八卷反对美帝国主义、保卫世界和平共同斗争的一个重要组成部分。越南人民坚强地屹立在反美斗争的最前线，狼狠地打击、削弱和牵制着美帝国主义的侵略力量和战争力量，从而也就有力地支持了全世界人民反对美帝、保卫和平的革命斗争。"},{"type":"paragraph","text":"现在，在越南战场上，英勇善战的越南人民越战越强；美帝国主义不断遭到失败。美帝国主义的纸老虎面自已经被英雄的越南人民进一步戳穿。越南人民敢于斗争、敢于胜利的革命精神和大无畏的英雄气概，赢得了全世界人民的衷心赞扬和钦佩。全世界人民都站在越南人民一边，同情和支持越南人民的正义斗争，坚信英雄的越南人民必能击败美帝国主义的侵略，取得最后的胜利。"},{"type":"paragraph","text":"中越两国是唇齿相依的社会主义邻邦。我们两国人民是情同手足的亲密战友。越南人民的斗争是对中国人民的巨大支持。中国人民坚决地支援越南人民的抗美救国斗争。中国人民已经做好一切必要的准备，决心同越南人民一道，为挫败美帝国主义的侵略而并肩斗争到底。"},{"type":"paragraph","text":"祝越南人民在保卫北方、解放南方、争取祖国统一的伟大斗争中取得新的、更大的成就。祝中越两国人民的战斗友谊万古长青。"},{"type":"paragraph","text":"中国共产党中央委员会主席毛泽东中华人民共和国主席刘少奇中华人民共和国全国人民代表大会常务委员会委员长朱德中华人民共和国国务院总理周恩来"},{"type":"paragraph","text":"一九六五年九月一日"}],"authors":["毛泽东"],"dates":[{"year":1965,"month":9,"day":1}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":181,"page_end":182},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cfbae23f90"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
