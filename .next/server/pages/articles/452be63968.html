script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"河南郑州市贸易公司领导干部  应纠正右倾思想和袒护贪污分子的行为","authors":["刘正明","吴剑迅","纪毓珏"],"dates":[{"year":1952,"month":3,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"河南郑州市贸易公司领导干部"},{"type":"paragraph","text":"应纠正右倾思想和袒护贪污分子的行为"},{"type":"paragraph","text":"编辑同志：河南省郑州市贸易公司的领导干部，在反贪污、反浪费、反官僚主义运动中，有严重的右倾思想和袒护贪污分子的行为。在反贪污运动中，北京市公营人民体育用品工厂，发现采购员刘文轩去年到郑州市贸易公司购买牛皮时，曾和郑州市贸易公司办事员侯中和、刘云峰互相勾结盗窃国家财产。侯中和、刘云峰带刘文轩到他们开设的隆源皮行和私营同德和、新生、合丰等皮行去购买牛皮，使国家资财受到了严重的损失。体育用品工厂为了把这个问题搞清楚，就派我们到郑州去调查。我们到了郑州，就去找该公司经理康斌，请他供给我们有关侯中和等的材料。但康斌说：“侯中和在一九五零年以前贪污四、五千万元，一九五一年以后不会有什么问题，因为一九五零年贸易公司里处理了一个贪污分子，大家都受到了教育。”以后我们又接连找过他几次，他不但没有很好地帮助我们，反而左推右托，要我们去找秘书，找人事科。我们最后一次去找他时，再三向他说明来意，要求他给以帮助，他才把侯中和叫来，并说：“侯中和！你的问题已经交代清楚了，再也不要有什么顾虑，你知道他们"},{"type":"paragraph","text":"（指我们）购皮子有什么问题，可以给他们谈一谈。”康斌身为经理，不但不好好动员侯中和交代问题，反而替他开脱，这种作法是十分错误的。当我们去向该公司人事科郜玉玺同志了解刘云峰的情况时，郜玉玺也同样把刘叫来说：“你的问题已经交代清楚了，领导上已宣布免予刑事处分，你知道的问题谈吧！”结果侯中和与刘云峰绝口不谈勾引刘文轩到私营皮行购皮，从中盗窃国家资财的事。事实上，他们的问题是否已经交代清楚了呢？据刘文轩自供：在侯中和的指使下，他只在隆源购买的皮子，就使人民体育用品工厂损失了二、三千万元。以上事实说明该公司领导干部的右倾麻痹思想是十分严重，我们认为，他们应该联系自己的工作作深刻检查。"},{"type":"paragraph","text":"刘正明  吴剑迅  纪毓珏"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"452be63968"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
