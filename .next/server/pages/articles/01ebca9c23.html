script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"坚决肃清资产阶级司令部的毒害","authors":["耿长锁"],"dates":[{"year":1968,"month":8,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"坚决肃清资产阶级司令部的毒害"},{"type":"paragraph","text":"全国农业劳动模范、河北省革命委员会副主任　耿长锁"},{"type":"paragraph","text":"两年前的今天，我们伟大领袖毛主席在八届十一中全会上发表了《炮打司令部》的大字报。毛主席的大字报，是摧毁以中国赫鲁晓夫为首的资产阶级司令部的决定性一炮，是保证我们党和国家永不变色的决定性一炮。两年来，广大无产阶级革命派和亿万革命群众，响应毛主席的伟大战斗号召，向资产阶级司令部发动了猛烈进攻。经过反复较量，把中国赫鲁晓夫及其在各地的代理人一个个地揪了出来，夺回了被他们篡夺去的那部分党、政、财、文大权，粉碎了他们妄图在中国复辟资本主义的罪恶阴谋。在这场激烈的阶级斗争中，全国各地成立了革命委员会，极大地强化了无产阶级专政，这是战无不胜的毛泽东思想的伟大胜利，是无产阶级文化大革命的辉煌战果！"},{"type":"paragraph","text":"伟大领袖毛主席教导我们：“世界上一切革命斗争都是为着夺取政权，巩固政权。而反革命的拚死同革命势力斗争，也完全是为着维持他们的政权。”在无产阶级文化大革命接近全面胜利的关键时刻，一小撮阶级敌人不甘心于他们的灭亡，他们还在作垂死的挣扎。他们变换各种花招，施展各种阴谋诡计，把攻击的矛头指向以毛主席为首、林副主席为副的无产阶级司令部，指向新生的革命委员会。我们决不能让这些家伙的阴谋得逞！我们一定要紧跟毛主席的伟大战略部署，大抓特抓阶级斗争，切实认真地做好清理阶级队伍的工作，向一小撮顽固不化的走资派、叛徒、特务和没有改造好的地、富、反、坏、右分子猛烈进攻，把他们一个个地揪出来，打翻在地，让他们永世不得翻身！我们必须深入持久地开展革命的大批判，把以中国赫鲁晓夫为首的资产阶级司令部所散布的一切流毒，彻底肃清，保证我们无产阶级的铁打江山永不变色！"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"革命委员会","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"清理阶级队伍","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]},{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"坚决肃清资产阶级司令部的毒害","authors":["耿长锁"],"dates":[{"year":1968,"month":8,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"全国农业劳动模范、河北省革命委员会副主任　耿长锁"},{"type":"paragraph","text":"两年前的今天，我们伟大领袖毛主席在八届十一中全会上发表了《炮打司令部》的大字报。毛主席的大字报，是摧毁以中国赫鲁晓夫为首的资产阶级司令部的决定性一炮，是保证我们党和国家永不变色的决定性一炮。两年来，广大无产阶级革命派和亿万革命群众，
