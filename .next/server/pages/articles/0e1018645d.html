script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"毛泽东主席会见比耶迪奇主席等贵宾  毛主席对比耶迪奇主席和夫人及其他南斯拉夫贵宾前来我国访问表示热烈欢迎，同比耶迪奇主席在亲切的气氛中进行了友好的谈话　邓小平副总理等在座","authors":[],"dates":[{"year":1975,"month":10,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛泽东主席会见比耶迪奇主席等贵宾"},{"type":"paragraph","text":"毛主席对比耶迪奇主席和夫人及其他南斯拉夫贵宾前来我国访问表示热烈欢迎，同比耶迪奇主席在亲切的气氛中进行了友好的谈话　邓小平副总理等在座"},{"type":"paragraph","text":"新华社一九七五年十月八日讯　毛泽东主席今天上午会见了南斯拉夫社会主义联邦共和国联邦执行委员会主席杰马尔·比耶迪奇和夫人拉集娅·比耶迪奇及随同来访的其他南斯拉夫贵宾。参加会见的比耶迪奇主席的随行人员有：联邦执行委员会委员、老战士和残废军人问题委员会主席玛拉·拉迪奇，联邦执行委员会委员、联邦外贸部长埃米尔·卢德维盖尔，联邦外交部副部长拉扎尔·莫伊索夫，南斯拉夫驻中国大使米洛伊科·德鲁洛维奇，南斯拉夫人民军总参谋长助理尼古拉·佩伊诺维奇中将，联邦执行委员会主席的外交政策顾问尼古拉·齐查诺维奇。会见时，毛主席同比耶迪奇主席和夫人及其他南斯拉夫贵宾一一握手，对他们前来我国访问表示热烈欢迎。随后，毛主席同比耶迪奇主席在亲切的气氛中进行了友好的谈话。会见时，邓小平副总理、王海容副部长、唐闻生副司长在座。"},{"type":"paragraph","text":"毛泽东主席和杰马尔·比耶迪奇主席握手。新华社记者摄（附图片）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0e1018645d"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
