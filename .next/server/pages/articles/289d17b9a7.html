<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"毛泽东思想是强大的战斗武器  古巴人民热爱《毛主席语录》努力学习毛泽东思想","authors":[],"dates":[{"year":1967,"month":3,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛泽东思想是强大的战斗武器"},{"type":"paragraph","text":"古巴人民热爱《毛主席语录》努力学习毛泽东思想"},{"type":"paragraph","text":"据新华社十六日讯　哈瓦那消息：古巴朋友热爱《毛主席语录》，称赞《毛主席语录》是“最宝贵的书”，并且表示要努力学习。"},{"type":"paragraph","text":"永远把革命宝书带在身边"},{"type":"paragraph","text":"一位无限热爱毛主席的古巴工人每次见到中国同志，都要满怀希望地问一句：“西班牙文版的《毛主席语录》来了吗？我什么时候才能得到这本红色宝书？”"},{"type":"paragraph","text":"暂时得不到西班牙文版的《毛主席语录》怎么办呢？这位古巴工人想出了一个办法：他每次和中国同志见面时，都请中国同志拿起中文版的《毛主席语录》为他口头翻译一段，自己则聚精会神地倾听着和记忆着，这差不多成了他同中国同志会面时不可缺少的课程。"},{"type":"paragraph","text":"有一天，中国同志把一本西班牙文版的《毛主席语录》送给他。这位古巴工人兴奋地同中国同志紧紧地握手。他激动地说：“太好了！太好了！我终于得到了我等待了许久的宝书。我要永远把《毛主席语录》放在口袋里，随时学习这本宝书。”"},{"type":"paragraph","text":"一定好好学习毛泽东思想"},{"type":"paragraph","text":"几位中国同志在古巴一个山区旅行的时候遇到了一位古巴老农民。"},{"type":"paragraph","text":"“是中国人吗？”老人问道。"},{"type":"paragraph","text":"一位中国同志右手举起红彤彤的《毛主席语录》，左手指着胸前金光闪闪的毛主席像章回答说：“我们是中国人，从北京来的。”"},{"type":"paragraph","text":"老农民兴奋地说：“好极了，你们是伟大的毛主席领导下的中国同志。毛主席，是毛主席使中国历史一下子前进了五百年！”"},{"type":"paragraph","text":"他接着解释说，中国的长征，中国的革命，中国的建设，中国的核试验，只有在毛主席领导下才取得了那么迅速和那么巨大的胜利。"},{"type":"paragraph","text":"老人激动地告诉中国同志，他已经收集到了三十二种毛主席著作单行本。他一有空就阅读这些著作。"},{"type":"paragraph","text":"当老人知道中国同志手上拿的是西班牙文版的《毛主席语录》时，便恳切地要求送给他一本。老人说：“我已经六十三岁了。我参加过古巴历史上的好几次革命运动。我读了毛主席的书。我从亲身的经历中体会到，毛主席是世界人民的领袖。”"},{"type":"paragraph","text":"分别的时候，老人高举《毛主席语录》，热情地对中国同志说：“同志们，放心吧，我一定好好学习这本书！”"},{"type":"paragraph","text":"在生活和工作中活学活用"},{"type":"paragraph","text":"一位古巴职员从他的朋友那里看到一本西班牙文版的《毛主席语录》，这正是他向往了许久的宝书，他立刻向那位朋友借来在当天晚上阅读了一遍。"},{"type":"paragraph","text":"第二天，这位古巴职员访问了他熟识的中国朋友，要求无论如何为他找一本西班牙文版的《毛主席语录》。当他得到了一本《毛主席语录》以后说：“我一定好好学习这本宝书，不仅阅读和学习，还要象中国同志那样在生活中和工作中活用。”"},{"type":"paragraph","text":"一位古巴女教授从中国朋友那里得到一本西班牙文版的《毛主席语录》时，她把《毛主席语录》高高举起来说：“毛泽东思想是精神原子弹。中国红卫兵在中国无产阶级文化大革命中把毛泽东思想作为打倒党内一小撮走资本主义道路当权派的武器，中国留学生在莫斯科红场把毛泽东思想作为反对苏联修正主义领导人的法西斯暴行的武器，我们也一定把毛泽东思想作为战斗的武器来使用。”"},{"type":"paragraph","text":"（附图片）"},{"type":"paragraph","text":"《毛主席语录》是红色宝书，越读心里越亮堂，读了浑身是力量。图为几内亚工人正在学习《毛主席语录》。"},{"type":"paragraph","text":"新华社记者摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"289d17b9a7"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
