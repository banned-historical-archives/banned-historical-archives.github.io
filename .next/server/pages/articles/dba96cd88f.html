" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共中央转发“广州军区三支两军政治思想工作座谈会纪要”（概要）","authors":[],"dates":[{"year":1971,"month":8,"day":20}],"is_range_date":false,"parts":[{"text":"中共中央批发“广州军区三支两军政治思想工作座谈会纪要”（概要）","type":"title"},{"text":"1971年8月20日，中共中央批发《广州军区三支两军政治思想工作座谈会纪要》。毛泽东批准并在中央批语上增加了“认真研究”四个字，要求引起重视。《纪要》是根据7月15日至31日广州军区召开的三支两军政治思想工作座谈会讨论精神写成的。《纪要》指出：军区现有2万多名干部战士参加三支两军工作，其中担任省（区）、县和相当县以上革命委员会工作的有3744人，有78％的县以上党委书记和革命委员会主任是军队干部。《纪要》指出：军队三支两军人员对地方党委组织也应当尊重和支持。为了保证地方党委实行一元化的领导，维护地方党委的威信，《纪要》规定：凡参加地方党组织生活的三支两军人员，必须接受地方党委（支部）的统一领导；在地方各级党委中担任领导职务的，特别是担任一、二把手的军队干部，必须正确理解党的一元化方针，对三支两军人员实行军队和地方共同管理，以地方为主的办法。《纪要》反映：三支两军人员中存在骄傲跋扈、好大喜功、任人唯亲、打击报复、滥用职权、违法乱纪等错误的思想作风；有些人存在着特权思想，不尊重、不支持已经成立的地方党委。这些现象必须加以改正。毛泽东在南方巡视途中与各地负责人谈话时，再次就这个《纪要》所提出的问题说：“地方党委已经成立了，应当由地方党委实行一元化领导。如果地方党委已决定了的事，还拿到部队党委去讨论，这不是搞颠倒了吗？”","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"三支两军","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dba96cd88f"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
