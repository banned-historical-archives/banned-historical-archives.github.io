script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"新富农雇用长工不算封建剥削","authors":["刘太岐"],"dates":[{"year":1948,"month":9,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新富农雇用长工不算封建剥削编辑同志："},{"type":"paragraph","text":"现在我处各街都是写的开展大生产努力发家致富的标语，唱的也是大生产的歌子，都是号召大家努力生产，学习劳动英雄们劳动发家的好榜样，可是群众说，有些劳动英雄如吴满有等家里种着很多土地，喂着牛羊驴，并且还用着长工，这算不算封建剥削呢？在我们这里用过长工的户都按地主或富农清算了，这些新发的劳动英雄难道就不是封建吗？划分阶级不是按土地占有和剥削关系划分的吗？那么这些户不是封建富农是什么呢？群众问我，把我问住了，请快给以答复，以免群众心里有疙瘩不敢大胆生产。"},{"type":"paragraph","text":"武安四区小屯小学刘太岐"},{"type":"paragraph","text":"答：凡在民主政府政策的扶植下，而劳动生产上升为富农者，非封建富农，因其土地财产的占有，非由封建剥削所得，主要靠劳动起家，应是新式富农。虽然他们雇长工，但因其系资本主义式的剥削，而非封建剥削。对他们应和富裕中农同等看待。新式富农为什么是资本主义剥削而非封建剥削呢？其区别是新富农所雇佣的长工在政治地位和经济待遇上和旧富农的封建剥削都有基本的不同，前者雇工和雇主在政治上是完全平等的，契约是双方自愿订立的，雇工可以参加农会，可以参加村里的政治活动，自然更取消了雇主对雇工的封建性的奴役及人身人格上的虐待污辱等。在经济上，雇工虽还被雇主剥削其剩余价值，但一般工资生活待遇在双方契约条件下有一定保障，而废除了雇主对雇工的任意非法剥削克扣及其他超经济剥削。"},{"type":"paragraph","text":"党的政策是允许新富农的存在和发展的。任弼时同志在“土地改革的几个问题”中明确指出：“这种富农的存在对我们并无害处。而且在将来一个时期内还会发展的。过去我们鼓励这种富农，例如吴满有那样的人们，发展其生产，对于确定中农，刺激中农的生产热情，起了很大作用，我们今后的政策，还是应当如此。”即在咱们华北，也有这种例子，比如太行的劳动英雄李顺达，太岳的石振明等，他们都是劳动致富，曾雇用长短工，不断受到共产党和民主政府的表扬奖励。这对稳定中农刺激中农的生产热情起了很大作用。这个政策，过去现在都是正确的，今后还要继续执行，今后也允许雇长工，自由买卖土地，大家放心大胆的努力生产去发财，政府绝对加以保护。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"54c0ca05a1"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
