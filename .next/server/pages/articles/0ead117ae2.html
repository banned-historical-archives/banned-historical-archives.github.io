<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"陈伯达在北京军区学习毛主席著作积极分子代表大会上的讲话","authors":["陈伯达"],"dates":[{"year":1967,"month":11}],"is_range_date":false,"parts":[{"text":"陈伯达在北京军区学习毛主席著作积极分子代表大会上的讲话","type":"title"},{"text":"陈伯达","type":"authors"},{"text":"北京和整个华北是中央所在地，是毛主席所在地。你们是学习毛主席著作积极分子。你们这样积极学习毛主席著作，是很好的。全中国不只是一个华北，如果不好好学习毛主席著作，我们就陷入迷途了。","type":"paragraph"},{"text":"最重要的是学了以后要见于行动。小团体主义、个人主义、山头主义、风头主义都要搞个稀巴烂。这一套是完全违背毛主席教导的。都是资产阶级、小资产阶级的东西。资产阶级、小资产阶级就是用这些东西影响我们。我们要当个无产阶级革命派，当毛主席的好战士，就一定要把这些东西去掉。……","type":"paragraph"},{"text":"现在你们这个华北可是个麻烦的地方。北京也是个麻烦的地方。在这个麻烦的地方，东西特别多。中学有什么四三派、四四派。坏人特别多。他们同工人农民结合太差了。天津也不一定是那么高明。","type":"paragraph"},{"text":"天津大联筹搞打砸抢，是少数坏头头搞的，许多群众不明白，有一天，跟天津代表接见时有个小站的小学教员，他说：“陈伯达同志，你去小站搞过四清，现在小站搞复辟，你在小站搞四清时的积极分子打下去了，四清下台干部正搞复辟。”要我注意。他是参加反复辟联络站的，我根据很多材料，他名叫反复辟，实际上就是搞复辟，小学教员还说他在小站开过很多积极分子会，我就想不起有这人，但我不好否定他，也可能我年纪大记不住了，我说小站搞复辟，你说的话可能是对的，但你不了解参加了，小站问题我们可以派人去调查，郑维山派人调查，结果就是小学教员搞复辟。他是干将，搞复辟的干将，这类的事是很多的。","type":"paragraph"},{"text":"我们文化大革命取得了伟大的胜利，动员了亿万群众，毛主席说形势是大好，不是小好。但是有很少一些人，不晓得怎么搞的，他就是完全违背了毛主席的教导，言行不一致，并且想用歪曲事实欺骗我们。用歪曲的事实挑动群众斗群众！这可能背后有人操纵，所以会被操纵就是因为他们有小团体主义、个人主义、山头主义、风头主义，他身上这些东西，就象鬼缠住一样，要把这些鬼搞掉，要搞自我批评，大家都要作自我批评的模范，不要总是想把对方吃掉，刚才讲的就是天津问题，我看一定要跟小资产阶级派性作斗争，首先跟自己小资产阶级派性作斗争。（大家呼口号：以斗私批修为纲，加强思想革命化！）","type":"paragraph"},{"text":"这个口号很好，就是要以毛主席“斗私批修”来对待自己，不要光对旁人斗私，对旁人批修，对自己就不斗，可能程度不同。正如林付主席说的，人的头脑中都有两方面的斗争，有正确的，有错误的，这两方面在头脑中斗争，是不是有这个问题？（众答：有！）是不是你们百分之百都是无产阶级？（众答：不是）我们就是不断地革自己头脑的命，如果我们有一天不同自己错误思想作斗争，不同外边来的影响作斗争，那么，也就会犯错误，你们不要把我们当成神仙，我也在不断跟自己作斗争。","type":"paragraph"},{"text":"华北地区是落后的，不是先进的，你们要高举毛泽东思想伟大红旗，以斗私批修为纲来处理问题，不然华北问题不晓得要拖到什么时候。现在主要是河北、天津的问题。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"陈伯达","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"天津文革","type":"人物"},{"name":"派性","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0ead117ae2"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
