script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"英国工人罢工浪潮席卷许多城市  各行各业工人纷纷举行罢工抗议垄断企业剥削和压迫  南威尔士克莱德赫八百多工人罢工已坚持了九个星期","authors":[],"dates":[{"year":1969,"month":11,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"英国工人罢工浪潮席卷许多城市"},{"type":"paragraph","text":"各行各业工人纷纷举行罢工抗议垄断企业剥削和压迫"},{"type":"paragraph","text":"南威尔士克莱德赫八百多工人罢工已坚持了九个星期"},{"type":"paragraph","text":"新华社伦敦十八日电　英国各行各业的工人最近又掀起新的罢工浪潮，抗议垄断企业的剥削和压迫，要求增加工资。罢工浪潮席卷了英国的许多城市，给垄断资本以沉重的打击。"},{"type":"paragraph","text":"在南威尔士克莱德赫的国际镍公司的精炼厂，八百多名工人已坚持罢工九个星期。罢工工人强烈抗议这家公司的资本家企图剥夺工人的罢工权利阴谋，并要求改善工作条件。"},{"type":"paragraph","text":"英国石油公司一家炼油厂的五百名锅炉制造工人为抗议无理解雇而进行的斗争已达五个星期。他们还举行了五次抗议示威。十七日，这些锅炉制造工人中的几百人在这家炼油厂周围布置了纠察哨。放哨的工人同前来挑衅和镇压他们的警察进行了搏斗。这些锅炉制造工人的斗争得到其它工厂的许多锅炉制造工人的支持。"},{"type":"paragraph","text":"伦敦、利物浦等港口的码头工人最近也先后举行罢工，使这些码头陷于瘫痪。伦敦西印度码头的七百五十名码头工人十七日举行罢工，抗议码头当局无故解雇两名工人。不久前，利物浦和布利斯托尔的一千多名码头工人也举行罢工，使这些港口的装卸工作无法进行。赫斯基森的四百名码头工人十三日也举行了罢工。"},{"type":"paragraph","text":"林肯郡朗萨顿一家罐头工厂的四百多名工人，其中将近一半是女工，为了要求增加工资已经罢工十七天。他们的罢工得到林肯郡波士顿和约克郡古尔的罐头制造工人的支援。"},{"type":"paragraph","text":"在南德文的埃克斯特、牛顿阿博特和希思菲尔德，有八百名生产机器零件的工人从八日起举行罢工，要求改善工作条件和增加工资。他们的罢工使这些厂的生产受到严重打击。"},{"type":"paragraph","text":"诺坦斯的奇平沃登出口包装工人和职员八百五十人在十七日举行罢工，使包装业务完全停止。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d1d0f15098"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
