script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"大破修正主义科研路线　多快好省发展科学事业我国试验成功造船管系放样新工艺十一研究所革命科技人员和江南船厂等单位工人共同努力取得了这项为我国首创的科研成果","authors":[],"dates":[{"year":1967,"month":9,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　十一研究所革命科技人员与江南造船厂等单位的工人，积极发扬革命首创精神，大破修正主义科研路线，协力研究的造船管系放样新工艺，已在我国自行设计的第二艘万吨轮船“朝阳”号上应用试验成功。这是在无产阶级文化大革命中取得成功的研究成果，显示了毛泽东思想的伟大胜利，是毛主席的革命路线的又一新胜利。"},{"type":"paragraph","text":"轮船上的管系装配是造船生产中的一项劳动强度很高的工作，工人们经常要扛着笨重的铜管、钢管等，从船上到车间来回奔走，遇到热天，工作更为辛苦。十一研究所的科技人员在下厂蹲点中发现这个问题后，怀着深厚的阶级感情，于一九六四年起两次提出要研究管系放样新工艺，以便改善工人劳动条件，提高生产效率。可是，当时该所党内走资本主义道路当权派，竭力推行爬行主义的修正主义科研路线，百般抵制这个科研课题。但是，革命的科技人员们活学活用毛主席著作，坚持进行斗争。他们尽管一无经验，二无资料，但每个人都决心要为毛主席争气。特别是当他们取得了江南造船厂等单位工人的大力支持和帮助后，更加信心百倍。在试验研究过程中，革命科技人员虚心拜工人为师，经过共同的努力，终于把我国首创的管系放样新工艺试验研究成功，今年开始在“朝阳”号等四艘轮船上推广应用。"},{"type":"paragraph","text":"目前国外造船的管子取样，一般采用绘图法、光学投影法和模型法等，效率低、质量差、成本高，而我国研究试验成功的管系放样新工艺，不但大大减轻工人的劳动强度，而且加速了造船周期，提高了产品质量，降低了生产成本，各方面都超赶了国外的水平。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a3520d77fb"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
