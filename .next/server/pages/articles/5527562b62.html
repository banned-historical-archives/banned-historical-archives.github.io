script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"巴西法律工作者代表团团长谈访华观感  中国人民在毛主席领导下进行非凡劳动","authors":[],"dates":[{"year":1960,"month":12,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"巴西法律工作者代表团团长谈访华观感"},{"type":"paragraph","text":"中国人民在毛主席领导下进行非凡劳动"},{"type":"paragraph","text":"新华社2日讯　巴西法律工作者代表团团长若泽·德阿基亚尔·迪亚斯，在离开北京前夕接见新华社记者时说，代表团通过这次访问，对中国留下了非常良好的印象。"},{"type":"paragraph","text":"代表团除北京外，还访问了南京、上海、武汉、洛阳、天津等城市。"},{"type":"paragraph","text":"团长说：“在所有这些城市里，我们看到中国人民在中国共产党和伟大的毛主席的领导下，为社会主义建设进行着非凡的劳动。"},{"type":"paragraph","text":"“我们对你们的社会主义建设非常钦佩。我们看到了你们光辉的革命的过去，也看到你们今天在各方面的成就。”"},{"type":"paragraph","text":"若泽·德阿基亚尔·迪亚斯说：“重工业的发展使中国的经济已经完全独立。”"},{"type":"paragraph","text":"他参观了一次人民法院的审判。他说：“被告有充分辩护的保证。判决是非常公正的。中国的法律工作者给我留下很好的印象。”他还称赞中国的婚姻法是世界上最好的法律之一。"},{"type":"paragraph","text":"他说，代表团还看到了中国政府在使工农接受文化教育这方面的成就。他赞扬了中国人民为和平事业所进行的努力。"},{"type":"paragraph","text":"在谈到中国和巴西人民之间的友谊时，若泽·德阿基亚尔·迪亚斯说：“巴西人认为巴西很像中国。我们巴西人认为中国人民是我们的兄弟。代表团在中国所受到的友好接待证明了我们这种想法完全正确。我们希望巴西也能同样地接待你们。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5527562b62"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
