script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"越南第四区业余艺术团团长在河内作访华演出的报告  热烈欢呼毛主席的庄严声明  热情赞扬越中人民战斗团结","authors":[],"dates":[{"year":1970,"month":6,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"越南第四区业余艺术团团长在河内作访华演出的报告"},{"type":"paragraph","text":"热烈欢呼毛主席的庄严声明  热情赞扬越中人民战斗团结"},{"type":"paragraph","text":"新华社河内十五日电  越中友好协会十三日在河内劳动俱乐部举行报告会。越南第四区业余艺术团团长范廷六在报告会上作了关于访问中国演出的报告。他在报告中热烈欢呼毛主席五月二十日发表的庄严声明和越中两国人民的战斗团结。"},{"type":"paragraph","text":"越中友好协会副会长阮文煊、秘书长黄俊和河内各界代表八百多人出席了报告会。"},{"type":"paragraph","text":"中国驻越南大使馆参赞陈亮、副武官袁云楼、使馆工作人员以及中国援越工程技术人员代表也应邀出席了报告会。"},{"type":"paragraph","text":"范廷六在报告中谈到了艺术团在中国访问演出期间，受到中国有关部门和中国人民非常亲切和热情友好的接待。他说，艺术团一到中国，中国人民就象迎接从前线归来的亲密战友一样，敲锣打鼓迎接我们。中国有关部门为我们的访问演出创造了极为有利的条件。中国广大工农兵群众热情地观看了我们的演出。这是中国人民对越南人民的深厚友谊和战斗团结的表现。"},{"type":"paragraph","text":"他说，艺术团在中国访问演出期间，发生了许多令人兴奋的事情，中国政府五月四日的声明，表达和增进了中越两国团结战斗的深厚情谊。五月一日晚上，我们荣幸地在天安门城楼上见到了敬爱的毛主席。毛主席亲切地和我们一一握手。周恩来总理、康生同志和黄永胜、李先念、吴法宪等同志观看了我们的演出，并且接见了我们，和我们进行了亲切谈话。周恩来总理和黄永胜总参谋长送我们每人一支枪和一百发子弹，鼓励我们更好地打击美国强盗。我们深深懂得，这是中国人民对我国人民的友好感情，表示中国人民坚决地支持我们把抗美救国战争进行到底。"},{"type":"paragraph","text":"他说，正当我们在韶山访问时，毛主席五月二十日发表了庄严声明，我们听到后受到很大的鼓舞，并且为此而深深感动。这不仅是对我们越南人民、印度支那人民的巨大鼓舞和有力支持，而且也是对全世界革命人民的巨大鼓舞和有力支持，是对美帝及其走狗的沉重打击。"},{"type":"paragraph","text":"范廷六说，我们在中国访问演出期间，还参观了胡主席曾经和中国同志一起战斗、一起生活的许多地方，我们亲眼看到了中国人民怀念胡主席，高度评价胡主席为培育越中友谊作出的贡献。他说，中越两国人民的友谊是毛主席和胡主席亲自培育的。我们决心实现胡主席的遗嘱，进一步培育和发展这一友谊。"},{"type":"paragraph","text":"报告会结束后，艺术团的演员们表演了歌颂胡主席、毛主席和越、中两国友谊的节目，受到观众的热烈欢迎。（附图片）"},{"type":"paragraph","text":"我们伟大领袖毛主席支持世界人民反对美帝斗争的庄严声明，受到几内亚朋友的热烈赞扬和支持。图为几内亚首都科纳克里的工人在阅读毛主席的庄严声明。"},{"type":"paragraph","text":"新华社稿"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"黄永胜","type":"人物"},{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4819e85733"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
