<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"0b2f26ed-ad29-48e7-9c89-446932a97ab0","name":"中共党史教学参考资料 第27册 “文化大革命”参考资料 下册（1988年）","internal":true,"official":true,"type":"pdf","author":"","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives3/main/0b2f26ed-ad29-48e7-9c89-446932a97ab0.pdf"],"article":{"title":"中共中央关于批林批孔运动几个问题的通知","alias":"","parts":[{"type":"paragraph","text":"中共中央关于批林批孔运动几个问题的通知"},{"type":"paragraph","text":"（--九七四年四月上日）全国批林批孔运动正在胜利展开，逐步深人，形势很好。对有些单位请示中央的几个问题、答复如下："},{"type":"paragraph","text":"一、批林批孔运动在党委统一领导下进行、不要成立战斗队一类群众组织、也不要搞跨行业、跨地区-·类的串连。中央重申毛主席的教导：“在工人阶级内部，没有根本的利害冲突。在无产阶级专政下的工人阶级内部，更没有理由一定要分裂成为势不两立的两大派组织。“对已经成立的联络站、上访团、江报团一类组织，各级党委应做好工作，劝他们向本单位参加批林批孔，抓革命，促生产，促工作，促战备。"},{"type":"paragraph","text":"二、人民解放军广大指战员在三支两军中作出了巨大贡献。已经向部队的三支两军人员，不要再回支左单位参加批林批孔。如果对他们有批评意见，可以送到所在部队的领导机关。部队各级党委和被批评的同志对人民群众的批评应当表示欢迎，认真地妥善地处理。"},{"type":"paragraph","text":"三：应当强调指出，批林批孔是上层建筑领域里马克思主义战胜修正主义、无产阶级战胜资产阶级的政治斗争和思想斗争。批林已经取得了很大的成绩、批孔比批林更困难些。齐级领导同志务必理解这场斗争的伟大意义，坚决贯彻执行毛主席的革命路线，相信群众、依靠群众，放手发动群众。要把各级领导机关的批林批孔作为重点认真搞好。要欢迎群众联系本地区阶级斗争和两条路线斗争实际所提出的批评。存极少数领导下部，不批林、不批孔、捂盖子，怕群众，甚至采取恶劣手段挑动群众斗群众，破坏革命，破坏生产，端动经济亡义，破坏知识青年上山下乡，这是完全错误的。对阶级敌人的破坏，要提高警惕。中央希望各级党委认真加强领导，团结百分之九十五以上的群众和干部，使批林批孔进一步开展起来。"},{"type":"paragraph","text":"在联大第六届特别会议上的发言"},{"type":"paragraph","text":"（一-九七四年四月十口）"},{"type":"paragraph","text":"邓小平"},{"type":"paragraph","text":"出度联合国大会第六届特别会议的中华人民共和国代表团团长、国务院副总理邓小平四月十日在大会一般性辩论中发言。发言全文如下：正席先生："},{"type":"paragraph","text":"联合国大会关于原料和发展问题的特别会议，在阿尔及利亚民主人民共和国革命委员会布迈丁主席的倡议下，在全世界绝大多数因家的支持下，顺利召开了。联合国成立二十九年"}],"authors":[],"dates":[{"year":1974,"month":4,"day":10}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":147,"page_end":147},"tags":[{"name":"邓小平","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"批林批孔","type":"主题/事件"},{"name":"上山下乡","type":"主题/事件"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"三支两军","type":"主题/事件"},{"name":"军队支左","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]},{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共中央关于批林批孔运动几个问题的通知","authors":[],"dates":[{"year":1974,"month":4,"day":10}],"is_range_date":false,"parts":[{"text":"中共中央关于批林批孔运动几个问题的通知","type":"title"},{"text":"各省、市、自治区党委，各大军区、省军区、各野战军党委，军委各总部、各军兵种党委，中央和国家机关各部委领导小组或党的核心小组：","type":"appellation"},{"text":"全国批林批孔运动正在胜利展开，逐步深入，形势很好。","type":"paragraph"},{"text":"对有些单位请示中央的几个问题，答复如下：","type":"paragraph"},{"text":"一、批林批孔运动在党委统一领导下进行，不要成立战斗队一类群众组织，也不要搞跨行业、跨地区一类的串连。中央重申毛主席的教导：“在工人阶级内部，没有根本的利害冲突。在无产阶级专政下的工人阶级内部，更没有理由一定要分裂成为势不两立的两大派组织。”对已经成立的联络站，上访团、汇报团一类组织，各级党委应做好工作，劝他们回本单位参加批林批孔，抓革命，促生产、促工作、促战备。","type":"paragraph"},{"text":"二、人民解放军广大指战员在三支两军中作出了巨大贡献。已经回部队的三支两军人员，不要再回支左单位参加批林批孔。如果对他们有批评意见，可以送到所在部队的领导机关。部队各级党委和被批评的同志对人民群众的批评应当表示欢迎，认真地妥善地处理。","type":"paragraph"},{"text":"三应当强调指出，批林批孔是上层建筑领域里马克思主义战胜修正主义、无产阶级战胜资产阶级的政治斗争和思想斗争。批林已经取得了很大的成绩，批孔比批林更困难些。各级领导同志务必理解这场斗争的伟大意义，坚决贯彻执行毛主席的革命路线，相信群众，依靠群众，放手发动群众。要把各级领导机关的批林批孔作为重点认真搞好。要欢迎群众联系本地区阶级斗争和两条路线斗争实际所提出的批评。有极少数领导干部，不批林，不批孔，捂盖子，怕群众，甚至采取恶劣手段挑动群众斗群众，破坏革命，破坏生产，煽动经济主义，破坏知识青年上山下乡，这是完全错误的。对阶级敌人的破坏，要提高警惕。中央希望各级党委认真加强领导，团结百分之九十五以上的群众和干部，使批林批孔进一步开展起来。","type":"paragraph"},{"text":" 中共中央一九七四年二月二十日","type":"paragraph"},{"text":"（此件发至县、团级）","type":"paragraph"},{"text":"(根据中央文件原件翻印，原文件题为：中共中央通知)","type":"paragraph"}],"comments":[],"origin":"根据中央文件原件翻印，原文件题为：中共中央通知","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"批林批孔","type":"主题/事件"},{"name":"上山下乡","type":"主题/事件"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"三支两军","type":"主题/事件"},{"name":"军队支左","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ad54f4e3fb"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
