<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji24","name":"毛泽东全集第24卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji24.pdf"],"article":{"title":"再克洛阳后给洛阳前线指挥部的电报","alias":"","parts":[{"type":"paragraph","text":"再克洛阳后给洛阳前线指挥部的电报！！"},{"type":"paragraph","text":"（1948年4月8日）此次再克洛阳²，可能巩固。关于城市政策，应注意下列各点。"},{"type":"paragraph","text":"一、极谨慎地清理国民党统治机构，只逮捕其中主要反动分子，不要牵连太广。"},{"type":"paragraph","text":"二、对于官僚资本要有明确界限，不要将国民党人经营的工商业都叫作官僚资本而加以没收。对于那些查明确实是由国民党中央政府、省政府、县市政府经营的，即完全官办的工商业，应该确定归民主政府接管营业的原则。但如民主政府-一时来不及接管或一时尚无能力接管，则应该暂时委托原管理人负责管理，照常开业，直至民主政府派人接管时为止。对于这些工商业，应该组织工人和技师参加管理，并且信任他们的管理能力。如国民党人已逃跑，企业处于停歇状态，则应该由工人和技师选出代表，组织管理委员会管理，然后由民主政府委任经理和厂长，同工人一起加以管理。对于著名的国民党大官僚所经营的企业，应该按照上述原则和办法处理。对于"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央起草的电报。因为它的内容不但适用于洛阳，也基本上适用于一切新解放的城市，所以这个电报同时发给了其他前线和其他地区的领导同志。"},{"type":"paragraph","text":"[2]洛阳是当时国民党军队在河南西部的-个重要据点。人民解放军于1948年3月14日首次攻克洛阳，以后为便于歼灭敌人有生力量，又主动撤出。同年4月5日，人民解放军再度攻克该城。小官僚和地主所办的工商业，则不在没收之列。一切民族资产阶级经营的企业，严禁侵犯。"},{"type":"paragraph","text":"三、禁止农民团体进城捉拿和斗争地主。对于土地在乡村家在城里的地主，由民主市政府依法处理。其罪大恶极者，可根据乡村农民团体的请求送到乡村处理。"},{"type":"paragraph","text":"四、入城之初，不要轻易提出增加工资减少工时的口号。在战争时期，能够继续生产，能够不减工时，维持原有工资水平，就是好事。将来是否酌量减少工时增加工资，要依据经济情况即企业是否向上发展来决定。"},{"type":"paragraph","text":"五、不要忙于组织城市人民进行民主改革和生活改善的斗争。要等市政管理有了头绪，人心已经安定，经过周密调查，弄清情况和筹有妥善解决办法的时候，才可以按情况酌量处理。"},{"type":"paragraph","text":"六、大城市目前的中心问题是粮食和燃料问题，必须有计划地加以处理。城市一经由我们管理，就必须有计划地逐步解决贫民的生活问题。不要提“开仓济贫”的口号。不要使他们养成依赖政府救济的心理。"},{"type":"paragraph","text":"七、国民党员和三青团员，必须妥善地予以清理和登记。"},{"type":"paragraph","text":"八、一切作长期打算。严禁破坏任何公私生产资料和浪费生活资料，禁止大吃大喝，注意节约。"},{"type":"paragraph","text":"九、市委书记和市长必须委派懂政策有能力的人担任。市委书记和市长应该对所属一切工作人员加以训练，讲明各项城市政策和策略。城市已经属于人民，一切应该以城市由人民自己负责管理的精神为出发点。如果应用对待国民党管理的城市的政策和策略，来对待人民自己管理的城市，那就是完全错误的。"}],"authors":["毛泽东"],"dates":[{"year":1948,"month":4,"day":8}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":218,"page_end":219},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"389d8c9310"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
