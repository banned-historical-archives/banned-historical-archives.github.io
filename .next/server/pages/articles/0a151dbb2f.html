script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"认真学习和贯彻毛主席的一系列最新指示和各项政策  用毛泽东思想统一指挥斗批改  天津人民汽车三厂革委会带领广大革命群众不断取得斗批改新胜利","authors":[],"dates":[{"year":1969,"month":1,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"认真学习和贯彻毛主席的一系列最新指示和各项政策"},{"type":"paragraph","text":"用毛泽东思想统一指挥斗批改"},{"type":"paragraph","text":"天津人民汽车三厂革委会带领广大革命群众不断取得斗批改新胜利"},{"type":"paragraph","text":"据新华社天津十八日电　天津人民汽车三厂革命委员会在驻厂解放军的帮助下，紧密结合本厂斗、批、改的实际，活学活用毛泽东思想，用战无不胜的毛泽东思想统帅斗、批、改，不断取得新的胜利。"},{"type":"paragraph","text":"天津人民汽车三厂革委会从斗争实践中得出一条深刻的体会：用毛泽东思想统一指挥斗、批、改，就必须认真学习、落实毛主席的一系列最新指示和各项无产阶级政策。因此，每当毛主席的最新指示一发表，革委会成员都是带头学习，带头宣传，带头用。他们第一步狠抓紧跟毛主席最新指示的速度，做到传达不过夜；第二步狠抓贯彻毛主席最新指示的广度，做到学习不漏人；第三步狠抓落实毛主席最新指示的深度，做到执行不走样。伟大领袖毛主席最近教导我们：“清理阶级队伍，一是要抓紧，二是要注意政策。”人民汽车三厂革委会立即办起了毛泽东思想学习班，一直学习到凌晨四点钟，并且做出了贯彻落实毛主席最新指示的决定。第二天，这个决定就发到了全厂各连队、班组。然后，革委会成员又深入到各连队向工人宣传毛主席的最新指示。随后，根据毛主席的最新指示，争取团结了大多数群众和干部，并且对敌人实行了区别对待、分化瓦解的政策，最大限度地孤立和打击了一小撮最顽固的敌人，使清理阶级队伍工作在毛泽东思想指挥下顺利开展。"},{"type":"paragraph","text":"在落实毛主席最新指示的时候，厂革委会还组织群众选学毛主席的有关著作，进一步加深对毛主席最新指示和毛主席的无产阶级政策的理解，不断地提高群众的毛泽东思想觉悟和水平。革委会中政治上的团结加强了，班组中的团结也进一步加强了，出现了不符合毛泽东思想的现象大家就抵制，符合毛泽东思想的事物大家就支持的新气象，使革命大批判，清理阶级队伍等工作沿着毛主席的革命路线不断前进，在斗争中进一步提高了活学活用毛泽东思想的水平。"},{"type":"paragraph","text":"天津人民汽车三厂革委会认识到：斗、批、改是一场剧烈的阶级斗争和两条路线斗争，很多问题不是改一次就到顶了，常常要不断地斗，不断地批，不断地改，这就需要不断地用毛泽东思想发动群众，用毛泽东思想集中群众的正确意见，才能不断提高斗、批、改的水平。"},{"type":"paragraph","text":"这个厂的外勤部分有一百五十多辆公共汽车组成十条汽车线路，每条线路站头上都有叫做“站员”的专职干部，负责调度车辆、处理线路上发生的各种问题。这种“站员”制度已经沿袭了三十多年。在斗、批、改中，一部分群众要求破除这个不合理制度，由群众推选活学活用毛泽东思想比较好的班组长（都是不脱产的司机和售票员）轮流值班，实现群众参加管理。对这项改革意见，当时有赞成的，有反对的。厂革委会经过调查研究，用毛泽东思想进行分析，认为这个意见符合毛泽东思想，就坚决支持。改革以后，群众经过一段实践，最近又进一步提出班组长轮流值班的制度也可以取消，改为完全由线路上的广大司机和售票员来进行线路管理。革委会又把群众新提出的正确意见集中起来，贯彻下去，使这项改革更加完善，大大调动了群众参加斗批改的积极性。"},{"type":"paragraph","text":"这个厂的革委会遵照毛主席关于经济工作的教导，经过反复调查研究，广泛征求群众的意见，破了十六项过去框框条条最多的不合理的财会制度。原来全厂有七个财会干部还忙不过来，现在只要两个人就够了。"},{"type":"paragraph","text":"天津人民汽车三厂革命委员会成立一年来，在阶级斗争和两条路线斗争的大风大浪中，用战无不胜的毛泽东思想树立了三个“新”，使革委会在斗、批、改中成为革命化的联系群众的战斗指挥部。这三个“新”是：第一，新的组织。革委会树立了三个优势：工人阶级占优势，新生力量占优势，无产阶级革命派占优势。第二，新的思想。这就是毛主席关于在无产阶级专政条件下继续革命的思想，代表无产阶级利益的思想，代表广大革命群众意志的思想。有了新思想，才能破除旧框框，敢于支持新生事物，领导群众沿着毛主席的革命路线前进。第三，新的作风。革委会成员遵循毛主席的“既当‘官’，又当老百姓”的教导，树立密切联系群众，甘当群众小学生的新作风。革委会不但有定期开门整风、民主生活会等制度，还实行了拜工人为师的新制度。革委会中的革命干部、军队代表、群众代表，都拜了三至七名老工人为自己的老师，他们定期向工人老师汇报思想情况，处理重大问题时征求工人老师的意见，自觉地把自己置于工人群众的监督之下。群众满意地说：革委会是新组织、新思想、新作风，按毛泽东思想办事，按群众的正确意见办事，这样的领导班子，我们一百个放心！"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"天津文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"清理阶级队伍","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0a151dbb2f"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
