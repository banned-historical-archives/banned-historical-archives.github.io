script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"阿尔巴尼亚《团结报》发表文章  发展中国家在摆脱帝国主义剥削道路上前进","authors":[],"dates":[{"year":1974,"month":8,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"阿尔巴尼亚《团结报》发表文章"},{"type":"paragraph","text":"发展中国家在摆脱帝国主义剥削道路上前进"},{"type":"paragraph","text":"新华社地拉那一九七四年八月八日电　阿尔巴尼亚《团结报》八月八日发表文章指出，发展中国家在摆脱帝国主义剥削的道路上前进。"},{"type":"paragraph","text":"文章说，发展中国家的人民再也不能忍受由超级大国和外国垄断资本野蛮掠夺他们的财富和血汗的状况了。发展中国家正在采取越来越坚决的步骤，以实现自己的自由与独立的神圣愿望，把自己的命运掌握在自己手中，成为国家和财富的主人，摆脱帝国主义和社会帝国主义的任何干涉、控制和剥削。"},{"type":"paragraph","text":"文章接着说，许多发展中国家把外国垄断资本国有化作为掌握民族财富的有效形式，从而使自然资源为本国的政治和经济发展服务，为巩固民族主权服务。要巩固政治独立首先应当巩固经济独立这一思想，正在亚非拉许多国家深深地扎下根基。"},{"type":"paragraph","text":"文章说，毫无疑义，亚非拉许多国家迄今在巩固民族主权、掌握和独立开发民族资源方面所取得的胜利是鼓舞人心的。这些国家的人民也意识到，要达到巩固的政治独立和确保真正的经济独立，还有许多事情要作。这些国家为自己的经济和社会发展而进行的斗争也就是反对美帝国主义和苏联社会帝国主义的斗争，因为正是它们企图阻挡发展中国家的前进。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ed92cf61b4"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
