script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji31","name":"毛泽东全集第31卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji31.pdf"],"article":{"title":"对华北局关于山西省打虎数目的指示的批语","alias":"","parts":[{"type":"paragraph","text":"转发东北局关于寻找贪污线索的经验的电报"},{"type":"paragraph","text":"（1952年1月31日）中央和军委各部门，中央人民政府各党组；各中央局，大军区，志愿军，并转分局、省市区党委，各级军区和各军："},{"type":"paragraph","text":"据高岗同志电称，东北方面的打虎经验，在人物线索方面，要注意以下各点：“（1）本人曾做商人或工厂老板，而现在混入我国家机关或企业任事者（尤其要注意那些现在仍兼营私人工商企业的分子）；（2）家庭为工商业家，而本人在我国家机关或企业部门工作者，其中有一部分是老干部（尤其要注意在其到国家机关或企业工作后，其家庭所经营的企业发展极快者）；（3）本人与私人工商业者关系密切、生活腐化、为群众议论纷纷者；（4）掌管小家务、生活腐化、挥霍无度者；（5）采购人员经常向某商行或某几个商行采购者（可从查账、查发票中发现）；（6）从采购或推销发单中发现同时期同样物资而价格差异过大者（可用不同部门购买或推销同样器材的发票作比较）；（7）从内部检举及外部工商业者坦白检举的材料中发现线索；（8）研究现已整出的五十六个大贪污犯，从中吸取“捉老虎’的经验教训”等语。此种意见甚好，请加注意，以利打虎。"},{"type":"paragraph","text":"毛泽东一月三十一日"}],"authors":["毛泽东"],"dates":[{"year":1952,"month":1,"day":30}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":314,"page_end":314},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"05a83ca29d"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
