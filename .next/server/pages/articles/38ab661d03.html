" crossorigin="">{"props":{"pageProps":{"books":[{"id":"afaea63a-1dbf-4481-98c7-a198625e13cf","name":"红旗一九七六年第十一期","internal":false,"official":true,"type":"pdf","author":"《红旗》杂志编辑部","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives2/main/afaea63a-1dbf-4481-98c7-a198625e13cf.pdf"],"article":{"title":"关于建立伟大的领袖和导师毛泽东主席纪念堂的决定","alias":"","parts":[{"type":"paragraph","text":"员"},{"type":"paragraph","text":"央委中国共产党中"},{"type":"paragraph","text":"会中华人民共和国全国人民代表大会常务委员会"},{"type":"paragraph","text":"华人民共"},{"type":"paragraph","text":"院"},{"type":"paragraph","text":"国国务"},{"type":"paragraph","text":"和中中国共产党中央军事委员会关于建立伟大的领袖和导师毛泽东主席纪念堂的决定"},{"type":"paragraph","text":"（一一九七六年十月八日）"},{"type":"paragraph","text":"为了永远纪念我党我军和我国各族人民的伟大领袖、国际无产阶级和被压迫民族被压迫人民的伟大导师毛泽东主席，教育和鼓舞工农兵和其他劳动群众继承毛主席的遗志，坚持马克思主义、列宁主义、毛泽东思想，把无产阶级革命事业进行到底，决定："},{"type":"paragraph","text":"在首都北京建立伟大的领袖和导师毛泽东主席纪念堂。"},{"type":"paragraph","text":"在纪念堂建成以后，即将安放毛泽东主席"},{"type":"paragraph","text":"二遗体的水晶棺移人堂内，让广大人民群众仰遗容"},{"type":"paragraph","text":"中共中央关于出版《毛泽东选集》和筹备出版《毛泽东全集》的决定"},{"type":"paragraph","text":"半个多世纪以来，·伟大的领袖和导师毛泽东主席根据马克思列宁主义的普遍真理和革命具体实践相结合的原则，在领导我国完成新民主主义革命和进行社会主义革命、社会主义建设的伟大斗争中，在反对党内右的和“左”的机会主义路线的伟大斗争中，在反对帝国主义、以苏修叛徒集团为中心的现代修正主义和各国反动派的伟大斗争中，在各个方面继承、捍卫和发展了马克思列宁主义，丰富了马克思主义的理论宝库。毛主席的著作，是马克思列宁主义的不朽文献。出版毛主席的著作，对于我国各族人民继承毛主席的遗志把无产阶级革命事业进行到底，对于全世界无产阶级和被压迫民族被压迫人民的解放事业，都具有伟大的现实意义和深远的历史意义。这是马克思主义发展史上的一件大事，一定要严肃认真地抓紧做好。中共中央决定："},{"type":"paragraph","text":"（一），尽快出版《毛泽东选集》第五卷，并陆续出版以后各卷。在出版选集的同时，积极地筹备出版《毛泽东全集》。"},{"type":"paragraph","text":"出版《毛泽东选集》和《毛泽东全集》的工"},{"type":"paragraph","text":"（二）作，由以华国锋同志为首的中共中央政治局直接领导，下设-个毛泽东主席著作编辑出版委员会，负责整理、编辑和出版的具体工作。"},{"type":"paragraph","text":"（三）"},{"type":"paragraph","text":"毛主席著作的所有原件，由中共中央办公厅负责收集，保存。"},{"type":"paragraph","text":"中央责成各级党委将本地区、本单位保存的毛主席的一一切手稿，包括文章、文件、电报、批示、书信、诗词、题词的原件，以及讲话的原始记录稿，尽快送交中央办公厅。中央办公厅应作出复制件，交提供原件的单位或个人保存。"},{"type":"paragraph","text":"中共中央号召全党、全军和全国各族人民，掀起一个学习马列著作和毛主席著作的新高潮，并且大力帮助收集毛主席的著作原件。中共中央希望各国马列主义政党、组织和进步团体、友好人士协助做好毛主席著作原件的收集工作。"},{"type":"paragraph","text":"中共中央"},{"type":"paragraph","text":"一九七六年十月八日"}],"authors":["中华人民共和国全国人民代表大会常务委员会","中华人民共和国国务院","中国共产党中央军事委员会","中国共产党中央委员会"],"dates":[{"year":1976,"month":10,"day":8}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":14,"page_end":16},"tags":[{"name":"毛泽东","type":"人物"},{"name":"编纂《毛泽东选集》第五卷","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"38ab661d03"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
