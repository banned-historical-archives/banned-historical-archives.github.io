" crossorigin="">{"props":{"pageProps":{"books":[{"id":"cee99135-9896-4fc3-81af-aef4ec609898","name":"红旗一九七〇年第十二期","internal":false,"official":true,"type":"pdf","author":"《红旗》杂志编辑部","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives2/main/cee99135-9896-4fc3-81af-aef4ec609898.pdf"],"article":{"title":"中共中央致电朝鲜劳动党第五次代表大会最热烈祝贺朝鲜劳动党第五次代表大会召开","alias":"","parts":[{"type":"paragraph","text":"中共中央致电朝鲜劳动党"},{"type":"paragraph","text":"第五次代表大会最热烈祝贺朝鲜劳动党"},{"type":"paragraph","text":"第五次代表大会召开"},{"type":"paragraph","text":"中国共产党中央委员会十一月一口致电朝鲜劳动党第五次代"},{"type":"paragraph","text":"新华社二日讯表大会，最热烈地祝贺朝鲜劳动党第五次代表大会的召开。电报全文如下：朝鲜劳动党第五次代表大会亲爱的同志们："},{"type":"paragraph","text":"当朝鲜劳动党召开第五次代表大会的时候，中国共产党中央委员会代表中国共产党全体党员和全体中国人民，向朝鲜劳动党第五次代表人会，并通过大会向勒鲜劳动党全体党员和全体勒鲜人民，致以最热烈的兄弟般的祝贺。"},{"type":"paragraph","text":"朝鲜人民的伟大领袖金日成同志亲手创建的朝鲜劳动党，是指引朝鲜人民走向革命胜利的组织者和领导者。朝鲜人民在朝鲜劳动党的英明领导下，高举反帝革命的旗帜，在反对美帝国主义及共走狗的斗争中取得了辉煌的胜利，为全世界被压迫人民和被压迫民族的反帝斗子作出了重大贡献。"},{"type":"paragraph","text":"朝鲜劳动党领导朝鲜人民实现社会主义革命和进行社会主义建设。从朝鲜劳动党第四次代表大会以来，勤劳英勇的朝鲜人民，发扬独立自主，自力更生的革命精神，艰苦奋斗，今年将胜利地完成国民经济发展七年计划，取得了社会主义经济建设和国防建设的伟大成就。"},{"type":"paragraph","text":"朝鲜劳动党第五次代表大会的举行，必将进一步鼓舞英的朝鲜人民，在同美节国正义及其一切走狗的斗争中取得更大的胜利，在社会主义的建设中掀起新的高潮。"},{"type":"paragraph","text":"当前国际形势一片大好。美帝国主义在亚洲和世界各地的侵略，遭到了沉重的打击。但是，姜帝国主义决不甘心于它的失败，仍在垂死挣扎。美帝国主义至今还霸占着南朝鲜，疯狂推行侵略政策和战争政策。复活的日本军国主义也积极参与美帝国主义刘朝鲜的侵略，妄图重温“大东亚共荣圈”的迷梦。中国共产党和中国人民，坚决支持朝鲜人民反对美帝国主义、日本军国主义以皮美帝走狗朴正熙反动集团，为保卫祖国独立，为实现祖国和平统一而进行的爱国正义斗争。"},{"type":"paragraph","text":"中朝两国是山水相连的兄弟邻邦，长期以来，我们两党、两国人民一直是同生死、共惠难的亲密战友。我们的这种战斗友谊和革命团结，是建立在无产阶级国际主义原则基础上的，是在反对共同敌人的长期斗争中发展起来的，是用鲜血凝成的，是万古长青的。我们深信，在我们两党、两国人民坚强的战斗团结面前，美帝国主义和目本军国主义对我们两国的侵略和军事冒险是注定要失败的。"},{"type":"paragraph","text":"中国共产党衷心地祝贺你们代表大会的圆满成功！朝鲜人民的伟大领袖金日成同志万岁！中朝两党、两国人民的革命友谊和战斗团结万岁！战无不胜的马克思列宁主义万岁！"},{"type":"paragraph","text":"中国共产党中央委员会"},{"type":"paragraph","text":"一九七〇年十一月一日"}],"authors":["中共中央"],"dates":[{"year":1970,"month":11,"day":1}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":7,"page_end":8},"tags":[{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"世界形势","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7eb0b82a8f"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
