script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"“行政协定”破坏日本主权 日资产阶级报纸也表不满","authors":[],"dates":[{"year":1952,"month":3,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京三日电】　日本资产阶级报纸对美日“行政协定”横暴破坏日本主权的条款感到震惊，并纷纷表示不满。据塔斯社东京讯:近来，大多数日本报纸刊载了批评“行政协定”的文章。“读卖新闻”和“日本经济新闻”在二月二十一日的社论中写道:谈到缔结“行政协定”，人民感到震惊的是:在“和约”生效后，日本的独立只是字面上的。"},{"type":"paragraph","text":"“朝日新闻”社论写道:“从行政协定的全文，人们的确看不出实行行政协定而产生的局势究竟与目前在外国占领下的局势有什么不同。人们在行政协定中找不出可以使人感觉到日本得到独立的条款。人们找不到任何证据，证明对本国人民表示强硬、对外国表示软弱的吉田政府在作任何努力保卫日本的主权和独立。从协定的全文看来，十分清楚的，政府进行谈判时的态度是多么‘友好、融洽’，它在谈判时只说‘是，是’。”"},{"type":"paragraph","text":"“东京时报”社论说:日本人民不可能欢迎这个协定。"},{"type":"paragraph","text":"“读卖新闻”写道:“行政协定事实上把日本变成了美利坚合众国的军事卫星国。”"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3fb9f26ad4"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
