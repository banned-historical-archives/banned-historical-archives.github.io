<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"文艺机关团体应彻底检查资产阶级思想作风","authors":[],"dates":[{"year":1952,"month":2,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"文艺机关团体应彻底检查资产阶级思想作风"},{"type":"paragraph","text":"贪污、浪费、官僚主义的现象在各地文艺机关团体中，也是普遍地存在着。一部分文艺领导干部具有腐朽的资产阶级的思想倾向。在工作中铺张浪费，在个人生活上的享受腐化是十分严重的。据各地报纸和读者已经初步揭发的事实，证明了认为文艺机关团体，不是管钱的部门，自己用钱不多，没有什么问题的看法和论调是错误的，是不符合实际情形的。"},{"type":"paragraph","text":"据华南文学艺术界联合会工作人员的检举和文联主要领导人欧阳山的初步自我检查，证明华南文联存在着严重的浪费和变相的贪污现象。由于欧阳山的官僚主义作风，用家长式的统治代替思想领导，致使内部民主不能发扬，批评和自我批评不能展开。多数工作人员有意见也不敢提，听任挥霍浪费国家资财的现象和领导方面的官僚主义作风长期存在。据初步估计，华南文联两年来用去事业费约十五亿元，其中四亿多元是属于浪费的。他们经常举行宴会，欧阳山个人生活费用也大大地超出制度。他擅自对干部增发补贴米，两年共超支八千万元。华南文联长期没有认真组织文艺创作和认真进行思想学习，而是醉心于行政事务、宴饮交际。欧阳山在初步反省中说：他进城以来，在生活上向资产阶级看齐，比在延安时向无产阶级看齐的速度还要快。这种情况应该引起文艺工作者的极大警惕。"},{"type":"paragraph","text":"南京文联的浪费现象也是严重的。仅仅八个月的统计，请客达五十九次，共花了二千二百六十六万元。二届年会化了二千五百八十一万七千六百元，其中许多钱是化在吃喝上的。南京文工团曾接管一片农场，团员偶尔下乡浇水捕虫，来去都乘汽车，回来还要大吃一顿，耗费大大超过了他们的“劳动”所得。有一次去收割麦子，大家戴着新的宽边大草帽，夹着准备午睡用的凉席，携带了大批肉包子、咸蛋、汽水去吃喝。返城以后，认为“辛苦”一天，必需“慰劳”，于是洗过澡，吃过丰盛晚餐后，再去看一场电影。文工团团长李世仪等坐着小汽车下乡“体验生活”，但吃不来乡下伙食，另外自己搞小灶。团长李世仪和一部分文工团员参观土地改革回来时，特别举行了欢迎仪式。当李世仪等到达大门时，原来紧闭的大门豁然大开，鞭炮齐鸣，军乐大作，代理团长率领团员列队迎迓，欢呼鼓掌，历久不息。李世仪调动工作时，文工团举行盛大酒会欢送，大醉狂舞，有人竟喝到吐血，有的女同志也醉得哭泣起来。南京文工团的这种腐朽的资产阶级思想作风同样也存在在演出工作中：追求豪华场面，玩弄新奇布景。他们在修建南京会堂剧院时，曾数次追加预算，从五亿八千万元增加到二十七亿四千多万元，务求建筑的富丽堂皇，不顾国家财产的大量浪费。有些人竟认为这样做法是“社会主义的提前实现”，这是何等的荒谬！"},{"type":"paragraph","text":"应该指出，这种腐朽庸俗的风气和严重的铺张浪费现象决不止在上述单位中存在，而是或多或少地普遍存在于许多文艺机关团体中。存在着这种现象的文艺机关团体中，当然谈不到什么文艺思想领导，谈不到认真的创作和学习。这种现象是不可容忍的。如同其他部门一样，文艺界必须在这次反击资产阶级思想猖狂进攻的伟大斗争中，无情地揭露那些丑恶事实，彻底整顿自己的队伍，对于那些情节严重而又不肯悔改的文艺界的腐化堕落分子，应该把他们从文艺界清除出去。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b0fa3876b4"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
