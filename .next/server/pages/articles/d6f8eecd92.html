" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"周恩来对西安交通大学李世英的指示","authors":["周恩来"],"dates":[{"year":1967,"month":7,"day":14}],"is_range_date":false,"parts":[{"text":"周恩来对西安交通大学李世英的指示","type":"title"},{"text":"周恩来","type":"authors"},{"text":"〖七月十四日上午九时十一分，国务院总理办公室吴斌，打电话给西安交通大学李世英，传达了总理的指示。〗","type":"appellation"},{"text":"（一）你给总理的来信已收到，关于毕业生的问题，如照来信所提的办法，时间会拖得很长，中央正在研究一个妥善处理的办法。","type":"paragraph"},{"text":"（二）据悉：西安最近打砸抢又在抬头，而且两方面都有，希望双方能通过协商予以制止，如果不行，将来可来北京解决，但现在不要来。","type":"paragraph"},{"text":"（三）听说交大对黄经耀、胡×有意见，黄、胡二人是中央派去的，而且从一开始也是支持交大造反派的，希望能注意同他们的关系。","type":"paragraph"},{"text":"（四）霍士廉身体很不好，要批判他可以，但一定要注意他的健康，中央已委托省军区和驻军加以掌握，关于霍士廉是叛徒的问题，根据中央所知，情况并非如此。","type":"paragraph"}],"comments":[],"origin":"1967年7月26日红代会清华井冈山一部第三动态组编《动态》第106期；1967年7月29日北航革命委员会、红代会北航红旗主办《红旗》。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"霍士廉","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d6f8eecd92"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
