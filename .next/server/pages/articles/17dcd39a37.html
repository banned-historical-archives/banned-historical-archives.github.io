script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"库马拉西里在锡共建党二十一周年庆祝大会上讲话  号召建立强大的党完成反帝反修任务  修正主义者听从赫鲁晓夫指挥棒，他们破坏党领导下组织的企图已遭失败","authors":[],"dates":[{"year":1964,"month":7,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"库马拉西里在锡共建党二十一周年庆祝大会上讲话"},{"type":"paragraph","text":"号召建立强大的党完成反帝反修任务"},{"type":"paragraph","text":"修正主义者听从赫鲁晓夫指挥棒，他们破坏党领导下组织的企图已遭失败"},{"type":"paragraph","text":"新华社科伦坡四日电　锡兰共产党三日晚上在这里举行了建党二十一周年庆祝大会。"},{"type":"paragraph","text":"锡共党员、党的同情者、工人、知识分子和其他进步人士等约五百人冒着大雨前来参加庆祝大会。大会主席由党的创始人之一的西里瓦德尼担任。"},{"type":"paragraph","text":"总书记库马拉西里在会上讲了话。他说：今天锡兰只有一个马克思列宁主义的党，这就是我们的党。我们党在马克思列宁主义的普遍真理与锡兰革命的具体实践相结合的指导下，一定能最后完成自己的历史任务。"},{"type":"paragraph","text":"他回溯锡共的发展史时说：党近年来不得不在党内进行的最大的斗争是反对现代修正主义的斗争；在锡兰，现代修正主义表现为盲目听从赫鲁晓夫的指挥棒。他指出，修正主义者已经没有权利自称为共产党人。"},{"type":"paragraph","text":"库马拉西里说：党要对帝国主义和反动派作斗争，同时要孤立和击败修正主义，才能实现自己的目的。他指出，这个任务是艰巨的，他号召每一个党员要在城市和乡村建立强大的共产党来完成这个任务。"},{"type":"paragraph","text":"党的全国组织员桑穆加塔桑也在会上讲了话。他在谈到对现代修正主义的斗争时说：这虽然是在国际范围内发生的现象的一部分，但是它实质上是为反对放弃在锡兰的条件下遵循马克思列宁主义原则而进行的斗争。他说：锡兰共产党人所以着手进行这场反对修正主义的斗争，是因为克尼曼和魏克马沁格集团听从赫鲁晓夫的指挥棒，实行修正主义的政策，背叛了工人阶级，他说：这种对工人阶级的背叛决不是偶然的，而是一个抛弃革命原则、接受通过议会手段取得政权的长期过程的结果。"},{"type":"paragraph","text":"当他谈到中国共产党在反对现代修正主义的斗争中始终给予世界人民以革命支持，并提议向中国共产党致以热情的敬意的时候，大厅里响起了热烈的掌声。他接着说，由于真正的马克思列宁主义者进行了不懈的斗争，修正主义者破坏在党领导下的组织的一切企图都已归于失败。"},{"type":"paragraph","text":"锡共《工人报》主编赫·姆·普·毛希丁在谈到存在于党内的修正主义在相当长的时期中使党的活动处于瘫痪状态后说：在真正的马克思列宁主义者施行了艰巨的大手术以后，现在已使党免于死亡，而领导着锡兰无产阶级和人民走上革命的道路。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"17dcd39a37"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
