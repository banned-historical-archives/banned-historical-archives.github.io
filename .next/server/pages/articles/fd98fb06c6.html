" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji36","name":"毛泽东全集第36卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji36.pdf"],"article":{"title":"中央对甘肃省委关于农业合作化发展速度问题的电报的复电","alias":"","parts":[{"type":"paragraph","text":"中央对甘肃省委关于农业合作化"},{"type":"paragraph","text":"发展速度问题的电报的复电"},{"type":"paragraph","text":"（1955年12月4日）甘肃省委，并告上海局，各省市委，自治区党委："},{"type":"paragraph","text":"一九五五年十二月二日的电报收到。像甘肃那样的情况，我们的意见，今冬明春分作两批，共发展到占总农户百分之四十多一点，如果不勉强，则占总农户百分之五十多一点也可以，再多就可能不适合了。一九五六年下半年再一个浪潮达到占农户百分之八十左右，那就很好。你们说“在今冬明春的一个浪潮中，发展到占总农户百分之七十五左右是完全可能的”，这个数字太大，以控制在百"},{"type":"paragraph","text":"[1]指中共甘肃省委1955年12月2日关于全省农业合作化速度问题给毛泽东并中央的电报。电报说，中央11月30日对我省农业合作化规划速度的指示是完全正确的。我省农业合作化的发展规划确实是小了，这说明我们的领导仍远远落后于客观形势。现决定于12月5日召开第六次省委扩大会议，准备来一次重新规划。根据目前各地合作化进展的实际情况看，在今冬明春的一个浪潮中，入社农户数发展到占总农户的75%左右是完全可能的。同时还必须注意，不但数量要多，而且质量要好。"},{"type":"paragraph","text":"中央对甘肃省委关于农业合作化发展速度问题的电报的复电分之四十左右、或五十左右为宜。"},{"type":"paragraph","text":"中央"},{"type":"paragraph","text":"一九五五年十二月四日"},{"type":"paragraph","text":"二刘、周、朱、陈、彭真、小平、子恢即阅，尚昆办。"},{"type":"paragraph","text":"[1]刘，指刘少奇。周，指周恩来。朱，指朱德。陈，指陈云，当时任中共中央书记处书记、国务院副总理。彭真，当时任中共中央书记处候补书记、全国人大常委会副委员长。小平，即邓小平，当时任中共中央秘书长、国务院副总理。子恢，即邓子恢，当时任中共中央农村工作部部长、国务院副总理。"},{"type":"paragraph","text":"[2]尚昆，即杨尚昆，当时任中共中央副秘书长、中央办公厅主任。"}],"authors":["毛泽东"],"dates":[{"year":1955,"month":12,"day":4}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":93,"page_end":94},"tags":[{"name":"毛泽东","type":"人物"},{"name":"彭真","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"通讯"}]},{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中央对甘肃省委关于农业合作化发展速度问题的电报的复电","authors":["毛泽东"],"dates":[{"year":1955,"month":12,"day":4}],"is_range_date":false,"parts":[{"text":"中央对甘肃省委关于农业合作化发展速度问题的电报的复电","type":"title"},{"text":"毛泽东","type":"authors"},{"text":"甘肃省委，并告上海局，各省市委，自治区党委：","type":"appellation"},{"text":"一九五五年十二月二日的电报收到。像甘肃那样的情况，我们的意见，今冬明春分作两批，共发展到占总农户百分之四十多一点，如果不勉强，则占总农户百分之五十多一点也可以，再多就可能不适合了。一九五六年下半年再一个浪潮达到占农户百分之八十左右，那就很好。你们说“在今冬明春的一个浪潮中，发展到占总农户百分之七十五左右是完全可能的”，这个数字太大，以控制在百分之四十左右、或五十左右为宜。","type":"paragraph"},{"text":" 中央一九五五年十二月四日","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fd98fb06c6"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
