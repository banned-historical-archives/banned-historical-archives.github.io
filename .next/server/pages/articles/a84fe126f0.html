<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"对修正主义路线决不能“服服贴贴”","authors":["余志森"],"dates":[{"year":1973,"month":12,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"红军中学　余志森"},{"type":"paragraph","text":"林彪一伙为了替篡党夺权制造舆论，一方面，极力美化自己，戴上“超天才”之类的桂冠；另一方面又狂热叫嚣共产党员要“服服贴贴”听从他们的指挥，这完全是破坏党的马克思主义原则，扼杀广大党员的斗争意志和反潮流精神，是林彪一伙的一个阴谋。"},{"type":"paragraph","text":"共产党的哲学就是斗争哲学。党的指导思想的理论基础是马克思主义，“按其本质来说，它是批判的和革命的”。誓为共产主义奋斗终身的共产党员对于一切阶级敌人，对于形形色色的修正主义，要敢于斗争，敢于批判，决不能“服服贴贴”。即使是资产阶级思想、修正主义思想象潮水一般涌来时，一个真正的共产党员和革命者，也一定要敢于反潮流，坚持斗争哲学，决不向错误潮流屈服，要不怕撤职，不怕开除党籍，不怕坐牢，不怕杀头，不怕离婚。"},{"type":"paragraph","text":"林彪一伙所谓的“服服贴贴”的论调，是对党的民主集中制和党的纪律的篡改。我们党是无产阶级政党，一贯坚持用党的斗争哲学教育党员，一贯坚持民主集中制的组织原则。在党内既有集中又有民主，既有纪律又有自由，既有统一意志又有个人心情舒畅。党员有权向党组织和领导人提出批评和建议，对组织的决议、指示如有不同意见允许保留，有权越级直至向中央和中央主席报告。党的上、下级关系，首先是建立在共同贯彻执行党的马克思列宁主义路线的基础上的。党的志组织原则和纪律保障广大党员坚持斗争哲学，抵二制错误路线。毛主席明确指出:“共产党员对任森何事情都要问一个为什么，都要经过自己头脑的周密思考，想一想它是否合乎实际，是否真有道理，绝对不应盲从，绝对不应提倡奴隶主义。”而林彪一伙竟要共产党员“服服贴贴”地服从修正主义路线头子的指挥，这种所谓“服服贴贴”，不就是赤裸裸的法西斯纪律吗?"},{"type":"paragraph","text":"野心家林彪一伙叫嚷“服服贴贴”，取消党的斗争哲学，完全是为他篡党夺权的政治路线服务的。无产阶级坚持斗争哲学和反潮流精神，对林彪一伙的修正主义路线，是一个致命的打击。因此，林彪一伙拼命宣扬法西斯的绝对服从论，妄想扼杀无产阶级反对修正主义潮流的精神，要无产阶级放弃阶级斗争和路线斗争，成为他们修正主义路线的“驯服工具”。同时，他们又根据对野心家“服贴”的程度来“划线站队”，对于坚持马克思列宁主义路线，“不服贴”他们的“指挥”的广大党员和干部，竭尽打击迫害之能事；另一方面，他们拉拢、收买死心塌地效“忠”于林彪的反革命分子，拼凑反党阴谋集团，制定反革命武装政变计划，并对这些喽罗们拼命灌输“服服贴贴”地听从指挥的法西斯思想，狂叫“不成功便成仁”。林彪迫不及待地要夺取党和国家的最高权力，变中国为苏修的殖民地，这一切都说明，林彪鼓吹“服贴”就是为了复辟!"},{"type":"paragraph","text":"其实，林彪一伙的“服服贴贴”谬论决不是新发明，只是叛徒刘少奇“驯服工具论”的拙劣翻版而已。刘少奇为了在中国复辟资本主义，早就公开要共产党员作“驯服的工具”，特别要做“容易驾驭的工具”，后来又露骨地叫嚷:中国出了修正主义，也要“服从”。刘少奇垮台以后，林彪接过他的衣钵，把“驯服工具论”改装成“服服贴贴”地听从指挥，重新出笼。“驯服”和“服贴”，其目的都是要取消党的斗争哲学，扼杀党员的革命精神，最后在中国复辟资本主义，这再一次证明了林彪的修正主义路线是刘少奇修正主义路线的继续，他们的实质都是极右!然而，“驯服工具论”并没有使刘少奇摆脱必然灭亡的命运，同样，鼓吹“服服贴贴”的林彪也早己被历史巨轮毫不留情地碾得粉碎，而革命人民却从反面教材中进一步懂得了坚持斗争哲学的重要!"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"林彪","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"反潮流","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a84fe126f0"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
