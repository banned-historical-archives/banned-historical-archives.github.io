script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"右倾机会主义面目的一个暴露","authors":["樊双有"],"dates":[{"year":1974,"month":8,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"右倾机会主义面目的一个暴露"},{"type":"paragraph","text":"沈阳部队后勤部某部副部长　樊双有"},{"type":"paragraph","text":"辽沈战役期间，我是东北人民解放军总部通讯处指导员。一九四八年八、九月间，我们就听说毛主席指示我东北人民解放军南下北宁线，关闭东北大门，把东北之敌就地歼灭，并要求我们迅速行动，集中全力攻克锦州。这是辽沈战役取胜的关键。而林彪从右倾机会主义立场出发，一再干扰和破坏毛主席的战略部署。他借口要打长春，反对部队南下北宁线作战，指挥所迟迟不迁到锦州方面去。对此，毛主席多次电示，对攻锦意义、兵力部署、敌情变化和战役发展的趋势，进行了详细的分析。在毛主席、中央军委多次批评下，林彪拖了三个多月，才勉强表示愿意执行南下作战的方针。部队从九月上旬开始南下。指战员们求战情绪都很高，纷纷要求上前线，杀敌立战功。我们通讯处也做了迅速转移的准备，战士们还自动作了指挥所前移的演习。但我们等了好长时间，一直没有接到行动命令，大家十分焦急。从这里可以看出，林彪当时是有意对抗毛主席、中央军委的集中统一指挥。"},{"type":"paragraph","text":"林彪虽然已部署部队南下，但仍把南线敌情看得十分严重，顾虑重重，犹豫动摇。部队南下后两个多月，林彪根本不到前线，一直泡在哈尔滨。经过毛主席的再三严厉批评，林彪才修正了作战部署，将攻击重点放在锦州，于十月四日勉强把自己的指挥所从哈尔滨移到了阜新。"},{"type":"paragraph","text":"林彪长时间不将指挥所移至前线，暴露了他右倾机会主义的立场。作为前线总指挥，本应在部队运动之先，即八月初即到锦州地区，早日部署攻锦。这样做是我军作战的光荣传统，也是作战指挥上的一条极其重要的原则。任何指挥员离开了战争的实践，都不能制定出正确的作战指导原则。而林彪远离前线千里之外，靠他的那个所谓“特别灵”的头脑胡思乱想，既不能正确判断敌情，又不能果断下定决心，以致拖延了总攻日期，使敌人援军有时间增加兵力，给我阻击部队加大了困难。林彪为什么迟迟不南移自己的指挥所，是因为他不敢同国民党反动派进行决战。"},{"type":"paragraph","text":"从哈尔滨迁移指挥所时，林彪愁眉苦脸地说：“这次我要被打死了！这次我要被打死了！”到了新立屯，他整天躲在山沟里，只是在攻下锦州时，才跑到前沿阵地帽儿山，用望远镜望了望锦州城，要人给他拍了一张“亲临前线”的照片。这是林彪采取欺世盗名的骗术，借以掩盖他贪生怕死的丑恶嘴脸。"},{"type":"paragraph","text":"事实充分证明，林彪根本不是什么“常胜将军”、“天才军事家”，而是一个十足的胆小鬼。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"林彪","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f69159d1f0"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
