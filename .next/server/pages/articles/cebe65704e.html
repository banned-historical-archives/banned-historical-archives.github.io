" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"论人情","authors":["温田丰","重庆"],"dates":[{"year":1957,"month":4}],"is_range_date":false,"parts":[{"text":"论人情","type":"title"},{"text":"重庆温田丰","type":"authors"},{"text":"[编者按：温田丰，1938年入党。现任作协重庆分会创作委员会委员。温田丰说解放后有些党员变成“新贵”了，这是对党的干部的污蔑和歪曲，他要这些同志“恢复”劳动人民的思想感情！好象温田丰怪有劳动人民思想感情似的。否！温田丰有的是腐朽的资产阶级个人主义的思想感情，有的是反党的思想感情！除了极少数的右派分子外我们党绝大多数的同志都是保持着无产阶级的思想感情的。]","type":"paragraph"},{"text":"“从前我们在一起搞地下工作的时候，我的钱他用，我的衣服他穿，……”甲说。","type":"paragraph"},{"text":"“唉，你把共产党员和人情混在一起了！”乙说。","type":"paragraph"},{"text":"“你听吧，现在他当了局长，去年我到北京去看他，他让我在宿舍门口坐冷板凳，——有人说：‘休将笑脸迎新贵’，这话有点道理呢！”","type":"paragraph"},{"text":"“有什么道理？封建士大夫的孤傲！既然是负责同志，就一定很忙，你不能因为小气，看问题就失去阶级立场！”","type":"paragraph"},{"text":"的确，共产党员应该大量，看问题应该有阶级立场。","type":"paragraph"},{"text":"但是，真正的和多数的共产党员，我知道最富有人情。就是杀反革命，也因为对人民有丰富的同情。恨是为了爱！工人阶级受尽压迫，深知人情冷暖；而作为共产党员、马克思主义者，是以解放全人类为抱负的，难道这不是最大的社会同情？","type":"paragraph"},{"text":"难道那位局长不是忘旧的“新贵”么？应当说，新社会仍有旧世态！","type":"paragraph"},{"text":"“共患难而不能共安乐”，不仅违背人情，也违背马克思主义。今天对某些人说来，他应该多多恢复普通劳动人民的思想感情！苏联有个电影叫“三个忠实的朋友”，讽刺了那个绰号叫“火鸡”的官僚主义者。很有趣而且鞭策人心。但是，我觉得“火鸡”还有个长处，就是他还没有忘旧！……","type":"paragraph"}],"comments":[],"origin":"《重庆市右派言论选辑第五集》（内部文件，只供领导同志参考，请勿外传和翻印），中共重庆市委宣传部办公室编印，1957年9月。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cebe65704e"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
