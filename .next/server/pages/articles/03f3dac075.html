script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反对资产阶级自由化是从严治党重要内容","authors":["叶卫平"],"dates":[{"year":1990,"month":10,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反对资产阶级自由化是从严治党重要内容"},{"type":"paragraph","text":"中国人民大学讲师  叶卫平"},{"type":"paragraph","text":"前些年由于忽视了把反对资产阶级自由化列为党的建设的重要内容，虽然党风问题年年提，党内思想不纯、组织不纯、作风不纯的状况却日趋严重，还出现了各种使广大人民群众深恶痛绝的消极腐败现象。"},{"type":"paragraph","text":"资产阶级自由化作为同四项基本原则相对立的政治思潮，一旦在共产党内得到反映和表现，并得到发展与蔓延，就必然导致党内思想严重混乱。一些党员由于受自由化思想的影响，从而对为人民服务、走社会主义道路这些体现党的性质和宗旨的基本原则发生了怀疑和动摇，在大是大非面前迷失了方向。所以，尽管我们党内存在着各种非无产阶级的思想，但是没有一种比资产阶级自由化思潮的危害更大，也没有一种能够脱离资产阶级自由化思潮而单独起作用改变我们党的性质。"},{"type":"paragraph","text":"资产阶级自由化思潮对党的思想的侵蚀，必然导致党的组织不纯。那些头脑里装着许多剥削阶级的脏东西的所谓“精英”，在混入党内后，一方面削尖脑袋往上爬，攫取各种权力和好处；另一方面顽固地表现着自己的非无产阶级世界观，力图按照它来改变我们党的工人阶级先锋队性质和为人民服务的宗旨。他们同那些不想走社会主义道路的个别领导干部同流合污后，就成为党内各种消极腐败现象得以蔓延开来的催化剂。现在真相已经大白，这批坚持资产阶级自由化立场的人，无论是前台人物，还是后台老板，绝大部分是地地道道的腐败分子。"},{"type":"paragraph","text":"这样，资产阶级自由化思潮所造成的党内组织不纯，又导致了前几年党风的严重不纯状况。我们党历史上出现严重的消极腐败现象，只有两次。一次是建国初期。一部分党员干部经不起执政地位的考验，滋长起各种脱离人民群众、贪图享乐、谋求特权的资产阶级思想。他们在资产阶级糖衣炮弹的进攻下蜕变为腐败分子。再一次就是前几年资产阶级自由化泛滥成灾的时期。这两次的情况虽有不同，却有着惊人的相似之处，其中重要的一点就是都同资产阶级及其意识形态的侵袭和腐蚀有着深刻的内在联系。资产阶级自由化思潮的代表人物大部分是共产党员，而且一般分布在比较重要的部门和领域，在不同程度上影响着党的决策，可以利用执政党的权力，打着推行新政策的旗号，居高临下地把意志薄弱者驱入资产阶级的泥坑。而这些“癌细胞”在吞噬了党的血肉、败坏了党的肌体之后，就大言不惭地宣布共产党不行了，社会主义制度不行了，公开打出了复辟资本主义的旗号。"},{"type":"paragraph","text":"党内消极腐败现象是前几年党内思想不纯、组织不纯、作风不纯的必然结果。它告诫我们要从严进行党的思想建设、组织建设和作风建设，就必须始终如一、坚持不懈地反对资产阶级自由化思潮。堡垒是最容易从内部攻破的。共产党是社会主义国家的执政党，各级政权组织都接受它的领导，党一垮，整个社会主义制度也就不复存在了。所以，不管资产阶级自由化思潮原来是从哪里滋生出来的，最后都要进入到共产党里来，并把共产党作为它的主要政治舞台。这一特点是我们必须从严治党的重要原因。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"03f3dac075"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
