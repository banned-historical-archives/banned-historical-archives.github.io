" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"我为什么还要鸣？","authors":["武汉大学","程千帆"],"dates":[{"year":1957,"month":4,"day":30}],"is_range_date":false,"parts":[{"text":"我为什么还要鸣？","type":"title"},{"text":"武汉大学程千帆","type":"authors"},{"text":"（原编者按：这个材料，是根据武汉大学政治学习委员会办公室所提供的材料选编的）","type":"subtitle"},{"text":"（节录）","type":"subtitle"},{"text":"关于党群关系问题。大家都要拆墙，我认为拆墙首先要明辨是非，武大形成一种很不好的风气：“假积极分子帮倒忙”。有些人对上阿谀逢迎，对下欺压，这种人甚至钻到党内去了，这样就使群众与党的距离更远。根子在什么地方呢？我认为在于徐懋庸同志过去说：“投共产党之机，投革命之机，有什么不好，久了就可以弄假成真。”这些上拍下压的人，因此，在每次运动中，都很活跃，给党的工作反而带来损失。群众总结了这批假积极分子的入党术有五条：（一）三年不提意见；（二）一切“体会”领导意图，察言观色；（三）常跑人事处接近当权派；（四）重点走一人门路；（五）通过亲戚，或夫妻关系。去年有一位品质很坏的人，领导为了准备吸收他入党事先伪造材料，硬迫群众选他为先进工作者。结果此人不但未起到积极作用，反而使党的威信低落，连党内都有意见。这种人被认为靠拢党，许多正派人就不敢靠拢了。我希望党明辨是非，当然，武大绝大多数党员都是好的，我这里所说的只是一小撮投机分子的情况。他们是群众所最不喜欢的人。","type":"paragraph"},{"text":"最后谈谈民主党派在学校中的地位。我是前几年加入九三学社的；居然有人把这个民主党派当成商店，问九三学社是否是公私合营的。群众不了解这个组织，报上宣传得也不够，“人民日报”谈到某些人的模范事迹，只提他是党团员，从不提是民主党派成员。有一次开省政协会，有外地委员问：“中国有共产党为什么还有其他民主党派。”我正要说明，有个干部拉住我说：“不必说了，因为一下说不清楚。”为什么不让我说明白呢？1953年在朝鲜慰问，有位领导同志竟要我不要对朝鲜同志说中国有民主党派。……","type":"paragraph"},{"text":" (5月16日在“长江日报”上发表)","type":"paragraph"},{"text":" 来源：《右派言论选集》（湖北人民出版社，1957年9月）。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"932076188b"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
