script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"“白毛女”对小资产阶级的教育","authors":["佚名"],"dates":[{"year":1951,"month":10,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"佚名"},{"type":"paragraph","text":"“中国历代农民在封建的经济剥削和封建的政治压迫下，过着贫穷困苦的奴隶式的生活，农民被束缚于封建制度下，没有人身的自主，地主对农民有随意打骂至处死之权。”近百年来，帝国主义的侵入，变中国为半殖民地半封建的国家，地主更与买办阶级勾结起来，对农民进行了更残酷的压榨。"},{"type":"paragraph","text":"中国小资产阶级知识分子，多半生长于大小城市及乡镇上，反动统治者割断了他们与农民的联系，更企图在这个阶层内培养起一批反动统治的爪牙。绝大多数的小资产阶级出身的知识分子，虽然受到帝国主义、封建残余及大资产阶级的压迫，遭受到失学失业的威胁，深感痛恨、滋长了革命观念。但是对于贫苦农民在人格上生命上直接受到地主阶级的残害，部份的小资产阶级出身的知识分子虽“耳有所闻”，但那是极其浅薄的，与自己的切身利害不发生很大的关系，有的也仅仅是一种同情。"},{"type":"paragraph","text":"“白毛女”影片上映了，这对小资产阶级知识分子(尤其是未做过农村工作的)是一个很好的阶级教育，对于农家的朴实可爱，杨白劳的死及喜儿大春的受迫害均激起高度同情，在思想上树立起对反革命恶霸地主的仇恨。"},{"type":"paragraph","text":"通过了影片“白毛女”，对于小资产阶级知识分子还有些什么教育和启示呢?在我个人有如下的几点体会:"},{"type":"paragraph","text":"(一)大春和喜儿自始至终的爱情，是建筑在阶级友爱，共同劳动谋取美满生活的基础上，因此表现在思想感情上是真挚的、纯洁的、牢不可破的爱情。这样可以澈底消除了小资产阶级知识分子过去歧视农民“文化低，不懂得恋爱”的错误观念。"},{"type":"paragraph","text":"(二)坚定的阶级立场和顽强的斗争性:当大春将要别去母亲投奔黄河西时王大婶这样嘱付“那个村儿有财主，别进那个村子去!”，喜儿在黄家忍辱地坚持到底及以后生活在山上，极度的困苦的情况下，始终顽强的活下去，这些都说明了农民阶级坚贞不移的高贵品质，和一般小资产阶级出身的知识分子的革命动摇性，是多么的不同，又是多么的值得我们学习。"},{"type":"paragraph","text":"(三)用马列主义毛泽东思想的科学观点，扫除封建迷信，教育群众:中国农民被封建统治了数千年，被剥夺了学文化的权利，统治者又利用宗教迷信来愚昧农民，以巩固反动统治，因此，迷信观念，尚存在农村中未被澈底消除，多少是妨碍了觉悟的提高的，但是受到革命教育的大春就很沉着的运用了马列主义毛泽东思想的科学观点，进行实地调查，搞清楚事实真象，教育了农民，消除了农民的顾虑，进一步发动与组织农民，使斗争力量得到空前的高涨，斗垮了恶霸及其帮凶者。这说明了组织群众首先在干部本身应有高度的政治水平，才能好好的组织群众，更好的有利的将革命进行到底。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"914ba5bc2c"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
