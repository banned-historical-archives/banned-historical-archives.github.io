" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共中央转发中南局关于河南洛阳地区发生求神事件指示的批示","authors":[],"dates":[{"year":1953,"month":2,"day":19}],"is_range_date":false,"parts":[{"text":"中共中央转发中南局关于河南洛阳地区发生求神事件指示的批示","type":"title"},{"text":"各中央局、分局并转各省委：","type":"appellation"},{"text":"转去中南局关于河南洛阳地区发生求神事件的指示。由于冬季雪雨不足，今春在某些地区发生传染病势所难免，如不及早切实注意解决，又将成为反动分子煽动暴乱，发展反动会门的机会。中南局的指示是正确的，要在事先注意，要帮助农民解决实际问题，针对可能发生瘟疫的情况，开展爱国卫生运动，并组织医务人员去深入农村，切实帮助农民解决医药治病问题。各地除应注意培养西医外，必须团结与使用中医，购销中药，以补西医之不足，此报及中南原电可登党刊。","type":"paragraph"},{"text":" 中央1953年2月19日","type":"paragraph"}],"comments":[],"origin":"根据文件的原件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b14cd7f4e5"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
