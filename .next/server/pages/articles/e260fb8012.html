<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共遵义地委关于当前农村疫病情况的报告","authors":[],"dates":[{"year":1959,"month":7,"day":14}],"is_range_date":false,"parts":[{"text":"中共遵义地委关于当前农村疫病情况的报告","type":"title"},{"text":"省委：","type":"appellation"},{"text":"七月份以来，各县陆续发生了胃肠传染病、浮肿、伤寒、疟疾、麻疹等疾病，据不精确的统计，患者约有5万人左右；胃肠传染病为最多，并有死亡发生，患病者以青壮年占多数，疾病流行比较普遍的有泥潭、赤水、仁怀和遵义，在这些县（市）的部分公社，又显得比较严重。如泥潭县的绥阳公社，患病者达3033人，遵义市新人公社达1800人，在这些疾病流行比较严重的地区，群众情绪不稳，严重影响生产。","type":"paragraph"},{"text":"发生疾病的原因是多样的，据各县分析，主要是：（1）夏季是多病季节，气候变化无常，前些时期雨水过多，气温较低，近来天气转晴，天气骤然暴热，就使一些流行性的疾病，如胃肠传染病、伤寒等流行起来。（2）青壮年在两个月的时间内，抢水打田、栽秧，长时间在水田中工作，疲劳过度，就引起了浮肿现象。在往年栽秧后，就有“秧[此处有六至七字不清]发生，今年因为缺乏“插秧酒”和“油茶”的供应，这使这种病症多起来了。（3）近来农民吃食野菜和生果较多，有些未[此处有四至不清]，又加上处理不当，就有不少人发生食物中毒，出现浮肿和[此处有二字不清]。（4）在部分地区粮食供应量减少，造成营养不足，这是使一些疾病得以迅速传染的原因之一。如泥潭县绥阳公社，国家供应粮食每人每日平均7两，他们借口节约粮食，采取层层压缩销量的办法，经过公社、管理区的压缩，每人每日平均食粮不到4两；病情严重的金鸡管理区，十天未供应主粮。","type":"paragraph"},{"text":"为了及时扑灭疾病，于7月5日、7日，地委召开了两次电话会议，作了部署，并采取了如下的措施：（1）党委挂帅，各级领导干部分片包干，做好治病、生产和粮食供应工作，第一书记到重病区组织突击治疗。（2）粮食供应量不足的必须增加，要具体安排到户到食堂，使每人每日平均食粮不少于半斤。不准层层扣减销量指标。食粮要讲究吃法，作好粮食品种的调剂，如在食粮中适当增加一些豆类，以增加每日营养。（3）对病人要适当增加供应，黄豆3-5斤，肉半斤至一斤，油3-5两，有糖的地方，对重病号还可供应一点糖。（4）为了帮助贫苦农民解决因患病而造成的困难，专署和县人委都拨了救济款，公社也用公益金对困难户进行救济。（5）专、县、公社组织工作组和中西医医疗组，到病区进行工作和医疗。县成立防疫办公室。","type":"paragraph"},{"text":"地委电话会议之后，各级党组织都十分重视了对疾病的防御和治疗，全区共组织5000名干部和3000多名中西医生，在各级党委的统一领导下，集中重病区，逐户登门治疗和慰问，经过一个星期的治疗，目前各县的患病人数均大大下降，湄潭和绥阳已下降50%，赤水、仁怀的大部分公社已下降40%，浮肿病下降为最快，一般浮肿，只要5天左右的时间，吃几斤黄豆和一些肉类，即可痊愈，可以（下缺）","type":"paragraph"},{"text":" 中共遵义地委办公室1959年7月14日印发","type":"paragraph"}],"comments":[],"origin":"贵州省某档案馆","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e260fb8012"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
