<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"顶着风雨成长的红卫兵小将","authors":[],"dates":[{"year":1976,"month":8,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"在江西省波阳县金盘岭公社胡家生产队召开的批邓大会上，生产队长、上海知识青年刘洪林正在愤怒批判邓小平的反动罪行。他的批判发言，进一步激起了群众对邓小平的愤恨。同时，大家也自然联想到:小刘这个在无产阶级文化大革命中受过伟大领袖毛主席检阅的红卫兵，在农村三大革命运动中顶着风雨成长的经历，也是对右倾翻案风的有力回击。"},{"type":"paragraph","text":"刘洪林是一九七○年来到胡家生产队落户的。这个队田地面积大，劳力比较紧张。可是，队里却常年抽调劳力上山砍柴卖，烧砖瓦，搞得山光田荒，社员年年要吃回供粮。贫下中农对这些现象非常气愤。为什么会出现这些现象呢?小刘对队里存在的问题进一步作了深入调查，发现其中很多事都是由于原生产队长走上了资本主义邪道。刘洪林几次向那个队长提意见，可是不仅没有解决问题，而且还受到了刁难。贫下中农鼓励他说:“小刘，你是当年受过伟大领袖毛主席检阅的红卫兵小将，一定要敢于反潮流，为巩固无产阶级专政冲锋陷阵呵:”他们还反映了有关那个队长贪污盗窃、搞投机倒把以及敌我不分等严重问题。小刘与贫下中农并肩战斗，向队里存在的资本主义倾向猛烈开火，受到了公社、大队领导的支持，终于撤掉了那个坚持走资本主义道路的生产队长的职务，批斗了一小撮拉拢腐蚀干部、煽动弃农经商、搞单干的阶级敌人，煞住了资本主义歪风，巩固了农村社会主义阵地。公社和大队党组织根据贫下中农的推荐，决定让小刘担任生产队长，领导全队的革命和生产。"},{"type":"paragraph","text":"去年夏季前后，党内最大的不肯改悔的走资派邓小平带头煽起的右倾翻案风也刮到了胡家生产队。当时，有的社员看到附近生产队在夏收夏种中采用高工分、吃大锅饭的办法，也要队里这样做。小刘敏锐地感觉到，文化大革命中批判过的“工分挂帅”、“物质刺激”等修正主义黑货，又在死灰复燃了。联系到有的干部在会上提出什么“现在是以‘三项指示为纲’，只要把生产搞上去，什么办法都可以”的论调，他进一步感到，这是一股风口对着无产阶级文化大革命的邪风，是要翻文化大革命的案，算文化大革命的帐。他决心顶住这股风，用实际行动捍卫毛主席的无产阶级革命路线。"},{"type":"paragraph","text":"为了发动广大社员群众抵制这股右倾翻案风，小刘坚持以阶级斗争为纲，把政治夜校搬到田头办，和大家一道学习无产阶级专政理论，学习大寨根本经验，引导大家坚持党的基本路线，深入批判修正主义路线，批判资产阶级法权观念，提高了为革命种田的自觉性。一九七五年，胡家生产队粮食产量超过历史最高水平，比一九七四年增产四万六千斤，不仅改变了吃回供粮的落后面貌，而且还向国家多卖余粮一万斤，集体储备粮食二万多斤。"},{"type":"paragraph","text":"波阳县金盘岭公社革委会报道组"},{"type":"paragraph","text":"波阳县革委会报道组"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"反潮流","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"限制资产阶级法权","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8f7213c243"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
