script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共中央关于少数民族“自决权”问题给二野前委的指示","authors":[],"dates":[{"year":1949,"month":10,"day":5}],"is_range_date":false,"parts":[{"text":"中共中央关于少数民族“自决权”问题给二野前委的指示","type":"title"},{"text":"二野前委，并告各中央局、分局及各前委：","type":"paragraph"},{"text":"申哿〔1〕 电悉。大体上同意你们所拟“关于少数民工作的指示草案”，惟壹项关于党的民族政策的申述，应根据人民政协共同纲领中民族政策的规定。又关于各少数民族的 “自决权”问题，今天不应再去强调，过去在内战时期，我党为了争取少数民族，以反对国民党的反动统治（它对各少数民族特别表现为大汉族主义）曾强调过这一口号，这在当时是完全正确的。但今天的情况，已有了根本的变化，国民党的反动统治基本上已被打倒，我党领导的新中国业经诞生，为了完成我们国家的统一大 业，为了反对帝国主义及其走狗分裂中国民族团结的阴谋，在国内民族问题上，就不应再强调这一口号，以免为帝国主义及国内各少数民族中的反动分子所利用，而使我们陷于被动的地位。在今天应强调，中华各民族的友爱合作和互助团结，此点望你们加以注意。","type":"paragraph"},{"text":" 中　央酉微〔2〕","type":"paragraph"},{"text":"注释","type":"appellation"},{"text":"〔1〕申哿，即九月二十日，","type":"appellation"},{"text":"〔2〕酉微，即十月五日。","type":"appellation"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"02c97ff77d"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
