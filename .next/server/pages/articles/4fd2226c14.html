script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"歌唱党，歌唱祖国，歌唱毛主席！","authors":[],"dates":[{"year":1964,"month":11,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"歌唱党，歌唱祖国，歌唱毛主席！"},{"type":"paragraph","text":"音乐舞蹈史诗《东方红》，一共包括了三十多首群众革命歌曲。其中大部分是在各个革命历史时期流传的歌曲，集中地表现了各个革命时期工农兵的革命情感，它们至今还为广大人民和青年所喜爱。"},{"type":"paragraph","text":"许多诗人、作曲家热情地参加了《东方红》的创作工作，他们写出了不少歌唱伟大的党、歌唱伟大的祖国、歌唱伟大的领袖毛主席的颂歌。我们根据《东方红》最后的定稿，今天选刊了三首过去没有发表过的歌曲。其中《伟大的祖国》，虽不在《东方红》演出的节目之内，但也是在参加《东方红》创作的过程中写出来的。我们希望大家学这些歌，唱这些歌，让革命的歌声唱得更响亮！"},{"type":"paragraph","text":"（附歌曲）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4fd2226c14"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
