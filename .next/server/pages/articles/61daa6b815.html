" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji34","name":"毛泽东全集第34卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji34.pdf"],"article":{"title":"对中国人民解放军政治工作条例草案的批语","alias":"","parts":[{"type":"paragraph","text":"对中国人民解放军政治工作条例"},{"type":"paragraph","text":"草案的批语\""},{"type":"paragraph","text":"（1954年4月15日）"},{"type":"paragraph","text":"略有修改，可即印发。修改处请刘少奇、彭德怀、罗荣桓同志一阅。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"四月十五日"},{"type":"paragraph","text":"[1]这个批语写在人民革命军事委员会总政治部主任罗荣桓、副主任傅钟、肖华、甘泗淇1954年3月10日给毛泽东的报告上。报告中说：中国人民解放军政治工作条例，经过一年多的研究、修改，共写出各条例草案二十种，其中主要的四种，即：政治工作条例总则、中国共产党军队委员会条例、政治委员工作条例、总政治部工作条例。"},{"type":"paragraph","text":"[2]毛泽东所作的修改，主要是把中国人民解放军政治工作条例总则草案第二条的首句“中国人民解放军在党和毛泽东同志的领导下”，改写为“中国人民解放军在中国共产党的领导下”，同时把这一条的“积极地有步骤地建设自已成为世界上第二支最优良的现代化的革命军队”一句中的“世界上第二支最”7个字删去。"},{"type":"paragraph","text":"[3]彭德怀，当时任人民革命军事委员会副主席。"}],"authors":["毛泽东"],"dates":[{"year":1954,"month":4,"day":15}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":69,"page_end":69},"tags":[{"name":"毛泽东","type":"人物"},{"name":"彭德怀","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"61daa6b815"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
