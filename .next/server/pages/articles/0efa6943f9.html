script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji14","name":"毛泽东全集第14卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji14.pdf"],"article":{"title":"纪念白求恩","alias":"","parts":[{"type":"paragraph","text":"纪念白求恩"},{"type":"paragraph","text":"（1939年12月21日）"},{"type":"paragraph","text":"白求恩川同志是加拿大共产党员，五十多岁了，为了帮助中国的抗日战争，受加拿大共产党和美国共产党的派遣，不远万里，来到中国。去年春上到延安，后来到五台山工作，不幸以身殉职。一个外国人，毫无利已的动机，把中国人民的解放事业当作他自己的事业，这是什么精神？这是国际主义的精神，这是共产主义的精神，每一个中国共产党员都要学习这种精神。列宁主义认为：资本主义国家的无产阶级要拥护殖民地半殖民地人民的解放斗争，殖民地半殖民地的无产阶级要拥护资本主义国家的无产阶级的解放斗争，世界革命才能胜利。白求恩同志是实践了这一条列宁主义路线的。我们中国共产党员也要实践这一条路线。我们要和一切资本"},{"type":"paragraph","text":"[1]白求恩即诺尔曼·白求恩（1890—1939），加拿大共产党党员，著名的医生。1936年德意法西斯侵犯西班牙时，他曾经亲赴前线为反法西斯的西班牙人民服务。1937年中国的抗日战争爆发，他率领加拿大美国医疗队，于1938年初来中国，3月底到达延安，不久赴晋察冀边区，在那里工作了一年多。他的牺牲精神、工作热忱、责任心，均称模范。由于在一次为伤员施行急救手术时受感染，1939年11月12日在河北省唐县逝世。"},{"type":"paragraph","text":"[2]参见列宁《民族和殖民地问题提纲初稿》和《民族和殖民地问题委员会的报告》（《列宁全集》第39卷，人民出版社1986年版，第159～主义国家的无产阶级联合起来，要和日本的、英国的、美国的、德国的、意大利的以及一切资本主义国家的无产阶级联合起来，才能打倒帝国主义，解放我们的民族和人民，解放世界的民族和人民。这就是我们的国际主义，这就是我们用以反对狭隘民族主义和狭隘爱国主义的国际主义。"},{"type":"paragraph","text":"白求恩同志毫不利已专门利人的精神，表现在他对工作的极端的负责任，对同志对人民的极端的热忱。每个共产党员都要学习他。不少的人对工作不负责任，拈轻怕重，把重担子推给人家，自已挑轻的。一事当前，先替自己打算，然后再替别人打算。出了一点力就觉得了不起，喜欢自吹，生怕人家不知道。对同志对人民不是满腔热忱，而是冷冷清清，漠不关心，麻木不仁。这种人其实不是共产党员，至少不能算一个纯粹的共产党员。从前线回来的人说到白求恩，没有一个不佩服，没有一个不为他的精神所感动。普察冀边区的军民，凡亲身受过白求恩医生的治疗和亲眼看过白求恩医生的工作的，无不为之感动。每一个共产党员，一定要学习白求恩同志的这种真正共产主义者的精神。"},{"type":"paragraph","text":"白求恩同志是个医生，他以医疗为职业，对技术精益求精；在整个八路军医务系统中，他的医术是很高明的。这对于一班见异思迁的人，对于一班鄙薄技术工作以为不足道、以为无出路的人，也是一个极好的教训。"},{"type":"paragraph","text":"我和自求恩同志只见过一面。后来他给我来过许多信。可是因为忙，仅回过他一封信，还不知他收到没有。对于他的死，我是很悲痛的。现在大家纪念他，可见他的精神感人之深。我们大家要学习他毫无自私自利之心的精神。从这点出发，就可以变为大有利于人民的人。一个人能力有大小，但只要有这点精神，就是一个高尚的人，一个纯粹的人，一个有道德的人，一个脱离了低级趣味的人，一个有益于人民的人。"},{"type":"paragraph","text":"《会见白求恩》（油画）恩求白习学"},{"type":"paragraph","text":"行爱屋书华新"},{"type":"paragraph","text":"1949年11月，新华书店发行的《学习白求恩》，该文在新中国成立后编入《毛泽东选集》时改为《纪念白求恩》。《会见白求恩》（油画）茶末苹奢福宏瘤童全国鼠以麓密调内见他长恩索摄华假癌胶到恋史四门初毛霉束一九三八三庆大的熙生藏士书尔曼·白米离了低线味的人一个有益于人民的人一个纯辫的人一间有道德的人一筒胧变有追墅糟神就是-间高尚的人刷于人民的人一个人能7有大小但Le：欲痘然恐发贰可以变为大有他觉无自不自科义心的精神欧们大家要学习追是国熙主义的精神"},{"type":"paragraph","text":"事策追景叶废精神放事湾非他自已的电无利已的勤擦把中家\u003c民的解工作不幸以身狗一画外圆\u003c专年-春上刹吧安像来刹系合的源遣不遗里来裂中国"},{"type":"paragraph","text":"白术恩同生是拿大共隆导区熊念自求恩《纪念白求恩》（中国画）"}],"authors":["毛泽东"],"dates":[{"year":1939,"month":12,"day":21}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":222,"page_end":227},"tags":[{"name":"毛泽东","type":"人物"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0efa6943f9"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
