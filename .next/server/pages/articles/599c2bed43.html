script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"热情支持社会主义新生事物　解放军空军某师团以上干部认真学习无产阶级专政理论，自觉破除资产阶级法权思想，带头送子女上山下乡","authors":[],"dates":[{"year":1975,"month":3,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"热情支持社会主义新生事物"},{"type":"paragraph","text":"解放军空军某师团以上干部认真学习无产阶级专政理论，自觉破除资产阶级法权思想，带头送子女上山下乡"},{"type":"paragraph","text":"新华社一九七五年三月二十六日讯人民解放军空军某师团以上干部，认真学习毛主席关于理论问题的重要指示和马克思主义关于无产阶级专政的理论，努力提高支持社会主义新生事物的自觉性。最近，这些师、团领导干部把高、初中应届毕业的子女，送到农村插队落户。"},{"type":"paragraph","text":"这些师、团干部在学习过程中，热烈讨论了不断壮大社会主义新生事物对于限制资产阶级法权的重要意义。师政委李贤荣为了弄清支持社会主义新生事物与限制资产阶级法权的关系，认真学习了毛主席的哲学著作。毛主席指出：“任何事物的内部都有其新旧两个方面的矛盾，形成为一系列的曲折的斗争。斗争的结果，新的方面由小变大，上升为支配的东西；旧的方面则由大变小，变成逐步归于灭亡的东西。”李贤荣学习了毛主席的这一教导，深刻认识到，在无产阶级文化大革命和批林批孔运动中涌现出来的知识青年上山下乡等一系列的社会主义新生事物，反映了无产阶级的根本利益，代表着社会发展的方向。热情支持和积极扶植这些新生事物更好地成长，这对于在无产阶级专政条件下限制资产阶级法权，缩小三大差别，逐步增长共产主义因素，有着重大意义。认识提高以后，他积极鼓励高中毕业的女儿带头报名到农村插队落户，到广阔的天地里进行锻炼。"},{"type":"paragraph","text":"在学习中，许多领导干部还谈到，作为一个领导干部，一定要自觉地支持革命新生事物的成长，自觉地破除资产阶级法权思想，为巩固无产阶级专政而斗争。师副政委冯战军、某团团长张良松学习了毛主席关于理论问题的重要指示，重温了新党章，更深刻地认识到支持社会主义新生事物的重要意义，都带头把女儿送到山区插队落户。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"批林批孔","type":"主题/事件"},{"name":"上山下乡","type":"主题/事件"},{"name":"限制资产阶级法权","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"599c2bed43"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
