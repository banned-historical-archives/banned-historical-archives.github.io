script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji24","name":"毛泽东全集第24卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji24.pdf"],"article":{"title":"对太原作战的意见","alias":"","parts":[{"type":"paragraph","text":"对太原作战的意见！"},{"type":"paragraph","text":"（1948年10月6日）徐、周、陈："},{"type":"paragraph","text":"申俭作战计划电，酉江作战部署电及酉微战况电均悉。你们原定酉巧开始太原战役，现已提前十三天。因敌被迫向外扩张，给我以良好歼敌机会，如果敌人战力不强，你们又指挥得当，乘机进击，可能于短时间内全部肃清城外之敌，并可能缩短攻城时间，不"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军委起草的给华北军区第一副司令员兼第一兵团司令员兼政治委员徐向前、第一兵团副司令员兼副政治委员周士第和参谋长陈漫远的电报。"},{"type":"paragraph","text":"[2]指1948年9月28日华北军区第一兵团前委关于太原战役作战计划给中共中央军委的电报。电报提出，太原战役的“战役指导方针，系以围困、瓦解、攻击，逐步削弱，然后一举攻下太原。战役拟于十月十八日开始，争取三个月内结束”。电报还报告了我军攻击太原的主要步骤和兵力部署。"},{"type":"paragraph","text":"[3]指1948年10月3日20时徐向前、周士第、陈漫远给中共中央军委等的电报。"},{"type":"paragraph","text":"[4]太原战役，指华北军区对山西省会太原的国民党守军发起的城市攻坚战。10月5日开始外围战斗，12月4日，占领了城南和东山各要点，歼敌3万余人。此后，遵照中共中央军委指示，太原前线部队暂缓攻城，转入围城休整。中国人民解放军于1949年4月20日对太原发起总攻，至24日攻占该城，全歼守敌。此役共歼敌13万余人，生俘太原绥靖公署副主任孙楚、太原防守司令王靖国等，结束了阎锡山在山西38年的反动统治。要停留多久，即可乘势攻城，提早解放太原。因此你们发布战讯时，不要说敌人向外扩张，而应说你们业已开始太原战役，并且战讯要待外围战大体告一段落时发表为宜。"},{"type":"paragraph","text":"军委鱼子"}],"authors":["毛泽东"],"dates":[{"year":1948,"month":10,"day":6}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":528,"page_end":529},"tags":[{"name":"毛泽东","type":"人物"},{"name":"徐向前","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b86a860baf"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
