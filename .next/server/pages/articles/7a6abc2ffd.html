script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"新疆庆祝大会　电毛主席致敬","authors":[],"dates":[{"year":1949,"month":10,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新疆庆祝大会"},{"type":"paragraph","text":"电毛主席致敬"},{"type":"paragraph","text":"【新华社北京四日电】此间接到迪化市人民庆祝中华人民共和国中央人民政府成立暨新疆和平解放大会通电一件，电文如下：北京中央人民政府毛主席、朱副主席、刘副主席、宋副主席、李副主席、张副主席、高副主席钧鉴："},{"type":"paragraph","text":"在中华人民共和国诞生之前夕，全疆军民举起了正义的旗帜，毅然脱离广州反动政府的枷锁，英勇的投向人民民主的阵营，我们以万分赤诚接受人民伟大领袖毛主席的领导，接受中央人民政府的领导，从此我们新疆五百三十万人民的力量，投掷在人民解放的洪流中，英勇坚决地为建设新民主主义新中国和新新疆而努力。在我们取得光明解放的今天，在中华人民共和国诞生的今天，在伟大人民领袖毛主席荣任中华人民共和国首任主席和朱总司令、刘少奇、宋庆龄、李济深、张澜、高岗诸先生荣任副主席的今天，我们全疆人民于狂欢庆祝之际，谨向伟大人民领袖毛主席致最崇高敬礼。并对英勇无比的人民解放军致最崇高敬礼。"},{"type":"paragraph","text":"毛主席万岁！"},{"type":"paragraph","text":"中央人民政府万岁！"},{"type":"paragraph","text":"中华人民大团结万岁！"},{"type":"paragraph","text":"新疆省迪化市人民庆祝中华人民共和国中央人民政府成立暨本省和平解放大会　　　　　　　　　　　　十月二日"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7a6abc2ffd"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
