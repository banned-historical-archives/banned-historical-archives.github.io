" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"全国人民代表大会常务委员会关于增加农业生产合作社社员自留地的决定","authors":["(一九五七年六月二十五日全国人民代表大会常务委员会第七十六次会议通过)"],"dates":[{"year":1957,"month":6,"day":25}],"is_range_date":false,"parts":[{"text":"全国人民代表大会常务委员会关于增加农业生产合作社社员自留地的决定","type":"title"},{"text":"(一九五七年六月二十五日全国人民代表大会常务委员会第七十六次会议通过)","type":"authors"},{"text":"1957年6月25日全国人民代表大会常务委员会第七十六次会议讨论了国务院周恩来总理提出的关于适当增加农业生产合作社社员自留地的议案，决定对高级农业生产合作社示范章程第十六条作如下补充规定：农业生产合作社可以根据需要和当地条件，抽出一定数量的土地分配给社员种植猪饲料。分配给每户社员的这种土地的数量，按照每户社员养猪头数的多少决定。每人使用的这种土地，连同高级农业生产合作社示范章程所规定的分配给社员种植蔬菜的土地，合计不能超过当地每人平均土地数的百分之十。","type":"paragraph"}],"comments":[],"origin":"根据文件翻印件打印。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f3ab09ff96"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
