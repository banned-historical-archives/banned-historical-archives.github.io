script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反对封建性剥削无锡鱼贩要求 鱼市场改国营","authors":[],"dates":[{"year":1950,"month":11,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【无锡讯】　锡市四百多鱼贩，反对鱼行的一贯依恃恶势力进行封建性的过分剥削和各种不合理的陋规，特联名向各有关领导机关申请将鱼市场改为国营，并要求政府协助组织他们自己的工会。"},{"type":"paragraph","text":"解放前，在反动势力的庇护下，鱼市场被少数鱼行把持着，他们不仅任意抬压价格，并且经常无理打骂鱼贩。如某经纪人，被他打过的鱼贩有九十多人。解放前苏北人在鱼市场买不到鱼，鱼行里专把小鱼、烂鱼留给苏北鱼贩。"},{"type":"paragraph","text":"无锡鱼行业在经营方式上，也存在着强迫买卖、抬价压价、短少斤量等非法陋规。鱼贩沈贵根有一次向协记鱼行买廿斤鱼，他秤了五、六十斤，沈不要时，秤手就把他帽子往屁股底下一坐恨恨地说“不要也得要!”"},{"type":"paragraph","text":"解放前，因为鱼价为少数人操纵，因此场内鱼价往往比场外高，北门鱼贩王桂林、余惠明有一次在场外贩了五、六十斤鲜鱼，被鱼行老板知道了，就买通伪警察把他们抓起来，后来余惠明的丈母到鱼行老板家去磕头，结果鱼被没收了，花了几百元伪币，说尽了好话，人才放出来。"},{"type":"paragraph","text":"解放后，鱼贩们在政府接管后鱼市场工作同志的不断教育下，政治觉悟逐步提高了，他们迫切要求从多年来束缚的封建剥削下解放出来，因此他们向鱼市场提了意见，并分别向市工商局等领导机关请求成立国营鱼市场，并成立工会。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9e2b1fee89"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
