script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"阿尔巴尼亚外交部照会波兰驻阿大使馆断然拒绝波政府对阿大使的恶意诽谤指出苏联修正主义者对波政府的压力决不能损害阿波人民的伟大友谊，波政府必须对这种严重和无理的行径承担全责","authors":[],"dates":[{"year":1966,"month":3,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社地拉那1日电　阿尔巴尼亚外交部二月二十五日把一份照会交给波兰驻阿尔巴尼亚大使馆，断然拒绝波兰政府对阿尔巴尼亚驻波兰大使捏造的指责，并且坚决抗议波兰政府宣布阿尔巴尼亚大使为不受欢迎的人的不友好作法。"},{"type":"paragraph","text":"照会说，波兰外交部二月二十三日通知阿尔巴尼亚驻波兰大使科乔·普里夫蒂，说什么在一九六四年和近几周来，在波兰各地散发了在阿尔巴尼亚印刷的反对波兰的材料，阿尔巴尼亚驻华沙大使馆曾经把一份阿尔巴尼亚的护照给了一名波兰公民，因此，波兰政府认为科乔·普里夫蒂大使留在波兰是不受欢迎的人。"},{"type":"paragraph","text":"科乔·普里夫蒂大使当即理所当然地拒绝了这种无中生有的指责，并且坚决抗议波兰政府的这种不友好的作法。"},{"type":"paragraph","text":"照会说，阿尔巴尼亚政府断然拒绝波兰政府对阿尔巴尼亚驻波兰大使科乔·普里夫蒂那些毫无根据和故意捏造的指责。波兰政府这种不能容忍的行为，只能削弱阿尔巴尼亚和波兰两国人民之间的友好关系，削弱科乔·普里夫蒂大使和阿尔巴尼亚驻波兰大使馆全体人员为之而积极和正确地工作的友谊。波兰政府对此必须承担全部责任。"},{"type":"paragraph","text":"照会说，波兰政府十分清楚，如同过去一样，近几周来，阿尔巴尼亚驻华沙大使馆的大使和工作人员没有干涉过波兰的内政，更没有涉及到所谓在阿尔巴尼亚印刷的反对波兰的材料或所谓“一名波兰公民拿着阿尔巴尼亚的护照”的莫须有的事情。"},{"type":"paragraph","text":"照会说，在阿尔巴尼亚劳动党二月十一日就援助越南问题召开华沙条约成员国和亚洲社会主义国家共产党和工人党会议的问题复信给波兰统一工人党之后，波兰政府在苏联修正主义政府的压力下和已经召回驻地拉那大使的一些欧洲社会主义国家的压力下，捏造这些事件来迫使阿尔巴尼亚政府采取对等措施，在波兰政府对阿尔巴尼亚驻华沙大使采取粗暴和毫无根据时行为之后要求召回波兰驻地拉那的大使。苏联修正主义者对波兰政府的压力已经达到了目的，但是这种压力过去不能，将来也决不能损害阿尔巴尼亚人民和政府对兄弟的波兰人民的伟大友谊。"},{"type":"paragraph","text":"照会指出，波兰政府正在把阿尔巴尼亚劳动党同波兰统一工人党之间的意识形态方面的分歧扩大到国家与国家之间的关系中去。但是任何人都不会相信波兰政府对阿尔巴尼亚驻波兰大使馆和对阿尔巴尼亚驻波兰大使的诽谤。这些指责显然都是站不住脚的，都是波兰政府为了欺骗波兰和世界舆论而故意捏造的。"},{"type":"paragraph","text":"照会最后说，阿尔巴尼亚政府强烈拒绝这种恶意和荒谬的指责和诽谤，因为波兰政府是根据这些指责和诽谤把阿尔巴尼亚大使科乔·普里夫蒂作为不受欢迎的人而要求阿尔巴尼亚人民共和国予以召回。波兰政府必须对这种严重和无理的行径承担全部责任。同时，阿尔巴尼亚政府完全有理由和有权利认为，波兰驻阿尔巴尼亚大使斯坦尼斯瓦夫·罗古尔斯基是不受欢迎的人，并且要求波兰人民共和国予以召回。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b2b8fb9f58"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
