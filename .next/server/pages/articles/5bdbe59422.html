script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"“泰国人民之声”电台强烈谴责苏修武装侵捷坚信苏捷人民和各国人民经过坚决的斗争 将彻底埋葬以苏修为中心的现代修正主义","authors":[],"dates":[{"year":1968,"month":8,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京二十八日电　“泰国人民之声”电台三十七日广播一篇文章，强烈谴责苏修叛徒集团公然出兵武装占领捷克斯洛伐克的侵略罪行，坚决支持捷克斯洛伐克人民反抗侵略的斗争。"},{"type":"paragraph","text":"文章指出，苏修叛徒集团对捷克斯洛伐克实行军事占领这一法西斯侵略行为，充分地暴露了苏修叛徒集团的反革命狰狞面目，反映出以苏修为中心的现代修正主义集团的严重危机。"},{"type":"paragraph","text":"文章说，这次苏修叛徒集团纠集它的追随者悍然出兵占领捷克斯洛伐克，是苏修叛徒集团推行大国沙主义和民族利己主义的结果，是整个现代修正主义集团内部矛盾极其尖锐化的结果，是美帝国主义同苏修领导集团争夺东欧和重新瓜分世界的矛盾极度尖锐化的结果。苏修叛徒集团的侵略罪行，使世界革命人民清楚地看到现代修正主义集团已经十分腐败，它们党全背叛了马克思列宁主义。"},{"type":"paragraph","text":"文章指出，修正主义集团统治下的苏联已经不是社会主义国家。苏联人民、捷克斯洛伐克人民和东欧各国人民以及全世界革命人民，从这次苏修叛徒集团的侵略罪行中，更进一步看清了现代修正主义的反革命狰狞面目，加速觉醒，坚决起来反对修正主义。这就使苏修叛徒集团越来越孤立。"},{"type":"paragraph","text":"文章接着说，世界革命人民的伟大导师毛泽东主席指出:“虽然，苏联的党和国家的领导现在被修正主义者篡夺了，但是，我劝同志们坚决相信，苏联广大的人民、广大的党员和干部，是好的，是要革命的，修正主义的统治是不会长久的。”"},{"type":"paragraph","text":"文章说，泰国共产党英明领导下的泰国革命人民，坚决谴责苏修叛徒集团及其追随者侵略捷克斯洛伐克的罪行，坚决支持捷克斯洛伐克人民反对苏修侵略的斗争，坚决支持苏联革命人民支持捷克斯洛伐克人民反对苏修侵略的斗争，坚决支持苏联革命人民，捷克斯洛伐克以及被现代修正主义统治的国家的革命人民起来进行革命斗争，推翻现代修正主义的反动统治。文章坚信，在马克思列宁主义、毛泽东思想指引下，苏联人民、捷克斯洛伐克人民以及修正主义统治下的其它各国人民经过坚决的斗争，终有一天要把以苏修为中心的现代修正主义彻底埋葬。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5bdbe59422"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
