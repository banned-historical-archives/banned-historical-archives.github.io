script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"比利时马列共机关刊《光明和被剥削者》指出  三个世界理论是反对超级大国霸权主义强大武器  两霸以欧洲为重点的争夺终将导致战争，各国人民必须有所准备","authors":[],"dates":[{"year":1977,"month":11,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"比利时马列共机关刊《光明和被剥削者》指出"},{"type":"paragraph","text":"三个世界理论是反对超级大国霸权主义强大武器"},{"type":"paragraph","text":"两霸以欧洲为重点的争夺终将导致战争，各国人民必须有所准备"},{"type":"paragraph","text":"新华社布鲁塞尔一九七七年十一月七日电　比利时马克思列宁主义共产党中央委员会机关刊《光明和被剥削者》最近一期就十月革命六十周年发表文章指出，毛泽东主席提出的划分三个世界的理论“是反对两个超级大国的霸权主义的强大武器”。"},{"type":"paragraph","text":"文章强调指出：“列宁善于把俄国工人阶级和农民引向胜利，因为他对帝国主义作了正确的分析，即帝国主义是无产阶级革命的前夜。从这个分析出发和根据现实情况，毛泽东主席制定了划分三个世界的重要理论。”这是“当前正确分析国际形势必不可少的。它能在世界范围内的广泛阶级斗争中确定谁是我们的朋友和谁是我们的敌人。它是反对两个超级大国的霸权主义的强大武器。两个超级大国到处争夺，日益激烈，争夺的焦点是欧洲。这种争夺总有一天要导致战争，我们应该看到这一点，并有所准备。”"},{"type":"paragraph","text":"文章说，“苏联社会帝国主义是新起的帝国主义，它拥有世界上最强大的军队，并且不断在加强这支军队，从事侵略和挑衅。它是欧洲人民最大的危险，是世界战争主要的策源地。”文章说，“三个世界的理论是共产党人统一战线政策的基础，它鼓舞欧洲国家和人民之间的团结以及欧洲国家和人民与第三世界国家和人民的团结。”"},{"type":"paragraph","text":"文章指出：“这就是为什么出现了修正主义分子巨大规模的反对三个世界的理论、反对国际共产主义运动团结的原因。”"},{"type":"paragraph","text":"文章最后说，比利时马克思列宁主义共产党“忠诚于无产阶级国际主义，站在反帝斗争的前列”，坚定地“保卫三个世界的理论，保卫国际共产主义运动的团结”。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"世界形势","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0fd714f62e"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
