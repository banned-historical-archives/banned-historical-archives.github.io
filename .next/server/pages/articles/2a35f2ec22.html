" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中国人民解放军陕西省公安机关军管会通缉令","authors":[],"dates":[{"year":1969,"month":5,"day":4}],"is_range_date":false,"parts":[{"text":"中国人民解放军陕西省公安机关军管会通缉令","type":"title"},{"text":"最高指示","type":"subtitle"},{"text":"千万不要忘记阶级斗争。","type":"paragraph"},{"text":"专政是群众的专政。","type":"appellation"},{"text":"各地公检法军管会（组）：","type":"appellation"},{"text":"罪犯谈二狗，出身富农，对新社会主义集体不满，在人们高喊“毛主席万岁”的时候，他却说，“人没有能活到一万岁的”。他恶毒攻击伟大领袖，被判处有期徒刑十年，该犯在转场时潜逃。","type":"paragraph"},{"text":"谈二狗特征，男，三十岁，身高五尺，圆胖脸，小眼睛，留短发平头，陕西口音，逃跑时，上身穿蓝色土布褂，下身穿方格短裤。","type":"paragraph"},{"text":"希各地协助查捕该犯后，电告我会。","type":"paragraph"},{"text":" 中国人民解放军陕西省公安机关军管会1969年5月4日","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"陕西文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2a35f2ec22"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
