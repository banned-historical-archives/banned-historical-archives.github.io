script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"伊朗报纸揭露苏修对发展中国家进行剥削  要求调整伊朗售给苏联的天然气价格","authors":[],"dates":[{"year":1974,"month":5,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"伊朗报纸揭露苏修对发展中国家进行剥削"},{"type":"paragraph","text":"要求调整伊朗售给苏联的天然气价格"},{"type":"paragraph","text":"新华社德黑兰一九七四年五月二十四日电　伊朗《世界报》（国际版）五月二十三日发表题为《俄国廉价取得伊朗天然气》的文章，揭露苏联对发展中国家进行剥削，要求重新调整伊朗出售给苏联的天然气的价格。"},{"type":"paragraph","text":"文章说，根据伊朗同苏联签订的协议，伊朗在过去十年中，对苏联出口了大量的天然气。目前“每天大约有十亿立方英尺的天然气通过伊苏边境的油管，一年约相当于一百亿立方米”。"},{"type":"paragraph","text":"文章说：“根据协议，天然气的价格按当时的交换率确定为每一千立方米六卢布，或每一千立方英尺十八点七美分，这是一个很低的基本价格。”"},{"type":"paragraph","text":"文章说，由于石油价格上涨，根据伊朗—苏联天然气供应协议的条件，伊朗出售给苏联的天然气的价格作了调整。但是，调整后的价格“仍然低于目前的国际价格”。"},{"type":"paragraph","text":"文章指出，由于日益增长的世界需求、燃料短缺和石油输出国采取调整（价格）的行动，一九七三年十二月的石油标价为同年十月的四倍以上。文章说：“这在国际天然气市场上形成了一个完全新的局势，必须进一步调整伊朗卖给苏联的天然气的价格。”"},{"type":"paragraph","text":"文章指出，按照目前国际市场天然气价格，现在伊朗提供给苏联的天然气价格应提高（每千立方英尺）一点二四美元，但是，伊朗只要求调整这个数字的一半，而苏联对伊朗的建议却没有任何回答。"},{"type":"paragraph","text":"文章在谈到苏联向欧洲出售天然气时指出：“当俄国人要求以国际市场的价格在欧洲出售他们自己的石油和天然气时，他们在阿斯塔拉（苏联里海边境的一个城市，伊朗天然气管道通到这个城市）压价是没有理由的。”文章说，“国际石油公司廉价购买伊朗石油，再在国际市场上高价出售，从中攫取高额利润，剥夺了伊朗应得的收入。多年来，伊朗人就是这样来看国际垄断公司的。可以以同样的尺度来衡量伊朗天然气的买主和他们所付的价格。”"},{"type":"paragraph","text":"文章说，“苏联经常把国际石油卡特尔购买生产国原油的价格作为这些卡特尔对发展中国家实行剥削政策的例子。但是，伊朗人不禁要问，俄国人有什么理由压低他们购买伊朗天然气的价格呢？”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ea311ef4ee"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
