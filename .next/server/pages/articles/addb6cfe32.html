script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"秘共《红旗报》谴责苏联领导人背叛马列主义  马列主义者必须在反修斗争中永远坚定  同修正主义者之间不可能也不应有团结","authors":[],"dates":[{"year":1965,"month":12,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"秘共《红旗报》谴责苏联领导人背叛马列主义"},{"type":"paragraph","text":"马列主义者必须在反修斗争中永远坚定"},{"type":"paragraph","text":"同修正主义者之间不可能也不应有团结"},{"type":"paragraph","text":"新华社八日讯　利马消息：秘鲁共产党机关报《红旗报》九月二十日刊登的一篇署名观察家的文章指出，在马克思列宁主义者和现代修正主义者之间，不可能也不应该有团结，国际共产主义运动只能在马克思列宁主义基础上团结和联合起来。"},{"type":"paragraph","text":"这篇题目是《在反对现代修正主义斗争中永远坚定》的文章说：“现代修正主义拿不出任何原则性的论点来反对马克思列宁主义，竭力以天花乱坠的满口‘革命’词藻来掩盖它的背叛和变节行为，这只能骗骗无知的人罢了。”文章说：“在马克思列宁主义者进行的历史性论战中被打得一败涂地的赫鲁晓夫的继承者们，企图伪装成马克思列宁主义者，狡猾地重复那些坚持马克思和列宁的科学理论的共产党的某些论点。”“但是，这些人在实践中继续忠实于他们的苏美合作政策。因此，马克思列宁主义者不能受‘停止公开论战’和‘国际共产主义运动团结’之类的鬼话的欺骗。”"},{"type":"paragraph","text":"文章指出，在目前国际共产主义运动内部的意识形态论战中，不应以“团结”的必要为借口把争论放在一边。文章说，“在马克思列宁主义者和现代修正主义者之间，没有第三种立场，不可能有中间立场。”文章指出，“国际共产主义运动内部唯一的分裂主义者和分裂分子，是赫鲁晓夫及其追随者。赫鲁晓夫下台的原因之一，恰恰在于他执行了疯狂反华和反阿尔巴尼亚的声名狼藉的、粗鲁的分裂主义政策。”文章强调说：“在马克思列宁主义者和现代修正主义者之间，不可能、也不应该有团结，简单的理由是，国际共产主义运动只能在马克思列宁主义基础上团结和联合起来。”"},{"type":"paragraph","text":"文章说，目前在国际共产主义运动内部辩论的问题，恰恰是世界所有共产党人的斗争总路线。因此，一切政治、军事和组织路线是正确还是错误，取决于是否以马克思列宁主义为依据，是否从具体的客观现实出发。"},{"type":"paragraph","text":"文章说：“我们主张不仅在国际共产主义运动内部，而且也在我们自己党的各级组织内，进行一场积极的和深刻的意识形态斗争。只有陷入资产阶级自由主义泥潭的人，才以‘团结’的名义鼓吹一种无原则的一团和气。无原则的一团和气，意味着蜕化和堕落，同联合和团结毫不相干。”"},{"type":"paragraph","text":"文章强调说：“我们马克思列宁主义者要求各种牌号的赫鲁晓夫主义者作公开的自我批评，承认其总路线的错误，承认由于他们的宗派的和分裂主义的活动给世界社会主义革命造成的损失。除此以外没有其他方式可以获得国际共产主义运动的团结。”"},{"type":"paragraph","text":"文章谴责苏共领导人违背了马克思、恩格斯、列宁和斯大林的教导，步铁托后尘，借口从“新的历史条件”出发，篡改了马克思列宁主义的普遍原理。文章号召为保卫马克思列宁主义纯洁性而斗争。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"addb6cfe32"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
