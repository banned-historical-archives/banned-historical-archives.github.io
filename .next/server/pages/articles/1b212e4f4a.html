script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"肯尼迪挨了揍又露了底——资产阶级舆论谈美国侵略古巴的惨败结果","authors":[],"dates":[{"year":1961,"month":4,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"肯尼迪挨了揍又露了底"},{"type":"paragraph","text":"——资产阶级舆论谈美国侵略古巴的惨败结果"},{"type":"paragraph","text":"巴西《最后一点钟报》说：“美国外交家认为，在首次登陆后，古巴人民将背弃卡斯特罗而参加进攻者的行列，他们是大错特错了。"},{"type":"paragraph","text":"“一直密切注意古巴革命进展的人们决不会相信，雇佣军，即使得到帝国主义势力的帮助，会战胜一个过去和现在一直同古巴政府团结得像一个人一样的团结一致的民族。”"},{"type":"paragraph","text":"法新社说：“反对卡斯特罗军队的失败，将在全世界和特别是在拉丁美洲产生深远的影响。实际上，所有拉丁美洲国家都以激动的心情注视着这一事件的发展。他们认为，这一事件实质上是一次决定性的试验。"},{"type":"paragraph","text":"“卡斯特罗主义将经过这次考验而得到加强。在许多拉丁美洲人民看来，这个主义代表着一种旨在挣脱北美统治的枷锁的试验。”"},{"type":"paragraph","text":"英国《新政治家》杂志说：“这是够糟的。肯尼迪和他的顾问们现在……在直接参与这次可悲的冒险中毁坏了自己的名声，真是凄惨。”"},{"type":"paragraph","text":"英国《每日邮报》说：“只有三天工夫入侵冒险便完蛋了。"},{"type":"paragraph","text":"“……肯尼迪总统陷入了进退维谷的境地。"},{"type":"paragraph","text":"“人们的印象是，美国大大地低估了卡斯特罗的军事力量”。"},{"type":"paragraph","text":"英国《泰晤士报》说：“……在墨西哥、玻利维亚、委内瑞拉、智利、危地马拉和哥伦比亚等国都发生了反美的行动。如今肯尼迪发现他的处境正像前副总统尼克松两年前的处境相仿”。"},{"type":"paragraph","text":"日本广播协会电台说：“……由于反政府军的失败而告终的事对肯尼迪政府是个很大的打击。这样的结果使……卡斯特罗政府提高了威信，使反政府军不能再重复这样的登陆作战。”"},{"type":"paragraph","text":"日本“ＲＫＢ每日广播电台”说：“美国政府对于古巴反政府军的失败，感到非常失望，而且担心，由于这个问题除了使卡斯特罗政权更加巩固之外，还会使事实已被卷入事件漩涡的美国的威信严重地下降。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1b212e4f4a"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
