<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"对党委制的看法","authors":["中国人民大学","贺安"],"dates":[{"year":1957,"month":5}],"is_range_date":false,"parts":[{"text":"对党委制的看法","type":"title"},{"text":"中国人民大学贺安","type":"authors"},{"text":"（贺安：中国人民大学工业经济系讲师；摘录，标题为原编者所加）","type":"subtitle"},{"text":"有人说：接受不了我的意见，说你是要把党委推出学校，不是。党委一定要留在学校，但领导方式不同了，不是通过组织手段，而用党员的模范作用和马列主义真理来领导，说服群众，不提真正强有力的领导。共产党是人民的参谋总部，（如梁山泊是宋江领导还是吴用领导，宋掌握大权，而吴出对策这不矛盾）……","type":"paragraph"},{"text":"……我的发言很不成熟，构思时间很短，我一年多没讲课，一年前讲的是“一长制”，坚决捍卫一长制，去年上半年，周总理有个报告，传达了党委制，实行党委制有道理，比一长制进步些。但没有进一步研究，因为我不讲课了，而且同学们没有追问我这个问题，从现在来看，党委制继续下去有问题，是值得怀疑的。问题很复杂，我作为抛砖引玉，等权威人士来开第一炮……","type":"paragraph"},{"text":"如果说只有党委制才能是党的领导，那就没有缺点，但不是这样，如果同人民代表大会制比较，那就有其相对的缺点，以党代政的倾向是在不同程度上，用党的指示来代替本阶级的意志和行动。","type":"paragraph"},{"text":"党委制——党委领导下的首长负责制，我认为这是以党代政的一种形式，一切重大方针政策由党委决定，这是正确的，问题产生在，把党的指示变成行政命令的过程中比较简单化一些。","type":"paragraph"},{"text":"有人说我们没有看到那一个党委委员在动，但一般领导者都是党员，作为厂长、校长的党员必须执行党的决议（不是党员首长也会产生以党代政），这个转变过程是比较简单的，所以有缺点。","type":"paragraph"},{"text":"第一个缺点：这种转变的简单化，会产生内部矛盾，领导和被领导，党员和非党群众的矛盾，因为通过这种形式是用党的指示和命令来维持无产阶级内部阶级纪律的。我认为党和无产阶级之间的铁的纪律，是专政所必须的，但只能建立在与人民群众信任的基础上，党不应该是命令群众而是说服群众，当群众根据本身经验，确信党的政策是正确的时候这才是真正的领导。","type":"paragraph"},{"text":"第二个缺点：是会使党员、党组织忽视政治思想教育，因为通过这种形式，使指示和决议很容易变成群众来执行，这样不教育或少教育也可以变成行政命令。","type":"paragraph"},{"text":"有人攻击我说我把党看成是个人小集团，不能这样看，我说党是代表人民利益的，问题在于群众觉悟能否跟得上党的政策，不能跟上是不能否认的，如果忽视了这些，就会削弱党的领导作用。","type":"subtitle"},{"text":"如果我们的领导者，都是百分之百的马克思主义者，那末制度是无足轻重的问题了。","type":"paragraph"},{"text":"上次我提到党委制是“三害”的防空洞，其用意在于它会被“三害”钻空子，我现在认为这样提是不对的，是把整个党委制看成是防空洞，但它比代表大会制来说是有缺点的。","type":"paragraph"},{"text":"第三个缺点：党委制没有给走群众路线的彻底贯彻创造充分的条件，这不是说党委是宗派集团，但毕竟党不是群众组织，党组织的民主集中制和人民群众的民主集中制有它的统一性，即因为党也是代表人民，但也有范围的不同。","type":"paragraph"},{"text":"斯大林说：“如果把党的领导看成是人民群众的民主集中制，那就是以部分代替全体，就是党始终只能是无产阶级的一部分”（列宁主义问题186页）。","type":"paragraph"},{"text":"第四个缺点：是削弱政治和经济领导的统一性。","type":"paragraph"},{"text":" 来源：《高等学校右派言论选编》（中共中国人民大学委员会，1958年8月）。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e61683e19d"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
