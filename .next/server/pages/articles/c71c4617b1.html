<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji14","name":"毛泽东全集第14卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji14.pdf"],"article":{"title":"斯大林是中国人民的朋友","alias":"","parts":[{"type":"paragraph","text":"斯大林是中国人民的朋友"},{"type":"paragraph","text":"（1939年12月20日）"},{"type":"paragraph","text":"今年十二月二十一日，是斯大林同志的六十岁生日。这个生日，在全世界上，在只要是知道的又是革命的人们的心中，可以料得到，都会引起亲切的热烈的庆祝。"},{"type":"paragraph","text":"庆祝斯大林，这不是一件应景的事情。庆祝斯大林，这就是说，拥护他，拥护他的事业，拥护社会主义的胜利，拥护他给人类指示的方向，拥护自己的亲切的朋友。因为现在全世界上大多数的人类都是受难者，只有斯大林指示的方向，只有斯大林的援助，才能解脱人类的灾难。"},{"type":"paragraph","text":"我们中国人民，是处在历史上灾难最深重的时候，是需要人们援助最迫切的时候。《诗经》上说的：“婴其鸣矣，求其友声。”我们正是处在这种时候。"},{"type":"paragraph","text":"但是，谁是我们的朋友呢？"},{"type":"paragraph","text":"一类所谓朋友，他们自称是中国人民的朋友；中国人中间有些人也不加思索地称他们做朋友。但是这种朋友，只能属于唐朝的李林甫\"一类。李林甫是唐朝的宰相，是一个有名的被称为“口蜜腹"},{"type":"paragraph","text":"[1]李林甫，公元8世纪人，唐玄宗时的一个宰相。《资治通鉴》说：“李林甫为相，凡才望功业出已右及为上所厚、势位将逼已者，必百计去之；尤忌文学之士，或阳与之善，咯以甘言而阴陷之。世谓李林甫‘口有蜜，腹剑”的人。现在这些所谓朋友，正是“口蜜腹剑”的朋友。这些人是谁呢？就是那些口称同情中国的帝国主义者。"},{"type":"paragraph","text":"另一类朋友则不然，他们是拿真正的同情给我们的，他们是把我们当做弟兄看待的。这些人是谁呢？就是苏联的人民，就是斯大林。"},{"type":"paragraph","text":"没有一个国家把它在中国的特权废除过，只有苏联是废除了。"},{"type":"paragraph","text":"第一次大革命时期，一切帝国主义者都反对我们，只有苏联援助了我们。"},{"type":"paragraph","text":"抗日战争以来，没有一个帝国主义国家的政府真正援助我们，只有苏联是用了空军和物资援助了我们。"},{"type":"paragraph","text":"这还不够明白吗？"},{"type":"paragraph","text":"中华民族和中国人民的解放事业，只有社会主义的国家，社会主义的领袖，社会主义的人民，社会主义的思想家、政治家、劳动者，才能真正援助；而我们的事业，没有他们的援助是不能取得最后胜利的。"},{"type":"paragraph","text":"斯大林是中国人民解放事业的忠实的朋友。中国人民对于斯大林的敬爱，对于苏联的友谊，是完全出于诚意的，任何人的挑拨离间，造谣污蔑，到底都没有用处。"}],"authors":["毛泽东"],"dates":[{"year":1939,"month":12,"day":20}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":217,"page_end":218},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c71c4617b1"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
