script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"93482dc4-edc3-4ce3-a6d2-960ec210656a","name":"“四人帮”死党毛远新破坏教育革命言论摘编（初编）（1976.12）","internal":false,"official":true,"type":"img","author":"毛远新，1976.12，反攻倒算材料，辽宁省教育局大批判组整理","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/93482dc4-edc3-4ce3-a6d2-960ec210656a/1.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/93482dc4-edc3-4ce3-a6d2-960ec210656a/2.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/93482dc4-edc3-4ce3-a6d2-960ec210656a/3.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/93482dc4-edc3-4ce3-a6d2-960ec210656a/4.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/93482dc4-edc3-4ce3-a6d2-960ec210656a/5.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/93482dc4-edc3-4ce3-a6d2-960ec210656a/6.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/93482dc4-edc3-4ce3-a6d2-960ec210656a/7.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/93482dc4-edc3-4ce3-a6d2-960ec210656a/8.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/93482dc4-edc3-4ce3-a6d2-960ec210656a/9.png"],"article":{"title":"一、拼命抓教育，为“四人帮”篡党夺权大造反革命舆论","alias":"","parts":[{"type":"paragraph","text":"命抓教育，为“四人帮”篡党夺权大造"},{"type":"paragraph","text":"反革命舆论要象江青抓样板戏那样抓教育。"},{"type":"paragraph","text":"（1974年和温巨敏的一次谈话）姚文元同志这篇文章（指《论林彪反党集团的社会基础》"},{"type":"paragraph","text":"1文）只要他认识字，你就可以让他读读看看，比马恩列的好读，因为他结合现实，不一定非得到中学才学。"},{"type":"paragraph","text":"（1975年3月8日在沈阳市文教系统部分同志座谈会上"},{"type":"paragraph","text":"的讲话）"},{"type":"paragraph","text":"把中央五号文件·（指中共中央［1975］5号文件，毛主席关于理论问题的指示）和姚文元同志的文章结合起来学，先学这个，三十三条语录逐步来。老师对姚文元同志这篇文章都能读明白吧，就先讲这个嘛！恐怕讲语录（指“三十三条”语录）·困难大，别说中、小学生，大学都很吃力，都遇到不少困难，但讲姚文元同志这篇文章，教员可以联系实际，再请工人师傅讲。你们试试看，从小学生讲起。"},{"type":"paragraph","text":"（同上）当今有没有孔子？他上台，我们就成了少正卯了"},{"type":"paragraph","text":"（1974年和温巨敏的一次谈话）这里从全国来说，有的搬出去又往回跳（指北京农学院），连"},{"type":"paragraph","text":"111A5"},{"type":"paragraph","text":"毛主席住过的延安都是办不了学。"},{"type":"paragraph","text":"（1974年12月28日在接见朝农院系两级党组织负责人和"},{"type":"paragraph","text":"部分师生代表时的讲话）"},{"type":"paragraph","text":"不把反“走后门”作为一个单独运动来搞，而把反“走后门”、纠正不正之风作为批林整风一个内容、一个组成部分。"},{"type":"paragraph","text":"（1973年10月17日在辽大系以上干部会上的讲话）"},{"type":"paragraph","text":"今年大学招生，提出文化考查，我就有点紧张，预感到过去对我们的那套又要来了。把张铁生的信和考卷要来，正好和我的想法一致，我就抓住张铁生这块石头狠狠地打人了。现在看中央（指“四人帮”）这样重视，可见不就一个省的问题。"},{"type":"paragraph","text":"（1973年8月11日在沈阳市大专院校和辽大部分师生座"},{"type":"paragraph","text":"谈会上的讲话)"},{"type":"paragraph","text":"大学招生是个指挥棒，很灵，··。对指挥棒也要分析，问题是朝哪指，有的往东指，有的往西指。"},{"type":"paragraph","text":"·…·在政治审查，群众推荐的基础上，谁分数高优先录取（歪曲国务院〔1973]39号文件“关于高等学校一九七三年招生工作的意见”），看来很合理，其实不见得，·………·看来合理合法，天经地义，不见得，这不行。"},{"type":"paragraph","text":"（1973年在辽宁省高等学校招生文化考查座谈会上的讲"},{"type":"paragraph","text":"话)"},{"type":"paragraph","text":"我说我是掠了块石头（指张铁生），是有棱角的石头，打了那121些阻碍教育革命的人。"},{"type":"paragraph","text":"（1974年12月23日在朝农现场会上的讲话）"},{"type":"paragraph","text":"中央（指“四人帮”）这么重视，我们要抓住这个事情（指一张“白卷”），·…·…·我们要负起更大的任务。"},{"type":"paragraph","text":"：（1973年8月11日在沈阳市大专院校和辽大部分师生座"},{"type":"paragraph","text":"谈会上的讲话)"},{"type":"paragraph","text":"因为我们是“钟在寺院，声在外”，朝农在外名声还挺大，传的还挺远。这不仅是国内搞修正主义路线的人挨了一石打，看香港《文汇报》套红登了，资本主义国家、·修正主义国家都挨了一石头。"},{"type":"paragraph","text":"（1974年12月28日在接见朝阳农学院两级党组织负责人"},{"type":"paragraph","text":"和部分师生代表时的讲话）"},{"type":"paragraph","text":"国务院科教组、省委在这开现场会，一块大石头啊！同志们，你们知道不知道？拿这块大石头，打了人了！打的有些人坐立不安了!"},{"type":"paragraph","text":"（1974年12月28日在接见朝农院系两级党组织负责人和"},{"type":"paragraph","text":"部分师生代表时的讲话）"},{"type":"paragraph","text":"：同学们，你们不要害怕，如果谁要再打击报复的话，绝没有好下场！要坚决的斗，头上长角，身上长刺。了不起象当年的少正卵。少正卯死了两千多年了，今天照样给他翻了案。\"···不要替孔老二说话，不怕刁难，不怕打击报复。"},{"type":"paragraph","text":"（1974年2月19日在鞍山四十三中座谈会上的讲话）"},{"type":"paragraph","text":"131"},{"type":"paragraph","text":"（1974年12月28日在接见朝阳农学院两级党组织负责人"},{"type":"paragraph","text":"和部分师生代表时的讲话）"},{"type":"paragraph","text":"国务院科教组、省委在这开现场会，一块大石头啊！同志们，你们知道不知道？拿这块大石头，打了人了！打的有些人坐立不安了!"},{"type":"paragraph","text":"（1974年12月28日在接见朝农院系两级党组织负责人和"},{"type":"paragraph","text":"部分师生代表时的讲话）"},{"type":"paragraph","text":"：同学们，你们不要害怕，如果谁要再打击报复的话，绝没有好下场！要坚决的斗，头上长角，身上长刺。了不起象当年的少正卵。少正卯死了两千多年了，今天照样给他翻了案。\"···不要替孔老二说话，不怕刁难，不怕打击报复。"},{"type":"paragraph","text":"（1974年2月19日在鞍山四十三中座谈会上的讲话）"},{"type":"paragraph","text":"131"}],"authors":["毛远新"],"dates":[{"year":1973},{"year":1973,"month":8,"day":11},{"year":1973,"month":10,"day":17},{"year":1974},{"year":1974,"month":2,"day":19},{"year":1974,"month":8,"day":11},{"year":1974,"month":12,"day":23},{"year":1974,"month":12,"day":28},{"year":1975,"month":3,"day":8}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":3,"page_end":4},"tags":[{"name":"姚文元","type":"人物"},{"name":"毛远新","type":"人物"},{"name":"四人帮","type":"人物"},{"name":"张铁生","type":"人物"},{"name":"温巨敏","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"教育革命","type":"主题/事件"},{"name":"朝阳农学院","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dfcc46f7ad"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
