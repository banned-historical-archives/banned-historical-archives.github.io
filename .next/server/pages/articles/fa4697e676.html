script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"坚持四项基本原则　反对资产阶级自由化总政要求全军官兵认真学习邓小平重要论述从思想上理论上澄清是非统一认识","authors":[],"dates":[{"year":1989,"month":6,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社北京6月19日电　中国人民解放军总政治部近日发出通知，要求全军官兵特别是团以上军官认真学习邓小平同志关于坚持四项基本原则、反对资产阶级自由化的重要论述。"},{"type":"paragraph","text":"总政的通知指出，坚持四项基本原则，是党的基本路线的重要内容，是立党立国之本。在当前的形势下，重新学习邓小平同志关于坚持四项基本原则、反对资产阶级自由化的一系列重要论述，具有重要的意义。"},{"type":"paragraph","text":"通知要求各级党委和政治机关把《邓小平同志论坚持四项基本原则反对资产阶级自由化》这本书作为团以上军官理论学习的主要内容。要把学习这本书与学习邓小平同志在接见戒严部队军以上干部时的重要讲话结合起来，密切联系当前这场斗争的实际，认真回顾和总结十一届三中全会以来，坚持四项基本原则、反对资产阶级自由化斗争的经验教训，力求从思想上理论上澄清是非，统一认识，进一步增强坚持四项基本原则、反对资产阶级自由化的自觉性和坚定性，把这场关系党和国家前途命运的斗争进行到底。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fa4697e676"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
