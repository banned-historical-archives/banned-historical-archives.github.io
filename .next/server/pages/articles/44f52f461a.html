script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"黄陂县克服左倾思想影响  选拔优秀教师担任领导职务","authors":["杨建武","胡育华"],"dates":[{"year":1981,"month":9,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"黄陂县克服左倾思想影响"},{"type":"paragraph","text":"选拔优秀教师担任领导职务"},{"type":"paragraph","text":"本报讯  今年以来，湖北省黄陂县委为加强重点中、小学领导班子的建设，选拔了一批确有真才实学的骨干教师担任领导职务，给全县教育事业带来了新的起色。"},{"type":"paragraph","text":"三中全会以后，黄陂县虽然起用了一些骨干教师担任一定领导工作，但是，由于“左”的思想影响没有完全清除，仍有不少确有真才实学的业务尖子和治学经验丰富的教学骨干使用不当。今年1月，中共黄陂县委召开了专门会议，从清除“左”的思想影响入手，研究全县重点中、小学领导班子建设问题，并责成县委组织部、宣传部和教育局组成联合调查组，分赴全县社、镇13个单位和100多所中、小学调查摸底，并采取民意测验和重点考核相结合的方法，从900多名教师中选拔了52名确有真才实学的业务尖子担任了县教育局副局长和重点中、小学正、副校长、教导主任等职务。"},{"type":"paragraph","text":"胡育华  杨建武"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"44f52f461a"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
