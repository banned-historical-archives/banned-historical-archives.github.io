<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"坚持开门办科研　回击右倾翻案风上海计算技术研究所科研人员七年多来坚持与工农相结合，积极为社会主义建设服务，取得出色成绩","authors":[],"dates":[{"year":1976,"month":2,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　在毛主席革命路线的指引下，上海计算技术研究所科研人员，七年多来坚持开门办科研，坚持与工农相结合，促进了电子计算技术的发展，有力地驳斥了那些“今不如昔”的谬论，回击了科技界的右倾翻案风。"},{"type":"paragraph","text":"上海计算技术研究所，是无产阶级文化大革命中诞生的。文化大革命前，上海有计算机的单位很少，从事计算数学的研究人员也不多；在修正主义路线的影响下，科研人员习惯于“电话接头，关门研究，算好结果，一送就完”。在文化大革命中，批判了刘少奇修正主义路线，一九六九年成立了上海市计算技术中心，承担工农业生产和科研计算课题的任务。一九七一年又在计算中心的基础上，成立了计算技术研究所，人数有五百。这个研究所不仅有通用计算设备，而且有各种计算机；不仅计算应用课题，而且研究计算技术，试制计算机。近两年来，又从应用计算，发展到控制和网络计算技术的试验，为今后发展电子计算网，及时解决生产实际问题提供了有利条件。"},{"type":"paragraph","text":"在毛主席革命路线指引下，这个研究所人员坚持开门办科研，分期分批下厂、下乡，深入工农业生产第一线，参加劳动，与工农相结合，共同研究，取得了丰硕成果。几年来，仅第一研究室，就配合有关单位研制成功三十多项具有先进水平的新产品、新设备，为生产实际计算了近二千余项课题。搞水利计算方面的同志，几年来，为新安江、富春江、佛子岭、长江等发电站，计算了大量的课题。如富春江发电站，通过计算，找到了较好的运行方式，提高了发电能力。他们还积极推广电子计算技术，举办了二十七期各种短训班，培训了二千五百多人次，取得了显著的效果。"},{"type":"paragraph","text":"这个研究所的同志除把电子计算技术推广应用于生产实际外，还积极参加本市重点工程、重点项目的会战，承担了国防科研工程、航空工程、原子能研究及彩色电视显象管电子特性计算等科研任务。在解决生产实际问题的同时，他们也尽可能采用比较先进的计算方法，以提高计算效果。如在为农业服务的水坝、桥梁建筑等项目中，他们应用了有限单元法、快速福里哀变换和三次函数逼近等方法，都较好地提高了计算效果。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"862873e544"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
