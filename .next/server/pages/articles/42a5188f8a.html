" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"右派分子陈仁炳、王造时的思想情况","authors":["周明康编"],"dates":[{"year":1957,"month":6,"day":23}],"is_range_date":false,"parts":[{"text":"右派分子陈仁炳、王造时的思想情况","type":"title"},{"text":"周明康编","type":"authors"},{"text":"新华社上海23日讯  据上海市委统战部反映，部分右派分子在被揭发批判后，他们有以下一些言行。","type":"paragraph"},{"text":"陈仁炳的背后言行","type":"subtitle"},{"text":"最近，刘良模(民盟候补中委)走访陈仁炳，陈说：“现在我有空，逛逛公园，逛逛城隍庙，生活很好。我好久没有休息了，这次我想休息几个月。我的民盟副主委和市政协副秘书长的职务，还是拿掉吧！”他又说：“我这次问题不小，我头脑发热，小事聪明，大事糊涂。我对民主党派的作用和地位的认识大有在野党的味道，认为民盟市委非我不可。问题究竟在那里呢？”","type":"paragraph"},{"text":"陈仁炳对他妹夫黄培永(教师，政治上靠拢我们)说：(1)他有分庭抗礼的情绪，但不能承认这是不接受工人阶级领导；(2)和罗隆基过去有些关系，现在则没有什么联系；(3)现在反对右派斗争，主要是要把知识分子威风打下去，而把他作为典型罢了；(4)现在对他的斗争，盟委意见不多，主要是民盟机关干部搞得很凶。","type":"paragraph"},{"text":"王造时的看法","type":"subtitle"},{"text":"最近，全国政协委员贾亦斌(进步分子)访问了王造时，他对这次运动的发展非常关心，再三向贾探问：“领导的意图和运动的目的，要求究竟怎样？”表示：如领导上讲清楚，的确为了帮助他指出错误，他可以写文章，说明这些错误的危害性。但他又说，大家这样骂他，帽子给他戴得太多、太大，他受不了，这和他的思想不一样，就是杀他的头也不行。","type":"paragraph"},{"text":"王说：“对社会主义，我是不反动的”、“我接触的人是对党不满的多。史良是人家向她报喜不报忧，而史良向我却是报忧不报喜，影响了我。”他要求贾亦斌转告刘述周部长或市委书记柯庆施，他很想和他们谈谈。","type":"paragraph"},{"text":"王造时在跟贾亦斌的谈话中，仍然强调整风运动的真正重点是在基层。在贾作了具体分析，指出他的错误后，他表示：最好让他到工厂、农村去看看，体验一下生活，受些教育。","type":"paragraph"},{"text":"他对潘念之在法学座谈会上说他“解放前办的‘前方日报’虽有功，但亦有错误”的说法，表示不满，他说，在京时，统战部张(执一)部长、刘部长(述周)都和他谈过“办‘前方日报’对革命还是有贡献的。”过去为反对“苏日互不侵犯条约”问题写了“致斯大林大元帅的一封公开信”亦不是他一个人搞的，可是大家都算在他的头上。他谈到，他在京时和当时一起搞的几位朋友碰了头，大家也承认当时是共同搞了。他说：“潘念之的发言，最好不要登报，如登，那我非辩明不可，因为这对国内外影响都不大好。”","type":"paragraph"},{"text":"王造时还谈到他犯错误主要是政治水平不高，他说：“我的愿望是好的，是为了帮助党，但效果竟这样不好。”","type":"paragraph"},{"text":" 来源：1957年6月25日新华通讯社编《内部参考》。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"42a5188f8a"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
