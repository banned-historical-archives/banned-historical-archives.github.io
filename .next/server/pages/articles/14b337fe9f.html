script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji15","name":"毛泽东全集第15卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji15.pdf"],"article":{"title":"在延安新哲学会第一届年会上的讲话","alias":"","parts":[{"type":"paragraph","text":"在延安新哲学会第一届年会上的讲话！]"},{"type":"paragraph","text":"（1940年6月21日）"},{"type":"paragraph","text":"今天开这个会，我心里很高兴，回想前年开新哲学会成立会的那一天到现在，已两年了。工作有了成绩。今年开过了这个年会之后，一定会更好。理论这件事是很重要的，中国革命有了许多年，但理论活动仍然很落后，这是大缺憾。要知道革命如不提高革命理论，革命胜利是不可能的。过去我们注意的太不够，今后应加紧理论研究。现在人的条件比过去好了，有许多文化工作者与哲学家都会聚在这里。必须承认现在我们的理论水平还是很低，全国的理论水平还是很低，大家才能负起克服这种现象的责任。我们要求全国在这方面加以努力，首先要求延安的人多多努力，年会开了以后，新哲学会的前途是光明的。"},{"type":"paragraph","text":"[1]延安新哲学会，是在毛泽东倡导下于1938年夏秋之际成立的。1940年6月21日下午，延安新哲学会在文化俱乐部举行第一届年会首次会议。毛泽东、张闻天、朱德、茅盾、艾思奇、张仲实等50余人参加。这是毛"}],"authors":["毛泽东"],"dates":[{"year":1940,"month":6,"day":21}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":69,"page_end":69},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"14b337fe9f"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
