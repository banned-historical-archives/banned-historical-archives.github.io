script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"资产阶级的猖狂进攻迄未停止若干工商业户顽固恶劣 拖欠税款对抗五反运动","authors":[],"dates":[{"year":1952,"month":2,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　五反运动开展中，一般工商业户对于违反共同纲领、偷漏国家税收、损害人民利益的罪恶行为，开始联系自己的思想，向人民政府和有关部门进行了初步坦白。但仍有一部份工商业户，对五反运动的巨大政治意义认识不足，他们不惟不严肃地检讨，痛加悔改，而且消极对抗，坚持错误。这具体表现，就是对于税款的借故拖欠。"},{"type":"paragraph","text":"新成区税务分局一月底检查十二月份营业总欠户有二一七户，二月十七日统计一月份营业税欠税户未能及时纳库者有七七○五家，这一严重拖欠税的情况，说明了资产阶级还没有停止猖狂进攻，而且在欠税战场上发动了另一疯狂进攻。"},{"type":"paragraph","text":"在集体报缴中，有部份工商户表现了“老油条”作风，借口拖欠，发牢骚，例如成都北路七五○号慎昶水电工程行王锦珊，除报载他盗窃国家财产扣发检举他的店员年奖工资外，并曾用五套发票逃税。他还公然造谣惑众，说:“三反五反，反光完结，这次税款决定不缴。”态度顽固恶劣。新闸路三四一号与泰南货号一九五一年逃漏货物税四次，逃漏营业额四千九百万，所得额二千六百万元，抽取店内资金，一贯违背税法。这次营业税集体报缴，互助组长催他几次，他都不予理睬，反而表示顶多加滞纳金。此外，有些工商户借口生意清淡，故意拖欠不缴，尤其是成衣商业、理发业和鞋商业，在春节中营业并不坏，但多拖延不缴。这些工商户在今天不从政治上来认识五反运动对于国家建设与本身改造前途的重要关系，而一味追逐个人不法利益，自私自利，甚至以拖欠税款来对抗五反运动，这是非常严重的错误行为。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c7e1298fb5"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
