script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"海伦县被服业有些奸商残酷剥削学徒","authors":["丁克"],"dates":[{"year":1952,"month":3,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"海伦县被服业有些奸商残酷剥削学徒"},{"type":"paragraph","text":"编辑同志：黑龙江省海伦县被服业有些奸商残酷剥削学徒。这些奸商抓住学徒要求学习技术的心理，创造了“教快徒”收钱的办法。春林洋服店经理崔凤阁，以三个月教会学徒为钓饵，让学徒孙文秀付了三十万元“教快徒”费。但孙文秀作了很多天的零活后，就被崔无理地开除了。还有几家商店也有这样的情况。这几家商店的学徒，学习已快满，但没有学会做衣服。有的奸商违犯劳动法，损害学徒健康。同意祥号经理张守增，经常令学徒常殿魁工作到晚十二点钟，有时一直作到天亮。有些奸商限制学徒参加工会和政治活动。被服业工会曾召集学徒开会，店主们提出各种藉口阻止他们参加。奸商于永江竟说：“你们学徒不是工人，怎能参加工会，你们参加后开会一多，我就不要你们啦！”他还不让学徒休息，使学徒无暇参加政治活动。我们要求政府处置这批奸商，保护学徒的利益。丁克"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4302805081"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
