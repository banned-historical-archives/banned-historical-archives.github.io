script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"不准美化资产阶级","authors":["刘开桂"],"dates":[{"year":1969,"month":6,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"上海轮胎一厂党员老工人　刘开桂"},{"type":"paragraph","text":"《东风化雨》的作者，站在资产阶级反动立场上，竭力宣扬资本家经营“祖传产业”的“苦心”，宣扬资本家“精明”，“能干”，“手腕灵活”，以此来掩盖资本家残酷剥削工人的罪恶。为什么要这样做呢?目的就是为了紧跟刘少奇，推行阶级投降主义。为资本主义复辟鸣锣开道。刘少奇这个大叛徒胡说什么:“资本家剥削是有其历史功绩的，没有一个共产党员会抹杀资本家的功劳。”这简直是胡说八道。《东风化雨》的作者，象狗奴才似的，跟在其黑主子后面，不惜笔墨，美化大资本家孙敬煊，说他不是靠剥削，而是靠苦心经营起家的。这完全抹煞了资本家剥削工人的本质。"},{"type":"paragraph","text":"难道资本家不是靠剥削起家的吗?拿我们厂来说，就是一个最好的铁证!我厂于一九二八年开工，当时只有两台开方式炼胶机、二台硫化罐，工人只有八十三人。经过资本家八年残酷剥削后，到一九三六年，已发展到拥有二千多工人的大厂。资本家的剥削手法也是很巧妙的，他们拼命招收童工，工人随时要遭到失业的威胁。资本家为了赚更多的钱，不顾工人死活，劳动条件极差，工人说:“从鸡叫做到鬼叫，也做不到一家的开销”。许多人得病。受伤。死亡，资本家却吃得胖胖的。住着洋房。乘着轿车，花天酒地，这难道不是靠剥削起家的吗?"},{"type":"paragraph","text":"大叛徒、大内奸、大工贼刘少奇和《东风化雨》的作者，鼓吹剥削有功，百般美化资产阶级，攻击无产阶级，妄图叫我们工人重新回到旧社会的老路上去，再受资本家的压迫和剥削，让我们吃二遍苦，我们一千个不答应，一万个不答应。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c05c46e77d"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
