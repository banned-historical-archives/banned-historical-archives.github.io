" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji12","name":"毛泽东全集第12卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji12.pdf"],"article":{"title":"致朱德、彭德怀等电","alias":"","parts":[{"type":"paragraph","text":"致朱德、彭德怀等电！"},{"type":"paragraph","text":"（1938年7月17日）"},{"type":"paragraph","text":"陈长捷军万余人，此次作战大部逃跑，仅余数千毫无战斗力，王靖国?军大体相同，要这些军队巩固吕梁山脉各县，完全无望。卫部在乡宁者，亦朝不保夕。我一一五师陈旅?顾此失彼东西奔波，亦未打一个好仗。请你们立即考虑徐旅?西移归还建制，并朱、彭以一个人西移指挥该师问题，我以为应向蒋、白、阎、卫建议，要巩固吕梁山脉于我手中，保障某些渡口，非徐旅西移及朱、彭以一人去指挥，好好打几个胜仗，不能解决问题，否则将贻误大局。"},{"type":"paragraph","text":"[1]这是毛泽东关于巩固吕梁山地区问题致朱德、彭德怀并周恩来、叶剑英电的主要内容。"},{"type":"paragraph","text":"[2]陈长捷，当时任国民党军第二战区第六十一军军长。[3]王靖国，当时任国民党军第二战区第十九军军长。[4]卫，指卫立煌。[5]陈旅，指陈光任旅长的八路军第一一五师第三四三旅。[6]徐旅，指徐海东任旅长的八路军第一一五师第三四四旅。"}],"authors":["毛泽东"],"dates":[{"year":1938,"month":7,"day":17}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":401,"page_end":401},"tags":[{"name":"毛泽东","type":"人物"},{"name":"朱德","type":"人物"},{"name":"彭德怀","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"eff20c4870"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
