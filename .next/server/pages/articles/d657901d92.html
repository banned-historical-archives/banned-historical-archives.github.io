，提高到一个更高的水平。"},{"type":"paragraph","text":"大海航行靠舵手，于革命靠毛泽东思想"},{"type":"paragraph","text":"工人阶是我国社会主义革命和社会主义建的领导力量和主力军。工人阶不但要把我国社会主义革命进行到底，而且要支援世界革命，解放全人类，在全世界实现共产主义。要完成这个伟大的历史任务，工人阶就要以最大的决心，最大的毅力，活学活用毛主席著作。毛主席的每一句话，每个指示，都要努力紧跟，深刻领会，联系实际，句句照办。以毛泽东思想为武器，斗私批修，有效地抵制形形色色的资产阶级思想的侵，保持工人阶级政治上、思想上、粗上的洁性，使我国工人阶成为一支在中国共产党对领导下的，用毛泽东思想武装起来的，非常无产阶化、革命化、战斗化的产业大军。品"},{"type":"paragraph","text":"Hth. !"},{"type":"paragraph","text":"一九六七年十二月六日14.0上海工人阶永远紧跟毛主席"},{"type":"paragraph","text":"《解放日报》社"},{"type":"paragraph","text":"在我们伟大领袖毛主席亲切关怀下召开的上海工人革命造反派代表会昨天胜利幕了。"},{"type":"paragraph","text":"二"},{"type":"paragraph","text":"这是上海工人阶级在无产阶级文化大革命中紧跟毛主席取得伟大成就的检大会；是进一步从思想上、工作上、粗上落实毛主席最新指示，决心把无产阶级文化大革命进行到底的誓师大会；是加强上海工人阶队伍的建设，向非常无产阶化革命化、战斗化的目标进军的大会。这是胜利的大会，团结的大会，是高举毛泽东思想伟大红旗，朝气蓬勃、斗志昂扬的大会。这是一次意义十分重大的大会"},{"type":"paragraph","text":"这次大会，最集中地表达了上海工人阶级对伟大袖毛主席无限热爱、无限忠诚、无限信仰、无限崇拜的深厚的阶感情，最鲜明地反映了上海工人阶级紧跟毛主席，海枯石烂永不变心的钢铁意志。"},{"type":"paragraph","text":"紧跟毛主席，是我们取得一切胜利的根本。一年多来，上海工人阶级在无产阶文化大革命中，充分发出主力军的作用，取得了很大的成就。这些成就是怎么取得的？正如大会许多代表所的：我们的经验可以讲出千条万条，最最根本的就是紧跟毛主席这一条。我们的一切胜利，都是因为有毛主席给我们撑腰。我们的一切成就，都是老老实实、不折不扣地按照毛主席的指示办事的结果。沿着毛主席指引的航道前进，我们的事业就能节节胜利;偏离毛主席指引的航道，我们的事业就一定受到挫"},{"type":"paragraph","text":"-141"}],"authors":["《人民日报》编辑部"],"dates":[{"year":1967,"month":12,"day":6}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":78,"page_end":78},"tags":[{"name":"毛泽东","type":"人物"},{"name":"上海文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d657901d92"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
