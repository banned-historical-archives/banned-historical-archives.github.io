script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"重温毛主席在党的七届二中全会上的报告  “英雄四连”指战员学习西柏坡人民坚持党的基本路线、建设山村的革命精神，提高了无产阶级专政下继续革命的觉悟","authors":[],"dates":[{"year":1975,"month":2,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"重温毛主席在党的七届二中全会上的报告"},{"type":"paragraph","text":"“英雄四连”指战员学习西柏坡人民坚持党的基本路线、建设山村的革命精神，提高了无产阶级专政下继续革命的觉悟"},{"type":"paragraph","text":"据新华社讯　北京部队某部“英雄四连”指战员利用野营训练的机会，认真向河北省平山县西柏坡人民学习，提高了继续革命的觉悟，胜利地完成了野营训练任务，加强了部队的思想建设。"},{"type":"paragraph","text":"西柏坡是毛主席、党中央曾经居住过的地方。全国解放前夕，在党的七届二中全会上，毛主席在这里作了《在中国共产党第七届中央委员会第二次全体会议上的报告》，明确指出在无产阶级夺取全国政权之后，国内的主要矛盾是工人阶级和资产阶级的矛盾，向全党和全国人民提出了在无产阶级专政下继续革命的任务。四连在野营训练一开始，党支部就以“野营路上如何向西柏坡人民群众学习”为题，组织全连干部和战士展开了热烈讨论，研究了具体措施。当他们一到西柏坡，就热烈地开展了向人民群众学习的活动。"},{"type":"paragraph","text":"在向人民群众学习的过程中，指战员们结合学习毛主席在党的七届二中全会上的报告，着重学习西柏坡人民坚持党的基本路线，坚持无产阶级专政下继续革命的思想和事迹。解放前，在三座大山的压榨下，西柏坡是一个穷山村。解放后，西柏坡党支部牢记毛主席关于“务必使同志们继续地保持谦虚、谨慎、不骄、不躁的作风，务必使同志们继续地保持艰苦奋斗的作风”的教导，在社会主义革命不断胜利的形势下，保持清醒的头脑，紧紧地依靠贫下中农，狠抓阶级斗争和两条路线斗争，使穷山村发生了巨大变化。在批林批孔运动中，党支部又组织干部和社员到党的七届二中全会会址，重温毛主席的教导，学习毛主席、党中央关于批林批孔的指示，很快掀起了大批判的高潮。四连党支部组织全连干部和战士联系连队实际，认真座谈向人民群众学习的收获和体会，使大家进一步加深了对党的基本路线的理解，提高了无产阶级专政下继续革命的觉悟。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"批林批孔","type":"主题/事件"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"310c6912c3"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
