script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"石家庄地委就留村公社党委强令毁瓜事件发出通报  肃清极左路线流毒  落实党的政策","authors":[],"dates":[{"year":1979,"month":7,"day":31}],"is_range_date":false,"parts":[{"type":"paragraph","text":"石家庄地委就留村公社党委强令毁瓜事件发出通报"},{"type":"paragraph","text":"肃清极左路线流毒  落实党的政策"},{"type":"paragraph","text":"本报讯  据《河北日报》报道：中共石家庄地委认为，正定县留村公社党委滥用职权，强令南庄大队拔掉即将成熟的西瓜、甜瓜和菜瓜，严重侵犯了生产队的自主权，践踏了党的政策，造成的损失很大，挫伤了群众积极性，问题是严重的。这起事件说明党的三中全会精神在全区贯彻得还不够，中央关于发展农业的两个文件落实得还不好，林彪、“四人帮”极左路线的流毒远远没有肃清，官僚主义、瞎指挥的坏作风还没有彻底解决。为挽回影响，吸取教训，杜绝类似事件的发生，地委决定采取如下措施："},{"type":"paragraph","text":"一、要求正定县委常委对这一事件进行严肃认真的讨论，充分认识问题的严重性，检查县委应负的责任，吸取教训。县委要派一名主要领导同志对留村公社党委进行认真帮助，使其提高认识，端正态度，深刻检查。视检查情况，进行严肃处理。要帮助南庄大队搞好当前生产，搞好多种经营，增加收入，补偿损失。"},{"type":"paragraph","text":"二、将留村公社党委强令拔瓜事件通报全区，要求各级党委对这一事件展开讨论，密切联系实际，检查本地存在的问题，深入批判林彪、“四人帮”的极左路线，划清加强党的领导与瞎指挥的界限，弄清执行国家计划与尊重生产队自主权的关系。"},{"type":"paragraph","text":"三、在全区范围内继续广泛深入地学习宣传中央关于发展农业的两个文件，切实做到家喻户晓，人人明白。各级党委要对照两个文件，检查贯彻执行情况，揭露存在问题，更好地落实党在农村的各项经济政策，充分调动广大干部、群众的劳动积极性。要认真贯彻“以粮为纲，全面发展，因地制宜，适当集中”的方针，尊重生产队的自主权，切实搞好多种经营，做到农、林、牧、副、渔全面发展。切实加强大秋作物的管理，夺取今年农业全面丰收。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"林彪","type":"人物"},{"name":"四人帮","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5f8befa185"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
