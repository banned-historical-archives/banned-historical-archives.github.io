script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"抗议垄断资本的残酷剥削  法国英国工人举行罢工和示威","authors":[],"dates":[{"year":1971,"month":5,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"抗议垄断资本的残酷剥削"},{"type":"paragraph","text":"法国英国工人举行罢工和示威"},{"type":"paragraph","text":"新华社巴黎三十日电　法国巴黎、阿登、芒市和南特等地的几万名工人，二十九日举行罢工和示威游行，抗议垄断资本的残酷剥削，要求增加工资。"},{"type":"paragraph","text":"在巴黎，许多清洁工人、自来水公司的工人、医务工作人员举行了罢工。一万名清洁工人以及医务工作人员还在市府广场举行了示威游行。"},{"type":"paragraph","text":"为了维护就业权利，阿登地区各个工业部门的工人举行了罢工，近两万名工人在夏尔维尔—梅齐埃尔举行了示威游行。工人的斗争使阿登地区的经济生活陷于瘫痪。"},{"type":"paragraph","text":"芒市雷诺工厂的工人举行了罢工，表示支持已经坚持罢工斗争四周的传动车间的八十二名工人。这家工厂的两千五百名夜班工人，从二十九日晚起占领了他们的车间。"},{"type":"paragraph","text":"此外，在南特和芒市二十八日都爆发了有数千名工人参加的示威游行。在南特，数千名冶金工人停了工。食品、建筑、化工等行业以及商业的许多工人也停了工。芒市大部分企业的工人也举行了一小时或一小时以上的停工。"},{"type":"paragraph","text":"新华社伦敦三十日电　英国几个重要行业的工人最近连续进行罢工斗争，抗议垄断资本的残酷剥削，要求增加工资。"},{"type":"paragraph","text":"在汽车制造业中，几家汽车垄断企业的数以千计的工人举行了罢工或怠工。美资福特汽车公司在海尔伍德的工厂的一千六百名装配工人四月三十日举行罢工，抗议公司当局无理解雇几十名工人。罢工使装配部门停止了生产。在林伍德，属于美国克莱斯勒汽车公司的一家工厂的六千名工人从四月二十七日起举行怠工，反对这家企业为了转嫁困难而临时解雇工人。此外，英国雷兰德汽车公司的二千名工人四月三十日在西伦敦举行抗议集会，反对垄断资本家无理削减工人的工资收入。"},{"type":"paragraph","text":"在造船业中，斯旺亨特造船公司的一千多名工人六个星期的罢工使几个造船厂的生产陷于瘫痪。工人们表示要继续坚持要求增加工资的罢工斗争。"},{"type":"paragraph","text":"最近三个星期以来，曼彻斯特的一千四百多名码头工人举行了四次罢工，要求增加工资，改善劳动条件。工人们的罢工接连给装卸行业的资本家以打击。最近两个星期里，在哈尔、阿伯丁等港口，也有上千名码头工人举行了罢工。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7b18488755"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
