<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"毛主席革命路线引来幸福水韶山灌区蒸蒸日上","authors":[],"dates":[{"year":1972,"month":1,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"湖南省韶山灌区人民，在毛主席的无产阶级革命路线指引下，努力建设和积极管好、用好韶山灌区水利工程，使灌溉效益不断扩大，农业生产连年丰收，粮食产量持续上升，人民生活水平逐步提高，对国家的贡献越来越大。"},{"type":"paragraph","text":"韶山灌区水利工程是湖南省第一个大型引水灌溉工程。它引湘江支流涟水的水，灌溉湘乡、湘潭、宁乡三县和湘潭市之间三角地带丘陵地区的农田。几年以来，灌区群众以大寨大队为榜样，认真贯彻执行毛主席提出的“鼓足干劲，力争上游，多快好省地建设社会主义”的总路线，发扬自力更生、艰苦奋斗的革命精神，积极参加建设，使工程顺利进展。工程的总干渠和南北干渠共长二百四十公里。在修建干渠的同时，还修建了一级支渠一千六百多公里；除修发电站外，还建设电灌站一百九十三处，装机一万瓩。"},{"type":"paragraph","text":"韶山灌区的两期工程都是当年修建，当年受益。现在，灌区内的双季稻面积，已由原来的只占农田总面积的百分之二十五，扩大到百分之九十五以上。灌区粮食也连年获得丰收，平均亩产量由一九六五年的四百八十斤提高到一九七一年的九百五十七斤，总产量由一九六五年的三亿八千八百万斤提高到一九七一年的七亿七千五百万斤。此外，干渠约有一百公里可以通航十吨到二十吨的水船，在大坝上还建了新船机，便利船只通航；灌区有水面十万亩，可以发展养鱼事业；许多社队还利用渠道的水力，开办了一百八十多处农副产品加工厂。韶山灌区水利工程的建设，有力地促进了灌区农副业生产和地方工业的发展，促进了社员生活水平的提高。广大群众高兴地说:毛泽东思想引来幸福水，人换思想地换装。"},{"type":"paragraph","text":"\u003cIMG alt=请插入6号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1972\\01\\721o020601.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e韶山灌区的各级党组织和革委会，带领广大群众，以大寨人为榜样，战天斗地，不骄不躁地继续前进，为争取更大丰收而努力奋斗。这是韶山灌区北干渠洙津渡渡糟。　新华社记者摄\u003c/FONT\u003e"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"湖南文革","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e9ae651e4b"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
