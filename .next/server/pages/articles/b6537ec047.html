script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"奴隶创造历史的见证","authors":["董凤文"],"dates":[{"year":1972,"month":2,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"奴隶创造历史的见证"},{"type":"paragraph","text":"北京市星火人民公社东风大队　董凤文"},{"type":"paragraph","text":"“人民，只有人民，才是创造世界历史的动力。”看了纪录影片《文化大革命期间出土文物》，我们更加感到毛主席这一光辉指示是颠扑不破的真理。"},{"type":"paragraph","text":"那用两千多块玉片和金丝缀联成的“金缕玉衣”，那鎏金的长信宫灯，那些丰富多彩的金银器皿、漆画屏风、玉石雕刻，哪一样不是古代劳动人民高度的智慧和辛勤劳动的结晶？是劳动人民的双手和智慧，创造了丰富多彩的物质财富和精神财富。没有劳动人民的创造，就没有我们看到的这许多珍品；没有成千上万奴隶们的血汗，就没有古代文化，就没有历史。"},{"type":"paragraph","text":"这部影片用活生生的历史见证，有力地批判了刘少奇一类骗子散布的“英雄”、“天才”创造历史的反动谬论。"},{"type":"paragraph","text":"在漫长的封建社会里，剥削阶级占有了生产资料，剥夺了劳动人民的一切权利。劳动人民智慧和劳动的结晶，都变成少数人的私有财富。连奴隶们的生命，都为剥削阶级任意支配。看了影片中介绍的东周时期的奴隶殉葬墓和西汉中山靖王刘胜夫妇的墓，谁能不为剥削阶级的残酷和骄奢感到愤慨！十八个奴隶的骨架，有的还带着铁锁链，向我们无声地控诉了剥削阶级的血腥罪行。这不仅是十八个奴隶的悲惨遭遇，普天下有多少受苦受难的劳动人民被践踏在剥削阶级的铁蹄下啊！这部纪录片，也是我们进行阶级教育的生动的教材。"},{"type":"paragraph","text":"我们感谢革命的考古和文物工作者，他们贯彻执行毛主席的无产阶级革命路线，在发掘文物的工作中作出了贡献，使这些古代文化的珍品重新回到人民手里，为社会主义革命和社会主义建设服务。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b6537ec047"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
