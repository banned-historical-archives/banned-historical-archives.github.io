" crossorigin="">{"props":{"pageProps":{"books":[{"id":"1402c0cd-2f04-47cb-bce0-12fcb4b03a4f","name":"红旗一九六七年第二期","internal":false,"official":true,"type":"pdf","author":"《红旗》杂志编辑部","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives2/main/1402c0cd-2f04-47cb-bce0-12fcb4b03a4f.pdf"],"article":{"title":"向毛主席的致敬电","alias":"","parts":[{"type":"paragraph","text":"给毛主席的致敬电最最敬爱的毛主席："},{"type":"paragraph","text":"我们一"},{"type":"paragraph","text":"永远忠于您的上海革命造反派全体战士，向您，我们的伟大导师，伟大领袖，伟大统帅，伟大舵手，我们心中最红最红的红太阳，致以最崇高的无产阶级文化大革命的敬礼！"},{"type":"paragraph","text":"最最敬爱的毛主席，当我们正在最最热烈地欢呼您老人家亲自决定向全国广播我们上海各革命群众组织发表的《告上海全市人民书》和《紧急通告》的时候，从北京又传来了您老人家的声音一一中共中央、国务院、中央军委、中央文革小组给上海各革命造反团体的贺电。这是您老人家对我们的最大关怀，最大支持的声音：这是您老人家对我们的最大鼓舞，最大鞭策的声音。我们欢呼，我们歌唱，千万句话说不尽我们的幸福心情，千万支歌唱不完我们的感谢心情，我们只有千万遍跳跃高呼，毛主席方岁！万岁！万万岁！"},{"type":"paragraph","text":"最最敬爱的毛主席，您总是在革命最关键的时刻，给我们指明斗争的大方向；您总是在斗争最尖锐的时刻，给我们带来了无穷的精神力量。您永远热情地关怀和支持革命造反派。您永远培育和扶植一切革命的新生事物。现在，您又在我们革命造反派迎头痛击资产阶级反动路线新反扑的激战中间，批准了我们的大方向，肯定了我们的战斗任务，支持我们实行无产阶级革命派组织的大联合，团结一切革命力量，把无产阶级专政的命运，把无产阶级文化大革命的命运，把社会主义经济的命运，紧紧掌握在自己的手里。您的这一伟大英明的决定，定将迅速点燃展开全国全面的阶级斗争的熊熊烈火。什么反革命的经济主义，什么资产阶级反动路线代表者组织的新反扑，什么资产阶级反动路线的顽固堡垒，都将统统在这场冲天烈火中烧焦，烧臭、烧成灰！"},{"type":"paragraph","text":"最最敬爱的毛主席，您一再教导我们，敌人决不会自行消灭，决不会自动退出历史舞台。事实正是这样。上海市委中一小报走资本主义道路的当权派，极少数坚持资产阶级反动路线的顽固分子，虽然他们玩弄的反革命的经济主义阴谋已经被揭穿，虽然他们已经在革命群众的重重包围之中开始全线崩溃，但他们仍然在进行疯狂挣扎，千方百计地企图瓦解我们上海革命造反派的大联合，妄想在我们各革命造反团体中制造分裂，挑起纠纷，以便他们滑脚溜走，取得喘息时问，卷土重来。我们一定不让他们的阴谋得选。我们一定要遵循您的教导，“宜将剩勇追穷寇，不可活名学霸王”，一致行动起来，穷追猛打落水狗，把他们打个落花流水，打得永世不能翻身。我们一定要坚决贯彻您提出的“抓革命，促生产”的正确方针，彻底肃清反革命的经济主义的恶劣影响。我们一定不辜负您的期望，一定要在毛泽东思想的大旗下，把革命造反派进一步联合起来，把群众的大多数团结起来，紧紧掌握住上海文化大革命和生产的领导权，使上海地区的无产阶级文化大革命，沿若以您为代表的无产阶级革命路线胜利前进！"},{"type":"paragraph","text":"祝我们最最敬爱的伟大领袖毛主席万寿无！"},{"type":"paragraph","text":"上海和外地在沪备革命造反团体欢庆中央贺电，彻底粉碎资产阶级反动路线新反扑督师大会"},{"type":"paragraph","text":"一九六七年一月十二日"}],"authors":["上海造反派"],"dates":[{"year":1967,"month":1,"day":12}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":18,"page_end":19},"tags":[{"name":"中央文革","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"革命大联合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"465e68ddb9"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
