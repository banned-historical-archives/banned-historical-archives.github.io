script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"日本社会党极右翼分子拼凑成“民主社会党”","authors":[],"dates":[{"year":1960,"month":1,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"日本社会党极右翼分子"},{"type":"paragraph","text":"拼凑成“民主社会党”"},{"type":"paragraph","text":"新华社24日讯　东京消息：去年10月退出日本社会党的极右翼的西尾派今天在东京集会，正式成立了一个叫做“民主社会党”的新政党。"},{"type":"paragraph","text":"这个由西尾末广担任委员长的新党发表建党宣言说，它反对共产主义，维护议会民主。宣言并且标榜要“渐进地实现社会主义”。"},{"type":"paragraph","text":"它的外交方针规定，它“不主张单方面地废除”日美“安全条约”；但是反对把这项条约“改为双边性防御条约”。关于同苏联的关系，新党的外交方针主张同苏联缔结和约，但是又无理主张把苏联领土南北千岛“归还”日本；同中国的关系，这个政党主张同中国恢复邦交，但它又制造“两个中国”，说什么“中国事实上存在两个政府”。"},{"type":"paragraph","text":"日本共产党“赤旗报”指出：这个新政党是一个“资本主义政党”。"},{"type":"paragraph","text":"在这个新党成立以前，日本资产阶级的“每日新闻”就说：金融实业界认为，“西尾新党是保守政党的一个很好的对象”。这家报纸透露，“西尾同很多资本家保持着密切的关系”。"},{"type":"paragraph","text":"日本经营者团体联盟事务局长后藤说：“金融实业界对于否定马克思主义而肯定议会主义的西尾，表示充分的信任”。"},{"type":"paragraph","text":"这个政党目前在国会众议院有三十八名议员，在参议院有十六个议员。它的书记长是曾祢益、最高顾问是片山哲。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0648fdc52c"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
