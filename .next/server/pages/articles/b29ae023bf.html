" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji51","name":"毛泽东全集第51卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji51.pdf"],"article":{"title":"毛泽东等祝贺中朝友好合作互助条约签订十周年的电报","alias":"","parts":[{"type":"paragraph","text":"毛泽东等祝贺中朝友好合作互助条约"},{"type":"paragraph","text":"签订十周年的电报"},{"type":"paragraph","text":"（1971年7月10日）平壤朝鲜劳动党中央委员会总书记朝鲜民主主义人民共和国内阁首相金日成同志，朝鲜民主主义人民共和国最高人民会议常任委员会委员长崔庸健同志："},{"type":"paragraph","text":"在中朝友好合作互助条约签订十周年的时候，我们代表中国共产党、中国政府和中国人民，向朝鲜劳动党、朝鲜政府和兄弟的朝鲜人民，表示热烈的祝贺。"},{"type":"paragraph","text":"中朝友好合作互助条约是在马克思列宁主义和无产阶级国际主义的原则基础上签订的，充分体现了我们两国人民在反对帝国主义侵略的长期斗争中结成的伟大友谊和战斗团结。这个条约，对于全面发展我们两国的友好合作关系、反对美帝国主义和日本军国主义的侵略、维护亚洲和世界和平，有看极其重要的作用。"},{"type":"paragraph","text":"十年来，国际形势的发展越来越有利于世界各国人民，而不利于美帝国主义和各国反动派。美帝国主义不甘心失败，正在使用更加阴险狡猾的手法，继续推行侵略政策和战争政策。在美帝国主义大力扶植下复活起来的日本军国主义，野心勃勃，加紧扩张军备，"},{"type":"paragraph","text":"毛泽东等祝贺中朝友好合作互助条约签订十周年的电报已经成为亚洲地区一个危险的侵略势力。美日反动派的侵略阴谋和侵略活动，正在遭到中国人民、朝鲜人民和亚洲各国人民的强烈遣责和坚决反对。"},{"type":"paragraph","text":"中朝两国人民用鲜血凝成的伟大友谊和战斗团结，是久经考验、牢不可破的。如果美日反动派胆敢把侵略战争强加给中朝人民，中国人民将一如既往，坚决同朝鲜人民团结一致，并肩战斗，彻底打败侵略者。"},{"type":"paragraph","text":"中朝两国人民的伟大友谊和战斗团结万岁！"},{"type":"paragraph","text":"中国共产党中央委员会主席毛泽东中国共产党中央委员会副主席林彪中华人民共和国国务院总理周恩来"},{"type":"paragraph","text":"一九七一年七月十日于北京"},{"type":"paragraph","text":"1971年7月，美国总统国家安全事务助理基辛格访华，为尼克松访问中国作了准备。图为周恩来接见基辛格。"}],"authors":["毛泽东"],"dates":[{"year":1971,"month":7,"day":10}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":203,"page_end":204},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"世界形势","type":"主题/事件"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b29ae023bf"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
