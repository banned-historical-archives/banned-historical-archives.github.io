script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"亚非拉各国公众舆论继续支持巴拿马  同约翰逊殖民政策势不两立  锡《劳工报》指出：毛主席说得对，美帝是世界人民最凶恶敌人","authors":[],"dates":[{"year":1964,"month":1,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"亚非拉各国公众舆论继续支持巴拿马"},{"type":"paragraph","text":"同约翰逊殖民政策势不两立"},{"type":"paragraph","text":"锡《劳工报》指出：毛主席说得对，美帝是世界人民最凶恶敌人"},{"type":"paragraph","text":"据新华社二十九日讯　日本学生组织和锡兰、尼泊尔等国的报刊，最近继续表示支持巴拿马人民的反美爱国斗争。"},{"type":"paragraph","text":"日本平民学联的代表今天向美国驻日本大使馆递交抗议书，抗议美国武装屠杀巴拿马人民。"},{"type":"paragraph","text":"抗议书强烈谴责美帝国主义霸占巴拿马运河区，并把它变成军事基地，践踏巴拿马的主权。"},{"type":"paragraph","text":"抗议书说，“巴拿马人民的行为是为了恢复巴拿马主权、维护巴拿马人民的生活权利以及为了维护拉丁美洲和世界和平而进行的爱国正义斗争。”"},{"type":"paragraph","text":"锡兰《劳工报》二十五日发表的评论说：“在毛泽东主席发表了支持巴拿马人民斗争的声明之后，全世界人民团结起来支持巴拿马人民的正义斗争。”评论强调说：正如毛泽东主席所说，美帝国主义是世界人民最凶恶的敌人。"},{"type":"paragraph","text":"评论说，“锡兰工人阶级、反帝力量和爱好自由的人们坚决支持巴拿马人民维护国家尊严和经济独立的英勇斗争。”它还说，锡兰人民支持巴拿马人民反对美国总统约翰逊的殖民主义政策。"},{"type":"paragraph","text":"锡兰《工人报》二十五日说：“只要美国的侵略存在，巴拿马人民就将继续进行英勇斗争。数以千计的人民正在沿着古巴开辟的道路，高举着‘不自由毋宁死’的标语前进。”报纸说：“美国应该立即从巴拿马滚出去！”"},{"type":"paragraph","text":"最近一期的尼泊尔《新闻周报》发表评论说，对爱国的巴拿马人民来说，运河问题是关系到他们的民族尊严、主权和领土完整的问题。正因为这样，他们要求把运河收归国有。"},{"type":"paragraph","text":"新华社巴马科二十七日电  马里亚非团结委员会最近打电报给联合国秘书长吴丹，谴责美国在巴拿马的暴行，并声援巴拿马人民的反美爱国斗争，“坚决要求美国军队立即撤出巴拿马”。"},{"type":"paragraph","text":"电报说，美国在巴拿马的暴行造成了拉丁美洲的紧张局势，威胁了世界和平。"},{"type":"paragraph","text":"电报说：“我们同全世界人民一起，向被美国帝国主义者和殖民主义者的枪弹所杀害的烈士们致哀。”"},{"type":"paragraph","text":"新华社墨西哥城二十五日电　最近一期的墨西哥《永久》周刊发表社论，谴责美国对巴拿马的侵略。社论说，“巴拿马遭到了侵略，这是无可争辩的事实，我们不能忘记这个。”"},{"type":"paragraph","text":"社论斥责美国以保卫它的安全为借口来把不公道、杀害和野蛮行为强加到各国人民身上。社论说，“对这个兄弟小国不断进行的侵略和这个国家所受到的侮辱，就是我们所有拉丁美洲人亲身遭受的侵略和侮辱。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"00bb39276a"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
