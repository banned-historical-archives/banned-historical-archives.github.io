script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"首都各界声援多米尼加人民反美斗争大会通过决议  真正强大的是觉醒的革命人民  反对美帝必须坚决反对苏联修正主义投降分裂活动","authors":[],"dates":[{"year":1966,"month":4,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"首都各界声援多米尼加人民反美斗争大会通过决议"},{"type":"paragraph","text":"真正强大的是觉醒的革命人民"},{"type":"paragraph","text":"反对美帝必须坚决反对苏联修正主义投降分裂活动"},{"type":"paragraph","text":"新华社二十六日讯　首都各界人民声援多米尼加人民反美爱国斗争大会的决议，全文如下："},{"type":"paragraph","text":"中国首都各界人民于一九六六年四月二十六日隆重集会，热烈庆祝多米尼加人民武装起义一周年。大会以中国人民的名义向站在反美斗争最前线的多米尼加人民，表示崇高的敬意和坚决的支持。"},{"type":"paragraph","text":"去年四月，多米尼加爱国军民举行了武装起义，推翻了亲美独裁政权，沉重地打击了美帝国主义，在多米尼加人民革命史上揭开了新的光辉一页。一年来，英雄的多米尼加人民同入侵的美国强盗进行了不屈不挠的斗争。他们不顾美帝国主义的军事镇压和政治欺骗，不断掀起大规模的反美爱国革命运动，并决心以人民的武装斗争，赶走美国侵略者，争取祖国的自由和解放。"},{"type":"paragraph","text":"多米尼加人民的斗争，向全世界表明，一个被压迫民族，不论是大是小，只要敢于斗争，敢于把枪杆子掌握在自己的手里，并组成广泛的统一战线，同帝国主义及其走狗作针锋相对的斗争，它就是不可战胜的。真正强大的是觉醒的革命人民，而决不是最反动和最腐朽的帝国主义者。"},{"type":"paragraph","text":"多米尼加人民的斗争，有力地支持和推动了拉丁美洲的民族民主运动，并且为促进亚洲、非洲和全世界人民反对以美国为首的帝国主义和新老殖民主义、争取独立自由和保卫世界和平的事业作出了重大的贡献，受到拉丁美洲人民以及全世界人民的赞扬与支援。"},{"type":"paragraph","text":"大会宣布，中国人民对于多米尼加人民的反美爱国正义斗争和所取得的胜利，表示坚决的支持和热烈的祝贺。中国人民同多米尼加人民在反对共同敌人美帝国主义的战斗中所结成的革命友谊，正日益发展和巩固。我们愿意永远同多米尼加兄弟站在一起，互相支援，携手前进。"},{"type":"paragraph","text":"大会指出，现在，美帝国主义在整个拉丁美洲大陆疯狂推行武装干涉、经济掠夺、扶植傀儡政权等罪恶政策。在越南继续扩大野蛮的侵略战争。在亚洲和非洲加紧进行侵略、干涉和颠覆活动。在全世界各地积极推行战争政策和侵略政策。美帝国主义是亚非拉人民和世界人民最凶恶的敌人。全世界人民，包括美国人民在内，必须结成最广泛的、最真实的反对美帝国主义及其走狗的国际统一战线，同这个共同敌人及其走狗进行坚持不懈的斗争，直到最后把它们彻底击败和埋葬。"},{"type":"paragraph","text":"大会还强调，要反对美帝国主义及其走狗，要支持各国人民的革命运动，就必须彻底揭露帝国主义的帮凶和合谋者苏联现代修正主义的投降、分裂活动，并且同他们展开坚决的斗争。一切革命事业的背叛者，必将受到历史的严厉惩罚。"},{"type":"paragraph","text":"今天的大会有中国首都各界人民一千多名代表和来自亚洲、非洲、拉丁美洲和其他地区的四十多个国家的反帝战士参加，这是一次世界人民支援多米尼加人民和声讨美帝国主义的生动的示威。大会深信，只要多米尼加人民团结一致，坚持斗争，在亚洲、非洲、拉丁美洲和全世界人民的支持下，就一定能够扫除前进道路上的一切障碍，从而取得反美爱国斗争的最后胜利。"},{"type":"paragraph","text":"美帝国主义从多米尼加滚出去！"},{"type":"paragraph","text":"革命的多米尼加人民万岁！（附图片）"},{"type":"paragraph","text":"四月二十六日，首都各界人民举行声援多米尼加人民反美爱国斗争大会。中国亚非团结委员会主席、中国人民保卫世界和平委员会副主席廖承志在大会上讲话。　本报记者　蒋　铎摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bf0c0480bb"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
