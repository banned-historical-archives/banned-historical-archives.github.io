script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"阿《劳动报》谴责印度扩张野心  赫鲁晓夫修正主义者无视是非  同美帝结成公开联盟援印反巴","authors":[],"dates":[{"year":1965,"month":9,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"阿《劳动报》谴责印度扩张野心"},{"type":"paragraph","text":"赫鲁晓夫修正主义者无视是非"},{"type":"paragraph","text":"同美帝结成公开联盟援印反巴"},{"type":"paragraph","text":"据新华社布鲁塞尔十五日电　比利时共产党机关刊物《人民之声》周刊在九月十日的一期上就印巴武装冲突发表文章指出，“印度政府的面目，由于（它对巴基斯坦的）这种侵略，已经完全暴露无遗了。”"},{"type":"paragraph","text":"文章揭露说：印度资产阶级一直打着“非暴力”、“不结盟”和中立主义的招牌，企图更巧妙地欺骗全世界人民。“它同铁托集团一起，在赫鲁晓夫修正主义者的支持下，不断破坏亚非各国人民的反帝行动，最近并且和铁托一起进行要把符合约翰逊愿望的谈判强加给英雄的越南人民的暗害活动”。"},{"type":"paragraph","text":"文章指出，印度政府一直不断地恶化同所有邻国，特别是同中国和巴基斯坦的边界冲突。文章说，“印度资产阶级对克什米尔人民的反抗进行了残暴的镇压，今天，他们侵入了巴基斯坦控制的领土，无耻地对巴基斯坦共和国发动了战争。”印度领导人之所以进行这种罪恶的侵略，“是因为他们知道能够得到他们多年以来为之效劳的那些人的支持，即一方面是美帝国主义者和英帝国主义者，另一方面是铁托修正主义者和赫鲁晓夫修正主义者。”"},{"type":"paragraph","text":"据新华社地拉那十四日电　阿尔巴尼亚《劳动报》今天发表评论指出，目前印度对巴基斯坦的侵略彻底暴露了印度反动派的扩张主义面目。"},{"type":"paragraph","text":"评论谴责赫鲁晓夫修正主义者对印度提供全面的政治、经济和军事援助。评论说，目前苏联的赫鲁晓夫继承人无视事实，回避说出谁是正义的，谁是非正义的，谁是侵略者和谁是受害者。赫鲁晓夫修正主义者和美帝国主义结成了公开的联盟，在印巴冲突问题上同美国在联合国采取共同的立场。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"321de96404"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
