script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"农业社不能进行雇工剥削","authors":["胡占魁"],"dates":[{"year":1955,"month":10,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"农业社不能进行雇工剥削"},{"type":"paragraph","text":"编辑同志：今年七月底湖南省醴陵县王仙区收割早稻的时候，某些农业生产合作社的社员看到今年丰收了，而当地雇工工资又很低，就在收割中请人来代替自己干活。例如，石湾乡第一农业生产合作社在收割早稻的时候，社员们都在家里闲着，不做事，却到外面请了十三个人割禾。又如，黄沙乡第一农业生产合作社社员李增南自己出外做别的工作，却请了两个工到社里来替他扮禾，算自己的劳动工分。"},{"type":"paragraph","text":"半社会主义性质的农业生产合作社是带领广大农民走社会主义道路的旗帜。王仙区某些社采取的用较低的工资雇请社外农民为自己作工的做法，实际上就是一种剥削的行为，违背了办社的目的。这种错误作法应该得到纠正。如果某些农业生产合作社确实感到劳动力不足，就应该改进和提高包工制度，作好评工计分工作，以激发社员的劳动积极性，发掘社内劳动潜力；还可以采取换工互助的办法，同互助组、个体农民调济使用劳动力。如果这些办法还不能解决劳动力缺乏的困难，为了搞好生产，而临时雇请几个短工也是可以的；但是必须给以合理报酬，不许从中进行剥削，而且要以社会主义精神去团结帮助他们，树立农业生产合作社在群众中的威信，吸引社外农民走合作化的道路。"},{"type":"paragraph","text":"中共湖南省湘潭地委农村工作部　胡占魁"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a61de8ab4e"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
