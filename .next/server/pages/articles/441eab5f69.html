script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"莫斯科市委第一书记回答群众提问  改革要同保守主义和左倾行为作斗争","authors":[],"dates":[{"year":1988,"month":6,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"莫斯科市委第一书记回答群众提问"},{"type":"paragraph","text":"改革要同保守主义和左倾行为作斗争"},{"type":"paragraph","text":"新华社莫斯科6月11日电  苏共莫斯科市委第一书记扎伊科夫昨天在会见群众时，强调要同保守主义和左倾行为作斗争。"},{"type":"paragraph","text":"据《真理报》今天报道，扎伊科夫在会见著名的莫斯科吉尔汽车厂党员干部和群众时，用数小时回答了该厂职工有关苏共第19次代表会议的筹备情况、代表选举过程和改革阻力的问题。"},{"type":"paragraph","text":"他说，对代表会议提纲的讨论表明，苏共切实主张在社会主义原则基础上的意见多极化。真正的社会主义应当不断完善，辩证地否定一切过时的东西。"},{"type":"paragraph","text":"扎伊科夫强调，改革的敌人首先是保守主义，支持保守主义的是那些过去少劳多获以及不能或不想放弃教条主义的社会主义概念的人。然而，改革也遭到来自左的进攻，遇到先锋主义词藻及民族主义和沙文主义倾向。招摇过市的左倾行为并非时时受到党员和意识形态干部的应有回击。"},{"type":"paragraph","text":"他在谈到经济领域的状况时指出，这方面未能实现根本的转折，是由于相当大部分经济工作者的保守主义。"},{"type":"paragraph","text":"苏共中央政治局委员、中央书记扎伊科夫是去年11月11日接替叶利钦任莫斯科市委第一书记的。叶利钦因去年在10月中央全会上发言有“政治错误”和领导市委工作有“严重缺点”而被解除职务，报上曾指责叶利钦的过激言行为“先锋主义”。"},{"type":"paragraph","text":"吉尔汽车厂是苏联最大的汽车厂之一，生产卡车和高级轿车。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"441eab5f69"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
