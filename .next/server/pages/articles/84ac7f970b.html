" crossorigin="">{"props":{"pageProps":{"books":[{"id":"43e8cc4f-8fd2-4791-a106-8c331d315332","name":"红旗一九五八年第七期","internal":false,"official":true,"type":"pdf","author":"《红旗》杂志编辑部","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives2/main/43e8cc4f-8fd2-4791-a106-8c331d315332.pdf"],"article":{"title":"河南信阳来信","alias":"","parts":[{"type":"paragraph","text":"第八条公社要建立信月部。信用部"},{"type":"paragraph","text":"信用部应当在各大队建立分部，并且在国家银行的业务指导下，办理社员存款"},{"type":"paragraph","text":"在比校远的地点设立服务站，作到普逼货款和全社的资金调剂等工作。信用部同"},{"type":"paragraph","text":"地便利群众。时是人民银行的代办所，代理银行办理"},{"type":"paragraph","text":"信用部和各个分部是公社和各个大队蓄、放款等业务，按照规定收取手薇费。"},{"type":"paragraph","text":"的金，成宗的现金出纳，都应当经过信信用部单独核算，盈亏由公社统一负"},{"type":"paragraph","text":"用部和各个分部办理。在国家银行的领导责。信用部的查金，先由社量过去所交熟"},{"type":"paragraph","text":"下，信用部办理公社与其他经济单位之间，的信用社股金抵充，如果不够，再账公就"},{"type":"paragraph","text":"以及公社内部务核算单位之间的非现金秸设法补充。"},{"type":"paragraph","text":"算，对社员不实行非现金秸算。"},{"type":"paragraph","text":"持大社在河南已成为浪潮，信阳专区圣区丼成二百多个大公社，全省大韵会丼成二千个至-千五百个，每社"},{"type":"paragraph","text":"平均五千后至七千多户。我来这里以前，对于并这样大的河"},{"type":"paragraph","text":"社，也抱有若干疑问。社的规模上了好儿千乒，才好大修+南"},{"type":"paragraph","text":"水利，也才好大办工业，这是没有疑问的。但是，并得太信"},{"type":"paragraph","text":"大了，穷村和富村的矛盾如何解决，社里管理得透管理不透，我当时还有疑问。现在看，这些开题都好解决。生产"},{"type":"paragraph","text":"大跃进，增产大大超过努村和富村的差别，就把问题盖住阳"},{"type":"paragraph","text":"了。社大虽然不容易管得透，但如果把生产队大一点，李"},{"type":"paragraph","text":"抖到好几十户、百把后（以前这样大的生产队就不少，以来"},{"type":"paragraph","text":"友"},{"type":"paragraph","text":"后要大搞多种经营，要机械化，更非抖大不可），上面设"},{"type":"paragraph","text":"生产大队，给以足够的机动权力，也还可以管得过来。看信九"},{"type":"paragraph","text":"样子，为了大搞建设，加快速度，并大社在全国不久也会成为浪潮的。"},{"type":"paragraph","text":"他们这里并大社，原来也只是为了并大一*点，好搞建设。到郑州一囊报，震林同志向他们讲了毛泽东同志和党中央关于办包括“工农商学兵”的大公社的-番道理，回来就叫成公社了。起初我听他们这样讲，以为他们只有公社之名，尚无公社之实。来这里一看，麦收以来有一个大变化，农忙食堂普退办起来了。一办起来，大受欢迎，群众要求老办下去，除了少数上中农以外（他们也参加食堂，但怀有二心），都把锅台拔了，家里的存粮也交给食堂了。一家百把斤，几百厅，一千多斤的不等。干部和群众公共食堂（不叫农忙食堂了）有十二大好处：一、解放妇女；二、节省劳动力；三、改善伙食，节省粮食；四、节省柴禾；五、节省灯油；六、节省便于开会，便于领导；十二、好割掉私有尾巴。我觉得最大的好处是头一条和末-条。一办公共食堂，私人喂猪不方便了，种自留地的用处也不大了，都想交出来。实际上就在没有办公共食堂以前，因为劳动紧张，家庭副业也不能象过去那样照得局到了。现在看，只要不放任自流，到冬天，食堂还可以巩固下来。有一个生产队长间大家过了农忙把食堂散了好不好，妇女们：要是散了，你得到各家输流去给我们做。："},{"type":"paragraph","text":"除了办公共食堂，现在农村里还有一件大事一一融酿工资制。把自已变成工人，这是农民多年的望；现在因为劳动紧张，零花又发得不多或考没有发，这个要求就更加迫切起来。工资制有两种办法：一种是照旧记劳动日，把每一劳动日的价值定下来，实际.上是舒件工资制，已经有个别农业社实行了，反映极好。再一种是基本工资加奖励的办法，更进了一步，成儿等几级，按月各颌工资若干，工照扣。这种办法省得工记分，去了老大的一堆，农民更加赞成。这一次在这里先讨的是要实行后一种办法。地姿原来是准备推广头一种办法，经过研究，大家还是赞成后种。只奕同群众提起这件事，他们就眉飞色舞，千劲倍加。秋收之后，大多数农业社就有力量实行工餐制。到那时候，生产高潮叉会别开生面。"},{"type":"paragraph","text":"有个别的社，在大以后，自已宣布是茶民所有制（如鲁山县苏殿选导的社）。这些日子在这里研究了这样一个问题：集体所有制怎样走向至民所有制。有的同志主张排大社以后就宣布为全民所有制，然后慢慢地纳入国家的统一经济计划。我觉得：并大社加上实行工资制，农业社实际上就开始转向全民所有制了。因为社得这样大，得象过去的一个区那样大，实际上国家和社的矛盾就大大和了。实行工资制以后，农业社的收分配工作就更加走上轨道了。国家自然要对农业社的工资水平加以掌，随着生产的发展也很自然地要调整各个社的税收。做上几年工作，各社的工资水平大体上趋于平衡，各社的税收也大体上和它们的经济条件相适应。那时候，要改为全民所有制，只需把税收变为上额利润，积累变为国家投查就行了。就是不改，也和全民所有制没有什么本霞上的差别。过急子改企民所有制，倒会助长农民的依赖心理，对工作不一定有利。"},{"type":"paragraph","text":"这里还有一种想法，实行粮食供给制。这是鉴于几年来困难月（子女多、劳动力少的）总是喘不过气来，总是背着一身货而提出的。因为今年粮食大丰收，以后也可以保持每人每年两千厅以上，社里可以经常保持一年的粮食备，所以如果实行粮食供给制，估计也不会出多大的漏洞。到群众中一际酿，大家极为赞成。困难户不用了，一般的月也很满意，因为觉得口粮有了保了。劳动力多的人也赞成，他们设过去困难户做工做不够口粮标准，社里也得照顾。只有个别上中农是劳动力多的吃了亏，但也不敢明目张照地。算了几个典型片的眼，劳动力多的，如果实行了粮食供给制，收入可能减少十分之一，但比起去年还是大大增加了。从配酿的情况来看，这种做法，可以推动劳动积"}],"authors":["李友九"],"dates":[{"year":1958,"month":8,"day":8}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":24,"page_end":25},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"84ac7f970b"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
