script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"市十从中认真贯彻毛主席的革命体育路线广泛发动学生大力开展体育活动促进了学生德、智、体的全面发展","authors":[],"dates":[{"year":1973,"month":3,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　上海市第十五中学体育教研组认真贯彻毛主席的革命体育路线，在校党支部的领导下，广泛发动学生，大力开展群众性体育活动，促进了学生德、智、体的全面发展。据该校教育革命组的同志反映，近年来，学生病假率大幅度下降，学习成绩不断提高，有些后进学生也在体育活动中转变了思想。"},{"type":"paragraph","text":"过去，这个学校的体育教师由于受了修正主义体育路线的影响，对群众性的体育活动抓得不紧。后来，在学校党支部的引导下，这个体育教研组的同志学习了毛主席的教育方针，认识到体育工作是学校培养学生德、智、体全面发展的一个重要组成部分，体育教师肩负着为无产阶级培养革命事业接班人的历史重任。特别是当教师们看到少数学生在课余时间，受到资产阶级思想的腐蚀时，更加坚定了他们为革命搞好学校体育工作的决心。大家一面批判了刘少奇一类骗子鼓吹的“体育无用论”，一面制订了体育课的教学计划。上学期，他们对学生教授了队列、广播操、垫上运动、长跑、篮球、跳高、双杠和单杠等项目。许多学生反映，现在每上一堂体育课，都有新的收获。"},{"type":"paragraph","text":"在搞好体育课教学的同时，这个体育教研组还发动其他学科的教师，积极参加群众性的体育活动，不但抓了学生的课外体育活动，还组织了校足球队、女子篮球队、男子排球队、男女乒乓球队、游泳队和田径队等运动队，举行了全校篮、排球联赛、冬季象征性长跑和拔河比赛，使体育课堂教学与课外体育活动相结合，一般性的群众性体育活动与运动队的重点训练相结合。现在，这个学校有几个运动队的教练，都是由文化课教师兼任的。"},{"type":"paragraph","text":"这个体育教研组还遵照毛主席关于“学校一切工作都是为了转变学生的思想”的教导，在开展体育活动的过程中，努力用毛泽东思想教育学生。有个时期，运动队中存在着骄气、娇气和自由散漫的习气，教师就引导队员学习毛主席关于体育工作的指示，批判修正主义体育路线，使这些青少年运动员进一步树立为革命锻炼身体的思想，并把体育锻炼和实现自己远大的革命理想结合起来，加强了组织性纪律性别运动技术水平也有了比较显著的提高。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"教育革命","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0d23286b48"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
