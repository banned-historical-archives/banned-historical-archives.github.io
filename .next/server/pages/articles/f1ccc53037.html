script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"为杨健翻案就是为修正主义路线翻案","authors":[],"dates":[{"year":1969,"month":11,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"举红旗，开展革命大批判，锄毒草，废寝忘餐。多少工人下班以后，没顾上休息，便投入了战斗。十七漂染厂赵志坚看了桑伟川的文章后，连夜写出批判稿，他说:周而复笔下的杨健，完全是资产阶级的一条忠实走狗，是一个十足的资产阶级政客。他面对着不法资本家，只是点头哈腰，吹吹拍拍，为其歌功颂德，助长其反动性。对这样的人，桑伟川还说他“正体现了党的政策”，有“丰富的斗争经验”。可是杨健究竟执行了谁的路线、谁的政策?桑伟川又是站在什么立场上为杨健唱赞歌?不是昭然若揭么?!"},{"type":"paragraph","text":"上海煤气公司表具厂的革命工人读了桑伟川的文章后，群情激愤，斗志昂扬，工人们在工休时就蹲在机器旁写出大量批判文章。该厂革委会政工组在来信中指出:杨健是一个竭力推行刘少奇反革命修正主义投降路线的代表。作为“党的领导者”，在伟大的“五反”运动中，他不发动群众，不依靠工人阶级；而是依靠资本家、工程师、会计主任、工务主任，甚至还依靠资本家的小老婆。他就是不带领革命工人去向资本家展开斗争，而是把“五反”的胜利寄托在和资本家的和平谈判上。桑伟川吹捧杨健“体现了毛主席革命路线的基本方面”，这是对毛主席的无产阶级革命路线的疯狂攻击，是对刘少奇反革命修正主义路线的无耻吹捧。"},{"type":"paragraph","text":"闸北区汉中学区通讯组指出:桑伟川肉麻地吹捧“杨健体现的大方向和路线、政策是正确的”。实际上杨健完全同大叛徒刘少奇吹一个调子，坐一条凳子，穿一条裤子。刘少奇鼓吹“剥削有功”；杨健紧跟刘少奇，吹捧五毒俱全的徐义德“做了不少有利于国家的事”。刘少奇鼓吹对资产阶级“可以不革他们的命”，“如果反对资本家，就便搞错了”，就是“犯路线的错误”。杨健紧紧跟上，对用停薪、停伙、停工来破坏“五反”运动，反动气焰十分嚣张的资本家徐义德，百般包庇。工人群众要求对徐义德采取革命行动，杨健却立即加以压制，恶狠狠地说:“不应该这样做”，还胡说什么“这么一来，我们就理亏了”，“我们不能用违法对待违法”。可见，杨健就是大工贼刘少奇的化身。"},{"type":"paragraph","text":"红卫兵，思想红，批毒草，打冲锋。军垦中学红卫兵小将蒋小洪看到桑伟川的文章以后，立即把它交给同学们讨论，并及时整理出大家的意见。他们说:桑伟川捧出早已被全国革命人民批得体无完肤、声名狼藉的反动小说《上海的早晨》，明目张胆为它鸣冤叫屈，打抱不平，其目的就是替大叛徒、大内奸、大工贼刘少奇的反革命修正主义路线翻案。看!杨健分明是一个彻头彻尾的反革命修正主义分子，但桑伟川却强词夺理，把他说成是“体现了毛主席革命路线的基本方面”，“大方向和路线、政策是正确的”。明明是周而复在《早晨》中极力鼓吹刘少奇的反革命修正主义路线，桑伟川却说它是“正确路线”。桑伟川的用心不是很清楚了吗?"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f1ccc53037"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
