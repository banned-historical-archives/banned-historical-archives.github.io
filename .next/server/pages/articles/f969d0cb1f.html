script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"wenji1","type":"pdf","name":"毛泽东文集第一卷（1999）","internal":false,"official":true,"author":"中央文献研究室","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/wenji1.pdf"],"article":{"title":"红军第四军司令部布告","description":"根据中央档案馆保存的石印件刊印。","dates":[{"year":1929,"month":1}],"parts":[{"text":"红军第四军司令部布告","type":"title"},{"type":"paragraph","text":"红军宗旨，民权革命，赣西一军，声威远震。"},{"type":"paragraph","text":"此番计划，分兵前进，官佐兵夫，服从命令。"},{"type":"paragraph","text":"平买平卖，事实为证，乱烧乱杀，在所必禁。"},{"type":"paragraph","text":"全国各地，压迫太甚，工人农人，十分苦痛。"},{"type":"paragraph","text":"土豪劣绅，横行乡镇，重息重租，人人怨愤。"},{"type":"paragraph","text":"白军士兵，饥寒交并，小资产者，税捐极重。"},{"type":"paragraph","text":"洋货越多，国货受困，帝国主义，哪个不恨。"},{"type":"paragraph","text":"国民匪党，完全反动，口是心非，不能过硬。"},{"type":"paragraph","text":"蒋桂冯阎，同床异梦，冲突已起，军阀倒运。"},{"type":"paragraph","text":"饭可充饥，药能医病，共党主张，极为公正。"},{"type":"paragraph","text":"地主田地，农民收种，债不要还，租不要送。"},{"type":"paragraph","text":"增加工钱，老板担任，八时工作，恰好相称。"},{"type":"paragraph","text":"军队待遇，亟须改订，发给田地，士兵有份。"},{"type":"paragraph","text":"敌方官兵，准其投顺，以前行为，可以不问。"},{"type":"paragraph","text":"累进税法，最为适用，苛税苛捐，扫除干净。"},{"type":"paragraph","text":"城市商人，积铢累寸，只要服从，馀皆不论。"},{"type":"paragraph","text":"对待外人，必须严峻，工厂银行，没收归并。"},{"type":"paragraph","text":"外资外债，概不承认，外兵外舰，不准入境。"},{"type":"paragraph","text":"打倒列强，人人高兴，打倒军阀，除恶务尽。"},{"type":"paragraph","text":"统一中华，举国称庆，满蒙回藏，章程自定。"},{"type":"paragraph","text":"国民政府，一群恶棍，合力铲除，肃清乱政。"},{"type":"paragraph","text":"全国工农，风发雷奋，夺取政权，为期日近。"},{"type":"paragraph","text":"革命成功，尽在民众，布告四方，大家起劲。"},{"type":"paragraph","text":"军长朱德"},{"type":"paragraph","text":"党代表毛泽东"},{"type":"paragraph","text":"公历一千九百二十九年一月"}],"comment_pivots":[{"part_idx":0,"offset":10,"index":1},{"part_idx":9,"offset":4,"index":2}],"is_range_date":false,"authors":["毛泽东"],"comments":["这是红军第四军自井冈山向赣南闽西进军途中发布的布告。","蒋桂冯阎，指国民党新军阀蒋介石、李宗仁白崇禧（桂系）、冯玉祥、阎锡山四派。"],"page_start":65,"page_end":66,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f969d0cb1f"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
