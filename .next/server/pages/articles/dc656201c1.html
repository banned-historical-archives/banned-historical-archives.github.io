script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"纪念毛主席《在延安文艺座谈会上的讲话》发表三十三周年  坚持文艺为工农兵服务的正确方向  文化部举办革命样板戏影片汇映和工人画农民画巡回展览  革命样板戏剧组文艺战士深入工厂、农村、部队为工农兵演出","authors":[],"dates":[{"year":1975,"month":5,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"纪念毛主席《在延安文艺座谈会上的讲话》发表三十三周年"},{"type":"paragraph","text":"坚持文艺为工农兵服务的正确方向"},{"type":"paragraph","text":"文化部举办革命样板戏影片汇映和工人画农民画巡回展览  革命样板戏剧组文艺战士深入工厂、农村、部队为工农兵演出"},{"type":"paragraph","text":"新华社一九七五年五月二十一日讯　为纪念毛主席《在延安文艺座谈会上的讲话》发表三十三周年，文化部将从五月二十三日起，在全国城乡举办革命样板戏影片汇映。"},{"type":"paragraph","text":"参加这次汇映的有十四部革命样板戏彩色影片，它们是革命现代京剧《智取威虎山》、《红灯记》、《沙家浜》、《海港》、《龙江颂》、《红色娘子军》、《奇袭白虎团》、《平原作战》、《杜鹃山》，革命现代舞剧《红色娘子军》、《白毛女》，革命交响音乐《沙家浜》、钢琴协奏曲《黄河》、钢琴伴唱《红灯记》。这些影片重新增印了拷贝，汇映期间除在全国城市放映外，还专门组织放映队，深入农村、工矿，为工农兵群众放映。"},{"type":"paragraph","text":"五月二十三日起还将为工农兵放映一些新影片，其中有最近摄制成功的革命现代舞剧彩色影片《草原儿女》、《沂蒙颂》，彩色故事片《激战无名川》，彩色美术片《渡口》，以及一批彩色纪录片和科教片。"},{"type":"paragraph","text":"新华社一九七五年五月二十一日讯　为了纪念毛主席《在延安文艺座谈会上的讲话》发表三十三周年，文化部将从五月二十三日起，在工厂、农村巡回展出《上海、阳泉、旅大工人版画展览》和《户县农民画展览》。工人版画展览将先后在大庆油田、鞍钢、大港油田、胜利油田巡展；农民画展览将顺序到大寨大队、昔阳县、阳泉煤矿、小靳庄大队、北京市红星中朝友好人民公社等基层单位巡展。"},{"type":"paragraph","text":"这两个展览将分别展出上海、阳泉、旅大工人版画五十件，户县农民画五十件，同时展出无产阶级文化大革命以来所举行的三届全国美展部分作品的印刷品，共五十件。这两个展览在巡回展出中，还将放映幻灯，介绍三市工人画作品四十五幅、户县农民画作品五十幅。中央新闻纪录电影制片厂摄制的彩色纪录影片《美术园地新图画》、《户县农民画》，也将在巡回展出地点放映。"},{"type":"paragraph","text":"新华社一九七五年五月二十一日讯　革命样板戏剧组的文艺战士，在纪念毛主席《在延安文艺座谈会上的讲话》发表三十三周年的日子里，深入工厂、农村、部队，为工农兵群众演出革命样板戏全剧和折子戏等剧目。"},{"type":"paragraph","text":"这次演出，以革命样板戏全剧为主，以深入厂矿、社队为主。革命现代京剧《沙家浜》、《海港》、《红色娘子军》、《奇袭白虎团》、《平原作战》、《杜鹃山》、《磐石湾》，革命现代舞剧《红色娘子军》、《白毛女》，革命交响音乐《沙家浜》、《智取威虎山》，钢琴协奏曲《黄河》以及试验演出的革命现代京剧《红云岗》、《审椅子》、《战海浪》、《津江渡》等，都将和工农兵观众见面。许多剧组在演出期间将进行参观访问，和工农兵群众一起学习无产阶级专政的理论，并参加集体生产劳动。"},{"type":"paragraph","text":"这次的演出活动，是文艺工作者向工农兵汇报、接受工农兵教育的极好机会。革命样板戏剧组的文艺战士们表示决心认真学习毛主席《在延安文艺座谈会上的讲话》和无产阶级专政的理论，在与工农兵结合的道路上迈出更坚实的步伐。"},{"type":"paragraph","text":"与此同时，中央五七艺术大学音乐学院、戏剧学院、舞蹈学校、戏曲学校、电影学校的师生们，也将带着革命样板戏和自己创作的新剧目，分别深入基层和他们开门办学的工厂、社队，向工农兵进行教学汇报演出。美术学院师生将和工人共同举办美术作品展览。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dc656201c1"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
