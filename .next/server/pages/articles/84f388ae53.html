script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"鞍山市的反革命分子在“肃反”运动中的活动","authors":[],"dates":[{"year":1955,"month":9,"day":2}],"is_range_date":false,"parts":[{"text":"鞍山市的反革命分子在“肃反”运动中的活动","type":"title"},{"text":"【鞍山分社二日讯】鞍山市自八月中旬开展“肃反”运动后，反革命分子与阶级敌对分子有如下几种表现：","type":"paragraph"},{"text":"一、惊慌不安，到处探听情况。灵山技工学校工会的张秉坤(土匪、伪连长)向别人探听最近党支部开会研究什么问题。鞍钢建设公司汽车队一个打击对象(技术员)偷偷地打开党支部书记办公室的门，企图偷看档案材料。立山区一个有问题的人，把自行车卖了，并到处借钱(已借到七十多元)，企图逃跑。八卦沟一个三青团区队长藉口到本溪找职业，将户口迁出。有些反革命分子准备逃上山，有的挖地洞，最近还有一个身份不明的朝鲜姑娘逃到了鞍山市。","type":"paragraph"},{"text":"二、造谣破坏。二区小台村一个自称是复员建设军人的王德巨造谣说：“这次‘肃反’后还要来第二次土改。”三区陈家台村一个坏分子说：“这次镇反是镇压老百姓，镇压也镇压不净”。有些反革命分子并散布有“狼”、有“鬼”等谣言，企图吓唬群众。黑色冶金设计院一个窃密嫌疑分子用请客方式，拉拢群众。","type":"paragraph"},{"text":"三、准备行凶作垂死挣扎。鞍钢机械总厂一个“工人”最近买了一把刀用白布包着放在皮包内，还买了酒精、汽油、“兰素文”和二千多个小瓶、一个暖瓶，准备研究爆炸，要杀死居民委员会主任，并说：“谁要来抓我，我就叫谁死！”“看见派出所人出来单个的，非收拾他们不可。”有些坏分子并在夜里用石块打村干部。","type":"paragraph"},{"text":"此外，在鞍山市的“肃反”工作队和村干部中，最近也发现有不纯分子。","type":"paragraph"},{"text":" (李沉)","type":"paragraph"}],"comments":[],"origin":"1955年9月7日新华通讯社编《内部参考》。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"84f388ae53"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
