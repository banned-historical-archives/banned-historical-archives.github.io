<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"国务院关于私营工商业、手工业、私营运输业的社会主义改造中若干问题的补充指示","authors":[],"dates":[{"year":1956,"month":7,"day":29}],"is_range_date":false,"parts":[{"text":"国务院关于私营工商业、手工业、私营运输业的社会主义改造中若干问题的补充指示","type":"title"},{"text":"一九五六年五月十四日到六月九日分两次召开的全国对私营工商业、手工业、私营运输业改造汇报会议上所提出若干重要问题的意见和办法，国务院认为是正确的、必要的。会议记录当时已分发各省市参考。国务院于七月二十八日发出专门指示，列举各项办法，通知各地认真贯彻执行。现再提出以下各点，望各级政府研究执行。","type":"paragraph"},{"text":"一、对夫妻店、小商贩必须负责安排。保证他们正常的经营和必要的收入。各地国营商业和供销合作社，应当指定批发店，按照不同地区和商贩的不同情况，保证合作小组内每户夫妻店和摊贩每月达到四十元左右、三十元左右、二十元左右和十元左右的收入。现在夫妻店小商贩的收入高于上述数字的，不得予以降低。规定有十元左右的收入，是因为有一部分小商贩每月还有其他收入，而是以商业作为副业的。这一指示，各个商业部门必须切实认真地执行。","type":"paragraph"},{"text":"二、对手工业生产合作社和个体手工业者，必须根据统筹兼顾的方针，全面安排，保证他们正常的生产和得到必要的收入。有些地区国营商业、供销合作社收购价格和工缴费偏低的情况，应当加以调整。手工业生产合作社社员的现有工资水平较低，福利也很少，合作社每月收入应首先保证发工资，其次应解决社员的疾病救济，有余的时候，再定公积金的数量。手工业生产合作社的工资改革问题，极为复杂，各省、市人民委员会应在近期间，切实领导手工业管理机关，加以研究，提出方案。","type":"paragraph"},{"text":"三、参加公私合营企业和合作社企业小业主的资金和财产，现在都分别按照定息、分红、存社付息等办法处理，将来如何还本，还待进一步研究，暂不作决定。公私合营企业小业主如果要求献股的，现在不要接受。","type":"paragraph"},{"text":"四、关于私营工商业改造工作的领导问题。国务院、各省市的财经各部门必须直接管理对私改造工作。中央各工业、商业、手工业、交通运输业的有关部门在今年八月，必须召开一次关于对私改造问题的会议，布置工作。并且需要认真讨论一下公私双方在企业内部共事的问题。","type":"paragraph"},{"text":"以上各条，请各地加以研究，并且望传达到县、镇人民委员会。","type":"paragraph"}],"comments":[],"origin":"根据文件的原件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"80dfd8baba"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
