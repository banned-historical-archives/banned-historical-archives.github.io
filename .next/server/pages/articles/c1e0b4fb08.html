<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"绥化县部分干部和农民拒售余粮","authors":[],"dates":[{"year":1954,"month":11,"day":23}],"is_range_date":false,"parts":[{"text":"绥化县部分干部和农民拒售余粮","type":"title"},{"text":"【黑龙江分社二十三日讯】黑龙江省绥化县在购粮中发现部分干部和农民采用各种办法拒售余粮。","type":"paragraph"},{"text":"省里给这个县的购粮任务是六万吨，而县内各区最近报上来的预计认购数字仅达五万吨。据县委的调查：村干部的预计认购数字比区里预计认购的数字要差一万吨，而农民群众预计认购的数字比村干部的预计认购数字又要相差一万吨。也就是说，农民现在能认购的只有三万吨。","type":"paragraph"},{"text":"基层干部和农民采用抵制多购余粮的办法一般有四种：","type":"paragraph"},{"text":"第一、制造减产舆论，谎报灾情。有些农民说：“今年庄稼不好，都不成实，不出米，也不抗吃，没有多少余粮。”在初报产量的时候，全县受灾土地有三万八千多垧(折实际算)，而经过进一步认真调查后，受灾土地只有一万二千多垧了。","type":"paragraph"},{"text":"第二、低估和隐瞒产量。在报产量时，有四多(即：多报经济作物、多报低产作物、多留种籽、多留消耗)、四不算(即：园地打的粮食不算，先吃掉的不算，“下风头”的不算，混合种的不算)和四个花招(即：大袋子装，用脚踢斗，夹板子打斗，尖斗进，平斗出)。有的农民在混种作物的地里只报一种产量。为了低估产量，有些农民在割地时故意捆大捆，在拉地的时候，苞米带棒捆捆垛垛，在打场的时候，有的农民找背着人的地方打。有的农民故意不把粮食打净，让粮食留在杆上。","type":"paragraph"},{"text":"第三、把粮食加工成为半成品储存起来。有不少农民将苞米压成面子吃。五区东兴村一个屯子二十一户，每户都压了面，最多的一户压了三石苞米。","type":"paragraph"},{"text":"第四、个别农民还有藏粮的现象。","type":"paragraph"},{"text":"根据县委负责同志的分析，农民不愿多售余粮的具体原因有三：","type":"paragraph"},{"text":"第一、存粮是“北大荒”农民的旧习惯。有些农民认为“存粮如存金”，因此不愿意一次卖出。在粮食消费上，这里的农民不注意节约，浪费很大，普遍用好粮喂牲口。有的农业生产合作社，从新粮下来到现在，每匹马已经喂了二百五十多斤高粱。在留用明年人吃马喂的粮食时，按一般情况估计，一年每人、每个牲口有二百六十公斤就够了，而一般农民都准备留上四百多公斤。","type":"paragraph"},{"text":"第二、受去年粮食统购统销工作某些缺点的影响。部分缺粮户在去年统购粮食之后未得到足够的供应，今年有顾虑。也有个别农户由于去年卖粮过多而影响今年吃粮不足，因而不愿再多卖粮。","type":"paragraph"},{"text":"第三、个别富裕农户想多留粮食作投机买卖。","type":"paragraph"},{"text":"绥化县县委即将召开县、区、村三级干部会议，打通思想，并具体布置购粮任务。(任永达)","type":"paragraph"},{"text":" 1954年11月30日新华通讯社编《内部参考》。","type":"paragraph"}],"comments":[],"origin":"美国图书馆收藏","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c1e0b4fb08"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
