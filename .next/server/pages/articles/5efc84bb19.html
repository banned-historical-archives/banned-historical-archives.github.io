script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"俞塘大队干部社员吟诵毛主席壮丽诗篇，学习元旦社论，畅谈坚持以阶级斗争为纲，开展学大寨运动所出现的大好形势，表示要在今后斗争中努力做到——基本路线牢记心　继续革命攀高峰","authors":[],"dates":[{"year":1976,"month":1,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　上海县马桥公社俞塘大队党支部，组织干部和社员群众，认真学习伟大领袖毛主席的壮丽诗篇:《水调歌头·重上井冈山》、《念奴娇·鸟儿问答》和中央两报一刊一九七六年元旦社论，畅谈了无产阶级文化大革命以来的大好形势，痛斥了“今不如昔”的谬论，进一步鼓起了革命斗志，决心牢记党的基本路线，坚持以阶级斗争为纲，深入开展农业学大寨的群众运动，在新的一年里努力攀登新的高峰。"},{"type":"paragraph","text":"毛主席的词和元旦社论发表的当天晚上，俞塘大队党支部成员认真收听了广播，并进行了热烈讨论。一日晚上，大队党支部成员深入到各生产队，组织干部和社员群众进行学习。二日上午，大队党支部又将生产队长以上干部集中起来进行学习、讨论。干部、社员在学习和讨论中，心情无比激动。大家满怀豪情地说:“毛主席的两首词生动地描绘了国内外的大好形势，展现了无限美好的前景；同时，也向我们吹响了革命的进军号，要我们向修正主义猛烈开炮。”许多干部和社员群众表示:毛主席挥手我前进!我们要以“可上九天揽月，可下五洋捉鳖”的英雄气概，跟随伟大领袖毛主席，冲破一切艰难险阻，在革命的征途上奋勇向前。"},{"type":"paragraph","text":"俞塘大队的干部、社员在学习和讨论中，联系无产阶级文化大革命以来，本大队的巨大变化，畅谈了“到处莺歌燕舞”的大好形势。大家认为，这是坚持党的基本路线的结果。大队党支部副书记陈耀昌、陈洪德等说:在无产阶级文化大革命前的一九六五年，我们大队粮食常年亩产只有九百余斤，是个吃粮靠国家供应，生产资金靠国家贷款，分配靠公社补贴的“三靠”大队。无产阶级文化大革命以来，我们以阶级斗争为纲，大批刘少奇、林彪反革命修正主义路线，社员群众的社会主义积极性越来越高，革命生产蓬勃发展。粮食常年亩产从一九六九年以来，连续七年超过了两千斤，在每人平均只有二分四厘粮田面积的土地上，实现了口粮和种子粮的自给有余。“三靠”大队变成了“三多”大队:储备粮多，集体资金积累多，社员分配多。六十多岁的老干部、大队养鸡场负责人陈雪林兴奋地说:“经过无产阶级文化大革命，社会主义新生事物如雨后春笋般地不断涌现。新干部一批批成长起来，我们大队和各生产队的主要干部大都是新干部，他们为革命吃大苦耐大劳，为贫下中农掌好权，我们从心里高兴。自从贫下中农管理了学校，我成了泥腿校长，这在文化大革命前是做梦也没有想到的。去年，我们大队还办起了农民业余大学，这是过去从来没有听说过的。有的人说‘今不如昔’，这完全是睁着眼睛说瞎话。他们说‘今不如昔’，是要翻文化大革命的案，搞复辟倒退，我们一定要针锋相对，保卫文化大革命，坚持前进，坚持革命。”"},{"type":"paragraph","text":"这个大队的干部和社员群众还讨论了为什么俞塘会“旧貌变新颜”的问题，热情歌颂了毛主席革命路线的伟大胜利，深刻地认识到党的基本路线是党和国家的生命线。大队党支部书记李丽华说:“文化大革命以来，我们大队所以人变地变产量变，最根本的是坚持了以阶级斗争为纲，贯彻执行了党的基本路线。文化大革命以前，由于受修正主义路线的影响，队里资本主义倾向泛滥，使得人心散，土地不高产。文化大革命以来，我们坚持了党的基本路线，猛斗一小撮没有改造好的阶级敌人，狠批刘少奇、林彪反革命的修正主义路线，使大队起了翻天覆地的变化。毛主席最近教导我们:‘安定团结不是不要阶级斗争，阶级斗争是纲，其余都是目。’我们一定要牢记毛主席的教导，狠抓阶级斗争，把各项工作搞得更好，为巩固无产阶级专政而斗争。”"},{"type":"paragraph","text":"“世上无难事，只要肯登攀。”大家在学习和讨论中，还运用大量的事实，充分说明这是一个颠扑不破的真理。第四生产队原来土地很差，有十多亩低洼地，“潮来一片白茫茫，潮去一片荒”。无产阶级文化大革命开始后，这个队的干部、社员从一九六六年冬开始，批资本主义，干社会主义，大战三个冬春，把全队近一百亩土地，全部建成格子化、园田化的良田，革命、生产都跨入全大队的先进行列。这个生产队的干部和社员群众在讨论中兴奋地说:“我们生产队靠毛主席革命路线指引，靠大干苦干起家，今后要永远发扬这种精神，夺取新的胜利。”俞塘大队许多干部和社员群众说:“我们俞塘大队过去七斗八斗，斗出‘旧貌变新颜’。但是，我们大队的革命和生产并没有到顶，要继续发扬‘世上无难事，只要肯登攀’的革命精神，象中国登山运动员那样，克服一切困难，在革命和生产上攀登珠穆朗玛峰。”　(本报通讯员)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"林彪","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5efc84bb19"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
