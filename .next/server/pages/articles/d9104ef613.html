" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"“教条主义者不但迷信马恩列斯也迷信苏联”","authors":["中国人民大学","傅铁城","吴景超","孔钊","林希翎","林忠仁","郎宝田"],"dates":[{"year":1957,"month":5}],"is_range_date":false,"parts":[{"text":"“教条主义者不但迷信马恩列斯也迷信苏联”","type":"title"},{"text":"中国人民大学吴景超傅铁城林忠仁孔钊郎宝田林希翎","type":"authors"},{"text":"“……中国人民大学的教条主义者，（应当指出，我们这些半途参加中国人民大学的老教师，在人民大学的学风陶冶下，也都多多少少变成一个教条主义者了，所以中国人民大学的教条主义者一个名词，也包括我在内。）不但迷信马、恩、列、斯，同时也迷信苏联。中国人民大学是以学习苏联起家的……但是，学习苏联，并不等于迷信苏联，而我们的缺点，还是在学习苏联的时候，迷信了苏联。这种迷信的表现就是以为苏联在一切方面都是世界第一，只有苏联可学，其他各国都不可学。这就使我们变成一种眼光如豆的人，视野中只有苏联。”（中国人民大学计划系教授  吴景超）","type":"paragraph"},{"text":"“向苏联学习，这就必然产生教条主义，应不约束旧知识分子的百花齐放，从头建立起适合我国需要的又是本国出产的学术思想。”（中国人民大学历史系学生  傅铁城）","type":"paragraph"},{"text":"“小学时都读英文，因国民党很崇拜美国，解放后又都学俄文，现在书店充满了俄文东西，英文很少，这样过于偏差不好，这和国民党崇拜美国一样，现在资本主义国家有些东西是先进的，苏联所不及，去年建议选修英文，学校不理。”（中国人民大学统计系学生  林忠仁）","type":"paragraph"},{"text":"“苏联刑法教科书，充满了教条主义，最多打三分，苏联刑法分则教科书内就是抄的资产阶级刑法科学，加以阶级性。贝斯特洛娃和达马亨专家都有教条主义习气，解决不了问题。”","type":"paragraph"},{"text":"“苏联专家成了北大太上皇，美国专家受压制。过去有人没法说话，只要一说党就来扣帽子，如果对苏联专家的论点有意见，就给扣上一个政治问题的帽子。”（中国人民大学法律系讲师　孔钊）","type":"paragraph"},{"text":"“农业合作化强迫命令，生搬苏联经验，结果，农作物都减产了，大批糟塌了，群众大为不满。”","type":"paragraph"},{"text":"“现在工程质量很低，我有一个妹夫讲了苏联冬季施工经验，他说这个经验使房子只能保持十年。”（中国人民大学新闻系学生  郎宝田）","type":"paragraph"},{"text":"“中国的专家不受重视，党的教条主义宗派主义者们，你们有没有民族自尊心，你们是否团结全国人民建设祖国。”（中国人民大学  蜂蜂大字报）","type":"paragraph"},{"text":"“我曾和学医的同学谈，他们说我们社会科学向苏联学，自然科学却未学，目前协和医学院水平苏联根本没有。","type":"paragraph"},{"text":"还有组织疗法根本没用，无痛分娩法还是痛的啦，这是乱用没有科学根据，教条主义、迷信者专门宣传，在学苏联上是毫不批判的，对这点我非常反感。”（中国人民大学法律系学生  林希翎）","type":"paragraph"},{"text":" 来源：《高等学校右派言论选编》（中共中国人民大学委员会，1958年8月）。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d9104ef613"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
