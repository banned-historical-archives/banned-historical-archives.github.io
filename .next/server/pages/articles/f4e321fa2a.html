script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"热烈祝贺中朝友好合作互助条约签订十周年毛泽东同志林彪同志和周恩来同志致电金日成同志和崔庸健同志","authors":[],"dates":[{"year":1971,"month":7,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京十日电　中国共产党中央委员会主席毛泽东同志、中国共产党中央委员会副主席林彪同志、中华人民共和国国务院总理周恩来同志，十日打电报给朝鲜劳动党中央委员会总书记、朝鲜民主主义人民共和国内阁首相金日成同志和朝鲜民主主义人民共和国最高人民会议常任委员会委员长崔庸健同志，热烈祝贺中朝友好合作互助条约签订十周年。电报全文如下:"},{"type":"paragraph","text":"平壤"},{"type":"paragraph","text":"朝鲜劳动党中央委员会总书记、朝鲜民主主义　金日成同志，"},{"type":"paragraph","text":"人民共和国内阁首相朝鲜民主主义人民共和国最高人民会议　崔庸健同志:"},{"type":"paragraph","text":"常任委员会委员长在中朝友好合作互助条约签订十周年的时候，我们代表中国共产党、中国政府和中国人民，向朝鲜劳动党、朝鲜政府和兄弟的朝鲜人民，表示热烈的祝贺。"},{"type":"paragraph","text":"中朝友好合作互助条约是在马克思列宁主义和无产阶级国际主义的原则基础上签订的，充分体现了我们两国人民在反对帝国主义侵略的长期斗争中结成的伟大友谊和战斗团结。这个条约，对于全面发展我们两国的友好合作关系、反对美帝国主义和日本军国主义的侵略、维护亚洲和世界和平，有着极其重要的作用。"},{"type":"paragraph","text":"十年来，国际形势的发展越来越有利于世界各国人民，而不利于美帝国主义和各国反动派。美帝国主义不甘心失败，正在使用更加阴险狡猾的手法，继续推行侵略政策和战争政策。在美帝国主义大力扶植下复活起来的日本军国主义，野心勃勃，加紧扩张军备，已经成为亚洲地区一个危险的侵略势力。美日反动派的侵略阴谋和侵略活动，正在遭到中国人民、朝鲜人民和亚洲各国人民的强烈谴责和坚决反对。"},{"type":"paragraph","text":"中朝两国人民用鲜血凝成的伟大友谊和战斗团结，是久经考验、牢不可破的。如果美日反动派胆敢把侵略战争强加给中朝人民，中国人民将一如既往，坚决同朝鲜人民团结一致，并肩战斗，彻底打败侵略者。"},{"type":"paragraph","text":"中朝两国人民的伟大友谊和战斗团结万岁!"},{"type":"paragraph","text":"中国共产党中央委员会主席　毛泽东"},{"type":"paragraph","text":"中国共产党中央委员会副主席　林彪"},{"type":"paragraph","text":"中华人民共和国国务院总理　周恩来"},{"type":"paragraph","text":"一九七一年七月十日于北京"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"世界形势","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f4e321fa2a"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
