script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"苏联共青团领导已堕落为苏共领导集团推行修正主义的工具  我共青团不派代表团参加苏联共青团十五次代表大会","authors":[],"dates":[{"year":1966,"month":5,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"苏联共青团领导已堕落为苏共领导集团推行修正主义的工具"},{"type":"paragraph","text":"我共青团不派代表团参加苏联共青团十五次代表大会"},{"type":"paragraph","text":"我共青团中央在给苏联共青团中央的复信中说，你们遵循苏共领导集团苏美合作主宰世界的总路线，适应美帝国主义“和平演变”政策的需要，背叛了伟大的列宁和斯大林所创立和培育的苏联共青团的革命方向和革命传统，背叛了苏联青年和苏联人民的根本利益，背叛了世界青年和世界人民的根本利益。中国共产主义青年团，作为伟大的马克思列宁主义的中国共产党的助手，必须同你们彻底划清界限。"},{"type":"paragraph","text":"新华社十二日讯　中国共产主义青年团中央委员会五月十日就苏联共青团中央三月三十日的来信发出一封复信。复信全文如下：苏联共产主义青年团中央委员会同志们："},{"type":"paragraph","text":"中国共产主义青年团中央委员会收到了你们三月三十日的来信，邀请我们派代表团参加你们的第十五次代表大会。"},{"type":"paragraph","text":"我们必须指出，这些年来，苏联共产主义青年团领导已经堕落成为苏共领导集团推行修正主义的一个工具。你们遵循苏共领导集团苏美合作主宰世界的总路线，在国际青年运动中推行投降主义、分裂主义，反华、反共、反人民、反革命、反对坚持反帝坚持革命的青年组织。你们适应美帝国主义“和平演变”政策的需要，为苏联资产阶级特权阶层效劳，在苏联青年中大肆散播腐朽没落的资产阶级思想毒素和生活方式，为资本主义复辟开辟道路。你们背叛了伟大的列宁和斯大林所创立和培育的苏联共产主义青年团的革命方向和革命传统。你们背叛了苏联青年和苏联人民的根本利益，背叛了世界青年和世界人民的根本利益。中国共产主义青年团，作为伟大的马克思列宁主义的中国共产党的助手，必须同你们彻底划清界限。"},{"type":"paragraph","text":"很明白，你们这次代表大会就是为了贯彻执行苏共第二十三次代表大会的修正主义路线。你们现在正在遵照苏共领导集团的意旨，疯狂地大搞反华运动。你们对我们的邀请完全是别有用心的。在这种情况下，我们不能派代表团参加你们的第十五次代表大会。"},{"type":"paragraph","text":"具有光荣革命传统的广大苏联青年和苏联共青团员是要革命的，是要同中国青年和中国人民友好的。中国青年将一如既往，为维护中苏两国人民和两国青年建立在马克思列宁主义和无产阶级国际主义基础上的革命友谊而努力。我们坚信，在反对以美国为首的帝国主义、以苏共领导集团为中心的现代修正主义和各国反动派的共同斗争中，中苏两国人民和两国青年，同全世界革命人民和青年一起，终将扫除一切障碍，团结起来，并肩前进。"},{"type":"paragraph","text":"此致敬礼"},{"type":"paragraph","text":"中国共产主义青年团中央委员会"},{"type":"paragraph","text":"一九六六年五月十日"},{"type":"paragraph","text":"苏联共青团中央三月三十日给"},{"type":"paragraph","text":"中国共青团中央来信的全文如下：中国共产主义青年团中央委员会同志们！"},{"type":"paragraph","text":"一九六六年五月十七日将在莫斯科召开全苏列宁共产主义青年团例行的第十五次代表大会。"},{"type":"paragraph","text":"在代表大会上将听取和讨论全苏列宁共青团中央的总结报告和制定共青团在今后时期的任务。"},{"type":"paragraph","text":"全苏列宁共青团中央邀请由三人组成的中国共产主义青年团代表团参加代表大会的工作。"},{"type":"paragraph","text":"收到邀请后请告知，并将你们参加全苏列宁共青团第十五次代表大会的代表姓名通知我们。"},{"type":"paragraph","text":"致以共青团的敬礼！"},{"type":"paragraph","text":"全苏列宁共青团中央书记"},{"type":"paragraph","text":"谢·巴甫洛夫（签名）"},{"type":"paragraph","text":"一九六六年三月三十日"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ede860c86d"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
