<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"决不走修正主义技术路线的老路","authors":["张国栋"],"dates":[{"year":1974,"month":6,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编辑同志:"},{"type":"paragraph","text":"在无产阶级文化大革命中，由于革命、生产发展的需要，我厂开始自行设计土建工程。为了更有利于接受工人阶级的再教育，加强理论联系实际，搞好设计工作，领导上把设计人员安排到泥工组，与工人师傅一起学习、劳动、设计。几年来，我们设计人员既提高了阶级斗争、路线斗争的觉悟，完成了一批工程设计项目，又学到了许多实际的专业知识。一次，本厂大车间两条一百八十米长的二十吨行车梁，因地基下沉不均匀，发生了严重波形起伏，影响到行车正常运行。后来，领导上重视这个问题，组成了有土建、设备、动力和使用部门的工人、干部、技术人员参加的三结合小组，会同原厂房设计单位一起搞行车梁的平整方案设计。当时，有人断言，这两条行车梁的修理工作，没有几个月时间是不行的，而且必须停止一部分生产。我也觉得没有把握。但是许多工人师傅坚决表示:生产不停，高速、保质地修好行车梁。在设计过程中，工人师傅提出了许多积极的措施。经过不到一个月的设计，用了三个休假日进行施工，迅速地完成了这个在我看来是很艰巨繁杂的工程，既不影响生产，又保证了修理质量，我从中也受到了生动的路线教育。"},{"type":"paragraph","text":"但是，事物发展不是一帆风顺的。有的领导对三结合这个新生事物不积极支持，他们把土建设计看成只是一、两个技术人员的事，认为工人不懂设计，因此不搞‘工人、干部、设计人员’、‘设计、施工、使用’两个三结合，结果使土建设计脱离实际，导致了不良的后果。例如，建造厂房时，有的没有工艺路线方案；有的连使用部门也不明确。厂房造好了，发现没有管理用房和生活用房，于是只得临时抱佛脚补救；地坪铺设好以后，为了安装机床，又把厚厚的混凝土层凿开，造成人力、物力的大量浪费，影响了厂房结构质量，又拖延了工程进度。有一座一千多平方米的车间，拖了近三年多还未竣工，其中一个重要原因，就是不搞三结合设计。"},{"type":"paragraph","text":"毛主席教导我们:‘历史的经验值得注意。一个路线，一种观点，要经常讲，反复讲。’总结我厂土建设计工作中正反两方面的经验，我深深体会到，工厂里同样存在着是坚持三结合、开门设计，还是搞三脱离、闭门造车的斗争；同样存在着前进与倒退的斗争。如果以为身在工厂里，设计工作就会自然地三结合，这是非常错误的。"},{"type":"paragraph","text":"我原来是学理科专业的，在土建设计方面是个外行。几年来，我所有的业务知识，都是在党的领导和工人师傅的帮助下取得的。我深深感到，我们工厂单位的设计人员，也要坚定不移地走与工农相结合的道路，深入批判‘专家’治厂的修正主义路线，坚持三结合，搞开门设计，而决不能走修正主义技术路线的老路。"},{"type":"paragraph","text":"上海第一机床厂土建设计人员　张国栋"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"革命三结合","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f61b6500c2"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
