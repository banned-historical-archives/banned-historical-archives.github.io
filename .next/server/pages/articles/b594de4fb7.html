script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"老师，也不要做分数的奴隶","authors":["顾正成"],"dates":[{"year":1993,"month":11,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"射阳县中学高二(5)　顾正成"},{"type":"paragraph","text":"我们学校的吴丹同学算是出名了。他年仅15岁就已发表了一百多幅(组)漫画作品。我国漫画界巨匠华君武亲自为他的作品题了词——“大脚阿丹”。"},{"type":"paragraph","text":"吴丹是该高兴了。但令吴丹最兴奋的却是校长的话:“今后，凡是吴丹同学的作业有迟交现象的，请老师宽恕，但要尽力帮助他，他是个人才。”校长的话虽只有一句，却足以令他欣慰。至此，他可以迈开大步去干了。"},{"type":"paragraph","text":"但吴丹在成名前(准确的说是华老给他题词前)，可以说他的创作是有一定阻碍的。老师迫于高考升学率，劝他放弃画漫画。次数多了，老师的话也就有点刻薄:“别瞧你能画出几幅，可成名都很艰难，不是你……”教师的心情是可以理解的，但这不免伤了少年的那颗自尊心。但好在吴丹的父母理解和支持儿子，更在于他自己对画怀着一片“痴”情。据说，他对漫画可谓“一见钟情”，熟悉的人都知他先前是爱好音乐的，且颇有一番功底，在省里也展露出过头角。但后来由于一个偶然的机会使他迷上了漫画，并就此一发而不可收拾。"},{"type":"paragraph","text":"吴丹是幸运的，他获得了成功，然而像他这样的中学生又有几人能如愿以偿呢?"},{"type":"paragraph","text":"我们班上有一位女同学，她看到家乡落后十分痛苦。为了能为农民减轻点负担，她试着搞了个小发明，但遭到了班主任的极力阻挠。原因是她平时的分数不高。老师的刻薄话一次又一次伤了她的自尊心。她开始动摇了，消沉了，终于，有一天她退学了。"},{"type":"paragraph","text":"一朵刚要盛开的鲜花就这样凋零了。这使我想到，如果吴丹至今还没有作品发表，或是有作品发表，但未能成“家”，他的境遇又会怎样呢?"},{"type":"paragraph","text":"亲爱的老师，我们的四化建设需要各种各样的人才，诚然，学生目前应以学习为主，但青年时期的崇高向望却是人生中难得的一种动力，我们应该理解和帮助他们才对，而不能只看重分数。"},{"type":"paragraph","text":"有人说学生不要做分数的奴隶。然而我要说，老师也不要做分数的奴隶。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b594de4fb7"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
