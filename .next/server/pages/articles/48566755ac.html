script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"绝望的旅行  悲惨的失败  西欧资产阶级报刊谈艾森豪威尔远东之行","authors":[],"dates":[{"year":1960,"month":6,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"绝望的旅行  悲惨的失败"},{"type":"paragraph","text":"西欧资产阶级报刊谈艾森豪威尔远东之行"},{"type":"paragraph","text":"据新华社21日讯　西欧国家资产阶级报刊承认，艾森豪威尔在远东的强盗旅行的失败，再一次反映了美国外交政策的破产。"},{"type":"paragraph","text":"英国“新闻纪事报”今天发表詹姆斯·凯麦隆的一篇文章，嘲笑艾森豪威尔在远东旅行中的讲话“显出惊人的不智”。"},{"type":"paragraph","text":"凯麦隆引用了艾森豪威尔向冲绳怒吼的群众所说的谎话：“我们（美国）希望保持你们和我们国家之间存在的良好关系”，他嘲笑说，“这种关系竟亲切到如此程度，以致要一万二千名武装人员来保护这位总统。”"},{"type":"paragraph","text":"凯麦隆挖苦说，“把日本和冲绳发生的情况盲目地归咎于中国共产主义，那是很容易的事情，但是这样就无异于巴甫洛夫用以试验条件反射的一条狗了。”"},{"type":"paragraph","text":"“每日快报”今天发表迈克尔·富特的一篇文章，作者写道，美国政策的破产“是由于美国人装作共产党中国不存在的主意，以及试图把世界的其余部分完全组织在针对共产党国家的军事条约中”。"},{"type":"paragraph","text":"富特指出，美国“这个政策就是不起作用”，这是“整个西方政策失败的问题”。"},{"type":"paragraph","text":"西德提前出版的“德意志周报”6月22日一期发表社论认为，艾森豪威尔本来打算以访问远东来“辉煌地结束”他的总统职务，并强调一下美国的“势力和影响”，但是，恰好东京的大示威已经向全世界清楚地表明美国的“影响日益消失”。"},{"type":"paragraph","text":"这家杂志说，在南朝鲜、土耳其和日本——美国的军事基地体系起决定性作用的三个国家里，美国的政策遭到严重的打击。杂志指出，李承晚和曼德列斯已经垮台了，岸信介内阁的“寿命”已经不长了。"},{"type":"paragraph","text":"“新莱因报”20日的社论说，“岸信介的日子屈指可数了”。这家报纸说，“现在决不能认为（美日）安全条约已经有效，问题已经解决了。”"},{"type":"paragraph","text":"意大利米兰的“ABC”报评论美国国务院的政策时说，“这是一个错误的大国政策”。报纸认为，应该取消美国在别国的军事基地。"},{"type":"paragraph","text":"“论坛”周刊指出艾森豪威尔的远东之行是“绝望的旅行”。"},{"type":"paragraph","text":"都灵“人民日报”承认，“最近几个月的事件，特别是在东京发生的严重的轰动一时的事件，把我们西方的代表推到被告席上……”。"},{"type":"paragraph","text":"“星期日泰晤士报”19日以“东京沮丧”为题的评论说，美国在远东“常常遇到困难，而现在竟然在它的关键性地点日本遭到了困难”。报纸承认，日本人民的反美情绪，是由于美国用原子弹屠杀亚洲人民、多年占领日本并且以敌视中国的政策强加在日本人民身上等种种行径而引起的。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"48566755ac"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
