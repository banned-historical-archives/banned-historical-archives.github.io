" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji48","name":"毛泽东全集第48卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji48.pdf"],"article":{"title":"和李宗仁及其夫人的谈话","alias":"","parts":[{"type":"paragraph","text":"和李宗仁及其夫人的谈话"},{"type":"paragraph","text":"（1965年7月27日）"},{"type":"paragraph","text":"【新华社二十七日讯】毛泽东主席今天中午接见李宗仁先生和他的夫人郭德洁女士。"},{"type":"paragraph","text":"毛主席同李宗仁先生及其夫人热烈握手。毛主席说：你们回来，很好，欢迎你们。李宗仁先生说：我们回来后都为祖国的强大感到高兴。"},{"type":"paragraph","text":"毛主席说：祖国是比过去强大了一些，但还不很强大，我们至少还得再建设二三十年才能真正强大起来。"},{"type":"paragraph","text":"李宗仁先生对毛主席说，在海外的许多人士都怀念祖国，他们渴望回到祖国来。"},{"type":"paragraph","text":"毛主席说：跑到海外的，凡是愿意回来，我们都欢迎。他们回来，我们都以礼相待。"},{"type":"paragraph","text":"毛主席建议李宗仁先生到全国各地去看看。"},{"type":"paragraph","text":"[1]李宗仁，原为国民党桂系首领。1948年4月任国民党政府副总统，1949年1月蒋介石引退后任国民党政府代总统。国民党政权崩溃后去美国。他偕夫人郭德洁1965年7月从海外归来，20日到达北京。"}],"authors":["毛泽东"],"dates":[{"year":1965,"month":7,"day":27}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":127,"page_end":127},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9ff2a66687"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
