" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"给《新山大》编辑部的信","authors":["仲平(杨学孝)","山东大学"],"dates":[{"year":1957,"month":6,"day":23}],"is_range_date":false,"parts":[{"text":"给《新山大》编辑部的信","type":"title"},{"text":"山东大学仲平(杨学孝)","type":"authors"},{"text":"(杨学孝：笔名仲平，山东大学学生)","type":"subtitle"},{"text":"〈国事十条〉受到了严厉的批判，我十分高兴，这是预料到的。因为这篇东西是在我校局面已轰开，“宁左勿右”的气氛中写成的(六月三号)，现在看来，由于当时感情的冲动，偏激，心中对党不满意的几件具体事情混杂了外界环境的煽动，(这里边报纸是一个重要的因素)因此使我看问题时失去了立场，戴了有色眼镜，混淆了是非。从写成到刊出十多天中，环境发生了变化，有些是非已明朗化，自己也感到不对头想抽回，拖拖拉拉到刊出了，感到很对不起党。","type":"paragraph"},{"text":"当然，写出这篇东西也不完全是由于偶然，平日压在心中所觉察不到的坏思想是它的根源，因此我愿把这次批判看做个人思想改造的绝好机会，仔仔细细的研究别人的意见，取得周围同志的帮助，可能时也希望能和陆凡、小兵、尚永善同志面谈，找出弄清那些是错的，错在什么地方，产生这错误的思想根源在那里。直到弄清是非为止。","type":"paragraph"},{"text":"我现在也有我的顾虑，批判的文章发出后，一位朋友递给我一张纸条：“你快被捕了。”如果我确已够了被捕的条件，当然捕了我对党对国家有好处，我自己得到一个深刻改造的机会，也未尝不好。但如果不是这样的一个问题，而是人民内部的事情，我虽然没有权利苛求于人，(此处一字辨认不出)我还是请求少扣几个帽子，多分析批判好些。因为在我们这种情况下对症下药，治病救人，终究比“残酷斗争，无情打击”更好一些，既能解决问题，又不是感情。和风细雨可以使幼苗生长，而暴风骤雨有时能将幼苗吹坏。","type":"paragraph"},{"text":"最后，我再次对帮助我的同志深深的谢意。","type":"paragraph"},{"text":" 仲平6月23日","type":"paragraph"},{"text":" 来源：1957年6月25日《新山大》。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fbcd0c6544"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
