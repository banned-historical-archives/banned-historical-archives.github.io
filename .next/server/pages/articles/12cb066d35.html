" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji48","name":"毛泽东全集第48卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji48.pdf"],"article":{"title":"毛泽东等祝贺保加利亚社会主义革命二十一周年的电报","alias":"","parts":[{"type":"paragraph","text":"毛泽东等祝贺保加利亚社会主义革命"},{"type":"paragraph","text":"二十一周年的电报"},{"type":"paragraph","text":"（1965年9月8日）索非亚保加利亚共产党中央委员会第一书记、保加利亚人民共和国部长会议主席托·日夫科夫同志，保加利亚人民共和国国民议会主席团主席格·特莱科夫同志："},{"type":"paragraph","text":"在保加利亚社会主义革命二十一周年的时候，我们向你们，向兄弟的保加利亚人民致以热烈的祝贺。"},{"type":"paragraph","text":"中保两国人民的友谊有着深厚的基础。维护和加强这种友谊符合我们两国人民的共同愿望。中国人民将一如既往，在马克思列宁主义和无产阶级国际主义的基础上，为加强中保两国人民的友谊和团结而继续努力。祝保加利亚人民在建设社会主义的事业中取得新的成就。祝中保两国人民的友谊日益巩固和发展。"},{"type":"paragraph","text":"中国共产党中央委员会主席毛泽东中华人民共和国主席刘少奇中华人民共和国全国人民代表大会常务委员会委员长朱德中华人民共和国国务院总理周恩来"},{"type":"paragraph","text":"一九六五年九月八日"}],"authors":["毛泽东"],"dates":[{"year":1965,"month":9,"day":8}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":190,"page_end":190},"tags":[{"name":"毛泽东","type":"人物"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"12cb066d35"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
