script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"艾地说一切反帝国家和人民都应反对修正主义修正主义是削弱反帝斗争的毒药南斯拉夫只派五名运动员参加新运会证明修正主义者企图侮辱反帝斗争","authors":[],"dates":[{"year":1963,"month":11,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社雅加达7日电】　据印度尼西亚共产党新闻处的新闻公报，印度尼西亚共产党主席艾地六日在印度尼西亚外交部官员的军事训练班上发表讲话，谈到南越政变时说，“西贡政变只不过是美帝国主义者阴谋用一头新驴子来替换吴庭艳这头驴子。西贡政变对现在和将来的傀儡都是一面很好的镜子。当帝国主义者看中一个傀儡时，他们就会帮助他。但是，当帝国主义者因为旧的傀儡失掉价值而不喜欢它的时候，他们就会毫不迟疑地抬出新的傀儡来把旧傀儡置于死地。”"},{"type":"paragraph","text":"在回答训练班一成员提出的关于属于新兴力量的一些国家为什么不坚决支持反对马来西亚的斗争和举行新兴力量运动会的问题时，艾地说，“这证明:反对修正主义者的斗争不仅是共产党人的事情，而且也是一切反对帝国主义的国家和人民的事情。修正主义是削弱反帝斗争的毒药。”"},{"type":"paragraph","text":"他指出，“作为发起国之一的南斯拉夫决定只派五名运动员参加新兴力量运动会，这证明:修正主义者是怎样企图侮辱反帝斗争的。”"},{"type":"paragraph","text":"艾地说，“有人借口反对马来西亚的斗争而企图恢复紧急状态。这个企图将有意无意地把印度尼西亚政府和人民为一方同马来西亚为另一方的矛盾变为印度尼西亚政府和印度尼西亚人民之间的矛盾。因此，印度尼西亚政府和人民之间的矛盾，将使同马来西亚的对抗放松。”他说，“人民和政府之间的团结以及人民和武装部队之间的团结应当不断加强，而不应由于恢复紧急状态而遭到削弱。”"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c629dc66ff"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
