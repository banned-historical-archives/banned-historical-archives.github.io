script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"抗议美帝和本国大地主大资本家的残酷剥削  智利劳动人民展开罢工、占厂和占领庄园斗争","authors":[],"dates":[{"year":1969,"month":12,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"抗议美帝和本国大地主大资本家的残酷剥削"},{"type":"paragraph","text":"智利劳动人民展开罢工、占厂和占领庄园斗争"},{"type":"paragraph","text":"据新华社十二日讯　圣地亚哥消息：智利劳动人民继续展开罢工、占厂和占领庄园的斗争，抗议美帝国主义和本国大地主大资本家的残酷剥削，争取生存权利。"},{"type":"paragraph","text":"十日，圣地亚哥省圣安东尼奥港沿海地区一千八百多名农业工人开始举行不定期罢工，并强行占领他们所在的四十五个小庄园，抗议地主的残酷压迫和不履行增加工资的诺言，同时提出没收这些庄园归农业工人所有。"},{"type":"paragraph","text":"同天，在美国垄断集团安第斯铜矿公司所属波特雷里略斯铜矿铸铜工段做工的四百名工人也举行罢工，要求增加工资。智利南部阿劳科省库卡尼拉维煤矿二百名矿工十日也占领这个煤矿的一些坑道，抗议矿主企图解雇工人。"},{"type":"paragraph","text":"坚持不定期罢工已七十二天的圣地亚哥“芬萨”冶金公司一千三百名工人，十一日包围了工厂，要求增加工资。被困在厂内的资本家不得不靠一架直升飞机供应食品。在阿劳科纤维厂工作的五百名工人坚持罢工已两星期，他们曾占领工厂设备，为提高工资而斗争。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1b9daa374e"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
