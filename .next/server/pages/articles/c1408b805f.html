script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"西欧国家资产阶级报刊发表文章指出  今年西欧经济前景黯淡","authors":[],"dates":[{"year":1974,"month":1,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"西欧国家资产阶级报刊发表文章指出"},{"type":"paragraph","text":"今年西欧经济前景黯淡"},{"type":"paragraph","text":"据新华社一九七四年一月十二日讯　一些西欧国家的资产阶级报刊在回顾去年展望今年时认为，一九七三年西欧资本主义国家经济陷入了严重的困难，一九七四年的前景看来更加黯淡。"},{"type":"paragraph","text":"英国《金融时报》一九七三年十二月十七日发表的一篇文章展望整个西欧经济前景说：“在石油危机爆发之前就存在欧洲经济共同体的（经济）增长速度普遍放慢的前景，而且还具有通货膨胀高速度发展——许多人会说是惊人的高速度发展的背景。”“现在，在石油价格提高而供应减少的双重袭击下，我们已进入一个新的供应大紧张的经济世界”。文章说，所有情况都显示，“整个欧洲（指西欧）经济在新的一年开始时是一个黯淡的局面”。《金融时报》一九七三年十二月三十一日发表的一篇文章说：“远在燃料危机以前已经出现商品短缺，预示着在以后的岁月中经济将实际陷于停顿。”文章指出，英国“国际收支的往来账目上有巨额逆差，进口增加的速度比出口快得多”；一九七四年的通货膨胀率很可能接近于百分之十四；政府为应付经济困难而采取的应急措施对“物质生活水平和就业水平所产生的后果将是严重的”。"},{"type":"paragraph","text":"法国《世界报》一九七三年十二月四日刊登的一篇文章说，法国“继过度紧张的通货膨胀之后，明年可能出现以萧条和失业为特点的通货膨胀”。“一九七四年的图景并不是令人心安的”。"},{"type":"paragraph","text":"西德《波恩评论报》去年年底发表社论说：“展望新年，忧虑和恐惧压倒一切。”“缩短工时、失业、交易所行情暴跌、破产、没有一轮工资谈判能赶得上的物价继续上涨，……这些都是警告的信号。”"},{"type":"paragraph","text":"“一九七四年（经济）的增长将是零，也许甚至在零以下。”"},{"type":"paragraph","text":"意大利报纸在评论意大利经济局势时，也表示悲观。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c1408b805f"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
