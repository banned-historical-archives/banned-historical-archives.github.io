<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"“毛主席把你培养成门巴〔注〕了！”——记藏族人民医生罗松巴登的成长","authors":["万世祥"],"dates":[{"year":1953,"month":5,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"“毛主席把你培养成门巴〔注〕了！”"},{"type":"paragraph","text":"——记藏族人民医生罗松巴登的成长"},{"type":"paragraph","text":"万世祥"},{"type":"paragraph","text":"西康甘孜城的藏族青年罗松巴登，现在被培养成了医生。罗松巴登今年二十二岁，富有藏族青年那种刚毅耿直的特性。小时爱打架，现在身上还有几处刀痕。解放前在康定中学读书。他和许多藏族居民一样，受尽了国民党匪帮的侮辱。他忍气吞声在康定中学只读了四学期，最后还是跑回甘孜去了。"},{"type":"paragraph","text":"去年，罗松巴登虽在康定藏族自治区民族学校学习了民族政策，可是对汉族还有很深的怀疑。当他被调到中央民族卫生大队所办的“民族卫生干部训练班”学习时，心里还在想：“你们天天说培养藏族医生，未必是真的，不过要我们作翻译罢了。”训练班在教学和生活上对藏族学员兄弟般的关照，曾使他非常感动，但对培养藏族医生仍抱怀疑态度。直到分组学习时，他看见有些汉藏话都说得很好的学员调到化验组学习了；又看到汉族队长、医生们都在用心学藏话；在教学上并采用“分工包干”办法，每个医生固定教好几个学生，吃饭睡觉都和学生在一起，以便进行辅导。罗松巴登看到了这些，才彻底消除了怀疑，下决心努力学习。但是，从甘孜来康定的藏民碰到他时，就替他担心地说：“学不会啊！学医要学十几年才学得会啊！”罗松巴登对他们说：“现在不比过去了，毛主席派来的人，像教儿女一样地教我们，要不到几年我们就可以学会的。”经过两个多月的学习，许多学员已能初步掌握一些应用的医药技术了。疾病防治组的学员已能独立鉴别和诊断普通病症；化验组的学员也能独立进行一般的检查工作；妇幼卫生组的学员也能作产前检查和妊娠诊断了。罗松巴登自己，也学会了诊断普通疾病的知识，但是他并不满足。"},{"type":"paragraph","text":"为了进一步加强医学理论的学习，他经常读队里的业务书籍，还买了西氏病理学、生理解剖学、实验诊断学、梅毒学等理论书籍来读。有一次他写信到上海新华书店去买书，书店很快就把书寄来了，并且还给他写了一封鼓励的信，信里充满了民族的友爱。罗松巴登不但自己有信心提高业务，同时还帮助别人。当卫生队在甘孜办接生员训练班时，有些藏族学员缺乏学习信心，他便去给她们介绍自己学习的经验，告诉她们当家作主人的道理，坚定了大家的学习信心。"},{"type":"paragraph","text":"罗松巴登在初步掌握了一些医疗技术后，就开始实习。他第一次医疗的病人是一个藏族老妈妈泽仁娜姆。他是和苏队长一同去的。苏队长叫他先诊断，自己在一旁指导。结果罗松巴登正确地诊断为乳腺炎并且开了药方。经过几次注射，老妈妈的病好了。老妈妈对这位藏族青年医生非常惊讶，询问了他的学习经过，谆谆嘱咐说：“你们年纪轻，有了毛主席的领导，要好好学习呵！”以后每次出诊，都是罗松巴登先诊断，卫生队的医生在一旁指导，认为正确后就处方治疗。但在每次诊断时，人家总认为他是翻译，因此，每次他都要把卫生队培养他的经过宣传一番。每个藏民听了，都要给他一番鼓励。道孚县鱼科牧场喇嘛寺的活佛害慢性支气管炎，罗松巴登一连跑了七次，把病给治好了。活佛大惊，说：“从前我们没有自己的政府，现在我们当家作主，建立了自己的政府。从前藏族没有门巴，毛主席把你培养成门巴了！”话里充满了兴奋和骄傲。鱼科牧场的牧民则向罗松巴登说：“兽疫防治队给我们培养了兽医，现在你又学会了医人，我们人畜都不怕害病了。”"},{"type":"paragraph","text":"罗松巴登在工作中，不管白天或晚上，只要有人一喊，马上就背起药包骑马出诊了。卫生队在甘孜绒埧岔工作时，离大金寺有十多里路，他曾跑了十七次，把该寺管家车登珠喇嘛的病治好了。车登珠起床后，向喇嘛们介绍说：“这是甘孜乓孟家的人，是藏族医生啦！”罗松巴登出诊时，常常被许多藏民包围起来。“我们的医生来了，我们的医生来了！”有的人拉住马要药，有的喊：“阿哥阿哥，我要来找你看病！”罗松巴登遇着小病有把握的，就自己给治疗好了。遇着严重和复杂的病症，就请队里的医生指导他。他这样治好了许多病人。有时罗松巴登整夜地守在病人床前，按照规定时间，连续注射治疗。有一次，甘孜城区妇女葱娜姆来找罗松巴登，说她三岁的小孩四郎彭错病倒了，要他马上去。罗松巴登去诊断为急性肺炎，回队向当时的队长李佩兰同志请示后，当晚即住到葱娜姆家里，每隔四个钟头给小孩注射一次药物。没有好久孩子的病就好了。第二天早晨葱娜姆到卫生队去找罗松巴登时，向怀里抱着的小孩说：“阿哥救了你呀，阿哥救了你呀！”"},{"type":"paragraph","text":"罗松巴登在给藏民治病的日子里，深深感到藏族人民都对他寄托着极大的希望。无数鼓励的话语激动着他年青的心，使他更加努力学习和工作。"},{"type":"paragraph","text":"现在，这个藏族人民的“门巴”已参加色达医疗组，满怀信心地到色达区去工作了。"},{"type":"paragraph","text":"〔注〕藏语门巴就是医生。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"29dcb8fc87"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
