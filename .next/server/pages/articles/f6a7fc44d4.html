" crossorigin="">{"props":{"pageProps":{"books":[{"id":"c21f8808-2334-4e60-a047-27a52e8adbce","name":"夏邦银、朱洪霞、胡厚民等人的言论节录","internal":false,"official":true,"type":"img","author":"中共武汉市委材料组","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/c21f8808-2334-4e60-a047-27a52e8adbce/1.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/c21f8808-2334-4e60-a047-27a52e8adbce/2.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/c21f8808-2334-4e60-a047-27a52e8adbce/3.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/c21f8808-2334-4e60-a047-27a52e8adbce/4.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/c21f8808-2334-4e60-a047-27a52e8adbce/5.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/c21f8808-2334-4e60-a047-27a52e8adbce/6.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/c21f8808-2334-4e60-a047-27a52e8adbce/7.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/c21f8808-2334-4e60-a047-27a52e8adbce/8.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/c21f8808-2334-4e60-a047-27a52e8adbce/9.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/c21f8808-2334-4e60-a047-27a52e8adbce/10.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/c21f8808-2334-4e60-a047-27a52e8adbce/11.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/c21f8808-2334-4e60-a047-27a52e8adbce/12.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/c21f8808-2334-4e60-a047-27a52e8adbce/13.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/c21f8808-2334-4e60-a047-27a52e8adbce/14.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/c21f8808-2334-4e60-a047-27a52e8adbce/15.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/c21f8808-2334-4e60-a047-27a52e8adbce/16.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/c21f8808-2334-4e60-a047-27a52e8adbce/17.png"],"article":{"title":"朱洪霞、胡厚民在江汉工人文化宫集会上的讲话（节录）","alias":"","parts":[{"type":"paragraph","text":"没有吃的，没有住的，他们到十三号住一住，这不是什么山头。之，我们前段的斗争，取得的成绩很大，主流是好的。虽然有缺点是支流，这一点要看清楚。”“下一步如何搞？我讲五点意见：一是抓好学习，要有组织的认真学；二是高举批邓大旗，掀起批邓高潮，各单位都要召开声讨和批判大会。他们开会我们要发言，审查稿子可以嘛。夏邦银在十万人大会上的讲稿，他们审查了，一个字也不敢改。他的讲话水平最高，能够联系实际；三是要发动群众，彻底追查武汉类似北京的反革命事件。”“四是按原计划，原方法，把各级革委会搞起来。我们都是革委会的成员，到各区、各局去办公，怎么是串连呢？我们到各单位去，是促各级领导转好弯子，”“他们应该转好弯子。”“五是要抓好材料工作，这个工作很重要，我们要用材料说话。熊玉珍、郭洪斌、刘祖平的材料已经搞好了。但是我们布置了的任务，有的单位到现在没有把材料搞起来，这是不行的。·要取得斗争的胜利，没有材料说话是不可能的，”最后，他说：“我们的基调是，形势大好，发动群众促省委转弯子。如果省委转了弯子，我们这个班子就和省委的班子合起来一起搞，把反击右倾翻案风的斗争进行到底，”"},{"type":"paragraph","text":"四月十三日朱洪霞、胡厚民在江汉工人文化宫"},{"type":"paragraph","text":"集会上的讲话（节录），四月十三日下午一时四十分，朱洪霞、胡厚民等人以所谓“湖"},{"type":"paragraph","text":"77北暨武汉市总工会”的名义，在江汉工人文化宫举行集会。朱、胡在会上讲了话."},{"type":"paragraph","text":"朱洪霞说：“今天这个会是斗来的，他们前天在中山公园，以：省，市总工会的名义，背着省、市总工会的十几个副主任，召开了一个声讨会。”“他们开了一个分裂的会，我们对着干，开一个团结的会。”“有的同志现在观望，有人说，搞得赢就搞，搞不赢就不搞。不斗争那来的胜利呢？!现在的斗争要按单位、按系统、按地区，做扎扎实实的工作，要充分发动群众，和省、市委斗。”"},{"type":"paragraph","text":"·朱洪霞还说：“我们这几天，两个委员同省、市革委会部分成一起学习了几天，大家体会很深。我们想到了我们这些人掌权是个什么样子呢？”“应该是能上能下，密切联系群众，兢兢业业的为党工作，象上海市委、市革委会召开了那样大规模的会，会后，徐景贤、王秀珍等领导人和群众一起游行。”“我们一定要紧张的行动起来，掀起反击右倾翻案风的新高潮，不获全胜，决不收兵！”"},{"type":"paragraph","text":"胡厚民说：．“今天这个会开得好，好就好在我们同他们对着：千，做出了样子，过去，“我们是老虎嘴巴糍粑心，说了之后就不干。这一次，他们是在反击右倾翻案风的斗争中搞翻案，他们借省、市总工会的名义召开的那个大会，把我们这些造反派、新生力一、副主任都排斥在外，不承认我们是省、市总工会的副主任、常委。”“经过前一段斗争，我们取得的成绩是主要的，方法是稳妥立面不得不承认这一点。\""},{"type":"paragraph","text":"：尔四月十五日顾建棠等人在市建工局礼堂"},{"type":"paragraph","text":"集会上的讲话（节录）"},{"type":"paragraph","text":"顾建棠说：“现在要象抗日战争那样搞统一战线，打土豪，分田地。要解决问题，就要斗争。武汉可能容易些，专县困难些。有些问题解决了，不见得路线问题解决了。要继续斗，不可沽名学霸王，上面要斗，下面要斗，上下结合。今后的斗争更艰苦，不能期待走资派的恩惠，不能听信走资派的甜言蜜语，要发扬勇敢战斗的精神，‘斗下去。今后我们要上促下动，打谈结合，独立自主，，立足基层。上面动下面不动，不可能触动走资派。我们是打打谈谈，谈谈打打，谈是为了打。”“同志们说我们是外紧内松，现在要内紧外松。·社会上的活动要搞，但更重要的是在各基层扎扎实实.的搞”·"},{"type":"paragraph","text":"四月二十八日朱洪霞在国棉六厂子弟小学"},{"type":"paragraph","text":"集会上的讲话（节录）"},{"type":"paragraph","text":"朱洪霞说：“还要抓对革委会的态度问题，对革委会的态度就是对新生事物的态度，要捍卫一月风暴的成果，要坚持当时成立起"},{"type":"paragraph","text":"·朱洪霞还说：“我们这几天，两个委员同省、市革委会部分成一起学习了几天，大家体会很深。我们想到了我们这些人掌权是个什么样子呢？”“应该是能上能下，密切联系群众，兢兢业业的为党工作，象上海市委、市革委会召开了那样大规模的会，会后，徐景贤、王秀珍等领导人和群众一起游行。”“我们一定要紧张的行动起来，掀起反击右倾翻案风的新高潮，不获全胜，决不收兵！”"},{"type":"paragraph","text":"胡厚民说：．“今天这个会开得好，好就好在我们同他们对着：千，做出了样子，过去，“我们是老虎嘴巴糍粑心，说了之后就不干。这一次，他们是在反击右倾翻案风的斗争中搞翻案，他们借省、市总工会的名义召开的那个大会，把我们这些造反派、新生力一、副主任都排斥在外，不承认我们是省、市总工会的副主任、常委。”“经过前一段斗争，我们取得的成绩是主要的，方法是稳妥立面不得不承认这一点。\""},{"type":"paragraph","text":"：尔四月十五日顾建棠等人在市建工局礼堂"},{"type":"paragraph","text":"集会上的讲话（节录）"},{"type":"paragraph","text":"顾建棠说：“现在要象抗日战争那样搞统一战线，打土豪，分田地。要解决问题，就要斗争。武汉可能容易些，专县困难些。有些问题解决了，不见得路线问题解决了。要继续斗，不可沽名学霸王，上面要斗，下面要斗，上下结合。今后的斗争更艰苦，不能期待走资派的恩惠，不能听信走资派的甜言蜜语，要发扬勇敢战斗的精神，‘斗下去。今后我们要上促下动，打谈结合，独立自主，，立足基层。上面动下面不动，不可能触动走资派。我们是打打谈谈，谈谈打打，谈是为了打。”“同志们说我们是外紧内松，现在要内紧外松。·社会上的活动要搞，但更重要的是在各基层扎扎实实.的搞”·"},{"type":"paragraph","text":"四月二十八日朱洪霞在国棉六厂子弟小学"},{"type":"paragraph","text":"集会上的讲话（节录）"},{"type":"paragraph","text":"朱洪霞说：“还要抓对革委会的态度问题，对革委会的态度就是对新生事物的态度，要捍卫一月风暴的成果，要坚持当时成立起"}],"authors":["朱洪霞","胡厚民"],"dates":[{"year":1976,"month":4,"day":13}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":14,"page_end":15},"tags":[{"name":"徐景贤","type":"人物"},{"name":"王秀珍","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"一月革命","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f6a7fc44d4"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"sc
