<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"祝贺缔结日中条约　欢迎邓副总理访日日十个友好团体举行集会　政界人士分别发表讲话或文章","authors":[],"dates":[{"year":1978,"month":10,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社东京十月十九日电　由日本十个友好团体组成的祝贺批准日中和平友好条约、欢迎邓小平副总理实行委员会，十月十八日晚在东京举行国民集会，热烈祝贺日中和平友好条约的缔结。日本各界代表约一千人出席了集会。"},{"type":"paragraph","text":"集会由日中友好妇女联络会代表山下正子主持。"},{"type":"paragraph","text":"日中友好议员联盟会长滨野清吾首先代表各界在集会上讲话。他说:“长期悬而未决的日中和平友好条约已经缔结，不久中国的邓小平副总理将访日，我们感到无比高兴。”他说:“条约的内容简洁而意义极其重大。第一条是和平共处五项原则，第二条明确提出反对霸权主义。这个条文在迄今各国间的条约中是不曾见过的。因此，它既是日中两国友好的纲领，也为亚洲和世界爱好和平的人民指明了道路。我们对此感到光荣。第三条中提出加强(两国)经济和文化的交流，并提出加强(两国)人员的交流。为了使这一点得以实行，还需要两国人民心心相印的理解和共同努力，也只有这样才能建立起两国永久的和平友好关系。”"},{"type":"paragraph","text":"日中友协会长黑田寿男说:“现在，除了苏联等极少数的国家反对日中和平友好条约之外，世界大多数国家都是欢迎这个条约的。”他强调:“我们今后也要继续努力，使国民认识反霸权条款的深远的历史意义。”"},{"type":"paragraph","text":"日中友好国民运动联络会议代表市川诚、日本全国农业协同组合委员长藤田三郎、日本田径联盟常务理事安田诚克、日本国际贸易促进协会副会长萩原定司等人在讲话中对日中和平友好条约给予了高度的评价，共同表示要根据条约的原则，发展两国世世代代的友好关系。"},{"type":"paragraph","text":"中国驻日本大使符浩应邀出席了集会并讲了话。他对日本各界朋友举行这样盛大的集会表示热烈祝贺。他说:“缔结载入反霸条款的中日和平友好条约，发展两国睦邻友好关系是中日两国人民长期以来的共同愿望，也完全符合两国人民和亚洲太平洋地区各国人民的根本利益。”"},{"type":"paragraph","text":"出席集会的还有日本知名人士八百板正、藤田高敏、宇都宫德马、栗原俊夫、北山爱郎、坂本德松等。"},{"type":"paragraph","text":"据新华社东京十月二十日电　日本一些政界和日中友好人士，最近分别发表讲话或文章，热烈欢迎日中和平友好条约的缔结和邓小平副总理即将访问日本。"},{"type":"paragraph","text":"自由民主党干事长、前外相大平正芳十月十五日在静冈县一次集会上发表讲演指出:“日中两国恢复邦交的路程是很长的。我认为，邦交正常化以后，日中关系在一切方面都超出预料地顺利发展着。对象邓小平副总理这样代表中国的领导人正式访问日本，实在感到无限感奋”。"},{"type":"paragraph","text":"日本社会党委员长飞鸟田一雄在《进路》月刊十月号上发表文章说，日中和平友好条约的签订，是日本国民几十年的愿望——日中之间不再进行战争、谋求持久和平这一民族伟业的一大前进。"},{"type":"paragraph","text":"众议员古井喜实十月十五日在《读卖新闻》上发表题为《迎接邓副总理》的文章说，邓副总理虽然是为互换日中和平友好条约批准书这一政府公务来日本的，但是大多数日本国民打算从日中友好这一广阔立场来迎接他，希望政府和民间一体举国来欢迎他。"},{"type":"paragraph","text":"众议员、日中友好协会东京都本部会长宇都宫德马在最近出版的《日本与中国》报(东京版)上发表文章说，表明日中两国要世世代代友好下去的日中和平友好条约，无论是对两国国民，还是对亚洲以及世界和平都是一大支柱。"},{"type":"paragraph","text":"日中友协全国本部副会长荒哲夫在《日本与中国》报上发表文章说，为了发展日中两国世世代代的友好关系，我们应当铭记在心的是，日中两国十亿人民应一致保卫这一条约，使缔约成为谋求永远的和平与友好的新的出发点。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"09e7745754"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
