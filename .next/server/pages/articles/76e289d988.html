" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji8","name":"毛泽东全集第8卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji8.pdf"],"article":{"title":"左、中路军的战斗成果","alias":"","parts":[{"type":"paragraph","text":"左、中路军的战斗成果"},{"type":"paragraph","text":"（1936年4月13日）林、聂："},{"type":"paragraph","text":"一、我左路军到兴县南下连战皆捷。四月七日消灭敌七十五师之一连，俘人枪各四十一余。十一日在方山洞镇、离石之间朱家店，击溃孙楚一〇一师两个营，俘虏八十余人，缴获步枪八十余支，手提十三支，轻机枪三挺。三角庄击溃杨效欧六十六师一旅，消灭其一团，活捉团长一名、营连长十余名、士兵六百余人，缴获正在清查中。二、我中路军宋支队，昨十二日在汾西之鲸香镇击溃敌七十二师西进之一个营，俘虏六十余名，缴获步枪五十余支，重机枪两挺，轻机枪三挺。"},{"type":"paragraph","text":"彭毛"},{"type":"paragraph","text":"四月十三日[1]这是毛泽东和红军第一方面军司令员彭德怀给第一方面军第一军团"}],"authors":["毛泽东"],"dates":[{"year":1936,"month":4,"day":13}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":383,"page_end":383},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"76e289d988"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
