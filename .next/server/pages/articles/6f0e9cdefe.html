script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"美方屠杀战俘引起英国人民极大愤怒  英国“每日邮报”等资产阶级报纸对美国表示不满","authors":[],"dates":[{"year":1952,"month":12,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"美方屠杀战俘引起英国人民极大愤怒"},{"type":"paragraph","text":"英国“每日邮报”等资产阶级报纸对美国表示不满"},{"type":"paragraph","text":"【新华社二十日讯】美国侵略者在蜂岩岛上屠杀我方被俘人员的空前暴行，彻底揭穿了美方嘴里的“人道主义”的虚伪性，引起了英国人民的极大愤怒，以致惊惶失措的英国资产阶级报纸和工党议员都不能不对美国表示不满。"},{"type":"paragraph","text":"据法新社报道，英国保守党的“每日邮报”在评论蜂岩岛事件时说，这是一件“血迹斑斑的事件”。该报说，这势必会在全世界，特别是在亚洲产生悲痛的印象。该报说：“这次枪杀事件只是长期来一系列事件的最近一次。”该报担心全世界会因此而进一步看穿美国用“人道主义”的招牌来强迫扣留战俘的无耻阴谋。该报警告美国“不要以杀人为乐”。该报和“曼彻斯特卫报”都说，这次屠杀事件“会削弱整个联合国在战俘问题上的地位”。"},{"type":"paragraph","text":"英国工党的“每日先驱报”也认为蜂岩岛屠杀事件是“令人不安的”，并要求知道事实的真相。该报埋怨美国不把英国小伙计放在眼里，一直到现在都还不肯把关于蜂岩岛事件的详尽报告送给英国。"},{"type":"paragraph","text":"据路透社报道，英国工党议员莱斯利·赫尔十七日在议会下院中说，美国军队“竟用机关枪射击臂挽着臂唱歌的人，这是史无前例的”。他说，“这种事件会造成一种不能容忍的情势”，影响美英侵略集团在亚洲的阴谋活动。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6f0e9cdefe"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
