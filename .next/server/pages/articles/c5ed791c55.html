script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"什么叫修正主义思潮?","authors":[],"dates":[{"year":1957,"month":1,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"修正主义是工人运动中改良主义者的一种哲学理论，它是想窜改马克思主义而形成的一种思潮；所谓修正主义，实质上就是修歪主义。最早有蒲鲁东主张小资产阶级办交换银行来取消阶级斗争，他看经济问题只看到人民贫困的一面，写下了“贫困的哲学”，马克思批判他看不到可以用阶级斗争来解决经济矛盾，那是他的哲学的贫困。之后，德国拉萨尔窃取“共产党宣言”的一些基本论点，却否定无产阶级专政的历史作用，主张阶级合作，写下他的“工人纲领”，现今还被美国黄色工会沿用着。还有1875年德国社会民主党的“哥达纲领”大大宣扬拉萨尔的信条，他们还千方百计的隐匿马克思的“哥达纲领批判”——过渡时期必须由无产阶级专政的科学名著。"},{"type":"paragraph","text":"思想斗争是复杂的，修正主义是花色繁多的，有“左”派的无政府主义、工团主义，有右派的社会民主主义、费边社会主义，伯恩施坦主义，基尔特社会主义。正牌的修正主义是伯恩施坦，他第一个从马克思主义内部“修正”起来。野狐悟禅，他说“最终目的算什么，运动就是一切”，一切修正主义者奉作“法宝”，用以随机应付，到处修正，叫人忘掉无产阶级专政，牺牲无产阶级利益，他们的新康德主义的哲学家们把黑格尔当做“死狗”来对待的，耸耸肩膀蔑视辩证法，也就算连唯物主义也给他“驳倒”了，以推销他们的庸俗进化论——运动是简单的增长过程，是缓慢的量的发展。此外还有马赫派的修正主义等等。伯恩施坦之后，考茨基也口口声声马克思、恩格斯，但他是把马克思基本原则放在一旁，而说无产阶级专政是“个人独裁”是“毁灭民主”，这种声音最近也听见过。修正主义虽然花色繁多，简单说来不外千方百计的否定无产阶级专政、否定辩证法。"},{"type":"paragraph","text":"过去匈牙利的无产阶级专政中，犯过错误，有人就不以辩证观点来看这些错误，而主张另搞一套什么“直接民主”，从而企图削弱或否定民主集中制，否定党的领导，否定无产阶级专政，这正是修正主义的思潮的一种表现。"},{"type":"paragraph","text":"(风)"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c5ed791c55"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
