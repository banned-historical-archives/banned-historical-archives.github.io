script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"阿尔巴尼亚“人民之声报”评丘吉尔和狄龙访南  不对修正主义进行彻底的揭露  就不可能胜利地揭露帝国主义","authors":[],"dates":[{"year":1960,"month":7,"day":31}],"is_range_date":false,"parts":[{"type":"paragraph","text":"阿尔巴尼亚“人民之声报”评丘吉尔和狄龙访南"},{"type":"paragraph","text":"不对修正主义进行彻底的揭露  就不可能胜利地揭露帝国主义"},{"type":"paragraph","text":"本报地拉那30日电　阿尔巴尼亚“人民之声报”26日以“说你是跟谁走的，让我告诉你是什么人吧”为题就丘吉尔、狄龙访问南斯拉夫发表评论。评论说，“每天都有很多新的事实说明南斯拉夫修正主义集团已完全跪倒在帝国主义的膝下。最近当代两个最疯狂的反共头子丘吉尔和狄龙访问了南斯拉夫，他们和铁托及其随从就有关‘南斯拉夫经济发展’和就‘国际政治问题’进行了‘十分亲切’的会谈。南斯拉夫修正主义的报纸和资产阶级报纸满意地发表消息说，在修正主义头子铁托和反共头子丘吉尔之间进行了‘十分亲切’的会谈、互相‘谅解’和‘复活了战时的友谊’。”评论说，“铁托能向他的老朋友提出什么样的保证，以致使这个疯狂的反共头子如此高兴呢？除了继续进行叛变和反对马克思列宁主义、反对共产党和工人党间的国际团结的恶毒阴险活动外，还能有什么呢？狄龙也和南斯拉夫修正主义头子进行了‘十分有益’、‘亲切的’会谈，他同样也感到‘十分满意’。”评论指出，“丘吉尔和狄龙都不会是到南斯拉夫游览的，一切都是按照一个经过仔细研究后的计划很好地配合进行的。帝国主义在欧洲、亚洲、拉丁美洲和非洲，在一切由于被帝国主义和殖民主义蹂躏而正在燃烧着的土地上，现在比过去任何时候都更加需要现代修正主义的帮助，首先是南斯拉夫修正主义的帮助。”"},{"type":"paragraph","text":"评论接着说，“另一个使人注意的事实是，正是在艾森豪威尔签署宣布所谓‘被奴役国家周’的文件，从而悍然侵犯各国人民自决权和粗暴地干涉各国人民内政的时候，铁托修正主义集团怀着极深的感情和艾森豪威尔来反对我们各国和各国人民，同反动政策的最坚决的拥护者丘吉尔和狄龙拥抱，这是很自然的事。正如丘吉尔自己所宣传的，铁托集团和这一政策的制订者之间的联系在战争时期就已存在了。从那时起帝国主义和国际资产阶级在反对苏联和整个共产主义的斗争中就一直支持铁托的反马克思主义集团。当丘吉尔在富尔敦宣布对社会主义国家首先是对苏联、对全世界的共产党和工人党进行十字军东征时，他也考虑到了铁托的‘友谊’，考虑到了铁托对这次恶毒的十字军东征的赞同和积极支持。正如今天艾森豪威尔和美帝国主义不仅在反社会主义国家、反社会主义阵营、反对我们各国和各国党的斗争中得到南斯拉夫修正主义者的积极支持，而且也在反对世界上任何反帝运动的斗争中得到南斯拉夫修正主义者的积极支持一样。这样，也只有这样来解释对于贝尔格莱德修正主义统治者所表达的‘深切的感情’、‘给予新的贷款的保证’、对于取得的进步的祝贺等。”"},{"type":"paragraph","text":"评论在谈到今天在南斯拉夫公开地谈论新的改组计划包括新的外汇改革使南斯拉夫经济同西方资本主义市场更加具体地联系在一起后说，狄龙和铁托在会谈中也谈到了这个问题。狄龙赞扬铁托分子在经济方面为同资本主义各国建立更紧密的联系而作的新努力。说美国“特别”关心南斯拉夫的经济发展，说美国怀着“特殊的”同情注视着南斯拉夫修正主义者为解决许多困难问题，特别是在经济方面的困难问题所作的努力。说美国很满意同南斯拉夫的“合作”，特别是很满意南斯拉夫使用“美援”的方式。最后他宣布说，根据就南斯拉夫施行外汇改革计划所进行的会谈结果，南斯拉夫将“得到美国的必要的支持”。"},{"type":"paragraph","text":"在国际共产主义运动中对社会主义和共产主义的破坏活动，破坏非洲、亚洲、拉丁美洲各国人民民族运动的阴谋，破坏社会主义阵营和各国共产党、工人党团结的企图，使南斯拉夫修正主义成为为帝国主义效劳、反对建设社会主义和共产主义的各国人民、反对为争取和平而斗争的各国人民的最危险的敌人和最富侵略性的支队。所以揭露南斯拉夫修正主义者的斗争是反对准备发动新战争、反对美国侵略集团的斗争的不可分割的一部分。"},{"type":"paragraph","text":"评论最后说，“铁托同丘吉尔、狄龙和世界资本主义的其他领袖的非常亲密的友谊及其同美帝国主义的联系，无可辩驳地证明了南斯拉夫修正主义者对于国际共产主义运动、对于马克思列宁主义、对于保卫世界和平是个巨大的危险。不对修正主义进行彻底的揭露也就不可能胜利地揭露帝国主义本身。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"37cfc7034e"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
