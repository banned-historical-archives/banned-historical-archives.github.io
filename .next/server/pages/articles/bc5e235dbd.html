script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"太行二十县检查翻身  贫富村翻身程度悬殊应全面进行填平补齐  干部还须决心消灭封建剥削","authors":["马忠民"],"dates":[{"year":1946,"month":11,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"太行二十县检查翻身"},{"type":"paragraph","text":"贫富村翻身程度悬殊应全面进行填平补齐"},{"type":"paragraph","text":"干部还须决心消灭封建剥削"},{"type":"paragraph","text":"【本报讯】为贯彻全面“填平补齐”，彻底解决土地问题，全区各地正进行翻身检查。一分区之沙河、邢台、邢市、内邱、临城、高邑、赞皇、元氏、井陉，二分区之平定、榆次、和顺、左权、襄垣、长治市，三分区之安阳、武安，四分区之陵川，均已分别做了检查与总结，从检查与总结中，正确认识了前一段的成绩与经验教训，同时从成绩中，冷静的指出了运动不够的各个方面。首先在彻底消灭封建方面还有距离，除尚有一分区九百二十九个行政村中，四十九个村未运动，占百分之五点三，和顺新区百分之八的村庄未动，襄垣未动者为百分之四外。就是已运动村中，尚有少数村消灭封建与扶助赤贫翻身均不彻底，临城城内汉奸恶霸吴老香，仍霸有群众大量血汗果实，寿阳道坪村有两户赤贫未翻身，最大的一个问题，仍是富村与穷村的翻身程度太悬殊，未能“全面填平补齐”，和顺富村大夫岩房地堆积分了又分，穷村石岩坪少地没房没啥分。其次在果实分配上，思想发动上、组织建设上、干部培养改造上，均有许多缺点和不够的地方。不彻底的主要原因，据检查发现，仍有一些干部对彻底消灭封建的决心不够，在一些具体问题的处理上，自觉不自觉的维护了封建势力，临城三区的两种糊涂思想：一是过分的强调照顾而后清算，一是片面的认识宽大政策。还有是手未真正放给广大群众，仍是几个干部在包办。解决这些思想问题对推动以后运动关系极大。"},{"type":"paragraph","text":"【又讯】为协助当地于今冬彻底完成土地改革运动，长治师范“后师班”全体同学三十四人组成翻身队下乡。该队由该校张校长，张教导员亲自领导，现已在长治市各区开始工作。（马忠民）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bc5e235dbd"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
