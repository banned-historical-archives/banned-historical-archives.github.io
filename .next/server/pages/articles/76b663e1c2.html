script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"如何理解——向一切剥削阶级的意识形态展开新进攻?有些读者来信问:《元旦献词》中指出:“工农兵和革命知识分子向资产阶级和一切剥削阶级的意识形态展开了新的进攻。”这一句话，应该怎样理解?为此，我们请黎乐同志谈谈他的学习体会，供参考。","authors":[],"dates":[{"year":1974,"month":1,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"这场新进攻，是无产阶级文化大革命继续深入和发展的标志，充分显示了党的基本路线深入人心。斗争的焦点，是肯定还是否定这场伟大的无产阶级文化大革命，是坚持前进，还是倒退复辟?广大工农兵群众和革命知识分子正是为了巩固和发展无产阶级文化大革命的伟大成果，积极主动地向资产阶级和一切剥削阶级的意识形态发动新的进攻，打退资产阶级的开历史倒车企图，进一步贯彻执行党的基本路线。当前我们正在开展的批判林彪修正主义路线，批判尊孔反法思想，就是这场新进攻的一个重要方面；其次，是批判刘少奇、林彪的修正主义教育路线和资产阶级习惯势力，如“智育第一”、“师道尊严”等等；第三，狠抓意识形态领域里的阶级斗争，大破一切剥削阶级的传统观念，树立无产阶级的新风尚等等。"},{"type":"paragraph","text":"这场进攻是在毛主席革命路线的指引下，由工农兵和革命知识分子积极参加的。李庆霖同志坚决支持子女上山下乡，张铁生同志的《一份发人深省的答卷》，刘丽华同志谈话记录的讨论，还有黄帅的信、日记摘抄引起的反响，以及柴春泽给他父亲的信的发表，都是广大工农兵群众和革命知识分子起来反击资产阶级和一切剥削阶级意识形态的回潮的革命行为，所以，这场斗争显得广泛深入，锐不可挡。"},{"type":"paragraph","text":"这场新进攻表现了反潮流的革命精神，体现了经过无产阶级文化大革命锻炼的广大工农兵和革命知识分子的高度的阶级斗争和路线斗争觉悟。这也是斗争的一个新特点。这场斗争有的是尖锐揭露“开后门”的不正之风；有的是冲击“以分选优”的旧的高考制度；有的是批判修正主义教育路线的回潮；有的是批判了把青年一代的茁壮成长认为一代不如一代的反动思潮。他们发扬了“五不怕”精神，所向披靡，荡涤着资产阶级和一切剥削阶级遗留下来的污泥浊水。"},{"type":"paragraph","text":"这场新进攻，也是继续进行无产阶级文化大革命的一个重要战役。社会主义时期阶级斗争是长期的、复杂的，有时甚至是很激烈的。在社会主义时期，无产阶级与资产阶级之间这种长期复杂的斗争，总是以高一阵，低一阵，时起时伏的形式表现出来的。被推翻了的地主资产阶级总不甘心于自己的灭亡，他们要同无产阶级较量。他们攻击教育革命和广大革命青年，胡说“一代不如一代”，旨在否定无产阶级文化大革命所取的丰硕成果。广大工农兵和革命知识分子给予了针锋相对的还击，正说明无产阶级文化大革命并没有结束。斗争的实践又一次证明，只有不断地对资产阶级开展新的进攻，才能发展、巩固胜利，将无产阶级文化大革命进行到底。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"林彪","type":"人物"},{"name":"教育革命","type":"主题/事件"},{"name":"上山下乡","type":"主题/事件"},{"name":"反潮流","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"76b663e1c2"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
