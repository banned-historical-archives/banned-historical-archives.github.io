script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"在美吴集团残酷剥削和压榨下南越经济陷于严重困境","authors":[],"dates":[{"year":1962,"month":6,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【据新华社河内11日电】　西贡消息:南越经济最近出现一片混乱状态，民族工商业陷于困境。"},{"type":"paragraph","text":"据西贡报纸报道，目前西贡港口的货物到处堆积，但无人前往提取。港口仓库仅能容纳二万零五百吨货物，而现在堆积的货物却“打破十万吨”的大关，许多货轮不得不把货物卸在驳船上。"},{"type":"paragraph","text":"西贡报纸透露，造成这种现象的原因，是由于美国和吴庭艳集团的残酷剥削和压榨，人民购买力严重下降，商家无力提货。特别是吴庭艳集团在去年年底颁布所谓“改革财政经济十项法令”后，这种情况更为严重。根据规定，进口商要缴纳的税款相当于进口货物靠岸时的价格的七分之五。进口商必须先缴足了税款才能提货，而提出的货物却卖不出去，因此只好堆放在码头上。"},{"type":"paragraph","text":"吴庭艳集团还巧立名目繁多的新税，对人民加紧搜刮，来维持其庞大的军费开支。据西贡报纸透露，吴庭艳集团恢复了法国殖民主义统治时期的“安全负担税”，对中小商人征收“包税”，对房产主征收“阳台税”等等。此外，吴庭艳集团还以种种所谓“违反经济条例”的罪名，向工商业者罚款，以补税收的不足。"},{"type":"paragraph","text":"在农村，繁重的苛捐杂税种类更多。例如，广治省的赋税就有:土地税、市场税、渡河税、上山税、建筑税、婚姻税、生育税、烟税、家畜税、国家基金税、控共基金税、联保基金税等。每一种税款最少要五十元至一百元。许多人家由于无法缴纳赋税而破产。"},{"type":"paragraph","text":"在美国“剩余”物资大量倾销和当地官僚买办资本的排挤下，南越民族工商业朝不保夕，纷纷倒闭。据不完全统计，在1960年头八个月中，越南南方就有四百零九十企业倒闭，1961年年初又有三百七十五个企业停止营业。今年以来，工厂、商店还在继续成批倒闭。"},{"type":"paragraph","text":"随着工厂、商店的倒闭，南越失业人数日益增多。据西贡《远东日报》透露，目前仅西贡—堤岸就有八十三万六千多人失业或半失业，约占这个城市人口的68.3%。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d0fa89ced7"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
