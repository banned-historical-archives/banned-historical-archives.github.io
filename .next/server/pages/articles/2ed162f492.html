<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"本市数十万群众隆重集会热烈欢迎上海工人代表从毛主席身边光荣归来毛主席亲切关怀是巨大的幸福和力量 上海工人决心乘东风认真搞好斗批改‘毛主席万岁!毛主席万万岁!’的欢呼声响彻上海全城。代表们表示一定遵循毛主席‘工人阶级必须领导一切’的教导，学习各地工人阶级的先进经验，狠抓革命，猛促生产，为夺取文化大革命全面胜利作出新贡献","authors":[],"dates":[{"year":1968,"month":10,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　伟大领袖毛主席和他的亲密战友林副主席亲自批准邀请赴京参加国庆观礼的上海工人代表，满载着伟大领袖毛主席对上海工人阶级的巨大关怀，满载着首都和全国各地工人阶级在斗、批、改中创造的丰富经验，昨天下午乘车回到上海。全市无产阶级革命派和广大革命群众数十万人，热烈地夹道欢迎从毛主席身边光荣归来的战友，并隆重热烈地举行了欢迎大会，决心进一步落实毛主席一系列最新指示，掀起斗、批、改的新高潮，狼抓革命，猛促生产，以出色的成绩向毛主席敬献忠心。上海工人阶级满怀革命豪情表示，决不辜负毛主席的最大关怀、最大鼓舞、最大期望、最大鞭策!"},{"type":"paragraph","text":"昨天，上海全城一片沸腾。北站站台上高挂着大红横幅:“热烈欢迎你们，从毛主席身边光荣归来的战友!”车站上，人群如潮，红旗似海。下午三时五十分，代表们乘坐的列车徐徐进站。顿时，锣鼓喧天，欢声雷动。代表们纷纷从车窗里挥动红彤彤的《毛主席语录》，含着激动的泪花，同前来欢迎的战友同声高呼:“毛主席万岁!毛主席万万岁!”“敬祝毛主席万寿无疆!”欢呼声响彻云霄。代表们双手捧着从毛主席居住的地方采来的向日葵、松枝、柏苗，以及北京工人毛泽东思想宣传队转送给上海工人阶级的珍贵礼物——芒果，兴高采烈地走下车厢。这时，前来欢迎的上海市革命委员会领导成员、中国人民解放军驻沪三军首长、各革命群众组织负责人，走上前去和代表们亲切握手。车站上又一次爆发出“毛主席万岁!毛主席万万岁!”的欢呼声。"},{"type":"paragraph","text":"然后，七百名代表排列成整齐的队伍，沿着河南北路、南京东路，步行到人民广场。他们一边走，一边齐声高呼:“我们见到毛主席!我们想念毛主席!我们热爱毛主席!我们忠于毛主席!”他们走到那里，那里就激起一片欢腾，夹道欢迎的广大工人、红卫兵、红小兵和革命群众，载歌载舞，热情高呼:“向工人阶级学习!”“向工人阶级致敬!”“工人阶级必须领导一切!”“掀起斗、批、改的新高潮!”“狠抓革命，猛促生产，以出色的成绩来回答毛主席的巨大关怀!”"},{"type":"paragraph","text":"当七百名工人代表列队进入人民广场、登上大会主席台的时候，伫候在广场上的数十万群众，挥舞红旗，擂动战鼓，不断地鼓掌欢呼，向从毛主席身边光荣归来的战友表示最最热烈的欢迎。"},{"type":"paragraph","text":"在隆重热烈的欢迎大会上，上海市革命委员会领导成员首先讲话，他代表市革命委员会及全市无产阶级革命派和广大革命群众，热烈欢迎赴京参加国庆观礼的上海工人代表光荣归来!"},{"type":"paragraph","text":"接着，参加国庆观礼的上海工人代表、国棉十七厂革委会负责人唐文兰同志和上海机床厂工人技术员王德法同志，先后在大会上汇报了在伟大领袖毛主席身边度过的最幸福、最难忘的日子里的情况。"},{"type":"paragraph","text":"他们激动地说:这次我们到了北京，就住在中南海，住在伟大领袖毛主席的身边，这是我们工人阶级最大的光荣、最大的幸福。毛主席啊，毛主席!旧社会把我们工人当作路边草，今天，您把我们工人当成宝。我们工人睡在您的身边，就象孩儿睡在爹娘的身旁；我们有多少话儿要对您讲，有多少歌儿要对您唱，千言万语、千歌万曲，并成一句最美好的祝愿，敬祝毛主席万寿无疆!万寿无疆!万寿无疆!"},{"type":"paragraph","text":"他们幸福地谈到十月一日和五日这两个最难忘的日子，我们伟大领袖毛主席检阅和接见首都及全国各地的工人代表，毛主席身体非常非常健康，精力非常非常充沛，代表们感到无比无比的幸福，这时，会场上一片沸腾，数十万人怀着最最强烈的无产阶级感情，一遍又一遍地高呼:“毛主席万岁!万岁!万万岁!”“敬祝毛主席万寿无疆!万寿无疆!万寿无疆!”"},{"type":"paragraph","text":"唐文兰、王德法还汇报了在京参观、学习的情况。他们说:这次，伟大领袖毛主席和他的亲密战友林副主席亲自批准邀请全国万名工人代表赴京观礼，给我们提供了向首都及全国各地工人阶级学习的良好机会。"},{"type":"paragraph","text":"我们在首都参观了北京针织总厂、北京新华印刷厂、石景山发电厂、清华大学等单位，和北京工代会的同志座谈交流了经验，还和天津、辽宁的工人代表交流了经验。我们深深感到，首都和各兄弟省、市的工人阶级，对我们伟大领袖毛主席最忠，对毛主席的伟大战略部署跟得最紧，他们在斗、批、改中创造了不少宝贵的经验。我们一定要把全国工人阶级的优秀品质和先进经验带到上海，在上海生根、开花、结果。"},{"type":"paragraph","text":"唐文兰和王德法最后说:为了不辜负伟大领袖毛主席对我们工人阶级的期望和鼓舞，我们一定要遵循毛主席关于“工人阶级必须领导一切”、“认真搞好斗、批、改”的伟大教导，紧跟毛主席的每一个战略部署，在斗、批、改高潮中，狠抓革命，猛促生产，为完成和超额完成今年的国家计划，为夺取无产阶级文化大革命的全面胜利，作出新的贡献!"},{"type":"paragraph","text":"欢迎大会结束以后，举行了群众游行。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2ed162f492"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
