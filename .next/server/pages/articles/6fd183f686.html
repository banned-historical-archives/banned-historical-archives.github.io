script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"推行一系列修正主义政策造成恶果  苏联农业每况愈下粮食连年减产  勃列日涅夫重演赫鲁晓夫的故伎，为了推卸罪责，解除部长会议第一副主席和农业部长的职务","authors":[],"dates":[{"year":1973,"month":2,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"推行一系列修正主义政策造成恶果"},{"type":"paragraph","text":"苏联农业每况愈下粮食连年减产"},{"type":"paragraph","text":"勃列日涅夫重演赫鲁晓夫的故伎，为了推卸罪责，解除部长会议"},{"type":"paragraph","text":"第一副主席和农业部长的职务"},{"type":"paragraph","text":"新华社一九七三年二月四日讯　新华社记者报道：苏联最高苏维埃主席团二月三日宣布，解除了主管农业的苏联部长会议第一副主席德·斯·波利扬斯基和苏联农业部长弗·弗·马茨凯维奇的职务。波利扬斯基被贬职为农业部长。"},{"type":"paragraph","text":"鉴于赫鲁晓夫把农业弄得一团糟，勃列日涅夫八年前上台伊始就提出要把发展农业当做“全党全民最重要的任务”，要“竭尽一切努力”把农业“引向不断高涨的道路”，并把农业列为他亲自过问的一个重要方面。勃列日涅夫亲自主持召开了专门讨论农业的苏共中央一九六五年三月全会和一九七○年七月全会。一九七一年苏共“二十四大”曾吹嘘说在这些会上“制定进一步发展农业的广泛综合计划是（苏共）中央委员会及其政治局和勃列日涅夫同志个人建立的不可估量的功勋”。"},{"type":"paragraph","text":"但是，勃列日涅夫抓农业也并不比赫鲁晓夫高明。勃列日涅夫在第八个五年计划（一九六五——一九七○年）结束时不得不承认，“谷物生产的状况仍然不能使我们满意”，“棉花生产增长缓慢”，“蔬菜和水果生产得很少”，“远远没有满足居民对畜产品、特别是对肉类的需求”。另一方面，他又吹嘘将在第九个五年计划内“使农业生产得到很大增长”。而第九个五年计划头两年执行的结果，农业却不是什么“很大增长”，而是不断的低落。一九七一年苏联农业产值计划没有完成，一九七二年农业产值比一九七一年又有下降。据苏联官方公布的显然缩小了的数字，一九七一年粮食产量比一九七○年减少了五百六十万吨。一九七二年又比一九七一年减少了一千三百多万吨。"},{"type":"paragraph","text":"一九七二年苏联遇到较大的自然灾害，这对农业生产是有影响的。但是，苏联农业遭到失败的根本原因是由于苏修领导集团推行一系列修正主义政策的结果。"},{"type":"paragraph","text":"勃列日涅夫集团为了推卸罪责，倒真是“竭尽一切努力”。他们一会儿想把一切都推到气候上，强调什么“如此复杂的天气条件在整个一世纪中还从来没有看见过”；一会儿又说，“不能把一切都归咎于天气条件”，存在着“组织上的缺点”，是“一些农庄、农场犯了严重错误”，又把责任推给了基层干部。看来，这一招也并不灵验，于是勃列日涅夫集团只好推出了部长会议第一副主席波利扬斯基和农业部长马茨凯维奇作替罪羊。"},{"type":"paragraph","text":"苏联人民对马茨凯维奇其人想来并不陌生。赫鲁晓夫当年为了推卸农业失败的罪责，在他担任苏共中央第一书记的期间曾经前前后后撤换了六名农业部长，这位马茨凯维奇便是其中之一。赫鲁晓夫倒台后，马茨凯维奇复了职。现在，这位马茨凯维奇再次遭到了他在赫鲁晓夫时期曾遭遇过的同样命运。"},{"type":"paragraph","text":"赫鲁晓夫这一手法当年并没有能骗过苏联人民，勃列日涅夫重演赫鲁晓夫故伎，看来也不会收到什么好效果。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6fd183f686"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
