<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"朝鲜《劳动者新闻》发表编辑部文章指出　必须同修正主义进行更坚决斗争　如不同修正主义斗争，工人阶级就不能引导革命走向胜利","authors":[],"dates":[{"year":1963,"month":11,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"朝鲜《劳动者新闻》发表编辑部文章指出"},{"type":"paragraph","text":"必须同修正主义进行更坚决斗争"},{"type":"paragraph","text":"如不同修正主义斗争，工人阶级就不能引导革命走向胜利"},{"type":"paragraph","text":"新华社平壤三十日电　朝鲜职业总同盟机关报《劳动者新闻》十月十二日发表了一篇题为《为反对修正主义而更加坚决斗争》的编辑部文章。"},{"type":"paragraph","text":"文章强调指出，修正主义是修正马克思列宁主义革命原则的、反动的资产阶级思想。换句话说，它是披着马克思列宁主义外衣，钻进工人运动和工人阶级队伍内部修正马克思列宁主义最重要的原则以适应帝国主义需要的右倾机会主义和投降主义思潮。"},{"type":"paragraph","text":"文章举例说，马克思列宁主义教导说，帝国主义不剥削、掠夺、侵略本国和他国人民就无法生存下去；但是修正主义者叫嚷说，如今时代已经变了，帝国主义本性已经改变，不是侵略性的了。"},{"type":"paragraph","text":"马克思列宁主义还教导说，要想在全世界建设社会主义和共产主义社会，资本主义国家工人阶级必须同资本家斗争，殖民地附属国人民必须同帝国主义斗争，社会主义国家必须积极支持他们的斗争；但是，修正主义者否认资本主义国家工人阶级的革命斗争，主张殖民地附属国人民应该同帝国主义保持良好关系，社会主义阵营应该同帝国主义阵营保持良好关系。"},{"type":"paragraph","text":"马克思列宁主义教导说，今天，为了防止战争，必须同战争的根源——帝国主义进行斗争；而修正主义者说，为了和平，不能同帝国主义者进行斗争，只能够进行经济竞赛，向帝国主义者乞求和平。"},{"type":"paragraph","text":"不仅如此，它们反对社会主义革命和无产阶级专政，反对马克思列宁主义的党的领导和民主集中制。"},{"type":"paragraph","text":"文章说，所谓修正主义，一句话，就是不要阶级斗争的思想，不要同帝国主义斗争的思想，不要革命的思想。"},{"type":"paragraph","text":"金日成同志说过，修正主义者害怕革命、不愿意革命，为符合资本家需要而修正马克思列宁主义，企图篡改这一理论的基础——阶级斗争学说。"},{"type":"paragraph","text":"文章强调说，修正主义者同其他机会主义者有所区别的地方就是：它不是正面地反对马克思列宁主义，而是表面上装成忠实于马克思列宁主义，实际上反对马克思列宁主义的核心。因此，修正主义比其他机会主义狡猾和危险好几倍。列宁把修正主义者称为钻进工人阶级革命队伍里的帝国主义走狗。如果不同这些人进行彻底的斗争，工人阶级就不能从帝国主义束缚下获得解放，就不能维护和平，就不能引导革命走向胜利。"},{"type":"paragraph","text":"文章在叙述修正主义产生的历史根源和阶级根源时指出，无论是现代修正主义或是老修正主义，它们的本质是一样的。现代修正主义者完全重复着老修正主义者的言论。金日成同志说过，老修正主义或是现代修正主义，其本质是一样的，其目的也是一致的。那就是在时代已经变了的借口下拒绝马克思列宁主义基本原则，要求抛弃革命斗争。"},{"type":"paragraph","text":"文章在谈到修正主义的危害性时说，这首先是因为修正主义披着马克思列宁主义的外衣，所以很容易进入我们队伍内部毒害我们革命。由于修正主义者借着马克思、恩格斯、列宁的名字，用革命词句来掩盖自己原形，因而不提高警惕就会被他们蒙蔽过去。"},{"type":"paragraph","text":"文章又说，现代修正主义的危险性还在于它同南斯拉夫铁托集团一样，是在执政党内发生的，它直接反映在对内对外政策上，应用到实践中，还要强使其他国家接受它的修正主义见解和政策。"},{"type":"paragraph","text":"文章强调指出，因此，现代修正主义比老修正主义更加危险，它的毒害性更大。因此，必须为反对马克思列宁主义的叛徒、帝国主义走狗——修正主义而进行更加坚决的斗争。"},{"type":"paragraph","text":"文章说，为了反对修正主义，我们面前的任务是："},{"type":"paragraph","text":"第一、更加加强马克思列宁主义的学习。只有用马克思列宁主义武装起来，才能够知道什么是修正主义，它的毒害性在哪里，从而能和修正主义进行坚决的斗争。"},{"type":"paragraph","text":"第二、必须更深入地学习我们党的政策。只有当我们用党的政策彻底武装起来的时候，才能够辨别谁的话对，谁的话散发着修正主义的气息，才能够进行反对修正主义的坚决斗争。"},{"type":"paragraph","text":"第三、必须彻底反对认为别国的什么都好、盲目地接受不符合本国情况的别国东西的高大主义和教条主义，用主体思想——朝鲜革命的主人是我们党和我们人民，在这块土地上建设社会主义和共产主义的主人也是我们党和我们人民，用自力更生的革命精神，把自己坚强地武装起来。"},{"type":"paragraph","text":"第四、必须反对洋气，俭朴地生活，反对腐化和安逸，树立革命的生活和工作作风。"},{"type":"paragraph","text":"文章最后说，我们必须像上述那样为反对修正主义而坚决斗争，使它在我们生活中找不到任何一个空隙可以钻进去。反对修正主义的斗争是捍卫马克思列宁主义的原则、把我们革命事业进行到底的斗争。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3838683022"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
