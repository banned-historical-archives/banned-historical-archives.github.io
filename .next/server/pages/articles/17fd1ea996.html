script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"从斗争中帮助革命领导干部回到毛主席的革命路线上来黄浦区机关革命派正确贯彻干部政策","authors":[],"dates":[{"year":1967,"month":3,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　本市黄浦区机关革命派，认真贯彻执行毛主席的革命的“三结合”联合夺权的指示，从斗争中帮助革命的领导干部回到以毛主席为代表的革命路线一边来，坚决跟无产阶级革命派站在一起，积极投入革命的“三结合”联合夺权斗争。"},{"type":"paragraph","text":"黄浦区机关革命派为了使广大革命同志正确对待干部，团结革命领导干部夺好权、掌好权、用好权，反复学习了毛主席的有关指示，以及《红旗》杂志《论无产阶级革命派的夺权斗争》、《必须正确地对待干部》、《论革命的“三结合”》等有关社论，统一了这方面的认识。"},{"type":"paragraph","text":"过去，革命派同志认为这些领导干部犯有或大或小的错误，和他们结合，“不理想”，“不放心”。通过学习，革命派同志看到绝大多数的干部是好的，是愿意跟着毛主席闹一辈子革命的。革命派同志警惕到党内一小撮走资本主义道路的当权派勾结了社会上的地、富、反、坏、右分子所刮起的“怀疑一切，反对一切，打倒一切”的反动思潮。许多同志对毛主席的有关指示深受感动，表示坚决听毛主席的话，严格区分两类不同性质的矛盾，耐心地帮助犯错误的干部。怎样搞革命的“三结合”?由革命派少数人关起门来搞，还是放手发动群众?革命派同志通过学习，进一步明确最了解情况的还是各部门的广大群众，要搞好革命的“三结合”，一定要走群众路线，要依靠群众。他们发动群众对直属科、部、局长以上干部认真进行分析、讨论，做到心中更有“底”，改变了过去认为领导干部中“结合对象很少”的看法。同时，用阶级分析方法，区别对待各类干部。对党内一小撮走资本主义道路当权派，一定要把他们打倒。对革命的领导干部，就坚决和他们一起实行“三结合”，联合夺权。对犯有各种错误的干部，按照毛主席“惩前毖后、治病救人”和“团结——批评——团结”的方针来对待他们。"},{"type":"paragraph","text":"黄浦区机关革命派针对各级领导干部的具体情况，进行了一系列细致的政治思想工作，启发他们批判自己的错误思想，揭发问题，给许多干部有“亮相”的机会。革命派同志认为，只有通过斗争实践，才能让革命的领导干部真正回到以毛主席为代表的革命路线上来。黄浦区机关革命派最近连续举行了多次会议，召集部、局长以上干部面对面揭发批判党内一小撮走资本主义道路当权派的罪行。会上发言很热烈，有些人敢于触灵魂，大胆揭发与自己有牵连的问题；有些人虽然揭发问题不多，但立场观点，思想感情确实转过来了。通过这些会议，使革命的领导干部深刻地认识到，要起来革命，不但要造党内一小撮走资本主义道路当权派的反，也要造自己头脑里“私”字的反，敢于狠触灵魂，和错误彻底划清界线，坚决站在革命派这一边。"},{"type":"paragraph","text":"目前，黄浦区机关革命派正在进一步发动群众，认真贯彻革命的“三结合”联合夺权的方针，积极为筹备建立黄浦区的临时最高权力机构——区革命委员会创造有利条件."}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"夺权","type":"主题/事件"},{"name":"革命委员会","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"17fd1ea996"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
