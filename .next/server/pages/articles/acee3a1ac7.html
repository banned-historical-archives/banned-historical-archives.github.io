" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji33","name":"毛泽东全集第33卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji33.pdf"],"article":{"title":"关于悼念斯大林逝世的命令和电","alias":"","parts":[{"type":"paragraph","text":"关于悼念斯大林逝世的命令和信电"},{"type":"paragraph","text":"（1953年3月6日）"},{"type":"paragraph","text":"我们伟大的盟邦苏维埃社会主义共和国联盟部长会议主席、苏联共产党中央委员会书记约瑟夫·维萨里奥诺维奇·斯大林大元师不幸于一九五三年三月五日晚九时五十分（莫斯科时间）逝世。为了表达中国人民对于伟大的斯大林同志一全世界劳动人民的伟大领袖、中国人民的最敬爱的朋友和导师的无限沉痛的哀悼，为了表达中国人民对于伟大盟邦领袖的崇敬，兹规定：一、自一九五三年三月七日起至三月九日止全国下半旗志袁；二、在志袁期间，全国各工矿、企业、部队、机关、学校及人民团体一律停止宴会、娱乐。"},{"type":"paragraph","text":"主席毛泽东"},{"type":"paragraph","text":"一九五三年三月六日"},{"type":"paragraph","text":"二苏维埃社会主义共和国联盟最高苏维埃主席团主席什维尔尼克同志：10"},{"type":"paragraph","text":"关于悼念斯大林逝世的命令和信电"},{"type":"paragraph","text":"中国人民、中国政府和我自己，怀着无限悲痛的心情，获悉了中国人民最亲密的朋友和伟大的导师斯大林同志逝世的消息。这不仅是苏联人民而且也是中国人民和整个和平民主阵营以及全世界爱好和平的人民的无可估量的损失。我现在谨代表中国人民、中国政府，并以我个人的名义，向您及苏联人民和苏联政府表示最沉痛的哀悼。"},{"type":"paragraph","text":"中国人民革命的胜利和斯大林同志三十多年来不断的关怀、指导和支持，是完全分不开的。在中国人民革命胜利后，斯大林同志和在他领导下的伟大的苏联人民和苏联政府，对中国人民的建设事业，又给予了慷概无私的援助。斯大林同志对于中国人民这样伟大的深厚的友谊，中国人民永远感念不忘。斯大林同志的不朽光辉，将永远照耀着中国人民前进的道路。"},{"type":"paragraph","text":"主席同志，光荣的列宁、斯大林的党，伟大的苏联人民和苏联政府，定将得到中国共产党、中国人民和中国政府的兄弟般的始终如一的信任和支持。中国人民一定会以最大的坚定性，和伟大的苏联人民永远紧密地团结一致，巩固并加强以苏联为首的世界和平民主阵营，提高警惕，加倍努力，打击战争挑拨者，为苏中两国人民的永久利益和世界和平与安全而奋斗到底。我相信，全世界一切劳动人民和爱好和平的进步人类，都将和我们一道，遵循斯大林同志指示的方向，把保卫世界和平的神圣事业担当起来。"},{"type":"paragraph","text":"毛泽东一九五三年三月六日于北京"}],"authors":["毛泽东"],"dates":[{"year":1953,"month":3,"day":6}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":41,"page_end":42},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"acee3a1ac7"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
