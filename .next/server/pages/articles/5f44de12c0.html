script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"掌握武器 批判现代修正主义武汉哲学会座谈两类矛盾学说的重大意义","authors":[],"dates":[{"year":1958,"month":5,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【据新华社讯】　武汉哲学学会13日举行座谈会，纪念毛主席“关于正确处理人民内部矛盾的问题”发表一周年。"},{"type":"paragraph","text":"中共湖北省委宣传部部长曾淳在发言中说，毛主席的这篇文章，运用马克思列宁主义的立场、观点和方法，对现代社会主义革命、社会主义建设的重大关键性问题作了鲜明和生动的论述，大大丰富了马克思列宁主义理论的宝库。他说，这篇文章的科学性、真理性和巨大的现实意义，已经被一年来的实践所证实，它的精神已经贯彻到我国广大群众中去。我国人民经过反右派斗争、整风运动、不仅认清了两类矛盾的性质，而且把这篇文章的精神作为解决人民内部矛盾、团结六亿人民建设社会主义的钥匙，从而在我国出现了政治思想上大跃进、生产大高潮。"},{"type":"paragraph","text":"曾淳说，现代修正主义比教条主义更加危险，它还幻想共产主义危机企图挽救资本主义的死亡命运。现代修正主义用偷天换日的方法，披着马克思主义的外衣，进行反马克思主义的活动。南斯拉夫共产主义者联盟的纲领是彻头彻尾的、系统的现代修正主义的政纲。我们重温毛主席的这篇著作，会大大帮助我们提高政治嗅觉，辨清大是大非，取得批判现代修正主义的胜利。"},{"type":"paragraph","text":"武汉哲学学会副主任委员李凡夫指出，毛主席的文章给我们中国革命指出了前进方向，由于它的高度的马克思主义的原则性、科学性，因而给了我们反对修正主义和克服教条主义以最锐利的武器。我们要更好地学习和运用这篇文章的精神实质，解决实际工作中的问题。目前，群众在实践中的创造是丰富多采的，哲学社会科学工作者应当以这篇文章作为武器，研究和总结实际工作，从而更好地为工农业生产服务。"},{"type":"paragraph","text":"这次会议由李凡夫主持。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"人民内部矛盾","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5f44de12c0"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
