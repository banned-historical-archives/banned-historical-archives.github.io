script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"华大全体师生　热烈纪念校庆　电毛主席朱总司令致敬","authors":["金凤"],"dates":[{"year":1949,"month":9,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"华大全体师生"},{"type":"paragraph","text":"热烈纪念校庆"},{"type":"paragraph","text":"电毛主席朱总司令致敬"},{"type":"paragraph","text":"【本报讯】华北大学九日晚在平举行校庆纪念大会，全校干部学员三千余人欢聚一堂，在平工作的历届毕业校友中有一百余人抽空赶来参加。吴玉章校长及范文澜、成仿吾副校长，聂教务长及各部主任坐在中共党旗及华大校旗下，主持典礼的进行。"},{"type":"paragraph","text":"三千人齐唱华大校歌后，各部负责同志相继讲话。主席聂真教务长说明纪念校庆，要很好地总结十几年来的教学经验，作为今后工作的指导，以培养更多的革命建国人材。之后，接着由吴玉章校长讲话。他分析了中国革命的形势和性质以后，特别指出今后建国任务的艰巨，他说华大在过去十二年来，在毛主席、中共中央、华北局的领导下和全体工作同志学员的努力下，已培养了近十万的革命干部，今后还要更加努力，继续培养大量干部。他勉励全体师生员工要发扬过去光荣传统，努力工作和学习，准备担负我们学校的新的伟大任务。范文澜副校长以许多生动的历史事实说明中国革命的必然要胜利和反革命的必然要失败，他希望少数对美国怀着恐惧或幻想的知识分子赶快丢下幻想遵照毛主席指示，实行一边倒；全心全意为人民服务。成仿吾副校长也说明了新形势下华大的新任务是在较长的时间内培养当前最需要的新民主主义建设的干部，把革命工作提高一步。四部副主任艾思奇同志说明华大所创造的教育经验、教学方法已成为今日全国各地改造旧知识分子的普遍应用的方针和方法。二部主任何干之和工会副主任何戊双同志也相继讲了话。学生会代表齐敬之代表新毕业的同学们表示一定服从革命的需要和组织的分配，革命需要到那里就到那里去，成为人民的好的勤务员。"},{"type":"paragraph","text":"最后全场一致通过了向毛主席及朱总司令致敬和慰问前陕公副校长罗迈同志的电文。"},{"type":"paragraph","text":"（金凤）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"范文澜","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"043058d879"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
