script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"西欧和美国资产阶级的舆论对波恩条约的后果恐惧不安","authors":[],"dates":[{"year":1952,"month":7,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　据新华社北京九日电:在美英法三国与西德傀儡总理阿登纳签订“一般性条约”以后，西欧和美国资产阶级舆论越来越频繁地发出惶惑不安的论调，担心这个条约会给他们造成十分不利的后果。"},{"type":"paragraph","text":"“一般性条约”在西欧国家一部分资产阶级人士中引起了极大的震惊。这种情绪明显地反映在他们的报纸上。西欧国家资产阶级报纸看到“一般性条约”遭到德国和西欧绝大多数人民的激烈反对，因而十分怀疑这个条约的稳固性。英国“曼彻斯特卫报”说:“这个条约是和半个德国缔结的，而不是和整个德国缔结的。这不可避免地使它成为靠不住的。”西欧资产阶级不仅害怕西欧人民群众日益壮大的抗议运动，而且还害怕复活后的西德军国主义对他们利益的威胁。“曼彻斯特卫报”说:许多法国人对“一般性条约”感到“不快”，因为“他们害怕德国军队将最后成为欧洲军中最强大的部分，而统治欧洲军”。英国“雷诺新闻”说:西方国家要再次把特罗依的木马)指西德军国主义9引到西欧的中心，这真是一个疯狂的计划。"},{"type":"paragraph","text":"美国国内也有许多资产阶级人士害怕美国政府在德国问题上的赌博政策要造成不幸后果。他们忧虑地看到，“一般性条约”实际上加深了美国在西欧的危机。“华盛顿时代先驱报”甚至认为:假如欧洲各国议会拒绝批准这个条约的话，美国倒还能幸免由于艾奇逊的轻率而招致的祸患。著名的美国反动政论家李普曼也写道:西德现有的关系是暂时而且不长久的，“我们可以合理地确信，政治前途属于那些为结束德国分裂状态而努力的人们。”这也就是说，美国坚持分裂德国政策的前途是对美国不利的。美国银行家威尔伯曾打电报给参院外交委员会的委员们，要求在批准“一般性条约”而使德国永远分裂以前，要彻底研究关于解决德国问题的谈判的机会。美国共和党全国委员会国防问题顾问、芝加哥商人克来恩准将自西欧返美后也谴责“一般性条约”，认为这是“一个严重的错误”。在美国反对“一般性条约”的情绪是这样的普遍，参议院在七月一日匆匆批准这个条约的前后，美国几千个工会、教会和公众团体竟没有一个公开出来赞成批准这个战争条约。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"55b8382f6a"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
