script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"广西部分地区执行“三定”政策发生严重偏差","authors":[],"dates":[{"year":1955,"month":9,"day":3}],"is_range_date":false,"parts":[{"text":"广西部分地区执行“三定”政策发生严重偏差","type":"title"},{"text":"【广西分社三日讯】广西省部分地区执行“三定”政策发生严重偏差。","type":"paragraph"},{"text":"容县专区郁林县县委副书记张强认为：对增产多的富裕户要不定实产量，对困难户定实产量，对二流子、懒汉、地主、富农的定产要稍高于实际产量，他认为这样作是合适有益的。容县、桂平、岭溪等八个县是先一般宣传“三定”，接着搞一段征购，然后再“三定”到户。陆川县具体提出先完成粮食征购任务百分之五十后再搞“三定”。北流县不宣传“三定”政策，先完成征购任务，再“三定”到户。这个县的粮食征购工作已进行一个多月，任务只完成百分之六十。最近虽被迫转入宣传“三定”政策，但部分地区工作陷入僵局，干部信心不足，发生强迫命令，随便打人、骂人、扣压人。六靖、石窝两个区不经请示扣压十一个农民，打了五个人，有八个人被罚跪，还错误地把农民的历史进行排队，来搞“思想发动”。全县已逼死的两个人，其中新丰区塘屏乡第一行政组中农梁树庆是这样被逼死的：行政组开会时，由区银行营业所副主任辛清进主持，他宣布：“政策是铁的，任务不能改，少一两粮也不行。”又说：“政策是老虎尾，谁踏着就挨咬。”梁树庆未完成统购数字，被辛清进强迫坦白两次，说要劳动改造，还追逼他再到法院坦白。结果，辛树庆便上山服毒自杀。","type":"paragraph"},{"text":"桂林专区临桂县宣传“三定”政策不具体，不深入，现在群众还不知道“三定”怎么定法。有些乡干部只要一检讨粮食工作中的缺点，农民就说：“你们政府一九五三年有问题，一九五四年检讨，一九五四年有问题，一九五五年检讨，像家公对媳妇一样。”桂林专区最近落雨很大，农村干部都只顾搞“三定”摸底，不问生产。有些县的早、中稻很多都倒伏在田里，发芽很严重。（郭纯青编）","type":"paragraph"}],"comments":[],"origin":"新华社《内部参考》1955年9月10日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"320cc39e88"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
