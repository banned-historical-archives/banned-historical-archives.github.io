script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"在毛主席的继续革命思想指引下　在“九大”精神鼓舞下  鹧鸪大队自力更生艰苦奋斗夺得生产新胜利","authors":[],"dates":[{"year":1970,"month":4,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"在毛主席的继续革命思想指引下　在“九大”精神鼓舞下"},{"type":"paragraph","text":"鹧鸪大队自力更生艰苦奋斗夺得生产新胜利"},{"type":"paragraph","text":"本报讯　江西省宁都县鹧鸪大队党支部和贫下中农，在伟大领袖毛主席关于无产阶级专政下继续革命的光辉思想照耀下，在党的“九大”精神的鼓舞下，以大寨为榜样，发扬“自力更生”、“艰苦奋斗”的革命精神，建设社会主义新农村，发展农业生产，夺得了新的胜利。一年来，这个大队用自己的力量修建了一座能灌溉四千多亩土地的水库，挖通了穿过十七个山洞、总长六十五华里的盘山渠道，筑起了一条四华里长的河堤，保证了全部土地旱涝保收，并利用水力资源建了一座小型发电站。全大队粮食平均亩产由一九六八年的八百三十七斤提高到一千零七十五斤。"},{"type":"paragraph","text":"鹧鸪大队，在解放前是水土流失严重的穷山沟，三十九座光山寸草不生，两千多亩土地大部分是沙子田。解放后，鹧鸪大队的贫下中农在伟大领袖毛主席的无产阶级革命路线指引下，不断地同天斗，同地斗，同阶级敌人斗，社会主义农业不断发展。去年，在党的“九大”浩荡东风的鼓舞下，大队党支部决定在鹧鸪河上游拦河筑坝建水库，劈山引水挖渠道，把全部土地建成旱涝保收、稳产高产田。"},{"type":"paragraph","text":"可是，一小撮不甘心失败的阶级敌人总要进行破坏。有右倾保守思想的人也出来阻拦，说什么：“粮食产量已经跨了《纲要》，何必建这么大的水库，吃这么大的苦！”贫下中农豪情满怀地回答：“我们大队虽然跨了《纲要》，但是建设社会主义的任务还很艰巨。”在毛主席的继续革命的光辉思想指引下，鹧鸪大队的党支部和贫下中农，把水库工地当战场，始终以大寨为榜样，继续发扬“自力更生”、“艰苦奋斗”的革命精神。凿石需要大批钢钎，他们就自己办起了打铁厂，一根一根打出来；缺少炸药，他们自己办熬硝厂，制造土炸药。他们就这样靠毛泽东思想，乘“九大”的东风，用三个月时间胜利地建成了一座蓄水二百一十万方的水库；用两个月时间开挖了两条全长六十五华里的盘山渠道。在这同时，这个大队还认真贯彻执行毛主席提出的农业“八字宪法”，实行科学种田，每个生产队都培养了三到五名思想红技术过硬的农业技术员，普遍推广了优良品种，采用先进耕作技术，发挥了土地的潜力，夺得了粮食高产。"},{"type":"paragraph","text":"为了进一步落实“九大”提出的各项战斗任务，最近，鹧鸪大队以两个阶级、两条道路、两条路线斗争为纲，广泛开展了查思想、找差距、比贡献的活动，进一步树立了为革命种田的思想，重新修订生产计划，以“只争朝夕”的革命精神，迅速掀起了夺取七十年代第一年农业新丰收的热潮。现在，这个大队正遵照毛主席关于“不失时机地掌握生产环节，取得比去年更大的成绩”的教导，全力以赴投入春耕生产。（附图片）"},{"type":"paragraph","text":"上海南汇县泥城公社人民大队发扬“自力更生”、“艰苦奋斗”精神，连续夺得粮、棉双高产。这是他们在认真总结经验，寻找差距。"},{"type":"paragraph","text":"新华社记者摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"两条路线斗争","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4772cdb853"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
