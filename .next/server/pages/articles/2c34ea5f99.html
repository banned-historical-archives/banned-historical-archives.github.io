<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoistlegacy.de-5187","name":"《关于在无产阶级文化大革命中加强公安工作的若干规定》的若干政策问题","author":"上海东方红中学东方红战斗队","internal":false,"official":false,"type":"unknown","files":[],"article":{"title":"《关于在无产阶级文化大革命中加强公安工作的若干规定》的若干政策问题","dates":[{"year":1967,"month":3,"day":18}],"is_range_date":false,"authors":["上海东方红中学东方红战斗队","徐金发"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"云南批判资产阶级反动路线联络总站, 云南专州县市革命造反派赴昆联络站, 无产阶级文化大革命批资平反资料选辑, 81-83","tags":[{"name":"戴帽","type":"主题/事件"},{"name":"敌我矛盾","type":"主题/事件"},{"name":"反革命","type":"主题/事件"},{"name":"公安","type":"主题/事件"},{"name":"接待工作","type":"主题/事件"},{"name":"专政","type":"主题/事件"}],"parts":[{"type":"title","text":"《关于在无产阶级文化大革命中加强公安工作的若干规定》的若干政策问题"},{"type":"paragraph","text":"（上海东方红中学东方红战斗队访问上海市革命委员会谈话纪要）"},{"type":"paragraph","text":"120.问：《规定》第四条中“敌僞的军（连长以上）、政（保长以上）、宪（宪兵）、特（特务）分子”这一句在市委员会、市公革会、市文保会以及宝山县公安局都有两种不同的说法，即：一说“分子”是经政法部门定了性质，戴了帽子的，即历史反革命；二说“分子”是指人，只要是担任过《规定》中所说的职务的都算，不一定指戴帽子的。以上那一种是正确的？"},{"type":"paragraph","text":"答：以鎭反条例说：军政宪警特一句中所说的职务都属于反革命，但担任过反革命职务，不等于就是反革命分子。要不要戴帽子？要不要作处理？要根据具体情况。如果解放前没有什么罪恶活动，解放后是一贯老老实实工作，可以不戴帽子，不作处理；如果有罪恶或有活动（指破坏和犯法的活动），就要戴帽子，作出不同处理。所以，不是任过上述职务的就是反革命分子。总之，没有戴帽子的就不算分子，就不属《公安六条》第四条。"},{"type":"paragraph","text":"121.问：这样说来第四条，所指的“分子”都是敌人，专政对象了？"},{"type":"paragraph","text":"答：对，完全如此，这是不能混淆的。"},{"type":"paragraph","text":"122.问：这样说有无根据呢？"},{"type":"paragraph","text":"答：鎭反条例早已规定过。"},{"type":"paragraph","text":"123.问：军（连长以上）也有两种说法，卽：一说“连长以上”指带兵官，握有兵权的，如连长、营长、团长……等；二说职位和军衔在连长以上都算，包括军需、军医等。政（保长以上）也有两种说法，卽：一说“保长以上”指专政机关的反动官员，如保长、鄕长、鎭长、县长等；二说凡是在保长以上的国民党政府机关人员都算。以上那一种说法对？"},{"type":"paragraph","text":"答：都是第一种锐法对。军需、军医等即使军衔比连长大，但和直接带兵的有区别。又如僞市政府卫生科长，职务比保长大，但政治实权保长此卫生科长大，做的坏事更多。"},{"type":"paragraph","text":"124.问：所以\"保长”以上是指专政机关的“官员”，对吗？"},{"type":"paragraph","text":"答：当然是指专政机关。"},{"type":"paragraph","text":"125.行政机关如教育局、税务局中的工作人员，全在保长以上，是否列入第四条？"},{"type":"paragraph","text":"答：不算。这些全是事业单位。如果这些部门中的人员有反革命活动，特务身份，就另作别论。第四条中所指的基本全是专政杌关。"},{"type":"paragraph","text":"126.间：有历史问题已交待，解放后没有受过任何处分，没有戴过帽子，有选举权，加入了工会，十七年来全是国家工作人员，属不属第四条范围？是不是专政对象？阶级异己分子？"},{"type":"paragraph","text":"答：没有戴帽子的全不是。反革命分子一定要经过法律机关定案，否则一律不算，也不是专政对象，也不是阶级异己分子。"},{"type":"paragraph","text":"127.问：担任过保长以上职务的是否就是反革命？"},{"type":"paragraph","text":"答：有罪恶就是反革命。如果没有罪行，交待老实，有立功表现，或只是挂名，能认真接受改造，就不算反革命。毛主席教导我们说：“具体情况要具体分析。”所以算不算反革命，戴不戴帽子，不是从职务看，而是要经过司法机关判决。这个界限很要紧，一定要分清。"},{"type":"paragraph","text":"182.问：有人说，凡有历史问题的人，都是敌人，就是专政对象，对吗？"},{"type":"paragraph","text":"答：毛主席说：“谁是我们的敌人？谁是我们的朋友？这个问题是革命的首要问题。”又说：“要团结百分之九十五以上的人。”党的政策是一贯的，界限一定要分清，是敌人一定不能放过，是人民不能当敌人看，否则就是混淆两类矛盾。政策不能有两种不同的解释，具体的人要具体分析。有历史问题，不一定是“敌人”、\"专政对象”、“反革命”，要正式由司法机关判定。是反革命就是反革命，不是反革命就不是反革命。这个问题很重要，絶对不能混淆，否则，影响团结95％以上。如果把有历史问题的人都看成反革命，那么有的中学的教职员，大约有60%左右要成爲反革命啦。这是不对的。"},{"type":"paragraph","text":"（访问时问：1967年3月18日。接待员：徐金发同志。谈话记录整理后，爲了愼重负责，访问者又于3月13日再度求见徐同志，当埸经他任细审阅，完全同意这份记录。"}],"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2c34ea5f99"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
