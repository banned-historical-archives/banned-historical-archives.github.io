script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"克立总理等离京前往上海访问","authors":[],"dates":[{"year":1975,"month":7,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"克立总理等离京前往上海访问"},{"type":"paragraph","text":"邓小平、陈锡联、吴德等和首都群众数千人到机场热烈欢送，华国锋等陪同泰国贵宾前往"},{"type":"paragraph","text":"新华社一九七五年七月三日讯　泰国总理蒙拉差翁·克立·巴莫等贵宾，由国务院副总理华国锋、外交部副部长韩念龙陪同，今天上午乘专机离开北京前往上海访问。"},{"type":"paragraph","text":"国务院副总理邓小平、陈锡联，人大常委会副委员长吴德，外交部长乔冠华，外贸部长李强，人大常委会委员廖承志，中国人民解放军副总参谋长王尚荣，农林部副部长肖鹏，一机部副部长徐斌洲，商业部副部长张永励，中国国际贸易促进委员会主任王耀庭，到机场热烈欢送泰国贵宾。"},{"type":"paragraph","text":"克立·巴莫总理对我国的访问获得圆满成功，中泰两国建立了外交关系，两国人民之间的传统的亲密友好关系得到了进一步发展。今天，首都群众数千人高兴地聚集在机场上，热烈欢送泰国贵宾。在飘扬着中泰两国国旗的机场上举行了隆重的欢送仪式，乐队奏中泰两国国歌。克立总理由邓小平副总理陪同检阅了由中国人民解放军陆海空三军组成的仪仗队。当克立总理同欢送群众告别时，人们挥动花束和彩带，载歌载舞，表达中国人民对泰国人民的友好情谊，衷心祝愿中泰两国人民世世代代友好下去。"},{"type":"paragraph","text":"以巴春·拉达纳平为团长的泰国足球代表团和各国驻中国的外交使节也到机场送行。"},{"type":"paragraph","text":"陪同贵宾到上海访问的还有外交部礼宾司长朱传贤、亚洲司副司长程瑞声。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"吴德","type":"人物"},{"name":"华国锋","type":"人物"},{"name":"陈锡联","type":"人物"},{"name":"上海文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fe7de792fb"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
