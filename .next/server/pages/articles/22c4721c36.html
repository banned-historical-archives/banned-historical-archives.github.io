script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"法开始选举第二院人民党益趋右倾集中反共份子对抗法共　获胜后将推戴高乐出山","authors":[],"dates":[{"year":1946,"month":11,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【法国新闻社巴黎廿四日电】法国咨政院初选今日开始，全国将选出，候选人八万二千名，再由其中选出议员三百十五名。今日之选举将为共产党与人民共和党之角逐，共产党在月初之国民议会选举中得胜，此次企国再占优势，但人民共和党已合并各选区一切反共份子，与共党抗衡。人民党倘若获胜，或将推荐戴高乐将军出任共和国总统。"},{"type":"paragraph","text":"【联合社巴黎廿三日电】法国人民将于明日推出选举人八万四千名，下月八日在选举院中选出共和议会三百十五名议员中之二百名，共和议会系法国议会之第二院，共产党奥人民共和党在此重要选举中，又将不免发生冲突，因其对于新政府之领导权颇具决定性，两党所获民众票数，或将增强共产党之要求，以多列士任总挥，或使人民共和党加强阻止共产党要求之力量，均未可知。共产党在两周前国民议会选举中已获得大多数议席，其要求总理一席即以此为根据。共和议会与国民议会比较，绝少真正立法权，但于明午一月两院联合会议选举第四共和国总统时，颇具重要性，而总理人选即由总统提出。各党领袖多恐全国二千五百万登记选民，将有百分之三十放弃投票，如此则共产党之获胜殆可操左券。"},{"type":"paragraph","text":"【法国新闻社巴黎二十三日电】人民共和运动党指导委员会，最近举行会议时，已采取确定之立场，对于共产党出任内阁总理，表示异议，并谓未来新政府必须为一联合政府，或为一极广泛之联合政府，参加政府之各政党，均应团结与互相信任，以前之三党联合内阁，即缺乏此等团结与互相之精神。人民共和运动党指导委员会所揭橥之纲领，将包括全国之财政复兴，如财政部长许曼对于大量裁减公务人员所提出之计划，应付诸实施此项政策，匪特能缓和预算之不足，抑且对于劳工匮乏之工业，亦不无裨益。"},{"type":"paragraph","text":"【法国新闻社巴黎廿三日电】巴黎法庭今日将附逆新闻记者高斯都与勒伯特两人判处死刑，尚德判无期徒刑。各该记者曾发行附逆杂志“四海”周刊，并有其他附逆作品。"}],"comments":[],"origin":"法国新闻社,联合社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"22c4721c36"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
