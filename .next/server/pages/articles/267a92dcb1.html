script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji28","name":"毛泽东全集第28卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji28.pdf"],"article":{"title":"对陈毅关于上海打退四月危机的报告的批语和复电","alias":"","parts":[{"type":"paragraph","text":"对陈毅关于上海打退四月危机的报告的批语和复电"},{"type":"paragraph","text":"（1950年5月13日、14日）子恢，剑英，小平，德怀，一波，高岗，彭真，黄敬各同志："},{"type":"paragraph","text":"兹将陈毅同志五月十日来电转发给你们作参考。上海打退四月危机的经验及目前采取的各项政策?，是各地大城市党委值得研"},{"type":"paragraph","text":"[1]陈毅，当时任中共上海市委第一书记、上海市人民政府市长。"},{"type":"paragraph","text":"[2]子恢，即邓子恢，当时任中共中央中南局第三书记。剑英，即叶剑英，当时任中共中央华南分局第一书记。小平，即邓小平，当时任中共中央西南局第一书记。德怀，即彭德怀，当时任中共中央西北局第一书记。一波，即薄一波，当时任中共中央华北局第一书记。高岗，当时任中共中央东北局书记。彭真，当时任中共北京市委书记。黄敬，当时任中共天津市委书记、天津市人民政府市长。"},{"type":"paragraph","text":"[3]指陈毅1950年5月10日给毛泽东、中央、华东局的上海三、四两月综合报告。"},{"type":"paragraph","text":"[4]1950年3月和4月，上海社会秩序比较混乱，敌特活动表面化，税收、公债政策受到攻击，劳资关系紧张，人心浮动。这些情况以4月上旬为最紧张。上海市在解决上述问题稳定局势方面做了很多工作，他们的经验和采取的政策主要是：调整公私关系，实行公私兼顾政策；改善劳资关系，照顾双方利益；适当减少税收；救济失业工人；开展自我批评，纠正工作中的缺点，等等。毛泽东全集第二十八卷究的，请将此项报告转发各主要城市党委研究。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"五月十三日"},{"type":"paragraph","text":"二陈毅同志，并告漱石："},{"type":"paragraph","text":"（一）五月十日报告收到，甚好甚慰。所取方针是正确的。（二）六月征税减少一千亿的问题，待研究后由陈薄答复你。（三）我们决定六月中旬召开政协全国委员会通过土改法令并讨论调整工商业问题，你不是全国委员会委员，但有些问题须事先和你商量，请你于六月一日来中央一次，留两三天，即可回去。如果你觉得马上来为好，亦可以马上就来。如何，盼复。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"五月十四日[1]漱石，即饶漱石，当时任中共中央华东局第一书记。"},{"type":"paragraph","text":"[2]陈，指陈云，当时任政务院副总理兼财政经济委员会主任。薄，指薄一波，当时任政务院财政经济委员会副主任。"}],"authors":["毛泽东"],"dates":[{"year":1950,"month":5,"day":13},{"year":1950,"month":5,"day":14}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":389,"page_end":390},"tags":[{"name":"陈毅","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"薄一波","type":"人物"},{"name":"彭真","type":"人物"},{"name":"高岗","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"267a92dcb1"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
