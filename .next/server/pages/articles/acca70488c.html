script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"继承毛主席遗志　加强民兵建设","authors":[],"dates":[{"year":1976,"month":9,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"上海民兵指挥部"},{"type":"paragraph","text":"伟大领袖和导师毛主席逝世的噩耗传来，我们上海民兵的每一个战士，都抑制不住内心的万分悲痛。"},{"type":"paragraph","text":"毛主席虽然和我们永别了，但是毛主席的伟大形象将永远屹立在我们心中，毛主席为中国人民、为国际无产阶级和全世界革命人民立下的丰功伟绩，将与世长存。"},{"type":"paragraph","text":"毛主席是中国共产党、中国人民解放军、中华人民共和国的缔造者和英明领袖，也是我们民兵的缔造者。在无产阶级文化大革命中，我们上海工人阶级遵照毛主席的指示，重建了城市民兵队伍，建立了民兵指挥部，实行了民兵、消防、治保“三位一体”和厂区挂钩、平战结合，和驻上海的人民解放军各部队在一起开展各项军事训练，加强战备值班，担负起平时管理和改造城市、战时坚守和保卫城市的重任。在加强民兵建设的过程中，我们在毛主席革命路线的指引下，同刘少奇、林彪、邓小平这些党内资产阶级的头子斗，同修正主义路线对着干，使这支队伍在斗争中得到锻炼和提高。在每次阶级斗争和路线斗争的重要时刻，毛主席都为我们指引方向。我们上海民兵每前进一步，都凝聚着伟大领袖毛主席对我们的关怀啊!"},{"type":"paragraph","text":"为了把毛主席开创的无产阶级革命事业进行到底，我们上海民兵坚决响应党中央的号召，一定要化悲痛为力量，继承毛主席的遗志，坚决执行毛主席的革命路线，加强民兵建设，完成党交给的各项战斗任务。当前，我们要刻苦攻读马列著作和毛主席著作，学习毛主席关于反击右倾翻案风的一系列重要指示，深入批判邓小平反革命的修正主义路线，深入批判《论总纲》、《汇报提纲》、《条例》这三株反党、反马克思主义的大毒草；同时要继续联系民兵建设上两条路线斗争的实际，把邓小平攻击污蔑民兵的反动谬论批深批透。我们要坚持毛主席指引的加强民兵建设的正确方向，日日夜夜为毛主席的革命路线站好岗、放好哨。我们要坚持不懈地和党内资产阶级斗。我们一定要在斗争中进一步把上海民兵建设好，为巩固无产阶级专政作出更大贡献。"},{"type":"paragraph","text":"我们民兵要坚持毛主席的革命路线，热情扶植、支持社会主义的新生事物，保卫和发展文化大革命的胜利成果。我们要把毛主席关于“专政是群众的专政”的光辉思想铭记在心，化为行动，在各条战线、各行各业，充分发挥民兵的战斗作用，进一步巩固无产阶级专政。"},{"type":"paragraph","text":"我们要百倍提高警惕，与人民解放军一起，加强战备，搞好军民联防，切实落实各项战备措施，随时准备歼灭一切敢于入侵之敌；要随时注意阶级斗争新动向，防止国内外阶级敌人的破坏活动。为了保卫毛主席的革命路线，我们要继续发扬不怕牺牲、英勇斗争的无产阶级革命精神，狂风恶浪无所惧，甘洒热血为人民。"},{"type":"paragraph","text":"我们要坚决维护党的一元化领导。一切行动听党指挥，自觉地接受党的一元化领导，这是我们上海民兵的优良传统，是我们沿着毛主席革命路线胜利前进的保证。"},{"type":"paragraph","text":"毛主席开创的红色江山，我们来保卫；毛主席的遗志，我们来继承。毛泽东思想的光辉，将千秋万代永远照耀着我们前进的道路。"},{"type":"paragraph","text":"伟大的领袖和导师毛主席永垂不朽!"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"两条路线斗争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"acca70488c"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
