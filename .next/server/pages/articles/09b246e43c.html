script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"上海铁路分局真如站党委积极引导群众认真看书学习　深入批判修正主义使各项工作搞得生气勃勃，生产任务也完成得比较出色","authors":[],"dates":[{"year":1971,"month":12,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　上海铁路分局真如站党委在批修整风运动中，积极引导广大工人群众，把对刘少奇一类骗子的无比仇恨，化为“认真看书学习，弄通马克思主义”深入开展革命大批判的动力，使运动不断深入发展。"},{"type":"paragraph","text":"这个站的老工人占全站人数一半以上，他们在站党委的领导下，怀着对伟大领袖毛主席深厚的无产阶级感情，与全站广大职工一起，通过回忆对比和揭发声讨刘少奇一类骗子妄图复辟资本主义的罪行，对这伙阴谋家、野心家激起无比仇恨。为了进一步提高大家的路线斗争觉悟，站党委积极引导干部和工人同志联系党内两条路线斗争的历史，反复学习党的基本路线，使大家充分认识到路线斗争的长期性和复杂性。在讨论中，有些老工人从干劲谈到路线，并回顾了过去的教训:在刘少奇反革命修正主义路线的毒害下，过去“干劲”越大，拿的奖金越多，受资产阶级思想的腐蚀也就越严重。以前拿到奖金，还错误地以为这是“领导”的“关怀”，其实正是中了刘少奇一伙“物质刺激”的毒。有位老工人深有体会地说:不能离开路线讲干劲，离开了毛主席的革命路线，干劲越大越糟糕；只有寸步不离毛主席的革命路线，才能干到点子上，走在正道上。有个中层干部过去由于整天埋头抓生产，简直是“眼睛一睁，忙到熄灯”，大家称他为“生产队长”。在这次学习讨论中，这位同志深有感触地说:“革命干劲首先要用到学习和批判中去，不然就会看不清方向，辨不明路线，迟早要走邪路、犯错误。”"},{"type":"paragraph","text":"通过学习讨论，广大工人群众进一步提高了对深入开展革命大批判的重要意义的认识，一个狠批刘少奇一类骗子的热潮迅速在全站掀起。有个老工人口腔发炎，嘴巴也肿了，仍然坚持来站里参加学习，并在批判会上积极发言。食堂、修理组等部门的青年工人积极投入战斗，有时写批判稿写到深夜。有些原来被称为学习会、批判会上的“老听众”的同志，也变成了大批判中的积极分子。"},{"type":"paragraph","text":"随着革命大批判的逐步深入，站党委领导成员又带着面上的问题，到装卸车间三班九组去蹲点，帮助他们总结了把青年工人和老工人结合起来，成立战斗小组，互相帮助和促进的经验。例如这个车间有个女青工和一位五十多岁的老师傅一起合写批判稿，她一遍遍地帮助老师傅熟悉稿子内容。上夜班前，她提早一个小时从家里出来，赶到老师傅家，再帮他准备发言。在班前批判会上，这位老工人从路线斗争的高度，联系自己的思想实际，有力地批判了刘少奇一类骗子打着“红旗”反红旗的罪行，讲得很生动，对这位青工和其他同志教育很深。三班九组青工和老年工人相结合成立战斗组的经验经过总结后，立即在全站推广，对全站的大学习、大批判起了一定的推动作用。"},{"type":"paragraph","text":"由于站党委的积极引导，广大干部和工人群众从深入批修整风的斗争实践中，更深切地认识到:“重要的问题在善于学习”。只有认真学习，掌握辩证唯物论和历史唯物论，运用阶级斗争的观点和阶级分析的方法观察问题，才能识别真假马列主义，把刘少奇一类骗子批深批透。现在，全站的学习空气越来越浓，大家的学习自觉性不断增强。不少干部除了坚持集体学习以外，还挤时间自学。许多工人同志还进一步修订了学习计划，针对批修整风中碰到的问题，认真学习马、列和毛主席的有关著作。"},{"type":"paragraph","text":"目前，这个站的大学习、大批判的群众运动正在蓬勃开展，广大干部和工人群众精神焕发，斗志昂扬，批修整风运动步步深入，各项工作搞得生气勃勃，生产任务也完成得比较出色。"},{"type":"paragraph","text":"(上海铁路分局报道组)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"09b246e43c"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
