script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"全家学语录","authors":["《人民日报》记者"],"dates":[{"year":1967,"month":1,"day":4}],"is_range_date":false,"parts":[{"text":"全家学语录","type":"title"},{"text":"《人民日报》记者","type":"authors"},{"text":"在收割晚造期间，广东省恩平县横陂公社横平大队严村第一生产队的社员，订了一条公约：禾地塘晒的谷没有收起来以前，社员饲养的三鸟一律不得放出来。一天，不知是那家的鸡闯出了笼子，走到禾地塘里去了。社员罗仙，以为是别人放的鸡，便把自己的鸡也放了出来。社员们看见了，意见很大。有人把这一情况，告诉了罗仙的丈夫郑栋。","type":"paragraph"},{"text":"当天吃晚饭的时候，郑栋对家里人说，咱们先学一段毛主席语录，再吃饭。然后叫他的一个儿子领读。儿子读一句，大家跟一句：","type":"paragraph"},{"text":"“白求恩同志毫不利己专门利人的精神，表现在他对工作的极端的负责任，对同志对人民的极端的热忱。……”","type":"paragraph"},{"text":"读了语录后，郑栋说：“毛主席教导我们，要学习白求恩同志那种毫不利己专门利人的精神。可是，今天我们家却违反队里的公约，把鸡放出去，吃了集体的谷。这是什么思想？符合毛主席的教导吗？”罗仙不好意思地说：“鸡是我放的。今天早上，我看到禾地塘里有几只鸡，以为是别人放的，便也把鸡放了出来。这说明，我还有私心，没有学到白求恩同志毫不利己专门利人的精神。”她的儿子郑盛准接着说：“妈！你这样做可不对呀！就是别人放了鸡，我们也不能放呀！这就是自私自利。”罗仙虚心地接受了儿子的批评。","type":"paragraph"},{"text":"郑栋见妻子认识了错误，高兴地说：“今晚我们结合实际学习毛主席语录，学得好，用得好。现在咱们开始吃饭吧！”","type":"paragraph"}],"comments":[],"origin":"载《人民日报》一九六七年一月四日","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"07833e613a"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
