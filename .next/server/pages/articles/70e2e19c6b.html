<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"英国职工大会年会开幕  工人要求保卫权利与和平  理事会报告表现了明显的右倾","authors":[],"dates":[{"year":1957,"month":9,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"英国职工大会年会开幕"},{"type":"paragraph","text":"工人要求保卫权利与和平"},{"type":"paragraph","text":"理事会报告表现了明显的右倾"},{"type":"paragraph","text":"本报布莱克浦2日专电  拥有八百多万会员的英国职工大会第八十九届年会，今天上午在此间开幕。一年一度的理事会报告及各工会组织的提案，已在会前印发。为期五天的会议，将据此进行讨论，并通过相应的决议。"},{"type":"paragraph","text":"提给本届年会的七十七件议案，反映了工会普通会员政治积极性的增长，以及对于保守党政府政策的普遍不满。有六个工会组织联合提出提案，要求立即停止试验与生产核子武器。全国家具工人工会的提案，要求“决不拖延地”恢复中华人民共和国在联合国中的合法地位。海员工会的提案对放宽对中国的“禁运”表示欢迎，并要求进一步扩大英国同东方的贸易。电气工人工会呼吁建立包括美苏在内的欧洲集体安全体系，以利于解决德国统一和撤退外国驻军问题。在国内问题上，工资问题已作为最尖锐的问题，被提到议事日程上来。拥有一百二十五万会员的运输与一般工人工会、七十万会员的全国矿工工会和九十万会员的市政工人工会等七大工会，联合要求年会“拒绝以任何形式限制工资的原则”，主张工资应随物价的上涨而调整。除此以外，有关国内问题的重要提案尚有：举行二十四小时罢工以抗议取消房租管制法案；增加养老金及社会福利；缩短工时等等。"},{"type":"paragraph","text":"这些提案反映了英国工人阶级的要求与愿望。与此相反，理事会的报告在许多重大问题上，表示了明显的右倾。报告没有提到今年春季的大罢工，在工资问题上没有提出明确的主张。它埋怨自动化在英国工业中推广得太慢，而很少谈到由于自动化而引起的保卫工人权利问题。在外交政策上，它支持保守党的自由贸易区计划。特别是，这个报告提出了所谓“匈牙利问题”，对匈牙利人民和苏联进行恶意的诽谤。人们认为，这一问题的提出，除了达到“冷战”的目的以外，还表明理事会企图进一步限制英国工会和社会主义国家工会的交往和接触。在主席威廉逊的开幕词中，对广大英国人民所最关怀的核武器试验问题却只字不提。"},{"type":"paragraph","text":"本届年会明显地表明了英国职工运动中的两种不同倾向。英国工人群众要求职工大会支持他们为保卫生活权利和世界和平而进行的斗争；职工大会的少数领袖，则将利用他们的地位和这个组织所特有的一套表决方法，对年会加以约束和控制。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"70e2e19c6b"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
