" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"不要被右派分子的新花招迷惑，武汉工商界应坚持斗争","authors":["新华社"],"dates":[{"year":1957,"month":8,"day":13}],"is_range_date":false,"parts":[{"text":"不要被右派分子的新花招迷惑，武汉工商界应坚持斗争","type":"title"},{"text":"新华社","type":"authors"},{"text":"据新华社武汉１３日电武汉市工商界正在进一步克服温情主义，揭发右派分子抗拒斗争的新花招，以便把反右派斗争进行到最后胜利。","type":"paragraph"},{"text":"武汉市工商界反右派斗争一开始，市工商联的领导集团被王一鸣、厉无咎等右派分子所掌握，他们不但不积极领导反右派斗争，而且为右派头目章乃器打掩护和帮腔，阻挠斗争的开展。这时，不少工商业者怕撕破面皮、怕打击报复，不敢大胆揭发和参加斗争。当时为了顺利开展反右派斗争，武汉市工商联、民建市委员会在广大工商业者的要求下，改组了反右派斗争的领导集团，并召开各种会议和采取个别串联、层层发动的方法，对广大工商业者进行反右派斗争的宣传教育，批判温情主义和右倾思想。特别是揭发了右派分子王一鸣、厉无咎等的大量反共、反社会主义的事实以后，广大工商界进一步受到教育，不少人擦亮了眼睛，右倾思想和温情主义有所克服，从而进一步揭发了一批新的右派分子，揭穿了右派分子硬抗、软拖、抵赖等诡计，打下了许多右派分子公开抗拒斗争的嚣张气焰，取得了斗争的初步胜利。","type":"paragraph"},{"text":"但是，最近以来，右派分子又想出了新的花招来对斗争进行抗拒，很多右派分子不交代任何重要问题，但表面上假装老实，作长篇大论的“检讨”以至痛哭流涕引起别人的同情，另一方面恶毒的攻击现在工商界反右派斗争的某些领导者和积极分子，借某些人历史上的污点，拖他们下水，企图以此破坏领导核心，在工商界中造成思想混乱，达到逃避斗争的目的。有一部分意志不坚定的人，在右派分子这个新的阴谋下，温情主义和右倾思想又有重新抬头的趋势，他们有的说：“像章乃器、王一鸣这些人，言论有市场，可以反一下，对区工商联的一些小右派，真没有什么可反的。”还有人主张对右派分子不要采取说理斗争的办法，而是要“最好以新旧对比的事例来感化右派分子。”","type":"paragraph"},{"text":"目前武汉市有关领导方面正在继续深入发动群众，揭穿右派分子的新花招；加强宣传教育工作，帮助广大工商业者认识右派分子的阴谋诡计，提高工商业者的思想认识，以便使工商界的反右派斗争获得彻底胜利。","type":"paragraph"},{"text":" ——原载《人民日报》1957年8月14日。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4474498ce2"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
