<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"全体船员英勇斗争打退英帝一系列反华挑衅我“杭州”号货轮在伦敦装卸后胜利返航英国工人无限热爱伟大领袖毛主席，不顾英警威胁，支持我船员正义斗争","authors":[],"dates":[{"year":1967,"month":10,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社伦敦二十六日电　本社记者报道:用战无不胜的毛泽东思想武装起来的中国远洋货轮“杭州”号全体船员，经过二十多天的斗争，打退了英帝国主义的一系列挑衅，在伦敦码头完成了装卸任务，于二十六日凌晨离开伦敦港胜利返航。"},{"type":"paragraph","text":"“杭州”轮按照中英两国贸易计划，于十月三日驶抵伦敦码头装卸货物。但是，英国当局却利用这艘中国轮船停泊的机会，蓄意挑起一次反华事件。"},{"type":"paragraph","text":"十月五日，码头上的一名暴徒故意寻衅，抢走一名中国船员身上的中国人民最敬爱的伟大领袖毛主席的像章，并肆意侮辱。满怀对伟大领袖和社会主义祖国无限热爱的中国船员立刻从暴徒手中夺回像章，并同他进行说理斗争，要他赔礼道歉。这个暴徒老羞成怒，竟然动手袭击中国船员，事件的策划者便乘机煽动许多不明真相的工人围殴中国船员，打伤中国船员。"},{"type":"paragraph","text":"事件发生后，英国当局一面蛮横拒绝中国驻英代办处进行调查，一面开动宣传机器，反诬中国船员“挑起冲突”。接着，在有关方面的授意下，码头当局在六日开始了拒绝为“杭州”轮装卸货物的所谓“抵制”行动。"},{"type":"paragraph","text":"英国当局以“保护”为名，派出警察和特务监视中国船员。船员走到哪里，警察特务就跟到哪里。英国当局还连续出动直升飞机在轮船上低空盘旋，威胁挑衅。"},{"type":"paragraph","text":"但是，在“杭州”轮全体船员的坚决斗争和中国政府、中国人民的一再抗议和警告下，英帝国主义的挑衅行径终于遭到了可耻的失败。英国当局不得不从十九日开始撤销对“杭州”轮的所谓“制裁”，并派出作业班登船卸货。"},{"type":"paragraph","text":"在这次事件中，“杭州”轮全体船员认真学习毛主席著作，特别是学习我们伟大领袖发出的要斗私，批修的最新指示，高举毛泽东思想伟大红旗，同英国当局进行了针锋相对的斗争。"},{"type":"paragraph","text":"为了表示誓死保卫毛泽东思想的决心，船员们把“高举毛泽东思想伟大红旗奋勇前进”的巨幅中英文标语，悬挂在驾驶台上，放射出灿烂的光辉。"},{"type":"paragraph","text":"在这次斗争中，“杭州”轮全体船员，遵循毛主席的教导，高举无产阶级国际主义的旗帜，积极、热情地加强同英国工人兄弟的团结，揭露英帝国主义企图利用这次事件破坏两国工人阶级友谊的阴谋。"},{"type":"paragraph","text":"在英国当局策动“抵制”中国轮船期间，许多英国工人和普通人民不顾警察的监视和威胁，上船向受伤的同志表示慰问和敬意。"},{"type":"paragraph","text":"十九日开始卸货后，许多英国工人向中国船员索要毛主席像章和《毛主席语录》。"},{"type":"paragraph","text":"一位驳船上的老工人得到一枚像章，立即佩戴在自己的帽子上，当他回到驳船上时，船上工人高兴得把他抬了起来。有一位工人把中国画报上的毛主席像贴在自己胸口上，表示毛主席是他心中的红太阳，并向中国船员伸出大拇指连声说，毛主席好!毛主席好!"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fb3cf96700"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
