script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji24","name":"毛泽东全集第24卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji24.pdf"],"article":{"title":"韦吉兵团应不惜疲劳再打几使","alias":"","parts":[{"type":"paragraph","text":"韦吉兵团应不惜疲劳再打几仗!"},{"type":"paragraph","text":"（1948年7月16日）粟、陈、唐、张（转管、不)，并告韦、吉3，华东局，许、谭，中原局："},{"type":"paragraph","text":"各电均悉。韦吉兵团选获胜利，甚好甚慰。该兵团需要补充休整也是完全对的。但须注意：（一）目前二十天至一个月内，应不惜疲劳与减员再打几个小的及中等的仗，在可能条件下争取攻占睢宁、灵璧及该区某些据点，控制徐蚌以东、陇海以南广大地区于我手中，配合粟军威胁徐州，援助许谭夺取济南，不要马上进行休整。（二）韦吉兵团应以一个纵队长期位于苏中，受管、不指挥，独力作战，韦吉则集中两个纵队在淮海作战。此两纵队将来休整地点"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军委起草的给华东野战军代司令员兼代政治委员粟裕、参谋长陈士、政治部主任唐亮和副参谋长张震的电报。"},{"type":"paragraph","text":"[2]管、不，指管文蔚、陈不显，当时分别任苏北军区司令员和政治委员。"},{"type":"paragraph","text":"[3]韦、吉，指韦国清、吉洛（姬鹏飞)，当时分别任华东野战军苏北兵团司令员和副政治委员。"},{"type":"paragraph","text":"[4]许、谭，指许世友、谭震林，当时分别任华东野战军山东兵团司令员和政治委员。"},{"type":"paragraph","text":"[5]徐蚌，指江苏徐州和安徽蚌埠。[6]这里的淮海是指江苏淮阴、淮安和海州（今属连云港市）之间地区。应照粟电在淮海地区，不要去盐阜\"。（三）我徐向前同志所部三个纵队，于攻克临汾伤亡万五千人之后仅休息二十天，即北上作战，连续歼灭阎军七个师（等于旅）文四个军部（等于整编师部），现尚包围敌两个师，又两个总队（略等于旅），又一个军部，又一个总指挥部于榆次以南正歼击中。向前所部仅一个纵队有二万余人，其余两个纵队各只一万余人，此次大战估计将伤亡万余。军委正令该军于完成榆次以南作战后，立即抢占太原飞机场，准备夺取太原。此种情形，望宣示干部，鼓励士气。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"午铣[1]盐阜，指江苏盐城和阜宁地区。[2]徐向前，当时任华北军区第一副司令员、第一兵团司令员兼政治委员。[3]阎，指阎锡山，当时任国民党军太原绥靖公署主任。"}],"authors":["毛泽东"],"dates":[{"year":1948,"month":7,"day":16}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":359,"page_end":360},"tags":[{"name":"毛泽东","type":"人物"},{"name":"徐向前","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c53b62eac1"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
