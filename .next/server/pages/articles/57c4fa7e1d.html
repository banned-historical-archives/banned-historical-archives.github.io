script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"美国青年日趋左倾  反抗政府对内对外反动措施","authors":[],"dates":[{"year":1947,"month":5,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"美国青年日趋左倾"},{"type":"paragraph","text":"反抗政府对内对外反动措施"},{"type":"paragraph","text":"【新华社陕北十一日电】综合报导：由于恐惧经济危机来临，美帝国主义一面疯狂叫嚣“大棒”外交政策，同时加紧制造国内反共空气，图以“反共产主义”烟幕，掩盖其对外扩张的侵略勾当与压制国内民主运动的罪行。美众院“违反美国利益行动调查委员会”主席汤麦斯目前要求杜鲁门命令联邦检查长“检举在美之共产党分子”，调查委员会并拟于本月八日派遣一个代表团，由汤麦斯率领赴洛彬机调查电影中心好莱坞的演员、编剧者与其他雇员之活动，以便求得所谓“共产党之证据”。尽管美国反动派如此处心积虑、倒行逆施，但美国青年思想近来日趋左倾，一般大学生均反对美帝国主义的扩张政策，主张国际合作，增进美苏友谊。最近许多大学生联合请求学校当局增授俄文课程，多数学校正延聘俄文教师。美国进步的与保守的艺术家团体，最近为了一致抗议美国务院禁止美国近代绘画展览，亦于纽约举行“艺术家行动大会”。与会者纷纷抨击美政府此种反动措施，谓其为打击美国文化的进步与阻止美国对外的文化的联系，并呼吁艺术家们起来坚决反对这一反动逆流。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"57c4fa7e1d"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
