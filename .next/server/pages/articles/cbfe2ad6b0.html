script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"锡共总书记桑穆加塔桑电贺我成功发射第二颗人造地球卫星中国的成就加速现代修正主义的崩溃","authors":[],"dates":[{"year":1971,"month":3,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社科伦坡二十六日电　锡兰共产党总书记桑穆加塔桑同志，三月二十二日打电报给中国共产党中央委员会，衷心地祝贺中国成功地发射第二颗人造地球卫星。电报全文如下:"},{"type":"paragraph","text":"北京"},{"type":"paragraph","text":"中国共产党中央委员会"},{"type":"paragraph","text":"亲爱的同志们:"},{"type":"paragraph","text":"我们怀着极为喜悦的心情获悉，中国在一九七一年三月三日成功地发射了第二颗人造地球卫星。"},{"type":"paragraph","text":"我们代表锡兰共产党中央委员会，代表锡兰革命人民，向中国人民、中国政府和中国共产党及其伟大领袖毛泽东同志，向所有对这一划时代事件的胜利作出贡献的革命工人、干部、科学工作者、工程师和人民解放军指战员致敬。"},{"type":"paragraph","text":"你们发射第二颗人造地球卫星的成功，不仅是中国和中国人民的胜利，而且是全世界革命人民的胜利。这是维护世界和平的一个积极步骤，因为它有助于粉碎美帝国主义和苏联社会帝国主义至今所享有的核垄断以及他们利用核垄断重新瓜分世界的企图。"},{"type":"paragraph","text":"这一重大的成就进一步证明，中国的科学技术已经迅速地向着世界最高水平发展。它证明了中国社会主义建设的成功，证明了中华人民共和国作为世界革命的坚不可摧的堡垒和基地已经得到了加强。"},{"type":"paragraph","text":"这是由于中国无产阶级文化大革命解放出来的创造力充分发挥的又一成果。这是毛泽东思想的又一胜利。它将加速现代修正主义的崩溃和失败。它将给一切正在为争取民族解放、反对美帝国主义及其走狗而斗争的人们以巨大的动力和鼓舞。它将使社会主义在全世界范围的最后胜利早日到来。"},{"type":"paragraph","text":"我们衷心地祝贺你们，并且祝愿你们今后取得更大的胜利。"},{"type":"paragraph","text":"锡兰共产党总书记　桑穆加塔桑(签字)"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cbfe2ad6b0"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
