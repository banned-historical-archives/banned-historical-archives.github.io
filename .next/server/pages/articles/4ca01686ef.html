script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"“九大”是对帝国主义和修正主义的沉重打击  尼泊尔朋友热烈祝贺我党第九次全国代表大会隆重开幕","authors":[],"dates":[{"year":1969,"month":4,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"“九大”是对帝国主义和修正主义的沉重打击"},{"type":"paragraph","text":"尼泊尔朋友热烈祝贺我党第九次全国代表大会隆重开幕"},{"type":"paragraph","text":"新华社加德满都五日电　尼泊尔朋友热烈祝贺中国共产党第九次全国代表大会隆重开幕。"},{"type":"paragraph","text":"一位尼泊尔朋友说，中国共产党第九次全国代表大会的召开，有着极其重大的意义。这不仅是中国人民的大喜事，也是全世界进步人民的大喜事。另一位尼泊尔朋友指出，这次代表大会将使中国人民在伟大领袖毛主席的英明领导下更加奋勇前进。这次代表大会对全世界正在为反对帝国主义、新老殖民主义而斗争的人民，是一个很大的鼓舞。"},{"type":"paragraph","text":"一位尼泊尔教育界的朋友说，这次代表大会是在毛主席亲自发动和领导的无产阶级文化大革命取得了伟大胜利、中国社会主义建设取得伟大成就和世界形势一片大好的情况下召开的。它的召开是对帝国主义、现代修正主义的沉重打击。他们对伟大的中国所进行的种种破坏阴谋破产了。他说：我们坚信，七亿中国人民，在以毛主席为首、林副主席为副的无产阶级司令部的领导下，将把社会主义的中国建设得更加繁荣和强大，将给全世界正在同帝国主义、现代修正主义和新老殖民主义进行斗争的人民以极大的支持。他衷心祝愿毛主席万寿无疆！"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"世界形势","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4ca01686ef"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
