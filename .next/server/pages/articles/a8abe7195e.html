script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反剥削　反压迫　反暴政　争生存  拉丁美洲人民斗争浪潮此伏彼起  乌拉圭工人同军警英勇搏斗　阿根廷近一万名糖业工人举行示威","authors":[],"dates":[{"year":1969,"month":2,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反剥削　反压迫　反暴政　争生存"},{"type":"paragraph","text":"拉丁美洲人民斗争浪潮此伏彼起"},{"type":"paragraph","text":"乌拉圭工人同军警英勇搏斗　阿根廷近一万名糖业工人举行示威"},{"type":"paragraph","text":"据新华社五日讯　拉丁美洲一些国家的劳动人民和公职人员最近不断展开斗争，抗议当局对他们的经济剥削，要求改善生活条件。"},{"type":"paragraph","text":"乌拉圭里约内格罗省的公务员四日举行不定期罢工，并且占领了市政府的建筑物，抗议当局拖欠他们的工资。据报道，乌拉圭的中学教员也在为抗议当局拖欠工资而斗争。乌拉圭中央大学的非教学人员为抗议当局克扣他们的工资，已经进行了一个多月的斗争。最近，他们占领了这个大学两个系的大楼。"},{"type":"paragraph","text":"乌拉圭首都蒙得维的亚国营屠宰冷藏厂的一千多名工人，五日在这家工厂所在的塞罗区举行示威游行，抗议当局加紧剥削，大批解雇工人的反动措施。"},{"type":"paragraph","text":"工人们的正义斗争遭到反动军警的残暴镇压，军队包围了塞罗区。但是工人们不畏强暴、坚持斗争，他们用树干筑起街垒，并且用一辆无轨电车封锁了通向塞罗区的路口，抵抗军警的袭击。反动军警使用了催泪瓦斯，工人们用石块同军警战斗了两个小时。"},{"type":"paragraph","text":"塞罗区是一个屠宰冷藏业集中的地区，这里的绝大多数居民都是各冷藏厂的工人。去年九月，这里的冷藏工人不顾反动当局所宣布的所谓“紧急安全措施”，曾经同学生一起举行示威游行，并且占领了国营屠宰冷藏厂，抗议厂方无理关厂和解雇两千多名工人。"},{"type":"paragraph","text":"委内瑞拉卫生部所属医院的四千名医生四日在全国范围内举行不定期罢工，要求增加工资。"},{"type":"paragraph","text":"阿根廷北部图库曼省贝利亚·维斯塔镇的大约一万名糖业工人一月二十六日举行示威，抗议阿根廷独裁政权根据美国控制的国际货币基金组织的意愿而无理关闭贝利亚·维斯塔糖厂。阿根廷造币厂的将近两千名工人从一月中旬就开始举行不定期罢工，抗议当局大批解雇工人。"},{"type":"paragraph","text":"最近，秘鲁广大劳动人民纷纷举行示威，要求当局向广大人民正常地供应饮水，抗议资本家在供应饮水中对劳动人民的迫害和盘剥。据揭露，贪得无厌的资本家为了赚钱，对供给居民的水不进行必要的消毒，而且价钱昂贵。在许多地区，居民不得不饮用脏水，因而染上各种疾病。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a8abe7195e"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
