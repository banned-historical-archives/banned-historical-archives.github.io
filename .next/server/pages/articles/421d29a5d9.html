" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji6","name":"毛泽东全集第6卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji6.pdf"],"article":{"title":"中华苏维埃共和国临时中央政府为对日宣战向全世界无产阶级和被压道民族官言","alias":"","parts":[{"type":"paragraph","text":"中华苏维埃共和国临时中央政府为对日宣战向全世界无产阶级"},{"type":"paragraph","text":"和被压迫民族宣言"},{"type":"paragraph","text":"（1932年4月15日）苏联和全世界无产阶级一切被压迫民族！"},{"type":"paragraph","text":"自从日本帝国主义施用其横暴的侵略政策，以武力占据东三省，进攻上海及中国沿海沿江各口岸后，现在东三省已为日本帝国主义完全殖民地化，并且以此为武装进攻苏联与准备太平洋帝国主义世界大战的根据地。强盗组合的国际联盟及英美法德等帝国主义国家正在计划瓜分中国，镇压中国苏维埃旗帜下的一切革命运动，上海的和平谈判与国联调查团的主要作用，便在于此。"},{"type":"paragraph","text":"中华苏维埃共和国临时中央政府特向全世界无产阶级及一切被压追民众宣言：本着中华工农兵苏维埃第一次代表大会宣言的精神，正式决定对日本帝国主义宣布战争，领导全国红军与工农劳苦群众用民族革命战争来驱逐日帝国主义出中国，反对任何帝国主义一切瓜分中国进攻中国革命的尝试与企图，争得中华民族的彻底解放与完全独立。"},{"type":"paragraph","text":"中国国民党军阀及其政府早已成为中国民族革命的敌人，他是帝国主义统治中国的工具，他不独绝对不会以民族的战争去反抗日本和一切帝国主义的侵略，而且本其一贯的出卖中华民族利益的惯技，帮助帝国主义实施其瓜分中国的政策，顺从帝国主义，努力于压迫中国革命屠杀反帝群众，特别是积极进攻已经脱离并且反对帝国主义统治的苏维埃区域与红军。因此推翻国民党政府的统治就成为顺利发展民族革命战争，实行对日作战的必要前提。"},{"type":"paragraph","text":"现在所有苏区红军和工农群众在苏维埃临时中央政府的领导之下，正在努力发展革命战争，首先推翻国民党统治来会合全中国工农劳苦群众和革命兵士的力量去驱逐日本帝国主义的军队及其统治中国的一切势力。我们相信这是为着中国几万万工农劳苦群众和整个中华民族解放和独立而战，也就是与你们站在一条战线上为反对我们共同敌人一一资本帝国主义的统治而战。我们希望你们一致起来援助我们这一艰苦的战争，反对日本帝国主义侵占中国，要一切帝国主义滚出中国去，尤其是希望日本的工人农民士兵弟兄们，和我们一致来推翻日本帝国主义在中国和日本的统治。"},{"type":"paragraph","text":"一九三二年四月十五日"}],"authors":["毛泽东"],"dates":[{"year":1932,"month":4,"day":15}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":62,"page_end":63},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"421d29a5d9"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
