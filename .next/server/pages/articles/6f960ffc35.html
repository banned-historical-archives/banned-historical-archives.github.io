script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"德国  “我们必须行动”——柏林反对极右大示威纪实","authors":["江建国"],"dates":[{"year":2000,"month":11,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"德国"},{"type":"paragraph","text":"“我们必须行动”"},{"type":"paragraph","text":"——柏林反对极右大示威纪实"},{"type":"paragraph","text":"本报驻德国记者  江建国"},{"type":"paragraph","text":"11月9日下午，柏林市中心万头攒动，临近的地铁和城市轻轨铁路站人来人往，熙熙攘攘。人们佩戴着“为了人道和宽容”的胸章，手持横幅和标语牌，来到勃兰登堡门前的巴黎广场，参加反对新纳粹和其他极右势力的仇外排外活动的群众集会。"},{"type":"paragraph","text":"据报道，这天晚上有20万人走上街头，宣示与极右分子斗争到底的决心。德国总统约翰内斯·劳、总理施罗德、外长菲舍尔，以及各个党派、工会、教会的负责人与来自各地的男女老少一道，参加了这次规模空前、很多年都没有过的大示威。"},{"type":"paragraph","text":"今夏以来，德国极右翼分子的仇外排外等犯罪活动格外猖獗。自7月杜塞尔多夫一公共交通车站发生针对移民的炸弹爆炸事件以来，10月又在柏林发生破坏犹太教堂的事件。而各地的仇外排外活动也屡有所闻，受害者不仅有外国移民、犹太人，也有无家可归者、残疾人等等。10月初绿党负责人和柏林市社民党政治家发出举行大示威的倡议后，迅速得到社会各界的广泛响应，并决定就选择在11月9日这个德国历史上难忘的日子举行这次活动。1938年11月9日，纳粹在德国各地砸抢犹太人商店，焚烧犹太教堂，掀起了全面迫害犹太人的恶浪。"},{"type":"paragraph","text":"下午四点半，游行始发地点奥拉宁堡街的新犹太教堂前已经挤得水泄不通，人们向当年的犹太受害者敬献了花圈后，浩浩荡荡地经弗里德利希街向勃兰登堡门进发。在这支队伍中人们不仅能看到许多熟悉的政治家的面孔，还能见到许多政治倾向不同的组织的标记，说明德国绝大多数人在反对极右这一立场上没有分歧。勃兰登堡门东西两侧竖起了巨大的电视转播屏幕，供聚集在周围的人们能从远处观看集会实况。"},{"type":"paragraph","text":"德国总统约翰内斯·劳和德国犹太人中央理事会主席保尔·施皮格尔先后发表了讲话。劳总统强烈批判极右分子的暴力行为。他说：“我们不能因为这些人是少数而聊以自慰，他们并不存在于社会之外和社会的边缘。”“我们必须行动。”施皮格尔在讲话中一针见血地说，敢于挺身而出的英雄太少，每个人都应该从身边做起，从小处做起。他们的讲话不时被成千上万的听众的掌声所打断。随后，由著名指挥家巴伦勃依姆指挥柏林交响乐团演奏了贝多芬的第五交响乐，那家喻户晓的“命运敲门”的旋律在柏林初冬的夜空下回响，敲击着20万决心与极右分子斗争的人们的心灵。"},{"type":"paragraph","text":"一次示威当然不可能把极右分子扫除干净。对德国政界来说，同极右翼的斗争还是长期的任务。最近，德国联邦议院和参议院先后通过提案，决定向宪法法院提出查禁极右的国家民主党的申请。但前景如何尚不得而知，显然，一次示威游行是不够的，德国必须认真地采取行动。"},{"type":"paragraph","text":"（本报柏林11月12日电）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6f960ffc35"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
