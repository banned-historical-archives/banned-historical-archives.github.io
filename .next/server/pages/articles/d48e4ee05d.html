script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"工人和学生团结起来　反对美帝及其代理人的压迫和剥削  智利工人学生联合上街示威","authors":[],"dates":[{"year":1969,"month":5,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"工人和学生团结起来　反对美帝及其代理人的压迫和剥削"},{"type":"paragraph","text":"智利工人学生联合上街示威"},{"type":"paragraph","text":"新华社十七日讯　圣地亚哥消息：智利首都圣地亚哥的工人和学生最近几天连续不断地举行示威游行和罢工罢课斗争，反对美帝及其代理人的压迫和剥削，抗议反动的教育制度。"},{"type":"paragraph","text":"十四日，两万名中学生宣布继续举行罢课，抗议美帝国主义及智利反动当局强加给他们的反动的军事训练。学生们在十四日和十五日连续两天上街举行示威集会和游行。反动警察使用催泪弹镇压示威学生，并且无理逮捕了几名示威者。示威学生毫不畏惧，一群学生占领了一所学校的教学大楼，从楼上向警察扔石块进行还击。"},{"type":"paragraph","text":"十五日，圣地亚哥的数百名工人和学生在市中心举行了联合示威游行，强烈要求当局立即释放九个多月前在罢工斗争中被无理逮捕的萨瓦公司的十九名工人。示威队伍到达国会大厦附近时，举行了示威集会，示威者高呼：“工人、学生联合起来，反对寡头集团！”等口号。反动警察用催泪弹和其他化学武器袭击示威群众。示威工人和学生不畏强暴，用拳头和石块进行英勇还击。他们还向代表美帝和本国反动派利益的报纸《信使报》的大楼扔石头，打碎了许多玻璃。一群学生还爬上《信使报》大楼旁边的智利大学大楼屋顶上，破坏了这家反动报纸用来接收美帝宣传机器美联社和《纽约时报》新闻的天线。"},{"type":"paragraph","text":"十六日，大批中学生上街示威，支持工人、学生要求立即释放十九名被捕工人的正义斗争。示威学生在市中心同前去镇压的反动警察搏斗了三个多小时，他们向反动警察的高压水龙车投掷土制炸弹。在这同时，一群大学生也在国会大厦附近筑起了街垒，切断了交通，同反动警察进行了激烈搏斗，并且狠揍了一些极端反动的警察。同一天，圣地亚哥智利大学师范学院的八千名学生宣布举行二十四小时罢课，表示支持工人、学生的正义斗争。工人、学生的正义斗争还得到正在罢课的智利首都两万名中学生的支持。"},{"type":"paragraph","text":"在人民群众斗争的强大压力下，智利当局被迫于十六日下午释放了这十九名被无理逮捕的工人。"},{"type":"paragraph","text":"由于美帝国主义的残酷掠夺，智利经济日益恶化，工人职员为争取生存权利的斗争也不断发生。十五日早晨，“洛瓦耶多尔”屠宰场的三千名工人占领了这个屠宰场，抗议当局要关闭屠宰场，致使屠宰场的工人全部失业。十六日，圣地亚哥智利大学的五千名工人和教职员宣布罢工罢教，要求增加工资。在这以前，大约有九千名政府雇员在十四日举行部分罢工，要求增加工资。据报道，今年以来智利的通货急剧膨胀，而在智利进行掠夺和剥削的美国垄断企业去年利润达四亿多美元。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d48e4ee05d"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
