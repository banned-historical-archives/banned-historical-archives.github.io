script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"维护世界和平　争取民主权利　反对剥削压迫  西欧各国人民举行“五一”游行示威","authors":[],"dates":[{"year":1962,"month":5,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"维护世界和平　争取民主权利　反对剥削压迫"},{"type":"paragraph","text":"西欧各国人民举行“五一”游行示威"},{"type":"paragraph","text":"新华社2日讯　西欧资本主义国家的劳动人民1日举行示威和群众集会，庆祝“国际劳动节”。"},{"type":"paragraph","text":"英国利物浦有一千多工人举行游行示威，示威者的主要口号是“停止核（武器）试验”和“把北极星导弹撤走”。在游行示威前，举行了群众大会。"},{"type":"paragraph","text":"巴黎和法国各大城市都举行了游行和集会。"},{"type":"paragraph","text":"有一万五千工人在巴黎劳动介绍所面前举行了盛大的集会。法国总工会书记摩维在会上发表演说，他号召法国工人起来进行争取实现权利要求的斗争，同时，争取恢复民主，忠实执行埃维昂协议和实现和平。世界工联总书记赛扬也在会上讲了话。"},{"type":"paragraph","text":"在马赛、里昂、尼斯、波尔多、里尔、哈佛尔、鲁昂、斯特拉斯堡、克勒蒙菲朗、图鲁兹等城市，也有成千劳动人民参加节日集会和游行。"},{"type":"paragraph","text":"在西德各地，几十万工人举行了五一节示威游行和盛大集会。在游行和集会中，西德工人表示了他们反对波恩政府原子武装、反对紧急状态法、争取经济和社会权利的愿望。"},{"type":"paragraph","text":"在许多集会上，工人们反击了西德政府人士和工会右翼领导想利用五一节集会进行挑衅的企图。"},{"type":"paragraph","text":"瑞士和比利时各大城市举行了群众示威和集会。比利时共产党领导人在各地集会上发表了演说。"},{"type":"paragraph","text":"奥地利首都维也纳和其他城市都举行了示威。示威者强烈抗议美国挑衅性的核武器试验，并且表示要为奥地利的中立和独立而斗争。"},{"type":"paragraph","text":"有一万人参加了维也纳的示威游行。示威者列队走过主要街道，然后在议会大厦前举行大会。奥地利共产党书记费恩伯在会上发表演说。"},{"type":"paragraph","text":"芬兰首都赫尔辛基三万多劳动人民参加了传统的“五一”节群众大会，芬兰共产党主席阿尔托宁在会上发表了演说。"},{"type":"paragraph","text":"芬兰的其他许多城市也举行了庆祝活动。"},{"type":"paragraph","text":"丹麦首都哥本哈根的劳动人民举行了示威游行，游行结束后举行了群众大会。"},{"type":"paragraph","text":"示威者高举着红旗和标语牌，表示反对丹麦加入“共同市场”，反对同军国主义和复仇主义的西德实行军事合作，要求争取世界和平和全面彻底裁军和要求改善劳动人民的经济状况。丹麦许多大城市也举行了示威游行和群众大会。"},{"type":"paragraph","text":"瑞典首都斯德哥尔摩“五一”节示威游行和群众大会的口号是：争取工人阶级的团结，反对原子弹，争取裁军，争取改善劳动人民的生活水平。"},{"type":"paragraph","text":"冰岛的雷克雅未克也举行了示威游行和群众大会，冰岛劳动人民表示要求争取劳动人民的生存权利、反对把冰岛作为外国军事基地、反对冰岛加入“共同市场”。"},{"type":"paragraph","text":"希腊工人以二十四小时的总罢工来庆祝节日。"},{"type":"paragraph","text":"在雅典、比雷埃夫和希腊的其他城市，劳动人民不顾警察的禁止，在“五一”节时举行了保卫自身权利的群众大会。数千名建筑工人、电气工人和其他工人参加了雅典和比雷埃夫各进步工会组织的群众大会。集中在雅典和比雷埃夫的大批警察也无法阻止劳动人民的“五一”节活动。"},{"type":"paragraph","text":"葡萄牙劳动人民1日在里斯本和俄伯尔托举行了反对萨拉查政府的示威。在里斯本，示威者高呼“打倒萨拉查”。萨拉查政权的警察用催泪弹和火焰喷射器镇压示威者，至少有十三个示威者被警察打伤。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3f16e4d0e5"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
