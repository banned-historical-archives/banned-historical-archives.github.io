script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"资产阶级个人主义像魔鬼一样缠住我心","authors":[],"dates":[{"year":1958,"month":4,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"由于我脑子里浸透了资产阶级个人主义的思想，我把教学工作和行政工作对立起来。我到处嚷时间不够，尤其是我兼任了某研究机构的行政工作以后，便嚷得更凶。其实，是否是真的时间不够呢?不是的，所谓时间不够那不过是我的雇佣观点在作怪而已。对一个全心全意为人民服务的人来说，时间的确也是不够的，因为人民需要我们做的工作是那么多。但那可以把工作加以适当安排，分清主次去做。至于像我这样具有雇佣观点的人，其所以会觉得时间不够，主要是由于我要保留一份“自耕地”，以便发展自己的“事业”，而对这份“自耕地”所花的精力却往往比对“公耕地”所花的精力要多得多，那时间又怎样会够呢?"},{"type":"paragraph","text":"每当我想到自己这些脏东西的时候，我曾不止一次地暗下决心，说:“往者已矣，来者可追”，今后决不再做那些见不得人的事了。但思想改造的确不是容易的事，资产阶级个人主义思想就像魔鬼一样缠住我。近几年来，搞教学上并不急需的“黑市翻译”是很臭的，我心里明白。但当别人来找我合作翻译或代为校对时，我便平静不下来。一时想:不能干，将来作检讨时丢人；一时又想:这本书跟教学还勉强联系得上，我只要“业余”去搞，总比那些一年中花不少时间在家中抱孩子、睡大觉的人对国家更有贡献些。有好几次都是歪道理占了上风，于是便答应下来。等到一答应下来却又后悔，不应该这样；可是回头一想，又自己对自己说:“这次既答应了人家，便干下去，下不为例。”我听说小偷的心情便是这样的，有的小偷的确也后悔过，并也下过决心，说是下次不干了，但是等到下次看见心爱的东西时却又忍不住，还是再偷一次。因此，我现在相信这样一个真理:什么错误要想偷偷地改那是骗人的，是改不了的，一定要把它公开出来，使它变成人人喊打的过街老鼠，在群众的监督下才能真正改过来。"},{"type":"paragraph","text":"(摘自“光明日报”:北京工业学院第三机械系副教授彭兆元:“为什么说我是资产阶级知识分子”)"}],"comments":[],"origin":"“光明日报”","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"45f5533728"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
