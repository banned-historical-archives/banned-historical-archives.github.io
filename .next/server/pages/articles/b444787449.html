" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji19","name":"毛泽东全集第19卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji19.pdf"],"article":{"title":"给郭沫若的信","alias":"","parts":[{"type":"paragraph","text":"给郭沫若的信"},{"type":"paragraph","text":"（1944年11月21日）沫若兄："},{"type":"paragraph","text":"大示读悉。奖饰过分，十分不敢当；但当努力学习，以副故人期望。武昌分手后，成天在工作堆里，没有读书钻研机会，故对于你的成就，觉得羡慕。你的《甲申三百年祭》，我们把它当作整风文件看待。小胜即骄傲，大胜更骄傲，一次又一次吃亏，如何避免此种毛病，实在值得注意。倘能经过大手笔写一篇太平军经验，会是很有益的；但不敢作正式提议，恐怕太累你。最近看了《反正前后》口，和我那时在湖南经历的，几乎一模一样，不成熟的资产阶级革命，那样的结局是不可避免的。此次抗日战争，应该是成熟了的吧，国际条件是很好的，国内靠我们努力。我虽然兢兢业业，生怕出岔子，但说不定岔子从什么地方跑来；你看到了什么错误缺点，希望随时示知。你的史论、史剧有大益于中国人民，只嫌其"},{"type":"paragraph","text":"[1]《甲申三百年祭》，是郭沫若1944年3月在重庆《新华日报》发表的著名史论著作。文中叙述了明末李自成农民起义军在攻入北京推翻明朝以，若干首领腐化并发生宗派斗争，以致陷于失败的过程。1944年4月12毛泽东在延安高级干部会议上说：“近日我们印了郭沫若论李自成的文也是叫同志们引为鉴戒，不要重犯胜利时骄傲的错误。”[2]《反正前后》，是郭沫若1929年写的反映自己1910年至1911年生少，不嫌其多，精神决不会白费的，希望继续努力。恩来同志到后，此间近情当已获悉，兹不一一。我们大家都想和你见面，不知有此机会否？"},{"type":"paragraph","text":"谨祝健康、愉快与精神焕发！"},{"type":"paragraph","text":"毛泽东上一九四四年十一月二十一日于延安"}],"authors":["毛泽东"],"dates":[{"year":1944,"month":11,"day":21}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":201,"page_end":202},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]},{"id":"wenji3","type":"pdf","name":"毛泽东文集第三卷（1999）","internal":false,"official":true,"author":"中央文献研究室","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/wenji3.pdf"],"article":{"title":"给郭沫若的信","description":"","dates":[{"year":1944,"month":11,"day":21}],"parts":[{"text":"给郭沫若的信","type":"title"},{"type":"appellation","text":"沫若兄："},{"type":"paragraph","text":"大示读悉。奖饰过分，十分不敢当；但当努力学习，以副故人期望。武昌分手后，成天在工作堆里，没有读书钻研机会，故对于你的成就，觉得羡慕。你的《甲申三百年祭》，我们把它当作整风文件看待。小胜即骄傲，大胜更骄傲，一次又一次吃亏，如何避免此种毛病，实在值得注意。倘能经过大手笔写一篇太平军经验，会是很有益的；但不敢作正式提议，恐怕太累你。最近看了《反正前后》，和我那时在湖南经历的，几乎一模一样，不成熟的资产阶级革命，那样的结局是不可避免的。此次抗日战争，应该是成熟了的吧，国际条件是很好的，国内靠我们努力。我虽然兢兢业业，生怕出岔子，但说不定岔子从什么地方跑来；你看到了什么错误缺点，希望随时示知。你的史论、史剧有大益于中国人民，只嫌其少，不嫌其多，精神决不会白费的，希望继续努力。恩来同志到后，此间近情当已获悉，兹不一一。我们大家都想和你见面，不知有此机会否？"},{"type":"paragraph","text":"谨祝健康、愉快与精神焕发！"},{"type":"paragraph","text":"毛泽东上"},{"type":"paragraph","text":"一九四四年十一月二十一日于延安"},{"type":"paragraph","text":"根据人民出版社一九八三年出版的"},{"type":"paragraph","text":"《毛泽东书信选集》刊印。"}],"comment_pivots":[{"part_idx":0,"offset":4,"index":1},{"part_idx":2,"offset":76,"index":2},{"part_idx":2,"offset":174,"index":3}],"is_range_date":false,"authors":["毛泽东"],"comments":["郭沫若，见本卷第89页注〔2〕。","《甲申三百年祭》，是郭沫若一九四四年三月在重庆《新华日报》发表的著名史论著作。文中叙述了明末李自成农民起义军在攻入北京推翻明朝以后，若干首领腐化并发生宗派斗争，以致陷于失败的过程。一九四四年四月十二日，毛泽东在延安高级干部会议上说：“近日我们印了郭沫若论李自成的文章，也是叫同志们引为鉴戒，不要重犯胜利时骄傲的错误。”","《反正前后》，是郭沫若一九二九年写的反映自己一九一○年至一九一一年生活经历的作品，一九二九年八月由上海现代书局出版。“反正”，指辛亥革命。"],"page_start":238,"page_end":239,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b444787449"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
