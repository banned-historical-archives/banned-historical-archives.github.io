script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"勃列日涅夫赤膊上阵疯狂反华  公然为中国的反革命修正主义分子鸣冤叫屈","authors":[],"dates":[{"year":1967,"month":9,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"勃列日涅夫赤膊上阵疯狂反华"},{"type":"paragraph","text":"公然为中国的反革命修正主义分子鸣冤叫屈"},{"type":"paragraph","text":"新华社十五日讯　布达佩斯消息：苏修集团头目勃列日涅夫和柯西金等，最近到匈牙利进行了四天访问。在访问期间，大叛徒勃列日涅夫赤膊上阵，表演了一场无耻的反华丑剧。"},{"type":"paragraph","text":"苏修头目是六日到达匈牙利的。第二天，勃列日涅夫就在布达佩斯举行的所谓“苏匈友好大会”上，大放反华厥词，空前恶毒地诽谤我们伟大领袖毛主席亲自发动和领导的无产阶级文化大革命，疯狂地攻击战无不胜的毛泽东思想。"},{"type":"paragraph","text":"中国的无产阶级文化大革命，敲响了帝国主义、修正主义和各国反动派的丧钟，受到了全世界革命人民的热烈欢呼。"},{"type":"paragraph","text":"勃列日涅夫眼看着以中国赫鲁晓夫为首的党内一小撮走资本主义道路的当权派被中国革命群众揪了出来，遭到灭顶之灾，便声嘶力竭地为他们喊冤叫屈。他公然煽动中国的反革命修正主义分子进行垂死挣扎，“找到力量来捍卫”他们的反革命“成果”，准备东山再起。这个反华小丑，还声称把中国反革命修正主义分子复辟资本主义的罪恶勾当看成是他们“共同的伟大事业”。"},{"type":"paragraph","text":"匈修头目卡达尔之流在这次会议上鹦鹉学舌，按照他们的主子勃列日涅夫的腔调，也发出了一阵猖狂的反华叫嚣。"},{"type":"paragraph","text":"中国的无产阶级文化大革命正在以排山倒海之势胜利前进，伟大的毛泽东思想的光辉照亮了全世界人民的革命道路。中国反革命修正主义分子的可耻下场，正在等待着苏修叛徒集团。勃列日涅夫几声凄厉，几声抽泣的反华嚎叫，只不过是他们面临坟墓的垂死挣扎而已。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bf9fd83143"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
