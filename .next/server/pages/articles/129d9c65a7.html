script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"宫本揭露苏共领导勾结日本修正主义者破坏禁止核弹运动谴责赫鲁晓夫继承者继续推销核骗局指出有人鼓吹和平运动如不支持部分禁试条约或不反对任何国家核试验，就不能在团结的基础上发展，这种主张已经在世界范围内破产了","authors":[],"dates":[{"year":1965,"month":7,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京5日电　东京消息:日本共产党总书记宫本显治二日在记者招待会上说，日本禁止原子弹氢弹运动可以在“彻底禁止核武器”的口号下消除大部分障碍团结起来。"},{"type":"paragraph","text":"日共《赤旗报》今天发表，了宫本的谈话。"},{"type":"paragraph","text":"宫本说，有人鼓吹和平运动如果不支持部分禁止核试验条约或者不反对任何国家进行核试验，就不能在团结的基础上发展，这种主张已经在世界范围内破产了。"},{"type":"paragraph","text":"宫本说:“社会党委员长佐佐木不坚持以往的态度，强调彻底禁止核武器，以此作为禁止原子弹氢弹运动中的新的团结方针，这是可以理解的。”"},{"type":"paragraph","text":"宫本总书记谴责苏共领导企图继续推销部分禁止核试验条约，他说:“这是赫鲁晓夫的最严重的错误之一。他当了美国策略的俘虏，美国是要用这一条约遏制中国，从而把社会主义国家一一粉碎。这使美国可以对越南进行越发张牙舞爪的侵略。”"},{"type":"paragraph","text":"宫本还谴责苏共领导人同日本的各种分裂主义者和修正主义者勾结，企图分裂日本禁止原子弹氢弹协议会和举行分裂的禁止原子弹氢弹世界大会。此外，他指出，社会党的某些党员最近访问莫斯科，同苏共领导商讨分裂日苏协会和日本和平运动。"},{"type":"paragraph","text":"宫本劝告社会党和“总评”的领导人站在独立自主的立场上。他说，“如果社会党和‘总评’领导人坚持过去的口号，他们就会落在时代后面。如果日本和平运动继续让外国势力有机会利用来进行分裂活动，它就不能恢复团结。”"},{"type":"paragraph","text":"宫本说，“苏共在它的文件中已经无法鼓吹什么不支持部分禁止核试验条约就不可能有和平运动。如果在日本有某些分子顽固地提出支持部分禁止核试验条约的口号，他们就会落在世界局势发展的后面，同日本(禁止原子弹氢弹)运动的团结背道而驰。”"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"129d9c65a7"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
