script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"伟大领袖毛主席的亲切关怀带来巨大动力宁夏各地围歼派性加速大联合步伐","authors":[],"dates":[{"year":1968,"month":2,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社银川二日电　在伟大领袖毛主席最新指示的鼓舞下，宁夏各地无产阶级革命派掀起了围剿派性、搞臭派性的群众运动，革命大联合的浪潮滚滚向前。"},{"type":"paragraph","text":"最近以来，在自治区革命委员会筹备小组的领导下，在人民解放军支左部队的热情帮助下，各革命群众组织纷纷联合举办毛泽东思想学习班，认真学习毛主席的最新指示和有关社论，广大革命群众越来越清楚地认识到:资产阶级、小资产阶级派性，是全面落实毛主席最新指示的大敌，是实现革命大联合的大敌，是夺取无产阶级文化大革命全面胜利的大敌。打倒派性，实现革命大联合，已成为宁夏两百万人民的共同愿望，成为不可抗拒的历史潮流。"},{"type":"paragraph","text":"在广大革命群众坚决要求铲除派性、迅速实现革命大联合的大好形势下，我们伟大领袖毛主席于去年十二月三十一日接见各地革命战士时接见了宁夏各派群众组织在北京参加毛泽东思想学习班的同志。伟大领袖毛主席的亲切关怀，成为宁夏各派在京代表们斗私心、铲派性的巨大动力。他们连夜开会，反复学习毛主席的最新指示，并对照检查自己，大家把原来对准别人的矛头转向自己，狠斗自己的派性，很快就达成了革命大联合的协议。"},{"type":"paragraph","text":"宁夏工人阶级在和派性作斗争中，走在最前列。在工业比较集中的银川、石咀山、吴忠、青铜峡等地，许多工厂的革命群众，展开了群众性的揭派性罪状，挖派性根源的活动。这种新形势给那些派性较重的头头上了生动的一课，使他们猛醒过来，急起直追，有的连夜召开斗私会，主动邀请对方商讨大联合的事宜。自治区建筑公司两派群众组织的负责人，从去年十月开始谈判联合，由于各自都强调自己一派正确，指责对方，一直坐不到一条板凳上。毛主席接见宁夏各派群众组织在北京毛泽东思想学习班同志的大喜讯，给了他们极大的鼓舞。他们针对自己的思想问题，一遍又一遍地学习毛主席的最新指示:“两派要互相少讲别人的缺点、错误，别人的缺点、错误，让人家自己讲，各自多做自我批评，求大同，存小异。”毛主席的伟大教导照亮了他们前进的道路。双方很快实现了革命的大联合。"},{"type":"paragraph","text":"在伟大领袖毛主席的亲切关怀下，在毛主席一系列最新指示的指引下，整个宁夏地区革命大联合的步伐大大加快了。这些天来，从银川平原到六盘山上，到处呈现热气腾腾的革命大联合景象。人们冒着零下二十度的严寒，敲锣打鼓，鸣放鞭炮，不断涌向自治区革命委员会筹备小组和当地人民解放军支左部队驻地，报告实现革命大联合的喜讯。有些基层单位已成立了革命委员会。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"宁夏文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"派性","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"军队支左","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fa51fb1a31"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
