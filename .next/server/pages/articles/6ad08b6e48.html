script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"不回家，就算是和资产阶级 家庭划清了思想界线吗?","authors":["沈俊才","潘孝智"],"dates":[{"year":1952,"month":5,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"潘孝智　沈俊才"},{"type":"paragraph","text":"自五反运动开展以来，有少数资产阶级家庭出身的青年，他们很少回家，有的甚至一直不回家，他们的理由是:“我的家庭是资产阶级家庭，为了和他们划清思想上的界线，所以不愿回去”。"},{"type":"paragraph","text":"所谓和资产阶级划清思想上的界线，就是自己要站稳立场。同资产阶级家庭里的不法父兄的五毒行为展开斗争，这种斗争，应该是面对面的，所以，作为一个资产阶级家庭出身的青年，应该回家去，而且应该常常回家去，回家去规劝自己的父兄坦白，回家去搜集他们的违法材料，如果他们不坦白的话，就应该和工人兄弟们一起，向你们的违法父兄进行围攻。只有这样，才是正确的，才是证明了你在五反运动中接受了考验，也才证明了你真正的和资产阶级的家庭划清了思想上的界线。"},{"type":"paragraph","text":"其次，所以说要和资产阶级的家庭划清思想界线，只有参加到五反运动中来，接受五反斗争的考验，在五反运动中不许倒下去。你们为了和资产阶级家庭划清思想界线而采取不回家的办法，这就等于对资产阶级的违法行为采取置之不理的态度，那完全是错误的，实际上你们不是在积极的参加五反斗争，相反是消极的逃避五反斗争。所以，你们这种行为根本不是在和资产阶级划清思想上的界线，而是仍旧留恋着资产阶级的家庭生活，包庇资产阶级父兄的违法行为。"},{"type":"paragraph","text":"所以，资产阶级家庭出身的青年们，你们应该放弃消极被动的态度，而应积极地参加到五反斗争中来，把你们家长的五毒洗个干净!"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6ad08b6e48"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
