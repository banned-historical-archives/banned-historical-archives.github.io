script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"吉田政府“保安厅”头子透露日本重整军备计划  日本人民和资产阶级反对党都激烈反对","authors":[],"dates":[{"year":1953,"month":6,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"吉田政府“保安厅”头子透露日本重整军备计划"},{"type":"paragraph","text":"日本人民和资产阶级反对党都激烈反对"},{"type":"paragraph","text":"【新华社十二日讯】东京消息：吉田政府国务相兼变相军部“保安厅”长官木村笃太郎，九日在福冈透露了一个“接近草拟完成的五年陆海空防御计划”。这个重整军备的计划立即遭到日本多方面的强烈反对。"},{"type":"paragraph","text":"按照木村笃太郎透露的日本重整军备计划，日本的变相陆军“保安队”将在五年内扩充到二十万五千人；“海上警备队”的军舰将增加到十四万三千吨；并建立一支拥有一千五百三十架飞机的空军，其中包括喷气式飞机四百八十架。木村笃太郎说：“这个计划不会受到朝鲜停战以及停战后美军从朝鲜撤退的影响。”共同社透露，这个计划就是吉田政府在美国的要求下为了换取美国“共同安全署援助”而提出的加紧重新武装的方案。共同社说："},{"type":"paragraph","text":"“观察家们认为：由于美国给日本以共同安全署援助的问题已经在国内和国外成为一个很大的问题，"},{"type":"paragraph","text":"（吉田）政府必须要准备一个它自己的防御计划。”"},{"type":"paragraph","text":"吉田政府这个重整军备计划立刻就受到日本广大公众的激烈反对。各资产阶级反对党也尖锐抨击吉田新内阁秘密策划重新武装日本是违反宪法的。左派社会党和右派社会党指出：木村的“防御计划”清楚地表明了吉田政府对重整军备采取了伪善的态度。它们并表示将在国会上追究吉田政府的责任。"},{"type":"paragraph","text":"对于重整军备计划的剧烈反应，使吉田政府十分慌张。吉田急忙在十日早晨和内阁官房长官福永健司会商对策，并授意他发表声明抵赖说：“木村所宣布的并不代表政府的意见”。但是，吉田的这种掩耳盗铃的手段是无法掩盖事实真相的。路透社东京电说：“虽然官方这样的加以否认，此间的政治观察家们却认为木村的声明是代替政府发表的，目的是试探一下：假使日本被迫加速重整军备以换取美国军事援助的话，公众的反应是什么？”"},{"type":"paragraph","text":"【新华社十二日讯】东京消息：日本警察方面最近的调查透露，战前臭名远扬的日本宪兵队正在复活中。由战前日本宪兵人员所组成的“宪友会”——宪兵之友协会，自去年夏季起已先后在六个县内成立起来。此外在日本各地还散布着前宪兵队的小型组织。"},{"type":"paragraph","text":"日本警察当局透露：这些旧宪兵队人员，正计划今年秋季在东京成立一个中央机构。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"df41750903"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
