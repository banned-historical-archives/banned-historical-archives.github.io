script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"红军团指战员深揭猛批“四人帮”反军乱军罪行  发扬光荣传统　加强军民团结","authors":[],"dates":[{"year":1977,"month":1,"day":31}],"is_range_date":false,"parts":[{"type":"paragraph","text":"红军团指战员深揭猛批“四人帮”反军乱军罪行"},{"type":"paragraph","text":"发扬光荣传统　加强军民团结"},{"type":"paragraph","text":"新华社一九七七年一月三十日讯　在揭发批判“四人帮”的斗争中，人民解放军北京部队某部红军团指战员更好地发扬我军光荣传统，广泛开展拥政爱民活动，进一步加强了军政团结和军民团结。"},{"type":"paragraph","text":"以华主席为首的党中央一举粉碎王张江姚反党集团以后，这个部队的指战员立即掀起了揭发批判“四人帮”的怒潮。通过批判“四人帮”反军乱军，破坏我军光荣传统，破坏军政、军民团结，妄图篡党夺权的罪行，更看清了“四人帮”的反动本质，极大地提高了发扬我军光荣传统，搞好拥政爱民工作的自觉性。在庆祝胜利的日子里，团党委在地方党委的一元化领导下，派出了一千四百多名指战员，组成二十四个宣传队，深入到驻地周围的四十六个公社的生产队，同人民群众一道热情赞颂英明领袖华主席，愤怒声讨“四人帮”。七连、高机连、机枪三连的指战员不辞辛苦，徒步走遍十五个公社的二百多个自然村，深入田间地头，同群众一起召开庆祝大会，纵情欢呼马列主义、毛泽东思想的伟大胜利，热情颂扬毛主席亲自选定的接班人华主席。全团各个连队利用政治夜校、办学习班等多种形式，帮助二十三个公社培训了一千五百多名理论骨干，进一步健全壮大了贫下中农理论队伍，并且同驻地八百多个生产大队一道召开了大小批判会两千多次，办大批判专栏两千一百多期。"},{"type":"paragraph","text":"在拥政爱民热潮中，红军团党委还组织了十八个连队的干部、战士，到周围农村同社员群众一起学习毛主席的有关教导，学习华主席、党中央的有关指示，积极促进安定团结，努力发展革命和生产大好形势。由于“四人帮”的干扰和破坏，影响了驻地一些社队农业学大寨、普及大寨县运动的开展。团党委主动与地方党委联系，抽调干部、战士组成三百多个宣传小组，深入到驻地社队，坚持以阶级斗争为纲，组织社员学习毛主席关于“农业学大寨”的伟大指示，学习华主席在两次全国农业学大寨会议上的重要讲话，学习大寨大队的根本经验，大批修正主义，大批资本主义，大干社会主义。在第二次全国农业学大寨会议精神鼓舞下，驻地县委发出了“大搞农田基本建设，为普及大寨县而奋斗”的号召，集中了万人大军搞平整土地大会战，红军团党委立即派出干部、战士参加。军民并肩顶风冒雪奋战，搬运土方六十万立方米，提前二十天完成了任务。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f673504054"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
