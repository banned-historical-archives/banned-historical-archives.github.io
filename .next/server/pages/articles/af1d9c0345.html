<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"南汇县瓦屑公社和平大队在反击右倾翻案风中充分发挥图书室的战斗作用","authors":[],"dates":[{"year":1976,"month":3,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　南汇县瓦屑公社和平大队党支部在反击右倾翻案风的斗争中，充分发挥大队图书室的战斗作用，领导社员群众认真学习毛主席的阶级斗争学说，批判党内那个不肯改悔的走资派抛出的“三项指示为纲”的修正主义纲领及其理论基础阶级斗争熄灭论和反动的唯生产力论，把运动不断引向深入。"},{"type":"paragraph","text":"大队图书室是农村思想文化战线上无产阶级对资产阶级实行全面专政的一个重要阵地。和平大队图书室配合反击右倾翻案风，积极向干部社员推荐马列和毛主席关于阶级斗争论述的著作以及文化大革命以来毛主席的一系列重要指示，他们在党支部的领导下，召开学习交流会和批判会，出大批判专栏，和大队理论队伍一起编写大批判讲稿，组织巡回宣讲队到各生产队巡回宣讲。"},{"type":"paragraph","text":"和平大队图书室和大队理论队伍联系本地区、本大队的斗争实际，在巡回宣讲中，以大量生动有力的事实，针锋相对地揭露“三项指示为纲”的反动实质。社员们开展忆苦思甜，把新旧社会加以比较，又回忆了土地改革、互助组、合作化、人民公社化、“四清”运动和文化大革命的斗争史，深刻感受到我国社会主义事业的发展史，就是在毛主席领导下不断进行反对资产阶级的阶级斗争史。团支部和图书管理员还回顾了大队图书室在同阶级敌人和“四旧”习惯势力的斗争中发展巩固的过程，更加感到毛主席指示的英明正确。在尖锐复杂的阶级斗争面前，只有抓住阶级斗争这个纲，坚持党的基本路线，坚持批判修正主义，批判资本主义，社会主义正气才能上升，农村思想文化阵地才能巩固，农业生产才能迅速发展。"},{"type":"paragraph","text":"通过学习，和平大队的干部社员进一步看清了党内那个不肯改悔的走资派的真面目，都说，他到处贩卖“三项指示为纲”，这个纲那个纲，就是闭口不讲阶级斗争这个纲。他用以目乱纲，以目代纲的折中主义手法，抹煞阶级斗争这个纲，给阶级敌人撑保护伞，给资本主义开绿灯，搞资本主义复辟。当前的主要矛盾仍然是无产阶级和资产阶级的矛盾，当前的主要危险仍然是修正主义，最危险的是党内走资本主义道路的当权派。大家说，打蛇要打在七寸上，批修要批在要害处。我们一定要抓住“三项指示为纲”的反动实质，批深批透，彻底粉碎党内那个不肯改悔的走资派的复辟梦。"},{"type":"paragraph","text":"在巡回宣讲和革命大批判中，图书室把革命书籍搬上大队青年突击队的开河工地，利用工余时间开展大学习、大批判，评论《水浒》，批判修正主义，青年们焕发了大干社会主义的劲头，五十个人只用十天时间就挑走了二千多土方，提前三分之一的时间完成了开河任务。"},{"type":"paragraph","text":"(本报通讯　员)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"af1d9c0345"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
