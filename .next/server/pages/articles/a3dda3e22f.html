script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"知识青年受反革命修正主义教育路线的影响，和贫下中农感情疏远，我们就在开展革命大批判的同时搞好忆苦思甜的教育","authors":["李昌元"],"dates":[{"year":1969,"month":4,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"知识青年受反革命修正主义教育路线的影响，和贫下中农感情疏远，我们就在开展革命大批判的同时"},{"type":"paragraph","text":"搞好忆苦思甜的教育"},{"type":"paragraph","text":"东风大队民兵营民兵　李昌元"},{"type":"paragraph","text":"小魏初中毕业以后，到我们队里来当农民，贫下中农待他象自己的儿女一样。但是，由于小魏受了大叛徒刘少奇反革命修正主义教育路线的影响，虽然整天和我们在一起，却看不起我们贫下中农。有些贫下中农关心他，经常到他那里去问长问短，小魏就不那么耐烦。他嫌贫下中农坐在他床上把被子弄脏了，又嫌贫下中农罗罗嗦嗦的。因此，贫下中农一到他家里去，他总是板着脸不声不响。"},{"type":"paragraph","text":"我看到这种情况，觉得我们没有尽到教育的责任。我遵循伟大领袖毛主席的教导，给小魏讲了贫下中农紧跟毛主席，彻底闹革命的故事：老贫农周昌华，在旧社会里受地主富农的重重剥削，父亲和母亲病的病死、饿的饿死。他们弟兄两个整整讨了三年饭，当了二十三年长工。新四军打进角斜的时候，他第一个带头报名，跟着毛主席闹革命。全国解放以后，他又坚定地跟着毛主席走集体化的道路。现在，他虽然年纪大了，但在抓革命促生产中还是处处打头阵。听了老贫农周昌华的故事，小魏一夜没有睡好觉，反复琢磨毛主席的教导：“没有贫农，便没有革命。若否认他们，便是否认革命。”第二天，他就在门上贴上毛主席的画像和“向贫下中农学习，向贫下中农致敬”的对联。在批判大会上，他狠狠地批判了大叛徒刘少奇散布的“群众落后论”。他说：“贫下中农对毛主席最忠诚，永远是我们的好老师。”从此以后，小魏大大变了，有话跟贫下中农说，有活跟贫下中农一起做，看不出是城里来的“洋学生”。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a3dda3e22f"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
