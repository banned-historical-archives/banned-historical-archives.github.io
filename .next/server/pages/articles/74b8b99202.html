script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共中央关于全部摘掉右派分子帽子的通知","authors":[],"dates":[{"year":1978,"month":4,"day":5}],"is_range_date":false,"parts":[{"text":"中共中央关于全部摘掉右派分子帽子的通知","type":"title"},{"text":"各省、市、自治区党委、各大军区、野战军党委、中央和国家机关各部委党委、党组，军委各总部、各军兵种党委：","type":"appellation"},{"text":"华主席、党中央批准中央统战部、公安部关于全部摘掉右派分子帽子的请示报告。一九五七年伟大领导和导师毛主席亲自发动和领导的反右派斗争，是一场伟大的政治战线和思想战线上的革命。毛主席曾指出：不打胜这一仗，社会主义是建不成的。从一九五九年到一九六四年遵照毛主席提出的关于分期分批摘掉改好了的右派分子帽子的指示，先后五批摘掉右派分子帽子。还没有摘帽子的右派分子，经过长期的教育改造，大多数人有了转变。表现较好。现在全部摘掉右派分子的帽子是必要的，有利于调动一切积极因素，把消极因素转化为积极因素，为社会主义服务。各级党委应认真贯彻执行，切实作好对摘掉右派帽子人员的安置工作。","type":"paragraph"},{"text":" 中共中央一九七八年四月五日","type":"paragraph"},{"text":"中央统战部、公安部关于全部摘掉右派分子帽子的请示报告","type":"subtitle"},{"text":"1978.04.04","type":"subtitle"},{"text":"为了更好地贯彻党的十一大路线，团结一切可以团结的力量，调动一切积极因素，化消极因素为积极因素，为社会主义服务，我们建议全部摘掉右派分子的帽子。","type":"paragraph"},{"text":"一九五七年，毛主席亲自发动的粉碎资产阶级右派猖狂进攻的斗争，是一次政治战线和思想战线上伟大的社会主义革命。在这场斗争中，全国划为资产阶级右派分子有四十五万人，并对他们进行了教育改造工作。遵照毛主席的指示，从一九五九年到一九六四年，先后五批摘掉约三十余万右派分子的帽子。目前，估计全国大约还有右派分子十万多名。他们经过二十一年长期的教育改造，大多数人有了转变，表现较好，有反党反社会主义新罪行的人只是极少数。这是毛主席、党中央改造右派政策的胜利。右派分子中的上层分子，绝大多数都已摘掉右派帽子，尚未摘帽子的，主要是原中下层干部、中小学教员和一部分大学生。他们多数都在农村、街道或劳教场所劳动，有的被管制。有的原来有工作的，取捎了工作和工资，生活发生困难。自从一九七五年特赦释放全部在押战犯和宽大释放在押国民党县、团以上人员以来，特别是粉碎“四人帮”以后，各项政策逐步得到落实，右派分子和他们的家属迫切要求摘掉右派分子帽子。我们认为，全部摘掉右派分子帽子的条件已经成熟。","type":"paragraph"},{"text":"一、全部摘掉右派分子帽子的作法","type":"paragraph"},{"text":"（一）右派分子摘帽子工作，由右派分子所在单位的党组织负责。在收到中央的文件以后，应向本单位群众讲解中央关于摘掉右派帽子的决定的意义，宣传党的政策，然后向右派分子宣布摘掉他们的右派帽子，鼓励他们继续努力学习，进行自我改造，为社会主义建设贡献力量。摘掉右派帽子的人员名单向本单位群众公布，报上一级党委备案。","type":"paragraph"},{"text":"（二）对于有新罪行并已依法判刑的右派分子，不宣布摘其右派帽子，但刑满以后也不再作为右派分子对待。","type":"paragraph"},{"text":"（三）对于已经死亡的右派分子，为了争取、教育其家属子女，也应宣布摘掉其右派帽子。","type":"paragraph"},{"text":"二、右派分子摘帽以后的若干问题","type":"paragraph"},{"text":"（一）右派分子摘帽以后，不再叫他们“右派分子”或“摘帽右派”。不要歧视他们。","type":"paragraph"},{"text":"（二）对原保留公职的人，能工作的要安排工作；有专长的要使用其专长；不能工作的可作退职、退休处理。原则上由所在单位负责安置。对已开除公职的人，也要给以生活出路，年老体弱、丧失劳动能力生活无来源的，可以从社会救济中适当解决。","type":"paragraph"},{"text":"（三）现在仍在劳教场所的右派分子，摘掉帽子的同时解除劳教。分别情况，予以安置。","type":"paragraph"},{"text":"（四）原属起义人员，如因其是右派分子而戴上历史反革命分子帽子的，应在摘掉右派分子帽子同时摘掉其历史反革命分子帽子。","type":"paragraph"},{"text":"（五）被遣送到农村的右派分子，摘掉其右派帽子以后，一般不再返回城市，但工作有需要的或确属年老病残，在农村无依靠，而在城市有亲属赡养的，可准其返回城镇落户。原在解放军中划为右派转业到地方的，不要回到军队。","type":"paragraph"},{"text":"（六）对右派分子的家属子女，根据我党的一贯政策，主要看本人表现，在人团、入党、参军、升学、招工等问题上都不应受到影响。","type":"paragraph"},{"text":"（七）对过去已经摘了右派分子帽子的人，如果尚未落实政策（包括工作安置、生活待遇、子女等），一律应按以上规定办理。","type":"paragraph"},{"text":"（八）遵照中央一九六二年的规定，对于右派分子一般不摘甄别平反，只是对于其中个别确实完全搞错了的，才作为个别人的问题，实事求是地予以改正。","type":"paragraph"},{"text":"三、全部摘掉右派分子帽子，是一项重大的政策措施，各级党组织应予重视，认真做好这项工作。建议由中央组织部、中央宣传部、中央统战部、公安部和民政部共同组织一个摘掉右派分子帽子工作的办公室，负责处理右派摘帽子的有关事宜。县以上各级党委，亦应组织摘帽办公室，负责上述工作。","type":"paragraph"},{"text":"为了解决摘帽以后的许多具体问题，建议由中央组织部、中央宣传部、中央统战部、公安部和民政部共同召开一次中央有关部门和各省、市、自治区参加的专业工作会议，商订具体实施方案，以便统一贯彻执行。","type":"paragraph"},{"text":"为了解决右派分子摘掉帽子后的安置问题，建议国家计委给各地区、各有关部门调拨必要的编制名额和劳动指标。全部摘掉右派分子帽子后，由新华社统一发表消息。","type":"paragraph"},{"text":" 来源：中共中央统战部办公厅编《统战部的信访工作常用文件选编》。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]},{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共中央关于全部摘掉右派分子帽子的通知","authors":[],"dates":[{"year":1978,"month":4,"day":5}],"is_range_date":false,"parts":[{"text":"中共中央关于全部摘掉右派分子帽子的通知","type":"title"},{"text":"华主席、党中央批准中央统战部、公安部关于全部摘掉右派分子帽子的请示报告。一九五七年伟大领导和导师毛主席亲自发动和领导的反右派斗争，是一场伟大的政治战线和思想战线上的革命。毛主席曾指出：不打胜这一仗，社会主义是建不成的。从一九五九年到一九六四年遵照毛主席提出的关于分期分批摘掉改好了的右派分子帽子的指示，先后五批摘掉右派分子帽子。还没有摘帽子的右派分子，经过长期的教育改造，大多数人有了转变。表现较好。现在全部摘掉右派分子的帽子是必要的，有利于调动一切积极因素，把消极因素转化为积极因素，为社会主义服务。各级党委应认真贯彻执行，切实作好对摘掉右派帽子人员的安置工 宜。县以上各级党委，亦应组织摘帽办公室，负责上述工作。","type":"paragraph"},{"text":"为了解决摘帽以后的许多具体问题，建议由中央组织部、中央宣传部、中央统战部、公安部和民政部共同召开一次中央有关部门和各省、市、自治区参加的专业工作会议，商订具体实施方案，以便统一贯彻执行。","type":"paragraph"},{"text":"为了解决右派分子摘掉帽子后的安置问题，建议国家计委给各地区、各有关部门调拨必要的编制名额和劳动指标。全部摘掉右派分子帽子后，由新华社统一发表消息。","type":"paragraph"},{"text":"（原载中共中央统战部办公厅编《统战部的信访工作常用文件选编》）","type":"appellation"}],"comments":[],"origin":"原载中共中央统战部办公厅编《统战部的信访工作常用文件选编》","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"74b8b99202"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
