<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"李亚晋的右派言行","authors":["太原工学院","李亚晋"],"dates":[{"year":1957,"month":5}],"is_range_date":false,"parts":[{"text":"李亚晋的右派言行","type":"title"},{"text":"太原工学院李亚晋","type":"authors"},{"text":"（李亚晋：太原工学院教务长、民盟支部主任委员）","type":"subtitle"},{"text":"（一）恶毒地诬蔑党的领导","type":"subtitle"},{"text":"他诬蔑无产阶级专政是“乱世用重典”，“是政治上不可避免的规律”，“长期这样下去，就会贻人以口实，如什么铁幕啦，赤色法西斯啦。……秦始皇严刑峻法，禁民偶语，不二世而亡，这都不是偶然的”。抗美援朝运动中，他诬蔑“社会主义国家只会宣传自己的好处”，并说：“美国人是靠近代化武器，共产党是靠人海战术”。","type":"paragraph"},{"text":"（二）主张学校不要党委制，要和党平分秋色","type":"subtitle"},{"text":"李说：“在学校中是否实行党委制，要看具体情况，党委强又懂业务，可以多管些事情；如果党委力量弱，就不必管那么多事情了。”“学校里（指工学院）成立了党委会，赵院长尽受了党组的坏影响。”鸣放中有人批评院长和院党委，李亚晋幸灾乐祸地说：“知识分子嘛，就是比知识的！”意思是说，党委不配来领导高等学校。","type":"paragraph"},{"text":"（三）当了教务长后，他说：“工学院的教师中一共两个党员，两个都不得人心”。","type":"subtitle"},{"text":"（四）他所领导的公共课教研组主任大都是盟员，形成以他为首的派系。","type":"subtitle"},{"text":"（五）借口有职无权，对工作消极应付：","type":"subtitle"},{"text":"他说：“实行二级制领导以后，郑副院长领导教学工作，他是无法进行领导的”。也即是说他是无职权的，而且事事都要推到党委去，要看看党委怎么办，因此，他对工作消极应付，对下边的工作是放任不管的。他的态度是：有事就办，没事也算，反正他是无法领导的。","type":"paragraph"},{"text":"（六）排斥工农上大学，拒不接受工农中学向学院保送优秀生：","type":"subtitle"},{"text":"工农中学优秀生保送上大学，高教部两次指示，可以协商接受，李亚晋始终是抱着拒绝接受的态度，他的理由是工农学生来了跟不上班，太差劲，尽找麻烦。后来，无法推辞了，耍了个欺上瞒下的手腕，他认为不应付一下教育厅和山西工农中学也不对，拉上三、五个瞒瞒脸吧！致使工农中学从120多位学生中选择了33个优秀生保送学院的计划破产，而在他的策动下经行政会议决定勉强接受了5个。","type":"paragraph"},{"text":"（七）挑拨知识分子与党的关系","type":"subtitle"},{"text":"“因为人民对党的政策的执行信任不强，老怕偏差缺点落在自己头上，有些知识分子，在思想改造、三反五反以及肃反每次运动都受到委屈，成了惊弓之鸟，每次运动，都打垮了他们的气节，有的不说话了，有的随波逐流，随声附和，旁人有的亦有兔死狐悲之感。在进行斗争时，人们只是响应党的号召，勇往直前，小组长指谁就斗谁，对本人的底细也不大清楚，……因之有的说：积极分子的愉快是建筑在别人痛苦的基础之上。所以今后应建立读书人的气节（维护真理的气节）”。","type":"paragraph"},{"text":"（八）自己不入党，阻止别人参加党","type":"subtitle"},{"text":"他几次要求入党，可是背地里他却对人说：“我申请入党不过是应付应付而已”。鸣放开始后，他常和人说：“现在共产党怨声载道，谁也不敢再说入党了”。企图恐吓别人不要入党。","type":"paragraph"},{"text":"（九）“民主人士挡炮眼，共产党员坐山观虎斗”。","type":"subtitle"}],"comments":[],"origin":"《“鸣”、“放”选集（二）》（中共山西省委整风办公室编，1957年9月）。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"12df3017e7"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
