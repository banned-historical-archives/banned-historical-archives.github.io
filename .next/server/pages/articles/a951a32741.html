" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji18","name":"毛泽东全集第18卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji18.pdf"],"article":{"title":"复林伯渠、董必武电","alias":"","parts":[{"type":"paragraph","text":"复林伯渠、董必武电\""},{"type":"paragraph","text":"（1944年7月2日）"},{"type":"paragraph","text":"三十日电悉。提示案、张王来信及你们巧电（三十日才收）均收到。既然如此，我们可以接收提示案而准备提出一个复案。”周恩来已于一日发表声明。故现在已不是退回问题，而是研究复案问题。我党曾多次派大员赴渝谈判，有充分理由邀请张、王来延一商。如不能来两人，则来一人。如两人均不愿来，则林偕美军事人员回延，以便中央能听取详细报告，研究复案。如外人飞机容不下则乘车回延。此外，请董将双方提案原文在便谈时交各小党派朋友阅看，但不发表。"},{"type":"paragraph","text":"[1]这是毛泽东复林伯渠、董必武电的主要内容。[2]巧，即18日。"},{"type":"paragraph","text":"[3]毛泽东在获悉张治中、王世杰6月15日致林伯渠信以前，鉴于张、王6月5日向林伯渠声称不能将中共中央意见书转报国民党政府，故曾于6月17日电示林伯渠将国民党政府提示案退还张、王。"}],"authors":["毛泽东"],"dates":[{"year":1944,"month":7,"day":2}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":525,"page_end":525},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a951a32741"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
