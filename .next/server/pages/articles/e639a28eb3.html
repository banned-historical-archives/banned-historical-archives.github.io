script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"美国黑人吹响美国人民反对垄断资产阶级残暴统治新号角  黑人斗争风暴震撼美帝老巢华盛顿","authors":[],"dates":[{"year":1968,"month":4,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"美国黑人吹响美国人民反对垄断资产阶级残暴统治新号角"},{"type":"paragraph","text":"黑人斗争风暴震撼美帝老巢华盛顿"},{"type":"paragraph","text":"美帝统治中心燃起抗暴烈火表明美国黑人抗暴力量空前发展壮大"},{"type":"paragraph","text":"新华社十七日讯　美国黑人四月四日掀起的波澜壮阔的抗暴斗争，象一声惊天动地的霹雳，震撼着美国和全世界。在这场斗争中，日益觉醒的黑人群众发扬英勇顽强、不怕牺牲的大无畏精神，在美帝国主义的心脏华盛顿，大造美国垄断资产阶级反动统治的反，把这个头号帝国主义国家的首都变成一个烟雾弥漫、瓦砾成堆的战场。"},{"type":"paragraph","text":"华盛顿有七十多万人口，其中百分之六十六是黑人。由于反动统治集团的严密控制，在过去几年中，它逃脱了大规模黑人抗暴斗争的冲击。然而，今年美国黑人掀起的这场新的抗暴斗争一开始，它就首当其冲地受到沉重打击。这种情况充分表明美国黑人抗暴力量的空前发展壮大，同时也有力地表明美国垄断资产阶级的反动统治日益虚弱、衰落。"},{"type":"paragraph","text":"四日晚上，黑人牧师马丁·路德·金被美帝国主义者暗杀的消息在华盛顿传开后，长期对种族压迫怀着满腔仇恨的黑人群众就纷纷涌向街头，放火焚烧白人剥削者的商店，一处处的大火把黑沉沉的天空照得通红。反动当局吓得胆战心惊，慌忙在美国总统居住的白宫周围增加岗哨，保护这个白人种族压迫者的老巢。"},{"type":"paragraph","text":"五日，华盛顿虽然下了一场大雨，黑人斗争的烈火却越烧越旺。一群群愤怒的黑人不分男女老少，高呼着反对种族压迫、要求黑人权力的口号，从黑人居住区涌向市中心。许多白人剥削者的商店橱窗被砸得粉碎，全市共一二百处起火。许多地方成排成排的房屋烧成了一片火海。英勇的黑人群众，不顾法西斯军警的野蛮镇压，甚至把复仇的烈火烧到了重兵把守的国会大厦和白宫附近。被烧的房屋火光冲天，烟雾弥漫，汽车在大白天也得开灯才能行驶。"},{"type":"paragraph","text":"英勇的黑人狙击手更是异常活跃。他们到处放冷枪射击反动军警，打伤军警七八十人。这些平时骑在黑人头上作威作福的反动家伙，被打得丧魂失魄，威风扫地。"},{"type":"paragraph","text":"在白宫里，美帝头子约翰逊被这一场如火如荼的黑人抗暴斗争吓破了胆，他有气无力地惊呼，华盛顿“已处在暴力和骚乱之中”。这个屠杀越南人民的刽子手、残酷镇压美国人民的罪魁祸首，吓得一连几夜睡不着觉，两只眼睛熬得通红，急得象热锅上的蚂蚁在白宫里团团打转。为了进行垂死挣扎，他凶相毕露地调动包括伞兵和海军陆战队在内的一万三千多名军队，进行大规模武装镇压。华盛顿变得象一座“大兵营”一样，全副武装的士兵在全城巡逻放哨。军用车、警车、消防车整天呼啸着在街上奔驰。国会大厦门口架起了机关枪，白宫周围布设了层层封锁线，直升飞机低空盘旋，对黑人进行侦察监视。整个华盛顿陷于一片惊恐之中。"},{"type":"paragraph","text":"我们的伟大领袖毛主席指出：“这场黑人的斗争风暴发生在美国国内，是美帝国主义当前整个政治危机和经济危机的一个突出表现。”蕴藏极大革命力量的美国黑人，坚持英勇斗争，并同美国工人运动相结合，最终必将推翻美国垄断资产阶级反动统治，摧毁殖民主义、帝国主义制度，取得彻底解放。（附图片）"},{"type":"paragraph","text":"美国黑人在觉醒！在战斗！在前进！"},{"type":"paragraph","text":"美国黑人勇敢战斗，不怕牺牲，打得法西斯军警躲在汽车后面战战兢兢。　新华社发（传真照片）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e639a28eb3"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
