" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"胡耀邦对《关于江苏如皋县清查工作等三个问题的调查报告》的批示","authors":["胡耀邦"],"dates":[{"year":1981,"month":3,"day":11}],"is_range_date":false,"parts":[{"text":"胡耀邦对《关于江苏如皋县清查工作等三个问题的调查报告》的批示","type":"title"},{"text":"胡耀邦","type":"authors"},{"text":"认真解剖一个县的麻雀就可以发现很多问题。建议今年中组、中纪、政法几家联合再去十个左右的省，再解剖十个左右的县（市），这样，我们和各省市就都心中有数了。","type":"paragraph"},{"text":"这个人错误不轻，主要是表现不好，为什么不教育批评？为什么不分配工作（指原县委组织部副部长李仕振造反起家，犯有严重错误，表现不好，但无人过问）？","type":"paragraph"},{"text":"这样的同志不谅解，不信任，就很难安定了（指：团县委书记王光国，“文革”初期当过公社的十二个人的造反组织头头，两个月后退出，以后一直表现很好，这次却被列为“造反起家”的人）。","type":"paragraph"},{"text":"这三种人本来界限就不清，不要急急忙忙铺开搞（指报告中说，清查和清理打砸抢问题还未处理结束，清理领导班子中的“三种人”’又已开始）！","type":"paragraph"}],"comments":[],"origin":"《处理“文革”遗留问题、清理“三种人”文件汇编（第一册）》广西壮族自治区党委整党办公室。1986年8月","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"胡耀邦","type":"人物"},{"name":"江苏文革","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d74f5a2581"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
