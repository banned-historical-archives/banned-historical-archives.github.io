script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反对美帝武装日本 美帝企图把日本人民当奴隶做炮灰","authors":[],"dates":[{"year":1951,"month":2,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"美帝一面武装日本，同时又企图把日本当作它永久的殖民地。这次美国战争贩子杜勒斯到东京和吉田反动政府成立了的“谅解”之一，就是‘谅解’美军以后无限期的驻在日本。"},{"type":"paragraph","text":"关于日本的领土问题，在二次世界战争时期签订的国际协定中，在非常清楚的规定，就是:(一)凡是日本掠夺别人的土地都退还出来，如台湾、澎湖列岛还给中国，库页岛南部和千岛群岛交还苏联，朝鲜独立。(二)日本自己原有的领土依旧让它保存，盟国保证不要它的任何领土。美帝今天完全违反上述的协定，一方面无耻地否认台湾库页岛已经确定了的地位，而另一方面，竟企图把琉球和小笠原群岛占为己有，名义上算是联合国叫美国“托管”。"},{"type":"paragraph","text":"美国这些横暴无耻的阴谋，完全违反国际约章，违反世界人民的意志，也绝对违反日本人民的意志。美帝想永久把日本人民当牛马，当炮灰，驱使它来与中国人民、亚洲人民为敌，作美帝扩大侵略的工具。"},{"type":"paragraph","text":"所以，对于美帝这个阴谋，不仅中国人民坚决反对，亚洲各国人民坚决反对，就是日本人民，也一样是坚决反对的。(四)"},{"type":"paragraph","text":"\u003cIMG alt=请插入2号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1951\\02\\512p010701.JPG\"\u003e"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"60588a1b68"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
