script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"一幅有味道的油画——谈韦启美同志新作《念段审江青》","authors":["华君武"],"dates":[{"year":1981,"month":9,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"一幅有味道的油画"},{"type":"paragraph","text":"——谈韦启美同志新作《念段审江青》"},{"type":"paragraph","text":"华君武"},{"type":"paragraph","text":"最近在庆祝建党六十周年的北京市美术展览会里，有一幅单色油画，幅面不大，画中也只六、七人挤在一个局促的，我们常见的那种小理发馆里，窗外还可看到积雪，大家正在听一个人念报，表情各异，坐在理发椅子上的老头，美滋滋地微笑着，好象在庆幸自己终于等到了这一天；正在听这段消息的理发师，要磨刀的那只手也似乎停住了；那位仰面的顾客，大笑中包含着对“四人帮”的仇恨和蔑视。表现出了人民的情绪，其味无穷。这幅画的标题叫《念段审江青》。"},{"type":"paragraph","text":"我们的作品一定要反映人民群众的情绪，只有反映他们的喜怒哀乐和他们的情操与理想，才能反映我们这个时代，即使是透过生活的一个小小侧面，也应着眼于此。抽象地离开我们的土地、人民去追求永恒的主题是不会创作出好作品的。当我回想到粉碎“四人帮”的消息刚刚传出以后，人民群众那种喜极而涕，狂欢似醉的场面，可惜美术作品还没有成功地表达出来。"},{"type":"paragraph","text":"美国有一位画家诺曼·洛克威尔经常用幽默的笔调描绘美国人民的日常生活和感情，美国老百姓十分喜爱他的作品。俄罗斯也有一些风俗画家，画《少校求婚》等作品，反映当时社会生活的面貌，描写轻浮的少校和装腔作势的少女，确是反映了旧俄时代世俗人物诸态。我不是提倡画掏耳朵、修脚那一类的风俗画，但是反映我们社会生活有高尚情趣的题材却是十分必要的。有人说现在已经有了摄影术，不必求诸于画笔，我想画究竟是画，摄影代替不了《长江万里图》，何况我们现在摄影家也很少有人着意去纪录我们的社会生活。几千年后，也许还要麻烦我们的后人来对我们社会生活作考证呢，这是题外的话了。"},{"type":"paragraph","text":"所以，看了《念段审江青》以后，希望其他画家也有意于此，到生活中去观察和体验。目前农村的情况已有很大变化，有人认为农民盖新房没有什么画头，我看未必，就看你如何去了解农民的情绪，如何去表现。五十年代女国画家姜燕画的《考考妈妈》，现在人们还记得这张好画。从平凡的人民生活中，可以看出人民的不平凡处。"},{"type":"paragraph","text":"我很喜欢这幅小油画，乐为介绍。如果说缺点呢，读报的人的神情还表现得不够充分，那张报纸也画得太不显眼了。我初看时，几乎被忽略过去，读报者右侧的顾客，似乎作者也未着力刻画，当然都画他们在笑就显得浅薄了，不知韦启美同志以为然否？"},{"type":"paragraph","text":"1981年8月末（附图片）"},{"type":"paragraph","text":"念段审江青（油画）\t韦启美"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"江青","type":"人物"},{"name":"四人帮","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3b5f977d7b"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
