script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"全国亿万军民热烈庆祝伟大的中华人民共和国成立二十周年的时刻我国胜利地进行了一次新的氢弹爆炸成功地进行了首次地下核试验这是战无不胜的毛泽东思想的伟大胜利!　是无产阶级文化大革命的又一丰硕成果!","authors":[],"dates":[{"year":1969,"month":10,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"中国核武器发展的这些新成就，对于美帝国主义、社会帝国主义的核垄断，是又一个沉重的打击；对于正在英勇地进行抗美救国战争的英雄的越南人民，对于正在反对美帝国主义和泰国反动派武装入侵的老挝人民，对于正在反抗美帝国主义和犹太复国主义侵略的巴勒斯坦和阿拉伯人民，对于正在为争取民族独立和人民解放而英勇斗争的各国人民，是一个大的鼓舞和支持。"},{"type":"paragraph","text":"中国进行必要而有限制的核试验，发展核武器，完全是为了防御，为了打破核垄断，其最终目的是为了消灭核武器。中国政府曾经多次郑重宣布，在任何时候、任何情况下，中国绝不会首先使用核武器。中国人民和中国政府将一如既往，继续同全世界革命人民和维护独立、爱好和平的国家一道，共同努力，坚持斗争，为全面禁止和彻底销毁核武器的崇高目标而奋斗。"},{"type":"paragraph","text":"新华社北京四日电　正当全国亿万军民热烈庆祝伟大的中华人民共和国成立二十周年的光辉节日的时刻，一九六九年九月二十九日，在我国西部地区上空，成功地进行了一次新的氢弹爆炸；在此之前，在一九六九年九月二十三日，我国还成功地进行了首次地下核试验。"},{"type":"paragraph","text":"这是战无不胜的毛泽东思想的伟大胜利!是无产阶级文化大革命的又一丰硕成果!是我国从事核武器研制和试验的工人、人民解放军指战员、工程技术人员、科学工作者和其他有关人员，在毛主席为首、林副主席为副的党中央的领导下，积极响应毛主席“团结起来，争取更大的胜利”的号召，高举马克思主义、列宁主义、毛泽东思想伟大红旗，突出无产阶级政治，深入开展活学活用毛泽东思想的群众运动，贯彻执行“九大”提出的各项战斗任务，“抓革命，促生产，促工作，促战备”的努力结果。"},{"type":"paragraph","text":"中国核武器发展的这些新成就，对于美帝国主义、社会帝国主义的核垄断，是又一个沉重的打击；对于正在英勇地进行抗美救国战争的英雄的越南人民，对于正在反对美帝国主义和泰国反动派武装入侵的老挝人民，对于正在反抗美帝国主义和犹太复国主义侵略的巴勒斯坦和阿拉伯人民，对于正在为争取民族独立和人民解放而英勇斗争的各国人民，是一个大的鼓舞和支持。"},{"type":"paragraph","text":"伟大领袖毛主席教导我们:“提高警惕，保卫祖国。”中国进行必要而有限制的核试验，发展核武器，完全是为了防御，为了打破核垄断，其最终目的是为了消灭核武器。中国政府曾经多次郑重宣布，在任何时候、任何情况下，中国绝不会首先使用核武器。中国人民和中国政府将一如既往，继续同全世界革命人民和维护独立、爱好和平的国家一道，共同努力，坚持斗争，为全面禁止和彻底销毁核武器的崇高目标而奋斗。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"91cc6d2c60"},"buildId":"V3kifhCZ
