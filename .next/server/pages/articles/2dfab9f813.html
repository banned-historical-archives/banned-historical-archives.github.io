script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反对美帝剥削　要求废除不平等条约  菲律宾人民举行反美示威","authors":[],"dates":[{"year":1972,"month":1,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反对美帝剥削　要求废除不平等条约"},{"type":"paragraph","text":"菲律宾人民举行反美示威"},{"type":"paragraph","text":"据新华社一九七二年一月二十一日讯　菲律宾人民最近接连举行示威游行，反对美帝国主义对菲律宾人民的剥削和压迫。"},{"type":"paragraph","text":"据马尼拉报纸报道，五千名菲律宾汽车司机、工人、农民和妇女，一月十三日在马尼拉举行反美示威游行和集会，抗议美国汽油公司准备抬高石油产品价格。"},{"type":"paragraph","text":"游行示威群众在一月十一日从蒙廷卢帕市出发，经过马拉本市后到达马尼拉。他们高举着标语牌，谴责美国汽油公司在菲律宾攫取暴利。十三日下午，示威群众在马尼拉市中心米兰达广场举行了反美集会，表示了菲律宾工人、农民、商人和青年联合起来，反对美国垄断资本剥削的决心。"},{"type":"paragraph","text":"一月十八日，马尼拉、洪裔礼示和南部的达沃等六个城市的青年分别举行了群众集会，要求废除美帝强加给菲律宾的不平等条约，要求把在菲律宾的美国垄断资本收归国有。洪裔礼示市的群众还在克拉克美国空军基地大门前举行了反美示威。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2dfab9f813"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
