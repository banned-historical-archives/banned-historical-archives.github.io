<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"美元岌岌可危　美帝日子空前难熬约翰逊被迫宣布采取“紧急措施”挽救美元　西方资产阶级惊呼，这只能大大加剧帝国主义国家之间的矛盾","authors":[],"dates":[{"year":1968,"month":1,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社北京二日电　正当全世界革命人民欢欣鼓舞地迎接新的一年的时候，美帝国主义的日子空前难熬，美帝头子约翰逊在元旦这一天愁眉苦脸地宣布采取一系列“紧急措施”挽救美元，妄图使早已病入膏肓的美元继续苟延残喘。"},{"type":"paragraph","text":"据报道，“紧急措施”的内容包括:“强制性”限制美国私人在海外的直接投资、限制美国银行的国外贷款、限制美国私人在国外的旅行、削减政府的海外驻军费用和“援”外开支、加紧扩大出口等。约翰逊在讲话中还暗示，他将要求国会取消美钞应有百分之二十五的黄金作为后备的规定，以便使美国的全部黄金储备都可动用来应付可能发生的挤兑风潮。在招待会后，约翰逊立即派出副国务卿卡曾巴赫和罗斯托分别前往西欧和亚洲进行游说，妄图“说服”美国的所谓“盟国”为美国分担驻军开支和为美国商品的倾销敞开大门。这充分反映了美帝国主义危机重重、焦头烂额的窘境。"},{"type":"paragraph","text":"据约翰逊透露，由于侵越战争扩大引起的海外开支增加等原因，一九六七年美国的国际收支逆差额估计高达三十五亿至四十亿美元，这个数字几乎相当于前一年逆差额的三倍，是七年来的最高峰。这种状况对于在英镑贬值后遭到越来越沉重压力因而地位空前虚弱的美元来说，是致命的威胁。西方通讯社指出，约翰逊顾不得在今年的总统选举中可能丧失选票的后果，决定采取上述“饮鸩止渴”的措施，并且迫不及待地要在元旦日加以宣布，恰恰证明了美元处境的危急和窘迫。"},{"type":"paragraph","text":"约翰逊被迫宣布采取上述措施也是帝国主义集团矛盾加深，特别是西欧国家对美国施加强大压力的结果。这些国家已经向美国明白表示，如果美国不认真采取行动来“改善”其国际收支情况，它们将拒绝支撑美元。"},{"type":"paragraph","text":"在整个帝国主义集团加速衰落、分崩离析的情况下，美帝国主义企图通过上述几项所谓“紧急措施”来摆脱困境，这完全是痴心妄想。这些措施不仅挽救不了岌岌可危的美元，也缓和不了帝国主义之间日益加深的矛盾，而且必将使美国各方面的危机进一步加剧。"},{"type":"paragraph","text":"据新华社北京四日电　美国总统约翰逊匆匆在元旦日宣布的妄图挽救美元危局的五项“紧急措施”，在美国国内外，特别是西欧，引起了强烈的不安。西方资产阶级报刊和金融界人士担心，这些措施不仅挽救不了岌岌可危的美元，而只会大大加剧帝国主义国家之间的矛盾，进一步加深资本主义世界金融货币体系的混乱状态。"},{"type":"paragraph","text":"法国金融界人士认为，约翰逊的行动证实了他们关于美元处在困境中的说法，并且指责美国采取这些措施，其目的是把困难转嫁给西欧国家。"},{"type":"paragraph","text":"法国《回声报》不安地指出，美国这些“紧急·措施”可能会导致三十年代那样的波及整个资本主义世界的大危机。"},{"type":"paragraph","text":"对于目前在财政经济上都深深陷入极端困难境地的英国来说，美国的这些措施更无疑是当头一棒。伦敦官方人士公开表示担心，约翰逊的措施可能使英国的出口遭到更大困难，从而使它的国际收支地位更加恶化，使它的经济进一步遭到打击。"},{"type":"paragraph","text":"另外，西德、意大利、瑞典、日本等国也都表示担心，美国的“紧急措施”将进一步加剧资本主义世界的贸易战和货币战。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3593776454"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
