script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"根据三中全会精神贯彻农业发展纲要  克服右倾思想挖掘农业潜力","authors":[],"dates":[{"year":1957,"month":10,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"根据三中全会精神贯彻农业发展纲要"},{"type":"paragraph","text":"克服右倾思想挖掘农业潜力"},{"type":"paragraph","text":"本报讯　据新湖南报消息：把明年的粮食总产量由今年的五十八亿斤提高到六十二亿斤，油菜总产量增长108％，生猪总头数增长35.8％，造林和垦复油茶林一百五十万亩，其它经济技术作物也都相应发展。这是中共湘潭地委根据党的三中全会的精神，对明年发展农业生产的中心要求。"},{"type":"paragraph","text":"为了迎接明年生产高潮，地委提出了六大具体措施：1、大规模兴修农田水利，保证明年不受或少受自然灾害，是今冬明春生产高潮中的一个重要组成部分。要求全区今冬明春修建各种水利工程共达二十万处以上，进行合理灌溉的田亩四百零九万亩，控制水土流失面积一百平方公里，增加抽水机站马力二千四百五十匹。湖区以内修为主，要求完成土方九百四十五万公方，进水涵闸十八座。2、解决肥料问题。要求全区种植绿肥面积由今年的三百万亩扩大到五百万亩；并在全区继续推广醴陵的积肥经验，在严重缺肥的地区，适当增加化学肥料的供应。3、在解决水利问题和充分挖掘生产潜力的前提下，适当扩大连作双季稻面积，要求全区把双季稻田由今年的五百三十万亩，扩大到五百六十万亩，其中连作晚稻比今年扩大一百万亩。4、在全区一百二十万亩一季早稻收割后，尽量争取种上红薯、玉米等高产作物。5、大力改良低产田。目前全区约有低产田三百万亩，这些田的常年产量平均每亩只有二、三百斤左右，通过开圳、排渍、挑土、增施有机肥料等办法加以改良后，一般每亩可增产一、二百斤。6、总结群众生产经验，通过办训练班、组织展览、参观等办法，继续大力推广各种先进耕作技术。"},{"type":"paragraph","text":"为了保证上述措施的彻底实现，地委要求各级领导和全体干部必须认真批判和克服右倾保守思想，认真总结农业合作化后两年来领导农业生产的经验教训，深入钻研生产，加强领导，各县在规划明年生产时，还要根据各地具体情况，分别提出在几年内赶上或超过富裕中农的生产水平的计划作为全体干部的指导思想和广大群众的“奔头”。此外，地委还要求全区各有关部门必须从支援农业生产的观点出发来安排各项工作。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ea13bad9e3"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
