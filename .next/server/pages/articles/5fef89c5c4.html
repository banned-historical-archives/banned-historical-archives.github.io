" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"重看《人民日报》社论《发动全民，讨论四十条纲要，掀起农业生产的新高潮》后毛泽东写的信","authors":[],"dates":[{"year":1958,"month":5,"day":26}],"is_range_date":false,"parts":[{"text":"重看《人民日报》社论《发动全民，讨论四十条纲要，掀起农业生产的新高潮》后毛泽东写的信","type":"title"},{"text":"政治局、书记处各同志，省、市、自治区党委第一书记，参加这次政治局扩大会议的其他同志：","type":"appellation"},{"text":"重看1957年11月13日人民日报社论，觉得有味，主题明确，气度从容，分析正确，任务清楚。以“跃进”一词代替“冒进”一词从此篇起。两词是对立的。自从“跃进”这个口号提出以后，反冒进论者闭口无言了，“冒进”可反(冒进即左倾机会主义的代名词)，当然可以振振有词。跃进呢?那就不同，不好反了。要反那就立刻把自己抛到一个很不光彩的地位上去了。此文发表时，我们一些人在莫斯科，是国内同志主持的，其功不在禹下。如果要颁发博士头衔的话，我建议第一号博士赠与发明这个伟大口号(即：“跃进”)的那一位(或者几位)科学家。","type":"paragraph"},{"text":" 毛泽东五月廿六日上午七时","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5fef89c5c4"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
