script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"锡共政治局委员桑穆加塔桑发表文章指出  印尼革命必将再次兴起获得胜利  印尼事件表明和平过渡是修正主义的空想","authors":[],"dates":[{"year":1966,"month":9,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"锡共政治局委员桑穆加塔桑发表文章指出"},{"type":"paragraph","text":"印尼革命必将再次兴起获得胜利"},{"type":"paragraph","text":"印尼事件表明和平过渡是修正主义的空想"},{"type":"paragraph","text":"新华社科伦坡一日电  锡兰共产党中央政治局委员、书记处书记桑穆加塔桑在八月二十二日的锡兰《劳工报》和《工人报》上发表文章指出，印度尼西亚的革命必将再次兴起，并且必将获得最后胜利。文章强调指出：“哪里有镇压，哪里就要造反。这是必然的规律。”"},{"type":"paragraph","text":"文章指出：印度尼西亚革命只是暂时的退却，印度尼西亚右派军人政权采取残暴行动和实行法西斯专政，这不是表明它们有力量而是表明它们虚弱——不能通过所谓议会民主这种骗人的东西继续进行统治了。"},{"type":"paragraph","text":"文章说：印度尼西亚的事件再一次表明这个真理：反动派决不会让工人阶级通过和平手段来当权。和平过渡是修正主义的空想。"},{"type":"paragraph","text":"文章还指出：苏哈托的权力完全是从他所指挥的军队的残暴力量获得的。印度尼西亚陆军所组织的所谓“人民”示威欺骗不了任何人。议会和议会制度只是掩盖主要以武装部队为基础的赤裸裸的资本专政的一块薄薄的遮羞布。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"db5b838c5d"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
