<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"地方工业必须贯彻执行为农村经济服务的方针","authors":["《人民日报》社论"],"dates":[{"year":1955,"month":11,"day":13}],"is_range_date":false,"parts":[{"text":"地方工业必须贯彻执行为农村经济服务的方针","type":"title"},{"text":"《人民日报》社论","type":"authors"},{"text":"在发展国民经济的五年计划中，地方工业担负着多方面的任务。有一部分地方工业要配合中央国营工业，为国家建设和全国人民生活的需要服务；有的要为当地的基本建设供应建筑材料；有的要给中央国营工业生产某些辅助材料和配件，并担负一定的修配任务。这些任务很重要，应该完成。但是，地方工业最重要的一项任务，应该是为当地农业生产和农村生活的需要服务。因为地方工业主要是为本地方的需要服务，而本地方的需要，很重要的一部分是农民的生产和生活的需要。","type":"paragraph"},{"text":"地方工业必须执行为农村经济服务并同农村经济密切结合的方针。我国第一个五年计划规定：“属于本地方范围内平衡的地方工业，在贯彻为农村经济服务并同农村经济密切结合的方针下，应该使它们的生产和建设适应农业和手工业在逐步合作化过程中所提出的新要求。在生产资料方面，出产农具、农械、肥料、农村交通工具以及手工工具等，并注意发展农具修配和饲料加工的业务；在日用品方面，出产多种多样的质量良好的产品。”","type":"paragraph"},{"text":"近年以来，有些省份在贯彻执行地方工业为农村经济服务并同农村经济密切结合的方针方面，已经做出了不少成绩。河北省的地方工业部门一年来试制成功了本省农民所需要的许多新式农具、水车、动力机械等等，受到了广大农民的热烈欢迎，对于增加农业生产和促进农业合作化运动的发展，都起了一定的作用。同时，过去生产设备能力不能发挥的情况也改变了，有些企业所生产的产品现在已经供不应求。河南省和安徽省的地方工业部门也开始这样做了。明年河南省的地方工业在为农村经济服务方面的产品总值将增加一千五百万元到一千七百万元，安徽省也有相当数量的增长。黑龙江省也已开始注意这个问题，该省所属的绥化等县的地方工业已开始贯彻执行为农村经济服务的方针。山西省和湖北省目前正在积极准备，广东省和江苏省也在开始向着这方面努力。","type":"paragraph"},{"text":"但是，应该指出，还有不少的省份，并没有很好地贯彻执行地方工业必须为农村经济服务并同农村经济密切结合的方针。有些省份领导地方工业的人员片面地认为农村市场狭小，农民的购买力特别是购买生产资料的能力有限、生产那些在本省农村销售的商品，产值小，利润低，因而就把眼睛向着城市，向着外地，一心想生产那些产值大、利润高的产品。有些省份领导地方工业的人员，不深入农村调查研究，因而不了解农民在生产上和生活上的迫切需要，当他们碰到一些困难以后，也就动摇起来，认为地方工业为农村经济服务不是主要的任务，或者盲目地规定生产任务，看到中央国营工业生产什么，自己也生产什么。还有一些省市领导地方工业的人员，看到农民对生活消费品的需要量很大，需要很急，于是认为地方工业应该主要生产农村所需要的生活消费品，而对于农村所需要的生产资料，却不积极地组织生产。许多事实证明，当地方工业一旦脱离了占人口大多数和占社会购买力最大部分的农民的时候，就使本身的发展遇到了很大困难，许多工厂的设备能力不能发挥，","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"65d1eb1f12"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
