" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji33","name":"毛泽东全集第33卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji33.pdf"],"article":{"title":"对中央关于统购粮食的宣传要点稿的修改","alias":"","parts":[{"type":"paragraph","text":"对中央关于统购粮食的宣传要点稿的修改!"},{"type":"paragraph","text":"（1953年10月31日）"},{"type":"paragraph","text":"要过更好的日子，一定还要实行社会主义工业化和对农业对手工业对资本主义工商业的社会主义改造。就农业来说，只有在农村中一步一步地实行社会主义的制度，才能使农业生产和农民生活一步一步地和普遍地获得提高。"},{"type":"paragraph","text":"二农村里一切明白道理的人都应当积极加入带有社会主义萌芽性"},{"type":"paragraph","text":"[1]这是毛泽东在审阅中共中央1953年10月19日关于统购粮食的宣传要点稿时修改的四段文字，文中用宋体字排印的是毛泽东加写和改写的文字。中共中央的宣传要点指出：中央人民政府决定从今年起实行统购粮食。它的目的是保障全国城市农村人人有饭吃，保障国家按总路线实行经济建设，保障我国能够一步一步走社会主义的路。《宣传要点》主要讲了三个问题：（一）为什么要走社会主义的路？（二）什么是过渡到社会主义去的总路线？（三）实行总路线，建设社会主义，为什么要统购粮食？毛泽东全集第三十三卷质的互助组，加入半社会主义的生产合作社和供销合作社，将来就可以再进一步实行集体农民公有制的完全社会主义性质的生产合作社（就是集体农场）和供销合作社，实现集体生产和富裕生活。工人在城市里建设，农民在农村里建设，农民要和工人一面合作，一面比赛，把农村也改造得和城市差不多，这才是真正的工农联盟。要不是这样，所谓工农联盟，就不能发展和巩固，而且有使已经建立的工农联盟归于破裂的危险。"},{"type":"paragraph","text":"三"},{"type":"paragraph","text":"实现国家的社会主义工业化。社会主义工业化就是要使中国由工业不发达的国家变成工业发达的国家。由非社会主义的工业变成社会主义的工业。这就一方面要努力建设社会主义的新工业（新的工厂，新的矿山），另一方面要将手工业和资本主义工业加以社会主义的改造。这里最要紧的是多炼钢铁，多产煤炭、煤油和电力，多造机器。只有工业发达了，国家才能多造新农具和农业机器来帮助农民发展大规模的社会主义农业生产合作社（即集体农场），才能多修铁路公路把城市和农村联接起来，才能多修水利来发展农业，才能用大量的便宜的化学肥料、杀虫药剂、药品、糖、布匹、自行车、收音机、电影等各种日用东西来供给农民。"},{"type":"paragraph","text":"四"},{"type":"paragraph","text":"农业怎样改造？就是按照农民自愿（不能单靠行政命令，尤其不能采用强迫办法），一步一步发展互助合作运动，由办带有社会主"},{"type":"paragraph","text":"对中央关于统购粮食的宣传要点稿的修改义萌芽性质的互助组到办半社会主义的生产合作社，再发展到办完全社会主义的生产合作社（集体农场）。因为大家劳动，力量大，单干办不到的事，互助组能够办得到，互助组办不到的事，合作社能够办得到，所以互助组比单干强，合作社比互助组强，走一步就能使生产发展一步，生活提高一步。同时能用更多的粮食棉花和别的农产品供给国家和全国人民，又可以一步一步培养大家集体劳动的习惯（但不是吃大锅饭），一步一步积累资金，学习经管这个大家务的本事，一步一步走到社会主义。"}],"authors":["毛泽东"],"dates":[{"year":1953,"month":10,"day":31}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":422,"page_end":424},"tags":[{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"512f05ba77"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
