script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"最热烈地祝贺阿尔巴尼亚祖国解放二十五周年  我们的伟大领袖毛主席和林副主席周总理致电阿人民伟大领袖霍查和列希谢胡同志","authors":[],"dates":[{"year":1969,"month":11,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"最热烈地祝贺阿尔巴尼亚祖国解放二十五周年"},{"type":"paragraph","text":"我们的伟大领袖毛主席和林副主席周总理致电阿人民伟大领袖霍查和列希谢胡同志"},{"type":"paragraph","text":"新华社二十八日讯　中国人民的伟大领袖、中国共产党中央委员会主席毛泽东同志、中国共产党中央委员会副主席林彪同志和中华人民共和国国务院总理周恩来同志，今天打电报给阿尔巴尼亚人民的伟大领袖、阿尔巴尼亚劳动党中央委员会第一书记恩维尔·霍查同志，阿尔巴尼亚人民共和国人民议会主席团主席哈奇·列希同志和阿尔巴尼亚人民共和国部长会议主席穆罕默德·谢胡同志，最热烈地祝贺阿尔巴尼亚祖国解放二十五周年。电报全文如下：地拉那阿尔巴尼亚劳动党中央委员会第一书记恩维尔·霍查同志阿尔巴尼亚人民共和国人民议会主席团主席哈奇·列希同志阿尔巴尼亚人民共和国部长会议主席穆罕默德·谢胡同志亲爱的同志们："},{"type":"paragraph","text":"在兄弟的阿尔巴尼亚人民满怀胜利的豪情欢庆祖国解放二十五周年的时候，我们代表中国共产党、中华人民共和国政府和全体中国人民，向你们，向阿尔巴尼亚劳动党、阿尔巴尼亚人民共和国政府和全体阿尔巴尼亚人民表示最热烈的祝贺。"},{"type":"paragraph","text":"二十五年前，阿尔巴尼亚人民在恩维尔·霍查同志为首的阿尔巴尼亚劳动党领导下，拿起武器，前赴后继，英勇不屈，经过长期斗争，依靠自己的力量，打败了意大利—德国法西斯占领者，解放了自己的祖国。这是阿尔巴尼亚人民革命斗争史上的伟大胜利。"},{"type":"paragraph","text":"解放二十五年来，英雄的阿尔巴尼亚人民在阿尔巴尼亚劳动党的英明领导下，高举马克思列宁主义的红旗，不怕艰险，不畏强暴，粉碎了国内外阶级敌人的颠覆、破坏和捣乱，捍卫了祖国的独立，保卫了社会主义的江山。阿尔巴尼亚人民坚持无产阶级专政，坚持走社会主义道路，在社会主义革命和社会主义建设中取得了辉煌的成就。阿尔巴尼亚的革命化运动把社会主义革命推向一个更加深入的阶段，大大地改变了人们的精神面貌，进一步促进了社会主义建设事业的蓬勃发展。阿尔巴尼亚人民同以美国为首的帝国主义、以苏修领导集团为中心的现代修正主义和各国反动派进行了英勇的斗争，对世界人民的革命事业作出了卓越的贡献。今天，社会主义的阿尔巴尼亚已经成为支援世界各国无产阶级和革命人民争取解放斗争的一座坚强堡垒。"},{"type":"paragraph","text":"阿尔巴尼亚人民所取得的辉煌胜利，是以伟大的马克思列宁主义者恩维尔·霍查同志为首的阿尔巴尼亚劳动党无产阶级革命路线的胜利。阿尔巴尼亚劳动党和阿尔巴尼亚人民以自己光辉的革命实践，丰富了马克思列宁主义的宝库。"},{"type":"paragraph","text":"中国人民和中国共产党为自己的亲密战友——阿尔巴尼亚人民和阿尔巴尼亚劳动党取得的辉煌成就和伟大胜利，感到无比的高兴。我们两党、两国政府、两国人民在长期的共同斗争中，结下了深厚的革命友谊。我们的友谊是建立在马克思列宁主义和无产阶级国际主义基础上的，经历了暴风骤雨的考验。中阿友谊的不断发展，必将对国际共产主义运动和世界人民的革命事业，产生日益深远的影响。"},{"type":"paragraph","text":"当前，世界各国人民的革命斗争已经进入了一个新的历史时期。不管帝国主义、现代修正主义和各国反动派如何疯狂挣扎，都挽救不了他们必然灭亡的命运。他们的日子不会太长了。让我们同全世界无产阶级和各国被压迫人民、被压迫民族紧密团结起来，去争取更大的胜利！"},{"type":"paragraph","text":"英雄的阿尔巴尼亚人民万岁！"},{"type":"paragraph","text":"中阿两国人民永恒的、牢不可破的战斗友谊万岁！"},{"type":"paragraph","text":"中国共产党中央委员会主席  毛泽东"},{"type":"paragraph","text":"中国共产党中央委员会副主席  林彪"},{"type":"paragraph","text":"中华人民共和国国务院总理  周恩来"},{"type":"paragraph","text":"一九六九年十一月二十八日"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"谢胡","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"596406afdf"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
