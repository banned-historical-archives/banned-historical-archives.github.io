" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"民建和工商联联席会议闭幕 对当前工商界自我改造等主要问题取得了共同认识","authors":["新华社"],"dates":[{"year":1959,"month":1,"day":26}],"is_range_date":false,"parts":[{"text":"民建和工商联联席会议闭幕 对当前工商界自我改造等主要问题取得了共同认识","type":"title"},{"text":"新华社","type":"authors"},{"text":"新华社２６日讯中国民主建国会第一届中央委员会第四次全体会议，中华全国工商业联合会第二届执行委员会第三次会议联席（扩大）会议，已于２２日闭幕。","type":"paragraph"},{"text":"在这次会议期间，代表们学习了中国共产党八届六中全会“关于人民公社若干问题的决议”和毛主席“论帝国主义和一切反动派都是纸老虎”等文件。中国共产党中央政治局委员、国务院副总理李先念到会作了重要报告，勉励工商界必须继续加强自我改造。","type":"paragraph"},{"text":"这次会议自始至终充分贯彻了和风细雨的精神，敞开思想，充分讨论，自由争辩，对有关当前工商界自我改造、积极服务的几个主要问题，取得了共同的认识。","type":"paragraph"},{"text":"会议认为：经过反右派斗争和整风运动，工商业者政治思想面貌的变化是显著的，但是多数人的进步还是有快有慢。按照毛主席所指示的六项政治标准来衡量，多数工商业者还没有达到改变资本主义立场为社会主义立场的程度，两面性仍然存在。因此，还必须不断努力，继续进行政治立场和思想的根本改造。会议并指出：工商业者的自我改造，必须在党的领导下，把改造与服务紧密地结合起来，贯彻以政治思想改造为统帅、以劳动和实践为基础、以企业或者工作岗位为基地，并把这三者密切结合起来的方针，在企业和工作岗位上做好工作，积极参加力所能及的劳动锻炼，加强政治学习，学会批评与自我批评的方法，立社会主义立场和思想、破资本主义立场和思想。","type":"paragraph"},{"text":"会议着重指出：民建和工商联两会组织，在中国共产党的领导下，团结、教育两会成员，认真进行自我改造，积极为社会主义建设服务，作用是显著的。今后，两会必须继续执行这项任务，并使两会组织逐步改造成为在中国共产党领导下的、为社会主义服务的政治力量。两会还必须更好地密切联系两会成员，了解他们的情况，关心他们的问题和困难，运用有鼓励、有批评，鼓励和批评相结合的方法，帮助他们提高认识，树立改造的光荣感，发挥服务的积极性，充分贡献技术才能，在各项工作中做出成绩，在积极服务中加强改造。","type":"paragraph"},{"text":"会议最后通过了“关于当前工商业者加强自我改造、积极为社会主义建设服务问题的几点认识”、“关于批准李烛尘副主任委员代表两会常务委员会所作的工作报告的决议”等文件。","type":"paragraph"},{"text":"参加这次会议的，有两会的中央委员、执行委员和全国各省、市（自治区）工商界代表人士，工商业者家属代表，两会各级组织负责人共五百多人。","type":"paragraph"},{"text":" ---- 原载《人民日报》1959年1月27日","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bed066c7e0"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
