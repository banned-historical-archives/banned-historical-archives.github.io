script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"用无产阶级专政理论武装贫下中农  綦江县各级党组织引导贫下中农学习马克思主义，批判修正主义，有力地巩固了农村社会主义阵地","authors":[],"dates":[{"year":1975,"month":8,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"用无产阶级专政理论武装贫下中农"},{"type":"paragraph","text":"綦江县各级党组织引导贫下中农学习马克思主义，批判修正主义，有力地巩固了农村社会主义阵地"},{"type":"paragraph","text":"据新华社成都一九七五年八月二十七日电　四川省綦江县各级党组织用无产阶级专政理论武装广大贫下中农，充分发挥他们在革命、生产中的主力军作用，有力地巩固了农村社会主义阵地。"},{"type":"paragraph","text":"学习无产阶级专政理论的运动开始后，中共綦江县委先后召开了县委扩大会、全县三级干部会和贫协干部会，组织大家认真学习无产阶级专政的理论。他们通过学习和讨论认识到，我国农村实现农业集体化后，一部分农民虽然仍然保留着小生产的特点和习惯，但是广大贫下中农是社会主义道路、集体经济的最积极的拥护者。只有坚定不移地依靠贫下中农，才能办好社会主义农业集体经济，有效地镇压和改造一切敌对分子，把巩固无产阶级专政的任务落实到农村每个基层。因此，他们结合学习理论，大力表扬贫下中农中坚持走社会主义道路的先进人物，树立贫下中农的阶级优势。今春以来全县表扬了十八个贫下中农先进集体，五十八名贫下中农先进个人。"},{"type":"paragraph","text":"綦江县各级党组织从实践中认识到，依靠贫下中农和对他们进行教育是辩证的统一，只有对贫下中农坚持思想政治路线教育，使他们在改造客观世界的同时，加强主观世界的改造，才能更好地发挥他们在社会主义革命和建设中的积极作用。因此，在学习无产阶级专政理论的运动中，各级党组织都把引导广大贫下中农学好理论，放在重要地位。半年来，全县各社队共培训了一万九千多名贫下中农理论骨干，办起了四千多所政治夜校，成立了二千多个理论学习小组，经常定期参加学习的贫下中农达三十万人以上。对少数受了资产阶级思想影响的贫下中农，社队党组织领导他们学习无产阶级专政理论，组织他们批判修正主义、批判资产阶级。通过学习和批判，这些贫下中农提高了阶级斗争和路线斗争觉悟，坚信“只有社会主义能够救中国”的真理，纷纷起来向资本主义倾向斗，决心为巩固无产阶级专政奋斗到底。"},{"type":"paragraph","text":"綦江县各级党组织还注意发挥贫下中农协会组织的作用。各级贫协组织在当地党组织的领导下，带头学好革命理论，积极协助和监督社队干部，认真搞好人民公社的经营管理，不断巩固和发展社会主义集体经济。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2fd35de78b"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
