script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"我们恨死了吃人的剥削制度","authors":["吴万英"],"dates":[{"year":1968,"month":5,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"我们恨死了吃人的剥削制度"},{"type":"paragraph","text":"贫农社员　吴万英"},{"type":"paragraph","text":"伟大领袖毛主席教导说：“在农村中消灭富农经济制度和个体经济制度，使全体农村人民共同富裕起来。”这是他老人家对五亿农民的最大关怀，为农村的社会主义革命指出了明确的方向。可是，地主、富农的代理人中国赫鲁晓夫总是寻方设法坑害我们贫下中农，要我们受二遍苦，不让我们走社会主义道路。他说：“什么才是放任自流呢？雇工，单干，应该放任自流，让他都有三匹马一副犁就很好，对于不让雇工不让单干的不能放任，对于去干涉有三匹马的，不能放任。”你看他对社会主义多么恨，对万恶的私有制度多么爱。"},{"type":"paragraph","text":"把雇工、单干捧上天的，只能是地主、富农。在黑暗的旧社会，他们就是用这个办法残酷剥削贫下中农的。我今年七十五岁了，在旧社会里受过的苦真是说不完道不尽啊！那个时候，我家房无一间，地无一垄。孩子他爹只好给地主当长工。他吃的是猪狗食，干的是牛马活，一年累到头吃不上一顿饱饭，弄得一身是病，没钱医治，年轻轻的就病死了。我领着儿子整整要了五年饭，好容易把孩子拉扯到十来岁，穷人没别的活路，只好让他去给地主扛活。狠心的地主只管自己发财，不顾穷人死活，逼着十四、五岁的孩子起五更睡半夜，干大人都感到吃力的活。孩子累得实在受不了就哭着跑回家来，狗地主拿棍子撵到我家来，劈头盖脑地毒打。我实在忍不住了，就扑上去护住孩子，狗地主的棍子就雨点似地落在我身上，打得我满身是伤，右手被打断了骨头，现在还落下伤疤。雇工，这是一把杀人不见血的刀子，地主、富农就是靠雇工剥削，吸干了长工的血汗，肥了自己的肚肠。提起它，我有说不尽的辛酸泪，止不住的心头恨。解放了，伟大领袖毛主席把我们救出了苦海，又领我们走集体化的道路，咱贫下中农才走上了幸福路，再不当长工，再不受剥削，再不受压迫了。中国赫鲁晓夫却出了一个又一个坏道道，要对雇工、单干放任自流，还要搞“三自一包”，恢复吃人的私有制度，这是放狼出笼，让被打倒的地主、富农又来剥削和压迫我们贫下中农。就在他刮起“三自一包”单干的黑风之后，我们村有的资本主义倾向严重的富裕农民，大搞“小开荒”，闹单干，搞投机倒把，越来越富；而有的贫下中农却越来越穷。要不是毛主席及时领导革命群众打退了这股妖风，贫下中农的苦日子不是又回来了吗！"},{"type":"paragraph","text":"我们贫下中农恨死了剥削制度。我们跟毛主席走社会主义道路早就铁心啦！我们要坚决打倒地主、资产阶级的代表中国赫鲁晓夫，彻底肃清“三自一包”的流毒。谁要搞资本主义，我们就坚决打倒谁。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bab5784099"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
