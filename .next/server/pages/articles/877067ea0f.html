script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"一些拉美国家领导人强调  加强拉美国家团结反对帝国主义干涉和剥削","authors":[],"dates":[{"year":1974,"month":12,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"一些拉美国家领导人强调"},{"type":"paragraph","text":"加强拉美国家团结反对帝国主义干涉和剥削"},{"type":"paragraph","text":"新华社利马一九七四年十二月八日电　秘鲁总统胡安·贝拉斯科·阿尔瓦拉多十二月七日在欢迎前来参加阿亚库乔战役一百五十周年纪念活动的外国代表团时发表讲话指出，通过这次纪念阿亚库乔战役的活动，拉丁美洲国家的团结必将得到加强。"},{"type":"paragraph","text":"贝拉斯科总统说，争取正义的斗争与争取自由的斗争始终是不可分割的。这一斗争至今尚未结束，现在我们每天都在进行着。他指出，当年从事阿亚库乔战役的人们结束了一个历史阶段，他们不朽的榜样鼓舞着我们进行这一斗争。"},{"type":"paragraph","text":"秘鲁总统说：“可以设想，如果我们真正的主权和我们真正的民族独立得不到保障的话，那么我们为争取我们人民的真正发展的战斗行动将永远不能实现。”"},{"type":"paragraph","text":"委内瑞拉总统卡洛斯·安德烈斯·佩雷斯十二月七日抵达利马前来参加阿亚库乔战役的纪念活动。他在机场向记者发表谈话说：“我们只有团结起来，才能结束依附状态。”"},{"type":"paragraph","text":"新华社巴拿马城电　秘鲁外交部长米格尔·安赫尔·德拉弗洛尔·巴列不久前在巴拿马城重申：“秘鲁政府坚决支持巴拿马人民为收复运河区领土主权而斗争的崇高和英勇的事业。”他同时表示反对对拉丁美洲国家进行任何形式的干涉。"},{"type":"paragraph","text":"秘鲁外长的上述谈话是在他离开巴拿马之前对报界发表的。"},{"type":"paragraph","text":"这位外长在谈到秘鲁的国际政策时指出，秘鲁现在和将来都不会允许在秘鲁进行任何形式的干涉。他说，公开的、隐蔽的、狡猾的、颠覆性的干涉包括经济的干涉，比其他任何侵略都更为危险。"},{"type":"paragraph","text":"这位外长谴责了干涉活动。他说，很多外国组织企图通过不同手段，利用不同方法来干涉拉丁美洲国家的事务，给这些国家造成政治和经济上的困难局势。"},{"type":"paragraph","text":"据新华社墨西哥城电　墨西哥外交部长埃米略·拉瓦萨最近表示，美洲国家组织应该加以大力改组。"},{"type":"paragraph","text":"据这里的报纸报道，拉瓦萨外长在墨西哥参议院的一次工作会议上说，在美洲国家组织内存在着“支配一切的霸权势力，它们不允许自由民主地表达我们许多国家的意志”。他说，这个组织必须适应拉美国家的愿望。"},{"type":"paragraph","text":"这位外长在谈到《各国经济权利和义务宪章》时强调了各国对自然资源的权利。他还谴责跨国公司的干涉。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"877067ea0f"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
