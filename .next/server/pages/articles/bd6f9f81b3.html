script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"日本公众领袖支持毛主席声明毛主席阐明了南越问题的本质各国人民必须团结起来共同斗争反对美帝侵略","authors":[],"dates":[{"year":1963,"month":9,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京31日电】　东京消息:日本许多群众团体的领袖纷纷表示完全支持毛泽东主席29日发表的“反对美国-吴庭艳集团侵略越南南方和屠杀越南南方人民的声明”。"},{"type":"paragraph","text":"日本和平委员会常任理事阿部行藏说，我完全支持毛主席的声明。因为分清敌友，通过推行争取民族独立的正义斗争来维护和平，是各国人民的共同路线。"},{"type":"paragraph","text":"阿部说，日本人民即将在横须贺和佐世保举行反美大示威，以粉碎美帝国主义的核潜艇进驻日本来进行核备战的阴谋。他说，他相信这次大示威将成为支援越南南方人民的斗争，粉碎美帝国主义“遏制中国”阴谋的一次大斗争。"},{"type":"paragraph","text":"日本亚非团结委员会理事长坂本德松也表示完全支持毛主席的声明和胡志明主席的号召。他说，“日本民主力量和广大人民一贯支持南越人民在越南南方民族解放阵线领导下进行的争取独立、民主和统一的斗争。”"},{"type":"paragraph","text":"坂本强调指出，为了迫使美帝国主义停止侵略，实现越南统一这个目标，日本人民认为，亚洲各国人民必须团结起来，展开共同斗争来反对美帝国主义的侵略，打击美帝国主义。"},{"type":"paragraph","text":"坂本说，“日本人民不会忘记，在日本和冲绳的美军基地正在被利用于对南越的侵略。”"},{"type":"paragraph","text":"日本宗教徒和平协议会事务局长中浓教笃说，“毛主席声明阐明了南越问题的本质，正确地指出了斗争方向。”他接着说，“吴庭艳集团对南越佛教徒和人民的镇压，是美帝国主义对南越的侵略活动的一部分。在迫使美国停止插手南越问题以前，南越问题不会有真正的解决。”"},{"type":"paragraph","text":"中浓说，日本宗教徒纷纷起来展开抗议美吴集团的活动，这个活动是日本人民反对美帝国主义和争取独立、和平、民主的斗争的一部分，同时也是争取全世界民族解放斗争不可分割的一部分。"},{"type":"paragraph","text":"日本-越南友好协会常任理事齐藤玄说，“毛主席的声明鼓舞了正在进行反对美吴集团斗争的南越人民，同时也鼓舞了正在展开反对美帝国主义、争取完全独立的日本人民。”"},{"type":"paragraph","text":"齐藤指出，越来越广泛的人认识到，南越人民反对美吴集团的斗争，并不是局部的地区性的斗争，而是具有世界意义的伟大斗争的一部分。"},{"type":"paragraph","text":"齐藤表示，日本人民愿意竭尽全力来支援南越人民的斗争。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bd6f9f81b3"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
