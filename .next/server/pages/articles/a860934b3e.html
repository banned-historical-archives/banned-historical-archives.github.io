script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"邓小平、王猛、韩念龙会见泰国羽毛球代表团","authors":[],"dates":[{"year":1973,"month":8,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"邓小平、王猛、韩念龙会见泰国羽毛球代表团"},{"type":"paragraph","text":"新华社一九七三年八月十三日讯  国务院副总理邓小平，国家体委主任王猛，外交部副部长韩念龙，今天下午会见了泰国羽毛球代表团团长、泰国羽毛球协会主席春蓬·洛哈差拉，副团长庵雷·威拉旺，顾问乃攀·万纳迈提，以及代表团全体成员，同他们进行了友好的谈话。中华全国体育总会负责人李梦华、董守义，中国羽毛球协会负责人嵇玉华，有关方面负责人和我国羽毛球运动员程瑞声、郭雷、汤仙虎、刘晓征，参加了会见。"},{"type":"paragraph","text":"（附图片）"},{"type":"paragraph","text":"邓小平、王猛、韩念龙会见泰国羽毛球代表团，图为会见时合影。"},{"type":"paragraph","text":"新华社记者摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a860934b3e"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
