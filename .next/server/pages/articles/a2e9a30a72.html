<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"资产阶级派奸细混入国营华东制药公司偷窃经济情报盗骗国家资财王敏庄与大中西药行内外勾结营私舞弊投机倒把　王犯及大奸商赵隆炜伊祖同李承久均已逮捕法办","authors":[],"dates":[{"year":1952,"month":2,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　中国制药公司华东区公司采购服务处载员王敏庄，一贯与本市大中西药行资方赵隆炜这个大奸商以及另一奸商伊祖同等相互勾结，犯了盗窃国家经济情报、抬高物价、扰乱市场等等严重的罪行、在三反、五反运动中，这几个罪大恶极的罪犯，竟敢守口如瓶，不肯彻底坦白，坚决与人民为敌到底、本市公安当局已于前昨两日把他们拘捕，将依法予以严惩。"},{"type":"paragraph","text":"这是资产阶级利用“派进来”的办法，猖狂地侵袭、偷盗国家人民利益的一个典型事例。"},{"type":"paragraph","text":"王敏庄、赵隆炜、伊祖同三犯是结拜弟兄、解放以前，他们就混迹在西药界，彼此关系密切，狼狈为奸、王敏庄于解放前曾开设华联西药房，也曾任杭州某药房的经理、解放以后(一九五○年三月)，王敏庄得到赵隆炜、伊祖同的同意，钻进中国制药公司华东区公司、同年十二月，开始任采购服务处代办和核价的工作，握有实际采购、核准物价的权力、很显然地，王敏庄钻进华东区公司，他不是为国家人民的利益服务，而是为资产阶级的利益服务的、从此以后，赵隆炜对王敏庄拉拢得更紧，王敏庄对赵隆炜的“照顾”也更周到、他们除了合作生意以外，并内外勾结起来，把国家的企业机关，作为他们盗公肥私、攫取暴利的工具、全国各地公营机关到上海来采购医疗药品时，王敏庄把其中的绝大多数介绍到大中西药行去、药品价格的核定，亦由王敏庄一手包办、一九五一年大中西药行营业数字达一百八十亿，由王敏庄核价介绍去的就有九十亿，而在一九五一年十一月份，由王敏庄介绍的生意就达二十六亿的巨额数字、有一次，大中西药行卖出一种同类同质的药品，是经王敏庄核价的，在短短的四天内，价格却由一倍跳到二十五倍、王敏庄窃据了核定药品价格的位置，照他自己的话说，他的权力比“经理都大”、他从一九五○年十二月到一九五一年十一月止，由他核定开支的款子共达七百九十五亿，平均每月在百亿左右、这说明，王敏庄是隐藏在国营企业内部的大奸贼，由于他的营私舞弊，由于他的大肆盗窃，使国家人民财富蒙受的损失，是无法估计的。"},{"type":"paragraph","text":"据大中西药行职工们反映:每当星期日，只要是赵隆炜在店里，王敏庄就一定来找他、于是赵隆炜就竭尽逢迎的丑态，请王敏庄吃饭，请王敏庄看戏，甚至有一次向王敏庄行贿一千万元、三反运动在本市大张旗鼓开展后，赵隆炜于今年一月下旬，当着大中西药行职工们的面，泪流满面地说要坦白了。实际上，他坦白了什么呢?他哄骗职工叫大家帮助他检查过去的罪行，想摸职工的“底”!当然职工们是不会上当的、接着，他又演了一出“苦肉计”，说:坦白了，店要关门，家里老小的生活谁管，职工们的生活怎办、当然，他这种阴谋诡计也是徒然的、赵隆炜看见自己所使的伎俩都没有效，最近索性装得像煞呒介事；而王敏庄在华东区公司，也跟赵隆炜一样、他们像封了口的牙膏，坚决抗拒五反运动，拒不彻底坦白、现在，这两个罪犯终于逃不掉国法的制裁、前日下午，赵隆炜、伊祖同和另一个奸商李承久(大中西药行经理)已由本市公安当局予以逮捕；昨日上午，王敏庄这个罪犯在华东区公司坦白检举大会上，在群众愤怒指责下，也被公安当局逮捕了。"},{"type":"paragraph","text":"\u003cIMG alt=请插入3号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1952\\02\\522a010201.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgaut\u003e肖林\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e往哪里跑!　肖林　作\u003c/FONT\u003e"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a2e9a30a72"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
