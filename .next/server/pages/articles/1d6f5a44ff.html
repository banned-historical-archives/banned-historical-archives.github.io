script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"三幕话剧——官书记的“真理”","authors":["中央民族学院","古林（刘金堂）"],"dates":[{"year":1957,"month":5,"day":17}],"is_range_date":false,"parts":[{"text":"三幕话剧——官书记的“真理”","type":"title"},{"text":"中央民族学院古林（刘金堂）","type":"authors"},{"text":"（刘金堂：中央民族学院语文系一年级藏语班学生）","type":"subtitle"},{"text":"第一幕","type":"subtitle"},{"text":"人物：官书记，张某某。","type":"paragraph"},{"text":"地点：某某楼走廊上。","type":"paragraph"},{"text":"(开幕)从走廊的一头传来了一阵令人酥麻的歌声，“郎呀!咱们俩是一条心……”随歌声，肥胖的某某官书记，晃荡着走上前场，一边仍然在低声的唱着那两句歌词。张××由后追上书记。","type":"paragraph"},{"text":"张：书记同志?你好!","type":"paragraph"},{"text":"官：(停住脚，扭脸向上吹出一股长气)嗯!什么事儿?","type":"paragraph"},{"text":"张：自党中央号召“百花齐放、百家争鸣”以来各界人士为之活跃，而我们这里却仍然寂静无声。为了响应党的号召，活跃一下同学们的文娱生活，再者也想协助党的整风，所以，我们几个想办一个书刊……","type":"paragraph"},{"text":"官：(吃惊)什么?辨刊?","type":"paragraph"},{"text":"张：是这样的书记同志!","type":"paragraph"},{"text":"官：(沉思后)嗯!出版自由，乃宪法规定，“百家争鸣”是我党号召!没人敢于干涉……不过，凡事要三思而后行，你们几个人，又都是非党非团同学，谁敢保证以后不出差错!如果万一出了问题，责任可不轻；以我个人的意见，不如不出为好!民主纵然应该，但是也得有个限度呀!","type":"paragraph"},{"text":"张：我们只是活跃一下同学们的文娱生活，这不会有什么反动动机!请你相信……","type":"paragraph"},{"text":"官：相信?!这不是说说了事的事呀!这就是我的意见。你要再仔细的考虑考虑!嗯?“郎呀!咱们俩是一条心……”","type":"paragraph"},{"text":"(张呆于前场)","type":"paragraph"},{"text":"——幕落——","type":"paragraph"},{"text":"第二幕","type":"subtitle"},{"text":"人物：官书记、张××。","type":"paragraph"},{"text":"地点：官书记宿舍。","type":"paragraph"},{"text":"(开幕了)官、张相对而坐，双方都面红耳赤。","type":"paragraph"},{"text":"张：既然你真不同意，那么就这样吧!不过刊物我们是一定要出的!","type":"paragraph"},{"text":"官：(拍桌大怒而起)你出!你出!!你们这一群落后分子!你们知道我不能以行政的名义处分你们！我警告你们：我会命令我支部的全体团员，不许给你们写稿，不许看你们的文章!让你那个嗅刊在墙角起去鸣吧!","type":"paragraph"},{"text":"张：放心吧!书记同志，会有人支持它的!","type":"paragraph"},{"text":"官：呸!永远也不会有人支持你们的!我是党员，我是团支部书记，我不能眼看着在我们这里长出“毒草”，有人在这里散播反动言论!为“真理”为“正义”而奋斗，这是我的崇高的职责!","type":"paragraph"},{"text":"张：(气愤而出)我相信你书记同志!你是一个为“真理”为“正义”而奋斗的“伟大战士”!你会因此而得到“光荣”的!","type":"paragraph"},{"text":"官：(气的将倒。大呼!)我要为“真理”献出我的一切!","type":"paragraph"},{"text":"——幕落——","type":"paragraph"},{"text":"第三幕","type":"subtitle"},{"text":"人物：官书记、学生甲、乙、丙、丁……","type":"paragraph"},{"text":"地点：××楼进口处以内。","type":"paragraph"},{"text":"(开幕)一群学生正围在一个新出的刊物前热烈的议论着，远处走廊的一端传来官书记的唱声：“郎呀!咱们俩是一条心……”慢慢的走近前台中央，在人群一边停下了。","type":"paragraph"},{"text":"官：喂!同志们这是什么布告呀!","type":"paragraph"},{"text":"(群众闪开齐看官)","type":"paragraph"},{"text":"学生甲：是新出的墙报!书记同志!","type":"paragraph"},{"text":"官：(大惊而后怒)呀!","type":"paragraph"},{"text":"学生乙：办的不错呀!书记同志!你看这首诗，对那些浪费粮食的人狠狠的讽刺了一顿。","type":"paragraph"},{"text":"学生丙：这篇小说写的是我们的义务劳动!真好!","type":"paragraph"},{"text":"官：(上气不接下气)什么？！胡说!你们都是瞎子!这是“毒草”，这是反动宣传!快——快!给我把它撤了!","type":"paragraph"},{"text":"学生丁：书记同志?你没有喝酒吧！","type":"paragraph"},{"text":"官：给我撤!撤呀!……","type":"paragraph"},{"text":"(没人动)","type":"paragraph"},{"text":"官：你们?要——","type":"appellation"},{"text":"(官想亲自下手，被学生们的怒目斥退，一阵笑声。)","type":"paragraph"},{"text":"官：你们?要——要干……什么？！","type":"appellation"},{"text":"群众：不许碰它！","type":"paragraph"},{"text":"学生甲：官僚主义!","type":"paragraph"},{"text":"群众：(跟随着)官僚主义!","type":"paragraph"},{"text":"官狼狈后退至台口处又回头，手握拳头大呼!“毒草”!“毒草”！！！呵……我会……叫你们吃到苦头的！……","type":"paragraph"},{"text":"(一阵笑声)","type":"paragraph"},{"text":"——幕落——","type":"paragraph"},{"text":" (录自“野草”第2期)","type":"paragraph"}],"comments":[],"origin":"《关于“野草”、“蜜蜂”社反动小集团的材料》，中共中央民族学院整风办公室编，1957年12月。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1d6f5a44ff"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
