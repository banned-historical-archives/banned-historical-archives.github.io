<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"公安部关于山西代县重点取缔一贯道经验的通报","authors":[],"dates":[{"year":1950,"month":10}],"is_range_date":false,"parts":[{"text":"公安部关于山西代县重点取缔一贯道经验的通报","type":"title"},{"text":"取缔反动会道门工作，是一件细密的政治斗争和思想斗争。因此，就必须把艰苦的切合实际的宣传揭露工作，争取教育群众，与孤立道首，严惩反革命分子相结合起来，才能达到彻底取缔会道门之目的。兹将山西代县重点取缔一贯道工作中，在宣传揭露动员群众工作方面的经验转发给你们参考。","type":"paragraph"},{"text":"代县上花庄为忻县内委区一贯道组织较大，历史较久，影响很深的村庄之一，1939年冬，在其“入道能躲灾避难，逢凶化吉，有神保佑”的诱骗下，曾发展到徒200余人，至今已发展增至500余人，达全村人口总数百分之70-80％。45年、48年我们曾展开两度较大的反一贯道斗争，但由于犯了一律对待的错误，采取简单粗暴方法，强迫开斋，硬追材料脱离了群众（曾迫使2人自杀），结果一贯道更加发展。此次工作组入村取缔，道首3人逃跑，道徒普遍不安，党员、村干及代表还包庇掩护说：“我村一贯道不甚活动了”。鉴于此种情况，乃采取了以下步骤和方法，效果良好。","type":"paragraph"},{"text":"一、讲解政策、说服党员、村干、代表，通过他们解除党内外思想顾虑；还用黑板报、屋顶广播，群众大会小会，分街分组展开宣传，从农户生产和生活问题谈起，揭露一贯道本质及阴谋，逐步诱导回忆：“入了道究竟是有利有害？”经半月工作，道徒逐渐觉悟，情绪趋于安定，如毛旦老人说：“我入道为光景过好，谁想贴了8斗麦子，借了12块白洋助道，至今还不起人家”，很多道徒敢于接近工作组，申诉“人财两空”，“生意塌了”，“少吃无穿”等入道恶果。","type":"paragraph"},{"text":"二、在道众初步觉悟的基础上，组织党团员、民兵、村干和代表中的积极分子，广泛进行宣传揭露工作，组织群众座谈，动员觉悟分子诉苦，激起群众性的诉苦回忆运动，大家都想到：想治病的病未好，想发财的生活更苦了，全村只喂着两口猪，20多个大闺女不找对象，4个寡妇不嫁人，40多个男人不娶老婆。领导上再用这些灾难事例，引导道徒认识其由来，将仇视集中于道首，在群众压力下，道首交出反动“训文”和骗索的衣服、登云鞋、烟土、银器等等，随即举行展览会。群众看见自己被骗去的财物，均叫骂不已，深感党和政府对他们的关怀，说：“过去你们（指工作组）找我们谈，还不敢谈，现在我们找着来谈了”。","type":"paragraph"},{"text":"……","type":"paragraph"},{"text":"三、最后在群众愤怒情绪要求下，召开群众大会，斗争道首，会上，有的痛哭流涕，诉说受灾情景，有的指问道首，要求退出掠夺的财物。在群众觉悟了的基础上，造成了退道运动，除4个道首完全陷于孤立，尚有犹豫外，全村500余道众全部退了道，该村的取缔工作大大影响了附近村庄。”","type":"paragraph"}],"comments":[],"origin":"《取缔反动会道门工作历史资料汇编（1948－1992年）》，公安部一局编印， 2009年。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5dc19c4670"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
