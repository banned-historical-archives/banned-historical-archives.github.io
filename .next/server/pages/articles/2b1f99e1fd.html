script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"云南四所高等院校中部分团员动摇或叛变","authors":["田良耕","黄昌禄"],"dates":[{"year":1957,"month":6,"day":18}],"is_range_date":false,"parts":[{"text":"云南四所高等院校中部分团员动摇或叛变","type":"title"},{"text":"田良耕黄昌禄","type":"authors"},{"text":"新华社昆明18日讯  云南大学、昆明师范学院、昆明工学院和昆明医学院的五千多个大学生听了毛主席关于正确处理人民内部矛盾报告的传达后，在6月上旬和中旬先后形成“鸣”、“放”的高潮。上述四校学生共青团员中有一部分由于政治锻炼差、立场不坚定，为右派分子的言论所迷惑，因而在风浪中迷失了方向、站不稳脚，发生动摇甚至叛变。最突出的如云南大学中文系团员。有一半叛变，昆明师范学院物理系三年级的二十五个团员中，有五人叛变，全校每个班都有一、二团员叛变，思想动摇者更多些。","type":"paragraph"},{"text":"大多数叛变团员在右派分子的煽动和群众压力下，泄露肃反时的秘密和团内的情况。昆明师范学院数学专修科二年级的团支委穆国清向群众泄露了学校根据高教部指示布置团员了解毕业学生的思想情况，这个情况被右派分子朱成一歪曲说学校开“黑名单”，煽动学生要挟人事处将名单交出来。物理系三年级班上有三个在肃反时期担任过小组长的团员，在右派的压力下将肃反时内部掌握的斗争方法、策略全部讲出来，并向大家承认错误，说当时是“出卖了良心”。中文专修科一年级的团支书周华将团内对团员的排队分类情况向群众公开，说是有上、中、下等团员，群众听说团员也有高低之分，影响很坏。","type":"paragraph"},{"text":"有一些叛变的团员附和大字报上或学校出现的其它反动言论。云南大学中文系二年级学生胡永文因前些时候同交通厅一些闹事的人有联系，而受到公安厅询问(通过学生科)，于是他便写了一篇题为“我的控诉”大字报，控诉学生科是特务组织，号召大家签名抗议。昆明工学院的团支委冉正立跟着右派分子在会上说：“党是墙、团是沟、积极分子是铁丝网”。","type":"paragraph"},{"text":"也有个别团员参加右派分子操纵的小集团，向党猖狂进攻或带头闹事。云南大学出现了一张名叫“小小民主”的大字报，观点最反动，中文系四年级的团支书(党员)是这张大字报最积极的撰稿人之一。昆明师范学院历史专修科二年级团员荣廷显攻击班上两个党员，说“一个是红旗上的白点，一个是红旗上的污点”。他并主持改选班会，把除他以外的党团员全部选掉。有的团员甚至参加写反动联名信，参加小型的请愿。","type":"paragraph"},{"text":" 来源：1957年6月25日新华通讯社编《内部参考》。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"人民内部矛盾","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2b1f99e1fd"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
