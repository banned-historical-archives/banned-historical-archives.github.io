" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji27","name":"毛泽东全集第27卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji27.pdf"],"article":{"title":"对举行平凉战役以及西进作战的意见","alias":"","parts":[{"type":"paragraph","text":"对举行平凉战役以及西进作战的意见"},{"type":"paragraph","text":"（1949年7月23日）德怀同志："},{"type":"paragraph","text":"午贺电?悉。打胡胜利极大，甚慰。不顾热天乘胜举行打马“战役是很对的。打完这一仗应休整一短期，然后再进，惟休整时间亦不宜太长，以恢复疲劳，整顿队势，补充缺额为原则。如能于八月上半月完成打马战役，休整半月至一月，九月西进，十月占领兰州、西宁及甘凉肃三州，则有可能于冬季占领迪化，不必等到明春。辰兄极盼早占新疆，彼可给以种种协助，包括几十架飞机的助战。少奇、高岗、稼祥现在彼处，只要你们进军计划确定，彼方即可考虑协助问题。关于定购大批汽车问题有两种办法：一种是购"},{"type":"paragraph","text":"[1]德怀，即彭德怀，当时任第一野战军司令员兼政治委员。"},{"type":"paragraph","text":"[2]指1949年7月20日彭德怀给毛泽东的电报。电报说，（一）在扶眉战役中，胡宗南部损失约5万人。（二）为解放甘肃、宁夏、青海三省，准备今冬入四川，明春夏入新疆，请向某方订购汽车1000至2000辆，供西北军用。（三）宁夏卢忠良、青海马继援各率三军准备退守平凉、陇县、泾川地区，配置相当分散，有各个歼击可能。我以10个军，26日开始攻击。"},{"type":"paragraph","text":"[3]胡，指胡宗南，当时任国民党军西安绥靖公署主任。"},{"type":"paragraph","text":"[4]马，指青海马步芳、宁夏马鸿逵，当时分别任国民党军西北军政长官公署代理长官和副长官。"},{"type":"paragraph","text":"[5]辰兄，指苏联。"},{"type":"paragraph","text":"对举行平凉战役以及西进作战的意见来后，经东北、华北转至西北，然后我军利用这批汽车进军新疆，如此则时间可能拖得长些，要明春或甚至夏季才能入疆。一种是利用现在少数汽车及从兰州、西宁可能缴获之车辆即行入疆，到达后再从伊犁方向输入汽车及其他工业装备，如此则时间可以缩短。究以何者为宜，请加斟酌电告。照我想，只要平凉战役“能歼两马主力，则西北战局即可基本上解决。往后占领甘、宁、青、新四省基本上只是走路和接管问题，没有严重的作战问题。辰兄又能用空军协助，则占领新疆是不难的。此事请于平凉战役结束后与王震?等同志商酌，电告你们的意见。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"午梗"},{"type":"paragraph","text":"[1]平凉战役，即陇东追击战。1949年7月扶眉战役后，第一野战军决心乘胡宗南、马步芳两部彼此远离之机，以第十八兵团主力于宝鸡、西安一线钳制胡宗南部，以第一、第二、第十九兵团聚歼青宁“二马”主力于平凉、泾州地区。7月21日至24日，我军先后由乾县、礼泉、凤翔、宝鸡地区出动。同月24日，青海马步芳、宁夏马鸿逹于陇东布防，企图阻止第一野战军沿西兰公路挺进甘肃、宁夏。但马步芳、马鸿逵为保存各自的实力，在我军主力尚未迫近时即分别后撤。我军乘机向陇东实施追击，至8月10日，歼敌万余，解放了陇东广大地区。"},{"type":"paragraph","text":"[2]王震，当时任第一野战军第一兵团司令员兼政治委员。"}],"authors":["毛泽东"],"dates":[{"year":1949,"month":7,"day":23}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":73,"page_end":74},"tags":[{"name":"毛泽东","type":"人物"},{"name":"王震","type":"人物"},{"name":"彭德怀","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"eb67b5a6da"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
