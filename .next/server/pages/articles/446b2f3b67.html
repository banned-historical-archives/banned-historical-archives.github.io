script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji29","name":"毛泽东全集第29卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji29.pdf"],"article":{"title":"关于转发西南军区剿匪简报第四号的电报","alias":"","parts":[{"type":"paragraph","text":"关于转发西南军区剿简报第四号的电报"},{"type":"paragraph","text":"（1950年11月16日）华南分局及广东军区，广西省委及广西军区，并告邓、谭、赵\"："},{"type":"paragraph","text":"兹将西南军区剿匪简报第四号转发给你们作参考。西南军区对于剿匪工作极为认真，剿匪中执行的各项政策亦是正确的，故取得了很大成绩。广西解放在西南之前而剿匪成绩则落在西南之后，为什么这样，请你们加以检讨并以结果告诉我们。我提议广西军区从十二月份起仿照西南办法每月发一次剿匪通报，总结战绩，纠正缺点，务使全省匪患在几个月内基本解决。如何，盼复。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十一月十六日"},{"type":"paragraph","text":"[1]邓，指邓子恢，当时任中国人民解放军中南军区第二政治委员。谭，指谭政，当时任中国人民解放军中南军区第三政治委员。赵，指赵尔陆，当时任中国人民解放军中南军区参谋长。"}],"authors":["毛泽东"],"dates":[{"year":1950,"month":11,"day":16}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":370,"page_end":370},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"446b2f3b67"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
