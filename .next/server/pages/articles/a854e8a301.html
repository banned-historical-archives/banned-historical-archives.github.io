<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"谈资产阶级的“父子感情”","authors":["许诺"],"dates":[{"year":1952,"month":3,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"许诺"},{"type":"paragraph","text":"五反运动以来，我们通过了不少次学习。但有一部份同志却只限于能说一套或写一套“资产阶级的本质”、“对国家的危害”以及“要向奸商开火”等如此这般的大道理，而没有或不够积极地投入战斗。最具体表现的是:他们在小组会上夸夸其谈，会后却不动声色了。在我们南京一中学校里的一部份工商界子弟同学就是这样:尽管白天在校内说了:“我要……我要……。”劲头也大；但晚上回到家里真的搞起来却又不够劲。他们反应说:“我已经认识到资产阶级的丑恶面目和本质了；但感情上就是很不起来。”究竟他们想着什么呢?他们说:“我家父亲老实、忠厚，待我很好，照顾我又舒服又周到。”这种人被“父子感情”的绳索扣住了，认为:“父亲对我有‘感情’”，究竟这是什么“感情”呢?!"},{"type":"paragraph","text":"二月廿八日南京新华日报发表了汇文女中学生李雯的控诉:奸商父亲为贿赂干部，逼令她与当地公安派出所所长交好，逼着她常常出去陪他看戏、吃馆子、逛马路等等，奸商父亲见这个所长被调职他往，于是又逼令她和他断绝往来，为此，半夜用粗棍毒打她。又:该校初一小同学徐景云也控诉了，她母亲对受贿干部说:“我女儿学校里女同学多得很，叫她常常把她们带来玩，你看中那个，我一介绍保证成功。”这两个活生生的事实中可以看出:资产阶级的“父子感情”是什么?!是为了达到他们发横财的目的，逼令子女任其所欲，来勾引干部；是逼令子女陪同受贿干部吃馆子、逛马路、看戏；是半夜里用粗棍子毫不痛惜的毒打；是把女儿当做东西一样的赠送和出卖；请看看最丑恶、最肮脏、最无耻的事实!"},{"type":"paragraph","text":"不错，也许确有如他们说的:“我家父亲却没有这样逼令我；只不过是常常问寒暖、问饱饥、给钞票、买皮鞋、买钢笔。”但是，请仔细地考虑一下:他为什么要这样?他又日夜在盘算些什么——发大财做大官!——可以如何如何了。难道还不明显吗?他正是拿你做了工具啦，打算着你能满足他甚么呀!"},{"type":"paragraph","text":"资产阶级追求的是利润，爱的是钱财。为此，他不惜用任何方式手段，甚至害了儿子、卖了女儿。其实，这是不奇怪的，因为，资产阶级的“父子感情”就是建筑在他发财的基础上的。"},{"type":"paragraph","text":"李雯、徐景云同学等的例子已有力的证明了:大敌当前，不可被资产阶级的“父子感情”麻醉了思想、蒙住了眼睛，要看清真面目和本质。让我们相互警惕，万不可给敌人圈套扣在自己脖子上，万不可在敌人面前解除武装，而丧失了青年学生的人民立场。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a854e8a301"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
