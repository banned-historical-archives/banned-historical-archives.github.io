script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"抗议垄断资本家的残酷剥削  意大利一些地方工人英勇占领工厂和市政厅  西西里区两千多农民示威，包围省长办公室占领火车站","authors":[],"dates":[{"year":1969,"month":2,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"抗议垄断资本家的残酷剥削"},{"type":"paragraph","text":"意大利一些地方工人英勇占领工厂和市政厅"},{"type":"paragraph","text":"西西里区两千多农民示威，包围省长办公室占领火车站"},{"type":"paragraph","text":"新华社九日讯　罗马消息：意大利一些地方的工人和农民占领工厂、火车站和政府机关，抗议垄断资本家的残酷剥削。他们的斗争得到广大工人和学生的支持。"},{"type":"paragraph","text":"北部威尼托区维琴察省瓦尔达尼奥地方“马佐托”毛纺工厂的五千名罢工工人抗议资本家残酷剥削，在一月二十四日占领了工厂。目前，罢工工人坚持占领工厂。七日，罢工工人在城市周围设置了路障，断绝了一切来往交通。许多工人举着伟大领袖毛主席的画像，并且高呼“革命！革命！”的口号。"},{"type":"paragraph","text":"八日，威尼托区工人举行全区性总罢工，声援占领“马佐托”工厂的工人。威尼托区的学生也参加了支援“马佐托”工厂工人的斗争。工人和学生的代表团从区的各地向瓦尔达尼奥集中，同“马佐托”的工人一起举行了声势浩大的街头示威。"},{"type":"paragraph","text":"在邻近的佛留利—威尼斯朱利亚区的工业中心蒙法尔康，几百名举行罢工的造船工人几天来占领了市政厅。这个城市的工人和学生举行了声援性罢工、罢课和街头示威。"},{"type":"paragraph","text":"意大利南部西西里区的卡塔尼亚农民，七日举行了声势浩大的示威，抗议垄断企业为了攫取更多利润，压低桔类的收购价格，并且抗议政府为垄断企业服务，不顾农民死活。当地的省长办公室的窗子被包围大楼的示威者投掷的水果砸得粉碎。两千多名示威者占领了火车站，坐在铁轨上，使得进出这个城市的铁路交通中断了几个小时。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"878db55f01"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
