script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"西安附近发现38座商代墓葬  其中20座墓内有殉葬奴隶91人","authors":["王煌彦"],"dates":[{"year":1987,"month":11,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"西安附近发现38座商代墓葬"},{"type":"paragraph","text":"其中20座墓内有殉葬奴隶91人"},{"type":"paragraph","text":"据新华社西安11月9日电  （记者王煌彦）西北大学历史系考古专业师生在西安以东的老牛坡，发现了38座商代墓葬。专家们认为，这是陕西地区考古工作的一次重大发现，对研究陕西地区商代文化提供了极为重要的资料。"},{"type":"paragraph","text":"西北大学师生是从1985年开始在老牛坡进行发掘的。2年来，他们发掘面积达5000多平方米，共发现45座墓葬，其中38座为商代墓。这些墓均为竖穴土坑，没有墓道。大体可分为单人墓、小型殉人墓、中型殉人墓三种类型。专家们认为，这些墓同殷墟和其它地方的商墓有三点不同：一是在中型殉人墓的椁室里，发现了我国最早的边箱形制。椁室是用两条长木板，顺着尸身方向将其分隔为三个条形空间，中间部分较大，作为棺室，两边部分稍窄，为边箱。边箱内殉葬奴隶，这与春秋战国时期的边箱作用不同；二是一墓多坑制。这些墓除与其它商墓同样有中心腰坑外，有的还在墓主人头下、脚下设坑，甚至墓的四角也有坑。这些坑内，均殉葬狗；三是殉人较多。发现有20座墓内殉人，每墓殉人1—10余人不等，共殉葬91人。比1983年以前全国各地发现的同类型商代殉人墓中殉葬的奴隶的总和还多。"},{"type":"paragraph","text":"在墓葬区，发现了一座车马坑，为一车二马。遗迹清晰可见。这是在殷墟以外发现的第一个商代车马坑。此外，还发现了大型夯土房基址两处，以及冶铜、制陶遗址，从中出土了一批青铜器、陶器、陶范等商代文物。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"陕西文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"275b4efd34"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
