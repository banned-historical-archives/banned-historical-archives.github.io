" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji32","name":"毛泽东全集第32卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji32.pdf"],"article":{"title":"给黄炎培的信","alias":"","parts":[{"type":"paragraph","text":"给黄炎培的信"},{"type":"paragraph","text":"（1952年6月10日）任之先生："},{"type":"paragraph","text":"六月八日惠书收到。一八四○年是林则徐领导广州民众反抗英国进攻的那一年，即所谓鸦片战争的那一年，不是说陈胜吴广3，先生记错了。中国现代的革命，首先和最主要的目标是反对帝国主义的侵略，故可以上溯到反鸦片战争的林则徐及广州的“平英团”，上溯到二千余年前去纪念陈胜昊广，则太远了，那是古代的农民起义，不是现代的革命。此复。顺致敬意"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"六月十日[1]黄炎培，字任之，民主建国会主要负责人。当时任政务院副总理。"},{"type":"paragraph","text":"[2]林则徐，福建侯官（今福州）人。1840年鸦片战争时，任两广总督，是清朝官员中抵抗派的首领。"},{"type":"paragraph","text":"[3]陈胜、吴广，是秦末农民起义的领袖。"}],"authors":["毛泽东"],"dates":[{"year":1952,"month":6,"day":10}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":133,"page_end":133},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ba6794069d"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
