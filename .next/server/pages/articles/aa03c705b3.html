script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"朝鲜作家同盟中央扩大全会提出当前任务大力创作革命作品　反对现代修正主义","authors":[],"dates":[{"year":1964,"month":5,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据朝鲜《文学新闻》报道，朝鲜作家同盟中央委员会最近举行第八次扩大全会，强调要大力创作优秀的革命巨著——以工人阶级思想和不屈不挠的革命精神武装劳动人民的生活教科书。"},{"type":"paragraph","text":"报道说，朝鲜作家同盟中央委员会副委员长崔荣化在会上作了报告。他说，朝鲜人民群众的思想意识和创造性劳动有了巨大的变化。新的变化给文化工作者提出了更艰巨的革命任务。"},{"type":"paragraph","text":"他说，为了实现这个任务，首先要写出反映党的革命光荣传统的作品，塑造抗日游击队员(共产主义者)和现代工人阶级的英雄的不朽形象。革命传统的主题不仅是当前文学的基本创作主题，而且是世世代代永远继承下去的创作主题。同时，还要创作反映千里马时代的主人公——工人阶级形象的巨著，用工人阶级的革命思想、斗争精神和道德品质来教育人民和新的一代。"},{"type":"paragraph","text":"崔荣化还指出要创作反映朝鲜人民要求统一祖国的愿望和斗争，反映南朝鲜人民要求统一祖国的愿望和斗争，反映南朝鲜现实和南朝鲜人民反美救国斗争，反映祖国解放战争时期在前方奋勇杀敌的人民军和后方人民奋勇斗争的作品。"},{"type":"paragraph","text":"崔荣化说，应该提高文学的思想性和艺术性。根据马克思列宁主义的美学原则，思想性占第一位，艺术性从属于思想性。要反对把思想性摆在第二位、把艺术性放在首要地位的一切反动的资产阶级美学理论，反对“纯艺术论”，反对现代修正主义的反马克思列宁主义的美学理论和阴谋。他说，思想性和艺术性是统一的。"},{"type":"paragraph","text":"崔荣化号召作家们用马克思列宁主义的世界观和党的文艺政策武装起来，深入到现场去体验生活，以革命的精神来生活、学习和创作，并注意培养新人。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"aa03c705b3"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
