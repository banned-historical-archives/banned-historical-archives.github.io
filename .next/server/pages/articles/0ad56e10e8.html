" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji31","name":"毛泽东全集第31卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji31.pdf"],"article":{"title":"对集宁军分区三反斗争情况报告的批语","alias":"","parts":[{"type":"paragraph","text":"对遵义军分区关于三反运动的"},{"type":"paragraph","text":"综合报告的批语"},{"type":"paragraph","text":"（1952年1月14日）各大军区，志愿军，并转各级军区和各军；各中央局，并转分局、省市区党委："},{"type":"paragraph","text":"遵义分区这个报告比刚才转发的集宁分区的报告接近事实得多。一个分区，一个军，一个小市，一个县，必定有大批的贪污犯，这是决然无疑的。凡说那里只有浪费而无贪污，或贪污甚少者，必不可靠，千万不要相信。在一阵风停止浪费之后，必须立即穷追贪污。不能自己解决贪污问题者，上级应即派遣检查组下去督追，务将一切贪污分子追出而后止。在一个分区或一个军的范围内完成三反任务，至少须一个月，不能让其草草结束，请你们严格注意。在一个县，或一个小市，则时间还要长一点。就一个机关而论，则有半个月的猛烈斗争就差不多了。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一月十四日"},{"type":"paragraph","text":"[1]指中国人民解放军遵义军分区1952年1月5日关于三反运动的综合报告，报告着重汇报了分区领导抓紧布置反贪污斗争的情况和所取得的初步成果。"},{"type":"paragraph","text":"[2]指毛泽东1952年1月14日转发的中国人民解放军集宁军分区关于三反情况的报告。"}],"authors":["毛泽东"],"dates":[{"year":1952,"month":1,"day":14}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":266,"page_end":266},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0ad56e10e8"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
