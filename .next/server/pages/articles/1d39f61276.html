script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"德呼吁加强国际合作反对极右势力　意群众抗议奥极右政党领导人来访","authors":["刘儒庭","吕鸿","王东"],"dates":[{"year":2000,"month":12,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"德呼吁加强国际合作反对极右势力　意群众抗议奥极右政党领导人来访"},{"type":"paragraph","text":"新华社柏林12月16日电 （记者王东、吕鸿）德国内政部长席利16日呼吁加强反对极右势力的国际合作，特别是要防止极右势力利用因特网扩大影响。"},{"type":"paragraph","text":"席利在德国卡尔斯鲁厄市举行的一次社会民主党会议上说，根据最新的统计数字，目前世界上约有800个散布极右思想的网站，其中90％以上是在美国和加拿大注册的，因此在这方面加强国际合作，共同打击极右势力非常必要。"},{"type":"paragraph","text":"为了加强对网上极右宣传的控制，设在卡尔斯鲁厄的德国宪法法院日前首次作出了在网上散布纳粹思想的外国人也要受到德国法律制裁的裁决。"},{"type":"paragraph","text":"另据报道，德国反极右示威活动近日又掀起高潮。约2000人16日在多特蒙德市举行了反对极右势力的示威游行。15日晚，一些知名的艺术家在莱比锡举行音乐会，表达对新纳粹的抗议和对其受害者的同情。艺术家们将音乐会的全部收入捐给了极右暴力事件的受害者。"},{"type":"paragraph","text":"新华社罗马12月16日电 （记者刘儒庭）意大利罗马群众16日举行游行和静坐等示威活动，抗议奥地利极右翼自由党前领导人海德尔当日借故访问罗马。"},{"type":"paragraph","text":"海德尔曾因发表亲纳粹和排外言论引起欧洲各国的强烈抗议。他领导的极右翼自由党今年初与人民党组成奥地利联合政府后，欧盟各国对奥地利实施了政治制裁，海德尔被迫辞去自由党主席职务，但他仍是奥地利克恩滕州州长。他这次是利用代表该州向梵蒂冈赠送一棵圣诞树的机会前来罗马的。"},{"type":"paragraph","text":"16日上午，5000多名罗马学生在市中心街道举行了示威游行，他们唱着南斯拉夫电影《桥》的插曲等游击队歌曲，高举的标语牌上写着“历史不会忘记纳粹法西斯分子”、“海德尔滚回去”等口号。下午，一些罗马人又在一个公园举行了反对海德尔的静坐示威，并将一个贴有纳粹集中营照片的大标语牌送往梵蒂冈。"},{"type":"paragraph","text":"当天，罗马所有犹太人开办的商店也响应犹太人联合会的号召，从18时开始将商店的灯熄灭半小时，以示对海德尔到罗马活动表示抗议。罗马其他一些商店也同时熄灯表示声援。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1d39f61276"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
