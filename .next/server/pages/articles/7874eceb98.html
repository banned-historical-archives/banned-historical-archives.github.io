script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"理解“奴隶们创造历史”的含义要从实际出发","authors":["伍哲"],"dates":[{"year":1980,"month":6,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"空军政治学校　伍哲"},{"type":"paragraph","text":"本报四月二十五日发表了余霖、安延明的文章《历史是整个人类创造的》，对“奴隶创造历史论”的观点提出质疑。一个多月来我们陆续收到不少读者来信来稿，为贯彻“双百”方针，活跃学术空气，现将部分信稿摘编发表如下。"},{"type":"paragraph","text":"——编者"},{"type":"paragraph","text":"“奴隶们创造历史”这个观点，它的含义是什么呢?指的是在肯定人民群众对于历史的发展具有决定作用的前提下，承认杰出人物(英雄)的活动对于推动历史的发展也具有重大的作用。因此，一般人都习惯地把“创造”两字当作“推动”来理解的。对“是英雄创造历史，还是奴隶们创造历史”这个命题，我们不能理解为只有奴隶创造历史，英雄对历史发展不起作用。毛泽东同志在这里是为了说明英雄人物的作用“主要地不是由于人们的天才，而是由于人们的社会实践”这个问题，而不是《历史是整个人类创造的》一文中说的那种根本否定英雄作用的“奴隶论”思想。"},{"type":"paragraph","text":"是不是在马恩列斯的著作中，没有“奴隶们创造历史”的提法呢?这要从实际内容去分析，而且还要看到当时的历史情况。《历史是整个人类创造的》一文中引用的马克思“历史首先是生产者的历史”这句话，说明当时就已经明确提出了劳动人民是历史发展首要的基本的力量。列宁也提出过正确处理群众、阶级、政党、领袖的著名论断。我们党和毛泽东同志提出“群众是真正的英雄”、“甘当群众小学生”等名言，都是对马克思主义唯物史观的丰富和发展。因此，当我们分析“是英雄创造历史，还是奴隶们创造历史”的命题时，也应该看到它正是为了批判林彪的“英雄史观”、“天才论”。如果离开当时的历史情况，离开它包含的实际内容，只从字面上去解释，把它等同于“英雄史观”臆造的“英雄”与“奴隶”的绝对对立，那就太武断了。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7874eceb98"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
