script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"印度资产阶级报纸近来满纸火药气味　大叫大嚷要用武力解决中印边界争端　鼓吹印度军队继续非法侵占中国领土","authors":[],"dates":[{"year":1962,"month":7,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"印度资产阶级报纸近来满纸火药气味"},{"type":"paragraph","text":"大叫大嚷要用武力解决中印边界争端"},{"type":"paragraph","text":"鼓吹印度军队继续非法侵占中国领土"},{"type":"paragraph","text":"新华社23日讯　新德里消息：印度资产阶级报纸最近发表了不少充满火药气味的社论和文章，叫嚷用武力来解决中印边界争端，并鼓吹印度军队继续非法侵占中国领土。"},{"type":"paragraph","text":"《印度斯坦旗报》在7月16日的社论中说，“潘查希拉只有在有武力做后盾的时候才有意义。”社论说，“我们现在必须做的事情，就是保卫我们已经建立起来的任何一个据点”，并且认为，“决心再加上军事实力，大半会产生预期的结果”。"},{"type":"paragraph","text":"社论还说，在中印边界的西段和其他地段，“由于采取了各种措施，印度的军事地位已经改善了”。社论说，如果印度真的在中印边境地区“给中国人一个冷不防，中国可能不得不走开”。"},{"type":"paragraph","text":"《印度快报》7月13日的社论认为中印边界争端已经“转移到双方军队实际的对抗”的阶段，并威胁说，如果中国方面“制造任何麻烦”，“就会发生流血冲突”。这家报纸还认为，夏季是中印边界西段地区的“非常短暂的作战季节”。"},{"type":"paragraph","text":"《印度时报》在7月13日提出印度方面“必须冒冲突的危险”继续派遣军队支援入侵的印军的主张。《印度时报》还在6月21日发表社论，鼓吹印度继续“加强边界防务，在凡是必要的地方，不管环境多么困难，都要建立军事哨所”。这家报纸还说，“中印边界争端不会在可预见的将来得到解决，它将拖延几年，甚至几十年。”"},{"type":"paragraph","text":"《印度斯坦旗报》7月14日发表社论表示热烈赞扬侵入中国新疆加勒万河谷地区的印度军队“守住前哨据点的决心”。这家报纸在8日刊登的一篇文章竟然主张印度政府“取消它对中国在西藏的主权的承认”。文章说，“印度承认中国对西藏的主权，对印度的领土完整具有潜在的危险”。"},{"type":"paragraph","text":"《论坛报》在6月4日的社论中也强调印度“必须建立更大的军事力量”来对付中国。"},{"type":"paragraph","text":"《甘露市场报》6月5日在一条从伦敦发来的消息中，引用今年上半年曾同印度国防部长梅农举行会谈“分析中印冲突的严重性”的保罗·约翰逊的话说，“当我最近访问德里时，我发现各方面日益增长的必要时诉诸武力的决心。克里希纳·梅农直率地对我说，如果外交失败的话，将使用军事手段。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"80a65ec71d"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
