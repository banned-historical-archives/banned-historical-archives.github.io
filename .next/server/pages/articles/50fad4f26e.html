script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoistlegacy.de-2367","name":"总政治部转发中组部、中宣部、教育部党组《关于‘文化大革命’期间高等院校学生造反组织重要头头记录在案工作的意见》的通知","author":"总政治部","internal":false,"official":false,"type":"unknown","files":[],"article":{"title":"总政治部转发中组部、中宣部、教育部党组《关于‘文化大革命’期间高等院校学生造反组织重要头头记录在案工作的意见》的通知","dates":[{"year":1983,"month":7,"day":18}],"is_range_date":false,"authors":["中共中央宣传部","中共中央组织部","中共教育部党组","总政治部"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"成都军区整党办公室, 清理“三种人”工作文件摘编, 28-30","tags":[{"name":"记录在案","type":"主题/事件"},{"name":"造反派","type":"主题/事件"}],"parts":[{"type":"title","text":"总政治部转发中组部、中宣部、教育部党组《关于“文化大革命”期间高等院校学生造反组织重要头头记录在案工作的意见》的通知"},{"type":"subtitle","text":"〔1983〕政干字368号"},{"type":"subtitle","text":"（一九八三年七月十八日）"},{"type":"paragraph","text":"现将中共中央组织部、宣传部和教育部党组《关于“文化大革命”期间高等院校学生造反组织重要头头记录在案工作的意见》（中组发〔1983〕6号文件），转发你们，请按照文件的要求，认真做好这项工作。"},{"type":"paragraph","text":"凡“文化大革命”中开展“四大”的军队院校，都应在院校党委领导下，组织专门力量办理记录在案工作。合并的院校，由合并后的院校党委负责。已撤销的院校，按院校原隶属关系，分别由各大单位指定有关部门办理。其中原高等军事学院、南京军事学院由军事学院负责；原石家庄、汉口高级步校，分别由北京军区、武汉军区负责；原长沙政治学校由广州军区负责。各单位应将院校学员和教职工中造反组织的重要头头和有严重问题的人的材料，经过认真调查核实后，及时转给这些人所在单位。部队转至师以上单位干部部门；地方转至县、市委以上组织部门。被记录人去向不明的，可将材料转至各大单位政治部干部部，查明下落后再转递。各大单位要将被记录人汇总造册，报总政治部备案。"},{"type":"paragraph","text":"对被记录人要加强思想政治工作，使他们懂得，组织上对他们在“文化大革命”期间的错误进行考察是完全必要的。这对组织全面了解干部和促使他们认真总结经验教训，都是有好处的。党的一贯政策是：处理历史问题从宽，重在现实表现，允许犯错误的同志改正错误，将功补过。"},{"type":"paragraph","text":"今后，凡从“文化大革命”期间的高等院校在校学生中选拔领导干部、配备要害岗位人员和选派出国人员，用人单位都必须主动与这些干部原所在院校联系，取得他们在校期间的表现材料。高等院校党组织应予积极协助。"},{"type":"paragraph","text":"附：成都军区政治部转发总政治部转发中组部、中宣部、教育部党组《关于“文化大革命”期间高等院校学生造反组织重要头头记录在案工作的意见》（摘录）"},{"type":"subtitle","text":"（83）政干字104号"},{"type":"subtitle","text":"（一九八三年八月十八日）"},{"type":"paragraph","text":"……"},{"type":"paragraph","text":"军区学校的记录在案工作，根据总政通知精神，军区确定：军区原步校由陆军学校负责，军区原卫校由军区后勤部负责，西藏军区原步校、卫校由西藏军区负责。各单位应将原学校学员和教职工中造反组织的重要头头和有严重问题的人的材料，经过认真调查核实后，及时转给这些人现所在单位。记录在案工作应于明年三月底完成。记录在案工作结束后，各单位要将被记录的人汇总造册，报军区政治部。"}],"alias":""},"tags":[{"name":"西藏文革","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"50fad4f26e"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
