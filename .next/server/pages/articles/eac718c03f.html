script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"日本著名人士热烈赞扬禁止核弹世界大会巨大成就  坚决反对美帝侵略政策和“美苏合作”  修正主义者“和平共处”路线彻底破产  畑中指出苏联口头支持越南人民斗争却派人参加不反美的分裂小会","authors":[],"dates":[{"year":1965,"month":8,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"日本著名人士热烈赞扬禁止核弹世界大会巨大成就"},{"type":"paragraph","text":"坚决反对美帝侵略政策和“美苏合作”  修正主义者“和平共处”路线彻底破产"},{"type":"paragraph","text":"畑中指出苏联口头支持越南人民斗争却派人参加不反美的分裂小会"},{"type":"paragraph","text":"新华社东京五日电　日本著名人士四日对中国记者发表谈话，热烈赞扬第十一届禁止原子弹氢弹世界大会所取得的巨大成就。"},{"type":"paragraph","text":"日本和平委员会会长平野义太郎强调指出，这次世界大会明确地提出了一条同修正主义者相对立的路线，这条路线是坚定地反对美帝国主义的侵略政策和战争政策和反对“美苏合作”。"},{"type":"paragraph","text":"他说，贯穿这届世界大会的一个中心课题是反对美国侵略越南。平野进一步指出，所谓“反对任何国家的核试验”和“美苏和平共处总路线”，已经遭到彻底破产。"},{"type":"paragraph","text":"平野指出，出席这次大会的日本代表都是从三百万人集会和网状游行队伍中产生的和平运动的战士。同时，出席大会的国际代表，几乎都是来自反美斗争前线的战士。因此，这次世界大会的水平特别高。"},{"type":"paragraph","text":"他说，分裂小会和现代修正主义者只谈反对战争和反对垄断资本，而闭眼不看日本已经变成美国进行侵略的轰炸基地这一事实，并且掩盖美国的侵略本质。它在越南问题上，推行“和谈”骗局，这显然是在欺骗群众。"},{"type":"paragraph","text":"日本禁止原子弹氢弹协议会代表理事畑中政春说，出席本届大会的代表人数是空前的，说明日本禁止原子弹氢弹协议会所开展的禁止核武器运动，得到了日本和世界亿万群众越来越广泛的支持。相反，分裂小会却显得毫无生气，冷冷落落，在国际国内都得不到人民的支持，陷于孤立，难以存在。"},{"type":"paragraph","text":"畑中指出，苏联口头上讲支持越南人民的斗争，但是却派红十字会代表参加不反对美帝国主义的分裂小会，这是企图给奄奄一息的分裂小会打强心剂，使它起死回生。但是，尽管这样，坚持正确路线的第十一届世界大会，同分裂小会之间的胜败已经决定了。"},{"type":"paragraph","text":"日本禁止原子弹氢弹广岛协议会会长、广岛大学名誉教授铃木直吉说，日本科学家在本届大会上显示了强大的力量。他表示，科学家要对社会负责，绝不为侵略战争服务。"},{"type":"paragraph","text":"他说，分裂主义者的“理论”已经彻底破产了。特别是年轻的一代，通过这届大会，提高了觉悟，更加认清了侵略战争根源是美帝国主义。"},{"type":"paragraph","text":"据新华社东京四日电　日本禁止原子弹氢弹协议会代表理事、广岛大学教授佐久间澄昨天发表谈话说，“第十一届世界大会证明正确的和平路线已为全世界和平运动的战士所肯定”。"},{"type":"paragraph","text":"佐久间说，日本和各国代表在世界大会上坚持正确的路线，发挥巨大的创造性和智慧，克服了重重困难，粉碎了国内外分裂主义者的阴谋活动，把禁止原子弹氢弹运动推向了新的高潮。"},{"type":"paragraph","text":"佐久间说，美帝国主义、日本反动派和现代修正主义，长久以来就进行分裂日本禁止原子弹氢弹运动的活动，企图把“反对任何国家的核试验”和“支持莫斯科三国条约”的错误路线强加给禁止原子弹氢弹运动。但是这些阴谋活动破产了。它们的真面目在国内外都已暴露无遗。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"eac718c03f"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
