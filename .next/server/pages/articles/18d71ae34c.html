" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中央戏剧学院取得初步胜利“卡秋莎”右派集团开始瓦解","authors":[],"dates":[{"year":1957,"month":8,"day":15}],"is_range_date":false,"parts":[{"text":"中央戏剧学院取得初步胜利“卡秋莎”右派集团开始瓦解","type":"title"},{"text":"本报讯  8月15日、16日，中央戏剧学院举行了师生员工大会，揭发与批判“卡秋莎”右派小集团的反党言行，斗争已取得初步胜利。","type":"paragraph"},{"text":"在整风期间，该院教务部的青年团内右派分子仇乃博、谢立琼、戚恩聆和孙德馨相互勾结，向党展开了猖狂进攻。“卡秋莎”主谋人之一谢立琼常到北京大学了解鸣放动向，参加北京大学右派分子谭天荣为首的百花学社的成立大会，并主动与之联系，在学院组织了“卡秋莎报社”。仇乃博则在幕后策划。于是，他们开始了有组织、有计划地向党进攻的阴谋活动。","type":"paragraph"},{"text":"这个小集团向党进攻的第二门炮，是打乱党的整风计划与步骤，反对党的整风方针，反对和风细雨，积极煽动搞大民主。孙德馨嚣张地说：“五十个戚恩聆，二十个孙德馨就可以搞大民主”。这时，学校里到处是他们贴的大字报。和反党诗歌等，对学院的党员领导进行诽谤性的人身攻击。","type":"paragraph"},{"text":"和右派头子罗隆基步调一致，他们极力攻击肃反运动，借此煽惑群众。他们不仅支持“学院肃反运动是以逼供为主，诱供为辅”的反动言论，而且还捏造事实污蔑肃反运动；陈丁沙在党总支门上还贴了反动诗，要求“平反人间冤狱”。","type":"paragraph"},{"text":"当葛佩琦发表了要杀共产党人的反动言论以后，“卡秋莎”马上用大字报转载，并把“杀共产党人……推翻共产党领导，不是不爱国”等话用大红字标出，还加了按语说葛佩琦“道出了某些真理，说出人民群众的心腹话……；”储安平的“党天下”谬论发表后的第二天，陈丁沙就写了“朕即是党”一文进行宣传，证明储安平谬论的正确性；为学院民盟右派集团孙家绣徐步联盟的一员大将尧登佛组织报告会，支持尧公开诬蔑“共产党变质了，共产党员是便衣警察，共产党应离开学校”等反党言论。","type":"paragraph"},{"text":"群众对于这些右派分子异常激愤，表示坚决要与他们斗争到底，不获全胜，决不收兵。","type":"paragraph"},{"text":" 来源：《光明日报》1957年8月23日。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"18d71ae34c"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
