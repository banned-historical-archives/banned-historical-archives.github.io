script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"日共九大一致通过中央委员会报告  日本“入境问题恳谈会”抗议佐藤政府拒绝中共代表团入境  新西兰共产党致日共九大贺电表示坚决反对现代修正主义","authors":[],"dates":[{"year":1964,"month":11,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"日共九大一致通过中央委员会报告"},{"type":"paragraph","text":"日本“入境问题恳谈会”抗议佐藤政府拒绝中共代表团入境"},{"type":"paragraph","text":"新西兰共产党致日共九大贺电表示坚决反对现代修正主义"},{"type":"paragraph","text":"新华社二十八日讯　东京消息：日本共产党第九次代表大会今天在热烈的经久不息的掌声中一致通过了中央委员会的报告和“总结”以及“当前的要求”。"},{"type":"paragraph","text":"大会还一致通过了中央监察检查委员会的报告。"},{"type":"paragraph","text":"大会主席野坂参三在会上讲话时强调指出，“我党掌握了导向胜利的新的武器。这是第九次大会的伟大成就。”"},{"type":"paragraph","text":"在上午的会议上，首先由中央监察检查委员会主席吉田资治作了关于日共八大以后三年来关于党的生活的监察检查报告。"},{"type":"paragraph","text":"吉田强调说，三年来党在消除与现代修正主义国际潮流有关的分子，进一步加强党的思想统一和政治上、组织上的团结方面取得了巨大胜利。"},{"type":"paragraph","text":"接着，政治局委员春日正一报告了党内出现的教条主义偏向问题。"},{"type":"paragraph","text":"下午，总书记宫本显治作了关于中央委员会报告的“总结”，历时约一小时。宫本还提出了“当前的要求”草案。"},{"type":"paragraph","text":"大会在热烈掌声中一致通过了中央委员会的报告、“总结”和“当前要求”。"},{"type":"paragraph","text":"新华社二十八日讯　东京消息：由日中友好协会、日中文化交流协会等三十五个团体组成的“入境问题恳谈会”二十八日发表声明，严重抗议日本政府拒绝中国共产党代表团入境出席日本共产党第九次代表大会。"},{"type":"paragraph","text":"声明要求佐藤政府立即取消拒绝一切外国共产党代表团入境的无理决定。"},{"type":"paragraph","text":"声明说，“日中友好是日中两国人民的共同愿望。进一步发展日中两国人民的往来，是实现这个愿望的重要基础。以北京市长彭真为团长的中国共产党代表团前来日本访问，必将进一步增进由于两国人民的努力而逐年发展的日中友好关系。”"},{"type":"paragraph","text":"声明指出，佐藤内阁拒绝彭真代表团入境在发展日中关系的道路上设置了严重障碍。"},{"type":"paragraph","text":"日中友好协会二十四日发表声明，就此对日本政府提出严重抗议。声明指出，日本政府践踏广大人民的期望，拒绝中国共产党代表团入境，这是不利于日中关系的措施。"},{"type":"paragraph","text":"新华社二十八日讯　东京消息：新西兰共产党给日本共产党第九次代表大会的贺电说：“我们怀着敬意注意到你们在马克思列宁主义原则的基础上采取的坚决立场，注意到你们同包括赫鲁晓夫及其追随者在内的现代修正主义者的分裂活动所进行的坚持不懈的斗争。”"},{"type":"paragraph","text":"这封贺电是由新西兰共产党总书记威尔科克斯签署的。"},{"type":"paragraph","text":"贺电说：“新西兰共产党是建立在马克思列宁主义基础上的，它反对修正主义，而且，为了国际共产主义运动在一九五七年宣言和一九六○年声明基础上的团结，和你们采取了同样坚决的立场。”"},{"type":"paragraph","text":"贺电说：“有人也阴谋分裂我们党，使它背离革命路线而滑到社会民主主义的立场上去。在这个问题上是不可能妥协的。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"彭真","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d4bd32bd14"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
