<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji48","name":"毛泽东全集第48卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji48.pdf"],"article":{"title":"关于军队干部参加地方社会主义教育运动的批语","alias":"","parts":[{"type":"paragraph","text":"关于军队干部参加地方社会主义"},{"type":"paragraph","text":"教育运动的批语！"},{"type":"paragraph","text":"（1965年8月17日）少奇同志阅后，退还罗瑞卿同志。"},{"type":"paragraph","text":"请军委讨论一下：（一）此件可否发到全军参考；（二）全军从排长以上，除年老、重病者外（像郭化若那样的病人，也去浙江搞了一期社教，大有好处，他给了我一个报告，总结了十条经"},{"type":"paragraph","text":"[1]这个批语写在中国人民解放军军事工程学院政治部1965年7月22日关于学员参加农村社会主义教育运动给罗瑞卿并报总政治部、国防科委、黑龙江省委的报告上。报告说，遵照毛主席关于必须学好阶级斗争这门主课的指示，我院组织应届毕业学员和干部1072人，于去年11月下旬至今年6月底，参加了黑龙江省哈尔滨地区阿城县的农村社会主义教育运动。在运动中，大家坚持“三同”“四清”，认真完成各项任务，经受了实际锻炼和考验，绝大多数同志表现很好，无论在自我思想改造还是在开展工作方面，都取得了很大成绩。通过运动，学员们不仅增强了阶级观点、劳动观点、群众观点和辩证唯物主义观点，在阶级感情上有了鲜明的变化，而且在思想方法、政策水平、群众工作和社会活动能力上也都得到了提高。"},{"type":"paragraph","text":"[2]少奇，即刘少奇。"},{"type":"paragraph","text":"[3]罗瑞卿，当时任中共中央军委常委兼秘书长、中国人民解放军总参谋长。"},{"type":"paragraph","text":"[4]郭化若，当时任中国人民解放军南京军区第一副司令员。毛泽东全集第四十八卷验”，现送给你们一阅。我看也可以转发一下，以供老同志们参考。这位同志的思想，几十年来同我总是有些格格不入。现在我看他是通了），一律分期，在两年内（可分四期，每期半年，全军搞完），都到地方参加社教工作。以上是否可行，请你们研究决定。"},{"type":"paragraph","text":"请用电话告林彪同志。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一九六五年八月十七日"},{"type":"paragraph","text":"[1]指郭化若1965年7月31日关于在浙江省萧山县靖江公社黎明大队参加5个月社教运动的情况给毛泽东的报告中所说的10点体会，主要内容是：①听主席的话，照主席的指示办事，主席号召下乡就下乡，改正过去不大听话的错误。②看看十五年来农村新面貌，向接近实际迈出第一步。③接近贫下中农群众，复热了阶级感情，稍减些脱离群众的危险。④走上社会主义时期阶级斗争的前线，参加一次阶级斗争，在斗争中得到锻炼，有助于自已的思想改造。5参加集体生产劳动，以一个普通劳动者身份同贫下中农一起在农田里愉快地劳动，亲切地交谈，群众把我们看成自己人了。从中真正理解到劳动不但是愉快的，也是生活所必需。可以学到生产斗争的经验，“放下臭架子，甘当小学生”，处处向贫下中农请教，可以学到许多生产知识。7得到一次实习机会，参加人民公社五年建设规划的草拟工作，这里面有许多是坐在办公室里想象不到的问题。⑧可实地向地方同志学习，这次学到地方工作同志许多优良作风，也初步了解一点农村基层干部的工作情况。9对干部好作交代，取得了发言权，不是“空口讲白话”。由各单位调来编写战役学的同志听到我下乡蹲点都很关心，说：“他能下乡蹲点，我们更应该去。”蹲了点回去，对部队社会主义教育也将有帮助。①0好向子女交代，以身作则，对他们也有了发言权。学了一点阶级斗争，好在家庭中进行社会主义教育，以补学校教育不足之处。"},{"type":"paragraph","text":"[2]林彪，当时任中共中央副主席、中央军委副主席。"}],"authors":["毛泽东"],"dates":[{"year":1965,"month":8,"day":17}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":167,"page_end":168},"tags":[{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"name":"罗瑞卿","type":"人物"},{"name":"黑龙江文革","type":"人物"},{"name":"浙江文革","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f45000b133"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
