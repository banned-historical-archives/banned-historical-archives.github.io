script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji22","name":"毛泽东全集第22卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji22.pdf"],"article":{"title":"战役战斗上不要平均使用兵力","alias":"","parts":[{"type":"paragraph","text":"战役战斗上不要平均使用兵力"},{"type":"paragraph","text":"（1946年8月22日）刘、邓，并告各首长："},{"type":"paragraph","text":"（一）刘、邓马戌\"电悉。庆祝你们歼敌两个师的大胜利凹"},{"type":"paragraph","text":"（二）望集中主力至少十八个团于路北休整，补充新兵，以利再战。"},{"type":"paragraph","text":"（三）大战方开始，你们必须准备在三四个月内打七八个大仗，一切补充休整应以此为目标。"},{"type":"paragraph","text":"（四）凡无把握之仗不要打，打则必胜；凡与顽正规军作战，每战必须以优势兵力加于敌人，其比例最好是四比一（四千人打一千人，四万人打一万人），至少是三比一，歼其一部，再打另一部，再打第三部，各个击破之。望以此教育干部，克服战役上及战斗上平均用力、普遍求胜之轻敌观念(此观念在许多干部中是存在的)。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"未养[1]马戌，即21日戌时。"},{"type":"paragraph","text":"[2]指晋冀鲁豫野战军1946年8月10日至22日进行的陇海路战役。此役歼灭国民党军整编第五十五师-个半旅和第六十八师-部。"}],"authors":["毛泽东"],"dates":[{"year":1946,"month":8,"day":22}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":89,"page_end":89},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3bf85a8a0d"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
