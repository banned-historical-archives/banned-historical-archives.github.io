" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"毛泽东关于理论问题的谈话要点","authors":["毛泽东"],"dates":[{"year":1974,"month":12}],"is_range_date":false,"parts":[{"text":"关于理论问题的谈话要点","type":"title"},{"text":"毛泽东","type":"authors"},{"text":"毛在听取四届人大筹备工作的汇报后说，这次谈两个问题，一个人事安排，一个理论问题。","type":"paragraph"},{"text":"关于理论问题，毛说，列宁为什么说对资产阶级专政，要写文章。要告诉春桥、文元把列宁著作中好几处提到这个问题的找出来，印大字本送我。大家先读，然后写文章。要春桥写这类文章。这个问题不搞清楚，就会变修正主义。要使全国知道。","type":"paragraph"},{"text":"毛说，我同丹麦首相谈过社会主义制度。我国现在实行的是商品制度，工资制度也不平等，有八级工资制，等等。这只能在无产阶级专政下加以限制。","type":"paragraph"},{"text":"所以，林彪一类如上台，搞资本主义制度很容易。因此，要多看点马列主义的书。","type":"paragraph"},{"text":"列宁说，“小生产是经常地、每日每时地、自发地和大批地产生着资本主义和资产阶级的”。工人阶级一部分，党员一部分，也有这种情况。","type":"paragraph"},{"text":"无产阶级中，机关工作中员中，都有发生资产阶级生活作风的。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9e8e9c6ce0"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
