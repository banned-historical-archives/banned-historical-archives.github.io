<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"郭沫若：  在毛泽东旗帜下","authors":["郭沫若"],"dates":[{"year":1949,"month":4,"day":7}],"is_range_date":false,"parts":[{"text":"郭沫若：  在毛泽东旗帜下","type":"title"},{"text":"郭沫若","type":"authors"},{"text":"今天的青年朋友们幸福了，我诚恳地向你们祝福。","type":"paragraph"},{"text":"很多年辰以来，我就作着这样的梦想：凡是青年朋友都应该无拘无束、无忧无虑、自由自在地发展下去，就象自由空气里面的森林那样，有充分的阳光和空气，充分的养料和水分，自然而然地长成为磐磐大木，栋梁之材。今天这梦想，竟很快地便可以全部实现了。","type":"paragraph"},{"text":"束缚我们青年，奴化我们青年，屠杀我们青年的反动势力——帝国主义、封建主义、官僚资本主义的联军，在大规模的军事行动上很快便要整个被我们击溃了。中国人民来了一个大翻身，中国青年也从此脱掉一切的脚镣手铐，可以畅畅快快的做人了。","type":"paragraph"},{"text":"青年们生在这样的新历史开幕的大时代，真是值得祝福。我们千万不要辜负了这个时代，千万不要在幸福的欢乐中陶醉了自己，应该保持着十分的清明、沉着、友爱、勇敢，来认识并完成青年所负的历史使命。","type":"paragraph"},{"text":"怎样来认识和完成自己的使命呢？诚心诚意地接受中国共产党的领导，学习马列主义，学习毛泽东思想，体验中国共产党的各种政策和号召，建立一个坚强的革命的人生观，这是唯一的途径，而且是每一个人所必须经历的途径。有了这种基础，然后我们才能具备一个健全的灵魂，我们才能掌握得到各种技术，而切实地为人民服务。","type":"paragraph"},{"text":"无论是精神生产也好，物价生产也好，技术自然是必须的，然而运用技术的还是人。运用者如不健全，则被运用的技术，愈精巧时害人的成分愈大。故必须是革命家，然后才能掌握革命的技术，必须有彻底的人民意识者，然后才能成为忠实的人民勤务员。","type":"paragraph"},{"text":"这些话在今天，应该是已经成为革命的常识了。尤其青年朋友们可能个个都知道，而且知道得很透熟。但知道了并不能算事，一定还得要求我们做到。不仅是做到，而且还须得做好。这却不是容易的事。就让我们一辈子努力做去，都不必一定做得恰到好处。","type":"paragraph"},{"text":"总之，我们努力吧。不要浮夸，也不必气馁，我们实事求是地努力吧。努力学习，努力体验，努力工作，不仅要将革命战争进行到底，而且要把建设新民主主义的新中国这种神圣的使命，切实地担负起来。使新民主主义的建设迅速地得到胜利，迅速地过渡到社会主义建设的阶段。","type":"paragraph"},{"text":"今天的青年朋友们幸福了，我诚恳地向你们祝福。今天已经有了很好的客观环境让你们自由发展，你们千万不要辜负了这个时代，应该加倍的努力。有了很好的客观环境，必须有很好的主观努力和它配合。我们永远地在毛泽东的旗帜之下奋勇前进吧。","type":"paragraph"},{"text":"（转载中国青年）","type":"paragraph"},{"text":"来源：1949年4月7日《人民日报》","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"77e361ddcd"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
