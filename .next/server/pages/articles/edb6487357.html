script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"在反贪污浪费反官僚主义斗争中  清除资产阶级思想对我的影响","authors":["立之"],"dates":[{"year":1952,"month":1,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"在反贪污浪费反官僚主义斗争中  清除资产阶级思想对我的影响"},{"type":"paragraph","text":"编辑同志：我们学习了薄一波同志在中央、华北和京津两市的干部大会上所作的报告。这个报告，使我更深刻地认识了反贪污、反浪费、反官僚主义运动的伟大意义。"},{"type":"paragraph","text":"薄一波同志指示我们，反贪污、反浪费、反官僚主义的斗争，本质上是反对资产阶级腐化堕落思想的斗争，也就是对于资产阶级在三年以来向工人阶级和中国共产党所举行的猖狂进攻进行坚决的反攻，把这种反动的进攻压下去，并把资产阶级的这种反动的丑恶的思想和行为给以政治上的改造和法律上的制裁。只有这样，革命胜利才能有保证。这是一场严重的阶级斗争，我们必须在这场斗争中取得胜利。"},{"type":"paragraph","text":"薄一波同志又从人民的支持和干部的条件这两方面鼓舞我们，指出我们一定能在这一伟大斗争中取得胜利。我们一切爱国同胞都应当团结起来，在毛主席领导下，以战斗的姿态，勇敢地充满信心地为彻底消灭贪污、浪费、官僚主义这些旧社会遗留下来的污毒而斗争。"},{"type":"paragraph","text":"我是一个新中国的青年学生，又是光荣的青年团员。我一定要积极参加这次反贪污、反浪费、反官僚主义的伟大斗争，清除旧社会带给我的资产阶级思想的影响，并在这次运动中贡献出我自己的一分力量。　清华大学学生　立之"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"薄一波","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"edb6487357"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
