script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"发扬艰苦朴素优良作风 抵制资产阶级思想侵蚀","authors":[],"dates":[{"year":1970,"month":2,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编辑同志:"},{"type":"paragraph","text":"用毛泽东思想占领青年工人的业余生活阵地，确实是关系到无产阶级革命事业接班人健康成长的大事。过去，我们总认为八小时以内能抓好也就不错了，哪有那么多的精力去管青年的业余生活。其实，这种想法就是“阶级斗争熄灭论”，就是陈丕显、曹荻秋之流的“不要干预人民生活”的流毒在我们思想里的反映。我们不去“干预”，资产阶级思想就会大肆泛滥，腐蚀和毒害我们青年一代。"},{"type":"paragraph","text":"我们商店位于南京路上，每天都是与钱、与物、与人打交道，是两个阶级、两种思想短兵相接的战场。一小撮阶级敌人也借聊天、关心生活为名，宣扬资产阶级生活方式，潜移默化地腐蚀毒害青年。我们商店有个青年，出身贫苦，进店时生活朴素，工作踏实。后来因为受到资产阶级思想侵蚀，变成了“一年土，二年洋，三年不认爹和娘”的人。这个青年通过学习毛主席著作和阶级教育，认识到自己是中了南京路上“香风”臭气的毒，他痛心地说:资产阶级思想使我忘了本，转了向，分不清臭和香。他表示要学习工人阶级艰苦朴素的优秀品质，抵制资产阶级腐蚀。还有个青年由于资产阶级思想的腐蚀，走上了犯罪的道路。这些触目惊心的阶级斗争的事例，使我们的头脑清醒起来了。我们一定要按照毛主席关于“要关怀青年一代的成长”的教导，狠抓意识形态领域里的阶级斗争，用毛泽东思想去管好青年业余生活，加强政治思想工作，加强领导，根据青年的特点，开展各种有益的活动，改变过去对青年业余生活放任自流的状况，用毛泽东思想去占领青年业余生活阵地。"},{"type":"paragraph","text":"上海市第一食品商店革委会"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a994d1cb91"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
