<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"不能对右倾翻案妖风泰然处之","authors":[],"dates":[{"year":1968,"month":4,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编辑同志:"},{"type":"paragraph","text":"去年春天，阶级敌人刮起一股为中国赫鲁晓夫及其在各地的代理人翻案妖风，我院一批牛鬼蛇神也趁机出笼，妄图掀起上海高校反革命翻案逆流。"},{"type":"paragraph","text":"这一小撮阶级敌人公开为我院党内走资派翻案，为反革命分子翻案。他们以“串连”为名，勾结上海高校的叛徒、特务、国民党反动军官、地富反坏右分子和社会渣滓，组成了一支国民党反动派的地下复仇军，兴风作浪，或策划于密室，或点火于基层，拉组织、发宣言，矛头宣指无产阶级司令部。胡说什么:“在运动初期被打成牛鬼蛇神的人而又自己解放自己或得到解放的是最革命的，是真正时无产阶级革命派。”提出要“冲出牛棚闹革命”、“自己解放自己”。还叫嚣:“一切受压迫者都团结起来，挣掉自己脖子上的锁链，砸烂一切旧的国家机器。”明目张胆地煽动阶级敌人，组织起反革命队伍，妄图颠覆无产阶级专政。"},{"type":"paragraph","text":"他们疯狂地叫嚣“要夺权”，并恶毒地说，“如果不为他们这些人‘平反’，那也就谈不上大联合，即使大联合、三结合了，也是不会巩固的。”妄图推翻上海无产阶级的红色政权——上海市革命委员会。他们还用请客吃饭、赠送资料等手法，来收买腐蚀革命队伍中一些意志薄弱的人去帮他们翻案。"},{"type":"paragraph","text":"“阶级斗争，一抓就灵。”在清理阶级队伍战斗中，在毛泽东思想的照妖镜下，这个反革命翻案集团被我院广大无产阶级革命派揭露出来了，这是光芒四射的毛泽东思想的伟大胜利!"},{"type":"paragraph","text":"值得注意的是:最近在我院又出现了转弯抹角、隐晦曲折地为我院党内走资派唱赞歌，攻击无产阶级革命派的现象，而我们的有些同志则不闻不问，泰然处之。这是当前右倾翻案、右倾分裂、右倾投降、右倾保守在我院的表现。我们一定要牢记毛主席的教导:“千万不要忘记阶级斗争。”奋起毛泽东思想千钧棒，迎头痛击右倾翻案妖风，把无产阶级文化大革命进行到底!"},{"type":"paragraph","text":"上海铁道医学院　几位红卫兵"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"革命委员会","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"name":"清理阶级队伍","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dbac5a41b0"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
