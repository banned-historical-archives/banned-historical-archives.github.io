script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji12","name":"毛泽东全集第12卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji12.pdf"],"article":{"title":"鲁迅艺术学院创文缘起","alias":"","parts":[{"type":"paragraph","text":"鲁迅艺术学院创立缘起"},{"type":"paragraph","text":"（1938年2月）"},{"type":"paragraph","text":"为了民族的生存和解放，为了抵抗日本帝国主义强盗的侵略，把它从中国赶出去，为了巩固世界和平，全中国人民自卢沟桥事变以来一致奋起，各党各派团结在抗日民族统一战线之下进行神圣的抗日民族革命战争，直至取得最后胜利。"},{"type":"paragraph","text":"在这抗战时期中，我们不仅要为了抗日动员与利用一切现有的力量，并且应该去寻求和准备新的力量，这也就是说，我们应注意抗战急需的干部培养问题。“干部决定一切！”这不仅在平时，而且在战时也是非常迫切的问题。在前线和日寇作浴血战斗的干部中，在后方动员工作中，都需要军事、政治、经济、文化各方面的成千成万的有力的十部，这是毫无疑义的。"},{"type":"paragraph","text":"艺术一戏剧、音乐、美术、文学是宣传鼓动与组织群众最有力的武器。艺术工作者一一这是对于目前抗战不可缺少的力量。因之培养抗战的艺术工作干部，在目前也是不容稍缓的工作。"},{"type":"paragraph","text":"我们边区对于抗战教育的实施，积极进行，已建立了许多培养适合于抗战需要的一般政治、军事干部的学校（如中国抗日军政大学、陕北公学等），而专门关于艺术方面的学校尚付缺如。因此我们决定创立这艺术学院，并且以已故的中国最大的文豪鲁迅先生为名，这不仅是为了纪念我们这位伟大的导师，并且表示我们要向着他所开辟的道路大踏步前进。"},{"type":"paragraph","text":"我们深知，这鲁迅艺术学院的建立是件艰巨的工作，绝非我们少数人有限的力量所能完全达到；因之，我们迫切地希望全国各界人士予以同情与援助，使其迅速成长。这也就是帮助了我国英勇的抗战更顺利地进展，以至获得最后的胜利，把日寇赶出中国！"},{"type":"paragraph","text":"发起人：毛泽东周恩来林伯渠徐特立"},{"type":"paragraph","text":"成仿吾艾思奇周扬"}],"authors":["毛泽东"],"dates":[{"year":1938,"month":2}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":51,"page_end":52},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c8a687ea21"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
