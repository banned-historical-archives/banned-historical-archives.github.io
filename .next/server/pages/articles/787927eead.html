" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji19","name":"毛泽东全集第19卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji19.pdf"],"article":{"title":"换彭雪枫联","alias":"","parts":[{"type":"paragraph","text":"挽彭雪枫联!"},{"type":"paragraph","text":"（1945年2月7日）"},{"type":"paragraph","text":"二十年艰难事业，即将彻底完成，忍看功绩辉煌，英名永垂，一世忠贞，是共产党人好榜样；"},{"type":"paragraph","text":"千万里破碎河山，正待从头收拾，敦料血花飞溅，为国牺牲，满腔悲愤，为中华民族悼英雄。"},{"type":"paragraph","text":"为民族，为群众，二十年奋斗出生入死，功垂祖国；"},{"type":"paragraph","text":"打日本，打汉奸，千百万同胞自由平等，泽被长淮。"},{"type":"paragraph","text":"[1]1944年9月11日，新四军第四师师长兼淮北军区司令员彭雪枫在河南夏邑与日伪军作战中牺牲。1945年2月7日，延安各界举行追悼彭雪枫大会。本文一是毛泽东和朱德、刘少奇、彭德怀、陈毅等联名送的挽联。毛泽东还写了挽词。本文二是毛泽东代中共中央写的挽联。"}],"authors":["毛泽东"],"dates":[{"year":1945,"month":2,"day":7}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":300,"page_end":300},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"787927eead"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
