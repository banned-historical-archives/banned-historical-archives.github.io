script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"广西讨论古代僮族是否经过奴隶社会的阶段","authors":[],"dates":[{"year":1961,"month":8,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"广西僮族自治区少数民族社会历史调查组最近在修改僮族简史(初稿)时，就僮族古代社会是否经过奴隶社会发展阶段问题，进一步展开了讨论。讨论中有人认为，从秦始皇统一中国后，僮族社会即由原始公社的崩溃，飞越过奴隶社会的阶段而进入封建社会。他们所持的理由是:从生产力看，秦汉时当地即已使用铁器和耕牛；从生产关系看，秦时即设南海等郡并建立了君、王、侯、将的封建等级制度，唐代时又在僮族地区实行采邑制、屯田制以及贡纳和租税制，凡此种种都与封建社会的一般特征相符合。他们还认为，同在一个统一的封建国家内，不可能存在着既有封建制又有奴隶制的两种不同性质的社会制度。"},{"type":"paragraph","text":"另一部分同志则认为，自秦汉至北宋以前，僮族是经过奴隶社会的发展阶段的。他们的理由是:中原封建王朝直到唐代还没有在广西僮族等地区建立全面的直接的统治，有的只是建立“羁縻”州、县。而且根据史书记载，直到北宋时为止，当地还有奴隶的存在，只是在桂东等个别地区，封建的生产方式出现得较早。他们认为，依据不平衡发展规律，我国各民族间甚至同一民族内部不同社会制度的并存是完全可能的。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b5c2b06553"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
