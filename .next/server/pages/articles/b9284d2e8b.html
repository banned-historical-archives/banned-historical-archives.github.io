script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"保罗·罗伯逊谴责帝国主义镇压非洲人民解放运动美帝国主义是人类最大的敌人他表示要不断高唱“起来，不顾做奴隶的人们……”","authors":[],"dates":[{"year":1960,"month":9,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社布达佩斯15日电】　世界著名的黑人歌唱家罗伯逊9月14日在布达佩斯的记者招待会上强调指出，最近几年来，他更加深刻地认识到，现在，美帝国主义是人类最大的敌人。他说，非洲和美洲的黑人长期被帝国主义奴役。在帝国主义的残酷掠夺和压迫之下，黑人大批地死亡。但是，今天，非洲人民觉醒了，他们受够了帝国主义的压迫和奴役。"},{"type":"paragraph","text":"他又说，我们坚决要在今天争取自由和解放，而不是在明天。我们随时准备着为争取自由而献身。"},{"type":"paragraph","text":"罗伯逊在回答记者向他提出的问题时说，帝国主义正在千方百计地镇压非洲人民的解放运动，人们通过刚果的局势，就可以清楚地看穿帝国主义的阴谋。"},{"type":"paragraph","text":"他指出，社会主义国家和全世界人民是爱好和平的；而帝国主义只是空喊“和平”，实际上美国的五角大楼、北大西洋公约组织是要战争的。"},{"type":"paragraph","text":"在谈到裁军问题时，罗伯逊说，社会主义国家是主张裁军的，问题是帝国主义绝不会这样做。美国人民是要求和平的，但是，要想取得真正的和平，就只有推翻现在的美国政府，建立一个代表人民利益的政府。"},{"type":"paragraph","text":"罗伯逊说，他是社会主义国家坚定不移的朋友。今后他将每年用六个月的时间，到各个社会主义国家进行访问和演出。"},{"type":"paragraph","text":"他非常气愤地说:在我的护照上写着禁止我去中华人民共和国的字样，但是，我不能忍受这种禁止，我坚决要到世界上最伟大的六亿多人口的国家去。伟大的中国正在建设社会主义，它一直是站在我们人民这一边。我要不断地高唱我唱过的“起来，不愿做奴隶的人们……”(记者按:这句歌词，他是用中文讲的)。我要冲破各种障碍，不管他们怎样禁止，我也要到中国去，到我的故乡非洲去，到古巴去……"},{"type":"paragraph","text":"罗伯逊还说，作为一个艺术家，他将永远服务于人民为自由、解放而斗争的事业，站在人民斗争的最前线。他说，他不久以后将去非洲进行访问和演出。"},{"type":"paragraph","text":"出席这次招待会的有匈牙利社会各界人士、匈牙利和外国的记者。"},{"type":"paragraph","text":"罗伯逊在记者招待会上还演唱了各国的民歌。"},{"type":"paragraph","text":"罗伯逊是9月9日来匈牙利进行访问演出的。他在匈牙利各地演唱的民歌和革命歌曲，受到广大听众非常热烈的欢迎。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b9284d2e8b"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
