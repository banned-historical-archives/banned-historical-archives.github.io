script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"渤海二号钻井船翻沉事故说明  搞建设非肃清极左流毒不可","authors":["卢乙戈","金泽"],"dates":[{"year":1980,"month":7,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"渤海二号钻井船翻沉事故说明"},{"type":"paragraph","text":"搞建设非肃清极左流毒不可编辑同志："},{"type":"paragraph","text":"看了你们今天转载《工人日报》记者所写的报道《渤海二号钻井船翻沉事故说明了什么》，我们非常气愤，坚决要求按照党纪国法严肃处理造成这次事故的责任者——海洋石油勘探局的有关领导人员。"},{"type":"paragraph","text":"海洋石油勘探局成立七年多来，发生过许多次大大小小的事故，从不认真总结经验教训。为了逃避他们的领导责任，竟采用“评英雄，追认烈士”的手法来欺骗群众，欺骗领导，欺骗遇难同志的家属。尤其令人不能容忍的是在发生了如此严重的责任事故后，他们居然说什么“要奋斗就要有牺牲，战争年代要付出代价，搞四化也要付出代价，72人死的是值得的，他们是英雄，要交学费嘛！”亏他们说得出口！这种视人命如草芥的态度，哪象共产党干部对待自己阶级兄弟的态度？！"},{"type":"paragraph","text":"从海洋石油勘探局某些领导人的错误思想和错误作法，可以看出林彪、“四人帮”极左路线的流毒在他们身上的影响有多深！粉碎“四人帮”快四年了，党中央在各方面大力进行拨乱反正，但海洋石油勘探局的领导仍然高喊着极左的“革命”口号，蛮干、瞎指挥。这种状况如不改变，我们的海上石油勘探事业能搞好么？"},{"type":"paragraph","text":"金泽　卢乙戈"},{"type":"paragraph","text":"7月23日"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"159ce0ba57"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
