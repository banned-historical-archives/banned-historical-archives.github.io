script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"出席湖南省宣传工作会议的大学教授和非党人士对党政工作提出了很多意见","authors":["胡坚"],"dates":[{"year":1957,"month":5,"day":9}],"is_range_date":false,"parts":[{"text":"出席湖南省宣传工作会议的大学教授和非党人士对党政工作提出了很多意见","type":"title"},{"text":"胡坚","type":"authors"},{"text":"新华社长沙9日讯　在湖南省宣传工作会议上，大学教授和非党人士对党政工作提了很多意见。","type":"paragraph"},{"text":"(一)高等学校肃反工作的遗留问题，没有及时处理，很多人思想不安。有人认为在肃反中摘掉政治问题的帽子，又载上思想问题的帽子，不能令人心服。许多人认为目前高级知识分子有一个很大的问题是：需要妥善处理那些在肃反运动中伤了心的同志的问题。中南矿冶学院胡为柏教授反映：他们学校有些教授被斗，连爱人也被斗了。搜查时，把许多教授的家具、仪器都破坏了。在肃反中被斗争的湖南农学院李凤荪(农工民主党员)教授在会上提出二十一条意见，他说：“有许多事实杀我的头也不承认，我要告到中央去。”","type":"paragraph"},{"text":"(二)党群关系上，认为有些共产党员还存在严重的宗派主义情绪，湖南医学院凌敏猷院长、王肇勋教授(民革成员)等人士都感到学校党员干部有种特殊味道，好像高人一等，不好接近。凌院长还说：“医院评功奖模，被评上的也大都是党团员，群众勤勤恳恳工作，做一个死，也没有人知道。”湖南医学院附属医院邓一韪院长反映，最近调来的转业军人，大部分是党团员，技术低，安的职位高，薪金多，群众不满。中南矿冶学院陈新民(民盟盟员)院长等非党领导干部反映学院内党政职责不明，什么事都是党内决定，形成院长有职无权。许多非党人士在会上反映保密范围太宽、太严，很多没有什么机密性的事情也把它神秘化了。","type":"paragraph"},{"text":"(三)大家对领导上的官僚主义和主观主义列举许多事实。湖南师范学院林兆倧副院长提出高教部编制教学计划和教学大纲变动太大，二年制改四年制也变动太快。湖南医学院凌敏猷院长、杨明显副院长对中央分配毕业生的严重官僚主义和本位主义提出批评。要求中央卫生部把毕业生分配工作放到省里来。省政协委员韩浚章说：“我的弟弟韩宪章是八个空军起义的领导者(空军上尉)，至今未得到工作，大有‘迟归受荣、早归受辱’之慨。”宗教界人士李常树说：“虽然毛主席讲，宪法规定信仰自由，事实是宗教只自由在北京、上海，在县里农村没有了。”工商界人士蓝肇祺说：“建湘公司有个营业员在解放前是大学教授，长沙市委书记孔安民说必须调整，至今未调整。”","type":"paragraph"},{"text":" 来源： 1957年5月9日新华通讯社编《内部参考》。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"471f448917"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
