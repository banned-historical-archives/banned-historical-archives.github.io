<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共中央转发中苏友协总会党组“关于改进中苏友好协会工作问题的报告”","authors":[],"dates":[{"year":1957,"month":2,"day":6}],"is_range_date":false,"parts":[{"text":"中共中央转发中苏友协总会党组“关于改进中苏友好协会工作问题的报告”","type":"title"},{"text":"各省、市委，自治区党委，西藏工委；中央各部、委，国家机关和人民团体各党组，解放军总政治部；人民日报、新华社、广播事业局：","type":"appellation"},{"text":"中央同意中苏友好协会总会党组提出的“关于改进中苏友好协会工作问题的报告”。现将此件发给你们，望按照执行。","type":"paragraph"},{"text":" 中央—九五七年二月六日","type":"paragraph"},{"text":"关于改进中苏友好协会工作问题的报告","type":"subtitle"},{"text":"中央宣传部并中央：","type":"appellation"},{"text":"中苏友好协会在党的领导下做了不少工作，但是总会领导方面存在着严重的缺点，长期没有建立起健全的领导核心，具体工作的方针、任务等重大问题没有及时恰当的解决，以致在工作中发生了许多困难，引起总会和地方友协工作人员的苦闷和严重不满。关于这个问题，我们在中央宣传部的领导下，已作了多次讨论。现在将我们的意见报告如下：","type":"paragraph"},{"text":"（一）为了增进中苏两国人民友好团结，在中华人民共和国成立初期，通过中苏友好协会进行大规模的友好活动和宣传工作，是完全必要的。今后，通过中苏友好协会进行一定的工作，也还是必要的。但是，近年来的情况已经有了很大的改变，中苏友好的工作已经和国家各方面的工作密切地结合起来，增进中苏友好和介绍苏联的各种活动，也已经在党的领导下，由全国各机关、各团体共同来进行，中苏友协组织只能在党的领导下做一定的工作。因此，不恰当地夸大中苏友协工作的重要性，希望保留庞大的机构，包办许多中苏友好工作，是不符合当前情况的，是不正确的。同时，完全否定中苏友协工作的作用，认为中苏友协可以不做什么工作甚至可以取消的想法，也是不对的。","type":"paragraph"},{"text":"（二）中苏友好协会的总的任务仍然是增进中苏友好、交流中苏两国人民的经验和智慧。根据这个总方针，结合当前的具体条件，今后中苏友协的具体工作任务应该是：1、向苏联方面进行一般性的友好和文化交流活动，2、向我国人民宣传中苏友好和介绍苏联的一般情况。","type":"paragraph"},{"text":"在进行上述工作时，除中苏友协本身作一定的工作外，更重要的应当尽量运用各方面的宣传工具（报纸、刊物、电台等等）。同时，在我国各机关、各团体进行中苏友好的活动时，也应当尽可能运用中苏友协组织的名义，或用和中苏友协联合举办的名义，以扩大中苏友好活动的影响。经验证明，这样的工作方法是很好的，今后应当特别注意运用这种工作方法。","type":"paragraph"},{"text":"中苏友好协会总会的机构可大量精简，行政编制人员由八十人减少至四十人。","type":"paragraph"},{"text":"（三）中苏友好协会总会主办的“中苏友好报”（四开三日刊）在介绍苏联宣传中苏友好方面曾经起了一定的作用。但在目前的情况下，为了贯彻上述中苏友协工作的方针，我们认为应该将报纸改为杂志（月刊），比较系统地和生动活泼地介绍苏联建设和苏联人民生活，并以适当篇幅刊载中苏两国人民的友好活动，以及某些报导中苏友协工作的文章。","type":"paragraph"},{"text":"中苏友协总会主办的“俄文友好报”，在向苏联和各兄弟国家人民介绍中国情形方面起了相当大的作用，今后应当努力把它办好。","type":"paragraph"},{"text":"（四）各地方的中苏友好协会，除在当地党委领导下进行中苏关系重大节日的庆祝活动和一般性的友好活动外，还可举行有关苏联和中苏友好的图片展览、讲演报告以及其他为群众欢迎的宣传文化活动；在有条件的地方，可以争取当地教育行政部门指导和协助，继续进行业余俄文教学的工作。各地已建立的中苏友好馆，必须充实活动内容，使它成为人民群众喜爱的文化活动场所。除各重要城市（包括中央直辖市、较大的城市和苏联友人较多的城市）以及与苏联接壤的省份和自治区仍应保留精干的工作机构外，其他省、市是否需要建立工作机构，由当地党委自行决定。在不设立工作机构的地方，友协名义和会长、理事长等名义职务可保留，有关中苏友好的工作，可由当地党委指定有关机构负责。","type":"paragraph"},{"text":"各地方中苏友好协会，可由当地党委指定党的有关部门负责领导。各地友协组织的机构、编制、经费、干部配备、具体工作等问题，均由当地党委根据当地情况解决。总会对地方友协应该在业务上给予必要的协助，如供应有关的宣传和文化活动材料，召开必要的交流工作经验的会议等。","type":"paragraph"},{"text":"以上意见，是否有当，请批示。如中央同意，请转发各地党委和各有关部门，并由中苏友协总会召开全国友协工作会议传达执行。","type":"paragraph"},{"text":" 中苏友好协会总会党组一九五七年一月二十七日","type":"paragraph"},{"text":"已发：各省、市委、自治区党委、西藏工委，在京中委、候补中委，中央各部委，国家机关和人民团体各党组，总政，人民日报、新华社、广播事业局。共印二六七一份。","type":"paragraph"},{"text":"中共中央办公厅机要室1957年2月19日发出","type":"paragraph"},{"text":"来源：福建档案馆，101-5-982　P.14-15","type":"paragraph"}],"comments":[],"origin":"根据文件翻印件打印。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0eddc66e36"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
