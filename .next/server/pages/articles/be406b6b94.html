<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"5ba19c54-124b-4e05-bf76-73e558230021","name":"红旗一九六六年第十二期","internal":false,"official":true,"type":"pdf","author":"《红旗》杂志编辑部","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives2/main/5ba19c54-124b-4e05-bf76-73e558230021.pdf"],"article":{"title":"我们的倡议","alias":"","parts":[{"type":"paragraph","text":"我"},{"type":"paragraph","text":"的"},{"type":"paragraph","text":"倡们"},{"type":"paragraph","text":"安徽省毫县红卫兵代表会全体代表"},{"type":"paragraph","text":"毛主席教导我们：“你们要关心国家大事，要把无产阶级文化大革命进行到底！”毛主席和他的亲密战友林彪同志，一次文一次地接见全国红卫兵代表。这是党和毛主席对我们最大的信任和希望，这是我们最大的幸福，给我们增添了无穷的力量。我们更加感到，我们的担子是重的，我们的任务是艰巨的。我们要更高地举起毛泽东思想伟大红旗，戒骄戒躁，进一步发扬敢想，敢说，敢干，敢闯，敢革命，敢造反的无产阶级革命精神，誓死保卫党中央，誓死保卫毛主席，誓死保卫毛泽东思想，普死保卫无产阶级专政，普死保卫社会主义制度，坚决完成“一斗、二批、三改”的任务，坚决革除一切旧思想，旧文化，旧风俗，旧习惯。不获全胜，决不收兵！"},{"type":"paragraph","text":"为此，我们提出如下倡议："},{"type":"paragraph","text":"一、毛主席是我们心中的红太阳，毛泽东思想楚我们的命根子。红卫兵要坚决响应的话，照毛主席的指示办事，做毛主席的好战士。我们要把毛主席的书当作一切工作的最高指示，无论在什么时候，都要努力学习最高指示，忠实执行最高指示，热情宣传最高指示，勇政押卫最高指示。"},{"type":"paragraph","text":"二、红卫兵应该是党的方针政策的模范执行者。毛主席亲自主持制定的十六条，是我们进行无产阶级文化大革命的指南。我们一定要认真地学习它，熟悉它，掌握它，运用它，宣传它，保卫它。"},{"type":"paragraph","text":"三、我们要大学解放军。像解放军那样，永远思于党，思于毛主席，忠于毛泽东思想，忠于无产阶级的革命事业，全心全意地为人民服务，做-一辈于人民的好儿于。要以解放军为榜样，坚决执行毛主席制定的三大纪律和八项注意，大兴三八作风，严格遵守群众纪律，保卫国家财产，保护群众利益。红卫兵要建设成为一支具有高度政治觉招和高度组织性、纪律性的战斗队伍，成为解放军的"},{"type":"paragraph","text":"四、十六条指出：“这次运动的重点，是整党内那些走资本主义道路的当权派。”我们一定要掌握这个斗争的大方向。对那些钻进党内的走资本主义道路的当权派，不论他们的职位多高，资格多老，“权威”多大，都要统统地揪出来，坚决把他们斗臭、斗跨、斗倒，使他们的威风扫地，永世不得翻身。"},{"type":"paragraph","text":"五、毛主席教导我们：“谁是我们的敌人？谁是我们的朋友？这个问题是革命的首要问题。”在运动中，我们要注意发展左派力量，争取中间力量，团结大多数，集中力量打击一小报资产阶级右派分子。"},{"type":"paragraph","text":"六、红卫兵战十要敢于斗争，善于斗争，要在游泳中学会游泳，在革命中学会革命。在斗争中要文斗，不要武斗。武斗只能触及皮肉，文斗才能触其灵魂。只有文斗，进行充分揭露，深刻批判，才能彻底暴露资产阶级右派的反革命面貌，把他们最大限度地孤立起来，真正把他们斗吴。"},{"type":"paragraph","text":"七、毛主席教导我们：“没有调查就没有发言权”。红卫兵战士必须认真做好调查研究工作。我们无论遇到什么事，要把情况搞清楚，认真分析研究，和群众充分商量，然后再去处理问题，解决问题。"},{"type":"paragraph","text":"八、红卫兵战士必须积极参加本单位的无产阶级文化大革命，把主要精力放在搞好们相信自记，也要相信其他单位的革命群众，能够在党中央和毛主席的领导下，自己解放官己，把他们本单位的文化大革命进行到底。"},{"type":"paragraph","text":"九、毛主席说：“军队须和民众打成一片，使军队在民众眼晴中看成是自己的军队，这个军队便无敌于天下”。红卫兵必须密切联系群众，向群众学习，虚心听取群众的意见，必须认真开展批评和自我批评，接受群众的正确批评。"},{"type":"paragraph","text":"十、红卫兵要互相学习，互和交流经验，在共同搞好文化人革命的原则基础上，加强革命的团结。有问题，有不同意见，要用调查研究、平等协商的方法来解决。在大方向一致的前提下，不要在枝节问题上争论不休。"},{"type":"paragraph","text":"红卫兵战士们，革命是一件不容易的事，革命的道路是曲折的，不乎坦的。要取得胜利，必须战胜一切阻力，克服一切困难阻力大，困难多，并不能阻挡我们前进，它将使我们得到锻炼，取得经验教训。只要我们坚定不移地遵照党中央和毛主席的指示办事，念念不忘阶级斗争，念念不忘无产阶级专政，念念不忘突出政治，念念不忘高举毛泽东思想伟大红旗，一切阻力统统会被战胜，一切困难统统会被克服。我们一定要把无产阶级文化大革命进行到底，我们一定能够把无产阶级文化大革命进行到底。"}],"authors":["安徽省亳县红卫兵代表会议全体代表"],"dates":[{"year":1966,"month":9,"day":6}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":28,"page_end":29},"tags":[{"name":"毛泽东","type":"人物"},{"name":"武斗","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"be406b6b94"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
