script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"意大利人民反剥削反迫害斗争浪潮日益高涨　十万电力工人和十八万医务工作者举行全国规模的罢工　学生举着“工人和学生团结起来进行斗争”的标语牌示威游行","authors":[],"dates":[{"year":1970,"month":3,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"意大利人民反剥削反迫害斗争浪潮日益高涨"},{"type":"paragraph","text":"十万电力工人和十八万医务工作者举行全国规模的罢工"},{"type":"paragraph","text":"学生举着“工人和学生团结起来进行斗争”的标语牌示威游行"},{"type":"paragraph","text":"新华社讯　罗马消息：最近以来，意大利工人和学生不断举行罢工和游行，反剥削，反迫害，给垄断资本和学校反动当局以沉重打击。"},{"type":"paragraph","text":"十八万名医务工作者十二日举行了二十四小时全国规模的罢工，要求改善工作条件和生活条件。罢工影响到意大利的一千三百家医院。"},{"type":"paragraph","text":"十一日，十万名电力工人又一次举行二十四小时的全国规模的罢工，要求改进他们同资方的合同。几百家工厂因此而被迫停工，好几个城市的电车也因此而停驶。"},{"type":"paragraph","text":"十一日，在意大利北部的布雷西亚，举行了总罢工，使公共交通停止，商店关了门，一万人冒着风雨上街游行，抗议新法西斯主义集团在警察的保护下进行挑衅，要求禁止新法西斯党。"},{"type":"paragraph","text":"三月十日，在意大利中部的维亚雷焦也举行了总罢工，大批工人和学生上街游行，使全市陷于瘫痪。这个行动是为了声援已经占领工厂四十天的两百名工人。"},{"type":"paragraph","text":"九日，在意大利北部的马根塔也举行了总罢工，抗议资方无理解雇两个工厂的一千四百名工人。"},{"type":"paragraph","text":"十一日，在意大利北部的斯基奥也举行了总罢工，抗议一家毛纺织工厂的老板和他的儿子开枪打伤十名罢工者。意大利全国的工人在同一天都举行了十五分钟的罢工，抗议斯基奥的老板的暴行。意大利全国纺织工人目前正在为要求提高工资和缩短工时而举行一系列罢工。"},{"type":"paragraph","text":"在威尼斯，八千名学生十日在市中心和正在审讯一名学生的法庭外面举行了示威。"},{"type":"paragraph","text":"在都灵，五千名学生七日举行了两小时声势浩大的示威游行。学生们举着许多面红旗和标语牌向前挺进，有些标语牌上写着：“工人和学生团结起来进行斗争”、“革命的学生和工人阶级一道，反对资产阶级专政”。"},{"type":"paragraph","text":"在罗马附近的蒂沃利，三千名学生九日举行罢课，上街游行。"},{"type":"paragraph","text":"前几天，在巴里、米兰、波伦亚和威尼斯都出现了学生占领大学校舍的情况。学生们对的里雅斯特大学和巴勒莫文学院的占领，十一日已进入了第三周。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6288461ce6"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
