" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji27","name":"毛泽东全集第27卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji27.pdf"],"article":{"title":"开好县的各界代表会议","alias":"","parts":[{"type":"paragraph","text":"开好县的各界代表会议"},{"type":"paragraph","text":"（1949年9月7日）华中局，并告各局，各野："},{"type":"paragraph","text":"八月三十日电悉。同意你们所提关于召开县的各界代表会议的各项意见\"，并将此电转发各局、各野研究照办。关于召开县的各界代表会问题，自西北局提议后，引起了我们的注意，认为有益无害。而不召开各界代表会，要等到农协在乡村中建立了基础再召开人民代表会议，如一九四八年十二月二日中英复电（载在《政策汇编》）那样，则是很不利的。事实上，县的许多大政方针，例如剿匪、反霸、借粮、征粮、救济灾荒、修理堤坝、推动农民组织起来建立农协、减租减息问题、恢复和发展县范围内的工商业及文化教育问题、推行人民币及县的财政金融问题等，均以召开各界代表会议，经过讨论，取得代表们同意，然后传达推行，比较不开这种"},{"type":"paragraph","text":"[1]中共中央华中局在1949年8月30日关于召开县的代表会议问题向中央的请示报告中提出的意见是：一、只由县级召开各界代表会议，区、乡两级可开农代会，逐步达到以农代会做基础，吸收其他学生、妇女及少数工商业者、开明士绅（作为民主人士）参加。二、吸收开明士绅应具备以前中央所规定的条件，并经地委一级批准。三、在召开各界代表会议时，较大县城可以城乡合并召开，吸收本城工人代表参加。若无此条件，则只吸收农民（注意吸收手工业工人）代表，不必为了开会去专事组织乡村工人推选代表，以免分散精力。"},{"type":"paragraph","text":"开好县的各界代表会议会，长期限于党内干部的讨论、传达和推行，要有利得多。县的各界代表会的成分，应包括党、政、军的代表，农民及工人的代表，革命知识分子及妇女的代表，工商业的代表，及若干开明绅士的代表。其中，共产党员及可靠的左翼分子，应超过二分之一，保证决议的通过。中间分子及必须拉拢的少数右翼但不反动的分子，可让其占三分之一左右的数目，以便孤立反动派，利于政令的推行和群众的发动，且可发现问题及发现积极分子。省委、区党委和地委，必须积极帮助各县县委，有计划地有准备地布置和领导此种会议。这是全县性的会议，县城及各区、各乡及县一级机构，均应有代表，在县委领导下，由县政府召开。这是县的会议，至于区、乡，则照你们意见召开区的及乡的农民代表会议，但应吸收革命知识分子参加。其余均照你们意见办理。此种会议，我们尚无经验，请你们注意收集经验，指导各地，并告诉我们。此电请你们及各中央局转发至县一级为盼。"},{"type":"paragraph","text":"中央九月七日"}],"authors":["毛泽东"],"dates":[{"year":1949,"month":9,"day":7}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":215,"page_end":216},"tags":[{"name":"毛泽东","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]},{"type":"pdf","id":"wenji5","name":"毛泽东文集第五卷（1999）","internal":false,"official":true,"author":"中央文献研究室","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/wenji5.pdf"],"article":{"title":"开好县的各界代表会议","description":"根据毛泽东手稿刊印。","dates":[{"year":1949,"month":9,"day":7}],"parts":[{"text":"开好县的各界代表会议","type":"title"},{"type":"appellation","text":"华中局，并告各局，各野："},{"type":"paragraph","text":"八月三十日电悉。同意你们所提关于召开县的各界代表会议的各项意见，并将此电转发各局、各野研究照办。关于召开县的各界代表会问题，自西北局提议后，引起了我们的注意，认为有益无害。而不召开各界代表会，要等到农协在乡村中建立了基础再召开人民代表会议，如一九四八年十二月二日中央复电（载在《政策汇编》）那样，则是很不利的。事实上，县的许多大政方针，例如剿匪、反霸、借粮、征粮、救济灾荒、修理堤坝、推动农民组织起来建立农协、减租减息问题、恢复和发展县范围内的工商业及文化教育问题、推行人民币及县的财政金融问题等，均以召开各界代表会议，经过讨论，取得代表们同意，然后传达推行，比较不开这种会，长期限于党内干部的讨论、传达和推行，要有利得多。县的各界代表会的成分，应包括党、政、军的代表，农民及工人的代表，革命知识分子及妇女的代表，工商业的代表，及若干开明绅士的代表。其中，共产党员及可靠的左翼分子，应超过二分之一，保证决议的通过。中间分子及必须拉拢的少数右翼但不反动的分子，可让其占三分之一左右的数目，以便孤立反动派，利于政令的推行和群众的发动，且可发现问题及发现积极分子。省委、区党委和地委，必须积极帮助各县县委，有计划地有准备地布置和领导此种会议。这是全县性的会议，县城及各区、各乡及县一级机构，均应有代表，在县委领导下，由县政府召开。这是县的会议，至于区、乡，则照你们意见召开区的及乡的农民代表会议，但应吸收革命知识分子参加。其余均照你们意见办理。此种会议，我们尚无经验，请你们注意收集经验，指导各地，并告诉我们。此电请你们及各中央局转发至县一级为盼。"},{"type":"paragraph","text":"中央"},{"type":"paragraph","text":"九月七日"}],"comment_pivots":[{"part_idx":2,"offset":31,"index":1}],"is_range_date":false,"authors":["毛泽东"],"comments":["中共中央华中局在一九四九年八月三十日关于召开县的代表会议问题向中央的请示报告中提出的意见是：一、只由县级召开各界代表会议，区、乡两级可开农代会，逐步达到以农代会做基础，吸收其他学生、妇女及少数工商业者、开明士绅（作为民主人士）参加。二、吸收开明士绅应具备以前中央所规定的条件，并经地委一级批准。三、在召开各界代表会议时，较大县城可以城乡合并召开，吸收本城工人代表参加。若无此条件，则只吸收农民（注意吸收手工业工人）代表，不必为了开会去专事组织乡村工人推选代表，以免分散精力。"],"page_start":353,"page_end":354,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0b49a4cfe0"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
