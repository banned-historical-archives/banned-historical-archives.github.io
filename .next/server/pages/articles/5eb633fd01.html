" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共中央关于少数民族地区土改问题给中南局并告西南局的电报","authors":[],"dates":[{"year":1951,"month":12,"day":24}],"is_range_date":false,"parts":[{"text":"中共中央关于少数民族地区土改问题给中南局并告西南局的电报","type":"title"},{"text":"中南局并告西南局：","type":"appellation"},{"text":"你们十二月十日关于中南区土地改革工作进行状况的分析和一九五二年土改方针的报告，业经中央十二月十三日电告批准。但你们在整个报告中，均未提到少数民族地区如何进行土改问题。因少数民族地区情况与汉族地区不大相同，其进行土改与否和进行的办法上，也不与汉族地区一样。这是一个很重要的问题，望你们电告各有关省委、地委，请他们根据当地少数民族情况提出具体意见，由你们审核并报中央。","type":"paragraph"},{"text":" 中  央十二月二十四日","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5eb633fd01"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
