script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"让服装更加绚丽多采纺织部长吴文英说，美化生活与资产阶级自由化是两回事","authors":["汪诚彪"],"dates":[{"year":1987,"month":2,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报天津2月22日专电　(驻津记者汪诚彪)纺织工业部部长吴文英今天在天津对全国各地的服装公司经理说:“美化生活与资产阶级自由化完全是两回事，不能也决不容许有任何的混淆。要继续鼓励和支持服装理论工作者、科技人员和设计人员，从行业实际出发，从国内外两大市场需求变化出发，加强研究，勇于创新，多作贡献。”"},{"type":"paragraph","text":"她在讲话中还说，服装设计要提倡各种流派、各种风格的相互学习、借鉴。一花独放不是春，百花齐放才会万紫千红，绚丽多彩，才能不断美化社会，美化人民生活。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"天津文革","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bed5d1bcaf"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
