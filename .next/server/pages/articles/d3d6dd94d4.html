script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"毛泽东《体育之研究》再版发行","authors":[],"dates":[{"year":1992,"month":5,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛泽东《体育之研究》再版发行"},{"type":"paragraph","text":"本报讯　为了纪念“6．10”毛主席题词“发展体育运动，增强人民体质”40周年，人民体育出版社于最近重印出版了毛泽东同志的著作《体育之研究》。"},{"type":"paragraph","text":"《体育之研究》是毛泽东同志青年时代写的一篇著作，最早发表在1917年4月1日的《新青年》杂志上，当时署名为“二十八画生”。这篇著作是用文言文写的，毛泽东同志从“释体育”、“体育在吾人之位置”、“前此体育之弊及吾人自处之道”、“体育之效”、“不好运动之原因”、“运动之方法贵少”、“运动应注意之项”、“运动一得之商榷”八个方面论述了自己对体育的理解和认识，积极提倡德智体三育并重。这篇著作是我国现代体育事业初期发展阶段具有代表性的文献，至今读起来仍然会使人受到启发和教益。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d3d6dd94d4"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
