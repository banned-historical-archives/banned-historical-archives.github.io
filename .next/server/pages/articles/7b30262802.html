script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"领导干部带头学好无产阶级专政理论  青海互助土族自治县委领导成员，联系我国革命的实际情况和无产阶级专政的历史经验，力求从理论上搞清楚对资产阶级专政的问题","authors":[],"dates":[{"year":1975,"month":3,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"领导干部带头学好无产阶级专政理论"},{"type":"paragraph","text":"青海互助土族自治县委领导成员，联系我国革命的实际情况和无产阶级专政的历史经验，力求从理论上搞清楚对资产阶级专政的问题"},{"type":"paragraph","text":"新华社西宁一九七五年三月十八日电　中共青海省互助土族自治县委领导成员带头学习毛主席关于理论问题的重要指示，学习马克思、恩格斯、列宁关于无产阶级专政的论述，决心把巩固无产阶级专政的任务更好地落实到基层。"},{"type":"paragraph","text":"毛主席指示说：“列宁为什么说对资产阶级专政，这个问题要搞清楚。这个问题不搞清楚，就会变修正主义。要使全国知道。”县委领导成员们联系我国农村的斗争实际，联系无产阶级专政的历史经验，对毛主席的重要指示展开了认真的学习和讨论。许多同志指出，认真地从理论上搞清楚对资产阶级专政的问题，对于反修防修，坚持无产阶级专政下的继续革命，把巩固无产阶级专政的任务落实到基层，发展社会主义革命和社会主义建设事业，有着重大的现实意义和深远的历史意义。因此，领导干部必须带头学好，同时帮助广大党员和群众学好。他们说：无产阶级同资产阶级之间的斗争，无产阶级同资产阶级在意识形态领域里的阶级斗争，社会主义同资本主义两条道路的斗争，决不因为我们取得了几次斗争的胜利而终止。相反，斗争还在激烈地进行着。只有把马克思主义、列宁主义、毛泽东思想关于无产阶级专政的理论弄清楚，才能在复杂的两个阶级、两条道路、两条路线斗争中，分清大是大非，掌握阶级斗争的规律，不停顿地向资产阶级发动进攻，坚定不移地贯彻执行党的基本路线，把巩固无产阶级专政的任务落实到基层。"},{"type":"paragraph","text":"他们还通过回顾我国农村从互助合作直到人民公社化以来阶级斗争和两条道路的斗争，加深对无产阶级专政问题的理解。他们说，在我国生产资料所有制方面的社会主义改造基本完成以后，我国农村发生了巨大的变化。然而，农村中两个阶级、两条道路的斗争仍然是很激烈很复杂的。我们必须更好地坚持看书学习，从理论上弄清楚对资产阶级专政的必要性和重要性，自觉地贯彻执行党的基本路线，积极开展两个阶级、两条道路的斗争，带领农民坚定不移地走社会主义道路。"},{"type":"paragraph","text":"互助土族自治县委领导成员通过学习和讨论还体会到，努力发展社会主义经济，是把巩固无产阶级专政的任务落实到基层的重要方面。他们说，加强无产阶级专政，是为了保卫和发展社会主义革命和社会主义建设的伟大成果，为实现共产主义的伟大理想而奋斗。因此，必须在党的领导下，依靠广大人民群众，多快好省地建设社会主义，为巩固无产阶级专政提供雄厚的物质基础。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"青海文革","type":"人物"},{"name":"两条路线斗争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7b30262802"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
