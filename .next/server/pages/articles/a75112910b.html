script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"庆祝朝鲜民主主义人民共和国成立十六周年  新义州二十万人举行盛大集会游行  金日成首相出席盛典　崔庸健委员长讲话号召坚持反帝反修正主义斗争","authors":[],"dates":[{"year":1964,"month":9,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"庆祝朝鲜民主主义人民共和国成立十六周年"},{"type":"paragraph","text":"新义州二十万人举行盛大集会游行"},{"type":"paragraph","text":"金日成首相出席盛典　崔庸健委员长讲话号召坚持反帝反修正主义斗争"},{"type":"paragraph","text":"新华社平壤九日电　据朝鲜中央通讯社报道，朝鲜北部著名城市新义州今天举行了盛大群众大会和游行，热烈庆祝朝鲜民主主义人民共和国成立十六周年。"},{"type":"paragraph","text":"新义州的广场和街道上共有二十万市民和来自平安北道各地的人民。"},{"type":"paragraph","text":"站在观礼台上的有朝鲜党和政府以及各社会团体的负责人，正在朝鲜访问的外国代表团团员和前来参加庆祝活动的中国辽宁省和安东市的代表团团员等。"},{"type":"paragraph","text":"上午九时三十分，金日成同志和其他朝鲜党政领导人崔庸健、朴金喆、李钟玉、李周渊、玄武光、朴成哲等登上检阅台。"},{"type":"paragraph","text":"最高人民会议常任委员会委员长崔庸健在会上讲了话。"},{"type":"paragraph","text":"他说，高举战无不胜的马克思列宁主义的旗帜和无产阶级国际主义的旗帜的朝鲜人民将进一步保卫社会主义阵营的团结和国际共产主义运动的团结，继续坚决地同帝国主义和修正主义进行斗争，并对世界人民争取和平、民族独立和社会主义的共同事业作出贡献。"},{"type":"paragraph","text":"他说，朝鲜人民将在他们祖国的北部更好、更快地建设社会主义，以进一步加强国家的政治、经济和军事威力，并将同朝鲜南部人民紧密地团结起来，把美帝国主义者从这个地区赶出去，从而完成国家统一的事业。他强调说，世界上任何势力都阻挡不了为正义的革命事业而斗争的朝鲜人民的前进道路。"},{"type":"paragraph","text":"崔庸健在谈到朝鲜人民在过去十六年中所取得的各方面光辉成就时说，今天，朝鲜北部已经建立起先进的社会主义制度并变成一个具有独立自主的民族经济的牢固基础的社会主义工业—农业国。朝鲜北部全体人民坚如磐石地团结在朝鲜劳动党和金日成同志的周围。"},{"type":"paragraph","text":"他接着叙述和赞扬了平安北道人民从朝鲜民主主义人民共和国成立以来在社会主义建设中所取得的成就。"},{"type":"paragraph","text":"大会结束后举行了有二十万劳动人民参加的节日游行以及工农赤卫队的检阅。"},{"type":"paragraph","text":"今天应邀登上主席台的有委内瑞拉共产党中央委员会代表团团长爱德华多·加列戈斯，锡兰国会代表团团长休·费尔南多，印度尼西亚妇女代表团团长苏班德里约夫人，印度尼西亚总统军事顾问苏里亚达马空军上将和夫人，中国政府经济友好访问团团长方毅，中朝友好协会代表团团长张苏，中国共产主义青年团代表团团长惠庶昌以及来自柬埔寨、也门、马里和其他亚非国家的代表团团长。（附图片）"},{"type":"paragraph","text":"九月九日，朝鲜新义州二十万人举行盛大集会和游行，庆祝朝鲜民主主义人民共和国成立十六周年。"},{"type":"paragraph","text":"朝鲜中央通讯社传真照片（新华社发）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a75112910b"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
