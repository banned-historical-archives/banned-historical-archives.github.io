script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"资产阶级反动文艺作品使我脱离现实脱离生活!","authors":["徐式谷"],"dates":[{"year":1952,"month":6,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"扬州中学学生　徐式谷"},{"type":"paragraph","text":"侦探小说——资产阶级腐朽堕落的文艺中一个重要部份，它以变幻离奇的情节、曲折警险的故事吸引人，叫人不知不觉走向犯罪的道路。受害的人很多。"},{"type":"paragraph","text":"在解放之前，我读了很多侦探小说，得内容精彩、情节离奇、好玩，那时我是一个初中学生，对旧社会觉得不满，觉得国民党反动政府可恨，所以还有一点小资产阶级的正义感，自从侦探小说吸引了我，连这点正义感都丧失了，成天看些“探案”“奇案”的东西，脑子里装满福尔摩斯、亚森罗苹、梅逊、霍桑、陈查理的名字，凶杀、盗窃、越狱、……一个脚印、一个指纹、手枪、怪人等占据了我整个的脑子。我忘记了现实，忘记了当时黑暗的环境。我醉心于公爵玉杯的失窃，火车上飞尸。后来更发展到不做功课不上学，整天去看这类书。有一次，竟然故意在街上把钢笔丢了，然后去侦查、钉梢，满心想做个中国的福尔摩斯，或者亚森罗苹再世。那时受了毒害的我，还以为这才是“人生”呢!"},{"type":"paragraph","text":"侦探小说多半来自外国，不用说，那时我对美英的“文明”是羡慕崇拜的了，我的理想是到美英留学，学会侦探技术，回国做‘大侦探’；如果真的成为事实，这岂不就是做了捕杀革命志士的统治者爪牙!"},{"type":"paragraph","text":"要不是解放，我发展下去将不堪设想，解放后经过同学们的帮助，新社会的教育，我逐渐离弃了这些侦探小说；不过它给我的毒害仍是令人痛心的，今天我在学校里学习，进步得较慢，也是由于这个原因。"},{"type":"paragraph","text":"我相信，和我同样受毒害的青年一定不少，一直到现在，同学之间还有一些人爱看侦探小说。我们还能允许这披些着“训练人的智力”的外衣的侦探小说来毒害我们吗?在清除资产阶级思想影响的今天，我们也要注意侦探小说的危害性；它表面上是讲些侦探故事，实在是教人脱离现实，脱离人民的生活斗争，甚至与人民对立起来。"},{"type":"paragraph","text":"这些宣传资产阶级思想的凶淫暴戾、阴险诡诈、恐怖离奇的侦探小说，在青年中散播着不良影响，实在是我们所不容许的，我除了把自己受害的经过提出控诉外，还希望学校行政、教师、家长们重视这一问题，对学校中存在的这种现象采取有效的办法加以制止。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7423da0bea"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
