script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"亚非国家面临分裂是帝国主义和现代修正主义阴谋造成的　柬报认为目前硬要开亚非会议毫无好处","authors":[],"dates":[{"year":1965,"month":10,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"亚非国家面临分裂是帝国主义和现代修正主义阴谋造成的"},{"type":"paragraph","text":"柬报认为目前硬要开亚非会议毫无好处"},{"type":"paragraph","text":"新华社金边二十九日电  柬埔寨《祖国报》二十九日发表评论指出，中华人民共和国要求延期举行亚非会议以避免亚非国家分裂的正确立场也就是柬埔寨、巴基斯坦、朝鲜、坦桑尼亚和越南民主共和国的立场。"},{"type":"paragraph","text":"评论说：“我们要求延期举行这次会议的理由很清楚并且是十分合乎情理的。”"},{"type":"paragraph","text":"评论针对那些认为筹备第二次亚非会议的常设委员会无权决定会议延期的意见说，不到几个月以前，常设委员会就作出过延期举行会议的决定。评论说，现在的局势比过去更动荡了，但是有人却说，会议不能延期。评论指出，最近举行的常设委员会会议上没有遵守万隆会议以来被遵守的协商一致原则。"},{"type":"paragraph","text":"评论指出，目前情况不利于亚非会议达成它的目标——亚非团结。特别是在中华人民共和国已经宣布，它将不参加这次会议后，硬要召开阿尔及尔首脑会议是毫无好处的，人们担心，它会削弱反帝的战斗力量。"},{"type":"paragraph","text":"另一家报纸《查多木》二十八日发表评论指出：亚非国家现在面临分裂，这都是帝国主义和现代修正主义的阴谋造成的，因此，我们认为即将在阿尔及尔召开的亚非会议必须延期。评论说，“这次会议的目的，是要发展和巩固亚非团结，反对新老殖民主义，反对美帝国主义。在某些国家之间出现分裂时，如果在短时间内勉强召开，会议是不能开好的。现在召开亚非会议，必将进一步挑起亚非国家之间的分裂。”因此，根据中国、柬埔寨和其他一些国家的建议，延期召开亚非会议，才是维护亚非团结、继续进行反对帝国主义和新老殖民主义斗争的办法。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"92d7f15ff3"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
