script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"比利时《被剥削者》周刊谴责葛罗米柯报告  苏修联美反华必遭可耻失败  世界人民宣判了美帝国主义和苏修社会帝国主义的死刑","authors":[],"dates":[{"year":1969,"month":8,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"比利时《被剥削者》周刊谴责葛罗米柯报告"},{"type":"paragraph","text":"苏修联美反华必遭可耻失败"},{"type":"paragraph","text":"世界人民宣判了美帝国主义和苏修社会帝国主义的死刑"},{"type":"paragraph","text":"据新华社十八日讯 布鲁塞尔消息：比利时《被剥削者》周刊发表文章，谴责苏修外交部长葛罗米柯不久以前发表向美帝摇尾乞怜、讨好献媚的对外政策报告。"},{"type":"paragraph","text":"文章说，这个报告表明苏修叛徒集团摘掉了假面具，再次泄露了勃列日涅夫集团同美帝国主义之间存在着的神圣同盟。在这些共产主义的叛徒们看来，各国人民的敌人不是美帝，而是人民中国。"},{"type":"paragraph","text":"文章揭露了苏修叛徒集团想把亚洲各国反动派纠集在一起建立“亚洲集体安全体系”这一计划的反革命性质。"},{"type":"paragraph","text":"文章说，建立这个体系是“用来包围人民中国，扼杀越南、泰国、印度、印度尼西亚等国的武装斗争的”。"},{"type":"paragraph","text":"文章指出，苏修叛徒集团的反华行径最后必然要以失败告终。文章说：中国共产党同人民之间的关系犹如骨肉。党的利益以人民的利益为依据。而在苏联，苏联人民同勃列日涅夫集团之间的关系是奴隶与主人的关系，勃列日涅夫所宣扬的“共产主义”只能靠步枪来维持，只能靠发动法西斯侵略来转移人民的不满。"},{"type":"paragraph","text":"文章接着说：“在中国边境的军事挑衅暴露了克里姆林宫的封建主的野心。但是，北京是社会主义革命的灯塔，北京是世界革命的摇篮，什么力量也动摇不了这个革命的堡垒，任何条约和联盟都不能扼杀中华人民共和国。”"},{"type":"paragraph","text":"文章最后强调说，包括苏联和美国的无产阶级在内的全世界人民，已经起来同他们各国的压迫者进行猛烈斗争。在全世界，到处爆发革命，被奴役的人民站起来了。人民群众宣判了美帝国主义和苏联社会帝国主义的死刑。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"76d90e6c40"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
