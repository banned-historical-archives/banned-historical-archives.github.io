script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"警惕篡夺领导权的敌人搞右倾翻案上海开关厂揪出一个窃取革委会领导权镇压革命造反派的策划者","authors":[],"dates":[{"year":1968,"month":6,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编辑同志:"},{"type":"paragraph","text":"在当前清理阶级队伍的斗争中，我们上海开关厂的广大革命造反派和革命群众，遵照毛主席对敌斗争的伟大指示，放手发动群众，狠抓阶级斗争，粉碎了一股右倾翻案妖风。"},{"type":"paragraph","text":"我厂在这次清理阶级队伍中，一小撮阶级敌人预感到末日来临，大搞右倾翻案活动，和我们作拼死的斗争。他们把革命口号接过去，篡夺领导权，煽阴风，点鬼火，贼喊捉贼，借“揭阶级斗争盖子”为名，行其围攻革命造反派之实，手段十分阴险毒辣。如有个隐瞒严重政历问题并窃取了厂革委会第一把手的坏家伙，拼凑了一个专门监视厂造反总部和革命造反派战士的所谓“政教革命委员会”，实际上是凌驾于厂革委会之上、顽固执行资产阶级反动路线的一支别动队；一面又精心策划成立了什么“专案组”，大整革命造反派的黑材料。这个坏家伙还在革命造反派内部进行挖心战，拉一派，打一派，大搞右倾分裂活动，排挤打击厂革委会的革命群众代表，并且把革命造反派战士打成“反革命”。这还不算，他又抛出一份亲自写的长达一万六千多字的右倾翻案宣言书。这份“万言书”，完全颠倒黑白、混淆是非，全盘否定伟大的“一月革命”，妄图为中国赫鲁晓夫及其在上海的代理人陈、曹之流翻案，为资产阶级反动路线翻案，为一切牛鬼蛇神翻案。"},{"type":"paragraph","text":"毛主席教导我们说:“对广大人民群众是保护还是镇压，是共产党同国民党的根本区别，是无产阶级同资产阶级的根本区别，是无产阶级专政同资产阶级专政的根本区别。”我们厂里的无产阶级革命派遵照毛主席的指示，大议阶级斗争形势，大摆阶级斗争特点，大揭阶级斗争盖子，向阶级敌人发动了猛烈进攻，“万言书”的炮制者已被广大革命群众揪了出来，并开始狠狠地进行了批斗。现在我们正在乘胜追击，哪里出现右倾翻案，就在那里把它狠狠打下去。"},{"type":"paragraph","text":"上海开关厂　几个革命造反派战士"},{"type":"paragraph","text":"调查附记:本报工作人员到该厂调查，来信所反映的情况属实。该厂的一位老工人气愤地说道:“这篇大毒草‘万言书’就是要一口吃掉造反派!”"},{"type":"paragraph","text":"上海开关厂的无产阶级革命派和广大革命群众根据毛主席“千万不要忘记阶级斗争”的教导，狠抓了阶级斗争，哪里出现右倾翻案，就在那里把它狠狠地打下去，他们做得对!我们要警告一小撮阶级敌人，不管你们玩弄什么明的或暗的阴谋手段，谁妄图搞右倾翻案，谁就决不会有什么好下场!"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"清理阶级队伍","type":"主题/事件"},{"name":"一月革命","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9e4c0a0210"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
