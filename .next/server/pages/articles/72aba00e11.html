" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji34","name":"毛泽东全集第34卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji34.pdf"],"article":{"title":"对卫立煌《告台湾袍泽朋友书》的批语","alias":"","parts":[{"type":"paragraph","text":"对卫立煌《告台湾袍泽朋友书》“的批语"},{"type":"paragraph","text":"（1955年3月13日）刘、朱、邓（请小平办）："},{"type":"paragraph","text":"此件以一字不改，照原文待卫到广州时即行发表为好。在广州发表时，即送香港登报，并登广州报纸。同时由新华社发来北京，播发北京及全国登报，并发口语广播，译成外文发表。此件完全可用，不须要修改。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"三月十三日"},{"type":"paragraph","text":"[1]卫立煌，原国民党军将领，解放战争后期，担任国民党军东北“剿总”总司令，因没有积极执行蒋介石的作战命令，被软禁于南京。1949年1月蒋介石引退后卫去香港，1955年3月回国，并发表了《告台湾袍泽朋友书》，全文载《人民日报》和香港《文汇报》。"},{"type":"paragraph","text":"[2]刘，指刘少奇。朱，指朱德。邓，指邓小平，当时任中共中央秘书长、国务院副总理。"}],"authors":["毛泽东"],"dates":[{"year":1955,"month":3,"day":13}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":490,"page_end":490},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"72aba00e11"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
