<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"从历史上永远清除殖民主义这种罪恶  “奴隶海岸”","authors":["德文"],"dates":[{"year":1964,"month":3,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"从历史上永远清除殖民主义这种罪恶"},{"type":"paragraph","text":"“奴隶海岸”"},{"type":"paragraph","text":"所谓“奴隶海岸”，是指现在西非洲沃尔特河与尼日尔河之间的海岸地带，即多哥、达荷美和尼日利亚西部沿海一带，加纳东部沿海的小部分地区也包括在内。西方殖民者从前曾长期在这里进行贩卖奴隶的勾当，因此称之为奴隶海岸。"},{"type":"paragraph","text":"西方殖民者从非洲大量贩卖“黑奴”的罪恶历史，是由十五世纪中叶开始，一直延续到十九世纪才停止。"},{"type":"paragraph","text":"最早从事“黑奴”贸易的是葡萄牙殖民者，继起参加者有西班牙、荷兰、法国、英国、瑞典、丹麦、布兰登堡（德国）和美洲各殖民地（包括以后的美国）。"},{"type":"paragraph","text":"黑奴贸易的惨无人道是尽人皆知的。"},{"type":"paragraph","text":"西方的人口贩子为了开辟黑奴的“货源”，就组织所谓“猎捕队”偷袭黑人的村落，他们往往在一夜之间，把很多黑人村庄变成荒无人烟的废墟。除了组织“猎捕队”外，这些人口贩子主要是勾结当地一些酋长和利用奴隶贩卖商来搜捕黑人。他们故意挑起部落战争，以便掳掠俘虏来充当奴隶。"},{"type":"paragraph","text":"在现在西非大西洋沿岸的加纳、尼日利亚、多哥、达荷美、塞内加尔等国的一些地区，还可以看到奴隶碉堡的遗址。当年，待运的黑奴就被关在这些黑暗而潮湿的地牢里。当贩奴船只来到时，奴隶贩子用烙铁在黑奴身上烙上船长姓名的缩写字母，然后把他们赶进船舱。脚上钉着镣铐的黑奴，被密密麻麻地塞在船舱里，连转身的地方都没有。船只遇到狂风暴雨需要关闭船舱的时候，许多黑奴就被闷死在里面。船上经常发生传染病，造成黑奴的大批死亡。当航期延长而缺乏食物和饮水时，大批黑奴就被扔到海里。"},{"type":"paragraph","text":"西方殖民主义者从非洲向美洲贩卖黑奴的数字，是无法确切计算的。据美国黑人学者杜波依斯在他所写的《黑人》一书中的估计，被贩运到美洲的黑奴，十六世纪为九十万人，十七世纪为二百七十五万人，十八世纪为七百万人，十九世纪为四百万人，共约一千五百万人。法国学者查理·德·拉·隆西埃在《黑人和贩卖黑奴者》一书中估计，运到美洲的黑奴，在十七和十八世纪有一千五百万人，从一七九八年到一八四八年有五百万人，合计约为二千万人。但是这些数字远远不能反映非洲由于黑奴贸易而使人口遭到损失的真实情况。据杜波依斯估计，每运一个黑奴到美洲，大约有五个黑奴死在猎捕和贩运的过程中。法国学者杜加斯在《黑奴贩卖者》一书中说，非洲因为黑奴贸易而损失的人口达一亿五千万人。这些数字使人不难理解，为什么非洲人口在世界总人口中的比率，从十七世纪的百分之二十下降到二十世纪初的百分之七点七。"},{"type":"paragraph","text":"西方殖民者的黑奴贸易延续了四百多年之久，严重地破坏了非洲的生产力，阻挠了非洲社会文化的发展。但是欧洲的黑奴贩子却从黑奴贸易中获得惊人的利润。根据统计材料，在西非海岸，一个健壮的男黑奴值一英镑，但运到西印度群岛后可卖到八十英镑。美洲巴尔的摩的一条贩奴船“爱神号”的建造费仅为三万美元，而它的第一次贩奴航运就获得利润二十万美元。进行黑奴贸易而得到的利润成了西欧各殖民国家工业发展的主要资金来源之一。"},{"type":"paragraph","text":"（德文）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"91a2a82eb3"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
