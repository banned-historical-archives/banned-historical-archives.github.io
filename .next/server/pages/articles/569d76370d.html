<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"复旦大学新闻系师生举行座谈批判本报资产阶级方向并分析了王中在新闻学理论上的错误观点","authors":[],"dates":[{"year":1957,"month":7,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　复旦大学新闻系师生，昨天举行座谈会，对文汇报、光明日报在一个时期内表现的资产阶级办报方向和该系系主任王中教授的新闻学错误理论作了批判。"},{"type":"paragraph","text":"四年级学生徐英灼、王振业在他们9长达万言的发言中，列举了大量事实，指出文汇报在前一时期实质上成为右派分子向党进攻的报纸，执行着罗隆基一浦熙修一文汇报编辑部的办报路线。他们指出:文汇报打着“百花齐放、百家争鸣”、“帮助党整风”的旗子，贩卖反党反社会主义的私货，制造各种理由，企图排挤党在文化科学教育部门的领导，制造知识分子对党的仇恨，煽动群众和党对抗等。他们在研究了近两个月的文汇报后，指出了文汇报在反党反社会主义宣传上运用的恶毒手段，如不报道成绩，以点代面来夸大缺点，歪曲事实，并且运用巧妙术。在向右派斗争时，文汇报一反“帮助党整风”时的精神，显得软弱无力，这是一种以退为进、企图蒙混过关的伎俩。"},{"type":"paragraph","text":"四年级沈俊法、罗绮绿两人就光明日报的错误作了联合发言。"},{"type":"paragraph","text":"诸国木、郑德鑫、储祖诒就王中的错误理论作了发言。发言首先肯定了王中教授在反教条主义上的功绩，王中教授着重的否定了某些东西又强调了某些东西，但在现实情况中，他没有真正找到教条主义的根源加以否定，于是这就成为一场“悲剧”。与此同时，王中教授“对形势作了错误的估计”，忘记了阶级斗争虽然基本结束，但阶级斗争并未完全熄灭的事实，因此就认为报纸是阶级斗争工具这一马克思列宁主义的报纸基本定义过时了，加上王中教授不确当的接受了某些资产阶级的新闻学观点，因此造成了错误。发言指出:王中在谈到报纸的职能时，“实质上否认了报纸首先要成为党教育人民的工具与组织经济和文化的工具”，“弄不清报纸的灵魂和基本方向”。王中把报纸的指导性降低，夸大了报纸的商品性和趣味性。这个理论的基本方面在政治上是有害的，在学术上是错误的。"},{"type":"paragraph","text":"座谈会接受诸国本等人和新闻系四年级全体同学建议，通过了两项决议，一项是请在北京的王中代表在校师生向新闻工作者座谈会提出:要求右派分子浦熙修、徐铸成、顾执中等彻底交代与章、罗的关系；如果不彻底交代，要撤销他们的职务，并从新闻工作岗位上赶下来。"},{"type":"paragraph","text":"另一项决议是对杨西光等同志向检察院控告孙大雨诬告党内外同志为反革命分子一事，表示支持。"},{"type":"paragraph","text":"(卢)"},{"type":"paragraph","text":"\u003cIMG alt=请插入4号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1957\\07\\5776020901.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgaut\u003e康正平\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e上海工人文化宫痛斥右派漫画展览"},{"type":"paragraph","text":"(本报记者　康正平　摄)\u003c/FONT\u003e"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"569d76370d"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
