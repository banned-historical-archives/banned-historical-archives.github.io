" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共广东省委召开“三长”会议揭发政法工作中的右倾思想和忽视党的领导的倾向","authors":[],"dates":[{"year":1957,"month":10,"day":26}],"is_range_date":false,"parts":[{"text":"中共广东省委召开“三长”会议揭发政法工作中的右倾思想和忽视党的领导的倾向","type":"title"},{"text":"新华社广州26日电　中共广东省发为克服政法战线上的错误倾向，召开了公安、检察、法院三长扩大会议，参加会议的包括有省级政法机关和专署、市、县政法机关的干部九百多人，会议着重揭露和批判了广东政法工作中的右倾思想和忽视党的领导的倾向。","type":"paragraph"},{"text":"从会议揭露的事实来看，广东政法战线上右倾的表现是普遍的，是严重的。今年以来，广东各地的地主、富农的反攻倒算和反革命分子的破坏活动很嚣张，右派分子、不法资本家和其他反社会主义的坏分子的破坏活动也很猖狂，但是，政法部门中不论公安、检察、法院都不同程度地存在着右倾思想，没有能够主动采取相应的措施，及时给予敌人以严厉的打击。特别是检察机关，经常叫嚷着“错捕错判”，“干部违法乱纪”，不是说这里“左”了，就是说那里“乱”了。直到今年8月间，广东全省农村展开反击地主、富农、反革命分子的运动当中，省检察院还要求省委批转通报关于干部违法乱纪的“反左”的报告。这个做法受到省委的批评，但省察检院还在这个运动中打电话给下级检机关指示强调“防左”。在对肃反方针上，政治部门忽视了“有反必肃”，而片面强调“有错必纠”的方针，因而一方面造成普遍存在该捕不捕、该判不判、该杀不杀、该管制不管制的现象；另一方面，对待犯人的申诉，几乎是有求必应，有诉必改，有改必轻，而且放了很多不应该释放的罪犯。在对犯人进行劳改工作方面，也片面强调所谓人道主义，在政治上放松管教，却在生活上过分为犯人着想，使犯人生活超过当地人民群众的生活水平，甚至有些劳改工作干部丧失立场，与犯人称兄道弟。严重地脱离了群众，造成部分犯人气焰嚣张，抗拒改造。","type":"paragraph"},{"text":"会议指出忽视党的领导是广东政法部门的另一错误倾向。这个倾向检察机关较为严重。省检察院的领导干部片面理解宪法和组织法的条文，他们一味强调“垂直领导”，而把本部门看成可以监督一切，凌驾一切之上，对于省委作出的全省检察工作方针指示，也不贯彻执行。在省检察院的影响下，下级检察机关也有不少不服从当地党委的领导。省法院方面，执行省委对重要案件的批示也是不坚决的。有些法院不问党的中心工作如何，只管关门办案。在片面强调“司法独立”、“独立审判”的影响下，有些基层法院的审判员也不服从甚至抗拒当地党委的领导。会议揭露大量材料证明，……(文件缺)","type":"paragraph"},{"text":" ——原载新华社《内部参考》1957年10月26日。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"24d2457cd4"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
