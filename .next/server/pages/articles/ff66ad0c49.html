ragraph","text":"全国的无产阶级文化大革命形势大好，不是小好。整个形势比以往任何时候都好。形势大好的重要标志，是人民群众充分发动起来了。从来的群众运动都没有象这次发动得这么广泛，这么深入。我们的伟大帅毛主席"},{"type":"paragraph","text":"#从会热烈其跨上海工人事命造反服代委会限制店"},{"type":"paragraph","text":"6"},{"type":"paragraph","text":"098888858188388"},{"type":"paragraph","text":"88888"},{"type":"paragraph","text":"0288“工代会”会场大门太蓬"},{"type":"paragraph","text":"T教康大会场全景争读「中央文革」贺电张春桥同志作重要报告"},{"type":"paragraph","text":"王洪文同志作工作报告小组讨论购买大会宣传画"},{"type":"paragraph","text":"目录中央文化革命小粗的贺电给毛主席的致敬电张春桥同志重要讲话建设一支高举毛泽东思想伟大红旗的英勇善战的"},{"type":"paragraph","text":"朝气蓬勃的工人阶队伍（上海市革命委具会领导成"},{"type":"paragraph","text":"马天水同志贺）高举毛泽东思想伟大红旗誓将无产阶级文化大"},{"type":"paragraph","text":"革命进行到底（工作报告）王洪文）给全市工人革命造反派和革命职工的信（上海工人"},{"type":"paragraph","text":"（50)革命造反派代表会）"},{"type":"paragraph","text":"(53)开幕（潘国平）"},{"type":"paragraph","text":"(55)开幕（王洪文）誓与工人革命造反派团结在一起，战斗在一起，胜"},{"type":"paragraph","text":"（58)"},{"type":"paragraph","text":"利在一起（沪三军代表贺司）加强工农联盟，将革命进行到底（上海市下中农代表）·.··（63）向工人阶杀学习，做决心把无产阶级文化大革命"},{"type":"paragraph","text":"进行到底的无产阶级革命派（上海市革命红卫兵代表贺司）·····（66）大办毛泽东思想学习班，实现思想革命化（上海染化"},{"type":"paragraph","text":"70）八厂革命委会代表发言）"}],"authors":["《一月风暴》编辑部","《工人造反报》编辑部","上海工人革命造反总司令部"],"dates":[{"year":1967,"month":12}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":3,"page_end":6},"tags":[{"name":"王洪文","type":"人物"},{"name":"张春桥","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"中央文革","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ff66ad0c49"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
