" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji28","name":"毛泽东全集第28卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji28.pdf"],"article":{"title":"五绝·赞“密使一号”","alias":"","parts":[{"type":"paragraph","text":"五绝·赞“密使一号”"},{"type":"paragraph","text":"（1950年1月）惊涛拍孤岛，碧波映天晓。虎穴藏忠魂，"},{"type":"paragraph","text":"曙光迎来早。"},{"type":"paragraph","text":"[1]“密使一号”，指华东局情报部门插入在台湾国民党军队核心高层中的地下工作者—吴石将军。吴石（1894—1950），1949年8月15日，福州解放在即，蒋介石手谕电招吴石速赴台湾，吴石赴台前，中共地下组织给他的代号为“密使一号”。吴石抵达台湾后，就任国民党国防部参谋次长。1950年6月10日，被叛徒出卖在台北从容就义。临刑前望着大陆的方向说：“台湾大陆都是一家人，这是血脉民心。几十年后，我会回到故里的。”为了表彰吴石将军为祖国统一大业做出的特殊贡献，1973年周恩来总理力排众议，在毛泽东主席的支持下，由国务院追认吴石将军为革命烈士。"},{"type":"paragraph","text":"[2]惊涛，暗指地下工作者时时身处在一种惊涛骇浪般的险恶环境之中。孤岛，指台湾。"},{"type":"paragraph","text":"[3]虎穴藏忠魂，赞扬打入敌人内部的吴石将军的一片赤胆忠心。"}],"authors":["毛泽东"],"dates":[{"year":1950,"month":1}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":188,"page_end":188},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"65d07542cb"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
