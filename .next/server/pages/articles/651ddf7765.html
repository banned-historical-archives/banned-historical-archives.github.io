" crossorigin="">{"props":{"pageProps":{"books":[{"id":"b9f56fef-aba0-4aed-990f-7e07f337ce38","name":"红旗一九五八年第九期","internal":false,"official":true,"type":"pdf","author":"","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives2/main/b9f56fef-aba0-4aed-990f-7e07f337ce38.pdf"],"article":{"title":"必须贯彻“机、马、牛”相结合的方针","alias":"","parts":[{"type":"paragraph","text":"治的情况，需要树立迷信，需要把人们的思想束搏起米。迷信一破除，思想一解放，就会影响到这种社会制度的巩固。相反，在止会主义、共产主义社会，迷信越是彻底破除，思想越是彻底解放，社会越能巩固，越能发展。所以，我们的恩想建设，便是破除迷信，解放思想。"},{"type":"paragraph","text":"在社会主义-一共产主义社会，人们做了证会的主人，可以有已掌握自已的命"},{"type":"paragraph","text":"必须慧彻“机、马、生”和结合的方针"},{"type":"paragraph","text":"王操犁"},{"type":"paragraph","text":"“奋斗”（黑龙江）第五期（九月五日出版）"},{"type":"paragraph","text":"中共黑龙江省委提出五年获本实现装业机械化的号召以后，引起了广大农民和农村工作老的热烈响应，粉纷发动新的生产突击和投资运动，积极雅备迎接农业机械化的到来。"},{"type":"paragraph","text":"但是在这种合人鼓舞的情况下，出现了一个值得注意的现象，这就是力的作用被忽了。不少人为：“有了机器，耕密就没用处了”，“改良农具的寿命长不了”。个别地方甚至还不知道机器何时到于，就已经开始淘汰尚可使用的耕畜，或者打算卖掠耕蓄来藤买机器。"},{"type":"paragraph","text":"有些同志为，在提倡农业机械化的间时，叉米提侣重视耕畜是不通的，一个先逃，一个落后，提侣二客拜存，岂非自相矛盾？机械化的先进性是无疑的。随若机械化的发展，蓄力农具的使用范围势运了。这样，人们依据唯物主义这个客观真理，可以敢想、敢、敢做了。社会主义一一共产主义社会具正翁人们的创造性创没了条件，是人们创造性最能得到发的时代。所以敢想、敢、敢做是共产主义风格，就是因为这种风格是社会主义一共产主义社会所应有和所能有的风格。将缩小，这孢是无疑的。但是应当券明白一个问题：我们实行机械化也好，利用畜力农其也好，目的都是为了迅速提高农业生产力。如果使机械化孤立起来，把耕蓄排除，把和耕蓄相联系的改良农具也排除，那么不仅在机械化实现之前要造成生产的瓦大损失，即使在机械化实现以后也要造成生产的损失。"},{"type":"paragraph","text":"红旗杂志社启事邮电部邮政总局启事"},{"type":"paragraph","text":"“红旗”杂志自第五期起，定价由一角八分减到一角五分。各地邮局多收者的订费，应由原收订局退回者。"}],"authors":["王操犁"],"dates":[{"year":1958}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":43,"page_end":43},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"651ddf7765"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
