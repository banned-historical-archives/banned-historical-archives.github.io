script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"加拿大和平大会致函毛主席要求我国速召开五大国会议并缔结和平公约取缔原子武器及恢复世界贸易","authors":[],"dates":[{"year":1951,"month":9,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京九日电】　加拿大和平大会主席文幼章、书记詹尼逊致函我中央人民政府毛泽东主席，呼吁迅速遵照苏联最高苏维埃主席团主席什维尔尼克的建议，召开五大国会议，缔结和平公约。该信全文如下:"},{"type":"paragraph","text":"中华人民共和国毛泽东主席阁下:"},{"type":"paragraph","text":"加拿大和平大会全国理事会谨代表大多数加拿大人，敦促美、英、中、苏、法五大国政府，积极地并迅速地遵照什维尔尼克主席致杜鲁门总统信中的建议，召开五大国会议，以缔结和平公约，结束武装竞赛，取缔原子武器以及恢复世界贸易。"},{"type":"paragraph","text":"各国人民都在盼望和平，什维尔尼克主席所建议的会议会揭开历史新的一页，创造新的开始，结束世界紧张的局面，提供朝鲜持久和平的基础并制止新的世界战争。它符合来自地球各部份的、日益高涨的、全世界性的要求。"},{"type":"paragraph","text":"什维尔尼克主席直接寄给杜鲁门总统的信，为人类提供新的希望，是不能搁置不理的。这不是哲学或信仰的问题，而是东方和西方无法计算的、数百万受害人民的生命交关的问题，他们现在要求五大国同意立即会谈，以缔结和平公约并恢复世界的当态，除了五大国此种会议并在此基础上可以恢复联合国的权威之外，再没有其他道路可能导致世界和平。"},{"type":"paragraph","text":"生活在各大国之间的数百万加拿大人盼望五大国政府采取行动，以维护世界和平。"},{"type":"paragraph","text":"我们写信向你以及其它四大国的主要代表作如上呼吁。"},{"type":"paragraph","text":"谨致　加拿大和平大会主席:文幼章敬意　书记:玛丽·詹尼逊"},{"type":"paragraph","text":"一九五一年八月九日于加拿大，多伦多"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"55880b6415"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
