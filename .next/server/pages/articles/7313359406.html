<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"刘宁一在欢迎澳大利亚共产党主席希尔座谈会上的讲话","authors":["刘宁一"],"dates":[{"year":1967,"month":11,"day":12}],"is_range_date":false,"parts":[{"text":"刘宁一在欢迎澳大利亚共产党主席希尔座谈会上的讲话","type":"title"},{"text":"刘宁一","type":"authors"},{"text":"〖地点：北京师范大学〗","type":"appellation"},{"text":"希尔同志是澳大利亚共产党（马列主义者）的主席，加拉格尔同志是澳大利亚共产党（马列主义者）中央委员。","type":"paragraph"},{"text":"澳大利亚共产党是高举马列主义、毛泽东思想伟大红旗的。在希尔同志的领导下，澳共（马）全党认真活学活用毛泽东思想。希尔同志和澳共（马）全党对我们伟大领袖毛主席的革命路线无限信仰、无限崇拜、无限忠诚，对中国的无产阶级文化大革命高度评价、坚决支持。","type":"paragraph"},{"text":"我们的同志常常在报纸上看到希尔同志及澳共（马）对我们中国文化大革命和毛主席的支持、赞扬，对文化大革命的声明。这是伟大的马列主义的国际主义，是对我们极大的支持和鼓舞，我们对他们表示极大的感谢！","type":"paragraph"},{"text":"我特别要介绍的是，希尔同志本人是对苏修、对阿伦尔集团的第一个造反者，是造反派！他们两个是澳大利亚有代表性的造反派，我们对他们表示衷心的欢迎！在希尔同志领导下的澳共（马）和毛主席领导下的中国共产党在反对苏修、美帝及各国反动派的战斗中，肩并肩、手携手、我们是亲密战友。我们是两个战斗、友谊、马列主义、毛泽东思想的党。澳共（马）在希尔同志领导下，已经在大洋洲把红旗插起来了，他们为了把红旗插起来，他们为了把毛泽东思想在澳大利亚革命党中成为武器作了很多工作，取得了重大成就，而且在将来一定要取得更大成就。","type":"paragraph"},{"text":"我们和他们一起在反对帝、修、反的斗争中已经取得了光辉的成就，而且将要取得更加辉煌的成就。希尔同志和我们大家有这样的信心，要把澳大利亚变成到处插遍毛泽东思想伟大红旗的、红彤彤的澳大利亚，我们中国人民、澳大利亚人民和全世界人民都有这个信心，把中国做为世界革命的根据地，把毛泽东思想红旗插遍全世界。（完）","type":"paragraph"},{"text":"希尔同志讲稿","type":"paragraph"},{"text":"同志们，我非常感谢你们给我们的谈话，我们非常高兴，得到了很大鼓舞。参加今天这样的讨论，感到很高兴，毛主席说过：“要先当学生。”今天早晨，我们就是来老老实实当学生的，我讲上面的话是很诚恳的，因为你们所知道的东西比我们多很多，你们参加实际斗争的经验，参加两条路线斗争的经验比我们多很多。毛主席还说过：“没有调查就没有发言权。”有的时候，我到中国来，到一些地方，中国同志要（我们）提意见。我觉得我没有这样的经验，没有很好地调查研究，很难提出这样的意见。","type":"paragraph"},{"text":"今天，有一件事情，我和加拉格尔同志脑子里印象是很深的，就象毛主席讲的，我们说的有些话可能很对，是否真正运用了毛泽东思想，那又是一回事。一个人只有去干了，去做了。才能充分了解毛泽东思想。据今天你们所讲的这些东西，这说明你们是有了把毛泽东思想运用于实践的具体经验，而你们的实践证明了，毛泽东思想是正确的，这个实践也证明了毛泽东思想是马列主义的最高发展。","type":"paragraph"},{"text":"昨天晚上，我们第二次参观了北京红卫兵展览。在昨天参观时，那里的同志很好地向我们指出了澳大利亚同志写的文件以及我们党的一些文件。当时，我有一个感觉，把这些话写出来的是一回事。在你们这里，在无产阶级专政的条件下，你们非常出色地把毛泽东思想运用到实践中去了。而我们澳大利亚、在资产阶级专政的条件下，我们现在正在努力争取把毛泽东思想运用到实践中去，但是，不管是在无产阶级专政的条件下也好，在资产阶级专政条件下也好，在国际共产主义运动中，总是存在两条路线斗争的，一条是毛泽东思想的路线，而另一条路线就是刘少奇的路线，也就是过去历史上及目前与将来的修正主义者所执行的路线，当时，他们口头上也讲马列主义，打着红旗反红旗。","type":"paragraph"},{"text":"我发现这里有很多同志是懂英文的，而我们很无知，只懂英文，不懂别的国家的文字。这里，我想用英文向你们表示：我们衷心地支持你们伟大、光荣的斗争！你们中国的无产阶级文化大革命和毛泽东思想也是对我们很大的支持，同时，我们也代表从很远的地方的澳大利亚同志给予你们的支持。（完）","type":"paragraph"}],"comments":[],"origin":"1967年11月16日清华大学井冈山斗批改战团编印《学习资料》第44期。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"刘宁一","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7313359406"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
