script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"以色列政府决定取缔极右组织","authors":["谢栋风"],"dates":[{"year":1995,"month":11,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"以色列政府决定取缔极右组织"},{"type":"paragraph","text":"新华社耶路撒冷１１月１９日电（记者谢栋风）以色列内阁今天决定取缔从事各类恐怖活动的极右组织，以消除这些组织对国家安全及民众生活构成的严重威胁。"},{"type":"paragraph","text":"以色列内阁在每周例会后责成检察总长、警察总监、以军总参谋长及国家安全局局长制订相应的计划，制止这些极右组织的“颠覆活动”，并最终取缔这些组织。"},{"type":"paragraph","text":"内阁还决定，根据以色列的《回归法》，政府将禁止那些支持极右组织或支持暴力行为的海外犹太人入境，禁止他们到以色列定居或旅游。"},{"type":"paragraph","text":"同时，内阁决定成立一个部长委员会，制订具体的法规，以确保国家资金不再直接或间接地被用于支持极右组织。"},{"type":"paragraph","text":"这个委员会由司法部长利巴伊领导，其成员包括财政部长、教育部长、内政部长及宗教事务部长。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f4f6c29b0c"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
