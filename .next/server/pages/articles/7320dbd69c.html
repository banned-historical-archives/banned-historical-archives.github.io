" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji48","name":"毛泽东全集第48卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji48.pdf"],"article":{"title":"毛泽东等祝贺蒙古人民革命四十四周年的电报","alias":"","parts":[{"type":"paragraph","text":"毛泽东等祝贺蒙古人民革命"},{"type":"paragraph","text":"四十四周年的电报！"},{"type":"paragraph","text":"（1965年7月10日）乌兰巴托蒙古人民革命党中央委员会第一书记、蒙古人民共和国部长会议主席尤·泽登巴尔同志，蒙古人民共和国大人民呼拉尔主席团主席扎·桑布同志："},{"type":"paragraph","text":"在蒙古人民革命四十四周年的时候，我们代表中国人民、中国共产党和中国政府，向蒙古人民、蒙古人民革命党和蒙古人民共和国政府致以热烈的祝贺。"},{"type":"paragraph","text":"中蒙两国人民之间存在着深厚的友谊。中国人民今后仍将在马克思列宁主义和无产阶级国际主义的基础上，同蒙古人民一起，为加强中蒙两国人民的友谊和团结、为反对帝国主义侵略和战争政"},{"type":"paragraph","text":"[1]这是毛泽东以中国共产党中央委员会主席的名义和中华人民共和国主席刘少奇、全国人民代表大会常务委员会委员长朱德、国务院总理周恩来联名给蒙古人民革命党中央委员会第一书记、蒙古人民共和国部长会议主席尤·泽登巴尔，蒙古人民共和国大人民呼拉尔主席团主席扎·桑布的电报。祝贺蒙古人民革命四十四周年。1921年蒙古人民在苏俄红军的援助下于7月8日解放库伦，击溃温甘伦白匪军，取得革命胜利。7月11日，在库伦正式成立人民革命政府。毛泽东全集第四十八卷策、为维护世界和平而共同努力。"},{"type":"paragraph","text":"祝兄弟的蒙古人民在建设社会主义的事业中，取得新的成就。"},{"type":"paragraph","text":"中国共产党中央委员会主席毛泽东中华人民共和国主席刘少奇中华人民共和国全国人民代表大会常务委员会委员长朱德中华人民共和国国务院总理周恩来"},{"type":"paragraph","text":"一九六五年七月十日"}],"authors":["毛泽东"],"dates":[{"year":1965,"month":7,"day":10}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":85,"page_end":86},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"朱德","type":"人物"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7320dbd69c"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
