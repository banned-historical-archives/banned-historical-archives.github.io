script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"王亚南等编写《资产阶级古典政治经济学名著选集》完稿","authors":["林其泉"],"dates":[{"year":1962,"month":8,"day":31}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　由厦门大学校长王亚南和复旦大学教授吴斐丹，上海财经学院教授伍纯伍、刘絜敖，上海社会科学院经济研究所教授王惟中等共同编写的《资产阶级古典政治经济学名著选集》，经过一年多的精心编选，最近已经完稿，不久将由商务印书馆出版。"},{"type":"paragraph","text":"《选集》根据马克思在《政治经济学批判》中对古典经济学所设定的范围，选入了八位作者的十一部代表著作。其中有威廉·配第的《赋税论》、《政治算术》和《货币问答》；布瓦基尔伯的《法兰西详情》、《谷物论》；魁奈的《经济表》和《经济表分析》；洛克的《论降低利息和提高货币价值》；杜阁的《关于财富的形成和分配的考察》；亚当·斯密的《国民财富的性质和原因的研究》(《国富论》):里嘉图的《政治经济学及其赋税原理》；西斯蒙第的《政治经济学新原理》。"},{"type":"paragraph","text":"《选集》开头有编者写的一篇引论，对古典经济学的发生发展变化过程及其在政治经济学史上的地位和作用作了全面而扼要的评价。全书按这些作者和论著的年代顺序编排，并对每个作者作了简单的介绍，对其中费解而又必须了解的经济概念、术语以及历史事例等都作了注释。　(林其泉)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9a87135025"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
