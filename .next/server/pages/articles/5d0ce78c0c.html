script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"美国强盗军舰、飞机连续侵入我领海领空我提出严重警告  我国人民对美帝军事挑衅表示极大愤怒  用战无不胜的毛泽东思想武装起来的伟大中国人民是不好惹的，我们已经作好一切准备，你们胆敢一意孤行，继续捣乱必将受到严厉惩罚。","authors":[],"dates":[{"year":1967,"month":3,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"美国强盗军舰、飞机连续侵入我领海领空我提出严重警告"},{"type":"paragraph","text":"我国人民对美帝军事挑衅表示极大愤怒"},{"type":"paragraph","text":"用战无不胜的毛泽东思想武装起来的伟大中国人民是不好惹的，我们已经作好一切准备，你们胆敢一意孤行，继续捣乱必将受到严厉惩罚。"},{"type":"paragraph","text":"新华社二十一日讯　三月二十日十四时三十分至二十二时二十四分，美国军舰一艘，侵入我福建省黄岐半岛以东地区领海。三月二十一日六时二十六分至十时，美国军舰一艘侵入我福建省镇海至东山岛以东地区领海。同日十四时四十三分至十六时二十三分，美国军用飞机三批三架，侵入我广东省海南岛昌化以西地区领海上空。对于美国军舰和军用飞机的这种军事挑衅，我外交部发言人奉命提出第四百二十九次严重警告。"},{"type":"paragraph","text":"新华社二十一日讯　本社记者报道：美帝国主义军舰一艘，昨天和今天连续侵入我福建省黄岐半岛以东、镇海至东山岛以东地区领海，军用飞机三批三架今天侵入我海南岛昌化以西地区领海上空。这是约翰逊政府在大搞侵略越南战争“升级”，在东南亚加紧策划军事冒险活动的时候，对中国人民进行的新的严重的军事挑衅，激起我全国人民的极大愤怒。我外交部发言人奉命提出第四百二十九次严重警告。"},{"type":"paragraph","text":"侵入我领海的这艘美国强盗军舰是第七舰队旗舰“普罗维顿斯号”巡洋舰。人们知道，美国海军第七舰队，是为美帝国主义推行侵略和战争政策服务的一支重要力量。它直接参加了侵略越南的战争，屠杀越南人民。一九五○年，这支舰队在参加侵略朝鲜战争的同时，进驻台湾海峡，霸占了我国领土台湾省，十多年来不断向我进行军事挑衅。它还在北部湾不断炮击、轰炸我国渔船，对中国人民欠下了累累血债。"},{"type":"paragraph","text":"美帝国主义在侵略越南战争中，军事行动不断遭到失败，“和谈”骗局又接二连三地破产，约翰逊政府狗急跳墙，正在作垂死挣扎。这两天，约翰逊带领的一帮军政头目，正在关岛召开杀气腾腾的战争会议，加紧策划扩大侵略越南的战争和在东南亚的军事冒险。最近，美国侵略者还在加紧活动，把台湾、香港作为它扩大侵略战争的活动基地。约翰逊政府派出美军驻太平洋地区总司令夏普、第七舰队司令海兰、驻联合国大使戈德堡等到台湾，同匪首蒋介石和蒋匪帮军政头目秘密“会谈”。美国侵略舰只频繁进出香港，进行一系列的战争活动。美帝国主义“普罗维顿斯号”巡洋舰和军用飞机在这种情况下，侵入我国领海领空进行军事挑衅，这绝不是一个偶然事件。"},{"type":"paragraph","text":"毛主席教导我们：“美帝国主义在全世界到处制造紧张局势，以期达到它侵略和奴役各国人民的目的。美帝国主义自以为紧张局势总是对它自己有利，但是事实是，美国制造的这些紧张局势走向了美国人愿望的反面，它起了动员全世界人民起来反对美国侵略者的作用。”美帝国主义军舰、飞机侵入我领海领空的强盗行径，激起了我国人民的强烈愤怒。我们严正警告美国政府：必须立即停止军事挑衅。用战无不胜的毛泽东思想武装起来的伟大中国人民是不好惹的，我们已经作好一切准备，你们胆敢一意孤行，继续挑衅捣乱必将受到严厉惩罚。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"福建文革","type":"人物"},{"name":"越南战争","type":"主题/事件"},{"name":"朝鲜战争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5d0ce78c0c"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
