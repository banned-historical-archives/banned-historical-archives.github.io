script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"毛主席不是教导我们“越是困难的地方越是要去”吗？现在党让我去教农业中学，那我就听党的话，决心：  在耕读教育战线上当一辈子“志愿兵”","authors":["张菊秋"],"dates":[{"year":1965,"month":12,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席不是教导我们“越是困难的地方越是要去”吗？现在党让我去教农业中学，那我就听党的话，决心："},{"type":"paragraph","text":"在耕读教育战线上当一辈子“志愿兵”"},{"type":"paragraph","text":"今年二月我开始到宝塔农业技术中学当教师。虽然只有九个多月的时间，但是，对我来说，却是很“不平凡”的。"},{"type":"paragraph","text":"当组织上决定让我到农业中学教书的时候，我还没有认识到当农业中学教师也是革命工作，思想很矛盾。心里想：农业中学，将来还不是耍泥巴，有什么搞头？但又一想：我是共青团员，怎么能拒绝党交给的任务呢？于是我口头上答应下来，思想上却有些三心二意，决定先到学校看看再说。"},{"type":"paragraph","text":"到学校一看，一切都不合心意。最后，还是回家去了。二月间，学校快开学的时候，公社党委派王老师到我家来“请”我，我的心情不安起来。我质问自己：能不听党的话吗？学校设备差是推卸担子的理由吗？毛主席不是教导我们“越是困难的地方越是要去”吗？想来想去，觉得这不是对党的正确态度。我决定去教半年或一年再看。就这样，我半自愿半勉强地做了农业中学教师。"},{"type":"paragraph","text":"校长看透了我的心，经常鼓励我：“为党为人民做事，不论干什么都是革命工作。你是知识青年、共青团员，应该把知识贡献给农村。农业中学是为贫下中农办的，应该用革命的精神办好这所学校。”他的话使我的思想开了窍。我自己是劳动人民出身，怎能放弃教好阶级弟妹的责任呢？正在这时，学校组织师生学习毛主席著作，我更清楚地认识到教好贫下中农子弟，就是具体地为人民服务。七月间，我参加了湘潭市的教育工作会议，学了党的关于两种教育制度、两种劳动制度的指示，认识到半工半读、半农半读是我国教育事业发展的方向，是关系到培养可靠的红色接班人的重大问题，感到当一个农业中学教师是一个光荣而又责任重大的任务。我决心为革命事业贡献自己的一切力量，在耕读教育战线上当一辈子“志愿兵”。"},{"type":"paragraph","text":"把农业中学教师工作看成是整个革命事业的一部分之后，在教学上有了变化。我是个高中毕业生，没有教学经验，教好课也是一个难关。上头两堂课时，备课备了好几天，思想很紧张。后来我虚心学习，拜王南斌老师为师，请他指导我教学。教珠算，开头也很吃力，我就下苦工夫练。会计常识有不懂的地方，或者不能与实际结合，我就拿会计账簿反复地去研究。半年来，我边学边教，总算找出一些门道来了。"},{"type":"paragraph","text":"但是，光教好课还是不够，我认识到教师还要做到劳动化。在这方面，我也是经历一番思想斗争的。开始的时候，学校开荒，运砖瓦，我穿着一身干净的衣服，摆出老师的架子，有些事光让学生干，自已在旁边当指挥。搞久了，自己也觉得不象样，也跟同学们一起劳动劳动，但并没有真正认识到要通过劳动锻炼来改造自己。后来，从实践中我逐渐认识到劳动的深刻意义。农业中学的教师只有通过半农半教，通过生产劳动，才能革自己思想的命，革轻视体力劳动的资产阶级思想的命。"},{"type":"paragraph","text":"湖南湘潭市宝塔农中教师"},{"type":"paragraph","text":"张菊秋"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"881574da0f"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
