script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"澧县人民银行和合作社干部  应纠正严重的右倾思想","authors":["谭颖喜"],"dates":[{"year":1952,"month":7,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"澧县人民银行和合作社干部"},{"type":"paragraph","text":"应纠正严重的右倾思想"},{"type":"paragraph","text":"编辑同志：湖南澧县人民银行和县合作社，在业务工作中有严重的右倾思想。银行在农村中贷款，把中农和富农作为主要贷款对象，很少贷给贫雇农。县合作社在贷肥料和预购棉花的工作中，也表现了类似现象。五区高庙乡有一个富农，既从银行贷到了款子，又在合作社取得预卖棉花的定金。他把这些款子全部买了谷子，这些谷子可供他全家吃到秋收还有余。而八区有一个贫农，在春荒时期既没有贷到款，也没有预卖棉花，生活极端困难。四月份他收割大麦以后，就急着要出卖，但合作社不收购。他没有办法，只好按每石大麦一万元的价格卖给酒坊老板（当时市价为二万八千元）。银行、合作社为什么不照顾基本群众呢？原来他们是怕把款贷给贫雇农以后收不回来，不如贷给中农和富农容易收。我认为这种思想是极其错误的，希望有关部门进行检查，迅速纠正这种现象。    谭颖喜"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7ef235b5f9"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
