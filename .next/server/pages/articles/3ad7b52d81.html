" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoistlibrary","name":"马列毛图书馆","internal":false,"official":false,"type":"db","author":"网络资料","files":"","article":{"title":"让“欧洲议会选举”滚蛋吧！","authors":["LGBTI革命行动","《人民事业报》","无产阶级阵线","革命青年"],"dates":[{"year":2019}],"is_range_date":false,"comment_pivots":[],"comments":[],"page_start":0,"page_end":0,"description":"","parts":[{"type":"paragraph","text":"二〇一九年"},{"type":"paragraph","text":"从5月23日到26日，欧盟的27个成员国准备向我们开个名为“欧洲议会选举”的天大玩笑，以选举一个毫无实权的冒牌议会，用来在那些早就由上游的“欧洲委员会”决定的问题上发挥纯粹的咨询作用——这一“委员会”的成员已经由马克龙、默克尔和萨尔维尼们任命好了。这个傀儡议会的700多名代表，以及比这还多的“专员”和“官员”们，仅有的职责就是坐在那儿无所事事，以及替自己的政党捞钱。"},{"type":"paragraph","text":"我们来自工人阶级的人大多都看透了这点。在 2014年欧洲最后一次大选中，我们有54%的人没有投票。对于政客们参选时的诺言，我们知道得一清二楚：无论它们多么悦耳动听，到头来，这群人照旧只会替有钱人说话。"},{"type":"paragraph","text":"现在，该是听听我们的声音的时候了。我们要主动抵制所谓的“选举”，让它失信于民；我们要接下所谓“欧洲议会”的伪装。最重要的是，我们要揭穿所谓的“欧盟”——这个帝国主义联盟压迫、剥削世界人民以进行帝国主义统治的所作所为。"},{"type":"paragraph","text":"这些国家统统在替财主和大老板们服务，对我们老百姓和工人们的事情关心得越来越少。它们替资本家们推动战争。我们得说，这些什么“选举”的名堂，大体上讲，根本给不了我们半点好处。现在，是时候把我们的生活和财富夺回我们手中了！"},{"type":"paragraph","text":"我们听够了什么“民族的”、“人民的”、“国家的”欧洲，也不指望沙文主义和现行法律退出欧盟。我们知道这些改变不了法国和这个联盟对我们的剥削，更不能撼动用于进行这种剥削的资本主义体系。我们只得把欧洲从一个极端推向另一个极端。这儿是唯一一条能引我们达成目标的道路：革命！"},{"type":"paragraph","text":"抵制欧洲议会选举！ 不要选举，要革命！ 让我们干翻欧盟——这个帝国主义黑帮！"},{"type":"paragraph","text":"《人民事业报》-革命青年-LGBTI革命行动-无产阶级阵线"},{"type":"paragraph","text":""}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3ad7b52d81"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
