script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"在斗争中活学活用毛主席著作 努力缩短与焦裕禄同志的差距","authors":["杨进"],"dates":[{"year":1966,"month":2,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"中共上海市电影局委员会书记　杨进"},{"type":"paragraph","text":"从焦裕禄同志的彻底革命精神，毫不利己专门利人，永远忠于党，永远忠于人民的崇高的共产主义品质中，使我更加感到毛泽东思想的伟大，更加看到革命事业的灿烂远景。正因为有着千千万万劳动人民在革命斗争中活学活用毛主席著作，才出现了象雷锋、王杰、麦贤得那样为革命一不怕苦、二不怕死的战士，象焦裕禄那样为人民鞠躬尽瘁的好干部。而他们又只不过是毛泽东时代千千万万英雄人物的杰出代表。在当前高举毛泽东思想伟大红旗、全党全民活学活用毛主席著作的形势下，我们的生活中将会出现更多的雷锋、王杰、麦贤得式的战士和焦裕禄式的好干部。因此，焦裕禄这样英雄人物的出现，确实给了我们每个同志以无比的力量与信心。"},{"type":"paragraph","text":"一个人活在世界上，总是有个“我”，问题是如何对待这个“我”。一切剥削阶级都是要求别人，甚至全世界“为我而存在”，“为我而生”，“为我而亡”。具有无产阶级世界观的，则把“我”看作为改造世界而存在，为阶级为人民大众创造幸福而生而死。雷锋那样“专门利人，毫不利己”，王杰那样“一不怕苦，二不怕死”，焦裕禄那样为革命“心里装着全体人民，唯独没有自己”，都是我们无产阶级革命战士的典范。只有象他们那样，才能在一旦千百万群众的利益需要自己作出牺牲时，毫不犹豫地把革命的利益、群众的利益放在第一位。在这方面，焦裕禄同志是我们所有革命同志学习的好榜样。"},{"type":"paragraph","text":"焦裕禄同志立志为三十六万兰考县人民摆脱自然灾害、为实现党的农业纲要宏伟理想而不疲倦地战斗，他顶住病魔的纠缠，和群众同甘共苦，刻苦地向群众学习，认真地向毛主席著作学习。他白天到群众中调查访问，回来读毛主席著作，晚上“过电影”，早上记笔记。真是革命者生活的典范!因为他每天都把全县抗灾斗争的情景，象一幕幕电影活动在他的脑海里，他就会有激情，就会带着一连串的问题去请教毛主席著作。我们通常不是把看戏、看电影作为文化生活的享受吗?不是以革命的文艺来鼓舞自己的革命热情吗?看戏、看电影毕竟只能占据我们生活的一小部分时间，而中国的革命、世界人民的革命斗争中无数可歌可泣的英雄事迹，帝国主义、修正主义和各国反动派的卑污与穷凶极恶的面目，和在他们压迫下千千万万劳动人民的苦难，这一切活的电影，我们如果能天天在脑子里过一过，而不是白天晚上过的尽是吃喝玩乐、个人名利、庸俗排场这样的电影，我们就能永远保持火热的革命激情，才会不知疲倦地去战斗，才会如饥如渴地去学毛主席著作。我虽比焦裕禄同志早生，参加革命也有多年，但我和他却有着很大的差距。我应该以焦裕禄同志的彻底革命精神来激励自己，应该以他的崇高的共产主义品质，作为自己学习的榜样，在下半辈子生活中努力赶上去!要在“永远忠于党，永远忠于人民，永远忠于毛泽东思想，真正成为毛泽东同志的好学生”这个尺度上，努力缩短和焦裕禄同志的差距!"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6373051590"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
