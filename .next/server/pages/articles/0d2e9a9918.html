" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji32","name":"毛泽东全集第32卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji32.pdf"],"article":{"title":"对增修两个机场报告的批语","alias":"","parts":[{"type":"paragraph","text":"对增修两个机场报告的批语！"},{"type":"paragraph","text":"（1952年8月22日）应当加修两个机场，费用照支，动工要早。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"八月二十二日"},{"type":"paragraph","text":"[1]这是毛泽东对中央人民政府人民革命军事委员会代理总参谋长聂荣臻1952年8月22日报告的批语。"},{"type":"paragraph","text":"[2]聂荣臻的报告说：苏联方面要求在安东附近增修两个喷气式飞机场，以便于在此驻扎的苏联空军罗果夫部队的机动和充分发挥力量。经与空军参谋长王秉璋研究，认为现在安东、大东沟、大孤山、凤凰等地共有4个机场，驻扎中苏空军6个作战师，比较拥挤。为作战时能同时起飞较多的飞机，是需要增加机场的，但时间很急促，入冬即不能修，并需款约2200亿元（人民币旧币）。"}],"authors":["毛泽东"],"dates":[{"year":1952,"month":8,"day":22}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":206,"page_end":206},"tags":[{"name":"毛泽东","type":"人物"},{"name":"聂荣臻","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0d2e9a9918"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
