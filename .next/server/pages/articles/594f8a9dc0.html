" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji13","name":"毛泽东全集第13卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji13.pdf"],"article":{"title":"给杨令德“的信","alias":"","parts":[{"type":"paragraph","text":"给杨令德的信"},{"type":"paragraph","text":"（1938年12月14日）令德先生："},{"type":"paragraph","text":"先生两信均收到了，因开六中全会久稽奉复，至以为歉！但袁尘影?兄早嘱高岗?同志令经手机关释放，谅已获悉。此事不但我不知，高岗仿吾?亦均不知，经手机关根据普西北材料邃尔如彼处置，甚为抱歉！尔后此间有何缺陷，倘有所闻，尚祈见告，俾资改进，不胜盼祷！敬复。顺致"},{"type":"paragraph","text":"敬礼！"},{"type":"paragraph","text":"毛泽东上"},{"type":"paragraph","text":"十二月十四日"},{"type":"paragraph","text":"[1]杨令德（1905—1985），内蒙古自治区托克托县人。当时是大公报派驻陕西榆林的记者。"},{"type":"paragraph","text":"[2]袁尘影，杨令德的外甥。1938年年初到陕北公学学习。同年曾误被关押，不久获释。"},{"type":"paragraph","text":"[3]高岗（1905一1954)，陕西横山人。当时是中共陕甘宁边区委员会负责人。"},{"type":"paragraph","text":"[4]仿吾，即成仿吾（1897一1984），湖南新化人。当时任陕北公学校长。毛泽东致杨令德信的手稿。"}],"authors":["毛泽东"],"dates":[{"year":1938,"month":12,"day":14}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":85,"page_end":86},"tags":[{"name":"毛泽东","type":"人物"},{"name":"高岗","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"594f8a9dc0"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
