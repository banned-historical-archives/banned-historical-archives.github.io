script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"活学活用《讲话》　大立毛泽东文艺思想绝对权威上海工农兵围剿三部反动影片他们一针见血地指出:《燎原》《不夜城》《武训传》都是在中国革命的关键时刻抛出来的，是为党内头号走资本主义道路当权派阴谋篡党篡军篡政实现资本主义复辟作舆论准备的","authors":[],"dates":[{"year":1967,"month":6,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社上海31日讯上海广大工农兵群众、红卫兵小将和电　影战线上的无产阶级革命派战士，在隆重纪念伟大领袖毛主席的光辉著作《在延安文艺座谈会上的讲话》发表二十五周年的时候，高举毛泽东思想伟大红旗，高举革命的批判大旗，同仇敌忾，大张旗鼓地批判为党内头号走资本主义道路当权派树碑立传的反动电影《燎原》，批判为这个大野心家鼓吹“阶级斗争熄灭论”及阶级投降主义的反动影片《不夜城》、《武训传》。"},{"type":"paragraph","text":"他们在批判中愤怒地指出:在上海出笼的这三部反动影片，是党内头号走资本主义道路当权派授意炮制和一手扶植的，是为这个党内头号走资本主义道路当权派阴谋篡党、篡军、篡政以实现资本主义复辟作舆论准备的。我们纪念毛主席的《在延安文艺座谈会上的讲话》发表二十五周年，就是要活学活用《讲话》，摧毁反革命修正主义文艺黑线，打倒这条黑线的总后台党内头号走资本主义道路当权派，把无产阶级文化大革命进行到底。"},{"type":"paragraph","text":"广大工农兵、红卫兵小将和电影战线上的无产阶级革命派战士，在批判中一针见血地指出:这三部反动影片，都在中国革命的关键时刻抛出来，这决不是偶然的。一九五一年，在伟大领袖毛主席领导千百万革命人民，经历了几十年的艰辛斗争，取得了我国人民民主革命的胜利，并且在社会主义革命即将到来的时候，反动影片《武训传》狂热地宣扬阶级投降主义、改良主义和奴才哲学，目的就是要把革命拉向后退，走资本主义道路。影片中的武训甘受各种屈辱而引以为快，就是党内头号走资本主义道路当权派在他的《修养》中所提倡的奴才哲学。一九五六年，在我国生产资料所有制方面的社会主义改造完成之后，党内头号走资本主义道路当权派的爪牙，便急忙授意炮制《不夜城》。这部反动影片，是宣扬党内头号走资本主义道路当权派所鼓吹的“剥削有理”的活样板，是一本资产阶级张牙舞爪的变天账，是一部复辟资本主义的宣言书。影片极力鼓吹党内头号走资本主义道路当权派的“阶级斗争熄灭论”，美化资产阶级，宣扬阶级调和，妄图要我们放弃无产阶级专政，使社会主义革命半途而废。一九六二年，正是国内外阶级斗争十分尖锐的时刻，为党内头号走资本主义道路当权派歌功颂德的反动影片《燎原》出笼了。它和党内头号走资本主义道路当权派当时重新抛出他的大毒草《修养》是紧密配合的。影片篡改党史，把这个党内头号走资本主义道路当权派打扮成了中国革命胜利道路的开拓者，对毛主席所开拓的中国革命胜利的道路发起疯狂挑战。这部反动影片，同时也不遗余力地宣扬了党内头号走资本主义道路当权派这个老机会主义者所提倡的抹杀政治斗争的“经济主义”和取消武装斗争的“合法主义”。"},{"type":"paragraph","text":"广大革命群众在批判中一致指出:这三部反动电影的共同要害，都是反对阶级斗争、反对无产阶级专政、反对社会主义、反对当代最高水平的马克思列宁主义——伟大的毛泽东思想。"},{"type":"paragraph","text":"电影战线的无产阶级革命派战士在批判中愤怒揭发反动影片《燎原》、《不夜城》和《武训传》，只不过是解放十七年来，以党内头号走资本主义道路当权派为总后台，由周扬、夏衍等一小撮反革命修正主义分子在上海策划炮制的大量毒草影片中的一部分。过去上海的电影界，是所谓三十年代电影和修正主义电影的大黑窝。一小撮反革命修正主义分子和资产阶级反动“权威”，窃据了上海的电影创作和摄制大权，他们和周扬、夏衍一伙上下呼应，用一条反革命修正主义文艺黑线疯狂抵制毛主席的革命文艺路线，把上海电影界变成为党内头号走资本主义道路当权派复辟资本主义的一个据点。电影战线无产阶级革命派战士指出，一九六一年至一九六三年上海计划摄制的五十部故事片，其中表现工农兵的只有六、七部。这六、七部，绝大多数又是《北国江南》这样污蔑工农兵的大毒草。他们说，这是为什么?这就是毛主席所教导我们的:“凡是要推翻一个政权，总要先造成舆论，总要先做意识形态方面的工作。革命的阶级是这样，反革命的阶级也是这样。”在党内头号走资本主义道路当权派支持下炮制的数以百计的毒草影片，目的就是为他在中国实行资本主义复辟作舆论准备。"},{"type":"paragraph","text":"广大工农兵、红卫兵小将和电影战线上的无产阶级革命派战士，从对这些反动影片的大揭露、大批判中，受到了深刻的教育，大大提高了阶级觉悟。他们从电影战线上两条路线的斗争中，进一步认识到毛主席的《在延安文艺座谈会上的讲话》这一天才地创造性地发展了马克思列宁主义世界观和文艺理论的重要文献，是我们摧毁反革命修正主义文艺黑线的最强有力的武器。他们表示一定要在电影战线上，在一切文艺领域内，坚决捍卫毛主席的革命文艺路线，大立毛泽东文艺思想的绝对权威。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"周扬","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9f66601bea"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
