script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"联系实际狠批资产阶级医疗作风曹杨新村街道医院通过革命大批判，促进医务人员思想革命化，提高了医疗质量，加强了预防工作","authors":[],"dates":[{"year":1970,"month":3,"day":31}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　驻普陀区曹杨新村街道医院工宣队和院革委会，遵循毛主席的“不破不立。破，就是批判，就是革命”的教导，发动医务人员批判资产阶级医疗思想和医疗作风，促进了医务人员的思想革命化，推动了医院的斗、批、改。"},{"type":"paragraph","text":"过去，这个医院的资产阶级医疗作风比较严重。有些医务人员借口“小医院不看大病”，对许多病人采取“推、拖、转”的办法，有的明明不是重病，也把他们转出去。对那些剩下的一般病人，也常常是马虎了事。驻院工宣队和院革委会从实践中认识到，资产阶级医疗作风是工农兵病员的大敌，是革命医务人员的大敌。只有批判了资产阶级医疗作风，树立了无产阶级医疗作风，才能更好地为工农兵服务。他们举办了毛泽东思想学习班，以毛主席的光辉著作“老三篇”为武器，狠批资产阶级医疗作风。许多医务人员，联系思想实际，大摆资产阶级医疗作风的种种表现，历数资产阶级医疗作风的危害性。大家说:借口“小医院不看大病”，对工农兵病员采取“推、拖、转”的办法，就是城市医院的资产阶级老爷作风。作为一个革命的医务人员，绝对不能这样做。碰到重病，我们不能考虑个人名利和危险，而要考虑工农兵病员的生命危险，应该想尽一切办法，把他们从疾病的威胁之中抢救出来。他们说，对那些经过努力可以治疗的病人坚决不转出去。对一般的小病，也要认真治疗，决不能马马虎虎。"},{"type":"paragraph","text":"毛主席教导我们:“应当积极地预防和医治人民的疾病，推广人民的医药卫生事业。”曹杨新村街道医院为了治疗那些比较疑难的疾病和重病，建立了慢性病例讨论小组和急病抢救小组。现在，这个医院不但减少了转诊病人，而且医疗质量也有了提高。如有位患肠系膜淋巴结核的病人，过去不少医生都治疗过，每次都是配点药，再开张病假单算数。慢性病小组成立后，对他的病情作了多次分析研究，制订了系统的治疗方案，进行精心治疗。现在病情有了显著好转，已能上班工作。又如一位被大医院诊断为十二指肠球部溃疡、肠系膜动脉压迫的病人，过去认为这是“不治之症”，每天吃了饭就得头低脚高地卧床休息，病人思想苦闷，精神负担很重。后来这个小组对他的疾病作了仔细分析，发现此人不象是肠系膜动脉压迫，他们重新请外院会诊，果然证实了原来的诊断是错误的。病人消除了思想负担，重新回到了自己的工作岗位。"},{"type":"paragraph","text":"这个医院通过革命大批判，还加强了预防工作。预防工作是地段医院的主要工作。但是，在刘少奇反革命修正主义医疗卫生路线的统治下，这个医院长期轻视这项工作，把做预防工作看成是对医务人员的一种“惩罚”。有些医务人员受了这种“预防工作惩罚论”的毒害，工作不安心，闹无政府主义，放松了除害灭病、预防保健和计划生育等工作。前一时期，他们批判了“预防工作惩罚论”，认识到“预防为主”是我们伟大领袖毛主席提出的重要方针，只有搞好了预防工作，才能提高劳动人民的健康水平，才能在和疾病斗争的过程中打进攻战。不少医务人员表示:坚决斗掉“私”字，克服无政府主义，搞好预防工作，全心全意地为人民服务。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7f38358f49"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
