" crossorigin="">{"props":{"pageProps":{"books":[{"id":"78256f65-d15b-4800-976e-d4a9e6e7a160","name":"红旗一九五八年第二期","internal":false,"official":true,"type":"pdf","author":"《红旗》杂志编辑部","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives2/main/78256f65-d15b-4800-976e-d4a9e6e7a160.pdf"],"article":{"title":"一个青年农民把柴油机改装成了拖拉机","alias":"","parts":[{"type":"paragraph","text":"适时地、恰当地注意润整劳动定额，这是有关提高群众改良农其和发展生产的积板组。在农村中正在出现一个学智文化和科性的一个重要同题。我们正在研究中。改革农县运动要与肆众的技术文化学智结合起来。在改革农具的影响下，广大农民群众特别是青壮年学女化学技术的要求更加追切了，他们与决心书，提保证条件，要限期卸掉文盲朔子，限期学会儿套技术。技术研兜组、技术夜校趣括跃起来"},{"type":"paragraph","text":"一个青年农民把柴油机改装成了拖拉机"},{"type":"paragraph","text":"全李生根是山西省解属县城关演繁业农业合作耽的共青团支部答记，高小学生。他在一九五三年担任了本止的柴油机手，由于工作积，学智努力，现在被选为合作融的技术股长。他在党的培养数育下，在长期劳动限练中，已层成为一个熟辣的柴油机手和年畅的技术革新者。李生楼改装“推拉机”是从去年多率开始的。在党的号召和家业生产大跃进新形势的蔽舞下，他起勇气，大组垃想简题，针对合作社劳力、畜力不足的困难，决心把一部只辑花，谈地的五马力柴油机，改装成能干多种农活的推拉机。在改装这部拖拉机的过程中，李生模遇到很多围难。他以该强的干劲和勇气，把固难克服了。没有学过机械理，不会治圆，他就边想边画，边边做，边微边看，边看边警放。他为了敬装这部拖拉机，下了很大的苦功，会儿十次地跑到附近拖拉机站，观有拖拉机和汽取的构造，研究车轴安装和率输特动的原理。白天没有时圆，他献晚上热夜于；社鼠没有材料，愧就到处拣废料有了材料不会加工，他款找青年铁匠李德置、青年本匠郭贞群等合作起亲干。这样，他们苦干苦错九十多天，没有花费社里一文疑，繁于在今年第2期了。社社都建立了技术夜校和技术研究小学技术的高潮。技术革命和交化革命是互相影响、互相推动的，只有把两者很好地结合起米，才能更好地把农兵改革运动推向新的高潮。"},{"type":"paragraph","text":"（幅者按：本交作者是申共"},{"type":"paragraph","text":"陕西省大票县县蛋起）云三月下句把这部拖拉机改装成功。过去是一部只能于两种活的机器，现在成为一部能耕作、费、运、帆花、磨面、掘种、继草等干多种农活的小型抱拉机了。它在一个缩头内能够微的工作是：耕地二亩，或靶（）堆二十亩，或插接一万斤，或浇地二亩，或始草一千二百斤，或气花一百五十斤，或磨面二百斤；然肥料每小时能蜘三十里，每次载重两干斤以上。所以，杜员称它为“万能拖控机”李生根等改装拖拉机成功的滑息，惊动了邻近合作社男女社目和圣县城多群众，特别是对男女请午们数劲很大，当李生根驾驶着自已亲手改装的”万能拖拉机”，奔慰在村生，激路和图野上的时候，受到了前*靠爽、防周的群众和乡亲们的热烈配贺和过福。许多合作社和工厂派人前去学想，准备推广。"},{"type":"paragraph","text":"解虞县霍十分重视这一敬革，给予很大支持，井决定将至县二百八十八邮柴油机都敬装成小型拖拉机。如实现这一说划，期金县合作社在不太长的谢间里，不用花费多少疑，就可以增加一千四百多马力的耀过改装的小型拼作、运雅机械了。"},{"type":"paragraph","text":"· $3 ·"}],"authors":["仝云"],"dates":[{"year":1958}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":35,"page_end":35},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cb45e8887d"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
