" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji37","name":"毛泽东全集第37卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji37.pdf"],"article":{"title":"对尼泊尔国王马亨德拉祝贺中尼协定签订的电报的复电","alias":"","parts":[{"type":"paragraph","text":"对尼泊尔国王马亨德拉祝贺中尼协定?签订的电报的复电"},{"type":"paragraph","text":"（1956年9月25日）加德满都尼泊尔国王马亨德拉陛下："},{"type":"paragraph","text":"值此中尼协定签订之际，承致祝贺，我谨代表中华人民共和国和中国人民，并且以我个人的名义向陛下、尼泊尔王国政府和人民表示衷心的感谢。祝中尼两国人民的传统友谊，在这一根据和平共处五项原则签订的协定的基础上日益巩固和发展。祝国王陛下健康。"},{"type":"paragraph","text":"中华人民共和国主席毛泽东"},{"type":"paragraph","text":"1956年9月25日"},{"type":"paragraph","text":"[1]指1956年9月20日在尼泊尔首都加德满都签订的《中华人民共和国和尼泊尔王国保持友好关系以及关于中国西藏地方和尼泊尔之间的通商和交通的协定》，载于1956年9月24日《人民日报》。"}],"authors":["毛泽东"],"dates":[{"year":1956,"month":9,"day":25}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":73,"page_end":73},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"176e3ba62b"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
