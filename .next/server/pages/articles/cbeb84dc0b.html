" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoistlegacy.de-5552","name":"关于在处理一批待处理对象的国外股票的事例的报导","author":"上海市化学工业局转发市革会抄家财物处理组","internal":false,"official":false,"type":"pdf","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives11/main/data/5552/5552.pdf"],"article":{"title":"关于在处理一批待处理对象的国外股票的事例的报导","alias":"","parts":[{"type":"paragraph","text":"0028"},{"type":"paragraph","text":"最高指示政策和策略是党的生命，各级领导同志务必充注意万万不可粗心大意。州心与海试总厂茅二分广革命委会妆文处理单"},{"type":"paragraph","text":"编号：14"},{"type":"paragraph","text":"文：196年月日出发之间不从亦机天沛化学世向事要年来文"},{"type":"paragraph","text":"学就"},{"type":"paragraph","text":"号"},{"type":"paragraph","text":"1967年10月5日文件名称及事由：发命革会抄子财物多附件："},{"type":"paragraph","text":"但不于在文乱一机待处醒对就的以外般索"},{"type":"paragraph","text":"的事制的故寻革委会批示"},{"type":"paragraph","text":"全理对家的商外我乐的务树的报行大处理结果请延迷处理就住国，一是期后温是三分革会办公室"},{"type":"paragraph","text":"0029"},{"type":"paragraph","text":"IL"},{"type":"paragraph","text":"最高指示"},{"type":"paragraph","text":"敌人是不会自行消灭的·无论是中国的反动派，或是美国帝国主义在中国的侵略势力，都不会自行退出历史舞台·"},{"type":"paragraph","text":"全心全意地为人民服务，一刻也不脱离群众，一切从人民的利益出发，而不是从个人或小集团的利益出发；向人民负责和向党的领导机关负责的一致性，这些就是我们的出发点。"},{"type":"paragraph","text":"上海市化学工业局转发市革会抄家财物处理组关于在处理一批待"},{"type":"paragraph","text":"处理对象的国外股票的事例的报导各公司、各厂："},{"type":"paragraph","text":"市革会抄家财物处理组对瑞金地区抄家财物处理小组关于国外股票处理的事例报导表明，抄家财物处理既是一场经济斗争，也是一场严肃的政治斗争·国外股票等有价证券的处理，直接关保到国家外汇收入·加速祖国社会主义建设、反帝反修的大事情，必须引起重视提高警惕，严防阶级敌人的破坏活动·希望各单位接到此件后对国外股票等有价证券认真进行一次彻底清理，迅速上交中国人民银行营业部·"},{"type":"paragraph","text":"化工局一线指挥部抄家财物处理组"},{"type":"paragraph","text":"中价十"},{"type":"paragraph","text":"1967年10月5日抄送·市革会抄家财物处理组·市革会工业组主送：略·"},{"type":"paragraph","text":"卢湾区革委会抄家财物处理组推荐瑞金地区抄家财物处理小组在处理一批待处理对象的国外股票的事例的报导很好，现摘发，请参考"},{"type":"paragraph","text":"市革命委员会抄家财物处理组"},{"type":"paragraph","text":"一九六七年九月十八日抄送：略。"},{"type":"paragraph","text":"附卢湾区革委会抄家财物处理组"},{"type":"paragraph","text":"瑞金地区抄家财物处理小组在处理一批待处理对象的国外股票的事例的报导摘录"},{"type":"paragraph","text":"顾××，资产阶级分子，去年被红卫兵抄来大量金银财宝·若干月来，由于生活暂时发生困难，并本人患有癌症？每月在抄来现款中借支·今年五月，顾乘癌症需要开刀之机，在瑞金地区抄家财物处理小组同志面前伴称：“这样一次次来拿钞票也增加你们麻烦，只要将两枚图章还我，今后生活费和医药费都可自己设法解决·”当时瑞金街道小组同志，听到她能自行设法解决生活困难，就同意了她的要求。但因当时一枚图章没有找到，只退还了一枚·"},{"type":"paragraph","text":"后来，中国银行外汇信托服务部的同志来到瑞金小组，要求提供线索，将抄来的外国股票·证券先行处理，尽快向国外收回外汇·这时处理小组的同志想起了顾××抄来的财物中，有一批外国股票，当中国银行同志问及印鉴图章时，他们才知道已中了吸血鬼的好计了。"},{"type":"paragraph","text":"0030上交查抄国内股票和国外有价证券清单"},{"type":"paragraph","text":"电话"},{"type":"paragraph","text":"地址上交单位"},{"type":"paragraph","text":"地址物主姓名"},{"type":"paragraph","text":"股票"},{"type":"paragraph","text":"股东姓名"},{"type":"paragraph","text":"备股票号码张数"},{"type":"paragraph","text":"注股票企业名称"},{"type":"paragraph","text":"财政（税务）机关收讫印章上交单位印章"},{"type":"paragraph","text":"手经"},{"type":"paragraph","text":"人经手人"},{"type":"paragraph","text":"1967年月"},{"type":"paragraph","text":"日注：7.领息凭证应与股票分别列明"},{"type":"paragraph","text":"2.凡填列国外公债丶股票丶保险单丶遗产证明及其他有价证券，有疑问时，可与中国银行联系（电话217466一130分机）3.本表一式三份，连股票等一供上交，经财政（税务）机关盖章后"},{"type":"paragraph","text":"一份作为收据由上交单位留存，二份由财政（税务）机关收取"}],"authors":["上海市化学工业局转发市革会抄家财物处理组"],"dates":[{"year":1967,"month":10,"day":5}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":4},"tags":[{"name":"革命委员会","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cbeb84dc0b"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
