script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"抗议垄断资本家的残酷剥削　抗议反动政府的法西斯迫害资本主义国家罢工斗争此伏彼起","authors":[],"dates":[{"year":1969,"month":11,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社伦敦二十八日电　英国许多行业的工人连日来纷纷举行罢工，抗议垄断资本家的残酷剥削，要求增加工资。"},{"type":"paragraph","text":"伦敦的地下铁道列车员二十八日举行了二十四小时的罢工。这次罢工是列车员冲破反动工会头目种种压制在七天中举行的第二次罢工。目前，三十多列地下铁道的火车被迫停止行驶，地下铁道三分之二以上的运输业务陷于停顿。市内交通一片混乱。"},{"type":"paragraph","text":"曼彻斯特和默尔西河畔的几千名面包工人的罢工已进行了一个星期，并在继续坚持中。"},{"type":"paragraph","text":"据新华社北京三十一日电　马德里消息:西班牙北部一些城市的巴斯克族工人和学生三十日举行罢工和示威，抗议西班牙佛朗哥政权对他们的法西斯迫害。"},{"type":"paragraph","text":"巴斯克人是西班牙的少数民族，他们受到佛朗哥政权的残酷剥削和迫害。最近，悍然把一名巴斯克人判处死刑，这就更加激起了巴斯克人的愤怒。"},{"type":"paragraph","text":"三十日，巴斯克人集居的毕尔巴鄂的大部分码头工人不顾佛朗哥政权禁止罢工的禁令，举行了抗议罢工。"},{"type":"paragraph","text":"据新华社北京三十日电　圣地亚哥消息:智利工人和职员近日来不断开展罢工斗争和示威游行，抗议美帝国主义和本国垄断资本家的残酷剥削，要求增加工资。"},{"type":"paragraph","text":"智利的银行职员九千多人二十九日宣布举行二十四小时罢工，要求政府撤消一项损害智利职工利益的宪法改革草案。"},{"type":"paragraph","text":"首都圣地亚哥的三千多名女工和工人家属二十八日晚在市中心举行反饥饿示威游行，抗议美国和本国垄断资本的残酷剥削，反对生活费用上涨。"},{"type":"paragraph","text":"据新华社北京三十日电　利马消息:秘鲁三万捕鱼工人二十七日举行罢工，要求把在秘鲁沿海捕捞金枪鱼的外资公司收归国有。"},{"type":"paragraph","text":"罢工使全国的渔业生产陷于停顿。秘鲁是世界上生产鱼粉最多的国家。目前，秘鲁国内最大的外资公司是美资“秘鲁渔业公司”，这家公司共有六十条渔船，六个鱼品加工厂，残酷剥削渔业工人。"},{"type":"paragraph","text":"二十八日，秘鲁的一千四百条渔船的一万二千名船员也举行罢工，要求增加工资。罢工得到其他渔船船员的支持。"},{"type":"paragraph","text":"秘鲁渔业工人为了反对剥削，要求增加工资，本月初曾举行总罢工，并组成了斗争委员会。二十一日，渔业工人举行了抗议示威游行，示威群众遭到了反动警察的镇压。但英勇的捕鱼工人不长强暴，第二天又举行集会，表示要坚决斗争。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2dd965f36e"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
