<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"国务院各有关部门负责人在建委座谈会上指出  深批左倾思想  按基建程序办事","authors":[],"dates":[{"year":1980,"month":9,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"国务院各有关部门负责人在建委座谈会上指出"},{"type":"paragraph","text":"深批左倾思想  按基建程序办事"},{"type":"paragraph","text":"据新华社北京9月27日电 为了贯彻国务院关于“渤海2号”的决定的精神，分析总结建国以来基本建设的经验教训，国家建委最近召集国务院各有关部门负责人进行了座谈。参加会议的各部负责同志指出，只有深入批判左倾思想，肃清它的影响，我国基建工作才能走上正确的轨道。"},{"type":"paragraph","text":"许多同志说，解放以来，贯穿我国基本建设的一条指导思想是高指标、高速度，一句话就是“左”。"},{"type":"paragraph","text":"化工部一位副部长说：二十多年来，在基本建设上速度高就说是革命的，速度低就是右倾保守。凡是实事求是，从实际出发，都被指责是右倾。凡是搞高指标、高速度、吹牛皮、说大话的，还说他有干劲，革命精神强。跌了跤子之后，就说是经验不足、是交学费。"},{"type":"paragraph","text":"参加会议的同志认为，由于用“左”的思想来指导基本建设，基建计划不可能不冒进，只看需要，不看可能。因此忽上忽下，忽打忽停，造成很大浪费。"},{"type":"paragraph","text":"参加会议的同志指出，基建要按程序办事，年年喊，年年没有遵守。为什么呢？要快呀！越是大项目，越不按程序办事。制订基建程序的机关和人，带头不按基建程序办事。"},{"type":"paragraph","text":"基建工程兵一位副主任说：霍林河煤矿建设就没有按基建程序办事。从1974年到现在已建了6年，花了三亿多元投资，但至今还没有设计任务书，开采工艺、规模也没有定下来，愈要快愈快不了。"},{"type":"paragraph","text":"建材部一位负责人说，建材部的基建项目严格说来没有一个按基建程序办事。是我们不愿按程序办事？不是。是上边逼我们这么干，因为项目一定下来，要求很急，根本没有时间让你去按程序办事。"},{"type":"paragraph","text":"参加会议的许多负责同志认为，要看清“左”的危害，真正吸取教训，就要下决心敢于解剖基本建设中的“大麻雀”。因为这些工程项目大、投资多、牵涉的面广，解剖了它更能暴露基建战线的问题，更能吸取教训，搞好今后的建设。"},{"type":"paragraph","text":"座谈会后，国家建委发出的通知中指出：国务院“决定”的重要意义不仅是表明中央严肃法纪，重视安全生产，而是对长期以来经济工作中左倾思想的严厉批判。基建部门学习和贯彻“决定”精神，就要联系基本建设实际，解剖麻雀，总结经验，吸取教训。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6472392c97"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
