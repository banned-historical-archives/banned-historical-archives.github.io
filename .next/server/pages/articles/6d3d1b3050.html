script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"澳共(马克思列宁主义者)《先锋报》发表文章苏联领导在修正主义道路上越走越远苏联修正主义者大力保护和扩大特权阶层的地位　越来越准许资本主义和资本主义思想发展　竭力同美帝勾结　命令他们在资本主义国家的追随者奉行苏联修正主义的政策","authors":[],"dates":[{"year":1965,"month":7,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京29日电　墨尔本消息:澳大利亚共产党(马克思列宁主义者)机关报《先锋报》七月出版的第二卷第三十四期刊登题为《修正主义的阴谋更清楚了》的文章，指出赫鲁晓夫现代修正主义者在修正主义道路上越走越远。"},{"type":"paragraph","text":"文章说，“澳大利亚马克思列宁主义者说过，赫鲁晓夫背弃了社会主义事业；赫鲁晓夫修正主义的社会基础是由高薪技术人员和经理人员等组成的苏联特权阶层。对于这些话，有些澳大利亚人当时是不相信的。”"},{"type":"paragraph","text":"“这只是不几年前的事，从那个时候以来，出现了许多事实证明这些话是确实的。”"},{"type":"paragraph","text":"“现在事情要比那个时候清楚得多了。”"},{"type":"paragraph","text":"“事实表明，苏联修正主义者大力在保护和扩大这个特权阶层的地位。”"},{"type":"paragraph","text":"“这些人一点也不愿打乱他们的和平生活，也不想触动他们有钱、有势、有特权的地位。”"},{"type":"paragraph","text":"“他们竭力同美帝国主义勾结，因为他们害怕，不同美帝国主义勾结就会引起战争，他们有钱有势的地位也就会被推翻。”"},{"type":"paragraph","text":"“这个逻辑发展到美苏直接勾结统治全世界。”"},{"type":"paragraph","text":"“照这些修正主义者的逻辑，如果实现了这样的勾结，‘和平’就不会受到扰乱，他们有权、有特权、又有钱的地位因此也得到保障。”"},{"type":"paragraph","text":"“在实际行动中，苏联修正主义者贯彻这种想法，命令他们在资本主义国家的追随者奉行苏联修正主义的政策。”"},{"type":"paragraph","text":"“对资本主义国家的共产党，他们竟然做到这样惊人的地步，要这些党不引导群众扰乱这些国家的现状，要它们唯苏联修正主义者之命是从。”"},{"type":"paragraph","text":"“他们的逻辑是:如果共产党引导和影响工人和劳动人民对资本主义社会制度作斗争，也许就会触发世界大战。”"},{"type":"paragraph","text":"“为了适应这种逻辑，提出了各种各样的‘理论’。通过议会道路向社会主义和平过渡事先就向美帝国主义作出保证:不向资本主义提出挑战。”"},{"type":"paragraph","text":"“另一个这样的保证的逻辑是:苏联的社会主义榜样是这样伟大，它会使资本主义国家的工人转向社会主义。”"},{"type":"paragraph","text":"“和平共处是力图保证不对美帝国主义作斗争的理论。”"},{"type":"paragraph","text":"文章指出，“苏联修正主义者在修正主义的道路上越走越远。”文章说，“来自苏联的消息表明，苏联越来越准许资本主义和资本主义思想发展。”"},{"type":"paragraph","text":"“随着资本主义的出现，贪污、舞弊、年青一代堕落的现象极为普遍。越来越采取判处死刑的办法来压制这种现象——这是徒劳的、无效的办法，因为犯罪行为的基础本身是修正主义促成的社会力量。”"},{"type":"paragraph","text":"“营利动机和私人生产，放弃由中央制订规划——这一切表明资本主义已在复辟。”"},{"type":"paragraph","text":"“最为突出的是对铁托的接待和对他的颂扬。”"},{"type":"paragraph","text":"文章指出，苏联修正主义者事实上否定了一九六○年莫斯科声明对南斯拉夫修正主义的谴责。"},{"type":"paragraph","text":"文章说，“马克思列宁主义者和真诚关心社会主义利益的人们能够比以往更加清楚地看出修正主义者为帝国主义效劳所起的真正的作用。”"},{"type":"paragraph","text":"“列宁早就指出，马克思列宁主义通过从它的队伍中清除机会主义者而加强。”"},{"type":"paragraph","text":"“无疑，马克思列宁主义将在全世界——包括苏联在内——取得胜利。”"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6d3d1b3050"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
