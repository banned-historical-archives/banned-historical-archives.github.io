script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"资产阶级庸俗政治经济学","authors":["成言"],"dates":[{"year":1983,"month":9,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"资产阶级庸俗政治经济学是指专门为资本主义剥削制度辩护的经济学，产生于十八世纪末十九世纪初，创始人是法国的萨伊和英国的马尔萨斯。有名的庸俗经济学家后来还有詹姆斯·穆勒、麦克库洛赫、西尼尔、巴斯夏、约翰·穆勒、凯里等。"},{"type":"paragraph","text":"庸俗政治经济学产生并逐步取代古典经济学的原因是资本主义进一步发展，资产阶级政治上统治地位的确立，无产阶级和资产阶级的矛盾和斗争尖锐化起来。在这样情况下，庸俗经济学家为了维护资本主义剥削，反对社会主义思想和工人运动，就紧紧抓住资本主义一些表面现象大做文章，竭力否认劳动价值论和剩余价值论，鼓吹商品价值由供求关系决定，或由工资、利息和地租所构成的生产费用决定，或由人们主观上对商品效用的评价决定等，其目的是要割断利润、利息和地租同工人劳动的联系。他们编造种种谬论来掩盖剩余价值来源。例如，他们或者把利润说成是资本家管理企业、监督生产“劳动”的报酬；或者说资本家为社会提供了生产资料，为劳动者提供了生活资料，就是提供“服务”，资本家收入是这种“服务”的报酬；或者说资本家为了投资生产而“节制了自己的享受”，资本家收入是对这种“节欲”的报酬等等，目的都是要掩盖资本主义剥削，抹杀无产阶级和资产阶级的矛盾。"},{"type":"paragraph","text":"庸俗经济学在演变过程中适应资产阶级不同时期的需要编造了种种“理论”，形成了各种流派，如德国历史学派，奥国学派，美国学派，剑桥学派等。"},{"type":"paragraph","text":"(成言)"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"26774a037e"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
