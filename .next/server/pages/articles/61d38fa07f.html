script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反对垄断资本的残酷剥削和压迫  智利工人罢工　委内瑞拉教师罢教","authors":[],"dates":[{"year":1969,"month":11,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反对垄断资本的残酷剥削和压迫"},{"type":"paragraph","text":"智利工人罢工　委内瑞拉教师罢教"},{"type":"paragraph","text":"新华社六日讯　最近几天来，智利又有一万二千多名工人和职员举行罢工斗争，反对美国和本国垄断资本的残酷剥削和要求改善生活条件。"},{"type":"paragraph","text":"四日，美国国际电话和电报公司在智利的子公司智利电话公司的五千多名工人举行四小时罢工，抗议资方拒不发给他们应得的额外工资。同一天，美国垄断资本控制的“皮萨雷尼奥”工厂的四百名工人也举行罢工，抗议资方拒不满足他们早在两个半月之前就提出的增加工资的正当要求。"},{"type":"paragraph","text":"智利全国保健处的五千四百名工作人员三日举行一天罢工，要求立即支付拖欠的工资。罢工者还占领了卫生部和全国保健处的办公室达数小时。为了要求增加工资，圣地亚哥自来水公司一千多工人四日也举行了一天罢工。"},{"type":"paragraph","text":"委内瑞拉全国六万五千名教师为要求增加工资而举行的大规模罢教四日已进入第六天。这一天，在马拉开波、巴伦西亚、奥尔达斯港、洛斯特克斯等城市，教师们举行了示威游行、集会和其他抗议活动。他们表示，如果反动当局不满足他们的要求，他们决心斗争下去。教师们还要求反动军队从他们所占领的委内瑞拉的大多数学校中滚出去。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"61d38fa07f"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
