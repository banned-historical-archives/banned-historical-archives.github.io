" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji31","name":"毛泽东全集第31卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji31.pdf"],"article":{"title":"中央关于西南局决定停止整党学习全力转入三反致各中央局电","alias":"","parts":[{"type":"paragraph","text":"中央关于西南局决定停止整党学习"},{"type":"paragraph","text":"全力转人三反致各中央局电"},{"type":"paragraph","text":"（1951年12月26日）各中央局："},{"type":"paragraph","text":"据新华社西南总分社十二月二十二日内部情况报道说，“西南区已停止了原订计划的整党学习，全力转入反贪污、反浪费、反官僚主义的整风运动。西南局、西南军政委员会和西南军区均已开过党代表会议。川东、川西、川北、川南、西康及重庆市已作了一般号召。其他各地也将进入动员阶段。西南贪污浪费现象相当严重，据近来初步发现的材料：工业部约八百亿元，其中肖子言和陈松柏两大贪污案即达二百亿元。财政部初步检查为三百亿元，其中以粮食局系统最严重。川西粮食局贪污分子勾结奸商，将粮食支付书偷去给好商到各库取粮，损失公粮十万斤。川北财政厅金库被贪污分子盗走一箱人民币，贪污分子还留一字条说：“我生活困难，暂先支借一下。”建筑中的贪污浪费最普遍，据初步了解已达数百亿元。交通系统贪污浪费约五百亿元”等语。中央认为西南局停止原订整党学习计划，全力转入反贪污、反浪费、反官僚主义的整风运动，是完全正确的，请各中央局也照这样做。"},{"type":"paragraph","text":"中央十二月二十六日"}],"authors":["毛泽东"],"dates":[{"year":1951,"month":12,"day":26}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":190,"page_end":190},"tags":[{"name":"毛泽东","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f2e0e5728c"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
