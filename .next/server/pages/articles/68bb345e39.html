" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji20","name":"毛泽东全集第20卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji20.pdf"],"article":{"title":"致陈赛等电","alias":"","parts":[{"type":"paragraph","text":"致陈等电！"},{"type":"paragraph","text":"（1945年10月19日）陈赓，并告刘、邓、聂、萧："},{"type":"paragraph","text":"（一）胡顽之十六军已顺利通过正太路，到达石家庄，胡令该军积极准备向北平前进。第三军之三十二师十一日晚宿霍县城，翌日续北进，估计已抵榆次；第七师十二日宿临汾以南之赵曲，以后该师行动不明；其军部十四日宿赵城，估计已抵榆次。十六日胡令第一军之一六七师集中侯马待令，有继续北进模样，该师十六日以前，在闻喜、安邑、虞乡线。"},{"type":"paragraph","text":"（二）太岳纵队应向洪洞、灵石、介休段东侧地区隐蔽集结，积极准备战场，坚决歼灭第七师或一六七师。如该师不北上时，则占领临汾至介休段同蒲路，发动群众，创造战场。"},{"type":"paragraph","text":"（三）正太路南北各军分区之地方兵团及民兵，仍继续向正太路破袭。赵尔陆部主力立即转向平汉路，集中力量攻占石家庄、保定段的几个车站、县城，控制铁道一段，各个歼灭顽军。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"十月十九日[1]这是毛泽东为中共中央军委起草的关于平汉战役给陈并告刘伯"}],"authors":["毛泽东"],"dates":[{"year":1945,"month":10,"day":19}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":457,"page_end":457},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"68bb345e39"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
