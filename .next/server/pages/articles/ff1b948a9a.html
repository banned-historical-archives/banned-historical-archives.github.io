" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji16","name":"毛泽东全集第16卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji16.pdf"],"article":{"title":"给续范亭的停","alias":"","parts":[{"type":"paragraph","text":"给续范亭的信！"},{"type":"paragraph","text":"（1941年12月23日）"},{"type":"paragraph","text":"两示敬悉。电已照发，所见很对。承馈酒蜜，即与若飞分尝。我臂部十愈五六，是洗澡晒太阳之功，再过一时，或可全愈。尊恙有起色，大家欢喜。惟不宜急于求愈，不宜即准备行动，我看你的身体至少再休养一年，以为如何？住地以适为主，中央医院如有房子自好，否则即住现处，有林、谢、高、南诸人谈谈可慰寂寞。元旦此间有一小晚会，如有兴致可来看看，我派车子接你。"},{"type":"paragraph","text":"[1]这是毛泽东致续范亭信的主要内容。"}],"authors":["毛泽东"],"dates":[{"year":1941,"month":12,"day":23}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":332,"page_end":332},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ff1b948a9a"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
