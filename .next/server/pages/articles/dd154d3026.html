<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"全国青年工人代表会议  向中共中央和毛主席的保证书","authors":[],"dates":[{"year":1958,"month":4,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"全国青年工人代表会议"},{"type":"paragraph","text":"向中共中央和毛主席的保证书敬爱的党中央和毛主席："},{"type":"paragraph","text":"我们出席全国青年工人代表会议的全体同志，怀着激动的心情，代表全国一千万青年职工，向我们敬爱的党中央和我们伟大的领袖和导师致以最崇高的敬意。"},{"type":"paragraph","text":"党领导着我国人民，胜利地进行着一个革命又一个革命。每一次革命斗争，都使我们受到深刻教育，增加了我们前进的勇气和信心。现在党又领导着全国人民以大跃进的姿态，多快好省地建设社会主义。这是我国有史以来的最好时光。我们青年工人从来没有像今天这样精神焕发、干劲十足。我们一定要在党的英明领导下，使我们的国家迅速地摆脱经济上和文化上的落后状态，成为一个拥有现代工业、现代农业和现代科学文化的社会主义的强国。"},{"type":"paragraph","text":"我们深深知道，要担负起这个伟大艰巨的历史任务，决不是轻而易举的事。我们青年工人经历少，锻炼差，容易受到非无产阶级思想的影响。但是，我们是在敬爱的党和毛主席的教养下成长起来的，我们的心跟党和社会主义紧紧地联结在一起。我们一定努力学习政治，改造思想；学习技术，提高本领，把自己锻炼成为坚强的阶级战士，决不使自己的思想落后于伟大的时代。"},{"type":"paragraph","text":"我们向党保证：我们一定要勤勤恳恳的劳动，随时听从党的召唤。党要我们到那里，我们就到那里，不讲价钱。党要我们干什么，我们就干什么，不挑不拣。那里有困难，我们就到那里去，不避艰险。我们青年工人一定要像党所教导的那样，永远热情积极，朝气蓬勃，成为建设祖国的一支英勇的突击队。"},{"type":"paragraph","text":"我们向党保证：我们一定下决心勤学苦钻，顽强地向文化进军，向技术进军，向科学进军。尽管我们的知识少，技术低，但党的教育使我们志气高，勇气大。技术是钻研出来的，知识是学习得来的，正像我们的一位代表所说的“厂子不在大小，机器不在新老，资金不在多少，唯有人是宝”。只要我们青年人能够像党经常教导的那样，老老实实地，坚持不懈地向老工人学习，向技术人员学习，向一切有本领的人学习，把他们一切有益的知识和经验都接受过来，加以运用和发展，我们就一定可以尽早使自己成为精通业务技术的人，成为有觉悟有本领的社会主义建设者。"},{"type":"paragraph","text":"敬爱的毛主席，我们一定牢牢记住您的教诲：“虚心使人进步，骄傲使人落后”。我们参加这次会议的同志，虽然在工作上做出了一点成绩，也只不过做了我们应该做的事情。这些成绩的取得，是同党的领导，工会和共青团的教育，老工人的指点，以及集体对我们的支持和帮助分不开的。社会主义事业飞跃地向前发展，不断地向我们提出了新的更高的要求。我们一定不骄傲，不自满，继续努力，加强锻炼，做到又红又专，红透专深。"},{"type":"paragraph","text":"敬爱的党中央和毛主席，我们就要离开上海，回到自己的岗位上去。在会议结束以前，我们通过了向全国青年工人的倡议书。我们相信，所有的青年职工都将用自己的实际行动，同全国职工一起，以排山倒海的气概，贯彻又多又快又好又省的方针，在建设社会主义的伟大事业中作出更大的成绩。"},{"type":"paragraph","text":"全国青年工人代表会议"},{"type":"paragraph","text":"1958年4月12日"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dd154d3026"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
