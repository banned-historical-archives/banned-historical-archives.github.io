script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"冲破黄色工会控制奋起反对剥削  美航空公司万名人员罢工","authors":[],"dates":[{"year":1969,"month":8,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"冲破黄色工会控制奋起反对剥削"},{"type":"paragraph","text":"美航空公司万名人员罢工"},{"type":"paragraph","text":"新华社九日讯　华盛顿消息：美国泛美航空公司的一万名地勤人员从七日晚起举行大罢工，要求增加工资，迫使这家美国最大的海外航空公司的国内外班机全部停航。"},{"type":"paragraph","text":"这家航空公司的地勤人员由于受到公司当局的残酷剥削，早就要举行罢工，但是黄色工会头头却和公司当局进行勾结，一再拖延罢工，地勤人员忍无可忍于七日晚纷纷冲破了黄色工会头头的控制，掀起了这场大罢工，给了垄断资产阶级以新的打击。"},{"type":"paragraph","text":"此外，美国另一家航空公司——西方航空公司的二千名机械工人和其他雇员，也曾在七月三十日举行罢工，要求增加工资，迫使这家航空公司开往加拿大、墨西哥、夏威夷以及在美国西部十四个州内的班机一度全部停航。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"54e5fb205a"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
