script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"湘潭大学党委克服左倾思想影响  调进一批有真才实学的教师","authors":["何先义","邬鸣飞"],"dates":[{"year":1981,"month":8,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"湘潭大学党委克服左倾思想影响"},{"type":"paragraph","text":"调进一批有真才实学的教师"},{"type":"paragraph","text":"湘潭大学1974年重建时，教师很少。当时学校党委受左倾思想影响，规定：有历史问题的教师不要，家庭出身不好的不要。结果教师力量一直很弱。1977年，学校党委开始克服左倾思想的影响，决定：只要有真才实学，热爱祖国，拥护共产党的，就要。消息传出之后，学校收到全国各地近两千封推荐、自荐信。学校派人着重考查他们目前的学术水平和教学、科研的能力。从1978年到1980年，共调进了360名教师。南开大学数学系毕业的杨向群，原在邵阳市一家工厂的子弟学校教书，他在“概率论马尔可夫过程”的研究方面有显著成绩，受到国内外学者的重视。湘潭大学把他调到数学系任教，现已提升为教授。原湖南师院中文系副教授彭燕郊，1955年曾被错误地打成“胡风分子”，下放到长沙一家街道工厂劳动。湘潭大学把他调到学校，最近已提为教授。1951年北京大学理学院毕业生袁龙蔚，长期在交通部门工作，一直坚持科学研究，发表过多部专著和译著，1979年调到学校，担任流变力学的教学任务，已被提升为教授。这些调进的教师，充实、加强了湘潭大学的教学科研力量。目前，这所大学已发展到10个系，教师600多人。教学质量提高了，并出了一批科研成果。"},{"type":"paragraph","text":"何先义  邬鸣飞"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0bc51f97a3"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
