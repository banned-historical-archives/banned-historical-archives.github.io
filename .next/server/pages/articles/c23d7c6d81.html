" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"昆明工人在鸣放中暴露的一些错误思想","authors":[],"dates":[{"year":1957,"month":9,"day":25}],"is_range_date":false,"parts":[{"text":"昆明工人在鸣放中暴露的一些错误思想","type":"title"},{"text":"新华社云南25日讯　昆明电线厂、云南纱厂、汽车修配厂最近向工人进行社会主义教育，在组织讨论中，暴露了一些错误思想和言论，集中有以下几方面：","type":"paragraph"},{"text":"1．关于粮食统购统销问题。电线厂工人罗启成说：“现在的统购统销倒好，就是农村中买卖不自由，要买点东西都要到合作社去买，卖的东西要统卖给国家，连吃小菜都要统一到社里去买。”洪志祥说：“粮食供应太少，菜臭了不要卖，对政策没有意见，对管理干部有意见”。另一工人田福家反映：“家里没有吃的还要叫卖余粮，天天去买大饼、洋芋吃。”云南纱厂有工人认为“一面大丰收，一面饿死人的现象倒是没有，但不够吃的现象是有的，我们那里粮食不够吃，看着田里的谷子很好，但是没有吃的。”检验科向培珍说：“龚自知(右派分子)的发言硬是好了”，又说“宜良一家合作社的农民，每人每月才得十四斤粮食”。","type":"paragraph"},{"text":"2．关于生活是不是提高方面。电线厂一工人说：“说生活提高了我不明确，过去大食堂吃七元多，现在要吃十三元，生活是提高还是降低了，为那样我不知道。”云南纱厂一工人说：“这些右派说的话有些还是有道理的。如我解放前还好，但是现在反而搞得抓不开”(解放前她只有一个孩子，现在有五、六个)。汽车修配厂段朝文说：“大食堂象南强街(解放前贫苦劳动人民较集中的地方)一样，这里一堆那里一堆，当学徒时还有凳子坐着吃饭，旧社会比现在还要好些，解放后，人家的生活都提高了，我的倒降低了。”另一工人说：“新社会好不好，就是我的生活好不好，过去还有办法，可以给资本家做工。”还有的说：“吃肉的是干部，说农民生活提高了，我看是吹牛”，“农村一家一个月买二两油还要点灯，农民不养猪，自己捞不着吃，排了一天队也买不着。”","type":"paragraph"},{"text":"3．关于工资晋级问题。十五岁左右的工人大多数对工资有意见，电线厂工人孙永泰说：“52年进厂，到现在都没有晋级，是工作调动大”，并说“领导不加以调整不合理”，有的要求“不(此处二字辨认不出)就给我们调到生产车间工作，人家拿六十元，我们才拿四、五十元”，董正春说：“考工主要是领导掌握，会说话的会捧人的就得晋级了”。","type":"paragraph"},{"text":"另外，个别工人有不满情绪，因而发牢骚，如汽车修配厂李云鹏说：“各山的老虎在各山叫，现在与旧社会差不了许多，厂长、股长的爱人都能进厂工作，工人的就不能”。云南纱厂有个别党员甚至把交党费说是“买肉饱子打狗(有去无回)”有人说“国民党说共产党不好，共产党说国民党不好，矛盾是两方面产生的”。","type":"paragraph"},{"text":" 来源：据市委宣传部材料编，原载新华社《内部参考》1957年9月29日。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c23d7c6d81"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
