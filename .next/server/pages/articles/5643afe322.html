" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"给胡风的信","authors":["河南","苏金伞"],"dates":[{"year":1943,"month":11,"day":10}],"is_range_date":false,"parts":[{"text":"给胡风的信","type":"title"},{"text":"河南苏金伞","type":"authors"},{"text":"(苏金伞：诗人，河南省文联主席，河南省政协常委、人大代表)","type":"paragraph"},{"text":"胡风先生：","type":"appellation"},{"text":"拜读来示，使我欢舞终日，先生真诚的态度，亲切的语辞都在那短简中表露无遗了。","type":"paragraph"},{"text":"在未接来示前曾又寄去了两首诗，并附有请求先生等给我们写稿的信，不知收到没有？因为是平信我怕它遗失了。","type":"paragraph"},{"text":"看七日名信片知先生忙得很，恐无功夫给我们写稿，我们也不敢强求，请你转请肖军先生夫妇各赐一篇，即于愿足矣！","type":"paragraph"},{"text":"我们的所以屡向先生等求稿者，因现在一般文学青年对先生等最有信仰（观“七月”二三百份到汴，一天而售尽就可知道），而我又不知为什么，总觉得我们之间距离近一点，别的大名顶顶的文学家，我们还不想求他们哩！","type":"paragraph"},{"text":"最近把肖先生的住址开给我，我可以直接去麻烦他，并请他们赐教，还有端木蕻良先生的住址，我们也想知道，都请先生一并示知为感！","type":"paragraph"},{"text":"又前曾奉上短诗一首，请批阅，有一首较长的，因没做好不克即时寄上，等做好后，即为奉上也，即问：","type":"paragraph"},{"text":"编安","type":"appellation"},{"text":"肖军  肖红二位先生同此","type":"paragraph"},{"text":" 苏金伞上（一九四三年）十一月十日","type":"paragraph"},{"text":" 来源：《苏金伞右派集团言论与作品》（河南省文学美术工作者联合会，1958年）。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5643afe322"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
