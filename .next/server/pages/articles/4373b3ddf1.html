" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"邓小平对使用和培训技术干部的几点意见","authors":["邓小平"],"dates":[{"year":1961,"month":11,"day":23}],"is_range_date":false,"parts":[{"text":"邓小平对使用和培训技术干部的几点意见","type":"title"},{"text":"邓小平","type":"authors"},{"text":"1961年11月23日，中央书记处讨论冶金工业七年计划的几个主要问题时，小平同志说：","type":"paragraph"},{"text":"这些年来，在技术干部的使用上有问题，对于新生力量没有使他们发挥应有的作用。好多大专毕业生干了好多年，还是担任技术员或是实习技术员，可在其位就可得其政作用，难以发挥。现在要把这部分人提拔起来，全国可以提拔几万个工程师。不要看不起年轻人，真正在科研技术上搞出点成就的，多半是二三十岁的人。提拔这些人主要是根据他们的业务，技术条件，在政治上只要不反共，忠于祖国就行了，凡是确实合格的，有多少就提拔多少。回来的，从优秀的老工人中，也要提拔一些当工程师。这些人提上来之后，工资要按工程师待遇作相应的调整，不要舍不得花这笔钱；同时，要从各方面积极支持和帮助他们进一步钻研业务技术。今后要订个制度，大学毕业生经过一、二年的实习以后，就应当考核评选一次，并作为经常的制度每隔一、二年就评一次，我们对他们一直关心不够，是个大浪费。今冬明春就认真地考核评选一次，由经委负责组织安排此项工作，并议出几条办法来，在工业各部，各个企业，各省、市、区可以成立主要由老专家组成的考核委员会，经常地进行此项考核，评选工作，不要漏掉和埋没人材。","type":"paragraph"},{"text":"11月28日中央书记处讨论机械工业七年计划（初稿）时，小平同志说：","type":"paragraph"},{"text":"各行各业对工程技术人员的培训，应当以业余教育为主。业余技术学校的毕业生，凡是通过考核，合乎标准的，就应当同正式技术人员一样分配工作。对于业余学校中兼课的人员，主办单位要发给一定的讲课费，不能搞“无偿劳动”。","type":"paragraph"},{"text":"对于技术业务人员的使用和提拔，主要看他们有没有真本事，不要受资格限制。例如，大学助教经过考核够上教授条件的，可以跳过讲师副教授等级，直接提升为教授。老干部中，有一部分原先长期搞技术业务工作，现在使用不当的，也要注意作适当调整。","type":"paragraph"},{"text":"12月3日，中央书记处讨论七年计划初步设想的综合汇报时，小平同志说：","type":"paragraph"},{"text":"赞成科委的意见，从现有的科技人员中拔尖，分别组成各业务行的“国家队”，以便集中力量解决科学技术中的关键问题。","type":"paragraph"}],"comments":[],"origin":"《反革命修正主义分子邓小平反动言论》，北京大学文化革命委员会资料组编印，一九六七年十月。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]},{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"邓小平对使用和培训技术干部的几点意见","authors":["邓小平"],"dates":[{"year":1961,"month":11,"day":23}],"is_range_date":false,"parts":[{"text":"邓小平对使用和培训技术干部的几点意见","type":"title"},{"text":"邓小平","type":"authors"},{"text
