<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"四川省委除害灭病办公室江津工作组关于朱家湾食堂生活安排不好与发生肿病关系的调查报告","authors":[],"dates":[{"year":1961,"month":1,"day":21}],"is_range_date":false,"parts":[{"text":"四川省委除害灭病办公室江津工作组关于朱家湾食堂生活安排不好与发生肿病关系的调查报告","type":"title"},{"text":"江北糖悦来公社前进管区朱家湾食堂、在几个月前是生产队长代祖怀领导，当时还办得较好，随后，生产队长被调去突击落后食堂，兼之会计、炊事员被调换，领导削弱，管理工作放松，伙食逐渐办得差，现在食堂既无菜吃，又无柴烧，发病率也高，成为三类食堂。目前这个食堂157人，就有36人得肿病，占总人数23%，并有30%以上的人在腹泻，感到夜间睡觉象冷水泼过一样冷，白天周身发软，脚杆麻木，小便频繁，有肿病象征。根据这个食堂的情况，我们调查发病率高，主要有以下原因：","type":"paragraph"},{"text":"一、当前燃料不足是一个大问题。从去年10月份以来，一直是边找边烧，烧湿柴，每顿要煮3——4小时，天天吃夹生饭。社员普遍反映饭有水臭味，吃了不舒服，肚子痛，有时还发吐，我们调查三户十二人，就有七人腹泻。","type":"paragraph"},{"text":"二、社员将近一个月没有菜吃，每天只靠半斤大米，不能办到菜当三分粮，本来该食堂有十二亩菜地，平均每人在五厘地以上。由于管理不好，被人偷去。在严重缺菜的情况下，为了增加饭量，不得不把原来吃蒸饭改为吃米羹羹，兼之缺柴，炊事员又不会做饭，煮的时间过长，养分损失很大，而且渗水太多，比如元月十日中午我们调查，这一顿下来米粉廿九斤，就渗水六挑（每挑九十四斤），平均每两米渗水一斤六两，只是把六挑水烧开就花了两个半小时，米粉下锅又煮两小时。还由于火力不足，待锅底煮焦了，上面还是生的，上面是清水，下面成了米汤圆，不象米羹羹，成了米粉汤。到吃的时候，一个全劳力一天七两米、每顿要吃一瓢（一瓢有一斤多）社员说吃了，晚上要起来小便多次，睡不好觉。","type":"paragraph"},{"text":"三、生活安排不好，社员乱吃东西的普遍而严重。目前不论是食堂或社员自留地种的菜都被偷光（主要是五类分子先干）。据生产队长代祖怀说，偷菜的人要占总户数40%，只是老院子十二户人就有十户人偷过小菜。这些人小菜拿回去又是晚上大吃一顿，吃时怕人发觉，偷菜不经淘洗，甚至有的煮得半生不熟就吃了。吃生萝卜、生菜的情况更是普遍，100%的人都吃，甚至有的人在田里薅麦子时，挖到的青蛙、蟋蟀也捉来烧得半生不熟的就吃。这也是造成腹泻，发生肿病的要因。","type":"paragraph"},{"text":"在朱家湾食堂了解工作，有公社但乡长和我们一道，当时但乡长找了管区主任，生产队长同在现场作了研究，确定了三个骨干（贫农）负责管理食堂，加强领导；并且大搞蔬菜，夜间有人轮流看守；立即组织力量到三十里路的镇运煤，解决燃料；同时把病人全部集中起来，决定在短期内改变三类食堂的面貌。","type":"paragraph"},{"text":" 省委除害灭病办公室江津工作组元月21日","type":"paragraph"}],"comments":[],"origin":"四川省某档案馆","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"feb60e5e53"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
