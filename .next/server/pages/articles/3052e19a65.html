script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"毛泽东思想磅礴于全世界","authors":["唐崇义"],"dates":[{"year":1966,"month":9,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"战士　唐崇义"},{"type":"paragraph","text":"大海航行靠舵手，万物生长靠太阳。伟大的毛泽东思想，不仅是我国七亿人民心中的红太阳，也是全世界革命人民心中的红太阳。"},{"type":"paragraph","text":"党的八届十一中全会公报指出，“当前正处在世界革命的一个新时代”。这个时代的一个显著的特点，就是毛泽东思想在全世界越来越广泛地传播。世界革命的航船，正沿着毛主席指引的方向，冲破险涛恶浪，胜利前进!"},{"type":"paragraph","text":"五大洲的革命人民，通过自己的革命实践，越来越清楚地认识到，毛泽东的旗帜，就是革命的旗帜，人类解放的旗帜，胜利的旗帜。他们用最美好的语言来歌颂毛主席，怀着最大的革命热情来学习毛主席著作。他们把毛主席称作“当代的列宁”，把毛泽东思想比作“世界革命的灯塔”。无论是革命风雷激荡的亚非拉，或者是西欧、北美、大洋洲；无论在硝烟弥漫的战壕里，或者在暗无天日的反动派的监狱中，到处出现了如饥似渴地学习毛主席著作、寻求革命真理的动人事迹。"},{"type":"paragraph","text":"毛主席曾经引用列宁的话教导我们说，“没有革命的理论，就不会有革命的运动。”毛泽东思想是当代最伟大、最正确的革命理论。毛泽东思想一经为群众所掌握，就将变成改造世界的无比巨大的物质力量。事实正是这样。在亚洲、非洲、拉丁美洲的广大土地上，被压迫人民掌握和运用了毛泽东思想，就敢于斗争、敢于胜利，敢于以弓箭、竹矛对付拥有现代化装备的新老殖民主义。他们的武装斗争就能取得胜利。在已经取得革命胜利的国家里，人民掌握和运用了毛泽东思想，就能巩固革命的成果，继续胜利前进，把革命进行到底。正因为这样，虽然帝国主义、现代修正主义和一切反动派拼命反对伟大的毛泽东思想，但是，他们都无法阻止毛泽东思想的广泛传播。"},{"type":"paragraph","text":"世界人民的革命斗争反复证明，毛泽东思想是反对帝国主义、现代修正主义和一切反动派的强大思想武器，是世界革命人民力量的源泉。哪里掌握了毛泽东思想，哪里的革命就兴旺，就发展。哪里离开和违背了毛泽东思想，哪里的革命就遭受挫折。可以肯定，越来越多的人掌握了毛泽东思想，就必将使整个世界来一个翻天复地的变化，一个光明灿烂的新世界必将更快地到来。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3052e19a65"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
