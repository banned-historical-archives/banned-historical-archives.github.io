script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"伟大的马列主义思想的胜利  “真理报”评中共八大和保共七大  帝国主义利用修正主义者作为坐探来瓦解革命政党的企图已被粉碎了","authors":[],"dates":[{"year":1958,"month":6,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"伟大的马列主义思想的胜利"},{"type":"paragraph","text":"“真理报”评中共八大和保共七大"},{"type":"paragraph","text":"帝国主义利用修正主义者作为坐探来瓦解革命政党的企图已被粉碎了"},{"type":"paragraph","text":"新华社10日讯　据塔斯社报道：“真理报”今天以“伟大的马克思列宁主义思想的胜利”为题发表社论，评中国共产党第八届全国代表大会第二次会议和最近闭幕的保加利亚共产党第七次代表大会。"},{"type":"paragraph","text":"社论指出，中共八大二次会议和保共第七次代表大会有力地显示了各国共产党的牢不可破的团结，显示了它们忠于伟大的、战无不胜的马克思列宁主义旗帜和无产阶级国际主义原则，显示了它们在同形形色色的修正主义和机会主义的斗争中将加强它们之间的团结并捍卫科学共产主义理论的决心。中共八大二次会议和保共第七次代表大会表示热烈拥护国际共产主义运动的纲领性文献——莫斯科会议的两项宣言，并且再次强调指出这两个文献对历史发展现阶段和马克思列宁主义政党的任务所作的分析的正确性。"},{"type":"paragraph","text":"社论说，中国和保加利亚的共产党人在他们的代表大会上作出了重要的工作总结，筹划了社会主义建设的未来远景。这些总结表明，在每个社会主义国家的具体条件下创造性地运用马克思列宁主义的普遍真理，会产生多么卓著的成果。"},{"type":"paragraph","text":"苏联人和所有中国人民的忠实朋友都为中国人民所取得的成就感到由衷的高兴。中国人民之所以能够取得这些成就是由于中国共产党的英明领导，它依靠战无不胜的马克思列宁主义学说，把社会主义建设的国际经验创造性地运用到本国的具体条件中，坚定不移地引导中国人民走社会主义建设的道路。"},{"type":"paragraph","text":"社论指出，保共第七次代表大会向全世界表明了保加利亚人民在社会主义建设中所取得的巨大胜利。保加利亚已经从一个落后的农业国变成了一个拥有大规模机械化农业的社会主义工农业国家。"},{"type":"paragraph","text":"社论说，中国和保加利亚兄弟党的代表大会再一次表明，马克思列宁主义的力量在于理论和实践的不可分割的联系，在于马克思列宁主义同生活和社会发展的进程有着最紧密的联系。"},{"type":"paragraph","text":"创造性地发展马克思列宁主义——这意味着始终不渝地和彻底地捍卫它的原则的纯洁性。正因为如此，中国、保加利亚和其他国家的共产党对现代修正主义和右倾机会主义进行了严肃的、不留情的批判。南斯拉夫共产主义者联盟纲领的修正主义实质完全被揭露出来了。帝国主义利用修正主义者作为自己的坐探并利用他们从内部来瓦解革命政党、削弱它们的团结的企图被粉碎了。"},{"type":"paragraph","text":"社论说，中国和保加利亚共产党的代表大会是兄弟社会主义国家马克思列宁主义政党牢不可破的团结的强大示威。世界上没有，也不可能有一种力量能动摇社会主义国家共产党和工人党坚如磐石的团结一致。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b30df3f3e3"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
