script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"高举毛主席的伟大旗帜　增进我国人民同世界各国人民的友谊春季出口商品交易会在广州隆重开幕","authors":[],"dates":[{"year":1977,"month":4,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社广州一九七七年四月十五日电　一九七七年春季中国出口商品交易会今天在广州隆重开幕。这届交易会是一九五七年首次举办以来的第四十一届交易会。前来参加和参观的外国朋友、海外华侨、旅外台湾同胞和港澳同胞，受到了交易会负责人和工作人员的热烈欢迎。"},{"type":"paragraph","text":"满城春色的广州市，今天锣鼓喧天，鞭炮声不绝。大街小巷到处是热烈欢呼《毛泽东选集》第五卷出版发行的标语。一些商店、电影院还悬挂着庆祝交易会开幕的横幅。中国出口商品交易会大楼更是一派节日景象。大楼前的广场上飘扬着灿烂的五星红旗，广场上空的一簇簇红色气球上，悬挂着“热烈欢呼《毛泽东选集》第五卷出版!”“最紧密地团结在以华国锋主席为首的党中央周围，把毛主席开创的无产阶级革命事业进行到底!”“全世界人民大团结万岁!”“战无不胜的马克思主义、列宁主义、毛泽东思想万岁!”等巨幅标语。大楼序幕大厅的正中并排挂着伟大领袖和导师毛主席的巨幅画像和英明领袖华主席的巨幅画像，序幕大厅的东西两侧挂着马克思、恩格斯、列宁、斯大林的巨幅画像。"},{"type":"paragraph","text":"上午九时，交易会在热烈的鞭炮声中开幕。来宾们一涌进交易会大厅，有的立即跑到贸易洽谈室洽谈贸易，有的奔向设在交易会内的新华书店小卖部购买《毛泽东选集》第五卷。"},{"type":"paragraph","text":"今天晚上，交易会在东方宾馆、广州宾馆、白云宾馆和流花宾馆同时举行盛大开幕招待会，出席招待会的宾主共六千多人。中国出口商品交易会主任、广东省革命委员会副主任林李明，交易会副主任、省革委会副主任张根生，交易会副主任、广州市革委会副主任杜祯祥，分别在招待会上讲话。他们向来自五大洲的各国朋友们、同胞们表示热烈的欢迎。他们阐述了我国各族人民在以华主席为首的党中央领导下，高举毛主席的伟大旗帜，深入揭批“四人帮”，抓纲治国，社会主义革命和社会主义建设蓬勃发展的大好形势。他们说:中国，出口商品交易会举办以来，我们遵循毛主席亲自制定的革命外交路线，一贯坚持平等互利、互通有无的对外贸易原则，发展了我国同世界各国、各地区之间的贸易往来，增进了我国人民同世界各国人民的友谊。本届交易会也必将为进一步发展我国同各国、各地区之间的贸易往来和增进人民之间的友谊作出新贡献。"},{"type":"paragraph","text":"对外贸易部副部长贾石、王润生出席了招待八芬兰对外贸易部长阿明诺夫一行，卢旺达国家银行行长让·比拉拉，卢旺达农牧部秘书长加哈马尼·莱奥波德，英国格拉斯哥市市长麦克凯和夫人以及格拉斯哥商会代表团，缅甸贸易代表团，圣多美和普林西比贸易代表团，伊拉克消费品贸易机构代表团，伊拉克生产资料贸易机构代表团，刚果国家贸易局代表团，贝宁贸易代表团，马来西亚国营企业贸易公司代表团，一些国家的驻华使节和外交官员等，应邀出席了招待会。"},{"type":"paragraph","text":"招待会结束后，来宾们分别观看了人民解放军北京部队歌舞团演出的音乐、舞蹈节目，中央广播文工团演出的音乐、曲艺节目以及广州杂技团少年队演出的杂技节目。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"编纂《毛泽东选集》第五卷","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"08bdb9fa2c"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
