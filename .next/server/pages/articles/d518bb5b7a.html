" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji31","name":"毛泽东全集第31卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji31.pdf"],"article":{"title":"请苏联增派一个空军师协助拦击散布细菌之敌机","alias":"","parts":[{"type":"paragraph","text":"对薄一波关于上海工商户分类"},{"type":"paragraph","text":"和五反部署的报告的批语"},{"type":"paragraph","text":"（1952年3月13日）请周研究。"},{"type":"paragraph","text":"此件一般很好。惟五类中第二类宜增加，第三类向第二类移过来一部分，是否可能，请你和一波通话时征询他的意见“。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"三月十三日"},{"type":"paragraph","text":"[1]薄一波，当时任中央人民政府节约检查委员会主任，受中央委派在上海帮助三反五反工作。"},{"type":"paragraph","text":"[2]周，指周恩来。"},{"type":"paragraph","text":"[3]指薄一波1952年3月10日关于上海工商户、上层资本家分类和行业排队及五反部署等问题给毛泽东并中央的报告。报告说，上海16.3万户工商户，按五类划分，第一类守法户，占工商户总数的15.3%；第二类基本守法户，占总数的36.8%，每户行贿、偷税漏税等在1000万元以下者均划入；第三类半守法半违法户，占总数的44.2%，这一类所占比例最大，每户偷税或盗窃等平均在1500万元左右；第四类严重违法户，占总数的2.8%；第五类完全违法户，占总数的0.9%。关于五反的部署，为照顾上海特点，避免生产下降或停滞，避免增加失业和减少税收，拟在掌握好排队材料和具体毛泽东全集第三十一卷对象，做到心中有数后，有步骤地有控制地分批地进行，预计一个半月基本解决问题。为迅速地逐步地形成五反统一战线，报告对五反的内容、界线、清算的时间等作了规定，并提出为了使生产不致因五反而停顿，做到一面生产一面斗争拟抓的几件事情。中央在1952年3月16日转发了薄一波的这一报告。"},{"type":"paragraph","text":"[4]周恩来1952年3月15日写给毛泽东的报告说：“已与一波通了电话。他认为照主席指示，将五反中上海工商户第三类向第二类移过来一部分的可能是有的，具体计算，当在五反执行中解决，大约第一、二类可达到全数百分之六十。”"}],"authors":["毛泽东"],"dates":[{"year":1952,"month":3,"day":11}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":508,"page_end":509},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"薄一波","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d518bb5b7a"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
