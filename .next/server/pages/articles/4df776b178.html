<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"0b2f26ed-ad29-48e7-9c89-446932a97ab0","name":"中共党史教学参考资料 第27册 “文化大革命”参考资料 下册（1988年）","internal":true,"official":true,"type":"pdf","author":"","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives3/main/0b2f26ed-ad29-48e7-9c89-446932a97ab0.pdf"],"article":{"title":"伟大的胜利","alias":"","parts":[{"type":"paragraph","text":"伟大的胜利"},{"type":"paragraph","text":"（九七六年四月十日）"},{"type":"paragraph","text":"《人民日报》社论"},{"type":"paragraph","text":"根据伟大领袖已1席提议，中共中央政治局一致通过，华国锋同志任中国共产党中央委员会第一副至席，中华人民共和国国务院总理；一致通过，撤销邓小平党内外一切职务。这是毛主席、党中央采取的反修防修、保证我们党和国家在无产阶级专政下继续革命的重大措施，是反击右倾翻案风的伟大胜利。"},{"type":"paragraph","text":"喜讯传来，大快人心。首都沸腾了，全国沸腾，亿方军民游行庆祝，锣鼓喧天、欢声雷动。各地纷纷举行盛大的集会，致电毛主席、党中央，热烈拥护、坚决支持这两项英明决策。全国出现了一派团结战斗，把反击右倾翻案风伟大斗争进行到底的革命景象。"},{"type":"paragraph","text":"邓小平是党内最大的不肯改悔的走资派。长期以来，他反对毛主席，反对毛泽东思想，反对毛主席的无产阶级革命路线。无产阶级文化大革命前，他伙同刘少奇推行反革命的修正主义路线，文化大革命初期，他和刘少奇一起镇压群众，推行资产阶级反动路线。经过群众批判，他表示愿意悔改，“永不翻案”。毛主席挽救他，给他重新工作的机会。但是，他辜负了毛主席对他的教育和帮助，一旦掌握了一部分权力，便旧病复发，翻文化大革命的案，算文化大革命的帐，炮制“三项指示为纲”的修正出义纲领，继续推行反革命的修正主义路线，带头煸起了右倾翻案风。"},{"type":"paragraph","text":"毛主席高瞻远瞩，洞察邓小平的翻案活动，从去年十月开始作了一系列重要指示，领导全党全军全国人民开展了反击右倾翻案风的伟大斗争。毛主席指出：“他这个人是不抓阶级斗争的，历来不提这个纲。”“他不懂马列，代表资产阶级。说是‘永不翻案”、靠不住啊。”毛主席的指示击中了邓小平的要害，揭露了他的反动阶级本质。"},{"type":"paragraph","text":"正当全国广大干部和群众遵照毛主席指示，批判邓小平的反革命的修正主义路线的时候，在天安门广场发生：了反革命的政治事件，一小撮阶级敌人公开打出拥护邓小平的旗号，进行反革命活动，这绝不是偶然的。这些反革命分子丧心病狂地把矛头直接指向伟大领袖毛主席，分裂以毛主席为首的党中央，为邓小平歌功颂德，妄图推出邓小平当匈牙利反革命事件的头子纳吉。这就很清楚地说明了邓小平代表了哪些人的利益。党内走资本主义道路的当权派同社会上的资产阶级和没有改造好的地、富、反、坏、右，就是这样联系在一起的。英雄的首都工人民兵，在人民警察和警卫战士的配合下，对一小搬阶级敌人实行无产阶级专政，得到广人人民的支持和赞扬，党中央根据天安门广场的反革命政治事件和邓小平最近的表现，认为邓小平问题的性质已经变为对抗性的矛盾，决定撤销邓小平党内外一切职务，大长了革命人民的志气，大灭了阶级敌人的反动气焰。"},{"type":"paragraph","text":"天安门广场的反革命政治事件，从反面给我们上了极其深刻的阶级斗争课。它告诉我们：社会主义革命时期的阶级斗争是多么尖锐。一是在首都，二是在天安门，三是烧汽车，烧房子，打工人民兵，打人民警察；打人民解放军，打革命群众，反革命气焰何等嚣张！它织，制造政治谣言，发表反动演说，张贴反动诗词，散发反动传单，煽动搞反革命集团、欺骗群众，制造事端，何等阴险恶毒！它也告诉我们：广大人民是要革命的、对这些反革命分子是深恶痛绝的。不管一小撮阶级敌人多么猖狂，在革命群众面前，在强大的无产阶级专政面前，终究不堪一击，顷刻瓦解！"},{"type":"paragraph","text":"党中央的两项决议，极人地鼓舞了全党全军全国人民的革命斗志，必将推动反击右倾翻案风的斗争出现一个新的高潮。我们一定要把这场伟大斗争进行到底。要牢牢掌握斗争大方向，集中火力批邓，批判他的“三项指示为纲”的修正主义纲领，批判他的反革命的修正主义路线，批判他翻文化大革命案、算文化大革命账、安图颠覆无产阶级专政、复辟资本主义的罪行。要提高革命警惕，随时注意阶级斗争的新动向。要看到不甘心失败的阶级敌人还会进行垂死挣扎，对阶级敌人的一切阴谋破坏活动，要坚决打击。要注意区分两类不同性质的矛盾。对于上当受骗的人要进行教育，做好思想工作。"},{"type":"paragraph","text":"让我们团结起来，用反击右倾翻案风的更大胜利，保卫毛主席，保卫党中央，保卫毛主席的无产阶级革命路线！"},{"type":"paragraph","text":"天安门广场事件说明了什么？"},{"type":"paragraph","text":"（一九七六年四月十八日）"},{"type":"paragraph","text":"《人民日报》社论"},{"type":"paragraph","text":"在伟大领袖毛主席为首的党中央领导下，英雄的首都人民一举粉碎了发生在天安门广场的反革命政治事件。经过这场惊心动魄的斗争，天安门广场更加雄伟壮丽。五星红旗迎风招展．人民大会堂巍然屹立，人民英雄纪念碑顶天立地。举国上下热烈拥护党中央两项决议，严厉声讨一小掘阶级敌人的反革命活动，愤怒批判邓小平妄图颠覆无产阶级专政、复辟资本主义的罪行。人心、党心、党员之心，如葵花向阳，向着毛主席、向着党中央。亿万军民坚持继续革命，反对复辟倒退的革命洪流，势不可当。阶级敌人胆心惊。受蒙蔽的少数人迅速觉悟。形势一片大好。"},{"type":"paragraph","text":"在天安门广场发生的反革命政治事件，是一个极好的反面教材，它尖锐地说明了社会主义历史时期阶级斗争的规律和特点。我们可以利用这个反面教材向全国人民进行一次活生生的巩固无产阶级专政、反对资本主义复辟的教育。"},{"type":"paragraph","text":"第一，它进一步说明资产阶级就在共产党内，党内两条路线的斗争就是无产阶级同资产阶级两大对抗阶级的生死斗争。"},{"type":"paragraph","text":"毛主席指出：“搞社会主义革命，不知道资产阶级在哪里，就在共产党内，党内走资本主义道路的当权派。走资派还在走。”如果以前有人还不理解走资派就是党内的资产阶级，是无产阶级专政下继续革命的主要对象，那么，天安门广场的反革命政治事件，应该使他们明白过来了。为什么这些反革命分子把邓小平抬出来，妄图要他当匈牙利反革命政变的头子纳吉？就因为邓小平是党内最大的不肯改悔的走资派，他是右倾翻案风的总后台，他推行的反革命的修正主义路线，集中代表了党内外新老资产阶级和没有改造好的地、富、反、坏、右"}],"authors":["《人民日报》社论"],"dates":[{"year":1976,"month":4,"day":10}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":461,"page_end":462},"tags":[{"name":"邓小平","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4df776b178"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
