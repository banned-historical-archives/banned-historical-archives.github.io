script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"加强团结合作　发展民族经济　反对帝国主义剥削","authors":[],"dates":[{"year":1974,"month":11,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"加强团结合作　发展民族经济　反对帝国主义剥削"},{"type":"paragraph","text":"突尼斯总统批驳西方国家对阿拉伯石油生产国的无理指责，并强调发展民族经济"},{"type":"paragraph","text":"加纳元首号召增加非洲国家间的贸易　塞拉利昂外长主张依靠自己力量发展生产"},{"type":"paragraph","text":"新华社突尼斯一九七四年十一月十四日电 突尼斯总统布尔吉巴十一月十二日在新选出的国民议会举行的会议上发表讲话，批驳一些西方国家对阿拉伯石油生产国的无理指责，并强调必须大力发展突尼斯的民族经济。"},{"type":"paragraph","text":"布尔吉巴总统在谈到一些西方国家认为阿拉伯国家应对西方世界的通货膨胀负责时指出：“这种指责是没有根据的。通货膨胀早在提高石油价格之前就出现了”，“阿拉伯国家使用石油武器只是为了向美国和支持以色列的大国施加压力。”"},{"type":"paragraph","text":"在谈到以石油美元构成的阿拉伯国家的资本时，布尔吉巴总统主张把这笔钱用于阿拉伯、非洲和第三世界国家之间的合作。"},{"type":"paragraph","text":"布尔吉巴总统在谈到国家建设问题时指出：“我们还应该增加我们的生产。我们需要增产二十万吨小麦，这就是我们每年用极高的价格进口的小麦数量。”"},{"type":"paragraph","text":"新华社阿克拉一九七四年十一月十六日电 加纳国家元首、救国委员会主席阿昌庞十一月十四日在加纳全国商会举行的宴会上，号召加纳全国商会努力增加非洲国家间的贸易。"},{"type":"paragraph","text":"阿昌庞主席说：“如果我们整个大陆要自力更生，那么就让我们增加我们相互之间的贸易。”“如果我们要为我们的发展在非洲内部寻找资金，那么，首先让我们增加非洲间的贸易。”"},{"type":"paragraph","text":"《加纳时报》刊登了阿昌庞主席的这一讲话，并且发表社论说：“非洲是一个富饶的大陆。它有丰富的自然资源。一个国家所缺少的，恰好是另一个国家所绰绰有余的。”社论说：“非洲国家需要的货物不得不用高价向欧洲的中间人购买。过去殖民者造成的这种局面必须加以纠正。”"},{"type":"paragraph","text":"新华社达喀尔一九七四年十一月十八日电塞拉利昂外交部长卢克在一次谈话中强调指出，发展中国家应该努力依靠自己的力量发展民族生产。他指出：“事实上，发达国家的援助不会帮助我们很久。这种援助使我们受到援助国家的束缚，最后它们得到的利益远远超过我们。”而且，“大部分援助不是符合发展中国家的需要的”。"},{"type":"paragraph","text":"卢克部长强调指出：“我们摆脱这种援助和从这种统治下解放出来的唯一道路，就是生产更多的东西，特别是在农业方面生产更多的东西，相信我们自己，首先依靠我们自己；保证我们的原料有一个公平合理的价格。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"506b7395f1"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
