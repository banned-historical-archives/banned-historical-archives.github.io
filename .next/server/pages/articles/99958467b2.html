script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"云南省军事管制委员会通令","authors":["云南军管会"],"dates":[{"year":1968,"month":1,"day":27}],"is_range_date":false,"parts":[{"text":"云南省军事管制委员会通令","type":"title"},{"text":"云南军管会","type":"authors"},{"text":"在我们伟大领袖毛主席英明领导下，“全国的无产阶级文化大革命形势大好，不是小好，整个形势比以往任何时候都好。”全国务省市革命委员会—个接着一个成立，出现了革命大联合、革命三结合的高潮。云南同全国一样，也是一片大好形势。全省无产阶级革命派，正在努力学习和全面落实伟大领袖毛主席的最新指示，紧跟毛主席的伟大战略部署，开展革命的大批判，实现，巩固和发展革命的大联合，三结合，为夺取云南无产阶级文化大革命的全面胜利奋勇前进。","type":"paragraph"},{"text":"但是，就在这样大好形势下，出现了所谓“滇西挺进队”。","type":"paragraph"},{"text":"“滇西挺进队”自一月一、二日以来，在阶级敌人、党内一小撮走资本主义道路当权派和少数坏人的挑动、操纵下，不听毛主席的话，不按毛主席的指示办事，不跟毛主席的伟大战略部署，不是把枪口对准帝国主义、修正主义、各国反动派和党内一小撮走资本主义道路当权派，而是对准革命群众。“滇西挺进队”在滇西大搞武斗，破坏生产、抢夺国防仓库，危害国家财产和人民生命安全。这是与伟大领袖毛主席的伟大战略部署背道而驰的，是破坏无产阶级文化大革命的犯罪行为。","type":"paragraph"},{"text":"为了捍卫毛主席的革命路线，保证无产阶级文化大革命胜利进行，保证国家财产和人民生命安全，根据中央指示，特发布如下通令：","type":"paragraph"},{"text":"一、“滇西挺进队”绝大多数群众是受蒙蔽的，你们必须立即猛醒，赶快觉悟，同阶级敌人，党内一小撮走资本主义道路当权派、少数坏头头，划清界线，反戈一击，不要再上他们的当了。","type":"paragraph"},{"text":"二、“滇西挺进队”所有人员，必须立即放下武器，撤除工事，交出抢夺的一切军用物资。","type":"paragraph"},{"text":"三、立即撤出矿区，迅速返回原单位参加文化大革命，搞好本单位的革命大联合、三结合和斗批改。","type":"paragraph"},{"text":"四、所有人员不能以任何借口破坏煤矿；矿区的一切设施和国家财产，必须予以保护。","type":"paragraph"},{"text":"五、矿区炮派革命群众，要积极协助军管会贯彻上述各条。   以上各条，希望你们立即执行。否则，我们将采取严厉的专政措施。","type":"paragraph"},{"text":" 云南省军事管制委员会一九六八年一月二十七日","type":"paragraph"},{"text":"来源：云南八·二三《风展红旗》编  《毛主席无限关怀云南人民──中央和中央首长对云南无产阶级文化大革命的指示》","type":"appellation"}],"comments":[],"origin":"云南八·二三《风展红旗》编　《毛主席无限关怀云南人民──中央和中央首长对云南无产阶级文化大革命的指示》","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"云南文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"武斗","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"99958467b2"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
