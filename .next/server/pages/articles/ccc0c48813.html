<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"不法资本家，还不低头么?——驳斥资产阶级对抗五反运动的一些论调","authors":["丁素"],"dates":[{"year":1952,"month":3,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"丁素"},{"type":"paragraph","text":"上海的资产阶级荒唐极了，五反还没有正式开始，他们就笃定心思地以为运动即将过去了。这几天，看看风势不对，他们又紧张起来了，到处在大叫；不过，叫来叫去，还是那些老调，老调之一是:“工商界的五种犯罪行为，是旧社会的污毒，不能完全算在我们账上。”是的，这损人利己、唯利是图，是他们祖代相传的。偷税漏税、偷工减料也是从小就学会的。这些老规矩、老办法在他们看来，是一点也不奇怪的。中国民族资产阶级长期在帝国主义、官僚资本和封建经济的压迫下奄奄一息，解放后三年来，人民政府扶植工商业，无微不至，使他们发了大财，“名利双收”，他们不知道感恩图报，反而“五毒”并用，猖狂地向政府和工人阶级进攻。"},{"type":"paragraph","text":"这污毒的思想固然是旧社会所留下来的，而五毒的罪行，却是他们干的，猖狂的进攻却是他们有计划地发动的，他们怎么能把自己干的罪恶都推给旧社会来负责呢?"},{"type":"paragraph","text":"我们今天要坚决打退资产阶级的猖狂进攻，消灭五毒，并不是要把资产阶级消灭掉，是根据毛主席指示的“过去从宽，今后从严；多数从宽，少数从严；坦白从宽，抗拒从严……”的基本原则来处理。"},{"type":"paragraph","text":"资产阶级叫嚣的老调之二是:“我们资产阶级难道一个好人都没有么?”“我们资产阶级难道一点贡献都没有么?”"},{"type":"paragraph","text":"没有“好人”么?我们倒要先问一问:“好人”的标准是怎样的?如果从阶级本质上来说，资产阶级中的“好人”是绝无仅有的。但是，我们今天并不要求过高，就以共同纲领来做标准吧!能够遵守共同纲领的算好人，否则就不算好人；我们相信，这样的好人，不但不会没有，而且不在少数；不过，在目前是难下结论的。那个好，那个坏，要等五反运动之后，才会真正黑白分明的。"},{"type":"paragraph","text":"没有“贡献”么?这笔账，在五反以前，也实在搅不清。资产阶级曾经购买过公债、捐献过巨款，这应该算是对国家的贡献了。但是，告诉你，天津有个资本家，捐了飞机十五架，“贡献”总算不少了。但是，你岂知道，他从国家盗窃到多少资财呢?一共值飞机四十五架之多!所以我们还是告诉资产阶级:“你们是有‘贡献’的，不过你们和人民还有其他账目未清，五反之后，结结账，加减乘除，算个清楚再说。”"},{"type":"paragraph","text":"心狠嘴毒的不法资本家到今天还不低头?还想抗拒五反到底么?他们的算盘真灵，从今天广大人民的力量和政府的决心看来，难道还算不出你们的命运么?"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ccc0c48813"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
