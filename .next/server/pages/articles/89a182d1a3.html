script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"wenji2","name":"毛泽东文集第二卷（1999）","type":"pdf","internal":false,"official":true,"author":"中央文献研究室","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/wenji2.pdf"],"article":{"title":"我们决不能怕破裂","description":"根据手稿刊印。","dates":[{"year":1941,"month":1,"day":25}],"parts":[{"text":"我们决不能怕破裂","type":"title"},{"type":"appellation","text":"恩来："},{"type":"paragraph","text":"人家已宣布我们叛变，我们决不能再取游移态度，我们决不能再容忍，我们决不能怕破裂，否则我们就要犯严重错误，因此延安命令及谈话的全部，包括文字在内，是完全正确的。我们表明态度之后听凭蒋介石去处置，或者他执行我们的十二条，两党重归妥协，或者实行全面破裂。你们应向各方表示，蒋介石已将我们推到对立地位，除非蒋介石取消十七号命令及实行其他必要步骤，我们是只有和他对立一途，因为我们没有别的路走，你们应迅即回延。余详书记处电。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"有申"}],"comment_pivots":[{"part_idx":2,"offset":61,"index":1},{"part_idx":2,"offset":107,"index":2},{"part_idx":2,"offset":159,"index":3}],"is_range_date":false,"authors":["毛泽东"],"comments":["延安命令及谈话，指一九四一年一月二十日为皖南事变发表的《中国共产党中央革命军事委员会命令》和《中国共产党中央革命军事委员会发言人对新华社记者的谈话》，均见《毛泽东选集》（第二版）第二卷。","十二条，指中国共产党中央革命军事委员会发言人一九四一年一月二十日为皖南事变对新华社记者发表的谈话中向国民党提出的十二条要求。即：第一、悬崖勒马，停止挑衅；第二、取消一月十七日的反动命令，并宣布自己是完全错了；第三、惩办皖南事变的祸首何应钦、顾祝同、上官云相三人；第四、恢复叶挺自由，继续充当新四军军长；第五、交还皖南新四军全部人枪；第六、抚恤皖南新四军全部伤亡将士；第七、撤退华中的“剿共”军；第八、平毁西北的封锁线；第九、释放全国一切被捕的爱国政治犯；第十、废止一党专政，实行民主政治；第十一、实行三民主义，服从《总理遗嘱》；第十二、逮捕各亲日派首领，交付国法审判。","一九四一年一月十七日，蒋介石以国民党政府军事委员会名义发布通令，诬蔑新四军为叛军，宣布撤销新四军番号，并将叶挺交军法审判。"],"page_start":338,"page_end":338,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"89a182d1a3"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
