script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"wenji2","name":"毛泽东文集第二卷（1999）","type":"pdf","internal":false,"official":true,"author":"中央文献研究室","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/wenji2.pdf"],"article":{"title":"关于在山西开展游击战争的意见","description":"根据中央档案馆保存的抄件刊印。","dates":[{"year":1937,"month":9,"day":23}],"parts":[{"text":"关于在山西开展游击战争的意见","type":"title"},{"type":"paragraph","text":"雪枫同志并告周，朱彭任，林聂，贺萧，刘徐张："},{"type":"paragraph","text":"巧电悉。关于阎先生所提，假如在不利情况下，两军团结一致，用游击战争坚决抵抗日寇进攻之方针，我是完全同意的。但有下列意见："},{"type":"paragraph","text":"甲、游击战争主要应处于敌之翼侧及后方，在山西应分为晋西北、晋东北、晋东南、晋西南四区，向着进入中心城市及要道之敌人，取四面包围袭击之姿势，不宜集中于五台山脉一区，集中一区是难以立足的。"},{"type":"paragraph","text":"乙、五台山脉应使之成为重要的游击区域之一，现就宜加紧准备，可双方派人察看，并计划一切，不宜迟缓。"},{"type":"paragraph","text":"丙、同时应该充分注意晋西北管涔山脉地区及部署与准备，因为敌人必将先行占领该地神池、宁武一带，与东边占领恒山山脉之行动相配合，取居高临下之利，然后进攻太原。"},{"type":"paragraph","text":"丁、太行、太岳山脉之晋东南与吕梁山山脉之晋西南，虽目前距敌尚远，然亦不可不于此时作适当之部署，如若干必要资材之准备迁移等。资材集中于五台一处是不妥当的。"},{"type":"paragraph","text":"戊、游击战争除军事部署以外，最主要的是紧密依靠乡村广大人民群众，只有如此，才能取得最后胜利。"},{"type":"paragraph","text":"己、上述部署及计划，并不妨碍争取以主力在长城一带举行有利的决战之现时计划。"},{"type":"paragraph","text":"庚、关于阎先生诚意合作与商量指挥之事，我们甚为佩服与感谢。"},{"type":"paragraph","text":"辛、上述游击战争意见，望即提供阎先生考虑，倘承采取，抗战幸甚。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"二十三日午"}],"comment_pivots":[{"part_idx":1,"offset":2,"index":1},{"part_idx":1,"offset":21,"index":2},{"part_idx":2,"offset":2,"index":3}],"is_range_date":false,"authors":["毛泽东"],"comments":["雪枫，即彭雪枫，当时任八路军总部参谋处处长兼驻山西办事处主任。","周，指周恩来。朱，指朱德。彭，指彭德怀，当时任八路军副总司令。任，指任弼时，当时任八路军政治部主任。林聂，指林彪、聂荣臻，当时分别任八路军第一一五师师长和政治委员。贺萧，指贺龙、萧克，当时分别任八路军第一二○师师长和副师长。刘徐张，指刘伯承、徐向前、张浩（林育英），当时分别任八路军第一二九师师长、副师长和政治委员。","指彭雪枫一九三七年九月十八日给毛泽东的电报。该电汇报了他同国民党军第二战区司令长官阎锡山十六日秘密会谈的情况，其中提到阎锡山建议：一旦出现津浦路平汉路失守、晋军败退的不利局势，以八路军会合晋绥军一个集团军，在五台山山脉建立根据地，同日军周旋。"],"page_start":34,"page_end":35,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e7c890666a"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
