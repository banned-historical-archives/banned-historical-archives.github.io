" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"川东区党委关于镇反中的几个偏向的通报","authors":[],"dates":[{"year":1951,"month":5,"day":3}],"is_range_date":false,"parts":[{"text":"川东区党委关于镇反中的几个偏向的通报","type":"title"},{"text":"各地委并报西南局抄公安厅：","type":"appellation"},{"text":"4月下旬公安处长会议之后，除个别地委外、大批杀人已基本停止。但据检查不少干部（包括地委在内）对于这个问题思想上并未彻底弄通。尤其当区党委扩大会议对于杀反革命问题已作出新的决定而批准权尚留在地委一级的十天之内（由6日至15日），有些地区竟急急忙忙的赶着大批批杀。甚至如涪陵地委当批准权已经收归区党委之后仍在擅自大批批杀。其他地区虽然没有擅自批杀现象，但是仍在不断的成批的呈请批杀。这就充分说明这些地区的党委对于区委决定暂时停止的方针没有很好接受与贯彻。在精神上还没有转过弯来。既没有认真的重新审查，与原来的计划进行清理积案组织检查总结；也没有提出新的计划。所不同者只是批准权而已。这种现象发生一方面是由于某些同志被坚决大批的镇压所发生的作用和所获得的胜利冲昏了头脑，没有看到在大杀之后同时带来的降低杀人标准和粗糙草率手续不严、及以杀人为快等种种有害的情况。另一方面是由于对镇压反革命的艰巨性长期性认识不足。简单的以为杀能解决一切问题。只想一口浊气杀个干净，而不懂得在一阵大杀之后必须清醒一下，才能看得更准。也才能打的更狠。因此便对区党委决定在农村停止大杀、进行清理总结和将批准权收回的措施认为为时太早，表示抵触。而不知道这种暂时停止正是为了巩固既得胜利、与进一步贯彻稳准狠的原则所必需。区党委虽然估计到了这种情况，在扩大会议及公安处长会议上均曾反复再三的进行解释说服，但缺点是对于这种已经大杀开了口以后要及时收拢来的困难认识不足。没有如扭转以往“宽大无边”的偏向一样去认真的进行强有力的组织工作，严格的控制与广泛的在干部中进行传达不够，这是我们要负责任的。为了坚决执行西南局4月11日的指示和真正从思想上说通干部，以贯彻区党委扩大会议及公安处长会议的具体决定，我们提议各地应乘干部集中整风机会，立即抽出一天时间专门进行一次对镇压反革命问题的检查讨论。仔细审查一下正在执行中的计划。凡已批准尚未处决又可暂缓处决的、留待总结后报区党委批准后再杀。凡可杀但杀了作用不大、或介于可杀与不可杀之间的，均可不杀，改判无期徒刑。实施长期劳役。新计划的拟订亦可准此原则，审慎处理。望将检查结果与你们计划于10日前详报我们。","type":"paragraph"},{"text":" 区党委 5月3日","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"29b4de2e9c"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
