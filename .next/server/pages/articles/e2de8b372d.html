script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"印度《解放》月刊谴责苏修集团背叛十月革命道路  苏修集团是世界人民不共戴天的敌人  指出丹吉集团和印共修正主义分子已公开站在国内反动派和美帝苏修一边","authors":[],"dates":[{"year":1968,"month":12,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"印度《解放》月刊谴责苏修集团背叛十月革命道路"},{"type":"paragraph","text":"苏修集团是世界人民不共戴天的敌人"},{"type":"paragraph","text":"指出丹吉集团和印共修正主义分子已公开站在国内反动派和美帝苏修一边"},{"type":"paragraph","text":"新华社四日讯　新德里消息：印度《解放》月刊在十一月出版的一期上刊登一篇文章，谴责苏修叛徒集团背叛了十月革命的道路。文章同时谴责了印度丹吉叛徒集团和印共修正主义分子的反革命罪行。"},{"type":"paragraph","text":"文章说：“以赫鲁晓夫和他的继任者柯西金和勃列日涅夫为首的苏修叛徒集团，利用国家机器在苏联复辟了资本主义，推行新殖民主义。”"},{"type":"paragraph","text":"文章指出，苏修叛徒集团“对捷克斯洛伐克的入侵，清楚地证明了这个集团已经堕落到社会法西斯主义和社会帝国主义的地步。”"},{"type":"paragraph","text":"文章说：“这个现代修正主义集团不仅是苏联劳动人民的，也是世界所有工人和各被压迫民族，包括印度人民在内的不共戴天的敌人。”"},{"type":"paragraph","text":"文章谴责了丹吉叛徒集团和印共修正主义分子极力反对纳萨尔巴里武装革命的道路。文章说，在苏共二十大之后，他们便公开抛弃了十月革命的道路，即暴力革命的道路，并且妄图把印度革命人民引到“议会道路”的邪路上去。"},{"type":"paragraph","text":"文章说，丹吉叛徒集团和印共修正主义分子已经公开站在国内反动派、苏修叛徒集团和美帝国主义者一边。他们已经堕落成为美帝国主义和苏联修正主义的走狗、印度大地主和资产阶级的仆从。当印度革命走向高潮的时候，它将象扫除垃圾一样把他们扫掉，不管他们现在怎样疯狂地反对农民斗争和对社会主义中国怎样疯狂地叫嚣。"},{"type":"paragraph","text":"文章指出，十月革命的道路虽然已在苏联国土上被背叛，它在各国却在不断取得新的胜利。全世界人民都在唾弃“和平过渡到社会主义”的修正主义货色，把它斥为毒素。他们正在认识到十月革命的道路是通向民族解放、社会主义和世界和平的唯一道路。正如毛主席所说过的：“苏联广大的人民、广大的党员和干部，是好的，是要革命的，修正主义的统治是不会长久的。”"},{"type":"paragraph","text":"文章说，苏联人民在马克思列宁主义者的领导下将在不久的将来回到十月革命的道路上来，并推翻克里姆林宫的新沙皇的专政。全世界将会是一片红。"},{"type":"paragraph","text":"文章最后高呼："},{"type":"paragraph","text":"“十月革命万岁！”"},{"type":"paragraph","text":"“马克思列宁主义、毛泽东思想万岁！”"},{"type":"paragraph","text":"“全世界的工人和被压迫民族团结起来！”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e2de8b372d"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
