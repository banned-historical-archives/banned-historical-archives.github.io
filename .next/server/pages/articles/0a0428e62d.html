script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"阿尔巴尼亚《人民之声报》欢迎亚非团结大会成就莫希决议是战斗的行动纲领只有加强反帝统一战线彻底揭露修正主义才能取得新胜利　不论是幕后活动和公开诬蔑都不能削弱中国","authors":[],"dates":[{"year":1963,"month":2,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社地拉那14日电】　阿尔巴尼亚《人民之声报》14日就第三届亚非人民团结大会发表评论说，阿尔巴尼亚人民欢迎这次会议的决议，并认为这是战斗的行动纲领，是对彻底消灭各种殖民主义所作的伟大贡献，是对帝国主义好战活动的另一次打击。"},{"type":"paragraph","text":"评论在回顾了自第二届亚非团结大会以来亚非形势的变化时说，事实证明，形势是朝着有利于各国人民进一步扩大和发展反帝国主义斗争的方向、朝着有利于各国人民不利于帝国主义和殖民主义的方向发展的。这一切变化决不是因为帝国主义者变得更“温和”了，更“理智”了，而是由于一些国家人民为摆脱殖民枷锁，维护和巩固民族独立而进行了奋斗牺牲的结果，是由于社会主义各国人民和世界上全体进步人类与爱好和平的人们对那些国家人民的正义事业坚决支持的结果。"},{"type":"paragraph","text":"评论说，第三届亚非人民团结大会的召开，正是在帝国主义殖民体系从根底发生动摇，并且清楚表明殖民体系的彻底瓦解已是不可避免了的时候。但是新老殖民主义者不会轻易自动后退，相反，他们千方百计要延长其殖民统治，掠夺亚非国家的财富，并在那里建立军事基地网，其矛头是指向社会主义国家和民族解放运动的。"},{"type":"paragraph","text":"评论说，铁托集团在这方面为美帝国主义效了大劳。这个集团打着“不结盟”政策的幌子，进行破坏活动，竭力分裂亚非各国人民的解放运动，并使之瘫痪。"},{"type":"paragraph","text":"评论说，只有加强反帝国主义统一战线，打乱帝国主义的计划，彻底揭露现代修正主义者的伎俩，各国人民争取自由独立和彻底消灭殖民主义的斗争才能取得新的胜利。"},{"type":"paragraph","text":"评论说，帝国主义者竭力煽动印度反动派的反华运动。这次会议虽然提出了进一步加强亚非团结的崇高目的，但是印度代表还竟然利用大会讲台向中华人民共和国进行攻击和诬蔑，但是他失败了。不论是幕后活动和公开诬蔑都不能削弱中华人民共和国，相反，由于中国为各国被压迫人民的解放斗争，为粉碎帝国主义的侵略计划，为推进人类进步和维护和平所作出的伟大贡献，它赢得了深切的同情和巨大的声誉。"},{"type":"paragraph","text":"评论说，大会所提出的进一步动员一切反帝国主义力量，用顽强的努力和斗争达到彻底消灭殖民主义的任务，是符合各国进步和爱好和平的人民的愿望的。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0a0428e62d"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
