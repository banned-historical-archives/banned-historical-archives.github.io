script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反对垄断资本集团的残酷剥削和压迫日本一百三十万工人再次举行大罢工","authors":[],"dates":[{"year":1972,"month":4,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社北京一九七二年四月二十日电　东京消息:在广大日本工人掀起的春季斗争的高潮中，四月二十日在日本工会总评议会、中立工会联合会组成的“春季斗争共同斗争委员会”的号召下，日本三十六个产业工会系统的二千五百个工会的一百三十万工人，又一次举行了大规模的罢工斗争，反对日本垄断资本集团的残酷剥削和压迫，要求提高工资。"},{"type":"paragraph","text":"早在今年三月就进入了罢工斗争的国营铁路动力车工会和国营铁路工会的工人，在二十日这一天进一步加强了斗争。他们的斗争使东京及其附近的电气机车以及长途火车的运行陷入极大的混乱或瘫痪状态。二十日清晨，国营铁路中央线的十二次电气机车停止了行驶。有三百三十一次客车晚点。有二百四十四次货车在这一天也停止了运行。从四月九日到现在为止，停止运行的货车达一万零一百九十五次。据日本报纸报道，目前日本国内的石油、米、水泥、饲料等主要物资的运输陷于瘫痪状态。"},{"type":"paragraph","text":"二十日，邮电工会系统的电报局工人，在全国五十七个地方举行了罢工。邮局工人这一天上午也在全国九个邮局举行了两小时的罢工。"},{"type":"paragraph","text":"出租汽车司机这一天从上午八点到十点举行罢工，东京和大坂分别有八千辆和六千辆出租汽车停止了行驶。"},{"type":"paragraph","text":"这次罢工斗争沉重地打击了佐藤政府，它再一次显示了日本工人阶级的伟大力量。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f551ee7ecd"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
