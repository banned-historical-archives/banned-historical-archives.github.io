script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"巴苏陀兰大会党驻开罗代表说  毛主席声明鼓舞了刚果人民  古巴《世界报》赞扬我国政府谴责美比侵略刚果（利）声明","authors":[],"dates":[{"year":1964,"month":11,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"巴苏陀兰大会党驻开罗代表说"},{"type":"paragraph","text":"毛主席声明鼓舞了刚果人民"},{"type":"paragraph","text":"古巴《世界报》赞扬我国政府谴责美比侵略刚果（利）声明"},{"type":"paragraph","text":"新华社开罗二十九日电　巴苏陀兰大会党驻开罗代表拉马格勒·钦亚恩今天对新华社记者说：我们自由战士和刚果人民的支持者欢迎和赞赏毛泽东主席关于支持刚果（利）人民反对美国侵略的声明。"},{"type":"paragraph","text":"钦亚恩说：“毛主席对刚果形势的分析这么清楚，甚至原来不认识美帝国主义是全世界的敌人的人现在也认识了这一点”。"},{"type":"paragraph","text":"他说，这个声明鼓舞了战斗中的刚果人民，实际上是呼吁自由战士们联合起来结成统一战线，在刚果、东南亚以及美国的侵略之手所伸及的世界其他地方击溃美帝国主义的一个号召。"},{"type":"paragraph","text":"他说，正如毛主席所指出的，美帝国主义对刚果进行直接的武装干涉的目的，不仅在于控制刚果，而且在于奴役整个非洲。"},{"type":"paragraph","text":"他还表示欢迎周恩来总理以及中国人民团体发表的谴责美国和比利时对刚果的侵略的讲话和声明。"},{"type":"paragraph","text":"他说，我们从刚果的事态发展中吸取了不少教训，“首先，美帝国主义是世界最凶恶和最危险的敌人。第二，如果革命者决心同美帝国主义战斗到最后一分钟，那么美帝国主义一定会被击败”。他说，正如毛主席所说的，美帝国主义是纸老虎。"},{"type":"paragraph","text":"据新华社哈瓦那二十八日电　古巴《世界报》今天的社论赞扬中国政府支持刚果人民反对美国和比利时侵略的声明说，“中国政府关于刚果悲惨事件的声明镇定而坚决。在刚果，由美国和比利时支持和指挥的雇佣军屠杀了这个英雄的人民，破坏了国际法，践踏了神圣的人道主义原则。”"},{"type":"paragraph","text":"这家报纸说，中国人民和中国政府“不仅谴责了这一殖民主义冒险行为，而且还郑重宣布，不能对这一罪行袖手旁观。中华人民共和国信守这个观点，将同非洲和世界其他地方人民一起采取一切措施坚决支持刚果人民的民族解放斗争。”"},{"type":"paragraph","text":"社论指出，在美帝国主义作垂死的挣扎的情况下，“应采取的唯一态度是中国政府采取的态度。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cc9807876b"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
