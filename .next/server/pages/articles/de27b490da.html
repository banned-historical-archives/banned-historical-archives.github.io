" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"陆定一同志在北京六中听了汇报以后的发言记录","authors":[],"dates":[{"year":1965,"month":4,"day":26}],"is_range_date":false,"parts":[{"text":"陆定一同志在北京六中听了汇报以后的发言记录","type":"title"},{"text":"片面追求升学率的思想是否要戴资产阶级教育思想的帽子？智育第一、分数第一、升学第一、纪律第一。这四个第一是否都要戴资产阶级教育思想的帽子？不行。主要是抓为政治服务，主要是批判为资产阶级政治服务的思想。","type":"paragraph"},{"text":"有人说“半工半读是社会主义的，全日制学校是资本主义的”。这种说法不行，在我们的国家中学好外文就是为无产阶级服务的。","type":"paragraph"},{"text":"抓学风首先要把领导班子抓好。下一段要抓抓学习，看起来有些东西硬搞就要抓过了头。从学校训练出来的人并不都是好的。共产党中不是也出了叛徒吗？主要要搞好领导，领导如能经常抓思想、抓劳动、不弄虚作假、作风正派就行了。","type":"paragraph"},{"text":"同时抓几个组几个班，恐怕也不行，这样就会增加花样，容易齐头并进，学生受不了。","type":"paragraph"},{"text":"有的学生一早就到学校里来偷偷作好事，不留名 ，但是上课打瞌睡。","type":"paragraph"},{"text":"我们与凯洛夫的分界，主要是劳动。我们缩小三个差别，他们扩大三个差别，从此引出了一系列的问题。对于全面发展的理解就是其中的一个。","type":"paragraph"},{"text":"抓教育思想要抓主要的东西。上课点名不点名是枝节的问题。有的课可以教师讲，有的课可以学生活动，由他们去搞。这些东西麻烦得很，要一把钥匙开一把锁。","type":"paragraph"},{"text":"不能设想学生一个个都是好的。革命的学校可以出革命的学生，但也可能出反革命的学生，反革命的学校也可能出革命的学生。","type":"paragraph"},{"text":"部队的战士，平时很调皮，但打起仗来很勇敢。","type":"paragraph"},{"text":"主要要抓革命化、劳动化。既要教好，又要学好。学习主席的著作是好事，但也要适当掌握。第一要学，第二不要以为一学主席著作就什么都行了。","type":"paragraph"},{"text":"抓教学工作也要抓大是大非，不要抓太细。主要要按主席的指示办事，少而精。启发式，考试不要搞突然袭击。有的学校不敢抓温习功课，说温习功课就是升学率思想，谁还敢抓。学生应该既能读书、能劳动，又要讲政治。学生的团结问题也要解决，过去是资产阶级子女欺侮工农子女。现在是工农子女转过来欺侮资产阶级子女。有的学校搞得好工农子女有包袱的也放下来了。对于地富子女要把他们改造好，他们功课好的人也可以让他们帮助别人。学得好的人可跳级。教育部只抓留级，不抓跳级。这也是因材施教的问题。","type":"paragraph"},{"text":"教育方面，在反对资产阶级教育思想时，绝不能抓住一些具体问题去扣帽子，这样统统打倒了，也就没有什么东西了。抓教育思想要抓政治思想，不然就要抓过头了。革命不革命的根本问题是消灭三个差别还是扩大三个差别，不是琐琐碎碎的问题，你们办事不要搞过了头。如果在评四好连队时，说连长翻不着柜子就不能做连长，那就不对了。","type":"paragraph"},{"text":" 一九六五年四月二十六日","type":"paragraph"}],"comments":[],"origin":"上海市教育局档案","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"陆定一","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"de27b490da"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
