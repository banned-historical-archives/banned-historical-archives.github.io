script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"庆祝中国人民解放军建军二十六周年金日成首相电贺毛泽东主席崔庸健次帅电贺朱德总司令","authors":[],"dates":[{"year":1953,"month":8,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京一日电】　我中央人民政府毛泽东主席收到朝鲜民主主义人民共和国内阁首相金日成元帅祝贺中国人民解放军建军二十六周年的贺电。文如下:"},{"type":"paragraph","text":"中华人民共和国中央人民政府主席毛泽东同志:"},{"type":"paragraph","text":"值此英雄的中国人民解放军——真正的人民武装力量、忠实的和平保卫者——建军二十六周年纪念日，我以朝鲜民主主义人民共和国政府、全体朝鲜人民以及我个人的名义，谨向您和兄弟般的中国人民以及中国人民解放军全体指战员致以热烈的祝贺。"},{"type":"paragraph","text":"朝鲜人民在迎接英雄的中国人民解放军的光荣的纪念日之际，对于中国人民给予朝鲜人民在为了对美帝国主义武装侵略者的胜利斗争中的兄弟般的援助，致以深深的谢意。"},{"type":"paragraph","text":"我确信从战斗中团结起来的朝中两国人民，在全世界爱好和平人民的正义支持下，今后一定能够粉碎敌人的任何侵略企图。"},{"type":"paragraph","text":"为了中华人民共和国的繁荣和全世界的持久和平与安全，谨祝中国人民解放军不断成长和壮大。"},{"type":"paragraph","text":"朝鲜民主主义人民共和国内阁首相　金日成"},{"type":"paragraph","text":"一九五三年八月一日于平壤市"},{"type":"paragraph","text":"【新华社北京一日电】　中国人民解放军朱德总司令收到朝鲜民主主义人民共和国民族保卫相崔庸健次帅祝贺中国人民解放军建军二十六周年的贺电。文如下:中国人民解放军总司令"},{"type":"paragraph","text":"朱德将军:"},{"type":"paragraph","text":"值此英雄的中国人民解放军——中国人民强大的武装力量——建军二十六周年，我以全体朝鲜人民军将士及我个人的名义，谨向您并通过您向全体中国人民解放军指挥员战斗员致以热烈的兄弟般的祝贺。"},{"type":"paragraph","text":"英雄的中国人民解放军在反对外国侵略者及国内反动派的长期的革命斗争中，建立了辉煌的伟大的功勋，并钢铁般地站在保卫人民革命的胜利果实和中国人民和平的创造性的劳动，以及维护亚洲和平与安全的前哨上。"},{"type":"paragraph","text":"为了伟大中华人民共和国的兴隆和发展以及亚洲与世界的持久和平，衷心地祝贺您和中国人民解放军全体指战员在继续加强中国人民解放军的威力的事业中，获得更新的成就。"},{"type":"paragraph","text":"朝鲜民主主义人民共和国民族保卫相次帅　崔庸健"},{"type":"paragraph","text":"一九五三年八月一日于平壤市"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"朱德","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d6eb84beba"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
