" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"人性的呼唤","authors":["北京大学化三","张锡琨"],"dates":[{"year":1957,"month":5}],"is_range_date":false,"parts":[{"text":"人性的呼唤","type":"title"},{"text":"北京大学化三张锡琨","type":"authors"},{"text":"（张锡琨：北京大学化学系学生）","type":"subtitle"},{"text":"人在形成过程中，人性亦随之形成。在人类文化发展的过程中，人性也同时充实着自己的内容。但从人类进入阶级社会起，人开始具有了另外一种属性——阶级性，加上人们的种种阶级仇恨的教育，人性就在阶级矛盾的掩盖下，被冲淡了，被忽视了！(如各种酷刑的出现)到了社会主义社会的过渡时期，本应使人性得到更多的尊重，但恰恰相反。由于过份的强调了阶级矛盾、仇恨，所以一些绝灭人性的东西无阻地发生了。(在各次运动中)，对阶级异己加以私刑。如不准休息、吊打……以及其他肉体摧残。与此同时，官僚主义者对人身进行了无形的迫害。由于法制的不健全，所以这些恶劣现象在社会上未被有效的制止，所以社会风气开始败坏。儿子可以对父亲任意谩骂，甚至将其捆绑、鞭打……学生开始以无人性的方法，以得到领导对其阶级性强的信任。无人性成了得到信任的强有力的工具了！于是扣大帽子之事风行了，每逢一人，就迫不及待地千方百计的想将人证明为反革命，所以把一切生活琐事以及开玩笑的话，都搬来作为口实，而进行荒谬的推理。将其推向反革命的边缘。(当然，若有一点可能，早就被叫成反革命了！)朋友，人性安在?你有生活得更好一点的愿望。难道你的同学就没有生活下去的起码要求吗！朋友，想想吧！不要再出卖良心，不要再屠杀自己的兄弟吧！回到人性中来！！","type":"paragraph"},{"text":" 来源：北京大学社会主义思想教育委员会编印《北京大学右派分子反动言论汇集》，一九五七年十月。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"00997d026f"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
