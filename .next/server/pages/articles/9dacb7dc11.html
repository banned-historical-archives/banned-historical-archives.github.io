script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"以优异成绩回击右倾翻案风  山西省煤炭工业首战告捷","authors":[],"dates":[{"year":1976,"month":2,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"以优异成绩回击右倾翻案风"},{"type":"paragraph","text":"山西省煤炭工业首战告捷"},{"type":"paragraph","text":"山西省煤炭工业今年一月份首战告捷。"},{"type":"paragraph","text":"山西省煤炭工业战线的广大职工，在新发表的毛主席两首词和一九七六年元旦社论的激励和鼓舞下，鼓干劲，破常规，战严寒，夺高产，提前四天完成了一月份国家煤炭生产计划，超产煤炭一百多万吨。"},{"type":"paragraph","text":"今年以来，山西煤炭工业坚持党的基本路线，以阶级斗争为纲，把学习无产阶级专政理论和抓好煤炭战线的阶级斗争相结合，把发展煤炭生产和巩固无产阶级文化大革命成果相结合，形势大好。今年国家给山西省下达的煤炭生产计划比去年又有较大幅度增加，但广大煤矿工人并不满足，全省国营煤矿和地方煤矿都给自己提出了更高的要求，决心以优异的成绩回击右倾翻案风，巩固和发展无产阶级文化大革命的成果。大同、阳泉、潞安等矿务局，今年迈出的生产步伐都很大。如大同矿务局一月份平均每天超产原煤六千多吨，比去年同期提高了百分之十二。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"山西文革","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9dacb7dc11"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
