script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"为了进一步压迫剥削苏联劳动人民  苏修竟拜日本垄断资本为师","authors":[],"dates":[{"year":1969,"month":7,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"为了进一步压迫剥削苏联劳动人民"},{"type":"paragraph","text":"苏修竟拜日本垄断资本为师"},{"type":"paragraph","text":"新华社十二日讯　东京消息：苏修叛徒集团为了进一步加重对苏联工人阶级的压迫和剥削，公然提出要“学习”日本财阀的“经营管理技术”。"},{"type":"paragraph","text":"据日本报纸透露，苏修叛徒集团最近通过它的驻日大使馆向日本亲美垄断组织“生产力本部”提出，要求准许它派三、四十名企业经营管理人员到日本学习“日本企业的经营管理技术”，并出席日本召开的“经营管理技术讨论会”。苏修还乞求日本财阀派讲师给它派去的人员讲课。报纸说，日本垄断资本已经同意了苏修的乞求。"},{"type":"paragraph","text":"日本“生产力本部”是由美国政府和日本垄断资本于一九五五年联合建立的一个垄断组织。从它诞生那天起就一直在加紧压迫、剥削日本工人，扶植工贼，强迫工人用血汗为资本家积累资本。"},{"type":"paragraph","text":"苏修叛徒集团向日本垄断资本学习压迫、剥削工人的黑经验，充分暴露了苏修叛徒集团的资产阶级反动本质。这表明，走投无路的苏修叛徒集团，正在求助于日本垄断资本的黑经验，进一步对苏联劳动人民进行敲骨吸髓的残酷压迫和剥削。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d50af86a80"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
