" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji29","name":"毛泽东全集第29卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji29.pdf"],"article":{"title":"立即占领妙香山杏川洞","alias":"","parts":[{"type":"paragraph","text":"立即占领妙香山香川洞"},{"type":"paragraph","text":"（1950年10月22日）邓、洪、韩、解\"，并告彭、高"},{"type":"paragraph","text":"（一）二十一日二十一时电悉。（二）敌进甚速，请照彭电立即用汽车运一部兵力去占领妙香山、杏川洞，先运几个营去也好。（三）无论用汽车运兵运物及步行的人马武器都不要再走宣川、"},{"type":"paragraph","text":"[1]邓，指邓华，当时任中国人民志愿军第十三兵团司令员兼政治委员。洪、韩，指洪学智、韩先楚，当时均任中国人民志愿军第十三兵团副司令员。解，指解方，当时任中国人民志愿军第十三兵团参谋长。"},{"type":"paragraph","text":"[2]彭，指彭德怀，当时任中国人民志愿军司令员兼政治委员。高，指高岗，当时任东北军区司令员兼政治委员。"},{"type":"paragraph","text":"[3]指1950年10月21日21时邓华、洪学智、韩先楚、解方给毛泽东和彭德怀的电报。电报说：据悉敌一部已于20日夜9时在新安州登陆，并悉敌还有在铁山登陆企图。为了钳制向长津方向前进之敌及可能由元山、平壤增援之敌，集中3个军各个歼灭伪六、七、八师。第一步计划拟以四十二军一个师附一个炮兵团坚守长津地区。该军主力首先控制小白山地区，视情况向孟山以南地区挺进。四十军全部进到德川、宁远地区。三十八军全部进到熙川地区。三十九军全部进到泰川、龟城地区。尔后视敌前进情况而各个歼灭之。三十九军全部东进后，新义州、定州地段空虚，为了保证交通运输，防敌登陆，建议调一个军到安东地区。"},{"type":"paragraph","text":"[4]妙香山，位于慈江道、平安北道、平安南道交界处。杏川洞，位于慈江道熙川郡南部。"},{"type":"paragraph","text":"立即占领妙香山杏川洞定州、博川、军隅“线及龟城、泰川、球场线，上述地区，几天之后都可能被敌占，而应取该线北面的道路前进。（四）新义州、铁山、宣川地区应由你们派一部兵力固守。（五）调一个军至安东问题，待商定后再告。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十月二十二日上午九时[1]军隅，即军隅里，位于平安南道价川郡南部。[2]安东，旧市名，即今辽宁丹东。"}],"authors":["毛泽东"],"dates":[{"year":1950,"month":10,"day":22}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":271,"page_end":272},"tags":[{"name":"毛泽东","type":"人物"},{"name":"彭德怀","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4fdd4157a2"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
