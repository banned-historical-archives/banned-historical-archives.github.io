script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"静安区张家宅街道党委带领干部和居民群众联系实际批判林彪路线的极右实质","authors":[],"dates":[{"year":1974,"month":2,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　静安区张家宅街道党委联系街道阶级斗争的实际，带领街道干部和居民群众开展批林批孔斗争，深入批判林彪修正主义路线的极右实质，进一步提高了大家的阶级斗争和路线斗争觉悟。"},{"type":"paragraph","text":"在深入开展批林批孔的斗争中，这个街道党委引导干部和居民抓住“克己复礼”这一反动政治纲领，狠批林彪、孔老二的一系列谬论。祥福里委一位五十九岁的老妈妈说:“林彪一伙横一个‘克己复礼’，竖一个‘克己复礼’，实质就是要复辟。林彪胡说什么‘唯此、唯此为大’，他的意思就是要千万、千万不要忘记复辟资本主义。”不少干部和居民说，林彪自比“天马”、周文、齐桓，就是妄想称王称霸；林彪叫嚷“两斗皆仇，两和皆友”，就是要我们放弃阶级斗争，走苏修“和平演变”的道路；林彪教子尊孔读经，就是妄想建立林家封建买办法西斯世袭王朝。通过学习、批判，大家进一步看清了林彪路线的极右实质。"},{"type":"paragraph","text":"这个街道党委引导大家联系本街道历史的现实的阶级斗争，深入批判林彪和孔老二的“克己复礼”的反动纲领。在讨论中，大家联系文化大革命中地、富、反、坏分子猖狂揪斗里弄干部，妄图翻案夺权的事实，批判了林彪妄图扶植地、富、反、坏分子上台复辟的罪行。他们说，林彪和孔老二都是行将灭亡的反动势力的总代表，我们要加强无产阶级专政，就必须深入批林批孔!退休工人沈朝霞说，过去总以为孔丘宣扬的“仁义道德”是天经地义的，现在才认识到这是杀人不见血的软刀子，是束缚我们的精神枷锁，他们所谓的“仁”就是杀人和吃人。群星里弄的党支部书记周玉映愤怒批判了孔孟宣扬的男尊女卑、三从四德的谬论，她说:“毛主席把妇女解放出来了，可是林彪继承了孔孟的衣钵，妄想再把我们推进苦难的深渊，我们一千个不答应，一万个不答应!我们决不辜负毛主席的期望，要发挥妇女‘半丬天’的作用，争当批林批孔的闯将。”他们还联系地区街道“四旧”复活的某些现象，进一步批判了孔丘的“中庸之道”，决心把意识形态领域里的阶级斗争进行到底。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"林彪","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"批林批孔","type":"主题/事件"},{"name":"批林批孔","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2c0cb345e0"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
