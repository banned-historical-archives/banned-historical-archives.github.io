script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"wenji1","type":"pdf","name":"毛泽东文集第一卷（1999）","internal":false,"official":true,"author":"中央文献研究室","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/wenji1.pdf"],"article":{"title":"给张学良的信","description":"","dates":[{"year":1936,"month":10,"day":5}],"parts":[{"text":"给张学良的信","type":"title"},{"type":"appellation","text":"汉卿先生阁下："},{"type":"paragraph","text":"中国共产党建议全国各党各派各界各军的抗日民族统一战线已经一年多了，虽已得到全国人民的赞助，但中国国民党不但至今采取游移不决态度，而且当日寇正在准备新的大举进攻时，反令胡宗南军深入陕甘配合先生所指挥的部队扩大自相残杀的内战。我们正式宣言，为了迅速执行停止内战一致抗日主张，只要国民党军队不拦阻红军的抗日去路与侵犯红军的抗日后方，我们首先实行停止向国民党军队的攻击，以此作为我们停战抗日的坚决表示，静待国民党当局的觉悟，仅在国民党军队向我们攻击时我们才在自卫的方式上与以必要的还击，这同样是为着促进国民党当局的觉悟。先生是西北各军的领袖，且是内战与抗战歧途中的重要责任者，如能顾及中国民族历史关头的出路，即祈当机立断，立即停止西北各军向红军的进攻，并祈将敝方意见转达蒋介石先生速即决策，互派正式代表谈判停战抗日的具体条件。拟具国共两党抗日救国协定草案，送呈卓览。寇深祸急，愿先生速起图之。"},{"type":"paragraph","text":"毛泽东周恩来"},{"type":"paragraph","text":"十月五日"},{"type":"paragraph","text":"根据人民出版社一九八三年出版的"},{"type":"paragraph","text":"《毛泽东书信选集》刊印。"}],"comment_pivots":[{"part_idx":0,"offset":4,"index":1},{"part_idx":2,"offset":86,"index":2},{"part_idx":2,"offset":373,"index":3}],"is_range_date":false,"authors":["毛泽东"],"comments":["张学良，字汉卿。见本卷第371页注〔10〕。","胡宗南（一八九六——一九六二），浙江孝丰（今属安吉县）人。当时任国民党军第一军军长。","见本卷第446—448页。"],"page_start":462,"page_end":463,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1c92ab5650"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
