script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"抗议垄断资本集团剥削　反对通货膨胀和物价上涨  日本十万工人在东京集会和示威游行  冲绳农民代表在东京集会要求提高甘蔗收购价格","authors":[],"dates":[{"year":1973,"month":11,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"抗议垄断资本集团剥削　反对通货膨胀和物价上涨"},{"type":"paragraph","text":"日本十万工人在东京集会和示威游行"},{"type":"paragraph","text":"冲绳农民代表在东京集会要求提高甘蔗收购价格"},{"type":"paragraph","text":"新华社一九七三年十一月十二日讯　据东方通讯社报道，大约十万日本工人十一月十一日在东京举行集会，抗议日本垄断资本集团的盘剥，反对通货膨胀和物价上涨，并且要求提高工资和发给生活补贴。"},{"type":"paragraph","text":"这次集会是由日本工会总评议会、中立工会联络会议、全国产业别工会联合会联合发起的。总评议长市川诚、日本社会党书记长石桥政嗣、公明党副委员长多田省吾在会上讲了话。他们一致指出，通货膨胀、物价上涨，使垄断资本集团攫取了巨额利润，给工人生活造成了严重困难，并表示将同广大工人和各阶层人民一道，为提高工资和制止通货膨胀而斗争。"},{"type":"paragraph","text":"会上通过了一项反对通货膨胀、制止物价上涨和要求保护工人生活和斗争权力的决议。青年工人在会场内外散发了传单。"},{"type":"paragraph","text":"会后，工人们高呼口号，举行了示威游行。"},{"type":"paragraph","text":"新华社一九七三年十一月九日讯　东京消息：据《人民之星》十一月六日报道，一千多名冲绳农民代表最近在东京举行集会，强烈要求提高甘蔗的收购价格。"},{"type":"paragraph","text":"农民代表于十月二十九日乘船赶到东京，参加了三十日的集会。全冲绳制糖工会的十几名工人也同冲绳农民代表一起赶到东京，并在会场的入口处散发了鼓励农民进行斗争的传单。"},{"type":"paragraph","text":"在冲绳，有百分之八十六的农户种植甘蔗。由于外国砂糖大量进口，垄断资本大量购买土地和通货膨胀，冲绳农民生活受到了严重影响。"},{"type":"paragraph","text":"在集会上，冲绳县农民组织的领导人和农民代表先后讲了话，他们指出，提高甘蔗的收购价格是关系到农民死活的大问题，并表示要坚持把斗争进行到底。"},{"type":"paragraph","text":"冲绳农民代表十月三十一日为此在东京再次举行了集会和示威。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a055ed16b3"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
