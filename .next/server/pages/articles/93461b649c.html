script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"珍惜无产阶级的民主反对资产阶级的“自由”","authors":["傅金亭"],"dates":[{"year":1968,"month":3,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"珍惜无产阶级的民主反对资产阶级的“自由”"},{"type":"paragraph","text":"北京丝线厂工人  傅金亭"},{"type":"paragraph","text":"“我有我的自由，你管不着！”这种论调，目前正在支持着一部分人在企业中大搞无政府主义。"},{"type":"paragraph","text":"什么是自由，我是感受很深的。解放前，我父亲给地主干活，在我三岁的时候，他就活活的给累死了。十一岁，母亲把我送到资本家的作坊里当学徒，一天干十七个小时，整整三年，没有拿到一文钱，一寸布。我反抗这种剥削，要求正当的权利，结果被赶出了厂房。在资本家残酷的剥削压迫下，我们有的只是被剥削的自由。解放后，毛主席领导我们工人翻了身，但是党内最大的一小撮走资本主义道路当权派却要把我们企业重新拉上资本主义道路。当我和工厂的一部分同志起来造他们的反的时候，有一批革命同志却被打成“反革命”。在资产阶级反动路线的统治下，我们又有什么自由呢？！就是在这样关键的时刻，是毛主席亲自主持制订了十六条，给了无产阶级革命派开展“四大”的民主权利。在轰轰烈烈的文化大革命中，我们运用“四大”的锐利武器，揭露一切牛鬼蛇神，狠批党内一小撮走资派。如果没有毛主席和毛主席的革命路线，我们工人阶级能有这样的民主权利吗？"},{"type":"paragraph","text":"自由和民主都是有具体阶级内容的。现在那些高唱“我有我的自由”的人，说穿了，他们要的不是无产阶级的自由，而是资产阶级的“个性解放”和个人放任。他们说“你管不着”，其结果只能是不要无产阶级思想管，而要资产阶级思想管。在这些人的心目中，没有社会主义纪律，也没有无产阶级的集中，有的只是一个“我”字。如果让这种无政府主义思想泛滥下去，就会严重腐蚀我们革命队伍的统一意志，损害无产阶级革命权威，败坏社会主义纪律。毛主席教导我们：“人民享受着广泛的民主和自由；同时又必须用社会主义的纪律约束自己。”我们革命工人，一定要懂得珍惜社会主义的民主权利，抵制无政府主义思想的侵蚀。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"党内资产阶级","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"93461b649c"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
