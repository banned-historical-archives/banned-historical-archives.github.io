script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"朝鲜《劳动新闻》就朝最高人民会议代表团访越发表社论  热情赞颂朝越两国人民的深厚友谊  强调朝越两党和人民在反帝反现代修正主义斗争中紧密团结","authors":[],"dates":[{"year":1963,"month":6,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"朝鲜《劳动新闻》就朝最高人民会议代表团访越发表社论"},{"type":"paragraph","text":"热情赞颂朝越两国人民的深厚友谊"},{"type":"paragraph","text":"强调朝越两党和人民在反帝反现代修正主义斗争中紧密团结"},{"type":"paragraph","text":"新华社平壤十九日电　朝鲜《劳动新闻》今天就朝鲜最高人民会议代表团访问越南民主共和国发表社论，热情赞颂朝越两国人民的深厚友谊和团结。"},{"type":"paragraph","text":"《劳动新闻》的社论说，朝越两国人民间的友谊团结，是在为促进国家的社会主义建设、把美帝国主义从国土的南半部赶出去、实现祖国统一、反对以美帝为首的帝国主义者的侵略和战争政策、保卫远东和世界和平以及为在马克思列宁主义和无产阶级国际主义的基础上，在加强社会主义阵营的团结的共同斗争中形成的。朝鲜最高人民会议代表团这次到越南民主共和国进行友好访问，将为进一步加强朝越两国人民的友谊团结作出巨大贡献。"},{"type":"paragraph","text":"社论说，在以胡志明同志为首的越南劳动党的正确领导下，越南人民在社会主义革命和社会主义建设中所取得的巨大成果，是马克思列宁主义在越南的光辉胜利。今天，越南人民在为反对美帝国主义对南越的武装干涉，为争取国家的统一，正在积极地进行着斗争。朝鲜人民全力支持兄弟的越南人民的正义事业，对越南人民所取得的每一项成就都像自己的成就一样感到高兴。"},{"type":"paragraph","text":"社论强烈谴责美帝国主义者在世界各地特别是在南朝鲜和南越的侵略和战争活动。社论说，一切事态的发展都说明，对美帝国主义必须更加提高警惕，必须加强一切反对帝国主义的和平力量的团结，必须为反对美帝国主义进行坚决的斗争。在这方面，必须加强反对帝国主义力量的核心——社会主义阵营的团结一致，团结所有为被压迫民族和被压迫阶级的解放而斗争的反对帝国主义和反对殖民主义的力量，在人民中间彻底揭露帝国主义者、特别是美帝国主义者的侵略本性，动员他们积极地参加反对帝国主义的斗争，挫败帝国主义者的一切侵略阴谋，这在目前具有重要的意义。"},{"type":"paragraph","text":"社论最后说，朝越两党和两国人民，在进一步促进本国的社会主义建设和祖国的统一、在为加强社会主义阵营的团结和为促进国际共产主义运动发展的共同斗争过程中，在为反对帝国主义和现代修正主义的艰苦斗争中，是紧密地团结在一起的。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bb4eefb9fe"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
