<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"以实际行动反击右倾翻案风","authors":[],"dates":[{"year":1975,"month":12,"day":31}],"is_range_date":false,"parts":[{"type":"paragraph","text":"以实际行动反击右倾翻案风"},{"type":"paragraph","text":"《人民日报》发表了清华大学第二届全体工农兵学员《给伟大领袖毛主席的一封信》。这封信给了北京钢铁学院的革命师生以极大的鼓舞和鞭策，大家立即组织学习和讨论。他们无比激动地说：“清华的战友讲出了我们的心里话。没有无产阶级文化大革命，没有毛主席的革命路线，就没有我们工农兵学员的今天。我们一定要把教育革命进行到底！”"},{"type":"paragraph","text":"今年，钢铁学院七二届的工农兵学员毕业。三年多来，他们在毛主席革命路线的指引下，坚持无产阶级政治挂帅，批判资产阶级、批判修正主义，认真学习马列著作和毛主席著作。他们实行开门办学，在三大革命运动中增长才干，学习和锻炼自己分析问题和解决问题的能力。"},{"type":"paragraph","text":"三年多来，他们已有一百零七人光荣地加入中国共产党，七十六人加入共青团。在毕业实践中，他们承担了生产、科研任务二百三十四项，绝大多数已经完成，有的项目达到了国内的先进水平。他们和工人一起学习、劳动。工人称赞他们“和工人心连心，真是一家人”。"},{"type":"paragraph","text":"但是，今年七、八、九三个月，资产阶级刮起了一股右倾翻案风，企图从文教阵地打开缺口，否定无产阶级文化大革命，否定毛主席革命路线在教育战线上取得的胜利。他们对北京钢铁学院的一片大好革命形势视而不见，胡说什么“钢铁元帅，没有技术怎么上？”污蔑现在的大学生的质量降低了，攻击无产阶级教育革命。北京钢铁学院的工农兵学员以铁的事实，驳斥了这些奇谈怪论。"},{"type":"paragraph","text":"文化大革命前，北京钢铁学院培养出来的学生，只会说，不会干。快毕业时，就成天关在屋子里闭门造车，写毕业论文，理论脱离实际，对生产没有什么实际意义。今天就截然不同了，工农兵学员走出高楼深院，把课堂上学到的理论知识和实践结合起来。他们与工人一起，急国家所急，急工厂所急，为社会主义建设事业贡献自己的力量。潜孔钻头是破碎矿岩的主要工具。北京铁矿原来使用的钻头，寿命低，成本高，影响生产。采矿专业的学员，主动承担了改进钻头任务。他们在矿党委的领导下，与工人、技术人员组成三结合小组，深入实际，调查研究，经过五十多次的反复试验，使钻头的寿命提高到一百三十米以上，受到广大工人的热烈欢迎。金相热处理专业学员研究试制成功一种符合社会主义建设事业需要的硬度高、耐磨性能和综合机械性能好的新钢种。这些难道是旧大学的学生所能比拟的吗？"},{"type":"paragraph","text":"北京钢铁学院工农兵学员满怀战斗豪情，他们决心向清华大学工农兵学员学习，从教育战线想到全国、全世界，从眼前的斗争想到本世纪、下一世纪，接过革命前辈手中的马列主义红旗，把无产阶级专政下的继续革命进行到底。他们决心象清华大学工农兵学员那样，用实际行动反击右倾翻案风，同传统观念实行彻底决裂！"},{"type":"paragraph","text":"本报通讯员"},{"type":"paragraph","text":"本报记者"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"name":"教育革命","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"35ae25e9a1"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
