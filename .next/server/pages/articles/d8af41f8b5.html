script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"捍卫国家主权　保护本国资源　发展民族经济  阿连德总统强烈谴责大国对拉丁美洲国家的剥削和掠夺  墨西哥政府颁布法令加强本国经济独立和控制外国资本","authors":[],"dates":[{"year":1973,"month":3,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"捍卫国家主权　保护本国资源　发展民族经济"},{"type":"paragraph","text":"阿连德总统强烈谴责大国对拉丁美洲国家的剥削和掠夺"},{"type":"paragraph","text":"墨西哥政府颁布法令加强本国经济独立和控制外国资本"},{"type":"paragraph","text":"据新华社圣地亚哥电　智利总统萨尔瓦多·阿连德三月十五日强烈谴责大国对拉丁美洲国家的剥削和掠夺，重申拉丁美洲人民应当成为自己命运的主人。阿连德总统是在接见参加拉丁美洲自由贸易协会商业银行会议的代表时讲这番话的。"},{"type":"paragraph","text":"阿连德总统说，拉丁美洲国家是原料生产国。“我们廉价出售，而不得不高价购买”，“我们正遭受到由于大国利益而造成的政治和贸易后果之害”。他以智利的铜为例，揭露了美国铜公司对智利的难以置信的剥削。他说，四十二年来，这些公司从智利攫走了四十五亿美元，而它们最初的投资只有五万美元。由于这种情况，智利把收回铜等基本资源作为一项根本的任务。阿连德总统谈到国际关系问题时说，智利把各国人民之间需要对话、不受限制地尊重各国人民的自决权和不进行干涉作为不可动摇的原则。他说，“我们不希望任何人干涉我国的内部生活。智利的问题要由我们智利人来解决。”"},{"type":"paragraph","text":"新华社墨西哥城电　墨西哥政府的《每日公报》三月九日颁布了《促进墨西哥投资和调节外国投资法》。"},{"type":"paragraph","text":"这项新法令的第一章说，它的宗旨是“促进公正而均衡的发展和加强本国的经济独立”。"},{"type":"paragraph","text":"法令规定，石油、基本石油化学工业、放射性矿物的开发和核能生产、电力、铁路、电讯等部门专门由墨西哥国家经营；广播电台和电视台、各城市和各城市之间以及各州之间的汽车运输、国内的空中和海上运输、森林开发、煤气分配等部门专门由墨西哥人或没有外国人入股的墨西哥公司经营。法令还规定，在墨西哥人兴办的某些企业中，即在某些矿业资源的开采和利用方面，在生产石油化工副产品和制造汽车配件等方面，允许外国资本在一定的条件下投资，其股份最多不得超过这些企业总股份的百分之四十九。"},{"type":"paragraph","text":"法令同时规定，“在矿业资源的开发和利用方面，不得向外国个人或外国公司提供或转移租让权”；“外国公司不得获取对土地和水源的控制权，不得获取开发水源的租让权”；外国投资要“作为本国投资的补充”，“不得排挤正在顺利营业的本国企业”，“不得在墨西哥国内市场占居垄断地位”。"},{"type":"paragraph","text":"这项新法令是墨西哥总统路易斯·埃切维里亚去年十二月二十六日提出的，今年二月十六日由议会通过。根据墨西哥宪法，这项法令在政府《每日公报》颁布之后六十天生效。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d8af41f8b5"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
