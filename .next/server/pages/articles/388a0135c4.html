" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"文化部出版局关于揭露林彪、江青反革命集团的文学读物应切实注意社会效果的通知","authors":[],"dates":[{"year":1985,"month":1,"day":31}],"is_range_date":false,"parts":[{"text":"文化部出版局关于揭露林彪、江青反革命集团的文学读物应切实注意社会效果的通知","type":"title"},{"text":"最近一个时期以来，有些地区的报刊，尤其是新创办的一些小报，刊载了不少所谓揭露林彪、江青反革命集团的文学作品。这些作品的内容荒诞离奇，格调低下，多系望风捕影，甚至任意虚构。然而其人物都以反革命集团成员或周围某些人的真实姓名出现。这些东西迷惑了不少好奇的读者，把严肃的政治斗争庸俗化，必然产生不良的社会效果。","type":"paragraph"},{"text":"为了有利于社会主义精神文明建设，保证出书质量，请出版社不要把报刊刊载的这类作品编辑成书。出版社如组织此类稿件亦望慎重对待，十分注意政治上的严肃性。","type":"paragraph"},{"text":"主送：全国各省、自治区、直辖市出版（文化）局（厅）、总社，全国各出版社","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"江青","type":"人物"},{"name":"林彪","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"388a0135c4"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
