script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"江西彭泽县乐观公社革委会成员遵循毛主席的教导  坚持参加生产劳动　保持劳动人民本色","authors":[],"dates":[{"year":1969,"month":5,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"江西彭泽县乐观公社革委会成员遵循毛主席的教导"},{"type":"paragraph","text":"坚持参加生产劳动　保持劳动人民本色"},{"type":"paragraph","text":"据新华社南昌二十日电　江西彭泽县乐观公社革委会成员，在贯彻落实党的“九大”精神的热潮中，遵照毛主席的教导，更自觉地参加集体生产劳动，同贫下中农保持最广泛的、经常的、密切的联系，率领革命群众沿着毛主席指引的方向去夺取新的更大的胜利。"},{"type":"paragraph","text":"乐观公社革委会成立以来，全体成员遵循伟大领袖毛主席有关干部参加集体生产劳动的教导，一直坚持参加集体生产劳动，同贫下中农建立了密切联系，大大促进了思想革命化。在党的“九大”的巨大鼓舞下，他们举办毛泽东思想学习班，在认真学习“九大”文献的同时，重温了毛主席的伟大教导：“必须坚持干部参加集体生产劳动的制度。”“夺取全国胜利，这只是万里长征走完了第一步。……务必使同志们继续地保持谦虚、谨慎、不骄、不躁的作风，务必使同志们继续地保持艰苦奋斗的作风。”他们结合学习，总结了参加集体生产劳动的成绩和体会，更深刻地认识到，革委会成员是否自觉地坚持参加集体生产劳动，是关系到能不能成为无产阶级专政下继续革命的坚强战士的大问题，进一步健全了参加集体生产劳动的制度。现在，他们身带劳动工具，走到那里，就在那里和贫下中农一起劳动，并肩战斗，使全公社广大干部参加集体生产劳动蔚然成风。"},{"type":"paragraph","text":"乐观公社革委会成员由于坚持参加集体生产劳动，大大焕发了无产阶级的坚定彻底的革命精神，工作朝气蓬勃，不怕苦、不怕累，率领群众夺取了革命和生产的一个又一个胜利。革委会的一位副主任，坚持和贫下中农一起劳动，始终精神焕发，干劲充沛，那里出现困难他就去那里解决。马桥大队地处偏僻山沟，生产条件比较差，过去年年受灾。这位副主任主动来到这个大队，组织贫下中农认真学习伟大领袖毛主席关于“自力更生”、“艰苦奋斗”的教导，同这个大队的贫下中农一起战天斗地，全面改善了全大队的水利灌溉条件。"},{"type":"paragraph","text":"乐观公社革委会成员通过参加集体生产劳动，更好地树立了埋头苦干、踏踏实实的工作作风。他们每进行一项工作，每落实一项政策，都兢兢业业，认真、细致，讲究实效。"},{"type":"paragraph","text":"乐观公社革委会成员坚持参加集体生产劳动，还进一步密切了和广大贫下中农的血肉联系，出现了干部关心群众，群众爱护干部的新风气。"},{"type":"paragraph","text":"乐观公社革委会只有八名脱产干部，工作很多。在这种情况下，为了促使干部自觉地参加集体生产劳动，经常组织干部学习毛主席的有关教导，不断提高干部对参加劳动的伟大意义的认识。同时，革委会又采取具体措施，保证干部能够参加集体生产劳动。这些措施是：革委会除留一名常委和委员在机关处理日常工作外，其余的干部一部分到生产队抓点，一部分跑面。他们白天一般都坚持和贫下中农一块劳动，了解情况，晚上进行工作；公社可开可不开的会坚决不开，可以在下面开的会决不到上面来开；对干部参加集体生产劳动实行评比制度，一月一小评，半年一初评，一年一总评。通过评比，树立典型，鼓励干部坚持参加集体生产劳动，密切联系群众。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"江西文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f8d1370691"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
