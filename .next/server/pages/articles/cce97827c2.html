script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"排除“四人帮”干扰  誓做社会主义革命和建设的促进派  老模范黄荣昌坚持大搞技术革新","authors":[],"dates":[{"year":1977,"month":3,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"排除“四人帮”干扰  誓做社会主义革命和建设的促进派"},{"type":"paragraph","text":"老模范黄荣昌坚持大搞技术革新"},{"type":"paragraph","text":"去年黄荣昌和伙伴们一起大干苦干，为实现矿山采掘机械化搞了五项重大革新，其中有两项已经完成，三项即将完成。二十多年来，他先后实现了二百四十三个技术革新项目，改进和创造了二百七十多台机械设备，为发展我国钢铁工业作出了贡献。"},{"type":"paragraph","text":"据新华社成都一九七七年三月八日电　全国著名劳动模范、重庆钢铁公司工人副总工程师黄荣昌，排除“四人帮”的干扰、破坏，坚持开展技术革新活动，为社会主义建设作出了新贡献。"},{"type":"paragraph","text":"黄荣昌，是在毛泽东思想哺育下成长起来的新中国第一批工业劳动模范。二十多年来，他在党的领导和群众的帮助下，贯彻执行毛主席提出的独立自主、自力更生的方针，大搞技术革新，先后实现了二百四十三个技术革新项目，改进和创造了二百七十多台机械设备，为发展我国钢铁工业作出了贡献。"},{"type":"paragraph","text":"一九七六年初，重钢工人掀起了工业学大庆群众运动的新高潮。黄荣昌和他所在的机械化车间的工人，根据公司党委的要求，决定加紧设计和赶制采掘机械，争取尽早实现矿山采掘机械化。他们组织调查组，到矿山井下同采掘工人一起劳动，掌握了第一手资料。接着又放弃春节休假，不分白天黑夜地做模型，搞设计，积极为大打矿山之仗出力。"},{"type":"paragraph","text":"就在黄荣昌和他的伙伴们为实现矿山采掘机械化而奋战的时候，祸国殃民的“四人帮”刮起了一股反对“抓革命、促生产”的妖风。他们胡说大搞技术革新是“白专道路”，污蔑工人大干社会主义是“埋头拉车，不抬头看路”，拚命鼓吹什么“革命搞好了，生产自然而然地就上去了”等谬论。在“四人帮”的煽动下，重庆也有人胡说黄荣昌搞技术革新是“为错误路线生产”，“给走资派效劳”，甚至叫嚣“非把他打翻在地不可”。"},{"type":"paragraph","text":"在那乌云翻滚、“四害”横行的日子里，黄荣昌没有后退。他重温毛主席关于把我国建成一个社会主义现代化强国的一系列教导，想到周总理在四届人大会上提出的实现“四个现代化”的宏伟目标，相信自己并不是走什么“白专道路”，更不是“为走资派效劳”，而是按照毛主席的教导，走我国工业自己发展的道路，做社会主义革命、社会主义建设的促进派。他对“四人帮”的所作所为看在眼里，恨在心头，不管风吹浪打，坚持大搞技术革命不动摇。"},{"type":"paragraph","text":"为了把矿山需要的斜井联合采掘机和平巷联合采掘机早日搞出来，黄荣昌和他的伙伴们起早贪黑，每天工作十多个小时，星期天也不休息。去年六月的一天，黄荣昌在斜井联合采掘机上安装零件，从清早一直干到第二天凌晨一点多钟，在十分疲劳的情况下，不料被一个工件从一米多高的机架上打下来，一时昏迷不醒。伙伴们立即送他到保健站进行急救。黄荣昌由于多处受伤，需要住院治疗。但他在医院里想到自己住一天医院，搞采掘机就少一份力量，就再三要求出院。在他的恳切要求下，医生同意他出院。"},{"type":"paragraph","text":"黄荣昌和他的伙伴们在设计、加工斜井联合采掘机时先后失败了六十多次。但是，他们并没有被困难吓倒，而是豪迈地表示：大干社会主义，就要象“王铁人”那样，大干苦干拚命干，大干了还要大干。有的工人见黄荣昌带伤工作，怕他累坏了，关心地劝他要注意休息。黄荣昌想，敬爱的周总理为人民鞠躬尽瘁，我这点小伤算得了什么！他继续和大家一起苦干。去年一年，他们一共搞了包括斜井联合采掘机、平巷联合采掘机在内的五项重大技术革新，其中有二项已经完成，有三项即将完成。在新的一年里，黄荣昌和机械化车间的工人们，决心响应华主席为首的党中央的号召，深入揭发批判“四人帮”的反革命罪行，高举“鞍钢宪法”的旗帜，积极投入工业学大庆的群众运动，继续大搞技术革新，为实现矿山采掘机械化作出新贡献。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"name":"重庆文革","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cce97827c2"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
