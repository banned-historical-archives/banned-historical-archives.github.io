<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji9-1","name":"毛泽东全集第9卷(1)","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji9-1.pdf"],"article":{"title":"给傅作义的信","alias":"","parts":[{"type":"paragraph","text":"给傅作义的信"},{"type":"paragraph","text":"（1936年10月25日）宜生先生主席勋鉴："},{"type":"paragraph","text":"日寇西侵，国难日。先生统率师旅捍卫边疆，今夏小试锋芒，已使敌人退避三舍。观乎报载以死继之之言，跃然民族英雄之抱负，四万万人闻之，神为之王，气为之壮，诚属可贺可敬。红军远涉万里，急驱而前，所求者救中国，所事者抗日寇。今春渡河东进，原以冀察为目的地，以日寇为正面敌，不幸不见谅于阎蒋两先生，是以引军西还，从事各方抗日统一战线之促进。目前情势，日寇侵绥如箭在弦上，华北长江同时告急。但国内统一战线粗有成就，南京当局亦有转向抗日趋势，红军主力之三个方面军已集中于陕甘宁地区，一侯取得各方谅解，划定抗日防线，即行配合友军出动抗战。红军虽志切抗战，但在未得友军谅解，尤其在未得抗战地区之友军及地方行政长官之谅解以前，决不冒然向抗战阵地开进。在已得正式谅解而向抗战阵地开进与实行抗战时，自当以其全力为友军之助，而绝不丝毫妨碍共同抗战之友军及其后方之安全与秩序。兹派彭雨峰同志来绥，与先生接洽一切，乞以先生之意见见教，并希建立直接通讯关系。百川先生处，今春曾数数致书，夏时又托郭团长将意，久未得复，祈先生再行转致鄙意。如有可能介绍彭同志赴晋一唔，实为公便。叨在比邻，愿同仇之共赋。倘承不吝赐教，幸甚幸甚。专此。即颂戎绥"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十月二十五日"},{"type":"paragraph","text":"快不胃然向杭钱障地间选在已得正式宜生主席先生勉壁日牺西侵国础旧面气"},{"type":"paragraph","text":"信解而向抗能降地用逃与实行抗能明实生统率师旅捍所边疆今象小试绛已欣敲"},{"type":"paragraph","text":"以仗全力为友军己助而绝不丝童妨蛋发军人退醒三舍观乎报戴以死建之之言岷张民族英雄之抱资四莺：人之神为之王气"},{"type":"paragraph","text":"越及世后方二跳何安全与秩序生同抗我为之壮运诚属子楚为红年虚伤葛空公"},{"type":"paragraph","text":"结板刻雨攀同去转绥与儿光生控拾一切。全玉还而前所书指救中国研声此抗的冠今"},{"type":"paragraph","text":"该我四气以儿先生之意见见教垂蒂"},{"type":"paragraph","text":"建三克接通讯烟像百先生雯生生程春渡所东进原以赞察为同的地以日为"},{"type":"paragraph","text":"堂部餐穿方数数致书爱时又托韩用长正而敲不幸不见谅长痛而光生愿细是以引能西血是事在方悦性统一能线之"},{"type":"paragraph","text":"将意久打得度祈，光先再行静致那意促近量利情势脑经缓如剂衣统上"},{"type":"paragraph","text":"九有曲可能分纪引同志起管一腔实为公华北长江同时告多陪着围内统一我线窗物有成"},{"type":"paragraph","text":"像切在比静致同仇之共偏承不就南常弯写并血特向耗日血色势分红年主力之"},{"type":"paragraph","text":"希赐教幸世幸世幸此即么颂三个分而事已鉴中陈甘算地坚起与艺局传运"},{"type":"paragraph","text":"戎绥这会会你核战事过一保感服知方详解封定"},{"type":"paragraph","text":"3抗明防线即行配气发第出动抗载红管班志"},{"type":"paragraph","text":"老东切抗学书但在未得友军谅解尤是在制学抗载地匹之友军及地方行政长管之谅解以前，"},{"type":"paragraph","text":"十旧=十2日毛泽东致傅作义信的手稿。"}],"authors":["毛泽东"],"dates":[{"year":1936,"month":10,"day":25}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":256,"page_end":257},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]},{"id":"wenji1","type":"pdf","name":"毛泽东文集第一卷（1999）","internal":false,"official":true,"author":"中央文献研究室","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/wenji1.pdf"],"article":{"title":"给傅作义的信","description":"","dates":[{"year":1936,"month":10,"day":25}],"parts":[{"text":"给傅作义的信","type":"title"},{"type":"appellation","text":"宜生先生主席勋鉴："},{"type":"paragraph","text":"日寇西侵，国难日亟。先生统率师旅捍卫边疆，今夏小试锋芒，已使敌人退避三舍。观乎报载以死继之之言，跃然民族英雄之抱负，四万万人闻之，神为之王，气为之壮，诚属可贺可敬。红军远涉万里，急驱而前，所求者救中国，所事者抗日寇。今春渡河东进，原以冀察为目的地，以日寇为正面敌，不幸不见谅于阎蒋两先生，是以引军西还，从事各方抗日统一战线之促进。目前情势，日寇侵绥如箭在弦上，华北长江同时告急。但国内统一战线粗有成就，南京当局亦有转向抗日趋势，红军主力之三个方面军已集中于陕甘宁地区，一俟取得各方谅解，划定抗日防线，即行配合友军出动抗战。红军虽志切抗战，但在未得友军谅解，尤其在未得抗战地区之友军及地方行政长官之谅解以前，决不冒然向抗战阵地开进。在已得正式谅解而向抗战阵地开进与实行抗战时，自当以其全力为友军之助，而绝不丝毫妨碍共同抗战之友军及其后方之安全与秩序。兹派彭雨峰同志来绥，与先生接洽一切，乞以先生之意见见教，并希建立直接通讯关系。百川先生处，今春曾数数致书，夏时又托郭团长将意，久未得复，祈先生再行转致鄙意。如有可能介绍彭同志赴晋一晤，实为公便。叨在比邻，愿同仇之共赋。倘承不吝赐教，幸甚幸甚。专此。即颂戎绥"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十月二十五日"},{"type":"paragraph","text":"根据人民出版社一九八三年出版的"},{"type":"paragraph","text":"《毛泽东书信选集》刊印。"}],"comment_pivots":[{"part_idx":0,"offset":4,"index":1},{"part_idx":2,"offset":119,"index":2},{"part_idx":2,"offset":139,"index":3},{"part_idx":2,"offset":174,"index":4},{"part_idx":2,"offset":379,"index":5},{"part_idx":2,"offset":434,"index":6}],"is_range_date":false,"authors":["毛泽东"],"comments":["傅作义，字宜生。参见本卷第423页注〔1〕。","察，指察哈尔省，见本卷第382页注〔3〕。","阎，指阎锡山，字百川。见本卷第371页注〔14〕。","绥，指绥远省，见本卷第371页注〔16〕。","彭雨峰，即彭雪枫，见本卷第454页注〔2〕。","郭团长，指郭登瀛，见本卷第389页注〔3〕。"],"page_start":468,"page_end":469,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a3356095dc"},"buildId":"7OZsUMojoSd
