script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反对地主和垄断资本的残酷剥削和压迫意大利五十万贫苦农民游行示威西德和西柏林人民群众举行示威抗议美帝侵越","authors":[],"dates":[{"year":1969,"month":12,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京十四日电　罗马消息:意大利五十万贫苦农民十三日在全国许多城市和村镇示威游行，反对地主的残酷剥削。"},{"type":"paragraph","text":"在意大利，特别是在经济落后的南部地区，封建土地关系大量存在。贫苦农民长年遭受残酷剥削和压迫，一无所有，只得为地主作牛作马，而收成的很大部分又被地主夺走。许多贫苦农民为生活所迫，离乡背井，沦落异乡、异国，甚至不得不卖儿卖女。在地主—垄断资产阶级严酷的剥削和压迫下，广大贫苦农民已经越来越觉醒，他们奋起斗争，一再举行示威和罢工，甚至占领火车站，切断铁路交通。他们的斗争同意大利工人和学生的斗争互相呼应，使意大利反动统治阶级受到群众斗争风暴日益猛烈的冲击。"},{"type":"paragraph","text":"新华社波恩十三日电　西德和西柏林成千上万的人民群众十三日举行声势浩大的示威，抗议美帝国主义侵略越南，要求美国侵略军立即从越南撤走。"},{"type":"paragraph","text":"在西柏林，大约五千名青年在市中心游行示威。旅居西柏林的一些阿拉伯工人也参加了示威。示威群众手挽着手，举着红旗和越南南方民族解放阵线的旗帜，并月高呼“美国佬滚出越南1”等口号，浩浩荡荡地在大街上前进。示威者还在一面美国星条旗上画士了纳粹的标记，并且把美帝国主义者比作希特勒的党卫军，谴责美帝在越南的侵略罪行。数百名示威者在市中，以地区同反动警察进行了搏斗。"},{"type":"paragraph","text":"在西德，许多城市的人民群众也举行了示威6最激烈的示威行动发生在海德尔贝格。五百名示威者冲进了宣扬“美国文化”的“美国之家”和进行经济渗透的“美国捷运银行”，砸碎玻璃窗，捣毁在那里展览的那些乌七八糟的绘画和家俱。然后，示威群众去到海德尔贝格监狱，抗议反动当局逮捕和监禁、名反对海德尔贝格大学反动当局的青年。示威者同前来镇压的警察进行了激烈的搏斗，打伤了几个警察。"},{"type":"paragraph","text":"在汉堡，两千多名示威者不顾警察当局的禁令，在市中心游行示威，并且抗击镇压他们的反动警察。"},{"type":"paragraph","text":"在法兰克福，一千多名示威者的队伍使街上交通陷于停顿。"},{"type":"paragraph","text":"波恩、亚琛、杜塞尔多夫、戈丁根、多特蒙德和弗伦斯堡等其他城市也爆发类似的群众性示威。"},{"type":"paragraph","text":"\u003cIMG alt=请插入6号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1969\\12\\69cf040201.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e一九六九年七月，意大利来兰市的学生和工人不畏强暴，在资产阶级的法庭上英勇斗争，愤怒抗议意大利统治集团残暴镇压学生和工人运动。图为被反动当局“审讯”的学生高举《毛主席语录》，高唱《国际歌》，英勇地进行斗争。"},{"type":"paragraph","text":"新华社发\u003c/FONT\u003e"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bcb93b2bbd"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
