" crossorigin="">{"props":{"pageProps":{"books":[{"id":"0b2f26ed-ad29-48e7-9c89-446932a97ab0","name":"中共党史教学参考资料 第27册 “文化大革命”参考资料 下册（1988年）","internal":true,"official":true,"type":"pdf","author":"","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives3/main/0b2f26ed-ad29-48e7-9c89-446932a97ab0.pdf"],"article":{"title":"关于王张江姚反党集团操纵奥论工具，宣扬“按既定方针办”的一些情况","alias":"","parts":[{"type":"paragraph","text":"伟大领袖毛主席一贯「分重视培养革命接班人，亲自提出了接班人的五项条件和各级领导班子实行老中箐三结合的原则，并在阶级斗争和路线斗争的暴风雨中考察和锻炼无产阶级革命事业的接班人。经过无产阶级文化大革命，批林批孔和批邓、反击右倾翻案风的斗争考验，大批无产阶级革命事业的接班人正在茁壮成长。这是继续执行毛主席既定方针的有力保证。"},{"type":"paragraph","text":"一百多年前，当伟大的无产阶级革命导师马克思和恩格斯还只是两个青年的时候，面对着资本和王冠统治下的黑暗的欧洲大陆，他们就用《共产党宣言》敲响了资本主义的丧钟、宣告了共产主义的必然到来。一九--八年，在那十四个帝国主义强盗妄图将年轻的苏维埃政权扼杀在摇篮里的极端困难的日子里，列宁在马克恩恩格斯纪念碑揭幕典礼上豪迈地指出：“资本的锁一定会被打得粉碎，社会主义一定会取得最后胜利！”今天，在毛主席亲自缔造的伟大的中国共产党面前，在伟大的中国人民解放军面前，在毛泽东思想阳光雨露哺育的英雄的中国人民面前，任何力量都不能阻挡我们亿万革命大军在党中央领导下，永远沿着毛主席既定方针指引的方向前进。"},{"type":"paragraph","text":"英特纳雄耐尔就一定要实现！"},{"type":"paragraph","text":"（原载1976年10月4口《光明日报》）（附）关于王张江姚反党集团操纵舆论工"},{"type":"paragraph","text":"具，宣扬“按既定方针办”的一些情况"},{"type":"paragraph","text":"王张江姚反党集团有计划有预谋地伪造了-个“按既定方针办”的所谓毛主席的临终瞩附，在九月十六日的两报一刊社论中发表，并连篇累读地加以宣扬、为他们算党夺权造舆论。"},{"type":"paragraph","text":"事实是：一九七六年四月三十日晚，在毛主席会见了新西兰总理马尔登之后，华国锋同志向毛主席汇报了全国总的形势好，有几个省不大好的情况，毛主席当即给华国锋同志亲笔写了三条指示。一是“慢慢来，不要招急”，二是“照过去方针办”，三是“你办事，我放心”。华国锋同志当即向政治局传达了毛主席的前两条指示。但是，王张江姚反党集团却别有用心地将“照过去方针办”纂改为“按既定方针办”，拿这个题目大做反党文章。十月二日，华国锋同志在乔冠华同志九月三十日送审的《中国代表团团长在联合国大会第三十一属会议上的发言（稿）》上批示：文中“引用毛主席的瞩咐我查对了一下与毛主席亲笔写的错了三个字，毛主席写的和我在政治局传达的都是·照过去方针办”，为了避免再错传下去我把它删去了。”华国锋同志的批示戳穿了他们的伪造。张春桥在文件上批了：“国锋同志的批注，建议不下达，免得引起不必要的纠纷。”江青圈阅后，划了一根线表示同意张春桥的意见。他们一面阻止下达华国锋同志的批示，一面义用“梁效”的名义，炮制了题为《永远按毛主席的既定方针办》的反党文章，十月四日在光明日报头版头条发表，为他们分裂党，推翻以华国锋同志为首的党中央造奥论。"},{"type":"paragraph","text":"为了查清王张江姚反党集团利用报刊宣扬“按既定方针办\"的情况，我们查阅了一九七六年九月十六日到十月十二日新华社的《内部参考》和《人民日报》、《红旗》杂志、《光明日报》、《文汇报》、《解放日报》、《学习与批判》等六种报刊，现将有关情况简要综合如下："},{"type":"paragraph","text":"一、制造谣言，把所谓“按既定方针办”"},{"type":"paragraph","text":"说成是毛主席的临终嘱咐"},{"type":"paragraph","text":"一九七六年九月十六日，两报一刊社论首先抛出了“按既定方针办”，并在行文中给人造成-一种是毛主席临终瞩咐的印象。社论说："},{"type":"paragraph","text":"“毛主席与世长辞了。毛泽东思想永放光苦，毛主席的革命路线深人人心，毛主席开创的无产阶级革命事业后继有人。毛主席嘱附我们：‘按既定方针办”。”"},{"type":"paragraph","text":"九月十七日，新华社在发给各省市委、中央和国家机关各部委、各军兵种、各大军区党委的《内部参考》（第125期）上，在报道清华、北大学习两报一刊社论，决心按既定方针办时，公然造谣说、“按既定方针办”是毛主席的临终嘱附。报道说：清华大学“校党委副书记胡健说，社论传达了毛主席和我们水别前发出的伟大号召：“按既定方针办”。”“学校政治理论组中年教师黄安森收听了重要社论、含泪再一次向伟大领袖毛主席表示决心：敬爱的毛主席，您临终教导我们·按既定方针办””，北京大学“党委常委、各级干部和群众一起，认真学习毛主席对我们的嘱附：“按既定方针办”，检查对照自己的工作。工宣队员王玄元含着热泪说：“毛主席在他生命的最后一刻，还在为我们党不变修，国不变色考虑方针大计。毛主席的附永远是我们行动的指南”。”"},{"type":"paragraph","text":"二、在报刊上连篇累牍地大肆宣扬“按既定方针办”"},{"type":"paragraph","text":"从九月十七日开始，特别是华国锋同志致悼词以后，到九月三十日．新华社的《内部参考》和《人民日报》、《红旗》杂志、《光明日报》、《文汇报》、《解放日报》、《学习与批判》等六种报刊，不突出宜传华国锋同志致的悼词，不突出宣传悼词中强调的继承毛主席遗志，要坚持“三要三不要“的基本原则，而是突出宣扬“按既定方针办”。"},{"type":"paragraph","text":"九月十九日，新华社关于二十八个省、市、自治区和各大军区举行伟大领袖和导师毛主席追悼大会的长篇报道中，都宣扬了“按既定方针办”，只有广东省、广州军区和广西自治区的报道提到了“三要三不要”的基本原则。"},{"type":"paragraph","text":"从九月十七日到九月三十日，据初步统计，上述报刊发表悼念毛主席的报道和文章共三百九十八篇，其中宣扬“按既定方针办\"的二百三十六篇，占百分之五十九，而引用“三要三不要”基本原则的只有二十一篇，占百分之五点三。"},{"type":"paragraph","text":"从九月二十二日到三十日，上述各报都把“按既定方针办”当作毛主席的语录登在报头上，其中有两、三天只用这一条。"},{"type":"paragraph","text":"从九月十七日到三十日，上述各报都多次出现“按既定方针办”的大字通栏标题。《人民日报》、《光明日报》九月十七日、十八两天，都出现有“按既定方针办\"的通栏大标题。十七日两报的头版头条通栏大标题是：“遵照伟大领袖毛主席瞩咐按既定方针办，坚决把无产阶级革命事业进行到底"},{"type":"paragraph","text":"、"},{"type":"paragraph","text":"《文汇报》从九月十七日到三十日，适栏大标题出现“按既定方针办\"的共六次，其中九月十日第五版头条通栏大标题是：“坚决响应党中央的号召化悲痛为力量，执行毛主席的既定方针夺取更大胜利”。九月二十一日头版头条通栏大标题是：“上海工人阶级坚决执行毛主席的既定方针”。"},{"type":"paragraph","text":"《解放日报》九月二十一日报道上海市百方产业大军悼念老主席逝世的活动，头版买条的通栏大标题是：”按既定方针办，把无产阶级革命毕业进行到底”。九月十二日头版头条通栏大标题是：“上海郊区四百万人民坚决按既定方针办”。九月二十四日头版头条通栏大标题是：“驻沪三军上海民兵坚决执行毛主席既定方针”，九月三十日的头版正中，还刊登了题为“按既定方针办\"的大幅宣传画。"},{"type":"paragraph","text":"《解放日报》、《文汇报》九月十八日都在第三版以大字通栏标题提出：“牢记毛主席的亲切嘱附，捍卫毛主席的既定方针”。"},{"type":"paragraph","text":"《学习与批判》一九七六年第十期，刊登了本刊记者写的文章，标题是：“按毛主席的既定方针办！一一上海一千万人民的战斗暂言”。"},{"type":"paragraph","text":"国庆节以后，特别是十月二日华国锋同志在一个文件上，将“按既定方针办\"删掉后，十月四日《光明日报》、《文汇报》、《解放日报》报头上的毛主席语录栏内，仍然刊用“按既定方针办”。直到十月十二日，《文汇报》在报道“一九七六年上海美术作品展览展出\"的新闻中，还继续宣扬“按既定方针办”。十月九日，《文汇报》刊登中央两项重要决定的同一天，还在第四段用整版篇幅刊登了一组宣传画，总标题是：“继承毛主席遗志，按既定方针办”。"},{"type":"paragraph","text":"三、出于篡党夺权的需要，对所谓“按既定方针办”"},{"type":"paragraph","text":"作别有用心的解释"},{"type":"paragraph","text":"一九七六年九月十六日，两报一刊社论《毛主席永远活在我们心中》首先作了别有用心的解释，社论说："},{"type":"paragraph","text":"“按既定方针办，就是按毛主席的尤产阶级革命路线和各项政策办。”"},{"type":"paragraph","text":"一九七六年九月十七日，新华社《内部参考》第125期刊登的驻清华大学记者组写的报道中说："},{"type":"paragraph","text":"“自动化系党委书记邝守仁，留校工农兵学员、机械系党委副书记许凤琴，学习毛主席关于‘按既定方针办'的嘱咐，庄严地再一次向毛主席他老人家表决心”、“他们指出，‘按既定方针办’，就要坚持以阶级斗争为纲，坚持党的基本路线，坚持斗争哲学，时刻准备迎接今后十次、二十次阶级斗争和路线斗争，要永远发扬‘五不怕“的反潮流精神，坚持同党内资产阶级斗争；‘按既定方针办”，就要认真看书学习，用马克思列宁主义、毛泽东思想武装头脑，彻底破除·路线斗争不可知论”，随时准备为坚持真理而战斗，让毛泽东思想的红旗永远高高飘扬：‘按既定方针办’，就要牢记毛主席关于资产阶级·就在共产党内”、‘走资派还在走”的科学论断，坚持继续革命。他们说，文化大革命是毛主席带领我们进行反修防修的大演习，今后中央出了修正主义，也要这么办。”"},{"type":"paragraph","text":"一九七六年十月四日，《光明日报》发表以“梁效”名义写的《永远按毛主席的既定方针办》的反党文章中说："},{"type":"paragraph","text":"““按既定方针办'这一谅淳瞩咐，是伟大领袖毛主席对我们党和整个国际共产主义运动历史经验的高度概括和深刻总结。”"},{"type":"paragraph","text":"“学习毛主席‘按既定方针办’的嘱咐，我们信心满怀，斗志更坚。毛主席的这一嘱咐，金光闪闪，字字万钧。它对于中国共产党人，中国无产阶级、贫下中农和一切革命群众，这胜利的保证。”"},{"type":"paragraph","text":"在马克思逝世以后，恩格斯一个人继续担任欧洲社会主义者的顾问和领袖的时候、他始终不渝地坚持马克思的既定方针”，“而当恩格斯逝世以后，第二国际的老修正主义者伯恩斯坦和考茨基之流完全背叛了马克思恩格斯的既定方针”，“列宁坚持了马克思恩格斯的既定方针、领导俄国无产阶级和革命群众取得了十月革命的伟大胜利，开辟了人类历更的新纪元”一九七六年九月十七日，《解放日报》第五版，在“遵循毛主席的嘱咐按既定方针办\"的通栏标题下，用四个醒目的标题宣扬："},{"type":"paragraph","text":"“按既定方针办，就要坚持毛主席的革命路线”。“按既定方针办，就要坚持与走资派作斗争”。“按既定方针办，就要坚持认真学习，深人批邓”。“按既定方针办，就要坚持抓革命，促生产，促工作，促战备”。"},{"type":"paragraph","text":"一九七六年九月二十日，《文汇报》在“上海军民认真学习华国锋同志致的悼词\"的报道中，把“按既定方针办\"和《悼词》别有用心地扯在一起，说："},{"type":"paragraph","text":"华国锋同志代表党中央向我们发出了要继承毛主席的遗志，用实际行动悼念伟大领袖毛主席的新的战斗号召，我们坚决拥护，坚决执行。我们一定要化悲痛为力量，继承毛主席的遗志，最紧密地团结在党中央的周围，坚持毛主席的革命路线，坚决遵照毛主席的‘按既定方针办'的嘱附，永远沿着毛主席开辟的革命航道奋勇前进，把毛主席开创的无产阶级革命事业进行到底。”"},{"type":"paragraph","text":"一九七六年十月十日，《文汇报》在“上海一千万军民热烈拥护中央两项重要决定”的报道中，硬把“按既定方针办\"和中央的两项重要决定连在一起，如报道上海京剧团的反映说："},{"type":"paragraph","text":"“自从毛主席逝世以来，我们一直惦记着这两件大事，我们是多么般切地盼望能让广大人民群众世世代代瞻仰毛泽东主席的遗容呵！我们又是多么急切地希望早日出版《毛泽东选集》第五卷及以后各卷和《毛泽东全集》响！现在中央已经作出了决定，这将进一步教育和鼓舞我们继承毛主席的遗志，学习毛泽东思想，遵照毛主席的嘱咐，‘按既定方针办”。”"},{"type":"paragraph","text":"四、打着“按既定方针办”的旗号，把矛头"},{"type":"paragraph","text":"指向以华国锋同志为首的党中央"},{"type":"paragraph","text":"一九七六年九月十七日，新华社《内部参考》第125期刊登了上海分社写的《上海下部群众决心按毛主席既定方针办为贯彻执行毛主席革命路线和政策努力奋斗》的报道，说："},{"type":"paragraph","text":"上海钟表元件厂“四车间党支部书记丁长根说：毛主席的淳淳瞩附“按既定方针办'，是毛主席给全党全军全国人民的反修防修的强大武器，是识别真假马克思主义的试金石。谁违背毛主席的既定方针，谁就是背叛毛主席的革命路线，谁就是无产阶级革命的叛徒，我们就要同他展开坚决的斗争。”"},{"type":"paragraph","text":"一九七六年九月二十九日，《人民日报》第二版发表了清华大学党委副书记荣泳霖、政治部副主任吴炜煜写的文章《按既定方针办，同走资派斗争到底！》说："},{"type":"paragraph","text":"“革党内资产阶级的命、正是毛主席为我国社会主义革命制定的路线、方针的最主要之图改变既定方针的言论和行动作不调和的斗争。我们要始终把眼睛盯住走资派，不管是什么人物、用什么方式搞修正主义、我们都要造他的反，坚决同走资派斗争到底！"},{"type":"paragraph","text":"一九七六年九月十七日，新华社《内部参考》第125期刊登了驻清华大学记者组写的一篇报道、说："},{"type":"paragraph","text":"“清华大学的师生员工们，还清醒地认识到，·按既定方针办’，必然要遭到党内资产阶级的疯狂反对，走资派是不会甘心他们的失败的。建工系工宣队员吴庄根说，自从我们登上上层建筑政治舞台以来，和走资派的斗争就没有停止过，要按既定方针办，就必须把眼晴盯在党内，永远坚持和党内资产阶级斗争的大方向，不断总结和走资派斗争的经验。我们一定要百倍提高警惕，随时准备用鲜血和生命捍卫毛主席的革命路线。”"},{"type":"paragraph","text":"一九七六年十月十一日，《文汇报》发表中国钟厂工人理论小组写的《牢牢掌握革命斗争的人方向》的文章，说："},{"type":"paragraph","text":"“我们只有同刘少奇、林彪、邓小平这类党内走资派进行坚决的长期的斗争、牢牢掌握革命斗争的大方向，才能在各个领域贯彻执行毛主席的革命路线，才能实践毛主席·按既定方针办的嘲咐、把毛主席开创的无产阶级革命事业进行到底。”"},{"type":"paragraph","text":"一九七六年十月四日，《光明日报》发表以“梁效\"名义写的《永远按毛主席的既定方针办》的反党文章，说："},{"type":"paragraph","text":"“篡改毛主席的既定方针，就是背叛马克思主义、背叛社会主义，背叛无产阶级专政下继续革命的伟大学说。”"},{"type":"paragraph","text":"“走资派还在走。”这个‘走”的基本内容，就是反对党在整个社会主义历史时期的基本路线，颠覆无产阶级专政，复辟资本主义，也就是篡改毛主席的既定方针。同时，帝国主义、社会帝国主义也一定会采取各种方式，施加各种影响，支持党内资产阶级，妄图纂改毛主席的既定方针。我们一定要牢记毛主席‘不斗争就不能进步’的教导、团结百分之九十五以上的干部和群众，准备迎接二十次、三十次的路线斗争，在同党内资产阶级，同以苏修叛徒集团为中心的现代修正主义的斗争中，把毛主席开创的无产阶级革命事业进行到底。”"},{"type":"paragraph","text":"“要坚定地按毛主席的既定方针办，必须遵照毛主席的教导，“认真看书学习，弄通马克思主义”。毛主席的无产阶级革命路线和各项政策，是建立在马克思列宁主义、毛泽东思想这一科学理论基础.比的。一切修正主义路线头子要篡改这一既定方针，必然要算改马列主义、毛泽东思想，阉割它的革命灵魂，磨灭它的革命锋芒。”“我们只有刻苦攻读马列和毛主席的著作，把马克思主义、列宁主义、毛泽东思想世世代代传下去，方能在复杂的路线斗争中，识破党内资产阶级的种种鬼域使俩，看清他们的实质，坚定地贯彻和捍卫毛主席的既定方针。”"},{"type":"paragraph","text":"*亿万人民学习、执行、捍卫毛主席的革命路线，这是毛主席开创的无产阶级革命事业必定胜利的根本保证。在这样的人民面前，任何修正主义头子胆敢篡改毛主席的既定方针，是绝然没有好下场的。”"}],"authors":[],"dates":[],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":573,"page_end":577},"tags":[{"name":"张春桥","type":"人物"},{"name":"华国锋","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"批林批孔","type":"主题/事件"},{"name":"反潮流","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"name":"编纂《毛泽东选集》第五卷","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1827c0aae5"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
