script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"照相馆的橱窗陈设应清除资产阶级的气氛","authors":["顾华立"],"dates":[{"year":1952,"month":3,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编辑同志:这几天在马路上到处看到有关五反运动的宣传漫画和标语，使我们精神为之振奋。我们相信在工人阶级强大力量的反击下，资产阶级猖狂进攻的气焰一定会很快被压下去的。但是就在这些漫画、标语的旁边，我看到一些十分刺目和恶劣的东西，那就是照相馆的橱窗，这里面还陈列着一些妖形怪状充满色情气氛、做着令人作呕的姿势的照片。例如在复兴中路襄阳南路附近的华影照相馆里，竟还陈列着外国女人半裸体的照片。这些难道不是在故意散布着资产阶级的思想毒素吗?在三反、五反的阶级斗争中，我们应该将这种恶劣的照片从橱窗里清除出去，换上人民大众喜爱的、表现劳动人民勤劳生产的照片，还可以利用这些橱窗布置作为向资产阶级反击的宣传阵地。我希望各照相馆的店员兄弟们检查一下本店的橱窗，并督促资方立即撤除这些散布资产阶级思想毒素的照片。"},{"type":"paragraph","text":"顾华立"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"daa6df0b13"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
