script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"华夏大写意——读《毛泽东的书法艺术》随想","authors":["王建辉"],"dates":[{"year":1991,"month":12,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"华夏大写意"},{"type":"paragraph","text":"——读《毛泽东的书法艺术》随想"},{"type":"paragraph","text":"王建辉"},{"type":"paragraph","text":"毛泽东从中华民族文化传统中走来。在民族形式的诗词和书法艺术王国里，他在艺术的殿堂里建造了历史和现实的丰碑。《毛泽东的书法艺术》（刘锡山著）熔赏析评述于一炉，铸臆想判定于一书，向我们展示了一代宗匠的书法世界，一派生机盎然，充满意味与气韵。"},{"type":"paragraph","text":"我很欣赏作者这样的论述，毛泽东的书法艺术并不是因为他的政名而显赫，而确确实实的是他不愧杰出的艺术家，是中国现代书法艺术的主将和旗手。我不同意作者所说的毛泽东的政名盖世倒遮掩了他书名的光辉。毛泽东的书名早就流芳播馨，领袖书坛，高可居摩云大厦，低可入茅屋柴舍，他的书名客观地闪射着光辉，并不要我们今天去“发现”。"},{"type":"paragraph","text":"也恰恰是如此，不是我们包括本书的作者发现了毛泽东书法的魅力，而是毛的书法深深地吸引了我们。作者的功绩在于对毛泽东书法艺术天地进行了科学的、学术的、艺术的以至情感的多重形式的扫描，探求了领袖作为一个书家的艺术和心态，并把毛泽东书法研究本身的魅力传导给了我们。"},{"type":"paragraph","text":"在对毛泽东行楷草不同时期书法特点的评述中，我以为作者捕捉到了毛泽东书法艺术的两点神髓。其一，毛泽东非常珍视绵延千年的书法艺术遗产，在民族艺术的峰峦上游目骋怀，于书法传统多所采择，胸纳万有，借广大之烟云，成自家之面目，他的最高成就是草书，他的草书吸取了张旭怀素的精华，化他神而为我神。他的书迹变化万千，他的字根书道却始终抱一，师承有自，一片化机，敢做天下第一人，作天下第一书。此诚为相宜相得之论。其二，毛泽东书法的最高成就是他的直取颠张狂素的大草书。草书历来都被认为是中国书法至上的皇冠。毛泽东登上了草书的峰巅，他成了大宗匠。在尺幅之地倾吐着他的豪雄之气，又在字里行间抒发着他的浪漫理想，玩华而不失真，酌奇而不坠绪，我书我怀，我铸我魂，意在笔先，气在笔意，以其豪气鼓荡，真力弥漫，器局浩大折人。说毛泽东书法自成一格，我看不够，而应该说自造一境，自铸伟局。他的书法是浑然天成的立于泰山之巅的华夏大写意，只求意足，不见字形。"},{"type":"paragraph","text":"毛泽东的书法根植于他深厚的民族文化修养。他找到了一个表达他民族文化情怀的艺术形式。如果说，毛泽东的政治、军事、哲学、语言方面的创造，还要受到更多的主客观条件的制约，那他在书法天地则显然有着最大的自由。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a96d6eccc0"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
