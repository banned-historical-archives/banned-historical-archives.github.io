script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"“天才史观”是剥削阶级的谬论","authors":["时常华"],"dates":[{"year":1971,"month":12,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"上海红光制革厂老工人　时常华"},{"type":"paragraph","text":"哲学上的斗争总是为政治斗争服务的。在哲学上鼓吹唯心论的“天才史观”，在政治上必然搞修正主义。刘少奇一伙为什么要贩卖反动的“天才史观”呢?这是为他们篡党篡政制造反动的理论根据。他们把自己打扮成“天才理论家”、“救世主”，把群众污蔑成“后知后觉”、“不知不觉”的“群氓”、“阿斗”，目的是为了把自己打扮成神圣不可触犯的“伟大人物”，以便按照他们的机会主义路线，来颠覆无产阶级专政，实行资本主义复辟。谁要违犯，谁就是“离经叛道”。这是彻头彻尾的反革命逻辑!"},{"type":"paragraph","text":"毛主席指出:“人民，只有人民，才是创造世界历史的动力。”历史是人民群众创造的，决不是什么那些“天才”活动的结果。人民群众是历史的火车头，有无限的创造力。我国长江大桥、万吨水压机、大庆油田、卫星上天等伟大成就，都是在毛主席革命路线的指引下，人民群众创造的，是人民群众智慧的结晶。没有人民群众，就没有革命的胜利；没有人民群众，社会就不能前进。就以我们红光制革厂来说，一九五六年时，还是一片荒地，在毛主席革命路线的指引下，经过广大群众创造性的劳动，现在荒地变成了厂房。这难道是“天才家”活动的结果吗?不是!这是我们工人阶级在毛主席革命路线指引下创造出来的。回顾解放前，我们制革行业在小作坊生产年代，全靠一根扁担两条腿，几百斤重的牛皮靠手捶。解放后，在毛主席的“鼓足干劲，力争上游，多快好省地建设社会主义”总路线指引下，开展了群众性的技术革新，广大群众日夜奋战，创造出很多土的机器设备，用机械化代替了扁担、鎯头等手工操作，提高了生产率，减轻了重体力劳动。"},{"type":"paragraph","text":"事实说明，“天才史观”是一种维护剥削阶级的谬论，一定要把它彻底批臭。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"381e6f0b20"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
