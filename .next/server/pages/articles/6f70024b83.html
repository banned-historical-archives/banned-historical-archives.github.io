script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反独裁　反迫害　反剥削  拉丁美洲学生不断举行罢课示威  玻利维亚农民用石块轰走亲美政府头子","authors":[],"dates":[{"year":1968,"month":12,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反独裁　反迫害　反剥削"},{"type":"paragraph","text":"拉丁美洲学生不断举行罢课示威"},{"type":"paragraph","text":"玻利维亚农民用石块轰走亲美政府头子"},{"type":"paragraph","text":"新华社讯　一些拉丁美洲国家的青年学生最近不断举行罢课和游行示威，强烈抗议独裁统治和反动当局的迫害。"},{"type":"paragraph","text":"在长期处于军事独裁统治下的尼加拉瓜，十日晚有数百名大学生在首都马那瓜举行游行示威。学生们高呼反对政府的口号，并且表示声援墨西哥、乌拉圭和法国大学生的正义斗争。"},{"type":"paragraph","text":"巴拿马科隆城的中学生最近举行示威游行，抗议巴拿马军事独裁政府对巴拿马大学实行军事占领。军政府当局在十四日凌晨派出大批军队搜查了这所大学，随后就宣布封闭学校。在此以前，巴拿马的学生曾在巴拿马大学校园里集合，举行了反对美帝国主义继续在巴拿马霸占军事基地的抗议示威。"},{"type":"paragraph","text":"在智利重要港口瓦尔帕来索，智利大学师范学院的一千五百名学生，十日宣布举行不定期罢课，抗议政府削减教育经费。罢课学生占领了校舍并筑起了路障。当天下午学生们英勇地同前来镇压的武装警察搏斗了好几个小时。"},{"type":"paragraph","text":"巴西米纳斯吉拉斯州首府贝洛奥里藏特一所大学的约七百名大学生，在十一月下旬占领了学校校舍，反对亲美独裁政权的反动政策，要求改善教育状况。"},{"type":"paragraph","text":"新华社二十日讯　拉巴斯消息：玻利维亚贝伦地区的农民十八日用嘘声、口哨声和石块轰走了亲美独裁政府头子巴里恩托斯。"},{"type":"paragraph","text":"这一天，亲美独裁政府头子巴里恩托斯来到离拉巴斯东北七十五公里的贝伦发表演说，妄图为他残酷剥削和压榨农民的农牧业统一税辩解。愤怒的农民立即向他发出嘘声并投掷石块，吓得巴里恩托斯慌忙躲进汽车，在警察和卫队的保护下，灰溜溜地离开了贝伦。"},{"type":"paragraph","text":"玻利维亚亲美军事独裁政权最近制订的一项农牧业统一税，这是巴里恩托斯政府为了把目前的经济危机转嫁到农民身上，使广大农民更加贫困，从而夺走他们的土地的一种新的剥削措施。这种措施一宣布，就遭到广大农民的强烈反对。（附图片）"},{"type":"paragraph","text":"墨西哥青年学生反迫害、反屠杀的斗争，在广大工人、农民和其他劳动群众支持和参加下，迅猛地展开。图为墨西哥妇女和其他群众示威游行，抗议反动当局的暴行，要求释放被捕的青年学生。"},{"type":"paragraph","text":"新华社"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6f70024b83"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
