" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"西北军政委员会令","authors":[],"dates":[{"year":1951,"month":2,"day":5}],"is_range_date":false,"parts":[{"text":"西北军政委员会令","type":"title"},{"text":"兹将本会第35次行政会议通过之“处理一贯道道产办法”随令附发，希即作为内部文件遵照执行，不必公布。","type":"paragraph"},{"text":"此令。","type":"subtitle"},{"text":"附：“处理一贯道道产办法”一份","type":"paragraph"},{"text":" 主席　彭德怀副主席　习仲勋　张治中","type":"paragraph"},{"text":"处理一贯道道产办法","type":"subtitle"},{"text":"一贯道的道产系用欺骗诱惑等各种手段向人民讹诈得来，只用于反人民活动上。因此在取缔这一反动团体时，对其道产原则上应予没收并依下列办法分别处理之：","type":"paragraph"},{"text":"一、纯以道产开设的工厂、作坊、商号、医院等宣布没收后，其在城市者应收归公有，在乡镇者可转变为人民合作事业或改办人民医院。只要有利于国计民生如工厂、作坊、医院等，且有经营条件的，应尽量继续经营。","type":"paragraph"},{"text":"二、道产与私人合股经营的工厂、商号、作坊等，只没收其道产部份，对于私人股产，不得没收。","type":"paragraph"},{"text":"三、道产中之房屋、土地、粮食等，凡系道费购置者，修建或点传师以上首要分子及地富成份的道徒捐献者，一律没收。若系一般道徒捐献而其生活贫困者可退还之。没收之房屋在城市者归公使用，在乡村的房屋土地，可分给当地的贫苦农民。没收之粮食归人民政府作救济及公益事业之用。","type":"paragraph"},{"text":"四、道内的开荒费、愿助费、超拔费、月助费如系现金且可查清来源者，没收后应归还捐献人，无法查清来源者，归当地政府举办公益事业之用。","type":"paragraph"},{"text":"五、道内首要分子所经营的工厂、商号、作坊等，经查明其资金确属私人所有者，不得没收，但在未彻底查明以前，可予登记监督或代管。","type":"paragraph"},{"text":"六、对取缔一贯道有功之道徒，可从没收的道产中酌情奖励之。","type":"paragraph"},{"text":"七、其没收单项须经省公安厅批准，报西北公安部备案。","type":"paragraph"}],"comments":[],"origin":"《取缔反动会道门工作历史资料汇编（1948－1992年）》，公安部一局编印， 2009年。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d4925b33c2"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
