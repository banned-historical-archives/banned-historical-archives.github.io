<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"最最忠诚地做毛主席的好战士","authors":["申广顺","蒋银祥"],"dates":[{"year":1967,"month":11,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"最最忠诚地做毛主席的好战士"},{"type":"paragraph","text":"毛主席啊，毛主席！海可枯，石可烂，我们忠于您的革命红心永不变！天可塌，地可陷，我们沿着您的革命路线永向前！"},{"type":"paragraph","text":"北京部队空军学习毛主席著作积极分子飞行副大队长　申广顺"},{"type":"paragraph","text":"飞行中队长　蒋银祥"},{"type":"paragraph","text":"十一月十三日，世界革命人民的伟大导师、我们心中最红最红的红太阳毛主席接见了我们！这是我们终身难忘的一天！"},{"type":"paragraph","text":"这天下午四点钟，我们参加北京部队空军学习毛主席著作积极分子代表大会的同志，正在分组开会的时候，急促的铃声响了。部队很快地进行紧急集合，赶到人民大会堂接见厅。大家整齐地站好队，学习毛主席语录，唱歌颂毛主席的歌曲，盼望着赶快见到日夜想念的伟大领袖毛主席。整个大厅充满了欢乐的气氛。时间一秒一秒地过着，过一分钟就象过了一年。等啊等啊，幸福的时刻终于来到了！六点钟，我们最最敬爱的毛主席迈着健壮的步伐走来了，走到大厅中央来了！东方红，太阳升，世界人民心中的红太阳出现在我们面前了！这时候，我们的心激动得要跳出来，幸福的热泪不禁夺眶而出。我们一遍又一遍地同声高呼：“毛主席万岁！毛主席万万岁！”毛主席他老人家满面红光，精神焕发，微笑着，招着手，向我们走来，并且和我们一块照了相。"},{"type":"paragraph","text":"在这最珍贵的时刻，我们心里充满了幸福，充满了温暖。一百多年来，中国人民生活在资本主义、封建主义、帝国主义的压榨之下；是谁把中国人民从苦海中拯救出来？是我们的伟大导师毛主席！正当我们沿着社会主义的光明大道胜利前进的时候，党内最大的一小撮走资派，丧心病狂地妄图把祖国拖向资本主义复辟的道路，让劳动人民吃二遍苦，受二遍罪；在这紧要关头，是谁亲自发动了史无前例的无产阶级文化大革命，把中国的革命航船胜利地引向共产主义航道？是我们的伟大领袖毛主席！当世界被压迫人民和被压迫民族处在水深火热之中的时候，是谁支持他们起来坚持进行武装斗争，点燃起熊熊的革命烈火？是我们伟大的统帅毛主席！当以苏修领导集团为中心的现代修正主义背叛了马克思列宁主义的时候，是谁把马克思列宁主义发展到崭新的阶段，使全世界进入到一个以毛泽东思想为伟大旗帜的新时代？是我们伟大舵手毛主席！毛主席啊，毛主席！有您的英明领导，我们一定能够打倒帝国主义！一定能够打倒现代修正主义！一定能够打倒各国反动派！我们坚信：在您的光辉思想的照耀下，一个没有帝国主义，没有资本主义，没有剥削制度的红彤彤的新世界，一定要建立起来！一定能建立起来！"},{"type":"paragraph","text":"毛主席啊，毛主席！看到您老人家身体那样健康，我们高兴极了。我们从心眼里敬祝您老人家万寿无疆！万寿无疆！万寿无疆！万寿无疆！千幸福，万幸福，毛主席您老人家的身体永远永远的健康，这就是我们的最大最大的幸福！"},{"type":"paragraph","text":"毛主席啊，毛主席！您接见了我们，是对我们最大的关怀，最大的鼓励，最大的鞭策。我们一定要以“斗私，批修”为纲，活学活用您的著作，进一步搞好思想革命化。我们要坚决做到：废寝忘食地读您老人家的书，老老实实地听您老人家的话，不折不扣地照您老人家的指示办事，最最忠诚地做您老人家的好战士。我们向您老人家宣誓：海可枯，石可烂，我们忠于您的革命红心永不变！天可塌，地可陷，我们沿着您的革命路线永向前！"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b16edc9abf"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
