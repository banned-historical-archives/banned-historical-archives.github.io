script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"乔森潘副首相代表民主柬埔寨政府致华国锋总理的贺电","authors":[],"dates":[{"year":1976,"month":4,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"乔森潘副首相代表民主柬埔寨政府致华国锋总理的贺电北京国务院总理、中国共产党中央委员会第一副主席华国锋："},{"type":"paragraph","text":"我十分高兴地获悉，以最尊敬的毛泽东主席为首的中国共产党中央委员会决定：你任中国共产党中央委员会第一副主席、中华人民共和国国务院总理。我谨代表民主柬埔寨政府，并且以我个人的名义，向你表示兄弟般的敬意和热烈的祝贺。同时，我热忱地祝你身体健康，祝你在由你领导的中国政府里、在中国共产党中央委员会里所执行的十分崇高的使命获得圆满成功。我相信，在毛泽东主席和中国共产党的英明领导下，伟大的兄弟的中国人民必将在中国的社会主义革命和社会主义建设事业中取得更加辉煌的胜利。柬埔寨人民和中国人民是由深厚的、兄弟般的革命友谊和传统的、十分亲密的战斗团结联系在一起的。祝我们的真诚友谊和团结日益巩固。"},{"type":"paragraph","text":"顺致最崇高的、兄弟般的敬意。"},{"type":"paragraph","text":"副首相　乔森潘——代表民主柬埔寨政府"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"华国锋","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bd9adeae48"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
