<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"挪威工人共产党（马列）主席斯泰根的唁电","authors":[],"dates":[{"year":1976,"month":9,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"挪威工人共产党（马列）主席斯泰根的唁电中国共产党中央委员会中华人民共和国政府同志们："},{"type":"paragraph","text":"我们沉痛地获悉中国共产党中央委员会主席毛泽东同志逝世。毛泽东同志的逝世是中国党和中国人民、我们党的全体党员和挪威劳动群众、整个世界共产主义运动和全世界无产阶级以及一切从事解放斗争的人民的极大损失。"},{"type":"paragraph","text":"毛泽东同志为马克思列宁主义和无产阶级世界革命奋斗终生。"},{"type":"paragraph","text":"毛泽东同志是当代最伟大的马克思列宁主义者。他不愧为世界无产阶级的其他伟大领袖和导师马克思、恩格斯、列宁和斯大林的继承者。毛泽东同志捍卫并进一步发展了科学社会主义。他的著作是共产党人和一切进行革命斗争的人们的强大武器。"},{"type":"paragraph","text":"斯大林逝世后，现代修正主义篡夺了苏联共产党的领导权，毛泽东同志和中国共产党站在揭露现代修正主义斗争的最前列。毛泽东同志指出，社会主义和无产阶级专政在苏联已被颠覆，并已被赫鲁晓夫和勃列日涅夫统治下的资本主义和法西斯专政所代替。这一反对现代修正主义的斗争具有世界历史意义，它把修正主义分子作为世界人民的敌人揭露出来，使各国共产党人看到修正主义分子破坏世界共产主义运动，对他们开展斗争。"},{"type":"paragraph","text":"五十多年来，毛泽东同志和中国共产党始终站在史无前例的最伟大的革命运动——伟大的中国革命——的最前列。毛泽东主席亲自领导了一九二一年创建中国共产党和一九二七年创建红军的工作。他领导了反对日本帝国主义、美帝国主义和中国反动派的革命武装斗争，直到一九四九年取得民族民主革命的胜利。"},{"type":"paragraph","text":"一九四九年以来，毛主席和中国共产党领导了巩固无产阶级专政和奠定社会主义基础的斗争。一九六六年他亲自发动了旨在加强无产阶级专政、防止资本主义在中国复辟的无产阶级文化大革命。毛主席继续发展和加强了反对修正主义的斗争，直至生命的最后一息。毛主席在他一生的最后十年中领导了揭露和摧毁刘少奇、林彪和邓小平反革命司令部的斗争。"},{"type":"paragraph","text":"毛泽东同志始终站在反对帝国主义、修正主义和一切反动派的斗争的最前列，直至生命的最后一息。他站在反对苏美两个超级大国的斗争的最前列。他坚决支持第三世界的解放运动和战斗中的各国人民，坚决支持真正的社会主义国家，坚决支持世界无产阶级的革命斗争。"},{"type":"paragraph","text":"挪威的无产阶级革命政党工人共产党（马列）把自己的存在归功于毛泽东同志。在挪威，修正主义的毒素深深侵入了共产主义运动。但是，当时挪威共产主义者自己未能总结出错误的所在，未能批判现代修正主义和改组挪威的共产主义运动。正是国际共产主义运动反对现代修正主义的斗争，尤其是毛泽东同志领导中国共产党所进行的斗争，使我们能够明确地认识到我们应当做些什么并胜利地解决建立我们这个新党的任务。"},{"type":"paragraph","text":"毛泽东同志和我们永别了，但他的功绩是永存的。他的著作，同其它马克思主义经典著作一起，将继续指导着共产党人和世界无产阶级的革命斗争。当帝国主义和资本主义灭亡，共产主义在全世界胜利之时，劳动人民将纪念毛泽东同志并感谢他为人类的解放所建立的巨大的历史功绩。"},{"type":"paragraph","text":"马克思主义、列宁主义、毛泽东思想万岁！"},{"type":"paragraph","text":"主席　保尔·斯泰根　代表挪威"},{"type":"paragraph","text":"工人共产党（马列）中央委员会"},{"type":"paragraph","text":"一九七六年九月九日于奥斯陆"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c3b8a0e94b"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
