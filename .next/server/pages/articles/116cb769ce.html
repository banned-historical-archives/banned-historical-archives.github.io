script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"敌人跳出来就坚决打击","authors":["北京市平谷县许家务大队党支部"],"dates":[{"year":1976,"month":4,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"敌人跳出来就坚决打击"},{"type":"paragraph","text":"北京市平谷县许家务大队党支部"},{"type":"paragraph","text":"党中央作出决议，由华国锋同志任中国共产党中央委员会第一副主席和国务院总理，撤销邓小平党内外一切职务。这两个重要决议，说出了我们贫下中农、革命干部的心里话，表达了全党、全军、全国人民的心愿，我们表示坚决拥护。首都工人民兵、人民警察、警卫战士对在天安门广场制造反革命政治事件的一小撮反革命分子实行无产阶级专政，我们坚决支持。"},{"type":"paragraph","text":"不肯改悔的走资派邓小平拒不接受毛主席、党中央对他的一再教育和挽救，顽固地坚持资产阶级立场，他完全代表了党内外资产阶级和一切反动势力的利益和愿望。他的问题的性质已经转化为对抗性的矛盾。党中央关于撤销邓小平党内外一切职务的决议，非常英明，非常及时，大长了无产阶级和贫下中农的志气，大灭了资产阶级的威风，对国内外阶级敌人是一次沉重的打击。"},{"type":"paragraph","text":"阶级斗争是不以人们意志为转移的。毛主席指出：“牛鬼蛇神自己跳出来。他们为自己的阶级本性所决定，非跳出来不可。”“阶级敌人是一定要寻找机会表现他们自己的。”我们的办法是，阶级敌人跳出来就坚决打击，绝不手软。最近，天安门广场发生的反革命政治事件，是有预谋、有计划、有组织的。一小撮反革命分子看到反击右倾翻案风的伟大斗争不断深入发展，并取得节节胜利，看到他们的总代表邓小平要垮台了，就狗急跳墙，公开跳出来和无产阶级进行较量，作垂死挣扎。他们明目张胆地发表反革命演说，书写反动诗词，张贴反革命标语，散发反革命传单，行凶、放火，丧心病狂地把矛头指向伟大领袖毛主席，分裂以毛主席为首的党中央，妄图扭转批判邓小平和反击右倾翻案风斗争的大方向。对此，我们广大贫下中农表示极大的无产阶级义愤。天安门广场是我们伟大领袖毛主席检阅革命群众的地方，决不容许反革命分子在这里兴风作浪，必须对他们实行无产阶级专政。这次反革命事件，充分说明了这场反击右倾翻案风的伟大斗争打中了资产阶级和一切反革命分子的要害；清楚地表明了邓小平代表了哪些人的利益。这使我们更加清楚地认识到，社会主义时期阶级斗争是长期的、复杂的，有时是很激烈的。我们要更加自觉地以阶级斗争为纲，坚持党的基本路线。阶级敌人在哪里进行反革命破坏活动，就在哪里坚决地给予打击。"},{"type":"paragraph","text":"我们一定要继续认真学习马列著作，学习毛主席的一系列重要指示，提高识别真假马克思主义的能力，批判邓小平“三项指示为纲”的修正主义纲领，批判他反革命的修正主义路线，把反击右倾翻案风的伟大斗争进行到底。狠抓革命，猛促生产，以实际行动保卫毛主席，保卫党中央，保卫毛主席的革命路线，保卫社会主义伟大祖国的首都。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"116cb769ce"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
