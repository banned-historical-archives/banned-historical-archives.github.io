script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji31","name":"毛泽东全集第31卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji31.pdf"],"article":{"title":"转发江西省委关于三反运动的报告的批语","alias":"","parts":[{"type":"paragraph","text":"转发江西省委关于三反运动的报告的批语"},{"type":"paragraph","text":"（1952年1月4日）各中央局，并转分局、省市区党委："},{"type":"paragraph","text":"江西省委这个报告很好，认真地和有力地解决了问题，和有些地方党委所作空泛无力的报告大不相同，请在党刊上予以发表。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一月四日"},{"type":"paragraph","text":"[1]指中共中央中南局1951年12月31日转发的江西省委关于反贪污、反浪费、反官僚主义的报告。报告分析了全省贪污浪费的严重情况和产生的原因，提出了大张旗鼓、雷厉风行地开展三反斗争的措施。这些措施是：（1）省级机关拟召开代表会议，进一步深入动员，开展群众性大检查运动，在此基础上组织公审，处决几个突出的贪污犯，以打开局面。全省确定省、地级和6个重点市首先开展三反斗争，并把它作为年终整风鉴定的主要内容，作为整党的重要步骤。县级机关则先在财经企业部门开始三反斗争。（2）抓住开展运动的决定关键，打通主要干部的思想，做到首长负责，亲自动手，紧密依靠群众，开展大规模的群众运动。（3）监委、纪委、检察署和法院联合成立节约检查委员会，组织办事机构，专门处理重大案件和接受群众控告、检举。（4）各地小家务要坚决进行清理上报。（5）县以上各级党委要定期向上级报告开展三反运动的情况。"}],"authors":["毛泽东"],"dates":[{"year":1952,"month":1,"day":4}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":229,"page_end":229},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"60bac21d16"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
