script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"打击投机商贱价收青　解除农民受高利剥削  冀鲁豫人民银行及时贷放粮食","authors":[],"dates":[{"year":1949,"month":5,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"打击投机商贱价收青"},{"type":"paragraph","text":"解除农民受高利剥削"},{"type":"paragraph","text":"冀鲁豫人民银行及时贷放粮食"},{"type":"paragraph","text":"【冀鲁豫电】目前正当青黄不接，农民生活艰难，投机私商乘机活动，贱价收买青苗。人民银行冀鲁豫分行及时贷放粮食，以合理价格订购菜籽，解除了高利贷对农民的剥削。昆吾县五月初的菜籽市场每斤二十五元，但私商预购则每斤仅八元或九元，一个月内新菜籽则可收获，此种买卖的月息便高达百分之二百。有的则以杂粮一斗换一斗七升菜籽；在菏泽附近私商买菜籽青一般是十二元一斤。农民遭受重利盘剥，忍痛出卖。菏泽二区都楼村前有菜籽二百亩，即被私商低价买去三十亩之多。中国人民银行冀鲁豫分行为扶植生产，帮助解决生产者的困难，打击高利贷资本，特举办订购菜籽贷粮。经行署财经委员会讨论决定后，于五月十日起开始办理。贷粮对象为种有菜籽而又在收获前不能维持生活的中贫农，并限定每人不能超过二十斤。因目前黄豆、红粮等价格均较菜籽为高，收获后又可能稍低；故决定贷粮办法为：（一）贷豆子一斤收获后还菜籽一斤。（二）贷给豆子，收获后按当时豆子与菜籽比价多少折合偿还。银行贷粮并结合县、区的生产委员会进行。农民闻讯欢喜异常，纷纷请求贷放。自五月十日至二十一日，银行在二、四、五、八等分区的菏泽，郓巨、昆吾等产菜籽区域，共贷出豆子九十八万二千六百二十五斤。菏泽的贷粮十三万八千三百斤，分到一百五十六个村，贷给了二千五百十一户，为广大农民解决了目前生活困难。郓巨县八区贷粮订购了六万余斤菜籽，据区村干部统计，为农民解除的高利剥削，便足够添耕牛三十头。高利收买菜籽青的私人资本，遭受打击而消声灭迹。农民贷粮多采用前一种方法，贷一斤豆子还一斤菜籽；既简单又易计算，且在目前按市价显然是银行吃亏的。农民说：这比卖给油坊强多了。并表示交还时一定把菜籽打晒得又干又净，才对得起公家。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4040fd4e2d"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
