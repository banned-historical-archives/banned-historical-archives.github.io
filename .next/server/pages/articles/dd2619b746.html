script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"58499299-cef2-4f20-ad14-90703cd2431a","name":"姚文元在欢庆黄浦区革命委员会成立大会上的讲话和一篇《新北大》社论（1967.3.20）","internal":false,"official":false,"type":"img","author":"摘要红卫战报、电气革命造反组翻印","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/58499299-cef2-4f20-ad14-90703cd2431a/1.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/58499299-cef2-4f20-ad14-90703cd2431a/2.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/58499299-cef2-4f20-ad14-90703cd2431a/3.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/58499299-cef2-4f20-ad14-90703cd2431a/4.jpg"],"article":{"title":"彻底粉碎反革命复辟阴谋","alias":"","parts":[{"type":"paragraph","text":"把权力从那些坏人手里夺回来。 个别的首的坏人应该依法惩办。"},{"type":"paragraph","text":"第三种情况是原来权力就掌握在无产阶级革命派手里，不需要夺权的单位。这样一些单位经过草合群众分析，原来党组织继覆可以领导。可以成立文化草命委员会、文化革命小组，来领文化革命，对原党组只进行监督。"},{"type":"paragraph","text":"所以我们设想，关于草命委员会成立之后，怎么领导基层夺权，有这些设想。这些设想是不是对，希望大家来讨论。"},{"type":"paragraph","text":"同志们，当前的阶级斗争还是很尖号的。我们一定要清醒地看到夺权之后，无产阶级和产阶级、社会主义和资本主义两条追路的斗争还是很失贫，还是很复杂。我们必随时准备份碎资产阶级反动路"},{"type":"paragraph","text":"的买反，我们必复同形形式式的资产阶级反动力秘进行斗争。"},{"type":"paragraph","text":"草命的大联合万岁！革命三结合夺权万岁！伟大的中国共产党万岁！我们伟大的领袖毛主席万岁！万岁：万万岁！"},{"type":"paragraph","text":"摘要红卫战报电气革命造反组翻印"},{"type":"paragraph","text":"1967年3月31日"},{"type":"paragraph","text":"彻底粉碎反草命复辟阴谋新此大”社论"},{"type":"paragraph","text":"卫份搞要："},{"type":"paragraph","text":"彻底粉碎反革命复辟阴谋"},{"type":"paragraph","text":"在我们伟大领袖毛主席的英明领导下，”一月革命”的风暴正以”横扫千写如卷秀”之势，摧枯拉朽，荡涤一切资声阶报的残渣余尊，一个无声阶玫的新天地，”正以排山倒海之势、霆万钩之力，磅于全世界而葆其美妙之青春。"},{"type":"paragraph","text":"广"},{"type":"paragraph","text":"党内一小摇走资本主义，道路当权派有的被写官了、被待权了。但他们了人还在，心不死，“他们必然地委我我们作拼死的本事。”"},{"type":"paragraph","text":"他们将每日每时企多在中国复辟。"},{"type":"paragraph","text":"目前，又人中央到地方，自上而下刮起了一股反草今多辟的阴风贵内一十福走英本敢遇路当秘派，怎曲我份竟的”美命的三弦会方对;打着之旗反多想，把子替插向草命派，对中央文草论如淫有，这贵为赏声阶识友少路望趣喜。"},{"type":"paragraph","text":"他们有的装出一付爱害又可性的样子说什么：我也是页。阶没乓动路强受害者”河。”你们每允许我革今”的等善，极为为自己开脱，妄各蒙人耳目，生占世”三结合”这就是要逸水摸鱼要鱼墓李无户阶级文化大革命的果贫，实行久革命复辞!我仙济必要提离场!"},{"type":"paragraph","text":"他们有的抄出一付气紫区区的样子，东膝上降，向无产阶级草命派叫暮：“我有和心杂念，你们也有知心杂念。”妄备“混战一场。”试问，那一小报党内走英本走义道洛的当权派”站在反动的英户阶级立场上，实行资户阶级专政，将无户阶级轰列到结文化大草命位动打下去，颠倒自是非，混清星白，围草命滨，丛制不同意见，实行白色恐你，自以为得计，长资户阶级的威风;灭无产阶级的志气”，所有这一切仅仅一上“私心杂念狗用吗？这样夕动家伙，有什么发格与革命十样相搜并论吼!企各把水搅浑，制造一片混乱，来一个反改倒拜。这是枉赏人机。"},{"type":"paragraph","text":"无户阶欲草命爪，去掉愁，世备斗争。迎头痛击夕草命复辞逆流，把无户阶级文化大革命进行到底！"},{"type":"paragraph","text":"1967年3月31日"},{"type":"paragraph","text":"彻底粉碎反草命复辟阴谋新此大”社论"},{"type":"paragraph","text":"卫份搞要："},{"type":"paragraph","text":"彻底粉碎反革命复辟阴谋"},{"type":"paragraph","text":"在我们伟大领袖毛主席的英明领导下，”一月革命”的风暴正以”横扫千写如卷秀”之势，摧枯拉朽，荡涤一切资声阶报的残渣余尊，一个无声阶玫的新天地，”正以排山倒海之势、霆万钩之力，磅于全世界而葆其美妙之青春。"},{"type":"paragraph","text":"广"},{"type":"paragraph","text":"党内一小摇走资本主义，道路当权派有的被写官了、被待权了。但他们了人还在，心不死，“他们必然地委我我们作拼死的本事。”"},{"type":"paragraph","text":"他们将每日每时企多在中国复辟。"},{"type":"paragraph","text":"目前，又人中央到地方，自上而下刮起了一股反草今多辟的阴风贵内一十福走英本敢遇路当秘派，怎曲我份竟的”美命的三弦会方对;打着之旗反多想，把子替插向草命派，对中央文草论如淫有，这贵为赏声阶识友少路望趣喜。"},{"type":"paragraph","text":"他们有的装出一付爱害又可性的样子说什么：我也是页。阶没乓动路强受害者”河。”你们每允许我革今”的等善，极为为自己开脱，妄各蒙人耳目，生占世”三结合”这就是要逸水摸鱼要鱼墓李无户阶级文化大革命的果贫，实行久革命复辞!我仙济必要提离场!"},{"type":"paragraph","text":"他们有的抄出一付气紫区区的样子，东膝上降，向无产阶级草命派叫暮：“我有和心杂念，你们也有知心杂念。”妄备“混战一场。”试问，那一小报党内走英本走义道洛的当权派”站在反动的英户阶级立场上，实行资户阶级专政，将无户阶级轰列到结文化大草命位动打下去，颠倒自是非，混清星白，围草命滨，丛制不同意见，实行白色恐你，自以为得计，长资户阶级的威风;灭无产阶级的志气”，所有这一切仅仅一上“私心杂念狗用吗？这样夕动家伙，有什么发格与革命十样相搜并论吼!企各把水搅浑，制造一片混乱，来一个反改倒拜。这是枉赏人机。"},{"type":"paragraph","text":"无户阶欲草命爪，去掉愁，世备斗争。迎头痛击夕草命复辞逆流，把无户阶级文化大革命进行到底！"}],"authors":["《新北大》社论"],"dates":[{"year":1967,"month":3,"day":20}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":4,"page_end":4},"tags":[{"name":"夺权","type":"主题/事件"},
