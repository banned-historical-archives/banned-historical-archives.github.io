script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"宫本修正主义集团堕落到极点","authors":[],"dates":[{"year":1968,"month":9,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"宫本修正主义集团堕落到极点"},{"type":"paragraph","text":"竟同福冈九州大学反动当局串通一气企图搬走美机残骸，替美帝掩盖罪迹"},{"type":"paragraph","text":"爱国青年学生奋起反对  反动阴谋遭到挫败"},{"type":"paragraph","text":"据新华社讯　东京消息：日共宫本修正主义集团帮助美日反动派积极策划搬走坠落在九州大学的美军飞机残骸的阴谋，在日本爱国学生的坚决斗争面前遭到了可耻的失败。"},{"type":"paragraph","text":"今年六月二日，一架美军战斗轰炸机坠落在福冈市九州大学工学部的建筑物上，焚毁了兴建中的一座大楼。美帝的这一严重罪行，激起了九州大学爱国学生和广大日本人民的无比愤怒，引起了强大的抗议示威。"},{"type":"paragraph","text":"美帝国主义和日本佐藤反动政府对于日益高涨的日本人民的反美爱国斗争怕得要死，他们一面出动大批武装警察野蛮镇压示威群众，一面千方百计地要把坠落在九州大学的美军飞机残骸搬走，企图消除美帝罪证，平息群众斗争。但是，美日反动派的这一阴谋遭到了日益觉醒的九州大学的爱国学生和广大日本人民的坚决反对，一直未能得逞。"},{"type":"paragraph","text":"就在美日反动派一筹莫展的时候，日共宫本修正主义集团为了向美帝和佐藤反动政府效犬马之劳，立即东窜西跳，勾结反动的学校当局，借口“早日修建”这座大楼，蒙蔽一些不明真相的人，六月二十日在九州大学内举行了一个所谓“奋起大会”，妄图动手搬走美军飞机残骸，以完成美日反动派所完成不了的“任务”。"},{"type":"paragraph","text":"坚持反美斗争的九州大学的爱国学生，对宫本集团的这一阴谋立即进行了坚决的反击。六月二十日下午，他们在校内展开了强有力的示威游行和斗争，勇敢地冲进由宫本集团控制的会场，揭露和谴责宫本集团为美日反动派效劳的可耻罪行。英勇的爱国学生在美国强盗飞机坠落的现场加固了障垒，一直坚守到深夜。学生的正义斗争使宫本集团和反动的学校当局企图搬走美军飞机残骸的计划化为泡影。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"16c1c49d46"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
