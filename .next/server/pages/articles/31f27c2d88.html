script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"“要将劳动献给天主”天主教利用慈善的外衣　剥削我们低廉的劳动力","authors":[],"dates":[{"year":1951,"month":2,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"浙江杭州仁爱护校学生代表吴保和:"},{"type":"paragraph","text":"我们的医院是天主教医院，被帝国主义者利用了她那慈善的外衣，来剥削我们中国人民的低价劳动力，这样的事实表现在免费病房上。免费病房表面上是免费供给吃喝住和治疗，病好了就留在医院里工作。三病房有一个工友就是这样留下来的，每月只拿五个单位。他知道这是不合理的，但想到自己的病是这儿免费医好的，就觉得不应有什么要求了。此外同学们也给他们麻痹了，到解放时，他们给同学们吃维他命丸，说‘解放了你们活动多，身体不好，给你们补补’。同学们想:他们对我们如此好，还能反对吗?帝国主义者就用这些小恩小惠来麻痹我们。并且在麻痹中进行特务活动。如一九四九年医院内被伪警察局抓去了人，大家思想上虽很波动，但总觉得学校里那来特务。"},{"type":"paragraph","text":"他们又与反动派勾结，打击进步份子，破坏党的威信，对工友说要将一切劳动献给天主。直到政务院的命令颁布后，他们又开始进行破坏登记，同学们才决心要把帝国主义的所谓“仁爱”赶出去，并开了控诉大会，通过控诉大会，我们在认识上都提高了，我们揭露了帝国主义的阴谋，并组织了纠察队向帝国主义偷走转移器材药品等破坏登记的阴谋活动进行斗争，在斗争中我们认识到帝国主义的力量在人民的面前是渺小的。经过这一次大会，我们更有信心办好自己的学校，彻底扫除思想上残余的帝国主义毒素。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"31f27c2d88"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
