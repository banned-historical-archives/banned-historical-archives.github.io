script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"越南党政代表团离京回国邓小平彭真陆定一等同志到机场欢送　途经南宁时陈毅副总理到机场迎送","authors":[],"dates":[{"year":1964,"month":11,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京14日电　由越南劳动党中央政治局委员、越南民主共和国政府总理范文同率领的越南民主共和国党政代表团，今天上午乘专机离开北京回国。代表团是在苏联参加了十月社会主义革命四十七周年庆典后，在回国途中，于昨天到达北京的。"},{"type":"paragraph","text":"中共中央总书记、国务院副总理邓小平，中共中央政治局委员、全国人民代表大会常务委员会副委员长彭真，中共中央政治局候补委员、国务院副总理陆定一到机场热烈欢送。"},{"type":"paragraph","text":"到机场欢送的，还有刘宁一、罗贵波、王新亭、李强、曹瑛、杨琳、孙晓村、范瑾等有关方面负责人。"},{"type":"paragraph","text":"越南驻中国大使陈子平、苏联驻中国大使契尔沃年科、越南南方民族解放阵线常驻中华人民共和国代表团团长陈文成也到机场送行。"},{"type":"paragraph","text":"新华社南宁14日电　由越南劳动党中央政治局委员、越南民主共和国总理范文同率领的越南民主共和国党政代表团在回国途中，今天中午由北京乘专机到达南宁。代表团在机场作短时停留后乘专机回国。"},{"type":"paragraph","text":"正在南宁的中共中央政治局委员、国务院副总理陈毅元帅到机场迎送代表团。"},{"type":"paragraph","text":"到机场迎送的还有:中共中央候补委员、外交部副部长章汉夫，中共广西壮族自治区委员会书记、自治区副主席覃应机，国务院总理办公室副主任罗青长，广西僮族自治区副主席莫乃群、卢绍武、李殷丹、钟枫，广西驻军负责人傅春早少将，南宁市市长阎光彩等。"},{"type":"paragraph","text":"越南驻南宁总领事馆领事黎光仁及领事馆工作人员，也前往迎送。"},{"type":"paragraph","text":"在机场上，陈毅副总理等曾陪同范文同总理和代表团全体成员共进午餐。"},{"type":"paragraph","text":"新华社河内14日电　以越南劳动党中央政治局委员、越南民主共和国政府总理范文同为首的越南民主共和国党政代表团，在赴苏参加十月社会主义革命四十七周年庆典后，今天下午乘专机回到河内。"},{"type":"paragraph","text":"到机场迎接的有越南党政领导人长征、阮维桢、黎清毅、黄文欢、潘继遂、文进勇和素友等。"},{"type":"paragraph","text":"中国驻越南大使朱其文和各国驻越南外交使节也前往迎接。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"陈毅","type":"人物"},{"name":"彭真","type":"人物"},{"name":"陆定一","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"91f0e14f65"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
