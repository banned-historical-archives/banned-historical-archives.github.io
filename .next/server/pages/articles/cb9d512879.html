script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中央十人小组复辽宁省委五人小组关于劳动教养办法的请示","authors":[],"dates":[{"year":1956,"month":9,"day":6}],"is_range_date":false,"parts":[{"text":"中央十人小组复辽宁省委五人小组关于劳动教养办法的请示","type":"title"},{"text":"辽宁省委五人小组并各省、市委、自治区党委、中直党委、国家机关党委五人小组，解放军总政治部审干办公室：","type":"appellation"},{"text":"我们同意辽宁省委五人小组关于劳动教养问题所提的办法，现转发各地参考。","type":"paragraph"},{"text":"中共辽宁省委五人小组关于劳动教养办法的请示","type":"subtitle"},{"text":"1956.08.21","type":"subtitle"},{"text":"中央十人小组：","type":"appellation"},{"text":"对于我省在肃反运动中清查出来的不够逮捕判刑而政治上又不适宜于继续留用，放到社会上又会增加失业的反革命分子和其他坏分子，我们拟采取以下办法分别处理：","type":"paragraph"},{"text":"（一）对有一定罪恶，必须给于管制处分的反革命分子和其他坏分子，经法院依法判处管制后，即由原机关开除直接送公安机关负责管理的劳动教养所劳动教养，对这类分子的管理，虽和劳动改造的罪犯不同，应按照规定给予一定的自由并发给工资，同时更应着重加强思想教育改造，但在尚未改造好，未撤销管制之前，不准自由离所。","type":"paragraph"},{"text":"（二）对于只有轻微的罪恶不够管制的反革命分子和其他坏分子，即使属于按规定可以开除送劳动教养的分子，凡是原机关、企业、地区可以设法安置，而安置又不至造成很坏影响的，一般应尽可能不采用开除或开除送劳动教养的办法，而采取其他行政处分的办法。处分后由原机关、企业、地区分配作一般工作或分配参加劳动生产，在劳动生产中加以教育改造。只有极少数确系很不老实，既不能判刑、管制，又不宜分配作一般工作或参加企业劳动生产，非集中劳动教养不可的反革命分子和其他坏分子，才由民政部门集中收容劳动教养。在教养所的生产未安排好之前，即集中在劳动教养所组织学习，进行思想改造。这种劳动教养所即实际上由民政部门负责管理。","type":"paragraph"},{"text":"我们认为这样分别处理的好处是：","type":"paragraph"},{"text":"（1）使绝大部分只有轻微罪恶的反革命分子和其他坏分子可以不送劳动教养所（特别是基建、生产企业中清查出来的这类分子，更便于马上就安置劳动生产），这样就更可以使这类分子感到政府宽大，减少抵触情绪，且能取得群众监督，更便于教育改造，并可减少将来安置就业的困难。","type":"paragraph"},{"text":"（2）极少数必须开除送劳动教养的分子，由民政部门管理，和管制劳动教养的分开管理（也不和收容的游民混在一起），既便于管理，又可减少抵触情绪，便于改造。","type":"paragraph"},{"text":"（3）管制劳动教养的有一定罪恶，且已依法判处一定年限的被管制分子，由企业机关单位加以集中，进行劳动教养。这样无论在安排生产、管制、考察、教育改造上都是比较方便的。","type":"paragraph"},{"text":"以上意见妥否？请速批示。","type":"paragraph"}],"comments":[],"origin":"根据文件的原件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cb9d512879"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
