script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"wenji6","type":"pdf","name":"毛泽东文集第六卷（1999）","internal":false,"official":true,"author":"中央文献研究室","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/wenji6.pdf"],"article":{"title":"加强城市工作，依靠工人阶级","description":"根据毛泽东手稿刊印。","dates":[{"year":1951,"month":1},{"year":1951,"month":2}],"parts":[{"text":"加强城市工作，依靠工人阶级","type":"title"},{"type":"subtitle","text":"一"},{"type":"paragraph","text":"小平同志并告漱石、子恢、仲勋、一波、高岗各同志："},{"type":"paragraph","text":"一月八日综合报告收到阅悉。方针正确，成绩很大，甚慰。你们的第一次城市工作会议开得有成绩，甚好。假如可能的话，在今年五月一日以前，请你再召开一次城市工作会议，对城市工作，主要是对工会工作，对工商业的领导方向和对城市政权问题，加以深入研究，并做出某些决定，为四中全会讨论工会工作准备材料。四中全会准备在五月开，请按此部署工作。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一月二十二日"},{"type":"subtitle","text":"二"},{"type":"paragraph","text":"漱石、子恢、剑英、仲勋、一波、高岗同志："},{"type":"paragraph","text":"兹将邓小平同志一月八日的报告转给你们，可以看出西南工作的概况。其中提到西南已开了一次城市工作会议，着重地批判了党内较为普遍的看不起工人的思想，明确依靠工人阶级应成为党的指导思想，应把它贯彻到各项工作各个部门中去等语。现在华东、中南、西北各区正处土改和镇压反革命等项工作的高潮，许多同志当然很忙，但请你们考虑，腾出一段时间，在五月一日以前，召开一次城市工作会议，着重地研究和解决依靠工人阶级的思想问题，工厂管理问题，工会工作问题，为四中全会讨论这个问题准备意见。四中全会拟在五月召开，请你们按照这个时间部署工作。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一月二十四日"},{"type":"subtitle","text":"三"},{"type":"paragraph","text":"各中央局，并转所属各分局、市委、省委、区党委："},{"type":"paragraph","text":"春耕即到，土改工作应在短时间内告一段落，领导农民全力从事春耕，争取今年的丰收年成，这是极端重要的。在春耕期内，各中央局、分局、市委、省委、区党委，除指导春耕、总结土改经验、训练土改干部、清理镇反积案、总结镇反经验等项工作之外，请划出一段时间，召开一次城市工作会议，总结一九五○年一年城市工作经验，将城市工作中的几个主要问题，例如（一）依靠工人的思想问题，（二）工厂管理问题，（三）工会工作问题，（四）城市建政问题，（五）城市建党问题，（六）城市肃反问题，（七）城市统一战线问题等，加以研究和总结，指导所属增强对于城市工作的领导，并为五月开会的四中全会准备意见。上列各项问题当然一次不能讨论完毕，应分开几次专题会议，各市委尤其应作此种专题讨论。下面是成都市委的报告，发给你们作参考。"},{"type":"paragraph","text":"中央"},{"type":"paragraph","text":"二月七日"}],"comment_pivots":[{"part_idx":2,"offset":2,"index":1},{"part_idx":2,"offset":20,"index":2},{"part_idx":3,"offset":8,"index":3},{"part_idx":7,"offset":8,"index":4}],"is_range_date":false,"authors":["毛泽东"],"comments":["小平，即邓小平，当时任中共中央西南局第一书记。","漱石，即饶漱石，当时任中共中央华东局第一书记。子恢，即邓子恢，当时任中共中央中南局第三书记。仲勋，即习仲勋，当时任中共中央西北局第一书记。一波，即薄一波，当时任中共中央华北局第一书记。高岗，当时任中共中央东北局书记。","指邓小平一九五一年一月八日关于中共中央西南局一九五○年十一、十二两月工作情况给毛泽东并中央的报告。报告着重汇报了农村减租退押运动开展的情况和第一次城市工作会议情况。报告说，关于城市工作，已专门召集了一次城市工作会议。会议的主要收获，在于自此以后，我们将加强对于城市工作的研究和指导。会议中着重批判了党内较为普遍的看不起工人的思想，明确了依靠工人阶级应成为党的指导思想，应把它贯彻到各项工作、各个部门中去。","剑英，即叶剑英，当时任中共中央华南分局第一书记。"],"page_start":146,"page_end":148,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"高岗","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fe61b05957"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
