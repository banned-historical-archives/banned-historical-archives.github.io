script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"胡乔木在中国社科院迎春茶话会上说:社会科学工作者要做党和政府得力助手科学家表示在新的一年里要拿出更多成果献给人民","authors":[],"dates":[{"year":1980,"month":2,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京二月四日电　中国社会科学院院长胡乔木今天在一次讲话中说，社会科学工作者要做党和政府的得力助手。他说，我们要响应中共中央副主席邓小平最近在关于目前的形势和任务的重要报告中发出的号召，在一九八0年用自己科学研究的成果，为四个现代化做出贡献。"},{"type":"paragraph","text":"胡乔木同志今天在社会科学院迎春茶会上还说，在经济工作方面，实际工作者和理论工作者要通力合作，经过调查研究，共同提出实现四个现代化的长远规划。他指出，这是一项光荣的任务。"},{"type":"paragraph","text":"茶话会在人民大会堂举行。中国社会科学院各所学术委员、正副所长，老年的中年的和青年的研究工作人员，参加第一、二次国内革命战争的老战士代表，从海外归国的学者代表，院内各民主党派的代表，行政后勤工作人员的代表，院部负责人和党政工作人员的代表，共七百多人参加了茶话会。"},{"type":"paragraph","text":"胡乔木同志在讲话中回顾说，过去一年中，中国社会科学院不论在学术研究方面，还是组织、行政工作方面都做出了很大成绩。他说，一九八0年，中国社会科学院要做好两件事:第一，确定各学科的全国性规划，使今年的科研工作走上一条更加平稳、健全发展的道路:第二，社会科学工作者不仅要在经济研究方面对国家的四化进程作出贡献，而且在政治方面，要研究新情况、新问题，为保持社会的安定团结作出贡献。社会科学工作者要用马克思列宁主义、毛泽东思想研究今天社会上提出的各种问题，并且有说服力地回答这些问题。这是社会科学工作者义不容辞的责任。"},{"type":"paragraph","text":"在茶话会上，严中平、吕叔湘、费孝通、罗大冈、陈元晖、李学勤、高秀霞、温济泽、张仲麟、王光美也发了言。他们欢欣鼓舞地指出，八十年代，是我国社会主义发展历史上一个伟大的年代。每一个社会科学工作者都要奋发努力，推动我们伟大祖国这艘航船乘风破浪地前进。一些年近古稀的社会科学家表示，他们要同青年、中年社会科学工作者们开展竞赛，在新的一年里要做更多的工作，要拿出更多的科研成果来献给人民和国家。"},{"type":"paragraph","text":"中国社会科学院副院长邓力群、于光远、武光、许涤新、宦乡、张友渔、马洪以及夏鼐、冯至、刘大年、余冠英、贺麟、许立群、张政烺、芮沐、朱光潜、裴文中、季羡林、陈荒煤、吴世昌、王瑶、安岗、李普、李健吾、杨向奎、邓广铭、瞿同祖等出席了今天的茶话会。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"胡乔木","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"42ce3f54ed"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
