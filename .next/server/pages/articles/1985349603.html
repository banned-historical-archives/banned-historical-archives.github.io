script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"包钢工人群众认真执行毛主席关于知识分子的政策  用毛泽东思想改造技术人员世界观","authors":[],"dates":[{"year":1970,"month":7,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"包钢工人群众认真执行毛主席关于知识分子的政策"},{"type":"paragraph","text":"用毛泽东思想改造技术人员世界观"},{"type":"paragraph","text":"据新华社呼和浩特电　包头钢铁公司广大工人群众遵照毛主席关于在整个社会主义革命和社会主义建设的过程中，对知识分子的改造是一个极大的问题的伟大教导，把以工人为主体、有革命干部和革命技术人员参加的“三结合”技术小组作为改造技术人员的阵地，用战无不胜的毛泽东思想对技术人员进行再教育，有力地促进了技术人员的思想革命化，使全公司工程技术队伍的精神面貌发生了深刻变化。"},{"type":"paragraph","text":"文化大革命中，大批技术人员参加到“三结合”的技术小组里来，开始，有些人单纯抱着“钻技术，搞革新”的态度，一味强调“技术结合”，认为老工人有实践经验，自己有书本知识，两者一结合，就可以在技术上打个漂亮仗。可是，老工人们不是这种看法。他们认为，这结合，那结合，首先是思想上结合。思想不对头，路子就走不正。在“三结合”的技术小组里，工人们坚持把活学活用毛泽东思想放在一切工作的首位，不断地用毛泽东思想对技术人员进行再教育。炼钢厂有一个工人家庭出身的技术员，由于在旧学校里受到反革命修正主义教育路线的毒害，进厂后一心想当“工程师”，搞“名牌钢”，平时只注意钻研业务，忽视思想改造。他参加“三结合”技术小组以后，在工人们帮助下，反复学习毛主席关于“为什么人的问题，是一个根本的问题，原则的问题”的伟大教导，和工人一起参加劳动，一起进行忆苦思甜，迅速提高了阶级斗争和两条路线斗争觉悟。不久以前，他和工人们一起发扬敢想、敢干、大胆创新的革命精神，冶炼成功了一种高强度低合金优质钢，为我国冶金工业增加了一个新品种。"},{"type":"paragraph","text":"伟大领袖毛主席教导说：“不破不立。破，就是批判，就是革命。”包头钢铁公司的广大工人遵照毛主席的这一伟大教导，把“三结合”的技术小组作为批判修正主义、批判资产阶级的战斗组，不断地帮助技术人员改变旧思想，提高阶级斗争和两条路线斗争觉悟。这个公司的选矿厂过去采用浮选的方法选矿，不仅耗费大量的药剂，而且精选品位和回收率都很低。今年一月，选矿厂组织了“三结合”的技术小组，进行了强磁选的现场试验。这个试验需要大型铝环。在铸造大型铝环时，有些技术人员迷信洋设备，照搬洋教条，结果，花了四千多元，用了大量的耐火材料，三天多没有把铝锭熔化。后来，工人们买了两口大锅，盘了一个灶，采用土办法，只用了四个小时就把铝锭熔化了，很快铸造出了铝环。工人们抓住这个事例，和技术人员一起开展革命大批判，狠批贪大求洋的错误思想，大大提高了技术人员的两条路线斗争觉悟，坚定了他们走“自力更生”、“艰苦奋斗”道路的决心。“三结合”技术小组始终狠抓革命大批判，充分发挥技术人员的积极性和创造性，改革了选矿系统的工艺，从而把我国贫赤铁矿和弱磁性铁矿的选矿工艺提高到了一个新的水平。"},{"type":"paragraph","text":"毛主席教导说：“思想改造的工作是长期的、耐心的、细致的工作，不能企图上几次课，开几次会，就把人家在几十年生活中间形成的思想意识改变过来。”“三结合”技术小组的工人们遵照毛主席的教导，把对技术人员的再教育当作一项长期的政治任务去完成，工作再忙，任务再重，都狠抓不放。他们同技术人员一起学习，一起劳动，一起生活，耐心细致地教育技术人员克服各种错误思想，坚决走与工人相结合的道路。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1985349603"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
