script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"上海文艺整风第一阶段结束参加整风的文艺工作者端正了学习态度　认清资产阶级和小资产阶级思想的危害性","authors":[],"dates":[{"year":1952,"month":6,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　上海文学艺术界文艺整风运动，自上月二十二日大会动员以来，至本月七日为止，第一个学习阶段已经结束。经过学习文件、负责干部带头检讨、小组学习讨论，大家初步认清了资产阶级、小资产阶级思想在文艺工作上的危害性澄清了对文艺整风的一些不正确看法，端正了学习态度。"},{"type":"paragraph","text":"五月二十二日文艺整风动员大会后，在华东学习委员会上海文学艺术界分会的领导下，划分为文协、美协、音协、戏改协、华东人民艺术剧院、上海人民艺术剧院、上海电影制片厂、上海联合电影制片厂等八个支会和影评联一个直属小组，参加整风学习的文艺工作者共一千三百四十三人，其中包括共产党员二百十五人。"},{"type":"paragraph","text":"文艺整风开始时，由于对整风的目的不够明确，在学习态度和学习方法上暴露了一些比较混乱的思想，例如认为是‘整别人’、‘整领导’，和准备‘挨整’、‘陪整’等。为了纠正这种不正确的看法，学委会在五月廿九日组织大会专题报告，针对这些思想情况，作了分析和批判。大会以后，很多小组在学习态度上作了检查，对学习目的已比以前明确，学习情绪也初步提高了。"},{"type":"paragraph","text":"在这一阶段的学习中，由于负责同志带头检讨，同时在学习方法上做到了理论与实际相联系，参加文艺整风的文艺工作者们，普遍开始认识了小资产阶级思想和资产阶级思想在文艺工作上的危害性及其恶果，因而比较深切地体会到小资产阶级的文艺工作者改造思想的必要性和迫切性。有的认为:“过去是站在小资产阶级的立场去‘体验’生活，结果是以工农兵外衣来装饰自己小资产阶级的作品。今后如不改变立场，‘体验’十年八年也不解决问题”；有的演员说:“如不进行思想改造，有了好的剧本，也会歪曲劳动人民形象”。各单位在学习中，都能普遍热烈发言，大胆暴露思想，并认真联系实际，进行讨论文件和各负责同志的报告；在讨论中，并初步明确了资产阶级、小资产阶级文艺思想在上海文艺界各部门中的主要表现，以便于进一步的研究和检查。这样，就为下一阶段的学习，打下了良好的基础。"},{"type":"paragraph","text":"目前，文艺整风的学习运动已顺利进入第二阶段，在这个阶段中，各单位负责干部将作以检查思想检查工作为主要内容的报告，通过讨论这些检查报告，将进一步联系实际，研究和明确各单位的主要问题，使文艺整风的学习深入一步。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c2538918b9"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
