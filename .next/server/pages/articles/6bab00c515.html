script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共上海市委批转第一商业局党委关于民用胶鞋实行凭“居民日用工业品购买证”供应办法的报告","authors":[],"dates":[{"year":1960,"month":8,"day":23}],"is_range_date":false,"parts":[{"text":"中共上海市委批转第一商业局党委关于民用胶鞋实行凭“居民日用工业品购买证”供应办法的报告","type":"title"},{"text":"各区委、县委、党委、党组：","type":"appellation"},{"text":"市委同意第一商业局党委关于民用胶鞋（包括全胶鞋和布胶鞋）实行凭“居民日用工业品购买证”供应办法的报告，望按此执行。","type":"paragraph"},{"text":" 中共上海市委员会","type":"paragraph"},{"text":"附：","type":"appellation"},{"text":"中共上海市第一商业局委员会关于民用胶鞋（包括全胶鞋、布胶鞋）实行凭“居民日用工业品购买证”供应办法的报告","type":"subtitle"},{"text":"（1960年8月16日）","type":"subtitle"},{"text":"今年上半年，胶鞋是在首先保证生产和特殊需要的情况下敞开供应的。但是由于生产迅速发展，劳动就业扩大，人民生活水平逐步提高，胶鞋的生产不能完全适应日益增长的需要。尤其是民用胶鞋已出现排队争购现象。为了统筹兼顾，合理分配，稳定市场，我们认为需要采取以下办法，改进对民用胶鞋的供应。","type":"paragraph"},{"text":"（一）居民用鞋（包括全胶鞋和布胶鞋）实行凭证供应。","type":"paragraph"},{"text":"（1）凡市区居民购买胶鞋，一律凭上海市第一商业局统一印制的红色封面的“居民日用工业品购买证”，在市区范围内购买，由营业员适当掌握数量。","type":"paragraph"},{"text":"（2）各县凭统一印制的灰色封面的“居民日用工业品购买证”购买，这种购买证一律只能在本县范围内使用。","type":"paragraph"},{"text":"（3）商业部门应根据各地区的人口数量、消费水平分配货源，力求合理对路；并及时注意地区和商店之间的调节，避免造成此处积压，彼处脱销的现象。","type":"paragraph"},{"text":"（二）生产和体育用鞋，由需用的工厂、企业等单位根据节约的原则按实际需用人数编制要货计划，向市百货公司申请供应。","type":"paragraph"},{"text":"（1）耐酸、耐油的全胶鞋、渔业特长靴、炼钢球鞋等，由各有关单位根据所属工矿企业的实际需要，编制季度计划送上海市百货公司平衡后，指定专业商店核实供应。","type":"paragraph"},{"text":"（2）一部分生产工人如水下作业，建筑工程等在进行生产时必须穿用的全胶鞋及布胶鞋，由各有关单位编制季度计划，送上海市百货公司统一平衡确定分配数后，由各区（县）指定零售商店分批核实供应。","type":"paragraph"},{"text":"（3）专业性的体育单位和国家等级运动员所需用的布胶鞋，由上海市体育运动委员会编制计划，由上海市百货公司根据货源情况，拨出一定数量，凭市体委证明，由指定的零售单位供应（具体办法由市百货公司与市体委协商规定）。","type":"paragraph"},{"text":"（三）下列方面的特殊需要，由上海市百货公司掌握一部分机动数，指定商店负责供应。","type":"paragraph"},{"text":"（1）外宾、外侨、归国华侨、外轮海员等。","type":"paragraph"},{"text":"（2）外地来沪开会、参观、访问的人员，由有关部门的主管单位出具介绍信向上海市百货公司洽购。","type":"paragraph"},{"text":"胶鞋实行凭证供应后，必须努力开展增产节约。为了增加货源供应，商业部门必须积极支持工业部门在上半年超产的基础上，根据国家计划，安排生产，继续大力增产，提高质量，调节品种，以适应市场需要。同时，大力开展社会节约，进一步加强修补工作。","type":"paragraph"},{"text":"为了做好胶鞋组织供应工作，必须在各级党组织统一领导下，坚持政治挂帅，加强宣传教育，说明橡胶系进口物资，胶管、胶带、轮胎等需要很广，因此必须首先保证工农业生产的需要，同时也应当指出，国家对民用胶鞋的安排，基本上是可以满足正常的合理需要。要求居民本勤俭持家的精神，节约用鞋，根据自己实际需要，分期购买。","type":"paragraph"},{"text":"我们相信，在市委的领导下，只要经过各级党委加强宣传教育，大力开展增产节约，实行这个办法，一定能够得到广大人民群众的支持，把胶鞋供应工作做好。","type":"paragraph"},{"text":"以上凭证供应办法，已在十五日贯彻实行针棉织品凭票、凭证供应的同时，口头宣布实行了，兹特将具体施行办法补具报告，这些意见，如属可行，请批转各区、县和各有关单位执行。","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6bab00c515"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
