script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji30","name":"毛泽东全集第30卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji30.pdf"],"article":{"title":"关于同意李奇微划中立区的提议致李克农电","alias":"","parts":[{"type":"paragraph","text":"关于同意李奇微划中立区的提议"},{"type":"paragraph","text":"致李克农电"},{"type":"paragraph","text":"（1951年7月14日）克农并金、彭："},{"type":"paragraph","text":"（一）李奇微的通知是以划中立区为主题，来掩盖他因记者这个小问题而引起会议停顿的不妥当行动。我方为取得主动起见，决定同意他划中立区的提议，也同意他将新闻记者作为他代表团工作人员一部分的办法，以取消敌方的一切借口。（二）请你们立即准备在敌方代表团重来开城时注意解决下列几点：（甲）中立区的面积究以多少公里为适宜，为保障双方代表的安全，应考虑撤退当地居民问题，是否能迅速撤退（撤退时保障居民不受损害）。（乙）我方武装撤退后应否以非武装人员维持秩序。（内）设立板门店双方联络员联合办事处问题。（三）给李奇微复文已重写，另电发来。北京准备在今日下午八时才发广播。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"七月十四日上午七时"},{"type":"paragraph","text":"[1]指李克农7月13日21时30分发来的拟以朝鲜人民军最高司令官金日成、中国人民志愿军司令员彭德怀名义发出的给李奇微的复文稿。"}],"authors":["毛泽东"],"dates":[{"year":1951,"month":7,"day":14}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":448,"page_end":448},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"53154055e6"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
