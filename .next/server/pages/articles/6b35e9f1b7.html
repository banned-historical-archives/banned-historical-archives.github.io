script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"为传播马列主义毛泽东思想竭尽毕生精力冯定同志在北京逝世追悼会昨举行　邓小平等送了花圈","authors":["张宝瑞"],"dates":[{"year":1983,"month":10,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京十月二十七日电　(记者张宝瑞)著名的马克思主义哲学家和教育家、北京大学顾问冯定同志于十月十五日在北京病逝，终年八十一岁。冯定同志追悼会今天下午在北京八宝山革命公墓礼堂举行。"},{"type":"paragraph","text":"党和国家领导人邓小平、陈云、彭真、胡乔木、邓力群、陈丕显、胡启立等和全国政协、中宣部、中组部、中联部等单位送了花圈。"},{"type":"paragraph","text":"邓力群、陈丕显、周培源等以及理论界、教育界人士和北京大学师生七百多人参加了追悼会。"},{"type":"paragraph","text":"追悼会由北京大学校长张龙翔主持，中共中央书记处书记、中宣部部长邓力群致悼词。悼词说，冯定同志生于一九○二年，是浙江省宁波市人，一九二六年加入中国共产党。从此，他一直活跃在我国革命斗争和文化教育工作的第一线。早在三十年代，他就致力于马克思主义基本理论的传播工作。在抗日战争和解放战争时期，冯定同志曾任新四军第四师淮北区党委宣传部长、淮安华中分局宣传部副部长、华东局宣传部副部长等职。解放后，冯定同志曾任北京大学教授、党委副书记、副校长，二、三、四届全国政协委员，五届全国政协常务委员，中国科学院社会科学部学部委员，全国马克思主义研究会顾问，全国辩证唯物主义研究会顾问等职。"},{"type":"paragraph","text":"悼词说，冯定同志的一生是革命的一生，是忠于共产主义事业的一生，是积极宣传和捍卫马克思主义的一生。他在长期的革命和建设过程中，都刻苦钻研和积极宣传马克思列宁主义、毛泽东思想，对马克思主义哲学的传播、宣传和普及，作出了贡献；他一贯忠诚党的教育事业，为提高党的干部理论水平，为培训党的理论宣传干部，为培养马克思主义理论专业人才，竭尽了毕生精力。他在政治思想上和工作作风上，都为我们树立了崇高的榜样。"},{"type":"paragraph","text":"遵照冯定同志的遗愿，他的部份骨灰将撒在北大校园甲。"},{"type":"paragraph","text":"追悼会后，参加追悼会的同志向冯定同志的遗体告别。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"邓力群","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6b35e9f1b7"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
