" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji48","name":"毛泽东全集第48卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji48.pdf"],"article":{"title":"关于打人问题","alias":"","parts":[{"type":"paragraph","text":"关于打人问题"},{"type":"paragraph","text":"（1966年8月1日）"},{"type":"paragraph","text":"党的政策不主张打人。但打人也要进行阶级分析，好人打坏人活该；坏人打好人，好人光荣；好人打好人误会。今后再不许打人。要摆事实讲道理。"},{"type":"paragraph","text":"在同学间取消保皇派这个名词。"}],"authors":["毛泽东"],"dates":[{"year":1966,"month":8,"day":1}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":446,"page_end":446},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]},{"id":"45f85d41-2767-49bc-87e9-ba331b429fce","name":"毛泽东思想万岁（1961年-1968年）","internal":true,"official":false,"type":"pdf","author":"","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives3/main/45f85d41-2767-49bc-87e9-ba331b429fce.pdf"],"article":{"title":"关于打人问题","alias":"","parts":[{"type":"paragraph","text":"化大革命的大军：要把他们充分发挥出来。"},{"type":"paragraph","text":"向到北京后，感到很难过，冷冷清清，有些学校大门都关起来了，甚至压学生运动。谁压学生运动？只有北洋军阀：共产党怕学生运动是反马克思主义。有人天天说走群众路线，为人民服务，而实际上是走资产阶级路线，为资产阶级服务。团中央应该站在学生这边，可是他站在铁压同学那边，谁反对文化大革命？美帝、苏修、日本反动派。"},{"type":"paragraph","text":"借“内外有别”是怕革命。大字报贴出来，又盖起来，这样的情况不能允许，这是方向错误，赶快招转。把-一切框程打个稀巴烂"},{"type":"paragraph","text":"我们相信群众，做群众的学生，才能当群众的先生，现在这个文化大革命是个惊天动地的事情。能不能，敢不敢过会主义这关？这-一关是最后消灭阶级，缩短三大差别。"},{"type":"paragraph","text":"反对，特别是资产阶级“权威”思想，这就是破，如果没有这个破，社会主义就立不起来，要做到一一斗、二批、三改也是不可能的。坐办公室听汇报不行，只有依靠群众，相信群众，到底，准备革命革到自已头上来。党政领导，党员负责同志，应当有这个准备。现在要把革命到底，从这方面炼自己，改造自己，这样才能赶上，不然就只能靠在外面。"},{"type":"paragraph","text":"有些同志斗别人很凶，斗自已不行，这样自已永远过不了关。"},{"type":"paragraph","text":"靠你们自己引火烧身，爆风点火，敢不敢？因为是烧到自已头上，同志们这样回答，准备好，不行就自已罢自已的官，生为共产党员，死为共产党员，坐沙发吹风扇生活不行。"},{"type":"paragraph","text":"给群众定框框不行，北京大学看到学生起采，定框框，美其名目：“纳入正轨”，其实是纳入邪轨。．·，"},{"type":"paragraph","text":"有些学校给学生戴“反革命分子”的帽子。（外办的张彦跑到外面给人扣了二十几个反革命帽子）这样就把群众放到对立面去了。不怕坏人，究竟坏人有多少？广大的学生大多数是好人。"},{"type":"paragraph","text":"（有人提出，乱的时候，打乱档案怎么办？）"},{"type":"paragraph","text":"怕什么？坏人来证明是坏人，好人你怕什么，要将-一个怕字换成一个敢字。要最后证明社会主义关是不是过。：你们要政治挂帅，要到群众里面去，和群众在一起，把无产阶级文化大革命搞得更好。"},{"type":"paragraph","text":"对共书团中央的批部"},{"type":"paragraph","text":"（一九六六年七月）"},{"type":"paragraph","text":"有人讲团中央“三胡”糊里湖涂。明明白白站在资产阶级方面，什么糊里糊涂？团中央不但不支持学生群众运动，反而压学生群众运动，应严格处理。"},{"type":"paragraph","text":"关于打人问题"},{"type":"paragraph","text":"（一九六六年八月一日）"},{"type":"paragraph","text":"党的政策不主张打人。但打人也要进行阶级分析，好人打坏人活该；坏人打好人，好人光荣：好人打好人误会。今后再不许打人。要摆事实讲道理。"},{"type":"paragraph","text":"·265·"}],"authors":["毛泽东"],"dates":[{"year":1966,"month":8,"day":1}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":278,"page_end":278},"tags":[{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5ea7282ad0"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
