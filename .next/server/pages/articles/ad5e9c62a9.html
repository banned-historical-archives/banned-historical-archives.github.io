" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"李济深“为彻底肃清胡风反革命集团而斗争”","authors":["李济深"],"dates":[{"year":1955,"month":6,"day":11}],"is_range_date":false,"parts":[{"text":"李济深“为彻底肃清胡风反革命集团而斗争”","type":"title"},{"text":"李济深","type":"authors"},{"text":"“人民日报”前后发表的关于胡风反革命集团的三批材料，完全证明胡风集团是一个危害国家、危害人民、彻头彻尾的反革命阴谋组织；胡风反革命集团是帝国主义和蒋介石匪帮的忠实走狗，一贯地奉行着他们主子的旨意，以最阴险毒辣的手段来破坏中国人民的革命事业。我对胡风反革命集团的罪恶活动感到无比的愤怒，坚决主张要给胡风及其集团中的执迷不悟的分子以严厉的制裁。","type":"paragraph"},{"text":"胡风集团二十多年来一直披着马克思主义的外衣，打着搞文艺工作的幌子，混入人民革命队伍，实行所谓“挖心战”，妄图从内部来破坏革命的堡垒。他用尽一切心机要推翻中国共产党的领导，从而达到他颠覆中华人民共和国，使蒋介石匪帮在大陆复辟的罪恶目的；因为反革命分子胡风也知道，中国共产党是中国人民革命的领导核心，是中国人民革命胜利的根本保证。但胡风反革命的狰狞面目，隐藏了二十多年之后，还是被彻底地暴露出来了，这就说明任何反革命分子无论他隐藏得如何巧妙，总归是瞒不过人民雪亮的眼睛，逃不出人民的巨掌的。胡风反革命集团事件的揭发，是中国人民在中国共产党领导下、进行反对内外敌人斗争中的一个重大胜利！","type":"paragraph"},{"text":"胡风事件使我们进一步认识到过渡时期阶级斗争的复杂性和尖锐性，内外敌人是要千方百计采取公开和隐蔽的方式来破坏我们人民革命事业的，而像胡风这种隐蔽的敌人是比公开的敌人还更加阴险，更加可怕的。我号召中国国民党革命委员会全体成员，必须随时提高警惕，严格划清敌我界限，继续积极参加粉碎胡风反革命集团的斗争，从各方面揭露胡风反革命集团的罪恶，并严防反革命分子混入我们中国国民党革命委员会组织的内部。我们要贡献一切力量，和全国人民一道，在中国共产党的英明领导下，为彻底肃清胡风反革命集团、粉碎内外敌人的一切阴谋诡计而斗争。","type":"paragraph"}],"comments":[],"origin":"1956年6月11日《人民日报》。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"革命委员会","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ad5e9c62a9"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
