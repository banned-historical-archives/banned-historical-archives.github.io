script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"肃清修正主义新闻路线流毒 把革命大批判专栏办得更好","authors":["陆剑文"],"dates":[{"year":1969,"month":11,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编辑同志:"},{"type":"paragraph","text":"我是一个搞革命大批判专栏的新兵。在参加街头革命大批判战斗中，自己也受到了很大的教育，提高了阶级斗争和路线斗争觉悟。但在办革命大批判专栏中我也有教训。"},{"type":"paragraph","text":"今年六月间，厂革委会决定由我和另外几个人一起为我厂的第一期街头大批判专栏组织稿件，并叫我们去学习一下兄弟单位办街头大批判专栏的经验。但由于我头脑中资产阶级新闻观点没彻底肃清，不是学习兄弟单位突出无产阶级政治，搞好革命大批判的先进经验，却对一些耸人听闻的标题很感兴趣，认为这样能够吸引读者。回来后，厂革委会要我写一篇关于我厂广大工人团结起来共同对敌的稿子。我为了吸引读者，就把一些闹资产阶级派性的细节不惜笔墨地描绘一番，而对广大群众怎样狠批叛徒刘少奇，做到五个“统一”的革命行动只是草草几笔带过。厂革委会的同志看了以后，尖锐地向我指出:“大批判必须‘批’字当头，突出无产阶级政治，而这篇稿子却在宣扬什么?”接着，又和我一起学习了毛主席的教导:“我们现在思想战线上的一个重要任务，就是要开展对于修正主义的批判。”以后，我就比较注意警惕资产阶级新闻观点的侵蚀。通过这件事，使我认识到，一定要在开展革命大批判的同时，肃清自己头脑中反革命修正主义新闻路线的流毒，努力把革命大批判专栏办得更好!"},{"type":"paragraph","text":"上海一○一厂　陆剑文"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"派性","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fece41dfe9"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
