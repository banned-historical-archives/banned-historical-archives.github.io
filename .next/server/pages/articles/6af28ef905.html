script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"上海机械学院党委坚决推倒“四人帮”炮制的假报告广大教师干劲倍增　教学科研气象一新","authors":[],"dates":[{"year":1979,"month":3,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社上海三月十七日讯　上海机械学院党委认真落实党的知识分子政策，坚决推倒“四人帮”炮制的《从上海机械学院两条路线的斗争看理工科大学的教育革命》调查报告中强加在广大教师和干部头上的一切诬陷不实之词，调动了他们的积极性，教学和科研工作出现了一派新气象。"},{"type":"paragraph","text":"经过广大干部、教师的深入揭发，已经查明，发表在《红旗》杂志一九六八年第三期上的调查报告《从上海机械学院两条路线的斗争看理工科大学的教育革命》，是一篇捏造事实、颠倒是非的假报告，是“四人帮”破坏党的教育事业的一个阴谋。国民党特务分子张春桥为这个假报告修改定稿，把上海机械学院诬蔑为教育战线上的一个所谓“黑线专政的典型。”这篇假报告捕风捉影地编造了许多歪曲历史、混淆是非的假材料，诬陷学院的领导无一不是“走资派”，广大教师都是“资产阶级知识分子和资产阶级学术权威”，对工农学生实行了“资产阶级专政”，等等。"},{"type":"paragraph","text":"这篇所谓调查报告发表后，上海机械学院百分之九十的干部和百分之七十的教师遭到不同程度的打击和迫害。学校的教学和科研工作一度陷于瘫痪。"},{"type":"paragraph","text":"粉碎“四人帮”后，上海机械学院党委拨乱反正，去年八月召开全院师生员工大会，公布了关于这篇假报告的清查过程和事实真相，为所有的受害者昭雪平反，恢复名誉。这样，广大教师和干部心情舒畅，干劲倍增。全院各种类型的学术报告会、专题讲座、科学讨论活跃了起来。过去物理教研室的教师全部被下放改行，实验室长期无人管理，仪器设备遭到损坏。现在教师已逐步归队，实验室得到重建，配备了一些新的仪器设备，关闭多年的实验室面貌焕然一新。一度受到削弱的基础理论课得到了加强，不仅增加了课时，学院还特别安排了一些有经验的老师担任基础理论课的教学。今年这所学院又新开设了精密机械设计和制造、工业电子自动化等五个新专业，许多教师主动要求到这些新专业承担教学和科研任务。"},{"type":"paragraph","text":"目前，在文化大革命前担任过教学领导工作的教师基本上都已恢复了职务，有十三名确有专长的教师参加了院、系教学和科研的领导工作。去年，经过广大教师的努力，全院完成了二十四个科研项目，其中有六个项目填补了国内空白，有的还达到了国际先进水平。最近，热工流体教研室、外语教研室和电子计算机室等五个先进单位和七十五名先进工作者得到学院的奖励。受到奖励的教师戴上大红花，他们说:“一定要为实现四个现代化多作贡献。”"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"教育革命","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6af28ef905"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
