<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"开展依法说理斗争，保证运动健全发展！","authors":["《川南日报》社论"],"dates":[{"year":1950,"month":11,"day":26}],"is_range_date":false,"parts":[{"text":"开展依法说理斗争，保证运动健全发展！","type":"title"},{"text":"《川南日报》社论","type":"authors"},{"text":"经过了一个时期思想酝酿、组织准备；大部分县的基点实验已初步结束；某些地区的清匪反霸减租退押，已进入实际行动——开展依法说理斗争的阶段了。在斗争中，凡是经过一定的思想发动（即有思想启发与酝酿），与组织准备的，即能充分的向地主展开依法说理的斗争（主要是充分依法说理，拿出了人证物证），粉碎了反动地主的无耻狡赖，争取了广大人民的同情，并提高了农民的阶级觉悟，这是成功的斗争。但有些斗争由于准备不够，酝酿不足，特别在某些领导上对开展依法说理斗争的认识了解不够明确；或者犯了“急性病”，急于求成，因此，斗争会虽然开过了，租也减了、押也退了，但地主阶级统治威风没有彻底打下去，群众的阶级觉悟没有广泛的提高，这是不够成熟的斗争。","type":"paragraph"},{"text":"根据本区几个实验乡的初步经验与外区的经验，我们认为有明确指出：开展依法、说理斗争，进一步的发动群众，政治上打垮地主阶级统治，经济上削弱封建阶级，保证减租退押清匪反霸健全发展，取得彻底胜利的必要。","type":"paragraph"},{"text":"为什么要强调开展依法、说理斗争呢？","type":"paragraph"},{"text":"首先，依法、说理斗争可以进一步的提高农民的阶级觉悟，充分的发动群众。因为依法说理斗争，就是农民运用斗争会作为政治讲台，控诉地主阶级反动统治的罪恶，这种揭发一方面可以教育受苦最深的群众，激发他的阶级仇恨，而且可以教育受苦较浅群众认识地主阶级的反动本质。在斗争过程中，少数反动顽固地主，一定要蛮横狡赖，曲解事实，强词夺理以掩盖其反动罪恶，这样可以激起农民更深的阶级仇恨，使农民进一步认识地主的反动本质。可以打破农民与地主旧的情面，进一步从思想上，行动上划清界限！","type":"paragraph"},{"text":"其次，依法说理斗争，可以争取社会上更多人的同情。除身受地主阶级统治的农民外，社会上其他阶层，对地主阶级的反动罪恶——杀人、奸淫、重租、重押、逼死人命，勾结土匪特务杀害人民，破坏农业生产力的发展，阻碍国家工业化等多不了解，或了解得不完全。依法说理斗争开展得越广泛、越深入，可以把地主阶级反动罪恶完全暴露于广大人民面前，可以使工人，学生，知识分子，工商界等明确认识地主的罪恶，可以更广泛的争取他们同情支援。反之，如果依法说理不充分，必然失掉应有的同情，甚至引起一些不必要的误解，对农民不利。","type":"paragraph"},{"text":"第三、充分运用依法说理斗争，可以更有力的分化瓦解敌人。对恶霸地主、不法地主，经过依法说理、斗争结合人民法庭，予以严厉制裁，合理合法，可以使一般地主特别是守法地主和过去曾帮助恶霸地主作过坏事的人去掉不必要的恐慌，可以争取地主阶级的狗腿子向人民靠拢。相反乱打乱杀，就会造成不必要的恐慌，扩大打击面，增加阻力，于地主有利，于农民不利。","type":"paragraph"},{"text":"第四、开展依法说理斗争，就是农民正义的反封建的立场观点，反对地主阶级反动统治立场观点的斗争。地主的反动的立场观点，有几千年的历史，形成了一个反动的体系，不充分的依法说理，地主的反动思想体系不能打垮，反动的思想影响不能肃清。充分的依法说理，可以打垮地主反动思想体系，在群众中可以肃清反动的思想影响，可以树立农民新的政治观点。迫使地主阶级在政治上、思想上更加孤立。当然企图一次说理就完全粉碎地主阶级特别是少数顽固地主的反动立场观点是不可能的，这要较长期的斗争。","type":"paragraph"},{"text":"第五、开展依法说理斗争，结合人民法庭的制裁可以避免乱打、乱捕现象，保证运动健全发展。应当使农民认识：过去反动统治者以乱打乱杀乱捕对付我们，因为真理不在反动者方面，我们今天有了自己的政府（人民政府），有了自己的武装（人民解放军、人民武装自卫队），有了自己的法治机关（人民法庭、人民法院、公安局），有法令、政策作根据（减租条例、退押细则），有了社会上广泛的同情，可以运用这些来分别对待他们。","type":"paragraph"},{"text":"第六、开展依法说理斗争，才可以充分发动群众，不至于造成少数积极分子和先进群众的单独行动。因为依法说理斗争要靠广大群众的思想发动，要群众自觉起来向地主阶级进行斗争，少数人无法包办。包办了也不能取得胜利，还要重新发动群众。所以实行合法合理斗争又是克服干部包办代替与少数积极分子脱离群众打冲锋的良好办法。克服某些酝酿准备不成熟即冒险战斗的良好办法。","type":"paragraph"},{"text":"根据以上分析、认识，可以肯定：运用依法说理的新的斗争方式，是基本的斗争形式，而不是任何其他形式，也是重大的政策问题，而不是技术问题。必须反复的打通干部思想，认识依法说理斗争的重要性，并反复的教育积极分子与广大群众，把依法说理斗争，贯彻到实际行动中去！","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d3b4c22cb2"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
