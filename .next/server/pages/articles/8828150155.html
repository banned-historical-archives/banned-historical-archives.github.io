script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"抗议垄断资本的残酷剥削　要求增加工资  英三十万铁路工人举行怠工斗争","authors":[],"dates":[{"year":1972,"month":4,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"抗议垄断资本的残酷剥削　要求增加工资"},{"type":"paragraph","text":"英三十万铁路工人举行怠工斗争"},{"type":"paragraph","text":"二十多万机械工人怠工斗争和静坐示威使许多工厂生产陷于停顿"},{"type":"paragraph","text":"据新华社伦敦一九七二年四月十七日电　英国各地近三十万铁路工人四月十七日凌晨起举行全国规模的怠工斗争，抗议垄断资本的残酷剥削，要求增加工资。铁路工人的怠工斗争使英国全国铁路运输陷于一片混乱之中。"},{"type":"paragraph","text":"这次斗争是一周前英格兰南部和东部地区铁路工人的怠工斗争的继续发展。英国铁路部门的工资水平一直低于其他重要工业部门，甚至低于煤矿工人的已经很低的工资水平。铁路工人为了争取生存权利曾经不断开展斗争。在怠工斗争发动之前几天里，英国内阁多次召开紧急会议，企图制止铁路工人斗争，没有得逞。"},{"type":"paragraph","text":"目前，英国全国各地的铁路客运和货运一片混乱。大批车次被迫取消运行，很多线路和车站被迫关闭。一些继续运行的列车也无法正点到站。在英格兰南部地区，十七日早上进入伦敦的车次由平时的五百三十五次减少到一百四十七次，在上午十点钟以后，则完全停止了运行。这个地区十七日有五十六个车站被迫关闭。在英格兰东部地区，十七日早上进入伦敦的车次从平时的一百六十二次减少到三十一次。英格兰中部和西部地区以及苏格兰和威尔士的列车运行情况也很混乱。"},{"type":"paragraph","text":"全国铁路工人的怠工斗争，使英国当局十分不安。目前，当局正在加紧向有关工会施加压力。"},{"type":"paragraph","text":"据新华社伦敦电　英国曼彻斯特地区，自三月下旬开始的二十多万机械工人的怠工斗争正在继续发展。举行静坐示威和占领工厂的工人越来越多。到目前为止，在这个地区参加静坐示威的工人已由原来的一千多人增加到两万人；被工人们一度占领的工厂由原来的三家增加到二十二家。许多工厂的生产由于工人的斗争而陷于停顿。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8828150155"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
