script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"意大利劳动人民奋起反剥削  佛罗伦萨、米兰等地工人纷纷罢工和示威","authors":[],"dates":[{"year":1969,"month":8,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"意大利劳动人民奋起反剥削"},{"type":"paragraph","text":"佛罗伦萨、米兰等地工人纷纷罢工和示威"},{"type":"paragraph","text":"新华社二十七日讯  罗马消息：意大利劳动人民连日来纷纷举行罢工和示威游行，反对垄断资本的残酷剥削。"},{"type":"paragraph","text":"在佛罗伦萨，意大利最大的汽车垄断企业“菲亚特”汽车公司的一个工厂的工人，在二十五日举行罢工，要求提高工资和保障工人的权利。"},{"type":"paragraph","text":"在意大利的第二大城米兰，“皮雷利”橡胶托拉斯的工人，在二十六日开始举行罢工，要求提高工资和福利。"},{"type":"paragraph","text":"在巴马市，各行各业的工人和市民在二十六日走上街头，联合举行示威，反对资本家无理关闭当地一个工厂，并抗议反动当局出动警察镇压占领这个工厂的工人。"},{"type":"paragraph","text":"在斯培西亚，冶金工人也举行了罢工，要求提高工资和改善劳动条件。"},{"type":"paragraph","text":"当地反动当局对参加群众示威的五个工人进行迫害的行径激起了斯培西亚工人的愤怒和抗议。"},{"type":"paragraph","text":"在艾米利亚—罗马尼阿区，甜菜种植者拒绝向糖厂供应甜菜的斗争已坚持了九天，使得这个地区的二十三个制糖厂的生产完全陷于瘫痪状态。他们采取这一行动是为了抗议制糖厂老板对他们进行残酷剥削。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c507af5cb5"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
