script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"国庆之夜在天安门城楼上  毛主席会见各国贵宾  他对叙利亚新闻代表团团长说：全世界人民都支持你们反对帝国主义的侵略阴谋","authors":[],"dates":[{"year":1957,"month":10,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"国庆之夜在天安门城楼上"},{"type":"paragraph","text":"毛主席会见各国贵宾"},{"type":"paragraph","text":"他对叙利亚新闻代表团团长说：全世界人民都支持你们反对帝国主义的侵略阴谋"},{"type":"paragraph","text":"新华社1日讯  毛泽东主席、朱德副主席、刘少奇委员长和周恩来总理今晚在天安门城楼同各国的贵宾们，观看了焰火和天安门广场上的群众大联欢。"},{"type":"paragraph","text":"今晚，在天安门城楼上同天安门广场一样地欢乐、热闹。在城楼的两侧有盛大的舞会和精采的艺术表演。来自各国的客人们同我国的领导人一起欢度了这难忘的夜晚。"},{"type":"paragraph","text":"在这狂欢之夜开始的时候，毛主席、朱副主席、刘委员长、周总理同卡达尔总理，于哥夫主席，哈达博士，阿里斯托夫团长，费林格主席，斯坦鲍利奇主席，吴敏登首席法官，以及柬埔寨帕花·黛维公主和夏卡朋王子等并排而坐，观看了变幻多采的焰火。"},{"type":"paragraph","text":"在天安门城楼上，毛主席、朱副主席、刘委员长和周总理，还分别会见了各国代表团的负责人和著名人士及各国驻中国的使节，同他们进行了友好的谈话。"},{"type":"paragraph","text":"毛主席同叙利亚新闻工作者代表团团长托菲克·雅兹谈话时，祝叙利亚独立、繁荣和强大，祝叙利亚人民战胜帝国主义的侵略阴谋。毛主席说：“全世界人民都支持你们，支持你们反对帝国主义的侵略阴谋。人们高兴地看到叙利亚、埃及和沙特阿拉伯之间的团结，所有阿拉伯人民都要团结起来。”毛主席还请托菲克·雅兹转达他对叙利亚总统、总理和一切为民族独立而斗争的人们的问候。"},{"type":"paragraph","text":"叙利亚新闻工作者代表团团长对中国人民对叙利亚的支持表示感谢。他还转达了叙利亚总统对毛主席的问候。他说，希望叙利亚总统能有一天同毛主席见面。毛主席说，很可能。"},{"type":"paragraph","text":"在同埃及客人们会见的时候，毛主席请客人们转达他对纳赛尔总统的问候，并祝埃及人民好。"},{"type":"paragraph","text":"毛主席同美国青年谈了话。他说，希望中国人民和美国人民能够在和平中友好往来。"},{"type":"paragraph","text":"新西兰黑瓦德夫人把一件新西兰民族服装披肩献给了毛主席。这件民族服装是用各种羽毛编制成的。"},{"type":"paragraph","text":"当毛主席等同各国来宾会见时，城楼上洋溢着和谐、友好的气氛，各国来宾们向毛主席等转达了各国人民对中国人民友好的祝愿。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"93d6db2fb9"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
