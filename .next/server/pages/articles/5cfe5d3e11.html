" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"王力对湖北日报长江日报的指示","authors":["王力"],"dates":[{"year":1967,"month":8,"day":4}],"is_range_date":false,"parts":[{"text":"王力对湖北日报长江日报的指示","type":"title"},{"text":"王力","type":"authors"},{"text":"〖八月四日下午五点五十分，王力同志委托中央文革办事组张根成同志，王道明同志和中央文革宣传组韩玉贤同志，亲切探望来京的湖北日报、长江日报和湖北、武汉人民广播电台；武汉电视台的无产阶级革命派代表，转达了王力同志的亲切问候，并转达了王力同志的五点重要指示。〗","type":"appellation"},{"text":"一、第一位的任务，是无产阶级革命派内部的团结，三钢、三新一定要团结，大敌当前，毛主席这样关心，革命派没有任何理由搞分裂。从思想上、政治上、组织上都要搞联合，要搞团结。这个问题是决定武汉文化大革命走上正规的关键。三钢对三新，三新对三钢，都要互相看长处，多做自我批评。办报一定要牢牢掌握这个问题。","type":"paragraph"},{"text":"二、武汉革命派联合起来，把武汉各工厂、学校抓革命、促生产搞好。把革命、生产两付重担同时挑起来。","type":"paragraph"},{"text":"三、拥军爱民。这个时候比任何时候都要拥军爱民。军区改编了，独立师调走了，这是毛主席采取的一个根本措施，这是对武汉人民最大的关怀。武汉军区作了检讨，这个时候造反派应当把拥军爱民的旗帜高高举起来。对待武汉军区，应该欢迎他们检讨，主动向他们介绍造反派内部情况。拥军爱民的口号应作为武汉地区正确处理军民关系的一个标志。","type":"paragraph"},{"text":"四、对百万雄师、公检法及犯了错误的干部要正确处理，正确对待，不能打击、报复，不能提刺激性口号。他们大多数是好人，是阶级兄弟，不能歧视他们，把仇恨集中到党内、军内一小撮走资本主义道路当权派身上。一定要团结的方针、教育的方针，政治工作的方针，这样做，无产阶级革命派的队伍才能扩大，对站过来的同志要欢迎。","type":"paragraph"},{"text":"五、警惕坏人。对个别坏人要注意，不许他们破坏社会秩序。对个别坏人要同广大群众区别开来，对个别坏人，也要少抓人。要抓最好通过他们（保守组织）自己觉悟起来抓。要少抓人，主要是政治攻势。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"王力","type":"人物"},{"name":"中央文革","type":"人物"},{"name":"武汉地区无产阶级革命派百万雄师联络站（百万雄师）","type":"人物"},{"name":"湖北文革","type":"人物"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5cfe5d3e11"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
