" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"杜汝楫在学院工会第四次代表大会上的发言","authors":["北京政法学院","杜汝楫"],"dates":[{"year":1957,"month":5}],"is_range_date":false,"parts":[{"text":"杜汝楫在学院工会第四次代表大会上的发言","type":"title"},{"text":"北京政法学院杜汝楫","type":"authors"},{"text":"[杜汝楫：北京政法学院教授]","type":"subtitle"},{"text":"工会的地位问题：过去的工会是在党委会少数人把持下的傀儡，其原因除去由于工会的方针任务不明确外，还与宗派主义的存在分不开。如第二届选举，大家反对高柳城，可是候选人名单中还是有高柳城，在会外有罗典荣，林道濂和我都向党委会反映过，可是党委会答复说，为了安置高柳城必须叫他当主席，我向刘院长反映，他不管。名单是由以王润为首的宗派主义者确定的，党委会又叫代表小组再讨论高柳城是否能当委员，又被代表打回去了。于是党委会即停止工会选举，肃反以后才又选举，并散布谣言说工会选举有政治问题。","type":"paragraph"},{"text":"工会未替会员谋福利：如评级和困难补助有贪污，据赵德洁同志说每次评议都是先有名单，有时钱已补助出去才叫赵德洁签名，为了收买赵德洁，硬给他40元，赵德洁用此款买了公债。","type":"paragraph"},{"text":"会员的去留、加班、加点、工会从来不出来说话，如开除曹振东处理的太残忍，全家都没饭吃，在他爱人生产时，家中一粒米全没有，后来他找到工作，叫我院开证明，我院都不给开。校医室星期日值班，应当补一天假，我向工会反映过，但工会不管，工会对工友的生活不关心，有等级观念。此外工会不但不关心群众，反而遭受党委会的干涉，如刘圣恩给黑板报写了一篇稿子遭到王润的打击，叫刘检讨。听说以后凡是黑板报的稿件都要经党委会审查。从工会专职干部的配备上也可说明工会起不了作用。","type":"paragraph"},{"text":"几点建议：","type":"paragraph"},{"text":"1、应明确工会的地位和作用，应监督行政和党的工作，如去年干部考大学时遭到干涉，工会应替会员说话，这不是反对党的领导。","type":"paragraph"},{"text":"2、工会脱产干部应由工会聘任。","type":"paragraph"},{"text":"3、工会应保障会员合法权利。","type":"paragraph"},{"text":"4、检查第二届工会选举的错误。","type":"paragraph"},{"text":"5、调整人事、降级、决定官太太的去留。","type":"paragraph"},{"text":"6、检查经费使用问题。","type":"paragraph"},{"text":"7、检查肃反工作。","type":"paragraph"},{"text":"8、关心工友生活。","type":"paragraph"},{"text":"9、要选举敢说话的正直人作基层委员，最好用直接选举。如以上问题不能解决，我们小组退出工会，在外边举行斗争。","type":"paragraph"},{"text":" 来源：《北京政法学院右派分子言行汇编》(第3部分)(北京政法学院，1957年10月)。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fe20fcc21d"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
