" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji21","name":"毛泽东全集第21卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji21.pdf"],"article":{"title":"迅速弃灭聊城等处伪军","alias":"","parts":[{"type":"paragraph","text":"迅速歼灭聊城等处伪军！"},{"type":"paragraph","text":"（1946年6月15日）陈、舒，刘、邓、薄："},{"type":"paragraph","text":"聊城伪军三千及高唐、博平、禹城间伪军万余必须迅速肃清。除晋冀鲁豫出兵一万五千外，望陈舒令渤海出兵一万以上，迅速出动，归刘邓薄统一指挥，消灭该匪，以除后患，而利尔后之作战。望刘邓薄立即任命此战役的统一指挥机关，进行各项准备，争取于本月底下月初消灭该匪。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"已删"},{"type":"paragraph","text":"[1]1946年6月中旬，晋冀鲁豫军区拟发起聊（城）高（唐）禹（城)战役，建议渤海军区出兵1万予以配合。这是毛泽东为中共中央军委起草的给新四军军长兼山东军区司令员陈毅、政治部主任舒同和晋冀鲁豫军区司令员刘伯承、政治委员邓小平、第一副政治委员薄一波的电报。"}],"authors":["毛泽东"],"dates":[{"year":1946,"month":6,"day":15}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":388,"page_end":388},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1e77ec596a"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
