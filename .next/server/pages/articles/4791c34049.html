<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"稳定经济 安定人民生活 保证四化建设顺利进行  国务院通知各地严格控制物价整顿议价  连续组织几次物价大检查，动员广大群众对违反本通知的行为进行揭发检举","authors":[],"dates":[{"year":1980,"month":12,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"稳定经济 安定人民生活 保证四化建设顺利进行"},{"type":"paragraph","text":"国务院通知各地严格控制物价整顿议价"},{"type":"paragraph","text":"连续组织几次物价大检查，动员广大群众对违反本通知的行为进行揭发检举"},{"type":"paragraph","text":"新华社北京12月7日电  国务院于1980年12月7日向各省、市、自治区人民政府和国务院各部委、各直属机构发出《关于严格控制物价、整顿议价的通知》。通知全文如下："},{"type":"paragraph","text":"最近一段时期，市场上随意提价、变相涨价、哄抬议价的情况比较严重，引起广大群众的不满。为了进一步贯彻执行今年4月中共中央、国务院《关于加强物价管理，坚决制止乱涨价和变相涨价的通知》精神，稳定经济，安定人民生活，保证社会主义建设的顺利进行，特作如下通知："},{"type":"paragraph","text":"一、从本通知公布之日起，凡由国家规定牌价的工农业商品，在全国各地的零售价格，一律执行国家的规定，不得提高。12月1日以前按照物价管理权限规定有关部门已发调价通知的，按原通知继续调整。"},{"type":"paragraph","text":"二、各种议价商品，在全国各大城市、中等城市、小城市、工矿区、县城和县以下城镇的零售价格，一律按1980年12月7日的价格出售，只能降低、不许提高。"},{"type":"paragraph","text":"三、以上两条规定，适用于一切国营商业，合作商业，社队企业，农工商联合企业，信托公司，贸易货栈，国营或集体经营的自销门市部，展销会，试销专柜，城市生产服务合作社，军人服务部和代销点等全民的、集体的销售单位，以及经销国家商品的个体户。以上这些单位和个人都必须严格执行本规定，不得违反。"},{"type":"paragraph","text":"四、议购议销必须按照国务院规定的原则和各省、市、自治区人民政府规定的品种范围执行。"},{"type":"paragraph","text":"国家计划调拨的生产资料，包括超产部分和自销部分，必须执行国家定价，不准议价。按照国家规定允许价格向下浮动的，可以向下浮动。"},{"type":"paragraph","text":"一、二类日用工业品不准搞议价。三类工业品由工商企业协商定价，品种范围要严格控制。"},{"type":"paragraph","text":"一、二类农副产品，在完成国家收购任务以前，不许议价成交，上集市出售，也不许把集体产品分给个人出售。到三类农副产品集中产区进行采购的单位，要向当地工商行政管理部门进行登记，服从统一管理，统一分配货源，不准互相哄抬价格。议价收购商品的最高限价，由省、市、自治区人民政府规定，并布告周知。"},{"type":"paragraph","text":"五、鲜活商品（如蔬菜、蛋、鱼、水果等）应当有一定的季节差价。在实行本通知时，凡是已经规定了季节差价的，仍然应当根据不同季节进行调整。国家有统一规定的，按国家的统一规定执行；国家没有统一规定的，由省、市、自治区人民政府加以规定，并布告周知。"},{"type":"paragraph","text":"六、一切机关、团体、部队、事业单位，不准从事倒手转卖从中渔利的活动。"},{"type":"paragraph","text":"七、各级税务机关必须严格照章收税，对欠交税款的，必须立即追交。"},{"type":"paragraph","text":"各级人民银行要加强信贷管理和现金管理，控制货币投放。对购销活动要进行监督。发现违反本通知规定的，要在信贷、结算、支付上加以限制。"},{"type":"paragraph","text":"八、铁道、交通部门必须严格执行旅客携带行李的限额，不得超过。"},{"type":"paragraph","text":"九、集市贸易是社会主义商业的补充，要按照国家的政策，加强管理，做好工作，继续搞活，发挥它的积极作用。"},{"type":"paragraph","text":"十、各级人民政府在本通知发布后，要连续组织几次物价大检查，并动员广大人民群众对违反本通知的行为进行揭发检举。对于确实违反本通知的单位，可以采取罚款、停发奖金、扣发应当负责的人员工资、给予行政处分等措施。情节严重的，工商行政部门可以勒令停业，并向司法部门提出控告。物价大检查，以后应定期进行，不得放松。"},{"type":"paragraph","text":"要加强对一切生产单位和从事购销活动的部门的思想政治工作，使他们认识到目前随意提价、变相涨价、哄抬议价的严重危害性。教育干部和职工顾全大局，遵守纪律，全心全意为人民服务，反对只考虑本单位、本地区的局部利益，自行其是。严禁用抬高物价的办法增发奖金等违法乱纪行为。所有的企业，都要努力搞好生产，增加商品供应，认真地、切实地为稳定经济、稳定物价、安定人民生活作出应有的贡献。"},{"type":"paragraph","text":"各级政府接到本通知后，应立即组织有关部门进行讨论，采取具体措施，认真贯彻执行。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4791c34049"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
