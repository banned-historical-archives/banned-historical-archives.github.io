<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"清华大学师生员工万人集会批判黄万里","authors":[],"dates":[{"year":1957,"month":6,"day":28}],"is_range_date":false,"parts":[{"text":"清华大学师生员工万人集会批判黄万里","type":"title"},{"text":"《人民日报》讯：清华大学学生会和工会在２８日召开了批判反动小说“花丛小语”的作者、水利系教授黄万里反动言论的全校师生员工大会。虽然天气酷热，温度达到了华氏九十五度，可是大礼堂、教室内、草坪上还是挤满了感情激愤的师生员工一万多人。会上教授、学生、校工严正地驳斥了黄万里的反动小说“花丛小语”和他反对社会主义、反对共产党的领导的言论。","type":"paragraph"},{"text":"黄万里说，“花丛小语”中谈到的因马路翻浆骂政府忘八蛋是由于自己脑中存在着崇美思想，羡慕美国政治制度的表面上的民主。他承认创造了“歌德——但丁派”的名词是对积极分子的打击，起了坏作用。小说中对某些积极分子作的不符合实际的讽刺是丑化了党群的关系，他愿意向这些同志道歉。最后，他说：“产生这些问题的原因是社会主义发展快，自己平日对政治不太注意，跟不上社会的发展。”","type":"paragraph"},{"text":"黄万里发言后，紧接着发言的是水利系讲师张仁，他指出了黄万里虽然承认了他写的小说产生了不好的影响，但是对他站在什么立场写这篇小说？他写这篇小说的动机是什么都没有彻底检查。他指出黄万里在帮助党整风中自认是“积极”的，但他“积极”的是些什么？黄万里曾说过，共产党是有缺点的，对付这种缺点只有两种办法：打倒它和改正它。共产党太强大了，打倒它不可能，只能改正它。这说明黄万里实际上是企图假借整风之名而行其取消共产党的领导之实。","type":"paragraph"},{"text":"机械制造系教授王遵明指出，黄万里小说“花丛小语”实质上是将党和政府的个别缺点夸大成全面；是反对党的领导和社会主义的制度，歌颂了美国资产阶级的一套“民主”。他说：“黄万里的这篇小说实际上是与章伯钧、罗隆基等反社会主义言论起了配合作用。我们国家钢的产量单去年一年便增加了一百六十一万吨；现在大学生的人数约为十年前的四倍，同学的健康和伙食较解放前都大有改善，对这些事实黄先生为什么却只字不提。","type":"paragraph"},{"text":"动力机械系的老工人李永禄和学生王振海对黄万里所说的“十分之九以上的人被当作阿斗，十分之一以下的人的脑袋被认为是灵的，百应起主宰的作用”的恶毒言论作了有力的驳斥。有三十三年工龄的李永禄说，在１９５２年我被选为人民代表时，在区人民代表会议上，我看到代表们提出了一千六百多件提案，在会上经过讨论，将提案分成能办、可办可不办、目前不能办三类，能办的督促政府做了，不能办的也向选民解释清楚。难道这样多的人都是受人主宰的阿斗吗？学生王振海说，黄先生认为我们都是阿斗，解放前象我这样只能穿上一条破裤叉的穷小子、土包子，今天成了大学生，能站在讲台上和堂堂的大学教授争论，这便是当家作主，不是任人支配的阿斗。","type":"paragraph"},{"text":"水利系教授李丕济揭露了“花丛小语”中讽刺章某原来有一套治理黄河的意见，等三门峡计划一出便放弃己见，并且附和着说“圣人出而黄河清”，根本是歪曲事实，章某即指的是水利部张含英副部长，他早在１９４９年便写文章论述了治黄的意见，今天的三门峡计划大致上是与他原来意见相同的。黄万里完全是有意地颠倒是非。","type":"paragraph"},{"text":"在大会的进行期间，不断地有人递条子给主席，要黄万里讲清楚写“花丛小语”的动机，交代小说的背景和小说中的人物代表谁？还有部分学生因时间不够不能上台发言，他们都向主席交了他们的书面发言。","type":"paragraph"},{"text":" ——原载《人民日报》1957年6月30日，原标题为“师生员工万人集会，清华大学批判黄万里”","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3af3ff2844"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
