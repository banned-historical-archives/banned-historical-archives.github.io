<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"上海逮捕一位公方副經理引起軒然大波","authors":["新华社記者","賀昌华"],"dates":[{"year":1957,"month":5,"day":23}],"is_range_date":false,"parts":[{"text":"上海逮捕一位公方副经理引起轩然大波","type":"title"},{"text":"新华社記者賀昌华","type":"authors"},{"text":"新华社上海23日讯  上海报纸23日公布了四明堂药酒局公方副经理蒋业伟因刀伤私方经理陈济而被政府逮捕的消息，上海许多共产党员、青年团员和职工同情蒋业件，对逮捕极为不满。今天，他们的情绪十分动荡，有些人表示要采取请愿和游行方式，来要求政府释放蒋业伟。","type":"paragraph"},{"text":"“四明堂事件”的简单经过情形是这样的:四明堂药酒局私方经理陈济一向对社会主义改造、总路綫不满，说怪话，私藏枪支，幷曾将大批贵重药材不入账。公方副经理蒋业律原是陈济的学徒，后为职工，曾检举陈济以上违法行为，双方积怨已深。今年3月11日,蒋业伟见陈济气势凶凶，怕陈行凶，偷偷走出后门到派出所去报告。囘来后，陈济质问:“到什么地方去?为什么走后门?”陈济幷一面用右手探入怀中。蒋业伟以为陈要行凶，忙抓住陈的右手，不料陈伸出左手，把蒋的眼镜打落在地，随卽拉住蒋的胸口衣服。蒋怕遭到不幸，忙把身边藏的刀子抽出。旁边另一职工见状赶紧上前拖住蒋业伟。三人在挣扎中，公方经理蒋业伟手中的刀子划破了私方经理陈的手腕，长约三寸多。(到底算“自卫”或“持刀行凶”，现在还未作结论。”","type":"paragraph"},{"text":"事件发生以后，有关部门作过调查，幷把这件事当作一般公私共事问题，交给了黄浦区(四明堂所在的区，是上海的中心商业区)药材区店处理，但拖了两个多月未解决。","type":"paragraph"},{"text":"上海市副市长、大资本家荣毅仁，在5月17日的中共上海市委宣传工作会议上，发言质问四明堂事件为什么一直没有处理，说这是一个法纪问题，应该发扬民主按法办事。上海的资本家对荣毅仁的发言很满意; 职工却对荣的发言很不满，说:“你荣毅仁站在副市长的立场讲话?还是站在资本家的立场讲话?”据说，上海曾有资本家写信给中央(又据说是民主建国会搞的)说“共产党不逮捕蒋业伟，没有法制，包庇党员”。","type":"paragraph"},{"text":"中共上海市委决定逮捕公方副经理蒋业伟，打算从被动转为主动。不逮捕，资本家会吵得更凶。22日下午五时许，公安局黄浦分局就逮捕了蒋业伟。","type":"paragraph"},{"text":"22日晚上，黄浦区药材业的六十多个共产党员得知蒋业伟被捕事后，举行支部大会。会上情绪激昂，有的党员当场流泪，有的党员气愤地用茶杯击桌子。支部大会提出: 要求立卽释放蒋业伟; 要求召开全业职工代表大会讨论谁是谁非，应该不应该逮捕; 不然的话，他们就组织本区全业职工游行。党支部书记和区店公方经理在会上很孤立，无法讲话;他们两人思想上对逮捕也不通，只是受到组织性的约束，不好在全体党员面前表示出来。中共黄浦区委有两位部长赶去参加支部大会，一直说服到22日晚八时半。最后的结果是:党员们从组织性、纪律性上服从，表示不闹、不游行，但思想上还是不通。","type":"paragraph"},{"text":"22日下午逮捕蒋业伟时，两位执行逮捕任务的公安人员思想也不通，因而给蒋业伟上的手铐也铐得很松。在场的黄浦区药材业工会负责人(党员)，当场十分不满地掼了茶杯。四明堂所在的公安派出所所长思想也不通，有两位户籍警还流了眼泪。在逮捕以前，黄浦区公安分局有的干部就表示:“要逮捕，我们马上就到市委去告状。”","type":"paragraph"},{"text":"审讯人员对蒋业伟审讯完毕后，从口袋里掏出了三角五分钱特地买了一碗面请蒋业伟吃。黄浦区检察院起诉组有的干部表示:“假使蒋业伟开庭，我去替蒋业伟辩护。”","type":"paragraph"},{"text":"记者23日下午在黄浦区人民委员会商业科了解情况时，这个科有三十个干部正在集体签名，写信给报馆，支持蒋业伟。其中有十六人是党员，四个团员。","type":"paragraph"},{"text":"四明堂的职工说:“蒋业伟是这次‘鸣’、‘放’中的牺牲品!”幷说:“蒋业伟打老虎(指私方)未打着，反而被老虎咬了。这下资本家的尾巴更要翘了。”“蒋业伟对企业负责出了毛病。”黄浦区药材业的干部和一部分群众反映:“荣毅仁一‘鸣’，就把蒋伟业逮捕，是不是因为荣毅仁是副市长;资本家‘鸣’，我们工人阶级也要‘鸣’，把蒋业伟‘鸣’出来。”幷认为:“逮捕蒋业伟是政府迁就了少数人(指资本家)，激怒了多数人。”这个区其他商业行业的干部们也普遍认为:“这次，蒋业伟作了‘鸣’、‘放’中的牺牲品，这样做满足了少数人，我们多数人要大民主!”","type":"paragraph"},{"text":"23日上午，这个区的其他行业和服装、棉布、钟表、仪器文具等业的一部分干部，以及药材业的团总支委员，都表示要请愿，支持蒋业伟。23日一早，黄浦区药材业的公方代表、工会干部、团的干部和一般职工等共几十人，先后分五批到黄浦区药材业土会去询问为什么要逮捕蒋业伟。","type":"paragraph"},{"text":"黄浦区五金商业的团总支书记带了六个职工到区检察院去质问。","type":"paragraph"},{"text":"上海的某些资本家对政府逮捕蒋业伟很高兴。黄浦区一个药材店的资本家对本店职工说:“逮捕蒋业伟有什么奇怪，过去你们(指共产党)包庇了蒋业伟，现在人家(指荣毅仁)‘鸣’起来了，政府不得不逮捕。”黄浦区的一些资本家还曾经写信去慰问受伤的四明堂私方经理陈济。","type":"paragraph"},{"text":"如何处理这件事，还待中共上海市委研究。从22日晚上起，黄浦区的中共区委、人民委员会、团委、工会等已派出许多干部下到基层去听取干部和群众的意见，尽量说服他们不要请愿游行。","type":"paragraph"},{"text":"来源：新华通讯社编：《内部参攷》第2214期, 一九五七年五月二十七日。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2ca0ffe1d8"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
