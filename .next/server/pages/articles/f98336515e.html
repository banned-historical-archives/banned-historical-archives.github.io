script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反迫害反剥削　打倒独裁政权  拉美工人农民学生不断展开斗争","authors":[],"dates":[{"year":1968,"month":8,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反迫害反剥削　打倒独裁政权"},{"type":"paragraph","text":"拉美工人农民学生不断展开斗争"},{"type":"paragraph","text":"新华社二十九日讯拉丁美洲一些国家的工人、农民和学生不断展开斗争，抗议本国统治集团对他们的政治迫害和经济压榨。"},{"type":"paragraph","text":"智利康塞普西翁城帕诺斯·德托梅纺织厂的一百名工人二十七日占领了这家工厂，要求增加工资。这个工厂的工人已经进行了一百多天的罢工斗争。洛斯安赫莱斯城托罗水电站的一千三百名工人也举行罢工，抗议当局拒不支付拖欠工人的工资。智利科金博省的数十名农业工人二十八日占领一个庄园，抗议庄园主企图无理解雇农业工人，同时要求增加工资。"},{"type":"paragraph","text":"巴西重要工业城市圣保罗的一千多名学生不顾反动当局禁止举行示威游行的禁令，在二十八日举行示威游行，抗议反动当局无理逮捕学生。示威者推翻了政府的两辆汽车，并且烧毁了其中的一辆。二十六日，当反动警察冲入圣保罗大学城无理搜捕学生的时候，学生们英勇地抵抗警察的搜捕，他们捉住一些警察作为人质，要求释放被捕的同学，还烧毁了一辆警车。在这以前，在尼泰罗伊、贝洛奥里藏特和萨尔瓦多等城市，都发生了学生反对军事独裁政权的示威游行和集会。学生们举着的标语牌上写着：“打倒独裁政权！”"},{"type":"paragraph","text":"“释放被捕的学生和工人！”"},{"type":"paragraph","text":"在秘鲁，库斯科省的三千多农民以及他们的家属二十六日开始举行一次到库斯科省首府的长途进军，抗议当局不关心灾民。这个地区由于遭受严重的旱灾，庄稼颗粒无收，农民生活极端贫困。进军农民沿途得到其他地区农民的支持，许多农民加入了他们的行列。"},{"type":"paragraph","text":"乌拉圭国营冷藏厂的数百名工人最近举行示威游行，抗议厂方下令关闭这家工厂。在这以前，一千五百多名冷藏业工人还曾经占领了国营冷藏厂和卡萨布兰卡冷藏厂。"},{"type":"paragraph","text":"阿根廷拉普拉塔城建筑学院的学生二十七日再次举行示威游行，抗议当局无理开除学生。"},{"type":"paragraph","text":"（附图片）"},{"type":"paragraph","text":"七月以来，墨西哥学生为反对美国殖民主义，抗议警察当局对学生的残暴镇压举行了一系列大示威。"},{"type":"paragraph","text":"新华社发"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f98336515e"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
