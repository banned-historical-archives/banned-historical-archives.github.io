" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji25","name":"毛泽东全集第25卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji25.pdf"],"article":{"title":"杨成武部须准备打退敌人多次进攻","alias":"","parts":[{"type":"paragraph","text":"杨成武部须准备打退敌人多次进攻！！"},{"type":"paragraph","text":"（1948年12月11日）杨、李，并告杨、罗、耿："},{"type":"paragraph","text":"灰二十二时电悉。（一）你们昨日又击退敌人一次进攻，甚慰。（二）你们必须准备对付敌人多数次攻进而打退之，特别是今后两星期内要注意。（三）两星期后杨罗耿攻歼三十五军，尔后即和你们集力打张垣。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"真酉"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军委起草的给华北军区第三兵团司令员杨成武和副政治委员兼政治部主任李天焕的电报。"},{"type":"paragraph","text":"[2]杨、罗、耿，指杨得志、罗瑞卿、耿飚，当时分别任华北军区第二兵团司令员、政治委员和参谋长。"},{"type":"paragraph","text":"[3]指1948年12月10日22时杨成武、李天焕关于敌新三十二师向南天门我十六旅阵地进攻被我击退的情况给中共中央军委、华北军区等的电报。"}],"authors":["毛泽东"],"dates":[{"year":1948,"month":12,"day":11}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":376,"page_end":376},"tags":[{"name":"杨成武","type":"人物"},{"name":"李天焕","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"df27b86bcb"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
