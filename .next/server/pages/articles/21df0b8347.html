<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"发掘出大面积夯土台基和成堆奴隶头骨","authors":[],"dates":[{"year":1974,"month":8,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"河南省文物工作者在郑州商代城墙遗址内"},{"type":"paragraph","text":"发掘出大面积夯土台基和成堆奴隶头骨"},{"type":"paragraph","text":"发掘出来的成堆头骨，是商代奴隶主残酷压迫和杀害奴隶的罪证；是继续深入批判孔老二“克己复礼”、批判林彪妄图搞复辟的有力材料"},{"type":"paragraph","text":"新华社郑州一九七四年八月十五日电　河南省文物工作者在郑州市商代城墙遗址内，发掘出大面积商代夯土台基和成堆奴隶们的头骨。最近，有关部门在发掘现场举办了“商代奴隶制罪证展览”。许多工农兵群众参观以后说，看了这些奴隶主阶级残酷压迫和杀害奴隶的罪证，进一步认清了孔老二“克己复礼”的罪恶目的。他们表示，一定要很好地利用这些活教材，继续深入批判孔老二搞“克己复礼”的罪行，继续深入揭露和批判林彪效法孔老二妄图开倒车，搞复辟的罪行，把批林批孔斗争进行到底。"},{"type":"paragraph","text":"郑州商代城墙遗址，是我国目前发现最早的一座古城，距今已有三千五百多年。这座古城周长七公里，是商代奴隶主阶级迫使成千上万的奴隶劳动者为他们兴建起来的。为了了解古城内各种遗迹、遗物的分布和埋藏情况，河南省博物馆在一九七三年夏天开始进行考古钻探和发掘工作。经过近一年的努力，在古城内东北部一带发现了大面积的商代夯土台基，这片夯土台基东西长约三百米，南北宽约一百五十米，面积为四万五千平方米。"},{"type":"paragraph","text":"从发掘的地层迭压关系和结构来看，这片夯土台基属于比安阳殷墟早的商代前期。夯土台基是用土分层夯筑起来的，在夯土面上，残存有部分房基面、柱础、柱洞等遗址，附近还出土不少玉簪、铜簪和玉铲等遗物。根据这些情况推断，这一带应是商代奴隶主阶级的居住区。这和一九五四年在郑州商代城外附近发掘出的奴隶们居住的低矮而简陋潮湿的半地下房基，形成了鲜明的对比。"},{"type":"paragraph","text":"在发掘商代夯土台基的同时，还挖掘出一条商代壕沟，壕沟内的填土中，除有大量陶器碎片和骨器、石器等遗物外，还堆埋了数量众多的人头骨，许多人头骨上还带有明显的锯痕。在仅发掘的一段长约十五米的壕沟中，就有这样的人头骨近百个。这些带有锯痕的人头骨，可能是商代奴隶主阶级将被杀害的奴隶们的头骨锯开制作器具使用的残留部分。一九五五年在郑州商代城墙外发掘出的一处商代制作骨器的作坊遗址中，就曾发现用大量奴隶们的肢骨和肋骨作为骨料，磨制成的骨箭头、骨簪、骨锥和骨匕等用具。这一发掘再次表明，在商代奴隶制社会中，奴隶主阶级对奴隶们的压迫和剥削是极其残酷的。孔老二鼓吹“克己复礼”，就是妄图复辟这样反动没落的奴隶制。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"林彪","type":"人物"},{"name":"河南文革","type":"人物"},{"name":"批林批孔","type":"主题/事件"},{"name":"批林批孔","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"21df0b8347"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
