<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"安定团结保证四化建设顺利进行  出席人大常委会第十三次会议的委员在讨论邓小平同志关于目前的形势和任务报告时一致指出，动乱只能后退，安定才能前进","authors":[],"dates":[{"year":1980,"month":2,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"安定团结保证四化建设顺利进行"},{"type":"paragraph","text":"出席人大常委会第十三次会议的委员在讨论邓小平同志关于目前的形势和任务报告时一致指出，动乱只能后退，安定才能前进"},{"type":"paragraph","text":"新华社北京二月七日电  动乱只能后退，安定才能前进。这是出席人大常委会第十三次会议的委员，在讨论邓小平同志关于目前的形势和任务的报告时一致的意见。"},{"type":"paragraph","text":"两天来，委员们在讨论中谈到安定团结对四化建设的重要意义，指出：建国以来的历史经验证明，安定团结是搞经济建设的根本保证。没有安定团结的政治局面，全国人民就不能安下心来搞建设。要保证四化建设的顺利进行，全国各族人民必须努力消除不利于安定团结的因素，坚决同一切搞动乱、破坏安定团结的人和事作斗争，维护和发展安定团结的政治局面。"},{"type":"paragraph","text":"许多委员说，我们八十年代的任务是极其繁重的。在这十年中，四个现代化建设要取得决定性的胜利；要争取台湾归回祖国、完成祖国的统一大业；要在国际事务中反对霸权主义，而最关键的一条是搞好国内建设。要搞好国内建设，就必须有一个安定团结的良好环境。一些委员结合本地区、本单位的情况说，林彪、“四人帮”猖獗的十多年间，武斗盛行，打砸抢成风，搞得干部挨批斗，群众不安宁，人们没有心思搞生产。粉碎“四人帮”后，有了安定团结的局面，所以各条战线的工作恢复和发展较快。经验证明：动乱，生产下降、人民吃苦；安定，生产发展、人民高兴。"},{"type":"paragraph","text":"一些来自农村基层的委员结合各地的情况指出，安定团结太重要了，粉碎“四人帮”后，特别是党的三中全会后进一步落实了党在农村的经济政策，中央下发了关于加快农业发展的两个文件，调动了农民的生产积极性，绝大部分地区社员收入增加，市场繁荣，广大农民心情舒畅。这虽然是靠了方针政策的对头，但没有安定团结的局面，要取得农业生产的恢复和发展是根本不可能的。"},{"type":"paragraph","text":"在讨论中委员们认为，我国已经形成了安定团结的政治局面，但是也必须看到，各地还有一些不安定的因素。我国还有反革命分子和敌特分子，还有各种刑事犯罪分子、蜕化变质分子，还有贪污盗窃、投机倒把的新剥削分子，没有改造好的旧剥削阶级的某些残余也还存在，“四人帮”组织上、思想上的某些残余更不能低估。特别是有极少数反对社会主义制度和共产党领导的所谓“民主派”，他们往往打着“民主”、“人权”之类的旗号进行捣乱和破坏活动，对这种人更不能丧失警惕。还有少数人有严重的无政府主义和极端个人主义思想，有的人还热衷于搞派性活动。委员们指出，对这些人一定要严加注意，要区别情况，分别对待。能教育的要尽力教育，能挽救的要尽力挽救；属于思想认识问题的，只要认识和改正错误，改了就好；构成犯罪的，如果能够认罪并悔过自新，可以宽大处理；对那些构成犯罪而又顽固不改的，就要坚决依照法律进行制裁，决不能手软。"},{"type":"paragraph","text":"许多委员指出，我们的法律是保护人民、维护安定团结的。对极少数反革命分子和各种破坏分子，法律措施要从严，这不但是搞好社会治安所必须的，对各种犯罪分子是个教育，而且对全国人民也是一种法制教育。第十二次常委会处理了“西单墙”问题，推动了各地类似问题的解决，消除了一些不安定的因素，各地人民拍手称快，都说这反映了人民的呼声，代表了人民的利益和要求。可见，人心思安定，人民要团结，动乱是不得人心的。在讨论中，与会委员认为，八十年代，我们的任务紧迫而繁重，一天也不能马虎，一天也不能松劲，一天也不能耽误。党政军民学，各行各业，都要十分珍惜当前安定团结的大好形势，努力消除不安定的因素，加强组织性纪律性，坚决服从党中央的统一领导，不能节外生枝，不得各行其是，真正把精力和注意力集中到现代化建设上来。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"四人帮","type":"人物"},{"name":"派性","type":"主题/事件"},{"name":"武斗","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4fc1bb6849"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
