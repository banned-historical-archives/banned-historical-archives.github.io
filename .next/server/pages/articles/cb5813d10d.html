script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"在科伦坡计划咨询委员会会议上  东南亚国家谴责西方经济剥削  许多代表强调自力更生的意义","authors":[],"dates":[{"year":1964,"month":11,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"在科伦坡计划咨询委员会会议上"},{"type":"paragraph","text":"东南亚国家谴责西方经济剥削  许多代表强调自力更生的意义"},{"type":"paragraph","text":"据新华社伦敦电　科伦坡计划咨询委员会第十六届会议二十日在伦敦闭幕。在会议期间东南亚国家谴责西方国家在这个地区的经济剥削和阻碍这个地区的经济发展。"},{"type":"paragraph","text":"会议从十一月十七日开始，参加的有二十一个成员国和地区，包括南亚和东南亚的国家以及英国、美国、日本等国的代表。柬埔寨没有派代表。"},{"type":"paragraph","text":"会议闭幕时发表的公报说，“咨询委员会回顾了这个地区在过去一年的经济发展和科伦坡计划的进展情况。”"},{"type":"paragraph","text":"印度尼西亚代表鲁克曼·哈基姆在会议上指出，十五年前制定的科伦坡计划方案和方法已经不符合这个地区新出现的情况和思想了。他说，“诸如新兴力量同旧有势力对抗这样一些新的概念，使人们有了新的认识：世界经济关系的状态，特别是世界贸易早就该作根本的变革了；必须找出新的办法来缩小发达国家和正在发展中的国家之间在出口收入方面越来越大的差距。”"},{"type":"paragraph","text":"缅甸代表拉汉上校说，东南亚的经济形势是不能令人满意的。大米、黄麻、橡胶和茶叶的出口价格被压低了。他强调指出，为了实现有保证的经济发展，“这个地区的国家必须依靠自己作出巨大的努力。”"},{"type":"paragraph","text":"菲律宾代表利布拉多·卡约尖锐地谴责西方国家的限制贸易政策和障碍，他指出：“外国市场不稳定，贸易条件的恶化，可供出口的加工产品缺乏足够的同情的国外市场，这使发展中的国家常年累月吃苦头。”他说，否则，菲律宾的三千万美元的逆差可以变成顺差。"},{"type":"paragraph","text":"许多国家的代表在会上强调在国家建设方面采取自力更生政策的重要意义。"},{"type":"paragraph","text":"科伦坡计划是一九五○年在科伦坡举行的英联邦外长会议上制订的。它的咨询委员会由二十二个成员国和地区组成。美国的资本和技术“援助”在科伦坡计划中扮演主要角色。印度和“马来西亚”是主要的受惠者。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cb5813d10d"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
