script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"射向资产阶级司令部的一颗重型炮弹","authors":["陆海空三军驻京部队无产阶级革命派文体战士联合演出委员会"],"dates":[{"year":1967,"month":9,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"射向资产阶级司令部的一颗重型炮弹"},{"type":"paragraph","text":"陆海空三军驻京部队无产阶级革命派文体战士联合演出委员会"},{"type":"paragraph","text":"正当两个阶级、两条道路、两条路线大决战的关键时刻，发表了姚文元同志《评陶铸的两本书》一文。这篇文章，是射向资产阶级司令部的又一颗重型炮弹，狠狠地打中了中国赫鲁晓夫和反革命两面派陶铸的要害。真是大快人心！"},{"type":"paragraph","text":"这篇文章，是以毛主席为首的无产阶级司令部向全国无产阶级革命派发出的新的动员令，动员起亿万革命群众紧紧掌握革命斗争的大方向，打一场彻底批判中国赫鲁晓夫及其一伙的“人民战争”。"},{"type":"paragraph","text":"毛主席教导我们：“敌人是不会自行消灭的。”党内最大的一小撮走资本主义道路当权派，虽然被亿万革命群众揪出来了，但是他们犯下的反党、反社会主义、反毛泽东思想的滔天罪行，还没有彻底批判；长期以来，他们散布在各条战线各个领域里的修正主义毒素，还没有完全肃清；他们人还在，心不死，总是念念不忘他们已经失去的“天堂”，一有机会就会以十倍的疯狂，对革命群众进行新的反扑。最近出现的所谓“五·一六兵团”反革命组织，把矛头直接指向无产阶级司令部，妄图分裂以毛主席为首的党中央，分化瓦解无产阶级专政的柱石——中国人民解放军，就是一个铁证。对此，我们无产阶级革命派决不可以掉以轻心，松懈自己的警惕性。"},{"type":"paragraph","text":"毛主席是我们最伟大的领袖、最高的统帅，毛泽东思想是我们全党全军全国人民的命根子。谁反对毛主席，谁反对毛泽东思想，谁反对毛主席的革命路线，不管他资格多老，职位多高，伪装得多么巧妙，我们也要把他揪出来，坚决打倒！陶铸这个彻头彻尾的大野心家，一贯追随中国的赫鲁晓夫，疯狂地反对毛主席，恶毒攻击毛泽东思想，竭力鼓吹资产阶级反革命理论，推销叛徒加奴才的“精神生活”，阴谋篡党、篡军、篡政，复辟资本主义。他是革命人民的死敌，必须坚决打倒！"},{"type":"paragraph","text":"革命的大批判，是无产阶级革命派夺权斗争的深入发展，是清除修正主义毒素的重大步骤。我们一定要紧跟毛主席的伟大战略部署，牢牢掌握斗争大方向，以毛泽东思想为武器，发扬痛打“落水狗”的彻底革命精神，进一步掀起革命大批判的新高潮，把以中国赫鲁晓夫为首的党内最大的一小撮走资本主义道路当权派，进一步从政治上、思想上、理论上批深批透，斗倒斗臭，为夺取无产阶级文化大革命的彻底胜利作出新的贡献。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"陶铸","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"人民战争","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"清查五·一六","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1ca998a21a"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
