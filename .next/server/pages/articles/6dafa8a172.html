script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共中央批转《中共江苏省委关于徐州地区贯彻执行中央9号文件的情况向中央、国务院的报告》（概要）","authors":[],"dates":[{"year":1975,"month":6,"day":2}],"is_range_date":false,"parts":[{"text":"中共中央批转《中共江苏省委关于徐州地区贯彻执行中央9号文件的情况向中共中央、国务院的报告》（概要）","type":"title"},{"text":"1975年6月2日，中共中央批转《中共江苏省委关于徐州地区贯彻执行中央9号文件的情况向中共中央、国务院的报告》。《报告》反映：在整顿前，“许多领导干部陷进了资产阶级派性的泥坑。在相当多的单位中，不是用党性掌权，而是用‘派性'掌权。这一派上了台就整那一派，那一派掌了权又整这一派。几经反复，裂痕很深。”“近几年来，那些用派性掌权的同志，又借各种运动之机整另一派的干部和群众。批林批孔运动一来，原来掩盖的矛盾爆发了。”“坏人就趁机兴风作浪，浑水摸鱼”，“打着‘揭盖子’的旗号，欺骗、拉拢少数群众，向无产阶级专政进行疯狂进攻，妄图趁机推翻各级党的领导。”","type":"paragraph"},{"text":"《报告》总结解决徐州问题的经验是，紧紧抓住解决领导班子问题这个关键，对派性严重的领导干部，要敢批、敢斗、敢捅“马蜂窝”，限期改正错误，到期不改，采取组织措施。对群众坚持正面教育，防止互相攻击。对极少数坏人，把他们抓起来，在群众中批判。中共中央要求各地参考江苏的经验，解决各地区的问题。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"江苏文革","type":"人物"},{"name":"批林批孔","type":"主题/事件"},{"name":"派性","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6dafa8a172"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
