script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"抗议美帝和本国大地主大资本家的残酷剥削智利劳动人民继续展开罢工斗争","authors":[],"dates":[{"year":1969,"month":12,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京十二日电　圣地亚哥消息:智利劳动人民继续展开罢工、占厂和占领庄园的斗争，抗议美帝国主义和本国大地主大资本家的残酷剥削，争取生存权利。"},{"type":"paragraph","text":"十日，圣地亚哥省圣安东尼奥港沿海地区一千八百多名农业工人开始举行不定期罢工，并强行占领他们所在的四十五个小庄园，抗议地主的残酷压迫和不履行增加工资的诺言，同时提出没收这些庄园归农业工人所有。"},{"type":"paragraph","text":"同天，在美国垄断集团安第斯铜矿公司所属波特雷里略斯铜矿铸铜工段做工的四百名工人也举行罢工，要求增加工资。智利南部阿劳科省库卡尼拉维煤矿二百名矿工也于十日占领这个煤矿的一些坑道，抗议矿主企图解雇工人。"},{"type":"paragraph","text":"坚持不定期罢工已七十二天的圣地亚哥“芬萨”冶金公司一千三百名工人，十一日包围了工厂，要求增加工资。被困在厂内的资本家不得不靠一架直升飞机供应食品。智利最大的苏马尔纺织厂一千三百多名工人，为要求增加工资已坚持罢工三十八天。在阿劳科纤维厂工作的五百名工人坚持罢工已两星期，他们曾占领工厂设备，为提高工资而斗争。"},{"type":"paragraph","text":"圣地亚哥市巴兰卡斯区四百名市政工人和职员十日也举行不定期罢工，抗议当局拖欠工资。"},{"type":"paragraph","text":"在美帝国主义残酷掠夺下，智利经济日益恶化。劳动人民由于生活日益贫困，掀起了此伏彼起的争取生存权利的斗争。笼统计，今年头十一个月生活费用已上涨百分之二十九，失业工人达二十多万。工人劳动条件非常恶劣，据官方数字，每年有三十五万多工人因工受伤。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a91b374b78"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
