" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共团（成都）市委支部于处分黄一龙的决议","authors":[],"dates":[{"year":1957,"month":12,"day":25}],"is_range_date":false,"parts":[{"text":"中共团（成都）市委支部于处分黄一龙的决议","type":"title"},{"text":"[黄一龙，时任成都团市委常委、宣传部部长。]","type":"subtitle"},{"text":"黄一龙，男，现年二十四岁，四川省华阳县人。家庭出身教员，本人成分学生，一九五一年参加工作，一九五二年十月入党，现任团市委常委、宣传部部 长。由于黄一龙受资产阶级思想影响很深，入党后又存在严重的骄傲自满情绪，思想上不但没有得到根本改造，并且顽固地坚持着自己的资产阶级观点和立场。因此，在社会主义革命逐渐深入、国际修正主义大肆泛滥、国内资产阶级右派大肆进攻的时候，黄一龙便失掉立场，逐步倒向了资产阶级右派的阵营，向党进攻。黄一龙的主要错误，是否认了今天阶级斗争的存在，认为阶级观点已经过时。在宣传工作上，对青年的估计和分析完全违背了阶级观点和阶级分析方法，甚至发展倒对李 井泉同志传达今年二月中央省、市委书记会议精神的报告进行攻击，说\"李政委报告有教条主义，应该检查\"。错误地强调\"独立思考\"和\"创造精神\"，在实际工作中对上级的指示和决定便往往采取了怀疑和否定的态度。在共青团工作上，认为\"共青团保证党的领导和代表青年利益有矛盾\"，这种观点曾经带到了第三次全国 团代表大会上，要求\"三大\"讨论保证党的领导与代表青年利益有矛盾、在新的历史时期应如何解决此一问题。由于\"三大\"未接受他的这个错误意见，加上黄一龙浓厚的资产阶级\"民主\"\"自由\"观点，便说\"三大\"不民主，没有解决工作中的具体问题，最后大会通过决议时，准备弃权，经其他同志劝阻后，始勉强举了手。 并且同意和支持右派分子王亚生向团中央、党中央进攻的《当前全国团代会和整风精神相去十万八千里》的反动文章。在大鸣大放中，在肃反和选派留学生等党的重大政策上黄一龙思想上和右派发生了共鸣，也认为\"有问题\"、\"搞错了\"。当右派分子猖狂向党进攻的时候，黄一龙当时思想上却认为是\"群众思想活跃\"、\"批评空气形成了\"、\"政治积极性空前高涨\"、\"形势是正常的\"。","type":"paragraph"},{"text":"根据以上反党反社会主义的思想和行为，黄一龙是已经完全掉入了资产阶级右派的泥坑，错误的性质是严重的。但由于黄一龙在运动中还能够主动向党交代 自己的问题，检查思想和批判错误，目前对自己的错误也有一定的认识，并愿意决心改造自己，且以往工作一贯表现积极负责，支部委员会认为可以不作为右派分子处理，但为了严肃党纪，教育黄一龙本人，党内应给以留党察看两年的处分，并建议行政上撤消其团市委委员、常委、宣传部长职务，降职使用。","type":"paragraph"},{"text":" 一九五七年十二月二十五日","type":"paragraph"},{"text":" 来源：黄一龙 “我的右派档案”,原载《博讯》网站。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b76712177d"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
