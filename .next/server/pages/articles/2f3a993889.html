script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反对修正主义是国际责任  印共“自由报”批判南共纲领草案","authors":[],"dates":[{"year":1958,"month":5,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反对修正主义是国际责任"},{"type":"paragraph","text":"印共“自由报”批判南共纲领草案"},{"type":"paragraph","text":"新华社新德里14日电　在加尔各答出版的印度共产党报纸“自由报”在13日发表了题为“反对修正主义”的社论，号召对南斯拉夫共产主义者联盟纲领的修正主义进行“无情的思想斗争”。"},{"type":"paragraph","text":"这家报纸支持北京“人民日报”5月5日发表的题为“现代修正主义必须批判”的社论，并且指出，南斯拉夫共产主义者联盟纲领暴露了现代修正主义者的特点，这个纲领反对马克思列宁主义的基本原则。"},{"type":"paragraph","text":"这家报纸谴责这个纲领对国际局势进行“歪曲的分析”，硬说苏联实行“实力地位”政策。报纸说，这个纲领抛弃马克思列宁主义基本原则的另一个例子是，它提出了在资本主义社会中国家超于两个敌对阶级之上的理论。这家报纸质问道：“有哪一个资产阶级国家曾经反对过资产阶级的利益？难道能够举出任何事实来证明资产阶级国家反对过垄断资本吗？它说，没有这样的事实。因为根本不会发生这种事情。”"},{"type":"paragraph","text":"这家报纸说，坚决反对这种修改马克思列宁主义的企图是我们今天的国际责任。没有一个马克思主义者能够在这个问题上保持沉默。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2f3a993889"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
