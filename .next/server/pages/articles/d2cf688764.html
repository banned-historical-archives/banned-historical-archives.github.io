script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"阿尔及利亚采取措施维护本国权益  决定把法国经营的石油公司百分之五十一的股份收归国有    布迈丁主席谴责帝国主义掠夺和剥削非洲","authors":[],"dates":[{"year":1971,"month":3,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"阿尔及利亚采取措施维护本国权益"},{"type":"paragraph","text":"决定把法国经营的石油公司百分之五十一的股份收归国有"},{"type":"paragraph","text":"布迈丁主席谴责帝国主义掠夺和剥削非洲"},{"type":"paragraph","text":"新华社阿尔及尔电　阿尔及利亚政府在二月二十四日发表的一项公报中宣布，决定把法国在阿尔及利亚经营的石油公司的百分之五十一的股份收归国有，并且把外国在阿尔及利亚开采天然气的企业的一切利益和开采设备以及输送石油和天然气的全部管道收归国有。"},{"type":"paragraph","text":"阿尔及利亚全国革命委员会主席布迈丁二十四日在阿尔及利亚工会干部会议上谈到国有化措施时指出：“我们是享有主权的，而且我们能够理所当然地正常行使主权，作出一切决定。”"},{"type":"paragraph","text":"新华社阿尔及尔电　阿尔及利亚全国革命委员会主席胡阿里·布迈丁二月十九日在阿尔及利亚一批空军中队成立仪式上发表讲话时，谴责帝国主义对阿尔及利亚和其它非洲国家的掠夺和剥削。他说，阿尔及利亚将不断地为维护自己的民族独立和保卫国家财富而进行坚决的斗争。"},{"type":"paragraph","text":"布迈丁指出，如果说，阿尔及利亚经过坚持不懈的努力，收回了属于阿尔及利亚的大量资源，并且为阿尔及利亚人民的利益进行了开采，那末现在还存在着一些没有被解放的部门。阿尔及利亚正在这些部门进行坚决的斗争。"},{"type":"paragraph","text":"布迈丁在谈到最近阿尔及利亚同外国垄断公司进行的石油谈判时说：“我国的立场是再也明确不过的。我国的资源是我们自己的财富。我们的土地、我们的地下资源以及矿藏、水利和能力资源是属于我国人民的，它们理所当然地应该为我国的国民经济建设和结束我国人民的贫困与愚昧作出贡献。”"},{"type":"paragraph","text":"布迈丁指出，非洲大陆现在仍然遭受剥削，它的资源被国际资本主义和垄断资本所霸占。"},{"type":"paragraph","text":"他还说：“帝国主义并没有放弃任何在阿尔及利亚苟延残喘的欲望。敌视我国利益的势力还存在，它们决不允许阿尔及利亚享有独立的一切权益。”"},{"type":"paragraph","text":"他号召国家人民军所有部队“自始至终站在这场为实现国家主权的完整，为控制和开发我国所有资源的伟大战斗的第一线”。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d2cf688764"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
