script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"顺利地粉碎了帝国主义和修正主义的经济封锁  阿尔巴尼亚百余企业提前完成年度计划  工业总产值将超额完成　农业总产值预计比去年增长百分之八","authors":[],"dates":[{"year":1963,"month":12,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"顺利地粉碎了帝国主义和修正主义的经济封锁"},{"type":"paragraph","text":"阿尔巴尼亚百余企业提前完成年度计划"},{"type":"paragraph","text":"工业总产值将超额完成　农业总产值预计比去年增长百分之八"},{"type":"paragraph","text":"新华社地拉那七日电　阿尔巴尼亚的一百一十八个工矿企业已在十一月底提前完成了全年的生产计划，另有三百二十个工矿企业按期完成了头十一个月的生产计划。社会主义劳动竞赛取得了显著成绩。"},{"type":"paragraph","text":"这是阿尔巴尼亚中央竞赛委员会主席果戈·努什最近对阿尔巴尼亚通讯社和地拉那广播电台的记者谈话时谈到的情况。"},{"type":"paragraph","text":"努什说，根据现有的初步统计材料，阿尔巴尼亚今年工业总产值将完成计划的百分之一○一，比去年增长百分之六点一；农业总产值预计比去年增长百分之八；建筑计划预计可完成百分之一百；商品销售计划将可完成百分之一○一。农业合作社也获得了良好的成果。"},{"type":"paragraph","text":"努什说：“在这一时期，阿尔巴尼亚工人阶级和农业合作社的劳动者克服了许多困难和巨大障碍。由于阿尔巴尼亚人民的爱国主义，和在政治上、道义上钢铁般地团结在以恩维尔·霍查为首的劳动党的周围以及兄弟的中国人民的援助，我们顺利地粉碎了帝国主义集团、赫鲁晓夫修正主义叛徒集团反对我国的野蛮的经济封锁。”"},{"type":"paragraph","text":"努什在谈到明年的任务时说：“我国的国民经济明年将继续发展，劳动人民的物质和文化生活水平将进一步提高。同一九六三年相比，一九六四年的工业生产总产值将增加百分之七以上，农业总产值将增加百分之十三，基本建设投资约增加百分之十二。”"},{"type":"paragraph","text":"努什在谈到明年社会主义劳动竞赛的任务时说，我国劳动人民明年将庆祝祖国解放二十周年。为了庆祝这一伟大节日，社会主义劳动竞赛将提高到更高的水平。"},{"type":"paragraph","text":"（附图片）"},{"type":"paragraph","text":"阿尔巴尼亚第三个五年计划的大工程之一贝拉特纺织联合工厂正在动工兴建，建成后将成为全国第二个纺织中心。"},{"type":"paragraph","text":"阿尔巴尼亚通讯社稿（新华社发）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"56d7254a73"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
