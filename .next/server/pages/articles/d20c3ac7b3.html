" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji28","name":"毛泽东全集第28卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji28.pdf"],"article":{"title":"中央关于伊克昭盟划归华北问题的电报","alias":"","parts":[{"type":"paragraph","text":"中央关于伊克昭盟划归华北问题的电报"},{"type":"paragraph","text":"（1949年11月24日）西北局，并告华北局："},{"type":"paragraph","text":"戌梗电悉。关于伊盟划归华北问题，原由薄一波同志与马明方同志商定，由马回西北局转达征求你们同意后实施。因马去东北参观，故你们尚不知道此项决定。现据你们来电表示同意，即请径与华北局商定交接事宜，并注意要使交接双方都感满意，并恰当地处理奇子祥问题及伊盟与傅董?关系为要。"},{"type":"paragraph","text":"中央"},{"type":"paragraph","text":"十一月廿四日[1]伊盟，即伊克昭盟，今属内蒙古自治区。[2]马明方，当时任中共中央西北局副书记。"},{"type":"paragraph","text":"[3]奇子祥，即奇天祥，原国民党政府伊克昭盟准格尔旗保安司令，1949年11月5日率部起义。"},{"type":"paragraph","text":"[4]傅，指傅作义，原国民党政府军将领，1949年1月率部在北平起义，并对董其武率部在绥远起义做出贡献；当时任中央人民政府委员。董，指董其武，原国民党政府军将领，1949年9月率部在绥远起义；当时任政协第一届全国委员会委员。"}],"authors":["毛泽东"],"dates":[{"year":1949,"month":11,"day":24}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":37,"page_end":37},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d20c3ac7b3"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
