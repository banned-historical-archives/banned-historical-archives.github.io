script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"不断增强学习革命理论的自觉性长宁区区属单位以上领导干部学习毛主席指示，认识经验主义的危害性，决心带头学好无产阶级专政理论","authors":[],"dates":[{"year":1975,"month":3,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　在学习无产阶级专政理论的过程中，中共长宁区委组织区革委会各组室负责人、区属单位党组织正副书记以上干部学习和讨论了毛主席关于“现在，主要危险是经验主义”的论述，使大家进一步认识到经验主义的极大危害性，学习革命理论的极端重要性。"},{"type":"paragraph","text":"学习中，大家对经验主义的特征进行了议论和分析。有的同志引用毛主席关于“唯心论和机械唯物论，机会主义和冒险主义，都是以主观和客观相分裂，以认识和实践相脱离为特征的”论述，认识到经验主义也是以理论和实践相脱离为其特征的，它是主观主义的一种表现形式。沾染了经验主义，就会以感性代替理性，以局部代替全局，以过去代替现在。大家还联系路线斗争、日常工作、学习现状等实际，着重分析了经验主义造成的种种危害和后果。"},{"type":"paragraph","text":"一、有了经验主义，容易陷入盲目性，迷失方向。有些老干部联系第九次路线斗争的经验教训，谈了这方面的认识。区公安分局、江苏路街道有的领导干部说:文化大革命初期，我们所以犯路线错误，一度站在群众的对立面，除了觉悟低，分不清正确路线与错误路线外，一个重要原因就是头脑中有经验主义在作怪，凭老经验看新问题，对群众运动思想上不通，行动上抵触，结果背离了毛主席的无产阶级革命路线，犯了错误，这个教训要永远记取。只有认真学习马克思主义，才能克服经验主义。"},{"type":"paragraph","text":"二、有了经验主义，就容易以假当真，上当受骗。有些同志开始对毛主席指出的“现在，主要危险是经验主义”以及《人民日报》社论《领导干部要带头学好》中指出的“经验主义是修正主义的助手”不理解。后来，大家回顾了过去的一些教训，特别是联系第十次路线斗争中的教训，认识到修正主义总是披着马克思主义的外衣来招摇撞骗的，而有经验主义的人，因为不认真学习马克思主义，所以，就会把错误的东西当作正确的东西。教育、财贸系统有的领导干部说:由于头脑中有经验主义，理论上分辨不清，确实闹了不少笑话，把错误当正确。如过去对林彪散布的“天才论”、“顶峰论”、“立竿见影”、“灵魂深处爆发革命”等谬论，非但不加以抵制，反而加以宣传，这实际上就不自觉地做了修正主义的助手，当了修正主义路线的俘虏。有位区委副书记分管街道工业，一度由于受了林彪一类骗子“电子中心论”的影响，只重视搞电子的街道工厂，而对于生产其他产品的工厂很少关心，支持不够。现在认识到这实际上是上了修正主义路线的当，他表示要努力学习马列和毛主席著作，分清路线是非，更好地贯彻执行毛主席的革命路线。"},{"type":"paragraph","text":"三、有了经验主义，就会固步自封，落后于形势。有的同志说，有了经验主义，就象毛主席指出的那样:“思想不能随变化了的客观情况而前进”，“不能站在社会车轮的前头充任向导的工作”，“只知跟在车子后面怨恨车子走得太快了”。区财贸系统有位老干部深有体会地说:由于受了经验主义的毒害，自己思想上只有革命阶段论，忘掉了不断革命论，以民主革命阶段的老眼光，看社会主义时期的革命新课题。对于毛主席指出的“现在还实行八级工资制，按劳分配，货币交换，这些跟旧社会没有多少差别”，开始自己就很不理解，通过学习，认识到这是毛主席分析了我国现阶段的实际情况而提出来的，指出了继续革命的方向，反映了全国人民的要求。有位区委常委、工人新干部说:老干部中有经验主义，我们新干部中也有经验主义，同样要克服。不克服，就不会热情支持社会主义新生事物，看不到新生事物的强大生命力，甚至会成为发展新生事物的阻力。"},{"type":"paragraph","text":"四、有了经验主义，就会以干代学，忙忙碌碌，忙不到点子上，给革命事业带来损失。大家重温了毛主席关于“以为只有感性认识可靠，而理性认识是靠不住的，这便是重复了历史上的‘经验论’的错误”的教导，对照自己，找了差距，进一步看到了经验主义的危害性。华阳路街道有的领导干部说:在我们身上存在着对学习“说起来重要，做起来次要，忙起来不要”的以干代学的现象。这反映了我们轻视理论学习。经验主义是马克思主义的大敌。如不及时克服，我们就不能学好无产阶级专政的理论，也就不能带领群众学好。"},{"type":"paragraph","text":"大家通过学习、讨论，进一步增强了学习革命理论的自觉性，认识克服经验主义的重要性，表示要响应党中央的号召，带头学好无产阶级专政的理论，带头做限制资产阶级法权的模范，带头做无产阶级专政下继续革命的先锋战士!"},{"type":"paragraph","text":"(本报通讯　员)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"林彪","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"name":"限制资产阶级法权","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"59e33dad17"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
