<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"“三项指示为纲”是修正主义的纲领","authors":[],"dates":[{"year":1976,"month":3,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"黄浦区革委会机关理论组"},{"type":"paragraph","text":"对毛主席关于评论《水浒》的指示，党内那个不肯改悔的走资派百般抵制，竭力反对，他做贼心虚、心怀鬼胎地说:不要“听到风就是雨”。一语泄露天机。原来，毛主席关于评论《水浒》的指示，吹起了批判投降主义、修正主义的进军号。党内那个不肯改悔的走资派反对展开对《水浒》的评论，恰恰暴露了他自己正是和宋江一样，都是投降派。谓予不信，请看“三项指示为纲”是什么货色!"},{"type":"paragraph","text":"投降派宋江，大权一到手，就把“聚义厅”改为“忠义堂”，打出“替天行道”的旗号，从根本上篡改晁盖的革命路线。党内那个不肯改悔的走资派，大权一到手，就把阶级斗争为纲，篡改为“三项指示为纲”，从根本上篡改党的基本路线，要无产阶级放下武器向资产阶级投降。事实证明:凡是搞修正主义的都是投降派，“三项指示为纲”就是修正主义纲领。"},{"type":"paragraph","text":"古代投降派，要搞阶级投降，也总是抹煞阶级界线，主张“阶级合作”。宋江“坐了第一把交椅”之后便立即篡改正确路线，高唱“忠义”，要农民起义军去“忠”于朝廷，去“替天行道”。党内那个不肯改悔的走资派，正同《水浒》中的宋江虽在农民起义队伍中却代表地主阶级一样，身披共产党员外衣，实际上代表党内外的新旧资产阶级。他为了迎合地主、资产阶级的需要，竭力攻击和篡改马克思主义的阶级斗争学说，反对以阶级斗争为纲，把无产阶级专政的理论一古脑儿抛掉，妄图要我们放下镇压国内阶级敌人的反抗与防御国外帝国主义侵略的武器，重新回到“吃猪狗食、干牛马活”的黑暗社会，让新中国重新沦为帝国主义的殖民地。"},{"type":"paragraph","text":"毛主席指出:“安定团结不是不要阶级斗争”。提出“三项指示为纲”的人口蜜腹剑，用掩眼法去掉以阶级斗争为纲，把“安定团结”提到纲的地位，在他们看来以阶级斗争为纲过时了、不灵了。这种不讲革命原则的所谓“团结”，实际上就是林彪鼓吹的“不同心也要协力”的翻版。他们以阶级斗争熄灭论来反对马克思主义的阶级斗争学说，为向资产阶级投降制造理论根据。列宁指出:“机会主义的主要内容就是阶级合作的思想”。从国际上老牌的机会主义到党内那个不肯改悔的走资派，他们鼓吹的那套黑货，其核心和实质万变不离其宗，都是阶级合作，阶级投降。他们拜倒在地主、资产阶级脚下，要的是地主、资产阶级的“安定”，要的是地主、资产阶级的“团结”，换句话说，就是要我们无产阶级听从资产阶级摆布，这是“二项指示为纲”走向投降道路的必然规律。"},{"type":"paragraph","text":"党内那个不肯改悔的走资派把发展国民经济提到纲的位置，是真的要把国民经济搞上去吗?不。他们只讲“搞上去”，不讲生产关系的革命，只讲“强国”，不讲社会主义，是想把社会主义经济引向斜路。党内不肯改悔的走资派把“四个现代化”作为大旗，到处煽动刮“业务台风”、“经济台风”，把文化大革命中批臭的“物质刺激”、“业务挂帅”、“技术至上”、“专家治厂”、“白专”道路等修正主义黑货重新搬出来，还大肆重弹资产阶级“科学救国”、“教育救国”的陈词滥调，而对社会主义的新生事物横加扼杀，对发展国民经济的革命群众运动强行压制。由此可见，搞投降主义的又总是要翻案、复辟。“三项指示为纲”的鼓吹者说要把国民经济“搞上去”是假的，搞反攻倒算，复辟资本主义才是真的。如果让他们的修正主义纲领得逞，苏联资本主义复辟的悲剧就会在中国重演，千百万人头就会落地。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8f6f69ab29"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
