" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji36","name":"毛泽东全集第36卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji36.pdf"],"article":{"title":"对中共七届六中全会文件集序言稿的批语和修改","alias":"","parts":[{"type":"paragraph","text":"对中共七届六中全会文件集序言稿的"},{"type":"paragraph","text":"批语和修改!"},{"type":"paragraph","text":"（1955年12月26日）胡乔木同志："},{"type":"paragraph","text":"此件可用。即送刘、周、陈、彭真阅后，由你处理。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十二月廿六日"},{"type":"paragraph","text":"[1]本篇二是毛泽东在审阅中共七届六中全会（扩大）文件集序言稿时改写的一段话，文中用宋体字排印的是毛泽东加写和改写的文字。"},{"type":"paragraph","text":"[2]胡乔木，当时任中共中央副秘书长、毛泽东的秘书。"},{"type":"paragraph","text":"[3]指胡乔木1955年12月6日代中共中央办公厅起草的《中国共产党第七届中央委员会第六次全体会议（扩大）文件集》序言稿。"},{"type":"paragraph","text":"[4]刘，指刘少奇。周，指周恩来。陈，指陈云，当时任中共中央书记处书记、国务院副总理。彭真，当时任中共中央书记处候补书记、全国人大常委会副委员长。毛泽东全集第三十六卷"},{"type":"paragraph","text":"一"},{"type":"paragraph","text":"一九五五年十月以后，全国农业合作化的潮流是这样地勇往直前，以至一再地超过了任何最乐观的估计。成万万的农民涌进合作社，参加合作社的农户到一九五五年十二月下旬，已经达到全国农户总数的百分之六十以上。全国农村的半社会主义的合作化，到一九五六年下半年就可以实现。合作社由半社会主义到全社会主义的转化，也可以提前在一九五九年至一九六○年完成。"}],"authors":["毛泽东"],"dates":[{"year":1955,"month":12,"day":26}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":118,"page_end":119},"tags":[{"name":"毛泽东","type":"人物"},{"name":"彭真","type":"人物"},{"name":"胡乔木","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a101670171"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
