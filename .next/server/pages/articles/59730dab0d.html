" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"周恩来谈齐白石徐悲鸿","authors":["周恩来"],"dates":[{"year":1967,"month":7}],"is_range_date":false,"parts":[{"text":"周恩来谈齐白石徐悲鸿","type":"title"},{"text":"周恩来","type":"authors"},{"text":"周恩来在对浙江代表团的讲话中说到：不论在西洋画、中国画，有气节有正义感的还是徐悲鸿，那时候齐白石也跑到南京去，张道藩给他做寿。徐悲鸿就是没有对国民党屈服，但是有一批旧画家反对徐悲鸿，我过去题了“悲鸿故居”，有些旧画家利用一批红卫兵要把这块匾砸掉，后来保护起来了。(张春桥插说：戚本禹同志去保存下来了。)","type":"paragraph"}],"comments":[],"origin":"周良霄、顾菊英编《疯狂、扭曲与堕落的年代》之二——《十年文革中首长讲话传信录》, 2009。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"59730dab0d"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
