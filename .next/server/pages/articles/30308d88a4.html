script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"接受刘青山张子善事件的教训和资产阶级思想划清界限  ——读者来信综述","authors":[],"dates":[{"year":1952,"month":2,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"接受刘青山张子善事件的教训和资产阶级思想划清界限"},{"type":"paragraph","text":"——读者来信综述"},{"type":"paragraph","text":"本报去年十二月三十日发表了“中共河北省委关于开除刘青山、张子善党籍的决议”和“刘青山、张子善盗窃国家资财的罪行”后，先后接到来自各级党组织、人民政府、解放军部队、新民主主义青年团各级委员会、工厂、企业部门、学校及农村、街道的二百一十九个读者的来信。这些来信，一致拥护中共河北省委开除刘青山、张子善的党籍和送交人民政府依法惩办的措施。这些读者一致对中共河北省委长期不能发现刘、张的错误，中共天津地委部分党员不能和刘、张作不调和的斗争，提出了严厉的批评，要求河北省委和天津地委接受这一沉痛的教训，坚决克服自己的官僚主义和自由主义作风。"},{"type":"paragraph","text":"许多读者从党对刘、张事件的处理中，进一步认识了共产党的光荣、伟大、正确。北京大学、清华大学、河南大学、通县中学、宣城油榨沟中心小学的一百零一个学生来信说：通过中共河北省委对刘青山、张子善巨大贪污案的处理，他们更深刻地认识了中国共产党的伟大、光荣、正确。中国共产党对人民事业的无限忠诚，使他们相信在中国共产党领导下，一定能够根绝旧中国统治阶级所遗留的贪污、腐化、欺骗、盗窃、行贿等恶风劣习。刘青山、张子善巨大贪污案，也使他们认识了资产阶级思想对革命的危害。在革命阵营内必须彻底肃清资产阶级贪污、腐化的思想影响，否则，就会妨碍新中国的建设。"},{"type":"paragraph","text":"绝大部分读者，特别是共产党员，都联系这一事件，检查了自己所受的资产阶级思想的影响。中共河北省霸县县委组织部副部长张崑说：“过去我认为自己革命历史长，没有功劳也有苦劳，现在应该享受一点。于是我也羡慕资产阶级的腐化堕落的生活，逐渐在穿、吃上‘讲究’起来。刘青山、张子善事件使我清醒起来，使我意识到自己也正向着腐化的道路上走去。”县委副书记张全义、统战部秘书谢宝智等也都检查了进城后滋长了的腐化享乐思想。中华全国合作社干部学校陈懋功、山东省人民政府人事厅仲秋等来信说：反贪污、反浪费、反官僚主义运动开始时，他们还认为自己很清白、没有什么可反的。经过对刘、张事件的讨论，才发现这种思想是错误的，应该迅速地跟资产阶级思想划清界限。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"30308d88a4"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
