script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"b9f56fef-aba0-4aed-990f-7e07f337ce38","name":"红旗一九五八年第九期","internal":false,"official":true,"type":"pdf","author":"","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives2/main/b9f56fef-aba0-4aed-990f-7e07f337ce38.pdf"],"article":{"title":"发扬正在飞速成长着的共产主义精神","alias":"","parts":[{"type":"paragraph","text":"但是如果有人在胜利声中丧失了客观的识逊的态度，发展到文过饰非，拒批，地淡不是真正的马克思主义著。揭发早精生产中的一个缺点，就是促进晚稻丰收的一分力量，这有什么不好呢？从每一个县来，拿今年比往年，当然无例外地都是飞跃的发展。但是，全国全省之大，六万万人之众，比自己先进的地区不知有多少，为什么不同那些先进地区比一比呢？不登"},{"type":"paragraph","text":"发扬正在飞速成长着的共产主义精"},{"type":"paragraph","text":"齐作文"},{"type":"paragraph","text":"*“解放”（上海）第六期（九月十六日出题）*"},{"type":"paragraph","text":"劳动人民中共产主义精神的迅速成长，不仅又推动其他阶级和阶层的人民不得不努力加快地改造自已，并且叉反过来作为动力促便我国在工农业生产以及科学文化等等事业上的跃进再跃进。共产主义精神在广大的人民群众中发光大，不仅是我们加速社会主义建设的重妥保证，而且也是最后过渡到共产主义的必备条件。"},{"type":"paragraph","text":"可是，事情总还有另一面。"},{"type":"paragraph","text":"伟大的历更转变时期，资产阶毅的法权制度还没有去净，前资产阶毅法权悲想更还有深厚的影啊。"},{"type":"paragraph","text":"在资产阶额个人主义署的头脑里，劳动不过是为了取得工资、更多的工餐，以至为了个人的发财致富。在他们看来，人们的劳动是被动的，如果不是为了儿个，有肯去劳动？高山之巅，不知天下之大；知道了天下之大，先进之多，才能激起自已学先进、赶先进、超先进的不断萃命的热情。坐并观天，除了滋长自满自足的暮气、丧失革命的热情之外，是不会有付么好结果的。即使是先进地区，也应当估计到先进和落后不是万年不变的，在一定的条件之下，可以互相转化。先进者可以因傲白满而转化为落后，落后者可以因发奋图强而转化为先逃。"},{"type":"paragraph","text":"对于具有高尚的共产主义风格的人来，人活若应当为大蒙、为人类的将来多做点事才有意思，所以，他们早已不是把劳动当作痛苦和负担，而是当作最大的荣誉和义务。他们为，自已对社会资献得越多越好，而向社会要得越少越好。"},{"type":"paragraph","text":"本来，“每个人生下来就有一种偏好某种劳动的习性”恩格期：“大陆L社会改革运动的逃展”。劳动之所以成为痛害和负担，是由于生产资料的私有制把劳动和享受二者分割了开来，把欢乐变成大多数劳动者享受不到的东西，这就不得不使劣动成为痛苦的事情。私有制一且消灭，并且，当人们在思想意识等等方面，眞正破坏了餐产阶法权思想的影响，成为具有共产主义自觉的人，劳动便能够开始恢复它本来的面自，成为一种享受，战为人们生活本身的需要。我们所朝夕懂憬和追求的共产主义，正是要使劳动成为一种享受，成为人们生活本身的需要。"},{"type":"paragraph","text":"共产主义高杀阶段是劳动人民的要求，是我们不远的前景。共产主义精神的道德面貌的形成和发展，是我国社会意形态改变、发展的唯一正确的方向利必然的趋势。它最后一定要成为全体人民行动"},{"type":"paragraph","text":"谈谈解放思想"},{"type":"paragraph","text":"郑季翘"},{"type":"paragraph","text":"*“东风”（河北）第二期（八月一日出版）*"},{"type":"paragraph","text":"社会主义一-共产主义事业的进行和实现，就是人们发首创精和思想解放的精果。在资本主义社会，由于当时的社会状况和餐产阶级的各种各样的就教，尽管这社会存在着显著的矛盾，但对于私有财产的神圣不可侵犯，人们深信不疑。而有一些人却打破了餐产阶级社会传统的教，即打破当时征会的通常的意识，开始了“离经叛道”的思考。马克思运用唯物主义的观点，根据对登本主义社会济的研究，特别是由于参加了国际工人运动的伟大斗争井总结了国际工人运动的斗邻经，在圣西门、傅立叶、欧文等人的签想社会主义思想的基础上，创立了科学的共产主义学。可见，共产主义思想是违反了当时的社会传航息想而开放的奇异的灿烂的花朵；没有思想的解放，就疫有共产主义。"},{"type":"paragraph","text":"中国的情况也是一样，毛主席在论人的规范。但是，共产主义精种也是在斗争中生长的。“不破不立”，要发扮共产主义精神，就必须同一切资产阶级和小资产阶级思想、旧就会遗留下来的一切落后保守想想及萎不振的精神状态进行毫不调和的斗邻；就必须彻底清除划前阶级的生活方式、思想意藏、道德习惯等等在劳动人民中的影响。民民主专政的文里，管经到中国人民摸索救国救民的道路的过程。在多方模索、试龄失败之后，中国的先进人物释了接受了共产主义思想。但共产主义思想和中国当时占航治地位而为刹削阶级服务的传思想是相抵触的。接受共产主义思想，就是先进人物首创精神的表现，就是他们的思想解放。显然，中国革命的胜利是思想解放的结果。没有一些人们的思想解放，就不能接受共产主义思想，也没有共产党，当然也就没有人民革命的胜利。"},{"type":"paragraph","text":"我们已经取得民上革市的胜利拜取得社会主义革命的决定性的胜利。目前，我国人民正在以沸腾般的热，建设自己的融会主义社会。正如以前各种融会制度有其相应的社会意一样，社会主义融会，必须有而且一定有与其相应的社会意藏。过去各种社会制度的社会意识适应其阶级"}],"authors":["齐作文"],"dates":[{"year":1958}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":41,"page_end":42},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"df966703c6"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
