script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"强烈抗议反动当局镇压工人运动澳大利亚五十万工人罢工意大利一百八十万农业劳动者罢工反对资本家残酷剥削","authors":[],"dates":[{"year":1969,"month":5,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社墨尔本十九日电　澳大利亚昆士兰州十五万多名工人从十八日午夜开始举行总罢工，强烈抗议澳大利亚反动当局十五日无理逮捕和监禁维多利亚州电车工会书记。这是继十六日全国各地二十五万工人大罢工之后，澳大利亚工人阶级对反动当局的这一镇压工人运动的法西斯措施的又一次的严重警告和有力还击。"},{"type":"paragraph","text":"据统计，十五日以来，澳大利亚全国已经有五十万工人先后举行了罢工，抗议反动当局镇压工人运动，罢工规模声势之大，是澳大利亚工运史上几十年来所没有的。"},{"type":"paragraph","text":"目前，这种抗议行动还在继续发展中。十九日这一天，西澳大利亚州珀思的公共汽车工人和码头工人，新南威尔士州的运输工人和建筑工人，北部领土的达尔文各行业工人，都举行了规模不等的抗议罢工。同时，澳大利亚首都堪培拉各工会已经发出了总罢工的号召，阿得雷德市的六十个工会在十九日上午开会以后也号召所属工人在二十日举行总罢工。此外，其它一些城市的工会组织也正在考虑采取进一步的抗议行动。"},{"type":"paragraph","text":"新华社北京十七日电　罗马消息:意大利一百八十万农业劳动者十六日和十七日连续两天在全国范围举行大罢工，反对资本家的残酷剥削，要求提高工资和充分就业。"},{"type":"paragraph","text":"罢工群众在意大利各个农业地区的中心城镇举行了集会和声势浩大的示威游行。"},{"type":"paragraph","text":"与此同时，意大利经济落后地区的人民又掀起了新的斗争浪潮。十五日，在意大利南部的加拉勃利亚区，一万名群众从二十八个地区集中到克罗托内，举行了示威游行，对他们所在地区的失业、贫困和经济衰退的情况日益恶化表示愤怒抗议。在阿浦利亚区的福贾和康帕尼亚区的卡斯特尔沃图诺，十六日也爆发了同样的群众示威。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"842bb06405"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
