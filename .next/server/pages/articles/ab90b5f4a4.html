script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"罢工罢课浪潮席卷意大利广大人民反对垄断资产阶级剥削和压迫的群众运动进一步高涨","authors":[],"dates":[{"year":1969,"month":11,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京十四日电　罗马消息:意大利人民反对垄断资产阶级残酷剥削和压迫的群众运动蓬勃高涨，罢工、罢课、示威的浪潮席卷意大利。"},{"type":"paragraph","text":"一百五十多万五金、机器制造、化学和制药业工人为了要求增加工资而举行的全国性轮流罢工已坚持了两个多月。连日来，工人们在许多城市举行了示威游行。在热那亚，几千名罢工工人占领了两个火车站，在屋顶上升起了红旗。工人还在工业家联合会办事处外面举行了示威游行。在都灵，示威工人十一日和十二日包围了“菲亚特”汽车托辣斯的经理办公室。的里亚斯特，皮斯托亚，特尔尼和其他城市正在罢工的五金、机器制造业工人也举行了示威游行。"},{"type":"paragraph","text":"最近几天，公共汽车和电车职工也举行了全国性轮流罢工。罗马、米兰、那不勒斯、都灵和意大利其他大城市的交通先后陷于瘫痪状态。"},{"type":"paragraph","text":"在意大利北部的伊斯普拉，欧洲原子能联营的核研究中心的科学技术人员也举行了四十八小时罢工。"},{"type":"paragraph","text":"为了抗议生活费用的高涨，撤丁区首府卡利亚里市的工人十二日举行总罢工，学生和教员举行罢课、要教，使卡利亚里市及其周围地区完全陷于瘫痪。一万多人举着红旗、横幅和标语牌在市内举行了示威游行。"},{"type":"paragraph","text":"意大利学生在许多城市举行了罢课和示威，反对腐朽的资本主义教育制度，声援工人的正义斗争。"},{"type":"paragraph","text":"在那不勒斯，学生们在十一日举行了总罢课。一万学生在市区举行了示威游行。意大利新法西斯党的暴徒为了破坏示威，竟悍然向群众扔炸弹，炸伤学生多名。这激起了学生们极大的愤怒。十二日，那不勒斯学生再次举行示威，强烈抗议新法西斯党的暴行。学生们还占领了十所职业学校。"},{"type":"paragraph","text":"在意大利南部，科森萨市的五千名学生和萨勒诺市的三千名学生十二日举行了示威游行。在波伦亚，两千名学生十一日在市区游行后，又到郊区同罢工工人联合举行集会。米兰，都灵，卡塔尼亚，巴里，维罗纳，特尔尼等城市的学生们也举行了罢课，示威游行并且占领了校舍。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ab90b5f4a4"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
