" crossorigin="">{"props":{"pageProps":{"books":[{"id":"7492dacf-eac4-45d3-aecb-6184761f1139","name":"毛远新和江青两篇讲话（1968.3）","internal":false,"official":false,"type":"img","author":"毛远新、江青，1968.3.19、1968.3.20，","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/7492dacf-eac4-45d3-aecb-6184761f1139/1.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/7492dacf-eac4-45d3-aecb-6184761f1139/2.jpg"],"article":{"title":"毛远新同志在辽联赴京代表团座谈会上的讲话纪要","alias":"","parts":[{"type":"paragraph","text":"毛远同志在辽联赴京代表团座谈会上的讲话要"},{"type":"paragraph","text":"一九六八年三月二十日"},{"type":"paragraph","text":"（根据记录整理，未本人审）你们在北京的代表还在等，等中央的态度，我不理解。你们还等什么？等着看了很多鬼。现在着间题要从本质上去考虑，从以毛主席为首的无产阶极司合部和划在穷是能挽放，还是不能挽教啊？有人提出宋任穷的间题，让我交个底。这个邓的资产阶级司合部的斗争来考也。主席设：文化大革命实际上是和将家王朝斗事，讲的那三条意见，已程完全交拾你同了，可能你们还没有认去考惠，去研的继续。毛主检速的、林副主席指的人民解放军，在这场斗争中是干什么的？宽。现在我不明白，你们到斑还等什么？等中央的态度？或者可以挽教，或者不可阶级激人是干什么的？这是无产阶和套产阶级两条路的斗争。要看这个大是大以挽教，对整个形势还有什么影响呢？我不太明白这个间题。中央表不去态还能起非。至于哪个组微受压，个组受宠，那不是根本题，要分清改人和朋友。阶什么大的作用吧？我还没有着到，比如没，可以挽教又怎么样？不可以晚教又怎么敌人是不甘心失取的，要介石打倒了，国内还出来另外一个司合部。样？我不明白，在什么地方卡了壳。三派都是革命群众响！就算是不可以挽教"},{"type":"paragraph","text":"前几天中央首长接见新江代表时也讲了，刘少奇五次叛变，他早已是要介石的的，订联还是革命群众招；就算是可以挽教的，也不能设辽革站是保守祖。不人了吗！马明方是军统特务，就是介石的人嘛！分清故友，是毛选第一卷第一买明白你们等的是什么意思？有什么意义？我看是否还是个定性的问题，是刘邓司合的第一句话，婴抓住这个根本的问题。部的人，或者定不了性，是可以通过，还是不可以通过，我看问题不在这。这个周"},{"type":"paragraph","text":"至于广大群众不管是处于哪一种状态，都是革命群众。如期才讲的，有的受题已整很明确了。"},{"type":"paragraph","text":"压，有的没受任，都是二月道流的受害者。一种是受利用，一种是受压。暴发户也许多东西不是取决于打倒不打倒。末的检查，第一还是先找江联该的瓣！你们好，破落后也好，受压的也好，被利用的也好。中央都是革命辞众微。三派都也提出“要等我做工作，然给再跟他两派缺。”为什么要先找你们读？你们包是革命群众粗。还扯这个干什么？如果国民党代表人物上台，答你辽联、辽革被重嘛！你们提出拖一天也同意了。这是什么意思？目的是使辽联的同志争取主站、八三一都好不了。搞清二月范流，不要明你的微多么困难，你的假多么动，决不因为这个局题您了茫跟，就考虑别的东西。先与你们的目的，是让你们舒服。要考什么人搞的，劲不往哪儿使，在既儿使？！取主动，先走一步。现在你考虑一下，这个主动事取过来没有？没有争取过来"},{"type":"paragraph","text":"阶斗争最关键的不在于哪个组怎么样，而在于搞清敌人。当然，如果那个是个什么原因？过去包被背的重，与宋的关系密切，要与辽联分开，还是没有分组有坏人要报出来，敌人是？就是走资派马、顾、喻。如果宋不彻底交待，出开。你到等，还是与他挂在一诀，你们能不能和他脱开？"},{"type":"paragraph","text":"包括他在内。当然我们还要努力争取他。三大派部是革命群众组缘，有很好理可是，我理解你们还是把一些命运寄托在来的身上，是不是这样？不然为什么解，不管怎么样，要搞革命大联合，劲往这儿使。集中力量打走资派马、顾、喻，等呢？你们今天的就是看中央对他如何处理。最近，我注意看了各方面的材料：揭发批判末的问题。沈阳反映的，记者反映的，军区反映的，遇查粗反映的，从你们谈的，我个人有一"},{"type":"paragraph","text":"一月夺权是什么性质？我相信辽宁广大革命群众会作出正确结。革命造反派个感觉，好象还有什么摆不开似的。当然主现上有联在一起，但在实际上不可怎么样，敌人搞什么鬼，将来下结渝。经过“斗私，批修”。可以做到。但是跑不能没有联系，我指的不是在后面指挥。因为你们过去讲宋是革命额导干部，这是一出敌人，还是马、顾、喻。对夺权有各式各样的没法，暂时不下结验。其他工作可个方面的问题。那个底子还不变，就是挽教他，不是打倒他。当然要看他自己，看以不可以做？机关不管怎么夺权，将来成立省革委会，那是不算数的；基层也不管他能不能痛快快地向中夹交代，看他能不能同刘邓司部划清界限。中央对他的怎么夺的，也是凡滨联合起来成立革委会。检查怎么决定，我还不知随。如果因为我设为了挽教他的这个露，给你们背上了包"},{"type":"paragraph","text":"至于历史怎么泽价的开题，那是可以解决的。你们提到的具体即题，我可能不被，你特门己处理好了。我讲的意惠是换数稳。当然还取决于他自己，群众还需雾太清楚，但是大是大非、两条路的间题，要搞清楚，如解散这个翻、那个福帮助他。对末的问题，八三一设了一个小时，辽革站揭发批何了四个多小时，干部；武斗，这个挑起、那个挑起，我不大清楚，但大是大非、两条路机这个根本间"},{"type":"paragraph","text":"L搞了两个半天，两个通，据发批纠很激烈。到底对宋怎么定流，与辽联有什么解题，是清楚的。军队的周题是个什么性质的期题，宋任穷和马、顾、喻的间题是什不开的？为什么还要等中央的态度？这个间题我不太明白。现在我还看不出来，对么性质的问题；“三点意见”就是大是大非，就是挑动群众斗群众，挑拨军民关他本人怎么，对运动的大是大非会有什么影响。"},{"type":"paragraph","text":"系，让群众打得一粥，他们在旁边躲起来了，挑动武斗的根子就是这些人，是走（有人讲：能否宋的检查来设明沈阳的是非？）"},{"type":"paragraph","text":"资派，叛徒、特务。什么东塔机场事件，“八·一”事件等。以后会搞清楚，但我觉得你们等在什么地方，你设清楚了。等的是文化大革命的这一段，关心的这不是根本问题。“三点意见”影响很坏，恶毒透顶，使群众之间对立，对军区气是中央是否同意他的法。等的就是这个间题，关键就在这里。你们就：这个很大。“三点意见”七月四日敢回，但造成的恶果一直流传到现在。对待军队还是问题好不好？"},{"type":"paragraph","text":"这个样子，这是大是大非问题。不要搞这个怎么样、那个怎么样，来去，不外（有人讲到二、三月逊流的问题）"},{"type":"paragraph","text":"乎这个粗对的多一些，那个粗错的多一些。不管对一些错一些，将米有一条不决不允许拾二月道流翻案。二月流是搞的？决不是解放军搞的，是走资派变，就是三派都是革命群众组，婴搞革命大联合。搞的。当然军队有军队的贵任，决不能因为宋的检查把军认的责任取消了。如："},{"type":"paragraph","text":"干部合不结合，要按党的干部政策办事，要分析整个历史，在“三点意见”“三彻底”、“肃流毒”，军队同意了嘛！执行了嘛！但是性质与走资派完全不上站错了队，他错了明白了，改过来就行了，有什么了不起。在“三点意见”上站同，一个是认题，另一个完全是搞鬼，走资派是完完全全搞责本主义复蹄。这对的，还要看他整个历史。争这个是非有无必要，根本问题不是这个东西，现在争，次文化大革命，是国内战争的继续，是共产党跟国民党阶级斗争的继续。二月逆流将来搞清楚了，回头一看，大家就都要哑然失笑了。就那么回事！有什么了不是走资涨搞的。震林是叛徒，是搞资本主义复辟。刘少奇五次级变。马明方是军"},{"type":"paragraph","text":"起的。另一个问题，就是刚才的，等什么呢？你们等什么呢？就是等宋的检查中统特务。他们都是国民党的人。事实不是都进了鸣？不许为二月流翻案。在沈阳又会有什么其他影响呢？是否一翻案，宋又对了？马、顾、喻又对了？间了牛天，"},{"type":"paragraph","text":"文化大革命那一部分，文化大革命的是非问题，怎么看法。依我看，从他的检查中国人民解放军的二月流？！最近北京不是有人传要？！二月逆流在沈阳是材料来看，他已经是刘、邓司合部的人了。他跟邓小平的关系，不是一般关系，不搞的？不是走资派、特务、叛徒搞的，还能是搞的呢？反过来，如果把这些然能去通风报信贱？到邓小不那儿，邓小平恶毒咒骂毛主席，直到今年二月，宋还人保进米，那才是为二月流翻案，那才是复辟。如果宋不做这个检，还是站在有揭发。同样一块在邓小平下边工作的同志，陈司合员也是！还有谢富治同那一边，进去，那不也是复蹄嘛？现在能否挽教了他，要看他自己。从他的检查，"},{"type":"paragraph","text":"志，一直在和邓小平吵，就是在揭发宋的问题之前。在揭发问题之前还在吵。还有以你们和辽革站、八三一以及干部的揭发来看，他所干的一系列事情，我觉得这些的同志中央一提出邓小平的问题，就立即把他的底都揭发出来了。为什么宋直到现材料是够了，我觉得他是刘邓司合部的人，我不怀疑。如果这些人钻进革委会，就在才拿出这么一点东西？他是刘邓司合部的人，不冤任，他心里有鬼，他有这么是资本主义复辟。是沈阳军区搞的二月逆流？！不是宋任穷和马、顾、喻这些人搞多间题。文化大革命一段不用，也够清楚了。他不用写沈阳文化大革命这一段，的二月流？！如果是解放军搞的，这才是实正倒是非，才叫为二月逆流翻中央对沈阳文化大革命的是非已清楚了。宋是什么人？加上下边一帮拾辆子的案。厕才有的同志不是讲，北京有为二月逆流翻案的，好象有什么新的想法。那么二人，马、顾、喻不用讲就知道了，他们在沈阳能搞出什么好东西？！是非问题是可月道流是证搞的？就是马、顾、这帮人搞的嘛！究竞是敌人？是朋友？解放"},{"type":"paragraph","text":"以说清楚的。军是我们最相信的。倒了这个就不行！当然不是军队没有错。如果你们划不"},{"type":"paragraph","text":"沈阳军区怎么样？犯了方向路性错，已做了高姿态检查。但沈阳军区是中清界限，搞额倒了，就会敌我不分，就会犯错。"},{"type":"paragraph","text":"央信任的，是紧跟毛主席、林副主席的。他们有了谐就改，当然改的是不是彻底还有一个问题，二月流不仅表现在缺压选反派上，还有想利用文化大革命前"},{"type":"paragraph","text":"了，但总的是改了。段的果实，勿匆忙忙地把文化大革命压下去。如果去年辽宁革委会成立了，宋任穷"},{"type":"paragraph","text":"我，历史不是由宋任穷来价，而是用毛瀑东思想、由群众来价。我认为担任主任委员，当然，当时他不一定能得起辽宁革命委员会主任这个角色。喻屏他检查中后一部分根本就用不着写，对于他们所干的事情我怎么想，也想不到会有不定就能塞进去，喻屏到辽联去干什么？辽联不是开始也不同意他进去？后来什么好的地方。当然，每个事件他起多大作用，群众起来可以揭发，大家可以想一也塞进去了。喻屏当了主任，这就是另一种形式的复辟。"},{"type":"paragraph","text":"想，现在是非问题是不是清楚了。先明确了马、顾、喻，现在宋也出来啦，这个是你们反击二月流，把矛头搞结了，后米认端了就是了嘛。而且喻屏在里面搞非是清楚的。所以你们等中央的结论，有多大必。孔夫子旧书网"},{"type":"paragraph","text":"www.kongfz.com有些人觉得来的检查过份了，反而肥是非搞显了。我怎么也不能理解。有的同茶，反正自己拿出来，揭发出有什么关系，个别几个买头，发出案划清界限就是认跟不消楚，也可当有坏人在携动，故意搞品，故意这么股，是非是清楚的是了，大家知道后一段的一些站跟，有些头头也承担一部分贵任，现在认票到了，明，么显了呢！准而战没是我得同国民竞打伙，这是基本的大是大非，是我间什么坏头头？如果知道错了，反丽坚持，那叫环头头。人家满拟坏头头，不是消买了回民党，面具体怎么打的，这个部队动大，那个部队功小，你亡多大，我不环头头怕什么？没有关系。那么老的干部犯端旗，还那样对待，萃命群众招负知道，但是共产党消买了国民党！有些具体事实未写出亲，内幕交代不清楚，这无人有什么了不起的。列宁进：“年人犯始，上帝都可以原谅”。从正反教有关紧爱，重要的是洲条路模斗争，站在那一边，马、、和宋站在刘邓一边，沈青年，喝口水、晴晴记，有什么了不如的。阳区站在那一边？这很请楚鸣！考也具体开题，考走自已租问题多了，从大"},{"type":"paragraph","text":"过去是非不清，受了喝，上了当，现在坚决站在毛主您革命路一边，就能立是大非着眼，从国内战争继来考也，离子就不好转了。如果束任穷是什么人不新动，都是老适反诞鸭！一九六六年运动开始，打开沈阳文化大革命的局面，立下能下结端，那就好多是就不好定了，来的简题清楚了，大是大非就清楚了。至子很大功券，以后喝了儿口水，有什么了不起的，用不答担心，三派部是革命群众粗小是小非几蛋联合起来，搞清。"},{"type":"paragraph","text":"，决不因为这些事情而改变。这一既江联有的同志转过来啦，有些同志求过来，有各种各样原因，看亲有"},{"type":"paragraph","text":"每个组都混有坏人，要提高警惕，擦亮跟防，听说你们拾末家案，宋任包款，看家你有争取主动，时机语过啦，还等什么哥！不要把自己祖与束排穷是支持的，辽联里也有一些人是安持的吧？怎么能跟选些人关系搞的那久好，当在一起，在他身上奇托什么？要分开，你罚首先要得发批判，自已不最知何能主动？然这是认问题，是否也有坏人呢？宋任穷些牧这些人，这叫招降，这个告诉你们，首先要自已把求搞，原求我以为你们能理解我请的那个意思，就是让你们题要考虑。当然，不是站在辽联方面就是环人了，有些人表面是好心，实际上跟先起索罚庭发此家的间题。但是，有的人不但不损还有点延遮拖的。人家在坏人一样。订联这个员好的遗反艇，被他调给坑了，他们拿着支待活反额的那发，个别方不符合事，那有一点不签，主是对的。人家在搞发批到，辽每，你们上了当，除了这几个人，还有别人用支持你们的，能子里要有这根联趣在据发批制，得决裂，只有这样才能争取主动。世实在的，有些事情，辽联弦。宋和马回喻可以这么做，别人也可以这么做，他们不支持倒好，一支持倒把江比其他个组了解得更消楚，有什么就据需！结果等了二十几天，还不如那两派联坑了。当然不是避辽革站、八三一的粗里，没有坏人、坏干部啦，完全可能态尚。"},{"type":"paragraph","text":"有，低应当抓大的，不应当用小的干比我们，不婴举棋不定。只看到江革站、八三有的司志，于打倒算了，这是不负责任态度。你得蝎发批给中央反映，一有些什么同题，不知道自己该怎么办，或者个别人还想把签子搭住，矛盾是客观存由中央定性认为可以打何，就打倒，可以挽教就挽教，打创算了的情不对头。这在，早晚要暴发，越搭被动。一段我们对辽革站、八三一作了很多工作，对他们的来的退严，目的就是蓄望订联"},{"type":"paragraph","text":"有人没了，你们看到宋在黑老江亮相后，才保他的。中央对宋的态度和你们保自己起家干，三大联合思来揭发此判宋和马顾喻，在这个斗争中，促进革命大联他是两回事，根本不一样。中央对他的问题很清楚，他跟那些人的关系，中央掌提材合。几大跟都是革命友，要联合起亲干这个事，这样思想基础就牢固了。当然，现料最全，速他到邓小平家去几次都提清楚。对这些人中央部有专租，为什么中央在各里，是不是有过头的活，你哥讲了好多例子，主要矛质在你们这边，让你们保他，就是看想能否挽教、启发他自觉，总理就单找他获过。但是，你了这么多争取主动，你们不却来干，精果是越等越被动，能保人家在干中脱了几句蜡话？听工作，他还不自觉，无动于衷，你速他的语也保了，如“三点意见”，过去在你们只有部分机关揭发了问题，但总的是动起来，还在等，等什么呀！我很注东北所犯的一亲列结题，也往好的方面去讲，我看了你们的材料，其中有一份，意看你同辽联的动志，你们果然是在等。究竞等什么？就是宋不倒，你还能保对“我们为什么保求任穷”，部是评功摆好，你呵认为他是毛主席司合部的人，他错的一点点？就是宋打倒啦，你们还是革命群众粗微嘛！你们具体怎么做，我不好没，也往好的理解，因此，对他很不起，弯子转不过来。题不在这里，宋还没检查同相信辽联广大革命平众。"},{"type":"paragraph","text":"刘邓关系之前，辽革站、八三一就根据揭发材料把他定为走查派了，并不是看了他还有一个关于干都题，设是对过去支持过江联的干部，人人过关，压力很的这个检时，你们还买再看偶发出来的东西，他干的那些坏事到庭是好的是坏的。大，他们的问题婴分析一下看看，在对末的开题上，他们比其他人中毒深一些，有过去还有一条支持选反派，实际上是抗害造反，你也认为这是对的，这是罪必要搞清能。最近着到白潜揭发一些问题，态度比校好，开始起来划清界限，希望过！有很多间题婴过来认。如果你们再很不起来，再不报发批制，这就成开题辽联支持他哥，不要让他们背包敬太重。其他于部也过了一些浩活，你们开始斗啦。一句活，没有什么再等的啦，越等越被动，还是下定决心，粗群众，发动群孕当权派时，没有他过过头的活要？但坚信决不因跟了末任穷，支持了“三点意众来帮助他。中央对宋是有敏的，当然，还没有最后定下来，是通过还是通不过，是”就怎么样，主要认赠到是错了，能改正，能发就好。这些干部也有贵任帮助你们越等越被动，辽联是辽联、是革命群众组机，宋任穷是宋任穷，是刘邓司合订顺卸下来这个包。过去关采比较熟悉，跟宋跑的起远，也起了一些抗害江联的部的人。我们让他回来，回不回来，看他自己。我们要抓大方向，是揭、批宋的大作用。如果他们包底末任穷，反过来是害了辽联，过去末就是这样干的。如果宋任方向，还是等宋检查是大方间？还是集中力最揭批宋的问题，这是当前的大方向。穷和马顾搞了什么东西，现在还不告诉你们，过两个月明明端了还有告诉你"},{"type":"paragraph","text":"大家在共同的斗争中联合起来，敌人是清楚的，走资派是焉、顾、，宋揭发们，那你们才后悔呢！婴求他们出来揭发问题，是不是挑动群众斗群众，宋的检查批制看。辽革站、八三一是革命战友，要共同揭发批判，宋任穷打侧不打例，我超无坑害辽联桃动群众斗群众的意思。"},{"type":"paragraph","text":"们都得走联合起来共同斗争这一条路。希望你们下定决心，把等的思想去掉，勇敢还有的提婴抓坏头头，这个问题，我个人考虑，辽联革命群众最先起来造区，"},{"type":"paragraph","text":"战斗要往前走，不婴有其他方面想法，越怕越有鬼，实际上有鬼，鬼是人伯出来运动初期打开了沈阳文化大革命的局面，后一段上了宋任穷的当，犯了一些蜡，"},{"type":"paragraph","text":"的。我讲的这些是我个人的意见，提供大家考虑，希望对你们能有所帮助。有的错跟也相当严重。有些头头或者认识不清，或者自觉不自觉地同他们有一些联"},{"type":"paragraph","text":"有人没了，你们看到宋在黑老江亮相后，才保他的。中央对宋的态度和你们保自己起家干，三大联合思来揭发此判宋和马顾喻，在这个斗争中，促进革命大联他是两回事，根本不一样。中央对他的问题很清楚，他跟那些人的关系，中央掌提材合。几大跟都是革命友，要联合起亲干这个事，这样思想基础就牢固了。当然，现料最全，速他到邓小平家去几次都提清楚。对这些人中央部有专租，为什么中央在各里，是不是有过头的活，你哥讲了好多例子，主要矛质在你们这边，让你们保他，就是看想能否挽教、启发他自觉，总理就单找他获过。但是，你了这么多争取主动，你们不却来干，精果是越等越被动，能保人家在干中脱了几句蜡话？听工作，他还不自觉，无动于衷，你速他的语也保了，如“三点意见”，过去在你们只有部分机关揭发了问题，但总的是动起来，还在等，等什么呀！我很注东北所犯的一亲列结题，也往好的方面去讲，我看了你们的材料，其中有一份，意看你同辽联的动志，你们果然是在等。究竞等什么？就是宋不倒，你还能保对“我们为什么保求任穷”，部是评功摆好，你呵认为他是毛主席司合部的人，他错的一点点？就是宋打倒啦，你们还是革命群众粗微嘛！你们具体怎么做，我不好没，也往好的理解，因此，对他很不起，弯子转不过来。题不在这里，宋还没检查同相信辽联广大革命平众。"},{"type":"paragraph","text":"刘邓关系之前，辽革站、八三一就根据揭发材料把他定为走查派了，并不是看了他还有一个关于干都题，设是对过去支持过江联的干部，人人过关，压力很的这个检时，你们还买再看偶发出来的东西，他干的那些坏事到庭是好的是坏的。大，他们的问题婴分析一下看看，在对末的开题上，他们比其他人中毒深一些，有过去还有一条支持选反派，实际上是抗害造反，你也认为这是对的，这是罪必要搞清能。最近着到白潜揭发一些问题，态度比校好，开始起来划清界限，希望过！有很多间题婴过来认。如果你们再很不起来，再不报发批制，这就成开题辽联支持他哥，不要让他们背包敬太重。其他于部也过了一些浩活，你们开始斗啦。一句活，没有什么再等的啦，越等越被动，还是下定决心，粗群众，发动群孕当权派时，没有他过过头的活要？但坚信决不因跟了末任穷，支持了“三点意众来帮助他。中央对宋是有敏的，当然，还没有最后定下来，是通过还是通不过，是”就怎么样，主要认赠到是错了，能改正，能发就好。这些干部也有贵任帮助你们越等越被动，辽联是辽联、是革命群众组机，宋任穷是宋任穷，是刘邓司合订顺卸下来这个包。过去关采比较熟悉，跟宋跑的起远，也起了一些抗害江联的部的人。我们让他回来，回不回来，看他自己。我们要抓大方向，是揭、批宋的大作用。如果他们包底末任穷，反过来是害了辽联，过去末就是这样干的。如果宋任方向，还是等宋检查是大方间？还是集中力最揭批宋的问题，这是当前的大方向。穷和马顾搞了什么东西，现在还不告诉你们，过两个月明明端了还有告诉你"},{"type":"paragraph","text":"大家在共同的斗争中联合起来，敌人是清楚的，走资派是焉、顾、，宋揭发们，那你们才后悔呢！婴求他们出来揭发问题，是不是挑动群众斗群众，宋的检查批制看。辽革站、八三一是革命战友，要共同揭发批判，宋任穷打侧不打例，我超无坑害辽联桃动群众斗群众的意思。"},{"type":"paragraph","text":"们都得走联合起来共同斗争这一条路。希望你们下定决心，把等的思想去掉，勇敢还有的提婴抓坏头头，这个问题，我个人考虑，辽联革命群众最先起来造区，"},{"type":"paragraph","text":"战斗要往前走，不婴有其他方面想法，越怕越有鬼，实际上有鬼，鬼是人伯出来运动初期打开了沈阳文化大革命的局面，后一段上了宋任穷的当，犯了一些蜡，"},{"type":"paragraph","text":"的。我讲的这些是我个人的意见，提供大家考虑，希望对你们能有所帮助。有的错跟也相当严重。有些头头或者认识不清，或者自觉不自觉地同他们有一些联"}],"authors":["毛远新"],"dates":[{"year":1968,"month":3,"day":20}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":2},"tags":[{"name":"邓小平","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"宋任穷","type":"人物"},{"name":"毛远新","type":"人物"},{"name":"辽宁省革命造反派大联合委员会（辽联）","type":"人物"},{"name":"辽宁无产阶级革命派联络站（辽革站）","type":"人物"},{"name":"（辽宁）毛泽东思想八三一沈阳革命造反总司令部（八三一）","type":"人物"},{"name":"辽宁文革","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"革命委员会","type":"主题/事件"},{"name":"二月逆流","type":"主题/事件"},{"name":"武斗","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]},{"id":"maoistlegacy.de-5250","name":"毛远新同志在辽联赴京代表团座谈会上的讲话纪要","author":"毛远新","internal":false,"official":false,"type":"unknown","files":[],"article":{"title":"毛远新同志在辽联赴京代表团座谈会上的讲话纪要","dates":[{"year":1968,"month":3,"day":20}],"is_range_date":false,"authors":["毛远新"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"资料: 一九六八年毛远新“讲话”, 宋任穷“检查”, 16-27 (MLC, D196)","tags":[],"parts":[{"type":"title","text":"毛远新同志在辽联赴京代表团座谈会上的讲话纪要"},{"type":"subtitle","text":"一九六八年三月二十日"},{"type":"subtitle","text":"（根据记录整理，未经本人审阅）"},{"type":"paragraph","text":"你们在北京的代表还在等，等中央的态度，我不理解。你们还等什么？等着看宋任穷是能挽救，还是不能挽救啊？有人提出宋任穷的问题，让我交个底。这个底，讲的那三条意见，已经完全交给你们了，可能你们还没有认眞去考虑，去硏究。现在我不明白，你们到底还等什么？等中央的态度？或者可以挽救，或者不可以挽救，对整个形势还有什么影响呢？我不太明白这个问题。中央表不表态还能起什么大的作用呢？我还没有看到。比如说，可以挽救又怎么样？不可以挽救又怎么样？我不明白，在什么地方卡了壳。三派都是革命群众组织嘛！就算是不可以挽救的，辽联还是革命群众组织;就算是不可以挽救的，也不能说辽革站是保守组织。不明白你们等的是什么意思？有什么意义？我看是否还是个定性的问题，是刘邓司令部的人，或者定不了性，是可以通过，还是不可以通过，我看问题不在这。这个问题巳经很明确了。"},{"type":"paragraph","text":"许多东西不是取决于打倒不打倒。宋的检查，第一还是先找辽联谈的嘛！你们也提出“要等我们做工作，然后再跟他们两派谈。”为什么先找你们谈？你们包袱重嘛！你们包袱重嘛！你们提出拖一天也同意了。这是什么意思？目的是使辽眹的同志争取主动，决不因为这个问题犯了错误，就考虑别的东西。先与你们谈的目的，是让你们争取主动，先走一步。现在你们考虑一下，这个主动争取过来没有？没有争取过来是个什么原因？过去包袱背的重，与宋的关系密切，要与辽联分开，还是没有分开。你们等，还是与他挂在一块，你们能不能和他脱开？"},{"type":"paragraph","text":"可是，我理解你们还是把一些命运寄托在宋的身上，是不是这样？不然为什么等呢？你们今天谈的就是看中央对他如付处理。最近，我注意看了各方面的材料：沈阳反映的，记者反映的，军区反映的，调查组反映的，从你们谈的，我个人有一个感覚，好象还有什么摆脱不开似的。当然主现上没有联在一起，但在实际上不可能没有联系，我指的不是在后面指挥。因为你们过去讲宋是革命领导干部，这是一个方面的问题。那个底子还不变，就是挽救他，不是打倒他。当然要看他自己，看他能不能痛痛快快地向中央交代，看他能不能同刘邓司令部划淸界限。中央对他的检查怎么决定，我还不知道。如果因为我说为了挽救他的这个话，给你们背上了包袱,你们自己处理好了。我讲的意思是挽救他。当然还取决于他自己，群众还需要帮助他。对宋的问题，八三一说了一个小时，辽革站揭发批判了四个多小时，干部搞了两个半天，两个通宵，掲发批判很激烈。到底对宋怎么定论，与辽联有什么解不开的？为什么还要等中央的态度？这个问题我不太明白。现在我还看不出来，对他本人怎么结论，对运动的大是大非会有什么影晌。"},{"type":"paragraph","text":"（有人讲：能否按宋的检查来说明沈阳的是非？）"},{"type":"paragraph","text":"我覚得你们等在什么地方，你说淸楚了。等的是文化大革命的这一段，关心的是中央是否同意他的的说法。等的就是这个问题，关键就在这里。你们就说说：这个问题好不好？"},{"type":"paragraph","text":"（有人讲到二、三月逆流的问题）"},{"type":"paragraph","text":"决不允许给二月逆流翻案。二月逆流是谁搞的？决不是解放军搞的，是走资派搞的。当然军队有军队的责任，决不能因为宋的检查把军队的责任取消了。如：“三彻底”、“肃流毒”，军队同意了嘛！执行了嘛！但是性质与走资派完全不同，一个是认识问题。另一个完全是搞鬼，走资派是完完全全搞资本主义复辟。这次文化大革命，是国内战争的継续，是共产党跟国民党阶级斗争的继续。二月逆流是走资派搞的。谭震林是叛徒，是搞资本主义复辟。刘少奇五次叛变。马明芳是军统特务。他们都是国民党的人。事实不是都讲了吗？不许为二月逆流翻案。在沈阳又会有什么其他影晌呢？是否一翻案，宋又对了？马、顾、喻又对了？閙了半天，中国人民解放军搞的二月逆流？！最近北京不是有人传吗？！二月逆流在沈阳是谁搞的？不是走资派、特务、叛徙搞的，还能是谁搞的呢？反过来说，如果把这些人保进来，那才是为二月逆流翻案，那才是复辟。如果宋不做这个检讨，还是站在那一边，进去，那不也是复辟嘛？现在能否挽救了他，要看他自己。从他的检查，从你们和辽革站、八三一以及干部的揭发来看，他所干的一系列事情，我覚得这些材料是够了，我覚得他是刘邓司令部的人，我不怀疑。如果这些人钴进革委会，就是资本主义复辟。是沈阳军区搞的二月逆流？！不是宋任穷和马、顾、喻这些人搞的二月逆流？如果说是解放军搞的，这才是真正颠倒是非，才叫为二月逆流翻案。刚才看的同志不是讲，北京有为二月逆流翻案的，好象有什么新的想法。那么二月逆流是谁搞的？就是马、顾、喻这帮人搞的嘛！究竟谁是敌人？谁是朋友？解放军是我们最相信的。顚倒了这个就不行！当然不是说军队没有错误。如果你们划不淸界限，搞顚倒了，就会敌我不分，就会犯错误。"},{"type":"paragraph","text":"还有一个问题，二月逆流不仅表现在镇压造反派上，还有想利用文化大革命前段的果实，匆匆忙忙地把文化大革命压下去。如果去年辽宁革委会成立了，宋任穷担任主任委员，当然，当时他不一定能瞧得起辽宁革命委员会主任这个角色。喻屛说不定就能塞进去，喻屛到了辽联去干什么？辽联不是开始也不同意他进去吗？后来也塞进去了。喻屛当了主任，这就是另一种形式的复辟。"},{"type":"paragraph","text":"你们反击二月逆流，把矛头搞错了，后来认识了就是了嘛。而且喻屛在里面搞了很多鬼，现在看问题要从本质上去考虑，从以毛主席为首的无产阶级司令部和刘邓的资产阶级司令部的斗争来考虑。主席说：文化大革命实际上是和蒋家王朝斗争的继续。毛主席缔造的、林副主席指挥的人民解放军，在这场斗争中是干什么的？阶级敌人是干什么的？这是无产阶级和资产阶级两条路綫的斗争。要看这个大是大非。至于哪个组织受压，哪个组织受宠，那不是根本问题，要分淸敌人和朋友。阶级敌人是不甘心失败的，蒋介石打倒了，国内还出来另外一个司令部。"},{"type":"paragraph","text":"前几天中央首长接见浙江代表时也讲了，刘少奇五次叛变,他早已是蒋介石的人了吗？马明芳是军统特务，就是蒋介石的人嘛！分清敌友，是毛选第一卷第一页的第一句话，要抓住这个根本的问题。"},{"type":"paragraph","text":"至于广大群众不管是处于哪一种状态，都是革命群众。如刚才讲的，有的受压，有的没受压，都是二月逆流的受害者。一种是受利用，一种是受压，暴发户也好，破落户也好，受压的也好，被利用的也好。中央都说是革命群众组织。三派都是革命群众组织。还扯这个干什么？如果国民党代表人物上台，管你辽联、辽革站、八三一都好不了。搞清二月逆流，不要証明你的组织多么困难，你的组织多么舒服。要考虑什么人搞的，劲不往那儿使，往哪儿使？！"},{"type":"paragraph","text":"阶级斗争最关键的不在于哪个组织怎么样，而在于搞淸敌人。当然，如果那个组织有坏人要揪出来，敌人是谁？就是走资派马、顾、喩。如果宋不彻底交待，也包括他在内。当然我们还要努力争取他。三大派都是革命群众组织，没有很好理解,不管怎么样，要搞革命大联合，劲往这儿使。集中力量打走资派马、顾、喩，掲发批判宋的问题。"},{"type":"paragraph","text":"一月夺权是什么性质？我相信辽宁广大革命群众会作出正确结论。革命造反派怎么样，敌人搞什么鬼，将来下结论。经过“斗私，批修”，可以做到。但是跑不出敌人，还是马、顾、喩。对夺权有各式各样的说法，暂时不下结论。其他工作可以不可以做？机关不管怎么夺权，将来成立省革委会，那是不算数的；基层也不管怎么夺的，也是几派联合起来成立革委会。"},{"type":"paragraph","text":"至于历史怎么评价的问题，那是可以解决的。你们提到的具体问题，我可能不太清楚，但是大是大非、两条路綫的问题，要搞淸楚，如解散这个组织、那个组织；武斗，这个挑起，那个挑起，我不大淸楚，但大是大非、两条路綫这个根本问题，是清楚的。军队的问题是个什么性质的问题，宋任穷和马、顾、喩的问题是个什么性质的问题；“三点意见”就是大是大非，就是挑动群众斗群众，挑拨军民关系,让群众打得一锅粥，他们在旁边躲起来了，挑动武斗的根子就是这些人，是走资派、叛徒、特务。什么东塔机场事件，“八•一〇”事件等，以后会搞淸楚，但这事不是根本问题。“三点意见”影响很坏，恶毒透顶，使群众之间对立，对军区气很大。“三点意见”七月四日收回，但造成的恶果一直流传到现在。对待军队还是这个样子，这是大是大非问题。不要搞这个怎么样、那个怎么样，说来说去，不外乎这个组织对的多一些，那个组织错的多一些，不管对一些错一些，将来有一条不变，就是三派都是革命群众组织，要搞革命大联合。"},{"type":"paragraph","text":"干部结合不结合，要按党的干部政策办事，要分析整个历史，在“三点意见”上站错了队，他错了明白了，改过来了就行，有什么了不起。在“三点意见”上站对的，还要看他整个历史。争这个是非有无必要，根本问题不是这个东西，现在争，将来搞淸楚了，回头一看，大家就都要哑然失笑了。就那么回事嘛！没有什么了不起的。"},{"type":"paragraph","text":"另一个问题，就是刚才说的，等什么呢？你们等什么呢？就是等宋的检查中文化大革命那一部分，文化大革命的是非问题，怎么看法。依我看，从他的检查材料来看，他已经是刘、邓司令部的人了。他跟邓小平的关系，不是一般关系，不然能去通风报信吗？到邓小平那儿，邓小平恶毒咒骂毛主席,直到今年二月，宋还没有掲发。同样一块在邓小平下边工作的同志，陈司令员也是吗！还有谢富治同志，一直在和邓小平吵，就是在揭发宋的问题之前。在揭发问题之前还在吵。还有的同志中央一提出邓小平的问题，就立即把他的底都揭发出来了。为什么宋直到现在才拿出这么一点东西？说他是刘邓司令部的人，不寃枉，他心里有鬼，他有这么多问题。文化大革命一段不用说，也够淸楚了。他不用写沈阳文化大革命这一段，中央对沈阳文化大革命的是非已经清楚了。宋是什么人？加上下边这一帮抬轿子的人，马、顾、喻不用讲就知道了，他们在沈阳能搞出什么好东西？！是非问题是可以说淸楚的。"},{"type":"paragraph","text":"沈阳军区怎么样？犯了方向路綫性错误，已做了高姿态检查,但沈阳军区是中央信任的，是紧跟毛主席、林副主席的，他们有了错误就改，当然改的是不是彻底了，但总的是改了。"},{"type":"paragraph","text":"我说，历史不是由宋任穷来评价，而是用毛泽东思想、由群众来评价。我认为他检查中后一部分根本就用不着写，对于他们所干的事情我怎么想，也想不到会有什么好的地方。当然，每个事件他起多大作用，群众起来可以揭发，大家可以想一想，现在是非问题是不是淸楚了。先明确了马、顾、喩，现在宋也出来啦，这个是非是淸楚的。所以你们等中央的结论，没有多大必要。"},{"type":"paragraph","text":"有些人覚得宋的检查过份了，反而把是非搞混了。我怎么也不能理解。有的同志是认识不淸楚，也可能有坏人在挑动，故意捣乱，故意这么说，是非是淸楚的吗，怎么混了呢？！淮海战役是我们同国民党打仗，这是基本的大是大非，是我们消灭了国民党，而具体怎么打的，这个部队功大，那个部队功小，伤亡多大，我不知道，但是共产党消灭了国民党吗！有些具体事实未写出来，内幕交待的不清楚，这无关紧要，重要的是两条路綫的斗争，站在那一边，马、顾、喩和宋站在刘邓一边，沈阳军区站在那一边？这很淸楚吗！考虑具体问题，考虑自己组织问题多了，没从大是大非着眼，没从国内战争继续来考虑，弯子就不好转了。如果宋任穷是什么人不能下结论，那就好多是非就不好定了，宋的问题淸楚了，大是大非就淸楚了。至于小是小非几派联合起来，能搞淸楚。"},{"type":"paragraph","text":"这一段辽联有的同志转过来啦，有些同志未转过来，有各种各样原因，看来有包袱，看来你们没有争取主动，时机错过啦，还等什么呀！不要把自己组织与宋扭在一起，在他身上寄托什么？要分开，你们首先要揭发批判，自己不揭如何能主动？吿诉你们，首先要自己起来搞，原来我以为你们能理解我讲的那个意思，就是让你们先起来揭发批判宋的问题。但是，有的人不但不揭还有点遮遮掩掩的。人家在那揭发，个别地方不符合事实，那有一点不差，主流是对的。人家在揭发批判,辽眹也在揭发批判，彻底决裂，只有这样才能争取主动。说实在的，有些事情，辽联比其他两个组织了解得更淸楚，有什么就揭吗！结果等了二十几天，还不如那两派姿态高。"},{"type":"paragraph","text":"有的同志讲，干脆打倒算了，这是不负责任态度。你们揭发批判给中央反映，由中央定性认为可以打倒，就打倒，可以挽救就挽救，打倒算了的情绪不对头。这一段我们对辽革站、八三一作了很多工作，对他们约束的很严，目的就是希望辽联自己起来干，三大派联合起来揭发批判宋和马顾喻，在这个斗争中，促进革命大联合。几大派都是革命战友，要联合起来干这个事，这样思想基础就牢固了。当然，现在各组织，是不是有过头的话，你们讲了好多例子，主要矛盾在你们这边，让你们争取主动，你们不起来干，结果是越等越被动，能怪人家在干中说了几句错话？听说你们只有部分机关揭发问题，但总的是没动起来，还在等，等什么呀！我很注意看你们辽联的动态，你们果然是在等。究竞等什么？就是宋不倒，你们还能保对一点点？就是宋打倒啦，你们还是革命群众组织嘛！你们具体怎么做，我不好说，相信辽联广大革命群众。"},{"type":"paragraph","text":"还有一个关于干部问题，说是对过去支持过辽联的干部，人人过关，压力很大，他们的问题要分析一下看看，在对宋的问题上，他们比其他人中毒深一些，有必要搞淸楚。最近看到白潜揭发一些问题，态度比较好，开始起来划淸界限，希望辽联支持他们，不要让他们背包袱太重。其他干部也说过了一些错话，你们开始斗争当权派时，没有说过过头的话吗？但坚信决不因跟了宋任穷，支持了“三点意见”就怎么样，主要认识到是错了，能改正，能揭发就好。这些干部也有责任帮助辽联卸下来这个包袱。过去关系比较熟悉，跟宋跑的挺远，也起了一些坑害辽联的作用。如果他们包庇宋任穷，反过来是害了辽联，过去宋就是这样干的。如果宋任穷和马顾喩搞了什么东西，现在还不吿诉你们，过两个月明明错了还没有告诉你们，那你们才后悔呢！要求他们出来揭发问题，是不是挑动群众斗群众，宋的检查绝无坑害辽联挑动群众斗群众的意思。"},{"type":"paragraph","text":"还有的提要抓坏头头，这个问题，我个人考虑，辽联革命群众最先起来造反，运动初期打开了沈阳文化大革命的局面，后一段上了宋任穷的当，犯了一些错误，有的错误也相当严重。有些头头或者认识不淸，或者自覚不自覚的同他们有一些联系，反正自已拿出来，揭发出来有什么关系，个别几个头头，揭发出来划清界限就是了。大家知道后二段的一些错误，有些头头也承担一部分责任，现在认识到了，叫什么坏头头？如果知道错了，反而坚持，那才叫坏头头？人家讲揪坏失头，不是坏头头怕什么？没关系。那么老的干部犯错误，还那样对待，革命群众组织负责人有什么了不起的。列宁讲：“年辉人犯错误，上帝都可以原谅”。从正反面敎育靑年，喝口水、啃啃泥，有什么了不起的。"},{"type":"paragraph","text":"过去是非不淸，受了骗，上了当，现在坚决站在毛主席革命路綫一边，就能立新功，都是老造反派嘛！一九六六年运动开始，打开沈阳文化大革命的局面，立下很大功劳，以后喝了几口水，有什么了不起的，用不着担心，三派都是革命群众组织，决不因为这些事情而改变。"},{"type":"paragraph","text":"每个组织都混有坏人，要提高警惕，擦亮眼睛，听说你们给宋黎翻案，宋任穷是支持的，辽联里也有一些人是支持的吧？怎么能跟这些人关系搞的那么好，当然这是认识问题，是否也有坏人呢？宋任穷能收拢这些人，这叫招降纳叛，这个问题要考虑。当然，不是说站在辽联方面就是坏人了，有些人表面是好心，实际上跟坏人一样。辽联这个很好的造反派组织，被他们给坑了，他们拿着支持造反派的诱饵，你们上了当，除了这几个人还有别人用诱饵支持你们的，脑子里要有这根弦。宋和马顾喩可以这么做？别人也可以这么做，他们不支持倒好，一支持倒把辽联坑了。当然不是说辽革站、八三一的组织里，没有坏人、坏干部啦，完全可能有，但应当抓大的，不应当用小的干扰我们，不要举棋不定。只看到辽革站、八三一有些什么问题，不知道自己该怎么办，或者个别人还想把盖子捂住，矛盾是客现存在，早晚要暴发，越捂越被动。"},{"type":"paragraph","text":"有人说了，你们看到宋在黑龙江亮相后，才保他的。中央对家的态度和你们保他是两回事，根本不一样。中央对他的问题很淸楚，他跟那些人的关系，中央掌握材料最全，连他到邓小平家去几次都很淸楚。对这些人中央都有专案组，为什么中央保他，就是看他能否挽救，启发他自覚，总理就单独找他讲过。但是，作了这么多工作，他还不自覚，无动于衷，你们连他的错误也保了，如“三点意见”，过去在东北所犯的一系列错误，也往好的方面去讲，我看了你们的材料，其中有一份，“我们为什么保宋任穷”，都是评功摆好，你们认为他是毛主席司令部的人，他错的也往好的理解，因此，对他恨不起来，弯子转不过来，问题不在这里，宋还检查同刘邓关系之前，辽革站、八三一就根据揭发材料把他定为走资派了，幷不是看了他的这个检讨，你们还要再看揭发出来的东西，他干的那些坏事到底是好的是坏的。过去还有一条支持造反派，实际上是坑害造反派，你们也认为这是对的，这是罪过！有很多问题要翻过来认识。如果你们再恨不起来，再不揭发批判，这就成问题啦。一句话，没有什么再等的啦，越等越被动，还是下定决心，组织群众，发动群众来报助他。中央对宋是有数的，当然，还没有最后定下来，是通过还是通不过，你们越等越被动，辽联是辽联，是革命群众组织，宋任穷是宋任穷，是刘邓司令部的人。我们让他回来，回不回来，看他自己。我们要抓大方向，是揭、批宋的大方向，还是等宋检查是大方向？还是集中力量揭批宋的问题，这是大方向。"},{"type":"paragraph","text":"大家在共同的斗争中联合起来，敌人是淸楚的，走资派是马、頋、喩，家揭发批判看。辽革站、八三一是革命战友，要共同揭发批判，宋任穷打倒不打倒，我们都得走联合起来共同斗争这一条路。希望你们下定决心，把等的思想去掉，勇敢战斗要往前走，不要有其他方面想法，越怕越有鬼，实际上没有鬼，鬼是人怕出来的。"},{"type":"paragraph","text":"我讲的这些是我个人的意见，提供大家考虑，希望对你们能有所帮助。"}],"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"宋任穷","type":"人物"},{"name":"毛远新","type":"人物"},{"name":"辽宁省革命造反派大联合委员会（辽联）","type":"人物"},{"name":"辽宁无产阶级革命派联络站（辽革站）","type":"人物"},{"name":"（辽宁）毛泽东思想八三一沈阳革命造反总司令部（八三一）","type":"人物"},{"name":"辽宁文革","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"革命委员会","type":"主题/事件"},{"name":"二月逆流","type":"主题/事件"},{"name":"武斗","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ab2dc643f4"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
