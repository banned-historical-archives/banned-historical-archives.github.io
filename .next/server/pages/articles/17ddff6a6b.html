script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"950e9df4-aa2c-4029-aaf2-fd60037b0bf9","name":"十月七日访问中共中央接待站记录整理","internal":false,"type":"img","official":false,"author":"沈立国 杨永星 杨登国","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives21/main/950e9df4-aa2c-4029-aaf2-fd60037b0bf9/1.jpg"],"article":{"title":"十月七日访问中共中央接待站记录整理","alias":"","parts":[{"type":"paragraph","text":"十月七日访问中共中央接待站记录整理访问人·北京石油学院沈立国·杨永星·杨登国。地点：中共中央接待站接待员：陈文秀。一问：什么样的材料应退还本人！是否所有的材料都要退还？"},{"type":"paragraph","text":"答：根据中央指示和军委紧急指示，应退还本人的材料，是指本"},{"type":"paragraph","text":"人所做的书面检查·凡是组织整理的整学生的材料处理办法一律由群众讨论决定·会记录和其他任何记录，中央有规定具体处理办法·需要请示中央·所有大字报底稿和书面揭发材料概不退还本人·除此以外其他材料中央没有规定处"},{"type":"paragraph","text":"理办法，都要中央指示办事元问：党员会，党的干部会和上领导人的报告和指示有人要求公"},{"type":"paragraph","text":"开于众行不行！答：档案餐料是国家机密·按中央文件规定不能动·"},{"type":"paragraph","text":"党委会和上级指示是不能公开的·如果上般党委烂了，当权派是黑帮，要由上一般党委公开·揭发是可以的，全部公开"},{"type":"paragraph","text":"是不可以的·三问：学校里群众指是谁？"},{"type":"paragraph","text":"答·在学校里群众指的是学生，教师应属于干部·因此学校里讲"},{"type":"paragraph","text":"的群众斗群众，其实还是指学生斗学生，要把材料退还群众也只限于学生·"},{"type":"paragraph","text":"转秒：北工大六系张传良"}],"authors":["杨永星","杨登国","沈立国"],"dates":[{"year":1966,"month":10,"day":7}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"17ddff6a6b"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
