script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"从一只幻灯泡看到资产阶级的无耻行为","authors":["徐隆伯"],"dates":[{"year":1952,"month":3,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编辑同志:我们为了开展幻灯宣传工作，曾花了十五万元在上海南京东路一家电气股分有限公司买了220V·500W·的幻灯泡一只。买的时候，该公司曾试了一试，光亮很好，就用硬盒包装起来。我们把它放置在帆布包里，一路乘车小心翼翼地拿了回来。晚间我们拿出来试用，不料还不到十分钟，里面的钨丝连着玻璃心都脱落了。显然这是灯泡厂老板偷工减料的结果。对这样的事实，我是非常愤怒和痛恨，也使我更清楚的看到了这些资本家唯利是图的无耻行为!"},{"type":"paragraph","text":"南汇县人民文化馆　徐隆伯"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"423effd158"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
