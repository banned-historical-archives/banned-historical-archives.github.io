<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"毛泽东号（中篇连载）","authors":["丁克辛　轻影"],"dates":[{"year":1950,"month":9,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛泽东号（中篇连载）"},{"type":"paragraph","text":"（丁克辛轻影作）"},{"type":"paragraph","text":"十一、得“机车领袖”奖"},{"type":"paragraph","text":"回到段上，老英雄打主意找郑笃恭去说理。"},{"type":"paragraph","text":"又一想：自己是司机长；宋代表也说过，当干部，肚里要能撑船，不能眼里下不去一粒沙子。"},{"type":"paragraph","text":"想了又想，就忍下这口气。"},{"type":"paragraph","text":"老英雄有这么一好：不管遇上什么不痛快的事，只要一见别人关心工作，干活起劲，就乐了。张传忠来找他谈油的问题，他把“委屈”忘记了。"},{"type":"paragraph","text":"张传忠谈：软油太稀，车轮一转就把油溅飞了，用硬油又滴不进油管去。汽缸油是最好，但汽缸油一来太贵，二来太缺，怎么办？"},{"type":"paragraph","text":"“我也早见到这个了，……咱们自己想办法解决不行吗？”"},{"type":"paragraph","text":"“可也得你司机长领导啊。”"},{"type":"paragraph","text":"老英雄下决心领导大家研究，把硬油、软油和车轴油搅在一起熬成混合油。"},{"type":"paragraph","text":"一试，不仅好使，而且节省："},{"type":"paragraph","text":"哈尔滨到一面坡，一百六十二公里，以前软油用五斤，现在混合油三斤就够了。"},{"type":"paragraph","text":"新创造，好办法，领导上把它一推广，全段都称赞“毛泽东号”。"},{"type":"paragraph","text":"省煤省油，保护机车，“毛泽东号”都是模范。"},{"type":"paragraph","text":"跑车还特别操纵得好！"},{"type":"paragraph","text":"没有出过事故，每月安全走行都超过五千公里（当时一般机车每月只能走行三四千公里）。"},{"type":"paragraph","text":"十月间评功，被评为一等大功组，得了奖旗一面，上面写着四个大字："},{"type":"paragraph","text":"“机车领袖”。"},{"type":"paragraph","text":"十二、响应号召"},{"type":"paragraph","text":"冬天来了，东北人民解放军三下江南打击敌人，后方支援前线工作更为加紧。"},{"type":"paragraph","text":"要节约人力物力，机车三班人减成两班，“毛泽东号”也调走了张传忠等三个人。"},{"type":"paragraph","text":"正好“朱德号”又奉命落火入库。"},{"type":"paragraph","text":"机务段宋代表也要调走，他怕大家竞赛情绪受影响，临走还鼓励大家要继续贯彻负责制，做出更大的成绩，争取第二面奖旗。"},{"type":"paragraph","text":"自从得了“机车领袖”的奖旗以后，司机商宝恒也感到很光荣很痛快，工作显得积极起来。听宋代表一号召，他就头一个响应道："},{"type":"paragraph","text":"“争取第二面奖旗，没有问题！朱德号落火，咱们独个儿干！”"},{"type":"paragraph","text":"李永老英雄跟着说道："},{"type":"paragraph","text":"“商大车说了没问题，一定没问题，大伙儿怎么样？”"},{"type":"paragraph","text":"大伙都说："},{"type":"paragraph","text":"“没问题！”“没问题！”"},{"type":"paragraph","text":"于是小组公约订立了！大家约好："},{"type":"paragraph","text":"不欠勤，少回家；"},{"type":"paragraph","text":"洗罐（注一）时要帮着动手；"},{"type":"paragraph","text":"学习检修，提高技术；"},{"type":"paragraph","text":"团结互助，完成任务……等等。"},{"type":"paragraph","text":"“人们都瞪着大眼看着哪，咱们可得加油干。”有人和郑笃恭说。"},{"type":"paragraph","text":"“对，一不做，二不休，干吧！”"},{"type":"paragraph","text":"老郑居然这样回答。"},{"type":"paragraph","text":"注一：就是洗锅炉。乙丙检也叫洗罐。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"朱德","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"037b2aac57"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
