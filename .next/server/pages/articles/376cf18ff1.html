script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji49","name":"毛泽东全集第49卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji49.pdf"],"article":{"title":"给周恩来的信","alias":"","parts":[{"type":"paragraph","text":"给周恩来的信"},{"type":"paragraph","text":"（1966年12月27日）恩来同志："},{"type":"paragraph","text":"最近，不少来京革命师生和革命群众来信问我，给走资本主义道路的当权派和牛鬼蛇神戴高帽子、打花脸、游街是否算武斗？我认为：这种做法应该算是武斗的一种形式。这种做法不好。这种做法达不到教育人民的自的。这里我强调一下，在斗争中一定要坚持文斗，不用武斗，因为武斗只能触及人的身体，不能触及人的灵魂。只有坚持文斗，不用武斗，摆事实，讲道理，以理服人，才能斗出水平来，才能真正达到教育人民的目的。应该分析，武斗绝大多数是少数别有用心的资产阶级反动分子挑动起来的，他们有意破坏党的政策，破坏无产阶级文化大革命，降低党的威信。凡是动手打人的，应该依法处之。"},{"type":"paragraph","text":"请转告来京革命师生和革命群众。"},{"type":"paragraph","text":"毛泽东一九六六年十二月二十七日"}],"authors":["毛泽东"],"dates":[{"year":1966,"month":12,"day":27}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":241,"page_end":241},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"武斗","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"376cf18ff1"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
