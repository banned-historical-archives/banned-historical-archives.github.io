" crossorigin="">{"props":{"pageProps":{"books":[{"id":"c814e28a-6a5d-435e-b402-3c375ab69c97","name":"张春桥和上海工司常委的三份指示（1967.3）","internal":false,"official":false,"type":"img","author":"张春桥，上海工司常委，1967.3，上海红旗锅炉厂造反兵团翻印、青浦县朱家角镇中心校毛泽东思想红卫兵司令部翻印","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/c814e28a-6a5d-435e-b402-3c375ab69c97/1.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/c814e28a-6a5d-435e-b402-3c375ab69c97/2.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/c814e28a-6a5d-435e-b402-3c375ab69c97/3.jpg"],"article":{"title":"上海工司常委指示","alias":"","parts":[{"type":"paragraph","text":"起来，否则，就会被群众抛弃。工总可是毛主席亲自树起的一面大。不会有人公开反对的，但我的要爱惜自已的声，要靠自已的努力。如果有子常一恩想肯定要妮错的。3.于结问题。"},{"type":"paragraph","text":"团结大多数是我们取得最后股利的关键。对人能团结多久就团结多久。不毫老子当自唇。团给一个月，半个月也是好。十.三结”一定要体现生人所级的须导，而不是工人的守。等权后是”工人阶级”掌权，而不是人掌权。在革命委员会里一定"},{"type":"paragraph","text":"从工人中培养一干部区人掌权，或以工人为主，定是错英的一段时向的如果我行"},{"type":"paragraph","text":"然!"},{"type":"paragraph","text":"关于结合，希望你们总给几个典型来。5、关于赤卫队的问题"},{"type":"paragraph","text":"对于赤卫队，我们不能太天真了，不要以为赤卫以组跨了，就万事大吉了，赤卫队至今还未完全打倒，以里在名处迁有三十万，他们转几地下活动，当时为什么没有犯它打倒？由于我们思想上放松了，有彻底肃清它的流毒，所只现在还有三十万赤卫以大肆活动，此外，由于各厂组织不严密，赤卫队已钻入到我们造反队内部来了了)"},{"type":"paragraph","text":"我们放松了个工作，有彻底搞臭赤卫队，是我们的错，一仗今后继快要搞的。"},{"type":"paragraph","text":"另处，要特别警惕赤卫队混入我们组，改组我们组织有些单位老队靠边了，新的上上了.当里有些老的有严重缺点(.)"},{"type":"paragraph","text":"和错模的世应该靠边，但赤以现已有钻入我以搞幕后策搞跨我组织这样他心准备来个大反扑，也必定会看一次大同"},{"type":"paragraph","text":"安的。因此，对一些赤之每以以员(么其是受蒙蔽的)要励细致的是想之依争取形的醒悟，孤立一小·(有些有人抓我)仍造反派的底岸，把我仍前数花黑树料，看黑材料——这要搬当时形势看，也可不能算什么——大做文章。对这个向题我的要独立是孝。其实看了又怎《样呢!"},{"type":"paragraph","text":"一抓住这个小跨子，捞稻草看了就算了。如安梁有人纠缠不休，请他去上海方草会要员念向，心海市命委会同苍的。"},{"type":"paragraph","text":"6整额组织："},{"type":"paragraph","text":"组织要洗，要通过开门整风解头，要亢分发动草命群及"},{"type":"paragraph","text":"展提意见。"},{"type":"paragraph","text":"关于公华今的心"},{"type":"paragraph","text":"公革会的闯题要个决人民的部予盾方法处理，公草会是有缺是，有错误的。世我们平是下要去冲去，是否可从来用其他方未决呢？"},{"type":"paragraph","text":"8，要意群必思想动态，要总结群终验"},{"type":"paragraph","text":"下面是工司常委的指示，"},{"type":"paragraph","text":"1.对于我心造反以内部工作人员，不要动静一动就靠边我们头脑要复杀一点。否妙爱有什么好处，也容易在内部产不生派别。如果谁不好，可从运用四大武器，让向题表现出也好对症下药。"},{"type":"paragraph","text":"2.有强学习，特别要堂习“老三篇”苏五期社论，文汇报社论《莫风头主义》《打倒小团体主义》青·资阳手权经文不等。在止基碰上开门整风。有些以众开心的关门整风也是好的，上上不整好。"},{"type":"paragraph","text":"3不雅活，不准抓人，谁违反这两条，要中破坏先产阶级文化大革命论处。"},{"type":"paragraph","text":"4系统必须大联合，不联合的活全部解散，重新持"},{"type":"paragraph","text":".3.5关于组织问题"},{"type":"paragraph","text":"组织发展按终了过的报步版《整顿组开式更有利手草命》办事，重点放在系统二，出也区联终站要为系统到造条件。(#)组织发展妆2月日答小事凡2月人后成立的新必重新来《进行合或介肯)\u003c3自前应该停织发展，少不能大量发爱。发展必须主意团结两个9%，但不是全奇吸妆。4总句下的一个你统的几个组终然须念后：世精方中"},{"type":"paragraph","text":"大方向上去，如果有分收可从开门整风，人是精心下面是传达市工业生产政部会义：张春桥同忘说;要奇权总要有千部，一个二人同志会世多么好，好么有积极性，要起一个意，一个市一下子交给他是有困难的。在联合中有励个何："},{"type":"paragraph","text":"对当叔滚问题，要分别看待他们，头却分起这受或此较容的要给他心亮物的机会。范想要他几"},{"type":"paragraph","text":"与及灵是。1眷他的是不是在及灵魂了。倒并不是看心拢出村料多少"},{"type":"paragraph","text":"2敢敢对项斗上刺》久体。(3)敢不敢把的三所有的问题雄给群众牢查。"},{"type":"paragraph","text":"这考察当权派是不是真正亮树要求。三结合是通过斗争来摘的，头不能做拉郎配，我的要好学习三.四五期红旗这是主席自过的。要掌老三篇”《将革命进行到底》：整顿觉的风。"},{"type":"paragraph","text":"二、不能抹杀造反派的功绩。"},{"type":"paragraph","text":"陈：曾对抗中共指示。主席提玛的：他的就反对。市委书记处亲审过杨珍给毛主席的电报，就为了保自己。要享事件是心市委造成的。这之后，市委扣主席示，策划成立亦工以，划予路事件，是山事件，策划三停，煽秘赤立能上京，几于造成上要处于状态。其用心之毒可见，在这个共时刻，是我的造反派判了旧市委死之，撕挑起了重担，当时真有黑云压城城欲摧之梦。是我心步后派自下而上夺了枯。"},{"type":"paragraph","text":"造反派有功绩(语录z4一节\u003e"},{"type":"paragraph","text":"拉丁美洲高度浮价我国的文比大华命是是了避儿修正主义的验。"},{"type":"paragraph","text":"三告合后做忘著新所的妈。一是：掌命群久53%(老年工人、肯年工人，革命群久组与只员责人);掌命于部29（包括中层于部，一般干部：枝求于部);民千部1890"},{"type":"paragraph","text":"可以独划一经验。"},{"type":"paragraph","text":"上海红锅炉丁造反兵团翻巾青县朱象角镇中心校"},{"type":"paragraph","text":"毛泽未是想上司令部"},{"type":"paragraph","text":"香中"},{"type":"paragraph","text":"67.4.1"},{"type":"paragraph","text":"一抓住这个小跨子，捞稻草看了就算了。如安梁有人纠缠不休，请他去上海方草会要员念向，心海市命委会同苍的。"},{"type":"paragraph","text":"6整额组织："},{"type":"paragraph","text":"组织要洗，要通过开门整风解头，要亢分发动草命群及"},{"type":"paragraph","text":"
