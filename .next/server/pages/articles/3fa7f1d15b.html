script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"控诉修正主义教育路线的毒害","authors":["喻富源"],"dates":[{"year":1968,"month":7,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"上海先锋电机厂　喻富源"},{"type":"paragraph","text":"伟大领袖毛主席最亲切的声音，通过电台传来，我们万分兴奋。毛主席的最新指示，一句句都说到了我们的心里，我们要千遍万遍地高呼:“毛主席万岁!万岁!万万岁!”"},{"type":"paragraph","text":"修正主义教育路线一定要彻底批判，学制要缩短，教育要革命。我虽然是一个工人出身的技术员，但是也受过修正主义教育路线的毒害。我十四岁进厂做学徒，后来到工农速成中学读了四年书，又进了清华大学读了六年书。在学校里整整度过了十年，各种各样的课程，一次又一次的考试，把我压得透不过气来。在大学里，就是脱离实际，脱离劳动，我在大学的六年中，只参加了半个月的实习，这半个月的所谓实习，也只是看看而已，很少动手参加实际操作。一个人同生产劳动脱离了，同工农脱离了，思想感情就起了变化。我在一九五二年刚刚从工人提拔为技术员时，每天还往车间里跑，一到车间就操作，这样做很自然，同工人没有两样，没有距离。可是，读了十年书以后，产生了优越感。在填毕业志愿时，我就没有填工厂，而是想到科学院去。到了工厂，也只是想坐在办公室里搞技术工作，而没有想到要回到工人中去。我的思想所以会发生这样的变化，就是因为长期脱离生产实践，脱离工人的结果。"},{"type":"paragraph","text":"我深深体会到，即使是工人出身的技术人员在修正主义教育路线的毒害下，思想也会变修的。所以，我们一定要按照毛主席的教导去做，一定要突出无产阶级政治，走与工农相结合的道路，使理论与实践结合。同时，教育一定要革命，要从有实践经验的工人农民中间选拔学生，到学校学几年以后，又回到生产实践中去。这样才能培养出无产阶级的技术队伍来。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3fa7f1d15b"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
