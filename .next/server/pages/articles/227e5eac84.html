<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"拉美工人学生运动继续高涨智利工人、职员不断罢工反对资本剥削　乌拉圭工人举行总罢工抗议法西斯镇压","authors":[],"dates":[{"year":1968,"month":6,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社北京二十日电　圣地亚哥消息:智利工人、职员为反对资本剥削和要求增加工资的斗争继续蓬勃高涨。"},{"type":"paragraph","text":"智利四万多名医务工作人员十九日举行二十四小时罢工，抗议政府拒绝一次付清最近规定增加的工资。他们指出，由于食品价格飞涨，拖延支付增加的工资是违反职工利益的反动措施。"},{"type":"paragraph","text":"同时，智利政府雇员全国协会也宣布举行总罢工，抗议当局拒不支付调整的工资。"},{"type":"paragraph","text":"智利最大的煤矿洛塔斯瓦格尔煤矿的近八千名职工，十八日举行罢工，抗议公司当局漠视工人安全而造成严重的工伤事故。公司当局为了榨取超额利润，不肯在矿井安装通风设备，致使这个煤矿在十七日下午发生煤气爆炸，有十三名矿工死亡，七人重伤。"},{"type":"paragraph","text":"智利全国航空公司三千名职工在六月初开始的总罢工仍在坚持中。"},{"type":"paragraph","text":"据新华社北京十九日电　蒙得维的亚消息:乌拉圭全国工人十八日举行二十四小时总罢工，抗议政府当局实行所谓紧急安全措施的法西斯法令，镇压日益高涨的工人和学生运动。"},{"type":"paragraph","text":"总罢工使各个工业和商业部门遭到严重打击，公共交通瘫痪，报纸停止出版，港口活动全部停顿。"},{"type":"paragraph","text":"工人们要求立即废除当局在十三日宣布的使国家进入戒严状态的反动措施，其中包括禁止群众举行集会和示威，对报道工人和学生斗争的消息实行新闻检查等。"},{"type":"paragraph","text":"受到群众运动浪潮严重冲击的乌拉圭当局，接着又采取其它高压手段妄想阻止从今年一月以来就在不断高涨的工人和学生运动。"},{"type":"paragraph","text":"工人的总罢工是对乌拉圭当局镇压措施的直接回答。在宣布总罢工的前一天，邮政局工作人员和学生继续罢工和举行示威，反抗当局的所谓紧急安全措施和威胁复工的命令。首都学生成批地在大学广场外面举行示威游行。一批示威学生用板凳和大木头筑起街垒，用石块回击警察的进攻。另有一批愤怒的群众用燃烧的障碍物阻拦了一列行驶在蒙得维的亚和埃斯特角之间的火车。他们还张贴和竖起大标语，反对当局的反动措施。"},{"type":"paragraph","text":"据新华社北京二十日电　拉丁美洲一些国家的进步学生，正在为反对反动当局的罪恶统治和腐朽的教育制度而进行持续顽强的斗争。"},{"type":"paragraph","text":"巴西里约热内卢市数千名学生十九日在市中心举行示威，抗议教育经费不足和政府策划的大学改组方案。他们翻倒了许多汽车，在主要商业街道上筑起街垒，用棍棒和石头同前来镇压的武装警察进行英勇搏斗。学生的示威行动使里约热内卢商业区从中午到傍晚陷于瘫痪。在十八日晚上，里约热内卢市有好几百名学生抬着一口空的棺材，为亲美反动政府的教育部长举行象征性的“送葬”仪式。"},{"type":"paragraph","text":"在阿根廷的罗萨里奥市，成群的学生十八日晚走上街头，举行示威游行，反抗翁加尼亚独裁政权的反动政策。他们散发传单，提出争取民族解放的要求，呼吁人民群众支持预定在本月二十八日翁加尼亚发动政变上台两整年这一天举行的总罢工和罢课。"},{"type":"paragraph","text":"在圣地亚哥，智利大学哲学教育学院的学生，表示坚决反对由修正主义分子积极参与策划的所谓复课令，十九日继续进行罢课，要求改革腐朽的教育制度。他们宣布不同反动学校当局妥协。他们的斗争得到了一万多名大学教员和智利大学的行政工作人员的支持。"},{"type":"paragraph","text":"在厄瓜多尔的瓜亚基尔市，数千学生不顾反动警察的镇压，十八日晚继续举行示威，要求降低公共汽车票价。"},{"type":"paragraph","text":"在玻利维亚首都拉巴斯，圣安德烈斯大学的四千名学生十八日晚举行示威游行，反对玻利维亚亲美军事独裁政权的反动统治。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"227e5eac84"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
