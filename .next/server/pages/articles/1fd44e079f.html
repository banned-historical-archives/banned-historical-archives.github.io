script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"德举行大规模反极右集会","authors":["刘钢"],"dates":[{"year":2000,"month":10,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"德举行大规模反极右集会"},{"type":"paragraph","text":"新华社柏林10月28日电  （记者刘钢）德国杜塞尔多夫和卡塞尔两地28日举行大规模的反极右势力示威游行和集会，3万多人走上街头，抗议右翼极端分子的嚣张气焰。"},{"type":"paragraph","text":"在杜塞尔多夫，德国北威州总理克莱门特参加了有2.5万多人参加的示威集会并发表讲话。"},{"type":"paragraph","text":"克莱门特强调，“对暴力及仇外排外行径绝不能姑息容忍”，并表示北威州政府赞同取缔极右翼的德国国家民主党。德国犹太人中央理事会主席施皮格尔在集会上呼吁人们行动起来，“不能再允许暴徒为所欲为”。"},{"type":"paragraph","text":"6000多名卡塞尔市民28日在“全城都行动起来”的口号下，参加了反极右势力的示威行动。"},{"type":"paragraph","text":"杜塞尔多夫和卡塞尔的众多民众之所以举行反极右示威和集会，是为了表示对极右翼势力嚣张气焰的愤慨。"},{"type":"paragraph","text":"当天，上百名右翼极端分子分别在上述两地举行示威性列队行进，伴随着他们的是周围群众刺耳的口哨声和“纳粹滚出去”的呼喊。"},{"type":"paragraph","text":"近一个时期以来，德国极右势力经常制造事端，德国各地也不断爆发大规模的反极右示威活动。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1fd44e079f"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
