script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoistlegacy.de-5985","name":"中共中央电话通知","author":"中共中央","internal":false,"official":false,"type":"pdf","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives11/main/data/5985/5985.pdf"],"article":{"title":"中共中央电话通知","alias":"","parts":[{"type":"paragraph","text":"M5-107ERC Projekt"},{"type":"paragraph","text":"GeschenkMao LegacyUni Freiburg"},{"type":"paragraph","text":"Prof.Dr.MichaelSchoenhalsInv."},{"type":"paragraph","text":"页"},{"type":"paragraph","text":"第理我飞雁抵守：照办进记"},{"type":"paragraph","text":"四九日#大有司进一#保人开陈及生"},{"type":"paragraph","text":"中共中央电话通知上"},{"type":"paragraph","text":"各有，市，自临正党委，各大军区，自军飞，野战军党委，中央和装"},{"type":"paragraph","text":"困机索各部委党重，今领穿小他或党的核心小里，军垂各总"},{"type":"paragraph","text":"#的经系爱教育"},{"type":"paragraph","text":"部，各军、岳种党委：的#社订"},{"type":"paragraph","text":"四月七日晚上中央人民广电台广播了中共中失的两了决议和关于天安们广场反革命事件的报导，吴往同志的讲话后，首都广大军民欢心鼓年，风涌上街灰祝眺利。诉多有年群众也纷上街庆祝游行，有的有还开了群众大会，大始了草命人武志气，大天了阶做敌人成风。为了抓坚这了大好时机，发展大好形势，特做如下通失："},{"type":"paragraph","text":"一.备有，而，自出还党委，要立即卫开机模忘大的群"},{"type":"paragraph","text":"页第"},{"type":"paragraph","text":"4众大会，宣读中共中央的两了决议，由冬有.主、自怡觉委主要员责同志，发表旗怡明的讲活，牢掌握托邓斗年大方问，进一步深入开展反击在你翻掌风的伟大所命"},{"type":"paragraph","text":"二.任何人不得冲击这次众大令，对广大群众要"},{"type":"paragraph","text":"做好思想动员和思想散育作，对一小撒阶吸敌装"},{"type":"paragraph","text":"人不破不揭乱活动，要坚决怨办。"},{"type":"paragraph","text":"三.各吸党重要加睡对批邓定劫的会，要最育订"},{"type":"paragraph","text":"群众坚决执行我席和以毛舞的首的觉中央的一案"},{"type":"paragraph","text":"到指方，不准串联，不准成立住何形式的战斗队线"},{"type":"paragraph","text":"四.各地如有反革命的打.砸.抢者，应坚决卖行锲在。"},{"type":"paragraph","text":"风.矛头指何伟大袖我主鹿和心毛之席为首的党中快的怡言，仅动语.诗词等应坚决这查，打去造者。六各有年，自怡已召开的大会，伙方党政年民的活"},{"type":"paragraph","text":"页"},{"type":"paragraph","text":"第站，由各比新分社用明码及时向免社报回。"},{"type":"paragraph","text":"中共中央"},{"type":"paragraph","text":"1946.4..装线吧"}],"authors":["中共中央"],"dates":[{"year":1976,"month":4,"day":8}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":3},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7159bea89f"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
