<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"靑海省劳改犯和社会右派分子相配合向我党发起猖狂进攻","authors":[],"dates":[{"year":1957,"month":8,"day":14}],"is_range_date":false,"parts":[{"text":"靑海省劳改犯和社会右派分子相配合向我党发起猖狂进攻","type":"title"},{"text":"新华社西宁讯　自从社会上大“放”大“鸣”以来，靑海省劳改犯人嚣张气焰上升，有些已经发展到猖狂向我进攻的程度，主要表现在以下几个方面：","type":"paragraph"},{"text":"（一）公开辱駡共产党、辱駡人民领袖、辱駡干部，写反动标语，还有个别反革命分子打干部。如第二建筑工程公司犯人张炳华（反革命分子）在6月30日晚间乘看电影之际，跑上舞台高呼：“坚决打倒共产党”“打倒各民主国家的共产党员们”“世界魔鬼下降，我以基督敎徒的身份杀掉共产党员们”“打倒消灭马克思列宁主义”，这个反革命分子当卽被带戒具幷禁闭。在审讯中他仍说：“要打倒毛泽东这个家伙”。汽车修理厂等单位还发现反动标语，如“打倒毛主席，来了马主席（指马步芳）”“实行三民主义、USA公民”。","type":"paragraph"},{"text":"（二）造谣煽动。在劳改犯人中相互传说河南、山东、山西、上海、浙江等地的犯人“普遍复查了”“放了三分之二”“都宽大处理了”。皮毛加工厂反革命犯李念兹造谣说：“今年8月要大赦，死刑缓刑，无期徒刑改为十年徒刑，五年以下的全部释放”。第二砖瓦厂犯人周孝玉说：“国民党从西藏打过来了。上海、杭州等地特务大暴乱。八十架飞机轰炸了上海”“今天是共产党的天下，明天就是我们的”。","type":"paragraph"},{"text":"（三）犯人逃跑严重。今年以来，西宁各单位共逃跑二十二名（其中反革命犯三名，盗窃犯十一名，刑事犯八名），现已捕回十名。据了解，还有六十多名企图逃跑。另外，第二建筑工程公司犯人陈炳庆（中统特务）还企图组织暴动，据犯人李德秀供称：“已组织三十余人，先搞証件，行动前先打灭汽灯，搞掉看守员，再夺警卫枪支”，此案现正在侦察中。","type":"paragraph"},{"text":"（四）犯人中不认罪、不守法、抗拒改造者也有所增加。自从大“放”大“鸣”以来，犯人申诉的骤然增加，据西宁各单位统计，今年共收到犯人申诉书一千六百三十三分。第一建筑工程公司统计约有7.95％的犯人都写了申诉书，有的写了两三次，有的已经被驳回，但还继续写，幷说“不达到目的决不甘休”。罪大恶极的反革命分子马迪甫企图否认其组纤“西革会”的罪恶事实。","type":"paragraph"},{"text":"（五）破坏狱规，不遵守制度，不服从干部管敎的也多起来了。破坏生产、打架、偷盗、鷄奸时有发生。半年以来，西宁各单位共发生偷盗一百三十五起、打架一百八十四起。犯人不听从指挥的情况，各厂都存在。","type":"paragraph"},{"text":"发生以上问题的原因有以下几点：","type":"paragraph"},{"text":"（一）有些犯人的反动本质根本没有得到改造，他们和右派分子的反动立场一致，气味相投。例如有人说右派分子的谬论是“好消息”“大快人心”，犯人魏敬邦说：“黄绍竑替我们说话了，眞伟大”，犯人张兴伦説：“我坚决拥护葛佩琦的意见”，反革命犯岳化民说：“他们大刀阔斧的提意见，我看了眞痛快”。","type":"paragraph"},{"text":"（二）干部执行政策不力，注意了人道，放松了专政。有些应该鎭压的，没有得到及时镇压，有些应该依法加刑的，没有及时加刑。干部中还存在严重的轻敌麻痹思想。例如副食品加工厂一个管敎干部竟准假让两个刑期十年以上的犯人到外面吃饭，另外有些犯人还被评选为积极分子，例如第二建筑工建公司竟让大“放”大“鸣”以来屡放厥词的反革命犯岳化民当选为积极分子委员会委员，过去幷多次得奖。","type":"paragraph"},{"text":"（三）武装监护力量薄弱。西宁各单位共有一千五百五十五名劳改犯人脱离武装监护，进行生产。第一建筑工程公司共有九个工地没有部队。第一、二、三砖瓦厂夜间脱离武器的劳改犯人有六百多人。在这些人中间发生很多问题，有的到处乱跑，有的偷东西。（高庆琪编）","type":"paragraph"},{"text":"来源： 新华通讯社编：《内部参考》，第2283期，1957年8月14日。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b64be6d12a"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
