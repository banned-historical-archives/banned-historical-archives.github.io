script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"吉林铁路局各级领导干部带头学习无产阶级专政理论  从理论上弄清楚对资产阶级专政问题","authors":[],"dates":[{"year":1975,"month":3,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"吉林铁路局各级领导干部带头学习无产阶级专政理论"},{"type":"paragraph","text":"从理论上弄清楚对资产阶级专政问题"},{"type":"paragraph","text":"新华社长春一九七五年三月九日电　吉林铁路局各级领导干部带头学习毛主席关于理论问题的重要指示，学习无产阶级专政的理论，进一步提高执行党的基本路线的自觉性，决心把无产阶级专政下的继续革命进行到底。"},{"type":"paragraph","text":"目前，全局各单位普遍举办起理论学习班，各级领导干部带头学习，刻苦钻研，努力从理论上弄清楚对资产阶级专政的必要性和重要性。他们还结合自己担负领导工作以来的斗争实践，畅谈领导干部带头学好无产阶级专政理论的极端重要性。党委书记宋子珠是一九三一年参加革命的老干部，担任领导职务后，工作兢兢业业，但由于不大重视学习革命理论，对修正主义路线的干扰识别不清。无产阶级文化大革命中，在群众的帮助下，他焕发了革命青春，带头攻读马列著作和毛主席著作，增强了识别真假马克思主义的能力，提高了执行毛主席革命路线的自觉性。宋子珠通过回顾更深刻地体会到，只有认真攻读马列和毛主席的书，才能自觉地执行党的基本路线和各项政策，把巩固无产阶级专政的任务落实到基层。"},{"type":"paragraph","text":"过去，这个局受修正主义办企业路线的影响，曾经推行过“一长制”和管、卡、压，削弱了党的领导。许多领导干部在学习无产阶级专政的理论的过程中，联系这些事实展开了讨论。他们说，无产阶级专政的理论，不仅搞政治工作的要学懂弄通，搞经济工作的也必须搞清楚。不然的话，就分不清什么是社会主义，什么是资本主义，甚至还会把资本主义的东西当作社会主义的东西，背离毛主席的革命路线。"},{"type":"paragraph","text":"吉林铁路局各级领导干部在学习毛主席关于理论问题指示的过程中，还结合选学《共产党宣言》、《哥达纲领批判》、《国家与革命》等马列著作有关章节，加深对毛主席重要指示的理解。有些领导干部还联系国际上无产阶级革命和无产阶级专政的经验教训，更深入地了解对资产阶级专政的重要性和必要性。他们从世界上第一个社会主义国家蜕变成社会帝国主义国家这一事实认识到，无产阶级取得政权以后，绝不意味着阶级斗争的结束，而是阶级斗争在新形势下的继续。被推翻的地主、资产阶级和新生的资产阶级分子，千方百计在党内寻找他们的代理人，妄图颠覆无产阶级专政，复辟资本主义。因此，我们必须时刻都保持高度的革命警惕性，必须加强无产阶级专政，镇压地主、资产阶级的反抗和破坏，防御帝国主义和社会帝国主义的颠覆和侵略，不断铲除滋生修正主义的土壤，清除旧社会遗留下来的痕迹，彻底粉碎国内外阶级敌人妄图在中国复辟资本主义的迷梦。"},{"type":"paragraph","text":"为了加深对毛主席关于理论问题重要指示的理解，吉林铁路局党委还组织了五十多名干部和机关工作人员，编成五个调查组，由局领导干部带队，分别到吉林车辆段、敦化车站、泉阳中心站和图们铁路地区第四宿舍等单位，进行调查研究。在局党委的带动下，这个局所属各级领导班子，把学习与调查结合起来，层层派出调查组，深入车间、班组和基层单位，一边调查研究，一边组织群众学习。通过这些活动，既使各级领导班子加深对无产阶级专政理论的理解，又推动全局群众性学习活动蓬勃开展。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"吉林文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ded4400324"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
