<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"西藏地区原有奴隶成了新生活主人","authors":[],"dates":[{"year":1961,"month":11,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"西藏地区原有奴隶成了新生活主人"},{"type":"paragraph","text":"三万家奴分得土地、房屋、耕畜和农具，一万名贫民、乞丐和流浪人找到了职业和生活出路，几千名“洛热娃”人都安了家"},{"type":"paragraph","text":"在党和政府的关怀帮助下，西藏地区原有的几万名“朗生”（家奴）和贫民、乞丐、流浪人，开始安居乐业，过着幸福愉快的新生活。"},{"type":"paragraph","text":"“朗生”身受封建农奴主的残酷压榨，毫无人权，千百年来一直过着牛马般的生活。民主改革中，“朗生”和其他奴隶一起，积极起来斗争，彻底反掉了人身依附制度，成了新西藏的主人。据不完全统计，到1960年底，西藏全区已解放“朗生”约三万人，分得原来属于农奴主的十多万克（一克约等于一亩）土地和大批房屋、耕畜、农具等，并且成家立业。在山南专区乃东县原来为叛国头子索康·旺清格勒所占有的一个行政单位凯松溪卡里，翻身的“朗生”们都安了家。“朗生”敏久从生下来一直到二十五岁没有穿过鞋，两次被农奴主投入黑暗的监狱，挨过不知多少皮鞭。现在，敏久有了自己的土地、房屋、耕畜和农具，还和一位名叫其佳的翻身女“朗生”结了婚，夫妻俩共同劳动，生活美满。"},{"type":"paragraph","text":"西藏在民主改革前大约有一万名贫民、乞丐和流浪人。这些人是逃亡的农奴、被农奴主榨尽血汗后赶出去的“朗生”和破产的小手工业者。他们成年累月地到处流浪，过着苦难的生活。两年多来，党和政府采取了各种措施，帮助他们找到了合适的职业和生活出路。"},{"type":"paragraph","text":"在山南，世代流浪的几千名“洛热娃”人也已定居下来，从事农牧业和手工业等生产。“洛热娃”人的祖先原住在山南洛热地方，因不堪封建农奴主的繁重压榨，被迫放弃土地家园，四处流浪，生活极为困苦。流浪在乃东县的四百多名“洛热娃”人现在都安了家。次仁卓玛一家四口在民主改革中分得了十四克地，加入了互助组，两年来，农业生产连获丰收。次仁卓玛的儿子在学铁匠，小女儿进了民办小学，一家人生活安定。"},{"type":"paragraph","text":"获得翻身解放的奴隶、贫民和流浪人，政治热情和生产积极性都很高。其中有不少人成了农村、牧区的基层干部和积极分子，一些先进分子还加入了共产党和共青团。"},{"type":"paragraph","text":"（据新华社）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"62e6059822"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
