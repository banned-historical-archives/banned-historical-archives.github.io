script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"李普曼慨叹已往十年世界局势变迁  承认美国国际地位剧烈下降  主张下届政府加紧国内剥削榨取国外钱财解救国际支付危机","authors":[],"dates":[{"year":1960,"month":12,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"李普曼慨叹已往十年世界局势变迁"},{"type":"paragraph","text":"承认美国国际地位剧烈下降"},{"type":"paragraph","text":"主张下届政府加紧国内剥削榨取国外钱财解救国际支付危机"},{"type":"paragraph","text":"新华社19日讯　纽约消息：美国著名资产阶级评论员李普曼17日和18日在《纽约先驱论坛报》上发表文章，悲叹美国在国际上的政治、经济地位江河日下，承认即将上台的肯尼迪政府面临许多困难。"},{"type":"paragraph","text":"李普曼在这篇题为《我们（美国）面临着什么》的文章中，首先要求美国统治集团了解，“过去十年来美国在世界上的地位发生了多么巨大的变化”。他说，当肯尼迪“谈到我们（美国）的威信的丧失和我国的力量和地位的恶化的时候，这不仅仅是一个在全国代表大会上竞选的演讲人的惊慌看法。美国在世界力量对比中的相对地位已经明显地下降了。在一个地方又一个地方，不仅在古巴、刚果、阿尔及利亚和老挝，在处理同我们的盟国的关系方面，我们的外交越来越失效，而且常常是使人感到难堪地失效。”李普曼承认，这种“基本情况”不是“单靠白宫和国务院发表关于我们的意图和我们的理想的长篇声明所能改善的”，也不是“单靠再拨出二、三十亿美元给国防部所能纠正的”。缅怀过去，李普曼不免感慨系之，他说：“在第二次世界大战结束后，由于我们的敌人和我们的盟国都精疲力尽，美国的相对地位非常强大。那时，我们的军事力量更大，因为我们垄断了核武器。我们有更多的黄金和更大的生产能力，我们比其他任何一个国家，的确比其他所有的国家加在一起更不易受到攻击。（但是）这种情况并没有持续多久。”"},{"type":"paragraph","text":"李普曼对美国的“威信”下降特别感到不安。他写道：“曾经一度对我们有利的不平衡状况一直在改变着。而在朝鲜战争以后，这种情况发生了巨大的变化。到1957年前后，我们在世界上的相对军事和经济力量剧烈地下降了。在（美国总统）竞选运动中，艾森豪威尔气忿忿地加以否认。但是这是不容争辩的事实。在亚洲、非洲和拉丁美洲的广大地区，我们的军事力量在很大程度上被抵销了。在非共产主义世界里，我们用来资助我国外交政策的能力被我国的支付情况严重地破坏了。”"},{"type":"paragraph","text":"李普曼承认，美国的侵略政策和战争政策日益受到国内外人民的反对。他说，美国外交政策的“反动性质和语气”使美国“同广大的人民群众，不仅仅是农民、工人和青年学生，疏远了”。"},{"type":"paragraph","text":"美国垄断集团的这个著名谋士认为，纠正美国在军事上和经济上的“弱点”，是肯尼迪政府的“最重要的任务”。他向美国统治集团献策，鼓吹加紧利用工人贵族来破坏美国的工人运动，让垄断资本集团进一步加强对美国的劳动人民的剥削，以便“加强我们在世界上的竞争能力”。他还鼓吹“修订我们战后承担的许多义务”，加紧迫使美国的“盟国”拿出更多的钱，来解救美国的国际支付危机。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"朝鲜战争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2bfb586d90"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
