script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"叛徒的嘴脸　帮凶的面目  苏联修正主义者公开反对中国核试验","authors":[],"dates":[{"year":1966,"month":5,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"叛徒的嘴脸　帮凶的面目"},{"type":"paragraph","text":"苏联修正主义者公开反对中国核试验"},{"type":"paragraph","text":"新华社十三日讯　莫斯科消息：苏联修正主义者为了伙同美国垄断核武器，公然表示反对社会主义中国的核试验。"},{"type":"paragraph","text":"据南斯拉夫通讯社从莫斯科报道说，有人要求苏联外交部发言人评论中国进行新的核爆炸的消息。发言人说，“我们反对核试验，我们通过在莫斯科条约上签字证明了这一点”。他还说，“苏联对类似问题的态度是众所周知的”。"},{"type":"paragraph","text":"苏联报纸只用一句话报道了中国第三次核试验的新闻公报。《红星报》十一日在简单地刊登中国核试验的消息的同时，还恶意地报道说，“日本社会党的声明就爆炸一事表示遗憾”。"},{"type":"paragraph","text":"《共青团真理报》十三日在第一版“世界报纸写些什么”栏中谈到外国报纸继续评论中国的核试验时，引印度的一些报纸的话说，“这次核爆炸鼓励了印度的那些要求印度同样也要制造核武器的政治集团的代表。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"345950ad57"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
