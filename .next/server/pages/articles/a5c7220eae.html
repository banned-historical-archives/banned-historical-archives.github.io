script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji5","name":"毛泽东全集第5卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji5.pdf"],"article":{"title":"关于暂行婚姻条例的决议","alias":"","parts":[{"type":"paragraph","text":"关于暂行婚姻条例的决议"},{"type":"paragraph","text":"（1931年11月28日）"},{"type":"paragraph","text":"在封建统治之下，男女婚姻，野蛮到无人性，女子所受的压迫与痛苦，比男子更甚。只有工农革命胜利，男女从经济上得到第一步解放，男女婚姻关系才随着变更而得到自由。目前在苏区男女婚姻，已取得自由的基础，应确定婚姻以自由为原则，而废除一切封建的包办、强迫与买卖的婚姻制度。"},{"type":"paragraph","text":"但是女子刚从封建压迫之下解放出来，她们的身体许多受了很大的损害（如缠足）尚未恢复，她们的经济尚未能完全独立，所以关于离婚问题，应偏于保护女子，而把因离婚而引起的义务和责任，多交给男子负担。"},{"type":"paragraph","text":"小孩是新社会的主人，尤其在过去社会习惯上，不注意看护小孩，因此关于小孩的看护有特别的规定。"},{"type":"paragraph","text":"此条例在一九三一年十二月一日公布实行。"},{"type":"paragraph","text":"中央执行委员会主席毛泽东"},{"type":"paragraph","text":"副主席项英张国焘"}],"authors":["毛泽东"],"dates":[{"year":1931,"month":11,"day":28}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":406,"page_end":406},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a5c7220eae"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
