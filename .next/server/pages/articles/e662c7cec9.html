<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"本市部分党员作家谈学习二中全会精神体会提高认识　清除精神污染对文艺领域中存在的资产阶级自由化倾向要有警觉","authors":[],"dates":[{"year":1983,"month":11,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社上海讯　上海三十余名党员作家十日在作协上海分会举行的座谈会上，就作家在建设社会主义精神文明中的责任及文学领域防止和清除精神污染问题，交流学习党的十二届二中全会精神的体会。到会的党员作家指出，反对精神污染，对我们党员作家尤为重要。我们应该旗帜鲜明地站在这场斗争前列，为建设社会主义精神文明做贡献。"},{"type":"paragraph","text":"吴强首先发言说，党中央发出号召，清除精神污染，把文学创作引上更加健康发展的轨道，推动文学事业发展，这是非常及时，非常必要的。早几年，中央已经提出反对资产阶级自由化倾向，号召作家深入生活，开展批评与自我批评，但我们注意不够，体会不深。作家搞精神污染，后果严重，污染了人们的思想、感情、灵魂，同时也污染了自己，污染了文坛。创作中可以有不同的风格和方法，也可向古今中外的作品学习借鉴，但我们是社会主义文艺工作者，社会主义文艺旗帜不能丢掉。刚从国外访问归来的杜宣说，党的三中全会，提出解放思想，清理“左”的思想影响，文学事业出现了空前的繁荣。这证明清理“左”的思想影响是完全正确的。但是也出现了一些不健康的作品，数量尽管不多，影响却很坏。这次十二届二中全会提出思想战线不能搞精神污染，意义十分重大。我们应该积极行动起来，投入这场斗争。柯灵说，如不采取坚决的态度清除精神污染，社会主义现代化建设就无法进行。我过去对“左”的倾向很敏感，因为自己是“左”倾思潮的受害者。现在通过学习党的文件，对右的倾向，思想上也有了警觉。"},{"type":"paragraph","text":"不少同志在发言中也联系到自己。艾明之说，精神污染是病毒，是公害，不抵制不清除，它就会扩大、蔓延。就自己而言，也有个清除精神污染的问题。现在是到了坚决清除精神污染的时候了。作为人类灵魂工程师的作家，写什么，怎么写，自己要把好关，决不能给党的事业带来损害。草婴说，外国文学作品的研究和介绍中，也存在不少精神污染的情况。文艺作品应给人向上的积极的力量，而不健康的现代派作品只能使人消沉、悲观、失望，对人类前途丧失信心。从事外国文学的研究和介绍，应该经常考虑介绍发表的外国文学作品的社会效果。我们只能站在马克思主义立场上，研究和介绍外国文学，不能良莠不分，搞精神污染。任干在联系电影战线情况后说，我们要重视自身的学习，提高自己的觉悟，清除精神污染，反对资产阶级思想侵袭，做一个合格的文艺工作者。"},{"type":"paragraph","text":"在发言中，有些同志指出文学创作中的胡编乱造，搞所谓“无主题，无人物，无情节”的“三无”作品，从根本上说是脱离生活，脱离群众的，是背离马克思主义创作原则的。菡子说，我认为有必要坚持和发扬无条件地深入到工农兵中去的传统。生活是创作的源泉，每个作家都应该深入生活。她建议对作家深入生活要有个制度或规定。徐开垒说，搞“三无”作品，实际上是作家的“自我表现”，与没有生活有关。我最近去了青海、甘肃和新疆一趟，感到那里有很多动人的故事和高大的人物可写。希望通过这次整党、清除精神污染，引导作家，特别是中青年作家，深入生活，创作出大批好的作品。"},{"type":"paragraph","text":"在座谈会上发言的还有李俊民、包蕾、鲁兵、峻青、包文棣、肖岗、徐俊西。"},{"type":"paragraph","text":"中共上海市委宣传部副部长丁锡满到会讲了话。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e662c7cec9"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
