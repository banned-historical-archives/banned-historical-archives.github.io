script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"亿万童工象奴隶一样生活在资本主义社会","authors":[],"dates":[{"year":1983,"month":4,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"亿万童工象奴隶一样生活在资本主义社会"},{"type":"paragraph","text":"新华社联合国4月12日电  据联合国最近散发的一份调查材料说，目前全世界有1．5亿名15岁以下的童工正在遭受中世纪奴隶式的野蛮奴役和剥削，在悲惨的生活中挣扎。"},{"type":"paragraph","text":"调查材料说，在美国农场和种植园做工的儿童有80万。另外，在美国做季节工的墨西哥童工达100万。一项研究报告分析了美国13个州机器造成的789起工伤事故后说，其中12％的受害者是童工。"},{"type":"paragraph","text":"在意大利，非法做工的童工在建筑业有15万，在纺织业有10万，在农业有50万。据政府1970年公布的数字，8．18％的因工伤致残者为童工。"},{"type":"paragraph","text":"35万法国青少年在工商业训练中心受训，其中59％的学生在实习期间每星期工作40多个小时，但有一半人左右得不到任何报酬。法国还存在着许多虐待现象。"},{"type":"paragraph","text":"调查材料指出，亚洲、非洲和拉丁美洲的童工和对童工的奴役和剥削也十分严重。"},{"type":"paragraph","text":"这份材料指出，童工的工作条件十分恶劣，对儿童的身心造成了不可估量的损害。“许多人患上肺病和贫血症”，另一些人“患了下半身关节僵硬病”，有些女孩“由于工作造成的固定体态，使她们成年后不能生育”。过早就业往往是非法的和暗地进行的，这常常使儿童滑到贩毒、偷盗、卖淫和其他严重犯罪的深渊，从而毁灭自己，破坏社会安定。"},{"type":"paragraph","text":"这份联合国文件还指出，“现代资本主义生产方式造成了对童工的剥削”。“由于受雇者年龄幼小，孤苦伶仃，因此，雇主往往为了自己的利益而几乎总是毫无节制地实行榨取最大利润这种‘可爱的古老法则’。”据联合国劳工组织估计，全世界对童工剥削所得的盈利每年可达210亿美元。“童工的血汗劳动为剥削者创造了巨额的收益。”（附图片）"},{"type":"paragraph","text":"图为童工们在从事繁重的体力劳动。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"edf9718f09"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
