" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"陈云在党的第十二次全国代表大会上的讲话节录","authors":["陈云"],"dates":[{"year":1982,"month":9,"day":6}],"is_range_date":false,"parts":[{"text":"陈云在党的第十二次全国代表大会上的讲话节录","type":"title"},{"text":"陈云","type":"authors"},{"text":"关于提拔中青年干部问题，我要说的另一句话是：在“文化大革命”期间跟随林彪、江青一伙造反起家的人，帮派思想严重的人，打砸抢分子，这“三种人”一个也不能提拔，已经提拔的，必须坚决从领导班子中清除出去。","type":"paragraph"},{"text":"为什么一个也不能提拔呢？因为这“三种人”如果进到领导班子中，若干年后，到了气候适宜的时候，党内有什么风浪的时候，他们就会跳出来兴风作浪，再次为害国家，为害人民。","type":"paragraph"},{"text":"当然，我们要看到，“文化大革命”期间犯有错误的中青年中，属于“三种人”的只是少数，多数是跟着跑的。对于跟着跑的人，只要他们真正认识了自己的错误，与“三种人”坚决划清了界限，而且在粉碎“四人帮”以后表现一直好，党就应该信任和使用他们，并在工作中对他们继续加以考察和帮助。","type":"paragraph"},{"text":"我们还要看到，在“文化大革命”期间，表现好的和基本好的中青年有的是，我们在提拔中青年干部时，应当主要从他们中间挑选。","type":"paragraph"},{"text":"除了这“三种人\"以外，还有两种人也不能提拔，这就是反对三中全会以后党中央路线的人，  以及在经济领域内和其他方面严重违法乱纪的人。","type":"paragraph"},{"text":"总之，一方面要大胆提拔，加快提拔中青年干部，一方面又要严格把好政治标准这一关。德才相比，我们要更注重于德，就是说，要确实提拔那些党性强，作风正派，敢于坚持原则的人。","type":"paragraph"},{"text":"我相信，只要把干部队伍的交接班问题解决好，我们党的事业就一定会后继有人。","type":"paragraph"}],"comments":[],"origin":"《处理”文革遗留问题，清理“三种人”文件汇编（第一册）》广西壮族自治 区党委整党办公室，1986年8月","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"陈云","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d55b5a065c"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
