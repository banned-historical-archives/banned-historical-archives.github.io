<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"9ee7a157-a1ac-450b-b7a3-3c22a9c29eb3","name":"红旗一九六六年第十一期","internal":false,"official":true,"type":"pdf","author":"《红旗》杂志编辑部","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives2/main/9ee7a157-a1ac-450b-b7a3-3c22a9c29eb3.pdf"],"article":{"title":"欢呼北大的一张大字报","alias":"","parts":[{"type":"paragraph","text":"一张大字报欢呼北大的"},{"type":"paragraph","text":"人民日报评论员轰元样等同志的大字报，揭穿了“三家村”黑帮分子的一个大期谋"},{"type":"paragraph","text":"“三家村”黑店的掌柜邓拓被揭露出来了，但是这个反党集团并不甘心自己的失败。他们仍然负隅顽抗，用“三家村”反党集团分子宋硕的话来说，叫作“加强领导，坚守岗位”。"},{"type":"paragraph","text":"他们“坚守”的是什么“岗位”？他们“坚守”的是他们多年来一直盘踞的反动堡垒。他们加强的是什么“领导”？就是指择他们的伙计作垂死挣扎、力图保持他们反党反社会丰艾的阵地。"},{"type":"paragraph","text":"宋硕的“加强领导”，“坚守岗位”，这是一个信号，它反映了在这场推括拉朽的无产阶级文化大革命中，一切牛鬼蛇神们的动态。他们是一步不让的，寸土必争的，不斗不倒的。"},{"type":"paragraph","text":"“三家村”黑帮是诡计多端的。在前一个时候，他们采取“牺牲车马，保存主帅”的战术。现在“主师”跨台了，他们就采取能保存多少车马就保存多少车马的手法。他们妄图保存实力，待机而动。"},{"type":"paragraph","text":"为陆平、彭云等人多年把持的北京大学，是“三家村”黑帮的一个重要据点，是他们反党反社会主义的顽固堡垫，已经到广五月十四日，陆乎还传达北京市委大学部副部长未硕的所谓紧急指示，并手忙脚乱地进行部署，欺骗、蒙蔽和压制广大青年学生和革命干部，革命教师，不许他们响应毛主席和党中央的号召起来革命。彭现云是一个神秘人物，上审下跳，拉线搭桥。在这个事件中，她转入地下活动，来往于北京大学历史系住地干三陵和宋硕、陆平之间，出谋划策，秘密指挥。"},{"type":"paragraph","text":"这一切，都说明“三家村”黑店的分号，“三家村”黑帮的“车马”们，还是有"},{"type":"paragraph","text":"陆平以北京大学“党委书记”的身份，以“组织”的名义，对起来革命的学生和干部，进行威吓，说什么不听从他们这一摄人的指挥就是违犯纪律，就是反党。这是“三家村”黑帮反党分了们惯用的使俩。请问陆平，你们所说的党是什么党？你们的组织是什么组织？你们的纪律是什么纪律？事实使我们不能不做出这样的回答，你们的“党”不是真共产党，而是假共产党，是修正主义的“党”。你们的“组织”就是反党集团。你们的纪律就是对无产阶级革命派实行残酷无情的打击。"},{"type":"paragraph","text":"陆平们这一套是骗不了人的。"},{"type":"paragraph","text":"对于无产阶级革命派来说，我们遵守的是中国共产党的纪律，我们无条件接受的，是以毛主席为首的党中火的正确领导。对一切危害革命的错误领导，不应当无条件接受，而应当坚决抵制。毛泽东思想，是我们各项工作的最高指示。毛主席关于社会主文社会阶级和阶级斗争的学说，关于在意识形态领域中兴无灭资的无产阶级文化大革命的指示，是我们必须坚决遵循的。凡是反对毛主席，反对毛泽东思想，反对毛主席和党中央的指示的，不论他们打着什么旗号，不管他们有多高的职位、多老的资格，他们实际上是代表被打倒了的刺削阶级的利益，全国人民都会起来反对他们，把他们打倒，把他们的黑帮，黑组织、黑纪律彻底推毁。"},{"type":"paragraph","text":"人类历史上空前未有的无产阶级文化大革命的浪润，涵涌澎湃，妄图阻挡这个弹流的小五们，他们是难逃灭顶之灾的。"},{"type":"paragraph","text":"工农兵和无产阶级的文化战士，在党中央和毛主席的领导下，以排山倒海之势，正在一个一个地夺取反革命的文化阵地，摧毁反革命的文化堡垒。那些什么“三家村”，“四家村”，不过是纸老虎，他们的“将师”保不住，他们的“车马”也同样是保不住的。"},{"type":"paragraph","text":"北京大学的无产阶级革命派，一定能够更高地举起毛泽东思积的伟大红旗，一定能够更加有力地团结群众进行战斗。一-时还看不清楚的人们，一定会迅速地提高自已的觉悟，参加到战华的行列中来。北京人学广大师生的反对资产阶级代表人物的革命斗争，一定能够胜利。一个欣欣向柒的真正的社会主义的新北大，一定会很快地出现在人战的首都。"}],"authors":["《人民日报》评论员"],"dates":[{"year":1966,"month":6,"day":2}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":33,"page_end":34},"tags":[{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"acdfc9db2f"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
