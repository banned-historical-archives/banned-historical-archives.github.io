script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"用毛泽东思想深入发动农民开展斗争泰共领导的人民武装在战斗中壮大上半年战斗近四百次，歼灭美泰反动军警近五百名","authors":[],"dates":[{"year":1968,"month":7,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"综合新华社电　“泰国人民之声”电台，欢呼泰国人民武装在泰国共产党领导下，掌握和运用毛主席关于人民战争的光辉理论，在战斗中不断成长壮大。"},{"type":"paragraph","text":"这家电台说，据初步统计，从今年一月到六丹，泰国人民武装同美泰反动军警战斗近四百次，共打死、打伤敌人近五百名，击毁敌人军车多辆，打落、打伤敌机多架。"},{"type":"paragraph","text":"电台说，美泰反动派在五月间曾派遣五千多名反动军警“围剿”活跃在普潘山麓，沙功那空、那空拍侬府的人民武装，遭到英勇的泰国东北部人民和人民武装的迎头痛击。"},{"type":"paragraph","text":"电台指出，泰国人民武装半年来所取得的辉煌胜利，粉碎了美国—他侬集团妄图以武力扑灭泰国人民爱国武装斗争烈火的美梦，极大地鼓舞了泰国人民坚持以革命武装斗争去战胜美泰反动派。"},{"type":"paragraph","text":"这家电台指出，泰国人民武装的胜利，是由于在坚持马克思列宁主义、毛泽东思想的泰国共产党领导下的人民军队，努力学习和运用毛主席关于人民战争的理论，并把这个理论同当地的实际情况相结合，指导自己的斗争。"},{"type":"paragraph","text":"这家电台说，泰国人民武装运用了毛主席制定的“敌进我退，敌驻我扰，敌疲我打，敌退我追”这一游击战战术，掌握战斗的主动权，不断取得歼灭敌人的胜利。人民武装遵照毛泽东主席关于“革命战争是群众的战争，只有动员群众才能进行战争，只有依靠群众才能进行战争”的教导，从一开始就注意做群众工作。他们组织小分队深入农村，向农民进行宣传动员，使广大农民提高了政治觉悟，认识到美帝国主义侵略掠夺泰国和他依一巴博集团祸国殃民的罪行。人民武装还积极组织和领导农民惩处卖国贼，反对恶霸地主和暗探特务，受到广大群众的热烈欢迎和支持。"},{"type":"paragraph","text":"这家电台说，人民武装的战士有高度的政治觉悟，他们走到一起来，不是为任何一个小集团的私利，而是为着最广大人民群众的利益。因此，这支人民武装队伍，打起仗来最勇敢，最聪明，最机智，最有力量，今年年初，北部难府人民武装的一个战士，在被敌人四面围困的情况下，他无所畏惧，沉着、勇敢、机智地利用有利的地形，同敌人周旋，取得了歼敌十名的出色战果。"},{"type":"paragraph","text":"这家电台指出，由于人民武装充分动员群众，坚决依靠群众，和群众打成一片，得到群众的大力支持和衷心爱护，所以耳目灵通，处处主动，发挥了人民战争的强大威力，使敌人防不胜防，处于被动挨打地位。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"人民战争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6386ed3777"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
