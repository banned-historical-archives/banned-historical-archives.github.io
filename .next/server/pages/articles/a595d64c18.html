script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"我强烈抗议印方在去年下半年不断严重侵犯我领土领空印政府靠反华度日只能落得悲惨结局我外交部照会指出:印度的行动显然是为了讨好美帝和现代修正主义　再次警告印方:必须停止对我一切入侵，否则应对后果承担全部责任","authors":[],"dates":[{"year":1966,"month":2,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京2日电　中国外交部一月三十一日照会印度驻华大使馆，详细列举印度方面在一九六五年下半年内在中印边境和中国-锡金边境频繁地侵犯中国的领土和领空的严重入侵挑衅事件，向印度政府提出强烈抗议。"},{"type":"paragraph","text":"照会说:去年下半年内，印军越过中印边界实际控制线和中国-锡金边界侵犯中国领土和进行挑衅的事件共三十九起。入侵印军，有的在中国境内侦察骚扰达四天之久，有的深入中国领土达十八公里之远，有的甚至窜扰到西藏重镇亚东的下司马附近。尤其严重的是，印度军队在中印边界西、东两段和中锡边界先后五次进行武装挑衅，制造冲突，打死、打伤中国边防人员各一人。在中锡边界，印军还曾六次从锡金一侧向中国境内的中国边防人员开枪打炮。去年下半年内，印度飞机飞越中印边界实际控制线和中锡边界侵犯中国领空共四十一架次，越线最深处约达一百五十公里。"},{"type":"paragraph","text":"照会指出:“一九六五年下半年，是一九六二年印方在中印边境挑起大规模冲突以来，印军侵犯中国领土次数最多、性质最严重的半年。这半年内，印度飞机侵犯中国领空的频繁程度也是过去两年来所没有的。这种情况绝不是偶然的。一九六五年下半年，印度政府加紧扩军备战，发动侵略战争，国内财政困难和粮食危机空前严重。在这种情况下，印度加紧对中国的入侵，挑起武装冲突，制造紧张局势，显然是为了讨好美帝国主义和现代修正主义者，以便从他们那里得到更多的粮食、武器和金钱。但是，印度政府象这样靠反华度日，并不能改善它的内外交困的处境，而只能落得一个悲惨的结局。”"},{"type":"paragraph","text":"中国政府在照会中再次警告印度政府:“印方必须停止对中国的一切地面和空中的入侵挑衅，否则，它必须对由此可能产生的后果承担全部责任。”"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a595d64c18"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
