script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"我们相信辩证法","authors":["刘政明","钟雄久"],"dates":[{"year":1976,"month":5,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"上海电力建设公司　刘政明　钟雄久"},{"type":"paragraph","text":"“不斗争就不能进步。”“八亿人口，不斗行吗?!”毛主席的这些教导，充满着革命的辩证法，是无产阶级世界观的体现。"},{"type":"paragraph","text":"马克思主义辩证法深刻地告诉我们，任何事物的内部都有新旧两个方面的矛盾，形成为一系列曲折的斗争；而斗争的结果，新的方面总是由小变大，由弱变强，旧的方面则由大变小，由强变弱，新生战胜腐朽，旧事物被新事物所取代。所以，斗争是促使矛盾转化的条件，是推动事物发展的动力。"},{"type":"paragraph","text":"毛主席指出:“全世界共产主义者比资产阶级高明，他们懂得事物的生存和发展的规律，他们懂得辩证法”。无产阶级之所以懂得革命的辩证法，而且能够掌握和运用它，这完全是由无产阶级的阶级地位所决定的。因为无产阶级是新的生产关系和先进的社会制度的代表，他们在为实现共产主义远大目标而奋斗的过程中，打碎的是脚镣手铐，得到的却是整个世界，因而他们在革命斗争中，比任何别的阶级来得坚决和彻底。在我国新民主主义革命取得胜利以后，广大工人、贫下中农没有停止革命。而刘少奇及其一伙却顽固地要当旧事物的复辟派，从叫嚷资本家“剥削有功”、“巩固新民主主义秩序”，到大砍合作社，搞“三自一包”， 从吹捧反动影片《清宫秘史》和《武训传》，到对抗批判《海瑞罢官》，他们在各条战线都极力反对毛主席的革命路线。文化大革命中，邓小平受到了批判，说了一大堆“悔过自新”、“永不翻案”的话。可是重新工作以后，他又大刮右倾翻案风，向文化大革命反攻倒算，直至一手挑起天安门广场事件，妄图开历史的倒车。但是，他们很快陷入了极端孤立的境地。这就是以邓小平为代表的党内资产阶级蔑视违背辩证法所受到的必然惩罚。"},{"type":"paragraph","text":"中央两报一刊编辑部重要文章《文化大革命永放光芒》说得好；“无产阶级是革命的乐观主义者。我们相信辩证法。”革命道路是曲折的，但马列主义、毛泽东思想是不可战胜的。只要我们坚持毛主席的革命路线，以阶级斗争为纲，反修防修，就一定能够在革命航道上不断前进。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a87d7167dd"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
