<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"苏修培养资产阶级接班人","authors":[],"dates":[{"year":1968,"month":5,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"苏修培养资产阶级接班人"},{"type":"paragraph","text":"苏修叛徒集团为了维护他们的修正主义统治，竭力向苏联的少年学生灌输卢布挂帅的思想，千方百计地想把下一代培养成为唯利是图的资产阶级接班人。"},{"type":"paragraph","text":"苏修《消息报》大肆鼓吹的所谓子女挣钱的“教育计划”，就是一个新的例证。"},{"type":"paragraph","text":"或者是到大街上去“卖花和冰淇淋”，“对家庭收入作出自己的贡献”；或者是埋头读书，以求成名成家，将来好“拿到加上不少利息的劳动报酬”。无论是眼前得利也好，还是为将来投资也好，反正都是为了挣钱，都是要使苏联的少年学生在金钱眼里长大，在卢布堆里打滚，从小就养成象恩格斯所揭露的那种资产阶级思想：“活着就是为了赚钱，除了快快发财，他们不知道还有别的幸福”。苏修叛徒集团腐蚀苏联少年学生心灵的阴谋手段，何其毒也！"},{"type":"paragraph","text":"但是，如果认为《消息报》所鼓吹的这两种挣钱办法对苏联所有少年学生都是一视同仁的话，那就错了。表面上看起来，似乎每一个少年都有选择任何一种挣钱办法的自由。可是，高薪阶层的子女，难道会到农场去“给泥水匠帮忙”，或是到咖啡馆里去“收拾餐桌上的食具”吗？很显然，这些娇生惯养的少爷小姐，如果不是终日逍遥游荡的话，也只会做一些所谓“非常令人尊敬的、并不是每个人都能办得到的工作”；只有苏联广大劳动人民的十四、五岁的儿童，才不得不去“从事以卢布和戈比计价的真正生产性的成年人的劳动”。"},{"type":"paragraph","text":"拆穿了说，富人的子女靠积累知识挣钱，穷人的孩子以出卖劳力养家，这就是《消息报》实际上给苏联少年学生安排的劳心与劳力的不同分工和不同出路。正是从这一点上，人们不是可以清楚地看出苏联今天的贫富悬殊和阶级分化，看出苏修叛徒集团为了全面复辟资本主义和巩固修正主义统治的狼子野心吗？"},{"type":"paragraph","text":"但是，历史的发展总是同反动派的主观愿望背道而驰的。苏联劳动人民的下一代决不会甘受苏修叛徒集团的毒害、欺骗和利用。他们一定会继承列宁、斯大林的遗志，推翻苏修叛徒集团复辟的资本主义制度，使十月社会主义革命的伟大旗帜在苏联大地上重新飘扬。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cc51c1ddf3"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
