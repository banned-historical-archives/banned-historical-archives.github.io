script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"李钟奇传达周恩来关于制止北京外语学院武斗的指示","authors":["周恩来","李钟奇"],"dates":[{"year":1967,"month":10,"day":18}],"is_range_date":false,"parts":[{"text":"李钟奇传达周恩来关于制止北京外语学院武斗的指示","type":"title"},{"text":"李钟奇周恩来","type":"authors"},{"text":"〖李钟奇：北京卫戍区付司令员〗","type":"appellation"},{"text":"奉周总理的指示来制止武斗。武斗停止下来了，如何想法把武斗在这里制止，永远不再发生，解决消除武斗一切后果。指名派丁国钰和我来，……提出以下几点意见：一、武斗暂时停止下来了，你们还很听话，双方还很紧张，要脱离接触，","type":"paragraph"},{"text":"究竟怎样脱离接触，大家考虑，以后双方达成协议。二、脱离接触，广播停下来，不要跟对方攻击，不要相互攻击。三、人民解放军考虑怎样把双方责任搞清楚，成立一个专门调查组，调查武斗的原因。","type":"paragraph"},{"text":"附件：","type":"paragraph"},{"text":"北外“红旗”与“造反团”在李付司令主持下关于制止武斗所达成协议","type":"subtitle"},{"text":"一、立即停止武斗，双方立即撤离武斗现场，恢复正常秩序，绝对不允许调动各单位人员参加武斗。","type":"paragraph"},{"text":"二、坚决执行六·六通令，不许互相抓人，双方立即无条件地释放已提的双方人员。","type":"paragraph"},{"text":"三、双方拆除一切武斗工事。交出一切武斗工具。（由卫戍区解放军封存）解散一切武斗专业队。","type":"paragraph"},{"text":"四、双方不得用任何形式攻击对方（如用广播、传单、大字报）。","type":"paragraph"},{"text":"五、双方认真学习毛主席的最新指示和中央十月十八日关于按系统实现革命大联合的通知，实行开门整风，进行自我批评，尽快按现班级系的革命大联合。","type":"paragraph"},{"text":"六、双方必须严格执行协议，谁破坏协议，由卫戍区和革委会作严肃处理。","type":"paragraph"},{"text":"此协议从十月十九日零点开始生效。","type":"paragraph"}],"comments":[],"origin":"1967年10月21日清华大学井冈山斗批改战团编印《学习资料》第21期","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"李钟奇","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"武斗","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d36642835d"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
