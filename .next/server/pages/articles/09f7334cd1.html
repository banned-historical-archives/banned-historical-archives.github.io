<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"“管、卡、压”是资产阶级的“王法”","authors":["龚仑"],"dates":[{"year":1976,"month":7,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"上海新华印刷厂　龚仑"},{"type":"paragraph","text":"说起企业管理制度，我们的态度从来很明朗:我们反对的是修正主义的规章制度；至于有利于调动工人群众社会主义积极性、有利于发展生产的合理的规章制度，我们不但不反对，而且要使它不断完善。毛主席教导我们:“加强纪律性，革命无不胜。”我们工人阶级最有组织，最讲纪律，这是我们的阶级地位所决定的嘛。但是，我们讲的是无产阶级纪律，要的是社会主义制度呀。如果是修正主义纪律，资本主义制度，我们则是毫不犹豫地要加以反对的。在无产阶级文化大革命中，我们摧毁了刘少奇反革命的修正主义路线，批判了“管、卡、压”的规章制度，废除了奖金挂帅，物质刺激，建立了生机勃勃的新规章制度，新的合理的规章制度在斗争实践中不断完善。它虽然没有多少明文条条，但它体现了我们工人当家作主的精神，是订在我们工人心坎上的，大家都自觉执行。"},{"type":"paragraph","text":"可一提起修正主义的规章制度，我们工人肚里都有一笔帐，真是又恨又气啊。文化大革命前，新华印刷厂的规章制度可算得够“严密”的了。那时，在刘少奇反革命的修正主义路线影响下，厂里制订了一整套“生产技术管理制度”，多达五百八十多条，洋洋五万余言，基本思想就是怎样管工人。它规定学徒进厂不能碰机器，只能做做勤杂工；工种之间相互不能串联交流，如果胆敢越雷池半步，就说你违反制度，弄得不好还要受处分。这样，我们工人被一钉一铆地管得死死的，成了规章制度的奴隶。有的工人说:“这些制度象一根包着橡皮的钢鞭子，打在我们工人身上，不伤皮肉而痛入骨髓。”这真是一点不假!那时候，是厂长立法，管理人员执法，我们工人只配守法。结果呢?干部指手画脚，工人忙乱手脚。这样的所谓“规章制度”，卡住了我们的脖子，有劲使不出，有话说不响，哪里还谈得上做工厂的主人?修正主义的“管、卡、压”，就是资产阶级加在我们工人头上的“王法”啊!"},{"type":"paragraph","text":"“社会主义不是按上面的命令创立的。它和官场中的官僚机械主义根本不能相容；生气勃勃的创造性的社会主义是由人民群众自己创立的。”(《全俄中央执行委员会会议》，《列宁全集》第26卷第269页)无产阶级文化大革命使全厂人与人之间的关系出现了一个崭新的面貌。通过学习马列著作和毛主席著作，学习无产阶级专政理论，我们进一步懂得自己是工厂的主人，加强了内部团结，大大激发了社会主义积极性。任务一来，干部、群众一同商量，群策群力，不管你是厂党委书记还是一般管理人员，都深入班组与群众同学习、同批判、同劳动，建立了新型的人与人之间的关系，打破了工种与工种之间、车间与车间之间、干部与群众之间的界限，为了一个共同的革命目标并肩战斗。回想过去，在修正主义的“管、卡、压”下，干部哪里会和我们工人划等号呢?如今，当家作主的精神大发扬，干群关系不断得到改善，群众的社会主义积极性可高哪。不少工人参加了“三结合”的技术革新小组，对厂里的老机器老设备进行了改革，在短时期内造出了我国第一台薄板双面轮转印刷机，填补了我国印刷工业的一项空白。这难道是五百多条的“软鞭子”打得出来的吗?"},{"type":"paragraph","text":"不比不知道，一比就明了。文化大革命前规章制度一大套，产量十步九徘徊；文化大革命后制度换新貌，生产年年超指标。我们工人说，提高生产不靠奖金靠路线，不靠“管、卡、压”，而是靠马列主义、毛泽东思想。"},{"type":"paragraph","text":"邓小平一再宣扬的“严密”的规章制度，当然不是指无产阶级文化大革命中建立起来的新制度，而是那些“管、卡、压”的修正主义制度。他公开说，在文化大革命前根据刘少奇的修正主义办企业路线炮制出来的那些条条框框“还是好的，还可以用”。邓小平这样声嘶力竭地叫喊，目的就是为了恢复修正主义管理制度那一套。这就是要搞“管、卡、压”，搞物质刺激，从而变社会主义企业为资本主义企业。"},{"type":"paragraph","text":"西洋镜终归要拆穿的。尽管邓小平花招多，我们工人阶级是骗不了的。我们看得很清爽，如果照他的话去做，资本主义就会复辟。我们工人印刷马列著作、毛主席著作的权利又要被重新剥夺，文化大革命前的往事就会重演。邓小平要重新恢复修正主义的“管、卡、压”，搞复辟倒退，我们工人阶级坚决不答应，誓与他们斗到底。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"09f7334cd1"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
