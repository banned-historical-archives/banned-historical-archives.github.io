script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"罗素向世界和平大会发表书面声明  威胁世界和平的是美帝国主义  世界人民要公开起来反对美国统治和剥削","authors":[],"dates":[{"year":1965,"month":7,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"罗素向世界和平大会发表书面声明"},{"type":"paragraph","text":"威胁世界和平的是美帝国主义"},{"type":"paragraph","text":"世界人民要公开起来反对美国统治和剥削"},{"type":"paragraph","text":"新华社赫尔辛基十三日电　著名英国哲学家罗素今天在这里举行的一次群众大会上发表一项书面声明，强烈谴责美国侵略越南的政策，并且指出目前威胁世界和平的是美帝国主义。"},{"type":"paragraph","text":"罗素的书面声明是由罗素和平基金委员会代表舒恩曼宣读的。在这以前，这项声明也发给了出席“和平、民族独立与普遍裁军世界大会”的各国代表团。"},{"type":"paragraph","text":"罗素的声明说：目前，所有关心和平的人所面临的问题是美国的现行政策。美国的执政者已经使这个国家执行着一个剥削和控制外国的有系统的计划。美国在全世界设有三千多个军事基地。这一庞大的国际军事控制系统的存在，是因为美国资本主义控制了百分之六十的世界资源，虽然美国的人口只占世界人口的百分之六。"},{"type":"paragraph","text":"声明说：“世界大多数人民要末必须接受现状，要末就公开起来反对美国统治和剥削。这就是现在美国在越南进行的骇人听闻的残酷的侵略战争的主要背景事实。”"},{"type":"paragraph","text":"声明指出，世界上最强大的工业国家，在一场战争中运用它所掌握的一切技术和资源到几千里之外去消灭一个农业国家的人民。仅在一年之中，美国和它的傀儡政府就进行了五万次带有凝固汽油弹的空袭。大规模屠杀武器用来向南越和平居民进行试验。"},{"type":"paragraph","text":"罗素说，“近年来的事件和美国目前的政策毫无疑问地表明，威胁世界和平的是美帝国主义。任何真诚地观察世界局势、了解事实的人们必然得出这样的结论。”"},{"type":"paragraph","text":"罗素说，“除非美国政府，特别是军界和中央情报局放弃其反革命的主张，不再反对争取政治和经济独立的斗争，否则世界就仍然会从一个危机走向另一个危机。除非人们准备反对和打倒那些赞成进行化学和凝固汽油弹战争的政府，否则美国必将继续推行它的用屠杀来进行试验的政策。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9116f51deb"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
