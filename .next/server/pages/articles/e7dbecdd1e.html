" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"财政部关于对城市上山下乡知青场队免税规定中几个问题的解释","authors":[],"dates":[{"year":1979,"month":6,"day":28}],"is_range_date":false,"parts":[{"text":"财政部关于对城市上山下乡知青场队免税规定中几个问题的解释","type":"title"},{"text":"各省、市、自治区革命委员会：","type":"appellation"},{"text":"我部(79)财税字第15号“关于为城市上山下乡知识青年举办的知青场、队及生产基地免税问题的通知”下达以后，有些地区在执行中提出一些问题，要求明确。经与国务院知青办公室研究同意，答复如下：","type":"paragraph"},{"text":"一、关于为安置城市上山下乡知识青年举办的农、工、林、牧、副、渔知青场、队或生产基地，是否必须是独立核算的集体所有制单位，才能实行不交税、不上交利润，不担负农产品统购派购任务。(以下简称“三不政策”)","type":"paragraph"},{"text":"根据中央(1978)74号文件规定，为安置上山下乡知识青年专门举办的或以知青为主的农、工、林、牧、副、渔知青场、队或生产基地，实行“三不政策”的基本条件必须是独立核算的集体所有制单位。不是独立核算的集体所有制场、队基地，不能实行“三不政策”。","type":"paragraph"},{"text":"二、国营农场吸收城市上山下乡知识青年，同其他职工一起，参加场内生产劳动，知青人数占农场总人数的百分之六十以上，但没有专门为这些知识青年举办独立核算的集体所有制农、工、林、牧、副、渔生产单位，对这样的国营农场能否实行“三不政策”？","type":"paragraph"},{"text":"国营农场吸收的城市上山下乡知识青年在农场同其他职工一起参加生产劳动，在生产经营上与农场区别不开，其劳动成果由农场统一核算，也没有为他们专门举办独立核算的集体所有制农、工、林、牧、副、渔生产单位，虽然知青人数占农场总人数的百分之六十以上，对这样的国营农场，不实行“三不政策”，仍应按照对国营农场的规定，由农场交税、交利。","type":"paragraph"},{"text":"三、财政部(79)财税字第15号通知第三条规定，国营农场为安置城市上山下乡知识青年举办的农、工、林、牧、副、渔生产单位，在生产经营上能与本农场的生产区别开来，实行独立核算，其安置的城市上山下乡知识青年人数占总人数的百分之六十以上的，免予交税、交利。这里说的“独立核算”应当怎样掌握?","type":"paragraph"},{"text":"这里所说的“独立核算”是指国营农场为安置城市上山下乡知识青年而专门举办的农、工、林、牧、副、渔生产单位，实行独立核算盈亏并自己处理盈亏而言。即：这些生产单位能与农场生产经营区别开来，形成单独经营、自负盈亏的集体所有制生产单位，知青人数又占总人数的百分之六十以上，才能免予交税、交利。否则，仍应按照对国营农场的规定交税、交利。","type":"paragraph"},{"text":"四、对于为已经成为国营农场正式职工的城市上山下乡知识青年和本农场自然成长的职工子女举办的独立核算的集体所有制农、工、林、牧、副、渔生产单位是否实行“三不政策”?","type":"paragraph"},{"text":"对于上述生产单位，不应实行“三不政策”，应按国营农场的规定交税、交利。","type":"paragraph"},{"text":"五、国营林场、牧场、茶场为安置城市上山下乡知识青年举办的农、工、林、牧、副、渔知青场、队或生产基地，是否可以比照国营农场举办的知青场、队或生产基地免交税，利的规定办理?","type":"paragraph"},{"text":"国营林场、牧场、茶场以及其它国营种植养殖场等等为安置城市上山下乡知识青年举办独立核算的集体所有制知青场、队或生产基地，都可以比照我部(79)财税字第15号通知关于国营农场举办的知青场、队及生产基地的规定办理。","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"革命委员会","type":"主题/事件"},{"name":"上山下乡","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e7dbecdd1e"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
