script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"向毛主席拜年","authors":["郭沫若"],"dates":[{"year":1950,"month":1,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"郭沫若"},{"type":"paragraph","text":"今天下午，我在政务院的议事厅读了一通电报，"},{"type":"paragraph","text":"是抚顺矿务局机电厂的工友们向毛主席拜年。——"},{"type":"paragraph","text":"亲爱的毛主席，我们要告诉你一个好消息，"},{"type":"paragraph","text":"我们把一九四九年度的生产计划早已经超过了。"},{"type":"paragraph","text":"合金、铸铁、铸钢、锻造等本来预定的是二五九○吨，十一月尾已经产生了三三八二吨，年底可到三七四二吨。"},{"type":"paragraph","text":"马达变压器的修理本来预定的是六○九台，已经修理了一二三五台，年底可到一三三○台。"},{"type":"paragraph","text":"煤钻已经修理了三八五台，年底可到四一○台。(这一项原电中没有预定台数，或许是在计划之外。)"},{"type":"paragraph","text":"新造了五○马力马达三台，三五马力马达三五台；新造了一○马力扇风机一○台、○。五马力电钻六○台。"},{"type":"paragraph","text":"亲爱的毛主席，你领导得太辛苦，我们多谢你，就以这些生产数字来向你拜一九五○年的新年。——"},{"type":"paragraph","text":"这，我感觉着毫无疑问是一九四九年的一首压卷的好诗；抄出来请人民诗人们评价一下，看是不是?"},{"type":"paragraph","text":"(一九五○年一月五日)"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6c7cbb3a18"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
