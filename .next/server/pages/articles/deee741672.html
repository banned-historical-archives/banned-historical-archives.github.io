" crossorigin="">{"props":{"pageProps":{"books":[{"id":"wenji2","name":"毛泽东文集第二卷（1999）","type":"pdf","internal":false,"official":true,"author":"中央文献研究室","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/wenji2.pdf"],"article":{"title":"同各方接洽要有谦逊态度","description":"根据中央档案馆保存的抄件刊印。","dates":[{"year":1937,"month":8,"day":10}],"parts":[{"text":"同各方接洽要有谦逊态度","type":"title"},{"type":"appellation","text":"雪枫同志："},{"type":"paragraph","text":"各电均悉，甚慰。"},{"type":"paragraph","text":"甲、同各方接洽，在积极推动抗战的总方针下，要有谦逊的态度，不可自夸红军长处，不可说红军抗日一定打胜仗，相反要请教他们各种情况，如日军战斗力、山地战、平原战等等红军素所不习的情形，以便红军有所根据，逐渐克服困难。不可隐瞒红军若干不应该隐瞒的缺点，例如只会打游击战，不会打阵地战，只会打山地战，不会打平原战，只宜于在总的战略下进行独立自主的指挥，不宜于以战役战术上的集中指挥去束缚，以致失去其长处，这些都应着重说明。根据山地战与游击战的理由，红军要求位于冀、察、晋、绥四省交界之四角地区，向着沿平绥路西进及沿平汉路南进之敌，作侧面的袭击战，配合正面友军战略上的行动。红军技术与装备十分贫弱，也要使他们知道，并照昨电所开五类十九种物品要求补充，否则同强敌作战，是难以收效的。"},{"type":"paragraph","text":"乙、因时局紧急，红军不待改编即拟出动，到大同后再行改编。朱、周已于九日飞京，俟接其回电立即出动。如他们问及如何还未改编，则答以因为南京的拖延（不发表宣言，不决定政治纲领，不发表指挥部，也不颁布番号，最近几天内才把番号颁下，但指挥部还未委任）。"},{"type":"paragraph","text":"丙、出动路线，因洛川至府谷千余里无粮，延安南北八百余里颗粒无买（机关粮食从晋西与西安买来），因此决不能走陕北，只能走韩城渡河经蒲县、孝义、汾阳到大同集中。此点与阎交涉一定要办到。"},{"type":"paragraph","text":"丁、太原公开办事处立即开设，你为主任。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"八月十日"}],"comment_pivots":[{"part_idx":1,"offset":2,"index":1},{"part_idx":3,"offset":228,"index":2},{"part_idx":3,"offset":232,"index":3},{"part_idx":4,"offset":31,"index":4},{"part_idx":5,"offset":81,"index":5},{"part_idx":6,"offset":9,"index":6}],"is_range_date":false,"authors":["毛泽东"],"comments":["雪枫，即彭雪枫（一九○七——一九四四），河南镇平人。当时受中共中央委派在山西等地做统一战线工作。","察，指察哈尔省，见本卷第5页注〔3〕。","绥，指绥远省，见本卷第5页注〔4〕。","朱，指朱德。周，指周恩来。他们当时已赴南京参加商讨国防问题的会议。","阎，指阎锡山（一八八三——一九六○），山西五台县河边村（今属定襄）人。当时任国民党政府太原绥靖公署主任。","指八路军驻山西办事处。"],"page_start":19,"page_end":20,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"deee741672"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
