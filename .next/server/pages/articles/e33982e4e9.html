" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji50","name":"毛泽东全集第50卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji50.pdf"],"article":{"title":"要从政治上、思想上、理论上把走资派打倒","alias":"","parts":[{"type":"paragraph","text":"要从政治上、思想上、理论上"},{"type":"paragraph","text":"把走资派打倒"},{"type":"paragraph","text":"（1967年8月）"},{"type":"paragraph","text":"现在的无产阶级文化大革命，不是快要结束，而是要更深入。更大规模地开展起来，要集中力量批判党内最大的一小走资本主义道路当权派。要宣传八届十一中全会，要好好讲讲成绩，讲讲方向，要把最大的走资本主义道路当权派打倒，不仅要从组织上，而且要从政治上、思想上、理论上把他们打倒。这是国家大事，世界大事。不打倒修正主义，他们就要搞复辟，这是一个伟大的历史任务。要向前看，这个任务远远没有完成。"}],"authors":["毛泽东"],"dates":[{"year":1967,"month":8}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":67,"page_end":67},"tags":[{"name":"毛泽东","type":"人物"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e33982e4e9"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
