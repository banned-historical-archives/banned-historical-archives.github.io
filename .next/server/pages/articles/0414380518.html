script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"批判资产阶级世界观　搞好文艺革命","authors":["齐淑芳"],"dates":[{"year":1973,"month":9,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"上海京剧团《智取威虎山》剧组演员、共产党员　齐淑芳"},{"type":"paragraph","text":"周恩来同志在十大所作的政治报告中指出:“要重视上层建筑包括各个文化领域的阶级斗争，改革一切不适应经济基础的上层建筑。”在学习这个政治报告时，我联系文艺战线尖锐复杂的两个阶级、两条路线的斗争，更加体会到周恩来同志提出这一任务的重要性。我们作为战斗在上层建筑的共产党员，应该坚决地响应党的号召，批判修正主义，批判资产阶级世界观，把上层建筑的革命进行到底。"},{"type":"paragraph","text":"文艺领域是上层建筑的重要组成部分，是两个阶级争夺十分激烈的一条战线。在这条战线上，地主资产阶级思想影响很深，修正主义文艺路线的流毒很深，所以斗、批、改的任务也很重。文化大革命以前，在文艺黑线统治下，文艺舞台上出现的都是帝王将相、才子佳人，刘少奇一伙就是用这些封资修的东西破坏社会主义的经济基础。我们一些演员，由于路线斗争觉悟不高，在“有了业务就有了一切”、“只专不红”等修正主义黑货的腐蚀、毒害下，埋头演戏，至于演的什么戏，走的什么路，都不过问，有的甚至错误地认为，只要演好戏就是为工农兵服务了，所以文艺舞台被资产阶级专了政，自己还没有意识到。"},{"type":"paragraph","text":"经过无产阶级文化大革命，我们批判了刘少奇一伙企图利用文化、教育等上层建筑领域复辟资本主义的阴谋，深入开展了上层建筑领域的革命。然而，就在我们遵循毛主席的指示，认真搞好斗、批、改的时候，林彪这个资产阶级野心家、阴谋家又跳出来，破坏我们正在进行的这场革命，用“天才史观”这种修正主义黑货来毒害文艺工作者，宣扬靠什么“天赋之才”就能演好戏，成为一个好演员。他们阻挠文艺工作者到工农兵中间去，企图让大家脱离火热的斗争生活。在党的领导下，我们学习了毛主席的革命文艺思想，坚持走毛主席指引的文艺为工农兵服务的道路，到山东省崂山县深入生活，到武汉钢铁公司向工人群众学习，为工人群众演出，到上海的一些工厂、农村认真接受工农的再教育。通过这些活动，我们体会到，深入工农兵的过程，就是加强文艺队伍思想改造的过程。只有全心全意地向工人阶级学习，才能对修正主义路线及其思想体系提高识别能力，才能自觉地批判资产阶级世界观。"},{"type":"paragraph","text":"现在，林彪一伙虽然彻底完蛋了，但是，反动阶级还是要抓住上层建筑不放的。正如毛主席指出的那样，“他们人还在，心不死”，一有机会又会以新的形式向无产阶级进攻。为了在这种尖锐、复杂的斗争中能辨清方向，我们就必须努力学习马列主义、毛泽东思想，运用马列主义的观点来分析问题和解决问题，使自己在一种错误倾向出现的时候能顶得住，并尽自己的最大努力，搞好文艺革命。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"林彪","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0414380518"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
