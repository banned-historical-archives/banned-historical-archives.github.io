script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"结合革命大批判进行本单位斗批改鲁迅兵团批判修正主义体育路线一些班队深入基层征求工农兵对体育界斗批改的意见","authors":[],"dates":[{"year":1967,"month":6,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　正当全国亿万人民奋起毛泽东思想千钧棒，深入开展革命大批判运动的关键时刻，上海体育战线革命造反司令部鲁迅兵团的全体战士以激昂的革命斗志，结合本单位情况，掀起了批判修正主义体育路线的高潮。"},{"type":"paragraph","text":"从上月二十四日起，鲁迅兵团全体战士发扬大民主精神，连续召开了几天关于如何联系本单位进行斗批改的讨论会，全体战士统一了认识，一致认为斗批改在现阶段应该着重从批判修正主义体育路线着手，人人动口，人人动脑，人人动笔，打一场人民战争。"},{"type":"paragraph","text":"接着，兵团核心小组成员又在全运动系大会上向全体战士、革命群众、革命干部作了动员，要求全体同志高举毛泽东思想伟大红旗，发扬敢闯、敢说、敢干、敢革命的造反精神，在这次大批判运动中争当革命的急先锋。当晚，兵团所属各战斗队和革命群众、革命干部就展开了热烈的讨论，他们结合本班、队的具体情况，初步分析了解放以来在体育界所贯彻的修正主义路线的种种表现形式。他们以自己亲身的经历揭发、控诉了党内一小撮走资本主义道路当权派窃取了领导权，在体育界疯狂地反对毛主席关于“发展体育运动，增强人民体质”的伟大指示，大搞锦标主义、个人奋斗、物质刺激、技术挂帅等一整套修正主义的体育路线，毒害青少年运动员，明目张胆地对抗毛主席的革命路线，使无产阶级的体育事业已经滑到了修正主义的边缘。这些活生生的事实教育了每一个同志，激起了无比愤怒的阶级仇恨。第二天，整个运动系就出现了大量批判修正主义体育路线的大字报。随着大批判的深入，各运动队的造反队员还专门发动群众，以亲身参加的训练项目中的大量事实，比较系统、深刻地揭发、批判了修正主义体育路线。此外，他们还组织了小型的批、斗会。"},{"type":"paragraph","text":"在批判修正主义体育路线的同时，鲁迅兵团近日来有些班队已分别深入工农兵群众，一边表演示范，一边征求工农兵群众对体育界斗批改的意见。游泳纵队和水球造反队曾派了三个同志到金山县协助开展武装民兵的游泳训练工作，乒乓队等也下基层，并和群众开了座谈会。"},{"type":"paragraph","text":"为了更好地深入展开革命的大批判运动，鲁迅兵团游泳纵队的核心组还提出了当前首先要学好毛主席的最新指示和上海市革命委员会《为加强无产阶级专政而斗争》的决议，继续发扬“一边战斗、一边整风”的精神，更好地进行无产阶级文化大革命。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"人民战争","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e645bd479f"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
