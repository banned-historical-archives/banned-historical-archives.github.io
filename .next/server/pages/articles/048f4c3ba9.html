<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"贵阳棉纺厂革命职工大破资产阶级“权威”  革命放在首位  生产迅猛发展  色布质量达到建厂以来最高水平，产量上升，成本降低","authors":[],"dates":[{"year":1967,"month":3,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"贵阳棉纺厂革命职工大破资产阶级“权威”"},{"type":"paragraph","text":"革命放在首位  生产迅猛发展"},{"type":"paragraph","text":"色布质量达到建厂以来最高水平，产量上升，成本降低"},{"type":"paragraph","text":"新华社贵阳电　贵州省第一个按行政部门实现大联合的贵阳棉纺厂无产阶级革命派，在取得夺权胜利之后，大破资产阶级反动技术“权威”，调动职工群众的积极性和创造性，发扬敢想敢干的革命精神，连连攻克技术难关，使色布的质量创造了建厂以来的最高水平，产量稳定上升，成本显著降低。"},{"type":"paragraph","text":"二月份以来，这个厂出厂色布的一等品率天天达到百分之九十以上，大大超过了国家规定的指标；平均每染一万米色布所用的染料，也比过去节约了百分之十；同时，因为采用了烧碱废液退浆的办法，每月可节约烧碱四百公斤。这个厂过去从来没有生产过的大红布，现在也染出来了，而且色泽瑰丽，鲜红似火。"},{"type":"paragraph","text":"贵阳棉纺厂是贵州省最大的一个棉纺厂，一九六○年建厂，一九六一年开始投入生产。厂房新，设备好，技术力量也较强。可是，过去因为被党内一小撮走资本主义道路的当权派篡夺了领导权，产品质量一直达不到国家标准，色布一等品率最高也没有超过百分之四十五。工人们也曾提了许多宝贵的建议，有的老工人先后提出过二十多次合理建议，但都遭到厂内一小撮走资本主义道路的当权派和资产阶级反动技术“权威”的压制。他们有时甚至连建议书都不看，就把它丢进了字纸篓里。"},{"type":"paragraph","text":"今年一月十九日，这个厂的无产阶级革命派联合起来，夺了党内一小撮走资本主义道路当权派的权。无产阶级革命派根据革命的“三结合”的方针，对领导干部和技术人员进行了阶级分析，吸收一批革命的领导干部和革命的技术人员参加了厂和车间的生产领导班子。他们还按照毛主席的教导，坚决打倒党内一小撮走资本主义道路的当权派和资产阶级反动技术“权威”，甩掉一切洋教条、洋框框，处处走群众路线，尊重群众的首创精神。老师傅陆忠宝在夺权后主动和车间生产领导小组的成员研究，重新提出了过去被党内一小撮走资本主义道路当权派压制的改进色布纬密度的建议。车间领导小组立刻加以支持，并且派了技术员唐照华和几个工人与他一起研究，改进了一些设备，终于解决了六年多来一直没有解决的关键问题，使色布的纬密度超过了国家标准。老工人曹金宝等，也在夺权的第二天，主动提出了利用一九○号士林蓝布染料废液的建议，并立即得到支持。这一建议实现后，使每染一万米士林蓝布所用的染料，比过去减少了将近百分之三。这一经验已在染其它品种色布时加以推广，一年可为国家节约二十四万多元。印染车间的两个青年工人为了解决过去长期无法解决的矾拉明蓝布泛红问题，主动地启用了被资产阶级反动技术“权威”借口技术力量不够而停用了三年多的蒸气箱，并在老工人的指导下，成功地操纵了这台机器，使矾拉明蓝布的质量大大提高。"},{"type":"paragraph","text":"三月初，这个厂的无产阶级革命派按行政部门实现大联合后，更为技术革新创造了良好条件。印染车间的整理、漂白、保全等工段的无产阶级革命派互相鼓励，互相支援，互相帮助，开展大协作，在较短时间内连连攻克了十大生产关键，在提高色布质量上打了一个漂亮仗。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"贵州文革","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"048f4c3ba9"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
