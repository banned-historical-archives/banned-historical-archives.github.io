script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"阿中友协代表团长康迪盛赞阿中友谊和我国巨大成就中国正以巨人的步伐向前迈进现代修正主义者说什么中国的总路线、大跃进和人民公社遭到了“失败”，他们的这种梦想和希望永远也实现不了。中国人民在社会主义建设、维护世界和平的斗争中将取得更大的成就。","authors":[],"dates":[{"year":1963,"month":11,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社地拉那16日电】　不久前访华回国的阿尔巴尼亚中国友好协会代表团团长皮罗，康迪，今天在《人民之声报》发表文章，盛赞阿中两国人民的兄弟友谊和中国在各方面的巨大成就。"},{"type":"paragraph","text":"康迪在这篇题为《人民中国正以巨人的步伐向前迈进》的文章中写道，阿中友协代表团这次在中国各地访问，亲眼看到伟大的中国。中国的伟大不仅指的是它人口众多、幅员广大，而且指的是它拥有强大的经济力量、现代工业、社会主义农业，同时也指的是它在本世纪以来的革命历史，它的光荣的共产党，它的具有崇高道德品质的优秀人民。"},{"type":"paragraph","text":"文章指出，通过这次访问，阿中友协代表团的成员们对七亿兄弟的中国人民在本国胜利地建设社会主义方面的劳动、生活和不倦的努力，对他们为反对帝国主义和各国反动派、为保卫马克思列宁主义的纯洁性、为反对现代修正主义而进行的斗争，得到了更完整的印象。"},{"type":"paragraph","text":"文章说，伟大的中国人民对阿尔巴尼亚人民、阿尔巴尼亚劳动党和霍查同志的热烈感情，给我们留下了不可磨灭的印象。"},{"type":"paragraph","text":"文章说，从地理空间来看，阿中两国虽然相距很远，但是，无比深厚的友谊却把我们两国联结在一起。这种纯洁的、真挚的、真正的友谊是建立在马克思列宁主义的不朽学说、无产阶级国际主义原则和共同目标、共同对敌的基础上的。在中国人民中间度过的那些令人永远不能忘怀的日子里，我们感到象在自己家里，在兄弟和同志中间一样。我们有着共同的思想和共同的心。"},{"type":"paragraph","text":"文章说，伟大的中国人民钢铁般地团结在光荣的中国共产党的周围，在社会主义建设道路上取得了辉煌的胜利。使我们感到特别高兴的是，由于曾遭到连续三年的自然灾害而造成困难的农业在今年获得了比去年更好的收成，这种成果本身就说明了中国共产党的路线的正确性。文章说，赫鲁晓夫修正主义集团及其追随者说什么中国的总路线、大跃进和人民公社遭到了“失败”，但是他们的这种梦想和希望永远也实现不了。"},{"type":"paragraph","text":"文章说，中国人民在光荣的、以毛泽东同志为首的党中央委员会的领导下，始终高举总路线、大跃进、人民公社三面红旗，战无不胜地由胜利走向胜利。"},{"type":"paragraph","text":"文章强调指出，爱好和平的、进步的各国人民、所有各洲的革命者，以赞美和同情的心情注视着中华人民共和国。文章说，中华人民共和国今天成了照路的灯塔，成了各国人民反对帝国主义者和殖民主义者、反对各国反动派、争取民族解放、争取社会主义胜利、维护真正和平的神圣的正义斗争的物质上和道义上的支持者。帝国主义者、反动派和现代修正主义者梦想孤立中华人民共和国，但是，伟大的人民中国的真正朋友却在日益增多。"},{"type":"paragraph","text":"文章最后表示深信，中国人民在社会主义建设、维护世界和平的斗争中将取得更大的成就。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"959a5dc7d1"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
