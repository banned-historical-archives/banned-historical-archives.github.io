script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"西藏帕里人民深入学习毛主席重要指示和元旦社论  决心把帕里建成坚不可摧的反帝前哨","authors":[],"dates":[{"year":1970,"month":1,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"西藏帕里人民深入学习毛主席重要指示和元旦社论"},{"type":"paragraph","text":"决心把帕里建成坚不可摧的反帝前哨"},{"type":"paragraph","text":"新华社拉萨八日电　西藏自治区帕里镇的广大藏族人民，深入学习毛主席的重要指示和中央两报一刊元旦社论，决心用毛主席关于“提高警惕，保卫祖国”，“备战、备荒、为人民”的伟大战略思想观察一切，检查一切，落实一切，进一步巩固农村社会主义阵地，把帕里建设成为我国西南边疆的坚不可摧的反帝前哨。"},{"type":"paragraph","text":"帕里镇地处祖国边境前沿。解放以前，这里的藏族人民深受国内外反动派的压迫。广大农牧民翻身以后，无限忠于毛主席，无限忠于毛泽东思想，无限忠于毛主席的革命路线，紧跟毛主席，坚决走社会主义道路。他们响应毛主席发出的“农业学大寨”的伟大号召，垦荒造田，在海拔五千米的高寒地区种植青稞成功，使自古不产粮的帕里变成了世界屋脊的“粮仓”，成了西藏自治区农业学大寨的先进典型。"},{"type":"paragraph","text":"毛主席的重要指示和中央两报一刊元旦社论发表后，帕里镇各人民公社、各基层单位在解放军毛泽东思想宣传队的帮助下，纷纷举办各种类型的毛泽东思想学习班，召开座谈会、讲用会，对毛主席的重要指示和元旦社论认真学习，坚决贯彻。许多单位根据元旦社论精神，检查本单位的工作，找出差距，订出规划，订出措施。一个既轰轰烈烈又扎扎实实的“抓革命、促生产、促工作、促战备”的新高潮正在这个世界高城蓬勃兴起。各人民公社广大社员已经制订了一九七○年扩大耕地面积和提高单位面积产量的计划，积极开展冬灌、积肥等工作，决心在一九七○年夺取更大的丰收。"},{"type":"paragraph","text":"伟大领袖毛主席教导我们：“军民团结如一人，试看天下谁能敌？”帕里的广大藏族贫苦农牧民，从自己的亲身经历中深深体会到军民团结的重要。他们无限深情地说：毛主席派来的解放军，是翻身农奴的贴心人。他们帮助我们打倒了三大领主，推翻了万恶的封建农奴制度，使我们成了国家的主人。解放军和百万翻身农奴是一家人。广大翻身农牧民无限热爱解放军，坚决拥护解放军，大力支持解放军。每当边防部队来到帕里，他们总是捧出最香的酥油茶请解放军喝，腾出最好的房子给解放军住，背水送柴给解放军做饭。他们跟边防部队团结一心，守卫边防，把西南边疆建设成为铜墙铁壁，使国内外阶级敌人无隙可乘。"},{"type":"paragraph","text":"毛主席最近指出：“全世界人民团结起来，反对任何帝国主义，社会帝国主义发动的侵略战争，特别要反对以原子弹为武器的侵略战争！如果这种战争发生，全世界人民就应以革命战争消灭侵略战争，从现在起就要有所准备！”帕里镇的革命人民学习了毛主席的这一重要指示，人人精神振奋，个个斗志昂扬，他们进一步加强军民团结，狠抓革命，猛促生产。广大藏族社员豪迈地说：我们有战无不胜的毛泽东思想武装头脑，如果帝、修、反胆敢侵犯我国神圣领土，我们坚决和亲人解放军并肩战斗，把侵略者埋葬在人民战争的汪洋大海之中。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"西藏文革","type":"人物"},{"name":"人民战争","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fc38bedb44"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
