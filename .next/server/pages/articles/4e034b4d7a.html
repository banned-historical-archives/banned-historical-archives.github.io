script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"在巴黎警察厅的剥削下……","authors":["乐山"],"dates":[{"year":1957,"month":11,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"在巴黎警察厅的剥削下……"},{"type":"paragraph","text":"在腐朽、没落的资本主义社会里，人剥削人的现象是层出不穷的。"},{"type":"paragraph","text":"9月15日的巴黎“战斗报”在一篇报道里，暴露了巴黎“中央菜市场”搬运工人遭受巴黎警察厅残酷剥削的实况。"},{"type":"paragraph","text":"巴黎“中央菜市场”的搬运工人是由巴黎警察厅直接控制的。由于失业工人众多，求职者纷至沓来，警察厅对“中央菜市场”搬运工人应征条件的规定极端苛刻。首先，应征者必须是结过婚的、有家小的人。其次，应征者必须从未违犯过警章。巴黎警察厅还对应征者进行三项考试：第一，应征者必须背负高及人身的一篓重达二百公斤的铺路石、行走六十公尺的距离，如果面不改色就算通过。此项考试收费一百法郎。第二项考试是听写，收费二十法郎。第三项考试是答问题，收费也是二十法郎。三项考试费用合计一百四十法郎。根据过去情况，每一千名应征者，约有三百五十名可以通过第一项考试，而经过听写、答问的淘汰，选上的不过只有三、四十人。"},{"type":"paragraph","text":"四年以来，巴黎警察厅借口“中央菜市场”过于狭小，一直没有“招考”搬运工人。原有的七百名搬运工人，现在只剩下五百四十六名了。然而工作却增加了许多，搬运工人所受的剥削愈来愈严重。"},{"type":"paragraph","text":"过去，“中央菜市场”的搬运工人还有一种不成文的规定，年青力壮的搬运工人担任比较繁重的搬运工作，例如肉类的装卸等等，年纪较大的可以从事比较轻省的蔬菜搬运工作。但是，由于工作加重、人数减少，现在，这种不成文的规定早已取消。"},{"type":"paragraph","text":"按照规定，年达五十四岁的搬运工人应行退休。可是搬运工人迫于生活，无法遵守这项规定。许多年老的搬运工人仍旧干着重活，工伤事故时有所闻，而巴黎警察厅竟熟视无睹。"},{"type":"paragraph","text":"“中央菜市场”的搬运工人，名义上每天工作七小时，然而实际上，他们几乎没有休息的时间。因为除了搬运、装卸工作以外，搬运工人对留在菜市场上还没有起卸完毕的货物负有保管的责任。如果失窃，照价赔偿。“战斗报”说，由于流氓小偷并无固定办公时间，搬运工人的工作时间有时竟是每日二十四小时。　（乐山）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4e034b4d7a"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
