" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji30","name":"毛泽东全集第30卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji30.pdf"],"article":{"title":"给周世钊的信","alias":"","parts":[{"type":"paragraph","text":"给周世钊的信"},{"type":"paragraph","text":"（1951年3月19日）惊元兄："},{"type":"paragraph","text":"三月千四日给我的信收到了，谢谢您。一月二十九日的信及学生们的签名信也收到了。你的三项计划很好。进研究院很有意义，可以安心读几个月书。读完去东北华东考察一次也极好。第三项计划可能有些困难，如在两三年后实施也有可能办到。"},{"type":"paragraph","text":"我在乡下住，没有病，专为休养，暂不进城。容后面叙。祝安好！"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"三月十九日"},{"type":"paragraph","text":"[1]周世钊，字怀元，毛泽东在湖南省立第一师范学校读书时的同学，当时任湖南省立第一师范学校校长。"}],"authors":["毛泽东"],"dates":[{"year":1951,"month":3,"day":19}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":170,"page_end":170},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"efa4ec4b55"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
