script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"在党中央和毛泽东同志领导下中共中央军委会举行扩大会议用整风方法检查八年多来解放军建设工作和确定建军方针　会议同时针对目前国际局势讨论了国防工作并作出了决定","authors":[],"dates":[{"year":1958,"month":7,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京25日电】　中国共产党中央军事委员会在5月27日至7月22日举行了有高级干部一千余人参加的扩大会议。会议在党中央和毛泽东同志领导下，用整风的方法检查了建国8年多来人民解放军的建设工作，确定了今后的建军方针；同时，针对着目前的国际局势，对国防工作进行了讨论，并且作出了决定。毛泽东同志在大会上讲了话。朱德、林彪、邓小平、刘伯承、贺龙、陈毅、罗荣桓、聂荣臻、叶剑英等同志也都在大会上讲了话。在讨论结束的时候，彭德怀同志作了总结发言。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d64dbc800e"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
