script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"不能让资产阶级思想钻空子","authors":["段力佩"],"dates":[{"year":1964,"month":7,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"暑假，和寒假一样，它是学校教育的一个休整时间。在这期间，学校的工作也好，师生的生活也好，都会起一个承前启后的作用。因此，在此期间，老师和学生，既须好好休息，也应该寓休息于一些必要的工作、学习和活动之中。过好假期生活，不仅会使学生在德、智、体诸方面生动活泼地主动地得到发展，而且，会有更充沛的精力迎接新学年。为此，我们学校完全应该继续加强对他们进行阶级教育、劳动教育以及培养目标的教育；还应该注意督促他们适当温习功课，帮助他们适当地开展健康有益的文体活动。"},{"type":"paragraph","text":"但是，由于放假了，学生离开了学校，集体对他们的督促、帮助少了。另外一方面，社会上资产阶级思想对他们的影响有可能增加，社会阶级斗争也更容易在他们身上得到反映。因此，在这几十天的假期里，学校如果不做工作，或者不更多地依靠家长们、社会有关方面及社会人士做工作，这些不良影响就可能在我们的后一代的身上发生作用。"},{"type":"paragraph","text":"思想的影响，往往是潜移默化的；正面的东西少了，反面的东西更容易钻进来。我们一定要把后代培养成为有社会主义觉悟的有文化的劳动者。我们无产阶级的后一代，决不能让资产阶级争夺过去。几十天假期，对下一代的争夺，必然会较集中地表现出来。为了对我们的下一代负责，在暑假期间，我们学校，一定要好好工作，同时，不能不更多地要求家长们、社会各方面及社会人士，共同来对我们的下一代予以关怀、注意，并加强教育。"},{"type":"paragraph","text":"上海市育才中学校长　段力佩"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8c68dc7f41"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
