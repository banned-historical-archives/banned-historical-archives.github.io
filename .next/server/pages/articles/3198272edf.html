" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji24","name":"毛泽东全集第24卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji24.pdf"],"article":{"title":"政策和经验的关系","alias":"","parts":[{"type":"paragraph","text":"政策和经验的关系"},{"type":"paragraph","text":"（1948年3月6日）少奇同志："},{"type":"paragraph","text":"（一）丑巧电早悉。所提各点甚好，已收纳于中央关于老区半老区工作指示?中。惟政策与经验的关系一点，似应了解为凡政策之正确与否及正确之程度，均待经验去考证；任何经验（实践），均是从实行某种政策的过程中得来的，错误的经验是实行了错误政策的结果，正确的经验是实行了正确政策的结果。因此，无论做什么事，凡关涉群众的，都应有界限分明的政策。我感觉各地所犯的许多错误，主要的（坏人捣乱一项原因不是主要的）是由于领导机关所规定的政策缺乏明确性，未将许可做的事和不许可做的事公开明确地分清界限。其所以未能明确分清界限，是由于领导者自己对于所要做的事"},{"type":"paragraph","text":"[1]指刘少奇1948年2月18日给毛泽东的电报。他在电报中表示，希望能迅速得到党中央有关土地改革问题的文件，并说：“缺少这些文件，就不能在一般情况下避免错误及走弯路。虽然有了这些文件，也还是要犯些错误的，在我们党内主要地也还是靠党员干部的亲身体验，才能把路完全走正，但有了正确的文件之后，就能避免走许多弯路。”刘少奇在电报中还对老区土地改革中不必再一次平分土地、不人为地再搞贫农团、怎样进行土地调剂等问题提出了具体建议。"},{"type":"paragraph","text":"[2]指中共中央1948年2月22日发出的《老区半老区的土地改革与整党工作》的指示。缺乏充分经验（自己没有执行过某种政策的充分经验），或者对于他人的经验不重视，或者由于不应有的疏忽以致未能分清政策的界限。其次，是由于领导者虽然知道划分政策的界限，但只作了简单的说明，没有作系统的说明。根据经验，任何政策，如果只作简单的说明，而不作系统的说明，即不能动员党与群众，从事正确的实践。以上两种情况，各中央局与中央均应分担责任。我们过去有许多工作，既未能公开地（此点很重要，即是说在报纸上发表，使广大人们知道）明确地分清界限，又未能作系统的说明，不能专责备各中央局，我自己即深感这种责任。最近三个多月，我们即就各项政策，努力研究，展开说明，以补此项缺失。但各中央局在这方面自然有他们自己的责任。又其次，是政策本身就错了。此点许多下级党部擅自决定其自以为正确其实是错误的政策，不但不请示中央甚至也不请示中央局。例如很多地方的乱打乱杀，就是如此。但是各中央局，自己在某些政策上犯了错误的也不少。例如普绥分局，对于在订成分上侵犯中农，对于征收毁灭性的工商业税，对于抛弃开明绅士，都是自己犯了错误的。但是这类“左”倾错误犯得比较严重的似乎还不是普绥而是华北华东华中各区（从日本投降后开始，投降前也有），晋绥的严重程度似乎还在第二位。是否如此，请你们加以检讨。又其次，是领导方法上有错误，即是上下联系不够，未能迅速了解运动的情况，迅速纠正下面的错误。上述各点，请你向参加中工委会议的各同志正式提出，并展开讨论一次。"},{"type":"paragraph","text":"（二）划分阶级草案\"写出后，感觉一月决定草案？上所写的东西"},{"type":"paragraph","text":"[1]指《中共中央关于土地改革中各社会阶级的划分及其待遇的规定》（草案）。"},{"type":"paragraph","text":"[2]指毛泽东1948年1月18日为中共中央起草的决定草案。不够了，现正以一月草案中间一大段为基础重写一个决定，准备尽速公开发表。一月草案的首尾两段则写社论发表。因为中央发了新区土改要点，我给粟裕的那个电报\"没有发出的必要了，因此决定不发而将其中某些部分写入社论中公开发表为有利。"},{"type":"paragraph","text":"（三）粟裕部队要三月十五日以前才能在阳谷全部集中完毕，你们及饶、陈、康、邓似可在三月二十日左右去阳谷，你们可有充分时间讨论全部政策问题（以划阶级一书为中心）、华北局组织问题及其他问题。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"三月六日"},{"type":"paragraph","text":"[1]指毛泽东1948年1月22日就新解放区土改问题给华东野战军副司令员粟裕的电报，即《新解放区土改斗争策略》。"},{"type":"paragraph","text":"[2]饶，指饶漱石（1903一1975)，江西临川人，当时任中共中央华东局书记、华东军区政治委员。陈，指陈毅，当时任中共中央华东局第一副书记、华东军区司令员。康，指康生（1898—1975)，山东诸城人，当时任中共中央华东局第二副书记。邓，指邓子恢，当时任中共中央华东局副书记、华东军区副政治委员。"}],"authors":["毛泽东"],"dates":[{"year":1948,"month":3,"day":6}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":135,"page_end":137},"tags":[{"name":"粟裕","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"文章"}]},{"type":"pdf","id":"wenji5","name":"毛泽东文集第五卷（1999）","internal":false,"official":true,"author":"中央文献研究室","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/wenji5.pdf"],"article":{"title":"政策和经验的关系","description":"","dates":[{"year":1948,"month":3,"day":6}],"parts":[{"text":"政策和经验的关系","type":"title"},{"type":"appellation","text":"少奇同志："},{"type":"paragraph","text":"（一）丑巧电早悉。所提各点甚好，已收纳于中央关于老区半老区工作指示中。惟政策与经验的关系一点，似应了解为凡政策之正确与否及正确之程度，均待经验去考证；任何经验（实践），均是从实行某种政策的过程中得来的，错误的经验是实行了错误政策的结果，正确的经验是实行了正确政策的结果。因此，无论做什么事，凡关涉群众的，都应有界限分明的政策。我感觉各地所犯的许多错误，主要的（坏人捣乱一项原因不是主要的）是由于领导机关所规定的政策缺乏明确性，未将许可做的事和不许可做的事公开明确地分清界限。其所以未能明确分清界限，是由于领导者自己对于所要做的事缺乏充分经验（自己没有执行过某种政策的充分经验），或者对于他人的经验不重视，或者由于不应有的疏忽以致未能分清政策的界限。其次，是由于领导者虽然知道划分政策的界限，但只作了简单的说明，没有作系统的说明。根据经验，任何政策，如果只作简单的说明，而不作系统的说明，即不能动员党与群众，从事正确的实践。以上两种情况，各中央局与中央均应分担责任。我们过去有许多工作，既未能公开地（此点很重要，即是说在报纸上发表，使广大人们知道）明确地分清界限，又未能作系统的说明，不能专责备各中央局，我自己即深感这种责任。最近三个多月，我们即就各项政策，努力研究，展开说明，以补此项缺失。但各中央局在这方面自然有他们自己的责任。又其次，是政策本身就错了。此点许多下级党部擅自决定其自以为正确其实是错误的政策，不但不请示中央甚至也不请示中央局。例如很多地方的乱打乱杀，就是如此。但是各中央局，自己在某些政策上犯了错误的也不少。例如晋绥分局，对于在订成分上侵犯中农，对于征收毁灭性的工商业税，对于抛弃开明绅士，都是自己犯了错误的。但是这类“左”倾错误犯得比较严重的似乎还不是晋绥而是华北华东华中各区（从日本投降后开始，投降前也有），晋绥的严重程度似乎还在第二位。是否如此，请你们加以检讨。又其次，是领导方法上有错误，即是上下联系不够，未能迅速了解运动的情况，迅速纠正下面的错误。上述各点，请你向参加中工委会议的各同志正式提出，并展开讨论一次。（二）划分阶级草案写出后，感觉一月决定草案上所写的东西不够了，现正以一月草案中间一大段为基础重写一个决定，准备尽速公开发表。一月草案的首尾两段则写社论发表。因为中央发了新区土改要点，我给粟裕的那个电报没有发出的必要了，因此决定不发而将其中某些部分写入社论中公开发表为有利。（三）粟裕部队要三月十五日以前才能在阳谷全部集中完毕，你们及饶、陈、康、邓似可在三月二十日左右去阳谷，你们可有充分时间讨论全部政策问题（以划阶级一书为中心）、华北局组织问题及其他问题。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"三月六日"},{"type":"paragraph","text":"根据人民出版社一九八三年出版的"},{"type":"paragraph","text":"《毛泽东书信选集》刊印。"}],"comment_pivots":[{"part_idx":2,"offset":6,"index":1},{"part_idx":2,"offset":33,"index":2},{"part_idx":2,"offset":879,"index":3},{"part_idx":2,"offset":891,"index":4},{"part_idx":2,"offset":970,"index":5},{"part_idx":2,"offset":1043,"index":6}],"is_range_date":false,"authors":["毛泽东"],"comments":["指刘少奇一九四八年二月十八日给毛泽东的电报。他在电报中表示，希望能迅速得到党中央有关土地改革问题的文件，并说：“缺少这些文件，就不能在一般情况下避免错误及走弯路。虽然有了这些文件，也还是要犯些错误的，在我们党内主要地也还是靠党员干部的亲身体验，才能把路完全走正，但有了正确的文件之后，就能避免走许多弯路。”刘少奇在电报中还对老区土地改革中不必再一次平分土地、不人为地再搞贫农团、怎样进行土地调剂等问题提出了具体建议。","指中共中央一九四八年二月二十二日发出的《老区半老区的土地改革与整党工作》的指示。","指《中共中央关于土地改革中各社会阶级的划分及其待遇的规定》（草案）。见本卷第62页注〔1〕。","指毛泽东一九四八年一月十八日为中共中央起草的决定草案。见本卷第42页注〔1〕。","指毛泽东一九四八年一月二十二日就新解放区土改问题给华东野战军副司令员粟裕的电报，见本卷第35—39页。","饶，指饶漱石（一九○三——一九七五），江西临川人，当时任中共中央华东局书记、华东军区政治委员。陈，指陈毅，当时任中共中央华东局第一副书记、华东军区司令员。康，指康生（一八九八——一九七五），山东胶南人，当时任中共中央华东局第二副书记。邓，指邓子恢，当时任中共中央华东局副书记、华东军区副政治委员。"],"page_start":87,"page_end":89,"alias":""},"tags":[{"name":"粟裕","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3198272edf"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
