<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"金堂县玉虹公社四管区七生产队严重不关心群众生活疾苦影响生产的情况报告","authors":[],"dates":[{"year":1960,"month":5,"day":16}],"is_range_date":false,"parts":[{"text":"金堂县玉虹公社四管区七生产队严重不关心群众生活疾苦影响生产的情况报告","type":"title"},{"text":"玉虹公社四管区七生产队食堂，在5月9日的早晨，发现社员稀饭内有拖尾巴蛆。多的一碗十几根，少的也有两三根。不注意的社员吃在嘴里咬的喳喳响，多数社员都吞不下去。有的把稀饭倒了，有的舀回家去不敢吃。这种情况还不止一次：社员万相年、古廷翠、万章群等就连续饿了三天吃不下去，有的忍住在中午吃一点，有的社员饿着肚子下田，有的社员闹肚子痛，对生产影响很大。事实经过如下：","type":"paragraph"},{"text":"七队食堂58户，208人。共有两个水井：一个离食堂远，一个离食堂近。离食堂近的水井，隔粪坑不过一丈远。社员反映，井内有洞穴与粪坑相连，粪便满坑时，常有蛆虫爬入井内，特别是雨后，井内蛆虫更多。因此，这口井里的水根本不能饮用。社员曾经多次给生产队长陈中任提出意见。建议把这口井填了，用另外一口井的水。陈不唯置之不理，反说：“没有那么撇脱，那么大个坑，生产这样忙，管他的！”还威协社员说：“那个提意见就给那个少分饭！”事务长不管，炊事员听之任之。这样严重的问题，一直拖了下来。","type":"paragraph"},{"text":"这个食堂在春节以后，病人几十个，死了十人人。5月8日一天之内就死二人。现在住院的10人，出勤率低，工效不高，有的社员反映：“象这样生活下去，简直没有心肠！”贫农杨桂春见到检查团的同志就哭。","type":"paragraph"},{"text":"生产队队长陈中任，老下中农，解放前在药铺抓药，没有参加农业劳动，查明本人参加过三青团。作风恶劣，不联系群众，压制社员提意见。他贪污卖红苕藤子的钱40多元，毛猪退款被扣起来了。自己生活特殊，开小灶，上馆子，多吃猪肉，偷猪饲料豌豆三、四斤炒来下酒。社员去偷看他吃东西，还用米汤沷这个社员。群众反映：“干部吃不完，社员吃不饱！”更恶劣的是，不关心群众疾苦。社员钟云国，头部和四肢都肿了，反叫他推磨，说：“反正要死的，死十几个没来头，死人就象滥根红苕一样！”社员张德玉，一月前因病偷了一只兔子，被人弄来罚跪、殴打，陈中任不但不加制止，反而参加打人，两天后这个社员就死去了。5月8日一个社员吃饭时吞了一根签子在喉头里，肿的很利害，陈中任不但不给医治，反而派他车水，结果过两天这个社员也死了。","type":"paragraph"},{"text":"群众对生产队长陈中任意见很大，公社党委已作了处理。目前，靠近粪坑的井已经封闭，群众生产情绪已经高涨起来。上述问题经我们与县委研究已通报全县。","type":"paragraph"},{"text":" 刘仲伍1960年5月16日","type":"paragraph"}],"comments":[],"origin":"四川省某档案馆","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"711da61ddb"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
