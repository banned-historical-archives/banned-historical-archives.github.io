script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"七千多彝族翻身奴隶光荣入党  带领群众建设社会主义新凉山  他们在工作中阶级立场鲜明关心群众疾苦受到广大社员爱戴","authors":[],"dates":[{"year":1964,"month":7,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"七千多彝族翻身奴隶光荣入党  带领群众建设社会主义新凉山"},{"type":"paragraph","text":"他们在工作中阶级立场鲜明关心群众疾苦受到广大社员爱戴"},{"type":"paragraph","text":"据新华社成都三十日电　在四川省凉山彝族自治州，已有七千八百多名翻了身的彝族奴隶参加中国共产党，成为党领导当地彝族人民建设社会主义新凉山的核心力量。"},{"type":"paragraph","text":"现在，这个州的每个乡都建立了中共支部，一半以上的高级农业生产合作社有了党小组和党员。在全州八千多名彝族党员中，百分之九十以上是解放前的奴隶。许多奴隶出身的农村党员，在合作社里担任着领导职务。"},{"type":"paragraph","text":"翻了身的奴隶们参加共产党以后，阶级觉悟和政治积极性不断提高，工作中勇往直前，表现了坚忍不拔的革命精神。他们带领广大社员在大小凉山上坚持改造自然，革新农业生产技术，使这里的粮食和牲畜成倍地增长。越西县春景农业社党支部书记加瓦阿比子，在一九六一年碰到百年未遇的洪水时，教育社员发奋图强，自力更生，多留种子，来年扩大播种面积。第二年，这个社的粮食产量比上年增产百分之五十以上。以后，加瓦阿比子又领导大家多开荒地，增施肥料，加强田间管理，去年全社每人平均生产粮食两千多斤，夺得增产百分之二十七的更大丰收。"},{"type":"paragraph","text":"许多奴隶出身的彝族党员，在工作中阶级立场鲜明，关心群众疾苦，受到广大社员的爱戴。甘洛县普昌乡乡长、共产党员巴尔阿补，为了改变特尔木社的落后面貌，曾经背着行李，扛起锄头，到这个社长期落户。他坚决依靠奴隶出身的社员，揭露了奴隶主分子盗窃粮食、挑拨离间的阴谋活动，提高了干部和社员的阶级觉悟。春耕中，这个社犁头不够，他和两个社员背上干粮，冒着漫天风雪，到深山老林里砍伐木料，制作犁辕。在他的带动下，这个社一年间粮食增产百分之八十左右，猪净增一倍以上，一跃而为全乡的生产先进社。美姑县哈洛乡说不列社社长、共产党员阿几尔日在同社员们上山开荒时，为了让社员放心地休息，他和两个共青团员一起，不顾白日的劳累，通宵为社员们轮班守夜。这个县的鸡尾村三社社员瓦尔，是个翻身奴隶，因为劳动不积极，许多人叫他懒汉。社长、共产党员俄主比比经常同他一起劳动，帮助他提高了觉悟，积极参加劳动。"},{"type":"paragraph","text":"在建设家乡和改造自然的斗争中，这里还流传着许多彝族党员刻苦学习、钻研技术的动人故事。昭觉县南坪社社员、共产党员土比阿烈，五年来一直坚持水稻高产试验。他打破彝族地区种庄稼不施人粪的陈规，在水稻试验田里第一次施用了人粪。他种植的水稻试验田，产量比附近一般田产量高百分之五十以上。"},{"type":"paragraph","text":"（附图片）"},{"type":"paragraph","text":"上图：甘南尼玛草原的任丘巴，过去长期过着流浪生活，现在是共产党党员、沙河人民公社主任。这是任丘巴（右）在同社员们谈心。"},{"type":"paragraph","text":"新华社记者　敏钟杰摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5f7086d1a4"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
