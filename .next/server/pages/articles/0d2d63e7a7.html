" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"湘西土家族知识分子和部分群众要求单独搞区域自治","authors":["龙治安"],"dates":[{"year":1957,"month":5,"day":8}],"is_range_date":false,"parts":[{"text":"湘西土家族知识分子和部分群众要求单独搞区域自治","type":"title"},{"text":"龙治安","type":"authors"},{"text":"新华社长沙8日讯　自从人民日报刊登了向达、潘光旦在政协会议上关于土家族问题的联合发言后，潘等又写信、打电报给土家族的一些知识分子，在湘西苗族自治州内一部分干部和群众当中发生了很大影响，特别是在土家族知识分子中引起一些波动，他们公开表示对省和自治州不满。一位中学教员对记者说，潘曾写信告诉他们，中央已经承认土家族，只有省和自治州不承认，希望大家坚持要求单独搞自治州。保靖中学的土家族教师把向达，潘光旦的发言油印了到处散发，还写联名信宣称一定要单独搞区域自治。记者访问他们时，看到他们桌子上还有一些信件、油印的宣传品。他们向记者说：土家族师生都要求中央派访问团来调查土家族的各方面情况，要求政府大力宣传民族政策，关于土家族区域自治的问题，应该充分协商，听取土家族人民的意见等。保中一个在土家族中威望很高的教员彭武一，过去一直主张土苗族联合自治，现也表示要分开单独自治。","type":"paragraph"},{"text":"在土家族的群众中，还有许多不愿承认自自己是土家的，认为“土蛮子”不光彩，都说自己是汉族。有一部分虽承认是土家族，但是对这事情不大关心，有的说：成立自治州我们也是生产，不成立我们还是生产。反正都是一个娘养的(指全在党领导下)。","type":"paragraph"},{"text":"也有些群众，因为听了小学校土家教员的宣传，他们也要求单搞区城自治。记者在保靖县邀请几个土家族老人座谈时，有的说：苗寨修大水库，我们连个水井也打不成。帮我们单搞一个(自治地方)，以后也就能得照顾。有一个老汉临走时，还再三向记者说：“同志，把我们的意见告诉毛主席，我们也要搞一个。”","type":"appellation"},{"text":"在苗族干部当中，一小部分人看了潘等发言后有些赌气，他们说：分开就分开，你们单独成立土家族自治地方好了。","type":"paragraph"},{"text":"一般汉族干部，对潘等发言表示不满。如保靖县委书记(汉族)对记者说，潘等夸大了土苗之间的矛盾，事实上，这两个民族的群众，多年和平共处，并没有发生什么纠纷(据记者在涂乍乡了解，苗家村寨和土家村的关系很好)。他们还认为潘等在发言中把中央和地方对立起来，引起土家族对地方党政领导机关的不满。此外，古丈县委书记(汉族)也向记者说，他在古丈县直属机关的座谈会中，曾经公开做报告，批判了潘等联合发言中的不妥之处。保靖县委书记还说，他们目前工作很困难，因为究竟不知道是分是合，无法向群众进行宣传和解释工作。　(龙治安)","type":"paragraph"},{"text":" 来源： 1957年5月8日新华通讯社编《内部参考》。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0d2d63e7a7"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
