<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"type":"pdf","id":"wenji5","name":"毛泽东文集第五卷（1999）","internal":false,"official":true,"author":"中央文献研究室","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/wenji5.pdf"],"article":{"title":"各地应注意总结城市工作经验","description":"根据毛泽东手稿刊印。","dates":[{"year":1948,"month":2,"day":25}],"parts":[{"text":"各地应注意总结城市工作经验","type":"title"},{"type":"paragraph","text":"各中央局，分局，前委，并告中工委："},{"type":"paragraph","text":"关于城市工作"},{"type":"paragraph","text":"（一）中工委丑皓电所述石家庄城市工作经验必须引起全党注意。各中央局、分局、前委必须讨论中工委丑皓电，并将中工委丑皓电当作党内文件印发至地方地委一级，军队团委一级。各级党委收到中工委丑皓电以后均应引起讨论。（二）尔后各局、各军在攻占城市及在占领以后不久时期内管理城市的工作方针及方法，应即以中工委丑皓电所述攻占石家庄及初期管理石家庄的方针及方法为基本的方针及方法。（三）多年以来我们占领了很多城市，有了丰富的经验。但是没有总结，让这些经验埋没，让各种错误的方针及方法反复重犯，让良好的经验限于一地无法为全党取法。这是经验主义、地方主义还在我们党内占有重要地位并在这个问题上表现出来的结果。各中央局、分局、前委对于自己攻占及管理的城市似乎还没有作过一次认真的研究，亦没有将城市工作的比较完全的经验向中央作过反映。我们占领了并长期管理了张家口、邯郸、长治、晋城、淮阴、烟台、威海卫、淄川、博山、德州、承德、赤峰、安东、哈尔滨、齐齐哈尔、牡丹江、佳木斯、石家庄等几十个大城市及中等城市，临时占领不久又退出的则有沈阳、长春、焦作、韩城、许昌、漯河、运城等处。可是，这一切城市工作经验（不能说不丰富），除运城一处我军入城秩序不好，曾由邯郸局有过反映外，没有任何一处有过反映。像石家庄这样重要的经验，是由中工委总结的。两年前张家口的经验，我们是从中工委的丑皓电才看到的。这种在重大问题上（不是小问题或技术问题，而是重大的政治问题）事前不请示事后不报告的极端恶劣的习惯，在七大以后并未根绝，现在已相当严重地影响了党的工作的发展。"},{"type":"paragraph","text":"（四）为了将党的注意力不偏重于战争与农村工作，而引导到注意城市工作，为了使现已取得的城市的工作在我们手里迅速做好，为了对今后取得的城市的工作事先有充分的精神准备与组织准备，中央责成各中央局、分局、前委对于自己占领的城市，凡有人口五万以上者，逐一作出简明扼要的工作总结，并限三至四个月内完成此项总结，电告我们。"},{"type":"paragraph","text":"中央"},{"type":"paragraph","text":"丑有"}],"comment_pivots":[{"part_idx":3,"offset":20,"index":1},{"part_idx":3,"offset":405,"index":2},{"part_idx":3,"offset":577,"index":3}],"is_range_date":false,"authors":["毛泽东"],"comments":["中共中央工作委员会一九四八年二月十九日在给各地并中央的电报中，就收复石家庄后城市工作的经验作了总结。主要有：（一）攻城前和攻城中训令部队及民兵干部注意保护机器、物资及一切建筑物，不准破坏和自由搬取；进城后采取果断措施制止市民哄抢，禁止任何机关部队乘机搜集、搬走与购买物资，同时设立统一的物资委员会，有计划地搜集、购买与分配物资。（二）向进城干部和部队宣布我们在石家庄的工作方针是建设，而不是破坏，不准私人拿取一点东西，不准大吃大喝，缴获物资一律归公，保持艰苦朴素的作风。（三）严格审查原有的地下工作人员，管理城市主要依靠外面派去的干部，但这些干部有对城市不熟悉、搬用农村工作经验的缺点。（四）及时制止急于组织工会、贫民会及各种无政府主义行为，宣布除政府及公安局得依法逮捕与没收财产外，禁止任何团体和个人没收财产及逮捕、殴打任何人，同时政府委派人员组织人民法院，接受人民申冤，惩治罪大恶极的汉奸、恶霸，限期登记国民党党员和一切伪公务人员。（五）召集各界座谈会，宣布政策，成立临时参议会，筹备选举正式市人民代表大会，筹备复工，保证工人实际工资不继续降低并分发实物。","安东，即今丹东市。","指中共中央工作委员会一九四八年二月十九日电报中提到的收复张家口后，领导机关随即迁入城市，因而引起一些干部往城市跑，乱抓乱买东西，贪污腐化，放松乡村工作，引起士兵与乡村干部不满的现象。"],"page_start":84,"page_end":85,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"03c5a0bdd6"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
