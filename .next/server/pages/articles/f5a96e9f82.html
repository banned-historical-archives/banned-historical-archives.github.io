script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"泰国人民武装十二月初再传捷报  一周作战二十五次歼灭一批敌人击落击伤敌人直升飞机多架  泰国工人连续罢工反对他侬—巴博集团的残暴压迫和剥削","authors":[],"dates":[{"year":1968,"month":12,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"泰国人民武装十二月初再传捷报"},{"type":"paragraph","text":"一周作战二十五次歼灭一批敌人击落击伤敌人直升飞机多架"},{"type":"paragraph","text":"泰国工人连续罢工反对他侬—巴博集团的残暴压迫和剥削"},{"type":"paragraph","text":"新华社十四日讯　据“泰国人民之声”电台十二日广播，据不完全统计，从十二月二日到八日的一周里，泰国共产党领导下的各地人民爱国武装，袭击美国—他侬反动集团的据点，伏击和抗击反动军警共二十五次，共歼灭敌人三十多名，击落击伤直升飞机多架，沉重地打击了敌人。"},{"type":"paragraph","text":"这家电台报道，英勇的彭世洛府那空泰县人民武装，在人民群众的密切配合下，十二月十日和十一日连续伏击敌人的警察车队、“特种部队”和武装巡逻队，并截击敌人的支援部队，打死打伤敌人六名。人民武装利用有利地形，把敌人打得丧魂落魄。"},{"type":"paragraph","text":"这家电台十三日广播，泰国人民武装斗争的烈火越烧越旺，使美帝国主义侵略者越来越恐慌。在泰国的美帝官员四出活动，加紧镇压泰国人民爱国斗争。"},{"type":"paragraph","text":"美国驻泰大使昂格尔十一月到泰国北部黎府进行镇压泰国人民的罪恶勾当。十一月底，他又到泰国南部宋卡府活动，并“视察”了第九区“边防警察”，指挥他们镇压泰国南部人民。"},{"type":"paragraph","text":"美国新闻处设在彭世洛府的流动组，在十一月二十日派人到碧差汶府指挥镇压人民的行动。同时，一些美国人员乘直升飞机到彭世洛府那空泰县镇压泰国人民。在泰国的美国侵略军也越来越多地直接参与镇压泰国人民的罪恶活动。"},{"type":"paragraph","text":"“泰国人民之声”电台指出，美帝国主义强盗这样猖狂地镇压泰国人民，这使泰国人民胸中的怒火烧得更旺。泰国人民一定要向美帝国主义彻底清算血债。"},{"type":"paragraph","text":"新华社十四日讯　据“泰国人民之声”电台十四日广播，泰国共产党领导下的英勇的彭世洛府那空泰县人民武装，十二月四日击落美国—他侬反动集团的直升飞机一架。"},{"type":"paragraph","text":"电台还说，十二月份以来，黎府和碧差汶府人民武装，共击毁击伤美国—他侬反动集团的直升飞机五架。"},{"type":"paragraph","text":"电台指出，泰国人民武装取得的一次又一次的胜利，充分揭露了美国—他侬集团的纸老虎本质。"},{"type":"paragraph","text":"新华社十四日讯　曼谷消息：泰国各地工人最近不断举行罢工，抗议他侬—巴博反动集团的残暴压迫和剥削，要求改善生活待遇和工作条件，维护本身的正当权利。"},{"type":"paragraph","text":"据泰国报纸报道，泰国中部猜耶蓬府一个区的全部小型出租汽车司机，十一月十五日罢工，抗议反动警察经常借故敲榨勒索，使他们的生活毫无保障。"},{"type":"paragraph","text":"暖武里府公共汽车工人十一月二十八日举行罢工，抗议他侬—巴博反动集团经营的汽车公司无理扣压工资和肆意开除工人，要求改善工作条件。据罢工工人代表揭露，由于他侬—巴博反动集团只顾盈利而不对汽车进行维修，交通事故不断发生。资方却将责任转嫁给工人，最近有两名工人因此而遭到无理开除。在工人坚持斗争下，他侬—巴博反动集团被迫接受了工人的正当要求。"},{"type":"paragraph","text":"泰国一家冷饮工厂的三百多名工人十二月九日举行罢工，反对资方无理开除工人。"},{"type":"paragraph","text":"另据“泰国人民之声”电台最近广播，今年头九个月，泰国各地有八千名工人参加了罢工斗争。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f5a96e9f82"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
