script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"苏联新总理首次发表长篇讲话认为苏联的削弱意味着将遭受西方的剥削","authors":["俱孟军"],"dates":[{"year":1991,"month":2,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社莫斯科2月12日电　苏联总理帕夫洛夫12日在《劳动报》发表谈话指出，苏联的削弱和丧失独立，将意味着原料、劳力和生态资源遭受西方的掠夺性剥削。"},{"type":"paragraph","text":"这是帕夫洛夫今年1月就职后第一次发表长篇谈话。"},{"type":"paragraph","text":"他透露，苏联的某些银行以及奥地利、瑞士和加拿大的某些私营银行曾试图在苏联收购大面额钞票，再抛回苏联市场，造成人为通货膨胀。他说，在世界许多地区，当试图改变政治制度，搞掉不称心的政治家时，都用过这类办法，万一这种图谋得逞，苏联将丧失经济独立，被悄悄地吞并。"},{"type":"paragraph","text":"据新华社莫斯科2月12日电　塔斯社12日发表评论指出，用“皮鞭加糖饼”迫使苏联改变对内政策以利于西方，这种做法既无成效，又无前途。"},{"type":"paragraph","text":"美国《纽约时报》最近曾发表文章，主张对苏援助时要“皮鞭加糖饼”，“确定很严的、公开摆明的条件……还应许诺在重大改革的同时给予慷慨援助”。"},{"type":"paragraph","text":"由塔斯社国际观察家彼得罗夫写的评论认为，美国人所说的“重大改革”，“无非是尽快消灭70多年来形成的苏联社会基础，向西方式的资本主义过渡，如同苏联某些激进派今天所要求的那样”。"},{"type":"paragraph","text":"据新华社莫斯科2月12日电　(记者俱孟军)苏联国家安全委员会第一副主席格鲁什科12日说，虽然国际舞台上出现了“积极进展”，但西方特工机关反对苏联的活动“没有削弱，而且在某些方面还在加强”。"},{"type":"paragraph","text":"格鲁什科在记者招待会上举例说，在1990年至1991年财政年度，美国中央情报局对反苏情报侦探的拨款增加了一倍。他说，苏联克格勃最近5年破获35名西方侦探机关的最危险间谍，他们对苏联安全造成了“非常大的损害”。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"db774d96da"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
