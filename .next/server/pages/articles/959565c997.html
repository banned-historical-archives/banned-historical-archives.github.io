script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"希拉克总理谈邓小平副总理访法强调法中两国拒绝两个超级大国的霸权法国报纸指出法中关系良好和邓小平副总理访法的重要性","authors":[],"dates":[{"year":1975,"month":5,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社巴黎一九七五年五月十七日电　法国总理雅克·希拉克五月十七日下午在奥利机场说，法国和中国之间的关系很好。他还指出法国和中国都拒绝两个超级大国的霸权。"},{"type":"paragraph","text":"雅克·希拉克总理在欢送中华人民共和国国务院副总理邓小平离开巴黎回国之后，在回答记者们提出的问题时，概括地谈了邓小平副总理同吉斯卡尔·德斯坦总统以及同他之间的会谈。他说:“法中关系很好，尽管社会结构不同，我们都尊重国家独立的原则，我们都希望有这样一个环境，在这个环境中有和平，也有工业国和不发达国家之间，或者照中国的说法，第二世界和第三世界之间的关系方面的新秩序。在这个问题上我们有相当广泛的意见一致。”"},{"type":"paragraph","text":"雅克·希拉克总理然后强调指出，“法国人和中国人都拒绝接受两个超级大国的霸权”。他还说:“法国和中国在外交上都拒绝集团政策，我们满意地看到中国支持欧洲建设，这种支持最近具体地表现在向布鲁塞尔派遣一个中国代表这件事上。”“我们都希望有一个更团结一致、更富饶和更有组织的欧洲。因此，我们有共同的看法，邓小平先生的访问对欧洲来说是个积极的因素。”"},{"type":"paragraph","text":"雅克·希拉克总理宣布，明年，瓦莱里·吉斯卡尔·德斯坦总统和他本人将去中国访问。"},{"type":"paragraph","text":"在谈到中国和法国的双边关系时，雅克·希拉克总理说:“我们决定扩大法中经济关系，并且决定每有必要时在我的朋友让·索瓦尼亚格那一级进行协商。”他说，法国外交部长让·索瓦尼亚格将在今年年底前去北京。"},{"type":"paragraph","text":"雅克·希拉克总理还说，已经决定成立一个混合委员会，以推动法中经济、贸易关系的发展。"},{"type":"paragraph","text":"据新华社巴黎一九七五年五月十七日电　法国报纸就邓小平副总理正式访问法国，连日来发表文章和评论，强调中法之间存在的良好关系和两国人民不断发展的友谊以及邓副总理这次访问的重要性。"},{"type":"paragraph","text":"《世界报》五月十七日发表了题为《友谊的长征》的文章。文章说:“一九七三年九月十四日蓬皮杜总统曾在北京举杯祝愿法中之间的关系是一种友谊的‘长征’。不到两年后的今天，邓小平副总理对巴黎的访问是向前迈了新的一步。应当把这次访问看作是中法关系中的一个重大事件，同一九七三年总统的访问同等重要。”"},{"type":"paragraph","text":"法新社五月十日在一条消息中引用法国总理发言人的谈话时强调指出:“法国政府十分重视这次访问，是由于法中之间的关系和邓先生本人。他做出了有意义的行动，这就是他选择了法国来进行他以副总理身份对国外的首次正式访问。”"},{"type":"paragraph","text":"《费加罗报》在五月十二日强调指出，从一九六四年戴高乐将军决定同中国建立外交关系以来，法中关系“总的来说一直很好”，而且“经济方面的交流在不断发展”。这家报纸说:“尽管两种制度截然不同，长期以来，法中之间却有着广泛的了解。这种互相了解的基础是民族独立、国防独立的原则和这些原则所带来的必然的结果。”报纸强调指出:“中国寄希望的欧洲，也是(两国)有共同点的一个方面。”"},{"type":"paragraph","text":"\u003cIMG alt=请插入6号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1975\\05\\755j040301.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e五月十六日上午，邓小平副总理在法国国务部长兼内政部长米歇尔·波尼亚托夫斯基陪同下，访问了古老的博村，村民们以隆重的民族形式热烈欢迎中国客人。"},{"type":"paragraph","text":"新华社记者摄(传真照片)\u003c/FONT\u003e"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"959565c997"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
