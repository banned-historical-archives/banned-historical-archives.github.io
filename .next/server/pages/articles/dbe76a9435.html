<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"把活学活用毛泽东思想当作生命第一需要工总司举行活学活用毛泽东思想讲用会，会议要求工交系统新干部进一步认真总结经验，学出新水平、用出新水平，为中国革命和世界革命作出新的贡献","authors":[],"dates":[{"year":1970,"month":7,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　正当全市各条战线热烈欢呼和认真学习中央两报一刊“七一”重要社论的时候，工总司于前天举行了活学活用毛泽东思想讲用会。参加会议的有各区、局联络站常委，公司联络分站负责人，部分基层单位新干部；还邀请了各区、局革委会负责同志参加。"},{"type":"paragraph","text":"市革命委员会领导同志出席了大会，并在会上讲了话。"},{"type":"paragraph","text":"讲用会上，介绍了上海锅炉厂革委会副主任刘金堂同志怀着对伟大领袖毛主席深厚的无产阶级感情，在伟大的社会主义革命和社会主义建设中，自觉地、刻苦地活学活用毛泽东思想，为捍卫毛主席的革命路线冲锋陷阵的先进事迹；介绍了上海国棉二十一厂革委会第二召集人钮永泉同志刻苦地读毛主席的书，狠斗“满”字、狠斗“骄”字、狠斗“私”字，谦虚谨慎永向前的先进事迹；介绍了上海日化制罐厂新干部坚持活学活用毛泽东思想，自觉接受党的领导，坚持参加劳动，密切联系群众，继续革命永不掉队的先进事迹；介绍了上海高压容器厂团干部王桂玲同志以只争朝夕的革命精神，刻苦地学习毛主席著作，认真改造世界观，做好青年工作的先进事迹。大家深有体会地说:“活学活用毛泽东思想，这是生命的第一需要。地球要围绕太阳转，离开了轨道，就要毁灭；轮船要沿着灯塔指出的航向走，离开了航道，就要触礁。毛主席是我们心中的红太阳，毛泽东思想是我们永放光芒的灯塔。我们革命战士要永远心向红太阳，永远紧跟红太阳转，努力学一辈子毛泽东思想，干一辈子革命。”"},{"type":"paragraph","text":"会议认为，在无产阶级文化大革命中涌现出来的广大新干部，是三结合的革命委员会中的群众代表，他们总的来说是好的和比较好的。他们深深懂得，毛泽东思想是无产阶级思想最集中的表现，是革命的科学，是革命的最高真理，是最高最活的马克思列宁主义。毛泽东思想是生命的灵魂，指路的明灯，活学活用毛泽东思想是革命者的根本。因此，广大新干部怀着对伟大领袖毛主席深厚的无产阶级感情，能够结合形势，结合任务，结合自己的活思想，坚持天天读毛主席的书，按照毛主席的教导办事；毛主席的最新指示一发表，做到了立即学习、立即宣传、立即贯彻执行，步步紧跟毛主席的伟大战略部署；经常举办各种类型的毛泽东思想学习班，吸收群众代表参加，使学习班成为活学活用毛泽东思想，自觉斗私批修的重要课堂；干部的学习，带动了群众，使活学活用毛泽东思想的群众运动更加深入、更加广泛地开展起来。这是无产阶级文化大革命的重大成果，这是广大新干部无限忠于伟大领袖毛主席的具体体现。"},{"type":"paragraph","text":"形势在发展，革命在前进。会议认为，继续革命对广大新干部提出了更高、更新的要求。广大新干部一定要进一步提高学习马克思主义、列宁主义、毛泽东思想的自觉性，发扬理论联系实际的革命好学风。坚决执行林副主席提出的学习毛主席著作的“三十字”方针，学习北京针织总厂活学活用毛泽东思想“七字经”的好方法，学会运用马克思主义的立场、观点和方法去观察问题、认识问题、解决问题，在改造客观世界的同时彻底改造主观世界。同时，要加强对新干部学习毛主席著作的领导，教育新干部在千头万绪的工作中，一定要把活学活用毛泽东思想放在第一位，始终抓住不放、抓到底。要抓学习制度、抓学习规划、抓学习检查、抓学习样板，切切实实领导好活学活用毛泽东思想的群众运动。"},{"type":"paragraph","text":"大会要求广大新干部通过这次讲用会，来一个学习竞赛，“看谁真正地学到了一点东西，看谁学的更多一点，更好一点”。把活学活用毛泽东思想推向一个新阶段，学出新水平、用出新水平，把无产阶级的伟大革命事业大大地向前推进一步，为中国革命和世界革命作出新的贡献。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"上海市工人革命造反总司令部（工总司）","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dbe76a9435"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
