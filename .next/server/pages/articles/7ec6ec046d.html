script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"李瑞环会见香港新闻界人士他说中国改革开放方针不会变。我们现在批判资产阶级自由化，当然也反对僵化","authors":["朱云龙","许忆纯"],"dates":[{"year":1989,"month":9,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京9月19日电　(记者　朱云龙、许忆纯)中共中央政治局常委李瑞环今天下午在钓鱼台国宾馆会见了由《文汇报》副社长陈伯坚、《大公报》副总编辑赵泽隆、陈彬率领的香港《大公报》、《文汇报》负责人访京团。"},{"type":"paragraph","text":"李瑞环介绍了今年6月平息反革命暴乱的一些情况，并回答了访京团成员提出的一些问题。"},{"type":"paragraph","text":"他说，中国改革开放的方针不会变。我们现在批判资产阶级自由化，当然，我们也反对僵化。"},{"type":"paragraph","text":"他说，对知识分子的政策不会变，否认知识分子的地位和作用就否认了四化建设的方向。多种经济成份存在、一部分人先富起来的政策，都会更好地坚持下去。"},{"type":"paragraph","text":"李瑞环指出，农村允许个体经济发展是稳定人民生活的一个重要因素。当然，从总体上讲，中国是以公有经济、计划经济为主。"},{"type":"paragraph","text":"他还说，历史证明，不允许一部分人先富起来，其结果一定是大家都贫穷。贫穷不是社会主义。"},{"type":"paragraph","text":"李瑞环比喻说，改革开放就象放风筝，不是“放生”，放开的程度取决于控制能力。"},{"type":"paragraph","text":"他说，改革开放是历史的必然，是不以人的意志为转移的大趋势。不改革开放中国就没有希望，人民也不答应。对此，我们是有信心的。"},{"type":"paragraph","text":"他希望香港新闻界人士常来内地参观。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7ec6ec046d"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
