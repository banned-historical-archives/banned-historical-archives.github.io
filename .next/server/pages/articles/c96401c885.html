<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"邓颖超同志访问周总理在巴黎的故居","authors":["冯培","姚云"],"dates":[{"year":1980,"month":6,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"六月十日下午，邓颖超同志来到巴黎的戈德弗鲁瓦街，访问二十年代周恩来总理在巴黎从事革命活动时住过的小旅馆。"},{"type":"paragraph","text":"出发时下了一场初夏的阵雨，但车到“戈德弗鲁瓦旅馆”门前时，阵雨乍过，空气分外清新。邓颖超同志虽然是初次来这里，但是她很熟悉这个地方。她说:“二十年代，我曾收到他(周总理)从这条街十七号寄出的信件。”"},{"type":"paragraph","text":"在法国国民议会副议长德勒埃德陪同下，邓颖超走到旅馆的墙边，仔细地观看了在墙上挂着的周恩来同志纪念牌。这是一块墨绿色花纹的大理石石牌，上方有周总理的铜浮雕像，下方刻着邓小平同志所题“周恩来”三个金字，以及用法文刻的周总理生卒年份和他一九二二年至一九二四年在这里居住的说明。这块纪念牌是在法国政府倡议下由巴黎市政府钉立的。一九七九年十月，华国锋总理到法国访问时，曾亲手为纪念牌揭幕。"},{"type":"paragraph","text":"邓颖超和她率领的代表团的全体人员，沿着狭窄的盘旋的楼梯登上旅馆的三层楼，步入第十六号房间。这就是当年周恩来同志居住过的地方。房间面积大约只有四、五平方米，除了放一张单人床、一张小桌子和一把椅子之外，就难放下其它东西了。邓颖超同志在斗室内环顾一番，又到窗前眺望，还在床上小、坐了一会，凝神沉思。她告诉周围的人们:“过去，党的旅欧总支部在这里开会时，有的人就坐在地上。”"},{"type":"paragraph","text":"在这个房间的门外，有一个老式的水龙头，铜绿斑斑，现在已经不用了。但它引起人们想见当年周恩来同志在这里取水的情景。邓颖超说:"},{"type":"paragraph","text":"“当时，他们的生活很艰苦啊。”"},{"type":"paragraph","text":"下楼时，邓颖超同志到了二层楼临街的一个房间。路上和附近的窗口上，有不少人在围观，并向她招手致意。她微笑着频频挥手答谢，并且用法语讲:“友谊”。人们高兴地向她鼓掌。"},{"type":"paragraph","text":"在周恩来同志纪念牌下，邓颖超向旅馆的经理热拉尔·古博尔赠送了用镜框装饰的一幅中国刺绣《松鹤》。她说:“这是中法两国人民友谊的象征。”她指着这幅精美的苏绣解释说:“松鹤延年，这就是说，两国人民的友谊将代代延续下去，不会中断。”"},{"type":"paragraph","text":"人们热烈欢迎邓颖超同志率代表团来访，并向她表示敬意，也是表达他们对周恩来总理的尊敬和对中国人民的友情。在邓颖超同志九日到达法国后，无论在宴会上，还是在晤谈中，法国朋友们都深情地提到周总理。法国国民议会议长沙邦—戴尔马今天在欢迎宴会前谈话时，回忆了他一九七三年访问中国时同周恩来总理会见的情景。接着他在宴会上又赞扬了周总理“非凡的才能”。法国国民议会法中友好小、组主席弗朗索瓦·达尔古今天晚上在招待会上赞扬周总理在中国革命战争中的贡献。他说:“周恩来是属于中国历史的，同时也是属于世界历史的。他爱法国，法国也怀念着他。”"},{"type":"paragraph","text":"新华社记者姚云　冯培(据新华社巴黎六月十日电)"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c96401c885"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
