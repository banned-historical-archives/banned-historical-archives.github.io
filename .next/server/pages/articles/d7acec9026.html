script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"强烈抗议美国垄断资本的残酷剥削和压迫  加拿大两万多美资汽车工厂工人坚持罢工  显示加拿大工人阶级的强大力量，沉重打击美国垄断资本","authors":[],"dates":[{"year":1970,"month":12,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"强烈抗议美国垄断资本的残酷剥削和压迫"},{"type":"paragraph","text":"加拿大两万多美资汽车工厂工人坚持罢工"},{"type":"paragraph","text":"显示加拿大工人阶级的强大力量，沉重打击美国垄断资本"},{"type":"paragraph","text":"新华社渥太华电　加拿大二万三千五百名美资汽车工厂的工人坚持罢工斗争，强烈抗议美国垄断资本的残酷剥削和压迫。他们的罢工到十二日已经坚持了八十九天。"},{"type":"paragraph","text":"加拿大汽车工人是从九月十五日开始罢工的。由于美国通用汽车公司蛮横地拒绝了他们提出的同美国汽车工人拿同等工资的合理要求，他们一直在顽强地坚持罢工斗争。罢工工人团结一致，打破美国垄断资本和黄色工会头目们设置的种种障碍，使美国通用汽车公司在加拿大六个城市的七家工厂一直陷于瘫痪。"},{"type":"paragraph","text":"在罢工期间，加拿大汽车工人接连举行抗议集会，谴责美国垄断资本的压迫和剥削，并且揭露黄色工会头目同资本家勾结出卖工人利益的工贼面目。十一月二十五日，近六千名工人在奥沙瓦举行集会，表示决心把斗争进行到底。工人们表示：“他们想让我们尽快复工，但是，除非得到完全平等的工资，我们决不复工。”"},{"type":"paragraph","text":"在圣·凯瑟琳地区，六千名汽车工人在尼亚加拉瀑布城、昆斯敦和伊利堡等城镇同美国交界的地方设置了纠察队，不许美国通用汽车公司从公路和铁路把美国汽车运进加拿大。"},{"type":"paragraph","text":"加拿大汽车工人的罢工得到了其他行业工人的支持。加拿大的汽车司机同汽车工人达成协议，保证不把在美国制造的通用汽车公司的产品运进加拿大。"},{"type":"paragraph","text":"加拿大汽车工人的斗争，不仅使美国通用汽车公司在加拿大的工厂的生产受到严重影响，而且使这家公司在加拿大的汽车销售量大大减少，在十一月份销售量就下降了百分之七十二。罢工还使其他工业部门，特别是钢铁工业的生产受到影响。"},{"type":"paragraph","text":"美国垄断资产阶级长期掠夺加拿大的资源，剥削加拿大的劳动人民。加拿大的工人阶级为反对美国垄断资本的掠夺和剥削，不断进行斗争。加拿大汽车工人长期坚持的这次罢工斗争，显示了加拿大工人阶级的强大力量，使美国垄断资本受到沉重的打击。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d7acec9026"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
