script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"骗取营业执照转手加工绒线领片沈金妹进行中间剥削被审查处理","authors":[],"dates":[{"year":1981,"month":1,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　最近，川沙县工商行政管理局对进行中间剥削的张江镇居民沈金妹作出处理，除进行批评教育外，吊销其个体工商户营业执照，罚款一千零十四元。"},{"type":"paragraph","text":"沈金妹原是张江公社羊毛衫厂的正式职工，从前年九月起一直没有正常上过班，而在家绣花做手加工。去年三月，她正式卸职归家，并隐瞒了在公社羊毛衫厂做工的经历，骗取了个体户营业执照。不久，就通过私人关系从江苏常熟某厂弄来四台横机，摆开了大做生意的架势。当时市场上绒线领片畅销，每只可买一元多，找上门来的小贩简直使沈金妹应接不暇。沈金妹不顾营业执照上只准来料加工的规定，逐渐走上了中间剥削的邪路。起先，沈将原料发给周围居民、社员进行加工。后来，竟将加工活转给张江镇居委和瞿家七队等集体单位包做，她从中牟取暴利。三个多月来，沈金妹的帮工队伍已发展到一百多人，其中有社队企业职工、社员、镇上居民，还有干部家属，致使瞿家大队有些生产队的集体生产受到严重影响。"},{"type":"paragraph","text":"当县工商行政管理局对沈的违法活动进行审查、宣布吊销营业执照、停止生产、冻结物资后，沈态度恶劣，继续抗拒，将八十七斤绒线批发给小商小贩。同时，又将三台横机擅自转移。为此，经川沙县公安局批准，于十一月一日对沈金妹进行收容审查，县工商局对此作出处理。　(本报通讯员)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a2cb4c75d8"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
