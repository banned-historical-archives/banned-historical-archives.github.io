script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"在毛主席党中央亲切关怀下重建新家园","authors":[],"dates":[{"year":1975,"month":3,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"辽南地震灾区人民泰山压顶不弯腰，重灾面前不低头"},{"type":"paragraph","text":"在毛主席党中央亲切关怀下重建新家园"},{"type":"paragraph","text":"老贫农写诗表达自己的心情：毛主席和俺心连心，痛痒相通感情深。迢迢千里送衣物，千家万户暖在心。"},{"type":"paragraph","text":"新华社沈阳一九七五年三月十二日电在毛主席、党中央的亲切关怀下，我国辽宁省南部海城、营口一带地震灾区人民奋发图强，斗志昂扬，正在大力发展生产，重建社会主义新家园，夺取抗灾斗争的全面胜利。"},{"type":"paragraph","text":"地震灾害发生以后，记者在海城、营口一带农村看到，这里到处是一片自力更生、艰苦奋斗、战天斗地的动人景象。广大干部和群众满怀信心地提出“泰山压顶不弯腰，重灾面前不低头”，“遭灾不减志，坚决夺高产”的口号。尽管这里冰雪未消，可是已经热气腾腾地开始了备耕活动。这些天来，受灾地区的各公社，每天出动劳动力十多万名，大车近万台，抓紧送粪、整修梯田石堰、清理淤塞的渠道、平整土地、改良土壤。人们起早贪晚，干得热火朝天。一些饱经旧社会风霜的老贫农同记者谈起来，都激动地说：要是在解放前遭到这样大的灾害，不知要死多少人。现在，在毛主席、共产党的领导下，人心齐，泰山移，地大震，人大干，生产照样起高潮。"},{"type":"paragraph","text":"辽宁南部地区这次大震的防震斗争，半年以前就开始了。一九七四年六月，辽宁省各级党委就根据地震部门的预测预报，加强了对防震工作的领导。他们发展和健全了专业队伍和群众运动相结合的地震台网，大力开展群测群防工作；同时，结合批林批孔，向群众广泛宣传地震知识。今年初，地震部门对各方面资料进行综合分析，进一步发出了近期内可能发生较大地震的预报。震区各级党委立即领导群众，加强戒备，严阵以待。二月四日大震发生前，辽宁地区一些地震台站和群众业余测报组都观测到了许多震前异常现象。中共辽宁省委和有关市、县领导机关根据临震预报，果断地采取了紧急措施。营口县、海城县的许多公社、大队、生产队也都作了准备。正因为各级党组织和地震工作队伍把大量工作做在前头，这次强烈地震虽然发生在人口比较稠密的地区，伤亡损失却大大减轻。事实雄辩地说明，在毛主席、共产党领导下的社会主义新中国，依靠用马克思主义、列宁主义、毛泽东思想武装起来的广大人民群众和地震专业人员，坚持不断实践，认真总结经验，地震不仅是可以预测的，而且是可以在震前预报的，事先做好防御工作是可以大大减少损失的。"},{"type":"paragraph","text":"伟大领袖毛主席、党中央对灾区人民极为关怀。二月四日晚上强烈地震发生后，党中央立即发来慰问电，接着派出中央慰问团，深入海城、营口灾区进行慰问。为了让受灾群众过好春节，党和政府特意送来了面粉和猪肉。当灾区人民读到党中央的慰问电，和中央慰问团一起欢度春节的时候，都感动得流下热泪，一遍又一遍地高呼：“毛主席万岁！”“中国共产党万岁！”营口县官屯公社老贫农写诗表达自己的心情：“毛主席和俺心连心，痛痒相通感情深。迢迢千里送衣物，千家万户暖在心。无限爱戴毛主席，经过抗灾倍加亲。战胜地震夺高产，回答主席一片心。”"},{"type":"paragraph","text":"全国人民和人民解放军对辽南震灾十分关心，大力支援灾区。地震灾害一发生，当地驻军指战员就星夜赶到指定的社队，抢救人民生命财产，那里险情大，就出现在那里。"},{"type":"paragraph","text":"为了帮助受灾群众抢建有暖炕的简易住房，指战员们整天整夜不休息。北京、吉林、河北连夜派来了医疗队。上海、天津、黑龙江、广西等二十几个省、市、自治区送来了大批帐篷、建房材料、防寒衣被、棉鞋、棉帽、药品器械和各种糕点熟食。中共辽宁省委和沈阳、旅大、锦州、本溪、抚顺、辽阳、铁岭、阜新等地党委领导干部亲自带队，携带救灾物资，到灾区慰问。许多工厂派出代表深入重灾公社，和贫下中农一起战斗。这些都生动地表现了社会主义祖国一方受灾、八方支援的阶级深情。"},{"type":"paragraph","text":"地震灾区人民在各级党组织的领导下，以大寨精神进行抗灾斗争，重建社会主义新农村。营口县是辽宁省农业学大寨的先进县，一九七四年粮食亩产在全省领先跨过“长江”，受灾后，广大群众提出要在抗灾中学大寨，坚决完成今年原订的粮食增产计划。这个县的水源公社干部和群众，灾后重温了多年来农业学大寨的经验，决心依靠集体力量，自力更生战胜震灾。他们不仅把县里送来的救济物资让给重灾区，还拿出稻草二百多万斤，给重灾区送上门。海城县也是辽宁省农业学大寨的先进县之一，去年粮食亩产七百零六斤，计划今年过“长江”。遭受这场震灾后，广大群众豪迈地提出：“重灾面前不低头，强渡‘长江’志更坚”。各公社、大队纷纷追加农业增产措施。感王公社范家大队受灾后，党总支书记李金发对社员们说：震倒房子是坏事，可是它推动了我们建设新村；震坏了我们一些坛坛罐罐，我们就去旧的换新的。现在，这个大队已经作出了重建社会主义新农村的规划，掀起热火朝天的备耕和建房高潮。（附图片）"},{"type":"paragraph","text":"辽南地震灾区人民奋发图强决心夺取抗灾斗争全面胜利地震灾区的贫下中农说：房塌墙倒，革命精神不倒；地动山摇，大打农业翻身仗的决心不动摇。强烈地震刚过，海城县感王公社范家大队社员们迎风冒寒，踏雪送肥。"},{"type":"paragraph","text":"地震灾区的各级党组织，积极认真地安排好群众生活。这是营口县革委会的领导干部和灾区社员欢度春节。"},{"type":"paragraph","text":"新华社记者 摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"辽宁文革","type":"人物"},{"name":"批林批孔","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"429fdd7005"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
