script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"印度尼西亚《人民日报》发表社论对中苏两党交换信件感到高兴谴责南斯拉夫现代修正主义者进行煽动并散布悲观情绪","authors":[],"dates":[{"year":1963,"month":3,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社雅加达21日电】　印度尼西亚《人民日报》19日发表了题为《交换信件》的社论，全文如下:"},{"type":"paragraph","text":"昨天我们刊登了苏联共产党中央委员会和中国共产党中央委员会交换的信件全文。这样，任何人都能客观地研究这些信件。"},{"type":"paragraph","text":"这次交换信件显然有助于为恢复和巩固国际共产主义运动的团结而联合作出的巨大努力。这一团结对于全世界人民争取民族独立、民主、社会主义和持久和平的光荣斗争，简而言之对争取“新兴力量”的胜利，是非常重要的。每一个真正的共产党人当然为有助于恢复和巩固这一团结的每一个步骤感到高兴。"},{"type":"paragraph","text":"在这种情况下，贝尔格莱德的反应是非常值得注意的。贝尔格莱德方面说，“要求赫鲁晓夫第三次到北京去是一件难事”，它还说，双边会谈使双方观点趋于接近的希望很小。"},{"type":"paragraph","text":"这种反应表明南斯拉夫领袖们不愿意看到国际共产主义运动的团结，进行煽动，并散布悲观情绪。这证明八十一个共产党和工人党1960年在莫斯科发表的声明始终是正确的，而南斯拉夫领导人是现代修正主义的代表，他们背叛了马克思列宁主义，他们的活动是破坏和颠复。"},{"type":"paragraph","text":"但是，正如谚语所说的，尽管狗在叫，骆驼队还是在前进。"},{"type":"paragraph","text":"世界上没有任何力量能压倒全世界共产党人的团结的愿望和意志。这就是共产党人和共产党之间的辩证的关系。虽然可能出现分歧，尽管有种种严重的分歧，甚至有种种更加严重的分歧，但是最后无产阶级的团结——正如马克思和恩格斯在《共产党宣言》中所说的——终将是“更为有力，更为坚固，更为强大”。帝国主义者不可能妨碍这一规律生效，现代修正主义者和其他机会主义者也不可能!"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"eff8bfd284"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
