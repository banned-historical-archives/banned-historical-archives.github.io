script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"电毛主席致敬:您指示结成国际统一战线，这将是保障胜利的武器。","authors":[],"dates":[{"year":1949,"month":7,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北平十七日电】　中苏友好协会发起人大会电毛主席致敬，电文如下:"},{"type":"paragraph","text":"“敬爱的毛主席:您和中国共产党领导中国人民，经过千辛万苦，克服各种困难，基本上已经完成了中国人民民主革命的大业使我们多灾多难的祖国，从此脱离帝国主义，封建势力，官僚资本的奴役，走上伟大的建设阶段，最近您又总结了二十八年来中国革命的主要的和基本的经验，向我们人民指出在国内必须唤起民众，建立人民民主专政，并须联合世界上以平等待我的民族及各国人民，即联合苏联，联合各新民主国家，联合其他各国的无产阶级和广大人民，结成国际统一战线，共同奋斗。您的这一指示将是我们人民保障革命胜利果实和进行和平建设的强大武器。我们发展成立“中苏友好协会”，其目的就在建立和发展中苏两国文化经济各方面的联系，介绍苏联建国的丰富经验和科学文化，发展和巩固中苏两国人民的深厚友谊，来争取世界永久和平而奋斗。我们在兴奋愉快地庆祝我国革命胜利的时候，就想到您的辛苦，想到您对中国人民的不朽功绩。谨向您致崇高的敬意，并祝身体健康!"},{"type":"paragraph","text":"中国人民民主革命胜利万岁!"},{"type":"paragraph","text":"中苏友好协会曾起人大会。七月十六日"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f1f7dcabec"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
