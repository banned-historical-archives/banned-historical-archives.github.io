script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"“多样化”就是资产阶级自由化","authors":[],"dates":[{"year":1970,"month":2,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"资产阶级女子越剧怎么会走向全国?原来就是因为“四条汉子”利用“全民文艺”的旗幡，为之招魂，使之毒液四蔓的。他们为女子越剧抹上了“多样化”、“娱乐、娱乐”、“抒情美丽”等色彩，以为这样就可以障人耳目了。今天撕开这些画皮，我们可以清楚地看到，“全民文艺”是一种为复辟资本主义效劳的极毒的腐蚀剂。"},{"type":"paragraph","text":"周扬之流为了推销“全民文艺”的黑货，打出了许多旗号。“多样化”便是旗号之一。在“多样化”的幌子下，资产阶级女子越剧，便象毒菌得到了适宜的气温，很快地扩散开来。在周扬等人要“开放禁戏”“大挖传统”的黑指示下，一批批毒草剧目相继出笼，泛滥成灾。旧上海越剧院仅仅半年时间，就挖出了三百五十六出毒草戏，使越剧舞台顿时毒雾迷漫，妖风四起。神妖、鬼怪、妓女、叛徒、才子佳人戏风靡一时，五花八门、庸俗不堪的所谓“传统戏”，都作为“破除清规戒律，扩大和丰富传统戏曲”的好剧目。这些戏，名目繁多，品种不一，但都唱着共同的调子，都是与无产阶级革命文艺背道而驰的反革命文艺。没多久，这些毒草剧目就象蛀虫那样，向全国各地蔓延开来。"},{"type":"paragraph","text":"毛主席教导我们:“无产阶级要按照自己的世界观改造世界，资产阶级也要按照自己的世界观改造世界。”在阶级社会里，从来就不存在抽掉阶级内容的“多样化”文艺。文艺为无产阶级政治服务的唯一宽广道路，就是要塑造工农兵英雄形象，宣传光芒四射的毛泽东思想。而周扬之流却鼓吹能“为各种人接受”的“多样化”文艺，就是闭口不谈文艺为工农兵服务的方向，独独不提无产阶级文艺鲜明的阶级性和战斗性。说穿了，他们的“多样化”，实际上就是封、资、修反动文艺的大杂烩。鼓吹“多样化”，就是鼓吹资产阶级的自由化。他们扶植女子越剧走遍全国，就是为了推广“全民文艺”破烂，以便有朝一日，用资产阶级专政取代无产阶级专政。在“多样化”的伪装里面，包藏着周扬之流的险恶阴谋。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周扬","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e30e7847bc"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
