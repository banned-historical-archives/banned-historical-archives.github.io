script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji38","name":"毛泽东全集第38卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji38.pdf"],"article":{"title":"为感谢苏联人民的情谊给《真理报》的信","alias":"","parts":[{"type":"paragraph","text":"为感谢苏联人民的情谊"},{"type":"paragraph","text":"给《真理报》的信"},{"type":"paragraph","text":"（1957年11月20日）《真理报》编辑部：亲爱的同志们："},{"type":"paragraph","text":"我们，参加伟大的十月社会主义革命四十周年庆祝典礼的中华人民共和国代表团，在你们伟大国家的逗留期间，收到了苏联公民们的大批信件和电报，其中有的还附来了珍贵的礼品。这些信件、电报和礼品都热情洋溢地表达了苏联人民对中国人民，对中华人民共和国代表团和它的成员以及对我个人的最诚挚的兄弟情谊和最良好的祝愿。我们把苏联人民的这种感情看作是中苏两国人民牢不可破的伟大友谊的象征。因为我和我的同志们难以对这么多的信件和电报一一作复，请让我们通过贵报转达六亿中国人民、中华人民共和国代表团的全体同志们和我个人对苏联人民、对所有给我们这些信件、电报和礼品的苏联同志们表示衷心的感谢。"},{"type":"paragraph","text":"毛泽东一九五七年十一月二十日于莫斯科"}],"authors":["毛泽东"],"dates":[{"year":1957,"month":11,"day":20}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":354,"page_end":354},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4c0fd6e652"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
