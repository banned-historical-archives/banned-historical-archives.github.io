<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"张春桥是劳动人民不共戴天的死敌","authors":["尚途"],"dates":[{"year":1977,"month":4,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"尚途"},{"type":"paragraph","text":"一九三三年，国民党反动派为了疯狂进攻中国共产党领导的革命根据地，丧心病狂地拼凑反革命同盟，两个反动大头目蒋介石和汪精卫在七月二十八日发表了臭名昭著的所谓《蒋汪联合宣言》，一开头就叫嚣什么“匪氛肆虐，患在腹心，赤焰充塞，人沦禽兽，若不剿除，不特人民无安居乐业可言，即一切计划均受牵掣。”中国人民在伟大领袖毛主席领导下的英勇斗争，迫使帝国主义和国民党反动派的一切反革命计划无法实现，因而这批反动家伙恶毒污蔑共产党和革命人民是什么“匪”，非得“剿除”不可。《蒋汪联合宣言》一发表，反动文人、文化特务等就紧跟着在反动报刊上大肆散布所谓“剿匪救国”，于是，“先安内后攘外”一类的反革命谬论甚嚣尘上。在国民党反动派掀起的配合反革命军事“围剿”的文化“围剿”中，国民党特务分子张春桥也积极策应，竭尽献媚效劳之能事，他运用阴险的手法，以诗歌、小说、速写等文艺样式，竭力丑化工农群众，恶毒咒骂劳动人民为“匪”，大肆宣扬“剿匪有理”。"},{"type":"paragraph","text":"张春桥于一九三四年七月六日在《新诗歌》第二卷第二期发表的黑诗《失业的人》，最后一段竟然说什么:“娘，娘，不要紧，我能找到些金银，家里不是还有枪?今天晚上就入伙:杀的杀，砍的砍，到处都是咱的饭!”显然，张春桥这里是在以诗隐喻，把拿起武器的革命者歪曲为不过是一伙乱杀乱砍，为了“找到些金银”而到处都抢饭的“暴徒”。"},{"type":"paragraph","text":"张春桥把革命群众污蔑为“暴徒”的同时，又竭力鼓吹昔日的“安宁”，妄想粉饰太平，以掩盖反动统治下农民的悲惨遭遇和革命怒火。一九三五年七月十八日，张春桥在上海反动报纸《大晚报》上的一篇黑文《土枪射手》里写着:“那时，农村生活安闲得很，象往日文章里所表现出来的一样静美，外祖母家里的境况也比较好。”但是，谁竟会来破坏这“安闲”“静美”的农村生活呢?张春桥回答了:“不过，高梁棵子一起来的时候，也得小心地防范着‘混子’(土匪)。这样，养成了每个人练习射击的需要和兴趣。”原来，破坏农村“安闲”“静美”的是“匪”，所以需要拿起土枪，练习射击来“剿”了，这里，张春桥赤裸裸地宣扬了“剿匪有理”，完全暴露出一副国民党特务分子的反动嘴脸。"},{"type":"paragraph","text":"更有甚者，就在《土枪射手》抛出后的第三天，即一九三五年七月二十日，张春桥又迫不及待地在《太白》杂志上抛出了反革命的速写《驱逐》一文，虽是老调新弹，但是弹得更奥妙，以冀动听:"},{"type":"paragraph","text":"“在我们故乡直到现在，还保存着古代的风味。在那里含蕴着一团和气。”"},{"type":"paragraph","text":"在张春桥笔下，中国农村从“古”到“现在”，居然是一个无阶级、无矛盾、无斗争的“仙山琼阁”，是几千年来“含蕴着一团和气”的人间天堂，在这里，什么封建制度的剥削和压迫，什么帝国主义和国民党反动派的血腥统治的罪行都一笔勾销，化为乌有了。然而，张春桥笔锋一转:"},{"type":"paragraph","text":"“不过，人底天性是斗争，和气的时候是他们，和别人用笨重的器械激烈的斗争的时候也是他们。在曹州永远肃清不了的匪患是这种情况之下形成的。”"},{"type":"paragraph","text":"张春桥在《驱逐》的这一段算是画龙点睛，是他的得意传神之笔。显然，张春桥认为:人没有什么阶级性，人只有一种天性，就是好斗，因而破坏了自古至今农村中的“一团和气”。究竟是什么人天性好斗呢?张春桥所称的“他们”是谁呢?张春桥终于回答了:“永远肃清不了的匪患”就是由于有着这种天性好斗的人才形成的。不言而喻，因为天性好斗，所以如不“剿尽杀绝”，那就会有“永远肃清不了的匪患”。张春桥污蔑敢于抗争的农民为“匪”，污蔑农民不断斗争是“肃清不了的匪患”，这种狂吠，与《蒋汪联合宣言》中的“匪氛肆虐，患在腹心”毫无二致，正说明了张春桥直接充当了蒋介石反革命狂吠的传声筒。当时，正是一九三五年七月，红军在长征途中奋勇前进的时刻，张春桥抛出《驱逐》，一面鼓吹超阶级的人性，大肆兜售阶级调和的谬论，竭力掩盖国民党反动派祸国殃民的罪恶，妄图麻痹劳动人民的斗志；一面却咬牙切齿，恶毒咒骂革命群众为“匪”，必欲“剿尽杀绝”而后快，这就充分证明了张春桥从来就是劳动人民不共戴天的死敌。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"张春桥","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"99ed5c5a9a"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
