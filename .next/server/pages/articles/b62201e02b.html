script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"为纪念毛泽东诞辰一百周年《毛泽东文集》等六种重要图书将出版发行","authors":[],"dates":[{"year":1993,"month":9,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京9月5日电　为纪念毛泽东诞辰100周年，经中共中央批准，由中共中央文献研究室编辑的和文献研究室同有关部门合编的《毛泽东文集》等六种重要图书，将在今年12月先后出版发行。"},{"type":"paragraph","text":"《毛泽东文集》，是继《毛泽东选集》一至四卷之后又一部多卷本的综合性毛泽东著作集，由中央文献研究室编辑，人民出版社出版。今年将出版第一卷和第二卷。文集的选稿起自1921年，迄至1976年，收入《毛泽东选集》以外的许多重要文章、讲话、电报、书信、调查报告、新闻稿、谈话、讲话提纲、批示、批语等，其中大量文稿是第一次公开发表。文集反映了毛泽东的思想、理论、战略、策略，包括关于工作作风、工作方法的论述。"},{"type":"paragraph","text":"《毛泽东军事文集》，是迄今编入毛泽东军事著作最系统最全面的一部多卷本专题文集，由中央文献研究室与军事科学院合编，军事科学出版社和中央文献出版社出版。全书共六卷，选稿1600多篇，250多万字，其中多数文稿是第一次公开发表。这部文集系统地编入了毛泽东的军事理论著作和他起草的大量的电报、指示、命令等，集中反映了中国革命战争的理论、战略、作战原则和关于人民军队建设的思想，包含着丰富的军事辩证法。"},{"type":"paragraph","text":"《毛泽东外交文选》是一部毛泽东论述外交问题的专题文集，由外交部与中央文献研究室合编，中央文献出版社和世界知识出版社出版。本书收入毛泽东自抗日战争至七十年代初在外交方面的重要著作，其中包括大量手稿和同外宾的谈话，大部分是第一次公开发表。这部文集反映了新中国国际战略思想的确立、外交政策的制定、重大外交斗争的胜利、外交工作新局面的开创，体现了毛泽东在外交工作方面作出的历史功绩。"},{"type":"paragraph","text":"《毛泽东年谱》(1893—1949)，是国内首次详细记述毛泽东的思想、生平和业绩的编年体著作，由中央文献研究室编著，人民出版社和中央文献出版社出版。本书集毛泽东思想的精粹，展示他的生平和思想发展轨迹，反映他把马克思主义普遍原理同中国革命实践相结合的艰辛历程和丰硕成果。本书资料翔实、准确，大量使用档案材料，其中许多是第一次公开发表。这是一部融资料性、学术性、传记性于一体的史书，是了解和研究毛泽东及中共党史的重要书籍。全书150万字左右，分上、中、下三卷。"},{"type":"paragraph","text":"《毛泽东》画册，由中央文献研究室与新华通讯社合编，中央文献出版社出版。这本大型精美画册，以许多珍贵的历史画面展现毛泽东光辉的一生，真实记述他的实践活动和日常生活，生动表现一代伟人特有的风度。画册包括前言、风采、生平、年表四个部分，编入照片500余幅，约四分之一是首次公开发表，许多照片用原底精放，设计新颖。"},{"type":"paragraph","text":"《缅怀毛泽东》，由在毛泽东领导下工作过的老同志、同毛泽东有接触和交往的各方面人士以及毛泽东身边工作人员撰写的回忆文章汇集而成，内容亲切感人。本书由中央文献研究室编辑，收入文章90多篇，100万字，分上、下两册，今年9月前后由中央文献出版社出版。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b62201e02b"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
