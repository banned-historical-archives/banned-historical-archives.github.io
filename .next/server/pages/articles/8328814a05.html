script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"沪东造船厂铸工车间工人的革命大字报引起强烈反响上海工交战线革命群众热情高昂闻风而动 联系实际揭露矛盾狠批修正主义企业路线上海船厂戒骄戒躁，认真学习大字报，认真找差距，并派代表到兄弟单位取经　许多单位领导同志坚决和群众站在一起，热情支持群众的革命精神，带头揭露矛盾，开展革命大批判","authors":[],"dates":[{"year":1970,"month":5,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　沪东造船厂铸工车间第二十二班红哨兵的革命大字报象一颗革命的火种，把上海工交战线革命大批判的烈火烧得旺旺的。昨天，造船、机电、冶金、仪表、化工、轻工等各个行业的工厂和事业单位的革命群众都在议论这张革命大字报。他们都说，这张革命大字报写得好，写得尖锐，写得深刻，把经济领域的阶级斗争更加引向深入了。"},{"type":"paragraph","text":"在沪东造船厂，工人群众的情绪高涨极了。报纸一到，各个班组的工人都争看这张革命大字报，都在评论这张革命大字报。他们说，这张革命大字报反映了我们工人的心情，打中了沪东造船厂存在问题的要害。我们厂的领导骄傲自满情绪抬头，躺在先进单位的功劳簿上睡大觉，不这样猛击一掌，问题就解决不了。大字报提出的问题，实际上反映了我们厂内两条路线的斗争。上海船厂的工人也在认真学习。当天晚上，有的班组就贴出了大字报，提出了“在荣誉面前怎么办?”“船下水，船台空着怎么办?”“万吨船靠在码头怎么办?”从群众到领导都认真找差距，并派代表到兄弟单位取经学习。"},{"type":"paragraph","text":"这张革命的大字报在机电、仪表、化工、轻工等各行业也激起了强烈的反响。上海计算机打字机厂的工人说，这张革命大字报对于进一步肃清叛徒、内奸、工贼刘少奇的修正主义企业路线的流毒，进一步批倒批臭洋奴哲学、爬行主义、专家路线，具有普遍意义。许多工厂单位在学习、讨论中，联系实际，揭露矛盾，大找差距，狠批“刘毒”。群众的革命热情无比高昂，他们揭露问题，开展批评，一针见血，尖锐泼辣，誓把经济领域阶级斗争深入进行到底。"},{"type":"paragraph","text":"许多单位的领导同志坚决和群众站在一起，热情支持群众的批评，有的并和群众在一起揭露矛盾，开展革命大批判。昨天上午，沪东造船厂党委会、革委会几个领导成员一起来到铸工车间二十二班，和全班同志座谈，军队代表在会上表示要准备作自我批评。上海阀门一厂党委书记亲自把翻印的沪东造船厂工人的革命大字报，送到铸工车间，欢迎工人揭露本厂矛盾，借东风，把全厂革命、生产推向前进。上海第三制药厂党委书记在会上揭发了以老大自居，没有狠抓对修正主义企业路线的革命大批判等问题，决心和群众一起，揭露矛盾，深入开展经济领域的阶级斗争，迎头赶上去。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8328814a05"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
