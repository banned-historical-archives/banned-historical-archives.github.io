script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"学习政治理论，改造资产阶级思想  上海市十多万工商业者积极参加各种学习组织","authors":[],"dates":[{"year":1956,"month":10,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"学习政治理论，改造资产阶级思想"},{"type":"paragraph","text":"上海市十多万工商业者积极参加各种学习组织"},{"type":"paragraph","text":"新华社讯　上海市有十多万工商业者正在学习政治理论和时事政策。一部分上层资本家在中国人民政治协商会议上海市委员会举办的业余政治大学学习哲学和政治经济学。二千多名工商业者和他们的家属已经在工商界政治学校第一期结业，这个月内开学的第二期又有九千多名入学。全市约有十一万名中、小工商业者在各区定期的时事政策讲座听讲，学习国内外时事和社会主义改造的政策。还有很多青年资本家和工商业者的家属，分别参加了上海的青年和妇女团体举办的学习活动。"},{"type":"paragraph","text":"工商业者学习一般都很认真。有近一千名工商业者除了自己学习以外，还当了时事政策讲座的讲解员。"},{"type":"paragraph","text":"在学习中，工商业者增长了不少知识，懂得了许多新的道理。有些资本家过去认为自己是“将本求利”、“勤俭起家”的，学习后初步了解工人不开动机器自己就赚不了钱，原来的小厂变成大厂完全是工人劳动创造的。政治学校学员在学习中国革命领导权问题的时候，有些资本家不大相信工人阶级能够领导革命。在学校组织学员参观了上海工人文化宫陈列的上海工人运动斗争史料和上海市工业生产先进经验展览会后，很多人的看法改变了。一个老年资本家回忆“五卅”运动时的情景说：“当时上海工人罢工示威，英勇地同帝国主义者斗争，而我们中有些人表面罢市，暗中仍然在干买卖，怎能和工人阶级相比？”小业主们文化水平比较低，过去很少参加社会活动，听了时事政策报告后，认识了祖国社会主义建设的伟大，认清了自己应走的道路，许多人积极参加合作小组，或者接受国营公司的代销业务。工商业者在学习中，对不同的意见进行了自由讨论。工商界政治学校第一期学员曾经就资本家是否剥削工人的问题举行了三天的辩论会，双方列举理由互相说服。这样，很多人比较深刻地认识了这个问题，有些人还没有完全搞通，保留了自己的见解。"},{"type":"paragraph","text":"今年上海私营工商业社会主义改造高潮以后，工商业者纷纷要求学习政治，改造自己思想。中共上海市委员会帮助各有关单位建立学习组织和解决教材与聘请讲师等问题，各企业的公方代表和职工也鼓励私方人员学习，帮助他们安排学习时间。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b3c4de5926"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
