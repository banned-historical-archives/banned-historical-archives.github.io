script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"老挝一些群众挣脱极右派集中营返回解放区","authors":[],"dates":[{"year":1974,"month":3,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"老挝一些群众挣脱极右派集中营返回解放区"},{"type":"paragraph","text":"新华社一九七四年三月九日讯　据巴特寮通讯社报道，被美国和老挝极右派强行劫入集中营的老挝沙湾拿吉省和琅南塔省的许多群众，最近奋起斗争，要求根据万象协定及其议定书规定返回故乡自由谋生。"},{"type":"paragraph","text":"据不完全统计，从去年九月十四日关于老挝问题的万象协定的议定书签署以来，沙湾拿吉省法兰地区已有一百七十五户包括一千二百二十五人挣脱了集中营，胜利返回解放区家园。琅南塔省在今年一月份也有十户包括五十一人从集中营返回解放区家园。他们都受到了老挝爱国战线各地方委员会、当地革命政权和人民群众的热情欢迎和关怀。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"281bb6fb02"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
