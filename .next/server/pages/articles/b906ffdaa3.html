" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji41","name":"毛泽东全集第41卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji41.pdf"],"article":{"title":"关于人民公社若干问题的提纲","alias":"","parts":[{"type":"paragraph","text":"关于人民公社若于问题的提纲"},{"type":"paragraph","text":"（1959年3月）县、社会议如何开？生产队太小，例如只有几十户。一百多户是可以的吧？小队的部分所有制，是否应当承认？不承认，怎样？如何当公社党委第一书记和县委第一书记？这两级不通的人，有多少？如何办？"},{"type":"paragraph","text":"半粮食供给制（例如250斤），是否应当正式规定，范围多大（是否占全省25%的食堂）？"},{"type":"paragraph","text":"非农忙时食堂散伙，在一部分地方，如何？富裕中农不参加食堂，如何？"},{"type":"paragraph","text":"对大片麦、棉、油料、烟、麻、菜的种植计划，是否有不利之处？"},{"type":"paragraph","text":"对大协作，是否有不利之处？具体问题的解决，有无文件？"},{"type":"paragraph","text":"宣布三、五、七年就可以由小集体到大集体过渡，有些人不想种果树了，不想植树了，不想搞长远计划了，怎么办？"},{"type":"paragraph","text":"多种作物安排问题，关系甚大。"},{"type":"paragraph","text":"粮食与经济作物的安排，每队都要并举，按季节，作物参差不一，有利于劳动力的调节，有利于经济。"},{"type":"paragraph","text":"关于人民公社若干问题的提纲地、县、区、乡的重点问题："},{"type":"paragraph","text":"过去说，抓两头，带中间。实际只抓了富点；现要转过来，抓穷点，要学枣阳县委1958年提出口号：大战五条冈，结果：棉花增两倍，粮食增一倍。"}],"authors":["毛泽东"],"dates":[{"year":1959,"month":3}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":372,"page_end":373},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b906ffdaa3"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
