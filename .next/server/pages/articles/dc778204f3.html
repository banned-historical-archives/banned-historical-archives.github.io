script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"对资产阶级罪恶道德的公诉","authors":["萧琪"],"dates":[{"year":1955,"month":3,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"徐汇区中心小学总辅导员"},{"type":"paragraph","text":"上海市优秀辅导员　萧琪"},{"type":"paragraph","text":"新生的一代像鲜花一样地在成长着，在我们的青年和少年中间，新的共产主义的品质正在不断出现。作为一个人民教师，眼看着孩子们将要成为有着崇高理想和坚强意志的人，来接替我们的事业，心里那能不激动不高兴呢!但是，孩子们不是暖房里的花朵，而是生长在今天复杂的阶级社会中。敌人不甘心于自己的死亡，正在千方百计地破坏我们的社会主义建设，危害我们的下一代。昨天报上公布的市人民检察院对虞正钦等十三名犯罪分子的公诉书中所揭露的事实，具体地说明了这个问题。由于流氓盗匪分子的存在，使我们天真无邪的青、少年一代的心灵受到严重的摧残，这不能不使我们对流氓盗匪这一撮社会蟊贼感到极大的愤恨!"},{"type":"paragraph","text":"市人民检察院对十三名流氓盗匪分子的公诉正是对资产阶级罪恶道德的公诉，我们表示坚决的拥护和支持。为了保护青、少年一代的迅速成长，为了保障社会主义建设的成功，我们要求政府依法严办这些犯罪分子:该杀的杀，该关的关，不容许他们再为非作恶。作为一个人民教师，我要更负责的担当起培养建设人才的光荣任务，把孩子们教育成为具有高尚品质的新的一代。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dc778204f3"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
