script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"缅著名作家都阿玛发表文章谴责印度政府投靠美帝加紧反华揭露美帝利用假中立主义和修正主义进行反共和镇压民族解放斗争　柬报说中国再次呼吁印度谈判反映亚非人民愿望","authors":[],"dates":[{"year":1963,"month":3,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社仰光6日电】　缅甸著名女作家都阿玛今天在《人民报》上发表文章说:印度政府加紧扩军备战和进行反华宣传，目的之一是要求得到更多的“美援”和转移印度人民对国内困难的注意。"},{"type":"paragraph","text":"她指责印度政府目前将军事费用增加一倍，接受世界上最大的帝国主义的军事援助，进行战争准备。"},{"type":"paragraph","text":"她说，美帝国主义者正在利用假中立主义者和修正主义者来反对共产主义和镇压民族解放斗争。因此，美国要印度扮演重要的角色和供应它大量军事“援助”就不足为奇了。"},{"type":"paragraph","text":"她谴责印度一些好战分子在叫喊着“对共产主义宣战”，“占领西藏”，和“对中国宣战”。她还谴责尼赫鲁政府大规模逮捕进步人士、工人、农民和爱国人士。"},{"type":"paragraph","text":"【据新华社金边6日电】　柬埔寨《祖国报》昨天发表评论说，中国再次呼吁印度就中印边界问题举行谈判一事反映了所有爱好和平的亚非人民的真正愿望。"},{"type":"paragraph","text":"报纸说，印度政府必须再三考虑这个要求，以便两国之间直接举行谈判。评论指出，“我们认为，只有双方真诚地进行努力，特别是双方必须抱有解决问题的决心，并且只有通过和平方式，才能顺利地解决这个问题。”"},{"type":"paragraph","text":"柬埔寨《礼貌报》发表的一篇文章指出，“科伦坡会议的建议并不是公正的，它对印度有所袒护。”报纸还说:印度可以从科伦坡会议的这个建议中得到很大的好处。"},{"type":"paragraph","text":"文章说，在中印边界问题上印度所犯的最大的错误在于“它诉诸战争以压迫他人。它太妄自尊大，总是认为它自己有能力，不听取他人的劝告。不仅如此，印度还反对中巴边界问题的和平解决。”文章认为，如果印度仍然坚持自己的主张，诉诸武力，那末中印边界问题将长期不能解决。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7fd7ef1a61"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
