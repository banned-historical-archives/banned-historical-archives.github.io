<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"西贡政权进行残酷剥削，税收增加，物价猛涨  越南南方敌占区劳动人民生活日益贫困","authors":[],"dates":[{"year":1973,"month":6,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"西贡政权进行残酷剥削，税收增加，物价猛涨"},{"type":"paragraph","text":"越南南方敌占区劳动人民生活日益贫困"},{"type":"paragraph","text":"新华社河内一九七三年六月八日电　越南南方敌占区劳动人民在西贡政权的残酷压迫和剥削下，过着越来越贫困的生活。"},{"type":"paragraph","text":"阮文绍统治集团为了转嫁日益严重的经济困难，不断地向劳动人民增加税收。名目繁多的苛捐杂税，把那里的劳动人民压得透不过气来。他们经常要纳的税有“薪金税”、“训练税”、“红利税”、“手续费”等。工厂企业的工人每月要纳百分之二的“薪金税”。机动三轮车工人每次填履历表，要交两千七百元（越币，下同）的“手续费”。一名司机说，他每天收入一千元左右，不仅要缴纳各种税，而且每当经过两个中途检查哨时，还要缴纳四百元才能通行。在西贡各商场做买卖的小商贩，每天要交三千二百五十元的“牌照税”、二十元的“商品税”。"},{"type":"paragraph","text":"西贡政权控制区的人民还受到不断上涨的物价的威胁。据《纽约时报》记者最近发自西贡的一篇报道说，“物价已上涨到惊人的程度”。据西贡政权统计局大大缩小了的数字，西贡市场今年三月份的物价比去年同期上涨了百分之三十一以上。据西贡报纸五月底报道，同今年年初比较，每一公担大米从九千五百元涨到一万一千二百元，每公斤砂糖从二百元涨到三百一十元，每公升煤油从二十四元涨到三十六元，棉布价格上涨百分之三十四，药品价格上涨了百分之十到百分之十九。从今年年初到四月下旬，鱼类、肉类、蔬菜、水果和鱼露等价格也上涨了百分之八到百分之三十八。"},{"type":"paragraph","text":"税收增加，物价猛涨，劳动人民的收入却十分低微。许多工人和劳动人民家庭每天只能过着半饥半饱的生活。就连西贡伪政权中的中下级公务人员生活也很困难。据《纽约时报》记者发自西贡的报道说，西贡伪政权的经济部长范金玉最近对靠低工资生活的公务人员说，“不要期望在近期内加薪”，“你们必须要勒紧裤带”。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3fd6414f9c"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
