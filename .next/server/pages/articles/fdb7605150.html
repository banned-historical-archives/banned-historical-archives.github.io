script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji11","name":"毛泽东全集第11卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji11.pdf"],"article":{"title":"必须把勇敢精神与谨慎精神联系起来","alias":"","parts":[{"type":"paragraph","text":"必须把勇敢精神与谨慎精神联系起来"},{"type":"paragraph","text":"（1937年10月25日）朱、彭、任，林、聂、罗，贺、关、萧，刘、徐、张各同志并转各级负责同志："},{"type":"paragraph","text":"小胜之后，必生骄气，轻视敌人，以为自己了不得。七七一团七亘村受袭击?，是这种胜利冲昏头脑的结果。你们宜发通令于全军，一直传达到连队战士，说明对日本帝国主义的战争是一个艰苦奋斗的长过程。凡那种自称天下第一、骄气洋溢、目无余子的干部，须以深切的话告诉他们，必须把勇敢精神与谨慎精神联系起来，反对军队中的片面观点与机械主义。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十月二十五日"},{"type":"paragraph","text":"[1]朱，指朱德。彭，指彭德怀，当时任八路军副总司令。任，指任弼时，当时任八路军政治部主任。林，指林彪，当时任八路军第一一五师师长。聂，指聂荣臻，当时任八路军第一一五师政治委员。罗，指罗荣桓（1902一1963），湖南衡山人，当时任八路军第一一五师政治部主任。贺、关、萧，指贺龙、关向应、萧克，当时分别任八路军第一二〇师师长、政治委员和副师长。刘、徐、张，指刘伯承、徐向前、张浩（林育英)，当时分别任八路军第一二九师师长、副师长和政治委员。"},{"type":"paragraph","text":"[2]1937年10月23日，八路军第一二九师第三八六旅第七七一团在山西省平定县七亘村地区遭日军一个联队和200余骑兵的袭击，伤亡30余人。"}],"authors":["毛泽东"],"dates":[{"year":1937,"month":10,"day":25}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":329,"page_end":329},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fdb7605150"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
