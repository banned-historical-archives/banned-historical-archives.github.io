script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"江湾吴淞两区各界人民代表坚决拥护郊区土地改革上海市郊农村严重地存在着封建剥削　农民们迫切要求改革及镇压恶霸地主","authors":[],"dates":[{"year":1951,"month":1,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　以“坚决实行土地改革”为中心议题的江湾区第一次各界人民代表会议，于本月廿七日揭幕，历时三天，已于昨晚闭幕。在这个会上，可以看到反对封建统一战线的强壮，和农民的迫切要求土改。大会通过了以实行土地改革、结合做好反动党团特务人员登记工作为中心的今后三个月工作任务，并通过了镇压恶霸地主的人民法庭江湾区分庭的审判员名单，和选举协商委员会主席；并通过区土改委员会的正副主任。大会听取了李守咨区长关于本区工作及今后任务的报告，和徐鑫同志“关于上海市江湾区坚决实行土地改革的报告”。徐鑫同志报告中指出:从江湾农民的申诉中，可以看出:上海市郊农村封建剥削严重地存在着，而且农民过去还兼受着官僚资产阶级与帝国主义的长期统治与剥削，对于土地改革的要求是迫切的。他并阐述了郊区土地改革中的几个主要政策。"},{"type":"paragraph","text":"会议进行第三天是各界代表在大会上发言，工人代表姚仁夫说:土地主要靠我们劳动人民的努力和奋斗，劳动人民是一家，团结起来力量大，只要大家团结紧，不怕地主和恶霸。工商界代表陆春明先生发言说:我保证将会议收获，向全区工商界传达，以保证不逃税、不投机取巧，帮助政府搞好稳定物价的实际行动来拥护土改。教师和学生也表示在春节时不告假返乡，而要组织宣传队下乡宣传土改，揭露地主的罪恶。"},{"type":"paragraph","text":"【又讯】吴淞区第一次各界人民代表会议，亦已于前日闭幕。作。"},{"type":"paragraph","text":"出席这次会议的代表共一四八人，会上代表们一致拥护坚决完成郊区土地改革的决议和做好反动党团特务人员登记等工作。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fdabffdebb"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
