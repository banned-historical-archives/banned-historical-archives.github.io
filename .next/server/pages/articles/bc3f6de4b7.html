<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoistlegacy.de-55","name":"中央办公厅转发总政治部《关于全军落实起义、投诚人员政策工作情况和今后意见的报告》","author":"中共中央办公厅","internal":false,"official":false,"type":"unknown","files":[],"article":{"title":"中央办公厅转发总政治部《关于全军落实起义、投诚人员政策工作情况和今后意见的报告》","dates":[{"year":1983,"month":4,"day":28}],"is_range_date":false,"authors":["中共中央办公厅"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"中共中央组织干审局，干审工作政策文件选编 （下）, 1115-1118","tags":[{"name":"复查","type":"主题/事件"},{"name":"军队","type":"主题/事件"},{"name":"落实政策","type":"主题/事件"},{"name":"平反","type":"主题/事件"},{"name":"起义投诚人员","type":"主题/事件"}],"parts":[{"type":"title","text":"中央办公厅转发总政治部《关于全军落实起义、投诚人员政策工作情况和今后意见的报告》"},{"type":"paragraph","text":"1983年4月28日 · 中办发〔1983〕32号"},{"type":"paragraph","text":"总政治部《关于全军落实起义、投诚人员政策工作情况和今后意见的报告》已经中央书记处原则同意。现转发给你们，请参照执行。"},{"type":"paragraph","text":"地方各级党政机关要督促有关部门对解放军落实起义、投诚人员政策工作给以大力支持，军队、地方共同努力，争取尽快在全国范围内完成这项工作。"},{"type":"paragraph","text":"关于全军落实起义、投诚人员政策工作情况和今后意见的报告"},{"type":"paragraph","text":"中央书记处："},{"type":"paragraph","text":"为了贯彻中央办公厅《转发中央统战部等六部门〈关于解决落实起义、投诚人员政策工作中遗留问题的报告〉》〈中办发〔1982〕41号文件〉精神，进一步做好落实起义、投诚人员政策工作，总政治部于一九八三年一月二十七日至二月三日在京召开了全军落实起义、投诚人员政策工作座谈会。现将有关情况和今后意见报告如下："},{"type":"paragraph","text":"党的十一届三中全会以来，全军各大单位党委和政治机关，坚决贯彻《中共中央批转〈关于落实对国民党起义、投诚人员政策的请示报告〉的通知》（中发〔1979〕6号文）精神，不断消除“左”的思想影响，加强领导，采取措施，对落实起义、投诚人员的政策，做了大量工作，取得了明显成绩。对冤、假、错案进行了认真复查和平反纠正。全军共复查X千余件判刑案件，已经平反纠正的共X千余件，占复查总数的百分之七十点二。有申诉的X千余起案件已基本复查完毕。还解决了一批错处问题。商请地方政府对X千余名起义、投诚人员作了适当安置。受理了X万余件来信和X万多人次来访。查证了一大批起义、投诚部队及其人员的身份。进一步落实了还在军队工作的起义、投诚人员的政策。在中办〔1982〕41号文件下发后，又清查了大量历史档案，对起义、投诚人员的无申诉案件开始摸底和复查。总的来看，全军多数单位对这项工作抓得较紧，进展较快。"},{"type":"paragraph","text":"当前落实起义、投诚人员政策工作中存在的主要问题是:有些同志对这项工作的重大意义认识不足，重视不够。有的同志受“左”的思想影响，认为起义、投诚人员在历史上有不同程度的罪恶，对给他们落实政策思想有些不通。有的认为有申诉案件已基本复查完了，工作做得差不多了，出现了松劲情绪。"},{"type":"paragraph","text":"根据中办〔1982〕41号文件关于复查无申诉案件的要求，全军落实起义、投诚人员政策的工作任务还相当繁重。据初步统计，对起义、投诚人员判刑的案件共X千余件，现尚未复查的有X千余件，占判决总数的百分之四十四点三。这些案件绝大多数是没有申诉的。过去因追究历史问题被开除军籍、送地方监督劳动、管制或劳改的起义、投诚人员数量较大，情况复杂，有待查清底数，落实政策。还有大量安置工作需要协同地方有关部门共同办理。"},{"type":"paragraph","text":"会议要求全军各级党委和政治机关，继续贯彻执行中央有关方针政策,进一步加强组织领导，认真负责，善始善终，争取在一九八四年上半年全面完成落实起义、投诚人员政策工作。"},{"type":"paragraph","text":"一、不断提高对落实起义、投诚人员政策重要性的认识，继续清除“左”的思想影响。"},{"type":"paragraph","text":"各级领导要深入学习中央有关指示，充分认识落实党对起义、投诚人员的政策，是我党十一届三中全会以来平反冤、假、错案工作的一部分；充分认识落实这一政策对促进国内的安定团结，加强社会主义现代化建设，以及对台湾回归、完成祖国统一大业的重要意义。必须切实清除“左”的思想影响，以高度负责的精神和积极主动的态度进行复查、纠正工作。"},{"type":"paragraph","text":"二、要加强领导，狠抓落实。"},{"type":"paragraph","text":"各单位党委和政治机关务必把这项工作列入议事日程，加强组织领导。工作量较大的单位，要抽调人员，集中力量，限定时间，尽快完成。能今年完成的，不要拖到明年。要重视调查研究，尽力查清本单位、本地区起义、投诚人员的有关情况。对被错判、错处的，要一个一个地查，一件一件地落实。在工作结束前，要进行全面检查,做好收尾和验收工作，写出总结报告。各大单位每一季度要向总政报告一次工作进展情况。各有关业务部门之间要明确分工，密切协作。"},{"type":"paragraph","text":"军队落实起义、投诚人员的政策，必须取得地方党政领导机关和有关部门的大力支持。各有关单位应经常向省、市、自治区党委和有关部门汇报情况。在与有关地方党政机关协商对起义、设诚人员的安排时，要充分尊重地方的意见，共同做好善后工作。"},{"type":"paragraph","text":"三、坚持“既往不咎”政策，切实做好平反纠正工作。"},{"type":"paragraph","text":"(一) 对起义、投诚人员被判刑案件，要逐一进行复查。凡因追究历史问题或主要因追究历史问题而错杀错判的，必须坚决予以平反纠正，撤销原判。平反纠正后的善后工作，按中办〔1982〕41号文件规定办理。"},{"type":"paragraph","text":"在复查工作中，对无原判档案材料的案件，应根据当事人提供的情况和线索进行调查，查清事实后，根据不同情况予以处理；对无申诉案件，就现有材料复查，作出结论，应纠正的，要积极查找当事人，办理法律手续。对复查后维持原判的案件，应再进行一次复查。"},{"type":"paragraph","text":"(二) 对起义、投诚人员被开除军籍、送地方监督劳动、管制或劳改的，应进行复查。其中因追究历史问题而被错处者，或虽有现行问题而确属错处者，均应予以改正，恢复其起义、投诚人员身份，并商请当地人民政府做好善后工作。"},{"type":"paragraph","text":"(三) 起义、投诚人员，因追究历史问题受降职、降级处分的，应予复查纠正。其中已转业、复员的，其工资级别确实偏低，或生活确实有困难，由军队复查单位提出意见，商请地方有关单位给予适当解决。因追究历史问题受其他处分的，也应复查纠正；因追究历史问题处理安置不当的，要商请地方有关单位妥善安置和适当解决他们的待遇。"},{"type":"paragraph","text":"(四)现在军队的起义、投诚人员，职务等级不明确的，应与其他干部统一衡量，按“一视同仁”原则确定其职务等级，并由现在管理单位，按干部任免权限办理；从一九八〇年四月一日起，按现行职务级别工资标准补发工资差额。对其安置问题，按军队现行干部离休、退休的有关规定办理。"},{"type":"paragraph","text":"军队落实政策所需调查等经费，拟商总后勤部报军委解决。"},{"type":"paragraph","text":"总政治部"},{"type":"paragraph","text":"九八三年三月三十一日"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bc3f6de4b7"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
