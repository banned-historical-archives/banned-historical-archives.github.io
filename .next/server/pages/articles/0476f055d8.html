script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"京郊龙河村土地改革中取消封建地租剥削  保护进步农业设备有利农业资本家发展生产","authors":[],"dates":[{"year":1950,"month":2,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"京郊龙河村土地改革中取消封建地租剥削"},{"type":"paragraph","text":"保护进步农业设备有利农业资本家发展生产"},{"type":"paragraph","text":"【本报讯】根据记者在北京南郊十四区龙河村所获材料，土地改革对农业资本家的生产将发生好的影响。因为它取消了封建地租的剥削，而保留了一切进步设备与使用进步设备所耕种的土地的使用权。"},{"type":"paragraph","text":"龙河村大部分是稻田，全用井水浇灌。该村的农业资本家大部分使用动力机、电滚子、电井、打稻机、砻稻机、碾米机等进步设施进行耕种。有些经营较好的，本人还具有科学的农业知识和生产技术。如农业资本家力树基，种稻中每年自行选种，养苗，研究害虫的防治，并常阅读农业书籍和杂志。在附近一带村庄，他经营最好，稻子的收获量也是最高的。"},{"type":"paragraph","text":"力树基全家八口人，自有水地三十一亩、旱地二十亩，租入水地三百一十五亩、旱地十五亩。他的耕作设施有：电井一个、自流井二十五个、铁水车四辆、电滚子六个（三个抽水，三个带动其他机器）、水泵一个，另有打稻、砻稻、碾米等一套机器，骡子五头、大车两辆。土地耕种上雇十四个工人，每年另用临时工（短工）八千个。其耕种情形是：浇水和稻子收割后的去壳、碾米用机器，其他全用人工。他还经营有副业粉房一座，其中所用的电力水磨、吸水机、风胡芦（代风箱）等，也都是较现代化的工具。"},{"type":"paragraph","text":"土地改革中，力树基租入的土地所有权收归国有，其用机器耕种之土地，仍全部留其使用。其所有之机器、牲畜、农具亦全部未动。农会初拟抽出其不用机器耕种的旱地，分配给农民使用。后因这些旱地都是零碎地散插在水地中间，分配后农民很难耕种，故旱地亦未抽动。"},{"type":"paragraph","text":"总计该村共有农业资本家十一户，共六十二口人，租入水地九百八十一亩、旱地七百七十六亩半、园地八分。自有水地三十一亩、旱地一百八十九亩、园地十二亩二分。耕作用具共有电井四眼、自流井八十八眼、电滚子十三个、砻稻、碾米等机器十二个、铁水车六个、木水车十一个、大车八辆、骡子十九头、马一头、牛一头。其租入之土地，所有权收归国有。并抽出原非使用机器耕种的水地一百二十九亩、旱地七百九十六亩半、园地八分，分配给农民使用。"},{"type":"paragraph","text":"农业资本家今后耕种国家的土地，已不需再交地租。只需向国家交纳统一的农业税。过去每亩水地每年约可收四百斤大米，给地主交租需二百斤左右；今年交农业税加上累进，多者不过小米百余斤。这就使农业资本家今后有可能以更多的剩余投入生产。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0476f055d8"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
