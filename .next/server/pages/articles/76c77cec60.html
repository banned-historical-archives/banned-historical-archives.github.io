" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji30","name":"毛泽东全集第30卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji30.pdf"],"article":{"title":"转发西南公安部关于财经交通部门清理反动分子总结报告的批语","alias":"","parts":[{"type":"paragraph","text":"转发西南公安部关于财经交通部门"},{"type":"paragraph","text":"清理反动分子总结报告的批语"},{"type":"paragraph","text":"（1951年3月18日）各中央局，并转分局，省委，区党委，大中市委："},{"type":"paragraph","text":"在留任人员中清理反动分子，湖北省一级已有一个经验，现在西南方面又有了一个更完全的经验。可见这不但是应当做的，而且是现在就可以做的。这是一个很大的问题，必须认真去解决。西南的经验是在西南军政委员会直属的财政、经济、交通机关留用人员和新知识分子九千余人中，逮捕了七十余人，管制了七十余人，管训了一百九十余人，清洗了八人，共计三百五十余人，占旧人员总数百分之三点九。此外，又登记了国民党及会道门分子五千七百余人，占旧人员总数百分之六十四。这个经验很值得研究。请你们对这方面的问题，加以考虑，定出实施计划，取得经验，加以推广。"},{"type":"paragraph","text":"毛泽东三月十八日"}],"authors":["毛泽东"],"dates":[{"year":1951,"month":3,"day":18}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":167,"page_end":167},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"76c77cec60"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
