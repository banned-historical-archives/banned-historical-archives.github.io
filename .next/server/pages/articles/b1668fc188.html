" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"武汉市干部、群众及民主人士对中南军政委员会处分吴德锋等的反应","authors":[],"dates":[{"year":1952,"month":2,"day":20}],"is_range_date":false,"parts":[{"text":"武汉市干部、群众及民主人士对中南军政委员会处分吴德锋等的反应","type":"title"},{"text":"【中南总分社二十日讯】中南军政委员会宣布处分吴德锋等后，武汉市干部、群众及民主人士反映如下：","type":"paragraph"},{"text":"（一）机关党员干部认为：党在处理这件事时是勇敢的，决断的，我们完全同意。但是处分太晚了，为什么不在上次党代会上处理，那时可以多挽救一部分干部。市委过去处理问题原则性太差，优柔寡断才造成现在的损失。科长级以上干部震动较大，有的说：搞不好，这一棒不知什么时候落在自己头上。有的人说：要是在国民党时代十个纪凯夫也不行，一个小职员怎能碰得过市长呢？共产党真英明。","type":"paragraph"},{"text":"（二）群众反映：有的理发工人说：“共产党真民主。”但有的人说：“这个处分是不对的，但吴市长参加革命很久，做了很多工作，是否可降级使用？”有的说：“吴市长是老革命，有成绩，处分太重了，但朱局长处分太轻了”。有的职员说：今天我们才体现了共产党的伟大，不自私，以后要好好工作，不许马虎了。有的工人说：共产党太伟大了，我们要搞好三反，争取做一个共产党员。","type":"paragraph"},{"text":"（三）民主人士的反映：林厚周说：共产党对己严，对民主人士宽。如文化部许凌青犯了那样大的错误都不处分，吴市长犯了小错误也不是直接犯的就处分这样重，真不苟且。贺衡夫说：吴市长检讨的很深刻，但处分还是严，一个老共产党员还有一点小资产阶级思想就这样严格，对待我们资产阶级真不得了。有些民主党派人士说，看看对吴市长的处分，我们这些人到北京人民大学住三十年也改造不好。陈铭枢、阁晴天、銮雷等说中南军政委员会开会未通知他们，有些不满。","type":"paragraph"}],"comments":[],"origin":"新华社《内部参考》1952年2月28日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"吴德","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b1668fc188"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
