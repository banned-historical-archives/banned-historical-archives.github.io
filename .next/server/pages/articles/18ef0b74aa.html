script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji40","name":"毛泽东全集第40卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji40.pdf"],"article":{"title":"祝贺阿尔及利亚共和国临时政府成立的电报","alias":"","parts":[{"type":"paragraph","text":"祝贺阿尔及利亚共和国临时政府成立的电报"},{"type":"paragraph","text":"（1958年9月22日）阿尔及利亚共和国临时政府总理费尔哈特·阿巴斯阁下："},{"type":"paragraph","text":"感谢你1958年9月19日的来信。我代表我国和我国全体人民并且以我个人的名义热烈地祝贺阿尔及利亚共和国临时政府的成立。祝贺英勇的阿尔及利亚人民在争取民族独立和反对殖民主义的斗争中取得更加辉煌、更加伟大的胜利！"},{"type":"paragraph","text":"中华人民共和国主席毛泽东"},{"type":"paragraph","text":"一九五八年九月二十二日"},{"type":"paragraph","text":"[1]指费尔哈特·阿巴斯1958年9月19日给毛泽东的信。信中叙述了阿尔及利亚临时政府成立的情况后说：“阿尔及利亚共和国临时政府的成立满足了阿尔及利亚人民的热切愿望，这是自然发展不可抗拒力量的必然结果，它是阿尔及利亚人民在4年的英勇斗争中牺牲了60多万人的生命所取得的成果。信中赞扬毛泽东是亚洲人民解放的巨匠，是人民自决权的不倦的保卫者。”并说：“鉴于光荣的中国人民对阿尔及利亚革命事业的巨大支持，以及我们政府的成立将作为受苦难的阿尔及利亚的解放的一个决定性的因素记载在历史上，我确信中华人民共和国政府将是最先承认在1958年9月19日13时成立的阿尔及利亚政府的国家之一。”1958年9月22日，中华人民共和国外交部部长陈毅致电阿尔及利亚共和国临时政府外交部部长穆罕默德·拉明·德巴金，通知对方，中国政府已决定承认阿尔及利亚共和国临时政府。"}],"authors":["毛泽东"],"dates":[{"year":1958,"month":9,"day":22}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":264,"page_end":264},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"18ef0b74aa"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
