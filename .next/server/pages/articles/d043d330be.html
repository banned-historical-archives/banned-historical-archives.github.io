" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"吴宓交代思想（摘录）","authors":["吴宓"],"dates":[{"year":1970,"month":2,"day":23}],"is_range_date":false,"parts":[{"text":"吴宓交代思想（摘录）","type":"title"},{"text":"吴宓","type":"authors"},{"text":"〖吴宓，时任西南师范学院中文系教授，四川省政协委员。〗","type":"subtitle"},{"text":"1970二月二十三日，宓坦白、真诚地写出、交上宓的全部思想（自1969六月二十一晚，由梁平分院回到学校，到今天），并承认这些思想的错误。其中十分之九，都是已经口头向刘师傅和专政队陈述过，或另写成纸片交上的。","type":"paragraph"},{"text":"先述说一些事实（从略）。再述说宓的思想。（一）遵照毛主席的思想、党和人民政府的政策（对知识分子再教育给出路的政策），参考进驻清华大学和北京二七机车车辆厂、针织总厂、新华印刷厂、北京木材厂的工人、解放军毛泽东思想宣传队之办事经验、处理结果，宓相信在临近的将来，所给予宓的最后处理，将是作为“反动资产阶级学术权威”，一批二养，——批判斗争之后，责令“改造思想”，而给以生活及出路。","type":"paragraph"},{"text":"（二）宓所犯的“反党、反社会主义、反毛泽东思想之罪行”以及言论思想中之错误，是很多很多，且有些是很严重的。但宓久已表示，宓完全知罪认罪。又已历次写交了交代材料数十篇，并交出了1910至1968年吴宓日记三十七八册以及其他有关材料。根据“坦白从宽，抗拒从严”，工人阶级大公无私，群众的眼睛是雪亮的，宓最后还可得到从轻的处理。","type":"paragraph"},{"text":"（三）宓敢这样相信，是因为宓自己知道宓的确不是“历史或现行的反革命分子”，经过精细的、详实的调查，即知宓既非叛徒、特务，又绝无“杀人放火”等行为，而且本身不是国民党员，素不参加政治活动，即宓所编辑的《学衡》杂志，其中亦无“反共”或涉及“共产党”的文章，（无论题目或内容。）《吴宓诗集》亦同。总之，宓一生之错误，主要是在学术、文艺方面，思想和言论上之错误，而绝无反革命之活动及行为。","type":"paragraph"}],"comments":[],"origin":"吴宓著、吴学昭整理注释《吴宓日记续编》第九册，北京，生活·读书·新知三联书店出版，2006年4月第一版。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d043d330be"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
