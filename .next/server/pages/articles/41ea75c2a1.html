" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"关于学习马列主义","authors":["吴中禄","周尧","康清","蒯执中","薛廷杰","西北农学院","阎九如","陈世杰"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"关于学习马列主义","type":"title"},{"text":"西北农学院阎九如吴中禄周尧康清蒯执中薛廷杰陈世杰","type":"authors"},{"text":"1．“马列主义是一种学派，党可以来宣传马列主义，知识分子学习可以自愿，谁愿意学什么就学什么，尤其高级知识分子，可以独立思考，只要是他爱国好好工作，他学什么都可以。”(财务科科长　阎九如)","type":"paragraph"},{"text":"2．“我看政治学习是教条重复，我看要改变，有时明明有文件却硬要叫到西安去念一遍文件”。“马列主义夜校可以取消。”(农化系教授　吴中禄)","type":"paragraph"},{"text":"3．“马列主义是有用的，以子之‘矛’攻子之‘盾’。”“我和毛泽东思想不谋而合。”(植保系教授　周尧)","type":"paragraph"},{"text":"4．“马列主义是狗肉、蛇肉，你不愿吃它，你还得慢慢吃惯它。”“高级知识分子不该参加政治活动。”(农机系教师　康清)","type":"paragraph"},{"text":"5．“知识分子、科学技术人员，不必学习政治，进行思想改造，如果要学，好处就在于对于发明、创造能保密，不致于出卖给外国或遗失机密。”(教学设备科　蒯执中)","type":"paragraph"},{"text":"6．“现在教科书(指俄文课本)内政治成分、政治述语太多，很难看出能解决问题的。”(畜牧系助教　薛廷杰)","type":"paragraph"},{"text":"7．“关于今后用人的问题应当加以考虑，光看德是不合适的，现在高等学校的知识分子都是爱国主义者。”(农学系副教授  陈世杰)","type":"paragraph"},{"text":" 来源：《西北农学院右派言论及错误言论汇集》(西北农学院马列主义教研组编印，1957年12月)。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"41ea75c2a1"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
