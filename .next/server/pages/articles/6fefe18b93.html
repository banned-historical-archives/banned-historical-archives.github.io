" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji31","name":"毛泽东全集第31卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji31.pdf"],"article":{"title":"给杨立三的信","alias":"","parts":[{"type":"paragraph","text":"给杨立三的信"},{"type":"paragraph","text":"（1951年12月14日）杨立三同志："},{"type":"paragraph","text":"十二月十三日来信收到。我很赞同你的这种态度，对自己在所任工作中的缺点和错误作全面的检讨；同时要对整个后勤工作的缺点错误提出批评，当然要正确地肯定成绩。这样，你就有了主动。这样做，可以引起别的同志也都进行自我检讨和相互检讨，别的同志也就有了主动，就可推动整个后勤工作的改革。据我所知，我军整个后勤系统长期缺乏这种民主的自我检讨和相互检讨，以致政治空气极不浓厚；党的生活极不健全；许多领导同志胸襟狭隘，思想不开展，作风不民主，只顾小局，不顾大局；后勤系统中贪污、浪费和官僚主义极端严重，这种严重性至少不下于政府的财经系统和公安系统。所有这一切，均应以这次后勤会议为开端，彻底地进行批判和改革。因此，我很赞成你在来信中所取的态度，我看了你的信甚为高兴。如果你同意的话，请将你给我的信和我这封复信，一起印发给此次后勤会议到会的同志们阅看。印出来之后，同时发给我一份。"},{"type":"paragraph","text":"致共产主义的敬意！"},{"type":"paragraph","text":"毛泽东一九五一年十二月十四日"}],"authors":["毛泽东"],"dates":[{"year":1951,"month":12,"day":14}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":141,"page_end":141},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6fefe18b93"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
