script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"注意外貌美是资产阶级思想吗?","authors":["施忠保"],"dates":[{"year":1980,"month":7,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"施忠保"},{"type":"paragraph","text":"编辑同志:"},{"type":"paragraph","text":"我们常这样想:青年人要讲究点服饰的美，把自己打扮得漂亮些。因此，平时我们较注意穿着打扮。可是却遭到一些同志的指责、非议，说追求外貌的美就是资产阶级思想。我们不理解，究竟应该怎样看待这个问题?"},{"type":"paragraph","text":"朱建萍　陈玲红"},{"type":"paragraph","text":"建萍、玲红两同志:"},{"type":"paragraph","text":"我认为，外貌无非是指人的长相和衣着打扮，女同志还有一个发型。一个青年人爱美，从自己现有的条件出发，衣着美观实惠、整洁大方，打扮得体，就是从一个侧面点缀了生活之美，无可厚非。不加具体分析地把它斥责为资产阶级思想的反映，这是难以令人信服的。无产阶级的“俭朴”，并不是要求人们的衣着清一色。我们搞四化建设，也要美化人民的生活。今天的纺织印染行业、成衣行业生产的新颖美观的各种纺织品和服饰，不就是为了使人们穿着打扮得更漂亮，以满足人们对美好生活的向往和消费者的实际需要吗?"},{"type":"paragraph","text":"然而，一个人的穿着打扮，不管是刻意追求还是漫不经心，在一定程度上反映出她(他)的性格、气质、道德和文化素养。青年人应该把学习、工作、对人民和社会应尽的责任和义务置于首位，这是精神生活上的美。如果一个青年人沉湎于发型衣着，一味追求所谓的“时髦”，打扮得奇形怪状，和自己的年龄、所处的场合又不相称，这会使人产生一种厌恶或者不愉快之感，那样倒是想美不成，反为显丑了。有些人，经济条件并不富裕，而过多的在这方面浪费了精力和时间，甚至以“丑”为美，以怪为荣那更是不可取的。反之，穿着打扮得体，它才会给人以明朗整洁、落落大方之感。这才是我们提倡的健康的美。"},{"type":"paragraph","text":"古人说:“玩物丧志，而俭能养志”，一个人在物质生活上追求得多了，事业上的成就必然就少了。我想，我们还是以鲁迅所说的，“生活太安逸了，工作就会被生活所累了”这句话来共勉吧。施忠保"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1a4a0caf13"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
