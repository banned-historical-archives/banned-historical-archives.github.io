" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"周恩来关于召开国庆大会等问题给新疆的指示","authors":["周恩来"],"dates":[{"year":1967,"month":10,"day":1}],"is_range_date":false,"parts":[{"text":"周恩来关于召开国庆大会等问题给新疆的指示","type":"title"},{"text":"周恩来","type":"authors"},{"text":"〖时间：上午，总理来电指示（要点）〗","type":"appellation"},{"text":"一，都不要在人民广场开会；","type":"paragraph"},{"text":"二，新疆军区，军区生产建设兵团、七三三五部队自己开；","type":"paragraph"},{"text":"三，红二司在南门体育场开；","type":"paragraph"},{"text":"四，工农革委会等自己找地方开。","type":"paragraph"},{"text":"（注）：关于召开国庆大会，我三新革命造反派遵照总理指示，积极准备参加军区的大会（当然也有不少战士思想不通），但是，死不悔改的走资派王恩茂一小撮制造了骇人听闻的“九·二八”惨案。当时中央考虑到在一起开会可能发生问题，决定分开庆祝。这样又出现了会场问题，都想在人民广场开会，争持不下，所以总理就作了如上四点指示。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"新疆文革","type":"人物"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2e3d638c0a"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
