<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"捷共代表大会通过党中央工作报告的决议号召加速完成社会主义建设反对修正主义的斗争是国际义务","authors":[],"dates":[{"year":1958,"month":6,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【据新华社布拉格22日电】　捷克斯洛伐克共产党第十一次代表大会21日就诺沃提尼同志所作的捷共中央委员会工作报告通过了一项决议。决议认为，捷克斯洛伐克在建设方面所取得的成就证明了，过去几次党代表大会所规定的捷克斯洛伐克建设社会主义的总路线是完全正确的。"},{"type":"paragraph","text":"在谈到捷克斯洛伐克的外交政策时，决议表示深信，社会主义阵营的强大力量以及全世界爱好和平人民的努力将会粉碎帝国主义的战争阴谋。决议说，捷克斯洛伐克积极支持苏联的和平政策和苏联提出的关于缓和国际紧张局势的各项建议。它准备参加由社会主义国家和资本主义国家的代表举行的最高级会议，但是在任何情况下它决不容许帝国主义干涉它的内政。"},{"type":"paragraph","text":"决议说，捷克斯洛伐克外交政策的一个迫切任务是，坚定不移地为反对西德军国主义化、反对用原子武器和火箭武器武装西德军队而斗争。捷克斯洛伐克愿意成为中欧无原子武器地区的一部分，如果这个地区也包括西德在内的话。"},{"type":"paragraph","text":"决议说，各国共产党和工人党去年11月的莫斯科会议所反映的共产党和工人党的巩固的团结和会议所通过的文件，是争取社会主义的斗争中的一切胜利的根本条件。"},{"type":"paragraph","text":"我们认为，反对修正主义的斗争是我们的国际义务。修正主义攻击马克思列宁主义的基本原则，企图破坏共产主义革命运动的团结一致。我们坚决反对南斯拉夫共产主义者联盟的代表们所宣扬的反马克思主义的修正主义观点，这些观点充分反映在南斯拉夫共产主义者联盟第七次代表大会所通过的纲领中。在这个修正主义的纲领中，南斯拉夫共产主义者联盟使自己脱离国际共产主义运动而孤立起来。"},{"type":"paragraph","text":"决议说，捷克斯洛伐克共产党将尽一切力量来争取各国工人阶级最广泛的国际团结。它将努力争取同各资本主义国家里的社会党、同它们的代表以及同其他工人组织和工会组织发展更密切的关系。"},{"type":"paragraph","text":"在我们同社会主义阵营各国的关系中，我们将更加坚持不渝地遵循友好互助的原则，这个原则是无产阶级国际主义的最高表现。我们将继续加强捷克斯洛伐克和华沙条约缔约国的整个集体的防御力量和警惕性，因为帝国主义者还在进行反对社会主义国家的阴谋。我们将在经济互助委员会的组织内对国际社会主义分工积极作出贡献，对为整个社会主义阵营的利益而共同来最充分地使用社会主义的一切力量和资源积极作出贡献。"},{"type":"paragraph","text":"决议说，捷克斯洛伐克外交政策的一项重要任务是，进一步发展同那些和各社会主义国家共同组成“和平地区”的反帝国主义、反殖民主义的国家在经济、政治和文化方面的友好合作。"},{"type":"paragraph","text":"决议说，党将领导艺术家和文化工作者来发展社会主义现实主义的艺术。发展社会主义现实主义文化艺术的先决条件就是:要进行坚决斗争，反对和党不相容而为修正主义所利用的一切倾向和情绪。"},{"type":"paragraph","text":"在党的工作方面，决议要求进一步加强党在思想工作和教育党员方面的领导作用。"},{"type":"paragraph","text":"决议指出，苏联的榜样和苏联共产党的丰富经验对捷克斯洛伐克共产党永远是宝贵的支持和帮助。"},{"type":"paragraph","text":"决议最后号召捷克斯洛伐克共产党的全体党员努力为实现完成社会主义建设的任务而奋斗。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f9bc4c9c7e"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
