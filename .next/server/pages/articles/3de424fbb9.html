script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共中央关于加紧进行整风的指示","authors":[],"dates":[{"year":1957,"month":6,"day":6}],"is_range_date":false,"parts":[{"text":"中共中央关于加紧进行整风的指示","type":"title"},{"text":"上海局，各省委，市委，内蒙自治区党委：","type":"appellation"},{"text":"毛泽东同志二月廿七日在最高国务会议及三月间在宣传会议的两次讲话，准备于六月十五日左右在报上发表。各省市一级机关、高等学校及地市一级机关用大放大鸣的方法的整风，请即加紧进行。根据北京的经验，在机关及高等学校内部出大字报，一可以揭露官僚主义等错误缺点，二可以暴露一部分党员及中间派群众(他们应当在大字报批评错误思想和反动思想)，故利多害少，毫不足怕。大字报是延安整风时期的传统，并非现在才有。如果阻止出大字报，就会陷于被动。但机关学校出大字报的消息，报纸不应登载，以免影响中等学校及工厂(个别党外报纸刊登此项消息，可以听之)。将来中等学校及工厂整风时是否允许出大字报，那时再考虑。至于各民主党派及社会人士大鸣大放，使建设性的批评与牛鬼蛇神(即破坏性批评)都放出来，以便分别处理，大有好处。必须注意争取中间派，团结左派，以便进一步成熟，即动员他们反击右派和反动分子。这是场大规模的思想战争和政治战争，我们必须打胜仗，也完全有条件打胜仗。党内团内的一部分右倾分子叛变出去，是极好的事，切记不要可惜。对于工厂和中等学校，目前不要整风，但要主动下楼，改善作风，广交朋友，深入群众。不可乱许愿 ，乱答应，又要避免出乱子，以便上层中层整好，腾出手来，再整好下层。","type":"paragraph"},{"text":"北京的情况证明，各民主党派、高等学校和许多机关中暴露出一大批反动思想和错误思想，反动分子乘机活跃，但是他们只占各单位人数的百分之几，最反动分子不过百分之一，百分之九十几是中间派和左派。请你们注意你们单位人数。暑假将届，京沪及各地大学生将回家，其中有些人将到处活动，你们应争取主动，并准备适当应付。最后请你们注意一点，在各高等学校和各机关，凡不合理的事而又现在能解决的，应当尽快解决一批，以利争取中间派，孤立右派。","type":"paragraph"},{"text":" 中央","type":"paragraph"},{"text":" 一九五七年六月六日","type":"paragraph"},{"text":" 来源：根据毛泽东手稿刊印","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3de424fbb9"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
