script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"法启动取缔一极右组织程序","authors":["徐振强"],"dates":[{"year":2002,"month":7,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"法启动取缔一极右组织程序"},{"type":"paragraph","text":"新华社巴黎7月28日电（记者徐振强）据法国《星期日报》28日报道，法国有关当局已经启动取缔极右组织“激进联盟”的程序。"},{"type":"paragraph","text":"报道说，法国内政部证实取缔该组织的程序已经启动，但是作出决定还需要一定的时间，因为取缔一个组织需经政府内阁会议通过。"},{"type":"paragraph","text":"7月14日，一个名叫马克西姆·布吕内里的极右分子混在观看国庆阅兵的人群中，用卡宾枪向检阅部队的法国总统希拉克射击，当场被他身边的群众制服。在随后的审讯中，他对自己的罪行供认不讳。根据警方掌握的情况，布吕内里是法国极右组织“激进联盟”的成员，而且还担任了一定的职务。警方在他的住处发现了宣扬新纳粹主义的传单和文学作品。"},{"type":"paragraph","text":"“激进联盟”成立于1998年，成员多为极右分子中的激进分子，它既不是注册政党，也不是注册协会，成员通过因特网、杂志和通报互相联系，目前有成员约2000人。“7·14”事件发生后，法国众多社会团体和群众组织纷纷要求政府取缔“激进联盟”和该组织的网站。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"27eb1bcc39"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
