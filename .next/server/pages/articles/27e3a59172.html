" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"北京市在审查处理不法资本家工作中有些单位因赶时间发生粗糙现象","authors":[],"dates":[{"year":1952,"month":3,"day":1}],"is_range_date":false,"parts":[{"text":"北京市在审查处理不法资本家工作中有些单位因赶时间发生粗糙现象","type":"title"},{"text":"【本刊讯】北京市审查处理不法资本家的工作正在进行，六区已近结束。据了解：六区因为赶时间，进行这个工作时有些粗糙，没有普遍把工人、店员发动起来进行认真的审查。这一工作是结束这次审查和从此树立店员威信的重要步骤。据文具业、食品业两指挥部的同志谈：从发下表格到收回表格仅三天时间，表格经资本家填好到店员手里最多半天时间。因此，大部分都没有按照彭真同志的要求，做到认真审查。","type":"paragraph"}],"comments":[],"origin":"新华社《内部参考》1952年3月1日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"27e3a59172"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
