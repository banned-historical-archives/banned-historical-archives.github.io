script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"热烈欢迎贝宁贵宾","authors":[],"dates":[{"year":1976,"month":7,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"贝宁人民共和国总统马蒂厄·克雷库以及由他率领的贝宁国家代表团，应我国政府的邀请，前来我国进行正式访问，今日到达北京。中国人民怀着喜悦的心情，热烈欢迎来自非洲大陆西部的贝宁贵宾。"},{"type":"paragraph","text":"贝宁人民具有反帝反殖斗争的光荣传统。他们为了推翻殖民统治、争取民族解放，曾经进行了英勇的斗争，终于在一九六○年获得独立。近年来，贝宁政府在克雷库总统的领导下，强调自力更生，努力发展民族经济，保护民族资源，取得了可喜的成果。贝宁人民坚持反对帝国主义、殖民主义、白人种族主义，支持非洲民族解放运动，声援巴勒斯坦人民和阿拉伯各国人民以及朝鲜人民的正义斗争，为亚非人民的团结反帝斗争事业作出了积极的贡献。我们对贝宁人民所取得的成就感到由衷的高兴。"},{"type":"paragraph","text":"当前，非洲国家和人民反对帝国主义、新老殖民主义、大国霸权主义、白人种族主义和犹太复国主义的斗争正在蓬勃发展。已独立的非洲国家在巩固政治独立、争取经济独立的道路上阔步前进。在非洲国家和人民的有力支援下，津巴布韦、纳米比亚和阿扎尼亚人民反对白人种族主义的武装斗争和群众运动的烈火愈烧愈旺。非洲国家在斗争中不断觉醒和壮大。但是，敌人决不甘心失败。两个超级大国正在非洲进行激烈的争夺。特别是自称为非洲人民“天然盟友”的那个超级大国，更在以各种手段和方式加紧向非洲渗透和扩张，用心十分险恶。我们相信，非洲人民只要加强团结，提高警惕，坚持斗争，就一定能够粉碎敌人的一切阴谋和破坏。"},{"type":"paragraph","text":"中国和贝宁都是发展中国家，同属第三世界。中贝两国人民在长期反帝反殖的斗争中，互相支持和同情，结成了深厚的友谊。近年来，中贝两国的友好合作关系有了新的发展。克雷库总统这次来我国进行友好访问，定会进一步增进两国的友好关系和两国人民的友谊。我们祝愿贝宁贵宾的访问圆满成功。"},{"type":"paragraph","text":"(载七月十五日《人民日报》　新华社北京七月十四日电)"}],"comments":[],"origin":"《人民日报》,新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7a94a5b6c4"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
