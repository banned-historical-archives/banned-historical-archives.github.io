script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"典当查验资本 部分不合规定并有高利剥削情事　人民银行已予处分　利泰承记私营黄金罚令停业","authors":[],"dates":[{"year":1950,"month":11,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　自从上海典当业管理办法公布以后，全市二○七家典当，先后办理增资登记手续，中国人民银行华东区行即根据登记表报查验资本。由于严格检查的结果，发现部份典当仍然沿袭旧作风，伪造“架本”，企图蒙蔽。并有超收当息、高利剥削，严重地危害了一般贫民的利益情事。人民银行已根据各该典当违法的情节轻重，决定处分；并于事前征求该业公会之意见，计有:(一)予以警告处分者，计有大兴等廿三家；(二)予以警告处分，并限期补足资本者，计有锦顺等六家；(三)处罚金五十万元者，计有鸣盛等二家；(四)予以停业三天处分，并限期补足资本者，计有恒盛等四家；(五)停业五天处分，并限期补足资本者有容大一家，(六)停业七天处分，限期补足资本者，有裕盛一家。"},{"type":"paragraph","text":"又北京西路三号利泰承记当店主汪振孚，平时以典当业为掩护，暗营黄金买卖，投机倒把，扰乱金融，已予以永久停业处分，并派员监督清理中。其刑事部份，已由法院究办。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b47a307659"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
