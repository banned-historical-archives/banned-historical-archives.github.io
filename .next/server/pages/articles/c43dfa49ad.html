script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"马克思铜像头部失而复得　人们认为破坏系极右分子所为","authors":["王德峰"],"dates":[{"year":1998,"month":5,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"马克思铜像头部失而复得"},{"type":"paragraph","text":"人们认为破坏系极右分子所为"},{"type":"paragraph","text":"新华社柏林5月9日电（记者王德峰）德国警方日前说，德东部地区韦尼格罗德市的卡尔·马克思半身铜像的头部在丢失3天之后重新被安放在原来的位置上。目前，警方尚未找到肇事者，但人们普遍认为此举是极右分子所为。"},{"type":"paragraph","text":"今年5月5日是马克思诞辰180周年纪念日，韦尼格罗德市刚刚修葺一新的马克思铜像的头部却于4日晚丢失。警方立案侦查3天后，有人在就近的一条小河中发现该铜像头部并报警。当局于7日晚将铜像复原，并采取了加固措施。"},{"type":"paragraph","text":"韦尼格罗德市的这尊马克思半身铜像建于1953年，1989年曾遭极右分子推倒。在马克思诞辰180周年前夕，德各界人士本打算于5日举行隆重的铜像安放仪式来纪念这位科学社会主义理论的奠基人，没想到因为铜像被毁而不能如愿。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c43dfa49ad"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
