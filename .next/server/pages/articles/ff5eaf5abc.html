script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"阶级斗争不容抹杀","authors":["蔺庆春"],"dates":[{"year":1976,"month":8,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"阶级斗争不容抹杀"},{"type":"paragraph","text":"二等功臣、某部副指导员  蔺庆春"},{"type":"paragraph","text":"马克思主义认为，军队是阶级斗争的产物，是作为阶级斗争的工具而存在的。无论是革命军队还是反革命军队，都是为一定的阶级利益服务的。无产阶级的军队，完全是为着无产阶级和广大人民群众的利益而战斗的。因此，必须用马克思主义关于无产阶级革命和无产阶级专政的理论武装广大指战员的头脑。正如伟大领袖毛主席教导的那样，只有经常用进步的政治精神贯注于军队之中，用进步的政治工作去执行这种贯注，就能激发官兵最大限度的作战热忱，就能充分发挥一切技术和战术的最大效力。"},{"type":"paragraph","text":"在毛主席领导下我军的历次整风运动，都是以阶级斗争、路线斗争为纲的。我军一贯重视阶级教育，经常开展诉苦和三查、忆苦思甜等活动，坚持举纲带目。社会主义时期阶级斗争的性质决定我军担负着对外反侵略和对内防复辟的重任，部队各项工作更必须坚持以阶级斗争为纲。邓小平否定以阶级斗争为纲，抛出“整顿”为纲，就是妄图掩盖社会主义社会的基本矛盾，意在改变我军“是一个执行革命的政治任务的武装集团”的无产阶级专政工具的性质。"},{"type":"paragraph","text":"历史经验证明，国内外的阶级敌人总是遥相呼应、串通一气的。我们要保卫我国的无产阶级专政，就要把对外反侵略和对内防复辟的两项职能都担负起来。今后，我们一定要紧紧抓住阶级斗争这个纲，坚持党的基本路线，真正做到阶级斗争警钟常鸣，准备打仗常备不懈，为保卫无产阶级专政做出新贡献。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ff5eaf5abc"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
