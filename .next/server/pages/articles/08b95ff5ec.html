script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"美国国会残酷剥削工人 通过新的“国防生产法”","authors":[],"dates":[{"year":1951,"month":8,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京二日电】　塔斯社华盛顿三十一日讯:美国国会通过了一个新的“国防生产”法，它甚至比七月三十一日到期的现行法律还要更有利于垄断资本家与战争投机商。"},{"type":"paragraph","text":"新法律一方面仍然保留现行法律中的冻结工资条款，另一方面却大大地放松了物价“管制”条款。此外，新法律还允许在实行房租“管制”地区的房租可以增加百分之二十。按:原有“国防生产”法是在朝鲜战争爆发后通过，它授予总统以如动员人力、物资和实施各种经济管制等各项战时经济独裁权力。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"朝鲜战争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"08b95ff5ec"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
