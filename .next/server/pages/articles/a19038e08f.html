script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"《汉语大词典》加紧编纂已编写完成三分之一，预定八五年定稿出版","authors":["郭志坤"],"dates":[{"year":1981,"month":12,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报北京十二月二十八日专电　一部贯通古今的大型语文词典——《汉语大词典》、已完成全部编写任务的三分之一，现正按预定计划加紧进行，力争在一九八三年写成初稿，一九八五年定稿出版。"},{"type":"paragraph","text":"汉语是世界上最重要、使用人口最多的语言之一，历史悠久，典籍浩繁，古今变化层出不穷，加以方言分歧，口语、书面语、专科用语和作者习用语在群书上互见迭出，读者很难一一索解。由于我国历史上只有字书，没有现代意义的词典，现出的一些词典，或只收古词，或只收今词。或合字典、词典、百科词典于一书，而且限于篇幅，远远不能满足实际需要。因此，编辑出版一部大型的、比较完备的、贯通古今的汉语词典十分必要。"},{"type":"paragraph","text":"编纂《汉语大词典》是一九七五年由国家出版局、教育部共同提出，周恩来和邓小平同志亲自批准的。参加编写工作的有上海、山东、江苏、安徽、浙江、福建的二十所高等院校和部分中学教师、社会知名人士共四百多人。"},{"type":"paragraph","text":"为加强《汉语大词典》的编写工作，十二月十五日至十八日在北京举行编写工作联席会议，与会者一致认为《汉语大词典》编写工作正处在出成果阶段一定要加强协作，全力以赴，保证《词典》按计划、高质量地完成出版。　(郭志坤)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a19038e08f"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
