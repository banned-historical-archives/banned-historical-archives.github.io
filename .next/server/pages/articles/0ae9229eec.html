script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji24","name":"毛泽东全集第24卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji24.pdf"],"article":{"title":"询间一三两纵能否向西参战","alias":"","parts":[{"type":"paragraph","text":"询问一三两纵能否向西参战"},{"type":"paragraph","text":"（1948年7月20日）粟、陈、唐、张，并刘、陈、邓："},{"type":"paragraph","text":"胡琏正向豫西进攻，刘陈邓准备歼击其一二个师。此战如胜利，估计可能调动邱黄?一部西进，有利于许谭?攻济南及你们主力之休整与补充弹药。一三两纵向西参加作战甚有必要。该两纵能否西移，盼告。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"驾申"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军委起草的给华东野战军代司令员兼代政治委员粟裕、参谋长陈士、政治部主任唐亮和副参谋长张震等的电报。"},{"type":"paragraph","text":"[2]刘、陈、邓，指刘伯承、陈毅、邓小平，当时分别任中原野战军司令员、第一副司令员和政治委员。"},{"type":"paragraph","text":"[3]胡连，当时任国民党军整编第十八军军长。"},{"type":"paragraph","text":"[4]邱，指邱清泉，当时任国民党军整编第五军军长。黄，指黄百韬，当时任国民党军第七兵团司令官。"},{"type":"paragraph","text":"[5]许谭，指许世友、谭震林，当时分别任华东野战军山东兵团司令员和政治委员。"}],"authors":["毛泽东"],"dates":[{"year":1948,"month":7,"day":20}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":372,"page_end":372},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0ae9229eec"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
