script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"《桃花扇》为右倾机会主义分子唱赞歌","authors":["荣国英","龚友德"],"dates":[{"year":1966,"month":8,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"华东师大学生　荣国英　龚友德"},{"type":"paragraph","text":"一九五九到一九六二年，我国经济遭到了暂时的困难，国外帝国主义、现代修正主义和各国反动派掀起了一股反华逆流；国内地富反坏右牛鬼蛇神纷纷出笼，刮起了一股反党反社会主义的黑风。配合着国内外阶级敌人对党的进攻，经过了一番精心的改编和制作，一九六三年电影《桃花扇》粉墨登场了。这部影片披着历史戏的外衣，恶毒地攻击我们的党，同时为右倾机会主义分子大唱赞歌。"},{"type":"paragraph","text":"影片描写明末一群东林党人如何讲学书院；讥评朝政，痛骂“奸臣”，高谈“气节”；特别是写了当时的一个歌妓李香君如何“清高”，如何“不畏权奸”、“坚贞不屈”与恶势力“斗争到底”等等。"},{"type":"paragraph","text":"影片的编导者为什么要如此赞扬东林党人和李香君的“骨气”、“气节”呢?难道他们是“为古而古”、吹捧死人吗?不!绝对不是。毛主席教导我们:“在现在世界上，一切文化或文学艺术都是属于一定的阶级，属于一定的政治路线的。为艺术的艺术，超阶级的艺术，和政治并行或互相独立的艺术，实际上是不存在的。”(《在延安文艺座谈会上的讲话》)历史戏《海瑞罢官》《桃花扇》等都是为今天的东林党——“三家村”黑帮及其后台老板所顽固地坚持的反动政治路线服务的。对于这一点，“三家村”黑店的掌柜、伙计都已不打自招。他们再三强调历史剧要“古为今用”，要“为活人服务”，要“使观众从中吸取某些经验、教训”，达到“鼓舞士气、加强斗志”的作用。这就清楚地告诉我们，影片《桃花扇》的编导者竭力宣扬三百多年前的东林党人和李香君的所谓“骨气”、“气节”是有其反动的政治目的的，他们“鼓舞”的是右倾机会主义分子及其他一切牛鬼蛇神的“士气”，“加强”的是他们反党反社会主义的“斗志”。"},{"type":"paragraph","text":"我们知道，在一九五九年的庐山会议上，党内的右倾机会主义分子向党发动了猖狂的进攻，我们党根据全国人民的意志罢了他们的官。这对一切反党反社会主义的牛鬼蛇神是一个沉重的打击，他们一直怀恨在心，伺机报复。前几年，正当我国经济遭到暂时的困难，国内外阶级斗争十分尖锐复杂的时候，他们认为反攻的时机已到，要对我们党“群起而攻之”。“三家村”黑店掌柜邓拓首先抬出东林党人这具僵尸，大力赞扬他们“力抗权奸志不移”的“傲骨”、“骨气”，鼓励右倾机会主义分子同党对抗。影片《桃花扇》的编导者也闻风而起，借东林党人和李香君之口大骂我们党是“奸党”，是“奸臣当道”“不知陷害了多少忠良”；破口大骂不足以解恨，还说要撕下“一块皮来”，其狠毒之心，无以复加。他们还竭力为右倾机会主义分子打气，鼓励他们“生当作人杰，死亦为鬼雄”，“要在天地间留下一股正气”，要他们“宁死不屈”、“顽抗到底”。他们以为这样一来就可以把我们党骂倒、斗垮，使右倾机会主义分子东山再起、卷土重来。"},{"type":"paragraph","text":"但是，小小的蚍蜉怎能撼动参天的大树，一小撮跳梁小丑怎能动摇亿万人民的铁打江山!不管他们的《桃花扇》煽起怎样的妖风、黑风，都挽救不了他们灭亡的命运。我们要奋起毛泽东思想的革命千钧棒，把这批牛鬼蛇神连同他们的“妖扇”、“黑扇”一起砸得粉碎!"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d572b40bcc"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
