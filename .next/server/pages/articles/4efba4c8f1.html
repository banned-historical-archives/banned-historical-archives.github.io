<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中央机关全面展开反右派斗争","authors":["新华社"],"dates":[{"year":1957,"month":7,"day":25}],"is_range_date":false,"parts":[{"text":"中央机关全面展开反右派斗争","type":"title"},{"text":"新华社","type":"authors"},{"text":"新华社２４日讯:中央国家机关目前正在各行各业全面地展开了反对资产阶级右派分子的斗争。根据六十一个机关单位的统计，参加这个斗争的有十七万五千多人。","type":"paragraph"},{"text":"各机关轰轰烈烈的反右派斗争，实际上形成了一次深刻的政治上思想上的社会主义革命运动。通过这个斗争，暴露了有些人在思想上并没有进入社会主义，有极少数右派分子，他们利用了共产党整风的机会，从国家的制度、从党的政策、从机关的工作等各个方面来向党和国家发动了进攻。右派分子数量虽少，但是分布在各行各业中，党外有，党内也有。","type":"paragraph"},{"text":"为了打垮右派的进攻，广大的机关干部展开了坚决的斗争，有的机关连续召开了数十次会议，对右派分子的反动言行进行了无情的揭露，彻底的批判，使广大机关干部受到了深刻的教育。城市建设部办公厅一个右派分子、青年团员钱辉焴在大鸣大放中，曾提出反党反社会主义的“九点意见”。她诬蔑肃反运动，攻击人事工作和党的领导干部。她认为共产党领导的新中国是“党天下”，说现在是“一朝天子一朝臣”，认为“共产党员吃苦在先，享乐在后”的说法，只是“说得好听”，是“没有兑现的教条”。城市建设部为了弄清是非，曾开了三次大型辩论会，以大量的事实驳斥了钱辉焴的谬论。钱辉焴理屈词穷，最后她说她“处在不能解决的矛盾中”。经过坚决的斗争，这个右派分子的幕后指挥人——即帮助她制造向党进攻的“九点意见”的王颂华，也被群众揭发出来。经过三次辩论以后，有一些原来赞同钱辉焴意见的人，放弃了自己的错误意见，有些认识模糊的人，主动作了检讨，站到了社会主义的立场，同右派分子展开了斗争。","type":"paragraph"},{"text":"有些党内的右派分子，同党外的右派分子互相策应，他们从内部来攻击党，造成了极为有害的恶果。化学工业部勘察公司揭露了党内右派分子阎义采的反动言行。阎义采在最近写了“两党制适合中国国情”、“共产党政权是不巩固的，我们的人站出来请你们看”的两篇反动文章。他在文章中表示愿意和右派分子章伯钧“联合组织统一战线”、“为实现共同的理想而努力奋斗”。阎义采是中共预备党员，他提出了退党的请求，因为他说他成立“新的统一战线”目的是为了“打倒共产党”。地质部揭露的党内右派分子耿群，是地质部政策研究室副主任。他在党内配合党外右派分子攻击肃反运动，说肃反运动是“高压的政策”，认为发动群众参加肃反运动是错误的，他甚至在群众大会上暴露了党内的重要机密，公开地叛变了党。地质部干部对于这个右派分子的反党言行进行了毫不留情的揭发和坚决的斗争。","type":"paragraph"},{"text":"随着斗争的全面展开，各行各业陆续揭发出一些新的右派分子。如对外贸易部的法律室顾问董士廉，这个部的欧美研究室副研究员李太华，城市建设部的技术员王公朴，新华通讯社的记者戴煌，通俗读物出版社副总编辑蓝钰，中国新闻社编辑郑白涛等。在反右派斗争中，还揭发出一些右派小集团。时事手册编辑部的于干、刘沉弓、梁明、邓蜀生就是一个反党反社会主义的小集团。","type":"paragraph"},{"text":"各单位在反右派的斗争中，坚持了说理的方针。许多单位在批判右派言论以前，都先把右派分子的言论公布出来，让大家自由讨论，然后再开座谈会或大型辩论会进行驳斥。有的单位并且着重用本单位的具体事实同右派分子进行说理斗争，这样就使许多被右派言论迷惑的人很快地辨清了是非，从而积极地参加反右派斗争。","type":"paragraph"},{"text":"中央国家机关反右派斗争正在逐步深入，党的组织认真地领导了这个斗争，通过斗争来教育党员和干部。中国共产党中央国家机关委员会在２２日召开了全体委员扩大会议，会议要求中央国家机关各单位的党组织在反右派斗争深入展开时，要具体、深入地引导这个斗争健康地发展，并且推动行政领导方面切实检查前一时期的领导工作，改进领导作风，以保证反右派斗争的顺利开展。为了保证斗争的胜利，为了通过这次斗争来教育党员和群众，会上曾经批评了个别单位在反右派斗争中表现出的单简化的作法和温情主义的倾向。","type":"paragraph"},{"text":" ——原载《人民日报》1957年7月25日","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4efba4c8f1"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
