script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"阿尔巴尼亚人民积极学习毛主席语录  毛泽东思想深深印在革命人民的心里","authors":[],"dates":[{"year":1967,"month":5,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"阿尔巴尼亚人民积极学习毛主席语录"},{"type":"paragraph","text":"毛泽东思想深深印在革命人民的心里"},{"type":"paragraph","text":"新华社地拉那电　阿尔巴尼亚广大劳动人民和知识分子怀着对中国人民的伟大领袖毛主席无限热爱和敬仰的心情，积极学习毛主席语录。"},{"type":"paragraph","text":"阿尔巴尼亚人民平时不仅从他们得到的法文版《毛主席语录》中认真学习毛主席的教导，而且每当中国的《北京周报》和《人民画报》运到阿尔巴尼亚的书店时，人们争相购阅，积极学习这些报刊上结合实际选登的毛主席语录。也有的人把中国驻阿尔巴尼亚大使馆编印的新闻公报上的毛主席语录抄录下来，贴在墙上，作为座右铭学习。有些部门还根据本部门工作的需要，把毛主席语录，同马克思、列宁主义其他经典作家的语录，分类编成小册子，供干部和群众学习。"},{"type":"paragraph","text":"许多职工在学习毛主席语录后，热情赞扬毛泽东思想。"},{"type":"paragraph","text":"阿尔巴尼亚著名作家阿列克斯·恰奇在他得到法文版的《毛主席语录》时兴奋地说：“这是中国同志送给我的最最珍贵的礼物。毛主席在他的著作中用简洁明了的语言说出了全世界人民渴望知道的真理。”瓦尔—德耶水电站建筑工地一个职工说，我最爱读毛主席语录，因为毛主席的话是当代的马克思列宁主义，是全世界人民的指路明灯。地拉那拖拉机修配厂一位技术员说，毛泽东思想是反对帝国主义、修正主义的强大武器。它是我们进行一切工作的指针。这个工厂的另一名技术工人说，毛主席语录对我们来说，象每天所需要的粮食一样，鼓舞着我们，给我们增添着力量。"},{"type":"paragraph","text":"地拉那一位女卫生员说，我最爱读毛主席语录，因为从中能够学习到真理，得到鼓舞，使自己在工作和生活中成为一个高尚的、对人民和社会主义社会有用的人。"},{"type":"paragraph","text":"都拉斯“十一月二十九日”学校的女学生每次收到中国使馆编印的新闻公报后，都把公报上刊登的毛主席语录抄下来学习。一位同学说，毛泽东思想已经深深地印在全世界人民的心坎里，成为鼓舞他们革命的火炬。"},{"type":"paragraph","text":"发罗拉十二年制中学的法文教员弗拉歇里在谈到他学习毛主席语录的感想时说，我最近重读了毛主席的这段话：“白求恩同志毫不利己专门利人的精神，表现在他对工作的极端的负责任，对同志对人民的极端的热忱。每个共产党员都要学习他。……我们大家要学习他毫无自私自利之心的精神。从这点出发，就可以变为大有利于人民的人。”他说，对照我自己的思想和工作，我觉得很惭愧，我决心很好地学习《纪念白求恩》这篇文章。"},{"type":"paragraph","text":"弗拉歇里还说，有一个时期，我在工作中遇到了困难和挫折。但当我学习了毛主席的语录以后，心里豁然开朗了。毛主席说：“斗争，失败，再斗争，再失败，再斗争，直至胜利——这就是人民的逻辑，他们也是决不会违背这个逻辑的。”这增强了我克服困难的勇气和力量，工作也就顺利了。"},{"type":"paragraph","text":"弗拉歇里在学习毛主席语录有了初步的体会之后，决心把他学过的语录教给自己的学生。现在，他已经开始在每堂法文课上，教同学学一条毛主席语录。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"02a95a660f"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
