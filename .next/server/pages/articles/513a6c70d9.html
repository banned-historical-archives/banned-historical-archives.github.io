script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"格里巴同志在比《人民之声》发表社论揭露三国条约大骗局  现代修正主义力图保有“原子指挥棒”  不惜同美帝国主义合谋进行核讹诈","authors":[],"dates":[{"year":1964,"month":3,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"格里巴同志在比《人民之声》发表社论揭露三国条约大骗局"},{"type":"paragraph","text":"现代修正主义力图保有“原子指挥棒”  不惜同美帝国主义合谋进行核讹诈"},{"type":"paragraph","text":"新华社十八日讯　布鲁塞尔消息：坚持马克思列宁主义的比利时共产党的机关报《人民之声》最近发表由政治局书记雅克·格里巴写的一篇社论，谴责现代修正主义者和帝国主义者同谋进行核威胁和核讹诈。"},{"type":"paragraph","text":"这篇题为《制止核威胁和核讹诈》的社论说，“必须揭露莫斯科（三国部分禁止核试验）条约之类的骗局，这个条约的唯一目的是加强美帝国主义，同时在精神上和物质上使各国人民解除武装。"},{"type":"paragraph","text":"“与这一政策同谋的修正主义者，比美帝国主义更不希望禁止和销毁核武器。保有‘原子指挥棒’、进行氢弹讹诈，是他们在国际范围内的阶级合作政治观念的根本因素之一。”"},{"type":"paragraph","text":"社论说，美帝国主义是目前世界上的主要侵略力量，它的统治世界的方针进一步加剧了战争危险。孤立美帝国主义是当前的首要任务之一。"},{"type":"paragraph","text":"社论指出，帝国主义本性就是侵略的：只要它存在，就没有没有战争和没有武器的世界。只有社会主义在全世界取得胜利，才能最后消除产生战争的一切根源。"},{"type":"paragraph","text":"社论说，“那些以和平为借口要各国人民跪着生活的人，是同帝国主义同谋的，是鼓励帝国主义的侵略政策，事实上是要加剧战争危险。慕尼黑政策是导致战争的！”"},{"type":"paragraph","text":"社论还谴责比利时政府完全听命于华盛顿、屈从北大西洋公约组织推行的政策。社论说，必须孤立那些充当这一政策的发言人的人，以及那些像修正主义者那样与这个政策同谋的人。社论号召在比利时建立一个广泛联盟，以便贯彻执行一项真正的不同社会制度国家和平共处的政策，贯彻执行一项包括如下各点的纲领：承认中华人民共和国；承认德意志民主共和国；在同社会主义国家、特别是同中华人民共和国和古巴的关系中，取消美帝国主义强加于人的一切限制和禁运措施；大量削减军事预算——削减十亿法郎；不再有比利时军队驻在外国；取消在比利时的外国基地和原子基地；比利时不再参加北大西洋公约组织；支持建立无核区、特别是欧洲无核区计划，禁止和完全销毁核武器。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"513a6c70d9"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
