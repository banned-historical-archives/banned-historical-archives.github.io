script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"掠夺圭亚那资源剥削圭亚那人民","authors":[],"dates":[{"year":1968,"month":6,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"掠夺圭亚那资源剥削圭亚那人民"},{"type":"paragraph","text":"美国垄断资本在“援助”的名义下，进一步渗入圭亚那的重要工矿部门。一九六五年，美国四大铝业公司之一的雷诺斯金属公司取得了在圭亚那采矿二十五年的特权，并且可以在一块面积达一百二十多万英亩的土地上进行勘探。接着，美国垄断资本又进一步插手石油业，使美国的德士古、大陆等石油公司相继取得了开采和勘探石油的特权。去年六月，美国公司又通过同伯纳姆政府签订的一项协定，控制了圭亚那的大米业。"},{"type":"paragraph","text":"圭亚那人民在美帝国主义的侵略和掠夺下，每年被帝国主义企业搜刮去五千万圭元利润，而在全国六十多万人口中，却有三万六千人失业，一万八千名青年找不到职业。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c9eadea87a"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
