script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"活学活用毛主席著作　紧紧掌握斗争大方向上体司和交运联络站以协商解决纠纷 为正确处理群众组织间矛盾树立范例双方战士表示要加强团结，投入革命大批判运动，抓好革命，促好生产。这个正确处理人民内部矛盾的行动，给予阶级敌人和一小撮别有用心的人以有力的打击","authors":[],"dates":[{"year":1967,"month":7,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　上海体育战线革命造反司令部与上海工人革命造反总司令部交通运输局系统联络站，活学活用毛主席著作，以正确处理人民内部矛盾的光辉思想，创造了正确处理两个革命群众组织之间纠纷的范例。"},{"type":"paragraph","text":"这两个革命群众组织之间本来没有什么矛盾。七月九日，交运联络站所属的红卫兵汽车学校部分红卫兵与上体司搏斗兵团一战士因故发生了纠纷。这以后，从七月九日到十七日，上体司所在地的南京路一带，每天都聚集了许多人，事态越来越扩大。社会上的牛鬼蛇神、流氓阿飞以及一些别有用心的人，乘机混入群众之间，造谣煽动，把一些根本与上体司、交运联络站无关的事，也说成是他们干的，挑动群众之间的对立情绪，企图使这两个革命群众组织之间的矛盾扩大，制造大规模武斗，阴谋使“上海第二次大乱”。一些坏人公然包围行人，污辱妇女，还冒充“上体司”战士殴打运输工人，沿途截车，影响了交通和生产，引起了革命群众的义愤。这件事，一时成了上海广大革命人民所关注的重大事件。"},{"type":"paragraph","text":"这两个革命群众组织的负责人和广大战士，在几天纠纷的过程中，认清了阶级敌人利用这一事件，破坏抓革命，促生产，破坏无产阶级文化大革命的阴谋，感到再也不能扩大事态，做亲者痛、仇者快的事情了。在上海市革命委员会和中国人民解放军驻沪三军的主持下，双方负责人坐下来，一边学习毛主席语录和有关文件，一边进行谈判。大家感到党内最大的一小撮“走资派”，人还在，心不死。他们不甘心无产阶级革命派的胜利，还在作垂死挣扎和新的反扑。两个革命群众组织有千条万条理由团结起来，共同对敌，没有一点理由再打“内战”。双方根据毛主席“解决人民内部矛盾，不能用咒骂，也不能用拳头，更不能用力枪，只能用讨论的方法，说理的方法，批评和自我批评的方法”的教导，严格进行了自我批评。上体司的革命小将在会上揭露了阶级敌人在两个革命群众组织发生纠纷的几天里进行挑拨、破坏的罪行，使大家进一步认识到打“内战”转移了斗争的大方向，不利于巩固和发展上海的大好形势，不利于无产阶级文化大革命，不利于抓革命，促生产。双方一致表示要遵循毛主席的教导，正确处理人民内部矛盾，紧紧掌握斗争大方向，团结起来，共同对敌。"},{"type":"paragraph","text":"在谈判过程中，上体司代表高呼“向运输工人学习1”交运联络站代表高呼“向上体司革命小将学习!”双方情绪激动，一起高呼“毛主席万岁!”“毛泽东思想胜利万岁1”会场上出现一片团结友好的气氛。谈判结束，双方负责人分别向所属战士传达了会谈情况，要求大家紧紧掌握斗争大方向，团结一致，为夺取无产阶级文化大革命的彻底胜利作出贡献。双方战士纷纷表示，一定要把握斗争的大方向，加强团结，投入革命的大批判运动，抓好革命，促好生产。由于双方高举了毛泽东思想的伟大红旗，使坏事变成了好事，避免了一场一触即发的武斗事件。双方加强了团结，也给了阶级敌人和一小撮别有用心的人以有力的打击。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"武斗","type":"主题/事件"},{"name":"人民内部矛盾","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e6a1fa9045"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
