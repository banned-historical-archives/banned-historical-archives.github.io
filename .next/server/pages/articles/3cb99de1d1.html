script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"我从奴隶地位翻身变成了国家的主人","authors":["翁馥谊"],"dates":[{"year":1952,"month":10,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编辑同志:我是一个二十岁的青年工人，从学徒到现在已整整做过五年多的工了。在旧社会学徒的时候，吃的苦头真是讲不完的，解放三年来得到的幸福也是说不尽的。我在旧社会名义上是个徒弟，实际上是奴隶，整天抱小孩，挑水扫地，稍不留意就挨打受气，老板吃的是鲜味鱼肉，我吃的粥饭也得不到一饱；师傅活像阎罗王，师娘好比母夜叉，这种令人愤恨、不如牛马的生活，使我永远忘记不了的。解放后我已经转到光明的世界里来了，在毛主席的光辉照耀下，使我翻身成了国家的主人。我考进了宜兴陶业产销联营处工作，生活逐步得到改善，又参加了青年团；这真是解放前做梦也想不到的事。政府为了更好的培养工农干部，开办了职工业余中学，我已经考取了；我感到现在做人真是越做越开心了。如果不是毛主席的英明领导，我们能有今天这个好光景吗?我要在生产上多动脑筋，多找窍门，多学习技术，在学校里更努力学习政治、文化，并且我要用一边教、一边学的方法把学来的知识教给文化比较浅的普通班工人同志，为发展生产、建设祖国而奋斗。"},{"type":"paragraph","text":"宜兴鼎山陶业联营处工人　翁馥谊"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3cb99de1d1"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
