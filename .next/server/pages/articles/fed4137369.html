" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"四川省交通厅分配新进人员的通知","authors":[],"dates":[{"year":1958,"month":9,"day":13}],"is_range_date":false,"parts":[{"text":"四川省交通厅分配新进人员的通知","type":"title"},{"text":"公路局、公路设计院、重庆运输公司、重庆、成都、橡胶厂、重庆、成都、泸州、雅安、交通机械厂：","type":"appellation"},{"text":"目前有一批未考取高等学校的高中毕业生，由国家统一分配工作。现已由省分配给我厅部份，根据我厅具体情况，经研究决定，分配厅属各单位。","type":"paragraph"},{"text":"该批学生，人很年轻，成绩一般还好；但多系家庭成份不好，社会关系复杂，或整风运动中有比较严重的右派言论。为此，决定该批人员一律作试用干部。并只宜作一般行政业务或会计工作，不能安置作机要工作，并希今后多加强政治教育。","type":"paragraph"},{"text":"试用期间的工资待遇，暂按学生待遇，第一年每人每月13元，第二年15元，第三年17元的规定办理。待上级另文规定后，再行通知。","type":"paragraph"},{"text":"该批学生前来的旅费，凭单据报销车船费，其它费用自理，除已分别通知本人于10月15日前来你处报到处，兹随文附档案袋，希遵照。","type":"paragraph"},{"text":" 四川省交通厅1958年9月13日","type":"paragraph"},{"text":"注：拟稿：李光国；核稿：秦傅林；签发：王长年、赵理。","type":"paragraph"},{"text":"附分配名单。","type":"paragraph"},{"text":"重庆运输公司：12人","type":"paragraph"}],"comments":[],"origin":"根据文件翻印件打印。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fed4137369"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
