script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"刚果（利）西部爱国武装力量号召继承卢蒙巴革命精神  加强人民战争把民族解放斗争进行到底  粉碎帝国主义和现代修正主义者的包围","authors":[],"dates":[{"year":1966,"month":1,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"刚果（利）西部爱国武装力量号召继承卢蒙巴革命精神"},{"type":"paragraph","text":"加强人民战争把民族解放斗争进行到底"},{"type":"paragraph","text":"粉碎帝国主义和现代修正主义者的包围"},{"type":"paragraph","text":"新华社十九日讯　利奥波德维尔消息：刚果（利）西部爱国武装力量在刚果（利）民族英雄卢蒙巴被害五周年的时候发表声明，号召刚果（利）爱国武装力量和人民继承卢蒙巴的革命精神，粉碎帝国主义者和现代修正主义者的阴谋，通过人民战争把斗争进行到底。"},{"type":"paragraph","text":"声明说，在卢蒙巴被害五周年之际，“为了向我们的领袖致敬，我们认为有必要谴责刚果人民的敌人在我们队伍内散布的失败主义情绪。刚果人民的敌人也就是我国经历着的危机的共谋者”。"},{"type":"paragraph","text":"声明谴责某些受到帝国主义者和赫鲁晓夫修正主义者支持的刚果人为了掩饰他们可耻的叛变，硬说什么卢蒙巴不主张武装斗争，也不主张革命暴力。"},{"type":"paragraph","text":"声明说，实际情况是，在叛徒卡萨武布在一九六○年九月非法“解除”卢蒙巴的总理职务后，当时已经被软禁的卢蒙巴就委托他的助手前往斯坦利维尔，以便准备武装抵抗在利奥波德维尔强行建立的傀儡政权。本来约定由卢蒙巴去斯坦利维尔领导人民的武装抵抗。声明说，“但是，我国人民当时不幸还不了解的赫鲁晓夫修正主义者，他们比任何人都了解卢蒙巴悲惨的死和我们在斯坦利维尔进行抵抗的失败的真正原因。"},{"type":"paragraph","text":"“世界各国人民，特别是我国人民都知道，在现代修正主义者看来，正义战争和非正义的掠夺战争之间没有任何区别。"},{"type":"paragraph","text":"“世界各国人民，特别是我国人民还知道，赫鲁晓夫修正主义者为反对解放战争而进行败坏士气的宣传，以便在精神上解除斗争中的各国人民的武装。他们不用设法掩饰他们在伟大的革命者卢蒙巴背后进行的叛变。”"},{"type":"paragraph","text":"声明说，“我国人民，在过去五年以各种形式进行斗争而积累了自己的经验，（他们）永远再不会欢迎联合国插手刚果，永远再不会接受现代修正主义者所主张的任何一种全国和解。刚果的革命人民永远不会拥抱杀害卢蒙巴的凶手。"},{"type":"paragraph","text":"“因此，掌握了这些反面经验并忠实于卢蒙巴政策的谬勒尔兄弟英勇地发动了武装斗争，现在这个斗争已经成为国内的现实。"},{"type":"paragraph","text":"“因此，我国人民在全国解放委员会的旗帜下，英勇地同美帝国主义的走狗——利奥波德维尔傀儡进行战斗。”"},{"type":"paragraph","text":"声明说，“我们有许多国内外敌人。他们披着各种外衣来到我们这里。但是，我们的伟大领袖卢蒙巴说得好：‘如果我们保持团结和忠诚，那么帝国主义企图在我们队伍中制造不和、煽动民族主义者相互对立的种种阴谋必将遭到失败’。"},{"type":"paragraph","text":"“如果我们为了在革命行动中的统一而加强我们的队伍，那么我们就一定能够粉碎帝国主义者和现代修正主义者的双重包围，这样，我们就是对被我们的敌人野蛮杀害的卢蒙巴的崇敬的追念。"},{"type":"paragraph","text":"“同反动派决不能妥协！帝国主义者已经在我们的斗争面前发抖，并且完全认识到，卢蒙巴虽死，但是他比生前更强大。帕特里斯死了，但是，他不屈的精神将引导着我们为恢复我们的主权而斗争。”"},{"type":"paragraph","text":"声明“向刚果人民的武装斗争的所有战士们发出紧迫和满怀热情的呼吁，以便通过总动员来使我们民族英雄所宣布的革命主张复活并产生巨大反响，这种总动员是：加强统一行动，加强我们通过人民战争把斗争进行到底的决心”。"},{"type":"paragraph","text":"“我们决不是孤立的。非洲和亚洲将永远站在千百万刚果人一边，刚果人只有在我国不再有殖民者和他们的雇佣军的那一天才会停止斗争。”（附图片）"},{"type":"paragraph","text":"刚果（利）爱国武装的战士们坚决和敌人进行斗争。这是他们拿着从敌人那里缴获来的武器。　新华社发"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"人民战争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0716d9d148"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
