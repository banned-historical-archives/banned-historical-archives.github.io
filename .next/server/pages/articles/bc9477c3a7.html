script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"比利时《光明和被剥削者》和泰国报纸指出  苏修挑起安哥拉内战罪责难逃  扎伊尔报纸警告苏联如再侵犯扎领土必遭反击","authors":[],"dates":[{"year":1976,"month":1,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"比利时《光明和被剥削者》和泰国报纸指出"},{"type":"paragraph","text":"苏修挑起安哥拉内战罪责难逃"},{"type":"paragraph","text":"扎伊尔报纸警告苏联如再侵犯扎领土必遭反击"},{"type":"paragraph","text":"新华社布鲁塞尔一九七六年一月十九日电比利时马克思列宁主义共产党机关报《光明和被剥削者》最新一期发表的文章指出，安哥拉内战爆发的根源是苏联社会帝国主义的罪恶政策。"},{"type":"paragraph","text":"文章说：“事实是：俄国社会帝国主义分裂了抵抗运动，挑起了造成无数无辜牺牲者的内战，破坏了安哥拉的民族独立，而这种罪恶的侵略行径又引起了其他反动势力如美帝国主义、南非种族主义者和较次要的其他势力的干涉。”文章强调说，这一件坏事的发生，其根源“来自俄国社会帝国主义者的罪恶政策”。"},{"type":"paragraph","text":"文章指出，俄国社会帝国主义者迄今一直在破坏这一倡议的实现：安哥拉各民族解放组织之间实现停火和团结。但是，赞成这种解决办法的人已越来越多了。这一解决办法的实现，将是两个超级大国、南非种族主义者和仍然抱住殖民主义不放的那些人的巨大失败，将是安哥拉人民和全体非洲人民的伟大胜利。"},{"type":"paragraph","text":"新华社一九七六年一月十六日讯　曼谷消息：泰国《星暹日报》一月十三日发表社论指出，苏联社会帝国主义是挑动安哥拉内战和破坏非洲团结的罪魁祸首。"},{"type":"paragraph","text":"社论说：“真正在幕后煽起安哥拉内战的是苏联”。社论强调说，要使安哥拉内战结束，恢复和平，非洲国家就应该联合起来，迫使苏联势力立即撤出安哥拉。"},{"type":"paragraph","text":"这家报纸十五日在另一篇社论中指出，今日非洲一些地方的严重局势，是由于苏联的渗透和颠覆造成的。"},{"type":"paragraph","text":"社论呼吁非洲国家联合起来，共同对付社会帝国主义的扩张威胁。"},{"type":"paragraph","text":"新华社金沙萨一九七六年一月十七日电扎伊尔《劳动报》一月十七日发表社论说，苏联社会帝国主义者直接向完全属于扎伊尔的迪洛洛地区发射火箭，“这是极为严重的事件”。社论指出，这表明它对安哥拉的侵略推进到了扎伊尔的领土上。"},{"type":"paragraph","text":"社论接着说，很明显，凡是“同俄国的意愿相违背的地方，俄国就要使用最可耻的手段”。社论指出：“我们可以告诉他们，帝国主义在扎伊尔领土上找到的将是向他们敞开的坟墓。”"},{"type":"paragraph","text":"社论最后警告说，“如果再次发生类似事件，扎伊尔将奋起自卫，给予有力的反击”。"},{"type":"paragraph","text":"一月十七日，扎伊尔《埃利马报》发表了社论说，苏联“对我国发动的侵略吓不倒我国人民，恰恰相反，我国人民面对不幸将牢固地团结起来”。"},{"type":"paragraph","text":"新华社波恩一九七六年一月十六日电　赞比亚外交部长班达一月十五日结束了对西德为期两天的正式访问。"},{"type":"paragraph","text":"在访问期间，班达同西德外交部长根舍着重就安哥拉当前的局势举行了会谈。班达向根舍介绍了最近举行的关于安哥拉问题的非洲统一组织首脑会议的情况和赞比亚方面为解决安哥拉问题所作的努力。班达要求在安哥拉立即实现停火，要求外国停止对安哥拉的干涉。西德外长根舍表示，西德将尽力支持赞比亚方面为解决安哥拉问题所作的努力。"},{"type":"paragraph","text":"根舍十四日设宴招待班达时发表了即席讲话，他说，西德政府谴责不管来自哪一方面的对安哥拉的军事干涉。非洲事务只能由非洲人自己而不能由别的人来决定。"},{"type":"paragraph","text":"班达同根舍还就两国经济关系举行了会谈。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bc9477c3a7"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
