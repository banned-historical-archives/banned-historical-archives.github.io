script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"我驻阿尔巴尼亚临时代办举行午宴欢迎访华归来的阿党政代表团宾主不断举杯祝愿毛主席和霍查同志万寿无疆","authors":[],"dates":[{"year":1968,"month":10,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社地拉那二十九日电　中国驻阿尔巴尼亚大使馆临时代办李庭荃二十八日在使馆举行午宴，欢迎不久前访问中国归来的，由阿尔巴尼亚劳动党中央政治局委员、阿尔巴尼亚人民共和国部长会议副主席兼国防部长巴卢库同志率领的阿尔巴尼亚党政代表团。"},{"type":"paragraph","text":"阿尔巴尼亚党政代表团成员、阿尔巴尼亚劳动党中央政治局委员、阿尔巴尼亚人民共和国人民议会主席团副主席、劳动党都拉斯区党委第一书记马尔科同志出席了午宴。"},{"type":"paragraph","text":"出席午宴的还有阿尔巴尼亚劳动党中央政治局候补委员杜米和外交部长纳赛等同志。"},{"type":"paragraph","text":"宴会上，李庭荃同志和巴卢库同志在极其亲切和友好的气氛中，不断为中阿两党和两国人民之间的伟大的、牢不可破的战斗友谊祝酒，并不断举杯祝愿中国人民的伟大领袖毛泽东主席和阿尔巴尼亚人民的伟大领袖恩维尔·霍查同志万寿无疆。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3b3de1e614"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
