script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"以奋发图强精神粉碎帝国主义和现代修正主义封锁阴谋  阿尔巴尼亚社会主义建设欣欣向荣","authors":[],"dates":[{"year":1964,"month":1,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"以奋发图强精神粉碎帝国主义和现代修正主义封锁阴谋"},{"type":"paragraph","text":"阿尔巴尼亚社会主义建设欣欣向荣"},{"type":"paragraph","text":"据新华社地拉那电　本社记者报道：守卫在社会主义阵营西南前哨的阿尔巴尼亚人民在劳动党的正确领导下，在一九六三年以奋发图强的精神，取得了社会主义建设工农业战线上的辉煌胜利，进一步粉碎了帝国主义和现代修正主义的经济封锁的阴谋。"},{"type":"paragraph","text":"阿尔巴尼亚去年工业生产上硕果累累。根据报刊最近公布的材料，去年阿尔巴尼亚工业生产计划约完成百分之一百点六，工业总产值比前年增长百分之六点一，相当于战前的二十八倍半。现在，阿尔巴尼亚每十三天的工业产值就相当于一九三八年全年的工业产值。"},{"type":"paragraph","text":"一年来，阿尔巴尼亚工业产品的品种大大增加，许多依靠进口的产品已能自己生产。这一成绩对阿尔巴尼亚国民经济的发展具有重要意义。现在，国民经济各部门所需用的机器零件，已有一半能够自给；纺织工业所需的零件，百分之七十已能在本国生产。"},{"type":"paragraph","text":"阿尔巴尼亚去年的基本建设规模比前年进一步扩大。"},{"type":"paragraph","text":"一年来，阿尔巴尼亚工程技术人员的队伍进一步扩大了。为了克服帝国主义和现代修正主义制造的困难，阿尔巴尼亚工人阶级发挥了高度的创造精神和干劲。他们继续把愤慨化为力量，积极响应党和政府的号召，找窍门、想办法，挖掘本企业内部的潜力，掀起了群众性的增产节约运动。一年来全国职工共提出了一万八千项合理化建议。"},{"type":"paragraph","text":"在农业生产方面，阿尔巴尼亚去年遇到了不利的气候条件。前冬去春出现了多年来少有的严寒，接着是风雪、霪雨成灾。但是坚持走集体化道路的阿尔巴尼亚农民，战胜了各种困难，取得显著成绩，去年全国农业总产量比前年增长百分之八。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8110388640"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
