script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"汽车电机厂党委发动群众学理论促大干以实际行动回击右倾翻案风","authors":[],"dates":[{"year":1976,"month":1,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　上海汽车电机广干部、群众认真学习毛主席关于无产阶级文化大革命的一系列指示，批判否定无产阶级文化大革命和社会主义新生事物的右倾翻案风，以阶级斗争为纲，深入开展工业学大庆的群众运动，以实际行动巩固和发展无产阶级文化大革命的胜利成果。"},{"type":"paragraph","text":"这个厂的干部、群众通过学习，认识到当前教育界出现的奇谈怪论，实质上就是妄图为修正主义教育路线翻案，从而否定无产阶级文化大革命，改变毛主席的革命路线。为了捍卫毛主席的革命路线，全厂在二、三天内贴出热情歌颂社会主义新生事物的诗歌和批判教育战线上错误论点的文章千余篇。厂党委根据广大干部、工人的要求，及时召开现场交流会。会上，许多同志用大量事实驳斥了奇谈怪论。厂党委还充分发挥工人理论队伍和工人文艺队伍作用，采取各种形式热情歌颂、大力宣传社会主义新生事物，大大激发了工人群众大干社会主义、大搞技术革新的豪情壮志。"},{"type":"paragraph","text":"群众发动起来后，在短短的二、三天内，全厂共组织了各种突击队四十多个，共有九百六十六人参加，占全厂职工总数一半以上。这个厂干部群众大学大批促大干，四车间老工人陈根仁年过半百，看到厂里男女老少齐上阵，心情十分激动，他和几个老工人一商量，立即组织了二十四个老年工人参加突击队，他们当晚就参加了滚镀流水线的突击任务，不少老工人把被头铺盖也带进了车间。二车间青年为了实现车间开关、装配、电工静电喷漆等四条流水线，提出“借天不借地，向空间要场地”的响亮口号，只用了七个晚上的时间，就胜利地完成了搭两只搁楼的任务。全厂一周来提出的革新项目有几十项。"},{"type":"paragraph","text":"群众运动的热潮，使一些原来比较后进的同志也赶了上来。五车间有几个原来比较后进的青年，这次在大好形势推动下，参加了青年突击队，主动承担了安装割管机的任务，第一天就一口气干到深夜二时，完成了任务。群众运动的热潮，猛烈地冲击着因循守旧、按部就班等懦夫懒汉思想，如厂里原来规划电子群控要到一九八○年才考虑，但群众一发动，大家立即动手搞革新，争取在今年搞成四个系列的铁芯冲床自动化电子群控。　(本报通讯员)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7581a5ebaf"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
