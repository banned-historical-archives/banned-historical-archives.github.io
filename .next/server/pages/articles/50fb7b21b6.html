script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoistlegacy.de-65","name":"中央统战部、中央组织部关于原工商业者安排使用中几个问题的通知","author":"中共中央统战部","internal":false,"official":false,"type":"unknown","files":[],"article":{"title":"中央统战部、中央组织部关于原工商业者安排使用中几个问题的通知","dates":[{"year":1981,"month":7,"day":14}],"is_range_date":false,"authors":["中共中央组织部","中共中央统战部"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"中共中央组织干审局，干审工作政策文件选编 （下）, 1143-1144","tags":[{"name":"落实政策","type":"主题/事件"},{"name":"原工商业者","type":"主题/事件"},{"name":"咨询","type":"主题/事件"}],"parts":[{"type":"title","text":"中央统战部、中央组织部关于原工商业者安排使用中几个问题的通知"},{"type":"subtitle","text":"1981年7月14日 · 统部发文〔1981〕196号组通字〔1981〕30号"},{"type":"paragraph","text":"去年十一月，中央统战部和中央组织部印发民建、工商联中常会联席会议《关于协助党和政府做好对原工商业者的安排使用工作的决议》的通知下达以来，在当地党委的领导下，统战、组织两部和其他有关部门以及民建会、工商联做了许多工作，取得了不少成绩，但还有一些问题需要进一步明确，适当解决。现将我们的意见通知如下："},{"type":"paragraph","text":"一、“文革”中在“左”的指导思想影响下，对原工商业者一律撤销其原任职务，并下放劳动，这是不对的。“文革”前安排为干部和担任领导职务的，应当承认其干部身份。"},{"type":"paragraph","text":"二、对在职的原工商业者，不论“文革”以前是否担任领导职务，都应当根据中发〔1979〕95号文件的精神，合理安排使用。要一个一个人地落实，做到用其所长，各得其所。对于“文革”前担任领导职务的，只要政治上表现较好，身体能坚持工作,就应当予以妥善安排，有的可以担任原来的职务，有的可以比照其原任职务，适当安排。对干政治上表现好，有技术专长，或有经营管理经验，符合提拔条件的，应予提拔。"},{"type":"paragraph","text":"三、在贯彻落实中发〔1979〕95号文件的精神，合理安排原工商业者的工作时，鉴于他们一般年龄较大，因此，对他们担任领导职务的年龄条件，可以适当放宽。（计算领导班子平均年龄时，可将他们的年龄除外，另行统计。）"},{"type":"paragraph","text":"四、对有技术专长或经营管理经验，还能做些工作的退休原工商业者，应与其他退休职工一样，要组织他们帮助街道举办集体企业、事业，安置待业青年，搞好咨询服务，为国家献计献策；同时要坚持实事求是，量力而行的原则，着重让他们当指导，搞好传帮带，关心他们的身体健康，不要作为一般劳动力使用。对他们既要有适当的劳动报酬，又要反对高价聘请，要把精神鼓励同物质鼓励结合起来。"},{"type":"paragraph","text":"各地统战部门和组织部门应当根据中发〔1979〕95号以及其他有关文件的精神和上述要求，继续抓紧抓好对原工商业者的安排使用工作，并于九月底前将落实情况报告中央统战部。"}],"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"50fb7b21b6"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
