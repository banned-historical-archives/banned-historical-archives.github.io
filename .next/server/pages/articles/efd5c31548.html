script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"中国文化革命排山倒海横扫反动残余锡中友协热烈欢呼毛泽东思想的伟大胜利","authors":[],"dates":[{"year":1966,"month":9,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社科伦坡14日电　锡中友好协会十三日在科伦坡举行的年会上通过决议，热烈欢呼毛泽东思想的伟大胜利，热烈赞扬中国无产阶级文化大革命。"},{"type":"paragraph","text":"在会上通过的关于毛泽东思想的决议说:“我们祝中国人民敬爱的领袖毛泽东主席万寿无疆，他的光辉的思想，指出了中国在革命和建设方面取得伟大胜利的正确道路，从而领导中国人民在很短的历史时期内，把自己的祖国建设成为强大的社会主义国家。”"},{"type":"paragraph","text":"决议说:“中国在伟大的毛主席的领导下和他的伟大思想的指导下，已经成为反对帝国主义和新老殖民主义的最强大的堡垒，成为世界人民解放斗争的最可靠的支持者。”决议说:“我们高兴地看到，越来越多的人民在争取解放和自由的斗争中从伟大的毛泽东思想中得到了鼓舞，从而确保自己能够取得胜利和最后打倒一切剥削制度。”"},{"type":"paragraph","text":"在会上通过的关于中国无产阶级文化大革命的决议说:“我们欢呼目前正以排山倒海之势席卷全中国的社会主义文化大革命”。“这是一次史无前例的文化革命，这次革命必将对巩固和发展中国的政治和经济革命发生深远的影响，必将对世界人民的革命斗争发生巨大和深远的影响。”"},{"type":"paragraph","text":"决议指出:“帝国主义者、现代修正主义者和各国反动派对觉醒了的中国人民的这一伟大运动进行咒骂和诽谤，正是因为这一伟大运动必然会横扫旧社会上层建筑的一切反动残余，而他们是把在中国出现修正主义和复辟资本主义的希望寄托在这些残余上的。”"},{"type":"paragraph","text":"决议“祝愿中国的社会主义文化大革命取得彻底的胜利。”"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"efd5c31548"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
