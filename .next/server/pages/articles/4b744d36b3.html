" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共中央华东局纪律检查委员会关于开除方原党籍的决定","authors":[],"dates":[{"year":1953,"month":9}],"is_range_date":false,"parts":[{"text":"中共中央华东局纪律检查委员会关于开除方原党籍的决定","type":"title"},{"text":"前华东军政委员会水产管理局副局长方原（原名赵芳远），地主出身，1938年入党（按：方原过去填表均填1931年入党，1937年恢复关系；1953年11月4日方书面交代1931年入党，1934年失去关系，1938年重新入党，1939年恢复关系；1945年7月3日方又书面交代1938年入党，并申明在北京天坛参加党的一段历史纯是虚构）。曾历任科长、县长、县委书记、师民运部长、华东财委秘书主任等职。","type":"paragraph"},{"text":"方原虽经党的长期教育，但并未抛弃其反动的地主阶级立场，在伟大的土地改革运动中，竟敢公然以共产党员和人民政府高级干部的身份支持其恶霸地主父母，使之恃势打击群众的正义斗争，同时方并蓄意将有血债之重要反革命分子多人（其中有汪伪国民党省党部委员、伪省府秘书长、伪专员等）先后介绍或隐匿于我机关、企业中加以包庇。此外，方原对党是极不忠实的。如：方对参加革命前曾历任伪职多年一事，一直未向党坦白交代；并且伪造入党时间，欺骗组织；1946年方任淮宝县委书记时，因退却逃跑曾受到撤职处分，后又因其他错误，受警告处分两次，对此重要历史情节，方在南下后，亦向党隐瞒，以骗取党的信任。","type":"paragraph"},{"text":"如上所述，方原的犯罪行为是极其严重的。事实证明，方原已成为违反国法的罪犯，特根据党章第64条的规定，开除其党籍，并建议政府依法予以制裁。","type":"paragraph"}],"comments":[],"origin":"中共中央监察委员会办公厅编：《县委书记以上干部受到开除党籍处分的决定汇编（二）》（党内文件·注意保存），1960年。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4b744d36b3"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
