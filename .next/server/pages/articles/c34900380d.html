script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反对残酷剥削　打击英国政府英国近三十万铁路员工怠工","authors":[],"dates":[{"year":1968,"month":6,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社伦敦二十四日电　英国大约三十万铁路员工为反对英国铁路局加紧对工人的剥削，争取全面增加工资而展开了声势浩大的全国性怠工。这使威尔逊政府执行的向工人转嫁财政经济困难的政策受到又一严重的打击。"},{"type":"paragraph","text":"参加英国全国铁路工人工会的二十七万铁路员工，从二十三日午夜起开始怠工，拒绝为铁路当局加班加点，拒绝在星期天和假日上工，并且放慢工作速度。他们要求为全体铁路员工全面增加工资百分之六至百分之九。这个要求早在去年八月就提出来了，但是遭到英国铁路局的拒绝。铁路局甚至无理提出，铁路员工只有在加强劳动强度和减少劳动力(在五年内，铁路员工已减少十五万人以上)的条件下，才能增加工资。铁路员工当然不答应，于是决定举行全国性怠工。"},{"type":"paragraph","text":"铁路员工的怠工使英国的铁路交通运输陷于混乱，从而使百孔千疮的英国财政经济，特别是在英国垄断资本看作英国经济生命线的出口贸易方面，受到严重的影响。二十四日已经有一千多次列车停开，还有好几百次列车误点，某些线路甚至整天关闭。在铁路员工怠工的第一个早晨，英国铁路交通运输就减少了百分之四十。在伦敦区甚至减少百分之六十"},{"type":"paragraph","text":"威尔逊政府对铁路员工的全国性怠工惊慌失措，二十四日上午举行了紧急会议，策划对付铁路工人的措施。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c34900380d"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
