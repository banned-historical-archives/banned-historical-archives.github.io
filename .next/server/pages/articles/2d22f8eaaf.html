script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"在反击资产阶级的斗争中青年团南京市工委扩大和巩固了组织","authors":[],"dates":[{"year":1952,"month":3,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社南京廿六日电】　中国新民主主义青年团南京市工作委员会各支部在反击资产阶级向国家猖狂进攻的斗争中扩大和巩固了组织。"},{"type":"paragraph","text":"全市绝大部分的青年团支部都吸收一批优秀的青年，特别是青年店员工人参加了团的组织。战斗紧张的支部，团员人数比运动以前增加了三倍到四倍。第四区青年团工作委员会的店员支部，原有团员十六人，而且局限在百货、绸布等四个行业里，在反贪污、反盗窃斗争中，该支部巳发展团员到七十四人。现在在南京市百分之四十的行业里，都有了青年团的小组，大批的青年店员工人申请入团。"},{"type":"paragraph","text":"南京市青年团在这次运动中发展团员采取了“火线入团”的方式。这种方式对运动起了很大的推动作用，同时这样吸收进来的团员在政治上比较纯洁可靠。例如第四区青年团工作委员会的店员支部，在全区青年店员工人集会总结工作时举行新团员入团宣誓仪式。会上，由四次机智击退资产阶级进攻阴谋的店员董荣宗作典型报告。青年团的支部事先慎重地审查了他的斗争经过，认为他合乎团员标准，就在大会上宣布吸收他入团。董荣宗被光荣批准参加青年团这件事，在青年中起了巨大的影响。第四区店员工会第四百一十组联会的全体青年店员工人四十多人联名提出保证，一定要站稳立场，和资产阶级不法分子作坚决斗争，争取入团。行业和行业之间的店员展开了竞赛运动。新民北货联营行店员陈大林在运动初期思想顾虑很大，老板张星斋是他的外祖父，他不肯破除亲戚情面。他在董荣宗被批准参加青年团的大会上受到了教育，回去就大胆地检举了张星斋盗窃国家财产，并派奸细混入合作社的严重违法行为。遭到落后分子打击的裕昌钮扣号店员莫育容原来有些灰心，这次会后，他再接再厉地团结老账房，说服落后分子，终于检查出老板的假账。陈大林等已在最近参加了青年团。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2d22f8eaaf"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
