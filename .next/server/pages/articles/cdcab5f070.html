script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"邓小平会见阿尔托时强调  必须排除一切社会主义道路上的障碍  中国马克思主义者不会同意搞资产阶级自由化  安定团结的局面和改革开放政策不会受到影响","authors":["张亮"],"dates":[{"year":1987,"month":1,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"邓小平会见阿尔托时强调"},{"type":"paragraph","text":"必须排除一切社会主义道路上的障碍"},{"type":"paragraph","text":"中国马克思主义者不会同意搞资产阶级自由化"},{"type":"paragraph","text":"安定团结的局面和改革开放政策不会受到影响"},{"type":"paragraph","text":"本报讯　记者张亮报道：中共中央顾问委员会主任邓小平1月15日上午在人民大会堂会见芬兰共产党主席阿尔沃·阿尔托一行时指出，中国确定的方针就是坚定不移地、一心一意地搞社会主义建设。我们有两大任务：一是维护世界和平，二是发展社会主义生产力。"},{"type":"paragraph","text":"邓小平说，我们现在执行的政策是成功的，特别是改革政策和开放政策。我们在干前人所没有干过的事情，我们处在一个新的时期，没有任何经验可以供我们借鉴。邓小平指出，中国必须有一个安定团结的政治局面，排除一切社会主义建设道路上的障碍。现在存在着一种思潮，就是搞资产阶级自由化。这件事，中国的马克思主义者是不会同意的。但是影响不了我们已经取得的安定团结的局面，也影响不了我们为了社会主义建设而采取的改革和开放政策，因为从我们党的十一届三中全会以来已经八年时间，整个国家的发展，人们是不能否定的。"},{"type":"paragraph","text":"在谈到中芬两党关系时，邓小平说，我们很高兴，我们两党恢复了关系。这种关系是在新的、平等和相互尊重的基础上恢复的，我们相信两党关系今后的发展是会顺利的。中国共产党愿意遵循同样的原则来处理同其它各国共产党的关系。我们认为，所有的共产党，不管大小和历史长短，都应当平等，相互尊重。邓小平还说，我们历来认为，真正的马克思列宁主义就是要把马列主义的基本原理同自己国内的情况相结合。我们从自己的经验中认识到，任何国家的革命都必须根据自己国家的特点和自己的革命实践来寻求革命胜利的道路、方法和方式。"},{"type":"paragraph","text":"阿尔托主席感谢中国共产党中央委员会邀请他来中国访问。他高兴地说，他们能够会见邓小平同志，特别感到荣幸。通过这次访问，揭开了我们两党关系史上新的一页。他还介绍了芬兰共产党的情况。阿尔托主席最后表示衷心祝愿中国同志在实现自己的目标方面，取得最好的成就。（附图片）"},{"type":"paragraph","text":"邓小平会见芬共代表团。　新华社记者　李治元摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cdcab5f070"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
