<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反革命分子吴英等罪行累累提篮区人民今集会控诉吴匪解放前曾逮捕中共地下党员及爱国人士百余　中统匪特严桂葆过去依靠反动势力残害剥削工人","authors":[],"dates":[{"year":1951,"month":5,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　提篮桥区今日控诉四名罪大恶极、人人痛恨的反革命分子。第一个是吴匪英，他是陆匪京士的特级干部，曾任护工队第二大队队长，还曾任提篮桥区伪区长和反动的国民党该区党部主任。解放前曾历次逮捕中共地下党员及爱国人士百余人，并企图暗杀中共党员徐周良(现任劳动局副局长)，并曾使用酷刑残害爱国工人，朱琦(工人)即因此致死。并组织特务流氓一百零八将作为打手，殴打爱国工人，破坏民主运动。他是劝工大楼血案的主犯之一，并压制法电工人罢工。在任伪区长时，敲诈勒索，剥削、压迫人民，无所不用其极。解放后，仍不悔改，胆敢冒充军管会和民主党派名义，张贴布告，散发伪造文件，组织反动武装伪保安队，冒名接收沪东工会，企图混水摸鱼。"},{"type":"paragraph","text":"严匪桂葆，中统特务，曾任戡建大队第三大队调查组副组长，还是平和公司的封建把头。一九四七年前后，逮捕过七位革命同志，因此伪警备部送给他手枪七支、步枪二支。解放前在平和公司工厂与其父严文元(已逮捕)依靠反动势力，扩张封建势力，广收门徒，对工人残害剥削，无恶不作。克扣工人工资和贴力，平均每日可括工人血汗约黄金一两五钱，多到五两。打骂工人，更是常事。工人生活无法维持，拿些棉花卖钱糊口，严匪就用刀割开工人腿肚。冬天还用冷水浇冻工人，因此冻病的工友不下二百余人。此外还用便粪塞进工人口里。严匪和陈小毛是一样无耻淫棍，强奸、霸占工人妻子达三十余人。"},{"type":"paragraph","text":"第三名是黄匪瑞天，绰号黄老虎，又是汉奸，又是特务，在日伪时期当包打听，在反动派统治上海时，勾结伪警备部破坏工运，制造黑名单，逮捕爱国工人，并曾亲手持枪逮捕爱国工人杨阿如、孙大才等四人，扬言威胁:‘我的笔尖一动，就可决定你们死活!”在任浦东新光内衣厂技术人员训练班主任时，利用权势强奸女学员，无恶不作，在班中进行法西斯独裁军训，要学员听到蒋匪介石名字就立正，听到该厂老板傅良骏的名字也要立正。勾结资方，压迫剥削工人，罪恶难数。"},{"type":"paragraph","text":"第四名姜匪有才，又叫姜二小子，日伪时充当汉奸，倚仗日人势力杀人越货，陈小二子就是他杀死的。抗日胜利，依靠匪帮势力组织单刀会，假借慈善名义敲诈勒索。反动派征兵时，他更是乘机大肆收刮，出不起壮丁费的，姜匪就捏造人家隐藏军用品，并利用爪牙殴打群众，或逼人至死。解放后，姜匪从匪军中弄到一支轻机枪，指使爪牙，图谋不轨。此外并勾结台湾香港匪特继续潜伏阴谋活动。"},{"type":"paragraph","text":"以上四名反革命分子都是压在提篮桥区人民头上的大石头，政府把他们逮捕后，全区人民欢欣鼓舞，今天，四匪将跪在人民面前，听受群众的控诉与裁判了。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2254e4a944"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
