" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji39","name":"毛泽东全集第39卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji39.pdf"],"article":{"title":"对广东省委关于财政下放和工业下放问题的建议的批语和修改","alias":"","parts":[{"type":"paragraph","text":"对广东省委关于财政下放和工业下放"},{"type":"paragraph","text":"问题的建议的批语和修改!]"},{"type":"paragraph","text":"（1958年3月11日）此件付讨论。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"三月十一日"},{"type":"paragraph","text":"广东省委关于财政下放五年不变问题及工业下放问题的建议，要求答复。"},{"type":"paragraph","text":"三"},{"type":"paragraph","text":"以上建议请中央考虑，如认为可行，即速确定，通知有关部门和我们立即执行，以利建设。"},{"type":"paragraph","text":"对广东省委关于财政下放和工业下放问题的建议的批语和修改以上二、三两项建议，请中央指示。"},{"type":"paragraph","text":"[1]本篇一是毛泽东对中共广东省委关于财政下放和工业下放问题的建议的批语；二是毛泽东为广东省委建议拟的标题；三是毛泽东修改的广东省委建议末尾的两段文字，其中用宋体字排印的是毛泽东加写和改写的文字。"},{"type":"paragraph","text":"[2]指中共广东省委1958年3月6日关于财政下放和工业下放问题的建议给中央并毛泽东的报告。主要内容是：（一）财政下放对组织社会主义大跃进起了良好的作用。1958年广东省的基建投资，已由原来中央安排的1.19亿元增加到2.26亿元，即由地方追加1.07亿元。估计在开展反铺张浪费，厉行节约和挖掘生产潜力后，企业利润还可增加，也就有可能再增加投资，用于生产建设。（二）财政“五年不变”的规定，将会更好地发挥地方的积极性，使之能更主动地去安排第二个五年计划的发展规模和速度。因此，请中央考虑，是否正式宣布财政下放、五年不变的方针，和批准广东省五年基建投资计划。（三）要使工业的发展真正做到多快好省，除有些工厂必须由中央直接管理外，应把发展地方生产建设密切相关的一些工厂尽量下放。现在有的工厂由中央各部门分管，地方插不上手，这些厂往往各搞一套，浪费很大，生产潜力远没有发挥。我们认为，在一个地区的工业，原则上必须确定由地方统一管理。这个报告作为成都会议文件在会上印发。"}],"authors":["毛泽东"],"dates":[{"year":1958,"month":3,"day":11}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":98,"page_end":99},"tags":[{"name":"毛泽东","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7a9b56db7e"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
