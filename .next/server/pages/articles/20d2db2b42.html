<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"农村干部实现又红又专的正确方向","authors":["《河南日报》社论"],"dates":[{"year":1958,"month":3,"day":9}],"is_range_date":false,"parts":[{"text":"农村干部实现又红又专的正确方向","type":"title"},{"text":"《河南日报》社论","type":"authors"},{"text":"我们党在领导全国人民基本上完成了生产资料所有制方面的社会主义革命，并且在政治思想战线上的社会主义革命取得基本胜利之后，现在正面临着社会主义建设全面大跃进的形势，正面临着实行技术革命的任务。在这样的新形势、新任务面前，对于每个干部的迫切要求，就是要作到“又红又专”，即：既具备坚定的无产阶级立场，掌握马克思主义的基本理论，又具有一定的专门科学技术知识，学会生动而具体的领导方法。各级领导干部需要如此，广大基层干部也应当如此。这是历史向我们提出的严重任务。","type":"paragraph"},{"text":"农村基层干部在干部总数中，占有极大的比重，加上县、区长期驻乡干部和最近各级领导机关下放农村的干部，全省大约在十五万人左右。这批干部长期和群众生活在一起，直接领导群众进行着各方面的生产建设事业，同时随着扫盲工作和普及中、小学教育工作的开展，广大群众的文化水平逐步提高，农村干部对学习的要求也必然会更高和更加迫切。因此，解决他们的“又红又专”问题，具有特别重要的意义。如何使基层干部和长期在农村工作的干部达到“又红又专”的要求呢？分批抽调干部到各级党校或各种专业学校、训练班学习，自然是一种办法。但是这种能够离开工作岗位学习的人总是比较少数的，为了使广大基层干部都能够经常地在工作岗位上有效地进行学习，最好的办法是建立一种固定的学习形式，使干部的学习和工作结合起来，理论和实践结合起来。登封县三官庙乡举办“红专学校”的实际效果，已初步地证明了这是从根本上解决基层干部的学习问题的正确途径。","type":"paragraph"},{"text":"三官庙乡的“红专学校”，是一个新的大胆的创造。从现在看，他们的学习内容和方法，基本上可以归结为两句话，就是：三门课程（哲学、文学、自然科学），一块试验田。他们没有专门校址，课堂就借用乡人民委员会的办公室；没有系统教材，教材就是可能买到的基本读物、报纸、刊物和党的文件、指示；没有专任教师，教师就由学习过某一课程的学员或可能请到的具有某种特长的干部、中小学教员来担任。学习到的科学技术知识和先进生产经验，就在自己的试验田内研究实验。群众的这种大胆的富有革命精神的创举，在一些不务实际、好高骛远的人看来，可能认为“这算什么红专学校”，“简直不像个样子”。其实，这正是他们看不见新生事物和漠视群众智慧和创造性的表现。三官庙乡的红专学校刚刚建立，各方面条件当然很差。但是，任何事物都是由小到大、从低级到高级逐步发展成长起来的。三官庙乡红专学校既然符合建设事业发展的需要和干部群众的要求，它就一定能够在党的领导和群众支持下逐步办好，成为更加完备的培养基层干部的新型学校。","type":"paragraph"},{"text":"也许还有人认为，基层干部文化水平低，学习马克思主义基本理论领会不了，未必合适。这也是一种多余的担心。马克思主义是关于无产阶级革命和社会主义建设的科学，马克思主义哲学就是自然、社会和思维发展的基本规律。它们都是从实践中总结出来又反过来指导实践的，并不是多么神秘奥妙的东西。目前我们的农村基层干部，都有一定的文化水平，同时，一般说来，也有比较丰富的实际工作经验。因此，只要内容适当，方法对头，联系实际地进行通俗解释，他们是完全能够理解的。三官庙乡参加红专学校的二十七个干部，入学前就买有十四本哲学书籍进行自修，入学后对学习理论也有极大的兴趣，便是生动的证明。","type":"paragraph"},{"text":"三官庙乡红专学校的创办，给帮助农村基层干部和在乡干部实现又红又专，提供了正确的方向。各级领导干部的定期下乡和大批干部的下放农村，也为举办红专学校创造了更有利的条件。位处山谷，居住分散的三官庙乡可以办，其它地方当然更可以办。各级党委应当重视三官庙乡的这种创造，认真研究，作出规划，使每一个乡都建立一个这样的红专学校，并及时总结经验，加以推广；同时，要在广大乡村干部中进行一次广泛的动员，使每个干部都能制订出自己在若干年内达到又红又专的规划；以便把广大乡村干部的学习推进到一个新的阶段。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"20d2db2b42"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
