" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"灌县人民法院对王景的处理批示表","authors":[],"dates":[{"year":1963,"month":4,"day":20}],"is_range_date":false,"parts":[{"text":"灌县人民法院对王景的处理批示表","type":"title"},{"text":"送案单位：灌县人民法院　案由：反革命集团","type":"subtitle"},{"text":"","type":"appellation"},{"text":"   姓名 王景 性别 男 年龄 35 家庭出身 地主 本人成份 学生    别名   反动身份 盟员 职业 - 前科 无    籍贯 四川省达县 住址 灌县看守所   家庭人口及经济情况 -    社会关系 -    是否拘捕（注明时间） 1963年2月17日由四川省公安厅逮捕 同案人 已拘捕 陈民国    未拘捕 姚凤起，冯克孝，王志杰    政治历史 情况 1934年读书至45年参加伪青年军当兵，46年9月在川大读政治系。50年3月在四川革大学习。60年7月在瑁县工作。50年10月在川大学习，51年7月在绵竹参加土改工作，51年10月在西南区统战部工作。52年2月在一杭部重庆供应处工作至58年3月，因整风中反对我党，反对社会主义于58年4月送教。（右派分子。）    主要犯罪事实（注明时间、地址及依据）    被告在劳教中，仍坚持反动立场，攻击我党社会主义制度。62年7月初由反革命集团的首要分子杨应森介绍参加“中国马列主义者联盟”后加倍缴纳盟费，以表被告对反动组织的支持和忠实，并积极在劳教人员中宣传其反革命组织的纲领，路线，方针等。发展了留队就业人员陈民国为“盟员”，又向杨犯推荐了姚凤起，冯克孝，王志杰等为发展对象。7月中旬杨犯召集被告和另一党羽姚凤起开会研究发展反革命组织时，被告积极主动“发展面放宽，突破道德”的约束，积极慎重的发展，在活动上凡是打击破坏反动的事都可干，组织盗窃公物和劳教积极分子的生活必需品，给予政治上的打击经济上的惩戒，可以分散视力，掩盖活动。在“组织”名称上主张将“盟”改为“党”。同时被告又与杨应森等人策划向队部写反动匿名信，向劳教分子写“告白书”妄图对我干部进行威胁和煽动劳教分子闹事，并支使陈民国去县龙化山内寻找空投特务联系。7月19日杨应森及被告等3人在灌县铁索桥密谋杀害101队队长，被告则阴险恶劣的说“用不做拼，这是社会制度问题，除非从根本上推翻这种社会制度才行，留下蒋队长这对我们有教育作用，自己吃点苦，蒋队长就为我们反对共产党的“反面教员”就会有更多的人对共产党，当即被杨采纳。由于被告忠实于反革命阶级，于7月31日晚由反革命集团的首要分子杨应森委任为筑路支队101队核心小组财贸负责人。                       ","type":"paragraph"},{"text":"   承办人 意见 判处有期徒刑18年 签名盖章 邱玉棋 4.17   县法院审查意见 判处徒刑18年 签名盖章 殷福纯 63.4.20   县政法 党组 判处徒刑18年 签名盖章 63.4.20   县委 判处徒刑18年 签名盖章 63.4.20   中级法院审查意见 - 签名盖章 -   专区政法党组 - 签名盖章 -   地委 - 签名盖章 -       签名盖章 -       签名盖章 -   省委 - 签名盖章 -       签名盖章 -   备考 -   ","type":"paragraph"}],"comments":[],"origin":"四川省某档案馆","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c82d6da445"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
