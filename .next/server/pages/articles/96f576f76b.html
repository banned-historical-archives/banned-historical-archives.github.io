script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"艾地主席强调促使第二次亚非会议开得成功号召亚非各国人民大力抗美援越 谴责现代修正主义削弱反帝斗争","authors":[],"dates":[{"year":1965,"month":4,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社雅加达8日电　据印度尼西亚共产党新闻局昨晚发表的新闻公报，印度尼西亚共产党主席艾地五日在这里的印度尼西亚共和国电台发表讲话，号召亚非人民给予越南人民反对美帝国主义的斗争以更大的支持。"},{"type":"paragraph","text":"艾地说:“美帝国主义除了把战争扩大到越南北方，加紧轰炸和扫射越南民主共和国的无辜人民之外，还无耻地蓄意在南越使用毒气。在历史上，只有墨索里尼法西斯主义对埃塞俄比亚人民使用过毒气。美帝国主义者一向吹嘘自己是民主和人道主义的保卫者，实际上恰恰是法西斯主义的继承者，恰恰是到处采取野蛮行动和空谈人道主义的新法西斯主义者。美国对其本国的黑人，对越南南方和世界各地都是这样干的。”"},{"type":"paragraph","text":"艾地说:“全世界人民，特别是那些声援越南南方人民反对美国侵略者的斗争的人民的愤怒情绪越来越强烈。如果亚非人民要彻底粉碎以美国为首的世界帝国主义，就应当进一步加强对越南人民的支持。”"},{"type":"paragraph","text":"艾地还指出，当前的任务是促使第一次亚非会议十周年的庆视活动成功，其目的是为了促使第二次亚非会议开得成功。"},{"type":"paragraph","text":"艾地说:“我们的敌人帝国主义及其走狗在千方百计破坏第二次亚非会议，使它不能如期举行。这种危险也来自现代修正主义者，他们不想了解亚洲和非洲日益高涨的革命形势，余图缩小亚洲和非洲在新兴力量反对旧势力的斗争中的作用。现代修正主义不仅对印度尼而亚、亚洲和非洲是真正的危险，而且对全世界被压迫民族和人民也是真正的危险，因为它的确是在削弱反对帝国主义、争取民族独立的革命斗争。因此，我们必须不懈地以战斗的姿态反对现代修正主义者同帝国主义狼狈为奸。”"},{"type":"paragraph","text":"艾地指出:“印度尼西亚全体人民目前是生活在革命的形势中。他们已经起来反对帝国主义破坏他们的民族独立的各种阴谋和破坏活动。城乡人民目前在对帝国主义的走狗和仆从作斗争。在我国拥有不少资本的英美帝国主义真是被打垮了。他们的种植园、石油公司和其他企业被接管了。印度尼西亚人民和政府对帝国主义打得非常准。”"},{"type":"paragraph","text":"艾地说:“在革命形势下，唯一正确的态度是展开革命的攻势。印度尼西亚人民、站起来了的亚非人民都采取了这种态度。”"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"96f576f76b"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
