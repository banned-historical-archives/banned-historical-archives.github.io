<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"保定、唐山、石家庄、秦皇岛等四市群众在抗美援朝运动中尚存在不少思想问题","authors":[],"dates":[{"year":1950,"month":12,"day":15}],"is_range_date":false,"parts":[{"text":"保定、唐山、石家庄、秦皇岛等四市群众在抗美援朝运动中尚存在不少思想问题","type":"title"},{"text":"【华北总分社十五日讯】河北省辖保定、唐山、石家庄、秦皇岛等四市十一月初相继开展了广泛的抗美援朝宣传运动。经过时事教育后，广大干部、群众都认清了中朝唇齿相依的关系，认清了美帝是我们最危险的敌人。在运动中各市都有相当数量的学生、工人自动报名参加志愿军。但目前在群众中尚存在以下几个思想问题：","type":"paragraph"},{"text":"一、恐美、怕战争：这种思想情绪的面积较广，不但包括各阶层中的若干群众，而且包括部份新干部，甚至某些老干部，其中以工商业者、市民为严重。有的以为美国强大，打起来我们很难取得胜利；有的怕空袭，怕原子弹；有的市民怕战争引起物价高涨；工商业者怕战争起来，生产、买卖不得作；工人怕失业；学生怕失学；农民怕出兵、出伕，负担加重。","type":"paragraph"},{"text":"在恐美思想的支配之下，有些人不满意中国人民志愿行动。其理由是“朝鲜是内战”因而“不应当理”；“应当在人家打到我们国土上来再打，应当用政治手段争取和平，一出兵就和平不了”；“出兵朝鲜是否违犯了国际法”?“援朝可以，但不要用中国志愿军名义，应当穿朝鲜军装”。有的旧职员、新干部、教员、团员因恐美惧战而辞职、退团、回家不归。保定有五个完小教员见形势紧张要求辞职；唐山交大三个团员要求退团；秦(皇岛)市两个新干部(上海人)请假不归。","type":"paragraph"},{"text":"二、崇美思想：认为美国生产及文化科学发达，生活富裕，政治民主。有这种思想的人多是在国民党统治时期生活优裕，文化较高，有些是美国留学的自然科学、技术、工程师工作者，厂矿高级职员，以及少数中等以上学校的教师。他们不赞成说美国是科学的敌人，并质问：“美国既然是人类科学的敌人，那么盘尼西林还用不用”?“说美国有原子弹这是真的，在长崎广岛试验过，说苏联有，那谁也没见过”另外尚有少数高级旧职员、资本家对美帝存在着幻想，有浓厚的亲美思想。他们认为美国是向来主张和平的，帮助落后民族，不事侵略的“道义之邦”，美军是联合国的军队对朝鲜战争当会“适可而止”，不会打过鸭绿江，不会轰炸中国，如果真有其事，也是“事出有因”的。开滦煤矿有的高级职员说：“三次世界大战打起来倒不错，美国来了英国也跟着来了，开滦的困难就解决了，又可以吃大袋洋面了”。","type":"paragraph"},{"text":"三、苟且偷安思想：存有这种思想的人，多是工商业界、市民和一些技术人员及少数学生、老年工人。这些人认为朝鲜离中国还远呢?美国并没有打过鸭绿江，主张：“人不犯我，我不犯人”，“多一事不如少一事”，“不打第一枪，不为天下先”，“帮助朝鲜不如解放台湾”，企图得过且过，忍气吞声，甚至有个别的人主张割地赔款换取“和平”。如有的商人说：“不行了，给他一点算了吧!炸就炸去吧！总比大战打起来强的多”。甚至有的商人、工人、学生认为“谁来也好，反正一样的出差拿税”，“有技术谁来也照样作工吃饭”，“谁来也要上学，也得识字”。","type":"paragraph"},{"text":"四、盲目轻敌：有这种思想的人，主要是文化程度低，缺乏理论知识和策略思想的部份老干部及某些工人、学生中的积极份子。这些人认为早就应当出兵，主张大量的出兵，一次战斗结束朝鲜战争，再打到日本，再打到美洲，消灭整个资本主义。他们在盲目的必胜信念支配之下，表示急不可耐，将革命斗争简单化，反对政治斗争，主张以武力“毕其功于一役”。如有的干部说：“和平签名不管事，现在不是搞政治斗争的时候了，迟也得打，晚打不如早打，小打不如大打”。有的说：“周外长声明抗议，抗议声明，管什么事呀!联合国又不理，趁早开过几个兵团到朝鲜打个淮海战役，倒痛快”。还有的说：“打就打吧!跟他公开宣战何必叫志愿军呢”?“战争起来把老婆送到家里背起小包跟他打几年游击”(这其中也有的是属于右倾思想)。","type":"paragraph"}],"comments":[],"origin":"新华通讯社编《内部参考》1950年12月21日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"朝鲜战争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0f5cf30ebd"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
