script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"山东批判单纯等待机械化右倾思想  发动群众创制当前急需工具  甘肃农民创造山地工具一万多种","authors":["王影","翟其寅"],"dates":[{"year":1958,"month":5,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"山东批判单纯等待机械化右倾思想"},{"type":"paragraph","text":"发动群众创制当前急需工具"},{"type":"paragraph","text":"甘肃农民创造山地工具一万多种"},{"type":"paragraph","text":"本报讯　山东省人民委员会7日到10日召开了全省推广简易提水工具和改良农具会议。会议在严肃地批判了各地较为普遍存在的单纯等待机械化，而不注意发动群众创造和推广简易提水工具和改良农具的右倾保守思想的基础上，决定立即在全省范围内掀起一个群众性的创造和推广简易提水工具和改良农具运动，以解决当前迫切需要解决的提水工具、夏收夏种工具、运输工具和农田水利建设需要的工具等方面的困难。"},{"type":"paragraph","text":"会议对今后如何推广简易提水工具和改良农具工作，提出了就地取材、就地制造、就地推广和就地使用的“四就”方针，要求各地本着制造容易、成本低、效率高又能减轻体力劳动和边创造、边试制、边使用的原则，通过召开现场会议和群众辩论等办法，迅速掀起一个群众性的推广简易提水工具和改良农具运动。　（王影）"},{"type":"paragraph","text":"本报讯　甘肃省自从发起人人动手改革工具运动以后，在短短的几个月中，各地群众创造出以山地使用为主的新工具一万一千种。"},{"type":"paragraph","text":"甘肃省山区耕地面积占全省耕地总面积的84％，几年来虽然推广了三十余万件新农具，但是，人背肩挑和“二牛抬杠”犁仍然大量存在。在大跃进的新形势下，为解决干旱山区劳动力不足和生产工具落后的问题，各地群众便热火朝天地创制和改制新工具。甘谷县蒋蕴中创造的人工降雨机，一天浇地四十亩，使原来渠窖浇灌不到的山坡地也能得到灌溉之利。靖远县刘忠勤创造的水粪籽三用耧，克服了今春山区抗旱播种的困难。秦安县陈杰发明的畜力车轮陈箩磨，只要一个人看，一头牲口拉两矿磨，效率相当于七个人力和六头畜力，还能自动扫，自动筛，自动装，有效地解决了山区群众粮食加工的问题。此外，像高线自动运输器，渠道起重机、打夯机、手摇碎粪机等新工具的创造，可提高劳动效率几倍到几十倍。"},{"type":"paragraph","text":"甘肃省各级党委在改革工具运动中，由党委书记亲自挂帅，抓思想、抓典型，解决改革工具中的困难问题，通过各种形式表扬和支持群众的发明创造活动。省、专区和县分别召开了工具改革展览会、促进会、座谈会和经验交流会，组织评比观摩，现场推广。同时成立改革工具的研究机构，介绍外地先进工具与指导创制新工具，并派出大批技术员和发动教员、学生深入农村，与农民研究创造新工具。（翟其寅）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"35da6219f1"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
