<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"工人和“资产阶级生活”之间","authors":[],"dates":[{"year":1957,"month":2,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"工人和“资产阶级生活”之间"},{"type":"paragraph","text":"西德的经济在过去几年里有某些发展。一些资产阶级的经济学家现在鼓吹一种“阶级消灭”的理论。他们说，在西德已经没有工人阶级，因为，据他们说，由于推行了各种分期付款和赊购的办法，使得工人们也能买得起资产阶级所享用的“文明物品”，因此工人已经逐渐地长入中等资产阶级了！"},{"type":"paragraph","text":"要是笼统地说西德有一些工人今天能够买得起“文明物品”，例如汽车、电视机、电气冰箱以至住宅等等，倒也符合事实。但是要知道他们怎么样来取得这里所说的“资产阶级”的资格和他们所处的是一种什么样的“资产阶级”地位，还得具体看一看实际的状况。"},{"type":"paragraph","text":"下面是一些具体的事例。"},{"type":"paragraph","text":"在波恩有一个印刷工人，他除了每天工作八小时外，晚上还在另一个印刷厂里工作四、五小时。用这样的办法他总算慢慢积蓄起足够的钱买了一架电视机。但是当他拿到这个“文明物品”坐下来要“享受”的时候，一天十几小时紧张劳动所产生的疲劳却使他很快地就睡熟了。"},{"type":"paragraph","text":"在波恩一个做夜班烧火工作的工人，他为了想自己有一所房子，除了做夜班外还做日工，他的妻子除去做清洁工外还兼做家庭手工。这样，他们慢慢地的确也积起了一笔钱。但是不久他由于劳动过度而病倒了。从此之后他就一直躺在床上不能工作。那笔钱当然也就慢慢又用光了。"},{"type":"paragraph","text":"另外一个从事政治工作的人，为了多挣一些钱，他又去做他的老本行——细雕石工。加起来他每天要工作十六小时。钱是挣得多了，但是疲劳不堪。他得到了一种体会：“现在我才明白，……为什么工人们那样对于政治不关心，因为他们的精力都被工作榨净了，除了关心松口气外，其他都无法管了”。"},{"type":"paragraph","text":"这些事例决不是个别的。西德“世界报”在去年10月曾说过：“据估计今天参加‘黑劳动’（就是指从事本职以外兼作其他工作的——作者）的人已经占全部劳动总额的三分之一。”"},{"type":"paragraph","text":"根据同一报纸的报道，自1950年到1955年之间联邦共和国内的薪金和工资约增加了40％，但是一些生活必需品却涨价了50％以上。这样对许多工人来说要不从事“黑劳动”，连维持生活也都愈来愈困难，更不用说购买资产阶级享用的“文明物品”了。"},{"type":"paragraph","text":"或许，那一些靠着赊账或分期付款方法终究购买了某种“文明物品”的工人会感到清脱些吧。且不说这类“文明物品”丝毫也没有减轻“享有”它们的工人所受到的沉重的剥削，事实上，由于背上了一笔债务，它们还给它们的“享有”者额外套上了一条索子。为了继续“享受”这种“资产阶级生活”，住进了新房子或坐上了“自己的”汽车的这些工人们必须兢兢业业地努力劳作，以免由于哪一个月付不起到期的债款而被一下子剥夺掉这种“享受”。"},{"type":"paragraph","text":"这就是那些资产阶级经济学家所吹嘘的西德工人正在长入中等资产阶级的真实情况。"},{"type":"paragraph","text":"西德工会刊物“劳动世界”说得好：“如果我们天天这样的增加劳动的强度，使得我们几乎没有时间来享受这一切进步的、非常美丽的东西……如果一个人神经上由于劳力的迫促已经成了废物，一辆汽车、一架电视机、一架唱机、一座冰箱或是其他一切的好东西对于他还有什么用处？一个早就知道的真理是：大多数豪富的人都不是由于体力劳动来达到他们的目的。也不是由于工资或是薪金。他们达到他们的目的是靠巧妙地从其他的人努力勤恳的劳动里掠夺大堆的钱”。这话算是说中了要害。（林）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"239a453500"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
