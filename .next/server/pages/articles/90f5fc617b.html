script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"韦国清在深入部队调查研究后指出  抓紧抓好中央工作会议精神的学习和贯彻  主要纠正“左”的影响，也不能忽视对右的或其他错误思想的纠正","authors":[],"dates":[{"year":1981,"month":4,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"韦国清在深入部队调查研究后指出"},{"type":"paragraph","text":"抓紧抓好中央工作会议精神的学习和贯彻"},{"type":"paragraph","text":"主要纠正“左”的影响，也不能忽视对右的或其他错误思想的纠正"},{"type":"paragraph","text":"据新华社南京4月19日电 人民解放军总政治部主任韦国清最近指出，要把学习和贯彻中央工作会议精神，作为当前部队政治工作的中心，继续抓紧抓好。他说，要加强坚持四项基本原则的宣传教育，在主要纠正“左”的错误思想影响的同时，也不能忽视对右的或其他错误思想的纠正。"},{"type":"paragraph","text":"韦国清是在南京部队某军进行了十多天调查研究以后说这番话的。"},{"type":"paragraph","text":"韦国清说，学习和贯彻落实中央工作会议精神，重点要抓好团以上领导干部，要以中央工作会议文件为准进行工作。各级党委在抓好自身学习的同时，要不断研究新情况、新问题，做好宣传教育工作和大量艰苦细致的思想工作，对部队系统地进行党的十一届三中全会以来的路线、方针、政策的教育，并在教育中引导大家认真学习马列主义、毛泽东思想的基本理论，从根本上而不是从枝节上解决问题。"},{"type":"paragraph","text":"韦国清说，加强坚持四项基本原则的宣传教育，这是政治工作的根本任务，任何时候都不能有丝毫的动摇。坚持四项基本原则，有来自“左”的方面的干扰，也有来自右的方面的干扰。认为坚持四项基本原则会妨碍解放思想，认为强调解放思想就会脱离四项基本原则，这两种看法都是片面的。过去的一个时期内，由于我们党存在着“左”的指导思想，特别是“文化大革命”这一段，我们一些干部都不同程度地受到影响，有些干部对党的三中全会以来的路线、方针、政策不理解，主要是受“左”的方面的影响。我们军队对“左”的影响不能忽视。在主要纠正“左”的错误思想影响的同时，也不能忽视对右的或其他错误思想的纠正。不同地方，不同时间，不同问题，要按具体情况办。纠正“左”的和右的倾向，都不要随意上纲，不要人人过关，不要搞运动。"},{"type":"paragraph","text":"韦国清说，没有高度的精神文明，就失掉了精神支柱，就不能建设社会主义。我们是辩证唯物主义者，承认总的历史发展中是物质的东西决定精神的东西，是社会的存在决定社会意识；但是同时又承认而且必须承认精神的反作用，社会意识对社会存在的反作用。总政提出的“四有”、“三讲”、“两不怕”口号（即：有理想、有道德、有知识、有体力，讲军容、讲礼貌、讲纪律，不怕艰难困苦、不怕流血牺牲），并号召立志为人民作贡献，为祖国作贡献，为人类作贡献，是根据邓小平同志的意见，结合军队的实际提出来的。军队要按照这个要求去做，使我军的优良传统进一步发扬光大。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"90f5fc617b"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
