script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"chuanxinlu1","name":"十年文革中首长讲话传信录（上册）","internal":false,"type":"pdf","official":false,"author":"周良霄,顾菊英","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/十年文革中首长讲话传信录1.pdf"],"article":{"title":"吴德给职工同志们的一封信","parts":[{"type":"title","text":"245.吴德给职工同志们的一封信"},{"type":"paragraph","text":"(1996年11月10日)职工同志们："},{"type":"paragraph","text":"我正在开工作会议，不能来看你们，很抱歉。"},{"type":"paragraph","text":"现在把你们关心的一些问题提出个人意见和大家商量。"},{"type":"paragraph","text":"1．在这次文化大革命中，有些同志在政治上遭到打击，有的甚至被打成反革命，这是十分错误的，市委准备发一个通知，发到各单位，凡是革命群众在文化大革命中，受到迫害，被打成反革命的一律不算数，必须彻底平反，恢复名誉，并向这些同志赔礼道歉。"},{"type":"paragraph","text":"2．你们这次离开生产岗位，出来串连，发生在今日(11月10日)《人民日报》《再论抓革命促生产》社论之前，应当照发工资。同时，也不能对你们有任何歧视。"},{"type":"paragraph","text":"3．你们应当很好的学习十六条、中央关于抓革命促生产的通知和今天《人民日报》的社论。这些社论是根据毛主席一贯指示的精神写的。今后你们应当按照社论的精神来干，要做到抓革命促生产，学会搞好文化大革命的同时，把生产搞得更好，更好，更好，更好。我恳切希望你们很快回到工厂，回到生产岗位上，有什么具体情况和问题，随时写信告诉我。有关平反等问题，可和市委工交政治部接洽，具体解决。"},{"type":"paragraph","text":"此致"},{"type":"paragraph","text":"敬礼"},{"type":"paragraph","text":"吴德"},{"type":"paragraph","text":"66年11月10日"}],"authors":["吴德"],"dates":[{"year":1996,"month":11,"day":10}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":399,"page_end":399,"alias":""},"tags":[{"name":"吴德","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d3e2b83ca7"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
