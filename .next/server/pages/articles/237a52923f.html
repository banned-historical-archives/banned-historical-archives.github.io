<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"我们站在毛主席这一边","authors":[],"dates":[{"year":1967,"month":2,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"“因为我对毛主席无比热爱”"},{"type":"paragraph","text":"一月十三日下午三点多钟，五十七岁的越南装卸工人阮文资正在海防港口的三号码头工作。这时一位船员胸前佩戴的毛主席像章不慎掉到河里去了。阮文资看在眼里，毫不犹豫地冒着刺骨的寒风，跳进了冰凉的河水里，摸了一次又一次，终于把这枚闪闪发光的毛主席像章捞了上来。这时，在场的人们都为这位越南老工人热爱中国和世界人民伟大领袖毛主席的行动所感动。丢失像章的船员紧紧地握着阮文资的手，激动地一定要把这枚毛主席像章送给他作纪念，并亲自给他戴在胸前。"},{"type":"paragraph","text":"这位在旧社会饱受了封建地主和殖民主义者的欺凌与压榨的越南老工人，在谈到他为什么要不顾严寒跳下水去寻找毛主席像章时，满怀激情地说:在过去的战争年月里，中国人民遵循着毛泽东主席的教导，给了越南革命以最宝贵的支持。解放后，中国人民继续以崇高的国际主义精神，全力支援越南人民的抗美救国斗争。我虽然生活在离中国很远的海防，但是毛主席的伟大形象和中国人民坚决支援越南人民抗美救国斗争的高度热情却深深地铭刻在我的心中，毛泽东思想深深地记在我的头脑里。因为我对毛主席无比热爱、无比钦佩，所以当我看到毛主席像章掉到河里后，就不顾一切地跳到河里，一定要把像章捞起来。"},{"type":"paragraph","text":"阮文资最后激动地高呼:毛主席万岁!胡主席万岁!"},{"type":"paragraph","text":"今年得到的最珍贵礼物"},{"type":"paragraph","text":"最近，许多马里朋友得到了《毛主席语录》，他们都感到无比的欢欣鼓舞。马里一位记者得到法文版的《毛主席语录》时兴高彩烈地说:这是我在一九六七年所得到的最珍贵的礼物。一位曾经访问过中国的马里朋友在得到法文版的《毛主席语录》时，非常高兴地说:“如果把革命比作一棵树的话，那么《毛主席语录》就是这棵树的活力的源泉。”"},{"type":"paragraph","text":"杜加布古糖厂的一位车间主任说:“当我阅读《毛主席语录》的时候，我就充满了力量。这本书的每一段都是真理。”一个叫德拉马纳的马里技术人员在一个星期六深夜里得到《毛主席语录》，他马上就读起来。他对人说:在这本书里可以找到真正的革命理论。他说，人们要掌握了毛泽东思想，就不伯帝国主义。《毛主席语录》给了斗争中的人民以极大的鼓舞。"},{"type":"paragraph","text":"“支持毛主席正确路线”"},{"type":"paragraph","text":"一位中国同志正在哈瓦那的一条大街上行走，迎面而来的一辆卡车突然在路旁煞住，有人从车里伸出手来，向他摆动，高呼:“伟大的毛主席!”"},{"type":"paragraph","text":"当中国同志走近车旁，看清楚驾驶这辆卡车的是一位中年的古巴朋友，他正等着向中国同志说话。"},{"type":"paragraph","text":"“你们是毛主席那里来的人吧?”他亲切地注视着中国同志胸前别着的毛主席像章说:“我也是属于毛主席的人，我站在毛主席这一边。”"},{"type":"paragraph","text":"他告诉中国同志，他是一位古巴工人。他说，他支持毛主席的正确路线，对毛主席怀着无限的敬爱。他说:“我一看到他老人家的像，就脱帽致敬。”"},{"type":"paragraph","text":"“你瞧”，他从车里拿出一本毛主席著作单行本给中国同志看，一边说:“我经常把毛主席的著作带在身边，我一有空就阅读。毛主席的书说出了我们工人要说的心里话。”"},{"type":"paragraph","text":"他又拿出一本林彪同志的著作《人民战争胜利万岁》。他说，“这是一篇了不起的著作，我完全赞同这本书所论述的观点，它对全世界的人民战争是有很大的指导意义的。”"},{"type":"paragraph","text":"最后，他要求中国同志赠给他一枚毛主席像章，他说:“我们古巴工人多么想得到一枚毛主席像章，有些人已经得到了，难得今天碰见你，请你也给我一枚。”"},{"type":"paragraph","text":"中国同志把一枚毛主席像章别在他的胸前。他久久地爱抚着他胸前的毛主席像章，热情地说:“真伟大!”"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"人民战争","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"237a52923f"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
