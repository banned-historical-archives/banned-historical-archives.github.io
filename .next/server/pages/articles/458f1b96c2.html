script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"各地都该注意　地富入股剥削群众　合作社为谁办事？","authors":["海旺　寒生"],"dates":[{"year":1947,"month":12,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"各地都该注意"},{"type":"paragraph","text":"地富入股剥削群众"},{"type":"paragraph","text":"合作社为谁办事？编辑同志："},{"type":"paragraph","text":"合作社近来发现很多问题，出人意料的是斗争对象在合作社里存放大量股金，剥削群众生产红利。例如临城城关基点洞上村合作社，五十一个股东，共股金三十八万零四百元，其中九户斗争对象，即占股金八万四千四百元；而杨老红一户即入股四万三千二百元。同样，榆社二区仰天村，裴生福互助社，二十五户，六万元股金，贫农裴更维只有三百元，九户地富则有三万二千元！此外，长治三区六家村合作社，斗争对象的股金几乎超过翻身户的一倍（按户平均数）！这种情形相当普遍。其剥削群众情形：如六家村最近一次批红，翻身户七十六户，共批四十六万六千一百元；地富二十八户，共批三十四万一千九百元。按户平均，则为翻身户每户六千一百余元，地富每户一万二千二百余元，恰为一比二！该村憨狗说：这是给地主谋了利益啦。"},{"type":"paragraph","text":"我们的合作社，应该扶植雇贫生产，为群众办事；但上述合作社则是替地富办了事。令人惊奇的是：为什么合作社竟能允许斗争对象来变相剥削群众？为什么竟让地富股金占了贫、中农总和的一倍以上，还老老实实给人家分了大批红利？为什么没有及时发现、纠正？合作社领导是干甚的？村、区领导做什么去了？这里面实在大有问题！应立刻引起各地注意，并速求解决！"},{"type":"paragraph","text":"读者海旺、寒生"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"458f1b96c2"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
