<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"南宫东张家庄中共支部给毛主席写信贺年  报告棉花空前丰收","authors":[],"dates":[{"year":1950,"month":1,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"南宫东张家庄中共支部给毛主席写信贺年"},{"type":"paragraph","text":"报告棉花空前丰收"},{"type":"paragraph","text":"【新华社保定六日电】新年前夕，河北省南宫县东张家庄中共支部给毛主席写信贺年，报告一年的生产成绩。原信全文如下：敬爱的领袖毛主席："},{"type":"paragraph","text":"因为你的英明领导，我们都翻身了，都有了地种了。去年冬季我村彻底完成了土地改革，全村的农民每人都填补到三亩地和两间房屋，从此都有了生活和生产资料了。"},{"type":"paragraph","text":"今春，你的“生产长一寸”的号召传达到村里，正合大家发家致富的要求。因此全村都热烈响应了你的号召，作到了多施肥、精耕细作，还注意了提高生产技术，因此得到很大成绩。一般的庄稼收成达到了战前的产量，棉花产量还超过了战前。为了供给城市的工厂，供给建设工业化新中国的需要，县上分配给俺村种棉一千一百三十六亩的任务，还提出了每亩增产十斤棉花的具体要求。我们首先建立了村生产委员会，将种棉最有经验、技术最高的杜存和、孟宪辰、孟兴华等都吸收为委员，指导改进种棉的方法。"},{"type":"paragraph","text":"干部党员带头多种  能手指导改进技术"},{"type":"paragraph","text":"经过深入地宣传种棉的好处，大家种棉的情绪都非常高涨。干部党员带头多种，又加上种棉能手的指导，全村二百零四户，种棉一千二百六十一亩，占全村耕地的百分之四十五，超过任务一百二十五亩，比去年多种三百八十亩。由于普遍接受了改进播种方法，独脚耠耩耧大垅，所以春天地虽干燥，苗却都出的很齐全。大家改变了过去种棉少施肥的习惯，格外多施了肥。党员侯贵来同志十一亩茬地都种的棉花，上粪二十车，又施豆饼一千斤。孟润亭、孟晋三等每亩都施到细肥一百二十斤。"},{"type":"paragraph","text":"夏季棉花发育的时候，种棉能手指导大家普遍进行了多次的中耕、整枝、打卡、加工，棉棵都发长得非常壮，棵枝伸展，棉桃累累。六十二岁的农民孟荣坡，整夏季不曾歇过一次晌，整天价在棉地里锄，耘，打整。党员侯贵来，时常因整棉忘掉吃饭；党员孟庆信、侯文报，还有三十多个人，都把他们的棉花中耕和打整了四遍到五遍。"},{"type":"paragraph","text":"每亩平均产量百四十斤  最高者达二百八十五斤  棉花质量都合中级标准"},{"type":"paragraph","text":"秋后，我们总结了棉花的收成。产量最高的是孟兴华、侯贵来等四十多户，三百九十多亩，每亩合一百八十斤到二百八十五斤。孟兴华的三亩收了八百五十多斤。侯贵来的十一亩收了二千四百四十多斤。邓通海的四亩收了八百六十斤。一般的户，每亩都合到一百二十斤到一百五十斤。总计全村共产籽棉十七万六千五百多斤，每亩平均产量一百四十斤左右，比去年每亩平均增产约五十斤，超过了战前每亩最高产量二、三十斤；特别是棉花质量都合中级棉的标准。"},{"type":"paragraph","text":"全村群众都欢庆棉花空前的丰收，更加感激你领导的大恩，都表示坚决地永远跟着你走，过幸福自由的日子。"},{"type":"paragraph","text":"今年秋征，县里向我村征购五万斤籽棉。我村党员首先带头缴，全村都踊跃自报，不到五天就顺利完成，送站入仓，还多交了一千零六十二斤。政府按每斤籽棉折三斤七两小米的价格折成了小米，除抵交了今年全村应交的公粮，又找回了十一万七千零七十斤小米，每户平均找回六百斤米。"},{"type":"paragraph","text":"政府保证棉价  大家种棉情绪好  今年还要多种  保证产量再提高"},{"type":"paragraph","text":"棉花收成既好，政府又保证了棉价，因此大家明年种棉的情绪更高了。军属董文兰家，因为多交棉找回了一千二百斤小米，够全家二年的食粮，她计划把二十一亩地明年全部种棉。像这样的家户，我村还有不少。大家特别都要更多买肥，现在我村已买到豆饼十二万多斤。我们争取明年种棉种到全村耕地的百分之七十，施肥到每亩平均一百斤细肥。在今年的基础上，明年每亩再增产十斤到十五斤。"},{"type":"paragraph","text":"谨此报告，当作一九五○年的新年献礼。"},{"type":"paragraph","text":"敬祝你的身体健康"},{"type":"paragraph","text":"河北省南宫县东张家庄村支部"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2f903489b0"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
