script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji29","name":"毛泽东全集第29卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji29.pdf"],"article":{"title":"关于志愿军按预定计划入朝作战致邓华等电","alias":"","parts":[{"type":"paragraph","text":"关于志愿军按预定计划人朝作战"},{"type":"paragraph","text":"致邓华等电"},{"type":"paragraph","text":"（1950年10月18日）邓、洪、韩、解，并告贺副司令："},{"type":"paragraph","text":"四个军及三个炮师决按预定计划进入朝北作战，自明（十九日晚）从安东?和辑安线开始渡鸭绿江。为严格保守秘密，渡河部队每日黄昏开始至翌晨四时即停止，五时以前隐蔽完毕并须切实检查。为取得经验，第一晚（十九日晚）准备渡两个至三个师，·第二晚再增加或减少，再行斟酌情形，余由高岗、德怀面告。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十月十八日廿一时[1]邓华，当时任中国人民志愿军第十三兵团司令员兼政治委员。"},{"type":"paragraph","text":"[2]洪、韩，指洪学智、韩先楚，当时均任中国人民志愿军第十三兵团副司令员。解，指解方，当时任中国人民志愿军第十三兵团参谋长。"},{"type":"paragraph","text":"[3]指中国人民解放军东北军区副司令员贺晋年。[4]安东，即今辽宁丹东市。"},{"type":"paragraph","text":"[5]高岗，当时任中国人民解放军东北军区司令员兼政治委员。德怀，即彭德怀，当时任中国人民志愿军司令员兼政治委员。"}],"authors":["毛泽东"],"dates":[{"year":1950,"month":10,"day":18}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":255,"page_end":255},"tags":[{"name":"毛泽东","type":"人物"},{"name":"高岗","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c5c85f72fb"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
