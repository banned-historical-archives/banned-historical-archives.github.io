script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"高举毛泽东思想伟大红旗　以阶级斗争带动生产斗争  天津纺织工业战线取得优异成绩  广大革命职工坚决贯彻执行毛主席“必须把布匹抓紧”的指示，全市纺织工业总产值月月上升，产品产量大幅度增长，质量不断提高","authors":[],"dates":[{"year":1968,"month":6,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"高举毛泽东思想伟大红旗　以阶级斗争带动生产斗争"},{"type":"paragraph","text":"天津纺织工业战线取得优异成绩"},{"type":"paragraph","text":"广大革命职工坚决贯彻执行毛主席“必须把布匹抓紧”的指示，全市纺织工业总产值月月上升，产品产量大幅度增长，质量不断提高"},{"type":"paragraph","text":"据新华社天津十三日电　天津市纺织工业战线革命职工，在解放军支左人员的帮助下，高举毛泽东思想伟大红旗，坚决贯彻执行伟大领袖毛主席“必须把布匹抓紧”的指示，以阶级斗争带动生产斗争，整个纺织工业系统革命和生产形势一片大好，越来越好。"},{"type":"paragraph","text":"今年以来，全市纺织工业系统的总产值月月增长。棉布、棉纱、印染、呢绒和针织品等产品的产量大幅度上升，质量不断提高，花色品种不断增加。其中，棉纱、棉布的产量，五月份比四月份提高百分之二十四以上。"},{"type":"paragraph","text":"天津市纺织工业系统各级革命委员会和无产阶级革命派，牢记毛主席“千万不要忘记阶级斗争”的伟大教导，放手发动群众，严格区分两类不同性质的矛盾，团结一切可以团结的革命力量，主动地向阶级敌人发动猛烈进攻，挖出了隐藏在工厂企业内部的一小撮叛徒、特务、反革命分子，揭发和批判他们的罪行，对他们实行无产阶级专政，粉碎了他们妄图破坏革命和生产的种种阴谋诡计，调动了广大革命职工的生产积极性。天津第二棉纺织厂的广大革命职工用毛泽东思想武装起来，分析阶级斗争的新形势、新动向，擦亮眼睛，揪出了一小撮阶级敌人，革命和生产形势大好。这个厂四月份完成生产计划之后，五月份的棉布产量又比四月份增加百分之十三点五。"},{"type":"paragraph","text":"广大革命职工在人民解放军支左人员的帮助下，深入持久地开展革命大批判，肃清中国赫鲁晓夫等党内一小撮最大的走资派及其在天津的代理人在纺织工业系统中散布的反革命修正主义流毒。广大革命职工在开展革命大批判过程中，坚决贯彻执行毛主席的“抓革命，促生产”的伟大方针，以百倍的革命干劲搞好生产。许多工厂的革命职工以革命大批判为武器，打破旧框框、洋教条，开展了群众性的技术革新活动。天津市色织四厂、色织十四厂的革命职工，自力更生，奋发图强，创造了浆纱分纱装置等革新项目，显著地提高了生产效率。"},{"type":"paragraph","text":"天津市纺织工业系统各级革命委员会，遵照毛主席关于“革命委员会要实行一元化的领导，打破重叠的行政机构，精兵简政，组织起一个革命化的联系群众的领导班子”的教导，减少机构层次，实行精兵简政。各级革委会成员和广大革命干部深入到车间、班组，同工人一起劳动，一起学习，一起开展革命大批判，狠抓革命，猛促生产。天津麻纺厂的一百四十名科室干部，大多数已充实到生产第一线去。厂革委会十四名委员，除留下值班人员处理日常工作以外，全部到车间、班组参加生产劳动，推动了革命和生产的发展。这个厂去年完成全年生产计划之后，今年以来又月月完成生产计划。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"天津文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"军队支左","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5d757cc3b0"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
