script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji25","name":"毛泽东全集第25卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji25.pdf"],"article":{"title":"东北主力是否早日人关为好叫","alias":"","parts":[{"type":"paragraph","text":"东北主力是否早日人关为好！"},{"type":"paragraph","text":"（1948年11月16日）林、罗、刘："},{"type":"paragraph","text":"十五日十三时电悉。你们提出的问题，我们曾经考虑过，认为如以杨罗耿部?位于绥?东与杨成武?集结一起，可以阻止傅作义?部向绥远撤退，但不能阻止傅部及中央军向海上撤退，包围张家口也不能达此目的。因敌共有三十五个步兵师、四个骑兵师，敌如决心从海上撤退，可以集中十几个师将张家口之敌接出来，集中于津"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军委起草的给东北野战军司令员林彪、政治委员罗荣桓和参谋长刘亚楼的电报。"},{"type":"paragraph","text":"[2]指1948年11月15日13时林彪、罗荣桓和刘亚楼给中共中央军委的电报。电报说：我们建议徐周、杨罗两部除留一部监视太原外，应集中力量迅速包围保定或张家口、切断其与北平的联络。对所包围之敌，采取围而不攻的办法，以达到拖住敌人的目的。使傅作义及其所属之中央军，既不能撒手南下，亦不能撤退绥远，亦不能集中兵力守天津或守北平。如我不攻城，他来增援则正便于我军歼灭，等到东北部队南下后，再同时合力发动攻势，歼灭全部敌人。"},{"type":"paragraph","text":"[3]杨罗耿部，指华北军区第二兵团，兵团司令员杨得志、政治委员罗瑞卿、参谋长耿飚。"},{"type":"paragraph","text":"[4]绥，指绥远，旧省名，辖今内蒙古自治区中部地区，1954年撤销。[5]杨成武，当时任华北军区第三兵团司令员。沽逐步船运。保定守军是两个由保安队组成的师，包围与否不关大局，近亦有撤退模样。承德敌人已撤退。徐周\"所部十万人近月打得很苦，伤亡二万，可以停止对太原的攻击，但要他们将已攻占的阵地放弃，并开至张家口去担负包围任务，一则阎?匪将出城滥扰；二则部队情绪上转不过来；三则我军未到张家口，而张家口之敌势将惧歼先逃。且张家口驻敌甚少，原只一个由保安队组成的师，现闻增加一个师，待证。傅部主力均在北平附近。我们曾考虑过你们主力早日入关，包围津沽、唐山，在包围姿态下进行休整，则敌无从从海上逃跑。请你们考虑，你们究以早日入关为好，还是在东北完成休整计划然后入关为好，并以结果电告为盼。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"十六日四时"},{"type":"paragraph","text":"[1]徐周，指徐向前、周士第，当时分别任华北军区第一副司令员、第一兵团司令员兼政治委员和第-一兵团副司令员兼副政治委员。"}],"authors":["毛泽东"],"dates":[{"year":1948,"month":11,"day":16}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":227,"page_end":228},"tags":[{"name":"杨成武","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6c5f2bf110"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
