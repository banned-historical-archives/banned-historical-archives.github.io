<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"苏修残酷剥削和掠夺第三世界","authors":[],"dates":[{"year":1975,"month":9,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"苏修残酷剥削和掠夺第三世界"},{"type":"paragraph","text":"苏修打着“社会主义”的旗号，挂着“天然盟友”的招牌，残酷剥削和掠夺第三世界国家。"},{"type":"paragraph","text":"一、以“援助”第三世界国家发展重工业和基础工业为名，推销陈旧落后的机器设备。据苏修供认，它对发展中国家的“援助”，百分之七十六点四为工业和动力，百分之七点九为运输和邮电，两者共占百分之八十四点三。苏修向第三世界出口的机器装备和运输车辆，大部分用于“援”建项目。去年，苏修对印度出口八千二百多万卢布的机器装备中，用于“援”建项目的就达五千四百多万卢布。苏修这样做，不仅推销陈旧机器，而且控制受“援”国的经济命脉。"},{"type":"paragraph","text":"二、搜刮和掠夺原料。苏修除了以“援助”进行地质和矿藏勘探为名，窃取第三世界国家的资源情报以外，还迫使第三世界国家用苏修“援”建企业的产品（天然气、石油、铝矾土、有色金属精矿和其它矿产品）、各种原料和传统出口商品，偿还它“援助”的所谓贷款。苏修供认，一九七四年，苏修从发展中国家进口的全部商品中，“一半是作偿还贷款用的”。一九七三年，苏修从发展中国家进口的原料，占它的原料进口总额的百分之七十三以上。一九七四年，苏修进口棉花的百分之九十二，小件皮革的百分之九十四，羊毛的百分之二十九，包装麻布、可可豆等的百分之百，柑桔的百分之六十九，棉花的百分之六十，都来自发展中国家。"},{"type":"paragraph","text":"三、贵卖贱买，牟取暴利。苏修向第三世界出口的机器设备，价格比国际市场价格要高百分之十五到二十五，而从第三世界进口的初级产品，价格却被压得比国际市场要低百分之十到十五。据估计，从一九五五年到一九七三年，苏修通过这种剪刀差掠夺了一百十三亿美元。据苏修官方承认，它在同发展中国家的贸易中，顺差越来越大。这种顺差，一九六五年为二亿七千六百万卢布，一九七四年达到十亿零四百万卢布。"},{"type":"paragraph","text":"四、争夺势力范围，谋求霸权。苏修以“援助”、“贸易”为名向第三世界推行新殖民主义，竭力同美帝争夺势力范围，谋求霸权。苏修提供“援助”最多的地区，首先是中东，占百分之四十点七，其次是南亚，占百分之三十六点九。随着美国在东南亚的侵略势力不断衰落，近年来苏修打着“贸易”的幌子，千方百计地向这一地区扩张。以一九七四年同一九七三年相比，苏修同印度尼西亚的贸易总额增加了三倍，同马来西亚和新加坡的贸易都增加了将近一倍，同泰国的贸易增加了一点四倍。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a11f20e994"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
