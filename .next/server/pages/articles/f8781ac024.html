script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共中央关于积极领导宗教革新运动的再次指示","authors":[],"dates":[{"year":1951,"month":4}],"is_range_date":false,"parts":[{"text":"中共中央关于积极领导宗教革新运动的再次指示","type":"title"},{"text":"据中央宣传部陈克寒同志由长春返称：“据长春市委宣传部长赵东黎同志谈：长春基督教在日伪时期即已被根本摧毁而销声匿迹，近来竟有人利用“抗美援朝，三自革新”口号，乘我领导机关未予注意，不但死灰复燃，而且由六、七百人迅速发展到约七千人。他们利用群众害怕战争的心理，在居民中宣传入教忏悔，始能免劫，并曾有南京来人与他们联络，值得警惕”。等语此外在山西省亦有发生天主教反动领袖伪称抗美援朝，在早日瓦解的农村教会组织中大肆活动，亦因我领导机关未予注意，竟被收集起数县旧有教徒，重新举行多年未有之盛大宗教仪式情事。现时帝国主义分子正想种种办法来抵抗我们的镇压反革命与宗教革新工作，故上述情况深堪注意。上述情况之发生，根本是由于我们的许多干部还未对宗教问题采取积极态度，听其自然，而不了解宗教问题是目前反帝、镇压反革命斗争中的一个重要环节。为引起各地各级干部注意，特再指示下列两点：","type":"paragraph"},{"text":"第一、我们对任何宗教活动均以改造而不发展亦不禁止为根本原则，故凡已多年无宗教活动的地区，应当不再恢复宗教活动，亦不要进行宗教革新运动，更不要允许外面再来人传教或重整教务。只在确有群众继续信教地区始允原有传教人员或外来的确属可靠的革新派分子，在原有教徒中传教，但亦不允许在教堂以外传教，此事望东北、华北根据具体情况，作出进一步指示。","type":"paragraph"},{"text":"第二、对确仍信教的教徒群众，我们应看作统一战线的重要对象，对他们的政治性活动予以积极的善意指导，以达到他们政治上完全脱离帝国主义反动分子而受我领导之目的。故各县、市抗美援朝会或其他人民团体负责人，均应经常邀集当地教徒群众(如能与革新派积极分子共同邀集更好，但不要等待上面的革新分子下来，亦不要等待上面的宗教事务处派人下来，这是很困难的)，根据中央历次指示和报纸材料(这些材料各省可自行编印分发)，直接向他们宣传抗美援朝反帝爱国，宣传人民政府的宗教政策；向他们揭发帝国主义利用天主教、基督教进行侵略、特务活动和压迫中国神甫、牧师、教徒、人民的罪恶；鼓励他们进行抗美援朝反帝革新的学习运动和控诉运动；劝告他们不可听信帝国主义分子曲解三自运动、污蔑人民政府的反动言论，如果听到或看到这种反动宣传，即应报告政府；他们如有疑虑和困难，我们均应善意耐心解释，帮助他们的进步。只有我们如此积极地、大张旗鼓地在口头上和报纸上向他们宣传，而不是消极等待他们自己起来反帝革新，更不是听任反动分子继续操纵他们的活动，才能帮助各种宗教的广大教徒迅速脱离帝国主义和反动分子的影响，把他们吸引到人民民主统一战线中间来，帮助他们中间的真正爱国分子取得领导地位，以便彻底挖掉帝国主义在中国的根子，不让宗教成为反革命的藏身地。此种对教徒群众经常直接进行的爱国宣传十分重要，务望各地在准备“五一”工作中抓紧进行，作出成绩，动员他们“五一”爱国示威，并使宗教界反帝革新运动趋于普遍，打破目前的零乱、散漫、无领导状况为要。","type":"paragraph"}],"comments":[],"origin":"根据档案材料翻印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f8781ac024"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
