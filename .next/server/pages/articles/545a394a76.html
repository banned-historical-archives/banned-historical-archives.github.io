" crossorigin="">{"props":{"pageProps":{"books":[{"id":"46b4e27a-b129-b9c7-da66-d93579cc36ad","name":"马克思恩格斯选集 第二卷（1972年5月）","internal":false,"official":true,"type":"pdf","author":"马克思、恩格斯，人民出版社1972年5月","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives4/main/46b4e27a-b129-b9c7-da66-d93579cc36ad.pdf"],"article":{"title":"给工人议会的信","alias":"","parts":[{"type":"paragraph","text":"马克思给工人议会的信"},{"type":"paragraph","text":"1854年3月9日于伦敦"},{"type":"paragraph","text":"索荷区第恩街28号"},{"type":"paragraph","text":"非常遗憾，我不能，至少目前不能离开伦敦，因此不可能亲自来表达我在接到要我作为名誉代表参加工人议会66的邀请时所感到的骄傲和感激的心情。召开这个议会的事实本身，证明世界历史上的新时代已经到来。这个不平常的事件的消息将会唤起欧美各地工人的希望。"},{"type":"paragraph","text":"在世界各国当中，大不列巅是资本专横和劳动被奴役达到了顶点的国家。在任何一个国家中，对于拥有整批产业军的百万富翁和勉强度日的雇佣奴隶之间的中间阶层，都没有消灭得这样彻底。这里已经没有欧洲大陆各国那样的几乎在同等程度上依靠自已的财产和自已的劳动的人数众多的农民和手工业者阶级。在大不列颠，财产同劳动已经完全分离。因此在其他任何一个国家中，组成现代社会的两个阶级之间的战争都没有这样巨大的规模，没有这样清晰可见的轮廊。"},{"type":"paragraph","text":"正因为这样，大不列颠的工人阶级最先准备好并且最先负有使命来领导最终必然使劳动得到彻底解放的伟大运动。它所以如此，是因为它清楚地认识到自已的地位，数量上的极大优势，过去的艰苦斗争的经验和现在的精神力量。"},{"type":"paragraph","text":"大不列颠的千百万工人第一个奠定了新社会的真实基础一一把自然界的破坏力变成了人类的生产力的现代工业。英国工人阶级以不解的毅力、流血流汗、绞尽脑汁，为使劳动变成高尚的事业并把劳动生产率提高到能造成产品普遍丰富的水平创造了物质前提。"},{"type":"paragraph","text":"英国工人阶级既然创造了现代工业的无穷无尽的生产力，也就实现了解放劳动的第一个条件。现在它应当实现解放劳动的第二个条件。它应当把这些生产财富的力量从垄断组织的无耻的棚锁下解放出来，使它们受生产者的集体监督，这些生产者置到今大还在听任自己劳动的产品本身转过来反对自己，变成压迫他们自已的工具。"},{"type":"paragraph","text":"工人阶级征服了自然，而现在它应当去征服人了。工人阶级有足够的力量来胜利地完成这个事业，但是需要把所有这些力量组织起来，在全国范围内把工人阶级组织起来一一我认为这就是摆在工人议会面前的伟大而光荣的目标。"},{"type":"paragraph","text":"如果工人议会仍然忠于使它产生的那个思想，未来的历更学家将这样来写：1854年英国有两个议会一一伦敦议会和曼彻斯特议会，即富人的议会和穷人的议会，一一但是真正的人只出席了工人的议会而没有出席老板们的议会。"},{"type":"paragraph","text":"忠实于你们的卡尔·马克思写于1854年3月9日"},{"type":"paragraph","text":"原文是英文载于1854年3月18日"},{"type":"paragraph","text":"选自《马克思恩格斯全集》《人民报》第98号"},{"type":"paragraph","text":"第10卷第133一134页"}],"authors":["马克思"],"dates":[{"year":1854,"month":3,"day":9}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":86,"page_end":87},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"545a394a76"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
