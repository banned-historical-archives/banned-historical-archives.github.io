script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反对垄断资产阶级的反动统治　反对政府反动的内外政策  美国万名群众示威游行反对尼克松上台  示威群众用石块、泥块和棍棒作武器同法西斯警察进行英勇搏斗","authors":[],"dates":[{"year":1969,"month":1,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反对垄断资产阶级的反动统治　反对政府反动的内外政策"},{"type":"paragraph","text":"美国万名群众示威游行反对尼克松上台"},{"type":"paragraph","text":"示威群众用石块、泥块和棍棒作武器同法西斯警察进行英勇搏斗"},{"type":"paragraph","text":"新华社二十日讯　华盛顿消息：在美国反动统治集团的新头目尼克松即将粉墨登场就任总统的前夕，约一万名美国青年和其他阶层的人民群众十九日在华盛顿举行声势浩大的示威游行，反对尼克松上台，反对垄断资产阶级的反动统治，反对美国政府反动的内外政策。"},{"type":"paragraph","text":"示威群众首先在华盛顿纪念碑前举行集会，然后十人一排，高举着“尼克松是头号战犯”、“尼克松是亿万富翁的工具”等标语牌，高呼着谴责尼克松和反对侵略越南的口号，举行示威游行。浩浩荡荡、长达一公里的示威队伍，从白宫附近的华盛顿纪念碑出发后，沿着宾夕法尼亚大街，直奔国会大厦。示威群众采取的这个游行路线，和尼克松预定在二十日举行就职典礼时行进的路线恰恰相反。他们以此来表示要同尼克松政府进行坚决的斗争。"},{"type":"paragraph","text":"示威队伍的前列由一批反对侵略越南战争的美国现役士兵所组成。他们冲破了美国反动政府和法西斯军队的重重束缚，勇敢地参加了这次反对尼克松政府的示威行列。"},{"type":"paragraph","text":"被这次强大示威吓破了胆的美国反动统治集团，出动了大批警察对游行队伍不断进行阻挠和寻衅，但是示威群众毫不畏惧，他们不断冲破法西斯警察的阻拦，并且用石块、泥块和棍棒作武器同镇压他们的法西斯警察进行了多次英勇的搏斗。"},{"type":"paragraph","text":"在示威游行结束以后，四千多名示威群众，又再接再厉地包围了即将上台的副总统阿格纽举行就职招待会的会场，并再次同法西斯警察进行了激烈的搏斗。"},{"type":"paragraph","text":"这次声势浩大的示威游行，给了即将上台的美帝头子尼克松当头一棒。这不仅表明了美国人民正在迅速觉醒，而且预示着美国的人民群众运动必将进一步高涨。面对美国人民的斗争怒潮，可以肯定，尼克松的日子只能是比约翰逊更加难过。（附图片）"},{"type":"paragraph","text":"一月十九日，约一万名美国青年和其他阶层的人民群众在华盛顿举行声势浩大的示威游行，反对美国反动统治集团的新头目尼克松上台就任总统，反对垄断资产阶级的反动统治及其反动的内外政策。图为行进在宾夕法尼亚大街上的示威群众。"},{"type":"paragraph","text":"新华社发（传真照片）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"越南战争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ae5e18b6cd"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
