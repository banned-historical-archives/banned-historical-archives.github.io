script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"甘肃冶金公司各级革委会千头万绪抓根本  用毛泽东思想统帅社会主义革命竞赛  今年以来，日产水平稳步上升，主要产品产量大幅度增长","authors":[],"dates":[{"year":1970,"month":3,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"甘肃冶金公司各级革委会千头万绪抓根本"},{"type":"paragraph","text":"用毛泽东思想统帅社会主义革命竞赛"},{"type":"paragraph","text":"今年以来，日产水平稳步上升，主要产品产量大幅度增长"},{"type":"paragraph","text":"据新华社兰州十四日电　甘肃冶金公司各级革委会用毛泽东思想统帅革命竞赛，不断解决干部、群众在竞赛中出现的活思想，使社会主义革命竞赛一浪高过一浪，不断向前发展。"},{"type":"paragraph","text":"去年，这个公司社会主义革命竞赛开始后，公司革委会针对部分同志的自满情绪，领导群众大办各种类型的毛泽东思想学习班，认真学习毛主席的有关教导，大讲开展革命竞赛的重大意义。同时派人到东北红透山铜矿，学习红透山铜矿革命工人发扬“自力更生”、“艰苦奋斗”的革命精神，多快好省地把一个后进的中型矿山，建设成大型矿山的先进经验。这样，全公司很快掀起了社会主义革命竞赛的热潮。为了推动社会主义革命竞赛不断深入发展，公司各级革委会遵照毛主席的有关教导，深入群众，深入基层，及时发现、总结和推广开展社会主义革命竞赛的典型经验，运用典型指导一般，推动全局。"},{"type":"paragraph","text":"在一派大好形势下，这个矿的少数领导成员和群众又产生了和平麻痹思想。他们忙于生产，忽视了阶级斗争和革命大批判，一小撮阶级敌人便乘机煽动无政府主义，妄图破坏社会主义建设。公司革委会认真分析了这种情况，认识到要完成紧张的生产任务，把革命竞赛深入持久地开展下去，必须以阶级斗争为纲，不断开展革命大批判。于是，他们就组织各级领导班子成员和广大革命群众，大学毛主席关于阶级和阶级斗争的论述，大摆阶级斗争的新动向，狠批叛徒、内奸、工贼刘少奇的“阶级斗争熄灭论”。通过这些活动，大大提高了各级领导班子成员和广大革命群众的阶级斗争观念，提高了革命警惕性。他们主动地向一小撮阶级敌人进攻，狠狠地打击了阶级敌人的破坏活动，使全公司的社会主义革命竞赛又出现了一个蓬蓬勃勃的新局面。"},{"type":"paragraph","text":"这个公司去年提前超额完成了国家规定的各项任务，生产上取得了显著成绩。今年一开始，一些同志中又产生了松劲情绪，对开展社会主义革命竞赛也没有去年抓得紧了。这种思想刚一露头，公司各级革委会就及时组织广大群众举办各种类型的毛泽东思想学习班，反复学习毛主席的重要指示和中央两报一刊元旦社论，用毛主席的“备战、备荒、为人民”的伟大战略思想武装头脑，大家越学方向越明，越学干劲越大，他们决心在伟大七十年代的第一年，一定要把社会主义革命竞赛更加深入持久地开展下去，以更加优异的成绩，为伟大领袖毛主席争光，为伟大的社会主义祖国争光。广大工人把社会主义革命竞赛和斗、批、改任务紧密地结合起来。他们在竞赛中建立和健全了必要的规章制度，有力地推动了生产的进一步发展。"},{"type":"paragraph","text":"甘肃冶金公司各级革委会由于不断地用毛泽东思想解决革命竞赛中出现的新问题，有力地促进了革命和生产的发展。全公司活学活用毛泽东思想的群众运动蓬勃开展，斗、批、改步步深入，先进典型不断涌现。全公司在去年超额完成国家计划的基础上，今年以来，日产水平稳步上升，二月平均日产量比一月提高百分之二点六，三月上旬又比二月提高百分之十三点五，主要产品的产量比去年同期又有大幅度的增长。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"甘肃文革","type":"人物"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"baca8dcbd6"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
