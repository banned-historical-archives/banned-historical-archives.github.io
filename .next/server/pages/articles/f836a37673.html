" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji48","name":"毛泽东全集第48卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji48.pdf"],"article":{"title":"路过济南在火车上听取汇报时的指示","alias":"","parts":[{"type":"paragraph","text":"路过济南在火车上听取汇报时的指示"},{"type":"paragraph","text":"（1965年11月）毛泽东：你们有没有钢？答：准备搞吨，将来再发展到口万吨。主席：哦，搞口口口吨，那好。"},{"type":"paragraph","text":"我对这一条比较积极，我是支持地方的。各省总要有个口万吨的钢铁厂，能制造机器，制造武器。我不怕你们造反，我自己也是造反的，造了多少次反，袁世凯当皇帝逼出了个蔡造反。如果中央出了军阀，出了修正主义，你们就可以造反。但是你们不能随便造反，不能造马列主义的反，否则你们就会吃亏，会成为修正主义。一个省也造不起反来。一个省搞点钢！搞口万吨左右的钢铁厂，一翻口万吨，再一翻口口万吨，再一翻口口万吨。但是要有条件。没有条件就不能炼钢。"},{"type":"paragraph","text":"[1]1965年11月，毛泽东去华东路过济南，在火车上，有关领导向毛泽东汇报工作。这是毛泽东在听取报告时的指示。"}],"authors":["毛泽东"],"dates":[{"year":1965,"month":11}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":246,"page_end":246},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f836a37673"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
