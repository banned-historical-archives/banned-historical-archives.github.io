script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"希尔主席在雅加达“阿里亚哈姆”社会科学学院讲话  反对现代修正主义的斗争应该进行到底","authors":[],"dates":[{"year":1964,"month":12,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"希尔主席在雅加达“阿里亚哈姆”社会科学学院讲话"},{"type":"paragraph","text":"反对现代修正主义的斗争应该进行到底"},{"type":"paragraph","text":"新华社雅加达十七日电  据印度尼西亚共产党新闻局七日发表的新闻公报说，澳大利亚共产党（马克思列宁主义者）主席希尔十二月二日在这里的印度尼西亚“阿里亚哈姆”社会科学学院说，赫鲁晓夫的下台是世界马克思列宁主义者的胜利，但是反对现代修正主义的斗争还没有结束，应该进行到底。"},{"type":"paragraph","text":"希尔详细地谈到了澳大利亚工人阶级的斗争史，澳大利亚马克思列宁主义者粉碎现代修正主义的历史，澳大利亚马克思列宁主义者反对在澳大利亚工人阶级中间有很大影响的社会民主主义者的胜利的斗争史。"},{"type":"paragraph","text":"希尔说：“社会民主主义是帝国主义者通过国家机器采取一些改良主义措施来实现他们的愿望和维护他们的最高利益的工具。”"},{"type":"paragraph","text":"希尔说：“澳大利亚现在还存在着这种现代修正主义。他们主张通过帝国主义国家的国家工具，例如它的议会来继续实行‘和平过渡’的斗争。”"},{"type":"paragraph","text":"希尔说，“澳大利亚工党（现代修正主义者也遵循它的政策）明目张胆地帮助帝国主义镇压工人。"},{"type":"paragraph","text":"“当各国人民反对帝国主义的斗争蓬勃高涨，工人反对帝国主义的斗争越来越尖锐的时候，修正主义者以他们的修正主义理论出来帮助帝国主义者，使其摆脱目前的处境。”"},{"type":"paragraph","text":"希尔接着说：“当社会民主主义同帝国主义结成一伙，当修正主义者出来帮助他们的时候，马克思列宁主义者非常需要团结起来。”"},{"type":"paragraph","text":"希尔说，赫鲁晓夫成了第五纵队，“老的澳大利亚共产党的领导人服从赫鲁晓夫的指挥棒，而赫鲁晓夫本人听命于他的主子美帝国主义。”"},{"type":"paragraph","text":"希尔说：“因此，我们可以清楚地看出，修正主义实际上是挂着共产主义的招牌的社会民主主义。”"},{"type":"paragraph","text":"希尔说，他的党和澳大利亚的所有马克思列宁主义者坚决支持印度尼西亚人民粉碎新殖民主义产物“马来西亚”的斗争以及所谓“马来西亚”国家的人民反对帝国主义和殖民主义，争取民族独立的斗争。"},{"type":"paragraph","text":"他指出，澳大利亚工人高度评价印度尼西亚人民和印度尼西亚共产党在伟大的马克思列宁主义者艾地同志的领导下进行的反对帝国主义、封建主义和现代修正主义的斗争。他说，澳大利亚工人对印度尼西亚共产党反对现代修正主义的斗争致以最崇高的敬礼。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"33b1942f94"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
