" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoistlegacy.de-1117","name":"中共中央办公厅关于印发中央为甘肃、河南、陕西等省地下党被诬陷为‘红旗党’问题平反的通知","author":"中共中央办公厅","internal":false,"official":false,"type":"unknown","files":[],"article":{"title":"中共中央办公厅关于印发中央为甘肃、河南、陕西等省地下党被诬陷为‘红旗党’问题平反的通知","dates":[{"year":1981,"month":9,"day":9}],"is_range_date":false,"authors":["中共中央办公厅"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"中共中央组织干审局, 干审工作政策文件选编(上), 890-892","tags":[{"name":"地下党","type":"主题/事件"},{"name":"国民党","type":"主题/事件"},{"name":"康生","type":"主题/事件"},{"name":"起义投诚人员","type":"主题/事件"},{"name":"中共中央","type":"主题/事件"}],"parts":[{"type":"title","text":"中共中央办公厅关于印发中央为甘肃、河南、陕西等省地下党被诬陷为“红旗党”问题平反的通知"},{"type":"subtitle","text":"1981年9月9日 · 中办发〔1981〕34号"},{"type":"paragraph","text":"中央决定：为所谓“红旗党”一案正式平反。现通知如下："},{"type":"paragraph","text":"在一九四三年的延安审干运动中，康生曾把原甘肃地下党的一个同志打成所谓“红旗党”，诬陷这个同志是国民党派进来的“特务”，并据此椎断“红旗政策是国民党在其统治区对共产党实行内奸政策的一个新策略”。还以“抢救失足者”为名，大搞逼供信，制造了所谓“红旗党”一案。甘肃、河南、陕西、四川、湖南、湖北、云南、贵州、浙江、广西等地区的地下党都被诬陷为“红旗党”，不少地下党员被打成“特务”、“叛徒”、“内奸”。"},{"type":"paragraph","text":"延安审干后期，中央发现康生制造的所谓“红旗党”一案纯属假案，及时进行了纠正，给受到冤屈的同志平了反。但对整个所谓“红旗党”的问题，限于当时的历史条件，未能作出全面的结论。经过抗日战争、解放战争考验以及建国以来的历次重大政治运动和多次审干的审查，证明上述各地的地下党组织都是我们党的一部分。在抗日战争时期、解放战争时期，这些地区的地下党组织都曾英勇地领导了人民群众参军、参战和从事各种对敌斗争的活动，有力地支援了革命战争。在抗日和反对国民党反动派的斗争中，很多同志为党为人民作出了重大贡献，许多同志壮烈牺牲。把这一部分同志诬陷为“红旗党”是根本错误的。在“文化大革命”中，这一历史问题又被翻腾出来，许多同志再次遭到诬陷和残酷斗争。有的甚至被迫害致残、致死。"},{"type":"paragraph","text":"为了彻底解决所谓“红旗党”的历史遗留问题，消除康生制造这一假案所造成的不良后果，中央决定给甘肃、河南、陕西、四川、湖南、湖北、云南、贵州、浙江、广西以及其它地区被诬陷为“红旗党”的地下党组织正式平反，推倒强加给这些地下党组织的一切诬蔑不实之词；对因此案受到迫害的同志要彻底平反，致死的同志予以昭雪（不开追悼会有的同志因此失掉了党籍，要根据具体情况，妥善解决；人事、干部档案中如有这类不实之词的材料，要取出销毁。希望曾在这些地下党组织中工作过的同志坚持为党为人民奋斗到底的革命精神，紧密地团结在党中央的周围，坚决贯彻执行党的十一届三中全会以来的路线、方针、政策，为把我国建设成为高度民主、高度文明的社会主义现代化强国作出更大的贡献。"}],"alias":""},"tags":[{"name":"康生","type":"人物"},{"name":"河南文革","type":"人物"},{"name":"陕西文革","type":"人物"},{"name":"甘肃文革","type":"人物"},{"name":"四川文革","type":"人物"},{"name":"湖北文革","type":"人物"},{"name":"湖南文革","type":"人物"},{"name":"浙江文革","type":"人物"},{"name":"云南文革","type":"人物"},{"name":"贵州文革","type":"人物"},{"name":"广西文革","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7cddfc07e0"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
