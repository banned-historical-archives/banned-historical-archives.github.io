" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中央首长第六次接见石家庄天津张家口唐山代表的讲话","authors":["谢富治","陈伯达"],"dates":[{"year":1967,"month":9,"day":14}],"is_range_date":false,"parts":[{"text":"中央首长第六次接见石家庄天津张家口唐山代表的讲话","type":"title"},{"text":"陈伯达谢富治","type":"authors"},{"text":"〖时间：一九六七年九月十四日三点十七分至五点四十五分，地点：人民大会堂。〗","type":"appellation"},{"text":"陈伯达同志：今天是一个革命的大联合的会议，天津联合了没有？（答：没有。）可惜！你们心能安吗？就是我们着急，你们不着急？！天津上次那三条你们看到了没有？你们看一看就知道工人阶级利害关系是一致的。没有任何理由，你们天津工人阶级分两大派打来打去敌人高兴，我们不高兴。","type":"paragraph"},{"text":"毛主席告诉我们：“工人阶级是一个阶级，工人阶级内部没有什么根本的利害冲突，没有什么理由分成两大派。”听懂吗？（答：听懂了）明天《人民日报》有篇社论，希望同志们好好读一读，里边引用了毛主席一段很重要的话，对你们两大派、三大派都有很大的教育意义，你们好好读一读好不好呀！（答：好！）你们石家庄已经签订了协议，我们工人阶级就是一个派，就是无产阶级的党性，一个阶级不是什么派别，我们讲的都是工人阶级，一个阶级么！没有讲什么派别么！","type":"paragraph"},{"text":"天津附近天津的各派不管那派，也不管那个学校，如果到农村里边制造派别，制造武斗，抢收庄家，那是罪过，绝对不允许的。（严肃）郊区的农业生产，按照往年一样，那个生产队生产的，那个生产队收购，一定要割好、收好、捆好、分得好，不能抢公家庄稼，如果那一派有动员农民抢割，那是很大的罪过，历史是不能宽恕你们的，大联筹要特别注意。","type":"paragraph"},{"text":"告诉你们，今年收成是空前的好，农民希望丰产、丰收，丰产要不丰收可能由你们下去的人挑动起来的。现在大家不去干了，要把脚停下来，要把手停下来，要把口停下来，农民要按生产队去收割，收割好，保存好，分配好，你们不要去干涉，这对你们是一个劝告，也是一个警告，我看无产阶级革命派都会懂这个意思的，赞成不赞成？（答：赞成）","type":"paragraph"},{"text":"郑维山：我建议天津、石家庄、张家口、唐（山）、秦（皇岛），马上打电话把这个指示传达下去，同意不同意？（答：同意）","type":"paragraph"},{"text":"谢富治：下一步搞政治协议，根据江青讲话抓大方向，抓大批判，要搞大联合。我们伟大领袖毛主席很关心革命派的大联合，革命派都是工厂的工人，都是工人阶级，为什么不能联合起来呢？一个学校的学生为什么不能联合呢？联合起来对抓革命促生产有利，对国家对人民有利，只有对一小撮走资派没有利，对英国、美国、苏修、印度反动派都不利，对革命都有利。我们有联合的基础，你们都是工人阶级，应该联合，而且所有的造反派及全体人员都要联合，不能打内战。下一步最关键的关键是革命的大联合，搞筹备小组，到革命委员会。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"谢富治","type":"人物"},{"name":"陈伯达","type":"人物"},{"name":"天津文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"武斗","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8044f9c195"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
