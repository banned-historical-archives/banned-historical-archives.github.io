script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"毛主席陪同胡主席观看文艺演出  黎笋等同志由薄一波等陪同参观了北京车站","authors":[],"dates":[{"year":1960,"month":12,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席陪同胡主席观看文艺演出"},{"type":"paragraph","text":"黎笋等同志由薄一波等陪同参观了北京车站"},{"type":"paragraph","text":"新华社4日讯　胡志明主席今天由毛泽东主席和党和国家的其他领导人周恩来、朱德、邓小平等陪同，出席了文化部在怀仁堂举行的文艺晚会，欣赏了中国文艺工作者演出的京剧、音乐、舞蹈、杂技等精采节目。"},{"type":"paragraph","text":"今天的晚会是为欢迎胡志明主席而举行的。"},{"type":"paragraph","text":"应邀出席晚会的，还有越南劳动党中央委员会第一书记黎笋，中央政治局委员阮志清、黄文欢，中央候补委员陈光辉等。越南驻中国大使陈子平也应邀出席了晚会。"},{"type":"paragraph","text":"出席晚会的党和国家的其他领导人，还有彭真、陈毅、李富春、贺龙、李先念、谭震林、康生、聂荣臻、罗瑞卿、胡乔木等。"},{"type":"paragraph","text":"文艺演出结束以后，胡志明主席由毛泽东主席等陪同走上舞台，向演员们赠花篮，并且同演员们亲切握手。"},{"type":"paragraph","text":"今天下午，越南劳动党中央委员会第一书记黎笋和中央政治局委员阮志清，在中共中央政治局候补委员、国务院副总理薄一波和中共中央委员伍修权的陪同下，参观了北京车站。阮志清同志还参观了人民大会堂。（附图片）"},{"type":"paragraph","text":"右图：演出结束后，胡志明主席、毛泽东主席等上台和演员握手"},{"type":"paragraph","text":"新华社记者　杜修贤摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"薄一波","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"688387c492"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
