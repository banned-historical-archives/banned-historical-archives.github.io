" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"黑龙江省委通知控制群众反右自发斗争","authors":[],"dates":[{"year":1957,"month":9,"day":29}],"is_range_date":false,"parts":[{"text":"黑龙江省委通知控制群众反右自发斗争","type":"title"},{"text":"黑龙江省委反映，鹤岗市有些群众，在业余时间曾自发地到本单位或外单位的右派分子家里去讲理。凡是被斗的右派分子，群众都去过他们家里进行说理斗争。有的右派分子一天就要接待二次以上。有的右派分子从被斗到现在，已接待和他讲理的群众达十次之多。这些群众中有工人、街道妇女、工商界、学生、职员、干部等。他们通过多种方法进行讲理，有的还到右派分子家里贴标语，贴声讨书。讲理不仅在家里，也有在食堂、马路上或在斗争会休息时进行的。这种自发斗争，给了右派分子以很大的压力，但往往驳不倒右派，并产生了许多问题。如市文工团有的右派集团成员，还没有正式批为右派分子，群众就把他拉到马路上当右派斗争了。还有些学生拿石头子、土块打右派分子，有的右派分子顽抗，被群众抓住头发往下摔，或打了耳光。另外，绝大部分群众不是有准备的去讲理，而是吵吵嚷嚷乱质问，你一句他一句，当右派分子刚一说话又给顶回去，结果乱吵吵一阵，收获不大，甚至毫无收获。","type":"paragraph"}],"comments":[],"origin":"中共中央宣传部《宣教动态》1957年第三O四期","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b77eec73bf"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
