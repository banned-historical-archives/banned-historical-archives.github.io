script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"解放军指战员热烈欢呼毛主席和党中央批准改组全军文革小组把全军文化大革命推向新阶段坚决斗倒军内小撮走资本主义道路的当权派和极少数坚持资产阶级反动路线的顽固分子，彻批判资产阶级反动路线，肃清这条反动路线在军队中的恶劣影响","authors":[],"dates":[{"year":1967,"month":1,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社北京13日电　我们伟大领袖毛主席和中共中央批准中央军委改组全军文化革命小组的决定，象春风一样迅速传遍全军各机关、部队和院校，受到了广大指战员的热烈欢呼。指战员们一致表示新的全军文革小组的成立，是伟大统帅毛主席对我们全军的最大关怀，最大鼓舞。大家表示坚信，新的全军文化革命小组在中央军委和中央文革小组的直接领导下工作，我军的无产阶级文化大革命必将出现崭新的面貌，获得更大胜利。广大指战员表示决心更高地举起以毛主席为代表的无产阶级革命路线的伟大红旗，在新的全军文革小组的领导下，坚决斗倒军内一小撮走资本主义道路的当权派和极少数坚持资产阶级反动路线的顽固分子，彻底批判资产阶级反动路线，肃清这条反动路线在军队中的恶劣影响，把我军的无产阶级文化大革命推向一个新阶段，把各方面的工作做得更好。"},{"type":"paragraph","text":"在北京，人民解放军总部、各军种兵种领导机关以及各部队院校革命师生和部队文艺工作者听到喜讯后，纷纷组成报喜队伍，高举红旗，抬着巨幅的毛主席画像，浩浩荡荡，络绎不绝地来到新的全军文革小组接待站报喜，表示决心。"},{"type":"paragraph","text":"喜讯传到福州、广州、南京、昆明、武汉、成都等部队和海军，空军部队的时候，从前沿阵地、哨所、高炮阵地，到机场、海港，舰艇，“坚决拥护毛主席和党中央的英明决定!”“我们伟大领袖毛主席万岁，万万岁!”的欢呼声，此起彼伏，一浪高过一浪。在锣鼓声中，指战员们把一张张大红喜报送到领导机关。全军学习毛主席著作积极分子丰福生万分激动地说，我举双手拥护中央军委改组全军文化革命小组的英明决定!这一决定，标志着资产阶级反动路线在我军的彻底破产，标志着以毛主席为代表的无产阶级革命路线的辉煌胜利。我们坚信，有我们最高统帅毛主席和党中央批准的全军新的文革小组的领导，我们全军的文化革命就一定能沿着毛主席的革命路线，从胜利走向胜利。某部学习毛主席著作积极分子、五好战士阎福根说，改组全军文化革命小组，这是全军政治生活中的一件大事。徐向前同志担任新的全军文革小组组长，江青同志担任全军文革小组顾问，这是毛主席对我军的最大关怀。驻守在祖国西南边疆阿瓦山上的昆明部队某部的兄弟民族战士，从收音机里收听到这一喜讯，载歌载舞，纵情欢唱:伟大领袖指航向，革命风暴卷巨浪，成立全军靳文革，领袖关怀暖心房。阿瓦山，在欢呼，阑沧江，在歌唱。欢呼毛主席革命路线新胜利，歌唱心中最红最红的红太阳。"},{"type":"paragraph","text":"沈阳、兰州、北京、济南等部队和内蒙古、西藏、新疆军区的指战员们欢呼这一大喜讯的时候，纷纷指出，当前无产阶级文化大革命的形势大好，广大革命群众在毛泽东思想的指引下，坚决粉碎资产阶级反动路线的新反扑，文化大革命进入了一个新阶段，大家决心在新的全军文革小组的领导下，更高地举起以毛主席为代表的无产阶级革命路线的伟大红旗，在毛主席指引的文化大革命的道路上，奋勇前进，夺取新的胜利。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"中央文革","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c7eeb05b97"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
