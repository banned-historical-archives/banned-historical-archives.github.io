script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"南斯拉夫私人经济急剧增，私人手工业主靠剥削和损害社会利益大发其财","authors":[],"dates":[{"year":1962,"month":2,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【据新华社北京22日电】　据贝尔格莱德消息:南斯拉夫的私人手工业工场日益增多，它们依靠剥削和损害社会利益大发其财。"},{"type":"paragraph","text":"去年12月8日的南斯拉夫《世界报》透露，目前在南斯拉夫“社会成分”(即所闻社会主义成分)的手工业工场约有七千五百家，拥有二十万名工人；而私有成分手工业工场却有十一万五千多家，雇佣的工人达五十万名。去年11月19日的《胜利报》报道，“在铁托格勒地区，社会成分的手工业已停滞了几年，而私有成分的则在急剧增加。”如1960年9月份，在铁托格勒有九十家私人手工业工场，一年后，增加到了一百五十四家。"},{"type":"paragraph","text":"私人手工业主从官方的经济企业和机关那里包揽大批生意。"},{"type":"paragraph","text":"据南斯拉夫报纸报道，“社会主义”的企业为了牟利，把价值几千万甚至上亿第纳尔(南币)的生意包给私人手工业主。南报还说，在“官方的工业和私人手工业之间 的协作”中“投机现象最多”。《世界报》说，南斯拉夫区人民委员会“没有兴趣在本地发展社会成分的手工业，因为社会成分的手工业必须把捐税都缴给联邦”，但它们“倒关心在本地有尽量多的私人手工业工场，因为工场的主人把绝大部分税收缴给区人民委员会”。它们“帮助开设私人工场”，“把这看作自己资金的来源”。"},{"type":"paragraph","text":"《星期三消息报》说，区人民委员会还帮助私人手工业主“逃避关于雇佣劳动力的法令。”《共产主义者》周报报道说，一些区人民委员会的官员在税收问题上，甚至帮助私人手工业主弄虚作假。"},{"type":"paragraph","text":"在私人手工业工场劳动的工人和学徒遭受着严重的剥削。《劳动报》说，私人手工业主“依靠剥削别人和损害社会来发财。”《政治报》说，在私人手工业主那里劳动的工人们“没有社会保险”，被迫“廉价出卖劳动力。”"},{"type":"paragraph","text":"《战斗报》毫不掩饰地声称，现在在南斯拉夫是私人手工业者的“黄金时代”，他们在“过去从来没有象近十年来这么‘吃香’”。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f17c32ddd7"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
