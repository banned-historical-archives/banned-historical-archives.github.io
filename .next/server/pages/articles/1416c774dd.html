script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"《官场现形记》是早期资产阶级文学","authors":["华庄"],"dates":[{"year":1984,"month":4,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"李伯元创作的晚清著名谴责小说《官场现形记》的思想倾向是什么?我国文学评论界的意见分歧较大。一些同志认为它是一部保皇反动的小说。《青海师范学院》学报今年第一期上发表许国良的文章，对上述观点提出异议，认为小说《官场现形记》是属于中国早期资产阶级的文学，它是西方资产阶级启蒙思想传入我国后，中国封建土地上长出的一棵树苗。许文指出，李伯元生活的年代，正是中国封建社会走向彻底崩溃前夕。小说虽然没有直接反映当时风起云涌的阶级斗争，但通过对封建统治阶级内部的腐败和黑暗的揭露，将当时社会的黑幕撕裂开来，有利于唤起人民对封建统治社会的不满和反抗。它同吹捧清王朝“盛德”和“仁政”的保皇派调子相悖逆，而是希望自强图存，愤恨帝国主义的侵略。"},{"type":"paragraph","text":"(华庄)"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1416c774dd"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
