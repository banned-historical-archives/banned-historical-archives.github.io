script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji19","name":"毛泽东全集第19卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji19.pdf"],"article":{"title":"关于时局近况的通知","alias":"","parts":[{"type":"paragraph","text":"关于时局近况的通知！！"},{"type":"paragraph","text":"（1944年7月15日）各同志："},{"type":"paragraph","text":"兹将时局近况通知你们。"},{"type":"paragraph","text":"（一）蒋?之军队由于其士兵是捆绑与购买来的，军官极其腐败与根本没有民族民主教育，提倡反共教育，因而大部分军队充满失败情绪，失去战斗意志。蒋军在河南、湖南作战中，绝大多数均不战而溃或一触即溃，损失在四十万以上。进攻河南敌军不过四个师团，蒋军近四十万，除少数武器较差、待遇较坏的杂牌军比较能作战外，几乎无不望风而逃。胡宗南?有十个师由陕、甘开入豫西参战，但是只有一二个师能打一下，其余都是一触即溃。河南人民，在蒋军残酷压迫下引起他们普遍地与军队对立，群众暴动围缴军队枪械。这些地方的共产党，早已被国民党摧残，但是这些地方的人民在对国民党失望后，希望中共军队到临抵抗敌军之心甚为强烈。"},{"type":"paragraph","text":"（二）胡宗南已调动十个师入豫参战，对边区威胁减轻，但直接"},{"type":"paragraph","text":"[1]这份电报的发出时间是1944年7月19日，发给李先念和中共中央华中局、山东分局、冀鲁豫分局、北方局、晋察冀分局、晋绥分局。"},{"type":"paragraph","text":"[2]蒋，指蒋介石。"},{"type":"paragraph","text":"[3]胡宗南，当时任国民党军第一战区副司令长官兼第三十四集团军总司令。包围边区军队并未减少，封锁依然存在，“切反共行为依然继续。"},{"type":"paragraph","text":"（三）英、美、苏记者到边区已一个多月，他们感到兴奋。但是蒋在事前沿途布置反共宣传，蒋又派一批人同来监视他们，进行破坏中共工作，但未达到目的，这些人现已离边区，他们出去后可能进行破坏宣传。但是英、美、苏三国主要记者尚留边区，他们愿意多看一看，并将赴晋西北参观。他们对英、美、苏的新闻报道有利于我们。"},{"type":"paragraph","text":"（四）罗斯福\"三次电蒋要求派美国军事代表团来延安，均被蒋拒绝；此次华莱士来华，率美方在渝有关人员全体见蒋，正式提出罗斯福第四次电报，蒋始被迫答应。美军事人员十八人不日可到延安。"},{"type":"paragraph","text":"（五）国共谈判无进展。关于党的问题，国民党虽在形式上说可以照抗战建国纲领办理，但是实际上仍不承认我党合法地位；关于军队问题，仅承认十个师即十万人的名义，其余三十七万军队、二百万民兵，均要解散；关于政权问题，只承认陕甘宁边区一处，对华北、华中、华南各敌后根据地代表八千六百万人民的民主政权，概不承认：我党被捕人员不肯释放；其他要求条件都不答应。林伯渠同志尚在重庆，但是根本调整国共关系，要待蒋更困难及美方施以更大压力时才有希望。"},{"type":"paragraph","text":"（六）国民党政治、军事、经济、文化机构，腐化达于极点，配[1]罗斯福，当时任美国总统。"},{"type":"paragraph","text":"[2]华莱士，当时任美国副总统。1944年6月20日到达重庆，进行“调解”国共关系的活动。"},{"type":"paragraph","text":"[3]林伯渠，当时任中共中央委员、陕甘宁边区政府主席，是同国民党谈判的中共代表。酿着极大危机。孙科、宋子文、于右任\"及许多国民党党员均不满蒋及其集团的死硬政策，各中间党派及川、滇等省地方实力派更加不满。如果日本继续向内地作深入进攻，重庆可能发生重大事变。"},{"type":"paragraph","text":"（七）我党在华北、华中、华南三大敌后战场，近几个月有新发展，消灭了许多敌伪军，夺回了许多土地。为克服物质困难，发展.了广大的生产运动，今年天雨及时，粮食可望丰收。在人民面前，我党领导的敌后战场与国民党领导的正面战场间的区别，越来越明显了。一个在进攻，在发展，在巩固；一个在退却，在萎缩，在充满着危机。在敌人继续进攻情况下，这种区别会更显露出来。但是我党困难仍是很多的，日寇将向我们施行残酷进攻，经济困难依然极大，决不可粗心大意，失去警惕性。"},{"type":"paragraph","text":"（八）对国民党问题，我们将继续谨慎处理方针，谈判虽无结果，但仍在进行中。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"七月十五日"},{"type":"paragraph","text":"[1]孙科，当时任国民党政府立法院院长。宋子文（1894一1971），广东文昌（今属海南）人，当时任国民党政府外交部部长。于右任，当时任国"}],"authors":["毛泽东"],"dates":[{"year":1944,"month":7,"day":15}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":37,"page_end":39},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3c5f7ede8e"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
