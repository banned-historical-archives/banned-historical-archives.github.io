script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反对垄断资本的剥削和压迫意大利工人罢工浪潮席卷全国","authors":[],"dates":[{"year":1968,"month":12,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京一日电　罗马消息:意大利广大工人反对垄断资本的剥削和压迫，争取改善生活和劳动条件的群众运动正在继续高涨。罢工、示威游行和占领工厂的斗争浪潮此伏彼起，席卷意大利全国各地。"},{"type":"paragraph","text":"在意大利北部的热那亚，六万五金和机器制造工人十一月二十九日举行二十四小时罢工。数以千计的罢工者在几百名学生的声援下，在市中心举行了声势浩大的示威，反对垄断资本家无理解雇工人，要求提高工资和改善劳动条件。"},{"type":"paragraph","text":"意大利全国制糖厂的工人十一月二十九日和三十日一致举行罢工，抗议垄断企业“埃里达尼亚”糖业公司解雇四百名工人并威胁还要解雇数千名工人。在费拉拉市，各行业的工人和农业劳动者联合举行总罢工，支持制糖工人的斗争。"},{"type":"paragraph","text":"意大利全国的罐头食品工人这两天也举行了四十八小时罢工。他们曾经在十一月二十六日举行过二十四小时罢工。"},{"type":"paragraph","text":"邮车押运员为要求提高工资和缩短工时，在十一月二十七日和二十八日举行了全国性的罢工，使得大批邮件堆积在火车站上，无法起运。"},{"type":"paragraph","text":"与此同时，罢工浪潮波及“皮雷利”橡胶托辣斯所属工厂。橡胶工人愤怒抗议资本家顽固拒绝工人们提出的增加工资的要求。在米兰和都灵的“皮雷利”工厂的工人，十一月二十七日举行了罢工。“皮雷利”托辣斯的其他工厂的工人也正进行间歇性罢工。"},{"type":"paragraph","text":"在意大利南部西西里区的首府巴勒莫，一千多名五金和机器制造工人十一月二十六日举行了示威游行，反对垄断资本残酷剥削，要求增加工资。反动当局出动警察野蛮袭击示威工人。工人们用拳头和石块英勇地进行了反击。在西西里区锡拉库扎省，三万农业工人为要求提高工资举行了五天罢工。"},{"type":"paragraph","text":"在首都罗马，三百名工人占领“阿波隆”印刷厂，反对资本家关团工厂。他们的斗争至今已达六个月，现在仍在坚持斗争中。此外，一百名青年女工占领她们工作的针织厂已达一个多月，由于她们坚决斗争，顶住了警察想把她们赶出工厂的企图。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"68917ff75e"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
