script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"迎接“三八”国际妇女节 坚决扫除资产阶级思想用马列主义武装自己　成为无产阶级新女性","authors":["陈婉华"],"dates":[{"year":1952,"month":3,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编辑同志:在三反斗争进入高潮的今天，我们青年女学生纪念“三八”国际妇女节是有重大的意义的。三年来资产阶级向我们青年不断的发动了猖狂的进攻。我们时常看到有些同学很迫切地要求进步，然而他们的家庭却千方百计地来拖他的后腿。有些出身于资产阶级家庭的青年，受到唯利是图、损人利己的家庭教育而不自觉，在政治上、生活上就表现出极端的个人主义和剥削思想。最令人痛恨的是资产阶级竟不惜利用他们的女儿作为勾引干部、盗窃国家财产的工具。这说明了资产阶级对我们青年的毒害已到了不可容忍的地步。因此在纪念“三八”妇女节的时候，我们青年女学生应该继承过去光荣的革命传统，在思想改造运动中肃清各种资产阶级思想，用马列主义来武装自己，使自己成为无产阶级化的新女性!"},{"type":"paragraph","text":"复旦大学　陈婉华"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0e2335a67f"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
