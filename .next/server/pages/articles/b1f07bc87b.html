" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中央批转西南局关于三反中受刑事处分贪污犯期满释放后的处理原则","authors":[],"dates":[{"year":1953,"month":5,"day":11}],"is_range_date":false,"parts":[{"text":"中央批转西南局关于三反中受刑事处分贪污犯期满释放后的处理原则","type":"title"},{"text":"中央批示：中央同意西南局关于三反中受刑事处分贪污犯期满释放后的处理原则，兹转发各地参考。在执行第二项第(二)条“凡在管制期间，交代不彻底，对其错误无所认识，表现不好，确无教育改造前途，但又有家可归，能从事劳动维持生活者，可转业回乡生产”时，应十分慎重，严加考查，必须具有上述条件并有一定的批准手续和适当的安置，不要推出机关了事，免致无法生活，流浪社会。","type":"paragraph"},{"text":"四月七日西南行政委员会党组小组会草拟的三反中受刑事处分犯，期满释放后的处理原则收悉。我们基本同意，并略有修改，修改后的处理原则如下：","type":"paragraph"},{"text":"一、刑事处分：","type":"paragraph"},{"text":"(一)劳役改造与有期徒刑。","type":"paragraph"},{"text":"(1)凡判处劳改或有期徒刑期满释放或经司法机关提前释放，经要求工作且在劳改中能彻底交代、确系真诚悔过，并有具体表现者，可予以录用。","type":"appellation"},{"text":"(2)凡属于西南人事部关于录用工作人员的试行规定第三条乙项之人员(指反动党团骨干、反动军官及地主恶霸)及其在劳改中对一切重要问题仍交代不清或期满后交群众管制者一律不得录用。","type":"paragraph"},{"text":"(二)机关管制：","type":"paragraph"},{"text":"(1)凡干部判处机关管制者，在管制期间对一切错误事实交代清楚，反省彻底，表现较好者，管制期满后，可宣布取消管制，按一般干部使用，如系技术人员，可按其专长给予适当工作。","type":"paragraph"},{"text":"(2)凡在管制期间，交代不彻底，对其错误无所认识，表现不好，确无教育改造前途，但又有家可归，能从事劳动维持生活者，可转业回乡生产。","type":"paragraph"},{"text":"二、行政处分：凡受行政处分者，在工作学习中能认识错误不断进步，经一定时期的实际工作考验，有显著转变者，经原批准给予处分的机关批准，可撤销其处分。","type":"paragraph"},{"text":" 一九五三年四月二十六日","type":"paragraph"}],"comments":[],"origin":"根据文件翻印件打印。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]},{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中央批转西南局关于三反中受刑事处分贪污犯期满释放后的处理原则","authors":[],"dates":[{"year":1953,"month":5,"day":11}],"is_range_date":false,"parts":[{"text":"中央批转西南局关于三反中受刑事处分贪污犯期满释放后的处理原则","type":"title"},{"text":"中央批示：","type":"subtitle"},{"text":"中央同意西南局关于三反中受刑事处分贪污犯期满释放后的处理原则，兹转发各地参考。在执行第二项第(二)条“凡在管制期间，交代不彻底，对其错误无所认识，表现不好，确无教育改造前途，但又有家可归，能从事劳动维持生活者，可转业回乡生产”时，应十分慎重，严加考查，必须具有上述条件并有一定的批准手续和适当的安置，不要推出机关了事，免致无法生活，流浪社会。","type":"paragraph"},{"text":"四月七日西南行政委员会党组小组会草拟的三反中受刑事处分犯，期满释放后的处理原则收悉。我们基本同意，并略有修改，修改后的处理原则如下：","type":"paragraph"},{"text":"一、刑事处分：","type":"paragraph"},{"text":"(一)劳役改造与有期徒刑。","type":"paragraph"},{"text":"(1)凡判处劳改或有期徒刑期满释放或经司法机关提前释放，经要求工作且在劳改中能彻底交代、确系真诚悔过，并有具体表现者，可予以录用。","type":"paragraph"},{"text":"(2)凡属于西南人事部关于录用工作人员的试行规定第三条乙项之人员(指反动党团骨干、反动军官及地主恶霸)及其在劳改中对一切重要问题仍交代不清或期满后交群众管制者一律不得录用。","type":"paragraph"},{"text":"(二)机关管制：","type":"paragraph"},{"text":"(1)凡干部判处机关管制者，在管制期间对一切错误事实交代清楚，反省彻底，表现较好者，管制期满后，可宣布取消管制，按一般干部使用，如系技术人员，可按其专长给予适当工作。","type":"paragraph"},{"text":"(2)凡在管制期间，交代不彻底，对其错误无所认识，表现不好，确无教育改造前途，但又有家可归，能从事劳动维持生活者，可转业回乡生产。","type":"paragraph"},{"text":"二、行政处分：凡受行政处分者，在工作学习中能认识错误不断进步，经一定时期的实际工作考验，有显著转变者，经原批准给予处分的机关批准，可撤销其处分。","type":"paragraph"},{"text":" 一九五三年四月二十六日","type":"paragraph"}],"comments":[],"origin":"根据文件的原件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b1f07bc87b"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
