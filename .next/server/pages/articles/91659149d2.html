script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"共青团中央关于在整风、整团中处理犯有各种错误的团员的规定","authors":[],"dates":[{"year":1958,"month":2,"day":26}],"is_range_date":false,"parts":[{"text":"共青团中央关于在整风、整团中处理犯有各种错误的团员的规定","type":"title"},{"text":"一、在全民的整风运动和反右派斗争中，团内查出一批右派分子、反社会主义分子和各种坏分子，还有些团员犯了各种错误。严肃、慎重地处理这些人，是目前团的建设上一项重要的工作，对于提高团员的觉悟，纯洁团的组织，增强团的战斗力，具有重大的意义。共青团是先进青年的组织，对犯有各种错误的团员，应该参照党对犯有各种错误的党员的处理原则进行处理。对于政治上的敌对分子，必须坚决地把他们清除出团；对于其他犯有错误的团员，应该是按照“思想批判从严，组织处理从宽”的精神，进行处理，大力地诚心地帮助他们认识错误和改正错误。","type":"paragraph"},{"text":"二、对于下列几种分子，一律开除团籍：","type":"paragraph"},{"text":"（一）右派分子、反社会主义分子；","type":"paragraph"},{"text":"（二）反革命分子；","type":"paragraph"},{"text":"（三）阶级异己分子；","type":"paragraph"},{"text":"（四）严重违法乱纪分子和其他坏分子。","type":"paragraph"},{"text":"对于在反右派斗争中，戴上右派分子帽子，而最后决定不以右派分子论处的团员，可以不开除团籍，但是，必须给以适当的团纪处分。","type":"paragraph"},{"text":"三、对于其他犯有各种错误的团员，一般地应着重思想教育，不要轻易给以团纪处分。错误情节严重，或者坚持错误的，应该给以适当的团纪处分，直至开除团籍；错误情节较轻，有真诚悔改表现的，可以免予处分。","type":"paragraph"},{"text":"四、对于落后的团员，应该加以分析，区别对待。经过教育愿意进步的，应该留在团内继续教育，提高他们的觉悟；屡经批评教育，仍不改正，已完全不够条件的，应该劝他们退团或者清洗出团。","type":"paragraph"},{"text":"五、团组织在对团员执行纪律处分的时候，必须取得党委的领导，认真地走群众路线，把错误事实核对清楚，在团内进行充分的讨论和批判。对于右派分子、反社会主义分子和各种坏分子，必须彻底地揭露和严格地批判他们的反动言行。同时，也要给他们指出今后改造自己的方向。","type":"paragraph"},{"text":"处分团员的手续，应该遵照团章的规定执行。在直辖市或设区的省辖市，可以由团市委将批准开除团籍处分的权力授予团区委员会。","type":"paragraph"},{"text":"（这个规定可以传达到团的基层组织。）","type":"paragraph"},{"text":"上海市档案馆，C21-1-629，第14-16张。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"91659149d2"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
