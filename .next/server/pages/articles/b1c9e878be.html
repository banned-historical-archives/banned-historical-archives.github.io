<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"本市工商界政治学校揭发大量右派言行","authors":["解放日报"],"dates":[{"year":1957,"month":8,"day":3}],"is_range_date":false,"parts":[{"text":"本市工商界政治学校揭发大量右派言行","type":"title"},{"text":"解放日报","type":"authors"},{"text":"四个右派分子和五十多个附和者受到严肃批判  结业时曹荻秋号召学员继续改造自己","type":"subtitle"},{"text":"【本报讯】本市工商界政治学校第三期学员—千六百多人学习已经结业。他们在学习期间曾开展了反右派斗争，揭露了学员中极端丑恶的右派分子黄苗夫、孔令朋、金巽、董松涛以及其他甘心附和右派分子进行反对共产党领导、反对社会主义活动的学员魏宗琦等五十余人，并开展了严肃的批判和斗争。","type":"paragraph"},{"text":"在七月廿九日该校举行的第三期学员结业典礼的时候，盛丕华校长宣布右派分子黄苗夫、孔令朋、金巽、董松涛错误严重、态度恶劣、交代不老实，学校决定不发给他们结业证书。","type":"paragraph"},{"text":"据记者了解，在鸣放以前，该校部分学员即有反对共产党领导的言行，鸣放开始以后，右派分子的活动即趋公开和猖獗。右派分子黄苗夫(新现代劳美教材工艺社经理)三次散发反动小册子，右派分子孔令朋(外贸局进出口公司西药组副组长)对葛佩琦的反动谬论拍手叫好。他还曾煽动学员联名写信支持右派分子鲁莽在市政协会议上对党的进攻。右派分子金巽(华文油墨厂私方)利用鸣放机会篡夺该校生活委员会和墙报的领导，并利用“四明堂事件”到处点火，组织请愿，准备搞大民主。右派分子董松涛(鸿翔兴船厂生产技术科科长)制造大量反动谣言，恶意攻击共产党、污蔑党和政府的领袖毛主席和周总理等。还把章乃器捧为“一代伟人”。","type":"paragraph"},{"text":"此外，该校尚有五十多个学员有严重右派言行，他们附和右派分子活动并发表荒谬言论。如魏宗琦在墙报上写一首诗，说解放后共产党的成绩是凤毛麟角，缺点似汪洋大海；并且以腐朽的资本主义经济理论写了“机器创造剩余价值”文章，否定资本家的剥削。王绍卿除了和魏宗琦一起写打油诗外，还有变天思想，造谣说：每逢闰八月都要改朝换代，今年有闰八月又可以看看了。马嘉镛说军队不应让共产党独有，应该成立“民主建国军”，他还说资产阶级分子和工人阶级分子没有什么区别，章乃器说得对。邬烈德污蔑政府领袖，把批判右派头子章乃器的文章说成是对章乃器的“围剿”。薛铭三污蔑共产党各种措施是“封建愚民政策”，并且在迁厂问题上准备组织闹事。卜绍先在担任小组长期间，有意要学员发泄谬论，并且打击进步同学，庇护右派分子活动。陈朝真表示要为章乃器“以身殉道”。方显朝煽动全班学员反对新闻日报对该校学员坏风气的批评，他与右派分子汪君良关系密切，并且经常把学校里的情况向外面汇报。孙受天接受章伯钧的指使，大力发展农工民主党的组织，散播章伯钧的谬论。吴毓骧直接受右派分子彭文应的指挥，在校内组织反党活动。程梅生在鸣放期内接受右派分子金巽的指挥，利用墙报进行放火，四明堂事件发生后，他煽动学员并盗用编辑小组名义给陈济写慰问信。闻松青捧章乃器为“革命者”，把批评黄苗夫的人说成是“假积极”，“可恨”。上述学员的右派言行在该校的反右派斗争中受到了揭发和严肃的批判。","type":"paragraph"},{"text":"这些右派分子以及有严重右派言行的学员在该校反右派斗争中，有的已低头认罪；有的作了初步交代和检查，还不够深刻彻底；也有的还采取抗拒的、狡猾的态度，不肯老老实实交代罪行。","type":"paragraph"},{"text":"中共上海市委书记处书记曹荻秋在该校所举行的第三期结业典礼上，向学员们指出当前在工商界中展开反右派斗争的重要意义。他说，学校结业并不意味着思想改造的结束。他要求学员们结业以后继续参加当前的反右派斗争，从政治思想上来提高自己、改造自己，把自己改造成为真正自食其力的劳动者。","type":"paragraph"},{"text":" 来源：《解放日报》1957年8月3日。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"曹荻秋","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b1c9e878be"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
