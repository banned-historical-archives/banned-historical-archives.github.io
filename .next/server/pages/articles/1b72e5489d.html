<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"青年作家为什么必须接受党的领导","authors":["老舍"],"dates":[{"year":1957,"month":10,"day":5}],"is_range_date":false,"parts":[{"text":"青年作家为什么必须接受党的领导","type":"title"},{"text":"老舍","type":"authors"},{"text":"首先我要指出来：假若没有党的关切与领导，这几年来根本不会出现这么多的青年作家。这是无可否认的事实。那么，对于青年作家来说，他们既身受党的恩惠，怎可以说党不该领导文艺，或领导错了呢？这应当好好地想一想。","type":"paragraph"},{"text":"有人也许说：党应当培养青年作家，但一旦他们已经有了写作本领，便无须再领导了，顶好是让他们海阔天空，独立思考。这个说法正确吗？我看哪，这又是“才子”的想法。既是“才子”，当然想要遗世独立，与众不同。可是独立思考什么呢？这就成了问题。是独立思考资产阶级的思想吗？是独立思考怎么为资本家辩护，象章乃器那样，说定息不是剥削吗？是独立思考社会主义不如资本主义好吗？这些都已经被右派分子思考过了，还用再劳我们的驾吗；可是今天的某些青年作家响应了右派分子的谬论，也要搞独立。这就证明党的领导还不够强，而不是不该领导。事实上，我们应当思考社会主义的一切，因为社会主义制度是最新的制度，社会主义的问题是最新的问题，应当思考，以便集思广益，深谋远虑，发展并巩固社会主义。","type":"paragraph"},{"text":"一个作家在思想上，总该走在时代的前面。那么，社会主义是人类最进步的思想，而党的领导恰恰是领导我们正确地走社会主义道路，这难道不好，难道是委屈了“才子”？一个“才子”而以为走社会主义道路，反映社会主义建设，便是受委屈，受束缚，还成其为作家吗？放下人类最崇高的理想的社会主义，而去胡思乱想，且美其名曰独立思考，我看哪，这分明是胡涂思考！","type":"paragraph"},{"text":"党的领导包括着党的关切与帮助。社会主义建设真是千头万绪，极为复杂。作家要反映社会主义现实，而只恁个人的理解与体验，恐怕就很难深入问题，了解的不够全面。于是，非有党的领导与帮助不可。这是我亲身的经验。我不是才子，我需要党的领导与帮助。假若我是才子呢，有了党的领导与帮助，我的成就不是更大了吗？这是真话吧？反之，我若是才子，而不肯接受党的领导，以至反党反社会主义，那我就会很快地变成右派分子，这有什么好处呢？对我自己说，放弃了社会主义的崇高理想，而甘心在思想上倒退一百年，我还算个什么作家呢？简直是不知好歹，不辨香臭。对人民来说，我若不鼓舞社会主义的建设，而去泼冷水，说风凉话，人民答应不答应呢？这样看起来，领导不是限制自己，而是为使大家（包括作家）一心一意地走向社会主义，越走越光明，越自由。","type":"paragraph"},{"text":" ——原载《人民日报》1957年10月5日。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1b72e5489d"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
