<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"上海科技大学工人班发扬理论联系实际好学风抓住生产关键问题进行毕业设计他们以毛泽东思想武装头脑，克服各种困难，已完成十六项课题的设计","authors":["叶麟根","唐祥庆","张澄钰"],"dates":[{"year":1965,"month":7,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　上海科学技术大学第二届工人班六十六名学生，自今年二月中旬开始，先后到七个工厂进行“真刀真枪”的毕业设计，目前已完成了十六项课题的设计。"},{"type":"paragraph","text":"该校第二届工人班学生的毕业设计，继承了第一届工人学生的好学风，突出政治，坚持理论联系实际。已完成的十六个课题，都是经过师生深入车间、深入科室，进行了大量的调查研究，熟悉了工厂的生产情况、了解了生产中的主要矛盾和关键问题，然后选择、确定的。如上海重型机床厂的主要产品C630车床，今年的生产任务要比去年增加一倍以上，而“溜板箱”和“走刀箱”的孔加工却存在困难。吴茂祥和马从刚两个小组的十四名工人学生，经过十多天的调查研究，决定选择该车床“溜板箱”和“走刀箱”孔加工的组合镗床设计制造作为课题，现在，已经设计完成。“溜板箱”原系单孔加工，加工一个箱体，要停车调换四十次刀具，需要花三个小时时间。经工人学生设计改进后，采用十孔同时加工，连续完成四道工序，只需要二十五分钟左右时间就可以完成，提高生产效率七倍多。经设计改进后，“走刀箱”的加工时间亦可大大缩短，提高生产效率五倍左右。得到该厂领导和工人的好评。"},{"type":"paragraph","text":"第二届工人班学生们在设计制造过程中，自觉学习毛主席著作，以毛泽东思想武装自己的头脑。虽然绝大部分课题是在既无资料、又无样机、更无经验的困难条件下进行的，但是他们在战略上藐视困难，在战术上重视困难，敢于斗争，敢于胜利，重视调查研究，认真实行内外三结合，在实践中找到了解决问题的办法。郑清耀小组八名工人学生为上海微型电机厂设计制造一种新产品，他们根本没有接触过这方面的知识，但是他们不怕困难，抓住主要矛盾，经过大量的试验和计算，终于突破难关，于四月中旬制造出第一台样机，经过测试，主要性能指标超过国外同类型产品的水平。该厂鉴定后，决定正式试产，并已于七月中旬制造出第一批成品。这以后，郑清耀等以不断革命的精神，又继续设计制造出了另一种电机的样机。市先进生产者、原上海民族乐器厂车木工郭根祥，这次和三个工人学生一起回到上海民族乐器厂进行毕业设计，解决胡琴、琵琶等乐器上的轸子自动分楞问题，以自动化代替现在的半机械化。他们设计的轸子自动分楞机，目前正处于最后的、紧张的总装阶段。"},{"type":"paragraph","text":"这届工人学生的实践，再一次证明，进行“真刀真枪”的毕业设计，既有利于理论联系实际，使学生在德智体诸方面得到全面的锻炼和发展；又有利于直接为当前的生产建设新高潮服务。"},{"type":"paragraph","text":"上海科学技术大学今年共有毕业生七百多人，他们分别到七十四个工厂、研究所、医疗卫生等单位，进行了三百另四项“真刀真枪”的设计。工人班毕业设计从二月中开始，其他各班从四月开始，目前都已进入最后的结束阶段。他们将于八月份毕业，走上生产岗位。"},{"type":"paragraph","text":"(叶麟根、唐祥庆、张澄钰)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"革命三结合","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fbb2054b3a"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
