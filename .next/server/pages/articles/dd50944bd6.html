script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"山帅——毛泽东在井冈山　21　牵肠挂肚","authors":["吴振录","邱恒聪"],"dates":[{"year":1992,"month":8,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"吴振录　邱恒聪"},{"type":"paragraph","text":"新城大捷，消息迅速在湘赣边各县的工农大众中传开。这时，贺子珍正从永新到宁冈的山路上在急急地赶路。"},{"type":"paragraph","text":"她因忙于处理妇女会的事，未能同县委的同志一块前来。开完会回来，县委书记给她捎来一封信。一看那道劲的字迹，她就晓得是谁给她写的了。"},{"type":"paragraph","text":"“毛委员很关心你，几次开会都打问你来。”县委书记说。"},{"type":"paragraph","text":"贺子珍打开信，象扑面一股春风荡漾全身。"},{"type":"paragraph","text":"“毛委员这回又问起你的永新调查搞得如何，我看你还是抽空去一趟吧。”"},{"type":"paragraph","text":"贺子珍点点头。她何尝不想早一点去呢?她晓得，她同毛泽东的关系在永新党的同志间有着各种议论，但她不在乎。19岁的妹子在人生的情爱上有她大胆的抉择的自由。"},{"type":"paragraph","text":"她十分赞赏他的见解。他对中国社会和中国革命有独到的洞察，而不是夸夸其谈，他见解高明，正确而又非常实际。他的身影已经深深地印在了她的脑际，她想赶都赶不走。她为他的革命工作、脚伤常常牵肠挂肚，这滋味是甜，也是酸的，苦的。"},{"type":"paragraph","text":"她连夜准备好他嘱托她搞的农村调查，准备好他最喜欢吃的油炸干辣椒，天不亮就启程上路。她从永新来参加庆祝会的同志那里晓得毛泽东在德盛堂药店，刚走进药店大门，便从楼上传来一声熟悉的湖南口音:“哦，子珍同志来罗!”毛泽东一眼发现了她。他正同袁文才倚在楼栏上谈话。"},{"type":"paragraph","text":"“呀，你这妹子总算来了，我同毛委员正在讲你呐。”袁文才笑着招呼。“哎哟，是不是在说我坏话吧?”贺子珍沿着楼梯一边往上，一边说着。"},{"type":"paragraph","text":"“我听永新的同志反映，你搞了不少调查材料，工作非常出色，快把材料让我看看。”"},{"type":"paragraph","text":"毛泽东含笑指指她肩上的小包，从贺子珍手里接过了几本厚厚的他亲自题写的《调查手记》，连连称赞，道:“现在我们革命的武装壮大了，还成立了几个革命政权，下一步要实行土地革命，巩固扩大我们的革命根据地。除了井冈山根据地，还要在你们永新的九陇山区建立根据地……”"},{"type":"paragraph","text":"“你先别看，”贺子珍不等毛泽东讲完，劈手又夺回那几本《调查手记》，藏到背后，板起面孔，站起来问:“我先问你，脚怎么样?”"},{"type":"paragraph","text":"毛泽东象淘气的伢崽，立刻跺跺脚，原地蹦几蹦，说:“你看，已经载我去过茶陵，打过遂川，又攻过新城喽。”"},{"type":"paragraph","text":"这几个月，毛泽东在井冈山东征西战的戎马偬倥的间隙，脑际里常常交替映现着两个女人的影子:一个是他的妻子杨开慧，一个就是面前这妹子。两个女人，两副面影。一副是总使他不安的那目光中多少带有点怨恨的泪眼；一副是能令他消除征战疲劳和忧愁甚至有点醉心的甜笑。他爱自己的妻子。杨开慧聪慧、沉静、贤良，几乎集中国妇女传统美德于一身。他以一个一贫如洗的知识青年能追求到这样一位出身书香门第的才女而自豪。她随他奔波革命，颠沛流离，含辛茹苦，形影不离。他难忘她。她生下第三个孩子后，由于母子皆病，对他虽开始有了抱怨，他们之间也常有口角，但他十分理解她。一个女人在孕期和哺乳期多么需要丈夫守在身旁呀!然而，他做不到也难做到。他大任在肩，生死难卜，为了革命事业，他不仅远离了她，就眼前的处境还很可能失去她，害了她。每每想起她，心里不免隐隐刺痛。他喜欢上了这妹子，老天爷逼他到这荒山野岭，碰上了她。不单单是因为她妙龄美貌，而且是在他处于极端困境中最需要一种爱抚时，她给了他坚定的支持……在她身上除了女性的温柔、贤慧的传统美外更富于一种叛逆，奔放的火辣辣的味道。他总觉得这同他在某些方面多少有些相通，尤其在这里要同反动派实行武装割据，他愈来愈感到多么需要这样一个人啊……"},{"type":"paragraph","text":"毛泽东边翻看着《调查手记》，边抬起脸向贺子珍询问几句永新的其它情况，不大工夫便把几本《调查手记》翻完，说:“你的调查记得很细，很全面，也有自己的分析，这样吧，过两天就请你做个先生，给部队的同志讲讲课。”"},{"type":"paragraph","text":"贺子珍受到毛泽东的赞赏，高兴得象考了满分的学生。她扫了一眼毛泽东的办公桌，忽地想起什么，将一只挎包放到了桌上，这个挎包装起来是个文件袋，拿出来就可办公。"},{"type":"paragraph","text":"毛泽东拿起挎包往肩上一挎，象个小学生似的。"},{"type":"paragraph","text":"妹子瞅着他格格笑个不止。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dd50944bd6"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
