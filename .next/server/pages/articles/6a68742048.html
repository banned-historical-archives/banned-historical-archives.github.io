" crossorigin="">{"props":{"pageProps":{"books":[{"id":"8da1b3f4-a862-487f-9c7a-af20178846c8","name":"资料摘编（内部参考）第七期（1968.1.1）","internal":true,"official":true,"type":"img","author":"张春桥，1968.1.1，工总司办公室资料组编","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/8da1b3f4-a862-487f-9c7a-af20178846c8/1.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/8da1b3f4-a862-487f-9c7a-af20178846c8/2.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/8da1b3f4-a862-487f-9c7a-af20178846c8/3.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/8da1b3f4-a862-487f-9c7a-af20178846c8/4.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/8da1b3f4-a862-487f-9c7a-af20178846c8/5.jpg"],"article":{"title":"张春桥在“热烈欢迎中国人民解放军毛泽东思想宣传队进驻市公安局大会”上的讲话","alias":"张春桥同志在“热烈欢迎中国人民解放军毛泽东思想宣传队进驻市公安局大会”上讲话（摘录）","parts":[{"type":"paragraph","text":"张春桥同志一九六七年十二月十九日在热烈欢迎中国人民解放军毛泽东思想宣传队"},{"type":"paragraph","text":"进驻市公安局大会”上"},{"type":"paragraph","text":"喆（摘录）"},{"type":"paragraph","text":"·*·"},{"type":"paragraph","text":"上海的形势好不好？上海的形努是好的，我觉得这是符合实际的，“无产阶级革命派的大联合，是巩固革命的“三福合”，也是逐步发展完善，总起来就，革命群众、解放军和革命干部之盾的关系是处理比较好的，形契是向前发展的，比敢稳定的，然而反复是有的，这是正常现象，局部的武斗是存在的，没有什么了不起，我们相信那星人民群众，总会用自已的力来制止“内战”，制止武斗，形奕是好的，但这不能记上海的老奕大好，就不就上海存在一些重大后题、重大缺点。阶级斗争是复杂的，上海虽名只是一个城市，但在中国一百多年来，在阶级斗争中、在民族斗争中上海总是一个重要的战场，特别是这几十年，中国共产党成立以后，无产阶级和资产阶级的斗争，在这儿总是非常矢就的，经过一年多无产阶级文化大革命，无产阶级革命派的力量在毛主席的与下有了征大的发展，把刘、邓在上海的代理人推了，把忙们氮夺的党、政、期、文大权夺回来了。上海的无产阶级革命派夺了权，这起低大的旺利，但阶级斗争不是新的，如看不到这一点，就要犯很大的错误，不要以为陈、曹甘心失败，他们等看复辟，还想把我们打成“反革命”，还想把丢们压下去，他们还会以各种方式向无产阶级革命派进攻，我们大家都知道上海不止有本地的、、反、坏右，帝匡主义、修正王义难道对上海就忘怀了！帝巨主义在上海经营了那么久的时盾，咖个帝医主义没有在上海长过》此p个帝国王义没在上海培养了一批走知！美帝国主义有，日、英·····帝医王义、化正王义难道在上海就没有特务听？王链就是苏作特分，所以，帝巨主义、修正主义反动派者没有旺宽，忙们都不是“追游派”，劫不知我们有些同志为什么当起“追遥派”来”这儿“追海派”不少！打打扑克，平时不上班，能工资来了，早上八点卸上班，十二点不到就下逊，下午也不来，追游待征，帝匡主义、敌人不起这样：他们空心思来整技们，上海每个角落皇面有耕么一些敌人在活动，个别地区沉皖啊飞那常沽，有些地区别是女同志、女工人、女学生，晚上不敢到外灿面张，投机倒把现象最近世非常指狂，这些都是什么呢？都是无产阶级文化大革命的对家！是无产阶级专政的对象！出现这些现象没有什么奇任，今天有这样的事信，明天还会有这在的事情，不要相信罗瑞卿什么七无八无的鬼话，阶级斗争没有惩灭！尚起在于我们无产阶级专政机关，我们无产阶级专政机关在干什么！我们无产阶级革命派强大的地万，就是群众专政，上海无产阶级革命派力量趣大，那敌人越拼命反抗，但他只能受到压，群众专政要和专政机关相精合，专政机关不强大，群众专诞得不到希助，得不到支持，就感到不好办，宅没有规定的！但专政机关怨么做的！公、梅、法起怎么做的呢？当然不能一年多来公、核、法没做过好事，大家还是很辛苦心红称灯还是开了有些事情还是办了』你们做了些好事，但今天会上我不想计这万面的成，我同志们想一想，公、被、法尽到自已资任没有！我们究竟尽了多少黄任，对全市无产阶子破了多少！我不想这个，有好多案子没有破啊！如今几个赤卫队坏头头关在那里差不多一年等了，你们究竟审问得怎碎啊！要拿他们的材料教育全市人民，走资派是怎补家就群众的，这是个很好的阶级教育材料！但赤卫队这几个坏头头还是去年12月份提起来的，去年的现在，过几天就是“康平路事补”了，这坚人捉起来快一年了，这样久了还没有熊决，分人气慎的是还有人认为这些人没什么，可以放掉，如“联司”几个坏头头叉审问得怎了！负货审问“联司”的几个坏头头的人，对“联司”路无阶级观点，一点造反派的底情者没有，星面有一个人甚至“除不显可以解放”，我听了非常生气，这种人不应当荐去做这个工作，也不能代我无产阶级的利益，我怀疑记这种话的人是陈、曹一派的。我只举这么几个例子，全市的革命群众都希望把赤卫队、“联司”的几个环头头的后题早些解决了，但远远不待解决了，这是记政治上、对敌斗争上，那么其老事情呢？世不符合上海的妄求，只拿交通税序来就，大家都讨庆武斗武斗的死了人，但由于交通享故死的人比武斗而死的人多几倍，死了许多人，茯序并不好，好多地方交道没人管，红称灯没人开，或很早就没人开了，我不是有二个月在上海，每天上都出来转，有时白天也出去，满街的人爱企么走就怎么走，司机眞难当啊，消防车都走不动但消防车拿来当武斗的工具倒有垦作用，救火反而开不出来，这难道是正常的嘱！我还影，今天有到会的同志一个周题，毛主席这次到上海时去们先竟做了些什么工作来保卫毛主店的安全啊7们想过没有！你们配毛主席到上海来我们不知道。快们为什么不知道？我可以公开告歌同志们，毛主席到上海的时候，正是你们两派“闪战”打得激烈的时候，别个动头邮，我敢告新同志们？你们听到这样的消息难追尾到不痛心？每天啦“毛主席万岁！”就忠于毛主席，但为什么不听毛主席的话死？主席到上海我坦率地，我不把这个任务交给你们，我不是不信任你们，那个时候正是你们内战”打得热翩的时候啊，如果你们还是一直这样干下去，那下一次主席"},{"type":"paragraph","text":"，还是这样，你们不痛心嘱？我是很痛心的啊！我就举这样一些例子，从治斗争、对敌斗争到一般工作，交通管瑶到开红称灯，一到最大的题，"},{"type":"paragraph","text":"毛主席安全，我们的专政工具不能献自己的力量，去打“内战”了。上次会上，几个贺贡同志作了自我批部，消革会、义革会都计了，都是阶兄弟物，册么厉害，后来是联合了，但到上灭座会为止，还是联而不，名义上是“公联指”，但“公联指”没有权力，消革、义革、人革小动做得少点，名义上联合了，但还是各人找各人的公革会，公革会的工作这个组织不是依靠公联指，有了事情不报告公联指，那不是名义上的联合？算什么样的联合，算有联合的诚意，有的同志搞走资派是对的，联合了就合行动，但搞应密行动。联合起来才有力量。为什么不去搞别人？从公旨本身来就斗争的矛头没有把准，把战士的吸引力到这方面采了。有的志，记话没用，没人听，没有权威。权威是在斗争中自然形成的，不是有权威就有权威。毛王席为什么这梓有权威，这是因为在长期时间里，导全国人民进行战斗敢得了胜利，明了毛主席最有权威的。陈独秀第一"},{"type":"paragraph","text":"总书记专台了，好几个总书记都夸了。公联指要想有权威，就要带领群打仗，并且要导群众打胜仗：如果不带群众打仗，并且要打胜仗，光要群众承人你有权威，别是不行的。名义上联合了，但小山头存在，有时底性发作，根本不考虑自已是什么样的单位。你们是专政机关心，到处抛材，到处印刷傅单，那实际上向敌人告密，告歌敌人已掌握了你什么材料，一有什么花料没等握好，好多重要问题停在那里，解决不了，黄赤波斗了多，贡赤波、王的同题你们解决了多少，我不能新，部的话就等于向敌人密。同志们要把头脑很好的病理一下，我们把公、核、法当成派性的工具是专政的工具，单管的决定就起金对这种情况的，你们可以随使捉人，你"},{"type":"paragraph","text":"是国家的权力，哪一个组织都没有这的权力。中央文革捉一个人要好几个人签字，你们是专政机关，你们中学的红卫兵，你们抓人最后还是送往公安局，你们现存的什么都有，这个比彰危，我题才新的都是些缺点错误。"},{"type":"paragraph","text":"【\u003c从头越\u003e第174期】"},{"type":"paragraph","text":"中央已经表态解决二十个省市的同其中有九个省市（自治区）成立了革命委员会"},{"type":"paragraph","text":"北京市革命委真会于一九六七年西月二十日成立，王任北京市"},{"type":"paragraph","text":"委真富治同志，付主任委员兵德关雉山、付崇碧、最元种同志。"},{"type":"paragraph","text":"我们伟大馈袖毛主席今年元月九日发表计话，支持上海上海市"},{"type":"paragraph","text":"夺权，忙老人家：“文汇报现由左派夺了权，四日造反，解放日报六日也造了反，这个万向是好的。文汇报夺权后，三知报都看了远登了红卫兵的文章。有些好文章可选登。文汇报五日《告全市人民书人民日报可以翰载，电台可以广播。内部造反征好，这几天可写粽合报导这是一个阶级拒街另一个阶级，这是一场大革命·"},{"type":"paragraph","text":"二月五日成立上海市人民公社临时委真会，二月二十三日，致称上海市英命变真会，由张春桥奶文元等同志硕导"},{"type":"paragraph","text":"上海的形势好不好？上海的形努是好的，我觉得这是符合实际的，“无产阶级革命派的大联合，是巩固革命的“三福合”，也是逐步发展完善，总起来就，革命群众、解放军和革命干部之盾的关系是处理比较好的，形契是向前发展的，比敢稳定的，然而反复是有的，这是正常现象，局部的武斗是存在的，没有什么了不起，我们相信那星人民群众，总会用自已的力来制止“内战”，制止武斗，形奕是好的，但这不能记上海的老奕大好，就不就上海存在一些重大后题、重大缺点。阶级斗争是复杂的，上海虽名只是一个城市，但在中国一百多年来，在阶级斗争中、在民族斗争中上海总是一个重要的战场，特别是这几十年，中国共产党成立以后，无产阶级和资产阶级的斗争，在这儿总是非常矢就的，经过一年多无产阶级文化大革命，无产阶级革命派的力量在毛主席的与下有了征大的发展，把刘、邓在上海的代理人推了，把忙们氮夺的党、政、期、文大权夺回来了。上海的无产阶级革命派夺了权，这起低大的旺利，但阶级斗争不是新的，如看不到这一点，就要犯很大的错误，不要以为陈、曹甘心失败，他们等看复辟，还想把我们打成“反革命”，还想把丢们压下去，他们还会以各种方式向无产阶级革命派进攻，我们大家都知道上海不止有本地的、、反、坏右，帝匡主义、修正王义难道对上海就忘怀了！帝巨主义在上海经营了那么久的时盾，咖个帝医主义没有在上海长过》此p个帝国王义没在上海培养了一批走知！美帝国主义有，日、英·····帝医王义、化正王义难道在上海就没有特务听？王链就是苏作特分，所以，帝巨主义、修正主义反动派者没有旺宽，忙们都不是“追游派”，劫不知我们有些同志为什么当起“追遥派”来”这儿“追海派”不少！打打扑克，平时不上班，能工资来了，早上八点卸上班，十二点不到就下逊，下午也不来，追游待征，帝匡主义、敌人不起这样：他们空心思来整技们，上海每个角落皇面有耕么一些敌人在活动，个别地区沉皖啊飞那常沽，有些地区别是女同志、女工人、女学生，晚上不敢到外灿面张，投机倒把现象最近世非常指狂，这些都是什么呢？都是无产阶级文化大革命的对家！是无产阶级专政的对象！出现这些现象没有什么奇任，今天有这样的事信，明天还会有这在的事情，不要相信罗瑞卿什么七无八无的鬼话，阶级斗争没有惩灭！尚起在于我们无产阶级专政机关，我们无产阶级专政机关在干什么！我们无产阶级革命派强大的地万，就是群众专政，上海无产阶级革命派力量趣大，那敌人越拼命反抗，但他只能受到压，群众专政要和专政机关相精合，专政机关不强大，群众专诞得不到希助，得不到支持，就感到不好办，宅没有规定的！但专政机关怨么做的！公、梅、法起怎么做的呢？当然不能一年多来公、核、法没做过好事，大家还是很辛苦心红称灯还是开了有些事情还是办了』你们做了些好事，但今天会上我不想计这万面的成，我同志们想一想，公、被、法尽到自已资任没有！我们究竟尽了多少黄任，对全市无产阶子破了多少！我不想这个，有好多案子没有破啊！如今几个赤卫队坏头头关在那里差不多一年等了，你们究竟审问得怎碎啊！要拿他们的材料教育全市人民，走资派是怎补家就群众的，这是个很好的阶级教育材料！但赤卫队这几个坏头头还是去年12月份提起来的，去年的现在，过几天就是“康平路事补”了，这坚人捉起来快一年了，这样久了还没有熊决，分人气慎的是还有人认为这些人没什么，可以放掉，如“联司”几个坏头头叉审问得怎了！负货审问“联司”的几个坏头头的人，对“联司”路无阶级观点，一点造反派的底情者没有，星面有一个人甚至“除不显可以解放”，我听了非常生气，这种人不应当荐去做这个工作，也不能代我无产阶级的利益，我怀疑记这种话的人是陈、曹一派的。我只举这么几个例子，全市的革命群众都希望把赤卫队、“联司”的几个环头头的后题早些解决了，但远远不待解决了，这是记政治上、对敌斗争上，那么其老事情呢？世不符合上海的妄求，只拿交通税序来就，大家都讨庆武斗武斗的死了人，但由于交通享故死的人比武斗而死的人多几倍，死了许多人，茯序并不好，好多地方交道没人管，红称灯没人开，或很早就没人开了，我不是有二个月在上海，每天上都出来转，有时白天也出去，满街的人爱企么走就怎么走，司机眞难当啊，消防车都走不动但消防车拿来当武斗的工具倒有垦作用，救火反而开不出来，这难道是正常的嘱！我还影，今天有到会的同志一个周题，毛主席这次到上海时去们先竟做了些什么工作来保卫毛主店的安全啊7们想过没有！你们配毛主席到上海来我们不知道。快们为什么不知道？我可以公开告歌同志们，毛主席到上海的时候，正是你们两派“闪战”打得激烈的时候，别个动头邮，我敢告新同志们？你们听到这样的消息难追尾到不痛心？每天啦“毛主席万岁！”就忠于毛主席，但为什么不听毛主席的话死？主席到上海我坦率地，我不把这个任务交给你们，我不是不信任你们，那个时候正是你们内战”打得热翩的时候啊，如果你们还是一直这样干下去，那下一次主席"},{"type":"paragraph","text":"，还是这样，你们不痛心嘱？我是很痛心的啊！我就举这样一些例子，从治斗争、对敌斗争到一般工作，交通管瑶到开红称灯，一到最大的题，"},{"type":"paragraph","text":"毛主席安全，我们的专政工具不能献自己的力量，去打“内战”了。上次会上，几个贺贡同志作了自我批部，消革会、义革会都计了，都是阶兄弟物，册么厉害，后来是联合了，但到上灭座会为止，还是联而不，名义上是“公联指”，但“公联指”没有权力，消革、义革、人革小动做得少点，名义上联合了，但还是各人找各人的公革会，公革会的工作这个组织不是依靠公联指，有了事情不报告公联指，那不是名义上的联合？算什么样的联合，算有联合的诚意，有的同志搞走资派是对的，联合了就合行动，但搞应密行动。联合起来才有力量。为什么不去搞别人？从公旨本身来就斗争的矛头没有把准，把战士的吸引力到这方面采了。有的志，记话没用，没人听，没有权威。权威是在斗争中自然形成的，不是有权威就有权威。毛王席为什么这梓有权威，这是因为在长期时间里，导全国人民进行战斗敢得了胜利，明了毛主席最有权威的。陈独秀第一"},{"type":"paragraph","text":"总书记专台了，好几个总书记都夸了。公联指要想有权威，就要带领群打仗，并且要导群众打胜仗：如果不带群众打仗，并且要打胜仗，光要群众承人你有权威，别是不行的。名义上联合了，但小山头存在，有时底性发作，根本不考虑自已是什么样的单位。你们是专政机关心，到处抛材，到处印刷傅单，那实际上向敌人告密，告歌敌人已掌握了你什么材料，一有什么花料没等握好，好多重要问题停在那里，解决不了，黄赤波斗了多，贡赤波、王的同题你们解决了多少，我不能新，部的话就等于向敌人密。同志们要把头脑很好的病理一下，我们把公、核、法当成派性的工具是专政的工具，单管的决定就起金对这种情况的，你们可以随使捉人，你"},{"type":"paragraph","text":"是国家的权力，哪一个组织都没有这的权力。中央文革捉一个人要好几个人签字，你们是专政机关，你们中学的红卫兵，你们抓人最后还是送往公安局，你们现存的什么都有，这个比彰危，我题才新的都是些缺点错误。"},{"type":"paragraph","text":"【\u003c从头越\u003e第174期】"},{"type":"paragraph","text":"中央已经表态解决二十个省市的同其中有九个省市（自治区）成立了革命委员会"},{"type":"paragraph","text":"北京市革命委真会于一九六七年西月二十日成立，王任北京市"},{"type":"paragraph","text":"委真富治同志，付主任委员兵德关雉山、付崇碧、最元种同志。"},{"type":"paragraph","text":"我们伟大馈袖毛主席今年元月九日发表计话，支持上海上海市"},{"type":"paragraph","text":"夺权，忙老人家：“文汇报现由左派夺了权，四日造反，解放日报六日也造了反，这个万向是好的。文汇报夺权后，三知报都看了远登了红卫兵的文章。有些好文章可选登。文汇报五日《告全市人民书人民日报可以翰载，电台可以广播。内部造反征好，这几天可写粽合报导这是一个阶级拒街另一个阶级，这是一场大革命·"},{"type":"paragraph","text":"二月五日成立上海市人民公社临时委真会，二月二十三日，致称上海市英命变真会，由张春桥奶文元等同志硕导"}],"authors":["张春桥"],"dates":[{"year":1967,"month":12,"day":19}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":5},"tags":[{"name":"张春桥","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"付崇碧","type":"人物"},{"name":"罗瑞卿","type":"人物"},{"name":"陈独秀","type":"人物"},{"name":"中央文革","type":"人物"},{"name":"捍卫毛泽东思想工人赤卫队上海总部（赤卫队）","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"革命委员会","type":"主题/事件"},{"name":"派性","type":"主题/事件"},{"name":"武斗","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]},{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"张春桥在“热烈欢迎中国人民解放军毛泽东思想宣传队进驻市公安局大会”上的讲话","authors":["张春桥"],"dates":[{"year":1967,"month":12,"day":19}],"is_range_date":false,"parts":[{"text":"张春桥在“热烈欢迎中国人民解放军毛泽东思想宣传队进驻市公安局大会”上的讲话","type":"title"},{"text":"张春桥","type":"authors"},{"text":"版本一：","type":"subtitle"},{"text":"首先让我们看看上海的形势。上海的形势好不好？上海的形势是好的，我觉得这是符合实际的，无产阶级革命派的大联合是巩固的，革命的三结合也是逐步发展完善的，总起来说，革命群众、解放军和革命干部之间的关系是处理比较好的，形势是向前发展的，比较稳的。然而反复是有的，这是正常现象。局部的武斗是存在的，没有什么了不起，我们相信那里人民群众总会用自己的力量来制止武斗。","type":"paragraph"},{"text":"形势是好的，但这不能说上海形势大好，就不说上海存在一些重大问题，重大缺点。阶级斗争是复杂的、尖锐的。上海虽然只是一个城市，但在中国一百多年头，在阶级斗争中间，在民族斗争中间，上海总是一个重要战场。特别是这几十年，中国共产党成立以后，无产阶级和资产阶级的斗争，在这儿总是非常尖锐的。经过一年多的无产阶级文化大革命，无产阶级革命派的力量在毛主席的领导下，有了很大的发展，把刘、邓在上海的代理人推翻了，把他们篡夺的党政财文大权夺回来了。","type":"paragraph"},{"text":"上海的无产阶级革命派夺了权，这是很大的胜利。但阶级斗争不是结束了，阶级斗争还在继续，在某些方面，阶级斗争还是非常残酷、非常尖锐的，如看不到这一点，就要犯很大错误。不要以为陈、曹甘心失败了，他们等着复辟，还想把我们打成反革命，还想把我们压下去，他们还会以各种方式向无产阶级革命派进攻。","type":"paragraph"},{"text":"我们大家都知道，上海不止有本地的地富反坏右，帝国主义、修正主义难道对上海就忘怀了吗？帝国主义在上海经营了那么长的时间，哪一个帝国主义没在上海呆过啊？哪个帝国主义没在上海培养了一批走狗啊！美帝国主义有，英帝国主义有，日帝国主义有……，苏联修正主义难道在上海就没有特务吗？王鉴就是苏修特务。所以帝国主义、修正主义、反动派都没有睡觉，他们都不是逍遥派，却不知我们有些同志为什么当起逍遥派来。这儿逍遥派不少啊！打打扑克，平常不上班，领工资来了！早上八点钟上班，十二点不到就下班，下午也不来，逍遥得很。帝国主义、敌人不是这样，他们挖空心思来整我们，上海各个角落里面有那么一些敌人在活动，个别地区流氓、阿飞非常活跃。有些地区特别女同志、女工人、女学生晚上不敢到外面来，投机倒把现象最近也非常猖狂，这些都是什么呢？都是无产阶级文化大革命的对象嘛！是无产阶级专政的对象嘛！出现这些情况没有什么奇怪，今天有这样的事情，明天还会有这样的事情。","type":"paragraph"},{"text":"不要相信罗瑞卿什么十无、八无、七无的鬼话，阶级斗争没有熄灭嘛，问题在于我们无产阶级专政机关，我们无产阶级专政机关在干什么？我们无产阶级革命派强大的地方，就是群众专政，上海无产阶级革命派力量越大，那敌人越拼命反抗，但他只能受到镇压。群众专政要和专政机关相结合，专政机关不强大，群众专政得不到帮助，得不到支持，就感到不好办，他没有规定啊，不好抓人啊！就拿中央文革“六·六”通令来讲，也只是说专政机关可以抓人啊，但专政机关怎么做的呢？公检法是怎么做的呢？当然不能说一年多来公检法没有做过好事，大家还是很辛苦嘛，秩序还是大家维持了嘛，红绿灯还是开了嘛，有些事情还是办了嘛，你们做了一些好事，但今天会上我不想讲这方面的成绩。我请同志们想一想，公检法尽到自己责任没有，我们究竟尽了多少责任，对全市无产阶级革命派，我们支持了多少，帮了多少忙，为他们服务得怎么样，好多重大的案子破了多少？我不想说这个数字，好多案子没有破啊！譬如说，赤卫队的几十个坏头头，关在那里差不多一年了，你们究竟审问的怎么样啊！","type":"paragraph"},{"text":"要拿他们的材料教育全市人民，走资派是怎样蒙蔽群众的，这是个很好的阶级教育材料嘛！但“赤卫队”的几个头头还是去年十二月份捉起来的，去年的现在再过几天就是康平路事件了，这些人捉起来快一年了，这样久了还没解决。令人气愤的是竟还有些人认为这些人没什么，可以放掉。又如“联司”的几个坏头头，又审问的怎么样了？负责审问“联司”的几个坏头头的人，对“联司”毫无阶级观点，一点造反派的感情都没有。里边还有一个说陈丕显这个人可以解放，我听了非常生气，这种人不应该让他做这个工作，他不能代表无产阶级的利益，我怀疑说这种话的人是陈、曹一派的，不是我们这一派的。我是举这么几个例子嘛，全市的革命群众都希望把“赤卫队”、“联司”的几个坏头头的问题早些解决了，但迟迟不得解决。","type":"paragraph"},{"text":"公检法这个系统我讲了，无产阶级司令部是关心这个地方的，资产阶级司令部也有黑手，伸得很深。拿上海公安局来讲，哪一位局长比较好？李士英是第一任，是个叛徒，后来是杨帆、黄赤波，他们一直是对抗毛主席革命路线的，是破坏无产阶级专政和无产阶级专政机关的，在这十几年里，干尽了坏事，在他们控制的地方，在黑手控制的地方，把矛头对准无产阶级司令部，这个情况，在这个会上我不多说，他们把矛头实际上是针对毛主席，做了非常多的坏事。","type":"paragraph"},{"text":"这些人组织上虽然已经垮台了，但政治上、思想上还没有垮台，哪个神秘破案，不依靠群众，工作拖拖拉拉还存在，但组织上也不能说已经解决了，这些组织里还有他们的死党，我们并没有揪出来。为什么从一月夺权，公安局的斗争大方向老是受干扰，那里边没有黑手哇？和“公联指”同志们座谈，他们举了很多例子，证明有人在挑动，他们不愿意失败，他们不愿意用毛泽东思想武装起来，他们从“左”方面来进攻，想使我们保持旧的机构原封不动。我很怀疑检察院那个革委会是否真正的革命委员会。因为这个革命委员会不是阶级斗争盖子揭透了，造反派得到锻炼了，三结合条件成熟了，不是这样搞出来的。希望检察院的同志们考虑考虑，我只是怀疑检察院的同志们还没有那一股冲劲儿。","type":"paragraph"},{"text":"我希望在这个大会后，回去讨论讨论，在最近到底干些什么事，我们希望你们能好好地打几个大仗，打几个硬仗、漂亮仗，来表示你们公检法面貌焕然一新了。交通管理这一仗是可以打的了。有些地方，流氓阿飞、投机倒把比较活跃。那我们为什么不可以依靠那里的群众，把这个仗打一打呢？我看你们把这两件事做好，你们在群众里面的威信就会提高。你们要想提高威信，就要打几个大仗、硬仗、打几个漂亮仗。","type":"paragraph"},{"text":"今天，我们每个革命群众组织负责人都来了，就是对你们的支持，你们要打几个大仗、硬仗、不大好打的仗，把公检法彻底改过来，把自己内部的走资派揪出来，肃清刘、邓、陶、彭、罗、陆、杨的影响。只要你们依靠广大群众，联合起来，就会打好这些仗。应该预计到会有困难，会有阻力，但有困难、有阻力会把我们锻炼的更坚强。也只有打了几个大仗、硬仗、漂亮仗，联合才能巩固，三结合才能实现。","type":"paragraph"},{"text":"还有的同志问我，搞流氓、阿飞要做的调查，那算不算黑材料？我们就搞这个材料嘛！如果公安局里没有反革命的材料，那还算什么公安局呢？！问题不在于公安局有没有反革命的材料，我们说的是走资派把革命群众打成反革命，而没有说把反革命打成反革命，反革命你不打怎么行呢？公安局整反革命的材料不算黑材料，是红材料，是革命的材料。","type":"paragraph"},{"text":"有的同志不是走资派，但头脑里旧的东西很多，看造反派不顺眼，把造反派看成反革命，那我们就要帮助他们把立场转过来，把阶级感情转过来，如果有人借我刚才的话去整造反派的黑材料，那是不许可的。","type":"paragraph"},{"text":" 来源：周良霄顾菊英编《疯狂、扭曲与堕落的年代》之二——《十年文革中首长讲话传信录》， 2009。","type":"paragraph"},{"text":"版本二：","type":"subtitle"},{"text":"首先让我们看看上海的形势，上海的形势好不好？上海的形势是好的，我觉得这是符合实际的，无产阶级革命派的大联合是巩固的，革命的三结合也是逐步发展完善的，总起来说，革命群众、解放军和革命干部之间的关系是处理比较好的，形势是向前发展的，比较稳的。然而反复是有的，这是正常现象，局部的武斗是存在的，没有什么了不起，我们相信那里人民群众总会用自己的力量来制止武斗。","type":"paragraph"},{"text":"形势是好的，但这不能说上海形势大好，就不说上海存在一些重大问题，重大缺点，阶级斗争是复杂的，尖锐的，上海虽然是一个城市，但在中国一百多年头，在阶级斗争中间，在民族斗争中间，上海总是一个重要战场，特别是这几十年中国共产党成立以后，无产阶级和资产阶级的斗争，在这儿总是非常尖锐的，经过一年多的无产阶级文化大革命，无产阶级革命派的力量在毛主席的领导下，有了很大的发展，把刘邓在上海的代理人推翻了，把他们篡夺的党政财文大权夺回来了，上海的无产阶级革命派夺了权，这是很大的胜利，但阶级斗争不是结束了，阶级斗争还在继续，在某些方面阶级斗争还是非常残酷，非常尖锐的，如看不到这一点，就要犯很大错误。","type":"paragraph"},{"text":"不要以为陈、曹甘心失败了。他们等着复辟还想把我们打成反革命，还想把我们压下去，他们还会以各种方式向无产阶级革命派进攻。我们大家都知道，上海不止有本地的地富反坏右，帝国主义、修正主义，难道对上海就忘怀了吗？帝国主义在上海经营了那么长的时间，那一个帝国主义没有在上海呆过啊？那个帝国主义没在上海培养了一批走狗啊？美帝国主义有，英帝国主义，日帝国主义有……，苏联修正主义难道在上海就没有特务吗？王镒就是苏修特务，所以帝国主义、修正主义，反动派都没有睡觉，他们都不是逍谣派，都不知我们有些同志为什么当起逍遥派来，这儿逍遥派不少啊，打打扑克，平常不上班领工资来了，早上八点钟上班，十二点不到就下班，下午也不来，逍遥得很，帝国主义，敌人不是这样，他们挖空心思来整我们。","type":"paragraph"},{"text":"上海各个角落里面有那么一些敌人在活动，个别地区流氓阿飞非常活跃，有些地区特别女同志，女工人，女学生，晚上不敢到外面来，投机倒把现象最近也非常猖狂，这些都是什么呢？都是无产阶级文化大革命的对象么！是无产阶级专政的对象么，出现这些情况没有什么奇怪，今天有这样的事情，明天还会有这样的事情。","type":"paragraph"},{"text":"不要相信罗瑞卿什么“十无”、“八无”、“七无”的鬼话，阶级斗争没有熄灭么，问题在于我们无产阶级专政机关，我们无产阶级专政机关在干什么？我们无产阶级革命派强大的地方，就是群众专政，上海无产阶级革命派力量越大，那敌人越拼命反抗，但他只能受到镇压，群众专政要和专政机关相结合，专政机关不强大，群众专政得不到帮助得不到支持，就感到不好办，他没有规定啊，不好抓人啊，就拿中央文革六·六通令来讲，也只是说专政机关可以抓人啊，但专政机关怎么做的呢？公检法是怎么做的呢？当然不能说一年多来公检法没做过好事，大家还是很艰苦么，秩序还是大家维持了么，红绿灯还是开了么，有些事情还是办了么，你们做了一些好事，但今天会上我不想讲这方面的成绩。我请同志们想一想，公检法尽到自己责任没有，我们究竟尽了多少责任，对全市无产阶级革命派，我们支持了多少，帮了多少忙，为他们服务得怎么样，好多重大的案子破了多少，我不想说这个数字，好多案子没有破啊。譬如说，赤卫队的几个坏头头，关在那里差不多一年了，你们究竟审问的怎么样啊？","type":"paragraph"},{"text":"要拿他们的材料教育全市人民，走资派是怎样蒙蔽群众的，这是个很好的阶级教育材料嘛，但赤卫队这几个头头还是去年12月份捉起来的，去年的现在再过几天就是康平路事件了，这些人捉起来快一年了，这样久了，还没有解决，令人气愤的是竟还有些人，认为这些人没什么，可以放掉。又如联司的几个坏头头，又审问得怎么样了，负责审问联司的几个坏头头的人，对联司毫无阶级观点，一点造反派的感情都没有，里边还有一个人说陈还是这个人，可以解放，我听了非常生气，这种人不应该让他做这个工作，也不能代表无产阶级的利益，我怀疑说这种话的人是陈、曹一派的，不是我们这一派的。我只举这么几个例子嘛，全市的革命群众都希望把赤卫队、联司的几个坏头头的问题早些解决了，但迟迟不得解决。","type":"paragraph"},{"text":"公检法这个系统我讲了，无产阶级司令部是关心这个地方的，资产阶级司令部也有黑手，伸的很深，刘、邓、彭、罗、陆、杨，他们这一只手陈、曹等。拿上海公安局来讲，那一位局长比较好，×××是第一任，是个叛徒，后来是杨帆、黄赤波。他们是一直对抗毛主席革命路线的，是破坏无产阶级专政和无产阶级专政机关的，在这十几年里，干尽了坏事，在他们控制的地方，在黑手控制的地方，把矛头对准无产阶级司令部。","type":"paragraph"},{"text":"这个情况，在这个会上我不多说，他们把矛头实际上是针对毛主席，做了非常多的坏事。这些人组织上虽然已经垮台了，但政治上、思想上也不能说已经解决了，这些组织里还有他们的死党，我们并没有揪出来，为什么从一月夺权，公安局的斗争大方向老是受干扰，那里边没有黑手哇，和公联指同志们座谈，他们举了很多例子，证明有人挑动，他们不愿意失败，他们不愿意用毛泽东思想武装起来，他们从“左”的方面来进攻，想使我们保持旧的机构原封不动，我很怀疑检察院那个革委会是否真正的革命委员会。因为这个革命委员会不是阶级斗争盖子揭透了，造反派得到锻炼了，三结合条件成熟了，不是这样搞出来的，希望检察院的同志们考虑考虑，我只是怀疑检察院的同志们没有那一股冲劲儿。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"张春桥","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"罗瑞卿","type":"人物"},{"name":"中央文革","type":"人物"},{"name":"捍卫毛泽东思想工人赤卫队上海总部（赤卫队）","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"革命委员会","type":"主题/事件"},{"name":"武斗","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]},{"id":"zhangchunqiao","name":"春桥文录","internal":false,"type":"pdf","official":false,"author":"张春桥","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/zhangchunqiao.pdf"],"article":{"title":"张春桥在“热烈欢迎中国人民解放军毛泽东思想宣传队进驻市公安局大会”上的讲话","parts":[{"type":"title","text":"张春桥在“热烈欢迎中国人民解放军毛泽东思想宣传队进驻市公安局大会”上的讲话"},{"type":"paragraph","text":"首先让我们看看 命路线的，是破坏无产阶级专政和无产阶级专政机关的，在这十几年里，干尽了坏事，在他们控制的地方，在黑手控制的地方，把矛头对准无产阶级司令部。"},{"type":"paragraph","text":"这个情况，在这个会上我不多说，他们把矛头实际上是针对毛主席，做了非常多的坏事。这些人组织上虽然已经垮台了，但政治上、思想上也不能说已经解决了，这些组织里还有他们的死党，我们并没有揪出来，为什么从一月夺权，公安局的斗争大方向老是受干扰，那里边没有黑手哇，和公联指同志们座谈，他们举了很多例子，证明有人挑动，他们不愿意失败，他们不愿意用毛泽东思想武装起来，他们从“左”的方面来进攻，想使我们保持旧的机构原封不动，我很怀疑检察院那个革委会是否真正的革命委员会。因为这个革命委员会不是阶级斗争盖子揭透了，造反派得到锻炼了，三结合条件成熟了，不是这样搞出来的，希望检察院的同志们考虑考虑，我只是怀疑检察院的同志们没有那一股冲劲儿。"}],"authors":["张春桥"],"dates":[{"year":1967,"month":12,"day":19}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":263,"page_end":264,"alias":""},"tags":[{"name":"张春桥","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"中央文革","type":"人物"},{"name":"捍卫毛泽东思想工人赤卫队上海总部（赤卫队）","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"革命委员会","type":"主题/事件"},{"name":"武斗","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6a68742048"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
