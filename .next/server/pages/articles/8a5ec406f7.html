" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"辽宁部分农村、工厂发生压制民主、打击报复事件","authors":["新华通讯社"],"dates":[{"year":1961,"month":12,"day":22}],"is_range_date":false,"parts":[{"text":"辽宁部分农村、工厂发生压制民主、打击报复事件","type":"title"},{"text":"新华通讯社","type":"authors"},{"text":"本刊讯  最近，辽宁有些农村、工厂揭发出一些压制民主、打击报复的事件。","type":"paragraph"},{"text":"在农村方面，新宾县木奇公社下营子生产大队贫农社员郭殿武，在整风整社运动中揭发了大队长韩同发的违法乱纪行为，韩怀恨在心，乘整风工作组回县开会之机，以郭“偷二百斤土豆子”为由，召开大会进行斗争、毒打，一直将郭打得遍身青肿，造成精神失常。本溪县草河口公社武装助理刘廷范向县控告副社长曹永库违法乱纪问题，控告信被转交给曹永库本人处理。曹见信中提到“五一大队副队长刘廷余可作证”，就认定刘廷余是“主谋”，便捏造刘是“破产地主，比黄世仁还厉害”，并加上“挑拨干群关系，破坏食堂”等罪名，开会进行追逼，强令刘承认这些“罪状”，交代控诉“用意”，并当场宣布刘停职反省，致使刘廷余于第二天早晨服毒自杀(曹永库已被开除党籍，逮捕法办)。盘山县渤海公社郭家大队社员赵希山，在一次社员大会上揭发了副大队长张连厚、小队长赵恩华、李惠恩等人克扣社员口粮、大吃大喝等问题。赵恩华、李惠恩在张建厚的纵容下，竟给赵家五口只停饭五天。赵希山在这种情况下挖了别人几棵土豆子，因此他们对赵进行拷打。赵被打后，当天喝了卤水，因急救未死，但张连厚等人却不准医生给予治疗，反而强迫赵下地干活。后赵希山在群众大会上控诉了他们的罪行，李惠恩、赵恩华等人竟当场把赵希山活活打死(张连厚、李惠恩、赵恩华已经法办)。","type":"paragraph"},{"text":"在工厂方面，抚顺市耐火材料厂党委书记翟良璧工作中犯有违法乱纪错误。他唯恐别人揭发他的错误，就经常威吓群众，说：“谁给党委书记提意见，谁就是反党！”该厂文化教员董锐峰在整风运动中写一张大字报，批评了他的错误行为，他极为满，说“他敢骂党委书记，一辈子不提拔他，压死他！”董锐峰同志被评为模范教师时，翟就利用职权将材料扣下，不予上报。鞍钢燃气厂厂长、总支委员丁世维包庇重用曲宝贵等三名反革命分子，提拔曲为厂长助理和肃反办公室副主任，并把别人揭发曲宝贵的罪恶事实全部告诉了曲。在整风运动中，该厂工会主席吴殿纯、人事股长关殿祥同志揭发了丁世维的上述错误后，丁即与总支副书记赵福绵、总支委员李长有(坏分子)等人勾结一起，给吴殿纯、关殿祥扣上“污蔑领导”、“攻击领导”等帽子，予以撤职和留党察看的处分。","type":"paragraph"},{"text":"来源：1961年12月22日新华社《内部参考》。","type":"paragraph"}],"comments":[],"origin":"美国图书馆收藏","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8a5ec406f7"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
