<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共四川省委办公厅秘书处冯希尧同志关于江北县当前抢治疾病的情况汇报","authors":[],"dates":[{"year":1962,"month":1,"day":30}],"is_range_date":false,"parts":[{"text":"中共四川省委办公厅秘书处冯希尧同志关于江北县当前抢治疾病的情况汇报","type":"title"},{"text":"卫生处联章同志并告龚毅浩二同志：请考虑给江津专区再抽调一批医生或者医学院校的学生（可以治病的学生），并告我知道。    杜心源  30/1","type":"paragraph"},{"text":"冯希尧同志关于江北县当前抢治疾病的情况汇报","type":"subtitle"},{"text":"（1962年1月29日）","type":"subtitle"},{"text":"省委并江津地委：","type":"appellation"},{"text":"江北县1月以来病情逐渐有所发展，1月5日统计全县有病112，190人，其中肿病和枯瘦病人94，481人，至10日上升为120，635人，15日上升为133，801人，20日上升为141，523人，到25日发病达147，560人，占总人口647，100人的22％，其中肿病和枯瘦病人124，834人，占病人总数的84％。到25日的发病数比12月底96，852人增加50，708人，增加52．5％。已经集中医院治疗和疗养的80，934人，占病人总数的55％。1月以来，死亡逐渐有所减少，1至25日共死亡4，672人，每天平均死亡186人，比12月平均日死亡数减少47人，下降20％。这段时间为什么病情逐渐上升，死亡还相当严重呢？据在几个地方的重点了解，主要有以下原因：一是口粮少，时间拖久了，而且去年11、12月间曾供应了一部分红苕和高粱，群众实际吃粮低于4两的水平；二是蔬菜逐渐减少，部分地区和部分群众蔬菜很少或者没有菜吃；三是气候较冷，群众身体御寒能力很弱，四是前段时间对于全力以赴，抓抢治病人的工作抓得不狠，病情的底子摸得不清，有些具体问题解决得不及时。死人多的原因，从木耳区的情况看，一方面集中抢救重病人的工作抓迟了，少数病人由轻转重，重病转危，医疗条件太差，无力抢救而死亡；另方面，在重病人中多数是数度复发病人，病情一次比一次加重，时间拖得较久，枯瘦严重，而且多有夹杂病，病危时虽经抢救也未能挽救生命。如木耳区1月1日至24日死亡424人，其中50岁以上的有247人，占死亡数的58．2％；10至50岁的103人，占24．4％；10岁以下的74人，占17．4％。从这个数字看，多数是老年人，其次是评级劳动力，再就是小孩。","type":"paragraph"},{"text":"当前抢救疾病工作，除医务人员和药品缺乏外，主要有两个问题：第一，病人多的地区部分干部表现畏难情绪，尤其2是医疗条件差的地区，干部畏难情绪更重。如舒家公社党委书记认为病人多，问题严重，不如早点回家不干，不然就是被斗争下台，另一种情绪是病情较轻的地区，如新隆区几个公社一级的干部认为问题不太严重，表现麻痹情绪，对治病工作抓得不狠。第二，病人大量集中以后，部分大队医院管理得不好。如仁睦公社中建大队医院有病人158人，其中重病人18人，该院只有医生一人，而且生病卧床，有三个护理员不懂业务，医院没有菜吃，没有开水、热水，燃料缺乏，病房没有烤火，药品很少，病人没有药吃，这个月20多天，工作人员多吃多占粮食119斤。我们看到的木耳黄角大队医院也有类似情况。据区委同志介绍全区59个大队医院，类似上述情况的医院就有26个。医院管理不好，是当前治病工作的一个突出问题。","type":"paragraph"},{"text":"针对上述情况，我们已同当地区、社党委研究采取如下措施：","type":"paragraph"},{"text":"1．进一步加强教育，立志气，鼓干劲，战胜病情，克服麻痹和畏难情绪，突出强调抢救病人的重大任务。除安排生活和有能力进行的生产活动外，其他工作活动一律暂停，不必要的会议不开，一切工作服从治病，有关治病的问题，必须当机立断，迅速解决。","type":"paragraph"},{"text":"2．对医院加强领导。区委书记和公社党委书记亲自抓中心医院和重点大队医院；支部书记亲自抓大队医院，并实行包干负责制，蹲下来解决医院的管理问题；所有派下去的脱产干部和工作团干部都深入到医院，深入到病房，并随时掌握院外病情的发展。","type":"paragraph"},{"text":"3．目前中心医院集中的大多数为重病人和垂危病人，因此中心医院以抓抢救和治疗为主；同时，办好病人生活。大队医院集中的绝大多数是中度病人，主要是进行疗养，因此大队医院主要是抓好生活管理；同时，对少数重病加强护理和治疗。医院实行民主管理制度，口粮定量到人，副食口按定量直接发给病人。此外，选调过去办食堂有经验的管理员和炊事员，到医院工作，改进伙食管理。","type":"paragraph"},{"text":"4．当前重病人很多，医务人员量少质弱，请求再给江北调派医务璧山的医务力量也很缺乏，也请增调医务人员五、六十人。","type":"paragraph"},{"text":" 省委工作组  冯希尧1962年1月29日","type":"paragraph"},{"text":"打字：未  校：马","type":"paragraph"},{"text":"抄送：各书记，各秘书长，办公厅，农工部，宣传部，除害灭病办公室，并西南局办公厅（5）。","type":"paragraph"},{"text":"（共印32分）","type":"paragraph"},{"text":"中共四川省委办公厅秘书处  一九六二年一月三十日印","type":"paragraph"}],"comments":[],"origin":"四川省某档案馆","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fdb3fa3695"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
