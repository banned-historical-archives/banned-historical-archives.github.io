script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"周恩来对周培源来信的批语","authors":["周恩来"],"dates":[{"year":1972,"month":7,"day":23}],"is_range_date":false,"parts":[{"text":"周恩来对周培源来信的批语","type":"title"},{"text":"周恩来","type":"authors"},{"text":"(这是周恩来同志写给当时国务院科教组和中国科学院负责人的批语。周培源：物理学家，北京大学副校长)","type":"subtitle"},{"text":"把周培源同志来信和我的批语及你们批件的意见都退给你们好作根据，在科教组和科学院好好议一下，并要认真实施，不要如浮云一样，过了就忘了。","type":"paragraph"},{"text":"[附]：一九七二年七月十四日，周恩来同志对周培源同志谈话中指出，要把综合大学的理科办好，提高基础理论水平，并强调有什么障碍就要拔除。七月二十日，周培源同志给周恩来同志写了一封信，全文如下：","type":"paragraph"},{"text":"总理：","type":"appellation"},{"text":"关于我国基础科学现在这样落后，我认为有下列一些原因：","type":"paragraph"},{"text":"一、文化大革命前基础科学研究工作，缺乏具体领导。在一九五六年制定的科学规划的第五十六项任务“自然科学中的重大基本理论问题”(这是您指示我们制订的)和“基础科学规划”，由于没有具体单位去抓，基本上都没有落实。一九六三年的十年科学规划中，国家科委只抓了三十二个“国重”(国家重点项目)，也没有做，更没有抓比较全面的规划，经过文化大革命，这三十二个“国重”大致都垮了。","type":"paragraph"},{"text":"二、科学院的研究所应该注意基础科学研究。但据了解，如物理研究所，在文化大革命前大部分的力量花在任务上，接受生产单位的试验性工作，做完就完了，没有能够做到预计的那样“任务带学科”，把学科带动起来，这种情况在其他研究所可能也有。","type":"paragraph"},{"text":"三、学校中科研工作反复性很大，一会儿这样，一会儿那样，没有能够坚持几年的艰苦工作，做些成绩出来。来一次运动首先受冲击的是基础理论研究。似乎科学院也有类似的情况。","type":"paragraph"},{"text":"以北京大学为例。现在老中教师普遍的思想情况是不愿搞也怕搞基本理论研究。怕在短期搞不出成绩，怕挨“理论脱离实际”的批评。教师中对基础理论的重要性，还没有建立起正确的认识。","type":"paragraph"},{"text":"在您七月十四日晚对北大的指示向北大党委常委传达后，理科教师都很激动，感到党中央对我们的亲切关怀，都表示要做好工作。理科的教改组对过去的科学研究工作曾作过一些调研，今拟进一步总结经验。","type":"paragraph"},{"text":"我感到，要使我国基础科学赶上去，关键在于领导。是否可以让中国科学院统一领导全国基础科学研究工作，其中包括综合性大学的理论研究工作。","type":"paragraph"},{"text":"其次，要发动科学界的广大群众，统一对基础科学工作重要性的认识，把大家的积极性调动起来。","type":"paragraph"},{"text":" 周培源","type":"paragraph"}],"comments":[],"origin":"周良霄、顾菊英编《疯狂、扭曲与堕落的年代》之二——《十年文革中首长讲话传信录》, 2009。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"批示"}]},{"id":"chuanxinlu3","name":"十年文革中首长讲话传信录（下册）","internal":false,"type":"pdf","official":false,"author":"周良霄,顾菊英","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/十年文革中首长讲话传信录3.pdf"],"article":{"title":"周恩来对周培源来信的批语","parts":[{"type":"title","text":"1102．周恩来对周培源来信的批语①"},{"type":"paragraph","text":"(1972年7月23日)①这是周恩来同志写给当时国务院科教组和中国科学院负责人的批语。"},{"type":"paragraph","text":"把周培源①同志来信和我的批语及你们批件的意见都退给你们好作根据，在科教组和科学院好好议一下，并要认真实施，不要如浮云一样，过了就忘了。[附]：一九七二年七月十四日，周恩来同志对周培源同志谈话中指出，要把综合大学的理科办好，提高基础理论水平，并强调有什么障碍就要拔除。七月二十日，周培源同志给周恩来同志写了一封信，全文如下：总理："},{"type":"paragraph","text":"关于我国基础科学现在这样落后，我认为有下列一些原因："},{"type":"paragraph","text":"一、文化大革命前基础科学研究工作，缺乏具体领导。在一九五六年制定的科学规划的第五十六项任务“自然科学中的重大基本理论问题”(这是您指示我们制订的)和“基础科学规划”，由于没有具体单位去抓，基本上都没有落实。一九六三年的十年科学规划中，国家科委只抓了三十二个“国重”(国家重点项目)，也没有做，更没有抓比较全面的规划，经过文化大革命，这三十二个“国重”大致都垮了。"},{"type":"paragraph","text":"二、科学院的研究所应该注意基础科学研究。但据了解，如物理研究所，在文化大革命前大部分的力量花在任务上，接受生产单位的试验性工作，做完就完了，没有能够做到预计的那样“任务带学科”，把学科带动起来，这种情况在其他研究所可能也有。"},{"type":"paragraph","text":"三、学校中科研工作反复性很大，一会儿这样，一会儿那样，没有能够坚持几年的艰苦工作，做些成绩出来。来一次运动首先受冲击的是基础理论研究。似乎科学院也有类似的情况。"},{"type":"paragraph","text":"以北京大学为例。现在老中教师普遍的思想情况是不愿搞也怕搞基本理论研究。怕在短期搞不出成绩，怕挨“理论脱离实际”的批评。教师中对基础理论的重要性，还没有建立起正确的认识。"},{"type":"paragraph","text":"在您七月十四日晚对北大的指示向北大党委常委传达后，理科教师都很激动，感到党中央对我们的亲切关怀，都表示要做好工作。理科的教改组对过去的科学研究工作曾作过一些调研，今拟进一步总结经验。"},{"type":"paragraph","text":"我感到，要使我国基础科学赶上去，关键在于领导。是否可以让中国科学院统一领导全国基础科学研究工作，其中包括综合性大学的理论研究工作。"},{"type":"paragraph","text":"其次，要发动科学界的广大群众，统一对基础科学工作重要性的认识，把大家的积极性调动起来。"},{"type":"paragraph","text":"周培源"}],"authors":["周恩来"],"dates":[{"year":1972,"month":7,"day":23}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":620,"page_end":621,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0e266116fb"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
