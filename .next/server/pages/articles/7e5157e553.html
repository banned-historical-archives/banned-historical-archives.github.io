script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji17","name":"毛泽东全集第17卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji17.pdf"],"article":{"title":"给凯丰的信","alias":"","parts":[{"type":"paragraph","text":"给凯丰的信"},{"type":"paragraph","text":"（1943年4月22日）凯丰同志："},{"type":"paragraph","text":"从前你有几封信我还未回复，兹复于下：（一）小资产自由主义问题，今年五五来说，还不相宜，就全党来说，目前还是让自由主义暴露的时候，还不宜于就作总论。惟今年五五，中宣部或可发表一个一般整风学习的总结性的东西，以推动全党的整风，请加考虑。（二）生日决定不做。做生的太多了，会生出不良影响。目前是内外困难的时候，时机也不好。我的思想（马列）自觉没有成熟，还是学习时候，不是鼓吹时候；要鼓吹只宜以某些片断去鼓吹（例如整风文件中的几件），不宜当作体系去鼓吹，因我的体系还没有成熟。（三）高、中两级干部教育计划，依你昨日主张暂停为好，先做肃奸教育，配合此次肃奸工作，昨信已复。（四）中宣部今年业务集中于干部教育、国民教育、文艺运动三项，同意此种意见。惟译、著方面（译是马列，著是历史），须集几个人来干，期于有些成绩。以上请考虑。明日拟开一次宣委会议。"},{"type":"paragraph","text":"敬礼！"},{"type":"paragraph","text":"毛泽东四月二十二日"}],"authors":["毛泽东"],"dates":[{"year":1943,"month":4,"day":22}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":533,"page_end":533},"tags":[{"name":"毛泽东","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7e5157e553"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
