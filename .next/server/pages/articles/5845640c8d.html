script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"我认识到多占工分就是剥削","authors":["鲁同春"],"dates":[{"year":1964,"month":12,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"我认识到多占工分就是剥削"},{"type":"paragraph","text":"我们队里，在今年秋季分配当中，组织贫农下中农分配小组，审查干部的劳动工分。审查结果，我被核掉的不合理工分有一百五十八个。这些多占的工分，主要是做轻活拿大工分；做半天活拿整天工分；以及有时因公误工半天而记上全天工分等。这些不合理的工分，完全应该核掉。说句老实话，这个问题，我是经过一番激烈的思想斗争，才得到正确的认识的。开始我认为，当生产队干部，无论什么事情，总要干在前头，多记这么一点点的工分，就有人提意见，要求太苛刻了。以后，我虽然主动把不合理的工分检查出来了，但思想很不愉快。领导同志发现我这个思想苗头以后，又认真严肃地指出我的不对，并强调说：干部多占不合理的工分，这是好逸恶劳的具体表现，也是使干部由好变坏的开始。这短短几句话，不断在我脑子里翻来复去，越想越觉得有道理。我是个队里的管家人，如果多占队里工分，就会不好好劳动。同时，自己有自私行为，在处理其他问题上，也就理不直气不壮。我还认识到：多占了工分，就是侵占社员的劳动成果，这不仅是个资产阶级思想问题，实际是个剥削行为。我是雇农出身，从小要过饭，解放前在地主家干了六七年的长工，受尽了压迫和剥削，过着牛马不如的地狱生活。解放后，我在政治上、经济上都翻了身，现在当了干部，再想多记工分，剥削大家的劳动成果，这不是忘本思想吗？通过这次分配，审查干部的劳动工分，使我受到一次深刻的阶级教育，真正认识到贫农下中农审查干部的劳动工分，是出自内心的帮助。只有贫下中农阶级兄弟，才能把我从岔路拉向正路，才能不使我们由好变坏，才能使我们严肃彻底地进行自我革命。"},{"type":"paragraph","text":"我决心从今以后，认真吸取教训，坚决做到切实参加劳动，干活实打实，干一分活，记一分工，不合理的工分坚决不要。"},{"type":"paragraph","text":"江苏宝应鲁垛公社鲁垛大队街南生产队队长  鲁同春（刘其华记）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5845640c8d"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
