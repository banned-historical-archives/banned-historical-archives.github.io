" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"天津大张旗鼓镇压反革命","authors":["人民日报讯"],"dates":[{"year":1951,"month":4,"day":4}],"is_range_date":false,"parts":[{"text":"天津大张旗鼓镇压反革命","type":"title"},{"text":"人民日报讯","type":"authors"},{"text":"【人民日报讯】天津市大张旗鼓地镇压反革命的结果，使人民群众政治觉悟迅速提高，并纷纷起来检举反革命分子，协助政府肃清反革命。天津市四区小郭庄妇女识字班学员谷秀兰，在天津市处决反革命罪犯的那天（三月三十一日），在新官汛大街一百一十三号韩水铺里，见到有一个人正在造谣威吓群众。那人叫王德禄，是流氓出身。王德禄气势汹汹地说：“我看枪毙的这些人，死得太屈了，八路军屈杀了很多好人，将来有一天国民党回来，我去报告，把这些工作人员全抓起来，一个也不留！”谷秀兰听到后，曾和蔼地向他解释镇压反革命的道理，但王德禄反而瞪起眼来问她：“特务杀了你家多少人？”还打了她一拳。谷秀兰认为王德禄造谣诬蔑政府、威吓群众，是一种反革命行为，当即和区代表杨西园到派出所报告，将王德禄逮捕。","type":"paragraph"},{"text":"天津海关工作人员孙景霖，提高警惕，检举了形迹可疑的反革命分子。孙景霖住天津市十区烟台道二十五号，日前家中突然来一不速之客。经询问妻子后，知来人姓吴，过去曾供伪职，解放后改姓孙，是其妻娘家的邻人。在谈话中，吴除向孙景霖询问海关进出口情形外，并询问去香港是否容易。孙景霖察觉其形迹可疑，随即向派出所报告。次日清早，派出所因吴未报户口，传去问话。吴供认原名吴秀生，曾任河北省宛平县国民党党部委员，当过伪县政府教育科科员及县银行会计等，曾有贪污劣行；解放后逃至北京，登记后被管制。最近，吴秀生的父亲因过去欺压人民，而被政府拘押，他才逃来天津躲藏。现吴已被送至天津市公安十分局。","type":"paragraph"},{"text":"住在天津市鸟市的作恶多端的一贯道首崔学文此次被枪毙之后，崔学文的家属并不悲哀。她的儿子崔福来，在山西中学读书，在青年团的教育下，认识到崔学文不仅是欺压母亲的仇人，就其反革命罪恶来说，更是人民大众的仇敌。崔犯被捕后，崔福来反复向母亲解说这一道理，最后母亲也想通了。她在丈夫被枪毙后还劝说其他被枪决的反革命分子的家属。","type":"paragraph"}],"comments":[],"origin":"《人民日报》1951年4月4日","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"94640045ef"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
