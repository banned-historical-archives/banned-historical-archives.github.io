" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"西康公安厅第一号半月报告:“开始执行四次全国公安会议初步意见”","authors":[],"dates":[{"year":1951,"month":10,"day":14}],"is_range_date":false,"parts":[{"text":"西康公安厅第一号半月报告:“开始执行四次全国公安会议初步意见”","type":"title"},{"text":"复西康公安厅发各地报中公部西南局：","type":"appellation"},{"text":"（酉研17号）","type":"paragraph"},{"text":"我们同意西康公安厅十月十四日第一号半月报“开始执行四次公安会议初步意见”特转发各地参考。","type":"paragraph"},{"text":" 西南公安部十月廿日","type":"paragraph"},{"text":"西南公安部并报区党委发西昌公安处：","type":"appellation"},{"text":"第一号半月报告：","type":"paragraph"},{"text":"（一）我省镇反总情况：汉人地区大多数县区乡接近于彻底但未完全解决问题。所谓接近澈底，一方面经过捕杀和关押，五个方面的敌人受到了沉重的打击，全省已将占汉人中三点大的反革命五七六七名杀掉。依据材料一县一区一乡的恶霸匪首，除少数潜伏的而外，基本上捕杀完，全省捕匪一一五七一名，杀四一五九，捕霸二二六九，杀一零三七，反动党团骨干份子显著而有罪恶的均已捕杀，会道头子捕杀六○二名（全省发现者一一六○名）另一方面经过减退、消反、土改群众发动比较深入，在包干清匪的号召下，群众抓匪在全省成为运动，一至九月，一七县统计光群众捕捉土匪五二二五名，三次公安会议以来，直接参加控诉评审宣判各种会的群众，汉源县占人口三分之一，五万余人，石棉占人口的五分之三，一万九千余人，雅安县占人口百分之五十，五万五千人。（其他县尚无全面报告）在这些地区，群众敢说敢斗，反革命气焰已打下去人民的仇势已确立起来，社会秩序空前安定，群众生产情绪普遍高涨，但少数村干部及群众又滋长松气思想。所谓未完全解决问题，即是少数县、区、乡在程度上差一些，还没有澈底肃清反革命。以雅安为例（土改已结束）据该县估计三十个乡有六个乡应杀，关，管的皆已处理算是澈底，十五个乡接近澈底，但还有几个该杀未杀，少数该捕未捕，管制工作尚未完全开展，九个乡不够澈底，尚有少数该杀未杀，一批该捕未捕，管制尚未进行，全县包括潜逃份子，至多再需捕九十名，杀廿名。全省尚有七十个未土改乡以及正土改或已土改的少数区乡尚不澈底，尚须捕杀一批，才能解决问题。未触动的区，在全省已没有，个别或是少数未触动的乡村可能有，因材料不足尚难具体。从方面看一贯道从摧毁组织讲尚未全面取缔，潜逃匪首四八○人（群众地霸在外）尚未归案法办，工厂，筑路运输造屋等工人中相当复杂，尚未真正触动。清案工作，六月初押四八八五名（区乡在外，新捕一一九八名，到九月底共清理八九一三名，超过原有积案。清案工作必须结合土改召开各种会议向群众全面交待政策发动群众检举控诉，参加评审既可充实材料又能迅速结案。部分地区由于领导重视不够，未能与土改密切结合，以致运动中声势不大。清案初期因数字限制束手束脚，降刑处理保存一定名额的现象较为普遍（特别是省级）。九月底投入劳改的人犯省专两级四四九八名各县约计二千余，但因人犯身体过弱，劳动效率不强，死亡还很严重，八月以来已病死九九人（特别是拨交通厅管理的七百人犯即死四二名）。第四次全国公安会议决议和罗部长报告完全适合西康情况，因此坚决贯彻决议及报告的精神，继续彻底镇压反革命，肃清五大敌人，仍是全省范围内的中心任务。","type":"paragraph"},{"text":"（二）本月五日召开了雅康两区局长会议，到会处局长十三人，并邀军区保卫部法院、检署参加，会期六天十日结束，除讨论学习文件外，着重讨论了传达摸底，清理中层，管制工作取缔会道门等问题，大家虽感任务繁重，但情绪愉快思想毫无抵触，一致认为四次公安会议决议正确适时都愿坚决贯彻，满有信心一致同意廖主席大力争取明年四月底将镇反工作搞彻底的意见，鉴于今后捕的不多杀的有限（具体数字月底才能报到）管制工作成为一项很重要的工作。经……","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"九·一三事件","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c5ae303d70"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
