script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"决不让资产阶级歪风邪气抬头","authors":["赵金志"],"dates":[{"year":1972,"month":7,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编辑同志:"},{"type":"paragraph","text":"今年上半年，我厂先后揪出了两个腐蚀、毒害青年的坏家伙。这两个家伙用糖衣炮弹把一些意志薄弱的青年拖下了水。事实证明:惊心动魄的阶级斗争从来就没有停止过。资产阶级还在拼命地和我们无产阶级争夺青年一代。“我们务必不要松懈自己的警惕性”。"},{"type":"paragraph","text":"目前，阶级敌人用糖衣炮弹腐蚀、毒害青年的情况，在社会上仍然存在。有些奇装异服、怪发型又冒了出来。这是值得注意的阶级斗争新动向。希望各级领导引起重视，切实加强对青年的思想教育工作，增强他们抵制资产阶级思想侵蚀的能力，决不能让资产阶级的歪风邪气抬头!"},{"type":"paragraph","text":"上海新建机器厂"},{"type":"paragraph","text":"赵金志"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"850e7bcde1"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
