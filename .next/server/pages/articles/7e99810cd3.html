script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"坚决执行毛主席的抓革命、促生产的方针，夺取革命、生产双胜利　国务院发出今年春节不放假的通知","authors":[],"dates":[{"year":1967,"month":1,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"坚决执行毛主席的抓革命、促生产的方针，夺取革命、生产双胜利"},{"type":"paragraph","text":"国务院发出今年春节不放假的通知"},{"type":"paragraph","text":"新华社二十九日讯　国务院二十九日向全国各地发出了关于一九六七年春节不放假的通知。通知全文如下：“我国无产阶级文化大革命开始了新阶段。当前正处在无产阶级革命派大联合，以排山倒海之势，向党内一小撮走资本主义道路的当权派展开全面夺权斗争的关键时刻。根据广大革命群众的要求，为了坚决执行我们伟大领袖毛主席提出的抓革命、促生产的方针，夺取革命、生产双胜利，将无产阶级文化大革命推向新的高潮，国务院决定：一九六七年春节不放假；职工探亲假在文化大革命期间暂停执行，以后再补。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"夺权","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7e99810cd3"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
