script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"“中国语文”展开对资产阶级学术思想的批判","authors":[],"dates":[{"year":1958,"month":10,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"自从1955年召开了现代汉语规范问题学术会议以后，在汉语规范化的工作上，使人们感到莫大的失望。语言学界许多重要人物虽都参加了那次会议，但很少人把汉语规范化问题排在他们的工作日程里。如词汇规范化问题、审定普通话语音工作和编订通俗语法工作等方面，都未得到应有的重视。语言学界脱离实际的资产阶级学术思想是十分突出的。"},{"type":"paragraph","text":"“中国语文”第9、10两期连续发表了一系列批判语言学上资产阶级学术思想的文章，对王力重理论轻实践的资产阶级观点，高名凯抄用西欧资产阶级语言学说，并以唯心主义观点来解释语言现象，吕叔湘抹杀语法在实践中的重要作用，黎锦熙“句本位语法体系”的资产阶级繁琐理论，都作了批判。高名凯也就自己的资产阶级学术观点和形而上学方法论等方面作了自我批判。该刊已决定把学术批判作为今后的重要内容之一，特别希望语言学界的青年同志大力支持，对过去影响我国语言学界较大的资产阶级学者、专家和他们的著作，对具有普遍意义的语言学问题进行广泛的批判。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fecf3c6881"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
