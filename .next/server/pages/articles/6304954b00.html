<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"湖北、湖南交界地区破获一起反革命陰謀暴动案","authors":[],"dates":[{"year":1957,"month":6,"day":27}],"is_range_date":false,"parts":[{"text":"湖北、湖南交界地区破获一起反革命阴谋暴动案","type":"title"},{"text":"新华社武汉6月27日讯\t湖北、湖南两省交界地区破获了一起反革命阴谋暴动案，主犯大部落网。","type":"paragraph"},{"text":"据初步了解，这个有组织的反革命阴谋暴动案所涉及的地区包括湖北省的公安、石首、潜江、监利和湖南省的澧县、安乡等六县。这个反革命组织在各县所用名称不一，在公安、石首的叫“中央华中将军府”，在潜江的叫“复兴党”或“新民党”，又有的叫“民主联汪党”、“保汪党”等等。参加这个反革命组织的有流氓、被清洗的干部、转业军人、基层干部、一般群众和党、团员等，人数颇众。据称：仅潜江县卽有六千多人，公安、石首有一千多人，总头子叫李德鄂。他们的头目，5月15日曾在湖北省沙市集会研究过有关暴动的各种问题，他们发通知的落款是“卧龙”二字。","type":"paragraph"},{"text":"这个反革命组织，计划于6月23日晚举行暴动。他们在暴动前向群众进行欺骗宣传説：“刘伯承与白崇禧已联合起来了，现在已奉刘伯承的命令，县长、公安局长都参加了这个组织”，并威胁説：“不参加者杀全家！”一部分人并准备了大刀、长矛等武器。","type":"paragraph"},{"text":"荆州専区和各该县公安机关在事前两天了解到这一问题，于敌人暴动前夕，逮捕了一批反革命暴乱组织的首要分子和嫌疑分子，同时，湖南澧县、安乡也逮捕了与此有关的反革命分子十七、八人；有的地区并召集了群众大会揭发反革命分子的阴谋，敎育群众，使很多被骗群众安定下来。因此，这一暴动基本上在敌人没有正式开始前就被扑灭了。但很多群众情绪仍惶惶不安。","type":"paragraph"},{"text":"据被捕的反革命分子供称：这个暴乱的反革命组织有几个军，其中一个军的番称是二0八军，军长为李刚（当过伪连长，已捕），政治将军为桑野清（已逃），下辖三个师，六个团，分布在公安县的藕池口、黄山头，江陵县的弥陀寺等地。他们有六条行动纲领：一、保証人民财产的安全，到仓库去抢；二、对公共的财物不损坏，但电綫要破坏；三、行军时一定要带日用必须品（到供销社去抢）；四、对武装对象一定要尽力消灭；五、不杀共产党投降分子，包括党团员在内保护妇女老幼，但青年人一定要带走，以便扩充力量；六、经过一万人口以上的城市不超过四十分钟，行军时带武器。","type":"paragraph"},{"text":"另据供称：这个反革命组织是由三个党派组成的（那三个党派现不详）。反革命军长李刚与逃往海外的反革命分子陈洪起有联系，陈曾给李写过信，准备6月回来，这次暴动就是为了迎接陈回来。","type":"paragraph"},{"text":"这一案件的详情正在继续调查中。（编自湖北省公安厅“情况简报”）","type":"paragraph"},{"text":"来源：新华通讯社编：《内部参考》，第2244期，1957年7月1日。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6304954b00"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
