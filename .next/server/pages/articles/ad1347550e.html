script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"民主德国许多作家到工厂农村落户  德国作家协会文学理论会议批判卢卡奇的修正主义观点","authors":[],"dates":[{"year":1958,"month":6,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"民主德国许多作家到工厂农村落户"},{"type":"paragraph","text":"德国作家协会文学理论会议批判卢卡奇的修正主义观点"},{"type":"paragraph","text":"新华社柏林10日电　德国作家协会本月6日到8日在这里召开文学理论会议，集中讨论了文学上的社会主义现实主义和1945年以来民主德国文学的发展等问题。会议着重批判了以卢卡奇为代表的现代修正主义文学理论。大约三百名作家、文学理论家和批评家以及一大批社会主义工农业企业中的职工代表出席了这次会议。"},{"type":"paragraph","text":"会议一致通过致德国统一社会党中央委员会和第一书记乌布利希的一封信，表示坚决拥护统一社会党中央的正确的马列主义的政策。信中说：“党的政策将促使我们之中的许多人认识和克服修正主义的观点。”"},{"type":"paragraph","text":"统一社会党中央政治局文化委员会主席库雷拉在总结发言里指出，这次文学理论会议的召开是统一社会党第五次代表大会的准备工作之一。会议讨论的结果表明：民主德国的作家们已经克服了过去几年里的动摇和错误见解，坚决地站到了工人阶级的一边。"},{"type":"paragraph","text":"文化部副部长阿布施在讲话中指出，卢卡奇的修正主义文学理论的危害性在于：它抹煞了文学的社会作用，抹煞了文学对人进行社会主义教育的任务，同时还否定了社会主义文学在工人阶级政党所进行的伟大的文化革命斗争中的积极作用。阿布施宣布说，德国作家协会决定重新刊印从1918年到1933年间最重要的革命无产阶级文学作品。"},{"type":"paragraph","text":"在这次会议后，许多作家已经决定搬到社会主义建设的工地、工厂和农村去落户并从事写作。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ad1347550e"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
