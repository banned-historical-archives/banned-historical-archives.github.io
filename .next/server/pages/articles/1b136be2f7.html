<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"必须时刻警惕资产阶级思想的侵蚀!工人热烈赞扬话剧《千万不要忘记》上海市青年话剧团正多方听取意见争取更好演出这个戏","authors":["向东"],"dates":[{"year":1964,"month":2,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　上海市青年话剧团在本市上演话剧《千万不要忘记》后，受到各方面的重视和欢迎。春节至今，场场满座，不少工厂纷纷订票组织职工看戏。该团为了进一步提高艺术质量，使演出更加完善，前日起，该剧导演、演员分头到先锋电机厂、上海冶炼厂等单位向工人求教，征求意见。"},{"type":"paragraph","text":"看过戏的工人同志一致认为:剧本好，演出好，戏里反映的生活很有现实教育意义，虽是吃穿小事，但看轻这些小事，不时刻警惕资产阶级思想的侵蚀，小事就会变成大事。先锋电机厂二车同党支部书记说:“我们车间有些青工，过去很好，结婚以后，生产热情总是波浪式的，其中不少是受了家庭的影响。思想上的敌人是不易发觉的。象戏中的姚母那样随时随地把资产阶级思想传染给子女，就是一个例子。因此，我们一定要把思想工作做到每个工人的心里，做到每个工人的家里，做到工人生活的各个方面，这样才能促进生产。戏里的老爷爷体现了中国农民勤劳朴素的优良传统。年纪虽已八十六，但思想不老，精神不老。老工人丁海宽也体现了老一代对革命后代的严格要求。这个戏，教育意义很大。”嵌线工(车间工会副主席)王三宜说:“我看演电机工人的戏还是头一次，感到真实亲切。我们车间象丁少纯这样的工人也有。丁少纯为了还债，旷了工去打野鸭子卖。父亲知道了，不是简单地用没收猎枪的办法，而是耐心地说服教育，这段戏对我特别有启发，丁少纯在台上觉悟时哭了，我在台下也落了眼泪。”上海冶炼厂十车间技术员、市先进生产者白达之说:“争夺青年的斗争在我厂的表现也很强烈，有的青工出身很好，但受了资产阶级思想影响，逐渐变坏了。八小时以外的生活很重要，不正确引导他们，就会与社会上的渣滓混在一起。看了戏，对如何做好思想工作得到了启示。”工会干部丁元根说:“我常常碰到人家问我，你一天到夜忙，挣几个钱?我有时看到别人有的东西自己没有，也会动心，这说明自己思想上有弱点。因此，象姚母这样的人物不能看轻她，资产阶级思想还有影响，非得抵制住不可，我要用钢刀和这种思想划清界线。”工会生产委员王凤岐说:“这是出喜剧，可看到最后一场，我感动得哭了。有些人八小时以内走社会主义道路，八小时以外就不一定。是否顶得住旧习惯势力的袭击呢?我的孩子问我:‘爸爸，你的工资为什么没有妈妈大?’(我爱人当工人)我心里就不能产生丁少纯那样的‘可也是’思想。看了戏，我腰杆更硬更粗了。”上海纺织机械二厂的同志看了戏，立即到后台与演员们进行了座谈，该厂先进生产者袁茂顺说:“《千万不要忘记》这个戏提醒我们要时刻警惕资产阶级思想的侵蚀，否则就会象丁少纯一样打了一只野鸭，还会打第二只、第三只……看了戏，等于打了一针防疫剂，有人说现代戏没味道，这是不对的，要求今后话剧更加面向群众。”"},{"type":"paragraph","text":"此外，机关干部、青年学生看了戏也纷纷议论这个戏的教育意义。"},{"type":"paragraph","text":"在一些工厂举行的座谈会上，大家对话剧如何在工人中普及问题也交换了意见。上海冶炼厂党委宣传部长顾竹祥同志说:“现在一般青工看越剧、淮剧多，业余活动也是搞这些，他们认为话剧高不可攀，是干部看的。目前，现代戏演工人题材的不多，也是个原因。工人真正看到了描写自己的戏，非常喜爱。因此，今后希望话剧多出现象《千万不要忘记》这样的戏，来加强对青年工人的社会主义思想教育。”"},{"type":"paragraph","text":"《千万不要忘记》剧组的演职员听取了工人同志的宝贵意见后，表示要继续努力，精益求精，进一步演好这个戏，让它在工人和广大群众中发挥更大的教育作用。(向东)"},{"type":"paragraph","text":"\u003cIMG alt=请插入5号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1964\\02\\642m020401.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e——话剧《千万不要忘记》\u003c/FONT\u003e"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1b136be2f7"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
