script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji41","name":"毛泽东全集第41卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji41.pdf"],"article":{"title":"对中央转发湖北等省省委关于人民公社和农村工作情况报告的指示稿的批语","alias":"","parts":[{"type":"paragraph","text":"对中央转发湖北等省省委关于人民公社和农村工作情况报告的"},{"type":"paragraph","text":"指示稿的批语"},{"type":"paragraph","text":"（1959年5月8日）即送刘、邓阅，尚昆办。"},{"type":"paragraph","text":"[1]中共中央的这一指示稿说，正确总结1958年农业生产大跃进中的经验和教训，发扬优点，克服缺点，力求把工作做得更好一些，将使今年的大跃进更有保证。农业生产指标必须实事求是：经过一切努力能够达到的，必须力争达到；经过一切努力还达不到的，就应当修改，不要硬性往下派。春荒尚有一个多月至两个月的时间才能基本上过去，决不要再忽视，还应当十分警惕可能发生夏荒。中央批转的文件有：中共湖北省委1959年4月26日关于省委扩大会议情况给中央并毛泽东的报告和湖北省委扩大会议关于人民公社十八个问题的讨论纪要，河北省委5月3日关于贯彻八届七中全会精神给中央并毛泽东的报告，以及广东省委4月28日关于目前农村工作情况和部署给中央并毛泽东的报告。毛泽东对这个指示稿作了个别文字上的修改。5月10日，中共中央向各省、市、自治区党委下发了这一指示。"},{"type":"paragraph","text":"[2]刘，指刘少奇。邓，指邓小平，当时任中共中央总书记、国务院副总理。"},{"type":"paragraph","text":"[3]尚昆，即杨尚昆，当时任中共中央书记处候补书记、中央办公厅主任。"}],"authors":["毛泽东"],"dates":[{"year":1959,"month":5,"day":8}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":519,"page_end":519},"tags":[{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"指示"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"20f7becd44"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
