" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共陕西省委关于陕西省粮食统购工作总结报告（节录）","authors":[],"dates":[{"year":1954,"month":4,"day":30}],"is_range_date":false,"parts":[{"text":"中共陕西省委关于陕西省粮食统购工作总结报告（节录）","type":"title"},{"text":"一、基本情况","type":"subtitle"},{"text":"全省粮食统购工作于去年12月初旬全面铺开，至今年2月中旬结束。由于组织了46000余名干部，深入农村，经过宣传总路线和各项经济工作，共统购粮食10亿6300万斤，占原计划任务11亿7000万斤的90．85％，连农业税征收现粮7亿5560万斤，合计18亿1860万斤，占全省全年粮食总产量91亿余斤的9．98％。同时收购油料2931万斤，占原计划任务3720万斤的78．79％。统购面一般占农户的50～70％，经济作物区占30％左右；余粮一般购了70～90％，偏远山区仅购了40～60％左右。实行粮食统购，打击了投机奸商，削弱了资本主义经济与农民的联系，教育和锻炼了所有干部，提高了广大农民群众的社会主义觉悟，推动了互助合作运动的迅速发展，为工农业进行社会主义改造创造了有利条件。","type":"paragraph"},{"text":"但工作发展极不平衡。全省大体可分两类地区：一类是完成任务的地区，约占70％的县，由于宣传总路线和粮食统购统销政策较为广泛深入，并认真打通干部思想，紧密结合生产，放手发动群众；陕北老区，由于群众政治觉悟高，其它偏远山区由于余粮多，分配的任务少，因而都顺利地完成或超额完成了任务。统购后，到处洋溢着扩大生产和发展互助合作的新气象。一类是没有完成任务的地区，约占30％的县，或因宣传总路线和粮食政策不深不透，干部思想没有完全打通，群众没有发动起来，或因余粮摸底不实，任务偏高，抓大头或平均摊派，发生了不同程度的强迫命令现象，甚至酿成群众自杀事件（全省自杀者93人，多发生在这类地区），以致工作走了弯路，没有完成任务。统购后遗留问题较多，部分群众的生产情绪不高。","type":"paragraph"},{"text":"二、几点经验教训（略）","type":"subtitle"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]},{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共陕西省委关于陕西省粮食统购工作总结报告（节录）","authors":[],"dates":[{"year":1954,"month":4,"day":30}],"is_range_date":false,"parts":[{"text":"中共陕西省委关于陕西省粮食统购工作总结报告（节录）","type":"title"},{"text":"一、基本情况","type":"paragraph"},{"text":"全省粮食统购工作于去年12月初旬全面铺开，至今年2月中旬结束。由于组织了46000余名干部，深入农村，经过宣传总路线和各项经济工作，共统购粮食10亿6300万斤，占原计划任务11亿7000万斤的90．85％，连农业税征收现粮7亿5560万斤，合计18亿1860万斤，占全省全年粮食总产量91亿余斤的9．98％。同时收购油料2931万斤，占原计划任务3720万斤的78．79％。统购面一般占农户的50～70％，经济作物区占30％左右；余粮一般购了70～90％，偏远山区仅购了40～60％左右。实行粮食统购，打击了投机奸商，削弱了资本主义经济与农民的联系，教育和锻炼了所有干部，提高了广大农民群众的社会主义觉悟，推动
