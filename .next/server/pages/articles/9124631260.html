script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"市第一建筑材料工业公司职工以实际行动反击右倾翻案风保卫和发展文化大革命胜利成果","authors":[],"dates":[{"year":1976,"month":3,"day":31}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　上海市第一建筑材料工业公司广大职工，在反击右倾翻案风的斗争中，学习毛主席关于“什么‘三项指示为纲’，安定团结不是不要阶级斗争，阶级斗争是纲，其余都是目”的伟大教导，以阶级斗争为纲，批判党内那个不肯改悔的走资派，以抓革命、促生产的实际行动回击右倾翻案风。到三月二十六日止，全公司砖、瓦筒等主要产品产量都已提前完成第一季度计划，比去年同期增长百分之十以上。"},{"type":"paragraph","text":"这个公司的广大职工把斗争锋芒直指党内那个不肯改悔的走资派及其推行的修正主义路线，许多同志说:“党内那个不肯改悔的走资派把安定团结、发展国民经济都摆到‘纲’的位置，就是要否定毛主席历来关于以阶级斗争为纲的教导。正如毛主席最近指出的:“他这个人是不抓阶级斗争的，历来不提这个纲。还是‘白猫、黑猫’啊，不管是带国主义还是马克思主义。”如果依了他这一套，社会主义生产就要受到破坏，企业就会走到修正主义的邪路上去。”他们在批判“三项指示为纲”的修正主义纲领时，着重学习马克思主义关于阶级和阶级斗争的论述，批判党内那个不肯改悔的走资派宣扬的阶级斗争熄灭论；学习马克思主义政治经济学，批判走资派宣扬的唯生产力论。越批，大家心越明，劲越大，决心要以革命、生产的新成绩，回击右倾翻案风，保卫和发展文化大革命的胜利成果。"},{"type":"paragraph","text":"这个公司所属的长兴采石厂在反击右倾翻案风的斗争中，举办了各种类型的学习班，进一步激发了广大职工的革命积极性，把多开采矿石看作是对右倾翻案风鼓吹者的一个有力回击。继一月份胜利完成月度计划以后，这个厂二月份开采的石灰石产量超额完成百分之十，比去年同期增长百分之八十点六五。码头上的石料下运队在一次往船上装石料时，突然下起大雨。工人群众纷纷表示:“我们要把在反击右倾翻案风斗争中焕发出来的革命干劲用于装卸生产，保证船只准时出航。”广大职工冒雨苦干，花了两个小时，就将载重四百多吨的船只装满，保证准时出航。"},{"type":"paragraph","text":"浦南砖瓦厂通过批判阶级斗争熄灭论和唯生产力论，提高了干部、群众对社会主义革命的性质、对象、任务和前途的认识，进一步摆正了纲和目的关系。许多工人下班后开学习会，写批判稿，坚持以阶级斗争为纲来带动生产，使三月份的生产计划提前完成，产量比去年同期增加百分之三十。　(市建工局工会供稿)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9124631260"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
