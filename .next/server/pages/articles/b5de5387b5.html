script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"北京市人民政府副秘书长兼市建筑公司总经理  李公侠铺张浪费思想右倾被停职限期反省","authors":[],"dates":[{"year":1952,"month":3,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"北京市人民政府副秘书长兼市建筑公司总经理"},{"type":"paragraph","text":"李公侠铺张浪费思想右倾被停职限期反省"},{"type":"paragraph","text":"【本报讯】北京市人民政府副秘书长兼北京市建筑公司总经理李公侠，在生活上、工作上，存在着严重的铺张浪费和官僚主义作风；他所领导的各企业，存在着严重的浪费现象并曾发生违反政策的错误。"},{"type":"paragraph","text":"在反贪污、反浪费、反官僚主义运动中，李公侠虽然做过一些检讨，但很不深刻。由于他还存在着严重的右倾麻痹思想，对公司所属各单位的反贪污、反浪费、反官僚主义运动便推动不力，并对一些手面不干净、压制民主、抵抗运动的干部和贪污嫌疑分子，采取纵容甚至包庇的态度，因而大大影响了运动的正常开展。"},{"type":"paragraph","text":"市的领导机关，在反贪污、反浪费、反官僚主义运动开始后不久，即在一月十三日，指派张友渔、薛子正、程宏毅、顾大川、范儒生等五人组织专门委员会，并由这个委员会派出一批干部会同公司所属各单位的节约检查委员会负责进行检查。现已查出了大批贪污分子和资产阶级的坐探。现在，市人民政府根据初步检查的结果，在二月二十九日决定停止李公侠的一切职务，限期反省。然后根据他反省的情况和继续检查的结果，再作最后处理。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b5de5387b5"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
