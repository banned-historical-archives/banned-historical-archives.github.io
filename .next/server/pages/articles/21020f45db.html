script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"不许佐藤反动政府在长沼镇建立导弹基地  日本工人、农民、学生并肩示威  宫本修正主义集团指使暴徒破坏群众斗争，再次暴露反革命嘴脸","authors":[],"dates":[{"year":1968,"month":9,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"不许佐藤反动政府在长沼镇建立导弹基地"},{"type":"paragraph","text":"日本工人、农民、学生并肩示威"},{"type":"paragraph","text":"宫本修正主义集团指使暴徒破坏群众斗争，再次暴露反革命嘴脸"},{"type":"paragraph","text":"新华社十六日讯　据东方通讯社报道：日本北海道各地的进步青年工人和学生约七百人，十五日在札幌市郊区的长沼镇举行集会，强烈反对日本“防卫厅”打算在这个城镇建立导弹基地。"},{"type":"paragraph","text":"日本“防卫厅”根据第三期扩军计划的规定，打算在长沼镇附近修建导弹基地，以便在那里驻扎一营“奈克—赫尔克里士式”导弹部队，加强核武装。"},{"type":"paragraph","text":"当地农民组织了“反对导弹基地同盟”，反对日本“防卫厅”的这一罪恶行径，他们还同北海道进步工人和学生一起进行斗争。青年工人、学生和农民代表在会上一致强烈谴责在长沼镇建立导弹基地，抗议日本反动政府加强核武装和准备侵略战争的罪恶勾当，并表示坚决要阻止这个反动计划的实现。集会通过的决议强调，这场斗争同要求撤除美国军事基地和拒绝美国军事运输的斗争，是反对用核武器武装日本、反对加强日美侵略亚洲体系的重要斗争的组成部分，并表示决心要把这场斗争进行到底。"},{"type":"paragraph","text":"会后，与会者高举红旗和标语牌，在城镇的街道上举行了示威。他们沿途高呼“制止建立导弹基地”、“粉碎日美安全条约体系”等口号。"},{"type":"paragraph","text":"示威后，部分学生向离长沼镇若干公里的导弹基地工地进发，拔掉了“防卫厅”用来进行地面测量的十二个桩子。"},{"type":"paragraph","text":"当群众游行示威时，反动警察当局出动了武装警察和便衣队共五百多人进行镇压，当场逮捕了三名学生。"},{"type":"paragraph","text":"日共宫本修正主义集团在口头上也叫喊“反对导弹基地”，但是暗地里却指使它的党徒诬蔑青年、学生和农民的斗争，并且毁坏了这个大会的宣传招贴和标语牌，又一次暴露了他们的反革命面目，从而更加激起了青年、学生和农民对他们的强烈谴责。"},{"type":"paragraph","text":"（附图片）"},{"type":"paragraph","text":"九月十二日下午，东京日本大学学生举行声势浩大的集会和示威游行，反对佐藤反动政府对学生实行法西斯镇压，一些其他大学的学生、工人和农民也参加了示威游行。图为示威学生用石块反击前来镇压的武装警察。　　新华社发（传真照片）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"21020f45db"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
