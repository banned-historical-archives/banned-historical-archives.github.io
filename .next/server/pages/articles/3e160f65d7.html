script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"比利时刊物《被剥削者》谴责苏修对中国的武装挑衅  苏联人民必将推翻苏修的残暴统治  苏修挑衅是由于处境困难急于要同美帝勾结而干的罪恶勾当","authors":[],"dates":[{"year":1969,"month":3,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"比利时刊物《被剥削者》谴责苏修对中国的武装挑衅"},{"type":"paragraph","text":"苏联人民必将推翻苏修的残暴统治"},{"type":"paragraph","text":"苏修挑衅是由于处境困难急于要同美帝勾结而干的罪恶勾当"},{"type":"paragraph","text":"新华社十四日讯　比利时左派刊物《被剥削者》最近发表一篇题为《苏联修正主义者对中国的严重挑衅》的文章，严厉谴责苏修叛徒集团对我国的武装挑衅，指出这是苏修处境困难，急于要同美帝勾结而干的罪恶勾当。"},{"type":"paragraph","text":"文章指出：“苏修领导人面临着他们无法克服的困难。他们的社会帝国主义政策导致（他们）同苏联人民和为争取自己的主权和独立而斗争的各国人民之间的矛盾不断发展。”“在（苏联）国内，利润法则的恢复使得在工业中重新出现了失业、歧视、处罚和罢工。同时，在新的‘富农’阶级恢复剥削之后，农民的日子也很困难。在一切活动领域中，那些想保持权力而损害苏联各族人民利益的叛徒们遇到了越来越大的抵抗。”"},{"type":"paragraph","text":"文章说，“忠实于马克思、恩格斯、列宁、斯大林、毛泽东教导的、为人民服务的团体的出现，使人民重新有了希望，使叛徒们一片混乱。”"},{"type":"paragraph","text":"文章指出：在国外，苏修叛徒集团的叛变政策表现为同世界各国人民的头号敌人美帝国主义的一系列勾结。他们和美帝梦想象两个强盗那样地瓜分世界。文章揭露，苏修叛徒集团武装印度反动派，让印度反动派进攻人民中国，结果以失败而告终。在最近西德复仇主义者挑起的“柏林事件”中，苏修叛徒集团又向西德统治集团的挑衅节节退让。"},{"type":"paragraph","text":"文章说，在这种情况下，苏修叛徒集团“妄图欺骗人民、煽动自己的人民反对马克思列宁主义的捍卫者，试图把他们自己对尼克松及其主子的退让归咎于中国。”文章指出：苏修叛徒集团“没有预计到他们将进一步在各国人民面前暴露自己的真面目。中华人民共和国——就象苏联在党的领导是列宁和斯大林时的那样——绝对不会发动战争。但是，中国同样不会任人摆布。”"},{"type":"paragraph","text":"文章最后强调说：“苏联各族人民在各国人民的支持下，必将结束统治他们的那些叛徒们的残暴统治”。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3e160f65d7"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
