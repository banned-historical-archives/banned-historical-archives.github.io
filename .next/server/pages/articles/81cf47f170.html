script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"伟大领袖毛主席、党中央极为关怀  中共中央向灾区人民发出慰问电","authors":[],"dates":[{"year":1976,"month":7,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"河北省唐山、丰南一带发生强烈地震后"},{"type":"paragraph","text":"伟大领袖毛主席、党中央极为关怀"},{"type":"paragraph","text":"中共中央向灾区人民发出慰问电"},{"type":"paragraph","text":"中央号召灾区人民认真学习毛主席的一系列重要指示，以阶级斗争为纲，深入批邓，团结起来，向严重的自然灾害进行斗争。下定决心，不怕牺牲，排除万难，去争取胜利！"},{"type":"paragraph","text":"新华社一九七六年七月二十八日讯　河北省唐山、丰南一带发生强烈地震后，伟大领袖毛主席、党中央极为关怀。中共中央向灾区人民发了慰问电。电报全文如下："},{"type":"paragraph","text":"河北省、天津、北京市党委、革命委员会，北京军区、河北省军区、北京卫戍区、天津市警备区并转唐山及其附近遭受地震灾害地区的各级党委、革命委员会、各族人民和人民解放军指战员："},{"type":"paragraph","text":"一九七六年七月二十八日，唐山、丰南一带发生强烈地震，并波及到天津市、北京市，使人民的生命财产遭受很大损失，尤其是唐山市遭到的破坏和损失极其严重。伟大领袖毛主席、党中央极为关怀，向受到地震灾害的各族人民和人民解放军指战员致以亲切的慰问。"},{"type":"paragraph","text":"中央相信，用马克思主义、列宁主义、毛泽东思想武装起来的、经过无产阶级文化大革命和批林批孔运动锻炼的各族人民和人民解放军指战员，一定会在省、市党委、革命委员会和部队党委的领导下，在全国人民的支援下，发扬艰苦奋斗的革命精神、以坚韧不拔的毅力，投入抗震救灾斗争，奋发图强，自力更生，发展生产，重建家园。"},{"type":"paragraph","text":"中央号召灾区的共产党员、共青团员、革命干部、工人、贫下中农和人民解放军指战员，认真学习毛主席的一系列重要指示，以阶级斗争为纲，深入开展批判邓小平反革命的修正主义路线、反击右倾翻案风的伟大斗争，团结起来，向严重的自然灾害进行斗争。下定决心，不怕牺牲，排除万难，去争取胜利！"},{"type":"paragraph","text":"中共中央"},{"type":"paragraph","text":"一九七六年七月二十八日"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"河北文革","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"天津文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"批林批孔","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"81cf47f170"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
