script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"突出无产阶级政治　冲破现代修正主义阻挠  阿石油工业战线取得显著成就  在革命化中英雄人物不断涌现　去年石油开采量比解放前增长九倍多","authors":[],"dates":[{"year":1969,"month":11,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"突出无产阶级政治　冲破现代修正主义阻挠"},{"type":"paragraph","text":"阿石油工业战线取得显著成就"},{"type":"paragraph","text":"在革命化中英雄人物不断涌现　去年石油开采量比解放前增长九倍多"},{"type":"paragraph","text":"据新华社地拉那电　阿尔巴尼亚石油工人遵循劳动党和恩维尔·霍查同志的教导，突出无产阶级政治，发挥革命干劲，在迅速发展石油工业方面取得了显著的成就。"},{"type":"paragraph","text":"阿尔巴尼亚是一个拥有丰富石油资源的国家，但在解放前漫长的岁月里，这一地下矿藏遭到外国侵略者的残酷掠夺和本国卖国贼的无耻出卖。解放后，石油资源成为人民的财富，石油工业获得了突飞猛进的发展。一九六八年阿尔巴尼亚的石油开采量比解放前的一九三八年增长了九倍多。今天，石油工业已成为阿尔巴尼亚国民经济中极其重要的一个部门。阿尔巴尼亚石油工业成长和发展的战斗历程，是阿尔巴尼亚人民发扬英雄气概、战胜帝修阴谋的一曲动人的凯歌。"},{"type":"paragraph","text":"六十年代初，当现代修正主义者背信弃义、撕毁协议、撤走“专家”和窃走地质资料，企图阻挠阿尔巴尼亚社会主义建设的时候，阿尔巴尼亚地质工作者怀着保卫祖国、鄙视敌人破坏阴谋的坚强决心，以大无畏的英雄气概，克服了重重的困难，不但没有中断勘查工作，而且发现了大量新的油田。据统计，解放以来发现的油田中有百分之七十五是近几年发现的。"},{"type":"paragraph","text":"从一九六一年到现在，阿尔巴尼亚石油工业获得了巨大发展。特别是在近年来蓬勃开展的国家生活和人的思想革命化的热潮中，石油工人发挥革命干劲，在石油生产战线上取得了一个接一个的胜利。在第三个五年计划（一九六一—一九六五年）期间，石油开采的年平均增长率为百分之二点一，而在第四个五年计划（一九六六—一九七○年）的头三年达到了百分之十点八。一九六八年，阿尔巴尼亚的石油工人就超额完成了第四个五年计划为一九六九年规定的指标。"},{"type":"paragraph","text":"在气势磅礴的革命化进程中，石油工业战线上涌现出了不少英雄和先进人物。前年为了保卫国家财产不惜牺牲自己生命的石油战线上的英雄穆哈梅特·希胡和穆尔特扎·凯皮，以他们的闪烁着共产主义思想光辉的动人事迹，体现了在以霍查同志为首的劳动党英明领导下的阿尔巴尼亚人民的崇高革命精神。"},{"type":"paragraph","text":"阿尔巴尼亚人民的伟大领袖霍查同志曾赞扬过阿尔巴尼亚石油工人在为捍卫祖国独立和推动社会主义建设中所作出的有力贡献。现在，英雄的阿尔巴尼亚石油工人在劳动党领导下，正满怀豪情，向着新的胜利昂首阔步前进。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0d4ef7e2f5"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
