script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"这丛毒草也要锄掉宣扬资产阶级社会学的一系列　新闻和文章必须着力批判","authors":["梁雷"],"dates":[{"year":1957,"month":7,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"文汇报“向人民请罪”的社论以及编辑部的初步检查，对过去一个时期的某些错误言论作了揭发，对那些显然恶毒的反党宣传开始有所批判，然而对那些隐蔽在字里行间，以修正主义向马克思主义进攻的反动言论却批判不力，尤其是为资产阶级社会学复辟而发表的一批反动报道和文章，只字不提。这些东西所散播的毒素却是十分严重的。如果不锄去这丛毒草，对于深入开展反右派的斗争显然是一个障碍。而文汇报前一个时期，配合了右派分子反党反社会主义的活动，恰恰在社会科学领域中宣传恢复旧社会学最为积极，这是取消马克思主义对于研究社会问题的领导作用，把中国社会科学拉回资本主义道路的一项严重的罪行。"},{"type":"paragraph","text":"看来文汇报在这个方面是有计划有安排的。一方面毫无批判地连续报道了一批资产阶级社会学者的访问记，大肆宣扬他们为地主、资产阶级服务的一套“研究”，造成一种烟雾，似乎他们对解决中国社会问题大有本领；另一方面又专门组织了一系列的反动文章，公开主张有组织、有领导、有计划地网罗那些曾在大学教社会学和学社会学的人，重新恢复旧社会学。有些文章的论调实际上都是要从工人阶级手中夺去马克思主义的思想武器，篡夺社会科学工作中的领导权，取消以历史唯物主义研究社会发展规律的指导作用，为资产阶级社会学在中国复辟开辟道路。文汇报就是这种反动主张的支持者和组织者。"},{"type":"paragraph","text":"这里还有一篇新闻值得一提。五月五日文汇报上关于从事社会学、政治学的研究工作者举行座谈会的报道，宣传“社会上发生的一系列的问题，如人口问题、婚姻问题等都需要社会学来加以解决，”把我国社会主义革命中发生的社会问题说成是用不着无产阶级的革命理论——历史唯物论来研究解决，只有靠那批旧社会学者才能解决；还替右派分子王造时高呼:社会学和政治学“要成为一门独立的科学。”并在题目上标明:“社会学、政治学需要发展，上海有关学者认为应即恢复这两门科学的研究”，这岂不是想引导中国社会科学离开社会主义的道路?"},{"type":"paragraph","text":"中国共产党领导的反右派斗争，擦亮了我们的眼睛，右派分子一系列反党反社会主义的阴谋诡计是没有市场的，我们要坚决彻底打退右派分子的进攻，批判他们在学术上的反动观点。　梁雷"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d56642abbd"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
