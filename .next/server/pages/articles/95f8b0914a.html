<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"黎明集体农庄向毛主席报告生产成就  一九五三年比一九五二年增产粮食百分之二十一点九","authors":[],"dates":[{"year":1954,"month":1,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"黎明集体农庄向毛主席报告生产成就"},{"type":"paragraph","text":"一九五三年比一九五二年增产粮食百分之二十一点九"},{"type":"paragraph","text":"敬爱的毛主席："},{"type":"paragraph","text":"在过渡时期总路线、总任务的光辉照耀下，我们怀着无限的希望迎接一九五四年的来临，并向您报告我们集体农庄成立第一年的生产成就。"},{"type":"paragraph","text":"我们遵照您的指示，从一九四七年开始组织起来，从互助组发展为农业生产合作社，几年来生产上获得了很大的成就，生活得到了改善，社员的思想觉悟也提高了。一九五三年春天，根据生产发展的需要和全体社员的要求，我们成立了集体农庄。一年中，我们积极学习苏联先进经验，推广了肇源和崔竹松的先进经验，展开了为增产粮食的生产斗争。"},{"type":"paragraph","text":"一年的生产过程中，夏锄是最艰苦的一段。因为那时，插苗、间苗、锄草、追肥等工作很多，去年夏锄时，全庄要铲八十七垧水旱田地，需要四千四百七十个劳动日，但全庄只有七十八个男女劳动力。怎么办呢？我们是合作化的新中国的农民，绝不能在困难面前低头。在金时龙同志和农庄管理委员会的领导下，全体庄员动员起来，白天插苗、间苗，晚间和下雨时间进行了追肥，每天两顿饭也在地里吃。我们还实行了苏联农民的先进经验——工作定额制，大大鼓舞了全体社员的劳动热情。结果，我们克服了夏锄期间劳动力不足的困难，并在秋收中做到了细割、细拉、细打，取得了丰收。"},{"type":"paragraph","text":"我们战胜种种灾害争取丰收的情况，充分表现了集体农庄的优越性。全庄三十三垧水田，每垧平均收八千八百八十斤稻子；三十二垧七亩旱田，每垧平均打三千四百三十七斤粮食。一九五三年全庄共打粮食三十九万七千四百斤，比一九五二年增产百分之二十一点九。其中一垧半水田共打了二万五千五百斤稻子，创造了高额丰产纪录；十五垧丰产水田每垧平均产量达到了一万一千斤。有十六垧丰产旱田每垧平均产谷子五千斤或大豆四千五百斤。此外，全庄工业原料作物的收入有一千二百万元，牧畜业的收入有二千一百万元。庄员收入比去年增加了，农庄也得到了扩大再生产的有利条件。"},{"type":"paragraph","text":"随着生产的发展和物质生活的提高，庄员们的文化生活和政治觉悟也日益提高。现在绝大部分庄员都能看懂东北朝鲜人民报和新农村等杂志。过去有些青年庄员不安心农业生产的思想也得到了克服，现在大家都全心全意地为建设好社会主义的集体农庄而努力。最近我们学习了党在过渡时期的总路线总任务之后，全体庄员们进一步认清了我们的幸福前途。在总路线的光辉照耀下，我们决心增产粮食大力支援祖国的工业化。我们除了选择好粮七万斤交纳公粮外，又把全部余粮十五万六千斤都卖给了国家。"},{"type":"paragraph","text":"为了继续搞好集体农庄的生产，支援国家经济建设，我们已经派了九名庄员到山里搞木业，其余庄员在冬季都进行织草袋的生产，争取增加更多的收入，给一九五四年的大生产做好物质准备。我们计划一九五四年的粮食要比一九五三年增产百分之二十。现在全体庄员正为着达到这个目标而积极努力。"},{"type":"paragraph","text":"吉林省延吉县黎明集体农庄全体庄员"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"95f8b0914a"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
