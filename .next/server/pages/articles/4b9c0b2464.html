" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"拉薩發生武裝騷亂事故","authors":[],"dates":[{"year":1957,"month":1,"day":14}],"is_range_date":false,"parts":[{"text":"拉萨发生武装骚乱事故","type":"title"},{"text":"新华社拉萨14日讯  10日晚上，拉萨市发生了西藏地区和平解放以来第一次武装骚乱流血事件，结果被打死藏民两人，囘民一人，打伤藏民三人。","type":"paragraph"},{"text":"这天晚上，中共拉萨分工委给拉萨市群众放电影，武装坏分子藉此机会，有计划地进行破坏活动。在电影放映中间，坏分子向前去看电影的我藏族干部进行挑衅，并拔刀鸣枪，结果造成流血事件。骚乱只有十多分钟即告平息，我公安人员当即捕获坏分子一人和嫌疑分子数名，先正在审讯。（宗子度）","type":"paragraph"},{"text":"来源：新华通讯社编：《内部参攷》第2104期，1957年1月14日","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4b9c0b2464"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
