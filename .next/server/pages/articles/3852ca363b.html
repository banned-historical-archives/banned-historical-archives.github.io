script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"8307d554-c979-4180-8a30-c2e3513f9eda","name":"澄清事实","internal":false,"type":"img","official":false,"author":"张维维 捍卫毛泽东思想工人赤卫队十二分部","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives21/main/8307d554-c979-4180-8a30-c2e3513f9eda/1.jpg"],"article":{"title":"澄清事实","alias":"","parts":[{"type":"paragraph","text":"最高指示"},{"type":"paragraph","text":"你对于那个问题不能解决么，那末，你就去调查那个问题的现状和它的历史吧，你完完全全调查明白了，你对那个问题"},{"type":"paragraph","text":"就有解决的办法了。"},{"type":"paragraph","text":"现在外面流传着很多遥言，说什么“工人赤卫队抄了柯老的家，抄了张春桥的家。”为了了解此事的相，我们特地到柯老和张春桥同志的住址，在那里我们得到了一张传单，此传单是张春桥同志的女儿张维维写的，全文如下："},{"type":"paragraph","text":"澄清事实现在外面流传工人赤卫队抄了张春桥的家，事实上没有抄"},{"type":"paragraph","text":"张维维（张春桥的女儿）"},{"type":"paragraph","text":"1966年12月31日"},{"type":"paragraph","text":"另外张春桥的爱人对此事也讲了几句话，她说：“工人赤卫队有三个队员到过柯老的家（柯老的家和张春桥的家在一个院子里），他们到了里面看到了柯老的遗像后，默哀了三分钟就出来了。”住在张春桥同志家隔壁的其他一些市委负责人的保姆也都纷纷证明没有抄过柯老和张春桥同志的家。有一个保姆说：“工人赤卫队没有抄过柯老和张春桥的家，工人赤卫队有几个队员是到张春桥同志的家里喝水，休息了一会儿。但事先他们不知道这是张春桥的家。”"},{"type":"paragraph","text":"从以上的一些事实来看，完全可证明工人赤卫队根本有抄过柯老和张春桥同志的家，但为什么现在全上海市会出现这样的言，我们希望同志们可根据上海市出现的一些事情，加强独立思考、调查研究，发扬敢想、敢说、敢做的共产主义风格，想一想这里面到底有什么问题？？？革命的同志们，我们一定要牢牢的掌握斗争的大方向，不要上一小坏人的当。"},{"type":"paragraph","text":"捍卫毛泽东思想工人赤卫队十二分部"},{"type":"paragraph","text":"1966年12月31日"}],"authors":["张维维","捍卫毛泽东思想工人赤卫队十二分部"],"dates":[{"year":1966,"month":12,"day":31}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1},"tags":[{"name":"张春桥","type":"人物"},{"name":"捍卫毛泽东思想工人赤卫队上海总部（赤卫队）","type":"人物"},{"name":"上海文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3852ca363b"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></
