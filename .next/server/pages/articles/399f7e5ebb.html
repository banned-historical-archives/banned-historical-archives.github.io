" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"出版界又揪出一个右派骨干，李小峰忠实执行章伯钧——夏高阳路线","authors":["封光汉"],"dates":[{"year":1957,"month":9,"day":21}],"is_range_date":false,"parts":[{"text":"出版界又揪出一个右派骨干，李小峰忠实执行章伯钧——夏高阳路线","type":"title"},{"text":"封光汉","type":"authors"},{"text":"【文汇报讯】 上海出版界又揪出了一个右派骨干分子，这就是李小峰、许君远、仇标反动小集团的头子李小峰。出版界在最近举行的第十九次、二十次反右派斗争座谈会上，摆事实、讲道理，有力地揭发和批驳了这个右派骨干分子的反动言行。","type":"paragraph"},{"text":"李小峰是前北新书局和四联出版社的资方，上海文化出版社编辑部副主任，农工民主党上海文化出版社支部的主任委员。在大鸣大放期间，他忠实地执行了章伯钧一夏高阳的反党组织路线。企图夺取党的领导权，在出版界“挂帅”，以达到在出版界使资本主义复辟的政治阴谋。去年夏高阳指示李小峰说:“出版界应该全面发展，能成一个‘界’，这样农工有力量能代表出版界说话。”李小峰根据这个指示，即和右派分子仇标一起，拟订了一个大发展的计划，以农工民主党上海文化出版社支部为基地，要在少年儿童、新知识、新文艺、人民美术、古典文学、画片、教育图片、卫生、音乐、科技等出版社和上海电影制片公司、新华书店、新民报(晚刊)、大公报上海办事处、报刊图书馆、外国语学院、师范学院、体育学院等二十二个单位发展农工民主党党员，发展的对象达五十余人。根据这个计划，在上海文化出版社内，各个科室都要有“农工”成员，以便他坐镇编辑部向各科室发号施令，使农工在社内造成“举足轻重”之势，和党“分庭抗礼”。这样，从去年8月到今年5月，上海文化出版社中的农工民主党党员，就由二人(李小峰和仇标)发展到十一人。同一时间连同在社外一起发展了二十余人。李小峰反动小集团积极进行反党反社会主义活动，得到了夏高阳和章伯钧的器重，夏高阳称赞农工民主党上海文化出版社支部为“模范支部”，并把李当作自己的有力助手。上海文化出版社汪晓光在发言中指出，李小峰是一个政治野心家，他披着“老出版人”的外衣，不但想在出版界“挂帅”，还想在上海整个文教界“登台拜将”。","type":"paragraph"},{"text":"李小峰有了“实力”后，就积极地要和党“分庭抗礼”。在去年12月上海文化出版社召开的一次民主党派座谈会上，李小峰狂妄地说:“互相监督首先是监督共产党，”并说:“共产党是执政党，容易犯错误，过去以为共产党总是正确的，不动脑筋跟着跑。现在应该大胆放手提出意见。”","type":"paragraph"},{"text":"李小峰又利用鸣放机会，暗中与小集团中的“军师”许君远密谋办不要党领导的“同人出版社”。李小峰并和许君远拟了一张“同人办社”的名单，其中没有一个是党团员。李小峰并企图这样来分裂社会主义企业的上海文化出版社，篡夺党对出版社的领导权，以达到资本主义复辟的目的。","type":"paragraph"},{"text":"在鸣放期间，李小峰支持右派分子的反动言论。他说:章伯钧的“政治设计院”的意见他也同意；章乃器的“民族资产阶级没有两面性”的言论是对的；并说葛佩琦的话也有道理。李小峰还为胡风反革命集团开脱罪行，对胡风分子何满子很为关心，何释放后，立即去看了他数次，并把何的书籍拿来重新出版。","type":"paragraph"},{"text":"反右派斗争开始后，他不但不交代自己的反动言行，同时还积极包庇右派分子许君远、仇标等，企图蒙混过关。","type":"paragraph"},{"text":"李小峰在出版界一直借口曾接近鲁迅先生，以“进步人士”自居；并以“忠厚长者”“好好先生”的面貌来迷惑人。上海文化出版社汪晓光、顾伦等揭发说:二十多年前，李小峰在鲁迅先生支持下开设了“北新”书店，但他的唯利是图和反动本质不久就暴露，他趁鲁迅先生躲避国民党反动派迫害而“深居简出”之时，就从经济上来迫害鲁迅先生，他拖欠了鲁迅先生巨额稿费，气得鲁迅先生只好请律师和他法律解决。实际上，二十年前李小峰即走上反动道路，在汪伪时期，李小峰倚靠他大哥李志云(当时任汪伪政府社会部总务司长)的关系，开设“复兴旗子公司”，制销汪伪的青天白日旗，旗上的长条上还印有“和平反共建国”字样。当时李并领有“专员证”，凭证自由出入于汪伪各机关。解放前“北新”通过国民党官僚关系，得到承印伪国定课本的特权。解放前夕，李和他的大哥将一部分书籍运往台湾，要到台湾设立“北新”分店，因房子未解决未成。因此，李小峰成为反党反人民反社会主义的右派分子，是有他历史根源的。","type":"paragraph"},{"text":"两次会上要求发言和李小峰辩论的达数十人，因时间限制，发言的只有十多人。出版界反右派斗争座谈会还将继续举行。","type":"paragraph"}],"comments":[],"origin":"《文汇报》1957年9月21日，原题为：“出版界又揪出一个右派骨干，李小峰忠实执行章伯钧——夏高阳路线  事实证明他是许君远仇标集团的头”。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"399f7e5ebb"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
