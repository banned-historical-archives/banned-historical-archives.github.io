<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共亳县县委关于地委10月21日电话会议贯彻情况的报告","authors":[],"dates":[{"year":1957,"month":10,"day":27}],"is_range_date":false,"parts":[{"text":"中共亳县县委关于地委10月21日电话会议贯彻情况的报告","type":"title"},{"text":"（缺页）（其中干部1,886人，社员3,246人）对这些先进单位与积极分子，都进行了口头表扬、出光荣榜和送红旗、手巾、袜子、现金等物资奖励。另外，还通过大小不同的会议。到目前为止，共辩论916■人，（其中区干××人，乡干10人，工作队干部10人，社、队干480人，群众400人）。由于如此表扬了先进，批评了落后，打击了破坏者。抗旱种麦运动得到了进一步推动。原来不积极的，现在积极了。观堂区刘集乡138个小队长，会前消极抵触的有35个，会后只有两个了，该乡建国一社第一大队经过评奖积极分子和辩论后，参加抗旱种麦劳力由原来397人，第2天增加到632人，占总人口的63.2％。生产组长吴保进的老婆从来不下地。现在也下地干活了。耿庄队耿文灿的娘70多岁也领着一班小孩下地打坷垃。全乡下种速度由原来每天9百亩增加到1100－1200亩，十八里区牛集乡书记李先明原来光叫喊缺种（事实不缺）经过辩论以后，认识了自己的错误，现在不叫喊，也积极工作了。张集区芦庙乡检査暴露了原来假报现象，解决思想问题之后，各社、队积极，均积极报投资打井抗旱，全乡5个社计划再打砖井72眼。报出砖6万7千5百块，树34棵，蔴330斤。大杨区采取算时间的办法。此外均进一步查情。普遍增添工具，开辟水源。总之基本上又掀起来二次高潮。现在全县每日进度由原来3万亩增加到5万亩。","type":"paragraph"},{"text":"但是在贯彻中也暴露和出现如下问题：","type":"paragraph"},{"text":"第一、假报现象很严重。张集区芦庙乡原有17个报已经种结束。结果检査都未结束。观堂区刘集乡建国三社第7生产队22号社回报浇28.5亩，种15亩；队回报浇15.7亩、种11.5亩，经区委检查组实地检查只浇11.8亩。种7.8亩。另外还少种多报现象。刘集乡建国四社前张楼队种165亩报121亩，少报44亩。原因是打算明年不缴不卖余粮好作借口。","type":"paragraph"},{"text":"第二、粗糙下种，不能保证质量。古城区龙德乡龙德社浇种2480亩，抢墒下种760亩，共种3240亩，经检查缺苗10－■0％的有1210亩。缺苗30－50％的有689亩，缺80－90％的有29亩。以上共计缺苗的有1928亩,占已种面积的60％弱一点，该区龙德乡莲花庵社干种40亩一棵未出。","type":"paragraph"},{"text":"第三、富裕中农和地主反坏分子的破坏活动：","type":"paragraph"},{"text":"张集区王集乡建华六社23号打井时，地主刘培谈、刘培勤、刘培全等几人拉拉滑车企图丢绠行凶，砸死在井下4人,结果被两个队长拼命拉住未能得逞。该乡建华一社桥楼中农乔楚栋鼓动社员不叫抗旱说：“咱浇够吃的就算了。”观堂区刘集乡地主张思心趁社往队送红旗时，编快板破坏抗旱工作。","type":"paragraph"},{"text":"第四、在开展辩论中。发现有打人现象。大杨区刘小庙乡刘降庄社员温中顺（老中农）对抗旱抵触，该社干 25号召开800人会议对他开展辩论。由于准备不好，一上午未有辩倒。社主任刘振华、刘振卿看收不了场即上去捺住撕打。群众趁撕打中间溜跑了，结果会不了了之。该区师店乡聂桥社富农朱良璧鼓动社员不抗旱，对他开展辩论又不承认，被乡助理员邓保全跺一脚。","type":"paragraph"},{"text":"上述问题，除对王集乡地主阴谋行凶为首的进行了逮捕法办外，其余均吿各区注意，纠正与防范。","type":"paragraph"},{"text":" 中共亳县委员会（章）1957年10月27日","type":"paragraph"}],"comments":[],"origin":"安徽省某档案馆","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8827ddac34"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
