" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji47","name":"毛泽东全集第47卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji47.pdf"],"article":{"title":"毛泽东等悼念乔治乌-德治逝世的电报","alias":"","parts":[{"type":"paragraph","text":"毛泽东等悼念乔治乌-德治逝世的电报"},{"type":"paragraph","text":"（1965年3月20日）布加勒斯特罗马尼亚工人党中央委员会，罗马尼亚人民共和国国务委员会，罗马尼亚人民共和国部长会议："},{"type":"paragraph","text":"惊悉罗马尼亚工人党中央委员会第一书记、罗马尼亚人民共和国国务委员会主席格·乔治乌-德治同志不幸逝世，我们怀着极悲痛的心情向你们表示深切的哀悼。"},{"type":"paragraph","text":"格·乔治乌-德治同志的一生是战斗的一生。他是罗马尼亚人民的忠实儿子、敬爱的领袖，是中国人民的亲密朋友和国际工人运动的杰出战士。他领导罗马尼亚人民举行了“八·二三”武装起义，引导罗马尼亚人民走上了社会主义建设的道路，并取得了辉煌的胜利。在坚持兄弟党、兄弟国家相互关系的准则、维护社会主义阵营的团结、维护国际共产主义运动的团结和保卫世界和平的斗争中，他作出了重大的贡献。他的逝世不仅是罗马尼亚人民的重大损失，而且是社会主义各国人民和全世界劳动人民的重大损失。"},{"type":"paragraph","text":"在这不幸的时刻，我们相信，罗马尼亚工人党和罗马尼亚人民将化悲痛为力量，加强团结，坚持斗争，在胜利的道路上继续前毛泽东全集第四十七卷进。中国人民将一如既往，在马克思列宁主义和无产阶级国际主义的基础上，同罗马尼亚人民团结一致，为进一步发展我们两党、两国人民的友好合作，为维护社会主义阵营的团结和国际共产主义运动的团结，为争取世界和平、人民民主、民族解放和社会主义而共同奋斗。"},{"type":"paragraph","text":"中国共产党中央委员会主席毛泽东中华人民共和国主席刘少奇中华人民共和国全国人民代表大会常务委员会委员长朱德中华人民共和国国务院总理周恩来"},{"type":"paragraph","text":"一九六五年三月二十日"}],"authors":["毛泽东"],"dates":[{"year":1965,"month":3,"day":20}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":518,"page_end":519},"tags":[{"name":"毛泽东","type":"人物"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"17b5d099a7"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
