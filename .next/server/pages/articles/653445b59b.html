script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"在蒋匪政府压榨与剥削下　蒋区进出口贸易衰落","authors":[],"dates":[{"year":1948,"month":5,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"在蒋匪政府压榨与剥削下"},{"type":"paragraph","text":"蒋区进出口贸易衰落"},{"type":"paragraph","text":"【新华社陕北二十四日电】在蒋匪政府的压榨与剥削之下，蒋管区的进出口贸易正日益衰落。据统计，今年第一季将管区各月份出口结汇金额如下：一月份计一千四百八十一万四千元（单位美金，下同），二月份下降为九百二十八万二千元，三月份微有上涨，计为一千零七十四万二千元，但较一月份仍跌落四分之一以上。进口方面亦具有相同趋势。同前时期内，蒋管区各月份进口商购买外汇金额如下：一月份为一千七百一十六万五千元（单位美金，下同），二月份下降为一千四百三十七万三千元，至三月份仍继续有跌落，计为一千四百一十三万元。四五两月之进出口虽尚无统计，但不久以前上海金融界人士曾指出：“过去公开汇率（按指蒋政府规定之美金汇率）与实际情况相差百分之八十到一百，但现在却增到百分之二百以上，这就使得出口贸易陷于停顿。”另一方面，蒋管区走私之风日炽。据蒋区报纸消息，今年仅一二两个月份内，蒋匪海关所缉获私货共二千九百零六起，估值一千零四十五亿八千三百余万元（蒋币），且据估计，未缉获之私货为已缉获者二倍以上。蒋记两广监察使刘成禹就说：“海关所缉获到的都是中级以下的走私，中级以上的都捉不到。”蒋区报纸并透露：“汉口与广州之间，早有黄金走私集团成立，此等集团有特殊背景，大约十天走运一次，每次黄金数量均达数百两之巨。”而这些都是捉不到的，遭殃的多是那些“为生活所迫的零星走私者”。"},{"type":"paragraph","text":"【新华社陕北二十三日电】据蒋区报纸消息：沪市各商店门市营业四月中旬止，平均较三月份减少达三分之一，一般工厂则已深受停工威胁。津市天顺、中国两火柴厂及唐山光华造纸厂等，均于上月相继被迫停工，北平燕京造纸厂亦曾一度停工。上月初津市工业协会举行会议时，民营纱厂对蒋匪扼杀政策表示极度不满与愤慨，他们说：“由于（蒋匪）当局实施棉纱管制，民营纱厂都将要关门了。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"653445b59b"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
