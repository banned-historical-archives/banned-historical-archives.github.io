script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"法极右翼国民阵线分裂　政坛正在“巴尔干化”","authors":["马为民"],"dates":[{"year":1999,"month":1,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"法极右翼国民阵线分裂"},{"type":"paragraph","text":"政坛正在“巴尔干化”"},{"type":"paragraph","text":"本报巴黎1月25日电记者马为民报道：法国极右翼政党国民阵线上周末正式分裂。去年12月被该党主席勒庞撤销总代表职务的梅格雷及其支持者，于1月23日和24日在法国南部小城马里尼讷召开了国民阵线特别代表大会，成立了“革新的”国民阵线——“国民阵线—国民运动”。"},{"type":"paragraph","text":"会议宣布勒庞去年12月开除梅格雷等人党籍等决定为“非法”，并选出了新的领导机构，梅格雷当选为主席。会议选举勒庞为“名誉主席”，为勒庞所拒绝。勒庞称这个会议是“阴谋”，他及其支持者因而没有与会。舆论普遍认为，梅格雷和勒庞在政见上并无区别，都鼓吹极端民族主义，都煽动排外。国民阵线内部的这场斗争是争权夺利，只是行动路线上的分歧，所以“国民阵线—国民运动”没有修改国民阵线的纲领，但要采用新的语调和新的方法。"},{"type":"paragraph","text":"据此间报刊分析，勒庞派在国民阵线领导机构中占主导地位，梅格雷派在中层干部队伍中势力强大，梅格雷称4.2万党员中有1.8万支持他。民意测验机构估计，支持梅格雷的国民阵线选民在1／3上下。当前法国政坛正在经历“巴尔干化”（《费加罗报》社论语），执政派内部分歧表面化，传统右翼群龙无首，对于即将到来的欧洲议会选举，这两派将会各自提出四五个候选人名单参与角逐。极右翼的分裂显然也是“巴尔干化”的一种表现。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6f232c0132"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
