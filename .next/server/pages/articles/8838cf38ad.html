script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"巴西农业劳动者和农业工人举行首次全国代表大会  巴西农民要求实行土地改革  农协主席强调反对外国剥削者和大庄园主以争取经济独立","authors":[],"dates":[{"year":1961,"month":11,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"巴西农业劳动者和农业工人举行首次全国代表大会"},{"type":"paragraph","text":"巴西农民要求实行土地改革"},{"type":"paragraph","text":"农协主席强调反对外国剥削者和大庄园主以争取经济独立"},{"type":"paragraph","text":"据新华社里约热内卢18日电　巴西历史上第一次举行的农业劳动者和农业工人全国代表大会昨天晚间在米纳斯吉拉斯州首府贝洛奥里藏特闭幕。这次大会是从15日开始举行的。出席大会的有七千多名农民代表。"},{"type":"paragraph","text":"代表大会通过了一项总决议，并且提出了“我们要土地改革”的口号。"},{"type":"paragraph","text":"代表大会的决议要求：征用面积在五百公顷以上的一切土地，以低价通过长期付款的方式卖给农民：征用这些土地将根据付土地税时登记的土地价格，由政府发行公债券作为补偿，而不出钱收买；把属于国家的以及未开垦的土地无偿地交给农民；把伪造的地契的土地无偿地交给农民；国家在农民在他们分得的土地上进行生产过程中给予财政和技术援助。"},{"type":"paragraph","text":"众议员弗朗西斯科·儒利奥和其他农民领导人签署了一封致古巴总理卡斯特罗和古巴人民的信。"},{"type":"paragraph","text":"代表大会通过了古拉特总统在会上发表的演说。古拉特总统在演说中指出，必须修改宪法，以便实行土地改革。"},{"type":"paragraph","text":"古拉特说，“争取耕者有其田的斗争是合法的，是巩固民主权利的一个基本因素。土地改革是国家为了发展停滞不前的生产力所需要的改革之一。巴西要求实行土地改革，来改变农民和农村业主之间的法律和经济关系，提高农业生产，保证农民取得国家财富的一部分。”"},{"type":"paragraph","text":"巴西农民协会主席儒利奥在16日的会议上发表了讲话。他指出，在巴西提出的任何土地改革的纲领都必须是激进的，而且土地改革应该在农民自己的领导下进行，否则将是一个背弃农民的谎言。他说，农民们已经成熟了，他们拥有自己的组织、协会和工会，有能力来领导和掌握土地改革的进展。"},{"type":"paragraph","text":"儒利奥强调说，巴西人民还应该组织起来，通过反对外国入侵者和剥削者、反对大庄园主的斗争来争取巴西的经济独立和保卫自由。"},{"type":"paragraph","text":"会议期间，代表大会的代表们举着旗帜和标语，在贝洛奥里藏特城的大街上举行了游行，受到当地人民的热烈欢迎。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8838cf38ad"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
