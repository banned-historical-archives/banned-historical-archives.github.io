" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"南大学潮主将之一汪云辉发表极端反动的言论：“要救中国，杀掉几百几千个‘坏党员’是必须的”","authors":[],"dates":[{"year":1957,"month":6,"day":5}],"is_range_date":false,"parts":[{"text":"南大学潮主将之一汪云辉发表极端反动的言论：“要救中国，杀掉几百几千个‘坏党员’是必须的”","type":"title"},{"text":"新华社南京5日讯　本社记者朱冰菊、蒋青萍报道：南京大学法文专业学生汪云辉认为要救中国，杀掉几百几千个“坏党员”是必须的。5月4日他在校门上贴了一张题为“百家争鸣不等于造谣惑众”的大字报。大字报上写道：停课签名不是落后，共青团员在运动中不带头才是落后。外文系“反动小集团”的事是丧心病狂的政治迫害已到了绝灭人性的地步，我从团委书记陈炳湘的谈话中知道这是外文系党支部的“杰作”。作为我“反动小集团”成员之一，我要控诉。我说这些党员是反动的。邓小平是反动，我没有说；他是斯大林分子，我说过。邓小平在清华大学讲：“……有个清华同学说，我把党员杀掉几百几千，我认为这是反动行为。”我不同意这种说法，一个人生下来彼此没有仇恨，为什么这个清华学生要这样呢？我想首先应该问一问原因，我亲身尝到政治迫害，使我感到要救中国，杀掉几百几千个坏党员是必须的。","type":"paragraph"},{"text":"汪云辉是共青团员，解放后曾在上海的工会和公安局工作过，1955年考入南大。他在校内目中无人，曾经发表一些不满现状的言论。这些言论在“肃反”和“再论无产阶级专政的历史经验”的学习中，受到批判，因此，对党更加不满。这次南大事件，他是一个头子。","type":"paragraph"}],"comments":[],"origin":"1957年6月7日新华通讯社编《内部参考》。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0abe53ed16"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
