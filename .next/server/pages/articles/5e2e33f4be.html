script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"读毛主席的书干一辈子革命","authors":["周水宝"],"dates":[{"year":1969,"month":12,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"上海沪东造船厂工人　周水宝"},{"type":"paragraph","text":"我是个普通工人，五岁就死去了娘，六岁那年，父亲无力养活我，不得不将我卖给了人家。旧社会悲惨的生活，一言难尽。解放了，我和受苦受难的劳苦大众一样，翻身做了主人，还加入了伟大的中国共产党。我深深感到，没有毛主席就没有我周水宝。"},{"type":"paragraph","text":"今年国庆节，我作为上海工人代表赴京观礼，光荣地见到了日夜想念的伟大领袖毛主席，在北京度过了一生最最幸福、最最难忘的时刻。每当我回忆起那幸福的情景，回忆起毛主席那刚健的步伐、魁梧的身材、慈祥的笑容时，我的心情是多么激动啊!"},{"type":"paragraph","text":"想起了毛主席，千斤重担不觉累，刀山火海也敢闯。一次，我和车间里的一个师傅一起检修一部五米大车的平板，在我身旁的那个师傅由于操作不熟练，用力过猛，半吨重的平板唰地从机床上滑了下来，情况十分危急。如果我不立即冲上去挡住平板，那位师傅就要被砸伤。刹那间，无数英雄的形象飞速掠过我的眼前，想到毛主席关于“为人民利益而死，就比泰山还重”的教导，我一个箭步冲了上去，推开了那位师傅。平板哗的一声，砸到了我的身上。顿时，疼得我几乎昏了过去，为了不让别的同志操心，我紧紧地咬住牙关。当时我想，我是共产党员，要经得起考验，疼痛算不了什么。回家以后，又吐血了，人也一天天地消瘦了，可我却感到非常愉快。"},{"type":"paragraph","text":"我觉得，作为一个共产党员，要经受各种严峻的考验，事事起模范带头作用，能不能做到这一点，是衡量一个党员党性强不强的标志。我们车间有个青年，是高中毕业生，开始分配他当起重工，他认为是“大材小用”，整天没精打采。这个青年虽然和我不在一个小组，可是我想到教育青年是我们义不容辞的责任，多调动一个青年的革命积极性，就为革命增加一份力量。于是我就利用下班时间，和他一起忆苦思甜，一起学习“老三篇”，后来他终于提高了认识，安心了本职工作。"},{"type":"paragraph","text":"实践使我深深体会到，伟大的毛泽东思想是我们前进的指路明灯。我们每一点微小的进步，都是毛泽东思想阳光雨露哺育的结果。我决心读一辈子毛主席的书，一辈子改造思想，继续革命，永远向前，为社会主义革命和社会主义建设事业作出更大的贡献。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"上海文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5e2e33f4be"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
