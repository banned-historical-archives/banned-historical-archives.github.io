script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"上影厂创作生产形势令人鼓舞《从奴隶到将军》等四部影片将参加国庆献礼新　片展映。今年计划拍摄的十二部影片已完成九部","authors":[],"dates":[{"year":1979,"month":9,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　据悉:在文化部即将举办的国庆献礼新片展览上映的故事片、舞台艺术片十二部十六集中，上海电影制片厂占了四部七集。它们是《从奴隶到将军》上下集、《傲蕾·一兰》上下集、《曙光》上下集以及《她俩和他俩》。"},{"type":"paragraph","text":"国家今年给上影厂下达的生产任务是十二部(去年八部)影片，到目前为止已完成九部。除四部七集展映片外，《于无声处》早已问世，《苦恼人的笑》即将和观众见面。影片《蓝光闪过之后》已拍摄完成，正在进行后期混录工作。《雪青马》、《啊!摇篮》、《茶童戏主》、《绿色的航道》均可在年底以前摄制完成。预计今年创作生产影片可达十四部至十五部。"},{"type":"paragraph","text":"上影厂在超额完成今年生产任务的同时，已在跨年度生产明年的部份影片。如《珊瑚岛上的死光》、《琴童的命运》、《卢山恋》、《四○五谋杀案》、《海之恋》、《等到满山红叶时》等，都已进入筹备和开拍。"},{"type":"paragraph","text":"上影厂创作生产的大好形势，从一个侧面生动地显示了整个文艺园地百花齐放的繁荣前景已经在望。这个厂的职工，在三中全会和五届人大二次会议精神的鼓舞下，通过实践是检验真理的唯一标准的讨论，解放思想，勇闯禁区，影片的题材内容广泛，风格形式多样，有正剧、喜剧、悲剧、惊险剧；有现代题材，有历史题材。在现代题材的影片中，有歌颂老一辈无产阶级革命家的丰功伟绩，进行革命传统教育；有描写青年人在新长征的道路上，正确对待工作、生活和爱情；有反映知识分子在“四害”横行时的苦恼和觉醒；有表现唐山地震以后，失去父母的孤儿处处都有亲人在关怀他们成长的动人情景。影片的质量也有明显提高。"},{"type":"paragraph","text":"上影厂创作人员的共同体会，一是一定要解放思想，彻底批透极左思潮的流毒和影响。“四人帮”粉碎以后，厂领导组织职工花大力气狠批“四人帮”在电影创作生产上主题先行、三突出、公式化、概念化、虚假等流毒，使创作人员从极左思潮的精神枷锁中解脱出来，放开手脚，大胆创作。二是贯彻“双百”方针，按艺术规律办事。去年厂领导根据电影生产的特点，成立了五个创作室，对创作人员充分给予信任和支持，使他们的积极性进一步发挥。各创作室除了依靠专业编剧队伍外，还自己动手组稿和创作。今年完成的影片中，有三部是各创作室自己编剧的。今年上影厂领导对剧本抓得早，抓得紧，剧本储备基数较大，有较大的选择余地，因而保证了影片的质量和连续生产。"},{"type":"paragraph","text":"\u003cIMG alt=请插入7号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1979\\09\\799H010601.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e影片《从奴隶到将军》中的一个画面:罗霄和索玛举行婚礼，受到旧军队中兵痞、流氓的肆意凌辱。新婚夫妇无言相对，义愤填膺。\u003c/FONT\u003e"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6ae18d0b78"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
