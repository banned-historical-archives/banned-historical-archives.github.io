script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"老挝解放区人民积极发展生产  被迫外逃的老挝人认清极右反动派真相后纷纷返回家乡","authors":[],"dates":[{"year":1975,"month":7,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"老挝解放区人民积极发展生产"},{"type":"paragraph","text":"被迫外逃的老挝人认清极右反动派真相后纷纷返回家乡"},{"type":"paragraph","text":"新华社万象一九七五年七月二十二日电　据巴特寮电台报道，今年年初以来，老挝解放区南北丰沙里两省、阿速坡、川圹和乌多姆塞等省人民积极兴修水利，扩大水田面积，发展农、林、牧生产，取得可喜的成绩。"},{"type":"paragraph","text":"南丰沙里省新赛县人民十分重视农、林、牧生产的发展。"},{"type":"paragraph","text":"今年年初以来，该县人民大兴水利，把大量旱田改为水田。他们种植木薯四十四万两千多株，种植玉米使用种子四千四百多公斤。此外，他们还养了牛、马、猪等牲畜二千六百多头，比去年同期增加了百分之二十五。这个县的人民还种植了大量的树木，并挖鱼塘四十多处。"},{"type":"paragraph","text":"北丰沙里省人民积极执行爱国战线中央扩大水田减少旱田的方针，今年增加了八百七十多公顷水田。到目前为止，这个省水田已增加到一千多公顷。"},{"type":"paragraph","text":"阿速坡省自一九七二年以来，已有六百六十九户山区人民丢弃旱田下山改种水田，从而增加了水田种植面积。"},{"type":"paragraph","text":"川圹省芒昆县各族人民积极兴修水利，发展农业生产。"},{"type":"paragraph","text":"今年年初以来，他们修渠筑坝十来处，长达两千九百多米，可灌溉土地四千八百八十多公顷。"},{"type":"paragraph","text":"乌多姆塞省人民自今年年初以来，修复和新建中、小型水坝一百八十多处，修建水渠一百八十多条，长六万二千八百多米，可浇灌土地八千七百多公顷。"},{"type":"paragraph","text":"目前，解放区各地人民正在加倍努力生产，创造优越成绩，迎接老挝独立三十周年。"},{"type":"paragraph","text":"新华社万象一九七五年七月二十二日电　据此间报纸报道，最近以来，许多被迫逃往国外的老挝人认清了极右反动派的真相，陆续回到了老挝，并受到了临时民族联合政府和各地人民的热烈欢迎和接待。"},{"type":"paragraph","text":"据报道，七月十二日原万象军队第四一二别动营营长坎丹·苏帕马冯和一百二十多名被迫逃往泰国的苗族人已返回老挝。"},{"type":"paragraph","text":"七月十六日，临时民族联合政府发出通知，号召边境和各地方有关政权热烈欢迎被迫外逃者返回祖国，并向他们提供交通工具、食物和药品等物资。在临时民族联合政府和当地群众的关怀下，返回老挝的人都回到了他们的家乡，他们的生活得到了合理安置。"},{"type":"paragraph","text":"返回老挝的人心情异常激动。他们纷纷发表声明，谴责老挝极右反动派出卖祖国、欺压人民的罪行，呼吁其他被迫逃往国外的人迅速返回家乡。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0941d70266"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
