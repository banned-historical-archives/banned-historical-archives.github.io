script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji41","name":"毛泽东全集第41卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji41.pdf"],"article":{"title":"关于召开县以下各级干部会议等问题给王任重的两封信","alias":"","parts":[{"type":"paragraph","text":"关于召开县以下各级干部会议等问题"},{"type":"paragraph","text":"给王任重?的两封信"},{"type":"paragraph","text":"（1959年3月16日）任重同志："},{"type":"paragraph","text":"今日上午，请找各地委第一书记及几个县委书记商量一下：省的会议以后，是否应以几天时间召开县的四级或五级干部会议，此种会议应到些什么人，应开几天；然后再开公社代表大会，应到些什么人，应开几天，是否应选举社的管理委员会（其成员如何组成）。下午，我们再商量一下。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"三月十六日上午二时[1]王任重，当时任中共湖北省委第一书记。毛泽东全集第四十一卷任重同志："},{"type":"paragraph","text":"送上文件24件，极有味，好读。我劝你于今天上午看一遍，一气看完，有3一4小时就够了。"},{"type":"paragraph","text":"下午你再找地委书记少数县委书记座谈，谈县、区、乡、村如何开会问题。我们晚上再交谈。以为如何？花费这一天，不是于湖北工作没有用的，你试一试看吧！"},{"type":"paragraph","text":"毛泽东三月十六日上午七时"}],"authors":["毛泽东"],"dates":[{"year":1959,"month":3,"day":16}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":347,"page_end":348},"tags":[{"name":"王任重","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dee1e23893"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
