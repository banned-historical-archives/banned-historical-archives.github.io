<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"“左叶事件”的沉痛教训","authors":["《文汇报》社论"],"dates":[{"year":1957,"month":8,"day":15}],"is_range_date":false,"parts":[{"text":"“左叶事件”的沉痛教训","type":"title"},{"text":"《文汇报》社论","type":"authors"},{"text":"文汇报在过去一个时期内曾犯了反人民、反党、反社会主义的罪。我报编辑部绝大多数编辑记者同志，以沉痛负疚的心情，认识到在这次对人民犯罪的严重错误中出责任。因此，七月初以来，互相策励，决心向人民立功赎罪。一面全心全意投入反右派斗争，使我报回到人民的手中，成为反右派斗争的有力武器；并彻底揭发和批判我报和右派的种种关系，和报社内部右派分子展开斗争。另一方面，彻底揭发和批判我报在这一时期中言论、报道、编排各方面的政治错误及共恶劣影响；并坚决与资产阶级新闻观点和立场作不调和的不懈怠的斗争。","type":"paragraph"},{"text":"一个多月来，随着我们立功赎罪的斗争逐步深入，我们越来越深刻地认识到右派分子的凶狠恶毒的本质，认识到文汇报在一个时期内成为右派煽风放火的武器所散布的毒害的严重性，认识到右派之所以处心积虑，使尽一切阴谋诡计，一定要把报纸夺到手里，同时由于我们和右派斗争的软弱无力，任其劫持，终于使文汇报在一个时期内成为反党反人民反社会主义的喉舌。我们应该对人民负何等严重的责任。另一方面，我们更加深刻地认识到，由于我们编辑部中许多同志立场不稳，我们头脑中还充满着资产阶级思想，因而害了政治上的软骨症。","type":"paragraph"},{"text":"“左叶事件”就是一个沉痛的教训。这个所谓“事件”就是由文汇报制造出来的。这个小纠纷发生以后，罗隆基的亲信、文汇报北京办事处右派分子刘光华就如获至宝地把这件小事情在办事处内大肆宣扬，加油添酱，揑造夸大，进行煽动；而另外一个右派分子杨重野，则大事渲染，把它拟成为一个专电。这还惟恐火力不足，又去特地邀约了社外编委、右派分子彭子冈写了一篇社论，连夜拍发到上海。这“事件”就此传遍全国，煽起了反人民、反党、反社会主义的毒火。这正如新闻工作者协会会长邓拓同志所指出的：“文汇报关于这件事情的报道和社论是借题发挥，别有用心的。”","type":"paragraph"},{"text":"右派分子制造这个事件，其用心之阴险狠毒，自毋待言。使我报编辑部同志们特别感到沉痛负疚的是，当接到这个专电和社论的时候，我们并未识别它的政治上的反动性。我们仅仅删去一部分，加上个别的肯定我们的人民民主政权是尊重新闻记者的字句，而仍予刊登。这个专电与社论的反动观点并未因删改而有所丝毫改变。不仅如此，在发表这个专电与社论之后，我们还继续发表了新闻和文章，并举行了记者座谈会，把对左叶同志的攻击，扩大为对许多机关和干部的攻击。人民日报社论严正指出：当时的文汇报，在这件事情上表现得最凶狠最恶毒。这完全是事实。如果我们自己头脑不是充满了资产阶级“新闻自由”等等谬误观点，如果我们能坚持维护党的利益的原则，我们怎么会刊登这个消息，而且从此扩大开去呢？事实极为清楚，制造“左叶事件”向党、向人民、向社会主义发动猖狂进攻，文汇报的右派分子，是罪魁祸首。而我们却由于自己的满脑子的资产阶级思想作祟，因而迷失了政治方向，助长了右派的罪恶活动。这是一个十分沉痛的教训。","type":"paragraph"},{"text":"“左叶事件”不过是我们过去所犯的严重错误中的一件。每一件错误事实都教育着我们：在社会主义报纸的编辑部中，必须时刻警惕，和资产阶级新闻观点与立场作不懈的斗争。同时还要警惕，资产阶级的新闻观点与立场是在不同情况下以各种不同的方式显露出来的。因此，从错误吸取教训是最现实的教训。我们要积极投入反右派斗争，不仅用报纸这个武器来反击右派，而且要从揭发与批判右派的反动言行来提高自己；同时还要彻底检查我们的错误，来批判我们的资产阶级思想。我们决不能放过一个右派分子，同时我们也决不放过自己的错误思想。只有这样，我们才真正向人民立了功，赎了罪。","type":"paragraph"},{"text":" ---- 原载《文汇报》1957年8月15日。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"63565a0881"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
