<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"控诉旧社会揭露剥削者《收租院》展览是生动的阶级教育课堂首都中国美术馆展出的泥塑群像吸引了大量观众","authors":[],"dates":[{"year":1966,"month":1,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社北京28日电　最近一个多月来，首都和来自各地的广大观众，源源不断地来到中国美术馆，争看大型泥塑群像《收租院》展览。这个揭露四川恶霸地主刘文彩滔天罪行的雕塑展览，已经成了一所向人们进行阶级教育的生动课堂。"},{"type":"paragraph","text":"这次展览从去年十二月二十四日在首都开幕以来，展览大厅里几乎每天都被仇恨激愤的气氛笼罩着。面对着一个个被压榨、受迫害的农民形象和惨绝人寰的阶级压迫的图景，很多观众一边参观一边激动地流下眼泪。来自上海的一个观众说:天下乌鸦一般黑，劳动人民命相连，《收租院》里的农民形象，只不过是旧中国穷苦人民悲惨命运的一个“缩影”。北京郊区顺义县杨镇公社下营大队的一些干部和社员参观以后触景生情，哭诉他们解放前受苦受难、家破人亡的痛苦经历。一些老工人看过展览以后说，剥削阶级都喝穷人的血，资本家也和地主一样是黑心肠。很多观众还认为，旧中国到处都有刘文彩，各地都有收租院，“三座大山”头上压，穷人活命难上难。"},{"type":"paragraph","text":"一些在新社会里长大的青少年观众看了这个展览以后，再一次懂得了旧社会穷人受的苦难，更加珍惜今天的幸福生活。"},{"type":"paragraph","text":"“劳动人民在旧社会为什么那么苦，而在新中国又怎能这么甜?”很多人在参观时，情不自禁地喊出或写下“中国共产党万岁”“毛主席万岁”的口号。有些解放军战士还指出，劳动人民在旧社会受压迫，“根本问题是枪杆子在人家手里”；现在能翻身做主，也正是因为我们自己掌握了枪杆子。许多观众表示，今天社会上还有阶级斗争，一定要把革命进行到底，决不让阶级敌人的复辟阴谋得逞，决不让《收租院》的苦难日月重来。许多观众还从《收租院》的展览联想到世界上还有三分之二的人民没有解放。他们表示，不管帝国主义怎样疯狂和阴险，不管现代修正主义怎样给帝国主义帮忙，我们中国人民一定要和世界人民一起，高举革命大旗，为在世界上最后埋葬帝国主义、消灭阶级剥削和压迫而献出自己的力量。"},{"type":"paragraph","text":"《收租院》的展览，还教育了许多出身于剥削阶级家庭的青年人。北京石油学院一个剥削阶级出身的学生，看了展览，这样表示了他进行思想改造的决心:“家庭出身不能选择，但走什么样的道路要靠自己努力。我一定永远听党的话，听毛主席的话，彻底背叛剥削阶级，决心跟着党，跟着毛主席，干一辈子革命!”"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"638ee7ee5e"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
