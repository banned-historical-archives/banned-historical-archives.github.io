" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji22","name":"毛泽东全集第22卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji22.pdf"],"article":{"title":"只要打破胡宗南军即可改变陕北局面","alias":"","parts":[{"type":"paragraph","text":"只要打破胡宗南军即可改变陕北局面"},{"type":"paragraph","text":"（1947年3月27日）贺、李2，并告彭、习3："},{"type":"paragraph","text":"榆林之敌只能自保，出扰能力不大，贺炳炎?旅可即解除渡河掩护之任务，该旅使用由你们决定。中央直属人员到普西北者是否转到太行，待恩来到你处决定。中央率数百人在陕北不动，这里人民、地势均好，甚为安全。目前主要敌人是胡宗南，只要打破此敌即可改变局面，而打破此敌是可能的。据彭电已歼三十一旅（缺一个团），俘四千人，旅长以下无一漏网，缴子弹二十万，士气大振，信心提高，并可能争取新胜利，各个歼灭胡军。为配合打胡宗南，我陈谢集团日内开始向晋南三角地带出击，约需-一个月时间。如阎锡山向石楼、中阳出扰，那时亦可北上打阎。大约在三四个月"},{"type":"paragraph","text":"[1]胡宗南，当时任国民党军第一战区司令长官。[2]贺、李，指贺龙、李井泉，当时分别任晋绥军区司令员和政治委员。"},{"type":"paragraph","text":"[3]彭，指彭德怀，当时任西北野战兵团司令员兼政治委员。习，指习仲勋，1913年生，陕西富平人，当时任西北野战兵团副政治委员。"},{"type":"paragraph","text":"[4]贺炳炎（1913—1960），湖北松滋人，当时任晋绥军区第三纵队独立第五旅旅长。"},{"type":"paragraph","text":"[5]陈，指陈，当时任晋冀鲁豫野战军第四纵队司令员。谢，指谢富治（1909一1972），湖北黄安（今红安）人，当时任晋冀鲁豫野战军第四纵队政治委员。内，我主力尚不能北上打傅作义\"，全靠你们以现有兵力支持北线。详由恩来面达。"},{"type":"paragraph","text":"中央寅感1947年，毛泽东在转战陕北途中。1947年，毛泽东在转战陕北途中。"}],"authors":["毛泽东"],"dates":[{"year":1947,"month":3,"day":27}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":473,"page_end":476},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]},{"type":"pdf","id":"wenji4","name":"毛泽东文集第四卷（1999）","internal":false,"official":true,"author":"中央文献研究室","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/wenji4.pdf"],"article":{"title":"只要打破胡宗南军即可改变陕北局面","description":"根据毛泽东手稿刊印。","dates":[{"year":1947,"month":3,"day":27}],"parts":[{"text":"只要打破胡宗南军即可改变陕北局面","type":"title"},{"type":"appellation","text":"贺李，并告彭习："},{"type":"paragraph","text":"榆林之敌只能自保，出扰能力不大，贺炳炎旅可即解除渡河掩护之任务，该旅使用由你们决定。中央直属人员到晋西北者是否转到太行，待恩来到你处决定。中央率数百人在陕北不动，这里人民、地势均好，甚为安全。目前主要敌人是胡宗南，只要打破此敌即可改变局面，而打破此敌是可能的。据彭电已歼三十一旅（缺一个团），俘四千人，旅长以下无一漏网，缴子弹二十万，士气大振，信心提高，并可能争取新胜利，各个歼灭胡军。为配合打胡宗南，我陈谢集团日内开始向晋南三角地带出击，约需一个月时间。如阎锡山向石楼、中阳出扰，那时亦可北上打阎。大约在三四个月内，我主力尚不能北上打傅作义，全靠你们以现有兵力支持北线。详由恩来面达。"},{"type":"paragraph","text":"中 央"},{"type":"paragraph","text":"寅感"}],"comment_pivots":[{"part_idx":0,"offset":7,"index":1},{"part_idx":1,"offset":2,"index":2},{"part_idx":1,"offset":7,"index":3},{"part_idx":2,"offset":19,"index":4},{"part_idx":2,"offset":204,"index":5},{"part_idx":2,"offset":232,"index":6},{"part_idx":2,"offset":271,"index":7}],"is_range_date":false,"authors":["毛泽东"],"comments":["胡宗南，当时任国民党军第一战区司令长官。","贺李，指贺龙、李井泉，当时分别任晋绥军区司令员和政治委员。","彭，指彭德怀，当时任西北野战兵团司令员兼政治委员。习，指习仲勋，一九一三年生，陕西富平人，当时任西北野战兵团副政治委员。","贺炳炎（一九一三——一九六○），湖北松滋人。当时任晋绥军区第三纵队独立第五旅旅长。","陈，指陈赓，当时任晋冀鲁豫野战军第四纵队司令员。谢，指谢富治（一九○九——一九七二），湖北黄安（今红安）人，当时任晋冀鲁豫野战军第四纵队政治委员。","阎锡山，当时任国民党军太原绥靖公署主任。","傅作义，当时任国民党军张垣（张家口）绥靖公署主任。"],"page_start":245,"page_end":245,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"14d8418364"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
