" crossorigin="">{"props":{"pageProps":{"books":[{"id":"7c69c3ac-22a8-483f-b7ba-33fb0081f388","name":"毛远新在省工农兵干部学习班的几次讲话（摘编）（1976.12）","internal":false,"official":true,"type":"img","author":"毛远新，1976.12，反攻倒算材料","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/7c69c3ac-22a8-483f-b7ba-33fb0081f388/1.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/7c69c3ac-22a8-483f-b7ba-33fb0081f388/2.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/7c69c3ac-22a8-483f-b7ba-33fb0081f388/3.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/7c69c3ac-22a8-483f-b7ba-33fb0081f388/4.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/7c69c3ac-22a8-483f-b7ba-33fb0081f388/5.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/7c69c3ac-22a8-483f-b7ba-33fb0081f388/6.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/7c69c3ac-22a8-483f-b7ba-33fb0081f388/7.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/7c69c3ac-22a8-483f-b7ba-33fb0081f388/8.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/7c69c3ac-22a8-483f-b7ba-33fb0081f388/9.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/7c69c3ac-22a8-483f-b7ba-33fb0081f388/10.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/7c69c3ac-22a8-483f-b7ba-33fb0081f388/11.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/7c69c3ac-22a8-483f-b7ba-33fb0081f388/12.png"],"article":{"title":"毛远新在辽宁省工人干部学校第一期开学典礼上的讲话（节录）","alias":"","parts":[{"type":"paragraph","text":"关于军代表问题。一给军代表提意见，就说是否定“三支两军”，这话要做分析，否定“三支两军”的有，是少数，多数干部群众提意见是爱护。中央文件讲了，军队干部回部队的，不要揪回来了。有意见可以转来。如果现在结合的，工作中有错误，就一样揭发批判，一视同仁。结合地方党委作领导工作，我们是当作党委的一个成员对待，不管军队、地方，有错误就要批判。一提意见就是否定三支两军，这个看法不对。你们第一期学习班的同志，不是也批评了伯秋政委吗？你做为省委书记搞回潮，搞倒退，批的还是对的。这个思想你们能不能转过弯来！真正攻击“三支两军”的是少数，暴露出来也好嘛！"},{"type":"paragraph","text":"你们回去后，还是在市地委领导下开展运动。我们让你们回去做做一二把手的工作，让他们敢于放手发动群众。揭发批判我们的错误，改进我们的工作，希望他们把脑子里的那些顾虑，包袱甩掉，大胆领导运动。你们谈也不一定都见效。.但能帮助帮助也好。不是让你们回去另搞一套。把你们的市委书记吓一跳，人家说你们在下边搞什么阴谋诡计？！也不是叫你们回去唱对台戏，还是叫你们在党委统一领导下，是叫你做工作。"},{"type":"paragraph","text":"我们有这个希望，将来你们有什么问题，或遇到什么困难，可以向×××、黄吉忠、宗明兰三个同志反映，也可以反映给办公室，希望我们学习班的同志在运动中经受考验和锻炼。"},{"type":"paragraph","text":"各市的问题你们回去不要讲了，让他们自己去解决。18六、毛远新一九七四年六月二十日"},{"type":"paragraph","text":"在辽宁省工人干部学校第一期"},{"type":"paragraph","text":"开学典礼上的讲话（节录）"},{"type":"paragraph","text":"我们的经验也不多，办了几期工农干部学习班也摸索了一些经验，在这个基础上总结一下，我们在工农兵千部学习班提出三条："},{"type":"paragraph","text":"第一条是提高路线斗争觉悟，分清路线是非，搞清什么是党的基本路线，要深扎这个根子，大是大非面前不糊涂。我省工农学习班的第一条讲的是路线。什么是正确路线，什么是错误路线；什么是马克思主义，什么是修正主义。"},{"type":"paragraph","text":"第二条是培养有反潮流的精神，敢跟资本主义倾向斗，跟修正主义斗争，敢于坚持马克思主义，这不是容易的。主席讲：“反潮流是马列主义的一个原则。”所以我们讲第二条是培养反潮流的精神，坚持正确路线。坚持马克思主义路线，坚持党的基本路线，反对修正主义路线。敢造反，要头上长角，身上长刺，长角千什么，一个是进攻，一个是防御，资产阶级向我们进攻，我们要防御，我们还要向资产阶级进攻。头上长角、身上长刺是工农学习班提出来的，有人讲“刺”太难听了，李庆霖的信，主席认为很好，有人讲不好，说有刺，主席说，就是要有刺嘛！所谓刺，角，指什么讲，就是无产阶级的斗争哲学，革命性、战斗性，我们讲第二条就是要讲这个，一个是大是大非清不清，第二条是敢不敢反潮流，"},{"type":"paragraph","text":"第三条是党的政策。毛主席为我们制定了各方面的政策，要敢"},{"type":"paragraph","text":"19于斗争，还要讲党的政策。比如区别两类不同性质的矛盾，对敌我矛盾怎么办，对人民内部矛盾怎么办。不能一说斗争，就不分青红皂白的斗，这样不仅达不到目的，而且还会伤害同志，甚至帮了敌人的忙。主席说，“政策和策略是党的生命”，在社会主义阶段,最大的政策是学会严格区别、正确处理两类不同性质的矛盾。这是很重要的一条，到具体政策上，干部政策、知识分子政策、经济政策，大量的都是关于正确处理人民内部的矛盾。要解决矛盾，首先要分清是那一类矛盾，不同性质要用不同的解决办法。"},{"type":"paragraph","text":"总的来说，看这期有没有点提高，标准是这三条，说我学了很大厚本，读了多少文章，写了多少本，这不能检验好坏，要看能不能用到实践中去，能不能解决路线是非，能不能反对修正主义，要敢斗，要在斗争中掌握党的政策。"},{"type":"paragraph","text":"我没有和老魏商量，省工农学习班提出的三条也做为我们这期参考和基本要求。当前批林批孔是首位，要通过批林批孔提高理论水平，目的还是这三条。学习理论，总结五四以来的经验，甚至总结从孔老二以来的两条路线斗争经验，千什么？主席说，，从乌龟壳到共产党都要总结。主席说这话是指奴隶社会这段历史，·第二是孔老二到孙中山也要总结，是一个意思。"},{"type":"paragraph","text":"为什么要学习马列主义、毛泽东思想，要学习党的十次路线斗争经验，还要学习从孔老二以来的中国历史上的斗争，目的还是三条，提高路线斗争觉悟，坚决执行党的基本路线，敢于同修正主义、资产阶级和错误思潮斗争，善于用党的政策解决这些问题。"},{"type":"paragraph","text":"×××、×××同志，你们商量一下，三条供你们参考，你们毕业如何衡量，要看这个，到实践中能否解决这三个问题，解决得"},{"type":"paragraph","text":"20，好的就算比较有成绩，解决的差，成效就差。就提这点建议，具体"},{"type":"paragraph","text":"的不会给大家讲了，大家经验不少，一块摸索，"},{"type":"paragraph","text":"21"},{"type":"paragraph","text":"第三条是党的政策。毛主席为我们制定了各方面的政策，要敢"},{"type":"paragraph","text":"19于斗争，还要讲党的政策。比如区别两类不同性质的矛盾，对敌我矛盾怎么办，对人民内部矛盾怎么办。不能一说斗争，就不分青红皂白的斗，这样不仅达不到目的，而且还会伤害同志，甚至帮了敌人的忙。主席说，“政策和策略是党的生命”，在社会主义阶段,最大的政策是学会严格区别、正确处理两类不同性质的矛盾。这是很重要的一条，到具体政策上，干部政策、知识分子政策、经济政策，大量的都是关于正确处理人民内部的矛盾。要解决矛盾，首先要分清是那一类矛盾，不同性质要用不同的解决办法。"},{"type":"paragraph","text":"总的来说，看这期有没有点提高，标准是这三条，说我学了很大厚本，读了多少文章，写了多少本，这不能检验好坏，要看能不能用到实践中去，能不能解决路线是非，能不能反对修正主义，要敢斗，要在斗争中掌握党的政策。"},{"type":"paragraph","text":"我没有和老魏商量，省工农学习班提出的三条也做为我们这期参考和基本要求。当前批林批孔是首位，要通过批林批孔提高理论水平，目的还是这三条。学习理论，总结五四以来的经验，甚至总结从孔老二以来的两条路线斗争经验，千什么？主席说，，从乌龟壳到共产党都要总结。主席说这话是指奴隶社会这段历史，·第二是孔老二到孙中山也要总结，是一个意思。"},{"type":"paragraph","text":"为什么要学习马列主义、毛泽东思想，要学习党的十次路线斗争经验，还要学习从孔老二以来的中国历史上的斗争，目的还是三条，提高路线斗争觉悟，坚决执行党的基本路线，敢于同修正主义、资产阶级和错误思潮斗争，善于用党的政策解决这些问题。"},{"type":"paragraph","text":"×××、×××同志，你们商量一下，三条供你们参考，你们毕业如何衡量，要看这个，到实践中能否解决这三个问题，解决得"},{"type":"paragraph","text":"20，好的就算比较有成绩，解决的差，成效就差。就提这点建议，具体"},{"type":"paragraph","text":"的不会给大家讲了，大家经验不少，一块摸索，"},{"type":"paragraph","text":"21"}],"authors":["毛远新"],"dates":[{"year":1974,"month":6,"day":20}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":11,"page_end":12},"tags":[{"name":"毛泽东","type":"人物"},{"name":"毛远新","type":"人物"},{"name":"辽宁文革","type":"人物"},{"name":"批林批孔","type":"主题/事件"},{"name":"反潮流","type":"主题/事件"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"人民内部矛盾","type":"主题/事件"},{"name":"三支两军","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5961e48355"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
