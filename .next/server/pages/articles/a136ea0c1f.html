" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoistlegacy.de-2142","name":"‘旧文化部’大错案彻底平反","author":"文汇报","internal":false,"official":false,"type":"unknown","files":[],"article":{"title":"‘旧文化部’大错案彻底平反","dates":[{"year":1979,"month":3,"day":1}],"is_range_date":false,"authors":["文汇报"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"中共浙江省委党校党史教研室, “文化大革命”时期资料选辑(重要事件的平反和拨乱反正), 32","tags":[{"name":"平反","type":"主题/事件"},{"name":"文化部","type":"主题/事件"},{"name":"冤假错案","type":"主题/事件"}],"parts":[{"type":"title","text":"“旧文化部”大错案彻底平反"},{"type":"paragraph","text":"文化部党组的决定指出：“帝王将相部”等等大帽子均属莫须有，“文化黑线”“黑线代表人物”根本不存在"},{"type":"paragraph","text":"新华社北京二月二十八月[sic!]电 最近，文化部党组召开扩大会，讨论贯彻中央工作会议和三中全会精神，把文化部工作的着重点转移到抓社会主义文化建设、繁荣文化艺术生产上面来，使人民群众能够看到更多更好的各种形式的文艺作品，使文化艺术工作更好地为实现新时期总任务、促进我国社会主义现代化建设服务。会议充分发扬民主，对当前工作和一些历史问题展开了热烈的讨论。与会同志一致指出，林彪、“四人帮”和那个所谓“理论权威”,为了篡党夺权的罪恶目的，互相勾结，利用和歪曲毛泽东同志对当时文化部工作中某些缺点的批评，给文化部扣上“为资产阶级服务的旧文化部”、“帝王将相部、才子佳人部、外国死人部”等等大帽子达十多年，把文化部彻底“砸烂”，打进十八层地狱，使各级文化部门的领导干部和群众、广大的文化艺术工作者和业余文化艺术工作者受到残酷的迫害。文化部党组作出决定并经中央宣传部批准：公开为文化部这个大错案彻底平反。解放后十七年文化部的工作，在党中央和国务院的直接领导下，在周恩来同志的亲切关怀下，是积极贯彻执行了以毛泽东同志为首的党中央的革命文艺路线的，文化艺术各个领域的工作成绩是主要的，广大文化艺术工作者和文化艺术干部是好的或比较好的，根本不存在一条什么“文艺黑线”，根本不存在所谓以周扬、夏衍、田汉、阳翰笙同志为代表的所谓“黑线代表人物”问题。文化部党组宣布：凡是受到所谓“旧文化部”、“帝王将相部、才子佳人部、外国死人部”、“文艺黑线”这些大错案的牵连，受到打击、诬陷的同志一律彻底平反，一切诬蔑不实之词统统推到[sic!]。文化部希望广大文化艺术工作者、文化艺术干部和业余文化艺术工作者，更加紧密地团结在以华国锋同志为首的党中央周围，树雄心，立大志，团结战斗，奋勇争先，努力贯彻百花齐放、百家争鸣的方针，为繁荣文化艺术，创造更多更好的精神产品，为社会主义现代化建设作出更大贡献。"},{"type":"paragraph","text":"（原载1979年3月1日《文汇报》）"}],"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a136ea0c1f"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
