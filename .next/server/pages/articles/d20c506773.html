" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji47","name":"毛泽东全集第47卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji47.pdf"],"article":{"title":"对中央军委关于取消军衔制度的请示报告的批语","alias":"","parts":[{"type":"paragraph","text":"对中央军委关于取消军衔制度的"},{"type":"paragraph","text":"请示报告的批语"},{"type":"paragraph","text":"（1965年1月）同意。"},{"type":"paragraph","text":"[1]中共中央军委1965年1月12日关于取消军衔制度给毛泽东并党中央的请示报告说，经军委办公厅会议第七次扩大会议和军委第223次办公会议研究，并征求了各军区、军兵种、院校党委的意见，一致同意取消军衔制度。军衔制度是一种资产阶级法权，与我人民军队的本质不相适应。九年来，实践证明，这一制度不符合我军的传统作风，等级表面化，助长了干部的等级观念和名利思想，不利于我军的革命化建设，不利于同志之间、上下级之间和军民之间的团结。同时，也增加了各级党委和政治机关不少繁琐事务。鉴于存在这些不利因素，建议取消军衔制度，采取“名存实亡”的办法，大将以下各级军衔一律取消，元帅军衔予以保留。军衔制度是根据兵役法和军官服役条例制定的。取消军衔制度，必须修改兵役法和军官服役条例。在中央批准取消军衔制度后，再按法律手续报人大常委会通过。取消军衔制度，在军队人员思想上不会引起太大的波动，但也必须和对待薪金改革一样，在部队进行充分的思想教育工作。"}],"authors":["毛泽东"],"dates":[{"year":1965,"month":1}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":473,"page_end":473},"tags":[{"name":"毛泽东","type":"人物"},{"name":"限制资产阶级法权","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d20c506773"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
