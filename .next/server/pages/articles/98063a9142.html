script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"哥伦比亚共产党（马列主义者）机关报赞扬中国成就  中国革命为世界革命提供了宝贵经验  人们应该愤怒地摒斥修正主义者对中国的诽谤","authors":[],"dates":[{"year":1966,"month":1,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"哥伦比亚共产党（马列主义者）机关报赞扬中国成就"},{"type":"paragraph","text":"中国革命为世界革命提供了宝贵经验"},{"type":"paragraph","text":"人们应该愤怒地摒斥修正主义者对中国的诽谤"},{"type":"paragraph","text":"据新华社三日讯　波哥大消息：哥伦比亚共产党（马克思列宁主义者）机关报《革命报》不久前发表文章，热烈赞扬中国人民在通过武装斗争夺取政权、坚持无产阶级专政、不断革命等方面为世界革命提供了一系列宝贵经验，并使中国成为一个伟大的社会主义国家。"},{"type":"paragraph","text":"文章指出，“所有真正的革命者都必须学习珍贵的中国经验”，而“集中这些经验的是党的缔造者——毛泽东同志”。"},{"type":"paragraph","text":"文章说，人们应该愤怒地摒斥修正主义者对“站在声援世界各国人民解放斗争最前列的中国人民、中国政府和中国共产党的诽谤”。"},{"type":"paragraph","text":"这篇庆贺中华人民共和国成立十六周年的文章，在一开始的时候回顾了中国人民在取得政权前所经历的“艰巨的、长期的、浴血的斗争”。文章指出，“中国共产党从它一出现就站在中国人民的前列进行斗争，从而保证中国人民走上了胜利的道路。”"},{"type":"paragraph","text":"文章着重谈到了毛泽东同志关于建立党对人民军队的绝对领导和在人民军队中实行军事、政治、经济三大民主的建军思想，以及根据他对中国社会的深入观察和调查而提出的建立革命根据地、农村包围城市进行长期斗争的革命理论。文章指出，“这些都是中国革命最伟大的成就，依靠这些成就，才得以在这个大国取得胜利。”文章得出结论说，“哥伦比亚共产党很需要这种经验教训，在它的帮助下，我们可以估计和了解哥伦比亚革命在三十五年中是如何失败的；如何和为什么必须不断进行反对右的和"},{"type":"paragraph","text":"‘左’的倾向，特别是右的倾向的斗争。”"},{"type":"paragraph","text":"文章又指出，中国人民和党在找到正确的路线后，通过英勇牺牲，接着又取得了抗日战争和人民解放战争的伟大胜利，“写下了伟大的篇章”。"},{"type":"paragraph","text":"文章在赞扬新中国在工农业和科学技术方面取得的伟大成就时指出，“社会主义不会自发产生，必须正确地运用马克思列宁主义理论来建设社会主义。要建设社会主义必须建立无产阶级专政”。"},{"type":"paragraph","text":"文章说，“我们马克思列宁主义者、真正的共产党人应该谦虚地接受中国人民的教益，通过我们对各国人民解放斗争的坚决支持帮助他们实现伟大的任务。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"98063a9142"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
