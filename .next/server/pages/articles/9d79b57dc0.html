script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"上港五区认真落实毛主席最新指示猛烈冲击不合理体制 掀起斗、批、改高潮","authors":[],"dates":[{"year":1968,"month":9,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　上港五区革命委员会紧跟毛主席的伟大战略部署，掀起斗、批、改高潮，猛烈地冲击从帝、修那里移植过来的旧体制，建立新型的码头体制，从组织上粉碎了中国赫鲁晓夫复辟资本主义的罪恶阴谋，巩固和发展了新生的革命委员会，促进了生产力的发展，老工人说:“我们几十年的愿望终于在文化大革命中实现了”，“毛主席为我们撑腰，我们一定要为毛主席争气。”"},{"type":"paragraph","text":"上港五区旧的体制，基本上是从帝、修国家移植过来的，它根本不适应社会主义的经济基础。过去，由于上港五区的走资派推行中国赫鲁晓夫修正主义政权建设路线，设立了庞大的官僚机构，他们招降纳叛，结党营私，把叛徒、特务、地主分子及阶级异己分子都安插到各个要害部门，并大量配备科室人员，名额竟达三百人之多，造成后勤人员超过第一线装卸人员的不合理局面。他们还把全区划分为十四个重叠的行政部门，各自为政，互相扯皮。工人说:“调度有权没有兵，队长有兵没有权”。严重地阻碍了生产的发展。在企业管理上依靠“专家”，把工人阶级排斥在企业管理之外。并设立专门的科室管、卡工人，大搞业务第一、生产第一，反对突出无产阶级政治，削弱党的领导。"},{"type":"paragraph","text":"在革命的大批判中，工人同志尖锐地批评旧体制是帝、修、反的余毒，它阻碍了生产的发展，应当彻底改革。革委会的成员学习了毛主席的最新指示和灵宝县的经验后，一致认为精兵简政不是仅仅缩小机构，精简几个人的问题，而是关系到能不能在组织上巩固无产阶级文化大革命的伟大成果问题，是关系到我们红色政权能不能巩固的大问题，一致表示坚决走精兵简政的道路，改革不合理的规章制度、下放科室人员，认真落实毛主席的最新指示。"},{"type":"paragraph","text":"上港五区无产阶级革命派根据海港的特点，体制改革从“备战、备荒、为人民”的基点出发，学习解放军既是战斗队，又是生产队，既是宣传队，又是工作队的光荣传统，根据毛主席“国家机关的改革，最根本的一条，就是联系群众”的教导，大胆设想、大胆改革，在革委会下设三个组(政治工作组，生产组，后勤组)，把兵力集中在生产组和后勤组下面，编成连、排、班，一切服从无产阶级政治，打破了重叠的行政机构，改变了过去机构重叠、人浮于事、各自为政的现象，实现了一元化领导，生产上又形成一条龙。这样，革命职工拿起工具可以为社会主义建设贡献力量，拿起武器可以同帝、修、反打仗。踢开旧机构，使红色政权牢牢扎根在群众之中。"},{"type":"paragraph","text":"上港五区实行精兵简政，办事人员精简了约百分之七十。在精兵简政过程中狠抓革命，猛促生产，八月份超额完成了生产任务。"},{"type":"paragraph","text":"(上港五区革委会政宣组)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"革命委员会","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9d79b57dc0"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
