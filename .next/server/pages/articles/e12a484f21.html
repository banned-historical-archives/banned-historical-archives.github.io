script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"社会主义国家电影工作会议发表公报  电影要反映现代题材创造英雄形象  反对资产阶级思想是当前创作实践中的主要任务","authors":[],"dates":[{"year":1960,"month":11,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"社会主义国家电影工作会议发表公报"},{"type":"paragraph","text":"电影要反映现代题材创造英雄形象"},{"type":"paragraph","text":"反对资产阶级思想是当前创作实践中的主要任务"},{"type":"paragraph","text":"新华社索非亚24日电　11月15日在这里开始的第三届社会主义国家电影工作会议经过六天的讨论已经闭幕。"},{"type":"paragraph","text":"在会议中，出席会议的中国、苏联等十二个社会主义国家的代表们讨论了关于社会主义电影现代题材的创作和提高作品思想性问题。中国代表张水华、林杉和陈荒煤在会上就电影艺术必须迅速而及时地反映社会主义建设、创造新的英雄人物形象和正确反映革命战争等问题先后作了发言。"},{"type":"paragraph","text":"大会最后通过了公报。公报指出，当前，在各社会主义国家建设日益蓬勃发展，世界人民反对帝国主义、争取世界和平运动，以及殖民地民族解放运动空前高涨的时刻，社会主义电影应该更深刻全面地反映现代题材，创造社会主义建设者的新的英雄形象。公报中说，在创作实践中，当前的主要任务，仍然是反对各种各样资产阶级思想。"},{"type":"paragraph","text":"会议期间，与会者观摩了各社会主义国家的一些影片，其中有中国影片“万紫千红总是春”。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e12a484f21"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
