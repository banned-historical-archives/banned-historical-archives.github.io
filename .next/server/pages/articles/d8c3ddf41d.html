<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共中央关于学习斯大林著作《苏联社会主义经济问题》的指示","authors":[],"dates":[{"year":1952,"month":11,"day":7}],"is_range_date":false,"parts":[{"text":"中共中央关于学习斯大林著作《苏联社会主义经济问题》的指示","type":"title"},{"text":"斯大林同志的伟大著作《苏联社会主义经济问题》已由人民出版社出版。这一著作对于马克思主义是一重要发展，对于我国即将开始的大规模经济建设有巨大指导意义。全党高级干部即应组织学习。兹规定学习办法如下：","type":"paragraph"},{"text":"（一）参加学习的人原则上首先以高级干部为限。这是因为多数中下级干部一则不易读懂，二则目前正在忙于整党学习、文化学习或其他学习，三则若非高级干部先学过一遍，即令中下级干部学起来亦易因缺乏领导而事倍功半。所谓高级干部，在党政部门指中央的司局长一级以上，地方的省市委委员和厅局长一级以上，军队的师长一级以上。但在党委机关、经济工作机关和理论工作机关，则参加的人可以多些，亦必须有真能读懂的条件。其余不能读懂而工作上需要懂得其大意者，可不必参加学习，而由高级干部向他们作一两次讲解报告，凡能读懂也有时间学习的中下级干部和党外人员，可依其自愿学习，由高级干部予以适当指导。","type":"paragraph"},{"text":"（二）高级干部的学习应当有组织有领导地进行。各单位负责同志应当亲自负责动员、布置和领导这次学习，规定学习计划，指示学习要点，检查学习状况，解答学习疑难，领导有准备的和联系实际的讨论。学习时间暂定为至少两个月（学习联共十九次代表大会文件的时间在外），其具体时间由各地自定。学习开始时及结束时均应各向中央作一次报告。","type":"paragraph"},{"text":"（三）现在已有经验证明，高级干部的学习只要领导得好，能够正确地联系实际，对工作的提高有极大帮助；而只要负责同志下了决定，则学习的时间是可以挤得出的，也是可以坚持到底的。东北工业部在过去两三年内虽然工作十分繁忙，仍能每周抽出一个下午一个晚上阅读，一个上午讨论，三反运动中也没有间断过一次，并且做到无人缺席。现在中央财委党组亦已决定财委及所属各部高级干部编为小组每周学习八小时，其中包括集体连续学习两个三小时（星期三及星期六下午三点至六点），规定学习时间禁止请事假及迟到早退，停止办公，而以学习斯大林论文和马林科夫报告为起点。这种办法在我国目前条件下是有必要的，希望各地亦能本此精神，由学习斯大林论文和马林科夫报告开始，取得经验，把高级干部的学习经常化起来。","type":"paragraph"},{"text":"（四）鉴于斯大林语言学著作过去在党内未曾认真学习，而“斯大林同志关于经济问题和语言学问题的著作，标志着马克思主义发展的一个新阶段”（马林科夫），兹决定各理论和文化工作机关在学完经济问题著作后，应当接着学习斯大林语言学著作。党的其他高级领导机关原则上亦应加以学习，但其办法可依情况自行决定。","type":"paragraph"}],"comments":[],"origin":"根据文件的原件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d8c3ddf41d"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
