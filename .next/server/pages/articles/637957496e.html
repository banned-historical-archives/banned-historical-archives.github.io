<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"“建议党中央派人来帮助整风”","authors":["山东大学","许思园"],"dates":[{"year":1957,"month":5,"day":21}],"is_range_date":false,"parts":[{"text":"“建议党中央派人来帮助整风”","type":"title"},{"text":"山东大学许思园","type":"authors"},{"text":"(许思园：山东大学历史系教授)","type":"subtitle"},{"text":"我要写稿，公诸新闻界。肃反中我是被斗的，人家都有结论，而我没有。我曾问过党总支书记，写信给党委，要求知道七年来我有那些地方对不住党和人民？又问高云昌同志，高说“很难回答”。我又问市委，市委说我不是当反革命斗的，故不给结论。据说，我没有历史问题，政治问题，因而档案上没有了。究竟有没有，我不知道。","type":"paragraph"},{"text":"为什么斗我呢？说我思想反动。评级时，还说我反动。肃反时，承蒙大胆怀疑，收集材料，有40多条。徐经泽同志叫我抄下来，最近高云昌同志也看过，说没有反动。既非反革命，也非历史问题，又不是反动思想，我也没作风问题，为什么斗我？除逼着我骂自己外，我没有说过一句谎话。骂够了，也就算了。","type":"paragraph"},{"text":"当时说我是束星北反革命集团的成员，其实我连他们有的名字也写不出来，也从不往来。和束星北是过去认识的，和周北屏是邻居。崔戎还说我帮助胡风说话。逼我多次写材料，要我检举束星北。蒋捷夫否认束星北曾在国民党军令部担任过技术顾问，他说军令部的“令”需要换一个字。我和束星北往来很少。党委说束星北在一次普选中选举了美国电影明星问题闹了一年多，而后来两三小时便查清楚了束星北选的是王承瑞。为什么过去的党委搞了这些时没查出来？这说明要有意害束星北。束星北的老婆孩子也被斗了。","type":"paragraph"},{"text":"我在山大勤勤恳恳，没有政治历史问题和反动言论，而把我当反革命斗了多少时候！这次整风使我看到了光明前途，这是国家盛衰兴亡的关键！党要依靠六亿人民，这是对的。","type":"paragraph"},{"text":"肃反中以蒋捷夫为首的工作组当众宣布，倘使我还是老样子，要把我送到五号炮台去枪毙，我等待着去枪毙。","type":"paragraph"},{"text":"我并不要打击报复，诸位党委对我打击报复，我决不打击，希望不要抗拒党中央和毛主席，这次整风一定澈底，必须实事求是，不要把马列主义当幌子。过去不顾事实，不讲道理，完全是造谣。马列主义是事实求是，造谣、污蔑是反马列主义的。以自己利益、小集团利益来打击群众，还有比这更严重的剥削思想吗？这些材料要公开。","type":"paragraph"},{"text":"对教授研究什么也不知道，如何评级！这是不可设想的官僚主义。总之，为宗派利益、个人利益打算，做了许多坏事，造谣打击，欺骗上级。","type":"paragraph"},{"text":"山大党委在肃反中，蔑视宪法，对吴大琨、对我都是这样，侵犯人权。肃反半年后，房金堂和我说，可以和束星北相见，但不能多谈，违反宪法；对赵俪生、束星北，张维华打击报复、违反党纪。三反中说陈慎昭教授贪污，她自杀了；丁山先生也因造谣刺激病重而死了，好些先生病了。有的得了心脏病，这是肃反有功！","type":"paragraph"},{"text":"肃反总结向上居功，而很多人痛心，据说“成绩是基本的”。工人阶级品质丧失尽尽。赵俪生先生将这比之拉科西，我觉得不是拉科西，而是历史上的魏忠贤，是东厂。凡是被打击的，都是比较正派的，个别的例外。我许某不说谎话。党委将来可要求大家宽恕，但必须有真正的思想转变。我不怕，也不怕送五号炮台去枪毙。","type":"paragraph"},{"text":"我建议：一、请党中央派人来；二、群众成立组织，帮助整风。(原载新山大264期)","type":"appellation"}],"comments":[],"origin":"《山东大学右派言论汇编》第一集（山大政治理论课教研组编，一九五七年九月）。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"637957496e"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
