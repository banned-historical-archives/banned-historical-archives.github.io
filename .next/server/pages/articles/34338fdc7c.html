script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"何炳棣说中国历史上没有奴隶社会时期","authors":[],"dates":[{"year":1986,"month":11,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据香港《新晚报》报道，国际知名历史学家何炳棣最近在香港中文大学学术研讨会上提出，中国历史上并不存在“奴隶社会”时期。何炳棣认为，封建社会、奴隶社会，是特殊的社会形态，不能代表人类社会发展的一个阶段，封建社会只是曾经存在于中古时期的西欧、西周至春秋末的中国以及幕府时期的日本。至于“奴隶社会”，他认为，中国历史上，只有奴隶，而不存在奴隶社会。何炳棣这一创新的见解，最早是今年九月在北京提出的。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"34338fdc7c"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
