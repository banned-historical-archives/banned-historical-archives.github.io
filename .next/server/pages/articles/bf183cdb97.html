script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"广大人民反对资产阶级统治的斗争继续高涨意大利西西里区爆发强大罢工怒潮三万小农从全国各地汇集罗马举行示威","authors":[],"dates":[{"year":1968,"month":7,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京六日电　罗马消息:意大利人民反对垄断资产阶级的压迫和剥削的斗争浪潮此伏彼起，继续高涨。意大利南部的西西里区爆发了强大的罢工怒潮，许多城镇因此陷于瘫痪状态。三万小农五日从全国各地汇集到首都罗马举行示威，抗议政府的农业政策。"},{"type":"paragraph","text":"西西里区首府巴勒莫的工人四日举行总罢工，要求充分就业和增加工资。巴勒莫市的工厂、工地、商店、机关和电影院统统关了门，港口停止卸货，市内交通停顿，三家报纸都无法出版。这个西西里岛的首府完全陷于瘫痪状态。"},{"type":"paragraph","text":"一万二千多名各行业的工人四日在巴勒莫市中心举行了示威游行。大批失业工人、郊区的农民和地震的灾民参加了示威的行列。他们手中的标语牌上写着:“不要饥饿工资”，以及谴责政府的口号。"},{"type":"paragraph","text":"今年来，随着资本主义世界政治经济总危机的加深，垄断资本争夺国内外市场的竞争日益激烈，意大利的西西里等比较落后的地区的经济状况严重恶化。最近，意大利政府和资本家利用种种借口，在这个地区大量解雇工人，关闭工厂。仅在巴勒莫市，就强行关闭了几十家企业。巴勒莫造船厂原有七千工人，解雇了三千五百人；建筑工业工人人数也从一万五千人降为五千人。现在暂时还有活干的二万工人，其中也有百分之六十受到失业的严重威胁。今年年初在西西里区爆发的剧烈的地震，加重了劳动人民的痛苦。"},{"type":"paragraph","text":"西西里区的劳动人民，最近不断地起来斗争。巴勒莫造船厂的工人为了抗议“饥饿工资”和解雇工人的罢工斗争已坚持了将近两个月。巴勒莫市的运输、清洁和自来水工人以及政府职员也举行了罢工。圣卢卡市的失业工人二日冲进了当地的失业登记处，并同前来镇压的警察进行搏斗。圣卢卡的警察头子也被愤怒的失业工人打伤。特拉巴尼省和阿格里琴托省的十多个城镇一日爆发了声势浩大的罢工，十万工人和居民举行了示威游行，使这些城镇陷于瘫痪状态。"},{"type":"paragraph","text":"与此同时，意大利农民掀起了新的斗争的浪潮。五日清晨，三万小农从意大利各地赶到罗马，在市中心举行示威游行，反对政府推行损害小农利益的农业政策。他们1举着的标语牌上写着谴责垄断资本损害小农利益的口号。这次示威游行使罗马市区的交通断绝了好几个小时。"},{"type":"paragraph","text":"在意大利南部的科森萨，一千名小农三日举行了示威游行，抗议政府把农产品的价格压得太低。不久前，意大利北部的勒佐尼尔艾米利亚的小农，也为此举行了示威。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bf183cdb97"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
