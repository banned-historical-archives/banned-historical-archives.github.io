<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji8","name":"毛泽东全集第8卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji8.pdf"],"article":{"title":"为两广出师北上抗日宣言","alias":"","parts":[{"type":"paragraph","text":"为两广出师北上抗日宣言"},{"type":"paragraph","text":"（1936年6月12日）"},{"type":"paragraph","text":"最近日本帝国主义大批增兵冀察以直接占领华北，组织全国性的走私，以破坏中国关税制度与国民经济，发动福建自治运动以侵略华南。无一不证明日本帝国主义灭亡全中国的预定计划，正在以空前的速度前进。蒋介石的南京政府不但丝毫没有抵抗的表示，而且处处替日本帝国主义为虎作华，镇压全中国人民的一切抗日救亡运动，拦阻中国人民红军抗日先锋军东征抗日，签订《中日防共协定》，引狼入室，排除异己企图创立个人独裁，使日本帝国主义得寸进尺为所欲为。一切有良心的，有热血的爱国军人爱国同胞，际此日本强盗无耻汉奸横行华夏之时，无不义愤填胸，誓为中华民族的生存而奋斗到底！"},{"type":"paragraph","text":"两广此次高举抗日义旗，出师北上，并要求南京政府立刻出兵一致抗日，义声所播，全国人民无不振奋。我们谨代表全苏区抗日人民与抗日红军对两广爱国军人爱国同胞表示敬意与拥护，并首先愿意同两广当局缔结抗日联盟共同奋斗。我们更号召全中国爱国军人自告奋勇，出兵响应，全中国爱国同胞再接再厉，扩大抗日救亡运动，以配合两广的起义，务使此次抗日的军事发动扩大为全国人民武装抗日的神圣的民族革命战争。同时我们要求南京政府立刻翻然改悟，答应两广要求，动员全中国的海陆空军北上抗日。中国人民红军更愿首先全部集中河北，担任抗日先锋军的任务，开始同日本帝国主义直接作战。"},{"type":"paragraph","text":"然而自两广发难以来，蒋介石南京政府不但丝毫没有接受两广请求的任何诚意表示，而且一再迁移时日，公开诬蔑两广当局为鼓动内战破坏团结，而暗中却调集大军企图拦阻两广军队北上抗日，挑拨离间，发动内战以捣乱抗日战线。对于蒋介石的这种罪恶行为，全国人民决不宽恕！一切不愿做亡国奴的中国人民应该要求蒋介石立即实现全国人民“停止内战一致抗日”的号召，同时要求与赞助蒋介石军队中很多有良心有热血的爱国将校，立即脱离蒋介石的降日政策自动率领部队与两广及红军联合北上抗日！"},{"type":"paragraph","text":"事急矣！全中国的爱国军人爱国同胞大家立即紧密的联合起来，集中力量向着日本帝国主义一致进攻！中国人民现在比无论什么时候更追切的要求着坚固的抗日的联合战线。蒋介石所要召集的一切降日卖国的国民党二中全会，或御用的国民大会我们都要坚决反对。我们主张立刻召集全国抗日救国代表大会，号召全国一切抗日反卖国贼的政治的，社会的，职业的团体与武装队伍选举自己的代表参加大会，并立刻实现下列的纲领："},{"type":"paragraph","text":"（一）宣布对日绝交宣战，讨伐“满洲国”，收回华北与东北失地。"},{"type":"paragraph","text":"（二）取消一切中日间的不平等条约与卖国借款。（三）惩办丧权失地祸国殃民的汉奸卖国贼。（四）动员全中国海陆空军直接对日作战。"},{"type":"paragraph","text":"（五）没收日本帝国主义与汉奸卖国贼的一切财产作为抗日经费。"},{"type":"paragraph","text":"（六）保证抗日救国的言论，出版，集会，结社的完全自由，释放一切政治犯。"},{"type":"paragraph","text":"（七）成立国防政府与抗日联军。"},{"type":"paragraph","text":"（八）联合全世界以平等待我的国家与民族，联合日本国内的一切被压迫民族与被压迫民众。"},{"type":"paragraph","text":"这是全中国人民所要求的抗日救国的纲领，也应该是两广出师抗日的纲领。我们竭诚希望两广的爱国领袖们能够到处大胆的发动与拥护抗日人民的爱国运动，大量的武装与组织抗日人民，联合全国人民，为这一纲领的彻底实现而奋斗。我们相信只有当抗日的武装与抗日的人民打成一片，只有抗日的武装变成抗日人民的武装时，两广所发动的解放中华民族的伟大事业才能得到最后的胜利。"},{"type":"paragraph","text":"拥护两广出师北上抗日！全中国爱国军人联合两广一起打日本！反对蒋介石拦阻两广义师北上抗日！停止内战一致抗日！反对蒋介石发动内战捣乱抗日！召集全国抗日救国代表大会！反对蒋介石御用的国民党二中全会与国民大会！反对日本帝国主义的走私，没收一切私货！打倒日本帝国主义！全中国人民抗日的联合战线万岁！"},{"type":"paragraph","text":"中华苏维埃人民共和国中央政府主席毛泽东中国人民红军革命军事委员会主席朱德"},{"type":"paragraph","text":"一九三六年六月十二日"}],"authors":["毛泽东"],"dates":[{"year":1936,"month":6,"day":12}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":460,"page_end":462},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e9829e22eb"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
