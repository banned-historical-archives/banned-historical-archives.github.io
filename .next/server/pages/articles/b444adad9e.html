script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"做一个毛主席的好党员","authors":["刘汉义"],"dates":[{"year":1970,"month":7,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"做一个毛主席的好党员"},{"type":"paragraph","text":"延安印刷厂党支部委员　刘汉义"},{"type":"paragraph","text":"参加革命以前，我是绥德山沟里的放羊娃，是伟大领袖毛主席把我从苦海中救出来。一九四五年，我参加了革命，当时十七岁。开始在延安《解放日报》当印刷工人，宣传战无不胜的毛泽东思想。两年以后，胡宗南匪帮大举进犯延安，党调我们一批工人到党中央的电台当摇机员，使我有机会跟随伟大领袖毛主席转战陕北战场，直接接受毛主席光辉思想的教育，这是我一生中最大的光荣和最大的幸福。在转战陕北的那些艰苦的日子里，我们电台工作人员身背机器，肩扛马达，翻山越岭，白天吃不上饭，喝不上水；夜晚没有房住，没有被盖。但是我们一看到毛主席他老人家同我们在一起，我们就忘记了饿，忘记了累，忘记了个人的一切，浑身充满了力量。为了及时传达毛主席对全国各战场的指示，我们电台在行军中哪怕停留十分钟，也要架起天线，摇动马达，做好一切发报准备。在毛主席亲自指挥的著名的沙家店战斗中，电台设在离沙家店十华里的地方，敌人的飞机在我们上空盘旋，炮弹从我们头顶上飞过。我们想到自己是在向前线指战员传达毛主席的声音，大家连眼皮都不眨，一口气从拂晓工作到深夜。"},{"type":"paragraph","text":"一九四八年春天，毛主席指挥西北战场全歼敌军主力以后离开了陕北。我和一部分同志回原工厂工作。同毛主席他老人家分手时，我们一个个都难舍难分地哭了。我暗暗下定决心，永远听毛主席的话，永远保持革命传统，为革命做出更大贡献。但是，全国胜利以后，在刘少奇反革命修正主义路线毒害下，我产生了“该歇歇气”的思想。是无产阶级文化大革命的警钟敲醒了我。我反复学习毛主席关于无产阶级专政下继续革命的伟大学说，用毛主席的指示对照自己，我发现身子到了社会主义，思想还在民主革命阶段，还在吃老本，这与一个共产党员距离多远呵！我回想起跟随毛主席在陕北转战的那些日子，我越想越难过。我重新回到车间，与工人们一起劳动，一起学习光辉的“老三篇”，一起批判刘少奇的黑“六论”，向自己头脑中的“私”字开火。我开始认识到自己在工厂工作，就是继续跟着毛主席为打倒帝、修、反进行更加伟大的战斗。革命的路还长得很呢！我怎么能“歇歇气”呢？在党的四十九周年生日前夕，我要向毛主席他老人家宣誓：我一定要坚持不断地用无产阶级专政下继续革命的思想武装头脑，彻底改造世界观。无论发生什么情况，我都要跟着毛主席干一辈子革命，争取做一个毛主席的好党员！"},{"type":"paragraph","text":"新华社稿（本报有删节）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b444adad9e"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
