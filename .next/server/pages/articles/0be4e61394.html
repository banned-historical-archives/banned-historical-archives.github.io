script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"卷烟业公会快改旧作风!以前那种剥削把持的做法，不应再存在了!","authors":["谢士光"],"dates":[{"year":1949,"month":7,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编辑先生:"},{"type":"paragraph","text":"我是公教人员，有着家室之累，因为生活上没有办法，在宝由路开着一丬小烟纸店。虽然有着半年以上的历史，但是各厂派货的权利，始终没有取得，原因是你非公会会员。"},{"type":"paragraph","text":"过去敌伪时代，卷烟业公会，给一般少数奸商所把持你要加入他不给你加入，我曾为了登记去哀求过好多次。此次上海解放，特殊势力，不应存在，所以我又到公会交涉，总算勉强答应，买了一份表格送进去，给我一张临时收据。上面写着“本证对备查，对外不作别用”。两行大字，反面还印着几项小字:一、经调查认为合格后，当另函通知，凭本临时收据，来会填具入会志愿书。二、新会员入会，须自领得会员证日起，三个月后，方得享受本会所办各厂派权利。”费了九牛二虎之力，他所给你的，还是派不到用场的一张临时收据。派员调查，不知道他何年何月来调查。领得会员证，还要三个月之后，方得享受各厂派货权利，你看他何等势利!何等独裁!"},{"type":"paragraph","text":"现在是天亮了，敌伪时代，剥削把持的作风，不应该再让他们存在，希望人民政府出来纠正。舆论界出来主持公理，使我们一般没有领到派货的零卖商都有饭吃，那就感恩不浅了。专此敬祝撰安　大南商店谢士光谨启六月廿九日"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0be4e61394"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
