script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"wenji1","type":"pdf","name":"毛泽东文集第一卷（1999）","internal":false,"official":true,"author":"中央文献研究室","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/wenji1.pdf"],"article":{"title":"给傅作义的信","description":"","dates":[{"year":1936,"month":10,"day":25}],"parts":[{"text":"给傅作义的信","type":"title"},{"type":"appellation","text":"宜生先生主席勋鉴："},{"type":"paragraph","text":"日寇西侵，国难日亟。先生统率师旅捍卫边疆，今夏小试锋芒，已使敌人退避三舍。观乎报载以死继之之言，跃然民族英雄之抱负，四万万人闻之，神为之王，气为之壮，诚属可贺可敬。红军远涉万里，急驱而前，所求者救中国，所事者抗日寇。今春渡河东进，原以冀察为目的地，以日寇为正面敌，不幸不见谅于阎蒋两先生，是以引军西还，从事各方抗日统一战线之促进。目前情势，日寇侵绥如箭在弦上，华北长江同时告急。但国内统一战线粗有成就，南京当局亦有转向抗日趋势，红军主力之三个方面军已集中于陕甘宁地区，一俟取得各方谅解，划定抗日防线，即行配合友军出动抗战。红军虽志切抗战，但在未得友军谅解，尤其在未得抗战地区之友军及地方行政长官之谅解以前，决不冒然向抗战阵地开进。在已得正式谅解而向抗战阵地开进与实行抗战时，自当以其全力为友军之助，而绝不丝毫妨碍共同抗战之友军及其后方之安全与秩序。兹派彭雨峰同志来绥，与先生接洽一切，乞以先生之意见见教，并希建立直接通讯关系。百川先生处，今春曾数数致书，夏时又托郭团长将意，久未得复，祈先生再行转致鄙意。如有可能介绍彭同志赴晋一晤，实为公便。叨在比邻，愿同仇之共赋。倘承不吝赐教，幸甚幸甚。专此。即颂戎绥"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十月二十五日"},{"type":"paragraph","text":"根据人民出版社一九八三年出版的"},{"type":"paragraph","text":"《毛泽东书信选集》刊印。"}],"comment_pivots":[{"part_idx":0,"offset":4,"index":1},{"part_idx":2,"offset":119,"index":2},{"part_idx":2,"offset":139,"index":3},{"part_idx":2,"offset":174,"index":4},{"part_idx":2,"offset":379,"index":5},{"part_idx":2,"offset":434,"index":6}],"is_range_date":false,"authors":["毛泽东"],"comments":["傅作义，字宜生。参见本卷第423页注〔1〕。","察，指察哈尔省，见本卷第382页注〔3〕。","阎，指阎锡山，字百川。见本卷第371页注〔14〕。","绥，指绥远省，见本卷第371页注〔16〕。","彭雨峰，即彭雪枫，见本卷第454页注〔2〕。","郭团长，指郭登瀛，见本卷第389页注〔3〕。"],"page_start":468,"page_end":469,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d157e0acaa"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
