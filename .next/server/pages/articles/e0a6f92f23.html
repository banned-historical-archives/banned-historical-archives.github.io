<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"陕西专区、县级机关已全面展开“打虎”运动　有的专区领导上仍存在严重的右倾思想","authors":[],"dates":[{"year":1952,"month":2,"day":18}],"is_range_date":false,"parts":[{"text":"陕西专区、县级机关已全面展开“打虎”运动　有的专区领导上仍存在严重的右倾思想","type":"title"},{"text":"【西北总分社十八日讯】陕西省截至十七日止，全省共打虎五百七十二只。各专区、县级机关打“虎”运动已全面开始，从各专区、县级机关打“虎”情形可以看出：(一)“老虎”出没的地方，在专区机关主要的也是经济企业部门，但县以下机关则以粮食局、仓库、合作社、水利、税务局等单位为主，其次是银行、贸易公司、财政科、公安部门等。(二)县、区、乡级老虎也不少，如澄县、邰阳，两天内捉虎十一只，其中区级五只，乡级三只。(三)偏僻地区也有老虎，如不通铁路的丹阳、朝邑县已各捉虎八只，汉阴、白河等县也都捉到老虎。(四)老区问题也严重。如延安专区十二个公安局长，有四个因贪污撤职，三个有贪污嫌疑。(五)县以下集体贪污多，重要贪污案多是上下牵连，如丹凤县，已捉虎七只，该县副县长有大老虎嫌疑，并袒护已捉到的老虎。","type":"paragraph"},{"text":"各专区、县级目前存在的问题：(一)有的专区领导上右倾思想较严重，对“三反”认识不够。如商雒专区将该区丹凤县提出的打虎八只计划改为六只。榆林专区对打虎计划预算很低(现一只也未捉到)。安康专区已发现一些单位领导干部手面不清、作战不力的现象。但该专区领导上并未作有效措施。(二)只注意打虎数量，对资产阶级进攻的危害性揭发与批判不够。(三)个别县上打骂逼供现象较严重。各地发现自杀的也不少，个别分区捕人也较多，有的县把发现的老虎都逮捕起来，有的地方也因追贪污而发生搜家的现象。以上情形，陕西省委已严加注意，并决定加强对各专区、县级“三反”的政治、思想领导和具体指示。","type":"paragraph"},{"text":"陕西宝鸡市五反运动已开始半个月，但因领导上对这一严重斗争的复杂性认识不足学习时，一般资本家表现轻松愉快，认为三反运动是“反机关”、“反干部”，与自己没多大关系。二月一日宝鸡市府召集了全市工商界五反动员大会，进行了重新动员后，工商界才开始紧张起来。从二月一日至八日，全市三千多户工商业中，还只暴露了九百一十件零星问题。实际上，据店员们检举的一百八十二件(非全部)案情中看来，贩卖黄金的有三十五件(一万五千一百八十四两)，贩卖白洋的有二十一件(共一万五千一百八十八元)，贩卖烟土的三十七件(二千一百六十六两)，并且许多奸商都与成都、西安、兰州等地工商界有密切联系，与机关中某些老虎也有勾结。据初步了解，全市大多数西药行都制造或贩卖料面，但尚未查清。十三日该市营造业和修理铸造业的两个经理畏罪自杀。十四日上午，市工商联合会副主任吴维彬召集工商联合会全体干部(共八十余人，市委因召开工作组长汇报会无人参加)开会，当场说：“干部不注意宣传政策，方式生硬，强迫硬逼”，认为“过左”了，并给市委打电话扬言要“纠偏”。","type":"paragraph"}],"comments":[],"origin":"新华通讯社编《内部参考》1952年2月28日","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e0a6f92f23"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
