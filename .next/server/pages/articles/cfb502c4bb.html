" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji31","name":"毛泽东全集第31卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji31.pdf"],"article":{"title":"转发华东军区党委关于结合三反进行整编给所属装甲兵党委的电报的批语","alias":"","parts":[{"type":"paragraph","text":"转发华东军区党委关于结合"},{"type":"paragraph","text":"三反进行整编给所属装甲兵党委的电报的批语"},{"type":"paragraph","text":"（1951年12月31日）谭政同志，各大军区："},{"type":"paragraph","text":"十二月二十九日华东军区党委批评华东装申兵党委的电报\"，很好。没有这种批评，彻底的三反斗争是不能完成的。就全军情况来看，最落后的是中南军区，至今没有一个彻底发动三反斗争的号召文件。相反地被整编一事所吸引，深怕发动这个斗争妨碍整编。其实，如同华东军区党委所规定，一月以三反为主，结合整编；二三两月以整编为主（指军区及被整编的部队），结合三反，两者不但不妨碍，而且只有这样做，才能使整编做好。务望中南军区和各大军区取一致步骤，务必“在一月份全军整整齐齐进入三反斗争”。下面各单位，有不执行此命令者，立即予以批评，严重者须以撤职相"},{"type":"paragraph","text":"[1]中共华东军区委员会在给华东装甲兵党委的电报中，批评他们为抓住整编将三反运动在战士与团以上机关分期分别进行的部署不妥，指出应以1月份1个月的时间，在装甲部队无例外地进行一次三反运动。领导机关要亲自分析本单位的贪污、浪费情况，进行具体的反贪污、反浪费、反官僚主义的斗争。这样做，并不妨碍派人做整编工作，更不妨碍在3月底完成整编任务。"},{"type":"paragraph","text":"转发华东军区党委关于结合三反进行整编给所属装甲兵党委的电报的批语威胁。每天交流经验，表扬好的，批评坏的，使运动迅速发展。中南军区各部门贪污浪费官僚主义情况和各地一样严重，何以至今毫无动作，速即电告。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十二月三十一日二十时1951年12月，毛泽东在北京养菊专家刘契的花园中赏菊。"}],"authors":["毛泽东"],"dates":[{"year":1951,"month":12,"day":31}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":209,"page_end":210},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cfb502c4bb"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
