<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"几年来不断克服“等开港”“环境论”等右倾思想  营口创建多样化地方工业　因陋就简　精打细算　依靠群众　自力更生　从无到有　从少到多","authors":[],"dates":[{"year":1958,"month":5,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"几年来不断克服“等开港”“环境论”等右倾思想"},{"type":"paragraph","text":"营口创建多样化地方工业"},{"type":"paragraph","text":"因陋就简　精打细算　依靠群众　自力更生　从无到有　从少到多"},{"type":"paragraph","text":"本报讯　辽宁省营口市在解放后短短几年内，由于不断克服干部中“等开港”、“环境论”等右倾保守思想，积极恢复和发展地方工业，从一个落后的消费城市改造成为欣欣向荣的生产城市。现在全市地方国营工厂已发展到一百多个，1957年的生产总值比1949年增加了三十八倍；职工人数增加了十倍以上；产品品种由七种增加到一千零二十九种；技术水平也有很大提高。城市失业现象已消灭，人民生活有了改善。今年全市人民更掀起了发展地方工业的高潮，1至4月份的地方工业总产值比去年同期增长了58％。"},{"type":"paragraph","text":"营口市在发展地方工业中，贯彻了全党办工业、各级办工业、全民办工业的方针，创造了多种多样发展地方工业的形式。除了较大的工业外，放手举办区级联合工厂和街道办事处小型工厂。此外还由市人民委员会民政部门建立了社会救济性的生产福利社；由手工业联社组织了各种生产社、供销社、生产小组及家庭副业。全市各部门都尽量压缩经费开支，挤出钱来支援和发展地方工业，使全市出现了一个支援地方工业的新局面。"},{"type":"paragraph","text":"营口市在发展地方工业中，作到了因陋就简、自力更生、贯彻了勤俭办企业的方针。他们利用和修补旧房、租用民房做厂房；在生产设备上，他们尽量利用旧设备和代用设备，或自制简易设备，少买新设备。地方工业的资金，大半是组织群众自筹，按银行利率加息还本。在技术力量方面主要依靠老工人和组织到外地学习等办法来解决。"},{"type":"paragraph","text":"营口市地方工业所以能够得到迅速的发展，主要是：采用母鸡下蛋、母厂劈子厂的办法，从原有的工厂中培植新工厂，这样就比较容易而且也快。他们还采用大厂带小厂的做法，这样既能节约设备，又能使工厂发展和提高得比较迅速。此外还采用逐步升级，把有发展前途、生产性质又适合于国家经营的手工业合作社或福利生产单位，逐渐升级为地方国营工厂等办法，使地方工厂能够很快地发展起来（详见今日本报第三版）。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"806d8bb004"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
