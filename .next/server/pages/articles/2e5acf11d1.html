<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji31","name":"毛泽东全集第31卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji31.pdf"],"article":{"title":"转发东北局关于寻找贪污线索的经验的电报","alias":"","parts":[{"type":"paragraph","text":"关于搜捕大老虎和检查处理"},{"type":"paragraph","text":"违法资本家致高岗电"},{"type":"paragraph","text":"（1952年1月31日）高岗同志，并告各同志："},{"type":"paragraph","text":"（一）一月二十六日的报告收到。你们清出了大小贪污分子十六万多人，收到了很大成绩，甚为高兴。你们的方针和做法是基本正确的。"},{"type":"paragraph","text":"（二）根据中央一级十二万人中就有四百只大老虎的情况，东北全境各级党政军机关及企业的工作人员中可能不止五百只大老虎，可能一倍或几倍于此数；但你们暂定五百只为目标是适当的，待运动深入可以按照情况逐步追加任务。"},{"type":"paragraph","text":"（三）处理占百分之八十以上的不给刑事处分的小贪污分子，按照中央已通知的方针，除个别情节甚轻只要坦白悔过，酌情退款，保证不重犯，可以不给行政处分者外，一般都应分别给以行政处分，例如撤职、降级、调职、记过等项，以示严肃。处理时应仿照镇反中清理积案的方法，由领导机关对一批人加以分析比较，定出处理方案，交给群众会议（本人参加）讨论，增减修正，然后由领导机关核定公布。北京有些机关这样做了，影响很好。"},{"type":"paragraph","text":"[1]高岗，当时任中共中央东北局书记、东北人民政府主席。"},{"type":"paragraph","text":"关于搜捕大老虎和检查处理违法资本家致高岗电"},{"type":"paragraph","text":"（四）对付资本家须有准备，准备不好，不要动手。各城市准备条件不一致时，不要同时动手。又须有步骤，先组织若十强干的检查小组，向最顽抗而有确据的若干家实行检查。不查则已，查必破案（有些须坚持数天之久才能破案，不破案不许撤回）。第二批再检查若十家，又均破案。这样便取得了经验，训练了干部，教育了大批中小资本家及一部分大资本家，促使他们坦白，同时动员工人店员实行检举。然后再组织第三批第四批第五批和更多的检查破案。在这个过程中就可争取百分之九十以上的大中小资本家站到我们方面，或者保守中立，使百分之儿（北京是百分之六）的反动资本家完全陷于孤立，社会舆论也就完全变得于我们有利了。这时我们对于大约占百分之一至百分之二的最反动的资本家（即行贿盗窃罪大恶极的资本家），在经过检查取得确实罪证之后，就可以给予惩处，例如逮捕、枪决（只是少数）、没收、徒刑、罚款等。北京有五万户工商业，百分之一是五百户，北京市党组织经过一个月的紧张斗争，经过几个检查步骤，还只逮捕近百名资本家。准备在二月份再经过几个检查步骤，陆续逮捕至三百名左右（不到百分之一），再看形势。这是一个逐渐了解，逐渐深入，逐渐分化，逐渐团结多数孤立少数的斗争过程，没有城市党组织的紧张艰苦工作是不能完成这个任务的。资产阶级大中小之间矛盾很大，我们打击百分之一左右的最反动资本家，又是着重打【击】投机商人而不是着重打击工业资本家（有一部分极坏的工）主须给以打击），可能争取绝大多数资本家拥护我们，而不会怨恨我们，真正怨恨我们的只是极少数（百分之几）。这样也就可以用内外夹击的方法，把资产阶级安置在我们内部的堡垒即大贪污分子全部地清查出来。"},{"type":"paragraph","text":"（五）为争取广大市民及近郊农民热烈拥护我们，北京市政府曾毛泽东全集第三十一卷组织二百多个调查访问小组同时出动，代表市长到一切派出所和乡政府管辖区域，召集居民的大小会议和按家访问（派出所和乡政府工作人员实行回避），以三四天时间调查政府工作人员及警察的一切贪污违法行为，报告市政府处理，收效甚大。此项办法全国各城市都可仿行，并且每年应举行几次。"},{"type":"paragraph","text":"毛泽东一月三十一日"}],"authors":["毛泽东"],"dates":[{"year":1952,"month":1,"day":31}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":315,"page_end":317},"tags":[{"name":"毛泽东","type":"人物"},{"name":"高岗","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2e5acf11d1"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
