" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji9-2","name":"毛泽东全集第9卷(2)","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji9-2.pdf"],"article":{"title":"与教堂订立的协定","alias":"","parts":[{"type":"paragraph","text":"与教堂订立的协定凹"},{"type":"paragraph","text":"（1936年12月28日）"},{"type":"paragraph","text":"（甲）教堂承认苏维埃红军之抗日救国及反军阀卖国贼之主张，苏维埃红军承认教堂之存在。（乙）拒绝一切国民党军阀之军队、民团、侦探进入教堂区域，一切教民均为苏维埃公民，服从苏维埃法律，苏维埃红军承认宣教与信教的自由。（丙）教堂之财产不没收，由教堂自动捐助抗日救国经费。（丁）经济通商不加阻碍。（戊）其他事项随时协商办理。"},{"type":"paragraph","text":"[1]为争取教堂与苏维埃红军建立和平友好关系，毛泽东和周恩来联名提出与各教堂订立协定。这是毛泽东和周恩来提出的协定的主要内容。"}],"authors":["毛泽东"],"dates":[{"year":1936,"month":12,"day":28}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":228,"page_end":228},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8a9ec5ba6e"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
