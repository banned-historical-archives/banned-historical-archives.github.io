" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"邓小平与胡耀邦谈起草在中央工作会议闭幕会上的讲话","authors":["邓小平"],"dates":[{"year":1978,"month":12,"day":2}],"is_range_date":false,"parts":[{"text":"邓小平与胡耀邦谈起草在中央工作会议闭幕会上的讲话","type":"title"},{"text":"邓小平","type":"authors"},{"text":"〖胡耀邦、于光远等人为邓小平起草在中央工作会议闭幕会上的讲话，邓小平与胡、于谈话，指示摘录如下。〗","type":"appellation"},{"text":"讲过了，与外国人讲过。","type":"paragraph"},{"text":"究竟讲什么，想了一下，不准备长稿子。","type":"paragraph"},{"text":"（谈对中央工作会议的评价）","type":"subtitle"},{"text":"这次会议了不起，五七年以后没有（五七年以前有，延安有，那时议论问题自然一些）。这个风气要传下去，很好的党的生活，党的作风，既有利于安定团结，防止思想僵化，又有利于……实在可喜。","type":"paragraph"},{"text":"（关于解放思想）","type":"subtitle"},{"text":"这个争论（即真理标准的讨论──引者注）很好，越看越好，是政治问题，是国家命运问题。","type":"paragraph"},{"text":"（关于发扬民主加强法制）","type":"subtitle"},{"text":"在现在这个时期更要加强民主。集中多少年，现在是民主不够，不敢讲，心有余悸。","type":"paragraph"},{"text":"发展经济，民主选举，民主管理，民主监督。工厂工人监督，农村社员监督。","type":"paragraph"},{"text":"目前主要是反对空头政治……反对说空话。现在是正确的意见，也不落实，没有具体措施，一拖就是一年。","type":"paragraph"},{"text":"讲权力下放，企业。讲讲千方百计，讲调动积极性。利用每一寸土地，有一点土地种一棵树，有一块水面搞养殖，有一块草原种草。","type":"paragraph"},{"text":"（关于自主权与国家计划的矛盾）","type":"subtitle"},{"text":"这个矛盾只能从价值法则供求关系来调整。……否则不能自主，靠质量，质量好销全国。不要怕，乱，乱不出来（承认市场一定调节）。","type":"paragraph"},{"text":"经济民主，重点不是政治，重点是经济民主。","type":"paragraph"},{"text":"有些要用法律，民法，刑法，各种单行法，植树应该有法律。地方也可以立法。","type":"paragraph"},{"text":"（关于向前看）","type":"subtitle"},{"text":"这个会议向后看解决一些问题，目的是为了向前看，不要一刀切，解决遗留问题，快，干净利落，时间不要长。完全满意不可能。","type":"paragraph"},{"text":"安定团结十分重要。……毛主席文化大革命中问题，不纠缠这个问题。","type":"paragraph"},{"text":"文化大革命，不要涉及，让时间来说清，过一段时间再说这个问题，没有一点吃亏。","type":"paragraph"},{"text":"（谈克服官僚主义）","type":"subtitle"},{"text":"学会管理，培养与选用人才，使用人才，改革规章制度。","type":"paragraph"},{"text":"好的企业必须用先进的办法管理企业。","type":"paragraph"},{"text":"党委领导好不好，看企业管得好不好，利润，工人收入，城市如此，农村如此，各行各业如此。","type":"paragraph"},{"text":"（谈允许一部分企业、地区、社员先好起来）","type":"subtitle"},{"text":"这是一个大政策。","type":"paragraph"},{"text":"允许一部分先富起来，农村５－１０－２０％；城市２０％，才有市场。本身就促进就开辟新行业。","type":"paragraph"},{"text":"反对平均主义。","type":"paragraph"},{"text":"干得好的，就影响左邻右舍。","type":"paragraph"},{"text":"（关于加强责任制）","type":"subtitle"},{"text":"现在无人员责任。","type":"paragraph"},{"text":"搞几定：（１）什么项目，（２）从哪里引进，（３）定在什么地方，（４）定哪个人从谈判到管理。可能六七定，开单子，并头进行，不耽误时间。","type":"paragraph"},{"text":"现在打屁股打计委，有什么用？要打，打个人。国内企业也要专人负责，专门机构、专门的人搞几定，请些专家，譬如荣毅仁就可以当专家。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"胡耀邦","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2b53fb86e5"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
