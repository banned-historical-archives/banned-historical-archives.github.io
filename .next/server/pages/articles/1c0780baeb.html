" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"企图使人民法院反对人民　审判员林天程高唱“独立审判”","authors":["新华社"],"dates":[{"year":1957,"month":9,"day":16}],"is_range_date":false,"parts":[{"text":"企图使人民法院反对人民　审判员林天程高唱“独立审判”","type":"title"},{"text":"新华社","type":"authors"},{"text":"新华社长春讯:吉林省通化专区中级人民法院、监察院和监察处的全体工作人员，最近连续集会，揭露和批判右派分子林天程恶毒攻击共产党对司法工作的领导，妄图改变人民法院政治方向的反动言行。","type":"paragraph"},{"text":"林天程是通化专区中级人民法院审判员。他对新社会的法制一贯表现不满。在大鸣大放期间，他极力赞扬国民党旧法制的所谓“三权鼎立，互相制约”；恶毒地谩骂和攻击共产党对司法工作的领导和各级领导干部。他认为党委领导司法工作对审判员是“最大的限制”；会上，许多从事司法工作多年的干部据理驳斥了林天程“独立审判”的荒谬主张。大家指出，司法工作是人民民主专政的武器，必须由工人阶级及其政党来领导，这是宪法明文规定的。而且人民法院独立进行审判和党的领导监督并不矛盾。如果按照右派分子林天程的主张去做，就必然会改变人民法院的方向，这对人民来说是犯罪的。","type":"paragraph"},{"text":"到会的人还揭露，林天程污蔑社会主义国家“无法可依”，而他自己在判案中却经常破坏人民法制，为反革命分子及坏分子辩护。林天程在法院接待室工作中，一听到犯罪分子的申诉，就对那些要求“平反”和对政府不满的人说：“我姓林，有事可来找我，我一定为你办。”这个右派分子在“三反”运动时还曾经不择手段地没收犯人钱财，接受罪犯家属的贿赂，并向犯人敲诈勒索。","type":"paragraph"},{"text":" ——原载《人民日报》1957年9月16日。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1c0780baeb"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
