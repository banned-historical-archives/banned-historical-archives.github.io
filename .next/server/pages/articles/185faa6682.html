<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"抓紧最后廿多天　全面完成年计划上海市人委昨举行第十次会议　曹荻秋副市长分析当前大好经济形势　要求各条战线反透右倾鼓足干劲继续持久地发展增产节约运动新高潮","authors":[],"dates":[{"year":1959,"month":12,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　“抓紧今年度的最后二十几天的时间，继续持久地发展增产节约运动的新高潮，更好更全面地完成和超额完成今年的国民经济跃进计划，并为明年继续大跃进准备好条件”，这是昨天举行的上海市人民委员会第十次会议上，曹荻秋副市长在报告本市国民经济计划执行情况时指出的。"},{"type":"paragraph","text":"曹副市长在报告中还指出，今年以来，上海的经济形势和全国各地一样，是非常好的。在工业生产方面，1—10月累计完成总产值，超过去年全年总产值13.5%。重工业累计产值比去年同期增长74.7%，超过去年全年产值31.3%；轻工业累计产值比去年同期增长38.1%，超过过去全年产值4.6%；纺织工业累计产值比去年同期增长19.4%。钢的产量1-10月的累计产量，比去年同期增长98.9%；在基本建设方面，1-10月累计完成投资额，超过过去任何一年同期完成年计划的水平。今年以来，基建速度快，仅第三季度竣工投入生产的项目即达164项，比一、二季度全部竣工项目还多70多项。在农业方面，今年获得空前大丰收，在粮、棉、油料生产上出现了大批大面积高额片。在家畜生产上，出现了一批“一亩地一头猪”的公社和生产队。在商业方面，今年以来，市场总的形势是繁荣的、活跃的、稳定的。社会购买力和商品供应量都有很大增长。"},{"type":"paragraph","text":"接着，曹副市长详细地分析了在国民经济计划执行中的情况和当前增产节约运动新高潮的特点。他说，自从党的八届八中全会向全国人民发出反右倾、鼓干劲，进一步开展增产节约运动的号召以后，全市迅即掀起了轰轰烈烈的群众性的生产运动的新高潮，使各条战线都出现了崭新的局面。曹副市长指出这个新的增产节约运动的新高潮的特点是:来势很猛，规模广阔，绝大部分工厂、企业、车间、小组都行动起来，工业生产直线上升，出现了一天高一天、一旬高一旬、一月高一月的局面，打破了长期以来月初松、月末紧、季初松、季末紧的常规，多快好省全面跃进，不但产量节节上升，而且一般都达到高产、优质、低耗和安全生产的要求；大搞群众运动和大闹技术革命、改进经营管理密切结合；各地区之间，部门之间，企业之间，职工之间，进一步发挥了共产主义协作的精神，比、学、赶、带的社会主义比赛运动广泛开展。"},{"type":"paragraph","text":"曹副市长说，所有这些特点，都说明了当前的增产节约运动，既是轰轰烈烈，又是踏踏实实的；这次增产节约运动新高潮，是在去年大跃进的基础上的更大、更好、更全面、更健康地继续跃进的运动。"},{"type":"paragraph","text":"曹副市长在报告中指出，本市今年国民经济各部门取得巨大成绩，是广大职工在党的领导下，坚决贯彻党的总路线，坚持政治挂帅，坚持大搞群众运动，大搞技术革命和技术革新，不断提高劳动生产率；抓紧解决生产建设中的关键问题，大力克服困难的结果。"},{"type":"paragraph","text":"曹副市长在谈到大搞技术革命和技术革新，不断提高劳动生产率方面时说，今年1-10月，全市范围内工业技术革新建议就有37万2千件，已经实施的就有20万6千件。这些革新倡议对劳动生产率的提高和整个工业生产的跃进起了极大的促进作用。今年1-10月份市区工业职工劳动生产率就比去年同期增长33%。全市已有1900多个工厂实现了市委提出的“一个人抵一个半人”的号召。"},{"type":"paragraph","text":"为了更好更全面地完成和超额完成今年继续跃进计划和为明年继续大跃进准备条件，曹副市长在报告中指出，必须抓紧今年最后的二十几天，反透右倾，鼓足干劲，继续持久地发展增产节约运动新高潮，首先要抓紧生产，全面超额完成各项生产计划指标，不仅要完成和超额完成产值、产品、产量计划，而且要求按照品种、规格、合同来完成；不仅要完成生产计划，而且要完成降低产品成本，上交利润，提高产品质量，劳动生产率，节约原材料，降低消耗定额等计划；并要抓紧原材料的调运和生产、节约代用等工作；抓电力供应工作，大力开展节约用电；抓技术革新、技术革命，保证生产不断持续地步步高涨；安排好明年第一季度的生产计划，保证明年“开门红”。"},{"type":"paragraph","text":"昨天的会议还讨论通过了本市行政区划调整问题；关于在本市推行市斤改为十两制的问题。会议通过了上海市兵役委员会和上海市水利枢纽通航委员会的名单。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"曹荻秋","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"185faa6682"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
