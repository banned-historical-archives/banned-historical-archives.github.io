script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"拉美人民反剥削反暴政斗争不断发展  智利五千多电话工人罢工　阿根廷萨尔塔城工人职员举行反饥饿示威  哥伦比亚印第安农民占领一个大庄园主的牧场","authors":[],"dates":[{"year":1969,"month":3,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"拉美人民反剥削反暴政斗争不断发展"},{"type":"paragraph","text":"智利五千多电话工人罢工　阿根廷萨尔塔城工人职员举行反饥饿示威  哥伦比亚印第安农民占领一个大庄园主的牧场"},{"type":"paragraph","text":"新华社二日讯　智利、阿根廷、哥伦比亚的工人、农民和职员最近不断开展罢工、示威和夺地等各种形式的斗争，反对美国和本国大资本家、大庄园主的压迫和剥削，捍卫切身的权利。"},{"type":"paragraph","text":"智利美资安那康达铜公司所属“埃克索蒂卡”矿的二百八十名工人二月二十七日宣布不定期罢工，抗议美国资本家的残酷剥削，要求改善生活条件。"},{"type":"paragraph","text":"美国控制的智利电话公司的五千四百名工人，二月二十六日开始举行罢工，要求增加工资。"},{"type":"paragraph","text":"二月二十五日，智利国营电力公司的五千名工人举行了二十四小时罢工。瓦尔帕来索一所医院的八百名医务工作人员为了要求增加工资，举行了四小时的罢工。"},{"type":"paragraph","text":"阿根廷北部萨尔塔省省会萨尔塔城的工人和职员，二月十四日晚冲破警察的封锁线，又一次举行反饥饿示威，要求增加工资。在此以前，圣菲省奥坎波镇的五千多名工人曾经不顾警察的镇压，在一月间举行了示威游行，要求支付拖欠的工资。工人的家属也举行了示威集会。"},{"type":"paragraph","text":"哥伦比亚东北部阿劳卡州龙顿港的二百多名印第安农民，二月上旬占领了一个大庄园主的牧场。这些印第安农民不怕大庄园主的武力镇压，坚决保卫他们已经占领的土地。在这以前，哥伦比亚托利马省、山谷省和乌伊拉省的近一千名贫苦农民联合起来，进占了乌伊拉省贝伦地区附近的一个大庄园。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e7f428c002"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
