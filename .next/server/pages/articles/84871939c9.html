script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"去年危机深重　今年困难重重  美资产阶级政客和报刊谈美国处境","authors":[],"dates":[{"year":1962,"month":1,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"去年危机深重　今年困难重重"},{"type":"paragraph","text":"美资产阶级政客和报刊谈美国处境"},{"type":"paragraph","text":"据新华社3日讯　华盛顿消息：美国资产阶级政客和报刊在新年前后的一些谈话和评论中承认，1961年美国是处于危机深重的一年，而在新的一年中仍然是困难重重。"},{"type":"paragraph","text":"参议院民主党副领袖曼斯菲尔德在去年除夕对美国记者说：“我们已度过了一个危机的年头，而来年至少将是同样困难的，如果不是更困难的话。”"},{"type":"paragraph","text":"曼斯菲尔德对亚非和拉丁美洲方兴未艾的民族民主运动表示不安。他说，非洲的局势不会在一夜之间解决。东南亚在好转前可能更坏。中东处于经常的紧张情况下，……拉丁美洲面临着危机的年代。"},{"type":"paragraph","text":"曼斯菲尔德2日在一次广播节目中又表示了同样的看法，他说：“（西）柏林局势远未解决。在未来的六个月中，在越南（指南越）任何事情都会发生。老挝问题仍然未解决，……至于非洲，我们可以预计，在未来一年中在这个大陆上会有更多的不满和冲突。”他还忧心忡忡地说，“由于盟国之间的不团结，西欧正处于混乱之中。”"},{"type":"paragraph","text":"《纽约时报》在元旦社论中认为肯尼迪的第一年是“充满了不平常的挑战的一年”，他所策划并遭到可耻失败的对古巴的武装入侵是“失策”。"},{"type":"paragraph","text":"《纽约时报》华盛顿办事处主任赖斯顿去年底在一篇评论中也承认，肯尼迪去年在外交上屡遭“挫折”，“处境惨淡”。他说，肯尼迪“在国外，没有什么可高兴的。德国已分裂得更加彻底。老挝和南越摇摇欲坠。刚果还是那样，只是更糟了些。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"84871939c9"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
