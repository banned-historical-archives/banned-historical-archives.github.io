script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"学习英雄事迹　深入批判邓小平七英雄之一李桂芬的母校、本市长宁区第二中学广大师生学英雄，见行动，有力地推动了教育革命和各项工作的开展","authors":[],"dates":[{"year":1976,"month":7,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　黑龙江省尾山农场七名英雄的女战士为抢救国家财产，同荒火搏斗壮烈牺牲的事迹传到李桂芬的母校——上海市长宁区第二中学，立即引起了强烈的反响。学校党支部组织革命师生认真学习李桂芬同志的先进思想和英雄事迹，运用报告会、座谈会、学习专栏、黑板报、宣讲队和筹办展览会等多种形式，大张旗鼓地宣传英雄事迹，全校出现了“学习英雄李桂芬，深入批判邓小平”的生气勃勃的景象，有力地推动了教育革命和各项工作的开展。"},{"type":"paragraph","text":"长宁二中党支部在组织学习英雄事迹时，特别注意引导大家联系批邓、反击右倾翻案风的斗争实际，学习马列和毛主席著作，学习毛主席一九六四年关于社教运动的批示和文化大革命以来，特别是反击右倾翻案风以来的一系列重要指示，深入批判邓小平散布的“教育危机”论和“一代不如一代”的反动谬论，同修正主义路线对着干。广大革命师生在学英雄过程中认识到，李桂芬同志的光辉形象是对邓小平攻击文化大革命和上山下乡运动的有力批判。她以自己的英雄举动，谱写了又一曲毛泽东思想的胜利凯歌，攀登了“一不怕苦，二不怕死”的无产阶级世界观的高峰。大家一致表示，学习李桂芬就要象她那样认真学习革命理论，立场坚定，旗帜鲜明，同邓小平反革命的修正主义路线对着干。不少党员在学习英雄事迹后，激动地说，李桂芬同志正因为胸中装有共产主义大目标，所以能在关键时刻，临危不惧，挺身而出，为人类壮丽的共产主义事业贡献出火红的青春。学习李桂芬同志就要牢记党的基本纲领，坚持党的基本路线，不忘党的最终目的，认真学习毛主席的重要指示，树立同走资派作长期斗争的思想。"},{"type":"paragraph","text":"现在，这个学校的革命师生在李桂芬英雄事迹的鼓舞下，出现了学革命理论，走英雄道路，同修正主义路线对着干的动人景象。中四(5)班理论小组几年来坚持学习马列和毛主席著作，积极投入批判修正主义的斗争。在最近学习英雄的热潮中，他们的热情更高了，同修正主义路线对着干的劲头更足了，纷纷挥笔作诗，写决心书，出专栏。他们说，学英雄要学根本，我们一定要把理论小组搞得更好。红卫兵团干部在学习英雄时，积极带领红卫兵战士投入学英雄的各项活动。许多革命教师在学英雄的日子里，加强对学生进行政治思想教育，把转变学生的思想放在首位，同时加紧对自己世界观的改造。李桂芬同志的班主任梁老师是位老教师，虽然现在不担任班主任，但他深入班级，主动和同学谈心，热情宣传英雄事迹，鼓励同学向英雄学习。广大革命教师通过学习李桂芬英雄事迹，加深了对无产阶级培养目标的认识。他们说，李桂芬的英雄事迹给我们补上了“文化大革命好”的重要一课。邓小平反革命的修正主义路线是要培养为复辟资本主义服务的精神贵族，我们坚决不答应。最近，这个学校的党支部领导成员和广大教师一起下厂培训，坚决与工农划等号，虚心接受工人阶级的再教育，努力改造世界观，坚持无产阶级专政下的继续革命。"},{"type":"paragraph","text":"李桂芬同志立志务农、扎根边疆的先进事迹，激励着这个学校广大的七六届毕业生走上山下乡，与工农相结合的道路。红卫兵团干部和中四(1)班革命小将在访问李桂芬同志的家庭时，纷纷向李桂芬的父母表达他们要继承英雄的遗志，接过英雄的红旗，誓将革命进行到底的坚强决心。中四(3)班一位同学，虽然姐姐已在农村插队，但在英雄事迹感染下，决心毕业后到农村去，走毛主席指引的上山下乡的金光大道，做缩小三大差别的铺路石子。　(本报通讯员)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"教育革命","type":"主题/事件"},{"name":"上山下乡","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9de50d9958"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
