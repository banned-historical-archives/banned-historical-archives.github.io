script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"在美蒋双重剥削下  台湾蔗农茶农极端贫困","authors":[],"dates":[{"year":1965,"month":12,"day":31}],"is_range_date":false,"parts":[{"type":"paragraph","text":"在美蒋双重剥削下"},{"type":"paragraph","text":"台湾蔗农茶农极端贫困"},{"type":"paragraph","text":"台北消息：十二月中旬，《台湾日报》以《蔗农苦经》为题发表了五篇新闻通讯，报道台湾蔗农在美蒋双重剥削下，生活越来越困苦不堪。"},{"type":"paragraph","text":"通讯透露，台湾沙糖的输出受美国控制，并且不断压低糖价，有时故意停止收购。一九六五年期（榨糖周期约十八个月为一年期），美国又压低了糖价，使台湾蔗农的收入减少了三分之一到三分之二，数以万计的蔗农为此“莫不痛心疾首”，“叹苦之声不绝于耳”。据报道，在台湾农业经济中占重要地位的蔗糖业，由于美国侵略者的盘剥，面临着严重危机，许多种甘蔗的农民因为不能维持最低生活，都已经被迫“改行”，仅嘉义县今年甘蔗实种面积，比计划种植面积就减少了三百七十六公顷。"},{"type":"paragraph","text":"台北消息：《台湾日报》十二月十五日刊载了一则消息，标题是《一大群哀苦的茶农》。消息说，台湾茶农的苦难处境已成为“本省所有农民群中最苦的一环”。"},{"type":"paragraph","text":"消息透露，台湾现有茶园总面积共三万八千多公顷，茶农二十一万八千多人，平均每公顷茶园要养活六个人。由于蒋帮不断压低茶叶的收购价格，再加上交付地租和各种捐税，除去肥料等生产成本以后，实际收入少得可怜，他们连肚子都填不饱，更没有力量添置生产资料，也没有心思改善经营管理，因此大部分茶园都处于“半荒芜状态”。报道还说，目前台湾有大批茶厂被迫停业，仅在新竹县就倒闭了三十二家，一千二百多名制茶工人失业。（据新华社讯）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"28a913d3e1"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
