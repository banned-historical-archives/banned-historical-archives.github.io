<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"粉碎反革命修正主义分子孙冶方复辟资本主义的大阴谋——上海市汽车运输公司老工人批判孙、冶方","authors":[],"dates":[{"year":1966,"month":8,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"资本家“算”的是剥削工人血汗“帐”"},{"type":"paragraph","text":"夏小龙(运输场副场长)"},{"type":"paragraph","text":"孙冶方说“对资本家来说，生产而不计财务成本，简直是不可想象的。”他赞美资本家“会算帐”。"},{"type":"paragraph","text":"我今年六十一岁，二十岁那年从苏北到上海拉榻车，在旧社会当了二十多年牛马。一早拉到晚，被资本家刮皮抽筋，终年吃不饱、穿不暖，我们夫妇二人成年累月拉车子，还是养不活一家人，解放前生了十三个孩子，死了十二个。从我亲身的遭遇，就可以看清资本家的“会算帐”究竟是什么?!资本家“算”的就是挖空心思吸我们工人鲜血，养肥他们自己的“帐”!那时我们就是被他们“算帐”“算”穷“算”苦的。我给老板拉了十年车，当我的一个孩子饿死的时候，向老板借一块钱，他摇头摆手，说:“他妈的，你孩子死了管我屁事，死掉一百个也不管我事。”"},{"type":"paragraph","text":"资本家就是这样在我们工人头上“算帐”的，资本家的罪恶，我永远不会忘记，世世代代不会忘记。今天，孙冶方要为资本家脸上涂脂抹粉，替资本家说话，还要我们“学习”资本家的“算帐”本领，这就是要我们工人重新过旧社会的地狱生活，这是绝对办不到的!如果我们社会主义企业真的照资本家那样“算帐”，那么社会主义企业就会蜕变为资本主义企业，资本主义就会复辟。大家看，孙冶方这个坏蛋的阴谋多毒，心肠多狠!我们一定要坚决保卫社会主义，彻底斗倒孙冶方这个混进党内的资产阶级代表人物，彻底清算他的罪恶!"},{"type":"paragraph","text":"资本家“重视”的是剥削工人的“效果”"},{"type":"paragraph","text":"沈宝书(装卸工、五好工人)"},{"type":"paragraph","text":"孙冶方在他的反党反社会主义的黑文中说:资本家“很重视他们的手段”，“讲究生产效果”。这完全是公然站在资本家一边讲的话。"},{"type":"paragraph","text":"我解放前在一个姓沈的老板开的运输行里干活，这个老板的确很“重视”手段，很讲究剥削“效果”。比如他规定每月十五日发工钿，当时折米价发，他不按十五日米价计算，而是按月初的米价发。那时米价一日三跳，结果我们工人又被资本家剥了几层皮。"},{"type":"paragraph","text":"资本家剥削我们血汗是从来没有底的。老板要我们每天早上六点钟做工，到夜里十二点钟歇工，还用狗腿子押车，监督我们。资本家把我们当牛当马，一旦身体不好，做不动了，就把我们一脚踢开。"},{"type":"paragraph","text":"我们要责问孙冶方，资本家“重视”的“手段”是什么?资本家“讲究”的“效果”是什么?你要我们工人“学习”资本家的什么东西?告诉你，现在我们工人当家作主，搞的是社会主义企业，我们坚决反对资本家的那一套剥削手段，坚决反对资本家的剥削“效果”。你妄想把社会主义企业“和平演变”为资本主义企业，绝对办不到!"},{"type":"paragraph","text":"张文连(驾驶员、五好工人)"},{"type":"paragraph","text":"解放前我在烧饼店里当学徒，资本家“门槛”非常“精”。他先做几只大的，放在外边做做样子，买饼的人多了，就叫我们做小，如果做大了，他就骂我、打我。解放前，物价一日三跳，百物飞涨，老板每天把卖饼的钱买了面粉一包包堆起来囤积，而发给我们的工钱却是伪币，等到买东西，物价早已涨了几倍。我们工人生病，老板还硬要叫我们干活，胡说:“拖拖就会好的”，简直不把我们当人看待。可见老板的什么“投资效果”就是残酷地剥削我们工人的血汗，就是吸我们工人的血，喝我们工人的汗!孙冶方这个坏家伙竟然大肆吹捧资本家的剥削“本领”，还要我们社会主义企业“学习”资本家那套东西，就是要我们也去追逐利润，搞资本主义经营，这不是明目张胆地进行资本主义复辟又是什么?说到底，是要让我们工人重新回到暗无天日的旧社会，吃两遍苦，这是无论如何办不到的。孙冶方想给资本主义打“强心针”，“复活”资本主义，完全是他的痴心梦想!"},{"type":"paragraph","text":"资本家的“聪明”，就是敲工人骨，吸工人髓"},{"type":"paragraph","text":"祁和坤(驾驶员、五好工人)"},{"type":"paragraph","text":"孙冶方公然说资本家“很聪明”，这是彻头彻尾的反革命谬论!我们劳动人民对万恶的旧社会有深仇大恨，资产阶级的毒辣手段我们是尝够了的。解放前我在一家运输行做工。这家运输行的资本家就是靠剥削工人血汗起家的。这个老板先是开设一丬小店，后来动了“脑筋”，从农村招青年人来当学徒，用所谓“三年学艺，四年帮师”的办法来进行残酷剥削。学徒的生活不是人过的，一天到晚吃不饱、穿不暖，晚上都挤在一只小搁楼里，而资本家的腰包里一天天满起来了，开始买进了一部卡车，不过几年，就从两部变成三部，又变为拥有十六部卡车和一丬汽车修理行的大资本家，还造起了洋房。"},{"type":"paragraph","text":"资本家的“聪明”就是千方百计剥削我们工人。比如老板规定每月一日、十六日拆帐，但总是一拖再拖，总要拖过一个星期左右才发，资本家又把钱拿去放高利贷，进行剥削。等工人拿到拆帐的钱，已经买不到什么东西了，有时只好买几块肥皂、几刀草纸。资本家还要把运输行里的各种费用开支，都算到拆给工人的那份帐里，进一步克扣工人的钱。总之，五花八门，敲工人的骨，吸工人的髓，资本家的贼脑筋倒是“聪明”得很!"},{"type":"paragraph","text":"孙冶方竭力宣扬资本家的“聪明”，鼓吹社会主义企业也要有这种“聪明”，就是要搞邪门歪道，挖社会主义的墙脚，使我们工人重新受资产阶级压迫，这是他白日作梦，我们工人是坚决不答应的!"},{"type":"paragraph","text":"孙冶方主张向资本家“学习”，就是要复辟资本主义"},{"type":"paragraph","text":"张深忠(修理技工、五好工人)"},{"type":"paragraph","text":"解放前我在南京的一家汽车修理行做活，资本家就是一贯偷天换日，投机倒把。分泵皮碗只值分把钱一只，他卖人家几元钱；打火头子几角钱一只，他卖人家四、五元钱。"},{"type":"paragraph","text":"“一本万利”，剥削起家，这是资本家办企业的出发点。孙冶方提出利润挂帅，完全跟资本家穿一条连裆裤子。他鼓吹学习资本家剥削的本领，就是要复辟资本主义。"},{"type":"paragraph","text":"张永清(材料管理员、五好职工)"},{"type":"paragraph","text":"资本家在旧社会里是抽我们血的吸血鬼。解放前，我在大饼店里学生意，我父亲拉黄包车，父子两人的苦遭遇说明在万恶旧社会里资本家是人面兽心。他们把自己荒淫无耻的生活，建筑在工人的白骨堆上!"},{"type":"paragraph","text":"今天，孙冶方等人明目张胆地要人们向资本家“学习”，要社会主义企业也去“发”资本主义之“财”，这完全是对社会主义的疯狂进攻。告诉孙冶方之流，我们工农兵早已布下天罗地网，我们是除妖捉鬼的能手，我们不会被你们的花言巧语欺骗。我们坚决保卫党，保卫社会主义。我们要努力学习毛主席著作，横扫一切牛鬼蛇神，坚决把无产阶级文化大革命进行到底!"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ea4e106a95"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
