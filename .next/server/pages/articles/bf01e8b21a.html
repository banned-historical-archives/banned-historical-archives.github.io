script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"李先念在财贸系统革命造反联络委员会“打倒姚依林大会”上的讲话","authors":["李先念"],"dates":[{"year":1967,"month":8,"day":21}],"is_range_date":false,"parts":[{"text":"李先念在财贸系统革命造反联络委员会“打倒姚依林大会”上的讲话","type":"title"},{"text":"李先念","type":"authors"},{"text":"我坚决支持打倒姚依林大会的召开。","type":"paragraph"},{"text":"我也是犯了错误的，以前你们炮轰李先念火烧李先念，大方向是正确的，就是打倒李先念方向也是正确的，因为我犯了错误嘛！希望同志们对我还要继续批评。","type":"paragraph"},{"text":"总理接见你们时，你们提出要停姚依林的职。姚依林的问题，我已向总理反映过了，总理同意你们的要求（口号）。现在我代表中央、总理宣布停止姚依林在国务院财贸办公室副主任、中共中央财贸政治部主任的职务。（呼口号）","type":"paragraph"},{"text":"我的错误，你们不要因为我而分两派，如果因为我分两派，我心里不安，感到惭愧。","type":"paragraph"},{"text":"昨天总理接见你们，谈了抓革命促生产的问题，你们可以研究一下。","type":"paragraph"},{"text":"打倒刘邓陶！","type":"paragraph"},{"text":"毛主席的革命路线胜利万岁！","type":"paragraph"},{"text":"伟大的领袖毛主席万岁！","type":"paragraph"},{"text":"伟大的毛泽东思想万岁！","type":"paragraph"}],"comments":[],"origin":"国务院财贸系统革命造反联络委员会主办《财贸红旗》 1967年8月30日第9期第3版","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"李先念","type":"人物"},{"name":"姚依林","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bf01e8b21a"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
