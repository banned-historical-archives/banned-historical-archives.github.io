script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"《红旗》23、24期合刊发表李先念文章《英雄的阿尔巴尼亚人民高举革命红旗胜利前进》同时发表《列宁论过渡时期的阶级斗争》和《曾经反对过修正主义的普列汉诺夫怎样堕　落成修正主义者?》","authors":[],"dates":[{"year":1962,"month":12,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京5日电】　今日出版的《红旗》杂志第二十三、二十四期合刊，发表了李先念的庆祝阿尔巴尼亚独立五十周年和解放十八周年的文章，题为《英雄的阿尔巴尼亚人民高举革命红旗胜利前进》。还发表了朱波、郑惠所写《列宁论过渡时期的阶级斗争》和吴江的题为《曾经反对过修正主义的普列汉诺夫怎样堕落成修正主义者?》两文。"},{"type":"paragraph","text":"《英雄的阿尔巴尼亚人民高举革命红旗胜利前进》一文说，阿尔巴尼亚人民的胜利，是经过了同帝国主义和现代修正主义的尖锐斗争而取得的。文章着重指出，阿尔巴尼亚党和政府一贯奉行和平的外交政策。阿尔巴尼亚人民处于社会主义阵营的西南前哨，对增强和捍卫社会主义阵营起了重大作用、文章说，正是由于阿尔巴尼亚劳动党和政府对当代重大国际问题坚持了马克思列宁主义的科学分析和正确的立场，因此，现代修正主义者对它发动了恶毒的攻击。"},{"type":"paragraph","text":"文章赞扬了中阿两党和两国人民在长期的共同斗争中结成的深厚的兄弟友谊、文章说，建立在马克思列宁主义和无产阶级国际主义原则基础上的中阿两党和两国人民的友谊和团结，是牢不可破的，是世界上任何力量所动摇不了的。"},{"type":"paragraph","text":"文章最后说，中国共产党人和中国人民坚定地相信，勤劳勇敢的阿尔巴尼亚人民，在以久经考验的领袖霍查同志为首的阿尔巴尼亚劳动党的正确领导下，发扬战斗的、革命，的光荣传统，高举马克思列宁主义的革命红旗，一定能够胜利地排除万难，在建设社会主义的事业中不断取得新的成就，并且在反对帝国主义、保卫世界和平的斗争中，在反对现代修正主义、保卫马克思列宁主义纯洁性的斗争中，作出更大的贡献。"},{"type":"paragraph","text":"《列宁论过渡时期的阶级斗争》一文，介绍了列宁关于从资本主义到共产主义这一整个过渡时期的阶级斗争的理论。文章指出，在整个过渡时期，阶级斗争以各种不同形式存在着。还有资产阶级复辟的危险。必须坚持无产阶级专政，才能击败资产阶级的复辟阴谋，保证社会主义、共产主义建设的最终胜利。文章还指出，毛泽东同志关于过渡时期阶级斗争的理论，同列宁的思想是完全符合的。"},{"type":"paragraph","text":"《曾经反对过修正主义的普列汉诺夫怎样堕落成修正主义者?》一文指出，普列汉诺夫之转上机会主义立场，除了他原来在理论上存在着许多非马克思主义的观点和不彻底性之外，更重要的还在于他在政治上以至理论上都没有超出第二国际、和平时期的领袖的局限。这特别表现为理论和革命的实践相脱节，哲学和政治相脱节。文章分析和批判了普列汉诺夫在背叛了马克思主义以后对马克思主义的歪曲和攻击，分析批判了他怎样把辩证唯物主义变成最恶劣的诡辩论，怎样彻底背弃了马克思主义的历史唯物主义和无产阶级革命、无产阶级专政的原理。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"李先念","type":"人物"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8ecf8cfadd"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
