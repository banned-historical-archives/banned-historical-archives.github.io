script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"我政协全国委员会致电老挝爱国战线党热烈祝贺老挝革命节二十周年老挝人民正义斗争支援和鼓舞了全世界被压迫民族和人民的革命斗争　中国人民决同老挝人民一道为反对美帝和现代修正主义作出最大努力","authors":[],"dates":[{"year":1965,"month":10,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京11日电　中国人民政治协商会议全国委员会今天打电报给老挝爱国战线党中央委员会，热烈祝贺老挝革命节二十周年。电文如下:"},{"type":"paragraph","text":"老挝爱国战线党中央委员会:"},{"type":"paragraph","text":"在老挝革命节二十周年的时候，中国人民政治协商会议全国委员会谨向老挝爱国战线党和老挝人民致以最热烈的祝贺!二十年来，英雄的老挝人民，为了争取和维护民族独立，同帝国主义及其走狗进行了英勇的斗争，取得了辉煌的胜利。"},{"type":"paragraph","text":"目前，全世界人民的主要敌人美帝国主义正在疯狂地扩大对印度支那各国人民的侵略战争，美国侵略者及其走狗在老挝发动凶恶的政治和军事冒险，现代修正主义者也在玩弄阴谋为美帝国主义效劳；英雄的老挝人民在老挝爱国战线党的领导下，发扬光荣的革命传统，坚持正确的路线，针对它们的阴谋和挑衅，进行着不屈不挠的斗争。我们深信，老挝人民的正义斗争，必将取得最后的胜利。老挝人民的斗争和胜利，是对维护印度支那和亚洲的和平与安全的巨大贡献，同时也支援和鼓舞了全世界被压迫民族和被压迫人民的革命斗争。我们对英雄的老挝人民表示最崇高的敬意。"},{"type":"paragraph","text":"中国人民坚决支持老挝人民的正义斗争，坚定不移地同兄弟的老挝人民一道，为反对美帝国主义及其走狗和现代修正主义，为实现老挝人民的民族团结和正义要求作出最大的努力。"},{"type":"paragraph","text":"祝中、老两国人民的友谊万古长青!"},{"type":"paragraph","text":"中国人民政治协商会议全国委员会"},{"type":"paragraph","text":"一九六五年十月十一日"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cf2ee73515"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
