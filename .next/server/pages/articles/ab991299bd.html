script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"资产阶级“社会科学”要不要研究?","authors":["林涧青"],"dates":[{"year":1957,"month":10,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"资产阶级的“社会科学”今后能不能研究?还要不要研究?我们说，不但可以研究，而且需要研究。"},{"type":"paragraph","text":"研究资产阶级的各种社会政治学说，并且彻底地加以批判，是哲学社会科学工作者今后的一个重要工作。右派说，我们反对资产阶级“社会科学”复辟的斗争违反了“百家争鸣”的政策。这是一种卑鄙的诬蔑。“百家争鸣”指的是人民内部各种不同学派和不同学术见解的自由争论，这是保证科学和艺术的繁荣和进步的政策，是保证马克思列宁主义理论丰富和发展的政策。右派所主张的，所号召的，所实行的，并不是恢复这一门或那一门资产阶级“社会科学”的研究或教学，而是要全面地恢复资产阶级反动的“社会科学”在中国的统治地位或领导地位。"},{"type":"paragraph","text":"右派所要使之复辟的所谓“社会科学”既然是旧中国半殖民地半封建的经济制度的一种上层建筑，那么就一定要有它所赖以生存和它为之服务的基础。有这个基础，它才能起应有的作用。从更根本的意义上说，要实现资产阶级“社会科学”的复辟，非同时实现资本主义制度的复辟不可，否则所谓资产阶级“社会科学”，仍然只是一种没有经济基础的飘在半空中的东西。这就是资产阶级“社会科学”的复辟和资本主义制度的复辟之间的关系。我们所以把右派恢复资产阶级“社会科学”的活动，看做是一种严重的政治阴谋，大张旗鼓地加以批判，使之彻底粉碎，其根本原因也就在这里。"},{"type":"paragraph","text":"(摘录“学习”第20期“在社会科学问题上我们和右派争论些什么?”作者:林涧青)"}],"comments":[],"origin":"“学习”","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ab991299bd"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
