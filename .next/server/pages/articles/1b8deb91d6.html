script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"毛主席语录是触及人们灵魂的铭言　一位日本朋友天天阅读《毛主席语录》","authors":[],"dates":[{"year":1967,"month":1,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席语录是触及人们灵魂的铭言"},{"type":"paragraph","text":"一位日本朋友天天阅读《毛主席语录》"},{"type":"paragraph","text":"据新华社二十日讯 “毛主席语录不仅仅是中国朋友们的，也是世界人民的”。一位名叫村田修的日本朋友，在广州得到了一本《毛主席语录》。他如获至宝，高兴万分，发出了这样赞美的声音。"},{"type":"paragraph","text":"来广州参加一九六六年秋季中国出口商品交易会的村田修，在一个星期天，会见了广州五中红卫兵。他在给红卫兵写的一封感谢信中说："},{"type":"paragraph","text":"“我不懂中国话，但是，我从到广州来工作的人员那里获得了一本日文版的《毛主席语录》。我天天读，打开任何一页，都是触及人们灵魂深处的铭言，活生生的字，一个个由书本中飞入我的脑海里。我认为毛主席语录不仅仅是中国朋友们的，也是世界人民的。”"},{"type":"paragraph","text":"“毛主席说：‘我们大家要学习他毫无自私自利之心的精神。从这点出发，就可以变为大有利于人民的人。一个人能力有大小，但只要有这点精神，就是一个高尚的人，一个纯粹的人，一个有道德的人，一个脱离了低级趣味的人，一个有益于人民的人。’”村田修写道，他从毛主席的这段话里得到了为人民服务的体会。"},{"type":"paragraph","text":"“林彪说：‘读毛主席的书，听毛主席的话，照毛主席的指示办事。’我也读《毛主席语录》，我感到林彪的教导很正确。”"},{"type":"paragraph","text":"村田修在信中还热情赞扬红卫兵。他写道："},{"type":"paragraph","text":"“昨晚，我怎么也睡不着，你们的纯洁的灵魂好似震动了我的热血！我一上床蒙上眼，红卫兵朋友们的脸容就像走马灯一样，一个个涌现在我的眼前。并对我说：‘日本朋友们，可勿忘记真理啊！为了真正的世界和平，为了民族解放，为了人民民主主义，为了社会主义的胜利而努力吧！’"},{"type":"paragraph","text":"“我因贸易关系，至今已几次来到中国。我在和红卫兵朋友们交谈中，懂得了革命第一，政治第一。"},{"type":"paragraph","text":"“日本是一个风光美丽的国家，但是今天的日本遭到美帝国主义的侵略。一想到今天的日本，我就想起了充满着希望、光辉而又美好的理想的你们。"},{"type":"paragraph","text":"他写道：“昨晚由于感激满怀，整夜不能入眠。我从心坎上向你们宣誓：一定向日本青少年正确地报告中国青少年的想法；把与红卫兵朋友们会见后这一感激传告给更多的日本朋友。”"},{"type":"paragraph","text":"村田修在信的最后写道：“让我们为实现没有帝国主义、没有资本主义、没有剥削制度的新的美好的世界而奋斗吧！”"},{"type":"paragraph","text":"“毛主席万岁！日中两国人民友好万岁！”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"林彪","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1b8deb91d6"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
