<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"259053b8-c23b-40e9-95d0-63476a3bc6c8","name":"江青陈伯达在北京大学的讲话（1966.7.23）","internal":false,"official":false,"type":"img","author":"江青、陈伯达，1966.7.23，中国人民大学“大唤大叫”战斗队转抄、上海毛棉行业红卫军委员会翻印","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/259053b8-c23b-40e9-95d0-63476a3bc6c8/1.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/259053b8-c23b-40e9-95d0-63476a3bc6c8/2.jpg"],"article":{"title":"江青陈伯达在北京大学的讲话","alias":"","parts":[{"type":"paragraph","text":"江青同志七月二十三日在北京大学的耕话革命同学们："},{"type":"paragraph","text":"我和陈伯达同志是来做小学生的，我和他一块来听同志们的意见，看一看你们的大字报·这样我们可以多懂得事，少犯点错，跟同志们一起来搞文化大草命·我们是一块的，不是离你们·你们什么时候有意见叫我们来，我们立即来，现在我们了解还不够，还提不出什么意见来。总之，一片大好形势你们的革命热情是好的，干动是好的，我们都站在你们草命派一边，草命是大溶炉，最能炼人，革命派跟我们在一起，群不草命，就走开，我们站在革命派一边。"},{"type":"paragraph","text":"我们听，你们昨天一夜没有睡好，在，我们想来听听你们的，可是来了就不行了，希望你们今夜好好睡觉，吃好睡好，才能打好这一仗。"},{"type":"paragraph","text":"现在请陈佰达同志耕话。我们一定把同志们的革命热情，革命干劲带给毛主席！"},{"type":"paragraph","text":"中国人民大学《大唤大叫》战斗队转抄"},{"type":"paragraph","text":"上海毛棉行业缸卫军委会翻印"},{"type":"paragraph","text":"一九大七一·二十六·"},{"type":"paragraph","text":"陈伯达同志七月二十三日在北京火学的#站"},{"type":"paragraph","text":"才江害同志新的品，也是代泰文化革命小租甜的话，我完全同意江青同忘的讲话。我们是来向你们学习的，学习你们的斗争经，在文化革命的斗争中，北大是在最前列，相信在党的领导下，在毛泽东思想指引下，一定能够愁精前进·"},{"type":"paragraph","text":"要听取不同意见，我们的意见是“六·一八以是反革命享件是不对的是错的。"},{"type":"paragraph","text":"希望大家在斗争中好好学习毛主席若作，学习他怎样分析情兄的在文化大革命中，我们要掌握毛泽东恩想武器，好好学习毛主席者作·草命道路是不平坦的是会有反复·“大，一入”以前，以后在这几天，不就是有儿个反复变化？这明英命道路是曲折的是有反复的"},{"type":"paragraph","text":"毛主席万岁【万岁！万万岁"},{"type":"paragraph","text":"毛泽东思想万岁！"},{"type":"paragraph","text":"中国人民大学之大大叫》战斗队上海毛棉行业社卫军委负会翻印"},{"type":"paragraph","text":"二九六七·一二十大在的注重任但的"},{"type":"paragraph","text":"路韩抄"},{"type":"paragraph","text":"毛泽东思想万岁！"},{"type":"paragraph","text":"中国人民大学之大大叫》战斗队上海毛棉行业社卫军委负会翻印"},{"type":"paragraph","text":"二九六七·一二十大在的注重任但的"},{"type":"paragraph","text":"路韩抄"}],"authors":["江青","陈伯达"],"dates":[{"year":1966,"month":7,"day":23}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":2},"tags":[{"name":"江青","type":"人物"},{"name":"陈伯达","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"上海文革","type":"人物"},{"type":"文稿类型","name":"发言"}]},{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"江青陈伯达在北京大学的讲话","authors":["江青","陈伯达"],"dates":[{"year":1966,"month":7,"day":23}],"is_range_date":false,"parts":[{"text":"江青陈伯达在北京大学的讲话","type":"title"},{"text":"江青陈伯达","type":"authors"},{"text":"〖时间：晚10∶00左右，地点：大饭厅〗","type":"appellation"},{"text":"陈伯达：","type":"subtitle"},{"text":"我们是来看大字报的，是来研究北京大学的文化大革命发展过程情况的，来看看你们提了什么不同意见，看看你们怎样提问题的，来向你们学习，研究一下你们怎样进行辩论。","type":"paragraph"},{"text":"我是你们的学生，你们的热情非常好，这种革命精神是最可宝贵的。可是我们在看大字报，你们一围，大字报就看不成了，你们要给我们一个学习机会嘛！","type":"paragraph"},{"text":"任何工作要做好，文化大革命也一样，都必须先做学生，再做先生。我们也是这样，在大辩论中互相做学生，互相做先生。先做学生，再做先生，才能把辩论搞好，要讲事实，摆道理，讲道理。","type":"paragraph"},{"text":"北大同学要从主席的学习工作方法中吸取力量，把文化大革命搞好。现在我要当学生去了！","type":"paragraph"},{"text":"〖时间：夜里十二点，地点：燕南园前。〗","type":"appellation"},{"text":"江青同志：","type":"subtitle"},{"text":"我和陈伯达同志是来做小学生的，我是和他一起来听一听同志们的意见，看一看你们的大字报，这样我们可以懂点事，少犯错误，和同学们一快来进行这一场文化大革命。我们是一快的，不会脱离你们的。你们什么时候说有意见，要我们来听，我们就立刻来。现在我们了解得还不够多，提不出什么具体的意见。但是一片大好形势，你们的革命热情是好的，干劲是好的，我们都站在你们革命派这边。革命是个大熔炉，最能锻炼人了，谁不革命谁就走可，革命的跟我们站在一快。我听说你们一夜没有睡，在辩论，今天也在辩论，本来是想来听一听你们的辩论的，可是一来了就不行了。所以，我希望你们今晚好好睡，吃好，睡好，才能打好这一仗。好，现在请陈伯达同志讲几句。","type":"paragraph"},{"text":"陈伯达同志：","type":"subtitle"},{"text":"刚才江青同志讲的话，就是我们文化革命小组向大家讲的话，我完全同意她的话，我们还想继续来这里向你们学习，学习你们的斗争经验。在这个文化革命斗争中，北京大学站在最前面。我想，你们一定会在党中央的领导下，在毛泽东思想的指导下，继续前进。我讲点个人意见：对于“六·一八”这个事情，说是个反革命事件，是不对的，是错误的。这是我个人给大家讲这么一点。我希望大家在这个斗争中好好学习毛主席著作，学习他怎么分析阶级，分析情况，把我们中国的革命一步一步地引导到胜利的道路。在文化革命中，要掌握毛泽东思想这个武器，好好学习毛主席著作，看他是怎么领导革命的。我们怎样才能在这个运动中做好工作。革命的道路是不平坦的，听懂了吗？（听懂了）是曲折的。是会有一些反复的，这个，比如你们就有些反复，“六·一八”以前和以后，以及到最近这几天，是一反复。是不是？是有变化的嘛！斗争是曲折的，革命的道路不是平坦的，斗争是曲折的，斗争总会胜利！","type":"paragraph"},{"text":"毛主席万岁！","type":"paragraph"},{"text":"毛泽东思想万岁！","type":"paragraph"},{"text":"江青同志最后讲：我一定把同志们的革命热情，革命干劲带给毛主席。再见了！","type":"paragraph"}],"comments":[],"origin":"来源：北京航空学院红旗战斗队《无产阶级文化大革命运动中首长讲话》（1966.11）；来源：一九六六年十月中央教育部八•一八红卫兵总部编印《无产阶级文化大革命运动期间中央及有关负责同志讲话（选编 ）》（第一集）","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"江青","type":"人物"},{"name":"陈伯达","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"发言"}]},{"id":"jqjianghua","type":"pdf","name":"江青十年讲话汇编","internal":false,"official":false,"author":"江青，本世纪初国内老左编","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/jqjianghua.pdf"],"article":{"title":"江青陈伯达在北京大学的讲话","description":"","dates":[{"year":1966,"month":7,"day":23}],"parts":[{"text":"江青陈伯达在北京大学的讲话","type":"title"},{"type":"paragraph","text":"〖时间：晚 10∶00左右，地点：大饭厅〗"},{"type":"appellation","text":"陈伯达："},{"type":"paragraph","text":"我们是来看大字报的，是来研究北京大学的文化大革命发展过程情况的，来看看你们提了什么不同意见，看看你们怎样提问题的，来向你们学习，研究一下你们怎样进行辩论。"},{"type":"paragraph","text":"我是你们的学生，你们的热情非常好，这种革命精神是最可宝贵的。可是我们在看大字报，你们一围，大字报就看不成了，你们要给我们一个学习机会嘛！"},{"type":"paragraph","text":"任何工作要做好，文化大革命也一样，都必须先做学生，再做先生。我们也是这样，在大辩论中互相做学生，互相做先生。先做学生，再做先生，才能把辩论搞好，要讲事实，摆道理，讲道理。"},{"type":"paragraph","text":"北大同学要从主席的学习工作方法中吸取力量，把文化大革命搞好。现在我要当学生去了！"},{"type":"paragraph","text":"〖时间：夜里十二点，地点：燕南园前。〗"},{"type":"appellation","text":"江青同志："}],"comment_pivots":[],"is_range_date":false,"authors":["江青","陈伯达"],"comments":[],"page_start":18,"page_end":18,"alias":""},"tags":[{"name":"江青","type":"人物"},{"name":"陈伯达","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ba919839cd"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
