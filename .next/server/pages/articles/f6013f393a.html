" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"毛泽东对高岗关于东北打虎计划报告的复电","authors":["毛泽东"],"dates":[{"year":1952,"month":2,"day":9}],"is_range_date":false,"parts":[{"text":"毛泽东对高岗关于东北打虎计划报告的复电","type":"title"},{"text":"毛泽东","type":"authors"},{"text":"高岗同志，并告各同志：","type":"appellation"},{"text":"二月六日电收到。（一）沈阳公审计划很好，请将各类处刑免刑犯人姓名、罪行和量刑轻重事先摘要电告中央，得复再行公审。公审应由最高法院东北分院主持，可以一审终结，不许上诉。应由最高检察署东北分署为起诉人，北京二月一日公审由各机关为起诉人，有些人认为不妥。（二）上述各点请各大行政区注意。（三）东北计划打大虎四千只，中小虎二万五千只，为全国六大区第一位。各大区虽然不能都向东北看齐，但要根据自己情况逐步提高预算，批判干部中的右倾思想。（四）各大行政区一级，省市区一级和专区一级军事机关应归各中央局、省市区党委和地委领导，统一制定和修改打虎预算，统一指挥打虎行动和研究打虎战术，但各级军事机关同时又有自己的指挥系统，二者分工而又统一，利于配合打虎。（五）个别单位（例如华北第十军的几个师）已出现用迫（逼）供信的方法打虎，结果打出的不是真虎而是假虎，冤枉了好人（已纠正）。各地如出现此种情况请予迅速纠正。","type":"paragraph"},{"text":" 毛泽东二月九日","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"高岗","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f6013f393a"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
