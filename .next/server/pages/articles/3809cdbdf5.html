script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"怎样计算富农剥削收入？","authors":["胡雨成　陶任珍"],"dates":[{"year":1948,"month":8,"day":31}],"is_range_date":false,"parts":[{"type":"paragraph","text":"怎样计算富农剥削收入？"},{"type":"paragraph","text":"编辑同志："},{"type":"paragraph","text":"我们在学习土改政策中遇到一个划成份问题，请予解答："},{"type":"paragraph","text":"凡剥削超过百分之二十五以上就算富农，但这百分之二十五应如何计算法？如一家五十亩地，每年收入四十石粮食，六口人，家里有两人参加主要劳动，另外雇长工一人，另外纺纱收入五石、放债收入二石，象这家是什么成份？如何计算剥削量？"},{"type":"paragraph","text":"华北党校胡雨成、陶任珍"},{"type":"paragraph","text":"△答：所谓“剥削超过百分之二十五即是富农”，是指一个农民的封建剥削收入超过其总收入的百分之二十五即四分之一并连续此种生活满三年者即构成富农条件，这里所谓总收入是指包括农副业在内的各种收入的总和，封建性的剥削收入，在雇工关系上，是指雇工正副生产物在扣除雇工的工资吃粮和雇工在生产中所消费的其他成本以后的剩余价值，在出租土地方面指地租，在债权关系上指高利贷。但在实际计算雇工的剥削收入时，为便利计，一般只扣除雇工的工资吃粮，而不扣除其他种籽肥料等不变资本的消耗。就你所举例子说：这家的总收入共四十七石。对雇工的剥削收入虽不能精确计算，但一般情况下，如果这家付给雇工的工资吃粮足以维持其生活，则只要雇主的劳动力在数量上和质量上相等时，其剥削收入一般为总收入的四分之一。这家劳力多于雇工劳力一倍，另外的剥削收入又不超过其总收入八分之一，故这家应是有轻微剥削的富裕中农，而非富农。但如果该户所占有的土地超过一般中农平均所有一倍或一倍以上二倍以下，则四分之一的剥削限度应降低二分之一。"},{"type":"paragraph","text":"——编者"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3809cdbdf5"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
