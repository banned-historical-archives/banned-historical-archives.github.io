" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"在青岛市人民代表大会上　陈仰之陆侃如等受到尖锐驳斥","authors":["叶予"],"dates":[{"year":1957,"month":10,"day":10}],"is_range_date":false,"parts":[{"text":"在青岛市人民代表大会上　陈仰之陆侃如等受到尖锐驳斥","type":"title"},{"text":"叶予","type":"authors"},{"text":"《人民日报》讯：在上月举行的青岛市第二届人民代表大会第二次会议上，展开了对陈仰之等资产阶级右派分子的激烈斗争。","type":"paragraph"},{"text":"代表和列席人员在会议进行期间，发挥了高度的政治积极性，许多人废寝忘食地在休息时间，赶写大会发言稿。有些人还早在会前就对右派分子的主要反动论点，作了系统的分析研究工作。在斗争中，工人、农民代表表现得最为突出和最有力量。解放前曾在右派分子刘朴斋经营的工厂作工的工人王宝之，在批驳刘朴斋散布“旧社会工人生活不如牛马，新社会工人和牛马一样”的恶毒诬蔑时，即以刘朴斋残酷压迫剥削工人的事实，和解放后工人政治地位、生活水平的提高进行了对比，把刘朴斋批驳得无容身之地，不得不当场低头认罪。中国科学院海洋生物研究所副所长张玺和山东大学副教务长郭贻诚等，对青岛市的右派头目陆侃如、陈仰之等作了深刻的、系统的揭发和批判。","type":"paragraph"},{"text":"在会议期间，全市百万市民密切注视着斗争的进展情况，成百封信件或揭发材料送到会场。会内会外互相配合，形成了一个反右派斗争的浩大声势。","type":"paragraph"},{"text":"现在，章罗联盟在青岛的据点——陈仰之反共集团已被摧毁；反共集团骨干分子陆侃如及其反动伙伴的阴谋活动已昭然若揭；陈铭枢反党集团在青岛的代理人徐一贯、王桂浑等，也不得不向人民低头认罪；“洋奴”黄元吉的亲美反苏的反动言论，也被批驳得体无完肤。","type":"paragraph"},{"text":"所有与会代表和列席人员，通过这次会议受到了一次极其深刻的社会主义教育。","type":"paragraph"},{"text":" ——原载《人民日报》1957年10月10日。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"912e7f6945"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
