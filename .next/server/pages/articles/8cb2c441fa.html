script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"wenji1","type":"pdf","name":"毛泽东文集第一卷（1999）","internal":false,"official":true,"author":"中央文献研究室","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/wenji1.pdf"],"article":{"title":"给叶剑英、刘鼎的信","description":"","dates":[{"year":1936,"month":10,"day":22}],"parts":[{"text":"给叶剑英、刘鼎的信","type":"title"},{"type":"appellation","text":"剑、鼎二兄："},{"type":"paragraph","text":"经济甚紧，外面用费须节省又节省，千万不可过费。无论何时不要丧失我们的立场，不要接受别人的馈赠。只有到了万不得已时，才允许向别人借一点钱用，日后如数归还。一切用费均须报账。因近日接连发生几件浪费事，故向二兄指出此点。并请向雪枫、理治及其他做统一战线工作的同志随时提出对此问题的警觉。苦久了的人难免见风华而把握不住，故应作为一个问题，对同志做教育与警戒的工作。"},{"type":"paragraph","text":"要买一批通俗的社会科学自然科学及哲学书，大约共买十种至十五种左右，要经过选择真正是通俗的而又有价值的（例如艾思奇的《大众哲学》，柳湜的《街头讲话》之类），每种买五十部，共价不过一百元至三百元，请剑兄经手选择，鼎兄经手购买。在十一月初先行选买几种寄来，作为学校与部队提高干部政治文化水平之用。在外面的人，一面工作，一面要提倡看书报。"},{"type":"paragraph","text":"买来的军事书多不合用，多是战术技术的，我们要的是战役指挥与战略的，请按此标准选买若干。买一部《孙子兵法》来。"},{"type":"paragraph","text":"请你们写一个带分析性与综合性的报告来。"},{"type":"paragraph","text":"润之"},{"type":"paragraph","text":"十月二十二日"},{"type":"paragraph","text":"根据人民出版社一九八三年出版的"},{"type":"paragraph","text":"《毛泽东书信选集》刊印。"}],"comment_pivots":[{"part_idx":0,"offset":7,"index":1},{"part_idx":2,"offset":112,"index":2},{"part_idx":2,"offset":115,"index":3},{"part_idx":3,"offset":56,"index":4},{"part_idx":3,"offset":66,"index":5}],"is_range_date":false,"authors":["毛泽东"],"comments":["叶剑英（一八九七——一九八六），广东梅县人。当时受中国共产党委派在西安做统一战线工作。刘鼎（一九○三——一九八六），四川南溪人。当时受中国共产党委派在红军与东北军之间做联络工作。","雪枫，即彭雪枫（一九○七——一九四四），河南镇平人。当时受中国共产党委派在山西、绥远（今属内蒙古自治区）等地做统一战线工作。","理治，即朱理治（一九○七——一九七八），江苏南通人。当时是中国共产党派驻东北军的特派员。","艾思奇（一九一○——一九六六），云南腾冲人。当时是上海《读书生活》杂志编辑。他的《大众哲学》是一本宣传马克思主义哲学的通俗著作。","柳湜（一九○三——一九六八），湖南长沙人。三十年代在上海、汉口、重庆等地从事中国共产党领导的文化工作，曾任《读书生活》、《生活日报》、《全民抗战》等报刊编委、主编。《街头讲话》是他写的一本介绍社会科学知识的大众读物。"],"page_start":466,"page_end":467,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8cb2c441fa"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
