script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"无产阶级和资产阶级的斗争，归根结底是夺权与反夺权的激战，财贸战线的革命派表决心，一定要:念念不忘无产阶级专政　彻底粉碎反革命复辟阴谋","authors":[],"dates":[{"year":1968,"month":3,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"李永藻(市第一商业局):"},{"type":"paragraph","text":"文艺战线上的阶级斗争不是孤立存在的现象，而是反映了整个社会上无产阶级和资产阶级之间一场你死我活的阶级搏斗。我们财贸系统，同样存在着复辟与反复辟的斗争。"},{"type":"paragraph","text":"上海财贸战线在市革命委员会直接关怀下，开始揭开了阶级斗争盖子。从揭发出来的问题看，阶级敌人把革命的口号接过去，大干反革命勾当，打着“造反”的旗号，千方百计钻进革命群众组织，进行挖心战。他们刮起了一股翻案风，妄图进行反攻倒算。每当关键时刻，都疯狂地跳出来向我们进攻。"},{"type":"paragraph","text":"在成立革命委员会的时候，他们玩弄两面派手法，一方面制造派性，破坏革命三结合，一方面又削尖脑袋，钻进领导班子。还搞什么“地下常委”，研究反革命策略，制造反革命事件。在整党中，他们又借大批判为名，把矛头针对党团员，拼命朝党团员脸上抹黑。甚至企图把他们的爪牙、亲信塞到党的核心里来，阴谋篡夺党权。在清理阶级队伍中，他们又大放烟幕弹，包庇走资派，诬蔑我们揪坏人是执行“新的资产阶级反动路线”，是“支持保守派，整造反派”，更为恶毒的是，这些坏蛋竟对敢于起来揭露他们问题的革命派战士，实行白色恐怖，私设刑房，进行拷打，是可忍，孰不可忍!"},{"type":"paragraph","text":"毛主席教导我们:“世界上一切革命斗争都是为着夺取政权，巩固政权。”我们和阶级敌人的斗争，归根结蒂是一场夺权与反夺权的斗争。我们要念念不忘巩固无产阶级专政，狠　狠地向阶级敌人放火开炮!"},{"type":"paragraph","text":"乐鸿昌(市粮食局):"},{"type":"paragraph","text":"正当我们夺取无产阶级文化大革命全面胜利的时候，天津的革命派进一步揭开了文艺战线的阶级斗争的盖子，这是毛泽东思想的胜利!资产阶级妄图用文艺作为资本主义复辟的温床，向无产阶级进行反夺权，这是绝对办不到的!"},{"type":"paragraph","text":"当前，阶级斗争是十分尖锐复杂的，从各方面都表现出来，比如，在评选活学活用毛泽东思想积极分子代表中，也充满了惊心动魄的阶级斗争。我局第一粮食采购供应站在评选卢大保同志时，就遭到了种种阻力，这再一次地向我们敲起警钟:“千万不要忘记阶级斗争。”"},{"type":"paragraph","text":"敢不敢狠抓阶级斗争，对我们每一个单位的革命同志来说，都是一场新的考验。我们一定要高举毛泽东思想的伟大红旗，向阶级敌人发动猛烈的进攻，夺取无产阶级文化大革命的全面胜利!"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"革命委员会","type":"主题/事件"},{"name":"派性","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"name":"清理阶级队伍","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3c5dc3acec"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
