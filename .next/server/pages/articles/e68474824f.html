<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"歌颂伟大的毛泽东思想的新胜利  高唱无产阶级文化大革命的战歌  宝鸡工农兵音乐会向反党反社会主义黑线开火","authors":[],"dates":[{"year":1966,"month":6,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"歌颂伟大的毛泽东思想的新胜利"},{"type":"paragraph","text":"高唱无产阶级文化大革命的战歌"},{"type":"paragraph","text":"宝鸡工农兵音乐会向反党反社会主义黑线开火"},{"type":"paragraph","text":"新华社西安二十日电  陕西省宝鸡市最近举行了工农兵歌唱无产阶级文化大革命音乐会。三千多名工人、农民、解放军战士、青年学生和少年儿童，登台表演，显示了无产阶级文化大革命主力军的强大威力。他们带着深厚的阶级感情，衷心地歌颂党中央和毛主席，歌颂毛泽东思想；他们充满着高昂的斗志，大唱文化大革命的战歌，向反党反社会主义黑帮开火。广大观众说：这是一次歌颂毛泽东思想新胜利的音乐会，是歌颂无产阶级革命的音乐会，是横扫反党反社会主义牛鬼蛇神的音乐会。"},{"type":"paragraph","text":"音乐会在全体齐唱《东方红》的歌声中开始。宝鸡地区铁路职工合唱团演唱的《伟大的国家伟大的党》《万岁共产党，万岁毛主席》，情绪饱满，感情真挚。新秦纺织厂演出的《毛主席著作象太阳》表演唱，生动地反映了纺织工人对毛主席的崇敬和信仰。由一百多名贫下中农青年组成的长寿公社金陵大队的农民演唱队，其中许多是学习毛主席著作积极分子、五好团员和五好青年，他们表演了《我们这一代》等三首歌曲，唱出了青年一代，在毛泽东思想哺育下健康成长的革命豪情。宝鸡市公安大队战士演出的《毛主席的战士最听党的话》，朴实地反映了战士对毛主席的无限忠诚和革命的乐观精神。"},{"type":"paragraph","text":"广大工农兵群众把参加音乐会当做是参加社会主义文化大革命的战斗行动。他们怀着强烈的阶级感情，把每首歌当做射向反党黑帮的一颗子弹。他们演唱的《向黑线开火》、《将革命进行到底》、《不获全胜，决不收兵》等歌曲，都体现了他们对阶级敌人的刻骨仇恨和将社会主义革命进行到底的决心，每一首歌都充满着批判旧世界、建设新世界的强烈的战斗激情。正在紧张夏收的长寿公社金陵大队的合唱队员，放下了镰刀，赶来参加音乐会。社员罗群说：“我们是来唱歌的，我们也是来战斗的，要把每一首歌子当做子弹，向反党反社会主义的黑线开火，他们诬蔑毛主席，我们就歌唱毛主席。”学习毛主席著作积极分子傅金昌说：“我们要用歌声向资产阶级‘权威’猛烈开火，揭露那些牛鬼蛇神的反动嘴脸。他们要演‘帝王将相’、‘才子佳人’，我们就偏要演工农兵，演王进喜，唱大寨人。工农兵一定要占领革命的思想文化阵地。”"},{"type":"paragraph","text":"在这次音乐会上，充分表现了工农兵在创作和表演方面的文艺天才。建筑工程部五局二公司业余演出队演出的小歌舞《建筑工人心向党》，受到了广大观众的赞赏。创作这个节目的就是手提斧子、泥刀的二十多个工人。他们演自己，唱自己，感情真挚，活灵活现。为了创作出这个节目，工人朱志明等反复学习了毛主席《在延安文艺座谈会上的讲话》，信心百倍地拿起了笔，自己编，自己演。工人们说：“学习了毛主席著作，心明眼亮斗志坚，怕什么重担压双肩，怕什么牛鬼蛇神称恶顽……赤胆忠心干革命，高举红旗永向前！”"},{"type":"paragraph","text":"音乐会七十多个节目，持续了四个小时。从始到终充满着热烈战斗的气氛。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e68474824f"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
