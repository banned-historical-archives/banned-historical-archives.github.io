script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"抗议拉赫曼集团的残酷剥削和压迫　马来亚雪兰莪州农民举行示威　示威农民与前来镇压的反动警察进行了英勇斗争","authors":[],"dates":[{"year":1968,"month":8,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"抗议拉赫曼集团的残酷剥削和压迫"},{"type":"paragraph","text":"马来亚雪兰莪州农民举行示威"},{"type":"paragraph","text":"示威农民与前来镇压的反动警察进行了英勇斗争"},{"type":"paragraph","text":"新华社十二日讯　新加坡消息：“马来西亚”拉赫曼傀儡集团对农民的残酷压迫和剥削，激起了农民群众的反抗。"},{"type":"paragraph","text":"据新加坡报纸十一日报道，马来亚雪兰莪州适耕庄地区的农民为抗议拉赫曼集团强行压低谷价剥削农民的反动措施，在八日举行了示威游行。示威的农民举着谴责拉赫曼集团的标语牌，在公路上焚烧了五十包稻谷，并与前来镇压的反动警察进行了英勇的斗争。"},{"type":"paragraph","text":"马来亚劳工党八日发表声明，表示支持适耕庄农民的正义斗争。"},{"type":"paragraph","text":"马来亚广大农民在英美帝国主义及其走狗拉赫曼傀儡集团的统治下，长期生活在水深火热之中。“马来西亚”不管部长加法尔不久前也不得不承认，在吉打和玻璃市两州，就有百分之七十的稻农靠借高利贷度日。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"18a09ee159"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
