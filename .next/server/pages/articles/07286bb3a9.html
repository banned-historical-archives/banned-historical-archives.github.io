" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoistlegacy.de-2001","name":"中央关于保守党与国家机密奖惩暂行规定","author":"中共中央","internal":false,"official":false,"type":"unknown","files":[],"article":{"title":"中央关于保守党与国家机密奖惩暂行规定","dates":[{"year":1951,"month":5}],"is_range_date":false,"authors":["中共中央"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"中共绵阳地委组织部，纪律检查工作文件选编，44-45","tags":[{"name":"党籍","type":"主题/事件"},{"name":"开除","type":"主题/事件"}],"parts":[{"type":"title","text":"中央关于保守党与国家机密奖惩暂行规定"},{"type":"subtitle","text":"(一九五一年五月)"},{"type":"paragraph","text":"第一条 为严明赏罚，保证一九五〇年十月十五日“中央关于加强保守党与国家机密的决定”。一九五一年五月二十八日“中央关于加强保守党与国家机密的补充决定”及政务院颁布之“保守国家机密暂行条例”的贯彻执行，特制定本办法。"},{"type":"paragraph","text":"第二条 凡有下列表现之一者，应予以奖励"},{"type":"paragraph","text":"一、在敌人面前英勇不屈，坚守党与国家机密者。"},{"type":"paragraph","text":"二、在任何危险情况下，不顾艰险，保全党与国家机密者。"},{"type":"paragraph","text":"三、对盗窃党与国家机密分子能及时检举者。"},{"type":"paragraph","text":"四、发现泄露党与国家机密事件能及时检举与补救者。"},{"type":"paragraph","text":"五、一贯遵守保密制度，并推动他人遵守保密制度有显着成绩者。"},{"type":"paragraph","text":"第三条 凡有下列各项泄密失密事件，应分别性质、原因及对党与国家危害程度，根据党章第六十四条规定之“当面的劝或警告；当众的劝告或警告；撤销工作；留党察看；开除党籍”，视情节轻重，分别予以惩处。"},{"type":"paragraph","text":"一、明知系党与国家机密，擅自向规定范围以外之人员有意泄露者。"},{"type":"paragraph","text":"二、不遵守批准制度，擅设电台、擅造密码者。"},{"type":"paragraph","text":"三、不经组织部门、人事部门审查批准，滥用各种机要工作人员者。"},{"type":"paragraph","text":"四、对保密一贯采取自由放任态度，屡次发生泄密、失密及违反保密制度、保密纪律，屡教不改者。"},{"type":"paragraph","text":"五、泄漏机密或遗失密件隐瞒不报者。"},{"type":"paragraph","text":"六、遗失印信及一切有关党与国家机密的电报、密码、文件、函件、资料、统计、数字、图表者。"},{"type":"paragraph","text":"七、编辑图书、报刊或内部刊物泄漏党与国家机密者。"},{"type":"paragraph","text":"八、传达会议内容，超越规定范围致泄漏党与国家机密者。"},{"type":"paragraph","text":"九、接谈、通信中泄漏党与国家机密者。"},{"type":"paragraph","text":"十、其他一切泄漏、遗失党与国家机密者。"},{"type":"paragraph","text":"第四条 凡犯有“保守国家机密暂行条例”第十三条第十四条所列行为之一者，开除党籍并即按照该条例规定办理，不在本办法惩治之列。"},{"type":"paragraph","text":"第五条 省以上各级党委及重要部门可根据本办法的原则规定，按照各该地区各该部门的实际情况制定更具体的奖惩办法报请中央批准后执行。"},{"type":"paragraph","text":"第六条 本办法自公布之日起施行。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"07286bb3a9"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
