script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"这里也有“奴隶战争”","authors":[],"dates":[{"year":1981,"month":6,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"生物学家惊奇地发现，蚂蚁社会中竟也有“奴隶战争”!最早观察和描述蚂蚁“奴隶战争”的，是进化论的创始人达尔文。"},{"type":"paragraph","text":"近来，美国哈佛大学著名动物学家威尔逊认为:蚂蚁的“奴隶战争”并不仅仅限于掠夺异巢蚁卵和幼虫，它们无论在小规模的“领土争端”与大规模的战争冲突中，都直接捕捉对方的蚂蚁来作为自己一方的奴隶，并且专为捕捉奴隶而发动名副其实的奴隶战争。为了验证威尔逊的这一观点，加拿大多伦多大学阿尔维博士做了一个很有趣的实验。他饲养了三种不同种的蚂蚁，使它们分成许多巢，然后把它们两巢一组地组成九种不同组合(每一组合中都是一方的数目大于另一方)。他把食物放置在每两巢蚂蚁的中间地带，结果九个组合都发生了蚂蚁战争。六天后检查了蚁巢，发现每一巢中都有俘获来的奴隶，它们“俯首贴耳”地充当苦力，并无反抗的表示。　(摘自北京《知识就是力量》一九八一年第四期)"}],"comments":[],"origin":"《知识就是力量》","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f8c4b139a2"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
