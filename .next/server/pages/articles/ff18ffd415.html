script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"资产阶级思想侵蚀了重庆文艺界","authors":[],"dates":[{"year":1952,"month":4,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"重庆文艺界受了腐化堕落的资产阶级思想的侵蚀。在重庆戏剧的演出和形式上只讲究“堂皇”，有的为了想尽情地表现美国情调，竟毫不选择的在舞台中央，按上一大幅穿了游泳衣的美女广告。并且好大喜功，盲目醉心于外国大戏的上演，对紧密结合政治任务的独幕剧，不愿一顾，以致严重地脱离了工农兵的要求。同时，资产阶级唯利是图、追求名利的卑鄙思想，更十分恶劣地表现在创作上。如像重庆市文艺工作团创作室有的同志，将重庆女子师范学校师生集体创作的歌剧“苦出头”稍加改头换面，以“铁树开花牛打滚”的书名出版；有一作者又将老舍先生所作“纪念开国一周年”改成“庆祝开国两周年”在大众游艺园编辑的曲艺小丛书内出版了，仅在附注里说明“这唱词的首尾架子，和其中若干句是根据老舍先生‘纪念开国一周年’而成”。"},{"type":"paragraph","text":"这此事实说明了资产阶级的“名利”思想严重地腐蚀着文艺干部。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ff18ffd415"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
