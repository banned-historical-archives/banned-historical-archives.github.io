script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"破除资产阶级法权观念　坚持走“七·二一”光辉道路上海师大党委组织师生学习无产阶级专政理论，学习程立标大学毕业后回乡当农民的先进事迹，加快教育革命步伐","authors":[],"dates":[{"year":1975,"month":3,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　在认真学习毛主席关于理论问题的重要指示，学习马克思主义关于无产阶级专政理论的热潮中，近日来上海师范大学党委组织广大师生联系学习朝阳农学院教育革命经验，联系学校实际，宣传和学习生物系首届工农兵毕业生程立标坚持走“七·二一”道路，向资产阶级法权观念挑战的先进事迹，加快了教育革命的步伐。"},{"type":"paragraph","text":"程立标坚持走毛主席指引的“七·二一”道路，主动要求回乡当农民的思想和行动，是对资产阶级法权观念的有力批判。他的事迹给了全校师生以深刻的教育。生物系有些教师说:过去我们把毕业生分配到科学院、研究所，或者留校当教师，看作是高质量，打心里高兴。而对那些到基层、到农村去的，却认为是差劲的。程立标学农、爱农，在农村三大革命运动中不断发挥作用的事迹，使我们认识到过去那种看法是错误的。这是为农服务的思想没有扎根的一种表现，是资产阶级法权观念的一种暴露。这说明教师只有努力改造世界观，才能为巩固无产阶级专政搞好教育工作。生物系培训班的学员说:程立标以反潮流的精神，向资产阶级法权观念挑战，自觉地到农村去，以农为荣，以农为乐，以实际行动与资产阶级法权观念决裂。我们要向程立标学习，从巩固无产阶级专政的高度来处理学习、分配问题。生物系党总支和革委会领导成员几天来还召开会议，结合学习程立标坚持走“七·二一”道路的先进事迹，回顾前几年的教学工作，认真总结教育革命的经验教训，决心进一步树立为农服务思想，努力办好学农基地，培养出更多象程立标那样的学员来。"},{"type":"paragraph","text":"程立标的先进事迹，在全校师生员工中激起了强烈的反响，一封封洋溢着革命激情的决心书送到了校党委，工农兵学员们纷纷表示要坚决走毛主席指引的“七·二一”光辉大道。干校外语培训班学员、共产党员毕志恒说:过去我们干校外语培训班有些同学，由于受到社会上资产阶级法权观念的影响，总以为自己是知识青年中的“高档”，将来是住大城市的。学习了毛主席关于理论问题的重要指示以后，我们认识到，那种自以为“高档”的错误思想，是旧社会尸体散发出来的臭气，是产生新的资产阶级分子的思想基础，必须加以扫除。他们表示，决心坚持在农村办学，为将来毕业后到农村去，到最艰苦的地方去作好一切准备。理科有些工农兵学员学习了程立标的先进事迹后说:农村就是我们的家。我们来自农村，不忘农村，毕业后坚决要求回到农村去。有的学员家在城市，感到更应该到农村去锻炼。"},{"type":"paragraph","text":"最近，这个学校党委专门召开了全校师生员工大会，介绍了程立标坚持走“七·二一”道路的先进事迹，要求全校师生员工向程立标学习，进一步认真学好无产阶级专政的理论，为巩固无产阶级专政作出贡献。"},{"type":"paragraph","text":"(本报通讯　员)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"name":"教育革命","type":"主题/事件"},{"name":"反潮流","type":"主题/事件"},{"name":"限制资产阶级法权","type":"主题/事件"},{"name":"朝阳农学院","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b9f52c7fae"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
