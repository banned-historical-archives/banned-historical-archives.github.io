script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"叶剑英在中共中央华南分局第一次会议上的报告","authors":[],"dates":[{"year":1949,"month":9,"day":11}],"is_range_date":false,"parts":[{"text":"叶剑英在中共中央华南分局第一次会议上的报告","type":"title"},{"text":"【这是叶剑英在中共中央华南分局第一次会议上所作报告的一部分。】","type":"paragraph"},{"text":"中央提出八个问题，要我们进军广东之前，在赣州开会解决。中央提出的问题：1. 党、政、军领导机构的组成和人选。2. 作战计划。3. 接管广州的各种政策。4. 各级干部配备。5. 争取余汉谋和平解放广东。6. 货币政策。7. 外交方针和政策。8. 准备对付帝国主义的封锁。","type":"paragraph"},{"text":"前天中央又来了一个电报，说听到我们在赣州会合准备开会，甚为欣慰，希望我们根据中央迭次的指示，开会作出扼要决定，报告中央。其次还说，方方同志领导的华南分局及各地党委，在广东建立了人民武装，创造了根据地，作出很大的成绩。新的华南分局及准备入粤的兵团，对此应作足够的和适当的估计，使大家今后在工作上团结无间，互相学习，争取更伟大的胜利。","type":"paragraph"},{"text":"现在我们就遵照中央的指示来解决这些问题。首先我们要商量一下，对于这些问题我们准备召开几次会议来解决。关于作战问题，我、方方同志和两兵团的负责同志商量过，已经拟出了一个方案，俟报告中央批准后即可实施。其它问题，当前最急的是组织问题和支前工作问题，要首先解决。因此，我认为我们应该开三次会议，一次讨论组织问题，一次讨论支前工作问题，一次讨论接管广东的政策问题。此外，请再考虑是否要召开一次高干会和一次誓师大会。因为会师问题，现在是成了一个问题，我们应该对干部说明这个问题，团结很重要，一切困难都要靠团结才能解决。因此，开会谈谈这个问题，对教育干部是很必要的。其次在进军之前，举行一个誓师大会，发表誓师宣言，扩大影响，是否也有必要，会不会妨碍军事秘密，则请大家考虑一下。","type":"paragraph"},{"text":"其它还有什么问题，应该提出来在会议上讨论，请大家研究一下，尽量提出。","type":"paragraph"},{"text":"来源：广东叶剑英研究会、中共广东省委党史研究室　编：《叶剑英在广东》北京：中央文献出版社，1996年。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"acb56f8130"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
