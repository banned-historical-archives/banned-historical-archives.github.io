<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"怎样走好“五反”运动的第一步","authors":["《湖北日报》内部参考","新华通讯社"],"dates":[{"year":1963,"month":4,"day":19}],"is_range_date":false,"parts":[{"text":"怎样走好“五反”运动的第一步","type":"title"},{"text":"新华通讯社《湖北日报》内部参考","type":"authors"},{"text":"本刊讯　武汉市公安局、财政局、轻工业局、教育局、港务局等五个单位，从3月9日起，开始进行“五反”运动试点。到3月底止，除港务局、教育局外，其他三个单位已经结束了运动第一阶段的工作，即将进入反贪污盗窃和反投机倒把的斗争。","type":"paragraph"},{"text":"在将近二十天中，这三个单位采取了领导与群众相结合的方法，揭发出大量的铺张浪费、生活特殊化、多吃多占、违反财经制等问题；同时，也初步检查了官僚主义和分散主义方面的问题。这几个单位有如下的几条共同经验：","type":"paragraph"},{"text":"老老实实地把中央指示、文件学深学透","type":"subtitle"},{"text":"运动一开始，大多数干部的思想认识比较明确，态度比较端正，行动比较积极，顾虑不大，敢于提意见。有一部分干部对运动漠不关心，认为与自己的关系不大，说什么“分散主义、官僚主义是领导上的事，贪污盗窃、投机倒把我没有搞，反正反不到我的头上。”“我们是清水衙门，问题不大。”少数人有较大的震动。一些错误比较严重的人，顾虑很大，怕批评，怕斗争，怕检讨，怕处分。","type":"paragraph"},{"text":"根据这种情况，这几个单位在运动一开始，就认真地反复地学习文件，以提高认识，武装思想；主要领导干部还亲自出马原原本本地、全面系统地讲解中央指示，同时联系实际进行分析。首先，联系本单位的具体情况，分析铺张浪费、贪污盗窃、投机倒把、官僚主义、分散主义的危害性，并提高到阶级斗争和社会主义革命的高度阐明运动的重大意义。其次，联系过去历次政治运动的经验，全面理解中央指示精神，消除一部分人怕搞运动、怕过火、怕打击面过宽的顾虑。其三，联系群众思想动态进行解释，全面宣传政策，为有问题的人指明出路，减少阻力。","type":"paragraph"},{"text":"这一段学习很好，就为整个运动打下了思想基础。","type":"paragraph"},{"text":"领导干部带头作深刻的检查","type":"subtitle"},{"text":"群众发动起来以后，就看领导干部有没有决心带头检查和改正。上述几个局领导干部的态度都是比较诚恳的，但是，由于检查深刻程度不同，效果也不同。轻工业局和财政局的领导检查以后，和群众要求的距离还很大，群众不满意，认为没有解决主要问题。为什么？一是局领导干部对本身的问题估计不足，检查的准备不充分；二是缺乏深刻的分析批判；三是个别思想作风问题比较严重的领导成员对群众的义愤估计不足，对自己的病源不明。所以，检查以后，群众仍有意见。公安局党委检查的效果比较好，是因为：在党委会中酝酿比较充分，准备得好；态度诚恳坦率，把与自己有关的问题全盘托出；干脆利落，联系思想动机进行分析批判，老老实实地向群众交心。因此，群众基本上感到满意。对个别领导成员作风恶劣，群众义愤较大，而本人自觉程度又不高的，必须重点帮助，促进他们尽快地转变，作出群众满意的深刻检查。","type":"paragraph"},{"text":"依靠骨干，层层发动，步步提高","type":"subtitle"},{"text":"这几个单位开展“五反”运动，一般都是先在党委（党组）酝酿准备，再扩大到中层骨干，最后和群众见面。每一步都要搞充分，尽可能搞深搞透，不要草率。领导干部进行层层检查，层层开展批评与自我批评，一次比一次深刻。同时，中层骨干在帮助领导干部时，自己也有了比较充分的思想准备。这样，既能做到深刻检查，又能做到心情愉快。","type":"paragraph"},{"text":"在领导干部的检查已经结束，群众对领导的意见已经基本提完，整改已经开始时，在群众思想自觉的基础上，相互开展批评与自我批评，普遍洗澡，共同提高。但是，一定要强调自觉，和风细雨，不追不逼，不要形成人人过关。","type":"paragraph"},{"text":"首先有些手脚不干净或有一般性错误的人，迫切要求交代，必须给他们丢包袱的机会。如港务局在参加学习的二百四十三名股、段长以上干部中就有一百一十三人交代了多吃多占、挪用公款、贪污盗窃、投机倒把等问题，但其中80%是一般性的问题。不给他们以洗澡、交代的机会，势必包袱沉重，影响运动的开展。","type":"paragraph"},{"text":"其次，广大群众也需要通过这一步小结第一阶段工作的收获，从总结经验出发，用批评与自我批评武器、划清是非界线，提高觉悟。这样，90%以上的群众提高了觉悟，组成了队伍，就为下一步反贪污盗窃和反投机倒把斗争作了准备。","type":"paragraph"},{"text":"来源：1963年4月19日新华社《内部参考》。","type":"paragraph"}],"comments":[],"origin":"美国图书馆收藏","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"10f2fea7d5"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
