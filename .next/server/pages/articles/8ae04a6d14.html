script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"人大代表在审议政府工作报告时指出  必须反对资产阶级自由化  才能实现社会主义现代化","authors":[],"dates":[{"year":1987,"month":4,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"人大代表在审议政府工作报告时指出"},{"type":"paragraph","text":"必须反对资产阶级自由化"},{"type":"paragraph","text":"才能实现社会主义现代化"},{"type":"paragraph","text":"据新华社北京4月1日电  出席六届全国人大五次会议的代表在审议政府工作报告时指出，中国要实现的现代化，是社会主义的现代化，因此必须坚持四项基本原则，反对资产阶级自由化。代表们指出，历史和现实都反复证明，中国只有在中国共产党领导下，坚持走社会主义道路，才能走向繁荣兴旺。"},{"type":"paragraph","text":"中共云南省委书记普朝柱代表说，赵紫阳总理在报告中把“广泛深入地进行坚持四项基本原则的教育，反对资产阶级自由化，同时切实加强社会主义精神文明的建设”，作为当前政治思想领域的中心任务，这反映了全国人民的共同愿望，也切合我国实际。无论是建设、改革和开放都离不开政治上的安定团结。听任资产阶级自由化思潮泛滥就会带来社会动乱，建设和改革就无法进行，全国人民是不赞成的。我们要进一步提高认识，精心指导好这场斗争，不断总结经验，长期抓下去。当前要深入调查研究，从基础建设抓起，加强和改进思想政治工作。"},{"type":"paragraph","text":"江苏代表团的胡福明、朱剑代表认为，赵总理从经济和政治相统一的理论高度指出，坚持四项基本原则和实行改革、开放、搞活，是并行不悖、相辅相成、相互渗透的统一整体。这就使我们进一步确立了社会主义建设必须坚持两个文明一起抓的指导思想，从而更加自觉地为建设有中国特色的社会主义而共同奋斗。"},{"type":"paragraph","text":"青海代表团的吕义长代表说，在反对资产阶级自由化中坚持“六个不变”，将有力地保证这场斗争的健康发展，有利于调动各方面的积极因素。"},{"type":"paragraph","text":"解放军代表团的周克玉代表说，军队开展坚持四项基本原则、反对资产阶级自由化的教育，要注重实际效果，重点是领导干部通过读书，结合实际认真思考讨论，提高思想认识，对战士主要是进行基础知识教育。要加强马克思主义的理论指导，加强对军事院校、部队思想文化舆论阵地的领导，要与贯彻军委扩大会议精神紧密结合，把这一教育持久、健康、深入地进行下去。"},{"type":"paragraph","text":"山东青岛市文联副主席、电影《喜盈门》的剧作者辛显令代表说，赵紫阳总理在政府工作报告中阐明了反对资产阶级自由化斗争的方针和政策。我们深信，在党的培养和教育下建立起来的社会主义文艺队伍和文艺事业，一定能够在反对资产阶级自由化的斗争中得到繁荣和发展，文艺园地一定会百花齐放，百花争艳。"},{"type":"paragraph","text":"山西代表团郭兰英代表说，政治思想领域中反对资产阶级自由化思潮影响的任务还相当艰巨。文艺工作者必须自觉坚持四项基本原则，为社会主义服务，为人民服务。我们的民族艺术有悠久历史和浓厚民族特色，应当继承和发扬。但近年来我们的民族民间艺术受到挫伤，有的人片面理解改革、开放政策，认为革命的、传统的歌曲过时了，盲目崇洋；有的演员一味要钱，小学、幼儿园里竟然也教孩子们唱什么“带来了我的烦恼……”。建议有关部门认真注意这个问题，进一步振兴我们中华民族的文化艺术。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"赵紫阳","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8ae04a6d14"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
