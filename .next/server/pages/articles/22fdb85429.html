script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji34","name":"毛泽东全集第34卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji34.pdf"],"article":{"title":"给田家英的信","alias":"","parts":[{"type":"paragraph","text":"给田家英的信"},{"type":"paragraph","text":"（1954年3月2日）家英同志："},{"type":"paragraph","text":"（一）杨秀生“信请抄转长沙杨开智先生，询问信内所述情形是否属实，我完全不记得了。"},{"type":"paragraph","text":"（二）今年寄杨家补助费1，200万元，上半年的600万元宜即寄去，请予办理。"},{"type":"paragraph","text":"（三）李淑一女士，长沙柳直荀同志（烈士）的未亡人，教书为业，年长课繁，难乎为继。有人求我将她荐到北京文史馆为馆员，文史馆资格颇严，我荐了几人，没有录取，未便再荐。拟以我的稿费若于为助，解决这个问题，未知她本人愿意接受此种帮助否？她是杨开慧的亲密朋友，给以帮助也说得过去。请函询杨开智先生转询李淑一先生，请她表示意见。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"三月二日[1]杨秀生，杨开慧的族兄。"},{"type":"paragraph","text":"[2]这里是以当时流通的人民币计算的，按中国人民银行1955年3月1日起发行的新人民币折算，合1200元（新币1元等于旧币1万元）。"},{"type":"paragraph","text":"[3]柳直苟，曾任湖南省农民协会秘书长、中国工农红军第二军团政治部主任、中共鄂西分特委书记，1932年牺牲。"}],"authors":["毛泽东"],"dates":[{"year":1954,"month":3,"day":2}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":40,"page_end":40},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"22fdb85429"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
