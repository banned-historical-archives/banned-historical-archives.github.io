script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"万象舆论抨击老挝极右势力发动的未遂政变  呼吁继续警惕极右集团的新阴谋","authors":[],"dates":[{"year":1973,"month":9,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"万象舆论抨击老挝极右势力发动的未遂政变"},{"type":"paragraph","text":"呼吁继续警惕极右集团的新阴谋"},{"type":"paragraph","text":"新华社万象一九七三年八月三十一日电  万象舆论近日纷纷抨击老挝极右势力八月二十日在万象发动的未遂政变，呼吁人们对反对民族和睦的极右势力的新阴谋继续保持警惕。"},{"type":"paragraph","text":"万象政界和新闻界人士认为，陶马一伙这次在老挝国内外某些反动势力的怂勇和支持下发动的政变，目的在于破坏“关于在老挝恢复和平和实现民族和睦的协定”的议定书的签订。半年来，在老挝各爱国力量方面和万象方面愿意实现民族和睦的人士努力下，关于老挝问题万象协定的一些条款正在逐步得到履行，老挝双方关于签订万象协定议定书的谈判也基本上达成协议。但是，正当签署这一议定书的时机日益成熟的时候，却发生了这次流产政变，这决不是偶然的。"},{"type":"paragraph","text":"这些人士还指出，曾在一九六四年参加过反富马政变的前空军司令陶马，仅仅纠集六十个亡命之徒，竟能从泰国潜入万象，并在一个早上控制机场，夺取飞机，占领电台，发布“命令”，大闹万象，这如果没有万象内部一些人的策应和共谋，是根本不可能的。只是由于政变不得人心，在富马首相领导下，这个总共只延续了十个小时的短命政变被粉碎了。"},{"type":"paragraph","text":"据此间报纸透露，这次政变的内应，正是老挝极右势力——萨纳尼空集团。在这次政变发生前不久，萨纳尼空集团同亡命泰国的富米·诺萨万间的联系极为频繁。七月中旬，万象议会副主席昭索·赛萨纳奉培·萨纳尼空之命去曼谷会晤富米·诺萨万，密谋发动政变，并寻求泰国的支持。贡·萨纳尼空也与富米·诺萨万不断进行联系。以乌敦·萨纳尼空为首的一批老挝右派军官在下寮的巴色秘密集会，讨论政变计划，并且提出让富米·诺萨万返回老挝充当政变领袖，一旦政变成功，培·萨纳尼空和富米·诺萨万将“分享利益”。"},{"type":"paragraph","text":"万象舆论指出，虽然目前政变已被粉碎，万象表面上已趋平静，但是，由于政变寿命太短，这些极右势力没有来得及登台表演，因此，隐患依然存在，对此仍须保持警惕。《万象日报》最近发表的一篇社论警告说：“陶马政变的流产象一把利剑，勾划出了对那些企图发动政变、把国家引向混乱和灭亡的冒险家们的警告。”"},{"type":"paragraph","text":"老挝各阶层人民对陶马政变极为愤怒。万象报纸也纷纷发表文章，谴责老挝极右分子反对在老挝实现民族和睦，妄图推翻以富马亲王为首的万象政府，把老挝重新推向战争的深渊。《老挝民族报》说：“当前某些派别某个集团的制造分裂和政治混乱的行动，对国家和人民没有任何好处。”《中立之路报》说，老挝各阶层人民都急于看到祖国的统一，过安居乐业的生活，但是有一些人却不顾人民疾苦，妄图把老挝继续引向战争的道路。"},{"type":"paragraph","text":"万象一些人士说，老挝人已看清了一些既得利益者为什么竭力反对民族和睦。饱受战争苦难的老挝人民，现在只有一个愿望，就是尽快实现民族和睦，成立新的联合政府，把老挝建成一个独立、中立和繁荣的国家。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2f13d99b79"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
