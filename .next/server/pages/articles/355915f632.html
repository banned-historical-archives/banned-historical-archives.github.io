<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"伟大的长城","authors":["《解放军报》编辑部社论"],"dates":[{"year":1967,"month":9,"day":3}],"is_range_date":false,"parts":[{"text":"伟大的长城","type":"title"},{"text":"《解放军报》编辑部社论","type":"authors"},{"text":"我们的伟大导师、伟大领袖、伟大统帅、伟大舵手毛主席亲手缔造、亲自领导的，林彪副主席亲自指挥的中国人民解放军，是一支用毛泽东思想武装起来的举世无双的英雄的军队，是一个伟大的长城。","type":"paragraph"},{"text":"它是防御帝国主义侵略、保卫我国国防安全的伟大的长城。","type":"paragraph"},{"text":"它是巩固我国无产阶级专政、保卫社会主义革命和社会主义建设的伟大的长城。","type":"paragraph"},{"text":"这个伟大的长城，是毛主席亲自领导亿万革命人民，在长期革命斗争中构筑起来的，是无数革命先烈用生命和鲜血构筑起来的，是任何强大的敌人也攻不破、摧不毁的。","type":"paragraph"},{"text":"这个伟大的长城，在毛主席的亲密战友林彪副主席亲自指挥下更加巩固了。林副主席主持军委工作以来，高举毛泽东思想伟大红旗，创造性地提出加强军队建设的一系列方针政策和重大措施，大力开展群众性的活学活用毛主席著作运动，坚持四个第一，突出无产阶级政治，大兴三八作风，发扬三大民主，开展四好连队运动等等，使我军更加无产阶级革命化，更加战斗化了。这个伟大的长城，从来没有象现在这样坚固。","type":"paragraph"},{"text":"我国无产阶级文化大革命能够顺利地进行，首先是因为有伟大领袖毛主席和毛泽东思想的最崇高的威望，同时也因为有人民解放军这样一个伟大的长城。","type":"paragraph"},{"text":"在史无前例的无产阶级文化大革命中，伟大领袖毛主席交给我军“三支”“两军”的伟大的战略任务，这是对我军的最大的信任，最大的关怀。无产阶级革命派和广大革命群众在这场大革命中，也表现了对我军的无比信赖。","type":"paragraph"},{"text":"毛主席教导我们：政治是统帅，是灵魂。","type":"paragraph"},{"text":"我军之所以能够成为坚固的长城，能够得到党和人民群众的信任，是因为有着伟大的战无不胜的毛泽东思想的武装。毛泽东思想是我军的灵魂。我军广大指战员无限热爱毛主席，无限崇拜毛泽东思想，无限忠于毛主席的无产阶级革命路线，坚决按照毛主席的指示办事。在无产阶级文化大革命的大风大浪中，我们要更高地举起毛泽东思想的伟大红旗，努力活学活用毛主席著作，进一步树立起毛主席的绝对权威，毛泽东思想的绝对权威，毛主席的无产阶级革命路线的绝对权威，毛主席的无产阶级司令部的绝对权威。这样，我们伟大的长城就越来越巩固，越来越坚强，发挥越来越大的作用。","type":"paragraph"},{"text":"毛主席还教导我们：“真正的铜墙铁壁是什么？是群众，是千百万真心实意地拥护革命的群众。这是真正的铜墙铁壁，什么力量也打不破的，完全打不破的。反革命打不破我们，我们却要打破反革命。”","type":"paragraph"},{"text":"我们人民解放军是紧紧地和中国人民站在一起，全心全意地为中国人民服务的人民的子弟兵，同人民群众结成了血肉相联的关系，鱼水相依的关系，所以我们真正成为任何力量也打不破的伟大长城，得到党和人民群众的信任。在无产阶级文化大革命中，我们要坚定不移地依靠革命左派，要相信和依靠广大革命群众，相信和依靠干部的大多数，依靠广大群众协助我们搞好“三支”“两军”的工作。要坚决响应毛主席关于“拥军爱民”的伟大号召，更大规模地展开一个热烈的爱民运动，进一步密切军民关系，加强军民团结。我们要尽一切责任，坚决支持和爱护一切无产阶级革命派，坚决支持和爱护一切红卫兵革命小将，坚决支持和爱护一切革命群众。我们的一言一行，都要向人民负责。凡是符合人民利益的，我们就要坚持去做；凡是违背人民利益的，我们就要坚决斗争，坚决抵制。我们如果有缺点错误，就要欢迎人民群众批评指出，坚决改正，做到完全、彻底为人民服务。这样，广大人民群众就会更加热爱和拥护我们，更加信任和支持我们。我们这支军队就会有无穷无尽的力量，就能在无产阶级文化大革命运动中建立新的功勋。","type":"paragraph"},{"text":"爱护、加强和巩固人民解放军这个伟大的长城，是全国军民的共同责任。而国内外的阶级敌人，从他们的阶级本性出发，对人民解放军这个伟大的长城，怕得要死，恨之入骨。他们必然要处心积虑地妄图破坏我们军队的威信，挑拨军民之间的关系，妄图混水摸鱼。但是，只要我军的全体指战员和一切革命群众，保持高度的警惕，敌人的阴谋是绝对不可能得逞的。在伟大的长城面前，一切阶级敌人都会碰得头破血流，避免不了他们彻底失败的命运。","type":"paragraph"},{"text":"全军同志们，让我们坚决响应伟大领袖毛主席的伟大号召，决不辜负毛主席和人民群众对我们的信赖和期望，高举“拥军爱民”的旗帜，永远做爱民的模范，在毛主席革命路线的指导下，同全国人民紧密地团结起来，共同战斗，夺取无产阶级文化大革命的新胜利。","type":"paragraph"},{"text":"（原载《解放军报》1967年9月3日）","type":"appellation"}],"comments":[],"origin":"原载《解放军报》1967年9月3日","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"355915f632"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
