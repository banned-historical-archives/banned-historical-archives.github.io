" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji20","name":"毛泽东全集第20卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji20.pdf"],"article":{"title":"致刘伯承、邓小平等电","alias":"","parts":[{"type":"paragraph","text":"致刘伯承、邓小平等电！"},{"type":"paragraph","text":"（1945年10月16日）刘、邓，并告陈："},{"type":"paragraph","text":"因上党与阎顽作战（这是必要的），胡顽之十六军得以顺利通过，第三军亦在积极北进中。如该两军均能到达石家庄集中，即将力图南北打通平汉路（高邑汤阴段），配合空运、海运进入平津，我向东北、冀热辽转移兵力，将受到严重威胁。因此，除请严令赵尔陆等积极歼灭阻击十六军外，请你们务必采取一切办法，阻止敌第三军北进，消灭其大部以至全部。提议太岳所有地方兵团及大部县区干队，一刻不停地、有计划地向同蒲分段集结，控制同蒲一段至数段（并尽量动员民兵协助），在不能消灭该军时，采取运动防御节节抗击，争取我主力转移与必需恢复疲劳的时间。在主力中，伤亡疲劳较轻者，抽一两个团为先遣队，协同地方兵团进行上述动作。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"酉铣[1]这是毛泽东为中共中央军委起草的关于平汉战役给刘伯承、邓小平"}],"authors":["毛泽东"],"dates":[{"year":1945,"month":10,"day":16}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":432,"page_end":432},"tags":[{"name":"邓小平","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9888f39f75"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
