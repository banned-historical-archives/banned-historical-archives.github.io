script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"垄断资产阶级利用能源危机大批解雇工人  美国失业人数又有新的增加","authors":[],"dates":[{"year":1974,"month":1,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"垄断资产阶级利用能源危机大批解雇工人"},{"type":"paragraph","text":"美国失业人数又有新的增加"},{"type":"paragraph","text":"新华社一九七四年一月六日讯　华盛顿消息：美国垄断资产阶级利用能源危机大批解雇工人，使美国的失业人数在一九七三年十二月份又有了新的增加。"},{"type":"paragraph","text":"据美国劳工部一月四日公布的数字，去年十二月美国的失业人数增加了十七万人，使失业率达到百分之四点九。其中成年妇女的失业人数大大增加。美联社说，失业人数的增加“显然是由于美国经济发展步调普遍放慢”。"},{"type":"paragraph","text":"近日来，在能源危机的冲击下，一些美国垄断企业纷纷解雇工人以转嫁危机。美国最大的汽车垄断企业通用汽车公司于去年十二月二十八日宣布，它在今年一月和二月将解雇八万六千名工人，其中一部分是暂时解雇，但有三万八千名工人将被不定期解雇。同一天，美国环球航空公司说，它在今年一月一日要临时解雇二千九百名雇员。"},{"type":"paragraph","text":"美国经济顾问委员会主席赫伯特·斯坦曾经预计，在一九七四年美国的失业率将达百分之六左右。美国广大工人将面临更加困难的处境。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"77429db84f"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
