" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"“我们现行政治制度是党政不分”","authors":["中国人民大学","吴家麟","孔钊","朱华荣","朱澄平","章起","黄铨"],"dates":[{"year":1957,"month":5}],"is_range_date":false,"parts":[{"text":"“我们现行政治制度是党政不分”","type":"title"},{"text":"中国人民大学吴家麟朱澄平黄铨章起孔钊朱华荣","type":"authors"},{"text":"“党是人民代表大会制的领导力量，但两者应有界限，应有所区别，既要实现党的领导，又不能以党代政。以党代政就牵涉到政治制度的问题。……”","type":"paragraph"},{"text":"“我们现行政治制度，职责权不分明，是党政不分，以党代政。”","type":"paragraph"},{"text":"“我国实行的不是民主集中制，而是上级服从下级，如党员科长要非党员办公厅付主任收回指示，党员副校长外出，要非党员校长代理职务。”他还恶毒的谩骂我们国家机关是“黑官”、“黑衙门”。（中国人民大学法律系讲师吴家麟的材料）","type":"paragraph"},{"text":"“目前党政不分现象很严重愈往下愈是如此，在县里县长听县委的，一切由县委说了算。”（中国人民大学计划系讲师　朱澄平）","type":"paragraph"},{"text":"“我基本上同意贺安‘以党代政’的意见","type":"paragraph"},{"text":"（1）为什么会产生‘以党代政’？","type":"paragraph"},{"text":"1．在长期战争条件下，没有民主党派，客观上便于以党代政，易产生党天下思想，以党代政在过去起过好作用，现在看出‘三害’就是‘以党代政’的副作用。","type":"paragraph"},{"text":"2．受苏联影响，在这一点不应学习苏联。","type":"paragraph"},{"text":"（2）什么叫‘以党代政’？政者，众人之事，除反革命份子外全国人民之事，虽然提出群众路线主张，但仍然产生包办代替现象，党员始终是少数，党通过党员和积极分子走群众路线并不是由群众直接发表意见，如果党员有问题就很难贯彻群众路线，1200万中只要有1％有问题，影响该多大，何况有问题也不止1％，所以‘以党代政’有问题……”。","type":"paragraph"},{"text":"“党的领导是不能代替行政的，事无巨细都来过问的作法是不好的，党只能提出建议由行政同意决定，党和行政关系不应当是诸葛亮和阿斗关系，而应是参谋长和司令员关系，要贯彻党的领导通过三方面：（1）党的政策，（2）党员模范作用，（3）某些有才能的党员担任重要任务。”（中国人民大学俄文教研室讲师  黄铨）","type":"paragraph"},{"text":"“以党代政过去是不可避免的，现在阶级消灭了，应该对党外人士放手，发挥党外人士力量。”（中国人民大学历史系讲师  章起）","type":"paragraph"},{"text":"“县委会说话就算，实际上县政府、区政府，没起什么作用。”“我校任何一个头都是党员，不是党员就当不上。”“许多问题都是由党决定，大家执行，提意见就是思想落后。”（中国人民大学法律系讲师  孔钊）","type":"paragraph"},{"text":"“党的领导是在于思想领导，也就是打通思想贯彻党的政策，不能以行政命令来领导。目前民主办校应肯定，党委制是落后了。如果党代表利益为什么还要人民代表大会呢？”（中国人民大学法律系助教  朱华荣）","type":"paragraph"},{"text":" 来源：《高等学校右派言论选编》（中共中国人民大学委员会，1958年8月）。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e93e8a56cd"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
