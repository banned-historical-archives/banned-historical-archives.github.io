" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoistlegacy.de-1016","name":"铁道部关于精减干部的安置处理办法的几项具体规定","author":"铁道部","internal":false,"official":false,"type":"unknown","files":[],"article":{"title":"铁道部关于精减干部的安置处理办法的几项具体规定","dates":[{"year":1963,"month":3,"day":27}],"is_range_date":false,"authors":["铁道部"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"铁道部政治部审干办公室, 审干工作政策选编(三), 435-436","tags":[{"name":"安置","type":"主题/事件"},{"name":"干部","type":"主题/事件"},{"name":"铁道部","type":"主题/事件"}],"parts":[{"type":"paragraph","text":"铁道部关于精减干部的安置处理办法的几项具体规定\n（一九六三年四月十日）\n      关于精减干部的安置处理问题，中共中央一九六三年三月二十七日发出了“关于国家机关和企业、事业单位精减干部的安置处理办法的补充规定”，文件由各省、市、自治区党委转发，请你们认真研究，贯彻执行。现根据中央的规定，对其中有关问题，作以下具体规定：\n      一、对保留干部身分回家、回乡的干部，以及在回家、回乡期间要求退职的干部，均由各局、院、厂批准；因工作需要调回分配工作时，须报部批准。这些干部在回家、回乡期间所需公费医疗待遇和工资费用，都从营业外项下列支，在事业单位的，仍由原单位在事业费开支。\n      二、合乎中央补充规定第三条须要另列编制的干部，各单位应将名单报部，经过批准，另列编制。其中因年老、体弱不能工作又不宜作退休、退职处理的，经过批准，可按照财政部、劳动部复上海市劳动局的规定办理（附原件）可列在编制以外，不算原单位定员人数，在统计职工人数时，列入“其他”项目中，按规定所需费用，包括劳保福利待遇及其家属应享受的劳保福利待遇,都从营业外项下列支，在事业单位的，由原单位在事业费开支。"},{"type":"paragraph","text":"三、需要保留储备的干部名额，已随劳动计划下达，各单位应按分配的计划人数，于四月底以前将名单报部审批。没有分配储备名额的单位，由各单位在劳动计划人数之内，自行安排，关于储备的方法，铁道部将有专门规定。经过批准，保留储备的干部，在报告职工人数时，统计在“其他”项目中。"},{"type":"paragraph","text":"(摘自铁密精简人〔63〕字第1351号文件)"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"06b638acda"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
