" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"右派言论——“共产党的领导似乎无必要”","authors":["北京农业机械化学院师生"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"右派言论——“共产党的领导似乎无必要”","type":"title"},{"text":"北京农业机械化学院师生","type":"authors"},{"text":"“一，党派组织本来是阶级斗争的工具，现在我国阶级斗争已基本上结束了，党派组织（包括共产党在内）是否还有必要继续存在，特别是说说，共产党的领导似乎更无必要。","type":"paragraph"},{"text":"二，共产党在革命胜利以前，为了拢络人心，争取群众，与群众同甘苦共患难，颇得人民拥护；现在天下已经打下来了高官厚禄，与人民越离越远了，就是继续存在，还能领导人民吗？还会继续得到人民的拥护吗？","type":"paragraph"},{"text":"三，由于共产党的存在，就有共产党员、青年团员，以及像我们这类白丁之分。前者自认积极进步，高人一等。因此阶级虽然消灭了，但人与人之间，隔阂却加深了，造成不和现象。这样看来党的存在，究竟有什么好处呢？”（北京农业机械化学院  巨丁）","type":"paragraph"},{"text":"“首先中央也是由具体人（组成？）。他们的决议百分之百的正确，就不合‘主观与客观矛盾永远存在’这一马克思主义的观点。","type":"paragraph"},{"text":"拿具体来讲，双轮双铧犁的盲目生产，大学教学冒进问题，职工待遇冒进的问题，三反、五反的扩大化问题，难道都是下面的错误吗？再看看全国普遍性‘三害’问题，难道中央没有责任吗？","type":"paragraph"},{"text":"关于供求不平衡问题，认为是社会主义过渡时期经济发展中必然规律，但我觉得其中和经济政策的掌握不平衡有关，若只从‘必然规律’中去探讨，就是放弃克服缺点的努力。","type":"appellation"},{"text":"聪明人也会犯错误，明智的、代表人民利益的政治集团也会犯错误，这是不言而喻的。因此作出错误的决定，说出错误的话这些事实早先不能责怪，也没有探讨的必要，问题在于为什么错误的决议能往下贯彻，人们都受着‘唯组织、唯领导正确的约束’，已不习惯于独立思考，进而人民民主，言论自由受到严格限制，少数人已操纵了多数人，利害问题的人事制度，使克服错误的可能性削弱到微弱的地步，错误的政策一定通过错误的组织路线上去找。”（北京农业机械化学院  陈炳勤）","type":"paragraph"},{"text":" 来源：《高等学校右派言论选编》（中共中国人民大学委员会，1958年8月）。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1e2015462f"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
