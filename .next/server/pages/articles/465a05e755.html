script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"cb043827-1a6a-46f3-863d-a430958e5a0d","name":"无产阶级文化大革命参考资料（1966年）","internal":true,"official":false,"type":"pdf","author":"","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives3/main/cb043827-1a6a-46f3-863d-a430958e5a0d.pdf"],"article":{"title":"陈伯达同志关于错误路线八条","alias":"","parts":[{"type":"paragraph","text":"陈伯达同志关于错误路线八条"},{"type":"paragraph","text":"一、错路织要分开，一种是指示的，一种是执行的，指示的是错路的代表人物，要负主要任。"},{"type":"paragraph","text":"二、党的路织斗争，是社会级阶斗争的反映，错认路是它的社会基础，主要是资产级阶在党内有一定市场，因为党内有一小走资本主义道路的当权派，还有相当一批世界观未改造好的糊涂人。"},{"type":"paragraph","text":"三、派出大量工作组，镇压革命学生，这就是犯了路错，有派工作组的地方，如果那里镇压革命学生，同样也犯路错（当然有自觉执行的，这是少数，不自觉执行的是大量的），自觉和不自觉之分，有改正错和坚持路织之分，有轻重之分。）"},{"type":"paragraph","text":"四、区别改正错和坚持错的标志是对待群众的态度，是否公开向群众承韶执行错路是否给打成“反革命”的群众韶真平反，并支持革命群众的革命行动。"},{"type":"paragraph","text":"五、不彻底批判资产级阶反动路，就不可能具正确执行中央正确路，即以毛主席为代表的无产级阶革命路织。"},{"type":"paragraph","text":"六，有些地方，有些同志在中央十一中全会之后，还用各种形式在一系列问题上，继续犯路错，对待所谓大串连，对待所请少数与多数，对待所谓革命群众，机关干部，对待学生冲笑等，归根秸底就是挑动群众斗群众、学生斗学生。"},{"type":"paragraph","text":"七、压制群众的错路织是餐产级阶反动路，是反党反社会主义反毛泽东思想的错路。当然这不是説凡是执行餐产级阶反动路裁的人，就是反党反社会主义右派分子，只有自已能改正错回到正确的立场上来，执行党中央的正确路，那就不仅可能是二、三类干部也可能发展成一类干部。必须明，即是成为一类干部，犯这类性算的错，也要承韶犯了路裁错。"},{"type":"paragraph","text":"八、无什么人，无过去有多大功续，如果坚持错路，他们同党同群众矛盾的性质就会起变化就会隋到反党反社会主义道路上去。"},{"type":"paragraph","text":"北京师范大学政一革命造反战斗租"},{"type":"paragraph","text":"66.10.30"},{"type":"paragraph","text":"中宣部付部长张平化同志谈“乱”和“要用文斗，不用武斗”的间题"},{"type":"paragraph","text":"（按：这是张平化同志八月开一日在长沙湖南大学讲话的最后一部分，现在转抄于此，其中标题是我们加的，话记录未经本人审阳，全文贴在北京地质学院）自发火种战斗小组。"},{"type":"paragraph","text":"我常常碰到一些人，问我文化革命怎么革法？要革成什么样子？他问我我：“不出来”。许多人对文化大革命没有底，要革成什么样子呢？间这话的人：多半是比较有经验的人，根据他们的经验，每次运动都必须有个框框，按照他们的框框来运动，土地改革不必了，“三反”，“五反”大略上也有几个条条，也可以有儿个框框，特别是社教，四清运动，你们在座的有参加四清运动的，有很多框框，第一阶段先做什么，准备、然后四清，然后来个建设阶段，总有这么几个框框，按照我们所想的这个框框，一步一步地这样搞，这个在我们有些人看来才叫有底，才叫正常，才叫健康，是不是这次文化大革命没有这些框框，既是文化革命，又是政治革命，又是经济革命，既搞好本校一斗二批三改，又到整个社会上去发动全国互相串联，就是这样横扫一切牛鬼蛇神，扫到什么时候呢？要看情况，没有框框，现在有些人总觉得这个运动不好搞，觉得这个运动有点乱，“乱得很”！这个乱字要加引号的。这个叫引号的乱就是革命秩序，我们就是要“乱”，越“乱”越好！（鼓掌）“乱”他一一个时期，至少乱他几个月，林彪同"},{"type":"paragraph","text":"·133·"}],"authors":["陈伯达"],"dates":[{"year":1966,"month":10,"day":30}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":143,"page_end":143},"tags":[{"name":"张平化","type":"人物"},{"name":"陈伯达","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"武斗","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"465a05e755"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
