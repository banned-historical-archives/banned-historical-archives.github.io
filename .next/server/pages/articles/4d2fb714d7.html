<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"鞍山市对毛主席、周总理等关於知识分子问题指示的反应","authors":[],"dates":[{"year":1956,"month":2,"day":28}],"is_range_date":false,"parts":[{"text":"鞍山市对毛主席、周总理等关于知识分子问题指示的反应","type":"title"},{"text":"【鞍山分社28日讯】毛主席、周总理等关于知识分子问题的指示和报告在鞍山市传达后，党内干部和知识分子都极为振奋。有如下反应和要求：","type":"paragraph"},{"text":"(一)一致赞扬中央英明、毛主席把舵掌握的正。认为在社会主义革命全面高潮的新形势下，党适时地提出了知识分子问题，号召大家向科学进军，是非常英明的决定。过去有的人感到党对知识分子的工作有缺点，而灰心失意，看了周总理的报告后认识上有了改变。","type":"paragraph"},{"text":"(二)对中国要在十二年内使科学技术赶上世界先进水平，广大知识分子都很兴奋鼓舞，普遍感到责任重大，必须快马加鞭，迎头赶上。不少人跑到书店买科学技术书籍或报名学外国语。广大知识分子都感到“使命重大，前进光明”。","type":"paragraph"},{"text":"(三)认识到党对知识分子是相信、重用的。首先是对入党问题感觉有希望有奔头了，感觉党向他们伸出了热情之手。大家对周总理关于知识分子政治情况的分类都很感兴趣、很满意。鞍钢工程师孔鹤更说：“周总理在报告中对知识分子分类的估计是正确的。过去只分两类，第一类进步的，都是党、团员，数量极少，第二类落后的，数量极大，我们认为不公平。周总理这样一分就很公平很实际了。这样我也可以属于百分之八十以内的知识分子了。”","type":"paragraph"},{"text":"(四)普遍反映党对知识分子的关怀是全面的无微不至的。从工作、学习到生活，直至入党问题都明确安排了。反映周总理的报告是知识分子的进步纲领。","type":"paragraph"},{"text":"(五)一些有问题的人也感觉轻松了，认为解决问题的时候到了。有一般历史问题的人都准备在肃反中弄清自己的问题，卸掉包袱。","type":"paragraph"},{"text":"广大知识分子还提出一些要求、建议和问题。除了过去已经提过的入党、查清历史、进修、晋级、改善生活条件等问题外，这次还提出以下一些新的要求和建议：","type":"paragraph"},{"text":"(一)要求对他们做出全面规划。这种要求很普遍，不仅要求规划他们如何专业化、进修技术，还要求规划他们的马列主义学习和入党问题。","type":"paragraph"},{"text":"(二)要求领导干部学习周总理的报告，将过去对知识分子工作进行一次检查。","type":"paragraph"},{"text":"(三)要求老干部、党员和他们接近。有的要求和党员作朋友，在工作、学习上互相帮助，能够互相谈心，不要老是“点头之交”。","type":"paragraph"},{"text":"(四)对如何迅速提高他们的科学技术水平，也有一些具体建议：1．要求扩大国际性技术参考资料，特别是一些老工程师过去都学习英、法、德、日文，没学过俄文，读起来很费劲，希望把资料范围扩大一些。2．要求参观重点工程，甚至到国外看看。3．要求成立一个业余的研究机构，以便利用业余时间研究问题。4．要求专门给他们成立一个图书馆。5．建议技术人员晋级能打破常规，希望有成就的能跳级提拔。6．建议多树立知识分子的旗帜、榜样，组织大家学习。甚至还有人建议组织他们学习处理事情的方法。","type":"paragraph"},{"text":"在少数落后分子和坏分子中，有一些错觉和错误的论调：","type":"paragraph"},{"text":"(一)有些有历史问题的人，认为是社会的责任，自己可以不负责任。还有一些有严重的政治历史问题的人，企图趁此机会滑过去，不积极交代。","type":"paragraph"},{"text":"(二)个别人散布一些错误的论调，不满意党对知识分子的政策。鞍钢总机械师主任工程师王国章说：“党对资本家的政策是利用、限制、改造，对知识分子的政策是团结教育改造，从这一点看，好像知识分子是资本家第二。”有些人认为党对知识分子还是“另眼相待”。在座谈会上问：“为什么要提团结改造知识分子，而不提信任知识分子?”并分析说：“要改造就是有问题，就不是自己人。”甚至有的人对“分子”两字都感觉刺耳。问：“为什么不叫工人分子?”","type":"paragraph"},{"text":"(三)百分之五左右的反革命分子或坏分子及肃反中的斗争对象都较沉默，不轻易表示意见。有些人还表现恐慌。","type":"paragraph"},{"text":" (根据鞍山市委报告摘编)","type":"paragraph"}],"comments":[],"origin":"新华通讯社编《内部参考》1956年2月28日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4d2fb714d7"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
