<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"廖志高在四川全省电话会议上的讲话","authors":["中共四川省委书记处书记","廖志高"],"dates":[{"year":1959,"month":1,"day":24}],"is_range_date":false,"parts":[{"text":"廖志高在四川全省电话会议上的讲话","type":"title"},{"text":"中共四川省委书记处书记廖志高","type":"authors"},{"text":"[前缺]第三，小麦三类苗，一般占10%，油菜的三类苗更多，合川县比较突出，小麦的三类苗占30%，油菜苗占50%，大部分田为缺肥、缺水，因此发生返黄的现象，也有少数倒伏的现象。解决三类苗的办法，除了大力的积肥，造肥增施肥料以外，还应将劳动力作适当安排，加强对三类苗的田间管理工作。","type":"paragraph"},{"text":"（二）生活方面：","type":"paragraph"},{"text":"第一，粮食方面总的情况是好的，目前各个县算大马，某个人都有500-700斤粗粮储备，都有一定数量细粮供应（一般的四、五两，少数社是六两，个别社也是二两的），估计在粮食问题上不会出什么大乱子。","type":"paragraph"},{"text":"问题是：一、存在着不平衡的现象，个别社也还有缺粮的情况。铜梁县三个区的一部分乡（有几个还未摸清楚）目前口粮偏紧，比较突出的五区西泉乡（山区），现在就已经没有粮食吃了，连红苕也没有了。原因是：（1）去年增产不多；（2）大办钢铁时抽走的干部比较多，当时生产管理混乱，什么人都去挖红苕没人管，也没有记帐，浪费了一部分粮食；（3）该乡是炼铁所在地，外乡上去的劳动力多，也挖得这个乡的红苕吃，消耗量大。二、对红苕的霉烂情况生意的不够，有麻痹情绪，大足一个区即烂红苕五十万斤，大足城东乡食堂所在地的两个中队的红苕窖，全部发生不同程度的霉烂情况，窖面上已烂了80%，底层的红苕烂了20%。红苕霉烂的情况如果不注意，就可能产生更大的粮食问题。象上述两个问题的情况，估计许多地方都会有的，都要注意。","type":"paragraph"},{"text":"看来各个县不能满足于算大帐，必须深入细致的摸底，特别类似铜梁西泉乡的乡社，要及时进行调剂和支援，对于储备的红苕也要经常的进行检查，发现问题及时解决。","type":"paragraph"},{"text":"第二，疾病情况，内江地区几个县抓得比较好，目前的发病率已经大大下降，有的县已经恢复正常。安岳全县在前一段时期比较严重，但现在已经有好转，发病率已比前段时期下降一半左右。江津地区发病率比较高，铜梁有一个公社，发病最高时达总人口20%，大足有一个水库公地，三千多人，发病率占16.6%，主要是腮下炎（已经派人去治疗）。合川县还正在发展，主要是麻疹（转肺炎）脑膜炎和流感。初步了解死亡率也比正常时期略为高。全县100万人口，11月份到现在两个多月，共死亡三千多人。进托儿所的小孩共10万人，死137人。有的县委对此问题还重视不够，对于发病的原因、程度和范围，还摸得不具体，说不出个所以然来。","type":"paragraph"},{"text":"第三，公共食堂和托儿所的工作，在省委的两次指示以后，各县都注意了这个问题，目前已有很大的改进。问题是还有占10%的食堂和托儿所搞得不好，群众的意见比较多。和沿途的乡社干部以及食堂和托儿所的工作人员研究，办好食堂、托儿所的关键，除了各个地方已经注意到的党委加强领导，注意保育员、炊事员的质量两条外，还有一条食堂的管理员具体掌握帐目开支、供应计划和物资的支配[下缺]","type":"paragraph"},{"text":"来源：四川省委办公厅“井泉、大章、志高、红彦、秀峰、心源同志关于检查农村工作情况报告(1959)","type":"paragraph"}],"comments":[],"origin":"四川省某档案馆","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1eb8983b63"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
