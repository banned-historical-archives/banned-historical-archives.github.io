script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"在反击右倾翻案风斗争的凯歌声中   西南交大毕业生奔赴农村和边疆","authors":[],"dates":[{"year":1976,"month":4,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"在反击右倾翻案风斗争的凯歌声中"},{"type":"paragraph","text":"西南交大毕业生奔赴农村和边疆"},{"type":"paragraph","text":"据新华社成都一九七六年四月十五日电　在反击右倾翻案风斗争的凯歌声中，西南交通大学应届毕业的三百五十五名工农兵学员，满怀革命豪情，坚决同旧的传统观念决裂，纷纷要求到农村去、到边疆去、到三大革命运动第一线去，做限制资产阶级法权、缩小三大差别的促进派，以实际行动反击右倾翻案风。"},{"type":"paragraph","text":"教育革命大辩论展开后，全校广大革命师生员工在各级党组织领导下，立即投入了战斗。他们以阶级斗争为纲，牢牢掌握斗争大方向，把矛头直接指向不肯改悔的走资派邓小平和他抛出的“三项指示为纲”的修正主义纲领。毛主席最近指出：“翻案不得人心。”“社会主义革命革到自己头上了，合作化时党内就有人反对，批资产阶级法权他们有反感。搞社会主义革命，不知道资产阶级在哪里，就在共产党内，党内走资本主义道路的当权派。走资派还在走。”"},{"type":"paragraph","text":"西南交通大学应届毕业的工农兵学员，在反击右倾翻案风斗争中，认真学习毛主席的重要指示，总结了入校三年多来教育革命的巨大成果，畅谈了教育战线的大好形势，抓住不肯改悔的走资派邓小平妄图复辟资本主义的要害，深入批判“三项指示为纲”的修正主义纲领，并以亲身经历的事实批驳“今不如昔”等谬论。据铁道工程、铁道工程地质、起重运输机械、机车柴油机、内燃机车、铁道车辆、铁路施工与养路机械等七个专业的统计，应届毕业的七二级工农兵学员在开门办学中，同当地工人、技术员相结合，先后共试制和完成了近七十项新产品和重大技术革新项目，其中有些项目达到了国内先进水平，有的填补了我国的空白，解决了生产中的一些重大问题，促进了我国铁路建设的发展。桥梁专业应届毕业的七二级工农兵学员和教师，同现场工人、技术人员一起，完成了我国最大跨度的大桥三号墩浮运钢沉井的设计，达到了国内先进水平。这些应届毕业的学员还畅谈了利用开门办学和劳动的机会，举办短训班、政治夜校等活动，并为农村社队进行水利工程勘测设计，从而受到了工人、贫下中农的欢迎，同时也促进了自己世界观的改造。他们说：“同工农相结合的道路，我们走定了，坚决不当资产阶级的精神贵族！”"},{"type":"paragraph","text":"应届毕业的工农兵学员，在反击右倾翻案风的斗争中，更加意气风发，斗志昂扬。大学毕业了，到哪里去？他们豪迈地说：我们就是要同右倾翻案风的鼓吹者对着干。他们说什么大学生不能同工人、农民划等号，我们就是要当普通劳动者；他们反对批资产阶级法权，我们就是坚决要做限制资产阶级法权的促进派，努力造成使资产阶级既不能存在也不能再产生的条件，进一步巩固无产阶级专政。在最近举行的全校应届毕业的工农兵学员向党表决心的大会上，出现了上台发言的学员排成长队，争着要求到边疆去的动人场面。本来只有五个分配去边疆的名额，但是申请报名的达到七十多人。一些被铁路部门基层单位推荐上大学的工人学员，按规定可以回原单位，而且有些单位还在大城市，但是他们坚决要求到艰苦的边疆去，不再回原单位。"},{"type":"paragraph","text":"在西南交大工作过多年的教职工，看到工农兵学员毕业分配的动人情景，作了一番新旧对比，深有感触地说：过去大学生毕业，争着到大城市、大机关，还要求有个好职位；现在，工农兵学员毕业，争着去农村、去边疆，要求得到的是艰苦锻炼。这是毛主席革命路线的伟大胜利，也是给不肯改悔的走资派邓小平的一记响亮耳光。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"教育革命","type":"主题/事件"},{"name":"限制资产阶级法权","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fa5b294278"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
