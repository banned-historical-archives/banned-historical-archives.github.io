script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"56b509b6-59eb-4ca0-9739-7807925d0ecc","name":"张春桥同志接见我们时的谈话摘录","internal":false,"type":"img","official":false,"author":"张春桥","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives21/main/56b509b6-59eb-4ca0-9739-7807925d0ecc/1.jpg"],"article":{"title":"张春桥同志接见我们时的谈话摘录","alias":"","parts":[{"type":"paragraph","text":"张春桥同志接见我们时的谈话摘录"},{"type":"paragraph","text":"八月二十七日中央文化草命领导小租副租长张春桥同志，组员姚文元同志，王力同引接见了（八，二大）流血事件的受害者和北京红卫兵天津红卫兵一百多名战士，首长对我们表示了亲切的慰间和支持，张春桥同志耕了话。"},{"type":"paragraph","text":"同志们经过战斗，受到了炼，当然也挨了打，流了血，但是正如你们所的，革命就不怕流血，不怕掉头，这个流血事件是残暴的。关于问题，你们整理成材料，我们上报给中央，要解决问题还是靠你们解决，这样的斗争还要靠当地的群众，关于天津市委和其他省市的周题，中央已经研究了，罢官很容易，中央下个决定就罢了官。但是你们就有对立面了，不能算胜利了。所以我们主要要靠群众的智慧和力量，靠群众自己教育自己，自己解放自己。同学们的气愤我们很理解，但不能那样做，因为我们以前这样做了收获不太大···"},{"type":"paragraph","text":"他们打你们，你们就可以打他们，重要的是敢于斗争，敢于胜利！"},{"type":"paragraph","text":"北京市红旗学校红卫兵北京市东风一中红卫兵北京市建筑机械技术学校“八，八”红卫兵北京市电机学校红卫兵天津市劳动局第二半工半读“八，一八”红卫兵天津市“八，一八”亦工亦农要武学校红卫兵天津市新中国一中红卫兵天津市铁路工程学校红卫兵天津市牛工牛冶金学校红卫兵"}],"authors":["张春桥"],"dates":[{"year":1966,"month":8,"day":27}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1},"tags":[{"name":"张春桥","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"天津文革","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9c8911b69f"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
