script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"杨健是刘少奇复辟资本主义黑标本","authors":["朱治顺"],"dates":[{"year":1969,"month":9,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"上海国棉一厂　朱治顺"},{"type":"paragraph","text":"反动小说《上海的早晨》，是一株为大叛徒刘少奇复辟资本主义大造舆论的大毒草。反革命修正主义分子周而复精心描绘的反动资本家徐义德和特意捏造的五反检查队长、区委统战部长杨健，就是他用来复辟资本主义的两个黑标本。"},{"type":"paragraph","text":"早在新民主主义革命转变为社会主义革命的前夕，伟大领袖毛主席教导我们:“对于私人资本主义采取限制政策，是必然要受到资产阶级在各种程度和各种方式上的反抗的，特别是私人企业中的大企业主，即大资本家。”但在《上海的早晨》中看不到对资本家的限制和斗争，看到的却是资产阶级向工人阶级肆无忌惮地进攻。"},{"type":"paragraph","text":"小说恶毒地描写反动资本家徐义德在全国解放初期就认为:“共产党站不住脚”，“说不定什么时候全部垮下去。”他希望国民党反动派卷土重来，以便恢复“沪江企业的黄金时代”。他怀着这种强烈的反革命复辟希望，进行了一系列反革命复辟活动:在沪江纱厂的工人酝酿工会人选的时候，他大搞反夺权活动。为了“把工会拿过来”，“按照我们的心事办事”，他同他的爪牙梅佐贤经过一番密谋策划，使他的代理人陶阿毛混进了工会，当上了工会委员。通过陶阿毛“台上一套，台下一套”的逼真表演，窃取了工会内部的消息，采取了对付工人的办法。徐义德为了盗窃国家资财，把国家配给的优质原棉换下来，却在原料中另外掺进大量劣质花衣，使生产遭受很大损失，使工人在劳动过程中增加困难；而在劳资协商会议上他却反咬一口，大耍流氓作风，胡说什么“问题主要在工人身上”。在伟大的五反运动开始时，他还大搞三停(停薪、停伙、停工)，破坏五反运动。这么一个极端反动的资本家，周而复却用赞赏的笔调去美化他，歌颂他。其目的就是要通过徐义德这个反动资本家来鼓动资产阶级向工人阶级进攻，以资产阶级专政取代无产阶级专政。"},{"type":"paragraph","text":"如果说徐义德是赤裸裸的恶鬼，杨健则是耍两面派的工贼。在无产阶级专政条件下，象杨健这样的角色，是埋在党内的定时炸弹，是复辟资本主义的祸根，是无产阶级最危险的敌人。就是这个体现“党的领导”的五反检查队长、区委统战部长杨健，跨进沪江纱厂的第一件事，就是拜倒在资本家脚下，大肆吹捧徐义德，胡说什么“徐总经理做了不少有利于国家的事，这方面，我很清楚，从来没有怀疑过，并且给予足够的评价。”什么“做了不少有利于国家的事”，马克思早就说过:“资本来到世间，就是从头到脚，每个毛孔都淌着血和肮脏的东西。”资本家的所谓，“好事”，就是我们工人阶级的灾难，就是对我们工人阶级的残酷压迫和剥削。周而复笔下描绘的资本家的“好事”，不过是刘少奇“剥削有功论”的翻版。就是这个杨健，在徐义德宣布“三停”，工人要对这个家伙采取革命行动时，他站在资本家一边，充当资本家的帮凶，说什么“这么一来，我们就理亏了。”他“三停当然是违法……我们不能用违法对待违法。”什么“理”?什么“法”?我们工人阶级对资产阶级和一切反动派，就是造反有理，就是造反合法；然而杨健所说的“理”和“法”，就是只许资产阶级向工人阶级进攻，不许工人阶级对资产阶级反击，用资产阶级的“理”和“法”，把工人运动镇压下去，把资本家保护起来。这同一九二二年刘少奇在安源煤矿出卖工人阶级利益，充当日本帝国主义走狗的丑史，不是如出一辙吗?"},{"type":"paragraph","text":"还是这个杨健，在伟大的五反运动中，不去积极发动群众，不去依靠工人阶级，而是象刘少奇鼓吹的那样，依靠资本家身边的一批“积极分子”，即资本家的亲信、小老婆。杨健还把徐义德的五毒罪行说成是“认识问题”，还恳求地对他说:“你办厂多年了，这方面经验很丰富……”“要多化点儿精力考虑考虑厂里的生产问题”。难怪徐义德回到家里兴高彩烈地对他的小老婆说:“杨部长亲自来拜访我”，“他要求我领导厂里的生产”。杨健的这段精彩表演，不是同刘少奇在天津大资本家宋棐卿面前的丑态一模一样吗?!他是地地道道的工贼，是刘少奇的绝妙写照。"},{"type":"paragraph","text":"不论刘少奇为鼓吹“剥削有功论”如何声嘶力竭，为发展他的“年青的”、“进步的”资本主义如何奔走呼号，也不论反革命修正主义分子周而复为复辟资本主义而炮制的《上海的早晨》如何精心，对徐义德、杨健的刻划如何美妙，都挽救不了他们必然灭亡的命运。这次无产阶级文化大革命的滚滚洪流，不是把刘少奇、周而复和他的大毒草《上海的早晨》统统冲涮出来了吗?这正是他们可耻的结局。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"夺权","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e18b8f0751"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
