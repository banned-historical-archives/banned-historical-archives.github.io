script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"美制单独“和约”将替日本带来灾难日本人民普遍表示反对部分资产阶级也感惶惑不安","authors":[],"dates":[{"year":1951,"month":9,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京十五日电】　东京消息:日本人民对单独对日和约和美日‘安全条约’的签订，深表不满和反对。"},{"type":"paragraph","text":"九月九日，大坂出现了两万多张抗议单独对日和约的传单。九月八日早晨，三个和尚在东京市中心开始绝食，抗议武装日本，要求缔结全面和约。由于被美国托管而和日本分离的奄美群岛的居民，悬挂了二十天的半旗。"},{"type":"paragraph","text":"日本资产阶级的报纸承认，只有反动透顶的自由党的总部对签订单独对日‘和约’表示满意。另外一个资产阶级政党!!国民民主党——在这个问题上意见不一致，其中若干集团，主要是以北村德太郎为首的集团，不赞成这个条约。据‘每日新闻’报道，北村十日说:吉田说日本全国大多数人民希望签订安全条约，这是不符合事实的。这个为日本所不能接受的条约足以引起亚洲的不稳定局势。"},{"type":"paragraph","text":"日本社会党目前在对日和约问题上站在分裂的边缘。最近回到党里来的以前被整肃的右翼社会党人赞成通过这个‘和约’和‘安全条约’，而‘左翼’分子由于担心该党在工人群众中的影响会完全丧失，则反对这个‘和约’和‘安全条约’。例如，该党中央执行委员会主席铃木茂三郎在九日公开抨击单独和约与‘安全条约’。他说:‘这个和约绝不像所宣传那样是重归于好和互相信赖的条约’。他指出:日本人民对吉田内阁外交的指责，将随着时间而增加。他说:单独“和约中所添的准许外国武装部队驻在日本的规定，将使亚洲的危机加深，并使日本不能恢复它的主权。”他忧虑日本在亚洲的孤立地位说:中国、印度和缅甸不参加签署美制和约，意味着‘日本从亚洲分离开来’，因此日本将不可能在经济上自力更生。他又说:由于这些亚洲国家不参加，亚洲问题将很难获得解决。铃木在提到‘安全条约’时指出:这个条约把日本的手脚永远捆住了。铃木接着说，没有一个日本人希望缔结这个条约。"},{"type":"paragraph","text":"社会党影响下的日本工会总评议会的主席武藤武雄，也表示反对单独和约。他说:单独对日和约没有能够明确地终止日本的战争状态。他认为这个条约危害着日本的命运。"},{"type":"paragraph","text":"日本的一些资产阶级大报，也对单独和约的签订感到惶惑不安。它们担心日本将在亚洲孤立起来。东京‘朝日新闻’和‘每日新闻’都抨击吉田在旧金山会议上的演说。‘每日新闻’说:“印度和缅甸没有出席旧金山会议，因此很容易假定:它们的缺席与安全方案(按指‘美日安全条约’)是有微妙的关系的。”该报认为:‘如何促进日本与这些国家的友谊’，是一个‘严重的问题’。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4ba3436e5d"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
