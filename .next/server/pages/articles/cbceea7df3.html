<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"用铁的事实对资产阶级提出控诉","authors":["李汶"],"dates":[{"year":1952,"month":3,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"李汶"},{"type":"paragraph","text":"在打‘虎’斗争之前，我们看到报纸上所披露的许多奸商腐蚀革命干部，和向政府机关猖狂进攻的事例，体会是不大深刻的。‘呀!原来还有这么一会事呢!’这就是我们当时的感觉。但是通过打‘虎’战斗，使我们体会到资产阶级的猖狂进攻是多么的深刻普遍，方式是多么的奸诈毒辣啊!"},{"type":"paragraph","text":"首先，我们深切地体会到资产阶级的进攻决不是偶然的、个别的，而是广泛的普遍的。因为这是与资产阶级的唯利是图、损公利己的阶级性相联系的。任何一个有机会与资产阶级接触的干部，而从这个干部身上，资产阶级又有油水可捞的，那么就没有不进行进攻的。当然，由于我们不少干部是有着阶级觉悟和政治警惕性的，因此有很多进攻是失败了的，但是不可否认，亦有一些干部是被糖衣炮弹击中了要害，而蜕化堕落的。在三反、五反期中，奸商竟敢继续勾引干部订立‘攻守同盟’，企图破坏此一伟大的革命运动。因此，我们差不多每一个进行商人调查的打‘虎’队员，都碰到了很多不必要的困难和挫折。就是这些勾引腐蚀干部、偷工减料、危害人民生命财产的奸商，他们竟敢肆无忌惮地“具结”保证决无任何不法行为。但是终于在我们打‘虎’队员的勇敢和机智的战斗之下，“攻守同盟”一一粉碎。"},{"type":"paragraph","text":"其次，在我们对于大贪污分子跒切教育之下，有些提高了觉悟，坦白了奸商勾引干部的各种奸诈、毒辣、阴险的罪行。而我们在进行商人调查中更发现了奸商的毒辣手腕，他们对于店员工人的进攻也是极其疯狂的，他们以关店、失业、解雇相威胁，以金钱女人为引诱，更有以停伙、断电等进行破坏的。店员工人英勇地与这些非法行为进行了坚决斗争。对于这些正义的斗争，我们每一个打“虎”队员是寄以无限的同情，并坚决予以支持的。"},{"type":"paragraph","text":"根据我们实际工作的经验，证明了一切贪污腐化的根源是在于资产阶级的猖狂进攻。那么如要在根本上肃清贪污腐化的根源就必须对资产阶级的进攻予以反击，把他们的气焰打下去，用行动来教育他们只有在国营经济领导下老老实实地做生意，才有他们的前途。"},{"type":"paragraph","text":"三反打‘虎’的经验证明了:我们的打‘虎’队只有与店员工人结合起来，才能使‘老虎’无所遁形，店员工人以积极检举提供线索帮助了我们的打‘虎’。那么五反打‘虎’也只有与店员弟兄们密切合作，才能完成任务。"},{"type":"paragraph","text":"因此，目前第一步我们要把资产阶级猖狂进攻的种种罪恶行为整理出来，我们要把已经掌握的无可辩解的铁的事实提出控诉，揭破其伪善的面具，使一切正义的人们看清事实的真相。把一切行贿、漏税偷税、偷工减料、盗窃国家资财、盗窃国家经济情报的罪恶行为统统揭发出来，向不法奸商展开总攻。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cbceea7df3"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
