" crossorigin="">{"props":{"pageProps":{"books":[{"id":"62c6dac1-786b-4b09-ac44-7808f29b007c","name":"资本主义是怎样在苏联复辟的（上海人民出版社1975年版）","internal":false,"official":true,"type":"pdf","author":"革命联盟，上海人民出版社1975年版","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives3/main/62c6dac1-786b-4b09-ac44-7808f29b007c.pdf"],"article":{"title":"革命联盟简介","alias":"","parts":[{"type":"paragraph","text":"革命联盟简介"},{"type":"paragraph","text":"今天，无论在美国还是在世界其他地区，越来越多的人正在日益清楚地认识到，需要进行一场革命。我们生活于其中的那种制度是由银行家和大商人所统治的，这种制度早已陷入愈来愈深重的危机和混乱之中。随着统治者对我们的压追愈益加剧，随着他们在世界各地激烈地争夺从人民掠夺来的赃物，失业、非人的劳动强度、通货膨胀、社会腐败、社会服务事业的瘫痪、对民主权利的践踏、对妇女的歧视以及妇女的堕落、对被压迫民族和少数民族的统治、侵略战争和世界大战的威胁等等一一所有这一切社会危机正在严重恶化。"},{"type":"paragraph","text":"但是，上述情况只不过进一步表明了，我们的这个制度是一个世界性的掠夺制度，即帝国主义制度。被剥削者和被压迫者反对这一制度的斗争正在世界范围内蓬勃发展。过去十年中，在美国掀起了声势浩大的群众运动，诸如反对对少数民族的压迫、反对侵略战争、反对对妇女的压迫、反对警察的恐怖和政府的暴行、反对破坏我们的生活条件和工作条件等。"},{"type":"paragraph","text":"革命联盟作为一个共产主义组织，以发展上述这些群众运动为其基础。不仅如此，革命联盟还以以下这一即资本帝国主义者对劳动人民的压迫；而人民的解放则在于工人阶级推翻帝国主义制度，在于工人阶级领导下的社会主义代替资本主义和一切剥削制度，这种社会主义将把社会推进到完全消灭阶级的共产主义社会。"},{"type":"paragraph","text":"为了完成这一历史使命，为了团结和率领所有的人民为实现这一自标而斗争，工人阶级必须要有自已的政党的领导，必须要有进行革命斗争的自已的总参谋部。在美国，工人阶级目前还没有这样的政党，那个所谓的“美国共产党”早已叛卖了工人阶级，并以维护帝国主义制度为其自标。当此之际，革命联盟一方面努力发展人民运动并使其联合起来，一方面则以谋求同所有坚持无产阶级利益的组织实行联合，从而建立一个新的共产党，这是它的首要任务。"},{"type":"paragraph","text":"创建这样的一个共产党，将意味着美国人民斗争的重大进展。也意味着，代表全人类绝大多数的、掌握着世界未来命运的国际无产阶级战胜腐朽没落的帝国主义剥削制度的日子更加临近了。"}],"authors":["革命联盟"],"dates":[{"year":1974,"month":10}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":371,"page_end":372},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b5f88ac122"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
