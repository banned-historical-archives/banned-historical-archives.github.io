<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"钱学森谈科学","authors":["徐慰农","程士安"],"dates":[{"year":1979,"month":11,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"徐慰农　程士安"},{"type":"paragraph","text":"最近，我们有机会在上海访问了著名科学家钱学森。这位年近古稀的老科学家，容光焕发，精神矍铄。一开头，他就先向我们提出一个问题:“不知道在你们的概念里，社会科学放在什么地位?”"},{"type":"paragraph","text":"我们一听有些纳闷:这位力学专家，今天怎么谈起社会科学来了?这时，钱学森同志接着说:“通常在人们的观念中，科学技术是不包括社会科学的，我想这个看法不一定合适。自从马克思主义的世界观——辩证唯物主义创立以来，大家就认识到，所谓科学就是对客观世界的规律性进行考察、整理，成为理论性的东西。客观世界包括自然界，也包括社会，所以我们就不能把社会科学和自然科学截然分开。”钱学森同志以自己研究系统工程为例，向我们说明:“系统工程既要用自然科学的一套东西，如数学、电子计算机，同时也要用社会科学的成果。因为系统工程就是要研究怎样在最短的时间内，以最少的人力、物力和投资，最有效地利用科学技术的新成就，来完成某一项科研或建设任务。这就涉及到社会科学问题。”"},{"type":"paragraph","text":"钱学森同志又进一步分析说:“再从社会科学本身的发展来看，现在已经不能停留在定性的论述，还要定量，要用数的概念来分析社会现象。譬如目前大家都在讨论我们国家的经济体制问题、经济结构问题。在讨论时，遇到一个很大的困难，就是统计数字不够。我们要处理大量的数据，找到它们内在的关系，把数学的理论、方法，运用到具体的经济计划、经济管理当中去。一些非常复杂的数字关系，还要用电子计算机来处理。”"},{"type":"paragraph","text":"接着，钱学森同志对自己的观点作了归纳:现代科学技术，从理论基础来说，应当是三个组成部分:自然科学、社会科学、数学。由基础科学到应用科学有一个中间阶段，就是技术科学。当然，所有的科学技术都要受马克思主义哲学的指导，而所有的科学技术的实践结果，必然反过来丰富和深化马克思主义的哲学，这是一个辩证关系。"},{"type":"paragraph","text":"说到这里，钱学森又向我们提出了另一个问题:“还有一点，不知道你们是怎么想的，人们在从事科学技术的研究过程中，除了逻辑思维之外，还有没有其他的思维方式?”"},{"type":"paragraph","text":"我们感到很新鲜，试探着回答说:是不是还要用到形象思维?"},{"type":"paragraph","text":"钱学森同志高兴地说:“对啊!还有形象思维，甚至有人说是灵感。我看搞科学技术的人不光是只用逻辑思维。”他接着说:“过去我们有的同志不大愿意提这个，只要一说起灵感，总认为是唯心主义的东西，因为外国人说的灵感是指神灵感受，但是我们所说的灵感，实际上是人的观察、体验在头脑中的飞跃。”钱学森风趣地说:“假如说灵感是神灵感受，那么为什么生下来的孩子没有灵感，不能创造呢?其实，所谓灵感，是从感性认识到理性认识的飞跃，仍是一个实践和认识的问题，所以我们说它是唯物的。现在，逻辑思维我们已经研究得很多了，譬如逻辑学、数理逻辑，所以可以用电子计算机来代替人的一部分脑力劳动，也就是用逻辑思维的脑力劳动。但是逻辑思维以外的东西究竟是怎么一回事呢?我们应该把它作为一门科学来研究。”"},{"type":"paragraph","text":"我们很有兴趣地边听边思考着。钱学森同志又进一步告诉我们:这个问题并不是那么渺茫，也不是那么不可捉摸，我们一方面可以从宏观方面观察，即从心理学来研究，另一方面可以从微观方面观察，就是从大脑神经来研究。这个研究是很有意义的，可以知道人的思维的全部过程。"},{"type":"paragraph","text":"我们又问钱学森同志:“那么，这与发展整个科学技术有什么关系呢?”他回答说:“我们研究人的思维，是为了充分发挥人的作用。在科学实验的过程中，常常有这样的情况，经过各种各样的假设、推论，多种途径的探索都不行，在走投无路的时候，突然想出一个办法，一试就解决了。我们的学生常问:老师，你是怎么想出来的?我说这个问题现在无法回答。有朝一日，我们能有办法教学生怎样创造了，那就是大好事。如果掌握了人的思维规律，人的智慧与创造才能就能得到充分发挥，就能促进科学技术的迅猛发展。”"},{"type":"paragraph","text":"钱学森同志又谈到我国科研人员的培养问题，他说:“中国人是有聪明才智的，又肯刻苦用功，完全能够多出人才，早出人才。在使用人才上，要改变论资排辈。正如邓小平同志所说，我们的科学工作者，只要他们合乎研究员、教授的标准，那怕他只有三十岁，也要把他们提拔到研究员和教授的岗位上来。当然，要做到这一点，还得解决许多具体问题。”说到这里，他起身从写字台抽屉里拿出一张今年十月二十六日的《北京科技报》，给我们读了题为《中年科技人员在学习和工作中的苦恼》这篇文章的三个小标题:"},{"type":"paragraph","text":"一、信任和重视了吗?"},{"type":"paragraph","text":"二、任人唯贤了吗?"},{"type":"paragraph","text":"三、待遇平等了吗?"},{"type":"paragraph","text":"读完，钱学森同志笑着说:“我敢夸这个口，只要能很好地解决这些问题，为培养人才创造良好的客观条件，那么，就拿我们的高等学校来说，在现有的基础上，五年功夫就可以达到世界水平。”"},{"type":"paragraph","text":"最后，他还强调指出，现代科学技术的研究不能靠一个人的劳动，在评价科技成果和培养科技人员时，要注意这一点。百分之九十五的科学技术都要靠集体，不能搞单干，单干没有生命力。当然并不是吃大锅饭，这个关系也是辩证的。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"钱学森","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c2a14fda7e"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
