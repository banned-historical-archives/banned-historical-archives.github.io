script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"进行坚持四项基本原则反对资产阶级自由化的正面教育  空军党委提出重点抓好对团以上干部教育","authors":["蔡善武"],"dates":[{"year":1987,"month":3,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"进行坚持四项基本原则反对资产阶级自由化的正面教育"},{"type":"paragraph","text":"空军党委提出重点抓好对团以上干部教育"},{"type":"paragraph","text":"本报讯　新华社记者蔡善武报道：“空军全体指战员要旗帜鲜明地坚持四项基本原则，反对资产阶级自由化。要在抓好普遍的正面教育的同时，重点抓好团以上领导干部的教育”。这是2月26日，空军政治委员朱光在空军党委六届七次全体会议上提出的要求。"},{"type":"paragraph","text":"朱光说，空军党委决定，在这次党委扩大会议结束之后，立即举办军以上单位政委或主任读书班。各军区空军和军，也要采取办读书班、以会代训等形式，抓好师、团领导干部的轮训。在教育中要做到三个结合一个促进：即把坚持四项基本原则、反对资产阶级自由化的教育同法制教育有机地结合起来，同学习贯彻军委扩大会议精神紧密结合起来，同理论教育结合起来，促进空军部队现代化、正规化建设和各项工作。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9493420842"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
