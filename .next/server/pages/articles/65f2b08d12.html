鼓舞，最大支持，最大鞭策。我们坚决拥护中央文革的贺电，我们坚决拥护市革会的贺词，我们完全同意王洪文同志的报告，我们要把贺电和报告的精神买御到工作中，落实在行动上。"},{"type":"paragraph","text":"大学大用毛主席光焰无际的建党思想，彻底批中国赫鲁晓夫的修正主义建党路綫，是当前的斗争大方向，是当前开展革命大批中最最重要的一个内容。大学大用毛主席的建党思想，彻底批判中国赫鲁晓夫的建党路綫，是当前头等重要的政治任务品i品"},{"type":"paragraph","text":"革命的根本问题是政权问题，政权是由政党来领导的，没有一个无产阶级的政党，政权就不可能掌握在无产阶级手里。中国赫会晓夫刘少奇和党内另一个最大的走资派邓小平要篡政，必先篡党。多年来刘少奇固地推行了一整套修正主义的建党路綫，疯狂地反对以毛泽东思想为我们党的唯一的指导思想，其根本目的，就是妄图篡夺党的导权，从而实现其复辟资本主义的罪恶目的。前一段时间，我厂革命委员会的指导思想不是很明确，并且受到右的和“左”的方面的于扰，斗筝矛头指向一些具"},{"type":"paragraph","text":"—76体问题的改革。果，阶级斗争放松了，各种各样的矛盾接睡而来，革命委员会处于被动应付的局面。"},{"type":"paragraph","text":"当厂革命委员会紧紧抓住批判中国赫鲁晓夫修正主义建党路这个以后，局面就为之一变。全厂上下，排除了干扰，斗争目标十分明确，斗争火力十分集中，其他一些矛盾，也就退居到次要地位。经历了这一阶段斗争的炼，厂革委会的同志，和许多无产阶级革命派战士，对必须紧紧掌握斗争大方向的体会更加深刻了。对当前正在进行的这场斗争的意义也认识得更加清楚了。"},{"type":"paragraph","text":"中国赫鲁晓夫长期以来披着“党的建权威”的外衣，疯狂地反对毛主席的建党路綫，顽固地推行修正主义建党路。他有时赤膊上阵，有时打着红旗反红旗，手法十分恶劣，十分隐蔽。只有大学毛主席建党思想，掌握了毛泽东思想这个政治上的望远镜和显微镜，才能叙掉中国赫鲁晓夫的一切伪装，彻底暴露修正主义建党路綫的罪恶本质。"},{"type":"paragraph","text":"广大党员、无产阶级革命派战士和革命群众在大批中，紧密地联系我厂党内两条路斗争的实际。船体车间在批中国赫鲁晓夫安图算改党的性质，把党变成生产行政部门的附属品时，揭发了我厂党内走资派推行南斯拉夫“工人自治”式修正主义企业体制的罪行。我们深刻地体会到，只有狠批本单位的党内走资派，才能更加看清中国赫鲁晓夫的丑恶嘴脸。只有把批判中国赫鲁晓夫的修正主义建党路綫与本单位实际情况联系起来，才能最大限度地反映广大群众对于整顿党粗织和建设党粗织的意愿，最大限度地集中广大群众的智慧，才能提出符合毛泽东思想的整頔党粗织和建设党粗的建来。"},{"type":"paragraph","text":"要深入开展对刘邓修正主义建党路的革命大批判，必须深人致地发动群众。开始，会出现过群众归群众批，学习班学"},{"type":"paragraph","text":"77-具归学习班学具批，负查这一批制的小粗成具也没有很好深入群众。有个工人一针见血地批了这种现象。他对批制小粗同志们录：“你们不能关门出主意，光靠你们几个人是不能把中国赫春晓夫的修正主义黑货批倒批臭的！”批制小粗同志接受了群众的批，学习了毛主席语录：“如果只有广大群众的积极性，而无有力的领导骨干去恰当地粗群众的积极性，则群众积极性既不可能持久，也不可能走向正确的方向和提到高级的程度。”我们遵照毛主席的教导，改进了领导方法，批判小粗的每个成具除自己学习、批判，考虑整党的建外，还分散到各学习班一起学，一起批；学习班学员除了自已活动外，也参加本车间本科室小组的学习批，井把大家的意见集中起来，反映上去。朵取了这些上下结合和学习班内外合的办法以后，不但沟通上下情况，又进一步把群众发动起来，形成了轰轰烈烈的“人民战争”"},{"type":"paragraph","text":"通过这次工代会，我们要更高地举起毛泽东思想伟大红旗按毛主席的指示办事，按照中央文革贺电我们指出的方向前进。在市革会的领导下决心将无产阶级文化大革命进行到底！把我厂办成一个红彤彤的毛泽东思想大学校！"},{"type":"paragraph","text":"+一九六七年十二月四日"},{"type":"paragraph","text":"78坚决紧跟毛主席的伟大战略部署为人民的利益坚持好的改正错的"},{"type":"paragraph","text":"自动化仪表九厂工人造反大队代表张振芳发言各位首长，亲爱的解放军同志们，无产阶级革命派战友们："},{"type":"paragraph","text":"首先让我们共同祝愿我们心中最红最红的红太阳毛主席万寿无疆！万寿无疆！"},{"type":"paragraph","text":"我今天主要向大家汇报一下自已在运动中学习毛主席著作的一些初步体会，希望大家批帮助。"},{"type":"paragraph","text":"无产阶级文化大革命是一场触及人们灵魂的大革命，回顾一年以来，的确是翻天覆地、震世界的一年。对我来也是不平凡的一年。"},{"type":"paragraph","text":"我们自动化仪表九厂造反队，是在安亭事件中诞生的，造了我厂旧党总支的反，造了党内一小走资派的反，冲破了资产阶反动路綫重重障碍，杀了出来，我同广大造反队具一样，在运动中经受了炼，提高了思想，加强了对毛主席著作的学习，力求学一点、用一点。"},{"type":"paragraph","text":"运动初期，自已在资产阶级反动路的压制下杀了出来，当时我感到我厂的运动大方向离开了毛主席的革命路，十六条指出：我们的目的是斗跨走资本主义道路的当权派。而我厂却出现了群众斗群众的现象，这不符合十六条精神，在这种思想指导下，我参加了造反队，起来造反了。大家又选我当了大队委。"},{"type":"paragraph","text":"年来，由于自己主观世界没有改造好，在造反的同时，夹带了"},{"type":"paragraph","text":"79"}],"authors":["东方红造船厂革命委员会代表"],"dates":[{"year":1967,"month":12,"day":4}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":46,"page_end":47},"tags":[{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"中央文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"人民战争","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"65f2b08d12"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
