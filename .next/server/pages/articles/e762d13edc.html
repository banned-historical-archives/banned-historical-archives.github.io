script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoistlegacy.de-2292","name":"中国人民解放军军事法院刑事判决书【胡萍】","author":"中国人民解放军军事法院","internal":false,"official":false,"type":"unknown","files":[],"article":{"title":"中国人民解放军军事法院刑事判决书【胡萍】","dates":[{"year":1982,"month":2,"day":26}],"is_range_date":false,"authors":["中国人民解放军军事法院"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"《历史的审判（续集）》编辑组，历史的审判（续集），327-329","tags":[{"name":"胡萍","type":"主题/事件"},{"name":"九一三事件","type":"主题/事件"},{"name":"军事法院","type":"主题/事件"},{"name":"林彪","type":"主题/事件"},{"name":"林立果","type":"主题/事件"},{"name":"判决书","type":"主题/事件"}],"parts":[{"type":"title","text":"中国人民解放军军事法院刑事判决书"},{"type":"subtitle","text":"(1982)刑字第2号"},{"type":"paragraph","text":"公诉人：中国人民解放军军事检察院检察员阚国富、韩鹤。"},{"type":"paragraph","text":"被告人：胡萍，男，汉族，现年五十八岁，山东省乳山县人，一九四〇年二月入伍，原任空军司令部副参谋长。一九七一年九月十三日被隔离审查，一九八〇年七月二十九日被逮捕。现在押。"},{"type":"paragraph","text":"被告人胡萍资敌一案，由本院依法组成合议庭，于一九八二年二月二十六日在本院法庭依法进行了公开审理。中国人民解放军军事检察院检察员阚国富、韩鹤出庭支持公诉。经审理查明："},{"type":"paragraph","text":"一九七一年九月八日晚九时四十分，林彪反革命集团案主犯林立果、周宇驰找胡萍在北京西郊机场候机室密谈，给胡萍看了林彪九月八日下达的反革命武装政变手令：“盼照立果、宇驰传达的命令办”，要胡萍准备两架飞机。随后，胡萍找7196部队副政委潘景寅等人作了安排，为林彪准备了三叉戟256号和伊尔十八703号两架飞机，并选配了机组成员。"},{"type":"paragraph","text":"九月十二日，林彪反革命集团谋害毛泽东主席的阴谋破产后，策划南逃广州，另立中央政府。当天下午四时半，周宇驰又在北京西郊机场秘密据点，找胡萍密谋，再调六架飞机去广州，并要胡萍于十三日七时半和他乘伊尔十八飞机先去山海关，尔后改乘三叉戟256号专机同林彪一起飞往广州。晚七时三十八分，胡萍按照周宇驰的旨意，秘密将为林彪准备的三叉戟256号专机调往山海关机场。为掩盖阴谋，将256号专机谎报为一般客机252号。晚九时许，胡萍在北京西郊机场候机室，先后找人对去广州的六架飞机做了具体安排确定了三叉戟254号，伊尔十八902号，安十二231号，安二十四024号和云雀直升飞机两架，定了机组主要成员，并以“训练”为名向西郊场站航行调度室申请了假航线。晚十时许，周恩来总理责成吴法宪追查256号专机突然去山海关的行动，并指示“飞机要调回来”。胡萍一面谎报256号专机去山海关机场是“飞行训练”，并伪称“飞机发动机有故障”；一面给在山海关机场的三叉戟256号专机机长潘景寅打电话说，“如果吴法宪向你这架飞机为什么不回来，你就说飞机发动机有故障”。同时，将周恩来总理追查飞机的情况密告周宇驰。以此对抗和欺骗周恩来总理，为林彪、叶群、林立果等人于十三日零点三十二分乘三叉戟256号飞机叛国外逃提供了条件。"},{"type":"paragraph","text":"上述事实清楚，证据确凿，被告人亦供认。"},{"type":"paragraph","text":"被告人胡萍为林彪反革命集团阴谋活动提供飞机，造成了严重后果，已构成资敌罪。本院为维护社会主义法制，巩固人民民主专政，保卫社会主义制度，依照《中华人民共和国刑法》第九十七条第二项和第五十二条之规定，判决如下："},{"type":"paragraph","text":"一、判处资敌犯胡萍有期徒刑十一年。刑期自判决执行之日起，扣除判决执行前的羁押期，至一九八二年九月十二日止。"},{"type":"paragraph","text":"二、剥夺其政治权利三年。"},{"type":"paragraph","text":"三、剥夺其三级独立自由勋章、三级解放勋章。"},{"type":"paragraph","text":"如不服本判决，可从接到判决书的第二天起，十日内向本院提出上诉状及副本，上诉于中华人民共和国最高人民法院。"},{"type":"subtitle","text":"审判长 姚祖恩"},{"type":"subtitle","text":"审判员 梁有成"},{"type":"subtitle","text":"军人陪审员 刘玉荣"},{"type":"subtitle","text":"军人陪审员 王克东"},{"type":"subtitle","text":"军人陪审员 涂序凑"},{"type":"subtitle","text":"一九八二年二月二十六日"},{"type":"paragraph","text":"此件与原本核对无异"},{"type":"subtitle","text":"书记员 郭庆春"},{"type":"subtitle","text":"一九八二年三月一日"}],"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"吴法宪","type":"人物"},{"name":"林彪","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e762d13edc"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
