script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"印共组成新的中央委员会  纠正旧政治局左倾宗派主义的错误  以中国民族解放运动的经验为根据采取新的线","authors":[],"dates":[{"year":1950,"month":8,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"印共组成新的中央委员会"},{"type":"paragraph","text":"纠正旧政治局左倾宗派主义的错误"},{"type":"paragraph","text":"以中国民族解放运动的经验为根据采取新的路线"},{"type":"paragraph","text":"【新华社十三日讯】孟买讯：印度共产党中央委员会于七月十七日发表声明一件。该声明说：印度共产党中央委员会最近集会并取得了政治和组织方面的重要决议。"},{"type":"paragraph","text":"声明说：在过去两年中，政治局一直采取着左倾宗派主义的政策。在城市和工业中心所采行的完全是左倾冒险主义的不能适合当时情势的战术路线。在农村中，政治局严重地低估了迫切需要的反封建的土地改革的整个意义，而同时则采取托洛茨基派的斗争战略与冒险主义的战术，没有展开适当的斗争方式。遵循政治局此种路线的影响所及，是在农村中完全分化了农民的团结，使他们在残暴的压制之下陷于一筹莫展之中。"},{"type":"paragraph","text":"关于党内的状况，声明说：政治局所依靠的组织方式并不符合马列主义的原理原则，而具有高度的专横独断作风，对干部和对组织本身表示出一种无情的冷淡态度。"},{"type":"paragraph","text":"声明接着宣布了中央委员会在纠正旧政治局错误以后所采取的新的路线。声明说：印度解放斗争现阶段所决定的战略，是加强工人阶级和全体农民的联盟，以及在工人阶级领导之下团结一切愿意保卫国家独立与自由、反对残暴地剥削、压迫着印度的英美帝国主义者与他们的印度傀儡（大资产阶级与封建分子）的阶级、政党和团体。工人阶级和共产党应当为此而组成一个广泛的、全国性的、以工人阶级为领导的统一战线，为实现印度的土地改革而斗争，为实现印度民族解放，争取世界和平，反对帝国主义把印度变为战争基地的阴谋而斗争。"},{"type":"paragraph","text":"声明在提到中国革命的经验时说：中央委员会决定的今后所将采取的战术，将以中国民族解放运动的经验为根据。中国的所走过而为东南亚国家今天所采取的道路，是摆在印度人民面前唯一正确的道路。中央委员会无保留地取消了旧政治局对中国共产党所曾作过的完全错误的、不负责任的和诽谤性的批评，并为此通过一项决议，向中国共产党表示歉意。"},{"type":"paragraph","text":"声明说：中央委员会已将旧政治局解散，并撤换总书记兰那地夫同志的职务。中央委员会也在旧中央委员会一致通过之下重新组成。新组成的中央委员会一致选出拉治施瓦·劳同志为总书记，新政治局亦在一致同意下组成。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"efede6a6fd"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
