script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"紧跟伟大舵手毛主席就是胜利","authors":["张逸民"],"dates":[{"year":1967,"month":11,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"紧跟伟大舵手毛主席就是胜利"},{"type":"paragraph","text":"海军首次学习毛主席著作积极分子代表大会代表、海军某支队政治委员　张逸民"},{"type":"paragraph","text":"我们依靠战无不胜的毛泽东思想，在伟大舵手毛主席指引的航道上前进，就一定能从胜利走向胜利，一定能建设成为非常无产阶级化非常战斗化的强大海军，担负起保卫祖国和支援世界革命的伟大历史使命。"},{"type":"paragraph","text":"在世界进入以毛泽东思想为伟大旗帜的新时代，我们伟大统帅毛主席最亲密的战友、我们敬爱的副统帅林副主席，为我们海军首次学习毛主席著作积极分子代表大会题词：“大海航行靠舵手，干革命靠毛泽东思想”，这是全党、全军、全国政治生活中的一件特大喜讯。“大海航行靠舵手，干革命靠毛泽东思想”，这是我军建设的方向，是我军建设的根本的根本，是最科学、最精辟、最深刻地概括了当代无产阶级革命斗争的经验，是千真万确的真理。"},{"type":"paragraph","text":"在海军建设的初期，伟大领袖毛主席就向我们发出了“为了反对帝国主义的侵略，我们一定要建立强大的海军”的伟大号召，建设强大的海军，是走政治第一还是走军事技术第一的道路；是依靠群众建军，还是依靠“专家”建军；海上打仗是靠人，还是靠武器等一系列重大问题上，充满着两条路线的尖锐斗争。中国赫鲁晓夫及其代理人彭德怀、罗瑞卿，拚命地妄想把我们拉向资产阶级修正主义军事路线的泥坑。我们不信鬼，不信神，只有一个信念，紧跟伟大统帅毛主席就是胜利。我们靠了战无不胜的毛泽东思想，紧紧依靠了群众，大破资产阶级修正主义的“唯武器论”、“唯技术论”、“海军特殊论”等等谬论，把过去作战训练中的各种洋教条、洋框框砸了个稀巴烂。例如海上打仗，按照苏修条令的计算，必须用十多艘战艇，才能打一条护卫舰；打一条巡洋舰，需要的战艇就更多了。但是，一九五五年初，我们就是靠了一颗无限忠于毛主席的红心，硬是用单艇击沉了敌舰“洞庭号”。一九六五年崇武以东海战，我们在距敌舰数百米内，冒着敌人密集的炮火，英勇出击，敢于打“白刃战”，在兄弟部队配合下，取得了击沉敌舰“永昌号”的重大胜利，根本不是靠什么技术、专家和现代化的武器装备，完全是靠了人的勇敢战斗精神，靠了战无不胜的毛泽东思想。大树特树毛泽东思想的绝对权威，是我们在海战中取得一切胜利的根本保证。"},{"type":"paragraph","text":"我们依靠战无不胜的毛泽东思想，在伟大舵手毛主席指引的航道上前进，就一定能从胜利走向胜利，一定能建设成为非常无产阶级化非常战斗化的强大海军，担负起保卫祖国和支援世界革命的伟大历史使命。"},{"type":"paragraph","text":"我们要向林副主席学习，更高地举起毛泽东思想伟大红旗，紧跟毛主席的伟大战略部署，以“斗私，批修”为纲，在灵魂深处爆发革命，彻底改造世界观，进一步密切联系群众，甘当群众小学生，永远读毛主席的书，听毛主席的话，照毛主席的指示办事，做毛主席的好战士，誓把海军办成红彤彤的毛泽东思想大学校。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"45ec4aaf50"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
