script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"本市农业生产资料战线遵照毛主席“不违农时”的教导及时做好春耕物资供应工作","authors":[],"dates":[{"year":1970,"month":3,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　本市农业生产资料战线广大革命群众，在伟大领袖毛主席关于“提高警惕，保卫祖国”，“备战、备荒、为人民”伟大战略思想指引下，在积极组织化肥、农药、药械、毛竹、篱杂竹支援农业生产的同时，把工作的重点转到积极帮助社、队贯彻执行毛主席’的“自力更生”的伟大方针方面，决心当好农业生产的后勤，为夺取农业新丰收作出贡献。"},{"type":"paragraph","text":"在毛主席的“农业学大寨”的伟大号召下，本市郊区广大贫下中农发扬“自力更生”、“艰苦奋斗”的革命精神，连续几年夺得了粮棉双丰收。在新的形势下，农业生产资料战线上的革命同志决心更好地支援农业生产，为夺取农业新丰收多贡献一分力量。他们在党的“九大”精神鼓舞下，通过大学习、大批判，进一步克服了“坐镇办商”的思想，走出商店，深入社、队，积极推广绿萍和城市工厂污水的利用，帮助社、队土法生产“九二○”农药，发动社员种竹，并积极开展中小农具的维修和节约代用工作等等，取得了很大的成绩。本市郊区一九六九年绿萍生产比一九六八年有大幅度增长。去年年底市郊十个县解决了绿萍越冬技术。去年各县还组织力量到市区挖掘杂肥，仅苏州河污泥就达四百多万吨。在植保工作上，他们大破“农药挂帅”，大力提倡土办法防治。"},{"type":"paragraph","text":"市农业生产资料公司遵照毛主席关于“发展经济，保障供给”的教导，千方百计组织化肥、农药、药械货源，不误农时，及时供应郊区农村。还组织力量把大量的化肥、农药调运到祖国各地，支援全国各地的农业生产。他们非常重视工业污水的利用。去年，在工业部门的支持下，有六十三万吨工业污水(相当于八万吨硫酸氨)用于农业生产。"},{"type":"paragraph","text":"在当前热气腾腾的春耕备耕工作中，农业生产资料战线各级革委会和广大革命群众，遵照毛主席关于“不违农时”的教导，对春耕物资供应做到早调查、早准备、早下拨、早供应。今年的化肥、农药、药械的调拨数量都比去年同期有所增长，市土产公司对农业用竹也作了适当安排，基本上满足了春耕生产的需要。松江县农业生产资料公司革委会在春节前就组织力量到张泽、泗联公社了解今年农业生产的新特点和对农业生产资料工作的新要求，虚心听取贫下中农意见，提早供应化肥、农药。南汇、嘉定等县农业生产资料部门和农业局先后召开了植保会议，具体部署了夏熟作物全面用酒糟和点灯诱杀地粘虫、地老虎、蛾子等工作，以减少虫子对三麦、棉花的危害。"},{"type":"paragraph","text":"最近，农业生产资料战线广大革命群众，在工宣队、军宣队和革委会的领导下，狠抓革命，猛促生产，进一步搞好农业生产资料的供应工作，决心在夺取今年农业新丰收的战斗中立新功。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"942f2eed6a"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
