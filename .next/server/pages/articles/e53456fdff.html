script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"德奥呼吁警惕极右势力","authors":[],"dates":[{"year":1993,"month":11,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"德奥呼吁警惕极右势力"},{"type":"paragraph","text":"据新华社北京１１月１０日电综合本社驻波恩和维也纳记者报道：昨天是德国法西斯迫害犹太人日５５周年，德国和奥地利的政治家发表讲话，呼吁人们对极右势力提高警惕，不要使历史重演。"},{"type":"paragraph","text":"１９３８年的１１月９日，希特勒纳粹开始疯狂迫害犹太人。这一天夜里，２６７座犹太教堂被捣毁，约３万名犹太人被捕并被送入集中营。这一天因而被定为迫害犹太人日。"},{"type":"paragraph","text":"德国联邦议院９日在柏林举行特别会议，议长聚斯穆特夫人要求以更大的勇气，保障自由民主权利，支持外籍居民和少数民族。德国犹太人中央理事会发表声明，告诫人们不要忘记这个日子，呼吁各政党和社会团体更加警惕极右和种族暴行。"},{"type":"paragraph","text":"同日，奥地利总理弗拉尼茨基也在奥地利发表讲话，提醒人们警惕仇外、排外势力。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e53456fdff"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
