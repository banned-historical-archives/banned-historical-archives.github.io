script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"比共书记格里巴谴责苏共二十三大  列宁的党的代表大会已被赫鲁晓夫分子破坏  帝国主义和修正主义遭严重失败必将被粉碎","authors":[],"dates":[{"year":1966,"month":3,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"比共书记格里巴谴责苏共二十三大"},{"type":"paragraph","text":"列宁的党的代表大会已被赫鲁晓夫分子破坏"},{"type":"paragraph","text":"帝国主义和修正主义遭严重失败必将被粉碎"},{"type":"paragraph","text":"新华社二十八日讯  布鲁塞尔消息：比利时共产党中央委员会书记格里巴在二十五日出版的《人民之声》周刊上发表题为《关于苏联共产党第二十三次代表大会》的文章。"},{"type":"paragraph","text":"文章指出，这次大会同列宁的党的代表大会毫无共同之处。"},{"type":"paragraph","text":"文章说，人们在比利时赫鲁晓夫派的报纸《红旗》三月二十三日一期上看到该报驻苏记者写的一篇关于将在三月二十九日在莫斯科举行的所谓“苏共第二十三次代表大会”的文章。"},{"type":"paragraph","text":"这篇文章表明了苏联修正主义者及其比利时走狗的完全蜕化以及他们对马列主义、无产阶级国际主义、人民的事业的彻底背叛。这是对马列主义的根本原则的彻头彻尾的攻击。"},{"type":"paragraph","text":"它对第二十次代表大会和赫鲁晓夫的修正主义观点进行颂扬的同时，对斯大林同志进行了诽谤性的攻击。"},{"type":"paragraph","text":"文章说，修正主义者所希望的是，工人阶级、劳苦大众和各国人民放弃用革命的暴力来反对反革命的暴力，放弃挣脱枷锁的斗争，而接受奴役。"},{"type":"paragraph","text":"文章指出，马克思列宁主义的党和组织之所以受到赫鲁晓夫修正主义者的侮辱、诬蔑和攻击，是因为他们坚定不移地站在马克思列宁主义、无产阶级国际主义和一贯坚持革命斗争的立场上。"},{"type":"paragraph","text":"文章说，苏共第二十三次代表大会同列宁的党的代表大会毫无共同之处，因为列宁的党的代表大会已暂时被叛徒赫鲁晓夫分子破坏了。"},{"type":"paragraph","text":"文章说，在苏联如同在其它处在修正主义统治下的国家一样，有代表着社会主义革命事业的马克思列宁主义者，这一革命事业在修正主义篡夺者被赶走之后一定会重新获得胜利。"},{"type":"paragraph","text":"文章说，美帝国主义在世界上变本加厉地进行侵略，但是它越来越孤立，正在自掘坟墓。"},{"type":"paragraph","text":"在政治上支持美帝国主义的修正主义，也越来越暴露了自己的真面目。"},{"type":"paragraph","text":"文章最后指出，帝国主义和修正主义都已经遭到严重失败。"},{"type":"paragraph","text":"修正主义一定会被清除。"},{"type":"paragraph","text":"以全世界人民的头号敌人美帝国主义为首的剥削者和压迫者也一定会被粉碎。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"072b6fc37b"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
