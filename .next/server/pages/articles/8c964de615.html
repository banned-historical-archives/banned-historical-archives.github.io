script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"节过端阳菜仍涨 原来有人在剥削告诉你:菜是怎样涨价的","authors":[],"dates":[{"year":1946,"month":6,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"端午节过了，蔬菜还是只涨不跌，在节前我们有成见，因为这是年节例规，应时应景的涨价是免不了的，现在节也过了，为什么还是这样直向上爬呢?这里让记者来告诉各位一点理由-涨价的大道理。我想各位看到五月份的生活指数，食物一项，较四月份超过二千倍之奇峰突出，一定愿知其详吧!"},{"type":"paragraph","text":"在敌伪时代的上海，老百姓每天营养所需的蔬菜，都是从一个统制机构“中央市场”里配给出来的，老百姓忍气吞声，处在敌伪淫威之下，惟有听其剥削。这个机构的寿命，一直延长到全面胜利后半年多才取缔，自由的市民们有便宜的菜肴吃了，你想听到这个消息，岂不高兴万分?可是这一个月来的菜价，竟是出乎意料的日涨夜大。“中央市场”是取消了，可是另一个“蔬菜市场”就要出现。目前虽未成立，但是在暗低下早就存在一个垄断的机构，在“中央市场”的原址，继续收取场费，美其名曰“水电费”，值百抽一，加上菜船到埠，码头上名目繁多的一笔开销，这数目就很值得注意了。“羊毛出在羊身上”你叫他不涨价售出，又怎能维持客户的成本及利润呢?这个机构的主持人又是谁呢，说来也是颇具声名的——沈文彬。堂堂的头衔是“伪中央市场货物部部长杨观旂的秘书”，杨逆是早知自己罪大恶极，恐难逃国法，所以避匿不出，但还不忘情于旧业，遂阴使沈文彬出面主持这个肥缺。沈文彬正以为自己是此中能手，而大肆向各方联络，意欲组成这个“蔬菜商场”，他就不知道自己本来的面目，一味要尝尝剥削市民的滋味。你想蔬菜进出在这样人的手中，能不很贵的转售到市民的面前吗?这里是一个原因。还有一个原因呢，现在在苏州河畔，拿着所谓“一帖一称”的无定址的行老板，多得邪气，各处来的菜船，投到正式的行家时，他们就在旁边提高货价买进，因为不如此，他们就无货可买进。于是，你叫高，他再叫高，我更叫高。为要抢到客户，于是愈叫愈高，反正是贵买贵卖，水涨船高，他们怎会念到全上海的市民，又要挖出多少血汗钱才买到一丘小菜!有了这二个大原因，又怎不叫我们吃近千元一斤的蔬菜呢?这里面的黑暗，未知当局已否洞察，希望赶快能够完善的措置。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8c964de615"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
