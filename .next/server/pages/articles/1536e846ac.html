" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoistlegacy.de-2608","name":"最高人民法院关于平反纠正冤、假、错案应制作何种法律文书的复函","author":"最高人民法院","internal":false,"official":false,"type":"unknown","files":[],"article":{"title":"最高人民法院关于平反纠正冤、假、错案应制作何种法律文书的复函","dates":[{"year":1978,"month":12,"day":13}],"is_range_date":false,"authors":["最高人民法院"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"安徽省司法厅，司法工作手册（第三辑），493","tags":[{"name":"平反","type":"主题/事件"},{"name":"文书","type":"主题/事件"},{"name":"冤假错案","type":"主题/事件"}],"parts":[{"type":"title","text":"最高人民法院关于平反纠正冤、假、错案应制作何种法律文书的复函"},{"type":"subtitle","text":"1978年12月13日     （78）法办研字第31号"},{"type":"paragraph","text":"云南省高级人民法院："},{"type":"paragraph","text":"你院法司字[1978]第41号请示已收阅。关于人民法院平反纠正冤案、假案、错案应制作何种法律文书的问题，现将我们的意见函告如下："},{"type":"paragraph","text":"一、人民法院对于平反纠正的冤案、假案、错案，应当用判决改判，即撤销原来有错误的判决而重新判决。"},{"type":"paragraph","text":"二、改判应制作判决书。判决书属于法律文书，具有法律效力。平反释放证明书只是证明人民法院对冤案、假案、错案通过改判作了平反纠正，它本身不是改判的法律文书。因此，不能以平反释放证明书代替改判的判决书。"},{"type":"paragraph","text":"三、改判的判决书，在判决书的种别上仍属刑事判决书，无须写“平反判决书”。在刑事判决书方面，再去分具体的种别，是没有必要的。至于改判的判决书的观点是否鲜明、正确，主要应看判决书的内容是否实事求是，是否符合政策、法律，单从判决书的名称上是不足以体现出来的。"},{"type":"paragraph","text":"以上意见，请你们在向省委请示时转告省委参考。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1536e846ac"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
