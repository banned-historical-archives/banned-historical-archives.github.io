<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"右派言论——“90％的党员是教条主义者”","authors":["南开大学","龚恢先"],"dates":[{"year":1957,"month":5}],"is_range_date":false,"parts":[{"text":"右派言论——“90％的党员是教条主义者”","type":"title"},{"text":"南开大学龚恢先","type":"authors"},{"text":"[龚恢先：南开大学物理系学生]","type":"subtitle"},{"text":"一、攻击党的领导。","type":"subtitle"},{"text":"党委制应取消，外行不能领导内行。文化、科学、艺术应由内行领导。党只能做思想领导。党领导了文艺，结果解放后我国文艺事业基本失败。党不应在领导地位学习，而应学习后领导。","type":"paragraph"},{"text":"党团员、积极分子是白痴、木偶、三害的看门狗。90％的党员是教条主义者。解放后入党入团的都是为了升官发财，不想升官发财就不入党入团。","type":"paragraph"},{"text":"学生会主席不是玩意儿，学生会不独立，看党团眼色行事，改选学生会。","type":"paragraph"},{"text":"三害是社会主义道路上的最大障碍，一些反革命和别有用心的人是不足以抵挡向社会主义前进的，现在学校领导的意图是避重就轻的。","type":"paragraph"},{"text":"二、反对马列主义。","type":"subtitle"},{"text":"现在正处在一个教条主义占统治地位的时期，这是人们思想意识发展的必然规律决定的。关于人们思想意识发展过程是前进和停滞互相交替的，因为人的思想意识是客观世界变化的反映，人的思想规律也正是客观规律的反映，我们知道在人类社会和人类本身的发展过程中前进和停滞总是相互交替的，也就是说，人类社会的发展是呈现起伏状的，自然这种曲线后一波和前一波的基础是不同的。这样的客观现象在人们思想意识里就形成教条主义——经验主义的出现的高低期间，前进和落后的交替。每每在一个巨大的胜利之后，在人们的思想里就会渐渐形成一种教条主义——经验主义的高涨状况，人们给那些曾经在取得胜利的斗争中摸索和建立起来的经验和理论，给以极大的信任，这些经验与理论在胜利后仍然成为人们解决问题的依据。在胜利后不久旧的状况并未结束，新的情况还是在个别地方里出现，所以在这时，这些经验和理论的应用，还会给人们带来新的胜利，这就给我们以更大的安慰，对它们更加信任起来，在这种有利的环境里，人们思想的堕性开始扩大它的势力，慢慢地侵入思想的生命力，这样人们的思想就会呆板起来，对于新的情况新的事物感觉不灵，而用老一套来解决新问题，如是必然的错误就出现，而它的出现又反映出人们思想状况。","type":"paragraph"},{"text":"胜利之后必定产生教条主义，并不是可能和温床的问题，李立三的教条主义错误正是十月革命胜利之后。不应只看中国的情况，在同时，世界各国都产生了严重的教条主义，在阶级斗争激烈时期教条主义的影响较明显，所以易于克服，而现在是不这样明显，所以克服是较难的，高潮时期也就较长。","type":"paragraph"},{"text":"教条主义的思想状态，是存在于整个社会的，除了少数人以外，每个人都存在着教条主义的思想倾向，所以反教条主义是一场深刻的思想斗争，要想从根本上解决问题，必然分两步进行。第一阶段是自发的反教条主义错误的斗争，这是反教条主义的初级形式，是不彻底的作法，因这一阶段中主要是揭发教条主义的错误，并加以纠正。第二阶段是从思想上开展自觉的反教条主义思想倾向的斗争，这是彻底的作法，只有这样才能真正清除人们头脑里的教条主义倾向。","type":"paragraph"},{"text":"一切自然界的变化，其中包括人类社会及人类本身的变化，都遵循着各自的规律，这些规律有的人们已经认识和发现，有的还依然是谜，而且人们认识的和可能认识的都是极有限的，对于这样大的宇宙的全部，无限多的规律，真是九牛之一毛，当然人类对控制整个自然是无能为力的，因为他想认识自然真相全不可能吗！","type":"paragraph"},{"text":"世界悠悠，人生何短，一个人从生到死忽忽几十年，即使你不休息时间也有限，你所能看见听见，觉到认识的事情也是极为有限的，就以这有限的时间，有限的精力，你如何能战胜这无限之宇宙。一个人无能为力，整个人类又如何呢？在我看来，整个人类，总其智慧集其精力和光阴，也仍然是有限的，它和个人相比好像一个巨人，但这个巨人在他生活的世界里同样是渺小的。每个人总逃不了要死的，而这人类的个体的必然灭亡，显示出整个人类灭亡的危机，我一直害怕，并一直相信人类必然灭亡，后来我看到恩格斯也同意这一点，他说“……因此，它在某个时候以铁的必然性毁灭自己在地球上最高的花朵——思维和精神……”。而思维和精神正是人类和别的东西相区别的地方，如果它消灭了，人类自然也变成了别的东西，就像人死了以后又重新分解为各种元素及化合物一样。人一定会死，人类一定要毁灭而自然界永远长存变化不息。","type":"paragraph"}],"comments":[],"origin":"《南开大学右派反动言论选集》（天津：南开大学社会主义思想教育教研室，1957年9月）。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fd6e2be54f"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
