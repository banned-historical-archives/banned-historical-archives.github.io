<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反对垄断资本的残酷剥削和转嫁日益严重的经济困难  西欧广大工人掀起罢工斗争的新浪潮","authors":[],"dates":[{"year":1974,"month":5,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反对垄断资本的残酷剥削和转嫁日益严重的经济困难"},{"type":"paragraph","text":"西欧广大工人掀起罢工斗争的新浪潮"},{"type":"paragraph","text":"新华社一九七四年四月三十日讯　今年以来，西欧不少国家的工人掀起了罢工斗争新浪潮，反对垄断资本的残酷剥削和转嫁日益严重的经济困难。他们的斗争使垄断资本集团受到了沉重的打击。"},{"type":"paragraph","text":"英国二十七万煤矿工人在坚持了将近三个月的怠工斗争之后，又从二月十日至三月十一日举行了长达一个月的全国性罢工；四月中、下旬，一百二十五万机械工人和五万名政府职工又展开了拒绝超时工作的斗争。在意大利，继冶金、纺织、化工、机械和食品等行业上百万工人一再举行罢工以及南部坎帕尼亚大区七十万工人大罢工之后，二月二十七日爆发了工业、交通运输业、农业、商业、旅游业以及国家机关、学校等各部门职工一千三百万人的全国总罢工；四月二十四日，二百万农业工人又举行了大罢工。在法国，银行职工、电力和煤气工人以及码头工人都举行了全国性罢工；洛林地区的煤矿工人、巴黎和波尔多等地的冶金工人、里昂的邮政职工等，也举行了罢工；还有不少地区的职工举行了声势浩大的示威游行和集会。在西德，全国交通运输、邮政、电话、城市清洁等部门以及剧场、医院、飞机场的职工约十五万人从二月十日至十三日举行了西德历史上规模最大的一次罢工斗争；三月份，不来梅市和不来梅港五万三千五金工人又举行了长达三个星期的罢工。就是在一向被认为比较“平静”的北欧，工人的罢工斗争也有新的发展。"},{"type":"paragraph","text":"西欧各国广大工人在罢工斗争中显示了团结战斗的精神。英国煤矿工人的斗争就是这方面的一个突出事例。他们的斗争得到了国内外各行业工人的同情和支持。英国机械、运输、电力和其它一些行业的工人还举行集会声援煤矿工人的斗争，或者同矿工们并肩游行示威。法国码头工人也拒绝给运煤去英国的船只装货，以支持英国矿工的斗争。"},{"type":"paragraph","text":"西欧国家工人阶级的罢工斗争，给垄断资本以沉重的打击。英国煤矿工人的斗争，使英国大部分工业企业的生产只能达到正常水平的百分之七十左右，而钢厂的开工率则下降到生产能力的百分之六十。西德一、二月份全国有十八万五千名职工罢工，使有关当局损失五十六万三千个工作日。在意大利，仅今年一月份就由于工人罢工而使资本家损失了七百三十五万七千个工时，比去年十二月份增加百分之十一点五；二月份以后罢工浪潮更加高涨，垄断资本所受到的打击更加沉重。"},{"type":"paragraph","text":"西欧各国工人罢工斗争的蓬勃发展，反映了这些国家国内阶级矛盾的激化。随着西欧各国财政经济困难的大大加剧，特别是通货膨胀严重、物价猛涨和工业生产日趋停滞甚至下降，垄断资本集团加紧向工人转嫁困难，它们不但拒绝增加工资和改善劳动条件，而且缩短工时、大批解雇工人，甚至关闭工厂，造成大批工人失业。这就必然激起工人的强烈不满，他们纷纷奋起斗争，保卫自己的生活权利。在西欧国家工作的一些外籍工人受到的剥削和压迫更重，他们也越来越积极地参加斗争的行列。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f29c5a165f"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
