script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"光芒四射的毛泽东思想照得郊区一片红金山南汇青浦革命委员会诞生","authors":[],"dates":[{"year":1968,"month":3,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　在光芒四射的毛泽东思想的指引下，金山、南汇、青浦革命委员会宣告成立。至此，全郊区十个县都建立了革命三结合的临时权力机构。"},{"type":"paragraph","text":"昨天，这三个县的广大贫下中农、革命工人、红卫兵小将和革命干部，分别举行庆祝大会。他们高举毛主席画像，手持红彤彤的《毛主席语录》，一遍又一遍高呼:“毛主席万岁!万岁!万万岁!”"},{"type":"paragraph","text":"在这个大喜的日子里，从北京传来了振奋人心的大喜讯:我们伟大领袖毛主席和他的亲密战友林彪副主席接见了军队干部。这是对中国人民解放军的最大关怀，最大鼓舞，也是对全国人民的最大关怀，最大鼓舞。参加庆祝大会的广大贫下中农、革命工人、红卫兵小将和革命干部，万分激动，衷心祝愿我们心中最红最红的红太阳毛主席万寿无疆!万寿无疆!万寿无疆!他们表示，一定要进一步活学活用毛主席著作，紧跟毛主席的伟大战略部署，把无产阶级文化大革命进行到底。不管阶级敌人以右的面目出现，或者以极“左”的面目出现，都坚决把它打下去，不获全胜，决不收兵。"},{"type":"paragraph","text":"这三个县的无产阶级革命派，在实现革命大联合和革命三结合的过程中，自始至终大办毛泽东思想学习班，坚持在学习班里解决问题。在昨天的庆祝大会上，新产生的革命委员会代表在发言中表示，千抓万抓抓根本，革命委员会成立以后第一件事，就是要继续大办毛泽东思想学习班，狠斗派性，增强党性，坚持党性掌权。同时，要发动群众，进一步贯彻党中央关于紧急动员起来，迅速掀起春季农业生产高潮的指示，狠抓阶级斗争，把阶级敌人的破坏活动打下去，把春耕生产轰轰烈烈地搞起来。"},{"type":"paragraph","text":"市革命委员会、上海警备区和“工总司”的代表，分别参加了三个县的庆祝大会，表示热烈祝贺。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"上海市工人革命造反总司令部（工总司）","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"派性","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0399640222"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
