script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"锡共中央政治局委员桑穆加塔桑指出卡斯特罗参加反华大合唱苏联每天一百万卢布的援助使古巴迅速沿着修正主义的道路滑下去，卡斯特罗已被拉到　同美国和平共处的政策方面去，他同苏修取得协议，不支持拉丁美洲的任何反美革命运动","authors":[],"dates":[{"year":1966,"month":2,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社科伦坡21日电　锡兰共产党中央政治局委员、书记处书记桑穆加塔桑二月十日在科伦坡发表的新闻公报中揭露了卡斯特罗最近的反华言论。二月十八日《劳工报》以《卡斯特罗参加反华大合唱》为题刊载了这份新闻公报。"},{"type":"paragraph","text":"新闻公报说，“卡斯特罗猛烈指责中华人民共和国的讲话引起了轰动，这甚至使许多外交界人士感到震惊。在政治方面消息灵通的人士很久以来就预料到这种发展。古巴一些时候以来迅速沿着修正主义的道路滑下去——是苏联每天一百万卢布的援助使它在这条道路上滑下去的。卡斯特罗已逐步被拉到同美国和平共处的政策方面去，所根据的一项谅解是:他不支持拉丁美洲的任何反美革命运动。这项协议是通过其斯科策划的。无怪乎我们最近没有听到约翰逊谴责古巴了。”"},{"type":"paragraph","text":"公报指出:“当然，卡斯特罗必须为这种和平共处付出代价。他必须攻击美帝国主义和苏联修正主义的共同敌人。卡斯特罗利用最近在哈瓦那举行的亚洲、非洲、拉丁美洲人民团结会议开幕的机会发动了他对中国的攻击。他毫无根据地攻击中国拒绝卖给古巴大米，从而使出席这次会议的代表们感到震惊。出席这次会议的一位锡兰代表提到，这个插曲使古巴在亚洲、非洲和拉丁美洲代表中的影响马上下降了。当中国给予回答并且揭露了卡斯特罗的谎言的时候，古巴的声誉进一步下降了。”"},{"type":"paragraph","text":"公报接着说，“现在，卡斯特罗诉诸谩骂——毫无事实根据。他的演说一定会使柯西金和约翰逊——卡斯特罗今天的保护人——多么高兴!但是肯定严重地损坏了古巴在所有革命者心目中的革命形象。用谩骂的方式攻击被美帝国主义特别指为它的主要敌人的国家，是不能够证明一个人自己的反对美帝国主义的态度的。”"},{"type":"paragraph","text":"“古巴所发生的情况是可悲的。但是一切进步的人都必须认识到事情已经发生了。不仅从古巴的最杰出的领导人之一格瓦拉退出古巴政治舞台，而且从其他外国政治难民退出古巴政治舞台，可以衡量出古巴离开革命的道路的程度。这些其他外国政治难民过去到古巴避难，而现在发现那里的政治气候是不适宜的了。”"},{"type":"paragraph","text":"公报指出:可以举出许多例子说明古巴完全从属于苏联修正主义。它们协力把最近在哈瓦那举行的三洲会议填满修正主义分子，而不让革命者去参加。我知道一个例子。我去年十二月曾在北京。一个在北京工作的左翼哥伦比亚人被邀请出席哈瓦那会议。他领到古巴的签证，然后到苏联驻北京使馆去要求发给从苏联过境的签证，因为到哈瓦那去的唯一道路是经过莫斯科。苏联大使馆拒绝发给签证。他重新到古巴大使馆去，解释了这种情况。(古巴大使馆)要他把护照拿出来。他很爽快地交出了护照。几分钟之后，护照还给了他，而古巴的签证给撤销了。"},{"type":"paragraph","text":"公报最后说，“麻烦的事情在于，一旦你开始向下坡滑去，你就不可避免地要滑到底。”"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6555818227"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
