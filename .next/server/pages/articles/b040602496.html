script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"新共代表大会通过“关于修正主义和社会民主主义”的决议  马列主义者必须同修正主义思想进行不懈斗争  揭露苏联党和国家领导人已成为站在最前列的机会主义倡导者","authors":[],"dates":[{"year":1966,"month":4,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新共代表大会通过“关于修正主义和社会民主主义”的决议"},{"type":"paragraph","text":"马列主义者必须同修正主义思想进行不懈斗争"},{"type":"paragraph","text":"揭露苏联党和国家领导人已成为站在最前列的机会主义倡导者"},{"type":"paragraph","text":"新华社二十日讯　奥克兰消息：十一日闭幕的新西兰共产党第二十一次代表大会，通过了一项“关于修正主义和社会民主主义”的决议。"},{"type":"paragraph","text":"“关于修正主义和社会民主主义”的决议指出：“今天国际工人阶级运动中存在着两种根本对立的倾向：革命的倾向和机会主义的倾向。”"},{"type":"paragraph","text":"决议说，“自从第二国际时代起，这两种倾向的斗争一直在进行。……在列宁时代以及随后在斯大林时代，这个第一个社会主义国家的领导毫不调和地反对机会主义，而今天苏联党和国家的领导人，却是站在最前列的机会主义的倡导者。”"},{"type":"paragraph","text":"决议说：现代修正主义是垂死的帝国主义时代的社会民主主义。"},{"type":"paragraph","text":"决议说，“正是因为现代修正主义思想必然要在社会主义世界内部最终导致资本主义的复辟，并在资本主义世界内部使共产主义者蜕化成社会民主主义者，所以马克思列宁主义者必须同现代修正主义思想进行不懈的斗争。”决议指出：“这个任务决定了在我们自己党内，必须最密切地注意思想工作。……要使我们的工会工作和在工人群众中的工作成为共产党的工作，主要的目标必须是提高社会主义觉悟，而不能只限于经济上的鼓动。同时必须努力克服把党的工作和工会工作分割开来的倾向。”"},{"type":"paragraph","text":"决议最后说：新西兰共产党同全世界的其他许多马克思列宁主义政党和组织一道，将继续坚定地在国际工人阶级运动的整个队伍中建立真正的共产主义团结的道路上迈进。“我们毫不动摇地坚信，马克思列宁主义的革命倾向将战胜改良主义和现代修正主义的机会主义倾向。我们的这种信念建立在工人阶级运动的历史经验的基础上，这种历史经验无可辩驳地表明，坚持原则的政策最终会胜利，因为这些原则符合工人阶级的根本利益和社会发展的客观规律。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b040602496"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
