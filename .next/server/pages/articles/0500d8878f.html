script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji44","name":"毛泽东全集第44卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji44.pdf"],"article":{"title":"毛泽东等祝贺朝鲜解放十六周年的电报","alias":"","parts":[{"type":"paragraph","text":"毛泽东等祝贺朝鲜解放十六周年的电报"},{"type":"paragraph","text":"（1961年8月14日）朝鲜劳动党中央委员会委员长、朝鲜民主主义人民共和国内阁首相金日成同志，朝鲜民主主义人民共和国最高人民会议常任委员会委员长崔庸健同志："},{"type":"paragraph","text":"欣逢朝鲜解放十六周年，我们谨代表中国共产党、中华人民共和国政府和中国人民，向朝鲜劳动党、朝鲜民主主义人民共和国政府和朝鲜人民，致以最热烈的、兄弟般的祝贺。"},{"type":"paragraph","text":"勤劳、勇敢的朝鲜人民，在以金日成同志为首的朝鲜劳动党和朝鲜民主主义人民共和国政府的正确领导下，以高度的革命热情，开展了全民性的干里马运动，在社会主义建设的各个战线上取得了巨大的成就。朝鲜人民在1960年提前一年全面完成了第一个五年计划，现在，正在满怀信心地为胜利实现宏伟的七年计划而努力。中国人民把朝鲜人民在社会主义建设事业中所取得的每一个成就，都看作是中国人民自己和社会主义阵营共同的成就。"},{"type":"paragraph","text":"朝鲜人民为争取祖国的和平统一进行着不屈不挠的斗争。中国政府和中国人民完全支持朝鲜政府关于和平统一朝鲜的各项主张，坚决支持朝鲜人民反对美帝国主义及其代理人的爱国正义斗争。我"},{"type":"paragraph","text":"毛泽东等祝贺朝鲜解放十六周年的电报们深信，没有任何力量能够阻止朝鲜人民和平统一祖国的神圣事业的最后胜利。"},{"type":"paragraph","text":"朝鲜民主主义人民共和国政府始终不渝地执行和平外交政策，坚决反对美帝国主义的侵略政策和战争政策，积极支持被压迫民族和被压迫人民争取自由和解放的斗争，对促进人类进步事业和维护世界和平作出了重要的贡献。"},{"type":"paragraph","text":"最近，以金日成同志为首的朝鲜民主主义人民共和国党政代表团来我国进行了友好访问，是对我国人民的有力支持和巨大鼓舞。我们两国所签订的具有重大历史意义的中朝友好合作互助条约，全面加强了我们两国的互助合作关系，进一步加深了我们两国人民用鲜血结成的战斗友谊，从而对巩固社会主义阵营的团结和维护亚洲和世界的和平，作出了新的重大贡献。"},{"type":"paragraph","text":"祝兄第的朝鲜人民在建设社会主义和争取祖国和平统一的事业中取得更大的成就。祝中朝两国人民的牢不可破的兄弟友谊万古长青。"},{"type":"paragraph","text":"中国共产党中央委员会主席毛泽东中华人民共和国主席刘少奇中华人民共和国全国人民代表大会常务委员会委员长朱德中华人民共和国国务院总理周恩来"},{"type":"paragraph","text":"1961年8月14日"}],"authors":["毛泽东"],"dates":[{"year":1961,"month":8,"day":14}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":338,"page_end":339},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0500d8878f"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
