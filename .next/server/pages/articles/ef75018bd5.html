" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji5","name":"毛泽东全集第5卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji5.pdf"],"article":{"title":"六言诗·苏维埃政府布告","alias":"","parts":[{"type":"paragraph","text":"六言诗·苏维埃政府布告"},{"type":"paragraph","text":"（1931年12月19日）军阀豪绅地主，到处压迫穷人。利用国民政府，要捐要税不停。地主白占土地，厂主垄断资本。大家要免痛苦，只有参加革命。穷人一致奋起，组织工农红军。豪绅地主土地，一律分给农民。免除苛捐杂税，都是有吃有剩。工人每日工作，只做八个时辰。商人服从法令，生意由你经营。各地工农群众，赶快参加革命。建立工农政府，快把地主田分。工人组织工会，快同厂主斗争。大家一致努力，完成中国革命。"}],"authors":["毛泽东"],"dates":[{"year":1931,"month":12,"day":19}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":475,"page_end":475},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ef75018bd5"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
