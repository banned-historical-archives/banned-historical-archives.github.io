<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"资产阶级是怎样看待自己的儿女的?","authors":["余恩"],"dates":[{"year":1952,"month":3,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"余恩"},{"type":"paragraph","text":"这里，先从一篇通讯里摘录两段故事:"},{"type":"paragraph","text":"津沽大学数学系一个同学的堂妹要考军干校，他父亲(一个工厂的经理)不让她去。这时候，这个经理摆上了一桌好饭菜，找那同学的堂妹去吃饭。在饭桌上，这个经理的小儿子用筷子夹着一块肉，很熟练地向她挑衅:“这肉好不好?”“想吃不想吃?”开始时，那同学的堂妹还以为是小弟弟调皮，就回答他说:“好吃。”接着下去当着这个小孩子问她:“到军干校有没有?”她一凭话头不对，知道里面有鬼，放下碗筷，一气而走。"},{"type":"paragraph","text":"另外，建筑系的一个同学，当他决定报名参加军干校时，他父亲(也是一个工厂的经理)却穷凶极恶地跟他说:“我把你养大，你‘剥削’了我一辈子，现在你要走了。要走，你就把你的媳妇儿子一起带走，不能让她们再来‘剥削’我，这个本我亏不起。”"},{"type":"paragraph","text":"看了这两段故事，使我们很清楚地懂得了资产阶级是怎样对待年青一代的。前一个资本家为了阻止一个女孩子去考军干校，竟卑鄙地大要其手腕，利用(其实是愚弄)小儿子的嘴来加以打击；后一个资本家因为儿子要参加军干校，竟迫使儿子把妻子一起带走；尤其不能容忍的，是说儿子“剥削”了他一辈子，他不肯再“亏本”。这使我们不能不想起在“共产党宣言”中早已指出的:“资产阶级撕破了家庭关系上面所笼罩着的温情脉脉的纱幕，并把这种关系化成了单纯金钱的关系。”真是一箱破的，再确切没有了。"},{"type":"paragraph","text":"原来资产阶级的中心思想，不是别的，就是唯利是图、损人利己。他们说:“人不为己，天诛地灭”；因此，无论做什么，都是从一己的利益出发。每天里，脑筋乱动，东奔西跑，看上去，倒也辛辛苦苦；可是除去为自己打算以外，从来就不曾想到过劳人。在某些场合下，甚至就是自己的老婆、孩子，也可以推出去当做赚钱的工具。一句话，只要有利可图，是什么都可以做得出来的。"},{"type":"paragraph","text":"他们不仅自己在做着损人利己的勾当，同时还要让孩子也去听他们的话，替他们去赚钱。他们不把教养孩子当做自己的责任，而看成是做生意。他们认为:今天教养孩子，是下本钱；将来孩子长大，就可以从孩子身上连本带利捞上一把。特别是对于女孩子，因为在他们眼里，女孩子也变成了“商品”，准备“待善价而沽”。"},{"type":"paragraph","text":"应该告诉那些资产阶级的先生们，让孩子也继承自己的作风，——唯利是图、损人利己，在今天，这完全是一种梦想。要知道，在毛泽东旗帜下成长着的革命一代，受到党、团、群众、和无数活生生的事实教育，已经认识了自己的前途，也认识了自己的责任。知道了什么是光荣的，什么是可耻的；什么是应该做的，什么是不应该做的；什么是应该拥护的，什么是应该反对的。谁都不能否认，毛泽东时代的青少年，是聪明的、机警的、正直的、勇敢的。眼睛一天比一天豁亮，意志也一天比一天坚强。在今天青少年的面前，是什么手腕也要不出；什么鬼话也骗不了的。青少年既然懂得了真理，而且是站在真理这一边，那么，自然就不会跟错误和平共居。“爸爸的话总是对的”这时代已经过去了，而今天是“只问错不错，不问亲不亲”。"},{"type":"paragraph","text":"当着孩子不肯听他们的话、继承他们的作风、替他们去赚钱时；当着孩子纠正他们的错误，检举他们的罪行时，他们也许会说出什么“大逆不道”；甚至讥讽地说孩子是“好儿女”。是的，这些话原是可以说的；不过，应该指出，“大逆不道”的，并不是青少年；倒是那些说这类话的资产阶级的先生们。想想吧，一心只想掠夺国家资财，违反人民大众利益，这不是“大逆不道”，可是什么?至于说孩子是好儿女，那就更没有说错。今天的孩子，没有一个愿意再做自私自利之徒一个人的儿女；要做的是千千万万人民的儿女，为千千万万人民服务的儿女，祖国需要的正是这样的好儿女!"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b99c07e1b6"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
