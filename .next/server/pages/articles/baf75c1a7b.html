" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji11","name":"毛泽东全集第11卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji11.pdf"],"article":{"title":"关于各师在山西的作战部署","alias":"","parts":[{"type":"paragraph","text":"关于各师在山西的作战部署"},{"type":"paragraph","text":"（1937年10月5日）周、朱、彭川："},{"type":"paragraph","text":"甲、完全同意周与程潜、阎锡山共商决定之作战计划。"},{"type":"paragraph","text":"乙、我一一五师全部除一部做地方工作者外，应速集中于台怀镇以北，大营镇、沙河镇以南之山地，待敌人被吸引于原平、忻县地区并打得激烈时，袭取平型关、大营、沙河3、繁峙线，得手后交友军占领该线，我军向北突击，占领浑源、应县地区，开展新局面。"},{"type":"paragraph","text":"丙、王震部速归还贺师?建制。贺师全部除游击支队外，主力此刻应隐蔽于五寨地区。待原平正面打得激烈时，我一一五师又已实行向大营、浑源行动时，即用主力出长城袭击朔县、左云一带，与一一五师相呼应，捣乱敌人的整个后方。"},{"type":"paragraph","text":"[1]周、朱、彭，指周恩来、朱德和彭德怀。"},{"type":"paragraph","text":"[2]程潜，当时任国民党政府军事委员会参谋总长、第一战区代司令长官，负责指挥平汉路方面作战。阎锡山，当时任国民党军第二战区司令长官。"},{"type":"paragraph","text":"[3]平型关、大营、沙河，均位于山西繁峙境内。"},{"type":"paragraph","text":"[4]王震部，指八路军第一二〇师第三五九旅第七一七团。当时王震任该旅副旅长，率该团在晋察冀边区平山一带作战。"},{"type":"paragraph","text":"[5]贺师，指八路军第一二○师，师长贺龙。"},{"type":"paragraph","text":"丁、一二九师以一个团位于孝义，主力位于包括娘子关\"在内之正太铁路侧后，主要任务是动员工人及两侧农民战略上策应林3贺两师，巩固后路。"},{"type":"paragraph","text":"戊、林贺两师原来划定之地区，均应派遣必要之地方工作人员，有计划地散开工作，于一定地区完成一定任务。不得因为主力作战而置原定地区之地方工作于不顾。以上部署意见，请朱彭速即考虑执行。"},{"type":"paragraph","text":"己、我军部署仅能当面告诉阎锡山，不得用电报告诉他，并要阎不得下达于任何人，严防泄漏。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十月五日十五时[1]娘子关，位于山西平定东北。[2]正太铁路，指正定至太原的铁路，即今石太线。[3]林，指林彪，当时任八路军第一一五师师长。"}],"authors":["毛泽东"],"dates":[{"year":1937,"month":10,"day":5}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":223,"page_end":224},"tags":[{"name":"毛泽东","type":"人物"},{"name":"王震","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"baf75c1a7b"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
