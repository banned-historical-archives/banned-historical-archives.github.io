<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"广西信都“反共救国会”假案件是怎样造成的","authors":[],"dates":[{"year":1953,"month":5,"day":9}],"is_range_date":false,"parts":[{"text":"广西信都“反共救国会”假案件是怎样造成的","type":"title"},{"text":"1951年11月有署名“一民”者向最高人命检察署中南分署控告广西省信都县公安局刑讯逼供制造“反共救国会”案，经该署同广西省署及平乐专区公安处前往调查，证实控告基本属实。","type":"paragraph"},{"text":"反共救国会案发生于1951年4月，先是该县第一小学女教师梁桂芳向公安局秘书李达裔密报该校内有一小学生欧芳年等在教室内喊反动口号，公安局即将该学生扣捕，进行刑讯逼供。并依照该学生的口供到居民邓富成家搜捕，恰有商贩邓日春由八步来信都讨债住于邓富成家，即将邓日春逮捕刑讯。在指名问供下，邓日春点头承认是八步反共救国青年团派来与信都与一打铁工人吴桂元联系的。公安局4月18日即按指供的名单逐一逮捕。","type":"paragraph"},{"text":"在审讯邓日春所供的犯人梁茂生时，公安局长在梁耳旁鸣枪威胁，梁在惊骇下唯唯供认，案情遂发展至工人农民及乡村地主中。其后因坏分子黄祥钺供出县府秘书谢上昭，案情又由外部发展到内部，于5月5日进行二次大逮捕。在审讯过程中，因所供组织名称不同，公安局秘书李达裔即施用集体坦白办法——承认者放、不承认者加刑。在集体坦白中始定名为“反共救国会”，并在李达裔主持下分为：组织武装、暴动计划……等五个“单元”进行讨论，计供出参加人数数百名，枪千余支，经费数亿元，构成了一套完整的反动组织。","type":"paragraph"},{"text":"此案共逮捕了195人（死于狱中8人），其中有干部22人，教员17人，聋哑居民1人。在处理过程中，并实行全镇戒严，派兵起款起枪，拆墙挖壁，人心惶惶。该县县长何日先动员“有枪交枪，有钱交钱”，能出钱者无事，没有钱者加刑，弄得商民无奈，变卖货物交款，全镇共27户商民，交款一亿六千余万元及物资一部。","type":"paragraph"},{"text":"这一事件的发生首先是由于公安干部思想不纯，政策水平低，不调查研究，刑讯逼供，其次是由于信都籍干部与贺县籍干部的宗派矛盾。贺县籍干部李达裔刑讯指供，扩大案情把所有信都籍干部扣押起来。","type":"paragraph"},{"text":"中南分署已协同有关机关对本案做了适当的处理：无罪者释放，恢复工作，给死者抚恤、款物如数退还商民并在群众大会上公开检讨，挽回政治影响。公安局长张德义、秘书李达裔、县长何日先分别给予应得的处分。信都县委、平乐专属应作检讨。（信都县委应受适当处分——高检署）","type":"paragraph"},{"text":" （最高人民检察署）","type":"paragraph"}],"comments":[],"origin":"新华社《内部参考》1953年5月9日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4f2b5158a5"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
