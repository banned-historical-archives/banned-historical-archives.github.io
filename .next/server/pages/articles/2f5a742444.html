script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"革命大批判批臭了修正主义的　“管”“卡”　制度，　冲破了旧的不合理的规定，　革命职工的积极性得到充分的发挥，　上钢一厂烘烤保温帽工序改革获得成功——文化大革命解放了生产力","authors":[],"dates":[{"year":1968,"month":6,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"五月十八日下午，上钢一厂平炉车间铸钢工段的更衣室里人挤得满满的，愤怒声此起彼落。工人同志们正在狠批猛斗一个走资派。"},{"type":"paragraph","text":"一个中年工人霍地站起来，指着走资派的面孔严厉责问:“烘烤保温帽的工序究竟能不能改革?你执行的是什么路线?”话音刚落，一个老年工人气愤地接着问:“烘烤保温帽为什么要死扣十六个小时呢?这么多的焦炭白白的烧了，你是什么黑思想?”……"},{"type":"paragraph","text":"工人同志们的揭发，象重磅炮弹一样，射向走资派的心脏。这个反动家伙在工人群众的批判声中，胆颤心惊，瞠目结舌，只好低头认罪。"},{"type":"paragraph","text":"铸钢工段的无产阶级革命派，为什么抓住这件事对走资派狠斗猛批呢?原来在两年前，平炉车间工人为了炼好优质钢，采用了保温帽的浇注法。走资派对群众的革新创造，心里恨得要命，于是故意搞了烘烤炉。这样，这座烘烤炉每天就要浪费一吨多焦炭。工人同志对此很有意见，曾经提出建议，取消“烘烤炉”，可是遭到了反对。工人的积极建议，就此被扼杀了。从此，再也没有人敢提意见了。"},{"type":"paragraph","text":"无产阶级文化大革命冲破了旧的一套不合理的规章制度，批判了修正主义的“管”“卡”制度，革命职工的积极性得到了充分的发挥，促进了生产的大发展。铸钢工段的无产阶级革命派，对一切不适应生产的“条条”“框框”进行了大革命。有的同志提出了改革烘烤炉问题。经过充分讨论，大家认为，保温帽可以利用刚浇注的红钢锭的余热进行烘烤。这样做，需要其他工种的同志大力协作。那个工种同志知道铸钢工人要搞革新，砸掉烘烤炉，为国家节约焦炭，就大力支援。厂和车间革委会都积极支持群众的这个建议，一号炉甲班铸钢工人在当天晚上就进行了试验，获得了成功。没有几天，就把每天要浪费一吨多焦炭的烘烤炉精简掉了。这是对修正主义“条条”“框框”的一个猛烈冲击。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"革命大批判","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2f5a742444"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
