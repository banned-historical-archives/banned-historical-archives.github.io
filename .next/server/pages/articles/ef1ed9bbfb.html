<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"给毛主席的新年献礼  焦作煤矿战胜困难提前完成三十九号矿井排水工程","authors":[],"dates":[{"year":1952,"month":1,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"给毛主席的新年献礼"},{"type":"paragraph","text":"焦作煤矿战胜困难提前完成三十九号矿井排水工程毛主席："},{"type":"paragraph","text":"一九五二年新年到了，我们十五天完成了三十九号矿井的排水任务，这就算给您的新年献礼吧！"},{"type":"paragraph","text":"三十九号矿井，是英帝国主义在一九一八年开凿的，里面藏煤量约五千多万吨，全是无烟煤。但开凿不久就被大水淹了，经过几次排水也没成功。日本鬼子到这里后，想修复它，开始第二次排水，排了五年才排完，刚排完又被淹。从此以后这个矿井七八年没人管。"},{"type":"paragraph","text":"为了响应您增产节约的号召，我们要坚决修复这个矿井。开始时，我们想到英、日帝国主义排水失败的情形，信心不足。有的人提出很多困难，又是没器材啦，又是淋梆水太急，不好下排水泵等等。由于苏联专家对我们的帮助，许多困难才迎刃而解了。苏联专家告诉我们，只要把现有的五个水泵很快地下到井里，不使现有水量超过水泵的排水能力，水很快即可排完。大家认为苏联专家的意见很有道理。因为泵越下的慢，排的水越少，淹泵的可能性就更大。"},{"type":"paragraph","text":"在进行排水前，中央人民政府燃料工业部陈郁部长、中央人民政府燃料工业部煤矿管理总局刘向三局长亲自到这里指示我们，还鼓励我们说：“焦作煤矿出的无烟煤是全国最好的，应赶快把水排出来，争取早一天出煤。”这一来我们的工作情绪更高了。十二月六日开始排水，当时，大家一致提出：“坚决完成排水任务，作为给毛主席的新年献礼。”"},{"type":"paragraph","text":"十二月的天气已经很冷了，下井后，我们的衣服全被湿透，但一想到您，我们就感到不冷了；我们只想着赶快把水排完，早一天出煤。有的同志黑夜白天不断地看着机器，好几夜不休息，两眼都熬的通红。排水时大家互相鼓励着：“我们是国家的主人，我们是伟大毛泽东时代的工人，在我们面前没有克服不了的困难。”因此，困难一个个被我们克服了。如下泵时淋梆太急，我们便想法用席片帆布堵塞；泵下到井底后，上下联系发生了困难，我们又想出了用红绿灯、电铃代替的办法。这样，经过十五天的艰苦工作，十二月二十日，排水工作终于胜利完成了，比我们原来的计划（三个月）提前了七十五天。现在，我们正进行修理井下巷道的工作。"},{"type":"paragraph","text":"毛主席，我们要在您的领导下，坚决克服保守思想，学习苏联先进经验，为建设好这个矿井而努力！"},{"type":"paragraph","text":"敬祝您新年健康！"},{"type":"paragraph","text":"焦作煤矿三十九号矿井排水大队全体职工一九五一年十二月三十日"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ef1ed9bbfb"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
