script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"奥共马列主义者刊物《红旗》举行积极分子会议通过决议谴责赫鲁晓夫集团背叛和分裂行为痛斥奥共领导追随赫鲁晓夫修正主义以撤职和开除党籍打击坚持马列主义的同志　要求在奥共党内就彼此对立的立场和观点立即展开列宁主义的公开而坦率的讨论","authors":[],"dates":[{"year":1964,"month":5,"day":31}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京30日电】　维也纳消息:奥地利共产党内马克思列宁主义者的刊物《红旗》四月间举行了第一次积极分子会议，会议通过决议，谴责现代修正主义者的背叛和分裂行为。"},{"type":"paragraph","text":"决议说，“苏联共产党过去是我们的榜样和指路人，现在修正主义集团夺取了它的领导”。决议说，这一集团诅咒和诽谤苏联人民英勇的历史，把斯大林称作罪犯，把老布尔什维克开除出党，同时“正在系统地抛弃无产阶级国际主义和马克思列宁主义的一切原则。”"},{"type":"paragraph","text":"决议说，“赫鲁晓夫突然地撕毁了同社会主义中国签订的经济协定，甚至同英勇的社会主义的阿尔巴尼亚断绝了外交关系。赫鲁晓夫在古巴事件中允诺美国人视察古巴的权利，并企图将这些权利强加于古巴人民。在印度同中国的边境战争中，赫鲁晓夫竟敢向资本主义的进攻者提供武器，反对世界上人口最多的国家。”"},{"type":"paragraph","text":"决议说，赫鲁晓夫的这种政策使“世界共产主义运动不可动摇的革命斗争团结遭到了破坏”。"},{"type":"paragraph","text":"决议指出，奥地利共产党领导追随赫鲁晓夫修正主义，以撤职和开除党籍来对付勇于表示自己意见、坚持共产主义原则和积极反对修正主义政策的同志。"},{"type":"paragraph","text":"决议驳斥了赫鲁晓夫修正主义集团在保卫和平和无产阶级革命等问题上的错误言行，以及在这些问题上对中国共产党的诬蔑。决议说，赫鲁晓夫修正主义及其追随者的政策“既不能导向和平，也不能导向社会主义”。"},{"type":"paragraph","text":"决议指出，修正主义者把每一个不是无条件地屈从于他们反马克思主义路线的积极分子和干部都说成是“反党分子”和“分裂主义者”，“事实上，只有修正主义才是反党和分裂主义的”。"},{"type":"paragraph","text":"决议要求在奥地利共产党内“就彼此对立的立场和观点立即展开列宁主义的，即公开而坦率的党内讨论”。世界共产主义运动中那些不是站在赫鲁晓夫及其追随者的立场的材料应加以发表，并且不得采取威胁、制裁和报复等措施，前此所采取的制裁、报复措施都应取消。决议说，“党的团结和未来将取决于这些要求的实现”。"},{"type":"paragraph","text":"出席《红旗》这次积极分子会议的有来自维也纳、下奥地利、上奥地利、斯蒂利亚和布根兰德各省的共产党积极分子和干部。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ffdec1a7c7"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
