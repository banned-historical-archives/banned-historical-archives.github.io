" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoistlegacy.de-3202","name":"董村公社'二•一四'夺权","author":"中共忻州市委核查“三种人”办公室","internal":false,"official":false,"type":"unknown","files":[],"article":{"title":"董村公社'二•一四'夺权","dates":[{"year":1984,"month":5,"day":30}],"is_range_date":false,"authors":["中共忻州市委核查“三种人”办公室"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"中共忻州市委核查“三种人”办公室，忻州市“文化大革命”大事记，4-5","tags":[{"name":"夺权","type":"主题/事件"}],"parts":[{"type":"title","text":"董村公社“二•一四”夺权"},{"type":"paragraph","text":"一九六七年初，董村公社文革小组成立后，把原公社党委书记吕立生、主任齐继兰、副书记刘建祥等领导干部隔离审查，让他们自我交待，互相揭发。齐继兰首先在董村公社贴出“吕立生是卫恒的黑线人物，是伸向董祌公社的黑手”等大字报。后来，吕立生在一份交待材料上揭发刘建祥曾经说过“斯大林活着的时候，赫鲁晓夫很奉承，斯大林死了，他就搞政变。项在林彪对毛主席挺好，以后又怎么样呢？”第二天,公社半脱产干部郝永昌、郝胜尧根据这份揭发材料，贴出“反革命修正主义分子刘建祥诬蔑林副统帅是中囯的赫鲁晓夫”的大标语。这幅大标语对董村公社震动很大。二月十二日，公社武装部长石良富等人到县武装部去汇报。袁中林听取汇报后，又向梁明舜、边春贵作了汇报，梁明舜让袁中林向区造反总指挥部请示，军分区司令员朱光、地委书记徐志远、省造反总指挥部的王建听取了汇报，一致同意董村公社的夺权。回来以后，袁中林向石良富作了具体安排，决定在二月十四日凌晨夺权，在全县打响公社夺权的第一炮。石良富等人接受任务回到公社，根据武装部领导的安排，一边派人通知各大队、各机关组织准备夺权；一边把吕立生、齐继兰、刘建祥等领导干部全部集中起来。十三日晚上十二点，由县武装部副政委袁中林和老造反总指挥部王新民，卢增田等人，带领县各群众组织代表几十人，伙同公社武装部和“文革”小组夺了公社的党政财文大权，把党委书记吕立生、副书记刘建祥打成反革命修正主义分子，当场捆绑起来。同时，把公社主任齐继兰、副书记连富根、副主任梁红润、秘书赵黄润隔离审查。天亮后，在董村大队召开了全社万人大会，批斗了吕立生和刘建祥，卢增田代表县造反总指挥部致了贺词。"},{"type":"paragraph","text":"夺权后，董村公社成立了联合造反总指挥部，侯松茂（贫协主任)任总指挥，石良富（武装部长）任政委，郝胜尧、郝永昌（补贴干部）任副总指挥，委员有张申福（一般干部）、付成英（半脱产干部)、郝明亮（董村大队群众组织头头）。"},{"type":"paragraph","text":"吕立生和刘建祥在全社各大队轮流批斗了十余天，每次都被捆绑起来，后被送进监狱关了半年之久。"}],"alias":""},"tags":[{"name":"夺权","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"07c79f246c"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
