script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"法统治集团内部矛盾加深  极右翼分子急于实现法西斯化  所谓中间党派正设法联合自保","authors":["杨效农"],"dates":[{"year":1958,"month":6,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"法统治集团内部矛盾加深"},{"type":"paragraph","text":"极右翼分子急于实现法西斯化"},{"type":"paragraph","text":"所谓中间党派正设法联合自保"},{"type":"paragraph","text":"新华社巴黎22日电  本社记者杨效农报道：目前法国政局中有一个值得注意的动向：正当极右翼分子叫嚣要建立以所谓“救国委员会”为基础的单一政党的时候，法国若干资产阶级党派也正在酝酿重新组合。现在，激进社会党的莫里斯·富尔已经提出要建立从社会党右翼领袖摩勒到“独立党”领袖比内的联合。这种情况，说明了：在垄断集团竭力把法国进一步推向法西斯化的同时，统治阶级内部的矛盾正在进一步发展。"},{"type":"paragraph","text":"法国统治集团内部各派系为维护自身的利益而互相倾轧，这是法国长时期以来政局不稳定以及政府不断更迭的根本原因之一。大家知道，在法国人民日益向左转的情况下，资产阶级右翼政党是没有多数票的。但是，无论在全国还是在议会中都可能组成的左翼多数，又由于社会党右翼领导机构采取顽固的反共态度，而无法实现。至于所谓中间力量，则是分崩离析的。在这种情况下，法国统治集团从1956年大选以来一直就利用中间力量和右翼分子的联合组阁，来勉强维持其统治。从历届政府的组成中都可以看出这个特点来。"},{"type":"paragraph","text":"但是，随着法国对内、对外政策特别是对阿尔及利亚的殖民政策的到处碰壁而引起法国帝国主义各种矛盾的进一步深刻化，要再用上述这种办法来应付局面就很困难了。代表北非殖民利益的垄断集团的极右翼分子，深恐代表法国本土企业垄断集团利益的党派因为担心本垄断集团的经济扩张受阿尔及利亚战争影响而趋向于以谈判方式解决阿尔及利亚问题。因此，极右翼分子除了一直对后者施行压力以外，还竭力设法使自己掌握政权。再加上法国人民要求在承认阿尔及利亚人民独立的前提下谈判停战的运动高涨，法国统治集团过去利用中间党派来迷惑人民而实际上却执行满足极右翼利益的政策的手法，已经失灵。在这种情况下，极右翼分子就发动了政变，企图借此进一步压制人民，并且压服倾向于和解的那一部分资产阶级人士。"},{"type":"paragraph","text":"据此间一些刊物分析，由法西斯政变集团支持上台的戴高乐正在面对着统治集团内部矛盾更加尖锐化的难题。看来，戴高乐将首先以仲裁者的面孔出现。例如，他在新内阁中吸收了一些为极右翼分子所不满的人物，同时实际上又执行极右翼的政策。然后，他将通过逐步取消法国现行制度中的民主成分，以至最后经由所谓新宪法的通过而走上完全独裁的道路。极右翼分子现在已经公开说，目前的戴高乐政府只是过渡的第一步。"},{"type":"paragraph","text":"可以预料，随着戴高乐的独裁者面貌的日益暴露，法国统治集团内部无法消除的矛盾冲突必然会越来越表面化和激烈化。目前，戴高乐不让各部部长向国民议会各委员会报告工作的行径已经引起一部分社会党议员和所谓中间党派议员不满。此间观察家把这件事同法国资产阶级政党首先是所谓中间党派的酝酿重新组合联系起来看。他们认为，中间党派的酝酿重新组合，反映了这些党派眼看到自己的力量日趋低落的惶恐情绪以及竭力设法保存自己政治地位的心情。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3f7899fe97"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
