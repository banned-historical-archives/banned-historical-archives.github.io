" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"上海新闻出版界全面开展反右派斗争　揭露编辑记者中的败类","authors":["新华社"],"dates":[{"year":1957,"month":7,"day":15}],"is_range_date":false,"parts":[{"text":"上海新闻出版界全面开展反右派斗争　揭露编辑记者中的败类","type":"title"},{"text":"新华社","type":"authors"},{"text":"新华社上海１４日电:上海新闻、出版界连日来分别举行座谈会，开始全面反击资产阶级右派分子。","type":"paragraph"},{"text":"参加这两个座谈会的许多人都揭发了以“老报人”自居的上海文化出版社第一编辑室副主任许君远向人民新闻出版事业猖狂进攻的事实。整风期间，许君远以“报纸应当这样干下去吗？”为题，在文汇报上发表文章，攻击党报“只顾说教”“摆着一付党员面孔”；并说“大家都在‘拆墙’，党报还想筑寨自固”。他借口“新闻自由”、“放宽新闻尺度”反对报纸的党性，煽动报纸为右派放火服务。许君远还反对公方派人参加公私合营出版社。他在鸣放中利用文化出版社对体制问题的讨论，怂恿这个出版社内的原私方人员恢复“广益”、“北新”、“国光”等私营出版社，借此搞垮文化出版社。他高喊要办不要党领导的“同人报社”、“同人出版社”。","type":"paragraph"},{"text":"会上许多人揭发了许君远曾任国民党中央日报副总编辑、反共头子于斌的私人秘书，以反共亲美起家的反动历史和他挑拨党同非党群众关系的一系列言行。","type":"paragraph"},{"text":"学术月刊的石啸冲、邬烈勋揭发了学术月刊常务编委尚丁的荒谬言论。尚丁是顾执中、陆诒的学生。在鸣放期间，他唯恐天下不乱，鼓吹“毒草必须培养论”，甚至主张把学术月刊办成专门刊登毒草的刊物。","type":"paragraph"},{"text":"新闻界座谈会上，文汇报副总编辑刘火子等揭露了徐铸成等人的一些反对共产党领导的言行。反右派斗争开始后，徐铸成别有用心地说，“凡是现在说正面话的，都是过去有问题的人；凡是现在说反话的，却都是过去的进步人物。”文汇报记者、右派分子吕文在中共上海市委召开的宣传会议上作了反对共产党领导的恶毒发言，文汇报编辑部认为有问题，没有全文发表，徐铸成大为不满，屡次说“应该登”。徐铸成反对文汇报宣传马克思列宁主义理论，硬说文汇报“社会大学”一栏的理论宣传是“教条主义”，并蓄意限制它的版面。","type":"paragraph"},{"text":"新闻界座谈会上还揭发了文汇报记者范琰和新闻日报记者陈伟斯的一些反社会主义言行。范琰受章罗联盟的使命，到湖南、四川等地放火，为流沙河的“草木篇”翻案。陈伟斯利用党的整风运动，组织污蔑政府政法工作的“我国重要法典、刑民法为何迟不颁布”的讨论，吹嘘右派分子王造时、杨兆龙的反动法学理论，并在工商界三次放火，挑拨公私关系。","type":"paragraph"},{"text":" ——原载《人民日报》1957年7月15日","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"366832c2c4"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
