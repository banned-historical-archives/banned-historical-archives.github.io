<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"苏联利用贸易控制和剥削东欧","authors":[],"dates":[{"year":1977,"month":9,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"苏联利用贸易控制和剥削东欧"},{"type":"paragraph","text":"据新华社一九七七年九月二十日讯　近年来，苏联不断增加它同东欧国家的贸易额，以此作为它加强对经互会其他成员国实行“经济一体化”的重要手段之一，进一步控制和剥削这些国家。"},{"type":"paragraph","text":"据苏联《对外贸易》杂志今年第六期公布的数字，今年第一季度苏联同经互会其他成员国的贸易额为七十九亿多卢布，比去年同期增长百分之二十，超过了苏联同期外贸总额百分之十一的增长率。"},{"type":"paragraph","text":"近年来，苏联同经互会其他成员国的贸易额一直不断增长。一九七六年苏联同经互会其他成员国的贸易额达到二百八十八亿卢布，比一九七一年增长了一倍。一九六六——一九七○年五年计划期间，苏联同这些国家之间的贸易额，总共为五百一十六亿卢布，一九七一——一九七五年五年计划期间，增加到八百五十二亿卢布，即增长了百分之六十五（古巴于一九七二年加入经互会，未计算在内）。根据苏方宣布，本五年计划苏联同上述国家的贸易额，将比上个五年计划增长百分之七十。"},{"type":"paragraph","text":"苏联同这些国家的贸易，是以控制别国经济命脉为宗旨的。为了保持在经互会市场上的霸主地位，历年来苏联外贸额的一半或一半以上是与经互会其他成员国实现的。德意志民主共和国、波兰、捷克斯洛伐克、保加利亚、匈牙利排在苏联外贸对象国的最前列，这些国家同苏联的外贸额分别占到本国外贸总额的三分之一到二分之一。蒙古、保加利亚对苏联贸易分别占本国外贸总额的百分之八十和百分之五十以上。因此，对这些国家说来，对外贸易意味着首先是对苏贸易，在很大程度上受到苏联的制约。"},{"type":"paragraph","text":"苏联同经互会其他成员国的贸易，是建立在所谓“国际分工”的基础上的。苏联官员宣称：“国际分工的方案最概要地说就是，拿苏联的原料、燃料及科技领域的各种产品来换取（经互会其他成员国）各种机器设备、人民消费品和食品。”这种貌似互通有无、平等交易的表白，其实是欺人之谈。人们知道，苏联为控制东欧国家的经济命脉，早已迫使东欧国家在一些工业原料和动力供应上依赖苏联。近年来苏联在这些领域不断提高价格，勒索投资，已使东欧国家蒙受不小损失；而且东欧国家提出的原料和动力供应数量，也并不能从苏方得到保障。至于苏联向东欧出口的“科技产品”，可说是某种形式的倾销。因为苏联机器设备技术落后，在西方市场缺乏竞争能力，只好向东欧市场推销。多年来，苏联机器设备出口的三分之二左右销往东欧。"},{"type":"paragraph","text":"苏联“国际分工”的目的，正在于从东欧掠夺它所需要的“各种机器设备、人民消费品和食品”等等。苏联机器设备进口的三分之二来自东欧，在本五年计划中，苏联要继续从这些国家进口一千多套设备。德意志民主共和国、捷克斯洛伐克这些机器制造业较为发达的国家，为了自身的经济利益，迫切要求多生产些在国际市场上有销路的机器设备，但在苏联“国际分工”的束缚下，不得不首先为苏联生产。此外，苏联工业消费品进口的百分之八十也来自东欧国家。蒙古、匈牙利、保加利亚每年还要向苏联运去大量肉类、蔬菜等农畜产品。为了使东欧长期成为苏联的附属加工厂和指定商品供给地，苏联正在要挟经互会成员国制订今后十至十五年内包括机器制造、食品、消费品生产等六十五个题目的“长期专业纲要”。"},{"type":"paragraph","text":"近年来，苏联还通过获取贸易顺差来使东欧国家处于不利地位。"},{"type":"paragraph","text":"苏联的种种盘剥，给经互会其他成员国的经济造成越来越严重的困难。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0dedf83d62"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
