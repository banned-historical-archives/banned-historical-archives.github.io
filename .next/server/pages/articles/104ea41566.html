script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"打退资产阶级反动路线的新反扑（天津快板）","authors":[],"dates":[{"year":1967,"month":1,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"打退资产阶级反动路线的新反扑"},{"type":"paragraph","text":"（天津快板）合：打起竹板，别的咱不提，"},{"type":"paragraph","text":"把经济主义危害性，给大家说几句。甲：工厂大革命，云涌风起，合：资产阶级老爷们，看着生气。乙：他们失败不甘心，又耍鬼主意。"},{"type":"paragraph","text":"心怀鬼胎，反扑来得急。甲：硬的行不通，又把软的提，"},{"type":"paragraph","text":"想拿金钱把革命左派收买过去。乙：勾结社会上地、富、反、坏、右，"},{"type":"paragraph","text":"挑动工人来挥霍国家财产。甲：挑动要工资，挑动要福利，乙：挑动强占公房统统归自己。"},{"type":"paragraph","text":"煽动工人，撂下活不干，"},{"type":"paragraph","text":"想叫厂矿企业停工又停产。甲：铁路官老爷也在这样干，"},{"type":"paragraph","text":"火车开不出，把交通来中断。乙：他们破坏革命，破坏生产，"},{"type":"paragraph","text":"想把方向转移到经济斗争方面。甲：毒啊！乙：上海造反派，发表《紧急通告》，"},{"type":"paragraph","text":"把他们的这个大阴谋揭穿了。甲：革命造反派，欢呼大胜利，乙：全国革命派同声赞扬做得好！"},{"type":"paragraph","text":"革命造反派，要提高警惕，"},{"type":"paragraph","text":"那些坏家伙，净打坏主意！甲：大刮经济主义风，煽动搞福利，"},{"type":"paragraph","text":"想把革命大方向来转移。乙：正告坏家伙，休想耍诡计，"},{"type":"paragraph","text":"我们红色造反者，早就看穿你。甲：革命同志们，团结在一起，"},{"type":"paragraph","text":"打倒经济主义，把革命搞彻底。乙：把资产阶级反动路线的新反扑，"},{"type":"paragraph","text":"坚决打回去。合：永远跟着毛主席，革命到底！"},{"type":"paragraph","text":"嗨，革命到底。"},{"type":"paragraph","text":"北京第一机床厂红色造反宣传队"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"天津文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"104ea41566"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
