<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"广州五反运动已进入第三期　生产问题和劳资关系情况都相当复杂","authors":[],"dates":[{"year":1952,"month":5,"day":11}],"is_range_date":false,"parts":[{"text":"广州五反运动已进入第三期　生产问题和劳资关系情况都相当复杂","type":"title"},{"text":"【广东分社十一日讯】广州五反运动已在五月七日进入第三期(最后一期)。这一期任务是处理近万前三类户和二千重点户，一律采“资本家面对面，工人背靠背”的方法进行。检查组则严阵以待，遇有重点户解决不了的随时出动检查。预计五月底可以基本完成。","type":"paragraph"},{"text":"三反结束后的行业生产问题和劳资关系，呈现相当复杂的情况。目前，大家对监督资方不再犯“五毒”的情绪很高，而对于主动团结督促资方提高生产积极性的思想则未认真确立。一般说来，在大厂店里只要好好进行政策、策略教育，要使工人店员从撕破情面斗争转入主动团结资方恢复和发展生产，是较易收效的。如胜利药房第一次劳资协商时，工人准备提的都是监督方面的意见，经工作队指出后，即补充了如何恢复经营方面的意见，并同意暂不提出增加工资要求。在资本家方面：目前差不多对生产都采取消极态度，把责任推向工人，对加工订货看到利润不高，就不大愿意接受。有些过了关的厂店老板，在工人一拉一压下，虽订了生展计划，调回部分资金，但对退补有顾虑。如新药业全行现存资金、存货等共一百四十八亿，照核算后应退补的恰如此数。他们订了退补计划，平均今年退百分之四十六，明年再退百分之三十六。但这是该厂店在广州的资方代理人订的，在香港的老板另有算盘，不一定肯退那么多。这种情形将来在重点户退赃时会碰到很多的。领导上对此甚为慎重，在退补上可能比上海更宽一些。目前资本家因退补未摸底，也是对生产不积极的原因之一。","type":"paragraph"},{"text":"在中小户方面，消极、“三停”、立意歇业的情况严重。如机器业“三停”的约占全业五分之二，工人二千人。据其中百家调查，逃资抗拒的占百分之三十，其余百分之七十，或因确无资金，或因接不到加工订货，或因产品滞销。长寿区电池业现在开工的只有百分之三十五，主要原因是滞销。地区指挥部曾了解七个行业、二十多试点厂店的生产情况，除两家较好外，其余不是资方不愿干，就是工人店员劳动纪律松弛。广州私营企业分散，中小户占有工人店员的大多数，最近已决定大量加工订货，来保证在业工人不致失业。","type":"paragraph"},{"text":"劳资关系方面，主要情况是工人普遍要求增加工资及福利。在中小户中，过去工资及其他待遇很不合理，工人要求改善，但条件不同，不易达到，工人很不满意。工作队和工会单纯进行说服，极易脱离了群众，工人有撇开工会成立“增资委员会”来搞的。此外，也有坏分子专门强调福利来动员工人继续追击资方，藉此增加在恢复生产上的困难。","type":"paragraph"}],"comments":[],"origin":"新华通讯社编《内部参考》1952年5月13日","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"215b7cd6fb"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
