script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"阿《人民之声报》说全世界反美浪潮势不可当  美帝国主义末日临近　修正主义者帮不了忙","authors":[],"dates":[{"year":1964,"month":3,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"阿《人民之声报》说全世界反美浪潮势不可当"},{"type":"paragraph","text":"美帝国主义末日临近　修正主义者帮不了忙"},{"type":"paragraph","text":"新华社地拉那十二日电  阿尔巴尼亚《人民之声报》今天在评论中指出，今天，美帝国主义已失去了它在世界上的霸权，任何力量都无法挽救它日益走向末日的命运。白宫的丧钟敲得越来越紧了。"},{"type":"paragraph","text":"这篇题为《华盛顿处于困难的日子》的评论写道，第二次世界大战后，组成了以美国为首的帝国主义“新神圣同盟”，它们鼓吹什么“上帝赋予它们领导世界的重大使命”。但是，现在时代变了，帝国主义已彻底失去了它的霸权，而社会主义和和平力量已经成为人类社会发展的决定性因素。"},{"type":"paragraph","text":"尽管新殖民主义者采取一切手段和新的策略并得到现代修正主义者的帮忙，但是，今天，从东方到西方，从南边到北边，没有一个大陆不引起华盛顿的不安。从古巴到南越，从老挝到刚果，从巴拿马到塞浦路斯一直到欧洲的巴黎，美国佬无不遭到坚决的反抗和人民的无比憎恨，它们日益经常地受到爱好自由的人民的有力打击。"},{"type":"paragraph","text":"评论指出，今天，美帝国主义在世界人民风起云涌的反帝浪潮面前，不仅感到头疼而且感到发晕了。最近特别使它感到不安的是，南越人民爱国力量取得了辉煌的胜利。评论说，尽管如此，华盛顿仍然继续顽固地扩大它们在南越的肮脏战争，甚至企图把战火延伸到越南民主共和国，到头来，美国必将引火烧身。"},{"type":"paragraph","text":"评论接着指出，今天美国在联合国已不是绝对的主人，它的统治世界的政策也遭到其"},{"type":"paragraph","text":"“神圣同盟”中的“盟友”的反对，帝国主义侵略集团内部的矛盾正日益尖锐。"},{"type":"paragraph","text":"评论说，形势的发展愈来愈不利于帝国主义，这是无法改变的。地球继续按照既定的规律在转动，时间和历史在向前迈进，人民的力量在壮大，而帝国主义的末日日益接近了，世界上没有任何力量可以挽救帝国主义的命运。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5b3b64876e"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
