<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"《瞭望》载文揭露资产阶级自由化思潮  “小气候”主要有八种表现","authors":[],"dates":[{"year":1989,"month":9,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"《瞭望》载文揭露资产阶级自由化思潮"},{"type":"paragraph","text":"“小气候”主要有八种表现"},{"type":"paragraph","text":"新华社北京9月4日电  即将出版的《瞭望》周刊发表署名张国祚的文章《如何认识“小气候”》，指出“小气候”的八种表现。"},{"type":"paragraph","text":"文章说，一场惊心动魄的风波平息了，人们不禁要问：一个蒸蒸日上、大有希望的中国，为什么会风云突变，发生动乱？邓小平同志明确地回答了这个问题：这是国际大气候和中国自己的小气候所决定了的。何谓小气候？就是指资产阶级自由化思潮的泛滥，其主要表现是："},{"type":"paragraph","text":"（1）露骨地宣扬极端个人主义。他们鼓吹“个人至上”，“自私是人的本性和基因”，认为“提倡大公无私会束缚人的本性”，“树立雷锋是历史上最大的错误”，公开宣扬"},{"type":"paragraph","text":"“建设自私自利的大厦，具有天然的合理性”。"},{"type":"paragraph","text":"（2）露骨地宣扬拜金主义，鼓吹“一切向钱看”。在这种思潮影响下，许多人为了金钱，为了个人或小团体的利益，而不顾法律、不讲公德、不要原则，丧失国格，辱没人格。"},{"type":"paragraph","text":"（3）借讲抽象的“民主”、"},{"type":"paragraph","text":"“自由”、“人权”鼓吹资产阶级的自由、民主观，否定社会主义自由、民主观。他们否定"},{"type":"paragraph","text":"“五四”以来中国共产党所领导的民主革命的进程和民主建设的成果，公开宣扬“社会主义的中国同样是一个没有民主的国家”。主张中国政体效法西方资产阶级的“三权分立”，建立所谓议会制民主；他们歪曲"},{"type":"paragraph","text":"“百家争鸣”的方针，否定马克思主义的指导地位，兜售资产阶级的意识形态；他们鼓吹资产阶级个人主义的人权，无视和践踏社会主义社会中他人的人权，肆意破坏社会主义的民主法制，奉行无政府主义，对外则仰仗洋人鼻息，对我国施加压力。"},{"type":"paragraph","text":"（4）借口反对封建专制主义而反对人民民主专政。他们故意混淆社会主义与封建主义的根本区别、人民民主专政与封建专制主义的根本区别，宣称人民民主专政是“以言治罪”的“反人权”的“暴政”，与此同时又极力鼓吹资产阶级虚伪的、超阶级的“人道主义”，公开要求释放所有“政治犯”。"},{"type":"paragraph","text":"（5）反对共产党的领导，鼓吹政治多元化，要求实行西方资产阶级的多党制，建立反对党。他们叫嚣要“取消共产党专制”，鼓噪“报纸不应成为党的喉舌”、“工人要脱离共产党的领导”。"},{"type":"paragraph","text":"（6）反对坚持马克思主义，公开鼓吹马克思主义“过时论”。他们宣扬“马克思主义三个部分均已过时，而且错误”，断言“马克思主义在今日之中国没有用处”，“马克思主义的研究方法是从正确的原则出发，得出错误的结果”，声称“一定要彻底批判毛泽东思想”。"},{"type":"paragraph","text":"（7）反对社会主义制度，美化资本主义制度。他们宣扬“社会主义的尝试及其失败，是20世纪人类的两大遗产之一”，“破坏靠‘老马’，建设靠‘走资’”。鼓吹“中国的出路是，资本主义化”，要为私有制正名，“早日敲响公有制的丧钟”。"},{"type":"paragraph","text":"（8）宣扬民族虚无主义，鼓吹卖国主义，主张全盘西化。极少数卖力鼓吹资产阶级自由化的人，美化帝国主义的野蛮侵略，甚至希望中国至少再当“300年殖民地”。他们极力贬低和诅咒中国传统文化，公然反对提爱国主义口号，认为“中国是微不足道的”，甚至认为"},{"type":"paragraph","text":"“中国人种不行”，“中国不是要解放，而是要解散”。"},{"type":"paragraph","text":"综上所述，不难看出，以资产阶级自由化思潮泛滥为主要内容和特征的“小气候”，是与我们的立国之本——四项基本原则根本对立的。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0161d994b6"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
