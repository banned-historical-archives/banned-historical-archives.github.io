script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"陶铸在国务院接见北京医学院红卫兵的讲话","authors":["陶铸"],"dates":[{"year":1966,"month":11,"day":5}],"is_range_date":false,"parts":[{"text":"陶铸在国务院接见北京医学院红卫兵的讲话","type":"title"},{"text":"陶铸","type":"authors"},{"text":"〖一九六六年十一月五日下午陶铸同志在国务院接见了北医“八·一八”红卫兵，“工农兵”红卫兵，“长征”红卫兵和医大“红旗”公社的六位代表，同他们进行了谈话。当日午夜以后，陶铸同志的秘书在国务院的西门外向北医，医大等在场同学传达了陶铸同志的讲话要点。现整理如下。〗","type":"appellation"},{"text":"（一）今晚我刚从外边回来，听到你们要求接见，现在六位代表接见了。昨天找了孙正（国务院文教政治部副主任），张孟旭（文教办公室主任）听他们汇报了情况，委托他们向同学们谈话。今早以为大家走了，晚上回来才知道没走，大家等了两天两夜。（张同志解释道：陶副总理很关心大家的健康，并且这里还有很多女同学，现在他让大家回去。）","type":"paragraph"},{"text":"（二）要求见面的问题准备在十二日以前，卫生部门召开了一个会议，钱信忠、张凯同志准备作检查，陶铸同志到场，你们大家都参加，今天到这里的同志全体参加，不多一个，不少一个。","type":"paragraph"},{"text":"（三）关于罢官的问题，同志们完全有权利提，我完全有责任听，并向中央反映，最后由中央决定。中央九月廿七日已经决定撤钱信忠卫生部党委书记的职务。现在由孙正同志担任新的党委书记。党委改组的问题同志们完全可以提，卫生部党委要不要改组，如何改组，中央要进一步考虑。今后整个卫生部文化革命的领导，主要由孙正同志负责。凡是同学们所有的革命行动，孙正要坚决支持，孙正如果不革命，大家可以造他的反。","type":"paragraph"},{"text":"（四）关于向卫生部要材料的问题。","type":"paragraph"},{"text":"（1）陶铸认为根据中央军委指示，同学们向卫生部要材料是革命的行动。","type":"paragraph"},{"text":"（2）十一月三日发生的争执（指北医，医大同学向卫生部要黑材料，从而和卫生部部分群众发生的一场武斗）主要责任在卫生部，不在同学们。","type":"paragraph"},{"text":"（3）方向问题，比如打开窗子，柜子等，这是卫生部逼出来的。但这样的方法以后不要用，不要宣传。","type":"paragraph"},{"text":"（4）已经拿到的一些材料，按中央有关规定处理，有的退给本人，有的作为批判资产阶级反动路线的材料，有的销毁。还没有拿出来的要交出来，中央有详细的补充规定，传达下来以后，按新的规定办。","type":"paragraph"},{"text":"（5）要求总理接见的问题，全国只有一个总理，总理已经六十多岁了，我们应该爱护总理，大家不要见总理了。","type":"paragraph"}],"comments":[],"origin":"一九六六年北京化工学院《红色宣传员》战斗组、北京经济学院无产阶级革命团、北京市东方红印刷厂革命造反联络处、化工部化学工业出版社印刷厂联合汇编《无产阶级文化大革命参考资料（3）》。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"陶铸","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"武斗","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"df2222b59c"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
