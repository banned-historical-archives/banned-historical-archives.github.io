script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"《解放军报》就春节慰问军烈属答读者问应该慰问改变了剥削阶级成份的军属","authors":[],"dates":[{"year":1980,"month":1,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社北京一月十七日电　《解放军报》今天在回答一读者的信中说，新年春节期间慰问军烈属时，也应该慰问改变了剥削阶级成份的军属。"},{"type":"paragraph","text":"答读者问说，在这个问题上，首先要对目前我国农村的阶级状况有一个正确的认识，从而深刻理解党中央关于改变长期劳动守法的地主富农分子成份的政策的深远意义。大家知道，土改时我们划分阶级，是为了消灭封建剥削制度，消灭地主阶级和富农阶级，并把这些阶级的成员逐步改造成为新人。现在，经过近三十年的斗争和教育，原来的地主阶级和富农阶级中有劳动能力的绝大多数人已经改造成为社会主义社会中的自食其力的劳动者。根据这一情况和党的一贯政策，党中央决定绘已经改造好的地主富农分子摘掉帽子，给予人民公社社员的待遇，这对于调动一切积极因素，团结一切可以团结的力量，同心同德地进行四个现代化建设，具有重大的意义。"},{"type":"paragraph","text":"答读者问在谈到怎样看待改变了剥削阶级成份的社员，是一个重要的政策问题时说，我们对人的看法不应该是一成不变的。这些人过去从事过剥削，但解放后在党的政策的感召下，他们在长时期里接受教育和改造，逐步转变思想，改变习惯，成为遵纪守法、自食其力的劳动者，这说明他们不再是剥削阶级分子了。所以，凡是经过群众评审、上级批准摘了帽子的，就应给予人民公社社员的待遇，与其他社员一视同仁。因此，对改变了剥削阶级成份的军属，当然应该慰问。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"64e98e61f4"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
