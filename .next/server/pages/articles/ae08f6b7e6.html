script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"意大利极右翼政党难做靠山  佐利内阁上台未满月就辞职","authors":[],"dates":[{"year":1957,"month":6,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"意大利极右翼政党难做靠山"},{"type":"paragraph","text":"佐利内阁上台未满月就辞职"},{"type":"paragraph","text":"据新华社11日讯  罗马消息：就职才二十二天的意大利佐利内阁10日晚上向总统提出了辞呈。"},{"type":"paragraph","text":"佐利辞职是由于下议院7日的信任投票中发生的纠葛。这次的票数计算发生错误，重新点票的结果表明，虽然佐利仍然以三百零五票对二百五十七票（九票弃权）获得胜利，但是政府是完全依靠新法西斯党的二十四票才取得法定的二百八十二票多数的；由于他自己的天主教民主党中有许多人害怕依靠极右翼政党的支持会使这个党在明年大选中受到选民唾弃，佐利曾经表示，他不愿意把新法西斯党的支持票数考虑在内。但在同时他欣然接受另一个极右翼政党国家保皇党的支持。"},{"type":"paragraph","text":"佐利在10日晚上的内阁紧急会议上说，下院信任投票的结果“不能理解为对政府政治路线和计划的支持”。据罗马“报信者报”消息，在佐利的清一色天主教民主党内阁的十九个部长中，包括外交部长贝拉在内的八个部长要求佐利和他的内阁辞职。"},{"type":"paragraph","text":"格隆基总统对于是否接受佐利的辞呈问题还没有作出决定，他要求佐利政府暂时仍继续执政，以处理“日常事务”。消息说，总统将在11日开始同政党领袖会商，以便设法寻找佐利的继任人。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ae08f6b7e6"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
