script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反对南斯拉夫修正主义印共旁遮普邦组织出版文件专辑","authors":[],"dates":[{"year":1958,"month":6,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社新德里28日电】　印度旁遮普邦的共产党组织最近出版了一本名为“十二国共产党宣言和反对修正主义的斗争”的小册子。"},{"type":"paragraph","text":"这本小册子的前言说，“南斯拉夫共产主义者联盟正在不断地宣扬和鼓吹反马克思列宁主义的思想，并且企图破坏世界各国共产党和工人党的团结以及社会主义阵营的团结，这种团结是为了保卫和气和建设社会主义而进行的斗争所必需的。”前言说，出版和学习所有反对修正主义的文件对所有共产党人及其同情者和其他关心社会主义运动的成就的人们是有益的，这使他们能够加深对马克思列宁主义的了解。"},{"type":"paragraph","text":"小册子的内容包括:十二个社会主义国家共产党和工人党代表会晤宣言、和平宣言、中国共产党第八届全国代表大会第二次会议关于在莫斯科举行的各国共产党和工人党代表会议的决议、赫鲁晓夫同志在保加利亚共产党组七次代表大会上的讲话、北京“人民日报”1957年11月25日发表的社论“伟大的革命宣言”、北京“人民日报”1958年5月5日发表的社论“现代修正主义必须批判”等。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5d6f1c50da"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
