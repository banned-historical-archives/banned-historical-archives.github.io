script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"越南南方人民用血和火写下的书信集《南方来信》引起我国文学界极大重视首都作家为向我国读者推荐此书，昨举行座读，一致认为它揭露了美帝野蛮罪行，有力地打击了为美帝涂脂抹粉的现代修正主义","authors":[],"dates":[{"year":1964,"month":5,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【据新华社北京27日电】　越南外文出版社出版的中文本《南方来信》引起我国文学界极大重视和热烈的反应。为了把这本由越南南方人民的血和火写成的激动人心的书，推荐给我国广大的读者，首都作家今天下午举行座谈，一致称赞这部作品所具有的巨大革命意义和高度文学价值。"},{"type":"paragraph","text":"越南民主共和国驻中国大使馆参赞黄北也应邀参加了座谈会并且发了言。"},{"type":"paragraph","text":"中国作家协会主席茅盾主持座谈会。他说，这本书里的每一封信都表现了革命英雄主义、革命乐观主义，对中国读者起着很大的教育作用；对世界上正在进行反帝反殖民主义斗争的人民是很大的鼓舞。信中揭露美帝国主义和它的走狗所犯下的野蛮罪行，对一意为美帝国主义涂脂抹粉的现代修正主义是有力的打击。"},{"type":"paragraph","text":"中国作家协会副主席邵荃麟在发言中分析了当前越南南方的革命形势，并谈到这本书所显示的革命信念和革命乐观主义精神。他引用书中一句诗“青山长在，革命永存，美好的生活在明天”来说明这种乐观主义的精神。他说，这种信念和乐观主义精神是由于坚信人民力量的不可战胜和认识到帝国主义是纸老虎。只有相信人民力量的人才能懂得帝国主义是纸老虎的道理。现代修正主义者背叛了人民，不相信人民的力量，因此不可能理解越南南方人民辉煌的胜利，也不能理解这本书的思想性。"},{"type":"paragraph","text":"曾去越南民主共和国进行过友好访问的作家和诗人张光年、李季、袁鹰等先后发言，称赞这本书使他们看到越南南方人民英勇无比的革命斗争。"},{"type":"paragraph","text":"诗人臧克家以激动的言辞赞扬《南方来信》是“一本越南南方人民解放斗争必然胜利的保证书”。他说，经历过数十年革命战斗的中国人民以深厚的战斗情谊阅读这一封封来信，感到分外亲切、激动。"},{"type":"paragraph","text":"作家陈其通说，这本书使我们看到，越南南方人民用亲身经历班明了:对待武装的敌人必须用人民的武装和它进行坚决的顽强的斗争。和平幸福的生活必须用斗争来争取。"},{"type":"paragraph","text":"中越友协副会长孙晓村说，《南方来信》向全世界人民指出一条真理，那就是在人类历史上，永久起作用的是人民的力量，一切反动力量只能暂时起作用，最后必定以灭亡而告终。"},{"type":"paragraph","text":"在座谈会上发言的还有曹靖华、马铁丁、邹荻帆等。"},{"type":"paragraph","text":"今天的座谈会是由中国作家协会、中国越南友好协会联合举办的。参加座谈会的作家、诗人及有关人士共三十多人。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"645cdba3b8"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
