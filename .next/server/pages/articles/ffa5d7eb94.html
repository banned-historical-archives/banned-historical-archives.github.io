script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"彭冲同志要求领导干部带头解放思想围绕四化深入讨论真理标准问题努力从极左路线和“凡是”观点下解放出来，扎实改进经济工作","authors":[],"dates":[{"year":1979,"month":9,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　彭冲同志在昨天召开的全市增产节约经验交流大会上的讲话中强调指出:我们要紧紧围绕四化这个最大的实际，继续深入开展实践是检验真理的唯一标准的讨论。"},{"type":"paragraph","text":"彭冲同志说，这一段时期全市进行真理标准问题讨论的补课，由于全党动员，领导带头，密切联系实际，实实在在解决问题，是抓得比较好的。这对于端正思想路线，继续解放思想，提高广大干部群众贯彻执行党的政治路线和方针政策的自觉性，促进四化建设，都起了很好的作用。事情很清楚，是坚持还是反对辩证唯物主义的思想路线，实质上就是真高举还是假高举毛泽东思想旗帜的问题。我们只有坚持一切从实际出发，实事求是，理论联系实际，坚持实践是检验真理的唯一标准，才能做到完整地、准确地掌握毛泽东思想的科学体系，才能把毛泽东思想的基本原则同现代化建设和国内外斗争的实践结合起来，把毛泽东思想继续推向前进。这才是真正地高举毛泽东思想的旗帜。我们一定要深入批判林彪、“四人帮”的极左路线，同林彪、“四人帮”的假高举彻底划清界限。现在我们在经济工作中，确实还存在着思想不解放，或者思想解放不够，手脚放不开，步子迈不大的状况，有许多利国利民的事，有利于四化的事就是办不起来。我们要把经济工作搞好，真正做细做活做宽做大，就一定要坚持三中全会的方针，坚持四项基本原则，坚持辩证唯物主义思想路线的正面教育，排除从右的方面特别是“左”的方面的干扰，敞开思想展开真理标准问题的学习和讨论，摆事实，讲道理，和风细雨地解决问题，努力从极左路线下解放出来，从两个“凡是”观点下解放出来，从传统观念和习惯势力下解放出来，从客观情况出发，认真解决实际存在的问题，扎扎实实地改进我们的经济工作。"},{"type":"paragraph","text":"彭冲同志强调:各级领导干部要带头解放思想，旗帜鲜明。领导的责任就在于把广大干部和群众的思想进一步引导到实现四个现代化的政治路线上来，使思想路线教育真正落到实处。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"name":"四人帮","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ffa5d7eb94"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
