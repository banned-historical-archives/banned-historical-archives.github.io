" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"广州部分教授主张取消高等学校党委制","authors":["何绍甲","广东","林孔湘","林楚君","董每戡"],"dates":[{"year":1957,"month":6,"day":1}],"is_range_date":false,"parts":[{"text":"广州部分教授主张取消高等学校党委制","type":"title"},{"text":"广东林孔湘何绍甲林楚君董每戡","type":"authors"},{"text":"新华社广州3日电　广州市的许多高等学校教授都主张取消党委制。下面是他们在6月1日座谈会上的发言。","type":"paragraph"},{"text":"华南农学院教授、民主同盟盟员林孔湘说：“今天我们在高等学校要争取领导权。中共组织要和民主党派组织一样只起监督、帮助和进行政治思想教育的作用。”他认为在整个国家范围来说，方针政策是应该由党来制订的，但是贯彻执行就不一定由党来掌握，而应该由最适当的人——包括党与非党人士来贯彻执行。他说，中共在高等学校里是没有力量来贯彻自己所制定的方针政策的，因为中共直到现在还没有熟悉高等学校业务的党员。他又说，不是“内行”的党员就不要让他当院长、所长。如果不管他懂不懂业务也派他去当领导，就会使一些人错误地以为共产党打天下是为了争地位。现在高等学校的党委制，是以党代政，“外行”充“内行”。","type":"paragraph"},{"text":"民盟盟员、华南师范学院教授何绍甲也说，任何制度都是在一定的社会基础上产生的。解放初期局面动荡，敌我斗争尖锐，知识分子思想水平还不高的时候，实行党委制是适当的，而且也起了很大的作用。可是，现在的情况已经起了变化，党委制就没有必要继续存在了。他认为早在两年前就应当提出这个问题，到现在才提出已经晚了一些。他说，取消党委制并不是意味着反对中共的领导，因为方针政策是由中共制定的。何绍甲又说，办高等学校、“内行”的非党干部会比“外行”的党员好得多，他同意林孔湘的意见，认为有本领的人就可以当领导。","type":"paragraph"},{"text":"中山大学教授、民主同盟盟员林楚君也认为，解放已经八年，党委制的积极作用已经消失，它的存在反而带来了“三害”。他说，党委制取消后，可以由学校的校务委员会的集体领导和校长个人负责制来代替它。党可以通过参加校务委员会的党员来起作用。他认为这样是加强了党的领导，而不是削弱它。","type":"paragraph"},{"text":"民主同盟盟员、中山大学教授董每戡说，现在高等学校的领导人不少是中共党员，因此党委制是可有可无的。如果一所学校的校长、教务长是党员，就等于有了党委的领导。他认为高等学校应该由教授来领导，党委也可参加，有事大家商量，商量好了就交校务委员会去贯彻执行。","type":"paragraph"},{"text":"民主同盟盟员、中山大学教授吴天晖说，高等学校党委制在目前情况下与民主办校存在矛盾，因为由“外行”人领(9)导“内行”人难于做好工作。他说，现在虽然有些教授入了党，但是由于他们党龄短，不能参加党委会，这样就不能发挥他们的积极作用。他又说，高等学校的方针政策是由中央制订的，在学校方面来说，主要是如何贯彻执行的问题。既然高等学校有行政领导，就没有必要再增加党委这一层领导关系。但是他也认为教授治校也不好。","type":"appellation"},{"text":"民主同盟盟员、广州师范专科学校教授于奋生同样认为要实现民主办校就要取消党委制，由校务委员会来负责领导。(梁福擎)","type":"paragraph"}],"comments":[],"origin":"1957年6月5日新华通讯社编《内部参考》。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4bedc2f362"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
