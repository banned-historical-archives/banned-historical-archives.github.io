script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"为了“别苗头”　偷窃办嫁妆 婚礼未举行　新娘进班房她悔恨地说:资产阶级思想害了我","authors":["陆屹"],"dates":[{"year":1982,"month":11,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　准备十一月十一日在上海南京路一家大饭店举行婚礼的一个新娘，结婚前夕被松江县公安局收容审查了。正当新郎为此疑惑不解的时候，新娘已在公安局预审室里供认，她是一个作案累累的偷窃犯。"},{"type":"paragraph","text":"这个二十五岁的上海照相机总厂女工，是因为爱虚荣、讲排场而走上犯罪道路的。她家庭经济不富裕，却想在结婚时置办一份象样的嫁妆，同小姐妹“别苗头”。于是，她选择了偷窃的办法。"},{"type":"paragraph","text":"她连连作案，用赃款添置了八条软缎被面、一条羊毛毯、一条腈纶毯、两只箱子、四对高级枕头……但她觉得这些嫁妆还显得“寒酸”，决定在结婚前抓紧作案。"},{"type":"paragraph","text":"今年九月二十二日，她在厂部女浴室掏摸一个女工的裤袋，捞到钥匙一串，随后进入这个女工的宿舍，席卷了价值五百多元的衣物，立即到上海销赃。"},{"type":"paragraph","text":"这次终于落网了。现在，她流着眼泪对审讯人员说:“资产阶级思想害了我，我自作自受!”"},{"type":"paragraph","text":"(陆屹)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7c41f2f534"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
