" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共中央关于县区村整党及对党员雇工、放债等问题指示（草案）补充意见给东北局的批复","authors":[],"dates":[{"year":1952,"month":10,"day":1}],"is_range_date":false,"parts":[{"text":"中共中央关于县区村整党及对党员雇工、放债等问题指示（草案）补充意见给东北局的批复","type":"title"},{"text":"东北局：","type":"appellation"},{"text":"九月二十三日电悉。同意你们对于《东北局关于县、区、村整党与对党员雇工、放债等问题指示（草案）》的两点修正补充意见。至于农民间因高利贷问题而到法院控诉者，则应依法定利息判处为宜。","type":"paragraph"},{"text":"此外，对于原定草案中“党员不需要依靠土地收入以维持生活而愿将土地无偿地交公或出卖者，均应允许”，“无偿地交公”，在执行中可能引起下面强迫交出土地的现象，是否可考虑去掉。“在互助组与生产合作社内，不论是社员、组员，个人的或集体的均不得雇用长工或有其他类似剥削行为”，“类似剥削行为”的界限不易划清，执行起来难免把剥削范围扩大，容易引起混乱，是否可去掉，亦望考虑。","type":"paragraph"},{"text":" 中  央十月一日","type":"paragraph"},{"text":"附：","type":"appellation"},{"text":"东北局关于县区村整党与对党员雇工、放债等问题指示（草案）的补充意见","type":"subtitle"},{"text":"（一九五二年九月二十三日）","type":"subtitle"},{"text":"中央：","type":"appellation"},{"text":"经过中央审查批准试行的《东北局关于县、区、村整党与对党员雇工、放债等问题指示（草案）》下达后，各省委均反映这一指示是完全正确的及时的，既坚持了党内不准有剥削的严肃性，又照顾了目前的实际情况，也确能解决目前县、区“三反”整党中的具体问题。惟在执行过程中，收到辽西、松江等省的意见，几乎一致认为其中二段二节（2）条“党员干部出外做革命工作，家庭缺少劳动力，生活困难，而雇用一个长工或少数短工进行生产者”不以剥削论的规定，以目前东北地区农村，农民参加互助组的户数已达百分之七十至百分之八十的情况来看，似乎稍宽了些，故在东北地区具体执行上，拟将此条改为：“党员干部出外做革命工作，家中确无劳动力或无整劳动力，生活困难，因种种条件限制，一时不可能参加互助组或生产合作社而不得不雇用一个长工或少数短工进行生产者”应不以剥削论。其次，关于对待党员干部出租土地问题，拟在“按照互助组或生产合作社内的规定换工分粮或分得地份”下面加上“因种种条件限制，上述各种办法一时均难以做到，而本人及其家庭又需要","type":"paragraph"},{"text":"依靠土地收入维持生活者，目前仍应允许其将土地依法出租”。以上两点修正补充的意见，是否妥当与必要，请中央批示。此外松江提出，最近发现在农村有些农民（包括党员和非党员）到法院控告高利贷者，要求改变原来双方协议，而按法定利息偿还债务，应如何处理？我们认为事先应由群众自行调解解决，如告到法院则应依法判处。是否有当，亦请指示。","type":"paragraph"},{"text":" 东北局九月二十三日","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"29ee19d0c8"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
