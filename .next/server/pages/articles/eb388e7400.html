script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反对垄断资本集团的剥削和反动当局的镇压意大利五十多万工人大罢工日本群众示威抗议美帝把大型核动力军舰开进佐世保港","authors":[],"dates":[{"year":1970,"month":3,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社北京七日电　罗马消息:意大利四十万纺织工人和十万电气工人连日来举行全国性罢工，反对垄断资本集团的剥削，要求增加工资和改善劳动条件。"},{"type":"paragraph","text":"同时，墨西拿各行业的工人三日举行了总罢工，几千名罢工工人涌向街头示威游行，要求充分就业，强烈抗议当局对工人的镇压。这次总罢工使整个墨西拿地区完全陷于瘫痪。"},{"type":"paragraph","text":"据新华社北京九日电　据东方通讯社报道:日本长崎县佐世保市近一千名工人、学生和市民八日在佐世保举行集会和游行，强烈抗议美帝国主义悍然把大型核动力军舰开进佐世保港，阴谋利用佐世保海军基地作为核战争基地的罪行。"},{"type":"paragraph","text":"在佐藤反动政府的同意下，美帝核动力导弹护卫舰“特鲁克斯顿号”，不顾日本各阶层人民的强烈反对，六日上午闯进了佐世保港。"},{"type":"paragraph","text":"佐世保市的劳动人民在佐世保的岛濑公园举行集会，强烈抗议美国核军舰开进佐世保港停泊。在会上发言的代表强调说，尼克松大叫大喊要缩减美国在国外的军事基地，这完全是个骗局，美帝国主义真正的意图，是妄图以日本为主要基地，加强它在亚洲的核战略体系。"},{"type":"paragraph","text":"会后，与会者斗志昂扬地在佐世保市主要街道上举行示威游行。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"eb388e7400"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
