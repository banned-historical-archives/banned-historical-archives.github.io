<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"訪謝飞同志——揭发人面兽心的刘少奇","authors":[],"dates":[{"year":1967,"month":1,"day":5}],"is_range_date":false,"parts":[{"text":"访谢飞同志——揭发人面兽心的刘少奇","type":"title"},{"text":"元月五日晚，我们走访政法干校副校长刘少奇的第二夫 人谢飞同志的谈话整理如下（未经本人审查）：","type":"paragraph"},{"text":"（一）刘少奇有五个老婆","type":"subtitle"},{"text":"刘少奇的第一个老婆是贺宝珍，有三个孩子，她有坚强的革命意志，后被国民党反动派杀害。谢飞同志对贺宝珍烈士是很尊敬的，在一段 时间内曾给照顾过她的两个孩子，但是因革命工作需要就分开了。","type":"paragraph"},{"text":"谢飞同志是刘少奇的第二个老婆，谢飞同志1927年参加革命，经过长征， 出身于赤贫家庭，文化程度初一，1935年与刘少奇结婚，1939年离婚。刘少奇的第三个老婆是刘涛的妈妈 ——王前同志，家庭贫苦，高小文化程度。刘少奇的第四个老婆是王珍，与刘少奇结婚只有几个月，刘少奇的第五个老婆是天津最大的资本家的女儿王光美，王光美 是一个大学生，当过研究生。","type":"paragraph"},{"text":"（二）惯于玩弄女性的刘少奇","type":"subtitle"},{"text":"刘少奇在男女关系上不能说很乱，但很不严肃，为什么我们离婚呢？因为我的家穷文化又低年龄又大（离婚时我二十六岁，他近四十岁了），所以他又娶了一个十六——十七岁的王前。我们离婚的另一个重要原因是我曾向他提过 这样一个问题，说他不重视不提拔工农分子，不热爱工农分子只提拔重视知识分子热爱知识分子，这问题我们经常争论。我记得他当时也反驳过我，说那些知识分子 是经过锻炼的，有的坐过牢。如彭眞。他借此对我不满，说我是在政治上打击他。他当时是中央委员，我是一个普通的党员，他看不起我，我也不服他，所以我曾提 出离婚。以后他以此提出离婚达到他喜新厌旧的目的。他和几个老婆的关系都搞不好，长的几年，短的几月，和革命意志坚强的贺宝珍也合不来，经常争吵。他和第 四个老婆王珍同志（据说是个大学生）也只相处几个月。后来说她有精神病而被踢开了。只有和大资本家的女儿王光美搞得火热，因为王光美家有钱，也有文化。","type":"paragraph"},{"text":"（三）诬蔑、诋毁革命女同志，极力宣扬“战争毁灭论”。","type":"paragraph"},{"text":"抗战开始后我当时是24－25岁革命干劲很足，要求上前方抗战杀敌。但 他不同意我，理由是女同志力气小，连日本人亦见不到，要想打日本人除非是被日本人强姦后才能打死一个。当时我认为是因为我们感情才不让我去，现在看来不是 那么一回事。","type":"paragraph"},{"text":"（四）挤忠纳奸，拉一派，压一派是刘少奇的看家本领。","type":"subtitle"},{"text":"刘少奇是有打击报复的，我就是一个例子。在我们相处的时间内，没有看到他提拔一个工农分子。例如，林枫和他的爱人都是知识分子，他看得起他们，说了很多好话。还有山东省委的向明（听说后来是一个叛徒）是他非常欣赏的干部。当时他还说饶漱石是个年轻的政治家。在我的记忆中打击报复还有一 例就是打击柯庆施，柯庆施与刘少奇的关系不好，据说柯庆施曾对人说过，刘少奇是老右倾（或者是老机会主义者）这话后来被刘知道了，他老是惦记在 心，1936年在天津时，他专门写了一封信去批评柯庆施。","type":"paragraph"},{"text":"（五）烙印不改，贪污成性","type":"paragraph"},{"text":"刘少奇是一个知识分子，听说他祖父时有一百多亩地，后来从他家里看来至少是富农，或是破落地主。","type":"paragraph"},{"text":"谢飞同志最后讲到了1937年左右刘寄200元给他大儿子，他告诉我这钱是组织批准的，究竟怎样我不清楚。","type":"paragraph"}],"comments":[],"origin":"来自北京2451信箱部分革命羣众大字报","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"王光美","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"天津文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"90959b8142"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
