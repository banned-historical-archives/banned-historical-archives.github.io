script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"老挝执行协定中央联委会各爱国力量方面代表团  谴责万象极右派进攻富昆—富松地区  越南外交部发言人谴责万象极右派进攻老挝解放区","authors":[],"dates":[{"year":1975,"month":4,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"老挝执行协定中央联委会各爱国力量方面代表团"},{"type":"paragraph","text":"谴责万象极右派进攻富昆—富松地区"},{"type":"paragraph","text":"越南外交部发言人谴责万象极右派进攻老挝解放区"},{"type":"paragraph","text":"据新华社万象一九七五年四月二十三日电　老挝执行协定中央联合委员会各爱国力量方面代表团代表蓬赛·逊达拉西四月二十二日在万象举行记者招待会，严厉谴责万象极右派军队悍然进攻各爱国力量方面控制的富昆—富松地区。"},{"type":"paragraph","text":"蓬赛在记者招待会上宣读了各爱国力量方面代表团四月二十二日发表的一项声明。这项声明揭露，自四月十四日以来，万象极右派出动军队和飞机，接连进攻各爱国力量方面在富昆—富松地区的一些阵地。四月十五、十六日和十七日，它们出动飞机对各爱国力量的阵地进行了轰炸。十八日，它们从万象向沙拉富昆运送炮弹，并抽调两连部队前往增援。十九日，出动飞机轰炸各爱国力量在莫琅章、富松、乔塞地区的阵地，并向沙拉富昆的公路交叉口地区增派好几个营的军队。"},{"type":"paragraph","text":"声明最后说，各爱国力量方面再次要求万象方面立即停止上述行径，全部撤走进攻上述两个地区的部队。如果继续对上述地区发动进攻，各爱国力量方面认为有必要采取自卫行动，坚决保卫人民生命财产和自己的控制区。"},{"type":"paragraph","text":"新华社河内一九七五年四月二十六日电　据越南通讯社报道，越南民主共和国外交部发言人四月二十五日发表声明，完全支持老挝爱国战线发言人四月二十日声明所阐述的立场，谴责万象极右派蚕食进攻老挝解放区。声明表示完全支持老挝爱国力量和老挝人民制止老挝万象极右派上述行动的立场，以迫使万象极右派严格履行万象协定。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6d9650c100"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
