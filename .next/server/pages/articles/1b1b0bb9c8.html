script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"毛主席的书，是替我们贫下中农说话的。天天读毛主席的书，就好像——天天见到毛主席","authors":[],"dates":[{"year":1966,"month":9,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席的书，是替我们贫下中农说话的。天天读毛主席的书，就好像——"},{"type":"paragraph","text":"天天见到毛主席"},{"type":"paragraph","text":"新安镇公社新安镇大队第三生产队老贫农桓兴今，今年七十二岁了。在旧社会，他给地主扛了十年活，被抓去当过六次劳工，他恨透了旧社会。解放了，党从苦海里把他救出来，他翻了身，走上了幸福路。因此，他从心里热爱共产党，热爱毛主席。"},{"type":"paragraph","text":"这几年，桓兴今觉着自己老了，不能干啥了，儿子都大了，生活也没啥困难，该享享福了。"},{"type":"paragraph","text":"社会主义教育运动开始以后，帮助工作的同志给大家念了一段毛主席的话：“没有贫农，便没有革命。……”桓兴今听了，激动得流出了眼泪。心想，毛主席把我们贫农看得多么重要啊！毛主席是处处替我们穷人说话的。他下决心要读毛主席的书，学习他老人家讲的革命道理。"},{"type":"paragraph","text":"桓兴今借到了毛主席的书，就像得到宝贝似的，双手捧到家。一进屋他就招呼老伴：“快点灯！快点灯！”老伴问他：“什么事？这么高兴？”他说：“我要读毛主席的书。”接着，他翻开书，第一篇文章一开头就写着：“谁是我们的敌人？谁是我们的朋友？这个问题是革命的首要问题。……”这一句话，把他吸引住了，他就看啊，念啊，琢磨啊！看完这篇文章已经半夜了，可是，他一点也不觉得累。躺在炕上，脑袋里就演起“电影”来了。他想起旧社会的苦难生活，想到地主对穷人的狠毒劲，他就气得攥起拳头；一想到今天的幸福生活，他就打心眼里感谢毛主席，越寻思越乐，情不自禁地唱起《东方红》来。"},{"type":"paragraph","text":"由于过度的兴奋，他一夜没有合眼。"},{"type":"paragraph","text":"从此以后，他手里总是拿着毛主席的书，白天看，晚上也看，只要有点时间就看上一段。"},{"type":"paragraph","text":"他只念过两年书，有些字不认识，就问别人，为了学得好，他专门预备一个本子记毛主席说的警句。"},{"type":"paragraph","text":"新年前他到二儿子家去，在火车上也学。他在那里呆了十天，天天坚持学习。儿媳妇劝他说：“这么大岁数了，歇一歇吧！”他把报纸上登的一个七十五岁的学习毛主席著作积极分子的事迹念给她听，对她说：“人家七十五岁了，学得那么好，我比人家还小呢，不学怎么行呀！”他还告诉儿媳妇趁年轻好好学习。他说：“别像我似的，到这个年岁才学，太晚了。”以后，儿媳妇不拦他了，还给他买了十多本学习毛主席著作的参考书。"},{"type":"paragraph","text":"就这样，几个月来，他一直坚持学习毛主席著作。老伴问他：“是入迷了咋的？”他说：“我是入迷了，有瘾了。天天读毛主席的书，就好像天天见到毛主席，听毛主席说话似的。毛主席每天都告诉我几句话，我记在心上，照着去做，就不会走岔路了。”"},{"type":"paragraph","text":"（扶余县委办公室通讯组）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1b1b0bb9c8"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
