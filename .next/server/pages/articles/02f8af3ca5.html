" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中国作家协会主席团决定开除孔厥会籍","authors":[],"dates":[{"year":1955,"month":2,"day":7}],"is_range_date":false,"parts":[{"text":"中国作家协会主席团决定开除孔厥会籍","type":"title"},{"text":"中国作家协会主席团于今年二月七日召开第十三次主席团扩大会议，会议决定开除玩弄妇女、品质极端恶劣的该会会员孔厥的会籍。决议全文如下:","type":"paragraph"},{"text":"最近各方面向本会主席团揭发了本会会员孔厥下列一些玩弄妇女、败坏道德、污辱作家光荣称号的极端丑恶的行为:孔厥于去年七月问在沈阳用物质哄骗等卑劣手段诱奸了一个女青年团员。同年八月初回到北京，又用同样卑劣手段与另一个女青年团员发生了嗳昩的关系。上列事实经调查属实，并由受害者向本会主席团提出了控诉。","type":"paragraph"},{"text":"孔厥这种极端恶劣的流氓行为是一贯的。远在抗日战争时期，他就曾在男女关系上犯过严重的错误，并因此受到了党的处分(他当时还是中共党员)。但他在一九四五年和一九四八年又连续在男女关系上重犯错误，一九五一年在沈阳时并曾去嫖妓。后来甚至疯狂到在朝鲜战场竟又丧心病狂地诱奸了一位女同志。这些错误经他所在机关的中国共产党支部发现后，在一九五二年将他开除出党。但是孔厥始终拒绝改造，在近一年来下工厂的时期，一面到处游荡，一面以“作家”的名义到处蒙混欺骗，玩弄青年妇女。他的腐朽的资产阶级思想意识和生活方式已经坠落到极端恶劣的程度。","type":"paragraph"},{"text":"主席团认为孔厥这种堕落的行为，不仅完全丧失了一个作家应有的品质，而且也有背于为人的道德。我们的文艺队伍里决不能容留这样的人。为此决定开除其会籍。","type":"paragraph"},{"text":"主席团认为，作家的任务是以自己的作品培养人民的高尚品质和社会主义道德，作家本身的道德品质对于完成这一光荣任务有着决定的意义，任何败坏道德的行为都是和作家这个荣誉的称号决不相容的。从孔厥的事件上，我们认为应该提起作家的严重注意，应该坚决反对文艺界一切道德堕落的现象。我们并号召全体会员提高政治水平和道德水平，为纯洁我们的队伍而斗争。","type":"paragraph"}],"comments":[],"origin":"《文汇报》1955年2月18日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"02f8af3ca5"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
