script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"上海滚镀一厂组织工人学习毛主席的“五·二○”庄严声明结合形势进行无产阶级国际主义教育","authors":[],"dates":[{"year":1971,"month":5,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　上海滚镀一厂党支部、革委会结合当前国际形势，通过举办学习班等方法，组织全厂工人认真学习伟大领袖毛主席在一九七○年五月二十日发表的《全世界人民团结起来，打败美国侵略者及其一切走狗!》的庄严声明和《纪念白求恩》等光辉著作，对他们进行无产阶级国际主义的教育，提高了干部、群众的两条路线斗争觉悟。"},{"type":"paragraph","text":"这个厂的干部、群众在学习中畅谈了伟大领袖毛主席的“五·二○”庄严声明发表以来，世界各国人民的革命斗争蓬勃发展，越南、老挝、柬埔寨三国人民抗美救国战争取得辉煌胜利的大好形势，畅谈了亚洲、非洲、拉丁美洲各国人民和其他许多国家的革命斗争的大好形势。大家越谈越感到欢欣鼓舞，精神振奋。但是，也有少数同志只看到形势大好的一面，忽视了帝国主义的侵略本性不会改变的一面，产生了和平麻痹思想。针对这种活思想，厂领导和大家一起反复学习了毛主席关于“新的世界大战的危险依然存在，各国人民必须有所准备。但是，当前世界的主要倾向是革命”的伟大教导，回顾了历史，分析了当前国际形势，认清了帝国主义的侵略本性，认识到只要帝国主义存在一天，新的世界大战的危险就存在一天，我们一定要“提高警惕，保卫祖国”，坚决贯彻执行毛主席的“备战、备荒、为人民”的伟大战略方针，把反对帝、修、反的伟大斗争进行到底。通过学习，全厂群众增强了战备观念，提高了革命警惕性，民兵们每次执行任务前，先学习毛主席的有关教导，研究好作战计划，较好地完成了各项任务。"},{"type":"paragraph","text":"滚镀一厂在进行无产阶级国际主义教育时，组织干部、群众反复学习了毛主席的“五·二○”庄严声明和《纪念白求恩》以及其他关于无产阶级国际主义的论述。通过学习，大家认识到，世界各国人民的解放斗争，都是互相支持，互相援助的，全世界人民只有团结起来，才能打败美国侵略者及其一切走狗。大家回顾了中国革命的战斗历程，深刻体会到，我国革命的胜利，如果没有世界各国人民的支持，要取得革命的胜利是不可能的。中华人民共和国成立以后，也是由于世界各国人民开展了反对美帝国主义的英勇斗争，给予我们有力的支持，我们才能顺利地进行社会主义革命和社会主义建设。大家还认真学习了马克思、列宁、毛主席关于只有解放全人类才能最后解放无产阶级自己的教导，狠批了苏修叛徒集团的大国沙文主义和叛徒、内奸、工贼刘少奇“三和一少”的投降主义路线，坚决表示一定要发扬无产阶级国际主义精神，坚决支持印度支那三国人民和世界各国人民反对美帝及其走狗的斗争，并学习他们同美帝国主义英勇斗争的革命精神，为世界革命贡献更大的力量。"},{"type":"paragraph","text":"这个厂的职工通过学习，决心立足本职，胸怀世界，把做好每一项具体工作同支援世界革命紧密联系起来，以实际行动支援世界革命。这个厂的吊镀小组，去年就开始搞无毒电镀，但由于质量不够稳定，一直不能全面上马。最近，他们走访了有关商业部门，虚心征求意见，分析了质量不稳定的原因，经过日夜奋战，很快推广了无毒电镀。镀镍小组和镀黄铜小组，二月份要完成一批支援兄弟国家的产品，任务很重，如果按常规生产就难以完成。工人们主动采取措施，克服人力不足的困难，坚持开足三班，经过大家的努力，结果提前完成了任务。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"世界形势","type":"主题/事件"},{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d8ea15017f"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
