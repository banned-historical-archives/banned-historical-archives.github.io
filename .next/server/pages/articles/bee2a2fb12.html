script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"美国人民革命群众运动蓬勃发展  许多城市货车司机坚持罢工，参加罢工人数达十万一万七千煤矿工人奋起罢工反对垄断资本残酷剥削","authors":[],"dates":[{"year":1970,"month":6,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"美国人民革命群众运动蓬勃发展"},{"type":"paragraph","text":"许多城市货车司机坚持罢工，参加罢工人数达十万一万七千煤矿工人奋起罢工反对垄断资本残酷剥削"},{"type":"paragraph","text":"据新华社讯　华盛顿消息：在美国革命群众运动的熊熊烈火中，两个多月来，美国许多城市的货车司机一直在顽强地举行罢工斗争，反对美国垄断资本集团的残酷剥削和压迫，要求增加工资。货车司机的罢工斗争，得到美国进步学生的有力支持和声援，给美国垄断资产阶级和美国反动统治集团以沉重的打击。"},{"type":"paragraph","text":"美国货车司机从三月底就开始举行罢工。他们冲破了美国垄断资本集团和黄色工会头目的重重阻挠和破坏，拒绝接受黄色工会头目的“复工命令”，坚持罢工斗争，使罢工斗争在洛杉矶、芝加哥、旧金山、底特律、纽约、克里夫兰、圣路易斯、阿克伦、布法罗等城市蓬勃开展，参加罢工的货车司机达十万人以上。"},{"type":"paragraph","text":"货车司机的罢工使美国许多城市的货运受到严重影响，给危机重重的美国经济以沉重的打击，使美国垄断资本集团受到巨大的损失。"},{"type":"paragraph","text":"货车司机的罢工斗争得到美国进步学生的支持和声援。在洛杉矶，当地院校的大学生同货车司机肩并肩进行战斗，他们响应罢工的货车司机的号召，参加了货车司机的纠察线，每天一早便到纠察线进行巡逻；他们为货车司机的罢工斗争进行广泛的宣传活动，以打破反动当局对货车司机罢工的新闻封锁；他们向罢工的货车司机介绍进步的报刊，同罢工的货车司机联合举行集会，并且为在罢工期间被反动当局逮捕的四百多名货车司机成立了一个“辩护委员会”，反对反动当局对罢工的货车司机的残酷迫害。"},{"type":"paragraph","text":"据新华社讯　华盛顿消息：美国三个州的一万七千名煤矿工人为抗议垄断资本的残酷剥削，冲破黄色工会阻挠，从二十二日起开始罢工。"},{"type":"paragraph","text":"参加罢工的煤矿工人有：宾夕法尼亚州西部八千人，西弗吉尼亚州七千人和俄亥俄州东部两千人。"},{"type":"paragraph","text":"美国煤矿工人的劳动条件极为恶劣，人身安全毫无保障。一九六九年，在西弗吉尼亚州的煤矿中，平均每三百名井下工人就有一名因工死亡，每十名矿工就有一人受伤。这些死亡工人的家属和受伤而残废工人的生活十分悲惨。这次煤矿工人罢工就是为了改善死亡工人家属和残废工人的生活条件。因此，罢工得到广大工人和家属的热烈支持。在西弗吉尼亚州，许多妇女、儿童和工人一起布置了纠察线。"},{"type":"paragraph","text":"目前美国煤的供应比较紧张，大批煤矿工人的罢工将对美国经济产生重大影响。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bee2a2fb12"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
