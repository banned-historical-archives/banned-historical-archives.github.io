" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"邓小平在中共十二届二中全会上的讲话节录","authors":["邓小平"],"dates":[{"year":1983,"month":10,"day":12}],"is_range_date":false,"parts":[{"text":"邓小平在中共十二届二中全会上的讲话节录","type":"title"},{"text":"邓小平","type":"authors"},{"text":"我们党从十一届三中全会以来，重新确立了马克思主义的思想路线、政治路线和组织路线，制定了各方面的适合情况的正确政策，收到了显著的成效，各项工作的新局面正在逐步打开。广大群众拥护我问党的路线和领导。在实现伟大历史转变的过程中，经过多次重大斗争的考验，证明我们党的主流是好的，是有战斗力的，是有能力、有办法解决问题的。","type":"paragraph"},{"text":"但是，我们党现在的状况还远不是都令人满意。党内还存在着不少没有来得及清理和解决的严重问题。这里有十年内乱遗留下来的消极东西，也有在新的历史条件下产生和发展起来的消极东西。决定列举了“三种人”，严重的经济犯罪和其他刑事犯罪分子，以权谋私、严重损害党和群众的关系的人，长期在政治上不同中央保持一致、或者表面上保持一致实际上另搞一套的人，等等。所有这些，都是党内的危险因素，腐败因素，是党内思想不纯、作风不纯、组织不纯的严重表现。","type":"paragraph"},{"text":"其中最危险的是“三种人”。这些人已经清查和处理了一批，有些在思想上和行动上已经有所改正。但是确有相当一批立场没有改变而在党内隐藏了下来。说他们最危险，是因为：一、他们坚持原来的帮派思想，有一套煽惑性和颠覆性的政治主张，二、他们有狡猾的政治手腕，不利时会伪装自己，骗取信任，时机到来，又会煽风点火，制造新的动乱；三、他们转移、散布和隐蔽在全国许多地方，秘密的派性联系还没有完全消灭；四、他们比较年轻，也比较有文化。他们当中有些人早就扬言十年、二十年后见。总之，她们是一股有野心的政治势力，不可小看，如果不在整党中解决，就会留下祸根，成为定时炸弹。……在整党中，对于上述的“三种人”和其他各种错误严重、危害严重的人，必须严肃地作出组织处理。该开除党籍的就开除党籍，该给撤职或其他处分的就给这些处分，违法的还得法办。对于情节较轻的，要进行严肃的批评，并要他们作出认真的而不是敷衍的检讨，作出改正错误的切实保证。这是整党不走过场的最重要标志之一。","type":"paragraph"},{"text":"来源：《处理“文革”遗留问题、清理“三种人”文件汇编（第一册）》广西壮族自治区党委整党办公室，1986年8月","type":"appellation"}],"comments":[],"origin":"《处理“文革”遗留问题、清理“三种人”文件汇编（第1-6册）》广西壮族自治区党委整党办公室，1986-1987年.","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"派性","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2a1c911378"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
