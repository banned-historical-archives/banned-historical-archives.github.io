<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"一次次粉碎美日反动派、现代修正主义和右翼社会民主主义的联合进攻  今年禁止核弹世界大会群众基础雄厚盛况空前","authors":[],"dates":[{"year":1964,"month":7,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"一次次粉碎美日反动派、现代修正主义和右翼社会民主主义的联合进攻"},{"type":"paragraph","text":"今年禁止核弹世界大会群众基础雄厚盛况空前"},{"type":"paragraph","text":"通过“百万人集会”运动深入基层广泛发动团结了一百数十万人"},{"type":"paragraph","text":"新华社二十九日讯　本社记者报道：日本群众运动通过筹备第十届禁止原子弹氢弹世界大会又有新的发展。日本人民在反对美帝国主义和形形色色反动派的斗争中，正乘风破浪、奋勇前进。"},{"type":"paragraph","text":"筹备第十届世界大会工作的特点之一是“百万人集会”运动。这项运动是日本人民在反对日美“安全条约”斗争中展开多次统一行动之后的又一创举，它使本届世界大会比历届大会具有更雄厚的群众基础。"},{"type":"paragraph","text":"“百万人集会”运动是广泛深入地发动群众，通过学习、集会、募款、签名等各种方式，来正确了解世界大会的意义，并且选派出席世界大会的代表。据《赤旗报》报道，六月初以来，各工厂、机关的职工和居民，经常举行几人、几十人和几百人的集会，表示支持第十届世界大会、反对由右翼社会民主主义者召开的分裂会议。出席各种集会的有工人、职员、农民、学生、宗教家、家庭妇女，他们中间有很多人是第一次参加进步活动。报纸估计，由于这项创举，将使出席世界大会的日本正式代表大大超过去年出席大会的代表人数。"},{"type":"paragraph","text":"据报道，在六、七两个月，“百万人集会”运动中的积极分子，深入农村去进行宣传工作。关西地区的一些农村和集镇还发起了向京都市进军的和平游行。大会的纪念章已经闪耀在一百二十五万人的胸前，四十五万份要求全面、彻底禁止核武器的有关大会资料已经在城市和农村广泛散发。《赤旗报》说，第十届世界大会将是实际上有一百数十万人参加的盛况空前的大会。"},{"type":"paragraph","text":"随着“百万人集会”运动的展开，日本禁止原子弹氢弹协议会不仅整顿了组织、加强了领导，而且在过去很少有进步组织的地方成立起协议会的分会。据报道，在最近半个月中，北海道的一百四十个城、镇和村中，已经有九十二个市、镇、村建立起协议会的地方组织。长野县的百分之八十的市、镇和村都成立起禁止原子弹氢弹协议会分会，使这个县的民主运动出现了新气象。"},{"type":"paragraph","text":"同“百万人集会”运动相呼应，日本人民的反美爱国斗争半年来取得了很大的胜利。以包围美军横田基地和板付基地为中心的声势浩大的“一·二六”统一行动为开端，一九六四年的反美烽火燃遍了日本四岛。从城市到农村，几乎每周都有反对美国核潜艇在日本“停泊”、反对在日本驻扎能载核武器的F—105D型飞机的群众示威以及反对日美“安全条约”、反对“日韩会谈”、支援南越、老挝人民反美斗争的群众性集会。在日本人民坚决斗争和全世界舆论的同声谴责下，美国核潜艇进驻日本的计划一再被推迟，“日韩会谈”也未能达成协议。这些胜利，有力地打击了美帝国主义在亚洲的侵略政策，大大地鼓舞了日本人民和亚洲、非洲、拉丁美洲人民的反帝士气。"},{"type":"paragraph","text":"日本群众运动每前进一步，每取得一次胜利，都是经过粉碎美日反动派、现代修正主义和右翼社会民主主义者的联合进攻才取得的。从“一·二六”统一行动到第十届世界大会，每当日本人民举行大会时，总是由右翼社会民主主义者出面，组织分裂性集会，用唱“对台戏”的卑劣手法进行破坏。但是，这些破坏阴谋一次又一次地被日本人民击败了。由日共领导的每次反美示威和集会都超过了原计划的规模。"},{"type":"paragraph","text":"据报道，出席第十届世界大会的外国代表将达二百三十多人，这个数字几为出席第九届世界大会外国代表人数的三倍。可以预料，在日本和各国代表的共同奋斗下，第十届大会将在反对美帝国主义和现代修正主义以及保卫世界和平的斗争中取得新的胜利，日本的群众运动将在世界大会取得胜利的基础上走向新的高涨。（附图片）"},{"type":"paragraph","text":"为了筹备第十届禁止原子弹氢弹世界大会，广岛市东部的一些市民利用每星期六的空余时间征集签名和捐款。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"53e55f1bbb"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
