script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"许世友、向仲华同志强调肃清极左流毒加速部队建设  必须联系实际开展真理标准的讨论","authors":[],"dates":[{"year":1979,"month":9,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"许世友、向仲华同志强调肃清极左流毒加速部队建设"},{"type":"paragraph","text":"必须联系实际开展真理标准的讨论"},{"type":"paragraph","text":"新华社广州九月十七日电  人民解放军广州部队司令员许世友、政治委员向仲华最近强调指出，开展真理标准问题的讨论，必须紧密联系实际，抓紧、抓深、抓出成果。要彻底肃清林彪、“四人帮”极左路线的流毒，使广大指战员更好地坚持实事求是、解放思想，坚定不移地按照党的三中全会和五届人大二次会议精神加速部队革命化现代化建设。"},{"type":"paragraph","text":"许世友和向仲华是在广州部队党委专门召开常委会研究怎样更广泛、更深入地开展真理标准问题讨论时发表讲话的。许世友说，开展真理标准问题的讨论，就是要解决从本本出发，还是从实际出发这一根本原则问题。马列主义、毛泽东思想是讲一切从实际出发的，是讲实事求是的。毛泽东同志把马列主义和中国革命的实践相结合，从中国革命的实际出发，实事求是，创造性地发展了马列主义。毛泽东同志的许多观点在马列的本本上是找不到的。他强调指出，我们今天搞四化，就不能照搬本本，死抠条条，不能搞两个“凡是”。一切理论都要通过实践来检验。有人说，官大权大讲话就是真理，这是很错误的。林彪、“四人帮”的官够大了，他们的一系列谬论反动透顶，有啥真理？还有人担心，开展真理标准讨论是“卷旗”、“降旗”、“砍旗”，这是糊涂观念。坚持实践是检验真理的唯一标准，就是坚持马列主义、毛泽东思想。我们今天开展这场讨论，就是要拨乱反正，肃清林彪、“四人帮”假高举那套极左流毒，正是为了高举马列主义、毛泽东思想的旗帜。为了把这场讨论引向深入，各级党委要带头学习，特别要抓好军政第一把手的学习。"},{"type":"paragraph","text":"向仲华在发言中着重谈了联系实际问题。他说，搞好真理标准讨论，必须首先读点书，学点基本理论，把马克思主义的认识论搞清楚，弄清唯物主义和唯心主义两条认识路线的根本区别。但是不能停留在单纯学习理论上，必须联系实际，只有紧密联系实际展开讨论，才能加深对实践是检验真理唯一标准的理解，才能使学习讨论落到实处，推动部队革命化、现代化建设。他指出，联系实际搞好真理标准问题的讨论，首先要联系我国现阶段阶级和阶级斗争现状，认清现阶段的主要矛盾，加深理解党的三中全会精神，使广大指战员深刻理解三中全会制定的各项方针政策，是根据我国近三十年来正反两方面的经验总结出来的，是正确的，必须坚决贯彻执行。第二，要联系自卫还击作战的战斗实践，运用实践是检验真理标准这个武器，来总结边防部队对越自卫还击作战的经验，并结合部队建设实际和适应现代战争的要求，解放思想，实事求是，大力改进军事工作、政治工作、后勤工作。第三，要联系当前干部战士的思想实际，创造性地做好政治工作，把我军政治思想工作提高到新的水平。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"name":"许世友","type":"人物"},{"name":"向仲华","type":"人物"},{"name":"四人帮","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0634d74d86"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
