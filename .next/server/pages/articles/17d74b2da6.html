script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji15","name":"毛泽东全集第15卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji15.pdf"],"article":{"title":"对黄埔系军人进行统战工作意义重大","alias":"","parts":[{"type":"paragraph","text":"对黄埔系军人进行统战工作意义重大！]"},{"type":"paragraph","text":"（1940年11月16日）"},{"type":"paragraph","text":"这次苏北事件中，税警团未参加反共战争，而该团干部大半都提黄埔生。过去华北与朱怀冰冲突时，其中一个师也未参加反共战争，而该师干部同样也有些黄埔生。我驻阎办事处?主任王世英同志能与该地中央军（胡宗南）的黄埔生高级干部进行了很好的统战线工作。这一切证明，我党我军中过去把黄埔生看作一个笼统的共集团的传统观念是错误的、有害的。在目前严重时局，急须改正能观念，利用一切机会与黄埔生军人进行统一战线工作，不要刺激他，而应以民族至上的观念来打动他们，使他们不肯投降日寇，使他对反共战争取中立或消极态度，这对挽回危局有重大意义。"},{"type":"paragraph","text":"毛朱王"},{"type":"paragraph","text":"铣[1]这是毛泽东和朱德、中共中央军委副主席兼总政治部主任王稼祥发的关于对黄埔系军人做统战工作的电报。[2]朱怀冰，当时任国民党军第九十七军军长。[3]指八路军驻阎锡山任司令长官的国民党军第二战区办事处，当时设"}],"authors":["毛泽东"],"dates":[{"year":1940,"month":11,"day":16}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":229,"page_end":229},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"17d74b2da6"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
