script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"制止资产阶级名利思想的猖狂发展王步生伪造政治事故危害生产案昨判决","authors":[],"dates":[{"year":1955,"month":4,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本市杨浦区人民法院接受该区人民检察院的公诉，在昨天下午公开审理并判决了一件假造政治事故、企图骗取荣誉、危害生产案。到庭旁听的有该区各界群众九十余人。"},{"type":"paragraph","text":"罪犯王步生，原系某工程公司工人，青年团员，今年二十岁。王犯在去年参加扩建某厂发电机工程时，为了想“报功”，骗取领导信任，以取得所谓入党条件，竟不惜采取捏造事实的卑鄙手段。他在去年五月二十九日乘机将玻璃弹子两粒和碎火砖、煤渣各一小块投入洗油缸用的火油盘中，然后取出对生产组长谎称:这是在机器中发现的。他又向调查人员谎称:这事故是敌人破坏的，并以嫁祸于人的手段谎说他的老师傅是嫌疑分子，以进一步造成案件的复杂状态。经过保卫部门的详细调查，终于查清了这一事故的真相。公司领导上曾对王犯屡次进行教育，他仍执迷不悟，最后终于被开除了团籍，并依法逮捕了他。"},{"type":"paragraph","text":"由于这一事故的发生，造成了发电机工程重新返工检查，延期完工近一个月，直接使国家财产损失达三千六百七十余元。至于因返工检查而使工程拖延，影响发电所造成的巨大损失，更是无法估计。"},{"type":"paragraph","text":"在昨天的公判庭上，审判长根据检察院的公诉，进行了详细的审理。"},{"type":"paragraph","text":"被告辩护人周启东接着发言，他肯定了王犯的严重罪责后指出:资产阶级腐朽思想随时在向青年进行腐蚀，被告年轻无知，且目前尚能表示悔改，因此要求审判长、陪审员考虑从轻处理。"},{"type":"paragraph","text":"审判长接着指出:被告王步生的犯罪行为直接危害了国家社会主义建设事业的进行，他之所以犯罪是由于资产阶级名利思想严重发展的结果，这种思想和行为是与共产主义道德观完全不相容的，也是为国家法律所不允许的。"},{"type":"paragraph","text":"经过评议后，审判长宣布判处王犯步生以徒刑一年。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"16cec3bd1d"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
