script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"西方资产阶级报刊对当前经济危机忧心忡忡","authors":[],"dates":[{"year":1975,"month":1,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"西方资产阶级报刊对当前经济危机忧心忡忡"},{"type":"paragraph","text":"新华社一九七五年一月八日讯　美国和西欧的一些资产阶级报刊和通讯社在回顾去年展望今年的时候，对资本主义世界面临战后最严重的经济危机忧心忡忡。"},{"type":"paragraph","text":"《华盛顿邮报》去年十二月二十四日在“圣诞节”前夕发表的一篇文章说：“在这个本当欢欣的季节里，今年成为特征的却是人们对目前的苦难和未来的更糟糕的情况发出的叫喊。”“肯定无疑的是，明年的圣诞节将更为凄凉——也许后年的圣诞节也是如此。”文章还说，“在美国或（资本主义世界）任何其他地方没有一个权威能够处理这些困难。”"},{"type":"paragraph","text":"美联社在去年底发表的一篇年终专稿说：“美国的困难重重的经济在第二次世界大战结束后出现的最大压力之下挣扎着从一九七四年进入了一九七五年，各方面都有信号表明正在发生一场日益加深的衰退。”“（美国）政府内外的大多数经济学家都同意美国财政部长威廉·西蒙的说法，即这次衰退很可能是第二次大战结束以后最长的一次，并且可能是最糟的一次。”"},{"type":"paragraph","text":"英国《金融时报》去年十二月三十一日刊载英国财政大臣希利的《新年献词》写道：“一九七四年是我们（英国）历史上最困难的年份之一”。“我们所面临的某些困难正在影响着每个工业国家。事实是（西方）世界已经陷入衰退，而且这一衰退有发展成为全面暴跌的危险。就这样，失业增加的威胁同物价高涨的威胁齐头并进。”"},{"type":"paragraph","text":"英国《每日电讯报》去年十二月三十一日发表的一篇文章写道：“一九七四年以阴霾开始而以黑暗告终。”这家报纸同一天的社论还说，英国一九七五年“前景严酷”。“一九七五年将会更坏”，“情况是通货膨胀继续无法抑制，目前的（经济）下降趋势将继续发展”。"},{"type":"paragraph","text":"法国《企业》周刊去年年底刊载的一篇题为《一九七四：这些数字构成了危机》的文章写道：“欧洲有四百万人失业，美国有六百万人没有就业，一九七四年完全表明了西方经济发展遭到挫折。”"},{"type":"paragraph","text":"“一九七五年仍将是一个苦难之年。”"},{"type":"paragraph","text":"法国《世界报》去年十二月二十四日刊登的一篇题为《一九七四年的总结：确实是危机》的文章说，一九七四年的危机是“战后最严重、最长的这一资本主义世界危机”，而这个危机“因通货飞速膨胀而加剧了”。这家法国报纸说，西方各国政府“作出了不同的反应”，但是“迄今为止所取得的结果是不大令人鼓舞的：通货膨胀几乎没有减弱，而失业状况却迅速恶化。很明显，资本主义世界尚未找到在浪头上航行的方法”。"},{"type":"paragraph","text":"这家报纸最后忧心忡忡地说，“在（一九七四）这动荡的不景气的一年结束之际，人们提出的问题是：资本主义经历这场危机之后将成为什么样子？”它接着说，“比较稳妥”的预测是：“这个制度将更加不相信自己，将更加脆弱”。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3e8cad6882"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
