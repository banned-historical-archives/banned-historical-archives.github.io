script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"毛主席重要指示是各项工作的指路明灯广阔天地大有作为人民公社干部和社员联系实际认真学习，决心坚持无产阶级专政下的继续革命，搞好反修防修斗争","authors":[],"dates":[{"year":1975,"month":2,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社郑州一九七五年二月十八日电　河南省郏县广阔天地大有作为人民公社党委，组织干部和社员认真学习毛主席关于理论问题的重要指示。大家说，毛主席的重要指示是我们今后的行动纲领和各项工作的指路明灯，我们一定要认真学好无产阶级专政的理论，坚持无产阶级专政下的继续革命，搞好反修防修的斗争。"},{"type":"paragraph","text":"农历腊月三十日夜晚，全公社广大干部和群众，破除了“熬岁”“守福”的旧传统习惯，纷纷聚集到政治夜校学习毛主席的重要指示，同时普遍进行了新旧社会的回忆对比，回顾解放以来两个阶级、两条道路、两条路线斗争的历史经验，以加深对无产阶级专政理论的认识和理解。"},{"type":"paragraph","text":"在学习中，他们着重讨论了无产阶级为什么必须对资产阶级实行专政的问题。大家说，我国农村虽然实现了公社化，广大农民走上了社会主义共同富裕的康庄大道，但是，在社会主义时期，阶级和阶级斗争还依然存在，没有改造好的阶级敌人还在继续捣乱，小生产的残余还存在，一部分农民还在不同程度上保持着小生产者的习惯，还存在着资本主义自发倾向，社会主义道路同资本主义道路的斗争还很激烈，社会主义和资本主义的矛盾仍然是当前农村的主要矛盾。为此，必须坚持马克思主义的斗争哲学，坚持党的基本路线，同阶级敌人进行斗争，同资本主义倾向进行斗争，不断巩固社会主义经济，发展社会主义革命和社会主义建设的大好形势。"},{"type":"paragraph","text":"干部和社员们对于工人阶级一部分、党员一部分中会产生资本主义和资产阶级这样一个重大问题，对于无产阶级中、机关工作人员中都有发生资产阶级生活作风这样一种现象，进行了认真讨论。他们说，在全国胜利以后，毛主席谆谆教导我们要警惕资产阶级糖衣炮弹的袭击。这的确是一个十分重大的问题。我们一定要下决心刻苦学习马克思主义，不断改造世界观，战胜资产阶级和旧社会习惯势力的腐蚀和影响。大家特别谈到，搞社会主义革命，搞阶级斗争和路线斗争，光靠朴素的阶级感情是远远不够的，必须不断提高马克思主义的理论水平，才能更加自觉地坚持社会主义道路，把无产阶级专政下的继续革命进行到底。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"两条路线斗争","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"be32e5a856"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
