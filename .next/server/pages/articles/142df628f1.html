script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"美英法资产阶级报纸纷纷评论  认为中苏坚强团结使帝国主义的幻想破灭","authors":[],"dates":[{"year":1957,"month":1,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"美英法资产阶级报纸纷纷评论"},{"type":"paragraph","text":"认为中苏坚强团结使帝国主义的幻想破灭"},{"type":"paragraph","text":"新华社4日讯　美、英、法资产阶级通讯社和报纸非常注意12月29日北京“人民日报”刊载的“再论无产阶级专政的历史经验”的文章。各国通讯社都播发了有关这篇文章的消息、摘要或述评。许多重要报纸以显著的地位刊登了关于这篇文章的报道，并且发表了评论。"},{"type":"paragraph","text":"“人民日报”文章提出的加强以苏联为中心的无产阶级的国际团结，在各国评论员中间造成了深刻的印象。许多评论不得不承认：帝国主义关于中苏两国人民和两国共产党之间的坚固团结会发生破裂的幻想完全破灭了。"},{"type":"paragraph","text":"英国的“星期日泰晤士报”说，“在可以看得到的将来”，“中国将同俄国坚决地站在一起”。“曼彻斯特卫报”的评论说，中国的整个论点是“主张（各国）共产党必须保持团结”。"},{"type":"paragraph","text":"此外，西方报刊和通讯社的兴趣还集中在这样两个问题上，这就是人民日报文章中对南斯拉夫同志们提出的劝告，对斯大林功过的估计，特别是关于“斯大林的错误同他的成绩比较起来，只居于第二位的地位”的评论。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"142df628f1"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
