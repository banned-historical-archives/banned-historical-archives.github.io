script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"我们的心飞到了毛主席身边","authors":["北京红卫兵"],"dates":[{"year":1966,"month":9,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"我们的心飞到了毛主席身边"},{"type":"paragraph","text":"北京红卫兵"},{"type":"paragraph","text":"我们非常喜爱《毛主席和百万文化革命大军在一起》这部彩色纪录片，因为它反映了我们红卫兵和全国革命群众对我们的伟大导师、伟大领袖、伟大统帅、伟大舵手毛主席的无限热爱、无限信仰、无限崇拜的感情，它使我们重温了八月十八日毛主席检阅我们的这个最最幸福的时刻。"},{"type":"paragraph","text":"在影片里，我们又看到了最最敬爱的毛主席！他老人家穿着草绿色的军装，带着亲切的微笑，迈着稳健的步伐向我们走来了。我们最最亲爱的毛主席同红卫兵、同百万文化革命大军见面啦！千万颗赤红的心飞向毛主席，千万双手高举起红光闪闪的《毛主席语录》，千万个喉咙同时高呼“毛主席万岁，万岁，万万岁！”毛主席啊，我们心中最红最红的太阳，您亲切的微笑就是对我们最大的信任和期望！您健康的身体，就是我们最大的幸福和骄傲。毛主席啊，毛主席！看着您身穿草绿色军装，看着您军帽上闪闪发光的红星，我们就想起了您当年领导的红旗招展的井冈山的革命斗争，想起了您领导的爬雪山、过草地的二万五千里长征……有了您，我们就能克服一个一个的困难，就能从胜利走向胜利。毛主席，您向我们招手了，您向我们红卫兵和千百万革命群众发出战斗号召了，我们坚决执行您的命令，向一切牛鬼蛇神猛烈开火！向旧世界开火！"},{"type":"paragraph","text":"难忘的“八·一八”啊，就是在这一天，毛主席戴上了红卫兵的红袖章，当了我们红卫兵的最高司令。从这一天以后，北京和全国的红卫兵都行动起来了，组织起来了。我们戴上了和毛主席一样的红袖章，穿上了我们的父兄穿过的革命军装，继承着革命前辈的光荣传统，勇猛地投入了战斗。我们决心跟着毛主席到阶级斗争的大风大浪中去经受考验，去革命，去造反，去创造一个红通通的新世界。"},{"type":"paragraph","text":"毛主席教导我们说：“我们要破坏帝国主义，要破坏封建主义。要坚决地彻底地破坏这些东西，而决不能丝毫留情。”我们红卫兵战士坚决听毛主席的话，就是要造帝国主义的反，造修正主义的反，造整个旧世界的反。我们在“八·一八”以后的短短几天内，把学校的斗、批、改，发展到社会上的斗、批、改。革命的风暴突破了文化领域，触及到了政治、经济战线。挂着象征资本家剥削劳动人民的老商号招牌，被砸得粉碎。资产阶级的生活方式受到了无情的批判。毛泽东思想的光辉照亮了每一个角落。我们响亮的口号是：用革命的铁锤砸烂封建主义的余孽；用革命的铁扫帚横扫资本主义的毒菌，用革命的大刀阔斧猛砍修正主义的老根！"},{"type":"paragraph","text":"毛主席早在一九四九年就预言：“中国的命运一经操在人民自己的手里，中国就将如太阳升起在东方那样，以自己的辉煌的光焰普照大地，迅速地荡涤反动政府留下来的污泥浊水，治好战争的创伤，建设起一个崭新的强盛的名副其实的人民共和国。”这样的日子终于来到了，中国的命运已经掌握在用毛泽东思想武装起来的人民的手中。在毛主席和中国共产党的领导下，红卫兵战士也登上了无产阶级文化大革命的舞台，登上了世界革命的舞台。我们是旧世界的勇敢的批判者，是新世界的当然的主宰者。"},{"type":"paragraph","text":"我们红卫兵是在文化大革命的急风暴雨中诞生的，是在毛主席的一手抚育下成长壮大的。我们要坚决听毛主席的话，坚决执行十六条。红卫兵战士们，让我们高举毛泽东思想伟大红旗，戴着鲜红的袖章，在红司令毛主席的领导下，向旧世界勇敢地冲锋，把无产阶级文化大革命进行到底！"},{"type":"paragraph","text":"〔首都大专院校红卫兵司令部政治部供稿〕"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"728466695c"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
