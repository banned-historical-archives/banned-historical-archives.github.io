<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"type":"pdf","id":"wenji4","name":"毛泽东文集第四卷（1999）","internal":false,"official":true,"author":"中央文献研究室","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/wenji4.pdf"],"article":{"title":"力争东北停战及制止全国内战的对策","description":"根据毛泽东手稿刊印。","dates":[{"year":1946,"month":5,"day":15}],"parts":[{"text":"力争东北停战及制止全国内战的对策","type":"title"},{"type":"appellation","text":"各局，周，叶罗，饶李伍："},{"type":"paragraph","text":"关于时局及对策："},{"type":"paragraph","text":"（一）国民党除在东北大打外，积极准备全国内战，但因美国政策除一般扶蒋及助蒋在东北作战外，对全国内战尚不赞成，蒋对我军实力、国际舆论及国内人心有所顾虑，故尚不敢立即发动全国内战，但其准备是异常积极的。"},{"type":"paragraph","text":"（二）我党方针是力争东北停战及制止全国内战，至少也要推延全国内战时间。因此我应采取如下对策：甲、不向国民党挑战，如国方向我“蚕食”或进攻，我必须坚决将其击退，收复失地，否则彼方得寸进尺，大内战将来得更快。但我必须坚守自卫立场，不向彼方主动进攻，纠纷发生，经过斗争之后由执行小组加以调处，使我处于有理有利之地位。乙、对执行部及各执行小组的工作加以调整，改善对美国人关系，无论美国人如何偏袒国方，我除据理力争外，只要美国未恢复赫尔利政策，策动全国内战，我即应尽可能争取美国人。最近时期，有些地方对美国人关系弄得不好，这当然是由于美国人态度不好所引起，但我们的争取工作亦有不足，今后应当注意研究争取美国人的工作。即对国方代表及国方官长，亦须注意争取。总之，我方权利所在，必须力争，彼方无理要求，必须拒绝，但总的精神是求得在不吃亏的基础上解决纠纷，而不是使纠纷扩大。丙、东北方面是一方面坚决作战，四平街保卫战支持的时间愈长愈有利，另方面是我对外谈判人员应强调停战与争取停战。热河方面，因彼方源源调兵扩大东北内战，故我不能不对锦热路加以破击，一俟告一段落，即应转入调整。丁、除东北加紧作战，同时抓紧减租、生产外，各解放区均应抓紧练兵、减租、生产三大任务，必须于今后六个月内做出显著成绩，即以此制止全国内战。如国民党必欲发动内战，我亦能将其彻底粉碎而使自己立于不败之地。今后六个月又分为两期，五、六、七月为一期，八、九、十月为一期，望各地首先抓紧目前三个月工作，切勿麻痹松懈。戊、在一切大城市中除发展群众工作外，应用极大力量争取各部分中间派及国民党中间派。"},{"type":"paragraph","text":"中央"},{"type":"paragraph","text":"辰删"}],"comment_pivots":[{"part_idx":1,"offset":11,"index":1},{"part_idx":3,"offset":34,"index":2},{"part_idx":4,"offset":214,"index":3},{"part_idx":4,"offset":435,"index":4},{"part_idx":4,"offset":461,"index":5}],"is_range_date":false,"authors":["毛泽东"],"comments":["周，指周恩来。叶，指叶剑英（一八九七——一九八六），广东梅县人，当时任军事调处执行部中共方面代表。罗，指罗瑞卿，当时任军事调处执行部中共方面参谋长。饶，指饶漱石，当时任军事调处执行部第二十七执行小组中共方面组长。李，指李立三（一八九九——一九六七），湖南醴陵人，当时任军事调处执行部第二十七执行小组中共方面政治顾问。伍，指伍修权，一九○八年生，湖北武昌人，当时任军事调处执行部第二十七执行小组中共方面参谋长。","蒋，指蒋介石。","赫尔利，美国共和党人。一九四四年十一月底任美国驻中国大使，因支持蒋介石的反共政策而受到中国人民的坚决反对，于一九四五年十一月离职。","热河，即热河省，见本卷第10页注〔3〕。","锦热路，指锦州至承德的铁路，即今锦承线。"],"page_start":130,"page_end":131,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"01cfae7ec7"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
