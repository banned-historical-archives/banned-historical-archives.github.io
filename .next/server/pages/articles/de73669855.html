script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"市文攻武卫指挥部遵照毛主席伟大教导严格区别两类矛盾　稳准狠地打击敌人昨晨发动强大攻势，一小撮一贯扰乱社会治安，破坏支内、支疆、支农工作的罪犯落入群众专政的法网","authors":[],"dates":[{"year":1968,"month":6,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　上海市文攻武卫指挥部的广大革命战士，最近认真学习了毛主席最新指示:“对广大人民群众是保护还是镇压，是共产党同国民党的根本区别，是无产阶级同资产阶级的根本区别，是无产阶级专政同资产阶级专政的根本区别。”受到极大的鼓舞和教育。他们根据广大革命群众的检举揭发，在市革委会的直接领导下，在本市广大无产阶级革命派和革命群众的密切配合下，昨天清晨采取统一革命行动，主动向一小撮破坏社会治安、扰乱革命新秩序，妄图阻挠、破坏“支内、支疆、支农”工作的阶级敌人展开了猛烈进攻。不少革命的里弄居民激动地高呼:“加强群众专政!”“无产阶级专政万岁!”“毛主席万岁!万万岁!”"},{"type":"paragraph","text":"上海地区参加支内、支疆、支农建设的返沪革命青年和革命群众，在全国一片大好形势下，积极响应伟大领袖毛主席关于“抓革命，促生产”的伟大号召，纷纷“杀回老家去，就地闹革命”。但是，一小撮阶级敌人却千方百计地进行阻挠和破坏。他们之中，有些是混杂在支内、支疆、支农人员中的地、富、反、坏分子，以种种借口，制造事端，煽动闹事，甚至纠集歹徒殴打准备返回原地去的人员；有的竟寻衅冲击车站、码头；有的打着造反旗号殴打里弄干部，进行打、砸、抢，严重地破坏社会治安和革命新秩序。广大革命群众对此十分气愤，纷纷要求对这些犯罪分子采取革命行动。"},{"type":"paragraph","text":"为了严格区别两类不同性质的矛盾，稳、准、狠地打击一小撮阶级敌人，市文攻武卫指挥部在各有关单位的密切配合下，进行了一段时期的深入调查和周密研究。为了打好这一场硬仗，市文攻武卫指挥部根据毛主席“掌握思想教育，是团结全党进行伟大政治斗争的中心环节”的教导，在部署战斗之前，组织战士认真学习了毛主席有关阶级斗争的最新指示，并号召向无限忠于毛主席革命路线的好干部门合同志学习，进一步激发了广大革命战士的无产阶级感情，他们纷纷主动请战，要求及早给这一小撮阶级敌人以沉重打击。"},{"type":"paragraph","text":"昨日，在文攻武卫大军的强大攻势下，那些一贯作恶多端的犯罪分子终于落入群众专政的法网。这一革命行动受到广大革命群众和支内、支疆、支农返沪革命青年和革命家属的热烈欢迎和坚决支持。他们热情地赞扬说:“这个革命行动好得很!”"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"de73669855"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
