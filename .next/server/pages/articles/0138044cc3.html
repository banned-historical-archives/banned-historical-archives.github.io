script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"华东局关于成立土改委员会的请示及中央批示","authors":[],"dates":[{"year":1950,"month":1,"day":17}],"is_range_date":false,"parts":[{"text":"华东局关于成立土改委员会的请示及中央批示","type":"title"},{"text":"华东局并告中南局西南局西北局：","type":"appellation"},{"text":"同意在华东军政委员会下设立土地委员会，尚未完成土地改革之省县政府似亦应设立土地委员会，请加研究电告。","type":"paragraph"},{"text":" 中央  一月十七日","type":"paragraph"},{"text":"中央：","type":"appellation"},{"text":"由于新区广大土地问题复杂牵涉甚多，依现行各大行政区人民政府组织通则所列有关农村工作各部，多是生产指导管理机关，无专设领导土改机关。经研究后深感在未完成土改之各大行政区军政委员会中有成立土地改革委员会专司其事之需要，其性质等于政法财经地方教育委员会，其具体任务为负责有关土改法令条例之准备与草拟有关土改行政之指导，以及土改中某些问题须由政府答复或处理、顾问，由该委员会研究提供意见等。估计在准备土改首次实行土改的过程中，军政委员会中争论必多，党的农委工作同志，可运用该委员会在政权取得发言资格。因此土地委员会拟即以华东局农委为基础并吸收一部份开明士绅及农业经济学者组成之。在土改未完成前，在军政委员会统一领导下同农林、水利、渔业等部局拔归委员会指导；在土改未完成前，在军政委员会统一领导下同农林、水利、渔业等部局拔归委员会指导；在土改完成之后，土地委员会之工作即行结束，所管之各部再行归拔财委指导，此次华东军政委员会组织条例草案中已列入该项土地委员会之组织，是否有当，请中央考虑示复。","type":"paragraph"},{"text":" 一月十六日","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0138044cc3"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
