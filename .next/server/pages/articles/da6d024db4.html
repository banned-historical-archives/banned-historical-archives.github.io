script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"刘少奇同志视察安徽时就教育方针作重要指示","authors":[],"dates":[{"year":1958,"month":11,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"大学应以学习为主，技工学校应以生产劳动为主，将来可逐渐搞成一样。"},{"type":"paragraph","text":"知识分子工农化要一直做下去，但大头在工农分子知识化，那是几亿人口的问题，任务更为艰巨。"},{"type":"paragraph","text":"有人看不起当教员这一行，主要是不愿侍候人。在我们的社会里，大家都是互相侍候的，侍候别人也就是侍候自己。"},{"type":"paragraph","text":"【本报讯】　10月19日，刘少奇同志在视察安徽合肥工业大学时，就教育与生产劳动相结合等问题作了许多重要指示。"},{"type":"paragraph","text":"少奇同志在视察了该校的炼钢塌、电机制造厂、机械制造厂、吹氧炼钢、机工厂、“红旗”工厂和教育革命展览室后，和该校负责人作了亲切谈话。"},{"type":"paragraph","text":"少奇同志对学校大办工厂以后的教学质量问题很关心。少奇同志问:结合生产劳动进行教学后，教学质量怎么样?中共合肥巴工业大学党委书记孙宗溶回答说:根据我们初步经验，结合生产劳动进行教学，教学质量不但不会降低，反而可以提高。少奇同志说:教学质量问题是大家关心的问题，学生关心，教员关心，家长关心，我们也关心。教育与生产劳动相结合是能提高教学质量的，但现在还缺少这方面的经验，搞得不好，质量也可能会暂时降低，应该注意。"},{"type":"paragraph","text":"孙宗溶告诉少奇同志:宣教系统钢铁厂举办的技工学校有一千多学生，都是高小毕业的程度，他们已实行半工半读，准备十年达到大学毕业。少奇同志说:是要使他们大学毕业。现在是学校办工厂，工厂办学校，将来逐渐发展成为一套，工人半工半读，农民也半工半读，大家都半工半读。"},{"type":"paragraph","text":"少奇同志还对孙宗溶说:你们学校现在还是应以学习为主，一部分时间劳动。现在大学还没有普及，象你们这类大学还不多，应以学习为主；技工学校应以生产劳动为主，如果生产忙时可以少读点书。有两种学校，一种以学习为主，一种以生产劳动为主，将来两种学校就逐渐可以搞成一样。"},{"type":"paragraph","text":"谈到教育方针问题，少奇同志说，教育历来是为政治服务的。解放以前旧中国的教育是为反动的政治服务的，我们的教育应该为无产阶级政治服务。教育同生产劳动相结合，这是无产阶级教育方针基本特点之一，我们的教育决不能和劳动相分离。在旧社会里教育同劳动始终是分离的。过去学校学生实习时，有的也有些生产劳动，但不是我们的提法，我们的提法是教育和生产劳动相结合，而且将来要逐步做到消灭脑力劳动和体力劳动的差别。两句话:工农分子知识化，知识分子工农化。知识分子工农化的口号，已经风行一时了，不仅是一时，而且要一直做下去。这个任务比起工农分子知识化还比较小，知识分子全国只有几百万，大头在工农分子知识化，那是几亿人口的问题，这个任务更为艰巨。"},{"type":"paragraph","text":"少奇同志说:有人看不起当教员这一行，当教员的也看不起自己这一行，主要是不愿侍候人。托儿所的保育员、烧饭的、洗衣的，他们说这都是侍候人的，就看不起自己这一行。这个观点到底正确不正确?不愿侍候人，那么侍候牲口怎么样?有些人认为侍候牲口倒可以，侍候石头倒可以，侍候钢铁也可以，侍候植物、高粱、小米都可以，独有侍候人不可以，他们就看不起这一行。为什么?是不是侍候牲口、矿物和植物就算是高贵的，侍候人就算是下贱的?这个观点那里来的?这是从剥削阶级那里来的，因为在剥削阶级统治的旧社会里，受侍候的人称作为高贵的，侍候人的人被看作是下贱的。在我们的社会里，大家都是互相侍候的，侍候别人也就是侍候自己，即所谓“人人为我，我为人人。”侍候牲口、植物、矿物，其实也是侍候了人。这个问题不是别的问题，就是观点问题，应该解释清楚，把错误观点转变过来。"},{"type":"paragraph","text":"10月16日至22日，刘少奇同志在安徽各地进行了为时七天的视察。少奇同志先后视察了宿县、濉溪、蚌埠、淮南、合肥、芜湖、马鞍山等诚市和乡村，参观了许多工厂、人民公社、学校，对各项工作作了许多重要指示，并和许多工人、农民、学生和基层干部进行了广泛会见和亲切交谈。(据安徽日报报道摘要改写)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"name":"教育革命","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"da6d024db4"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
