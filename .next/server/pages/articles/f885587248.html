script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"type":"pdf","id":"wenji4","name":"毛泽东文集第四卷（1999）","internal":false,"official":true,"author":"中央文献研究室","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/wenji4.pdf"],"article":{"title":"中原军胜利突围的意义","description":"根据毛泽东手稿刊印。","dates":[{"year":1946,"month":7,"day":15}],"parts":[{"text":"中原军胜利突围的意义","type":"title"},{"type":"appellation","text":"郑李戴并告王震："},{"type":"paragraph","text":"（一）十五日电悉。你们休息两天很好。"},{"type":"paragraph","text":"（二）进到山阳、柞水、镇安地区时，既是山地，又两面无敌，应多休息几天，完全恢复疲劳。应考虑在陕南是否可能给追兵以打击，歼灭其几部分，并考虑是否可能在陕南建立临时根据地，以便顿住一时期，然后留小部在陕南游击，主力渡汉水占领通南巴，开展新局面。"},{"type":"paragraph","text":"（三）你们尽可能多休息，敌人无奈你们何。"},{"type":"paragraph","text":"（四）王刘过襄河后，十五旅至流水沟被七十五军之第六师追上未能过去，现沿襄河东岸北上，进至宜城东北耿家集、新街地区，该旅虽与第六师作战，但损失很小（据敌人反映）。"},{"type":"paragraph","text":"（五）整个突围战役是胜利的，敌人毫无所得。你们这一行动已调动程潜、刘峙、胡宗南三部力量，给反动派以极大震动与困难，故你们的行动关系全局甚大。"},{"type":"paragraph","text":"（六）西安息，一战区政治部主任顾希平、警备司令赵才标在宴会上说：李先念之企图系占据陕南，控制关中，响应陕北，进展甚速，威胁甚大，国军预计在两礼拜内进攻陕北，现已被破坏等语，足见你们对大局帮助之大。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"午删亥"}],"comment_pivots":[{"part_idx":1,"offset":3,"index":1},{"part_idx":1,"offset":7,"index":2},{"part_idx":2,"offset":7,"index":3},{"part_idx":3,"offset":113,"index":4},{"part_idx":5,"offset":5,"index":5},{"part_idx":6,"offset":39,"index":6}],"is_range_date":false,"authors":["毛泽东"],"comments":["郑李戴，指郑位三、李先念、戴季英，当时分别任中原军区政治委员、司令员和第一纵队政治委员。","王震，当时任中原军区副司令员兼参谋长。","指郑位三、李先念一九四六年七月十五日给中共中央军委及各路突围部队的电报。电报说：我北路军除损失三百人外，已全部渡过丹江，进到淅川以西；右纵王震部已进到荆紫关河南岸宿营，决定再休息两天后西进。","通南巴，指四川通江、南江和巴中。","王刘，指王树声、刘子久，当时分别任中原军区第一纵队司令员和副政治委员。","程潜（一八八二——一九六八），湖南醴陵人，当时任国民党政府军事委员会武汉行营主任。刘峙，当时任国民党军郑州绥靖公署主任。胡宗南，当时任国民党军第一战区司令长官。"],"page_start":175,"page_end":176,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f885587248"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
