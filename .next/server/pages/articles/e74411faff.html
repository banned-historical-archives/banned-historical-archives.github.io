<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中央复辽宁省委关于农村中对反党反社会主义突出分子可否划为反社会主义分子的请示","authors":[],"dates":[{"year":1957,"month":9,"day":18}],"is_range_date":false,"parts":[{"text":"中央复辽宁省委关于农村中对反党反社会主义突出分子可否划为反社会主义分子的请示","type":"title"},{"text":"九月十二日电悉。","type":"paragraph"},{"text":"(一) 在工人中，出身、成份好、历史清白，但有突出的，反党反社会主义的言行的人。对这种人只作批判，指出其言行是反社会主义的，但不要戴反社会主义分子的帽子，这种人只能是个别的，他们为什么会产生突出的反党反社会主义言行，一定有其主客观原因。应该细心地找出这些原因，才便于进行政治思想工作，教育广大工人群众，改造这种人。","type":"paragraph"},{"text":"(二)在工人中，划分进步、中间、落后等界限，是为为领导心中有数，便于内部掌握，不作公开划分，你们的了解是正确的。","type":"paragraph"},{"text":"(三) 对于农村中反党反社会主义突出的分子，仍按照他们本人的情形加以确定为好，如是地富反攻，则按地富反攻处理，是反革命，则按反革命分子处理，是流氓，按流 氓分子处理，等等。这种人是反社会主义的，应在群众中指出其反社会主义性质，但是不要在农村中去专划一项“反社会主义分子”，因为这样，很容易形成乱戴帽子，特别是对一部分富裕中农容易搞得过分。","type":"paragraph"},{"text":"(注：辽宁省委关于在农村中对反党反社会主义突出的人可否划反社会主义分子的请示从略)","type":"paragraph"}],"comments":[],"origin":"中共中央组织部等编《中国共产党组织史资料》第九卷，北京：中共党史出版社，2000年。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]},{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中央复辽宁省委关于农村中对反党反社会主义突出分子可否划为反社会主义分子的请示","authors":[],"dates":[{"year":1957,"month":9,"day":18}],"is_range_date":false,"parts":[{"text":"中央复辽宁省委关于农村中对反党反社会主义突出分子可否划为反社会主义分子的请示","type":"title"},{"text":"辽宁省委并告各省、市委：","type":"appellation"},{"text":"九月十二日电悉。","type":"paragraph"},{"text":"（一）在工人中，出身、成份好，历史清白，但有突出的，反党反社会主义的言行的人。对这种人只作批判，指出其言行是反社会主义的，但不要戴反社会主义分子的帽子。这种人只能是个别的，他们为什么会产生突出的反党反社会主义言行，一定有其主客观原因。应该细心地找出这些原因，才便于进行政治思想工作，教育广大工人群众，改造这种人。","type":"paragraph"},{"text":"（二）在工人中，划分进步、中间、落后等界限，是为了领导心中有数，便于内部掌握，不作公开划分，你们的了解是正确的。","type":"paragraph"},{"text":"（三）对于农村中反党反社会主义突出的分子，仍按照他们本人的情形加以确定为好，如是地富反攻，则按地富反攻处理，是反革命，则按反革命分子处理，是流氓，按流氓分子处理，等等。这种人是反社会主义的，应群众中指出其反社会主义性质，但是不要在农村中去专划一项“反社会主义分子”，因为这样，很容易形成乱戴帽子，特别是对一部分富裕中农容易搞得过分。","type":"paragraph"},{"text":" 中    央一九五七年九月十八日","type":"paragraph"},{"text":"附：","type":"appellation"},{"text":"辽宁省委关于在农村中对反党反社会主义突出的人可否划反社会主义分子的请示","type":"subtitle"},{"text":"中央：","type":"appellation"},{"text":"我们研究了中央关于在工人、农民中不划右派分子的通知，对“在工人中则只定先进、中间、落后的界限，不作中间中右的划分。是阶级异己分子、反革命分子、流氓分子、坏分子的，可按个人具体情况加以确定，但一律不用右派分子的名称”一节，有以下问题，请中央批示：","type":"paragraph"},{"text":"（一）在试点中发现有的工人出身、成分好，历史清白，有突出的反党反社会主义的言行，经过批判后，我们意见给戴上反社会主义分子帽子，是否妥当？有的同志认为，反社会主义分子中包括阶级异己分子、反革命、流氓分子、坏分子等，概念不明确，是否可把这种工人划分阶级异己分子？还是只批判，不戴任何帽子？","type":"paragraph"},{"text":"（二）我们理解“在工人中则只定先进、中间、落后的界限”，是为了领导心中有数，由内部掌握而不公开划分。这样理解，是否妥当？","type":"paragraph"},{"text":"（三）我们在县书会议上曾规定：农村一律不划右派分子，但对反党反社会主义突出的人，可划为“反社会主义分子”。这样作法是否妥当？","type":"paragraph"},{"text":"以上问题，希速批复。","type":"paragraph"},{"text":" 中共辽宁省委员会1957年9月12日","type":"paragraph"}],"comments":[],"origin":"根据中央文件翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e74411faff"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
