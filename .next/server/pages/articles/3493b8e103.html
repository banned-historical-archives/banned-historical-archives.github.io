" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoistlegacy.de-1537","name":"为什么说进行彻底否定‘文化大革命’的教育要着眼于总结经验教训？","author":"新华日报","internal":false,"official":false,"type":"unknown","files":[],"article":{"title":"为什么说进行彻底否定‘文化大革命’的教育要着眼于总结经验教训？","dates":[{"year":1985,"month":2,"day":28}],"is_range_date":false,"authors":["新华日报"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"北京日报社宣传手册编辑部, \"彻底否定'文化大革命,'\" 宣传手册, 第2期, 1985: 27","tags":[{"name":"四个现代化","type":"主题/事件"},{"name":"文革","type":"主题/事件"},{"name":"整党","type":"主题/事件"}],"parts":[{"type":"title","text":"为什么说进行彻底否定“文化大革命”的教育要着眼于总结经验教训？"},{"type":"paragraph","text":"这是有历史和现实针对性的。在整党中进行彻底否定“文化大革命”的教育，有人就说“又要我检查了”，“又要搞人人过关了”。显然，这都是误解。"},{"type":"paragraph","text":"首先，没有必要把自己与“文化大革命”的错误捆在一起。对大多数同志来讲，在“文化大革命”中受到不同程度的损害，往往自己也有不同程度的错误。因为大家是在缺乏思想准备的情况下卷入运动的，即使少数犯有严重错误的同志，也没有必要把自己与“文化大革命”的错误捆在一起。有的同志在“文化大革命”初期犯了错误，一提到“文化大革命”就背上包袱，这有什么必要呢？通过学习，认清“文化大革命”的性质，总结经验教训，自己给自己松绑就行了。在这个问题上，应向我们伟大的党学习。我们党在“文化大革命”中犯了严重的“左”倾错误，也没有与错误捆在一起，而是向全世界作了公开的自我批评，然后又大踏步前进了。实际上《决议》讲得很清楚，“文化大革命”的责任组织上已经承担了，我们的同志认真总结一下经验教训，不就完了吗？"},{"type":"paragraph","text":"其二，作为一个党员干部，看待是非的标准应该是客观的社会效果，而不能凭主观愿望。有的同志认为自己在“文化大革命”中是“好人好心做错事”，不愿作自我批评，不愿意总结教训，不愿意否定自己的错误，这是不对的。且不论你究竟是否真是“好人好心做错事”，就是真的好人好心做了错事，损害了党和人民的利益，也是需要作自我批评的。如果坏人做坏事，那还要什么批评？依法处理就行了。这个批评和自我批评只适用于好人做了错事。要知道，“好人好心做错事”，也会闯大祸。认为“好人好心做错事”不要紧，这是很大的糊涂观念。所以，判断事物的是非和判断自己行为的是非标准,应该是社会实践的客观效果，这是唯物主义的态度。用“好心”这样抽象的动机去衡量是非，是不科学的。也不可能严格要求自己，接受教训，这样下去，知错不改，到头来后悔莫及。"},{"type":"paragraph","text":"因此，根据中央整党工作指导委员会第九号通知精神，深入进行彻底否定“文化大革命”的教育，就是为了使大家提高觉悟，统一认识，分清是非，总结经验，团结一致向前看，一心一意干四化。我们应该认识这一根本目的，切切实实把这一学习组织好，推动整党工作向前发展。"},{"type":"paragraph","text":"(原载《新华日报》)"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3493b8e103"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
