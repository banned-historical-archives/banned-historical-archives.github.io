script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"小球藻——可作精饲料  浙江用人粪尿代化肥培养成功","authors":[],"dates":[{"year":1959,"month":12,"day":2}],"is_range_date":false,"parts":[{"text":"小球藻——可作精饲料  浙江用人粪尿代化肥培养成功","type":"title"},{"text":"新华社讯　浙江省温州专区农业科学研究所用人粪尿代替化学肥料培养小球藻成功，为解决家畜精饲料开辟了一条途径。目前该所牲畜场的三百多头猪已普遍用小球藻和青饲料喂养。","type":"paragraph"},{"text":"小球藻是一种营养极为丰富的低等植物，有河水的地方都可以养殖，繁殖快，产量高。温州专区农科所曾做过试验，用一斤浓缩小球藻喂猪，每日体重可增加点九五斤；用来喂牛、鸡、兔等，体重也都有显著增加，效果相当于二斤豆饼。","type":"paragraph"},{"text":"根据化验，小球藻还含有多种有机酸和丰富的铁、铜、钴、锰、钼等成分，可以治疗家畜肠炎和风湿症。过去养殖小球藻多施用化学肥料，温州专区农科所经过多次试验用稀释的人粪尿代替，成本大大降低。","type":"paragraph"}],"comments":[],"origin":"《人民日报》1959年12月2 日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1e2580c448"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
