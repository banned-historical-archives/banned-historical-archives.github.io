script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"小资产阶级的派性要不得","authors":["一兵"],"dates":[{"year":1967,"month":10,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"干部“既打不倒，又没有站起来”，原因很多，各个单位的具体情况又不同。从有些单位的情况来看，小资产阶级的派性往往阻碍了干部问题的解决，阻碍了毛主席干部政策的贯彻。"},{"type":"paragraph","text":"在我接触的单位中，凡是干部问题和“三结合”解决得比较好的，都是大联合搞得比较好、小资产阶级派性批得臭的单位。反之，干部问题和“三结合”解决得差的单位，都是没有很好地搞大联合，或“联而不合”，小资产阶级派性还在作怪。"},{"type":"paragraph","text":"许多干部，其实可以彻底解放，有的还可以“结合”。但是，由于小资产阶级派性作怪，你这派要保这几个，我那派要保那几个，把革命干部当做自己小集团的私有财产，拿出来做赌注。同意自己这派观点的就可以解放、结合，不同意的则不能解放，甚至还要打倒。不以毛主席的干部政策和毛泽东思想为准则，而以自己小集团的利益为准则。这是十分错误的!有很多单位，两派要保的干部都是可以解放的、可以结合的，但由于小资产阶级派性作怪，双方都拼命不同意对方要解放、结合的干部。搞到最后，一个都结合不了，使大批干部“靠边站”，严重阻碍了“三结合”和斗、批、改的进行。"},{"type":"paragraph","text":"小资产阶级的派性的根子就是我们头脑中的“私”字。毛主席提出了“斗私，批修”的伟大号召。我们一定要以“斗私，批修”为纲，狠斗小资产阶级的派性和一切非无产阶级思想，从思想上真正实现革命的大联合。只有这样，毛主席的干部政策和革命的“三结合”才能得到真正的贯彻，无产阶级文化大革命才能胜利地进行到底。"},{"type":"paragraph","text":"杭州　一兵"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"派性","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c7e3a6ac72"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
