script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"日本社会党和平同志会主张建设战斗性的党  抨击江田三郎推行右倾路线  铃木—佐佐木派机关报著文批判江田的右倾政策","authors":[],"dates":[{"year":1962,"month":11,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"日本社会党和平同志会主张建设战斗性的党"},{"type":"paragraph","text":"抨击江田三郎推行右倾路线"},{"type":"paragraph","text":"铃木—佐佐木派机关报著文批判江田的右倾政策"},{"type":"paragraph","text":"据新华社27日讯　东京消息：日本社会党的和平同志会24日发表一项文件，抨击以江田三郎为首的社会党右翼领导人推行右倾路线。"},{"type":"paragraph","text":"这个题为《争取把我们的党建设成为富有战斗性的党》的文件指出，社会党不论在理论上还是在实践上都已经出现了危险的倾向。"},{"type":"paragraph","text":"文件说，现在有三个因素正在威胁着社会党。这三个因素是：一、江田三郎所提出的不符合阶级立场的社会民主思想；二、低估了争取民族独立斗争和重要意义；三、脱离群众路线和不恰当地过分强调议会斗争。"},{"type":"paragraph","text":"文件继续说，在反对煤矿工业“合理化”的斗争中，江田三郎同他的追随者相信政府的政策，避而不组织工人阶级进行坚决的群众斗争。文件在提到反对“日韩会谈”的运动时指责江田三郎同他的追随者忽视组织人民群众的统一政治斗争。"},{"type":"paragraph","text":"文件还谴责江田三郎诽谤中国。文件说，江田三郎的这种做法是违反前委员长浅沼稻次郎的意愿的。"},{"type":"paragraph","text":"同时，社会党铃木—佐佐木派的机关报《为了新社会主义》在11月号的一期刊载了题为《让我们坚持我们的纲领，制止我们党的右倾》的文章，抨击江田三郎发表的关于“社会主义的新理想”的讲话。"},{"type":"paragraph","text":"据报道，江田今年7月曾经在日光市发表谈话说：“美国的高度生活水平、苏联的彻底的社会保险、英国的议会民主、日本的和平宪法，这四者综合起来就会产生与大众结合的新的社会主义”。江田这个谈话曾经在社会党内引起很多人的反对。"},{"type":"paragraph","text":"文章说，不能容许把社会党的“积极中立政策”歪曲为不对美帝国主义进行斗争的路线。"},{"type":"paragraph","text":"另外，社会党前委员长铃木茂三郎和佐佐木更三也曾在社会党机关报上发表文章，批判江田三郎的右倾政策。社会党的恢复日中邦交特别委员会和社会党福冈地方组织还发表声明，批评江田三郎的方针。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5a5ac1baf2"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
