script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"邓小平副总理参观休斯工具公司","authors":[],"dates":[{"year":1979,"month":2,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"邓小平副总理参观休斯工具公司"},{"type":"paragraph","text":"新华社休斯敦二月三日电  邓小平副总理一行今天上午参观了休斯敦近郊的休斯工具公司，受到了公司负责人和工人们的友好接待。"},{"type":"paragraph","text":"休斯工具公司以生产钻头为主并兼营其它石油、天然气勘探设备，它的产品的质量和销售范围在世界同类企业中都处于领先地位。公司董事长霍利戴在向中国客人作简单介绍时指出，这家公司在过去五年中一直同中国有贸易往来。他说，在今天欢迎邓副总理的负责人中就有好几个人访问过中国。他表示希望，今后他的公司将会对中国发展石油事业提供越来越多的帮助。"},{"type":"paragraph","text":"在公司领导人的陪同下，邓副总理一行参观了公司下属工厂的实验室和几个主要车间。"},{"type":"paragraph","text":"邓副总理一行将于今天下午乘飞机去西雅图，继续他在美国的访问。"},{"type":"paragraph","text":"方毅副总理等今天下午到洛杉矶访问后将去西雅图同邓副总理一行会合。"},{"type":"paragraph","text":"（附图片）"},{"type":"paragraph","text":"邓小平副总理及其一行，二月三日上午（当地时间）在休斯敦参观休斯工具公司的钻头。"},{"type":"paragraph","text":"新华社记者  钱嗣杰 摄（传真照片）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"be805d9d69"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
