script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"刚果（利）青年组织领导人来信赞扬毛泽东思想的威力  毛主席思想是人民解放的最有力武器  刚果（利）爱国武装坚持斗争不断袭击伪军和粉碎敌人进攻","authors":[],"dates":[{"year":1965,"month":9,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"刚果（利）青年组织领导人来信赞扬毛泽东思想的威力"},{"type":"paragraph","text":"毛主席思想是人民解放的最有力武器"},{"type":"paragraph","text":"刚果（利）爱国武装坚持斗争不断袭击伪军和粉碎敌人进攻"},{"type":"paragraph","text":"新华社布拉柴维尔七日电  刚果（利）卢蒙巴主义全国青年组织第一总书记伦布埃勒—布塔从刚果（利）寄来的一封信中说：刚果（利）革命者越来越懂得毛泽东思想的威力，“把毛主席的思想看作是我国人民解放的最有力的武器”。"},{"type":"paragraph","text":"这封信是在中国人民抗日战争胜利二十周年纪念日写的。"},{"type":"paragraph","text":"他说：“毛泽东主席著的《抗日游击战争的战略问题》包含着一切无产阶级暴力革命必胜的真理和决定因素。毛主席的著作已经成为刚果游击队员的必读读物，他们把它视为珍宝。在游击队中，爱国者在休息的时候，集会在一起学习和讨论这位卓越的马克思列宁主义者的著作。”"},{"type":"paragraph","text":"伦布埃勒—布塔追述他个人阅读毛主席著作的经过和感受时说：“一九六四年十二月，我有机会阅读了毛主席的著作：《抗日游击战争的战略问题》。当时我还缺乏经验，很难衡量这一著作的真正价值。直到在我们组织中出现了关于应该采取的斗争方法的意见分歧时，我又看了一遍这篇著作，我的思想明朗化了。”"},{"type":"paragraph","text":"他又说：“不仅我一个人，还有好几名我们的游击战士也常常提出这样的问题：毛泽东同志在确定这种解放战争的方式之前是否曾在我国住过，因为毛泽东同志制订的方法、策略和原则符合于我们反对美帝国主义的斗争性质。”"},{"type":"paragraph","text":"伦布埃勒—布塔接着用他们自己斗争的体会来说明毛主席关于帝国主义和一切反动派都是纸老虎的论断的正确性。他说：“在刚果斗争刚开始的时候，用现代化战争装备武装起来的蒙博托傀儡军队似乎很强大，但是在爱国者真正起来和它斗争的时候，我们看到这支傀儡军队越来越没有力量。中国、古巴、阿尔及利亚等国家人民革命的胜利证明了这一点，刚果（利）的革命也一定会证实这一点。”"},{"type":"paragraph","text":"新华社十日讯  利奥波德维尔消息：活跃在刚果（利）东部的爱国武装，在过去几天中不断袭击基伍省的冲伯伪军据点姆温加。"},{"type":"paragraph","text":"姆温加位于基伍省省会布卡武西南一百八十公里，是一个公路交叉点。"},{"type":"paragraph","text":"在爱国武装的攻击下，冲伯当局急忙从布卡武赶调增援部队去姆温加，以便营救在那里挨打的伪军。"},{"type":"paragraph","text":"消息说，爱国武装还袭击了布卡武以南的鲁齐齐河谷和以西的沙邦达的伪军据点。"},{"type":"paragraph","text":"此外，在北加丹加省的阿伯特维尔地区，爱国武装也很活跃，经常伏击冲伯伪军，并且使敌军遭到许多损失。消息说，一批在伏击中被打伤的伪军最近从阿伯特维尔运往伊利沙伯维尔。"},{"type":"paragraph","text":"在刚果（利）西部的克韦卢地区，武装爱国者继续坚持斗争，并且不断粉碎冲伯伪军的进攻。连亲冲伯傀儡政权的《非洲信使报》最近也承认：在克韦卢地区，“叛乱活动是一种难于消除的慢性病。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d68444001c"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
