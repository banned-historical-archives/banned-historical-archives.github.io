script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"特别法庭第一审判庭调查证实  姚文元控制利用舆论工具诬陷老干部","authors":[],"dates":[{"year":1980,"month":12,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"特别法庭第一审判庭调查证实"},{"type":"paragraph","text":"姚文元控制利用舆论工具诬陷老干部"},{"type":"paragraph","text":"新华社北京12月8日电　特别法庭第一审判庭今天上午开庭，对姚文元被指控控制宣传舆论工具、利用报刊诬陷老干部的犯罪事实，进行法庭调查。姚文元承认，1976年在中央报刊上发表的诬陷文章，有许多是经他布置并修改审定的。他说：那些文章的矛头是指向了一部分重新工作了一个时期的老干部。"},{"type":"paragraph","text":"在“四人帮”加快篡党夺权步伐的1976年初，姚文元利用他控制的中央报刊，接连组织和发表大量文章，把党政军领导机关中的大批老干部诬陷为“资产阶级民主派”、“老走资派”、“复辟狂”、“翻案派”、“还乡团”，煽动继续加以迫害，使重新工作的老干部又处在再次被打倒的境地。"},{"type":"paragraph","text":"在今天的调查过程中，法庭宣读了经姚文元修改、审定的文章节录。"},{"type":"paragraph","text":"1976年2月29日，《人民日报》发表署名“梁效”、“任明”的《评“三项指示为纲”》，诬陷老干部搞“翻案”、“复辟”活动，说什么“‘三项指示为纲’的杏黄旗一举，右倾翻案势力就迅速地聚集在这面修正主义旗帜下，大搞复辟活动”。同年3月3日，《人民日报》刊登的《批判党内那个不肯改悔的走资派》的文章，诬陷老干部是“复辟狂”。同年《红旗》杂志第三期发表笔名“池恒”的文章《从资产阶级民主派到走资派》，别有用心地提出了一个“从资产阶级民主派到走资派”的口号。"},{"type":"paragraph","text":"原《红旗》杂志编辑部负责人林兆木出庭作证。他讲了《从资产阶级民主派到走资派》的撰写过程。林兆木说：这篇文章从内容到题目都是姚文元授意选定的。在文章的撰写过程中，姚文元总共作了两次口头指示，五次审看文章，三次具体修改。姚文元这样精心组织撰写和修改这篇文章的目的，是要把一大批老干部诬陷为资产阶级民主派、走资派，煽动打倒他们，为“四人帮”篡党夺权服务。"},{"type":"paragraph","text":"姚文元承认，这篇文章是“我要他们写的”，“大家可以批判”。"},{"type":"paragraph","text":"接着，法庭就姚文元修改、审定的《红旗》杂志1976年第四期《修正主义的组织路线必须批判》一文，进行调查。姚文元在修改这篇文章时，把老干部诬陷为“老走资派”。姚文元承认这篇文章是他修改的，但又辩解说：我在修改的时候“压低了调子”。公诉人钟澍钦当庭批驳了姚文元的辩解。他指出：姚文元辩解说他把这篇文章的调子“改轻”了，而事实并非如此，诬陷老干部是“老走资派”就是姚文元亲手加上去的。文章最后发表了所有诬陷不实之词都应当由被告人负责。当法庭出示了姚文元亲笔加上去的字样之后，姚文元只好说：“起诉人说的这一点是对的，不管改轻改重，最后你发表了，你总要负责。这个我不推卸。”"},{"type":"paragraph","text":"在今天的庭审中，法庭还对姚文元被指控诬陷、迫害原上海市党政领导人陈丕显、曹荻秋和1967年5月在济南支持王效禹制造武斗、镇压群众的犯罪事实，进行了调查。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"姚文元","type":"人物"},{"name":"四人帮","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"武斗","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5daf17be21"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
