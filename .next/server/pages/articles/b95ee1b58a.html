<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"加强官僚垄断资产阶级统治　高征购重赋税扩大剪刀差  勃列日涅夫集团日益残酷压榨农民","authors":[],"dates":[{"year":1976,"month":3,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"加强官僚垄断资产阶级统治　高征购重赋税扩大剪刀差"},{"type":"paragraph","text":"勃列日涅夫集团日益残酷压榨农民"},{"type":"paragraph","text":"新华社一九七六年三月十三日讯　新华社记者报道：勃列日涅夫集团为推行其社会帝国主义政策、加强官僚垄断资产阶级的统治，正从各方面进一步加剧对苏联广大农民的残酷压榨和剥削，使他们的处境日益恶化。"},{"type":"paragraph","text":"苏修叛徒集团利用它窃踞的地位和权力，肆意掠夺苏联广大集体农庄庄员和国营农场职工的劳动成果。近二十年来，苏修当局对农庄和农场生产的粮食一贯实行高征购政策。根据苏联官方历年公布的数字，赫鲁晓夫时期，苏联的粮食征购率一般都占当年产量的百分之三十到百分之四十。勃列日涅夫上台后，尽管指责赫鲁晓夫的高征购政策“破坏了集体农庄和国营农场的经济”，但他自己搞的所谓“固定的国家征购计划”和超计划交售，实际上比赫鲁晓夫的征购率更高，而且不断增加。在一九六五年到一九七四年这十年中，年平均征购率比前十年增加了百分之二十四。在一九七一年到一九七四年期间，勃列日涅夫集团通过这种高征购，把苏联广大劳动者每年辛辛苦苦生产的百分之四十七点一的谷物、百分之六十六的肉类和百分之五十六的奶类产品垄断到自己手中。它对非俄罗斯民族地区的掠夺则更为惊人。例如，哈萨克一九七一年至一九七五年谷物年平均产量的百分之五十八左右都被“征购”去了。"},{"type":"paragraph","text":"从一九六五年起，勃列日涅夫集团全面推行以利润为核心的“新经济体制”。官僚垄断资产阶级为了攫取高额利润，不断提高工业品的价格，从而扩大了工、农业产品价格之间的剪刀差，进一步加剧了对农业劳动者的剥削。根据苏联杂志公布的材料，近几年来，一些直接用于农业生产的工业品，如机器、燃料、化肥等普遍涨价。例如，一九六五年至一九七三年期间，一些地区的汽油和柴油分别涨价百分之三十和百分之一百二十四，化肥涨价百分之二十五，饲料涨价百分之六十，拖拉机拖车涨价百分之八十，拖拉机零配件涨价更惊人，高达百分之五百五十。仅俄罗斯联邦的农庄每年就因工业品涨价而多支出八亿卢布的生产费用。农机修理保养费用也大大提高。苏联杂志承认，在拖拉机的整个使用期间，其修理费“大大超过一台新拖拉机的价钱”。这样，苏联农业生产成本当然就日益增高了。据苏联《农业经济》杂志一九七五年第四期透露，从一九六五年到一九七三年，全苏农庄、农场生产费用的增长率超过了产值增长率的百分之四十四。"},{"type":"paragraph","text":"周转税是苏联官僚垄断资产阶级掠夺农民的又一把刀子。赫鲁晓夫当政时每年从农业征收二百亿卢布的周转税。但到了一九七四年，这种周转税却增加到三百六十多亿卢布。十年中增加了百分之八十。"},{"type":"paragraph","text":"以上种种仅是勃列日涅夫集团掠夺苏联农民的部分手段。除此而外，还有五花八门的苛捐杂税和各种剥削方法。"},{"type":"paragraph","text":"在勃列日涅夫集团敲骨吸髓的压榨下，苏联许多农庄、农场负债累累，处境日益困难。苏联报纸透露，最近几年，大约有百分之四十的农场赔本，百分之三十三的农庄“经济薄弱”，百分之九十的农庄负债。根据《一九七四年苏联国民经济统计年鉴》公布的材料，一九七四年全苏集体农庄的债务高达一百七十一亿卢布，相当于它们一九六○年所欠债务的六点三倍。若以一九七四年全苏庄员人数平均分摊，每人负债一千零九十一个卢布，即使用他们的全年收入也不能抵偿所欠的债务。苏联广大集体农庄庄员和国营农场职工不仅长期负债，而且收入低微，生活困苦。苏联报刊承认，目前在苏联农村中，有近三千万居民难以维持最低生活水平。"},{"type":"paragraph","text":"勃列日涅夫集团对苏联农民的压榨必然激起他们的强烈不满和反抗，农村劳动力、特别是青壮年劳动力纷纷外流，就是一种表现。而农村劳动力严重不足，也是苏联农业日益衰败、粮食屡遭减产的重要原因之一。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b95ee1b58a"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
