script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji13","name":"毛泽东全集第13卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji13.pdf"],"article":{"title":"在陕甘宁边区学联第一次代表大会上的讲话","alias":"","parts":[{"type":"paragraph","text":"在陕甘宁边区学联第一次代表大会上的讲话"},{"type":"paragraph","text":"（1939年8月13日）"},{"type":"paragraph","text":"我们很高兴，因为同志们非常热烈地在这里开会，同志们开会的目的没有问你们，但是我们已经知道了，在我们中国开会有两种：一种就是防止中国独立自由的会，是汉奸他们开的，顽固分子开的；另一种是要求中国独立自由的会，共产党的会也好，抗日分子开的也好，都是要求中国的自由独立...没有民主要打倒日本帝国主义得到最后胜利是不能够的。亡国好还是不亡国好，我们说不要亡国好，但是要民主，没有民主一定要亡国。民主是什么东西呢？民主就是走路的自由权，有了这一条就够了，有了这一条我们可以随便走到什么地方，可以去反对法西斯，反对汉奸托派，所以这两个字一定要。"},{"type":"paragraph","text":"孙中山有一个主义，叫民权主义，现在有些人不记得了，他偏偏说是孙中山忠实的信徒，信徒还不够，还是忠实的信徒。"}],"authors":["毛泽东"],"dates":[{"year":1939,"month":8,"day":13}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":505,"page_end":505},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a65ed67c30"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
