script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反对垄断资本的压迫和剥削  美国和意大利劳动群众不断掀起罢工斗争","authors":[],"dates":[{"year":1976,"month":8,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反对垄断资本的压迫和剥削"},{"type":"paragraph","text":"美国和意大利劳动群众不断掀起罢工斗争"},{"type":"paragraph","text":"新华社一九七六年七月三十日讯　华盛顿消息：美国今年第二季度工人的罢工斗争是一九七四年第三季度以来最多的一个季度。"},{"type":"paragraph","text":"据美国劳工部七月二十九日公布的数字，在第二季度约有一百四十万工人参加了罢工斗争，使垄断资产阶级损失了一千三百三十万个工作日。"},{"type":"paragraph","text":"六月份，罢工时间占整个工作日的千分之三点一，创造了一九七四年八月以来的最高纪录。"},{"type":"paragraph","text":"在六月份的罢工斗争中，约三分之一的罢工工人参加了每次超过五千人的罢工斗争，其中最大的是七万名橡胶工人持续了三个多月的罢工斗争。"},{"type":"paragraph","text":"新华社一九七六年七月二十八日讯　华盛顿消息：美国西弗吉尼亚州煤矿工人要求改善安全条件的罢工斗争进一步扩大。"},{"type":"paragraph","text":"西弗吉尼亚州塞达煤矿公司的工人，为了抗议资方拒绝工人提出的改善劳动条件、加强安全措施的要求，早在一个多月前就掀起了罢工斗争。资方勾结联邦法院对煤矿工人的组织课以巨额罚款，妄图以此迫使工人复工。这一镇压工人的行径激起了广大煤矿工人的更大反抗。到七月二十七日，罢工不仅扩大到西弗吉尼亚州全部煤矿，约六万名矿工停止工作，而且俄亥俄、肯塔基、马里兰、弗吉尼亚等州的一些煤矿工人也举行了罢工。"},{"type":"paragraph","text":"西弗吉尼亚州是美国仅次于肯塔基州的第二大产煤区。罢工使该州全部煤矿陷于瘫痪。煤矿工人的罢工沉重地打击了煤业垄断资本。"},{"type":"paragraph","text":"新华社罗马一九七六年七月三十日电　意大利全国各地群众连日来纷纷举行罢工和示威游行，要求增加工资、重新签订劳资合同和保障就业。"},{"type":"paragraph","text":"七月二十八日和二十九日，意大利全国一百五十多万名农业工人举行了四十八小时罢工，要求增加工资和重订合同。罢工工人还在许多地方举行了示威游行和集会。"},{"type":"paragraph","text":"七月二十八日，意大利全国新闻记者和报纸印刷工人举行了二十四小时罢工。他们的罢工使意大利各种报纸二十九日停刊一天。"},{"type":"paragraph","text":"七月二十七日至三十日，意大利全国公共住房建筑工人轮番举行地区范围的罢工，要求保障就业。"},{"type":"paragraph","text":"新华社罗马电　意大利工业、农业和商业部门广大劳动群众七月二十日举行了大规模的罢工、示威游行和集会，支持农业工人要求重新签订工资合同和增加工资的斗争。"},{"type":"paragraph","text":"这一天，农业工人坚持了二十四小时的罢工，商业部门劳动者罢工八小时，五金机械、化工、纺织、建筑和食品等部门的工人也举行了两小时的罢工。同一天，罢工群众还在巴勒莫、波伦亚、米兰、佛罗伦萨、曼图亚等许多地方举行了大规模的示威游行和集会。（附图片）"},{"type":"paragraph","text":"意大利罗马工人示威游行，反对通货膨胀。　　新华社记者摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"91cea89838"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
