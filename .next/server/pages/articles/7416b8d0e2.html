script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"华东师范大学一伙反革命小丑跳出来，为一小撮走资派翻案。这件事从反面教育了我们。　把这件事与当前陈丕显之流的翻案叫嚣联系起来，就使我们更清楚地看到了:右倾翻案是当前的主要危险","authors":[],"dates":[{"year":1968,"month":4,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编者按:那些认为走资派已是“死老虎”的人，请看看华东师范大学揭露的这个典型的右倾翻案事件。那一小撮走资派，我们虽然罢了他们的官，撤了他们的职，但他们没有死心，他们时时刻刻在准备翻案、复辟。值得深思的是，象常××这种投靠彭真的大叛徒，为什么居然还有人为他翻案呢?这就说明，要彻底打倒这一小撮凶恶的敌人，还要化很大的力气。因此，我们要牢记毛主席的教导:“千万不要忘记阶级斗争”!我们要高举革命大批判的旗帜，把他们彻底批倒批臭，使他们永世不得翻身。谁想为他们翻案，那就和他们一起上“西天”!"},{"type":"paragraph","text":"编辑同志:"},{"type":"paragraph","text":"无产阶级文化大革命接近全面胜利，反革命力量就必然要同革命力量作拼死的斗争。右倾翻案，是当前最主要的危险。最近，我校就连续出现了几股右倾翻案的妖风。"},{"type":"paragraph","text":"早在去年八月，我校革委会成立后，以顽固不化的走资派王××为首的一小撮牛鬼蛇神就打起“受压制的群众要造反”，“受压抑的干部要掌权”的反革命黑旗，到处煽风点火，招降纳叛，安营扎寨，拼凑了一个地下黑司令部，阴谋建立“第二个政权”。这个地下黑司令部的黑司令公开叫嚣:“你们现在为我翻案，我将来上台好为你们平反。”"},{"type":"paragraph","text":"用毛泽东思想武装起来的新师大红卫兵小将，一眼就看穿了阶级敌人的狼子野心。在校革委会的领导下，全校革命师生利用大字报、广播台、斗争会等形式，向这股右倾翻案妖风进行了猛烈的进攻和坚决的斗争。革命群众乘胜追击，终于挖出了这个地下黑司令部，揪出了以王××为首的一小撮反革命分子。"},{"type":"paragraph","text":"一波未平，一波又起。在这股翻案妖风被我校无产阶级革命派击退以后，又有一个极为反动的反革命小丑跳了出来，他再也按捺不住反革命的心情，在“不能全盘否定十七年”的幌子下，竟然把出卖北大社教运动的大叛徒、臭名昭著的反革命修正主义分子、我校头号走资派常××吹捧成“基本上是忠于毛主席的好同志”，甚至叫嚣:“向党的好儿女常××学习，致敬”。这个反革命小丑还扬言应把这个反革命修正主义分子“结合进新生的革命委员会中去”。这时，我校的一小撮牛鬼蛇神也又一次活跃起来，探头探脑，跃跃欲试，以为他们的主子真的要翻身上台，整个校园又将是他们的天下了。"},{"type":"paragraph","text":"无限忠于毛主席的新师大无产阶级革命派，根据毛主席关于“千万不要忘记阶级斗争”的伟大教导，心明眼亮，精神抖擞，又一次地向这一小撮阶级敌人发起了全面的进攻，在反击右倾翻案妖风中取得了又一次伟大胜利。"},{"type":"paragraph","text":"我们一定要进一步加强敌情观念，擦亮眼睛，把这股右倾翻案的妖风彻底压倒，打垮!为全面落实毛主席的最新指示，为夺取无产阶级文化大革命的全面胜利而斗争到底!"},{"type":"paragraph","text":"新师大“点火大军”“工农兵突击兵团”“炮兵纵队”"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"革命委员会","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7416b8d0e2"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
