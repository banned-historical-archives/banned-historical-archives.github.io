" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji23","name":"毛泽东全集第23卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji23.pdf"],"article":{"title":"对待自由资产阶级须防止过无倾向","alias":"","parts":[{"type":"paragraph","text":"对待自由资产阶级须防止过左倾向！"},{"type":"paragraph","text":"（1947年10月26日）"},{"type":"paragraph","text":"我们在政治上要孤立自由资产阶级（特别是其中的右翼）和在经济上保护他们，二者似乎矛盾，其实并不矛盾。在蒋介石打倒以后，因为自由资产阶级特别是其右翼的政治倾向是反对我们的，所以我们必须在政治上打击他们，使他们从群众中孤立起来，即是使群众从自由资产阶级的影响下解放出来。但这并不是把他们当作地主阶级和大资产阶级一样立即打倒他们，那时，还将有他们的代表参加政府，以便使群众从经验中认识他们特别是其右翼的反动性，而一步一步地抛弃他们。在经济上，则将在长时间内容许他们存在，并使他们的经济在政府法令许可下有一个一定程度的发展，以利经济之恢复与发展。对于在平分土地后生长出来的新富农也是如"},{"type":"paragraph","text":"[1]1947年人民解放战争进入战略进攻以后，当时任国民党政府全国经济委员会委员的刘航琛提出了一个组织和平统一大同盟的方案。为了揭露这一方案是美蒋缓兵之计的阴谋，同时纠正党内部分同志认为可以利用它促蒋下台的错误认识，周恩来为中共中央起草了《关于反对刘航琛一类反动计划的指示》。本篇一是毛泽东在修改这个中央指示稿时加写的第五条。本篇二是毛泽东审改中央指示稿后写给周恩来的信。该指示于1947年10月27日下发。此。在这个问题上的过左性急，是错误的。"},{"type":"paragraph","text":"二周副主席："},{"type":"paragraph","text":"指示电很好，很有必要。惟须增加一条，作为第五条，将对自由资产阶级的政策问题完全弄清楚，预防过左倾向发生，这一倾向，在历史上是发生过的。"},{"type":"paragraph","text":"此电当作普遍指示，发往各地。投降主义不要分对敌对阶级，这是一个问题。临时迁回可能，亦须指出\""},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十月二十六日"},{"type":"paragraph","text":"[1]毛泽东在修改中央指示稿第三条时，对必须揭露各种伪装的反蒋分子企图混入反蒋阵线，迷惑人民，继续维护国民党反动统治的阴谋问题加写了一段话：“但如果我们事先的揭露工作做得不够，南方及各大城市人民群众的多数竟被刘航琛一类计划所迷惑时，我们为争取群众起见，亦可能采取某种临时迁回方法，达到觉醒群众将革命战争进行到底之目的。”"}],"authors":["毛泽东"],"dates":[{"year":1947,"month":10,"day":26}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":378,"page_end":379},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9f51920bcd"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
