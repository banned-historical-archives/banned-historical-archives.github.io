<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"云南、西康、成都三反运动情况","authors":[],"dates":[{"year":1952,"month":1,"day":25}],"is_range_date":false,"parts":[{"text":"云南、西康、成都三反运动情况","type":"title"},{"text":"【云南分社二十五日讯】云南“三反”运动进展极为猛烈，十九日党内初步总结，揭发出贪污分子六千多人，贪污款项五十四亿多元。百分之八十的小贪污已先后坦白揭掉帽子，余下大贪污案多与奸商勾结，运动由内向外发展，现正统一思想，重整队伍，向资产阶级进行反攻。","type":"paragraph"},{"text":"二十日省市召开六万人大会，由店员工人出面揭发昆明四家大贪污行贿、走私漏税、逃避资金、套取外汇、勾结帝国主义违法案件，在资产阶级内部引起极大震动。杨克诚代表民建在大会上讲话，当场受到工人揭发检举，杨之亲兄阎燮成在家收听广播抱头痛哭。杨、阎当晚召开股东秘密会议。进出口业王少岩、毕锡之亦于次日召开秘密股东会议，他们说“我们进出口业家家都有违法走私事件，由我带头去劳动改造。”进出口业伍体贤、董仁明走私黄金、套取外汇、逃避资金被检举后，他们即焚毁账目，伍已被软禁。他们都是利用政治地位破坏国家金融，杨克诚、伍体贤向我进攻极为猖狂。","type":"paragraph"},{"text":"四大家被打击后，一般上层工商界反映：“在共产党下资本家没出路了”，“政府不要资产阶级了”、“比土改还厉害”，“新民主主义缩短了”。一般守法的中、小资本家则反映：“政府打老虎不打苍蝇”，大小商人对阎被揭发均回家报喜，有的说：“政府对这样大人物都不顾情面，我们快些坦白好了。”另一部分资本家采取怀疑、观望的态度说：“整了大的整小的，工商界没出路”。","type":"paragraph"},{"text":"这一场斗争十分紧张，店员工人情绪高涨，一部小行业店员检举完本行业后，又围绕重点四出串联，经大会鼓舞撑腰，店员中受封建虐待最深的行业，有自发提出反封建斗争要求，一部分高级职员如会计、营业主任也开始分化，不要资方所给股份，愿意坦白检举加入工会。二十二日市委已召开高级职员大会，动员职工检举违法资方，已转变运动初期店员职工内部斗争的偏向。现昆市店员已检举九千余件，正以全力突破四大家违法走私案件。","type":"paragraph"},{"text":"省委对“三反”运动极为重视，估计运动先从大资本家开始，可能会遇到大资本家的集体对抗，省委已确定了进攻、稳定分化的方针。现市委已组成数百人工作队参加店员、工商联两分会中的工作。","type":"paragraph"},{"text":"【西康记者组二十八日讯】省级机关的三反运动，群众已基本上发动起来，多数机关趋向深入，但运动发展尚不平衡，交通、盐务和民政厅、办公厅等单位重大贪污案件已经坦白和揭发；财经系统、贸易、合作等单位尚有拖泥带水现象。部分负责同志及党团员因手面不干净反省不彻底，是造成此种情况的主要原因。二十一日举行了五千多人的全体工作人员的反贪污斗争大会后，对发动群众斗争的积极性起了很大作用，党委决心以近四天时间内集中力量突破各单位的重大贪污，然后转入处理阶段。","type":"paragraph"},{"text":"运动中有些单位采取了举行联合大会的办法收效较大，此一经验正在推广，个别单位发生对贪污分子捆打或令其下跪现象，党委已指示停止。畏罪自杀者已有八起，对情节重大者已在本单位由群众严予看管。","type":"paragraph"},{"text":"对个别高级干部(厅长以上)的揭发尚不多，如商业厅厅长李士彬包庇贪污分子，党委除对李给予批评外，并未组织专门审查和进一步的处置。","type":"paragraph"},{"text":"【川西分社三十日讯】目前蓉市结合机关“三反”运动，已在五金、电料、建筑、运输、油粮、图书等六个重点行业中展开三反运动，群众已初步发动，但运动尚未形成高潮。现已揭发出一些小案件，大案件尚未揭开。资产阶级正以各种手段来进行破坏，他们不但拒不坦白，且以请吃好的、增加工薪、赠送日用物品等小恩小惠收买或拉拢店员工人或以解雇与歇业来威胁店员工人，不让检举他们的罪迹，甚至制造谣言混乱听闻。如说：“共产党干部主动要贿赂，商人才有行贿的事。”企图掩盖资产阶级向我党猖狂进攻这一本质问题。他们还到处宣扬工人偷了公家东西或偷了资本家的东西，想以此吓住工人，不敢起来进行斗争。在工人与店员方面也有顾虑，怕被解雇，怕减薪，怕报复，自己拿过工厂或资本家的东西，怕整到自己头上。","type":"paragraph"},{"text":"一月二十六日已召开全市二次店员工人代表大会，会上坚决表示：保证不准资本家解雇工人或减薪与报复。","type":"paragraph"}],"comments":[],"origin":"1952年1月31日新华通讯社编《内部参考》。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fff2c27593"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
