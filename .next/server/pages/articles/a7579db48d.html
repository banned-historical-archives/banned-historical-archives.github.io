script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji27","name":"毛泽东全集第27卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji27.pdf"],"article":{"title":"毛主席、朱总司令回答董其武等起义通电","alias":"","parts":[{"type":"paragraph","text":"毛主席、朱总司令回答董其武等"},{"type":"paragraph","text":"起义通电！"},{"type":"paragraph","text":"（1949年9月20日）"},{"type":"paragraph","text":"【新华社北平二十日电】毛主席、朱总司令本日回答绥远董其武将军等九月十九日的起义通电如下：董其武将军及在贵将军领导下的绥远军队全体官兵、政府工作人员和各界同胞们："},{"type":"paragraph","text":"看了你们九月十九日的声明，你们的立场是正确的。自从傅作义将军领导北平和平解放后，人民表示欢迎，反动派表示反对，反动派还企图破坏绥远军民和平解放的努力，但是终归失败。你们已经率部起义，脱离反动派，站在人民方面了。希望你们团结一致，力求进步，改革旧制度，实行新政策，为建设人民的新绥远而奋斗。"},{"type":"paragraph","text":"毛泽东朱德"},{"type":"paragraph","text":"一九四九年九月二十日"},{"type":"paragraph","text":"[1]1949年9月19日原国民党绥远当局董其武将军发表起义通电。这是毛泽东为新华社撰写的电讯。"}],"authors":["毛泽东"],"dates":[{"year":1949,"month":9,"day":20}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":269,"page_end":269},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a7579db48d"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
