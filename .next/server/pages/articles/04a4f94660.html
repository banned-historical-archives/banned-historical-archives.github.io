script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"不穿奇装异服　不搞铺张浪费破除资产阶级的“艺术家风度”","authors":["乐秀琴"],"dates":[{"year":1965,"month":1,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"往年，春节还没有到来，有些人已在盘算着添这买那的了。上衣什么式样最时新?皮鞋哪种式样最流行?跑东奔西，成天地为春节的衣着忙碌。她们说:新年要新打扮，戴新帽，穿新衣，着新鞋，过新年，这是风俗习惯。在剧团里，这种讲穿戴，爱打扮的风气也有。谁要是穿了件新衣服，马上有人给它评头品足；谁要是戴了一样新奇的服饰，立即就有人仿效。有人还说:我们是演员嘛，演员的衣着，应该有“艺术家的风度”。我，们那里有位穿着很朴素的女同志，有人就以为她太“寒酸”了，劝她去烫头发，买皮鞋，穿花衬衫。"},{"type":"paragraph","text":"我认为，这种热心于打扮的想法是很有害的。逢年过节，要穿得整齐清洁，缺少衣服的人添件新衣，这并没有什么不好，问题在于有了好的还要好，不需要做新衣服也去做，忘了勤俭的美德，这就不对了。至于专讲穿奇装异服，这就更成问题，这是资产阶级“享乐至上”思想的反映。有人认为:演员的衣着，要有“艺术家风度”，那种观点是十分错误的。那是什么“艺术家”?党号召我们文艺工作者深入工农兵，和工农兵建立血肉关系，我们怎能在衣着上标新立异呢?至于说，“新年新打扮”，那是旧风俗，旧习惯，今天，我们应该破除它，而不能再去提倡它。尤其对一个革命文艺工作者来说，不仅在舞台上要宣传新思想，新风气，而且在日常生活中，也要带头树立艰苦朴素的新风气。决不能在台上是一个新风尚的倡导者，而在台下却被资产阶级思想俘虏，成了旧习俗的维护者。"},{"type":"paragraph","text":"我们剧团里的演员们经过学习，认识上也有所提高了，今年和往年不同，她们不再去四处奔跑，为春节的衣着费心计了。大家都把精力集中在排演革命现代戏上，我认为这是进步的表现，应继续发扬勤俭朴素的精神，树立新的风尚。"},{"type":"paragraph","text":"春泥越剧团　乐秀琴"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"04a4f94660"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
