script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"邓副委员长访朝圆满成功回到北京  邓小平等党和国家领导人前往机场迎接","authors":[],"dates":[{"year":1979,"month":6,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"邓副委员长访朝圆满成功回到北京"},{"type":"paragraph","text":"邓小平等党和国家领导人前往机场迎接"},{"type":"paragraph","text":"新华社北京六月一日电  中共中央政治局委员、人大常委会副委员长邓颖超及其随行人员，结束了对朝鲜民主主义人民共和国的正式友好访问，今天下午乘专机回到北京。"},{"type":"paragraph","text":"党和国家领导人邓小平、乌兰夫、陈慕华、姬鹏飞，以及朝鲜民主主义人民共和国驻中国大使全明洙和夫人等，前往机场热情迎候邓颖超副委员长等。"},{"type":"paragraph","text":"宾努亲王和夫人也到机场迎接。"},{"type":"paragraph","text":"邓颖超副委员长在掌声中健步走下飞机。邓小平副主席同她热烈握手，祝贺她访问朝鲜取得圆满成功。邓颖超副委员长见到全明洙大使时，高兴地同他紧紧握手。邓颖超副委员长说：请转告朝鲜人民的伟大领袖金日成主席，我已经平安回到北京。我们在朝鲜访问期间所受到的热烈欢迎和盛情款待，给我们留下很深的印象。我向金日成主席表示衷心感谢。全明洙大使说：我祝贺您的访问取得成功。到机场迎接邓颖超副委员长的还有政协全国委员会副主席、全国妇联主席康克清，外交部部长黄华、副部长仲曦东，中联部副部长乔石，人大常委会副秘书长武新宇等。（附图片）"},{"type":"paragraph","text":"邓小平等党和国家领导人在机场迎接邓副委员长时合影。"},{"type":"paragraph","text":"新华社记者摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2fb358d6df"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
