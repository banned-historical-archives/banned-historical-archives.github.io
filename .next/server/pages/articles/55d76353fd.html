" crossorigin="">{"props":{"pageProps":{"books":[{"id":"34799034-2c67-4e1f-ae74-793ab6bd754b","name":"中共党史教学参考资料 第26册 “文化大革命”参考资料 中册（1988年）","internal":true,"official":true,"type":"pdf","author":"","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives3/main/34799034-2c67-4e1f-ae74-793ab6bd754b.pdf"],"article":{"title":"苏联边防军又一再严重侵犯我国领土进行一系列军事挑峰活动我国政府向苏联政府提出强烈抗议","alias":"","parts":[{"type":"paragraph","text":"苏联边防军又一再严重侵犯我国领土"},{"type":"paragraph","text":"进行一系列军事挑活动我国政府向苏联政府提出强烈抗议"},{"type":"paragraph","text":"（一九六九年三月十三日）"},{"type":"paragraph","text":"中华人民共和国外交部三月十三日照会苏联驻华大使馆，强烈抗议苏联边防军继三月：H桃起边境武装冲突之后，又一再严重侵犯中国的领士，进行一系列的军事挑畔活动。照会全文如下："},{"type":"paragraph","text":"苏联驻华大使馆："},{"type":"paragraph","text":"三月四日十一时五十分至十五时十九分，苏联边防军装甲车八辆、满载武装人员的卡车二辆和指挥车两辆侵人中国领土珍宝岛。同日十二时十七分至二十分，苏联直升飞机一架侵入该岛上空，并在该岛东侧我境内降落。"},{"type":"paragraph","text":"三月五日十一时四十分至十四时五十五分，苏联边防军装甲车六辆、满载武装人员的卡车两辆和指挥车一辆侵人中国领土珍宝岛。"},{"type":"paragraph","text":"三月七月九时五十五分至十时零二分，苏联边防军装甲车六辆侵人中国领土珍宝岛；其中三辆在上岛之前甚至深人到珍宝岛西侧的中国河道上。同日九时零四分、九时二十五分、十一时十七分，苏联直升飞机三架次，侵人中国领土珍宝岛上空。"},{"type":"paragraph","text":"三月十日五时二十七分至六时五十五分，苏联边防军装甲车一辆和武装人员三名侵人中国领土珍宝岛。"},{"type":"paragraph","text":"三月十一日十五时十四分至十八时四十五分，苏联边防军装甲车-辆和武装人员十四名役人中国领土珍宝岛。"},{"type":"paragraph","text":"三月十二日十四时四十分至五十七分、苏联边防军装甲车三辆侵人中国领上珍宝岛和该岛西侧的中国河道上。"},{"type":"paragraph","text":"上述事实表明，苏联边防军继三月二日挑起边境武装冲突之后，义一再严重侵犯中国的领土，进行一系列的军事挑蚌，企图挑起新的武装冲突。对此，中国政府向苏联政府提出强烈的抗议，坚决要求你们立即停止一切人侵挑声活动，并严正警告你们，中国的领土是绝不允许任何人侵犯的，如果你们一意孤行、那么，由此而产生的一切严重后果，由苏联政府承担全部资任。"},{"type":"paragraph","text":"中华人民共和国外交部"},{"type":"paragraph","text":"一九六九年三月十三日下北京（新华社1969年3月13日讯，载3月14日《人民报》）"}],"authors":[],"dates":[{"year":1969,"month":3,"day":13}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":318,"page_end":318},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"55d76353fd"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
