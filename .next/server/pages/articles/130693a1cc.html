" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji52","name":"毛泽东全集第52卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji52.pdf"],"article":{"title":"对叶剑英关于加强电子对抗工作报告的批语","alias":"","parts":[{"type":"paragraph","text":"对叶剑英关于加强电子对抗"},{"type":"paragraph","text":"工作报告\"的批语"},{"type":"paragraph","text":"（1975年12月20日）很好。"},{"type":"paragraph","text":"十二月二十日退叶剑英同志。"},{"type":"paragraph","text":"[1]中共中央副主席、中央军委副主席叶剑英1975年12月18日给毛泽东的这个报告说，遵照您6月23日对孔从洲关于加强电子对抗工作建议信的批示，我要总参牵头，请孔从洲和有关部门负责同志参加，先后研究4次，写出了专题报告。12月8日，国务院常务副总理、军委常委联席会议专门听取了有关部门的汇报，并进一步作了讨论研究，拟先采取以下措施，迅速加强这一工作。一、拟在国务院、中央军委领导下，成立电子对抗和雷达管理领导小组。二、设一机构负责全军电子对抗和雷达归口管理工作。三、加强电子技术情报工作。四、加强和调整电子对抗的科研、生产力量，迅速改善我军电子装备的抗干扰性能。五、积极培养电子对抗技术人员。"}],"authors":["毛泽东"],"dates":[{"year":1975,"month":12,"day":20}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":127,"page_end":127},"tags":[{"name":"叶剑英","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"130693a1cc"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
