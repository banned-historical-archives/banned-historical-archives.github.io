script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"越南《人民军队报》发表评论谴责美帝和柬右派的罪行赞扬柬埔寨人民反对右派集团的斗争指出柬亲美极右派在镇压群众斗争的同时，还竭力歪曲事实，妄图转移舆论视线，一步步地为美帝干涉柬埔寨铺平道路；柬人民十分警惕敌人的阴谋，正在响应国家元首西哈努克亲王的号召，把柬埔寨的正义事业进行到彻底胜利","authors":[],"dates":[{"year":1970,"month":4,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社河内一日电　越南《人民军队报》一日发表评论，指出柬埔寨人民反对朗诺-施里玛达集团的斗争，使美帝国主义及其走狗集团无比惊慌。"},{"type":"paragraph","text":"评论说，朗诺-施里玛达集团沿着同美帝国主义勾结反对人民的道路滑下去，正在激起全体高棉人民的坚决反对和无比愤慨。"},{"type":"paragraph","text":"评论说:坚强的柬埔寨人民的爱国斗争日益发展。城市和农村的僧侣、工人、农民、青年、学生、知识分子和小商贩，正在响应国家元首诺罗敦·西哈努克亲王的号召，起来进行反对朗诺-施里玛达反动集团的斗争。"},{"type":"paragraph","text":"评论说，朗诺-施里玛达集团用装甲车来镇压示威的群众，并且命令警察向示威群众开枪，使许多人死亡和受伤。它们这些明目张胆的法西斯行为，不仅镇压不了群众的斗争，反而使斗争更加高涨和扩展。"},{"type":"paragraph","text":"评论说，面对着柬埔寨形势的发展，尼克松政府和朗诺-施里玛达集团狼狈不堪，不知所措，它们正在策划反对高棉人民的爱国斗争的阴谋。柬埔寨亲美极右派在宣布戒严、紧急征募后备役人员服现役、出动军队和警察镇压群众斗争的同时，还竭力歪曲事实，继续玩弄诬蔑越南人民和在柬埔寨的越南侨民的伎俩，妄图转移舆论视线，一步步地为美帝国主义干涉柬埔寨铺平道路。"},{"type":"paragraph","text":"评论最后说，柬埔寨人民十分警惕地注视着敌人的这些阴谋，把斗争矛头指向美帝国主义和亲美极右派，在民族统一阵线中加强团结，响应国家元首诺罗敦·西哈努克亲王的救国号召，把柬埔寨的正义事业进行到彻底的胜利。"},{"type":"paragraph","text":"《人民军队报》三月二十九日发表的另一篇评论谴责美帝和柬埔寨右派集团对柬埔寨人民犯下的罪行。评论揭露，美国侵略头子正准备把遭到高棉人民谴责和唾弃的美国走狗卖国分子山玉成及其在泰国的喽罗们送回柬埔寨，为朗诺—施里玛达集团出力。"},{"type":"paragraph","text":"评论指出，美帝国主义及其走狗在罪恶的道路上滑得越远，它们就越遭到高棉人民的反抗，各阶层爱国人民的斗争已在磅湛省、接近首都金边的唝吥省以及其它许多地方爆发。"},{"type":"paragraph","text":"评论说，越南人民和人民武装力量热烈欢迎柬埔寨各阶层人民的不屈的斗争精神。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a123d22889"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
