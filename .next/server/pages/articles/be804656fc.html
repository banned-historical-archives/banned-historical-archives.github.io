script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"进一步动员人民围剿奸商和大贪污犯  天津举行反贪污反浪费反官僚主义展览会  用真凭实证揭发了资产阶级猖狂进攻的罪行","authors":[],"dates":[{"year":1952,"month":2,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"进一步动员人民围剿奸商和大贪污犯"},{"type":"paragraph","text":"天津举行反贪污反浪费反官僚主义展览会"},{"type":"paragraph","text":"用真凭实证揭发了资产阶级猖狂进攻的罪行"},{"type":"paragraph","text":"为进一步动员各界人民围剿奸商和大贪污犯，天津市节约检查委员会举办“反贪污、反浪费、反官僚主义展览会”。展览会揭幕的第一天（二日），参观者就有六千多人。这个展览会把一些典型案件用图画、照片、模型和实物展览出来，生动地揭露了资产阶级三年来向工人阶级举行猖狂进攻的罪状，说明了资产阶级腐化堕落思想对国家人民的严重危害性。"},{"type":"paragraph","text":"展览会内容分为综合、反对不法资本家的不法行为、反对贪污、反对浪费、反对官僚主义五部分。综合部分是用照片、漫画和模型说明天津市反贪污、反浪费、反官僚主义运动的进展情况和初步成绩，以及政府对待贪污分子和不法资本家的政策。展览会的重点是反对不法资本家的非法行为。这一部分着重揭发了奸商的行贿、偷税、偷工减料、盗窃国家资财、捣卖金银、扰乱金融、隐匿敌产、盗窃国家经济情报等罪行。图表指明，天津市不法商人在解放后共偷漏税款八千亿元。展览会搜集了奸商腐蚀国家工作人员所用的十九种方法。奸商们从谄媚逢迎，到引诱吸毒、嫖妓，用各种下流无耻的方法拖干部下水，然后“一本万利”地大量盗窃国家财产。反贪污部分中揭露了贪污分子给国家造成了巨大危害。连环画和实物说明，一部分留用人员，由于思想作风没有改造，成为资产阶级进攻的薄弱的一环。他们和奸商相互勾结，诈取国家资财。也有少数老干部，入城后经不起资产阶级糖衣炮弹的攻击，腐化堕落，成为国家的罪人。浪费给国家造成的损失甚至超过贪污所造成的损失。反浪费部分用实例模型指明了这一事实。反官僚主义部分展出了中国进出口公司因为领导干部的官僚主义浪费七百五十亿元的情形。另外还有图表和实物说明政府机关中文牍主义的危害性。这一部分证明官僚主义确是贪污、浪费的温床，也说明了为什么官僚主义作风为奸商和不法分子所喜好，而为人民所痛恨，所反对。"},{"type":"paragraph","text":"展览会中有有关单位的工作人员向观众讲解。被奸商腐蚀的税务局干部王世礼、腐蚀干部的奸商张锦洲并在展览会中现身说法，担任讲解工作。很多观众都表示这个展览会对自己进行了一次良好的教育，使自己从实物实例中看到了资产阶级猖狂进攻对国家和人民所造成的巨大危害，并提高了对不法资本家的警惕。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"be804656fc"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
