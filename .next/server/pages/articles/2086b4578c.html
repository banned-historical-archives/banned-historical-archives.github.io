script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反对残酷剥削　要求增加工资  波多黎各首府三千名汽车司机等罢工","authors":[],"dates":[{"year":1972,"month":6,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反对残酷剥削　要求增加工资"},{"type":"paragraph","text":"波多黎各首府三千名汽车司机等罢工"},{"type":"paragraph","text":"新华社讯　圣胡安消息：波多黎各首府圣胡安大约三千名公共汽车司机和售票员六月十二日开始罢工，要求增加工资。"},{"type":"paragraph","text":"此外，波多黎各《世界报》的五百名工人和新闻工作者坚持的罢工斗争到六月中旬已达数月之久。罢工者坚决要求增加工资和改善工作条件，并要求撤换在报社管理行政的外国人员，由波多黎各人来代替。"},{"type":"paragraph","text":"罢工者在波多黎各社会党、独立党以及工人和学生的支持下，不怕威胁利诱，继续坚持斗争。"},{"type":"paragraph","text":"今年以来，波多黎各工人和职员的罢工斗争此伏彼起。五月底，波多黎各电力工人为了争取各种权利举行了罢工。在这之前，波多黎各的美资国际电话电报公司的工人和职员坚持了三个多星期的罢工斗争，反对美国资本家的残酷剥削和掠夺。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2086b4578c"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
