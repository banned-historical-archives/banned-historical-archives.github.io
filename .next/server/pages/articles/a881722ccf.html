script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"我们想的，华主席早想到了","authors":["“毛泽东号”机车组"],"dates":[{"year":1978,"month":1,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"我们想的，华主席早想到了"},{"type":"paragraph","text":"“毛泽东号”机车组"},{"type":"paragraph","text":"在光明的中国胜利跨进一九七八年的时刻，传来了振奋人心的喜讯：英明领袖华主席、党中央和国务院批准，上海铁路局东风3型0058号内燃机车命名为“周恩来号”，华主席还亲笔为“周恩来号”机车题了字。这是对广大铁路职工的亲切关怀和巨大鼓舞。我们“毛泽东号”机车组全体工人感到无比的喜悦和自豪。"},{"type":"paragraph","text":"三十一年前，“毛泽东号”机车和“朱德号”机车相继在哈尔滨命名。在炮火纷飞的战争年代，我们两个机车组团结战斗，你追我赶，为落实毛主席提出的“打倒蒋介石，解放全中国”的伟大号召做出了贡献。三十一年来，我们机车组的每一个成就，都凝聚着伟大领袖毛主席和敬爱的周总理的心血。"},{"type":"paragraph","text":"敬爱的周总理和朱委员长是伟大领袖毛主席的亲密战友，铁路战线原来有了“毛泽东号”和“朱德号”机车，我们多么渴望以周总理的光辉名字命名的机车诞生呵！英明领袖华主席和我们铁路工人心连心。我们想的，华主席早想到了。"},{"type":"paragraph","text":"“周恩来号”机车的命名，是激励和鼓舞广大铁路职工永远前进的巨大动力，我们组里的同志们激动地说，当年，“毛泽东号”、“朱德号”机车的命名，是毛主席为首的党中央激励我们英勇奋斗，做埋葬蒋家王朝的火车头；今天，“周恩来号”机车的命名，是华主席为首的党中央激励我们实现毛主席和周总理的遗愿，当好实现四个现代化的尖兵。在揭批“四人帮”政治大革命的推动下，一九七七年，我们由原来行驶蒸汽机车改驶内燃机车，由原来的只跑平路发展到也跑山路，扩大了行驶范围，进一步挖掘了机车潜力，提高了运输效率，在原来安全走行的基础上，又用内燃机车安全走行十一万多公里，节约燃油二十四吨。在新的一年里，我们机车组全体同志决心虚心学习“周恩来号”、“朱德号”机车组的好经验，把“毛泽东号”机车组的运输生产提高到一个新水平，为高速度发展国民经济做出更大的贡献。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"朱德","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a881722ccf"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
