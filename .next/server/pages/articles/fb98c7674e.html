script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"英资产阶级报刊和政客鼓噪不已  竭力企图阻挠中印谈判","authors":[],"dates":[{"year":1959,"month":11,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"英资产阶级报刊和政客鼓噪不已"},{"type":"paragraph","text":"竭力企图阻挠中印谈判"},{"type":"paragraph","text":"新华社22日讯　伦敦消息：英国资产阶级报刊和政界人物继续诬蔑和诋毁周恩来总理关于解决中印边界问题的建议，并竭力想阻挠中印谈判。"},{"type":"paragraph","text":"英国议员唐纳利在“每日邮报”上发表了一篇煽动性的文章说，尼赫鲁“面临的危险是印度由于军事力量薄弱而可能把领土丢给中国”“亚洲自由命运和世界均势都可能取决于他的答复”。已被加封为贵族的英国前工党领袖艾德礼诬蔑中国是“帝国主义”、“给印度带来麻烦”，他要印度“坚持立场”。"},{"type":"paragraph","text":"工党的“新政治家”周刊公开进行挑拨说，“中国的长远意图究竟怎样这个问题现在使印度和整个东南亚感到惊恐”，中印边界争端和平解决就会使中国得到“面子”和“领土”，而印度却只能得到一个空头的“尊重”。这家周刊还叫嚷印度不能在“中国踏着她的胸膛”的情况下生活。“苏格兰人报”挑拨说尼赫鲁对中国“表现了最大的忍耐”，而中国仍然向他提出“领土要求”，诬蔑中国是一个“残暴无情的国家”。"},{"type":"paragraph","text":"保守党的“每日邮报”更造谣恫吓亚洲国家说，“中国侵犯印度西北边境的行动是可能持续许多年并决定大片地区命运的斗争的开端。”这家报纸恐吓印度放弃不参加西方军事集团的政策，它说不然印度将“几乎不可能抵挡共产党中国人数众多的和思想意识力量的严重进攻。”它说中立主义使印度“在北边吞灭的蛮龙威胁下孤立无援”。“每日邮报”并且拉出美国来为印度的反华分子打气，它说艾森豪威尔已经认识到，“必须为了西方民主而保持住印度”，它要他们为这一点而感到“莫大安慰”。英国“新闻纪事报”记者巴伯尔在一篇发自印度的报道中更加露骨地煽动说，“如果尼赫鲁要击败中国，他必须迅速采取行动”，不然“就会把印度的东北这一角一笔勾销而奉送给北京”。"},{"type":"paragraph","text":"为了在中印边界问题上制造紧张，英国资产阶级报刊上最近又一再出现所谓要“解放”中印边境上的不丹和锡金这类谣言。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fb98c7674e"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
