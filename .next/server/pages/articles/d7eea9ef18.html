<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoistlegacy.de-4801","name":"走访中央文革国务院联合接待站","author":"王化普","internal":false,"official":false,"type":"unknown","files":[],"article":{"title":"走访中央文革国务院联合接待站","dates":[{"year":1966,"month":11,"day":29}],"is_range_date":false,"authors":["王化普"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"云南批判资产阶级反动路线联络总站, 云南专州县市革命造反派赴昆联络站, 无产阶级文化大革命批资平反资料选辑, 45-48","tags":[{"name":"大字报","type":"主题/事件"},{"name":"平反","type":"主题/事件"},{"name":"右派","type":"主题/事件"},{"name":"走访","type":"主题/事件"}],"parts":[{"type":"title","text":"走访中央文革国务院联合接待站"},{"type":"paragraph","text":"时间：1966年11月29日下午"},{"type":"paragraph","text":"接待员：王化普同志"},{"type":"paragraph","text":"17.问：在我院给革命群众贴成批的大字报，集体签名，算不算围攻？"},{"type":"paragraph","text":"答：对领导上、当权派，集体写大字报是可以的。但对于群众写集体签名的大字报，就属于围攻了。"},{"type":"paragraph","text":"18.问：给革命羣衆贴了成批的大字报、斗了，并挂牌送进劳改队，实行了专政。可是有的领导说，当时就未打成反革命，未出通告，谈不上平反，对不对？"},{"type":"paragraph","text":"答：那应当平反，应当恢复名誉，不然羣衆不知道是怎么回事。在运动中被打成反革命的有多少人正式通告宣布过的呢？絶大多数没有。凡是羣衆被批了，被斗了，实际上“享受”了被管制专政待遇的，就应当平反，人家精神上受了很大刺激，领导上不承认错误，不给平反，那怎么行呢？"},{"type":"paragraph","text":"19.问：关于平反方面，有的领导说,那是羣衆搞的，谈不上平反不平反，对不对？"},{"type":"paragraph","text":"答：所谓羣衆搞的，那是推脱责任，是借口，这是错误的，实际上都是在领导的同意支持或默许下干的。当揪革命羣衆时，领导站出来没有？没有站出来就是领导同意支持默许，就是领导的责任。党要求领导者要敢字当头，一面要敢于发动羣衆，一面要敢于坚持政策。如果领导上站出来阻止过，那责任还轻点，如果没有出来阻止，那就是领导上的责任，推不掉，就应当由领导上来平反。平反是党委工作组或文革负责人来做。如宣武区某工厂的一位女工被街道红卫兵打了，剪了头髮，现在才一寸长，还不敢脱帽子，这领导上要负责任，没有领导上的同意，羣衆不会那样做的，因此应当平反，赔礼道歉。"},{"type":"paragraph","text":"20.问：现在有的领导人还说搞错了那是群众搞的，这是不是算继续坚持资产隆级反动路綫，挑动羣衆斗羣衆？"},{"type":"paragraph","text":"答：可以说是继续坚持资产阶级反动路綫，是继续挑动衆羣斗衆羣。"},{"type":"paragraph","text":"21.问：有的人给革命羣衆组织了成批的大字报，并强迫写检査，对不对？"},{"type":"paragraph","text":"答：那是错误的，应当退回检查，销毁材料。"},{"type":"paragraph","text":"22.问：有的人借口革命羣衆“态度”不好，就给挂牌送进“劳改队”并随之又解僱了其爱人的近十年的合同工工作，算什么问题？"},{"type":"paragraph","text":"答：借口态度不好，挂牌送劳改队是错误的。进一步解除其爱人的工作那就更不对，这类问题领导上要负责任。（有人说是羣衆要求的）那同样是借口，谁决定的？谁通知的？那一定是领导上，别的合同工解除了没有？答：（别的合同工没有解除，又吸收了新的临时工）那就更不对了，几个月的工资怎么办呢？应根据政策研究决定，这也是平反内容，应当平反道歉。对于革命羣衆被挂了牌子专了政，也必须平反道歉。"},{"type":"paragraph","text":"23.问：关于材料销毁，各级领导及有关文革成员写的笔记本、日记、小组记录，大字报底稿等算不算黑材料？"},{"type":"paragraph","text":"答：算，凡是整羣衆的材料一律清点集中销毁。中央指示中明确指出，凡是整理过的和没有整理过的（日记本、会议记录、大字报底稿等）都应清点集中销毁，凡是五月十六日以后，各种有关整羣衆的材料都算（整当权派的材料不能毁），一律作废销毁，但不能公布，免得引起羣衆之间的隔阂。"},{"type":"paragraph","text":"24.问：科研单位当权派指的那一级？"},{"type":"paragraph","text":"答：在中央和机关局司级以上，因爲任何决定都通过他们，他们说了算数，他们签了字全国都要执行。在工厂一般说来，车间主任，科长就算当权派，科研单位没有具体规定，可参考其他单位。"},{"type":"paragraph","text":"25.问：我院处理了一批人，有的戴了帽子，有没戴的，有的送回鄕下去，有的送往现埸作了处理，对不对？"},{"type":"paragraph","text":"答：那不符合中央精神，十六条中规定羣衆当中即使有了右派分子，也要到运动后期处理，当然现行犯够处理絛件的应当处理，"},{"type":"paragraph","text":"26.问：这次运动整不整羣衆？"},{"type":"paragraph","text":"答：这次运勤不是整革命羣衆，羣衆是自我教育问题，是帮助问题，这话林彪同志讲过。"}],"alias":""},"tags":[{"name":"中央文革","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d7eea9ef18"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
