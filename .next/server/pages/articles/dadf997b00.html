<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"教育工作者五反学习是检验资产阶级思想影响的试金石","authors":["学康"],"dates":[{"year":1952,"month":4,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"学康"},{"type":"paragraph","text":"教育工作者是工人阶级中的一部份，由于有技术，有知识，而不同于从事体力劳动的工人群众。另一方面在作为革命战斗力量以集体主义进行革命战斗来说，是远远的落后于一般工人群众的。教育工作者，能正视和改正自己的缺点，发扬自己的优点，为人民服务，是可以有很大作用，很大贡献的。但有部份同人却自视甚高，以为自己不同于一般工人群众，想超然于一般工人群众之外，超然于阶级之外。在阶级斗争中，自处于第三者地位，冷眼旁观，说风凉话，这种狂妄思想的根源和本质是什么呢?必须把它发掘出来。"},{"type":"paragraph","text":"他们有很不成理由的理由，例如说你们指出资产阶级的丑恶本质是不错的，但为什么不早些说呢?你们说资产阶级自私自利，但无产阶级进行五反，不也是为了自己利益么?资产阶级诚然卑鄙不堪，但没有政府干部的官僚主义，资产阶级的罪行也不至于这样深重呀!你们常常说，要教育改造，为什么对资产阶级不教而诛呢?诸如此类的问题，自以为是站在云端里，发出“一只碗不响，两只碗叮噹”的论调。但这个超然地位是不可靠的，无论你有意无意，你实在已经做了资产阶级不法罪行的辩护者、资产阶级的应声虫。"},{"type":"paragraph","text":"为了击退资产阶级的猖狂进攻，工人阶级首先肃清政府机关内部的资产阶级思想影响，肃清工人队伍中的资产阶级派进来的坐探，揭露资产阶级的五毒罪行，进行五反斗争，以教育改造资产阶级，这样做不仅是为了保卫工人阶级的利益，也为了保卫全体人民的利益，为了顺利进行国家经济建设并实现社会主义，这样做是完全正确的。解放三年来资产阶级对人民和祖国的猖狂进攻，已是举世皆知，有目共覩的事实。不反击这些不法资本家，不肃清他们的五毒罪行，不但人民和祖国受到危害，便是老实守法的资本家也难免受到损害的。这种情况，为什么你看不到呢?甚至说政府官僚主义要为资产阶级的五毒罪行负责，这样说来，不慎失窃者要为盗贼的罪行负责了，世界上有这种歪理么?试问你的超然立场，又超然在什么地方呢?你自以为站在云端里，实际上却是跌在资产阶级的茅坑里，却还自鸣得意，这是何等幼稚可笑。"},{"type":"paragraph","text":"这说明了什么呢，任何超阶级超政治都是鬼话，你想跳出阶级斗争的漩涡，你想离开工人阶级队伍，那么你必然会跌入资产阶级的陷阱中。"},{"type":"paragraph","text":"你既没有沾染到资产阶级的铜臭，为什么会不自觉的做了资产阶级的辩护士、应声虫呢?这是由于教育工作者阶级出身、所受的教育、社会关系都和资产阶级保持着千丝万缕的连系。假使你不痛自鞭策，站稳工人阶级的立场，肃清思想意识中的资产阶级影响，那么你就不能对事物有正确的看法，你就会有意无意的帮助那曾经欺骗你剥削你的资产阶级。"},{"type":"paragraph","text":"所以五反学习，正是检验我们资产阶级思想影响的试金石，教师同人应该检查自己的思想，进行自我批判与自我改造，以争取五反斗争与思想改造的彻底胜利。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dadf997b00"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
