script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"个人主义臭不可闻北京大学的“反对资产阶级个人主义思想展览会”","authors":[],"dates":[{"year":1958,"month":5,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"北京大学整改办公室举办了“反对资产阶级个人主义思想展览会”。从展出的大字报中，人们可以看见资产阶级个人主义思想给教学工作、给培养年青一代的事业带来了多么严重的危害。"},{"type":"paragraph","text":"一切为了“饭碗”"},{"type":"paragraph","text":"展览会揭露了教师中资产阶级个人主义思想的种种表现。数学系一位先生说得很干脆:“我教书是为了饭碗问题，除了与饭碗有关的活动，一律不参加。”大字报还揭发不少教师不愿做行政工作社会工作；甚至有些党团员不愿做党团工作。哲学系一位同志在1955年原任党总支书记，但一直喊“吃不消”，于是由改任副书记、宣委，到不愿做总支委员；但奇怪的是，这时却是他出书、写文章很盛的时期。"},{"type":"paragraph","text":"这是什么“例子”"},{"type":"paragraph","text":"有的教师为了追求稿费，粗制滥造。中文系有位先生近年来重版了很多旧著，其中很多错误观点都原封不动，只写一篇短序作为“批判”。在一本语法书的“新省略法”里竟然有这样一个例子:“中国共产党中央党部执行委员会，简称‘中委’”。但是，中国共产党根本没有什么“党部执行委员会”。原来，旧版写的是“中国国民党”，这次重版，根本没有复审，只是随手把“中国国民党”写成了“中国共产党”。"},{"type":"paragraph","text":"、如此“自由竞争”"},{"type":"paragraph","text":"大字报还揭露出有很多教师在科学研究中采取“自由竞争”的态度。抢占地盘、辽不合作、彼此保密，以使独占其名，独享其利。专搞殷周考古的一位先生在发掘殷周文化层时，万分小心，小铲细作，而对其他时代的文化层却可以任意处理，大镐粗刨。"},{"type":"paragraph","text":"一心只为自己捞钱"},{"type":"paragraph","text":"很多教员对教研室分配的任务不负责任，对教学工作三心三意。1956年，高教部请几位教授编写部分大学语文教科书，希望他们在1957年10月脱稿付印。为了使他们及时编好教科书，高教部批准他们完全脱产，给他们配备助手；1957年暑期，还特别在青岛定了旅馆，让他们全班人马到那里去消夏避暑。但他们把大部分或全部工作交给助教，自己去忙于出书写稿，任务至今没有完成。有一位先生近年来不断出书，写论文，但是一本讲义从1952年到现在还原封未动。"},{"type":"paragraph","text":"白专道路"},{"type":"paragraph","text":"很多教师不但存在着严重的资产阶级个人主义思想，并且还在同学面前宣扬。"},{"type":"paragraph","text":"有位先生曾向同学说过:科学与政治不同，政治谁都可以谈，而科学一般人不能过问。向同学宣扬了不问政治、走“白”“专”道路的思想。有些教师在向学生介绍专业时，也宣扬了名利思想。比如他们把北大和本系捧上天，宣扬毕业以后的岗位多么有前途。而对应怎样克服困难，怎样艰苦劳动却一字不提。中文系一个被一位教授赏识和鼓励的女同学，决心研究苏轼，但是她感兴趣的是超然物外的人生观，是苏轼每天何时起床，怎喝酒。在反右派斗争紧张激烈的时候，她却由一位教授指导研究黑格尔美学。(冬)(原载北京大学校刊，本报曾予删节)"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0a6e80b430"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
