<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"展开三反运动学习　反对资产阶级思想影响","authors":["李致远"],"dates":[{"year":1952,"month":3,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"李致远"},{"type":"paragraph","text":"毛主席号召的伟大的反贪污、反浪费、反官僚主义运动，已在全国大张旗鼓地普遍展开了。这一运动的实质是一场激烈的阶级斗争，是一场反对资产阶级腐化堕落思想的、打退资产阶级进攻的斗争。"},{"type":"paragraph","text":"三年以来，资产阶级曾向中国工人阶级、中国共产党和人民政府进行了猖狂的进攻。在经济方面:他们采用了种种卑劣的办法，来破坏人民国家建设的物质基础。他们向干部行贿、偷税漏税、盗骗国家资财、偷工减料、盗窃国家经济情报。如北京仅一百九十二家工商户，就直接盗窃了国家资财二千亿元以上。天津不法商人解放以来仅偷税漏税一项，就达八千亿元。在政治与思想方面:他们经常有计划地散布资产阶级的腐朽思想来传染与侵蚀我们的革命队伍。用“派进来”、“拉过去”的方法，打入我们的机关、特别是经济部门，以夺取我们经济上的领导权:并把我们的干部拉下水去，使他们贪污蜕化，变为资产阶级在革命内部的代理人。已被枪毙的大贪污犯薛昆山就是他们“派进来”的；宋德贵、刘青山、张子善等，就是被他们“拉过去”的。资产阶级的这种猖狂进攻，已使我们的国家遭受了严重的危害。我们再不能麻痹和犹豫了!我们必须坚决、彻底地打退他们这个进攻。这一斗争是关系到能否保证工人阶级领导权的问题，是关系到国家能否建设成一个工业国和走向社会主义社会的问题；因而，也是决定整个革命胜利的问题。"},{"type":"paragraph","text":"三反运动既然是这样的重要，我们中学生当然也要毫不例外地积极参加。有些同学对这一斗争漠不关心，认为与自己无关，是非常错误的。"},{"type":"paragraph","text":"那么，我们中学生应该怎样参加这一伟大的斗争呢?"},{"type":"paragraph","text":"由于我们学生的主要任务是学习，在中学校里主要要做的，也是开展三反运动的学习:学习工人阶级的思想作风，反对资产阶级的思想影响。"},{"type":"paragraph","text":"在这次学习中，我们一定要认清资产阶级唯利是图、损人利己、投机取巧、堕落腐朽的思想本质，以及奸诈、狡猾的阴险面目。看!为了赚钱，不法资本家可以忘恩负义地危害人民的国家；为了赚钱，他们竟伤天害理地陷害人民志愿军——我们的最可爱的人。他们根本没有爱国观念，哪里有钱，哪里钱多，他们就朝哪里钻；为了钱，他们什么坏事都做得出来。我们青年学生一定要鄙视他们这种卑劣下贱的思想；一定要使这种反动思想在学校里没有存身的余地。"},{"type":"paragraph","text":"在这次学习中，我们要反对一切浪费公共财物、奢侈、比阔气等资产阶级的思想作风；培养起工人阶级崇尚劳动、廉洁朴素、热爱祖国、爱护公共财物、忠心耿耿为人民服务等新品质、新作风。"},{"type":"paragraph","text":"我们怎样来认清和反对资产阶级的影响呢?我们必须站稳工人阶级的立场，用工人阶级的思想，也就是伟大的毛泽东思想来武装我们的头脑。工人阶级的思想本质是和资产阶级思想恰恰相反的，它是“最有远见、大公无私、最富于革命的彻底性”的。只有站稳工人阶级的立场，用工人阶级的思想来武装我们的头脑，继能真正认清资产阶级腐朽思想的本质，和扫除资产阶级思想的影响；也只有扫除了资产阶级思想的影响，才能真正巩固地站稳工人阶级的立场。"},{"type":"paragraph","text":"最后，在学习中，我们也要适当地进行自我批评和相互批评。我们自己学习了还要向群众及亲友作宣传工作。此外，不论学校、家庭、亲友中，我们如果知道有贪污、行贿等犯法事实，我们也要站稳立场，大公无私地进行检举，这才是理论与实践相结合的学习方法。(原载“中学生”)"}],"comments":[],"origin":"“中学生”","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ba408aac62"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
