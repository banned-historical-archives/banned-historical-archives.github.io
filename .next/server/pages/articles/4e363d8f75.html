script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"奴隶之歌","authors":["鲁平"],"dates":[{"year":1938,"month":7,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"鲁平"},{"type":"paragraph","text":"当光明使者退去休息的时候，那黑暗的夜神便开始来施行它的权威了。"},{"type":"paragraph","text":"那时，一群群的魍魅鬼怪都妇动着，从每一个角落里爬了出来，准备来找取它们的憧憬，追求它们的刺激，它们狞笑着，但这笑声简直有点像哭，使人听了会毛发悚然的。然而它们有时也唱歌，这歌声是凄凉而悲怆的，声调却哑嘶得像拉破胡琴。"},{"type":"paragraph","text":"它们自称是奴隶，脸色都是那样的苍白，像一张纸，身上的装束恰如一个个未腐的古老陈尸，但是它们从不敢在光明的场所出现，只在黑暗的地方现形，然而，它们在得意忘形的时候却常常要在人前跳舞——"},{"type":"paragraph","text":"你别要以为它们是奴隶，其实它们也学着了主子们的骄傲，矜持，也会向人家说谎，说它们是主人，并不曾作谁的奴隶。虽然，它们知道自己的末日将临，卑污的灵魂马上就要毁灭快了，但在这尚未幻灭的一刻以前，它们还想作一个美妙的梦呢。"},{"type":"paragraph","text":"自己住的坟墓应该由它们自己挖掘，工具是多着，坟地也现成，它们大家努力地向下掘着，一块泥，一片石，一寸又一寸，一尺又一尺，向下掘着掘着，等到有一天，墓穴挖成了，只须把自己的灵魂锁进去，再把傍边一些泥土堆了上去，一个“庄严伟大”的坟墓就落成了。"},{"type":"paragraph","text":"可是，它们不能立刻钻进坟墓里面去，对这世界还要作一次最后的依恋，不—它们要在这最后一刻的以前，来举行一番小小的葬仪，唱一支葬礼进行曲。虽然，这葬礼是非常寂寞的，没有送葬的乐队，没有落葬的伕工，只是在黑暗中生长，在黑暗中幻灭，不过，在走入坟墓以前，却不得不来一点小小的点缀。"},{"type":"paragraph","text":"现在，它们已经整齐地排列着，期待着最后一刻的到来，但是就唱起了那支“奴隶之歌”来，以代葬礼的进行曲:"},{"type":"paragraph","text":"这是奴隶的行列，"},{"type":"paragraph","text":"前面是我们的坟墓；"},{"type":"paragraph","text":"我们不知荒凉，"},{"type":"paragraph","text":"更不懂得悲哀与痛苦；看吧，那边不是送葬的歌乐"},{"type":"paragraph","text":"我们应在这葬礼的前一刻来一番跳舞!"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4e363d8f75"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
