script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"挪威工人共产党（马列）主席斯泰根发表讲话  苏联社会帝国主义是当前最大的战争威胁  比利时《光明和被剥削者》抨击苏联加紧备战企图侵略西欧称霸世界","authors":[],"dates":[{"year":1976,"month":3,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"挪威工人共产党（马列）主席斯泰根发表讲话"},{"type":"paragraph","text":"苏联社会帝国主义是当前最大的战争威胁"},{"type":"paragraph","text":"比利时《光明和被剥削者》抨击苏联加紧备战企图侵略西欧称霸世界"},{"type":"paragraph","text":"新华社斯德哥尔摩一九七六年三月十七日电　奥斯陆消息：据挪威报纸《阶级斗争》最近报道，挪威工人共产党（马列）主席保尔·斯泰根二月十八日在庆祝该党成立三周年集会上发表讲话，谴责苏联正在欧洲和全世界加紧战争准备。"},{"type":"paragraph","text":"斯泰根在讲话中谈到国际形势时说：“十分肯定，我们正在进入一个革命和战争因素都在增长的时期。”他说，苏联是当前最大的战争威胁。苏联现在已经拥有的军事打击力量和战术优势使它能够发动战争。然而，克里姆林宫在战争爆发之前仍然需要在许多国家确保它的政治地位，并且，从军事战略利益考虑，需要同尽可能多的国家的资产阶级建立经济联系。苏联也想等待美国的实力进一步瓦解之后再予以打击。"},{"type":"paragraph","text":"斯泰根指出，苏联对挪威有着具体的进攻计划。苏联把挪威北部作为假想的目标不断举行包围和登陆军事演习，并且试图侵占斯瓦巴德群岛和巴伦支海的部分大陆架。他说，很难设想，在欧洲发生任何规模较大的战争的情况下，挪威会不被卷入。"},{"type":"paragraph","text":"斯泰根说，我们马列主义者在揭露社会帝国主义和战争威胁方面对人民和工人阶级负有重大的责任。然而这样一种揭露本身还不足以制止战争。需要尽可能多的欧洲国家的无产阶级和人民联合进行斗争。他说：斗争的矛头必须指向两个超级大国，尤其是要反对苏联的侵略计划。"},{"type":"paragraph","text":"斯泰根谴责了两个超级大国对安哥拉的干涉，他说，安哥拉的形势证明，苏联帝国主义处于攻势，美帝国主义处于守势。安哥拉的教训说明，我们生活在一个一场新的帝国主义战争正在进行加紧准备的时代。"},{"type":"paragraph","text":"新华社布鲁塞尔一九七六年三月十八日电　比利时刊物《光明和被剥削者》最近一期发表文章指出，苏联社会帝国主义是各国人民最危险的敌人。"},{"type":"paragraph","text":"这篇题为《苏联社会帝国主义，最危险的战争因素》的文章说：“列宁指出，只要有帝国主义，就不可避免地有帝国主义的战争。今天，抱有控制和统治世界的疯狂野心的两个超级大国正顽固地走向第三次大战。它们的争夺日趋激烈，并且，这种争夺对双方来说都是靠前所未有的更新军备来进行的。它们不可避免地将挑起新的冲突。”"},{"type":"paragraph","text":"文章指出：“两个超级大国之中最危险的是苏联社会帝国主义。它之所以危险，因为它口头上不断地讲持久的和平和缓和，而在这些言词的背后却加紧更新军备；它之所以危险，因为它口讲无产阶级国际主义，而这些话掩盖着侵略（请看捷克斯洛伐克和安哥拉）；它之所以危险，因为它打着红旗，而这个动作却掩盖着最坏的法西斯压迫，苏联的数千处集中营和至少一百万名政治犯就是明证。”"},{"type":"paragraph","text":"文章强调指出：“欧洲是两个超级大国争夺的重点。社会帝国主义不仅在东方占领和践踏了欧洲大陆的一半，而且它积极准备侵略（欧洲）另外半部分的国家。苏联四分之三的兵力集中在西欧的边界。”文章还揭露说，苏联的克格勃在欧洲各地都有间谍，他们到处制造困难和挑起混乱。"},{"type":"paragraph","text":"文章指出：“正视现实的人都会得出如下的结论：苏联正在积极准备第三次世界大战。”"},{"type":"paragraph","text":"文章说，苏联已经成为目前战争的最大因素，这是由它的社会帝国主义制度决定的。"},{"type":"paragraph","text":"文章最后说：“在今天，最迫切的任务是揭露两个超级大国的，特别是最危险、最有侵略性的国家——苏联社会帝国主义的战争准备。苏联社会帝国主义正在为侵略西欧国家作准备，各国人民对此应该有所准备。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"世界形势","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7c3c518acc"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
