script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"比利时刊物《光明和被剥削者》发表文章揭露  苏修声东击西加紧同美国争霸欧洲  美国竭力弥补欧洲南翼裂痕，援助葡萄牙，部分取消对土武器禁运","authors":[],"dates":[{"year":1975,"month":10,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"比利时刊物《光明和被剥削者》发表文章揭露"},{"type":"paragraph","text":"苏修声东击西加紧同美国争霸欧洲"},{"type":"paragraph","text":"美国竭力弥补欧洲南翼裂痕，援助葡萄牙，部分取消对土武器禁运"},{"type":"paragraph","text":"新华社布鲁塞尔一九七五年十月九日电　比利时刊物《光明和被剥削者》在最新一期上发表了题为《美苏两个超级大国是新的世界大战的策源地》的文章，揭露两个超级大国在欧洲的争夺，特别是苏联社会帝国主义为积极准备战争而采取的策略。"},{"type":"paragraph","text":"文章首先指出：两个超级大国之间不存在缓和，而是在加紧争夺，欧洲是两个超级大国争夺的重点，“在欧洲，北大西洋公约组织和华沙条约组织两个军事集团互相对峙，所谓的‘恐怖平衡’不会给各国人民带来和平”。"},{"type":"paragraph","text":"文章指出，美帝国主义正在衰落，“俄国社会帝国主义对衰落中的美帝国主义正在展开攻势，以扩大其掠夺成果。”"},{"type":"paragraph","text":"文章谴责苏联社会帝国主义玩弄声东击西的策略，同时指出，“苏联四分之三的军事力量针对着西欧”。地中海地区的苏联军舰目前已在数量上超过美国舰队。“整个西欧处于钳形包围中”。"},{"type":"paragraph","text":"文章最后表示，我们坚决支持欧洲各国人民之间以及他们同第三世界各国人民之间的团结，主张不仅在比利时，而且在国际范围内组成最广泛的统一战线，反对两个超级大国。"},{"type":"paragraph","text":"据新华社一九七五年十月十一日讯　华盛顿消息：正在纽约参加联合国大会的葡萄牙外交部长安图内斯，十月十日到达华盛顿，先后同美国总统福特和国务卿基辛格进行了会谈。"},{"type":"paragraph","text":"安图内斯在同美国领导人会谈以后告诉新闻记者，美国政府打算向葡萄牙提供八千万美元的援助。白宫和国务院分别发表声明说，美国给葡萄牙的援助计划是“表明美国关心葡萄牙”，“表明（美国）支持葡萄牙的政治演变。”"},{"type":"paragraph","text":"在安图内斯访问华盛顿之前，欧洲经济共同体部长理事会在十月七日决定向葡萄牙提供一亿八千万美元的紧急援助。"},{"type":"paragraph","text":"新华社讯　华盛顿消息：美国国会十月三日通过一项提案，决定部分取消对土耳其的武器禁运，准许政府向土耳其运送它已经购买的武器，并同意土耳其再向美国购买数量有限的军事装备。"},{"type":"paragraph","text":"美国总统福特在同一天发表声明，表示欢迎国会的这一行动。声明指出，“在北大西洋公约组织具有战略重要性的南翼恢复稳定和安全”，这是“一项重大任务”。"},{"type":"paragraph","text":"自从土耳其和希腊在塞浦路斯问题上的争端激化以来，两个超级大国为了争夺东地中海，都露骨地进行了干预。美国国会今年二月决定停止对土耳其的军事援助和停止向土耳其出售武器。为此，土耳其政府在今年七月二十五日宣布，土耳其和美国一九六九年签订的联合防御协定及其有关协定失效，并接管了美国在土耳其的一切军事设施。为了缓和同北大西洋盟国土耳其的紧张关系，防止苏联进一步利用这一局势浑水摸鱼，福特政府几个月来一直要求国会取消对土耳其的武器禁运。"},{"type":"paragraph","text":"据西方通讯社从安卡拉报道，土耳其政府十月三日就美国国会通过决定发表声明指出：这项决定"},{"type":"paragraph","text":"“对于土耳其同美国的共同利益以及西方的防务利益来说，是一个积极的开端”，但是，土耳其—美国关系的前途将紧密地同全面解除武器禁运的努力联系在一起。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d185770343"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
