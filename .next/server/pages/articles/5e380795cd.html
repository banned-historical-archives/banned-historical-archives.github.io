script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"《毛主席语录》是举世闻名的红书","authors":[],"dates":[{"year":1966,"month":12,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"澳共《先锋报》发表文章赞扬说："},{"type":"paragraph","text":"《毛主席语录》是举世闻名的红书"},{"type":"paragraph","text":"毛泽东思想是马列主义的最高发展，对被压迫者来说，它就是生命本身；对压迫者来说，它就意味着死亡。"},{"type":"paragraph","text":"新华社墨尔本一日电　澳大利亚共产党（马克思列宁主义者）机关报《先锋报》今天发表文章赞扬《毛主席语录》说：在“这本举世闻名的红书”中，“有今天世界上最宝贵的财富，那就是毛泽东思想”。因此，人民颂扬和尊敬这本书。"},{"type":"paragraph","text":"文章说，在中国，这本书已经是七亿中国人民行动的指南。帝国主义害怕这本书，因为“他们害怕人民，特别是当人民用这本书的思想武装起来的时候”。以苏共领导集团为中心的现代修正主义者“对这本书也怀有强烈的仇恨”，因为"},{"type":"paragraph","text":"“他们拚命地想埋葬马克思列宁主义，而这本红书把马克思列宁主义交给了亿万人民。”"},{"type":"paragraph","text":"文章指出：“毛泽东思想是马克思列宁主义的最高发展”，“对被压迫者来说，它就是生命本身；而对压迫者来说，它就意味着死亡”。"},{"type":"paragraph","text":"文章号召澳大利亚先进的工人学习毛泽东思想。文章说：“这本书将大大有助于学习马克思列宁主义的重要原理，并有助于根据这些原理来研究澳大利亚的现实。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5e380795cd"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
