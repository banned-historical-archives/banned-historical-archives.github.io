script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反对垄断资本的残酷剥削美国十二万多铁路工人大罢工美国六月份生活费用再度急剧猛涨","authors":[],"dates":[{"year":1971,"month":7,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京二十四日电　华盛顿消息:美国铁路工人反对垄断资本残酷剥削的罢工斗争，正在进一步扩大。二十四日，大约七万名铁路工人加入了罢工的行列，使参加罢工的铁路工人共达十二万五千人，占美国全部铁路工人的四分之一。"},{"type":"paragraph","text":"美国铁路垄断资本为了向工人转嫁日益深重的财政经济危机，炮制了一项新的“工作条例”，以便提高工人劳动强度，解雇大批工人，并且削减工资。这一反动措施激起了广大铁路工人的不满和反对。南方铁路公司、联合太平洋铁路公司等几家铁路公司的数万名铁路工人，十六日首先起来罢工。一个星期以来，垄断资本家伙同反动当局一再胁迫工人复工。但是罢工工人不怕威胁，克服种种困难，继续坚持斗争。"},{"type":"paragraph","text":"垄断资本家的恶劣态度激起了铁路工人更大的反抗。二十四日凌晨，南太平洋铁路公司、诺福克和西方铁路公司的七万名铁路工人也奋起罢工。罢工工人立即在弗吉尼亚州和俄亥俄州的一些车站设置了纠察线。"},{"type":"paragraph","text":"新华社北京二十四日电　华盛顿消息:六月份美国的生活费用再度急剧上涨，无情地戳穿了尼克松政府所谓“已经使通货膨胀率放慢”的谎言。"},{"type":"paragraph","text":"据美国劳工部七月二十三日宣布，美国的生活费用继五月份猛烈上涨百分之五之后，六月份又上涨了百分之零点六。这是一九七○年四月以来未经所谓“季节调整”的上涨幅度最大的一个月。"},{"type":"paragraph","text":"上涨幅度最大的是食品价格，上涨了百分之零点九；其次是交通费，上涨了百分之零点七；住房费用上涨了百分之零点六。"},{"type":"paragraph","text":"六月份的消费品价格比一九六七年上涨了百分之二十一点五。就是说，在四年前花一百美元就能买到的商品，现在要花一百二十一美元五十美分才能买到。"},{"type":"paragraph","text":"五、六两个月美国生活费用接连急剧上涨，表明美国的通货膨胀正在继续恶性发展。这是尼克松政府对外坚持侵略和战争政策、对内推行“扩展性”经济政策带给美国人民的灾难，也是美国财政金融危机深化的明证."}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"948ccdfd28"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
