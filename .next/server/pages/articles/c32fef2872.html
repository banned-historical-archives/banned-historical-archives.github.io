<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"毛泽东在庐山会议前和会议第一天的谈话记录","authors":[],"dates":[{"year":1959,"month":6,"day":29}],"is_range_date":false,"parts":[{"text":"毛泽东在庐山会议前和会议第一天的谈话记录","type":"title"},{"text":"表扬好人好事，批评坏人坏事","type":"subtitle"},{"text":"有鉴于去年许多领导同志，县，社干部，对于社会主义经济问题还不大了解，不懂得经济发展规律，有鉴于现在工作中还有事务主义，所以应该好好读书。中央、省市、地委各级的委员，包括县委书记，要读政治经济学的书。要给县、社干部编三本书：一本是关于“好人好事”的书，搜集在去年大跃进中，敢于坚持真理，不随风倒，工作做得好，不谎报，不浮夸，实事求是的例子。一本是关于“坏人坏事”的书，收集专门说假话，违法乱纪，或者工作中犯了严重错误的例子。第三本是中央从去年到现在的各种指示文件，有系统地编一本书。","type":"paragraph"},{"text":"成绩伟大，问题不少，前途光明","type":"subtitle"},{"text":"国内形势如何？总的说来，成绩伟大，问题不少，前途光明。根本问题是：(1)综合平衡，(2)群众路线，(3)统一领导，(4)注意质量。其中最主要的是综合平衡和群众路线问题。宁肯少些，但要好些，全些，各种各样都要有。农业中粮、棉、油、麻、丝、烟、茶、糖、菜、果、药、杂都要有。工业中要有轻工业、重工业，其中又要各样都有。去年集中力量搞个高炉，其他都丢了，这样搞法不行。","type":"paragraph"},{"text":"大跃进的重要教训之一，主要缺点是没有平衡，说了两条腿走路并举，实际上没有兼顾。整个经济中，综合平衡是个根本问题，有了综合平衡、才能有群众路线。","type":"paragraph"},{"text":"三种平衡：农业本身的农、林、牧、副、渔；工业内部的各个部门、各个环节；工业和农业。做好这三种平衡工作，才可能正确地处理整个国民经济的比例关系。","type":"paragraph"},{"text":"把农业放在首要地位","type":"subtitle"},{"text":"过去安排经济计划的秩序是重、轻、农，今后恐怕要倒过来。现在是否农、轻、重呢?也就是说，要强调把农业搞好，要把重、轻、农、商、交的秩序改为农、轻、重、交、商。这样提，还是选先发展生产资料，并不违反马克思主义。过去××同志说过：要先安排好市场，再安排基建。有同志不赞成。现在看来，××同志的意见是对的。要先把衣、食、住、用、行五个字安排好，这是关系到六亿五千万人安定不安定的问题。这五个字安排好了以后，使大家过得舒服，就不会有人说闲话，骂我们。这样有利于建设，同时国家也可以多积累。","type":"paragraph"},{"text":"关于农村的几项具体政策","type":"subtitle"},{"text":"三定政策，定产、定购、定销，群众要求恢复，看来非恢复不可，可以三年不变。如果可以定，究竟定多少，增产部分是否可以征四留六，有灾减，自留地不交税，这次会议要议一下。","type":"paragraph"},{"text":"要恢复农村初级市场。","type":"paragraph"},{"text":"要使生产小队成为半核算单位。","type":"paragraph"},{"text":"加强中央统一领导，反对半无政府主义","type":"subtitle"},{"text":"积极性有两种：一种是实事求是的积极性，一种是盲目的积极性。红军的三大纪律，有两条可以普遍用：“一切行动听指挥”，就是要统一领导，反对无政府主义。“不拿群众一针一线”，就是不搞一平，二调。","type":"paragraph"},{"text":"体制问题：现在有些半无政府主义。“四权”过去下放多了一些，快了一些，造成混乱，应该强调一下统一领导，中央集权。下放的权力，要适当收回。对下要适当控制，反对半无政府主义。","type":"paragraph"},{"text":"过死不好，过活也不好。现在看来，不可过活。","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"对话"}]},{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"毛泽东在庐山会议前和会议第一天的谈话记录","authors":[],"dates":[{"year":1959,"month":6,"day":29}],"is_range_date":false,"parts":[{"text":"毛泽东在庐山会议前和会议第一天的谈话记录","type":"title"},{"text":"表扬好人好事，批评坏人坏事","type":"paragraph"},{"text":"有鉴于去年许多领导同志，县，社干部，对于社会主义经济问题还不大了解，不懂得经济发展规律，有鉴于现在工作中还有事务主义，所以应该好好读书。中央、省市、地委各级的委员，包括县委书记，要读政治经济学的书。要给县、社干部编三本书：一本是关于“好人好事”的书，搜集在去年大跃进中，敢于坚持真理，不随风倒，工作做得好，不谎报，不浮夸，实事求是的例子。一本是关于“坏人坏事”的书，收集专门说假话，违法乱纪，或者工作中犯了严重错误的例子。第三本是中央从去年到现在的各种指示文件，有系统地编一本书。","type":"appellation"},{"text":"成绩伟大，问题不少，前途光明","type":"paragraph"},{"text":"国内形势如何？总的说来，成绩伟大，问题不少，前途光明。根本问题是：(1)综合平衡，(2)群众路线，(3)统一领导，(4)注意质量。其中最主要的是综合平衡和群众路线问题。宁肯少些，但要好些，全些，各种各样都要有。农业中粮、棉、油、麻、丝、烟、茶、糖、菜、果、药、杂都要有。工业中要有轻工业、重工业，其中又要各样都有。去年集中力量搞个高炉，其他都丢了，这样搞法不行。","type":"paragraph"},{"text":"大跃进的重要教训之一，主要缺点是没有平衡，说了两条腿走路并举，实际上没有兼顾。整个经济中，综合平衡是个根本问题，有了综合平衡、才能有群众路线。","type":"paragraph"},{"text":"三种平衡：农业本身的农、林、牧、副、渔；工业内部的各个部门、各个环节；工业和农业。做好这三种平衡工作，才可能正确地处理整个国民经济的比例关系。","type":"paragraph"},{"text":"把农业放在首要地位","type":"paragraph"},{"text":"过去安排经济计划的秩序是重、轻、农，今后恐怕要倒过来。现在是否农、轻、重呢?也就是说，要强调把农业搞好，要把重、轻、农、商、交的秩序改为农、轻、重、交、商。这样提，还是选先发展生产资料，并不违反马克思主义。过去××同志说过：要先安排好市场，再安排基建。有同志不赞成。现在看来，××同志的意见是对的。要先把衣、食、住、用、行五个字安排好，这是关系到六亿五千万人安定不安定的问题。这五个字安排好了以后，使大家过得舒服，就不会有人说闲话，骂我们。这样有利于建设，同时国家也可以多积累。","type":"paragraph"},{"text":"关于农村的几项具体政策","type":"paragraph"},{"text":"三定政策，定产、定购、定销，群众要求恢复，看来非恢复不可，可以三年不变。如果可以定，究竟定多少，增产部分是否可以征四留六，有灾减，自留地不交税，这次会议要议一下。","type":"paragraph"},{"text":"要恢复农村初级市场。","type":"paragraph"},{"text":"要使生产小队成为半核算单位。","type":"paragraph"},{"text":"加强中央统一领导，反对半无政府主义","type":"paragraph"},{"text":"积极性有两种：一种是实事求是的积极性，一种是盲目的积极性。红军的三大纪律，有两条可以普遍用：“一切行动听指挥”，就是要统一领导，反对无政府主义。“不拿群众一针一线”
