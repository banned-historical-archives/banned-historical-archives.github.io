script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"本市举行“宪法理论讨论会”提出增强宪法观念　捍卫宪法尊严批判了法学领域中的资产阶级自由化思潮","authors":["唐英"],"dates":[{"year":1989,"month":12,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　(记者　唐英)本市“宪法理论讨论会”昨天在文艺会堂举行。法学界180多位专家、学者、政法工作者和各区、县人大常委会的干部出席了会议。与会者分析和讨论了我国现行宪法的指导思想和基本原则，批判了法学领域中的资产阶级自由化思潮。"},{"type":"paragraph","text":"社科院法学研究所程辑雍副研究员在题为《宪法观念和社会稳定》的发言中说，社会稳定是改革、开放的客观前提，是宪法维护的中华民族根本利益所在。只有在贯彻实施宪法的实践中不断增强人们的宪法观念，才能保证宪法顺利地贯彻实施，保障社会的稳定。保证宪法实施的自觉性愈强，维护社会稳定，安定团结的局面就愈有保障。"},{"type":"paragraph","text":"复旦大学法律系副教授张世信提出强化对领导干部的宪法观念教育。他说，领导干部带头学习宪法应落实到具体措施上，并加以制度化。他建议，安排领导干部结合实际向人民群众宣讲宪法；对县级以上党政领导干部进行宪法知识和宪法实施方面的考核；国家领导人员在任职时举行效忠宪法宣誓仪式，有助于维护宪法尊严，有助于担任国家领导职务的公民在行使职权时忠于宪法，也是对全体公民进行宪法教育的重要方式。"},{"type":"paragraph","text":"市法学会副研究员浦增元在剖析批判“三权分立”的同时，从理论上阐述了现行宪法所确定的国体、政体是我国人民长期革命斗争的总结，也是别无他途的决定性抉择。市政协委员、法学研究所副研究员尤俊意提出，维护宪法规定的公民各项权利与自由，既要与侵犯公民权利和自由的行为作斗争，也要同那些只要个人自由权利而损害他人合法权利和自由的行为作斗争。市法学会副会长马锐说，只要国家存在，社会主义国家政权的专政职能就不会削弱。当前，阶级斗争虽不是我国社会主要矛盾，但仍在一定范围内存在，并以特殊的形式进行着，有时表现得很激烈。因此，要捍卫宪法尊严，保证宪法实施，就必须依法对敌对分子加强专政的工作，以保障社会安宁，促进改革、开放的顺利进行。"},{"type":"paragraph","text":"在讨论会上，市人大常委会作了题为《建设适应我国国情的政治制度》的发言。杨浦区人大介绍了该区十年来人大建设成就。市法学会会长李庸夫主持了讨论会，市委宣传部副部长龚心瀚、市人大常委会法制委员会副主任裘助恒等出席了讨论会。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5bc1bbbf21"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
