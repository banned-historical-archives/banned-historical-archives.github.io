script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji21","name":"毛泽东全集第21卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji21.pdf"],"article":{"title":"准备应付边打边谈局面","alias":"","parts":[{"type":"paragraph","text":"准备应付边打边谈局面!"},{"type":"paragraph","text":"（1946年6月30日）周："},{"type":"paragraph","text":"（一）蒋介石得寸进尺，除已让国民党象征占领哈尔滨及东北三师关内七师3外，目前一时期内不要再作让步，请表示再无可让，以观动静。（二）陈舒电，济南顽军于二十七日攻占我龙山、枣园两车站及章丘县城。（三）以后局面是边打边谈，我们须准备应付此种局面。"},{"type":"paragraph","text":"中央"},{"type":"paragraph","text":"巳三十[1]这是毛泽东为中共中央起草的给周恩来的电报。"},{"type":"paragraph","text":"[2]1946年6月下旬，由国共双方和美国总统特使组成的军事三人小组达成初步协定。其中，中共同意国民党军队1个团（不超过5000人）驻哈尔滨。电文中“让国民党象征占领哈尔滨”即指此。"},{"type":"paragraph","text":"[3]1946年2月25日，周恩来、张治中和美国总统特使马歇尔组成的军事三人小组会议签署《关于军队整编及统编中共部队为国军之基本方案》。该方案规定在18个月内，政府军缩编为50个师，中共军缩编为10个师，合计60个师。其中，中共在东北3个师、华北7个师。"},{"type":"paragraph","text":"[4]陈、舒，指陈毅、舒同，当时分别任新四军军长兼山东军区司令员和政治部主任。"}],"authors":["毛泽东"],"dates":[{"year":1946,"month":6,"day":30}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":447,"page_end":447},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b18610b73b"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
