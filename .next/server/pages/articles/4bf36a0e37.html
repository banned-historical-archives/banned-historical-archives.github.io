script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反对垄断资本残酷剥削　抗议工厂当局解雇工人  英国一万五千飞机制造工人再次罢工  伦敦二千多工人示威支持苏格兰地区造船工人斗争","authors":[],"dates":[{"year":1971,"month":9,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反对垄断资本残酷剥削　抗议工厂当局解雇工人"},{"type":"paragraph","text":"英国一万五千飞机制造工人再次罢工"},{"type":"paragraph","text":"伦敦二千多工人示威支持苏格兰地区造船工人斗争"},{"type":"paragraph","text":"新华社伦敦十二日电 英国飞机制造工业的一万五千多名工人九月十一日罢工，反对垄断资本的残酷剥削，抗议飞机制造工厂无理解雇工人，要求增加工资。"},{"type":"paragraph","text":"英国飞机公司在布里斯托尔的工厂的七千多名工人这一天再次举行罢工，强烈抗议工厂当局任意裁减数百名工人。这是这家工厂的工人们九月份以来反对垄断资本家制造失业的第四次斗争。这次罢工再次使“协和”式飞机的生产陷于停顿。"},{"type":"paragraph","text":"布里斯托尔工厂工人的罢工斗争，得到了这家公司在其他地方的工人的支持。例如，在格罗斯特郡试验基地的数百名工人举行了罢工，支持布里斯托尔工厂工人的斗争。这家公司制造军用武器部门的工人，也积极支持了这次斗争。"},{"type":"paragraph","text":"在这同时，为“协和”式飞机制造引擎的罗尔斯·劳埃斯公司在布里斯托尔的工厂的六千多名工人，十一日也举行了罢工，抗议生活费用上涨，要求增加工资。"},{"type":"paragraph","text":"在米德尔塞克斯的韦斯特兰直升飞机工厂的大约一千八百名工人同一天也举行了罢工，抗议工厂当局企图以关闭工厂解雇工人来向工人转嫁危机。"},{"type":"paragraph","text":"据新华社伦敦十二日电　二千多名英国工人九月十二日在伦敦集会和游行示威，支持苏格兰地区造船工人反对垄断资本家关闭船坞和裁减工人的斗争，抗议垄断资产阶级加紧制造失业，向劳动人民转嫁困难。"},{"type":"paragraph","text":"参加这次抗议行动的群众，有来自最近宣布破产的苏格兰上克莱德造船公司的数百名造船工人，也有伦敦和其他地区的码头工人和建筑、邮电、机械、汽车制造等行业的工人。"},{"type":"paragraph","text":"示威群众在特拉法加广场举行了集会。许多示威者举着的标语牌上写着：“为争取工作的权利而战斗！”“在反对失业的斗争中联合起来！”“支持上克莱德造船公司工人的斗争！”"},{"type":"paragraph","text":"会上，发言的人谴责垄断资产阶级为转嫁经济危机大批裁减工人的罪恶行径。他们表示，坚决支持上克莱德造船公司工人最近占领造船厂和要求停止裁减工人的战斗行动。"},{"type":"paragraph","text":"会后，示威群众高呼抗议口号，在英国首相府前面的街道上游行示威，并且向首相府递交了抗议书。"},{"type":"paragraph","text":"在集会和游行过程中，示威者还散发了大量传单，号召广大工人团结起来坚决斗争。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4bf36a0e37"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
