<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"右派分子黄明信的猖狂进攻: 中央民委下放干部劳动锻炼简报","authors":[],"dates":[{"year":1960,"month":5}],"is_range_date":false,"parts":[{"text":"右派分子黄明信的猖狂进攻: 中央民委下放干部劳动锻炼简报","type":"title"},{"text":"……","type":"paragraph"},{"text":"县委在粮食问题一直是非常关心和照顾我们的。从四月起已按当地农民供应标准供应，但有些同志仍没有彻底端正自己的思想。直到我们开会讨论、批判以后，才得到纠正。","type":"paragraph"},{"text":"（三）","type":"subtitle"},{"text":"更严重的是，在这个期间里，和我们一同来的右派分子黄明信，不仅没有在劳动中得到改造，相反的，他却利用许多同志对他了解不够，以及同来的都是他“看不起的人”的时机，向党和社会主义展开猖狂的进攻。","type":"paragraph"},{"text":"兹将其主要活动，根元述如下：他到公社以后，自先夸大和他分在一个小队的一个党员和一个团员的缺点，认为他们“劳动不好”“很气愤”。污蔑我们下放在一起的同志说：“咱们这个集体我算看透了”（意为是怎私透顶的一伙）。有计划有目的地挑剔带队同志和党团员的“缺点”，采取煸风点火的手法，企图造成大家的不团结，达到像他所说的“掌握实际上的领导权”。","type":"paragraph"},{"text":"其次对党的政策不满，怀疑总路线、大跃进和人民公社，（1）他来公社，一方面看到寺庙已经没有什么了，另方面又看到一些群众念经，对党的宗教信仰自由政策发生了怀疑，认为“四反”搞得过火了。（2）当地听到某些群众不能很好的谈出公社的优越性，而公社将要正式宣布成立时，他怀疑脚步太快了，成立公社的“条件”还不成熟，是党强加上去的。（3）对大跃进更是怀疑，恶毒的称自己在尝“饥饿的劳动”。在公社为了争取今年更大的跃进，提出了亩产五百斤和一千斤的口号，他不去从中学习群众的雄心大志，和冲天干劲，而怀疑指标过高，人工条播有些问题是不是能达到。同时而把自己已参加这个革命的巨流，谓“饥饿的劳动”。（4）随声附合，煸风点火。如有一次，有个社员向他是不是“内地汉人的北京来的”。他对分裂祖国统一的民族主义分子所称的“汉人的北京”不加反驳，反而点头称是，甚至当同志指出这一点并加以纠正时，他尚辩白说上“这是习惯的说法”。还有一次由于劳动地点远，多走了几步，他煸风点火地向群众说：“还没有劳动，光走就累了”。（5）辱骂群众，破坏民族团结。在与群众共同劳动时，有一次一个藏族妇女和另一个同志开玩笑，他声色惧厉地用手点看那个妇女骂“胡说八道”。当场引起了群众的不满。","type":"appellation"},{"text":"总之，他在这段期间里所暴露出来的问题，具体说明了他的反动本质，不仅没有改造，相反的，却随着当地阶级斗争的尖锐和复杂化，更加猖狂了。对此，我们在当地党委的支持下已进行了坚决的斗争，并责令其在最近写出书面材料。在我们和他进行斗争时，他说：“他划为右派，一直都不服气，一直没有从思想上承认过。","type":"paragraph"},{"text":"（四）","type":"paragraph"},{"text":"以上所述，我们在取得一定成绩的同时，也存在一些缺点，甚至原则错误，在当地党委支持下，我们在五月四日到五日召开了全体同志生活检讨会，初步总结和交谈了一个多月来的收获和缺点，并在会上着重对右派分子黄明信的猖狂进攻，进行了坚决的斗争。","type":"appellation"},{"text":"为了克服我们的缺点，更好地进行劳动锻炼，我们认为必须：","type":"appellation"},{"text":"（1）坚决服从当地党委的领导，积极争取工作组的领导和帮助，认真地执行当地党委的指示和服从分配，努力做到县工委对干部“三同五要”的指示。同时，积极争取工作组的领导和帮助，努力完成所交给的工（下缺）","type":"appellation"}],"comments":[],"origin":"四川省委组织部《省级、各部及中央外委、民委、农业部、新华社下放幹部的情况和总结报告》。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e1ee994d9c"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
