script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji5","name":"毛泽东全集第5卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji5.pdf"],"article":{"title":"给十二军军委的信","alias":"","parts":[{"type":"paragraph","text":"给十二军军委的信"},{"type":"paragraph","text":"（1931年6月30日）十二军军委，并转以栗同志及边界工作委员会、卅五军军委："},{"type":"paragraph","text":"二十一日，由石城、瑞金两方面付上一信未知收到否？今日无线电消息，何应钦由南昌进到抚州督战。（下略）"},{"type":"paragraph","text":"文据郝梦龄电台通报称，本军奉命仍随卅四师（廿八）由永丰向上行，由沙溪推进等语。根据各方面情况判断，敌军很迅速地向我们进攻，已毫无疑义，在此形势下决不能容许我们此时做准备工作，大概下月内准备作战。已电令四军及三军去顺昌、沙县，立即摆在将乐、归化筹款，以十天为筹款时期，自然要以敌情为转移，敌不进不集中。五天为集中时间，集中地点在宁化、石城。昨信说十二军筹款不是主要任务，宁化、石城、长汀三县群众工作才是主要任务，现在看来，筹款和群众工作同样是主要任务，并且做群众工作若布置得多，只对筹款有帮助，决不会妨碍筹款的。大约此信到宁化时，卅四师已在清流筹款，开自宁化，布置宁化为主要地点，一面筹款，一面把群众大大发动，做到分配田地。卅五师之一团，应在安远，其另一团及师部应去石城。白水工作暂时放弃，因为石城是很要紧的。军直属队在宁化境内，卅六师在长汀（注意做石、瑞、汀、宁交界工作)。这样以主力在宁化、石城两县各有一部分，筹款与群众工作，两俱顾及。要达此目的，卅四师必须从清流、连城撤宁化，并迅速撤回，才不会妨碍宁化工作。即使清流筹款很有希望，亦不宜超过一个星期至十天，就要撤回。因一星期至十天之久，已经把款子筹得相当多了。宁、石、长汀三县工作，在目前形势之下，只能计划做一个月（一个月后敌允许再延长就是），即是在七月内把三县工作做个又好文多，中心点是要把田地分配。如因地域太宽，部分分配不来，即择重要地点分配，如宁化之安远、牛沙、县城、手口、石牛五点；石城之松山、县城、坪山、沿岗、大犹圩六点；长汀之县城、馆前、古城及四县交界点。每处需有一个阶级认识明确，领导力量强的人去指导，如震林、炳辉、谭政三同志应不在一块，每人专任指导一处，同时兼任巡视一处或两处。每隔十天集合军委机关要开会一次，震林同志一人普遍的出去巡视，专住一处亦可。须知团、连二级负责人很少，能独立指挥群众工作而不错误的，即使一级师长、师政委，亦很难说每一个都有明确的阶级认识而有坚强领导能力。过去各师所做工作之失败，就是证明。你们接到此信，须根据上述原则，重新来一个布置。卅五军在瑞金工作，应注意九堡、沿坝、武阳围、西岗四处，使在一个月内，真正的分配土地，而不要去占会昌。西岗市虽属会昌境内，但界瑞西、于东之间，为于、瑞交界之要地，这处群众工作起来了，影响三县交界很大。所以卅五军应把西岗市的工作，放在自己范围内，并使工作迅速收效。井泉同志，昭良同志应亲往各地巡视，因为卅五军下级干部更不会做群众工作。"},{"type":"paragraph","text":"红军通讯第二期附上，可作士兵政治课教材。"},{"type":"paragraph","text":"总前委书记毛泽东于建宁"}],"authors":["毛泽东"],"dates":[{"year":1931,"month":6,"day":30}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":360,"page_end":361},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d755e1efd6"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
