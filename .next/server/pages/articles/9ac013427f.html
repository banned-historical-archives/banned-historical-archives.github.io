script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"革命造反派工人对资产阶级老爷们的沉重一击　上海制成一百五十吨重型挂车","authors":[],"dates":[{"year":1967,"month":1,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"革命造反派工人对资产阶级老爷们的沉重一击"},{"type":"paragraph","text":"上海制成一百五十吨重型挂车"},{"type":"paragraph","text":"据新华社上海二十日电　上海市汽车运输公司修理厂革命造反派和革命职工，在毛主席“抓革命，促生产”的伟大号召下，最近制造出我国第一台载重一百五十吨的重型平板挂车。这是毛泽东思想的胜利，是对资产阶级反动路线新反扑的又一个沉重的回击。"},{"type":"paragraph","text":"载重一百五十吨的重型平板挂车是专为解决装运一百吨以上的重型工矿设备用的。这种平板挂车如果向国外购买，不但价高、交货期长，而且还要受到帝国主义和修正主义国家的百般刁难。上海市汽车运输公司修理厂广大革命造反派工人最听毛主席的话，最坚决贯彻执行毛主席提出的“抓革命，促生产”的方针。这个工厂的设备差，没有专家，没有资料，没有精密的加工机床，但是革命造反派工人有一颗热爱毛主席的火热的心。他们手里有着红光闪闪的毛主席著作，有战无不胜的毛泽东思想这个最强大的思想武器，能克服前进路上的一切困难。在制造过程中，革命造反派工人反复学习了毛主席的“中国人民有志气，有能力，一定要在不远的将来，赶上和超过世界先进水平”的教导，把在文化大革命中焕发出来的冲天干劲，积极投入到试制平板挂车的生产斗争中去。"},{"type":"paragraph","text":"在全厂革命造反派工人的努力下，在大隆机器厂等兄弟单位的革命职工大力协助下，一辆具有先进技术水平的重型平板挂车，终于制造成功。经过试运，转弯阻力小，装运货物比进口的平板挂车省力。"},{"type":"paragraph","text":"这种重型平板挂车的试制成功，说明了革命造反派工人不但是文化大革命中的尖兵，而且是抓革命，促生产的模范。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"上海文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9ac013427f"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
