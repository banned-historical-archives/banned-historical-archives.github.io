script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"纪念毛泽东诞辰一百周年当代文化精粹博览会揭幕","authors":[],"dates":[{"year":1993,"month":1,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报北京1月13日专电　纪念毛泽东诞辰一百周年中华当代文化精粹博览会拉开序幕。阿沛·阿旺晋美、谷牧等出席了今天的新闻发布会。"},{"type":"paragraph","text":"博览会由毛笔书法、硬笔书法、国画、篆刻四大系列组成。参加评选的书画必须有以毛泽东和他的战友们的诗词或者著述片断为内容，以及健康向上、格调清新的自选书画作品。体现“继先驱之志，抒赤子之情，唱奋进之歌，走改革之路”之主题。1993年12月26日举行博览会颁奖剪彩仪式，并推出电视歌舞晚会。"},{"type":"paragraph","text":"博览会由香港国佳实业有限公司独家提供重资支持承办。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"df547d3ec4"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
