script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"广西壮族自治区党委整党办公室关于填报“三种人”及犯严重错误人员卡片的一些问题的通知","authors":[],"dates":[{"year":1986,"month":12,"day":11}],"is_range_date":false,"parts":[{"text":"广西壮族自治区党委整党办公室关于填报“三种人”及犯严重错误人员卡片的一些问题的通知","type":"title"},{"text":"各地、市、县委、柳铁党委整党办，区直各单位、各大专院校党委（党组），防城港区工委：","type":"appellation"},{"text":"现将一些单位在填报“三种人”及犯严重错误人员卡片工作中，提出的几个问题说明如下：","type":"paragraph"},{"text":"一、在“处遗”、清理“三种人”中，因“文革”中的错误被定为“三种人”、严重违法乱纪分子和犯严重错误的定性结论不是政治帽子，不向外宣布，由组织内部掌握。","type":"paragraph"},{"text":"二、在“处遗”、清理“三种人”中，已结论为“三种人”、犯严重错误的，要如实填入《卡片》的“结论处理情况”和《名册》的“定性处理情况”的栏目中。在结论处理时只给予处分，没有定性为“三种人”的，不再定性，凡已作开除党籍或行政开除公职处理的，均填入“三种人”登记卡片。","type":"paragraph"},{"text":"三、属于“文革”中打死人范畴的，已结论为严重违法乱纪或严重违法乱纪分子的，均填入括弧内注明“严重违法乱纪分子”的《“三种人”登记卡片》。结论为严重违法乱纪的，在“结论处理情况”一栏写明。定为严重违法乱纪。在结论处理时只给予处分，没有定性的，不再定性，凡已作开除党籍或行政开除公职的，填入括弧内注明“严重违法乱纪分子”的《“三种人”登记卡片》。","type":"paragraph"},{"text":"四、对严重错误和犯有错误之间结论处理时没有定性的，不再定性，以以往的统计表为依据，凡过去统计在严重错误一栏的就填写《犯严重错误人员登记卡片》，统计在犯有错误一栏的就不填卡片了。","type":"paragraph"}],"comments":[],"origin":"( 《处理“文革”遗留问题、清理“三种人”文件汇编》，广西壮族自治区党委整党办公室，一九八六年八月。)","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"广西文革","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6275f71b23"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
