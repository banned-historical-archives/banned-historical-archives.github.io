script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中华全国总工会关于研究职工罢工请愿等问题的通知","authors":[],"dates":[{"year":1957,"month":4,"day":18}],"is_range_date":false,"parts":[{"text":"中华全国总工会关于研究职工罢工请愿等问题的通知","type":"title"},{"text":"主送：各产业工会全国委员会（筹委、工会），省、自治区、直辖市工会联合会","type":"paragraph"},{"text":"从最近情况来看，职工群众罢工请愿事件不断增加。职工群众罢工请愿事件的发生，大部分是由于职工群众的正当要求得不到解决——企业行政和工会的官僚主义所致。所以充分发扬民主，建立和健全企业的民主管理制度，加强群众监督，对克服企业行政和工会的官僚主义、解决人民内部的矛盾有很大的作用。工会组织在解决职工罢工请愿问题和加强企业民主管理制度当中负有重大的责任。","type":"paragraph"},{"text":"为了做好这一工作，工会各级领导机关主要领导干部中，要有专人领导职工群众接待工作。同时今后还必须指定专人经常有系统的搜索并研究整理一些专门问题的材料，免得需要时临渴掘井、东拼西凑，以至写的报告既缺乏内容，又不解决问题。先暂时拟定下列几个问题：","type":"paragraph"},{"text":"一、关于罢工请愿问题（一办、三办）","type":"paragraph"},{"text":"二、关于企业民主管理问题（二、组织部、三办）","type":"paragraph"},{"text":"三、关于处理临时工和剩余劳动力问题（一办）","type":"paragraph"},{"text":"四、关于目前某些副食品的物价上涨对于职工生活的影响和反映的问题（一办、生活部）","type":"appellation"},{"text":"五、关于职工宿舍问题（生活部）","type":"paragraph"},{"text":"六、关于职工老弱、战残、退休、养老问题（劳动保险部）","type":"paragraph"},{"text":"七、关于职工政治思想教育问题（宣传部）","type":"paragraph"},{"text":"各地方工会各产业工会可以根据自己工作的具体情况和需要，自然可以进行某些其他专门性问题的调查研究。总之上述问题的材料，希望你们能及时的报送全总。","type":"paragraph"},{"text":" 中华全国总工会1957年4月18日中华全国总工会盖章","type":"paragraph"}],"comments":[],"origin":"上海市档案馆，C1-2-2271，第12-13页。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c4c2b2821b"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
