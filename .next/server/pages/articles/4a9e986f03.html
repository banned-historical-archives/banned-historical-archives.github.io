" crossorigin="">{"props":{"pageProps":{"books":[{"id":"wenji2","name":"毛泽东文集第二卷（1999）","type":"pdf","internal":false,"official":true,"author":"中央文献研究室","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/wenji2.pdf"],"article":{"title":"关于调查地主资产阶级和国民党军官的通知","description":"根据中央档案馆保存的抄件刊印。","dates":[{"year":1940,"month":9,"day":6}],"parts":[{"text":"关于调查地主资产阶级和国民党军官的通知","type":"title"},{"type":"appellation","text":"恩来、剑英、克农、漱石："},{"type":"paragraph","text":"甲、将大资产阶级和民族资产阶级加以区别，以人为单位，每类每省调查数十人至一百人。"},{"type":"paragraph","text":"乙、大资产阶级是带买办性的，与外国资本有联系，大银行、大商业及与外国资本联系的大工业属之，他们是现时主要当权者，如蒋介石、孔祥熙、宋子文、虞洽卿等是。"},{"type":"paragraph","text":"丙、民族资产阶级是受大资产阶级统制，与外国资本联系少，现时还基本上没有政权，主张团结抗战的，如陈光甫、穆藕初、康心如、范旭东等是。"},{"type":"paragraph","text":"丁、将大地主与开明绅士加以区别，亦以人为单位每类调查数十人至一百人。"},{"type":"paragraph","text":"戊、分省调查，请恩来负责调查四川、云南、贵州、湖南、湖北五省，克农负责调查广西、广东、福建三省及香港，小姚负责调查江西、浙江、安徽、江苏四省及上海。克农、小姚的材料限于十二月一日以前托人带交恩来带来延安，给七大用。"},{"type":"paragraph","text":"己、每人为立一小传，要有籍贯、年龄、出身、履历、派别、资产活动、嗜好、政治动向、对我态度等项。"},{"type":"paragraph","text":"庚、关于军官调查，总司令、军长、师长、团长四项，每人立一小传，传内亦有履历、派别、资产活动、政治动向、对我态度等项。"},{"type":"paragraph","text":"辛、以上调查统称名人录，先从经济、军事两方着手，将来可发展到政治、文化方面。"},{"type":"paragraph","text":"毛"},{"type":"paragraph","text":"九月六日"}],"comment_pivots":[{"part_idx":1,"offset":11,"index":1},{"part_idx":6,"offset":53,"index":2}],"is_range_date":false,"authors":["毛泽东"],"comments":["剑英，即叶剑英，当时任中共中央南方局常委、八路军参谋长。克农，即李克农（一八九九——一九六二），安徽巢县（今属巢湖市）人，当时任八路军驻桂林办事处主任。漱石，即饶漱石（一九○三——一九七五），江西临川人，当时任中共中央东南局副书记。","小姚，指饶漱石。"],"page_start":311,"page_end":312,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4a9e986f03"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
