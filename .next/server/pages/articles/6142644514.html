script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"在朴正熙集团和买办资本家的剥削和压榨下  南朝鲜劳动妇女处境十分悲惨","authors":[],"dates":[{"year":1974,"month":3,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"在朴正熙集团和买办资本家的剥削和压榨下"},{"type":"paragraph","text":"南朝鲜劳动妇女处境十分悲惨"},{"type":"paragraph","text":"新华社平壤一九七四年三月七日电　汉城消息：在朴正熙集团和买办资本家的剥削和压榨下，南朝鲜劳动妇女处境十分悲惨。"},{"type":"paragraph","text":"在南朝鲜，有百分之八十的女工由于劳动条件恶劣，患有各种各样的职业病。女工们一天要工作十到十二小时，在运输等部门中有时一天要劳动二十小时，而她们得到的工资维持不了最低的生活水平。汉城、釜山、大邱、光州等地公共汽车的女售票员，在一天的辛勤劳动以后，还被车主及其走狗搜身，并且经常被拳打脚踢，有的被任意解雇。"},{"type":"paragraph","text":"南朝鲜女工根本不能与男工同工同酬，她们往往拿不到男工工资的一半。工厂中没有任何照顾妇女的劳动保护设施，有的女工在怀孕或生孩子以后就被赶出厂门。"},{"type":"paragraph","text":"南朝鲜的农村妇女的遭遇更加不幸。连南朝鲜的报刊也透露：南朝鲜的农村妇女“不是在生活，而是在熬日子，……老是为今天的晚饭担忧，这就是她们的全部生活”。"},{"type":"paragraph","text":"朴正熙集团为了赚取外汇，缓和经济危机，招引许多外国游客到南朝鲜“观光”，并且以“招待”这些游客为名，迫使饥寒交迫的南朝鲜妇女去当妓女。一九七三年，朴正熙集团通过这种肮脏的行业赚取了近一亿二千万美元。"},{"type":"paragraph","text":"南朝鲜妇女正在进行各种形式的斗争，争取生存权利和维护民族尊严。汉城梨花女子大学等学校的学生不久前在汉城国际机场示威，反对朴正熙集团蹂躏南朝鲜妇女的卖国勾当。今年二月，南朝鲜江原道春川的四百五十名女工为维护工人的权益和组织工会的权利进行了顽强的斗争。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6142644514"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
