script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"对纳吉及其同谋犯的判决是对修正主义的致命谴责匈捷保舆论欢迎严惩纳吉等反革命罪犯","authors":[],"dates":[{"year":1958,"month":6,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【据新华社布达佩斯18日电】　此间报纸欢迎匈牙利最高法院人民法庭对反革命罪犯纳吉和他的同谋者的判决。各报今天发表的社论都认为，人民法庭严惩这批反革命暴乱的组织者和领导者是正确的，完全符合匈牙利所有正直的劳动者的愿望。"},{"type":"paragraph","text":"“人民自由报”的社论说，匈牙利劳动人民早就期待人民法庭不但惩处一般反革命罪犯而且更要严惩1956年10月反革命事件的主谋者。社论说，从对纳吉及其同谋者的审判中得出的最重要的教训是，必须不断提高警惕来保卫工人阶级政权。"},{"type":"paragraph","text":"【据新华社布拉格18日电】　“红色权利报”今天写道，对于纳吉·伊姆雷和他的同谋犯的判决是对形形色色的修正主义的致命谴责。"},{"type":"paragraph","text":"这家报纸说，匈牙利事件清楚地说明了修正主义同背叛工人阶级事业这种最肮脏的行为是有联系的。"},{"type":"paragraph","text":"南斯拉夫大使馆是反革命分子的避难所这个事实，是说明“实际执行”在南斯拉夫共产主义者联盟纲领中和南共第七次代表大会上已经充分表现出来的观点的例子。"},{"type":"paragraph","text":"这家报纸强调说，南斯拉夫修正主义和纳吉修正主义的联系再一次证明了认为修正主义对社会主义是主要危险的估计是正确的，因此，有必要对修正主义进行毫不调和的斗争。"},{"type":"paragraph","text":"【据新华社索非亚18日电】　保加利亚“工人事业报”、“祖国阵线报”、“农业旗帜报”今天发表社论，对匈牙利最高法院判处帝国主义走狗纳吉·伊姆雷及其同伙死刑和徒刑表示热烈欢迎。"},{"type":"paragraph","text":"“工人事业报”还严厉谴责了自称为共产党员的南斯拉夫领导人对匈牙利事件采取的空前未有的无耻立场。社论指出，保加利亚人民把南斯拉夫领导人对匈牙利事件所采取的这种无耻立场比做是“物以类聚”。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e3bce646f9"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
