script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"本市无产阶级革命派举行电视斗争大会愤怒斗争资产阶级代理人陈丕显革命群众愤怒揭发批判了这个资产阶级孝子贤孙包庇和纵容反动资本家的滔天罪行","authors":[],"dates":[{"year":1968,"month":5,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　昨天，本市无产阶级革命派，高举毛泽东思想伟大红旗，彻底清算反革命两面派陈丕显实行资本主义复辟罪行的电视斗争大会。"},{"type":"paragraph","text":"会上揭发出来的大量事实表明，陈丕显是道道地地的国民党反动派、资产阶级在我们队伍里的代理人。在解放后的历次政治运动中，这个资产阶级的孝子贤孙总是紧紧地站在资产阶级一边，包庇和纵容反动资本家进行破坏和捣乱。这次大会，使广大无产阶级革命派和革命群众受到了一场生动的阶级斗争和路线斗争的教育，更深刻地认识到:我们和陈丕显之流的斗争，“是中国共产党及其领导下的广大革命人民群众和国民党反动派长期斗争的继续，是无产阶级和资产阶级阶级斗争的继续”。"},{"type":"paragraph","text":"会上，无产阶级革命派首先愤怒地揭发和批判了陈丕显疯狂抵制无产阶级司令部的指示，极力包庇、美化、纵容资产阶级，破坏社会主义教育运动的滔天罪行。早在一九六三年年底，四清运动刚一开始，陈丕显就以党内另一个最大的走资派和反革命修正主义分子陆定一的黑报告为依据，精心炮制了一个“示范讲解”，恶意地歪曲毛主席的有关指示，并亲自到上海无线电一厂去放毒。无产阶级革命派还揭发陈丕显在这场无产阶级全面反击资产阶级猖狂进攻的斗争中，大肆吹捧、美化资产阶级。他亲手导演了一出为资本家“评功摆好”的丑剧，把不少反动资本家评为“工商界先进工作者”，千方百计地妄图把运动拉向右转。更令人不能容忍的是，在社会主义教育运动全面展开后，陈丕显同曹荻秋密谋策划，让一小撮反动资本家和牛鬼蛇神，乔装打扮，隐瞒身份，冒充“四清”工作队队员，到生产队去进行破坏和放毒。揭发到这里，群情激愤，“打倒陈丕显!”“打倒曹荻秋!”“打倒反动资本家!”的怒吼声响彻会场内外。在铁一般的事实面前，陈丕显这个反革命两面派不得不低下头来。"},{"type":"paragraph","text":"接着，无产阶级革命派又揭发和批判了陈丕显百般包庇五毒俱全的反动资本家，破坏“五反”运动的种种罪行。"},{"type":"paragraph","text":"一件件、一桩桩触目惊心的事实，激起了会场内外广大无产阶级革命派和革命群众的万丈怒火，大家一次又一次地高呼:“打倒资产阶级的代理人陈丕显!”“打倒中国赫鲁晓夫!”“反对右倾投降主义!”“坚决粉碎右倾翻案风!”"},{"type":"paragraph","text":"这次电视斗争大会，是由上海市革命委员会工交组，上海工人革命造反总司令部及上海市财贸系统革命造反委员会联合召开的。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"曹荻秋","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c4a9e8d4b2"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
