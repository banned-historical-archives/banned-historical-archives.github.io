script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"社会学在新中国还有地位吗？","authors":["中国人民大学","吴景超"],"dates":[{"year":1957,"month":1}],"is_range_date":false,"parts":[{"text":"社会学在新中国还有地位吗？","type":"title"},{"text":"中国人民大学吴景超","type":"authors"},{"text":"1956年10月19日的“真理报”上，登载了一篇苏联科学院通信院士费多塞也夫所写的一篇文章，报导关于国际社会学会第三次会议的情况。这次会议，有57个国家的500个代表参加，其中也包括苏联及东欧人民民主国家的代表。文章中除叙述了在会议中马克思主义者与非马克思主义者的思想斗争以外，在文章的末尾，特别指出一点，就是西方国家的社会学者，发表了大量的关于劳动、文化、生活、家庭、道德、都市与乡村等问题的文献，但是这些材料，在苏联及人民民主国家中，没有受到足够的重视，社会科学工作者没有对于它们进行分析与批判。这一缺点，应当很快地加以矫正。","type":"paragraph"},{"text":"看过了这篇文章以后，又得到一次机会与波兰科学院的奥尔格尔德·魏得志谈话，他提到了参加国际社会学会会议的情形，并送给我一篇华沙大学的一位同志在这次会议所宣读的论文。当时参加谈话的，还有过去搞社会学的潘光旦、严景耀及雷洁琼几位同志。","type":"paragraph"},{"text":"这一切，使我想到中国的社会学往何处去的问题。","type":"paragraph"},{"text":"在解放以前，中国许多大学中都设立了社会学系。1952年院系调整之后，这些社会学系都一概取消了。过去搞社会学的人，大部分都改业了。当然这不等于说，过去社会学所研究的对象，现在没有人研究了。不是这样的。社会学的某些部分，如劳动问题、民族问题、在我们的高等学校中，现在得到前所未有的发展机会。但是也有些部分，现在还未得到适当的安排。我在这篇短文中，只想对于这些部分的安排，提出一个初步的意见。","type":"paragraph"},{"text":"社会学原理及近代社会学思潮这些课程，是旧社会学的核心部分。它是历史唯物论的对立物。资产阶级的学者，以社会学的理论来与马克思主义进行对抗。因此，整个地说来，资产阶级的社会学，其立场、观点与方法，基本上是错误的。但是在百家争鸣的时代，我认为在我国的哲学系中，还有设立社会学一门课程的必要。在这一门课程中，可以利用历史唯物论的原理，对于资产阶级社会学进行系统的批判，同时也尽量吸收其中的一些合理部分，来丰富历史唯物论。我国的历史唯物论者，在与资产阶级社会学进行思想斗争的过程中，也可以提高马克思列宁主义水平。","type":"paragraph"},{"text":"旧社会学还有其他一些部分，如人口理论及统计，社会调查(都市社会学与乡村社会学都可并入社会调查之内)，婚姻，家庭，妇女，儿童等问题，社会病态学中的犯罪学部分，都可酌量并入其他学院有关各系之内。开设这些课程，当然不能采用旧的课本，讲授时也不能采取旧的立场观点与方法。但是以历史唯物论的知识为基础，来研究这些问题，对于我国社会主义社会的建设，也还是有用的。","type":"paragraph"},{"text":" 来源：《新建设》月刊，1957年1月号。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e92dcd9745"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
