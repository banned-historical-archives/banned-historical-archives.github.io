" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"罗瑞卿关于镇反情况综合向中央的报告（第15号简报）（节录）*","authors":[],"dates":[{"year":1953,"month":7,"day":31}],"is_range_date":false,"parts":[{"text":"罗瑞卿关于镇反情况综合向中央的报告（第15号简报）（节录）*","type":"title"},{"text":"镇反运动已在全国范围内接近结束。……","type":"paragraph"},{"text":"东北、华北运动已经结束。……。","type":"paragraph"},{"text":"中南、华东、西南、西北4个大区除上海、广东及云南等少数省、市外，运动也都基本结束。……","type":"paragraph"},{"text":"目前存在着的主要问题和情况是：","type":"paragraph"},{"text":"……","type":"paragraph"},{"text":"第二、华东、中南、西南、西北四大区的取缔反动会道门运动目前绝大部分地区已经结束或接近结束。没有全部完成的有上海市和广东、云南、贵州、四川等省一部分地区。第三阶段取缔运动是在一、二阶段的胜利威势和成功经验基础之上进行的，因而一般开展得比较广泛，挖得也较深，在全国范围内已基本摧毁了反动会道门的组织，教育了群众。据不完全统计，共捕反动道首20660名，登记和集训中小道首190201名，退道道徒已达3986306名。据河南、江苏统计道徒退道达95％以上。各地都破获了一批专案，中南区在运动中即破获专案272起，云南不完全统计，共破获反动会道门隐蔽点——地洞、夹墙及双层楼板442处，从其142处中掘出反动道首263名，陕西兴平县亦破获一贯道的地洞11处，从中捕获大道首23名。目前已结束运动的地区，除了还有少数专县由于地处边缘或农忙生产、灾荒严重等原因没有发动取缔外，在已经过取缔的地方，也还有少数“夹生”地区，如：湖南邵阳专区因为春耕紧迫，急忙收兵，没有彻底解决问题。另外在广东、广西、江苏、浙江、福建、贵州、陕西、西安等省、市发现少数残余漏纲道首，仍在阴谋恢复组织或利用佛教名义在合法掩护下进行活动。甚至如陕西的黄陵、宜川、鄜县、洛川、宜君等五县在镇反运动初期已进行过取缔工作，3月以来还先后发生两次武装暴动，洛川一个县在暴动中即有400余道徒参加活动。说明：彻底肃清反动会道门的工作必须和各种工作密切结合进行并需要一个长时期才能完成。各地在运动基础上应加强调查研究和侦察工作，以便适时发现和打击残余分子。","type":"paragraph"},{"text":"……","type":"paragraph"},{"text":"* 此件并送各大区公安局、各省市公安厅局","type":"paragraph"}],"comments":[],"origin":"《取缔反动会道门工作历史资料汇编（1948－1992年）》，公安部一局编印， 2009年。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"罗瑞卿","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2025623de2"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
