<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"南斯拉夫私人手工业工场日增  业主依靠剥削大发其财","authors":[],"dates":[{"year":1962,"month":2,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"南斯拉夫私人手工业工场日增"},{"type":"paragraph","text":"业主依靠剥削大发其财"},{"type":"paragraph","text":"新华社22日讯　据贝尔格莱德消息：南斯拉夫的私人手工业工场日益增多，它们依靠剥削和损害社会利益大发其财。"},{"type":"paragraph","text":"去年12月8日的南斯拉夫《世界报》透露，目前在南斯拉夫“社会成分”（即所谓社会主义成分）的手工业工场约有七千五百家，拥有二十万名工人；而私有成分手工业工场却有十一万五千多家，雇佣的工人达三十万名。去年11月19日的《胜利报》报道，“在铁托格勒地区，社会成分的手工业已停滞了几年，而私有成分的则在急剧增加。”如1960年9月份，在铁托格勒有九十家私人手工业工场，一年后，增加到了一百五十四家。去年12月7日的《政治报》也说，在南斯拉夫“私人手工业工场越来越多。”"},{"type":"paragraph","text":"《新闻晚报》称，南斯拉夫有些私人手工业者“拥有很大的工场，成交巨额生意”。"},{"type":"paragraph","text":"南斯拉夫报纸透露，许多私人企业主雇佣的工人有高达五十名至二百五十名的，虽然按官方法令，私人手工业主雇佣的工人不得超过五人。私人手工业主从官方的经济企业和机关那里包揽大批生意。"},{"type":"paragraph","text":"据南斯拉夫报纸报道，“社会主义”的企业为了牟利，把价值几千万甚至上亿第纳尔"},{"type":"paragraph","text":"（南币）的生意包给私人手工业主。南报还说，在“官方的工业和私人手工业之间的协作”中“投机现象最多”。《世界报》说，南斯拉夫区人民委员会“没有兴趣在本地发展社会成分的手工业，因为社会成分的手工业必须把捐税都缴给联邦”，但它们“倒关心在本地有尽量多的私人手工业工场，因为工场的主人把绝大部分税收缴给区人民委员会”。它们“帮助开设私人工场”，“把这看作自己资金的来源”。"},{"type":"paragraph","text":"《星期三消息报》说，区人民委员会还帮助私人手工业主“逃避关于雇佣劳动力的法令。”《共产主义者》周报报道说，一些区人民委员会的官员在税收问题上，甚至帮助私人手工业主弄虚作假。"},{"type":"paragraph","text":"在私人手工业工场劳动的工人和学徒遭受着严重的剥削。《劳动报》说，私人手工业主“依靠剥削别人和损害社会来发财。”《政治报》说，在私人手工业主那里劳动的工人们“没有社会保险”，被迫“廉价出卖劳动力。”去年12月8日的《政治报》说，据对贝尔格莱德八百多名学徒的调查，“私有成分中的34．9％的学徒经常加班劳动”；在较小的地方，学徒"},{"type":"paragraph","text":"“被迫加班劳动”的“百分比更大。”但学徒每月得到的报酬却很少，很多人甚至“根本得不到劳动报酬。”"},{"type":"paragraph","text":"私人手工业主则过着异常阔绰的生活。许多人每年的纯收入达到一千万第纳尔以上。《新闻晚报》说，在贝尔格莱德有一百多名私人手工业主，在1960年获得了“超过一千万第纳尔的收入”，有的甚至达到七千万第纳尔。"},{"type":"paragraph","text":"《战斗报》毫不掩饰地声称，现在在南斯拉夫是私人手工业者的“黄金时代”，他们在“过去从来没有像近十年来这么‘吃香’”。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1c46bb7a59"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
