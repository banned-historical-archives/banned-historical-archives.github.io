script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"《解放军报》发表重要评论要继续肃清林彪、“四人帮”流毒对任何事物都应该实事求是采取分析的态度","authors":[],"dates":[{"year":1979,"month":6,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京六月十四日电　《解放军报》六月十三日发表题为《继续肃清林彪、“四人帮”的流毒》的评论指出:继续肃清林彪、“四人帮”的流毒，要用极大的注意力，宣传三中全会的精神，进行辩证唯物主义的思想路线的教育。"},{"type":"paragraph","text":"评论说:这些年来，林彪、“四人帮”唯心主义盛行，形而上学猖獗，影响所及，使我们的一些同志至今还容易犯对人对事不实事求是的毛病。前一段时间批判林彪、“四人帮”，打碎他们强加给人们的精神枷锁，有的人就误以为不要坚持四项基本原则了；现在批判怀疑四项基本原则的错误思潮，有的人又误以为要回到粉碎“四人帮”以前的状况中去。我们的同志特别是领导干部，一定要端正思想路线，要始终保持清醒的头脑，全面地辩证地看待问题，对待任何事物都应该实事求是，采取马克思主义的分析态度。"},{"type":"paragraph","text":"评论说:当前，我们党和国家政治生活的主流，是团结一致向前看，团结一致搞四化。伴随着这革命的主流也还有支流，这就是少数人怀疑、否定三中全会方针政策的“左”的思潮和怀疑、否定四项基本原则的右的思潮。因此，教育我们一些同志抵制和克服这两种错误思潮的影响，是政治思想工作的一项重要任务。"},{"type":"paragraph","text":"评论说:为了帮助受影响的同志提高认识，转到正确的轨道上，我们要做的一个非常重要的工作，就是继续肃清林彪、“四人帮”的流毒，划清正确和错误的界限，把我们的思想和行动统一到三中全会的精神上来。"},{"type":"paragraph","text":"评论从四个方面划清正确和错误的界限:"},{"type":"paragraph","text":"一、要划清社会主义同资本主义的界限，还要划清科学社会主义同林彪、“四人帮”那种以极左面目出现的主张普遍贫穷的假社会主义的界限，弄清楚我们现在坚持能够促进生产力发展的生产资料公有制，坚持社会主义按劳分配的原则，坚持自力更生为主争取外援为辅、学习和引进外国先进技术发展我国社会主义经济建设的方针，努力按照客观经济规律办事，等等，我们坚持了这一些，也就是坚持了科学社会主义。"},{"type":"paragraph","text":"二、要划清无产阶级专政和资产阶级专政、社会主义民主同资产阶级民主的界限，还要划清无产阶级专政和社会主义民主，同林彪、“四人帮”以“全面专政”为名搞封建法西斯专政，或以搞“大民主”为名煽动无政府主义的界限，弄清楚我们现在落实各方面的政策，纠正一大批冤案、错案、假案，解决历史上遗留下来的一系列问题，恢复和发扬了社会主义民主，特别是三中全会以后出现了毛泽东同志生前多年盼望实现的生动活泼的政治局面，也就大大有利于巩固无产阶级专政。"},{"type":"paragraph","text":"三、要划清什么是加强党的领导，什么是削弱和不要党的领导的界限，还要划清党的民主集中制的领导，同林彪、“四人帮”以帮代党、搞家长制的界限，弄清楚我们现在恢复和发扬党的理论联系实际、密切联系群众、批评和自我批评的三大作风，健全民主集中制，正是增强了全党的团结，增强了党和群众的团结，从而大大提高了党的威信，坚持和加强了党对国家和社会生活的领导。"},{"type":"paragraph","text":"四、要划清什么是马克思主义、什么是修正主义的界限，还要划清马列主义、毛泽东思想的科学体系，同林彪、“四人帮”搞“句句是真理”，利用片言只语，借高举以营私的假马克思主义的界限。我们坚持实践是检验真理的唯一标准，坚持领袖是人不是神，坚持完整地准确地掌握马列主义、毛泽东思想的科学体系。总之，我们坚持了实事求是这个马克思主义的精髓，恢复了毛泽东思想科学体系的本来面目，维护了毛泽东同志作为一个伟大革命家在中国革命史和世界革命史上应当享有的崇高地位，这就真正高举了马列主义、毛泽东思想的伟大旗帜。"},{"type":"paragraph","text":"评论说，粉碎“四人帮”两年多来，我们在华国锋同志为首的党中央领导下，对林彪、“四人帮”的批判取得了伟大成绩，人们的思想极大地获得解放。我们这样做，同时也就是在努力恢复并坚持遭到林彪、“四人帮”严重破坏的四项基本原则。但是必须看到，林彪、“四人帮”的长期破坏，在各方面造成了灾难性的恶果，不是一个早上就可以把他们的流毒统统去掉。他们打着红旗，仗恃手中窃取的权力，利用党在人民群众中的崇高威望，把社会主义当资本主义批，把马克思主义当修正主义批，反复宣传、强制推行他们的假社会主义、假马克思主义那一套。什么按劳分配是产生新资产阶级分子的经济基础，什么物质利益原则是资产阶级福利主义，什么发展生产是修正主义的唯生产力论，什么取消农村集市贸易、自留地、实行穷过渡是坚持社会主义，什么全面专政是无产阶级专政理论的新发展，什么句句是真理、句句照办是高举红旗，什么突出不突出政治是两条路线的斗争，什么划线站队是头等重要的问题，等等。这些东西搞了十多年，流毒确实非浅。今天，当我们党采取措施恢复科学社会主义的时候，不是有的人说这是复辟资本主义吗?当我们党采取措施纠正假社会主义的那些极左的东西的时候，不是有的人又说是取消社会主义吗?可见，拨乱反正，正本清源，决非易事，肃流毒的工作还是一个长期的艰巨的任务。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"name":"四人帮","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"53e3bdd10f"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
