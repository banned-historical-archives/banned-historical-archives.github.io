" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"沈阳部分戏曲工作者对演现代戏有抵触情绪","authors":["任步芳"],"dates":[{"year":1964,"month":7,"day":14}],"is_range_date":false,"parts":[{"text":"沈阳部分戏曲工作者对演现代戏有抵触情绪","type":"title"},{"text":"任步芳","type":"authors"},{"text":"新华社沈阳讯    沈阳市文艺界有一些人对上演现代戏采取怀疑、抵触的态度。初步了解，有以下几种表现：","type":"paragraph"},{"text":"认为京剧不能演现代戏。有人说，京剧在唱腔、表演方面，都已经发展到相当成熟的地步，已经定了型，如果演现代戏就破坏了它的艺术完整性。有人认为，京剧的特点是唱、做、念、打，而现代戏根本发挥不了这些特长。一些功底较厚的演员，认为演现代戏后原有的功底都用不上了，几十年的舞台生活经验都白费了。","type":"paragraph"},{"text":"认为演现代戏仅仅是“一阵风”。有人举例说，一九五三年提出演现代戏，一九五六年又搞传统戏展览；这次又提倡现代戏，弄得剧目贫乏，一九六二年又举办老戏展览；这次又提价提倡演现代戏，过一阵子还得演老戏。他们还说什么“现在批判过去，将来批判现在，这是事物发展的规律。”","type":"paragraph"},{"text":"留恋旧的一套。有的导演和主要演员主张，亦剧演现代戏不能从生活出发，还得从戏曲程式出发。有些人留恋帝王将相、才子佳人戏，他们认为这些戏有技巧，有功夫，人物有表演余地。","type":"paragraph"},{"text":"认为演现代戏吃不上饭。有些人把演现代戏和经济收入对立起来，说：“要先演传统戏，说旧书，把钱赚足了、底子攒厚了，才能演新戏。”（实际情况并不是这样，演现代戏的剧场多数比往年同期增加了收入，有的还有了盈余。）","type":"paragraph"},{"text":"个别演员对深入生活持怀疑态度。有些人认为：“深入生活不项用，没有技巧还是演不好戏。”有的演员对赵燕侠深入部队生活，扮演阿庆嫂表示怀疑，说：“深入生活回来得用‘云手’演戏。她到部队体验生活，演出时能用上多少？”还有个别演员厌恶深入生活和同工浓兵接触。有的演员下乡后回来说：“今后下乡最多不能超过一个月。你们看，头发、胡子这么长，哪里象个演员！”","type":"paragraph"},{"text":"来源：根据1964年7月14日新华社《内部参考》。","type":"paragraph"}],"comments":[],"origin":"美国图书馆收藏","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"46b3c39083"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
