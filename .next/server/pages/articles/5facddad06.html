" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji27","name":"毛泽东全集第27卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji27.pdf"],"article":{"title":"歼灭白崇禧部的部署","alias":"","parts":[{"type":"paragraph","text":"歼灭白崇禧部的部署！"},{"type":"paragraph","text":"（1949年9月9日）林、邓："},{"type":"paragraph","text":"关于进攻部署：（一）陈邓华两兵团?第一步进占韶关、翁源地区，第二步直取广州，第三步邓兵团留粤，陈兵团入桂，包抄白崇禧后路。陈兵团不派任何部队入湖南境，即不派部去郴州、宜章等处。（二）程子华兵团除留一个军于常德地区，另一个军已到安化地区外，主力两个军取道沅陵、芷江直下柳州。（三）另以三个军经湘潭、湘乡攻歼宝庆之黄杰匪部，与程子华出芷江的两个军摆在相隔不远的一线上。对衡阳地区之白崇禧部，只派队监视，而不作任何攻歼他的部署和动作。（四）这样一来，自崇禧部非迅速向桂林撤退不可，而这就是我们的自的。判断白部在湖南境内决不会和我们作战，而在广西境内则将被迫和我们作战。因此，陈兵团"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军委起草的给第四野战军兼华中军区司令员林彪和第二政治委员邓子恢的电报。"},{"type":"paragraph","text":"[2]陈邓华两兵团，指第二野战军第四兵团和第四野战军第十五兵团，兵团司令员分别为陈和邓华。"},{"type":"paragraph","text":"[3]白崇禧，当时任国民党军华中军政长官公署长官。[4]程子华兵团，指第四野战军第十三兵团，兵团司令员程子华。[5]宝庆，即湖南邵阳。[6]黄杰，当时任国民党军第一兵团司令官。"},{"type":"paragraph","text":"歼灭白崇禧部的部署不要派部出郴、宜。现在茶陵、攸县之我军，亦不要作攻歼衡阳白匪之部署，而应两路齐出芷江、宝庆，位于百匪西侧。然后，以芷江之两个军，先期突然出柳州，在柳州地区占立根据地。估计百匪三个军（第七军、第四十六军、第四十八军）及鲁道源\"之五十八军在我主力威胁面前，不敢过早分散其主力。李品仙防御柳州一带之兵力必不甚多。我军（两个军）可能在柳州以西以北区域即融县、罗城、天河、宜山、思恩、宜北区域建立根据地，并切断柳州通贵州的铁道线。陈兵团则于占领广州后，即经梧州向宾阳、南宁地区前进，位于广西南部。我在宝庆之三个军（主力）则于白韭向桂林撤退时，尾敌南进。（五）以上三路我军（共八个军），在进入广西后，第一步不是急于寻找白匪主力作战，而是立稳脚跟，查明情况，联系群众和结合我在广西境内的游击部队（桂南、桂北均有）。第二步，再各个歼灭白匪主力。白崇禧是中国境内第一个狡猾阴险的军阀，我们认为非用上述方法，不能消灭他。（六）百崇禧的最后一条退路是云南。他以回云南的口号拉住了鲁道源，故在百、鲁退入广西后，可能即令鲁道源军或再配以一部桂军入云南。如果是这样，那时我们应考虑从陈兵团先抽一部（例如一个军）出云南，配合我在云南的游击队在云南先建立根据地。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"九月九日[1]鲁道源，当时任国民党军第十一兵团司令官兼第五十八军军长。[2]李品仙，当时任国民党军桂林绥靖公署主任。[3]融县，旧县名，即今广西融安县。[4]天河，旧县名，1952年并入广西罗城县。"}],"authors":["毛泽东"],"dates":[{"year":1949,"month":9,"day":9}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":223,"page_end":224},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5facddad06"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
