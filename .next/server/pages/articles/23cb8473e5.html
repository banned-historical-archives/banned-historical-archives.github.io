script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"克服右倾麻痹思想　树立常备不懈观念上海新华书店积极落实防汛措施","authors":[],"dates":[{"year":1969,"month":6,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　上海新华书店革委会，根据市革委会防汛指挥部的指示精神，在工宣队、军宣队的直接领导下，闻风而动，雷厉风行，对防汛工作立即进行了研究和部署。"},{"type":"paragraph","text":"该店革委会的同志认识到搞好防汛工作，确保汛期安全，不是一项单纯的具体事务工作，而是当前进一步贯彻毛主席“抓革命，促生产，促工作，促战备”伟大战略方针的战斗任务，是一场很好的战备训练。他们及时地向所属单位发出了关于抓紧做好防汛、防台准备工作的通知，向群众宣传了防汛工作的重要意义，要求各店高举毛泽东思想伟大红旗，突出无产阶级政治，坚决克服右倾麻痹等思想障碍，树立高度的革命责任感和常备不懈的观念，在思想上筑起一道牢固的“海塘江堤”，迎接防汛战斗。为了确保安全度汛，该店革委会成立了防汛工作小组领导全店防汛工作，下设四个抢救队。还要求各基层店革委会也相应建立防汛工作小组，并指定一名革委会成员亲自挂帅，结合本单位实际情况，立即作出防汛工作部署，及时与所在地区防汛工作的领导部门挂钩，加强联防，互相协作。还要求各店指定专人收听气象预报，组织抢救队。他们除了思想动员和组织落实外，还作了必要的物质准备，对各店特别是对存放毛主席宝书、宝像的仓库等重点单位的防汛设备，认真地全面地进行了检查，对不合标准或已损坏的防汛工具进行了修理。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"23cb8473e5"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
