script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"思想性和技巧苏文化部长谈文艺创作　艺术家要永远记住在人民面前的责任　对修正主义和反马克思主义观点予以回击","authors":[],"dates":[{"year":1957,"month":7,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社莫斯科19日电】　苏联文化部长米哈伊洛夫最近在苏联“文学报”上发表了一篇题为“思想性和技巧”的文章，谈文艺创作问题。"},{"type":"paragraph","text":"米哈伊洛夫说，资本主义思想的代言人现在正在“创作自由”的口号下发出陈腔滥调，但是，在资本主义条件下能谈到什么创作自由呢?到过资本主义国家的人都会亲眼看见这个口号的虚伪。资本主义的创作自由只是在艺术家们以创作服务于统治阶级时才能得到支持，当他们的创作反对统治阶级时，这种自由也就烟消云散了。"},{"type":"paragraph","text":"米哈伊洛夫举出若干事例来说明一些具有进步观点的作家受到迫害，得不到创作的自由。美国的好莱坞公司收买那些有天才的音乐家、文学家、戏剧家和画家，然后把他们的工作连细微末节都规定出来，要他们照办。"},{"type":"paragraph","text":"米哈伊洛夫说，事实证明，在观念形态上，在文学和艺术战线上现在正在进行着尖锐的斗争。永远记住自己在人民面前的责任，表现出原则性，对修正主义和反马克思主义观点予以回击，这就是苏联作家和艺术工作者的神圣义务。"},{"type":"paragraph","text":"在谈到苏联文艺创作问题的时候，米哈伊洛夫认为，当然，我们对缺点应该进行严肃的和不留情面的批评。但是，同时我们不应该忘记，我们的文学在它为人民事业的大公无私和英勇的斗争中是获有很大荣誉和受到尊重的。近来，关于粉饰苏联现实生活的作品谈得很多。但是，不能不指出，在同粉饰和渲染作斗争的幌子下出现了对我们生活中光明美好的事物避而不谈的倾向。"},{"type":"paragraph","text":"他说，优秀的作品是不排斥尖锐的题材和艺术家描写生活中复杂矛盾的可能的。问题并不是能不能选择尖锐的题目，而是从什么立场去批评我们的缺点和如何去提问题。他认为，如果艺术家从马克思主义和党的立场去批评陈旧的阻碍前进的东西，他决不会犯错误。如果作家对个别的反面的现象的批评掩盖了现实生活的全貌:使人看不出有决定意义的特点，那就是另外一回事了。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a9209a18ad"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
