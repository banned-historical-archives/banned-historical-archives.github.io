script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji42","name":"毛泽东全集第42卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji42.pdf"],"article":{"title":"关于重印《逻辑指要》一书给章士钊的信","alias":"","parts":[{"type":"paragraph","text":"关于重印《逻辑指要》一书\""},{"type":"paragraph","text":"给章士钊的信"},{"type":"paragraph","text":"（1959年6月7日）行严先生："},{"type":"paragraph","text":"各书都收，读悉，甚谢！实事求是，用力甚勤，读金著而增感，欲翻然而变计，垂老之年，有此心境，敬为公贺。既有颇多删补，宜为几句说明。即借先生之箸，为之筹策："},{"type":"paragraph","text":"《逻辑指要》一书是一九一七年旧作。一九五九年，中国共产党的中央政治研究室有编逻辑丛书之举，拙作在征求之列。于是以一"},{"type":"paragraph","text":"[1]《逻辑指要》是章士钊1917年的旧著，1943年在重庆出版。新中国成立后，经修订于1961年由三联书店出版。章士钊1959年5月曾为此书写过一篇再版序言（后未采用），谈到该书再版的由来时说：“北京解放后，一日，主席毛公忽见问日：“闻子于逻辑有著述，得一阅乎？”予答日：此书印于重庆，与叛党有关，吾以此上呈一览，是侮公也，乌乎可？”公笑日：“此学问之事，庸何伤！””后来毛泽东看完《逻辑指要》，又对章士钊说：“吾意此足为今日参考资料，宜于印行。”章士钊，字行严。当时任政协全国委员会常务委员。"},{"type":"paragraph","text":"[2]可能指金岳霖写的《对旧著“逻辑”一书的自我批判》一文，载于《哲学研究》1959年第五期。金岳霖的《逻辑》一书也列入《逻辑丛书》，1961年由三联书店出版，书中收进了这篇文章。"},{"type":"paragraph","text":"关于重印《逻辑指要》一书给章士钊的信个月工夫，躬自校勘一遍。因原稿不在手边，臆核颇为吃力。全稿计削去不合时宜者大约二十分之一，增补者略多一点，都只限于古籍例证，能使读者稍感兴趣而已。近年以来，逻辑一学引起了学术界的极大兴趣，于逻辑学的范围及其与唯物辩证法的关系，争论繁兴，甚盛事也。鄙人对此，未能参战，然亦不是没有兴趣的。旧作重印，不敢说对于方今各派争论有所益，作为参考材料之一，或者竟能引起读者对拙作有所批判，保卫正确论点，指出纸谬地方，导致真理之日益明白，则不胜馨香祷祝之至！"},{"type":"paragraph","text":"一九五九年六月口日"},{"type":"paragraph","text":"章士钊"},{"type":"paragraph","text":"这样一来，我看有很大好处，尊意以为如何？先生如果不高兴这样办，我的建议作罢。"},{"type":"paragraph","text":"我害了一个月感冒，前书未复，方以为歉。忽得六日信，极为高兴，倚枕奉复，敬颂教安。"},{"type":"paragraph","text":"毛泽东1959年，4（6）月7日，上午八时"}],"authors":["毛泽东"],"dates":[{"year":1959,"month":6,"day":7}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":54,"page_end":55},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f1c5dd8e8c"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
