script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反对垄断资本剥削　要求增加工资  西班牙数千煤矿工人再次举行罢工  马德里大学学生集会抗议佛朗哥法西斯政权残酷迫害学生","authors":[],"dates":[{"year":1970,"month":3,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反对垄断资本剥削　要求增加工资"},{"type":"paragraph","text":"西班牙数千煤矿工人再次举行罢工"},{"type":"paragraph","text":"马德里大学学生集会抗议佛朗哥法西斯政权残酷迫害学生"},{"type":"paragraph","text":"新华社四日讯　马德里消息：西班牙北部奥斯图里亚斯矿区的七千五百名煤矿工人，摆脱了反动工会头子的控制，在三日又进行了罢工斗争，反对垄断资本集团的剥削，要求增加工资。"},{"type":"paragraph","text":"这次罢工是具有光荣斗争传统的奥斯图里亚斯煤矿工人今年以来进行的第二次罢工。奥斯图里亚斯矿区是西班牙最大的采煤区，煤矿工人的罢工给了西班牙垄断资产阶级以沉重的打击。"},{"type":"paragraph","text":"新华社五日讯　马德里消息：西德通用电气公司在西班牙的分公司的二千名工人从三日起连续两天举行罢工，抗议西德垄断资本家对西班牙工人的迫害。"},{"type":"paragraph","text":"位于西班牙加塔洛尼亚工业区的这家外资经营的公司无理解雇工人，激起了工人们的愤怒。二日晚，工人们曾聚集在这家公司外面举行示威，并同前来镇压工人斗争的反动警察进行了搏斗。"},{"type":"paragraph","text":"与此同时，在西班牙北部的奥斯图里亚斯矿区，属于“国营”煤矿的数千名矿工也举行了两天罢工，要求增加工资和改善劳动条件。属于这个矿区的一个私营矿井的五百多名矿工四日仍坚持罢工斗争。"},{"type":"paragraph","text":"据新华社讯　马德里消息：西班牙马德里大学的学生二月二十五日举行抗议集会，强烈抗议佛朗哥法西斯独裁政权残酷迫害学生和剥夺学生民主权利的暴行。这次抗议集会是为了反对这所大学的反动当局对四名学生代表实行无理的惩罚措施而举行的。佛朗哥法西斯当局派出了武装警察和便衣警察闯进这所大学破坏学生的抗议集会，对学生进行镇压。"},{"type":"paragraph","text":"在这所大学的科学学院，反动警察向学生进行了袭击，学生一面高呼反对佛朗哥法西斯独裁政权的口号，一面用石块同警察进行了英勇的搏斗。反动警察还包围了经济学院，横蛮地阻止学生向学校反动当局递交一份宣布再次罢课的抗议书。学生几次击退了反动警察的攻击。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e1fa4f4c9a"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
