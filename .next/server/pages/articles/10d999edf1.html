script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"干部带头讲用　听取群众评议  北京车辆段革委会成员带头活学活用毛泽东思想","authors":[],"dates":[{"year":1970,"month":6,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"干部带头讲用　听取群众评议"},{"type":"paragraph","text":"北京车辆段革委会成员带头活学活用毛泽东思想"},{"type":"paragraph","text":"据新华社讯　北京铁路分局北京车辆段革委会在活学活用毛泽东思想的群众运动中，实行干部带头讲用，群众进行评议的办法，促进了领导班子思想革命化，推动了全段活学活用毛泽东思想群众运动的深入发展。"},{"type":"paragraph","text":"北京车辆段的干部学习了林副主席的“我们要把自己当作革命的一份力量，同时又要不断地把自己当作革命的对象”的指示，一致认为，带头人必须首先在活学活用毛泽东思想这个根本问题上带好头。许多干部检查了自己没有放下架子，没有甘当群众小学生的精神，他们决心变“群众讲，干部评”为“干部带头讲用，群众评”。开始他们邀请一部分群众参加评议，尝到了甜头以后，就直接到群众中去，和大家一起讲用，听取群众的评议。这样，讲用会就开得生动活泼，不仅帮助了干部，而且带动了群众讲用，进一步密切了干部和群众的关系。"},{"type":"paragraph","text":"北京车辆段革委会领导成员遵照毛主席关于“整风运动是一个‘普遍的马克思主义的教育运动’”的伟大教导，每个季度都坚持进行一次开门整风。在每次整风中，干部首先向群众汇报自己活学活用毛泽东思想的体会，请群众评议，然后带着群众在评议中提出的意见，认真学习毛主席的有关教导，再向群众讲用。有一位革委会常委，前段时间产生了“松口气”的活思想，认为上有领导，下有群众，自己处在中层，担子不重，工作轻松。在整风时，他向群众暴露了这个活思想，并且作了一些自我批评。群众评议说：选你到革委会为无产阶级掌权，你有这种思想，怎么能掌好权？你应该把这个问题提高到巩固无产阶级专政的高度来认识。他根据群众的意见，再一次学习毛主席关于无产阶级专政下继续革命的伟大理论，狠斗“松口气”的思想，进一步提高了继续革命的觉悟，更加坚定了为无产阶级掌好权、用好权的决心。现在，他坚持深入基层，参加劳动，调查研究，做好领导工作。群众称赞他是活学活用毛泽东思想的带头人。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"10d999edf1"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
