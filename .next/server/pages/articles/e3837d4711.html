script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"b6d68afa-47f6-48f4-922a-48a29a80c878","name":"中国古代史（下）（南京大学历史系1976年版）","internal":false,"official":true,"type":"pdf","author":"南京大学历史系1976年版","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives3/main/b6d68afa-47f6-48f4-922a-48a29a80c878.pdf"],"article":{"title":"编后记","alias":"","parts":[{"type":"paragraph","text":"编后记"},{"type":"paragraph","text":"伟大领袖和导师毛主席教导我们：“教材要彻底改革”，“应该让学生自己去研究讲稿”。"},{"type":"paragraph","text":"为了迎接文化大革命后我校第一届历史专业学员入学，一九七二年我们自编了一部《中国古代史》试用教材。"},{"type":"paragraph","text":"为了使学员们在学习期间掌握中国古代历史的基本线索，这部教材经过两次修改和试用，最后写成现在铅印的三卷本，上中下三册共有一百多万字。书末附录一份比较详细的中国古代历史大事年表。"},{"type":"paragraph","text":"我们这部教材，是在毛主席亲自发动和领导的批林批孔运动中一边修改、一边付印的。当时“四人帮”控制舆论工具，接过批林批孔的革命口号，借“批儒评法”大做文章，在史学领域实行法西斯专政。他们利用讲中国古代史进行反党，宣扬修正主义，在我们党的历史上是空前的。我们的教材也不同程度上遭到干扰和影响。"},{"type":"paragraph","text":"一九七六年十月，以英明领袖华主席为首的党中央，一举粉碎了“四人帮”篡党夺权的阴谋，挽救了革命，挽救了党，史学从此得到解放。在华主席抓纲治国战略决策的指引下，我们决心把史学革命进行到底。放，百家争鸣”的方针，在马克思列宁主义、毛泽东思想指导下，对一些历史问题提出我们的初步看法，以便于学员们继续进行讨论和研究，使马克思主义的历史科学不断得到发展。"},{"type":"paragraph","text":"四年来，参加这部教材讨论、编写和修改工作的，除我们教研室的十多位同志外，一九七四年入学的部分学员，也参加了上册的修改讨论。"},{"type":"paragraph","text":"由于我们的理论水平和业务能力的限制，这部教材必然还存在许多问题。切盼看到或使用这部教材的同志们给于批评和指正，以便我们继续修订和提高，以革命加拼命的精神搞好文科教育革命。"},{"type":"paragraph","text":"南京大学历史系中国古代史教研室1977年6月"}],"authors":["南京大学历史系"],"dates":[{"year":1977,"month":6}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":508,"page_end":509},"tags":[{"name":"四人帮","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"批林批孔","type":"主题/事件"},{"name":"教育革命","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e3837d4711"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
