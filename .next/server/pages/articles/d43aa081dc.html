script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"不能再让资产阶级思想支配着我们的工作","authors":["林燕萍"],"dates":[{"year":1952,"month":7,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"虹口区景林小学教师　林燕萍"},{"type":"paragraph","text":"‘社会大学’提出了沈天慧老师对‘教育为工农服务’这一问题上的错误思想，我从这一具体事实的镜子里照照自己，使我大吃一惊。"},{"type":"paragraph","text":"我懂得教育首先要为工农服务的大道理，不但思想上有这种认识，而且时刻想念着怎样把它变成实际的行动；可是，当面临现实的考验时，我的思想和行动就分道扬镳、背道而驰了。"},{"type":"paragraph","text":"首先谈谈我在工作中怎样对待工农子弟和非工农子弟的情况吧。我们学校幼儿园的学生，基本上都是资产阶级和小资产阶级的子弟，在全部小朋友中，仅有一位是工农出身的学生。我作为幼儿园的教师，要达到教育为工农服务的目的，就考虑到在这位小朋友身上痛下工夫，教得更好。因此，我曾访问过他的家庭，对他的一举一动也特别关心，企图用这一行动来体现教育为工农服务的方针。但是日长月久，我这一天真的想法也逐渐成为泡影了；很自然的，我感觉到这个孩子太脏，嫌他顽皮，讨厌他粗鲁；慢慢地不愿意和他接近了，甚至对他起了反感。所以发展到后来，我对一般小朋友都是和言细语地耐心教导，唯独对他急言厉色，大声呵斥，简直失掉了教师对学"},{"type":"paragraph","text":"国一件活生生事实充分说明我没有站稳工人阶级的立场，对教育为工农服是停留在认识的阶段，还不能够和在一起。我为什么心里想一套而行动上又是另外一套呢?追根究源，还是心灵深处潜伏着的资产阶级思想在支配着我；虽然我曾在五反学习中高唱过同资产阶级思想划清界限的口号，可是空言永远是不能代替行动的，一个存有资产阶级思想的教师，也是永远不可能为工农服务的。由此，我意识到:对教育为工农服务的方针，决不固堡垒，要连根拔除一切非无产阶级思想的恶劣影响；如果这样做，就必须挺身接受思想改造的痛苦过程。"},{"type":"paragraph","text":"我再冷静地想一想，工农出身的学生是‘天生’的脏、愚和顽皮吗?决不是的，这是旧社会压迫和剥削的结果，一定要等到工农大众的生活获得某种程度的改善后，这种情况才必然会起根本的变化。我决定一面进行自我改造，一面贯彻教育为工农服务的方针。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d43aa081dc"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
