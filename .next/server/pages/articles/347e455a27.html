script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"周恩来同志率党政代表团离京赴罗","authors":[],"dates":[{"year":1965,"month":3,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"前往参加乔治乌—德治同志的葬礼"},{"type":"paragraph","text":"周恩来同志率党政代表团离京赴罗"},{"type":"paragraph","text":"刘少奇邓小平彭真李先念陆定一陈伯达康生李雪峰郭沫若林枫等领导人、各部门各民主党派各人民团体负责人、罗临时代办等外国使节到机场送行"},{"type":"paragraph","text":"新华社二十二日讯　中国共产党中央委员会和中华人民共和国政府决定派出以中共中央副主席、国务院总理周恩来为首的党政代表团赴罗马尼亚参加罗马尼亚工人党中央委员会第一书记、罗马尼亚人民共和国国务委员会主席格·乔治乌—德治同志的葬礼。"},{"type":"paragraph","text":"中国党政代表团的名单如下："},{"type":"paragraph","text":"团长：周恩来　中共中央副主席、中华人民、共和国国务院总理"},{"type":"paragraph","text":"副团长：谢富治上将　中共中央委员、中华人民共和国国务院副总理"},{"type":"paragraph","text":"团员：章汉夫　中共中央候补委员、外交部副部长"},{"type":"paragraph","text":"赵毅敏　中共中央候补委员"},{"type":"paragraph","text":"刘放　中华人民共和国驻罗马尼亚人民共和国特命全权大使"},{"type":"paragraph","text":"罗青长　国务院副秘书长"},{"type":"paragraph","text":"新华社二十三日讯　由中共中央副主席、国务院总理周恩来和中共中央委员、国务院副总理谢富治上将率领的中国党政代表团，二十二日上午乘专机离开北京，前往罗马尼亚参加罗马尼亚工人党中央委员会第一书记、罗马尼亚人民共和国国务委员会主席格·乔治乌—德治同志的葬礼。"},{"type":"paragraph","text":"同机离开北京的代表团团员有：中共中央候补委员、外交部副部长章汉夫，中共中央候补委员赵毅敏，国务院副秘书长罗青长。代表团团员、中国驻罗马尼亚大使刘放已在布加勒斯特。"},{"type":"paragraph","text":"中共中央副主席、中华人民共和国主席刘少奇，中共中央总书记邓小平，中共中央政治局委员、书记处书记彭真，中共中央政治局委员、国务院副总理李先念，中共中央政治局候补委员、国务院副总理陆定一，中共中央政治局候补委员陈伯达、康生，中共中央书记处书记李雪峰，人大常委会副委员长郭沫若、林枫等党和国家领导人，前往机场送行。"},{"type":"paragraph","text":"到机场送行的还有："},{"type":"paragraph","text":"政协全国委员会副主席徐冰、高崇民、许德珩，国防委员会副主席蔡廷锴，最高人民法院院长杨秀峰，最高人民检察院副检察长黄火星；"},{"type":"paragraph","text":"中共中央委员邓颖超、廖承志、刘晓、许光达，中共中央候补委员徐子荣、蒋南翔、李昌、方毅、刘震，中共中央有关部门的负责人许立、龚子荣，中国政府各部门的负责人周荣鑫、张奚若、李一氓、乔冠华、刘新权、林海云、邹大鹏、冯铉、杨奇清、凌云、于桑、邝任农，中国人民解放军高级将领王新亭、刘志坚、刘少文、杜义德；"},{"type":"paragraph","text":"各民主党派和工商联的负责人胡愈之、罗叔章、王绍鏊、季方、陈其尤、荣毅仁，中罗友好协会和其他各人民团体的负责人陆平、马纯古、杨蕴玉、杨海波、王芸生、李文耀、魏章玲，北京市的负责人郑天翔、崔月犁。"},{"type":"paragraph","text":"到机场送行的，还有罗马尼亚驻中国大使馆临时代办贝舍里安及其他一些国家驻中国的使节。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"谢富治","type":"人物"},{"name":"康生","type":"人物"},{"name":"陈伯达","type":"人物"},{"name":"邓小平","type":"人物"},{"name":"李先念","type":"人物"},{"name":"李雪峰","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"彭真","type":"人物"},{"name":"陆定一","type":"人物"},{"name":"赵毅敏","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"347e455a27"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
