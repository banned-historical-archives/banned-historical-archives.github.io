" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji28","name":"毛泽东全集第28卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji28.pdf"],"article":{"title":"关于修筑铁路等问题致陈云、薄一波电","alias":"","parts":[{"type":"paragraph","text":"关于修筑铁路等问题致陈云、薄一波电"},{"type":"paragraph","text":"（1950年1月10日）陈云、一波："},{"type":"paragraph","text":"（一）一月七日电悉，此项报告甚好，盼能继续。（二）各项计划均好，用军队修筑天兰天成成渝叙昆滇黔黔桂湘桂诸线甚为必要，望即着手布置进行。（三）去年十月一日以后在中财委领导下开了多次专业会议，除铁路，钢铁，农业三项已见一月七日来电外，其他各项会议结果的要点我手边没有材料，请于数日内分项写一报告给我，未知你们能腾得时间否。如你们无时间，可否要你们的秘书写，经你们看过发来。不要太繁，每项几百字即够。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一月十日"},{"type":"paragraph","text":"[1]陈云，当时任政务院副总理兼财政经济委员会主任。薄一波，当时任政务院财政经济委员会副主任。"},{"type":"paragraph","text":"[2]指陈云、薄一波1950年1月7日关于财政经济的几项情况给毛泽东并中央的报告。"}],"authors":["毛泽东"],"dates":[{"year":1950,"month":1,"day":10}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":155,"page_end":155},"tags":[{"name":"毛泽东","type":"人物"},{"name":"薄一波","type":"人物"},{"name":"陈云","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b52ccd65fc"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
