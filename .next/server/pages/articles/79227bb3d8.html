" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中山大学民革负责人谈教授对“鸣”、“放”的顾虑","authors":["梁福擎"],"dates":[{"year":1957,"month":6,"day":3}],"is_range_date":false,"parts":[{"text":"中山大学民革负责人谈教授对“鸣”、“放”的顾虑","type":"title"},{"text":"梁福擎","type":"authors"},{"text":"新华社广州3日电  中山大学民革负责人古文捷今天在记者请他谈谈对冯乃超副校长(党员)的观感的时候，他断言校方领导上(主要是冯乃超)对于在并校时进来的教授存有宗派主义。但是当记者问他：为甚么这方面的问题在最近的座谈会上都几乎没有反映过，而对另一副校长龙潜的作风却批评得这样尖锐？他解释说：“我们是惯于打死老虎的。龙潜本人已不在这里了，批评他也不会带来什么恶果的。至于不重视外校调来的教授问题，有关负责人却还在此地，说话就得慎重了。”","type":"paragraph"},{"text":"接着古文捷便谈了教授在“鸣”、“放”方面的顾虑问题。他说。校内的“鸣”、“放”学习小组开起会来，许多人都是谈理论，谈抽象的体会。校长许崇清和陈序经(均系党外人士)至今在任何场合都没发一言。有人曾问陈序经(并非左派)什么时候才说话？他就微笑一下，摇摇头，然后说：“要看时候，现在还未整风，到时再说吧！”","type":"paragraph"},{"text":"古文捷认为教职员目前最害怕的报复是整编。他说：“肃反前后，学校里曾整编了五十多人，同时又开始实行了老教授退休制。”他说，虽然退休有三个条件(二十五年教龄，六十岁以上，自愿)，但当时要退休的西语系沈祥銮和陈兆畴教授都非自愿，陈兆畴只有五十多岁。沈祥銮虽上了六十岁。但体力比他还好。因此，自这一次整编以后到现在还是人心惶惶，特别使人戒心的是，现在又出现了一种空气，就是人太多了，又要整编了。这样，说话的人就得思前思后。","type":"appellation"},{"text":"古文捷又说，他曾对一些教授说过，想报复打击批评者的共产党员肯定是有的，但党的组织不容许也是肯定的。他们听了之后都笑他太天真。还说：“有政治本钱的人，像你，既是民革的人又是前联合大学的校长，当然敢随便说。至于别人。将来来个辩证一番就不得了。”他们还说，看见一些上层党外人士始终不发言，党员又埋头记录，顾虑也增加了。","type":"paragraph"},{"text":" ---- 原载1957年6月5日新华通讯社编《内部参考》。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"79227bb3d8"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
