script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"报社外埠分销处 居间剥削派报员扬州派报业职工的呼吁","authors":["王继堂","葛明堡","韦长庆"],"dates":[{"year":1949,"month":7,"day":31}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编辑同志:"},{"type":"paragraph","text":"我们是扬州市派报业一群职工，对于一切身受的痛苦，简单报告一下:"},{"type":"paragraph","text":"在反动政治下，我们因营业生计环境，不得不维持。终日辛勤奔走，我们最受打击的就是分销人，凭恶势力挜销报纸，我们无形遭受排挤。现在解放了，这种现象整个消灭。又，过去各报加价，例有宽放日期，这种权利，向来被分销人全部剥削去了。试问分销人额外进项，作何用途，刻下各报总社仍援用此例，分销人对于我们职工，起先尚能认识新时代劳资两利政策，还分给我们宽放期三天。只有解放日报新闻日报大公报文汇报商报五种，新华日报一天，其余各报没有。第二次分销人见财难舍，突然改变一贯作风，延岩或拒绝。又各报总社直属分销，折扣大小不一，分销人对于此事，决不公开，严守秘密。对于我们任意剥削，我们对于以上各点，拟迳函总社申述一切。又恐达不到目的。因过去分销人与过去发行科负责人有联络关系，刻下各报总社尚未能澈底澄清，所以我们感觉万分棘手。想尽万分努力于新时代下以图生存。只求一切合于劳资两利政策，不受任何剥削，而解除一切痛苦。敬请借披露。此致"},{"type":"paragraph","text":"敬礼"},{"type":"paragraph","text":"扬州市派报业职筹会负责代表　王继堂　韦长庆　葛明堡　仲汉臣　胡启允　一九四九年七月二十五日"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"22f1961b74"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
