" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共北京市委统战部关于在工商界展开反对贪污运动的意见","authors":[],"dates":[{"year":1951,"month":12,"day":21}],"is_range_date":false,"parts":[{"text":"中共北京市委统战部关于在工商界展开反对贪污运动的意见","type":"title"},{"text":"在反对贪污浪费和官僚主义运动中，工商界主要应该放在反对贪污行贿上面。解放以来，工商业者在我政府正确政策的影响下，很多改变了以往助长贪污的经营作风，成为新社会的正当工商业者。但有一部分工商业者，仍然严重的存在着行贿、盗窃国家资财和腐蚀软化公务人员的罪恶行为。为了大张旗鼓地反对贪污行贿，我们拟采用以下的步骤与方法展开这一运动：","type":"paragraph"},{"text":"一、进行的范围：应包括全体工商业136个行业，但要以行贿情形严重的行业为重点，如营造业、五金业、电料业、纸张文具业、木业、木器业等。","type":"paragraph"},{"text":"二、依靠的力量：参加在各级领导机构中的公营企业干部，团结可靠的进步分子，并广泛地发动下层正当工商业者中的积极分子。","type":"paragraph"},{"text":"三、进行的方式与步骤：","type":"paragraph"},{"text":"（一）先召开全市的总动员大会（拟在本星期日进行），然后各行业相继分别召开动员大会，结合正当工商业者的利益讲明政策，进行思想动员，鼓励坦白检举。","type":"paragraph"},{"text":"（二）工商联成立反贪污运动委员会，各行业成立分会。","type":"paragraph"},{"text":"（三）各行业按地区工商小组召开小组会，讨论市代表会的报告，普遍进行坦白检举。同时要求各工厂商店职工，协助工商业者搜集贪污资料。","type":"paragraph"},{"text":"（四）在步骤上，先号召坦白，坦白到一定程度时，即展开大规模的检举运动，对一切贪污行贿事实普遍进行检举。在执行时要抓住大的，以便突开。","type":"paragraph"},{"text":"（五）最后进行处理与总结。坏的要严惩，对检举有成绩的则奖励与表扬。","type":"paragraph"},{"text":"四、时间约计三个月，由12月22日开始动员，1952年3月末结束。","type":"paragraph"},{"text":"五、估计这一运动展开后，可得到广大正派工商业者的欢迎与支持，在坦白与检举中能发现很多贪污行贿的事实，奸商与贪污干部可借此同时揭露出来，这样便可打击与消灭资本家的恶劣行为，在工商界树立起良好的经营作风。这对于工商界和我们的团结是会更加巩固的。","type":"paragraph"}],"comments":[],"origin":"根据文件的原件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6ef0df7656"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
