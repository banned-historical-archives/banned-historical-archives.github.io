" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji45","name":"毛泽东全集第45卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji45.pdf"],"article":{"title":"马克思主义的三个来源和三个组成部分","alias":"","parts":[{"type":"paragraph","text":"马克思主义的三个来源和三个组成部分！"},{"type":"paragraph","text":"（1963年1月6日）"},{"type":"paragraph","text":"马克思本人也不是天生的马克思主义者。他本来是观念论者，接受唯心论，以后接受青年黑格尔和唯物主义费尔巴哈的学说。阶级斗争的实践使他和恩格斯一起，创造了马克思主义，把整个资产阶级的社会学改造过来。经过了哲学的革命、经济学的革命、社会学的革命，形成了阶级斗争的学说。马克思主义的核心就是阶级斗争的学说。阶级社会是人压迫人、人剥削人的社会。以这样的观点来解释历史，就变成阶级斗争的历史，也就是历史唯物论。在旧社会，接受旧社会的遗产，加以改造，使唯心辩证法变成唯物辩证法，形而上学的唯物论变成辩证唯物论，唯心论的历史观变成唯物辩证法的历史观。经济学也是如此，由资产阶级的古典经济学，变成马克思主义的政治经济学。社会主义也是如此，接受空想社会主义的好的内容，如法国和英国的空想社会主义，加以改造，变成阶级斗争的学说，即以阶级斗争为手段，进行无产阶级革命和无产阶"},{"type":"paragraph","text":"[1]1963年1月6日下午5时至6时半，毛泽东在杭州和日共中央政治局委员、书记处书记裤田里见等谈话。日方参加者有：日共中央书记处书记伊井弥四郎、冈正芳，中央委员、日共北海道委员会委员长西馆仁，中央委员、中央宣传教育文化部副部长冈本博之，中央委员平苇信行。中方参加者有：廖承志、伍修权、赵毅敏、江华等。这是毛泽东和日共中央代表团谈话的一部分。毛泽东全集第四十五卷级专政，建立政党。这是常识，全体共产党员都知道。但是现在几十个党的修正主义者不讲这些，讲阶级调和、和平过渡、全民的党、没有阶级性的自由、平等、博爱和超阶级的、实际上是资产阶级的全民政府等。哪一个资产阶级的政党都说自已是全民的党、全民的国家。这是资产阶级的口号。孙中山和蒋介石也都是这样说的。美国反动派也说自已是全民的。日本也是如此，垄断资本说他自己代表全民。"},{"type":"paragraph","text":"只有共产主义者从来不隐讳自己的观点，从来不说他代表全民。他代表无产阶级、劳动人民，不代表资产阶级，甚至也不代表小资产阶级。他代表无产阶级，引导城市和农村的小资产阶级走向社会主义的道路。如果不是这样，就会变成农民的党或小资产阶级的党。我党在很长期间，一直被美国资产阶级认为代表农民，托派也这样说。其实马克思主义政党是无产阶级的代表，它的哲学、政治经济学和社会科学也只能是无产阶级的。"},{"type":"paragraph","text":"真正代表工人阶级、劳动人民和绝大多数人口的是共产党，不是社会党，更不是自由民主党。"}],"authors":["毛泽东"],"dates":[{"year":1963,"month":1,"day":6}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":330,"page_end":331},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e868865dce"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
