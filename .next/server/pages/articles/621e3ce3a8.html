script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"苏修在科研部门搞劫贫济富的“新体制”  降低普通工作人员的工资增加资产阶级“权威”的收入","authors":[],"dates":[{"year":1969,"month":5,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"苏修在科研部门搞劫贫济富的“新体制”"},{"type":"paragraph","text":"降低普通工作人员的工资增加资产阶级“权威”的收入"},{"type":"paragraph","text":"据新华社讯　莫斯科消息：苏修叛徒集团在国内除加紧剥削和镇压广大工农劳动群众外，正在加紧向科学研究领域中的普通工作人员进攻。苏修叛徒集团最近进行一项所谓“科学工作人员劳动工资新体制”的反动“试验”，就是这方面的一个新例证。"},{"type":"paragraph","text":"据苏修报刊报道，这项关于“科学工作人员劳动工资新体制”的“试验”是去年十二月在莫斯科卡尔波夫物理化学研究所进行的，“试验”的各种原则都是在苏联部长会议国家劳动工资问题委员会同意下炮制出来的。"},{"type":"paragraph","text":"据透露，根据这个“新体制”，普通科学工作人员的劳动工资普遍降低了百分之二十五到三十，而把从这些人身上克扣下来的工资作为物质刺激的“奖金”，加给所谓进行“重大”研究、工作“有最大效率”的人。为了进行欺骗，苏修叛徒集团却说什么这些规定“对所有范畴的工作人员都是如此”，似乎是对一切人都是平等的。然而，现在苏联大大小小的科学研究机构全是被各种所谓的“权威”把持着的，科学工作人员的一切研究成果，毫无例外地都要算在这些“权威”的账上。因此，“新体制”的“奖金”，也就是从一般工作人员身上克扣下来的工资，当然大部分都将被这些“权威”侵吞，使这些本来就工资很高的一小撮高薪阶层又增加许多额外收入。同时，按照这个“新体制”，科学研究机构工作人员的工资的增减，要由所谓“资格审查委员会”来确定。而把持这些委员会大权的都是一些所谓“大科学家”、“院士”、“博士”。这样，苏修叛徒集团就使得这些资产阶级特权分子能够凭借这项权力，更加肆无忌惮地剥削和压迫一般的工作人员。"},{"type":"paragraph","text":"更令人气愤的是，这个“新体制”还公然规定，把持科学研究机构大权的资产阶级特权分子，可以任意开除不服从他们反动统治的人员和一些他们认为没有更多油水可供压榨的普通工作人员。据透露，自去年十二月开始实行这项“新体制”以来，莫斯科卡尔波夫物理化学研究所已经把不少所谓“没有学位的”工作人员排挤出去。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"621e3ce3a8"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
