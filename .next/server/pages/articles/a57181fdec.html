script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"在波兰统一工人党中央全会上  哥穆尔卡强调反修正主义斗争  肯定农村社会主义改造是农业唯一发展道路  要大力加强波苏友谊巩固社会主义阵营团结","authors":[],"dates":[{"year":1958,"month":10,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"在波兰统一工人党中央全会上"},{"type":"paragraph","text":"哥穆尔卡强调反修正主义斗争"},{"type":"paragraph","text":"肯定农村社会主义改造是农业唯一发展道路"},{"type":"paragraph","text":"要大力加强波苏友谊巩固社会主义阵营团结"},{"type":"paragraph","text":"新华社17日讯　据波兰通讯社16日讯：波兰统一工人党中央委员会第一书记哥穆尔卡15日在党的中央委员会第十二次全体会议上作了关于各级党组织在迎接第三次代表大会的运动中的任务的报告。他在报告中宣布，代表大会将在明年3月10日召开。"},{"type":"paragraph","text":"哥穆尔卡说，现在，统一工人党的队伍已经巩固了。十中全会结束了党的领导以前对于那些不是从修正主义的立场就是从教条主义的立场一贯地破坏党的声誉的人们所表现的某种容忍的时期。"},{"type":"paragraph","text":"哥穆尔卡指出，修正主义在党内散布最大的混乱，十中全会正确地把修正主义称之为对党的最大的危险。哥穆尔卡着重说，党已经创造了一种使修正主义不能继续存在的气氛，但是这并不意味着可以认为反对修正主义的斗争已经结束了。"},{"type":"paragraph","text":"哥穆尔卡说，我们全党完全支持党的领导对于南斯拉夫共产主义联盟第七次代表大会的修正主义纲领所采取的态度，这一事实最好地证明了全党的健康的、反修正主义的态度。"},{"type":"paragraph","text":"哥穆尔卡在谈到审查党员的结果时指出，这次审查有助于加强党，有助于在党的组织内提高思想上、政治上和道德上的要求。他说，审查结果有二十万零六千七百多人——占党员和候补党员总数的15.5％——离开了党，在那些被开除出党的人中，约有14％是因为违犯党的路线、党的纪律和党的道德原则，或者因为犯了一定的错误。"},{"type":"paragraph","text":"哥穆尔卡在谈到国内经济情况时说，根据估计数字，社会主义工业的总产量在1958年将比1957年增加将近10％。今年四种基本谷物的总产量将相当于去年的水平。由于商品库存的恢复，兹罗提的购买力有了提高。可是，在今年上半年还没有能够实现总的价格水平的全面稳定。在谈到党为代表大会的召开进行准备工作的最重要方针时，他说，其中应该包括履行十一中全会的决议，包括在年底以前消除冗员，以整顿国民经济中的就业问题和通过改善生产过程和劳动组织来提高劳动生产率的问题。城市党组织的主要任务是在一切生产部门取得较好的经济成果，他指出，必须节减物资的消耗和促进工业中技术的进展。他要求注意投资问题和对外贸易的平衡问题。他还要求农村地区党组织多注意现在的合作农场，并且制订出把它们转变为模范集体农场的具体计划。他说：我们应该研究建立新的合作农场的可能性，应该帮助恢复已经解散了的合作农场。因为农村社会主义改造是农业唯一的发展道路。"},{"type":"paragraph","text":"哥穆尔卡说，全国一切党组织应当参加代表大会的筹备工作。每一个党组织都应当保证对代表大会进行情况、代表大会将通过的决议以及今后几年党的任务和政策的方针发生影响。"},{"type":"paragraph","text":"哥穆尔卡接着指出在代表大会以及前加强思想工作和宣传工作的必要性。他认为首先应该大大加强马克思主义哲学方面的训练和宣传工作、教授和宣传辩证唯物主义和历史唯物主义的工作和向唯心主义的反动思想进行斗争的工作。群众宣传鼓动工作、报告会、讨论会、问答会——所有这一切群众工作的形式都应该大规模地加以应用。中央活动家、重要政治家、经济学家、思想战线工作者都需要参加到这个报告运动中去，到党的积极分子那里去、到党和非党群众那里去，解释政治和思想方面的重要问题。"},{"type":"paragraph","text":"哥穆尔卡强调说，代表大会的准备工作应该以无产阶级国际主义精神为指导。我们应该根据这种精神培养和加强党员群众。无产阶级国际主义是党的力量的基本因素。我党和其他各国兄弟党之间存在的牢不可破的团结的联系，应该在十二个社会主义国家共产党和工人党莫斯科会议宣言的基础上进一步密切起来。"},{"type":"paragraph","text":"哥穆尔卡说，我们外交政策的基本原则是加强社会主义阵营的团结。因为这个因素在争取和平的斗争中、在解决当代最重要的问题上起着决定性的作用。"},{"type":"paragraph","text":"在准备召开代表大会的同时，我们还应该大力开展发展和加强波兰和苏联的兄弟般友好关系，巩固和发展社会主义阵营的团结，始终不渝地实行无产阶级国际主义的原则。这是我们制订国内政策和外交政策的坚固基础。"},{"type":"paragraph","text":"新华社华沙15日电　据此间电台广播：今天下午五时，波兰统一工人党中央委员会第十二次全体会议开始举行。"},{"type":"paragraph","text":"全体会议听取了统一工人党中央委员会第一书记哥穆尔卡关于各级党组织在筹备代表大会方面的任务的报告。"},{"type":"paragraph","text":"全会指定了一个委员会，负责最后草拟关于波兰1959年到1965年经济发展的指示，关于农村地区党的政策的指示，以及修改党章的意见。"},{"type":"paragraph","text":"新华社华沙16日电　据波兰通讯社报道：波兰统一工人党第十二次中央全体会议进入第二天。会议继续讨论哥穆尔卡的关于各级党组织在迎接代表大会运动中的任务的报告，讨论1959——1965年波兰发展的指示草案、党在农村中的政策指示草案、修改党章草案。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a57181fdec"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
