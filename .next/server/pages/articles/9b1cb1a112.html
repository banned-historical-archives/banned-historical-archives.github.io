script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"秘鲁外长谴责跨国公司剥削和掠夺第三世界国家  不结盟国家坚决反霸争取经济独立","authors":[],"dates":[{"year":1975,"month":7,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"秘鲁外长谴责跨国公司剥削和掠夺第三世界国家"},{"type":"paragraph","text":"不结盟国家坚决反霸争取经济独立"},{"type":"paragraph","text":"据新华社利马一九七五年七月九日电　秘鲁外交部长米格尔·安赫尔·德拉弗洛尔七月九日在这里指出，不结盟国家联合起来是因为它们“决心在霸权中心面前取得经济独立”。“不结盟是一种为反对各种形式的帝国主义和殖民主义而斗争的灵活制度”。"},{"type":"paragraph","text":"德拉弗洛尔外长是在不结盟国家关于外国投资问题的专家委员会第二次会议开幕式上讲这番话的。会议将负责拟订一个关于对待外国资本、跨国公司和购买技术的章程草案，以便提交给将于今年八月二十五日至二十九日在利马举行的不结盟国家第五次外长会议讨论。"},{"type":"paragraph","text":"德拉弗洛尔外长在讲话中谴责帝国主义跨国公司对第三世界国家的剥削和掠夺。他指出，这些跨国公司“已经成为对发展中国家进行经济和政治渗透的主要工具”。"},{"type":"paragraph","text":"这位外长在谈到不久前，秘鲁征收美资海湾石油公司在秘鲁的子公司时说，这是一项“表现了完全行使我们的国家主权的措施”。他还赞扬了许多第三世界国家政府关于收回本国自然资源和控制重要经济部门的行动。"},{"type":"paragraph","text":"秘鲁外长在讲话中还指出：“不结盟国家和第三世界国家建立新的国际经济秩序的战略应该建立在两个基础上：一方面是采取团结一致的行动，我们在原料方面已经这样做了，其目的在于争取新的价格和制止不平等贸易所造成的逆差；另一方面是采取坚决行动，来制定对待外国资本的共同纲领，以便阻止由于它们汇出利润和资本给我们造成的赤字。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9b1cb1a112"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
