script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"巴勒斯坦游击队在以色列占领区打击敌人  比《光明和被剥削者》谴责苏联破坏巴勒斯坦人民斗争","authors":[],"dates":[{"year":1976,"month":9,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"巴勒斯坦游击队在以色列占领区打击敌人"},{"type":"paragraph","text":"比《光明和被剥削者》谴责苏联破坏巴勒斯坦人民斗争"},{"type":"paragraph","text":"新华社一九七六年八月三十日电　科威特消息：据科威特《政治报》八月二十八日报道，巴勒斯坦解放组织宣布，巴勒斯坦游击队过去两天在约旦河西岸和特拉维夫附近袭击敌人，打死许多以色列侵略者。"},{"type":"paragraph","text":"《政治报》援引巴勒斯坦通讯社的消息报道，巴勒斯坦游击队炸了特拉维夫附近大路上的一座以色列军队的大楼，并且炸了一个以色列警察所。"},{"type":"paragraph","text":"据报道，巴勒斯坦战士炸毁以色列军车一辆，一名以色列士兵被炸死，三名被炸伤。"},{"type":"paragraph","text":"另据大马士革消息：巴勒斯坦通讯社八月二十八日报道，巴勒斯坦革命武装力量指挥部发言人二十七日宣布，在被占领的巴勒斯坦领土上的一支巴勒斯坦游击队八月十七日在贾乌纳镇附近的太比里亚斯—萨夫德公路上袭击了一辆载有弹药和武器装备的以色列军用汽车。汽车中弹后爆炸，车上敌军全部死亡。"},{"type":"paragraph","text":"新华社大马士革电 据耶路撒冷电台报道，以色列的护士八月二十五日举行二十四小时罢工，反对以色列当局反动经济政策造成的通货膨胀和物价飞涨。"},{"type":"paragraph","text":"罢工者要求提高工资和改善工作条件。"},{"type":"paragraph","text":"据报道，以色列镑这个星期再次宣布贬值，这已是一年来的第十一次贬值。这表明以色列经济形势的进一步恶化。"},{"type":"paragraph","text":"新华社布鲁塞尔一九七六年九月二日电　比利时马克思列宁主义共产党机关报《光明和被剥削者》最新一期发表一篇文章，谴责苏联破坏巴勒斯坦人民的武装斗争。"},{"type":"paragraph","text":"文章说：“自从一九六五年以来，俄国修正主义者们实施了种种破坏巴勒斯坦人民斗争的策略。它们经常变换的态度丝毫没有改变它们真实的目的：要巴勒斯坦人民按它们的命令行事，不断扩展它们的社会帝国主义的战略，在中东扩张并且同美帝国主义争夺。”"},{"type":"paragraph","text":"文章回顾说，一九六五年，巴勒斯坦人民发动了对以色列侵略者的武装斗争。但是莫斯科对此充耳不闻。"},{"type":"paragraph","text":"一九六七年以后，巴勒斯坦人民的胜利冲破了两个超级大国强加的“不战不和”的政策。苏联的领导人却进行辱骂和攻击，并且一心想粉碎巴勒斯坦人民的武装斗争。"},{"type":"paragraph","text":"此后，他们又一反常态，伪装“支持”巴勒斯坦人民的斗争，妄图把它纳入他们的轨道。"},{"type":"paragraph","text":"文章指出，今天，苏联在地中海加强军事力量，在黎巴嫩问题上进行阴谋活动。"},{"type":"paragraph","text":"文章还揭露说，苏联社会帝国主义多年来让大量苏联犹太人迁居以色列，这就加强了犹太复国主义的侵略潜力。"},{"type":"paragraph","text":"文章最后说：“不管是犹太复国主义的镇压，还是苏联社会帝国主义和美帝国主义的阴谋诡计，（巴勒斯坦）人民都决心为争取自由和独立而继续进行人民战争。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"人民战争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9be05e46b2"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
