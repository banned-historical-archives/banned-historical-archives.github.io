<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"重庆市教育局党组、中共重庆市普通中学委员会、共青团重庆市委员会关于组织应届高中毕业生和全体师范学生，集中进行社会主义思想教育的请示报告","authors":[],"dates":[{"year":1958,"month":2,"day":22}],"is_range_date":false,"parts":[{"text":"重庆市教育局党组、中共重庆市普通中学委员会、共青团重庆市委员会关于组织应届高中毕业生和全体师范学生，集中进行社会主义思想教育的请示报告","type":"title"},{"text":"本市今年高中应届毕业生2119人，全体师范学生1563人(其中师范毕业生335人)。他们绝大多数是出身于非无产阶级家庭。据市一中的重点调查：毕业生出身工农家庭的仅占16．6％，一般教职员占35．7％，高级知识分子占11％，出身剥削阶级家庭的占到31．7％，(其它占5．3％)，毕业生中直系亲属在历次社会改革运动中被杀、关、管、斗的占20．7％，家庭对他们的影响较深刻的。过去，特别是上学以来，虽然加强对他们进行了社会主义思想教育，但由于时间短，内容多，解决问题还不深不透。目前中学生中对党的领导和社会主义道路问题；对贯彻新教育方针；民主与集中，自由与纪律；以及对苏联和美国的看法上都还存在不少的模糊认识和错误思想，有的还相当严重。根据以上问题，遵照省委和市委的指示精神，我们拟在下期开学后，安排两周时间，将全市高中毕业生和全体师范学生集中起来，进行一次社会主义思想教育。","type":"paragraph"},{"text":"一、集中教育的要求：是在上期各校进行社会主义思想教育的基础上，通过鸣放和争辩，使学生进一步划清大是大非，深入解决较普遍存在的党的领导和社会主义道路的问题，正确认识民主与集中，自由与纪律的关系，贯彻新的教育方针，尤其是正确对待学习和劳动的问题。通过鸣放和争辩，还可以全面摸清学生的政治思想情况，为下学期的政治思想教育，毕业时的政治审查，毕业后的组织安排，打下良好的基础。","type":"paragraph"},{"text":"根据中学生的年龄特点，集中鸣放不同于成年人的整风要求，主要是让他们接受社会主义思想教育，提高思想觉悟以问题为主鼓励引导学生对国家政治生活及大是大非问题充分暴露思想，提出问题，开展争论。鸣放时讲明不给行政老师提意见，不开展反右斗争(不代右派份子和反社会主义份子的帽子)。对学生放出来的反动言论和思想可进行思想批判，但不斗争人。学生在鸣放中的政治观点和表现，要载入档案，作为今后升学、就业的审查参考材料。如有个别情节十分严重的反社会主义份子和坏份子，经报市教育局批准后，可以开除学籍。","type":"paragraph"},{"text":"二、学习方式和步骤：贯彻加强党的领导与放手发动群众相结合的原则，采取大鸣大放、贴大字报、座谈、辩论的方式，逐步引导深入，拟分以下步骤进行：","type":"paragraph"},{"text":"1、动员准备阶段：寒假期中各校领导作好学生政治思想情况的调查研究，作好各种准备工作。学生来集中学习前，各校按统一题纲作好思想动员。报到集中后，还应进行全面深入的动员，反复讲清学习的目的意义、内容和作法，消除各种顾虑。","type":"paragraph"},{"text":"2、鸣放和争辩阶段：动员党员、团员、积极份子和群众一道鸣放，贴大字报，开座谈会，引导学生对教育方针、历次社会改革运动及有关政策、民主与集中、自由与纪律、国际问题等范围，暴露思想，发表意见。然后集中问题，开展专题辩论。要求着重将有关教育方针问题，辩深辩透。其它问题，由于时间短，拟以专题作报告，发动学生讨论。","type":"paragraph"},{"text":"3、总结深入教育阶段：集中学习的最后一、二天，组织学生座谈体会收获，请负责同志作全面总结报告，提出今后努力方向。将来解决彻底的问题，列为下学期社会主义思想教育的主要内容。","type":"paragraph"},{"text":"时间安排：初步拟定2月28日～3月14日。","type":"paragraph"},{"text":"三、组织领导：建议由市委文教部直接领导，由教育局、中学党委和团市委三单位具体负责共同组成学习领导小组，下设办公室(分秘书、学习、行政三组)。办公室工作人员，由三单位抽调干部参加(请公安局等有关部门参加办公室工作)。","type":"paragraph"},{"text":"各学校基本以校为单位，成立学习辅导组，由学校支部派支部委员或党员教导主任一人负责。学生按班分小组，学生干部任组长。每班设辅导员一人，由各校选派中左以上的政治教师和团队干部担任。","type":"paragraph"},{"text":"四、经费：由教育局在教育事业费内开支。","type":"paragraph"},{"text":"五、集中学习地点：拟借用歇台子市党校、中级党校和省团校。","type":"paragraph"},{"text":"以上是否妥当，请示。","type":"paragraph"},{"text":" 重庆市教育局党组1958年2月22日","type":"paragraph"}],"comments":[],"origin":"王建军主编《五八劫》，2008年。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dcc73e0bbd"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
