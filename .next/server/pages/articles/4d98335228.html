script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"日本和平联络委员会等团体代表向毛泽东主席宋庆龄副主席献礼  我保卫世界和平委员会副主席陈叔通代表接受","authors":[],"dates":[{"year":1953,"month":2,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"日本和平联络委员会等团体代表向毛泽东主席宋庆龄副主席献礼"},{"type":"paragraph","text":"我保卫世界和平委员会副主席陈叔通代表接受"},{"type":"paragraph","text":"【新华社二十四日讯】为表示日本人民对中国的友谊和敬意，日本和平联络委员会、日中友好协会和日本红十字会的代表，除代表上述三团体之外，并代表日本工会总评议会、全日本产业别工会会议、日本中日贸易促进会、日中贸易促进会议、日中贸易促进议员联盟，以及日本青年、妇女、科学、文艺、新闻等各界共四十多个日本团体，于二十二日在北京向中华人民共和国中央人民政府毛泽东主席和宋庆龄副主席献礼，并向中国人民保卫世界和平委员会、中华全国总工会、中国红十字会等团体献礼，中国人民保卫世界和平委员会、中华全国总工会、中国红十字会等团体也向日本和平联络委员会、日中友好协会、日本红十字会和日本工会总评议会等团体赠礼。"},{"type":"paragraph","text":"出席献礼和赠礼仪式的，中国方面有：中国人民保卫世界和平委员会主席郭沫若、副主席陈叔通，秘书长刘宁一、刘贯一，商谈协助日侨归国问题的中国红十字会代表团首席代表廖承志、中国红十字会副会长彭泽民、熊瑾玎、胡兰生，中国教育工会全国委员会副主席方明和各人民团体、各界代表廖梦醒、田德民、吴有训、许广平、蔡楚生、冀朝鼎等一百多人。"},{"type":"paragraph","text":"出席献礼和赠礼仪式的，日本方面有：日本红十字会会长岛津忠承、外事部长工藤忠夫，日中友好协会理事长内山完造、常任理事加岛敏雄，日本和平联络委员会事务局长畑中政春、委员平野义太郎、高良富女士，现在北京的出席世界人民和平大会的日本代表西园寺公一和中村玩右卫门，日本日中贸易促进会议主席山本熊一，日本中日贸易促进会常务理事铃木一雄，日本教职员工会中央执行委员平垣美代司，日本中国研究所理事岩村三千夫，日本绿十字会书记长樱井善一等人。"},{"type":"paragraph","text":"中国人民保卫世界和平委员会秘书长刘宁一在致开会词时指出：日本人民每一件礼物和信件，都充满了日本人民友好的精神。中日两国人民的友谊是值得珍重的，中国人民即使在抗日战争时期，也认清中国人民的敌人只是日本军国主义者，而日本人民是我们的朋友。他最后说：中日两国人民彼此赠送礼物，表示了两国人民保卫亚洲和世界和平的意志，给予艾森豪威尔的“用亚洲人打亚洲人”的阴谋以有力的打击。"},{"type":"paragraph","text":"刘宁一致词后，日本人民代表和中国人民代表彼此献礼和赠礼，日本代表献给毛泽东主席和宋庆龄副主席的礼物，由中国人民保卫世界和平委员会副主席陈叔通代表接受。会场一再发出热烈的掌声，显示了中日两国人民的友谊和团结。"},{"type":"paragraph","text":"献礼和赠礼结束后，由中国人民保卫世界和平委员会主席郭沫若致词。郭沫若在追述中日两国历史事实之后说：从中日两国关系的历史中可以得出一个教训：就是两国之间如果和平共处，并采取友好学习的态度，吸收先进经验，便可以保证本民族的进步和幸福，但如果不和平共处而采取侵略战争的手段，结果侵略的一方必遭惨重失败。我们应从这些历史事实取得宝贵的教训。目前艾森豪威尔公开在叫嚣要“用亚洲人打亚洲人”，就是说要利用日本人对亚洲和中国人民进行侵略。这种政策将带给日本人民最大的不幸。郭沫若表示深信：尽管有少数日本人不肯接受历史教训愿作美国反动派的猫爪，但日本人民为了自己的进步和幸福，一定会起来反对他们。郭沫若并向日本朋友保证：中国人民愿向日本人民伸出友谊的手，共同为保障和平而努力。"},{"type":"paragraph","text":"接着岛津忠承、平野义太郎、高良富、西园寺公一、山本熊一也先后讲话，他们一致指出了日中两国人民长时期存在的珍贵的友谊的巨大意义，并且表示他们一定要发展这种友谊，以保卫亚洲和世界和平。"},{"type":"paragraph","text":"献礼和赠礼仪式在一种表达了中日两国人民友好的热烈气氛中进行。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"刘宁一","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4d98335228"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
