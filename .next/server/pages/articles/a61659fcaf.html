script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"我无耻的做了资产阶级思想的传播者","authors":["传东明"],"dates":[{"year":1952,"month":3,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"华东师大　传东明"},{"type":"paragraph","text":"在皖北土改时，我常和从未到过大城市的工作干部和农民们谈起上海。我说:“在上海真舒服，只要有钱，想吃什么就有什么。譬如我是湖南人，想吃家乡菜，就可以上湖南馆子。想玩吧:可以去看电影、逛公园、跳舞、听音乐……玩的地方实在太多了。出门又方便，那里像这里要凭两条腿跑这种泥路，有三轮车、电车、汽车等……。譬如房子吧:国际大厦高达二十几层，高得你看不见屋顶，夏天有冷气，冬天有水汀，睡的是弹簧床，坐的是沙发，真太舒服了……。”"},{"type":"paragraph","text":"有时我还更下意识地和他们谈“上海小姐”的装饰。我说:“上海小姐现在正行穿高领头的长旗袍，头发烫得后面翘起来，嘴唇涂得血血红……”。我总是把上海说得天花乱坠，物质享受应有尽有，甚至使有些农民觉得“什么时候能去一趟上海那该多么好”。当时，我还洋洋得意，引为骄傲。"},{"type":"paragraph","text":"在三反运动中，我才发觉，自己虽然进入大城市不久，可是已经被资产阶级思想所腐蚀了。在我思想中竟然会是那样地倾慕物质享受，轻视劳动，甚至还欣赏女人的阿飞头发、口红等，并无耻地作了资产阶级思想毒素的传播者，把这些毒素散布在我们艰苦朴实的工作干部和农民中间，做了资产阶级的义务宣传员，现在想起来是多么卑鄙可耻!"},{"type":"paragraph","text":"如果不是共产党毛主席领导我们在今天开展三反运动，谁能说我将来又不会被资产阶级的糖衣炮弹所毁灭呢?为了自己将来能成为一个好的人民教师，必须建立革命人生观，彻底的打垮资产阶级的猖狂进攻。为了祖国能迅速顺利的进入社会主义社会，我一定要坚决的投到三反运动中去，把污秽的资产阶级思想毒素，彻底清除干净。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a61659fcaf"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
