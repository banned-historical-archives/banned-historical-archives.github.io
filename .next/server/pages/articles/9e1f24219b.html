script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"“主人”“奴隶”析","authors":["紫浩"],"dates":[{"year":1977,"month":12,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"紫浩"},{"type":"paragraph","text":"‘我们要做学习的主人，决不做分数的奴隶。’这是‘四人帮’在上海的余党抛出的一个蛊惑人心的口号。所谓‘做学习的主人’，看上去冠冕堂皇，然而，谁要真以主人翁的态度学习文化科学知识，‘四人帮’的棍子、帽子就随之飞来。叛徒江青不是杀气腾腾地对《园丁之歌》中‘没有文化怎能把革命重担来承当’这句唱词大加讨伐，诬之为‘反攻倒算’吗?在‘四人帮’眼中，‘学习文化’就是罪恶，知识分子都是‘臭老九’，哪儿还有什么‘做学习的主人’可言?"},{"type":"paragraph","text":"‘决不做分数的奴隶’，更属荒唐。我们培养学生分析问题和解决问题的能力，并不就是要排斥分数，分数是反映学生学习质量的一个标志。分数与奴隶，风马牛不相及，硬把学习同分数对立起来，把分数同奴隶扯在一起，分明是反对文化学习的质量检查，反对学生为革命争取优异的学习成绩。"},{"type":"paragraph","text":"口号颇为‘革命’，戳穿一看，还是国民党特务分子张春桥“宁要没有文化的劳动者”的翻版。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9e1f24219b"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
