<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"奴隶在欢笑","authors":["商文健"],"dates":[{"year":1959,"month":12,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"奴隶在欢笑"},{"type":"paragraph","text":"商文健"},{"type":"paragraph","text":"高炉群"},{"type":"paragraph","text":"茫茫大草原上，炼铁厂建立起来了，火光熊熊，映照着牧民们兴奋而惊奇的眼睛；风箱呼呼，唱着世界上最雄壮的歌，炉口旋卷着淡蓝色的烟柱，向着雪山飞去……"},{"type":"paragraph","text":"呵！这是千百年来草原上第一次出现的高炉群。大鹰被惊飞了，獐子弃家而逃。在这地图上还没有标出名字、被人们长久遗忘的地方，一个崭新的黄金时代开始了！"},{"type":"paragraph","text":"手挥钢钎的炉前工是谁？是过去被压迫得从不曾欢笑的奴隶；背矿石的少女是谁？是过去被头人鞭打和凌辱的家人。白发蓬松的阿爹和阿妈呵，笑出了眼泪！看呵，这些被奴隶制的铁链折磨过的双手，今天，在自由富饶的土地上创造幸福，创造千百代农奴不敢梦想的天堂。"},{"type":"paragraph","text":"奴隶，这个简短的词句里包含着的痛苦和眼泪，现在，牧民们把它扔进了炉中；地上，血迹斑斑的铁镣刑具，牧民们把它扔进了炉中；还有老阿妈唱了六十年的凄惨的悲歌，牧民们也把它扔进了炉中……"},{"type":"paragraph","text":"炼铁炉呵，你是幸福的熔炉！泪水扔进去，欢乐流出来！荒凉扔进去，繁荣流出来！铁镣和刑具扔进去，麦镰和猎枪流出来！……"},{"type":"paragraph","text":"牧民们在草原上纵马奔驰，在海子边，在雪山上，他们总爱向那最光明、最壮丽的地方眺望，那里，炼铁厂——这草原上的珍珠正在灼灼闪光呵！"},{"type":"paragraph","text":"奴隶们站起来了，像雪山一样威严；炼铁厂站起来了，日夜喷吐着云烟。看呵，看呵！茫茫大草原上，风吼水响，红霞满天！"},{"type":"paragraph","text":"袜　子"},{"type":"paragraph","text":"人们把一双崭新的袜子，放在多吉的手上。这个雪松一样苍老的农奴呵，这个打了六十年赤脚的牧民呵，发抖的手捧着袜子，仰头望太阳，眼泪花花……"},{"type":"paragraph","text":"袜子穿在脚上，暖在心里。袜子来自内地，来自多吉在梦中也没有见过的美丽的城市，来自汉族大哥雄伟的工厂里。"},{"type":"paragraph","text":"像大鹰又得到了翅膀，民主改革把自由还给了千万奴隶。他们和多吉一样，失去的是被奴役的命运和辛酸的泪水，得到的是整个的天空、草原、太阳、牛羊、帐篷和社会主义！"},{"type":"paragraph","text":"多吉穿上了袜子，一步，两步……他像孩子似地走着路；好像这六十年来，他从来没有走过路一样！有多少长满了厚茧的脚，走过雪山，趟过冰河，坚硬而粗壮的脚，一生没穿过温暖而柔软的袜子，就被埋葬在苦难的草原上。他们死了，亲人们却更加悲伤，因为，佛爷说赤脚死去的人，是上不了天堂的。"},{"type":"paragraph","text":"如今天堂就在草原上，多吉看得见它，摸得到它，它是什么滋味，多吉心里全都知道。"},{"type":"paragraph","text":"欢乐的锅庄跳起来了！绿色的林卡里盛满了银色的月光。少女们的歌声和金珠玛米（解放军）的笑声汇成一股巨大的音浪，惊醒了沉睡的翠鸟，仿佛雪山也在轻轻摇晃。看，千万双穿着崭新袜子的脚，踩着最热烈的节拍，在纵情地跳。呵，这里面分不出哪一双是多吉的袜子，哪一双是卓玛的袜子，……呵，呵！一个受尽了苦难的民族今天在纵情的欢笑！"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"49292c99a4"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
