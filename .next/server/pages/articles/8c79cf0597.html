script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"刚果（金）革命战士决心让毛泽东思想在心中扎根  将革命武装斗争进行到底","authors":[],"dates":[{"year":1967,"month":11,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"刚果（金）革命战士决心让毛泽东思想在心中扎根"},{"type":"paragraph","text":"将革命武装斗争进行到底"},{"type":"paragraph","text":"新华社达累斯萨拉姆二十六日电　四位刚果（金）革命战士就世界革命人民的伟大领袖毛主席《支持刚果（利）人民反对美国侵略的声明》发表三周年，最近向新华社记者发表谈话说，毛主席的声明大大地鼓舞了刚果（金）人民。它象火炬一样，使他们能够在艰苦的战斗中看到光明前途。他们表示坚信：遵循光辉的毛泽东思想，走中国人民的革命道路，动员和依靠广大群众，坚持武装斗争，刚果（金）革命就一定会取得胜利。"},{"type":"paragraph","text":"一位革命战士说，毛主席教导我们：“谁是我们的敌人？谁是我们的朋友？这个问题是革命的首要问题。”“美帝国主义是全世界人民的共同敌人。”因此，只有从刚果（金）和非洲搬掉美帝国主义这座大山，才能出现新的刚果（金）和新的非洲。"},{"type":"paragraph","text":"另一位革命战士说：“毛主席关于帝国主义和一切反动派都是纸老虎的光辉思想武装了我们。尽管我们现在人数少，装备差，但是只要我们依靠广大群众，我们就会越来越强大。”"},{"type":"paragraph","text":"这些刚果（金）青年战士说，毛主席的伟大教导：“全世界人民要有勇气，敢于战斗，不怕困难，前赴后继，那末，全世界就一定是人民的。一切魔鬼通通都会被消灭。”使他们特别感到鼓舞。他们斗志昂扬地说：凡是反动的东西，你不打，他就不倒。只有通过战斗，才能夺取胜利。"},{"type":"paragraph","text":"他们说，毛主席的声明表达了七亿中国人民坚决支持战斗中的刚果（金）人民的坚强意志。他们表示决心要继续同美帝国主义及其在刚果（金）的走狗作斗争。他们说，中国无产阶级文化大革命的胜利大大地鼓舞了刚果（金）人民。意志坚强、无所畏惧的红卫兵的革命造反精神大大地鼓舞了他们。他们将战斗到底，获取最后胜利。"},{"type":"paragraph","text":"这四位刚果（金）青年战士说，毛主席是刚果（金）人民革命的救星。他们表示了他们共同的愿望：让伟大的毛泽东思想在心中扎根，并更加坚决地把革命的武装斗争进行到底，直到刚果（金）人民获得解放。他们热情地敬祝“毛主席万寿无疆！”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8c79cf0597"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
