script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"上海市产业工人举行代表会议  发动百万工人反击资产阶级进攻","authors":[],"dates":[{"year":1952,"month":2,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"上海市产业工人举行代表会议"},{"type":"paragraph","text":"发动百万工人反击资产阶级进攻"},{"type":"paragraph","text":"【本报讯】据新华社讯：上海市两千多产业工人代表在二十日举行上海工人反行贿、反偷税漏税、反盗骗国家资财、反偷工减料、反盗窃国家经济情报运动代表会议。这是上海市一百万工人大军对资产阶级的猖狂进攻展开猛烈回击、以巩固工人阶级领导权的誓师大会。大会一致通过了致毛主席电和四项决议。四项决议是：一、我们上海市一百万工人，决以高度的热情和坚强的决心，为了保护中国人民和工人阶级的利益，坚决对资产阶级的猖狂进攻予以有力的反击。二、我们一定在全市工人群众和人民群众中加强宣传教育工作，务使家喻户晓，认清资产阶级的本质及其各种丑恶面目，划清阶级界限，提高阶级觉悟。三、我们上海市一百万工人，一定坚决在共产党的领导下，加强工人、职员、技术人员的团结，揭发资产阶级各种罪恶无耻行为，发动群众性的检举，开动脑筋创造各种办法，以争取反行贿、反偷税漏税、反盗骗国家资财、反偷工减料、反盗窃国家经济情报斗争的彻底胜利。四、我们上海市一百万工人誓必勇敢前进，不获反行贿、反偷税漏税、反盗骗国家资财、反偷工减料、反盗窃国家经济情报斗争的彻底胜利，决不罢休！"},{"type":"paragraph","text":"大会首先由上海市人民政府市长陈毅、上海市总工会主席刘长胜致辞。他们号召全市工人继店员之后，整齐队伍，再接再厉地击退资产阶级的进攻。接着由中国店员工会上海市委员会副主席韩西雅讲话。他向大会宣布：到本月十九日止，全市二十万店员检举奸商的信件已达二十四万六千多件，全市不仅青年店员积极参加了战斗，高级职员和老年店员也都纷纷加入了斗争行列。医务工会副主席黄家驷（曾参加赴朝志愿医疗手术队）在会上控诉了奸商王康年等以假药充真药、以臭肉制罐头等来陷害志愿军的滔天罪行。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2d1096534c"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
