script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"为美国对蒋军事援助事  毛主席发表声明","authors":[],"dates":[{"year":1946,"month":6,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"为美国对蒋军事援助事"},{"type":"paragraph","text":"毛主席发表声明"},{"type":"paragraph","text":"〔新华社延安二十二日电〕中国共产党中央委员会主席毛泽东，今日为美国对蒋军事援助事发表声明如下："},{"type":"paragraph","text":"美国国务院于本月十四日  提付国会审议的继续对蒋军事援助法案，对中国的和平安定与独立民主有极为不利的影响，因此中国共产党坚持反对此项法案。中共此项意见，并为中国广大民主人士所支持。在抗日战争中，美国对于中国实施军事援助，并派遣美军在中国领土上协同作战，其目的是击败中美的共同敌人日本帝国主义。但就在那时，由于美国错误地仅仅援助国民党军阀，这种援助也并未有效地加强中国的抵抗，相反地是被国民党军阀用以加强其对于极积抗日的中国共产党与中国解放区的进攻与封锁。在日本投降以后，美国没有停止、反而极大的加强了对于中国国民党政府的各项军事援助，并在此实际目的下，派遣广大的军队驻在中国的领土与领海之上。这种行动，已经证明是中国大规模内战爆发与继续扩大的根本原因。仅仅在美国政府履行一九四五年十月莫斯科三国外长会议公报关于中国问题的约束，中国国民党与宣布停止内战和宣布履行中国政治协商会议会议关于国家民主化的决议的前提之下，中国共产党才会绝不反对美国对于中国的某种军事援助。但是现在这些前提都已被严重破坏，因此美国实行所谓军事援助，实际上只是武装干涉中国内政；只是以强力支持国民党独裁政府，继续陷中国于内战、分裂、混乱、恐怖和贫困；只是使中国不能实现整军复员，和履行其对于联合国的议务；只是危害中国国家安全独立与领土主权完整；只是破坏中美两大民族的光荣友谊、与中美贸易的发展前途。中国人民今天所急须的，并不是美国的枪炮及美军留驻中国领地；相反，中国人民痛恨美国运来中国的军火已经太多，美国在中国的军队已经驻的太多，它们已经构成中国的和平和安定与中国人民的生存和自由之严重巨大威胁。在此种现实情况之下，中国共产党不得不坚决反对美国政府继续以出售、交换、租借、赠送或让渡等方式将军火交给中国的国民党独裁政府，坚决反对美国派遣军事顾问来华，并坚决要求美国立即停止与收回对华的一切所谓军事援助，和立即彻回在华的美国军队。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"106e9a7d9f"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
