script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"在无产阶级专政条件下怎样继续闹革命毛主席关于两类矛盾的学说奠定了理论基础阿尔巴尼亚革命干部决心学好毛主席的光辉著作","authors":[],"dates":[{"year":1967,"month":6,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社地拉那18日电　阿尔巴尼亚革命干部热烈欢呼毛主席的光辉著作《关于正确处理人民内部矛盾的问题》发表十周年，强调这一著作具有国际意义，创造性地发展了马克思列宁主义。"},{"type":"paragraph","text":"阿尔巴尼亚劳动党中央委员、库克斯区委第一书记塔·明召齐对新华社记者发表书面谈话说:毛泽东同志这部著作已经和正在对中国共产党和国际共产主义运动，为反对以赫鲁晓夫分子为首的现代修正主义者的斗争作出伟大的贡献。"},{"type":"paragraph","text":"塔·明召齐说，毛泽东同志这部著作阐明社会主义社会里的矛盾和阶级斗争，矛盾的性质和类型以及解决这些矛盾的方法和途径。著作指出，在无产阶级专政条件下应当怎样进行革命，应当怎样全面巩固无产阶级专政。在毛主席关于解决各种不同矛盾的学说的指导下，中国共产党正在胜利地进行着无产阶级文化大革命。"},{"type":"paragraph","text":"塔·明召齐说，毛泽东同志的《关于正确处理人民内部矛盾的问题》是一部重要的理论文献，它使人们能够认识现实，认识不同性质和类型的矛盾，并在这个基础上找到解决的途径。因此，要学好这部著作。这部著作是共产党人和革命的劳动人民手中的强大武器。"},{"type":"paragraph","text":"民主阵线地拉那区委委员比巴对新华社记者说，毛泽东同志的《关于正确处理人民内部矛盾的问题》解决了一系列在中国和全世界建设社会主义社会的重要原则问题。它具有国际意义。我读了这部著作，懂得社会主义社会中的阶级斗争是客观存在的、不可避免的。因为在社会主义社会里，还有被推翻了的剥削阶级，还有反党的蜕化变质的修正主义分子。他们竭力企图复辟资本主义。正如毛主席说的:“有错误就得批判，有毒草就得进行斗争。”"},{"type":"paragraph","text":"刚刚从农村进行了关于人民内部矛盾问题的调查回来的“列宁”党校哲学教研室主任帕勒比对记者说，中国人民的伟大领袖毛泽东同志的《关于正确处理人民内部矛盾的问题》是一部杰出的马克思列宁主义著作。它总结了国际共产主义运动和中国革命的经验，在中国革命的条件下，创造性地发展了马克思列宁主义的一些重要问题。"},{"type":"paragraph","text":"他说，毛泽东同志的这部著作发表在一九五七年，当时现代修正主义在反教条主义的口号下反对马克思列宁主义和真正的革命者。毛泽东同志在这部著作中指出修正主义比教条主义有更大的危险性。按照修正主义观点，似乎社会主义社会是静止的，阶级斗争正在熄灭。而实际上，社会主义社会里还存在着社会主义制度蜕化变质的危险性，还存在着隐藏的反革命分子和产生新的反革命分子的可能性，还存在着资产阶级和小资产阶级的意识形态，因此在无产阶级专政的整个历史时期，社会主义和资本主义之间两条道路斗争将长期存在。"},{"type":"paragraph","text":"帕勒比说，毛泽东同志在这部著作中还确定了人民内部矛盾和敌我矛盾这两类不同性质的矛盾的界线及正确解决这两类不同矛盾的途径。这是一个很重要的问题。"},{"type":"paragraph","text":"帕勒比指出，毛泽东同志说:“世界观的转变是一个根本的转变”，“没有正确的政治观点，就等于没有灵魂。”这些正确的论断是非常重要的。"},{"type":"paragraph","text":"帕勒比还说，“列宁”党校的师生在霍查同志和阿尔巴尼亚劳动党的教导下，研究和正确解决人民内部矛盾的问题，并且进行了社会实践。他说，毛泽东同志的《关于正确处理人民内部矛盾的问题》也是我们列入教学大纲的重要著作之一。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"人民内部矛盾","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ddd1cc86e0"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
