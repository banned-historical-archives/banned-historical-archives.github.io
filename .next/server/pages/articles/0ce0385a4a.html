script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"武汉信托公司农民服务部  代售代购农民称便　行商中间剥削大大减除","authors":[],"dates":[{"year":1949,"month":8,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"武汉信托公司农民服务部"},{"type":"paragraph","text":"代售代购农民称便"},{"type":"paragraph","text":"行商中间剥削大大减除"},{"type":"paragraph","text":"【汉口讯】武汉市贸易公司信托公司农村服务部已于本月七日正式营业。该部之主要业务为：一、代售、收购或代存农民合作社运销之农产品；二、代购农民或农民合作社所需之物品。该部在筹备期间已在广大农民间初步建立了威信，当时适逢新谷登场，来粮充裕，农民及贩运商急欲脱售，而市场滞售，该部为解决此问题，乃暂时通过粮行，代为收购，从七月十二日到本月上旬，业已收购或代售谷子七十万零四千八百零八斤半，小麦一百九十六万六千八百八十一斤半及齐米、三道机米、黄豆等总值约三亿元人民币；一切费用都未取，其中并给农民换回一百篓火柴，二十担（每担一百斤）红糖。按过去一船情况农民上粮，通过粮行代卖时每卖出一担（一百三十八斤）粮，除了要支付行佣百分之四外，还支付挖包费、缝包费、看秤的、招待费折合人民币共计五百一十六元余，其他还有“看样子”、压秤、压价收购等超额剥削。而现在农村服务部，代售农民农产品时，按千分之五手续费，比行店的行佣少。该部并教育了缝包工人等，使他们自动减去挖包、缝包等费二分之一，因此今后农民直接委托农村服务部代售者，按现在每担一万三千元计算，可少支五百一十七元，其他一切杂费都没有。因此，使农民都乐于向该部出售农产品。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0ce0385a4a"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
