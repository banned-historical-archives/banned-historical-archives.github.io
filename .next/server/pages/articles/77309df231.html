script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji30","name":"毛泽东全集第30卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji30.pdf"],"article":{"title":"提高军事训练和政治工作水平","alias":"","parts":[{"type":"paragraph","text":"提高军事训练和政治工作水平"},{"type":"paragraph","text":"（1951年5月23日）谭政同志："},{"type":"paragraph","text":"五月十七日电悉。（一）华南各军军事训练的方针是正确的。（二）希望你于秋季再去广州一次，检查各军的工作和海防工作。你去时最好再找一二个在朝鲜作战有经验的高级干部同去广州，向干部们作报告，提高军事训练和政治工作。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"五月二十三日[1]谭政，当时任中南军区第三政治委员。"},{"type":"paragraph","text":"[2]指1951年5月17日谭政给毛泽东的报告中提出的华南各军军事训练的方针。报告说，考虑到我们现在的练兵是战略练兵，必须从精神上有所准备，即是趁敌人未来以前，集中时间将必须学的赶紧学好；以便有备无患。因此，就不宜按和平时期办法按步施教。军委训练部所订计划内容太多，且规定不能更改，如按其实施则时间很难集中，重要的课目没有充分足够时间去教，极易产生形式主义。鉴于志愿军在朝鲜作战经验，在我军技术战术教练上着重某些方面训练是有必要的，不应按平隙时间和按操典程序施教。"}],"authors":["毛泽东"],"dates":[{"year":1951,"month":5,"day":23}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":326,"page_end":326},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"77309df231"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
