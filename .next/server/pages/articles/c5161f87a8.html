<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"邓副总理参观日本君津钢铁厂挥毫题词:“中日友好合作的道路，越走越宽广，我们共同努力吧!”","authors":[],"dates":[{"year":1978,"month":10,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社东京十月二十六日电　邓小平副总理今天上午乘坐高速气垫船从东京出发，横渡东京湾，前往座落在千叶县沿海地区的君津钢铁厂参观访问，受到热烈的欢迎。"},{"type":"paragraph","text":"君津钢铁厂是一家设备先进、生产能力大、但只有十年历史的大型现代化钢铁厂。它同中国一些钢铁企业有着较多的技术合作关系。"},{"type":"paragraph","text":"邓副总理今天在这家工厂参观时，表示要借鉴他们的先进的管理经验，并且指出，中日友好合作的道路越走越宽广，希望双方共同努力。"},{"type":"paragraph","text":"今天上午九时，邓副总理一行从东京的海湾码头——竹芝栈桥出发，登上这艘有一百四十多个座位的大型高速气垫船，以每小时七十五公里的速度，朝东南方向的工厂所在地千叶县君津市驶去。气垫船拍浪前进，溅起团团水雾。今天，东京湾薄雾弥漫，沿岸著名的“京滨工业区”鳞次栉比的工厂隐约可见。新日本钢铁公司董事长稻山嘉宽在船上向邓副总理等中国客人介绍了这家日本最大的钢铁公司的情况。他指出，尽管它的一些钢铁厂拥有现代最先进的设备，但由于处于严重的经济困难时期，开工率低，这是非常可悲的事情。他说，中国是购买它生产的钢铁的大主顾之一。稻山表示愿以最新的技术同中国有关企业合作。"},{"type":"paragraph","text":"中国客人乘坐气垫船只用四十五分钟就到达了填海建成的君津钢铁厂。大约有一百多名钢铁厂的行政和技术负责人以及工人列队在岸边，高举着巨大的欢迎横幅，挥动着中日两国国旗，热烈欢迎中国客人。"},{"type":"paragraph","text":"邓副总理一行在新日本钢铁公司总经理斋藤英四郎等人的陪同下，乘车在厂内参观，日本朋友向中国客人介绍了工厂的布局、设施和生产技术等情况。"},{"type":"paragraph","text":"君津钢铁厂是新日本钢铁公司属下的现代化钢铁厂之一。这家工厂共有职工一万六千多人(包括协作企业的人员约九千人)，年生产能力为一千万吨，去年实际产量为六百多万吨。这里的技术人员目前正在和中国技术人员一道，为华东地区的一座现代化钢铁厂的建设而工作。"},{"type":"paragraph","text":"参观车在占地一千万平方米的工厂区缓缓行驶。厂房之间是一片片空旷的碧绿草地。日本朋友指着第三号高炉介绍说，这座容积为四千零六十三立方米的高炉，日产粗钢一万吨。"},{"type":"paragraph","text":"邓副总理参观了热轧车间。他走下车来和列队欢迎的日本钢铁工人一一握手。为了迎接邓副总理，这座工厂的工人连日来突击改建了专用楼梯。邓副总理从楼梯登上厂房高处的走廊，这时，一条数十米长的火红的钢板正在沿着长达一千二百米的传送机迅速前进。主人们介绍说，热轧的速度为每小时六十公里。这个生产钢板的车间实现了自动化生产，整个生产现场几乎看不到工人。邓副总理随后走进这座车间的控制中心，参观了利用电子计算机控制轧制钢板的情景。"},{"type":"paragraph","text":"在君津钢铁厂的管理大厦里，邓副总理同工厂的负责人员进行了交谈。他对这家工厂给予中国的帮助表示感谢。他要求日本朋友一定要把先进的生产管理经验介绍给正在这里或即将来这里实习的中国工人，使他们完全能掌握。他还应日本朋友的要求，挥毫题词:“中日友好合作的道路，越走越宽广，我们共同努力吧!”这时会客厅里响起一片掌声。邓副总理把中国著名画家李苦禅画的一幅国画《花香鸟语》赠送给君津钢铁厂。"},{"type":"paragraph","text":"参观结束后，稻山嘉宽对日本记者说:正如邓副总理在今天的题词中所说的，日本钢铁工业界同中国进行合作的道路愈来愈宽广。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c5161f87a8"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
