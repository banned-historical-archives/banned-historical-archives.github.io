script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"云南省普及农村广播网  毛泽东思想阳光照边疆","authors":[],"dates":[{"year":1969,"month":4,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"伟大的毛泽东思想空前大传播大普及"},{"type":"paragraph","text":"云南省普及农村广播网"},{"type":"paragraph","text":"毛泽东思想阳光照边疆"},{"type":"paragraph","text":"党的第九次全国代表大会胜利开幕的特大喜讯，极大地鼓舞了云南各族人民加速普及农村广播网的建设。许多边村山寨，抓紧时间办好广播，保证准确、及时地收听到毛主席的声音和无产阶级司令部的战斗号令。"},{"type":"paragraph","text":"伟大领袖毛主席教导我们：“努力办好广播，为全中国人民和全世界人民服务。”可是叛徒、内奸、工贼刘少奇及其代理人拚命封锁毛主席的声音，疯狂反对各族革命人民活学活用毛泽东思想，千方百计破坏农村广播网的建设。在波澜壮阔的无产阶级文化大革命中，各族革命人民用战无不胜的毛泽东思想，狠揭狠批了刘少奇及其代理人破坏无产阶级广播事业的滔天罪行，决心办好农村广播网，把农村广播网办成一个大宣传、大普及毛泽东思想的坚强阵地。他们在各级革命委员会的领导下，坚持用毛泽东思想统帅广播工作，充分发动群众，自力更生，使农村广播网的建设取得了重大成绩。昆明电机厂的革命工人发扬敢想敢干的革命精神，没有图纸自己画，原料不足用废料，经过十三天反复试验，终于成功地制成了二十五瓦高音喇叭和输送变压器。当这些广播器材送到农村山寨时，受到了各族革命人民的热烈欢迎。云南电讯器材修配厂的广大革命工人怀着对伟大领袖毛主席的无限忠心，用革命统帅生产，短时间就制造出质量良好的七十五瓦晶体管葵花牌扩大器，每台可带五百支小喇叭，可供五百户人家用，很受山区贫下中农喜爱。条件较差的保山、大理、曲靖、思茅等专、县机械、五金等部门，破除迷信，战胜困难，也用简陋的设备造出高水平的广播器材。在很短时间内，就迅速在全省农村普及了广播网，为传播毛泽东思想作出了重大贡献。"},{"type":"paragraph","text":"广大人民公社社员也为普及广播网贡献了自己的力量。许多边远山寨的各族社员，千方百计克服困难，自己测量，自己架线，自己安装，加速了广播网建设的进程。澂江县各族社员自力更生，使全县百分之七十的生产队都安装上了高音喇叭。四月一日晚，当“九大”胜利开幕的新闻公报一广播，全县一片欢腾，广大贫下中农激动得热泪盈眶，一遍又一遍地欢呼：“毛主席万岁！万万岁！”“敬祝毛主席万寿无疆！万寿无疆！”滇西南的边防重镇畹町镇，在“九大”开幕头一天全镇普及了广播网。当广大傣族社员从自己安装的喇叭里听到“九大”隆重开幕的新闻公报时，一个个穿上节日盛装，载歌载舞，怀着对毛主席无限热爱的深厚无产阶级感情，向毛主席表达忠心，决心用抓革命，促生产，促工作，促战备的更大成绩，向“九大”献礼。西双版纳勐海县勐遮区的曼根、曼勐养、曼养尤等四十三个寨子一千一百多户，家家装上了小喇叭。傣族社员说：“毛主席给我们派了一个政治指导员（指广播喇叭），我们一定能够把锦绣边疆办成红彤彤的毛泽东思想大学校。”在欢庆“九大”开幕的当天晚上，一位傣族老人还即兴编唱了一支诗歌，歌词唱道：“小小喇叭真是好，党的‘九大’能知晓，傣家欢呼齐歌颂，毛泽东思想是传家宝。”（据新华社）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"云南文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"245c4fab44"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
