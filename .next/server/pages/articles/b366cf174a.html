<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"浙南許多老區沒有被承認，不少堅持地下鬥爭的黨員幹部被攻擊","authors":[],"dates":[{"year":1957,"month":1,"day":15}],"is_range_date":false,"parts":[{"text":"浙南许多老区没有被承认，不少坚持地下斗争的党员干部被攻击","type":"title"},{"text":"新华社杭州15日讯  据去年12月访问浙南老区归来的郑伯永同志（现任浙江文联秘书长、党员）谈：浙南老区存在著不少严重问题，突出的是：许多老区解放以来一直没有被承认。例如平阳县五岱山是第二次国内战争时期的主要根据地之一，解放以来确没有把它当做老区。不承认这些地方是老区的理由是：解放以后，这些乡的个别村中有武装土匪活动，有一个村的村长有通匪行为。","type":"paragraph"},{"text":"由于许多老区不被承认，其中的烈、军属绝大部分也没有被承认。例如平阳县五凤乡有八十六个干部和群众为革命牺牲，其中有二十九万人可以肯定是干部。但只有二人的家属被承认是烈属，发了一百五十元救济金。肃反队长潘士雅的妻子王玉英，受敌人酷刑逼供，为了不说出任何革命情况，当场把自己舌头咬烂，事迹可歌可泣，但当地政府一直不承认她是烈属。去年，她一连饿了五顿饭，向村干部求救，村干部没有理睬。","type":"paragraph"},{"text":"解放以后，在土改和镇反时，由于干部处理案件时犯了主观、草率的毛病，造成不少冤狱案件，其中有许多至今没有平反。由于当时地下斗争环境複杂，浙南有不少地区派出党员和可靠群众去担任伪乡长、伪保长，伪装反动。，替敌人带路，欺骗敌人，去的情报（其中也有坏人）。在土改和镇反期间，这些同志几乎一律被斗，甚至被判徒刑送去劳改。平阳县在土改、真烦期间，县委提出“翻不出土匪，不算彻底”的口号，造成了涉及四千人的大冤案，善后工作没有作，群众影响很坏。对地下党员党籍的处理粗暴、草率。成批党员在土改期间被开除。例如瑞安县顺太乡的一个渔民，解放以前七八年，一直替我们划船，是江上一大功臣。解放以后，受打新干部的打击，情绪消沉，被认为是“落后分子”，在整党时被开除，现在贫病交迫，生活十分困难。","type":"paragraph"},{"text":"许多老干部受到打击、排挤。平阳县五凤乡十二个农业社中，社长以上的干部中只有三个是老干部。乡干部中，几乎全部是1952年以后参加革命的。有的老干部因为被打击而发疯，有的鬱愤而死。","type":"paragraph"},{"text":"郑伯永分析产生以上问题的原因是：","type":"paragraph"},{"text":"1、\t各级党委对于浙南老区的认识有错误，片面强调其“複杂性”；","type":"paragraph"},{"text":"2、\t新干部和外来干部对于浙南地区过去的斗争环境，情况太不了解；","type":"paragraph"},{"text":"3、\t解放后，南北会师没有会好，党内没有发扬民主，从而断绝了言路，使本地干部不敢反映情况。（张济生）","type":"paragraph"},{"text":"来源：新华通讯社编：《内部参攷》第2105期，1957年1月15日","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b366cf174a"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
