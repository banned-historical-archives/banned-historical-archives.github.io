script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反对垄断资本的残酷剥削和压迫  意大利工人继续斗争  米兰三十多万工人罢工  一些城市的工人举行示威","authors":[],"dates":[{"year":1969,"month":10,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反对垄断资本的残酷剥削和压迫"},{"type":"paragraph","text":"意大利工人继续斗争"},{"type":"paragraph","text":"米兰三十多万工人罢工　一些城市的工人举行示威"},{"type":"paragraph","text":"据新华社讯　罗马消息：意大利广大工人连日来继续举行罢工、集会和示威游行，反对垄断资本的残酷剥削和压迫。"},{"type":"paragraph","text":"在意大利第二大城米兰，三十多万冶金和机器制造工人七日再次举行二十四小时罢工，要求提高工资、缩短工时和保障工人的权利。"},{"type":"paragraph","text":"十万罢工工人还高举着无数红旗和许多号召工人阶级团结起来进行斗争的标语，在米兰市区举行了声势浩大的示威游行。他们沿途高唱《国际歌》，高呼口号，最后在米兰市中心广场举行了群众大会，对垄断资产阶级表示愤怒的抗议。"},{"type":"paragraph","text":"意大利的二十二万化学和制药工人，八日再次在全国范围举行二十四小时罢工，要求提高工资。"},{"type":"paragraph","text":"在意大利首都罗马，数千名罢工的机器制造工人，八日也在市区举行了示威游行。"},{"type":"paragraph","text":"特尔尼市各行各业的工人，为了抗议生活费用和房租上涨，在八日举行了总罢工。这次罢工使这个意大利中部的城市陷于瘫痪状态。"},{"type":"paragraph","text":"据新华社讯　罗马消息：意大利广大工人反对垄断资产阶级残酷剥削的罢工斗争继续发展。"},{"type":"paragraph","text":"冶金和机器制造业工人的罢工斗争到五日已坚持了三个多星期。都灵、米兰、热那亚、威尼斯、那不勒斯等城市的数十万冶金、机器制造、化学和制药工人，五日仍在继续罢工，要求提高工资。"},{"type":"paragraph","text":"三日和四日，五万五千名制砖工人再次举行了四十八小时罢工。"},{"type":"paragraph","text":"十月三日，在热那亚、威尼斯和那不勒斯三大城市，都有数千名罢工工人举行声势浩大的示威游行，愤怒抗议垄断资产阶级的罪恶统治。在都灵以及罗马附近，罢工工人同前往镇压的警察进行了搏斗。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5cf4b03aac"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
