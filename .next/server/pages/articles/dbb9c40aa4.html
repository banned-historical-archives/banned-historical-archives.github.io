script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"奋起反对阮文绍集团的残酷剥削和掠夺越南南方敌占区城市人民斗争继续发展","authors":[],"dates":[{"year":1972,"month":10,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社河内一九七二年十月七日电　最近以来，越南南方敌占区城市人民继续开展斗争，反对阮文绍集团加紧剥削和掠夺。"},{"type":"paragraph","text":"在岘港，八月初爆发了近一万人反对伪军抢劫逞凶的斗争。八月七日夜里，从广治溃退到岘港的一股伪军，闯进山水寺地区进行抢劫，该地近一万群众立即把这些歹徒包围起来，强烈谴责它们的暴行，并砸坏了这股伪军的头目乘坐的吉普车。当地伪政权出动警察前来镇压，打伤了两名群众，激起了群众的更大愤怒。群众把警察包围起来，要求惩办凶手。斗争一直进行到八日早晨。在群众的压力下，岘港市伪政权被迫把抢劫逞凶的伪军头目和打伤两名群众的警察扣留起来，并且答应赔偿群众损失。"},{"type":"paragraph","text":"在西贡，许多行业工人最近接连开展斗争，反对资方同阮文绍集团勾结，加紧剥削、镇压和无理解雇工人，要求废除工头制，要求增加津贴。格兰医院工人要求废除工头制的斗争，得到了西贡—嘉定区一百多个工人组织的坚决支持。千迪石油公司工人坚持了好几个月的要求增加津贴的斗争取得了胜利，在九月二十三日迫使资方接受了工人们的要求。西贡的铁路工人在八月底同资本家展开了斗争，要求资方还清所欠的薪金和津贴，要求今后按期发给薪金和增加津贴。西贡成万名客车工人最近也开展斗争，反对阮文绍集团增加税收、肆意罚款和关闭车站。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dbb9c40aa4"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
