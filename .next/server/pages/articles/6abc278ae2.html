script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"拉美许多国家儿童苦难重重  身受美国和本国寡头集团剥削","authors":[],"dates":[{"year":1963,"month":5,"day":31}],"is_range_date":false,"parts":[{"type":"paragraph","text":"拉美许多国家儿童苦难重重"},{"type":"paragraph","text":"身受美国和本国寡头集团剥削"},{"type":"paragraph","text":"据新华社三十日讯　在仍然遭受美帝国主义和本国寡头集团残酷掠夺和剥削的拉丁美洲国家中，儿童过着苦难的生活。"},{"type":"paragraph","text":"由于严重营养不良、饥饿、疾病和缺少医疗设备，拉丁美洲国家儿童的死亡率普遍很高。根据泛美卫生局四月提供的材料，在拉丁美洲，每七名五岁以下的儿童中就有一名死亡。这类夭折的儿童人数每年达一百万名以上。"},{"type":"paragraph","text":"在亲美独裁政权长期统治下的危地马拉，儿童死亡率之高是惊人的。据危地马拉公共卫生总局营养部的调查材料，一九六○年，这个国家的儿童死亡达一万六千四百一十六名。另据厄瓜多尔《明天》杂志透露，厄瓜多尔儿童每年死亡达两万名。"},{"type":"paragraph","text":"巴西妇女代表在一月举行的美洲妇女代表大会上揭露美帝国主义掠夺政策的后果时说，在联合国组织发表的关于世界儿童死亡率的统计表中，巴西居第二位。巴西每天要死一千零四十个婴儿，其中绝大多数死于营养不良和饥饿。"},{"type":"paragraph","text":"在拉丁美洲，幸免于夭折的儿童也过着非常悲惨的生活，吃不饱，穿不暖，甚至不得不参加繁重的劳动来帮助父母维持生活。据统计，秘鲁每年生产麻醉性的古柯叶一千一百万公斤；贫苦的农民、妇女和儿童就食用了其中的百分之六十，他们在饥饿时用它来麻痹脾胃，抑制食欲。"},{"type":"paragraph","text":"在大庄园制的统治下，一些拉丁美洲国家的儿童还像牲畜一样被贩卖。据秘鲁《明确》日报四月二十八日报道，有一名“商人”曾经把四十三个男孩和女孩装在两辆破旧的卡车里，把他们运到“卡萨布兰卡”和“乔基坦特”棉花庄园去当童工。"},{"type":"paragraph","text":"由于穷困，儿童失学现象严重。据报道，拉丁美洲有五百万学龄儿童不能入学。尼加拉瓜妇女代表孔塞普西翁·帕拉西奥在美洲妇女代表大会上发言中曾说，尼加拉瓜有百分之四十的儿童不能上小学。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6abc278ae2"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
