" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji22","name":"毛泽东全集第22卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji22.pdf"],"article":{"title":"先打弱的后打强的你打你的我打我的","alias":"","parts":[{"type":"paragraph","text":"先打弱的后打强的你打你的我打我的"},{"type":"paragraph","text":"（1947年4月22日）聂、萧、罗\"，并告朱、刘凹:"},{"type":"paragraph","text":"马电悉。你们现已取得主动权，如敌南援，你们不去理他，仍然集中全力完成正太战役?，使敌完全陷入被动，这是很正确的方针。正太战役完成后，应完全不被敌之动作所迷惑，选择敌之薄弱部分主动地歼击之，选击何部那时再定。这即是先打弱的，后打强的，你打你的，我打我的（各打各的）政策，亦即完全主动作战政策。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"卵养"},{"type":"paragraph","text":"[1]聂、萧、罗，指聂荣臻、萧克、罗瑞卿，当时分别任晋察冀军区司令员兼政治委员、副司令员和副政治委员。"},{"type":"paragraph","text":"[2]朱、刘，指朱德和刘少奇。"},{"type":"paragraph","text":"[3]指聂荣臻、萧克、罗瑞卿1947年2月21日给中共中央军委的电报。电报说：敌南援可能性最大，我晋察冀军区主力仍按预定计划完成正太战役第二期作战。战役完成休整若干天后，敌如未南援，则按中央指示继续歼灭第三军；敌如南援，则以围点打援办法，向平保段或保石段出击。"},{"type":"paragraph","text":"[4]1947年4月，晋察冀野战军第二、第三、第四纵队及地方武装-部，由安国、定县南下，向正太路国民党军发起进攻。这次作战从4月9日开始至5月4日结束，共歼敌3.5万余人，切断了太原与石家庄之敌的联系，"},{"type":"paragraph","text":"黄们全实制正大作战AA—"},{"type":"paragraph","text":"151m99"},{"type":"paragraph","text":"56"},{"type":"paragraph","text":"你们现己取"},{"type":"paragraph","text":"，如敲有援，留们不去理他爆中全力完成正大筑役"},{"type":"paragraph","text":"仍然傅这宠很"},{"type":"paragraph","text":"所法"},{"type":"paragraph","text":"汽歌之，尊弱部主勤地"},{"type":"paragraph","text":"之人选意何部自那时再定"},{"type":"paragraph","text":"失打弱藏信打强傲的出行你的我打我的（名打条的）政第不即党全主作承困政筑军善着毛泽东为中共中央军委起草的关于正太战役的指示的手稿。"}],"authors":["毛泽东"],"dates":[{"year":1947,"month":4,"day":22}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":535,"page_end":536},"tags":[{"name":"毛泽东","type":"人物"},{"name":"聂荣臻","type":"人物"},{"name":"罗瑞卿","type":"人物"},{"type":"文稿类型","name":"文章"}]},{"type":"pdf","id":"wenji4","name":"毛泽东文集第四卷（1999）","internal":false,"official":true,"author":"中央文献研究室","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/wenji4.pdf"],"article":{"title":"先打弱的后打强的你打你的我打我的","description":"根据毛泽东手稿刊印。","dates":[{"year":1947,"month":4,"day":22}],"parts":[{"text":"先打弱的后打强的你打你的我打我的","type":"title"},{"type":"appellation","text":"聂萧罗并告朱刘："},{"type":"paragraph","text":"马电悉。你们现已取得主动权，如敌南援，你们不去理他，仍然集中全力完成正太战役，使敌完全陷入被动，这是很正确的方针。正太战役完成后，应完全不被敌之动作所迷惑，选择敌之薄弱部分主动地歼击之，选击何部那时再定。这即是先打弱的，后打强的，你打你的，我打我的（各打各的）政策，亦即完全主动作战政策。"},{"type":"paragraph","text":"军 委"},{"type":"paragraph","text":"卯养"}],"comment_pivots":[{"part_idx":1,"offset":3,"index":1},{"part_idx":1,"offset":7,"index":2},{"part_idx":2,"offset":2,"index":3},{"part_idx":2,"offset":38,"index":4}],"is_range_date":false,"authors":["毛泽东"],"comments":["聂萧罗，指聂荣臻、萧克、罗瑞卿，当时分别任晋察冀军区司令员兼政治委员、副司令员和副政治委员兼政治部主任。","朱刘，指朱德和刘少奇。","指聂荣臻、萧克、罗瑞卿一九四七年二月二十一日给中共中央军委的电报。电报说：敌南援可能性最大，我晋察冀军区主力仍按预定计划完成正太战役第二期作战。战役完成休整若干天后，敌如未南援，则按中央指示继续歼灭第三军；敌如南援，则以围点打援办法，向平保段或保石段出击。","一九四七年四月，晋察冀野战军第二、第三、第四纵队及地方武装一部，由安国、定县南下，向正太路国民党军发起进攻。这次作战从四月九日开始至五月四日结束，共歼敌三万五千余人，切断了太原、石家庄之敌的联系，使晋察冀和晋冀鲁豫解放区连成一片，孤立了石家庄的国民党军。"],"page_start":249,"page_end":249,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4616f20115"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
