script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"丹共代表大会闭幕拉森等修正主义分子遭到毁灭性失败　选出新的中央委员会　耶斯佩森当选主席","authors":[],"dates":[{"year":1958,"month":11,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【据新华社柏林3日电】　哥本哈根消息:历时3天的丹麦共产党第20次代表大会，2日晚闭幕。"},{"type":"paragraph","text":"会议通过了一项谴责修正主义和关于党的今后任务的决议，并选举了一个坚定地站在马克思列宁主义立场上的新的中央委员会。新选的中央委员会由37人组成。其中，有11名新的委员。此外，还选出了12名候补中央委员以及由5人组成的监察委员会。新的中央委员会没有党的前主席拉森和为数极少的追随他的其他修正主义者。至此，以拉森为首的少数修正主义分子企图分裂党的活动遭到毁灭性的失败。"},{"type":"paragraph","text":"代表大会结束后，新选出来的丹共中央委员会举行了第一次全体会议，会上一致选举克努德·耶斯佩森为丹麦共产党主席。"},{"type":"paragraph","text":"在通过中央委员会的报告时，在出席大会的217名代表中只有12人投反对票，其中包括前主席拉森。在就中央委员会报告进行讨论的整个过程中，拉森的修正主义观点遭到了绝大多数代表的强有力的坚决驳斥。"},{"type":"paragraph","text":"大会所通过的决议，坚决斥责了南斯拉夫共产主义者联盟的修正主义纲领。决议说:“现代修正主义是在最近几年内作为一种国际潮流而出现的，它企图在各国工人阶级当中散布怀疑和混乱。我们的党表明，它摒弃南斯拉夫的纲领，这个纲领是为对抗莫斯科宣言而提出来的，它在一些根本点上是不正确的和反马克思主义的。”"},{"type":"paragraph","text":"决议还强调指出，丹麦共产党拥护同其他各国共产党的国际团结，决议说，这种团结是丹麦民族独立的最重要的保证。决议强调指出，各国共产党之间的团结是基于共同的观点和共同的马克思列宁主义理论的基础。党反对一切要破坏世界共产主义的团结和壮大的企图。"},{"type":"paragraph","text":"大会还通过了(一票反对)“告全体党员书”以及新的党章草案和一项政治宣言。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"149a7dd418"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
