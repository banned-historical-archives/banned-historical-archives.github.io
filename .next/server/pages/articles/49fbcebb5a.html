script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"民进七届中常会十一次会议闭幕  赵朴初号召民进会员旗帜鲜明地反对资产阶级自由化","authors":[],"dates":[{"year":1987,"month":1,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"民进七届中常会十一次会议闭幕"},{"type":"paragraph","text":"赵朴初号召民进会员旗帜鲜明地反对资产阶级自由化"},{"type":"paragraph","text":"新华社北京1月11日电  中国民主促进会第七届中央常务委员会第十一次会议今天上午在北京闭幕。会议通过的《1987年工作要点》，要求在新的一年里，民进会员要更加积极地为加强社会主义民主和法制服务，为社会主义精神文明和物质文明建设服务，积极开展对台湾同胞、港澳同胞、国外侨胞及海外其他人士的联谊工作。"},{"type":"paragraph","text":"民进中央副主席赵朴初在开幕会上讲话时号召民进会员保持清醒的头脑，旗帜鲜明地反对资产阶级自由化，在政治上同中共中央保持一致，为发展大好形势，维护安定团结的政治局面努力做出贡献。"},{"type":"paragraph","text":"在为期五天的会议中，与会者结合当前的形势，学习和讨论了全国统战工作会议的精神，讨论和制定了1987年的工作安排和召开民进全国代表会议的筹备工作。会议决定1987年6月在北京召开民进全国代表会议。"},{"type":"paragraph","text":"民进中央副主席雷洁琼、陈舜礼、葛志成、楚庄及二十五名常委出席了会议。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"49fbcebb5a"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
