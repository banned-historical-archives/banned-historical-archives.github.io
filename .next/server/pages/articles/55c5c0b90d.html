" crossorigin="">{"props":{"pageProps":{"books":[{"id":"5ba19c54-124b-4e05-bf76-73e558230021","name":"红旗一九六六年第十二期","internal":false,"official":true,"type":"pdf","author":"《红旗》杂志编辑部","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives2/main/5ba19c54-124b-4e05-bf76-73e558230021.pdf"],"article":{"title":"在接见外地来京革命师生大会上的讲话","alias":"在接见外地来京革命师生大会上林彪同志的讲话","parts":[{"type":"paragraph","text":"在接见外地来京革命师生大会上林彪同志的讲话"},{"type":"paragraph","text":"（一九六六年八月三十一日）同志们，同学们，红卫宾战士们："},{"type":"paragraph","text":"我代表我们伟大的导师，伟大的领袖，伟大的统师，伟大的舵手毛主席，向各地来的同学问好，向大家问好！我代表党中火向大家问好！"},{"type":"paragraph","text":"同学们，你们来到北京，同北京的节命师生交流了文化大革命的经验。你们辛苦了！我们机信，你们回去以后，一定会更好地按照毛主席的指示，按照党中央的十六条，冲破一罚阻力，克服各种困难，把无产阶级文化大革命更加轰轰烈烈地开展起来！"},{"type":"paragraph","text":"当前无产阶级文化大革命的形势，好得很！"},{"type":"paragraph","text":"红卫兵和棋他青少年的革命组织，像雨后卷算一样地发展起来。他们走上街头，横扫“四旧”。文化大革命，已经触及到政治，触及到经济。学校的斗、批、改，发展到社会的斗，批、改。群众的革命洪流，正在荡涤若旧社会遗留下来的一切污泥独水，改变若我国整个社会面貌。"},{"type":"paragraph","text":"革命的小将们，毛主席和党中央热烈赞扬你们敢想，敢说，敢干，敢闯，敢革命的无产阶级革命精神。你们干了大量的好事，你们提出了大量的好倡议。我们十分高兴，我们热烈支持你们！坚决反对压制你们！你们的革命行动好得商志们，同学们！"},{"type":"paragraph","text":"我们一定要按照毛主席的教导，敢于斗争，敢于革命，善于斗争，，善于革命。我们要用毛泽东思想做为无产阶级文化大革命的指南，认真地、全面地、彻底地，不折不扣地贯彻执行十六条。"},{"type":"paragraph","text":"我们一定要按照毛主席的教导，分清谁是我们的敌人，谁是我们的朋友。要注意团结大多数，集中力量打击一小报资产阶级右派分了。打击的重点，是钻进党内走资本主义道路的当权派。一定要掌握这个斗争的大方向。"},{"type":"paragraph","text":"我们一定要按照毛主席的教导，要用文斗，不用武斗。不要动手打人。斗争那些走资本主义道路的当权派，斗争那些地、富、反、坏、右分了，也是这样。武斗只能触及皮肉，文斗才能触其灵魂。只有文斗，进行充分揭露，深刻批判，才能彻底暴露他们的反革命面貌，把他们最大限度地孤立起来，斗臭，斗垮，斗倒。"},{"type":"paragraph","text":"各大中学校的红卫乓和其他革命的青少年组织，是文化大革命的急先锋，是人民解放军的强大后备力量。"},{"type":"paragraph","text":"同学们，红卫兵战士们，你们要永远忠于党，忠于人民，忠于毛主席，忠于毛泽东思想。要努力活学活用毛主席著作，在用学上狠下功夫。要全心全意为人民服务，密切地联系群众，模范地执行党的政策，维护人民利益，爱护国家财产，遵守三大纪律八项注意。"},{"type":"paragraph","text":"同学们，只要我们认真地读毛主席的书，听毛主席的话，照毛主席的指示办事，无产阶级文化大革命就一定能够取得伟大的胜利！让帝国主义、现代修正主义和一切反动派在我们的胜利面前发抖吧！"},{"type":"paragraph","text":"无产阶级文化大革命万罗！中国共产党万岁！战无不胜的毛泽东思想方岁！伟大的领袖毛主席万岁！万岁！万万岁！"}],"authors":["林彪"],"dates":[{"year":1966,"month":8,"day":31}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":4,"page_end":5},"tags":[{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"武斗","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"55c5c0b90d"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
