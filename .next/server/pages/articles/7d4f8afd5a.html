script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji12","name":"毛泽东全集第12卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji12.pdf"],"article":{"title":"克服困难创建贺热察根据地","alias":"","parts":[{"type":"paragraph","text":"克服困难创建冀热察根据地！"},{"type":"paragraph","text":"（1938年9月26日）聂转宋、邓及冀东特委各同志："},{"type":"paragraph","text":"甲、在全国坚持抗战有利形势与华北普遍的游击战争，加以八路军远近距离的配合，有广大群众的拥护，有雾灵山、燕山、五龙山东西干余里之大山脉便于回旋，冀东地方党有相当基础，根据以上各种条件，创造冀热察边区根据地，创造相当大的军队，是有可能的。但环境是严重的，工作是困难的，必须以高度的布尔什维克的精神，克服斗争中的一切困难，坚持统一战线的原则，建立坚决持久抗战胜利的信心，克服起义的新军中不可免的复杂的严重现象。"},{"type":"paragraph","text":"乙、利用敌人主力进攻武汉及平汉路、同蒲路间的空间，争取"},{"type":"paragraph","text":"[1]这是毛泽东和朱德、彭德怀、胡服（刘少奇）给八路军晋察冀军区司令员兼政治委员聂荣臻并转八路军第四纵队司令员宋时轮、政治委员邓华及中共冀东特委的电报。"},{"type":"paragraph","text":"[2]雾灵山，位于今河北省兴隆县西北，系燕山山脉主峰。[3]五龙山，疑指“五指山”，位于今河北省兴隆县东部。"},{"type":"paragraph","text":"[4]热，指热河，旧省名，辖今河北省东北部、辽宁省西南部和内蒙古自治区东南部地区，1955年撤销。察，指察哈尔，旧省名，原辖今河北省西北部地区及内蒙古自治区锡林郭勒盟，1949年改辖今河北省西北部及山西省北部地区，1952年撤销。时间用一切努力整顿军队，首先建立政治制度，建立党，严肃纪律，密切军队与人民的关系，但不应放弃必要的军事教育与游击动作的教育。"},{"type":"paragraph","text":"丙、在部队中、居民中开展反汉奸的斗争，揭发一切挑拨离间破坏团结的阴谋，防止奸细打入军队进行破坏工作，并须有计划地有耐心地清洗部队中极坏的分子。"},{"type":"paragraph","text":"丁、在整顿队伍与创造根据地的工作上，必须要有计划与工作中心。我们认为目前主要的力量在白河以东之密云、平谷、蓟县、兴隆、遵化，以部分的力量在白河以西创造根据地。在整顿军队方面，目前应注意培养基干兵团与基干游击队，使之成为战斗的纪律的模范，成为领导斗争的核心。"},{"type":"paragraph","text":"戊、密切军队与地方党的关系，加强党内团结，并由宋邓统一冀东各军指挥。办各级军事政治短期训练班，轮流训练干部。"},{"type":"paragraph","text":"毛泽东　朱德彭德怀胡服"},{"type":"paragraph","text":"二十六日午"}],"authors":["毛泽东"],"dates":[{"year":1938,"month":9,"day":26}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":447,"page_end":448},"tags":[{"name":"毛泽东","type":"人物"},{"name":"朱德","type":"人物"},{"name":"彭德怀","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7d4f8afd5a"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
