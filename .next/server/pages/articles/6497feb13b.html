script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"5fa51571-713e-4e95-ac87-2bae26bc45b6","name":"文革通讯第145期","internal":false,"official":false,"type":"img","author":"浙江工农兵美术大学毛泽东主义红卫兵战斗队、毛泽东主义红卫兵","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives15/main/5fa51571-713e-4e95-ac87-2bae26bc45b6/1.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives15/main/5fa51571-713e-4e95-ac87-2bae26bc45b6/2.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives15/main/5fa51571-713e-4e95-ac87-2bae26bc45b6/3.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives15/main/5fa51571-713e-4e95-ac87-2bae26bc45b6/4.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives15/main/5fa51571-713e-4e95-ac87-2bae26bc45b6/5.jpg"],"article":{"title":"伟大统帅毛主席对彭、高、饶反党联盟的批判","alias":"","parts":[{"type":"paragraph","text":"文革通讯"},{"type":"paragraph","text":"毛主席语录"},{"type":"paragraph","text":"要特别警惕象赫"},{"type":"paragraph","text":"鲁晓夫那样的个人野第145期"},{"type":"paragraph","text":"心家和阴谋家，防止"},{"type":"paragraph","text":"（批高、专刊）敬祝体大的领袖"},{"type":"paragraph","text":"这样的坏人篡夺党和1967.10.11"},{"type":"paragraph","text":"今日八版毛主席"},{"type":"paragraph","text":"国家的各级领导。"},{"type":"paragraph","text":"浙江工农兵美术大学万寿无号"},{"type":"paragraph","text":"红卫兵战斗队"},{"type":"paragraph","text":"毛泽东主义红卫兵"},{"type":"paragraph","text":"伟大统帅毛主席对彭高镜反党联盟的批利D"},{"type":"paragraph","text":"四中全会是应当开的，决是很必要的，否再高搞一年是不可设想的。"},{"type":"paragraph","text":"《一九五六年在政治局扩大会上的发言》"},{"type":"paragraph","text":"对于我们党来，高尚、漱石事件是一个严重的教训，全党应该引以为戒，务必使党内不要重复出现这样的事件。高岗、激石在党内玩弄阴谋，进行秘密活动，在同志背后挑离间，但在公开场合则把他们的活动伪装起来。他们这种活动，完全是地主阶级和资产阶级在历史上常采取的那一类罪恶活动。马克思、恩格斯在《共产党宣言》上过：“共产党人为隐蔽自己的观点和意图是可的事。”我们是共产党人，更不待是党的高级干部，在政治上要光明磊落，应该随时公开出自己的政治见解，对于每一个重大的政治问题表示自己的或者赞成或者反对的态度，而对不可以学高岗、漱石那样玩弄阴谋手段。"},{"type":"paragraph","text":"高尚，激石反党联盟的出现不是偶然的现象，宅是我国现阶段激烈阶级斗争的一种尖的表现。这个反党联盟的罪恶活动目的，是要分裂我们的党，用阴的方法夺取党和国家的最高权力，而为反革命的复辟开辟道路。"},{"type":"paragraph","text":"《中国共产党全国代表大会开幕》一九五五年三月高、漱石、彭德怀是搞两面手法，彭德怀与他们勾结了"},{"type":"paragraph","text":"《六六年十月二十四日汇报会上的话》"},{"type":"paragraph","text":"后来高、、彭、黄反党那些观点，比如“军党”之类，挑党内的正常关系，为这也有个摊摊，那也有个摊摊。这样一些观点和行为不是马克思主义的观点"},{"type":"paragraph","text":"《一九五九年九月八日中央军委扩大会上的讲话》彭和高，实际上的领袖是彭"},{"type":"paragraph","text":"《六二年一月二十七日扩大的中央工作会上的讲话》"}],"authors":["毛泽东"],"dates":[{"year":1955,"month":3},{"year":1956},{"year":1959,"month":9,"day":8},{"year":1962,"month":1,"day":27},{"year":1966,"month":10,"day":24}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1},"tags":[{"name":"毛泽东","type":"人物"},{"name":"高岗","type":"人物"},{"name":"彭德怀","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6497feb13b"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
