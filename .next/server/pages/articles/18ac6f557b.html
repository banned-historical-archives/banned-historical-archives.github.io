script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"中伊友好关系的新发展——热烈祝贺华国锋主席访问伊朗圆满成功","authors":[],"dates":[{"year":1978,"month":9,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"中伊友好关系的新发展"},{"type":"paragraph","text":"——热烈祝贺华国锋主席访问伊朗圆满成功"},{"type":"paragraph","text":"中国共产党中央委员会主席、中华人民共和国政府总理华国锋，在圆满地访问了罗马尼亚和南斯拉夫之后，又应伊朗国王穆罕默德·礼萨·巴列维陛下的邀请，对伊朗进行了正式友好访问，受到伊朗国王陛下以及王国政府和人民的友好接待和隆重欢迎。这是中伊两国正式建立外交关系以来，中国政府最高领导人对伊朗的第一次访问。访问期间，华国锋主席与巴列维国王进行了亲切会晤，就加强中伊关系和双方共同关心的国际问题交换了意见，加深了两国政府之间的相互了解和友好合作，增进了两国人民之间的传统友谊。两国签署了中华人民共和国政府和伊朗王国政府文化合作协定，为进一步发展中伊两国的文化交流和合作奠定了良好的基础。华国锋主席对伊朗的成功访问，使中伊两国之间历史悠久的交往和友谊得到了新的发展。"},{"type":"paragraph","text":"伊朗是世界上文明古国之一。以勤劳、勇敢、智慧著称的伊朗人民，创造了灿烂的波斯文化。在近代历史上，伊朗人民对帝国主义的入侵和压迫，进行了英勇的斗争，挫败了外国侵略势力，捍卫了民族独立。近年来，伊朗政府和人民为捍卫国家独立和主权，维护民族资源，建设自己的国家，作了不懈的努力，并取得了可喜的成就。中国人民对此感到由衷的高兴。"},{"type":"paragraph","text":"伊朗素有“欧亚陆桥”之称，具有十分重要的战略地位。西亚地区正面临着外来侵略势力的严重威胁。巩固伊朗的独立和安全，对维护印度洋周围地区的和平、反对超级大国对印度洋的争夺，具有重大的意义。人们钦佩地注意到，伊朗政府近年来不断加强与其他第三世界国家的团结，改善与海湾地区各国的关系，在国际事务中发挥着重要的作用。一个独立繁荣的伊朗，无论是对西亚地区的和平稳定，还是对第三世界团结反霸的共同事业，都是一支不可忽视的力量。"},{"type":"paragraph","text":"中国和伊朗有许多共同点。我们两国都是为人类文明做出过重要贡献的古老国家，并在近代同样遭受过帝国主义的压迫和侵略。现在，我们两国又同是第三世界的发展中国家，迫切需要一个长期的国际和平环境，以建设各自的国家，提高人民的生活水平。这些共同目标，为两国友好合作关系的进一步发展奠定了广泛的基础。"},{"type":"paragraph","text":"华国锋主席这次对伊朗成功的访问，是中伊两国悠久友好关系史中新的一页。我们两国人民的祖先曾经友好往来，互通有无，开辟了至今传为美谈的“丝绸之路”。今天，在新的历史条件下，中伊两国各方面的友好合作关系将获得更为迅速的发展，我们两国人民的传统友谊将放出灿烂的异彩，为第三世界人民的共同事业作出更大的贡献。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"华国锋","type":"人物"},{"type":"文稿类型","name":"文章"}]},{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"中伊友好关系的新发展——热烈祝贺华国锋主席访问伊朗圆满
