script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"上海市革委会召开会议号召认真学习中央二报一刊元旦社论进一步全面落实毛主席最新指示以整党建党为中心推动各项工作张春桥等同志出席大会上无七厂等单位代表介绍了大学习大批判的经验","authors":[],"dates":[{"year":1968,"month":1,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　上海市革命委员会昨天下午召开会议，号召全市各条战线上的无产阶级革命派和革命群众，认真学习《人民日报》、《红旗》杂志、《解放军报》元旦社论，以毛主席的最新指示为纲，深入开展毛主席的无产阶级建党路线的大学习，和对中国赫鲁晓夫的修正主义建党路线的大批判，为整党建党奠定思想基础，进一步全面落实毛主席的最新指示，推动各项工作，迎接无产阶级文化大革命的全面胜利。"},{"type":"paragraph","text":"参加昨天大会的有全市各条战线上的无产阶级革命派、红卫兵小将、中国人民解放军指战员、革命干部等二千人。"},{"type":"paragraph","text":"张春桥同志以及市革命委员会其他领导成员都出席了昨天的大会。"},{"type":"paragraph","text":"会上，上海无线电七厂、中国人民解放军上海警备区六五五四部队、上运一场、上钢三厂和上海市第一百货商店的代表相继介绍了他们学习毛主席最新指示，以整党为中心，深入开展群众性大学习、大批判的经验，并表示一定要认真学习，全面落实毛主席最新指示的决心。"},{"type":"paragraph","text":"他们说:在我们伟大领袖毛主席的天才领导下，在毛主席一系列最新指示的指引下，我国的无产阶级文化大革命已经取得了决定性的胜利。我们紧跟毛主席的伟大战略部署，取得了一些成绩，应该归功于我们的伟大统帅毛主席，归功于战无不胜的毛泽东思想。现在，《人民日报》、《红旗》杂志、《解放军报》元旦社论，又传来了毛主席的声音，向我们提出了新的一年的战斗任务，我们一定要认真学习社论的精神，全面落实毛主席的最新指示，要在整顿党的组织、加强党的建设方面，做出新的成绩。"},{"type":"paragraph","text":"上海市革命委员会领导成员在讲话中指出:《人民日报》、《红旗》杂志、《解放军报》元旦社论，体现了毛主席的最新战略部署，它向无产阶级革命派和革命人民，发出了夺取无产阶级文化大革命全面胜利的动员令和进军号。元旦社论，是一个极其重要的文件，全市各级革命委员会、各革命群众组织，一定要抓住这篇社论的学习，深入开展群众性的政治思想教育工作，部署今年的工作任务，全面落实毛主席的最新指示。"},{"type":"paragraph","text":"会议要求上海的革命派和革命人民，要把一月份作为学习、落实毛主席最新指示的一个月，要认真办好毛泽东思想学习班，把学习班跟普遍的群众性大学习结合起来，条条落实毛主席的最新指示，用实际行动来纪念伟大的“一月革命”一周年。"},{"type":"paragraph","text":"会议指出:无产阶级文化大革命，是一次伟大的整党运动。整顿党的组织，加强党的建设，要放到首要的位置上来。文化大革命深入了，要把党的队伍建设得更坚强。上海的整党建党工作，应当走前一步；整顿阶级队伍的工作也要抓紧。共青团、红卫兵、各革命群众组织，都应当进行整顿，加强无产阶级党性，打倒资产阶级、小资产阶级派性，千百倍地鼓足干劲，力争上游，再接再厉，从思想上、政治上、经济上、组织上夺取无产阶级文化大革命的全面胜利。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"张春桥","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"派性","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"一月革命","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6c0765b75a"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
