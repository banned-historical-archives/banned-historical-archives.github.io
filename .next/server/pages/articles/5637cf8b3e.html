script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"防止官僚主义修正主义的根本保证","authors":["许传思","黄克"],"dates":[{"year":1968,"month":4,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"徐汇区革委会　黄克　许传思"},{"type":"paragraph","text":"在无产阶级文化大革命夺取全面胜利的关键时刻，伟大领袖毛主席向我们指出:“革命委员会要实行一元化的领导”。这一十分英明的纲领性的指示，具有极其重大的现实意义和深远意义，指出了在无产阶级专政条件下，建设红色政权，进一步改革国家机关的方向。这一指示又一次丰富和发展了马克思列宁主义关于无产阶级专政的学说。"},{"type":"paragraph","text":"革命委员会就是要掌好普及毛泽东思想的权，用毛泽东思想统帅一切，把学习、执行、宣传、捍卫毛泽东思想作为自己最根本的任务。而实行一元化的领导是保证毛泽东思想掌权的重要措施。"},{"type":"paragraph","text":"革命委员会实际上体现了一元化领导的原则。几个月来的实践，使我们开始认识到实行一元化的领导，对毛主席的最新指示和战略部署就能跟得紧，跟得快。毛主席的每一个新指示一下达，我们立即召开大会向基层传达，使毛主席的声音直接与群众见面。不象旧区委、旧区人委那样，机构臃肿，层次重叠，办一件事先开常委会、部局会，后开公司、基层的会。政出多门，层层传达，会议成灾。一个中心工作，光传达就搞了几天，使上情不能及时下达，下情不能上来。现在当毛主席指示下达后，立即传达，同时，常委不是关起门来考虑研究，而是带着毛主席的指示先到群众中去和群众一起学习、讨论，听一听群众的意见，掌握了思想情况，然后再回来商量研究。把群众中先进的苗子，好的思想，集中起来，传播下去，做到从群众中来，再到群众中去。区革委会起着“穿针引线”的作用，做到了紧跟“两头”:紧跟毛主席的伟大战略部署、无产阶级司令部号令；紧跟革命群众和革命群众的无限创造力。因此，区革委会的工作就能做到雷厉风行，朝气勃勃，工作就有效得多。根本改变了过去旧区委、旧区人委机构重叠，人浮于事，公文来往，互相扯皮，严重官僚主义和脱离群众的现象。区革委会建立后吸收了不少区级革命群众组织代表参加各部门工作，并抽调了部分机关干部组成了一个班子，人员比过去减少三分之二，把二十多个部局精简为九组一室(还应进一步精简)。与过去相比，革委会担负的任务繁重，人员少了，干部通过学习毛主席著作，革命干劲足，联系群众多，工作效率高了，任务比以往完成得好。"},{"type":"paragraph","text":"实行一元化的领导，就是要求我们更好地贯彻毛主席的群众路线。真正做到相信群众，依靠群众，用毛泽东思想来发动群众。在市革委会成立一周年决议精神鼓舞下，区革委会以先进的黄浦区为比、学、赶的目标，提出“鼓足干劲，力争上游，落实毛主席关于革命三结合的指示，奋战二月，实现全区革命三结合满堂红”的战斗口号。当这个口号交给广大革命群众和红卫兵小将以后，他们意气奋发，斗志昂扬，掀起了一个落实毛主席最新指示的比、学、赶、帮的群众运动。在广大革命群众、革命小将的推动下，很快实现了全区一片红；同时在各条战线上，掀起了以阶级斗争为纲，全面落实毛主席指示的比、学、赶、帮的群众运动，蕴藏在革命群众中的无限创造力充分的迸发出来了，大大地推动了当前的革命斗争。斗争实践证明，群众是真正的英雄。群众最聪明，最富有创造精神，毛主席的最新指示与群众见面越广，产生的力量就越大。现在已经有不少干部开始认识到只有到群众中去，走群众路线，才能更好地完成毛主席所交给的任务。"},{"type":"paragraph","text":"革委会实行一元化领导，打破重叠的行政机构，对促进新老干部到群众中去，当群众的小学生，在斗争实践中改造世界观，实现思想革命化、工作革命化有着极其重大的意义。是防止官僚主义、修正主义的可靠保证。"},{"type":"paragraph","text":"我们在实践中虽然有些体会，但是真正深刻理解毛主席的这一最新指示，还很不够。我们一定要认真学习毛主席这一英明决策，深刻理解，坚决照办。决心通过区革命人民代表会议的召开，将我区革命委员会的机构进一步精简，更好地突出无产阶级政治，把区革委会的政治空气搞得浓浓的，把革命委员会建设成为毛泽东思想武装起来的、联系群众的战斗指挥部，带领全区革命群众去夺取无产阶级文化大革命的全面胜利。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5637cf8b3e"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
