script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"破资产阶级思想　立艰苦奋斗作风  汤阴县革委会成员带头斗私批修节约闹革命，不断促进领导班子思想革命化","authors":[],"dates":[{"year":1970,"month":1,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"破资产阶级思想　立艰苦奋斗作风"},{"type":"paragraph","text":"汤阴县革委会成员带头斗私批修节约闹革命，不断促进领导班子思想革命化"},{"type":"paragraph","text":"本报讯　河南汤阴县革命委员会，遵照毛主席关于“务必使同志们继续地保持艰苦奋斗的作风”和“要节约闹革命”的伟大教导，发扬艰苦奋斗的光荣传统，抵制资产阶级思想的侵蚀，不断促进领导班子思想革命化。"},{"type":"paragraph","text":"汤阴县革命委员会成立以后，绝大多数同志都能艰苦奋斗、勤俭节约。但也有少数同志一度滋长了讲排场、图阔气的思想。一天，讨论节余的一部分款项的处理时，革委会内部引起了一场激烈的争论：一种意见认为：应该修条柏油马路，县革委会应该盖座象样的办公大楼。另一种意见是：应该本着节约的原则，拿出一部分钱，用在发展工农业生产上。军队代表反复学习了毛主席关于“没有艰苦奋斗的工作作风，也就不能执行坚定正确的政治方向”的教导，认为这个争论是两个阶级、两条道路、两种思想斗争的反映，是革委会举什么旗、走什么路、执行什么路线的大问题。"},{"type":"paragraph","text":"军队代表带着这个问题，组织大家反复学习毛主席关于“务必使同志们继续地保持谦虚、谨慎、不骄、不躁的作风，务必使同志们继续地保持艰苦奋斗的作风”和“要节约闹革命”的伟大教导；大讲我党我军的光荣传统和革命先辈艰苦创业的光辉事迹；回顾过去旧县委内一小撮走资派讲排场、图享受，被资产阶级思想侵蚀而蜕化变质的严重教训；批判叛徒、内奸、工贼刘少奇腐蚀干部的修正主义思想。使大家深刻认识到：艰苦奋斗、勤俭节约，是关系到无产阶级革命政权密切联系群众，抵制资产阶级思想侵蚀，使人不变修、权不变色的大事。思想认识提高后，革委会就把发扬艰苦奋斗的作风作为促进革委会成员思想革命化的一件大事来抓。他们遵照毛主席关于“什么事情都应当执行勤俭的原则”的教导，严格要求自己，和机关干部一起自己动手把大街坑坑凹凹的马路填平；原来打算在一个广场上用几千元修一个舞台，也自己动手堆了个土台；县革委会没盖一间新房，没添一桌一凳，毅然决然地把这部分款用在发展工农业生产，办广播，建煤窑，修水利上。"},{"type":"paragraph","text":"汤阴县革委会成员带头保持艰苦奋斗的作风，有力地促进了各级领导班子思想革命化，大大推动了革命和生产。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"革命委员会","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"18153cef02"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
