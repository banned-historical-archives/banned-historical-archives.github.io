" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"徐亦安、梅挺秀在九三学社中央整风座谈会上揭露储安平一些反对党的领导的事实","authors":["徐亦安","梅挺秀"],"dates":[{"year":1957,"month":7,"day":8}],"is_range_date":false,"parts":[{"text":"徐亦安、梅挺秀在九三学社中央整风座谈会上揭露储安平一些反对党的领导的事实","type":"title"},{"text":"徐亦安梅挺秀","type":"authors"},{"text":"光明日报的徐亦安和梅挺秀揭露了储安平一些反对党的领导的事实。关于光明日报发表“北大民主墙”的稿件，当时报社有的人不同意登，他坚持要登，并且主张把北大在大鸣大放中所有反社会主义反党的大字报都在光明日报上披露。张轸在社会主义学院座谈会上的发言，曾辱骂周总理和贺龙副总理，报社有人不同意登，他坚持要登，并说“这条消息对我们是考验”。光明日报的同志说，考验什么呢?意思就是看是否敢于反对共产党。","type":"paragraph"},{"text":"徐亦安说，储安平关于光明日报的评论大可研究。他反对发表关于共青团的社论，说那是“捧场”的；他不同意写“六一”儿童节的社论，说那是“应景”的；他选登的唯一的一篇社论，是关于“五四”的社论，这篇社论说，今天的大鸣大放是表现了“新五四的精神”。实际上是鼓励右派分子向党进攻。","type":"paragraph"},{"text":"梅挺秀说，储安平反对光明日报用新华社的国际消息，因为照他看来，新华社的国际消息不能“真实地反映国际情况”。例如新华社对英国政局的报道和评论常常引用英国共产党机关报——“工人日报”的言论，而据储说，英国“工人日报”在英国政治生活中可以说一点影响也没有的。","type":"paragraph"},{"text":"梅挺秀说，储安平强调国际新闻要多用资本主义国家通讯社的电讯，少用新华社的消息，说“现在人民都喜欢看外电”，我们用外电也是对人民“负责”。","type":"paragraph"},{"text":"梅挺秀说，储安平还诋毁我国的新闻教学制度，认为这是向苏联学来的，是“误人子弟”。储安平还经常对报社的同志赞美资产阶级特别是英国的新闻教学制度。他说，英国大学新闻系培养的是能够创造舆论、能够指挥政局的“政治评论家”。","type":"paragraph"},{"text":"今天会上有十多人发言，大家不满意储安平的交代，要求他争取主动，彻底揭发自己，揭发章罗联盟的内幕。","type":"paragraph"},{"text":" 来源：1957年7月8日《新华日报》第4版。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e1b6622cbc"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
