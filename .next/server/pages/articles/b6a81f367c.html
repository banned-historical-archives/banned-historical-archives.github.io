script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"北京人民游泳场修建工程中包工头徐佛泉严重剥削工人","authors":["梁农荪"],"dates":[{"year":1952,"month":2,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"北京人民游泳场修建工程中包工头徐佛泉严重剥削工人"},{"type":"paragraph","text":"编辑同志：我曾因公从北京到南京，在火车上和同座的一个工人闲谈，知道了一件关于包工头严重剥削工人的事情。我愿把这件事提供北京市人民政府卫生工程局调查处理。"},{"type":"paragraph","text":"北京市人民政府卫生工程局曾把人民游泳场的一部分工程包给封建把头徐佛泉。徐佛泉又转包给周金金、朱金祥、徐福生等三人。我所遇到的工人就在这里作工。他说，徐佛泉等领到卫生工程局的工资，除发给工人外，竟赚了四千万元，徐得二千万元，其他三人分得二千万元。而工人每日每人才实得一万六千元。如拿三十个工人做四十天工计算，则工人所得总共才一千九百二十万元。"},{"type":"paragraph","text":"假使事实确实，我愿提出以下几个意见：一、在新民主主义社会里，不能容许这样大的中饱和剥削，应把徐佛泉查明法办。二、北京市卫生工程局的工作粗枝大叶，对工程的实际需要没有作深入具体的估计，给投机者以可乘之机，造成国家财产的严重浪费，应作检讨。"},{"type":"paragraph","text":"梁农荪"},{"type":"paragraph","text":"编者按：据北京市人民政府卫生工程局来信说：他们已根据梁农荪的来信作了检查，证明梁农荪所反映的情况是完全正确的。卫生工程局除作了检讨外，并分别处分了有关此项工程的失职干部。卫生工程局对欺骗政府、严重剥削工人的徐佛泉已向法院起诉，法院已把徐佛泉逮捕法办。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b6a81f367c"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
