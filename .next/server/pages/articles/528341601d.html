" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"毛泽东关于转载《破除资产阶级的法权思想》一文给吴冷西的信","authors":[],"dates":[{"year":1958,"month":10,"day":11}],"is_range_date":false,"parts":[{"text":"毛泽东关于转载《破除资产阶级的法权思想》一文给吴冷西的信","type":"title"},{"text":"冷西同志：","type":"paragraph"},{"text":"信收到。既然有那么多意见，发表时，序言应略为改一点文字，如下：","type":"paragraph"},{"text":"人民日报编者按：张春桥同志此文，见之于上海《解放》半月刊第六期，现在转载于此，以供同志们讨论。这个问题需要讨论，因为它是当前一个重要的问题。我们认为张文基本上是正确的，但有一些片面性，就是说，对历史过程解释得不完全。但他鲜明地提出了这个问题，引人注意。文章又通俗易懂，很好读。","type":"paragraph"},{"text":"请你看后，加以斟酌。如有不妥，告我再改。再则，请你拿此给陈伯达同志一阅，问他意见如何，并将你们讨论的详情给他谈一下。","type":"paragraph"},{"text":" 毛泽东十月十一日上午十时","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"528341601d"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
