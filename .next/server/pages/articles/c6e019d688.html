script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"type":"pdf","id":"wenji4","name":"毛泽东文集第四卷（1999）","internal":false,"official":true,"author":"中央文献研究室","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/wenji4.pdf"],"article":{"title":"关于练兵的指示","description":"根据毛泽东手稿刊印。","dates":[{"year":1946,"month":5,"day":1}],"parts":[{"text":"关于练兵的指示","type":"title"},{"type":"appellation","text":"各局："},{"type":"paragraph","text":"关于练兵指示："},{"type":"paragraph","text":"（一）国民党反动派除在东北扩大内战外，现正准备发动全面内战，在此种情况下，我党必须有充分准备，能够于国民党发动内战时坚决彻底粉碎之。"},{"type":"paragraph","text":"（二）准备工作中，除精简老弱（复员）、充实部队、减租减息、发展生产、整理财政等项外，各地必须抓紧练兵工作。"},{"type":"paragraph","text":"（三）三个月来各地练兵工作抓得不很紧，没有造成热潮，有的练了，有的没有练，此种现象应即刻检讨改正。"},{"type":"paragraph","text":"（四）接此指示后，立即下令全军练兵，上级督促检查，将此看成决定胜负的关键之一。"},{"type":"paragraph","text":"（五）练兵内容，军事上练三大技术，练守城，练夜战，政治上提高战胜顽军、保卫解放区之决心与信心。"},{"type":"paragraph","text":"（六）执行情形速告。"},{"type":"paragraph","text":"中 央"},{"type":"paragraph","text":"辰东"}],"comment_pivots":[{"part_idx":7,"offset":16,"index":1}],"is_range_date":false,"authors":["毛泽东"],"comments":["三大技术，指射击、刺杀和投弹三项军事技术。"],"page_start":128,"page_end":128,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c6e019d688"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
