script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"马来半岛工人展开反剥削反压迫斗争  越南南方阮文绍集团统治区的工人奋起斗争反对敲诈勒索","authors":[],"dates":[{"year":1973,"month":11,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"马来半岛工人展开反剥削反压迫斗争"},{"type":"paragraph","text":"越南南方阮文绍集团统治区的工人奋起斗争反对敲诈勒索"},{"type":"paragraph","text":"新华社讯　据“马来亚革命之声”电台广播，马来半岛的种植园工人和其他行业工人为反对资本家的残酷剥削和压迫，争取改善生活待遇，今年以来多次进行斗争。"},{"type":"paragraph","text":"九月间，丁加奴州一家种植园的二千名工人举行罢工，要求增加工资和改善工作条件。霹叻州一家外资的种植园工人，经过十三个月的斗争，终于在八月间迫使资方恢复了十三名工人的工作。"},{"type":"paragraph","text":"今年来，其他行业的工人也为争取改善生活待遇而斗争。据不完全统计，仅在头三个月，工人罢工和开展其他形式的斗争就有二十起，参加斗争的工人达一万多人。在二月间，一家外资公司及其附属机构的四千多名汽车工人和低薪职员，在吉隆坡、怡保和槟城分别开展抗议资方残酷剥削、要求增加工资和改善待遇的斗争。四月初，吉隆坡一家机器厂的一百五十名工人，抗议资方勾结警察当局迫害两名工人，他们的正义斗争立即得到这家工厂设在巴特沃思、居林和北赖分厂工人们的支持。这三个分厂的工人先后罢工，声援吉隆坡工人的斗争，并且向资方提出了十八项改善待遇的要求。"},{"type":"paragraph","text":"此外，马来亚橡胶研究院的一千一百名职工、槟城一家机器厂的一千多名工人，以及一家公司的成千名矿业工人，为反对剥削和压迫，也先后进行了罢工和其他形式的斗争。"},{"type":"paragraph","text":"新华社河内电　据越南南方解放通讯社报道，越南南方阮文绍集团统治区许多城市的工人，最近接连开展斗争，反对敲诈勒索和无理解雇，要求增加工资。"},{"type":"paragraph","text":"西贡—嘉定区机动三轮车工人最近抗议西贡政权以“检验”三轮车的名义，勒索三轮车工人的罪恶行径，并要求西贡政权立即停止这种勒索行为。土龙木市四百四十名客车司机和机动三轮车工人最近举行集会，一致决定罢工半天，抗议西贡政权强征百分之十的“通行税”。南部西区二十一条交通线的客车司机代表十月五日举行集会，控诉西贡政权怂恿其爪牙对他们敲诈勒索。"},{"type":"paragraph","text":"越南南方工人反对解雇，要求增加工资的斗争继续展开。据报道，西贡商港、远东电池厂和卡力轮船厂工人最近在要求增加工资的斗争中取得了胜利。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3504e45399"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
