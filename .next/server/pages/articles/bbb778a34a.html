script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"在年级鸣放会上的发言","authors":["胡纯德","西南师范学院"],"dates":[{"year":1957,"month":6,"day":5}],"is_range_date":false,"parts":[{"text":"在年级鸣放会上的发言","type":"title"},{"text":"西南师范学院胡纯德","type":"authors"},{"text":"（胡纯德：西南师范学院图制系1958级学生）","type":"subtitle"},{"text":"在图制系三年级鸣放会上的发言（摘要，六月五日至七日）","type":"subtitle"},{"text":"我们的理想是党培养的，但是微小的。我们的青春百分之八十在这里被浪费。你几个人红，油漆才红！不要只看表面，里面已溃烂，表面擦红药水。","type":"paragraph"},{"text":"学院把一些青春火热的人，培养成一堆废料（这就是培养计划），要我去扫垃圾也不愿这样学习。过去有理想的人在缩减，无理想的就是红色，党团的作用就是这样。一些人什么都服从。","type":"paragraph"},{"text":"党入学校后，把干巴巴的教条搬入；我恨这种作法的危害！","type":"paragraph"},{"text":"革命理论是拿来培养自卑感的。一贯为领导所重视的革命课程，在被动的、强迫的监视下学习，变得玄妙难懂。只有马、恩、列、斯、毛才能创造吗？新民主主义革命史用不着开，联共党史不应当错误地作为马列主义基础。社会是不平稳的，有些人不服。","type":"paragraph"},{"text":"警察似地手拿警棒，只是没有USA的字样。上面有血，反动派官场的旧形式拿来摇旗呐喊。×院长把肃反扩大化，打着×字的三害旗。资本家对工人都不像这些最渺小的干部来监视，造成革命恐怖。旧社会的特务也是这样，不过更巧妙。我们要突破西师这个范围，可联名写信到党中央，打倒威严和权威，不要怕这些小人特务式的统治。大家行动起来！尖锐的指名骂，拍桌打掌都可以。","type":"paragraph"},{"text":"西师党团工作，象拿着警捧。在被迫下学习，还有警棒监视，生硬结合政治，教师不能发挥自由思想，要向全国同学呼吁！在不合理的现象面前要敢作敢为。","type":"paragraph"},{"text":"这（指西师——编者）是个假牌万金油制造厂。不学无术，不止痛痒。","type":"paragraph"},{"text":"在二十世纪年代，已是原子时代。但我们的领导是神的崇拜者，这些无神论者却要向神祷告，他们希望科学家领导着青年披着袈裟去向马克思求救，他们崇拜偶象，摘录几句马克思主义来传教。","type":"paragraph"},{"text":"党的领导口头上艰苦朴素，内心在腐化，他们在打着“三害”旗帜，他们没有资格打党的旗帜。","type":"paragraph"},{"text":"老师鸣得不够，没有看到青年的传统作法，他们没有主人翁态度。党员的坚定性，就是对神的崇拜，我们的领导思想就是这样。","type":"paragraph"},{"text":"×院长把公安工作带导学校中来，把学生当成劳改犯。","type":"paragraph"},{"text":"阶级分析的错误，把社会上的阶级观点拿来学校中运用。工农子弟比地主子弟还无知，在同学中造成优越感。贫农是地主破产的，工人是流氓。","type":"paragraph"},{"text":"我们代表党的一家，他们（指西师党委与党员——编者）代表什么党的一家！他们是西师的化脓菌。我们是从科学的角度相信党，科学万岁！共产党万岁！他们沉默所在，就在这里。","type":"paragraph"}],"comments":[],"origin":"《西南师范学院资產阶级反动右派言论汇集》第二辑，中共西南师范学院委员会宣传部西南师范学院马列主义教研组编，1958年3月。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bbb778a34a"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
