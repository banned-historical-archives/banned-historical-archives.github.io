<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"陈彦之在光明日报编辑部邀请沈阳高级知识分子座谈会上的讲话","authors":["辽宁","陈彦之"],"dates":[{"year":1957,"month":5,"day":8}],"is_range_date":false,"parts":[{"text":"陈彦之在光明日报编辑部邀请沈阳高级知识分子座谈会上的讲话","type":"title"},{"text":"辽宁陈彦之","type":"authors"},{"text":"（陈彦之：民盟沈阳市委会主任委员）","type":"subtitle"},{"text":"[光明日报编者按：本报编辑部于5月8日在沈阳邀请部分高级知识分子举行座谈会，讨论正确处理人民内部矛盾问题。这里发表的是座谈会的发言纪录。]","type":"paragraph"},{"text":"为什么有些党员和知识分子团结得不好，建议党在整风中从思想上进行检查。","type":"subtitle"},{"text":"为什么有些党员和知识分子团结得不好？为什么这些矛盾长期未得解决？我建议党在这次整风运动中彻底检查一下，特别应该从思想上来动，这进行检查。","type":"paragraph"},{"text":"党和非党知识分子所以造成隔阂，原因很多，从思想上说，还有一个对知识问题的看法问题。那就是有些党员认为：“知识分子的知识没有什么了不起，我们只要突击一下就能掌握了。”他们完全不了解知识积累之不易和学习过程中的艰辛。","type":"paragraph"},{"text":"在这一思想的支配下，就生产了两种情况：","type":"paragraph"},{"text":"一种是在教学设置上的速成思想。过去曾出现过许多速成教学，如识字速成法、数学速成法、俄文速成法等等。尽管这些速成法曾风行一时，结果都行不通，还带来一些副作用。如有些人原只有小学文化水平，却进了夜大学以求速成。在学习中跟不上去，他却不想到自己的文化基础差，反怪老师不照顾工农子弟，还给老师扣帽子。可是在夜大学耽了几个月回机关后，在填学历表时，却把原来的“小学程度”改填成“大学程度”了。这是一种不朴实的作风。从这里也说明，学习是没有什么捷径可寻的。苏联有些工人出身的科学家，并不是速成或突击而来的，仍然是经过多年的辛勤学习，多年的苦苦钻研才得来的。","type":"paragraph"},{"text":"另一种情况是不重视知识分子的思想。做事情就不是从五百万知识分子的利益出发，当然就不能够很好的团结知识分子。中国知识分子是在共产党领导的革命下才获得解放的。解放之后，党中央仍然是重视知识分子，团结知识分子的。可是有些党员不能体会党的政策，他们搞宗派，排斥知识分子。在旧社会的大学里，校长对教授都是十分恭敬，罗致教授，或是重金礼聘，或是登门邀请。今天有些大学里，甚至总务科科员也可以申斥教授。知识分子就不免有今昔之感。","type":"paragraph"},{"text":"希望通过这次整风，能引起全党从思想上对知识分子的重视。","type":"appellation"},{"text":" （光明日报5月14日第3版）","type":"paragraph"}],"comments":[],"origin":"《批判光明日报参考资料》（中华全国新闻工作者协会编，1957年9月）。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"人民内部矛盾","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"aeaa2d1cf3"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
