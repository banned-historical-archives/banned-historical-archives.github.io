script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"广东省和广州市各界热烈欢迎阿中友协代表团  各国反动派和修正主义对中阿的进攻  丝毫不能阻挠两国友谊的进一步发展","authors":[],"dates":[{"year":1962,"month":12,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"广东省和广州市各界热烈欢迎阿中友协代表团"},{"type":"paragraph","text":"各国反动派和修正主义对中阿的进攻"},{"type":"paragraph","text":"丝毫不能阻挠两国友谊的进一步发展"},{"type":"paragraph","text":"据新华社广州9日电　广东省和广州市各界人民昨晚隆重集会，热烈欢迎由佩蒂·沙姆布利率领的阿中友好协会代表团。"},{"type":"paragraph","text":"中共广东省委书记处书记林李明和沙姆布利团长先后在大会上发表了洋溢着战斗友谊的长篇讲话。他们的讲话一再激起全场一阵又一阵雷鸣般的掌声。"},{"type":"paragraph","text":"林李明在讲话中热烈颂扬英雄的阿尔巴尼亚人民从不在困难面前低头，从不在压力面前屈服的英雄气概。他强调说，以阿尔巴尼亚人民久经考验的伟大领袖恩维尔·霍查同志为首的阿尔巴尼亚劳动党，是伟大的、正确的、坚强的马克思列宁主义政党，是国际共产主义运动中一支坚贞的战斗部队。阿尔巴尼亚人民在社会主义建设中取得的辉煌成就，在反对帝国主义和现代修正主义的斗争中取得的伟大胜利，都给予中国人民以巨大的鼓舞，都是对中国人民的巨大支持。中阿两国人民这种亲密的友谊团结，是建筑在马克思列宁主义和无产阶级国际主义原则的基础之上，是牢不可破的。"},{"type":"paragraph","text":"沙姆布利团长在热烈的掌声中讲话。他说，阿尔巴尼亚人民在以恩维尔·霍查为首的阿尔巴尼亚劳动党的正确领导下，在社会主义建设事业中取得了巨大的、辉煌的成就。"},{"type":"paragraph","text":"沙姆布利在谈到古巴问题时说，阿尔巴尼亚人民严厉谴责和抗议美帝国主义对古巴的侵略行为。我们全力支持古巴人民争取自由和独立的正义斗争，我们深信古巴人民一定能够获得胜利。他说，只有自由与和平的敌人，只有怕死鬼和政治上的近视眼，才对肯尼迪的反动政策让步，才看不到它的反动本质。我们要保卫和平，但是决不能用各国人民的自由独立去交易。和平是不能乞求的。幻想反动派统治集团大发善心是荒唐的。"},{"type":"paragraph","text":"沙姆布利说，这次我们到伟大的中国访问，亲眼看到中国人民在以毛泽东同志为首的中国共产党的正确领导下，高举总路线、大跃进、人民公社三面红旗，在社会主义建设事业中取得了巨大的、辉煌的成就。现在中国在世界上享有崇高的威望，成为保卫亚洲和世界和平的决定性因素。"},{"type":"paragraph","text":"他说，阿尔巴尼亚政府和人民始终如一地支持中国人民和政府对印度反动派的侵略所采取的立场。敌人妄图诋毁中国政府的和平外交政策的一切阴谋诡计，必将遭到可耻的失败。"},{"type":"paragraph","text":"他说，虽然帝国主义、各国反动派和修正主义者对我们发动了进攻，但它丝毫不能阻碍我们两国兄弟般亲密友谊的进一步发展。阿尔巴尼亚人民为有如中国这样真诚的战友而自豪。战无不胜的马克思列宁主义思想把我们两国人民联系在一起，这种团结是坚如磐石的。世界上没有任何力量能够破坏它。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"972e50976b"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
