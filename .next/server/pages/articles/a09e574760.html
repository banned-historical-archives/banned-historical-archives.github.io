<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"北京大批党员新干部在斗争中发挥重要作用文化大革命以来，北京市从工农中培养和选拔了四万多名党员新干部，这些新干部以阶级斗争为纲，和老干部团结战斗，带领广大群众贯彻执行毛主席革命路线","authors":[],"dates":[{"year":1976,"month":7,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社北京一九七六年六月三十日电　无产阶级文化大革命以来，北京市各级党组织根据毛主席关于培养无产阶级革命事业接班人的五项条件，从工人、贫下中农中培养和选拔了四万三千多名党员新干部。他们在各条战线坚持以阶级斗争为纲，和老干部一起团结战斗，带领广大群众贯彻执行毛主席的革命路线，在三大革命运动中发挥了重要作用，加强了各级老中青三结合领导班子的革命化建设。"},{"type":"paragraph","text":"北京市选拔的这批党员新干部，绝大多数是无产阶级文化大革命、批林批孔、学习无产阶级专政理论和反击右倾翻案风斗争中涌现出来的优秀分子。他们经过同刘少奇、林彪、邓小平这些党内走资派的斗争，阶级斗争、路线斗争和无产阶级专政下继续革命的觉悟显著提高，识别和抵制修正主义路线的能力大大增强。因此，他们走上领导岗位后，在工作中重视抓路线、抓大事，为反修防修，巩固无产阶级专政而不懈地战斗。反击右倾翻案风的斗争开展以来，这些党员新干部在各级党委的领导下，立场坚定，旗帜鲜明，积极带领广大群众同党内最大的不肯改悔的走资派邓小平进行坚决的斗争，发挥了先锋模范作用。"},{"type":"paragraph","text":"清华大学党委副书记荣泳霖，是从红卫兵小将成长起来的青年干部。批邓、反击右倾翻案风的战斗号角吹响以后，荣泳霖在校党委领导下，自觉地冲锋在前，以毛主席的重要指示为武器，带头对邓小平反革命的修正主义路线展开了猛烈的批判。共青团北京市委的领导成员，大多数是从红卫兵小将成长起来的。去年夏季社会上政治谣言四起的时候，他们发扬反潮流的革命精神，在一次有关教育工作的座谈会上，同“今不如昔”等奇谈怪论进行了针锋相对的斗争。反击右倾翻案风斗争一开始，他们又连续举行大批判会，组织理论讨论会，带领全市共青团员和革命青年，认真学习毛主席的重要指示，向邓小平猛烈开火。"},{"type":"paragraph","text":"在粉碎天安门广场反革命政治事件的斗争中，许多党员新干部带领民兵赶到现场，为保卫毛主席、保卫党中央，同一小撮反革命暴徒进行英勇斗争，为党和人民立了新功。今年四月五日下午，当一小撮在天安门广场闹事的暴徒纵火焚烧解放军营房，袭击解放军战士的时候，与营房毗邻的北京市邮政局的民兵们，在局党委副书记、新干部任成水带领下，奋不顾身地赶来救火。几个暴徒从房上扒砖揭瓦，凶恶地向他们砸来，任成水和民兵们临危不惧，坚持营救解放军战士，直到战士们安全转移。在这场斗争中，任成水荣立三等功，他指挥的市邮政局机关民兵排荣立二等功。"},{"type":"paragraph","text":"北京市大批党员新干部走上领导岗位以后，怀着对伟大领袖毛主席、对毛主席革命路线的无限忠诚，对修正主义路线敢批，对资本主义敢斗，对歪风邪气敢顶，保证了毛主席革命路线的贯彻执行。贫农出身的青年女社员金桂珍，被提拔为中共丰台区委副书记后，在工作中自觉地按照党的原则办事，坚决抵制各种不符合毛主席革命路线的错误倾向。她发现区里个别领导干部利用职权搞不正之风，就立即进行抵制。有人劝她说:“你这样认真，可要得罪人的。”金桂珍说:“党和人民把我提拔到领导岗位上来，就是为了让我执行和捍卫毛主席的革命路线，负起反修防修的责任。如果看到错误的事情不管，那就辜负了党的期望。”社员群众赞扬说:金桂珍是带领我们走社会主义道路的好书记。首都钢铁公司基建指挥部安装工程公司青年女电工汤秀荣，去年担任公司党委副书记后，到一个车间蹲点。这个车间由于政治思想工作薄弱，没有充分发挥党组织的战斗堡垒作用，歪风邪气上升。汤秀荣和车间党支部一起，通过办学习班、上党课等多种形式，加强党的思想建设，教育党员积极投入反击右倾翻案风的斗争，带头克服资本主义倾向，经过几个月的努力，车间面貌大变样，群众的社会主义积极性大大发扬，今年以来月月超额完成计划，四、五两个月完成的工程量，创造了历史最高水平。"},{"type":"paragraph","text":"北京市广大党员新干部认为，在领导岗位上，是保持普通劳动者的本色，还是当官做老爷，这是能不能反修防修、继续革命的大问题。党内走资派利用窃取的权力，极力扩大资产阶级法权。从工人、贫下中农中提拔起来的干部，就要反其道而行之，不为名，不为利，认真改造世界观，当好人民的勤务员。因此，他们走上领导岗位以后，保持劳动人民的本色，坚持和工人、贫下中农实行“三同”，自觉地限制资产阶级法权，抵制资产阶级思想侵蚀，受到广大群众的赞扬。北京市交通局党委常委颜福海原来是普通装卸工。他经常深入基层，参加集体生产劳动，与工人同甘共苦，从不搞特殊化。今年年初，这个局承担一项从天津往北京石油化工总厂运送三百吨重的大件设备的艰巨任务。颜福海带领干部同运输工人同吃、同住、同劳动，一面向工人学习，一面指挥战斗，胜利地完成了任务。怀柔县委副书记、新干部萧昌兴，大部分时间在基层和贫下中农一起修水库、垒梯田、修路、种树，样样活他都干，节日假日也很少休息。有一次假日，他回家正赶上生产队晒麦子。他连家门都没进，立即参加了晒麦劳动。今年他回家过春节，又同社员群众一道起猪圈粪。贫下中农高兴地说:这样的书记我们最欢迎。"},{"type":"paragraph","text":"邓小平为了保护党内外资产阶级的利益，极力反对有利于限制资产阶级法权的社会主义新生事物。北京市广大党员新干部在领导工作中，热情支持社会主义新生事物，同邓小平对着干。北京市机械施工公司党委书记、青年干部潘万生，一九七四年担任公司第一把手以后，自觉地依靠工人阶级办企业，热情支持工人参加企业管理。在反击右倾翻案风斗争中，他和党委其他领导成员一起，引导广大干部深入批判邓小平鼓吹的“依靠工农兵是相对的”这一谬论，从班组、车间到工厂相继建立了工人参加管理的组织。广大工人群众发扬主人翁精神，当家作主管路线，使全公司革命蒸蒸日上，生产节节上升。大兴县庞各庄人民公社党委书记王德修，是由插队落户的知识青年成长起来的新干部。他亲身体验到，知识青年上山下乡，是毛主席指引的金光大道，对于反修防修、缩小三大差别、限制资产阶级法权具有重大意义。他走上领导岗位后，经常到插队知识青年中间，同青年们一起批判刘少奇、林彪、邓小平的修正主义教育路线，鼓励知识青年扎根农村干革命，接受贫下中农的再教育，为建设社会主义新农村贡献力量。在他的帮助和带动下，这个公社出现了一批铁心务农的知识青年，受到广大贫下中农的欢迎。"},{"type":"paragraph","text":"北京市广大党员新干部茁壮成长，根本原因是他们认真学习马列著作和毛主席著作，用马克思主义、列宁主义、毛泽东思想武装自己的头脑，不断提高无产阶级专政下继续革命的觉悟。许多新干部在繁忙的工作中，坚持把认真看书学习放在首位，并持之以恒，努力提高马克思主义理论水平。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"林彪","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"批林批孔","type":"主题/事件"},{"name":"上山下乡","type":"主题/事件"},{"name":"反潮流","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"name":"限制资产阶级法权","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a09e574760"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
