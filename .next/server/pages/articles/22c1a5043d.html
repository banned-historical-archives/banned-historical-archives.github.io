script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"书的奴隶与书的主人","authors":["陈诏"],"dates":[{"year":1986,"month":11,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"陈诏"},{"type":"paragraph","text":"人生碌碌，书海茫茫。一个人的生命和精力毕竟是有限的，而知识的空间却是无涯的。无法估量目前世界上到底有多少亿册书，即就我国去年一年来说，就出版了四万五千六百多种。要是每天看一本书，一年三百六十五本，也仅仅九牛一毛，沧海一粟!"},{"type":"paragraph","text":"年青人求知欲旺盛，但不善于读书。跑到书店，看到书架上琳琅满目，五光十色，中国的，外国的，古代的，当代的，自然科学的，社会科学的，学术性的，消遣性的，贪婪地什么都想买，什么都想读，却不知从何下手。当然，封建社会那种“皓首穷经，终老场屋”的“书呆子”现在是不会有了。但有些同志沉溺书海，却不懂世务，不知应用；有些同志今天被这种书籍所吸引，明天又被那种书籍所迷惑；有些同志赶时髦，凑热闹，光知道跟着别人买热销书……这种漫无目的、漫无中心的买书看书，丧失了人的主体意识，实际上都是书的奴隶。"},{"type":"paragraph","text":"“六经注我”乎?“我注六经”乎?书，本来是为人所用的，如果人被书所役，那就是人的异化，也是书的异化。"},{"type":"paragraph","text":"博览是必要的，有好处的。但博览的弊端必然是肤浅。要想真正获得一些知识，不能满足于博览；只有在博览的基础上专攻，在专攻的闲暇中博览，才能宏观结合微观，做到融汇贯通，博大精深。所以，会读书的人，一定要限定自己的阅读范围，自我选择，有所取舍。有些书需要精读细读，有些书可以浏览翻阅，还有一些书则只需备用检索。要改变杂乱无章的读书习惯，也要改变平均主义的读书方法。"},{"type":"paragraph","text":"学以致用。读书不是为了装潢门面，消磨时间，而是为了改造我们的主观世界和客观世界。唯有加强目的性、针对性，才能发挥书的最大功能，最有效地获取知识。青年朋友们，用我们宝贵的时间和精力，去读一些对自己最有用最珍贵的书籍，做书的主人吧!"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"22c1a5043d"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
