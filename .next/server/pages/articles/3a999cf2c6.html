script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"法国和瑞士等西欧资产阶级报刊指出  中意建交是中国外交政策的胜利  美日报刊承认美帝妄图“孤立”中国的阴谋又遭到失败","authors":[],"dates":[{"year":1970,"month":11,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"法国和瑞士等西欧资产阶级报刊指出"},{"type":"paragraph","text":"中意建交是中国外交政策的胜利"},{"type":"paragraph","text":"美日报刊承认美帝妄图“孤立”中国的阴谋又遭到失败"},{"type":"paragraph","text":"新华社十一日讯　中国和意大利两国政府决定互相承认并建立外交关系的联合公报发表以后，在美国、日本和西欧各国引起强烈的反应。"},{"type":"paragraph","text":"一些国家的资产阶级报刊和通讯社不得不承认，中意建交是对美帝国主义妄图“孤立”中国的阴谋的又一个沉重打击。"},{"type":"paragraph","text":"美国《国际先驱论坛报》在七日和八日刊登的报道中供认，意大利继加拿大之后同中国建立外交关系，使美国日益面临着“外交上的大失败”。"},{"type":"paragraph","text":"美国《基督教科学箴言报》的一篇文章无可奈何地承认，同中国建交的“潮流滚滚向前”，尽管美帝国主义千方百计地破坏和捣乱，但是，这种潮流“非但没有失去势头，相反，看来正在继续前进，丝毫没有放慢”。"},{"type":"paragraph","text":"日本《朝日新闻》也垂头丧气地说，中意建交后，“美国和日本在对华政策方面陷入了在国际上孤立的立场”，这是美日“历届政府自作自受”。"},{"type":"paragraph","text":"美国《国际先驱论坛报》还哀叹，中国同加拿大、意大利等国接二连三地建立外交关系，这将使美国在联合国为阻挠恢复中国的合法权利所“设置的障碍”“简直无法维持住”。"},{"type":"paragraph","text":"美国《华尔街日报》十一月三日的一篇报道也供认，恢复中国在联合国的合法权利是“不可避免的”。"},{"type":"paragraph","text":"法国、瑞士等西欧的一些报界人士对中意建交表示欢迎，认为是中国外交政策的胜利，是美帝国主义的失败。"},{"type":"paragraph","text":"法国《世界报》社论说，中意建交是中国外交政策“取得的一项重大成就”，这“表明了华盛顿长期以来强加于（西欧）大陆的那个方针越来越行不通了”。"},{"type":"paragraph","text":"法新社评论说，中意建交使美国统治集团大为“烦恼”。"},{"type":"paragraph","text":"瑞士《日内瓦论坛报》的一篇文章强调说，中意建交在国际上具有“重要意义”。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3a999cf2c6"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
