" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"毛泽东关于六十六军打虎经验的批语","authors":["毛泽东"],"dates":[{"year":1952,"month":2,"day":11}],"is_range_date":false,"parts":[{"text":"毛泽东关于六十六军打虎经验的批语","type":"title"},{"text":"毛泽东","type":"authors"},{"text":"一","type":"subtitle"},{"text":"各同志：","type":"appellation"},{"text":"六十六军的打虎经验应成为全军各单位，特别是各军师和各军区打虎斗争的模范。十军因发生逼供信错误已不是模范了。","type":"paragraph"},{"text":" 毛泽东二月十一日","type":"paragraph"},{"text":"二","type":"subtitle"},{"text":"各同志：","type":"appellation"},{"text":"六十六军的打虎决心和打虎方法都是很好的，请你们收到后转发所属各单位，并印成小册子发给一切打虎小组当作课本去阅读。许多部门的领导者不愿意担负多打老虎的责任，打虎预算甚低。上级分派任务，勉强承认，信心不足。有些人知道虎多，办法很少，打不出来。都因为没有认真研究情况，照六十六军同志们的话来说，都是官僚主义作怪。六十六军一个军的打虎预算是二百多只，是他们自己主动规定的，不是上级分派的（上级分派的任务太小）。他们完成任务很快，是因为他们真正钻研了问题，想出了办法。他们也发生了一些“左”的偏向，但随即纠正了。我希望各部门各单位的领导同志都有六十六军同志那样的主动性，将全部应有的而不是无中生有的老虎通通捉干净，否则运动结束，势必留下大批暗藏的老虎遗祸将来。因此，六十六军的经验，不但军事系统的同志应该研究，党政民学各系统的同志都应该研究。","type":"paragraph"},{"text":" 毛泽东二月十二日","type":"paragraph"},{"text":"三","type":"subtitle"},{"text":"各同志：","type":"appellation"},{"text":"请你们注意寻找这样的典型经验。每一大区找着一个，就可以教育全党，推动整个打虎斗争。","type":"paragraph"},{"text":" 毛泽东二月十二日下午四时","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"307c4eb695"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
