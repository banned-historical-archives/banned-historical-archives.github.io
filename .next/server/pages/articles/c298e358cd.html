<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共中央组织部印发《关于妥善处理突击发展党员的意见》的通知","authors":[],"dates":[{"year":1978,"month":12,"day":25}],"is_range_date":false,"parts":[{"text":"中共中央组织部印发《关于妥善处理突击发展党员的意见》的通知","type":"title"},{"text":"十二月七日至十五日，我部召开了北京、上海、浙江、福建、河南、河北、四川、云南、辽宁、宁夏十个省、市、自治区党委组织部和中国科学院、七机部政治部同志参加的处理突击发展党员问题座谈会，拟定了一个《关于妥善处理突击发展党员的意见》，请你们参照执行，并将处理情况告诉我们。","type":"paragraph"},{"text":"关于妥善处理突击发展党员的意见","type":"paragraph"},{"text":"一、突击发展党员是林彪、“四人帮”在“文化大革命”期间推行反革命修正主义路线的产物。他们为了篡党夺权，扩大帮派势力，肆意篡改党章，另立党员标准，采取非法手段或利用合法形式，大搞突击发展党员的活动。“九大”前后，首先在上海突击发展了一批人入党。后来，主要是一九七四年批林批孔和一九七六年“四人帮”横行时，不少省、市、自治区也程度不同地发生了突击发展党员的问题，特别是被他们严密控制的地区和单位，问题更为严重。","type":"paragraph"},{"text":"粉碎“四人帮”以来，通过揭批查运动、整党整风和“双打”斗争，对突击发展的党员作了一些处理。清除了一些混进党内的反革命分子，贪污盗窃、投机倒把分子，打砸抢分子，以及其他坏人。但是，大多数地区和单位突击发展党员的党籍问题还搁置着，等待解决。有的地方为了迅速消除混乱，曾宣布在某段时间内突击发展的党员一律不予承认，这在当时是必要的，现在还有一些遗留问题需要妥善解决。就全国范围来说，要处理好突击发展党员的问题，还需要做大量的工作。","type":"paragraph"},{"text":"二、对突击发展党员的情况要作具体分析。判断一个地区、一个单位是否发生过突击发展党员问题，要实事求是，从实际出发。对突击发展的党员也要作具体分析，有的是林彪、“四人帮”及其帮派采取指名限期、弄虚作假等手段，拉进来的。有的是依仗“四人帮”的权势，要挟组织，强行挤进来的。在突击发展党员过程中，由于许多党组织和广大党员群众的抵制和斗争，也吸收了一些原来培养的发展对象和符合党员条件的同志。突击发展的党员中，坏人是极少数；有些人原来就具备党员条件；相当数量的人入党时不够条件，经过几年来的教育和锻炼，其中不少人已经具备或基本具备了党员条件。因此，不能一提到突击发展的党员，就认为他们都是“四人帮”的社会基础，都是坏人，都要清除出党。","type":"paragraph"},{"text":"三、处理突击发展的党员要严肃慎重，既要坚持党的原则，又要团结教育大多数。要划清敌我界限，划清无产阶级先进分子和一般群众的界限，根据不同情况，区别对待。","type":"paragraph"},{"text":"凡入党时具备或基本具备党员条件，入党后表现好的，应该承认其党籍。","type":"paragraph"},{"text":"入党时不具备党员条件，但是，在第十一次路线斗争中表现较好，或者说过错话、做过错事，能够认真改正，现在基本上具备了党员条件，也应该承认其党籍。","type":"paragraph"},{"text":"入党时不具备党员条件，又犯有严重错误，或者没有犯严重错误，但觉悟很低，确实不够党员条件的，取消党员资格。","type":"paragraph"},{"text":"对混进党内的极少数坏人，要坚决清除出党。","type":"paragraph"},{"text":"宣布过在某段时间内突击发展的党员一律不予承认的地方，对其中确实具备党员条件的人，承认其党籍或重新办理入党手续。","type":"paragraph"},{"text":"有的地方对本质好，目前还不完全具备党员条件，本人决心按照党员标准严格要求自己的，采取考察一年的办法，也是可以的。","type":"paragraph"},{"text":"(原载《干审工作政策文件选编》，北京：党建读物出版社，1993年)","type":"appellation"}],"comments":[],"origin":"原载《干审工作政策文件选编》，北京：党建读物出版社，1993年","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"林彪","type":"人物"},{"name":"四人帮","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"批林批孔","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c298e358cd"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
