" crossorigin="">{"props":{"pageProps":{"books":[{"id":"be68097d-742d-42ae-a282-7ebdda54c163","name":"戚本禹回忆录（上）（中国文革历史出版社2016年）","internal":false,"official":false,"type":"pdf","author":"戚本禹著，中国文革历史出版社2016年","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives3/main/be68097d-742d-42ae-a282-7ebdda54c163.pdf"],"article":{"title":"代序：夜夜空江头，似有蛟龙起","alias":"","parts":[{"type":"paragraph","text":"代序：夜夜空江头，似有蛟龙起"},{"type":"paragraph","text":"三空间，四面八方，没有一点亮光，黑暗统治著世界，空虚包裹著宇宙。"},{"type":"paragraph","text":"面对著黑暗和空虚，古老的哲人发出了深远的息：“潜龙勿用。”"},{"type":"paragraph","text":"但是，你不要以为世界就此永远沉寂，永远这禄黑暗、空虚下去了，你不要忘记，这物质世界还有四维·"},{"type":"paragraph","text":"三维空间是在四的时间里运勤著。四面八方的物质，在时间中发展著，各种能量在黑暗中聚集著，巨大的变动在黑暗中著，淹没在黑暗中的一切在黑暗中罐动著。"},{"type":"paragraph","text":"而且，空间不空，虚敷不虚。産生一切的空虚，本来就不空虚，那里有无的看不清的物质，还有比光子、微子更无法捕捉的渺小实有。零和负，不就是逼些渺小实有的符号?渺小的实有确实是微不足道的，但是无限渺小的实有能聚合成丽大的星系，这无限的宇宙，浩瀚的大干世界都是由无限渺小的实有组合的。没有这空虚般的渺小实有，也就没有这无的宇宙和浩瀚的大千世界。当你感觉空虚的时候，空虚中那渺小的实有正在为组合一个巨大的新的物质聚合体而激荡著。"},{"type":"paragraph","text":"“屈之甚者伸必烈，伏之久者飞必快。”黑暗的越万害，能量的新聚集也越大：空虚的越万害，物质的新组合也越快。黑暗和空虚制了光明和实有，也生者新的光明和实有。在量变引起质变的节点上，在黑暗舆空虚的际上，新星就会突然爆发。届时，她灿的光辉将会撼动固若群山般的恒星表，她的巨大辐射，将会改变一切接近她的有生命、无生命体系的命运·统治世界的黑暗、包括宇宙的空虚都要被光明的新世界所更替。"},{"type":"paragraph","text":"所以，在你感觉黑暗和空虚的时候，注意你周围正在集聚的巨大能量和正在聚合的渺小物质吧！不要悲观，不要失望，“夜夜空江头，似有蛟龙起”，光明在前。"},{"type":"paragraph","text":"戚本禹1983.12.26写于秦城1988.12.26改于上图"}],"authors":["戚本禹"],"dates":[{"year":1988,"month":12,"day":26}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":19,"page_end":20},"tags":[{"name":"戚本禹","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"af10093d2c"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
