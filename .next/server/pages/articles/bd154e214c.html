" crossorigin="">{"props":{"pageProps":{"books":[{"id":"8c1a5316-884e-465a-9775-48338f6cc6b5","name":"揭发“四人帮”王洪文插手控制上影阴谋篡党夺权的罪行（1976.12）","internal":false,"official":true,"type":"img","author":"王洪文、马天水、徐景贤、黄涛，1976.12，反攻倒算材料，中共上海电影制片厂委员会","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/8c1a5316-884e-465a-9775-48338f6cc6b5/1.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/8c1a5316-884e-465a-9775-48338f6cc6b5/2.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/8c1a5316-884e-465a-9775-48338f6cc6b5/3.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/8c1a5316-884e-465a-9775-48338f6cc6b5/4.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/8c1a5316-884e-465a-9775-48338f6cc6b5/5.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/8c1a5316-884e-465a-9775-48338f6cc6b5/6.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/8c1a5316-884e-465a-9775-48338f6cc6b5/7.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/8c1a5316-884e-465a-9775-48338f6cc6b5/8.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/8c1a5316-884e-465a-9775-48338f6cc6b5/9.jpg"],"article":{"title":"前言","alias":"","parts":[{"type":"paragraph","text":"百"},{"type":"paragraph","text":"“四人种”反党集团集党夺权的野心中来已久，他食早就妄图利用市影会文艺宣传工具为复党夺权大社反车命奥论"},{"type":"paragraph","text":"生们最近召开厂党委对“四人希”王洪文和马、徐，王直护插手上影拿单位，妄图控制片影，作为“四人希”复党夺权的一个阵地自有关活动和反革命言计进行了专题揭发，现将揭发考干材料整理印出来，供全厂同志批判"},{"type":"paragraph","text":"这个材料分为三个部分，第一部分是王洪文在一九七五年夏秋背着毛主后，党中央，来上海，盲接插手上量的罪恶活动和反革命言论。第二部分是于洪文在上注文艺座谈会（即200号会议）上的反革命言论，第三部分是王洪文一九七六年五月在钓鱼台接见张家龙拿人的材料，对于每一部分的主要内容和当时的省景我们都加了接语说明"},{"type":"paragraph","text":"乒共上海中景制片厂委员会"},{"type":"paragraph","text":"一九七六年12月"}],"authors":["中共上海电影制片厂委员会"],"dates":[{"year":1976,"month":12}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":2,"page_end":2},"tags":[{"name":"王洪文","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bd154e214c"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
