" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji31","name":"毛泽东全集第31卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji31.pdf"],"article":{"title":"中央关于转发华东局三反报告的批语和复电","alias":"","parts":[{"type":"paragraph","text":"中央关于转发华东局三反报告的批语和复电"},{"type":"paragraph","text":"（1951年12月23日）"},{"type":"paragraph","text":"[1]中共中央华东局在报告中说，华东地区贪污浪费现象极为严重。毛主席及党的七届二中全会严重地指出资产阶级对党的侵蚀的必然性，和坚决号召全党为防止及克服此种巨大危险的必要性，是完全正确的。为此，华东局特作如下决定：（一）普遍进行反贪污、反浪费、反官僚主义的思想教育，务使全体党员干部及政府工作人员从思想上认识贪污、腐化是最可耻的行为。这一时期各地党内的整风，均应着重以检查贪污、浪费，克服资本主义影响和克服官僚主义作风为主要内容。（二）在不妨碍生产及不影响税收的原则下，应在所有国营工矿企业、财经部门、政权机关中，无例外地展开群众性的民主检查运动。采取号召贪污分子自动坦白，发动群众检举控告，及展开批评与自我批评的方法，来揭发一切贪污腐化、铺张浪费和官僚主义的现象。（三）充分运用各种宣传工具，揭发贪污腐化、铺张浪费及官僚主义的典型人物和事件，并介绍表扬奖励那些廉洁奉公、保卫国家人民利益及积极为国家和人民创造财富的模范人物和事迹，使反对贪污浪费与表扬劳动模范成为长期性的群众运动。（四）为了保证运动顺利进行，必须采取首长负责、亲自领导及全党动员、支部保证的办法，并须注意发扬民主，扶助正气，打击邪气，给干部群众撑腰，把从上而下的检查和从下而上的检举相配合，坚决反对只整下不整上的做法。（五）鉴于党政内部的贪污往往是由非法商人从外部勾结而来的，因此，必须注意调查奸商并发动群众检举控告不法商人的运动，对证据确凿的不法商人，亦应严加惩处，以便内外配合，彻底肃清贪污分子。（六）应从检查贪污浪费、检查官僚主义作风过程中，切实整顿各级党政机关的组织机构，建立健全的组织生活，如定期召开各机关、各部门党的代表会议，开展批评与自我批评，建立经常检查制度等。毛泽东全集第三十一卷中央和军委各部门，中央人民政府各党组；各中央局、各大军区，并转分局、省市区党委："},{"type":"paragraph","text":"兹将华东局十二月二十日关于反贪污反浪费反官僚主义的报告一件发给你们参考。这个报告很好，请在党内刊物上发表。"},{"type":"paragraph","text":"中央"},{"type":"paragraph","text":"十二月二十三日"},{"type":"paragraph","text":"二华东局："},{"type":"paragraph","text":"十二月二十日报告收到，这个报告是正确的，望即照此施行。已将你们这个报告转发各地参考，并在党内刊物上发表。"},{"type":"paragraph","text":"中央十二月二十三日"}],"authors":["毛泽东"],"dates":[{"year":1951,"month":12,"day":23}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":178,"page_end":179},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]},{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中央关于转发华东局三反报告的批语和复电","authors":["毛泽东"],"dates":[{"year":1951,"month":12,"day":23}],"is_range_date":false,"parts":[{"text":"中央关于转发华东局三反报告的批语和复电","type":"title"},{"text":"毛泽东","type":"authors"},{"text":"一","type":"subtitle"},{"text":"中央和军委各部门，中央人民政府各党组；各中央局、各大军区，并转分局、省市区党委：","type":"appellation"},{"text":"兹将华东局十二月二十日关于反贪污反浪费反官僚主义的报告一件发给你们参考。这个报告很好，请在党内刊物上发表。","type":"paragraph"},{"text":" 中央十二月二十三日","type":"paragraph"},{"text":"二","type":"subtitle"},{"text":"华东局：","type":"appellation"},{"text":"十二月二十日报告收到，这个报告是正确的，望即照此施行。已将你们这个报告转发各地参考，并在党内刊物上发表。","type":"paragraph"},{"text":" 中央十二月二十三日","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4995076f24"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
