<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"民主同盟六中全会政治报告摘要","authors":[],"dates":[{"year":1950,"month":12,"day":10}],"is_range_date":false,"parts":[{"text":"民主同盟六中全会政治报告摘要","type":"title"},{"text":"【新华社五日讯】中国民主同盟于一九五○年十二月十日通过的六中全会政治报告摘要：","type":"paragraph"},{"text":"一九五○年在中国和世界历史中都是重要的一年。这一年中，国际对立的两大阵营的力量对比起了重要的变化。以苏联为首的和平民主阵营，在这一年中达到了空前未有的团结、壮大和进步。以美国为首的帝国主义侵略阵营，比之于一年前，是更加孤立，更加削弱了。但是另一方面，由于美帝国主义疯狂地侵略台湾、朝鲜和积极地准备扩大战争，侵略战争的火焰已经燃烧到亚洲大陆的边沿和中国的大门口。","type":"paragraph"},{"text":"在这样的紧张的局势中，全世界爱好和平的人民都在为保卫和平制止侵略而进行斗争。胜利的中国人民，对于美帝国主义武装侵略台湾朝鲜的蛮横行动自然更不能置之不理。中国人民志愿抗美援朝保家卫国的运动已经普遍地热烈地展开了。我们的人民的志愿部队已经在鸭绿江南岸和朝鲜人民军并肩作战，阻击美帝国主义的野蛮侵略军队而得到初步的辉煌的胜利了，美帝国主义和它的仆从们，面对着中朝人民的强大的反侵略力量，已经在开始发抖了。","type":"paragraph"},{"text":"我们要巩固并且发展一年以来所已获得的胜利，我们更要在抗美援朝保家卫国的神圣运动中，争取更伟大更光辉的新胜利。这就是目前我们全国人民努力的目标。","type":"paragraph"},{"text":"中华人民共和国在建国的第一年中，所获得的胜利和成功，是中国历史上任何时期所不能比拟的。在仅仅一年中，我们完成了全中国的真正统一——在政治、军事、财政、经济各方面，从中央到地方，从城市到乡村的完全统一。中国境内所有兄弟民族，不分血统和宗教信仰，在友爱和好的民族大家庭中，开始团结合作。全中国人民，不分男女老幼，不分党派阶级，充分发挥了高度的爱国精神，爱护领袖，拥戴人民政。这是中国五千年历史中所未有的盛况！在这一年中，在世界上一个大国内首次成功地实行了一种新型的真正的民主制度，这就是以工人阶级为领导，以工农联盟为基础的人民民主专政。在这一年中，我们实施了中国人民大宪章——人民政协共同纲领。这个共同纲领，不但证明完全符合目前中国人民的要求，而且证明了每一句每一字都可以百分之百地兑现。","type":"paragraph"},{"text":"这一切辉煌的胜利和惊人的成就，说明了毛泽东主席和中国共产党的领导是英明正确的；说明了中国各民主阶级各民族人民的大团结及其由此形成的人民民主统一战线的力量是无比强大的。","type":"paragraph"},{"text":"美帝国主义者处心积虑要侵略中国，一百年来历史事实早已做了明确的说明。倘有人把美国侵朝战争孤立起来看，以为敌兵尚未入境，中国可以‘闭关自守’，这是完全错误的。事实证明，美帝国主义侵略中国是有整个计划的，武装侵朝只是计划中的第一步，第二步将是武装侵略东北。","type":"paragraph"},{"text":"倘有人以为今天中国经济建设急于抗美援朝，这也是错误的。帝国主义者是不让人民在和平与安全中从事经济建设的。反抗侵略，制止战争，正是为着扫除经济建设的障碍。要是在侵略者飞机大炮的威胁下，空谈和平建设，这是一种偷安苟活的想法。","type":"paragraph"},{"text":"自然，还会有极少数人相信美国是世界上最富强的国家，美国的生产力大，有新式武器，是不可抗拒的力量，甚至认为抗美援朝有‘引火焚身自遭其祸’的危险。要知道帝国主义本来就是垂死的资本主义。美帝国主义在今天已成为强弩之末。它的生产力虽大，但由于无计划的盲目的生产，使它无法克服经济危机。为了扩展市场，解决国内的生产过剩问题，美国对殖民地半殖民地人民加紧掠夺榨取。此外，美国和英法帝国主义以及其他仆从国家之间也产生矛盾。唯其如此，美帝国主义者才妄想用战争以克服矛盾，但战争的结果必定加强和扩大他们的矛盾。","type":"paragraph"},{"text":"帝国主义者们要在战争中图谋发展，他们必定在战争中得到毁灭。至于唯武器论的荒谬见解更不值一驳，原子弹不能决定战争的胜负。","type":"paragraph"},{"text":"今天中国有坚强统一的政府，有精诚团结的人民，有英勇善战久经锻炼的武力。我们的人民武力曾经击败了军国主义的日本，曾经消灭了美国装备的八百万蒋匪队伍。并且在反抗侵略保卫和平的奋斗中，中国人民绝对不是孤立的。世界和平民主阵营的力量是伟大的。中朝两国人民，以及全世界人民，有力量、有勇气、有信心，必定能够击败他们。","type":"paragraph"},{"text":"用志愿的行动抗美援朝保家卫国，是目前中国人民的紧急任务，也是中国民主同盟目前的总的政治任务。为了担负起这个重大的光荣的政治任务，我们愿意动员全体盟员，号召全国人民来进行以下的几项工作：","type":"paragraph"},{"text":"第一、为巩固国防抵抗侵略而斗争。首先我们应当用人力物力，支援朝鲜人民军和援朝志愿部队，后方为前方服务。同时我们要加强陆上海上和天空的防卫，积极准备解放台湾，准备对任何外来侵略者予以迎头痛击。","type":"paragraph"},{"text":"第二、为巩固人民民主专政而斗争。我们要巩固和发展我们已得的胜利，加强和扩大人民民主统一战线，团结全国各阶级各民族的人民，拥护人民政府，拥护毛泽东主席和中国共产党的领导，严厉镇压反革命，肃清匪特奸谍，巩固革命秩序。","type":"paragraph"},{"text":"第三、为巩固财政经济而斗争。我们要厉行精简节约，稳定货币和物价，平衡财政收支，在战斗中加强生产建设；在新解放区要按照预定步骤完成土地改革，以肃清封建势力，改善人民生活。","type":"paragraph"},{"text":"第四、为巩固文化思想战线而斗争。我们要继续进行广大知识分子的思想改造，要广泛展开爱国主义与国际主义的宣传教育，祛除亲美、崇美、恐美心理，提高民族自信，肃清奴隶买办封建思想。","type":"paragraph"}],"comments":[],"origin":"根据文件的原件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9a6b6fc6b6"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
