script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"国营津沽区农场  去年增产稻谷五千万斤    取得成绩的主要原因：取消封建剥削组织，大力恢复水利工程。","authors":["秦伟"],"dates":[{"year":1950,"month":1,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"国营津沽区农场"},{"type":"paragraph","text":"去年增产稻谷五千万斤"},{"type":"paragraph","text":"取得成绩的主要原因：取消封建剥削组织，大力恢复水利工程。"},{"type":"paragraph","text":"【本报讯】华北最大稻作国营农场—津沽区农垦管理局在津召开全年工作总结会议，经过所属十六单位连日热烈讨论，于去年十二月二十六日由该局王心田局长作一九四九年工作总结发言。他首先指出：津沽区各农场在日伪时期拥有土地三十四万余亩和完整的电化水利设备。日本投降后国民党中央与地方争权夺利互不相让，遂瓜分为河北垦业农场，河北省农田局。致使各农场庞大的电化水利设备除军粮城、张贵庄两农场外，全遭破坏。尤其以高里农场为甚。接管后，在军管会正确的领导下，将性质相同的九个单位合并成农垦局，并排除一切困难，除接收十六万亩地外又扩大耕地面积十万亩。使全区总产量超过五千四百余万斤稻谷，与农民分红所得的一千五百余万斤稻谷已运津入库，全部完成了每亩增产五升粗粮的生产任务。由于全体职工干部的努力和上级党的正确领导以及广大群众的热烈支持，使津沽区的产量普遍提高。以小站农场为例，今年每亩平均稻谷五百三十一斤，比国民党时期每亩四百二十五斤增产百分之二十；比日伪时期每亩三百四十八斤增产百分之四十九。因此使农垦局在今后恢复与发展农垦事业上打下了有利的基础。"},{"type":"paragraph","text":"王局长继又说明胜利地完成任务是由于：（一）取消封建剥削组织。计将小站一百四十户“二地主”两万三千亩土地分配给一千四百余户无地的贫雇农；军粮城、张贵庄八十七户“二地主”两万四千余亩的土地分配给无地的贫雇农。（二）大力恢复与发展水利工程扩大耕地面积，举办农贷。（三）提高耕作技术实行精耕细作，加强经营管理，以此逐步达到经营企业化管理民主化等。最后，他勉励全体职工干部努力学习克服缺点，为完成一九五○年恢复与扩大耕地十三万亩增产一万万斤稻谷的生产计划而努力。"},{"type":"paragraph","text":"（秦伟）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"901e9aac5f"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
