script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"剥削阶级的金科玉律","authors":["陈秦福"],"dates":[{"year":1974,"month":11,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"大队党支部副书记　陈秦福"},{"type":"paragraph","text":"孔孟之道的一个重要内容，就是鼓吹“学而优则仕”。孔老二曾公然宣扬:“耕也，馁在其中矣；学也，禄在其中矣。”孔家店的二老板孟轲更进一步鼓吹:“劳心者治人，劳力者治于人；治于人者食人，治人者食于人”。他们竭力为残酷的剥削制度进行辩护，为复辟腐朽没落的奴隶制制造舆论。宣扬孔孟之道的坏书《神童诗》一开头就说:“天子重英豪，文章教尔曹，万般皆下品，惟有读书高。”这几句黑话影响极广、流毒很深，必须深入批判。"},{"type":"paragraph","text":"读书做官，不劳而获，压迫有理，剥削有功，这是剥削阶级的金科玉律。“万般皆下品，惟有读书高”就是为剥削0阶级的这种金科玉律制造反动舆论。提到这句黑话，想起了在万恶的旧社会，我们贫下中农一年到头，累死累活，真是“三春雨淋头，大伏毒日头，火秋汗流田横头，寒冬北风刺骨头，到头来还是空空两只手”。我们的劳动成果，自己不能享受，却要交给地主和官老爷。我们连肚子都填不饱，哪里还有钱读书。解放前，我们整个李子园的贫下中农中，没有一个大学生和中学生，绝大多数都是文盲。在政治上，我们贫下中农被看作“下等人”，根本没有发言权。地主富农收田租是四六开或三七开，还要进行高利贷剥削，他们过着花天酒地的寄生生活。从亲身经历中，我们明白，“万般皆下品”就是污蔑我们劳动人民，就是要把我们劳动人民踩在脚下，做牛做马，受压迫，受剥削，驯驯服服地供养那些地主老财、官老爷。“惟有读书高”的“高”，就是高高在上，读了“圣贤”书，就可以做官当老爷，骑在我们劳动人民头上作威作福。"},{"type":"paragraph","text":"毛主席、共产党领导我们推翻了三座大山，使我们劳动人民翻了身，作了国家的主人。毛主席的革命路线指引我们前进，红太阳的光辉照亮了我们李子园大队。一九五五年，伟大领袖毛主席为我们李子园农业生产合作社写了金光闪闪的按语。我们李子园大队先后有五十多人上过北京，大队党支部书记就曾代表广大贫下中农登上天安门的观礼台，幸福地见到了伟大领袖毛主席。旧社会，我们贫下中农被人看不起；今天，我们昂首挺胸，扬眉吐气。我们要解放全人类，我们要做天下的主人。我们高兴，敌人伤心，他们不甘心于自己的失败，还要千方百计同我们较量。叛徒、内奸、工贼刘少奇就曾大肆鼓吹“读书做官论”；资产阶级野心家、阴谋家林彪疯狂地攻击知识青年上山下乡是什么“变相劳改”。刘少奇、林彪就是妄想使知识青年成为脱离劳动人民的精神贵族，成为他们复辟资本主义的社会基础，就是要把我们工农群众重新踩在脚下，使我们吃二遍苦，遭二茬罪。对我们劳动人民来说，劳动光荣，剥削可耻。我们要狠批“万般皆下品，惟有读书高”的剥削阶级思想，在毛主席的领导下，把批林批孔运动普及、深入、持久地开展下去，保卫我们社会主义的红色江山千秋万代永不变色!"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"林彪","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"批林批孔","type":"主题/事件"},{"name":"上山下乡","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1006a61d84"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
