script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"美国工人不断掀起反对剥削压迫的斗争","authors":[],"dates":[{"year":1976,"month":7,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"美国工人不断掀起反对剥削压迫的斗争"},{"type":"paragraph","text":"新华社一九七六年七月二十一日讯　华盛顿消息：美国食品、电气、煤矿等行业的工人，最近不断掀起反对垄断资本剥削和压迫的斗争。"},{"type":"paragraph","text":"加利福尼亚州七万名罐头食品厂工人最近举行罢工，抗议资方拖延劳工合同的谈判。这是七月份以来该州食品厂工人发动的第二次罢工。罢工使七十六家罐头食品厂的生产陷于瘫痪。"},{"type":"paragraph","text":"威斯汀豪斯电气公司工人七月十二日开始的罢工斗争进一步扩大。到十九日中午，这家公司的八十九家工厂中，有三万七千多名工人参加了罢工。"},{"type":"paragraph","text":"西弗吉尼亚州数以千计的煤矿工人七月十九日举行罢工，抗议联邦法院镇压煤矿工人的罢工斗争。塞达煤矿公司工人上周发动罢工后，联邦法院对参加罢工的煤矿工人组织课以大量罚款，企图迫使工人复工。这样的倒行逆施激起了广大煤矿工人的不满，罢工斗争迅速扩大。罢工使西弗吉尼亚州产煤中心卡诺瓦县的全部煤矿和费耶特、布恩两县的部分煤矿瘫痪。"},{"type":"paragraph","text":"据报道，近来，美国广大工人为维护自己的切身利益，不断同垄断资本家进行斗争，罢工斗争显著增加。美国官方最近公布的数字表明：今年五月份，有四十万名工人投入了九百一十二起罢工中，使资方损失了四百六十万个工时。仅在五月份爆发的新罢工就有六百五十三起，是一九七四年七月以来的最高纪录。"},{"type":"paragraph","text":"新华社讯　华盛顿消息：美国橡胶工人仍在坚持全国性大罢工。据美国联邦储备局七月十六日公布的数字，这次大罢工，使六月份全国工业生产减少了百分之零点二。"},{"type":"paragraph","text":"这次美国历史上橡胶工人最大的一次罢工，是在四月二十一日开始的。七万名橡胶工人提高工资、解决劳动安全等问题的正当要求，遭到美国四家大橡胶公司多次拒绝，工人因而奋起进行罢工斗争。七月七日，固特异橡胶和轮胎公司再次蛮横地要求工人们接受它所提出的最后建议，工人严正拒绝。该公司接着悍然宣布无限期地停止谈判，垄断资产阶级这种横暴态度更激怒了广大工人。罢工工人们在全国各地的四家大橡胶公司的工厂前设置了纠察线，使这些工厂大门纷纷关闭。尽管面临种种困难，但罢工者斗志昂扬，决心将罢工斗争进行到底。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"04f05d6344"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
