script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"原料输出国纷纷联合起来维护权益反对剥削","authors":[],"dates":[{"year":1974,"month":8,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"原料输出国纷纷联合起来维护权益反对剥削"},{"type":"paragraph","text":"十二个非洲国家举行会议决定建立非洲油料生产国组织"},{"type":"paragraph","text":"委内瑞拉、巴西、利比里亚和加拿大等将成立铁出口国组织"},{"type":"paragraph","text":"新华社拉各斯一九七四年八月十四日电  非洲油料生产国会议八月八日至十一日在尼日利亚首都拉各斯举行。会议研究了把非洲花生理事会的活动范围扩大到其它油料作物的可能性，并通过决议，原则上同意建立一个非洲油料生产国组织，“以协调非洲油料生产国在（油料）生产和销售方面的政策”。"},{"type":"paragraph","text":"会议提议由达荷美、冈比亚、象牙海岸、马里、尼日利亚、塞内加尔、苏丹和扎伊尔等八国成立一个工作小组，研究建立非洲油料生产国组织的办法。会议提议由这个工作小组协同非洲统一组织和非洲花生理事会等组织的秘书处，把会议的报告尽快地传达给感兴趣的非洲国家。"},{"type":"paragraph","text":"尼日利亚联邦贸易部长文尼凯·布里格斯在开幕式的讲话中要求非洲国家为了共同利益扩大油料生产方面经济合作的范围。"},{"type":"paragraph","text":"他指出：“在以竞争和飞速的通货膨胀为特征的世界上，原料生产国家为它们的产品寻求一个更加公平的报酬的必要性是怎么强调也不会过分的。”布里格斯在谈到油料生产对大多数非洲国家经济的重要性时指出：“我们迫切要求做许多事情，以便不仅保持这些重要外汇来源，而且要大大加以改进。”"},{"type":"paragraph","text":"达荷美代表在讲话中要求非洲国家集中资源，以避免对它们的任何新的经济剥削。"},{"type":"paragraph","text":"十二个非洲国家参加了这次会议，它们是：阿尔及利亚、布隆迪、达荷美、象牙海岸、马里、尼日利亚、塞内加尔、苏丹、冈比亚、乍得、上沃尔特和扎伊尔。"},{"type":"paragraph","text":"新华社一九七四年八月十五日讯　加拉加斯消息：委内瑞拉国营瓜亚纳公司经理阿赫尼斯·甘博亚八月十一日宣布，委内瑞拉、巴西、利比里亚和加拿大等国家决定成立一个铁出口国组织。"},{"type":"paragraph","text":"甘博亚指出，铁出口国组织将成为在世界上代表铁出口国家利益和在国际市场上保卫其合理价格的工具。他还说，这个组织的成员国将以石油输出国组织的章程为蓝本制订出自己的章程。"},{"type":"paragraph","text":"委内瑞拉是石油输出国组织的主要发起国之一，它国内已经探明的铁矿石储藏量为二十一亿吨。多年来，委内瑞拉铁矿砂的开采几乎全部为美资钢铁公司所控制。今年七月，委内瑞拉政府正式宣布将在今年年底以前把铁矿开采业收归国有。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"72fdece33d"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
