script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"苏联一公民在大庭广众喊出广大苏联人民的心声：打倒苏联现代修正主义！","authors":[],"dates":[{"year":1968,"month":1,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"苏联一公民在大庭广众喊出广大苏联人民的心声："},{"type":"paragraph","text":"打倒苏联现代修正主义！"},{"type":"paragraph","text":"新华社十三日讯　莫斯科消息：一月十日下午，一位赤手空拳的苏联中年人，在苏修警察的强力绑架之下，不顾生命的危险，在莫斯科大庭广众之中，满腔愤怒地高呼："},{"type":"paragraph","text":"“打倒苏联现代修正主义！”这位勇敢的苏联公民的义正辞严的声音，喊出了广大苏联人民的心声。"},{"type":"paragraph","text":"据报道，这天下午六时五十分左右，在莫斯科有名的雅罗斯拉夫火车站上，人们看到这位苏联公民被两名苏修警察架出车站，还有一名警察跟在后面“压阵”。这个苏联人不畏强暴，不怕牺牲，对着在场的群众大声高呼：“打倒苏联现代修正主义！”顿时，苏修警察慌了手脚，连忙把他紧紧架走，并且叫嚷着“不许喊，不许喊”。但是，这位苏联中年人毫不畏惧，边走边继续呼喊口号。"},{"type":"paragraph","text":"这一事件表明，广大的苏联人民对于彻底背叛了马克思列宁主义的苏修领导集团，正在表现出越来越强烈的不满和反抗。勃列日涅夫、柯西金之流不管采取多么残酷的法西斯镇压手段，都压服不了起来革命的苏联人民。"},{"type":"paragraph","text":"伟大的领袖毛主席指出：“苏联广大的人民、广大的党员和干部，是好的，是要革命的，修正主义的统治是不会长久的。”苏联人民在马克思列宁主义、毛泽东思想的指引下，必将冲破一切障碍，彻底埋葬苏修叛徒集团的反动统治。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"23382fd35c"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
