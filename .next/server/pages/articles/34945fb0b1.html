script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"全国各界代表千余人集会首都 　保卫世界和平大会揭幕  通过斯大林毛主席及居里为名誉主席  苏联代表团、斯巴诺及朝鲜代表团受到大会热烈欢迎","authors":[],"dates":[{"year":1949,"month":10,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"全国各界代表千余人集会首都"},{"type":"paragraph","text":"保卫世界和平大会揭幕"},{"type":"paragraph","text":"通过斯大林毛主席及居里为名誉主席"},{"type":"paragraph","text":"苏联代表团、斯巴诺及朝鲜代表团受到大会热烈欢迎"},{"type":"paragraph","text":"【新华社北京二日电】中国保卫世界和平大会成立大会今日上午在欢狂庆祝中华人民共和国成立的新中国首都北京隆重举行。出席大会的有朱德、李济深、高岗、陈毅、李立三、林伯渠、吴玉章、董必武、陈嘉庚、徐特立、马寅初、陈云、马叙伦、郭沫若、邓小平、沈钧儒、沈雁冰、陈叔通、黄炎培、章伯钧、张奚若、陈铭枢、谭平山、李德全、冯文彬、萧三、梁希等各民主党派和人民政协特邀代表，中华全国总工会、中华全国民主青年联合总会、中华全国民主妇女联合会、农民、中华全国文学艺术界联合会及其所属各协会、中华全国自然科学工作者协会、中华全国社会科学工作者协会、中华全国教育工作者协会，中华全国新闻工作者协会等筹委会，人民解放军、工商界、宗教界、少数民族、国外华侨、各地区团体的代表共一千余人。以法捷耶夫为首的苏联文化艺术科学工作者代表团，意大利人民代表意共中央委员斯巴诺和在会议进行中赶到的朝鲜人民代表团朝鲜拥护世界和平全国委员会副委员长朴正爱，朝鲜职业同盟主席崔浩敏等的参加大会，使大会更增加了它的国际意义和国际友谊团结的热烈气氛。当法捷耶夫、西蒙诺夫率领的苏联代表团、斯巴诺和朝鲜代表团进入会场时，全场起立，热烈鼓掌欢迎，经久不息。"},{"type":"paragraph","text":"大会会场布置庄严朴素，主席台正中悬挂着毕加索的名画——象征世界和平的鸽子，台上悬着“保卫人民民主维护世界持久和平”的大字标语，在主席台对面悬挂着“全世界人民联合起来粉碎帝国主义侵略的政策和挑拨战争的阴谋”的大字横幅标语。"},{"type":"paragraph","text":"大会首由中国保卫世界和平大会筹备委员会总干事钱俊瑞报告，继即在会场热烈欢呼中通过以斯大林大元帅、毛泽东主席及世界保卫和平大会主席居里教授为大会名誉主席，宋庆龄、郭沫若、林伯渠等一百零五人为主席团，刘宁一、宦乡、丁瓒为正副秘书长。"},{"type":"paragraph","text":"大会由林伯渠致开幕词，他说：今天的大会向世界表明了我们这个新诞生的中华人民共和国是坚决拥护世界和平，坚决反对侵略战争的。他说：“伟大的友邦苏联文化艺术科学工作者代表团、意大利人民的代表斯巴诺和朝鲜人民代表团的参加大会，指明了我们这个大会，已经和国际和平民主的运动密切地汇合起来了。”"},{"type":"paragraph","text":"他在指出美帝国主义积极准备侵略苏联、新中国和各新民主国家的阴谋后，激昂地说：“中国人民决不是单纯的和平主义者。当战争贩子和帝国主义强迫我们作战时，中国人民凭着二十二年来从军事斗争中成长壮大起来的力量，以及从这样长期斗争中所得到的宝贵经验，将不惜与他们周旋。中国人民深信，有充分把握，可以在反对帝国主义的斗争中赢得最后的胜利。”（开幕词全文见另电）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"34945fb0b1"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
