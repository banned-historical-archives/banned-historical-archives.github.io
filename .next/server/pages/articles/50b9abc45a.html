" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"云南省德宏傣族景颇族自治州傣族地区农村债务和土地抵押、典当纠纷处理办法","authors":[],"dates":[{"year":1955,"month":8,"day":17}],"is_range_date":false,"parts":[{"text":"云南省德宏傣族景颇族自治州傣族地区农村债务和土地抵押、典当纠纷处理办法","type":"title"},{"text":"第一条  为了合理的处理农村债务和土地抵押、典当纠纷，根据我区和平协商土地改革办法第四、第五条的规定制定本办法。","type":"paragraph"},{"text":"第二条  农民和其他劳动人民所欠领主、地主的债务一律废除。","type":"paragraph"},{"text":"第三条  农民和其他劳动人民所欠富农的债务，依下列规定处理。","type":"paragraph"},{"text":"甲、所付利息达到本的三倍者（例如借本百元已付利三百元者）本利停付。付利达到本之三倍以上者，其超过部份亦不再追回。付利达到本的一倍半以上不足三倍者，停利还本，付利不足的一倍半者继续有效。","type":"paragraph"},{"text":"乙、农民和其他劳动人民如确实无力清偿债务时，得由乡人民政府酌情减免或分期缓还。","type":"paragraph"},{"text":"丙、凡中途改换新约的债务关系，在另订新约时所欠利息累计在本金之内者，其累计数无效，仍按债权人原借出之本金清理之。","type":"paragraph"},{"text":"第四条  领主、地主通过高利贷抵进来之土地，在没收分配时，当尽先分给原债务人。","type":"paragraph"},{"text":"第五条  领主、地主典与富农之土地，在没收分配时，可根据富农占有土地多寡的实际情况，酌情留给富农部份土地，以补偿典价。","type":"paragraph"},{"text":"第六条  农民和其他劳动人民典给富农的土地发生纠纷时，采取折田抵价办法处理之。","type":"paragraph"},{"text":"第七条  富农通过高利贷抵入农民或其他劳动人民的土地，如所收利息已达本之三倍者，其抵押的土地应即退出，并尽先分给原债务人。如所收利息未达本之三倍，而债权债务双方愿折田抵债者，得由乡人民政府依据本办法第三条之规定处理之，其抽出之土地应尽先分给原债务人。","type":"paragraph"},{"text":"第八条  一九五四年酝酿和平协商土地改革后，农民向领主、地主和富农抽回抵押和典当的土地，一律有效。但如抽回土地过多者，可说服将过多部份调剂给无田少田的贫苦农民。","type":"paragraph"},{"text":"第九条  发生连续典当、抵押关系的土地纠纷，原则上采取不计中间处理两头，并根据本办法有关规定处理之。","type":"paragraph"},{"text":"第十条  农民内部的债务、土地抵押和土地典当关系，根据自治区和平协商土地改革办法第五条规定均继续有效。发生纠纷时，应本团结互让的原则，采取折田抵价或互让的办法协商解决。","type":"paragraph"},{"text":"第十一条  改革中涉及景颇族或社会经济情况与景颇族相同的其他民族的债务、土地抵押，典当关系一律不动。发生纠纷时按历史习惯处理。","type":"paragraph"},{"text":"第十二条  本办法自公布之日起施行。","type":"paragraph"}],"comments":[],"origin":"云南省某档案馆","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"50b9abc45a"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
