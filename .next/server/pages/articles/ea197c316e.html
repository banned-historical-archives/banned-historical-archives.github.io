script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"中国共产党南京部队委员会号召全体指战员学习张红兵永远忠于毛泽东思想 狠学狠用“老三篇”完全彻底为人民","authors":[],"dates":[{"year":1966,"month":12,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　中国共产党南京部队委员会最近发出关于宣传和学习张红兵同志的决定，全文如下:"},{"type":"paragraph","text":"张红兵同志是无限忠于毛主席，无限忠于毛泽东思想的共产主义战士，是人民的好儿子，优秀的共产党员。"},{"type":"paragraph","text":"张红兵同志生前是“临汾旅”某团卫生队卫生员。他出身于贫农家庭，今年二十三岁，一九六三年八月入伍，一九六五年十月入党。入伍三年来，年年被评为五好。是活学活用毛主席著作的积极分子，雷锋式的五好战士。军政治部曾授予“模范共青团员”称号，荣获过地方授予的“优秀校外辅导员”奖状。今年七月三十日，为保护国家财产，在扑灭山火中壮烈牺牲。"},{"type":"paragraph","text":"张红兵同志生前最积极最忠诚地执行了林彪副主席“读毛主席的书，听毛主席的话，照毛主席的指示办事，做毛主席的好战士”的指示，怀着最最深厚的阶级感情，刻苦地、如饥似渴地活学活用毛主席著作，努力改造世界观，完全彻底为人民服务。他无限热爱毛泽东思想，彻底实践毛泽东思想，誓死保卫毛泽东思想。张红兵同志的一生，是无限忠于毛主席，无限忠于毛泽东思想的一生。为了表彰他生前的模范事迹，南京部队党委决定追记一等功，并号召全体指战员向张红兵同志学习。"},{"type":"paragraph","text":"一、学习张红兵同志无限热爱毛主席，无限忠于毛泽东思想。象张红兵同志那样，最勤奋地学习毛泽东思想，最彻底地执行毛泽东思想，最热情地宣传毛泽东思想，最勇敢地保卫毛泽东思想。象张红兵同志说的那样，“只要是毛主席说的，我们就一定能做到!”“毛主席指到哪里，我就打到哪里!”“谁反对毛泽东思想，我就和谁拼到底!”"},{"type":"paragraph","text":"二、学习张红兵同志毫不利己专门利人，完全彻底为人民服务的高贵品质。象张红兵同志那样，热爱集体，热爱人民，一心为公，一切为公。一辈子作好事，一个心眼干革命。为革命争分夺秒，为人民赴汤蹈火。"},{"type":"paragraph","text":"三、学习张红兵同志时刻不忘阶级斗争，身在连队，胸怀世界。象张红兵同志那样，处处关心国家和世界大事，永远保持高度的革命警惕，随时准备支援世界革命，为彻底打倒帝国主义，打倒修正主义，打倒各国反动派，献出自己的一切。"},{"type":"paragraph","text":"四、学习张红兵同志彻底改造世界观的自我革命精神。象张红兵同志那样，狠学狠用毛主席著作，以“老三篇”为武器，狠斗个人主义，彻底改造灵魂，彻底实现思想革命化，牢固地树立无产阶级世界观，高速度向共产主义精神世界迈进。"},{"type":"paragraph","text":"林彪副主席最近号召全军，把活学活用毛主席著作群众运动推向新阶段。我们要坚决响应，彻底执行。通过宣传张红兵同志，学习张红兵同志，更高地举起毛泽东思想伟大红旗，进一步掀起活学活用毛主席著作的新高潮，尽最大努力、下最大狠心、以最快速度，把毛泽东思想真正学到手，真正掌握起来!"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ea197c316e"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
