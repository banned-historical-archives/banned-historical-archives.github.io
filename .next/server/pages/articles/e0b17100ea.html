script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"“泰国人民之声”强烈谴责美帝野蛮侵略泰国　美帝是掠夺和剥削泰国人民的强盗　美国每年从泰国攫取的利润比它的“经济援助”高六倍","authors":[],"dates":[{"year":1969,"month":12,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"“泰国人民之声”强烈谴责美帝野蛮侵略泰国"},{"type":"paragraph","text":"美帝是掠夺和剥削泰国人民的强盗"},{"type":"paragraph","text":"美国每年从泰国攫取的利润比它的“经济援助”高六倍"},{"type":"paragraph","text":"新华社二十一日讯  “泰国人民之声”电台最近在广播中强烈谴责美帝国主义野蛮掠夺和剥削泰国人民的强盗罪行。"},{"type":"paragraph","text":"电台指出，美帝国主义把包括大米在内的“剩余”农产品，在亚洲市场大肆倾销，严重打击泰国的大米市场。从一九五○年美帝国主义强迫泰国签订所谓“泰美经济技术援助”的卖国协定以后，美帝国主义便控制和垄断了泰国贸易，掠夺泰国的原料，残酷地剥削泰国人民。电台说，美帝国主义对泰国人民的掠夺与剥削，引起了泰国各阶层人民的强烈不满。"},{"type":"paragraph","text":"电台说，美帝国主义除了打击泰国大米市场以外，还勾结他侬卖国集团，凭借各种“特权”向泰国倾销各种“剩余”商品。从一九五七年到一九六八年的十二年里，美国输出泰国的商品价值高达二百八十七亿一千七百万铢。"},{"type":"paragraph","text":"此外，美帝国主义还向泰国大肆输出资本，包括投资和贷款，以便搜刮更多的利润。据不完全统计，美国每年从泰国攫取的利润超过六十九亿铢，比美国给他侬集团每年十亿铢的“经济援助”高出六倍。"},{"type":"paragraph","text":"电台指出：“上述事实有力地证明了美帝国主义是野蛮侵略泰国和残酷地剥削、掠夺泰国人民的强盗，是泰国人民的剥削者。美帝国主义还勾结他侬—巴博卖国集团从军事、政治和文化方面对泰国进行侵略。这一切事实，更加使泰国人民清楚认识到，美帝国主义和他侬—巴博卖国集团是泰国人民的最凶恶敌人。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e0b17100ea"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
