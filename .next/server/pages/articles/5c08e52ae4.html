script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"在反击右倾翻案风的斗争推动下上海港超额完成二月份任务","authors":[],"dates":[{"year":1976,"month":3,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　在伟大领袖毛主席亲自发动和领导的反击右倾翻案风的斗争中，上海港广大职工坚持以阶级斗争为纲，狠批党内那个不肯改悔的走资派抛出的“三项指示为纲”的修正主义纲领，进一步激发了大干社会主义的热情，促进了装卸生产。二月份全港完成吞吐量四百三十六万吨，超过计划百分之三点八，创造了历史同期的最好水平。"},{"type":"paragraph","text":"二月份以来，上海港广大职工反复学习了毛主席关于“阶级斗争是纲，其余都是目”的教导，批判了党内那个不肯改悔的走资派鼓吹的“生产第一”、“技术至上”等修正主义谬论，进一步弄清了纲和目的关系，坚持以革命统帅生产，大力促进生产的发展。上港九区在为“莎沃林匹克”轮装水泥时，该区党委发动工人大讲阶级斗争，大批“吨位挂帅”，充分调动了群众积极性，工班产量由平时的二百多吨上升到四百多吨。结果，该轮一万四千多吨水泥，仅用七十个小时就装完，比计划提前了二十六个小时。杨浦装卸站三队在为“第十一高洲川丸”轮卸杂货时，因该轮没有按时靠泊，货种又比原来预报的多，给准时完成任务带来不少困难，但工人们豪迈地说:“坚决打胜这一仗，用实际行动迎头痛击右倾翻案风!”大家提前做好准备工作，船靠上码头仅十五分钟，战斗就打响了。同志们你追我赶，干劲冲天，在吊杆负荷许可的范围内，打破四十包一关的常规，改用六十包一关、两关一起吊的方法，仅用三个小时就卸完了过去需用十二个小时才能卸完的二百多吨包子货。在卸甲醇桶子时，他们又大胆使用该站技革组设计制造的“真空吸盘”新机械，效率比平时提高两倍。在全队职工和兄弟部门的有力配合下，该轮一千三百多吨杂货仅十二个小时就卸空了，比计划提前十个小时，创造了该站卸同类船舶的最好成绩。上港五区装卸七队在为“铜川”轮抢装出口榨菜杂货时，虽然作业难，但他们协力奋战，一工班装货二百八十吨，效率比平时提高一倍，为该轮按时启航创造了条件。(本报通讯员)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5c08e52ae4"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
