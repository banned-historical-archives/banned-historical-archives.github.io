script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"国际劳工组织统计材料表明  全世界失业、工伤和剥削女工童工情况相当严重","authors":["陈忆村"],"dates":[{"year":1983,"month":5,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"国际劳工组织统计材料表明"},{"type":"paragraph","text":"全世界失业、工伤和剥削女工童工情况相当严重"},{"type":"paragraph","text":"本报联合国专电　记者陈忆村报道：据国际劳工组织统计，全世界（不包括中国）现有7，200万工人失业，其中西方工业国失业人数占3，000万。尽管最近个别西方国家经济出现某些复苏迹象，但是国际劳工组织预测，到1984年，西方工业国失业人数仍将达3，500万人。"},{"type":"paragraph","text":"《联合国纪事报》在分析22个西方工业国的失业情况时指出，过去10年，这些国家的失业率逐年递增，由1970年的3％，上升到去年的8％。失业工人穷愁潦倒，境况凄凉，成了许多国家的严重社会问题。发展中国家失业、半失业的人数也不断上升，大量的失业使得发展中国家有8亿人口生活贫困化。"},{"type":"paragraph","text":"由于劳动条件恶劣，缺乏必要的安全措施，工伤事故也有所增加。据统计，全世界每年发生的工伤事故共达5，000万起，平均每天16万起。"},{"type":"paragraph","text":"男女同工不同酬的现象严重存在。许多国家女工工资只相当于男工工资的10％。在美国，女工工资比男工低40％，英国女工工资也比男工低25％。为了肆意剥削廉价的妇女劳动力，一些国家的工厂大量雇用女工。许多国家的工厂还大量雇用童工。据统计，目前全世界共有7，500万童工。这些童工不仅被剥夺了接受教育的机会，而且备受资本家的残酷剥削和摧残，过着悲惨困苦的生活。这些现象已引起联合国和其他国际组织的注意，并正在设法加以解决。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"199fe0cd77"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
