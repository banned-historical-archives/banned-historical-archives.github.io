<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoistlegacy.de-5054","name":"密切党同党外朋友的关系","author":"胡耀邦","internal":false,"official":false,"type":"unknown","files":[],"article":{"title":"密切党同党外朋友的关系","dates":[{"year":1985}],"is_range_date":false,"authors":["胡耀邦"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"中共中央统一战线工作部, 中共中央文献研究室, 新时期统一战线文献选编, 529-533","tags":[{"name":"工商联","type":"主题/事件"},{"name":"理论","type":"主题/事件"},{"name":"落实政策","type":"主题/事件"},{"name":"民主建国会","type":"主题/事件"},{"name":"统一战线","type":"主题/事件"}],"parts":[{"type":"title","text":"密切党同党外朋友的关系*"},{"type":"subtitle","text":"(一九八〇年六月 一九八五年一月）"},{"type":"subtitle","text":"胡耀邦"},{"type":"paragraph","text":"一"},{"type":"paragraph","text":"建议中组部、统战部、民委、政协，经常听取党外朋友的合理建议，每个合理建议都在核实处理后转告建议人。这样，使我们同党外朋友关系愈来愈密切。这对加强整个民族的大团结和改善我们党的领导，都会发生更好的作用。"},{"type":"subtitle","text":"（一九八〇年六月三日在中央组织部经济干部局一个报告上的批语）"},{"type":"paragraph","text":"二"},{"type":"paragraph","text":"党外三个党派团体[1]，对中药的发展问题，提了许多好意见，值得我们重视。党外确有能人，他们有知识，又热心，因而能发现和提出问题。我们有些做领导工作的同志，因为长期做那项工作，对许多问题司空见惯，头脑麻木，思想陈旧，如果再加上一些私心杂念，那不仅打不开新局面，反而会把问题弄糟。请你们把这个材料[2]转给专管此事的同志，并请他们同这批党外朋友密切合作，看如何能把中药这件事搞得更好些，以造福于人民。"},{"type":"subtitle","text":"（一九八二年十二月七日在三个党派团体的一份建议书上的批语）"},{"type":"paragraph","text":"三"},{"type":"paragraph","text":"主要人物中党外朋友几乎没有一个。党内人物第一线的同志太多，退居第二线的人物又太少。一切出头露面的事，各条战线都要广为吸收党外朋友和党内退居第二线的同志，这要成为一条原则，加以注意。"},{"type":"subtitle","text":"（一九八三年八月八日在国家体委《关于成立第五届全国运动会主席团的请示》上的批语）"},{"type":"paragraph","text":"四"},{"type":"paragraph","text":"落实党外人士政策看来要组织一个班子，用一两年时间去各地巡回检查落实。但这个班子不许搞一般号召、指示、经验介绍等等，因为这些东西即使正确，下面多数人不看，即使看了，顶多也是照转一下，解决不了任何问题。因此这个班子只干一件事，就是向党内外人士打听谁未落实好政策，每发现一个就督促所属党委解决一个，不落实好，就不罢手。"},{"type":"subtitle","text":"（一九八三年十一月五日在新华社一个材料上的批语）"},{"type":"paragraph","text":"五"},{"type":"paragraph","text":"有的同志向我建议，希望中央组织部、宣传部、统战部、社会科学院、文化部、教育部、卫生部等单位的领导同志，能多同本系统的专家、教授、学者、艺术家、医务工作者建立起经常的广泛的联系，找他们谈心，看望他们，帮助他们解决应该解决的问题，使他们真正感受到党对他们的关怀和温暖，这样会进一步密切党和群众的关系。我认为这个建议是好的，转告大家认真考虑和实行。"},{"type":"subtitle","text":"（一九八四年三月八日的一次谈话）"},{"type":"paragraph","text":"六"},{"type":"paragraph","text":"我的意见，落实政策必须严格督促检查，不许留不该留的尾巴，不要上下面谎报情况的当。在处理具体问题时不要纠缠细微末节，似乎被落实政策的人占了什么便宜，其实，人家受了多年的委屈，吃了多年的苦头，怎么会有什么便宜可占呢。现在的问题往往是我们一些没有吃过苦头的同志，思想上仍然“左”的同志，阻止政策落实，倒值得我们注意认真纠正。"},{"type":"subtitle","text":"（一九八四年四月二十二日在一件申诉信上的批语）"},{"type":"paragraph","text":"七"},{"type":"paragraph","text":"一个教育，一个科研，这两个部门要多同党外朋友商量，改革文件也要他们多提意见。此事万万不能掉以轻心！"},{"type":"subtitle","text":"（一九八四年十二月二十四日在中央统战部一个材料上的批语）"},{"type":"paragraph","text":"八"},{"type":"paragraph","text":"我们党内有些同志向党外朋友作威作福、称王称霸的事，时有发生，上面发现了，道歉了事，上面不发现，人家还得忍气吞声。今后怎么办？靠上面发现仍是人治而不是法治，可否向党外朋友提倡诉诸法律？"},{"type":"subtitle","text":"（一九八五年一月十一日在中央统战部一个报告上的批语）"},{"type":"paragraph","text":"九"},{"type":"paragraph","text":"我看，我们许多地方对党外人士那种荒唐、幼稚的“左”的思想基本上没有得到克服。之所以克服不了，我以为首先同我们有些地方的统战部门、组织部门有关，同我们有些做统战工作和组织工作的同志有关。我主张中央组织部和中央统战部两家从上到下在整党中要把这作为一个重大问题，进行拨乱反正和认真整改。"},{"type":"subtitle","text":"（一九八五年一月十一日在中央统战部一个材料上的批语）"},{"type":"paragraph","text":"* 这是胡耀邦同志写的八个批语和一次谈话。"},{"type":"paragraph","text":"注释"},{"type":"paragraph","text":"〔1〕 指中国民主建国会、中国农工民主党和中华全国工商业联合会。"},{"type":"paragraph","text":"〔2〕 指中国民主建国会中央、中国农工民主党中央和中华全国工商业联合会联名向中共中央和国务院提出的《关于扶持和振兴中药事业的建议》。"}],"alias":""},"tags":[{"name":"胡耀邦","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3517ac9111"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
