<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"被剥削被压迫的苏联农民","authors":[],"dates":[{"year":1975,"month":7,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"被剥削被压迫的苏联农民"},{"type":"paragraph","text":"在今天的苏联农村，“国营农场”和“集体农庄”名称未变，但实质早已变了。它们不再属于社会主义的全民所有和劳动群众的集体所有，而是属于一小撮官僚垄断资产阶级和新富农所有，苏联广大农民完全处于无权的地位，变成了被剥削和被压迫的雇佣劳动者。连苏修报刊也承认，“由于集体农庄主席横行霸道”，在许多农庄里形成了什么都由农庄主席“一个人来决定、来主宰”的状况；农庄主席和农艺师等成了“催促、驱赶庄员”的“鞭子”。"},{"type":"paragraph","text":"根据苏修在一九六九年发布的《集体农庄示范章程》，农庄的头目可以借口“破坏劳动纪律”或“破坏集体农庄章程”，任意处罚或开除庄员。据苏修报刊透露，基米罗伏州“胜利者”国营农场场长，一年内发布了二百二十三项关于以纪律方式处罚一百二十五人以及对三百五十人追究物质责任的命令，在这个总共只有六百五十二名职工的农场中，一年内竟有二百五十人被迫离开。又如“共产主义之路”集体农庄主席，在一年内颁布了一百多项处罚令，每四个庄员中就有一人受到处罚。庄员批评农庄主席，“就要冒着没有过冬用的劈柴、没有奶牛吃的干草的危险”，“一个家庭如果同农庄主席的私人关系没有搞好，就有可能被开除出农庄。”"},{"type":"paragraph","text":"在苏联农村，贫者越贫，富者越富，两极分化正在加速进行。苏修《共青团真理报》承认，“在农庄常常不是按劳计酬”，而是“按照所担任的职务和所处的地位计酬”，即按资本进行分配，按权力进行分配，“按劳分配”只剩下一个骗人的外壳。有些农庄主席的工资加上各种奖金每月收入可达一千多卢布，比从事大田劳动的普通庄员高出二、三十倍之多。据苏修出版物透露的材料计算，苏修“集体农庄”中，使用畜力和进行手工劳动的大田劳动者，每月平均收入（包括现金和实物）都远远低于苏修自己宣布的“保证最低标准物质生活”的水平，仅这一部分人就占农庄庄员总数的百分之五十以上。有的贫苦农民被迫出卖自留地和房屋，变得一无所有。而那些农庄主席之类的资产阶级分子却大吃大喝，兴建别墅，过着奢侈豪华、腐化堕落的生活。"},{"type":"paragraph","text":"在苏修叛徒集团的残酷压迫和剥削下，广大农民丧失了劳动积极性，普遍采取旷工、怠工的办法进行抵抗。在许多农庄中，经常不参加农庄劳动的农民一直占农庄劳动力总数的百分之六十左右。就是那些出工的，也是“马马虎虎，漫不经心”。大批农民离开农村，寻找出路。在一九五九年到一九七○年的十一年中，平均每年离开农村的有一百五十万人，近年来又增加到每年二百万人。外流的主要是青年，以致有些地方五十岁以上的老人和十七岁以下的少年儿童占农村人口的百分之六十多，十八岁到三十岁的青年只占百分之九点八，造成农村中普遍缺乏劳动力。随着苏联人民反对苏修叛徒集团反动统治的斗争的发展，苏联农民的反抗也必将日益激烈。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f071a28e34"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
