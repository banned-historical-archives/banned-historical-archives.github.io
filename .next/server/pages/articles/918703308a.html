script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"东德土地改革成就巨大  无地少地农民皆分得土地封建剥削残余已彻底消除","authors":[],"dates":[{"year":1949,"month":1,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"东德土地改革成就巨大"},{"type":"paragraph","text":"无地少地农民皆分得土地封建剥削残余已彻底消除"},{"type":"paragraph","text":"【新华社陕北十八日电】塔斯社讯：最近一期新时代杂志发表哈拉哈扬的论文，题为“德境苏占区的土地改革”。该文略称：三年多来，德境苏占区在依靠波茨顿和雅尔塔协定原则而实行的有系统的民主改革中，首先的措施之一便是一九四五年实行的土地改革。到一九四七年七月一日土改大体完成之时止，共没收了三、○四一、○○○公顷土地，分配给无地少地或非务农的家庭与移民家庭。凡是百公顷以上的容克家族地产、属于战犯和纳粹领袖的地产（不论大小），以及几乎全部希特勒国家、纳粹党和其他犯罪团体的地产，均无偿地加以没收。"},{"type":"paragraph","text":"作者指出：由于实行了上述遍及德国三分之一领土的土地改革的结果，有十一万余家无地农民及雇农，平均每家得到土地六点八公顷；八三、八○二家移民每家平均得到八点四公顷；一一三、三二四家小农每家平均补充了二点七公顷；一三○、八八一家非务农家庭和四万九千余家小佃农得到了自零点七公顷至一点一公顷不等的土地。除了土地以外，劳动农民还分得了从地主那里没收来的其他财产。"},{"type":"paragraph","text":"在指出土地改革消除了封建关系的残余后，作者复称：苏占区的土地改革产生了一种新型的生产者合作社，如农民互助委员会，即有会员五十万人。并已成为一种群众运动。互助委员会具有大量的机械和技术资材，能够给农民以切实的帮助，因此数十万农民已能用到机器犁，科学播种和化学肥料。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"918703308a"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
