script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"苏州美术专科学校应肃清资产阶级的教学思想","authors":["赤军","金良"],"dates":[{"year":1952,"month":1,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"苏州美术专科学校应肃清资产阶级的教学思想"},{"type":"paragraph","text":"编辑同志：苏南行署文教处领导苏州美术专科学校工作方面的官僚主义作风，已达到不能容忍的程度。私立苏州美术专科学校原是国内有数的设备完善的美术学校。解放后，由苏南行署文教处津贴，私立公助。这是必要的。但假如国家对这个学校只是在经济上津贴，而不在政治上加以领导，那末客观上就是纵容不正确的思想来毒害我们青年。苏州美术专科学校在解放前的“保守”是很出名的，同学如刻木刻，就会被开除出去。解放后，这个学校的教师们还没有得到改造。教师们除了参加过全区性的暑期教育研究会外，苏南行署文教处从来没有认真组织过教师学习，尤其是关于毛主席文艺路线的学习。学校当局对上敷衍塞责，对内压制批评，行政教学工作是一片混乱。有一位教师向同学们讲：“你们努力学技术吧，学好技术到处有饭吃！”“你们是四五年级学生，程度高，应该画油画，不要画连环画。”实际上他也组织同学画连环画，那是为了卖给上海出版商。因此现在一部分同学听说画连环画不给稿费就不画。这位教师除了本人在美术专科学校教书外，在外面还兼了三四个学校的课，深夜还兼画广告。他在上课时迟到，却说：“巴黎美术专科学校的教师一两个礼拜不过到学校看一两次！”他对自己的薪水大为不满，他说：“少给少教，就是给三十万也教！”学习时他打瞌睡，却说：“你们强迫什么，毛主席说学习是靠自觉自愿的！”他有这样恶劣的思想作风，还被请到苏南文教学院兼课。另一位音乐教师，上课时向女同学调笑，家中还收音乐“学徒”，不准学徒参加游行和政治活动。在这样一些教师的教育下，有些同学说：“我不学习政治，我是进美术专科学校，并不是进革命大学！”又说：“五年读完美术专科学校，出去再读几年革命大学就行啦！”苏州文联发动了年画创作，有些同学就不肯画，说：“我们创作就画油画，年画我不画！”又说：“为政治服务不是艺术。”当然，同学中大多数都是要求进步的，很多同学和教师也曾向落后现象斗争过。但是，因为苏南行署没有支持，进步的同学反被“斗争”了；进步的教师给气走了。文教处虽派人来调查过，但来调查的人上午和四年级同学（二十几个人）开了一个钟头的会，接着就和学校里的负责人关起门来谈了大半天。一些同学和教师想找他们反映情况，但是据说调查已经完毕，早就走了。现在学校外边是热火朝天的思想改造运动、反贪污浪费反官僚主义的运动，学校里面却是一片冷落，像是另一个世界，让资产阶级的反动的艺术思想在泛滥着。难道这是可以容忍的吗？我们认为，苏南行署文教处应作深入的检查，严肃地领导这个学校进行改革。　金良　赤军"},{"type":"paragraph","text":"编者按：苏南行署文教处应结合思想改造运动，严肃负责地整顿苏州美术专科学校的工作，认真批判和清除资产阶级的艺术教育思想。华东文化部也应帮助进行这项工作。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9107b005c9"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
