script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"攻击“肃反”为胡风辩护","authors":["刘旺宗","周懋政","唐孝和","成都工学院","王和培","联钦察","苏继光","高承云"],"dates":[{"year":1957,"month":5}],"is_range_date":false,"parts":[{"text":"攻击“肃反”为胡风辩护","type":"title"},{"text":"成都工学院唐孝和联钦察周懋政苏继光王和培高承云刘旺宗","type":"authors"},{"text":"成都工学院学生：","type":"subtitle"},{"text":"“胡风不见得是反革命，只不过是文艺派别而已，要说是反革命，实实不服众人心。”(唐孝和)","type":"paragraph"},{"text":"“周扬是党的负责人，对胡风有成见，陷害胡风。”(联钦察)","type":"paragraph"},{"text":"“肃反90％都错了，在监狱里的官僚主义多，有冤不能申诉。”(周懋政)","type":"paragraph"},{"text":"另一违反道德的事实，我们不能不看到，在肃反当中私拆“私人”信件，说是什么为了把问题搞清楚，我的天哪上帝才知道，有打油诗为证：","type":"paragraph"},{"text":"宪法上有通信自由    看去好像大老虎    　但却有私将书信抽","type":"paragraph"},{"text":"事实是耗子死对头    拆信的好似虎寻食    这种行动若还对","type":"paragraph"},{"text":"展云钱又把雄心收    说实话宪法只当废纸丢。(鸣者)","type":"paragraph"},{"text":"“肃反是对他人人身的摧残，人权的侵犯，不单侮辱了我，而且侮辱了所清查的祖宗三代和亲戚朋友。”“肃反有90％是斗错了(后指班上说)，肃反在成都工学院黑暗毒辣。而泸州分校更黑暗更毒辣，而塑53更是黑暗毒辣。”(苏继光)","type":"paragraph"},{"text":"“各次运动都是整爱发牢骚的人”(鸣者)","type":"paragraph"},{"text":"“宁愿冤枉一些好人，而必须把反肃清，有些就这样入了党。”(王和培)","type":"paragraph"},{"text":"“全国的成绩是主要的，但我院肃反成绩是次要的，社会主义的法制，宪法都无作用，肃反起有副作用。龚子兴在我院从政治上，经济上都受压迫和压制、迫害，政治包含黑暗和光明两个方面，肃反中大学设监狱，夜半有呻吟。”(高承云)","type":"paragraph"},{"text":"“肃反后班上转入黑暗专制的时代，干部把肃反工作方法用来搞日常工作。”(鸣者)","type":"paragraph"},{"text":"“我的历史是经过证实，但肃反我却第一个检查，很抵触而当时有苦无处诉，肃反工作作得不好。”(刘旺宗)","type":"paragraph"},{"text":" 来源：《右派言论选集》（中共成都工学院委员会办公室，1957年）。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4040bd9445"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
