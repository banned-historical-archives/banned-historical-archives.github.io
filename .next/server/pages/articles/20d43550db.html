script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoistlegacy.de-1862","name":"国家档案局关于档案划分全宗问题的复函","author":"国家档案局","internal":false,"official":false,"type":"unknown","files":[],"article":{"title":"国家档案局关于档案划分全宗问题的复函","dates":[{"year":1981,"month":12,"day":11}],"is_range_date":false,"authors":["国家档案局"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"国家档案局办公室, 档案工作文件汇集(第二集), 93-94","tags":[{"name":"档案","type":"主题/事件"},{"name":"划分全宗","type":"主题/事件"},{"name":"文革","type":"主题/事件"}],"parts":[{"type":"title","text":"国家档案局关于档案划分全宗问题的复函"},{"type":"subtitle","text":"国档发〔1981〕158号"},{"type":"paragraph","text":"浙江省档案局："},{"type":"paragraph","text":"浙档〔1981〕30号文件收悉，根据所提意见，答复如下："},{"type":"paragraph","text":"一、关于“文化大革命”期间档案划分全宗问题，曾普遍征求各省、市、自治区档案部门的意见，在征求意见及调查研究的基础上，提出了《关于“文化大革命”期间省、地、县党政机关档案划分全宗的意见》。"},{"type":"paragraph","text":"“文化大革命”期间，各级党政机关机构变化很大，如群众组织“夺权”、军管、成立革委会（内部机构又几经变化），后来各级党委相继恢复，实行党的一元化领导等等。粉碎江青反革命集团以后的最初几年里，各级党政机关仍未分开办公，实行党的一元化领导，政权性质、机构职能均未发生变化。可见，以粉碎江青反革命集团时间来做为“文化大革命”期间档案全宗的下限是不合适的。"},{"type":"paragraph","text":"革委会的四大组是革委的办事机构（人保组有其特殊性），革委会职能是通过四大组活动来体现；四大组工作活动中形成的文件，反映了革委会的性质、职能。如果把四大组中的政工、生产组各划一个全宗，革委会全宗只有办事组形成的档案，反映革委一部分职能的政工、生产组档案未被包括在内，革委全宗的档案也是不完整，“革命委员会”全宗也是名不符实的。此外，政工、生产组各划一个全宗，革委会成立之前的群众组织“夺权”时期、军管时期及各级党委恢复以后实行党的一元化领导时期所形成的档案是不是也要各划一个新全宗？这种划法，把反映“文化大革命”真实面貌的全部档案，人为地分在若干个小“全宗”内，不便于保管，更不便今后对这段历史研究。"},{"type":"paragraph","text":"“文化大革命”档案全宗起止时间是就全国情况大体划一个线，你局可根据国档发〔1981〕96号文件精神，结合本省具体情况酌情而定。在划分“文化大革命”档案全宗时，要根据各地情况，不可强求划一。鉴于有些地方已将此期间的档案与政府或党委划一个全宗并已编目的实际情况，可保持现状，不做大的改动，但对这一情况应有一个文字说明。"},{"type":"paragraph","text":"二、“文化大革命”中，一些地方在革委会内设人保组（有的地方未设），它虽是革委会的一个职能部门，但一直单独办公、有自己的一套文书制度、行文关系。它的档案与文革前、后公安厅（局）档案统一管理。其业务范围、性质、职能与原公安厅（局）基本相同，只不过是名称不同罢了（后来又恢复公安厅、局），它有其自己的相对独立性。为了保持各级公安机关档案的完整，国档发〔1981〕96号文件“省、地、县所属机关……在‘文化大革命’期间形成的档案，不单划全宗，应与文革前同一机构的全宗联系起来”的精神，革委会人保组的档案应与原公安厅（局）档案统一保管，但应在全宗介绍中对这一段情况有个说明。"},{"type":"paragraph","text":"三、一九六四年《国家档案局关于县级机关的档案划分全宗的意见》是在总结实践经验基础上提出的，实践证明这个《意见》基本上是可行的。从全国来说，全宗的划分应该基本统―，这样有利于档案的统计和标准化。根据这一要求，在全宗划分变化之后，原来县委各部委已划为全宗的，其案卷分类排列可维持现状不动。省、地两级党委档案划分全宗可参照执行。此复。"},{"type":"subtitle","text":"国家档案局"},{"type":"subtitle","text":"一九八一年十二月十一日"}],"alias":""},"tags":[{"name":"江青","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"20d43550db"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
