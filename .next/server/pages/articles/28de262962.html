" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji28","name":"毛泽东全集第28卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji28.pdf"],"article":{"title":"接受民主德国驻华外交使团团长柯尼希呈递国书时的答词","alias":"","parts":[{"type":"paragraph","text":"接受民主德国驻华外交使团团长柯尼希呈递国书时的答词"},{"type":"paragraph","text":"（1950年6月24日）团长阁下："},{"type":"paragraph","text":"我很高兴地接受贵团长呈递的德意志民主共和国总统的国书，并感谢贵团长的热忱祝贺。"},{"type":"paragraph","text":"自从伟大的苏军粉碎了希特勒的反动的国家机构以后，中国人民就高兴地注视着德国人民民主运动的发展。自从新德国德意志民主共和国，在贵国总统威廉·皮克先生领导之下建立起来，即此就成为德国历史和欧洲历史的转折点以后，中国人民就更加高兴，感觉自己增加了一个很好的和有力的朋友。恰好在这种时候，中华人民共和国已经建立，中国人民革命已经获得了全国的胜利，我国和贵国就迅速地建立了外交关系。毫无疑义，贵我两国外交关系的建立，不但将使贵我两国人民之间的友谊日益发展与巩固，并且将使世界持久和平得到强有力的保障。"},{"type":"paragraph","text":"我热烈地欢迎阁下出任德意志民主共和国驻中华人民共和国外交使团的大使衔的团长，并愿对贵团长加强两国合作的工作，予以协助。"},{"type":"paragraph","text":"谨祝贵国国家繁荣，人民兴旺，并祝贵国元首健康。"}],"authors":["毛泽东"],"dates":[{"year":1950,"month":6,"day":24}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":505,"page_end":505},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"28de262962"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
