" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji3","name":"毛泽东全集第3卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji3.pdf"],"article":{"title":"杨坤如的布告与刘志陆的的电报","alias":"","parts":[{"type":"paragraph","text":"杨坤如的布告与刘志陆的电报"},{"type":"paragraph","text":"（1925年12月5日）"},{"type":"paragraph","text":"杨坤如的布告已经领教了，还有刘志陆等给“北京段执政，各部总次长，奉天张督办，湖南赵省长，武昌萧督办，江西方督理，福建周督理，岑西林先生，吴子玉先生，康南海先生，梁任公先生”许多人的电报，那上面却稍不同。他那“其罪七”中说：“我国社会，素称重农，主佃利益，所得常均，互助精神，自然而合。今乃诱以均地之说，乱其互利之序。”不免与杨坤如冲突。照杨坤如说：“三成地主，三成充公，已得三成，一成会用。”各方面都得一点，倒可以说是“互利”。刘志陆说的却是“均地”，其意谓广州政府教农民从地主手里夺取土地都均分了，地主从此没有租收，所以是“乱其互利之序”。一个说地主还有三成，一个说地主一点没有，未知北京等处朋友，到底相信哪个的话。"}],"authors":["毛泽东"],"dates":[{"year":1925,"month":12,"day":5}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":152,"page_end":152},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"宣言"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"120f66917e"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
