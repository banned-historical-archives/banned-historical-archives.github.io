script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"认真学习革命理论　用实际行动破除资产阶级法权思想  福建三万多应届中学毕业生上山下乡","authors":[],"dates":[{"year":1975,"month":8,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"认真学习革命理论　用实际行动破除资产阶级法权思想"},{"type":"paragraph","text":"福建三万多应届中学毕业生上山下乡"},{"type":"paragraph","text":"新华社福州一九七五年八月二十二日电　在学习无产阶级专政理论的热潮中，福建省广大应届中学毕业生热烈响应毛主席关于“知识青年到农村去，接受贫下中农的再教育”的伟大号召，踊跃报名上山下乡，走与工农相结合的道路。到八月上旬，全省已有三万二千多名知识青年奔赴农村广阔天地，接受贫下中农的再教育。"},{"type":"paragraph","text":"今年以来，福建省广大知识青年以无产阶级专政理论为武器，联系知识青年上山下乡工作中两个阶级、两条路线斗争的实际，进一步深入批判刘少奇、林彪的“下乡镀金”、“变相劳改”等反动谬论，批判“学而优则仕”、“劳心者治人，劳力者治于人”等孔孟之道，加深了对毛主席有关指示的理解，提高了上山下乡，走与工农相结合道路的自觉性。广大知识青年满怀建设社会主义新农村的雄心壮志，踊跃报名上山下乡。各级党委把知识青年上山下乡看作是反修防修、巩固无产阶级专政、培养和造就千百万无产阶级革命事业接班人、缩小三大差别、加速社会主义新农村建设步伐的一项伟大战略措施，列入党委的议事日程。今年以来，各级党委多次召开各种类型会议，采用各种形式，大造知识青年上山下乡的革命舆论，深入细致地做好思想发动工作。同时，还组织力量抓好知识青年的安置工作，使知识青年对上山下乡充满信心，家长放心，加快了知识青年上山下乡的步伐。到目前为止，已上山下乡的知识青年达三万二千多人，是近几年来下乡人数最多、速度最快的一年。建阳地委从二月份开始，先后召开了知识青年上山下乡工作会议、座谈会和誓师广播大会，举办了《知识青年上山下乡影片汇映》，并推广安置好、教育好的先进经验，落实政策，全面规划，使知识青年上山下乡工作出现了前所未有的大好局面。目前，这个地区的四千五百多名应届中学毕业生已全部奔赴农村，二千六百多名历届初、高中毕业生也满怀革命豪情到农村插队落户。"},{"type":"paragraph","text":"福建省各级领导干部和当地驻军机关干部，通过学习无产阶级专政理论，提高了继续革命的觉悟，坚决破除资产阶级法权思想，自觉地同旧传统观念决裂，反对和抵制各种不正之风，热情支持社会主义新生事物，带头送子女下乡，教子女务农。三明地直机关、宁德地区革委会、军分区机关近二百名领导干部全部把自己应上山下乡的子女送到农村去。清流县革命委员会副主任陈文炳已有两个女儿在农村插队，今年又把最小的一个孩子送到农村去。在各级领导干部的带动下，各工厂、企业、机关、学校掀起了知识青年上山下乡热潮。许多干部、党员、老工人和家长都积极支持和送子女下乡务农。三明电厂老工人林光彩一次就把今年中学毕业的两个女儿、一个儿子送到山区农村落户。"},{"type":"paragraph","text":"为了做好知识青年上山下乡工作，今年上半年，各地、县（市）和厂矿党委多次召开会议，认真总结经验，对今年知识青年上山下乡工作提早做出了全面规划和安排。到现在，全省已建立六千多个青年点，为知识青年扎根农村创造了有利条件。农村社、队也积极为下乡知识青年准备劳动工具、棕衣、斗笠、炊具以及蔬菜基地等。福建省、地、县各级党组织还选派了二千二百多名带队干部下到农村，带领知识青年参加农村三大革命运动。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"福建文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"上山下乡","type":"主题/事件"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"限制资产阶级法权","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a6518ef86e"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
