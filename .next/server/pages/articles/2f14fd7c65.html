<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"坚决反对腐朽的资产阶级教育制度日本进步学生与反动警察激烈搏斗荷兰首都的学生和青年工人示威抗议反动当局的暴行","authors":[],"dates":[{"year":1969,"month":5,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京二十二日电　据东方通讯社报道:东京的日本大学进步学生二十一日举行集会和示威游行，表示要把他们在一年前掀起的反对腐朽的资产阶级教育制度、反对美日反动派罪恶统治的斗争坚持到底。他们同前去镇压的全副武装警察，展开了搏斗，英勇地击退了敌人的进攻。"},{"type":"paragraph","text":"东京日本大学的进步学生的斗争已经坚持了整整一年。他们的斗争鼓舞了日本全国各大学的进步学生的斗争。佐藤反动政府曾多次出动武装警察，封闭日本大学的几乎全部大楼，并且对进步学生斗争实行野蛮的镇压。"},{"type":"paragraph","text":"二十一日，日本大学两千多名进步学生在东京骏河台明治大学的讲堂里举行集会。"},{"type":"paragraph","text":"会后，学生们头戴盔帽，手拿木棒，在学校四周的大街上，高呼“粉碎日美‘安全条约’!”“收复冲绳!”“我们要战斗到底!”等口号，斗志昂扬地举行了示威游行。他们的行动得到了广大市民的支持和同情，游行队伍很快地就扩大到五千人，使这一地区的交通一度陷于瘫痪。"},{"type":"paragraph","text":"佐藤反动政府事先在大学周围部署了许多装甲车、水龙车和将近一千名武装警察。在学生开始示威游行时，武装警察丧心病狂地向学生队伍发射催泪弹并且挥舞警棍野蛮殴打学生，使许多学生受伤。进步学生和人民群众不畏敌人的残暴镇压，同警察展开了激烈的搏斗，猛烈地扔石块和瓶子。一批学生还从校舍搬出桌椅，在马路上设置了两道障垒，英勇地击退了武装警察的进攻。在斗争中，广大群众不时地向警察发出抗议的怒吼:“警察滚回去!”"},{"type":"paragraph","text":"另一批学生队伍还勇敢地捣毁了被大学当局封闭的日本大学理工系楼的大门，并且冲进楼内，在楼顶上再次升起了战斗的红旗。"},{"type":"paragraph","text":"二十一日这一场斗争从下午四时一直持续到晚上八时左右，给佐藤政府和大学反动当局以沉重的打击。"},{"type":"paragraph","text":"据新华社北京二十一日电　阿姆斯特丹消息:荷兰首都阿姆斯特丹的一千五百名学生和青年工人二十日晚举行示威，支持阿姆斯特丹大学学生反对腐朽的资产阶级教育制度的正义斗争。示威者同前来镇压的反动警察进行了英勇搏斗。"},{"type":"paragraph","text":"阿姆斯特丹大学的四百多名学生为了抗议学校当局的专横统治，要求改革教育制度，从十六日开始占领了这所大学的行政楼。荷兰反动当局出动了数百名军警，包围了被学生占领的大楼。二十日，警察向这所大楼投掷催泪弹，打伤了五个学生。警察还切断了通往这座大楼的电话线，并且企图切断占领大楼的学生们同外界的联系，断绝他们的食物和其他物品的供应来源。学生们勇敢地进行了抵抗。在电话被切断后，学生们就使用无线电报话机同外界保持联系，继续同反动警察进行斗争。"},{"type":"paragraph","text":"荷兰反动当局对阿姆斯特丹大。学学生的残暴镇压激起荷兰学生和工人们的义愤。一千五百名学生和青年工人二十日晚在荷兰首都中心区举行声势浩大的示威，抗议反动当局的暴行，声援阿姆斯特丹大学学生的斗争。示威者向无理包围大学的警察进行了冲击。反动警察使用催泪弹、高压水龙对示威者进行镇压，打伤了十多人，并无理逮捕了二十多人。学生和工人们使用了自制手榴弹和烟幕弹英勇地进行了还击，从二十日晚上一直战斗到二十一日凌晨。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2f14fd7c65"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
