<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"北京市六区宽大处理部分工商户后反映续志","authors":[],"dates":[{"year":1952,"month":2,"day":23}],"is_range_date":false,"parts":[{"text":"北京市六区宽大处理部分工商户后反映续志","type":"title"},{"text":"【内部参考讯】北京市第六区处理了部分工商户后，该区继续有不少商人表示十分感谢政府的宽大，决心以后要作守法商人，接受工人阶级领导。松记油漆店侯松年说：“在开会之前，政府虽然一再说坦白了宽大处理，但总不大信，今天证实了。消除了我的顾虑，我一定下决心坚决遵守政府的政策法令，接受工人阶级领导。”福升祥经理张子奇说：“政府对我们的宽大真是仁至义尽，我们应该以增产节约回答政府，衷心感谢共产党毛主席和领导我们的工人阶级。”福聚饭馆铺长马龙章说“今天的会是处理中小工商户，政府真是宽大，只有坦白才是出路，拒不坦白决不宽容，永安茶庄还没解决，普太祥经理跑了，已经逮捕回来，看起来就是不用跟政府捣鬼，有问题就是实说。”被宽大处理的工商户放下了自己的包袱，并大胆检举别人。如俊兴馆经理提出厚生银号有隐匿逆产的问题，该房是清团头子崔子宾的。未最后处理的工商户表示一定要彻底交代自己的问题，争取宽大处理。如天盛百货店经理说“本号现在尚未总结，我一定彻底谈清楚，交代明白，我尽力去想”。木器业学习小组表示“我行业有四户未处理，我们一定全体帮助他们继续学习”。国药业孟健如说“开过大会后三组的工商户坦白漏税的就有七千五百万元。”","type":"paragraph"},{"text":"小工商户希望三反运动快点结束，认为铺子大的，问题多的应严厉制裁。薛家湾3号帽铺的徐明瑞说“政府对我们小买卖真宽大，我们这行大的还没处理，对大的应该严办，不然小的全被他们挤垮了。”贾家花园九号三义煤铺经理刘子明说：“今天宽大处理了一批，不这样作，小商户就没发展了，行贿和受贿的都有好处，我们就没买卖了。”有人说：“给政府提个意见，三反运动再搞半月做手工的就够劲了，现在已没吃的了”，“三反运动应抓紧时间，不宜拖长，现在营业额降低到80％，拖的太久了，工商业受损失。”针织业第八组表示：“我们拥护三反，但在此期间一切行政因之停顿，城市乡村停止物资交流，影响生产，税收亦必缩少，希早日结束，对违法工商户急速处理。”海成永粮店反映“三反运动长了，市场粮食感到有点缺乏，门市粗粮不够供给市民需要，希望政府早日完成三反工作。","type":"paragraph"}],"comments":[],"origin":"新华通讯社编《内部参考》1952年2月23日","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"16a9e828c3"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
