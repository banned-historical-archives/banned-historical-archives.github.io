<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji14","name":"毛泽东全集第14卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji14.pdf"],"article":{"title":"在欢迎全国感劳总会北路感劳团晚会上的讲话","alias":"","parts":[{"type":"paragraph","text":"在欢迎全国慰劳总会北路慰劳团"},{"type":"paragraph","text":"晚会上的讲话！"},{"type":"paragraph","text":"（1939年9月10日）同志们："},{"type":"paragraph","text":"今天我们很高兴很诚意地开这个晚会，来欢迎来延安的许多同志们。首先，我代表全体同志，向国民政府林主席致敬，向民族领袖蒋委员长致敬。"},{"type":"paragraph","text":"团结抗战已经两年了，这样的情形，是打破了两年前的情状。两年前，那时候是没有抗战没有团结的，现在是团结抗战了，这是新现象，是新气象。这个新气象已到第三个年头了，这是堪以欣慰的。可是，在两年的抗战中国共两党之间有些小冲突小磨擦，因此，国共两党中间的同志，他们挂念、关切着，关于两党关系的问题。这的确是一个人人注意的问题，这不仅两党中间的同志是这样，在社会上一般人士中间，也是非常关切着，期待着完满的答复。其实这件事也并不是怎样难了解的，大家应该知道：三民主义是抗日民族统一战线的政治基础，国共两党是抗日民族统一战线的组织基础。统一战线是一个大的团体，它包括有各党各派，各界各"},{"type":"paragraph","text":"[1]全国慰劳总会北路慰劳团于9月9日到达延安。第二天毛泽东到招待处拜访慰劳团，并设宴招待他们。当天晚上，毛泽东陪同慰劳团出席陕甘宁边区政军，一切的人-一除了汉奸一一都在内的。当然，在国共两党中间共产党是承认国民党是统一战线中的第一个大党。两党之外，虽然有其他各党各派，各界各军，但无论如何，国共两党总是基础，如果国共两党不团结的话，这个统一战线是不能设想的了。所以我们说：国共两党是统一战线的组织基础。抗战两年来，国共两党是以团结为中心问题的；现在的问题，是抗战二年后的问题了，但其基本方针是没有变化，也不应有什么变化，这就是“团结”二字。团结是总方针。团结就要团结在进步基础之上。"},{"type":"paragraph","text":"现在两党中间，在部分的地方，有部分人员，发生一些磨擦，这种现象是不好的；但是，大家知道，在大局上，全国在蒋委员长领导之下，在各界人士互相关心，互相督促之下，我们团结抗战是靠得住的。我们一定要团结，不论怎么样，除了团结，没有别的方针。..."},{"type":"paragraph","text":"因为，敌人要“反蒋”，我们全国人民，就要大家起来拥护蒋委员长；敌人要打倒国民政府，我们全国人民就要拥护国民政府；敌人和汉妊注精卫等要破坏国共合作，我们全国人民就要拥护国共合作；敌人要破坏抗日民族统一战线，我们全国人民就要拥护抗日民族统一战线；敌人要我们内部打仗，我们一定不打内战。我们要做亲者快仇者所痛的事，而为亲者所痛仇者所快的事一件也不做。我们要站定自己的立场，决不能与敌人的口号混同起来，我们的口号是要处处与敌人对立，决不能有丝毫与敌人混同，一切与敌人混同的口号，都是媚敌降敌的幌子，一切与敌相同的言论，都是助敌张目的滥调，任何人要是想肩起敌人的口号而又言抗敌，那只是欺人之谈，残酷的历史将给以严厉的证明。"},{"type":"paragraph","text":"在今天，我们只有全国一致，拥护蒋委员长，拥护国民政府，拥护国共合作，拥护抗日民族统一战线，坚持抗战，反对投降，坚持团结，反对分裂，坚持进步，反对倒退，才能打胜日本帝国主义，把日本帝国主义赶出中国去，独立自由的新中国才能出现。"},{"type":"paragraph","text":"今天我们欢迎革命前辈张溥泉先生，他是中国革命的老辈，又尽力于团结抗战的事业非常之大，今天要他老先生给我们以指教。同时欢迎各位慰劳的同志们，也要请他们指教。"}],"authors":["毛泽东"],"dates":[{"year":1939,"month":9,"day":10}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":39,"page_end":41},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"317ad4f53f"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
