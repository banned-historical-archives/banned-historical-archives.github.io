script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"美英一些资产阶级报刊评尼克松电视演说时承认  尼克松“撤军”的鬼把戏再也骗不了人","authors":[],"dates":[{"year":1971,"month":4,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"美英一些资产阶级报刊评尼克松电视演说时承认"},{"type":"paragraph","text":"尼克松“撤军”的鬼把戏再也骗不了人"},{"type":"paragraph","text":"新华社十三日讯　华盛顿消息：美帝头子尼克松于七日在电视演说中抛出他的“撤军”骗局后，连美、英的一些资产阶级报刊也不能不承认，他玩弄的这种鬼把戏已经再也无法骗人了。这种情况表明，尼克松在政治上越来越孤立，日子越来越不好过。"},{"type":"paragraph","text":"尼克松在他的电视演说中大肆吹嘘什么“越南化取得了成功”、“老挝的行动取得了成就”，针对这种谎言，美国《芝加哥每日新闻》说，这不仅是“靠不住的”，而且对尼克松来说是“一次代价很高的政治挫折”。美国《国际先驱论坛报》说，“支持（尼克松）这种说法的证据太少而反驳它的证据要多得多”。连一向吹捧尼克松的评论员斯·艾尔索普在《新闻周刊》上写文章也不得不说，“老挝的行动，在老挝是一次军事失败，在美国是一场政治灾难。这是我一直不愿得出，但越来越多的证据表明无法逃脱的结论。”英国的《星期日电讯报》还进一步指出，“在南越的美军是一支士气败坏的军队”，“充满了吸毒、不服从军令、失败主义者和毫无战斗力”。"},{"type":"paragraph","text":"关于尼克松的“撤军”把戏，美国《国际先驱论坛报》指出，“尼克松上星期向全国保证说他的目的是完全撤出越南。但是他所宣布的以后七个月中的撤军计划离开这个目标很远，而且还是建立在过去的记录和目前的证据都不能支持的希望和假定的基础之上的。”"},{"type":"paragraph","text":"英国《卫报》从华盛顿发回的一条评论指出，尼克松“继续玩弄数字和撤军的骗局，已再也不能满足公众日益增长的要求：制止这场战争，结束这场恶梦，并且要快”。这家报纸说，“不断扩大的信用差距决不是更多的诺言和预言所能弥补的”。"},{"type":"paragraph","text":"谈到尼克松把所谓“战俘”问题作为美军赖在南越的借口时，《国际先驱论坛报》指出，尼克松的做法“给无限期留下来的美国军队提出了重大的危险，而（尼克松）总统‘高尚地’结束这场战争的徒然的希望是决不会达到的”。"},{"type":"paragraph","text":"西方报刊还不得不承认，把美国侵略军从越南南方和印度支那全部、立即、无条件地撤走，是当前美国人民的强烈要求。"},{"type":"paragraph","text":"尼克松在他的电视演说中，耍尽花腔，妄图欺骗美国人民，但是，从上面西方报刊的评论可以看出，尼克松这种心劳日拙的把戏，是骗不了人的，只能更加暴露这个战争贩子的丑恶嘴脸。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7c96a80358"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
