script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"学习《毛泽东选集》第五卷参考资料 四","authors":[],"dates":[{"year":1977,"month":6,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"饶漱石(第一三九页)"},{"type":"paragraph","text":"饶漱石是个大野心家、大叛徒。一九二五年混入党内，一九三一年被捕后叛变自首，出狱后受到刘少奇的重用，追随刘少奇积极推行王明右倾投降主义路线。全国解放后，他在华东工作期间，在城市和农村中，竭力推行向资本家、地主、富农投降的右倾政策，一九五三年他调到中央工作后，同高岗结成反党联盟，积极进行分裂党的阴谋活动。一九五五年三月，党中央召开了中国共产党全国代表会议，通过了《关于高岗、饶漱石反党联盟的决议》，宣告了高饶反党联盟的破产。高岗、饶漱石被清除出党。"},{"type":"paragraph","text":"康泽(第二八二页)"},{"type":"paragraph","text":"康泽，四川人，是蒋介石十三太保之一，军统特务头子和战犯。一九四七年任蒋匪第十五绥靖区司令官。一九四八年春我军解放襄樊，生擒康泽。一九六三年获特赦释放。"},{"type":"paragraph","text":"潘汉年(第二八二页)"},{"type":"paragraph","text":"潘汉年，江苏宜兴人。早年混入中国共产党，曾在江西苏区人民委员会工作。后来叛变投敌，成为国民党潜伏在共产党内的特务。解放后窃取上海市人民政府副市长，继续暗中进行反革命活动，一九五五年肃反运动中被清查出来。"},{"type":"paragraph","text":"宣统皇帝(第二八二页)"},{"type":"paragraph","text":"宣统皇帝，即爱新觉罗·溥仪。清朝末代皇帝，三岁即位，六岁下台(一九一一年)。因为年号为‘宣统’，故通常称之为‘宣统皇帝’。‘九一八’事变后，日寇制造伪满洲国傀儡政权，溥仪当了傀儡皇帝。一九四五年八月八日苏联向日本宣战，溥仪被俘，送伯力监狱。解放后，被押送移交我人民政府，以战犯罪判刑，一九五九年获特赦释放，并当了政协委员，一九六七年病死。"},{"type":"paragraph","text":"唐绍仪(第三三○页)"},{"type":"paragraph","text":"唐绍仪，官僚政客。字少川，一作绍怡。广东中山人。早年曾任清政府驻朝鲜商务参赞，袁世凯的书记官。一九○二年，袁世凯升直隶总督，唐任天津海关道，后升任外务部侍郎，奉天巡抚等职。一九一二年袁窃据临时大总统后，唐出任内阁总理。由于唐与袁的矛盾很深，三个月后被迫辞职。一九一五年，袁世凯策划复辟帝制时，他通电劝袁退位。此后，唐绍仪历任蒋介石南京国民政府委员、西南政务委员会委员并兼任中山县县长等职。一九三八年因与日本侵略者勾结，被刺死。(上海师范大学供稿)"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"name":"高岗","type":"人物"},{"name":"饶漱石","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"编纂《毛泽东选集》第五卷","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8bdb7f55c6"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
