<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"最新型、最革命、最进步的学校——中国人民抗日军事政治大学介绍","authors":[],"dates":[{"year":1966,"month":8,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"中国人民抗日军事政治大学(简称抗大)是在党中央和毛主席直接领导下创办的最新型、最革命、最进步的学校。"},{"type":"paragraph","text":"三十年前，我国正处在伟大的抗日民族革命战争的前夜，党为了领导即将到来的抗日战争，为造就大批抗日的、革命的坚强干部，于一九三六年六月一日，在原来红军大学的基础上，成立了中国抗日红军大学，由林彪同志任校长兼政治委员。一九三七年一月，“中国抗日红军大学”改名为“中国人民抗日军事政治大学”。"},{"type":"paragraph","text":"抗大的创建，自始至终得到了党中央和毛主席的亲切关怀。毛主席亲自兼任抗大教育委员会主席，亲自到抗大讲课，并经常给学校作指示。毛主席的《中国革命战争的战略问题》、《实践论》、《矛盾论》等重要著作，都是在抗大作的讲演。毛主席还亲自为抗大制定了“坚定正确的政治方向，艰苦朴素的工作作风，灵活机动的战略战术”的教育方针和“团结、紧张、严肃、活泼”的校风。党中央负责同志刘少奇、周恩来、朱德、林彪、邓小平等也亲自到抗大讲课、作报告。抗大是在物质条件极为困难的情况下办学的。没有课堂，就在露天上课，以背包当板凳，膝盖当桌子；粮食缺乏，就自力更生，动手生产；没有宿舍，就挖窑洞。林彪同志说:“我们学校还有一个没有列入课目表的主要课目，这个课目的名称叫做艰苦奋斗。”生活虽然艰苦，但是人人精神振奋，斗志昂扬。"},{"type":"paragraph","text":"抗大，是完全按照毛主席的教育思想办起来的革命化的学校，是无产阶级教育事业的样板。抗大的光荣传统，最核心的就是高举毛泽东思想伟大红旗，突出政治，以毛主席著作为基本教材，学习毛泽东思想，贯彻毛泽东思想，传播毛泽东思想，用毛泽东思想武装广大革命干部。抗大的教育中心是政治教育，提高人的无产阶级觉悟。抗大的教学原则是理论与实际相联系，少而精。抗大的教学方法是启发式、研究式、实验式的生动活泼的方法。抗大，以战无不胜的毛泽东思想来教育和改造学员，在为民族解放和社会解放的阶级斗争的大风大浪里锻炼他们。因而，每期学员虽然只经过不到一年的学习时间，就能按照毛主席的“勇敢、坚定、沉着。向斗争中学习。为民族解放事业随时准备牺牲自己的一切!”的指示，勇敢地奔赴前线。"},{"type":"paragraph","text":"一九三八年底，抗日战争进入相持阶段。为了把培养干部与广泛开展敌后游击战争、创建抗日民主根据地相结合，使学校教育更好地适应抗日战争的需要，党中央决定抗大深入敌后，到敌人后方去办学。并先后在各个抗日根据地建立起十二所分校。抗大总校和这些分校，按照毛主席的“从战争学习战争”的教导，在敌、伪、顽重重包围和紧张的战斗环境中，一面战斗，一面学习。他们和根据地的人民同甘共苦，除了和群众一起战斗、粉碎敌人的“扫荡”外，还做民运工作，发动群众减租减息，参加生产运动等。"},{"type":"paragraph","text":"一九四二年，根据毛主席的指示，全党进行伟大的整风运动。这时，抗大总校和一部分分校，奉命返回陕甘宁边区，参加了整风和大生产运动，使广大干部、学员的政治、军事和文化水平得到很大提高，为抗日战争的大反攻准备了大批干部。就这样，从一九三六年到一九四五年的九年中，抗大造就了十余万用毛泽东思想武装起来的忠于党、忠于人民、忠于无产阶级解放事业的革命干部。"},{"type":"paragraph","text":"抗日战争胜利后，抗大总校和它的各个分校改名为中国人民解放军军政大学，继续为中国人民的解放事业培养了大批的革命干部。"},{"type":"paragraph","text":"(新华社北京31日电)"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f0d12c3b6e"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
