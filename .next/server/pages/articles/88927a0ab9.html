script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"墨西哥报纸揭露美国血贩子剥削墨西哥人","authors":[],"dates":[{"year":1979,"month":8,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"墨西哥报纸揭露美国血贩子剥削墨西哥人"},{"type":"paragraph","text":"新华社墨西哥城八月三日电  据此间报纸报道，美国的血贩子在美国和墨西哥的边境地区建立了许多“血银行”和“血浆库”来剥削墨西哥劳动者。"},{"type":"paragraph","text":"报道说，在长达三千二百公里的两国边境地区，这些机构在当地发行的墨西哥报纸上刊登大型广告，用金钱诱使贫穷的墨西哥农业劳动者和无证件的人到美国去卖血。到目前为止，已有十万多名十五岁至四十五岁的墨西哥人，为了维持生计和获得出境的钱而到这些机构里卖血。"},{"type":"paragraph","text":"据墨西哥《一加一报》报道，每小时平均有一个无证件的墨西哥人卖血，美国的血贩子从每一个卖血的人身上榨取高于百分之一千的利润，卖血已使许多人死亡。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"88927a0ab9"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
