script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"军民同批邓","authors":[],"dates":[{"year":1976,"month":7,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"军民同批邓"},{"type":"paragraph","text":"五指山下，南圣河畔，住着解放军广州部队群众工作先进单位某部指挥连和广东省农业学大寨先进集体黎族应示大队。在批邓、反击右倾翻案风的伟大斗争中，他们团结战斗，谱写了拥军爱民的新篇章。"},{"type":"paragraph","text":"去年九月，指挥连战士陈彪来到应示黎寨。他注意到在批林批孔中被批判的一个地主婆又活跃起来，到处散布流言蜚语，攻击教育革命。陈彪赶回连队，向党支部同志说：“这股否定教育革命的妖风，风源来自上头，刮到底下，阶级敌人高兴，这是一场两个阶级两条路线的严重斗争。资产阶级发起进攻了，我们应该进行反击。”党支部认真研究了陈彪的意见，立即派副指导员刘国友带陈彪等三人到应示大队去，支持教育革命。"},{"type":"paragraph","text":"夜晚，他们三人来到大队部门前，只见屋里灯火通明，一个人正在高声说话：“否定教育革命的成果，就是否定文化大革命，我们贫下中农一定要坚决予以回击，保卫文化大革命的伟大成果。”原来，是大队党支部书记黄明和正在支委会上作战斗动员呐！"},{"type":"paragraph","text":"军民并肩上战场，黎寨革命烈火旺。黄明和、刘国友领着军民联合调查组的几个同志，走村串寨，深入调查应示大队教育革命带来的新变化，追查各种政治谣言和阶级敌人的破坏活动，用大量的事实批驳否定教育革命的种种谰言。"},{"type":"paragraph","text":"去年，应示大队接到上边传来要以“三项指示为纲”搞好各项工作的精神。大队贫协组长黄大成和在队里支农的指挥连排长李帮雄一块谈开了。李帮雄说：“我们搞好连队建设，搞好团结，都离不开阶级斗争这个纲。”黄大成也谈到：文化大革命后，应示大队办起阶级教育展览馆、政治夜校，坚持看书学习，斗了阶级敌人，批了修正主义，堵了资本主义，才使昔日刀耕火种的穷应示变成“马达山间响，河水上山岗，亩产千斤粮，五业大兴旺”的新黎寨。他们越谈，越觉得“三项指示为纲”这个提法有问题，和毛主席的革命路线不合拍。他俩向大队党支部建议，不传达这个精神，坚持以阶级斗争为纲，搞好各项工作。大队党支部采纳了他们的意见，并成立了军民工作组，由黄大成和李帮雄带队，狠抓阶级斗争。他们批斗了挑动宗族斗争，破坏团结的坏分子；追查出毒死耕牛，破坏春耕生产的流窜犯，进一步擦亮了干部社员的眼睛，激发了群众大干社会主义的积极性。反击右倾翻案风以来，他们狠批邓小平反革命的修正主义谬论。今年夏收总产达到九十五万斤，比历史上早造产量最高的一九七四年增产五万斤。"},{"type":"paragraph","text":"解放前的应示黎寨，在三座大山和黎头奥雅（地主）的压迫剥削下，广大贫苦黎族群众世世代代“刻木记事，结绳记数”。解放后，他们政治上翻了身，但是在刘少奇反革命的修正主义路线的影响下，上学的人仍然很少。指挥连进山后，一直把帮助应示人民学文化，学理论作为一件大事来抓。他们上山打石伐木，盖校舍，做桌椅，帮助九个黎村办起了政治夜校，坚持不断地派人和群众一起学习。应示大队也经常派老贫农去给指战员们上阶级斗争和路线斗争教育课。批邓、反击右倾翻案风以来，指挥连和应示大队认真学习毛主席的一系列重要指示，努力搞清楚资产阶级“就在共产党内”的问题。他们说：“我们决不能让黎头的皮鞭重新在我们面前飞舞，绝不能让奥雅重新骑在我们头上作威作福。我们要牢记党的基本路线，永远跟着毛主席干革命。”　本报通讯员"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"批林批孔","type":"主题/事件"},{"name":"教育革命","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5b4cf0945d"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
