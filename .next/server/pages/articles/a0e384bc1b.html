<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"天津斗争不法资本家的一点经验","authors":[],"dates":[{"year":1952,"month":3,"day":11}],"is_range_date":false,"parts":[{"text":"天津斗争不法资本家的一点经验","type":"title"},{"text":"【天津分社十一日讯】天津市在五反斗争中对于有利国计民生的私营工业资本家，采取了确定保护，但要发动工人搞清问题，痛打其不守法部分的方针。寿丰面粉公司工人在斗争不法资本家时，运用这个方针，取得了很大的胜利。","type":"paragraph"},{"text":"寿丰是天津私营最大的面粉公司，有两个厂，职工四百人，经理孙冰如，是个土著资本家。敌伪时代和敌伪人员“合作”，解放后，我们因为他在土著资本家中，有一定的代表性，先后叫他参加了市各界代表会，并选为市府委员，担任市工商联常委。但是三年来，他和其副理、襄理、副襄理等人结合成反动核心，腐蚀干部，盗窃国家经济情报，高报成本、骗取加工费、隐匿加工余粮、偷盗国税。","type":"paragraph"},{"text":"该厂斗争的经验如下：","type":"paragraph"},{"text":"(一)发动工人。首由食品业工会、区委会同召开党团员动员大会。继而该厂支部、工会组织全体职工收听全市检举坦白大会实况广播，职工纷纷要求行动，便召开职工大会，交代政策，发动职工对本厂资本家进行检举。","type":"paragraph"},{"text":"(二)战前准备：首行占领资本家的桥头堡垒——会计部，对该部职工进行阶级教育，阐明政策，打垮资方以威胁、利诱的方法来夺取职员。工会利用争取过来的职员掌握了核算的技术和账本上的具体材料。","type":"paragraph"},{"text":"(三)进攻部署：具体方针是：(1)揭发资本家在会计工作上搞鬼的全部手段，以便算出过去盗窃资财的数字，监视他们今后不能再捣鬼；(2)扩大和巩固党和工会的威信，争取全体职员，不但在今天而且在今后，要能孤立资本家，使职工在思想上与资本家划清界限；(3)打垮资本家的核心集团。","type":"paragraph"},{"text":"根据方针，确定具体的战斗策略。即是对经理部几个“大员”作具体分析，按照他的历史、个性、特点作出：打谁、拉谁、压谁、吓谁、惊谁的具体战略计划。上级批准这个计划，该厂党、团就联合传达下去，打通思想，组织力量，在节约检查支会下成立打虎队，设立宣传、检查、纠察三个组。召开工会组长与常委联席会，说明向资本家进攻的步骤，并利用各种宣传武器，向全体工人说明工人领导阶级的尊严，服从组织、遵守纪律、不打人、不骂街。把与资本家有关的分子组织动员起来，叫他们喊口号。纠察队员，都是坚强骨干分子。","type":"paragraph"},{"text":"这样，在大会开始的第二天孙冰如就去统战部交代了偷窃经济情报的问题，最近又写了盗窃国家资财二十亿元的坦白书。","type":"paragraph"}],"comments":[],"origin":"新华通讯社编《内部参考》1952年3月14日","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a0e384bc1b"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
