script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"艾地主席指出没有革命精神社会主义就会变质帝国主义和现代修正主义狼狈为奸　梦想利用“谈判”挽救美帝侵越败局","authors":[],"dates":[{"year":1965,"month":4,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社雅加达5日电　印度尼西亚共产党主席艾地四月三日说，“目前国际形势是大好的。现在有人在叫嚷，要就南面问题举行谈判。帝国主义者和现代修正主义者对举行越南阳题谈判非常积极，因为美帝国主义如果在那里不断遭到痛击，那么它就完蛋了。南越人民以朝气蓬勃的革命精神，用简单的武器，正在同最大的帝国主义——拥有现代化武器的美国周旋。然而，被打败的是这个大帝国主义，天天打胜仗的却是越南人民。”"},{"type":"paragraph","text":"艾地说:“不久以前，一个现代修正主义者同我争论说，有工厂比有精神更重要。精神能起什么作用呢?上街示威能起什么作用呢?还是呆在工厂里搞生产来得好。我驳斥说:如果只有工厂，而没有精神，工厂就会丢掉，那就是说社会主义的工厂会变成资本主义的工厂。但是，尽管起初没有工厂，而只有革命精神，以后是会有工厂的。因此，我们面当象越南人民一样，保持我们的革命精神。”"},{"type":"paragraph","text":"艾地是在茂物附近的“埃戈姆”农业和农民运动学院主办的农民干部短期副练班开幕式上讲这些话的."},{"type":"paragraph","text":"艾地在谈到国内形势时说:“我们国内形势也是非常好的……现在，目前政策的制定者是人民。这些政策是由人民在街头(示威)、在种植园、在油田、在抵制美国电影的电影院、在美国固特异橡胶轮胎公司等等地方制定的。”"},{"type":"paragraph","text":"艾地说:“印度厄西亚人民，特别是农民，是我国对外对内政策的制定者。苏加压总统敢于作出退出联合国的决定，因为他清楚地知道，人民，特别是农民，是他的后盾。要是农村中还有强大的反动势力存在，那前，总统就不敢采取措施退出联合国，解散‘支持苏加诺主义机构’及其所属组织——只是因为有人民的强大支持，才能制定退出联合国的政策。要是农村中没有强大的共产党力量，那么，封建地主就会勾销关于印度尼西亚退出联合国的措施。”"},{"type":"paragraph","text":"艾地说:“我们现在正处于非常有利的革命形势中。在这种形势下，对我们来说，最好的办法就是发动革命攻势，并且，只有这样做，我们才能天天赢得胜利。”"},{"type":"paragraph","text":"艾地说:“我们不仅应当注意农业，而且还应当注意农民运动。如果没有粉碎农村恶魔的轰轰烈烈的农民运动，农业就不能发展。”"},{"type":"paragraph","text":"艾地说:“现代修正主义的头子赫鲁晓夫装模作样地表示他重视农业，特别是重视种植玉米，而实际上他损害了苏联的农业。我们不应当象他那样。赫鲁晓夫在农业方面表现的狂妄自大，不仅大大损害了苏联的革命事业，而且还损害了其他社会主义国家。当然，作为现代修正主义头子的赫鲁晓夫不仅在农业方面犯错拜，他在其他方面所犯的错误比这方面的错误更要大得多。”"},{"type":"paragraph","text":"艾地还号召学员们重视实践。他说:“实践是一切理论之母。正确的理论来自实践.”"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"世界形势","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"66ab49d87c"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
