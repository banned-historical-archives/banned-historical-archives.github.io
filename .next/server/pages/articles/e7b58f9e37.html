script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"革命派主动热情帮助干部同资产阶级反动路线决裂市十女中组成临时权力机构革命师生团结对敌向炮制“打击一大片，保护一小撮”的头号野心家猛烈开火","authors":[],"dates":[{"year":1967,"month":5,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　上海市第十女中革命派最近着重批判党内最大的一小撮走资本主义道路当权派在干部问题上“打击一大片，保护一小撮”的资产阶级反动路线，在革命的大批判中巩固了革命的大联合，实现了革命的“三结合”，成立了由革命群众组织负责人、革命的领导干部和民兵组织代表组成的学校临时权力机构——革命委员会。"},{"type":"paragraph","text":"无产阶级文化大革命开始时，党内最大的一小撮走资本主义道路当权派就通过他们在上海的代理人在市十女中推行了“打击一大片，保护一小撮”的资产阶级反动路线，把大批革命群众打成“反革命”、“政治扒手”、“野心家”，把一些革命干部打成“牛鬼蛇神”、“叛徒”、“动摇分子”，把革命组织打成“裴多菲俱乐部”，几乎使全部党员“靠边”。这一小撮坏家伙还贩卖《修养》的私货，抛出反动的血统论，造成了干部与干部，干部与群众之间严重的对立。"},{"type":"paragraph","text":"这个学校的革命派在革命的大批判中紧密结合本单位的实际，对干部问题上的资产阶级反动路线着重进行了批判。他们遵循毛主席“不但要看干部的一时一事，而且要看干部的全部历史和全部工作，这是识别干部的主要方法”的教导，运用无产阶级的阶级分析武器，对干部的全部工作和全部历史进行了了解和讨论，严格区分两类不同性质的矛盾。他们认识到不少干部虽然犯了这样那样的错误，但绝大部分干部也是资产阶级反动路线的受害者。应该本着“惩前毖后、治病救人”的方针，对他们进行热情帮助。他们对干部以前犯的错误坚决揭发，严肃批判，严格要求，绝不含糊。但对干部每一点进步都予以充分重视，热情鼓励。他们和干部一起学习毛主席著作和有关政策文件，帮助干部正确认识毛主席制定的干部政策，给他们分析阶级斗争形势；还召开批判大会、干部座谈会等，为他们创造“亮相”的条件，鼓励他们在实际斗争中与资产阶级反动路线划清界限。他们还根据各个干部不同的思想情况进行不同的工作，采用请干部下班级座谈，找干部个别谈心等形式对干部进行帮助。有的犯错误的干部有消极自卑情绪，革命派就严肃指出:“过去犯了错误，现在对两条路线的斗争不闻不问，迟迟不起来革命，那是错上加错。”有的干部担心群众不信任，怕人家说他“假造反”，“捞稻草”，革命派就谈自己起来革命的体会，鼓励他们抛开私心杂念，坚决回到毛主席的革命路线上来。在革命派的热情帮助下，许多干部贴出了“下定决心，痛改前非，坚决倒向革命派一边”等大字报。当有些坚决起来革命的干部要求参加革命组织的时候，革命派的同志热烈欢迎，还隆重召开了“欢迎新战友”大会。"},{"type":"paragraph","text":"市十女中的革命派不仅敢于“打击一小撮”，还勇于“解放一大片”，团结大多数干部，壮大了革命队伍，成立了“三结合”临时权力机构。目前，正在进一步掀起向党内最大的一小撮走资本主义道路当权派和他们推行的资产阶级反动路线猛烈开火的新高潮。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e7b58f9e37"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
