script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"京市二区不少妇女  积极参加夜校学习  深切体会到共产党的好处，由衷地感谢毛主席。","authors":[],"dates":[{"year":1950,"month":10,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"京市二区不少妇女"},{"type":"paragraph","text":"积极参加夜校学习"},{"type":"paragraph","text":"深切体会到共产党的好处，由衷地感谢毛主席。"},{"type":"paragraph","text":"【本报讯】北京市二区妇女工作组王凡报道：京市二区不少成年妇女由于解放后获得了学习文化的机会，积极参加夜校学习，并切身体验到共产党的好处，由衷地感谢毛主席。"},{"type":"paragraph","text":"该区妇女工作组，为动员妇女群众参加庆祝国庆节，曾于九月二十九日召开了夜校代表会议，出席十四个夜校的代表共九十八人。不少代表热情发言。在发言中，叙述了自己怎样在婆婆丈夫反对上学的情形下，最后说服了家庭，争取到学习机会的整个过程和经验。如第三文化馆周瑞明说：“我十三岁失学，十四岁结了婚，一直就当着顺服的媳妇，直到解放后成立了夜校，我才又有了学习的机会。但在报名时，家里不喜欢，婆婆挂着脸；丈夫也说：“你这么大年纪还学个啥呀！”孩子们也七嘴八舌的乱阻拦。但是，不管怎样，我还是尽量想法上了学。在学校学社会发展史很有兴趣，回家后就给家里人讲解，同时上学回家后，总先帮着家里人做活，而不是回家就端碗吃饭；家里的衣服晚上打夜做。就这样慢慢地把家里人的看法转变过来了。”广宁伯街夜校初级班的王玉璋说：“咱们都是上了年纪的人，有的已三、四十岁，要是过去的有钱人家早都大学毕业了，今天咱们七、八岁的孩子就能上学，是因为赶上了毛主席这个好时代，而咱们小时候所赶上的却是日本鬼子和国民党反动统治的倒霉时代。拿咱们自己来说，今天要不是共产党来了，咱们恐怕一辈子也没有学习机会。所以姊妹们应好好学习，也不要与婆婆、丈夫吵闹，要用和平的办法去转变他们的脑筋。只有这样，才对得起共产党、毛主席对我们的关切。”有的代表在发言中兴奋、感激，忍不住流了眼泪。她们深深地感到：今天的幸福是毛主席给予的，应该深深地感谢毛主席。女三中夜校聂宝兰说：“在今年三八节的会上，我就下了决心要参加学习，大胆向大姑提了出来，结果两人一块儿参加了夜校。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4a2714d8f8"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
