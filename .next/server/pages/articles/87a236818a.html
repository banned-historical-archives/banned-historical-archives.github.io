script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji23","name":"毛泽东全集第23卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji23.pdf"],"article":{"title":"中原和西北地区的作战部署","alias":"","parts":[{"type":"paragraph","text":"中原和西北地区的作战部署"},{"type":"paragraph","text":"（1948年1月9日）刘、邓，粟、陈、唐，陈、谢“，并告邯郸局，华东局，中工委："},{"type":"paragraph","text":"各电均悉。为着在两至三个月内歼敌十个旅左右，协助刘邓建立大别山、桐柏山、江汉等处根据地，协助陈谢建立豫西南、鄂西北、陕东南及豫西根据地，协助彭张建立渭北根据地，并破坏津浦路，扩大豫皖苏根据地，协助苏北、苏中作战之目的，部署如下："},{"type":"paragraph","text":"甲、第一阶段，（一）刘邓集结相当力量，粟裕三个纵队（四纵不在内），陈谢不少于五个旅，于子有（二十五日）以前休息整训完毕；子有以后，粟裕及陈谢两军统一由粟指挥，由现地向豫鄂陕边行动，相机攻占南阳、镇平、内乡、浙川、邓县、新野、襄阳、樊城、宜城、南漳、光化、老河口、谷城、"},{"type":"paragraph","text":"[1]刘、邓，指刘伯承、邓小平，当时分别任晋冀鲁豫野战军司令员和政治委员。粟、陈、唐，指粟裕、陈士、唐亮，当时分别任华东野战军副司令员、参谋长和政治部主任。陈、谢，指陈、谢富治，当时分别任晋冀鲁豫野战军陈谢集团前委书记和副书记。"},{"type":"paragraph","text":"[2]彭，指彭德怀（1898一1974)，湖南湘潭人，当时任西北野战军司令员兼政治委员。张，指张宗逊（1908一1998），陕西渭南人，当时任西北野战军副司令员。"},{"type":"paragraph","text":"[3]光化，1983年并入老河口市。均县\"、郧阳、西坪、卢氏、商南、商县诸城镇，相机歼灭该区敌人，并吸引白崇禧军一部西进相机歼灭之。在配合作战时，王宏坤、赵基梅两纵受粟指挥（该两纵以分散游击为主）。（二）刘邓在大别山、淮北各部集结相当力量相机歼敌。（三）陈粟八、十、十一纵及四纵分别在陇海汴徐线以北及沙河流域休整一个整月，然后以三个纵队在徐蚌线东西、郑徐线南北相机歼敌，并大破该两路。（四）彭张主力（八个旅）于本月休整完毕，下月初开始向延安、宜川线出击（该线有胡军七个旅），得手后向该线以南、渭水以北进击，以建立渭北根据地为自的（该地是向陇南行动建立甘陕川边根据地之跳板）。"},{"type":"paragraph","text":"乙、第二阶段，粟部及陈谢部在豫鄂陕边地区休整一时期，然后陈谢部向渭南行动，粟陈唐三个纵队并加一个纵队向北行动，相机攻占郑州、潼关间各城镇，歼灭该线敌人。刘邓在现地相机休整及作战，陈粟之八、十、十一纵仍服原任务，准备从山东调二、七两纵至苏北作战，待华中分局建立后，该两纵归陈粟指挥（陈毅于子虞?到中央，约两星期后动身归队）。"},{"type":"paragraph","text":"丙、第三阶段，粟部准备在郑潼线上休整一个月至两个月（请[1]均县，今湖北丹江口市。[2]白崇禧，当时任国民党政府国防部部长兼国防部九江指挥部主任。"},{"type":"paragraph","text":"[3]指王宏坤和赵基梅分别任司令员的晋冀鲁豫野战军第十纵队和第十二纵队。"},{"type":"paragraph","text":"[4]陈，指陈毅（1901一1972)，四川乐至人，当时任华东野战军司令员兼政治委员。粟，指粟裕。"},{"type":"paragraph","text":"[5]胡，指胡宗南（1896一1962)，浙江孝丰（今属安吉）人。当时任国民党军西安绥靖公署主任。"},{"type":"paragraph","text":"[6]子虞，即1月7日。邯郸局准备粮食），然后向平汉线上及平汉、津浦之间作战。"},{"type":"paragraph","text":"军委子佳"}],"authors":["毛泽东"],"dates":[{"year":1948,"month":1,"day":9}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":500,"page_end":502},"tags":[{"name":"陈毅","type":"人物"},{"name":"粟裕","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"王宏坤","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"87a236818a"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
