" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji41","name":"毛泽东全集第41卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji41.pdf"],"article":{"title":"关于解决春荒缺粮问题的批语","alias":"","parts":[{"type":"paragraph","text":"关于解决春荒缺粮问题的批语"},{"type":"paragraph","text":"（1959年4月17日）总理："},{"type":"paragraph","text":"此件\"我已全部看了。建议：（一）将此件（实为两件，一件是十五省的表，一件是五省缺粮情况及处理办法）立刻印三十份，以十五份，在三日内，在（用）飞机送到十五省委第一书记手收，请他们迅即处理，以救2517万人的暂时（两个月）紧急危机。我相信，有些地方已经或正在处理，例如山东济宁、聊城两专区；有些可能当地领导人还不知道情况，因而还未处理。（二）由你找人大代表中十五省在京开会代表谈一次（着重五省），每人分发文件一份。如同意，请即办。文件可安一个总题目：《十五省二千五百一十七万人无饭吃大问题》。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一九五九年四月十七日下午十一时"},{"type":"paragraph","text":"[1]指国务院秘书厅1959年4月6日关于山东、江苏、河南、河北、安徽五省缺粮情况及处理办法给国务院秘书长习仲勋并总理、副总理的报告和中央救灾委员会办公室1959年4月9日关于十五省春荒情况统计表。"}],"authors":["毛泽东"],"dates":[{"year":1959,"month":4,"day":17}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":444,"page_end":444},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3ce00707e9"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
