script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"印尼共就苏联政府驱逐印尼《人民日报》记者发表声明　谴责现代修正主义者背叛民族解放斗争　强调不能同苏共修正主义领导集团搞联合行动","authors":[],"dates":[{"year":1967,"month":1,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"印尼共就苏联政府驱逐印尼《人民日报》记者发表声明"},{"type":"paragraph","text":"谴责现代修正主义者背叛民族解放斗争"},{"type":"paragraph","text":"强调不能同苏共修正主义领导集团搞联合行动"},{"type":"paragraph","text":"新华社二十八日讯　印度尼西亚共产党中央政治局就苏联政府将印尼《人民日报》记者安瓦尔·达尔马从莫斯科驱逐出境的事件发表了一项声明，这个声明全文如下："},{"type":"paragraph","text":"印度尼西亚共产党中央政治局已经听到了关于苏联政府于一九六六年九月五日将印度尼西亚共产党中央委员会机关报《人民日报》驻莫斯科记者安瓦尔·达尔马同志驱逐出境的事件。"},{"type":"paragraph","text":"尽管苏共中央总书记勃列日涅夫不久前在他向苏共二十三大所作的报告中，对于遭受到陆军右派将领纳苏蒂安—苏哈托的军事独裁政权的野蛮和毫无人道的追缉、恐怖措施和压迫的印度尼西亚革命者，特别是印度尼西亚共产党人表示“他的声援”，但是，印度尼西亚共产党中央政治局对于这一事件的发生，毫不感到奇怪。"},{"type":"paragraph","text":"这一驱逐事件再一次证明了现代修正主义者言行不一致达到何等地步。从现代修正主义者那里除了得到对争取民族解放的人民革命和人民斗争的虚伪和背叛之外，确实是不能够期望得到什么其它东西。不能同目前以苏联共产党领导集团为中心的现代修正主义者搞反对帝国主义、新老殖民主义和其他反动派的联合行动。"},{"type":"paragraph","text":"印度尼西亚共产党中央政治局完全赞同安瓦尔·达尔马同志所采取的态度，并支持他于一九六六年九月二十八日在北京所发表的声明。"},{"type":"paragraph","text":"印度尼西亚共产党中央政治局号召在国内或在国外的所有印度尼西亚共产党人：以决不后退的意志来进行反抗陆军右派将领纳苏蒂安—苏哈托军事独裁政权的斗争，以争取实现解放的和完全独立的新印度尼西亚，与此同时，不管像今天那样情况如何困难，也要通过各种途径、利用现有工具，经常不断地更好地学习和掌握马克思列宁主义科学，以便能够更有成效地反对已明目张胆地同帝国主义者，特别是美帝国主义者及其傀儡和走狗勾结的现代修正主义者的各种阴谋诡计和颠覆活动的危险。"},{"type":"paragraph","text":"印度尼西亚共产党中央政治局代表全体印度尼西亚共产党人向中国共产党中央委员会表示感谢，感谢她根据无产阶级国际主义对居留在中华人民共和国的印度尼西亚共产党人所给予的巨大和非常宝贵的援助，以便他们能够坚持完成争取祖国和印度尼西亚人民的解放以及为全世界无产阶级而斗争的各项任务。"},{"type":"paragraph","text":"印度尼西亚共产党中央政治局　一九六六年十月于中爪哇"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"97625bee42"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
