script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"阿尔巴尼亚《团结报》揭露  苏修以“共同建设”为名剥削掠夺东欧国家","authors":[],"dates":[{"year":1976,"month":11,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"阿尔巴尼亚《团结报》揭露"},{"type":"paragraph","text":"苏修以“共同建设”为名剥削掠夺东欧国家"},{"type":"paragraph","text":"新华社地拉那一九七六年十月二十八日电　阿尔巴尼亚《团结报》十月二十七日发表评论，揭露苏联社会帝国主义对东欧国家的掠夺和剥削。"},{"type":"paragraph","text":"评论指出，莫斯科社会帝国主义者强迫东欧国家为开发苏联的自然资源大量投资，把这作为向东欧国家提供原料的条件。苏联提出的臭名昭著的“经济一体化”政策，目的显然是要逐步消除东欧国家的民族经济界限，完全取消它们的民族主权，为建立一个克里姆林宫头目们称之为“三亿八千二百万人的各民族大家庭”的新俄罗斯帝国打下物质基础。"},{"type":"paragraph","text":"评论说，这种伴随着对这些国家劳动群众的血汗进行野蛮掠夺的新殖民主义政策，首先要求协调资本投资和更大规模地统一物资财政资源，以实现苏联“共同建设大型成套工业项目”的要求。在苏联国土上修建这些项目，决不是为了任何一个参加建设的国家的民族利益。"},{"type":"paragraph","text":"评论指出，苏联对东欧国家的掠夺行径极好地证明，俄国资产阶级正集中全力来实行“经互会”国家经济、军事和思想“一体化”的计划。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3ca074fae4"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
