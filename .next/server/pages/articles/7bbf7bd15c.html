<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"天主教平凉教区代主教马骥等反对驱逐帝国主义分子出境","authors":[],"dates":[{"year":1953,"month":5,"day":21}],"is_range_date":false,"parts":[{"text":"天主教平凉教区代主教马骥等反对驱逐帝国主义分子出境","type":"title"},{"text":"【甘肃记者组讯】平凉专区最近准备驱逐天主教平凉教区西班牙籍主教高金鉴、神甫桑成桢、修士祁孔有等帝国主义分子，教内中国籍上层分子公开反对，拉拢落后教徒进行活动，反动气焰相当嚣张。","type":"paragraph"},{"text":"四月十日，平凉专区将准备好的帝国主义分子罪行展览会材料举行内部预展，天主教代主教马骥、神甫李青蕾闻息后即向工作组提出：高金鉴是他们的神长，驱逐出境是政府的事情，他们不能参加；如若参加就是违背教义。他们说：革新是反神长，反帝彻底就是要神甫娶老婆，要教友背教。并公开在经堂上对教友讲：驱逐帝国主义分子不能参加，更不能控诉；教会里只有主教、神甫，那有帝国主义分子。全世界有五万万教友，怕什么。马骥说：“假若政府认为我反动，那就法办我好了；画展画我们的祭衣那是侮辱教会、破坏教会；今后要叫我再说帝国主义分子如何如何，那是永远不会有的事。”李青蕾说：“今天也反帝、明天也反帝，反到什么时候为止，还不如把教友们集合起来用机枪扫了来得快些。”","type":"paragraph"},{"text":"李青蕾是天主教平凉教区三自革新运动筹委会主任委员，他在一九五一年十二月筹委会成立前后，要求向政府靠拢，表现尚好。他曾发表书面谈话，号召并发起天主教徒签名革新，开展反帝爱国运动，领导教徒进行学习和改造思想(与帝国主义割断联系)，有一定成绩。但他于一九五二年先后到兰州三次，受到天主教兰州教区主教张守忠的几次打击(骂他背教，不接见他)，因而返平凉后思想起了变化，逐渐走向反动。最近听说要驱逐帝国主义分子高金鉴等后，李青蕾、马骥等即大施活动，并以五名主教、神甫为主，拉拢部分落后教徒(共约十余人)准备喊堂，要向“天主”说明他们过去参加反帝爱国运动是“错误”，他们今后再不反帝了。李青蕾并要求解除他筹委会主任委员职务。","type":"paragraph"},{"text":"平凉市共有二一九名天主教徒，在工作组领导教育下大部分觉悟较高的教徒不满意这些上层分子的反动措施，他们准备：一旦教首们实行喊堂，他们即实行反喊堂，说明过去进行反帝爱国和革新运动是对的，没有错误。","type":"paragraph"},{"text":"产生上述情况的客观原因是外界(如兰州、陕西等地)天主教反动势力的影响。但从当地主观工作上来看还存在着如下几个缺点：一、对下层教徒教育工作作的不够深入，有些教徒存在两面态度，一面向我工作组反映情况，一面又向宗教上层人物报告我们的工作情况。二、对上层人物的争取、稳定工作作的特别差，如李青蕾在兰州受到反动势力打击后，思想早有变化，我们没有很好的进行说服教育工作，稳定情绪；我们准备驱逐帝国主义分子工作，未充分利用三自革新筹委会，形成了工作组单干；上层人物害怕要他们在驱逐帝国主义分子大会上讲话，我们未解除他的思想顾虑。三、对处理帝国主义分子问题拖的时间太长，使他们感觉麻烦，增加了他们的思想顾虑。","type":"paragraph"},{"text":"五月五日，平凉地委召集会议研究了上述情况，确定如下对策：一、继续深入发动教徒群众，作好反帝爱国教育工作，如果上层分子要实行喊堂，教友们即实行反喊堂；二、由地委宣传部长负责作好团结、稳定上层人士工作；三、发挥三自革新筹委会的作用，争取筹委会参加驱逐帝国主义分子工作，上层人物能否在大会上讲话，取决于我们的工作，不应强求，但必须解除他们的思想顾虑。","type":"paragraph"},{"text":" (延晓)","type":"paragraph"}],"comments":[],"origin":"1953年5月21日新华通讯社编《内部参考》。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7bbf7bd15c"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
