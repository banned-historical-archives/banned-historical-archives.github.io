script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"吴泾热电厂党委中心学习组讨论资产阶级就在共产党内问题增强了把批邓斗争进行到底的决心","authors":[],"dates":[{"year":1976,"month":7,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　上海吴泾热电厂党委中心学习组认真学习毛主席的重要指示，讨论了“资产阶级就在共产党内”这一问题，进一步增强了同党内资产阶级斗，把批邓、反击右倾翻案风斗争进行到底的决心。"},{"type":"paragraph","text":"毛主席指出:“社会主义革命革到自己头上了，合作化时党内就有人反对，批资产阶级法权他们有反感。搞社会主义革命，不知道资产阶级在哪里，就在共产党内，党内走资本主义道路的当权派。走资派还在走。”这个厂的党委中心学习组同志经过反复认真学习，深深感到毛主席的这一光辉指示，科学地总结了国际、国内阶级斗争的经验，深刻地分析了社会主义时期阶级关系的变化和阶级斗争的特点，提出了资产阶级就在共产党内的科学论断，发展了马克思列宁主义，为我们在无产阶级专政下的继续革命进一步指明了方向，意义非常深远。为了加深对资产阶级“就在共产党内”这一科学论断的理解，他们进一步学习了列宁的《苏维埃政权的当前任务》，毛主席的《在中国共产党第七届中央委员会第二次全体会议上的报告》等七篇光辉著作，重温了毛主席关于文化大革命的一系列重要指示，从理论和实践的结合上弄清楚资产阶级就在共产党内的问题。"},{"type":"paragraph","text":"这个厂的党委中心学习组首先把党内外的资产阶级加以对照，分析党内外资产阶级的共同特征，找出他们的共同点和不同点:(一)党内外的资产阶级妄图变公有制为私有制的贪婪本性是一样的，但党内走资派的贪婪野心比党外资产阶级更大，他们利用窃取的权力，无偿地占有工人、农民的劳动成果，把社会主义所有制变为资本主义所有制。三反、五反运动中揭发出来的刘青山、张子善，就是党内资产阶级的代表人物。(二)党内外资产阶级搞复辟、倒退的反动本性是一样的，而党内资产阶级搞起复辟来，比党外的资产阶级更厉害，手段更毒辣，危害更大。(三)党内外的资产阶级压制和破坏群众运动的毒辣手段是一样的。而党内的资产阶级对群众运动更是百般仇恨，干尽压制、破坏之能事。合作化时，邓小平伙同刘少奇大砍合作社。文化大革命中，他又伙同刘少奇推行资产阶级反动路线，实行白色恐怖。在反击右倾翻案风的斗争中，邓小平不仅拒不接受亿万革命人民对他的批判，还一手挑起天安门广场的反革命政治事件。"},{"type":"paragraph","text":"在学习中，他们还分析了党内资产阶级产生的根源。伟大导师列宁在《全俄中央执行委员会会议》一文中指出:资产阶级“旧的一代被清除了，而在这块土壤上还会不断产生新的一代，因为这块土壤过去产生过、现在还在产生许许多多资产者。”(《列宁全集》第27卷，第275页)学习了列宁的这段论述，同志们说:资产阶级的思想影响和孔孟之道，是党内产生资产阶级的思想根源；社会上存在的资产阶级和没有改造好的地、富、反、坏、右，是党内产生资产阶级的社会基础；资产阶级法权的存在，是党内产生资产阶级的重要经济基础。因此，我们一定要在政治思想和经济领域内坚持社会主义革命，加强无产阶级专政。毛主席最近指出:“不斗争就不能进步。”“八亿人口，不斗行吗?!”大家表示:走资派还在走，无产阶级就要永远斗，我们要树立长期作战的思想，把无产阶级专政下的继续革命进行到底!"},{"type":"paragraph","text":"(本报通讯　员)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"限制资产阶级法权","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"58e9cf1f86"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
