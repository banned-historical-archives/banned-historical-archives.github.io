" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"“党委的变质不可避免”","authors":["北京地质勘探学院","李亚铃","杨大美","梁燕瑜"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"“党委的变质不可避免”","type":"title"},{"text":"北京地质勘探学院杨大美李亚铃梁燕瑜","type":"authors"},{"text":"杨大美说：","type":"paragraph"},{"text":"“三反五反时有的党员变质，我院党委的变质亦不可避免。”","type":"paragraph"},{"text":"李亚铃几次的说：","type":"paragraph"},{"text":"“为什么多年的老干部还犯严重的错误，我院党委差不多都变了质。”","type":"paragraph"},{"text":"梁燕瑜（化名：也马）说：","type":"paragraph"},{"text":"“是的，中国共产党在抗日战争，解放战争，抗美援朝战争中立了不世之功。在社会主义建设事业中也取得了很大的成绩。然而胜利冲昏了头脑，一些党员的头脑开始膨胀起来了，我院的一些党员的官僚主义、主观主义、宗派主义风行起来了，以至裙带风、贪污腐化、调戏妇女的罪恶漫天的事也出现了。特别是对待高级知识分子采取了几乎是收买利用的手段——我给你钱，再封你‘官’，你要很好地给我工作，知识分子就是爱面子……”。这些事实被人感到“如在国民党的统治时代一样。这又有什么奇怪呢！？”","type":"paragraph"},{"text":"“革命有文化革命，有工业革命，有思想意识的革命，以及人们所自然地了解的这个阶级推翻那个阶级的革命。犯了错误轻则批评，重则来个整风、改革、革新，更严重时为什么不可以来个革命呢？”","type":"paragraph"}],"comments":[],"origin":"北京地质勘探学院党委会宣传部编《社会主义教育参考资料第二编：右派言论汇编》，1957年10月5日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0715c136af"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
