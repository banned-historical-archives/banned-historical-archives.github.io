" crossorigin="">{"props":{"pageProps":{"books":[{"id":"0bbdba91-48e9-4148-9ec2-38bf6792cca7","name":"自然辩证法（人民出版社1971年版）","internal":false,"official":true,"type":"pdf","author":"恩格斯，人民出版社1971年版","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives4/main/0bbdba91-48e9-4148-9ec2-38bf6792cca7.pdf"],"article":{"title":"札记和片断 - 化学","alias":"","parts":[{"type":"paragraph","text":"[化学]"},{"type":"paragraph","text":"十"},{"type":"paragraph","text":"W"},{"type":"paragraph","text":"关于实在的化学上一致的物质的观念一不管它多么古老一是和直到拉瓦锡时还广泛流传的幼稚见解完全一致的，这种幼稚见解认为：两个物体的化学亲和力，是基于它们每个都含有一个共同的第三物体（柯普《发展》第105页）246。"},{"type":"paragraph","text":"常"},{"type":"paragraph","text":"*"},{"type":"paragraph","text":"*"},{"type":"paragraph","text":"旧有的、方便的、适合于过去流行的实践的方法，怎样移到其他领域中并且在那里变成障碍：在化学中，有化合物成分的百分率计算法，它是掩盖化合物的定比和倍比定律的最好不过的方法，它也确实相当长时期地掩盖了这个定律。"},{"type":"paragraph","text":"*"},{"type":"paragraph","text":"*"},{"type":"paragraph","text":"*"},{"type":"paragraph","text":"化学中的新时代是随着原子论开始的（所以，近代化学之父不是拉瓦锡，而是道尔顿），相应地，物理学中的新时代是随着分子论开始的（是从运动形式互相转化的发现开始的，这在形式上虽然不同，但在本质上不过是这一过程的另一个方面）。新的原子论和所有已往的原子论的区别，在于它不主张（撤开蠢才不说）物质只是非连续的，而主张各个不同阶段的各个非连续的部分（以太原子、化学原子、物体、天体）是各种不同的关节点，这些关节点决定一般物质的各种不同的质的存在形式一直到失重和排厅的形式。"},{"type":"paragraph","text":"常"},{"type":"paragraph","text":"米"},{"type":"paragraph","text":"*量到质的转化：最简单的例子是氧和臭氧，在这里2：3引起了二者甚至在气味方面的一些完全相异的属性。化学也只用分子中原子数目的不同去说明其他的同素异性体。"},{"type":"paragraph","text":"半"},{"type":"paragraph","text":"名称的意义。在有机化学中，一个物体的意义以及它的名称，不再仅仅由它的构成来决定，而更多地是由它在它所隶属的系列中的位置来决定。因此，如果我们发现了某个物体属于某个这样的系列，那末它的旧名称就变成了理解的障碍，而必须代之以表明这个系列的名称（烷烃等等）。"}],"authors":["恩格斯"],"dates":[{"year":1873},{"year":1883}],"is_range_date":true,"comments":[],"comment_pivots":[],"description":"","page_start":275,"page_end":276},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b2fb16c876"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
