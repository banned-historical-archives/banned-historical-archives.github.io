" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoistlegacy.de-2465","name":"上海市人民政府落实私房政策领导小组办公室关于请部队做好清退私房中的维修、租金结算等问题的通知","author":"上海市人民政府落实私房政策领导小组办公室","internal":false,"official":false,"type":"unknown","files":[],"article":{"title":"上海市人民政府落实私房政策领导小组办公室关于请部队做好清退私房中的维修、租金结算等问题的通知","dates":[{"year":1982,"month":8,"day":16}],"is_range_date":false,"authors":["上海市人民政府落实私房政策领导小组办公室"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"上海市房屋土地管理局上海市房地产业协会, 上海房地产管理文件汇编(1949-1997)下卷, 2033","tags":[{"name":"房地产","type":"主题/事件"},{"name":"挤占","type":"主题/事件"},{"name":"私房","type":"主题/事件"},{"name":"退还退赔","type":"主题/事件"}],"parts":[{"type":"title","text":"上海市人民政府落实私房政策领导小组办公室关于请部队做好清退私房中的维修、租金结算等问题的通知"},{"type":"subtitle","text":"沪府私房落政（1982）25号"},{"type":"paragraph","text":"驻沪各部队："},{"type":"paragraph","text":"遵照中共中央、国务院、中央军委关于认真清退十年内乱中部队占用私人房屋的指示，驻沪各部队正在积极清退私房，到目前已归还一批。为了进一步发扬我军拥政爱民的光荣传统，严格执行三大纪律八项注意，在清退私房中，有三个具体问题需请你们妥善解决。"},{"type":"paragraph","text":"一、关于私房维修问题。"},{"type":"paragraph","text":"目前部队清退的私房，大部分已使用十几年，有的保养较好，有的年久失修，破损严重。为认真搞好清退私房的维修工作，请你们按一九七九年二月二十六日总政治部《关于清退和处理部队占用私人房屋的通知》中有关精神办理，即“处理好退还中的一些具体问题，做好工作，注意留下好的影响。退还中，对于需要维修的房屋，要进行维修；原固定设备不得动用；损坏的要给以修复和赔偿”。为此，我们意见：如果部队维修有困难，可委托房管部门或有关修理房屋单位代修，修理费用由部队负责支付，修理范围事先进行协商。如果房主要求进行大修理，大修费用可由部队和房主协商，双方合理分摊。"},{"type":"paragraph","text":"二、 关于私房租金等有关费用结算问题。"},{"type":"paragraph","text":"十年内乱中，本市有关部门将被非法挤占、没收产权的部分私房，调拨给驻沪部队使用，长期不付房租，由部队自管自修。现落实政策按规定应给房主适当经济补偿。补偿办法：由房管部门按有关规定计算部队应支付的历年房租，减去部队使用期间支出的修理、养护等有关费用，二者结算的差额，由部队承担，多退少补。"},{"type":"paragraph","text":"三、 关于私房作价收购问题。"},{"type":"paragraph","text":"在落实私房政策中，凡房主自愿将部队占用的私房出售的，应由部队负责另行安排房主的住房后，原私房由部队出资收购。收购手续由房管部门代办。"},{"type":"paragraph","text":"以上这些问题，驻沪有些部队借故经费无法开支，没有及时维修与结算，房主意见很大，有的反映到国外，影响我军声誉。为此，希望驻沪部队必须认真妥善处理这一问题。如有困难，应及时报告部队上级机关帮助解决。"},{"type":"paragraph","text":"一九八二年八月十六日"}],"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4918b03085"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
