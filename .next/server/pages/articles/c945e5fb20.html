script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"翻身农奴誓夺粉碎“四人帮”后第一个丰收年  西藏结巴公社春耕生产起热潮","authors":[],"dates":[{"year":1977,"month":4,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"翻身农奴誓夺粉碎“四人帮”后第一个丰收年"},{"type":"paragraph","text":"西藏结巴公社春耕生产起热潮"},{"type":"paragraph","text":"据新华社拉萨电　西藏乃东县结巴公社党支部紧紧抓住深揭猛批“四人帮”这个纲，带领广大翻身农奴掀起春耕生产热潮。"},{"type":"paragraph","text":"结巴公社是西藏农业学大寨的一个先进单位。几年来，这个公社的党支部不听“四人帮”那一套，始终坚持开展党的基本路线教育，发扬穷棒子精神，引导社员大批修正主义，大批资本主义，大干社会主义，在农业学大寨的道路上三年迈出三大步。一九七四年全社粮食单产跨了《纲要》，一九七五年过了“黄河”，一九七六年又跃过了“长江”。今年，广大翻身农奴满怀打倒“四人帮”的胜利喜悦，决心更上一层楼，夺取新丰收，以实际行动贯彻落实华主席提出的抓纲治国的战略决策。春耕季节一到，全社干部带头战斗在生产第一线。青年、民兵人人打先锋，发挥了突击队作用。一些老贫农主动当参谋。广大社员每天早出工，晚收工，从二月中旬以来，已经把全社一千二百多克（克相当于亩）冬小麦松了一遍土，施了一次肥，大都灌了一遍水，并且套种了一百三十克豌豆。结巴公社的田野里，到处呈现出一派人欢马叫闹春耕的动人景象。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"name":"西藏文革","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c945e5fb20"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
