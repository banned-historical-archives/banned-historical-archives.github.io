<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"在毛主席革命路线指引下自力更生艰苦奋斗我国治理盐碱地取得显著成绩","authors":[],"dates":[{"year":1971,"month":12,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社北京二十三日电　在毛主席革命路线指引下，我国盐碱地区的广大干部和群众，发扬自力更生、艰苦奋斗的革命精神，坚持治理盐碱地，取得了显著成绩。据盐碱较严重的河北、山东、安徽等省的统计，解放前遗留下来的盐碱地，目前已有一半左右得到了改造，有的省的次生盐碱地已全部得到治理。许多过去是白茫茫的不毛之地，如今粮棉连年获得丰收。"},{"type":"paragraph","text":"我国盐碱地主要分布在淮河北部地区、华北平原、东北西部平原以及西北内陆平原和盆地。其中有百分之七十以上分布在盛产粮棉的黄河、淮河、海河流域。解放前，国民党反动派根本不管人民的死活，不仅对盐碱地不进行改造，对河流不予治理，而且横加破坏，使盐碱地面积越来越大，盐碱程度越来越严重，严重影响农业生产的发展。"},{"type":"paragraph","text":"解放以后，在伟大领袖毛主席和党的英明领导下，我国农村广大贫下中农走上了社会主义的集体化道路，盐碱地区的广大人民群众依靠集体的力量，运用自己长期在与自然灾害作斗争中积累起来的丰富经验，展开了大规模的治理盐碱地的工作。广大人民群众从实践中认识到，盐碱是在一定的气候、地形、地下水状况、土质和耕作方式等综合条件下形成的。他们首先抓住治水这一根本，把治水和治理盐碱有机地结合起来。处于黄河下游的河南、山东两省的人民群众，对旧社会遗留下来的黄河的残缺堤防不断加高培厚，增加抗洪能力，使解放前三年两决口的黄河，在解放后二十多年来从未发生过决口。沿河地区人民运用辩证唯物主义的观点，一分为二地分析和对待黄河水含沙量大的利弊，避其害而用其利，引黄灌溉，放淤造田。河南新乡地区人民，一面排除内涝，一面利用黄河淤泥造田，改造沙荒，利用黄河水灌溉碱地，使历史上的老沙荒碱滩，大部分得到治理，不少已成为高产稳产田。"},{"type":"paragraph","text":"十几年来，特别是无产阶级文化大革命以来，河北、山东等省每年都出动数百万干部、社员，大搞水利建设。他们开挖新河道，拓宽加深旧河道，大大提高了海河、淮河的排涝泄洪能力，降低了地下水位，使盐碱地面积不断缩小。近几年来，过去每年要从外地调进粮食的河北、山东、河南三省，由于盐碱地的大面积治理，农业生产得到迅速发展，已初步实现粮食自给。"},{"type":"paragraph","text":"修筑台田，开沟治碱，是盐碱地区人民总结出来的一种行之有效的方法。安徽省淮河北部平原有四百万亩盐碱地。文化大革命以来，这里的广大群众在省委和省革委会的领导下，大力治理盐碱地。他们在盐碱地上开深沟排去沥水，筑土台抑制返碱，加快淋洗脱盐，使盐碱地普遍得到了治理。一九七○年，这一地区的粮食产量比解放初的一九四九年增长近两倍，今年又比去年有新的增长。"},{"type":"paragraph","text":"一些盐碱地区还总结出了开沟播种，深播浅盖土的办法，躲过碱害，获得了较好的效果。"},{"type":"paragraph","text":"许多盐碱区人民群众还采用引淡水洗碱、深耕施有机肥、旱地改水田等方法，也有效地治理了盐碱灾害。"},{"type":"paragraph","text":"在根治盐碱地的斗争中，各地人民群众坚持“自力更生”、“艰苦奋斗”的革命精神，因地制宜地制定治理盐碱的方案和措施，自己筹集资金和物资，自己制造工具，加快了治理盐碱地的速度。目前，各地人民群众正遵照毛主席关于“要认真总结经验”的教导，总结过去治碱斗争的经验，以便更快地把盐碱地治理好，为社会主义革命和社会主义建设作出更大的贡献。"},{"type":"paragraph","text":"\u003cIMG alt=请插入6号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1971\\12\\71cp010201.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e新疆军区生产建设兵团农七师某团的广大军垦战士，掀起“农业学大寨”的新高潮，把昔日的盐碱滩，改造成为稳产高产田，夺得了粮棉双丰收。这是军垦战士在晒新棉。　新华社记者摄\u003c/FONT\u003e"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"河北文革","type":"人物"},{"name":"河南文革","type":"人物"},{"name":"山东文革","type":"人物"},{"name":"安徽文革","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4f11627d2e"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
