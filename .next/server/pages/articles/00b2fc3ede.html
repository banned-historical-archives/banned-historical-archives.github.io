<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji16","name":"毛泽东全集第16卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji16.pdf"],"article":{"title":"反对主观主义和宗派主义","alias":"","parts":[{"type":"paragraph","text":"反对主观主义和宗派主义！"},{"type":"paragraph","text":"（1941年9月10日）"},{"type":"paragraph","text":"过去我们的党很长时期为主观主义所统治，立三路线和苏维埃运动后期的“左”倾机会主义都是主观主义。苏维埃运动后期的主观主义表现更严重，它的形态更完备，统治时间更长久，结果更悲惨。这是因为这些主观主义者自称为“国际路线”，穿上马克思主义的外衣，是假马克思主义。"},{"type":"paragraph","text":"在苏维埃运动后期，五中全会的精神，提倡搞社会主义革命，否认革命发展不平衡，认为当时的斗争是两条道路的决战。这些都比立三路线的“左”倾在政治上表现得更完备。"},{"type":"paragraph","text":"在军事上，立三路线尚未完全影响苏区，而苏维埃运动后期的“左”倾机会主义则完全影响苏区，使红军遭受更大的失败。"},{"type":"paragraph","text":"在组织上，苏维埃运动后期打击干部、胡乱肃反等等，比立三路线更厉害。"},{"type":"paragraph","text":"主观主义者提出不合实际情况的任务，如要求扩大百万红军、进攻中心城市等。"},{"type":"paragraph","text":"一九三二年到一九三五年十二月共三年多的党的路线，尚未作[1]这是毛泽东在中共中央政治局扩大会议上的讲话。[2]指1934年1月召开的中共六届五中全会。"},{"type":"paragraph","text":"一九三二年五月十一日苏区中央局的决议\"，是完全主观主义的东西。"},{"type":"paragraph","text":"一九三三年反邓、毛、谢、古“右倾机会主义”的一篇文章，实际上是指鸡骂狗的。当时认为“罗明路线”③在福建，在江西，在建黎泰，整个中央苏区都弄成是“罗明路线”。这篇反“罗明路线”的纲领性的文章，认为江西“罗明路线”的主要错误是：（一）取消反帝运动，（二）放弃苏区，（三）富农路线，（四）官僚主义。"},{"type":"paragraph","text":"遵义会议，实际上变更了一条政治路线。过去的路线在遵义会"},{"type":"paragraph","text":"[1]指《苏区中央局关于领导和参加反对帝国主义进攻苏联瓜分中国与扩大民族革命战争运动周的决议》。"},{"type":"paragraph","text":"[2]邓，指邓小平，1932年冬任中共会昌中心县委书记，1933年3月任中共江西省委宣传部部长。毛，指毛泽覃，1931年6月任永（丰）、吉（安）、太（和）中心县委书记，1933年3月任中共苏区中央局秘书长。谢，指谢唯俊（1908—1935），湖南耒阳人，1933年3月任江西省军区第二军分区司令员兼独立第五师师长。古，指古柏（1906—1935)，江西寻乌人，1933年3月任江西省苏维埃政府委员、裁判部长和党团书记。1933年3月他们被指责为“江西罗明路线的创造者”，后受到撤职等处分。"},{"type":"paragraph","text":"[3]罗明（1901—1987)，广东大埔人。1933年在担任中央革命根据中共福建省委代理书记时，曾因提出闽西上杭、永定等根据地边缘地区的作条件比较困难，党的政策应当不同于根据地的巩固地区，而受到党内”倾领导者的打击。当时这些领导者把他的意见错误地说成是“悲观失望“机会主义的、取消主义的逃跑退却路线”，并且开展了所谓“反对罗明线的斗争”。[4]建黎泰，指福建的建宁、泰宁和江西的黎川。当时在这里建有中共飘县委。议后，在政治上、军事上、组织上都不能起作用了，但在思想上主观主义的遗毒仍然存在。"},{"type":"paragraph","text":"六中全会\"对主观主义作了斗争，但有一部分同志还存在着主观主义，主要表现在延安的各种工作中，在延安的学校中、文化人中，都有主观主义、教条主义。这种主观主义同实事求是的马克思主义是相对抗的。它的来源是："},{"type":"paragraph","text":"（一）中国的传统，“左”的传统。"},{"type":"paragraph","text":"（二）外国的传统，过去共产国际如布哈林、季诺维也夫等人的影响。"},{"type":"paragraph","text":"（三）中国是科学不发达的、存在广大小资产阶级的国家。现在，延安的学风存在主观主义，党风存在宗派主义。克服这些不正之风的办法是："},{"type":"paragraph","text":"（一）要认识主观主义的严重性。延安处在和平环境的后方，主观主义表现严重，但在全国也存在着主观主义。"},{"type":"paragraph","text":"（二）要分清创造性的马克思主义和教条式的马克思主义。（三）宣传创造性的马克思主义。"},{"type":"paragraph","text":"（四）我们反对主观主义，是为着提高理论，不是降低马克思主义。我们要使中国革命丰富的实际马克思主义化。"},{"type":"paragraph","text":"（五）对于理论脱离实际的人，提议取消他的“理论家”的资格。只有用马克思主义观点来研究实际问题、能解决实际问题的，"},{"type":"paragraph","text":"[1]指1938年9月29日至11月6日召开的中共六届六中全会。"},{"type":"paragraph","text":"[2]布哈林（1888—1938）、季诺维也夫（1883—1936)，曾是共产国际的主要领导人。自1913年3月共产国际成立至1926年11月，季诺维也夫任共产国际执行委员会主席，布哈林任共产国际执行委员会委员。1926年11月至1929年4月，布哈林接任共产国际执行委员会主席。才算实际的理论家。斯大林说，脱离实际的理论是空洞的理论\"。我认为空洞的理论是荒谬绝伦的理论。"},{"type":"paragraph","text":"对研究实际问题的文章，要多给稿费。能使马克思主义中国化的教员，才算好教员，要多给津贴。"},{"type":"paragraph","text":"（六）宗派主义现在也有。在延安，首长才吃得开，许多科学家、文学家都被人看不起。宗派主义是排挤非党干部的一种风气，即排外主义。同时也排内。闹独立性、不服从决议、没有纪律的现象，必须整顿。"},{"type":"paragraph","text":"路线是“王道”，纪律是“霸道”，这两者都不可少。"},{"type":"paragraph","text":"过去卫生部门一个负责人违反对专家的政策，本位主义，违反共产主义道德，所以被撤职。"},{"type":"paragraph","text":"（七）对宗派主义、本位主义，必须从原则上开展斗争。要实行两条路线的斗争，反对主观主义和宗派主义，反对教条主义和事务主义。"},{"type":"paragraph","text":"（八）报纸上要多登文章，奖励辩证唯物论的文章，反对主观主义的文章。"},{"type":"paragraph","text":"（九）实行学制的改革，把过去的一套彻底打碎。研究马、恩、刿、斯的思想方法论，以《联共党史》为学习的中心，多看反对观主义的言论。组织思想方法论的研究组，首先从政治局同志做起。以思想、政治、政策、军事、组织五项为政治局的根本业务。政治要注意时局动向，中央委员必须增加政治知识。军事是目前战时必须研究的业务。[1]参见斯大林《论列宁主义基础》第三部分。"},{"type":"paragraph","text":"（十）要用分析的方法来解决问题。这是过去资产阶级提出的科学方法，但还要综合。我们要用分析和综合的方法，从整个事物中抽出问题来作分析，再加以综合。"},{"type":"paragraph","text":"（十一）研究六大至七大的中央决议。"},{"type":"paragraph","text":"中央研究组一方面研究马克思主义的思想方法论，一方面研究六大以来的决议，毛泽东为组长，王稼祥为副组长。"},{"type":"paragraph","text":"（十二）教育委员会（以洛甫\"为首）的工作，先进行调查，再进行改革。"},{"type":"paragraph","text":"（十三）延安开一个动员大会，中央政治局同志全体出马，大家都出台讲话，集中力量反对主观主义和宗派主义。"},{"type":"paragraph","text":"（十四）打倒两个主义，把人留下来。反对主观主义和宗派主义，把犯了错误的干部健全地保留下来。"},{"type":"paragraph","text":"（十五）电告少奇、恩来，征询他们的意见。"},{"type":"paragraph","text":"（十六）实行全党动员，除增强党性决定、调查研究决定外，再写些文章。"},{"type":"paragraph","text":"[1]洛甫，即张闻天，当时任中共中央书记处书记兼中央宣传部部长。"},{"type":"paragraph","text":"[2]指1941年7月1日《中共中央关于增强党性的决定》和1941年8月1日《中共中央关于调查研究的决定》。"}],"authors":["毛泽东"],"dates":[{"year":1941,"month":9,"day":10}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":226,"page_end":230},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"00b2fc3ede"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
