<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"来一个动员  宝鸡县广大革命群众和干部欢呼毛主席最新指示发表纪实","authors":[],"dates":[{"year":1968,"month":12,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"来一个动员"},{"type":"paragraph","text":"宝鸡县广大革命群众和干部欢呼毛主席最新指示发表纪实"},{"type":"paragraph","text":"二十一日晚上，红色电波传来了我们伟大领袖毛主席的声音：“知识青年到农村去，接受贫下中农的再教育，很有必要。要说服城里干部和其他人，把自己初中、高中、大学毕业的子女，送到乡下去，来一个动员。各地农村的同志应当欢迎他们去。”宝鸡县立即沸腾起来了，从县城到广大农村山区一片欢腾。广大工人、农民、干部、学生、居民纷纷上街游行，热烈欢呼毛主席最新指示的发表。直到深夜，各机关、单位还在开会，认真学习和讨论毛主席的最新指示，人人向毛主席表忠心。各公社、大队组织宣传队连夜到贫下中农家中宣传，使毛主席的最新指示家喻户晓。"},{"type":"paragraph","text":"领导干部起带头作用"},{"type":"paragraph","text":"贯彻落实毛主席最新指示，要雷厉风行。游行回来，县革委会常委扩大会便开始了。与会的十多个同志认真学习、讨论了毛主席最新指示的伟大意义，研究了贯彻落实的措施。同志们说，毛主席指示初中、高中、大学毕业的学生都到农村去，接受贫下中农的再教育，这是培养无产阶级革命事业接班人的根本途径，是毛主席他老人家对青年一代的最大关怀！同志们都说：学习、落实毛主席的最新指示就要往高处站，往远处看，看到共产主义的未来！"},{"type":"paragraph","text":"毛主席最新指示的光辉照亮了大家的心。革委会的同志们一致认为，落实毛主席的最新指示，干部要起带头作用，要把自己留在城镇中“吃闲饭”的家属、子女尽先送到农村去，这才是忠于毛主席，忠于人民的表现，才能很好地说服城里的干部和其他人，把自己的子女送到农村去。县革委会主任表示：要把自己一家七口人很快地动员到农村去，成为有社会主义觉悟的劳动者。"},{"type":"paragraph","text":"会上，个个争着向毛主席表忠心，整个革委会领导成员都动员起来了。"},{"type":"paragraph","text":"“毛主席的最新指示给我们指明了方向，我们也不在镇上吃闲饭。”这是宝鸡县城广大居民听到毛主席最新指示后的普遍反映。居民们敲锣打鼓欢腾了一个晚上之后，第二天上午一百多个居民小组都召开会议，学习座谈毛主席最新指示的伟大意义。许多居民小组的学习会实际上成了表决心会，学生家长们纷纷表示，坚决听毛主席的话，马上把自己的子女送到农村去；有的家长还表示要同自己的子女一道去农村安家落户。很多居民听了毛主席的最新指示后，开了家庭会，商量全家到农村去安家落户。他们认为留在城镇吃闲饭，是给国家和人民增加负担。不少居民小组经过热烈讨论之后，积极到县革委会去表决心，送喜报。有的决心集体上山下乡；有的把报名上山下乡的知识青年和居民的名单报送县革委会。他们说：“我们也有两只手，不在镇上吃闲饭。”"},{"type":"paragraph","text":"这是对贫下中农最大的信任"},{"type":"paragraph","text":"毛主席的最新指示广播刚结束，县革委会办公室、县知识青年安置办公室的电话就响个不停。各社、队纷纷向县革委会汇报广大贫下中农、在乡知识青年听了毛主席的最新指示后，欢欣鼓舞，迅速掀起了学习、宣传、贯彻、落实最新指示热潮的情况。广大贫下中农听到毛主席的声音，万分激动地说，毛主席他老人家说：“知识青年到农村去，接受贫下中农的再教育，很有必要。”这是对我们贫下中农最大的信任。"},{"type":"paragraph","text":"广大上山下乡的知识青年听到毛主席的最新指示后，一片欢腾，齐声高呼：毛主席万岁！毛主席万万岁！知识青年陈林说：“我来到山区安家落户后，曾一度不愿过艰苦生活，想过三年就走。毛主席的最新指示给我指出了前进的方向。我决心走毛主席指引的革命道路，一辈子扎根农村。”"},{"type":"paragraph","text":"在毛主席最新指示的鼓舞下，各社、队纷纷打电话向县革委会要求给他们派送更多的知识青年去。广大贫下中农说，毛主席把知识青年交给我们进行再教育，我们一定要把他们培养成“完全”、“彻底”为人民服务的人。"},{"type":"paragraph","text":"从领导到群众，从城镇到乡村，整个宝鸡县行动起来了。县革委会计划召开一系列会议进一步学习、宣传、落实毛主席的最新指示，并且成立了专门机构。决心来一个大动员，把全县少数还没有安置的知识青年，外地分配来的知识青年以及在城镇无职业的居民都妥善地安排到农村去。"},{"type":"paragraph","text":"本报通讯员　本报记者"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上山下乡","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"17191b065b"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
