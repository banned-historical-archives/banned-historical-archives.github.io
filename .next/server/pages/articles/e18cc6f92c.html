script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"一些非洲国家元首在非洲统一组织首脑会议闭幕会上讲话  强调非洲国家团结起来加强民族解放斗争  表示坚决反对帝国主义的经济掠夺和剥削，维护民族经济权益","authors":[],"dates":[{"year":1974,"month":6,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"一些非洲国家元首在非洲统一组织首脑会议闭幕会上讲话"},{"type":"paragraph","text":"强调非洲国家团结起来加强民族解放斗争"},{"type":"paragraph","text":"表示坚决反对帝国主义的经济掠夺和剥削，维护民族经济权益"},{"type":"paragraph","text":"新华社摩加迪沙一九七四年六月十六日电　一些非洲国家元首六月十六日在非洲统一组织第十一届国家和政府首脑会议闭幕会上的讲话中，强调非洲国家团结起来，加强反对帝国主义、殖民主义和种族主义的民族解放斗争，并且表示决心为反对帝国主义的经济掠夺和剥削，维护民族经济权益而斗争。"},{"type":"paragraph","text":"非洲统一组织本届会议主席、索马里最高革命委员会主席西亚德·巴雷在主持闭幕式时说：“几天来，我们广泛地交换了意见，讨论了对我们的大陆十分重要的问题。”他要求把这些意见变为具体行动，去开展民族解放斗争，加强非洲和阿拉伯的团结、经济和社会合作以及加强非洲统一组织秘书处的工作。"},{"type":"paragraph","text":"尼日利亚国家元首雅库布·戈翁将军说，非洲乃至世界“都期望我们提出精辟的意见和制订出现实的计划，以加速非洲在政治、经济和文化上的解放，改善我们各国人民大众的命运。我们千万不要辜负他们的期望”。戈翁将军强调非洲统一的重要性。他说：“到目前为止，我们这个组织之所以有力量是因为它内部团结和遵守它的章程。”"},{"type":"paragraph","text":"毛里塔尼亚总统乌尔德·达达赫说，本届会议“又向前迈出了重要的一步”，因为会议在使非洲大陆摆脱殖民主义、种族主义和种族隔离以及非洲人民与阿拉伯人民之间的团结和合作等重大问题上作出了决定。他表示坚决支持阿拉伯人民和巴勒斯坦人民抗击以色列侵略的斗争。"},{"type":"paragraph","text":"达荷美共和国总统马蒂厄·克雷库在讲话中谴责帝国主义、殖民主义和南非种族主义。他表示坚决支持仍然处于殖民统治下的非洲人民争取解放的斗争。他说：“在这个时候，我们特别怀念为使我们的大陆摆脱帝国主义、殖民主义和种族歧视的统治而一直在进行斗争的非洲兄弟。”"},{"type":"paragraph","text":"他说：“我们借此机会热烈祝贺几内亚（比绍）同胞取得的辉煌胜利，并重申我们对他们的始终如一的积极的支持。”"},{"type":"paragraph","text":"达荷美总统在谈到非洲统一的问题时指出：“我们深信，只有在整个非洲实现了有效和完全独立的情况下，非洲的统一才能实现。”"},{"type":"paragraph","text":"乌干达总统阿明呼吁非洲国家团结起来，支持解放运动，解放整个非洲大陆。"},{"type":"paragraph","text":"他说：“为了实现真正的独立，非洲国家应该控制本国的民族经济。”他说，不可能出现下面的情况，即“你的国家在政治上是独立的，而经济却受到外来的帝国主义者和多国公司的控制”。"},{"type":"paragraph","text":"二十四位非洲国家元首、二位副总统、四位总理、一位副总理和十一位外交部长出席了本届会议。非洲解放运动的领导人以观察员身份出席了会议。柬埔寨王国民族团结政府外交大臣沙林察和越南南方共和临时革命政府外交部长阮氏萍也以观察员身份出席了会议。"},{"type":"paragraph","text":"会议决定非洲统一组织第十二届非洲国家和政府首脑会议将于一九七五年六月二十五日到三十日在乌干达首都坎帕拉举行。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e18cc6f92c"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
