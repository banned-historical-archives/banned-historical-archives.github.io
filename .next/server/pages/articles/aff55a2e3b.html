script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"勇斗党内走资派","authors":[],"dates":[{"year":1976,"month":7,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"勇斗党内走资派"},{"type":"paragraph","text":"去年九月的一天，党内最大的不肯改悔的走资派邓小平在一次会议上的“讲话”，传到了解放军新疆部队某部十二连。听完传达，干部和战士们便提出了疑问：以“三项指示为纲”，这与林彪鼓吹的“四好为纲”有什么两样？党支部围绕“究竟以什么为纲”的问题进行了认真的讨论。司务长于承夫说：“把发展经济也说成是纲，那么我们平时的施工、训练、搞生产和抓生活也都成纲了，这还怎么抓阶级斗争？！”连长温立仁联想起无产阶级文化大革命前邓小平追随刘少奇推行修正主义路线的罪行，尖锐地指出：“‘三项指示为纲’，实际提倡的还是"},{"type":"paragraph","text":"‘生产挂帅’。”"},{"type":"paragraph","text":"当时，五班远离连队，在某兵站听传达。当听到“雷锋叔叔不在了”这句黑话时，战士们气愤得听不下去，当即委托副班长高大银向领导汇报了他们的看法，得到了领导的支持。"},{"type":"paragraph","text":"在讨论时，战士江东汉指着邓小平的那个“讲话”说：“完全不合乎事实。”九班长陈楚泉说：“他这个东西，没啥讨论头！”于是，带着全班学习起毛主席著作来。副排长李海松说：“这个‘讲话’是给部队抹黑，是给文化大革命抹黑”。许多班向党支部谈了对邓小平那个“讲话”的看法。同志们坚定地说：“我们还是照毛主席说的办，抓好理论学习，坚持以阶级斗争为纲，坚决执行党的基本路线”。"},{"type":"paragraph","text":"去年，十二连指导员武洪文、连长温立仁在一次外出开会时，初次听到“三项指示为纲”的说法，就感到不对头。武洪文当即提出疑问：“现在有几个纲？”温立仁说：“纲多了就等于没纲了”。会议结束后，他们没有向干部、战士传达这个“三项指示为纲”；党支部在安排学习时，一直把重点放在学习毛主席关于阶级、阶级矛盾和阶级斗争的论述上，下功夫搞清楚对资产阶级专政的问题。党支部不管写文章，还是上报材料，做工作计划，都提以阶级斗争为纲，不提“三项指示为纲”。"},{"type":"paragraph","text":"十二连是所在部队的先进集体，他们的代表两次幸福地见到伟大领袖毛主席。这个连常年担负着繁重施工任务，流动性较大。但是，不管环境发生怎样的变化，任务多么繁重，干部、战士刻苦学习马克思主义，始终没有放松。从党的九届二中全会以来，全连干部普遍通读了中央规定的六本马列著作，通读了《毛泽东选集》一至四卷；绝大多数战士阅读了《共产党宣言》、《国家与革命》和《毛泽东选集》一至四卷。正是借助马克思主义这个政治上的望远镜和显微镜，大家的眼界宽阔了，目光敏锐了，提高了辨别路线是非的能力，看出了邓小平的罪恶用心。当前，他们正以毛主席关于反击右倾翻案风的重要指示为武器，勇猛地投入批邓、反击右倾翻案风的战斗。"},{"type":"paragraph","text":"本报通讯员"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"aff55a2e3b"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
