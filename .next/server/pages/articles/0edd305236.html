<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"要热情地支持革命的新干部","authors":["《文汇报》编辑部"],"dates":[{"year":1967,"month":11,"day":10}],"is_range_date":false,"parts":[{"text":"要热情地支持革命的新干部","type":"title"},{"text":"《文汇报》编辑部","type":"authors"},{"text":"编者按：文汇报《要热情地支持革命的新干部》一文，提出了当前无产阶级文化大革命中的一个重要问题，希望引起同志们的注意。","type":"paragraph"},{"text":"毛主席在最新指示中教导我们：“要很好地解决上下级关系问题，搞好干部和群众的关系。以后干部要分别到下面去走一走，看一看，要坚持群众路线，遇事多和群众商量，做群众的小学生。在某种意义上来说，最聪明、最有才能的，是最有实践经验的战士。”希望广大新、老革命干部，在当前大好形势下，都要坚决地贯彻执行毛主席的这个极其重要的指示，更高地举起毛泽东思想的伟大红旗，认真实行群众路线，以“斗私，批修”为纲，紧紧掌握斗争的大方向，为完成无产阶级文化大革命的伟大历史任务而斗争。","type":"paragraph"},{"text":"＊              ＊              ＊","type":"paragraph"},{"text":"无产阶级文化大革命的激流，把一大批革命的“小人物”推上了革命的领导岗位，进入了革命三结合的领导班子。这是毛主席的革命路线的一个伟大胜利，是文化大革命的丰硕成果。","type":"paragraph"},{"text":"有计划地培养大批革命的新干部，在革命的领导班子中不断地充实新的血液，这是毛主席的培养和造就千百万无产阶级革命事业接班人的伟大战略思想。毛主席教导我们：“我们党如果没有广大的新干部同老干部一致合作，我们的事业就会中断。”所以，在无产阶级文化大革命中建立革命三结合，不仅要实行革命群众、人民解放军和革命干部的革命三结合，还要实行老年人、中年人和青年人的结合。这一点做好了，我们的革命领导班子就会不断得到革命新生力量的充实，充满着战斗的活力。","type":"paragraph"},{"text":"对于新成长起来的革命干部，我们必须满腔热诚地支持他们，帮助他们。新干部是一支新生的革命突击队，他们由于缺乏斗争经验，可能在某些方面不能一下子就适应当前斗争的需要。但是，在斗争的实践中他们会迅速地增长才干，克服自己的弱点。如果我们不分主流和支流，对革命的新生力量抱着怀疑态度，挑剔责难，讥笑新的幼芽软弱，那就会犯方向的错误。其结果，正如列宁所指出：“这一切实际上是资产阶级反对无产阶级的阶级斗争手段，是保护资本主义而反对社会主义。”这是值得特别警惕的。","type":"paragraph"},{"text":"在革命三结合的临时权力机构中，革命的老干部一定要正确对待革命的新干部。要满怀无产阶级的感情和革命的责任感，满腔热情地用正确的革命原则教育新干部，用自己的战斗经历，特别是自己犯错误的教训去教育新干部，从政治上严格要求新干部，帮助他们从政治上更快地成熟起来，与新干部一起掌好权、用好权。决不能对新干部冷眼旁观，看笑话。更不能对新干部吹吹捧捧，搞无原则的讨好捧场，搞资产阶级庸俗的一套。在当前糖衣炮弹往往是资产阶级毁灭新干部的重要手段。革命的同志对此务必保持警惕。","type":"paragraph"},{"text":"正确处理好新老革命干部的关系，就要提倡相互学习，取长补短的革命精神。无论是革命的新干部，无论是革命的老干部，都要多看别人的长处。革命新干部应当尊重革命老干部，把革命的老干部的长处，作为宝贵的财富接受过来。革命的老干部也应当诚心诚意地向革命的新一代学习。这样，我们的干部队伍就一定能兴旺起来。至于那一小撮叛徒、特务、顽固不化的党内走资派和社会上的牛鬼蛇神（即没有改造好的地、富、反、坏、右），决不允许他们混进革命干部队伍中来。","type":"paragraph"},{"text":"新老革命干部要相互信任，彼此合作。在某些新老革命干部之间存在的种种隔阂，要在“斗私，批修”中，通过学习毛主席著作，开展谈心活动，破私立公，加以消除。新老革命干部要在当前的斗争中，进一步团结起来，并肩战斗。","type":"paragraph"},{"text":"支持革命的新干部，帮助革命的新干部，是巩固革命三结合的一个重大问题。我们革命的老干部，我们的广大革命群众，都应当和革命的新干部共同挑好革命和生产两副重担，粉碎阶级敌人挑拨新老革命干部关系的罪恶阴谋，为巩固无产阶级的革命的政权而斗争。（《人民日报》转载时略有修改）","type":"paragraph"},{"text":" （原载《文汇报》一九六七年十一月十日社论；转载《人民日报》一九六七年十一月十六日）","type":"paragraph"}],"comments":[],"origin":"原载《文汇报》一九六七年十一月十日社论；转载《人民日报》一九六七年十一月十六日","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"革命三结合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0edd305236"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
