script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"英法并非为援助欧洲而服务  是想作美国在欧的奴隶总管  苏新时代杂志抨击英法“欧洲经济计划”","authors":[],"dates":[{"year":1947,"month":7,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"英法并非为援助欧洲而服务"},{"type":"paragraph","text":"是想作美国在欧的奴隶总管"},{"type":"paragraph","text":"苏新时代杂志抨击英法“欧洲经济计划”"},{"type":"paragraph","text":"【新华社陕北九日电】塔斯社莫斯科讯：新时代杂志顷就三外长会议发表社论，略谓：贝文与皮道尔提议草拟一个无所不包的欧洲经济计划，是去指挥每一欧洲国家国民经济基本部门发展的水平及过程，无条件的履行“领导委员会”的训令，而英法得以在该委员会中获得控制。接受并履行英法这些提议，其结果就会人为的延迟各国国民经济某些部门的发展，而又人为的膨胀另一些部门。这意味着干涉欧洲各国内政，剥夺他们经济与主权的独立。英法这种作法，并非为援助欧洲而服务，而是为美国在欧洲的领导而服务，充当了美国在欧洲事务的代理人，成了新的“泛大西洋”主子的奴隶总管。象贝文、皮道尔所提议的那种骑马的人与马的“合作”的这样的计划，是绝不会为爱护自己独立的国家所接受的。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"046f79db5a"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
