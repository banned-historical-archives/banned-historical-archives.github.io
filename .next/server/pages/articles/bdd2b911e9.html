script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"向修正主义的老窝猛烈冲击  南斯拉夫人民要造铁托集团的反","authors":[],"dates":[{"year":1967,"month":1,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"向修正主义的老窝猛烈冲击"},{"type":"paragraph","text":"南斯拉夫人民要造铁托集团的反"},{"type":"paragraph","text":"据新华社讯　南斯拉夫广大劳动人民一年来进一步觉醒，愤怒揭露和反对铁托叛徒集团复辟资本主义的倒行逆施，猛烈冲击着铁托集团的反动统治。"},{"type":"paragraph","text":"一年来，南斯拉夫国内的阶级矛盾和统治集团内部勾心斗角的斗争，空前尖锐化。铁托集团在全国展开一个大规模的排除异己的清洗运动的同时，在全国组织了所谓“公众讨论”，妄图制造舆论欺骗群众，转移广大劳动人民对整个统治集团的不满。然而，南斯拉夫劳动人民却把矛头集中指向整个统治阶级，形成了对铁托集团罪行的大控诉和大揭露。据南斯拉夫报刊透露，全国人民的愤怒情绪如同“平静的水突然翻腾咆哮起来了”。工人们纷纷揭露说：“工人自治仅仅是形式，什么事也不问工人，工人委员会按着领导人的调子跳舞”，“在我们这里没有民主和自治”。一名工人一针见血地指出，南斯拉夫的工人“无任何自治权利，像生活在封建制度下一样”。"},{"type":"paragraph","text":"很多工人愤怒地控诉了社会上两极分化的严重状况和贫富之间的巨大悬殊。他们说，在南斯拉夫“富的富，贫的贫”，“有的人发财致富，有的人连命都活不成”。据南斯拉夫报刊透露，在南斯拉夫失业人数已达二十六万五千多人，被迫离乡背井到外国谋生的人达二十二万。"},{"type":"paragraph","text":"南斯拉夫劳动人民逐渐识破了南共联盟的反动本质。不少人公开抨击南共联盟是“维护上层集团利益的工具”。退出南共联盟的人越来越多。一名退盟的工人说：“我看到盟内有很多有钱的人，坏人，我不愿和他们在一起。”一位医生说：“当盟员对我来说是耻辱，在南斯拉夫建设的根本不是社会主义。”"},{"type":"paragraph","text":"近几个月来，南斯拉夫广大劳动人民群情激愤，越来越强烈地抵制和反抗铁托集团的统治。各地工人罢工事件纷起。工人因抑制不住对特权阶层的愤慨，迫使企业经理、铁托集团地方党政头目辞职的事件不断出现。农民、教职员、城市贫民也起来反抗铁托集团的压迫。"},{"type":"paragraph","text":"去年十二月底，萨格勒布、贝尔格莱德等地学生和市民连续举行的反对美帝侵越战争的猛烈示威游行，更加说明：长期遭受铁托叛徒集团残暴统治的南斯拉夫劳动人民，目前正处在新的革命觉醒之中。他们反剥削、反压迫的斗争正在进入一个重要的阶段，而使铁托集团面临十分严重的政治危机。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bdd2b911e9"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
