script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"光头党光天化日之下杀人极右势力排外行动影响法国大选","authors":["郑若麟"],"dates":[{"year":1995,"month":5,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"郑若麟"},{"type":"paragraph","text":"本报驻巴黎记者专电"},{"type":"paragraph","text":"在法国总统大选进入最后一周的关键时刻，一位移民后代被极右翼组织光头党分子在光天化日之下投入塞纳河残忍谋杀一案，在法国引起一场政治风暴。几乎所有的政治党派，除了极右翼的法国国民阵线之外，都参加了昨天在巴黎举行的反种族主义示威游行。即将卸任的法国总统密特朗亲自来到这位名叫布拉义姆·布阿拉姆的被害者遇难的塞纳河卡鲁塞尔桥下，将一束铃兰花投入河中，以示悼念。"},{"type":"paragraph","text":"案件发生在5月1日，这天是法国极右翼政党国民阵线在巴黎举行纪念圣女贞德示威集会的传统日子。该党主席让-玛丽·勒庞在法国总统大选首轮投票中得到15%的选票，因而其选民在第二轮投票时的走向，便成为希拉克与若斯潘之争中的一个重要的决定性因素。勒庞早就宣布要在这一天公布他的投票指示。就在勒庞及其近万名拥戴者游行经过卡鲁塞尔桥之际，三名剃着光头的青年从队伍中脱离出来，直奔桥下的河岸。因为桥下有一个阿拉伯人在阳光下散步。这就是29岁的布拉义姆·布阿拉姆，三个光头党徒边冲着布阿拉姆大喊大叫着什么，边抓住他，将他直推下塞纳河。布阿拉姆立即就被河水所淹没。三个光头党则重新消失在国民阵线的游行队伍之中……事后查明，布阿拉姆是一个完全安分守己的原籍摩洛哥的法国平民。他开着一家小食品铺子，从来没有与人有任何争执或矛盾。他被杀的唯一原因，就是他的阿拉伯人外貌。"},{"type":"paragraph","text":"这一案件的严重性，不仅在于仇杀外国人，而且在于其对法国总统大选的深刻影响。众所周知，国民阵线的主要口号，就是排外。2月21日在法国南方城市马赛，就已经发生过三名国民阵线党员枪杀了一名原籍科摩罗的黑人的种族主义案件。此后还发生过国民阵线与大学生的冲突、国民阵线成员冒充警察粗暴对待一位阿尔及利亚孕妇等好几起仇外、排外案件。布阿拉姆之死，不仅证明法国极右分子仇外情绪已经达到危险的程度，而且在政治层面上也开始产生一定的影响。"},{"type":"paragraph","text":"由于法国极右势力的15%的选票在希拉克和若斯潘之争中，处于一个仲裁者的地位。由此出发，政治观察家们就担心，新任法国总统在某种程度上会不会成为极右势力的“人质”。尽管目前希拉克和若斯潘都对这一案件进行了严厉谴责，但两位候选人都小心翼翼地没有在电视辩论中直接了当地谈及这一问题，也没有直接谴责国民阵线，也没有亲自参加昨天的示威行动。而只是派出了支持者以表明自己的立场而已。这就使人加深了关于“人质论”的印象。"},{"type":"paragraph","text":"(本报巴黎5月4日电)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"295fb8ada4"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
