script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"关于对安岳县“右倾机会主义分子”摘帽摸底情况汇报","authors":[],"dates":[{"year":1961,"month":1}],"is_range_date":false,"parts":[{"text":"关于对安岳县“右倾机会主义分子”摘帽摸底情况汇报","type":"title"},{"text":"（上缺）中央规定摘右派分子帽子的标准，针对右倾机会主义分子所犯的错误事实，初步草拟了一个摘右倾机会主义分子帽子的条件（附后），和本着“教育多数，孤立少数”的精神，从调动一切积极因素出发，一致认为目前可以摘掉少数右倾机会主义分子的帽子，同时，还可结合处理少数坚持错误，一犯再犯，累教不改的人员，这样可促使其多数犯错误的人愿意改正错误，从而更能促使他们向好的方向转化。","type":"paragraph"},{"text":"其摸底情况是：安岳县通过反右倾学习运动，共揭发暴露出15名右倾机会主义分子，分布在县级单位二人，区单位三人，公社级八人，大队级二人（脱产干部），从这些人员担负的职务来看，有县委委员兼组织部副部长一人，人委委员、书记二人，公社党委委员、书记五人，公社主任二人，大队支书二人，一般干部三人。这15名右倾机会主义分子共同性的论点和错误事实是：（1）反对党的领导，如陈文畋（县委委员兼组织部副部长，下同），公开反对党的政治挂帅，提出“不要依靠共产党员，要依靠老农”，同时，重用极右份子在党委办公室工作，并与反党集团主要成员以捏造事实的办法，攻击党的基层组织。又如梁兆祥（区委副书记），在执行党的政策、决议，采取阳奉阴违，会上向组织打便条，会后就不认真贯彻执行，甚至说党不讲真理。（2）攻击和否定总路线、大跃进、人民公社所取得的成绩，说58年水稻肯定没增产，59年产量也低，平均只有200多斤，并认为其他地区增产是假的，如陈文畋诬蔑县委搞丰产路、丰产坝、丰产沟是实现高额丰产的方法，说成为做“面子”，更恶毒是把敌人利用农民的迷信思想所挑起的少数人挖了一点泥巴当“仙米”吃的事实，加以歪曲夸大，强加在大跃进身上，并公开向县委写报告说：“竟在春夏之交大部分社员既开始缺粮，以仙米、野菜、花生壳、谷糠充饥度日，因吃泥巴、野菜发肿而死很多人”……等。又如庞林（粮食局干部）说“大跃进搞拐了”，公开在群众中散布“大跃进带来了不自由，白天黑夜都得不到休息，大老火了”，在公社化问题上，反对人民公社，歪曲事实说：公社化后，农民不自由，公社太大了，干部领导不了，社员处处拖沓，质量也搞不清，甚至还诬蔑公社到处设立法庭，农民生活太苦，吃干饭当打牙祭，农民吃的象猪草……等。（3）在粮食问题上，散布低产论，抵制征购任务，如邹选（公社党委委员兼主任）公开说：“每亩产100斤都有问题，除了征购任务，每人只能吃两斤。又如李明德（公社干部）叫喊粮食紧张，纵容区队干部大搞粮食私分，造成有的队先后私分粮食六次，计黄谷5475斤，谷子1259斤。（4）不认真贯彻技术规格措施，公开反对稀秧密植，如杨元丰（公社脱产干部）说：“种稀大窝比密植好。”又如陈茂森（周礼公社党委委员）强调地区特殊，反对技术革命说“2-8.2-4密了，稀大窝好些”，并公开不顾种棉花等0.5，反对大搞群众运动，在群众中泼冷水。如陈文畋把运动中的积极分子称为“猛张飞”，向县委写报告中说：一些青壮年受不了折磨，纷纷外逃，家属也摆不脱各种处罚，搞得社员妻离子散，造成了严重的事件。","type":"paragraph"},{"text":"根据以上构成右倾机会主义分子的错误事实和论点，安岳县委均分别针对每人的情节轻重，进行了研究处理，其受处理的情况是：撤销党内职务七人，留党查看三人，开除党籍三人，取消预备期一人，行政撤职一人。这些人员经过受处分后，一般都作了适当安置，除部份人员因继续表现不好，被落选回家五人，开除工作藉二人外，其余人员通过一年来在实际工作、劳动中的考查，一般表现较好真正认识到所犯错误的严重，给党的事业带来很大损失并表示愿意在工作、劳动上积极争取改正错误，甚至有的还多次向组织申请要求撤销处分，相反也有少数死心塌地，不但不承认错误，反而更加抵触不满，工作上消极怠慢，个别还公开散布流言蜚语，挑拨党内团结和党群关系以及伙同坏人进行偷盗等等。（下缺）","type":"paragraph"}],"comments":[],"origin":"四川省某档案馆","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"141fffeced"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
