<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"华东局对山东惠民地委关于干部普遍交代与资产阶级关系的情况报告的批示","authors":[],"dates":[{"year":1952,"month":6}],"is_range_date":false,"parts":[{"text":"华东局对山东惠民地委关于干部普遍交代与资产阶级关系的情况报告的批示","type":"title"},{"text":"6月4日转来惠民地委关于干部普遍交代与资产阶级关系的情况报告阅悉。我们除同意分局的批示外，认为惠民地委的报告中尚有几处的提法和作法不够妥贴，特作如下说明：","type":"paragraph"},{"text":"（一）划清思想界限不是一般地断绝来往关系；与地主、资产阶级仅有一般的来往关系的干部，也不能笼统地列入“组织不纯”的范围。问题的关键是站在什么立场来发生关系及如何发生关系。在处理干部个人与地主、资产阶级家庭的关系上，要区别各种不同情况，教育干部站稳立场，按照党对地主阶级和资产阶级不同的政策来办事，使个人关系服从阶级关系。除家庭为坚决的反革命首要分子者，必须在交代之后坚决与之断绝关系外，一般在划清思想界限之后，原来接受家庭接济者，仍可继续接受其接济（但须说明：如超过同级干部生活水平，为了个人享受而向家庭要求接济，则是错误的），原来与家庭有联系者，仍可继续保持联系；但应积极地、经常地向家庭宣传党的政策，劝导家庭遵守政府法令，响应政府号召，并与家庭的违法行为作坚决的斗争，这对减少国家建设及社会改革中的阻力是有好处的。","type":"paragraph"},{"text":"（二）对于地主家庭出身的干部供养地主父母的问题，也应区别不同情况：如父母有力自养而干部从“报恩”观点出发予以供养是不好的；如父母确已年老力衰无力自养，则由干部予以抚养，就是尽一种社会责任，而不应视为丧失立场。否则不仅丧失社会同情，且增加社会救济的困难也是不好的。","type":"paragraph"},{"text":"（三）交代关系必须掌握“思想检查从严，组织处理从宽”的原则，在干部自觉坦白交清问题之后，一般不要作组织处理。个别确有必要（只能是极个别的）给予党纪处分与行政处分者，则应严格依照干部管理原则及党章手续办事，并应较非自觉坦白交代者从轻处理。现在惠民地委准备及时处分者（10％）及放缓一步作组织处理者（20％），共达已交代出各种问题的干部人数的30％，这是绝对不妥当的。","type":"paragraph"},{"text":"此外，在交代关系过程中，领导上必须向全体干部反复说明剥削所得与劳动所得，个人享受与集体福利，浪费与非浪费，目前条件与将来远景等的区别和界限，并在交代关系之后，进行一次遵守纪律、服从领导、严守制度、认真负责、团结互助的教育，使干部思想上有明确的认识，在今后有所遵循。","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f85cf2612f"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
