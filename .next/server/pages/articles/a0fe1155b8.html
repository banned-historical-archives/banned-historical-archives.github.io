script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"揭批极左路线  落实各项政策  加强经营管理  酒泉地区实现“七增一降”","authors":[],"dates":[{"year":1979,"month":4,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"揭批极左路线  落实各项政策  加强经营管理"},{"type":"paragraph","text":"酒泉地区实现“七增一降”"},{"type":"paragraph","text":"本报讯  据《甘肃日报》报道：甘肃省酒泉地区农村各级党组织和政府部门带领广大群众，深入批判林彪、“四人帮”的极左路线，落实党在农村的各项政策，加强经营管理，调动了广大干部、社员群众的社会主义积极性，去年夺得了历史上最好收成，年终决算实现了“七增一降”。"},{"type":"paragraph","text":"酒泉地区一九七八年与一九七七年相比，粮食总产量增长百分之八点八七，集体经济总收入增长百分之十点四九，对国家贡献增长百分之七点八，集体储备粮增加一点一倍，公共积累增长百分之八点零六，社员分配收入增长百分之十九，社员口粮增长百分之五；生产费用比重下降百分之三点三三。"},{"type":"paragraph","text":"这个地区能够实现“七增一降”，主要是各级党组织带领群众，揭批林彪、“四人帮”极左路线，认真落实党在农村的各项政策，加强对农业的领导的结果。他们着重抓了以下几项工作："},{"type":"paragraph","text":"一、全面发展集体生产，为收益分配创造物质基础。各地在抓紧粮食增产的同时，从实际出发，因地制宜，大力发展多种经营，走农、工、副综合发展的道路。"},{"type":"paragraph","text":"二、努力降低费用，做到增产增收。重点抓了一些社队增产不增收、甚至增产还减收的“高产穷队”的问题。对这类社队，普遍开展财务大检查，整顿社队经营管理，打击了贪污盗窃、投机倒把，刹住了请客送礼、大吃大喝、挥霍浪费等歪风，初步改变了经营管理上的混乱状态，坚持勤俭节约，各项非生产性开支大大减少。"},{"type":"paragraph","text":"三、加强定额管理，坚持按劳分配原则。全区普遍实行基本口粮和按劳分配相结合的办法，或按劳动工分分配口粮加照顾的办法。年终决算时，对超额投工投肥的社员，进行了奖励；对少数无正当理由、任务完成得不好、群众意见大的，除进行思想政治教育外，经济上给予了适当的制裁，保护了社员群众的集体生产积极性。"},{"type":"paragraph","text":"四、采取措施，保证分配兑现。增产社队，在绝大多数社员比往年增加收入的情况下，适当增加集体积累；增产不增收、减产减收的生产队，根据其减产的幅度、原有的积累水平和社员的分配水平，采取积累分配两头减或者降低积累水平，甚至不留积累，妥善处理集体与个人的关系。为了保证分配兑现，把落实湘乡经验中兑现退赔的现金纳入当年分配，将社队企业应该归生产队收入的交生产队分配，收到了显著效果。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"林彪","type":"人物"},{"name":"四人帮","type":"人物"},{"name":"甘肃文革","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a0fe1155b8"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
