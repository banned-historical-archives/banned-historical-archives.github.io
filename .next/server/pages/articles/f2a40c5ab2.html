" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji28","name":"毛泽东全集第28卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji28.pdf"],"article":{"title":"军队整编复员由中央复员委员会统一处理","alias":"","parts":[{"type":"paragraph","text":"军队整编复员由中央复员委员会统一处理！"},{"type":"paragraph","text":"（1950年5月19日）张、甘，并告华东，中南，西南，东北各军区负责同志："},{"type":"paragraph","text":"辰巧电悉。军队整编复员问题，中央已组成一委员会，周恩来同志为主任，聂荣臻同志为副主任，统一处理复员人数、时间、回家生产补助费、地方欢迎安置等项问题。西北方面应统一办理。集训一周到半月，时间太短，发半个月至三个月经费问题，亦尚须考虑，容后电告。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"五月十九日"},{"type":"paragraph","text":"[1]这是毛泽东为中央人民政府人民革命军事委员会起草的给中国人民解放军西北军区副司令张宗逊和副政治委员兼政治部主任甘泗淇的电报。"}],"authors":["毛泽东"],"dates":[{"year":1950,"month":5,"day":19}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":405,"page_end":405},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f2a40c5ab2"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
