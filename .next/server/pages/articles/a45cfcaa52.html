script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"利津县明集公社党委联系实际讨论南庄毁瓜事件  认为必须坚持批判极左路线肃清流毒","authors":[],"dates":[{"year":1979,"month":8,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"利津县明集公社党委联系实际讨论南庄毁瓜事件"},{"type":"paragraph","text":"认为必须坚持批判极左路线肃清流毒"},{"type":"paragraph","text":"新华社济南八月一日电  山东省利津县明集公社党委读了七月二十七日《人民日报》刊登的关于河北省正定县留村公社党委强令南庄大队毁瓜事件的报道以后，围绕如何真正做到尊重生产队的自主权问题展开了讨论。大家一致认为，肃清林彪、“四人帮”极左路线的流毒是当前亟待继续解决的问题。"},{"type":"paragraph","text":"他们为在党中央关于农业问题的两个文件下达半年后的今天，竟出现如此明目张胆地践踏党的政策的怪事感到痛心，并且联系实际谈了本公社一起毁瓜事件的教训。"},{"type":"paragraph","text":"一九七五年春，明集公社中王参大队第三生产队队长刘希朋领着社员种了十五亩西瓜。公社领导知道了这件事后，认为这是在搞“自由种植”，是一种“只抓钱，不抓粮”的资本主义倾向。三令五申要把瓜秧拔掉。生产队的干部、社员不肯拔，这下触怒了公社某些领导人的“权威”。公社派人来到这个生产队，拉上牲口套上犁，把十五亩西瓜耕得乱七八糟。公社某些领导人毁了这个瓜园后，余怒未息，还派人调查整理了材料，给队长刘希朋定下了“不听党的话，顶抗上级领导”的罪名，撤了他的队长职务，并给予党内警告处分。"},{"type":"paragraph","text":"这场“毁瓜事件”给这个生产队带来不少灾难。毁掉十五亩西瓜，少收入七千五百元，加上当年粮食生产比往年减产二成，平均每个社员减少收入五十元。打那以后，这个过去一直是全公社有名的先进队，生产逐年下降，变成了后进队。当时，公社党委某些人只觉着干得顺劲，滥用了权力，抖了威风，美其名曰“煞住了资本主义泛滥的歪风”，至于集体减了产，群众减少收入，那就不管了。"},{"type":"paragraph","text":"直到学习贯彻党的十一届三中全会精神时，党委一班人才如梦初醒。深深感到过去搞的那一套，违背了为人民服务的宗旨，害党害国害人民，完全是中了林彪、“四人帮”极左路线流毒的结果。本着“有错必纠”的精神，公社党委承认了错误，为刘希朋平了反。当时还没有认识到必须从经济上赔偿生产队的损失。就是这样，公社有的领导干部仍然认为，公开向群众检讨、认错，有损公社党委的威信，担心生产队自主权大了，生产不好领导，各项种植计划也不好完成。这些同志错误地认为党的政策“右”了，以为发扬党的民主作风、尊重生产队的自主权，往后干部就没“权威”了。他们不顾群众的利益，一心想维护自己的“权威”。这种现象的存在，使生产队的干部群众思想上有顾虑，搞生产不舒心，不大胆，遇事生怕“出了格”，再受罚挨整。这些问题说明，林彪、“四人帮”的极左路线流毒在一些人的头脑中还顽固地存在着。要想解放思想，落实党的政策，真正做到尊重生产队的自主权，还要从留村公社党委的错误中吸取教训，要紧密联系实际，广泛发动群众，坚持不懈地批判林彪、“四人帮”的极左路线，彻底肃清其影响，以保证党的各项政策全面落实，这样才能调动广大干部群众的积极性。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"林彪","type":"人物"},{"name":"四人帮","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a45cfcaa52"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
