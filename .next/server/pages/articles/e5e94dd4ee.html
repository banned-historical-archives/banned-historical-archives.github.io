script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"意共(马列)政治局发表公报谴责苏修悍然侵捷苏捷等国人民应展开坚决斗争 把所有修正主义集团一扫而光","authors":[],"dates":[{"year":1968,"month":9,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社北京七日电　罗马消息:意大利共产党(马克思列宁主义)机关报《新团结报》八月二十四日刊登了党的政治局的公报，谴责苏修叛徒集团悍然出兵占领捷克斯洛伐克。"},{"type":"paragraph","text":"公报指出，发生这一事件的根源在于:“赫鲁晓夫领导集团这个罪魁祸首篡夺了苏维埃国家的政权，利用布尔什维克党过去的威望和苏维埃国家的财富，支持修正主义的蜕化，在已经成为人民民主的东欧各国建立修正主义—资产阶级制度。”"},{"type":"paragraph","text":"公报指出，以苏修为中心的现代修正主义集团的所作所为，只能使修正主义国家内部和它们的关系的领域内重新产生资产阶级制度本身的典型矛盾。在捷克斯洛伐克的具体情况下，竞争集团自称都要保卫社会主义；实际上，这是修正主义—资产阶级共同路线范围内的竞争。"},{"type":"paragraph","text":"公报接着强调说:“今天，保卫社会主义和共产主义事业、无产阶级国际主义宝库和马克思列宁主义的旗帜，是由以毛泽东同志为首的中国共产党领导的、致力于无产阶级文化大革命的世界革命堡垒——人民中国高高举起；是由以恩维尔·霍查同志为首的阿尔巴尼亚劳动党领导的、正在推进思想和文化领域的革命发展和以巨大成就推进社会主义建设的欧洲社会主义明灯——阿尔巴尼亚高高举起；是由正在世界各地发展着的马克思列宁主义政党和组织高高举起。”"},{"type":"paragraph","text":"公报说，目前，深刻的危机正在冲击着整个修正主义—帝国主义，这就为全世界马克思列宁主义者更有效地进行反对帝国主义、反对资产阶级、反对现代修正主义的斗争提供了新的可能性。苏联、捷克斯洛伐克和其他修正主义者所统治的国家的工人阶级和人民，应当准备并展开反对现代修正主义的日益坚决的斗争，以便把所有修正主义集团一扫而光，重新建立无产阶级专政。“全世界马克思列宁主义党应当日益壮大自己的队伍，高举马克思列宁主义大旗，高举马克思、恩格斯、列宁、斯大林的大旗，高举当代马克思列宁主义最高创造性的体现——毛泽东思想的大旗前进。”"},{"type":"paragraph","text":"公报说，我们党的全体党员和一切组织，已经动员起来，投入工作和斗争，以便日益密切联系群众，揭露意大利一切修正主义者的阴谋，击败反动派和帝国主义的一切阴谋活动，把最广泛的人民群众争取到光荣和战无不胜的马克思列宁主义事业方面来。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e5e94dd4ee"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
