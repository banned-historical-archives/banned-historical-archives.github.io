script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"卡斯特罗就古巴土改新法律发表演说农村资产阶级是社会主义敌人农村资产阶级的消失将沉重打击美帝侵略阴谋","authors":[],"dates":[{"year":1963,"month":10,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【据新华社哈瓦那5日电】　古巴总理卡斯特罗说，把占有五卡瓦耶里亚以上的庄园收归国有的法律是古巴的第二次、也是最后一次土地改革。“这次战役是革命所进行的有历史意义的战役，是对敌人、对与无产阶级为敌的阶级的经济手段的有力打击，是对帝国主义的有力打击。这是一种双重打击，因为一方面我们使他们失去了他们所拥有的战壕，另一方面，我们将能够更好地抵抗他们的罪恶封锁。”"},{"type":"paragraph","text":"这番话是卡斯特罗二日在哈瓦那农场管理员助手学校的学生大会上发表演说时说的，古巴的报纸今天发表了这篇演说。"},{"type":"paragraph","text":"卡斯特罗宣布，资产阶级分子所拥有的大片土地将通过这项法律转到革命的手里。这批土地的总面积在十五万卡瓦耶里亚以上。他说，在农村将只存在两种类型的生产:国营企业的生产和小农的生产。他说，“从今以后，将只有中、小农民和人民农场，农村资产阶级将消失，因为农村资产阶级永远不会同革命走在一起，它作为一个阶级永远是革命的不可调和的敌人。”"},{"type":"paragraph","text":"卡斯特罗指出，农村资产阶级从总的方面作为一个阶级来说是革命的不可调和的敌人，并将永远是革命的敌人，永远是帝国主义反对无产阶级和反对农民的同盟者，永远是社会主义的敌人，因为他们在社会上占据着特权地位，具有发财致富的最大欲望，剥削他人劳动，因此作为一个阶级来说他们永远不会同革命站在一起。"},{"type":"paragraph","text":"卡斯特罗指出，在古巴农村中将有艰巨的阶级斗争。他说，“由于颁布土地改革的新法律，开始了一场比颁布第一次土地改革法律时更艰巨的阶级斗争。”农村资产阶级将成为比受第一次法律影响的人数更多的阶级敌人。他说，“美帝国主义和中央情报局将失去很多合作者，因为他们将不能依靠那些先生的庄园来进行渗透、隐藏和进行联系了。帝国主义、反革命和中央情报局将受到沉重的打击，因为我们对革命的敌人的行动不会容忍，也不会袖手旁观。决定加速采取这一措施的正是由于这些阶级敌人自己的态度，这个阶级破坏生产的态度，以及美帝国主义依靠这些先生们所进行的行动和颠复计划。”"},{"type":"paragraph","text":"卡斯特罗在演说中阐述了政府对小农的政策。他说，小农可以同革命一起前进。他说，有些小农愿意组织农业社，有些小农愿意继续做小农。将有一个漫长的过程。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9ea6fa3278"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
