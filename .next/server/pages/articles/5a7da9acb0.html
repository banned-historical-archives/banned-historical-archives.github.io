script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"批判右倾保守思想后出现蓬勃气象  安徽副食品收购量猛增  霍丘月月完成生猪、鲜蛋、家禽收购计划成为全省的一面红旗","authors":["冯武生","纪和德"],"dates":[{"year":1959,"month":9,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"批判右倾保守思想后出现蓬勃气象"},{"type":"paragraph","text":"安徽副食品收购量猛增"},{"type":"paragraph","text":"霍丘月月完成生猪、鲜蛋、家禽收购计划成为全省的一面红旗"},{"type":"paragraph","text":"本报合肥13日电　安徽省各地商业部门批判了部分干部的右倾保守思想，根据“多收、快收、收好、收足”的方针，副食品的收购、调运工作，出现了蓬蓬勃勃的新气象。据统计，全省8月中旬，收购的生猪、鲜鱼、家禽等，分别比上旬增长三成到一倍，下旬的收购日进度又比中旬增长五成到三倍。"},{"type":"paragraph","text":"为了在已经取得很大成绩的基础上，迎接购销旺季，安徽各地商业部门最近在各级党委领导下，批判了少数干部的右倾思想，进一步加强了收购调运准备工作，充实了采购力量和调运工具，组织一批采购人员深入社、队收购。六安专区组织的五千多人，到人民公社和生产队一面帮助群众抗旱，一面组织群众出售生猪、鲜鱼和家禽等副食品，全专区8月中旬猪的收购量比上旬增加88％，鱼增加一倍，家禽增加十倍多。各地收购到大量的猪、鲜鱼和家禽以后，都及时调运出支援了城市和工矿区人民生活的需要。　（冯武生）"},{"type":"paragraph","text":"本报合肥13日电　安徽省霍丘县商业部门从帮助人民公社解决生产中的具体问题着手，促进公社发展副食品生产，保证了收购任务的完成。今年从1月份到目前为止，全县共收购生猪三万二千二百五十一头，鲜蛋二百五十六万七千七百斤，家禽六万五千二百九十六只。这个县在完成国家生猪、鲜蛋、家禽的收购和外调计划方面，一直在全省领先，成为全省商业系统的一面红旗。"},{"type":"paragraph","text":"霍丘县商业部门在各级党委的领导下，充分利用公社化后的有利条件，发挥了职工的干劲和钻劲，采取多种有效措施，大抓副食品收购。他们配合农业部门举办生猪防疫和育肥训练组，帮助公社培养了五百八十多名技术人员，供应了三百六十五件催肥工具和用作防疫和催肥用的二千服中药。商业部门还自办了五十八个养猪场和育肥场，加速繁殖仔猪。"},{"type":"paragraph","text":"为了支持公社发展家畜家禽生产，霍丘县商业部门除帮助公社建立孵坊、猪场，解决技师等问题外，还适时调剂种鸡三千零五十二只，收购种蛋二十二万多斤，供应给公社。"},{"type":"paragraph","text":"由于各级党委大力领导和商业部门积极协助，霍丘县副食品生产发展很快。目前，全县已养猪三十八万一千四百三十六头，较年初增加二点一八倍，每户平均二点二头；家禽已发展到三百九十六万六千零六十三只，较年初增长五点零五倍，每人平均四只。全县基本上作到了“户户养猪，家家养鸡，队队有饲养场”。　（纪和德）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5a7da9acb0"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
