script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"罗马尼亚工人党中央全会决议对修正主义展开斗争“火花报”发表社论欢送苏军回国","authors":[],"dates":[{"year":1958,"month":6,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社布加勒斯特14日电】　罗马尼亚工人党中央委员会在6月9日到13日举行了全体会议。"},{"type":"paragraph","text":"据“火花报”今天发表的会议公报说，这次会议的决议强调指出必须巩固党的组织，不断地加强党的团结和党的纪律，提高党员和候补党员的政治思想水平，同修正主义和一切资产阶级思想影响作斗争，并且同脱离党内生活准则的现象作斗争。"},{"type":"paragraph","text":"公报说，会议拥护党中央政治局对南共纲领草案和南共代表大会所采取的立场。"},{"type":"paragraph","text":"公报还说，全体会议听取和讨论了党中央政治局关于执行党的第二次代表大会关于发展党的队伍、培养党的干部和调整党的社会成分的报告。会议讨论了保护社会主义所有制的问题，并且通过了相应的决议。"},{"type":"paragraph","text":"【据新华社布加勒斯特14日电】　罗马尼亚“火花报”今天发表社论，欢送即将离开罗马尼亚回国的苏联军队。社论说，我国各地人民正在向苏军告别。这正表现了罗苏人民的牢不可破的友谊和热爱，表现了我国人民对英雄的苏联军队的感激。"},{"type":"paragraph","text":"这篇题为“永久的朋友和兄弟”的社论说，罗马尼亚人民对苏联军队表示最深切的尊敬。当苏军要回国的时候，我国人民怀着激动的心情想起了1944年的春天和夏天，那时，苏联军队作为解放者来到我国的土地上，我国人民拿着鲜花高兴地接待了他们。"},{"type":"paragraph","text":"社论说，罗苏两国根据无产阶级国际主义的原则建立了新型的关系。这种关系的存在，阻止了帝国主义对我国内政的干涉。在这种条件下，我国人民才能够选择适合于自己的社会和历史发展的道路，并且在党的领导下，坚决沿着这条道路前进，建立了人民民主政权，并且在社会主义建设中获得了很大的成就。"},{"type":"paragraph","text":"社论说，罗马尼亚人民热爱和平，他们关心社会主义的成果，关心并且将全力巩固同苏联以及社会主义阵营其他国家的团结。社论最后祝苏联军队和苏联人民在建设共产主义和维护世界和平中获得更大的成就。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a3b0547353"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
