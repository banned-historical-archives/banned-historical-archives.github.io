script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"蓬皮杜总统应邀出席文艺晚会  观看革命现代舞剧《红色娘子军》  我国领导人周恩来江青吴德等陪同贵宾观看演出","authors":[],"dates":[{"year":1973,"month":9,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"蓬皮杜总统应邀出席文艺晚会观看革命现代舞剧《红色娘子军》"},{"type":"paragraph","text":"我国领导人周恩来江青吴德等陪同贵宾观看演出"},{"type":"paragraph","text":"新华社一九七三年九月十二日讯  法兰西共和国总统乔治·蓬皮杜今天晚上应邀出席文艺晚会，观看了中国舞剧团演出的革命现代舞剧《红色娘子军》。"},{"type":"paragraph","text":"随同蓬皮杜总统来访的法国政府高级官员，法国驻中国大使马纳克和夫人以及大使馆外交官员，随同总统来访的记者、技术人员和专机机组人员，应邀出席。"},{"type":"paragraph","text":"我国领导人周恩来、江青、吴德和外交部部长姬鹏飞，国务院文化组秘书长石少华，外交部西欧司司长王栋、礼宾司副司长朱传贤，中国驻法国大使曾涛，陪同观看演出。"},{"type":"paragraph","text":"蓬皮杜总统来到剧场时，受到全场热烈欢迎。演出结束时，蓬皮杜总统起立、鼓掌，祝贺演出成功，并向演员们赠送了花篮。"},{"type":"paragraph","text":"今天的文艺晚会是由北京市革命委员会举办的。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"江青","type":"人物"},{"name":"吴德","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9db9df9b6a"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
