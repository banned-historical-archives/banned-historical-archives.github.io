<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"我驻非洲国家使节举行国庆招待会  各国朋友高度赞扬中国人民的革命精神并祝贺中国人民在毛主席亲自发动和领导的无产阶级文化大革命中取得伟大胜利","authors":[],"dates":[{"year":1968,"month":10,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"我驻非洲国家使节举行国庆招待会"},{"type":"paragraph","text":"各国朋友高度赞扬中国人民的革命精神并祝贺中国人民在毛主席亲自发动和领导的无产阶级文化大革命中取得伟大胜利"},{"type":"paragraph","text":"据新华社讯　中国驻非洲国家使馆分别在九月三十日和十月一日举行招待会，热烈庆祝中华人民共和国成立十九周年。"},{"type":"paragraph","text":"我驻坦桑尼亚大使馆临时代办周伯萍一日晚举行招待会，热烈庆祝中华人民共和国成立十九周年。"},{"type":"paragraph","text":"坦桑尼亚第二副总统卡瓦瓦出席了招待会，并发表讲话，热烈祝贺中国人民所取得的伟大成就。"},{"type":"paragraph","text":"卡瓦瓦说：我们看到了中国人民在毛泽东主席领导下粉碎了帝国主义者的剥削桎梏。我们看到了中国人民在过去一年中进行的震撼世界的文化大革命。"},{"type":"paragraph","text":"他还热情地赞扬说：“中国人民为今天的世界人民树立了伟大的榜样”。"},{"type":"paragraph","text":"卡瓦瓦援引了尼雷尔总统说过的话：坦中两国之间的友谊是世界上任何敌人也绝对破坏不了的。卡瓦瓦说：“不管我们的敌人高兴不高兴，这种友谊将继续无止境地发展下去。”卡瓦瓦表示祝愿中国人民的伟大领袖、伟大舵手毛泽东主席和林彪副主席以及周恩来总理身体健康。"},{"type":"paragraph","text":"有五百多位客人出席了招待会。其中有：坦桑尼亚首席法官乔治，第二副总统办公室国务部长西乔纳，商业和工业部长马利姆，交通和工程部长卢辛德，土地、定居和水利开发部长巴布，教育部长姆贡贾，坦噶尼喀非洲民族联盟执行书记姆塞克瓦，以及国民议会的议员和群众组织的领导人。"},{"type":"paragraph","text":"在东非的非洲南部的民族主义组织的代表们，也出席了招待会。"},{"type":"paragraph","text":"出席招待会的还有一些国家驻坦桑尼亚的外交使节。"},{"type":"paragraph","text":"招待会在热烈友好的气氛中进行。许多坦桑尼亚朋友热烈欢呼坦中友谊和合作的不断发展。他们高度赞扬中国人民的革命精神，并祝中国无产阶级文化大革命取得彻底胜利。许多非洲朋友怀着深厚的感情祝福毛主席万寿无疆！"},{"type":"paragraph","text":"客人们观看了钢琴伴唱《红灯记》的彩色纪录影片。"},{"type":"paragraph","text":"居住在坦桑尼亚的华侨代表和在坦桑尼亚工作的中国工程技术人员的代表，也出席了国庆招待会。"},{"type":"paragraph","text":"我国驻坦桑尼亚桑给巴尔副领事刘庆有一日晚上举行招待会，热烈庆祝中华人民共和国成立十九周年。"},{"type":"paragraph","text":"坦桑尼亚第一副总统卡鲁姆和夫人出席了招待会。"},{"type":"paragraph","text":"出席招待会的还有坦桑尼亚桑给巴尔政府的部长们和桑给巴尔革命委员会的委员们，非洲—设拉子党和它所属的工人部、青年部和妇女部的领导人，高级军官以及其他各界朋友，共约四百人。"},{"type":"paragraph","text":"卡鲁姆第一副总统在招待会上讲了话，热烈祝贺中华人民共和国成立十九周年，并表示祝愿毛主席身体健康。"},{"type":"paragraph","text":"许多桑给巴尔朋友一再表示敬祝毛主席万寿无疆，祝贺中国无产阶级文化大革命的胜利。招待会自始至终洋溢着热烈、友好的气氛。"},{"type":"paragraph","text":"在桑给巴尔的华侨和中国工程技术人员的代表也出席了招待会。"},{"type":"paragraph","text":"我驻马里大使馆临时代办刘和林一日晚举行招待会，热烈庆祝中华人民共和国成立十九周年。"},{"type":"paragraph","text":"出席招待会的有五百多位客人，其中有：马里保卫革命全国委员会成员、总统府负责国防和安全的部长级代表马马杜·迪亚基特，保卫革命全国委员会成员加布·迪亚瓦拉，计划部长让—马里·科奈，新闻部长马马杜·戈洛戈，贸易部长阿塔埃尔·梅加，卫生和社会事务部长多洛·索米内，马里陆军参谋长塞古·特拉奥雷，总统办公厅主任提贾尼·居伊斯，以及群众组织和巴马科各界人士的代表。出席招待会的还有一些国家的外交代表。招待会是在热烈、亲切和友好的气氛中进行的。"},{"type":"paragraph","text":"出席招待会的许多马里朋友热烈祝贺中国国庆，祝贺中国人民在毛主席亲自发动和领导的无产阶级文化大革命中所取得的伟大胜利。"},{"type":"paragraph","text":"招待会后放映了中国革命影片《地道战》，受到了热烈的欢迎。"},{"type":"paragraph","text":"我驻几内亚大使馆临时代办林秉南九月三十日晚举行招待会，热烈庆祝中华人民共和国成立十九周年。"},{"type":"paragraph","text":"三百多位几内亚朋友出席了招待会，其中有：外交部长兰萨纳·贝阿沃吉，经济发展部长伊斯梅尔·杜尔，社会事务部长马穆纳·杜尔，几内亚民主党全国政治局常务副书记凯塔·马马迪，负责邮电的国务秘书巴里·索里，负责公共工程的国务秘书福法纳·卡里姆，负责外交事务的国务秘书迪亚洛·阿尔法·阿卜杜拉耶，负责内政的国务秘书马赛尔·马托，几内亚人民军总参谋长凯塔·努曼迪安和副总参谋长卡曼·迪亚比等高级官员。"},{"type":"paragraph","text":"出席招待会的还有同帮助几内亚建设的中国工人和技术人员一道工作的几内亚工人。"},{"type":"paragraph","text":"目前正在几内亚进行访问的、由张挺率领的中华人民共和国政府和军事代表团，以及在几内亚工作的中国工人和技术人员的代表，也出席了招待会。"},{"type":"paragraph","text":"林秉南和兰萨纳·贝阿沃吉先后在招待会上讲了话。"},{"type":"paragraph","text":"几内亚外交部长兰萨纳·贝阿沃吉在讲话时，代表几内亚人民和政府向中国人民和政府表示热烈祝贺，并热烈赞扬几中友好关系的发展。他说：两国之间的关系非常好，两国的合作是真诚和卓有成效的。“我们在这里向你们提出保证，在抗击帝国主义和争取进步的斗争中，你们可以信赖我们，就象我们可以信赖你们一样。”"},{"type":"paragraph","text":"林秉南在讲话时说：“中几两国人民在反对帝国主义的共同斗争中锤炼了亲密的战斗友谊。”“我们坚信，随着我们的共同努力，中几两国之间的友好合作关系以及两国人民之间的友谊，必将不断获得巩固和发展。”"},{"type":"paragraph","text":"招待会自始至终洋溢着友好的气氛。"},{"type":"paragraph","text":"我驻刚果（布）大使馆临时代办李琛光一日晚上举行招待会，热烈庆祝中华人民共和国成立十九周年。"},{"type":"paragraph","text":"刚果（布）外交部长尼古拉·蒙乔，刚果（布）全国革命委员会常务书记安德烈·乔治·穆亚比，全国革命委员会负责宣传工作的书记马丹·姆贝里，新闻部长马顿帕—姆波洛，以及刚果（布）工会、青年和妇女组织的负责人等五百多人，出席了招待会。"},{"type":"paragraph","text":"驻刚果（布）的一些国家的外交使节也出席了招待会。"},{"type":"paragraph","text":"在招待会上，刚果（布）朋友热烈祝贺毛主席领导下的中国人民十九年来在各方面所取得的伟大胜利，祝贺中国无产阶级文化大革命所取得的伟大胜利。"},{"type":"paragraph","text":"在招待会上，刚果（布）朋友衷心祝愿伟大领袖毛主席万寿无疆，祝刚（布）中两国人民之间的友谊和合作日益发展和巩固。"},{"type":"paragraph","text":"招待会始终洋溢着友好和亲切的气氛。"},{"type":"paragraph","text":"我驻赞比亚大使馆临时代办李振和九月三十日举行招待会，热烈庆祝中华人民共和国成立十九周年。"},{"type":"paragraph","text":"出席招待会的四百位客人中有：赞比亚外交部长鲁·卡曼加，不管部长马·乔纳，自然资源和游览部长科诺索，国民议会议长韦·尼伦达，首席法官布拉格登，政府其他高级官员，赞比亚的各界朋友以及在赞比亚的中非和南非的自由战士。"},{"type":"paragraph","text":"中国代办和赞比亚外交部长在招待会上讲了话。"},{"type":"paragraph","text":"卡曼加代表卡翁达总统讲了话。他说，毛主席是世界上最伟大的领袖之一。他在回顾中国人民和赞比亚人民之间悠久的友谊时说，自从赞比亚独立以来，这种友谊得到了进一步的发展。"},{"type":"paragraph","text":"他说：赞比亚谴责美国对越南的侵略，它还谴责另一个大国对捷克斯洛伐克的侵略。"},{"type":"paragraph","text":"他最后表示向伟大的中华人民共和国，伟大的中国人民和中国人民的伟大领袖毛主席致敬。"},{"type":"paragraph","text":"招待会始终洋溢着热烈友好的气氛。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f426d545ba"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
