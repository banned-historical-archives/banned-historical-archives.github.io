script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"武汉市人民政府对贺衡夫案作出处分决定","authors":[],"dates":[{"year":1953,"month":6,"day":6}],"is_range_date":false,"parts":[{"text":"武汉市人民政府对贺衡夫案作出处分决定","type":"title"},{"text":"武汉市人民政府对贺衡夫案已作出处分决定。","type":"paragraph"},{"text":"贺衡夫原任中南军政委员会委员、中南财政经济委员会委员、武汉市人民政府委员、武汉市协商委员会委员、武汉市工商业联合会筹备委员会主任委员。人民之所以把这些重要职位给他，是希望他能代表民族资产阶级参加国家政权，在共同纲领的范围内，代表私营工商业者的合法利益，团结教育私营工商业者积极地进行有利国计民生的正当经营。然而事实恰恰相反，他不但没有遵照人民对他的期望办事，反而违背了广大人民，特别是武汉市工商业者对他的期望。他利用自己在政府中所担任的各种重要职务以及工商业联合会筹委会主任委员的职务，多方助长和指使不法资本家的“五毒”行为，进行对国家的破坏活动。","type":"paragraph"},{"text":"“五反”运动中，贺衡夫不但不积极参加，反而抗拒破坏，阻止别人坦白，造成某些奸商们对“五反”运动的顽抗，因而引起广大群众的极大愤怒与不满。工商界及广大职工对贺衡夫的丑恶面貌和破坏政府法令等违法行为，纷纷检举与揭发。工商联当即撤销其筹备委员会主任委员的职务，中南军政委员会亦根据当时情况接受广大群众和工商界的要求，呈请中央人民政府政务院批准，撤销其在人民政府所担任的一切职务，并逮捕法办，以平民愤。","type":"paragraph"},{"text":"人民政府为了慎重地查实此案，随即成立了专案小组，以实事求是的态度，对群众检举之材料，多方查对，反复研究，进行全面深入的调查分析，以求核实定案。经过长期缜密查究结果，除有些资本家坦白材料和个别职工的检举材料一部分过于夸大，已予剔除，一部分尚嫌罪证不足外，其罪行仍是严重的。","type":"paragraph"},{"text":"贺衡夫为达到盗骗国家资财的目的，在其直接经营之乾昌贸易行内，即曾先后以人民币一千七百二十九万六千元，向国家的十个机关的十九个干部进行贿赂。仅对湖北省贸易公司干部一人，即行贿达四百七十万元。其次用各种卑鄙手段，偷漏国税计人民币三亿九千七百一十七万元。再次，在与国营企业进行桐油的交易中，蒙蔽国家，盗骗资财计人民币一亿四千六百另三万九千三百二十元。","type":"paragraph"},{"text":"贺衡夫在中南军政委员会委员及中南财经委员会委员任内，拿回发给他参考的、规定限期收回的机密文件：“中南区纺织、卷烟、煤炭、火柴、榨油，五大事业概要，一九五○年下半年产销计划”和“中南区粮食产销情况及调剂办法”等十二份，动员多人连夜抄写，严重地泄漏了国家机密。他又把中南区木材会议关于木材统一调配计划的机密文件，泄露给汉阳竹木业，因此木材商到湖南去抢购，造成产地木材暴涨的混乱现象，使国家财产遭受损失。","type":"paragraph"},{"text":"贺衡夫行贿干部、偷漏税收、泄露国家机密、盗骗国家财产、抗拒破坏“五反”等等违法罪行是极端严重的。但因其在被押期间尚能低头认罪，表示悔过，武汉市人民政府仍本严肃与宽大相结合的精神，特予从宽处理，已经呈请中央人民政府政务院批准，撤销贺衡夫在人民政府中所担任之一切职务，并根据在“五反”运动中关于工商户分类处理的标准和办法，判定其为完全违法户；但免予刑事处分，并自判定之日起释放。","type":"paragraph"}],"comments":[],"origin":"《人民日报》1953年6月6日","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2c3a3b7a8b"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
