" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"郧县破获一反革命暴乱组织——“黑军和平党”","authors":[],"dates":[{"year":1957,"month":9,"day":16}],"is_range_date":false,"parts":[{"text":"郧县破获一反革命暴乱组织——“黑军和平党”","type":"title"},{"text":"新华社武汉16日讯　最近，由襄阳军分区张司令员和中共郧县县委副书记率领的一支公安部队在广大群众密切地配合下，以半个月时间消灭了正在力图向我发动更大规模暴乱的反革命组织——“黑军和平党”。匪首李光全、汤有昌、刘明善等十六个被活捉、四人被打死、三人被打伤，并依法逮捕了策动暴乱的骨干分子三十一人。缴获暴动武器：步枪四支、子弹四百二十二发、刺刀一把、将军炮二门、火药子弹五斤多、大刀四把、手榴弹二枚、阴阳八卦二付、香十八封、表二十一刀等反革命罪证。","type":"paragraph"},{"text":"早在去年12月底，这个反革命组织就开始阴谋策划组织“黑军和平党”，秘密集会，制定反动纲领，到处串连收买地主、富农、反革命分子企图进行武装暴动，妄想推翻人民政权。他们自封李光全、汤有昌为“黑军和平党”党委正副书记，任命骨干分子江华堂、刘明善为“领兵大元帅”。","type":"paragraph"},{"text":"这伙反革命匪帮到处造谣惑众，说今年闰八月要大乱，在劫难逃；说共产党在八月份要搞第三次大镇反，凡是历史上干过伪职的人，在十八岁以上都要逮捕杀光；又说“三八”线已反了三个军头，陕西已被飞机轰炸了；还造谣说他们有“天书”，阴阳八卦，以撒土成兵，拔草成刀，还有上方宝剑，百步之外能取人首级，并威胁群众说，只有参加了“黑军和平党”才能免去灾难。当右派分子向党猖狂进攻的时候，李犯等认为时机已到，反动气焰更加嚣张，扬言要攻打郧阳县城，先打兵役局，劫取枪支，再拿公安局，劫监狱，并提出“打开仓库分粮食”“打开合作社分布穿”“打开银行分票子”等煽惑群众的反动口号。","type":"paragraph"},{"text":"今年7月，这股匪帮流窜在郧县白桑区黄杮坪、南化区太平、东溪、江湾、梅区铺白龙、杨溪区坪圩等乡煽动、威胁当地人民武装暴乱。并三次向我当地民兵武装袭击。","type":"paragraph"},{"text":"8月31日，终于在我公安部队围剿下全部落网。","type":"paragraph"},{"text":" (原载湖北日报“每日情况”)","type":"paragraph"},{"text":"来源：1957年9月18日新华通讯社编《内部参考》。","type":"paragraph"}],"comments":[],"origin":"美国图书馆收藏","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"69e330d472"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
