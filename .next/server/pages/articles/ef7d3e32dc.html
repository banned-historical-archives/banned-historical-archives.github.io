script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji23","name":"毛泽东全集第23卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji23.pdf"],"article":{"title":"在黄河、淮河、运河、平汉之间创造根据地有重大战略意义","alias":"","parts":[{"type":"paragraph","text":"在黄河、淮河、运河、平汉之间"},{"type":"paragraph","text":"创造根据地有重大战略意义"},{"type":"paragraph","text":"（1947年9月11日）陈、粟\"，并告刘、邓，饶、黎，陈、谢及彭副司令："},{"type":"paragraph","text":"（一）陈粟佳辰电悉。郓城、沙土集歼灭五十七师全部之大胜利，对于整个南线战局之发展有极大意义，特向西兵团全军将土致庆贺与慰问之忱。"},{"type":"paragraph","text":"（二）根据来电我军士气甚旺，决迅速转移攻势，给五军以歼灭性打击等语，果能再歼五军一部或大部，使该军失去战斗力，则鲁"},{"type":"paragraph","text":"[1]陈、粟，指陈毅、粟裕，当时分别任华东野战军司令员兼政治委员和副司令员。"},{"type":"paragraph","text":"[2]刘、邓，指刘伯承、邓小平，当时分别任晋冀鲁豫野战军司令员和政治委员。饶、黎，指饶漱石、黎玉，当时分别任华东军区政治委员和副政治委员。陈、谢，指陈、谢富治，当时分别任晋冀鲁豫野战军陈谢集团前委书记和副书记。"},{"type":"paragraph","text":"[3]彭副司令，指彭德怀，当时任中国人民解放军副总司令、西北野战军司令员兼政治委员。"},{"type":"paragraph","text":"[4]佳辰，即9日9时。"},{"type":"paragraph","text":"[5]指沙土集战役。1947年9月7日，华东野战军西兵团在山东巨野以西、菏泽以东的沙土集地区，对国民党军整编第五十七师实施南北夹击，经两日激战，全歼该师9500余人，俘中将师长段霖茂。西南局势大为开展。俟对五军战斗结束后，你们应迅速全军南下，相机攻占成武、定陶、曹县、单县、民权、虞城诸薄弱点，完成下一次作战的机动态势。然后，集结全军休整十天至十五天，利用敌军重新部署的间隙（判断十一师等部将要调来），将师纵军三级缩小为轻便指挥机关，将大量人员补充连队，将各师下面薄弱单位归并调整。只要西兵团有六万至八万精干部队，就是很有力量的野战军。在目前几个月内，你们人员补充主要靠俘虏，应采即俘即补方针。弹药补充主要靠取之于敌。应注意打有准备有把握之仗，同时严整军纪，争取群众，你们就一定能完成在黄河、淮河、运河、平汉之间创造巩固根据地，协助刘邓、陈谢创造鄂豫皖与鄂豫陕两大根据地，协助饶黎谭保卫山东根据地，协助苏中、苏北恢复根据地之伟大任务。你们处在上述四大根据地之中间地带，你们的胜利有重大战略意义。"},{"type":"paragraph","text":"中央"},{"type":"paragraph","text":"真申"},{"type":"paragraph","text":"[1]饶黎，指饶漱石、黎玉。谭，指谭震林，当时任华东野战军副政治委员兼东兵团政治委员。系，该淋及款耐司"},{"type":"paragraph","text":"i2241你小后婴使格"},{"type":"paragraph","text":"小意毛泽东致陈毅等电的手稿。"}],"authors":["毛泽东"],"dates":[{"year":1947,"month":9,"day":11}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":267,"page_end":269},"tags":[{"name":"陈毅","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"饶漱石","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ef7d3e32dc"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
