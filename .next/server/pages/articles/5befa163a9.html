script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"禁核大会小组会斥国内外修正主义破坏阴谋愤怒抗议美帝对越南武装挑衅","authors":[],"dates":[{"year":1964,"month":8,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【据新华社北京5日电】　京都消息:第十届禁止原子弹氢弹世界大会四日在京都和京都附近一百三十一个地方举行了小组会。在每个小组会上，与会者都对美帝国主义向越南民主共和国进行武装挑衅的行为和侵略越南南方的野蛮行动表示愤怒。在许多小组会议上，医务工作者和学生报告了他们开展反对日本政府派遭医疗队前往南越的运动的情况，并且呼吁大家通力合作来发展这个运动。"},{"type":"paragraph","text":"在许多会场上，与会者谴责了国内外修正主义者和右翼社会民主主义者企图分裂第十届世界大会的阴谋。"},{"type":"paragraph","text":"各地代表还介绍了胜利举行“百万人集会”的丰富经验。他们异口同声地指出，“百万人集会”的胜利保证了世界大会的胜利。代表们说，他们挨户访问居民家庭，控诉美帝国主义武装侵略印度支那的罪行，获得了广大居民的支持。"},{"type":"paragraph","text":"中国、阿尔巴尼亚、朝鲜、印度尼西亚、苏丹、西南非洲、桑给巴尔、比利时、瑞典、澳大利亚和亚非作家会议等外国和国际组织的代表参加了小组会。"},{"type":"paragraph","text":"以张香山为首的十名中国代表分为四组分别参加了小组会。中国代表在会上讲话时强调指出，第十届禁止原子弹氢弹世界大会获得了辉煌胜利，这个胜利是在大会全体与会者坚持团结和统一进行斗争的结果。通过大会，以苏联代表团团长茹科夫为首的分裂主义者破坏世界大会的阴谋被彻底揭穿，他们的阴谋遭到彻底失败，终于从大会逃跑。第十届世界大会给维护世界和平的运动指明了正确的方向。在日本人民反对美帝国主义、争取民族独立、维护和平的斗争中，中国人民永远站在日本人民一边。他们是日本人民最可靠的战友。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5befa163a9"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
