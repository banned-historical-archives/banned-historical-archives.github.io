script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"日极右翼炮制反动影片　公然美化战犯东条英机","authors":["于青"],"dates":[{"year":1998,"month":5,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"日极右翼炮制反动影片"},{"type":"paragraph","text":"公然美化战犯东条英机"},{"type":"paragraph","text":"本报东京5月8日电  记者于青报道：一部名为《自尊——命运的瞬间》的影片连日来在东京举行试映会。这部公然为二战甲级战犯东条英机歌功颂德，否认日本侵略历史的影片引起日本有识之士的愤怒谴责。"},{"type":"paragraph","text":"影片《自尊》以远东国际军事法庭对日本战犯的审判经过为主线，故意表现法庭审判“缺乏公正”，渲染东京审判“不是现实正义，而是胜利者对失败者的报仇”；《自尊》以甲级战犯东条英机为主人公，公然宣扬他“无罪”，“是日本民族的自豪”，鼓吹他“为了尊严和事实而斗争到最后”；对于南京大屠杀，影片借剧中人物之口认为是“以传闻为证据的夸张”；对于珍珠港事件，影片认为是“日本面临美国威胁而采取的自卫行动”。片名《自尊》显然是针对把正视历史视为“自虐”而蓄意策划的。"},{"type":"paragraph","text":"该影片是日本少数极右势力在历史问题上的代言作品。影片的策划者之一中村功是日本右翼团体“渔火会”的赞助者，他还是右翼团体“青年自由党”党首。该影片制作委员会代表加濑英明是所谓“教科书正常化国民会议”的发起人。影片制作者对舆论界公开宣称，“我们想在电影中主张日本没有进行过侵略战争”，要“通过这部影片改变日本国民的历史认识”，“电影是达到此目的的有效手段”等。"},{"type":"paragraph","text":"日本有识之士日前组成“批判电影《自尊》之会”，愤怒谴责影片《自尊》为军国主义辩护的险恶用心。该组织的成立声明说，影片《自尊》歪曲历史事实，推卸侵略和加害的责任，是对日本国民希望和平的背叛；该会要让更多的国民知道影片《自尊》的危险本质，唤起舆论的注意。"},{"type":"paragraph","text":"日本电影复兴会议代表委员、电影评论家山田和夫指出，与日本同为二战元凶的德国，虽然有希特勒出现的影片，但从未出现过肯定希特勒和纳粹的影片。希特勒、墨索里尼和东条英机是各国人民的共同敌人，这已成为世界爱好和平人民的共识，显而易见，影片《自尊》是与这一共识相背离的产物。"},{"type":"paragraph","text":"据悉，电影《自尊》将于近期在日本各地公开上映。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"45131e4b25"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
