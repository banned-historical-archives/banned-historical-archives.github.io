script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"听毛主席的话　与群众心连心","authors":["李杏娣"],"dates":[{"year":1976,"month":9,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"嘉善路菜场　李杏娣"},{"type":"paragraph","text":"在沉痛悼念伟大领袖和导师毛主席逝世的日子里，我缅怀毛主席的丰功伟绩，决心继承毛主席的遗志，坚持以阶级斗争为纲，坚持党的基本路线，坚持无产阶级专政下的继续革命。"},{"type":"paragraph","text":"我是一个菜场营业员。我从实践中体会到，要继承毛主席的遗志，走继续革命的道路，很重要的一条，就是必须按毛主席的既定方针和一贯教导办，坚持批判和限制资产阶级法权，和群众心连心。我们天天和商品、货币打交道，蔬菜又是大家天天都需要的商品，所以稍不警惕，等价交换的原则就会影响、侵袭我们，使菜场偏离社会主义方向。文化大革命以来，特别是学习了无产阶级专政理论，我们反复批判了刘少奇、林彪、邓小平推行修正主义路线、扩大资产阶级法权的罪行，自觉地用毛泽东思想为武器，掌握好商品分配权。几年来，我们坚持批判资产阶级法权，抵制“资产风”，坚持了对困难户送菜上门，坚决不搞“近水楼台先得月”。我们还根据蔬菜供应的特点，采取了一系列方便工农兵的新措施，深受广大工农兵的欢迎。"},{"type":"paragraph","text":"无产阶级文化大革命中，广大群众把我推上了领导岗位。地位变了，职务变了，考验更多了。如何坚决抵制资产阶级法权观念的侵蚀，成了思想革命化的一个重要内容。我学习了《法兰西内战》等马列著作，学习了毛主席关于社教运动的批示，认识有了新的提高。在旧社会，我十一岁当地主的丫头，十五岁做资本家的佣人，是党和毛主席把我从苦海中救出来，是毛主席革命路线指引我走上了革命的道路。几年来，我牢记毛主席关于不要脱离劳动，不要脱离群众的教导，每天早上四时左右就到菜场，同大家一起劳动，不搞特权。去年，组织上因为我居住困难，配给我一大间公寓房子。我想，还有比我更困难的同志，我是共产党员，又当了区委委员，更应该自觉限制资产阶级法权。于是，我主动放弃了这间房子。后来，房管所又分配了一间离菜场较近、结构与我原屋相仿的房子，我才搬了进去。斗争的实践，使我深深体会到，只有批判和限制资产阶级法权，才能同群众划等号，始终保持普通劳动者的本色。"},{"type":"paragraph","text":"伟大领袖毛主席和我们永别了。在这万分悲痛的时刻，追思毛主席指挥我们战斗的历程，我更加深切地体会到，只要我们按毛主席革命路线办，我们就无往而不胜。毛主席是全心全意为中国人民和世界人民谋利益的光辉典范。战无不胜的毛泽东思想的光辉，将永远照耀着中国人民前进的道路。我决心重读《毛泽东选集》一至四卷，继续学习毛主席文化大革命以来的一系列光辉指示，坚持批判和限制资产阶级法权，以伟大领袖毛主席为光辉榜样，全心全意地为人民服务，坚持无产阶级专政下的继续革命，把毛主席开创的无产阶级革命事业进行到底!"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"限制资产阶级法权","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"477d99b6f5"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
