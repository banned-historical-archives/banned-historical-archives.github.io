script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"听毛主席的话，做工农的好儿女","authors":["章曼玲"],"dates":[{"year":1968,"month":8,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"一九六六届初中毕业生　上海市第六中学红卫兵　章曼玲"},{"type":"paragraph","text":"整装待发，英姿飒爽。"},{"type":"paragraph","text":"二十九年前，我们最最敬爱的伟大领袖毛主席就教导我们:“看一个青年是不是革命的，拿什么做标准呢?拿什么去辨别他呢?只有一个标准，这就是看他愿意不愿意、并且实行不实行和广大的工农群众结合在一块。”毛主席的殷切期望，谆谆教导，我们永远铭记在心里，溶化在血液中，落实在行动上。"},{"type":"paragraph","text":"敬爱的毛主席呀，是您风尘仆仆，跋山涉水，深入工农大众之中；是您下农村，去乡间，在油灯下与老贫农促膝谈心，询问劳苦大众的疾苦；是您考察运输巷，深入掌子面，与矿工亲切交谈；……又是您把珍贵的礼品——芒果转送给首都工农毛泽东思想宣传队。毛主席啊，您总是和工农同呼吸，共命运，心连心。您的伟大实践，照亮了我们革命青年的前程，给我们开辟了与工农兵相结合的广阔道路。"},{"type":"paragraph","text":"“走毛主席的路，到工农中去”，我们革命红卫兵下定决心，一辈子拜工农为师，一辈子当工农的小学生，一辈子做工农的好儿女。"},{"type":"paragraph","text":"中国赫鲁晓夫为了实现他复辟资本主义的黄粱美梦，拼命推行反革命修正主义教育路线，在教育这块阵地上，设置了一座座“小宝塔”，绘制了一张张“升官图”。在这里，有多少青年学生消耗了革命的青春，有多少天真烂漫的孩子进入“小宝塔”之后，戴着近视眼镜，拖着瘦弱的身子出来。在修正主义教育路线统治下，一架架“私”字的精神枷锁，一副副“修”字的思想脚镣，害得我们手不能提，肩不能挑，严重脱离工农，脱离实际，脱离无产阶级政治，有些人竟成了“三脱离”的“精神贵族”。我们还能让这种现象继续存在下去吗?不能!不能!万万不能!我们要砸烂“小宝塔”，撕毁“升官图”。"},{"type":"paragraph","text":"“打倒阎王，解放小鬼”，红司令一声令下，红小兵紧紧跟上，我们冲破一切阻力“杀”出来了，“杀”向工农群众中去，“杀”向三大革命运动中去，把那“私”字的枷锁，“修”字的镣铐，打个粉碎!"},{"type":"paragraph","text":"在我们广大红卫兵奔赴农村的时候，也有那么一些人徬徨着，徘徊着，他们拎着封建主义的黑货，资本主义的破烂，嘟嘟嚷嚷:“我的知识要打入冷宫了”，这些人就是死抱“读书升官图”不放，一心想着“下乡数载，班师回朝”，当官做老爷。对于封建主义、资本主义的一套，我们岂止把它打入“冷宫”，还要把它打入十八层地狱，使它永世不得翻身。也有那么一些人，他们言行不一，表里不一，台上唱高调，台下没行动。这种阳奉阴违的两面派作风，必须彻底扫除干净!"},{"type":"paragraph","text":"伟大领袖指方向，刀山火海也敢上。“面向农村，面向边疆，面向工矿，面向基层”，无产阶级司令部的战斗号令，金光闪闪的十六个大字，表达了亿万革命青年与工农相结合的心愿，我们一千个拥护，一万个照办。"},{"type":"paragraph","text":"红心向阳献忠心，“四个面向”当先锋。“四个面向”彻底宣判了封、资、修教育路线的死刑，是防止资本主义复辟的战略措施，给我们指出了唯一正确的广阔道路，这条路，我们要走一辈子，一辈子走定了!"},{"type":"paragraph","text":"敬爱的毛主席啊，在这欢度“八·一八”的盛大节日里，我们仰望您的光辉画像，幸福地回忆起两年前您佩戴红袖章接见我们的激动情景，我们牢记您的教导:“农村是一个广阔的天地，在那里是可以大有作为的。”我们向您庄严宣誓:读一辈子您的书，走一辈子您指引的路，一辈子斗私批修，一辈子做工农的好儿女。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"88fd12123e"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
