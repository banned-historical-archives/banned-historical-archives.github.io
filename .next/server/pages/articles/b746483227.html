script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"王士章反党反苏面目暴露，公开叫嚣“取消人民民主制度”疯狂反对党的领导，财经学院教师责令他交代同右派的串连关系","authors":[],"dates":[{"year":1957,"month":8,"day":18}],"is_range_date":false,"parts":[{"text":"王士章反党反苏面目暴露，公开叫嚣“取消人民民主制度”疯狂反对党的领导，财经学院教师责令他交代同右派的串连关系","type":"title"},{"text":"【文汇报讯】 上海财经学院讲师、右派分子王士章的反动面目，在该院教师的揭发下，已无法遁形。","type":"paragraph"},{"text":"在整风运动开始时，王士章直截了当地提出“取消人民民主制度”的主张。他公开地说:“党的整风是唯心的，不能根本解决问题，要解决问题就必须从行政制度和管理方法上改革”，“官僚主义宗派主义是由于行政制度与管理方法”，又说:“我所讲的制度即经济制度，是指国营企业和集体农庄，而行政和管理制度即指民主集中制”。","type":"paragraph"},{"text":"王士章从各个方面来攻击党的领导和党的政策。他恶毒地说:“共产党从中央以至于地方，标榜是唯物主义，其实是有史以来的最大的谎言，是彻头彻尾的唯心主义”。他公开叫嚣共产党退出文化科学部门。他说:“现在社会科学水平不高是由于党管得多”，“我反对党对文化、科学、社会科学的领导”。王士章从心底里仇视共产党、仇视社会主义。他污蔑今天的社会是“一个新的封建时期”。","type":"paragraph"},{"text":"王士章蓄意歪曲马克思主义。他自称是“90%以上的马列主义者”，企图披上马列主义外衣后来攻击马列主义。但是这个与马列主义毫无姻缘的右派分子，却连马列主义外衣也披不上，说什么“修正主义也是马列主义”、“我同意修正主义”、“政治经济学没有学头，深入下去也没有什么东西”、“联系实际就是实用主义”等等，这种恶毒而又拙劣的谬论，只能暴露他自己反动的本性。","type":"paragraph"},{"text":"王士章反对社会主义，反对苏联社会主义建设的成就，他说:“学习什么外国文都有用，包括最小的国家在内，只有学习俄文没有用，因为俄文书中没有一本是有价值的。”王士章仇视苏联可以说是到疯狂的地步，连苏联的民族也受到他的诅咒，说“斯拉夫民族是奴隶民族，血统有问题”；同时，他也反对我们学习苏联。","type":"paragraph"},{"text":"在整风期间，王士章四出组织力量向党进攻，他写了一封很神秘的信给该院教师陈永秉，要陈“勿要在校内”打电话约他见面，“勿与人谈起你找我之事”。他还和华东纺织工学院、上海经济研究所筹备处等单位的右派分子有密切的联系。","type":"paragraph"},{"text":"最近，在大量的事实面前，王士章开始交代自己反党反社会主义罪行。但是，他的检讨仍是避重就轻，不老实也不彻底。该院教师要他继续交代反动言行和与右派分子的串连事实。","type":"paragraph"},{"text":" ——原载《文汇报》1957年8月18日。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b746483227"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
