script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"苏修集团和爱伦堡都是不齿于人类的狗屎堆  老牌修正主义文人大叛徒爱伦堡病死　勃列日涅夫之流如丧考妣","authors":[],"dates":[{"year":1967,"month":9,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"苏修集团和爱伦堡都是不齿于人类的狗屎堆"},{"type":"paragraph","text":"老牌修正主义文人大叛徒爱伦堡病死　勃列日涅夫之流如丧考妣"},{"type":"paragraph","text":"新华社十一日讯　莫斯科消息：苏联老牌修正主义文人，苏修领导集团的得力打手爱伦堡，最近病死。"},{"type":"paragraph","text":"爱伦堡死后，勃列日涅夫、柯西金之流以苏共中央、苏联最高苏维埃主席团和苏联部长会议的名义，替他发了讣告并献花圈。这个讣告对爱伦堡的死表示“非常沉痛”。他们还派出了苏联最高苏维埃主席团秘书格奥尔加泽、民族院主席帕列茨基斯前往守灵。"},{"type":"paragraph","text":"爱伦堡是一个十足的投机分子和反革命。他在一九○五——一九○七年俄国革命形势大好时混进革命队伍。一九○八年被沙皇当局逮捕，这个胆小鬼吓破了胆，被释放后即逃往法国，背叛了革命。直到三十年代，他才又投机回到苏联定居，用他自己的话说，要在苏联“占据自己的一席地位”。他说，他这时也“并没有放弃”他“过去所珍视的东西”，他用“咬紧牙齿”、“沉默”来隐蔽他对无产阶级专政和社会主义制度的仇视。"},{"type":"paragraph","text":"我们伟大的领袖毛主席指出：凡是要推翻一个政权，总要先造成舆论，总要先做意识形态方面的工作。革命的阶级是这样，反革命的阶级也是这样。苏修领导集团之所以特别赏识爱伦堡，也正是因为他在苏修集团复辟资本主义的活动中，是最早跳出来进行反革命舆论准备的一个。"},{"type":"paragraph","text":"这个反革命两面派在伟大的马克思列宁主义者斯大林逝世时，用最美好的词句来赞扬斯大林，可是刚过了半年，他就迫不及待地抛出他早已写成而迟迟不敢出笼的毒草《谈作家的工作》，诬蔑苏联的革命文艺“表现的并不是人，而是机器”，鼓吹要写什么就写什么，写社会上的“不健全现象”等等，赤裸裸地向无产阶级专政和社会主义制度进攻。"},{"type":"paragraph","text":"一九五四年，爱伦堡抛出了恶毒攻击斯大林的长篇小说《解冻》。在爱伦堡带头下，反对社会主义制度的“作品”纷纷出笼，形成了被西方资产阶级称为“解冻文学”的一股反动黑潮。"},{"type":"paragraph","text":"苏共二十大公开扯起大反斯大林、大搞资本主义复辟的黑旗以后，爱伦堡更是苏修集团的黑先锋。他公开咒骂斯大林是“暴君”，无产阶级专政是“暴政”。他拚命渲染战争恐怖，说什么“战争意味着不单是杀人，而且是自杀”；竭力美化帝国主义，说什么肯尼迪之流“有善良愿望和理智”；鼓吹向帝国主义投降，说什么“这是死对生的投降”。他猖狂反华，恶毒攻击伟大的毛泽东思想。在文学艺术方面，他公开鼓吹资产阶级用以骗人的、所谓超阶级的“人性”、“人类之爱”等等，赞扬帕斯捷尔纳克之流叛徒作家和现代主义、形式主义之类西方颓废艺术流派。他还恬不知耻地公开表示自己信仰“我思故我在”的唯心主义观点。"},{"type":"paragraph","text":"苏修集团把这样反动的资产阶级分子吹捧为“杰出”人物，使广大苏联人民再一次看清楚，苏修集团也就是一批与爱伦堡同样货色的不齿于人类的狗屎堆。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6e78bd5adb"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
