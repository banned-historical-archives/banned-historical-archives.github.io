script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"周恩来对卫生部革命派去××的医疗队做重要指示","authors":["周恩来"],"dates":[{"year":1967,"month":6}],"is_range_date":false,"parts":[{"text":"周恩来对卫生部革命派去××的医疗队做重要指示","type":"title"},{"text":"周恩来","type":"authors"},{"text":"（摘要）","type":"subtitle"},{"text":"你们医疗队下去有五个任务","type":"paragraph"},{"text":"1．了解农村人民生活卫生习惯。你们医疗队有没有西北人？(刘：整个医务人员中××人很少)。所以我要你们去××，去了解了解××情况。现在不是有人要批判李先念吗？李先念同志对××情况很熟悉，他带着队伍在那里走到××，保存了大批干部。在我们高级干部中，走过那里的只有李先念同志，可能军队里还有王树声同志。","type":"paragraph"},{"text":"2．治疗疾病。","type":"paragraph"},{"text":"3．开展夏季爱国卫生运动。首先要调查研究，要有阶级分析。调查要公开进行。不要搞刘少狗的办法，秘密进行，扎根串连。调查十天半月，再搞爱国卫生运动。爱国卫生运动在　　地区不好进行，当地水少，吃生菜洗干净不易做到，明矾沉淀也不易做到。中暑用什么有效措施？措施不多，食物中毒从现在看出不是严重问题，重要的问题是疾病治疗。所以我把你们的第三条治病任务放到前边去了，换了一下秩序。","type":"paragraph"},{"text":"4．广泛进行卫生常识的宣传。生活习惯，疾病掌握住了，再搞爱国卫生运动，就好进行了。把北京的经验带去。老爷卫生部有老爷，问题主要在领导，但北京的有经验医生、护士中也有老爷式的医生、护士。这次我有意识地把医生派到最艰苦的地方去锻炼。","type":"paragraph"},{"text":"5．培训农村卫生员。此工作可以实践实践。主席主张速成，给个七天十天时间，培养一些能打针换药的不脱产的卫生员，如能训练一个班，十几个人，二十几个人都可以。试办七天十天时间不算少了。医疗队任务共是五条，一、二条任务必须做好，三四条任务，要因地而宜，第五条如当地有些房子，可以十天半月地试办，增加不脱产卫生员，相机而行。医疗队的时间暂定一个半月，由到达目的地时算起。工作完成后，如愿意留下可以考虑，但不要强加于人。如果每队愿意长期留下工作的，七月下旬回来报告。","type":"paragraph"},{"text":"医疗队也是工作队，是毛泽东思想宣传队，要高举毛泽东思想伟大红旗，首先要深入调查贯彻毛主席的6·26指示。老爷作风，城市观点都要不得。当地农民最劳苦，落后的地方就要有人去支援去改变面貌。这个队仅是先遣队，有愿留在当地的更好，就是做个试点。老爷部以前搞的通县平务、句容、麻城、湘阴几个大工作组，这是锦上添花，我们是雪中送炭。他们没有执行主席指示。这次×××多人下去，能有1/10留下，我就很高兴了，超过更好，也许我把困难看多了些。这是主席思想，今天的报纸有一段很重要，这是1964年7月在《九评》内主席亲自加的。“在政治思想领域内，社会主义同资本主义谁胜谁负的斗争，需要一个很长的时间才能成功。在时间问题上，与其准备短些，宁可准备长些；在工作问题上，与其看得容易些，宁可看得困难些。这样想，这样做，较为有益，而较少受害。”你们一定要抽时间好好学习这篇文章。(指《红旗》杂志67年第十期初论：《无产阶级专政下进行革命的理论武器》)","type":"paragraph"},{"text":"。","type":"appellation"}],"comments":[],"origin":"周良霄、顾菊英编《疯狂、扭曲与堕落的年代》之二——《十年文革中首长讲话传信录》, 2009。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"李先念","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"指示"}]},{"id":"chuanxinlu3","name":"十年文革中首长讲话传信录（下册）","internal":false,"type":"pdf","official":false,"author":"周良霄,顾菊英","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/十年文革中首长讲话传信录3.pdf"],"article":{"title":"周恩来对卫生部革命派去××的医疗队做重要指示","parts":[{"type":"title","text":"824.周恩来对卫生部革命派去××的医疗队做重要指示"},{"type":"paragraph","text":"(1967年6月)"},{"type":"paragraph","text":"总理：你们医疗队下去有五个任务"},{"type":"paragraph","text":"1．了解农村人民生活卫生习惯。你们医疗队有没有西北人？(刘：整个医务人员中"},{"type":"paragraph","text":"人很少)。所以我要你们去"},{"type":"paragraph","text":"，去了解了解"},{"type":"paragraph","text":"情况。现在不是有人要批判李先念吗？李先念同志对"},{"type":"paragraph","text":"情况很熟悉，他带着队伍在那里走到××，保存了大批干部。在我们高级干部中，走过那里的只有李先念同志，可能军队里还有王树声同志。"},{"type":"paragraph","text":"2．治疗疾病。"},{"type":"paragraph","text":"3．开展夏季爱国卫生运动。首先要调查研究，要有阶级分析。调查要公开进行。不要搞刘少狗的办法，秘密进行，扎根串连。调查十天半月，再搞爱国卫生运动。爱国卫生运动在"},{"type":"paragraph","text":"地区不好进行，当地水少，吃生菜洗干净不易做到，明矾沉淀也不易做到。中暑用什么有效措施？措施不多，食物中毒从现在看出不是严重问题，重要的问题是疾病治疗。所以我把你们的第三条治病任务放到前边去了，换了一下秩序。"},{"type":"paragraph","text":"4．广泛进行卫生常识的宣传。生活习惯，疾病掌握住了，再搞爱国卫生运动，就好进行了。把北京的经验带去。老爷卫生部有老爷，问题主要在领导，但北京的有经验医生、护士中也有老爷式的医生、护士。这次我有意识地把医生派到最艰苦的地方去锻炼。"},{"type":"paragraph","text":"5．培训农村卫生员。此工作可以实践实践。主席主张速成，给个七天十天时间，培养一些能打针换药的不脱产的卫生员，如能训练一个班，十几个人，二十几个人都可以。试办七天十天时间不算少了。医疗队任务共是五条，一、二条任务必须做好，三四条任务，要因地而宜，第五条如当地有些房子，可以十天半月地试办，增加不脱产卫生员，相机而行。医疗队的时间暂定一个半月，由到达目的地时算起。工作完成后，如愿意留下可以考虑，但不要强加于人。如果每队愿意长期留下工作的，七月下旬回来报告。"},{"type":"paragraph","text":"医疗队也是工作队，是毛泽东思想宣传队，要高举毛泽东思想伟大红旗，首先要深入调查贯彻毛主席的6·26指示。老爷作风，城市观点都要不得。当地农民最劳苦，落后的地方就要有人去支援去改变面貌。这个队仅是先遣队，有愿留在当地的更好，就是做个试点。老爷部以前搞的通县平务、句容、麻城、湘阴几个大工作组，这是锦上添花，我们是雪中送炭。他们没有执行主席指示。这次×××多人下去，能有1/10留下，我就很高兴了，超过更好，也许我把困难看多了些。这是主席思想，今天的报纸有一段很重要，这是1964年7月在《九评》内主席亲自加的。“在政治思想领域内，社会主义同资本主义谁胜谁负的斗争，需要一个很长的时间才能成功。在时间问题上，与其准备短些，宁可准
