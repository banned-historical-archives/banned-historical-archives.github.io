script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"在苏联的控制和剥削下  波兰经济困难重重","authors":[],"dates":[{"year":1977,"month":7,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"在苏联的控制和剥削下"},{"type":"paragraph","text":"波兰经济困难重重"},{"type":"paragraph","text":"新华社讯　在苏联对波兰经济的“一体化”控制和剥削下，波兰的经济困难重重。"},{"type":"paragraph","text":"据波兰《人民论坛报》报道，波兰部长会议主席彼·雅罗谢维奇六月三十日在波兰议会上谈到一九七六年波兰的经济情况时说：“不论是（波兰）国外的，还是国内的经济条件都没有能够象预计的那样有利”。"},{"type":"paragraph","text":"他说，波兰“在农业方面，接连三年收成较差，比预计的大为减产。因而，我们不能以自己的储备满足对粮食和饲料的需要，必须大量增加粮食和饲料的进口。”"},{"type":"paragraph","text":"他指出，“最近三年，这种进口达到一千七百万吨以上，其中，我们从苏联购买了三百万吨，尽管在这个时期苏联也有严重的粮食困难。我们在贷款的条件下从（西方）资本主义国家购买了一千四百万吨粮食和饲料。这是短期贷款，因而目前偿还这些贷款已成为国家支付平衡的沉重负担。”"},{"type":"paragraph","text":"他说：“单是在一九七六年，我们就从（西方）资本主义国家购买了近七百万吨粮食和饲料，价值十亿多美元，这比一九七五年这一进口的价值增加了百分之六十左右。”"},{"type":"paragraph","text":"然而他说：“尽管如此，一九七五年和一九七六年仍然出现了牲畜头数的下降”。"},{"type":"paragraph","text":"他还说：“今年的形势仍然是复杂的。因为屠宰牲畜的收购仍保持低水平。上半年屠宰牲畜的收购比去年同期减少了百分之八以上。我们又作出上半年从国外购买十五万吨肉和炼成油脂的决定。即使如此，还是不能使市场供应保持在去年的水平上。”"},{"type":"paragraph","text":"波兰部长会议主席说：“国内食品加工成本费用在不断增加，而且粮食、饲料和食品的进口正在增加，价格越来越贵，这就给国家的支付平衡带来了过度的负担。”"},{"type":"paragraph","text":"他还说：“去年我们所碰到的许多问题的后果，将影响到最近几年的经济。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8961c9f944"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
