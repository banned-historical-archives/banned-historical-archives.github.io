script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"华国锋主席会见赞比亚贵宾同乔纳特别助理、马西耶大使等进行了亲切友好的谈话","authors":[],"dates":[{"year":1977,"month":8,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京一九七七年八月二十三日电　华国锋主席今天下午会见了赞比亚共和国总统政治事务特别助理马克·乔纳和夫人。"},{"type":"paragraph","text":"赞比亚驻中国大使安·西·马西耶和夫人、大使馆外交官员参加了会见。"},{"type":"paragraph","text":"宾主合影以后，华主席同乔纳特别助理、马西耶大使和大使馆外交官员进行了亲切友好的谈话。谈话时，乔纳向华主席转达肯尼思·戴维·卡翁达总统的亲切问候，并热烈祝贺中国共产党第十一次全国代表大会的胜利召开。华主席请乔纳特别助理回国以后向肯尼思·戴维·卡翁达总统转达他的良好祝愿，并感谢他对我党十一大的祝贺。"},{"type":"paragraph","text":"参加会见和谈话的有外交部部长黄华、副部长何英。"},{"type":"paragraph","text":"\u003cIMG alt=请插入7号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1977\\08\\778o050101.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e华国锋主席八月二十三日会见了赞比亚共和国总统政治事务特别助理马克·乔纳和夫人。图为华主席同乔纳特别助理进行亲切友好的谈话。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入7号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1977\\08\\778o050102.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e华主席同乔纳特别助理和夫人等贵宾合影。"},{"type":"paragraph","text":"新华社记者摄(传真照片)\u003c/FONT\u003e"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"华国锋","type":"人物"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c8c0737672"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
