script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"所谓“教授治校”和“民主办学”实质是要取消党的领导谢秉仁在四川省委统战部座谈会上驳斥修正主义谬论","authors":["夏群"],"dates":[{"year":1957,"month":6,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报成都讯】　九三学社成都分社副主任委员、成都工学院教务长谢秉仁教授21日在中共四川省委统战部座谈会上严正驳斥了“教授治校”、“民主办学”以及由学术委员会或校务委员会领导高等学校的修正主义谬论。"},{"type":"paragraph","text":"他说，散布这些谬论的人持有两种理由:一种认为高等学校的工作一塌糊涂，这是学校党委是外行之故，因此他们认为党委治校要不得，必须由内行专家来干；一种是认为过去搞思想改造和教学改革，党委可以领导，今后要提高学术水平和教学质量，党委就领导不了，因此必须由内行专家来领导。"},{"type":"paragraph","text":"谢秉仁分析道:几年来在党委领导下，高等学校的工作是取得了很大成绩的，教师们业务水平的提高，科学研究工作的开展，教学和科学研究设备的增长以及学校发展的规模，都是反动统治时期所梦想不到的。但有些人却不愿面对这个现实，甚至连自己的成绩也一概否定。谢秉仁说，这是因为他们把自己的主观意识当成了第一性的东西，在脑子里虚构了一个理想的完美的高等学校，以此来衡量一个刚刚诞生的、困难重重的新型的社会主义学校，当然样样都不能称心如意了，因而得出了“否定一切”的结论。但有的人并不到此为止，他们进而付诸行动，形成集团，大肆活动，开始由对党刁难对立逐步变成与党形成敌对的立场。"},{"type":"paragraph","text":"谢秉仁认为，“教授治校”、“民主办学”、学术委员会或校务委员会领导高等学校等口号，是资产阶级为了掩盖他们对高等学校的政治阴谋而伪造的谎言。他以解放前的重庆大学为例，当时的校长是主张教授治校的，但结果是三害五毒把持了学校；至于清华大学，解放前也是号称教授治校、民主办学的，事实上除了少数人把持和国民党操纵判，还多了一个美国老板。主张教授治校、民主办学的人对这些情况并不是不知道，只是因为他们想要党下台，让内行专家上台，因此才不得不搬出这块资产阶级的遮羞布来。至于主张由学术委员会或校务委员会来领导高等学校的人，也不过是为了实现他们由内行专家治校、削弱党的领导的一种遁词而已。"},{"type":"paragraph","text":"谢秉仁说，高等学校是培养社会主义建设人才的场所，因此阶级性不容丝毫忽视。最近各地有些学生要求不考政治课以及教职员思想上的混乱情况，足以证明高等学校中党的领导不但不能削弱，而且还需要加强。(夏群)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ea20df941f"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
