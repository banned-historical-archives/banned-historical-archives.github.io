script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"苏修集团全面推行修正主义教育路线竭力推行“专家治校”方针，让资产阶级学阀统治学校　推行“智育第一”，排斥劳动教育，培养修正主义接班人","authors":[],"dates":[{"year":1967,"month":10,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社北京二十八日电　莫斯科消息:苏修领导集团为了适应彻底复辟资本主义的需要，在教育方面全面推行资产阶级办校方针和修正主义教育路线。"},{"type":"paragraph","text":"苏修集团竭力推行资产阶级的“专家治校”的办校方针，使学校成了资产阶级学阀统治的天下。在学校中，他们独断专行，垄断一切。据苏修报刊透露，“在莫斯科大学的三十九人组成的党委会中，有三十名委员是教授和副教授。各系的党组织的情况也是如此。”而执掌大权的大学校长、学院院长等职位，更是非教授、博士之类人物就不能担任。"},{"type":"paragraph","text":"为了培养修正主义接班人，苏修集团在学校中大力推行为其反动政治服务的“智育第一”的方针。苏修头目之一马祖罗夫今年在全苏高等学校工作人员会议上鼓吹，苏联学生的任务就是“熟悉业务”。苏修的资产阶级专家们也公开叫嚷“把知识教育放在首位。”"},{"type":"paragraph","text":"苏修集团在学校中推行“智育第一”的同时，竭力排斥劳动教育。《真理报》刊载的一位副教授的文章，就公然反对劳动教育，说什么“难道脑力劳动就不锻炼意志和性格吗?”这家报纸的一篇社论还公开说:“小学生参加季节性劳动的作法，对教育是有害的。”"},{"type":"paragraph","text":"苏修集团为了复辟资本主义的需要，在教学中向学生大量灌输修正主义毒素。他们编制的《苏联共产党历史》、《马克思主义原理》、《马克思主义哲学原理》等等教科书，以及他们新开设的《社会学》、《共产主义原理》等课程，都是些反马克思列宁主义、反毛泽东思想的修正主义黑货。这些教科书鼓吹什么共产主义就是“人道”，大反斯大林和无产阶级专政，贩卖“全民党”、“全民国家”的谬论，为资本主义复辟制造“理论”。"},{"type":"paragraph","text":"苏修集团用资产阶级名利思想毒害青年一代。苏修头目勃列日涅夫公开鼓吹，上学就是为了当“专家”，当“干部”，柯西金也说什么，青年要当“名列世界科学史册的杰出科学家以及天才的青年科学家”。"},{"type":"paragraph","text":"苏修集团采取了不少措施，大搞“物质刺激”来鼓励学生追名逐利。他们用资产阶级的“学衔”制度来“刺激”科研人员。写了一篇得到苏修集团赏识的所谓“学术论文”，就有可能得到这样或那样的“学衔”，一有了“学衔”，工资马上可以大大增加，名利双收。在苏联，学生的助学金、奖学金就是根据分数发的，分数高的得钱多，分数低的得钱少以至扣发助学金。苏联《共青团真理报》去年决定为五所师范学院设立奖学金时明确规定，奖学金“根据考试结果”颁发。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4cc60e8fb2"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
