" crossorigin="">{"props":{"pageProps":{"books":[{"id":"173b340b-3108-4ae1-be57-d3fa78bb471a","name":"毛泽东思想万岁（1943-1949卷）（1968年武汉版）","internal":true,"official":false,"type":"pdf","author":"1968年5月，钢二司武汉大学总部、中南民院革委会宣传部、武汉师院革委会宣传部","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives3/main/173b340b-3108-4ae1-be57-d3fa78bb471a.pdf"],"article":{"title":"一九四七年三月十八日撤离延安时的讲话","alias":"","parts":[{"type":"paragraph","text":"克。而我们在边区的部队只有二万人，我们在武器方面，基本上是小米加步枪。在这种情况下，敌人在数量方面与武器方面，虽然比我们优越，可是我们还要看到边区地形险要，群众条件好，旋余地大，只要我们有一个正确作战方针，我们一定能战胜敌人。我们的作战方针是敌深入牵着敌人的鼻子在山里周旋，把敌人磨得十分疲劳的时候，十分缺乏粮食的时候。然后寻找机会消灭它，这就是磨菇战术。蒋介石占领延安这决不是他们的胜利，而是搬起石头打自已的脚，他们不久就要倒霉的。"},{"type":"paragraph","text":"我们的作战目的是以消灭敌人有生力量为主，而不是以保守一个地点为主。只要我们能大量消灭敌人的有生力量，我们将来就可以恢复失地，且能够夺权新的地方。因此，有人失地，人地则存，存地失人，人地皆失。现在我们主动放弃延安，就是这个道理。"},{"type":"paragraph","text":"你们回去给战士们讲一。一年，最多两年我们还要回延安来，到那时，延安就永远是人民的了。"},{"type":"paragraph","text":"一九四七年三月十八日撤离延安时的耕话"},{"type":"paragraph","text":"一九四七年三月十八日撤离延安时敌人越来越近十几里枪炮声都可以听到，机关群众都已陆续撤走，大家劝主席快走，主席：不要紧，来得及，大路朝天一人半边，他走他的，他们到那个山头，我就到这个山头，怕什么，没有什么可怕的。"},{"type":"paragraph","text":"给内蒙人民代表大会的贺电"},{"type":"paragraph","text":"（一九四七年五月十九日）亲爱的内蒙人民代表大会全体代表们："},{"type":"paragraph","text":"你们五月十七日来电收到了。会经受困难的内蒙同胞在你们颌导之下，正在开始创造自由光明的新历史。我们相信：内蒙民族将与汉族和其他民族亲密团结，为着扫除民族压迫与封建压迫，建设新蒙古与新中国而奋斗。庆祝你们的胜利。"},{"type":"paragraph","text":"（《人民日报》一九四七年五月二十二日）给各野战军首长的指示"},{"type":"paragraph","text":"（一九四七年八月二十八日）"},{"type":"paragraph","text":"在目前情况，给敌以歼灭与给敌以歼灭性打击，必须同时注意，给敌以歼灭是将敌整旅整师干净全部地加以歼灭不使漏网，执行这一方针，必须集中三倍或四倍于敌之兵力，以一部打敌正面，另一部包围敌之两翼，而以主力或重要一部迁回敌之四方，即是四面包围敌军，方能奏效，这是我军作战的基本观点，这是在敌军分散孤立，敌援兵不能迅速到达之条件下必须实行的正确方针。但在敌军分数路向我前进，每路相距不远，或分数路在我军前进方向实行防堵，每路亦相距不远之条件下，我军应当采取给敌以歼灭性打击的方针，这即是，不要四面包围，只要两面或三面包围，而以我之全力用于敌之正面及其一翼或两翼，不以全部歼敌军为目标，而以歼灭其一部，击其另一部为目标。这样做，可以减少我军伤亡，其被歼之部分可以补充我军，其被击滑之部分可以使其大量逃散，敌能收容者"}],"authors":["毛泽东"],"dates":[{"year":1947,"month":3,"day":18}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":94,"page_end":94},"tags":[{"name":"毛泽东","type":"人物"},{"name":"夺权","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3ea6c7abda"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
