<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"求精仪表厂狠批修正主义办工业路线用土办法造出重要仪器部件","authors":[],"dates":[{"year":1970,"month":4,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　上海静安区求精仪表厂革命工人靠一间房子，两只凳子起家，大搞土设备，作出了出色的成绩。他们在许多兄弟单位的帮助下，只花了短短十天的时间，就试制成功了电子工业的重要仪器部件——13SJ50示波管。"},{"type":"paragraph","text":"求精仪表厂接到试制13SJ50示波管的任务后，试制小组马上派人到外地有关单位去学习。有的同志一看到人家从厂房到设备都是“大、洋、全”，而自己厂里只有一间房子，两只凳子，信心就不足了，想等待设备齐全了再搞。是等，还是闯?工人们立即批判了大叛徒刘少奇的洋奴哲学、爬行主义，提高了认识，增强了勇气。大家决心“闯”字当头，用土办法造出高、精、尖产品。"},{"type":"paragraph","text":"这种示波管上的荧光要经过五百度的高温处理。管供销的同志为了解决这个问题，就千方百计地买来一只电烘箱。试制小组的同志听到烘箱搞到了，高兴得跳了起来，但是一了解，买一只电烘箱要花八千五百元，不由得大吃一惊。买不买呢?有的人说:“生产上需要用，算不上浪费，这次不买就失去机会，再搞就困难了”。供应单位的同志也讲:“你们不要，人家等也等不到”。买还是不买?工人们又学习了毛主席关于“勤俭建国”的方针，狠狠批判了贪大求洋的错误思想。通过大学习和大批判，许多工人认识到，我们街道工厂就是靠“土”字起家的，是毛主席革命路线的产物，自己动手，能够用土办法解决问题，就不该买，要坚持走勤俭办企业的道路。大家统一了认识以后，就退掉了电烘箱。参加试制的工人马上自己动手，土法上马，找了一只旧的柏油桶，绕上几圈电热丝，经过反复改进，达到了使用要求。"},{"type":"paragraph","text":"“网板”是制造示波管的一道关键性工艺，划线机又是加工“网板”的关键设备。这种划线机，过去向社会帝国主义国家进口，买一台要二十五万元。社会帝国主义为了卡我们，还对我们实行禁运。工人们听到这一情况都感到气愤，他们说:“我们一定要自力更生，用自己的力量造出划线机，气死帝、修、反”。经过研究，他们决定自己动手。没有实样，就从生产实际需要出发进行设计；没有加工设备，就请外厂协作。他们发扬了勇敢战斗，不怕牺牲，不怕疲劳和连续作战的作风，经历了十余次的反复试验，攻克了一个又一个的难关，在许多协作单位的帮助下，用一台简易平面小磨床改制成功一台土的划线机，试用证明，效果良好。"},{"type":"paragraph","text":"试制示波管，原来需要投资三十多万元的设备。静安区求精仪表厂的同志打破洋框框，土法上马，只花了一万多元钱，就搞成了十多台土设备，胜利完成了试制任务，经过鉴定，质量完全符合要求。这是贯彻毛主席关于“自力更生”、“艰苦奋斗”伟大方针的又一胜利成果。　(静安区革委会工交组)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"818a51bd2c"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
