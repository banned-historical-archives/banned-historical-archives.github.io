" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"“对苏联不要看脸色行事”","authors":["中国人民大学","潘俊民","陈丘民"],"dates":[{"year":1957,"month":5}],"is_range_date":false,"parts":[{"text":"“对苏联不要看脸色行事”","type":"title"},{"text":"中国人民大学潘俊民陈丘民","type":"authors"},{"text":"“外交工作：对苏联不要看脸色行事，要和苏联完全平等。‘以苏联为首的社会主义大家庭’，这种提法不要，改为‘以苏联为先驱……’。越南提出‘以苏联、中国为首的……’我们不赞成，也不反对，其实应当反对，不要这种不平等。”（中国人民大学新闻系学生  潘俊民）","type":"paragraph"},{"text":"“由于太信苏联，我国外交政策上有错误。自斯大林错误的揭发，李森科错误学说的出现，以及对南斯拉夫态度的转变，故认为我国外交政策上有错误，那就是太相信苏联了，同时思想上产生了我国是否是独立的国家、外交上是否受苏联支配的想法。”（中国人民大学法律系学生　陈丘民）","type":"paragraph"},{"text":"“我们学校近几年来派了一批党员干部，去越南帮助他们建设并美其名曰国际主义，事实怎样呢，被派出这些党员有很多（范公荣、克宁夫）是不学无术，文化水平很低，理论水平不高，业务和知识浅薄，教学经验缺乏，在校时，工作吊儿朗当。试问这些人怎样能帮助兄弟国家建设，但他们从越南回来以后，却发了一笔大财，很多人却带回高级的照相机、收音机、手表、西装，巴黎香水……真是应有尽有，我们不明白，这是国际主义还是发财主义，请宗派主义者公开解答。”（中国人民大学　群鸣）（大字报）","type":"paragraph"},{"text":" 来源：《高等学校右派言论选编》（中共中国人民大学委员会，1958年8月）。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7cfdb16569"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
