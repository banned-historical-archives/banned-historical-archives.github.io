" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji23","name":"毛泽东全集第23卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji23.pdf"],"article":{"title":"四纵第十二旅应在陕南建立根据地","alias":"","parts":[{"type":"paragraph","text":"四纵第十二旅应在陕南建立根据地\""},{"type":"paragraph","text":"（1947年9月26日）陈、谢："},{"type":"paragraph","text":"二十五日二十时电悉。（一）我们只知八十三旅到洛南消息，商县情况不明，望令刘李?自己侦察，机动处理。我们只规定该部大方向是在陕南建立根据地，包括洛南、蓝田、商县、龙驹寨、商南、山阳、柞水、镇安、宁陕等地，遇大敌则避开之，遇小敌及民团则歼灭之，发动群众，建立政权，建立人民武装。（二）东进主力应以神速动作，迁回至新安以东，切断六十四旅退路，然后攻城。同时，要以重兵在新安以东设伏，准备打援敌。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"二十六日二十一时"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军委起草的给晋冀鲁豫野战军陈谢集团前委书记陈和副书记谢富治的电报。"},{"type":"paragraph","text":"[2]指1947年9月25日20时陈、谢富治向中共中央军委询问洛南、商县情况的电报。"},{"type":"paragraph","text":"[3]刘李，指刘金轩、李耀，当时分别任晋冀鲁豫野战军陈谢集团第四纵队第十二旅旅长和政治委员。"}],"authors":["毛泽东"],"dates":[{"year":1947,"month":9,"day":26}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":316,"page_end":316},"tags":[{"name":"谢富治","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e723376995"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
