script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"英资产阶级不满美国损人利己的贸易政策","authors":[],"dates":[{"year":1953,"month":5,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"英资产阶级不满美国损人利己的贸易政策"},{"type":"paragraph","text":"【新华社二十八日讯】伦敦消息：关于艾森豪威尔政府在对外贸易政策方面所采取的言行不一、损人利己的做法，近来在英国资产阶级报刊上出现越来越多的议论。"},{"type":"paragraph","text":"不久以前发生的所谓“大约瑟夫水闸”包工事件，是英国资产阶级最近频频抱怨的一件事情。在安装美国华盛顿州“大约瑟夫水闸”的电气工程投标中，一家英国电气公司的标价比美国公司便宜一百万美元，但是美国当局拒绝让英国公司承包。英国报纸认为这是美国政府口头上讲“自由”贸易，实际上却采取歧视政策的例证。"},{"type":"paragraph","text":"四月二十八日英国资本家的重要喉舌之一“金融时报”提到另一件事情：美国泛美航空公司向英国德哈维兰飞机公司订购三架“彗星—三”式载客飞机，由于美国民用航空管理局不承认英国发给这种飞机的适于航空的证件，购货合同无法签订。"},{"type":"paragraph","text":"英国报刊近来也以怨恨的口气报道美国国会中关于互惠贸易法案的辩论。自从艾森豪威尔上台以来，美国国内的所谓“保护主义”势力愈来愈得势。在这场还未结束的辩论中，美国许多企业代表纷纷要求加强保护措施。艾森豪威尔表面上表示同情英国提出的扩大对美国贸易的要求，却只向国会建议把英国人已认为不能使他们满意的现行互惠贸易法延长一年。这个贸易法以互惠的名义掩盖了美国实际上对外国货物征收高额关税的事实。差不多在同时，艾森豪威尔还委派了一个保护主义分子到关税委员会里去，更鼓励了保护主义势力。于是在国会里立即就提出了几十个修正案，其中最出名的就是所谓辛普生法案。这个法案的主要内容是修改现行互惠贸易法，给予关税委员会以增加关税的权力，目的在加强现行贸易法的保护性质。这个法案还具体规定增加铅和锌的进口税，并且对原油及燃料用油的入口定额加以限制。"},{"type":"paragraph","text":"美国众议院筹款委员会从四月二十七日开始就互惠贸易法案进行辩论，给支持辛普生法案的人以优先发言的机会。“金融时报”指出，头一个出席为辛普生法案辩护的就是一个著名的职业保护主义分子奥·鲁·斯特勒克宾。他甚至还要求加强法案授予总统的限制农产品入口的权力。这个委员会的主席丹尼尔·李德本人在会上表示意见，要求提防外国出口商成为美国工业更强大的威胁力量。他特别提醒注意英国财政大臣巴特勒在预算声明中所说英国必须减低税率以刺激出口的话。"},{"type":"paragraph","text":"美国国内反对放宽贸易限制的势力的嚣张以及艾森豪威尔的言行不符的做法，已使英国资产阶级对于英国所希望的和美国发展互惠贸易的可能感到失望。伦敦“泰晤士报”七日特地发表了一篇评论，其中说：“自从美国新政府上台之后，美国的政策似乎更变本加厉地坏下去了，而且远远地背弃了艾森豪威尔总统在他的国情咨文中提出的自由主义政策。……目前，我们所能希望的最多是把互惠贸易法原封不动地延长一年。”英国“经济学家”杂志早就悲观地说：“在贸易的前景中，最近的将来不会有任何给英国一些鼓励的征候……对于真正改革关税手续和‘买美国货法’一事不能寄予什么合理的希望。”“曼彻斯特卫报”最近也批评美国的贸易政策，抱怨艾森豪威尔政府对放宽进口“不大感到兴趣”。“泰晤士报”还警告美国说，如果它反对放宽贸易限制，“自由世界将由于经济和金融的壁垒陷于分裂”。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"09b1838124"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
