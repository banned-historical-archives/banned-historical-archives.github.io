" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"总参谋部、总政治部关于绝对不许动用部队武装镇压革命学生运动的规定","authors":[],"dates":[{"year":1966,"month":8,"day":21}],"is_range_date":false,"parts":[{"text":"总参谋部、总政治部关于绝对不许动用部队武装镇压革命学生运动的规定","type":"title"},{"text":"最近桂林、西安、兰州、包头等地相继发生学生上街游行、集会后，地方党政机关要求部队全副武装警戒会场、机关，据说桂林已调进一个营的武装部队，以应万一；还有的要求部队派人坐汽车向游行集会的学生或到工厂、学校去作宣传劝说工作等。结果搞得学生和部队之间的关系很紧张，有的学生群众来到部队进行辩论，贴大字报；有的院校师生接连给军委发来电报，说部队围攻革命师生，等等。这种情况，已经造成部队和革命学生的对立，应引起极端重视。为此，特作如下规定：","type":"paragraph"},{"text":"一、所有部队绝对不准动用武装镇压革命学生运动，更不得向学生开枪，就是向学生放空枪，也是严重的政治错误，将要受到严格的纪律处分。","type":"paragraph"},{"text":"二、如地方党政机关邀请部队参加庆祝集会时，经大军区党委批准，可派少量部队参加，但一律不准携带武器。","type":"paragraph"},{"text":"三、在任何情况下地方党政机关要求调动部队时，必须报经军委批准。","type":"paragraph"},{"text":"四、学生与学生或学生与群众发生冲突时军队不要介入，如发现确有证据的杀人、放火、放毒，破坏、盗窃国家机密的现行反革命分子，应由本地公安机关依法处理，如公安机关力量不足，请求支援时，军队可予以协助。","type":"paragraph"},{"text":"五、部队不得派军队进入工厂，学校去搞宣传劝说活动。","type":"paragraph"},{"text":"六、军队不得给地方学校、工厂、机关贴大字报，地方学校、工厂、机关给部队贴大字报时应表示热烈欢迎。","type":"paragraph"},{"text":"七、任何逃避斗争，跑到军队躲藏的人，军队要他们回去，不得隐藏他们。","type":"paragraph"},{"text":"以上规定，希各单位切实遵照执行。","type":"paragraph"}],"comments":[],"origin":"根据群众组织出版物[翻印者未注明]和中国人民解放军国防大学当时党建政工教研室《“文化大革命”研究资料》，北京：[内部出版]，1988年，上册","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dacb801280"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
