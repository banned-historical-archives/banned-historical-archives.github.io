script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"高举毛主席的伟大旗帜，进一步深入开展工业学大庆的群众运动  北京等八省市自治区召开工业学大庆会议","authors":[],"dates":[{"year":1977,"month":4,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"高举毛主席的伟大旗帜，进一步深入开展工业学大庆的群众运动"},{"type":"paragraph","text":"北京等八省市自治区召开工业学大庆会议"},{"type":"paragraph","text":"据新华社一九七七年四月八日讯　继云南、陕西、湖南、广东、山东、江西、四川、青海、河北等省之后，近一个多月来，又有北京、广西、甘肃、西藏、辽宁、吉林、黑龙江、福建等省、市、自治区先后召开了工业学大庆会议。这些会议高举毛主席的伟大旗帜，深揭狠批“四人帮”，认真总结经验，表彰先进，制定规划，落实措施，决心在英明领袖华主席抓纲治国的战略决策指引下，把工业学大庆的群众运动更加轰轰烈烈、扎扎实实地开展起来，努力发展大好形势。"},{"type":"paragraph","text":"以大庆为榜样，坚定不移地在企业中全面贯彻执行毛主席的革命路线，让大庆经验遍地开花。这是各地学大庆会议的一个显著的特点。各地参加会议的代表深深体会到，大庆是毛主席亲手树立的一面红旗。大庆坚持毛主席的办社会主义企业的路线，全面贯彻鞍钢宪法，走出了一条与资本主义、修正主义根本对立的我国工业自己发展的道路。在工业战线上要坚决捍卫毛主席的伟大旗帜，就必须更高地举起大庆红旗，深入开展工业学大庆的群众运动，尽快地把更多的企业建设成大庆式企业，以加速实现四个现代化的步伐，真正把巩固无产阶级专政的任务落实到基层。出席各省、市、自治区工业学大庆会议的代表们说，华主席是毛主席亲自为我们选定的好接班人，是我们党和国家的英明领袖，我们要坚决响应华主席的号召，把深入开展工业学大庆的群众运动，作为高举毛主席伟大旗帜的实际行动。我们要象大庆工人阶级那样，坚持“两论”起家的基本功，用毛泽东思想武装广大职工的头脑，让毛主席的伟大旗帜高高飘扬，永远飘扬。"},{"type":"paragraph","text":"出席各地工业学大庆会议的代表，对于“四人帮”反对伟大领袖毛主席、反对毛主席的革命路线、反对毛主席亲手树立的大庆红旗等反革命罪行，展开了坚决的揭发批判。辽宁省工业学大庆会议的三千五百多名代表，用大量事实揭发批判了“四人帮”和在辽宁的那个死党及其同伙对抗工业学大庆运动，反对鞍钢宪法，大反“经验主义”，把矛头指向党中央、国务院领导同志的罪行。出席黑龙江省工业学大庆会议的代表，愤怒批判了“四人帮”反对学习大庆的基本经验，反对在企业中进行党的基本路线教育的罪行。代表们指出，在当前揭批“四人帮”的群众运动中，我们一定要更好地坚持进行党的基本路线教育，解决好企业中无产阶级同资产阶级、社会主义道路同资本主义道路这个主要矛盾，在华主席、党中央领导下抓纲治国、奋勇前进。"},{"type":"paragraph","text":"由于“四人帮”的严重破坏，给当前的工业生产带来了一些暂时的困难。在这些省、市、自治区召开的工业学大庆会议上，许多单位的代表围绕着如何对待当前困难，努力把国民经济搞上去的问题，展开了热烈的讨论。北京市参加工业学大庆会议的许多代表在讨论中指出，对待困难要有一个正确的态度。目前的困难只是暂时的困难。大家说，越是困难越需要我们认真学大庆，发扬革命加拚命的精神，努力创造条件，克服暂时困难，把国民经济搞上去。英明领袖华主席曾经亲自视察过的福建省龙海县合成氨厂、西藏自治区林芝毛纺厂，还有吉林省的长春市搪瓷厂、浑江市轴承厂、辽源市第二针织厂等先进单位的代表，都分别在本省、自治区召开的工业学大庆会议上介绍了他们落实华主席抓纲治国的战略决策，深入学大庆，狠批“四人帮”，大干苦干加巧干，千方百计战胜困难，完成和超额完成国家计划的经验。他们共同的体会是：当前生产上出现的一些困难，都是“四人帮”严重干扰破坏带来的后果。现在，“四人帮”打倒了，挖掉了造成困难的祸根，只要加强领导，振奋精神，有大庆人那股子革命干劲，执行一条马克思列宁主义的路线，任何困难都是可以战胜的。"},{"type":"paragraph","text":"在这些省、市、自治区召开的工业学大庆会议上，还总结了本地区工业学大庆的经验，表扬了一批学大庆的先进单位和个人，命名了一批大庆式企业。同时还讨论、制定了进一步开展工业学大庆运动、普及大庆式企业的规划和部署，提出了各自的奋斗目标和措施。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"name":"黑龙江文革","type":"人物"},{"name":"吉林文革","type":"人物"},{"name":"辽宁文革","type":"人物"},{"name":"福建文革","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"西藏文革","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"68db89c72d"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
