script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"毛泽东喜欢的两句诗","authors":["陈晋"],"dates":[{"year":1991,"month":10,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"陈晋"},{"type":"paragraph","text":"一九五九年七月四日，毛泽东在庐山住处同王任重、刘建勋、梅白三人谈话时，念起明代杨继盛(号椒山)两句诗:“遇事虚怀观一是，与人和气察群言。”接着一路发挥:这是椒山先生的名句，我从青年时就喜欢这两句，并照此去做。这几十年的体会是前一句难就难在“遇事”这两个字上，即有时能虚怀，有时并不怎么虚怀。第二句难在“察”字上面。察，不是一般的察言观色，而是虚心体察，这样才能从群言中吸取智慧力量。诗言志，椒山先生有此志，乃有此诗。这一点并无惊天动地之处。但从平易见精深。这样的诗，才是中国格律诗中的精品。唐人诗曰:“邑有流亡愧傣钱”，这寥寥七字，写出古代清官的胸怀，也写出了中国古代知识分子的高尚情操。"},{"type":"paragraph","text":"(摘自《文艺评论》1991年第5期　原作者:陈晋)"}],"comments":[],"origin":"《文艺评论》","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e1062004bc"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
