<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"沿河县官舟公社团结生产队关于大季粮食生产中社员个人种植收入的调查报告","authors":["沿河县官舟公社贵州省委整风整社工作团"],"dates":[{"year":1961,"month":9,"day":18}],"is_range_date":false,"parts":[{"text":"沿河县官舟公社团结生产队关于大季粮食生产中社员个人种植收入的调查报告","type":"title"},{"text":"沿河县官舟公社贵州省委整风整社工作团","type":"authors"},{"text":"（上缺）估计。","type":"paragraph"},{"text":"还有不少情况，是群众高兴的时候，自己谈出来的。如三队冉启刚说：“我今年砍小米就砍了50多个活路，只收得50多斤”。就记下来，估成50斤小米。二队的冉茂前正收小米回家，问他收多少，他说：“要不天干，可收四、五斗，这才收得斗把两斗。”就记下来估为100斤（一斗80斤）。一队谭祖怀的母亲在打黄豆，问她收了多少，她说：“这才一斗多些哟，不天干可收两三斗”。看到黄豆颗粒饱满，于是就估为一斗半，150斤。","type":"paragraph"},{"text":"除了这些随便摆谈、偶然问问外，地上晒的、梁上挂的，都是估产的根据，因为大队今年分的很少，而且没有这样多的品种。","type":"paragraph"},{"text":"调查材料汇总之后，工作组又作了分析对证，认为这个统计，至少有八成以上的准确性，基本符合实际情况。","type":"paragraph"},{"text":"社员的生活状况和思想动态","type":"subtitle"},{"text":"社员的生活情况，从吃粮的数量来看，很难估计出一个标准，有一家社员大小四口人，他说：“我们一顿要吃半升米”。半升米是四斤半，平均每人每顿一斤一两米。一队的覃朝益，在一顿饭中，有包谷巴、包谷豆腐、黄豆豆腐、南瓜闷包谷面。大多数社员常常吃小米糍巴沾芝麻、黄豆面、包谷豆腐、包谷煮红薯。四队覃守凤嫌干菜不好吃，说“吃起来挡脚挡手的”，抱出来卖给工作组。群众看到工作组干部吃饭时，啧啧作声地说：“这阵子苦了你们干部，那点点粮食！”还有人把我们的干部称为：“一两升米的干部”（一升米三十元）。群众普遍反映说：“今年我们吃的是有，就是差点米吃。”（因水稻要留种、交公余粮）。三队的冉启刚对工作组干部说想到贵阳耍一趟，干部说路费贵，他说：“贵哪样！两斗粮食就抵到啦。”现在许多人都在晒面酱，包海椒（把辣椒的子腾空，灌麦面密封）等存起来，好像要过年一样。","type":"paragraph"},{"text":"最近一个月来，家家户户忙于在家中挖薯洞，许多人挖了一人至二人半深。二队的谭守琅第一次挖好了一个洞，因下了一场雨，嫌小了又挖二次。前几天又下了雨，又嫌小了。于是着手再加宽加深，就这样陆陆续续挖了一个月。其他社员也如此，每下一次雨，就忙着加深薯洞。","type":"paragraph"},{"text":"由于社员个人种植部份超过了集体部份，大家都忙着自己的庄稼，对集体的观念越来越淡，群众动辄就说：“集体分的还不如自己种的五股当一股，靠集体要饿死人”。二队的水田本来是保水，但栽秧后一道也未薅过，而个人种的庄稼却薅淋及时，长得整整齐齐。现在正在收割水稻，到处都在酝酿交谈单干的好处。因集体生产搞不好，征购任务完不成，工作组提出要从社员个人的收入中弥补，理由是因经营管理不好而减产不能减购，同时集体的包产耕地面积上所种的作物，必须向国家交纳余粮，特别是抢种部份，但干部和群众都不同意，普遍叫苦。工作组正在进行思想教育工作，以便通过征购来提高群众觉悟，兑现六十条政策，对四固定、三包一奖等进行整顿。","type":"paragraph"},{"text":"附：团结生产大队社员个人大季粮食种植收入调查表。","type":"paragraph"},{"text":"送：省委五份、地委三份、县委三份、区委一份。沙子、思渠工作团各一份。工作组各一份，余存四份，共二十五份。","type":"paragraph"}],"comments":[],"origin":"贵州省某档案馆","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bfaf13f63f"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
