" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoistlegacy.de-1341","name":"中共中央书记处关于广西问题的会议纪要（节录）","author":"中共中央书记处","internal":false,"official":false,"type":"unknown","files":[],"article":{"title":"中共中央书记处关于广西问题的会议纪要（节录）","dates":[{"year":1984,"month":10,"day":24}],"is_range_date":false,"authors":["中共中央书记处"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"中共广西壮族自治区党委整党办公室, 处理“文革”遗留问题、清理“三种人”文件汇编(第一册), 300-301","tags":[{"name":"广西","type":"主题/事件"},{"name":"林彪","type":"主题/事件"},{"name":"四人帮","type":"主题/事件"},{"name":"文革","type":"主题/事件"},{"name":"遗留问题","type":"主题/事件"},{"name":"冤假错案","type":"主题/事件"},{"name":"整党","type":"主题/事件"}],"parts":[{"type":"title","text":"广西问题的会议纪要（节录）"},{"type":"subtitle","text":"《中央书记处会议纪要》十二届第161号"},{"type":"subtitle","text":"（一九八四年十月二十四日）"},{"type":"paragraph","text":"十月二十四日上午，中央书记处由赵紫阳同志主持，举行第一百六十一次会议。"},{"type":"paragraph","text":"会议讨论了广西壮族自治区党委和政府《关于广西经济工作的汇报提纲》。讨论中提出了如下意见：一、正确认识广西的形势。在“文革”中，广西是受林彪、“四人帮”破坏的“重灾区”之一，党的十一届三中全会以后，由于“左”的思想和其他因素的影响，在相当长的一段时间内党的政策没有及时落实发挥应有的作用，各项工作特别是经济工作进展不大，当前仍有相当大的一部分地区，处于比较贫穷落后的状态。去年以来，中央帮助广西自治区党委调整了领导班子，处理“文革”遗留问题的工作进行得比较稳妥，整党工作也搞得比较顺利，这就为广西开创各项工作的新局面打下了良好的基础，广西的形势会很快发生突变，政通人和、经济繁荣的局面将很快到来。但同时也要看到，广西彻底否定“文革”、彻底否定派性和完成整党的任务还很艰巨，必须认真对待。希望广西自治区党委和政府认真学习、贯彻执行党的十二届三中全会精神，处理好“文革”遗留问题，抓好整党，促使广西经济尽快翻身。"}],"alias":""},"tags":[{"name":"广西文革","type":"人物"},{"name":"派性","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"99631cb434"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
