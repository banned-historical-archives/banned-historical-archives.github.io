script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"墨西哥马列主义运动赞扬我国文化大革命在世界引起最深刻的反应  毛主席是当代最伟大的马列主义者  马列主义、毛泽东思想是打败帝修反，把世界革命进行到底的全能武器","authors":[],"dates":[{"year":1967,"month":10,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"墨西哥马列主义运动赞扬我国文化大革命在世界引起最深刻的反应"},{"type":"paragraph","text":"毛主席是当代最伟大的马列主义者"},{"type":"paragraph","text":"马列主义、毛泽东思想是打败帝修反，把世界革命进行到底的全能武器"},{"type":"paragraph","text":"新华社二十一日讯　墨西哥城消息：墨西哥马克思列宁主义运动在一篇题为《毛泽东思想是当代的马克思列宁主义》的文章中指出：“马克思列宁主义、毛泽东思想是打败帝国主义、打败修正主义、打败一切反动派，把世界革命进行到底的全能武器。”"},{"type":"paragraph","text":"文章援引了林彪同志的话：“毛泽东同志是当代最伟大的马克思列宁主义者。毛泽东同志天才地、创造性地、全面地继承、捍卫和发展了马克思列宁主义，把马克思列宁主义提高到一个崭新的阶段。”"},{"type":"paragraph","text":"“毛泽东思想是在帝国主义走向全面崩溃，社会主义走向全世界胜利的时代的马克思列宁主义。毛泽东思想是反对帝国主义的强大的思想武器，是反对修正主义和教条主义的强大的思想武器。”"},{"type":"paragraph","text":"文章指出，在对待毛泽东同志和毛泽东思想的态度的问题上，只有两条道路：“坚决捍卫马克思列宁主义，因而也贯彻毛泽东思想；或者陷入修正主义、背叛无产阶级和世界各国人民革命斗争的泥坑。”"},{"type":"paragraph","text":"文章写道：帝国主义走向全面崩溃，社会主义走向全世界胜利，这是当代世界客观的历史必然性。第二次世界大战以后，越来越清楚地可以看到当代世界的主要矛盾是帝国主义和亚非拉各国人民之间的矛盾。它指出：“我们时代的内容决定了共产主义运动必须拥有适应新的历史转折、适应新的世界情况的新战略，这是历史的必然性。毛泽东同志和中国共产党，在中国革命中，发展了这种新的战略。只有创造性地、全面地发展了马克思列宁主义，才能形成这种新的战略。”"},{"type":"paragraph","text":"文章写道：“中国革命沿着伟大的十月革命的道路，发生在现代世界基本矛盾空前激化、帝国主义和亚非拉人民之间的矛盾开始成为第一位的主要矛盾的情况下。因此，中国革命是十月革命的继续，毛泽东同志在中国革命中发展的哲学理论、统一战线理论、人民战争理论以及社会主义建设理论、关于党和群众的理论，等等，是普遍有效的，体现了当代的特点，是无产阶级和各国人民反对帝国主义及其走狗的战略中最重要的部分。所以毛泽东同志是当代的列宁，是世界革命无可争辩的领袖。”"},{"type":"paragraph","text":"文章说，同各种反动势力建立反对列宁主义的“神圣同盟”一样，目前，“当毛泽东同志天才地、创造性地、全面地继承、捍卫和发展了马克思列宁主义的时候，以苏共领导为首的现代修正主义者和以美国为首的帝国主义者以及世界上一切反动派和叛徒，建立了新的‘神圣同盟’来反对马克思列宁主义，反对战无不胜的毛泽东思想。”"},{"type":"paragraph","text":"“这个新的‘神圣同盟’的目的，是不让世界各国人民掌握毛泽东思想，在革命中前进。但是，过去那些反对马克思主义列宁主义的人统统被打倒了，现在那些反对毛泽东思想的人，也将统统被革命群众的行动所打倒。在马克思主义和革命的发展过程中一个新的伟大的时代已经开始了。全世界的亿万群众必将掌握毛泽东思想，并向着在全世界确立社会主义的目标前进。”"},{"type":"paragraph","text":"文章赞扬了中国正在开展的无产阶级文化大革命。它指出，这次大革命是一场前所未有的最深刻的阶级斗争，是毛泽东思想取得更加伟大的胜利的开端。它说：“这次伟大的革命一开始就动员了中国几亿有觉悟的人民，必定在全世界引起最深刻的反应。”"},{"type":"paragraph","text":"文章表示响应毛主席关于全世界人民团结起来打败美帝国主义及其一切走狗的伟大号召。它写道：“国际统一战线的革命战略和各国人民反对帝国主义的人民战争的革命战略，是不可战胜的。马克思列宁主义、毛泽东思想是打败帝国主义、打败修正主义、打败一切反动派，把世界革命进行到底的全能武器。”它说：“目前，亚洲、非洲和拉丁美洲所有共产党人的战斗任务，就是彻底运用人民战争的战略，以人民战争这个最高的斗争形式开辟反对帝国主义的新的战线。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"人民战争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f48f1941cd"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
