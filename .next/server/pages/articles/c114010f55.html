script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"山东农学院揭露周次温  怀着浓厚的剥削阶级思想混入党内","authors":[],"dates":[{"year":1957,"month":8,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"山东农学院揭露周次温"},{"type":"paragraph","text":"怀着浓厚的剥削阶级思想混入党内"},{"type":"paragraph","text":"本报讯　山东农学院揭露和批判党的叛徒、老牌右派分子周次温的反党罪行。"},{"type":"paragraph","text":"周次温是山东农学院马列主义教研室的代理主任，1936年参加共产党。在“大鸣大放”中，他肆意诬蔑共产党的政策，说三反和肃反运动“留下来的印象是暗无天日，血迹斑斑”，“统购统销不知死了多少好人”。他公然诽谤共产党的领导机关，说三反肃反的“错误”“党中央应负全责”。他还在群众中宣扬说：“我是战时入党的，假若是在解放后的现在，这样的共产党，我根本就不会参加。”周次温看到陈铭枢在报纸上发表的“党委应该退出学校”的谬论时，竟拍案叫绝，并无耻的说：“我早就看到这一点了。”"},{"type":"paragraph","text":"周次温是地主阶级出身，怀着浓厚的剥削阶级思想混进了共产党的队伍。在减租减息中，农民刚刚触动了一下地主阶级的皮毛，周次温就大喊大叫“左了”。1950年土改时，他公然包庇地主家庭和恶霸父亲，因此受到党纪处分。"},{"type":"paragraph","text":"现在，周次温还没有低头认罪，山东农学院准备对他的反党反社会主义的言行作进一步的批判。"},{"type":"paragraph","text":"（新华社专稿）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c114010f55"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
