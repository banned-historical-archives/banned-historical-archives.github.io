" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共中央华北局直属机关委员会关于开除腐化堕落分子曹裕民党籍的决定","authors":[],"dates":[{"year":1954,"month":8}],"is_range_date":false,"parts":[{"text":"中共中央华北局直属机关委员会关于开除腐化堕落分子曹裕民党籍的决定","type":"title"},{"text":"曹裕民，男，现年40岁，黑龙江省人，经营地主出身，学生成份。1937年入党，历任：连指导员、地委宣传部长、石家庄市委委员兼宣传部长、天津市委宣传部副部长、华北行政委员会文教局副局长、华北局农村工作部干事等职。","type":"paragraph"},{"text":"曹在1952年春任华北行政委员会文教局副局长的时候，因为利用职权强制奸污一个青年女干部受到留党察看1年的处分，受处分后调到中共中央华北局农村工作部任干事。1953年下乡的时候曹裕民企图奸污一个村干部的妻子，还无耻地亲吻一个十三、四岁的幼女。党为了教育他，曾再次给予改造的机会，1953年10月经华北局常委批准延长留党察看处分1年。但曹裕民在实际行动上完全辜负了党对他的再次教育和希望，在1954年6月21日由山西返回华北局机关途中，在火车上竟又用尽流氓手段百般调戏同车的军属刘桂花，这个女同志在不甘侮辱无可忍受的情况下，向列车员申诉，曹无法抵赖，只好认错。曹裕民回机关后虽将此事作了交代，但又说组织上对他过去的处分是“罚不当罪”，还极其荒谬地诡辩说：“这次错误，对今后彻底改正错误也许还有好处”，“这次没有造成严重错误，比以前是有进步了”，他辩解说这次错误是“有好处”的和“不严重”的。","type":"paragraph"},{"text":"曹裕民自参加革命以来，虽然经过党的长期教育，但他资产阶级荒淫无耻的思想作风却顽固地存在着。他每次犯错误后，党对他总是苦心教育，甚至处分，希望他有所警惕和改正，而他却总认为淫荡腐化、败坏道德是与党无关的“生活小节”，“比之路线问题、革命与反革命的问题还不算重大”，因而就拒绝了党对他的教育。曹裕民这种道德败坏、流氓成性、屡教不改、自绝于党的坏分子，与共产党员的称号是不能相容的，为了严肃党的纪律和纯洁党的组织，中共中央华北局机关委员会决定开除他的党籍。","type":"paragraph"}],"comments":[],"origin":"中共中央监察委员会办公厅编：《县委书记以上干部受到开除党籍处分的决定汇编（二）》（党内文件·注意保存），1960年。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4292903bdc"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
