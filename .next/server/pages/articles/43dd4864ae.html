script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"庆祝朝鲜民青同盟成立十七周年金日成授奖先进单位和个人金一在授奖仪式上讲话。必须对美帝提高警惕，必须为反对现代修正主义进行不妥协的斗争","authors":[],"dates":[{"year":1963,"month":2,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社平壤14日电】　朝鲜内阁首相金日成在庆祝朝鲜民主青年同盟成立十七周年(2月13日)的时候，向民主青年同盟的一百三十一个组织和二百五十九名青年积极分子授予了“纪念民主青年同盟成立十周年青年荣誉奖”奖状。朝鲜内阁第一副首相金一在13日晚上平壤市举行的授奖仪式上，代表金日成首相把奖状和奖品授给这些先进单位和个人。"},{"type":"paragraph","text":"金一在授奖仪式上讲了话。他说，今天，朝鲜民主青年同盟领导下的二百五十多万盟员和一百六十万少年团员以及全体青年学生们，正在努力学习和工作，把自己锻炼成为革命事业的接班人。金一接着谈到了民主青年同盟在完成党在每个时期提出的革命任务的过程中为祖国和人民建立的不朽业绩。他号召青年们高度发挥自力更生的革命精神，展开技术革新运动，积极支援农业，在完成今年社会主义建设任务的斗争中起先锋作用。"},{"type":"paragraph","text":"金一同时指出，青少年们要以马克思列宁主义、党的政策和金日成同志的教导，不断地提高学习热情，精通自己的业务，努力锻炼身体，使自己成为智、德、体全面发展的共产主义新人。"},{"type":"paragraph","text":"他又说，青年们必须对美帝国主义提高警惕，时刻准备消灭敢于进犯的敌人。同时，必须为反对现代修正主义进行不妥协的斗争。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"43dd4864ae"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
