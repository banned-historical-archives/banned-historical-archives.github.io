script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"苏修向西方资产阶级老爷大开门户  奴颜婢膝地招徕外国“游客”让他们在苏联国土寻欢作乐","authors":[],"dates":[{"year":1969,"month":6,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"苏修向西方资产阶级老爷大开门户"},{"type":"paragraph","text":"奴颜婢膝地招徕外国“游客”让他们在苏联国土寻欢作乐"},{"type":"paragraph","text":"新华社二十一日讯　莫斯科消息：近几年来，苏修叛徒集团为了捞取西方外汇，变本加厉地大搞所谓“国际旅行事业”，招徕形形色色的西方“游客”，不惜把广大的苏联国土变成西方资产阶级老爷们享受的乐园，来加紧同西方的政治勾结。"},{"type":"paragraph","text":"苏修叛徒集团除了不惜“门户开放”，开辟了纽约—莫斯科和许多直达西方国家大城市的直达航线，保证向美帝国主义和其它西方国家的“旅行者”提供最好的服务条件外，还用盘剥苏联人民得来的大量金钱，为西方“游客”修建旅馆、游览中心。"},{"type":"paragraph","text":"继一九六七年在莫斯科修建了拥有四千五百个房间、八千一百个床位的旅馆后，今年苏修国际旅行服务社、旅馆的床位又新增了六千个，比去年增加了百分之七十。"},{"type":"paragraph","text":"据报道，今年到苏联的形形色色的“游客”将达一百七十万之多，比苏修称之为“国际旅行年”的一九六七年增加了七分之一。"},{"type":"paragraph","text":"为了招徕西方“游客”，今年四月间，苏修国际旅行服务社竟然邀请了四十九个国家的二百一十三家旅行社的代表到莫斯科，由苏修国际旅行服务社、民用航空部、海运部等负责人出面“听取”西方“商业旅行界最内行人的意见”，并且言听计从，保证向西方“游客”提供殷勤周到的“服务条件”。苏修叛徒集团为了几个臭钱竟奴颜婢膝到这种地步，真是既可悲又可怜！"},{"type":"paragraph","text":"为了使那些大腹便便的西方百万富翁寻欢作乐，玩得痛快，苏修政府最近又拨款二千九百万卢布，计划在两、三年内修复莫斯科东面二百公里的古城苏兹达尔，使“这个地方成为吸引外国客人的胜地”、“大旅行中心”。"},{"type":"paragraph","text":"据透露，在这个地方将完全按照中世纪的封建主义的面貌进行修复，其中有“带有镀金大门的圣诞大教堂”、“圣母大教堂”、“亚历山大寺院”以及“鲍里斯和格列勃教堂”等。"},{"type":"paragraph","text":"与此同时，苏修还专门开设了“训练会说外语的服务员的两年制学校”，培养具有“高级职业技能”的服务员，侍候西方资产阶级老爷。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d95079a134"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
