<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"广元、重庆宗教革新运动迄无进展","authors":[],"dates":[{"year":1951,"month":3,"day":20}],"is_range_date":false,"parts":[{"text":"广元、重庆宗教革新运动迄无进展","type":"title"},{"text":"【西南总分社三月二十日讯】最早发表革新宣言的广元天主教，由于教徒和神父对革新运动并无认识，故革新运动迄无进展。成都主教曾派人赴广元调查发出革新宣言事，对神父王良佐(中国籍)进行恐吓，说要免他的职。王良佐表示这次革新是政府叫他们革的，发表宣言是为了应付政府，并未考虑如何进行澈底革新，他对积极分子说：“我要声明，这是你们干的，你们要负责。”自此，革新运动即无法开展。外国神父安朗如(Grange Louis 法籍)宣称：“革新是叛教的行动”，也阻碍了这一运动的进展。这种现象不仅广元如此，川北其他县份也如此。","type":"paragraph"},{"text":"目前教会人士对革新运动还有不少的错误认识和顾虑：他们认为圣经道理与共产主义差不多，认为外国传教士大都是善意的，只有个别是坏蛋，认为自立革新是裂教行为，认为现在革新是第一步，将来政府要一步一步地搞垮教会。他们怕革新把天主教革掉，怕革新后经费成问题。","type":"paragraph"},{"text":"【又讯】重庆天主教、基督教革新运动受到的阻力很大，主要是外籍神父和上层分子对革新运动进行破坏。如天主教神父表示：除非人民政府下令驱逐或罗马教廷下令撤走，决不离开岗位。主教尚惟善(Jantze Lonisxav 法籍，在渝四十多年，任主教二十四年)已准备开除在革新运动中表现较好的主教公署秘书刘宗涣。据刘反映：罗马教皇在中国的直接代理人黎伯利(Liberi 摩洛哥人，系梵蒂冈驻南京伪国民党反动政府之“公使”。现仍在南京)曾通知各地教区转嘱各教堂及附属事业如医院、学校将外国负责人换为教会中可靠的中国人。重庆仁爱堂医院于去年十二月即将该院院长沙淑明(法人)换为中国医师曹良仁。","type":"paragraph"},{"text":"天主教人士中对于属罗马正教的观念甚强，因此顾虑很多。经西南统战部副部长程子健向他们作了报告后，一般天主教神父对“可与罗马教廷作纯宗教之联系”均感满意，并提出愿将天主教致罗马教皇的函件请政府审阅。","type":"paragraph"},{"text":"重庆基督教有新、旧南派，旧派拒绝签名和学习。如旧派中的马可说：“基督教革新，人民政府既没有下过命令，只是基督教内部的事，我们可以不签，除非政府下命令叫我们签。”旧派并于去年十二月发起“四川省基督教徒拥护新中国建设政纲共同宣言”(该宣言首先发起于贵州)，以别吴耀宗等所发起的宣言。他们认为吴耀宗的宣言离基督教的身份较远，旧派不能接受。新派宋杰人等的工作不实际，表现过左，学习时，提出学习马列主义与毛泽东思想，脱离群众，他们的意见不能为广大教徒所接受。","type":"paragraph"}],"comments":[],"origin":"1951年4月14日新华通讯社编《内部参考》。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"674c664545"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
