" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji8","name":"毛泽东全集第8卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji8.pdf"],"article":{"title":"致李克农电","alias":"","parts":[{"type":"paragraph","text":"致李克农电！"},{"type":"paragraph","text":"（1936年2月28日）"},{"type":"paragraph","text":"周继吾、张子华昨日到瓦窑堡。据谈，蒋介石系陈果夫主张联红反日，曾扩情主张联白反红，此外孙科、于右任、张群、冯玉祥等均主张联俄联共，并云蒋介石亦有与红军妥协反日的倾向。我方所组织抗日东征军，连日突破东岸二百里封锁线，消灭与击溃杨耀芳、杨澄源、李生达3等部共三个旅，占领石楼、中阳、孝义、县、永和五县广大地区。"},{"type":"paragraph","text":"[1]这是毛泽东和彭德怀致和东北军领导人谈判的中共谈判代表李克农电的主要内容。从此，中共中央开始提出“反蒋抗日”的口号，随后逐步明确地提出“联蒋抗日”和“逼蒋抗日”的口号。"},{"type":"paragraph","text":"[2]周继吾，即董健吾，中共秘密党员，公开身份为上海圣彼得堡教堂的牧师，1935年年底受宋庆龄、宋子文委托前往陕北，和中共中央取得联系。张子华，当时受中共上海地下组织委派，与董健吾同行，向中共中央汇报和国民党代表曾养甫等会商的情况。"},{"type":"paragraph","text":"[3]杨耀芳、杨澄源，当时分别任国民党军晋绥军第七十一师师长和第六十九师师长。李生达，当时任国民党军太原绥靖公署第三纵队司令兼第七十二师师长。"}],"authors":["毛泽东"],"dates":[{"year":1936,"month":2,"day":28}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":270,"page_end":270},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a35933f772"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
