script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"大星大队干部和群众联系实际学习无产阶级专政理论努力弄懂为什么要对资产阶级专政","authors":[],"dates":[{"year":1975,"month":3,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　川沙县蔡路公社大星大队党支部，组织干部、社员认真学习毛主席关于理论问题的重要指示和马克思、恩格斯、列宁关于无产阶级专政的部分论述，努力从理论和实践的结合上弄懂对资产阶级专政的问题，进一步坚定走社会主义道路的决心。"},{"type":"paragraph","text":"大星大队党支部以政治夜校为阵地，组织干部、群众围绕“为什么要对资产阶级专政?无产阶级专政的任务是什么?怎样为巩固无产阶级专政而斗争?”等三个问题，联系农村阶级斗争、路线斗争实际，认真看书学习。广大社员群众在学习讨论中回顾了建国以来的斗争历史，清楚地看到:我国的社会主义制度越来越巩固，这是因为我们在毛主席革命路线指引下，不断巩固无产阶级专政的结果。在学习中，他们从以下四个方面，加深对资产阶级实行专政这个问题的理解:"},{"type":"paragraph","text":"一、被推翻的地主资产阶级，“他们反抗的劲头正由于他们的失败而增长了千百倍”，只有加强无产阶级专政，才能镇压地主资产阶级的反抗。大队党支部副书记王明德说，被打倒的剥削阶级时刻妄想恢复失去的“天堂”。在无产阶级专政越来越巩固的情况下，他们经常变换手法，进行复辟资本主义的活动。如第五生产队的一个富农分子，打着为集体赚钱的幌子，散布“学点手艺是手里金，吃不完，用不完”的谬论，诱使青年弃农，妄图破坏集体经济。对于阶级敌人的破坏活动，我们如果不狠狠打击，他们就会重新上台。"},{"type":"paragraph","text":"二、“小生产是经常地、每日每时地、自发地和大批地产生着资本主义和资产阶级的”，因此必须坚持用社会主义教育农民，同资本主义自发势力作斗争。党支部的同志说，我国农村虽然实现了集体化，广大农民走上了社会主义大道，但是小生产的残余还存在，农民当中仍然保留着小生产的某些特点，资本主义倾向常常会以各种形式表现出来。如果我们不对农民进行耐心细致的思想政治工作，资本主义倾向就会抬头。"},{"type":"paragraph","text":"三、社会主义社会还存在着资产阶级法权，“这只能在无产阶级专政下加以限制”。大队服装工场的同志在学习毛主席关于限制资产阶级法权的论述时，联系分配问题进行了讨论。大家说，按劳分配是资产阶级法权的一种表现。在社会主义这个历史阶段，虽然还有它的作用，但毕竟不是共产主义的东西必须加以限制，决不能扩大它。社队企业人员同样是人民公社社员，在分配上应缩小同从事农业劳动的社员的差距，那种认为“企业赚钱多，应该多分点”的想法是错误的。如果任意扩大分配差距，就会出现两极分化。大家从理论上提高了认识，为建设社会主义而自觉劳动的积极性更高了。"},{"type":"paragraph","text":"四、资产阶级和一切反动阶级，还会利用其在思想文化领域的传统势力进行垂死挣扎，“无产阶级必须在上层建筑其中包括各个文化领域中对资产阶级实行全面的专政”。许多同志说，地主资产阶级虽然被打倒了，但是他们的剥削阶级思想还在散发着臭气，还在毒害着人们的思想。我们一定要抓好意识形态领域的阶级斗争，用社会主义牢牢占领农村思想文化阵地。党支部副书记奚兰珍说，我原来认为儿子结婚，请几桌酒，用几个钱，不算啥问题。通过学习，我认识到，讲排场、摆阔气，这是地主资产阶级的腐朽作风，我们要批判它摈弃它，要在意识形态领域里对资产阶级实行专政。"},{"type":"paragraph","text":"(本报通讯　员)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"限制资产阶级法权","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"631af8abae"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
