" crossorigin="">{"props":{"pageProps":{"books":[{"id":"45f85d41-2767-49bc-87e9-ba331b429fce","name":"毛泽东思想万岁（1961年-1968年）","internal":true,"official":false,"type":"pdf","author":"","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives3/main/45f85d41-2767-49bc-87e9-ba331b429fce.pdf"],"article":{"title":"和林彪同志的一段谈话","alias":"","parts":[{"type":"paragraph","text":"对《林彪同志给浙江省军区的指示》的批示"},{"type":"paragraph","text":"（一九六六年十二月二十九日）此件应发到全军营以上各级机关去。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一九六六年十二月二十九日"},{"type":"paragraph","text":"附：林彪同志给浙江省军区的指示"},{"type":"paragraph","text":"要把学生的工作当作群众工作来做，这是送上门来的群众工作，不但不应当由于这个问题引起军队和革命学生的对抗，而且应当借这个机会，大力加强军队与革命学生的团结。"},{"type":"paragraph","text":"处理这个问题的原则要重申以下三条：一、领导同志要挺身而出，同群众见面，既不能躲，也不能压，越躲越压越糟糕。"},{"type":"paragraph","text":"二、对学生提出的正确批评，要诚悬接受，完全接受，自已做错了的，要坦率地进行自我批评。他们的合理要求，凡能做到的要完全做到。对他们不正确的意见和不合理的要求，要进行解释和教育。"},{"type":"paragraph","text":"三、从头到尾要贯彻对学生热情、友好、耐心的态度，在耐心的问题上，军队要做出榜样，听到反面的话，绝不能粗暴、发脾气。"},{"type":"paragraph","text":"（注：这是一九六六年十二月二十九日浙江军区杜平用电话向林彪同志报告了省"},{"type":"paragraph","text":"军区与浙江红色造反联络站谈判情况后，当天下午五点半钟林彪同志作出"},{"type":"paragraph","text":"的重要指示。）"},{"type":"paragraph","text":"和林彪同志的一段谈话(摘录)林彭：现在全国都在深入学习毛主席著作。毛主席：我不愿照抄照传，要突破，不要迷信，要有新的论点，新的创造。林彪：要以毛泽东思想作种子。毛主席：好。林彪：不能满足于经济建设，要搞精神建设。"},{"type":"paragraph","text":"·281*"}],"authors":["毛泽东"],"dates":[],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":294,"page_end":294},"tags":[{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bc8097e076"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
