" crossorigin="">{"props":{"pageProps":{"books":[{"id":"wenji1","type":"pdf","name":"毛泽东文集第一卷（1999）","internal":false,"official":true,"author":"中央文献研究室","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/wenji1.pdf"],"article":{"title":"在中国文艺协会成立大会上的讲话","description":"","dates":[{"year":1936,"month":11,"day":22}],"parts":[{"text":"在中国文艺协会成立大会上的讲话","type":"title"},{"type":"paragraph","text":"中国苏维埃成立已很久，已做了许多伟大惊人的事业，但在文艺创作方面，我们干得很少。今天这个中国文艺协会的成立，这是近十年来苏维埃运动的创举。过去我们是有很多同志爱好文艺，但我们没有组织起来，没有专门计划的研究，进行工农大众的文艺创作，就是说过去我们都是干武的。现在我们不但要武的，我们也要文的了，我们要文武双全。因为现在中国有两条战线，一条是抗日战线，一条是内战。要结成抗日民族统一战线，把日本帝国主义赶出去，争取中国民族的独立解放，首先我们就要停止内战。但现在有人不愿停止内战，反而来进攻抗日主力的人民红军，要消灭抗日的领导者和核心的苏维埃，要消灭一切抗日力量，抗日的文艺也要消灭。所以我们要抗日首先就要停止内战。怎样才能停止内战呢？我们要文武两方面都来。要从文的方面去说服那些不愿停止内战者，从文的方面去宣传教育全国民众团结抗日。如果文的方面说服不了那些不愿停止内战者，那我们就要用武的去迫他停止内战。你们文学家也要到前线上去鼓励战士，打败那些不愿停止内战者。所以在促成停止内战、一致抗日的运动中，不管在文艺协会都有很重大的任务。发扬苏维埃的工农大众文艺，发扬民族革命战争的抗日文艺，这是你们伟大的光荣任务。"},{"type":"paragraph","text":"根据一九三六年十一月三十日"},{"type":"paragraph","text":"《红色中华》刊印。"}],"comment_pivots":[{"part_idx":0,"offset":7,"index":1}],"is_range_date":false,"authors":["毛泽东"],"comments":["中国文艺协会，是由丁玲、成仿吾、李伯钊等三十四人倡议，于一九三六年十一月二十二日在陕西保安县（今志丹县）正式成立的。在成立大会上，由毛泽东提议、全体会员通过定名为“中国文艺协会”。组织协会是为了在抗日民族统一战线目标下，共同推动新的文艺工作，结成统一战线中新的战斗力量。"],"page_start":474,"page_end":475,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e882563bbe"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
