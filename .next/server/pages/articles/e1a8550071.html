script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"在高教部有关聘任制度座谈会上的发言","authors":["清华大学","钱伟长"],"dates":[{"year":1957,"month":4}],"is_range_date":false,"parts":[{"text":"在高教部有关聘任制度座谈会上的发言","type":"title"},{"text":"清华大学钱伟长","type":"authors"},{"text":"(钱伟长1957年4—5月在高教部有关聘任制度座谈会上的发言)","type":"subtitle"},{"text":"高教部从4月底到5月底举行了有关聘任制度的五次座谈会，除第一次会议外，均由右派分子曾昭抡主持。钱伟长积极参加了这些会议，在会上大放厥辞，要求给教授以“人事的绝对权力”。以下是他的主张：","type":"paragraph"},{"text":"第四次(五月十四日)在座谈是否实行聘任制度的问题时，钱伟长开始就以带询问的口气说：“教授究竟有那些权，现在说人权要下放，到底要给教授多少权?”他主张：“教授要有权，实行聘任制度就是给教授以选择职业的权利“现在教师教学不好校长无法解聘，而校长不好教师也无法辞聘，要办好学校必须要有好的教授，要有好的教授校长需要开明，实行聘任制度对校长有刺激作用，校长不好教授就可以辞职不干，有些教师和学校关系搞坏了就可以辞职换一个学校，如果教授都不愿意干的话，校长就当不成!”他还对黄副部长开玩笑似的说“你黄部长如果怎样怎样我可以不在这里干!”因此在谈到聘任制度的聘期问题时，他曾主张在骋约未满时教授副教授可以自由去留，而学校则不能随意解职，如有解职须经双方同意。他还认为要给校长全权办学校，高校部只管一个校长就可以了，这样可以发挥校长办好学校的积极性；有一个好校长不怕没有好教师，他认为好的校长登高一呼就会有人去。他举解放前厦门大学武汉大学为例说：“过去厦大武大就是这样有好校长吸引了一些好教授，学校的水平也因而提高，高教部今后新建校或在边远地区新建校，只要选派一个好校长就可以了。”","type":"paragraph"},{"text":"他主张教授要有权的另一方面，是教授有权去留助教。他不同意由教研组来决定，他还认为助教是教授副教授的助教，过去提教研组的助教提法就不对，同时他并主张大学毕业生工作分配每班学生各有十分之一的人由教授决定分配的去处。","type":"paragraph"},{"text":"他在座谈教师晋升条件提到教学法问题时说：“教学法是教师的紧箍咒，我反对这个名词，我一听就不要听”。","type":"paragraph"},{"text":"在有一次座谈涉及教师的思想改造时说：“我过去进行的检讨，今天我就不承认”。","type":"paragraph"}],"comments":[],"origin":"　《捍卫高等教育和科学事业的社会主义方向》，清华大学新清华编辑委员会编，1957年12月。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e1a8550071"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
