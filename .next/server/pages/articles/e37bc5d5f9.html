script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"美国商务部的调查报告提供又一证明美帝是最大的国际剥削者美国垄断资本每年从国外榨取三十亿美元利润","authors":[],"dates":[{"year":1960,"month":12,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【据新华社北京11日电】　华盛顿消息:美国商务部今天发表的一份题为“美国在外国的商业与投资”的调查报告表明，美国帝国主义是世界上最大的国际剥削者。"},{"type":"paragraph","text":"商务部的报告说，美国目前在国外的私人直接投资总额达三百亿美元，这个数字约为十年前的两倍半。报告指出，这些资本在国外开设的企业雇用着三百多万各国工人，每年从中榨取三十亿美元以上的利润。"},{"type":"paragraph","text":"报告说，在这三百亿美元的对外私人直接投资中，有一半以上掌握在四十五家美国大垄断企业手中，它们每家都拥有一亿美元以上的国外投资。同时，这三百亿美元中将近四分之三是投放在美国占有95%以上股分的国外企业中。"},{"type":"paragraph","text":"商务部的报告指出，美国在许多国家中拥有的工厂所生产的许多种商品的数量，已经超过从美国向这些国家输出的同类商品的数量。这份报告说，美国在国外拥有的企业所生产的商品总值1957年达三百二十亿美元，目前已增加到约三百五十亿美元。"},{"type":"paragraph","text":"报告说，美国资本的输出在石油工业中最多，目前已超过一百亿美元，同时在机器制造业方面输出的资本也正在迅速增加。"},{"type":"paragraph","text":"报告指出，美国私人国外投资有三分之一以上投在加拿大，投在拉丁美洲的资本只略少于这个数额，美国在欧洲的投资有五十多亿美元。目前，欧洲是美国私人投资增加得最快的地区。"},{"type":"paragraph","text":"美国“商业周刊”在不久前的一期中引用美国商务部的材料指出，美国垄断资本集团由于害怕亚、非、拉丁美洲日益高涨的民族独立运动，同时为了打破西欧国家及其殖民势力范围抵制进口美国商品的壁垒，目前正在增加对西欧的资本输出。“商业周刊”写道，1960年美国机器制造业资本家在国外工厂设备的投资达十三亿美元，比1958年和1959年增加一亿美元。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e37bc5d5f9"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
