" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"关於大民主问题的交代","authors":["云南大学","姚忠"],"dates":[{"year":1957,"month":7}],"is_range_date":false,"parts":[{"text":"关于大民主问题的交代","type":"title"},{"text":"云南大学姚忠","type":"authors"},{"text":"（姚忠：云南大学历史系三年级学生）","type":"subtitle"},{"text":"姚忠关于大民主问题的初步交代","type":"subtitle"},{"text":"我有意识的向刘坪（中二右派分子）等了解中二、中三、中四的情况带回组上来提……。当时我认为人助金是个问题，又与学生科有关。和“胡永文事件”联合起来可算个大问题，力图造成一个高潮。","type":"paragraph"},{"text":"六月四日刘坪对我说：他们要搞民主墙，但是怕无人响应。我对他说：我们已准备好了，明天就要贴出去。","type":"paragraph"},{"text":"六月七日我对刘坪等说：我的文章“党支书诬蔑民主墙，众党员批判鸣放”你们为什么不响应。第二天他写了一篇“这是正常现象吗？”","type":"paragraph"},{"text":"六月八日刘坪等到省委“请愿”回来对我说，他们准备把情况寄出去。我说：对！寄出去影响很大。","type":"paragraph"},{"text":"我与历四周德忠（“牛虻”上发表诬蔑团员是便衣警察的作者汝南）说：应该去联络一下“春雷”、“铁公鸡”、“低音”等。“铁公鸡”画得不错。我是企图联合起来扩大声势。","type":"paragraph"},{"text":"我对廖璋（“牛虻”的积极分子）说：我们要考试了，没有时间，你们只要毕业论文一交，就没有事了，希望你们继续下去，等我们考试完后再继续。","type":"paragraph"},{"text":"有一天廖璋转来一篇邵济永（化一右派分子，“低音”的主编）的稿子，大意是希望“小小民主”支持他，请求派记者去访问他们班上。","type":"paragraph"},{"text":"六月八日上午上课时我与××等估计班上同学情况。（那些人可以参加搞大民主）但结果认为班上没有基础。","type":"paragraph"},{"text":"黄鹤（物三朱绍忠，右派分子）六月八日来交稿，先发牢骚后谈到搞大民主的事，他拿出“最后通牒”给我看。后面留有签名的地方。他提出“最后通牒”后，李景煜说：可以……。我说：可惜其他学校未搞起来，……。和他一道出来时我说：你这个东西可以是可以，就是人少了不行。他说：我已约了十几个人，其他有办法，你看，你们寝室那边是否有人。……我又问李景煜知道不！他说：他晓得的。","type":"paragraph"},{"text":"六月七日朱国芬（医学院二年级右派分子，鸣放中曾进行一系列反党反社会主义活动，并参予拟订“民主治校”草案）来找我……。我带着她去看了好一阵（民主墙），找胡永文的那篇“我要控诉”与她看。我说：你们搞没有？……去写嘛！怕那样。","type":"paragraph"},{"text":"她来看民主墙时，我也把中二刘坪等到省委去“请愿”的事向她说了。星期五我们班上开会的情况也向她说了。我问那边（医学院）的情况怎样？她说：同学都拥护杜院长，不欢迎新调来的院长，都认为他不懂业务，只会搞行政工作，当医学院院长不行……。她又说：有些教授也不满意新来的院长；我说这个问题可以提出来研究，报上载有的“教授治校”、“民主治校”。你们在民主墙上也可以把这问题提出来……。这是我事先给她谈的，也暗示她这样做。我确实去那边点了一把火。","type":"paragraph"},{"text":" 来源：《右派言行集（下集）》 （全校学生中部分右派言行），中共云南大学委员会编，一九五七年九月。括号内按语为此书编者所加。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"55aa5d1dc9"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
