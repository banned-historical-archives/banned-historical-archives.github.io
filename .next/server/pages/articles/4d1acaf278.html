script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"余秋里在国防大学进修系开学典礼上要求  领导干部带头学习马列主义理论  站在反对资产阶级自由化的前列","authors":[],"dates":[{"year":1987,"month":3,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"余秋里在国防大学进修系开学典礼上要求"},{"type":"paragraph","text":"领导干部带头学习马列主义理论"},{"type":"paragraph","text":"站在反对资产阶级自由化的前列"},{"type":"paragraph","text":"新华社北京3月16日电　军委副秘书长、总政治部主任余秋里今天在国防大学进修系开学典礼上讲话说，坚持四项基本原则是我们立党立国之本，也是我军最大的特色。要坚持马克思主义，首先必须学习马克思主义理论。要培养出一支有军队特点的马克思主义理论队伍。"},{"type":"paragraph","text":"余秋里说，当前开展的坚持四项基本原则，反对资产阶级自由化的斗争，既是解决现实的重大政治原则问题，也是解决现实提出的重大理论是非问题。要从根本上解决问题，而且能长久地起作用，一个很重要的方面就是提高全党同志、尤其是领导干部的马克思主义理论水平。马列主义、毛泽东思想是反对资产阶级自由化的思想武器。领导干部要站在反对资产阶级自由化斗争的前列，首先就要在学习中央文件、学习马克思主义理论上起带头作用。"},{"type":"paragraph","text":"余秋里指出，最近，很多单位举办读书班，组织干部集中学习马列主义理论，开始形成了学习理论、钻研理论的风气，这些好的做法和制度要长年坚持下去。反对资产阶级自由化的斗争需要我们学习马克思主义理论，也为我们学习理论提供了正反两方面的材料。广大干部要结合斗争实践，努力学习，使自己的马克思主义理论水平有一个新的提高。马克思主义的基本原理并没有过时，对社会主义现代化建设，对反对资产阶级自由化的斗争，有着重要的指导作用。我们要坚定对马克思主义的信念，努力学习和掌握马克思主义的立场、观点和方法，树立科学的世界观和正确的人生观，提高思想政策水平和分析问题、解决问题的能力。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"余秋里","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4d1acaf278"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
