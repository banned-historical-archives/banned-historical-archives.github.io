script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"旅英、旅法华侨分别在伦敦和巴黎举行庆祝大会  热烈拥护华主席　热烈欢呼毛主席的事业后继有人","authors":[],"dates":[{"year":1976,"month":11,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"旅英、旅法华侨分别在伦敦和巴黎举行庆祝大会"},{"type":"paragraph","text":"热烈拥护华主席　热烈欢呼毛主席的事业后继有人"},{"type":"paragraph","text":"新华社伦敦一九七六年十一月七日电 五百多旅英华侨代表十一月七日下午在伦敦举行庆祝大会，热烈庆祝华国锋同志任中共中央主席、中央军事委员会主席，热烈庆祝粉碎王洪文、张春桥、江青、姚文元反党集团的伟大胜利。"},{"type":"paragraph","text":"庆祝大会主席台上悬挂着伟大领袖和导师毛主席的巨幅画像，两边挂着中华人民共和国国旗。"},{"type":"paragraph","text":"中国驻英国大使宋之光出席了庆祝大会。"},{"type":"paragraph","text":"庆祝大会在中华人民共和国国歌、《东方红》乐曲声中开始。旅英各界华侨代表和伦敦地区华侨妇女代表在庆祝大会上讲了话，热烈拥护华国锋同志任中共中央主席、中央军委主席，愤怒声讨王、张、江、姚反党集团篡党夺权、颠覆无产阶级专政、复辟资本主义的滔天罪行。"},{"type":"paragraph","text":"旅英华侨代表、英国华人社团联合会副主席张和平在讲话中说：“我们旅英华侨坚决拥护中共中央一九七六年十月七日关于华国锋总理任中共中央主席、中央军委主席的决议。这是伟大领袖毛泽东主席生前的英明安排，是全中国人民包括我们旅英华侨的共同心愿，是对国内外一切阶级敌人的沉重打击。”他说：“以华国锋为首的党中央，得到了全中国八亿人民包括我们海外华侨的衷心爱戴和热烈拥护，斗争的实践证明，毛主席生前的决策是何等英明，毛主席的事业后继有人，兴旺发达，我们为中国共产党和中华人民共和国又有了自己的领袖华国锋主席而感到莫大的欢欣鼓舞；我们对以华国锋为首的党中央完全信赖。”"},{"type":"paragraph","text":"他指出：“在毛主席逝世后，在中国革命关键时刻，以华国锋主席为首的党中央采取了果断的措施，揭露了王洪文、张春桥、江青、姚文元反党集团，挽救了中国革命，挽救了中国共产党，巩固了中国的无产阶级专政，使中国人民继续沿着毛主席指引的航向胜利前进”。"},{"type":"paragraph","text":"他愤怒地说：“‘四人帮’祸国殃民，罪恶极大。他们是全中国人民包括我们海外华侨在内的共同死敌，真是十恶不赦，死有余辜。如果‘四人帮’的反党阴谋得逞，党就要变修，国家就要变色。全中国广大劳动人民就要吃二遍苦，广大海外华侨又要沦为海外孤儿，这种历史绝不能重演”。"},{"type":"paragraph","text":"庆祝大会在热烈掌声中通过了旅英爱国华侨给华国锋主席、中共中央的致敬电。"},{"type":"paragraph","text":"新华社巴黎一九七六年十一月七日电 旅法华侨一千一百多人十月三十日在巴黎举行庆祝大会，热烈庆祝华国锋同志任中共中央主席、中共中央军委主席，热烈庆祝粉碎王洪文、张春桥、江青、姚文元反党集团篡党夺权阴谋的伟大胜利。"},{"type":"paragraph","text":"大会主席台上挂着伟大领袖和导师毛泽东主席的巨幅画像以及五星红旗。"},{"type":"paragraph","text":"旅法华侨俱乐部主任杨岳和俱乐部其他负责人出席了庆祝大会。"},{"type":"paragraph","text":"旅法华侨俱乐部负责人张璧山在庆祝大会上讲话。"},{"type":"paragraph","text":"他说：“今天，旅法广大爱国华侨和关心、热爱中国的朋友们欢聚一堂，热烈庆祝华国锋同志任中国共产党中央委员会主席、中共中央军事委员会主席，热烈庆祝粉碎王洪文、张春桥、江青、姚文元反党集团篡党夺权阴谋的伟大胜利。我们旅法爱国华侨要同全国各族人民一道热烈欢呼这件中国人民政治生活中的大喜事！”"},{"type":"paragraph","text":"张璧山说，“我们坚信：在以华国锋主席为首的党中央领导下，我们的社会主义事业一定会一天比一天兴旺。”"},{"type":"paragraph","text":"一些华侨代表也在庆祝大会上发言，一致热烈欢呼以华国锋主席为首的党中央继承毛主席的遗志，代表全党全军全国各族人民的根本利益和共同心愿，一举粉碎王、张、江、姚反党集团篡党夺权阴谋的伟大胜利，愤怒声讨王、张、江、姚反党集团的滔天罪行，表示旅法爱国华侨与祖国人民一样坚决拥护华国锋主席，信赖以华国锋主席为首的党中央。"},{"type":"paragraph","text":"旅法华侨俱乐部负责人刘友煌在庆祝大会上宣读了全体旅法爱国华侨致中共中央的贺电。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"江青","type":"人物"},{"name":"姚文元","type":"人物"},{"name":"王洪文","type":"人物"},{"name":"张春桥","type":"人物"},{"name":"华国锋","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"四人帮","type":"人物"},{"name":"夺权","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"730d915992"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
