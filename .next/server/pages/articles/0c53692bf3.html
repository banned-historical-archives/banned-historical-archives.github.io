<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"77f8d60b-66c4-8b3d-7488-ffdedc1e6fd2","name":"马克思恩格斯选集 第一卷（1972年5月）","internal":false,"official":true,"type":"pdf","author":"马克思、恩格斯，人民出版社1972年5月","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives4/main/77f8d60b-66c4-8b3d-7488-ffdedc1e6fd2.pdf"],"article":{"title":"巴黎《改革报》论法国状况","alias":"","parts":[{"type":"paragraph","text":"马克思"},{"type":"paragraph","text":"巴黎《改革报》论法国状况"},{"type":"paragraph","text":"科伦11月2日。还在六月起义以前，我们就不止一次地揭露过固守1793年传统的共和党人的幻想，即《改革报》148（“巴黎的”）的共和党人的幻想。在六月革命及其所引起的运动的影响下，这些空想的共和党人才渐渐睁开了眼睛。"},{"type":"paragraph","text":"《改革报》10月29日的社论向我们表明了这个党派内部旧幻想和新事实之间斗争的情形。"},{"type":"paragraph","text":"《改革报》写道："},{"type":"paragraph","text":"“我们这里为掌握政权而进行的斗争从来就是阶级的战争。第一共和国产生时资产阶级和人民反对贵族的斗争，武装的人民在国外的自我牺牲，帝国时代资产阶级在国内的统治，长系波旁王朝时期封建制度复辟的企图，最后，1830年资产阶级的胜利和统治，一一这就是我们的历史。”"},{"type":"paragraph","text":"《改革报》深深地叹了一口气，然后补充说："},{"type":"paragraph","text":"“当然，我们以惋惜的心情来谈论阶级，谈论违背神的意志的、可恨的差别；但是这些差别存在着，我们不能否认这个事实。”"},{"type":"paragraph","text":"这就是说：《改革报》的那种共和主义的乐观主义至今所看到的只是“市民”。但是历史已有力地把《改革报》逼得走投无路，使它不能再用幻想来消灭“市民”分裂为“资产者”和“无产者”的现象。"},{"type":"paragraph","text":"《改革报》继续写道："},{"type":"paragraph","text":"“2月间，资产阶级的专制政治被摧毁了。人民要求什么东西呢？对人一律公正，平等。这就是他们的第一个口号，他们的第一个愿望。遭到雷击而恍然大悟的资产阶级最初除了人民的愿望以外再没有别的愿望。”"},{"type":"paragraph","text":"《改革报》仍然用二月革命的漂亮词句来判断二月革命的性质。在二月革命中，资产阶级的专制政治根本没有被摧毁，而是获得了充分完善的表现。王冠，即掩盖着资产阶级阶级统治的最后一道封建的灵光圈，已被摘掉。赤裸裸的资本统治暴露出来了。在二月革命中，资产阶级和无产阶级为反对共同的敌人而斗争。当共同的敌人一被消灭，战场上就只剩下这两个敌对的阶级，它们两者之间就必然要开始决战。可是，有人会问我们，既然二月革命已建立了完备的资产阶级统治，为什么又会发生资产阶级退向保皇主义这种新的转变呢？这是再简单不过的了。因为资产阶级留恋那个时期，当时它占居统治地位而不用对自已的统治负责；当时介于资产阶级和人民之间的虚构的权力既为资产阶级的利益效劳，又替资产阶级掩护；当时资产阶级有个戴着王冠的替罪羊，每当无产阶级要向资产阶级本身射击的时候，炮弹总是落在替罪羊的身上，而一旦这个替罪羊成了资产阶级的累赘以及资产阶级想把自已的政权确立为专为自身服务的政权，资产阶级就自动同无产阶级联合起来反对它。资产阶级把国王作为防备人民的避雷针，而把人民作为防备国王的避雷针。"},{"type":"paragraph","text":"《改革报》把路易-菲力浦失败后第二天得到广泛传播的部分伪善部分诚挚的幻想看做现实，把二月事件以后发生的运动看做一系列的错误和悲痛的偶发事件，如果有一个适应时势需要的大丈夫出现的话，这种错误和悲痛的偶发事件就可以避免。好象带有虚幻的光辉的拉马丁并不是适应时势的真正大文夫似的。"},{"type":"paragraph","text":"《改革报》抱怨说：可是，真正的丈夫，大丈夫至今还不想出现，而时势却在每况愈下。"},{"type":"paragraph","text":"“一方面，工商业的危机在加深。另一方面，仇恨在增长。所有的人都力求达到相反的目的。那些在2月24日以前受压迫的人们，在关于崭新的社会的观念中寻找自已的幸福和自由的理想。那些在君主制度下占居统治地位的人们，只关心怎样恢复自已的权力和加倍残酷地来利用它。”"},{"type":"paragraph","text":"怎么，难道《改革报》竟站在这两个互相极端对立的阶级之间的立场上吗？它是否已经提高到哪怕只是模糊地了解，阶级对立和阶级斗争只能随着阶级的消失而消失呢？"},{"type":"paragraph","text":"不是的！《改革报》刚刚承认了阶级对立的存在。但是，阶级对立是建立在经济基础上的，是建立在迄今存在的物质生产方式和由这种方式所决定的交换关系上的。而《改革报》认为改变和消灭这种对立的最好的手段，莫过于使自已的视线离开阶级对立的现实基础，就是说离开这些物质关系，而回头奔向共和国思想的虚幻高空，即奔向富有诗意的二月时期，因为六月事变用暴力把它从这个时期中揪了出来。请听吧："},{"type":"paragraph","text":"“在这些内订中，最令人悲痛的事情就是爱国的、民族的情感的消弹和丧失”，即两个阶级用来给自已的一定利益、给自已的生活条件添增爱国和民族色彩的那些幻想的消弹和丧失。当这些阶级在1789年这样做的时候，它们之间的真正对立还不显著。因此，现在提适合于当时状况的东西，仅仅意味着逃避承认目前状况。当时还是活着的东西，现在已变成了干户。"},{"type":"paragraph","text":"《改革报》最后写道：“显然，法国在遭受一种根深蒂固的祸害的折磨，但是，这种祸害并不是不可救药的。它的根源是思想和道德的混乱，是忘记了社会关系中的公正和平等，是受了利已教育的有害影响。应当在这方面寻找改造的手段。然而人们不这样做，却诉诸物质手段。”"},{"type":"paragraph","text":"《改革报》把问题转移到“良心”方面去，而关于道德的空谈现在就成为根除一切祸害的手段了。由此看来，资产阶级同无产阶级之间的对立是由这两个阶级的思想产生的了。但这种思想是从哪里产生的呢？是从社会关系中产生的。而这种关系又是从哪里产生的呢？是从敌对阶级的物质的、经济的生活条件中产生的。在《改革报》看来，如果这两个阶级不再意识到自已的真正状况和自已的真正对立，并用1793年那种“爱国的”情感和漂亮话做鸦片来麻醉自己，对它们会有好处的。多么软弱无力呵！"},{"type":"paragraph","text":"原文是德文写于1848年11月2日"},{"type":"paragraph","text":"选自《马克思恩格斯全集》载于1848年11月3日"},{"type":"paragraph","text":"第5卷第531-534页《新莱茵报》第133号"}],"authors":["马克思"],"dates":[{"year":1848,"month":11,"day":2}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":366,"page_end":369},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0c53692bf3"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
