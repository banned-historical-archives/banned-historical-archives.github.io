<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"“医护公合一”是什么货色?——驳“医护公分工是资产阶级等级森严”","authors":["郑先"],"dates":[{"year":1978,"month":4,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"上海市第六人民医院　郑先"},{"type":"paragraph","text":"所谓“医护公合一”，是假左真右的货色。“四人帮”及其在上海的余党叫嚷什么要“打破医生、护士、公务员分工的资产阶级等级森严”，捡起早为实践证明是行不通的“医护公打统仗”的口号，要医生、护士、公务员一起挂听筒，一起拿针筒，一起拎铅桶。他们把这套极“左”的货色冠之以“新生事物”，“出土萌芽”的动听名称，强令在医院推行。谁稍持异议，棍子、帽子就劈头而来。"},{"type":"paragraph","text":"“等级森严”，本来是封建特权的一种特征，是封建社会阶级关系的一种反映。在我们社会主义社会里，医、护、公的分工，是为了更好的救死扶伤，实行革命的人道主义，不管是当医生、做护士、干公务员，都是革命工作。革命有分工，行行都光荣，并无高低贵贱之分。从事脑力劳动的广大知识分子同样是劳动者，劳动者之间有什么“等级森严”可言?由于分工不同，会出现一些矛盾，只要我们按照毛主席的教导，坚持进行社会主义教育，不断提高政治思想觉悟，这些矛盾是能够加以解决的。“四人帮”故意把医护公之间的必要分工，同“资产阶级等级森严”这两个根本不同的概念混为一谈，从根本上混淆了新旧两种截然不同的社会制度的本质区别。这不仅对知识分子是一种打击和迫害，而且对护士、公务员也是一种毒害和诬蔑。"},{"type":"paragraph","text":"我们的医生、护士、公务员之间的分工，是劳动者之间的分工，是社会主义性质的分工。我们目前的这种分工，又带有旧的分工残余，就是说，还是把人固定在一种职业上，限制在一种特定的活动范围内。只有在共产主义社会里，在劳动已经不仅仅是谋生的手段，而且本身成了生活的第一需要，生产力高度发展，社会财富大量增加，人们的科学文化水平极大提高之后，旧的分工残余才会完全消失。我们现在还不具备这个条件，我们目前所作的分工，仍然有它存在的必要性和合理性。“四人帮”不承认这种必要性和合理性，硬要把“分工”换成“合一”，看起来“左”得很，实际上，正是他们唯心主义盛行，形而上学猖獗的表现。"},{"type":"paragraph","text":"实践最为有力而深刻地揭穿了“医护公合一”这个口号假左真右的实质。在医生、护士、公务员平均分摊医疗、护理、后勤工作的日子里，一度出现了老年医技人员“随大流”，中年医技人员“吃老本”，青年医技人员“跟着混”的状况；医院里垃圾成堆，杂乱无章，基础护理没人做，医疗科研无人搞，病房陪客大量增加，医疗护理质量急剧下降。几年当中，我们医院在诊断符合率、病床周转率和使用率、病人治愈率、门诊复诊率等几个主要指标上，普遍差于历史最好水平；老慢支防治、医学遗传研究等重点科研项目，也因医生、科研人员精力被牵制，加上“四人帮”大扣“白专”帽子而被搞得无声无息。事实清楚地说明，“四人帮”提出这个口号，正是为了达到他们干扰毛主席的无产阶级革命卫生路线，破坏社会主义医疗卫生事业的罪恶目的。"},{"type":"paragraph","text":"在揭批“四人帮”的第三战役中，我们联系对医院影响最大、危害最深、流毒最广的“医护公合一”等问题，反复批判，拨乱反正。现在，全院各科室都已建立和健全了以岗位责任制为中心的规章制度，恢复了一批医务人员的技术职称，医疗护理质量和病房管理提高到了一个新的水平，科研、学术活动空前活跃。全院广大医护员工分工不分家，团结协作，并肩战斗，正以更大的革命干劲，贯彻落实五届人大和全国科学大会精神，为实现新时期的总任务贡献力量。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"name":"上海文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c8d5806c66"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
