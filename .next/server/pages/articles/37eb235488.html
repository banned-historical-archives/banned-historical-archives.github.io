script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"古巴军队总督察斥美国的经济威胁  古巴一定要结束美国资本剥削  感谢我国对古巴的支持　赞扬我国人民的建设热情","authors":[],"dates":[{"year":1960,"month":5,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"古巴军队总督察斥美国的经济威胁"},{"type":"paragraph","text":"古巴一定要结束美国资本剥削"},{"type":"paragraph","text":"感谢我国对古巴的支持　赞扬我国人民的建设热情"},{"type":"paragraph","text":"据新华社28日讯　正在我国进行访问的古巴军队总督察威廉·加尔维斯·罗德里格斯少校今天接见本社记者时郑重申明，古巴人民在必要时将不惜牺牲一切来对付美帝国主义对古巴的军事侵略威胁和经济威胁，一定要结束美国资本的剥削。加尔维斯指出：“我们古巴人民反对帝国主义的斗争，是正义的事业。我们不要求不属于我们的任何东西，但我们必须获得原来就属于古巴人民的东西。”"},{"type":"paragraph","text":"他强烈指责美国垄断集团对古巴所采取的越来越恶毒的经济政策和措施。"},{"type":"paragraph","text":"加尔维斯深深感谢中国人民对古巴革命的同情和支持。"},{"type":"paragraph","text":"他谴责美帝国主义破坏了四国首脑会议。他指出，美国垄断资本、特别是军火巨商根本就不要缓和国际紧张局势。他还指出，美国的战争政策正在日益发展。"},{"type":"paragraph","text":"加尔维斯说，从他在北京和上海亲身参加的反对美帝国主义及其走狗们的大规模群众集会上，“我看到了中国人民对各国人民反对殖民主义、反对傀儡政权、反对压迫、反对外国垄断资本、反对歧视的斗争给予了多么大的支持和关怀。”"},{"type":"paragraph","text":"加尔维斯以他亲身看到的中国的现实，驳斥了帝国主义分子关于中国的各种诬蔑和欺骗宣传。他说：“我看到了中国人民如何用自己的双手在建设祖国，我看到了解放以前像奴隶一样的人民如何变成了真正的人，我看到了生活在新时代中的中国人民的幸福生活，孩子们希望自己更快成长，可为人民工作，老年人不愿死亡，要使自己继续成为对祖国有贡献的人。我看到了中国人民军队如何在帮助人民生产，如何与人民水乳交融。我看到了中国人民如何热爱毛主席和其他领导人。这些，使所有访问者深为感动。每一个到中国访问过的真正诚实的人都不能不高呼：中国人民正在进行多么伟大多么美丽的事业！”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"37eb235488"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
