script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"朝鲜职业总同盟中央举行全会  强调加强对劳动者的阶级教育  反对现代修正主义　捍卫马列主义的纯洁性","authors":[],"dates":[{"year":1963,"month":7,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"朝鲜职业总同盟中央举行全会"},{"type":"paragraph","text":"强调加强对劳动者的阶级教育"},{"type":"paragraph","text":"反对现代修正主义　捍卫马列主义的纯洁性"},{"type":"paragraph","text":"新华社平壤电　朝鲜职业总同盟中央委员会，从六月二十七日到二十八日举行了全体会议，讨论了在劳动者中间加强阶级教育和贯彻执行朝鲜劳动党中央“关于进一步加强千里马作业班运动”的决议的两个问题，并作出了相应的决议。"},{"type":"paragraph","text":"职业总同盟中央委员会委员长金曰龙和副委员长李钟洙，就上述两个问题分别在会上作了报告，会议就报告进行了讨论。"},{"type":"paragraph","text":"全体会议强调指出：不仅要使劳动者憎恶美国和日本帝国主义以及地主、资本家，而且要彻底认识到它们的本性；在用历史的、具体的事实对劳动者进行教育的同时，要正确地结合马克思列宁主义关于阶级、阶级斗争和革命原理进行教育；要使朝鲜工人阶级坚决反对为帝国主义服务的现代修正主义，彻底捍卫马克思列宁主义的纯洁性。"},{"type":"paragraph","text":"全会强调指出，所有职业同盟组织首先要关心对劳动者进行阶级教育的工作，并经常地、系统地加强指导。根据某些职业同盟委员会的经验，负责干部要直接掌握和指导思想工作，并积极发动积极分子参加这个工作。关于如何加强千里马作业班运动的问题，全会强调，职业同盟组织在指导千里马作业班运动中要依靠有关党组织，接受党的领导。通过千里马作业班运动，用共产主义思想教育和改造全体劳动者，使他们钢铁般地团结在党的周围。通过这一运动，促进国民经济各部门完成技术革命任务，使千里马骑手起光荣的突击手作用。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2ee3359171"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
