script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"提高无产阶级专政下继续革命的觉悟  沈丘县委通过举办轮训班和政治夜校等形式，帮助基层干部学好理论，搞好思想革命化，注意同资产阶级腐蚀进行斗争","authors":[],"dates":[{"year":1975,"month":3,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"提高无产阶级专政下继续革命的觉悟"},{"type":"paragraph","text":"沈丘县委通过举办轮训班和政治夜校等形式，帮助基层干部学好理论，搞好思想革命化，注意同资产阶级腐蚀进行斗争"},{"type":"paragraph","text":"新华社郑州一九七五年三月二十日电　中共河南省沈丘县委认真帮助基层干部学好毛主席关于理论问题的重要指示和马克思、恩格斯、列宁关于无产阶级专政的部分论述，使许多基层干部进一步提高了无产阶级专政下继续革命的觉悟。"},{"type":"paragraph","text":"毛主席关于理论问题的重要指示发表后，沈丘县委通过举办县轮训班、公社学习班、大队中心学习小组、生产队政治夜校等形式，组织基层干部认真学习。县委的十三名常委也带领三百多名直属机关干部到农村基层蹲点，同时全县有近千名公社干部下到生产队，加强对学习的领导。县委领导成员带头学、带头讲、带头做好辅导工作，努力帮助基层干部解决学习中遇到的问题。"},{"type":"paragraph","text":"沈丘县委还组织基层干部与理论队伍、贫下中农代表一起作社会调查，总结一些先进单位巩固和加强无产阶级专政的经验，研究当前农村里阶级斗争、路线斗争的状况，以加深关于无产阶级专政理论的理解。通过这样的学习和调查，许多基层干部对坚持无产阶级专政的重要性有了新的认识，他们表示，一定要认真学好无产阶级专政的理论，把无产阶级专政下的继续革命进行到底。"},{"type":"paragraph","text":"在这次学习中，沈丘县委表彰了一批在同资产阶级腐蚀进行斗争中表现得好的基层干部，启发大家更好地学习革命理论，加强自身的思想革命化，同资产阶级的腐蚀作斗争。"},{"type":"paragraph","text":"范营公社阮洼大队党支部书记侯四顷，当干部二十多年来，艰苦奋斗，廉洁奉公，群众称他是“糖衣炮弹”打不中的钢铁汉。县委表彰了他的事迹，很多干部表示要向侯四顷学习，坚持无产阶级专政下的继续革命，为巩固无产阶级专政不断作出贡献。（附图片）"},{"type":"paragraph","text":"广西永福县制药厂广大干部、职工认真学习无产阶级专政的理论，抓革命促生产，发展革命大好形势。"},{"type":"paragraph","text":"本报通讯员摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"699903f230"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
