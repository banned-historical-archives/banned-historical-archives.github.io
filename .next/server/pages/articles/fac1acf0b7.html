" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji26","name":"毛泽东全集第26卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji26.pdf"],"article":{"title":"解决太原问题的部署叫","alias":"","parts":[{"type":"paragraph","text":"解决太原问题的部署！"},{"type":"paragraph","text":"（1949年1月24日）林、罗、聂，杨、罗、耿，杨、李凹，并告华北局及徐、周、陈："},{"type":"paragraph","text":"各电均悉。（一）北平和平解决后，太原亦有和平解决之可能。华北第一、第二兵团的大休整，应放在夺取太原之后。（二）杨罗耿、杨李待林罗派出接替所任防务之部队到达后，即开至石家庄附近休整半个月，即向太原开进。（三）东北临时配属之两个炮兵团，即直接向太原开进，受徐周陈指挥，控制太原一切机场，追使阎匪谈判，和平接收太原。如阎匪顽抗，则待华北二、三兵团到达后，实行攻城。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"二十四日十八时"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军委起草的给东北野战军司令员林彪、政治委员罗荣桓和华北军区司令员聂荣臻等的电报。"},{"type":"paragraph","text":"[2]杨、罗、耿，指杨得志、罗瑞卿、耿飚，当时分别任华北军区第二兵团司令员、政治委员和参谋长。杨、李，指杨成武、李天焕，当时分别任华北军区第三兵团司令员和副政治委员兼政治部主任。"},{"type":"paragraph","text":"[3]徐、周、陈，指徐向前、周士第、陈漫远，当时分别任华北军区副司令员兼第一兵团司令员兼政治委员、第一兵团副司令员兼副政治委员和参谋长。"}],"authors":["毛泽东"],"dates":[{"year":1949,"month":1,"day":24}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":60,"page_end":60},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fac1acf0b7"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
