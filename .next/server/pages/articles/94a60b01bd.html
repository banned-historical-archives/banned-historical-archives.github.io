<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"云南省陆良县在土地改革中运用人民法庭的经验","authors":[],"dates":[{"year":1952,"month":4,"day":22}],"is_range_date":false,"parts":[{"text":"云南省陆良县在土地改革中运用人民法庭的经验","type":"title"},{"text":"陆良县自宣布土地改革以来，注意结合群众斗争，运用人民法庭镇压地主阶级及反革命分子的顽抗与破坏，对于保证土地改革顺利进展起了很大作用。鼓舞了农民群众的斗争情绪，提高了群众的觉悟。由于充分发挥了人民法庭的作用，群众掌握了人民法庭这个斗争武器后，进一步保证了合法斗争的贯彻。在这一段工作中，我们有如下几点体会：","type":"paragraph"},{"text":"运用人民法庭惩治违抗土地改革的罪犯","type":"subtitle"},{"text":"陆良县人民法庭干部在明确了自己的工作任务后，在县的统一领导下，与土地改革工作队密切企系，结合着土地改革中的划阶级、没收征收、分配等工作步骤，进行工作，惩治了违抗土地改革法令的罪犯。如在运动进入没收阶段，五区人民法庭分庭即结合着群众斗争开庭公审，惩办了地主阶级当权派5人，镇压了反革命分子5人，又根据群众的意见，将地主分为顽抗、观望、守法三种，有区别地作了不同的宣判后，充分发挥了镇压与分化敌人与教育群众的作用。前所乡镇压了顽抗的恶霸地主郑家富后，他的老婆当庭即表示遵守土地改革法令。该乡恶霸地主郑家忠继续顽抗，人民法庭又接受群众要求，再度开庭公审处决了恶霸地主郑家忠。这样大大地打击地主阶级的负隅顽抗，鼓舞了群众的斗争热情。人民法庭在郭家乡处决了恶霸地主周维兆时，全乡到场的地主的威风都垮了，寺耳乡的一些地主不老实，群众警告他们说：“你们来按个不老实的手印，把你们送交人民法庭！”不老实的地主即连忙答应说：“我们愿老实坦白。”凹子乡的地主张映毕在划阶级后联图否认他的阶级成份，群众说：“你如果不承认你的阶级成份，可以到人民法庭去申诉。”地主张映毕自知理屈，不敢狡辩了，只得承认了自己的阶级成份。由于人民法庭在运动的每个环节中都发挥了其作用，向地主阶级展开有力的镇压，地主说：“别的斗争不比人民法庭，一到法庭，每说一句话都要记下来。”都很害怕人民法庭。而群众则逐渐熟悉了结合自己的斗争运用人民法庭的武器去向地主阶级进攻，使得自己的斗争获得胜利。","type":"paragraph"},{"text":"适时举行公审大会","type":"subtitle"},{"text":"大凡对群众有重大教育意义的重大案件，人民法庭即抓紧机会举行公审大会。在公审大会时，一方面组织典型控诉，藉以进一步教育农民认识地主阶级的丑恶罪行，提高农民阶级觉悟；另一面，人民法庭也进行宣传工作。如马街镇在开公审大会时，由公安部门举办了一个“镇压反革命展览会”，把反革命分子及地主阶级的反动武器、反动会道门的各种反动物件拿出展览，并将该次公审大会上公审的反革命分子杨树林、恶霸地主殷承义的杀人放手、欺压群众等罪行，用12幅漫画张贴出来，群众看了这些展览品及漫画后，受到了很大的教育，阶级觉悟大大地提高了一步。","type":"paragraph"},{"text":"在公审大会后，还须注意发动群众乘公审大会的威势打击其余动摇的地主。如三联乡在公审大会后，运用了策略，搞出了地主阶级隐藏的卡宾枪3支，大烟6000余两，取得了很大成绩。","type":"paragraph"},{"text":"依靠群众进行工作","type":"subtitle"},{"text":"人民法庭不能孤立地进行工作，除需统一在县的领导下，必须注意结合群众的发动和斗争情况来进行工作。人民法庭受理的案件，均须根据群众提供的材料和有关部门进行侦察的结果研究得出结论，然后才能进行公审。陆良人民法庭审判是采取庭审与巡回就审的方式进行。凡顽抗的恶霸地主，则采用就地审讯。在审讯前，把由群众中搜集来的材料先交给群众讨论，组织苦主座谈，再与贫雇农主席团会商审讯的办法，向群众交代好政策，然后再进行审讯。如犯人回答避重就轻或支吾其词，即由苦主及群众出面对质，拿出人证物证，使其理屈词穷，低头认罪。在审讯完毕后，应给群众作简单的总结。请陪审员提供意见，广泛地向群众征求处理意见，再分别主、从犯的罪行，按照政策，由审讯员提出意见，商量判决。","type":"paragraph"},{"text":"总之，人民法庭的工作，必须结合深入发动群众进行，法庭工作人员必须明确人民法庭乃是镇压敌人的武器，显然与“坐大堂审案”不同。因此，人民法庭自始至终，一定要依靠群众，发动群众，贯彻整个群众路线的工作方法。","type":"paragraph"},{"text":"人民法庭工作是严肃的。在群众的迫切要求下，法庭工作人员思想上容易产生只图快，未及掌握全部材料就进行处理的草率做法。这种草率作风，是应当防止的。","type":"paragraph"}],"comments":[],"origin":" 中共中央西南局农村工作部编：《西南区土地改革运动资料汇编（下）》，重庆， 1954年。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"94a60b01bd"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
