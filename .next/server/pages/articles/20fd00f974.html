script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"共产党员和革命干部不应当有剥削行为","authors":["王步成"],"dates":[{"year":1956,"month":3,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"共产党员和革命干部不应当有剥削行为编辑同志："},{"type":"paragraph","text":"最近我们中共内蒙古平地泉地方监察委员会到丰镇县巴总营乡调查农村党员执行党纪的情况，发现有些共产党员和革命干部还有着用土地剥削农民的错误行为。"},{"type":"paragraph","text":"1951年这个乡实行土地改革的时候，由于县、区干部还是供给制待遇，他们家属的生活比较困难，因此这些干部也都和农民一样分到了一份土地。以后，这些干部陆续享受了工资制待遇，生活水平逐步提高，他们的家属也都逐渐迁走同干部一起生活了。可是，他们把分来的土地全部出租或半种给农民了。据去年年底的统计，这个乡还有19个干部（其中有不少共产党员）的56亩水地出租和半种给25户农民。这19个干部平均每年要从农民身上剥削1，500多元。到今年1月中旬，还有18名干部既不将这些土地交还农民，也不把这些土地加入合作社。据了解，在丰镇县的各个乡和平地泉地区的其他旗、县也存在着类似的情况。"},{"type":"paragraph","text":"应该责问这些共产党员和革命干部：你们一方面享受着国家工作人员的工资制待遇，另一方面又享受着从农民身上剥削来的果实，这和你们正在进行的为消灭剥削为建设社会主义的工作是相容的吗？有关地区的党组织应该对这些党员和干部进行批评和教育，坚决纠正他们的这种资本主义思想和剥削行为。　王步成"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"20fd00f974"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
