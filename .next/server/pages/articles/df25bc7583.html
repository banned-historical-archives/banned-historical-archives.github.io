script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji38","name":"毛泽东全集第38卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji38.pdf"],"article":{"title":"中央关于召开中共八届三中全会的通知","alias":"","parts":[{"type":"paragraph","text":"中央关于召开中共八届三中全会的通知！"},{"type":"paragraph","text":"（1957年7月31日、8月1日）刘、邓2:"},{"type":"paragraph","text":"此件请提政治局通过，发出。省属市委提名是否恰当，请酌。"},{"type":"paragraph","text":"毛"},{"type":"paragraph","text":"七月卅一日"},{"type":"paragraph","text":"1各中央委员、候补中央委员；各省委、中央直属市委；各地委；哈尔滨、长春、沈阳、抚顺、鞍山、旅大、济南、青岛、南京、杭州、广州、长沙、重庆、成都、兰州、西安、太原各省属市委："},{"type":"paragraph","text":"[1]本篇一是毛泽东写在中共中央关于召开八届三中全会的通知稿上的批语；本篇二是毛泽东为中共中央起草的通知。"},{"type":"paragraph","text":"[2]刘，指刘少奇。邓，指邓小平，当时任中共中央总书记。"},{"type":"paragraph","text":"中央关于召开中共八届三中全会的通知"},{"type":"paragraph","text":"决定于今年九月下半月召开中共中央委员会第八届第三次中央全体会议。请各省委、中央直属市委、自治区党委、地委、上开省属市委选派代表一人参加，最好是第一书记。省级第一书记为中央委员或候补中央委员者，不再选派代表。议程主要为：（一）整风问题；（二）农村问题。特此通知，请各有资格到会的同志们在会前对此两项问题加以研究为盼。"},{"type":"paragraph","text":"中共中央一九五七年八月一日"}],"authors":["毛泽东"],"dates":[{"year":1957,"month":7,"day":31},{"year":1957,"month":8,"day":1}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":194,"page_end":195},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"df25bc7583"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
