script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"毛泽东在军委扩大会议上的讲话摘要（周恩来传达）","authors":["毛泽东"],"dates":[{"year":1967,"month":1}],"is_range_date":false,"parts":[{"text":"在军委扩大会议上的讲话摘要（周恩来传达）","type":"title"},{"text":"毛泽东","type":"authors"},{"text":"一、军队对文化大革命的态度开始时是不介入的，但实际上是已介入了（如材料送到军队保管，有的干部去军队）。在现在的形势下，两条路线斗争非常尖锐的情况下，不可能不介入。介入就必须支持左派。","type":"paragraph"},{"text":"二、老干部多数到现在对文化大革命还不理解，多数靠吃老本。过去有功劳，要很好地在这次运动中锻炼改造自己，要立新功。要坚决站在左派方面，不能和稀泥，坚决支持左派，然后在左派的接管和监督之下搞好工作。","type":"paragraph"},{"text":"三、夺权后的老干部和新夺权的干部要共同搞好业务，保守国家机密。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"两条路线斗争","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"510207a123"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
