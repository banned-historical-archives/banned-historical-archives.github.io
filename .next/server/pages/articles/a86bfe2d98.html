<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"民进各级组织揭露批判了339个右派分子","authors":[],"dates":[{"year":1957,"month":11,"day":10}],"is_range_date":false,"parts":[{"text":"民进各级组织揭露批判了339个右派分子","type":"title"},{"text":"本报讯  中国民主促进会各级组织的反右派斗争，已进入全面深入发展阶段。现在民进中央已在反右派斗争取得基本胜利的基础上，开始以端正政治立场为主要内容的一般整风，与反右派斗争交叉进行；中央机关干部也展开以端正政治立场为主，同时整顿工作作风的整风运动，掀起了大鸣大放的热潮。大部份地方组织的反右派斗争正在向基层深入发展，还有一部份地方组织也将在反右派斗争胜利的基础上，转入交叉进行整风阶段。","type":"paragraph"},{"text":"民进的反右派斗争，进行了五个多月。截至10月底止，在中央和全国34个省市组织中，共揭露出339个右派分子，约占全体会员的4％。其中窃据中央领导层的(包括中委，候补中委和各部门负责人)，约占中央领导人的14％；窃据地方领导层的(包括省，市一级主委，秘书长，委员，各部门负责人)约占地方领导人的12％。在基层组织中发现的右派分子，多数是基层组织的负责人。如北京市41个基层组织揭发出来的78个右派分子中，支部委员就有23人。这些右派分子经过群众性的斗争，他们的丑恶面目彻底暴露，右派言论失去市场，已完全陷于孤立，不得不低头认罪。而广大成员则在斗争中得到煅炼，明辨了大是大非，提高了觉悟。","type":"paragraph"},{"text":"斗争初期，民进的不少地方组织存在严重的右倾情绪，阻碍斗争的展开。9月中旬，民进中央召开了全国整风工作会议，批判并基本上扭转了右倾思想，动员各级组织把反右派斗争进行到底。近一个月来，江苏，浙江，广四，陕西，辽宁，上海，天津，北京，武汉，广州，哈尔滨，长沙，太原等省市组织，先后召开了省市整风会议，传达了全国整风工作会议精神。对全面深入开展反右派斗争作了新的部署。如辽宁，浙江，天津，张家口等地整顿了整风领导机构，撤换了混在领导队伍中的右派分子和有严重右倾错误的负责人，加强了站稳社会主义立场的领导核心力量，使斗争得以深入开展。北京市委按右派分子对象成立专门小组，经过充分的调查研究，在10月间，对市委中右派分子寿墨卿，章士敭等人展开了系统的揭发批判，并准备对市委中的右派分子分批举行说理斗争大会，驳斥右派分子，并使成员受到深刻的社会主义教育。天津，上海市委已在区一级组织成立了整风领导机构，在中共区委的领导下，密切配合基层党组织的统一部署，使斗争深入一步。陕西等其他许多地方组织也在此期间进行了基层的排队摸底工作，重新制订了斗争计划，揭露出一批新的右派分子。","type":"paragraph"},{"text":"但是，民进全国各地方组织的反右派斗争发展情况，还是不平衡的。由于民进大部分成员是中小学教师，有些地区在这方面的反右派斗争还未全面展开，因此斗争还有待于进一步深入。民进中央整风办公室负责人认为：民进的地方组织，应在现有成绩的基础上，继续把反右派斗争进行到底，防止草率收兵，在党的领导下，统一步调，依靠坚定地站稳社会主义立场的领导核心，团结中间大多数，揭发，孤立，分化右派才能取得最后胜利，转入一般整风。","type":"paragraph"}],"comments":[],"origin":"《光明日报》1957年11月10日。原题为: “各级组织揭露批判了339个右派分子; 民进反右派斗争获得很大胜利：部分地方组织即转入整风阶段  有些组织的反右斗争尚应深入”。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a86bfe2d98"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
