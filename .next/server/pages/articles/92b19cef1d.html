script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"在卡特总统和夫人、蒙代尔副总统和夫人陪同下  邓副总理和夫人观赏文艺表演","authors":[],"dates":[{"year":1979,"month":1,"day":31}],"is_range_date":false,"parts":[{"type":"paragraph","text":"在卡特总统和夫人、蒙代尔副总统和夫人陪同下"},{"type":"paragraph","text":"邓副总理和夫人观赏文艺表演"},{"type":"paragraph","text":"新华社华盛顿一月二十九日电  正在这里访问的中国副总理邓小平和夫人卓琳今天晚上在肯尼迪中心观看了美国艺术家的精彩表演。"},{"type":"paragraph","text":"美国总统卡特和夫人、副总统蒙代尔和夫人以及许多其他美国知名人士同中国客人一起观看了文艺表演。"},{"type":"paragraph","text":"今天晚上确实是一个充满了真正友谊的夜晚。美国的许多优秀艺术家专程从全国各地来到这里为来自太平洋彼岸的客人们演出。他们当中有来自加利福尼亚州的环球巡回演出者，来自纽约州的美国黑人舞蹈家，有七十六岁的钢琴家鲁道夫·塞金，流行歌曲演唱家约翰·丹佛和百老汇舞蹈团。"},{"type":"paragraph","text":"每一个节目都由著名的作曲家、演出者、创作者，或前宇宙航行员向观众介绍，他们说，邓副总理访问美国是“一个划时代的事件”。"},{"type":"paragraph","text":"刚刚从中国访问回来的参议员约翰·格伦得知邓副总理喜爱观看篮球比赛，特地介绍了来自加利福尼亚州的六名篮球表演者。他们在舞台上表演了精彩的控球技术。"},{"type":"paragraph","text":"当二百名华盛顿儿童用汉语唱起《我爱北京天安门》这支歌曲时，晚会达到了高潮。这些儿童为进行这次演出准备了两个星期。"},{"type":"paragraph","text":"演出结束时，邓副总理和夫人在卡特总统和夫人的陪同下走上舞台，向演员们表示感谢。"},{"type":"paragraph","text":"卡特总统和邓副总理还向观众讲了话，他们表示希望两个伟大国家的歌唱家、艺术家和表演者之间有更多的交往。"},{"type":"paragraph","text":"出席观看演出的客人还有邓副总理一行的成员方毅副总理和夫人、外交部长黄华和夫人。"},{"type":"paragraph","text":"演出结束后，美中贸易全国委员会为邓小平副总理和夫人举行了招待会。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"92b19cef1d"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
