" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji31","name":"毛泽东全集第31卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji31.pdf"],"article":{"title":"在文学艺术界开展整风学习","alias":"","parts":[{"type":"paragraph","text":"在文学艺术界开展整风学习"},{"type":"paragraph","text":"（1951年11月26日）各中央局，并转分局、各省市区党委，各同级政府文化部门的党组和文艺团体的党组："},{"type":"paragraph","text":"（一）中央批准中央宣传部一九五一年十一月二十三日向中央所作的报告，认为这一报告是正确的。（二）请各中央局、分局、省委、市委、区党委自己和当地从事文学艺术工作的负责同志都注意研究这个报告，仿照北京的办法在当地文学艺术界开展一个有准备的有目的的整风学习运动，发动严肃的批评和自我批评，克服文艺干部中的错误思想，发扬正确思想，整顿文艺工作，使文艺工作向着健全的方向发展。为使这一整风运动获得良好的结果，各中央局、分局、省委、市委、区党委的负责同志和宣传部负责同志必须亲手抓紧对文艺界整风运动的领导，先将你们的计划报告中央和中央宣传部批准。（三）中央这一指示和中央宣传部的报告可以在党内刊物上发表，并可给党外同情分子阅看。"},{"type":"paragraph","text":"中共中央一九五一年十一月二十六日"}],"authors":["毛泽东"],"dates":[{"year":1951,"month":11,"day":26}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":89,"page_end":89},"tags":[{"name":"毛泽东","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]},{"id":"wenji6","type":"pdf","name":"毛泽东文集第六卷（1999）","internal":false,"official":true,"author":"中央文献研究室","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/wenji6.pdf"],"article":{"title":"在文学艺术界开展整风学习","description":"根据毛泽东手稿刊印。","dates":[{"year":1951,"month":11,"day":26}],"parts":[{"text":"在文学艺术界开展整风学习","type":"title"},{"type":"paragraph","text":"各中央局，并转分局、各省市区党委，各同级政府文化部门的党组和文艺团体的党组："},{"type":"paragraph","text":"（一）中央批准中央宣传部一九五一年十一月二十三日向中央所作的报告，认为这一报告是正确的。（二）请各中央局、分局、省委、市委、区党委自己和当地从事文学艺术工作的负责同志都注意研究这个报告，仿照北京的办法在当地文学艺术界开展一个有准备的有目的的整风学习运动，发动严肃的批评和自我批评，克服文艺干部中的错误思想，发扬正确思想，整顿文艺工作，使文艺工作向着健全的方向发展。为使这一整风运动获得良好的结果，各中央局、分局、省委、市委、区党委的负责同志和宣传部负责同志必须亲手抓紧对文艺界整风运动的领导，先将你们的计划报告中央和中央宣传部批准。（三）中央这一指示和中央宣传部的报告可以在党内刊物上发表，并可给党外同情分子阅看。"},{"type":"paragraph","text":"中共中央"},{"type":"paragraph","text":"一九五一年十一月二十六日"}],"comment_pivots":[{"part_idx":2,"offset":32,"index":1}],"is_range_date":false,"authors":["毛泽东"],"comments":["中共中央宣传部的这个报告，在分析两年来文艺工作的成绩和缺点时指出：特别是在文艺工作的领导方面，存在着一种忽视思想工作、脱离政治、脱离群众、迁就资产阶级小资产阶级的倾向，使文艺战线发生混乱，在党的文艺干部中也发展着某些无组织无纪律的现象。为此，决定在文艺干部中进行一次整风学习，以澄清文艺界的各种错误思想，认真建立党对文艺工作的有效领导。"],"page_start":202,"page_end":202,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"505da79630"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
