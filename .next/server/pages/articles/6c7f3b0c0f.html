script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"为彻底摧毁资产阶级司令部而斗争","authors":[],"dates":[{"year":1967,"month":8,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"红卫兵上海市市北中学红旗公社"},{"type":"paragraph","text":"去年六月一日，我们伟大的领袖毛主席亲自决定播发全国第一张马列主义大字报，点燃了无产阶级文化大革命的熊熊烈火。我们市北中学革命师生、红旗公社战士和全国亿万无产阶级革命派一样，高举毛泽东思想伟大红旗，勇敢地向党内一小撮走资本主义道路当权派，向一切牛鬼蛇神发动了猛烈的攻击!在北站医院，我们最早贴出了上街的革命大字报，用这个锐利的武器，把党内一小撮走资本主义道路当权派暴露在光天化日之下，使他们浑身发抖。但是，党内最大的一小撮走资本主义道路当权派决“不会自行退出历史舞台”，为了挽回他们注定要失败的命运，抛出了资产阶级反动路线。在短短五十多天里，我们红旗公社的战士遭受了资产阶级反动路线的残酷迫害，把我们打成“小右派”、“小牛鬼蛇神”，实行白色恐怖，妄图将我校轰轰烈烈的无产阶级文化大革命打下去。就在这个关键时刻，我们最最敬爱的伟大领袖毛主席亲自主持的党的八届十一中全会召开了，并写出了具有伟大历史意义的大字报《炮打司令部》，八月八日，公布了《中国共产党中央委员会关于无产阶级文化大革命的决定》。喜讯传来，全校革命师生奔走相告，激动万分，一片欢腾。"},{"type":"paragraph","text":"我们遵照伟大的十六条，进行了夺权斗争。在举世闻名的“一月革命”风暴中，英勇奋战的红旗公社的战士联合全校革命派终于夺取了我校的党、政、财、文大权。"},{"type":"paragraph","text":"在伟大的十六条的指引下，我们大破特破资产阶级思想，大立特立毛泽东思想，通过整风运动，不断地狠夺自己头脑中“私”字的权，不断地克服我们队伍中的小资产阶级摇摆性。我们紧紧掌握了斗争大方向，坚定地依靠革命左派，争取团结大多数，在大方向一致的前提下，在毛泽东思想的光辉旗帜下，实现了以左派为核心的最广泛的革命大联合，加强了革命师生之间的大团结。"},{"type":"paragraph","text":"回顾一年来，我们战斗的光辉历程，我们取得的每一个胜利都是毛泽东思想的胜利。凡是我们按照毛泽东思想办事，按照十六条行动，我们就无往而不胜。历史事实雄辩地证明，毛主席亲自主持制定的十六条是我们文化大革命的行动指南，我们要永远学习十六条，熟悉十六条，掌握十六条，运用十六条。"},{"type":"paragraph","text":"我们要坚定不移地站在毛主席的革命路线一边，团结广大群众，为彻底摧毁资产阶级司令部而斗争。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"一月革命","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6c7f3b0c0f"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
