script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"祝贺保加利亚解放十周。年毛泽东主席致电达米扬诺夫周恩来总理致电契一尔文科夫和湼伊切夫","authors":["周恩来","毛泽东"],"dates":[{"year":1954,"month":9,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京八日电】　我中央人民政府毛泽东主席致电保加利亚人民共和国国民议会主席团主席格奥尔基。达米扬诺夫，祝贺保加利亚解放十周年。电文如下:"},{"type":"paragraph","text":"保加利亚人民共和国国民议会主席团主席"},{"type":"paragraph","text":"格奥尔基。达米扬诺夫同志:"},{"type":"paragraph","text":"值此保加利亚解放十周年之际，我谨向您并通过您向保加利亚人民和政府致以衷心的、热烈的祝贺。"},{"type":"paragraph","text":"十年来，保加利亚人民在保加利亚共产党的领导下，遵循着季米特洛夫同志的教导，巩固了人民民主制度，并在国家的社会主义建设中获得了光辉的成就。这不仅鼓舞了正在从事社会主义建设的中国人民，而且增强了以苏联为首的世界和平民主力量。"},{"type":"paragraph","text":"祝保加利亚人民在建设社会主义和维护世界和平的斗争中获得新的更大的胜利。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一九五四年九月七日北京"},{"type":"paragraph","text":"【新华社北京八日电】　我中央人民政府政务院总理兼外交部部长周恩来致电保加利亚人民共和国部长会议主席伏尔科。契尔文科夫和外交部部长明乔。湼伊切夫，祝贺保加利亚解放十周年。电文如下:"},{"type":"paragraph","text":"保加利亚人民共和国部长会议主席"},{"type":"paragraph","text":"伏尔科。契尔文科夫同志:"},{"type":"paragraph","text":"保加利亚人民共和国外交部部长"},{"type":"paragraph","text":"明乔。湼伊切夫同志:"},{"type":"paragraph","text":"值此保加利亚解放十周年之际，请接受我对保加利亚人民共和国政府和人民的热烈祝贺。祝保加利亚人民在建设社会主义和进一步提高劳动人民福利的事业中获得更大的成就。并祝中保两国牢不可破的友谊在共同保卫世界和平和争取国际紧张局势的进一步缓和的事业中日益巩固和发展。"},{"type":"paragraph","text":"周恩来"},{"type":"paragraph","text":"一九五四年九月七日北京"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"351ee53118"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
