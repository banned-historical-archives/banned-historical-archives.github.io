<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"省委检查团绵阳分团关于广元、青川两县秋耕秋种、人民公社和干部作风问题的报告","authors":[],"dates":[{"year":1958,"month":12,"day":20}],"is_range_date":false,"parts":[{"text":"省委检查团绵阳分团关于广元、青川两县秋耕秋种、人民公社和干部作风问题的报告","type":"title"},{"text":"[前缺]被乌鸦吃掉了。","type":"paragraph"},{"text":"在副业生产中，改善生猪的管理工作，是一个突出的问题。如广元县李家人民公社9-11月死亡生猪700多头，占该社生猪总数4800多头的14.6%。青川县乐安乡第二区队300多头猪，由于管理不善死了100多头；52只母猪死了13只，其中有1户喂了11头猪，死了10头，只剩下1头了。","type":"paragraph"},{"text":"4、关于集体食堂的问题。今年粮食增产，社员的口粮也有所增加，以广元县王家区石马社为例，57年每人平均口粮是280斤，58年每人平均口粮有360斤，每天平均用粮约为1斤，比57年有很大的改善，但在这个水平上如何把饭菜办得更好一些，某些区乡党委还未采取应有的措施，以加强管理，有些地方甚至违犯大集体小自由的原则。如广元县王家公社石马区队一连一排的两个食堂，就规定社员私人不准搞泡菜，并把各家各户的泡菜罐子都集中起来归食堂所有。后来只吃了三天，泡菜吃完了就没人管了，社员因此有意见。个别乡把社员家庭的锅灶也拆掉了。","type":"paragraph"},{"text":"三、关于干部作风问题","type":"subtitle"},{"text":"区乡干部积极，作风艰苦，对党忠诚，完成任务十分坚决，这是大量的普遍的现象。","type":"paragraph"},{"text":"但是在个别地区少数区乡干部在执行政策中还存在一些问题，有些问题还是比较严重的。","type":"paragraph"},{"text":"1、区乡干部重视完成任务，不注意工作方法，有时产生简单生硬、强迫命令的作风，甚至曲解和违反党的政策，引起了群众的不满。如青川县石坝乡中元社有少数社员未出工，该乡乡长杨佐安即派民兵武装，押上社员下田生产，广元在家已生病，干部借口实行“三集中”和为了办好集体食堂，把全家集中在一间房间里进行搜查，把搜查出来的余粮背走；中子公社亦有搜查粮食的情况，社干部并宣传说，如现在不把余粮交出来，以后搜查出来即作私分公粮论处。青川县乐安乡小窝社社干罗兴让还带上地主到农民家中搜查粮食，使地主的威风死灰复燃。","type":"paragraph"},{"text":"2、以虚带实，虚实并重的方针贯彻不够。有些区乡干部重任务轻思想和强迫命令的工作作风，在工作中出现了两种不正常的情况：一种情况是有些干部在接受任务时表示决心大，并能写决心书，挑战书，但接受任务后就不是积极地组织群众努力完成或争取超额完成任务，而是抱着作多少算多少的消极态度，对完成任务无信心；另一种情况是怕完不成任务受批评，在评比检查时谎报成绩，虚报数字，弄虚作假的现象比较严重。如广元曾家区联合社上报小麦播种任务已全部完成，但经检查麦种还有部分放在家里未动，应下种的面积还未完成。又如该区麻柳乡在上报小麦播种面积时，说已超额2%完成任务，但实际只完成原定任务的80%。","type":"paragraph"},{"text":"3、少数基层干部在工作中发展了比较严重的强迫命令和捆绑吊打人的现象。据青川县三区古城乡今年上半年以来的统计即发生捆绑吊打人63起，全乡36个党员中有6个出手打了人（其中有副支书支委各1人），因吊打致死的2人。广元县王家区文村乡连续几次发生吊打人事故。8月份吊打3人，打死1人，10月份打死1人，11月份有两个老农自杀。有些党团员和分支书记都亲自参加了打人。如青川县马家社（原小社）9个社委都有打人行为。广元县陈家乡于今年8月间还将35名小偷非法组织成劳教队，实行劳动改造，白天强迫劳动，晚上以开检讨会的形式实行非法拷打。在这35名小偷中，贫农11人，中农21人，富农2人，地主1人。绝大部分是中贫农，而且有的根本没有什么偷窃行为或只有些微贪小便宜的毛病，真正有偷窃行为者仅占2%左右。","type":"paragraph"},{"text":"上述关于基层干部作风上存在的问题，仅是局部的、个别的，但是在经过总路线的宣传教育和全民整风以后，仍不断发生严重违法乱纪事件，问题确实严重。据初步分析，有以下几方面的原因：首先是部分基层干部对正确处理人民内部矛盾的政策领会和贯彻很不够，对坚决贯彻党的政策与完成任务的统一性认识片面，掌握上有偏差。其次，那些地方整风不深不透，部分干部在领导去年农村鸣放中即曾发生过打吊人的现象，但未认真整顿和处理，以致重犯类似的错误。第三，某些区以上的领导干部对违法乱纪事件查处不严，制止不力，甚至有意无意地予以附和及支持，听之任之，如青川县曲河区委书记陶嘉琦同志曾说：“打两下没来头”，又在电话会议上说：“曲河乡虽然有强迫命令，但任务完成得好”。又如青川县古城乡支部书记何廷贤批评乡长陈连山说：“你不打人就是右倾”。","type":"paragraph"},{"text":"以上报告，妥否，请省委指示。","type":"paragraph"},{"text":" 省委检查团绵阳分团1958年12月20日","type":"paragraph"}],"comments":[],"origin":"四川省某档案馆","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"人民内部矛盾","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6b8dfbf0ea"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
