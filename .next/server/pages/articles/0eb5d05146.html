" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji30","name":"毛泽东全集第30卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji30.pdf"],"article":{"title":"中央关于由邓华转达中央对志愿军战略方针等问题的决定的电报","alias":"","parts":[{"type":"paragraph","text":"中央关于由邓华转达中央对志愿军"},{"type":"paragraph","text":"战略方针等问题的决定的电报"},{"type":"paragraph","text":"（1951年10月14日）志愿军党委亲爱的同志们："},{"type":"paragraph","text":"你们九月二十日的电报早已收到，我们认为你们的总方针是正确的。邓华同志现来北京，中央已将最近关于志愿军战略方针，节约兵力，节约资材，节约经费及两岸迫近敌人可能登陆处筑工事等项决定告诉了他，由他向你们转达。希望你们联系实际情况规定具体执行办法，争取朝鲜战争的最后胜利。中央对于志愿军全体同志在志愿军党委和彭德怀?同志的领导下进行了一个整年的英勇奋斗，取得了很大的胜利，表示欣慰与慰劳。目前的任务，是用一切努力争取最后胜利。目前国内情况很好，全党及全国人民热烈支援你们。国际形势也于我们有利，敌人困难甚多。我们也有困难，有些是很大的困难，但是可能克服的。只要同志们继续努力，并和朝"},{"type":"paragraph","text":"[1]邓华，当时任中国人民志愿军副司令员兼副政治委员。"},{"type":"paragraph","text":"[2]指中共志愿军委员会1951年9月20日关于志愿军党委扩大会议情况给毛泽东的报告。报告谈到5次战役后部队阻敌的经验教训、整训情况、思想动态与后勤工作，并在持久作战的总的方针指导下对各方面的工作作了具体布置。"},{"type":"paragraph","text":"[3]彭德怀，当时任中国人民志愿军司令员兼政治委员。"},{"type":"paragraph","text":"中央关于由邓华转达中央对志愿军战略方针等问题的决定的电报鲜同志始终团结一致，最后胜利是可以取得的。"},{"type":"paragraph","text":"中共中央十月十四日"}],"authors":["毛泽东"],"dates":[{"year":1951,"month":10,"day":14}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":528,"page_end":529},"tags":[{"name":"毛泽东","type":"人物"},{"name":"彭德怀","type":"人物"},{"name":"朝鲜战争","type":"主题/事件"},{"name":"世界形势","type":"主题/事件"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0eb5d05146"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
