<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"人力·“人猿奴隶”","authors":[],"dates":[{"year":1952,"month":8,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"丁"},{"type":"paragraph","text":"人力不足，一直是美国侵略者妄想独霸世界、奴役全世界人民、进行世界战争的致命弱点之一。现在，两年的侵朝战争打下来，人力问题，已经成为战争贩子伤透脑筋与永远不能解决的问题了。"},{"type":"paragraph","text":"最近，美国徵兵局局长赫希承认说:“我们不得不去寻找人力，因为我们缺乏人力。明显的事实是，目前人力很感缺乏，或许不到一年这种人力缺乏会比第二次世界大战期间任何时候为甚。”他说:“征兵问题日感困难，因为退伍军人都免役，不合兵役标准的人又很多，在朝鲜服役的士兵在十八个月服役期满后将退役，这样，我们就不得不徵召十九岁的青年入伍了。”"},{"type":"paragraph","text":"其实，这在战争贩子来说，根本就不是什么新问题，而且早就绞尽脑汁了。去年五月，就有一个所谓美国的政治观察家哈许，就露骨地指出只有向仆从国家榨取人力。哈许以华尔街商业巨头们所特有的无耻理论，计算了一个法国兵、一个意大利兵、一个挪威兵、一个土耳其兵……的成本价格之后认为:只有土耳其、希腊等炮灰最为价廉。“因为一名土耳其士兵只需要我们化二百美元。……”"},{"type":"paragraph","text":"大概就是根据哈许的好主意吧，艾森豪威尔今年初曾专程去过希腊和土耳其，当那些仆从国的陆军部长之类，在“恭恭敬敬”迎接他的时候，就遭到了粗暴的呵责，声色俱厉地说:“今后唯有在国防方面(提供炮灰方面)进行了足够努力的国家，才能获得援助。”"},{"type":"paragraph","text":"显然，正好在美国的“压力”普遍破产的流年，这种寻炮灰的“压力”，照样没有发生改变现实的作用。"},{"type":"paragraph","text":"据说，美国有一个号称为“生理学家”的布立顿，在美国科学院年会上宣布他的“新发明”说，他可以用人工繁殖来创造一种“人猿奴隶”，这种“人”有劳动力而没有头脑，工资可以很低廉，可以任意剥削而没有组织工会进行罢工的危险，当炮灰则有绝对服从之妙处。"},{"type":"paragraph","text":"当然，这个消息对战争贩子来说，是宝贵极了，但是终究不是使用石块弓箭的时代了，这种“人猿奴隶”又“无济于事”，所以战争贩子们终于还是“不得不征召十九岁的青年入伍了”。"},{"type":"paragraph","text":"看到这里，大家可以想像，战争贩子已经风狂到了何等程度；但是，面对着强大无比的和平民主阵营，则又“心有余而力不足”到了何等地步了。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"82a63b1767"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
