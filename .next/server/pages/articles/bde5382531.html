script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"在毛主席的无产阶级教育路线指引下同济大学“五·七”公社试点班首批学员毕业在一年半的教学实践中，他们始终以毛主席的《五·七指示》为纲，走政治建校的道路，为教育革命作出了新贡献","authors":[],"dates":[{"year":1971,"month":7,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　在伟大领袖毛主席的无产阶级教育路线指引下，同济大学“五·七”公社房屋建筑专业试点班的一批工农学员，最近毕业了。"},{"type":"paragraph","text":"毛主席教导我们说:“大学还是要办的，我这里主要说的是理工科大学还要办，但学制要缩短，教育要革命，要无产阶级政治挂帅，走上海机床厂从工人中培养技术人员的道路。要从有实践经验的工人农民中间选拔学生，到学校学几年以后，又回到生产实践中去。”同济大学“五·七”公社遵循毛主席的这一伟大教导，在一九六九年下半年招收了二十八位工农学员，开设了试点班。这批学员来自上海城建局、建工局、机电一局系统的工厂和川沙县农村，都是党、团员，有一定的实践经验。他们怀着对伟大领袖毛主席的深厚无产阶级感情，肩负阶级的重托，在一年半的学习时间中，发挥了学习的主动性。他们始终以毛主席的《五·七指示》为纲，把学习马克思主义、列宁主义、毛泽东思想放在首位。他们学习解放军，走政治建校的道路，以抗大为榜样，以阶级斗争为主课，把社会当作课堂，自觉地在三大革命运动中锻炼自己，认真改造世界观，促进思想革命化。他们在山沟里办大学，在六七十度的陡坡上开荒造田，在紧张劳动的工地上测量制图，在实践的基础上学习专业知识。"},{"type":"paragraph","text":"工农学员在工宣队、军宣队的教育和帮助下，不断批判“读书做官论”和“知识私有”、“理论至上”等错误思想。他们正确处理和解决了一些关系:在作革命动力与革命对象的关系上，克服了“自来红”的思想；在政治与业务的关系上，批判了单纯业务观点；在理论与实践的关系上，纠正了重理论、轻实践的偏向；在“上大学”与“管大学、改造大学”的关系上，改变了过去只有“上”的积极性、而缺少“管”和“改”的思想准备的状况。大家排除万难走革命路，发愤图强画争气图，决心为无产阶级掌好文权，在思想文化领域巩固无产阶级专政!"},{"type":"paragraph","text":"试点班的教学，根据“实践、认识、再实践、再认识”的认识规律，围绕着各个典型工程，安排了业务知识的学习。他们首先学习党的基本建设的方针政策，用毛泽东思想统帅整个教学和设计实践活动。一些原来是建筑工人的学员，在教师的帮助下，把自己的实践经验上升为理论，并上台讲课。非建筑行业和来自农村的学员，深入到工人和贫下中农中去进行调查研究，获得了一般旧大学学生掌握不到的业务知识。经过一年半的实践，百分之八十以上的学员，除了达到原定学会设计混合结构房屋的要求以外，还基本上学会了一般单层工厂厂房的设计。革命的教员，也在山沟里参加了三大革命运动的实践，向建筑工人和工农学员学到了不少东西，为教育革命作出了贡献。"},{"type":"paragraph","text":"按照毛主席关于“回到生产实践中去”的教导，领导上决定把这批毕业生分配到工农业战线上去。最近，同济大学隆重举行了“五·七”公社工农试点班毕业典礼。工农学员在会上激动地表达了对伟大领袖毛主席和党的无限深厚的感情，感谢毛主席和党对自己的培养。他们豪迈地说，大学毕业只是继续革命的新起点，革命是永远没有毕业的，我们一定要紧跟毛主席干一辈子革命!"},{"type":"paragraph","text":"这个试点班不仅培养出一批毕业生，而且还在改革大学课程设置、教材和学制以及改造教师队伍等方面，取得了一定的经验。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"教育革命","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bde5382531"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
