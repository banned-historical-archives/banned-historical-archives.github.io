" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoistlegacy.de-5426","name":"最高人民法院关于在肃反运动中自动坦白的强奸年幼女学生案件应如何量刑问题的解答","author":"最高人民法院","internal":false,"official":false,"type":"unknown","files":[],"article":{"title":"最高人民法院关于在肃反运动中自动坦白的强奸年幼女学生案件应如何量刑问题的解答","dates":[{"year":1956}],"is_range_date":false,"authors":["最高人民法院"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"最高人民法院刑事审判第二庭, 刑事申诉工作手册, 243","tags":[{"name":"奸淫","type":"主题/事件"},{"name":"量刑","type":"主题/事件"},{"name":"幼女","type":"主题/事件"}],"parts":[{"type":"paragraph","text":"最高人民法院"},{"type":"title","text":"关于在肃反运动中自动坦白的强奸年幼女学生案件应如何量刑问题的解答"},{"type":"subtitle","text":"（一九五六年）"},{"type":"paragraph","text":"安徽省高级人民法院："},{"type":"paragraph","text":"你院一九五六年五月四日（56）刑上字第44号报告已收悉。关于在肃反运动中自动坦白的强奸年幼女学生的案件，应当如何量刑的问题，经本院审判委员会第十三次会议讨论作[sic]出如下决议：强奸幼女的犯罪的性质很恶劣，应当依法从严惩处；但是，“坦白从宽”的政策也适用于强奸幼女的案件。至于究竟到什么程度，那是要看每一个案件的具体情况的。因此，人民法院处理在肃反运动中自动坦白的强奸年幼女学生案件（关于什么是幼女的问题，可查阅本院一九五五年一月十八日法行字第510号致各高级人民法院函），必须根据犯罪情节、犯罪时间、坦白情况和对社会的危险程度等，全面地分析研究，依法从宽处理，可以免予处刑或者予以减轻、从轻处刑（对解放以前的犯罪，一般可以不予处刑）。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"405b3b6460"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
