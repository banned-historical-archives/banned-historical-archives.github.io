script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"大批修正主义　大干社会主义  哈尔滨水泥厂连续十年超额完成国家计划","authors":[],"dates":[{"year":1976,"month":12,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"大批修正主义　大干社会主义"},{"type":"paragraph","text":"哈尔滨水泥厂连续十年超额完成国家计划"},{"type":"paragraph","text":"据新华社哈尔滨一九七六年十二月十二日电　黑龙江省哈尔滨水泥厂今年连续第十年提前超额完成了全年国家计划。到十一月底，水泥产量已超过今年国家计划百分之二点二，比去年同期增长百分之九点四；工业总产值比去年同期增长百分之七点二。生产成本、劳动生产率和原料、材料消耗等经济技术指标也完成得很好。就生产能力来说，现在的一个哈尔滨水泥厂已相当于无产阶级文化大革命前一九六五年的两个厂。"},{"type":"paragraph","text":"哈尔滨水泥厂是黑龙江省“工业学大庆”的先进单位。职工们在回顾自己连续十年提前超额完成国家计划的战斗历程时深深感到，自己厂所取得的一切胜利，都是毛主席革命路线的胜利，都是战胜刘少奇、林彪和王张江姚反党集团反革命的修正主义路线的干扰、破坏，认真贯彻执行“抓革命，促生产”伟大方针的结果。文化大革命以来，这个厂的职工在厂党委领导下，坚持以阶级斗争为纲，深入批判刘少奇、林彪反革命的修正主义路线，坚定不移地贯彻执行“鞍钢宪法”，开展工业学大庆的群众运动，年年月月完成了国家计划。王张江姚“四人帮”采取种种手段，竭力歪曲革命和生产、政治和经济的关系，砍大庆红旗，破坏学大庆的群众运动，破坏社会主义革命和社会主义建设。当这股妖风吹到哈尔滨水泥厂的时候，受到了工人、干部们的坚决抵制。他们坚持以大庆铁人王进喜为榜样，发扬革命加拚命的精神，加快发展水泥工业。在短短三年内，使水泥的生产能力翻了一番，原料、材料消耗和生产成本也大幅度降低。"},{"type":"paragraph","text":"今年以来，这个厂的干部、工人月月出色地完成了生产任务。十月中旬以来，在华国锋同志任中共中央主席、中央军委主席和粉碎“四人帮”伟大胜利的鼓舞下，全厂职工意气风发，斗志昂扬。他们在狠揭猛批“四人帮”的反革命罪行的同时，进一步掀起了抓革命、促生产的新高潮，决心把因“四人帮”干扰、破坏而耽误的时间抢回来。十月份，全厂在检修设备的情况下，仍然超额完成了生产计划。进入十一月以后，职工们一鼓作气，提前三十六天完成了今年的国家计划。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"林彪","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"四人帮","type":"人物"},{"name":"黑龙江文革","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a999951607"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
