script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"美国进步劳工党谴责政府迫害黑人领袖埃普顿  必须受审判的正是迫害埃普顿的人  人民前进的脚步声将越来越响亮直到打垮剥削者","authors":[],"dates":[{"year":1965,"month":12,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"美国进步劳工党谴责政府迫害黑人领袖埃普顿"},{"type":"paragraph","text":"必须受审判的正是迫害埃普顿的人"},{"type":"paragraph","text":"人民前进的脚步声将越来越响亮直到打垮剥削者"},{"type":"paragraph","text":"新华社二十五日讯　纽约消息：美国进步劳工党十二月二十一日发表声明，谴责美国统治集团对这个党的副主席、黑人领袖威廉·埃普顿的迫害。"},{"type":"paragraph","text":"埃普顿因为在一九六四年夏天参加纽约市哈莱姆区黑人的抗暴斗争，在同年七月二十五日被捕，在今年十二月二十日被纽约州最高法院诬控为“危险分子”，强加给他的罪名是所谓鼓吹“犯罪性的无政府主义”。"},{"type":"paragraph","text":"声明指出，“埃普顿‘受审’和被定罪正好是在国内的反抗日益高涨，美国统治者在加紧他们对英雄的越南人民进行灭绝种族的屠杀战争，扬言要侵入柬埔寨和把战争扩大到整个东南亚的时候。”"},{"type":"paragraph","text":"声明认为，这种情况决不是偶然的。这说明美国垄断资本家和他们的走狗企图用杀害马尔科姆·爱克斯、把埃普顿关入监狱的办法来镇压美国的黑人运动和工人运动，想迫使他们停止反抗，停止“造反”，以便于推行自己的统治世界的计划。"},{"type":"paragraph","text":"声明强调说，“对埃普顿的诬控和定罪，表明美国统治集团的头子害怕黑人工人”、“害怕象埃普顿这样的革命领袖。”"},{"type":"paragraph","text":"声明指出，“美国当局为了把埃普顿关进监狱，甚至不得不把已经搁置了六十年的一项老‘法律’搬出来运用。”"},{"type":"paragraph","text":"声明说，“必须受审判的不是埃普顿。……应当受到美国人民和全世界人民审判的正是那些囚禁埃普顿的人们。”"},{"type":"paragraph","text":"声明着重指出，尽管美国统治集团进行镇压，但是人民是镇压不了的。“从瓦茨到哈莱姆区，成千上万的黑人工人前赴后继地起来反抗，使统治着我们国家的一小撮贪婪的富豪惊惶万状。成千上万的示威者从加利福尼亚游行到纽约，坚持要美国‘滚出越南’，使华盛顿战争贩子的根本政策受到威胁。”"},{"type":"paragraph","text":"声明说，在美国，前进的脚步声将越来越响亮，直到那些靠剥削别人为生的家伙被打垮为止。"},{"type":"paragraph","text":"声明指出，“美国统治者也没有足够的坦克、飞机、凝固汽油弹和炸弹来阻止全世界人民决定他们自己的命运。”"},{"type":"paragraph","text":"“全世界各地千百万工人和被压迫人民在加紧他们的革命行动，反对美国日益猖狂的恐怖——这预示着美帝国主义的末日。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"10a88b6c29"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
