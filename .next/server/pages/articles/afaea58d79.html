script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"毛主席、刘委员长、周总理  电贺朝鲜国庆十周年  陈毅外长致电南日外务相表示祝贺","authors":[],"dates":[{"year":1958,"month":9,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席、刘委员长、周总理"},{"type":"paragraph","text":"电贺朝鲜国庆十周年"},{"type":"paragraph","text":"陈毅外长致电南日外务相表示祝贺"},{"type":"paragraph","text":"新华社8日讯　毛泽东主席和周恩来总理今天打电报给朝鲜民主主义人民共和国国家领导人，祝贺朝鲜民主主义人民共和国成立十周年。电文如下：朝鲜劳动党中央委员会委员长、朝鲜民主主义人民共和国内阁首相"},{"type":"paragraph","text":"金日成同志，朝鲜民主主义人民共和国最高人民会议常任委员会委员长崔庸健同志："},{"type":"paragraph","text":"当朝鲜民主主义人民共和国成立十周年的时候，我们代表中国政府和中国人民向你们和全体朝鲜人民致最热烈的兄弟的祝贺。"},{"type":"paragraph","text":"朝鲜民主主义人民共和国的成立标志着朝鲜人民争取独立、自由的长期的艰苦斗争的伟大胜利。十年来，英雄的朝鲜人民在朝鲜劳动党的领导下，走过了艰苦而光荣的道路。朝鲜民主主义人民共和国刚刚成立不久，美国侵略者就向它发动了疯狂的进攻，妄图在这片自由的土地上恢复黑暗的殖民制度。但是，英雄的朝鲜人民是吓不倒的，他们在以苏联为首的社会主义阵营和全世界爱好和平的人民的支持下，在中国人民志愿军的参加下，万众一心，英勇奋战，终于打败了以美帝国主义为首的侵略军队，取得了光辉的胜利。朝鲜人民这一伟大的胜利大大地鼓舞了各国人民争取独立和自由的斗争，对制止战争、保卫和平的事业是一个重大的贡献。朝鲜停战后，朝鲜人民克服了重重困难，很快地医治好了战争创伤，并且正在以极大干劲进行着社会主义建设。中国人民为朝鲜兄弟的这些成就感到欢欣鼓舞。"},{"type":"paragraph","text":"中朝两国在无产阶级国际主义的基础上，在共同反对侵略的斗争中用鲜血凝成的伟大友谊是牢不可破的。我们两国人民的友谊和亲密合作对加强以苏联为首的社会主义阵营的团结和保卫亚洲和世界的和平有着巨大的意义。"},{"type":"paragraph","text":"祝朝鲜人民在建设社会主义的伟大事业和和平统一朝鲜的斗争中取得新的、更大的成就。"},{"type":"paragraph","text":"祝中朝两国人民的兄弟友谊万古长青。"},{"type":"paragraph","text":"中国共产党中央委员会主席"},{"type":"paragraph","text":"中华人民共和国主席  毛泽东"},{"type":"paragraph","text":"中华人民共和国全国人民代表大会常务委员会委员长　刘少奇"},{"type":"paragraph","text":"中华人民共和国国务院总理  周恩来"},{"type":"paragraph","text":"1958年9月8日于北京"},{"type":"paragraph","text":"新华社8日讯　国务院总理兼外交部长陈毅今天打电报给朝鲜内阁副首相兼外务相南日，祝贺朝鲜民主主义人民共和国成立十周年。电文如下：朝鲜民主主义人民共和国内阁副首相兼外务相南日同志："},{"type":"paragraph","text":"当朝鲜民主主义人民共和国成立十周年的时候，谨向你致以兄弟般的热烈的祝贺。"},{"type":"paragraph","text":"祝朝鲜人民在维护远东和世界和平的斗争中获得新的成就。祝中朝两国人民永恒的兄弟友谊日益发展和巩固。"},{"type":"paragraph","text":"中华人民共和国国务院副总理兼外交部长　陈毅"},{"type":"paragraph","text":"1958年9月8日"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"陈毅","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"afaea58d79"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
