script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji22","name":"毛泽东全集第22卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji22.pdf"],"article":{"title":"华中野战军的作战经验","alias":"","parts":[{"type":"paragraph","text":"华中野战军的作战经验"},{"type":"paragraph","text":"（1946年8月28日）各首长："},{"type":"paragraph","text":"据粟裕、谭震林\"未感?电称：我军于二十六日在如皋西南地区歼灭六十九师之九十九旅后，又于二十七日在上述地区歼灭由如皋来援之敌六十五师（粤系）之一八七旅及七十九师-个团。总计两日战斗，将敌一万五千人全部解决，除毙伤外，俘虏近万人。第二次由如皋增援之一个团亦被歼一半。我军略加休整，以利再战，等情。我粟谭军从午元?至未感-个半月内，作战六次4，歼敌六个半旅及交通总队五于，造成辉煌战果。而我军主力只有十五个团，但这十五个团是很充实与很有战斗力的，没有采取平均主义的补充方法。每战集中绝对优势兵力打敌一部（例如未宥集中十个团打敌"},{"type":"paragraph","text":"[1]粟裕、谭震林，当时分别任华中野战军司令员和政治委员。[2] 未感，即8月27日。[3]午元，即7月13日。"},{"type":"paragraph","text":"[4]1946年7月13日至8月31日，由粟裕、谭震林指挥的华中野战军依托苏中解放区，连续作战7次，先后歼灭国民党军1个整编师师部、6个旅、1个团和5个交通大队，共5.37万余人，被誉为“七战七捷”。毛泽东写这个电报时，尚未收到华中野战军关于邵伯保卫战的报告，故电报中说作战6次。两个团，未感集中十五个团打敌三个团），故战无不胜，士气甚高；缴获甚多，故装备优良；凭借解放区作战，故补充便利；加上指挥正确，既灵活，又勇敢，故能取得伟大胜利。这一经验是很好的经验，希望各区仿照办理，并望转知所属一体注意。"},{"type":"paragraph","text":"军委未俭"}],"authors":["毛泽东"],"dates":[{"year":1946,"month":8,"day":28}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":103,"page_end":104},"tags":[{"name":"粟裕","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"谭震林","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d6bf305e81"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
