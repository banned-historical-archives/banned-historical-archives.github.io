script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"坂本德松理事长呼吁第三世界团结起来推进反霸斗争  毛主席关于三个世界划分的科学论断无比正确  伊朗外交大臣强调海湾国家加强合作反对外国干涉","authors":[],"dates":[{"year":1976,"month":12,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"坂本德松理事长呼吁第三世界团结起来推进反霸斗争"},{"type":"paragraph","text":"毛主席关于三个世界划分的科学论断无比正确"},{"type":"paragraph","text":"伊朗外交大臣强调海湾国家加强合作反对外国干涉"},{"type":"paragraph","text":"新华社东京一九七六年十二月十七日电  亚非人民团结日本委员会理事长坂本德松十二月十六日在大坂矢田工人学校举办的学习会上发表讲演时指出，“毛主席关于三个世界的理论是科学观察当前世界形势的指针”。他呼吁日本工人阶级和日本人民同中国人民和其它第三世界人民团结起来，推进反对苏美两个超级大国霸权主义的斗争。"},{"type":"paragraph","text":"在有五百多名工人出席的学习会上，坂本德松强调说，毛主席根据战后以来国际力量的发展和变化，把今天的世界划分为三个世界，这一科学论断是无比正确的。"},{"type":"paragraph","text":"他说，苏美两霸的相互争夺是世界不得安宁的根源，尤其是已经完全堕落成为社会帝国主义的苏联是最危险的战争策源地。自从去年赫尔辛基“欧安会”以来，苏联嘴里起劲宣传“缓和”，实际上却在加紧扩军备战。最近几年，苏联在东欧、苏联西部和中部配置的导弹、坦克和飞机急剧增加。苏联的海军活动遍及世界各个重要海域。但是苏联的霸权主义面目日益暴露，正到处碰壁，日子很不好过。"},{"type":"paragraph","text":"坂本说，推进今天世界发展的动力是第三世界。不管苏美两霸，特别是不管苏联怎样破坏阻挠，国家要独立，民族要解放，人民要革命的历史潮流是不可阻挡的。"},{"type":"paragraph","text":"坂本说，立即无条件地一起收回被苏联霸占的日本北方领土是当前日本民族的最重要课题。它不仅是保卫日本的独立、民族权利和领土完整的斗争，也是全世界人民反对霸权主义保卫世界和平斗争的一部分。"},{"type":"paragraph","text":"坂本还指出，苏联社会帝国主义是日中两国人民的共同敌人。早日缔结写明反霸条款的日中和平友好条约不仅有利于日本和亚洲的和平与安全，而且有利于日本人民同第三世界人民的友好与团结。"},{"type":"paragraph","text":"新华社科威特一九七六年十二月十五日电　据巴林《海湾消息报》报道，伊朗外交大臣阿巴斯·阿里·哈拉巴里最近强调，海湾国家合作的目的在于阻止外国对海湾地区的干涉。"},{"type":"paragraph","text":"阿巴斯·阿里·哈拉巴里于十二月十一日到十三日对巴林进行了正式访问，同巴林外交大臣穆罕默德·本·穆巴拉克·哈利法就发展两国的合作关系进行了会谈。"},{"type":"paragraph","text":"阿巴斯·阿里·哈拉巴里十二日在马纳马举行的记者招待会上说：“我们伊朗人十分关注我们两国的密切友谊。”"},{"type":"paragraph","text":"在谈到海湾安全问题时，他说：“我们愿意同海湾沿岸邻国合作”，“我们合作的目的在于阻止在这一地区的任何外国的干涉”。"},{"type":"paragraph","text":"在谈到伊朗同阿拉伯国家的关系时，他说，我们同所有阿拉伯国家的关系是良好的，“特别是与海湾邻国的关系，可以说是达到了兄弟关系的程度。”"},{"type":"paragraph","text":"同一天，巴林外交大臣穆罕默德·本·穆巴拉克·哈利法发表声明说：“伊朗外交大臣的访问，对于两国在所有方面的合作将产生积极的结果。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"世界形势","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2eec21fe15"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
