<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"川北区党委关於“五反”运动中几个问题的报告","authors":[],"dates":[{"year":1952,"month":3}],"is_range_date":false,"parts":[{"text":"川北区党委关于“五反”运动中几个问题的报告","type":"title"},{"text":"毛主席批语：","type":"subtitle"},{"text":"此件很好，请各同志加以研究。","type":"paragraph"},{"text":"（一）在小城市开展“五反”我们正在南充市、遂宁城重点推行。本来有更多的地方已开始了前哨战或摆开了阵势，接中央指示，衡量了这样普遍反击确有打成被动战的危险，故坚决将那些地方的“兵”暂时撤下来了。","type":"paragraph"},{"text":"（二）地县两级具体工作任务繁重，干部不多，骨干更少，更多的是：从我们起，越到下面，水平越低，尽管中央与西南局的每个政策方针很明确、很具体，我们做起来往往融会不好，控制不住。两年来，我们深深感觉：中央的每个战略和西南局的每个战役计划的完成，都带领我们取得一个新阵地，但我们这些中下级指挥员，在战术上往往出岔子。为了解决这个重大矛盾，只有谨守毛主席所订的“一般号召”“大张旗鼓”“雷厉风行”与“典型示范”“重点展开”“分期完成”两者相结合的工作法则。","type":"paragraph"},{"text":"（三）小城市小摊贩、小商人比例大，以南充市计，占百分之六十。按毛主席的阶级分析，小贩属城市贫民，小商（不雇人，资金约在二百万元以下者）属城市小资产阶级（上述两者均应除奸商的化形分子），一般不包括他们于“五反”之列，大有好处。但他们也有轻微的违法行为，在自我检讨和保证不重犯后，可否一律不补不退。","type":"paragraph"},{"text":"（四）小城市资本家对我们的进攻，也甚嚣张，但比例小些，南充市工商户（除小商小贩）二千七百多户，守法和基本上守法者一千零几十户，占百分之四十。重大违法与严重违法者有八十多户，符合邓政委所说的约百分之三（县城略小一点，约占百分之二到二零五）。半守法半违法约一千四百多户，占百分之五十到六十，但这种人资本也多半不大，除一般采用“只退不罚”、“只补不罚”原则，对其中约百分之三十到四十的人，如采取即退即补，则要影响继续经营，可否再加一个分期补退的政策。这样做，对争取社会同情与照顾民生确有好处。","type":"paragraph"},{"text":"（五）“五反”的作法，仍应是党委领导（派出精干的工作团），依靠工人、店员、团结小贩小商（他们也往往受资本家欺负和剥削），确实保护守法工商户，并使之站在我们这一边，瓦解和争取半违法者，打击极少数奸商。但这个团结大多数、打击极少数的政策，下面同志很难提到艺术的水平上去运用，往往弄成“事与愿违”。故最好在发动城市劳动人民对违法资本家进行揭发检举的同时，由首长出马，召开各界大会，交代“五反”目的与对各种人的政策，并特别说明几种人大概的比例数字。这样一下就便多数人心中有了数，大多数人安定，市面可保大体正常。","type":"paragraph"},{"text":"（六）占小城市人口大多数的小商、小贩、手工业户与其他贫民，比起农村来，的确更“开不起会”，误一天，往往要饿饭一天，这是我们在小城市中脱离群众的一个大问题。故“五反”方式，拟主要是在采取简短的一般号召，晚间的小组坦白检举会，深入的个别访问，设立检举站，在准备充分的条件下，来几个回合，痛痛地把少数奸商打下去，基本上解决问题。","type":"paragraph"}],"comments":[],"origin":"《西南工作》第九十期 ，1952年3月15日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"70f6a7d2a4"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
