script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"我们一定要高举毛主席树立的大庆红旗  出席全国工业学大庆会议的代表热烈学习和讨论华主席的重要题词，继续听取大庆典型单位的经验介绍，决心大治快上，让大庆的经验在各地开花结果","authors":[],"dates":[{"year":1977,"month":4,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"我们一定要高举毛主席树立的大庆红旗"},{"type":"paragraph","text":"出席全国工业学大庆会议的代表热烈学习和讨论华主席的重要题词，继续听取大庆典型单位的经验介绍，决心大治快上，让大庆的经验在各地开花结果"},{"type":"paragraph","text":"新华社大庆一九七七年四月二十四日电　英明领袖华主席的重要题词“我们一定要高举毛主席树立的大庆红旗”，给了出席全国工业学大庆会议的代表们以巨大的鼓舞和无穷的力量。连日来，全体代表认真学习《毛泽东选集》第五卷，学习、讨论华主席的题词，同时举行大会，继续听取大庆一些典型单位的经验介绍。"},{"type":"paragraph","text":"二十日下午，在华主席亲自主持的开幕大会上，全体代表聆听了华主席的重要题词，几天来一直沉浸在欢腾的情绪中。他们在学习、讨论时，不少人写了决心书，或者赋诗作歌，畅谈华主席题词的重大意义，纵情歌颂华主席。大家说，华主席的重要题词，是向全党、全国工人阶级发出的伟大号召和战斗动员令。有华主席和华主席为首的党中央的英明领导，工业学大庆的伟大革命群众运动一定会一浪高过一浪，毛主席树立的大庆红旗一定会插遍全国，大庆式企业一定会遍地开花。"},{"type":"paragraph","text":"刚刚接受了华主席视察的大庆油田代表们，学习华主席的题词，心情格外激动。他们回顾华主席领导全党粉碎“四人帮”以来高举毛主席伟大旗帜的伟大革命实践，激动地说：华主席办的每一件事，都表现了对毛主席无产阶级革命路线的无限忠诚；采取的每一项措施，都代表了全国人民的根本利益；发出的每一个指示，都说到了我们工人阶级的心坎上。华主席不愧为伟大领袖和导师毛主席的好接班人，不愧为全党全军全国各族人民的英明领袖。曾经受过华主席亲切教导的湖南省的代表和曾经饱尝“四人帮”反革命的修正主义路线干扰破坏之苦的一些地区的代表，把学习华主席的题词同揭批“四人帮”的罪行结合起来，他们说：“四人帮”恶毒砍杀大庆红旗，疯狂反对工业学大庆运动；英明领袖华主席倍加爱护大庆红旗，亲自领导工业学大庆运动。我们一定要响应华主席题词的号召，把题词化作自己的实际行动，深揭狠批“四人帮”的罪行，让大庆的经验在各地开花结果。"},{"type":"paragraph","text":"二十一日、二十二日和二十三日下午，会议继续举行大会，由大庆油田的代表发言，介绍了九个典型经验。这些发言的代表是：大庆油田钢铁一二○五钻井队副指导员殷文著，大庆油田采油二部四十九队指导员李春好，大庆革委会副主任闵豫，大庆油田建设指挥部二大队三中队队长刘长坤，大庆石油化工会战指挥部党的核心小组副组长张泗存，大庆革委会副主任张瑞清，大庆生产办公室副主任张立中，大庆油田供应指挥部革委会副主任李泽清，大庆油田建设指挥部红一站先锋五队指导员高玉英。在这九个典型发言的同时，大会还向代表们介绍了大庆的十个书面典型材料。"},{"type":"paragraph","text":"党和国家领导人纪登奎、陈永贵、吴桂贤、苏振华、王震、余秋里、谷牧，出席了这三天的大会。"},{"type":"paragraph","text":"在讨论华主席的题词、学习大庆经验的过程中，代表们深切感到形势喜人，形势逼人。大家说，高举大庆红旗，迅速把工业生产搞上去，这是全国人民的迫切要求和根本利益所在。华主席亲自领导我们来大庆学经验，是华主席、党中央对我们的亲切关怀。我们决不能听了激动，看了感动，回去不动，一定要象大庆的干部、工人那样，“有条件要上，没有条件创造条件也要上”，革命加拚命，大治快上，把大庆经验学到手，把国民经济搞上去。"},{"type":"paragraph","text":"到二十三日，全国工业学大庆会议在大庆油田的任务已经胜利完成。会议下一阶段，将在北京继续举行。在二十三日下午的大会结束时，国务院副总理谷牧代表会议领导小组讲话说：在英明领袖华主席、党中央的亲切关怀下、领导下，经过全体代表的共同努力，这一段会议开得很成功。下一段我们要继续把会开好，用大庆精神学大庆，把大庆经验学到手，让大庆经验在全国工交战线的各行各业开花结果，决不辜负华主席、党中央的期望。最后，谷牧同志带领全体代表高呼：“我们一定要高举毛主席树立的大庆红旗！”“向大庆工人阶级学习！”“向大庆工人阶级致敬！”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"谷牧","type":"人物"},{"name":"四人帮","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"name":"编纂《毛泽东选集》第五卷","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3a88978cf6"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
