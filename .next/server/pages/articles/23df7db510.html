script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"苏修在国内全面复辟资本主义使工人阶级重新处于被剥削被压迫地位  苏联工人对苏修反动统治日益不满  广大工人采用“旷工”、“怠工”等方式表示反抗使苏修极大惊恐","authors":[],"dates":[{"year":1969,"month":9,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"苏修在国内全面复辟资本主义使工人阶级重新处于被剥削被压迫地位"},{"type":"paragraph","text":"苏联工人对苏修反动统治日益不满"},{"type":"paragraph","text":"广大工人采用“旷工”、“怠工”等方式表示反抗使苏修极大惊恐"},{"type":"paragraph","text":"新华社二十二日讯　苏修叛徒集团窃取了苏联的党政大权以后，在国内全面复辟资本主义，使苏联工人阶级重新处于被剥削被压迫的地位。近几年来，苏联工人群众对勃列日涅夫之流的法西斯统治的不满日益增长。目前，越来越多的工人正采用“旷工”、“怠工”等方式表示对苏修叛徒集团的愤慨和反抗。"},{"type":"paragraph","text":"目前，苏联国内阶级矛盾日益加剧。苏修叛徒集团的“新经济体制”赋予工厂厂长和企业经理以极大的特权，这一小撮资产阶级特权分子一方面利用职权，贪污盗窃，大发横财；另一方面肆意欺凌和压榨工人，他们对自己不满意的工人动辄降职降薪、开除解雇。苏修公开宣扬有的工厂在实行“新体制”时，一下子就解雇了八百名工人，而且把这种大量解雇工人的例子做为“典型”到处推广。克拉斯诺达一个流动机械队的一名工人，因为反对工厂里的资产阶级特权分子，结果遭到三次警告和降级处分，最后又被扣上莫须有的罪名被开除。这个工人只好靠到旧货店拍卖东西维持生活。再如，明努辛面粉联合工厂的一名工人，因为得罪了工厂当局，被调到对他的健康不适宜的车间工作，结果害了病，直至被无理赶出工厂。工人惨遭迫害的事例不胜枚举。仅在克拉斯诺达边区一地去年一年就发生了四百八十二起。苏联广大工人群众对自己政治上受压迫，经济上受剥削，生活上一天比一天困苦的状况十分愤慨。他们正纷纷采用各种方式表示反抗和不满。"},{"type":"paragraph","text":"尽管苏修一小撮资产阶级特权阶层在推行“新经济体制”时设立了名目繁多的“奖金”来诱骗工人，但广大工人不愿意拿自己的血汗去为这一小撮特权分子卖命，所以劳动热情很低。苏修报刊承认，目前苏联各地“旷工”、“怠工”事故不断发生，而且一年比一年严重。仅图拉州一地去年一年内由于工人“旷工”、“停工”等原因，使苏修特权阶层损失了八十万个劳动日。顿巴斯“无产者煤矿”托拉斯的矿井中，仅在去年的三个季度中就约有四千人“旷工”。哈萨克冶金建筑托拉斯今年上半年“旷工”人数高达六千人。布良斯克冶金厂的一个车间，在今年一个月内就有三十七人“旷工”七十天。许多工人常常很早就提前下班，当工头企图阻拦时，工人们对工头严词斥责。"},{"type":"paragraph","text":"工人大规模“旷工”、“怠工”和流动性的增大，引起苏修统治集团的极大惊恐。苏修《真理报》、《劳动报》、《苏维埃俄罗斯报》等最近连续就所谓“加强劳动纪律”问题发表社论，惊呼工人的大规模“旷工”、“怠工”，已成为一个“尖锐的和令人担忧的问题”。苏修叛徒集团还千方百计地加紧对“旷工”、“怠工”工人进行迫害和镇压。苏修规定对违反“纪律”、“旷工”、“怠工”和生产废品的工人举行所谓“同志审判会”，不发疗养证、休养证，不分配住房等一系列反动措施。但是，哪里有压迫，哪里就有反抗和斗争，具有光荣革命传统的苏联工人阶级反对苏修叛徒集团的斗争必将更加深入地发展下去。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"23df7db510"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
