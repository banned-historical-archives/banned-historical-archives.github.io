script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"美国倾销剩余农产品　傀儡政权残酷剥削　南朝鲜农村发生严重粮荒","authors":[],"dates":[{"year":1961,"month":3,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"美国倾销剩余农产品　傀儡政权残酷剥削"},{"type":"paragraph","text":"南朝鲜农村发生严重粮荒"},{"type":"paragraph","text":"新华社平壤25日电　汉城消息：严重的粮荒笼罩着南朝鲜的广大农村。自从入春以来，许多地区农民用草根和树皮度日，陷入了严重的饥饿境地。"},{"type":"paragraph","text":"据报道，在全南朝鲜的二百二十万户农民中，断粮农户在今年年初就达到了一百万户。这一点最近连南朝鲜傀儡总理张勉也不得不承认。由于美国大量倾销剩余农产品和傀儡政权对农民的残酷剥削，加上自然灾害，去年造成了南朝鲜农业历史上少见的荒年。单是庆尚北道，去年粮食产量就减少了一百万石（一石合一百五十公斤），庆尚南道也减少了七十万石到八十万石。在这种情况下，张勉傀儡政权不顾农民的死活，反而在农民身上搜刮了比平常更多的粮食，单是去年向农民征收的秋粮就达三百万石，使许多农民在秋收后不久就断了粮。"},{"type":"paragraph","text":"据合同通讯社报道，3月初，全罗南道断粮农户已经由1月份的十万户增加到十六万多户，将近一百万农民陷入饥饿之中。全罗北道、庆尚北道都有一半以上的农户断粮。许多地区的农民只能靠草根、树皮、野菜、糠等充饥。有的地方不仅没有粮食，就连草根树皮也快要吃光了。就是一向被称为粮仓的湖南、岭南平原的农民，断粮现象也很严重。汉城报纸《京乡新闻》说，“南朝鲜广大农村充满了因为饥饿而呻吟的声音，到任何地方都可以看到整天不出烟火的悲惨景象。目前南朝鲜正在变为饥饿的地狱”。连美国合众国际社在3月22日也承认，南朝鲜今年的春荒是近年来最严重的一次。有的地区的农民遭到了三十年来最严重的饥荒。"},{"type":"paragraph","text":"经济通讯社最近报道说，南朝鲜有一百二十多万小学生在挨饿。"},{"type":"paragraph","text":"《京乡新闻》说，全罗北道淳昌郡每天有许多断粮农民向当地行政机关要求救济。这个郡的70％的农民现在已面临“饿死的边缘”。这家报纸说，挨饿的农民像乳燕等待母燕一样地期望着救济。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2c16a77827"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
