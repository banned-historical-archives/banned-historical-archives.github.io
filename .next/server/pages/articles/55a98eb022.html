" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji42","name":"毛泽东全集第42卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji42.pdf"],"article":{"title":"七律·登庐山","alias":"","parts":[{"type":"paragraph","text":"七律·登庐山（1959年7月1日）一山飞峙大江边，跃上葱笼四百旋。2冷眼向洋看世界，热风吹雨洒江天。云横九派国浮黄鹤，"},{"type":"paragraph","text":"浪下三吴起白烟。[1]庐山，在江西省北部，屹立在长江和鄱阳湖之间。"},{"type":"paragraph","text":"[2]跃上葱笼四百旋，葱笼，草木青翠茂盛，这里指山顶。庐山登山公路，建成于1953年，全长三十五公里，盘旋近四百转。"},{"type":"paragraph","text":"[3]九派，见《菩萨蛮·黄鹤楼》注。《十三经注疏》本《尚书·禹贡》“九江”注：“江于此州界分为九道。”明李攀龙《怀明卿》：“豫章（今南昌）西望彩云间，九派长江九叠山。”毛泽东1959年12月29日在一封信上说：“九派，湘、鄂、赣三省的九条大河。究竟哪九条，其说不一，不必深究。”"},{"type":"paragraph","text":"[4]三吴，古代指江苏省南部、浙江省北部的某些地区，具体说法不一。这里泛指长江下游。毛泽东在1959年12月29日同一封信上说：“三吴，古称苏州为东吴，常州为中吴，湖州为西吴。”"},{"type":"paragraph","text":"七律·登庐山陶令川不知何处去，"},{"type":"paragraph","text":"桃花源口里可耕田？"},{"type":"paragraph","text":"[1]陶令，指陶潜（365—427），一名渊明，字元亮，东晋诗人。他曾经做过彭泽县令，故称陶令。据《南史·陶潜传》记载，他曾经登过庐山。他辞官后归耕之地，离庐山也不远。"},{"type":"paragraph","text":"[2]桃花源，陶潜曾作《桃花源记》，文中说秦时有些人逃到一个偏僻宁静的“桃花源”（长满桃花的水源）地方避乱，从此与世隔绝，过着和平的劳动生活。直到晋朝才有一个武陵（湖南常德）的渔人因迷路偶然找到这个美丽幸福的奇境。"}],"authors":["毛泽东"],"dates":[{"year":1959,"month":7,"day":1}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":157,"page_end":158},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]},{"id":"e2817c5d-1398-4688-94fa-c8076f9c76cc","name":"红旗一九六四年第一期","internal":false,"official":false,"type":"pdf","author":"","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives2/main/e2817c5d-1398-4688-94fa-c8076f9c76cc.pdf"],"article":{"title":"七律·登庐山","alias":"","parts":[{"type":"paragraph","text":"律到韶山"},{"type":"paragraph","text":"一九五九年六月"},{"type":"paragraph","text":"一九五九年六月二十五日到韶山。离别这个地方已有三十二周年了。别萝依稀咒逝川，故园三十二年前。红旗捲起晨奴戟，黑手高县霸主鞭。为有牲多志，敢教日月换新天。喜看稻千重浪，遍地英雄下夕烟。"},{"type":"paragraph","text":"律登庐山"},{"type":"paragraph","text":"一九五九年七月一日一山飞峙大江，上葱龙四百旋。冷眼向洋看世界，热风吹雨江天。云横九派浮黄，浪下三吴起白烟。陶令不知何处去，桃花源裹可耕田？"}],"authors":["毛泽东"],"dates":[{"year":1959,"month":7,"day":1}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":4,"page_end":4},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"55a98eb022"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
