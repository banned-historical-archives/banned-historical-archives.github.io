script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"type":"pdf","id":"wenji4","name":"毛泽东文集第四卷（1999）","internal":false,"official":true,"author":"中央文献研究室","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/wenji4.pdf"],"article":{"title":"刘邓军出大别山的准备工作","description":"根据毛泽东手稿刊印。","dates":[{"year":1947,"month":7,"day":30}],"parts":[{"text":"刘邓军出大别山的准备工作","type":"title"},{"type":"paragraph","text":"刘邓，并告陈谢韩，及陈粟谭："},{"type":"paragraph","text":"午陷电悉。如你们决心直出大别山，请注意下列各点：（一）开一次团长以上干部会，除告以各种有利条件外，并设想各种困难条件，建立远征意志。（二）营长以上每人发鄂、豫、皖三省有县境的明细地图一份，油印的亦好，如能每连发一份更好，使一切干部明白地理环境。（三）大体确定征粮、征税办法，告知一切干部，土地革命时期打土豪办法所得不多，名誉又坏，在我方政权未建立以前，仍应暂时利用国民党下层机构及税收机关（在我党有力人员监督指挥之下），以大体上的累进方法征粮，惟免除赤贫人口负担，方能解决大军给养。国民党人员未逃跑者，除极坏分子外，均可利用，逐步过渡到人民政权。（四）如皮定均旅一时调来不及，请考虑以赵纵使用于大别山。该纵由潼、洛渡后直趋大别山。陈谢则使用三十八军于豫西建立根据地。（五）如你们决定直趋大别山，决心不要后方，亦应使陈谢建立此种决心。如陈谢于八月下旬渡河，可能争取一个月时间，在豫西立住脚跟。胡军主力由靖边、横山线南调，估计至少须一个月行程，该敌十分疲劳。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"午三十"}],"comment_pivots":[{"part_idx":0,"offset":2,"index":1},{"part_idx":1,"offset":8,"index":2},{"part_idx":1,"offset":13,"index":3},{"part_idx":2,"offset":3,"index":4},{"part_idx":2,"offset":281,"index":5},{"part_idx":2,"offset":293,"index":6},{"part_idx":2,"offset":307,"index":7},{"part_idx":2,"offset":396,"index":8}],"is_range_date":false,"authors":["毛泽东"],"comments":["刘邓，指刘伯承、邓小平，当时分别任晋冀鲁豫野战军司令员和政治委员。","陈谢韩，指陈赓、谢富治、韩钧，当时分别任晋冀鲁豫野战军陈谢集团前委书记、副书记和常委。","陈粟谭，指陈毅、粟裕、谭震林，当时分别任华东野战军司令员兼政治委员、副司令员和副政治委员。","指刘伯承、邓小平一九四七年七月三十日给中共中央军委等的电报。电报说，连日来我们再三考虑军委二十三日电提出的方针，恰好顷接二十九日电，决心于休整半个月后出动，以适应全局之需要。照现在情况，我们当面有敌十九个旅，至少有十个旅会尾随我部行动，故我部不宜仍在豫皖苏，而以直趋大别山，先与陈谢集团成犄角之势，实行宽大机动为适宜，准备无后方作战。建议陈士榘、唐亮兵团在鲁西南拉一下敌人，山东抽出原皮定均旅到大别山作军区骨干。","皮定均旅，指原中原军区第一纵队第一旅，旅长皮定均。该旅此时编为华东野战军第一纵队独立师，皮定均已调任第六纵队副司令员。","赵，指赵基梅，当时任晋冀鲁豫野战军第十二纵队司令员。","潼、洛，指陕西潼关和河南洛阳。","胡，指胡宗南，当时任国民党军西安绥靖公署主任。"],"page_start":293,"page_end":294,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1ca4336b24"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
