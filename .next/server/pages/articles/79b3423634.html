<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"0b2f26ed-ad29-48e7-9c89-446932a97ab0","name":"中共党史教学参考资料 第27册 “文化大革命”参考资料 下册（1988年）","internal":true,"official":true,"type":"pdf","author":"","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives3/main/0b2f26ed-ad29-48e7-9c89-446932a97ab0.pdf"],"article":{"title":"《评〈关于科技工作的几个问题〉》的前言","alias":"","parts":[{"type":"paragraph","text":"端腐朽的奴隶主、封建主的“理论”，是董仲舒们的“正其谊不谋其利、明其道不计其功”一类鬼话的翻版。"},{"type":"paragraph","text":"“四人帮”宣扬这套“理论，目的是破坏社会主义革命和社会主义建设，毁灭社会主义经济，妄图篡党夺权，把我国重新拖回到半殖民地半封建的悲惨境地，使社会生产力处于极为低下的水平，以便维持他们的反革命统治。"},{"type":"paragraph","text":"姚文元对《论总纲》有一条骏人听闻的批语。《论总纲》在结尾讲到，我们“一定能够实现在本世纪内把我国建设成为-一个社会主义强国的宏伟目标”。这句话，是毛主席、周总理多次讲过的，是完全正确和无可怀疑的。可是，这个反革命文痞居然对此批道：“一定能复辟吗？痴心梦想！”事情再清楚不过了，什么叫复辟呢？在“四人帮”的心目中、“把我国建设成为一个社会主义强国”，就是复辟。可见，他们大喊大吲的所谓“反复辟”，就是反对伟大领袖毛主席，反对敬爱的周总理，就是反对社会主义，就是复辟资本主义。姚文元的这个批语、是写给他们的亲信们看的，是私房话，这里没有什么伪装，和盘托出了他们的真实意图。这个批语，白纸黑字，无可争辩地说明、搞资本主义复辟的不是别人，正是“四人帮”自已。他们是打着反复辟的旗号搞复辟。"},{"type":"paragraph","text":"“四人帮”对《论总纲》的“批判”，是一个很好的反面教材。它从反面告诉我们，党内的资产阶级代表人物是怎样打着马克思主义的旗号搞修正主义，搞反革命复辟的，是怎样伪造马克思主义，从哲学、政治经济学、科学社会主义等方面向马克思列宁主义、毛泽东思想猖狂进攻的。我们一定要高举毛主席的伟大旗帜，遵照华主席提出的抓纲治国的战略决策，认真学习最近出版的《毛泽东选集》第五卷，以马列著作和毛主席著作为武器，把揭批“四人帮”的伟大斗争进行到底。我们一定要在华主席为首的党中央领导下，坚持党的基本路线，为在本世纪内全面实现四个现代化，把我国建设成为社会主义强国而奋斗。"},{"type":"paragraph","text":"（原载1977年7月7日《人民几报》）《评（关于科技工作的几个问题\u003e》"},{"type":"paragraph","text":"的前言"},{"type":"paragraph","text":"（一九七六年七月）"},{"type":"paragraph","text":"北京大学、清华大学大批判组"},{"type":"paragraph","text":"党内最大的不肯改海的走资派邓小平授意炮制的《关于科技工作的几个问题》（即《科学院工作汇报提纲》），是在科技战线推行“三项指示为纲”修正主义纲领的产物。邓小平妄图从科技阵地“打开一个大缺口”，否定毛主席的科研路线，篡改党的团结、教育、改造知识分子的政策，翻文化大革命的案，算文化大革命的帐，反对无产阶级在整个上层建筑领域对资产阶级实行全面专政，以达到他复辟资本主义的罪恶目的。这是一篇难得的反面教材，必须彻底批判。"},{"type":"paragraph","text":"我们从报刊上选编了几篇批判文章，以供参考。附录的《关于科技工作的几个问题》作了一些删节。邓小平在听取科学院负责人汇报时的插话，是他狂热地推行修正主义路线的自白、一并附在后面，供批判用。"},{"type":"paragraph","text":"（附）关于科技工作的几个问题（节录）"},{"type":"paragraph","text":"（汇报提纲讨论第-稿）"},{"type":"paragraph","text":"（一九七五年八月十一）"},{"type":"paragraph","text":"我们到科学院将近一个月，实际工作约二十天。查阅了一些重要的历史文件，同院内外的一些同志进行了座谈，作了点调查。现对下面六个问题提出一些租略的看法。"},{"type":"paragraph","text":"（一）关于充分肯定科技战线上的成绩问题（略）（二）关于科技工作的组织领导问题（略）（三）·关于力求弄通主席提出的科技战线的具体路线问题"},{"type":"paragraph","text":"主席为我们党制定了整个过渡时期的基本路线和社会主义建设总路线，同时也制定了各条战线的具体路线。我们对科技战线的具体路线、还刚刚接触，领会很不深，更谈不上弄懂弄通。经过初步学习和调查研究，觉得当前有几个问题需要明确。"},{"type":"paragraph","text":"第一是政治与业务的关系问题。"},{"type":"paragraph","text":"抓科技工作，一定要政治统帅业务，抓革命，促科研。“路线是个纲，纲举目张”。忘记了党的总路线，就会迷失方向。有了总路线还不够，还必须在总路线指导下，正确贯彻党的科技战线的具体路线和一系列方针、政策，政策思想统一了，才能有统一的行动。"},{"type":"paragraph","text":"当前这个时期，就是要坚决贯彻学习理论反修防修、安定团结、把国民经济搞上去三个指示。三个指示不能割裂开来。丢掉了反修防修，业务工作就会走到邪路上去。没有安定团结的局面，生产、科技都不可能搞好。生产和科技搞不上去，物质基础不牢靠，无产阶级专政也不可能得到巩固。"},{"type":"paragraph","text":"在科技部门工作的同志，一定要做到既有坚强的政治领导，又有切实具体的业务领导。党政领导干部，懂得很多的业务、技术是困难的，但是不学点业务和科学技术知识，不过问业务，也是不对的。应当朝又红又专的方向努力。"},{"type":"paragraph","text":"第二是生产斗争和科学实验的关系问题。科学来源于生产，又指导生产、促进生产。怎么才能多快好省发展生产？决定的因素是人，一靠人们的高度政治觉悟、革命于劲，二靠掌握先进的科学技术。科学技术也是生产力。科研要走在前面，推动生产向前发展。石油工业的突飞猛进、就证明了这一点。"},{"type":"paragraph","text":"主席和中央提出了两步走的宏伟目标，如果我们在科学技术上没有一个大的飞跃、就难以实现。没有现代化的科学技术，也就不可能有工业、农业、国防的现代化。"}],"authors":["北京大学大批判组","清华大学大批判组"],"dates":[{"year":1976,"month":7,"day":null}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":539,"page_end":540},"tags":[{"name":"邓小平","type":"人物"},{"name":"姚文元","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"四人帮","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"编纂《毛泽东选集》第五卷","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"79b3423634"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
