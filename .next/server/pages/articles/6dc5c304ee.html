script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"上海铁路管理局召开群众大会徐雪寒局长号召肃清右倾思会上宣布了对彻底坦白的张承祖等予以宽大处理","authors":[],"dates":[{"year":1952,"month":2,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　上海铁路管理局增产节约委员会前天(十八日)下午召开群众大会。由徐雪寒局长作报告。会上并宣布对隔离反省后已经彻底坦白、退出赃物、检举他犯的大贪污分子张承祖、陈汉民给他们回到原工作单位，立功赎罪，还将请求上级对他们从轻处分。徐局长在报告中说:“到今天为止，还有少数贪污数目很大的贪污分子没有坦白，他们还想继续为资产阶级服务，我们非要坚决将这些‘大老虎’彻底消灭不可。‘老虎’不肃清，永远不收兵!”接着徐局长再一次说明政策:对于那些大贪污分子，只要他们很快地彻底坦白，缴回赃物，检举别犯，都可以获得宽大处理。徐局长要大家帮助这些“大老虎”，使他们快些回到工人阶级队伍里来。关于如何打“老虎”，徐局长要大家认清“老虎”的各种性格，和狡猾诡计，以便对症下药。最后，徐局长要求大家坚决肃清有倾思想，人人找材料，人人做政治工作，争取打“虎”的彻底胜利。"},{"type":"paragraph","text":"徐局长讲话毕，即由吴良珂副局长代表路局增产节约委员会宣布:卫生处药材科副科长张承祖，及旅客服务所列车炊事员陈汉民两个大贪污分子虽然他们罪行很重，但自隔离反省后，因能彻底坦白，退出赃物，又检举了他犯，故决定给他们回到原工作单位立功赎罪，并呈请华东军政委员会减轻对他们的处分。张承祖及陈汉民两人都当场讲话，感谢政府对他们的宽大，并希望所有大贪污分子走他们彻底坦白争取从轻处理的路。他们两人当即回到自己单位的队伍里去。到会群众一致高呼口号，响应首长的号召，并拥护政府这种正确的措施。"},{"type":"paragraph","text":"为了更好地挽救失足分子，使贪污分子打破顾虑，自动坦白，在大会上，上海铁路区工会于洲主席并代表工会建议路局增产节约委员会，重新将坦白期限延到二月底止。徐局长当场代表路局增产节约委员会接受这一个要求，宣布将坦白期限正式延长到二月底截止。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6dc5c304ee"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
