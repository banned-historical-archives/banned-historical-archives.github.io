script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji49","name":"毛泽东全集第49卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji49.pdf"],"article":{"title":"关于中央各部运动的指示","alias":"","parts":[{"type":"paragraph","text":"关于中央各部运动的指示"},{"type":"paragraph","text":"（1967年6月）"},{"type":"paragraph","text":"全国的形势比我们预料的要慢，中央各部要慢。比预料的晚了一个季度，不是三、四、五月了，而是六、七月了。与其估计快一点，不如估计慢一点，与其估计很容易，不如估计困难一点。"}],"authors":["毛泽东"],"dates":[{"year":1967,"month":6}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":515,"page_end":515},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"}]},{"id":"45f85d41-2767-49bc-87e9-ba331b429fce","name":"毛泽东思想万岁（1961年-1968年）","internal":true,"official":false,"type":"pdf","author":"","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives3/main/45f85d41-2767-49bc-87e9-ba331b429fce.pdf"],"article":{"title":"关于中央各部运动的指示","alias":"","parts":[{"type":"paragraph","text":"在文化革命中立新功"},{"type":"paragraph","text":"（一九六七年六月）"},{"type":"paragraph","text":"老干部过去有功劳，但是不能靠吃老本，要很好地在无产阶级文化大革命运动中炼改造自已，要立新功，立新劳。"},{"type":"paragraph","text":"（转引自六月一日《人民日报》）关于夏收的指示"},{"type":"paragraph","text":"（一九六七年六月三日）"},{"type":"paragraph","text":"积极行动起来夏收夏种，目前正进入两夏大忙季节，南方已开始收割。今年全国夏收作物生长很好。今年的夏收，各级领导同志应特别重视，立即投入夏收夏种。各地要组织学生、机关干部、工人、解放军，以劳力、畜力、技术力量，大力支持人民公，做到颗粒归仓，严防阶级敌人破坏。"},{"type":"paragraph","text":"关于中央各部运动的指示"},{"type":"paragraph","text":"(一九六七年六月)"},{"type":"paragraph","text":"“全国的形势比我们预料的要慢，中央各部要慢。”开始说三、四月出眉目，前几天主席说“比预料的晚了一个季度，不是三、四、五月了，而是六、七月了。与其估计快一点，不如估计慢一点，与其估计很容易，不如估计困难一点。”"},{"type":"paragraph","text":"中国革命的伟大世界意义"},{"type":"paragraph","text":"（一九六七年六月）中国革命的胜利，主要不是搞地下斗争，而是武装斗争。就是全世界都黑了，只要中国是光明的，那世界就有希望，没什么问题。"},{"type":"paragraph","text":"无产阶级文化大革命，首先要把北京、上海、天津这几个地方搞好。上海就是工人这个队伍比较好，所以上海的局势中央也比较放心·"},{"type":"paragraph","text":"（六月八日张春桥同志传达）·314·"}],"authors":["毛泽东"],"dates":[{"year":1967,"month":6,"day":null}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":327,"page_end":327},"tags":[{"name":"毛泽东","type":"人物"},{"name":"上海文革","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"44a706921d"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
