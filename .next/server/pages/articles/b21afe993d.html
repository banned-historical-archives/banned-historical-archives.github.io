script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"读者批判《也谈“口味”》这篇反动文章并提出一个重要问题警惕修正主义文艺黑线翻案","authors":[],"dates":[{"year":1968,"month":5,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编者按:这封来信告诉我们，修正主义文艺黑线流毒是很深的，它在有些人的头脑中还在起作用。东方红玻璃厂大批判墙报上的《也谈“口味”》这篇反动文章，就是在社会上刮起的一股右倾翻案妖风中出现的，它是为反革命修正主义文艺黑线翻案的一种表现。"},{"type":"paragraph","text":"反动的东西、修正主义的货色总是要表现出来的，要它不表现是不行的。但是，我们要和它作坚决的斗争，它在那里出现，我们就在那里跟它作坚决的斗争。二十五路无轨电车上的一场小小辩论就是对修正主义思想的抵制。这样的辩论好得很。这说明广大革命群众阶级觉悟、路线斗争的觉悟有了空前的提高。资产阶级思想只要一露头，就会遭到革命群众的迎头痛击。我们希望每一个革命派的战士，都要自觉地展开这样的斗争。"},{"type":"paragraph","text":"编辑同志:"},{"type":"paragraph","text":"我们东方红(原耀华)玻璃厂的大批判墙报上，最近出现了一篇《也谈“口味”》的毒草文章。这篇黑文明目张胆地全盘否定无产阶级文化大革命的辉煌成果，打着“为民请命”的破旗，大肆吹捧封、资、修的黑货。它以“口味”、“兴趣”、“文艺爱好”等为幌子，恶毒攻击毛泽东思想。这株为反革命修正主义文艺黑线翻案的大毒草一出现，立即受到厂里广大革命工人的严厉批判。"},{"type":"paragraph","text":"反党、反社会主义、反毛泽东思想的大毒草《燕山夜话》、《三家村札记》早已受到无产阶级革命派和广大革命群众的批判，可是，这些黑货阴魂不散，《也谈“口味”》就是这些黑货的新翻版。这篇黑文大谈什么:“人的兴趣是多方面的……而个人的爱好又是参差不齐的，就象有的人爱吃猪肉，有些人爱好鲫鱼，也有些人嗜好烧鸡一样，脾胃不一。……”“人民大众对于文艺的欣赏，也有不同的‘口味’。有些人喜爱幽默的小品，有些人迷恋浩瀚的巨著；……就象四川人喜欢吃辣，山东人爱好大蒜一样。”这是为那个阶级在说话，不是很清楚吗?"},{"type":"paragraph","text":"无产阶级文化大革命的滚滚洪流，涤荡着一切污泥浊水。帝王将相、才子佳人那一套适合资产阶级“口味”的货色被赶下文艺舞台，革命样板戏成了革命的崭新的文艺创作的先锋。形势一片大好。只有那些封建主义、资本主义的遗老遗少才象几个苍蝇嗡嗡叫几声凄厉，几声抽泣。《也谈“口味”》就是代表一小撮人对无产阶级文艺的攻击。它胡说什么:“文艺正处在困难时期……文化大革命以来，旧的打破了，而新的还未创造出来。”一语道破了炮制者对修正主义文艺无限留恋的心情。"},{"type":"paragraph","text":"编辑同志:这篇毒文的一派胡言，很快地被我们用毛泽东思想武装起来的广大革命工人识破了。不过，这件事也不能不引起我们的严重注意:修正主义文艺黑线的流毒还远远没有肃清，这根文艺黑线还在找寻代理人，为文艺黑线翻案。这是右倾翻案妖风的一种表现，我们必须密切注意，坚决给以歼灭性的打击。　东方红玻璃厂七个革命群众"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b21afe993d"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
