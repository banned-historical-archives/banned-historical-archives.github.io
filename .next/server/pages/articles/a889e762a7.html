script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"彻底批判极左路线  尽快改变西藏面貌  拉萨召开建设新西藏动员大会","authors":[],"dates":[{"year":1980,"month":6,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"彻底批判极左路线  尽快改变西藏面貌"},{"type":"paragraph","text":"拉萨召开建设新西藏动员大会"},{"type":"paragraph","text":"据新华社拉萨六月八日电 建设团结、富裕、文明的新西藏动员大会，本月七日在拉萨召开。人大常委会副委员长、西藏自治区人大常委会主任阿沛·阿旺晋美在会上作了动员报告。"},{"type":"paragraph","text":"大会由中共西藏自治区委员会代理第一书记阴法唐主持。自治区党、政、军负责同志和干部、群众近两万人参加了大会。"},{"type":"paragraph","text":"阿沛·阿旺晋美说：西藏解放二十九年来，在党中央的关怀和西藏各级党委的领导下，在各族干部、工人、农牧民、上层爱国人士和驻藏解放军指战员的共同努力下，西藏经过和平解放、民主改革和社会主义改造，彻底推翻了封建农奴制度，进入了社会主义革命和社会主义建设的新的历史阶段，各项工作都取得了很大成绩。但是在文化大革命中，由于林彪、“四人帮”的严重破坏，西藏和全国其他地方一样遭到了十年浩劫。打倒“四人帮”以后，由于我们对党的三中全会精神领会不深，贯彻不力，对极左路线没有进行彻底批判，极左路线的流毒还很深，使西藏的面貌改变不大。"},{"type":"paragraph","text":"他说：现在党中央已把建设团结、富裕、文明的新西藏的战斗任务摆在我们面前，自治区党委也制订和采取了若干重大政策和措施。我们西藏历史上又一次新的进军就要开始了，我们要以高昂的战斗姿态，迎接这一新的伟大进军。"},{"type":"paragraph","text":"他说：我们要认真学好中央的指示和中央领导同志的讲话，继续解放思想，深入批判极左，端正思想路线和政治路线。中央指示和中央领导同志在西藏的讲话精神，是要我们在中央统一领导下，实现以藏族干部和藏族人民为主，充分行使民族区域自治权利；是要我们根据西藏的实际情况，大力发展经济，努力提高西藏人民的物质生活水平和科学文化水平。全区广大干部、群众、上层爱国人士和驻军指战员，都要立即行动起来，为实现这个目标贡献自己的一切力量。"},{"type":"paragraph","text":"他还强调要维护祖国统一，加强民族团结。他说，我们藏、汉人民要亲如骨肉，情同手足，永不分离。不管是什么人，谁要破坏祖国的统一，破坏各民族的团结，都是违背西藏人民根本利益的，西藏人民是要坚决反对的。"},{"type":"paragraph","text":"阿沛·阿旺晋美最后说，在党中央的关怀下，最近我们西藏的形势飞快发展，我们坚信，有党中央的支持，有我们一百八十多万人民的衷心拥护和辛勤劳动，我们建设新西藏的任务一定能够实现。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"name":"西藏文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a889e762a7"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
