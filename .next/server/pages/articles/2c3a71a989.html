script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"毛主席的革命卫生路线救了俺","authors":["曹桂霞"],"dates":[{"year":1970,"month":11,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席的革命卫生路线救了俺"},{"type":"paragraph","text":"宁夏贺兰县金山公社牛毛沟生产队贫农社员　曹桂霞"},{"type":"paragraph","text":"今年夏天有一天，队里组织俺们去十几里外的山沟里拔蒿子。大家的劳动热情很高，你追我赶，一个赛过一个。俺也不想示弱，跟在大嫂大姐们后边拚命地拔。这个当儿，日头毒，天气热，晒得俺心慌喉咙干。只一会儿，眼珠子冒了花，脑门顶发了晕，身子酥下了，两腿软下了，胸口一阵比一阵紧，肚子一阵比一阵痛，虚汗成颗成串地从脸上掉下来。俺不由地倒在地上，抱着肚子满坡滚。"},{"type":"paragraph","text":"大嫂大姐们见俺这个样子，心象刀割一般疼。大家都明白，俺是中了暑，羊毛痧发作了。在旧社会里，俺村不知有多少娃们犯这个病，因没钱请医，被折磨死了。无产阶级文化大革命前，在叛徒、内奸、工贼刘少奇的反革命修正主义卫生路线影响下，农村缺医少药，医院离俺们村远，娃们害下这个病，抬上几十里路，没痛死也耽误死了。"},{"type":"paragraph","text":"大家正在发愁的时候，刚学会新针疗法的贫农社员买秀梅和宋玉兰跑来，看了看俺的脸色，摸了摸俺的肚皮，又向大家打听了一下发病情况，就赶忙掏出银针，交替地在我肚子、额门、嘴皮等处连扎了八、九针。扎着扎着，俺觉得浑身热乎乎的，胸口开了，呼吸通了，头不晕了，眼不花了，肚子也不痛了。俺很快就站了起来，稍稍缓了缓，又跟着大嫂大姐们有说有笑地拔蒿子去了。"},{"type":"paragraph","text":"俺今年刚交十五岁，是新社会里生、新社会里长。俺害下这么危险的急症，若不是亲人解放军遵照毛主席“把医疗卫生工作的重点放到农村去”的光辉指示，发动群众自己办医，俺就活不成了。是毛主席的无产阶级卫生路线给了俺第二次生命。俺要衷心感谢毛主席。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2c3a71a989"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
