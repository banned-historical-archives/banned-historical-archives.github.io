<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"wengeqianqixinianlu1","name":"十年文革前期系年录（上册）","internal":false,"type":"pdf","official":false,"author":"周良霄,顾菊英","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/文革前期系年录1.pdf"],"article":{"title":"第二十六卷","parts":[{"type":"title","text":"第二十六卷"},{"type":"paragraph","text":"1966年8月8日至11日(八届十一中全会《关于无产阶级文化大革命的决定》的通过)8月8日"},{"type":"paragraph","text":"八届十一中全会通过了《中国共产党中央委员会关于无产阶级文化大革命的决定》(即《十六条》)。《十六条》是在毛泽东主持下拟定的。陈伯达、王力等人于七月初开始了起草工作，改了二十几遍。其后毛泽东又委托陶铸、王任重、张平化加以修改。陶铸等与周恩来商量，删去了“黑帮”、“黑线”等提法和若干内容，增加了一些限制性的规定。全会于八月八日上午通过的是毛泽东八月七日审定的第31稿。《中国共产党中央委员会关于无产阶级文化大革命的决定》(一九六六年八月八日通过)"},{"type":"paragraph","text":"一、社会主义革命的新阶段"},{"type":"paragraph","text":"当前开展的无产阶级文化大革命，是一场触及人们灵魂的大革命，是我国社会主义革命发展的一个更深入、更广阔的新阶段。"},{"type":"paragraph","text":"毛泽东同志在党的八届十中全会上说过：凡是要推翻一个政权，总要先造成舆论，总要先做意识形态方面的工作。革命的阶级是这样，反革命的阶级也是这样。实践证明，毛泽东同志的这个论断是完全正确的。"},{"type":"paragraph","text":"资产阶级虽然已经被推翻，但是他们企图用剥削阶级的旧思想，旧文化，旧风俗，旧习惯，来腐蚀群众，征服人心，力求达到他们复辟的目的。无产阶级恰恰相反，必须迎头痛击资产阶级在意识形态领域里的一切挑战，用无产阶级自己的新思想，新文化，新风俗，新习惯，来改变整个社会的精神面貌。在当前，我们的目的是斗垮走资本主义道路的当权派，批判资产阶级的反动学术“权威”，批判资产阶级和一切剥削阶级的意识形态，改革教育，改革文艺，改革一切不适应社会主义经济基础的上层建筑，以利于巩固和发展社会主义制度。"},{"type":"paragraph","text":"二、主流和曲折"},{"type":"paragraph","text":"广大的工农兵、革命的知识分子和革命的干部，是这场文化大革命的主力军。一大批本来不出名的革命青少年成了勇敢的闯将。他们有魄力、有智慧。他们用大字报、大辩论的形式，大鸣大放，大揭露，大批判，坚决地向那些公开的、隐蔽的资产阶级代表人物举行了进攻。在这样大的革命运动中，他们难免有这样那样的缺点，但是，他们的革命大方向始终是正确的。这是无产阶级文化大革命的主流。无产阶级文化大革命正在沿着这个大方向继续前进。"},{"type":"paragraph","text":"文化革命既然是革命，就不可避免地会有阻力。这种阻力，主要来自那些混进党内的走资本主义道路的当权派，同时也来自旧的社会习惯势力。这种阻力目前还是相当大的，顽强的。但是，无产阶级文化大革命毕竟是大势所趋，不可阻挡。大量事实说明，只要群众充分发动起来了，这种阻力就会迅速被冲垮。"},{"type":"paragraph","text":"由于阻力比较大，斗争会有反复，甚至可能有多次的反复。这种反复，没有什么害处。它将使无产阶级和其他劳动群众，特别是年青一代，得到锻炼，取得经验教训，懂得革命的道路是曲折的，不平坦的。"},{"type":"paragraph","text":"三、“敢”字当头，放手发动群众"},{"type":"paragraph","text":"党的领导敢不敢放手发动群众，将决定这场文化大革命的命运。"},{"type":"paragraph","text":"目前党的各级组织，对文化革命运动的领导，存在着四种情况。"},{"type":"paragraph","text":"（一）能够站在运动的最前面，敢于放手发动群众。他们是“敢”字当头、无所畏惧的共产主义战士，是毛主席的好学生。他们提倡大字报，大辩论，鼓励群众揭露一切牛鬼蛇神，同时也鼓励群众批评自己工作中的缺点和错误。这种正确领导就是由于突出无产阶级政治，由于毛泽东思想领先。"},{"type":"paragraph","text":"（二）有许多单位的负责人，对于这场伟大斗争的领导，还很不理解，很不认真，很不得力，因而处于软弱无能的地位。他们是“怕”字当头，墨守旧的章法，不愿意打破常规，不求进取。对于群众的革命新秩序，他们感到突然，以致领导落后于形势，落后于群众。"},{"type":"paragraph","text":"（三）有些单位的负责人，平时有这样那样的错误，他们更是“怕”字当头，怕群众起来抓住他们的辫子。实际上，他们只要认真进行自我批评，接受群众批评，是会被党和群众谅解的。不这样做，就会继续犯错误，以致成为群众运动的绊脚石。"},{"type":"paragraph","text":"（三）有些单位是被一些混进党内的走资本主义道路的当权派把持着。这些当权派极端害怕群众揭露他们，因而找各种借口压制群众运动。他们采用转移目标，颠倒黑白的手段，企图把运动引向邪路。当他们感到非常孤立，真混不下去的时候，还进一步耍阴谋，放暗箭，造谣言，极力混淆革命和反革命的界限，打击革命派。"},{"type":"paragraph","text":"党中央对各级党委的要求，就是要坚持正确领导，“敢”字当头，放手发动群众，改变那种处于软弱无能的状态，鼓励那些有错误而愿意改正的同志放下包袱，参加战斗，撤换那些走资本主义道路的当权派，把那里的领导权夺回到无产阶级革命派手中。"},{"type":"paragraph","text":"四、让群众在运动中自己教育自己"},{"type":"paragraph","text":"无产阶级文化大革命，只能是群众自己解放自己，不能采用任何包办代替的办法。"},{"type":"paragraph","text":"要信任群众，依靠群众，尊重群众的首创精神。要去掉“怕”字。不要怕出乱子。毛主席经常告诉我们，革命不能那样雅致，那样文质彬彬，那样温良恭俭让。要让群众在这个大革命运动中，自己教育自己，去识别那些是对的，那些是错误的，那些做法是正确的，那些做法是不正确的。"},{"type":"paragraph","text":"要充分运用大字报、大辩论这些形式，进行大鸣大放，以便群众阐明正确的观点，批判错误的意见，揭露一切牛鬼蛇神。这样，才能使广大群众在斗争中提高觉悟，增长才干，辨别是非，分清敌我。"},{"type":"paragraph","text":"五、坚决执行党的阶级路线"},{"type":"paragraph","text":"谁是我们敌人？谁是我们的朋友？这个问题是革命的首要问题，也是文化大革命的首要问题。"},{"type":"paragraph","text":"党的领导要善于发现左派，发展和壮大左派队伍，坚决依靠革命的左派。这样，才能够在运动中，彻底孤立最反动的右派，争取中间派，团结大多数，经过运动，最后达到团结百分之九十五以上的干部，团结百分之九十五以上的群众。"},{"type":"paragraph","text":"集中力量打击一小撮极端反动的资产阶级右派分子、反革命修正主义分子，充分地揭露和批判他们的反党反社会主义反毛泽东思想的罪行，把他们最大限度地孤立起来。"},{"type":"paragraph","text":"这次运动的重点，是整党内那些走资本主义道路的当权派。"},{"type":"paragraph","text":"注意把反党反社会主义的右派分子，同拥护党和社会主义、但也说过一些错话，做过一些错事或写过一些不好文章不好作品的人，严格区别开来。注意把资产阶级的反动学阀、反动“权威”，同具有一般的资产阶级学术思想的人，严格区别开来。"},{"type":"paragraph","text":"六、正确处理人民内部矛盾"},{"type":"paragraph","text":"必须严格分别两类不同性质的矛盾：是人民内部矛盾，还是敌我矛盾？不要把人民内部矛盾搞成敌我矛盾，也不要把敌我矛盾当成人民内部矛盾。"},{"type":"paragraph","text":"人民群众中有不同意见，这是正常的现象，几种不同意见的争论，是不可免的，是必要的，是有益的。群众会在正常的充分的辩论中，肯定正确，改正错误，逐步取得一致。"},{"type":"paragraph","text":"在辩论中，必须采取摆事实、讲道理，以理服人的方法。对于持有不同意见的少数人，也不准采取任何压服的办法。要保护少数，因为有时真理在少数人手里。即使少数人的意见是错误的，也允许他们保留自己的意见。"},{"type":"paragraph","text":"在进行辩论的时候，要用文斗，不用武斗。"},{"type":"paragraph","text":"在辩论中，每个革命者都要善于独立思考，发扬敢想、敢说、敢做的共产主义风格。革命的同志，在大方向一致的前提下，不要在枝节问题上争论不休，以便加强团结。"},{"type":"paragraph","text":"七、警惕有人把革命群众打成“反革命”"},{"type":"paragraph","text":"有些学校、有些单位、有些工作组的负责人，对给他们贴大字报的群众，组织反击，甚至提出所谓反对本单位或工作组领导人就是反对党中央，就是反党反社会主义，就是反革命等口号。他们这样做，必然要打击到一些真正革命的积极分子。这是方向的错误，路线的错误，决不允许这样做。"},{"type":"paragraph","text":"有些有严重错误思想的人们，甚至有些反党反社会主义的右派分子，利用群众运动中的某些缺点和错误，散布流言蜚语，进行煽动，故意把一些群众打成“反革命”。要谨防扒手，及时揭穿他们耍弄的这套把戏。"},{"type":"paragraph","text":"在运动中，除了确有证据的杀人、放火、放毒、破坏、盗窃国家机密等现行反革命分子，应当依法处理外，大学、专科学校、中学和小学学生中的问题，一律不整。为了防止转移斗争的主要目标，不许用任何借口，去挑动群众斗争群众，挑动学生斗争学生，即使是真正的右派分子，也要放到运动的后期酌情处理。"},{"type":"paragraph","text":"八、干部问题"},{"type":"paragraph","text":"干部大致可分以下四种："},{"type":"paragraph","text":"(一)好的。"},{"type":"paragraph","text":"(二)比较好的。"},{"type":"paragraph","text":"(三)有严重错误，但还不是反党反社会主义的右派分子。"},{"type":"paragraph","text":"(四)少量的反党反社会主义的右派分子。"},{"type":"paragraph","text":"在一般情况下，前两种人(好的，比较好的)是大多数。"},{"type":"paragraph","text":"对反党反社会主义的右派分子，要充分揭露，要斗倒，斗垮，斗臭，肃清他们的影响，同时给以出路，让他们重新做人。"},{"type":"paragraph","text":"九、文化革命小组、文化革命委员会、文化革命代表大会"},{"type":"paragraph","text":"无产阶级文化大革命运动中，开始涌现了许多新事物。在许多学校、许多单位，群众所创造的文化革命小组、文化革命委员会等组织形式，就是一种有伟大历史意义的新事物。"},{"type":"paragraph","text":"文化革命小组、文化革命委员会和文化革命代表大会是群众在共产党领导下自己教育自己的最好的新组织形式。它是我们党同群众密切联系的最好的桥梁。它是无产阶级文化革命的权力机构。"},{"type":"paragraph","text":"无产阶级同过去几千年来一切剥削阶级遗留下来的旧思想、旧文化、旧风俗、旧习惯的斗争，需要经历很长很长的时期。因此，文化革命小组、文化革命委员会、文化革命代表大会不应当是临时性的组织，而应当是长期的常设的群众组织。它不但适用于学校、机关，也基本上适用于工矿企业、街道、农村。"},{"type":"paragraph","text":"文化革命小组、文化革命委员会的成员和文化革命代表大会的代表的产生，要象巴黎公社那样，必须实行全面的选举制。候选名单，要由革命群众充分酝酿提出来，再经过群众反复讨论后，进行选举。"},{"type":"paragraph","text":"当选的文化革命小组、文化革命委员会的成员和文化革命代表大会的代表，可以由群众随时提出批评，如果不称职，经过群众讨论，可以改选、撤换。"},{"type":"paragraph","text":"在学校中，文化革命小组、文化革命委员会、文化革命代表大会，应该以革命学生为主体，同时，要有一定数量的革命教师职工的代表参加。"},{"type":"paragraph","text":"十、教学改革"},{"type":"paragraph","text":"改革旧的教育制度，改革旧的教学方针和方法，是这场无产阶级文化革命的一个极其重要的任务。"},{"type":"paragraph","text":"在这场文化大革命中，必须彻底改变资产阶级知识分子统治我们学校的现象。"},{"type":"paragraph","text":"在各类学校中，必须贯彻执行毛泽东同志提出的教育为无产阶级政治服务、教育与生产劳动相结合的方针，使受教育者在德育、智育、体育几方面都得到发展，成为有社会主义觉悟的有文化的劳动者。"},{"type":"paragraph","text":"学制要缩短。课程设置要精简。教材要彻底改革，有的首先删繁就简。学生以学为主，兼学别样。也就是不但要学文，也要学工，学农，学军，也要随时参加批判资产阶级的文化革命的斗争。"},{"type":"paragraph","text":"十一、报刊上点名批判的问题"},{"type":"paragraph","text":"在进行文化革命群众运动的时候，必须把对无产阶级世界观的传播，对马克思列宁主义、毛泽东思想的传播，，同对资产阶级和封建阶级的思想批判很好地结合起来。"},{"type":"paragraph","text":"要组织对那些有代表性的混进党内的资产阶级代表人物和资产阶级的反动学术“权威”，进行批判，其中包括对哲学、历史学、政治经济学、教育学、文艺作品、文艺理论、自然科学理论等战线上的各种反动观点的批判。"},{"type":"paragraph","text":"在报刊上点名批判，应当经过同级党委讨论，有的要报上级党委批准。"},{"type":"paragraph","text":"十二、关于科学家、技术人员和一般工作人员的政策"},{"type":"paragraph","text":"对于科学家、技术人员和一般工作人员，只要他们是爱国的，是积极工作的，是不反党反社会主义的，是不里通外国的，在这次运动中，都应该继续采取团结、批评、团结的方针。对于有贡献的科学家和科学技术人员，应该加以保护。对他们的世界观和作风，可以帮助他们逐步改造。"},{"type":"paragraph","text":"十三、同城乡社会主义教育运动相结合的部署问题"},{"type":"paragraph","text":"大中城市的文化教育单位和党政领导机关，是当前无产阶级文化革命运动的重点。"},{"type":"paragraph","text":"文化大革命使城乡社会主义教育运动更加丰富、更加提高了。必须把两者结合起来进行。各地区、各部门可以根据具体情况进行部署。"},{"type":"paragraph","text":"在农村和城市企业进行社会主义教育运动的地方，如果原来的部署是合适的，又做得好，就不要打乱它，继续按照原来的部署进行。但是，当前无产阶级文化大革命运动提出的问题，应当在适当的时机，交给群众讨论，以便进一步大兴无产阶级思想，大灭资产阶级思想。"},{"type":"paragraph","text":"有的地方，以无产阶级文化大革命为中心，带动社会主义教育运动，清政治，清思想，清组织，清经济。这样做，如果那里党委认为合适，也是可以的。"},{"type":"paragraph","text":"十四、抓革命，促生产"},{"type":"paragraph","text":"无产阶级文化大革命，就是为的要使人的思想革命化，因而使各项工作做得更多、更快、更好、更省。只要充分发动群众，妥善安排，就能够保证文化革命和生产两不误，保证各项工作的高质量。"},{"type":"paragraph","text":"无产阶级文化大革命是使我国社会生产力发展的一个强大的推动力。把文化大革命同发展生产对立起来，这种看法是不对的。"},{"type":"paragraph","text":"十五、部队"},{"type":"paragraph","text":"部队的文化革命运动和社会主义教育运动，按照中央军委和总政治部的指示进行。"},{"type":"paragraph","text":"十六、毛泽东思想是无产阶级文化大革命的行动指南"},{"type":"paragraph","text":"在无产阶级文化大革命中，要高举毛泽东思想的伟大红旗，实行无产阶级政治挂帅。要在广大工农兵、广大干部和广大知识分子中，开展活学活用毛主席著作的运动，把毛泽东思想作为文化革命的行动指南。"},{"type":"paragraph","text":"各级党委，在这样错综复杂的文化大革命中，更必须认真地活学活用毛主席著作。特别是要反复学习毛主席有关文化革命和党的领导方法的著作，例如《新民主主义论》、《在延安文艺座谈会上的讲话》、《关于正确处理人民内部矛盾的问题》、《在中国共产党全国宣传工作会议上的讲话》、《关于领导方法的若干问题》、《党委会的工作方法》。"},{"type":"paragraph","text":"各级党委，要遵守毛主席历来的指示，贯彻执行从群众中来，到群众中去的群众路线，先做学生，后做先生。要努力避免片面性和局限性。要提倡唯物辩证法，反对形而上学和烦琐哲学。"},{"type":"paragraph","text":"在以毛泽东同志为首的党中央领导下，无产阶级文化大革命必将取得伟大的胜利。"},{"type":"paragraph","text":"韩素音《周恩来和他的世纪》：周在取得毛同意后划掉了《十六条》中的一句话：“在过去十七年里党内存在着一条由‘黑帮’操纵的‘黑线’。”但是，周的意见被林彪和中央文革领导小组成员否定掉了。周接着又提出增加一句有限制性的话：“严格区分敌我矛盾和人民内部矛盾这两类不同性质的矛盾。”周还强调：“大多数干部是好的或者比较好的。我们必须团结百分之九十五以上的干部。”周坚持增加一项保护“做出过贡献”的科技人员的条款，并获得成功。周也竭力争取加上重要的一句话，并由毛亲自写下：“要文斗，不要武斗。”(《再生凤凰》第434页)"},{"type":"paragraph","text":"晚，林彪在接见中央文革小组成员时作了长篇讲话。他说：“这次文化大革命的最高司令是毛主席”，“毛主席又把局面扭转过来了，不然，文化大革命运动就会夭折、中断，资产阶级就会占优势，我们就要打败仗。”这篇讲话在全会上作了传达。"},{"type":"paragraph","text":"林彪接见中央文革小组时的讲话(一九六六年八月八日)"},{"type":"paragraph","text":"昨天主席要我和同志们见面一下，认识一下。这次文化革命，最高司令是我们主席，在毛泽东思想旗帜下，在毛主席亲自领导下，同志们进行紧张的劳动，你们的工作碰到困难，有很大困难。运动开始蓬蓬勃勃，轰轰烈烈，中间泼冷水，泼下去了。毛主席把局面扭转过来了。不然文化革命就会夭折、中断，资产阶级就会占优势，我们就要打败仗。现在重整旗帜，再进攻，消灭资产阶级思想，树立无产阶级思想，改变人的灵魂，把旧思想打垮。"},{"type":"paragraph","text":"这些大战役是总攻击，今后若干时候还要出现大战役，大战役和小战役结合，打到底，资产阶级思想存在一天，我们就要战斗一天。这个任务不是简单的，不是临时任务，不是短时期可以结束的。十六条讲文化革命小组，文化革命委员会不是临时的，要长期存在，这种提法是正确的。正确估计到斗争的长期性。这是一个长期性的任务，要继续打几仗，不是一个战役性的总攻击就能解决问题的。战术性的战役，每个时候，每个地方，每个问题上都有的。"},{"type":"paragraph","text":"修正主义国家，不可能把文化革命作为专题，作为大事。我们毛主席把无产阶级文化大革命作为一个战略任务，是共产主义运动中的创举，也是社会主义革命的创举，是社会主义建设所必须的。几千年剥削阶级统治，旧思想深入人心，影响是很不简单的，不是一下子能解决的。"},{"type":"paragraph","text":"消灭资产阶级思想，改造人的灵魂，很不简单。没收资产阶级的财产容易，改造人的思想，改造人的灵魂是不容易的，要经过大震动，象这次是氢弹，原子弹震动人们。要在运动中把资产阶级反动“权威”打倒，要使他们的威信扫地。要弄得翻天覆地、轰轰烈烈，大风大浪，大搅大闹，这斗争要闹得资产阶级睡不着觉，无产阶级也睡不着觉。大家动动脑筋，在灵魂上大震动，彻底打垮资产阶级反动“权威”，彻底建立无产阶级“权威”。在这个基础上，再改变一种缓和的形式，经常形式。质变的形式和量变的形式，交替使用，相互渗透。毛主席是统帅，你们是作战员，进行全国的大战斗，任务很大。"},{"type":"paragraph","text":"社会主义革命如何革法？是个大问题。反对帝国主义，反对封建主义，我们熟悉，社会主义革命是个新问题，触及每个人的灵魂，彻底废除所有制，消灭三大差别，非一朝一夕的事。在共产主义社会里，即使我们现在所说的三大差别消失了或减少了，也一定会出现新的差别，新的矛盾。"},{"type":"paragraph","text":"我们不是单纯从思想着手，一方面从物质上着手，发展生产，提高技术，一方面从精神上着手，改造人的思想。生产力主要因素是人，发挥人的因素，就要改变私有观念，提高对社会的责任感，这是一句话可以说完，做起来要经过反复，经过无数次斗争，批判、表扬，在整个思想上进行大的斗争，才可能把人改变过来。斗争通过许多低级阶段，达到了高级阶段。我们从两条战线向前进攻。毛泽东思想是我们在这两条战线上前进的总火车头。我们象火车一样，在两条铁轨上前进，不要象修正主义国家，只搞物质，那就必然倒退，必然复辟，非出修正主义不可。我们一切工作要由毛泽东思想领先。我们要把毛泽东思想这一精神战线抓住不放，要把这一场战斗顽强打到底，脑袋中打了胜仗，物质上的胜仗才能打胜。这绝非小事，是大事。"},{"type":"paragraph","text":"你们这些同志这几个月起了作用，今后还希望起更大的作用。当然泼冷水泼下去，靠主席扭转过来。不然，大山压下来顶不住，大石头挡住通不过。"},{"type":"paragraph","text":"我是打仗的，对毛泽东思想拼命想学，想用，自己是了解很少。毛主席说：破旧的思想，用新的思想来代替。新的思想就是毛泽东思想，我们大学大立毛泽东思想，因为它是真正的马克思列宁主义，最高水平的马克思列宁主义！是能改造人的灵魂的马克思列宁主义。我国是七亿人口的大国，没有统一的思想这是一盘散沙。张三一篇，李四一篇，不能统一全国的思想，只有毛泽东思想的威力，才能把全国人民的思想统一起来。苏联没有把列宁主义思想灌输到人民中去，没有统一的无产阶级思想，是大错特错，必然的资本主义倒退。我们不要犯这个错误，要把人们的思想用毛泽东思想统一起来，变成全党的指南，各项工作的指导方针。中国封建社会用孔、孟之道巩固了它的政权。资产阶级有它的思想体系巩固它的政权。我们要用我们代表无产阶级利益，人民利益的新思想体系，这就是毛泽东思想体系，巩固无产阶级专政。用毛泽东思想体系代替他们的思想体系。"},{"type":"paragraph","text":"我们文化革命小组，我们全党一定要把主席思想传播开去。在部队是百试百效，哪里学习的好，就出好人好事，战斗力强，工作就搞得好。哪里学的不好，力量就减弱。现在要把毛泽东思想变成全国人民的财富，大破旧思想，打掉资产阶级反动“权威”的威风，树立无产阶级权威的威风，就是毛泽东思想。在部队中这样做，大见效果。拿到全国人民中，也大见效果。过去中宣部不让印毛主席著作、语录，他们是大错特错的，陆定一、周扬，还有下面许多资产阶级代表人物，他们不想革命，也不让别人革命，他们名义上是共产党，实际上是反共分子，名义上是革命者，实际上是反革命分子。不少人不能正确评价主席思想，认识主席思想的伟大。毛主席是当代无产阶级最杰出的领袖，是最大的天才，有最高的责任感，最现实的革命精神。毛泽东思想通过长期革命斗争的考验，是无产阶级最高的理论，是无产阶级最高水平的著作。是我国有史以来最高水平的著作。我们要以它为武器，为动力，不重视，要犯大错误。中央政治局常委的一些人，不重视这点，就是很大错误。如同苏联人去掉列宁主义一样。"},{"type":"paragraph","text":"要使我国强盛起来，繁荣起来，毛泽东思想是根本的因素，这样下去干几年就会有很大效果。如果几十年，几百年，就可以站到世界的最前列。如果搞的不好，就可能倒退，从先进变为落后。我们要有自觉地很有意识地掌握这个武器。现在鱼目和珍珠在一起，必须把鱼目珍珠分开，把珍珠给工农群众，免得人民见不到文化，见不到光明。鱼目珍珠，让他们自己挑选有困难，我们现在告诉他们，毛泽东思想就是珍珠，大家要负起这个责任。"},{"type":"paragraph","text":"总之一句话，大破旧思想，大立毛泽东思想。要把我国变成强盛的国家，要搞物质建设，而在人民群众中，广泛传播活学活用毛泽东思想就是我们进行精神建设，这种精神建设，如同总的火车头带动火车在双轨上前进。"},{"type":"paragraph","text":"贯彻执行毛主席提出的无产阶级文化大革命的方针，还有很大阻力，很多阶级代表的阶级斗争，阶级碰到阶级，反动阶级有很多代表人物。要前进就要战斗。每一步的前进，就要经过一场战斗。每一步的前进，都要粉碎阻力，才能继续前进。"},{"type":"paragraph","text":"《人民日报》发表《孙冶方的理论》一文，批判孙主张把计划与统计放在价值规律的基础上‚是企图使社会主义经济蜕化为资本主义经济。8月9日"},{"type":"paragraph","text":"《十六条》在全国公开发表。各地群众敲锣击鼓，列队游行，进行“报喜”，以示拥护。"},{"type":"paragraph","text":"清华造反派在8·8晚上成立了“八·八串连会”，反对8月7日文革临时筹委会斗黑帮的决议。临时筹委会也随之成立“八·九串连会”双方尖锐对立。"},{"type":"paragraph","text":"上海工人造反派闻风向“走资派”发起了“猛烈进攻”。(上海进行四清的40万职工的企业，在7月间就开展了“文化大革命”)。"},{"type":"paragraph","text":"王任重向北大、清华、北大附中、清华附中派出联络员。8月10日"},{"type":"paragraph","text":"晚七时十五分，毛泽东亲自来到中共中央群众接待站，接见前来庆贺《十六条》发表的群众。并指示：“你们要关心国家大事，要把无产阶级文化大革命进行到底！”"},{"type":"paragraph","text":"林彪两次接见军队高级干部，听取汇报，并就干部路线问题进行指示，强调“今后我们的干部政策应该是，谁反对毛主席，就罢谁的官；谁反对突出政治，就罢谁的官，不管他有天大的本事。”"},{"type":"paragraph","text":"关于干部路线问题的指示纪要"},{"type":"paragraph","text":"八月十日上午九时半许世友同志向林副主席汇报工作时提出了一些问题，向林副主席请示，林副主席作了具体指示。在座的还有杨成武同志和刘志坚。许世友同志走了以后，林副主席又和杨成武同志、刘志坚专就干部路线问题作了重要指示。"},{"type":"paragraph","text":"八月十日下午五时，林副主席就军队上级机关文化革命和干部路线问题再次作了重要指示，在座的有叶剑英、萧华、杨成武、许世友、黄永胜、陈锡联、韩先楚等同志。"},{"type":"paragraph","text":"上午谈："},{"type":"paragraph","text":"军队干部中，有些人太落后，又不改正错误的要罢官。我们不能有腐败的干部政策。"},{"type":"paragraph","text":"看干部，要看他是拥护毛主席的，还是反对毛主席的，是不是突出政治，革命干劲是不是足，要看主流和逆流。"},{"type":"paragraph","text":"要注意不要迷失政治方向，拥护主席的，突出政治的，是头号的大好，不然和话，就是头号大坏，其它的都是中好中坏，小好小坏。到底哪一条是第一位？哪一条是第二位？这是两种干部政策。一种是注意小节，不注意大节；一种是也注意小节，主要是注意大节。有的干部小节不那么好，生活作风、男女关系、工作态度、工作方法有毛病，不大好，但是拥护毛主席，突出政治，有革命干劲。还有一种干部，小节毛病不多，没有什么男女关系，人缘也好，是和事佬，他也不偷鸡摸狗的，但是他反对突出政治。如果用这种干部，我们的军队就会变成修正主义的军队。我们的干部政策，要注意大节。"},{"type":"paragraph","text":"干部政策，就是不要和事佬，所谓人缘很好，就是工作中怕得罪人。我们不能选这种干部，我们要拥护毛主席的，突出政治的，有革命干劲的好干部。这是方向性问题。我们的军队按照这样做是一种面貌，否则是另一种面貌。"},{"type":"paragraph","text":"对于小节有错误的人，为了用他，就要批评他，就要帮助他，“玉不琢，不成器”，能认真改造就大大欢迎，要按主席的五条标准办事，要用他就要批评他，这是对他的信任。用他他就一定要改，不改就无法用。要把好人、能办事的人提到领导机关来。今后，我们的干部政策，就是谁反对毛主席就罢谁的官，谁反对突出政治就罢谁的官，不管他有多大的本事。我的讲话，请你们向军委常委报告，看看有什么意见。这个要和部队同志去讲，这是个方向性问题，要把这个精神贯彻下去。"},{"type":"paragraph","text":"两种政策，两种路线。一种是高举毛泽东思想伟大红旗，突出政治，有革命干劲；一种是不高举毛泽东思想伟大红旗，不突出政治，单纯军事观点、技术观点，谨小慎微。我们不要把我们的军队变成萎靡不振的军队。对于犯错误的军队干部，能教育的教育、能争取的要争取，不可救药的罢官。"},{"type":"paragraph","text":"干部政策要注意，请杨成武同志注意一下这几个方面问题。请刘志坚同志好好和徐立清同志谈一谈。现在我们解放军的地位那么高，干部不要再出乱子。军队干部，再出反对毛主席的人，是最大的耻辱。要坚决按主席批示的五条接班人的原则和我们今天讲的具体意见来办。"},{"type":"paragraph","text":"委托刘志坚同志好好把《解放军报》搞好，《解放军报》搞好了，抓好了这一主要环节，全面工作就带动了，毛主席思想就挂帅了。"},{"type":"paragraph","text":"去年冬天，我提出突出政治五项原则时，梁必业加进了几句话。他提出突出政治落实备战，这是错误的，备战不能和政治相提并论。"},{"type":"paragraph","text":"下午谈："},{"type":"paragraph","text":"干部有几种。一种干部，他高举毛泽东思想伟大红旗，拥护毛主席，突出政治，有革命干劲，但小节有毛病，有缺点。一种干部不高举毛泽东思想伟大红旗，反对毛主席，不突出政治，没有革命干劲，但小节没什么问题。这两种人中应用哪一种？要提拔第一种人，不用第二种人。对于第二种人教育不改的，不可救药的要罢官。这样做就使我们军队有朝气，有强大的战斗力。不能把我们的军队变成庸俗的腐败的军队，不能把我们的军队变成北洋军阀的军队。当然第一种人中间，小节方面有毛病的，也要批评，要他改正，批评他是为了用他，信任他。"},{"type":"paragraph","text":"还有一种是全才，大节也好，小节也好，这当然很好，但是全才的是不多的。"},{"type":"paragraph","text":"要通过这次运动，全面审查干部，该升的要升，该罢的要罢。我们军队干部如果再出反对毛主席的人，就是最大的耻辱。"},{"type":"paragraph","text":"刘少奇在中央全会上作检查。"},{"type":"paragraph","text":"《红旗》第10期在发布《十六条》的同时，发表社论《无产阶级文化大革命的纲领性文件》。8月上旬"},{"type":"paragraph","text":"陶铸派雍文涛率领文办一批干部到北京市组织“文化革命委员会”，接替团中央的工作队，继续控制北京市中学文化大革命。8月11日"},{"type":"paragraph","text":"叶群找总参作战部副部长雷英夫，口授攻击诬陷刘少奇的材料，嘱其写成材料上报。"},{"type":"paragraph","text":"吴德代表新北京市委检查，承认犯了方向路线性错误。宣布在两三天内工作组全部撤回。"},{"type":"paragraph","text":"八届十一中全会印发林彪“5·18”讲话。"},{"type":"paragraph","text":"[按]"},{"type":"paragraph","text":"所谓“5·18”讲话。即林彪1966年5月18日在中央政治局扩大会议上所作的“政变经”，全文见卷十三。"},{"type":"paragraph","text":"《人民日报》发表社论《掌握文化大革命的思想武器》，指出：“对于错误路线，必须坚决地抵制批判斗争，这样才能使正确路线得以贯彻执行，才能使文化大革命走向胜利。”"},{"type":"paragraph","text":"北航揪斗了工作组长赵如璋。在以后的一段时期里，各院校造反派(少数派)揪住工作组不放(虽已撤走)，而继工作组掌权的文革会(多数派)则秉承陶铸的指示，批斗黑帮(即彭真、陆定一、周扬及其有关下属)。两派的冲突益剧。"}],"authors":["周良霄","顾菊英"],"dates":[{"year":2008}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":323,"page_end":331,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"陶铸","type":"人物"},{"name":"杨成武","type":"人物"},{"name":"王任重","type":"人物"},{"name":"刘志坚","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"许世友","type":"人物"},{"name":"陆定一","type":"人物"},{"name":"周扬","type":"人物"},{"name":"中央文革","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"武斗","type":"主题/事件"},{"name":"人民内部矛盾","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]},{"id":"wengeqianqixinianlu2","name":"十年文革前期系年录（中册）","internal":false,"type":"pdf","official":false,"author":"周良霄,顾菊英","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/文革前期系年录2.pdf"],"article":{"title":"第五十六卷","parts":[{"type":"title","text":"第五十六卷"},{"type":"paragraph","text":"1967年1月9日至11日1月9日"},{"type":"paragraph","text":"毛泽东讲话，论机关文化大革命的重要性："},{"type":"paragraph","text":"机关的无产阶级文化大革命是非常重要的，如果仅仅有学生运动、农民运动、工人运动，没有机关干部起来，积极投入到这场文化大革命中去，是不成功的。有好多重要的问题，就是依靠机关来揭露。"},{"type":"paragraph","text":"经毛泽东批准，林彪在他主持的军委碰头会上，攻击贺龙是“土匪”。在林彪、江青的煽动下，贺龙家在年初被抄，夫妇二人为躲避造反派的揪斗，藏在中南海周恩来家中。"},{"type":"paragraph","text":"林彪在中央军委扩大会议上谈贺龙及其他(节录)"},{"type":"paragraph","text":"(一九六七年一月)"},{"type":"paragraph","text":"现在是全面的内战。一方面要坚决打下去，另一方面不该打的不要乱冲。又要革命，又不要乱冲。军委文革要改组。刘志坚犯了大错误，实际上是资产阶级反动路线在军队的代表人物，他发了不少不正确的指示。撤工作组本来他同意陈伯达同志的意见，以后又反对。"},{"type":"paragraph","text":"处理海军问题，他支持非左派，打击左派。"},{"type":"paragraph","text":"海军过去以军事为重点，转为以政治为重点；以非高举毛泽东思想为指导，转为高举毛泽东思想为指导；以官僚主义作风，转为非官僚主义作风。海军这几年的成绩是不能抹煞的。把李(作鹏)、王(宏坤)、张(秀川)扣上夺权的帽子，扣上“地下活动”的帽子，是不公道的。"},{"type":"paragraph","text":"刘志坚主张接见革命师生，把几个老帅推向前线，推到第一线当炮灰......"},{"type":"paragraph","text":"这几位老帅是好同志。他们是做工作的，不是不做工作的。是正派的，不是不正派的。是光明磊落的，不是不光明磊落的。把他们炮轰了，打倒了，对军队是不利的。相反真正要打倒的并未打倒。"},{"type":"paragraph","text":"在军内并没有炮轰贺龙。他到处搞夺权，搞山头主义，反而不炮轰。他是不正派的人，是搞两面手法的。......我们文化大革命，是资产阶级挑起的。是资产阶级进行反扑。刘、邓、陶、刘志坚他们向无产阶级挑战。贺龙这个人手伸得很长，不但在军队到处伸手，而且在地方也到处伸手。贺龙搞大比武，是个大阴谋，罗瑞卿的后台就是贺龙。贺龙是大土匪，是土匪出身。用送礼、拍肩膀、介绍老婆，搞旧军队一套。四十年来灵魂深处是个大野心家。他吃了饭不干事，经常在家请客，拉拢干部，许多军区、军种、兵种都有他的人。贺龙是反毛主席的，他是一个封建地主野心家，混入党内捞资本。打倒贺龙！"},{"type":"paragraph","text":"中央文革决定以北京大学、清华大学、北京航空学院、北京地质学院、北京矿业学院、北京市二中、二十五中和华侨补习学校为军训试点学校。2月10日，解放军军训人员进入诸校。"},{"type":"paragraph","text":"周恩来、谢富治在人大会堂接见全国公安、检察、法院来京人员，谢富治讲话说：我们正在酝酿关于加强保卫文化大革命的六条，并念了《六条》的草稿。他号召全国政法战线立即行动起来，向赫鲁晓夫式的人物刘少奇、邓小平开火！(《传信录392》)"},{"type":"paragraph","text":"在工矿企业座谈会上，江青讲话，说：现在同志们要夺权。现在是革命工人大联合，起来夺走资本主义道路当权派的权。陈伯达讲话，说：无产阶级文化大革命从一开始就是一个夺权的革命斗争。半年多来的无产阶级文化大革命给群众的夺权斗争做了思想准备。凡是资产阶级代表人物统治的地方就要把权夺过来。凡是被走资本主义道路的当权派和顽固执行资产阶级反动路线的人垄断的，都要把权夺过来。(《传信录393》)"},{"type":"paragraph","text":"陈伯达接见新华社群众，宣布改组新华社，王唯真任副社长。"},{"type":"paragraph","text":"王力在新华社讲话：目前形势很好，一个重要的特点就是揪出了陶铸。把陶铸的盖子一揭，机关的文化大革命起来了，过去是一块大石头压着。他攻击陶铸一贯忠实执行刘邓资产阶级反动路线，刘邓倒台后，仍千方百计执行并阻止批判反动路线，还反对提“反动路线”一词。(《传信录394》)"},{"type":"paragraph","text":"王力向中央办公厅、国务院秘书厅文化革命联合接待站革命造反团成员，说：《告上海人民书》和《人民日报》按语，“标志着无产阶级文化大革命发展到一个新的阶段”。(《传信录395》)"},{"type":"paragraph","text":"戚本禹在政协礼堂接见北京农大师生，说：从七大以来，就有党内两条路线的斗争。(《传信录396》)工交系统造反派组织在工人体育馆召开批斗薄一波大会。“联动”第五次冲公安部，呼口号“打倒江青”，“保卫刘少奇”，“谁反对刘少奇就砸烂他的狗头”。"},{"type":"paragraph","text":"《人民日报》转载《急告全市人民书》，把标题改作《告上海全市人民书》，并加上由毛泽东亲自审定的编者按语。"},{"type":"paragraph","text":"《人民日报》转载《抓革命，促生产，彻底粉碎资产阶级反动路线的新反扑——告上海全市人民书》的编者按语(一九六七年一月九日)"},{"type":"paragraph","text":"上海《文汇报》一月五日发表的《告上海全市人民书》，是一个极其重要的文件。这个文件高举以毛主席为代表的无产阶级革命路线的伟大红旗，吹响了继续向资产阶级反动路线猛烈反击的号角。这个文件坚决响应毛主席的抓革命，促生产的伟大号召，提出了当前无产阶级文化大革命的关键问题。这不仅是上海市的问题，而且是全国性的问题。"},{"type":"paragraph","text":"随着上海市革命力量的发展，崭新面貌的、革命的《文汇报》和《解放日报》出现了。这是无产阶级革命路线反对资产阶级反动路线的胜利产物。这是我国无产阶级文化大革命发展史上的一件大事。这是一个大革命。这件大事必将对于整个华东、对于全国各省市的无产阶级文化大革命运动的发展，起着巨大的推动作用。"},{"type":"paragraph","text":"张春桥、姚文元在上海接见“红革会”负责人，传达了毛泽东最新指示：“1967年将是全国全面展开阶级斗争的一年。在这些阶级斗争中，中央要抓重点：一北京，二上海，三天津，四东北。”“上海的革命学生起来了，革命工人起来了，革命机关干部起来了，上海的文化大革命就有希望了。”“工总司”等32个造反组织的《紧急通告》在《文汇报》和《解放日报》发表。其中突出反对经济主义，作出十条规定，“责令市委、公安局照此执行”。《文汇报》和《解放日报》在12日重新发表《紧急通告》时，都加了编者按，表示“全力支持”，“最坚决的支持”。"},{"type":"paragraph","text":"紧急通告"},{"type":"paragraph","text":"《文汇报》编者按：我们全力支持《紧急通告》的十条意见。我们希望全市革命造反派认真执行这十条意见。"},{"type":"paragraph","text":"目前，经济主义思潮的泛滥，是一个值得严重注意的问题。这是资产阶级反动路线向无产阶级革命路线的新反扑。上海市委内一小撮走资本主义道路的当权派和极少数顽固坚持资产阶级反动路线的人，在政治上已开始瓦解了，便必然要从经济上来发动新的进攻。这场新的进攻，其矛头直接针对无产阶级的司令部，直接针对毛主席提出的“抓革命，促生产”的方针。我们必须最最坚决击退资产阶级反动路线的这种新反扑。"},{"type":"paragraph","text":"任何破坏生产、破坏国家财政金融、破坏文化大革命的行为，都是反革命的行为。广大革命造反派和革命职工行动起来，不折不扣地贯彻“抓革命，促生产”的方针，一面揭穿上海市委内一小撮资本主义道路的当权派和顽固地执行资产阶级反动路线的人的新阴谋，一面坚守生产和建设岗位，把生产搞好，努力夺取文化革命和生产的双胜利！"},{"type":"paragraph","text":"《解放日报》编者按：上海工人革命造反总司令部等革命造反派组织，继发表《告上海全市人民书》之后，又发出了一个《紧急通告》。这个通告十分重要。我们表示最坚决的支持。这个通告指出了当前无产阶级文化大革命中的一个严重的问题：上海市委内一小撮资本主义道路的当权派和极少数顽固坚持资产阶级反动路线的人，正在玩弄新的花招，破坏无产阶级文化大革命，对抗毛主席的革命路线，对抗毛主席提出的“抓革命，促生产”的方针；并妄图用物质刺激来腐蚀群众的革命意志。革命造反派的同志和广大革命群众及时识破了这个大阴谋，粉碎了这个大阴谋。这是毛泽东思想的又一伟大胜利！"},{"type":"paragraph","text":"经济主义，物质刺激，是彻头彻尾的反革命修正主义货色。用毛泽东思想武装起来的广大革命群众坚决不要这些破烂货；他们完全懂得，无产阶级文化大革命，就是要灭资兴无，破私立公，改造人的灵魂，实现人的思想革命化，挖掉修正主义根子，巩固和发展社会主义制度。《紧急通告》所提出的十条意见，正是反映了革命群众的共同意愿，代表了无产阶级的最高利益，再一次有力地打击了资产阶级反动路线的新反扑。各有关部门必须坚决贯彻，认真执行。"},{"type":"paragraph","text":"目前，正当上海无产阶级文化大革命进入两条路线决战的时候，正当顽固推行资产阶级反动路线的上海市委被打倒的时候，一小撮党内走资本主义道路的当权派又玩弄新的阴谋。他们与社会上资本主义势力相结合，以经济福利问题来转移斗争的大方向，挑动群众斗群众，造成工厂停工，铁路中断，公路阻塞，甚至挑动港务工人停止生产，影响港口工作，破坏我国国际威望。他们任意挥霍国家财富，随意增加工资、福利，滥发各种补助费，煽动群众强占公房。这是上海市委坚持执行资产阶级反动路线的新形式。"},{"type":"paragraph","text":"党内一小撮走资本主义道路的当权派采取这种卑鄙阴险的手段，无非是为了：一、以破坏生产、中断交通、危害国计民生来对抗毛主席，对抗党中央，对中央文化革命小组施加压力，以达到破坏无产阶级文化大革命的目的。二、利用经济福利问题来转移斗争的大方向，企图把一场严肃的政治斗争引入经济斗争的邪路上去，同时以物质利益来腐蚀群众的革命意志，推行和平演变，使资产阶级思想泛滥成灾。"},{"type":"paragraph","text":"为此，我们严正警告上海市委，任何妄图用破坏生产、中断交通和增加工资福利来转移斗争视线的阴谋，都是绝对不能得逞的。用毛泽东思想武装起来的革命造反派，坚决揭露这个阴谋，坚决打退资产阶级反动思潮的进攻。我们一定要坚决贯彻毛主席提出的“抓革命，促生产”的方针，一方面积极参加无产阶级文化大革命，一方面坚守生产和建设岗位，坚持八小时工作制，努力完成和超额完成生产计划，并且力争产品的高质量。我们相信革命的广大工人群众，对伟大的社会主义祖国有高度的政治责任感，一定能“公”字当头，从国家整体利益出发，正确地处理上述问题，夺取文化革命和生产的双胜利。"},{"type":"paragraph","text":"全市的革命造反派战友们，为了迅速扭转由上海市委在社会生产上所造成的严重局面，我们呼吁大家："},{"type":"paragraph","text":"一、革命造反派的工人、机关干部、学生，必须坚决贯彻执行毛主席提出的“抓革命，促生产”的指示，积极参加文化大革命，同时又要坚守生产岗位，成为“抓革命，促生产”的模范。"},{"type":"paragraph","text":"二、呼吁全国革命造反派立即行动起来，说服、动员在各地串连的上海人、机关干部、企业事业工作人员、艺徒等立即回沪，搞好本单位文化大革命，超额完成一九六七年生产计划。"},{"type":"paragraph","text":"三、凡过去由各单位当权派签发的外出串连证明，即日起一律作废，各单位发出的大量串连费(车费除外)，一律由当权派签发者负责追回(可分期退还)。"},{"type":"paragraph","text":"四、除必要的生产经费、工资开支、文化革命经费、办公经费及其他正当经费外，各机关、团体、企业事业单位的流动资金，自即日起一律冻结，由革命造反派、革命群众联合组织监督市级和各级财务机关执行，以保证国家经济不受损失(群众在银行的存款除外)。"},{"type":"paragraph","text":"五、为了避免转移斗争大方向，关于工资调整、工资补发、福利待遇等，原则上放到运动后期再作处理(特殊情况请示中央另作处理)。"},{"type":"paragraph","text":"六、学生与工农相结合，是学生改造世界观，搞好文化大革命的必由之路。有些当权派为了挑起工人对学生的不满，破坏工学结合，对学生进行“和平演变”，竟发放较高的劳动工资，这完全是修正主义的一套，即日起，一律不准发放。"},{"type":"paragraph","text":"七、所有公房及没收的资本家房屋都是全民所有制财产，运动后期由国家统一安排，不准任何个人强占公房，违者由公安局查处。凡怂恿居民抢占公房者，按情节轻重，依法处理。凡已住入抢占来的房屋者，限一周内搬回原处。"},{"type":"paragraph","text":"八、加强无产阶级专政，凡是反对毛主席、林副主席、中央文革及破坏文化大革命、破坏生产者，立即由公安局依法逮捕。凡在运动中破坏社会治安、打人行凶、抢劫和偷盗别人财物者，应立即交回赃物，并按情节轻重依法处理；以后重犯或屡教不改者必从严惩处。"},{"type":"paragraph","text":"九、上述各条，希各单位造反派组织和全市广大革命群众立即贯彻执行，开动一切宣传机器，进行宣传教育。"},{"type":"paragraph","text":"十、上述各条，责令市委、公安局照此执行，凡有违犯上述各条者，立即以破坏文化大革命查处。"},{"type":"paragraph","text":"上海工人革命造反总司令部，上海工人北上返沪第二兵团，红卫兵上海市大"},{"type":"paragraph","text":"专院校革命委员会(红革会)，上海革命造反联合委员会红卫军指挥部，上海市委机"},{"type":"paragraph","text":"关革命造反联络站，上海新闻界革命造反委员会，上海体育战线革命造反司令部，"},{"type":"paragraph","text":"上海医务界革命造反总司令部，上海医药工业工人革命造反联合指挥部，上海造纸"},{"type":"paragraph","text":"工人革命造反总部，上海市学徒造反革命委员会，上海革命艺徒造反军第三兵团，"},{"type":"paragraph","text":"上海出版系统革命造反司令部，上海小教革命联合造反总司令部，上海工人造反联"},{"type":"paragraph","text":"合委员会，红卫兵上海革命造反委员会，上海市炮打司令部联合兵团，赤卫军上海"},{"type":"paragraph","text":"市大专院校革命委员会，毛泽东主义红卫兵东北地区指挥部，上海市反到底联络总"},{"type":"paragraph","text":"部，上海工人安亭兵团，上海工人北上返沪第三兵团，民族造反司令部黄浦区指挥"},{"type":"paragraph","text":"部，毛泽东思想红卫兵同济大学东方红总部，上海第一医学院革命造反联合指挥部，"},{"type":"paragraph","text":"上海交通大学革命造反指挥部，上海交通大学反到底兵团，首都红卫兵革命造反总"},{"type":"paragraph","text":"司令部(第三司令部)驻沪联络站，哈尔滨军事工程学院红色造反团驻沪联络站，西"},{"type":"paragraph","text":"安军事电讯工程学院红色造反团驻沪联络站，北京航空学院红旗战斗队驻沪联络"},{"type":"paragraph","text":"站，清华大学井冈山兵团驻沪联络站。"},{"type":"paragraph","text":"一九六七年一月九日1月10日"},{"type":"paragraph","text":"毛泽东对《紧急通告》和《上海革命造反派向资产阶级反动路线发起总攻击》作批示，认为“此两件很好”，要中央文革小组替中共中央、国务院、中央军委起草一个致上海各革命造反团体的贺电，“指出他们的方针、行动是正确的，号召全国党、政、军、民学习上海的经验，一致行动起来。”"},{"type":"paragraph","text":"[按]"},{"type":"paragraph","text":"据叶永烈《王洪文兴衰录》，这份传单是上海工人返沪第二兵团司令耿金章主持，朱永嘉①起草，且得到陈丕显的支持与同意草成的。张春桥当时以为已有《急告全市人民书》，不需再有此《紧急通告》，颇以朱永嘉为多事。王洪文亦因耿之第二兵团与工总司并列而不满。然毛泽东因看中其中反经济主义这一点，大加称许，故一时身价倍增。张、王亦转而攫此以为自己的功绩。"},{"type":"paragraph","text":"《无产阶级文化大革命大事记》：一月上旬，眼看资产阶级反动路线就要完蛋了，一小撮走资派输红了眼，变本加厉地推行反革命经济主义。刘、邓的黑干将，和彭真、林枫结成反党的“桃园三结义”的反革命江湖侠客吕正操此时也跳了出来。他扣压了铁路系统几十个革命组织关于《抓革命，促生产》的呼吁书，却印发了五十万份《告全国旅客书》，要全体乘务员为保卫自己的人身安全而全面组织起来。他煽动乘务员说：“你们能出乘就出乘，不能出乘也是革命行动。”恶毒挑拨乘务员和旅客的关系。他拿出杀手锏，，挑动各地工人罢工，赴京告状，制造铁路中断事故，破坏国民经济。"},{"type":"paragraph","text":"王秉璋操纵下的七机部一时妖风四起，提级加薪，串联补助，停产停工，从去年十二月二十四日起进行了为期十八天的罢工。"},{"type":"paragraph","text":"在农林口谭震林通过水产部党组所属渔业公司各组党委发出了停港进行文化大革命的通知，造成了严重的轮船停港事件。"},{"type":"paragraph","text":"一小撮走资派又把这股黑风刮到农村，妄想把农村作为他们最后一个保垒，负隅顽抗。他们煽动农民和工人、学生的对立情绪，公然说：“他们工人要造你们的反，你们就把反造回来嘛！”使大批受蒙蔽的群众离开农村，涌向城市。在年终分配问题上，他们恶毒地提出“分光、吃光、用光”的“三光”政策，分掉公积金和储备粮，一下子签发了八十万元的“串联费”......想以此挖集体经济的墙脚，搞垮人民公社，破坏无产阶级文化大革命。(第158页)"},{"type":"paragraph","text":"周恩来、陈伯达、康生、江青在人大会堂接见首都高校造反派组织。陈伯达讲话，说陶铸揪出来后，是不是除了陶铸就没有旁的了呢？至少还有个别一、二个吧！江青讲话中说，当前走资派大搞经济主义，破坏文化革命。造反派内把斗争锋芒指向一批有错误、但作了检查、坚持工作的老同志和军队，必须防止。江青在讲话中说：“桃园三结义是彭真、林枫、吕正操反对林彪副统帅的反革命小集团”。(《传信录397》)吕正操家随即被抄。"},{"type":"paragraph","text":"周恩来在中南海对铁路系统院校师生职工讲话，说：“丢开业务，光搞革命，那不是落空了吗？抛弃业务，怎么搞好革命？”(《传信录398》)"},{"type":"paragraph","text":"周恩来、陈伯达、康生、江青、王力、关锋、戚本禹等在人大会堂西小礼堂接见有关单位的造反派代表，介绍上海的经验(反经济主义)。江青说：王震不好。谢富治原是邓小平的部下，但他是第一个揭发邓小平的。(《传信录399》)"},{"type":"paragraph","text":"康生在高级党校大吹他十年来与杨献珍进行的十次原则性斗争。他说：“说刘少奇是全国党内最大的走资本主义道路的当权派，这是你们党校对全国的贡①朱永嘉，原上海复旦大学历史系助教，姚文元秘密起草评吴晗文章时曾帮助提供明史资料，有功。其后就成为上海写作班子中的负责人之一。献。”“刘少奇有一种理论，总起来就是唯生产力论。”(《传信录400》)"},{"type":"paragraph","text":"根据江青的指示，任解放军总政治部副主任的关锋写成了《彻底揭穿军内一小撮走资本主义道路的当权派》的报告，送林彪审批。林彪亲批：“完全同意”。"},{"type":"paragraph","text":"戚本禹对总政文工团部分团员谈话：红卫兵小将查出安子文叛党。这些变节分子叛党的最大组织者就是刘少奇。"},{"type":"paragraph","text":"北京新华书店和运输公司联合行动，在天安门广场火烧所存的刘少奇、邓小平画像。并向全国新华书店发出通告，各地纷纷响应。"},{"type":"paragraph","text":"黑龙江哈尔滨军事工程学院“红色造反团”等组织组成省委和机关接管委员会，进行了夺权。"},{"type":"paragraph","text":"《人民日报》发表北师大红卫兵批判孔子的文章。1月上旬"},{"type":"paragraph","text":"中国科技大学“雄狮”在西单附近贴出《中央文革往何处去？》的大字报。北大附中“红旗”在北大贴出“谁说青山不老？谁说三司不倒？我们就是愚公，定把三司挖倒！”的大标语。在北太平庄出现“敢替谭力夫翻案”的标语。1月11日"},{"type":"paragraph","text":"经毛泽东批准，中央军委发出改组全军文化革命小组的通知。新的全军文革小组成员名单如下：组长徐向前，顾问江青，副组长萧华、杨成武、王新亭、徐立清、关锋、谢镗忠、李曼村。组员王宏坤、余立金、刘华清、唐平铸、胡痴、叶群、王蜂、谷岩、张涛。小组成员名单是由江青拟就的。下设秘书组、简报组、机关组、院校组和联络站。办公地点在三座门。林彪指示，全军文革属军委和中央文革的双重领导，主要是中央文革领导。有事先请示中央文革，再报林彪。"},{"type":"paragraph","text":"徐向前《在文化大革命中》：一月十日，江青派人送来全军文革小组名单及改组军委文革的通知，征求我的意见，并说：中央文革对这个名单也很关心，也想看看，已送他们征求意见。我阅后提出了三条意见：(一)新的全军文革未组成前，是否请中央文革出面，先与各派群众代表座谈，交代一下政策。(二)要讲革命性、科学性、纪律性。军队搞文化大革命，不要党的领导不行。尤其是海军、空军，负担保卫海防空防的任务，要随时准备战斗，指挥失灵不好。现在有些机关干部，要求成立战斗组织，机关如果形成几派，就不好办了。(三)部队中哪些人是牛鬼蛇神，建议在适当范围内讲一讲。北京军区抓了廖汉生，又要抓杨勇、郑维山，空军也把王辉球、成钧、常乾坤抓走。这个问题应该研究解决，否则大家没有底。......十一日，又送来正式通知，全军文革小组名单已经“军委通过，中央批准。”"},{"type":"paragraph","text":"毛泽东委托林彪，在政治局与中央文革出席的会议上讨论通过中共中央、国务院、中央军委、中央文革小组给上海市各革命造反团体的贺电(《人民日报》在12日公开发表)。这个文件将中央文革小组与中共中央等并列，是毛泽东亲自加上的。中央文革小组成了与中共中央、国务院、中央军委并列的权力机构，正式取代了书记处。毛泽东甚至说：古之民，不歌尧之子丹朱而歌舜；今之民，不歌中央书记处而歌中央文革。以后的文件都以类似的形式发布执行。《人民日报》与《红旗》并分别发表社论《无产阶级革命派大联合，夺走资本主义道路当权派的权》、《论无产阶级革命派的夺权斗争》，对上海的夺权表示支持。"},{"type":"paragraph","text":"在此前后，林彪说“无论上层、中层、下层都要夺”。对领导干部“有的关起来，有的戴高帽子，有的抄家”。张春桥说：“无产阶级文化大革命自始至终就是夺权，从基层到中央，党权、政权、财权、文权以及其他权”。“我们对所有的权都要夺。”"},{"type":"paragraph","text":"中共中央、国务院、中央军委、中央文革小组给上海市各革命造反团体的贺电"},{"type":"paragraph","text":"上海工人革命造反总司令部等三十二个革命群众组织："},{"type":"paragraph","text":"你们在一九六七年一月九日发出的《紧急通告》，好得很。你们提出的方针和采取的行动，是完全正确的。"},{"type":"paragraph","text":"你们高举了毛泽东思想伟大红旗。你们是活学活用毛主席著作的模范。"},{"type":"paragraph","text":"你们坚定地站在以毛主席为代表的无产阶级革命路线方面。你们及时地识破了和揭穿了资产阶级反动路线新反扑的阴谋，举行了有力的还击。"},{"type":"paragraph","text":"你们坚持了无产阶级专政，坚持了社会主义的大方向，提出了反对反革命修正主义的经济主义的战斗任务。"},{"type":"paragraph","text":"你们根据毛主席提出的“抓革命，促生产”的方针，制定了正确政策。"},{"type":"paragraph","text":"你们实行了无产阶级革命派组织的大联合，成为团结一切革命力量的核心，把无产阶级专政的命运，把无产阶级文化大革命的命运，把社会主义经济的命运，紧紧掌握在自己的手里。"},{"type":"paragraph","text":"你们这一系列的革命行动，为全国工人阶级和劳动人民，为一切革命群众，树立了光辉的榜样。"},{"type":"paragraph","text":"我们号召全国的党、政、军、民各界，号召全国的工人、农民、革命学生、革命知识分子、革命干部，学习上海市革命造反派的经验，一致行动起来，打退资产阶级反动路线的新反扑，使无产阶级文化大革命，沿着以毛主席为代表的无产阶级革命路线胜利前进。"},{"type":"paragraph","text":"中共中央"},{"type":"paragraph","text":"国务院"},{"type":"paragraph","text":"中央军委"},{"type":"paragraph","text":"中央文革小组"},{"type":"paragraph","text":"一九六七年一月十一日"},{"type":"paragraph","text":"中共中央发布关于反对所谓经济主义的通知。"},{"type":"paragraph","text":"关于反对经济主义的通知"},{"type":"paragraph","text":"中发(67)16号各级党委："},{"type":"paragraph","text":"现在，无产阶级文化大革命正在工矿企业和农村全面地深入地展开。广大工农群众起来斗争党内一小撮走资本主义道路的当权派，批判一切资本主义的和修正主义的东西。形势非常好。但是，有一小撮党内走资本主义道路的当权派，为了破坏无产阶级文化大革命，转移斗争目标，挑动不明真相的少数人大闹经济主义，向无产阶级专政的社会主义国家进行斗争。他们用各种经济收买的手段，企图把一些群众引向经济主义的邪路，不顾国家利益，集体利益，长远利益，单纯追求个人的暂时利益。他们不但要恢复而且要扩大过去关于工资、福利制度中的一些错误措施，他们煽动一些群众要晋级加薪，随便向国家伸手要钱，要物资。他们煽动前几年下放到农村业已参加农业生产的群众，回到城市，提出不合理的经济要求。有些机关、企业、事业单位，不按国家规定，强行到银行提款。地富反坏右分子也乘机妄图扰乱国家经济生活，破坏无产阶级文化大革命。"},{"type":"paragraph","text":"中央认为，必须立即制止这种破坏无产阶级文化大革命的行为，立即制止这种大闹经济主义的倾向。"},{"type":"paragraph","text":"第一，一切革命群众都要提高警惕，用毛泽东思想作武器，说服少数被蒙蔽的群众，揭露一小撮党内走资本主义道路的当权派和地富反坏右分子的阴谋诡计，保护国家财产、保护集体财产，使无产阶级文化大革命遵循毛主席的正确路线前进。"},{"type":"paragraph","text":"第二，在经济问题上，过去有些不合理的东西，中央将在无产阶级文化大革命中进行调查研究，吸收群众的合理意见，提出解决的办法。在中央没有提出新的办法以前，暂不变动。"},{"type":"paragraph","text":"第三，前几年下放农村业已参加农业生产的群众，上山下乡的知识青年，应当安心参加农业生产，参加农村的无产阶级文化大革命。安置工作中的问题，应由各级党委负责逐步加以解决。"},{"type":"paragraph","text":"第四，中央责成各级银行，不论是国家机关、国营企业、事业单位，或者是集体经济单位，所有不符合国家规定的支出，都要一律拒绝支付。"},{"type":"paragraph","text":"第五，集体所有制的企业、手工业合作社、合作商店等等，现在都不要改变为国家所有制。"},{"type":"paragraph","text":"这个文件，应该在工人、农民、学生中普遍宣读，也可以在工厂、农村、学校中张贴。"},{"type":"paragraph","text":"中共中央"},{"type":"paragraph","text":"一九六七年一月十一日"},{"type":"paragraph","text":"中共中央发出文件，禁止“一小撮走资派”煽动工人农民入城，包围银行，强行提款。"},{"type":"paragraph","text":"中共中央文件"},{"type":"paragraph","text":"中发(67)14号各中央局，各大军区，各省、市、自治区党委、人委，并转各级党委、人委、军区、军分区："},{"type":"paragraph","text":"现在有一小撮党内走资本主义道路的当权派，为了破坏无产阶级文化大革命，转移斗争目标，煽动一时被他们蒙蔽的、支持他们的工人、农民和机关干部，大批地脱离生产和工作岗位，到北京来，或者流进大城市、甚至煽动罢工、煽动不明真相的群众，包围银行，强行提款。一切革命同志必须提高警惕，坚决反对这种做法。今后，如果发现有人继续进行这种煽动，应立即受到党纪国法的制裁。各地银行一律由人民解放军和公安部门负责保护。"},{"type":"paragraph","text":"中共中央、国务院、中央军委(发至公社党委、人委)"},{"type":"paragraph","text":"一九六七年一月十一日"},{"type":"paragraph","text":"中共中央、国务院发布《关于制止腐蚀群众组织的通知》，并批示：这个文件，应该在工人、农民、学生中普遍宣读，也可以在工厂、农村、学校中张贴。"},{"type":"paragraph","text":"中共中央"},{"type":"paragraph","text":"一九六七年一月十一日"},{"type":"paragraph","text":"关于制止腐蚀群众组织的通知"},{"type":"paragraph","text":"中发(67)17号"},{"type":"paragraph","text":"根据各地革命群众反映，在无产阶级文化大革命中，有少数的党政负责人，为了抵制革命群众对他们的批判，腐蚀革命群众，最近任意给群众大批金钱物质，他们以“关心”工人、青年“福利”为名，对反对他们的革命群众组织用金钱去笼络，同时又给某些被他们蒙蔽来支持他们的群众组织以特别优厚的物质享受。中央认为，这是一种极端错误的做法，必须坚决制止。"},{"type":"paragraph","text":"一切群众的革命组织，必须发扬艰苦奋斗的作风，严防挥霍浪费，对于某些领导人用经济手段来转移革命人民政治斗争方向的企图，都必须提高警惕，应该使革命群众懂得，干革命最重要的威力无穷的武器是毛泽东思想。如果把注意力集中到物质福利问题上，势必削弱自己的革命斗志，容易为党内一小撮走资本主义道路的当权派所利用。"},{"type":"paragraph","text":"中共中央"},{"type":"paragraph","text":"国务院"},{"type":"paragraph","text":"一九六七年一月十一日"},{"type":"paragraph","text":"中共中央发布《关于广播电台问题的通知》。"},{"type":"paragraph","text":"关于广播电台问题的通知"},{"type":"paragraph","text":"中发(67)18号"},{"type":"paragraph","text":"我们的广播电台是无产阶级专政的重要工具。在无产阶级文化大革命中，革命群众同那些控制广播电台的走资本主义道路当权派进行斗争，是完全正确的，必要的。中央决定，凡是发生这样情况的广播电台，一律由当地人民解放军实行军事管制，停止编辑和播送本地节目，只转播中央广播电台的节目。已经进入广播电台的革命群众，应当立即退出。广播电台中的走资本主义道路的当权派，应当交给群众离开电台去斗争。群众有意见的领导人，应当到群众中去，听取群众的意见和批评。"},{"type":"paragraph","text":"各地广播电台，应当一律使用原来人民广播电台的名称，不要改变。"},{"type":"paragraph","text":"(注：必要时，可在广播电台内部张贴)"},{"type":"paragraph","text":"中共中央"},{"type":"paragraph","text":"一九六七年一月十一日"},{"type":"paragraph","text":"晚，“联动”第六次冲击公安部，“联动”及亲联动分子数千人集聚天安门，向公安部发出最后通牒，要求无条件释放被捕人员，受到镇压。"},{"type":"paragraph","text":"中国科技大学“雄狮”贴出《中央文革向何处去？》、《分歧在哪里？》的大字报，师大附中贴出《严重违反16条的现象——评12月份以来的抓人现象》，攻击中央文革。晚，“雄狮”组织被抄。15日其头目被捕。清华大学连续贴出《康生与总理》、《康生同志，我们怀疑你》等大字报。"},{"type":"paragraph","text":"“捍卫团”头目时传祥、张百发再次被游街示众。"},{"type":"paragraph","text":"揪斗彭真、刘仁、郑天翔、万里大会在北京体育馆召开。"},{"type":"paragraph","text":"上海“红三司”接管上海公安局及各分局。"}],"authors":["周良霄","顾菊英"],"dates":[{"year":2008}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":48,"page_end":56,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"戚本禹","type":"人物"},{"name":"谢富治","type":"人物"},{"name":"康生","type":"人物"},{"name":"江青","type":"人物"},{"name":"陈伯达","type":"人物"},{"name":"陶铸","type":"人物"},{"name":"关锋","type":"人物"},{"name":"邓小平","type":"人物"},{"name":"姚文元","type":"人物"},{"name":"王洪文","type":"人物"},{"name":"贺龙","type":"人物"},{"name":"王力","type":"人物"},{"name":"张春桥","type":"人物"},{"name":"刘志坚","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"彭真","type":"人物"},{"name":"徐向前","type":"人物"},{"name":"中央文革","type":"人物"},{"name":"红卫兵上海市大专院校革命委员会（红革会）","type":"人物"},{"name":"上海市工人革命造反总司令部（工总司）","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"革命委员会","type":"主题/事件"},{"name":"上山下乡","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"400d896fa4"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
