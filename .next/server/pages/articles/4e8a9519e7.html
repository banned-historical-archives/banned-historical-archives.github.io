<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共中央关于反对官僚主义的指示","authors":[],"dates":[{"year":1960,"month":3,"day":30}],"is_range_date":false,"parts":[{"text":"中共中央关于反对官僚主义的指示","type":"title"},{"text":"官僚主义这种旧社会遗留下来的坏作风，一年不用扫帚扫一次，就会春风吹又生了。中央在一九六○年三月下旬根据山东六级干部会议的一期情况简报，批发给你们， 请你们对于人民公社的许多严重情况，提起充分的注意，务必在三、四月间，利用省委召开的六级干部会议和县委接着召开的四级干部会议，对于那些不可允许的， 极端严重的情况，务必彻底地整顿一次，到下半年再整一次。这个文件，谅必你们已经看见了。在这个文件中曾经提到，现在就要利用六级和四级干部大会公开指出三反问题的严重性，提出反贪污、反浪费、反官僚主义的任务。关于三反，中央将在四月上旬有一个规定范围和如何处理各类犯错误分子的指示，发给你们。但你们 不要等候这个文件，而应利用当前正在开或准备开的六级和四级大会立即号召整风，并作曲型调查，使自己心中有数。中央现在所要着重地告诉你们的，是关于官僚 主义严重存在的问题。这里有一个山东省历城县的材料。历城县委在今年三月十四日报告山东省委说：他们那里有积极消极两方面。积极方面是形势大好，这是主要的。消极方面；他们说，突出的表现是五多、五少。就是说，会议多，联系群众少；文件表报多，经验总结少；人们蹲在机关多，认真调查研究少；事务多，学习少；一般号召多，细致地组织工作少。他们这个文件，现在发给你们看看。其中说到会议多和文件表报多，多到什么程度呢?他们说：县委及县委各部门，自今年一月一日到三月十日，七十天中，召开了有各公社党委书记和部门负责人参加的会议，共有一百八十四次，电话会议五十六次，印发文件一千零七十四件，表报五百九十九份。同志们，这种情况是不能继续下去的，物极必反，我们一定要创设条件，使这种官僚主义走向它的反面。历城县已经定出办法，克服五多五少。山东省委已 将历城办法推到全省施行。同志们，这种官僚主义状态，只是存在于历城一个县，或者山东一个省吗?不见得。很可能到处都存在。请你们各自调查一个县、一个市 （在大城市里调查一个区），就可知道底细了。克服五多五少的办法，可以仿照历城办理。这种官僚主义的来源，不能只在县，还在省与中央。关于省（市、自治 区）的方面，请你们注意处理。关于中央方面，我们将采取处理办法。看来一年要对这个五多五少问题谈两次，至少谈一次。中央几年前曾对这个问题发过指示，后来没有再过问（主要指五多中的会议多，文件表报多），自己也有官僚主义，不能只怪别人。本文及附文，应登党刊。","type":"paragraph"}],"comments":[],"origin":"根据中共中央组织部《组织工作文件选编》刊印。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]},{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共中央关于反对官僚主义的指示","authors":[],"dates":[{"year":1960,"month":3,"day":30}],"is_range_date":false,"parts":[{"text":"中共中央关于反对官僚主义的指示","type":"title"},{"text":"官僚主义这种旧社会遗留下来的坏作风，一年不用扫帚扫一次，就会春风吹又生了。中央在一九六○年三月下旬根据山东六级干部会议的一期情况简报，批发给你们，请你们对于人民公社的许多严重情况，提起充分的注意，务必在三、四月间，利用省委召开的六级干部会议和县委接着召开的四级干部会议，对于那些不可允许的，极端严重的情况，务必彻底地整顿一次，到下半年再整一次。这个文件，谅必你们已经看见了。在这个
