script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"不容许用剥削阶级的态度来对待劳动人民","authors":[],"dates":[{"year":1955,"month":9,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"不容许用剥削阶级的态度来对待劳动人民编辑同志："},{"type":"paragraph","text":"一提起浙江省专卖事业公司团支部副书记于莲惠，这个公司的团员就会说：“像这样用剥削阶级态度对待劳动人民的人，怎么能负责培养青年的共产主义道德品质呢？”"},{"type":"paragraph","text":"于莲惠是一个共产党员，她在去年四月生了一个孩子，到今年六月，仅仅一年多一点，已经换了十三个保姆。这些保姆都是受不了她的虐待而被逼走的。"},{"type":"paragraph","text":"只要举出以下几件事情，就可看出于莲惠究竟是怎样对待保姆的了："},{"type":"paragraph","text":"去年夏天，于莲惠每次给小孩喂奶，就叫她当时的保姆王春花打扇，轻了她觉得不够凉快，重了她又谩骂“他妈的，风扇到嘴里去了”。晚上于莲惠已入梦乡，而保姆在深夜光景还必须替小孩打扇，赶蚊子……。后来王春花脸上生了一个小疮，于莲惠不但没有给她治疗，反而借口“要传染”将她赶走了。在冬季，于莲惠却要保姆每天早晨洗冷水脸。保姆提出不习惯，于莲惠脸一沉说：“你要热水洗脸，自己去买，我可没有钱给你买热水。”于莲惠还有这样一个规定：她同她妹妹换下来的衣服，保姆必须当时就洗好。有一个星期天，换下的衣服太多了，到十时左右还洗不完，保姆提出等吃完早饭再洗。这时于莲惠刚起床，就很不满意地说：“我有小孩吃奶，肚子还没饿，你为什么会饿呢？……”非得让保姆洗完再吃饭不可。"},{"type":"paragraph","text":"更严重的是，于莲惠对逼走的保姆还克扣工资，因此有个保姆就到小菜场去跟旁人说：“省专卖公司里有个女党员，剥削穷人劳动，给她做工作不给钱。”前些日子一个保姆做了十三天的工作就被逼走了，于莲惠没有给足工资。保姆再三索讨，于莲惠始终不给。因此两人吵了起来，一直闹到公司领导同志面前，领导同志找她谈话，她反说保姆诬赖她。最后保姆找人来对证，她才无话可说，把钱往地下一丢，破口大骂，还不知羞耻地要保姆“把影响给挽回过来”。"},{"type":"paragraph","text":"于莲惠虐待保姆引起了大家的义愤，因此人民监察通讯员把这些事情向领导方面反映了。于莲惠知道后大为不满，把他找来质问说：“你入党是我介绍的，为什么对我有意见不直接提出来却向领导上反映？……”于莲惠还常常向对她提意见的人说：“我是个党员，革命多年，难道道理我不知道，就是你们晓得？……。”难道这就是她虐待保姆和不接受别人意见的资本吗？"},{"type":"paragraph","text":"我们要正告于莲惠，用剥削阶级思想对待劳动人民的恶劣态度是同革命工作人员和共产党员的光荣称号不相容的。我们要求公司党组织给于莲惠以适当的处分。"},{"type":"paragraph","text":"中国专卖事业公司浙江省公司几个团员"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b793d62e33"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
