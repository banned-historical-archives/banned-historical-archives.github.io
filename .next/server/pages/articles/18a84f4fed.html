script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"高行农校同学通过具体事实认清资产阶级的丑恶面貌　决心搞好思想改造学习","authors":["陆银虎"],"dates":[{"year":1952,"month":3,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编辑同志:最近我们揭发了一件资产阶级向学校进攻的无耻卑鄙的行为，使同学们进一步认识到资产阶级是如何猖狂的向人民内部进攻。事情的经过是这样的:"},{"type":"paragraph","text":"最近我们学校里的米吃完了，合作社因为进行三反学习暂停营业，我们就向浦东东沟乡元泰昌米店买米。但是这家米店在五反运动中还是贪图暴利，不管同学们的身体健康，拿很坏的供酿制用的米卖给同学吃，而且米内夹着大量砂石。同学们简直没有办法用口嚼，只好囫囵吞下去，既不容易消化，也容易生盲肠炎，同学们都非常愤怒。经过数次向米店交涉后，不法商人才低头认罪，赔出暴利的钱，并公开悔改认错。通过这事件，使广大同学认识到资产阶级的丑恶嘴脸，纠正了过去认为“五反是工商界的事和学生没有关系”的错误观点。因此大家表示决心搞好以三反、五反斗争为中心的思想改造学习运动。"},{"type":"paragraph","text":"上海市立高行农校学生　陆银虎"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"18a84f4fed"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
