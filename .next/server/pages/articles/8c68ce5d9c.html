script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反贪污浪费反官僚主义新闻影片  揭露了资产阶级的猖狂进攻——读者来信综述","authors":[],"dates":[{"year":1952,"month":3,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反贪污浪费反官僚主义新闻影片"},{"type":"paragraph","text":"揭露了资产阶级的猖狂进攻"},{"type":"paragraph","text":"——读者来信综述"},{"type":"paragraph","text":"自“反贪污、反浪费、反官僚主义运动的新闻特辑”影片第一、二辑放映后，本报曾接到北京市读者郎需才、中国盐业公司祁瑞生、铁道部建筑工程处电灯工人袁景田等的来信，这些来信热烈欢迎这些影片。他们在第一辑里看到了首都人民在反贪污运动中积极斗争的概况，在第二辑里看到了大贪污犯薛昆山和宋德贵的可耻下场，看到政府对于坦白彻底并戴罪检举别人的杭效祖、夏茂如宽大处理的情况。他们说，这些都深刻地教育了自己和观众，使大家在思想上更加清楚地认识了资产阶级对工人阶级进攻的猖狂性。祁瑞生的来信中说：“当观众看到奸商刘元敬等在某地军事工程上偷工减料、以少报多、以坏顶好、使国家遭受到严重损失的罪恶时，莫不切齿痛恨。”他激愤地说：“看吧，房基下沉了，房顶漏水了，墙壁裂开了……奸商们是多么卑鄙无耻啊！这部影片是对大奸商最有力的控诉！”看完这个影片后，一个老大娘对祁瑞生说：“这次我才知道奸商真可恶，新盖的房子就要塌了，实在丧尽天良啦，政府不严惩，就无法无天了。”有的人看过这些影片后，就动员别人去看。袁景田的信中说：“今天我们这里放映了反贪污新闻特辑影片，这对贪污分子是一种很大的教育，可以帮助贪污分子从火坑里爬出来。”他希望能够普遍地放映这些影片，以推动运动的进展。有的看完第二辑后，赞颂人民政府处理贪污分子的政策是正确的，给贪污分子指出了一条光明大道——只有彻底坦白才是活路。否则，必将加重处分。"},{"type":"paragraph","text":"读者们一致希望继续用电影的形象反映这一伟大的斗争。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8c68ce5d9c"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
