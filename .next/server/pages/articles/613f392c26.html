" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji19","name":"毛泽东全集第19卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji19.pdf"],"article":{"title":"给萧三“的信","alias":"","parts":[{"type":"paragraph","text":"给萧三的信"},{"type":"paragraph","text":"（1945年2月22日）萧三同志："},{"type":"paragraph","text":"你的《第一步》，写得很好。你的态度，大不同于初到延安那儿年了，文章诚实，恳切，生动有力。当然，从前你的文章也是好的，但是现在更好了，我读这些文章，很得益处。"},{"type":"paragraph","text":"为着使延安文艺工作同志们多参加群众性的集会，须关照高岗、贾拓夫、谭政、罗迈、李富春、彭真3几位同志，遇有这类会议不要忘记组织文艺同志们去参加。此事请你访他们去谈谈，我有机会也将告诉他们。今年全边区性的大会少开，但地方性的，延市、延安县和延属分区的，必有许多，同县、市、分区的负责同志"},{"type":"paragraph","text":"[1]萧三（1896—1983)，湖南湘乡人。1939年从苏联回到延安。当时任陕甘宁边区文化协会常委。"},{"type":"paragraph","text":"[2]指萧三在1945年2月20日《解放日报》发表的文章《第一步一从参加边区参议会及劳模大会归来》。"},{"type":"paragraph","text":"[3]高岗，当时任中共中央西北局书记。贾拓夫（1912—1967)，陕西神木人，当时任中共中央西北局秘书长。谭政（1907－1988)，湖南湘乡人，当时任八路军陕甘宁晋绥联防军副政治委员兼政治部主任。罗迈，即李维汉，当时任陕甘宁边区政府秘书长。李富春（1900—1975），湖南长沙人，当时任中共中央副秘书长。彭真，当时任中共中央组织部代理部长。及宣传部讲通此事，也很必要，可否也请你去谈一下？"},{"type":"paragraph","text":"同志的敬礼！"},{"type":"paragraph","text":"毛泽东二月廿二日你的素一乐"},{"type":"paragraph","text":"无辉东一时毛泽东致萧三信的手稿。"}],"authors":["毛泽东"],"dates":[{"year":1945,"month":2,"day":22}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":340,"page_end":342},"tags":[{"name":"李富春","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"彭真","type":"人物"},{"name":"高岗","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"613f392c26"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
