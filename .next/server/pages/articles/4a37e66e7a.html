script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"开展反对资产阶级自由化正面教育  空军军以上干部联系实际学习理论","authors":["蔡善武"],"dates":[{"year":1987,"month":3,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"开展反对资产阶级自由化正面教育"},{"type":"paragraph","text":"空军军以上干部联系实际学习理论"},{"type":"paragraph","text":"据新华社北京3月20日电  （记者蔡善武）参加空军军以上干部读书班的各级领导干部，以坚持四项基本原则、反对资产阶级自由化为主题，认真学习理论和党的方针政策，既提高自己，又为指导部队开展正面教育作了准备。"},{"type":"paragraph","text":"在读书班里，他们围绕全面、正确地理解党的十一届三中全会以来的路线的基本点和加强新时期部队政治工作这两个专题，从四个方面进行学习和研究：一是系统学习十一届三中全会以来党中央的有关文件和邓小平同志关于坚持四项基本原则、反对资产阶级自由化的一系列重要论述，增强贯彻执行党的路线、方针、政策的自觉性和坚定性；二是分析批驳资产阶级自由化的错误言论，弄清重大政治原则问题的是非界限，增强识别和抵制资产阶级自由化思潮的能力；三是研究如何搞好部队正面教育，进一步明确教育的指导思想、步骤、重点、政策和方法；四是通过集体学习、讨论，撰写出一批理论体会文章。"},{"type":"paragraph","text":"读书班还把部队在开展正面教育中提出的"},{"type":"paragraph","text":"问题归纳成20多个题目，组织大家边学边议边解答，集思广益，最后编写出《坚持四项基本原则、反对资产阶级自由化的问题解答要点》。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4a37e66e7a"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
