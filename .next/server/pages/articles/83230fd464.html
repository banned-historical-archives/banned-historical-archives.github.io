script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"祝贺罗马尼亚解放十周年  毛泽东主席致格罗查主席电","authors":["毛泽东"],"dates":[{"year":1954,"month":8,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"祝贺罗马尼亚解放十周年"},{"type":"paragraph","text":"毛泽东主席致格罗查主席电"},{"type":"paragraph","text":"罗马尼亚人民共和国国民议会主席团主席格罗查同志："},{"type":"paragraph","text":"值此罗马尼亚解放十周年之际，我代表中华人民共和国政府和人民并以我个人名义向罗马尼亚人民和您致以衷心的祝贺。"},{"type":"paragraph","text":"十年来，罗马尼亚人民在罗马尼亚工人党的领导下，在巩固人民民主政权和建设社会主义方面已获得辉煌的成就。这些成就使罗马尼亚人民获得日益繁荣幸福的生活，并加强了以苏联为首的世界和平民主力量。中国人民谨祝罗马尼亚人民在建设社会主义和维护世界和平的事业中获得更大的成就。"},{"type":"paragraph","text":"毛泽东  一九五四年八月二十一日北京"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"83230fd464"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
