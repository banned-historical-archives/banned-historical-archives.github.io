<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"苏修社会帝国主义依靠武力进行残酷剥削  捷克斯洛伐克沦为苏修掠夺和倾销的市场  苏修变本加厉的压榨激起捷克斯洛伐克人民强烈愤怒，许多工人拒绝为苏修订货生产，拒绝为苏修占领军工作","authors":[],"dates":[{"year":1969,"month":9,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"苏修社会帝国主义依靠武力进行残酷剥削"},{"type":"paragraph","text":"捷克斯洛伐克沦为苏修掠夺和倾销的市场"},{"type":"paragraph","text":"苏修变本加厉的压榨激起捷克斯洛伐克人民强烈愤怒，许多工人拒绝为苏修订货生产，拒绝为苏修占领军工作"},{"type":"paragraph","text":"新华社十五日讯　布拉格消息：苏修社会帝国主义在武装占领捷克斯洛伐克以后，依靠武力对捷克斯洛伐克加紧进行野蛮的经济掠夺，使捷克斯洛伐克经济陷于更加深刻的危机，广大劳动人民生活遭到越来越严重的困难。"},{"type":"paragraph","text":"长期以来，苏修叛徒集团通过“经互会”这个殖民工具对捷克斯洛伐克进行了残酷剥削。在武装侵占捷克斯洛伐克后，苏修采取了更赤裸裸的强盗手法，派遣大批所谓“专家”直接控制了捷克斯洛伐克的经济部门，强行改组捷克斯洛伐克的经济结构，使之更符合于它的经济掠夺的需要。"},{"type":"paragraph","text":"苏修变本加厉地把捷克斯洛伐克变成它掠夺和倾销的市场。苏修从捷克斯洛伐克掠夺了大量的财富，使捷克斯洛伐克对苏联的出口量大大超过从苏联的进口量。但结果是，这些捷克斯洛伐克人民的财富都变成了记在苏联账上的不能兑换的卢布，而捷克斯洛伐克又不能从苏联进口它所急需的商品。"},{"type":"paragraph","text":"相反，苏修又投机取巧，劣货贵卖，把它没有人要的低劣产品强行倾销给捷克斯洛伐克，使捷克斯洛伐克人民遭到巨大的损失。例如，苏修卖给的石油质量极差，而捷克斯洛伐克不得不花很多钱加修一些设备来加工这些石油。又如，苏修冬季交付的矿物都盖满了雪和冰，货车重量随之增加。但是苏修却蛮横无理地拒绝把雪和冰的重量去掉，结果这些雪和冰也按照矿物的价格卖给了捷克斯洛伐克。同时，苏修对从捷克斯洛伐克进口的货物却苛刻挑剔，任意勒索。据报道，苏修的一些“接收委员会”对于从捷克斯洛伐克进口的货物经常吹毛求疵，拒绝接受全部交付的货物，随后又强迫捷克斯洛伐克的有关企业进行赔偿。"},{"type":"paragraph","text":"苏修对捷克斯洛伐克经济上的巧取豪夺，使捷克斯洛伐克的经济状况进一步恶化，生产普遍下降，工业停滞，供销失调，物价上涨，通货膨胀，从而严重地影响了广大劳动人民的生活。"},{"type":"paragraph","text":"据报道，目前捷克斯洛伐克的市场供应，出现了严重的困难。一些地区几个星期见不到一点肉，土豆也没有。一些地区不得不把留种的土豆都吃了。最大的食品店和商店有时整整一个星期没有任何食品和商品可以供应。连捷修《红色权利报》也供认，商店“货架上空无一物，许多商品的储备已达到了危险点”。捷修为了缓和经济困难，曾于今年五月全面提高物价，提高的总额一次就达四十八亿克朗（捷币）之多。"},{"type":"paragraph","text":"在这种严重的情况下，捷修头目不得不供认，目前捷克斯洛伐克的经济状况“极其困难”，“经济不平衡的情况在不断加深”。捷修联邦经济委员会也供认，今年上半年捷克斯洛伐克的经济情况明显地没有达到预定的指标，工业生产“最明显的停滞表现在建筑、纺织、服装、制革和木材加工工业方面”。这个委员会还供认，在农村，播种面积缩小了，牲畜的总数也减少了。苏修对捷克斯洛伐克的掠夺和剥削，完全拆穿了它所谓“保卫”“社会主义大家庭利益”的谎言。"},{"type":"paragraph","text":"苏修的残酷压迫和掠夺，激起了捷克斯洛伐克人民日益强烈的愤怒和反抗。在捷克斯洛伐克的许多地方，工人的罢工和怠工运动此伏彼起。工人们拒绝为苏修的订货生产，拒绝为苏修占领军工作。在许多城市里，居民忍无可忍狠揍横行霸道的苏修占领军的事件也不断发生。这些都充分反映了具有光荣革命传统的捷克斯洛伐克人民对苏修法西斯强盗的无比憎恨和誓把俄国豺狼赶出自己家园的决心。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b2b59cf42f"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
