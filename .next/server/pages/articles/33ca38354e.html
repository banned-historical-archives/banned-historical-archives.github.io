script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"失业工人一千余人痛斥资产阶级恩将仇报的罪恶","authors":[],"dates":[{"year":1952,"month":3,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编辑同志:我们是失业工人南区中心夜校的工作同志和学员，我们从亲身的经历和报上所揭露的事实中，完全认清了资产阶级的丑恶面貌，我们实在恨之入骨。资产阶级无孔不入地向共产党、人民政府和志愿军、解放军进攻。我们想想看，中国人民多少年来流血牺牲、艰苦斗争是为了什么呢?今天我们英雄的人民志愿军在朝鲜前线英勇作战、后方千百万人民忘我地辛勤劳动，是为了什么呢?难道不都是为了把我们伟大祖国从国内外反动派的压迫下解放出来吗?难道不都是为了把我们伟大祖国建设得繁荣、富强、独立、幸福吗?但是资产阶级五毒俱全，直接破坏了国家的建设和人民的胜利果实，并想扭转我们中国社会发展的方向，把新民主主义社会拖到没落的资本主义道路上去。"},{"type":"paragraph","text":"我们一千多失业工人来自各个不同的产业。过去当资本家遭遇到了美蒋匪帮封锁、轰炸所引起的困难时，我们顾全大局，牺牲自己的利益，从原有企业部门中退了出来。但资产阶级回答我们的是什么呢?他们不知天高地厚，扰乱国家经济，哄抬物价，投机倒把，兴风作浪，又使我们许多工人失去了工作。这种恩将仇报、寡廉鲜耻的罪恶难道是可以容忍的吗?我们忍让牺牲，难道还再能容忍他们得寸进尺、破坏我们工人阶级所领导的民主政权吗?"},{"type":"paragraph","text":"今天我们实在忍无可忍，我们一定要以最大的决心和力量来揭露资产阶级腐臭的面貌，进而摧毁资产阶级反动顽劣的堡垒!"},{"type":"paragraph","text":"失业工人南区中心夜校全体学员职工"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"33ca38354e"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
