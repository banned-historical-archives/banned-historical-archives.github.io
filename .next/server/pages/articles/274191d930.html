<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"重庆市委关于区、县四级干部会议情况简报（二号）","authors":[],"dates":[{"year":1959,"month":3,"day":26}],"is_range_date":false,"parts":[{"text":"重庆市委关于区、县四级干部会议情况简报（二号）","type":"title"},{"text":"（上缺）","type":"paragraph"},{"text":"3，粮食问题，这在三个县更突出些。较普遍的是隐瞒产量。綦江隆盛公社隆盛管理区，开初出席会议的干部只报现有谷子27000斤，红苕30万斤，现在自动报出口粮有细粮123，544斤，红苕726，000斤。该县永新公社罗家管理区永久大队，会议开始时，只报现在谷子6千斤，后来又报有3万斤。","type":"paragraph"},{"text":"4，干部作风问题，揭发出个别干部作风粗暴恶劣，违法乱纪。如长寿葛兰公社一个管理区的分支书记曾将该管理区70多人组织成强制队（强迫劳动）对下面的队长罚跪打屁股，对社员实行封门，不给饭吃。该管区1500多个社团，就外逃了230多人，占15%左右。巴县接龙公社石龙滩管理区总支书记周光熙和一个女人通奸，并将揭发他的人捆起，由总支书记杨永康召有18个党员在场的说：“墙这样高，不能进去”，为之包庇并企图证明揭发的人是污告。","type":"paragraph"},{"text":"会议所鸣放的问题除以上外，观潮派、算账派随着会议温度的增长也乘机站了起来，有的气势汹汹。这一类占到会人数5%左右，并有1——2%是反党、反社会主义分子，在鸣放中拍桌子大骂，攻击党，攻击人民公社。綦江三角公社罗兴耕区一付主任说：“共产党是穿山甲吃大虫蚂蚁，有好多，吃好多。”巴县虎溪公社虎溪管理区陈万发说：“我修了几百年的道，这一神枪棍给打脱了，公社拿了我2万多元去，发工资才一万多元，整得我倾家荡产。多劳多得，我看是多劳丧德”。","type":"paragraph"},{"text":"在会议中，也进一步暴露出落后村（队）的情况。在近郊区约占1%左右，三个县大约5%左右。这其中有的甚至为反革命控制了领导，在这些村中有如下几种情况","type":"paragraph"},{"text":"（1）支部领导被坏分子控制，并有反革命现行活动。如綦江三角公社中和村支部书记黄达相被反革命分子王应南（国民党员、土匪）收买拉拢后，夺取了生产队长职务，排挤打击了我们的粮食保管员唐树清（支部委员）将他的弟弟王应战（坏分子）担任粮食保管员，王仲文（他父亲是15年的伪保长，解放后，组织过暴动，打过人民政府）任统计员，王吉犹（他父亲当过15年的伪保长）任会计，组织贪污集团，先后盗窃国家粮食款845元、社的存款160元，造谣惑众，进行反革命宣传活动：“美国已将导弹运到台湾，大战要暴发了”。又如巴县白市驿公社生产队长王生云，曾任伪保队付，拉过壮丁，当过把头，在公社中挑拨社员与公社的关系，贪污舞弊，抗拒统购统销政策。","type":"paragraph"},{"text":"（2）领导优势在富裕中农手里，如巴县虎溪公社共和中队六个干部中，老上中农有4个，占66%。有的领导干部本质好，能力弱，担不起来，如巴县虎溪公社仁合中队六个主要干部都是贫农，程银辉（支书）、王炳福（党员）工作积极，但能力弱，办法少，生产搞不起来。另外还有一种情况，领导成分并不坏，但思想落后，工作消极，村的工作落后。","type":"paragraph"}],"comments":[],"origin":"四川省某档案馆","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"274191d930"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
