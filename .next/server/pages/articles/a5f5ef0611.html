script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"哥伦比亚共青联盟中央马列主义成员开会通过决议谴责哥共中央领导机构的修正主义路线 宣布成立哥伦比亚的共产主义青年联盟号召青年展开革命斗争夺取政权走向社会主义","authors":[],"dates":[{"year":1964,"month":4,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【北京25日电】波哥大消息:哥伦比亚共产主义青年联盟中央委员会的马克思列宁主义的成员在二月间举行的共青联盟第五次中央全会上谴责了领导共产主义青年联盟的哥伦比亚共产党中央领导机构的修正主义路线。马克思列宁主义的中央委员在这次会议发生分裂之后单独继续开会，并宣布成立哥伦比亚的共产主义青年联盟。"},{"type":"paragraph","text":"会议通过决议，谴责哥伦比亚共产党中央对马克思列宁主义原则的右倾的修正。决议说，它不提出夺取政权的基本战略目的，歪曲国家现实，制造幻想，假造在资产阶级统治下改善人民处境的可能性，在无产阶级斗争中采取经济主义和改良主义的政策。"},{"type":"paragraph","text":"决议号召哥伦比亚青年开展革命斗争，通过一次爱国、人民和反帝革命来夺取政权，走向社会主义。决议说，要进行准备和组织工作，把劳动群众引向他们的基本的目标——夺取政权。决议还决定不参加欺骗人民的下届选举。"},{"type":"paragraph","text":"决议谴责有人正在利用与革命组织不相容的手段，如系统地破坏内部民主和民主集中制，采取说谎、诬蔑和告密的手法，其目的是阻止哥伦比亚的共产主义青年联盟的发展。"},{"type":"paragraph","text":"决议还决定要清除哥共中央领导人所强加的宗教制裁式的手段。决议说，这种手段阻碍这个组织的全体成员自由地研究反映对国际共产主义运动的战略和策略的不同意见的材料，造成这种限制是为了阻碍思想的发展和思想斗争，阻止在党和青年联盟内对领导的机会主义和尾巴主义的立场进行必要的辩论，以致不能最好地有助于在尊重马克思列宁主义原则的基础上解决这些分歧。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a5f5ef0611"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
