" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"蔡衍吉是章记毒品贩卖者","authors":[],"dates":[{"year":1957,"month":10,"day":7}],"is_range_date":false,"parts":[{"text":"蔡衍吉是章记毒品贩卖者","type":"title"},{"text":"厦门市工商界揪出一个人们称之为章乃器毒品的贩卖者、福建省工商联副主委兼厦门市工商联主委、厦门市副市长右派分子蔡衍吉。","type":"paragraph"},{"text":"蔡衍吉极力对工人阶级施以诋毁和攻击。他说：厦门的工人阶级比资本家还坏。工人阶级有两面性，比资本家更落后。工人根本没有资格领导资本家。蔡衍吉还主张在合营企业中不要提公私关系，而应强调共事关系。","type":"paragraph"},{"text":"蔡衍吉对三大改造政策多方进行诬蔑。他说农业合作社没有优越性；粮食统购统销搞得农民没饭吃；手工业合作化是“一团糟”；四马分肥政策是“四马分肥一马瘦（指资产阶级）”；国营企业办不好，“一文钱不值”。蔡衍吉大肆攻击肃反运动，到处搜集点火材料；扬言要和法院“清算”。他说“民主人士要做梁山泊上的黑旋风李逵抡起双斧，不要做大观园中的林黛玉寄人篱下。”煽动别人向党进攻。蔡衍吉还嚣张地威胁揭发他的人。这一切更加暴露了蔡衍吉的反动面目，使得广大群众更加愤慨，一致和他进行坚决斗争。","type":"paragraph"},{"text":" ——原载《人民日报》1957年10月7日。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2070e83dd8"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
