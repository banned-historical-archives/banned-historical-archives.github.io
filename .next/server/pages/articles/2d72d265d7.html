" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"毛泽东转发华东军区党委关于大张旗鼓开展三反斗争的指示的批语","authors":["毛泽东"],"dates":[{"year":1951,"month":12,"day":30}],"is_range_date":false,"parts":[{"text":"毛泽东转发华东军区党委关于大张旗鼓开展三反斗争的指示的批语","type":"title"},{"text":"毛泽东","type":"authors"},{"text":"各大军区，志愿军并告各中央局：","type":"appellation"},{"text":"（一）批准华东军区党委十二月二十八日关于大张旗鼓开展反贪污反浪费反官僚主义斗争的指示，认为这个指示是完全正确的。（二）将这个指示发给各大军区及志愿军，并转发所属各级军区一律仿照办理。必须这样做才能取得主动，否则就会使自己陷入被动。华东军区在过去一段时间内有些被动，但现在已完全主动了。（三）批准华东军区党委会关于所属各部推迟报告时间的请求，只要团以上各级负责同志下定决心结合整编工作有力地深刻地发动三反斗争，第一次报告推迟至一月底是可以的。（四）将华东军区党委十二月二十八日的指示在党内刊物上发表，使广大干部都能阅读。","type":"paragraph"},{"text":" 毛泽东一九五一年十二月三十日","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2d72d265d7"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
