script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"关贵武在民盟省委邀请哈市高等学校的盟员座谈会上的发言","authors":["关贵武","哈尔滨师范学院"],"dates":[{"year":1957,"month":5,"day":21}],"is_range_date":false,"parts":[{"text":"关贵武在民盟省委邀请哈市高等学校的盟员座谈会上的发言","type":"title"},{"text":"哈尔滨师范学院关贵武","type":"authors"},{"text":"（关贵武：民盟省委宣传部长、哈尔滨师范学院讲师）","type":"subtitle"},{"text":"5月21日在民盟省委邀请哈市高等学校的盟员座谈会上的发言","type":"subtitle"},{"text":"某些学校党组织，在干部工作上有“清一色”的宗派主义情绪。去年周总理就曾经说过中央将要增加一些党外部长级的干部，后来真的增加了；本省也有王清正被选为副省长等实例；可是在师范学院不是这样，院长、处长级干部都是党员，党外的人一个也没有，一些党员同志存在严重的宗派主义，似乎只有党员是可靠的、可信的，其它人均被排斥在学院领导工作之外，院、处领导同志没有一个自己教课的。","type":"paragraph"},{"text":"墙是有的。有钢骨水泥的，有泥土的，有高的，也有矮的。当年筑墙出过力的人，今天应当主动地动手把墙拆掉，我担心这次整风会不会刮一阵风就过去了，对其结局不托底，希望这次和风细雨，能下得深、透，滋润的好。","type":"paragraph"},{"text":"党的“长期共存，互相监督”方针，中央贯彻的比较好，省里就差一些，市、县以至各基层更差。许多党员对民主党派的性质、任务了解得很渺茫，对统战方针、政策不积极贯彻，好像这是专门为民主党派人士制定的，因此也就使个别党外人士怀疑：“长期共存，互相监督”是一个永久不变的方针呢，还是一个临时性的，是否拿我们当作民主的点缀。他希望党组织对共产党员加强这一政策的思想教育，将统战政策真正能够从上而下的贯彻到底。","type":"paragraph"},{"text":" （5月25日黑龙江日报）","type":"paragraph"}],"comments":[],"origin":"《鸣放言论（二）》（哈尔滨：“学习生活”编辑室编，1957年7月10日）。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"96da4fa941"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
