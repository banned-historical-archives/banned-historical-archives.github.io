script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反对剥削和掠夺　要求生存权利南朝鲜各阶层人民不断展开斗争","authors":[],"dates":[{"year":1963,"month":4,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社平壤1日电】　据朝鲜中央通讯社援引南朝鲜报纸的消息报道，南朝鲜各阶层人民近来不断展开反剥削、反掠夺斗争，要求生存权利。"},{"type":"paragraph","text":"南朝鲜的《东亚日报》说，京畿道庆泽郡的一千多农户最近再次向美国侵略军和朴正熙军事集团提出要求，要他们赔偿几年以前为建立军用机场而被征用的住宅和一百八十多公顷农田。"},{"type":"paragraph","text":"汉城的《韩国日报》报道，汉城东国建筑公司雇用的二十名工人及全罗南道光州的协信建筑公司雇用的七十多名工人，进行了要求付清积欠工资的斗争。"},{"type":"paragraph","text":"南朝鲜地方报纸《釜山日报》最近报道，釜山田泡哃中学的五百多名学生反对增加学费。他们不去听课，对军事当局自本学年开始采取把学费和基本膳宿费增加二倍的新措施表示愤慨。"},{"type":"paragraph","text":"据《釜山日报》不久前还报道，庆尚南道的“大陆化肥公司”雇用的八十多名工人最近举行了静坐罢工，要求立即付给积欠的工资。他们把工厂的机器和铁管搬出来，并且表示:如果不付给他们工资，他们将卖掉工厂的财产。"},{"type":"paragraph","text":"南朝鲜《经济新报》报道，由南朝鲜军事政权经营的“蔚山造纸公司”雇用的三十多名工人正在进行斗争，要求立即付给总数达三万圆(南朝鲜伪币)的积欠工资。报道说，自去年10月以来，这个公司就一直没有付给他们工资。他们决心继续进行斗争直到他们的要求得到满足为止。"},{"type":"paragraph","text":"南朝鲜《中南日报》也报道，全罗北道南原郡的约四百名农民正在抗拒朴正熙军事当局强加的非法的用水费。军事当局在农事季节中不给一滴水，而每年却要向农民征收一笔巨大的用水费。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5a8640f5a6"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
