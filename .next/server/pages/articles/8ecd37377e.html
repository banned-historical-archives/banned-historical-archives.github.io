" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"南洋中学同学提高警惕认清了葛匪鲤庭的罪行","authors":["谢宜鹏"],"dates":[{"year":1951,"month":5,"day":13}],"is_range_date":false,"parts":[{"text":"南洋中学同学提高警惕认清了葛匪鲤庭的罪行","type":"title"},{"text":"谢宜鹏","type":"authors"},{"text":"【文汇报讯】 隐藏在南洋中学高一国文教师葛匪鲤庭，平常在校中表现进步、积极，参加教工会、学习研究班。当中华人民共和国惩治反革命条例公布时，他还叫同学们多多研究、学习。在课室上讲解斯大林对真理报记者谈话等。并且考试分数打得很宽，所以他在同学们中印象很好。在四月廿七日，人民政府逮捕大批反革命分子，他也同时被捕。当消息传到校中，即引起许多同学(尤以高一)的反应说:‘他很老实，规规矩矩，怕政府捉错了?’虽经宣传部用黑板报、大字报解释，但同学们还消除不了这一顾虑。五月十日，学生会发动五十余位学生代表，出席听取了陈南如同志控诉反革命分子葛鲤庭罪行大会。并在昨日上午由各班级代表再进行传达。当代表把葛匪鲤庭过去担任国民党高级职务，骑在教师、工友头上作威作福，同时压迫、逮捕进步教师、工友等一切罪行揭发后，同学们才一齐说:‘原来是一个这样坏的反革命分子，’‘人民政府抓得对，应严厉镇压他!’通过这次传达大会，同学们批判了自己警惕性不高。如高一甲石荣棣同学说:‘我本来认为葛鲤庭是一个好人，怕政府捉错了；但现在我认识了，反革命分子进行活动的样式是很多的，他往往会装成很进步、积极，来进行阴谋活动，所以我今后一定提高警惕。政府是抓得对，不会抓错的。’为了更好联系实际，大张旗鼓镇压反革命，发动群众参加，校中发动了七十余位同学，定今日出动向附近居民进行宣传。","type":"paragraph"}],"comments":[],"origin":"《文汇报》1951年5月13日","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8ecd37377e"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
