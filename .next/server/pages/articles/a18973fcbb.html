<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"继续肃清极左流毒，解放思想  丹东造纸厂联系本厂实际，深入开展真理标准问题的讨论，澄清了是非，落实了政策，促进了生产的发展","authors":[],"dates":[{"year":1979,"month":9,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"继续肃清极左流毒，解放思想"},{"type":"paragraph","text":"丹东造纸厂联系本厂实际，深入开展真理标准问题的讨论，澄清了是非，落实了政策，促进了生产的发展"},{"type":"paragraph","text":"据新华社沈阳九月六日电  丹东造纸厂通过开展“实践是检验真理标准”的讨论，解除了部分职工头脑中长期存在的“文化大革命中批判过的不能翻”的这条戒律。如今，这个厂已经把在文化大革命中被错误批判和处理的、有真才实学的干部和技术人员，大胆地提拔到了领导岗位上。文化大革命中被错误否定的合理规章制度，也重新恢复起来了。装卸队中断十多年的计件工资制，又实行起来了。"},{"type":"paragraph","text":"这些措施，得到了全厂大部分职工的拥护，但是也遭到一些人的非议。有那么一部分人总认为，凡是文化大革命中被批判过的人也好，事也好，规章制度也好，都是“定了案”的，都不能平反；一旦平反，他们就抵触，就不通，认为这就是“复辟”、“倒退”。对于那些落实政策后重新安排到领导岗位的干部，有些人内心总是不大服气，工作中有时不大听指挥。而一些干部和技术人员则由于部分群众看不起自己，总感到心有余悸，不敢大胆工作。"},{"type":"paragraph","text":"这种情况，使厂党委感到，林彪、“四人帮”推行的极左路线的流毒，还在禁锢着许多人的头脑。如果不从思想上解决问题，就要影响团结，影响一些人积极性的发挥，企业整顿也就无从谈起。"},{"type":"paragraph","text":"为此，厂党委先组织中层干部，然后发动全厂职工，紧密结合本厂实际，开展实践是检验真理的标准的讨论。大家摆事实，讲道理，各抒己见，澄清了是非，统一了认识。大家在讨论中指出，衡量一个人、一项规章制度是好是坏，是正确是错误，标准只有一个，那就是实践。绝不能把在文化大革命中是否被批判过，作为依据。有的同志说，文化大革命中由于林彪、"},{"type":"paragraph","text":"“四人帮”的捣乱破坏，许多问题的是非被颠倒了。多年来明明被实践证明是正确和有效的规章制度，被全盘否定。大批长期忠于革命事业的干部、技术人员，遭到无情批判，残酷斗争。这个厂在文化大革命中，中层以上的领导干部和技术人员，几乎都被当作“走资派”或“资产阶级反动技术权威”打下去了，结果工厂越办越糟，一连十几年计划完成情况很不好，同十多年前年年全面完成国家计划情况相比，形成了极其鲜明的对照。"},{"type":"paragraph","text":"许多同志还对厂装卸队恢复实行计件工资究竟对不对的问题谈了自己的看法。文化大革命前，厂装卸队实行计件工资，装卸效率一直很高，不用外雇一名装卸工人，装卸任务完成得很好。文化大革命中，批了计件工资，装卸效率大大下降，每月要花近万元外雇装卸工人，还经常完不成任务。实践是最公允的裁判官。这个队根据实践的指引，不久前恢复了计件工资，结果装卸效率又提高了。"},{"type":"paragraph","text":"认识统一了，厂党委落实各项政策、进行企业整顿的决心更大了。短短几个月时间，全厂就给在文化大革命中无辜受迫害的一百多名干部、技术人员和老工人全部平反，并量才使用，大胆地把其中一批有能力、有干劲的同志提拔到各级领导岗位上来。同时，进一步恢复和健全了一些规章制度，加强了企业管理，扩大了计件工资的实行范围，促进了生产的发展。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"林彪","type":"人物"},{"name":"四人帮","type":"人物"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a18973fcbb"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
