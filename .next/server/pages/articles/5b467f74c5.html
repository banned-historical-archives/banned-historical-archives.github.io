" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoistlegacy.de-514","name":"中共中央统战部印发中央批准《关于不在民主党派、工商联机关开展清查、清理工作的请示》的通知","author":"中共中央统战部","internal":false,"official":false,"type":"unknown","files":[],"article":{"title":"中共中央统战部印发中央批准《关于不在民主党派、工商联机关开展清查、清理工作的请示》的通知","dates":[{"year":1989,"month":9,"day":18}],"is_range_date":false,"authors":["中共中央统战部"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"中央组织部干审局, 干审工作政策文件选编 (下), 1449-1450","tags":[{"name":"暴乱","type":"主题/事件"},{"name":"动乱","type":"主题/事件"},{"name":"反革命","type":"主题/事件"},{"name":"工商联","type":"主题/事件"},{"name":"民主党派","type":"主题/事件"},{"name":"清查","type":"主题/事件"},{"name":"清理","type":"主题/事件"},{"name":"统一战线","type":"主题/事件"},{"name":"中共中央","type":"主题/事件"}],"parts":[{"type":"title","text":"中共中央统战部印发中央批准《关于不在民主党派、工商联机关开展清查、清理工作的请示》的通知"},{"type":"subtitle","text":"1989年9月18日·统发〔1989〕4号"},{"type":"paragraph","text":"党中央同意我部《关于不在民主党派、工商联机关开展清查、清理工作的请示》，现印发各地，请贯彻执行。关于不在民主党派、工商联机关"},{"type":"paragraph","text":"开展清查、清理工作的请示"},{"type":"paragraph","text":"现就民主党派、工商联机关的清查、清理工作问题，提出如下建议："},{"type":"paragraph","text":"一、这场动乱和反革命暴乱持续时间很长、情况错综复杂,问题又主要出在党内。民主党派、工商联机关不同于党、政领导机关。根据江泽民同志6月28日在中共中央召开的党外人士座谈会关于“在这场制止动乱和平息反革命暴乱的过程中，各民主党派成员和无党派民主人士，从总体上来说，是顾全大局的”，“通过这次事件，证明我们党同各民主党派和无党派民主人士的合作关系，基础是牢固的，是经得起考验的，前景也是广阔的”讲话精神，对曾发表过不适当的呼吁或声明的民主党派、工商联领导人应采取解脱的方针;对民主党派、工商联机关不进行清查、清理工作。对在动乱和反革命暴乱中出现的各类事件，由其领导人及时了解和掌握情况，做到心中有数。"},{"type":"paragraph","text":"二、对民主党派、工商联机关在动乱和反革命暴乱中的问题，主要进行正面教育，通过认真组织学习四中全会文件和邓小平同志重要讲话，以及中央有关文件，进行坚持四项基本原则、反对资产阶级自由化的教育,提高对这场动乱和反革命暴乱性质、根源的认识，分清大是大非，自觉总结和汲取经验教训。对在动乱和反革命暴乱期间有严重错误的人，应进行帮助教育。对触犯刑律的，由司法机关依照法律处理。"},{"type":"paragraph","text":"二、民主党派、工商联的成员，一般应参加所在单位的学习和清查。如有需要进行组织处理的，由所在单位向有关民主党派、工商联组织通报情况，审慎处理。"},{"type":"paragraph","text":"以上意见如无不妥，拟下达各地区、各部门贯彻执行。一九八九年八月三十日"}],"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5b467f74c5"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
