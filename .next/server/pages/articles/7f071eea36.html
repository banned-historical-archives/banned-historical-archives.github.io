" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共中央批转西南军区党委关于“打虎”中注意收缴贪污现金的决定","authors":[],"dates":[{"year":1952,"month":2,"day":16}],"is_range_date":false,"parts":[{"text":"中共中央批转西南军区党委关于“打虎”中注意收缴贪污现金的决定","type":"title"},{"text":"各中央局、分局，各大军区并转所属各单位：","type":"appellation"},{"text":"兹将西南军区党委会二月八日关于在“打虎”中注意收缴贪污犯现金的决定转发你们，一律参照办理。这一决定是正确的。","type":"paragraph"},{"text":"（一）各地均应仿照办理在各级节约检查委员会内组织临时金库（由银行代理，所有现金一律经过节约检查委员会存入银行保管）登记管理；","type":"paragraph"},{"text":"（二）手续一定要清清楚楚，以免一面“三反”，一面又发生新的贪污。","type":"paragraph"},{"text":" 中  央二月十六日","type":"paragraph"},{"text":"（西南原电附后）","type":"paragraph"},{"text":"各军区、各部队党委并报中央、军委总政及西南局：","type":"appellation"},{"text":"在“打老虎”战斗中，凡大贪污犯已承认之贪污财物务须注意现金的追查，在身边者立即追缴（各级检查委员会可成立临时金库登记管理）；存人银行者收缴存单；寄存他处者派人收取；寄往他处者收缴汇单并转告有关方面查明冻结；借给他人者收缴借据，并通知各该地党政机关追查；个人花用者，则须登记其花用项目。这样做，一方面可防止其坦白后继续转移或破坏贪污财物：另方面可证实其坦白真实程度，并继续发现新的线索。望把你们执行的情况与经验随时报告我们。","type":"paragraph"},{"text":" 西南军区党委会二月八日","type":"paragraph"}],"comments":[],"origin":"根据文件的原件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7f071eea36"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
