" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"云霄县世坂大队敌我不分的情况严重","authors":["《公安工作》","新华通讯社"],"dates":[{"year":1963,"month":4,"day":9}],"is_range_date":false,"parts":[{"text":"云霄县世坂大队敌我不分的情况严重","type":"title"},{"text":"新华通讯社《公安工作》","type":"authors"},{"text":"本刊讯 福建省云霄县世坂大队在社会主义教育运动中，揭露出干部、群众阶级观念模糊、敌我不分的严重现象。世坂大队共有三百七十四户，其中地富反坏分子与反革命社会基础占全大队总人口的10%。这个大队在1951年肃反革命中给阶级敌人以致命的打击，基本上摧毁了反动势力，同时也教育了广大群众，树立主阶级斗争观念，划清了敌我界线，对巩固专政、维护社会秩序和开展大生产运动起了很大的作用。但是，1960年以来，这个大队忽视了队级教育，对阶级敌人放松了改造，因而出现敌我不分的现象，几乎把五类分子当成了一家人。在这次社会主义教育运动中揭露出的问题是：对阶级敌人是政治上给予“五权”，经济上给予“五照顾”，阶级界线上是“七个不分”。","type":"paragraph"},{"text":"政治上给阶级敌人以“五权”：(１)选举表决权。有的生产队在选举队委和确定有关生产队的决议时，都叫四类分子参加选举和表决。(２)名誉光荣权，第十生产队长去年曾多次在社员大会上表扬反革命分子许什周和地主许城内劳动、积肥积极，号召社员向他们学习。(３)讲演宣传权。全大队十五个生产队，有十三个队的社员请地主分子许双喜讲故事。(４)财务管理权。有三个生产队叫地、富当记工员和管理员。(５)外出自由权。有的地、富到三明、厦门、角尾等地不受拘束，不请假去别的大队、公社更是常事。","type":"paragraph"},{"text":"经济上“五照顾”：(１)照顾多吃口粮。第十队由于强调工分粮，结果地富分到的口粮比贫农中农多(每人平均多四十三斤)。去年春耕，地富犁田每天每人多贴一斤粮，县退销给军、干、烈属的口粮也按人口平均分给地富。(２)照顾牧牛赚工分。七队二十四户，有十二头耕牛，其中五户地富，就牧了五头，十九户贫农中农才牧七头。(３)照顾多开荒。不少地富开荒都超过自留地一倍，生产队都不加干涉。(４)照顾养猪卖高价。第十队去年毛猪统购任务没有完成，社员以高价买毛猪给国家收购；富农许什周有一头一百多斤重的大猪去拿去卖高价。(５)照顾少尽义务。地富不能服兵役，又不负担支前(指民工)和参加建设的义务工，劳力经常保留在家搞小自由、赚工分。","type":"paragraph"},{"text":"阶级界线上的“七个不分”：(１)婚姻关系不分。全大队贫农中与地富通婚的有四个，团支书许训练(党员)的弟弟也娶了富农许钢练的女儿为妻。(２)认亲会友不分。贫农中农与地富称兄道弟、呼伯唤叔的实例很多；有的与地富同睡同玩同照相。(３)借贷对象不分。队长许为盼(党员)向富农许什周借钱借粮；贫农许复然，欠了生产队八十元粮款不还，却拿了五十元借给地主。(４)讲话场合不分。贫农许仔通说：“有的中农贫农话乱说，不看场合不分对象，在地富面前也发牢骚骂共产党、人民政府。”(５)用人好坏不分。有三个生产队叫地富当记工员。(６)奖赔敌我不分。生产队执行劳动与投肥任务的奖赔政策时，不分贫中农与地主，劳力强的地富经常得奖，劳力弱的贫下中农常受罚赔，不少贫农有意见。(７)开会敌我不分。有的生产队不分什么会都是贫农中农、地富一起开，选举一同选举，分配会一同决定分配办法。","type":"paragraph"},{"text":"来源：编自龙溪专号《公安工作》，1963年4月9日新华社《内部参考》。","type":"paragraph"}],"comments":[],"origin":"美国图书馆收藏","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0d51f12aed"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
