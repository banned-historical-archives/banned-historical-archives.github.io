script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"崔贤大将撰文纪念朝鲜祖国解放战争胜利十周年号召加强革命力量击败美帝战争阴谋必须坚决反对现代修正主义者散布的有害思想","authors":[],"dates":[{"year":1963,"month":7,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社平壤24日电】　朝鲜《劳动新闻》为纪念朝鲜祖国解放战争胜利十周年在23日发表文章说，全体朝鲜人民和朝鲜人民军官兵，今天比以往任何时候更加警惕地保卫祖国，加速祖国的社会主义建设，为把美帝国主义侵略军赶出南朝鲜和争取祖国的和平统一而斗争。"},{"type":"paragraph","text":"这篇由朝鲜人民军大将崔贤撰写的文章，号召全体朝鲜人民、人民军官兵以及工农赤卫队队员始终保持动员状态，在政治上、思想上、军事上和经济上加强革命力量，以便随时准备挫败美帝国主义者的侵略和战争挑衅阴谋。"},{"type":"paragraph","text":"文章严厉警告美帝国主义者及其仆从，如果他们敢于轻率地向朝鲜人民发动进攻，他们将在英勇的朝鲜人民和军队的联合力量面前遭到失败。"},{"type":"paragraph","text":"文章指出，以美国为首的帝国主义者正在坚持进行侵略阴谋和战争挑衅，并把他们的侵略矛头指向远东和亚洲。美帝国主义者正在竭力复活和重新武装日本军国主义者，把日本变成核战争基地，加紧对朝鲜、中华人民共和国、越南民主共和国以及其他社会主义国家进行挑衅性的阴谋活动，不断地扩大在南越进行的“不宣而战”的战争，并且疯狂地在老挝挑起新的战争。美帝国主义者赖在南朝鲜不走，执行着殖民主义的掠夺政策，公然加紧进行新的战争挑衅阴谋。"},{"type":"paragraph","text":"文章谴责美帝国主义侵略者严重违反朝鲜停战协定。文章说，美帝国主义侵略者正在把南朝鲜变成他们的军事基地，正在继续不断地把更多的军事人员和大批的现代化武器运入南朝鲜，不断地加强南朝鲜的傀儡军队，不停地进行军事演习，并且对朝鲜北半部进行颠复和挑衅活动。"},{"type":"paragraph","text":"文章强调指出，一切事实令人信服地证明，美帝国主义是主要的侵略和战争势力，是全世界人民最凶恶的敌人。今天，以肯尼迪为首的美帝国主义者戴上“和平”的假面具来掩盖他们卑鄙的侵略本性，正在更加恶毒地策划侵略和战争阴谋。今天，如果不坚决地进行斗争，以粉碎美帝国主义侵略者的侵略政策与战争挑衅阴谋，就谈不上朝鲜的和平、祖国的统一和独立以及社会主义的胜利。"},{"type":"paragraph","text":"文章指出，战后朝鲜人民武装力量已经用现代军事技术武装起来，壮大成为一支能够粉碎敌人任何侵略的军队。文章说，我们必须进一步加强我们的陆、海、空防务，使之成为不可攻克的堡垒。"},{"type":"paragraph","text":"文章强调必须坚决反对帝国主义的反动的意识形态，反对对帝国主义的幻想，反对资产阶级和平主义、失败主义，以及以铁托集团为代表的现代修正主义者散布的一切有害的思想，并且坚决地以马克思列宁主义的革命思想武装自己。"},{"type":"paragraph","text":"文章说，我们党的富有经验的领导，党与人民群众的钢铁般的牢不可破的团结，我国人民保卫祖国并赢得革命最后胜利的坚定的决心和高涨的革命热情，是比任何新式武器都更加强有力的、并能粉碎任何侵略者的伟大力量。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f923ad0647"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
