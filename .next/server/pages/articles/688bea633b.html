script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"巴基斯坦一周刊发表文章主张  小国联合起来反对苏美两霸的威胁  秘鲁报纸强调拉美国家加强团结反对帝国主义控制和剥削","authors":[],"dates":[{"year":1974,"month":12,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"巴基斯坦一周刊发表文章主张"},{"type":"paragraph","text":"小国联合起来反对苏美两霸的威胁"},{"type":"paragraph","text":"秘鲁报纸强调拉美国家加强团结反对帝国主义控制和剥削"},{"type":"paragraph","text":"新华社拉瓦尔品第一九七四年十二月十三日电　最近一期的巴基斯坦《战斗》周刊发表文章，呼吁小国联合起来反对美、苏两霸。"},{"type":"paragraph","text":"文章说：“霸权主义这个词说明了莫斯科当前的态度。它正在一触即发的中东和南亚地区制造一批同情它的国家，以便扩大它的势力范围。”"},{"type":"paragraph","text":"文章说，在可以预见的将来，波斯湾、阿曼湾和阿拉伯海的许多沿岸国家将面临着苏联的威胁。“新德里—莫斯科轴心对所有的小国造成了巨大的威胁。”文章还强调说，苏联“目前的目标是把它的霸权扩展到这些地区”。"},{"type":"paragraph","text":"文章谈到美国的战略后说，在这种情况下，这些地区的小国应当联合起来，以对付苏美两霸的“双重威胁”。"},{"type":"paragraph","text":"新华社利马一九七四年十二月七日电　秘鲁三家报纸十二月七日分别发表纪念阿亚库乔战役一百五十周年的社论或文章，强调拉美国家应该发扬光荣的历史传统，团结起来，反对帝国主义的控制和剥削。"},{"type":"paragraph","text":"《快报》在一篇社论中说：“我们这些国家的人民有一个共同的敌人”，这就是“使我们遭受控制的帝国主义——造成我们的不发达和使我们成百万的拉丁美洲兄弟遭受痛苦和剥削的根源。”"},{"type":"paragraph","text":"社论说：“我们这些国家的人民有一个共同的愿望，这就是争取真正的彻底的独立，以便自由决定自己的命运，过自主尊严的生活。”"},{"type":"paragraph","text":"《纪事报》以《阿亚库乔：战斗的时刻》为题发表的社论指出，当前，新的国际势力企图奴役拉丁美洲。它说：“庆祝阿亚库乔战役一百五十周年，其深远的意义就在于加强团结精神，正是这种精神使我们能作为国家出现在国际舞台上。”"},{"type":"paragraph","text":"《秘鲁人报》发表文章说，在阿亚库乔战役的一百五十年以后，秘鲁正在展开一场新的争取经济解放的战斗。文章指出，这场战斗仍然是为了实现秘鲁人民的先辈曾经为之进行战斗的正义的理想。这家报纸指出，拉美其它各国人民也正在为自己国家的发展进行着同样的努力。"},{"type":"paragraph","text":"新华社一九七四年十二月十四日讯　阿根廷和秘鲁的一些报纸最近分别发表评论和文章，谴责帝国主义，支持八个拉美国家为纪念阿亚库乔战役一百五十周年而发表的《阿亚库乔宣言》。"},{"type":"paragraph","text":"阿根廷《舆论报》的一篇文章说，《阿亚库乔宣言》表现了拉丁美洲（国家）的决心：把它们的共同联合行动推向前进，以得到经济上和政治上的彻底解放。"},{"type":"paragraph","text":"秘鲁《纪事报》十二月十一日发表社论指出，《阿亚库乔宣言》谴责了各种类型的殖民主义以及任何阻挠行使完全的主权的行径，强调了一体化的使命和发展能够对付跨国公司和各种帝国主义贪欲的拉美民族主义。社论说，拉丁美洲得到了整个第三世界的支持。第三世界“受掠夺、受排斥的人民已广泛地行动起来，宣布他们强烈反对在当今世界上继续充当陪客的角色”。"},{"type":"paragraph","text":"秘鲁《商报》的社论说，第三世界现在正在展开一场反对跨国公司的战役，这些跨国公司自私地掠夺第三世界的资源。"},{"type":"paragraph","text":"社论说：“《阿亚库乔宣言》公开反对威胁和强迫，并且表示赞成建立一种新的国际经济秩序”。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"688bea633b"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
