" crossorigin="">{"props":{"pageProps":{"books":[{"id":"0b2f26ed-ad29-48e7-9c89-446932a97ab0","name":"中共党史教学参考资料 第27册 “文化大革命”参考资料 下册（1988年）","internal":true,"official":true,"type":"pdf","author":"","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives3/main/0b2f26ed-ad29-48e7-9c89-446932a97ab0.pdf"],"article":{"title":"河北省唐山、丰南一带发生强烈地震","alias":"","parts":[{"type":"paragraph","text":"志寄来的新校译的《共产党宣言》，急忙把老译本找出来，对照着阅读了一遍"},{"type":"paragraph","text":"由于过度的紧张和劳累，朱总的肺炎复发了。但他毫不在意，照样工作，照样会见外宾。直到生命的最后一一息，想的还是人民，还是革命。"},{"type":"paragraph","text":"6月12日、朱总会见马达加斯加民主共和国总统迪迪埃：拉齐拉卡。"},{"type":"paragraph","text":"6月21日，朱总病重了。按照原来安排，他要会见外宾。人们劝他休息，改由其他中央首长代替会见。他没有同意、坚持会见了澳大利亚联邦总理马尔科姆·弗雷泽。由于这次会见时间的改变，朱总在有空调的房间里等得太久，加重了他的病情。6月25日，医生会诊后、建议立即住院治疗。朱总想到次日要会见外宾、说：“不要紧嘛，等到明天我见完了外宾，再去住院也不晚。”6月26日，病情突然恶化，朱总才不得不住医院治疗。"},{"type":"paragraph","text":"7月1日，除肺炎之外，又并发了肠胃炎和肾病，高烧一直不退。这天，朱总把秘书叫到床前，问道：“今天是党的生口，报纸该发表社论了吧，念给我听听。"},{"type":"paragraph","text":"7月初的一天，朱总对到医院看他的李先念同志说：“我看还是要抓生产，哪有搞社会主义不抓生产的道理呢？弥留之际，朱总对周围人员断断续续地说：“革—命—到底！”.."},{"type":"paragraph","text":"“他是抱着深深的遗憾和不安离开人世的。因为他没有看到祸国映民的·四人帮被粉碎，因为他希望看到第五个五年计划实现。可是都没有能够如愿"},{"type":"paragraph","text":"说到这些的时候，康大姐的语调更加沉痛。这不难理解，失去亲密伴侣的创伤，是时间无法平复的。但大姐是一位坚强的女性，她很快就控制住了自已的感情，语重心长地说：“对先行者最好的怀念，不能只是泪水，只是暂言，而是把他们的事业推向前进，把他们的理想变为现实！”"},{"type":"paragraph","text":"你说得对，大姐！朱总和其他所有先行者一样，永远是一种巨大的精神力量，将长久激励我们朝着他们为之奋斗的目标，奋勇前进！"},{"type":"paragraph","text":"（原载1986年11月29口《解放军报》）河北省唐山、丰南一带发生强烈地震"},{"type":"paragraph","text":"（一九七六年七月二十八日）"},{"type":"paragraph","text":"我国河北省冀东地区的唐山-一丰南一带，七月二十八日三时四十二分发生强烈地震。天津、北京市也有较强震感。据我国地震台网测定，这次地震为七点五级，震中在北纬三十九点四度，东经一百一十八点一度。震中地区遭到不同程度的损失。"},{"type":"paragraph","text":"伟大领袖毛主席和党中央、国务院对地震灾区人民群众十分关怀。地震发生后，中共河北省委，天津、北京市委和震区各级党组织，已经采取紧急措施，领导群众迅即投入防震抗灾斗争。中共河北省委领导同志已带领有关部门负责人，赶到灾区指挥防震救灾工作。中国人民解放军和有关省、市卫生系统，已组织大批医疗队赶赴现场。大量医药、食品、衣物、建筑材料等救灾物资正源源运往灾区。国家地震局和河北省地震局已组织专业人员赶赴现场、监视震情。受灾地区人民群众已在当地党组织领导下，迅速组织起来，团结一致，展开抗灾斗争。他们决心在毛主席的革命路线指引下，在批邓、反击右倾翻案风斗争取得伟大胜利的大好形势下，发扬人定胜天的大无畏革命精神，团结起来，奋发图强，夺取这场抗灾斗争的胜利。"},{"type":"paragraph","text":"（新华社1976年7月28日讯，载7月29口《人民日报》）中共中央向灾区人民发出慰问电"},{"type":"paragraph","text":"（一九七六年七月二十八日）"},{"type":"paragraph","text":"河北省、天津、北京市党委、革命委员会、北京军区、河北省军区、北京卫戌区、天津市警备区并转唐山及其附近遭受地震灾害地区的各级党委、革命委员会、各族人民和人民解放军指战员："},{"type":"paragraph","text":"一九七六年七月二十八日，唐山、丰南一带发生强烈地震，并波及到天津市、北京市，使人民的生命财产遭受很大损失，尤其是唐山市遭到的破坏和损失极其严重。伟大领袖毛主席、党中央极为关怀，向受到地震灾害的各族人民和人民解放军指战员致以亲切的慰问。"},{"type":"paragraph","text":"中央相信，用马克思主义、列宁主义、毛泽东思想武装起来的、经过无产阶级文化大革命和批林批孔运动锻炼的各族人民和人民解放军指战员，一定会在省、市党委、革命委员会和部队党委的领导下，在全国人民的支援下，发扬艰苦奋斗的革命精神、以坚韧不拔的毅力，投人抗震救灾斗争，奋发图强，自力更生，发展生产，重建家园。"},{"type":"paragraph","text":"中央号召灾区的共产党员、共青团员、革命干部、工人、贫下中农和人民解放军指战员，认真学习毛主席的一系列重要指示，以阶级斗争为纲，深人开展批判邓小平反革命的修正主义路线、反击右倾翻案风的伟大斗争，团结起来，向严重的自然灾害进行斗争。下定决心，不怕牺牲，排除万难，去争取胜利！"},{"type":"paragraph","text":"（新华社1976年7月28口讯，载7月29口《人民口报》）《评\u003c关于加快工业发展的若干问题\u003e》的前言"},{"type":"paragraph","text":"（一九七六年七月）"},{"type":"paragraph","text":"北京大学、清华大学大批判纽《关于加快工业发展的若干问题》，是党内最大的不肯改悔的走资派邓小平亲自策划炮制"}],"authors":[],"dates":[{"year":1976,"month":7,"day":28}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":497,"page_end":498},"tags":[{"name":"邓小平","type":"人物"},{"name":"河北文革","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"天津文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"批林批孔","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5e47e17fa6"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
