script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"平壤百万群众举行国庆盛大游行金日成主席检阅了群众游行队伍　邓小平团长等应邀观看游行并参加游园活动","authors":[],"dates":[{"year":1978,"month":9,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社平壤九月十日电　平壤市各界群众百万人九月十日上午举行盛大游行，热烈庆祝朝鲜民主主义人民共和国成立三十周年。"},{"type":"paragraph","text":"朝鲜人民的伟大领袖金日成主席检阅了群众游行队伍。"},{"type":"paragraph","text":"中国党政代表团团长邓小平，孟加拉国总统齐亚·拉赫曼，马达加斯加总统迪迪埃·拉齐拉卡，民主柬埔寨、罗马尼亚、南斯拉夫等各国代表团团长应邀在主席台观看群众游行。"},{"type":"paragraph","text":"登上主席台的还有，金一、康良煜、朴成哲、李钟玉、崔贤、吴振宇、徐哲、林春秋等其他朝鲜党政领导人。"},{"type":"paragraph","text":"今天，金日成广场上红旗如林，鲜花似海，洋溢着浓厚的节日气氛。游行开始前，军乐团高奏朝鲜国歌，鸣放礼炮。朝鲜民主主义人民共和国副主席朴成哲讲了话。他说，“在伟大领袖金日成同志的英明领导下，朝鲜人民打垮了企图在摇篮时期就扼杀我们新生的共和国的美帝国主义侵略者，捍卫了祖国的独立和自由，并在战后的短时期内，胜利地进行社会主义革命，在这一土地上建立了社会主义制度，高度发扬自力更生的革命精神，在疮痍满目的废墟上，出色地完成了社会主义工业化的历史性任务，从而把曾经是落后的殖民地农业国的朝鲜转变成为自主、自立、自卫的社会主义国家。"},{"type":"paragraph","text":"他说:“今天，朝鲜人民紧密团结在以敬爱的领袖金日成同志为首的朝鲜劳动党中央委员会的周围，积极拥护思想、技术、文化三大革命路线，在为完成宏伟的第二个七年计划的斗争中，日新月异地创造奇迹和进行革新，有力地促进了社会主义、共产主义建设。”"},{"type":"paragraph","text":"他说，朝鲜人民遵循金日成同志在为共和国成立三十周年所作的报告中提出的斗争纲领，“有力地开展思想、技术、文化三大革命，进一步促进社会主义建设，争取早日实现祖国的统一，并将同世界各国人民团结起来，为反对帝国主义、殖民主义和支配主义，为社会主义、反帝革命事业和不结盟运动的胜利而奋勇前进。”"},{"type":"paragraph","text":"群众游行在雄壮的《金日成将军之歌》的乐曲声中开始。等候在金日成广场外面的游行队伍浩浩荡荡地进入广场，接受金日成主席的检阅。"},{"type":"paragraph","text":"在游行队伍中有许多巨大模型，生动地反映了朝鲜人民在国民经济各条战线上取得的光辉成就和在今后争取更大胜利的决心。成千上万名男女少年团员排着整齐的队伍，吹着军号，打着小鼓走到广场中心，少年团员的代表们兴高采烈地跑上主席台，向金日成主席和邓小平团长等各国贵宾献花，并给他们带上红领巾。这时，广场上再次出现欢腾的热潮，鼓乐声和欢呼声响彻天空，经久不息。"},{"type":"paragraph","text":"游行队伍还高举着表达朝鲜人民要求美帝撤出南朝鲜早日实现祖国自主和平统一的愿望和决心的巨幅标语和模型。"},{"type":"paragraph","text":"当游行队伍进行完毕时，广场上的群众一齐涌向主席台前，欢呼跳跃，礼炮齐鸣，广场上又出现了动人的景象。"},{"type":"paragraph","text":"应邀参加朝鲜国庆活动的各国代表团的成员、来宾以及各国驻朝鲜的外交使节也出席观看了群众游行。"},{"type":"paragraph","text":"丰富多采的群众游行历时两小时胜利结束。"},{"type":"paragraph","text":"新华社平壤九月十日电　中国党政代表团团长邓小平、柬埔寨党政代表团团长农谢，罗马尼亚党政代表团团长曼内斯库和南斯拉夫国家和党的代表团团长米亚托维奇等，十日下午由朝鲜劳动党中央政治委员会候补委员、政务院副总理郑浚基陪同，在平壤市牡丹峰上参加群众游园，观看了朝鲜艺术家表演的音乐和歌唱节目，受到群众的热烈欢迎。"},{"type":"paragraph","text":"中国党政代表团副团长彭冲、团员黄华、吕志先等随同游园并观看文艺节目。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c338f1f15d"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
