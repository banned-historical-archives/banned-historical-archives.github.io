" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"“企业是否要党组织领导值得考虑”","authors":["广东","黄长水"],"dates":[{"year":1957,"month":5,"day":21}],"is_range_date":false,"parts":[{"text":"“企业是否要党组织领导值得考虑”","type":"title"},{"text":"广东黄长水","type":"authors"},{"text":"（黄长水：中国民建广州市委主任委员）","type":"subtitle"},{"text":"小型合营工厂有公方又有党支部，层次多的结果是不知谁领导，有事互相推诿。在工商企业中不少党员不懂装懂，包办专权。他说，我认为几个党员领导企业不能发挥群众的积极性，因此企业是否要党组织来领导的问题，的确值得考虑。","type":"paragraph"},{"text":"那些所谓积极分子，专门喜欢向党员奉承，这更加重了某些党员领导干部的官僚主义、主观主义、宗派主义。他又说：经常都听到党员和党外群众说，“我们”“你们”，调整级别时，提拔党员多，非党干部就少提拔；有些黑板报，变成专门批评非党干部的园地。老党员一下子看不出是党员，但是新党员一看就知道了，因为他们大有“我领导你”的姿态。他反映，有些党外群众说这些人是“小皇帝”。","type":"paragraph"},{"text":" (人民日报5月21日)","type":"paragraph"}],"comments":[],"origin":"《坚决粉碎右派分子的猖狂进攻》（反右派斗争学习参考材料之一，中共云南省委党校教务处编，云南人民出版社，19579月）。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b75139d0f3"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
