script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji28","name":"毛泽东全集第28卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji28.pdf"],"article":{"title":"大力做好解放海南岛的准备工作","alias":"","parts":[{"type":"paragraph","text":"大力做好解放海南岛的准备工作"},{"type":"paragraph","text":"（1950年1月10日）中央，转林彪同志："},{"type":"paragraph","text":"（一）一月六日电及转来邓、赖、洪一月五日电均悉。（二）既然在旧历年前准备工作来不及，则不要勉强，请令邓、赖、洪不依靠北风而依靠改装机器的船这个方向去准备，由华南分局与广东军区用大力于几个月内装置几百个大海船的机器（此事是否可能，请询问华南分局电告），争取于春夏两季内解决海南岛问题。（三）"},{"type":"paragraph","text":"[1]林彪，当时任中共中央中南局第一书记、第四野战军兼中南军区司令员。"},{"type":"paragraph","text":"[2]指1950年1月5日13时中国人民解放军第十五兵团司令员邓华、政治委员赖传珠和第一副司令员兼参谋长洪学智给林彪、邓子恢、谭政、萧克、赵尔陆并中共中央军委的电报。电报说：琼崖敌总数估计10万至15万，且有海空军配合，故我第一批必须使用一个军的兵力同时登陆，每船按乘30人计，需1000只以上。但现船只很少，必须将一部帆船改装机器（至少突击一个团），以使操纵。部队无渡海作战经验，北方人不惯乘船，只经短时间教育训练，难收实效。根据上情，旧历年前要完成此次大规模渡海作战之准备工作，事实上来不及，必须向后推迟。但过旧历年后风向改变，帆船不能使用，如全部改装机器，非短时间内可以完成的，且耗费很大，如只装部分则又非利用下一个冬季北风不可。"},{"type":"paragraph","text":"大力做好解放海南岛的准备工作海南岛与金门岛情况不同的地方，一是有冯白驹配合，二是敌军战斗力较差。只要能一次运两万人登陆，又有军级指挥机构随同登陆（金门岛是三个不同建制的团又无一个统一的指挥官，由三个团长各自为战），就能建立立足点，以待后续部队的继进。（四）请要十五兵团与冯白驹建立直接电台联系，并令冯白驹受邓、赖、洪指挥，把琼山、澄迈、临高、文昌诸县敌军配备及敌海军情况弄得充分清楚，并经常注视其变化。（五）同时由雷州半岛及海南岛两方面派人（经过训练）向上述诸县敌军进行秘密的策反工作，勾引几部敌军于作战时起义，如能得到这个条件，则渡海问题就容易得多了。在自前条件下，策动几部敌军起义应该是很可能的。此事应请剑英、方方、冯白驹诸同志特别注意用力。华南分局应加以讨论，定出具体的策反办法，并于三四个月内获得成绩。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一月十日[1]冯白驹，当时任第四野战军琼崖纵队司令员兼政治委员。"},{"type":"paragraph","text":"[2]剑英，即叶剑英，当时任中共中央华南分局第一书记、广东军区司令员兼政治委员。方方，当时任中共中央华南分局第三书记。"}],"authors":["毛泽东"],"dates":[{"year":1950,"month":1,"day":10}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":158,"page_end":159},"tags":[{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2e90920f56"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
