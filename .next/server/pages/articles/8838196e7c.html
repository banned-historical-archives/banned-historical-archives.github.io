script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"阿《人民之声报》揭露苏联代表在联合国为美帝侵略多米尼加效劳谴责赫鲁晓夫修正主义者出卖多米尼加人民","authors":[],"dates":[{"year":1965,"month":6,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京18日电　地拉那消息:阿尔巴尼亚《人民之声报》六月五日发表评论，谴责苏联代表在安理会投票赞成多米尼加永久停火，并指出这是赫鲁晓夫修正主义者对多米尼加人民的一次出卖。"},{"type":"paragraph","text":"评论说，安理会就美帝国主义侵略多米尼加所进行的讨论过程清楚地表明，美帝国主义轻易地利用联合国及其主要机构作为实现其建立世界霸权的工具。"},{"type":"paragraph","text":"评论指出，与此同时，苏联领导人继续其同美帝国主义愈益合作，无原则让步和投降的政策。苏联政府在联合国的代表进行着蛊惑人心的辩论，但是，这种辩论归根结底只不过是更好地为实现美帝国主义的企图效劳。赫鲁晓夫修正主义者从而犯下了对多米尼加人民的一次出卖。苏联投票赞成安理会关于呼吁把临时停火变成永久停火的决议，难道是对多米尼加人民的帮助吗?难道这不意味着政治制度的问题要在圣多明各驻扎三万美国兵的情况下解决吗?"},{"type":"paragraph","text":"评论指出，无论是修正主义者的机会主义背叛立场，无论是安理会的决议都不会带来结果。因为实际上按现在安理会的组成来说，不可能设想它会通过有效的决议和决定。安理会已经成了帝国主义者和修正主义者发表他们蛊惑演讲的地方，成了他们用空话进行“英勇”斗争，以便在美帝国主义进行一个接着一个的侵略的时候，欺骗国际公众舆论，掩盖他们幕后合作的地方。"},{"type":"paragraph","text":"评论说，只有首先是多米尼加人民的坚决立场和坚决回答以及所有革命力量的声援和对它的具体帮助才能迫使美帝从多米尼加土地上滚出去，让这个国家自行解决自己的命运。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8838196e7c"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
