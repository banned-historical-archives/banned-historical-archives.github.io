script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反对反动当局迫害　抗议垄断资本剥削  资本主义国家工人罢工斗争此伏彼起","authors":[],"dates":[{"year":1968,"month":11,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反对反动当局迫害　抗议垄断资本剥削"},{"type":"paragraph","text":"资本主义国家工人罢工斗争此伏彼起"},{"type":"paragraph","text":"据新华社讯　阿根廷、智利、厄瓜多尔、乌拉圭、澳大利亚、西班牙等国家的工人继续开展罢工斗争，反对反动当局的压迫和争取切身权益。"},{"type":"paragraph","text":"阿根廷“拉普拉塔”炼油厂的七千八百名工人，不顾反动当局的威吓，继续坚持从九月二十五日开始的罢工斗争，要求厂方取消延长工作时间等加紧剥削工人的措施。工人罢工委员会二十日发表公报，揭露阿根廷政府企图把炼油厂交给外国企业主。门多萨省的三千五百名石油工人宣布将举行罢工，声援“拉普拉塔”石油工人的正义斗争。"},{"type":"paragraph","text":"阿根廷罗萨利奥一家电机厂的罢工工人在二十二日占领了工厂，同企图镇压他们的警察部队展开了激烈的搏斗。"},{"type":"paragraph","text":"智利首都圣地亚哥的美资智利电力公司的全体雇员和智利国家电力公司的电机技术员，二十三日举行罢工，要求增加工资。"},{"type":"paragraph","text":"瓦尔迪维亚市一家鞋厂的工人为抗议解雇工人，举行了六天罢工后占领了工厂。"},{"type":"paragraph","text":"厄瓜多尔同古拉瓦省的工人联合会二十日宣布罢工，支持贝努斯鞋厂工人的斗争。这个鞋厂的工人曾提出了增加工资等要求，但一直遭到资方的顽固拒绝。"},{"type":"paragraph","text":"乌拉圭首都蒙得维的亚的报纸印刷工人不顾当局禁止罢工的法令，从二十日起又举行罢工，要求增加工资。新闻记者也同时举行罢工。到二十三日止，这个城市已连续四天没有报纸出版。"},{"type":"paragraph","text":"澳大利亚八万名铁路工人二十八日举行了二十四小时全国性总罢工，要求增加工资。"},{"type":"paragraph","text":"罢工工人不顾反动当局的威胁，在全国各地举行群众集会，抗议当局横蛮拒绝工人的合理要求。"},{"type":"paragraph","text":"西班牙北部奥维亚多的数千名煤矿工人，不顾法西斯当局的威胁和迫害，继续坚持罢工。"},{"type":"paragraph","text":"这次不久前爆发的罢工斗争，是西班牙煤矿工人对国家垄断资本不顾工人死活榨取工人血汗的强烈抗议。到二十三日，参加罢工的矿工已增加到八千多人。最近一个多星期以来，奥维亚多的煤矿工人仍然在坚持斗争。三十一日，煤矿公司反动当局悍然宣布封闭奥维亚多的一个巨大的矿井，从而变相解雇了这个矿井的四百多名罢工工人，妄想借此把工人的罢工斗争镇压下去。但是，压迫越大，反抗越强，煤矿工人仍在毫不畏惧地坚持斗争。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6199aa9d94"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
