" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji30","name":"毛泽东全集第30卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji30.pdf"],"article":{"title":"关于更换谈判会址问题致李克农电","alias":"","parts":[{"type":"paragraph","text":"关于更换谈判会址问题致李克农电"},{"type":"paragraph","text":"（1951年10月3日）李克农同志，并告金、彭叫"},{"type":"paragraph","text":"关于更换会议地址问题，经我们再三考虑，认为自前还应采用你们原先的主张，拒绝敌人这项无理要求，并准备与敌人拖一时期。因为敌人目前的政策是拖，我急他不急是无用的，到了敌人真想解决问题的时候，那时就可以扯拢了。因此，所拟复件，便可简单，对于未了事件的处理，既不取消，也暂不提，看敌人如何反映（应）。复件现附上，可于十月四日上午送出。北京拟在四日晚广播，五日登报，请平壤亦同时发表。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十月三日十八时[1]李克农，当时任中央人民政府外交部副部长。"},{"type":"paragraph","text":"[2]金，指朝鲜民主主义人民共和国首相金日成。彭，指中国人民志愿军司令员兼政治委员彭德怀。"},{"type":"paragraph","text":"[3]指为金日成、彭德怀起草的关于更换会议地址问题给李奇微的复文。"}],"authors":["毛泽东"],"dates":[{"year":1951,"month":10,"day":3}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":516,"page_end":516},"tags":[{"name":"毛泽东","type":"人物"},{"name":"彭德怀","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d04390de25"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
