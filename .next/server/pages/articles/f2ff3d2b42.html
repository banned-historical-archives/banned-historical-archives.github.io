script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"余秋里要求军队理论工作者必须旗帜鲜明站在反对精神污染的前列以毛泽东军事思想为指针夺取军队建设新胜利","authors":["易俭如"],"dates":[{"year":1983,"month":10,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京十月二十六日电　(记者易俭如)中央军委副秘书长、总政治部主任余秋里今天在毛泽东军事思想学术讨论会上指出，理论工作者是人类灵魂工程师队伍中的成员，一定要模范地坚持四项基本原则，站在反对精神污染的前列。"},{"type":"paragraph","text":"余秋里说，党的十二届二中全会讨论通过的《中共中央关于整党的决定》，邓小平同志、陈云同志在会上作的重要讲话，对于搞好整党，加强党的组织建设和思想建设，对于加强社会主义物质文明和精神文明建设，都具有重大和深远的意义。全军同志必须认真学习，坚定地、全面地贯彻执行。从事理论工作的同志，更要学好邓小平同志讲话中关于思想理论战线问题的论述，防止精神污染。"},{"type":"paragraph","text":"余秋里指出，军队的思想理论战线和文艺战线的工作，这几年是有进步的，总的情况是好的。但是思想理论界某些人散布的错误理论和观点，在部队中是有影响的，部队中也有极少数人搞精神污染。对这些问题，我们必须充分注意。"},{"type":"paragraph","text":"余秋里强调说，理论工作者不但自己不能搞精神污染，而且要勇敢地面对一些人的挑战，高举马列主义、毛泽东思想的旗帜，高举社会主义的旗帜，对搞精神污染的言行进行批评，以至必要的斗争，绝不让这些东西污染我军指战员的思想，损害我军的战斗力。"},{"type":"paragraph","text":"这次毛泽东军事思想学术讨论会，是为纪念毛泽东同志诞辰九十周年，由军事科学院组织召开的。余秋里代表中央军委对这次全军性的学术讨论会表示祝贺。他指出，毛泽东军事思想是毛泽东思想的重要组成部分，是毛泽东同志和其他老一辈无产阶级革命家对马克思列宁主义军事理论的杰出贡献。我们一定要继续以毛泽东军事思想为指针，去夺取新的历史条件下我军建设和国防现代化建设的新胜利。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"余秋里","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f2ff3d2b42"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
