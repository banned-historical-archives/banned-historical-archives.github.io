<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"以教育来营利视教师为奴隶西安小学校长陈仪判刑法院让他在工作中改造自己酌予缓刑　积欠教薪部份在调解程序中责令清偿","authors":[],"dates":[{"year":1950,"month":8,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　前西安小学校长陈仪，男，三十三岁，上海人，住江苏路西诸安浜三六八弄十二号，因利用教育事业，从中营利，并以非法方法剥削教薪，为本市人民法院于昨日判处有期徒刑四月，暂不执行，缓刑二年。至积欠教薪部份，已经法院在调解程序中责令清偿。"},{"type":"paragraph","text":"陈仪，在本市西诸安浜办的西安小学，自任校长。其妻张钰，任教导主任兼总务主任。学校行政，一手把持，经济向不公开，一家住在校内，完全以教育事业为私人营利工具，延续了十年以上。本市解放以后，他仍一贯学店作风。平时吸收失业知识份子为该校教员，藉以抑低教薪。并表示他“安插”、“救济”的“恩惠”。为了保持他利用学校剥削营利，预防教员的合理要求，便利统制，更创例命令所有教员出立所谓“自愿保证书”，订明“薪金根据每日签到按月至期发放，非于发放时期内，概不预借。如物价涨落到任何程度，各由天命，不得借故要求增加或减少”，以及“对校方有不利等情，校方有随时解聘权。如因故而本校不续办时，薪金自停办日起停止发放。教员及保证人，自愿放弃一切诉讼及抗辩权，中途如有身体不健康及其他任何原因，不得辞退”等条款，并订明“如违背所列条件之一者，保证人自愿负经济上及精神上之一切赔偿及全责于校方绝无异言”。视教员为奴隶，开教育界未有之恶例。又违反教育局关于私校收费分配办公费百分之三十，教薪百分之七十的指示。与教员约定教薪每月白米一石一斗，以实际签到按日计算，但又不按期发放。致各教员无以生活，提起控诉。除关于积欠教薪部份已经法院在调解程序中责令清偿外，刑事部份，判处徒刑四月，缓刑二年。"},{"type":"paragraph","text":"他从不考虑教员在学校里的岗位和作用，也从不考虑私校向学生收费以及教员赖劳力取得教薪为生活资源的事实。在他的认识上，只把教员看作受他救济的一群难民，只有他是花钱养活这些难民的大恩人。因此他在“待遇不计进退无所谓”的思想下，根本否定了教员应有的职业保障和生活保障，甚至创出教育界从来未有的恶例，叫所有教员抄具所谓“自愿保证书”，还要觉取妥保，订明由他片面拟定的条件。"},{"type":"paragraph","text":"关于违反教育制度之处，已由教育局予以处理。对于他利用教育事业从中营利，并以非法方法剥削教薪的行为，则显为新社会所不能容忍，法院特处有期徒刑四月，以资教育。姑念他是旧社会出身的知识份子，沿袭旧社会的不合理制度，造成了他犯罪的思想根源。就原告提出的文件，已证明被告的校长职务，业经解除。以后正好让在从事教育的实际工作中改造自己，斟酌情形，所处徒刑，即以暂不执行为宜，合予缓刑二年，以期自新，爰为判决如上。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"94279b9ef4"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
