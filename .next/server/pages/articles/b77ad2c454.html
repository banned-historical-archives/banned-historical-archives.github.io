script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"艾地论述印度尼西亚的阶级斗争　印度尼西亚现阶段革命是人民反帝反封建残余的斗争　约多说真正保卫和平的是马列主义者而不是修正主义者","authors":[],"dates":[{"year":1964,"month":8,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"艾地论述印度尼西亚的阶级斗争"},{"type":"paragraph","text":"印度尼西亚现阶段革命是人民反帝反封建残余的斗争"},{"type":"paragraph","text":"约多说真正保卫和平的是马列主义者而不是修正主义者"},{"type":"paragraph","text":"新华社雅加达二十一日电　印度尼西亚共产党主席艾地八月十五日应印度尼西亚“建设力量运动”主席团的邀请，论述了马克思列宁主义及其印度尼西亚化和印度尼西亚的阶级斗争问题。"},{"type":"paragraph","text":"艾地说：“印度尼西亚共产党人应当把马克思列宁主义印度尼西亚化，那就是把马克思列宁主义的普遍真理同印度尼西亚革命的具体实践结合起来。印度尼西亚共产党人是在印度尼西亚而不是在任何其他国家从事革命的。”"},{"type":"paragraph","text":"艾地说：“印度尼西亚民族民主革命现阶段的阶级斗争形式，是革命的印度尼西亚人民反对帝国主义（垄断资本主义）和封建主义的残余的斗争。但是，这决不意味着，印度尼西亚工人阶级和民族资本家之间没有斗争。他们之间的斗争仍然存在……但是，不应当使这种斗争尖锐化，因为印度尼西亚资本家和工人面对着共同的敌人——帝国主义和封建主义的残余。将来我们的革命进入第二阶段，即社会主义阶段的时候，我们也应当努力通过谈判和说服而取得一致的办法来消灭民族资本主义。凡是愿意接受社会主义的人将获得补偿，而国家机器的任务是对付反抗社会主义的人。”"},{"type":"paragraph","text":"新华社雅加达二十二日电　印度尼西亚《人民日报》今天报道，印度尼西亚共产党第二副主席约多在谈到美国对越南的侵略时说，当和平真正受到威胁时，采取具体步骤来保卫和平的是被修正主义者叫做“好战分子”的马克思列宁主义者，而不是那些声称他们“渴望和平”的修正主义者。"},{"type":"paragraph","text":"约多是十六日在雅加达举行的庆祝印度尼西亚人民文化协会成立十四周年的仪式上说这番话的。"},{"type":"paragraph","text":"约多说，修正主义者迷信原子武器，这实际上是对人的贬低和侮辱。"},{"type":"paragraph","text":"约多要求与会者注意今年年初在巨港举行的印度尼西亚人民文化协会代表大会上所提出的和苏加诺总统在八月十七日的独立日演说中所强调的“破坏和建设”的口号。约多接着说，破坏帝国主义和封建主义的文化不是一件容易的事。"},{"type":"paragraph","text":"约多在谈到反动派和修正主义者反对破坏腐朽的文化的活动时说，“他们也有他们的‘破坏和建设’。他们破坏应当建设的东西和建设应当破坏的东西。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b77ad2c454"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
