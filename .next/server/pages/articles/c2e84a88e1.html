script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"袴田里见等号召日苏协会会员加强团结谴责修正主义和分裂分子的阴谋","authors":[],"dates":[{"year":1965,"month":3,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京18日电　东京消息:日苏协会副会长袴田里见和黑田寿男等六个领导人，在十七日举行记者招待会，表明他们要保卫协会的团结，坚决反对分裂阴谋，尽一切力量促进日苏两国人民的友谊。"},{"type":"paragraph","text":"这个记者招待会是根据五日的协会执行理事会议的决定举行的。袴田等在记者招待会上谴责了由一部分实业界和文化界人士成立“日苏联系协会”，以及准备成立以日苏协会前理事长松本七郎和修正主义者铃木市藏为中心的“日苏友好协会”等分裂活动。记者招待会上还公布了协会未来的活动方针。出席记者招待会的还有副理事长堀江邑一、帆足计和中林贞男，执行理事穗积七郎。"},{"type":"paragraph","text":"在记者招待会上，日苏协会领导人还强调指出:协会将促进同苏日协会的合作，促进日苏两国人民的友谊，但是同时，将坚决反对任何旨在分裂日苏协会的蓄意的行动。"},{"type":"paragraph","text":"穗积七郎说:“只有很少一些人退出了我们的协会。担任执行理事的七个社会党议员中，只有松本先生背弃了我们。”他还指出:“苏日协会表示不满的是，日苏协会没有支持部分禁止核试验条约。但是这个问题同日苏友好运动不相干。”"},{"type":"paragraph","text":"日苏协会的代表然后发表了在五日的执行理事会议上通过的声明。声明号召协会全体会员加强团结，保持日苏友好运动的传统，克服种种困难，实现保卫和平的崇高目标，从而向着胜利召开四月十日的大会前进。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c2e84a88e1"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
