script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"应吴奈温总统和吴貌貌卡总理邀请进行正式友好访问  邓小平副总理离京赴缅甸  李先念纪登奎吴德余秋里陈钖联耿飚陈慕华邓颖超王震等到机场欢送","authors":[],"dates":[{"year":1978,"month":1,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"应吴奈温总统和吴貌貌卡总理邀请进行正式友好访问"},{"type":"paragraph","text":"邓小平副总理离京赴缅甸"},{"type":"paragraph","text":"李先念纪登奎吴德余秋里陈钖联耿飚陈慕华邓颖超王震等到机场欢送"},{"type":"paragraph","text":"新华社一九七八年一月二十六日讯  应缅甸联邦社会主义共和国总统兼国务委员会主席吴奈温和缅甸联邦社会主义共和国政府总理吴貌貌卡邀请，国务院副总理邓小平今天上午乘专机离开北京前往缅甸进行正式友好访问。"},{"type":"paragraph","text":"到机场欢送的有党和国家领导人李先念、纪登奎、吴德、余秋里、陈钖联、耿飚、陈慕华、邓颖超、王震，人大常委会秘书长姬鹏飞，外交部长黄华，外贸部长李强，中国人民解放军副总参谋长杨勇，国务院办公室主任吴庆彤，外交部副部长仲曦东、王海容等。"},{"type":"paragraph","text":"缅甸驻中国大使吴敏貌的夫人、大使馆临时代办吴梭敏，尼泊尔驻中国大使拉纳的夫人、大使馆临时代办巴塔来依，也到机场送行。"},{"type":"paragraph","text":"随同邓小平副总理访问的有外交部副部长韩念龙，亚洲司副司长王晓云、程瑞声，礼宾司副司长高建中等。（附图片）"},{"type":"paragraph","text":"右图：邓小平副总理离京前往缅甸进行正式友好访问。党和国家领导人李先念、纪登奎、吴德、余秋里、陈钖联、耿飚、陈慕华、邓颖超、王震等到机场欢送。新华社记者摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"吴德","type":"人物"},{"name":"李先念","type":"人物"},{"name":"纪登奎","type":"人物"},{"name":"王震","type":"人物"},{"name":"余秋里","type":"人物"},{"name":"耿飚","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"92a3031f7a"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
