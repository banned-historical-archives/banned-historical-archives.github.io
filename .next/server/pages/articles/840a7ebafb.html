script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"印度“贱民”生活在水深火热之中  残酷的剥削和迫害正在激起“贱民”和其他贫苦农民起来斗争","authors":[],"dates":[{"year":1969,"month":2,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"印度“贱民”生活在水深火热之中"},{"type":"paragraph","text":"残酷的剥削和迫害正在激起“贱民”和其他贫苦农民起来斗争"},{"type":"paragraph","text":"新华社十七日讯　新德里消息：印度报刊最近透露了印度农村中受压迫、剥削最深重的所谓“贱民”生活悲惨的情况。这些情况只不过是印度千千万万贫苦农民极其深重的阶级苦、血泪仇的一些点滴。"},{"type":"paragraph","text":"据报道，印度农业劳动力的百分之九十五要由“贱民”来承担，但是他们只拥有不到百分之二的耕地。“贱民”是印度世袭的阶级，他们祖祖辈辈只能从事最艰苦的劳动，而且受到残暴的压迫和歧视。"},{"type":"paragraph","text":"印度反动政府尽管假仁假义地通过一些禁止歧视“贱民”的法律，但是它实际上极力支持地主、资产阶级歧视和压迫“贱民”。目前，印度各邦内普遍存在着歧视“贱民”的现象。例如，“贱民”不许从其他人使用的水井里打水；在学校里，“贱民”出身的学生要同其他出身的学生分开坐，他们不能使用其他学生的饮水工具，不能在一起吃饭。在一些乡村中，“贱民”不许骑自行车。"},{"type":"paragraph","text":"在古吉拉特邦，公然实行着一种叫作“哈里”的剥削制度，地主公然可以把“贱民”当作奴隶使用，“贱民”只能为一个“主人”劳动。如果他们起来反抗，就遭到残暴的镇压。"},{"type":"paragraph","text":"去年十二月二十五日在马德拉斯邦丹卓尔县发生了骇人听闻的残杀“贱民”的事件，震动了整个印度。在那里，反动地主在印度反动当局的支持下，把四十二名“贱民”关在一间茅屋里活活烧死。"},{"type":"paragraph","text":"在北方邦班达县的一个村庄里，大约二十户“贱民”提出要从公用的水井里打水等要求，然而，这些“贱民”的领导人却被警察关押起来，挖掉了双眼。"},{"type":"paragraph","text":"在奥里萨邦登加纳尔县的库鲁村，有两个池塘。“贱民”只能使用其中的一个池塘，天旱时这个池塘干涸了，他们也不能去另一个池塘打水。后来，另一个池塘干涸了，村里的地主却要从“贱民”的池塘汲水浇地，遭到“贱民”的拒绝。两天之后，这个地主从邻村纠集了五千多人，袭击“贱民”居住区，凶暴地殴打和杀害“贱民”。"},{"type":"paragraph","text":"在印度修正主义分子把持下的喀拉拉邦政府，丝毫也不能保护贫苦的“贱民”。“贱民”照样在光天化日之下被屠杀。最近，这个邦内奎隆县的一个地主雇用一批暴徒，打死了一名“贱民”，把另一名打得半死。这个邦内百分之十二的人口是“贱民”出身的农业工人，他们当中百分之九十的人没有土地，也没有房子。"},{"type":"paragraph","text":"残酷的剥削和迫害正在激起“贱民”和其他贫苦农民起来斗争。美联社二月十七日在报道印度农村情况时忧心忡忡地认为，印度农村中的剥削者和广大农民之间的阶级斗争将要发展为一场“最可怕的冲突”。这家通讯社担心印共革命派发动贫苦农民的斗争将会冲破种姓、宗教、语言的限制而形成全国规模的农民运动。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"840a7ebafb"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
