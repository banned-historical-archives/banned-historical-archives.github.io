script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"克服帝国主义和修正主义进行封锁造成的困难和障碍阿尔巴尼亚社会主义建设继续胜利进军阿《人民之声报》发表新年社论回顾去年取得的重要成就","authors":[],"dates":[{"year":1963,"month":1,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社地拉那2日电】　阿尔巴尼亚《人民之声报》1月1日发表新年社论说，1962年是阿尔巴尼亚人民在社会主义建设方面胜利进军的一年。它是生动和英勇的劳动的一年，是帝国主义和修正主义进行封锁并造成了障碍和困难的一年，但是，阿尔巴尼亚劳动人民在阿尔巴尼亚劳动党的领导下以史无前例的爱国热情克服了这些障碍和困难。"},{"type":"paragraph","text":"在过去的一年中开展了规模异常广泛的劳动竞赛，阿尔巴尼亚的工人和工程师们用他们万能的双手设计和建造了新的机器、整套的工厂设备。"},{"type":"paragraph","text":"1962年也是从各方面努力发展农业并使之现代化的一年，是同无数的自然灾害进行斗争的一年。在经济封锁和由此所造成的困难条件下，阿尔巴尼亚的工业生产预计仍将100%地被完成；尽管遇到了坏天气和暴雨，农业总产值预计仍将比1960年增加10%，这对阿尔巴尼亚人民说来是相当重要的成就。"},{"type":"paragraph","text":"社论说，过去这一年更充分地说明了阿尔巴尼亚人民在党周围的钢铁般的坚定不移的团结，说明了崇高的社会主义爱国主义精神，这是直到目前所取得的一切成就和今后将取得的成就的基础。帝国主义者和现代修正主义者对阿尔巴尼亚人民共和国和阿尔巴尼亚劳动党的阴谋在这种团结面前碰得粉碎。"},{"type":"paragraph","text":"社论说，在过去的斗争中，国际力量的对比发生了有利于社会主义和和平，而不利于侵略和战争势力的变化。被压迫人民的民族解放斗争取得了不少胜利，其中包括阿尔及利亚人民反对法国殖民主义所取得的胜利。"},{"type":"paragraph","text":"尽管美帝国主义对英雄的古巴进行封锁和威胁，但加勒比海的“烈火之岛”，由于古巴人民及其革命政府的坚定不移的大胆态度，以及国际上的支持，它依然作为自由和社会主义的岛屿而屹立着，并使美帝国主义者的计划遭到失败。企图用好战行动破坏亚洲两大国人民的友谊、破坏这一地区的和平的印度侵略者和帝国主义者们从中华人民共和国那里得到了应得的回答。伟大的中国保卫自己的合法权利的作法和爱好和平的英明政策再次说明了是谁主张和平，是谁主张战争。"},{"type":"paragraph","text":"《人民之声报》说，在这种国际形势下，阿尔巴尼亚人民共和国高举马克思列宁主义旗帜，全力以赴地争取和平政策战胜战争政策，揭露帝国主义的好战政策，揭露现代修正主义者的敌对破坏行动，维护和加强社会主义阵营和国际共产主义与工人运动在马克思列宁主义和无产阶级国际主义基础上的团结，保卫为争取民族独立、社会主义与和平而斗争的各国人民的权利。阿尔巴尼亚人民今后仍将在这些方面作出不遗余力的努力。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"世界形势","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"df0eca84f1"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
