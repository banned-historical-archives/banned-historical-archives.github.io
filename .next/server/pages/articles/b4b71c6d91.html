script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"德决定打击极右势力","authors":["刘钢"],"dates":[{"year":2000,"month":8,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"德决定打击极右势力"},{"type":"paragraph","text":"新华社柏林8月16日电  （记者刘钢）德国政府16日在夏季休假结束后的第一次内阁会议上作出决定，将采取一系列措施支持社会团体、组织和个人与极右势力和排外行为进行斗争。"},{"type":"paragraph","text":"德国政府发言人海耶在会议结束后宣布，政府当天批准的一系列反对极右势力的措施主要包括：德国政府将向开展反对极右势力斗争的群众团体和组织提供经济援助；鼓励社会各界抵制各种形式的排外宣传和活动，教育人们在遇到仇视甚至袭击外国人的事件时要敢于挺身而出进行制止；把加强对青少年的政治与道德教育作为开展全民反对极右势力斗争的一个重要方面。"},{"type":"paragraph","text":"海耶同时还透露，政府已决定为此拨出7500万马克（1马克约合0.46美元）的专项经费。在当天的内阁会议上，德国政府还决定，由内政部出面，设立一个拥有1000万马克的专项基金，向遭受极右暴力袭击的受害者提供必要的帮助。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b4b71c6d91"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
