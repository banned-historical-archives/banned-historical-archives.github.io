script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"委内瑞拉总统佩雷斯强调  第三世界团结起来对付大国剥削","authors":[],"dates":[{"year":1977,"month":12,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"委内瑞拉总统佩雷斯强调"},{"type":"paragraph","text":"第三世界团结起来对付大国剥削"},{"type":"paragraph","text":"据新华社加拉加斯一九七七年十二月十五日电 委内瑞拉总统卡洛斯·安德烈斯·佩雷斯十二月十四日向驻扎在联邦区和米兰达州的武装部队发表年终祝词时指出，第三世界国家只有团结起来才能对付世界工业化大国的剥削。佩雷斯总统在谈到委内瑞拉的铁矿和石油国有化时说，这是“新的委内瑞拉的起点”。“我们已经开始认识到一个新的和伟大的历史目标”。他说，这些国有化措施“是在我们称之为第三世界的决定性力量在世界上出现的时刻，也就是拉丁美洲、亚洲和非洲的所有发展中国家团结一致和协调行动的国际时刻产生的。亚、非、拉发展中国家虽然处于不同的发展阶段，而且存在着重大的意识形态的分歧，但是在只有团结起来才能对付我们历来遭受的世界工业化大国的剥削的信念面前，它们是联合一致的。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"43d6382ab9"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
