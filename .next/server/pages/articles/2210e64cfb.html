" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"毛泽东关于《到韶山》、《登庐山》两首诗给臧克家、徐迟的信","authors":[],"dates":[{"year":1959,"month":9,"day":1}],"is_range_date":false,"parts":[{"text":"毛泽东关于《到韶山》、《登庐山》两首诗给臧克家、徐迟的信","type":"title"},{"text":"臧克家徐迟二位同志：","type":"appellation"},{"text":"信收到。近日写了两首七律，录上呈政。如以为可，可上诗刊。","type":"paragraph"},{"text":"近日右倾机会主义猖狂进攻，说人民事业这也不好，那也不好。全世界反华反共分子以及我国无产阶级内部，党的内部，过去混进来的资产阶级、小资〔产〕阶级投机分子，他们里应外合，一起猖狂进攻。好家伙，简直要把个昆仑山脉推下去了。同志，且慢。国内挂着“共产主义”招牌的一小撮机会主义分子，不过捡起几片鸡毛蒜皮，当作旗帜，向着党的总路线，大跃进，人民公社举行攻击，真是“蚍蜉撼大树，可笑不自量”了。全世界反动派从去年起，咒骂我们，狗血喷头，照我看，好得很。六亿五千万伟大人民的伟大事业，而不被帝国主义及其在各国的走狗大骂而特骂，那就是不可理解的了。他们越骂得凶，我就越高兴。让他们骂上半个世纪吧!那时再看，究竟谁败谁胜?我这两首诗，也是答复那些王八蛋的。","type":"paragraph"},{"text":" 毛泽东九月一日","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]},{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"毛泽东关于《到韶山》、《登庐山》两首诗给臧克家、徐迟的信","authors":[],"dates":[{"year":1959,"month":9,"day":1}],"is_range_date":false,"parts":[{"text":"毛泽东关于《到韶山》、《登庐山》两首诗给臧克家、徐迟的信","type":"title"},{"text":"臧克家徐迟二位同志：","type":"paragraph"},{"text":"信收到。近日写了两首七律，录上呈政。如以为可，可上诗刊。","type":"paragraph"},{"text":"近日右倾机会主义猖狂进攻，说人民事业这也不好，那也不好。全世界反华反共分子以及我国无产阶级内部，党的内部，过去混进来的资产阶级、小资〔产〕阶级投机分子，他们里应外合，一起猖狂进攻。好家伙，简直要把个昆仑山脉推下去了。同志，且慢。国内挂着“共产主义”招牌的一小撮机会主义分子，不过捡起几片鸡毛蒜皮，当作旗帜，向着党的总路线，大跃进，人民公社举行攻击，真是“蚍蜉撼大树，可笑不自量”了。全世界反动派从去年起，咒骂我们，狗血喷头，照我看，好得很。六亿五千万伟大人民的伟大事业，而不被帝国主义及其在各国的走狗大骂而特骂，那就是不可理解的了。他们越骂得凶，我就越高兴。让他们骂上半个世纪吧!那时再看，究竟谁败谁胜?我这两首诗，也是答复那些王八蛋的。","type":"paragraph"},{"text":" 毛泽东九月一日","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG
