script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"愉快兴奋地等待统一分配全国高校毕业生下定决心各大专学院互相挑战并写信给毛主席表示无条件服从政务院指示","authors":[],"dates":[{"year":1951,"month":7,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京十二日电】　一九五一年暑期全国高等学校毕业生正以兴奋愉快的心情等待政府统一分配工作，参加祖国的各项建设事业。"},{"type":"paragraph","text":"在政务院发布关于全国公私立高等学校今年暑期毕业生统筹分配工作对各校加强准备工作的指示后，很多学生就表示愿意无条件服从统一分配，以祖国最需要的工作岗位为自己的最大志愿。北方交通大学、山东农学院、河南大学、安徽大学等校全体毕业生先后发出挑战书、应战书，表示无条件服从统一分配工作。许多挑战条件是:‘不拣工作，不择地区，不讲待遇，不强调个人兴趣。’不仅这样，他们还提出到工作岗位后，保证服从领导，遵守纪律，积极工作，努力学习，团结群众等。清华大学、北京大学、山西大学、同济大学、厦门大学等十余学校毕业生也一班一班地一系一系地互相提出挑战。很多学生给毛主席或教育部写信表示他们愿意服从统一分配。北京农业大学畜牧兽医专修科仲跻全等六个学生在写给中央教育部的信上说:‘我们坚决无条件地服从政府分配，并希望派到较艰苦而最需要畜牧兽医人员的地方如新疆、内蒙、青海等祖国的边疆去。’天津北洋大学土木系和冶金系毕业生于汝寰马魁铎等五十多个学生，先后联名给中央教育部写信要求组织志愿援朝工程队到朝鲜前线工作。"},{"type":"paragraph","text":"极少一部分的对政府统一分配工作的方针不够了解的学生，曾想自找工作、挑拣职位，但他们在学习统一分配工作的规定后，思想有了变化，情愿放弃个人利益，服从政府分配。很多学生在学习讨论会上或班会上批判了自己的不正确思想，认为服从政府统一分配是光荣的。同济大学机械系四十九个毕业生经过班会讨论后，决定在爱国公约中加上了一条:‘保证服从政府分配，到工作岗位上不闹情绪。’很多学生表示不仅要愉快地走上统一分配的工作岗位，同时还要在未来的工作中争取做模范。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"536570160c"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
