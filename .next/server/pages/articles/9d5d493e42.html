" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"各大城市讨论批判《武训传》","authors":["人民日报讯/新华社"],"dates":[{"year":1951,"month":5,"day":27}],"is_range_date":false,"parts":[{"text":"各大城市讨论批判《武训传》","type":"title"},{"text":"人民日报讯/新华社","type":"authors"},{"text":"中共上海市委宣传部号召学习  影剧协会召开常委会进行讨论","type":"subtitle"},{"text":"【人民日报上海二十六日专电】上海市文化教育界开始讨论电影《武训传》。中共上海市委宣传部今日召开了宣传、文化干部会，市委宣传部姚溱副部长号召大家认真学习人民日报社论与讨论电影《武训传》。影剧协会于二十四日晚召开常委会，上海市人民政府文化局于伶副局长指示大家：要很好地讨论这一问题。会议并规定分编导、演员、戏剧三组进行讨论，于二十九日作小结。二十五日下午昆仑影片公司召开了全体人员大会讨论《武训传》。","type":"paragraph"},{"text":"中共东北局宣传部和东北文联号召文教界展开批评自我批评","type":"subtitle"},{"text":"【人民日报沈阳二十六日专电】东北文化教育机关的干部，今日讨论了电影《武训传》。中共中央东北局宣传部刘芝明副部长讲话说：“在东北的干部、群众思想中存在着对阶级敌人的麻痹思想，阶级斗争的观点非常模糊。”刘芝明同志号召：“通过对电影《武训传》的讨论和批判，来加强阶级观点和唯物史观的教育。”东北日报于二十四日刊载了人民日报社论《应当重视电影〈武训传〉的讨论》和党的生活栏《共产党员应当参加关于〈武训传〉的批判》等文，东北文联在二十四日发出了通告，该通告指出：“切不可因为电影〈武训传〉在东北还未上演，而认为没什么影响。各地应切实联系文艺思想和创作，进行批评和自我批评，澄清在这个问题上的混乱思想，提高思想和政治的战斗性。”","type":"paragraph"},{"text":"中南汉口和广州等地文教界开始讨论和批判《武训传》","type":"subtitle"},{"text":"【人民日报汉口二十六日专电】中南及武汉市文化教育界重视对电影《武训传》的讨论。长江日报、南方日报、新湖南日报，先后转载了人民日报社论《应当重视电影〈武训传〉的讨论》。中共中央中南局宣传部副部长熊复于二十六日的长江日报上著文，号召中南地区党的各级组织，应吸取对《武训传》盲目颂扬的教训，采取切实办法，以提高党内外干部思想水平。同日长江日报党的生活栏指出，自今年二月份开始，《武训传》曾连续在武汉、广州、长沙、南昌、开封上演过，有些报纸竟把武训和《武训传》加以无原则的颂扬，说明文化界思想的混乱和资产阶级反动思想侵入战斗的共产党的严重事实，在中南区也同样存在。该栏号召共产党员积极参加关于《武训传》的讨论。","type":"paragraph"},{"text":"【新华社广州二十六日电】广州文教界人士已开始进行对影片《武训传》的讨论。广东省广州市文教机关和中共中央华南分局宣传部在组织各单位主要干部重看该片后，于二十五日举行了座谈会，对武训这一人物和《武训传》所表现的错误思想进行了分析。文艺界人士欧阳山、王为一、陈残云等先后发言。中共中央华南分局宣传部副部长李凡夫也在会上发言，号召大家必须把组织对《武训传》的讨论作为有系统地展开文化思想批评工作的开端，以澄清在华南文教界中存在着的错误和混乱思想。","type":"paragraph"},{"text":"为帮助这一讨论的开展，南方日报、联合报都刊载了人民日报的社论，和其他有关《武训传》的批评文章。","type":"paragraph"},{"text":"北京光明日报和新民报刊载读者批判检讨文章","type":"subtitle"},{"text":"【人民日报讯】北京光明日报、新民报这几天都以显著的地位刊载了文化界展开关于《武训传》讨论的新闻，并发表了许多读者批判“武训精神”和检讨自己过去在这一问题上的错误思想的文章。","type":"paragraph"}],"comments":[],"origin":"《人民日报》1951年5月27日","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9d5d493e42"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
