<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"大字报——政治风云","authors":["北京大学学生"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"大字报——政治风云","type":"title"},{"text":"北京大学学生","type":"authors"},{"text":"政治风云       5302156","type":"subtitle"},{"text":"（作者系物理系学生）","type":"subtitle"},{"text":"天有不测风云，一星期前的报纸还在大鸣大放，但自八日人民日报发出社论〈这是为什么〉后，政治气候为之一变。几天来各报对“反社会主义的言论”进行围剿，真是气势汹汹。追究其导火线，乃卢郁文接到了一封恐吓信。于是人民日报断言“这封恐吓信是当前政治生活中的重大事件。是某些人利用党的整风运动进行尖锐阶级斗争的信号。”于是工人阶级奋起反击，读者纷纷来信声讨反动言论，人民日报明显的态度给于北京大学的大量捍卫社会主义的勇士们以明确的行动方向，纷纷挺身而出痛击“反社会主义言论”，在清华廿九人事件后，沉默已久的党委会也在同日发出冠冕堂皇的对当前整风运动的意见，于是高潮再度来临，与第一次高潮不同者，目前中心似乎不是整风，而是反对反社会主义言论。","type":"paragraph"},{"text":"共产党领导的运动具有丰富的经验，任何运动出现偏差在所难免。应该注意的是运动的主流，不值得对次要的偏差过份地注意，但在这次整风运动中却出现了意外，卢郁文收到了一信恐吓信，就转移了运动的目标。比之以前，如在肃反中人民日报曾为一个无辜的自杀者，发疯者发表过一篇社论！？曾有一回？？奋起痛击藐视法制，蹂躏人权的行为吗？人命比之于恐吓案如何？","type":"paragraph"},{"text":"推测这次整风运动中这种喧宾夺主现象的原因，可见是自发的民主运动，带有知识分子无政府狂热不合共产党的口味，正如在个人崇拜问题上一样，三大主义的最后根源是少数党员的作风和方法问题。凡超过此定理者，一概归之于反社会主义言论，探讨更深刻的原因，不见触及社会制度问题，“也即反对社会主义制度。”合乎这种逻辑口味的整风，不妨称之为“掸灰式”整风。这种整风才是共产党真心诚意领导的。当然即便轻“掸”，倒底还有“灰”下来，内部矛盾也可解决了，其实今天看来矛盾存在并不影响社会的长期存在。对抗性阶级矛盾存在的封建社会也可以维持数千年之久。如果苏联存在内部矛盾，苏共决不在意。苏维埃政权不是稳若盘石吗？接壤西方的小国发生的事情，东方大国似无发生之可能，此乃国情不同，如此看，即使没有整风也无伤大体。","type":"paragraph"},{"text":"尽管人民日报强调共产党仍然要整风，仍然要倾听一切党外人士的善意批评，可是必须在用阶级斗争的观点来观察当前种种现象的指导之下，报上的大鸣大放销声匿迹了。看来这种做法似乎离整风之题太远，倒底不大像话，于是今天人民日报又出来安抚一番，指出“决不能混淆广大群众的善意批评同少数右派份子反社会主义的批评之间的根本界限”，并再三反复强调善意的批评有时也会不正确的，批评者的立场不坚定，认识不全面，甚至附和右派言论，后又指出“不容易一下子就区别出善意的批评和右派分子的恶意批评，所以必须采取谨慎的态度，进行全面分析。”","type":"paragraph"},{"text":"捍卫社会主义的勇士们，大概又可在这篇社论中得出新的行动指南。","type":"paragraph"}],"comments":[],"origin":"北京大学社会主义思想教育委员会编印《北京大学右派分子反动言论汇集》，一九五七年十月。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a264f32331"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
