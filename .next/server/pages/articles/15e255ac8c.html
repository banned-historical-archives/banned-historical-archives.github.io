script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"日本部分资产阶级报纸  怀疑美制对日和约草案","authors":[],"dates":[{"year":1951,"month":8,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"日本部分资产阶级报纸"},{"type":"paragraph","text":"怀疑美制对日和约草案"},{"type":"paragraph","text":"【新华社二十二日讯】电通社二十日讯：从苏联宣布决定参加旧金山对日和会以来，日本报纸愈来愈明显地对美制对日和约草案表示怀疑。资产阶级大报《朝日新闻》在论到这个和约草案和拟议中的“美日安全协定”时说：目前局势的“迅速发展和日本人民的愿望背道而驰，日本人民相信他们已弃绝战争和弃绝重新武装”。"},{"type":"paragraph","text":"《朝日新闻》和另一保守的大报《每日新闻》，都对秘密进行和约谈判表示不满。《朝日新闻》说：国会议员应当要求政府解释政府把日本人民带向什么道路。"},{"type":"paragraph","text":"《每日新闻》抨击吉田首相扬言和约在旧金山会议闭幕后立即生效。该报坚决主张这个和约只有在得到国会两院批准以后才能生效。该报同时审慎地表达出人们对美国在和约签订以后在日本保有基地一事所抱的普遍反对的态度——甚至商界人士也抱反对态度。该报警告说：除非日本“赞同这个协定（日美协定）的宗旨”，否则这个协定“是不会很容易实现的。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"15e255ac8c"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
