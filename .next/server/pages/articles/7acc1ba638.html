script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"对修正主义路线要反复批判","authors":["兴路平"],"dates":[{"year":1973,"month":12,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"驻沪海军某部战士　兴路平"},{"type":"paragraph","text":"刘丽华同志的谈话，使我们认识到:在无产阶级文化大革命取得伟大胜利的情况下，刘少奇、林彪一伙散布的“智育第一”、“业务挂帅”的修正主义黑货的余毒，远没有肃清，我们决不能忘记党的基本路线，放松对修正主义路线的批判。"},{"type":"paragraph","text":"有一段时间，我到集训队学习。当时，部队刚刚经过批林整风。我想，林彪一类骗子的资产阶级军事路线受到了有力批判，没有它的市场了，自己应该集中精力攻一攻业务技术了。有些新战士也认为，现在应该埋头钻业务、啃书本，争取考个好分数。后来，党支部引导我们反复学习了毛主席关于“思想上政治上的路线正确与否是决定一切的”教导，深入批判了资产阶级军事路线，使我们认识到，修正主义路线的余毒依然存在，我们必须坚持革命大批判，不断提高执行和捍卫毛主席革命路线的自觉性，努力改造世界观，为革命练好杀敌本领。认识提高以后，大家革命的积极性很高’政治思想和业务学习都出现了比学赶帮的新气象。"},{"type":"paragraph","text":"实践告诉我们，在红与专、政治与业务关系问题上的两种思想、两种世界观的斗争，永远不会完结，我们一定要彻底批判修正主义的“智育第一”、“业务挂帅”的流毒，以保证我们的各项工作始终沿着毛主席的革命路线前进。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"林彪","type":"人物"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7acc1ba638"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
