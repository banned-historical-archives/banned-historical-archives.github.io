" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji21","name":"毛泽东全集第21卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji21.pdf"],"article":{"title":"长春部队迅即划分为城防与野战两部","alias":"","parts":[{"type":"paragraph","text":"长春部队迅即划分为城防与野战两部！"},{"type":"paragraph","text":"（1946年4月21日）东北局，林，并告李、黄："},{"type":"paragraph","text":"（一）长春我军除杨师已南下外，其余迅即划分为城防野战两部分，以明职责。任城防者，准备死守长春，任野战者，随时调赴前线作战。（二）由保中负责，党政协助，乘长春民众热潮，招募志愿兵一万至数万，干部由长春部队、前线各旅及总部派出，组成多数之新兵团，每团千五至二千人，略加训练，源源开赴四平前线补充各旅，时间愈快愈好，能于十天内外办出成绩否。此外，永吉哈市\"二处亦应招募志愿兵，成立几个新兵团。（三）姜鹏飞伪军俘虏，迅速淘汰反动落后分子，加以必要政治"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央起草的给中共中央东北局和东北民主联军总司令林彪的电报。"},{"type":"paragraph","text":"[2]李、黄，指李富春、黄克诚，当时分别任东北民主联军西满军区政治委员和司令员。"},{"type":"paragraph","text":"[3]杨师，指东北民主联军第七师，师长杨国夫。"},{"type":"paragraph","text":"[4]保中，即周保中，当时任东北民主联军副总司令兼吉辽军区司令员。"},{"type":"paragraph","text":"[5]永吉即永吉县，位于吉林省吉林市东北部。哈市即黑龙江哈尔滨市。[6]姜鹏飞，当时任国民党军新编第二十七军军长。该军系由伪“铁石训练，至可用时补充前线。"},{"type":"paragraph","text":"中央卵马"}],"authors":["毛泽东"],"dates":[{"year":1946,"month":4,"day":21}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":274,"page_end":275},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f163d44809"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
