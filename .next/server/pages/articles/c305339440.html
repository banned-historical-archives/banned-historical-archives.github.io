script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"邓小平副总理和李光耀总理举行首次会谈","authors":[],"dates":[{"year":1978,"month":11,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"邓小平副总理和李光耀总理举行首次会谈"},{"type":"paragraph","text":"两国领导人就共同关心和感兴趣的问题，特别是东南亚的形势交换了意见"},{"type":"paragraph","text":"新华社新加坡十一月十二日电　邓小平副总理和新加坡总理李光耀今天下午在这里的总理官邸在诚挚、坦率和友好的气氛中举行了第一次会谈。"},{"type":"paragraph","text":"会谈中，两国领导人就共同关心和感兴趣的问题，特别是就东南亚的形势交换了意见。"},{"type":"paragraph","text":"中国方面参加会谈的有：外交部长黄华、国务院办公室副主任李力殷、外交部亚洲司副司长王晓云、外贸部四局副局长荣凤祥以及外交部礼宾司副司长戴平。"},{"type":"paragraph","text":"新加坡方面参加会谈的有：副总理兼国防部长吴庆瑞、外交部长拉贾拉南、财政部长韩瑞生、交通部长王鼎昌、外交部高级政务部长李炯才和财政部高级政务部长吴作栋。（附图片）"},{"type":"paragraph","text":"十一月十二日，邓小平副总理和新加坡总理李光耀在总理官邸举行第一次会谈。新华社记者  胥志成 摄 （传真照片）"},{"type":"paragraph","text":"十一月十一日，邓小平副总理和夫人卓琳乘车前往马来西亚总理侯赛因·宾·奥恩的住宅，访问他的家庭。"},{"type":"paragraph","text":"新华社记者　胥志成 摄 （传真照片）"},{"type":"paragraph","text":"邓小平副总理十一月十一日上午前往国家清真寺，向马来西亚已故总理敦·阿卜杜勒·拉扎克表示敬意。邓小平副总理在陵墓前默哀，并向陵墓撒了花瓣。"},{"type":"paragraph","text":"新华社记者　胥志成 摄 （传真照片）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c305339440"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
