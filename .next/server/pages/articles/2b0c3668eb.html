" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中央关于广州市五反工作的指示","authors":["毛泽东"],"dates":[{"year":1952,"month":4,"day":5}],"is_range_date":false,"parts":[{"text":"中央关于广州市五反工作的指示","type":"title"},{"text":"毛泽东","type":"authors"},{"text":"罗瑞卿同志，华南分局，并告中南局：","type":"appellation"},{"text":"瑞卿同志四月三日关于广州五反的报告收到，中央认为这个报告所提出的意见是正确的。上海五反的十条经验已发你们谅已收到，请加研究仿行，特别注意五反中继续维持生产和经营。广州五反必须注意给香港澳门的中国工商户以好的影响，你们注意了这一点是完全对的。广州五反中我们掌握的真实材料甚少，是很大缺点，必须在斗争过程中从争取高级职员去解决这个问题，在这点上上海的经验也是很有用的。上海还有一条经验是先搞大户以利经济，此条在你处是否适用请加研究。又五反时间不宜拖得太长，这就需要严格控制和训练工作队，以十天为一期，先作充分准备，限期完成任务。","type":"paragraph"},{"text":" 中央四月五日","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2b0c3668eb"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
