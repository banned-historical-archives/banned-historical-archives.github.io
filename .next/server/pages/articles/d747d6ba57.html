<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中央关于处理有政治历史问题的大专学校及中等学校教职员的指示","authors":[],"dates":[{"year":1953,"month":12}],"is_range_date":false,"parts":[{"text":"中央关于处理有政治历史问题的大专学校及中等学校教职员的指示","type":"title"},{"text":"全国高等学校和中等学校的思想改造与组织清理工作，至本年暑期，已基本上完成。各地将此项工作中所遗留下的问题适时作一结束是必要的。现将安徽省委宣传部和安徽省人民政府公安厅关于处理有政治历史问题的大专学校及中等学校教职员的意见连同安徽省委、华东局的批语发给各地参考。中央除同意原意见巾的可行部分以及华东局批语的基本原则外，并提出以下几点意见，","type":"paragraph"},{"text":"(一)对于解放后为首组织地下武装，进行暴乱，暗害、破坏、阴谋等活动，颠覆我人民政权及杀害我干部、群众之反革命分子和有血债、民愤之恶霸、会道门首要、惯匪以及职业特务分子，安徽原处理意见认为必须予以逮捕，这是对的。但同时，又说；这些分子如在反动党团特登记时或思想改造中坦白彻底并有立功赎罪表现者，可不予逮捕，而按其情节轻重褫夺其政治权利，予以管制。这样处理，即失之过宽，按这些分子本应处以极刑，惟因其能坦自罪恶或有立功表现，才从宽处理，免予死刑，但有期徒刑还是应该判的。如对其罪恶轻重与立功大小不予以区分，一律免去徒刑，实难以平民愤。因之，对这些分子除个别确有立功表现，且其功足以抵罪者，可考虑不予逮捕外，其他仍应逮捕，并按其功罪程度，分别判刑处理。此外，在这一类的反革命分子中个别在学术上有特殊造诣，为学校或其他工作所急需利用者，可酌量暂时减轻处分，使其戴罪立功。但此类案件的处理，必须报请中央批准。","type":"paragraph"},{"text":"(二)对于教员中的反革命分子应当区别对待，一种是解放后混入教职员中的反革命；另一种是向来主要职业就是教职员而后来被发展为反革命的；按照量刑原则，对于前者应严，对于后者应宽，对于反革命中的特务骨千与反动会道门头子应严，对于一般反动党、团干部与军政官吏应宽。总的说来，在学校范围内，对不管制实不足以平民愤的反革命分子，即必须加以管制，至于某些在解放后确无现行活动，而只是历史问题、表现不积极者，则可由地方公安机关区别具体情况，斟酌予以明的管制(宣布)或暗的管制(不宣布)，暗的管制可以有利予对这类分子的教育与改造。此类教员如仍需令其担任课程教学者，不要公开宣布管制(可采取暗的管制)，亦不必宣布取消其“人民教师的资格”。","type":"paragraph"},{"text":"(三)高等学校中少数不学无术、品质不好、人缘也坏，不堪继续任教，但又无重大罪恶，政治、历史问题基本清楚者，可暂缓处理。中央高等教育部现正研究处理高等学校此类人员的统一办法，下达后各地可研究执行。","type":"paragraph"},{"text":"以上各点，望各地在执行中注意掌握。总之，对于此项遗留问题的处理，必须在省(市)级以上党委的统一领导下认真进行，不应匆促结束，更不应有“在普选前或年底前处理完毕”的硬性规定，以免形成混乱。","type":"paragraph"},{"text":"(附件略)","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d747d6ba57"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
