script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"澳共《先锋报》揭露苏联新领导更加卖力推行投降路线  苏联领导加紧勾结美国和反动派进攻革命运动  澳共（马列主义者）弃绝国内外的修正主义叛徒","authors":[],"dates":[{"year":1966,"month":4,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"澳共《先锋报》揭露苏联新领导更加卖力推行投降路线"},{"type":"paragraph","text":"苏联领导加紧勾结美国和反动派进攻革命运动"},{"type":"paragraph","text":"澳共（马列主义者）弃绝国内外的修正主义叛徒"},{"type":"paragraph","text":"新华社六日讯　墨尔本消息：　澳大利亚共产党（马克思列宁主义者）机关报《先锋报》在三月份出版的第三卷第九期刊载一篇文章，揭露苏联新领导比赫鲁晓夫更加卖力地推行修正主义—投降主义路线，同美国等国反动派结成各种各样的联盟来进攻革命运动。"},{"type":"paragraph","text":"这篇以《澳大利亚共产党（马克思列宁主义者）成立两周年》为题的文章说，两年以前，澳大利亚共产党（马克思列宁主义者）成立了。“澳大利亚共产党（马克思列宁主义者）在意识形态上、在政治上和组织上都同修正主义决裂了。修正主义者抛弃了共产主义，从共产主义分裂出去了。”"},{"type":"paragraph","text":"文章说，“在历史上每一个紧要的转变关头，总是有修正主义出现。"},{"type":"paragraph","text":"“今天，资本主义和帝国主义遇到了比历史上任何时候都更加危急的情况。"},{"type":"paragraph","text":"“全世界人民运动蓬勃发展起来。一切都在动荡之中。帝国主义，特别是美帝国主义，拼命企图使局面稳定下来。他们越是拼命企图挣扎，局面就动荡得更厉害，对他们的制度的挑战也就越强烈。"},{"type":"paragraph","text":"“修正主义就是在这种动荡的局面下出现的。它的作用是要帮助‘稳定’局面：维持住现状。"},{"type":"paragraph","text":"“以赫鲁晓夫为首的苏联修正主义者出现了。他们竭力企图维持现状，不准革命，不准人民斗争。"},{"type":"paragraph","text":"“赫鲁晓夫从国际共产主义运动中分裂出去了。他的继承人，没有赫鲁晓夫的赫鲁晓夫主义者，甚至比赫鲁晓夫更加卖力地在继续推行赫鲁晓夫路线。"},{"type":"paragraph","text":"“他们所以更加卖力，是因为自从赫鲁晓夫垮台以来，帝国主义的处境是更加困难得要命了。"},{"type":"paragraph","text":"“他们同反动派——美国、日本和印度的反动派——结成各种各样的联盟来进攻革命运动。”"},{"type":"paragraph","text":"文章还说，“在澳大利亚国内，修正主义集团追随赫鲁晓夫主义者”而且“这个集团越来越露骨和毫不掩饰地企图使澳大利亚的工人阶级去适应资本主义”。"},{"type":"paragraph","text":"文章说，澳大利亚共产党（马克思列宁主义者）“一直高举澳大利亚民族独立的旗帜，高举争取民主权利、提高生活水平和为争取实现无产阶级专政而斗争的旗帜。最近两年来，它大大加强了维护马克思列宁主义思想的纯洁性的斗争。它要求认真学习马克思列宁主义的经典著作——马克思、恩格斯、列宁、斯大林和毛泽东的著作。只有那些经典著作才说明，理论和实践一致是革命斗争的精髓所在。”"},{"type":"paragraph","text":"文章最后说，“澳大利亚共产党（马克思列宁主义者）弃绝国内外的修正主义叛徒。它无疑要越来越努力地工作，团结百分之九十以上的人民来同美帝国主义作斗争。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ad957d4b2e"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
