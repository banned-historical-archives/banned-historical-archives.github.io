script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"古巴人民的心永远向往毛主席毛泽东思想已在古巴人民心中扎下了根，任何力量都拔不掉","authors":[],"dates":[{"year":1966,"month":11,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京电　哈瓦那消息:古巴人民无限热爱和敬仰毛主席，热情歌颂战无不胜的毛泽东思想。"},{"type":"paragraph","text":"在古巴，许多劳动人民见到中国同志时，总是竖起大拇指满怀深情地说:“毛泽东!”用以表达他们对中国人民的伟大领袖毛主席的无限崇敬。"},{"type":"paragraph","text":"古巴工人热爱毛主席的感情最深，他们用最明确的语言来表达古巴工人阶级对毛主席的爱戴。一位建筑工人说:“毛主席最正确，最坚定，毛主席不仅集中了中国人民的智慧，也集中了全世界劳动人民的智慧，创造性地发展了马克思列宁主义。毛主席不愧为世界革命的领袖。”他还说:“毛主席经常和群众在一起，相信群众，把中国七亿人民统一起来。中国人民有这样一位英明的领袖真幸福。”"},{"type":"paragraph","text":"一位老工人说:“我家里挂着毛主席像，我还有一面中国国旗。毛主席是当代最伟大的领袖。不管怎样，我就是这个看法。”他说:“毛主席辛勤地工作，把自己的一切都献给了人民。”"},{"type":"paragraph","text":"古巴工人非常爱读毛主席的书。一位汽车修配青年工人说，他过去读过一遍毛主席的《矛盾论》，最近他又把这部著作重读了两遍。他说:“我越读越感到《矛盾论》的内容非常丰富、非常正确，它坚定了我对毛主席的信仰。”"},{"type":"paragraph","text":"许多古巴人都读过《毛泽东选集》第四卷和毛主席的其它主要著作。一位教师说:“古巴人民都爱读毛主席著作。谁要是得到一本《毛泽东选集》，就感到十分幸福。”一位文化工作者说:“我一直阅读毛主席的著作。我阅读毛主席的书简直读得入迷了。毛主席的著作是多么深刻，多么正确，多么伟大。”"},{"type":"paragraph","text":"许多古巴人有了西班牙文版的《毛泽东选集》第四卷还不满足。他们看到中国同志就问:“什么时候出版西班牙文的《毛泽东选集》第一、二、三卷?”"},{"type":"paragraph","text":"一位古巴朋友说:“毛主席的一部分著作传入古巴，对古巴作出了很大的贡献。毛泽东思想在广大古巴人民心中已深深地扎下了根子，这是任何力量都不能拔掉的。”"},{"type":"paragraph","text":"不管天空出现什么乌云，古巴劳动人民总是无限热爱毛主席，他们的心向往着毛主席。今年七月，毛主席畅游长江的消息传到古巴，许多古巴朋友向中国同志表示热烈祝贺。一个机床工人说:“当我知道毛主席再次畅游长江的时候，感到很高兴。毛主席身体十分健康，不但使中国人民高兴，而且使全世界革命人民都感到高兴。”一个内地的古巴人在中国杂志上看到了印着毛主席像的三张邮票，他把邮票剪下来贴在家里，并写信给中国同志说:“作为一个古巴人，我对你们国家，对你们亲爱的领袖毛泽东主席非常钦佩。如果我能得到一张毛主席的画像，对我来说将是莫大的光荣。”"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"eea71423cb"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
