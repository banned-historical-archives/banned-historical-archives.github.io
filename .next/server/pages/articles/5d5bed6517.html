script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"起来!饥寒交迫的奴隶日本人民坚苦斗争 反抗美帝奴役统治","authors":[],"dates":[{"year":1951,"month":1,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"全日本人民，特别是工人、青年们为了实现和平、民主、和民族的独立，正广泛有力地进行着反对美国帝国主义的侵略战争，反对美国把日本作为侵略亚洲的总基地，反对美日片面媾和等问题上，展开了炽烈的斗争运动。"},{"type":"paragraph","text":"这种斗争进行得最尖锐的还是和日常经济斗争结合起来的工人群众的斗争。美日反动派企图用解雇、监禁、死刑来恐吓威胁，甚至派遣武装的特务监守工场，但醒觉了的日本工人大众，不但没有被吓倒，而是更坚决的斗争下去。同样地，美日反动派还竭力阻挠中日两国人民的友好活动，任意迫害一切民主进步力量，非法查封进步报刊的发行，这一切说明在美国积极扶植下的日本法西斯势力是更加露骨地活跃了。但尽管美国和日本反动政府对日本人民的镇压，千百万日本人民都不愿充当新战争挑拨者的工具。反抗美国奴役统治的运动正用各种各样的方式，坚纫不屈地为使日本变成真正民主国家而斗争着。"},{"type":"paragraph","text":"现阶段日本人民的解放斗争是艰苦而困难的，但由于日本共产党正确的领导和日本人民的团结一致，必将推翻美国占领军及吉田卖国政府对于日本的横暴统治，从而获得日本民族独立的完全胜利。"},{"type":"paragraph","text":"\u003cIMG alt=请插入2号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1951\\01\\511e020601.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e【上】日本工人为了反对军国主义的复活和反对殖民地化的低薪制而斗争。图为日本工人在争取合法利益时，遭到吉田反动政府警察无理的殴打情形。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入2号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1951\\01\\511e020602.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e【下】美日反动派恐怖日本各业工人展闻广泛的罢工，不得不用武力来“压制”工人工作。图为在电气工厂武装的特务监视工人工作情形。(新闻摄影局稿)\u003c/FONT\u003e"}],"comments":[],"origin":"新闻摄影局","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5d5bed6517"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
