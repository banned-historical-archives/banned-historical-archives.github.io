script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"罢课示威　占领校舍　武力抗暴  美进步学生反对种族歧视斗争蓬勃发展  拉美一些国家农民不断展开反对美国和本国大庄园主剥削的斗争","authors":[],"dates":[{"year":1968,"month":11,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"罢课示威　占领校舍　武力抗暴"},{"type":"paragraph","text":"美进步学生反对种族歧视斗争蓬勃发展"},{"type":"paragraph","text":"拉美一些国家农民不断展开反对美国和本国大庄园主剥削的斗争"},{"type":"paragraph","text":"新华社二十二日讯  华盛顿消息：最近，美国各地大专院校的许多黑人和白人学生，不怕警察的野蛮镇压，进行罢课、示威、占领校舍、绝食以及武力抗暴斗争，抗议反动的资本主义教育制度对黑人的种族歧视，抗议美帝国主义侵略越南。"},{"type":"paragraph","text":"加利福尼亚州州立旧金山学院学生从十一月六日开始连续举行罢课斗争，抗议学院当局将一名维护黑人学生自卫权利的黑人讲师解职。十三日，罢课学生同前去镇压他们的法西斯警察进行了一场激烈的搏斗。整个学院不得不关闭达一星期之久。二十一日，学院当局同学生代表举行谈判。在谈判中，学院当局无理拒绝学生代表提出的正当要求，从而进一步暴露了它的反动面目。接着，数以千计的黑人学生在许多白人学生的支持下，在校园内举行了声势浩大的示威，并同开进校园镇压示威学生的大批警察展开了英勇的搏斗。学生们的反抗粉碎了反动当局企图用武力强迫他们复课的计划。"},{"type":"paragraph","text":"在威斯康星州州立奥什科什大学，一百多名黑人学生二十一日占领校长办公室，勒令校长答应黑人学生的合理要求，其中包括承认黑人学生组织，聘请黑人教师等。在这些要求遭到拒绝后，黑人学生们举行示威，并把校长办公室的窗子和打字机等砸烂，对学校当局的无理行径，表示强烈的愤怒。"},{"type":"paragraph","text":"印第安纳州圣母院大学的学生近几天来接连举行示威，抗议校方同中央情报局和为侵越战争制造凝固汽油弹的道氏化学公司勾搭。三十多名学生为此举行绝食。二十日，几十名学生躺卧在校门口，阻止中央情报局人员进入校园。科罗拉多州州立大学的学生，最近也展开斗争，反对道氏化学公司招募人员到该校进行活动。"},{"type":"paragraph","text":"据新华社二十日讯　拉丁美洲一些国家的农民，最近为反对美国和本国大庄园主对他们的残酷奴役和剥削，不断展开了顽强的斗争。"},{"type":"paragraph","text":"十月底，在厄瓜多尔瓜亚斯省的许多地方，都发生了大规模的农民夺地斗争。十月二十八日，六百名无地农民占领了瓜亚斯省纳兰霍县一个属于美国资本“厄瓜多尔种植园”的“索列达德”大庄园的部分土地。同时，在这个省的埃尔恩帕尔梅镇，在瓜亚基尔、米拉格罗和瓜博等地方的农民，都进行了一系列占领土地的斗争。"},{"type":"paragraph","text":"在同一时期里，瓜亚斯省“前景”、“皮莫查”、“瓜哈拉”等农庄的农业工人分别举行了罢工，反对庄园主对他们的剥削和压迫。"},{"type":"paragraph","text":"十月底，在秘鲁卡哈马尔卡省的科斯潘地区，农民们占领了“库尔基马尔卡”庄园。他们用石块等抗击了反动派的武装镇压，粉碎了反动分子的袭击，坚守了他们占领的土地。"},{"type":"paragraph","text":"在智利，奥伊金斯省的六千多名农业工人最近宣布不定期罢工，要求获得土地。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c2293f7049"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
