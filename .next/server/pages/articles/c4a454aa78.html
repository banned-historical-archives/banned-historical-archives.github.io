" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"陕西关中各县宰杀耕牛现象严重","authors":[],"dates":[{"year":1952,"month":11,"day":22}],"is_range_date":false,"parts":[{"text":"陕西关中各县宰杀耕牛现象严重","type":"title"},{"text":"【西北总分社讯】陕西干县、武功、大荔等县农村宰杀耕牛现象严重。据当地干部和群众反映：西安市的一些牛肉商和农村的牛贩合伙在咸阳、兴平、醴泉、盩厔、武功等县收买耕牛，然后集中在铁路附近宰杀，用火车载运西安出卖。兴平马嵬车站每天要向西安运几十笼牛肉（一头牛的肉装两笼半），有时是整车皮的装运。有些人将耕牛的腿打断，然后到税务局报“坏牛”，便宰杀了。","type":"paragraph"}],"comments":[],"origin":"新华社《内部参考》1952年11月22日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c4a454aa78"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
