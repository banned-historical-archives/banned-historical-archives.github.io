<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"彻底批判资产阶级教育思想  四川大学依靠群众改进教学工作","authors":[],"dates":[{"year":1958,"month":2,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"彻底批判资产阶级教育思想"},{"type":"paragraph","text":"四川大学依靠群众改进教学工作"},{"type":"paragraph","text":"新华社成都25日电　四川大学在整改中发动教师和学生揭发批判资产阶级教育思想，依靠群众力量改进教学工作。"},{"type":"paragraph","text":"四川大学改进教学工作的专题鸣放，是从1月中旬开始的。一个月来，师生们在大字报、座谈会上，揭发出许多教师在教学中存在的脱离政治、脱离实际的资产阶级思想。他们声称“教书不教人”，有意无意地在学生中散布“科学无阶级论”“冷门成专家论”和所谓“冷淡政治、酷爱业务”的“冷酷论”等错误论调。有的教师甚至宣传要学好功课应该像和尚一样“超凡出世”。理科各系教学中理论脱离实际的情况比较严重。生物系一些教师甚至扬言生物学是专门研究理论的，实践是医学院和农学院的事。他们在教学中很少联系生物科学在国民经济中的意义。中文等系的教学工作存在颂古非今的复古主义和单纯艺术观点等倾向。"},{"type":"paragraph","text":"不少教师轻视现代文学，无批判地推崇古典文学，有的甚至把“文心雕龙”奉为文艺理论的经典。他们在讲课中往往脱离思想性而只谈作品的艺术性，有的甚至宣称文学只是享乐。有的教师在讲解嵇康、阮籍时，不着重讲解他们对封建统治者的反抗和叛逆精神，而单纯宣扬他们的消极颓废思想。历史系教师往往以历史名词的解说代替对历史发展规律的阐述，有的人偏爱烦琐的考证，在讲宋史时，把当时开封的烧饼店讲得很详细，对文天祥却只字不提。不少教师在教学中缺乏马列主义的历史唯物主义观点，过多宣传帝王将相及英雄人物的活动，忽视人民群众在历史中的作用。"},{"type":"paragraph","text":"经过群众性的批评、揭发，教师们认识到资产阶级教育思想的严重危害性，许多教师自觉地贴出大字报或在座谈会上检查自己的错误，表示改进的决心。中文系教师们经过多次会议检查批判后，一致认为树立马列主义文艺思想的领导，是改进教学的中心问题，决定加强马克思列宁主义文艺理论的学习。经济系为了克服教学中理论脱离实际的缺点，准备邀请四川省财经部门负责人定期作当前财经工作主要问题的报告。生物系教师决定从加强生产实习和毕业论文指导以及改进科学研究工作等方面着手，加强联系实际工作。中文、经济等系许多教师正在根据自己的缺点，制订改进教学和加强学习的个人计划。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b89920c3b5"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
