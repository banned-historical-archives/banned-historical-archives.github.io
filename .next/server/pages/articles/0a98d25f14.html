" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"毛泽东对大树特树绝对权威的提法等的批语","authors":["毛泽东"],"dates":[{"year":1967,"month":12,"day":17}],"is_range_date":false,"parts":[{"text":"对大树特树绝对权威的提法等的批语","type":"title"},{"text":"毛泽东","type":"authors"},{"text":"林、周、中央及文革各同志：","type":"appellation"},{"text":"（一）绝对权威的提法不妥。从来没有单独的绝对权威，凡权威都是相对的，凡绝对的东西都只存在相对的东西之中，犹如绝对真理是无数相对真理的总和，绝对真理只存在于各个相对真理之中一样。","type":"paragraph"},{"text":"（二）大树特树的说法也不妥。权威或威信只能从斗争实践中自然地建立，不能由人工去建立，这样建立的威信必然会垮下来。","type":"paragraph"},{"text":"（三） 党中央很早就禁止祝寿，应通知全国重申此种禁令。","type":"paragraph"},{"text":"（四） 湖南的集会应另择日期。","type":"paragraph"},{"text":"（五） 我们不要题字。","type":"paragraph"},{"text":"（六） 会议名称，可同意湖南建议，用第一方案。","type":"paragraph"},{"text":"以上各点请在一次会议上讨论通过为盼。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"湖南文革","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0a98d25f14"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
