script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"焦作矿务局机修厂团委在学习无产阶级专政理论中  教育青年抵制资产阶级思想侵蚀","authors":[],"dates":[{"year":1975,"month":8,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"焦作矿务局机修厂团委在学习无产阶级专政理论中"},{"type":"paragraph","text":"教育青年抵制资产阶级思想侵蚀"},{"type":"paragraph","text":"据新华社郑州一九七五年八月十日电　焦作矿务局机修厂共青团委用无产阶级专政理论武装青年头脑，提高青年工人的阶级斗争和路线斗争觉悟，增强抵制资产阶级思想侵蚀的能力，使工人阶级的新一代茁壮成长。"},{"type":"paragraph","text":"焦作矿务局机修厂是一个有六十多年历史的老厂，随着煤炭工业的发展，大批青年参加了工人阶级行列。目前全厂职工中有三分之一是青年工人，成为工厂抓革命、促生产的一支突击力量。毛主席关于理论问题的重要指示发表后，厂团委认真进行学习，他们在党组织的领导下，深入车间调查研究，联系阶级敌人争夺腐蚀青年工人的事实，展开了讨论。他们认识到，资产阶级还在通过各种渠道，利用各种手段，来争夺腐蚀青年一代。共青团作为党的助手，必须用无产阶级专政理论武装青年的头脑，不断提高青年们抵制资产阶级思想侵蚀的能力。厂团委基于这种认识，积极组织共青团员和青年工人学好无产阶级专政的理论。"},{"type":"paragraph","text":"三车间一个青年工人放松了世界观改造，沾染了资产阶级坏习气，走上犯错误的道路。共产党员、老工人朱泽普在党、团组织的支持与帮助下，主动找那个青年工人谈心，四次进行家庭访问，请他的父母对他忆苦思甜；同时，车间青年业余理论学习小组也吸收那个青年工人参加学习，帮助他学习无产阶级专政理论。通过学习和帮助，那个青年工人认识了自己的错误，勇敢地起来揭发了幕后教唆犯的罪行。最近，他被群众推选上了厂办工人大学。厂团委通过对这件事的分析，教育青年工人要时刻提高警惕，坚决同资产阶级思想的侵蚀作斗争。"},{"type":"paragraph","text":"这个厂团委在组织共青团员和青年工人学习无产阶级专政理论中，还注意密切联系青年的思想实际，做过细的思想政治工作。这个厂的六车间是新建立起来的一个炼铁车间，其中青年工人占百分之八十以上。他们中有些人进厂后不久，觉得学炼铁又脏又苦又累，不安心炼铁工作。针对这种思想，车间团支部组织青年工人反复学习马克思、恩格斯、列宁关于无产阶级专政的部分论述，学习毛主席的《为人民服务》等著作，并请参加过一九二五年焦作煤矿罢工的老工人阎春旺和在旧社会苦大仇深的老工人甄国风对青年们进行革命传统教育和阶级教育，使大家提高了觉悟。共青团员、炉前工侯星光说：“党需要炼铁，我就干它一辈子。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ea59f4085a"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
