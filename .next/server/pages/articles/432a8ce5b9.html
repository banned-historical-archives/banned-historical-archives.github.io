" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoistlegacy.de-5073","name":"中共中央关于湖南问题的若干决定","author":"中共中央","internal":false,"official":false,"type":"unknown","files":[],"article":{"title":"中共中央关于湖南问题的若干决定","dates":[{"year":1967,"month":8,"day":10}],"is_range_date":false,"authors":["中共中央"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"中共中央办公厅、国务院秘书厅文化革命联合接待室, 无产阶级文化大革命有关文件汇集（第三集）, 201-205","tags":[{"name":"湖南","type":"主题/事件"},{"name":"武斗","type":"主题/事件"},{"name":"造反派","type":"主题/事件"},{"name":"支左","type":"主题/事件"}],"parts":[{"type":"paragraph","text":"已阅，同意。"},{"type":"subtitle","text":"毛泽东"},{"type":"subtitle","text":"八月七日下午六时"},{"type":"title","text":"中共中央关于湖南问题的若干决定"},{"type":"subtitle","text":"（一九六七年八月十日）"},{"type":"paragraph","text":"一、湖南省军区党委常委《关于支左工作中所犯错误的捡查报吿》对前段支左工作中所犯的方向路线错误，进行了认眞的自我批评，态度是好的，认识是比较深刻的。军区打击“湘江风雷”革命群众组织，压制“工联”等革命造反派的错误，军区党委常委刘子云、政治部副主任崔琳等同志应负重要责任。除了军区负责之外，中央文革小组对湖南省军区二月三日关于“湘江风雷”报告所发的“二•四批示”是错误的，“湘江风雷”是一个群众人数较多的革命组织，在大发展中混入了极少数的坏人，造成内部成份不纯，出现了一些缺点错误，但是不应该因此否定这个组织。在这个问题上，中央是有责任的。从这里得到敎训，未经调查清楚，何必那样匆匆忙忙地根据一面之词发出“二·四批示”呢？因此，中央要负主要的责任。中央相信，中央和省军区在深刻地检查并认眞地改正错误以后，将会赢得广大革命群众的支持和拥护，省军区将能更好地完成“三支”“两军”的光荣任务。"},{"type":"paragraph","text":"二、中央已经决定改组省军区，并将着手成立以黎原、华国锋、章伯森等同志为首的有革命群众组织代表、军队代表、革命领导干部参加的湖南省革命委员会筹备小组，领导全省的无产阶级文化大革命和工农业生产。"},{"type":"paragraph","text":"三、各革命群众组织应该在湖南省革命委员会筹备小组的领导下，在毛主席无产阶级革命路线基础上加强团结，开展革命的大批判，狠抓革命，猛促生产，保証完成和超额完成今年的工农业生产任务。"},{"type":"paragraph","text":"各革命群众组织必须警惕敌人挑拨离间、制造分裂、挑起武斗、破坏革命大团结的阴谋；应该开展内部整风，整顿思想、整顿组织、整顿作风，克服无政府主义倾向，加强无产阶级的革命性、科学性、组织纪律性，紧紧掌握斗争的大方向，在革命的大批判中，实现革命的大联合。"},{"type":"paragraph","text":"对于受蒙蔽的群众，决不能打击报复，一定要遵照毛主席关于正确处理人民内部矛盾的原则，积极地耐心地做好政治思想工作，欢迎和支持一切受蒙蔽的群众起来革命，争取和团结受蒙蔽的群众，最大限度地孤立敌人。"},{"type":"paragraph","text":"四、湖南省赴京汇报代表团双方签订的《关于立即坚决制止武斗的协议》很好。各群众组织必须认眞执行，坚决制止武斗，反对挑动农民进城和工人、学生下乡搞打、砸、抢、抄、抓等活动，严防地、富、反、坏、流氓分子捣乱破坏。"},{"type":"paragraph","text":"各革命群众组织应在湖南省革命委员会筹备小组的领导下，建立群众性的革命武装，保护国家财产，协助解放军维护社会的革命秩序。不管哪一派，今后都不准以任何借口夺取解放军的枪枝、抢劫军火仓库和各种军用物资。"}],"alias":""},"tags":[{"name":"中央文革","type":"人物"},{"name":"湖南文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"武斗","type":"主题/事件"},{"name":"人民内部矛盾","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"军队支左","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"432a8ce5b9"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
