" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji50","name":"毛泽东全集第50卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji50.pdf"],"article":{"title":"关于军队支左问题的指示","alias":"","parts":[{"type":"paragraph","text":"关于军队支左问题的指示"},{"type":"paragraph","text":"（1967年8月）"},{"type":"paragraph","text":"小资产阶级当权，大资产阶级就要上台。军队支左有很大好处，就是使军队本身受到教育，他们从实际斗争中会体会到这个问题。支左不仅支革命群众，支左派组织，不仅看到社会各方面存在两条路线斗争，同时也能看到军队里存在两条路线斗争，看到阶级斗争也反映到军队里边，军队通过支左也同样把问题暴露在社会上，从而加强军队，提高我们军队的思想水平，这才是唯物主义辩证法。"},{"type":"paragraph","text":"不能把我们的军队搞乱了，解放军内部的问题，可以一个省一个省地来谈判。"},{"type":"paragraph","text":"行动要愈快愈好，工作不要太急，要做到家。\"[1]这是对增派往温州的六二九九部队的指示。"}],"authors":["毛泽东"],"dates":[{"year":1967,"month":8}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":66,"page_end":66},"tags":[{"name":"毛泽东","type":"人物"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"军队支左","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"47a52fc9a4"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
