script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"西北农学院师生员工积极参加教育革命大辩论  批驳修正主义的奇谈怪论","authors":[],"dates":[{"year":1976,"month":2,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"西北农学院师生员工积极参加教育革命大辩论"},{"type":"paragraph","text":"批驳修正主义的奇谈怪论"},{"type":"paragraph","text":"据新华社西安电　西北农学院的师生员工在教育革命大辩论中，用本校教育革命的丰硕成果，批驳了教育界种种修正主义的奇谈怪论，有力地回击了右倾翻案风。"},{"type":"paragraph","text":"教育革命大辩论开展以后，西北农学院革命师生员工群情振奋，不到一个月的时间就召开了五百多次辩论会，写了二千五百多张大字报，办了一批大批判专栏。他们联系本校实际，摆事实、讲道理，集中批判了教育质量“今不如昔”的谬论。"},{"type":"paragraph","text":"这个学院从一九六九年办教育革命试点班以来，共招收工农兵学员三千六百多名。这些学员带着迅速改变家乡面貌、建设社会主义新农村的强烈愿望来到学校，学习目的明确，学习期间就为农业学大寨运动作出了贡献。近几年，学院已经有一千三百多名学员毕业后回到农业生产第一线，其中有四百多人回到原来所在生产队。师生员工们用事实批判了旧大学培养学生学农不爱农、不为农的状况。"},{"type":"paragraph","text":"陕南教学基地的师生，用在三大革命运动第一线办学，把工农兵学员培养成为反修防修的战士、农业学大寨的带头人的事实，批驳了“今不如昔”的谬论。陕南教学基地在农村办学以后，把工农兵学员放到火热的三大革命运动中去锤炼。学员进校后，就有计划地到和生产队合办的“三田”（种子田、试验田、高产田）里或分组到各个挂钩队去，一面参加阶级斗争，开展社会调查，上好阶级斗争这门主课，一面参加生产实践、科学实验，积极学习农业科学理论，上好社会主义文化课，使理论和实践，教育和生产，知识分子和工农群众紧密结合在一起。"},{"type":"paragraph","text":"回击教育界右倾翻案风的战斗在西北农学院深入展开后，广大师生精神面貌发生了显著变化，学校教育革命也有了新的发展。农机系的工农兵学员在教育革命大辩论中，一边挥笔战斗，一边在工人和教师的指导下，试制成功了果树施肥挖坑机。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"教育革命","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9076eafa1e"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
