" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"黎原同志接见湘南地区赴长控告团的重要指示","authors":[],"dates":[{"year":1967,"month":10,"day":9}],"is_range_date":false,"parts":[{"text":"黎原同志接见湘南地区赴长控告团的重要指示","type":"title"},{"text":"时间：一九六七年十月八日上午九时四十五分至十二时十五分","type":"paragraph"},{"text":"地点：省委办公室二楼会议室","type":"paragraph"},{"text":"黎原同志在听了与会代表汇报湘南地区滥杀人的情况以后，就湘南地区的重要情况作了如下重要指示：","type":"paragraph"},{"text":"湘南地区杀人事件是非常严重的，是党内一小撮走资派和地富反坏右挑起的，他们以极“左”的面目出现，企图扰乱我们的阶级阵线，借杀四类分子为名，破坏无产阶级专政，破坏无产阶级文化大革命。尽管各县具体情况不一样，但总的性质是一样的，是个反动事件。","type":"paragraph"},{"text":"省革筹小组和四十七军从了解到道县杀人事件起，就非常重视。开过十多次会议，发过若干次电报，打过若干次电话，派飞机散发了传单，但仍旧没有得到制止，而且有所蔓延。你们反映的情况我们都知道了，驻道县、江永、零陵、东安的部队，反映了很多情况，基本一致。前阶段我们根据周总理指示，由内向外解决，首先集中力量解决长沙、湘潭、浏阳等地的问题。所以去零陵地区的部队比较少，力量不足。","type":"paragraph"},{"text":"根据当前情况，省革筹小组和四十七军坚决采取措施制止杀人事件，主要措施是：每个县派去毛泽东思想宣传队，充分发动群众，大力宣传毛泽东思想，大力宣传党中央的方针政策；每个县都派去武装部队，保卫文化大革命，保卫无产阶级专政。部队去了以后，坚决站在毛主席革命路线一边，支持革命造反派。坚决制止杀人事件，不管杀什么人，都要报经中央批准，对挑动杀人事件的党内走资派和坏头头以及地富反坏右分子，要断然采取专政措施，经过批准，逮捕法办几个。大家回去，要协助部队做好这一工作，但要注意，不要搞报复屠杀，对受蒙蔽的贫下中农，主要是宣传毛泽东思想，讲清政策，耐心做好政治思想工作，教育他们真正站到毛主席的革命路线一边来。再一条措施，就是把各区武装部的负责人集中学习。党中央对湖南问题表态后，有的思想转过来了，有的还没有完全转过来，因此，要很好地组织他们学习。","type":"paragraph"},{"text":"接着黎原同志回答了代表提出的要求：","type":"paragraph"},{"text":"一、由省革筹小组和四十七军立即签发关于制止湘南地区杀人事件的紧急通令；","type":"paragraph"},{"text":"二、立即收缴保守组织的枪支、弹药；","type":"paragraph"},{"text":"三、对杀人凶手及幕后指挥者，经查明后，坚决逮捕法办；","type":"paragraph"},{"text":"四、湘南地区被迫外出的革命造反派、革命群众，应争取尽早地回到本地区，当地驻军可以保证他们的人身安全。","type":"paragraph"},{"text":" 黎原（签字）    67年10月9日湘南地区赴长控告团   67年10月9日","type":"paragraph"}],"comments":[],"origin":"根据当时的传单打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4fcd424f02"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
