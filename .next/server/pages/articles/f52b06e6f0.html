" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"毛泽东对中央关于征求党内外对继续镇压反革命和举行大赦问题的意见的通知稿的批语和加写的一段话","authors":["毛泽东"],"dates":[{"year":1955,"month":5,"day":26}],"is_range_date":false,"parts":[{"text":"毛泽东对中央关于征求党内外对继续镇压反革命和举行大赦问题的意见的通知稿的批语和加写的一段话","type":"title"},{"text":"毛泽东","type":"authors"},{"text":"一","type":"subtitle"},{"text":"即送刘、周、朱、彭真、小平阅发。","type":"paragraph"},{"text":" 毛泽东五月廿六日","type":"paragraph"},{"text":"改了一点。","type":"paragraph"},{"text":"二","type":"subtitle"},{"text":"[鉴于]应否大赦及如何[大赦]的问题，[是一个]关[连到广大群众的政治行动，必须在党内党外更多地交换意见之后，才能作]出[决定。因此，请各省市委对这个问题作一次专门的讨论，同时以政协为主体举行一次座谈会，然后将党内党外对这个问题(即应否大赦及如何大赦的问题)的意见，于六月廿日以前报告中央，以便确定是否要向全国人民代表大会提出大赦的议案。]或者第一个五年计划期内不举行大赦，以避免可能产生的不利影响(反革命气焰高涨，人民不高兴)，过几年再谈这件事，这种意见，民主人士中也有不少人提出。究以何者为宜，请你们征询电告。","type":"paragraph"},{"text":"注：[ ]外为毛泽东加写或改写的文字。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f52b06e6f0"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
