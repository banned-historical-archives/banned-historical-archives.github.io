" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"重庆等地发现干部、商人贪污爱国捐款事件","authors":[],"dates":[{"year":1951,"month":11,"day":28}],"is_range_date":false,"parts":[{"text":"重庆等地发现干部、商人贪污爱国捐款事件","type":"title"},{"text":"【西南总分社二十八日讯】川北、重庆等地连续发现部分干部、商人贪污爱国捐款的事件。川北南部县商人王兴发、陈季良贪污捐款一百九十三万元，经法院公审后，已判有期徒刑。重庆市人民法院最近接连处理两起贪污捐款案，其中水果菜蔬业同德行经理王化贪污一百万元，判处一年徒刑。贪污的人不少是基层干部，如川北潼南六区唐坝乡十二村干部黄清、刘志光二人共同贪污三十多万元；四村干部黄汉乐贪污三十多万元。群众对此极表不满，要求严办，不少人因此怀疑究竟把钱交给志愿军没有？","type":"paragraph"},{"text":"形成贪污的原因，主要是没有严格的收款、缴款制度，任何干部都可以收款，也可以乱发动群众捐款。有的地区从去年冬发动捐献慰劳品以来，一直未认真清理过。","type":"paragraph"}],"comments":[],"origin":"新华通讯社编《内部参考》1951年11月30日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7d87d925e7"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
