script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"决不搞资产阶级那一套","authors":[],"dates":[{"year":1975,"month":4,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"决不搞资产阶级那一套"},{"type":"paragraph","text":"去年春天的一个晚上，广东省潮阳县两英公社古厝大队有个社员，为了想把户口迁到城市去，给大队党支部副书记钟乌必家里送来一副金耳环和一些钱。钟乌必回家发现后，叫爱人连夜将这些东西送了回去。"},{"type":"paragraph","text":"这件事引起钟乌必的深思。他意识到，打退资产阶级糖衣炮弹的进攻，这是坚持无产阶级专政下继续革命的一场斗争。在这场斗争中，不仅自己要坚持党性，站稳立场，还要使社员群众认清资产阶级思想作风的危害性。于是，钟乌必亲自找到那位社员，和他一起学习毛主席的有关教导，一起批判孔孟之道，劝他安心务农，并说明请客送礼是地主资产阶级的庸俗作风，贫下中农决不能搞这一套。那个社员提高了认识，承认了错误。"},{"type":"paragraph","text":"大队党支部还抓住这件事，向党员、干部进行路线斗争教育。大家联系实际重温毛主席教导，对无产阶级专政条件下阶级斗争的特点有了新的认识，涌现出许多自觉地拒腐蚀的好人好事。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7290c18c66"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
