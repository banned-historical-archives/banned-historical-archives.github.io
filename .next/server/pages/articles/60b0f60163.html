<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"费孝通交代在苏州无锡的活动","authors":["费孝通"],"dates":[{"year":1957,"month":8}],"is_range_date":false,"parts":[{"text":"费孝通交代在苏州无锡的活动","type":"title"},{"text":"费孝通","type":"authors"},{"text":"我是4月20日(？)左右到苏州，准备下乡，苏州市民盟市委知道了，要我开个会，我同意在晚上约市委委员和各校组织少数人谈一谈。大约有十几人到会。谈了若干中校里的事。其中有些人反映了一些对学校党政不满意的事。","type":"paragraph"},{"text":"5月20日(?)左右从乡间回来，苏州盟市委又要我作报告，我起初说可以谈谈科学研究。他们不同意，我表示报告不能做，盟员要见面，可以分别少数人谈谈，他们就组织了三个座谈会，第一次在师院，第二、第三两次是中学和机关盟员，在这些会上我都发了言，鼓励大家鸣放，提意见，有人说怕报复，我说报复不能保证没有，但是要相信党，不要怕。现在想来，这是点火性质的活动，我在三次会上都提到这些话。","type":"paragraph"},{"text":"在座谈会上，有些盟员发了很多牢骚，对党不满的话，市委主委问我这样对不对，有些小组长认为这样不好，我说，放的时候有的偏激是不免，还是要放。我说我所体会的政策就是要解除顾虑，如果挡住了，不是又会不放不鸣了么？我要他去和统战部谈话。还有，主委和我说工会系统传达说鸣放之后，你有错，我也有错，大家有错，我听来认为这样说不一定对头，还要市委主委去问问统战部。","type":"paragraph"},{"text":"我又主张，把座谈会上的意见综合起来，在政协会上提出，我说盟员作为人民代表或是政协委员的，有责任代表盟员的意见去发言，我没有提到要先辨别是非，正当的才去谈，这种做法是和章罗所搞纲领的本质是相同的。","type":"paragraph"},{"text":"我在座谈中听到一个盟员在上次选举时没有让他去选举，因为以为他的身分是地主，其实不是，那是搞错的。我把这事向统战部反映，并且认为这是保障人权的问题，必须重视。我夸大了缺点。","type":"paragraph"},{"text":"5月28——29日在无锡，盟市委又要我做报告，我不愿意，才同意和苏州一样分别谈谈，一共三次，第一次是市委干部，第二次是各中学负责的盟员，第三次基层组织负责人。在第二次里，主要是谈艺专迁校问题，艺专盟员不愿迁西安。曾向文化部去信请愿，而且上了文汇报，我说上了报就好办，他们说已给盟中央去报告，请支持，我说，回到北京我去谈一谈。因此，我回到了北京他们还有信来，但是我没有再提此事了。","type":"paragraph"},{"text":"我在苏州和无锡都表示盟过去对中学盟员工作做得太少，这是对的。我说你们有问题应当提出来，投报纸，北京有光明日报，上海有文汇报，而且盟中央也有争鸣。有一个小组提出今后人事工作应当采取考试制，我说这个意思很好，可以写文章寄争鸣，在师院，有一位盟员对学校迁移太多有意见；我也要他写文章提出来。我那时就是觉得只要是有问题最好端出来。这种无原则的鸣放，也就必然会发生反共反社会主义的进攻。","type":"appellation"},{"text":"我的错误还有：没有了解党在这些城市的整风步骤，而自动地在盟内鼓励鸣放，那是会打乱党的整风步骤，我鼓励无原则的鸣放，一部分思想不纯立场不稳的盟员，甚至在运动中被整过的人，达时都公开发起牢骚来了，这就是点火。","type":"appellation"},{"text":"在那些被整过的人中，特别对盟内积极分子有反感，在座谈中已出现矛盾。我的态度不是支持积极分子，而说，现在还不是盟内整风，这些事最好不多谈。而且承认了在过去运动中有偏差，鼓励了这些被整分子的气焰，我回来之后曾和好几人讲过民主党派内部矛盾应当注意的话，有人说，党和非党的墙和沟是一些积极分子砌出来的，墙愈高，这些人愈高，这就是张云川的“义勇军”思想。我并没有批判这种说法，而曾把这种话讲给别人听，实际上，我思想中也存在着这一类的看法，只是程度上有所不同，我向于部长汇报时，也说过，我的看法，积极分子是好的，但工作上是有缺点的，引起反感，这实在反映了我的思想，就是不要进行强烈的批评，让知识分子慢慢改造，要注意他们的特点等等……这些看法在我很深，实质上是维护落后。","type":"paragraph"}],"comments":[],"origin":"《揭露和批判章罗联盟的军师-费孝通》，中央民族学院整风办公室编印，1957年8月。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"60b0f60163"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
