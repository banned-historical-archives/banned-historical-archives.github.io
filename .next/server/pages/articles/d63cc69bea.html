<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共江西省委会五人小组对目前天主教内镇反运动中几个问题的通知","authors":[],"dates":[{"year":1955,"month":12,"day":19}],"is_range_date":false,"parts":[{"text":"中共江西省委会五人小组对目前天主教内镇反运动中几个问题的通知","type":"title"},{"text":"主送机关：各地、市委五人小组、各县公安局、宣传宗教事务部门。","type":"paragraph"},{"text":"抄送机关：中央公安部、国务院宗教事务局、中共江西省委、省人民委员会。","type":"paragraph"},{"text":"对目前天主教内镇反运动中几个问题的通知","type":"subtitle"},{"text":"现根据部份地区的工作报告和省里派干部到有关地区的检查情况来 看：自十一月十一日省第二次宗教工作会议后，各地均向党委与工作组同志进行了传达、讨论，并结合本地区的工作情况进行了研究，制订了进一步深入发动群众的 具体计划，使运动有了逐步的深入开展。在发动教徒群众与争取神职人员工作上，教徒群众有百分之八十以上被发动起来，并争取了高级的和部分神职人员参加了爱国会，因而使运动获得了肯定的成绩。但在某些地区的干部中产生了骄傲自满的情绪，认为镇反运动差不多了，该捕该管该斗的已经都做了，教徒群众绝大多数参加了斗争，感到没有什么工作可做了，因而，想草率收兵，结束战斗的右倾情绪。同时也有的错误认为通过这次教会镇反，宗教将会在短时间内消灭，而对宗教工作不 做长期打算的思想，对运动缺乏具体指导，前紧后松。有的还存在着急躁情绪，不愿做艰苦深入的发动教徒群众和争取神职人员工作，依靠捕、斗、管的“左”的办 法来代替艰苦的细致的发动群众和争取神职人员的工作。为了正确解决上述问题，胜利的结束天主教内地镇反运动，特作如下通知：","type":"paragraph"},{"text":"（1）争取神职人员与虔诚教徒群众工作，应为当前工作中的重要一环。对争取神职人员工作：各县市对天主教教区未参加反帝爱国活动的代主教、神甫应在大多数教徒群众已发动起来的时机，当地党政负责同志应及时的亲自找神 职人员谈话，耐心反复的交代政策，指明出路，使其明确爱国爱徒态度划清宗教信仰与反革命界限，争取其公开表示爱国态度；个别不能公开的也要暗中争取表示爱国态度，将百分之九十以上的神职人员争取到爱国会中来，并能为我们控制掌握。有的县如城南县争取神职人员的工作做得不够，应引起重视，地委宣传部、专署公 安处应加强对争取神职人员工作的指导。","type":"paragraph"},{"text":"争取虔诚教徒工作，应在深入发动教徒群众和细致的排队基础上做好争取工作，工作组同志要具体分工负责进行个别发动争取，反复耐心的交待政策和指明出路，教育他（她）们站在爱国爱教的立场，划清敌我界限，参加到爱国会中来。","type":"paragraph"},{"text":"（2）对教徒群众应在思想发动的基础上再进行一次排队工作，把中间与落后的教徒发动和争取过来，使他们在思想上和行动上划清宗教活动与反革命破坏的界限，争取百分之九十以上的教徒群众参加到爱国会中来。对农村教徒较集中并保持有宗教信仰的地区，应结合这次教会镇反运动和农业合作化运动进行一次宗教政策和爱国主义教育，划清宗教信仰与反革命分子界限，使其不断的提高爱 国主义思想觉悟。","type":"paragraph"},{"text":"（3）天主教内地镇反运动发动群众斗争的工作应在十二月份告一段落，但在结束群众镇反斗争工作的同时须加强爱国会的组织建设工作，做好补选和扩大爱国会的工作，不论原来参加的与新参加的或退出爱国会以后现又再次参加 的，均应在镇反运动群众斗争结束时期举行一次签名入会仪式的工作。然后再召开教徒代表（或教徒大会）会，正式成立教友爱国会，总结爱国会前段工作，安排今 后工作任务及健全各种制度。这是巩固镇反运动和进一步开展天主教内反帝爱国运动的重要工作，不得忽视。为了做好上述工作，必须事先作好准备，防止草率结束 运动的右倾情绪。","type":"paragraph"},{"text":"（4）教会镇反运动结束后，爱国会的工作应加强领导，发挥其领导作用。对运动的个别顽固落后的教徒与神职人员，应加强不断的爱国思想教育和争取工作，使其扩大爱国会力量。对一般的爱国教徒进行爱国思想教育外，应以生产（农业合作社、手工业合作社）为中心，进行阶级教育，逐步地提高其政治觉悟。","type":"paragraph"},{"text":"（5）为了做好教会镇反运动的结束工作，必须教育克服干部中的“左”“右”情绪，进一步的检查目前工作中存在的问题，予以及时解决，使运动圆满胜利结束。在运动结束前对教会的宗教活动应恢复正常的宗教生活。","type":"paragraph"},{"text":"（6）为巩固教会镇反运动的成果，使教会反帝爱国运动继续深入开展，各级党委应按省委与省人民委会于八、九月间先后发出关于建立宗教事务机构的指示，及时将该地区的宗教事务机构建立起来，把干部配备起来，在党委内部应指定委员负责领导宗教工作。","type":"paragraph"},{"text":"以上问题，望各地党委五人小组结合本地具体情况研究执行，并在运动结束时，写出全面总结报省。","type":"paragraph"},{"text":" 中共江西省委五人小组一九五五年十二月十九日","type":"paragraph"}],"comments":[],"origin":"根据档案材料翻印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d63cc69bea"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
