script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"比共书记格里巴谴责苏联领导以“联合行动”作幌子掩盖同美帝勾结  美帝和现代修正主义阻挡不了世界革命的胜利  阿《战士报》揭露赫鲁晓夫修正主义者为美帝侵越战争帮忙","authors":[],"dates":[{"year":1966,"month":2,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"比共书记格里巴谴责苏联领导以“联合行动”作幌子掩盖同美帝勾结"},{"type":"paragraph","text":"美帝和现代修正主义阻挡不了世界革命的胜利"},{"type":"paragraph","text":"阿《战士报》揭露赫鲁晓夫修正主义者为美帝侵越战争帮忙"},{"type":"paragraph","text":"新华社四日讯　布鲁塞尔消息：比利时共产党书记格里巴在一月二十一日的《人民之声》周刊上发表文章，谴责赫鲁晓夫修正主义者以所谓“联合行动”作幌子来掩盖他们同世界人民头号敌人美帝国主义的合作。"},{"type":"paragraph","text":"格里巴的这篇文章是为纪念列宁逝世四十二周年而写的。格里巴说：“列宁的著作谴责了改良主义的社会民主党背叛的领导人，同时也无情地谴责赫鲁晓夫修正主义目前的背叛活动。"},{"type":"paragraph","text":"“当没有赫鲁晓夫的赫鲁晓夫分子试图在冠冕堂皇的‘联合行动’幌子下掩盖他们同世界反动派的主要堡垒美帝国主义实行合作时，他们只不过是抄袭了列宁所批判过的工人阶级叛徒使用的办法。"},{"type":"paragraph","text":"“列宁主义者揭露改良主义的社会民主党领导人的背叛活动，这就使世界无产阶级事业经历了新的跃进。马克思列宁主义者揭露现代修正主义的背叛活动，这就能加强自己的战斗力，教育千百万新的革命者。”"},{"type":"paragraph","text":"格里巴强调指出：“美帝国主义及其社会民主党走狗和修正主义合作者，都将被革命的风暴扫除净尽。”他说：“在马克思列宁主义指导下的各国人民对帝国主义取得了一个又一个的胜利。正如沙皇、法英帝国主义的反苏‘防疫带’、希特勒帝国主义和日本军国主义过去没有能阻止革命取得新的胜利一样，目前成为全世界人民头号敌人的美帝国主义，现在不能、并且以后也不能作到这一点。”"},{"type":"paragraph","text":"格里巴在文章中还指出：“目前，列宁主义鼓舞着千百万人的革命行动。马克思列宁主义的理论已经进一步得到了发展，而且继续被把理论和实际联系起来的革命后代所发展。斯大林是列宁的继承者。毛泽东通过他的著作而成了当代的列宁。”"},{"type":"paragraph","text":"新华社地拉那三日电　阿尔巴尼亚《战士报》三日发表评论说，一月三十一日美国飞机恢复对越南民主共和国的野蛮轰炸再一次暴露了约翰逊政府的所谓“和平攻势”的虚伪性。"},{"type":"paragraph","text":"评论说，约翰逊政府越来越多地使用两手政策：一手扩大侵略战争，另一手搞“和平”骗局。但是，约翰逊在这两方面总是都遭到失败。"},{"type":"paragraph","text":"评论指出，约翰逊政府已经处于愤怒和仇恨的包围之中。追随它的只有某些仆从国家，只有赫鲁晓夫修正主义者热心同它合作。赫鲁晓夫修正主义者作出一切努力，企图把美帝国主义者从陷入的泥潭中挽救出来。当约翰逊政府恢复对越南民主共和国的轰炸和正在扩大侵略南越的战争的时候，赫鲁晓夫修正主义者正在同美帝国主义者进行签订“不扩散核武器”条约的“友好谈判”，以便维持他们的核垄断，从而实现两个大国主宰世界的阴谋。为了实现苏美合作主宰世界，赫鲁晓夫修正主义者参加日内瓦“裁军”谈判的代表对美国恢复轰炸一个社会主义国家越南民主共和国的领土的罪行没有说半句谴责的话。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"61c056a41c"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
