" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"国务院转发外交部关于加强地方旅游机构的请示报告（概要）","authors":[],"dates":[{"year":1973,"month":5,"day":30}],"is_range_date":false,"parts":[{"text":"国务院转发外交部关于加强地方旅游机构的请示报告（概要）","type":"title"},{"text":"1973年5月30日，国务院同意并转发外交部《关于加强地方旅游机构的请示报告》。5月24日提出的《报告》说，随着我国对外关系的迅速发展，要求自费来华参观旅行的外宾日益增多，接待任务十分繁重。目前，全国对外开放的城市和地区，绝大多数地方都没有专门接待外国自费旅行者的国际旅行社等机构。即使有，干部和翻译力量也感不足。为适应形势发展的需要，建议分别情况逐步恢复和健全地方旅游机构，在各省、市、自治区或所在地方党委和革委会外事部门统一领导下进行工作。中国国际旅行社总社对各地国际旅行社的分、支社是业务指导关系。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b839b390c7"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
