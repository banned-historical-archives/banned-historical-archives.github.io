script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"艾地主席谴责修正主义者堕落到是非不分地步","authors":[],"dates":[{"year":1965,"month":9,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"印度尼西亚人民认为巴基斯坦人民抵抗侵略是对的，印度侵略是错的"},{"type":"paragraph","text":"艾地主席谴责修正主义者堕落到是非不分地步"},{"type":"paragraph","text":"印度尼西亚民族党总主席沙斯特罗阿米佐约要求印度撤军和实现克什米尔自决"},{"type":"paragraph","text":"新华社雅加达十三日电　据《人民日报》今天报道：印度尼西亚共产党主席艾地昨天说：“修正主义者已经堕落到是非不分的地步，因为他们把被侵略的巴基斯坦和进行侵略的印度相提并论。”"},{"type":"paragraph","text":"艾地是在茂物附近的“埃戈姆”农业和农民运动学院为正在印度尼西亚访问的越南民主共和国歌舞团举行的集会上讲这番话的。"},{"type":"paragraph","text":"艾地还说：“印度尼西亚人民能够辨别谁是谁非，克什米尔人民是对的，因为他们要获得自由。巴基斯坦人民是对的，因为他们抵抗侵略。印度是错的，因为它进行侵略。”"},{"type":"paragraph","text":"艾地强调说：“虽然美帝国主义企图使我们的注意力转移到巴基斯坦和印度之间的战争，印度尼西亚人民将继续支援越南人民，印度尼西亚人民在他们的国际活动中将集中力量支持越南人民反对美帝国主义的正义斗争。”"},{"type":"paragraph","text":"越南民主共和国歌舞团团长阮德葵在会上发表讲话，对印度尼西亚人民的国际主义表示赞赏。"},{"type":"paragraph","text":"新华社雅加达十三日电　印度尼西亚临时人民协商会议副主席、印度尼西亚民族党总主席沙斯特罗阿米佐约十二日在这里接见安塔拉通讯社记者时说：“谋求解决印度和巴基斯坦争端的任何努力，如果不以印度侵略军撤出巴基斯坦领土和完全承认克什米尔人民自己决定自己的命运为基础，就不会成功。”"},{"type":"paragraph","text":"他再一次强调指出，印度尼西亚人民坚定地站在巴基斯坦和克什米尔人民的一边。他说：“这是因为，对印度尼西亚人民来说，支持独立运动和反抗侵略是一个原则问题。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f4e9f5d34e"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
