" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"对右派分子张先痴的起诉书","authors":[],"dates":[{"year":1963,"month":8,"day":18}],"is_range_date":false,"parts":[{"text":"对右派分子张先痴的起诉书","type":"title"},{"text":"被告张先痴因反革命案件于1963年4月21日由灌县公安局扣捕，预审终结移送我院，经我院审查判明被告犯有下列罪行：","type":"paragraph"},{"text":"被告张先痴因犯反革命罪，于1958年3月由南充县人民法院判处管制五年送劳动教养，在劳教期中，抗拒改造，积极组织逃跑，叛国投敌，61年8月以来，先后伙同劳教分子123、234、345、456(均已捕)等人，策划叛国投敌活动，妄图到南斯拉夫驻华使馆“政治避难”进而投靠“铁托集团”，被告在首犯123的策划指使下，伪造了四川省地质局公章制造假证明，筹划了路费、口粮等，并由首犯123亲笔写信条二张与天津的派遣特务分子其兄某某某(本文作者故意隐其姓名)，要其帮助投靠敌特。事后被告于同年10月1日便同234同时逃跑，途经成都西安到达北京后，见去南斯拉夫使馆无机可乘，则于11月23日又逃往天津与特务分子某某某挂勾，被告与某某某见面后，便以攻击我三面红旗对某进行煽动，“坚强起来”，“革命”，妄图通过某某某之大力帮助潜逃到香港投靠敌特进行反革命活动，被告在捕回集训中还继续书写反动诗歌叫嚣“今后算总账”，妄想反革命复辟继续进行反革命活动，但被告捕后尚能坦白认罪。","type":"paragraph"},{"text":"根据上述，被告张先痴一贯进行反革命破坏活动犯有投敌叛国之罪应予依法惩办，为此特向人民法院提起公诉请予处理。","type":"paragraph"},{"text":"此致","type":"paragraph"},{"text":" 灌县人民法院检察员党寿光(盖灌县人民检察院公章)1963年8月18日","type":"paragraph"},{"text":" ——原载张先痴《格拉古轶事》，美国溪流出版社，2007年。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a620f5803c"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
