script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"决心努力学习毛泽东思想各地竞购“毛泽东选集”订购数量超过当地新华书店供应量","authors":[],"dates":[{"year":1951,"month":10,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京十五日电】　各地人民竞购“毛泽东选集”并纷纷准备学习。“毛泽东选集”第一卷的第一批总发行量为六十万册。许多地方读者所订购的数量已超过当地新华书店所能供应的数量。据济南、徐州、青岛三市的统计:读者订购数超过三地书店实际供应数量的百分之一百五十以上。新华书店北京分店统计:三天之内，前往预购的七百八十五户，所需数量即达六万七千多部。宁夏银川市各族人民在十三日下午即预购四百二十五部。广州市发售一万部已全部售完。"},{"type":"paragraph","text":"许多读者在买到“毛泽东选集”第一卷后，都表示决心努力学习。全国著名的工业劳动英雄赵占魁在购得“毛泽东选集”第一卷时说:“中国工人必须很好地掌握毛泽东思想，才能领导全国人民建设自己的国家，由新民主主义社会走到社会主义、共产主义社会。”南京工业劳模李士海说:“我们工人就是有了毛泽东思想才得翻身的，‘毛泽东选集’将帮助我提高政治、文化，进一步推动我多生产，多发明，多创造。”正在皖北党校学习的农民干部王耀东决定自即日起，每日抽出休息时间阅读一小时。湖南六十九岁的老同盟会员刘孟顾从六里路以外赶到长沙，在买到“毛泽东选集”第一卷后，他说:“满清时，我和黄兴一路革命，没有成功；今天革命胜利是因为有了马克思、列宁主义，有了毛泽东思想，所以必须好好学习毛主席的著作。”西北大学教务长岳劼恒说:“我们教育工作者应该首先自己掌握毛泽东思想，才能教育祖国下一代青年成为国家的建设人才。”许多解放军战士、海员、学生和兄弟民族的干部在各地新华书店购书处意见簿上写着:“我买到了这书，就像见到毛主席一样的高兴。”“我学习‘毛泽东选集’，就觉得毛主席站在我的面前向我指出着前进的方向。”"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"71d999ce3f"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
