<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"小组就心　个别促进　重点检查华东政法学院批判资产阶级个人主义取得经验","authors":[],"dates":[{"year":1958,"month":5,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　在整风运动已经取得成就的基础上，华东政法学院学生从总结思想收获、检查红专规划执行情况，以搞臭资产阶级个人主义为中心，深入整风，巳创造了不少经验。昨日下午，上海市委教育卫生部在华东政法学院召开现场会议。上海市各高等学校、中等专业学校的党、团干部及区委有关部门负责同志一千多人出席了这个会议。会上，华东政法学院党委代理书记姚力、四年级党总支书记李润玉、三年级十班团支部书记俞靓奋介绍了组织领导学生进行自我思想改造的经验。"},{"type":"paragraph","text":"这个学院批判资产阶级个人主义，一般地是采用小组(或小小组)谈心、个别促进，适当地结合党员干部及重点人物在中型会议上的示范检查等形式进行的。这样使思想批判做得深透和细致。四年级学生归纳了小组、小小、组和个别谈心的好处是:没有顾虑，大胆暴露；谈话自由，不受拘束；随时随地都可以进行；解决问题又深透又快。"},{"type":"paragraph","text":"这个学院学生的思想总结是在自觉革命和所造成革命的声势下进行的。只有造成思想革命的强大声势，才能促进人人自觉的要求。也只有启发人人自宽，才能真正造成思想革命的强大声势。"},{"type":"paragraph","text":"对政治思想比较落后的学生，该院作了很深入细致的工作。"},{"type":"paragraph","text":"整风运动的过程，就是思想上反复的大破大立的过程。该院在大破资产阶级个人主义以后，一面继续进行分析批判，一面根据缺什么、补什么的精神，许多学生修订了红专规划。这些规划都比前提高，有思想分析、奋斗目标，也有具体措施和实现的保证。"},{"type":"paragraph","text":"教育卫生部副部长舒文在会上讲了话。他说，政法学院总结思想，修订红专规划，搞臭资产阶级个人主义的经验很好。总的目的要达到兴无灭资。只有搞臭个人主义思想，才能树立共产主义思想。他指出政法学院的工作还只做了前面一部分，还要对资产阶级个人主义思想挖深挖透。挖深就是摆出事实，挖透就能讲清道理。光挖不进行批判就不会深刻。因此，只有挖深挖透，才能提高思想认识。他认为各校可根据本单位的特点和不同对象，研究和运用这个学校的经验。这个学院的1300多学生对昨天举行的现场会议表示了热烈欢迎。他们赶办的资产阶级个人主义丑恶思想展览会和自编自导自演的“华东政法学院整风运动大合唱”，都在昨天开会的同时展出和演出。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"11638acd7e"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
