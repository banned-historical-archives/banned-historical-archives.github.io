<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"毛泽东思想是战胜一切敌人的最强大的武器  澳门同胞盛会庆祝反帝爱国斗争的胜利","authors":[],"dates":[{"year":1967,"month":2,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛泽东思想是战胜一切敌人的最强大的武器"},{"type":"paragraph","text":"澳门同胞盛会庆祝反帝爱国斗争的胜利"},{"type":"paragraph","text":"新华社香港四日电　高举毛泽东思想伟大红旗同澳葡帝国主义者进行英勇斗争，迫使澳葡当局低头认罪的澳门同胞，三日满怀革命豪情，在澳门工人体育场举行了万人大会，庆祝反帝爱国斗争的光辉胜利。"},{"type":"paragraph","text":"当天，晴空万里，灿烂的阳光普照大地。胸前别着金光闪闪的毛主席像章，手持红彤彤的《毛主席语录》的澳门工人、农民、师生、妇女和各界同胞，意气风发，斗志昂扬，排着整齐的队伍从四面八方进入会场。会场主席台上高悬着毛主席的巨幅画像，数不清的红旗迎风飘扬，成千的毛主席语录牌发出耀眼的金光。"},{"type":"paragraph","text":"下午一时，大会在热烈的欢呼声和暴风雨般的掌声中开始。一万多人纵情高唱《东方红》，他们手持红彤彤的《毛主席语录》，齐声朗读："},{"type":"paragraph","text":"“领导我们事业的核心力量是中国共产党。指导我们思想的理论基础是马克思列宁主义。”"},{"type":"paragraph","text":"“一切反动派都是纸老虎。看起来，反动派的样子是可怕的，但是实际上并没有什么了不起的力量。从长远的观点看问题，真正强大的力量不是属于反动派，而是属于人民。”"},{"type":"paragraph","text":"大会一致通过了给最最最最敬爱的伟大领袖毛主席的致敬电。"},{"type":"paragraph","text":"在热烈的掌声中，大会主席梁培和工人、学生、制裁小组、各界同胞代表讲了话。他们说，毛泽东思想是我们取得胜利的最可靠最根本的保证。今天，我们的心飞向北京，飞向天安门，向我们伟大的领袖毛主席致敬！祝毛主席万寿无疆！万寿无疆！"},{"type":"paragraph","text":"他们说，毛主席的教导：“下定决心，不怕牺牲，排除万难，去争取胜利。”给了我们战胜敌人的无穷力量。我们照毛主席的指示办事，发动群众，团结百分之九十以上的同胞，同敌人展开了针锋相对的斗争。我们用毛泽东思想作望远镜、显微镜，心明眼亮，及时拆穿了澳葡帝国主义者的阴谋诡计，迫使嘉乐庇低头认罪。"},{"type":"paragraph","text":"他们警告澳葡当局：“你们必须老老实实全部彻底实现你们的诺言，如果有半个不字，我们决不客气。”"},{"type":"paragraph","text":"他们警告蒋帮分子：“你们如果不弃暗投明，改过自新，而继续与祖国为敌，你们就死无葬身之地。”"},{"type":"paragraph","text":"专程前来参加庆祝大会的香港各界同胞代表团团长、港九工会联合会会长陈耀材在讲话中说：“香港和澳门的斗争是紧紧相连的。我们同命运，共呼吸，团结在一起，斗争在一起，澳门同胞的胜利，也就是我们的胜利。香港同胞学习澳门同胞在斗争中活学活用毛泽东思想的宝贵经验，互相手挽手，肩并肩，高高举起毛泽东思想伟大红旗，奋勇前进！”在陈耀材讲话时，人们不断高呼：“港澳同胞反帝爱国大团结万岁！”"},{"type":"paragraph","text":"澳门和香港各界同胞代表在讲话中愤怒谴责苏修毒打我留欧学生的法西斯暴行。他们指出，这一骇人听闻的血案，又一次彻底地暴露了苏修领导集团对伟大的、战无不胜的毛泽东思想，对我国无产阶级文化大革命的刻骨仇恨和极大恐惧。但是，世界革命人民无比热爱毛泽东思想，我国无产阶级文化大革命的影响，决不是勃列日涅夫、柯西金这些历史垃圾所能阻挡的。苏联人民决不会长期忍受苏修领导集团这一小撮坏家伙的黑暗统治，苏联人民一定会起来造他们的反，革他们的命，夺他们的权，让列宁、斯大林的故乡，重新走上社会主义的大道。"},{"type":"paragraph","text":"大会结束后，澳门工人和学生以及香港各界同胞演出了许多充满战斗和革命激情的文艺节目。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0873f3c31e"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
