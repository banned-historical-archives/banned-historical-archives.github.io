script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"清江市油脂化学厂职工认真读马列著作和毛主席著作  深入批判林彪“克己复礼”的反动纲领","authors":[],"dates":[{"year":1974,"month":5,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"清江市油脂化学厂职工认真读马列著作和毛主席著作"},{"type":"paragraph","text":"深入批判林彪“克己复礼”的反动纲领"},{"type":"paragraph","text":"新华社南京电　清江市油脂化学厂的干部和工人，在批林批孔运动中，认真读马列著作和毛主席著作，学习毛主席和党中央关于批林批孔的指示，掌握理论武器，狠批林彪“克己复礼”的反动纲领，推动批林批孔斗争逐步深入。"},{"type":"paragraph","text":"批林批孔运动开展以来，这个厂的各车间班组，纷纷建立学习、批判小组，认真学习《共产党宣言》、《国家与革命》和《关于正确处理人民内部矛盾的问题》、《湖南农民运动考察报告》等著作，运用马克思主义的立场、观点和方法，深入批判林彪“克己复礼”的反动纲领。"},{"type":"paragraph","text":"老工人曹廷顺忆旧社会的苦，想新社会的甜。他说，社会主义是我们劳动人民的靠山，是命根子。林彪叫嚷“克己复礼”，妄图复辟资本主义，要把我们劳动人民重新推到吃人的旧社会，我们坚决不答应！我们要永远走毛主席指引的社会主义光明大道。谁要搞倒退复辟，我们就坚决同他斗到底。革命烈士的女儿朱秀娥反复学习了伟大导师列宁关于“从资本主义过渡到共产主义是一整个历史时代。只要这个时代没有结束，剥削者就必然存着复辟希望，并把这种希望变为复辟行动”的教导，她联系解放前国民党反动派残酷杀害革命群众和林彪妄图篡权复辟的罪行，用马克思主义的阶级分析方法剖析林彪“克己复礼”的阶级内容。她说，林彪接过孔老二“兴灭国，继绝世，举逸民”的反动口号，狂叫要对无产阶级专政的对象“一律给予政治上的解放”，这就是妄图让地、富、反、坏、右重新上台，对无产阶级实行残酷的地主资产阶级法西斯专政。我们要坚持党的基本路线，千万不能丧失革命警惕。一定要把林彪的修正主义路线批深批透，决不能让历史的车轮倒转！"},{"type":"paragraph","text":"清江市油脂化学厂原来是个单纯榨油的工厂。一九五八年，这个厂的干部、工人高举社会主义建设总路线伟大红旗，自力更生，艰苦奋斗，在短期内就发展为生产多种油脂化学产品的新厂。但是，由于刘少奇修正主义路线的破坏，工人们自己创办的多种油脂化工车间被砍掉。无产阶级文化大革命中，工人们用马克思主义、列宁主义、毛泽东思想的锐利武器，狠批了刘少奇的修正主义路线，全厂生产又得到迅速发展。现在，这个厂能够生产多种重要化工原料，一九七三年的工业产值比一九六五年增加了百分之五十以上。在批林批孔斗争中，全厂干部、工人进一步学习毛主席关于无产阶级文化大革命的论述，畅谈无产阶级文化大革命给本厂带来的巨大变化，狠批林彪否定文化大革命，咒骂社会主义新生事物的罪行。大家说，无产阶级文化大革命，粉碎了刘少奇和林彪两个资产阶级司令部，我国的无产阶级专政大大巩固，社会主义祖国欣欣向荣。铁的事实雄辩地证明，“这次无产阶级文化大革命，对于巩固无产阶级专政，防止资本主义复辟，建设社会主义，是完全必要的，是非常及时的。”林彪一伙恶毒攻击文化大革命，咒骂革命新生事物，其罪恶目的就是妄想阻挡前进的历史车轮，在中国复辟资本主义。大家在批判中还指出，对无产阶级文化大革命是拥护还是反对，对文化大革命的成果是肯定还是否定，这是现实的阶级斗争、两条路线斗争的大是大非问题。他们表示，一定要彻底批判林彪及其死党阴谋复辟的罪行，以实际行动巩固和发展文化大革命的伟大成果，把社会主义革命进行到底。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"林彪","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"批林批孔","type":"主题/事件"},{"name":"批林批孔","type":"主题/事件"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"人民内部矛盾","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ca85946b32"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
