<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"物的奴隶","authors":["公今度"],"dates":[{"year":1981,"month":12,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"物的奴隶"},{"type":"paragraph","text":"公今度"},{"type":"paragraph","text":"在一片谴责办婚事铺张浪费声中，听到这样一件趣事：一对新婚夫妇由于置办的新被子多达十六条，白天叠放床上，夜晚却没有地方安置，由于床为被子所占，新婚的小夫妻只得睡地板了事。"},{"type":"paragraph","text":"床供人睡，被供人盖，可是这个新婚人家，床作被柜，被子空堆，而“嫁妆的奴隶”们却只能酣睡于卧榻之侧，岂非怪事一桩。历代的笔记小说中多有这样的记载：守财奴最后饿死在钱堆上。事虽不尽相同，却有相似的味道。"},{"type":"paragraph","text":"被子十六条，“脚”需几十只，酒席多少桌，迎新汽车多少辆，加上“六机部”“七机部”“八机部”……，一场婚事下来，家具塞满房间，礼物堆满春台，同时新郎新娘则两袖清风，负债累累，这新婚的蜜月难道可喜可贺？要睡破十六条被子，大概不是“金婚纪念”至少也要“银婚纪念”了。把一辈子用的物品在结婚的几天里办齐，富则富矣，然而寅吃卯粮，债台高筑，喜上眉头而愁上心头，过这种两重心情的结婚生活，应为智者所不取。而且，婚事之后，主人即役于物，役于债，为张罗钱财而作奴隶牛马。弄得不好，因经济窘迫而生龃龉，起风波，甚至弄到悲剧下场的，也并不少见，这是何苦呢！"},{"type":"paragraph","text":"鲁迅说过大意是这样的话：生活过分安逸了，工作就会被生活所累。有的人认为自己条件好，办一次“象样的”婚事，不仅可以不举债，并且未必就会穷下去。即便如此，鲁迅的话还是有教育作用的。想生活得好一点，无可厚非，我们的社会就努力在满足人民在物质和文化方面日益增长的需要。然而，把超过社会的一般生活水平、要什么“全机”“全鸭”之类，作为孜孜以求的目标，那末人就被它所“累”了。累者，牵累、贻害之谓也。白天周旋于各“机”之间，夜晚躺卧于鸭绒之中，久而久之，就甩不开手脚走路了。这何尝不是物的奴隶，我们确实看到过“被生活所累”的各种奴隶相的。"},{"type":"paragraph","text":"办婚事铺张浪费，于人于己、于公于私都大不利。拥十六条被而睡地板（或不睡地板），不足为训。是不是呢？"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"72db7a0c20"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
