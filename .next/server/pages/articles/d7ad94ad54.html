script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"什么是管理的两重性","authors":["庄前鹏"],"dates":[{"year":1976,"month":9,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"马克思在《资本论》中有关管理两重性的论述，主要在第一卷《协作》这一章。在这一章里，马克思用了大量篇幅，精辟地分析了资本主义企业管理的目的、形式和内容，揭露了资本主义企业管理的阶级性质。马克思指出:“资本主义的管理就其内容来说是二重的”，“一切规模较大的直接社会劳动或共同劳动，都或多或少地需要指挥，以协调个人的活动，并执行生产总体的运动——不同于这一总体的独立器官的运动一一所产生的各种一般职能。”马克思以“一个乐队就需要一个乐队指挥”为比喻，说明生产管理是人们共同劳动的客观需要，管理同生产的发展是有着密切关系的。接着，马克思又说:“一旦从属于资本的劳动成为协作劳动，这种管理、监督和调节的职能就成为资本的职能。这种管理的职能作为资本的特殊职能取得了特殊的性质。”这里，马克思明确指出，资本主义企业的管理，就是资本的职能，也就是资本家利用他们占有的生产资料对雇佣工人进行剥削的职能。在资本主义企业里，管理无非是资本家剥削工人的手段，正如列宁指出的那样:“资本家所关心的是怎样为掠夺而管理，怎样借管理来掠夺。”(《列宁选集》第3卷第395页)"},{"type":"paragraph","text":"马克思阐明的管理两重性，即:一、任何社会规模较大的共同劳动、特别是资本主义工业大生产都需要管理；二、在阶级社会中，管理是有阶级性的，超阶级的企业管理是根本不存在的。"},{"type":"paragraph","text":"毛主席指出:“管理也是社教”。就是说管理也是阶级斗争。在整个社会主义历史时期，搞好社会主义企业管理，关键是把领导权牢牢地掌握在马克思主义者和工人群众手里，坚定不移地执行毛主席的革命路线，批判修正主义路线，以阶级斗争为纲，把社会主义企业办成巩固无产阶级专政的坚强阵地。刘少奇、林彪、邓小平一类走资派，抹杀管理的阶级内容，把毛主席的批示歪曲成为单纯的生产管理工作，目的是要搞修正主义那一套，对工人群众实行“管、卡、压”，搞资产阶级专政。这是对马克思主义的无耻背叛，充分暴露了刘少奇、林彪和邓小平一类走资派的狰狞面目。"},{"type":"paragraph","text":"(庄前鹏)"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"林彪","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d7ad94ad54"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
