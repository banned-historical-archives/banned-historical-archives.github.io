script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"美国资产阶级报刊为尼克松哭丧  哀叹美帝新头目一上台就处于内外交困四面楚歌的可悲境地","authors":[],"dates":[{"year":1969,"month":1,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"美国资产阶级报刊为尼克松哭丧"},{"type":"paragraph","text":"哀叹美帝新头目一上台就处于内外交困四面楚歌的可悲境地"},{"type":"paragraph","text":"本报讯 当世界进入一九六九年的时候，美国的资产阶级报刊发出了一片哀鸣，对美帝国主义今年日子更不好过的前景表示极大的不安。美国垄断资产阶级喉舌《美国新闻与世界报道》一月六日出版的一期刊登了一篇题为《对一九六九年的世界的展望》的报道，集中反映了美国统治集团对于尼克松上台后美帝前途暗淡的悲观情绪。"},{"type":"paragraph","text":"《美国新闻与世界报道》惊呼：今年世界各地的革命风暴将给予美帝国主义以沉重的打击。它写道：“美国新总统不管朝地球上什么地方看，都会发现麻烦。一个又一个国家、一个又一个地区都在发出风暴警报。所有迹象表明，一九六九年在国外将是一个危险、动荡的年头。”"},{"type":"paragraph","text":"这家杂志承认，今年亚洲、非洲、拉丁美洲各国人民革命斗争将进一步发展。它忧心忡忡地写道：在菲律宾“地下的共产党运动正在增长”，印度存在着“声势愈来愈大的游击战”，巴勒斯坦游击队的行动“愈来愈咄咄逼人”，拉丁美洲的工人、学生运动方兴未艾，“紧张局势正在加剧”……"},{"type":"paragraph","text":"另一方面，这家杂志对于美帝国主义的一些“盟友”的不妙处境表示担忧。它指出：英国“在一九六九年将‘退出（国际）舞台’”而全力来维持其国内的困难局面，尼克松将发现英国“没有力量再帮助美国在全世界履行它的责任”；法国“今后一年看来特别危险和无法预料”，类似去年的革命群众运动风暴“可能再次发生”。这家杂志并且担心“英国和法国的经济上的毛病可能引起（资本主义世界）一场全面的货币危机，而使美元遭到危险”。"},{"type":"paragraph","text":"《美国新闻与世界报道》把希望寄托在同苏修叛徒集团加紧勾结上面，但是它却不得不承认，苏修的日子也并不好过，它将遭到东欧各国人民的反抗。"},{"type":"paragraph","text":"因此，这家杂志发出哀叹说：“在地平线上几乎看不到什么光明的地方。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0280912b17"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
