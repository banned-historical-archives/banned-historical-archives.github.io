" crossorigin="">{"props":{"pageProps":{"books":[{"id":"c21f8808-2334-4e60-a047-27a52e8adbce","name":"夏邦银、朱洪霞、胡厚民等人的言论节录","internal":false,"official":true,"type":"img","author":"中共武汉市委材料组","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/c21f8808-2334-4e60-a047-27a52e8adbce/1.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/c21f8808-2334-4e60-a047-27a52e8adbce/2.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/c21f8808-2334-4e60-a047-27a52e8adbce/3.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/c21f8808-2334-4e60-a047-27a52e8adbce/4.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/c21f8808-2334-4e60-a047-27a52e8adbce/5.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/c21f8808-2334-4e60-a047-27a52e8adbce/6.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/c21f8808-2334-4e60-a047-27a52e8adbce/7.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/c21f8808-2334-4e60-a047-27a52e8adbce/8.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/c21f8808-2334-4e60-a047-27a52e8adbce/9.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/c21f8808-2334-4e60-a047-27a52e8adbce/10.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/c21f8808-2334-4e60-a047-27a52e8adbce/11.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/c21f8808-2334-4e60-a047-27a52e8adbce/12.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/c21f8808-2334-4e60-a047-27a52e8adbce/13.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/c21f8808-2334-4e60-a047-27a52e8adbce/14.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/c21f8808-2334-4e60-a047-27a52e8adbce/15.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/c21f8808-2334-4e60-a047-27a52e8adbce/16.png","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/c21f8808-2334-4e60-a047-27a52e8adbce/17.png"],"article":{"title":"夏邦银、胡厚民讲话（节录）","alias":"","parts":[{"type":"paragraph","text":"有熄火嘛！我们现在斗争方式改变了，不能象以前那样，乱冲，乱，撞。”接着他谈到资产阶级法权，说：“以后我们掌了权，也要搞点法权，但不能象他们那样搞。”"},{"type":"paragraph","text":"“中央有个老造反派支持我们，这个老造反派叫我们赶快把湖北武汉地区的情况写个材料给他。最近，我和夏邦银、谢望春、吴金、李想玉等五、六个人连夜赶写材料，连觉也睡不成。”“关于我们党组织的问题（按：指入党问题）他们不按中央的指示办，他们要犯错误的。我在很多会上，多次说过，武汉电信局的方景清搞得很不错，斗争很讲策略，搞的有理、有利、有节。人虽然不多，但是牌子终于挂出去了，我们不要千篇一律的挂革委会的牌子，有的原来没有革委会，现在挂牌子，他们就会说你是另立山头，就要抓辩子。”"},{"type":"paragraph","text":"“中央已经讲了，邓小平是还乡团的团长。邓小平揪出来了，还要把团员搞出来。邓小平搞修正主义是有组织的，肯定不是邓小平一个，现在不是熄火，我们造反派要进一步动员起来，进行斗争。”"},{"type":"paragraph","text":"七月九日夏邦银、胡厚民讲话（节录）"},{"type":"paragraph","text":"七月九日，夏邦银、胡厚民等人，召开形势分析会。会上，他们说：“我们各省的情况都作了了解，四川最好，放了人，其他省没有这样做。四川不仅人放了，而且还安排了工作。河南造反派内部分两派闹得很厉害，我们学习河南，主要是学习他们敢于造反、上台掌权的精神。”会上，对省里领导的情况也作了分析。他们说：“赵辛初六·一九讲话后，态度后退了。最近夏邦银几次找赵辛初，提出十几个问题要赵回答，赵答不出来。”“原来我们七月份要大搞的，现在要停停看看再搞。现在三件事要搞：街上的大标语、大字报可以贴；串连可以搞，交换交换情况嘛；定期分析会可以开。我们这样作，就抓不住什么辫子。主要在单位搞。”“对赵辛初的讲话，只能叫他前进，不能后退，看他怎么贯彻？”：：：·七月十三日潘洪斌在市房地局礼堂"},{"type":"paragraph","text":"·"},{"type":"paragraph","text":"集会上的讲话（节录）"},{"type":"paragraph","text":"，潘洪斌说：“我们这些人‘上’是肯定的，问题是如何上，上去后怎么办？在斗争当中上，这是一个办法；等一等，省、·市委转弯，做各级党委的工作，然后再上，这也是一种办法。不管是哪个办法，关键是我们要斗争。”"},{"type":"paragraph","text":"七月十四日彭勋、顾建棠在国棉六厂"},{"type":"paragraph","text":"，‘集会上的讲话（节录）"},{"type":"paragraph","text":"“中央已经讲了，邓小平是还乡团的团长。邓小平揪出来了，还要把团员搞出来。邓小平搞修正主义是有组织的，肯定不是邓小平一个，现在不是熄火，我们造反派要进一步动员起来，进行斗争。”"},{"type":"paragraph","text":"七月九日夏邦银、胡厚民讲话（节录）"},{"type":"paragraph","text":"七月九日，夏邦银、胡厚民等人，召开形势分析会。会上，他们说：“我们各省的情况都作了了解，四川最好，放了人，其他省没有这样做。四川不仅人放了，而且还安排了工作。河南造反派内部分两派闹得很厉害，我们学习河南，主要是学习他们敢于造反、上台掌权的精神。”会上，对省里领导的情况也作了分析。他们说：“赵辛初六·一九讲话后，态度后退了。最近夏邦银几次找赵辛初，提出十几个问题要赵回答，赵答不出来。”“原来我们七月份要大搞的，现在要停停看看再搞。现在三件事要搞：街上的大标语、大字报可以贴；串连可以搞，交换交换情况嘛；定期分析会可以开。我们这样作，就抓不住什么辫子。主要在单位搞。”“对赵辛初的讲话，只能叫他前进，不能后退，看他怎么贯彻？”：：：·七月十三日潘洪斌在市房地局礼堂"},{"type":"paragraph","text":"·"},{"type":"paragraph","text":"集会上的讲话（节录）"},{"type":"paragraph","text":"，潘洪斌说：“我们这些人‘上’是肯定的，问题是如何上，上去后怎么办？在斗争当中上，这是一个办法；等一等，省、·市委转弯，做各级党委的工作，然后再上，这也是一种办法。不管是哪个办法，关键是我们要斗争。”"},{"type":"paragraph","text":"七月十四日彭勋、顾建棠在国棉六厂"},{"type":"paragraph","text":"，‘集会上的讲话（节录）"}],"authors":["夏邦银","胡厚民"],"dates":[{"year":1976,"month":7,"day":9}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":16,"page_end":17},"tags":[{"name":"邓小平","type":"人物"},{"name":"河南文革","type":"人物"},{"name":"四川文革","type":"人物"},{"name":"限制资产阶级法权","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"06cdcecd89"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
