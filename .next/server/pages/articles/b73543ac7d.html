script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"热烈响应毛主席号召　大力领导春耕生产沪郊建立各级‘三结合’领导班子奉贤县‘三结合’生产办公室指挥有力调动了广大革命农民积极性","authors":[],"dates":[{"year":1967,"month":3,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　上海郊区广大贫下中农和农村工作干部，积极认真地贯彻了中共中央给全国农村人民公社贫下中农和各级干部的信，在市、县、社各级都迅速地建立了由革命群众组织代表、人民解放军驻地部队负责人和革命领导干部组成的革命的“三结合”的生产领导班子，大力地领导当前春耕生产运动。"},{"type":"paragraph","text":"上海郊区所以能够迅速地自上而下地按照革命的“三结合”原则建立起一个生产领导班子，是由于市、县、社已经实现和正在实现无产阶级革命派大联合，坚决响应毛主席“抓革命，促生产”的伟大号召的结果，同时由于坚决贯彻毛主席的干部政策，使一批犯错误的领导干部决心回到以毛主席为代表的无产阶级革命路线上来；也由于驻军部队积极贯彻中央军委指示，大力抓好春耕生产的结果。"},{"type":"paragraph","text":"市、县、社各级生产领导班子建立以后，立即围绕着春耕生产开展了一系列的活动。二月底，首先由中国人民解放军上海警备区主持召开了上海市农村三级干部高举毛泽东思想伟大红旗抓革命、促春耕誓师大会，会后，郊区所有的农村人民公社普遍地召开了党、政干部，民兵排长以上干部，贫协和革命群众组织代表参加的三级干部会议。接着又普遍以大队或生产队为单位召开了社员大会和民兵会议，认真学习中共中央给全国农村人民公社贫下中农和各级干部的信，大学“老三篇”和毛主席有关干部政策的指示，从根本上提高干部的认识，解决干部的思想问题。"},{"type":"paragraph","text":"从上到下的生产领导班子建立以后，还促使了与农业有密切联系的供销、商业、财政、交通运输、手工业等部门的无产阶级革命派，一方面搞好本单位的无产阶级文化大革命，一方面把春耕生产急用的农具、种子、肥料、农药等各种农用物资迅速调往农村，保证供应。"},{"type":"paragraph","text":"目前，上海郊区广大贫下中农和各级干部，在解放军的大力协助和支援下，高举毛泽东思想伟大红旗，突出政治，活学活用毛主席著作，已经出现一个春耕生产的新高潮。广大社员都积极投入集体劳动，劳动出勤率和劳动工效大大提高。开河筑渠、平整土地、松土施肥、积肥造肥、整修农具和选种等工作速度大大加快。"},{"type":"paragraph","text":"本报讯　在春耕生产高潮来临的前夕，奉贤县组成了有革命群众组织代表、人民解放军和县人民武装部代表、革命领导干部参加的革命的“三结合”的生产办公室。这个办公室坚决贯彻执行毛主席提出的“抓革命，促生产”的伟大方针，大抓毛主席著作的学习，大抓春耕生产。半个月来，生产面貌和广大贫下中农以及各级干部的精神面貌，都产生了巨大的变化，目前，全县掀起了一个热火朝天的春耕生产高潮。"},{"type":"paragraph","text":"三月二日，上海警备区主持召开的三级干部会议结束，奉贤县驻军和人民武装部立即召开了县级机关抓革命，促生产誓师大会。到会全县各级干部和革命群众，认真学习了党中央给全国农村人民公社贫下中农和各级干部的信，传达了市三级干部会议的精神，提高认识，统一思想，表示坚决响应党中央号召，立即掀起春耕生产高潮。会后，马上组成了生产办公室。革命的“三结合”的生产办公室一建立，立即就成为全县具有无产阶级权威的指挥春耕生产战斗的司令部。"},{"type":"paragraph","text":"生产办公室建立后，在驻军协助下，组成若干小组，深入各公社帮助召开三级干部会议，建立由革命群众组织代表、民兵代表和革命领导干部组成的革命的“三结合”公社生产领导小组，并协助公社生产领导小组，到各生产大队、生产队帮助健全和巩固领导班子。这样，从县到生产第一线的作战系统，就上下连接，畅通无阻，指挥灵活。"},{"type":"paragraph","text":"他们大张旗鼓地广泛深入地宣传了党中央给全国农村人民公社贫下中农和各级干部的信。受教育面达到社员总数的百分之九十左右，做到了家喻户晓，深入人心，极大地鼓舞了贫下中农和各级干部的信心。"},{"type":"paragraph","text":"他们大抓毛主席著作学习，掀起了学习毛主席著作的新热潮。肖塘公社一百六十九个生产队，去冬以来，坚持学习毛主席著作学习制度的只有八个，现在有九十四个生产队恢复了经常的学习制度。"},{"type":"paragraph","text":"由于生产办公室突出政治，大力领导春耕，因而广大干部、群众积极性大大提高，出现了男女老少齐上阵、千军万马闹春耕的新局面。目前的特点是出勤多、出工早、干劲足、工效高。广大社员积极投入积肥追肥、松土壅根、修筑渠道、平整土地等劳动。全县今年新修维修渠道土方二百万方。前一时期进展很慢，最近半个月，完成了百分之八十。"},{"type":"paragraph","text":"目前，奉贤县广大贫下中农和各级干部，在生产办公室的直接指挥下，正信心百倍，干劲十足，争取春耕生产的更大胜利。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b73543ac7d"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
