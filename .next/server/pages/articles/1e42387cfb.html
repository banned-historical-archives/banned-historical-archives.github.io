script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"0b2f26ed-ad29-48e7-9c89-446932a97ab0","name":"中共党史教学参考资料 第27册 “文化大革命”参考资料 下册（1988年）","internal":true,"official":true,"type":"pdf","author":"","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives3/main/0b2f26ed-ad29-48e7-9c89-446932a97ab0.pdf"],"article":{"title":"中华人民共和国全国人民代表大会公告","alias":"","parts":[{"type":"paragraph","text":"抵准，不受逮捕。第二十九条中华人民共和国对于任何由于拥护正义事业、参加革命运动、进行科学工作而"},{"type":"paragraph","text":"受到追害的外国人，给以居留的权利。"},{"type":"paragraph","text":"第四章国旗、国徽、首都第三十条国旗是五星红旗。"},{"type":"paragraph","text":"函徽，中词是五星照耀下的天安门，周围是谷穗和齿轮。首都是北京。"},{"type":"paragraph","text":"（新华社1975年1月19日讯，载1月20Ⅱ《人民[1报》）华人民共和国第四届全国人民代表大会"},{"type":"paragraph","text":"第一次会议关于政府工作报告的决议"},{"type":"paragraph","text":"（一九七五年一月十七日通过）"},{"type":"paragraph","text":"第四居全国人民代表大会第一次会议批准周恩来总理代表国务院向大会所作的《政府工作报告》。会议认为，从三届人大以来，国务院在毛主席为首的中国共产党中央委员会的领导下，在毛主席无产阶级革命路线的指引下，经过无产阶级文化大革命和目前正在全国普遍开展的批林批孔运动，对内对外的各项工作都取得了巨大的成就。到会代表深信，我们再用二十多年的时间，一定能够在本世纪内把我国建设成为社会主义的现代化强国。"},{"type":"paragraph","text":"（新华社1975年1月20日讯，载1月21日《人民日报》）中华人民共和国全国人民代表大会公告"},{"type":"paragraph","text":"（一九七五年一月十九日）"},{"type":"paragraph","text":"中华人民共和国第四届全国人民代表大会第一次会议于一九七五年一月十七日根据中国共产党中央委员会的提议，任命了中华人民共和国国务院总理、副总理、各部部长、各委员会主任。现公告如下：总理周恩来"},{"type":"paragraph","text":"副总理陈锡联"},{"type":"paragraph","text":"副总理纪登奎副总理邓小平"},{"type":"paragraph","text":"副总理华国锋：总理张春侨副总理李先念"},{"type":"paragraph","text":"副总理陈水贵"},{"type":"paragraph","text":"李际泰"},{"type":"paragraph","text":"第三机械工业部部长"},{"type":"paragraph","text":"理吴桂贤（女）到总"},{"type":"paragraph","text":"管"},{"type":"paragraph","text":"第四机械工业影部卡副总理王震"},{"type":"paragraph","text":"第五机械工业部部长"},{"type":"paragraph","text":"华成芳副总理余秋里"},{"type":"paragraph","text":"边疆"},{"type":"paragraph","text":"第六机械工业部部长副总理谷牧"},{"type":"paragraph","text":"注洋"},{"type":"paragraph","text":"第七机械工业部部长"},{"type":"paragraph","text":"所健副总"},{"type":"paragraph","text":"徐今强煤炭工业部型长"},{"type":"paragraph","text":"康世恩乔冠华"},{"type":"paragraph","text":"有津化工业部普承外交深部长"},{"type":"paragraph","text":"水利电力部部长"},{"type":"paragraph","text":"钱正英（女）"},{"type":"paragraph","text":"叶剑英国防部部长"},{"type":"paragraph","text":"钱之光"},{"type":"paragraph","text":"轻工业新部长"},{"type":"paragraph","text":"余秋里国家计划委易会主任"},{"type":"paragraph","text":"万里国家基本建设委员会主任谷牧"},{"type":"paragraph","text":"铁道部部长"},{"type":"paragraph","text":"飞公安部部长华国锋"},{"type":"paragraph","text":"交通部部长"},{"type":"paragraph","text":"钟夫翔对外贸易部部长李强"},{"type":"paragraph","text":"邮电部部长"},{"type":"paragraph","text":"张劲大卫生部部长"},{"type":"paragraph","text":"刘湘屏（女）"},{"type":"paragraph","text":"财政部部长方毅"},{"type":"paragraph","text":"范子喻对外经济联络部部长"},{"type":"paragraph","text":"商业部部民沙风"},{"type":"paragraph","text":"于会冰农林部部长"},{"type":"paragraph","text":"文化部部长陈绍昆"},{"type":"paragraph","text":"湖荣鑫冶金工业部部长"},{"type":"paragraph","text":"教育部部长"},{"type":"paragraph","text":"体育运动委员会主任李水清"},{"type":"paragraph","text":"庄则栋第-一机械工业部部长"},{"type":"paragraph","text":"刘西尧第二机械工业部部长"},{"type":"paragraph","text":"中华人民兵和国第四届全国人民代表大会第一点会议点席团"},{"type":"paragraph","text":"九七五年-月十七日于北京"},{"type":"paragraph","text":"（新华社1975年！18日讯、载：月19日《人民日报》）四届人大常委会举行第-次会议任命"},{"type":"paragraph","text":"江华为最高人民法院院长任命姬鹏飞为四届人大常委会秘书长"},{"type":"paragraph","text":"（一九七五年一月二十日）"},{"type":"paragraph","text":"第四届全国人民代表大会常务委员会第--次会议-一月二十日下午举行。会议由朱德委员长主持。"},{"type":"paragraph","text":"会议任命江华为最高人民法院院长、任命姬融飞为第四届全国人民代装大会常务委员会秘书长。"},{"type":"paragraph","text":"（新毕社1975年1月2数：月21日《人民日报》）"}],"authors":[],"dates":[{"year":1975,"month":1,"day":19}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":228,"page_end":229},"tags":[{"name":"周恩来","type":"人物"},{"name":"华国锋","type":"人物"},{"name":"谷牧","type":"人物"},{"name":"余秋里","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"批林批孔","type":"主题/事件"},{"name":"工业战线","ty
