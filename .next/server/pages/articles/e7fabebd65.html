script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji10","name":"毛泽东全集第10卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji10.pdf"],"article":{"title":"中央关于西安事变宣传方针给刘少奇的指示","alias":"","parts":[{"type":"paragraph","text":"中央关于西安事变宣传方针"},{"type":"paragraph","text":"给刘少奇的指示"},{"type":"paragraph","text":"（1937年1月7日）胡服："},{"type":"paragraph","text":"关于西安事变宣传方针如下："},{"type":"paragraph","text":"（一）西安事变，系国民党南京政府的内部问题，本党绝未参与。但事变发生后，本党即通电主张和平解决。"},{"type":"paragraph","text":"（二）本党对一切足以引起内战的行动，一律反对，故一方面反对南京的剿共内战政策，而对张杨亦未曾赞同过，因为张杨也许还可找到更好的办法，实现他们的抗日主张。"},{"type":"paragraph","text":"（三）蒋之释放，张之赴京，以及南京政府对此案之处置，本党也认为是南京内部的问题。本党站在公正的立场，赞同一切使事变引向和平解决的办法，反对使事变引向纠纷，便利日本帝国主义。"},{"type":"paragraph","text":"（四）为使中国从此实现和平统一、团结御侮，本党主张南京政府在张氏特赦之后，即应命令张回陕，率领东北军及西北全部军队开赴抗日前线，实现蒋氏、张氏共同救国的意见。"},{"type":"paragraph","text":"（五）但如南京政府不顾国家民族的整个利益，在特赦令之后，仍将张氏幽禁于南京，并将已撤退之军队重新开回，企图以武力解决东北军、西北军，则内战之祸必将继起。这种内战应由南京政府完全负责。"},{"type":"paragraph","text":"（六）本党将继续为停止内战、一致抗日的基本方针而奋斗，反对日寇及亲日派挑拨内战、分裂中国的阴谋。本党这种主张，虽为全国人民所拥护，但总是遭日寇及亲日派所反对。因此，我们成了日寇及亲日派的攻击目标，并以此作为造成灭亡中国的“防共”协定的资本。"},{"type":"paragraph","text":"中央"}],"authors":["毛泽东"],"dates":[{"year":1937,"month":1,"day":7}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":124,"page_end":125},"tags":[{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e7fabebd65"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
