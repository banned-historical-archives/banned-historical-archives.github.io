<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中央批转中央统战部关于中央和各级党委统战部干部管理工作试行方案","authors":[],"dates":[{"year":1956,"month":3}],"is_range_date":false,"parts":[{"text":"中央批转中央统战部关于中央和各级党委统战部干部管理工作试行方案","type":"title"},{"text":"现将“中央统战部关于中央和各级党委统战部干部管理工作试行方案”发给你们。中央同意这个方案，望你们研究执行。","type":"paragraph"},{"text":"中央统战部关于中央和各级党委统战部干部管理工作试行方案","type":"subtitle"},{"text":"一、为了贯彻执行中央“关于加强干部管理工作的决定”，中央和各级党委统战部要在中央和各级党委统一领导下，中央和各级党委的组织部统一管理下，逐步建立起干部管理工作。","type":"paragraph"},{"text":"二、中央和各级党委统战部分管的干部分为：","type":"paragraph"},{"text":"民主人士：","type":"subtitle"},{"text":"民主党派、无党派民主人士（包括起义将领和社会人士），工商界党外上层代表人物，少数民族党外上层代表人物，宗教界党外上层代表人物，华侨党外上层代表人物；","type":"paragraph"},{"text":"机关干部：","type":"subtitle"},{"text":"（1）国家机关：国务院第八办公室，省、直辖市、自治区人民委员会国家资本主义办公室；中央工商行政管理局，省、直辖市人民委员会工商行政管理局（处）；国务院宗教事务局，省、直辖市、自治区人民委员会宗教事务局（处）；国务院参议室，省、直辖市、自治区人民委员会参议室；中央和省、直辖市、自治区文史馆；中华人民共和国民族事务委员会，省、直辖市、自治区人民委员会民族事务委员会（处）；中华人民共和国华侨事务委员会，省、直辖市人民委员会华侨事务委员会（处）；民族出版社；华侨回国投资辅导委员会。","type":"paragraph"},{"text":"（2）政协、民主党派和人民团体：中国人民政治协商会议全国委员  会和各级地方委员会；各民主党派中央和各级地方机关；全国和各地工商业联合会；华侨联谊会；中国回民文化协进会；中国佛教协会和地方佛教协会；中国伊斯兰教协会和地方伊斯兰教协会；中国基督教三自爱国运动委员会和地方基督教三自爱国运动委员会。","type":"paragraph"},{"text":"（3）学校：中央和各地民族学院；北京文化进修学校；北京华侨补习学校；伊斯兰经学院的干部。","type":"paragraph"},{"text":"（4）企业：中国新闻社；华侨图书编纂委员会。","type":"paragraph"},{"text":"三、干部管理工作的基本任务：","type":"paragraph"},{"text":"（1）在民主人士的管理工作方面：第一、应该采取内部排队、鉴定等调查研究的方法，了解他们的政治历史情况、社会关系、代表性和他们在解放前后的表现和业务能力，并且以此为依据进行安排和使用；第二、通过社会活动、工作实践和学习对他们进行团结、教育和改造。","type":"paragraph"},{"text":"（2）在机关干部的管理工作方面：第一、应该采取各种实际可行的方法深入地、系统地考察和了解他们的政治品质和业务能力，并且以此为依据正确地挑选和提拔干部；第二、检查党的政策、决议在有关部门中的执行情况；第三、对所属机关的干部工作耠以指导、检查和督促，并且协助他们进行政治思想教育工作。","type":"paragraph"},{"text":"（3）检查党的统一战线政策执行情况。","type":"paragraph"},{"text":"此外，还要协助中央和各级党委组织部管理各级统战部门的干部。","type":"paragraph"},{"text":"四、干部管理工作上的分工和联系：","type":"paragraph"},{"text":"（1）凡属于各级党委统战部分工管理的干部，在“中央管理的干部职务名称表”以内的，由中央统战部负责管理，对这类干部的调动、任免，均须报请中央批准；其中凡由省、直辖市、自治区党委协助中央管理的干部，省、直辖市、自治区党委应该从监督、了解、教育、鉴定等方面协助中央管理，并且可以对这些干部的任免、调动提出建议。","type":"paragraph"},{"text":"（2）对民主党派、无党派民主人士和各界的党外上层代表人物，凡是从政治方面进行安排的（如人民代表、政协委员等），由统战部负责管理，对他们进行安排调动的时候要和有关部门商量；凡是在各部门担任实际职务的（如厅、局长，大学枝长等），由同级党委分管干部的各有关部门负责管理（如担任文教方面的职务的主要由党委宣传部或文教部负责管理，担任农、林、水利方面的职务的主要由党委农村工作部负责管理），这些部门对他们的调动任免，应该征求党委统战部的意见。各级党委分管干部的部门和各业务部门的党组，应该负责对他们所管理的民主党派、无党派民主人士和各界的党外上层代表人物进行考察，了解和教育。中央和各级党委统战部应该和各分管干部的部门、各业务部门的党组取得密切的联系，了解它们所管理的民主党派、无党派民主人士和各界的党外上层代表人物的政治思想情况和业务能力，并且协助它们进行统战政策的教育和统战工作的检查。","type":"paragraph"},{"text":"（3）中央和各级党委统战部分管的机关干部，凡是不属于“中央管理的干部职务名称表”以内的，由各个部门自行管理，或交有关机关的党组和人事部门代管，中央和各级党委统战部负责进行指导、检查和督促。","type":"paragraph"},{"text":"五、建立和健全各级党委统战部的干部管理机构：","type":"paragraph"},{"text":"（1）加强干部管理的工作是中央和各极党委统战部当前的重要任务之一。为了贯彻中央分部管理干部的决定，各省委、直辖市委、自治区党委、省辖市委统战部都应该建立干部管理处（科）、凡未建立的应该迅速建立起来。地委、县委统战部也应该加强干部配备和干部管理工作。干部管理机构的编制和干部，由各级党委负责解决。不设统战部的县，归统战部管理的干部，由县委责成有关部门管理。","type":"paragraph"},{"text":"（2）中央和各级党委统战部的干部管理处（科），应该加强人物调查研究工作，建立干部档案。民主党派、无党派民主人士和各界的党外上层代表人物，每人都应该有登记卡片、鉴定和小传；机关干部每人都应该有干部卡片、鉴定和自传；凡是档案材料不全的，要逐步补全。","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"07bba7ea82"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
