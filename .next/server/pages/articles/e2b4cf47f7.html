script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"巴特寮电台广播评论  谴责老挝极右集团破坏和平与和睦  指出他们阻挠签订议定书的活动必将遭到人民的严厉惩罚","authors":[],"dates":[{"year":1973,"month":8,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"巴特寮电台广播评论"},{"type":"paragraph","text":"谴责老挝极右集团破坏和平与和睦"},{"type":"paragraph","text":"指出他们阻挠签订议定书的活动必将遭到人民的严厉惩罚"},{"type":"paragraph","text":"新华社一九七三年八月十七日讯　巴特寮电台八月十六日广播了一篇评论，揭露老挝萨纳尼空极右集团阻挠关于万象协定的议定书的签订以及破坏老挝和平与和睦的险恶用心。"},{"type":"paragraph","text":"评论说，近几天来，萨纳尼空极右集团竭力活动，破坏和平，更加明目张胆和疯狂地阻挠关于万象协定的议定书的签订。在万象谈判中，他们指使萨纳尼空集团中的人士推翻双方已达成的协议，提出好多新问题，来阻挠谈判。与此同时，他们还派遣以乌敦·萨纳尼空为首的一小撮好战将领四出活动，企图发动政变。"},{"type":"paragraph","text":"评论指出，最近，萨纳尼空极右集团与国外反动势力相勾结，把特务、间谍和刺客引进老挝，企图制造政治危机，继续在老挝推行破坏和平和反对民族和睦的计划。"},{"type":"paragraph","text":"评论说，萨纳尼空极右集团这次反对和平、阻挠民族和睦的活动，清楚地暴露了他们的背叛祖国、破坏民族利益的面目。"},{"type":"paragraph","text":"评论说，和平与和睦是老挝人民的强烈愿望。萨纳尼空极右集团企图阻挠人民愿望的实现，阻止社会进步，必将被历史车轮碾得粉碎。他们反对和平、阻挠签订议定书所进行的活动，不仅是徒劳的，而且必将遭到人民的严厉惩罚。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e2b4cf47f7"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
