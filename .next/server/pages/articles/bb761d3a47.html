" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoistlegacy.de-2389","name":"最高人民检察院、公安部、邮电部关于颁发执行逮捕、拘留的机关扣押被逮捕、拘留人犯的邮件、电报暂行办法的联合通知","author":"最高人民检察院","internal":false,"official":false,"type":"unknown","files":[],"article":{"title":"最高人民检察院、公安部、邮电部关于颁发执行逮捕、拘留的机关扣押被逮捕、拘留人犯的邮件、电报暂行办法的联合通知","dates":[{"year":1979,"month":4,"day":5}],"is_range_date":false,"authors":["公安部","最高人民检察院","邮电部"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"黑龙江省人民检察院，监所检查工作文件选编，290-296","tags":[{"name":"逮捕","type":"主题/事件"},{"name":"拘留","type":"主题/事件"}],"parts":[{"type":"title","text":"最高人民检察院、公安部、邮电部关于颁发执行逮捕、拘留的机关扣押被逮捕、拘留人犯的邮件、电报暂行办法的联合通知"},{"type":"subtitle","text":"一九七九年四月五日"},{"type":"subtitle","text":"各省、市、自治区邮电管理局、北京市邮政局、北京长途电信局、北京市电信局；各省、市、自治区公安局、人民检察院："},{"type":"paragraph","text":"为执行一九七九年二月二十三日五届人大常委会第六次会议通过的中华人民共和国逮捕、拘留条例第十一条的规定，最高人民检察院、公安部、邮电部共同制订了关于“执行逮捕、拘留的机关扣押被逮捕、拘留人犯邮件、电报的暂行办法”，现予颁布，希自收到之日起认真贯彻执行。"},{"type":"paragraph","text":"附件：“执行逮捕、拘留的机关扣押被逮捕、拘留人犯的邮件、电报暂行办法”一份。"},{"type":"paragraph","text":"执行逮捕、拘留的机关扣押被逮捕、拘留人犯的邮件、电报暂行办法"},{"type":"paragraph","text":"第一条 为执行中华人民共和国逮捕、拘留条例第十一条的规定，特制定本办法。"},{"type":"paragraph","text":"第二条 被逮捕、拘留人犯的邮件、电报系指下列四种而言："},{"type":"paragraph","text":"（一）该人犯寄发的；"},{"type":"paragraph","text":"（二）直接寄交该人犯的；"},{"type":"paragraph","text":"（三）寄交他人转交该人犯的；"},{"type":"paragraph","text":"（四）寄交该人犯转交他人的。"},{"type":"paragraph","text":"第三条 执行逮捕、拘留的机关通知邮电机关扣押被逮捕、拘留人犯的邮件、电报时，应用密函通知相关邮电机关的负责人，由邮电机关指派专人将相关邮件、电报检出交与执行逮捕、拘留机关派到邮局接受该件之人员，或由执行逮捕、拘留机关指派专人至相关邮电机关检查，邮电机关予以协助。扣押的邮件、电报按本办法规定办理。"},{"type":"paragraph","text":"第四条 被扣押的邮件、电报，邮电机关应按下列手续办理："},{"type":"paragraph","text":"（一）被扣押的邮件、电报应逐件登记清单一式两份，正份连同邮件、电报交给相关执行逮捕、拘留机关、副份经执行逮捕、拘留机关签收后，由邮电机关存查。"},{"type":"paragraph","text":"（二）平常邮件应逐件登记收件人和寄件人名、住址及原寄局局名。"},{"type":"paragraph","text":"（三）挂号邮件应逐件登记挂号号码、收件人和寄件人的姓名、住址及原寄局局名。"},{"type":"paragraph","text":"（四）包裹应逐件登记包裹号码、重量、内装物品、封口完整情况、收件人和寄件人姓名、住址及原寄局局名。"},{"type":"paragraph","text":"（五）保价邮件除按本条第（三）、（四）款逐件登记外，并应登记保价金额。"},{"type":"paragraph","text":"（六）电报应逐件登记电报号数（原来号数或流水号数）、报类、发报局名，电报交发日期、时间、电报挂号或收报人住址姓名、收报局名以及本局收到电报的日期和时间。"},{"type":"paragraph","text":"第五条 被扣押的邮件、电报经执行逮捕、拘留机关处理后，认为可以交回邮电机关寄发时，仍须用正式书面通知并按第四条规定的登记手续登记清单一式二份送回原邮电机关签收转递。"},{"type":"paragraph","text":"第六条 邮电机关交出扣押的邮件，如发现破损时，应会同有关执行逮捕、拘留机关当面查验后代封，并在清单上注明破损情况。执行逮捕、拘留机关将被扣押的邮件退交邮电机关重新转递时，如发现邮件破损和封口不固，平常及挂号邮件应由执行逮捕、拘留机关代封并加盖公章，包裹、保价邮件应由执行逮捕、拘留机关会同邮电机关当面检验内装物品品种、数量和重量，开列详情单三份，由双方盖章一份封在邮件内，由扣留机关将邮件重封并加盖公章，其余两份分别附在登记清单上并在登记清单上注明。"},{"type":"paragraph","text":"第七条 执行逮捕、拘留机关将被扣押的邮件、电报退交原邮电机关重行转递时，如该邮件因封皮破损严重致无法认清收件人和寄件人姓名、住址或电报报底字模糊不清时，应先查明重行书写清楚，再交原邮电机关转递。如无法确定收件人和寄件人姓名、住址，不得退交邮电机关。"},{"type":"paragraph","text":"第八条 执行逮捕、拘留机关应在每次执行扣押邮件、电报时，作出扣押纪录一式两份，并由执行逮捕、拘留机关的执行人和邮电机关的代表共同在纪录上签字，正份当作法律文件装在侦查（包括预审）卷宗内，副份交邮电机关归档。"},{"type":"paragraph","text":"第九条 本暂行办法中所称执行逮捕、拘留的机关系指县、自治县、市及市辖区以上的各级公安机关、人民检察院及人民法院而言。在县、自治县，市及市辖区之下的公安机关需要扣押邮件、电报时，应通过县、自治县或市的公安机关，邮电机关方能受理。"},{"type":"paragraph","text":"第十条 本暂行办法中所称的邮电机关系指下列邮电机关而言："},{"type":"paragraph","text":"（一）有关邮件的为各地邮局或邮电局；"},{"type":"paragraph","text":"（二）有关电报的为各地电报局，长途电信局，电信局、邮局或邮电局。"}],"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"指示"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bb761d3a47"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
