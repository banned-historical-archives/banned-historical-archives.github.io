script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"日共《赤旗报》剥开约翰逊“和平攻势”的画皮  美国谋求同苏联合作向越南人民施加压力  中岛健藏谴责现代修正主义者鼓吹“和平共处”为美帝骗局效劳","authors":[],"dates":[{"year":1966,"month":1,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"日共《赤旗报》剥开约翰逊“和平攻势”的画皮"},{"type":"paragraph","text":"美国谋求同苏联合作向越南人民施加压力"},{"type":"paragraph","text":"中岛健藏谴责现代修正主义者鼓吹“和平共处”为美帝骗局效劳"},{"type":"paragraph","text":"据新华社东京十日电  日本共产党机关报《赤旗报》九日发表文章，揭露美国关于越南问题的所谓“和平攻势”，不过是为了掩盖它继续扩大侵略战争的一张画皮。"},{"type":"paragraph","text":"文章说，美国如果真有诚意，那末它首先应该对它违反日内瓦协议的行为低头认罪，从南越撤兵和撤除基地，让越南人民自己解决越南问题。"},{"type":"paragraph","text":"文章说，约翰逊最近向各方面派出特使，四处推销它的十四点计划，其真正的企图是：一、假装美国有“和平的诚意”，以欺骗世界舆论；二、谋求包括苏联在内的一些国家和势力在越南问题上同美国进行新的合作；三、要求英国、日本、泰国等协助和参与侵略越南的国家加强对美国的支持，在这里，对它的军事同盟者日本的期待很大；四、尽可能使“不结盟国家”的右派和现代修正主义者以及日本等联合起来，向越南人民的正义斗争施加政治压力。"},{"type":"paragraph","text":"日中文化交流协会理事长中岛健藏谴责现代修正主义者跟在美国后边，鼓吹“和平共处”为所谓“无条件”谈判效劳。"},{"type":"paragraph","text":"亚非作家会议日本联络委员会主席白石凡指出，美国在玩弄“和平攻势”之后，有可能把侵略越南的战火扩大到老挝和柬埔寨。"},{"type":"paragraph","text":"废除日美“安全条约”争取实现各种要求中央实行委员会事务局长堀真琴说，美国的“和平攻势”，只不过是为争取时间，把侵略越南的战争升级到老挝、柬埔寨以及其他地区。"},{"type":"paragraph","text":"日本著名评论家松冈洋子指出，美国竭力宣传它暂停轰炸北越，似乎是一种“让步”，是走向“和平”的步骤，实际上它现在正向南越调兵遣将，加强在泰国等地的军事基地，加强扩大战争的准备。"},{"type":"paragraph","text":"日本军事评论家新名丈夫说，美国正在准备轰炸河内、海防，对越南北方实行海上封锁，并且准备把侵略战争扩大到整个印度支那。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ad143ed9c4"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
