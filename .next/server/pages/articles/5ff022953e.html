<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"抓住战机主动出击　严厉惩罚反动军警  泰国爱国军民在北部地区痛歼敌军  泰国工人纷纷展开斗争反对美、日垄断资本残酷剥削","authors":[],"dates":[{"year":1972,"month":7,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"抓住战机主动出击　严厉惩罚反动军警"},{"type":"paragraph","text":"泰国爱国军民在北部地区痛歼敌军"},{"type":"paragraph","text":"泰国工人纷纷展开斗争反对美、日垄断资本残酷剥削"},{"type":"paragraph","text":"据新华社讯　据“泰国人民之声”电台广播，泰国爱国军民最近在泰国北部的清莱、黎、碧差汶等府歼灭许多敌人。"},{"type":"paragraph","text":"电台说，泰国反动派从六月初开始，接连派遣反动军警前往清莱府镇压人民爱国斗争。爱国军民抓住战机，时而阻击运动中的敌人，时而袭击敌人的宿营地。仅在六月九日到十一日的三天中，就打死打伤敌人三十多名，缴获一批枪支弹药和军用物资。接着，这个府的汤县爱国军民又在六月十七日阻击反动军警，当场打死打伤敌人十多名。六月十八日，这个府的爱国军民又成功地袭击敌人的一处营地，打死打伤敌人七名。"},{"type":"paragraph","text":"战斗在黎府和碧差汶府的爱国军民，最近也取得新的胜利。六月五日，他侬—巴博集团的一支军队窜进黎府丹泗县奇陶村镇压人民，爱国军民奋勇抵抗，打死打伤敌人七名。第二天，当这支敌军逃跑时，半途又遭到爱国军民的阻击，敌军当场死伤四名，爱国军民并击落敌军直升飞机一架。"},{"type":"paragraph","text":"东北部的爱国军民，五月九日在那空拍侬府和乌汶府交界地区，伏击了反动军警，歼敌六名，同时，阻击了敌人的援兵，打死敌人四名、打伤七名。"},{"type":"paragraph","text":"据新华社讯　据“泰国人民之声”电台报道，泰国东北部、北部地区爱国军民最近主动出击，袭击泰国反动军警，歼灭了一批敌人。"},{"type":"paragraph","text":"活跃在泰国北部难府地区的人民解放军和当地人民，为了惩罚一支前来镇压人民的反动军警，在磨县地区埋下地雷。爱国军民在五月二十三日战斗中，取得了消灭敌人八十一名，炸毁敌人军车一辆的新胜利。"},{"type":"paragraph","text":"泰国东北部乌隆府的爱国军民，五月三十日在那干县袭击敌人的一支警察巡逻队，打死、打伤敌人多名。那空拍侬府人民解放军五月三十一日深夜，袭击并捣毁了那家县的一个“乡村自卫队”据点，全歼了这个据点里的二十三名敌人，缴获敌人的全部武器。"},{"type":"paragraph","text":"六月一日和二日，沙功那空府人民解放军在班芒县地区袭击敌人的据点，伏击敌人的援兵，歼灭了一批敌人。"},{"type":"paragraph","text":"新华社一九七二年七月一日讯　据“泰国人民之声”电台六月三十日报道，泰国工人最近纷纷展开斗争，反对美国、日本垄断资本家的残酷剥削。"},{"type":"paragraph","text":"报道说，从五月份以来，泰国工人斗争此伏彼起。五月十五日，沙没巴干府帕巴玲县一家塑料厂的约四百名工人举行罢工，迫使资本家答应履行与工人签订的合同。同一天，在叻丕里府抱才榄县七沙缅区，一家菠萝罐头厂的约一百三十多名工人也举行罢工，反对美、日资本家的沉重压迫和剥削，要求增加工资。五月十六日，承建博他仑府一条公路的一家建筑公司的约一百五十名工人抗议资方扣发工资。五月二十四日，吞武里府廊坎县一家日本资本家开设的汽车装配厂的二百名工人抗议厂方无理开除三十六名工人。由于工人们坚持团结斗争，迫使日本资本家恢复了这些工人的工作。六月中旬，曼谷一家专为国际航机办理食品的外资公司的工人也展开斗争，反对外国资本家的压迫剥削和歧视。六月二十一日，在沙没巴干府直辖县的茉莉牌泰国炼奶厂的约二百名工人也举行罢工，抗议外国资本家无理迫害工人。"},{"type":"paragraph","text":"报道指出，泰国工人的斗争得到了广大人民的支持。工人们从自身的团结斗争中清楚地认识到，工人们只有依靠自己的团结斗争，才能获得应有的权利。（附图片）"},{"type":"paragraph","text":"泰国人民解放军在人民武装斗争的烽火中不断壮大、成长。图为泰国人民解放军某班战士正在学习。新华社发"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5ff022953e"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
