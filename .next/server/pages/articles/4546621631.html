script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"江苏发现我国最早人殉墓葬  为探索奴隶制起源提供重要实例","authors":[],"dates":[{"year":1989,"month":12,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"江苏发现我国最早人殉墓葬"},{"type":"paragraph","text":"为探索奴隶制起源提供重要实例"},{"type":"paragraph","text":"新华社南京12月12日电  南京博物院考古队最近在江苏北部新沂县发现距今5000年左右的人殉墓葬和一批良渚文化时期的玉器等器物。"},{"type":"paragraph","text":"位于新沂县马陵山的花门新石器时代古墓葬是一个规模较大的墓葬群。今年发掘清理的40座墓葬中，有5座大墓，一般有长5米、宽3米的墓坑，墓主皆为男性，脚后或身侧都殉葬男女少年各一、二人。在60号大墓中，墓主两侧及上方共殉葬5人，其中1人为儿童，均似家内奴隶。经上海自然博物馆人类学专家黄象洪副教授等专家鉴定，这是中国最早的人殉墓葬，年代为距今5000年上下的大汶口文化中晚期。专家们认为这次发掘为探索中国奴隶制起源提供了重要实例。"},{"type":"paragraph","text":"在新沂县花门墓葬中还清理出随葬陶器、玉器各数百件，还有一些石器和骨器。玉器中有璧、琮、环、穿孔斧、珠、管等，有些玉器上刻有人面和兽面纹饰。据专家考证，这与江南良渚文化时期玉器的特征大致相同。专家们认为，这对研究中华民族的形成与发展有重要意义。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"江苏文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4546621631"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
