script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"本市学术文化界举行讨论会和报告会批判资产阶级唯心主义思想","authors":[],"dates":[{"year":1955,"month":3,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　上海市学术文化界胡适思想批判讨论会文学组在二十四日举行了第二次讨论会，就叶以群写的“胡适在‘五四’文学革命中做了些什么?”一文进行了讨论。讨论会揭露了胡适在“五四”运动前后一系列的活动就是用资产阶级唯心论的观点，来缓和文化战线上的思想斗争，是胡适忠诚于帝国主义和封建统治、反对人民民主主义革命的表现。上海市学术文化界胡适思想批判讨论会哲学、历史、教育等组，也都分别召开了第二次讨论会，政治组的第二次讨论会不久也要举行。"},{"type":"paragraph","text":"二十六日下午，上海市学术文化界胡适思想批判讨论会工作委员会举行第四次学术报告会，由彭柏山同志讲“胡风文艺思想批判”。听报告的有各机关工作人员和知识分子二千余人。彭柏山在报告中首先说明批判胡风文艺思想的重要意义，它对于我们一般的干部、知识分子，对于日常的反对资产阶级思想影响的斗争的关系，并说明从这个斗争中学习唯物主义的道理。其次，他就文艺与政治的关系问题、作家立场问题、现实主义问题、我国文学传统问题等四个方面，批判了胡风资产阶级唯心主义文艺思想的反马克思主义观点，指出它的错误所在。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"99dd10a799"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
