script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"不要迷信","authors":[],"dates":[{"year":1958,"month":5,"day":13}],"is_range_date":false,"parts":[{"text":"济南歼雀三万七千九百余只","type":"title"},{"text":"〔本报讯〕自11日至12日，济南市六十二万多人组成的围剿麻雀大军，经过三天连续战斗，取得了辉煌战果。截至昨（13）日晚10时统计，共歼灭麻雀三万七千九百六十六只。","type":"paragraph"},{"text":"在战斗中，全市人民的斗志日益顽强。在11日灭雀七千五百多只的胜利基础上，围剿麻雀总指挥部，于当日深夜总结了围剿麻雀的经验，连夜作了新的战斗部署。除将战线扩大至九十六华里，使麻雀企图突破防线飞往郊区的梦想宣告破灭外，又调兵遣将，支援薄弱地区，并扩大了毒饵区，使火枪队由阵地战，转为游击战，追歼“敌人”，同时还与麻雀展开了争夺制高点的战斗，凡是高树、大楼、高山都岗哨林立，严加防守，千佛山、四里山上，红旗密布，火枪、响器和三千多个顽强的战斗员的呐喊声，震动了整个山岗，企图偷越山头的“敌人”，多次都被赶下山来；黄河大堤防线，堵住了麻雀偷渡黄河的去路；一阵轰击之后，搜捕和夜袭的队伍又大显身手，掏、堵战术也获得了伟大战果。因而十二月一日歼雀一万一千六百九十六只。","type":"paragraph"},{"text":"昨（13）日，全市人民歼灭麻雀的战术更加丰富了，除了对房上、树丛、草垛、夹道、麦垄、菜园的搜索之外，火枪响遍全市；毒饵区里倒寂静无声，疲惫饥渴难耐的麻雀，进了“宴席”，也随即横尸遍地，更多的假人、树枝复活了。工人医院门诊部六十二岁的陈琥琳大夫，一根大绳栓住两棵树，大绳系在自己腰上，手中击打着响器，真是一动树摇金鸣；大明湖战区的火枪手们，全线出击，北到黄河二堤，南过千佛山，东至历城还乡店，战绩较前一日大过十倍多。大明湖上的一百多只战船，布遍了芦苇丛和水面，使麻雀连利用芦苇喘息的余地都没有了。少先队员组成的弹弓队，出现在全市各个角落。山东医学院附属小学六年级十二岁的少先队员张安民，自己用弹弓打下麻雀二十一只，他们全组十二人，灭雀六十二只。因而第三日消灭麻雀一万八千七百七十只。","type":"paragraph"},{"text":"全市人民为辉煌的战绩而兴奋，他们说：麻雀大遭殃，粮食省满仓。若按每只麻雀一年内吃和糟塌粮食五斤计算，可节省粮食十八万九千八百多斤。","type":"paragraph"},{"text":"市围剿麻雀总指挥部在宣告围剿麻雀突击战斗胜利结束的时候，向全市人民提出：各区要继续保持一部分精干力量，在麻雀常常集中的地方，设放毒饵、枪打，夜间要经常掏、堵。决心为全歼麻雀而不懈地奋斗到底。","type":"paragraph"}],"comments":[],"origin":"1958年5月14日《大众日报》第一版，原题为：“万众连战三日  轰掏毒打并用：济南歼雀三万七千九百余只/突击战斗胜利结束  经常战斗将不懈进行”。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cdf6977e97"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
