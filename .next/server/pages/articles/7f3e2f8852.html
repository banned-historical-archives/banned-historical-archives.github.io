script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"阿尔巴尼亚人民满怀革命豪情庆贺水电建设的又一成就  毛泽东水电站截流工程胜利竣工","authors":[],"dates":[{"year":1969,"month":7,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"阿尔巴尼亚人民满怀革命豪情庆贺水电建设的又一成就"},{"type":"paragraph","text":"毛泽东水电站截流工程胜利竣工"},{"type":"paragraph","text":"新华社地拉那二十二日电　在阿尔巴尼亚人民满怀革命豪情迎接祖国解放和人民革命胜利二十五周年的日子里，正在建设中的阿尔巴尼亚第四个五年计划的重点项目——毛泽东水电站的截流工程于二十一日胜利完成。这是水电站英雄的建设者们遵循阿尔巴尼亚劳动党和霍查同志的教导，在两年多的夜以继日的忘我劳动和顽强战斗中所取得的一个重大胜利。"},{"type":"paragraph","text":"二十一日，德林河岸上的毛泽东水电站工地披上了节日的盛装。工地上悬挂着阿尔巴尼亚人民的伟大领袖霍查同志和中国人民的伟大领袖毛主席的画像，红旗迎风招展，巨幅标语上写着：“以恩维尔·霍查同志为首的阿尔巴尼亚劳动党中央委员会万岁！”“祖国解放二十五周年万岁！”数以千计的水电站的建设者、斯库台市的劳动人民、农业合作社社员和青年义务劳动者聚集在工地上，观看围堰的最后合拢。"},{"type":"paragraph","text":"观看围堰合拢的有：阿尔巴尼亚劳动党中央政治局委员拉米兹·阿利雅、斯皮罗·科列加，政治局候补委员科乔·蒂奥多西，劳动党斯库台区委第一书记普罗科普·穆拉，建筑部长希纳西·德拉戈蒂，阿尔巴尼亚工会中央理事会总书记托宁·雅科瓦，阿尔巴尼亚人民议会主席团秘书比尔比尔·克洛西，斯库台区人民会议执行委员会主席比拉尔·帕鲁查等同志。"},{"type":"paragraph","text":"中国水利电力部副部长王英先，中国驻阿尔巴尼亚大使馆经济参赞周平，以及参加水电站建设的中国工程技术人员也出席观看。"},{"type":"paragraph","text":"截流工程在二十一日上午十时许开始。自卸车和推土机不断地把拦河材料投入拢口，经过两小时的紧张战斗，围堰终于最后合拢。至此，德林河改经导流隧洞，从而为水电站的大坝等工程的修建创造了重要的条件。"},{"type":"paragraph","text":"围堰合拢后，斯皮罗·科列加同志为导流隧洞的正式投入使用剪了彩。"},{"type":"paragraph","text":"为了庆祝水电站截流工程的胜利，在工地上举行了酒会，斯皮罗·科列加同志代表阿尔巴尼亚劳动党中央委员会、部长会议和霍查同志本人热烈祝贺水电站建设中的这一重大胜利。（附图片）"},{"type":"paragraph","text":"正在修建中的阿尔巴尼亚毛泽东水电站建筑工地一角。　新华社发"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7f3e2f8852"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
