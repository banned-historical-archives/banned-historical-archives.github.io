script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji27","name":"毛泽东全集第27卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji27.pdf"],"article":{"title":"接受苏联驻华大使罗申呈递国书时的答词","alias":"","parts":[{"type":"paragraph","text":"接受苏联驻华大使罗申"},{"type":"paragraph","text":"呈递国书时的答词"},{"type":"paragraph","text":"（1949年10月16日）罗申大使先生："},{"type":"paragraph","text":"我很高兴地接受贵大使所呈递的苏维埃社会主义共和国联盟最高苏维埃主席团的国书，并衷心地感谢贵大使的祝贺。中华人民共和国建立伊始，即承苏联政府首先响应愿与我国建立外交关系。我相信，中苏之间的友谊，将因贵国政府的这一决定，日益发展和巩固起来。我热烈地欢迎贵大使出任苏联驻中华人民共和国的首任特命全权大使。我相信，经过贵大使的努力，贵我两国的合作，将日趋密切，同时将有利于共同争取世界的持久和平。我在此，谨祝贵国国家繁荣，人民兴旺，并祝贵国元首健康！"}],"authors":["毛泽东"],"dates":[{"year":1949,"month":10,"day":16}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":427,"page_end":427},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"103900d06a"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
