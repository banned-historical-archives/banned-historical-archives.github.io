" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"宁夏革命造反派关于宁夏军区个别领导人的重要声明","authors":[],"dates":[{"year":1967,"month":3,"day":17}],"is_range_date":false,"parts":[{"text":"宁夏革命造反派关于宁夏军区个别领导人的重要声明","type":"title"},{"text":"2月11日以来，宁夏军区个别领导人，利用宁夏革命造反派联合委员会工作中的某些缺点、错误，把人民内部矛盾扩大为敌我矛盾，对广大革命造反派施加压力，分化瓦解，使我区无产阶级文化大革命遭到严重挫折。","type":"paragraph"},{"text":"我区广大革命造反派和革命群众，为了捍卫毛主席的革命路线，对宁夏军区个别领导人的错误言行进行了严肃地揭发批判，希望他们站在毛主席的革命路线上来，同广大革命造反派一道，挽回目前我区无产阶级文化大革命出现的严重局面。这是革命的行动，是无可非议的。","type":"paragraph"},{"text":"目前，我国无产阶级文化大革命进入两个阶级，两条道路、两条路线决战的关键时刻，无产阶级革命造反派大联合、大夺权的风暴席卷全国，震撼全世界。阶级敌人并不甘心他们的死亡，正在进行垂死挣扎。帝国主义、修正主义和各国反动派互相勾结，掀起猖狂的反华逆流，甚至进行军事挑衅，妄图武力颠覆我们伟大的社会主义祖国。国内的阶级敌人同国际上的阶级敌人相呼应，蠢蠢欲动，矛头直指伟大的中国人民解放军，直指无产阶级革命派，进行猖狂反扑。鉴于这种情况，为了响应我们伟大领袖毛主席“备战、备荒、为人民”的号召，顾全大局，特郑重声明：","type":"paragraph"},{"text":"一、建议宁夏军区和我们革命造反派，双方立即停止一切形式的论战。为表明我们的诚意，从即日起，我们首先停止。","type":"paragraph"},{"text":"二、建议立即由宁夏军区和我们革命造反派，各自选派代表进行协商，充分交换意见，以寻求解决分歧的途径。","type":"paragraph"},{"text":"三、希望宁夏军区以革命利益为重，从大局出发，认真考虑我们的上述积极建议，迅速采取相应措施。","type":"paragraph"},{"text":"打倒美帝！打倒苏修！","type":"paragraph"},{"text":"伟大的中国人民解放军万岁！","type":"paragraph"},{"text":"无产阶级文化大革命胜利万岁！","type":"paragraph"},{"text":"毛主席的革命路线胜利万岁！","type":"paragraph"},{"text":"伟大的中国共产党万岁！","type":"paragraph"},{"text":"我们心中最红最红的红太阳毛主席万岁！万岁！万万岁！","type":"paragraph"},{"text":"银川无产阶级革命造反派联合总指挥部","type":"paragraph"},{"text":"宁夏工矿企事业毛泽东思想革命造反联合总部","type":"paragraph"},{"text":"银川工矿企业捍卫毛泽东思想联络部","type":"paragraph"},{"text":"银川工业系统捍卫毛泽东思想联络部","type":"paragraph"},{"text":"银川农村红色革命造反联合指挥部","type":"paragraph"},{"text":"宁夏大学毛泽东思想红卫兵各战斗团联合指挥部","type":"paragraph"},{"text":"宁夏毛泽东思想工人革命造反联络总部","type":"paragraph"},{"text":"银川市手工业系统毛泽东思想造反联络部","type":"paragraph"},{"text":"宁夏公安厅东方红革命造反委员会","type":"paragraph"},{"text":"银川铁路局“二七”战斗团","type":"paragraph"},{"text":"银川市公安局红旗战斗队","type":"paragraph"},{"text":"宁夏电业系统革命造反总部","type":"paragraph"},{"text":"银川卫生系统革命造反联络部","type":"paragraph"},{"text":"银川地区财贸系统革命造反联合总部  商业系统革命造反联合总部","type":"paragraph"},{"text":"宁夏日报社革命造反战斗团","type":"paragraph"},{"text":"区市级文艺界革命造反联络部","type":"paragraph"},{"text":"自治区交通系统革命造反总指挥部","type":"paragraph"},{"text":"银川城建系统毛泽东思想革命造反兵团","type":"paragraph"},{"text":"区建公司捍卫毛泽东思想红军战斗团","type":"paragraph"},{"text":"银川工矿企事业反修联合造反团","type":"paragraph"},{"text":"宁夏地区红卫第二兵团  锷未残联合战斗团","type":"paragraph"},{"text":"东北野战军  1月风暴兵团  前驱兵团","type":"paragraph"},{"text":"区级机关革命造反联络站  银川市机关革命造反联络部","type":"paragraph"},{"text":"毛泽东思想红卫兵银川市联络站","type":"paragraph"},{"text":"银川新闻工作者革命造反联络部  银川市广播站革命造反队","type":"paragraph"},{"text":"银川地区半工（农）半读革命造反联络部","type":"paragraph"},{"text":"毛厂“红尖兵”战斗团  小氮肥厂捍卫毛泽东思想战斗团","type":"paragraph"},{"text":"区水利局工程设计处黄河兵团  红卫兵兰州九·三革命总部驻宁办事处","type":"paragraph"},{"text":"银川市小学毛泽东思想红卫兵联络部","type":"paragraph"},{"text":"毛泽东思想红色造反派联合指挥部","type":"paragraph"},{"text":"毛泽东思想红卫12.26联络站  银川市傲霜雪兵团","type":"paragraph"},{"text":"银川市毛泽东思想主力军","type":"paragraph"},{"text":"地质部宁夏综合大队鲁迅战斗团、红旗战斗队","type":"paragraph"},{"text":"农林水电系统毛泽东思想战斗团","type":"paragraph"},{"text":"银川市交通系统捍卫毛泽东思想战斗团  银川市运输公司红旗兵团","type":"paragraph"},{"text":"银川市邮电局红色造反者联合总部","type":"paragraph"},{"text":"宁夏中等学校红色教职工联络部  宁夏小学革命教师红色造反团总部","type":"paragraph"},{"text":"宁夏农村社教工作队员革命造反团总部","type":"paragraph"},{"text":"区物资局12.21革命造反团等革命造反派组织","type":"paragraph"},{"text":" 1967年3月7日","type":"paragraph"}],"comments":[],"origin":"《宁夏回族自治区无产阶级文化大革命（文件汇编）》，宁夏无产阶级革命派总指挥部政治部、宁夏自治区革命工人代表大会政宣部合编，1968年1月27日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"宁夏文革","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"人民内部矛盾","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5a4fb9dc2d"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script><
