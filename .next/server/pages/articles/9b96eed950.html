script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"任仲夷撰文分析小资产阶级思想对党的影响","authors":[],"dates":[{"year":1980,"month":9,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"任仲夷同志最近在《工人日报》发表的《肃清封建思想和小资产阶级思想的影响是一个需要重视的问题》的文章中说:在扩大的八届三中全会以后，党内基本上只提批判资产阶级不大提小资产阶级了，克服封建影响更是极少提到。到“文化大革命”时几乎只批资产阶级了，又重新回到七届二中全会的提法上去，甚至走得更远。许多问题就从这里来的。"},{"type":"paragraph","text":"在《关于纠正党内的错误思想》和《关于若干历史问题的决议》中，都指出党内产生错误思想的社会根源之一是小资产阶级思想影响。为什么党的历史上那么注意克服小资产阶级思想?这很有道理，因为合乎中国国情。小资产阶级思想有它自己的特点，平均主义、迎合性、摇摆性、狂热性等就是它的表现。资产阶级个人主义在表现形式上，和小资产阶级个人主义也不完全一样。我觉得在我们党内和革命队伍内，只批资产阶级，不批小资产阶级，往往不是对症下药。"},{"type":"paragraph","text":"过去多次运动出现扩大化，都和小资产阶级思想影响有关。狂热，一阵风，定极端，宁“左”勿右，这些小资产阶级思想的表现，是我们在运动中常常见到的。从前有一种说法，叫做“右是立场问题，‘左’是方法问题”，其实，“左”同样是立场问题，小资产阶级立场嘛。中国封建阶级、小资产阶级、资产阶级之间，有千丝万缕的联系。中国民族资产阶级受封建影响，中国小资产阶级也受封建影响，中国的买办资产阶级是封建官僚买办。封建思想对广大群众也有影响。正因为如此，在中国搞家长制、一言堂有土壤，民主很不容易发扬。文化科学水平低容易产生官僚主义和蒙昧主义，相信真龙天子，信神。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9b96eed950"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
