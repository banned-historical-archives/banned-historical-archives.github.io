" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji18","name":"毛泽东全集第18卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji18.pdf"],"article":{"title":"中国政治黑暗，抗战不力，英美盟邦大不满意","alias":"","parts":[{"type":"paragraph","text":"中国政治黑暗，抗战不力，"},{"type":"paragraph","text":"英美盟邦大不满意！]"},{"type":"paragraph","text":"（1943年7月12日）"},{"type":"paragraph","text":"【新华社延安十二日电】英美盟邦人士，对中国之法西斯政治，大不满意。熊式辉在纽约、华盛顿、伦敦之招待会上，均被人提出如下问题，要求他答复：（一）中国名为民主国家，对民权政治之产生、保障及巩固之方法如何？（二）劳动营之设立，根据何种目的？以上两项问题，被到会人士反复质询，熊式辉默然无以置答。宋美龄在美国，对中国内部团结情形如何一项问题，作了隐瞒实情的解释，亦当场被美国人击。彼等美国人称：“宋美龄先生所说的情形，和我们美国人所知道的中国内情，是不相符合的。”关于美国援助中国的武器，不用到前线打日本，却大量武装后方部队，例如胡宗南之三十余万人，专门用以对付共产党，亦很不满意。闻英美曾向熊式辉公开表示：中国以前获得之援助，如果全部用在前线，当可打几仗，但中国皆补充后方，英美自不能以大量之武器，继续供给不去打轴心国之国家。因此，熊式辉返国后，对英美甚感失望。国民党中之许多人，亦仍不愿从改良政治，加强国内团结，加强对敌作战上用功夫，而只怨恨英美不给更多的帮助。近日国民党发动"},{"type":"paragraph","text":"[1]这是毛泽东为新华社写的消息。“解散共产党，取消边区”之叛卖性的运动，同时撤出河防兵力，准备进攻边区，此等消息传至英美，不知英美人士又当作何感想云。"},{"type":"paragraph","text":"毛泽东为新华社撰写的《中国政治黑暗，抗战不力，英美盟邦大不满意》的手稿（部分）。"}],"authors":["毛泽东"],"dates":[{"year":1943,"month":7,"day":12}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":105,"page_end":107},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"34fbc02067"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
