script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"蚕农不甘受剥削 嘉兴二茧行被打","authors":[],"dates":[{"year":1946,"month":6,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报嘉兴通讯】　今年浙省产丝区因为茧价太低，各地蚕户惶惶不安，甚至有因此自杀者。直到最近几天，中蚕公司方才把收价改订，“每担中心扯价定为十五万元以上”。但此间的几个茧行，仍然没有提高，于是在众怒之下，廿八，九日就接连展开了“打”的场面。(一)本县汉南乡圣塘头地方有嘉福公司第四收茧厂福农茧行，日来收价依旧只有十万元蚕户气愤之余，于廿八日午后大肆捣毁，一时秩序大乱，该行的伙友都吃了拳头，后来由当地乡保长士绅出来调解，结果商定“以后收价最低不得少于十五万元”，一场风波，方才平息。(二)开设于七星桥的大经茧厂，廿九日上午亦同样被乡民聚众捣毁，职员也遭到痛打。但蚕农实际的要求当然不是“痛快的打”，而是“收价的公允”，只要使他们今春辛勤的血汗不落空，谁愿意多事呢?"},{"type":"paragraph","text":"(五月三十日，村寄)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c7d780120f"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
