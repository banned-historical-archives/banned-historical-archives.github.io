script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"广州绢麻纺织厂革委会贯彻毛主席的无产阶级政策  办学习班　抓活思想　正确解决干部问题","authors":[],"dates":[{"year":1969,"month":2,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"广州绢麻纺织厂革委会贯彻毛主席的无产阶级政策"},{"type":"paragraph","text":"办学习班　抓活思想　正确解决干部问题"},{"type":"paragraph","text":"据新华社广州电　广州绢麻纺织厂革命委员会，发动群众对犯错误的好人多做教育工作，鼓励他们到群众中去检查错误，给予他们改正错误的机会，从而团结了一切可以团结的力量，孤立和打击了一小撮阶级敌人。"},{"type":"paragraph","text":"前段时期，有些革命职工不愿意接近和教育犯过错误的人。革委会通过举办各种类型的毛泽东思想学习班，组织革命职工学习毛主席关于“对犯错误的好人，要多做教育工作，在他们有了觉悟的时候，及时解放他们”的指示，提高了革命职工执行毛主席无产阶级政策的自觉性。革命职工们说：“是否正确对待犯错误的好人，这也是两条路线的斗争。”“我们一定听毛主席的话，对犯错误的好人，多做教育工作，团结他们共同对敌。”一个受过资产阶级反动路线压制的革命工人，原来对犯错误的干部，不愿接近，也不愿对他们进行教育。经过学习，她遵照毛主席“共产党员对于在工作中犯过错误的人们，除了不可救药者外，不是采取排斥态度，而是采取规劝态度，使之翻然改进，弃旧图新”的教导，同犯错误的干部一起谈心，一起学习毛主席的最新指示，一起忆苦思甜，帮助犯错误的干部认识错误，鼓励他们改正错误，使他们深受感动，坚定了改正错误的决心。"},{"type":"paragraph","text":"对犯错误的好人，厂革委会也分期举办学习班，用毛泽东思想教育他们，帮助他们认识错误和改正错误。在办学习班之前，革委会经过调查，了解到一些犯错误干部不能正确对待群众和不能正确对待自己的活思想。针对这种情况，革委会在学习班上，首先抓住他们的活思想进行教育，组织他们认真学习毛主席的一系列最新指示，提高两条路线斗争觉悟，使他们端正态度，正确对待群众，正确对待自己。同时，充分发挥参加学习班的工人代表的作用，让工人用自己在斗争中的体会去帮助他们提高两条路线斗争觉悟。一些干部激动地说：“为我们办学习班，这是党对我们犯错误的人的挽救，衷心感谢毛主席对我们的关怀和爱护。”他们纷纷检查了自己的错误。"},{"type":"paragraph","text":"厂革委会还给予犯错误的人改正错误的机会，鼓励他们很好地接受革命群众的教育，向广大革命群众认真检查错误，在阶级斗争和参加生产劳动中，切实改正错误。革委会把犯错误的人的情况交给群众讨论研究，及时解放有了觉悟的犯错误的好人。有一个犯了严重错误的干部，经过多次耐心的教育，有了觉悟。革命职工在讨论他的问题时，进行全面分析，既看到他在文化大革命中所犯的严重错误，又看到他出身贫苦，解放后历次政治运动能站到前头，工作表现也较好。经过群众的批判教育，他能狠触灵魂，检查错误。于是，大家同意解放了他。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"两条路线斗争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a3be7daf59"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
