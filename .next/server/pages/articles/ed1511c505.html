script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"墨西哥马列主义运动出版《毛主席论人民战争》  出版序言指出：毛泽东主席为革命人民夺取政权提出一整套军事理论，不运用这一理论，就不能进行革命","authors":[],"dates":[{"year":1968,"month":12,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"墨西哥马列主义运动出版《毛主席论人民战争》"},{"type":"paragraph","text":"出版序言指出：毛泽东主席为革命人民夺取政权提出一整套军事理论，不运用这一理论，就不能进行革命"},{"type":"paragraph","text":"新华社三日讯　墨西哥城消息：墨西哥马克思列宁主义运动不久前出版发行了《毛主席论人民战争》西班牙文版。"},{"type":"paragraph","text":"墨西哥马克思列宁主义运动为出版这本书写了序言。序言说：墨西哥当前存在的民族矛盾和国内阶级矛盾，只有通过一场新型的革命才能解决。序言说：这一革命将“建立一个由工人阶级领导的人民民主政府，为以后发展社会主义奠定基础。这个革命，正象当代最伟大的马克思列宁主义者毛泽东主席所提出的那样，是一个新民主主义革命。”"},{"type":"paragraph","text":"序言说：“这一伟大运动还表明了在新的革命过程中所应采取的战略，即必须建立一个以当代马克思列宁主义——毛泽东思想为指导的革命党，必须建立一个在无产阶级领导之下的全国人民的广泛的统一战线，必须进行人民战争。”"},{"type":"paragraph","text":"序言接着说：“胜利的武装斗争不能在敌人远为强大的城市开展，而必须在农村建立牢固的根据地，在敌人统治最薄弱的地方打击敌人，必须依靠革命农民建立一支强大的人民军队，进行土地革命，开展游击战争，首先占领农村，包围城市，然后夺取城市。”"},{"type":"paragraph","text":"序言强调指出：“我国和拉丁美洲其他许多国家武装斗争最近的经验证明，光是一小股正直的、坚决勇敢的人在山上拿起武器，不足以取得革命的胜利，而必须执行这样一些马克思列宁主义原则：人民是创造历史的动力；武器是重要的因素，但决定的因素是人；革命战争是群众的战争，只有动员群众才能进行战争，只有依靠群众才能进行战争。”"},{"type":"paragraph","text":"序言说：“毛泽东主席为革命人民夺取政权提出了一整套军事理论；不运用这一理论，就不能进行革命。没有马克思列宁主义、毛泽东思想，在任何国家，现在和将来都不会有社会主义。”（附图片）"},{"type":"paragraph","text":"图为墨西哥马克思列宁主义运动不久前出版发行的《毛主席论人民战争》西班牙文版。　新华社发"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"人民战争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ed1511c505"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
