script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"苏联大选获辉煌胜利战争贩子愕然震惊反动派大肆进行歪曲的诽谤　徒然暴露资产阶级软弱无力","authors":[],"dates":[{"year":1950,"month":3,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京二十四日电】　塔斯社莫斯科十九日讯:真理报评论家分析资产阶级报纸对苏联最高苏维埃选举的诽谤，指出苏联党与非党联盟在苏联最高苏维埃选举中所获得的辉煌胜利，已使反动派和战争力量大为震惊。他们为在资本主义国家人民面前掩盖社会主义制度的优越性及苏联的民主，就大肆歪曲诽谤。苏联几近百分之百的选民参加了选举，并有同样高的百分率的选民选举了党与非党联盟候选人，这是资产阶级议会政治中闻所未闻的事实。资产阶级报纸对之进行了狂妄的毁谤，但苏联选举制度本身驳倒了这些谰言。苏联法律保障投票的秘密，这次选举中三万个投票反对党与非党联盟候选人的选民，而他们不可能像在资本主义国家一样，受到任何报复。资产阶级报纸诋毁苏联选民的高度自觉，说甚么“缺乏政治严肃性”，这种挑搏丝毫不能破坏从一个成就迈向另一个成就的苏联公民的欢欣鼓舞的心情，相反地，这些成就却使得资产阶级宣传家们一个个愁眉苦脸。"},{"type":"paragraph","text":"资产阶级宣传家厚颜地以自己的尺度来衡量苏联的生活，他们不想承认苏联人民享受着最高形式的民主，在这种民主下面，全体人民都真正参加国家最高权力机关的组成。他们企图诬蔑投票制度和苏维埃两院候选人名单的编纂，说什么苏联选民“不能决定候选人”，苏联选民“没有选择权，因为名单上只有一个候选人”他们企图抹杀这些事实，即苏联候选人由公众组织提名后，在群众大会上经过周密审慎的讨论，最后才能在大会上得到选民的同意。这些事实在资本主义国家本来是不可想像的。"},{"type":"paragraph","text":"苏维埃社会消灭了剥削，人民是国家的主人，有着共同的利益，而代表人民共同利益的就是共产党。这就很好地说明了选举的和谐一致。这和资本主义国家内部的阶级矛盾，统治阶级集团为争权夺利而四分五裂的情形刚刚相反。"},{"type":"paragraph","text":"资产阶级报纸说什么“苏联选举决定不了什么”，这恰恰暴露了他们自己的焦虑。苏联选举结果解决了许多重大问题，这一点他们是清楚知道的。苏联人民已投票拥护和平，拥护共产主义，并表明了在政治上一致团结在布尔什维克党和斯大林的周围。苏联最高苏维埃选举是在忠于普遍和平、在苏联建设共产主义的口号下进行的。资产阶级的宣传机关对社会主义民主辉煌成就的诽谤的软弱无力，原因亦即在此。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"275c5e4180"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
