script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"招待我出席世界妇女大会的代表团  何香凝举行茶会  赞扬代表团在反对以美国为首的帝国主义、反对新老殖民主义和反对现代修正主义的斗争中作出了贡献。","authors":[],"dates":[{"year":1963,"month":7,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"招待我出席世界妇女大会的代表团"},{"type":"paragraph","text":"何香凝举行茶会"},{"type":"paragraph","text":"赞扬代表团在反对以美国为首的帝国主义、反对新老殖民主义和反对现代修正主义的斗争中作出了贡献。"},{"type":"paragraph","text":"新华社二十二日讯　全国妇联名誉主席何香凝今天下午举行茶会，招待出席世界妇女大会归来的中国妇女代表团，赞扬她们在反对以美国为首的帝国主义、反对新老殖民主义和反对现代修正主义的斗争中作出了贡献，并且表示慰问。"},{"type":"paragraph","text":"茶会上，何香凝同杨蕴玉团长、区棠亮、郭建、吴全衡副团长和代表团成员一一握手，向她们问好，并且同她们亲切谈话。何香凝赞扬中国妇女代表团在莫斯科世界妇女大会上的活动很好地体现了中国人民坚持原则、加强团结、消除分歧、共同对敌的正确立场。她说：“你们在大会上斗争得很勇敢、很坚定，你们的斗争对于亚洲、非洲、拉丁美洲各国被压迫人民和妇女的斗争，给予很大的鼓舞和影响，并且一定会得到他们的同情和支持。”"},{"type":"paragraph","text":"何香凝特意赠送代表团一幅她的新作的画“墨梅”，她并且在画上亲笔题词：“冰霜雪压心犹壮，战胜寒冬骨更坚。”（附图片）"},{"type":"paragraph","text":"全国妇联名誉主席何香凝举行茶会，招待出席世界妇女大会归来的中国妇女代表团。图为在茶会后合影。"},{"type":"paragraph","text":"新华社记者　郑小箴摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7255886432"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
