script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"警惕资产阶级思想的侵蚀","authors":["徐凤仙"],"dates":[{"year":1972,"month":7,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"上海机械学院学员　徐风仙"},{"type":"paragraph","text":"一九七○年十二月，我受贫下中农的委托，离开家乡，跨进大学。进校后不久，我就向组织提出申请，要求加入中国共产党，并从各方面对自己提出较高的要求。在生活上，我注意艰苦朴素，不随便花费一分钱，不随便上街逛马路，身上穿的是土布衣，脚上穿的是自己做的鞋。当时想，做到这几点，总该差不多了。但问题并不是这么简单。资产阶级的“香风”毒雾时时在侵蚀我们。一次，我穿着粗布衣服回家，有个“好心”的同志对我说:“做啥穿着老布衣服，你现在是上海人了，应该穿穿洋布衣裳，就是做一、二件的确凉衣服也算不了啥。”当时我听了觉得不对头，心里想:为什么到了上海，就不应该穿土布衣服，而要讲究穿好的呢?又有一次，我陪一个在公社广播站工作的同学去南京路头广播器材。在商店卖焊锡的柜台上，女营业员显得很不耐烦，态度非常粗暴。当时我想，对这种人没啥讲头，还是快点买好离开。可当我们刚离开时，背后就有人轻蔑地说:“嗨，乡下小姑娘，来买这东西，懂个啥?轧闹猛!”听了这话，我开始很气，后来，发觉自己穿了一身土布衣服，被人家看出是乡下人，才受到这般歧视。当时我的心里很不是滋味。但这时我想起了上大学时的情景:贫下中农向我赠毛主席著作，送草鞋，叮嘱我要永远保持贫下中农本色；我想到党支部负责同志和工宣队老师傅经常找我谈心，要我严格要求自己，不能让资产阶级思想沾污自己的头脑，要防止向资产阶级方向“变”。这时我觉得自己不应该感到不好受，而应该感到自己做得对。我穿上粗布衣，身上有点“土气”，正说明我保持了贫下中农艰苦朴素的本色。我应该坚持下去，决不为资产阶级的“香风”毒雾所左右。这两件事教育了我，使我深深体会到:阶级斗争是客观存在的，要时刻警惕资产阶级思想的侵蚀。对我们工农兵学员来说，没有什么“自来红”，只有“改造红”。只有认真学习马列主义、毛泽东思想，努力改造世界观，才能永葆劳动人民的本色，在继续革命的道路上永远前进。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4aca6009ea"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
