script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"瑞典《火炬》杂志发表文章  揭露苏联利用“经互会”控制剥削东欧国家  苏修大肆掠夺捷克斯洛伐克的铀矿资源引起捷人民强烈不满","authors":[],"dates":[{"year":1974,"month":7,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"瑞典《火炬》杂志发表文章"},{"type":"paragraph","text":"揭露苏联利用“经互会”控制剥削东欧国家"},{"type":"paragraph","text":"苏修大肆掠夺捷克斯洛伐克的铀矿资源引起捷人民强烈不满"},{"type":"paragraph","text":"新华社斯德哥尔摩一九七四年七月八日电瑞典《火炬》杂志在今年第四—五期合刊中发表文章，揭露苏联利用“经互会”控制、剥削和掠夺东欧国家，推行新殖民主义。"},{"type":"paragraph","text":"这篇文章指出，苏联在“经互会”内推行“国际分工”、“专业化”和“一体化”，使东欧国家的经济遭受严重破坏。例如，最近几年德意志民主共和国被迫把六十座纺织厂改为制造电动机的工厂，并停止了生产飞机与拖拉机。"},{"type":"paragraph","text":"文章接着指出，苏联在“经互会”内垄断了一些工业部门。例如，电子计算机的最重要部件是在苏联制造的，其它“经互会”成员国只能生产某些配件。文章说，“经互会”成员国从苏联进口产品的价格往往高于世界市场的价格。据苏联官方统计，从一九六○年到一九七○年，苏联卖给四个“经互会”成员国九千八百七十七万吨原油，售价十七亿零五百六十二万卢布，同期苏联卖给六个西欧国家原油九千九百一十一万吨，售价却只有八亿五千二百九十九万卢布。这就是说，苏联的“盟国”不得不比西欧国家多付给苏联高出一倍的价钱。"},{"type":"paragraph","text":"文章指出，苏联领导集团在“经互会”内推行“经济一体化”已引起了“经互会”一些成员国的抵制。文章最后指出，尽管施行了种种压力，“经互会”的“一体化”计划仍然没有完全按照克里姆林宫统治者的期望发展。"},{"type":"paragraph","text":"据新华社一九七四年七月六日讯　苏联社会帝国主义多年来一直利用它对捷克斯洛伐克的控制，大肆掠夺捷克斯洛伐克的铀矿资源，用来扩充自己的核军备。苏修的殖民主义掠夺，激起捷克斯洛伐克人民群众的强烈愤慨。"},{"type":"paragraph","text":"捷克斯洛伐克是东欧铀蕴藏量较多的国家，已探明的铀矿藏量和产量不断有所增长。但是，捷克斯洛伐克开采的铀矿砂，除留下少量低质的供自己科研之用外，百分之九十以上被运往苏联。据认为，苏联所使用的这项重要战略物资的五分之一是从捷克斯洛伐克攫取的。苏修不仅控制了捷克斯洛伐克采铀工业的探矿、开采和运输等各个重要环节，而且还要自己的“专家”向捷方人员“保守秘密”，不许透露有关情况。捷克斯洛伐克出于发展本国经济的愿望，曾想在自己主权范围内发展铀矿工业，结果被苏方扣了一顶“破坏苏捷传统友谊”的帽子，遭到苏修的蛮横拒绝。除了捷克斯洛伐克外，苏修还控制了东德和匈牙利等国的铀矿开采。在“经互会”内，苏修不许其他成员国讨论铀矿开采问题，不让产铀国的技术人员相互往来。"},{"type":"paragraph","text":"捷克斯洛伐克群众对苏联社会帝国主义的控制和掠夺极为不满。不少人在听到自己国家的铀矿资源被运往苏联时，愤慨地说：“我们的铀矿很丰富，可惜不属于我们，都被俄国拿走了”。据西方通讯社报道，一九六八年苏修侵捷后，捷克斯洛伐克的铀矿工人曾经在“不给占领者一克铀”的口号下举行过罢工，抗议苏修的法西斯行径。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6948dc2be7"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
