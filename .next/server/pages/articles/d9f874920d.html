script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji37","name":"毛泽东全集第37卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji37.pdf"],"article":{"title":"印发《我们对目前文艺工作的几点意见》一文的批语","alias":"","parts":[{"type":"paragraph","text":"印发《我们对目前文艺工作的"},{"type":"paragraph","text":"几点意见》一文的批语"},{"type":"paragraph","text":"（1957年1月7日）尚昆同志："},{"type":"paragraph","text":"请将此文印发政治局、书记处及月中到会各同志。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一月七日"},{"type":"paragraph","text":"[1]指陈其通、陈亚丁、马寒冰、鲁勒1957年1月7日在《人民日报》发表的《我们对目前文艺工作的几点意见》一文。文章说，在过去的一年中，为工农兵服务的文艺方向和社会主义现实主义的创作方法，越来越很少有人提倡了。有些人认为国家已进入社会主义建设的新时期，只需要强调“百花齐放，百家争鸣”，为工农兵服务的方向可以不必强调了。过去一年中一直在大张旗鼓地反对“公式化、概念化”，但在反对中有些界线不清的地方，被一些人误认为或者利用来作为反对艺术应为政治服务、艺术应有高度思想性、艺术应作为教育广大人民的武器的借口。文章还说，百花齐放的方针使我们的文学艺术在过去一年中放出了一些令人喜爱的花朵，但百花中最主要的应该是新的、社会主义现实主义的、在人民新的生活土壤上开出的花朵，自从提出百花齐放以后，有许多人只热衷于开老花，不注意开新花。不注意培植和保护新花的百花齐放是不完全正常的。1957年3月全国宣传工作会议期间，毛泽东对这篇文章多次提出了批评，说文章对形势的估计是错误的，思想方法是教条主义、形而上学、片面性的，无非是来阻正百花齐放，百家争鸣。1957年8月21日，陈其通、陈亚丁在《人民日报》发表《克服教条主义，投入反右派斗争》一文，对此作了自我批评。"}],"authors":["毛泽东"],"dates":[{"year":1957,"month":1,"day":7}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":224,"page_end":224},"tags":[{"name":"毛泽东","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d9f874920d"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
