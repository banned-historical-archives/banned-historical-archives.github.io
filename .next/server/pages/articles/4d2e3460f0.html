script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"抗议反动集团残暴压迫和剥削　要求改善生活和工作条件泰国各地工人不断罢工","authors":[],"dates":[{"year":1968,"month":12,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京十四日电　曼谷消息:泰国各地工人最近不断举行罢工，抗议他侬—巴博反动集团的残暴压迫和剥削，要求改善生活待遇和工作条件，维护本身的正当权利。"},{"type":"paragraph","text":"据泰国报纸报道，泰国中部猜耶蓬府一个区的全部小型出租汽车司机，十一月十五日罢工，抗议反动警察经常借故敲榨勒索，使他们的生活毫无保障。"},{"type":"paragraph","text":"暖武里府公共汽车工人十一月二十八日举行罢工，抗议他侬—巴博反动集团经营的汽车公司无理扣压工资和肆意开除工人，要求改善工作条件。据罢工工人代表揭露，由于他侬—巴博反动集团只顾盈利而不对汽车进行维修，交通事故不断发生。资方却将责任转嫁给工人，最近有两名工人因此而遭到无理开除。在工人坚持斗争下，他侬—巴博反动集团被迫接受了工人的正当要求。"},{"type":"paragraph","text":"泰国一家冷饮工厂的三百多名工人十二月九日举行罢工，反对资方无理开除工人。"},{"type":"paragraph","text":"另据“泰国人民之声”电台最近广播，今年头九个月，泰国各地有八千名工人参加了罢工斗争。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4d2e3460f0"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
