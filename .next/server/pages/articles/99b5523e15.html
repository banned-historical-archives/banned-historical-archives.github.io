script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"欢呼毛主席革命路线的伟大胜利　欢呼党的民族政策的伟大胜利拉萨各族人民集会游行庆祝西藏自治区成立十周年天宝同志和华国锋同志在大会上讲了话工人、农牧民、人民解放军驻藏部队的代表也讲了话　大会宣读了给毛主席、党中央的致敬电","authors":[],"dates":[{"year":1975,"month":9,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社拉萨一九七五年九月九日电　拉萨各族人民五万多人今天冒雨举行集会和游行，热烈庆祝西藏自治区成立十周年，欢庆十年来西藏社会主义革命和社会主义建设取得的伟大成就，欢呼毛主席无产阶级革命路线的伟大胜利，欢呼党的民族政策的伟大胜利。"},{"type":"paragraph","text":"今天，高原古城拉萨，红旗招展，鼓乐喧天，沉浸在一片欢乐的气氛中。穿着节日盛装的各族人民群众，一清早就冒雨汇集到拉萨人民体育场。大会主席台正中是毛主席的巨幅画像，主席台两侧上空二十多个彩色汽球上挂着大字标语，上面写着:“坚决贯彻执行毛主席关于理论问题的重要指示，把反修防修的斗争进行到底!”“坚持党的基本路线，自力更生、艰苦奋斗，建设社会主义新西藏!”“伟大、光荣、正确的中国共产党万岁!”“各族人民的伟大领袖毛主席万岁!”"},{"type":"paragraph","text":"当中央代表团团长华国锋，副团长姚连蔚、严政、司马义·艾买提、宝日勒岱、何正文、孙玉国和代表团成员走上主席台就座时，全场响起长时间的热烈掌声。"},{"type":"paragraph","text":"在大会主席台上就座的有:中共西藏自治区委员会第一书记、自治区革委会代理主任、人民解放军西藏军区第一政治委员任荣，人大常委会副委员长、西藏自治区革委会副主任、人民解放军西藏军区副司令员阿沛·阿旺晋美，政协全国委员会副主席帕巴拉·格列朗杰，西藏党、政、军的主要负责人陈明义、天宝、封克达、高圣轩、巴桑、热地、郭锡兰、孙玉山，中共中央候补委员央宗，人大常委会委员错其，以及有关方面人士阿沛·才旦卓噶。"},{"type":"paragraph","text":"大会由自治区党委常委、拉萨市委第一书记李本善主持。中共西藏自治区委员会书记、自治区革委会副主任、人民解放军西藏军区第二政治委员天宝同志在庆祝大会上讲话。他说，在国内外一派大好形势下，我们满怀革命豪情，迎来了西藏自治区成立十周年的光辉节日。他对以中共中央政治局委员、国务院副总理华国锋为团长的中央代表团来到拉萨同西藏各族人民一起共庆节日，表示最热烈的欢迎，并向全区各族人民和革命干部，向驻藏人民解放军指战员，向祖国各地来藏工作的全体同志，以及西藏的爱国人士，致节日的祝贺。"},{"type":"paragraph","text":"天宝同志说，西藏自治区成立十年来，在毛主席为首的党中央的英明领导下，在毛主席的无产阶级革命路线的指引下，取得了社会主义革命和社会主义建设的巨大胜利。一个黑暗、贫穷、落后的旧西藏已经变成了欣欣向荣的社会主义新西藏。天宝同志详细谈到了西藏十年来在各个方面所取得的成就。他指出，我们的一切胜利，是毛主席为首的党中央英明领导的结果，是西藏各族人民、广大干部和驻藏人民解放军团结战斗的结果，也是与全国各兄弟民族大力支援分不开的。这是马列主义、毛泽东思想的伟大胜利!是无产阶级文化大革命的伟大胜利!是毛主席无产阶级革命路线和党的民族政策的伟大胜利!"},{"type":"paragraph","text":"天宝同志在谈到西藏今后革命和建设的任务时指出，我们要进一步贯彻落实毛主席一系列重要指示，学习理论，反修防修，促进安定团结，把国民经济搞上去，把西藏建设成祖国西南边疆的铜墙铁壁。他最后号召全区各族人民团结起来，在毛主席革命路线的指引下，去夺取新的更大的胜利!"},{"type":"paragraph","text":"中共中央政治局委员、国务院副总理、中央代表团团长华国锋同志接着在大会上讲话。他代表毛主席、党中央，代表人大常委会、国务院，向西藏各族人民和革命干部，向人民解放军指战员，向从祖国各地来到西藏工作的全体同志，致以热烈的祝贺，并表示亲切的问候。"},{"type":"paragraph","text":"华国锋同志指出，十年来，西藏人民在毛主席为首的党中央领导下，在毛主席无产阶级革命路线指引下，在祖国各族人民的支援下，奋发图强、艰苦奋斗，取得了社会主义革命和社会主义建设的巨大成就。过去黑暗、贫穷、落后的旧西藏已经一去不复返了，一个欣欣向荣的社会主义新西藏坚强地屹立在祖国的西南边疆。这是毛主席无产阶级革命路线的伟大胜利，是党的民族政策的伟大胜利。"},{"type":"paragraph","text":"华国锋同志强调说，西藏是我们祖国的西南边防前哨，战略地位十分重要。我们一定要进一步贯彻执行毛主席一系列重要指示，加强自治区党委的一元化领导，把西藏的事情办好。我们相信，西藏自治区党委和自治区革委会一定能够团结西藏各族人民，在毛主席为首的党中央的英明领导下，在毛主席无产阶级革命路线的指引下，发扬自力更生、艰苦奋斗的革命精神，为建设一个繁荣昌盛的社会主义新西藏作出更大的成就。我们相信，勤劳勇敢的西藏人民一定能够同祖国各族人民一起，为完成党的十大、四届人大提出的各项战斗任务，为在本世纪内把我国建设成为社会主义的现代化强国做出更大的贡献。"},{"type":"paragraph","text":"华国锋同志讲话后，人大常委会副委员长、中央代表团副团长姚连蔚宣读了人大常委会、国务院庆祝西藏自治区成立十周年的贺电。接着，中央代表团赠送了庆祝西藏自治区成立十周年贺幛，贺幛上面用藏、汉两种文字写着:“全国各族人民团结起来，沿着毛主席革命路线胜利前进!”"},{"type":"paragraph","text":"在大会上讲话的还有工人、农牧民、人民解放军驻藏部队的代表扎西卓玛、单增欧珠、吴元明。他们表示，决不辜负毛主席、党中央的关怀和期望，一定要认真贯彻落实毛主席、党中央的一系列重要指示，学好无产阶级专政的理论，牢记党的基本路线，深入开展两个阶级、两条道路、两条路线斗争，坚持无产阶级专政下的继续革命，把巩固无产阶级专政的任务落实到每个基层，进一步发展安定团结的大好形势，提高警惕，加强战备，为建设好社会主义的新西藏，保卫好祖国的西南边疆而努力奋斗。"},{"type":"paragraph","text":"大会最后由自治区党委书记热地宣读了给毛主席、党中央的致敬电。全场响起了热烈的掌声。"},{"type":"paragraph","text":"出席今天大会的还有:西藏党、政、军和拉萨市的负责同志陈卓、杨宗欣、南海、仁增旺杰、郝平南、洛桑慈诚、刘绍民、土登尼玛、马瑞华、次仁拉姆、盖玉宪、郄晋武、孙华、王巨全、李传恩、张桂森、宋开元、吴健、罗铭、朗杰等，爱国人士生钦·洛桑坚赞、朗顿·贡噶旺秋、格桑旺堆、桑顶·多吉帕姆。"},{"type":"paragraph","text":"尼泊尔王国驻拉萨总领事馆总领事觉登·乌克亚布、领事比·曼·施瑞斯塔应邀参加了大会。"},{"type":"paragraph","text":"大会结束后，举行了盛大的庆祝游行。走在游行队伍最前面的，是一百多名身穿各种民族服装的工农兵男女青年，他们高举红旗，手持鲜花，围聚在毛主席像周围，走过主席台前。浩浩荡荡的工人、农牧民游行队伍，用各种彩车、图表、模型显示了西藏各行各业十年来的伟大成就。藏、汉族的红小兵们手举红缨枪，挥动着花束，走过主席台前。文艺工作者在展示革命样板戏成就的彩车后面，跳起了欢乐的民族舞蹈。整个游行队伍充分显示了经过无产阶级文化大革命和批林批孔运动锻炼的西藏各族人民朝气蓬勃的精神面貌，以及他们坚定不移地沿着社会主义道路前进的豪迈气概。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"华国锋","type":"人物"},{"name":"西藏文革","type":"人物"},{"name":"批林批孔","type":"主题/事件"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"99b5523e15"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
