script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"搞修正主义搞分裂搞阴谋诡计的人就是走资派","authors":[],"dates":[{"year":1976,"month":10,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"中共上海铁路分局松江中心站委员会"},{"type":"paragraph","text":"中央两项英明决定传到我们松江中心站，百里铁道线上，群情振奋，一片欢腾。我们十二个车站的工人、干部汇成一个声音:以华国锋同志为首的党中央说出了我们的心里话，和我们铁路工人心连心。我们决心继承毛主席的遗志，最紧密地团结在华国锋同志为首的党中央周围，坚决贯彻执行“三要三不要”的基本原则，誓同一切背叛马列主义、毛泽东思想，篡改毛主席指示，搞修正主义、搞分裂、搞阴谋诡计的走资派斗争到底!"},{"type":"paragraph","text":"毛主席是我们心中永远不落的红太阳，毛泽东思想是我们百战百胜的旗帜。斗争的实践使我们深深懂得:火车穿山越岭靠轨道，干革命顶风踏浪靠毛泽东思想。连日来，全中心站的工人、干部怀着对伟大领袖毛主席无比深厚的无产阶级感情，通读《毛泽东选集》一至四卷，个人、班组都订出了学习计划。中心站所属的十二个小站都举办了学习班，重点学习毛主席关于批邓、反击右倾翻案风的一系列重要指示，搞清楚社会主义革命的性质、对象、任务和前途，弄清楚资产阶级“就在共产党内”的问题，进一步看到“走资派还在走”，掌握思想武器，战胜走资派，让毛泽东思想红旗永远在我们铁道线上高高飘扬!"},{"type":"paragraph","text":"我们一定要在斗争中学，在斗争中用。当前，我们特别要认真学习毛主席关于“要搞马克思主义，不要搞修正主义；要团结，不要分裂；要光明正大，不要搞阴谋诡计”的教导，坚决同一切违背这三项基本原则的言论和行动作坚决的斗争。任何背叛马克思主义、列宁主义、毛泽东思想，篡改毛主席指示的人，任何搞修正主义、搞分裂、搞阴谋诡计的人，就是走资派，就是党内资产阶级。他们是我们铁路工人的死敌，我们要坚决和他们斗到底!我们要最紧密地团结在以华国锋同志为首的党中央周围，一切听从以华国锋同志为首的党中央指挥，誓死捍卫毛主席的无产阶级革命路线!"},{"type":"paragraph","text":"我们决不辜负伟大领袖毛主席对我们铁路工人的关怀，要进一步发扬铁路工人“特别能战斗”的革命精神。我们坚决响应以华国锋同志为首的党中央号召，掀起学习马列著作和毛主席著作的新高潮，深入批邓，继续反击右倾翻案风，狠抓革命，猛促生产，超额完成一九七六年运输生产任务，不断夺取社会主义革命和社会主义建设的新胜利，把无产阶级专政下继续革命的伟大事业不断推向前进!"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"华国锋","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cc9c84ebd3"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
