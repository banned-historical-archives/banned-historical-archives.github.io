script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"西北区一级机关反贪污斗争胜利结束第三个战役打虎、追赃、定案三管齐下打出了大批贪污犯　西北局书记习仲动勋指出必须克服新的右倾思想","authors":[],"dates":[{"year":1952,"month":3,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社西安十五日电】　西北区一级机关反贪污斗争的第三战役，历时十日，现已胜利结束。这个战役的特点是打“虎”、追贼和定案三管齐下。在“山深虎肥”的基本建设部门和所谓“清水衙门”的大学学府，都打出了大批的贪污犯。这批贪污犯大都互相或和外界订有各种“攻守同盟”，狡诈异常，但在打虎队员们积极调查研究，拿出了铁证以后，这批“老虎”终于落入了人民的法网。"},{"type":"paragraph","text":"追贼和定案工作是结合进行的。在进行这两项工作时，若干机关都在继续克服右倾思想和发动群众的基础上，向贪污分子进行了政策教育，号召他们真实全部交代问题，老实交出赃款赃物，以实际悔过行动来弥补过去部分罪恶。接着就一方面发动群众在贪污分子家属中进行工作，一方面进行系统的“查”“对”工作。具体办法是首先责成贪污分子交代家庭、亲友、商人等社会关系，继交代贪污时的动机、目的、手法、过程、数目和赃款赃物的用途，再交代机关内部或外部的“攻守同盟”，进而交出贪污的证件——和私商入股的合同、契约、借据、债券和赃款、赃物等，然后结合调查所得的材料及贪污分子在斗争中的表现，进行分析研究，办其真伪，最后经过群众讨论、领导批准再行定案。对于个别“顽虎”，就根据确实的人证和物证，按照上述手续定案。这样，追赃定案的过程，就是甄别的过程，也是教育广大群众提高阶级觉悟的过程。依这一方法进行追赃定案的单位，都获得了很大的成效。"},{"type":"paragraph","text":"和进行这些工作同时，各单位还严肃地处理了贪污数在一千万元以下的大批贪污分子。西北区一级机关增产节约检查委员会在九日曾召集了六万余名工作人员的大会，会上根据贪污分子的贪污情节及坦白从轻、顽抗从严的处理原则，对一批贪污分子作了处理并在大会上宣布。这个大会和在此以前或以后各单位自行召开的类似性质的会议，有力地推动了许多没有坦白或坦白不彻底的贪污分子继续坦白，因而也更孤立了大贪污分子，推进了打“大老虎”的战斗。现在贪污分子的处理数，已达半数以上。从十二日起，反贪污斗争已进入第四个战役。中共中央西北局书记习仲勋指出:第四个战役是最艰巨的战役，必须克服新的右倾思想。要在克服松劲思想和简单、急躁情绪的基础上，把资产阶级安在革命内部的堡垒扫荡净尽；有多少“老虎”，就必须打出多少“老虎”来，除恶务尽，不打彻底，不准收兵。习仲勋又有力地批判了某些领导干部在干部问题上的右倾思想。习仲动说:有些单位清出很多贪污分子后，它的“摊子”烂了；其实它的“摊子”早就烂了，过去由于右倾思想和官僚主义的原因，没看出来，现在看见这个烂“摊子”了，并且把这个烂“摊子”的内幕拆穿了，这就很好。但这只是一方面，更重要的一方面，是在打“虎”战斗中，我们已发现和培养了大批的优秀干部，我们的革命事业不但不会因为清除了这批贪污分子而减弱，恰好相反，不正是因为把“老虎”捉走了，大批优秀干部涌现出来了，我们的事业才会有可能地加强起来吗?习仲勋特指示各单位领导干部:从现在起，必须迅速从斗争中把大量的优秀分子物色出来，把他们提拔到各个领导岗位上去，代替那些已经腐烂了的不可救药的蜕化分子。习仲勋的这一指示，现在已首先在若干财经单位中实行。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"习仲勋","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fa0e074882"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
