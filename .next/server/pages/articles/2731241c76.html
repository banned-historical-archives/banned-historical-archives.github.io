script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"澳共《先锋报》揭露苏共领导继续推行投降分裂路线  苏联修正主义者是为美帝效劳的第五纵队  最近他们准备召开苏共二十三大和所谓共产党国际会议，企图把苏联修正主义路线强加于国际共运，这是注定要失败的","authors":[],"dates":[{"year":1966,"month":2,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"澳共《先锋报》揭露苏共领导继续推行投降分裂路线"},{"type":"paragraph","text":"苏联修正主义者是为美帝效劳的第五纵队"},{"type":"paragraph","text":"最近他们准备召开苏共二十三大和所谓共产党国际会议，企图把苏联修正主义路线强加于国际共运，这是注定要失败的"},{"type":"paragraph","text":"新华社六日讯　墨尔本消息：澳大利亚共产党（马克思列宁主义者）机关报《先锋报》一月二十七日发表文章说，苏共新领导要把他们的苏美合作的修正主义路线“强加于国际共产主义运动，这是根本办不到的。它已经注定要失败”。"},{"type":"paragraph","text":"文章指出：苏联修正主义者“可以玩新的花招，欺骗这里那里的人民，但是他们制止不住革命斗争。斗争将继续发展。"},{"type":"paragraph","text":"凡是真心要革命的人有责任尽自己最大的力量撕掉这些人的假面具，暴露出他们的第五纵队真面目。”"},{"type":"paragraph","text":"文章说，苏共领导人“是美帝国主义的合作者”，“他们同苏共第二十次和第二十二次代表大会的彻头彻尾的修正主义是难解难分的”。"},{"type":"paragraph","text":"文章指出：“苏联修正主义者起的作用已经证明是为美帝国主义的利益效劳的第五纵队的作用。要有效地为美帝国主义的利益效劳，他们就必须得到国际共产主义运动的支持。他们比赫鲁晓夫狡猾得多。他们用了比赫鲁晓夫聪明得多的言词。他们设法用他们的言词骗住了一些人，他们也许还能够再骗住一些人。但是，到最后，他们的欺骗是决达不到目的的。那些现在受了骗的人将会从惨痛的经验中，认识到苏联修正主义的彻底背叛。”"},{"type":"paragraph","text":"文章揭露，苏共新领导为推行他们继续分裂国际共产主义运动，为美帝国主义效劳的路线，不甘心于一九六五年三月莫斯科分裂小会议的失败，最近又在准备召开苏共第二十三次代表大会和准备召开所谓共产党国际会议。文章说：“这些行动的真正目的是要把充当美帝国主义的第五纵队的苏联修正主义路线强加于国际共产主义运动。”"},{"type":"paragraph","text":"文章强调指出：“这是根本办不到的，它已经注定要失败。”它说，“决不能同叛徒举行国际会议。参加这种会议就是给叛徒捧场。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2731241c76"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
