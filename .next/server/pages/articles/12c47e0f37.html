script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"毛泽东关于镇反部署给上海市委的电报","authors":["毛泽东"],"dates":[{"year":1951,"month":1,"day":21}],"is_range_date":false,"parts":[{"text":"毛泽东关于镇反部署给上海市委的电报","type":"title"},{"text":"毛泽东","type":"authors"},{"text":"上海市委，并告饶陈：","type":"appellation"},{"text":"你们一月六日关于一九五O年十一月十二月的综合报告，由华东局转来，业已收到，甚好，甚慰。在这个报告中提到了今年一二月份的几项中心工作，也是好的。其中说到你们准备在一月份中给予反革命分子以有力打击，望你们对此进行周密的侦察布置。布置好了，同时动作，做一次准确的逮捕。然后好好清理审讯，处决一大批真正罪大恶极的反革命分子。在上海这样的大城市，在今年一年内，恐怕需要处决一二千人，才能解决问题。在春季处决三五百人，压低敌焰，伸张民气，是很必要的。请你们在华东局直接领导下，斟酌情形，妥善处理。南京方面，请华东局指导该市市委好好布置侦捕审讯，争取在春季处决一二百个最重要的反动分子。","type":"paragraph"},{"text":" 毛泽东一月二十一日","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"12c47e0f37"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
