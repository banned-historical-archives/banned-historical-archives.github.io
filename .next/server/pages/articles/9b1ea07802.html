<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"认真执行毛主席关于“发展体育运动，增强人民体质”的指示全国职工体育运动蓬勃发展","authors":[],"dates":[{"year":1973,"month":6,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社北京一九七三年六月九日电　我国职工体育运动近年来有了蓬勃的发展。各地许多工厂、矿山、企业事业单位坚持开展广播体操、球类、跑步、游泳、自行车、爬山、拔河和棋类等各种各样的体育活动。参加体育锻炼的职工人数越来越多。体育工作搞得好的先进单位不断涌现。职工体育运动的发展，对增强广大职工的体质起了积极的作用。"},{"type":"paragraph","text":"在批修整风的推动下，各地各级党委认真贯彻执行毛主席关于“发展体育运动，增强人民体质”的指示，加强了对职工体育工作的领导。许多工矿企业成立了在党委领导下的有工会、共青团、民兵组织和体育积极分子参加的体育工作领导机构。许多领导干部不仅积极抓好体育工作，而且带头参加体育锻炼。北京二七机车车辆工厂在今年举行的全厂运动会上，有一百二十多名车间党、行政、工会、共青团干部带头参加四百米接力赛跑。这个厂团委一位副书记常年练长跑，在这次运动会上获得了男子五千米和一万米长跑的第一名。在各级领导的带动下，这个厂有百分之八十的职工坚持参加体育活动。安徽马鞍山钢铁公司修建部党委成员，组织了一个篮球队，由党委书记领队。领导干部带头参加，使这个修建部的职工体育运动开展得十分活跃。"},{"type":"paragraph","text":"各地厂矿企业坚持业余、自愿、小型、多样的原则，因人制宜、因地制宜地开展各种体育活动，受到了广大职工的欢迎。我国最大的工业城市上海，有数十万职工在业余时间积极参加各种体育锻炼。去年参加全市性的职工球类和长跑等比赛的，就有四千多个队，共四万多人。湖南红湘江机器厂根据不同工种、不同年龄和性别的特点，组织职工开展体育活动，使体育工作搞得有声有色。厂里组织青年工人打球、跑步、爬山、游泳；组织老年职工打太极拳；针对机修工人臂力要大、腰劲要强的特点，开展以举重为主的体育活动；针对设计人员坐办公室时间长、体质一般较弱的特点，积极组织他们做广播体操，都收到了很好的效果。"},{"type":"paragraph","text":"各地在开展职工体育活动中，发扬自力更生精神，自己动手开辟运动场地，利用边角废料自制体育器材，既节约了开支，又收到了体育锻炼的实效。大庆油田职工住地分散，野外作业多，流动性大，但是他们坚持体育锻炼。几年来，他们利用周围的天然条件，自己动手修建了五百三十多个篮球场，三十多个排球场，二十多个足球场。仅自制篮球架一项，就节约开支十五万多元。铁人王进喜生前带领过的一二零五钻井队，自己制做了篮球架、单杠、杠铃等体育器材，井架搬到那里，体育器材也运到那里，坚持开展体育活动。"},{"type":"paragraph","text":"许多单位通过开展体育活动，增强了职工体质，劳动出勤率和生产率普遍提高。上海达丰铸造厂大部分是青年工人，开展体育活动以后，业余生活更加丰富多彩，全厂呈现一派生气勃勃的景象。许多单位在开展职工体育运动比赛中，坚持贯彻“友谊第一，比赛第二”的方针，更加增进了同兄弟单位和本单位各部门之间的革命友谊和团结。"},{"type":"paragraph","text":"为了总结和交流经验，推动职工体育运动的进一步开展，国家体委最近在长沙市召开了全国职工体育工作座谈会。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9b1ea07802"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
