" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji51","name":"毛泽东全集第51卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji51.pdf"],"article":{"title":"关于党的高级干部读书问题的批语","alias":"","parts":[{"type":"paragraph","text":"关于党的高级干部读书问题的批语！"},{"type":"paragraph","text":"（1970年9月27日）九本略多，第一次宜少，大本书宜选读（如反杜林)。"},{"type":"paragraph","text":"九月廿七日"},{"type":"paragraph","text":"[1]周恩来等1970年9月18日给毛泽东写报告说，“现送上主席在一九六四年关于选读马、恩、列、斯著作的三十二本书的批示和自录。我们从中选了九本，又在毛主席著作中选了五本”“请予审批”。周恩来等挑选的9本马、恩、列著作是：一、《共产党宣言》；二、《哥达纲领批判》；三、《反杜林论》；四、《费尔巴哈与德国古典哲学的终结》；五、《帝国主义是资本主义的最高阶段》；六、《国家与革命》；七、《无产阶级革命与叛徒考茨基》；八、《共产主义运动中的“左派”幼稚病》；九、《论马克思、恩格斯及马克思主义》。挑选的5本毛泽东著作是：一、《实践论》；二、《矛盾论》；三、《关于正确处理人民内部矛盾的问题》；四、《在中国共产党全国宣传工作会议上的讲话》；五、《人的正确思想是从哪里来的？》。毛泽东的评语，写在周恩来等的送审报告上。1970年11月6日，中共中央下发了经毛泽东审阅的关于高级干部学习问题的通知，通知中引用了毛泽东的这个批语，并指出，“最近，毛主席在党的九届二中全会上，又一次指示：党的高级干部，不管工作多忙，都要挤时间，读一些马、列的书，区别真假马列主义”。"},{"type":"paragraph","text":"[2]指恩格斯的《反杜林论》。"}],"authors":["毛泽东"],"dates":[{"year":1970,"month":9,"day":27}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":94,"page_end":94},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"人民内部矛盾","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5ab254c276"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
