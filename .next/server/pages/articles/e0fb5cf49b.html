script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"威尔科克斯和艾地强调两党团结一致 并肩进行反帝反现代修正主义的斗争","authors":[],"dates":[{"year":1964,"month":6,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社雅加达4日电】　据印度尼西亚共产党新闻局发表的新闻公报报道，新西兰共产党总书记威尔科克斯说，新西兰共产党将同印度尼西亚共产党一起继续进行反对以美国为首的帝国主义的斗争和反对现代修正主义的斗争。"},{"type":"paragraph","text":"威尔科克斯是三日在印度尼西亚共产党中央委员会办事处举行的欢迎会上说这番话的。"},{"type":"paragraph","text":"印度尼西亚共产党主席艾地在会上向欢迎者介绍威尔科克斯时说，威尔科克斯是高举马克思列宁主义旗帜、站在粉碎现代修正主义的斗争的最前线的一位共产党领导人。"},{"type":"paragraph","text":"威尔科克斯在讲话时说，新西兰共产党将继续同印度尼西亚共产党并肩进行反对世界帝国主义，特别是反对全世界人民的死敌美帝国主义的斗争。威尔科克斯说，新西兰共产党党员不相信世界上有“爱好和平的帝国主义者”。对付帝国主义的唯一办法，是开展反对它的斗争并把它消灭掉。他表示新西兰共产党坚决支持印度尼西亚人民为粉碎“马来西亚”和反对英帝国主义而进行的斗争。"},{"type":"paragraph","text":"威尔科克斯说，在反对现代修正主义的斗争中，新西兰共产党将继续同印度尼西亚共产党站在一起。"},{"type":"paragraph","text":"他表示深信印度尼西亚共产党在艾地、鲁克曼和其他领导人的领导下，一定会在反对帝国主义和争取社会主义的斗争中取得新的胜利。这对于新西兰共产党争取实现一个社会主义的新西兰的斗争将是一个巨大的帮助。"},{"type":"paragraph","text":"艾地在讲话中说，印度尼西亚共产党可以从新西兰共产党的斗争中学到很多东西。它对现代修正主义进行了坚持不懈和顽强的斗争。"},{"type":"paragraph","text":"艾地说:有人攻击印度尼西亚共产党和其它马克思列宁主义政党，给它们扣上“种族主义”的帽子。然而欢迎威尔科克斯同志的热烈气氛说明了这种指责是荒谬的。艾地说:“我们同威尔科克斯的肤色虽然不同，但是我们在反对帝国主义和现代修正主义、保卫马克思列宁主义的斗争中是团结得象一个人一样。问题决不是种族或者肤色，问题是要不要保卫马克思列宁主义，要不要革命。我们要保卫马克思列宁主义，要革命，因此我们就团结在一起。”"},{"type":"paragraph","text":"听众以十分热烈的掌声来欢迎两位共产党领导人的讲话。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e0fb5cf49b"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
