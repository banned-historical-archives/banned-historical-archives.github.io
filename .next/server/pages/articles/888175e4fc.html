script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"希共马列主义小组强烈谴责苏修对中国进行武装挑衅  苏修和美帝的一切阴谋都将彻底破产  指出反对美帝国主义及其走狗和反对现代修正主义是不可分割的","authors":[],"dates":[{"year":1969,"month":3,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"希共马列主义小组强烈谴责苏修对中国进行武装挑衅"},{"type":"paragraph","text":"苏修和美帝的一切阴谋都将彻底破产"},{"type":"paragraph","text":"指出反对美帝国主义及其走狗和反对现代修正主义是不可分割的"},{"type":"paragraph","text":"新华社二十八日讯　侨居外国的希腊共产党马克思列宁主义小组最近发表声明，强烈谴责苏修叛徒集团对中国进行武装挑衅的严重罪行。声明警告苏修、美帝和一切反动派，如果它们胆敢进攻中国必将遭到覆灭。"},{"type":"paragraph","text":"声明说：“苏修对社会主义中国进行新的武装挑衅，这是发生在他们对捷克斯洛伐克实行法西斯进攻的仅仅几个月之后，这再次证明修正主义强盗集团和美帝国主义没有什么两样。”"},{"type":"paragraph","text":"声明强调说：“苏修叛徒集团对中国进行武装挑畔的野蛮行动，是想摆脱它内外交困的窘境，其目的是：为了煽动反华情绪，平息苏联人民日益高涨的对资产阶级法西斯统治的不满和仇恨……。苏修叛徒集团对中国进行武装挑衅，另外一个目的是为了讨好美帝国主义，为了进行旨在瓜分世界的反革命的新的谈判准备土壤，为了扑灭世界革命运动并企图在中国周围建立火力包围圈。”"},{"type":"paragraph","text":"声明说：“但是，苏修及其同伙美帝的一切阴谋都将遭到完全彻底的破产。谁胆敢进攻中国，必将遭到覆灭。因为七亿中国人民不仅在反对各种帝国主义的长期斗争中经受过锻炼，而且在无产阶级文化大革命中受到了锻炼。中国人民是用马克思列宁主义和毛泽东思想武装起来的，并且得到世界各国革命人民的支持。”"},{"type":"paragraph","text":"声明说：“希腊人民从切身经验认识到，帝国主义和现代修正主义是‘孪生’兄弟，因此，反对美帝国主义及其走狗和反对现代修正主义是不可分割的。”"},{"type":"paragraph","text":"声明最后说：希腊人民从苏修集团的政策所遭到的痛苦教训中，看到了苏修挑衅性武装进攻的本质，他们坚决谴责这种罪恶行径，希腊人民和中国人民同声高呼：打倒新沙皇！"},{"type":"paragraph","text":"打倒苏修社会帝国主义！"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"888175e4fc"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
