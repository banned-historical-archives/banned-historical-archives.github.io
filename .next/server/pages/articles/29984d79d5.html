script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"提高阶级斗争和路线斗争觉悟坚决打退阶级敌人的猖狂进攻  四堡子公社革委会帮助王家店生产队大办毛泽东思想学习班收到好效果：革命生产出现崭新局面","authors":[],"dates":[{"year":1968,"month":4,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"提高阶级斗争和路线斗争觉悟坚决打退阶级敌人的猖狂进攻"},{"type":"paragraph","text":"四堡子公社革委会帮助王家店生产队大办毛泽东思想学习班收到好效果：革命生产出现崭新局面"},{"type":"paragraph","text":"据新华社沈阳十三日电　辽宁省彰武县四堡子公社革命委员会，遵照伟大领袖毛主席“千万不要忘记阶级斗争”的教导，帮助王家店生产队通过大办毛泽东思想学习班，狠抓阶级斗争，提高了贫下中农和革命干部的阶级斗争和路线斗争觉悟，打退了阶级敌人的猖狂进攻，使革命和生产出现崭新的局面。公社革委会的负责同志和驻社担负“支农”工作的解放军同志一起，联合组成毛泽东思想宣传队，背上背包，带上毛主席著作，深入到王家店生产队去。"},{"type":"paragraph","text":"王家店是经过“四清”运动的生产队。有些人认为阶级敌人已被斗得老实了，因而产生了和平麻痹思想，缺乏阶级斗争观念。结果对阶级敌人松了一松，而阶级敌人就乘机进攻。没有改造好的地主分子、反革命分子和四不清干部串通一气，向贫下中农展开了进攻。在无产阶级文化大革命初期，他们蒙蔽群众，把“四清”运动中选上的好干部推了下去，换上了他们满意的人。他们还拉拢腐蚀干部，挑拨离间，制造派别斗争，利用资产阶级、小资产阶级派性和无政府主义来掩护自己，打击贫下中农。"},{"type":"paragraph","text":"宣传队的同志了解了这些情况后，反复学习毛主席的最新指示，办起了有贫下中农、基干民兵和革命干部参加的毛泽东思想学习班。通过学习提高了大家的阶级斗争和路线斗争觉悟。"},{"type":"paragraph","text":"在提高认识的基础上，宣传队的同志组织大家大揭了生产队阶级斗争的盖子。老贫农庞景说：“中国赫鲁晓夫叫喊阶级斗争不存在了，这纯粹是说瞎话。咱队反革命分子李春显，地主李风奎，拉拢干部，挑拨离间，大搞资本主义复辟，这就是阶级斗争的铁的事实。”广大贫下中农和革命干部用大量的阶级斗争事实，狠揭猛批中国赫鲁晓夫的“阶级斗争熄灭”论，彻底肃清其流毒。大家纷纷表示：要念念不忘阶级斗争，念念不忘无产阶级专政。"},{"type":"paragraph","text":"广大贫下中农本着毛主席“我们对于反动派和反动阶级的反动行为，决不施仁政”的教导，对阶级敌人进行了斗争。在无产阶级专政的威力面前，阶级敌人低头认罪，大长了贫下中农的志气，大灭了阶级敌人的威风。"},{"type":"paragraph","text":"在对敌人举行了进攻之后，宣传队的同志又帮助生产队建立领导班子。被群众选出的干部纷纷表示，要为贫下中农掌好权，用好权，为贫下中农当一辈子老黄牛，和贫下中农一起把生产队办成红彤彤的毛泽东思想大学校。"},{"type":"paragraph","text":"王家店生产队通过这场阶级斗争，干部、社员受到了一次深刻的阶级斗争教育。田间、场地、家庭到处是斗私批修的战场。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"派性","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"29984d79d5"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
