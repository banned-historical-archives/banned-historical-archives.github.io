script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoistlegacy.de-259","name":"中央组织部、中央宣传部、中央统战部、公安部、民政部《关于中发〔1978〕55号文件的补充说明》","author":"中共中央组织部","internal":false,"official":false,"type":"unknown","files":[],"article":{"title":"中央组织部、中央宣传部、中央统战部、公安部、民政部《关于中发〔1978〕55号文件的补充说明》","dates":[{"year":1979,"month":2,"day":11}],"is_range_date":false,"authors":["中共中央宣传部","中共中央组织部","中共中央统战部","公安部","民政部"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"中共中央组织部干审局,干审工作政策文件选编(下), 966-968","tags":[{"name":"改正","type":"主题/事件"},{"name":"右派","type":"主题/事件"},{"name":"摘帽","type":"主题/事件"}],"parts":[{"type":"title","text":"中央组织部、中央宣传部、中央统战部、公安部、民政部《关于中发〔1978〕55号文件的补充说明》[1]"},{"type":"subtitle","text":"1979年2月11日·统发文〔1979〕第143号"},{"type":"paragraph","text":"各地在贯彻执行中发〔1978〕55号文件中，提出了不少问题，要求答复。我们将一些带普遍性的问题，拟订了一个补充说明，已经中央批准，现发给你们，请按照执行。"},{"type":"paragraph","text":"关于中发〔1978〕55号文件的补充说明"},{"type":"paragraph","text":"（一）在反右派斗争中，处理结论未明确保留公职或开除公职者，应按保留公职对待。在反右派斗争处理后，又因右派问题被迫离职和退职的人，仍按保留公职对待。"},{"type":"paragraph","text":"（二）对原保留公职的人，后来因为新的问题被开除公职或判刑劳改的（包括刑满释放的）应由原处理单位或原判决法院负责进行复查。如新的问题不足以受开除公职或判刑处分的应予改正。否则，仍维持开除公职或判刑处理。"},{"type":"paragraph","text":"（三）原调干学生划为右派后开除学籍的，按保留公职对待。划为右派的大学生，经批准改正的人，由本人现所在地区县以上组织、人事、劳动部门分配适当工作。工龄从被处理离校之日起计算。"},{"type":"paragraph","text":"（四）在整风反右运动中，出国留学生因“右派言论”被遣送或押送回国、定为右派分子或受了各种处分的，他们的审查改正工作，由现所在单位或地区县以上党委负责办理。"},{"type":"paragraph","text":"（五）原中等专业学校学生，被戴上右派分子或反党反社会主义分子帽子的，一律由本人现所在单位或地区予以改正。"},{"type":"paragraph","text":"（六）对过去已有结论，不以反革命论处或只有一般历史问题的人，在反右派斗争时有错误言论，但不够右派，而被戴上右派帽子和历史反革命帽子的；或虽未戴右派帽子，但戴上其它帽子的人，均应予以改正。"},{"type":"paragraph","text":"（七）凡未按中央〔1962〕544号文件规定，没经省委或中央批准而给一些人新戴、重戴右派分子帽子的，应予改正，妥善安置。"},{"type":"paragraph","text":"（八）在反右派斗争中，虽未戴右派帽子，但定为中右分子或因“右派言行”而受了处分的，应进行复审，实事求是地做好改正工作，妥善安置。"},{"type":"paragraph","text":"（九）错划右派批准改正后的工作安排，如改正单位安排确有实际困难的，可由改正单位负责和本人现所在地区或单位共同研究，分配适当工作。需要回城镇安置的，有关组织、人事、劳动部门应予办理手续，公安部门要准予入户。"},{"type":"paragraph","text":"（十）需要跨省、市安置的，由本人现所在地区县以上组织、人事、劳动部门负责直接与有关省、市县以上组织、人事、劳动部门联系解决。"},{"type":"paragraph","text":"（十一）被错划为右派的预备党员，一直表现较好，具备共产党员条件的，应承认其党员资格，按党章规定办理转正手续。党龄从原定转正时间算起。虽属错划，但本人在被取消预备期以来表现不好，或本人在反右派斗争中确有严重错误，不具备共产党员条件的，不再承认其党员资格。"},{"type":"paragraph","text":"（十二）党员被错划为右派期间的党费，不再补交。"},{"type":"paragraph","text":"（十三）经批准改正的人，恢复原工资待遇的时间，一律从一九七八年十月份算起。生活确有困难的酌情予以补助。此项经费，由所在单位开支；目前没工作的，由改正单位解决。"},{"type":"paragraph","text":"（十四）经批准改正的人的档案材料，按中央组织部的统一规定处理。改正单位应通知改正人的家属子女所在单位，撤出原发出的有关右派问题的证明材料，予以销毁，消除影响。工人、农民、中学生等划为右派或反社会主义分子的人，改正后，其档案中原有的结论和有关材料一律销毁，作一简要的改正说明存入本人档案。"},{"type":"paragraph","text":"（十五）中央和中央有关部门关于处理右派问题的有关规定，凡与中发"},{"type":"paragraph","text":"〔1978〕55号文件和本补充说明相抵触的，均以中发〔1978〕55号文件和本补充说明为准。"},{"type":"paragraph","text":"[1]Note: This document is also reprinted in 铁道部政治部审干办公室, 审干工作政策选编 (二), pp. 373-375."}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d5a8f90fb6"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
