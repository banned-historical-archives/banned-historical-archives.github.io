script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"邓小平副总理同邦戈总统在亲切友好气氛中举行会谈","authors":[],"dates":[{"year":1974,"month":10,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"邓小平副总理同邦戈总统在亲切友好气氛中举行会谈"},{"type":"paragraph","text":"新华社一九七四年十月五日讯　国务院副总理邓小平今天上午同加蓬共和国总统、政府首脑哈吉·奥马尔·邦戈举行了会谈。"},{"type":"paragraph","text":"会谈是在亲切友好的气氛中进行的。"},{"type":"paragraph","text":"加蓬方面参加会谈的有：政府副总理莱昂·梅比亚梅，外交和合作事务部长科尼吉·奥昆巴·多克瓦策格；随同邦戈总统来访的其他官员乔治·拉维里，保罗·穆坎比，邦让—弗朗索瓦·翁多，里夏尔·恩格马，艾蒂安·穆西鲁，朱利安·姆普霍，莱昂·奥热，米歇尔·昂舒埃，让—皮埃尔·伦本巴，雅克·莱比赞戈莫，让—费利克斯·马马莱波，马丹·恩祖埃—恩科格，让—费利克斯·阿丹德，约瑟夫·孔巴—穆伊蒂，保罗·孔达·基基，齐巴，皮埃尔—克拉韦·阿万乔。加蓬驻中国大使克里斯托夫·布巴纳也参加了会谈。"},{"type":"paragraph","text":"中国方面参加会谈的有：外交部部长姬鹏飞、副部长何英，外经部副部长陈慕华，农林部副部长梁昌武，有关方面负责人和工作人员何功楷、张耿和、晏家华、罗旭、朱传贤、周兰、王月芝、郑兆兴、谢燮禾、梁银柱、中国驻加蓬大使刘英仙。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7c0d2ae297"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
