script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"驻万山群岛广州部队某部党委成员认真学习理论  自觉抵制资产阶级法权思想侵蚀","authors":[],"dates":[{"year":1975,"month":4,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"驻万山群岛广州部队某部党委成员认真学习理论"},{"type":"paragraph","text":"自觉抵制资产阶级法权思想侵蚀"},{"type":"paragraph","text":"据新华社广州电　守卫在祖国南海前哨万山群岛的人民解放军广州部队某部党委成员，在认真学习毛主席关于理论问题的重要指示的过程中，畅谈发扬党的艰苦奋斗的光荣传统，抵制资产阶级思想侵蚀的体会，决心用马克思主义关于无产阶级专政的理论武装头脑，带领部队为保卫祖国海岛、巩固无产阶级专政而努力奋斗。"},{"type":"paragraph","text":"毛主席关于理论问题的重要指示发表以后，这个部队党委成员立即带头认真学习和讨论。大家认真阅读《哥达纲领批判》、《国家与革命》、《伟大的创举》、《关于正确处理人民内部矛盾的问题》等马列著作和毛主席著作中的有关章节，联系实际努力弄懂对资产阶级专政的问题。他们说，作为无产阶级专政柱石的人民军队，一定要学好无产阶级专政的理论，不断提高在无产阶级专政下继续革命的觉悟，保持旺盛的革命斗志，自觉地抵制资产阶级思想的侵蚀。"},{"type":"paragraph","text":"过去，这个部队的党委“一班人”，为了抵制资产阶级思想的侵蚀，经常和战士一起劳动，保持普通一兵的本色。在战争年代多次荣立战功的党委常委邓亚光，近两年中有十三个月时间都在施工第一线，既当指挥员，又当战斗员。原在连队担任指导员的王绍家，被提拔为党委常委、副政委以后，经常以普通一兵的身分到工地上去干重活，有时为了让战士看上新电影，代替战士站岗放哨，给战士烧洗澡水。王绍家在学习中说，我们一定要自觉地清除资产阶级法权思想，保持和发扬人民军队的光荣革命传统。"},{"type":"paragraph","text":"这个部队长期战斗在万山群岛，生活条件比较艰苦。党委“一班人”坚持学习马列和毛主席的著作，回忆革命战争年代的艰苦生活，激励自己保持艰苦奋斗的工作作风。他们每年大部分时间都在各个守岛连队蹲点，同战士们打成一片，在生活上不搞特殊化。去年十月，岛上连续刮了几次台风，部队吃菜发生困难。上级机关派船送来蔬菜，他们把蔬菜全部送到连队。他们经过最近一段时间的学习，决心戒骄戒躁，更自觉地改造世界观，在巩固无产阶级专政的斗争中作出更大的贡献。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"人民内部矛盾","type":"主题/事件"},{"name":"限制资产阶级法权","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6994eaaa6e"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
