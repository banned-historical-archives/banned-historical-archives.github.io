script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"上海国棉十七厂等二十五个单位向全市工交战线提出抓革命促生产倡议书全面落实毛主席最新指示认真搞好斗批改 奋战第四季度超额完成今年国家生产计划虚心向首都工人阶级学习，把革命和生产搞得好上加好，为夺取文化大革命的全面胜利立新功","authors":[],"dates":[{"year":1968,"month":10,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　上海国棉十七厂、上海第一阀门厂、上港七区、上海机床厂等二十五个单位的革命造反派和革命职工，在前天举行的工交战线誓师大会上，向全市工交战线提出了抓革命、促生产的倡议书。倡议书全文如下:"},{"type":"paragraph","text":"无产阶级革命派战友们，革命的工人同志们:"},{"type":"paragraph","text":"山在欢呼，海在歌唱；东风万里，喜报频传。在伟大领袖毛主席一系列最新指示的光辉照耀下，在夺取无产阶级文化大革命全面胜利的阵阵凯歌声中，我们上海工人阶级的七百名优秀代表，在毛主席的身边参加了国庆观礼，受到了伟大领袖毛主席和他的亲密战友林副主席的亲切接见，这是毛主席对我们上海工人阶级的最大关怀，最大支持，最大鼓舞，最大鞭策。特大喜讯传来，我们含着幸福的热泪千遍万遍地高呼:“伟大领袖毛主席万岁!”我们怀着无限深厚的无产阶级感情，最最衷心地祝愿毛主席万寿无疆!万寿无疆!万寿无疆!"},{"type":"paragraph","text":"在以毛主席为首、林副主席为副的无产阶级司令部的英明领导下，上海的革命和生产形势一片大好。九月份工业生产超过了历史最高水平，交通运输全面超额完成了国家计划。但是，我们同北京工人阶级比较，还有很大距离，北京针织总厂是斗、批、改的一面鲜艳的红旗，他们全厂抽调了一半以上的工人参加毛泽东思想宣传队，仍然月月大幅度增产，九月份又提前七天完成了任务。首都的工人阶级为我们作出了光辉的榜样。"},{"type":"paragraph","text":"上海工交战线面临的第四季度的任务是十分艰巨，十分光荣的。斗、批、改的伟大历史任务落在我们工人阶级的双肩，第四季度又是完成全年生产计划的一个关键时期，能否出色地完成一九六八年的生产任务，这是关系到夺取无产阶级文化大革命全面胜利的大事。我们坚决贯彻执行伟大领袖毛主席“认真搞好斗、批、改”，“抓革命，促生产”的伟大指示，奋战三个月，夺取更大的新胜利，向最敬爱的伟大领袖毛主席汇报。为此，我们上海国棉十七厂、上海第一阀门厂、上海港务局第七装卸区、上海机床厂等二十五个单位的革命造反派和革命职工向"},{"type":"paragraph","text":"全市各兄弟单位的革命造反派和革命职工提出如下倡议:"},{"type":"paragraph","text":"一、以实际行动向毛主席献忠心，为夺取无产阶级文化大革命全面胜利立新功。毛主席向我们提出了“工人阶级必须领导一切”、“认真搞好斗、批、改”和对知识分子进行再教育的伟大历史任务。我们一定全面落实毛主席一系列最新指示，条条落实，句句照办，狠抓两个根本不转向，认真搞好斗、批、改，在夺取无产阶级文化大革命的全面胜利中立新功。"},{"type":"paragraph","text":"二、虚心向北京工人阶级学习。首都工人阶级对毛主席最忠，跟毛主席的战略部署最紧，执行毛主席革命路线最坚决，他们狠抓革命，猛促生产，是全国工人阶级抓革命、促生产的模范。我们一定要老老实实地向北京工人阶级学习，把革命和生产搞得好上加好。我们应该谦虚，谨慎，戒骄，戒躁，以北京工人阶级为榜样，争当抓革命促生产的模范。同时要向外地和本市一切先进单位学习。"},{"type":"paragraph","text":"三、狠抓革命，猛促生产，进一步反右倾，鼓干劲。从现在开始，我们一定要天天抓紧，月月抓紧，连续作战，决战三个月，用最大的决心，最高的热情，最切实的措施，做到日日超产，月月超产。保证超额完成国家计划。要完成这个艰巨而光荣的任务，我们必须大鼓干劲，大反右倾，坚决打掉盲目的“笃定”思想和悲观的“定局”观点。我们一定要敢想、敢说、敢做，大搞技术革命，敢于攀登世界科学技术的高峰，积极投入一场新的伟大的工业革命。同时，要进一步节约闹革命，节煤百分之二十以上，节约用电百分之十以上，节约一切原材料，降低成本，提高劳动生产率，提高产品质量。"},{"type":"paragraph","text":"四、树立全局观点，发扬共产主义大协作风格。在抓革命促生产的高潮中，群众性的比学赶帮运动发展到了一个新的阶段。我们一定要发扬共产主义风格，把方便让给别人，把困难留给自己，主动帮助兄弟厂解决问题，一方有困难，大家来帮助，万众一心，同心协力，大干一场。"},{"type":"paragraph","text":"战友们，同志们，我们经历两年多文化大革命锻炼的上海工人阶级，有志气，有决心，说得到，做得到。今年一定要超额完成全年的生产任务。这个决心我们是下定了!这是具有重大意义的政治任务，是我们工人阶级义不容辞的责任。我国无产阶级文化大革命的伟大胜利，使世界各国革命人民欢欣鼓舞，帝、修、反怕得要死，吓得要命。我们上海工人阶级就是要为毛主席争气，要为祖国争光。为革命，我们刀山敢上，火海敢闯，狂风敢顶，什么困难都不怕。让帝国主义、修正主义和各国反动派在我们面前发抖吧!"},{"type":"paragraph","text":"无产阶级文化大革命全面胜利万岁!"},{"type":"paragraph","text":"毛主席的无产阶级革命路线胜利万岁!"},{"type":"paragraph","text":"狠抓革命，猛促生产!"},{"type":"paragraph","text":"毛主席万岁!万岁!万万岁!"},{"type":"paragraph","text":"倡议单位:"},{"type":"paragraph","text":"上海国棉十七厂　上海电风扇厂"},{"type":"paragraph","text":"上海第一阀门厂　吴泾热电厂"},{"type":"paragraph","text":"上海港务局第七装卸区　上海柴油机厂"},{"type":"paragraph","text":"上海机床厂　东方红造船厂"},{"type":"paragraph","text":"长宁蓄电池厂　八一钢铁厂"},{"type":"paragraph","text":"上海合金轴瓦厂　上海变压器厂"},{"type":"paragraph","text":"上钢二厂　上海国棉五厂"},{"type":"paragraph","text":"上钢三厂　上海国棉二十九厂"},{"type":"paragraph","text":"上海第四制药厂　上海国棉三十厂"},{"type":"paragraph","text":"上海无线电八厂　上海国荣灯具厂"},{"type":"paragraph","text":"上海灯泡一厂　上海铁路分局南站"},{"type":"paragraph","text":"上海微型轴承厂　上海汽车运输第八场"},{"type":"paragraph","text":"上海自行车厂"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d7cfa4f323"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
