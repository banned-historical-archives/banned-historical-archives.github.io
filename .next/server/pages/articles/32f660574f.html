script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"浙大同学祭扫于子三烈士墓表示决向资产阶级思想开火","authors":["陈耀"],"dates":[{"year":1952,"month":4,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编辑同志:我们浙大团工委在春假中举行大团日，邀请全体同学参加祭扫于子三烈士墓。团工委在墓前表扬了在三反、五反运动中有积极表现的团员同志，并批评与处分了少数立场不稳的同志。我们在于子三烈士墓前唱了輓歌，大家深深地认识到:千千万万像于子三这样的烈士，为了实现美丽幸福的社会主义，共产主义而奋斗，他们慷慨地献出了自己的生命；难道我们今天在三反、五反运动中还能够为袒护家庭的不法行为和个人的享乐思想而丧失立场吗?我们不能这样做!缅怀先烈，我们决心以最大的努力来向资产阶级腐朽思想开火!"},{"type":"paragraph","text":"浙江大学学生　陈耀"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"32f660574f"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
