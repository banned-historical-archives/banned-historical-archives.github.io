" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"对压制群众批评的负责干部要敢于揭露和惩处","authors":[],"dates":[{"year":1951,"month":12,"day":22}],"is_range_date":false,"parts":[{"text":"对压制群众批评的负责干部要敢于揭露和惩处","type":"title"},{"text":"各中央局，并转分局、省市区党委：","type":"appellation"},{"text":"继北京市委之后，在大城市中，武汉市委已经发动了一个大张旗鼓的、雷厉风行的、吸引广大群众参加的反贪污反浪费反官僚主义的伟大斗争。他们做得很勇敢，公开揭露和惩处了一批敢于压制群众批评的担负重要职位的干部。他们所定的方针、步骤和办法都很适当。中央希望天津、济南、青岛、上海、南京、杭州、南昌、广州、长沙、重庆、成都、昆明、西安、太原及其他大城市，一律发动这样一个斗争；希望这些大城市的市委都有武汉市委这样勇敢和有步骤有办法；都向中央写一个有分析有内容的报告。请将武汉市委的报告在党内刊物上发表。","type":"paragraph"},{"text":" 中央12月22日","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4bf8dd1d17"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
