script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"向毛泽东道路前进","authors":[],"dates":[{"year":1950,"month":10,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"昨天的北京，不仅是我们全国，宁是全世界民主阵营所最瞩目的所在，而毛主席更是北京的中心人物。"},{"type":"paragraph","text":"从斯大林起，各民主国家元首以及人民团体都有电报打到北京，祝贺毛主席，祝贺我们的国庆。"},{"type":"paragraph","text":"这是因为由于毛主席“英明的领导，中国人民轰轰烈烈的进行了旋乾转坤的民族解放事业……取得了史无前例的胜利，奠定了独立、民主幸福的新中国的基础。”更进而使“亚洲各国的被压迫民族及其他许多国家的劳动人民正吸取中国的革命经验。”这是全国各民主党派和民主人士在昨天写给毛主席致敬的话。"},{"type":"paragraph","text":"生在毛泽东时代的中国人民是最光荣的也最幸福的，让我们人人爱惜每一刻的光阴，随着毛主席的指示前进!"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"35d70e4ccc"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
