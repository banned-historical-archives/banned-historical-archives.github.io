script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"武大吸取教训肃清极左影响","authors":["陈志鸿"],"dates":[{"year":1985,"month":1,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"武大吸取教训肃清极左影响"},{"type":"paragraph","text":"本报讯  武汉大学党委认真对待报纸批评，抓住典型，积极采取措施肃清“文化大革命”的极左影响。"},{"type":"paragraph","text":"去年9月底，武汉大学中文系党总支为在学生中发展党员，函调发展对象的家庭成员与社会关系。具体办事人员将早已废用的“文革”期间印制的学生情况调查表发出，造成恶劣影响。11月24日，本报在《今日谈》专栏中以《可怕的“调查提纲”》为题，批评了此事。武汉大学党委主要负责同志对此十分重视，立即调查了有关情况，并进行了认真研究。他们认为此事的发生，说明“文革”的极左影响在武汉大学还没有彻底肃清。为此他们认真调查了此事，对有关人员进行了批评教育，中文系党总支和校党委写了检查报告；召开会议总结教训，并向全校进行传达；在全校深入进行彻底否定“文革”的教育，增强全校人员同党中央在政治上保持一致的自觉性；彻底清查处理“文革”遗留下来的材料表格。"},{"type":"paragraph","text":"（陈志鸿）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"53b33901a1"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
