" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"武汉大学学生在街上張貼大字报","authors":[],"dates":[{"year":1957,"month":6,"day":2}],"is_range_date":false,"parts":[{"text":"武汉大学学生在街上张贴大字报","type":"title"},{"text":"新华社武汉2日电    昨日中午武汉大学十多名学生由武昌过江在汉口长江日报、湖北日报及繁华的商业区江汉路长江轮渡码头一带张贴大字标语。 标语内容有：“长江、湖北日报为什么不登我们争鸣消息”，“请派记者到我们那里(指武大)去”，“反对新闻封锁”等等。群众看到他们的标语后，多表示反对，有的马上撕掉这些标语。学生对撕掉他们标语的单位大为不满。贴到湖北日报和长江日报门口的标语被撕掉后，第二天(2日，星期天)学生连天开会研究抗议办法，经研究结果决定：3日分派代表到省委、报社请愿。2日晚，他们将要开大会辩论胡风是否是反革命集团问题等等。本来武大学生在上月29日前较其他学校尚算平静。29日突有中文系三年级学生要求停课辩论有关肃反等问题，幷在校内出了若干张大字报。但这个要求随卽遭到其他班反对。","type":"paragraph"},{"text":"来源：新华通讯社编：《内部参考》，第2221期，1957年6月4日","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cbbb404e9b"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
