script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反对美帝和本国大庄园主的残酷压迫和剥削拉美农民运动蓬勃兴起","authors":[],"dates":[{"year":1970,"month":2,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社北京三十一日电　在辽阔富饶的拉丁美洲的土地上，千千万万的农民和农业工人反对美帝国主义和本国大庄园主的残酷压迫和剥削的斗争正在蓬勃兴起，显示了他们中间蕴藏着巨大的革命力量。"},{"type":"paragraph","text":"从美帝国主义和拉美各国大庄园主手里夺回土地，实现耕者有其田，争取民主权利，是苦难深重的拉美农民和农业工人的强烈要求。一年来，从北美的墨西哥到南美的巴西、智利、秘鲁、厄瓜多尔、哥伦比亚，到处都燃起了农民斗争的革命烽火。越来越多的贫苦农民起来同美帝和本国大庄园主展开激烈的斗争。智利广大农民，不顾反动军警的镇压，去年一年中，进行了七十多次夺地斗争，将近八百个庄园的数以万计的农民和农业工人参加了斗争行列。在厄瓜多尔，去年头十个月农民占领了一百多个庄园。巴西巴伊阿州可可种植区的农业工人去年曾多次举行声势浩大的示威游行，参加的人数达五万人。农民们的斗争给了反动派以有力的打击，搅乱了它们的安乐窝。"},{"type":"paragraph","text":"一年多来，拉美各国的农民斗争比以前更加激烈。他们不畏强暴，敢于斗争。去年六月，在秘鲁首都利马的东南部，一万多农民占领了乌安塔市和重要的战略要地，炸毁了通往这个城市的桥梁，英勇地抗击了前来镇压的警察部队的进攻。示威农民还袭击警察哨所，活捉一名地方高级官员。"},{"type":"paragraph","text":"拉美广大农民和农业工人，在斗争中正在加速觉醒。他们日益认清美帝国主义及其代理人是使拉美农民陷入苦难深渊的罪魁祸首。秘鲁胡宁省塔尔马特农民在一次斗争中愤怒揭露一家美国公司企图强夺他们土地的暴行，他们高呼:美国强盗从秘鲁滚出去!巴西农民在斗争中还提出了用暴力推翻独裁政权的口号。"},{"type":"paragraph","text":"拉丁美洲广大农民越来越认识到，为了同美帝国主义和各国反动派进行更有力的斗争，必须更广泛地联合起来。在拉美一些国家里，许多地区农民开始联合起来，互相支持、互相声援，同敌人进行坚决的斗争。"},{"type":"paragraph","text":"伟大领袖毛主席教导说:“贫农和中农都只有在无产阶级的领导之下，才能得到解放；而无产阶级也只有和贫农、中农结成坚固的联盟，才能领导革命到达胜利，否则是不可能的。”蓬勃兴起的拉美农民运动是拉美民族民主革命中一股巨大的革命力量，它必将在无产阶级的领导下，更加沉重地打击美帝国主义及其代理人在拉美的统治。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a38f2ac655"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
