<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"川北行署关于住地大楼被匪特烧毁的检讨报告","authors":[],"dates":[{"year":1950,"month":5,"day":11}],"is_range_date":false,"parts":[{"text":"川北行署关于住地大楼被匪特烧毁的检讨报告","type":"title"},{"text":"（一）七日特务放火焚烧职署大楼一事，前已简报。现清理损失结果，除楼房家俱及少数人中员的行李外，财政处损失夏衣五一六套，单帽四六顶，人民币五二万元，缝衣机一九架（另二十架稍有损坏尚可修理）。教育处损失绸子三一疋，人民币九八万元，特货五零两，图书和理化仪器一部。秘书处损失人民币七九万元，锅一口，步枪三支。以上公私损失约值一亿元、加楼房家俱共损失四亿元以上。","type":"paragraph"},{"text":"（二）此次事件已查明系匪特营救匪首XXX计划的，一部份匪原定六日行动先烧公园为号，然后分三路进城，破监劫狱，后随时改在七日黄昏烧职署大楼为号，当值星期，青年团组织青年晚会，机关青年干部和警卫部队多去参加，致放火者漏网。","type":"paragraph"},{"text":"（三）此次事件虽为匪特有计划的行动，但主要是由于我们领导思想的麻木不仁，虽然中央和西方南局多次通报匪特的破坏活动；职署内部的成员也非常复杂，百分之五十以上是由成都派来的旧人员和革大的学生，政治面目很复杂，不但我们未引起足够注意，进一步加强机关保卫工作，特别是财政处错误的决定将三万套单衣集中于署内缝制，二百馀工人的进出更增加了秩序的紊乱，给匪特以可乘之机，是这次损失的直接原因。","type":"paragraph"},{"text":"（四）九日我们已根据上述情况作了检讨，并布置善后。关于责任问题除财政处长含祥令同志应负主要责任（因领导上曾不同意集中缝衣工人的行署做夏衣，他坚持要这样做），大家同意他自请处分的要求外，我认为总的责任应由我负，由于我自己的警觉性不高，对干部的防特教育抓的不紧，对机关的保卫工作检查不严，特别对集中工人缝夏衣的错误主张未坚持自己的意见（我愿意由分区来行署领布自制），致造成国家财产的重大损失与人民政府在政治上的不良影响，为教育自己与警惕大家，请给我以严厉的处分。","type":"paragraph"}],"comments":[],"origin":"《西南工作》 第5期，中共中央西南局编印 （党内刊物发至县团）， 1950年5月27日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"417d9aa82f"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
