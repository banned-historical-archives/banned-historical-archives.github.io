script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"北京卫戍区某部团以上领导干部认真看书学习  深入批判林彪的资产阶级军事路线","authors":[],"dates":[{"year":1974,"month":9,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"北京卫戍区某部团以上领导干部认真看书学习"},{"type":"paragraph","text":"深入批判林彪的资产阶级军事路线"},{"type":"paragraph","text":"新华社讯　人民解放军北京卫戍区某部团以上领导干部，在学习毛主席的军事思想和军事路线，批判林彪的资产阶级军事路线的斗争中站在前列，带头学、带头批，带动部队的批林批孔运动深入、普及、持久地发展。"},{"type":"paragraph","text":"这个部队团以上各级领导干部都把带头认真学习毛主席的军事思想和军事路线，掌握革命大批判的理论武器放在首位。他们围绕批判林彪在辽沈、平津两大战役中推行右倾机会主义路线的问题，反复攻读了毛主席的《目前形势和我们的任务》、《关于辽沈战役的作战方针》、《关于平津战役的作战方针》等十几篇著作。有些领导干部还选读了毛主席在解放战争时期其他著作。部队长孙臣良学习了毛主席《关于平津战役的作战方针》和其他有关著作以后，对在平津战役中林彪对抗毛主席一系列指示的罪行和两条路线的斗争情况，有了比较全面的了解。进一步认识到林彪反对毛主席关于东北野战军提早入关的指示，充分暴露了他右倾机会主义的本质。如果按照林彪的那一套去办，就会把平津的敌人放跑、吓跑、赶跑，把一场歼灭战变成击溃战，平津战役就不可能取得彻底的胜利。孙臣良用自己的学习体会，到部队宣讲和带头批判，使干部、战士受到了比较深刻的两条路线斗争的教育。某团副政委李茂珍为了弄清两大战役中两条路线斗争的焦点和实质，刻苦学习毛主席的有关著作，经常学到深夜，每学一篇，都认真写下读书笔记。他为了加深认识辽沈、平津战役的胜利，是毛主席的军事思想和军事路线的伟大胜利，还到连队和干部、战士一起学习，一起批判林彪的资产阶级军事路线。"},{"type":"paragraph","text":"这个部队有一部分团以上领导干部，当年参加过辽沈、平津战役。批判林彪资产阶级军事路线开始以后，他们就积极投入了战斗。参加过平津战役的某团副政委温凯，为了给驻在农村执行施工任务的四连宣讲两大战役中两条军事路线的斗争，他夜以继日地认真准备，联系亲身经历写了发言提纲。宣讲的那天，天下起了瓢泼大雨，他冒雨翻山赶到四连，不顾休息立即给干部、战士宣讲。干部、战士激动地说：副政委来连队宣讲，不仅使我们进一步认清了林彪在两大战役中推行右倾机会主义路线，对抗毛主席的英明决策的罪行，而且以实际行动教育我们应该以什么样的战斗姿态投入对林彪资产阶级军事路线的批判。副参谋长杨晓峰先后参加过辽沈、平津两大战役，经过这次批判林彪资产阶级军事路线，他对毛主席在两大战役中的英明决策和指挥，体会更加深刻。他和机关干部一同学习，一同批判。有一次，他到某团检查战备工作，赶上这个团在开批判大会，就登台批判。最近，他听说部队办的教导队要召开批判林彪在两大战役中的罪行的大会，又赶去参加，用自己参加两大战役的战例，说明辽沈、平津战役的胜利，都是毛主席的军事思想和军事路线的光辉胜利。他还用许多事实，剥掉林彪所谓“常胜将军”、“天才军事家”的画皮，这样，使教导队的批判会开得更有成效。某团政治处副主任杨建国，为了帮助一连战士深刻认识林彪先打南口的错误主张及其反动实质，他回顾自己参加平津战役的经历，给一连作了一次辅导报告，加深了干部、战士对林彪资产阶级军事路线极右实质的认识，推动了一连革命大批判的深入。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"林彪","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"批林批孔","type":"主题/事件"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"55afd112e2"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
