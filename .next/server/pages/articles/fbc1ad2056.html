script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"粉碎美日反动派的进攻　克服修正主义者的破坏阴谋  《赤旗报》号召全党团结奋斗迎接“八大”","authors":[],"dates":[{"year":1961,"month":6,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"粉碎美日反动派的进攻　克服修正主义者的破坏阴谋"},{"type":"paragraph","text":"《赤旗报》号召全党团结奋斗迎接“八大”"},{"type":"paragraph","text":"新华社28日讯　东京消息：日本共产党机关报《赤旗报》今天发表社论，号召日共全体党员粉碎美日反动派对党的进攻，克服机会主义，为争取日共第八次全国代表大会的胜利举行而奋斗。"},{"type":"paragraph","text":"社论说：“再过一个月日共八大就要开幕，目前全国党组织正在召开组织会议，选出代表，准备迎接大会。”"},{"type":"paragraph","text":"社论强调指出，绝大多数党员支持党的纲领和政治报告草案，全体党员正加强团结在党中央周围，斗志昂扬地为争取“八大”胜利而努力。"},{"type":"paragraph","text":"《赤旗报》指出：“许多大企业中的党员自从党有了革命纲领草案以来，更加坚定信心地在工人群众中活动，树立党的威信，增加了党员和党机关报《赤旗报》的读者”。"},{"type":"paragraph","text":"《赤旗报》揭露，美日反动派趁机集中力量加强对共产党发动的进攻，企图破坏“八大”，右翼社会民主主义者和修正主义者也在展开活动。"},{"type":"paragraph","text":"社论指出：“它们的这种阴谋的目的在于引起我党在思想上和政治上的分裂，破坏八大，并企图阻止日本工人和人民的斗争发展为针对美帝国主义和日本垄断资本两个主要敌人的革命斗争”。"},{"type":"paragraph","text":"《赤旗报》强调指出：“但是，全国绝大多数的党组织通过大会筹备活动战胜了它们的卑鄙阴谋。全体党员必须以这种成就为基础，在同破坏阴谋和机会主义的斗争方面获得彻底胜利，并进一步为争取八大的胜利而努力”。"},{"type":"paragraph","text":"新华社28日讯　东京消息：据《赤旗报》今天说，奈良县和岛根县的共产党组织的党员人数增加了一倍。"},{"type":"paragraph","text":"报纸说：唯一一个尚未完成党员人数增加一倍的指标的鸟取县的党组织正在集中努力，并深信将在第八次代表大会开幕前达到这个指标。"},{"type":"paragraph","text":"据新华社26日讯　东京消息：日本九州各县的青年和妇女代表三千五百多人25日在福冈县水卷镇举行群众大会，声援日本煤矿公司高松矿山的工人反对所谓“企业合理化”的斗争。大会并表示要为粉碎“防止政治性暴力行为法案”、打倒池田内阁和粉碎日美“安全体系”而斗争到底。"},{"type":"paragraph","text":"日本煤矿工会所属的全部工会组织在26日采取了第一次统一行动，举行短期罢工，以声援高松矿山工人和杵岛矿山工人的斗争。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fbc1ad2056"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
