script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"要革命就必须学习毛主席著作","authors":[],"dates":[{"year":1967,"month":3,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"要革命就必须学习毛主席著作"},{"type":"paragraph","text":"一位桑给巴尔青年运动领导人和他的朋友们在学习了毛主席的著名著作《青年运动的方向》之后，他们根据毛主席的教导，常常组织青年下乡去帮农民收割稻子，到农场或建筑工地进行义务劳动。"},{"type":"paragraph","text":"另外在坦桑尼亚中国援建工地上，有个非洲卡车司机在读了《为人民服务》和《愚公移山》后，在工作中表现出更大的劳动热情。他对中国专家说：在非洲，殖民主义者象一座大山一样压在非洲人民的头上。我们应该用愚公那种不屈不挠的精神来搬掉这座大山。只有通过我们艰苦的斗争，我们才能取得胜利。他还说：“世界上被压迫的人民，如果要站起来，就必须学习毛泽东思想。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"15ee880eb0"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
