script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"海地劳动党马列主义宣传组《海地红色邮报》热烈祝贺我党“九大”  马克思主义、列宁主义、毛泽东思想战无不胜","authors":[],"dates":[{"year":1969,"month":4,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"海地劳动党马列主义宣传组《海地红色邮报》热烈祝贺我党“九大”"},{"type":"paragraph","text":"马克思主义、列宁主义、毛泽东思想战无不胜"},{"type":"paragraph","text":"新华社二十九日讯　中国共产党第九次全国代表大会收到了海地劳动党马克思列宁主义宣传组《海地红色邮报》的贺信，全文如下："},{"type":"paragraph","text":"向毛主席、向林彪同志、向周恩来同志以及中国共产党第九次全国代表大会的全体代表和参加者致以热烈的祝贺。同志们："},{"type":"paragraph","text":"我们向中国共产党第九次全国代表大会表示热烈的祝贺，大会是在形势对全世界革命力量越来越有利、反动派处境越来越不妙的时刻召开的。"},{"type":"paragraph","text":"在中国这个社会主义革命的坚不可摧的堡垒，无产阶级文化大革命已经取得了决定性的胜利并且在一切领域中得到巩固。苏修社会帝国主义蓄意策划的武装挑衅已被英雄的中国边防部队所粉碎，并且受到用毛泽东思想武装起来的全国亿万军民的谴责。"},{"type":"paragraph","text":"以恩维尔·霍查同志为首的无畏的阿尔巴尼亚劳动党领导的社会主义的阿尔巴尼亚，正在革命化的道路上胜利前进。社会主义的阿尔巴尼亚退出已被苏联社会帝国主义变成了侵略该条约成员国的工具的华沙条约，这是对东欧和中欧各国人民的一个巨大的鼓舞。"},{"type":"paragraph","text":"以美国为首的帝国主义集团已被一系列越来越严重的危机所动摇，受到人民力量的打击和围攻，正在急剧地走向崩溃。"},{"type":"paragraph","text":"以莫斯科社会帝国主义集团为中心的修正主义阵营，显然在分崩离析。对捷克斯洛伐克的法西斯侵略，对这个国家的军事占领，捷克斯洛伐克领导集团的可耻投降，苏联在乌苏里江的冒险，所有这些事实都证明了：修正主义叛徒的政策已经彻底破产。"},{"type":"paragraph","text":"指明革命道路的毛泽东思想，在汹涌澎湃的人民斗争浪潮中，正在全世界广泛深入地传播。"},{"type":"paragraph","text":"两年多以前，海地的马克思列宁主义者采取了体现当代共产主义运动特点的、具有历史意义的行动，即马克思列宁主义者永远同修正主义者彻底决裂。海地劳动党，在为反对美帝、反对残暴的傀儡杜瓦利埃、反对修正主义走狗、反对披上各种伪装在拉丁美洲泛滥的机会主义思潮而进行的曲折的毫不妥协的斗争中，逐步地在思想上和组织上奠定了基础。"},{"type":"paragraph","text":"毛主席教导我们：“反动的逆流终究不会变为主流”。用马克思主义、列宁主义、毛泽东思想武装起来的、坚持奋斗的海地劳动党定将扫除一切障碍，点燃人民革命的火焰。"},{"type":"paragraph","text":"马克思主义、列宁主义、毛泽东思想的路线是战无不胜的！"},{"type":"paragraph","text":"帝国主义者、反动派和修正主义者是纸老虎！"},{"type":"paragraph","text":"祝伟大、光荣的中国共产党第九次全国代表大会成功！"},{"type":"paragraph","text":"祝无产阶级敬爱的导师毛泽东同志万寿无疆！"},{"type":"paragraph","text":"海地劳动党马克思列宁主义宣传组"},{"type":"paragraph","text":"《海地红色邮报》"},{"type":"paragraph","text":"一九六九年四月"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b610ef9639"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
