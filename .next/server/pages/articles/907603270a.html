<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"渝州叶正黄毛主席咏雪词的写作年代","authors":["华林"],"dates":[{"year":1961,"month":10,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"华林"},{"type":"paragraph","text":"近读周振甫同志《革命现实主义和革命浪漫主义的典范——学习毛主席诗词》一文(见内蒙古师范学院《语言文学》1960年第七期)，其中断定:“《沁园春·雪》作于1945年8月，是毛主席到重庆去跟国民党进行和平谈判时写的。”从这一判断出发，文章加以引申道:“那时候日本帝国主义已经投降，人民革命力量在抗日中不断地壮大起来”；又道:“在作《雪》词时，近百万方公里的土地上，超过一万万的人民已经成了主人，虽然当时的国民党反动派在积极准备内战，但诗人已经预见到全国解放的伟大胜利……”。"},{"type":"paragraph","text":"据我所知，认为主席这首词作于赴重庆谈判时的，还大有人在。如《解放军文艺》1957年第七期《读毛主席诗词的一点感受》一文就说:“毛主席赴重庆进行谈判，毛主席到重庆后，填了一首气壮山河脍炙人口的《沁园春》题为《雪》·”刘绶松同志也说:“《沁园春(雪)》作于抗日战争胜利后”(见《武汉大学人文科学学报》1959年第十期)，还有一位署名木将的作者，进一步证实:“1957年春，笔者曾访问过重庆红岩村前八路军办事处。并曾亲到主席住过的二楼的一个房间里参观。墙上挂着以镜框装着的这首诗(按:即指咏雪这首词，下同。——林)的原稿的摄影。原稿纸是竖的红格信笺，横眉上印着红色的‘八路军办事处’的字样。招待员还说:主席这首诗就是在这间房子里写的，足证明这首诗是这时期写成的无疑。”(见西南师范学院《语文》1957年第四期《毛主席\u0026lt;沁园春(雪)\u0026gt;试析》一文)，木将的说法绘声绘形，看来是可以“无疑”的了。"},{"type":"paragraph","text":"然而，上述判断却是不能令人“无疑”的。现试申其说:"},{"type":"paragraph","text":"主席在重庆谈判的时候，是1945年的8月下旬到10月上旬之间，正是“渝州叶正黄”(见主席《赠柳亚子先生》七律)的时节。在此时作词，又怎么会去咏雪呢?如果说，是在重庆想象陕甘宁边区的“北国风光”之作，但此时的陕甘宁边区，也还不至于就到了“千里冰封，万里雪飘”的时节啊!"},{"type":"paragraph","text":"大家知道，这首词是主席在重庆谈判时应柳亚子先生的“索句”(见主席《赠柳亚子先生》七律)而写出来的。柳亚子先生在收到这首词后，曾经和过一首。在人民文学出版社出版的《柳亚子诗词选》中，刊有柳先生和词的手稿；小序云:“次韵和毛润之(按:即主席。——林)初到陕北看大雪之作。”这里，着重点是引者所加。据此，可知主席这首词，乃是长征到陕北后不久的一个冬天里作的。它并不作于1945年秋天在重庆时。主席在重庆时，是因柳亚子先生“索句”，而录这首旧作给他的。"},{"type":"paragraph","text":"录旧作以为酬唱，这在诗人们的文学生活中是常有的事。就在主席已发表的二十一首诗词中，也还有同样的例子，那就是《浪淘沙——北戴河》与《水调歌头——游泳》。1957年1月29日北京《工人日报》曾经登过这两首词的手稿，并有主席给黄任之先生的一封亲笔信，信上说:“去年和今年各填了一首词，录陈审正，以答先生历次赠诗的雅意。”这两首词既是录旧作以赠黄任之先生，那么咏雪这首词为什么不也可以是录旧作以赠柳亚子先生呢?周振甫同志等大概因为这首词是主席在重庆写给柳亚子的，就误以为这首词也就是在这个时候所作的了。这就错了!"},{"type":"paragraph","text":"至于木将在重庆前八路军办事处所看到的这首词的手稿摄影，那也不难解释。主席用八路军办事处的信笺写这首词，并不等于就是这时才创作这首词，而不过是用八路军办事处的信笺录这首旧作罢了。办事处的招待员也只是说，这首词“就是在这间房子里写的”，而不是说“在这间房子里作的”"},{"type":"paragraph","text":"(见前引木将的文章)。"},{"type":"paragraph","text":"既然这首词不作于在重庆谈判时，而是作于“初到陕北”时，那么象周振甫等同志所作的引申、解释，就有加以修正的必要了。由于判断一个作品的创作时间与理解这个作品的内容有密切的关系，所以我提出这点浅见，与周振甫等同志商榷，并供讲解主席诗词的同志们参考。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"907603270a"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
