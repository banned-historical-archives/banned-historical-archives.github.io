" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji48","name":"毛泽东全集第48卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji48.pdf"],"article":{"title":"七律·洪都","alias":"","parts":[{"type":"paragraph","text":"七律·洪都"},{"type":"paragraph","text":"（1965年）到得洪都又一年，祖生击樟至今传。闻鸡久听南天雨，立马曾挥北地鞭。鬓雪飞来成废料，彩云长在有新天。年年后浪推前浪，"},{"type":"paragraph","text":"江草江花处处鲜。"},{"type":"paragraph","text":"[1]洪都，旧南昌府的别称。隋、唐、宋三代曾以南昌为洪州治所，又为东南都会，因而得名。这里指江西省南昌市。"},{"type":"paragraph","text":"[2]祖生击，祖生，即东晋名将祖逃。公元304年匈奴族刘渊在黄河流域建立汉国。中原大乱，祖逊率领亲党数百家来投镇守建邺（今南京市）的晋元帝司马睿。313年祖逊要求率兵北伐，被任为奋威将军、豫州刺史，率部曲百余家渡江北上，中流击辑，立誓收复中原。击辑，敲打船桨，后用以形容有志报国的抱负和气概。"},{"type":"paragraph","text":"[3]闻鸡，这里化用闻鸡起舞的典故。《晋书·祖逃传》：“与司空刘琨俱为司州主薄，情好绸缪，共被同寝。中夜闻荒鸡鸣，琨觉日：此非恶声也。”因起舞。”祖邀和刘琨年轻时都有大志，互相勉励振作，因此听到鸡鸣就起床舞剑。后以“闻鸡起舞”比喻有志之士奋起行动。"}],"authors":["毛泽东"],"dates":[{"year":1965}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":280,"page_end":280},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"67d4cd1df1"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
