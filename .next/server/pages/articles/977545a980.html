script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"上海警备区某团党委成员把学习和应用结合起来带头破除资产阶级法权观念","authors":["尚劲文","郑轩","魏继红"],"dates":[{"year":1975,"month":5,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　上海警备区某团党委成员认真学习无产阶级专政的理论，联系实际，注重运用，努力从理论和实践的结合上弄清楚对资产阶级专政的问题，带头限制资产阶级法权。"},{"type":"paragraph","text":"这个团党委的同志通过学习马克思主义关于无产阶级专政的论述，认识到当前资产阶级法权不仅在所有制方面没有完全取消，在分配方面占着统治地位，而且，在人与人的相互关系方面还严重地存在，如果处理得不好，新的日益发展着的革命同志关系还有可能被资本主义社会“赤裸裸的利害关系”所代替，成为破坏和瓦解社会主义所有制的消极因素。因此，积极限制资产阶级法权，正确处理好人与人之间的相互关系，就成为无产阶级专政下继续革命的一个重要课题。团党委在调查中了解到以往有这样一种情况:机关食堂的同志看到团的领导干部工作比较辛苦，他们从关心首长出发，对领导同志买菜买饭比较照顾。一些团领导对这样做也心安理得，习以为常。通过学习，他们警觉到，团领导和机关其他同志在买饭买菜上的不一样，是资产阶级作风和特权思想的表现，容易使领导脱离群众。他们说，叛徒、卖国贼林彪正是妄图扩大资产阶级法权，阴谋“诱:以官，禄，德”，来腐蚀革命队伍，颠覆无产阶级专政，复辟资本主义。我们必须把特权思想提到路线高度来认识和批判。现在，这个团党委成员自觉破除特权思想，在吃饭时自觉和机关干部一起排队买饭、同桌共餐；机关放电影时，他们不让专门给摆椅子、留位置；节日期间主动到伙房帮厨，或到附近连队和分散点看望战士。这些做法，有效地纠正了一些脱离群众，生活特殊等不正之风。有个团领导说:“一个领导干部，手中都有一定的权力，但我们的权力是党和人民给的，只能用于维护革命利益，巩固无产阶级专政，而不能利用职权搞特殊化，扩大资产阶级法权。”"},{"type":"paragraph","text":"通过学习，这个团党委成员提高了继续革命的觉悟，努力用实际行动带头限制资产阶级法权，做到思想上不特殊，作风上密切联系群众，生活上保持普通一兵的本色。今年，这个团有五名领导同志的子女在中学毕业了。他们在子女分配问题上，不利用职权托熟人“开后门”，并教育子女到党最需要的地方去。副团长张凤玉的大儿子已务农两年了，这次他的女儿分配时开始被学校推荐参军，审查后，条件也都符合，但由于名额限制，没被录取，后来被分配到饮食服务行业。他女儿认为做大饼油条低人一等，没出息，不愿去。张副团长开始只是要她服从组织分配。后来学习了无产阶级专政的理论，张副团长进一步认识到，光有服从地方决定的思想是不够的，一个共产党员尤其是一名领导干部，应该做限制资产阶级法权、缩小三大差别的带头人。当工人、农民、服务人员，这只是社会分工的不同，没有高低贵贱之分。女儿对社会分工缺乏正确的认识，做父母的应该帮助她提高认识。于是，他和爱人一起对女儿进行了教育，从爱人在旧社会逃荒要饭的苦难史，讲到今天的幸福生活；从正确看待社会分工，讲到缩小三大差别的伟大意义；从领导干部带头限制资产阶级法权，讲到巩固无产阶级专政的大事，使女儿提高了思想认识，愉快地走上了工作岗位。"},{"type":"paragraph","text":"(郑轩、魏继红、尚劲文)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"name":"限制资产阶级法权","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"977545a980"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
