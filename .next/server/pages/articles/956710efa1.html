script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"资产阶级的猖狂进攻不能再容忍了","authors":[],"dates":[{"year":1952,"month":3,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"讨论提纲:"},{"type":"paragraph","text":"㈠为什么资产阶级的猖狂进攻不打退，我们的建设事业就有被破坏的危险、我们的领导权就有被篡夺的危险、我们国家建设的方向就有被引向资本主义的危险?"},{"type":"paragraph","text":"(二)资产阶级怎样向农民进攻?怎样向政权机关进攻?"},{"type":"paragraph","text":"(三)上海的五反运动还没有正式展开为什么一些不法资本家却误认为已经过去了?他们是怎样曲解政策的?"},{"type":"paragraph","text":"(四)上海的五反运动为什么比各地推迟了?"},{"type":"paragraph","text":"参考材料:"},{"type":"paragraph","text":"㈠解放日报社论‘驳上海资产阶级的某些谬论’(三月二十一日本报第一版)"},{"type":"paragraph","text":"㈡徐锁成:不能再容忍上海资产阶级的猖狂进攻(三月二十二日第一版)"},{"type":"paragraph","text":"㈢王昊天:资产阶级猖狂进攻的又一证据(三月二十一日第二版)"},{"type":"paragraph","text":"(四)资产阶级是这样向人民司法机关进攻的(三月二十三日第二版)"},{"type":"paragraph","text":"(五)南京不法资本家劫掠郊区农民(三月二十二日第一版)"},{"type":"paragraph","text":"关于美国强盗的细菌战讨论提纲:"},{"type":"paragraph","text":"(一)国际民主法律协会调查团是怎样组织起来的?他们的工作具有什么意义?他们到那些地方去调查，这些调查有什么重大意义?"},{"type":"paragraph","text":"(二)美帝国主义最近继续在什么地方撒布细菌毒虫，这说明了什么事实?"},{"type":"paragraph","text":"(三)美帝国主义进行细菌战之后，已遭遇到世界上那些国家的人民愤怒抗议和谴责?"},{"type":"paragraph","text":"(四)为什么必须人人都来参加爱国的卫生防疫运动?"},{"type":"paragraph","text":"参考材料:"},{"type":"paragraph","text":"(一)关于国际民主法律协会调查团的新闻(三月十九、廿三日第一版)"},{"type":"paragraph","text":"(二)金日成将军痛斥美帝罪恶暴行(三月廿一日第一版)"},{"type":"paragraph","text":"(三)美国强盗继续狂撒细菌毒虫的新闻(三月廿一日第一版)"},{"type":"paragraph","text":"(四)马立克在联合国裁军委员会上提出严正建议要求研究关于制止进行细菌战问题(三月二十三日第一版)"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"956710efa1"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
