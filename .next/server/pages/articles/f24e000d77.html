" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji31","name":"毛泽东全集第31卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji31.pdf"],"article":{"title":"中央转发武汉市委关于开展三反斗争报告的批语","alias":"","parts":[{"type":"paragraph","text":"中央转发武汉市委关于开展三反斗争报告\"的批语"},{"type":"paragraph","text":"（1951年12月22日）各中央局，并转分局、省市区党委："},{"type":"paragraph","text":"继北京市委之后，在大城市中，武汉市委已经发动了一个大张旗鼓的、雷厉风行的、吸引广大群众参加的反贪污反浪费反官僚主义的伟大斗争。他们做得很勇敢，公开揭露和惩处了一批敢于压制"},{"type":"paragraph","text":"[1]指中共武汉市委1951年12月19日关于开展三反运动给中南局并转中央的报告。报告指出，官僚主义是贪污浪费的掩护物。它最突出的表现是压制民主，压制批评，以封建秩序和恶霸作风来对待群众。这是武汉一个特别突出的问题。在三反斗争中，为了发动群众，必须充分发扬民主，必须批判和处罚那些胆敢压制民主，打击群众批评，违反纪律的分子。并且必须从市委和市府做起，首上而下，进行老老实实的自我批评，打破一切不必要的顾虑，放下装腔作势的架子，倾听群众的批评和意见。关于运动开展的步骤，报告说，在12月内，作重新酝酿，学习文件，作动员报告，处理若干突出事件，组织一次大的公审会，1952年1月初开始发动广泛的检举和坦白运动，为第一步。然后，着重分析处理，为第二步。最后着重总结工作、健全制度，精简机构与调整干部，为第三步。预计1952年3月底可完成。报告还提出，与群众斗争相结合，拟组织三种检查组。一是由各级首长负责，吸收若干人员参加的普遍检查。二是纪律检查委员会、人民监察委员会、检察署与法院的重点检查。三是下级对上级的检查。第三种检查人员拟由机关的工作人员或代表会议推选。毛泽东全集第三十一卷群众批评的担负重要职位的干部。他们所定的方针、步骤和办法都很适当。中央希望天津、济南、青岛、上海、南京、杭州、南昌、广州、长沙、重庆、成都、昆明、西安、太原及其他大城市，一律发动这样一个斗争，希望这些大城市的市委都有武汉市委这样勇敢和有步骤有办法，都向中央写一个有分析有内容的报告。请将武汉市委的报告在党内刊物上发表。"},{"type":"paragraph","text":"中央十二月二十二日"}],"authors":["毛泽东"],"dates":[{"year":1951,"month":12,"day":22}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":174,"page_end":175},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]},{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中央转发武汉市委关于开展三反斗争报告的批语","authors":["毛泽东"],"dates":[{"year":1951,"month":12,"day":22}],"is_range_date":false,"parts":[{"text":"中央转发武汉市委关于开展三反斗争报告的批语","type":"title"},{"text":"毛泽东","type":"authors"},{"text":"各中央局，并转分局、省市区党委：","type":"appellation"},{"text":"继北京市委之后，在大城市中，武汉市委已经发动了一个大张旗鼓的、雷厉风行的、吸引广大群众参加的反贪污反浪费反官僚主义的伟大斗争。他们做得很勇敢，公开揭露和惩处了一批敢于压制群众批评的担负重要职位的干部。他们所定的方针、步骤和办法都很适当。中央希望天津、济南、青岛、上海、南京、杭州、南昌、广州、长沙、重庆、成都、昆明、西安、太原、及其他大城市，一律发动这样一个斗争，希望这些大城市的市委都有武汉市委这样勇敢和有步骤有办法，都向中央写一个有分析有内容的报告。请将武汉市委的报告在党内刊物上发表。","type":"paragraph"},{"text":" 中央十二月二十二日","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f24e000d77"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
