" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共北京师大委员会关于张荣生右派问题的复审意见","authors":["(张荣生)"],"dates":[{"year":1979,"month":2,"day":22}],"is_range_date":false,"parts":[{"text":"中共北京师大委员会关于张荣生右派问题的复审意见","type":"title"},{"text":"(张荣生)","type":"authors"},{"text":"张荣生，男，47岁，江西新余人，家庭出身牧师兼医生，本人成分学生原中文系学生，1957年划为右派分子，受开除团籍和分配工作考察一年的处分，1962年摘掉右派分子帽子，现在黑龙江省绥化教革办进修组工作。","type":"paragraph"},{"text":"张荣生被划为右派的主要依据及复审意见：","type":"appellation"},{"text":"1.张在5月25日班里的座谈会上发言说：肃反“师大党委不从实际出发，不调查研究，主观臆想出强大的敌人，结果变成一出滑稽戏，真有点象堂·吉诃德式的”还说“肃反基本上是不健康的，而且犯了很大错误，要中央答复”等等。关于这些话，对肃反运动的估计，存在有根本性的错误。张荣生之所以产生这些错误想法，是因为他受苏共二十大批评斯大林肃反扩大化思潮的影响，看到师大肃反中的问题，进而推想到其他单位及全国。但这属于思想认识问题，不是恶意攻击党的肃反政策。","type":"paragraph"},{"text":"他还说“胡风是否反革命值得怀疑，事实上没有找出胡风和国民党的联系”。这话没有什么错误。","type":"paragraph"},{"text":"2.张在六月十七日的“火星报”上发表，“评以党代政”一文。该文是在党委委员方铭同志讲了帮助党整风也可以探讨一下社会主义制度某些环节上的问题之后写的。写完后，给党支部书记刘叔成同志看后发表。文中有些说法是有错误的。如“在我们国家里，不管是有意的，还是无意的，都存在着党即国家，国家即党的现象”。但这篇文章还不是反党反社会主义的。","type":"paragraph"},{"text":"3.有些错误认识系张本人交待，不能做为定案依据。","type":"paragraph"},{"text":"综上所述，张在一九五七年整风运动中的言论虽有错误，但还不是从根本立场上反党反社会主义，对原划为右派分子的结论，予以改正。撤销开除团籍处分，按超龄团员对待。撤销分配工作考察一年的处分。","type":"appellation"},{"text":" 中共北京师范大学中文系总支委员会公章1979年2月10 日","type":"paragraph"},{"text":" 同意复查报告中共北京师大委员会公章1979年2月22日","type":"paragraph"},{"text":"张荣生同志：","type":"paragraph"},{"text":"根据中央〈1978年〉五十五号文件精神。你一九五七年被划为右派分子的问题已经中共北京师大委员会一九七九年2月8日讨论，决定予以改正。撤销对你开除团籍的处分，按超龄团员处理。","type":"paragraph"},{"text":"关于对你的改正结论，已寄给你所在单位的党组织。你档案中有关右派的一切材料，根据规定撤除销毁。","type":"paragraph"},{"text":"希望你今后努力学习，为实现四个现代化贡献自己的力量。","type":"paragraph"},{"text":"此致","type":"paragraph"},{"text":"敬礼","type":"appellation"},{"text":"你的改正结论同时寄北京师大。","type":"paragraph"},{"text":" 贯彻五十五号文件给绥化县教育局办公室 公章一九七九年二月十二 日","type":"paragraph"}],"comments":[],"origin":"根据文件翻印件打印。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f3931cafaf"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
