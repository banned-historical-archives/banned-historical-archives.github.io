script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"在反右倾斗争中做一名尖兵","authors":[],"dates":[{"year":1959,"month":10,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"汪炎雄"},{"type":"paragraph","text":"(中共上海市虹口区委宣传部理论教育科科长):解放以前我是学习土木建筑的，由于革命工作的需要，在解放后不久才转到理论教育工作岗位上来。从学习自然科学到转为搞社会科学，从不懂马列主义为何物到热爱理论教育工作。边学习、边斗争，在学习、斗争中得到教育和锻炼，使我深切地感受到马克思列宁主义对于我国社会主义革命与社会主义建设实践的巨大的指导意义。从而也使我更懂得了作为一个理论战线上的战士是极其光荣与艰巨的。"},{"type":"paragraph","text":"但是，这个转变并不是那么容易的，在上海解放那念，我在学校里只差半年就要毕业了。原来想得很幼稚:既然祖国解放了，那么就可以以自己的技术贡献于祖国的建设。因此，在刚转到理论教育岗位上来的时候，还念念不忘原来学到的东西，甚至拿了仅有的一点供给费去买建筑方面的书籍来看。可是在接触了马列主义书籍以后，特别是细细阅读了毛主席的著作以后，才开始懂得了革命理论对于革命实践的指导意义，中国革命的胜利就是马列主义与中国实际情况相结合的产物，我们工人阶级本身也是在马列主义指导下由自在的阶级变为自为的阶级的。由此开始发生了兴趣，拿了供给费不买自然科学书籍，而买马列主义、社会科学等书籍。可是那时还有一个很大的毛病，就是仅仅把马列主义作为一种知识来追求，以后参加了不少实际斗争，边学习、边斗争，才开始懂得了“马列主义不是教条，而是行动的指南”这句至理名言。体会到社会主义革命与社会主义建设所取得的每一个重大成就都是同一切敌对势力和非无产阶级思想作斗争中得到的。掌握了马列主义理论是社会主义革命和社会主义建设赖以取得胜利的必要保证。从那个时候开始，我才真正热爱了理论教育工作，树立了终身做一个理论战线上的突击手。"},{"type":"paragraph","text":"保卫总路线、大跃进和人民公社，彻底粉碎右倾机会主义者对党和社会主义事业的猖狂进攻已成为我们党和全国人民极其重要的战斗任务，在庆祝我们社会主义祖国建国十周年之时，作为一个理论工作者，我决心紧密团结在党中央和毛主席的周围，在保卫总路线、反对右倾机会主义的斗争中做一个名符其实的尖兵。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"054438439a"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
