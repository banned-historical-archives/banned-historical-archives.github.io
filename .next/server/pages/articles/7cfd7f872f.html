<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共中央转发中南局关于减租、架通电话等工作的指示","authors":[],"dates":[{"year":1950,"month":5,"day":21}],"is_range_date":false,"parts":[{"text":"中共中央转发中南局关于减租、架通电话等工作的指示","type":"title"},{"text":"华东局、西南局、西北局：","type":"appellation"},{"text":"我们同意中南局下列指示，请你们酌量采行。","type":"paragraph"},{"text":" 中  央五月二十一日","type":"paragraph"},{"text":"各省委区党委、分局并报中央：","type":"paragraph"},{"text":"兹将中央关于湖南减租问题指示转发你们，在鄂、赣、粤、桂四省也可同样适用。根据中央前后几次指示，在生产季节随地可以部分地进行减租工作，但不论何地皆应将生产任务放在第一位，一切工作必须服从生产利益，而不应有所妨害。在生产季节所必须组织进行的插秧耕田加耕、兴修水利、特种作物增产等，各地皆应具体地加以布置，并且要加强检查，责成各地切实作出成绩。业已减租地区，即应将全部精力集中于这些任务。同时在总结减租斗争中，教育农民，整理农会，巩固农民内部团结，打击地主反攻，巩固与扩大减租战果，为今冬贯彻减租或分田做必要准备。在未进行减租或减租未完成地区仍须贯彻减租，但必须严守十大政策的规定，在方式上要研究一套不妨害生产的办法。凡群众不乐意参加的会议，就不必勉强他们参加。凡事都要与群众商量，得到多数人赞成，才去进行工作。干部不应独断专行，对地主阶级必须分别对待，讲情讲理，拉多打少，缓和一下过分紧张的阶级关系，减少震动。其确实无粮可退之地主，则可打欠条，到秋后补退。对与我合作之民主人士必须多予照顾，以示区别，不要不讲策略，黑白不分。中央指示要领导机关密切掌握领导，强调架通电话一事，极其重要。在前一段工作中各省业已开始采用，但还没有普遍采用，架通电话可以将司令部的指挥效能提高几倍、几十倍，将前线作战部队的行动的统一性提高几倍、几十倍。我们要求各省在八月份以前，尽可能将基本区由省到区的电话沟通，并要拟出一个通话办法，有专人负责（各省、各地委可责成研究室专司其事），并于现在起即认真使用起来。本年八月底以前，每县并应设立一收音站，每日抄收中南台和各省台发布的政令和重要新闻，经过油印报、黑板报等形式迅速传播到群众中去，这也是传达政令掌握运动的很重要一个工具。使用这两项工具所需经费一般可由地方粮款内开支（数目要上报，收音机经费一半可由中南区广播事业费开支）。如仍感困难时，可做来预算，在中南范围可以解决时，我们当尽力。我们不可能时呈报中央解决，总之此事是非办不可的。","type":"paragraph"},{"text":" 中南局五月十九日","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7cfd7f872f"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
