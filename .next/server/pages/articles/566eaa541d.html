<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"工人同志的一席话，深深教育了第二医学院儿科系一九六七届毕业班的同学，使他们克服了资产阶级派性，达成了协议——毕业分配领导小组成立了","authors":[],"dates":[{"year":1968,"month":9,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"八月三十日晚上十点钟，第二医学院校园里响起了一阵阵锣鼓声、欢呼声。儿科系六七届毕业班的两派头头手拉着手，敲锣打鼓到工人毛泽东思想宣传队和军训团团部报喜来了。在工人同志和解放军同志的教育帮助下，二医的一个“老大难”问题——儿科系六七届毕业班分配领导班子组成了!"},{"type":"paragraph","text":"这个毕业班两派头头，从七月十日就开始“会谈”成立毕业生分配领导班子问题。一派要这个干部参加，另一派要那个教师参加，你一派要的，我一派就拒绝；我一派要的，你一派就反对。两个月中会谈五、六次，每次吵得面红耳赤，不欢而散。院毕业分配领导小组负责同志分别找两派头头“背靠背”协商，也无结果。"},{"type":"paragraph","text":"工人毛泽东思想宣传队和军训团进驻二医以后，立即领导两派同学办起了抗大式的毛泽东思想学习班，和他们一起学习毛主席的最新指示，一起忆苦思甜，进行阶级教育。工人同志还语重心长地对两派头头说:“毛主席教导我们:‘一切小道理都归大道理管着。’你们当头头的要想一想，两年前，你们学生自己有权搞毕业生分配工作吗?这个权是谁给你们的?是毛主席给的!工人、贫下中农把你们养大，现在农村缺医少药，等待你们去为他们服务，给他们治病，你们想想还吵得下去吗?!”"},{"type":"paragraph","text":"工人同志一席话，使同学们受到了深刻的教育。有的头头说:“过去总以为我是群众推选出来的，要代表群众的利益，其实这是小山头的利益，是‘私’字作怪!工人阶级才真正是大公无私，代表广大革命人民的根本利益。当前迅速落实毛主席的最新指示，紧跟毛主席的伟大战略部署，到边疆去!到农村去!到工矿去!到基层去!为工人、为贫下中农、为解放军战士服务，走同工农兵相结合的道路，这才符合工人阶级的根本利益，这才是最大的原则。”还有的头头说:“广大同学要革命，要前进，要听毛主席的话，贯彻‘四个面向’，我们要对一百三十九个同学负责，不能再无原则地争吵下去了!”"},{"type":"paragraph","text":"在工人毛泽东思想宣传队的领导下，经过短短两个半天的学习和讨论，两派头头迅速达成协议，儿科系六七届毕业生分配领导小组胜利成立了。同学们异口同声地说:“毕业生分配领导小组的成立，使我们深深体会到教育革命没有工人阶级的领导，就是不行。我们一定要好好向工人阶级学习!”"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"教育革命","type":"主题/事件"},{"name":"派性","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"566eaa541d"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
