script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"坚持活学活用毛泽东思想　深入开展革命大批判上海机电工业取得革命生产双胜利超额完成了上半年生产计划，总产值比去年同期增长百分之十二","authors":[],"dates":[{"year":1970,"month":7,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　上海机电工业系统的广大工人、干部和技术人员跨进伟大的七十年代以来，坚持活学活用毛泽东思想，以阶级斗争为纲，狠抓经济领域两条路线斗争，深入开展革命大批判，大搞产品革命和技术革新，取得了革命、生产双胜利，超额完成了上半年生产计划，工业总产值比去年同期增长百分之十二。"},{"type":"paragraph","text":"造船工业一马当先，进一步揭开了经济领域阶级斗争的盖子。路线斗争一抓就灵，整个机电行业立刻出现了一个万马奔腾的局面，群众性的革命大批判在机床、电机、重型机械、汽车拖拉机、电器等各个行业蓬勃开展。机电工人奋起毛泽东思想的千钧棒，联系厂里、车间里生产领域中两条路线斗争的实际，狠批刘少奇的“爬行主义”、“洋奴哲学”、“专家路线”等黑货，大力贯彻毛主席的“独立自主、自力更生”方针，掀起了一个产品革命和工艺革命的群众运动，各行各业都创造了许多精、小、简、廉的自行设计的新产品。上海开关厂、上海阀门厂、上海阀门一厂、上海直流电机厂、上海起重运输机械厂、上海机床电器厂、上海第九机床厂等许多工厂，发动群众大搞产品革命，取得了重大成就。目前，各行各业产品革命已经从单个产品的局部改革，发展到对整个系列产品的改革。上海机电工人坚决遵循伟大领袖毛主席的“打破洋框框，走自己工业发展道路”的教导，创造出中国式的机电产品，彻底改变机电行业的生产面貌。"},{"type":"paragraph","text":"革命的大批判也推动了工艺革命和技术革新。上海船厂小船台造出万吨巨轮的先进事迹，大大激发了机电工人“自力更生”、“艰苦奋斗”的雄心壮志，他们把“洋奴哲学”、“爬行主义”一脚踩在地下，土办法大显威风，“蚂蚁啃骨头”发挥巨大威力。上海重型机器厂、沪江机械厂、建设机器厂、第三焊接厂等许多工厂大搞土设备，使生产能力成倍增长。上海裸铜线厂经过几个月奋战，土法上马，试制成功多模高速拉丝机，体积比原来的拉丝机缩小两倍，效率提高四倍。标准件行业的少切削、无切削新工艺也大量涌现。"},{"type":"paragraph","text":"机电工业系统在深入开展经济领域两条路线斗争中，还上挂下联，批判了“消极平衡论”、“见物不见人”思想和各种右倾保守思想以及畏难松劲情绪，不断扫清前进道路上的障碍，使抓革命、促生产的群众运动深入持久地向前发展。"},{"type":"paragraph","text":"(市机电一局革委会生产组供稿)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"defc45a543"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
