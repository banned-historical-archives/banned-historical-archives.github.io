script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"自觉抵制资产阶级腐朽思想侵蚀  广州部队某部二连身居特区口岸一尘不染","authors":["郑国联"],"dates":[{"year":1982,"month":3,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"自觉抵制资产阶级腐朽思想侵蚀"},{"type":"paragraph","text":"广州部队某部二连身居特区口岸一尘不染"},{"type":"paragraph","text":"新华社广州电  新华社记者郑国联报道：驻守在广东省珠海特区的广州部队某部二连，自觉抵制资产阶级思想侵蚀，身居口岸，一尘不染。广州部队于2月27日发布命令，授予他们以“口岸执勤好二连”的荣誉称号。"},{"type":"paragraph","text":"二连长年在与澳门水陆相连的拱北口岸担负执勤任务。珠海市成立经济特区以后，营房周围常有走私物品摆卖，一些不法分子为了走私贩私、偷渡外逃，常常给站岗执勤的战士送来“买路钱”，甚至施展女色。面对资产阶级思想的侵蚀，干部战士们忠于职守，立场坚定，见财不贪，表现了无产阶级革命战士的高贵品质。一天夜里，一个走私分子看到战士冯金洁一个人在站岗，就从口袋里掏出大把的港币、人民币和一块手表塞到他手里，说：只要你装作没看见，事后再给好处。冯金洁怒不可遏，当即将他扭送公安部门。战士李耀章上街买东西，一个穿着西装的中年男子拍拍他的肩膀，花言巧语要和他拉关系。这个人说：“我有一个内弟想到澳门，你站哨时抬抬手，给你1，200元报酬，怎么样？”李耀章说：“革命战士不能放弃原则，你不用在我们身上打主意！”战士姜进梅上哨时看见路旁围着一大堆人。他走上前去，一个贩私分子赶快站起来，拿出6条尼龙裤和10双袜子，说，解放军同志，小意思，拿去穿吧。姜进梅不仅不接受东西，而且立即把他送到当地派出所。"},{"type":"paragraph","text":"二连在边防执勤一年期间，先后遇到20多起金钱物资贿赂，5起女色引诱，都被干部战士顶了回去。"},{"type":"paragraph","text":"他们经受了考验，胜利完成了边防执勤任务。全连7名干部都做到身在特区不谋私利，没有利用方便买过一件走私物品。战士们自己不买私货，亲友寄钱托买走私货的，也都把钱退寄回去。他们还把在边防执勤中收缴和拣到的500多件自行车、手表、衣服、布料等各种物资和大量的钱钞，全部上交或还给失主。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7096c0ddd7"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
