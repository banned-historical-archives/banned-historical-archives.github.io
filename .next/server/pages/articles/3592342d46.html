script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"奴隶的今天","authors":["俄木家加"],"dates":[{"year":1965,"month":8,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"奴隶的今天"},{"type":"paragraph","text":"中央民族学院政治系毕业生　俄木家加"},{"type":"paragraph","text":"我是四川凉山彝族人，解放以前，是一个被人看不起的奴隶。今天，在党的辛勤培养下，成了大学生。在毕业前夕，我想想过去，看看今天，深深感到，没有党就没有我。"},{"type":"paragraph","text":"解放前，在奴隶社会的压迫下，我父亲早就死去了。扔下母亲和我们四兄弟。黑心的奴隶主曲别家要把我们拆散卖掉，这样，逼得我们无法生活下去，就从马边县逃到雷波县。但是到了雷波县后，我们又落入另一个奴隶主额乍点火手里。不久，母亲被迫改嫁了，大哥、二哥也被迫分到其他奴隶主家里去了。我八岁时，就过着奴隶生活了。"},{"type":"paragraph","text":"我在奴隶主俄木苏尼家，成天砍柴、背水、推磨和做种地等各种力所不及的体力劳动。我记得，有一次，俄木苏尼叫我去给他排水，因为水不好排，稍回来迟了一点，俄木苏尼就破口大骂，接着踢了我一顿。在奴隶制度下，奴隶只不过是主人的会说话的工具，奴隶主想骂就骂，想打就打，奴隶的苦处向谁去诉呢？"},{"type":"paragraph","text":"一九五一年，党把我送进了民族小学。我赤裸裸的身上开始穿上了布衣服，盖上了被子。一九五五年又把我送到专署乐山县学习，在初中学习时，我在组织的教育培养下，加入了青年团。我原来以为上了初中，就是我幸福的顶点了，万万没想到，党又把我送到北京来学习。"},{"type":"paragraph","text":"一九五八年秋，我来到了中央民族学院预科学习。由于原来基础差，学习上遇到很多困难。当组织上知道后，不仅立即指定一个老师辅导我，并且教育和鼓励我说：“你是受了奴隶群众的委托来学习的，不要忘记过去，多读毛主席的书，你就会战胜困难的。”这给了我很大的力量，自己下定了决心，突破学习上的难关。在二年级时，我已克服了学习上的困难，获得了良好的成绩，被评为优秀团员；一九五九年，我加入了中国共产党，一九六一年，我被党保送到政治系本科学习。"},{"type":"paragraph","text":"在大学生活过程中，学习了马列主义，特别是毛泽东思想的学习，使我不仅懂得了中国革命，而且还懂得了世界革命的道理，提高了政治觉悟，坚定了阶级立场，初步地受到了革命的锻炼。"},{"type":"paragraph","text":"从我自己成长的过程中，我深深地体会到，中国共产党是光荣的、伟大的、正确的党，毛主席是各族人民伟大的救星，没有党和毛主席就不会有我的今天。因此，我是属于党的，我永远听党的话，我将牢牢地记住阶级和阶级斗争，我一定不辜负党的培养，做一个可靠的又红又专的无产阶级革命事业的接班人。"},{"type":"paragraph","text":"亲爱的党，在这即将走上工作岗位的前夕，我向您保证：坚决服从组织分配，党的需要就是我的志愿，党指向哪里，我就奔向那里，并且在那里生根、发芽、开花、结果。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3592342d46"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
