<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"不能说有过剥削就认为有“封建根”","authors":["李少甫"],"dates":[{"year":1948,"month":8,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"不能说有过剥削就认为有“封建根”"},{"type":"paragraph","text":"编辑同志："},{"type":"paragraph","text":"我有几个疑难问题，希答复："},{"type":"paragraph","text":"一、什么样的是富裕中农，他是革命的对象还是革命的同盟军？如事变前十年是富农，但经过激烈的变动（破产）后，又在共产党政策扶植下起来上升为中农，这样的人划成份是否还有封建根？"},{"type":"paragraph","text":"以前是富农，有地五六十亩，长年雇工，一九三○年前开始下降，至事变时仅剩下不足二十亩地（十七口人），欠债千元以上，好久即不剥削人了。一九三九年分家时，每家只分三升麸子和五六亩地，经共产党的政策（减租减息，当地赎回），和劳动节约（当二年劳动英雄，给人做活两天冬），生活又上升（相当中农），这样的家庭应如何确定成份。"},{"type":"paragraph","text":"二、因参加革命，家里无劳动力（事变时四人参军，只剩孤寡老幼），如在三七年雇工一个，这种剥削能算为划成份的标准否？"},{"type":"paragraph","text":"三、工商业、中农户，错斗了要坚决退回，如革命战士也被变象的清算了应该如何处理？"},{"type":"paragraph","text":"李少甫"},{"type":"paragraph","text":"答：一、富裕中农是中农的一部分，其生活较好于普通中农，一般对别人有轻微的剥削（不超过全家一年总收入的百分之二十五）。中农（包括富裕中农在内）是革命的永久同盟者；从中农层中划出富裕中农，是为了保护中农，不致因其有轻微剥削而被划成富农来侵犯，因此把富裕中农当成革命对象是错误的。你所提该户富农一九三○年即下降，后又生活上升为中农，即应以中农论。事变前即下降者，不能因有过剥削就说有“封建根”。硬找“封建根”的办法，是有意提高一部分人的成份，与只按占有关系定成份的原则不合。如果上升后占有较多较好的土地，占有耕畜、农具及其他生产资料，自己参加农业劳动，但经常依靠资本主义方法剥削雇工或其他资本主义剥削的收入，作为其生活来源的主要或重要部分并连续三年者，是新式富农。否则该是中农仍订为中农。"},{"type":"paragraph","text":"二、因参加革命工作，家中无劳力而雇工者，划成份时不得按剥削计算。"},{"type":"paragraph","text":"三、革命战士家庭被没收问题，如系错斗工商业与中农，亦应依法退回或补偿。如真是地主或富农成份，依法清算或征收其封建剥削部分是应该的，不能因是革命战士而不清算。"},{"type":"paragraph","text":"——编者"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"056bfcb469"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
