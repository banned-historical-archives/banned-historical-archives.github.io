script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"谢胡向人民议会作施政纲领报告  阿尔巴尼亚经济建设成就辉煌  并表示要同南共修正主义作坚决斗争","authors":[],"dates":[{"year":1958,"month":6,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"谢胡向人民议会作施政纲领报告"},{"type":"paragraph","text":"阿尔巴尼亚经济建设成就辉煌"},{"type":"paragraph","text":"并表示要同南共修正主义作坚决斗争"},{"type":"paragraph","text":"本报综合报道  据新华社讯：新选出的阿尔巴尼亚第四届人民议会第一次会议于21日到22日在地拉那举行。在21日上午的会议上，议员科·塔希科作了新人民议会选举结果的报告。下午的会议上，选举了米·什图拉为人民议会主席，费·谢胡和列·戈加为副主席。会议并一致接受了劳动党第一书记霍查推荐穆·谢胡再次组织政府的建议。"},{"type":"paragraph","text":"在22日的会议上，部长会议主席谢胡作了关于施政纲领的报告，他的报告得到全体议员的赞同。"},{"type":"paragraph","text":"谢胡在报告中首先谈到阿尔巴尼亚人民在建设社会主义中取得的成就。他说，阿尔巴尼亚的工业生产已经比战前增长了十四点六倍，而在农业方面，目前全国共有一千九百二十六个农业合作社。谢胡说，阿尔巴尼亚的社会主义已经不仅表现在政权方面，表现在平原地区，而且社会主义已经上山了。"},{"type":"paragraph","text":"谢胡说，到目前为止，全国人口已经增长到了一百五十万。"},{"type":"paragraph","text":"谢胡还说，最近，阿尔巴尼亚在苏联的帮助下制定了1961—1967年发展国民经济远景计划，按照这个计划，工业生产到1962年将比1958年增长51％，农业生产将增长42％。"},{"type":"paragraph","text":"谢胡在报告中严正地批判了现代修正主义。他说：我们像过去一样，在任何情况下都毫不妥协地同修正主义和机会主义斗争到底。我们的党认为，反修正主义的斗争是维护我国人民自由和祖国主权的不可少的条件。因为如果同修正主义妥协，就意味着向修正主义敞开大门，就意味着走向资本主义和反对社会主义，就意味着像帝国主义和南斯拉夫修正主义者在1956年企图埋葬掉匈牙利那样的事情。"},{"type":"paragraph","text":"谢胡指出，以铁托为首的现代修正主义者坚决地走着反马克思列宁主义的道路，阿尔巴尼亚劳动党将同光荣的苏联共产党、同拥有一千二百万党员的中国共产党以及全世界各兄弟党在一起，同南斯拉夫的修正主义斗争到底。谢胡说，阿尔巴尼亚的外交政策过去和将来都是以同苏联的永恒的牢不可破的友谊为基础的。他表示欢迎和支持苏联政府的各项和平倡议以及中国人民志愿军主动撤出朝鲜的行动。"},{"type":"paragraph","text":"这次会议选举哈·列希为人民议会主席团主席，皮·皮里斯特里、穆·佩扎、亚·楚瓦尼为主席团副主席，萨·巴霍里为主席团秘书。阿尔巴尼亚劳动党领导人霍查、别利绍娃、努什等当选为议会主席团委员。"},{"type":"paragraph","text":"会议一致通过了谢胡提出的政府组成名单：斯·柯列加、贝·巴卢库、马·穆夫蒂乌为部长会议第一副主席，科·蒂奥多西、阿·凯列齐为副主席，外交部长是贝·什图拉，工业和矿业部长是阿·查尔查尼，农业部长是马·乔莫。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"谢胡","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ec405d7183"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
