script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"美国统治者鼓吹扩大侵略  剥削人民为华尔街牟利  真理报评美经济加紧军事化","authors":[],"dates":[{"year":1950,"month":8,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"美国统治者鼓吹扩大侵略"},{"type":"paragraph","text":"剥削人民为华尔街牟利"},{"type":"paragraph","text":"真理报评美经济加紧军事化"},{"type":"paragraph","text":"【新华社二十六日讯】塔斯社莫斯科二十四日讯：真理报记者拉萨丁和费利波夫写了一篇论文，题为“美国经济的加紧军事化”。作者写道：自从美帝国主义者在朝鲜发动侵略战争以来，为时未满两月，而美国政府就要求把已经过度膨胀了的军事预算再增加一百五十六亿美元。美国报纸还提到，国会显要人士预言将有更多的战争拨款。"},{"type":"paragraph","text":"美国国会已经在急急忙忙地考虑杜鲁门要求增税五十亿元的建议。杜鲁门的这个建议获得国会民主党与共和党议员的充分支持。"},{"type":"paragraph","text":"全部税款都要由美国广大劳动人民群众来担负。"},{"type":"paragraph","text":"为数已经微不足道的教育与卫生经费以及其他与战争准备没有直接关系的费用，还要进一步削减。"},{"type":"paragraph","text":"作者继续写道：朝鲜战争已经使美国工人生活水准大大降低和进一步贫困化。食物、衣服、鞋子以及其他消费品的价格均已上涨。同时，垄断资本家则获得巨额利润。履行政府战争定货的最大垄断企业所得的利润，增加得特别多。与战争物资生产有关的公司的股票价格继续上升。所以，无怪乎美国统治集团奉行华尔街的意志，反对苏联在安理会提出的关于和平解决朝鲜问题的建议，并鼓吹进一步扩大侵略。"},{"type":"paragraph","text":"逐日加紧的以牺牲美国人民来实现的美国经济的军事化，说明美国统治阶级在经济与政治方面，正步着法西斯的后尘。希特勒的老口号“大炮代替奶油”，现在已是他们的格言。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"朝鲜战争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a7fd97880a"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
