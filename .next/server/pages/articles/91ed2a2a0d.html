<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"他教育俺们坚持走毛主席指出的道路","authors":["王发祥"],"dates":[{"year":1966,"month":2,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"他教育俺们坚持走毛主席指出的道路"},{"type":"paragraph","text":"兰考县红庙公社双杨树大队党支部书记　王发祥"},{"type":"paragraph","text":"双杨树大队，一九六一年以后，连续遭受了几年的自然灾害，特别是一九六三年农作物基本绝收，全大队农业生产下降到历史上最低水平。加上牲口少，农具缺，困难重重。这年秋天，到了种麦季节，因为牲口少，地犁不过来，犁起来又没有种子，眼看生产要受损失。就在这个关头，党支部带着这个困难问题认真学习了毛主席著作，在毛主席著作里找到了一条依靠集体经济力量，依靠贫农下中农，战胜困难，由穷变富的康庄大道。道路明确了，信心也高了。接着党支部又提出“有了困难是依靠国家救济还是依靠集体”问题，发动大家讨论，不少贫农下中农都说：咱们对国家没啥贡献，就够难过了，决不能再拉国家的后腿。没牲口咱有的是人，可以组织人力拉犁拉耧种麦。为解决生产资金不足问题，全大队自筹资金加上物资折款共有一千八百多元。第三生产队贫农社员程景伦说：“虽然我只有二十块钱，也要借给队里先解决队里的困难，这是我对集体的一片心意。”第三队有四户贫农将储备的七百斤麦子，投到队里解决缺种困难。因为依靠集体，依靠贫农下中农，困难问题很快得到解决。全队买了七头牲口，又自筹了一千五百多斤种子，畜力加人力，很快完成了种麦任务，取得了抗灾斗争的胜利。焦裕禄同志说，俺们按着毛主席指出的道路走，走得对，到处宣传“双杨树的道路”。"},{"type":"paragraph","text":"自从“双杨树道路”出名以后，焦裕禄同志曾几次来到俺们大队，教育我们要坚持将这条道路走下去。我们在各项工作中都是沿着这条社会主义大路前进的。"},{"type":"paragraph","text":"一九六四年春，我们在开展副业生产活动中，出现了两条道路的斗争，有的人想搞单干。为占领副业阵地，我们党支部发动大家讨论。广大贫农下中农说：“搞农业我们靠集体经济战胜了困难，搞副业也必须依靠集体，才能达到共同富裕。”通过讨论，使队里的副业生产纳入了集体轨道。但是搞副业，队里一时又没资金，怎么办？找贫农下中农出主意，想办法。贫农社员吴少扬说：“我自愿投到队里六十元。”在贫农下中农的带动下，很快掀起了投资搞副业的高潮。仅双杨树村五个生产队就投资一千一百四十元。集体副业很快搞起来了。五个月的时间，副业收入四千多元，归还了社员们的投资，又买了两辆胶轮马车，还给社员买来粮食两千斤。"},{"type":"paragraph","text":"一九六五年麦收后，一连五十天没有下雨，在抗旱抢种晚秋作物的活动中，各队都出现了缺红薯苗的问题，全大队缺苗二百多亩。面对着这个问题，我们仍然采取了依靠集体，依靠贫农下中农想法解决。贫农下中农纷纷表示宁愿自留地的红薯不栽，也要保证集体的红薯先种上。贫农社员吴春扬说：“大河没水小河干，我自留地的红薯不栽了。”说罢就回家动员老少把自己的一万九千棵红薯苗全部投到队里。在党、团干部和贫农下中农的带动下，全大队社员共投红薯苗七万九千多棵，从而解决了缺苗问题，适时完成了红薯的栽种任务，秋季获得了好收成。同时，社员自留地的红薯也都用队里的和个人的二茬秧子栽上了。"},{"type":"paragraph","text":"几年来，我们沿着这条道路，战胜了灾害，发展了生产。"},{"type":"paragraph","text":"正当我们贯彻县委四级干部会议精神，组织农业生产高潮时，我们又学习了焦裕禄同志的英雄事迹，受到了很大的激励。虽然现在我们已由缺粮队变为余粮队了，我们还要大干一场，搞好旱涝保收的稳产高产农田，在社会主义的大道上奋勇前进！"},{"type":"paragraph","text":"（新华社郑州二十二日电）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"91ed2a2a0d"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
