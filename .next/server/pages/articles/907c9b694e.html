script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"和平的使者　人类的希望卫星像磁石般吸引着人心“实力”政策遭到致命一击　美资产阶级报刊含血喷人","authors":[],"dates":[{"year":1957,"month":11,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社莫斯科23日电】　近年来，世界上没有一件事能像苏联发射人造卫星这样引起了公众如此巨大和普遍的兴趣。人们转着地球仪在寻找苏联人造卫星的行踪，各地书店大量发行着有关星际飞行、天文知识和通俗科学技术的书籍，报纸杂志、广播评论员的广播、政治活动家的言论都离不了苏联的人造卫星，俄文“卫星”这个字已变成一种国际通用词汇了。甚至西方很多商人为了迎合顾客的兴趣大量制造和出售一种能发出“噼噼”声的卫星玩具、卫星气球和卫星形的女外衣装饰品。"},{"type":"paragraph","text":"这是波里索娃在一篇题为“苏联卫星吸引了千百万人的心”的文章中所说的。这篇文章刊载在最近的“苏维埃贸易报”上。"},{"type":"paragraph","text":"作者写道:地球上千百万普通人都赞扬着苏联的科学成就。在英国一家报纸举办的苏联人造卫星有奖命名比赛中，读者们都是以最美好的词汇来给人造卫星命名。他们称它为“和平使者”、“新黎明”、“希望”、“救星”等。"},{"type":"paragraph","text":"波里索娃说:苏联和平科学的成就给“实力地位”政策以致命的打击。美国的一张主要王牌——指望以“西方技术和军事优势”的神话来恐吓社会主义阵营的打算破灭了。"},{"type":"paragraph","text":"美国资产阶级报刊展开了一个对苏联进行疯狂的造谣污蔑的运动，企图在国内制造一种战争狂热的气氛。他们捏造出数百条消息，如说在美国某些军事基地上空出现神秘的天体，苏联将发射用于侦探的卫星，发现苏联的“飞碟”等。"},{"type":"paragraph","text":"但是，头脑清醒的人都知道，这种狂热意味着什么。美国报纸“每日新闻”形容美国统治集团狂怒的心情时说:“愚蠢、贪婪、夹杂着妒忌。”"},{"type":"paragraph","text":"波里索娃最后写道:在这个世纪，“实力地位”政策是注定失败的了，和平共处是唯一可能的道路。谁不明白这一点，谁就不可避免地要遭到失败。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"907c9b694e"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
