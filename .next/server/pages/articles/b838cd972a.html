<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"乌三娘不做“伏于人”的奴隶","authors":["秦丽芳"],"dates":[{"year":1975,"month":3,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"清王朝是我国封建社会的末代王朝，它越是走到了死亡的尽头，越是要负隅顽抗。孔老二这具政治僵尸，经过封建统治者的乔装打扮继续出现在这座腐朽的政治舞台上。清朝统治者以“忠孝节义”为中心，公然向全国颁行什么《内则衍义》，公开宣布要广大劳动妇女做“伏于人”的奴隶。但是，一切反动派打的如意算盘并不如意。白莲教起义领袖之一——乌三娘就是敢于“犯上作乱”的革命战士，决不做“伏于人”的奴隶。"},{"type":"paragraph","text":"乌三娘，山东兖州人，“年二十许，娟媚多姿而有膂力”。因受当时反动封建统治的压榨，她先随父流落街头卖艺求乞，后又随夫流浪江湖，过着被人歧视的悲惨生活。不久，丈夫因卖艺受伤，不治身死。乌三娘悲愤交加，毅然参加了王伦领导的白莲教起义队伍，并成为王伦的得力助手和起义军的领袖。她与起义军一起参加攻打寿张、阳谷、堂邑(今山东境内)三县的战斗，打得敌兵狼狈不堪，使山东巡抚徐绩多次向上告急，惊呼“‘逆犯’连扰三县劫库戕”。徐绩面对白莲教起义，“心存畏惧，毫无措置”。一次，他妄想夺回寿张等县，结果反被困于临青城南，几乎送掉狗命。清朝统治者也斥责徐绩是庸懦无能。由此可见农民起义军影响之大。乌三娘率领的起义军，攻克一城，攻占一地，打开官仓济贫，没收富人财物散发给贫苦农民，使当时清朝官员极为恐惧和仇恨，时刻想扑灭这革命的火焰。"},{"type":"paragraph","text":"公元一七七四年(清乾隆三十九年)，山东地方的清军，集中了大量的人马，把起义军重重包围。这时乌三娘恰好在另一驻地，听到自己的队伍被围，立即亲自召集了十余名女将，骑上快马前去救援，与清军短兵相接，展开了激烈的巷战。什么“妇人，伏于人也”，什么“女不侵男”，什么“妇人应循闺门之礼”这类孔孟之道都被踩在脚下。乌三娘越战越勇，“独挥两刃，能捍蔽锋镝”，“忽于马上跃升屋”，身历重围，迎敌如若，尽管清军用矢炮轰击，她如“扬袖作舞状，终莫能伤”，表现出大无畏的革命精神。后来，终因敌众我寡，一些女将们相继阵亡，最后乌三娘也不幸牺牲。乌三娘和她率领的女将们的英勇事迹，宣布了清王朝《内则衍义》的破产，也是对孔孟之道的有力批判。"},{"type":"paragraph","text":"前纺车间理论小组　秦丽芳"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"山东文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b838cd972a"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
