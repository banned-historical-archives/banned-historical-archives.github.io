script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"第七期“文艺报”讨论毛主席新词“蝶恋花”","authors":[],"dates":[{"year":1958,"month":4,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"第七期“文艺报”讨论毛主席新词“蝶恋花”"},{"type":"paragraph","text":"据新华社10日讯　将在11日出版的第七期“文艺报”上辟专栏讨论了毛主席的新词“蝶恋花”。"},{"type":"paragraph","text":"诗人臧克家的“喜读毛主席新词‘蝶恋花’”一文发表后，他对“蝶恋花”最后两句的解释在文学界引起了一些不同的看法，因而文艺报组织了这次讨论。参加讨论的有郭沫若、张光年、谢思洁等人。郭沫若认为“蝶恋花”一词是“革命的现实主义与革命的浪漫主义的典型的结合”，张光年说，毛主席诗词中的革命的现实主义同革命的浪漫主义的结合是很值得探讨的，这样做，对新诗歌的创作必将有所启发。"},{"type":"paragraph","text":"“文艺报”编辑部的征稿启事说：“文艺报”在中国音乐家协会的支持和协助下，建议作曲家把毛主席已发表的诗词谱成歌曲。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ac347a3e33"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
