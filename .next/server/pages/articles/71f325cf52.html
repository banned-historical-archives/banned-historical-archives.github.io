<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"衡东水利的一颗明珠","authors":[],"dates":[{"year":1976,"month":6,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"衡东水利的一颗明珠"},{"type":"paragraph","text":"在深入批判邓小平、反击右倾翻案风的斗争中，我们访问了湖南省衡东县甘溪水轮泵站。这个水利工程，是衡东县人民在毛主席革命路线指引下，发扬自力更生、艰苦奋斗的革命精神，在无产阶级文化大革命中建成的。这个水轮泵站安装了十六台大型水轮泵，不停地把五个多流量的河水，抽到两岸三、四十米高的山上，沿着盘山大渠，飞越渡槽，穿过隧洞，流向四方，和中小型水库、山塘、堰坝以及电灌站、小水轮泵站紧相连接，形成了一个农田水利灌溉网，使全县四十多万亩农田基本实现旱涝保收。自一九六九年开始受益以来，全县粮食亩产连续五年跨《纲要》，一九七五年超过千斤。这是无产阶级文化大革命的成果，是对邓小平翻文化大革命案的罪行的有力回击。"},{"type":"paragraph","text":"无产阶级文化大革命前，衡东人民就要求在洣水上面拦河筑坝，引水上山，灌田发电。但是，由于刘少奇修正主义路线的影响，这个愿望一直未能实现。洣水沿岸的贫下中农眼看着丰富的水利资源不能开发利用，非常气愤。文化大革命中，衡东县委排除了修正主义路线的干扰，根据群众的迫切要求，在上级党委的领导和支持下，决定土法上马兴建甘溪水轮泵站工程。消息传开，群情激奋；但也有少数人只看到工程的规模宏大，看不到群众中蕴藏着的巨大的社会主义积极性，摆出一大堆数据，提出了许多难题，断定这个工程干不成。一小撮阶级敌人也乘机破坏捣乱。县委和工程党委遵循毛主席关于“千万不要忘记阶级和阶级斗争”的教导，放手发动群众，深入开展革命大批判，狠狠打击阶级敌人的破坏活动。全县很快就集中了五万三千多劳动大军，打响了征服洣水的战斗。"},{"type":"paragraph","text":"甘溪水轮泵站工程党委，坚持以阶级斗争为纲，坚持无产阶级政治挂帅。他们在工地上办起了六百五十多所政治夜校，组织广大干部和群众认真学习马列著作和毛主席著作，深入批判刘少奇、林彪的修正主义路线，把广大群众在文化大革命和批林批孔运动中焕发出来的积极性，引导到大批资本主义，大干社会主义上来。他们依靠人民公社集体经济的力量，自办水泥厂，就地取材编织土箕、藤筐，自架红炉，利用废钢铁修制开山凿石的工具。他们还从“泥脚杆子”、“庄稼汉”里培训了一万余名施工技术队伍。他们就是这样战胜重重困难，修成了这个水利工程。"},{"type":"paragraph","text":"在反击右倾翻案风的伟大斗争中，甘溪水轮泵站党总支和各级党组织，带领广大职工用建站的生动事实，深入批判邓小平“三项指示为纲”的修正主义纲领，批判他翻文化大革命的案的罪行。广大职工用抓革命、促生产的优异成绩，反击右倾翻案风。今年第一季度发电量比去年同期增长百分之六十四。"},{"type":"paragraph","text":"本报通讯员（附图片）"},{"type":"paragraph","text":"甘溪水轮泵站全景"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"批林批孔","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"71f325cf52"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
