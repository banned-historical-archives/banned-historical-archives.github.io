<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"蒋介石卖国集团残酷剥削台湾人民","authors":[],"dates":[{"year":1954,"month":10,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"勒征“户税”进行双重剥削"},{"type":"paragraph","text":"台湾最近出版的‘自由中国’杂志上刊载一篇‘读者投书’，揭露了蒋介石卖国集团以‘户税’为名向台湾人民进行双层剥削的罪恶事实。"},{"type":"paragraph","text":"‘读者投书’说，台湾广大人民一提起‘户税’二字莫不感到万分头痛，认为这是蒋介石卖国集团可耻地继承日本帝国主义罪恶统治的衣钵，对台湾人民进行‘殖民地’式剥削的标记。‘读者投书’说，这种恶税是在田赋、地价税、房捐、使用牌照税、所得税等等苛捐杂税之外，又把每一户内共同生活或营共同事业者，不论其为妻、儿、女、兄、弟、姊、妹、亲戚、同事，每个人因劳力所得之薪资报酬，统统算在户长收入帐上，积成一个庞大的数目，然后按累进税制计课。这种非法的剥削，足足增加纳税人负担一倍乃至数倍之多，是‘变相的人头税’。"},{"type":"paragraph","text":"‘读者投书’说，蒋贼地方政府税务人员在勒徵‘户税’时，任意曲解、武断，胡搞一阵，弄得错误百出，而纳税人‘申请复查’时，又多方留难，以致台湾人民怨声载道。"},{"type":"paragraph","text":"蒋贼喽囉演出集体贪污丑剧"},{"type":"paragraph","text":"最近蒋贼的喽囉——台北市议员们，演出了一出以‘劳军’为名进行集体贪污的丑剧。"},{"type":"paragraph","text":"据台湾报纸透露，蒋贼台北市议会组织了所谓‘劳军团’，携带了大批向台湾人民敲诈来的款项出发‘劳军’。这些蒋贼‘劳军团’人员还未出发就瓜分了一笔钱，每人取得了七百元伪台币的准备金。在出发以后，许多人又中途折回，目的是减少旅费开支，以便多得到一些钱。有些蒋贼议员为了要求另外支领三百元伪台币的早点费，而在旅馆里大吵一通。‘劳军团’第二组的议员们‘劳军’回来分赃时，每人除先拿的七百元伪台币外，还可以分到九百元伪台币。那些临时宣布不去的议员，本来言明只能拿七百元，但他们看到去的人每人合计能拿到一千六百元，所以十分眼红，竟在‘市议会’里演出了一幕追索余数的争吵闹剧。"},{"type":"paragraph","text":"这些蒋贼‘劳军团’人员沿途还大肆滋扰、敲诈民财。据台湾报纸透露，蒋贼‘劳军团’人员所到之处都要当地设筵慰劳，尽情享受，二十人一餐就用去两千余元伪台币(相当于台湾一个码头工人五个多月的工资)。在贫瘠的小镇，也要摆设盛筵给‘劳军团’的议员们洗尘。‘劳军团’第一组的议员们最后一天是参观西螺大桥，他们为怕当地招待不周，所以早就打了电报下去，当地‘议会’赶快在西螺设了六桌筵席恭迎，但这一组议员们却在未到西螺大桥的前一天就分了赃解散了，没有人去吃筵席。"},{"type":"paragraph","text":"蒋贼喽囉们的贪污丑事，引起了台湾人民的公愤。台湾报纸刊登了一封读者来信，信中说，这些人为自己的利益而奔忙，藉劳军为名来满足他们环岛游览、携眷观光的欲望，甚至为了平分赃款引起纠纷，这是一件骇人听闻的污秽事实。【据新华社电】"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3e66187e1c"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
