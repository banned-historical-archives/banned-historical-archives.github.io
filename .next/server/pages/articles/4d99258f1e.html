script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"美国外交一再败下阵来美国资产阶级谋士李普曼不胜着急","authors":[],"dates":[{"year":1958,"month":1,"day":31}],"is_range_date":false,"parts":[{"type":"paragraph","text":"美国著名评论员李普曼1月21日在“华盛顿邮报”发表一篇题为“宣传竞争”的文章，承认苏联提出举行最高级会议的主张，在全世界深入人心；深感长此以往，美国在国际环境中将愈益孤立被动。"},{"type":"paragraph","text":"李普曼虽然把争取和平共处的斗争叫做“宣传竞争”，但他不能不承认，美国在这一场斗争中是已经败下阵来了。他说:“虽然这种竞争的进展是无法具体计算的，但我们从一个跟杜勒斯先生本人一样有资格发表权威意见的人士那里证实，在这场竞争的现阶段，俄国人正在占领先的地位。可以证明这一点的最好证据就是:目前在西方世界有越来越大的群众压力，赞成接受他们所提出的举行另一次高级会议的建议。”"},{"type":"paragraph","text":"这种巨大的压力使华盛顿十分焦恼不安，因为:“举行最高级会议的主张已经使西欧反对党团结一致，而有重要迹象表明，这个主张在支持政府的党派中间正在深入人心。在德国，凯南先生的演说(按:凯南系美国前驻苏大使，是美国“冷战”初期的重要筹划人；不久以前他在英国发表广播演说，支持东西方谈判，并且赞成建立中欧无核子武器区)，已经引起了惊人的成就，清楚地表明阿登纳政府的反对派力量不可轻侮。在举行最高级会议的问题上，麦克米伦先生在国内只得在政治上采取守势。甚至在这里(按:指华盛顿)，总统和杜勒斯先生也认为他们必须在某种程度上向压力屈服。”"},{"type":"paragraph","text":"但更使华盛顿忧心如焚的，是和平共处的要求是如此深入人心。李普曼说:“民主国家将像快要淹死的人，连一根草也要拼命抓住那样，抓住一个东西，它看来会使人们摆脱战争威胁和军备竞赛的重担。”但是，华盛顿如何应付这种使它陷入非常尴尬境地的局面呢?它只得面对这种情势束手无策，只是死硬地进行阻挠。李普曼说:“这个问题的答案在我看来是，民主国家的领导人没有给予他们什么可抓的东西。杜勒斯先生、阿登纳先生和麦克米伦先生给人的印象是，他们不仅不愿意举行最高级会议，而且根本不愿举行谈判。他们所以造成这种印象，因为他们在一些关键性的冷战问题——在德国、中东和东亚的问题上——他们一直顽固地坚持他们和全世界都知道不能谈判的条件。”"},{"type":"paragraph","text":"李普曼本人也对美国的这种顽固态度表示不满，他说:“只要西方政府拒绝举行最高级谈判，并且拒绝讨论具体问题和有限的建议，它们就是在外交上和宣传上的主动权拱手让给苏联。”但真正的问题是，如果美国不能从战争政策的死胡同里定出来，它是永远找不到出路的。这是问题的实质，这也就是李普曼这样的美国评论员所不敢直接触及的问题。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4d99258f1e"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
