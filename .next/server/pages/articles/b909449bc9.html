<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"“让青春谱写一曲共产主义的颂歌”——优秀红卫兵郑霞萍日记摘抄","authors":[],"dates":[{"year":1976,"month":9,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"“做一个革命的人，接好革命的班”"},{"type":"paragraph","text":"今年五月二十三日，我光荣地加入了红卫兵组织。从今天起，我应该更严格地要求自己，让自己的青春象孔宪风那样闪闪发光，让青春谱写一曲共产主义的颂歌。"},{"type":"paragraph","text":"——一九七五年七月一日"},{"type":"paragraph","text":"人活着就应该象孔宪凤那样，生命不息，战斗不止，冲锋在前，党叫干啥就干啥。做一个革命的人，接好革命的班，让自己的远大理想和共产主义的远大目标紧密联系起来。"},{"type":"paragraph","text":"——一九七五年七月四日"},{"type":"paragraph","text":"什么是理想?革命到底就是理想，革命需要就是我的理想。"},{"type":"paragraph","text":"什么是前途?革命事业就是前途，前进在毛主席的革命路线上，那前途是光明的。"},{"type":"paragraph","text":"什么是幸福?为人民服务就是幸福。我要生为人民而生，死为人民而死，那才称得上是一个革命者的幸福。"},{"type":"paragraph","text":"——一九七五年九月五日"},{"type":"paragraph","text":"母亲只生了我的身，是党的光辉照亮了我的心。党就是我的亲爹娘，有了党，才有我今天。……我决不能忘记党在我身上花的心血。要拿出百分之百的力量为实现共产主义而努力学习和工作。"},{"type":"paragraph","text":"——一九七五年七月二十日"},{"type":"paragraph","text":"“人活着就应该和资产阶级斗”"},{"type":"paragraph","text":"人活着就应该和资产阶级斗，为消灭一切人剥削人的制度，实现共产主义而奋斗。"},{"type":"paragraph","text":"——一九七五年七月八日"},{"type":"paragraph","text":"我要学习红雨和春苗，敢于反潮流，向一切歪风邪气作坚决斗争，做一名红色尖兵。"},{"type":"paragraph","text":"——一九七五年十月十二日"},{"type":"paragraph","text":"总是有一些人不想沿着毛主席革命路线走，……他们虽然穿上了新鞋，但老是感到鞋子扎脚，要想换一双他习惯的旧鞋子。有的人就是对文化大革命看不惯，过去被自己统治的人一转眼“统治”自己了，成了自己的顶头上司，感到这样的日子不好过，就准备出来和新干部较量较量。后又感到自己的卑劣行为在人民中间行不通就藏起来，装病在家里不工作，手拿人民的钱，身住华丽的洋房，要起资产风来了。他认为自己是无产阶级文化大革命搞下台的。现在老、中、青三结合的领导班子，他的路线行不通了，难道他会高兴吗?不会难过吗?但他认为他有后台。也有人看到新干部上任了，就撒手不干，看他们的笑话。"},{"type":"paragraph","text":"——一九七五年七月二十七日"},{"type":"paragraph","text":"我作为一个红卫兵，一个革命者，应该满腔热情地支持革命的新生事物，在充分肯定的基础上，采取积极的态度和措施，使之更加完善。不能象资产阶级贵族老爷那样，横加指责，大泼冷水，更不能象一小撮心怀敌意别有用心的人那样去扼杀新生事物。"},{"type":"paragraph","text":"——一九七六年一月一日"},{"type":"paragraph","text":"如果把阶级斗争论述背得滚瓜烂熟，但是一碰到实际问题，又不知道资产阶级在哪里，明的阶级敌人能看到，暗的阶级敌人就看不到。所以理论知识再多，不会在实践中运用，那等于无用啊。"},{"type":"paragraph","text":"——一九七六年三月一口"},{"type":"paragraph","text":"“追求轻松舒服是到达不了我们理想境界的”"},{"type":"paragraph","text":"为了当好今天的红卫兵，明天的工农兵，要长期下来劳动，锻炼，否则一事无成。我们都是生长在新社会，又是劳动人民的子弟，如果不去锻炼，不到最艰苦的地方去磨练，刻苦改造世界观，那一定会背叛自己的阶级。"},{"type":"paragraph","text":"——一九七五年十月二十九日"},{"type":"paragraph","text":"幸福是来之不易的，它是革命前辈洒热血、抛头颅换来的。我们要爱惜这一幸福。追求幸福，不能象《年青的一代》里的林育生那样为个人小家庭，为个人所谓的前途，忘记了阶级斗争，而迷迷糊糊地活着过日子。这不是幸福。我的幸福是广大劳动人民的幸福，只有全世界劳动人民得到了幸福，那么我也就得到幸福了。"},{"type":"paragraph","text":"——一九七六年三月三日"},{"type":"paragraph","text":"路，对有的人来说往往想走那既轻松又舒服的马路，但轻松舒服的道路是锻炼不了人的，一心只追求轻松舒服是到达不了我们理想境界的。"},{"type":"paragraph","text":"一一一九七六年六月八日"},{"type":"paragraph","text":"邓小平不让我们接近工农，与工农划等号，我就要和他对着干，到最艰苦、最需要的地方去。在与工农相结合中，刻苦改造自己的世界观，坚决与千百年“读书做官”的旧习惯实行最彻底的决裂，做一个与工农相结合，誓与工农划等号的无产阶级革命事业接班人!"},{"type":"paragraph","text":"——一九七六年六月一十四口"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"反潮流","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b909449bc9"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
