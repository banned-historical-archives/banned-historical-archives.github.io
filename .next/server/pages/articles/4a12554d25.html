script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"type":"pdf","id":"wenji4","name":"毛泽东文集第四卷（1999）","internal":false,"official":true,"author":"中央文献研究室","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/wenji4.pdf"],"article":{"title":"关于停止国内军事冲突的通告","description":"","dates":[{"year":1946,"month":1,"day":10}],"parts":[{"text":"关于停止国内军事冲突的通告","type":"title"},{"type":"paragraph","text":"中国共产党各级委员会，中国解放区各部队首长、各级政府同志们："},{"type":"paragraph","text":"本党代表与国民政府代表对于停止国内军事冲突之办法、命令及声明，业已成立协议，并于本日公布在案。凡在中国共产党领导下之一切部队，包括正规军、民兵、非正规军及游击队，以及解放区各级政府，共产党各级委员会，均须切实严格遵行，不得有误。"},{"type":"paragraph","text":"全中国人民在战胜日本侵略者之后，为建立国内和平局面所作之努力，今已获得重要之结果。中国和平民主新阶段，即将从此开始。望我全党同志与全国人民密切合作，继续努力，为巩固国内和平，实现民主改革，建立独立、自由和富强的新中国而奋斗。"},{"type":"paragraph","text":"中国共产党中央委员会主席毛泽东"},{"type":"paragraph","text":"中华民国三十五年一月十日"},{"type":"paragraph","text":"根据一九四六年一月十一日"},{"type":"paragraph","text":"《解放日报》刊印。"}],"comment_pivots":[{"part_idx":2,"offset":30,"index":1}],"is_range_date":false,"authors":["毛泽东"],"comments":["一九四五年十月十日，国共双方签订会谈纪要后，以周恩来为首的中共代表团继续同国民党政府代表进行谈判，经过多次交换意见，双方于一九四六年一月十日签署了《关于停止国内军事冲突、恢复交通的命令和声明》与《关于停止国内军事冲突的协议》。主要内容是：关于“办法”，协议要求由国民党政府与中共各派代表一人会同美国马歇尔将军从速商定，提请国民党政府实施；国民参政会驻会委员会及政治协商会议各推定国共两党以外的公正人士八人，组织军事考察团，会同国共双方，在发生冲突区域考察军事状况、交通情形以及其他与国内和平恢复有关事项，随时将事实真相提出报告并公布之。关于“命令”：（一）一切战斗行动立刻停止。（二）除另有规定者外，所有中国境内军事调动一律停止，唯复员、换防、给养、行政及地方安全必要的军事调动除外。（三）破坏与阻碍一切交通线的行动必须停止，障碍物应即撤除。（四）为实行停战协定，应即在北平设一军事调处执行部，由委员三人组成，一人代表中国国民政府，一人代表中国共产党，一人代表美国，所有必要训令及命令应由三委员一致同意，以中华民国国民政府主席名义经军事调处执行部发布之。关于“声明”，协议提出：“命令”中的第二条，对国民政府在扬子江以南整军计划之继续实施、对国民政府军队为恢复中国主权而开入东北或在东北境内调动并不影响；恢复交通包括邮政在内；同意国民政府军队在上述规定下调动，应每日通知军事调处执行部；军事调处执行部的一切协定、建议及指示只涉及停止冲突所引起的直接问题；美国参加军事调处执行部仅为协助中国委员实施停止冲突令；军事调处执行部内设执行组；军事调处执行部各委员，得各别设置通讯线，足保迅速而无阻碍之通信；军事调处执行部先设于北平。"],"page_start":102,"page_end":102,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4a12554d25"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
