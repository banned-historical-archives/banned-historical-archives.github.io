script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji15","name":"毛泽东全集第15卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji15.pdf"],"article":{"title":"防止执行政策时犯“左”倾错误","alias":"","parts":[{"type":"paragraph","text":"防止执行政策时犯“左”倾错误"},{"type":"paragraph","text":"（1940年10月18日）叶、项，胡服，陈毅，克诚（胡服转），雪枫，先念，并告彭，杨，刘、邓，杨、宋，陈、罗，朱瑞："},{"type":"paragraph","text":"由于没有使中下级干部彻底了解，由于上级没有事先预防与及时检查，致使许多地方犯有极左错误，主要是在土地政策，劳动政策，财政政策，锄奸政策，对待知识分子政策，对待俘虏政策，对待国民党人员政策，以及我之政权组织上表现过左。其结果是缩小了我之社会基础，引起中间势力害怕，给日寇、汪逆与顽固派以争夺群众团聚反动力量的机会。待错误形成再去纠正，已使我们受到极大损失。现在华中工作正在发展（山东亦然），你们必须预防下级"},{"type":"paragraph","text":"[1]叶、项，指叶挺、项英，当时分别任新四军军长和副军长。胡服，即刘少奇。陈毅，当时任新四军苏北指挥部指挥兼政治委员。克诚，即黄克诚，当时任八路军第五纵队司令员兼政治委员。雪枫，即彭雪枫，当时任八路军第四纵队司令员。先念，即李先念，当时任新四军豫鄂挺进纵队司令员。彭，指彭德怀，当时任八路军副总司令。杨，指杨尚昆，当时任中共中央北方局书记。刘、邓，指刘伯承、邓小平，当时分别任八路军第一二九师师长和政治委员。杨，指杨秀峰（1897—1983)，河北迁安人，当时任冀南、太行、太岳行政联合办事处主任。宋，指宋任穷（1909--2005)，湖南浏阳人，当时任八路军冀南军区政治委员。陈、罗，指陈光、罗荣桓，当时分别任八路军第一一五师代师长和政治委员。朱瑞，当时任中共中央山东分执行政策时犯过左错误，你们必须懂得“左”倾错误是当前主要危险，必须及时检查下级工作，纠正过“左”行动，否则在敌人与顽固派的夹攻中要取得我党我军发展与巩固的伟大胜利，要长期坚持根据地，是不可能的。此事望你们尖锐地提起全党全军注意，切勿等闲视之。"},{"type":"paragraph","text":"中央书记处十月十八日"}],"authors":["毛泽东"],"dates":[{"year":1940,"month":10,"day":18}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":158,"page_end":159},"tags":[{"name":"陈毅","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ea99e62c69"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
