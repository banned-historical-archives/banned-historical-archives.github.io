" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共中央关于增加点名批判的右派骨干分子人数等问题的通知","authors":[],"dates":[{"year":1957,"month":7,"day":9}],"is_range_date":false,"parts":[{"text":"中共中央关于增加点名批判的右派骨干分子人数等问题的通知","type":"title"},{"text":"(本篇中，“一”是毛泽东为中共中央起草的关于增加报纸上点名批判右派骨干分子的人数等问题的通知；“二”是毛泽东关于这个通知给中央的便信。)","type":"paragraph"},{"text":"一","type":"subtitle"},{"text":"各省委、市委、自治区党委，中央国家机关党组：","type":"appellation"},{"text":"有两件事通知如下：(一)反右派斗争正在深入，准确的右派骨干名单扩大了一倍(在这个通知之前，中共中央在一九五七年六月二十九日关于争取、团结中间分子的指示中估计：右派和极右派的人数，以北京三十四个高等学校及几十个机关中，需要在各种范围点名批判的，大约有四百人左右，全国大约有四千人左右。)，全国不是四千人，而是大约有八千人。例如北京约有八百人，上海有七百多人，包括大学生中的右派在内(清华大学教师及学生中的全部右派骨干分子)。现在的问题是在报纸上点名批判的大约不过占右派骨干的百分之三左右。例如上海有右派骨干七百多人，报上点名的只有二十多人，不到百分之三。报上老是这几个人，读者也看厌了。因此应当分阶段逐步增加一些人，最后增到右派的百分之十左右为止。其他百分之九十的右派骨干，则在所在单位点名批判，不要登报。报上点名的百分之十，应包括学生中的著名右派分子在内。凡报上点名的必须证据充分，最好还有历史劣迹、素来不大得人心的人。(二)北京哲学社会科学家十六人已就右派在学术方面的猖狂进攻，开始举行反攻了。北京此种反攻应当扩大，各地应当响应。自然科学家中在政治方面和学术方面的猖狂进攻，只要有准确的事实，也应组织反击。","type":"paragraph"},{"text":" 中央一九五七年七月九日","type":"paragraph"},{"text":"二","type":"subtitle"},{"text":"中央：起草了一个通知，请向彭真、维汉(注：彭真，当时任中共中央书记处书记。维汉，即李维汉，当时任中共中央统战部部长。)一商，如认为可行，请即决定发出。","type":"paragraph"},{"text":" 毛泽东七月九日","type":"paragraph"}],"comments":[],"origin":"根据文件翻印件打印。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"彭真","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a1eeb46259"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
