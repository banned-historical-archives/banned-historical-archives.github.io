script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"绝对自由不是资产阶级自由观","authors":[],"dates":[{"year":1988,"month":6,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"绝对自由不是资产阶级自由观"},{"type":"paragraph","text":"严辛、汪华岳撰文指出，过去把绝对自由说成是资产阶级观点，其实是不正确的。细查资产阶级思想家的著作和言论，可以说绝大部分比较严肃的思想家、政治家都不主张绝对自由；相反，他们有十分明确的反对绝对自由的言论。当然，不论在历史上，还是在现代，确实有讲绝对自由并忠诚信仰和宣传绝对自由的，这就是那些无政府主义者。对资产阶级自由意义的估价，过去大都肯定它的历史意义，但很少谈到它的科学意义。客观地讲，资产阶级对于创立科学的自由理论和学说是有功绩的。资产阶级自由理论和学说的功绩是什么，这是一个需要探讨的问题。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0c16f4be26"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
