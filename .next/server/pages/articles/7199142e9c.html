script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"宋任穷对中青年干部提三点希望一要识大体顾大局，二要抵制新的不正之风，三要防止资产阶级腐朽思想侵蚀，要遵守纪律","authors":["罗晓路"],"dates":[{"year":1985,"month":2,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社北京二月十五日电　(记者　罗晓路)中共中央政治局委员宋任穷今天下午在北京市中青年干部座谈会上赞扬中青年干部走上领导岗位后，思想解放、锐意改革、扎扎实实地工作。"},{"type":"paragraph","text":"宋任穷说，今年是执行党中央关于以城市为重点的经济体制改革决定的第一年，也是关键的一年。初战务求必胜。今年是整党的第二年，同样是整党关键的一年。整党促进改革，保证改革。我们大家要一心一意、平平安安、团结一致、和衷共济，搞好改革，搞好四化建设。"},{"type":"paragraph","text":"他说，我们的中青年干部在这样的形势下走上领导岗位，有几条是同志们已经做到或正在做到的。一是思想解放；二是接受新事物，锐意改革；三是不务虚名，扎扎实实地工作。这几条都是很好的。"},{"type":"paragraph","text":"宋任穷语重心长地说，中青年干部走上领导岗位后，有几条应当注意:第一，要识大体，顾大局。作为一个厂长，不能仅代表自己一个厂的利益，首先是代表国家利益，必须兼顾国家、集体、个人三者的利益。借改革之名慷国家之慨，不顾大局、不识大体的事不能做。第二，要注意抵制当前出现的几股新的不正之风。新的不正之风对改革是一个很大的破坏，它影响改革顺利进行。第三，在对外开放、对内搞活经济、继续解放思想的同时，一要注意防止资产阶级腐朽思想的侵蚀。二要注意越是解放思想，越要遵守纪律，我们干的是社会主义事业。党员有党员的纪律，政府工作人员有政府工作人员的纪律。最近中央关于严禁党政机关和党政干部经商、办企业的决定，就是一条明确的纪律。强调以上要注意的几点，决不是意味着要回到老路上去，沿用老办法，而是为了更好地进行改革。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"宋任穷","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7199142e9c"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
