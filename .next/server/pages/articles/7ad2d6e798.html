<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"请命、卖命皆短命","authors":["李雪"],"dates":[{"year":1976,"month":5,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"请命、卖命皆短命"},{"type":"paragraph","text":"李雪"},{"type":"paragraph","text":"为了翻案，为了复辟，邓小平施展了全部反革命的政治斗争经验。他打出了各种旗号，“为民请命”就是其中之一。"},{"type":"paragraph","text":"“为民请命”，古已有之。西汉时那些代表奴隶主复辟势力的贤良、文学们，在盐铁会议一开始，就挂出“为民请命”的招牌，攻击桑弘羊所捍卫的法家路线。以后，历史上凡是搞复辟倒退的反动人物，大抵都把自己装扮成“救世主”，打起“为民请命”的破旗，欺世惑众。"},{"type":"paragraph","text":"这条反革命的政治斗争经验，也为现代的复辟派所袭用。在刘少奇资产阶级司令部授意下出笼的黑戏《海瑞罢官》，唱的就是“为民请命”的老调，要彭德怀一类的修正主义“大老爷为民作主”。林彪反党集团的反革命武装政变计划《“571工程”纪要》中，也打着一个“为民请命”的幌子，用“‘国富’民穷”等恶言毒语，攻击无产阶级专政和社会主义制度，诬蔑无产阶级文化大革命。"},{"type":"paragraph","text":"如今，邓小平也施展这种反革命伎俩。他重新工作以后，替这个鸣冤，为那个叫屈。什么文化大革命“伤害”了老干部、老工人啦，什么知识分子“学非所用”啦，什么科研人员“灰溜溜”啦，不一而足，摆出一副“救世主”的面孔。"},{"type":"paragraph","text":"显然，邓小平的“为民请命”，是一个骗局，是一剂迷魂汤，妄图蛊惑旁人为他的反革命的修正主义路线卖命。不信，请看，邓小平的“为民请命”，不就是为那些不肯改悔的走资派请命的吗？他的鸣冤叫屈，不就是为那些攻击社会主义制度和无产阶级专政的反革命分子鸣冤叫屈的吗？他的全部反革命政治斗争经验，不都是为了保护党内外资产阶级，特别是党内走资派的利益，以全面复辟资本主义为其最终目的的吗？他搞的是阴谋诡计，却自称是“光明正大的”。但是，占人口绝大多数的人民是要革命的，是不会上当的。正如马克思和恩格斯指出的：“为了拉拢人民，贵族们把无产阶级的乞食袋当做旗帜来挥舞。但是，每当人民跟着他们走的时候，都发现他们的臀部带有旧的封建纹章，于是就哈哈大笑，一哄而散。”（《共产党宣言》，《马克思恩格斯选集》第1卷第274页）"},{"type":"paragraph","text":"那么，邓小平岂非招募不到为其卖命的走卒了吗？倒也不然。不过不是人民，而是“逸民”。在天安门广场行凶作恶的一小撮反革命分子就是此类人物。他们麇集在“三项指示为纲”的黑旗下，“不怕抛头洒血”，为邓小平的“四个现代化日”即资本主义复辟之日卖命。这个事实清楚地说明：邓小平为反对社会主义革命的“逸民”请命，一小撮反革命分子为邓小平反革命的修正主义路线卖命；邓小平是党内外新老资产阶级搞翻案复辟的挂帅人物，而新老资产阶级和一切牛鬼蛇神则是他的社会基础。"},{"type":"paragraph","text":"然而，无情的历史告诉我们：不管是谁为反革命的“逸民”请命，不管是谁为修正主义路线头子卖命，他们搞复辟倒退都注定是短命的，注定要失败的。刘少奇垮台了，林彪垮台了，叫嚷“不怕第二次被打倒”的邓小平也垮台了。一切逆历史潮流而动的反动派，可能得势于一时，但最终逃不脱覆灭的下场。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"林彪","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7ad2d6e798"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
