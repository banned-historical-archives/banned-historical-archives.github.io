script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"卡斯特罗号召向资产阶级思想坚决斗争推进革命必须清除反动思想指出阶级斗争具有长期性谴责美帝利用天主教在古巴进行反革命活动","authors":[],"dates":[{"year":1963,"month":3,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社哈瓦那13日电】　古巴总理卡斯特罗今晚在哈瓦那大学举行的群众大会上发表演说，这次大会是为了纪念1957年3月13日在学生领袖安东尼奥·埃切瓦里亚率领下的一批爱国青年为了推翻巴蒂斯塔暴政统治攻打总统府六周年而举行的。"},{"type":"paragraph","text":"卡斯特罗说，过去进行的反对巴蒂斯塔及其集团的斗争只不过是革命的开始。现在展开的反对帝国主义的斗争是比较困难的。但是还有一个更为困难的斗争，那就是对过去和过去的反动思想的斗争。他指出，“在革命中思想是非常重要的，因为各个阶级在进行斗争，各个阶级的思想在进行斗争。反动分子企图把尽可能多的人吸引到他们的思想那边去，他们利用了旧思想在人们中的影响。”"},{"type":"paragraph","text":"卡斯特罗谴责美帝国主义利用天主教会作为在古巴进行反革命活动的工具。他说，在宗教外衣下进行的这些反革命活动是直接从美国领导的。他说，“我们将看到阶级敌人会频繁地改变他们的策略，因为这个斗争是长期的，这个斗争必然是长期的。因为这种阶级斗争、这种思想斗争，不会在二十四小时内结束。”"},{"type":"paragraph","text":"卡斯特罗号召青年和人民向资本主义遗留下来的恶习和弊端展开坚决的斗争。"},{"type":"paragraph","text":"他说，革命和劳动者有着坚强有力的手，因为我们的劳动者知道帝国主义敌人有着凶狠的、非常凶狠的手，他们熟悉巴黎公社的历史。他说，“无耻的美国佬、口吐秽言的帝国主义者、战争发动者、战争挑拨者、大言不惭的家伙们，你们不要梦想得到脚下的一块石头，你们在古巴连脚下的一块石头也得不到。”他说，我们拥有“适宜于给侵略者以应有打击的各种武器”，现在我们正在召集使用我们的最新式武器的人员。"},{"type":"paragraph","text":"他说，“革命在任何时候都将采取一切本国和国际范围内的措施、采取一切自卫的步骤来进行抵抗。”卡斯特罗最后号召“进行斗争、学习和组织”。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a66d5398fc"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
