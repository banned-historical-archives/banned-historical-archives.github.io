<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"决不辜负毛主席的殷切期望","authors":["侯隽"],"dates":[{"year":1975,"month":11,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"侯隽"},{"type":"paragraph","text":"我怀着非常激动的心情，反复学习了参加全国农业学大寨会议的十二名下乡和回乡知识青年代表《给毛主席党中央的一封信》，深受教育和鼓舞。这封信，说出了我们知识青年的心里话，表达了我们铁心务农、扎根农村干革命的坚强决心。"},{"type":"paragraph","text":"全国农业学大寨会议，是伟大领袖毛主席一九六四年发出“农业学大寨”的伟大号召以来，召开的一次非常重要的会议。会议特别邀请了我们下乡和回乡知识青年代表参加，这充分体现了毛主席、党中央对我们青年一代的亲切关怀，寄予极大的希望。我虽然因病没能参加这次会议，但我克服病痛，每天都坚持收听广播，阅读报纸，了解大会精神，学习先进经验，打心眼里感到方向更明确了，信心更足了，为建设社会主义大农业，浑身好象增添了使不完的力量。"},{"type":"paragraph","text":"十二名知识青年代表在信中说:“我们决心扎根农村，但扎根农村本身并不是目的，目的是要和贫下中农一起战天斗地学大寨。”这话说得多好啊!一九七○年以前，我和我们窦家桥大队知识青年小组的战友们，都一心扎根农村干革命，但由于没有认真学大寨，也就没有正确的方向，发挥作用不够大。一九七○年北方地区农业会议以后，我们提高了对农业学大寨的认识，和广大贫下中农一起，大干苦干。我们大队从一九七○年起真学大寨，人变地变产量变，一步跨上一层天，粮食产量从那时的平均亩产四百斤增加到一千一百多斤，今年又获得更大的丰收。"},{"type":"paragraph","text":"我们和自己比有进步，和大寨比还得跑步!当前，我国社会主义革命和社会主义建设正处在重要的历史发展时期，农业学大寨的群众运动也发展到了一个新的重要阶段。我们这一代青年人，负有重大的历史使命。真是形势大好，形势逼人。我决心实现我们知识青年代表在信中提出的战斗口号:“横下一条心，拼命干革命，认真学大寨，二、三年或三、四年内把我们所在社、队建成大寨式的先进单位。”"},{"type":"paragraph","text":"现在，我担任了干部，被选为大队党支部书记和宝坻县委副书记。但我清醒地认识到，职务高了，思想改造不是到顶了，还需要在农业学大寨的群众运动中摔打千百次，大干了还要大干，精神面貌变了还要再变。当干部，这是党和人民对我提出了更高的要求，我决不辜负毛主席、党中央和全国人民对我们知识青年的殷切期望，决心和战友们一起，进一步学好关于无产阶级专政的理论，深入开展对《水浒》的评论，不断提高阶级斗争和路线斗争觉悟，同旧的传统观念实行最彻底的决裂，向大寨青年学习，铁心务农干革命，广阔天地献青春。在搞好自身思想革命化的同时，还要同广大贫下中农一起，坚持党的基本路线，大批修正主义，大批资本主义，大干社会主义。用我们的双手，艰苦奋斗，把现在还比较落后的乡村，建设成为一个繁荣昌盛的乐园。"},{"type":"paragraph","text":"\u003cIMG alt=请插入6号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1975\\11\\75b1030101.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e参加全国农业学大寨会议的十二名下乡和回乡知识青年代表，在会议期间畅谈坚持乡村干革命的体会。　《光明日报》供稿\u003c/FONT\u003e"}],"comments":[],"origin":"《人民日报》,《光明日报》","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a47f1eb1b4"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
