script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"497f6837-acfe-4e54-9954-e72f41e3554b","name":"关于“四人帮”提倡所谓“大写与走资派作斗争的作品”的有关材料（1976年11月）","internal":true,"official":true,"type":"img","author":"上海电影制片厂办公室印","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/497f6837-acfe-4e54-9954-e72f41e3554b/1.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/497f6837-acfe-4e54-9954-e72f41e3554b/2.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/497f6837-acfe-4e54-9954-e72f41e3554b/3.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/497f6837-acfe-4e54-9954-e72f41e3554b/4.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/497f6837-acfe-4e54-9954-e72f41e3554b/5.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/497f6837-acfe-4e54-9954-e72f41e3554b/6.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/497f6837-acfe-4e54-9954-e72f41e3554b/7.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/497f6837-acfe-4e54-9954-e72f41e3554b/8.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/497f6837-acfe-4e54-9954-e72f41e3554b/9.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/497f6837-acfe-4e54-9954-e72f41e3554b/10.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/497f6837-acfe-4e54-9954-e72f41e3554b/11.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/497f6837-acfe-4e54-9954-e72f41e3554b/12.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/497f6837-acfe-4e54-9954-e72f41e3554b/13.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/497f6837-acfe-4e54-9954-e72f41e3554b/14.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/497f6837-acfe-4e54-9954-e72f41e3554b/15.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/497f6837-acfe-4e54-9954-e72f41e3554b/16.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/497f6837-acfe-4e54-9954-e72f41e3554b/17.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/497f6837-acfe-4e54-9954-e72f41e3554b/18.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/497f6837-acfe-4e54-9954-e72f41e3554b/19.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/497f6837-acfe-4e54-9954-e72f41e3554b/20.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/497f6837-acfe-4e54-9954-e72f41e3554b/21.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/497f6837-acfe-4e54-9954-e72f41e3554b/22.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/497f6837-acfe-4e54-9954-e72f41e3554b/23.jpg"],"article":{"title":"按","alias":"","parts":[{"type":"paragraph","text":"按："},{"type":"paragraph","text":"王、张，江，姚反党集团，是一伙人心丧尽，坏事干绝的反革命阴谋家、野心家．他们为了塞党夺权严密控制文化部，安图利用电影艺术形式扩大他们的反革命政治影响，大搞阴谋诡计，肆意歪曲，篡改毛主席指示，墓改党史，军史，今年二月上有“四人帮”遗过文化部召开全国所谓重点题材创作会议，“四人帮”亲信乘承“四人帮”黑旨意，直接布置五个所请童点题材，他们亲自点名点将、谁编谁导、限时限刻，规定今明年一定要出片，"},{"type":"paragraph","text":"紫接着“四人”江青在今年二月份看到《文汇报》刊登一篇署名方泽生关于《序由》文章，她立即下达黑指示，娶改编《序曲》拍成电影，为此三月下旬，文化部追不及待召开各个电影厂会议，研究关于《序曲》政编落实汇报会，会上他们打着文艺作品“要触及时事”“要为当前阶级斗争、路线斗争服务”的院子，提出“要敢于写与定资派作斗争的文艺作品”，“要旅抓这方面的创作”，“四人帮”厚颜无耻地以“左派”自居，自封为“正确路线的代表”，他们要批判走资派是假，分裂，攻击以毛主席为首的党中央是真，他们打着歌颂文化大革命的旗号，实是为“四人帮”一伙树碑立传歌功颂德，妄图达到篡党夺权罪恶自的，"},{"type":"paragraph","text":"他们别有用心地鼓动写走资派不仅“要写一个县，市，也要敢于写一个省，一个部”，这种险恶用心所请要写“高级走资派”就是把矛头指向一些革命的老一辈无产阶级革命家，以此打倒中央和地方一大批党、政、军领导同志，所请组织搞重点剧目、所请安写“高级走资派”，这是“四人帮”一伙反革命政治大阴谋，因此，决不是一个孤立现象，而是二个阶级、二条路线的尖锐斗争，为此我们把有关他们对这些方面的一部分黑话根据当时的记录整理出来打印成文结合当前斗争供同志们揭发批判用，村料之一："},{"type":"paragraph","text":"重点题材创作会议"},{"type":"paragraph","text":"76.2.5·上午刘庆棠XX讲话："},{"type":"paragraph","text":"今天开个重点影片的会议，这个任务，是去年大寨会议江青×X已经向在座的孙谦、张天民等同志讲了的，"},{"type":"paragraph","text":"重点片中的两个一一工业学大庆、和农业学大寨，这是毛主席亲自树立的两面红旗，如何把它拍好，确实是一件大事，其它三部都是我们党党史和军史的重大题材，"},{"type":"paragraph","text":"1977年是建军50周年，文化部核心绍议了议，电影如何进行庆祝，这是很有意义的一件事"},{"type":"paragraph","text":"今天三个大厂：长影、上影、北影都请来了，"},{"type":"paragraph","text":"今年又是无产阶级文化大草命十周年，如何在戏剧舞台上，创作歌颂文化大革命，歌颂社会主义新生事物，这个任务已经下达给剧团，和样板戏剧维"},{"type":"paragraph","text":"十年前的这一年里，有重大纪念意义的日期就有：5·16：这是文化大革命的正式开始；6·1：毛主席批示了北大第一张大字报；8·8：党的十一中全会，通知公布16条，向全党全军全国"},{"type":"paragraph","text":"人民发出了战斗号召；"}],"authors":["上海电影制片厂办公室"],"dates":[{"year":1976,"month":11}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":2,"page_end":2},"tags":[{"name":"江青","type":"人物"},{"name":"四人帮","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"清查五·一六","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f0834c921f"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
