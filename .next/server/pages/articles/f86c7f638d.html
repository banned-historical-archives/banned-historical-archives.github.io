script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"为贫下中农赤脚一辈子","authors":["院文章"],"dates":[{"year":1976,"month":5,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"为贫下中农赤脚一辈子"},{"type":"paragraph","text":"河北省涿鹿县五堡大队赤脚医生　院文章"},{"type":"paragraph","text":"党内最大的不肯改悔的走资派邓小平一心想恢复“城市老爷卫生部”，让资产阶级在卫生战线重新专我们贫下中农的政。他眼见得赤脚医生这一社会主义新生事物砍不掉了，就来了“诱”的一手。他鼓吹“赤脚医生穿鞋论”，妄图让我们按照他的意志去为个人名利学知识，学到知识就丢掉赤脚的本色，变成骑在劳动人民头上的精神贵族，为他复辟资本主义服务。这是万万办不到的！"},{"type":"paragraph","text":"我是一名在文化大革命中成长起来的赤脚医生。斗争的实践使我体会到，我们赤脚医生确实需要掌握和提高医疗卫生技术，但是我们学知识、学技术的目的，不是为了个人成名成家，而是为了更好地给贫下中农解除病痛，牢固地占领农村医疗卫生阵地。我们这里过去有个反动流医，他凭一点医疗技术，经常对贫下中农敲诈勒索。我当上赤脚医生后，他就到处散布流言蜚语，说什么：“一个土赤脚，能成啥气候，小麻雀想夺凤凰窠，没那么容易！”我感到，这是农村医疗卫生阵地上两个阶级的斗争，赤脚医生要牢固地占领这块阵地，就必须坚持无产阶级政治挂帅，掌握医疗卫生技术，绝不能让资产阶级用知识、技术来卡我们的脖子！从此，我反复学习毛主席关于“把医疗卫生工作的重点放到农村去”的光辉指示，以白求恩为榜样，为革命刻苦钻研医疗技术。这样，我逐步掌握了内、外、儿、妇各科的基本医疗技术，使那个反动流医想用技术挤垮我的阴谋破产了。一次，贫农社员王有英老大娘得了妇科病，好几家医院都说治不好了。我反复研究，细心诊视，采用中西医结合的办法，终于使大娘的病有了好转。贫下中农说：“还是咱自己的赤脚医生好啊！”"},{"type":"paragraph","text":"赤脚医生要代表贫下中农占领农村医疗卫生阵地，就必须心不离群众，身不离劳动，永远保持贫下中农的本色。因此，几年来，我不论工作多忙，时间多紧，都坚持参加集体生产劳动。邓小平想用什么草鞋、布鞋之类的谬论把赤脚医生引到邪路上去，为他复辟资本主义服务，这是枉费心机。我要为巩固无产阶级专政背一辈子红药箱，坚持一辈子赤脚，用实际行动批判邓小平、反击右倾翻案风。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f86c7f638d"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
