<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共上海市委批转《劳动工资委员会办公室关于少数工厂企业盲目招用人员的情况反映》","authors":[],"dates":[{"year":1959,"month":1,"day":22}],"is_range_date":false,"parts":[{"text":"中共上海市委批转《劳动工资委员会办公室关于少数工厂企业盲目招用人员的情况反映》","type":"title"},{"text":"这份材料反映了在招用人员工作中，我们一些干部思想作风上的严重问题，有必要发给大家看一看。这份材料说明了：","type":"paragraph"},{"text":"（一）我们有些领导干部直到现在仍然不懂得要增加生产，首先应当从开展技术革命，改进劳动组织，改善企业管理等方面去找出路，以不断提高劳动生产率，决不应该任务一增加，就先伸手要人，而且要人又是越多越好。用“人海战术”的办法领导生产，只是说明了领导的无能。","type":"paragraph"},{"text":"（二）有一些领导同志官僚主义作风很严重，对企业生产实际情况心中全然无数，甚至在提出招工申请的时候，并不是经过认真地讨论和认真审核，对计算错误的申请报告也照样盖章送出。这是一种对组织、对工作严重的不负责任的错误行为。","type":"paragraph"},{"text":"（三）有些单位在招工中存在严重无组织无纪律的现象。他们不顾市委三令五申，仍然从本位主义出发，到处挖工，私招农民，甚至信赖包头，吸收不合条件的人进厂。这种违反党的政策走“邪门”的情况，有关单位应该严肃进行检查。","type":"paragraph"},{"text":"今年的任务是繁重的，各单位应该认真贯彻中央、市委指示精神，严格控制劳动力的增长，不得任意增加职工。各单位应该从上述情况中吸取教训，不使这种情况在今后继续发生。","type":"paragraph"},{"text":"附：","type":"appellation"},{"text":"市委劳动工资委员会办公室关于少数工厂企业盲目招用人员的情况反映","type":"subtitle"},{"text":"大跃进以来，不少工厂企业出现了劳动力不足的现象。大多数单位根据“节约用人提高劳动效率”的原则，充分发动群众，从企业内部挖掘潜力，贯彻了增产增事不增人或少增人的方针。但是，少数工厂企业在使用劳动力方面仍旧有多招多用、私招乱挖的现象。从最近我们初步检查和处理的几件要求增加人员的报告中，就发现好多起这样的事例：","type":"paragraph"},{"text":"一、心中无数，盲目要人","type":"subtitle"},{"text":"不少工厂企业领导干部对本单位的劳动组织和劳动力使用情况心中无数，一听到生产任务增加就要增加人员，而且不经慎重研究和精打细算，就提出招工计划。例如：上钢一厂一九五七年在册职工为二千八百十七人，一九五八年第四季度已增加到一万一千四百十六人，而该厂在去年十一月十九日又向冶金局、劳动局提出报告，要求再增加九千零十名工人，经冶金局、劳动局派人调查，发现这个招工计划有严重的浪费现象。如报告中提出因镁砂原料缺乏，改用白云石代替，每天加工白云石一千四百吨，需要补充一千四百二十个劳动力，实际上需要加工的白云石不过一百四十吨，即使完全用人工破碎，也只要二百人就可以了，而报告中把一百四十吨白云石却错写为一千四百吨，党委书记不加审查就盖章同意。该厂新建的两座高炉计划配备五千零三十五名工人，实际上只要采取一些措施就有可能把定员压缩一半左右。有些企业主管部门接到下面要求用人的报告，往往不深入调查研究，认真进行审查，就照批照转，层层上报。如电机工业局党组去年十二月二十四日向市委提出报告，要求补充八千九百六十三名妇女劳动力，据我们初步调查，发现不少企业并不需要增加那么多劳动力。如报告中提出电力设备工业公司需要增加一千八百零五人，而经过我们与该公司重新核算，他们自己表示只要九百七十人就够了，相差几乎一倍。华通开关厂要求增加八百名妇女，实际上该厂今年虽因产品变换，需要一些冷作、电焊工，但其他工种的人员却有多余，可以在厂内调剂解决，而且该厂在去年第四季度已经陆续吸收了六百名妇女进厂，现在有些人空着没有事做，但电机局却同意他们再增加八百名妇女。","type":"paragraph"},{"text":"二、宁多毋少，宽招宽用","type":"subtitle"},{"text":"有些单位看到目前劳动力有些不足，惟恐今后招不到人，就强调生产需要，少用多招，迟用早招，造成劳动力的人为紧张。如电讯电器工业公司因电机局要在该公司所属企业中抽调七百名职工支援汽轮机厂、锅炉厂，该公司在布置各厂抽调任务时，指示各厂要尽快吸收职工家属和里弄妇女，并说迟了会招不到人，造成下面盲目地增加人员。到目前为止，一共只调出了二十五名职工去锅炉厂，而已经吸收进厂的妇女却有一千余人。又如建成碾米厂去年四季度未经批准就吸收了三百十个里弄妇女，约占本厂职工的百分之八十八。其中用在炼钢和烧水泥的妇女有一百八十二人，用在顶替炼钢的男工有一百零八人，实际上并不需要这许多妇女，如轧糠工作只需要三人，却用了十一个妇女。有些工厂今年生产任务还没有确定，就过早过多地增加人员，如新建铁厂去年四季度生产任务不足，当时厂领导上认为今后生产任务繁重，惟恐今后招不到人，却在四季度陆续吸收了一百多名妇女进厂，上海酵母厂去年第四季度未经批准陆续自招八十名工人，而该厂的一个新建车间要在今年第一季度末才能投入生产，现在很多新工人进厂后无事可做，造成严重浪费。","type":"paragraph"},{"text":"三、不经批准，自行招用","type":"subtitle"},{"text":"去年第四季度以来，工厂企业自行招收工人的情况有所发展，特别是在组织家庭妇女参加社会劳动以后，由于对工厂企业使用妇女劳动力的审批权限不够明确，因此漏洞很大。据冶金、机械、电机、化工、纺织、轻工等六个工业局统计，到去年十一月下旬，已经吸收进厂的妇女约六万四千人，其中经过市委批准的不到三万人，有一些是经过区委或主管局、专业公司同意吸收的，但也有的是工厂企业直接与里弄挂钩后自行招用的。有的单位怕上级不批准用人，故意走“邪门”。如闸北区四六织布厂干部说“招用妇女不要请示区委，最好连地区办事处都不要去，直接到居民委员会最有保证”。这个厂通过这种方法私自招用了三十五名妇女。另外，有些地区办事处和里弄干部为了解放妇女劳动力，也主动与工厂联系、介绍妇女进厂，在一定程度上助长了工厂企业招工的自流现象。如申新九厂向区委劳动工资委员会申请招用七十名妇女，尚未批准，就要求地区办事处调给九十名妇女，而地区办事处为了扩大妇女就业，竟调配了一百二十名妇女进厂。闸北区顺征路派出所有的户籍警，还直接为工厂调配妇女劳动力，并且代表里弄妇女和工厂谈判，要在三个月后评级转正 。","type":"paragraph"},{"text":"四、不择手段，滥招滥用","type":"subtitle"},{"text":"少数工厂企业不分对象，自行吸收了一些不合条件的人员和地富反坏右分子进厂，有的还用高工资挖雇在业职工、私招农民进城，或者通过包头，将一些临时性的工作高价外包。如上海耐火材料二厂长期通过包头何庆林（刑满释放分子）承包厂内的基建工程，他所雇佣的临时工大部分是临时户口和不服从统一调配的建筑工人。提篮桥区四方锅炉厂和上海机锻铁厂，通过包头沈恒仅，挖去了上海自行车二厂二十二名搬运工，这些工人白天在自行车厂工作，晚上去四方厂工作，每六小时拿工资四元，有些工人白天请病假，晚上赚“外快”，严重影响了生产任务的完成。电业局自行同意闸北发电厂通过崇明县委招用了三百名农民进厂。国棉九厂为了放高产卫星，发动工人介绍自己的亲友进厂，细纱间工人沈金囡就介绍其妹妹、浦东县红旗人民公社社员沈毛囡作临时工，沈进厂后就回去要求退社，引起当地农民的不满。","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"da52ddd7e5"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
