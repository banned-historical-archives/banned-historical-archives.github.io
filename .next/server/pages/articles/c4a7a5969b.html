script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"北加里曼丹共产党主席文铭权贺信","authors":[],"dates":[{"year":1976,"month":7,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"北加里曼丹共产党主席文铭权贺信"},{"type":"paragraph","text":"新华社一九七六年七月二十日讯　北加里曼丹共产党中央委员会主席文铭权六月二十八日写信给中国共产党中央委员会，最热烈地祝贺中国共产党诞生五十五周年。"},{"type":"paragraph","text":"贺信说：“中国共产党五十五年的历史，是为无产阶级和劳动人民根本利益，为全人类解放而英勇战斗的历史，是同国际和国内形形色色的机会主义和修正主义的思潮、倾向、路线进行大无畏斗争，并不断取得胜利的历史，是毛泽东同志继承、捍卫和发展马克思列宁主义的历史。五十五年的历史证明，中国共产党是伟大、光荣、正确的党。”"},{"type":"paragraph","text":"贺信说：“在社会主义革命时期，毛泽东同志根据这个时期的革命实践，总结了国内外阶级斗争的经验，特别是汲取了苏联‘卫星上天，红旗落地’的教训，高瞻远瞩地提出了在无产阶级专政下继续革命的理论和措施。”“最近发表的毛泽东同志的指示更进一步指明了资本主义复辟的根子‘就在党内’，明确了社会主义革命时期的主要矛盾就是无产阶级同党内走资本主义道路当权派的矛盾，阐明了新资产阶级产生的经济基础和政治思想根源以及它的发展规律。毛泽东同志还把逐步限制以至最后消灭资产阶级法权和改造世界观的一系列措施提高到巩固无产阶级专政、防止资本主义复辟的战略高度来看待。在这一条基本路线指引下，中国共产党领导人民在社会主义革命和社会主义建设中取得了巨大的胜利，在史无前例的无产阶级文化大革命和当前反对右倾翻案风的斗争中，摧毁了以刘少奇和林彪为首的两个资产阶级司令部，撤除了邓小平在党内外的一切职务，取得了决定性的胜利，大大地加强了无产阶级专政。”"},{"type":"paragraph","text":"贺信说：“毛泽东同志关于在无产阶级专政条件下继续革命的理论极大地丰富了马克思列宁主义的宝库，是马克思列宁主义的一个新的、十分重大的发展。它不仅解决了在社会主义中国继续革命的问题，也揭示了苏联变成修正主义的根源。它使我们进一步看清了赫鲁晓夫和勃列日涅夫就是共产党内当权的资产阶级总头目，更加深刻地理解到路线是革命斗争中最本质、最关键的问题。苏联资本主义复辟之所以能得逞，就是因为苏共党内走资本主义道路的当权派得以在全党全国推行他们的修正主义路线，从而篡夺了党政大权的结果。今天他们已把伟大的列宁缔造的布尔什维克党变成法西斯的修正主义党，把社会主义的国家变成社会帝国主义国家。”"},{"type":"paragraph","text":"贺信说：“在伟大领袖毛泽东同志领导下，五十五年来的革命实践证明，中国共产党是国际无产阶级和共产主义运动完全可以信赖和十分可靠的党。它坚决支持世界各国人民反帝反霸的斗争，坚决支持世界无产阶级争取解放的革命事业。北加里曼丹共产党能够得到中国共产党的一贯支持，这对我们是极大的鼓舞。我们党将继续沿着毛泽东思想指引的道路，坚持反对我们党内出现的修正主义逆流的斗争，坚决把我们党建设成为一个真正高举马克思主义、列宁主义、毛泽东思想伟大红旗的党，把革命进行到底。我们坚信最后胜利一定是属于北加里曼丹人民的。”"},{"type":"paragraph","text":"贺信最后说：“我们衷心祝愿毛泽东同志健康长寿！衷心祝愿中国共产党在继续革命的战斗前线取得更加辉煌的胜利！”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"限制资产阶级法权","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c4a7a5969b"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
