script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji23","name":"毛泽东全集第23卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji23.pdf"],"article":{"title":"立足鲁西南粉碎敌驱我过黄河企图","alias":"","parts":[{"type":"paragraph","text":"立足鲁西南粉碎敌驱我过黄河企图1"},{"type":"paragraph","text":"（1947年8月5日）陈、粟、谭，华东局，并告刘、邓："},{"type":"paragraph","text":"各电均悉。（一）华东局仍应在胶东。陈率六、九纵应迅速转至东面，与谭及二、七纵会合，从反面钳制敌人，不使敌达到驱我过黄河目的。我们多次告诉你们，敌之基本计划是驱我过黄河，而不是迫我入滨海与胶东，你们必须重视此种企图。（二）但目前你们有五个纵队已到运河以西，正好协助刘邓执行出击计划。对于此种计划，刘邓及陈谢集团准备已久，非有特别重大情况，不应轻易动摇。根据刘邓江酉电，此次黄河大水已过，敌我均在抢修河堤，仍争取实现原计划。根据陈粟谭未支电，陈唐三个纵队此次行动中仅减员五千余，不算很大，不必补充人员，只须休息十大左右即可"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军委起草的给华东野战军司令员兼政治委员陈毅、副司令员粟裕、副政治委员谭震林和中共中央华东局的电报。"},{"type":"paragraph","text":"[2]刘、邓，指刘伯承、邓小平，当时分别任晋冀鲁豫野战军司令员和政治委员。"},{"type":"paragraph","text":"[3]陈谢集团，指由晋冀鲁豫野战军第四纵队、第九纵队、西北民主联军第三十八军和太岳军区第二十二旅组成的作战集团，集团前委书记陈、副书记谢富治。"},{"type":"paragraph","text":"[4]陈唐，指陈士、唐亮，当时分别任华东野战军参谋长和政治部主任。作战。各部略有损失即叫苦连天，你们应予指导。叶陶\"减员较多，应酌量补充，但亦非不得补充即不能作战。该五纵均应集中郓城，由刘邓指导整理。你们速派粟裕西去，统一指挥五纵，将全军供给重心经渤海转至鲁西南，争取在鲁西南立足，协助刘邓作战，否则有被敌驱过黄河危险，你们必须严重对付此种情况。（三）待刘邓南出最后决定并实现后，原先刘邓所得之供给可拨交粟裕，加上渤海供给即可支援五纵作战。冀鲁豫仍属邯郸局管理，但应指定暂作华东局机动地区，望刘邓区处。"},{"type":"paragraph","text":"中央军委"},{"type":"paragraph","text":"未微酉"},{"type":"paragraph","text":"[1]叶陶，指叶飞、陶勇，当时分别任华东野战军第一纵队司令员和第四纵队司令员。"}],"authors":["毛泽东"],"dates":[{"year":1947,"month":8,"day":5}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":180,"page_end":181},"tags":[{"name":"粟裕","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ecf0f05188"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
