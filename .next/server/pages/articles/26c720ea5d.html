<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"0b2f26ed-ad29-48e7-9c89-446932a97ab0","name":"中共党史教学参考资料 第27册 “文化大革命”参考资料 下册（1988年）","internal":true,"official":true,"type":"pdf","author":"","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives3/main/0b2f26ed-ad29-48e7-9c89-446932a97ab0.pdf"],"article":{"title":"毛泽东关于《水浒》的谈话","alias":"","parts":[{"type":"paragraph","text":"的经验。"},{"type":"paragraph","text":"许多单位的经验说明、领导班子认真贯彻执行毛主席的革命路线，坚持发扬党的理论联系实际、密切联系群众、批评与自我批评的优良作风，坚持唯物辩证法，深人进行调查研究，从实际情况出发解决问题，各项工作就会做得更好，革命和生产面貌就会迅速改观。"},{"type":"paragraph","text":"只有全心全意地依靠工人阶级，大搞群众运动，才能更好地贯彻执行毛主席的革命路线，迅速解决企业里存在的各种重大问题。这是今年以来铁路运输系统发展大好形势的又一重要经验。几个月来，全国铁路部门大张旗鼓地宣传毛主席、党中央的一系列指示，用毛主席、党中央的指示和无产阶级专政理论教育群众、动员群众、组织群众，使之成为广大职工的行动准绳。许多单位在加强领导班子的思想建设和组织建设的过程中，实行“开门整风”，发动广大党员和群众提意见，出主意，帮助领导班子端正路线，改进工作。有的单位批判修正主义、批判资本主义，收效甚大，也主要是由于充分发动了群众，调动了群众中极大的社会主义积极性。工人群众最听毛主席的话，群众知道了真理就会齐心去做。广大职工学习了毛主席、党中央的指示和无产阶级专政的理论，更加认清了工人阶级的伟大历史使命，进一步激发了他们当家做主人的责任感。在各个站段、工厂和工地上，“批修、批资、促生产”的无产阶级正气，“出满勤、干满点，各尽所能比贡献\"的共产主义思想，大大发扬。有些角落里的资产阶级派性以及一切资产阶级歪风邪气就象老鼠过街，人人喊打，处处受到抵制。许多单位的职工群众自觉地加强组织性纪律性，出现了反对违章，遵守纪律，团结协作，多拉快跑，努力提高运输效率的新局面。许多单位还放手发动群众，加强企业的基础工作、提高了企业的管理水平。"},{"type":"paragraph","text":"要真正做到全心全意地依靠工人阶级，必须从思想和政治路线的高度提商对这一问题的认识。在我国，工人是企业的主人。是依靠工人群众办企业，还是靠少数人办企业，这是毛主席的革命路线同修正主义路线的一个根本区别。要把社会主义企业建设成为无产阶级专政的坚强阵地，必须全心全意地依靠工人阶级。只要把形势和任务交给群众，放手发动群众，就没有克服不了的困难，没有解决不了的问题。"},{"type":"paragraph","text":"（新华社1975年7月28日讯，载7月29日《人民日报》）毛泽东关于《水浒》的谈话?"},{"type":"paragraph","text":"（一九七五年八月十四日）《水浒》这部书，好就好在投降。做反面教材，使人民都知道投降派。《水浒》只反贪官，不反皇帝。屏显盖于一百〇八人之外。宋江投降，搞修正主义，把1这是毛泽东同芦获（北京大学中文系教员）的谈话，谈话的当日，姚文元给毛泽东写信说：“关于《水浒》的评论“这个问题很重要”，“对于中国共产党人：中国无产阶级、贫下中农和一切革命群众在现在和将来、在本世纪和下世纪坚持马克思主义、反对修正主义：把毛主席的革命路线坚持下去，都有重要大的、深刻的意义。应当充分发挥这部·反面教材“的作用”，提出将毛泽东的这次谈话和他的信，“印发政治局在京同志，增发出版局、人民日报、红旗、光明日报、以及北京大批判组谢静宜同志和上海市委写作组”，并“组织或转载评论文章”。显的聚义厅改为忠义堂，让人招安了。宋江同高的斗争，是地主阶级内部这一派反对那一派的斗争。宋江投降了，就去打方腊。"},{"type":"paragraph","text":"这支农民起义队伍的领袖不好，投降。李逵、吴用、阮小二、阮小五、阮小七是好的，不愿意投降。"},{"type":"paragraph","text":"鲁迅评《水浒》评得好，他说：“一部《水浒》，说得很分明：因为不反对天子，所以大军一到，便受招安，替国家打别的强盗一不替天行道的强盗去了。终于是奴才”（《三闲集·流氓的变迁》)。"},{"type":"paragraph","text":"金圣叹把《水浒》砍掉了二十多回。砍掉了，不真实。鲁迅非常不满意金圣叹，专写了一篇评论金圣叹的文章《谈金圣叹》(见《南腔北调集》)。"},{"type":"paragraph","text":"《水浒》百回本，百二十回本和七十一回本，三种都要出。把鲁迅的那段评语印在前面"},{"type":"paragraph","text":"重视对《水浒》的评论"},{"type":"paragraph","text":"（一九七五年八月二十八日）"},{"type":"paragraph","text":"《红旗》杂志短评"},{"type":"paragraph","text":"为了开展对《水浒》的讨论和批判，本刊这期发表了鲁迅对《水浒》的一段评语，希望引起大家对这个问题的重视。"},{"type":"paragraph","text":"鲁迅评《水浒》评得好。他指出：“一部《水浒》，说得很分明：因为不反对天子，所以大军一到，便受招安，替国家打别的强盗一一不·替天行道'的强盗去了。终于是奴才。\"这个评语，完全正确。它指出了《水浒》的要害是“受招安”，即投降。原因是只反贪官，不反皇帝。从马克思主义的观点来看，《水浒》这部书，好就好在写了投降的全过程，歌颂了投降主义路线，使它可以用来作为一部有意义的反面教材。"},{"type":"paragraph","text":"毛主席指出：“无产阶级对于过去时代的文学艺术作品，也必须首先检查它们对待人民的态度如何，在历史上有无进步意义，而分别采取不同态度。”《水浒》是怎样对待梁山农民起义革命事业的奠基人显盖和农民起义的叛徒宋江的呢？它极力歌颂宋江，而把晃盖排除在一百零八人之外。这完全是为了宣扬投降。显盖死后，宋江窃取了梁山农民革命的领导权，他第一件事便是把聚义厅改为忠义堂，强行通过了争取“招安”的投降主义路线。宋江对晃盖起义路线的“修正”，是对农民革命的背叛，从这个意义上说，也就是搞修正主义。而《水浒》正是肯定和赞美了宋江的修正主义。当然，有投降，就有反投降。李逹、吴用、阮氏三兄弟不愿意投降，坚持了农民革命的立场。但由于领导权掌握在宋江手里，终于使这支农民起义队伍受了“招安”，去打方腊，做了反动统治阶级镇压其他起义军的帮凶。宋江的反革命道路证明：搞修正主义，必然要当投降派，出卖革命，充当反动派的走狗。这是一切修正主义者的特点。刘少奇、林彪推行修正主义路线，就是对内搞阶级投降主义，对外搞民族投降主义。从古代投降派宋江的身上，可以看到现代投降派的丑恶面目。"},{"type":"paragraph","text":"运用马克思主义的观点，进行阶级分析，《水浒》所描写的宋江同高的斗争，其实质I"}],"authors":["毛泽东"],"dates":[{"year":1975,"month":8,"day":14}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":294,"page_end":295},"tags":[{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"派性","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"26c720ea5d"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
