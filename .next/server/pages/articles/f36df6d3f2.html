<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoistlegacy.de-4736","name":"Notice from the CCP Center Commenting on and Transmitting the General Political Department’s 'Request for Instructions on the Proposal to Withdraw the Minutes of the February 1966 Military Literature and Art Work Meeting'","author":"中共中央","internal":false,"official":false,"type":"unknown","files":[],"article":{"title":"Notice from the CCP Center Commenting on and Transmitting the General Political Department’s 'Request for Instructions on the Proposal to Withdraw the Minutes of the February 1966 Military Literature and Art Work Meeting'","dates":[{"year":1979,"month":5,"day":3}],"is_range_date":false,"authors":["中共中央","总政治部"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"中共中央组织干审局, 干审工作政策文件选编(上), 712-715","tags":[],"parts":[{"type":"title","text":"Notice from the CCP Center Commenting on and Transmitting the General Political Department’s “Request for Instructions on the Proposal to Withdraw the Minutes of the February 1966 Military Literature and Art Work Meeting”"},{"type":"paragraph","text":"May 3, 1979"},{"type":"paragraph","text":"The Central Committee agrees with the General Political Department’s request of March 26, 1979, and has decided to withdraw Zhongfa (66) no. 211, that is the Minutes of the Military Literature and Art Work Meeting issued by the Central Committee. People and art work that were affected by the “Minutes” and were falsely criticized and dealt with should be rehabilitated based on the principle of Seeking Truth from Facts. Various levels of organizations and individuals that propagated and prosecuted the “Minutes” do not need to take any political responsibility. Now the request from the General Political Department is forwarded to you, and should not be published in any newspapers nor broadcast."},{"type":"subtitle","text":"The General Political Department’s \"Request for Instructions on the Proposal to Withdraw the Minutes of the February 1966 Military Literature and Art Work Meeting\""},{"type":"paragraph","text":"Party Center and Central Military Commission:"},{"type":"paragraph","text":"As the struggle to expose and criticize Lin Biao and “The Gang of Four” deepens, it has become increasingly clear that the so-called “Minutes of the Military Literature and Art Work Meeting” (hereinafter the “Minutes”) concocted by Jiang Qing together with Lin Biao was a maneuver in the conspiracy of Lin Biao and the “The Gang of Four” to usurp Party and state power. In late January 1966, Jiang Qing secretly travelled to Suzhou and planned the scheme with Lin Biao and Ye Qun. Then Lin Biao ordered the General Political Department to send people to attend the so called “Military Literature and Art Work Meeting” held by Jiang Qing in Shanghai. This provided the opportunity for Jiang Qing to interfere in military literature and art work. From February 2nd to 20th, Jiang Qing systematically delineated anti-party opinions in the meetings in accordance with her long-standing plot, proposing the theory of the “Dictatorial Black Line in Literature and Art”. The minutes of the meeting were written and edited by Jiang Qing, Zhang Chunqiao, and Chen Boda. The “Minutes” incorporated Lin Biao’s inglorious flattery of Jiang Qing stating that she is “good at politics, and professional in art” into official documents. At the same time, they also required the Military Literature and Art Departments to “diligently implement” Jiang Qing’s views at “ideological and organizational level.” Since the publication of the “Minutes,” a small group of careerists and conspirators who controlled the Central Party Committee such as Chen Boda, Kang Sheng, Zhang Chunqiao, Yao Wenyuan, Wang Guanqin and so on, has praised Lin Biao, the “Minutes,” and especially Jiang Qing, even calling her “the brave flag carrier of ‘The Cultural Revolution.’ ” They also broadened the theory of the “Dictatorial Black Line in Literature and Art” from literature and art to other frontiers like education, publication, sports, health, public security and so on."},{"type":"paragraph","text":"Over ten years practice has shown that the views and conclusions in the “Minutes” completely violate the fundamental principles of Marxism-Leninism and Mao Zedong Thought. They are also totally inconsistent with the reality of the front line of our country’s literature and art. The theory of the “Dictatorial Black Line in Literature and Art” in the “Minutes” completely undermines the literature and art program conducted by our Party since the establishment of the country. They also distort the orientation of proletarian literature and art mentioned by Chairman Mao in “The Yan’an Talks on Literature and Art.” They distort the principle of the Party character of proletarian literature and art. Under the banner of \"banishing superstition\" and \"total revolution,\" the \"Minutes\" reject the outstanding heritage of all Chinese and foreign classical literature. They completely negate the significant achievements of our literature and art industries in the 1930s, and trample over the honorable legacy of the New Culture Movement since “May Fourth” and the proletarian revolutionary Literature and Art Movement. The “Minutes” abandon the proletarian literature and art created since the creation of Marxism and promote counter-revolutionary cultural nihilism and feudal obscurantism. The “Minutes” show no consideration for the inherent rules of the literature and art industries and create many idealistic and metaphysical obstacles. They completely abandon Chairman Mao’s socialist literature and art policy of letting “a hundred flowers bloom and a hundred schools of thought contend,” as well as a series of proletarian policies. The thinking in the “Minutes” is that of anti-Marxist, anti-scientific and anti-democratic ideology of feudalistic cultural despotism. The road that the “Minutes” point to is the extreme leftist opportunist path that Lin Biao and “The Gang of Four” advocated."},{"type":"paragraph","text":"Over ten years of propagating and implementing the “Minutes” has brought disastrous results. Lin Biao and “The Gang of Four” used the “Minutes” to legitimize their fascist dictatorship in literature and art and the persecution of comrades. They randomly took flowers and called them poisonous weeds, treated artistic and ideological problems as political problems, treated conflicts within the people as anti-party, anti-socialist and counter-revolutionary issues, arbitrarily pointed out artworks and pronounced them to be “poisonous weeds,” arbitrarily vilified and persecuted revolutionary literature and art workers, and struggled against the so-called “Black Liners.” After the Shanghai meeting, based on Li Biao and Jiang Qing’s orders, and Jiang Qing’s way of “watching movies, looking for the Black Line,” thousands of comrades were attacked and negatively affected by their affiliations with around sixty movies that were accused for different reasons in the Military Literary and Art Work Meeting in Beijing. During the Meeting, Lin Biao ordered a “counter attack” on comrades who “attacked the Minutes.” Artists who expressed opinions about the Minutes, or disagreements or doubts, and showed some slight dissatisfaction, had to be labeled as “anti-Minutes,” “anti-Chairman Mao,” and “anti-party and anti-socialist” elements who had to be brutally struggled against and ruthlessly attacked. On 10 April 1966, after the “Minutes” were circulated as a central document, various military regions, departments and many local work units also held meetings implementing the “Minutes” and falsely struggled against and criticized many artists which caused many unjust, false and mistaken cases. Implementing the “Minutes” destroyed the allowing of a hundred flowers to bloom in literature and art. Literary and artistic creation reached an ideological impasse of ossification and phoniness. Literature and art has become impoverished, monotonous and repetitive, taking socialist literature and art into a blind alley and in fact destroying proletarian literature and art."},{"type":"paragraph","text":"After smashing “The Gang of Four,” the whole military and country criticized the counter-revolutionary theory of “Dictatorial Black Line in Literature and Art.” Many artists’ unjust, false and mistaken cases were rehabilitated and their blackened names were cleared. However, the fact that the “Minutes” was issued as a central document and has not been withdrawn has become a spiritual barrier for some artists, and affected the complete rehabilitation of some unjust, false and mistaken cases. Therefore, we advise the Central Committee officially decide to withdraw this document, to rehabilitate falsely criticized people and falsely handled cases affected by the “Minutes” based on the principle of Seeking Truth from Facts, and not to ask for different levels of organizations and individuals to take political responsibility of propagating and executing the “Minutes.”"},{"type":"paragraph","text":"With respect to the suggestions above, please comment, whether in agreement or otherwise."},{"type":"subtitle","text":"General Political Department March 26 1979"},{"type":"paragraph","text":"Translated by the Maoist Legacy Project team"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f36df6d3f2"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
