<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"高桥化工厂狠批修正主义企业路线挖掘资源节约用煤","authors":[],"dates":[{"year":1969,"month":2,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　上海高桥化工厂广大革命职工遵循伟大领袖毛主席“要节约闹革命”的伟大号召，充分挖掘资源，把原来放空烧掉的石油气，用作锅炉燃料，为国家节约大量的煤。"},{"type":"paragraph","text":"这个厂是石油综合利用的工厂，每年有大量过剩的石油气，过去一直是通过火炬白白烧掉，不但造成大量的浪费，而且严重影响周围农作物的生长。工人同志看在眼里，痛在心里。在无产阶级文化大革命以前，很多工人曾多次提出建议，要求将“废气”作为锅炉的燃料，既可以解决火炬所造成的“后遗症”，又能节约大量煤炭。可是，厂里的资产阶级技术“权威”威胁工人说:“废气烧掉是理所当然的，如果废气利用不好会引起爆炸，你们负得起责任吗?”并对工人下了禁令，不准工人再作试验。"},{"type":"paragraph","text":"厂革委会成立以后，工人阶级掌了权。广大工人同志学习了毛主席关于“要节约闹革命”等一系列指示，狠狠批判了刘少奇的反革命修正主义企业路线，他们对过去厂里那种触目惊心的浪费激起无比的愤恨，更深刻地认识到节约和浪费，这是毛主席的无产阶级革命路线同刘少奇的修正主义企业路线的一场搏斗，浪费国家财物就是对人民犯罪。于是，他们又把废气利用的问题提了出来，这个革命的建议立即得到厂革委会和驻厂人民解放军毛泽东思想宣传队的大力支持，并为试验创造了很好条件，工人同志们激动地说:“我们一定要为毛主席争气，一定要迅速试验成功。”"},{"type":"paragraph","text":"工人同志在紧张的试验安装过程中，受到旧的习惯势力的不断干扰，但是，工人同志对于一边把石油气白白烧掉，一边大量地烧煤的不合理现象，再也不能忍耐，他们响亮地回答:“蒸汽我们保证正常供应，节煤试验我们搞定了。”他们作了大量的调查研究，多次开“诸葛亮”会议，终于打破旧框框，提出了一套切实可行的办法。广大工人同志以冲天革命干劲，日夜奋战，主动地互相配合，仅仅花了一个多星期的时间就全部完成任务。经实践证明，锅炉运行完全正常，同时用煤的效率也提高了，每天至少可以节约二十到三十吨煤，全年可以为国家节约二十万元。"},{"type":"paragraph","text":"(红化兵供稿)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"de37edfc5d"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
