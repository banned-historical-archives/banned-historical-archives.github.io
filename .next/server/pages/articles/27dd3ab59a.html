script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"斯洛伐克共产党中央全会通过决议  批判民族主义和修正主义  积极宣传莫斯科宣言　加强对资产阶级思想斗争","authors":[],"dates":[{"year":1958,"month":1,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"斯洛伐克共产党中央全会通过决议"},{"type":"paragraph","text":"批判民族主义和修正主义"},{"type":"paragraph","text":"积极宣传莫斯科宣言　加强对资产阶级思想斗争"},{"type":"paragraph","text":"新华社布拉格11日电　据捷克斯洛伐克通讯社报道：斯洛伐克共产党中央委员会于1月9日到10日在布拉迪斯拉发举行了会议。会议根据捷克斯洛伐克共产党中央委员会1957年12月20日的决议的精神讨论了各国共产党和工人党莫斯科代表会议的结论，并且讨论了斯洛伐克共产党面临的主要意识形态问题和捷克斯洛伐克共产党中央委员会去年6月的会议所规定的任务。"},{"type":"paragraph","text":"捷共中央政治局委员、斯洛伐克共产党中央委员会第一书记巴契列克作了关于这些问题的报告。斯洛伐克共产党中央委员会就这个报告通过了一个决议，决定在1958年5月16日到18日召开斯洛伐克共产党代表大会。"},{"type":"paragraph","text":"在这个决议中，斯洛伐克共产党中央委员会表示完全同意捷共中央对各国共产党和工人党莫斯科会议的结果所通过的结论。决议说，从莫斯科会谈看来以及从捷共中央1957年6月和12月所举行的会议看来和从我们斯洛伐克党工作的经验看来，下列这些思想意识上的问题今天成了最重要的问题：以捷克斯洛伐克社会主义爱国主义和无产阶级国际主义的精神来教育我们的人民；加强我们共和国各族人民的团结；与此同时对资产阶级思想进行斗争，我们必须比以前更加一致而具体地领导这种斗争，特别是对资产阶级民族主义和修正主义的斗争。"},{"type":"paragraph","text":"决议说，斯洛伐克劳动人民已经多次在他们的历史上表明：他们认为捷克斯洛伐克共和国是唯一自然和合法的国家单位；捷克人和斯洛伐克人生活在一个共同的国家内——这是捷克和斯洛伐克劳动人民亘古以来的愿望。"},{"type":"paragraph","text":"决议说，经验表明，今天捷克斯洛伐克社会主义建设的最大危险之一是斯洛伐克资产阶级民族主义的残余。在思想意识领域中，斯洛伐克共产党今天面临着的重要任务是加强和坚持不懈地领导有效的思想意识斗争、特别是反对法西斯分子——牧师的影响以及资产阶级民族主义的任何表现的斗争。"},{"type":"paragraph","text":"决议接着提到斯洛伐克共产党在思想意识工作方面的主要任务：要通过一切宣传工具来解释宣言与和平宣言中的主张，加强同苏联的兄弟般的关系，解释苏联共产党在国际共产主义和工人运动中的领导作用，教育人民使他们以属于社会主义阵营而感到自豪和痛恨帝国主义，动员人民积极参加争取和平的斗争，担负起在捷克斯洛伐克胜利建设社会主义的责任，加强他们的团结和坚决拥护捷克斯洛伐克共产党中央委员会。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"27dd3ab59a"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
