script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"五届人大代表、五届政协常委、河北省革委会副主任  朱理治同志在京逝世  叶剑英邓小平李先念聂荣臻陈云余秋里王震谷牧陈慕华康克清季方王首道等送了花圈，李先念王震谷牧康克清季方粟裕等参加追悼会","authors":[],"dates":[{"year":1978,"month":4,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"五届人大代表、五届政协常委、河北省革委会副主任"},{"type":"paragraph","text":"朱理治同志在京逝世"},{"type":"paragraph","text":"叶剑英邓小平李先念聂荣臻陈云余秋里王震谷牧陈慕华康克清季方王首道等送了花圈，李先念王震谷牧康克清季方粟裕等参加追悼会"},{"type":"paragraph","text":"新华社北京四月十五日电 第五届全国人民代表大会代表、政协第五届全国委员会常委、河北省革命委员会副主任朱理治同志，因病医治无效，于一九七八年四月九日在北京逝世，终年七十一岁。"},{"type":"paragraph","text":"朱理治同志追悼会今天下午在八宝山革命公墓礼堂举行。"},{"type":"paragraph","text":"中共中央副主席叶剑英、邓小平、李先念，人大常委会副委员长聂荣臻、陈云，国务院副总理余秋里、王震、谷牧、陈慕华，政协全国委员会副主席康克清、季方、王首道，人大常委会、国务院、政协全国委员会、中共中央组织部、中共中央统战部、国家计委、中共河北省委、河北省革命委员会、中国人民解放军河北省军区和河北省直属各单位送了花圈。"},{"type":"paragraph","text":"中共中央副主席李先念，国务院副总理王震、谷牧，政协全国委员会副主席康克清、季方，中共中央军委负责人粟裕参加了追悼会。中共中央、中央国家机关、中共河北省委、河北省革委会和有关方面的负责人、朱理治同志的生前友好胡耀邦、童小鹏、齐燕铭、武新宇、王金山、吕玉兰、郭志、尹喆、曾美、谷奇峰、刘英、王桂华、洪毅、张平化、周子健、程子华、姚依林、肖劲光、李葆华、陈国栋、肖克、袁任远、曾志、郭述申、曹菊如、郭洪涛、刘春、孔原、郭影秋、陈琮英、刘澜波、林佳楣、刘型、贺诚、程坦、贺彪、胡乔木、高文华、蹇先任、张邦英、朱涤新、熊天荆，以及河北省直属各单位的代表五百多人也参加了追悼会。"},{"type":"paragraph","text":"追悼会由刘子厚同志主持，马辉同志致悼词。悼词说：朱理治同志是江苏省南通县人，一九二七年四月加入中国共产党，同年七月参加革命工作。朱理治同志历任中共清华大学支部书记，中共北京西郊区委书记，青年团江苏省委组织部长、书记，中共河北省委组织部长、中共河北省委代理书记、副书记，陕北苏区中央局及华北局驻陕甘代表团书记，陕甘宁省委书记，陕甘边省委书记，中央驻东北军特派员。抗日战争时期，朱理治同志历任中共河南省委书记，中原局委员、代理书记，新四军五师政委，陕甘宁边区银行行长，西北财经办事处副主任兼计划委员会主任。解放战争时期，朱理治同志历任中共洮南地委书记，北满分局秘书长，东北野战军后勤部副部长，东北银行总经理等职务。全国解放后，朱理治同志历任东北人民政府计划委员会副主任，全国核资委员会副主任，中央财委物资分配局局长，交通部副部长、党组副书记，中央财经小组成员兼国家计委副主任，华北局候补书记、书记。"},{"type":"paragraph","text":"朱理治同志是中国共产党的优秀党员，是中国人民的忠诚战士。几十年来，在伟大领袖和导师毛主席、党中央领导下，无论在革命战争年代，还是全国解放后，他坚持学习马列主义、毛泽东思想，努力改造世界观，认真贯彻执行毛主席的无产阶级革命路线。他热爱毛主席，忠于党、忠于人民、忠于社会主义事业。他坚持原则，敢于斗争；光明磊落，作风正派；廉洁奉公，埋头苦干；严于责己，宽以待人，勤勤恳恳为人民服务，为共产主义事业贡献了自己的一生。"},{"type":"paragraph","text":"朱理治同志的一生，是革命的一生，战斗的一生。在革命战争的艰苦岁月里，为反对国民党反动派统治，他努力发展壮大党的力量，积极开展武装斗争；抗日战争爆发后，他发动群众，发展壮大人民武装力量，同日本帝国主义进行了不屈不挠的斗争；解放战争时期，他致力于东北的经济工作和政权建设；在社会主义革命和社会主义建设中，他坚持继续革命，坚持社会主义方向，为党为人民做了大量工作，成绩卓著。"},{"type":"paragraph","text":"朱理治同志热烈拥护毛主席亲自发动和领导的无产阶级文化大革命。到河北省工作后，他发扬党的优良传统和作风，密切联系群众，深入基层，调查研究，坚决贯彻执行毛主席的革命路线和政策。他对“四人帮”的倒行逆施无比愤慨，对我党粉碎“四人帮”的伟大胜利，感到由衷的高兴。他以实际行动为实现华主席提出的抓纲治国的战略决策献出了自己的全部力量。直到病重住院期间，还念念不忘河北的工作。"},{"type":"paragraph","text":"悼词说：朱理治同志的逝世，使我们失去了一位老同志、老战友，使我党失去了一位老党员、老干部。我们悼念朱理治同志，要化悲痛为力量，学习他热爱毛主席，刻苦学习马列主义，忠于党，忠于人民的革命精神；学习他任劳任怨，兢兢业业，勤勤恳恳的工作态度；学习他艰苦朴素，谦虚谨慎，深入群众，平易近人的好作风。要高举毛主席的伟大旗帜，更加紧密地团结在以英明领袖华主席为首的党中央周围，坚持党的十一大路线，把揭批“四人帮”的伟大斗争进行到底。要努力完成五届人大提出的新的历史时期的总任务，为建设社会主义的现代化强国，作出应有的贡献。（附图片）"},{"type":"paragraph","text":"朱理治同志遗像"},{"type":"paragraph","text":"新华社发"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"叶剑英","type":"人物"},{"name":"李先念","type":"人物"},{"name":"粟裕","type":"人物"},{"name":"谷牧","type":"人物"},{"name":"聂荣臻","type":"人物"},{"name":"王震","type":"人物"},{"name":"康克清","type":"人物"},{"name":"陈云","type":"人物"},{"name":"余秋里","type":"人物"},{"name":"四人帮","type":"人物"},{"name":"河北文革","type":"人物"},{"name":"江苏文革","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"51c2f84264"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
