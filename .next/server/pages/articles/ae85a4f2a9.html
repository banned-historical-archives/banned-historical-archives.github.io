script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji20","name":"毛泽东全集第20卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji20.pdf"],"article":{"title":"争取时间在粤北湘南创立五岭根据地","alias":"","parts":[{"type":"paragraph","text":"争取时间在粤北湘南创立五岭根据地"},{"type":"paragraph","text":"（1945年7月22日）王震、首道\"："},{"type":"paragraph","text":"（一）巧电悉。桃花山、金家坪在何处，沿途情况如何，估计多少时间到达五岭山脉？"},{"type":"paragraph","text":"（二）日寇为对付盟军在山东登陆，由湘桂抽调五个师［团】北开，并非放弃华南。但为缩短防线，已放弃南宁、柳州、赣州等处，还可能放弃若干地点。但至少他要固守广州及整个粤汉路。吉安、袁州并未被占，商人所传不确。"},{"type":"paragraph","text":"（三）三巨头在柏林开会将决定欧、亚两大问题。宋子文?赴苏会谈十余天，尚未解决问题。三巨头会后，宋仍将赴苏，可能决定中"},{"type":"paragraph","text":"[1]王震，当时任湖南人民抗日救国军司令员。首道，即王首道，当时任湖南人民抗日救国军政治委员。"},{"type":"paragraph","text":"[2]桃花山、金家坪，均位于湖南省平江县西南。[3]袁州，今江西省宜春县。"},{"type":"paragraph","text":"[4]三巨头，指苏、美、英3国首脑斯大林、杜鲁门、丘吉尔。1945年7月17日至8月2日，3国首脑（会议后期英国首脑为继任首相艾德礼）和外长在德国柏林西南的波茨坦举行会议，着重讨论战后对德国的基本政治、经济原则等问题。会议期间，中、美、英3国于7月26日发表促令日本无条件投降的《波茨坦公告》。苏共同作战。蒋介石一切准备都是反共的，内战危险空前严重。"},{"type":"paragraph","text":"（四）你们的唯一任务是争取目前一刻千金的时间，在粤北湘南创立五岭根据地，并与广东我军连成一片，准备于内战时牵制南方一翼。完成这个任务将遇到极大困难，但只要内外团结，政策正确，是能够完成的。不要希望在浏醴衡宝\"一带建立根据地，蒋介石必于日寇失败后出死力铲除这些根据地，那时将使我军处于不利地位。应该一直往南，建立五岭根据地，利用湘粤桂赣四省交界之矛盾，日寇失败后我亦可以立脚。此外，和东江纵队会合，使他们获得援助，保存并发展这个多年创立的南方力量，避免可能的失败，具有极大战略意义，也要你们去完成。看问题要把眼光放远一点，不要被一时现象所迷惑。"},{"type":"paragraph","text":"（五）谦虚谨慎，不骄不躁，是全党应取的态度。谦虚则不骄，谨慎则不躁，骄与躁是革命工作的大敌。希望你们以此自守，并教育一切干部。"},{"type":"paragraph","text":"（六）凡事要设想一切可能的困难，例如严重的敌情，打败仗，无饭吃，部队不但无扩大而且很大缩少，内部意见分歧，不团结等等。只有对这一切预先想透，有了充分精神准备，并使干部有此种准备，然后才能想出克服困难的办法，走向光明的前途。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"午养[1]浏醴衡宝，指湖南浏阳、醴陵、衡阳和宝庆（今邵阳)。[2]1943年12月2日，活动于广东东江地区的广东人民抗日游击总队"}],"authors":["毛泽东"],"dates":[{"year":1945,"month":7,"day":22}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":179,"page_end":180},"tags":[{"name":"毛泽东","type":"人物"},{"name":"王震","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ae85a4f2a9"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
