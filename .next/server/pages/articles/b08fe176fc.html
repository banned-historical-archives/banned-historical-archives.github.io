script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"第三世界国家加强团结维护民族权益  达荷美总统强调发展中国家团结合作和依靠自己力量  马来西亚报纸指出必须打破新老殖民主义控制和剥削","authors":[],"dates":[{"year":1974,"month":3,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"第三世界国家加强团结维护民族权益"},{"type":"paragraph","text":"达荷美总统强调发展中国家团结合作和依靠自己力量"},{"type":"paragraph","text":"马来西亚报纸指出必须打破新老殖民主义控制和剥削"},{"type":"paragraph","text":"新华社一九七四年三月二十一日讯　科托努消息：达荷美共和国总统马蒂厄·克雷库最近在对“电视新闻”世界电视公司的一次电视谈话中指出，在目前人们大谈石油危机、价格普遍上涨的时候，富国拚命想把它们的法律强加于人，在这种情况下，“我们只有依靠自己才能得救”。他又说，加强发展中国家特别是非洲国家的团结空前必要。"},{"type":"paragraph","text":"克雷库总统说：“为了使这一团结能起到作用并具体体现出来，每个国家必须采取能够减少国民经济对外部的依赖的国内措施。因此特别需要每个国家坚决选择真正民族独立的政策，这一政策丝毫不排除在互相尊重国家主权的基础上的双边和多边合作。”他说：“为了有效地同进口品价格的普遍上涨进行斗争，我们已决定要求我们全国同胞生产更多和生产得更好，并且把他们的消费转向我们的许多当地产品上。”"},{"type":"paragraph","text":"新华社一九七四年三月二十四日讯　吉隆坡消息：马来西亚《星槟日报》三月二十日就最近召开的第四次不结盟国家首脑会议的常设局会议发表社论指出，第三世界国家必须团结一致，打破新老殖民主义的控制和剥削。"},{"type":"paragraph","text":"社论说，新老殖民主义“利用它们的政治军事压力到不发达国家进行殖民地侵略，占有其丰富资源，以廉价把原料运回去，大肆发展工业，然后再以高价售卖给世界各地，包括其殖民地和发展中国家。如此双重剥削，直到殖民地国家纷纷取得独立后，仍然没有改善。殖民主义者通过各种政治、经济压力，迫使取得独立不久的国家听命于它们的控制。”"},{"type":"paragraph","text":"社论指出，这种局面，在七十年代已经逐渐被打破，例如阿拉伯国家以石油为武器来对付美国及西方国家，终于产生巨大的效果。“这强烈地说明时代已经在转变，发展中国家，尤其是不结盟国家，开始寻求各种途径来捍卫其政治独立。”"},{"type":"paragraph","text":"社论说，除了石油之外，发展中国家的原料产品尚有橡胶、锡、铜、铁、煤、棕油、椰油、稻米等等。"},{"type":"paragraph","text":"社论指出，在阿尔及尔召开的第四次不结盟国家首脑会议的常设局会议“是受剥削国家开始向富有国谈判合理价格的第一个重要和必要的步骤。”“第三世界必须力求砸破外国资本对发展中国家经济的全面控制和约束，达致政治、经济乃至军事上的完全独立。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b08fe176fc"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
