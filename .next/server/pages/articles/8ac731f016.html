script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"在反击右倾翻案风斗争推动下  全国商业供销战线大力支援春耕","authors":[],"dates":[{"year":1976,"month":4,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"在反击右倾翻案风斗争推动下"},{"type":"paragraph","text":"全国商业供销战线大力支援春耕"},{"type":"paragraph","text":"新华社一九七六年四月六日讯　在反击右倾翻案风的斗争中，全国商业、供销战线的广大职工，以阶级斗争为纲，坚持党的基本路线，积极开展春耕生产资料的供应工作，为大办农业，普及大寨县作出新贡献。"},{"type":"paragraph","text":"今春以来各地商业、供销部门的广大职工，在各级党委的领导下，积极投入了反击右倾翻案风的斗争。他们认真学习毛主席的重要指示，学习马列和毛主席关于阶级斗争的论述，深入批判党内那个不肯改悔的走资派抛出的“三项指示为纲”的修正主义纲领，坚持用无产阶级政治统帅各项业务，全面推动支农工作，以实际行动回击右倾翻案风。据有关部门统计，从去年十一月到今年二月底，各地商业、供销部门供应农村社队的化肥、农药、农药器械、中小农具、各种农用机具配件、铅丝、元钉和农用柴油等农业生产资料，比往年同期都有较大幅度的增加。目前，大批农业生产资料，正源源送往春耕生产第一线。"},{"type":"paragraph","text":"去冬以来，在深入贯彻全国农业学大寨会议精神中，各地商业、供销部门认真学习大寨的根本经验，并且根据农业学大寨、普及大寨县运动的要求，制定了支援农业的规划和措施，大力开展支农服务活动。许多地区的商业和供销部门派出干部深入农村调查研究，及时安排农业生产资料的供应工作，并配合交通运输部门组织安排好运输力量，力求不违农时地把春耕物资运送到生产第一线。"},{"type":"paragraph","text":"许多地区的商业、供销部门为了给农村提供数量多、质量好的农业生产资料，主动向生产部门反映群众的要求，设法提高产品质量，降低生产成本，促进生产发展。"},{"type":"paragraph","text":"各地根据农业发展对肥料、农药需要量不断增加的新情况，帮助有关工业企业发扬自力更生的革命精神，大办沼气，积极生产土化肥、土农药，广辟肥源和药源。仅据北京、天津、河北、山东、黑龙江、吉林、辽宁、广东、广西、河南、上海等省、市、自治区的统计，从去冬到现在，各级商业、供销部门为基层供销社和社队培训技术骨干十二万多人，帮助社队办好生产厂、点，生产土化肥四百六十万吨，生产土农药二万多吨。同时，帮助社队维修和胶粘各种农机具一百七十三万多件。他们还组织大批支农服务队，走出店门，帮助社队培训技术骨干，开展合理用肥、安全用药、节约用油、维修农机具等活动，受到了广大贫下中农的欢迎。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8ac731f016"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
