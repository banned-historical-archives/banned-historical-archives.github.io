script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"骆耕漠讲按劳分配与资产阶级法权及生产力要素等问题","authors":["尹声"],"dates":[{"year":1962,"month":3,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"二月下旬，经济学家骆耕漠应邀到武汉大学讲学。他在武汉大学作了《按劳分配原则和资产阶级法权》与《关于生产力二要素或三要素问题的研究》等报告。"},{"type":"paragraph","text":"在论述按劳分配原则和资产阶级法权时，他强调指出，按劳分配原则包含两种属性，即第一，它具有平等性，是无产阶级法权；第二，具有不平等性，也就是资产阶级法权。接着，他详细论证了按劳分配原则是无产阶级法权这一个方面，认为:按劳分配原则首先是社会主义革命胜利以后出现的新产物，是革命胜利后社会主义制度下产生的革命的、平等的无产阶级法权；这一属性是它的主要属性，占据主导的一面。与此同时，他也论述了所谓资产阶级法权，以及按劳分配原则在什么意义下又是资产阶级法权这个问题。在总观“按劳分配原则”这个问题时，他十分强调既要两点论，又要有主次，还要分清对象、分清阶段这种具体分析事物的实事求是的态度。"},{"type":"paragraph","text":"关于生产力二要素或三要素问题的研究，他曾在《关于生产关系的几个理论问题的研究》一文中，对其中的所有制问题、生产关系总和问题以及生产关系和经济基础问题，提出了自己的初步看法。在这次报告中，他指出:人们为获得所需的生活资料而进行生产活动时，必须具备三个要素，那就是:(一)人们本身的劳动力；(二)劳动资料或称劳动手段，其中最主要的为劳动工具，此外还包括劳动所需要的场所——土地、工场等；(三)劳动对象，如木工所加工的木料，矿工所采掘的地下蕴藏——这后一类劳动对象是纯粹的自然物，即自然资源。他主张生产力应该为三要素，把劳动对象也列为生产力要素之一，是因为它与其它两个要素(劳动力和劳动工具)一样，都是人们能生产出多少产品的决定因素，不过是从不同方面发生作用而已:一是作用于劳动对象的力量，一是可以被劳动力和劳动工具改造(变形或变质)的力量。(尹声)"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"限制资产阶级法权","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"37c6474286"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
