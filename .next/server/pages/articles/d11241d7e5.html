" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoistlegacy.de-2319","name":"浙江省杭州市中级人民法院刑事判决书【张永生】","author":"浙江省杭州市中级人民法院","internal":false,"official":false,"type":"unknown","files":[],"article":{"title":"浙江省杭州市中级人民法院刑事判决书【张永生】","dates":[{"year":1979,"month":4,"day":3}],"is_range_date":false,"authors":["浙江省杭州市中级人民法院"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"《历史的审判（续集）》编辑组，历史的审判（续集），456-458","tags":[{"name":"打砸抢","type":"主题/事件"},{"name":"判决书","type":"主题/事件"},{"name":"四人帮","type":"主题/事件"},{"name":"现行反革命","type":"主题/事件"},{"name":"张永生","type":"主题/事件"},{"name":"浙江","type":"主题/事件"}],"parts":[{"type":"title","text":"浙江省杭州市中级人民法院刑事判决书"},{"type":"subtitle","text":"杭法刑初字（79）第5号"},{"type":"paragraph","text":"公诉机关：浙江省人民检察院。"},{"type":"paragraph","text":"罪犯张永生，男，三十九岁，安徽省含山县人，家庭出身工人，本人成份学生，原系浙江美术学院学生，一九六九年五月混入中国共产党，先后窃取浙江省革委会副主任、省委委员等职。一九七五年十月调离浙江下放劳动，现在押。"},{"type":"paragraph","text":"案由：现行反革命。"},{"type":"paragraph","text":"案经广大人民群众检举、揭发，公安机关调查、予审，浙江省人民检察院提起公诉，本院依法审理，查明："},{"type":"paragraph","text":"罪犯张永生，思想极端反动，野心勃勃，在林彪、“四人帮”反革命集团的怂恿和支持下，破坏无产阶级专政，破坏社会主义革命和社会主义建设，大搞篡党夺权反革命活动，犯下了一系列极为严重的反革命罪行。"},{"type":"paragraph","text":"张犯积极投靠、追随林彪、“四人帮”反革命集团，纠集一小撮反革命分子、打砸抢分子、杀人犯、流氓阿飞等坏人，拼凑资产阶级邦派体系，大搞打砸抢，镇压革命干部和群众。一九六七年以来不断与林彪反革命集团在浙江的死党及其代理人秘密策划，多次制造武装镇压广大革命群众的大规模流血事件，仅肖山、丽水、诸暨等地就被打死打伤六百余人，烧毁大批民房，造成不少干部、群众家破人亡，妻离子散。一九七四年，张犯伙同反革命分子翁森鹤、贺贤春，在全省普遍建立了为其篡党夺权服务的第二武装，任意抓人，私设监狱，私设公堂，刑讯逼供，在全省挑起大规模的武斗，造成不少地区机关瘫痪，工厂停工，学校停课，商店停业，交通阻塞，邮电中断，使人民生命财产遭受严重损夫，使全省国民经济遭到严重破坏。"},{"type":"paragraph","text":"张犯长期以来，竭力追随林彪、“四人帮”反革命集团，疯狂进行篡党夺权的阴谋活动。向“四人帮”提供了大批黑材料。张犯根据“四人帮”的旨意，竭力破坏清查林彪反革命集团的罪行。张犯及其资产阶级帮派体系，千方百计强行释放大批在押的杀人犯，让他们继续为非作恶，残害人民，造成严重恶果。张犯积极策划建立“批林批孔小组”，层层揪所谓“复辟势力代表人物”，大搞突击入党、突击提干，狂叫“要尖、要硬、要韧，要象一把锋利的刺刀”、“拼出一条命同走资派斗”，一度篡夺省委和各级党委的领导权。"},{"type":"paragraph","text":"张犯肆无忌惮地收集和私整中央领导同志的黑材料，诽谤、陷害老一辈无产阶级革命家和大批革命领导干部。“四人帮”被粉碎后，顽固坚持反革命立场，极端仇视这一伟大胜利。策划反革命应变，转移窝藏大批黑材料，研究对策，订立攻守同盟，叫嚣要“豁出命来干一场！”还煽动他人印制、散发反革命传单，反革命气焰极为嚣张。"},{"type":"paragraph","text":"上列罪行，事实清楚，证据确凿。"},{"type":"paragraph","text":"本院认为：现行反革命犯张永生出于其反革命罪恶目的，犯下了一系列反党、反人民、反社会主义，妄图颠复无产阶级专政，复辟资本主义的反革命罪行，是一个罪恶累累的现行反革命分子，是我省资产阶级邦派体系的总头目，是危害社会，残害人民的打砸抢策划者和指挥者，是大乱整个浙江的罪魁祸首。给全省在政治上、思想上、组织上、经济上造成极大的危害和巨大的损失，广大人民群众无不切齿痛恨。为了严肃国法，根据中华人民共和国宪法第八条、第十八条和中华人民共和国惩治反革命条例第二条、第十条二、三款、第十七条之规定及“坦白从宽，抗拒从严”的政策，特判决如下："},{"type":"paragraph","text":"判处现行反革命犯张永生无期徒刑，剥夺政治权利终身。"},{"type":"paragraph","text":"如不服本判决，可在接到判决书后次日起十天内，向本院提出上诉书一式二份，上诉于浙江省高级人民法院。"},{"type":"subtitle","text":"一九七九年四月三日"}],"alias":""},"tags":[{"name":"林彪","type":"人物"},{"name":"四人帮","type":"人物"},{"name":"浙江文革","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"批林批孔","type":"主题/事件"},{"name":"武斗","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d11241d7e5"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
