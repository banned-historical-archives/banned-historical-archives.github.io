" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji42","name":"毛泽东全集第42卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji42.pdf"],"article":{"title":"对卡斯特罗关于发展中古关系的建议的批语","alias":"","parts":[{"type":"paragraph","text":"对卡斯特罗关于发展中古关系的建议的批语2]"},{"type":"paragraph","text":"（1959年8月19日）恩来、陈毅同志："},{"type":"paragraph","text":"这件事处理了没有？似宜派一位相当于公使或代办级的有政治头脑的同志去，以新华社分社长或记者资格驻古巴，是否可行，请酌。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"八月十九日[1]卡斯特罗，当时任古巴武装部队总司令。"},{"type":"paragraph","text":"[2]这个批语写在中共中央宣传部副部长姚1959年8月4日给外交部、外办、中联部的电报上。电报说，在古巴期间，卡斯特罗两次接见了我们。在谈到古巴和中国的关系时，他说应当把事情想得远一些，建议设法在哈瓦那的新华社机构中增加一位中国方面的较重要的人，作为中国的非正式的代表机构，进行宣传和各种联系工作。这样逐步把各种工作进行起来，将来水到渠成，就可以正式替代蒋介石方面驻古巴大使馆。"},{"type":"paragraph","text":"[3]陈毅，当时任国务院副总理兼外交部部长。"}],"authors":["毛泽东"],"dates":[{"year":1959,"month":8,"day":19}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":309,"page_end":309},"tags":[{"name":"陈毅","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9f9fdea3fc"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
