<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"齐泽国关于镇压反革命工作给毛泽东的报告","authors":["河北省固安县","齐泽国"],"dates":[{"year":1951,"month":6,"day":13}],"is_range_date":false,"parts":[{"text":"齐泽国关于镇压反革命工作给毛泽东的报告","type":"title"},{"text":"河北省固安县齐泽国","type":"authors"},{"text":"[齐泽国：中共河北省固安县委书记]","type":"subtitle"},{"text":"毛主席：","type":"appellation"},{"text":"兹将河北省固安县的镇压反革命工作向您报告如下：","type":"paragraph"},{"text":"我县共有人口二十一万二千零五十四人。镇压反革命工作是三月上旬开始的。在党委统一领导下，全体干部都投入了这一工作。两个月来，由于全体干部的积极努力，广大群众的热烈拥护，第一批抓杀任务，基本上已顺利完成。","type":"paragraph"},{"text":"县委学习与领会了中央镇压反革命的精神，在行动前作了充分准备，特别是事先掌握了材料，并将逮捕名单经县委反复研究，一一审查确定，下区对照，进行监视。然后组织了县、区干部181名，公安、武装二十名，民兵六十名，首先进行了充分的思想动员，以县区委、公安局股长、政府科长以上的干部为领导核心，分别交待了任务，在地委统一指挥下于三月八日下午一齐动手，除个别逮捕对象侥幸逃脱外，其余二百四十五名反革命罪犯都同时落于了人民的法网。由于行动的迅速和稳、准，未出一点偏差。","type":"paragraph"},{"text":"逮捕后立即审讯，临时抽调了富有审讯能力的干部十八名，掌握了先易后难、先杀后判的精神，强调了不逼不打、不轻易戴刑具的原则，经过群众的检举和控诉，公安机关的侦调，犯人的自供，和对隐匿不说、顽强抵抗的犯人采取同案对证等办法迅速完成了审讯工作。判死刑已执行的七十三名，判死刑上报未批回的150名，处徒刑的二六名，释放回村进行管制的四名。已经杀了的，仅占全县人口的千分之0.34强。","type":"paragraph"},{"text":"抓杀后，普遍在全县集镇、较大的村庄、党干训练班、县区村三级扩干大会、各界抗美援朝代表会、控诉会及“三八”妇女节、“五一”劳动节、“五四”青年节等庆祝大会，利用农村庙会等各种场合进行了大张旗鼓的宣传。主要结合抗美援朝、反对美帝国主义武装日本的爱国运动，贯彻了镇压反革命政策，揭发了反革命分子的罪恶。特别是五月三日控诉并枪决三十名反革命罪犯时，引起全场近三万群众义愤填胸，异口同声的高呼报仇！要求政府处决杀人凶犯！在枪决每批反革命罪犯时，均张贴布告、印刷大批宣传品。由于注意了宣传工作，对群众教育很大。因而也扭转了群众对我过去片面宽大的不满情绪，提高了思想觉悟。总之我之镇压反革命，可谓大快人心，各阶层人民群众普遍表示拥护，如“拥护毛主席的二十一条！”“政府有办法。”“抓的准！杀的对！”等语，普遍流露在群众的谈话中。说：“非这么办邪气压不下去！”回民马连元说：“政府若许挂匾，我非组织乡亲去挂不可！”马公庄天主教堂的神父说：“该断不断，反受其乱！”（意思是该杀即杀，不然也是祸根）区村干部（特别是村干部）也都说：“政府杀了反革命分子，群众情绪振奋起来，各种工作都好推动了！”如被佛教统治的大杜庄村，工作垮了台，无法整顿，得不到真实情况。自杀了反动道首李德恒（所谓皇上）后，群众情绪高涨起来，原定四十五天的河工， 二十七天即完成了。并有六十余名男女青年经常上民校。全村百分之六十的群众参加了抗美援朝“五一”游行大示威。超计划完成了植棉任务。","type":"paragraph"},{"text":"自从广泛开展抗美援朝、镇压反革命以来，敌焰大降，民气大伸，反革命势力开始动摇恐惧而自首，如有些反革命分子主动找到政府要求立功赎罪，有的畏罪自杀。有的誓言今后不再做坏事，决心改悔。蛮子营反攻地主把还给农民而未交出的房子，竟修好后请分户去住。平日不劳动的顽伪人员，现在也向我区、村干部要求去打河堤。广大群众的觉悟普遍提高，生产情绪极为高涨。因而有力地推动了春耕、春种及巨大的河工（永定河）各项工作。","type":"paragraph"},{"text":"以上成绩虽然不少，但缺点却也很多，我们决不满足于现状，现正继续大张旗鼓地开展这一运动。","type":"paragraph"},{"text":"敬祝您身体永远健康！","type":"paragraph"},{"text":" 一九五一年六月十三日","type":"paragraph"}],"comments":[],"origin":"《华北各省县委书记关于镇压反革命工作给毛主席的报告（第一辑）》，中国共产党中央华北局办公厅编印·1951年8月。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"31d8390fc8"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
