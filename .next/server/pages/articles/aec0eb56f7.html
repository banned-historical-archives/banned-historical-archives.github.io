" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"吴德对北京国棉二厂“八.二三武斗”的讲话","authors":["吴德"],"dates":[{"year":1967,"month":8}],"is_range_date":false,"parts":[{"text":"吴德对北京国棉二厂“八·二三”武斗的讲话","type":"title"},{"text":"吴德","type":"authors"},{"text":"〖时间：八月下旬〗","type":"appellation"},{"text":"我现在传达谢副总理和革命委员会的指示，希望你们马上执行。他们的指示就是要你们立即停止战斗，并且要拆除你们的据点、工事！并且要把你们的武器、凶器统统交出来，交给军管会。你们因为武斗已经停产四、五天了，你们武斗破坏了国家财产，你们把你们的宿舍区，什么暖气片也拆了，什么砖瓦都放在你们工事里边了，窗子统统打烂了，这不都是国家财产吗？你们难道不痛心吗？为什么有不同观点不可以辩论？不可以用四大武器来解决，而互相残杀呢？这种行为是犯罪行为！不要上坏人的当，要提高警惕，如果有人挑动你们武斗，你们应该按照毛泽东思想把他揪出来。你们应该对你们那些要你们去武斗的头头、造他们的反。","type":"paragraph"},{"text":"现在有一些风气，说什么要揪北京的陈再道，要抓军队一小撮，我告诉同志们，我们北京卫戍区的部队以及其他驻军，整个的来说，在文化大革命里边，三军两支的工作是好的，至于个别地方个别人还有某些缺点和错误，但是，不能把矛头指向人民解放军。","type":"paragraph"}],"comments":[],"origin":"1967年8月30日红代会清华井冈山一部第三动态组编《动态》第136期","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"吴德","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"武斗","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"aec0eb56f7"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
