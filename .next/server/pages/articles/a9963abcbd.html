script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"罗马尼亚“火花报”列举事实证明  修正主义者为垄断资本服务","authors":[],"dates":[{"year":1958,"month":6,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"罗马尼亚“火花报”列举事实证明"},{"type":"paragraph","text":"修正主义者为垄断资本服务"},{"type":"paragraph","text":"新华社布加勒斯特11日电　为纪念罗马尼亚实行国有化十周年，这里的“火花报”11日发表社论说：罗马尼亚的经验再一次证明了掌握国家政权的工人阶级所实行的社会主义国有化和某些资本主义国家所实行的国有化的根本不同。"},{"type":"paragraph","text":"社论指出，资本主义国家的国有化没有给资本主义经济结构和社会关系带来任何变化，而是最有利于垄断资本家的事情。在英国，由于煤矿的国有化，矿主每年可以得到一亿英镑的酬金。这种国有化扩大了资本家的收入，加强了对工人阶级的剥削，没有丝毫社会主义气味。"},{"type":"paragraph","text":"社论说，改良主义者和修正主义者认为，资产阶级国家是超于社会之上而为普遍的福利服务的，它对工人和资本家一视同仁，根据情况需要对工人和资本家轮流加以限制，此外还会促使在国家垄断资本主义内部产生社会主义因素。但是，人们不难看出，提出这种理论的人究竟是为谁的利益服务；根据这种理论，杜勒斯先生辞去国际镍公司董事长和洛克菲勒基金会主席的职务而担任国务卿，乃是为了限制垄断资本而照料社会主义在美国的诞生！"},{"type":"paragraph","text":"社论在介绍罗马尼亚实行国有化十年来所取得的伟大成就时指出，罗马尼亚社会主义工业在1948年的时候需要用一年时间生产的电力、生铁和天然气，在1957年用三个月就能够生产出来，1957年四个多月里生产的石油、钢和煤炭，一个半月生产的拖拉机，就等于1948年一年的产量。"},{"type":"paragraph","text":"社论指出，罗马尼亚的经验证实了建设新社会制度的普遍规律的正确性。罗马尼亚社会主义建设之所以取得巨大成就是由于党所实行的正确路线，它坚决拒绝了修正主义的反马克思主义理论；修正主义者认为社会主义会自发地发展而反对社会主义的国家在经济方面根据民主集中制原则进行有组织的活动和计划管理。"},{"type":"paragraph","text":"社论说，在我国国有化的最初时期，“美国之音”、“自由欧洲”电台和西方的报刊曾经预言，没有他们的帮助我们什么也做不成。但是十年过去了，事实证明，那些先生们看错了。事实证明工人阶级把企业管理得比资产阶级好得多。"},{"type":"paragraph","text":"社论还谈到社会主义国家的兄弟合作，并且指出，罗马尼亚在实行国有化中取得的成就首先是同苏联的多方面援助分不开的。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a9963abcbd"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
