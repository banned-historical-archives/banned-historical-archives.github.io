<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共中央关于河南省土地改革条例修改问题给中南局的批复","authors":[],"dates":[{"year":1950,"month":2,"day":10}],"is_range_date":false,"parts":[{"text":"中共中央关于河南省土地改革条例修改问题给中南局的批复","type":"title"},{"text":"中南局：","type":"appellation"},{"text":"丑鱼发来之子陷电悉。关于河南土地改革条例所提各问题，答复如下：","type":"paragraph"},{"text":"一、废除高利贷，在原则上是没有问题的。但目前农村借贷关系中的主要问题，是如何解决农民借不到钱的困难。一般提出废债口号，将更增加这种困难，因此，政务院修改时未在条例上规定。如农民具体提出要求解决某项高利贷债务时，则可按减租减息条例所规定的办法解决。","type":"paragraph"},{"text":"二、条例第二条中所谓超过当地中农水平，就是指一般中农的平均水平。其所以这样规定，是因为富农是参加农业主要劳动的，这样做在政策上更明显，表明对地主与富农的区别，有利于生产，有利于团结与稳定中农，也便于分化地主富农，减少他们对土地改革的阻力。至于在解放以后上升起来的新式富农和佃富农，除佃富农租种之地主的土地应予没收分配外，其余土地财产均应保护不动。","type":"paragraph"},{"text":"三、地主旧式富农的浮财，除已规定之四项外，一般亦以不动为宜。","type":"paragraph"},{"text":"四、政务院修改后的条例第六条中，关于“其土地数量，在当地每人平均土地数目百分之一百五十以下者，不得没收”之规定，是为了对因缺乏劳动力或从事其他职业而出租之“少量土地”划一界限，如超过此界限，在成分上虽不规定他们是地主或富农，但其超过之土地，自应予以没收分配，而不能保留他们过多的土地。","type":"paragraph"},{"text":"五、全国解放，荣军一般应遣回原籍安置，故不必留过多之机动土地，以备安置外籍荣军。因现在已全国解放，已没有很多外籍荣军。","type":"paragraph"},{"text":"六、成立贫农团极易脱离中农，也易发生过左错误。故政务院修改后的条例只提出“为了保障贫雇农应得的利益，得单独召集贫雇农大会或代表会议”，而未提成立贫农团，现亦不必再做补充。","type":"paragraph"},{"text":"七、对来电第七项所列举的家居乡村的旧人员、自由职业者及公营企业中的工作人员等及其家属的分地问题，均可按政务院修改后的条例第十条乙项处理，即其职业足以维持生活费用之全部或大部者，可不分或少分，不必另行规定。","type":"paragraph"},{"text":"八、军人家属不必规定多分土地。流氓分子的界限很难掌握，亦不必明文规定只给使用权不给所有权。国家将来兴修铁路、公路、水利所需占用之土地，如果目前已经确定者可以留出，如尚\u003c未\u003e确定修建者则不必留，届时可由国家征用或征购。","type":"paragraph"},{"text":"九、政务院修改后的条例第十条甲项规定可以多分一份土地者，是只有一两口人的贫苦而能劳动的农民，鳏寡孤独本不在内，故不必再规定鳏寡孤独不得多分土地。","type":"paragraph"},{"text":"十、同意来电第十二项所提没收、征收之地富外庄田属地分配的意见，但可写到你们拟发布的土地改革条例执行细则中去，而不必补入政务院修改后的条例中，以免又要呈请政务院批准。来电第十三项所提之土改后废除累进税则改行比例税则的意见可以宣传，但不必作明文规定。至于“谁种谁收”这个口号我们认为仍然是应该提出的。农民不应该分得别人所耕种的青苗。","type":"paragraph"},{"text":" 中央丑灰","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a2d301bcaf"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
