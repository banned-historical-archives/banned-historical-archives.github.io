" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共中央关于抓紧生产小商品的指示","authors":[],"dates":[{"year":1960,"month":5,"day":16}],"is_range_date":false,"parts":[{"text":"中共中央关于抓紧生产小商品的指示","type":"title"},{"text":"上海局，各省、市、自治区党委：","type":"appellation"},{"text":"在人民的日常生活中，需要多种多样的小商品，例如日用小百货、小五金、零星的生活用品、家庭用品和一些小农副产品等。这些小商品供应得充分，人民生活就感到方便；供应得不充分，人民生活就感到不方便。小商品在社会商品供应中占有重要地位，大体估算，约占社会商品流通总额的百分之三十到四十。因此，抓紧小商品的生产，不仅是有关人民生活的重要问题，而且是有关吸收社会购买力，稳定市场物价的重要问题。去年六月中央在上海召开了全国大中城市副食品生产和手工业生产会议以后，各 地党委对这方面的工作抓得很紧，小商品的生产得到了恢复和发展，使去年第四季度和今年第一季度小商品的供应情况有了很大的改进。但是据有关部门的反映，最近某些小商品的生产，又有减少的趋势。减少的主要原因是由于某些地区最近没有抓紧小商品生产，以致有些原来使用于小商品生产的原料材料，又被其他方面挤掉了，有些生产小商品的工厂，又改产别的东西了，小商品品种不全的情况已经开始在市场上有所表现（如蝇拍子、卫生球和仁丹等夏令小商品已出现供不应求的情况），如果不及早注意抓紧，再过一个时期，小商品供应不足的现象还会更加显著，因此，中央要求各省、市、自治区党委对小商品生产问题加以注意，认真地进行一次讨论，切实安排原料材料，切实安排制造能力，务必做到各地的小商品生产，在品种上和数量上，比去年第四季度和今年第一季度不仅不减少，而且还有增加。 同时，还应当继续抓紧废品回收工作和“小夏收”、“小秋收”运动，一年四季都要抓，丝毫不要放松。","type":"paragraph"},{"text":" 中　央一九六o年五月十六日","type":"paragraph"}],"comments":[],"origin":"根据中共中央文件刊印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"21d0932343"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
