script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"热烈庆祝巴基斯坦日杜拉尼临时代办举行招待会　邓代总理等出席　宾主共祝中巴两国友好关系在万隆精神的基础上不断发展","authors":[],"dates":[{"year":1965,"month":3,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京23日电　巴基斯坦驻中国大使馆临时代办杜拉尼今晚举行招待会，热烈庆祝巴基斯坦日。"},{"type":"paragraph","text":"国务院代总理邓小平，副总理李先念，人大常委会副委员长郭沫若、杨明轩、林枫，政协全国委员全副主席沈雁冰，国防委员全副主席蔡廷锴等应邀出席了招待会。"},{"type":"paragraph","text":"我国领导人和各方面的人士，同巴基斯坦驻中国大使罗查的夫人、杜拉尼临时代办等，在招待会上举杯，共祝中巴两国的友好关系在万隆精神的基础上不断发展。"},{"type":"paragraph","text":"杜拉尼临时代办代表罗查大使在招待会上讲话。他说，今天是巴基斯坦日，同时又是穆罕默德·阿尤布·汗元帅再度当选为巴基斯坦总统宣誓就职的日子。阿尤布·汗总统将继续为巴基斯坦贡献他的力量，我们全国对未来是充满信心的。"},{"type":"paragraph","text":"他说，巴基斯坦在国际方面致力于和平的事业，它以大小国家一律平等为基础，对所有国家实行友好政策。我们认为，一切爱好和平的国家都有责任维护所有国家一律平等的原则以及和平解决一切国际争端的原则。"},{"type":"paragraph","text":"他说，巴基斯坦同所有持有相同意见的国家合作来实现这些目标。在同伟大的邻邦中国的关系中，我们一贯遵循这些原则。"},{"type":"paragraph","text":"他谈到巴中两国领导人的访问密切了相互的了解。他说，这是符合我们两国人民的利益、符合这个地区的和平、亚非团结以及世界和平的利益的。他祝愿中国人民在建设中获得新的成就。"},{"type":"paragraph","text":"临时代办还谈到，巴基斯坦希望今年六月在阿尔及尔顺利召开第二次亚非会议。"},{"type":"paragraph","text":"李先念副总理在招待会上讲话，他代表中国政府和人民向巴基斯坦政府和人民，向阿尤布·汗总统表示热烈的祝贺。"},{"type":"paragraph","text":"李先念副总理说，巴基斯坦政府和人民在建设自己国家、发展民族经济和民族文化等各方面取得了很大成就。巴基斯坦执行独立自主政策，对促进亚非团结和维护世界和平，作出了积极的贡献。"},{"type":"paragraph","text":"他说，中巴两国的友谊，在双方决心为维护和发扬万隆精神的基础上，近年来不断巩固和发展。阿尤布·汗总统最近到我国访问，在两国关系史上写下了新的篇章。"},{"type":"paragraph","text":"李先念副总理说，陈毅副总理兼外交部长正在访问巴基斯坦途中。在访问期间，中巴两国将签订中巴边界议定书和中巴文化合作协定。中巴边界议定书的签订，表明中巴边界的标定工作全部完成了。"},{"type":"paragraph","text":"他强调说，亚非国家只要彼此有友好合作的真诚愿望、共同信守万隆会议十项原则、平等协商、互谅互让，那么，我们之间历史遗留下来的边界问题，是完全可以解决的。中巴边界问题的圆满解决，是万隆精神的新胜利。中国人民很高兴，巴基斯坦人民很高兴，亚非人民和一切爱好和平的人民都很高兴。的确，如果不是存心要破坏亚非团结、破坏万隆会议十项原则，那怎么会不高兴呢。中国人民将一如既往为发扬万隆会议十项原则，为发展中巴友好关系和亚非各国的友好合作而继续努力。"},{"type":"paragraph","text":"应邀出席招待会的，还有外交部副部长刘新权，以及政府其他有关部门、各人民团体、各民主党派和北京市的负责人，中国人民解放军的将军们。"},{"type":"paragraph","text":"各国驻中国使节也应邀出席了招待会。"},{"type":"paragraph","text":"招待会结束后，中外来宾欣赏了正在中国访问的巴基斯坦民间舞蹈团的精采演出。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"李先念","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0dc4d82284"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
