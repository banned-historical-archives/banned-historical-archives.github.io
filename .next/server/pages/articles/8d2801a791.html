script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"批臭反革命修正主义黑货  提高革命职工阶级觉悟  阜新煤矿生产一月胜过一月","authors":[],"dates":[{"year":1968,"month":5,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"批臭反革命修正主义黑货  提高革命职工阶级觉悟"},{"type":"paragraph","text":"阜新煤矿生产一月胜过一月"},{"type":"paragraph","text":"五月上旬，煤炭日产量和日掘进进度比上月同期分别平均提高百分之九和百分之十五点七；露天矿的日剥离量比上月同期提高百分之二十二点五"},{"type":"paragraph","text":"据新华社沈阳十五日电　辽宁省阜新矿务局广大革命职工，在人民解放军毛泽东思想宣传队的帮助下，牢记毛主席“千万不要忘记阶级斗争”的教导，狠抓阶级斗争，深入持久地开展革命大批判，不断地把革命和生产推向前进，各方面工作都出现了新的气象。现在，全矿区所有的厂矿都成立了革命委员会，生产蒸蒸日上，一月胜过一月。"},{"type":"paragraph","text":"阜新煤矿是辽宁省的重要煤炭生产基地之一。这个矿区的广大革命职工高举毛泽东思想伟大红旗，牢牢掌握斗争大方向，以战无不胜的毛泽东思想为武器，向中国赫鲁晓夫及其在当地的代理人发动了猛烈进攻。全局上下，从井上到井下，从生产现场到工人宿舍区，开展了一场声势浩大的狠批中国赫鲁晓夫反革命修正主义路线的人民战争，批判了“技术第一”、“专家路线”、“金钱挂帅”和“物质刺激”等修正主义黑货。最近，广大革命职工学习了毛主席关于阶级和阶级斗争的教导，以及毛主席的一系列最新指示，并联系当前阶级斗争的实际，狠批了中国赫鲁晓夫的“阶级斗争熄灭”论，进一步提高了阶级斗争观念。广大革命职工以昂扬的斗志，主动地向无产阶级的敌人发起了新的进攻，粉碎了一小撮敌人妄图破坏革命、破坏生产和进行翻案的阴谋活动。"},{"type":"paragraph","text":"矿区的广大革命职工认真贯彻执行毛主席“抓革命，促生产”的伟大方针，坚持用革命统帅生产。各厂矿的革命领导干部和矿工们一起参加劳动，一起活学活用毛主席著作，一起批判中国赫鲁晓夫，上下拧成一股绳，使生产日日上升。特别是五月份以来，各厂矿的生产又有很大提高。据统计，从五月一日到九日，整个矿区的煤炭日产量和日掘进进度比上月同期分别平均提高百分之九和百分之十五点七；露天矿的日剥离量比上月同期提高百分之二十二点五。在抓革命促生产的群众运动中，出现了一些先进单位。平安煤矿在今年以来，月月超额完成任务，在五月上旬已给国家多生产了六千多吨煤炭，成为全矿区的一面红旗。很多基层单位还开展比、学、赶、帮的社会主义劳动竞赛，好人好事不断涌现。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"辽宁文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"人民战争","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8d2801a791"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
