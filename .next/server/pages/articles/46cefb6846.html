" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji15","name":"毛泽东全集第15卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji15.pdf"],"article":{"title":"在中共中央政治局会议上的讲话","alias":"","parts":[{"type":"paragraph","text":"在中共中央政治局会议上的讲话\""},{"type":"paragraph","text":"（1941年2月23日）"},{"type":"paragraph","text":"目前时局仍无大变，周恩来已将十二条要求交参政会秘书长王世杰，国民党非常着急。在皖南事变时国民党非常强硬。到蒋发表谈话?后，缩小范围，逐渐软下来，因为他们怕中间派同情我们，又怕军人动摇，胡宗南、陈诚3、卫立煌等都表示不愿马上内战，更怕国际压力。所以在周将公函交王世杰时，王要求收回缓发两天。宋美龄说蒋吃软不吃硬，实际上蒋对我们是吃硬欺软。我党目前只有两种态度，一种是敷衍，另一种是采用政治攻势，像我起草的复周恩来电和叶剑英复张冲电的态度。"},{"type":"paragraph","text":"[1]这是毛泽东在中共中央政治局会议上，对为中央书记处起草的关于前时局复周恩来电的说明的主要内容。[2]指蒋介石1月27日在重庆国民党中央纪念周上的讲话。"}],"authors":["毛泽东"],"dates":[{"year":1941,"month":2,"day":23}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":449,"page_end":449},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"46cefb6846"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
