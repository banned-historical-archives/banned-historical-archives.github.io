script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"红小兵火车轮前救女孩金卫公社八二中小学十岁红小兵张雪观，不顾个人安危，冲向铁轨，救出被奔驰而来的列车吓呆了的小女孩，周围群众连声称赞他不愧是毛主席的红小兵","authors":[],"dates":[{"year":1976,"month":7,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"六月十三日中午，一列从金山县西站向闵行方向奔驰的货车刚过弯道，司机忽然发现铁道钢轨中间站着一个四、五岁的小女孩，立即拉响紧急汽笛，连忙刹车。可是，年幼的小女孩被这突如其来的情形吓慌了，仍然站在钢轨中间，哇哇大哭。列车由于惯性作用，还是飞速向前滑行，距离孩子只有五十米、三十米、二十米……眼看一场严重的伤亡事故就要发生，情况万分危急。这时，红小兵张雪观正在离铁道不远的邻居家里玩。当他听到尖厉的火车汽笛声和大人们紧张的呼喊声后，急忙从屋里奔出来，只见一列火车正向一个小女孩压过去。就在这千钧一发之际，小张机智勇敢地冲向铁道，飞快地抱起孩子，一个翻身滚下了铁轨。几乎就在同时，列车擦身而过，停于前方十米远的地方。周围群众纷纷围上来，连声称赞张雪观真不愧是毛主席的红小兵。被救小孩的父母感动得热泪盈眶，半晌说不出话来。司机跑下车来，紧紧搂住小张，激动地说:“你真是一位小英雄，毛泽东时代的好学生，我们要好好向你学习!”"},{"type":"paragraph","text":"张雪观是金山县金卫公社八二中小学四年级学生，今年十周岁，出身在一个贫农家庭，是一名优秀的红小兵。他能在危急中忘我救人，是平时努力学习毛主席著作、积极参加批邓斗争的结果。为了学习革命理论，他常常抄写毛主席语录到深夜。班级理论组学习，他总是积极参加。在批邓斗争中，他接连写了《批邓烈火越烧越旺》等批判文章，几次上台批判邓小平反革命的修正主义路线，还用革命儿歌热情歌颂文化大革命，歌颂社会主义新生事物。平时，他爱看描写革命英雄的小人书，以英雄人物为榜样，敢于同坏人坏事作斗争。"},{"type":"paragraph","text":"石油化工总厂办到小张的家乡，他心里有说不出的高兴。他串连了七、八个红小兵，组成了一支义务巡逻队，坚持利用假日和晚上时间，在附近的铁路、公路、厂区等地方巡逻。今年四月的一天上午，小张和一个同学发现有两个家伙在偷偷地剪石油化工总厂的铁丝网。这引起了小张他们的高度警惕。他们机智地躲在旁边观察，发现这两个家伙是在搞偷窃活动，非常气愤，马上一跃而起，大声吆喝:“这是国家的财产，不许拿走!”这两个家伙一看是两个小孩子，就从口袋里掏出了钱，装着笑脸说:“小弟弟，不要响，给你们钞票，拿去买糖吃。”小张他们齐声吼道:“谁要你们的臭钱!”最后，他们把这两个盗窃国家财产的坏家伙扭送到有关单位处理。　(本报通讯员)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9dcc4bfef8"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
