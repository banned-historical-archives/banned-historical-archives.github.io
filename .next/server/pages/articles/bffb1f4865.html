script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji25","name":"毛泽东全集第25卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji25.pdf"],"article":{"title":"将介石政府正在覆没","alias":"","parts":[{"type":"paragraph","text":"蒋介石政府正在覆没！"},{"type":"paragraph","text":"（1948年11月14日）"},{"type":"paragraph","text":"【新华社陕北十四日电】中国最后一个专制王朝蒋介石政府，正在象一只破船一样地从历史上沉没。蒋介石虽已完全绝望，仍然决定要打到底。蒋介石所谓要打到底就是他不愿投降，宁愿将他现在还剩下的二百几十万军队打光。就令如此，人民解放军消灭全部反动军队的日子已经不远了。战争第三年的头四个月，国民党已经丧失一百万军队，其中约有五十万是在十月份丧失的。约有四十万丧失于东北。十一月份的灾难不会比十月份轻。徐州战场的崩溃，数十万军队的覆灭，现正等待着国民党。而更重要的，则是丧失徐州等于丧失整个长江以北，等于丧失国民党军队的最后脊骨，因此，国民党正在努力挣扎。当蒋介石假装慷概地把华北的指挥权交给傅作义，把武汉和徐州的指挥权交给白崇禧的时候，他是看到长江以北已经完了，打算把自己的嫡系撤退到长江以南去。但是他的计划已经来不及实现。南线和北线，蒋介石都没有什么完整的战线了。北线的太原、保定、承德、大同、归绥诸点早已互相不能联结了。北平、天津、唐山、张家口诸点的联结亦时被破坏。南线也是如此，徐州、汉口、西安三大中心已经不成一条什么战线。这只是三"},{"type":"paragraph","text":"[1]这是新华社的述评。其中用宋体字排印的为毛泽东加写和改写的个据点及在这三个据点附近摆了三堆军队，当然不成什么战线了。长江以南，国民党的战线还没有建立，并且是建立不起来的了。对于这种形势，不但蒋介石的左右，而且连蒋介石自己在内，无不极度悲观。据悉，蒋介石由沈回平，闻锦州失守，极度悲痛，召开军事会议，谋求“死里求生”。其他消息称：辽西廖耀湘兵团全军覆没后，蒋介石在北平吐血，回南京后又连续吐血。蒋介石回南京以后，一方面是面对着徐州的危急情况，另一方面是面对着金圆券和限价崩溃后经济战线特别是粮食的危急情况。上海的米价一周内由每石八十金圆涨到一千八百金圆，南京的米荒使十日一天内一百家米店被抢。南京行政院长一职自翁文灏辞职后至今无人敢就。南京的要人们纷纷准备向两广及台湾逃难，并谈论着迁都广州的问题。李宗仁、何应钦、白崇禧之流正在活动着逼迫蒋介石“下野”。为了准备下一步，为了夺取“反蒋”的领导权，蒋介石嫡系中的某些分子也参加了这个活动。被称为官方反派的特务分子“立法委员”刘不同，公开著文主张蒋介石出国并“恢复和平”。他们的目的是想用“和平”的方法替反动派保留下一些力量。因此他们的活动，与人民反对反革命内战的斗争所遭遇者相反，并未受过禁止。但蒋介石现在还不愿接受他们的建议。蒋介石在八日发表演说称：“我个人平生做事的态度是一件事不开始则已，一开始就一定要求其成功；任何职责不轻易担任，一经担任就决定负责到底。”这是说，你们要我下台，我是不想下台的。蒋介石安慰他的部下说：“这次东北军事虽然失败，但在关内政治、经济、军事各方面的基础丝毫没有动摇。与共匪实力比较，仍然居于优势。”这只是在说谎。蒋介石的政治、经济、军事各方面的基础根本上已在崩溃，他的什么“优势”已经不存在了。批"},{"type":"paragraph","text":"美爱毛泽东修改新华社述评《蒋介石政府正在覆没》的手稿（部分）。"}],"authors":["毛泽东"],"dates":[{"year":1948,"month":11,"day":14}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":217,"page_end":219},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bffb1f4865"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
