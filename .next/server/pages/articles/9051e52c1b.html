" crossorigin="">{"props":{"pageProps":{"books":[{"id":"173b340b-3108-4ae1-be57-d3fa78bb471a","name":"毛泽东思想万岁（1943-1949卷）（1968年武汉版）","internal":true,"official":false,"type":"pdf","author":"1968年5月，钢二司武汉大学总部、中南民院革委会宣传部、武汉师院革委会宣传部","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives3/main/173b340b-3108-4ae1-be57-d3fa78bb471a.pdf"],"article":{"title":"关于全边区部队学习“红四军九次党代表大会决议”的指示","alias":"","parts":[{"type":"paragraph","text":"复美洲洪门总干部监督司徒美堂等人的电报"},{"type":"paragraph","text":"（一九四一年三月十四：日）"},{"type":"paragraph","text":"美国豹全美洲洪门总干部监督司徒美堂先生、阮本万先生、部长吕超然先生助鉴拌转全美洲侨胞公鉴"},{"type":"paragraph","text":"奉读一月八日来电，关怀组国，呼吁团结，敬佩无已。中国今日决不能同时进行既对外又对内之两个战争，必须完全取消国民党当局的反共计划，并逐亲日派，团结全力，以与日寇相搏斗，抗战始有胜利可期。乃自蒋介石下合消灭皖南新四军及于-一-月十七日发表宣布新四军叛变，取消该军番号，及将军长叶挺交付法庭审判之反革命命合以后，国共合作，已迁严重之危机。国民党中亲日派与反共派之横行，已直接予全民抗战以极大之提害。当此民族有之千钧一发之时，亲日派分子如不被逐，反共派分子如不放弃其两个战争的计划，一党专政如不取消，民主政治如不实行，三民主义如不现，总理遭嘱如不服从，中华民族之前途，必被葬送于此辈之手。中国共产党始以民族利益为重，坚持抗日民族统一战政策迄未稍变，唯对于亲日派及反共派危害抗战之溶天罪行，不得不课所以制裁之道，业向政府当局提出时局善后办法及临时办法各十二条，尚祈公等一致主张，予以赞助，以期迅速见之实行，团结幸甚，抗战幸甚。"},{"type":"paragraph","text":"（原载《新中华报》一九四-年三月二十日）"},{"type":"paragraph","text":"关于全边区部队学习“红四军九次党代表大会决”的指示"},{"type":"paragraph","text":"（一九四二年一月二十三日）××、莫文二同志："},{"type":"paragraph","text":"将四军九次大会决多印数千份，发至留守部队及晋西北部队，发至连长为止，每人一本，发一通知，叫他们当作课材加以熟（各级干部均须熟）。"},{"type":"paragraph","text":"毛泽东一月二十三日"},{"type":"paragraph","text":"（《解放日报》一九四二年四月二十五日）中共中央关于执行土地政策决定的策略的指示"},{"type":"paragraph","text":"（一九四二年二月四日）"},{"type":"paragraph","text":"（一）中央政治局一月二十八日所通过的关于抗日根据地土地政策的决定，是粽合五年来各地经验而得到的结。它的基本精神是先要能够把广大的农民群众发动起来。如果群众不能起来，则一切无从起。在群众眞正发动起来后，叉要让地主能够生存下去。所以在经济上只是削弱（一定要削弱）封建势力而不是消灭封建势力。对富农则是削弱其封建部分，而奖励其资本主义部分。在经济上，目前我党的政策系奖励资本主义生产为主，但同时保存地主的若干权利，可以是-一个七分资本三分封建的政策。在政治上则实行三三制，使地主"}],"authors":["毛泽东"],"dates":[{"year":1942,"month":1,"day":23}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":240,"page_end":240},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9051e52c1b"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
