script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"今年出版的第一期《红旗》杂志  发表《列宁主义和现代修正主义》等文章","authors":[],"dates":[{"year":1963,"month":1,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"今年出版的第一期《红旗》杂志"},{"type":"paragraph","text":"发表《列宁主义和现代修正主义》等文章"},{"type":"paragraph","text":"新华社四日讯　一九六三年第一期《红旗》杂志将于一月五日出版。"},{"type":"paragraph","text":"这一期的社论的题目是《列宁主义和现代修正主义》。社论指出了现代修正主义对国际共产主义运动的严重的危害性和反对现代修正主义的重大意义，并且分析了在新的历史条件下，马克思列宁主义和机会主义斗争的情况。社论用大部分篇幅揭露和批判了现代修正主义在关于我们时代的看法、无产阶级革命和无产阶级专政、关于争取世界和平和和平共处等一系列重大问题上，对于伟大列宁学说的歪曲和糟蹋。社论还分析了现代修正主义产生的根源和反对现代修正主义斗争的有利形势。"},{"type":"paragraph","text":"这一期《红旗》杂志发表的文章中有邵铁真写的《革命的辩证法和对帝国主义的认识》。文中论述了马克思列宁主义者怎样用辩证法和阶级分析的观点去认识帝国主义和一切反动派的本质。文章指出，毛泽东同志关于帝国主义和一切反动派都是纸老虎的论点同马克思、恩格斯和列宁的论点完全一致，现代修正主义者反对马克思列宁主义的这一论点，只是表明了他们完全不懂得革命的辩证法，不相信革命人民的力量。"},{"type":"paragraph","text":"牧惠写的《是共产主义呢，还是个人主义？》一文指出，现代修正主义文学脱离了社会主义文艺的传统，不是为提高人民的社会主义觉悟、培养人民的共产主义道德而斗争，而是在欺骗的幌子下竭力宣传资产阶级个人主义和自由主义。"},{"type":"paragraph","text":"闻师润写的《既要重视政治，又要重视专业》这篇文章，说明知识分子必须重视政治，重视思想改造，自觉地用自己的专业来为无产阶级政治服务，必须用极大的努力精通自己的专业，以韧性的战斗精神克服各种困难，使自己成为专门人材，为国家建设作出贡献。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5fdb53d22b"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
