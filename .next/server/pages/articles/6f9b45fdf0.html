" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji47","name":"毛泽东全集第47卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji47.pdf"],"article":{"title":"祝贺哥穆尔卡六十寿辰的电报","alias":"","parts":[{"type":"paragraph","text":"祝贺哥穆尔卡六十寿辰的电报"},{"type":"paragraph","text":"（1965年2月4日）华沙波兰波兰统一工人党中央委员会第一书记瓦·哥穆尔卡同志："},{"type":"paragraph","text":"在你六十寿辰的时候，请接受我对你的衷心的祝贺。你的长期的工作，是同波兰党和人民的革命和建设事业密切相联的。我们热烈地祝贺，波兰人民的社会主义事业，在波兰统一工人党中央委员会的领导下，已经取得了重大成就，并将继续取得新的胜利。祝贺中波两党和两国人民的友谊和团结，在马克思列宁主义和无产阶级国际主义的基础上，必将不断地增进和加强。"},{"type":"paragraph","text":"祝你健康长寿。"},{"type":"paragraph","text":"中国共产党中央委员会主席毛泽东"},{"type":"paragraph","text":"一九六五年二月四日"}],"authors":["毛泽东"],"dates":[{"year":1965,"month":2,"day":4}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":482,"page_end":482},"tags":[{"name":"毛泽东","type":"人物"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6f9b45fdf0"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
