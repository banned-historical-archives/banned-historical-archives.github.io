script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"柬埔寨政府军事代表团从旅大到北京  王尚荣副总长陪同柬战友访问","authors":[],"dates":[{"year":1978,"month":8,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"柬埔寨政府军事代表团从旅大到北京"},{"type":"paragraph","text":"王尚荣副总长陪同柬战友访问"},{"type":"paragraph","text":"新华社北京八月三日电　柬埔寨共产党中央委员会候补常委、负责国防事务的副总理、革命军总参委员会主席宋成和由他率领的民主柬埔寨政府军事代表团，由中国人民解放军副总参谋长王尚荣陪同，今天下午乘专机从旅大到北京。"},{"type":"paragraph","text":"柬埔寨战友离开旅大时，中国人民解放军沈阳部队副司令员谢振华，中共辽宁省委书记、旅大市委第一书记李荒，中国人民解放军旅大警备区司令员张怀瑞，海军旅顺基地司令员张震春等到机场欢送。"},{"type":"paragraph","text":"今天上午，代表团参观了中国人民解放军海军旅顺基地，指战员们列队向柬埔寨战友致意。"},{"type":"paragraph","text":"陪同柬埔寨战友返抵北京的还有中国人民解放军海军司令部参谋长杨国宇，中国驻民主柬埔寨大使孙浩，国防部外事局副局长尹佐珍。"},{"type":"paragraph","text":"新华社沈阳八月二日电　柬埔寨共产党中央候补常委、负责国防事务的副总理、革命军总参委员会主席宋成和由他率领的民主柬埔寨政府军事代表团由中国人民解放军副总参谋长王尚荣陪同，今天下午乘专机从北海舰队基地来到旅大地区访问。"},{"type":"paragraph","text":"前往机场欢迎柬埔寨战友的有中国人民解放军沈阳部队副司令员谢振华，中共辽宁省委书记、旅大市委第一书记李荒，旅大警备区司令员张怀瑞等。"},{"type":"paragraph","text":"今晚沈阳部队举行宴会，热烈欢迎民主柬埔寨政府军事代表团。"},{"type":"paragraph","text":"谢振华副司令员首先在宴会上讲话，他代表沈阳部队全体指战员对宋成副总理率领代表团来旅大地区访问表示热烈的欢迎。"},{"type":"paragraph","text":"宋成副总理在宴会上发表了热情洋溢的讲话。他说，我们代表团怀着非常愉快的心情来到中国访问，带来了柬埔寨革命军和人民对中国人民解放军和中国人民最深厚的革命友谊。代表团在北京、北海舰队和旅大地区受到了兄弟和战友般的欢迎。特别是我们在北京时，中国人民的英明领袖华国锋主席、邓小平副主席会见了我们，并就进一步发展和巩固柬中两党、两国和军队之间的革命团结和战斗友谊，同我们进行了亲切的谈话。对此，我代表柬埔寨共产党、民主柬埔寨政府和革命军表示最衷心的感谢。宋成副总理指出，我们一定要维护柬中友谊，决不允许任何敌人破坏。"},{"type":"paragraph","text":"下午，柬埔寨战友参观了中国人民解放军空军某部，受到这个部队的负责人孙景华和战士们的热烈欢迎。代表团还参观了旅顺地下防空工事。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"辽宁文革","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b457674d9a"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
