script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"苏波领导人会谈结束发表声明支持我国解放台湾和沿海岛屿同修正主义作不妥协斗争才能确保社会主义建设","authors":[],"dates":[{"year":1958,"month":11,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【据新华社北京12日电】　据塔斯社莫斯科11日讯:这里发表了由赫鲁晓夫和哥穆尔卡11月10日在莫斯科签字的苏联和波兰声明。"},{"type":"paragraph","text":"声明说:“在波兰和苏联两国代表团在莫斯科会谈期间，双方确认对所讨论的各项问题的看法是完全一致的。”"},{"type":"paragraph","text":"声明中满意地指出，苏波两国人民的友谊有了加强。苏联政府为了扩大苏波两国经济合作，已经同意给波兰以技术援助，帮助发展波兰国民经济的某些重要部门，特别是勘探和开采新的石油矿和天然瓦斯矿，建设石油加工工厂，扩大列宁冶金联合工厂，以及扩大炼铜工业等。"},{"type":"paragraph","text":"声明说:“同修正主义作不妥协的斗争是社会主义建设获得成就的必需条件，修正主义是现阶段的主要危险，因为它企图破坏马克思列宁主义思想体系的基本原则，并削弱社会主义国家大家庭和国际工人运动的团结。”"},{"type":"paragraph","text":"声明说:社会主义的事业要求进一步创造性地发展马克思列宁主义的学说，遵守社会主义建设的普遍规律，并且通过适合于每个国家条件的方法来大胆地实现这些普遍规律，还要求同教条主义的表现作斗争。"},{"type":"paragraph","text":"声明指出，苏联和波兰不安地注意着由于美国侵略中华人民共和国而在台湾海峡地区造成的局势，美国还继续在台湾海峡地区对中国的内政进行武装干涉并且企图把中国的内部问题变成国际冲突。"},{"type":"paragraph","text":"声明说:“苏联和波兰代表团完全支持伟大的中国人民对解放和统一包括台湾和沿海岛屿在内的全部国土的正当主权。它们完全赞同中华人民共和国政府要求美国军队撤出台湾地区的立场。”"},{"type":"paragraph","text":"声明中着重指出北大西洋公约及其控制者美国的领导集团所奉行的、把西欧变成为原子武器库的政策的危险性。这个政策在欧洲的主要支柱是德意志联邦共和国政府所采取的立场。"},{"type":"paragraph","text":"双方支持德意志民主共和国提出的关于开始准备缔结对德和约的建议，声明指出，这样就能够在很大的程度上缓和欧洲的紧张局势。"},{"type":"paragraph","text":"声明说:波兰人民共和国代表团坚决支持苏联关于召开最高级会议来讨论和解决最迫切的裁军问题以及同加强欧洲和世界安全有关措施的建议。但是，由于有人，首先是美国领导集团拖延和回避谈判，两国代表团认为必须加强防御性的华沙条约，这个条约捍卫着社会主义阵营所有国家的共同安全。"},{"type":"paragraph","text":"波兰代表团同意，目前最迫切的任务应当是，大国之间就立即、普遍、永远地停止核武器试验的问题达成协议。"},{"type":"paragraph","text":"双方完全赞同为摆脱帝国主义和殖民主义的桎梏而斗争的各国人民的愿望，热情支持阿拉伯国家人民反对帝国主义企图用新的殖民主义手段在这些国家中维持和恢复统治的斗争。"},{"type":"paragraph","text":"声明指出，苏联共产党和波兰统一工人党的领导人交换了有关两党工作的情况，讨论了两党之间的关系问题以及国际工人运动中的迫切问题，讨论了进一步交流党的工作经验以及扩大两党之间的接触的具体措施。声明满意地确认，两党之间的合作更加紧密了。"},{"type":"paragraph","text":"声明宣布，波兰人民共和国代表团邀请苏共中央第一书记、苏联部长会议主席赫鲁晓夫等苏联党和国家的其他领导人访问波兰。这个邀请已被满意地接受。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bcee9bb6ad"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
