script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"资产阶级外交的幕后活动——“消息报”发表的日内瓦通讯的摘要","authors":[],"dates":[{"year":1954,"month":5,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"资产阶级外交的幕后活动"},{"type":"paragraph","text":"——“消息报”发表的日内瓦通讯的摘要"},{"type":"paragraph","text":"【新华社二十七日讯】塔斯社莫斯科二十七日讯：“消息报”刊载了记者米哈伊洛夫和波利扬诺夫的日内瓦来电，题目是“资产阶级外交的幕后活动”。"},{"type":"paragraph","text":"记者写道：帝国主义国家的外交家们横行无忌的时代已经过去了。正是因为这样，国际合作的敌人为了达到他们的目的，为了阻止缓和国际紧张局势，不惜使用一切手段——从幕后的阴谋活动到虚构捏造，从恐吓他们的小伙伴到欺骗舆论。"},{"type":"paragraph","text":"资产阶级外交家在日内瓦的大本营是美国代表团所住的罗尼饭店。在这里，几乎每天早晨都举行秘密的记者招待会，向美国记者布置如何最巧妙地欺骗公众。也就是在这里，参加对朝鲜人民的侵略的十六个国家的代表们常常举行秘密会议。"},{"type":"paragraph","text":"记者接着揭发了美国外交家和他们的同伙们的造谣，特别是无中生有的关于“中国和苏联渗入印度支那”的谎话。"},{"type":"paragraph","text":"记者写道：在国联大厦的会议桌上，西方外交家——首先是美国和法国外交家——一再重复说，他们希望恢复印度支那的和平。但是，在这个大厦的墙壁外面，他们却在疯狂地活动，企图为继续印度支那战争、扩大美国对这个战争的干涉以及建立反对亚洲人民的殖民国家的侵略集团铺平道路。"},{"type":"paragraph","text":"资产阶级外交家的幕后会议一个接着一个地举行。由于华盛顿的要求，美国和法国开始了单独的谈判。接着，“联邦成员国”——越南、寮国和高棉——也被卷入了这个谈判的漩涡。据悉，泰国外交部长威泰耶康以及其他某些外交家也参加了这个单独的谈判。"},{"type":"paragraph","text":"这些幕后谈判的目的何在呢？根据西方报纸的评论，和平的敌人打算利用这些谈判来抵制日内瓦会议，并借此阻碍它的工作。他们也想用扬言加强华盛顿和保大的联系作为恐吓手段，来胁迫法国加入策划中的太平洋集团，这个集团是美国打算一手控制的。他们的主意是：这个集团的成员起初至少应该包括美国、法国、各“联邦成员国”和泰国，以便用它来对英国和英帝国中的各个国家行使压力。"},{"type":"paragraph","text":"这就是敌视缓和国际紧张局势的人所玩弄的、卑鄙的两面手法的某些特点，他们正在尽力阻止日内瓦会议完成解决朝鲜问题和恢复印度支那和平的重大任务。"},{"type":"paragraph","text":"记者最后说，然而，这些把戏的主使人在一点上却弄错了：他们原来以为，他们可以向公众隐瞒他们的真正意图，把他们的帝国主义勾当秘密起来。不过现在时代是完全变了。民主国家为争取和平而进行的坚持不渝的斗争，揭破了帝国主义外交阴谋家的嘴脸。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7999db13be"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
