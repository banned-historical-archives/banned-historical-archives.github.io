script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji31","name":"毛泽东全集第31卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji31.pdf"],"article":{"title":"转发刘澜涛关于华北破获两起大案的报告的批语","alias":"","parts":[{"type":"paragraph","text":"军委转发华北军区党委关于三反情况"},{"type":"paragraph","text":"和今后部署报告的批语"},{"type":"paragraph","text":"（1952年3月3日）各大军区党委，志愿军党委，并转各级军区和各兵团军师党委，并告各中央局："},{"type":"paragraph","text":"兹将华北军区党委三月二日报告\"一件发给你你（们）参考，我们认为这个报告是正确的。请你们亦照华北军区那样按照不同的情况分别给以处理。在三反运动的最后一个阶段，必须号召各级干部关于自己和资产阶级的关系（家庭亲戚朋友），用开会和写检讨报告的方式，交代清楚，这一点很重要，望照办。"},{"type":"paragraph","text":"中央军委"},{"type":"paragraph","text":"三月三日"},{"type":"paragraph","text":"[1]指中共华北军区委员会1952年3月2日关于目前三反情况和今后部署的报告。报告说，目前华北军区捉虎正处在高潮，运动基本上是健康的，但极不平衡。开展较迟和老虎多的单位，尚须全力捉虎，已分别追加任务；已基本搞透或接近搞透的单位，领导的主要力量应即转入或逐步转入善后处理和建设阶段。报告对后一阶段中贪污分子的甄别处理、追退赃款、民主补课、厘定制度公约、清交家务、总结巩固政治思想成果等，根据不同情况提出了不同的处理意见。提出在民主补课中，排以上干部除做好书面反省报告外，并要交代清楚与资产阶级的各种关系。"}],"authors":["毛泽东"],"dates":[{"year":1952,"month":3,"day":2}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":466,"page_end":466},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a25889520f"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
