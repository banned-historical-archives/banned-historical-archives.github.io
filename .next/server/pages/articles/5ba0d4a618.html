script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji36","name":"毛泽东全集第36卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji36.pdf"],"article":{"title":"对彭德怀关于保卫祖国的战略方针和国防建设问题报告的批语","alias":"","parts":[{"type":"paragraph","text":"对彭德怀关于保卫祖国的战略方针"},{"type":"paragraph","text":"和国防建设问题报告的批语！"},{"type":"paragraph","text":"（1956年4月2日）"},{"type":"paragraph","text":"退彭德怀同志。此件看过，可用。中央各同志意见，在他们看过文件后，即会告知你。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"四月二日"},{"type":"paragraph","text":"[1]这个批语写在中共中央军委委员、国务院副总理兼国防部部长彭德怀1956年3月23日为报送关于军委扩大会议结果的报告和关于保卫祖国的战略方针和国防建设问题的报告给毛泽东的简要报告上。彭德怀1956年3月6日在军委扩大会议上关于保卫祖国的战略方针和国防建设问题的报告分为两部分，第一部分关于战略方针问题，主要讲了以下问题：第一，争取持久和平，随时准备应付突然事变；第二，战略方针问题的提出；第三，积极防御的战略方针；第四，关于阵地战结合运动战问题：第五，关于作战指导上的几个主要问题。第二部分关于国防建设问题，主要讲了以下几个问题：第一，军队建设和战备工作；第二，动员准备工作；第三，建立军事科学研究工作。"}],"authors":["毛泽东"],"dates":[{"year":1956,"month":4,"day":2}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":274,"page_end":274},"tags":[{"name":"毛泽东","type":"人物"},{"name":"彭德怀","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5ba0d4a618"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
