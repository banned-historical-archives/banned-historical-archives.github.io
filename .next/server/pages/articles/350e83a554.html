script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"孟加拉国《假日》和芬兰《十月》揭露苏联新宪法草案的反动性  苏联新宪法摒弃无产阶级专政背叛马列主义  使资产阶级复辟在法律上合法化并掩盖对劳动人民的压迫","authors":[],"dates":[{"year":1977,"month":7,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"孟加拉国《假日》和芬兰《十月》揭露苏联新宪法草案的反动性"},{"type":"paragraph","text":"苏联新宪法摒弃无产阶级专政背叛马列主义"},{"type":"paragraph","text":"使资产阶级复辟在法律上合法化并掩盖对劳动人民的压迫"},{"type":"paragraph","text":"新华社达卡一九七七年六月二十八日电  孟加拉国《假日》周报最近发表文章，揭露苏联新宪法的反动实质。"},{"type":"paragraph","text":"文章说：“苏联新宪法宣称苏联是‘社会主义全民国家’，共产党是‘全民党’。全民国家的概念不仅在马克思主义里根本找不到，而且也是反马克思主义的。”"},{"type":"paragraph","text":"文章说：“苏联新宪法中‘社会主义全民国家’的条款，摒弃了无产阶级专政的观念，因此是以社会主义为名，行复辟资本主义之实。苏联修正主义者对马列主义最大的背叛，是把建立和维护无产阶级专政的工人阶级先锋队——共产党变成了‘全民党’。”"},{"type":"paragraph","text":"文章指出：“苏联新宪法是资产阶级复辟在法律上的合法化，目的是为了破坏在以列宁和斯大林为首的工人阶级领导下的苏联革命人民通过伟大斗争和牺牲而建立起来的社会经济结构、国家管理和政治体制。苏联新宪法是修正主义为了取消阶级斗争、无产阶级政治和无产阶级政党，坚持‘和平过渡’到‘社会主义’的幻想而在法律上采取的一个步骤。”"},{"type":"paragraph","text":"新华社赫尔辛基一九七七年六月三十日电　芬兰马列主义小组机关刊物《十月》最近一期发表社论和文章，指出苏联新宪法草案反映在资本主义复辟了的苏联，阶级矛盾和民族压迫更加激化。"},{"type":"paragraph","text":"社论说，新宪法草案删去了无产阶级专政的概念，宣称苏联已成为“全民国家”。赫鲁晓夫发明的这种“理论”已经一再被证明是修正主义的和违反事实的。"},{"type":"paragraph","text":"社论指出，宣传“全民民主”、“全民国家”，只不过是剥削阶级企图用来掩盖其统治的阶级实质而已。"},{"type":"paragraph","text":"同一期刊登的一篇题为《苏联巩固资产阶级专政》的文章指出，苏联新宪法草案是资产阶级的装饰品，所谓“扩大社会主义民主”完全是一个骗局，是企图掩盖加紧对苏联劳动人民和苏联各民族的压迫。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"350e83a554"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
