" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji45","name":"毛泽东全集第45卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji45.pdf"],"article":{"title":"为中央转发昔阳县干部参加生产劳动的材料拟的标题","alias":"","parts":[{"type":"paragraph","text":"为中央转发昔阳县干部参加生产劳动的材料拟的标题！"},{"type":"paragraph","text":"（1963年3月）"},{"type":"paragraph","text":"山西省昔阳县，县、社、大队、生产队四级干部全体参加生产劳动的伟大范例（中央批语\"、山西省委批语、昔阳县材料）"},{"type":"paragraph","text":"[1]本篇正文是毛泽东为中共中央转发山西省昔阳县干部参加劳动的材料和省委批语的指示稿重新拟写的标题。原标题是：“中央转发一个调查材料：昔阳县干部参加劳动已形成社会风尚”。"},{"type":"paragraph","text":"[2]指中共中央1963年3月23日为转发山西省昔阳县干部参加劳动的材料和省委批语给各中央局，各省、市、自治区党委的指示。后来，这个指示连同山西省委批语和昔阳县材料作为中发[63]347号中共中央文件（即《前十条》）的附件六印发。"},{"type":"paragraph","text":"[3]指中共山西省委1963年1月29日对山西省昔阳县干部参加劳动已形成社会风尚材料的批语的摘要。批语说，县、社、大队、生产队四级干部参加劳动能否形成社会风尚，关键在于领导机关和领导干部是否有决心，是否能以身作则，带头示范。从1963年起，全省大队和生产队两级干部的补贴工分，必须按照农村人民公社工作条例修正草案的规定，不得超过总投工数的2%。要把这件事作为今年整风整社的一项重要内容。"},{"type":"paragraph","text":"[4]指中共晋中地委农村工作部关于昔阳县干部参加劳动已形成社会风尚的考察报告的摘要。报告说，1959年以来，昔阳县大队和生产队干部参加毛泽东全集第四十五卷劳动一年比一年多，补贴工分一年比一年少。县、社负责干部带头参加劳动。据统计，去年县级机关下乡干部在生产队所做劳动日，每人平均62个，公社干部每人平均82个。干部带头参加劳动，使干群关系像鱼水一样密切，带动了广大社员积极参加集体劳动，恢复了清早上地劳动的习惯，也有助于迅速改变农村的贫困面貌。报告还介绍了中共昔阳县委在干部参加劳动方面所采取的一系列有效措施：（1）加强思想教育，提高干部觉悟，注意经常检查。（2）把劳动态度作为选拔大队、生产队于部的首要条件。（3）县、社负责干部，带头参加劳动。（4）坚持实行定工劳动、定额补贴的制度，每年春天落实到人。（5）大队干部固定到一个生产队或作业组，按他们的劳动底分同社员一样分地、分活，评工记分。（6）评比竞赛，层层树立标兵。（7）自上而下改进领导作风与工作方法，严格控制会议、表报，为生产队干部参加劳动创造条件。"},{"type":"paragraph","text":"1963年春，毛泽东和新华社记者李琴、中央人民广播电台记者陈寰、中央新闻纪录电影制片厂摄影记者舒世俊一起交谈。"}],"authors":["毛泽东"],"dates":[{"year":1963,"month":3}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":381,"page_end":382},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"74f68ba6d5"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
