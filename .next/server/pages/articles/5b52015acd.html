" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"黔东南地区工矿企业工伤事故不断发生","authors":["《贵州工业简讯》（21-40）"],"dates":[{"year":1960,"month":6,"day":8}],"is_range_date":false,"parts":[{"text":"黔东南地区工矿企业工伤事故不断发生","type":"title"},{"text":"《贵州工业简讯》（21-40）","type":"authors"},{"text":"黔东南地区在开展增产节约的运动中，职工群众情绪很高，干劲很大，领导上对职工这种不断高涨的劳动热情应该加以重视和保护。但是，近来生产中的工伤事故却不断发生，从今年七月到九月十五日止，据全州的以县以上厂矿企业的不完全统计，发生事故五十一起，伤亡四十三人，平均每一天半即发生一起，损失国家财产七万三千七百七十五元。","type":"paragraph"},{"text":"这些事故大部分系责任事故，而且不少事故是重复发生。州属木器厂八月一至二十日即先后发生事故八起，八人受伤。州属砖瓦厂一炊事员曾先后触电二次，并未引起领导重视和采取措施，至第四次触电身死。炉山铁厂除尘器坏了，工人杨盛林不顾操作规程，爬上去修理，结果被烫身死。汽车大修厂技工姚迁钧，生产中麻痹大意，被刨木机将手刨成两半，后来该厂工程师又被刨木机刨掉手指两个。黄平石膏厂三个工人违犯规程下洞取电线，结果中毒死亡。","type":"paragraph"},{"text":"这些事故的发生，主要是领导的官僚主义所造成。在抓生产时未注意或根本忽视安全教育，不顾安全违章操作的现象时有发生，对一些已发生的事故未引起重视， 采取措施，致使事故重复发生。","type":"paragraph"},{"text":"目前，州委已采取措施：发动职工群众进行鸣放、辩论，进一步认真地贯彻省委“十防一灭”的指示，加强安全教育，建立和健全规章制度，认真进行一次安全大检查，组织专业培训，今后凡未受训者一律不准操作；此外，还决定每厂必须有一个副书记或副厂长管理安全工作，以保证安全生产。","type":"paragraph"},{"text":" （本部办公室电话联系材料）","type":"paragraph"}],"comments":[],"origin":"贵州省某档案馆","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5b52015acd"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
