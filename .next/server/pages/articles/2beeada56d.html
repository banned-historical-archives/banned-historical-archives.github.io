script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"空头电气公司转手剥削暴利大场唐桥一带工厂中诉","authors":[],"dates":[{"year":1949,"month":8,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编辑先生；"},{"type":"paragraph","text":"大场唐桥、顾镇、刘行，地处军事要术，扼上海之咽喉。历次战事，损害最重。过去在蒋匪盘据时期，全区人民遭受最严重的摧残。一切工厂及地方设施，都似患了一次重，病，元气难复。解放后大家在人民政府领导下，努力复兴。增加生产。以期经济繁荣。支援前线，而求全国解放之早。实现。电力是工厂的生命线，过去我们电费受到无理的剥削，较之上海电力公司增加八成。闸北水电公司增加三成。本区馈电商大耀电气公司，依靠了匪帮给予营业区域的特权，一经转手，便获暴利。解放后，一切革新声中，如此不合理现象，早应么除。为了人民政府暂时尚未顾及，竟朦蔽一切，变本加厉，再予“调整”一次电费。比上海竟涨了一倍。比闸北加了五成半余，在市区郊区电费扯平之贤明措施下，职工们在暴风雨中增加生产，我们工厂在艰难困苦中力求生存。我们大众用血汗换来的果实，却让他剥削，让他宰割。我们要求人民政府促使上海的电价一律。这种没有发电设备的空头电气公司，亟应取缔，以维护工业，增加生产。即请撰安"},{"type":"paragraph","text":"大场唐桥，顾镇，刘行，"},{"type":"paragraph","text":"一群职工敬启"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2beeada56d"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
