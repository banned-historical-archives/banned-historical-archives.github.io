script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"广中理发店在抵制资产阶级歪风邪气中理发员给顾客做出好样子","authors":["王树新"],"dates":[{"year":1970,"month":3,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编辑同志:"},{"type":"paragraph","text":"春节期间，我到虹口区广中理发店理发时，看到顾客依次排队，井然有序；服务员除了忙着理发的，还有专人宣传毛泽东思想，朗诵毛主席的“千万不要忘记阶级斗争”语录，讲抵制资产阶级歪风邪气的意义。我耳听宣传，眼观店堂，发现这个理发店服务员的头发理得都很朴素。由此我想起了有些理发店的少数服务员的头发搞得很“讲究”，有的甚至有些怪，而广中理发店的服务员为什么能做到简洁朴素?关于这个问题，给我理发的服务员老徐作了深刻的回答。他说:开展革命大批判，使我们认识到木梳底下也有阶级斗争。要抓好木梳底下的阶级斗争，抵制形形色色的资产阶级歪风邪气，首先要抓好我们服务员本身头脑里两种思想的斗争。我们自己的头发理得朴素一点，对顾客的宣传就更有说服力。老徐的话，使我想起了有一次在另一家理发店理发时看到的情景:因为有的服务员本身的头发也理得有点怪，一个顾客一进门就指着一个服务员的头说:“理得同他一样好了。”对比一下两家理发店，再看看当前意识形态领域里的阶级斗争，我才感觉到广中理发店的同志是在做好样子。这对受资产阶级思想影响而要理怪发型的一些人，是一种无声的宣传，最好的教育。"},{"type":"paragraph","text":"伟大领袖毛主席教导我们:“要抓意识形态领域里的阶级斗争。”理发，虽然是生活中的一件小事，但是与资产阶级腐蚀和无产阶级反腐蚀的斗争联系起来，就成了意识形态领域里阶级斗争的一件大事。对发型上的资产阶级歪风邪气，我们就是要群起而攻之。这是巩固无产阶级专政的需要。广中理发店的服务员，在抵制资产阶级歪风邪气的斗争中，身体力行，为顾客做出好样子，这种自觉的革命精神好得很!我一定要向他们学习，象他们那样以高度的阶级斗争观念看待生活中的每一件事；象他们那样在意识形态领域的阶级斗争中首先革自己的命，搞好思想革命化，为巩固无产阶级专政作出应有的贡献。　王树新"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"674dc762d0"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
