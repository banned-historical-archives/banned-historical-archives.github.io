script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"不怕镇压不受欺骗反对垄断资本残酷剥削  比利时两万多煤矿工人坚持罢工  工人的正义斗争得到进步学生的热情支持","authors":[],"dates":[{"year":1970,"month":1,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"不怕镇压不受欺骗反对垄断资本残酷剥削"},{"type":"paragraph","text":"比利时两万多煤矿工人坚持罢工"},{"type":"paragraph","text":"工人的正义斗争得到进步学生的热情支持"},{"type":"paragraph","text":"新华社二十七日讯　比利时煤矿工人不怕镇压，不受欺骗，继续坚持反对垄断资本残酷剥削的斗争。"},{"type":"paragraph","text":"比利时东北部朗堡地区的两万多名煤矿工人六日开始举行罢工，要求增加工资。到二十六日为止，这次罢工已经坚持了三周。罢工工人同反动工会出卖工人利益的行径进行了坚决斗争。"},{"type":"paragraph","text":"二十六日，大约一千五百名罢工工人在祖尔德举行示威游行，并且捣毁了反动工会的办事处，愤怒抗议反动工会头目充当垄断资本的走狗，力图破坏罢工的卑劣行径。许多矿工还在矿主的住处举行了示威，抗议垄断资产阶级的残酷剥削。工人的正义斗争得到了许多进步学生的热情支持。"},{"type":"paragraph","text":"反动当局出动大批警察对罢工工人进行镇压。反动警察向示威队伍施放催泪弹，并用水龙、警棍野蛮袭击示威群众。但是示威的工人不畏强暴，他们在学生们的支持下，同反动警察进行了英勇搏斗。"},{"type":"paragraph","text":"在贝林根、瓦特斯赫伊、温特斯拉赫等地，罢工的煤矿工人也都举行了示威游行或集会，并同反动警察进行了激烈的搏斗。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"955379665c"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
