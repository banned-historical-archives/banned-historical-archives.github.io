<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"市体委党委成员带头学习理论弄懂对资产阶级专政的问题，加强体育领域的无产阶级专政","authors":[],"dates":[{"year":1975,"month":3,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　上海市体委党委“一班人”和各级领导干部，联系体育战线的实际，认真学习毛主席关于理论问题的重要指示和马克思、恩格斯、列宁关于无产阶级专政的部分论述，决心从理论和实践的结合上搞清楚无产阶级对资产阶级专政的问题，提高无产阶级专政下继续革命的觉悟，使体育工作更好地为巩固和加强无产阶级专政服务。"},{"type":"paragraph","text":"在学习中，不少同志联系体育战线两个阶级、两条道路、两条路线斗争的实际，谈了在体育领域里加强无产阶级对资产阶级专政的重要性。党委副书记、新干部叶柏顺说:体育战线同其他战线一样，两个阶级、两条道路、两条路线的斗争也是长期的、复杂的，有时甚至是很激烈的。体育战线是上层建筑领域的一个部分，也是无产阶级同资产阶级争夺的一个阵地。“技术第一”、“锦标主义”等，都是属于资产阶级范畴的东西，是资产阶级体育的传统和痕迹。不狠狠批判这些东西，就不可能贯彻“友谊第一，比赛第二”的方针，不可能落实毛主席的革命体育路线，也不可能在体育领域里实现无产阶级对资产阶级的专政。党委委员吴向东说:体育战线上修正主义路线和孔孟之道的流毒还远远没有肃清，技术第一、锦标主义等资产阶级思想还时时在腐蚀我们的体育队伍。因此，不认真学习革命理论，忽视世界观改造，就会被资产阶级思想所腐蚀，走到修正主义邪路上去。我们一定要坚持无产阶级政治挂帅，坚持党的基本路线，始终把学习马克思主义，批判修正主义放在首位，这样才能增强抵制资产阶级思想侵蚀的能力，使体育队伍沿着毛主席的革命路线阔步前进。"},{"type":"paragraph","text":"大家在学习和讨论中还谈到，体育战线上两个阶级、两条路线的斗争始终是围绕着走什么道路这个根本问题进行的。要使体育成为巩固无产阶级专政的工具，就必须使体育为无产阶级政治服务，为工农兵服务，与生产劳动相结合。党委委员刘怀塘说:最近，市级运动队到工厂去接受工人阶级再教育，请工人师傅看训练，看比赛，作讲评，并和工人们一起劳动，受到了工人群众的欢迎，工人们说:“你们这样做方向对头。你们要多想想如何为工农兵服务。”这件事使我进一步体会到，社会主义体育一定要为工农兵服务，为三大革命运动服务。"},{"type":"paragraph","text":"通过对毛主席关于理论问题的重要指示的学习，大家进一步体会到学习革命理论的重要性，提高了学习的自觉性。他们表示一定要站在学习运动的前头，当好学习理论的带头人，为加强体育领域的无产阶级专政而努力。"},{"type":"paragraph","text":"(本报通讯　员)"},{"type":"paragraph","text":"\u003cIMG alt=请插入6号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1975\\03\\753g010401.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e上海第五丝织厂职工认真学习马列和毛主席著作，努力掌握无产阶级专政的理论。图为工人们正在认真学习《论人民民主专政》。"},{"type":"paragraph","text":"本报通讯　员摄\u003c/FONT\u003e"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"name":"两条路线斗争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"eae9450573"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
