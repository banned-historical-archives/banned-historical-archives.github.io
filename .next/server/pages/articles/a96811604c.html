script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"盐城专区革命委员会遵照毛主席千万不要忘记阶级斗争的教导  带领广大群众深入开展革命大批判","authors":[],"dates":[{"year":1968,"month":5,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"盐城专区革命委员会遵照毛主席千万不要忘记阶级斗争的教导"},{"type":"paragraph","text":"带领广大群众深入开展革命大批判"},{"type":"paragraph","text":"据新华社南京电　江苏省盐城专区革命委员会遵照伟大领袖毛主席“千万不要忘记阶级斗争”的教导，带领全区广大革命人民，狠抓阶级斗争，深入持久地开展革命大批判，主动地、不停顿地向无产阶级的敌人发动猛烈进攻。全专区出现了一片蓬蓬勃勃的革命景象。"},{"type":"paragraph","text":"伟大领袖毛主席最近深刻地指出：“无产阶级文化大革命，实质上是在社会主义条件下，无产阶级反对资产阶级和一切剥削阶级的政治大革命，是中国共产党及其领导下的广大革命人民群众和国民党反动派长期斗争的继续，是无产阶级和资产阶级阶级斗争的继续。”盐城专区革命委员会及时组织全体委员和广大干部、群众，认真学习毛主席这一最新指示，用毛泽东思想分析本地区阶级斗争的新形势、新特点、新动向，狠批中国赫鲁晓夫的“阶级斗争熄灭”论。盐城地区阶级斗争一直十分尖锐复杂。中国赫鲁晓夫的黑《修养》和一整套修正主义黑货在这里流毒很深；中国赫鲁晓夫在江苏的代理人江渭清、陈光之流还多次到盐城，和他们在盐城的黑爪牙，狼狈为奸，猖狂地反对毛主席，反对毛泽东思想，反对毛主席的无产阶级革命路线，妄图复辟资本主义。在文化大革命中，盐城地区党内一小撮走资派虽然被揪出来了，但他们并不甘心失败，一有机会，就大刮翻案妖风，妄图东山再起。大家从揭发出来的种种事实深刻地认识到：革委会建立后，狠抓阶级斗争，是关系到全面落实毛主席的最新指示的大事，是关系到巩固新诞生的革委会的大事。大家认为，在无产阶级文化大革命节节胜利的大好形势下，千万不能忘记阶级斗争，要主动地向无产阶级的敌人进攻，把阶级斗争的主动权牢牢地掌握在无产阶级革命派手里。"},{"type":"paragraph","text":"毛主席教导我们：“革命战争是群众的战争，只有动员群众才能进行战争，只有依靠群众才能进行战争。”盐城专区各级革委会遵循毛主席的教导，放手发动群众，打一场“人民战争”。各地普遍举办了毛泽东思想学习班，组织革命干部、民兵代表和贫下中农代表参加，依靠他们团结、带动广大革命群众，组成浩浩荡荡的革命大军，深入持久地开展革命大批判。"},{"type":"paragraph","text":"各地革委会还遵循毛主席“阶级斗争，一抓就灵”的教导，引导革命群众开忆苦会，吃忆苦饭，从阶级教育入手，使广大贫下中农带着对中国赫鲁晓夫及其代理人的刻骨仇恨，带着对伟大领袖毛主席无限热爱的无产阶级感情，自觉地投入到向阶级敌人展开主动进攻的革命大批判中去。广大贫下中农说：“阶级敌人每日每时想翻天，我们千万不能放松警惕，要把形形色色的敌人打翻在地，叫他们永世不得翻身。”"},{"type":"paragraph","text":"现在，盐城全区从机关、学校，到工厂、农村，到处是革命大批判的战场，革命群众和革命干部口诛笔伐，集中火力，集中目标，主动地、不停顿地向阶级敌人猛烈开火，置阶级敌人于“人民战争”的汪洋大海之中。在斗争中，盐城的工人阶级充分发挥了主力军的作用，狠狠打击了阶级敌人的反革命气焰。"},{"type":"paragraph","text":"群众广泛发动起来以后，有些地方也出现过“大批判搞得差不多了”的思想，对革命大批判抓得不够紧。各级革委会引导广大革命群众学习了毛主席的光辉著作《将革命进行到底》，使大家认识到，这一小撮毒蛇“虽然它们已经感觉到冬天的威胁，但是还没有冻僵呢！”革命大批判要打持久战，要天天批，不断批，把阶级敌人彻底批倒批臭。为了动员更多的革命群众参加革命的大批判，各地普遍采用了“四结合”的批判方法：军民批判相结合，使广大革命群众更好地学习人民解放军在大批判中活学活用毛泽东思想的经验；大会小会相结合，通过大会批判造声势，小会批判抓重点，在车间、教室、地头、场头搞战场，人人参战，口诛笔伐，使大批判深入发展；上批下斗相结合，上面批判中国赫鲁晓夫及其在江苏的代理人的罪行，下面把本地区、本单位的叛徒、特务、死不悔改的走资派和没有改造好的地、富、反、坏、右分子挖出来，进行面对面斗争；大批判和各项任务相结合，这样可以密切联系实际，在各方面清除修正主义的毒素。广大革命群众反映，这样批判，越批越有劲，越批觉悟越高，打一仗，进一步，对中国赫鲁晓夫更加仇恨，对伟大领袖毛主席更加热爱。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"江苏文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"人民战争","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a96811604c"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
