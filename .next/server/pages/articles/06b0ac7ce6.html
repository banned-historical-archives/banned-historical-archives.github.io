script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"以批邓为动力深入开展农业学大寨运动  宁夏引黄灌区春小麦丰收","authors":[],"dates":[{"year":1976,"month":8,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"以批邓为动力深入开展农业学大寨运动"},{"type":"paragraph","text":"宁夏引黄灌区春小麦丰收"},{"type":"paragraph","text":"新华社银川电　在批邓、反击右倾翻案风斗争不断取得新胜利的大好形势下，宁夏回族自治区引黄灌区传出了丰收的喜讯：全灌区一百四十六万多亩春小麦平均亩产一季跨过“黄河”，总产量和平均亩产量都比一九七五年增长一成半左右，创造了历史最高水平。"},{"type":"paragraph","text":"宁夏引黄灌区是我国西北春小麦主要产地之一。今年，这里春小麦生产的显著特点是，不论是人民公社，还是国营农场，都大面积均衡增产。农业学大寨先进县吴忠、灵武、青铜峡、中宁今年持续增产，吴忠县春小麦平均亩产超过七百斤，中宁、青铜峡、灵武和中卫县灌区春小麦平均亩产也都在六百斤以上。原来生产水平较低的永宁、贺兰、平罗等县，也都分别一季上《纲要》、过“黄河”。地处毛乌素沙漠边沿的陶乐县和在盐碱地上建立的十三个国营农场，今年春小麦也大面积、大幅度增产。全灌区还涌现出了一批春小麦平均亩产一季过“长江”、超千斤的社队。"},{"type":"paragraph","text":"宁夏引黄灌区今年在先后遇到低温、风灾和病虫害等自然灾害情况下夺得春小麦丰收，这是批邓、反击右倾翻案风斗争的胜利成果。今年以来，这个灌区的回、汉族干部和群众在各级党组织的领导下，以五千多所政治夜校为阵地，以五万多名贫下中农理论队伍为骨干，认真学习毛主席的一系列重要指示，学习无产阶级专政下继续革命的理论，进一步加深了对资产阶级“就在共产党内”这一科学论断的理解，树立起和走资派长期作战的思想，进一步提高了贯彻执行毛主席革命路线的自觉性，为夺取今年春小麦丰收打下了坚实的思想基础。"},{"type":"paragraph","text":"在学习毛主席的重要指示，深入批邓的斗争中，宁夏引黄灌区各级干部联系实际批判邓小平强化和扩大资产阶级法权的罪行，进一步提高了限制资产阶级法权的自觉性。他们纷纷打起背包，深入基层，调查研究，和各族贫下中农搞三同，从而密切了干群关系，发展了革命和生产的大好形势。中共陶乐县委的六名领导成员，今年有五名在基层蹲点。今年一至七月，他们平均每人已经参加集体生产劳动六十多天，还分别种了试验田。在他们的带动下，县委、县革委会机关也经常只留下几个干部，其余全部深入农村，和广大贫下中农搞三同，抓革命、促生产，战胜了多种自然灾害，使全县春小麦总产量和平均亩产都比历史最高水平的一九七五年增长了三成多。"},{"type":"paragraph","text":"去冬以来，宁夏引黄灌区各级党组织，以批邓、反击右倾翻案风的斗争为动力，深入开展农业学大寨、普及大寨县的群众运动。自治区党委和各地、市、县的党委先后派出三千多名干部深入农村，帮助基层党组织学习大寨的根本经验，开展党的基本路线教育，用社会主义战胜资本主义。"},{"type":"paragraph","text":"灌区南部中宁县的县、公社和生产大队三级党组织，都由第一把手亲自抓后进的公社、大队、生产队的转化工作。他们发动群众，深入批邓，调动了广大干部、群众大干社会主义的积极性，使全县七万多亩春小麦平均亩产达到六百五十多斤，比一九七五年增长了两成多。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"宁夏文革","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"限制资产阶级法权","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"06b0ac7ce6"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
