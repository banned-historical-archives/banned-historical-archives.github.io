" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoistlegacy.de-289","name":"中共中央办公厅转发陕西省委关于纠正社教运动以来错定地主、富农成份问题的通知","author":"中共陕西省委","internal":false,"official":false,"type":"unknown","files":[],"article":{"title":"中共中央办公厅转发陕西省委关于纠正社教运动以来错定地主、富农成份问题的通知","dates":[{"year":1979,"month":4,"day":5}],"is_range_date":false,"authors":["中共中央办公厅","中共陕西省委"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"中共中央组织部干审局, 干审工作政策文件选编 （下）, 987-989","tags":[{"name":"地主","type":"主题/事件"},{"name":"富农","type":"主题/事件"},{"name":"纠正","type":"主题/事件"},{"name":"社会主义教育运动","type":"主题/事件"}],"parts":[{"type":"title","text":"中共中央办公厅转发陕西省委关于纠正社教运动以来错定地主、富农成份问题的通知[1]"},{"type":"paragraph","text":"1979年4月5日 · 中办发〔1979〕7号"},{"type":"paragraph","text":"现将陕西省委一九七九年一月四日“关于纠止社教以来错定地主、富农成份问题的通知”转发你们，供参考。"},{"type":"paragraph","text":"中共陕西省委关于纠正社教运动以来错定地主、富农成份问题的通知"},{"type":"paragraph","text":"各地、市、县委："},{"type":"paragraph","text":"在社教运动和文化大革命中，我省一些地方曾补定了一批地主、富农成份。据一些地方复查的结果表明，多数是错定的，混淆了两类不同性质的矛盾。建国已经二十九年。全党工作的着重点已经转移到现代化建设上来。为了调动一切积极因素，团结一切可以团结的人，为建设社会主义现代化强国而奋斗，我们应当按照实事求是、有错必纠的原则，把社教运动以来错定的地主、富农成份统统纠正过来。现就有关问题通知如下："},{"type":"paragraph","text":"一、对于社教运动和文化大革命中补定的地主、富农成份，除极少数明显漏划而且群众认为应当继续维持其地主、富农成份的以外，一律按土改时的成份对待，予以纠正。"},{"type":"paragraph","text":"二、在一九六四年长安社教的影响下，我省许多地方曾另定了小土地出租者占有土地的最高标准数。经调查证明，改定结果普遍大大低于当地地主、富农占有土地平均数，不符合实际情况，不符合中央有关指示精神。因此，在复查社教运动以来补定的地主、富农成份时，应当一律以土改时确定的小土地出租者占有土地最高标准数为依据。"},{"type":"paragraph","text":"三、纠正社教运动以来错定的地主、富农成份，主要着重于从政治上解决问题。要引导群众向前看。要注意增强干部、群众的团结。对于少数因错定成份在生活上造成严重困难的，要给予适当救济。救济费可从社会救济款中开支。因错定而没收的房屋，如属集体占用，应予退还；如已分给贫下中农，而被错划户住房有困难的，可由集体帮助适当修盖一些房屋。近年来，有些地方在纠正错定地主、富农成份时，经群众商量同意，采取多种办法，对遇到的经济问题作了妥善处理，应当不再翻腾。"},{"type":"paragraph","text":"四、纠正社教运动以来错定的地主、富农成份的工作，要在县委和县革委会领导下进行。一般可以以公社或大队为单位，由公社党委或大队党支部召集有土改时的老干部和老贫农、老党员参加的座谈会，对社教运动以来补定的地主、富农成份进行复议，提出纠正意见，经有关大队社员大会或社员代表大会讨论同意后，报县委或县革委会指定的有关部门批复。除个别意见分歧、难以定论的户以外，不必再搞内查外调。凡经批复纠正了错定成份的，都要由大队党支部向所在生产队群众公开宣布；如果他们家庭有人在国家机关、厂矿、学校、部队等单位工作，公社党委要将复查结果通知其所在单位。有关地、县可根据自己的实际情况，有计划有步骤地抓好这一工作，力争今年上半年全部搞结束。"},{"type":"paragraph","text":"中共陕西省委"},{"type":"paragraph","text":"一九七九年一月四日"},{"type":"paragraph","text":"[1] Note: This document also can be found in 铁道部政治部审干办公室, 审干工作政策选编 (一), pp. 405-407."}],"alias":""},"tags":[{"name":"陕西文革","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9beb7bc9c0"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
