<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共中央关于高级干部学习的通知","authors":[],"dates":[{"year":1970,"month":11,"day":6}],"is_range_date":false,"parts":[{"text":"中共中央关于高级干部学习问题的通知","type":"title"},{"text":"毛主席、林副主席已批阅","type":"appellation"},{"text":"伟大领袖毛主席历来重视党的高级干部学习马克思列宁主义问题。早在六届六中全会上，毛主席就指出：“我们的任务，是领导一个几万万人口的大民族，进行空前的伟大的斗争，所以，普遍地深入地研究马克思列宁主义的理论的任务，对于我们，是一个亟待解决并须着重地致力才能解决的大问题。”最近，毛主席在党的九届二中全会上，又一次指示：党的高级干部，不管工作多忙，都要挤时间，读一些马、列的书，区别真假马、列主义。党的九届二中全会公报号召全党用马克思主义、列宁主义、毛泽东思想，自觉地改造世界观。全党要认真学习毛主席的哲学著作，提倡辩证唯物论和历史唯物论，反对唯心论和形而上学。","type":"paragraph"},{"text":"当前，毛主席的指示，九届二中全会的号召，正在变为广大干部的实际行动。为了使高级干部的学习搞得好一些，特通知如下：","type":"paragraph"},{"text":"（一）要进一步提高党的高级干部学习的自觉性。这里讲的高级干部，主要是指中央委员、中央各部委领导人员、地方省、市、自治区党的核心小组成员和军队军党委常委以上的同志。在党的第九次代表大会“团结起来，争取更大的胜利”的号召下，在毛主席无产阶级革命路线的指引下，全国革命和生产形势大好。党的各级干部，尤其是高级干部，担负着比过去更加重大的责任，如何提高自己的政治、思想、理论水平，自觉地改造世界观，是无产阶级专政下继续革命的重要问题。只有读一些马、恩、列、斯的基本著作，才能识别真假马列主义，加深对毛泽东思想和毛主席的无产阶级革命路线的认识，自觉地贯彻执行以毛主席为首、林副主席为副的党中央提出的各项战斗任务。","type":"paragraph"},{"text":"（二）读什么书？马、恩、列、斯的基本著作，一九六四年中央曾经选定三十本书，作为高级干部的学习书目。最近，毛主席指示，“第一次宜少，大本书宜选读（如反杜林）。”建议各单位第一次读以下六本马、恩、列、斯著作和五本毛主席著作：","type":"paragraph"},{"text":"一、马克思、恩格斯：共产党宣言","type":"paragraph"},{"text":"二、马克思：哥达纲领批判","type":"paragraph"},{"text":"三、马克思：法兰西内战（选读）","type":"paragraph"},{"text":"四、恩格斯：反杜林论（选读）","type":"paragraph"},{"text":"五、列宁：唯物主义和经验批判主义（选读）","type":"paragraph"},{"text":"六、列宁：国家与革命（选读）","type":"paragraph"},{"text":"毛主席五本著作：","type":"paragraph"},{"text":"一、实践论","type":"paragraph"},{"text":"二、矛盾论","type":"paragraph"},{"text":"三、关于正确处理人民内部矛盾的问题","type":"paragraph"},{"text":"四、在中国共产党全国宣传工作会议上的讲话","type":"paragraph"},{"text":"五、人的正确思想是从那里来的","type":"paragraph"},{"text":"（三）在学习中，要坚持理论联系实际的原则。以自学为主，和集体讨论相结合。学习时间，首先靠自己挤，坚持天天读，可以规定共同的学习日，每周不少于两次。可以成立学习领导小组或者学习委员会，负责学习的规划、检查、总结和交流经验。各单位接到本通知后，应进行讨论，并将落实的情况报告中央。","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件，翻印者未注明","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"人民内部矛盾","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"67a078fa9e"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
