<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"255cf4cb-cd67-45ab-b5e8-8240fdbad8f8","name":"社会主义从空想到科学的发展（人民出版社1967年版）","internal":false,"official":true,"type":"pdf","author":"恩格斯，人民出版社1967年版","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives4/main/255cf4cb-cd67-45ab-b5e8-8240fdbad8f8.pdf"],"article":{"title":"英文版序言","alias":"","parts":[{"type":"paragraph","text":"英文版导言21"},{"type":"paragraph","text":"这本小册子本来是一个更大的整体的一部分。大约在1875年，柏林大学讲师欧·杜林博士突然大叫大地宣布他改信社会主义，他不仅向德国公众提出了一套详尽的社会主义理论，而且还提出了一个改造社会的完备的实践计划。自然，他与他的前辈发生了冲突；首先，他将满腹怒气发泄在马克思身上。"},{"type":"paragraph","text":"这件事发生在这样一种时候：德国社会党的两派一一-爱森纳赫派和拉萨尔派一刚刚实现了合并22，因而不仅大大地加强了力量，而且更重要的是已经有能力运用这全部力量去反对共同的敌人。德国社会党正在迅速地成为一种力量。但是，要使它成为一种力量，第-个条件是不让这个刚刚赢得的统一受到危害。而杜林博士却公开地着手在自己周围建立一个宗派，一个未来的单独的政党的核心。因此，不管我们是否愿意，我们必须应战，把斗争进行到底。"},{"type":"paragraph","text":"可是，这虽然不是一件太困难的事情，显然也是够麻烦的。大家知道，我们德国人具有一种极其笨拙的Grindlich-keit，即彻底的深思精神或深思的彻底精神，不管你叫它什么都行。我们中的任何一个人在阐述他认为是新学说的那种东西的时候，便首先一定要设法把它弄成-个包罗万象的体系。他一定要证明，逻辑的主要原则和宇宙的基本规律之所以存在，从来都只是为了最后导致这个新发现的卓绝的理论。在这方面，杜林博士已经完全达到这种民族标准了。整整的全套“哲学体系”，精神的、道德的、自然的和历史的一应俱全；全套“政治经济学的和社会主义的体系”；最后还有《政治经济学批判史》-一三部八开本的巨著23，在外观上和内容上都很有份量的、被动员起来向一切前辈哲学家和经济学家进攻、特别是向马克思进攻的三路论证大军一一事实上，这是企图“在科学中”实行一次完全的“变革”一一这些就是我所要对付的。我不得不涉及所有的和各种各样的问题：从时间和空间的概念到复本位制24，从物质和运动的永恒性到道德观念的易逝性，从达尔文的自然选择到未来社会中的青年教育。无论如何，我的对手的包罗万象的体系，使我有机会在同他的争论中阐明（而且是用比以前更连贯的形式）马克思和我对这许多形形色色的问题的见解。这就是使我把这个从其他方面来说是吃力不讨好的任务担负起来的主要原因。"},{"type":"paragraph","text":"我的答复，最初是作为一系列论文发表在社会党的中央机关报莱比锡的《前进报》13上，后来汇集成书，题为《HerrmEugenDuihring'sUmwalzungderWissenschaft\u003e（《欧根·杜林先生在科学中实行的变革》），这本书的第二版于1886年在苏黎世出版。"},{"type":"paragraph","text":"根据我的朋友，现在法国众议院中利尔市的议员保尔·拉法格的请求，我把这本书中的三章编成了小册子，由他译成法文并于1880年出版，书名为《空想社会主义和科学社会主义》。波兰文版25和西班牙文版就是根据这个法文本译出的。1883年，我们的德国朋友用原文出版了这本小册子。此后，根据这个德文本又出版了意大利文、俄文、丹麦文、荷兰文和罗马尼亚文26的译本。这样，连同现在这个英文版在内，这本小册子已经用十种文字流传开了。据我所知，任何其他社会主义著作，甚至我们的1848年出版的《共产党宣言》和马克思的《资本论》，也没有这么多的译本。在德国，这本小册子已经印了四版，共约两万册。"},{"type":"paragraph","text":"附录《马尔克》①是为了在德国社会党内传播若干关于德国土地所有制的历史和发展的基本知识而写的。当这个党团结城市工人的工作已经有完成的希望而农业工人和农民的工作需要着手进行的时候，这就显得尤其必要了。这个附录之所以收入英译本中，是因为考虑到一切日耳曼部落所共有的原始的土地占有形式及其哀亡的历史，在英国比在德国更不为人所知。这篇附录仍旧保持了原状，我没有涉及马克西姆·柯瓦列夫斯基最近提出的假说，按照这个假说，在马尔克的成员分割耕地和草地之前，曾经有包括几代人的庞大的宗法制家庭公社（现在还存在的南方斯拉夫人的扎德鲁加可以作为例证）共同耕种这些土地；后来，当公社范围扩大，太不便于共同经营的时候，便出现了分割公社土地的现象。27柯瓦列夫斯基也许是完全对的，不过问题还在讨论中。"},{"type":"paragraph","text":"本书中所用的经济学名词，凡是新的，都同马克思的《资本论》英文版28中所用的·致。我们所说的“商品生产”，是指经济发展中的这样一个阶段，在这个阶段上，物品生产出来不仅是为了供生产者使用，而且也是为了交换的目的；就是说，是作为商品，而不是作为使用价值来生产的。这个阶段从开始为交换而生产的时候起，一直延续到现在；这个阶段只是在"},{"type":"paragraph","text":"①1892年在伦敦出版的英文版中，恩格斯把他在1882年写的《马尔克》（见《马克思恩格斯全集》第19卷第351一369页）一文作为附录收在里面。“一一编者注资本主义生产下，即在占有生产资料的资本家出资履用那些除自已的劳动力以外没有任何生产资料的工人，并把产品的卖价超出其支出的赢余部分纳入腰包的条件下，才获得充分的发展。我们把中世纪以来的工业生产的历史分为三个时期：（1）手工业，小手工业师傅带着少数帮工和学徒，每个工人都生产整件物品；（2）工场手工业，较大数量的工人聚集在一个大企业中，按照分工的原则生产整件物品，每个工人只完成一部分工序，所以产品只有依次经过所有工人的手以后才能制成；（3）现代工业，产品是用动力发动的机器来生产的，工人的工作只限于监督和调整机器的动作。"},{"type":"paragraph","text":"我很清楚，本书的内容将遭到相当大的一部分英国公众的反对。但是，如果我们大陆上的人稍微顾到英国“体面人物\"②的偏见，那末事情将会比现在更坏。本书所捍卫的是我们称为“历史唯物主义”的东西，而唯物主义这个名词是使大多数英国读者感到刺耳的。“不可知论”还可以容忍，但是唯物主义就完全不能容许了。"},{"type":"paragraph","text":"然而，从十七世纪以来，全部现代唯物主义的发祥地正是英国。"},{"type":"paragraph","text":"“唯物主义是大不列颠的天生的产儿，英国经院哲学家邓斯·司各脱就曾经问过自已：“物质是否不能思维？”"},{"type":"paragraph","text":"为了使这种奇迹能够实现，他求助于上帝的万能，即迫使神学来宣扬唯物主义。此外，他还是一个唯名论者29。唯名"},{"type":"paragraph","text":"①在发表于《新时代》杂志上的德译文中，这篇导言从开头到“调整机器的动作”为止的几段被删去。一编者注者注②在德译文中，在“体面人物”的后面加有：即英国庸人”。~一编轮，唯物主义的最初形式，主要是存在于英国经院哲学家①中间。"},{"type":"paragraph","text":"英国唯物主义的真正始祖是培根。在他看来，自然哲学是唯一真正的哲学；而以感性经验为基础的物理学则是自然哲学的最主要的部分。阿那克萨哥拉和他的同素体30，德谟克利特和他的原子，都常常被他当做权威来引证。在他看来，感觉是可靠的，是全部知识的泉源，全部科学都是以经验为基础的，是在于用理性的研究方法去整理感官所提供的材料。归纳、分析、比较、观察和实验，是这种理性方法的主要形式。在物质的固有的特性中，运动是第一个特性而且是最重要的特性，这里所说的运动不仅是机械的和数学的运动，而且主要是物质的动力、生命力、张力，或者用雅科布·伯麦的术语来说，物质的Qual》②“痛苦”③。"},{"type":"paragraph","text":"唯物主义在它的第一个创始人培根那里，本身还包含着多方面发展的萌芽。一方面，被赏心悦目的、诗意的魅力环绕着的物质似乎以迷人的微笑吸引着人的整个身心。另一方面，以格言形式表述出来的学说却充满了神学的不彻底性。"},{"type":"paragraph","text":"唯物主义在以后的发展中变得片面了。霍布斯把培根的①在德译文中不是“经院哲学家”，而是“唯物主义者”。一-编者注"},{"type":"paragraph","text":"②《Qual》是哲学上的双关语。《Qual》按字面的意思是苦闷，是一种促使采取某种行动的痛苦；同时，神秘主义者伯麦把拉丁语qualitas【质）的某些意义加进这个德国字；他的Qual和外来的痛苦相反，是能动的本原，这种本原从受《Qual》支配的事物、关系或个人的自发发展中产生出来，而反过来又推进这种发展。（恩格斯在英文版上加的注，在德文版上未加。“一编者注）"},{"type":"paragraph","text":"③在德译文中，在“痛苦”一词后面，又从《神圣家族》中援引了英文版中删去的一句话：“物质的原始形式是物质内部所固有的、活生生的、本质的力量，这些力量使物质获得个性，并造成各种特殊的差异。”一编者注唯物主义系统化了。以感觉为基础的知识，失去了它的诗的绚丽色彩，它变成了数学家的描象的经验1：儿何学被管布为科学的女王。唯物主义开始憎恨起人类来了。既然唯物主义要克服自已的对手，即僧恨人类的、不要肉体的唯灵论，并且是在后者自已的范围内予以克服，它就只好抑制自已的情欲而变成禁欲主义者。这样，它就从感性的东西变成理性的东西；可是，它因此也就发展着理性所特有的不顾后果的全部彻底性。"},{"type":"paragraph","text":"霍布斯，作为培根的继承者，这样推论道：如果人类的全部知识都是由感官提供的，那末我们的概念和观念就不过是现实世界的丧失了感性形式的幻影。哲学只能给这些幻影冠以名称。一个名称可以用于许多幻影。甚至还可以有名称的名称。但是，如果-方面认为一切观念都起源于感性世界，另一方面又说一个词的意义不止是一个词，除了通过我们的感官而为我们所知道的存在物，即全都是个别的存在物之外，还有某种普遍的，非个别的存在物，那就矛盾了。无形体的实体和无形体的形体一样，都是荒唐的。形体、存在、实体只是同一种实在的不同名称。不可能把思维同思维警的物质分开。物质是世界上所发生的-切变化的基础。假如无限的这个词不表示我们的精神能够完成无限的相加过程，那末这个词就毫无意义。既然只有物质的东西对我们来说是可以觉察到的，那末关于上帝的存在，我们就丝毫不能有所知了。只有我自已的存在才是确实可信的。人的一切情欲都是既有并始也"},{"type":"paragraph","text":"①在德译文中，这句话是：“它变成了几何学家的抽象的经验”；在这句话之后又援引了英文版中删去的一句话：“物理运动成为机械运动或数学运动的牺性品。”一一编者注有结束的机械运动。欲求的对象就是我们称为善的东西。人和自然都受同样的规律支配。强力和自由是同一的。"},{"type":"paragraph","text":"霍布斯把培根的学说系统化了，但是他没有论证培根关于人类的全部知识起源于感性世界的基本原则。洛克在他的《人类悟性论》31中提供了这种论证。"},{"type":"paragraph","text":"霍布斯打破了培根唯物主义中的有神论的偏见；何林斯、多德威尔、考尔德、哈特莱、普利斯特列同样地打破了还包围若洛克的感觉论的最后的神学藩筠，无论如何，对实际的唯物主义者来说，自然神论32不过是摆脱宗教的一种简便易行的方法罢了。”①"},{"type":"paragraph","text":"关于现代唯物主义在英国的起源，卡尔·马克思就是这样写的。如果英国人现在对马克思给予他们祖先的赞扬并不感到十分高兴，那真是遗得很。可是不容否认，培根、霍布斯和洛克是法国唯物主义者这个光辉的学派的前辈。尽管十八世纪时法国人在陆上和海上的一切战争中都被德国人和英国人所战胜，法国唯物主义者还是使十八世纪成为主要是法国人的世纪，这甚至发生在卓绝的法国革命之前；而这次革命的成果，我们在英国和德国的局外人都还在试图移植于我们白已的环境。"},{"type":"paragraph","text":"无可否认，大约在本世纪中叶，每个移居英国的有教养的外国人都感到惊奇的，是那种他在当时必然认为是英国体面的中等阶级的宗教执迷和愚蠢的现象。在那时，我们都是唯物主义者，或者至少是很激进的自由思想者，我们不能理解，为什么英国几乎所有有教养的人都相信各种各样不可思议的"},{"type":"paragraph","text":"马克思和恩格斯《神圣家族》1845年美因河酵法兰克福版第201一204页（见《马克思恩格斯全集》第2卷第163一165页。--编者注）。奇迹，甚至象巴克兰德和曼特耳那样的地质学家也歪曲自已科学中的事实，以避免同《创世记》的神话有太多的冲突；而为了要找到在宗教问题上敢于运用自已的智力的人，就必须到没有受过教育的人中去，到当时所谓的“脱邂人群”中去，到工人中去，特别是到欧文派的社会主义者中去。"},{"type":"paragraph","text":"但是从那时以来，英国已经“开化”了。1851年的博览会33给英国岛国的闭塞性敲起了丧钟。英国在饮食、风俗和观念方面已经逐渐国际化了；它在这方面取得了很大的成就：使我不禁希望英国的某些风俗和习惯在大陆上也象大陆上的其他习惯在英国那样得到传播。总之，随着橄榄油（1851年以前只有贵族才知道）的传入和传播，大陆在宗教问题上的怀疑论也致命地传播开了，而且事情达到这样的地步：不可知论虽然还没有象英国国教会那样被当做“头等货色”，但是在体面这点上，却儿乎和浸礼会是同等的，面且肯定要比“救世军”34的地位高。我不禁想道：在这种情况下，许多对不信教思想的进展感到十分痛心并加以谊咒的人，如果知道这些“新奇的思想”并不是舶来品，不象其他许多日用品那样带有德国造的商标，而肯定无疑是老牌的英国货，如果知道他们的不列颠祖先在两百年前所走的比今天后代子孙所敢于走的要远得多，那他们将会感到安慰吧。"},{"type":"paragraph","text":"真的，不可知论如果不是（用郎卡郡的一个富于表现力的宁限来说）①“羞羞答答的”唯物主义，又是什么呢？不可知论者的自然观，完全是唯物主义的。整个自然界是受规律支配的，它绝对排除任何外来的干涉。可是，不可知论者补充道，"},{"type":"paragraph","text":"1）在德译文中删去了：“（用郎卡郡的一个富于表现力的字眼来说）”。“编指注我们无法肯定或否定已知世界之外的某个最高存在物的存在。这种说法也许在拿破仑那个时代有点价值，那时拉普拉斯对拿破仑的问题一为什么在这位伟大的天文学药《天体力学》35一书中对造物主连提也没有提到，一一曾经骄微地这样回答：“我不需要这个假说”。可是在今天，在我们关于宇宙发展的概念中绝对没有造物主或主宰者立足的余地；如果人们说，有一个被排斥于整个现存世界之外的最高存在物，那末这样说本身就有矛盾，而且在我看来，这对信教者的情感也是一种不应有的悔辱。"},{"type":"paragraph","text":"我们的不可知论者也承认，我们的全部知识是以我们的感官所给予我们的报告为基础的。可是，他补充道：我们怎么知道我们的感官所给予我们的，是我们通过感官去感知的事物的正确反映呢？接着他又告诉我们：当他讲到事物或事物的特性时，他实际上所指的并不是这些事物和特性（关于这些，他是一点也不能确实知道的），而只是这些事物和特性对他的感官所产生的印象。看起来，这种论点确实是很难只凭论证去驳倒的。但是在有论证之前，已经先有了行动。“起初是行动”。36在人类的才智发明这个困难以前很久，人类的行动已经解决了这个困难。对布丁的检验在于吃。当我们按照我们所感知的事物特性来利用这些事物的时候，我们就让我们的感性知觉的正确性受到确实可靠的检验。如果这些知觉是错误的，那末我们关于这种事物可能有什么用途的判断，必然也是错误的，前我们的尝试就必然要失败。可是，如果我们达到了我们的目的，如果我们发现事物符合我们关于它的观念，并且产生我们所预期的目的，那末这就肯定地证明，在这一范围内我们关于事物及其特性的知觉是同存在于我们之外的现实相符合的。当我们发现自己遭到了失败的时候，我们一般地总是不要很久就能找出使我们失败的原因：我们总是发现，我们的行动所依据的知觉，不是不完全的和肤浅的，就是不正确地和其他知觉的结果结合在一起一我们把这叫做有缺陷的推理①。只要我们注意正确地训练和运用我们的感官，并把我们的行动限制在正确地形成和正确地运用的知觉所限定的范围之内，我们就会发现，我们的行动的结果证明我们的知觉是和知觉到的事物的客观本性相符合的。到目前为止，没有一个例子迫使我们得出这样的结论：我们的经过科学检验的感性知觉，会在我们的头脑中造成一种在本性上同现实不符合的关于外部世界的观念；或者在外部世界和我们关于外部世界的感性知觉之间，存在着天生的不一致。"},{"type":"paragraph","text":"但是，这时新康德主义的不可知论者出来说道：我们可能正确地知觉到事物的特性，但是我们不能通过任何感觉的或思维的过程来学握自在之物。这个“自在之物”是在我们的认识范围之外的。对于这一点，黑格尔很早以前就已回答了：如果你知道了某一事物的一切性质，那末你也就知道了这一事物本身；这时剩下来的只是上述事物存在于我们之外这样一个事实；而当你的感管使你知道了这一事实的时候，你就完全掌握了这一事物，即康德的著名的不可认识的“自在之物”。对此，可以补充的是：在康德所处的时代，我们对自然界事物的知识确实是十分零碎的，所以他很可以猜想在我们关于每一件事物的少许知识背后存在着一种神秘的“自在之物”。但是这些不可理解的事物，已经被科学的巨大进步逐一地理解，分"},{"type":"paragraph","text":"①在德译文中删去了：“我们把这叫做有缺陷的推理”，一编者注析，甚至重新制造出来了；而我们能够制造的东西，我们当然不能认为是不可认识的。对于本世纪上半叶的化学来说，有机物正是这样的神秘的东西；现在我们学会了不依靠有机过程的帮助，按照有机物的化学成分逐-一地把有机物构造出来。近代化学家声称：无论什么物体，只要知道它的化学结构，就可以按它的成分把它构造出来。我们现在还远远地不知道最高有机物即蛋白体的结构；但是没有理由说，我们在几个世纪以后还不能达到这种认识，并以这种认识制造出人造蛋白。如果我们达到了这点，我们同时就制造出了有机生命，因为生命，从它的最低形式直到最高形式，都只是蛋白体的正常的存在方式。"},{"type":"paragraph","text":"然而，我们的不可知论者在做了这些形式上的保留之后，就立刻象十足的唯物主义者那样说话和行动，实际上他也是唯物主义者。他或许会说：就我们所知，物质和运动，或者用现在的说法，能，是既不能被创造也不能被消灭的，但是我们没有证据来证明它们不是在某一个时候被创造出来的。可是，如果你试图在某个特定的场合利用这种承认去反驳他，那末他立刻就会要你闭口。如果说他抽象地承认唯灵论的可能性，那末他具体地一点也不愿意知道这种可能性。他会对你说：就我们所知道或所能知道的来说，宇宙的造物主和主宰者是不存在的；对我们来说，物质和能是既不能被创造也不能被消灭的；在我们看来，思维是能的一种形式，是脑的一种职能；我们所知道的-·切就是：物质世界是受不变的规律支配的，如此等等。所以，就他是一个讲科学的人来说，就他知道一些事情来说，他是唯物主义者；可是在他的科学以外，在他一无所知的领域中，他就把自已的无知翻译成为希腊文，称之为不可知论："},{"type":"paragraph","text":"无论如何，有一点似乎是清楚的：即使我是一个不可知论者，显然我也不能把这本小册子中所概述的历史观称为“历史不可知论”。信教的人将会取笑我，不可知论者将会气愤地质问我是否在嘲弄他们？因此，如果我在英文中也象在其他许多文字中一样，用“历史唯物主义”这个名词来表达一种关于历史过程的观点，这种观点认为一切重要历史事件的终极原因和伟大动力是社会的经济发展、生产方式和交换方式的改变、由此产生的社会之划分为不同的阶级，以及这些阶级彼此之间的斗争，那末，即使英国的体面人物①也不致于感到太震惊吧。"},{"type":"paragraph","text":"如果我表明历史唯物主义甚至对英国的体面人物也是有利的，那末人们对我或许还会更谅解一些。我提到过这样的事实：约在四五十年前，住在英国的任何一个有教养的外国人，都为他当时必然认为是英国体面的中等阶级的宗教执迷和愚蠢而感到惊奇。现在我要证明，那时候的体面的英国中等阶级，并不象有知识的外国人所认为的那样愚蠢。这个阶级的宗教倾向是有其缘由的。"},{"type":"paragraph","text":"当欧洲脱离中世纪的时候，新兴的城市中等阶级②是欧洲的革命因素。它在中世纪的封建组织内已经赢得了公认的地位，但是这个地位对它的扩张能力来说，也已经变得太狭小①在德译文中：在“体面人物\"的后面加有：“用德文来说叫做人\"。“\"编者注"},{"type":"paragraph","text":"②在德译文中，从这里开始，直至以“新的出发点是的妥协”一句起首的那一段（本书第23页），恩格斯的用语《middleclass[“中等阶级”3.4bour-geoisie》“资产阶级\"），都译为“市民阶级”（《Burgerthum）；以后，这些用语恩格斯又译为“资产阶级”（4Bourgeoisie）。一编者注了。中等阶级，即资产阶级的发展，同封建制度的继续存在已经不相容了，因此，封建制度必定要覆灭。"},{"type":"paragraph","text":"但是封建制度的巨大的国际中心是罗马天主教会。它把整个封建的西欧（尽管有各种内部战争）联合为一个大的政治体系，同闹分裂的希腊正教徒和伊斯兰教的国家相对抗。它给封建制度绕上一圈神圣的灵光。它按照封建的方式建立了它自己的教阶制，最后，它自已还是最有势力的封建领主，拥有天主教世界的地产的整整三分之一。要在每个国家内从各个方面成功地进攻世俗的封建制度，就必须先摧毁它的这个神圣的中心组织。"},{"type":"paragraph","text":"此外，随着中等阶级的兴起，科学也大大地复兴了；天文学、机械学、物理学、解剖学和生理学的研究又重新进行起来。资产阶级为了发展它的工业生产，需要有探察自然物体的物理特性和自然力的活动方式的科学。而在此以前，科学只是教会的恭顺的碑女，它不得超越宗教信仰所规定的界限，因此根本不是科学。现在科学起来反叛教会了；资产阶级没有科学是不行的，所以也不得不参加这一反叛。"},{"type":"paragraph","text":"上面所说的，虽然只就新兴的中等阶级必然要同现存的教会发生冲突这方面提到了两点，但已经足以证明：第一，在反对罗马教会权利的斗争中，最有直接利害关系的阶级是资产阶级；第二，当时反对封建制度的每一种斗争，都必然要披上宗教的外衣，必然首先把矛头指向教会。可是，如果说大学和城市商人领先发出了呼声，那末一定会在而且确实已经在农村人民群众即农民中得到强有力的响应，农民为了自已的生存不得不到处同他们的精神的和尘世的封建主进行斗争。"},{"type":"paragraph","text":"资产阶级反对封建制度的长期0斗争，在三次大决战中，达到了顶点。"},{"type":"paragraph","text":"第-一次是德国的所谓宗教改革，路德发出的反对教会的战斗号召，唤起了两次政治性的起义：首先是弗兰茨·冯·济金根领导下的下层贵族的起义（1523年），然后是1525年的伟大的农民战争。37两次起义都失败了，主要是由于最有利害关系的集团即城市市民的不坚决，一-至于不坚决的原因，我们在这里不能阐述了。从那时起，斗争就蜕化为地方诸侯和中央政权②之间的战斗，结果，德国有两百年不见于政治上积极的欧洲国家之列。路德的宗教改革确实建立了新的信条，即适合君主专制的宗教。德国东北部的农民-一改信路德教，就从自由人下降为农奴。"},{"type":"paragraph","text":"但是，在路德遭到失败的地方，加尔文却获得了胜利。加尔文的信条适合当时资产阶级中最勇敢的人的要求。他的先定学说，就是下面这一事实在宗教上的反映：在商业竞争的世界中，成功或失败不取决于个人的活动或才智，而取决于不受他支配的情况。起决定作用的不是一个人的意志或行动，而是未知的至高的经济力量的摆布；在经济革命时期，当一切旧的商业路线和商业中心被新的所代替的时候，当印度和美洲已经向世界开放的时候，当最神圣的经济信条---一金银的价值一--也已经开始动摇和崩溃的时候，这种情形就特别真实了。加尔文的教会的组织是完全民主的和共和的；而在上帝的王国已经共和化了的地方，人简的主国还能够仍然从属于"},{"type":"paragraph","text":"①在德译文中不是“长期”，面是“伟大”，一编者注②在德译文中不是“中央政权”，而是“皇室中央政权”，--编者注君王、主教和领主吗？当德国的路德教变成诸侯手中的驯服工具的时候，加尔文教在荷兰创立了共和国，并且在英国，特别是在苏格兰，创立了有力的共和主义的政党。"},{"type":"paragraph","text":"资产阶级的第二次大起义，在加尔文教中给自已找到了现成的理论。这次起义是在英国发生的。发动者是城市中等阶级，而完成者是农村地区的自耕农。很有意思的是：在所有三次资产阶级大起义②中，都是农民提供了战斗部队，而在胜利后由于这一胜利的经济结果而必然破产的阶级又恰恰是农民。克伦威尔之后一百年，英国的自耕农差不多完全绝迹了。无论如何，如果没有这种自耕农和城市平民，单单资产阶级决不会把斗争进行到底，也决不会把查理一世送上断头台。③为了取得即便是那些在当时已经成熟而只待采集的资产阶级的胜利果实，也必须使革命远远地超出这一目的，正如1793年在法国和1848年在德国那样。这看来事实上就是资产阶级社会发展的规律之一。"},{"type":"paragraph","text":"在这种过分的革命活动之后，必然接着到来-一个不可避免的反动，这个反动又超出了它能继续下去的那个限度。经过多次动荡以后，新的重心终于确立了，并且成了新的出发点。英国历史上被体面人物称为“大叛乱”的辉煌时期，以及随之而来的斗争，是以自由党历史家称为“光荣革命”38的"},{"type":"paragraph","text":"①在德译文中不是“诸侯”，而是“德国小诸侯”。“-编者注②在德译文中不是“起义”，而是“革命”。一一编者注"},{"type":"paragraph","text":"③在德译文中，这句话是这样的：“无论如何，正是由于这种自耕农和城市平民的参与，斗争才进行到底，查理一世才上了断头台”。一一-编者注"},{"type":"paragraph","text":"④在德译文中不是“超出了它能继续下去的那个限度”，而是“超出了自己的目的”，·编者注"},{"type":"paragraph","text":"在德译文中不是“体面人物”，而是“人”，一一编者注一件比较不足道的事件而告结束的。"},{"type":"paragraph","text":"新的出发点是新兴的中等阶级①和以前的封建地主之间的妥协。后者虽然被称为贵族（就象现在这样），其实早已向法国的路易-菲力浦在很久之后才变成的“王国第一流资产者”的方向发展了。对英国幸运的是，旧的封建诸侯已经在蔷薇战争39中自相残杀殆尽。他们的继承人，虽然大部分是这些旧家族的后裔，但是离开嫡系已经很远，甚至形成了一个崭新的集团，他们的习惯和倾向，与其说是封建的，倒不如说是资产阶级的。他们完全懂得金钱的价值，而且立即着手增加地租，办法是把成百的小佃户赶走，而代之以绵羊。亨利八世糠概地胡乱处理教会土地，造成了大批新的资产阶级地主；在整个十七世纪继续不断地发生的大量没收大采邑分赠暴发户或半暴发户的情形，也造成了同样的结果。齿此，从亨利七世以来，英国的“贵族”不但不反对工业生产的发展，反而力图间接地从中取得利益；而且经常有这样一部分大地主，由于经济的或政治的原因，愿意同金融资产阶级和工业资产阶级的首脑人物合作。这样，1689年的妥协很容易就达成了。“俸禄和官职\"②这些政治上的战利品留给了大地主家庭，其条件是充分照顾金融的、工业的和商业的中等阶级的经济利益。而这些经济利益，在当时已经强大到足以决定国家的一般政策了。在细节问题上或许发生过争执，但是总的说来，贵族寡头非常清楚，他们本身的经济繁荣同工商业中等阶级的经济繁荣是有不可分割的联系的。"},{"type":"paragraph","text":"①在德译文中这里以及后面几个地方，《nniddleclass（“中等阶级\"]这·个用语，也同《bourgeoisie一样，译为“资产阶级”。-\"一编者注"},{"type":"paragraph","text":"②在德译文中不是“体禄和官职”，而是“官职、闲差、厚禄”。一一编者注"},{"type":"paragraph","text":"从这个时候起，资产阶级就成了英国统治阶级的微末的但却是得到承认的一部分了。在压迫国内广大劳动群众方面，它同统治阶级的其他部分是有共同利益的。商人或工厂主本人，对自已的伙计、工人和仆役来说，是站在主人的地位，或者象直到不久以前还说的那样，站在“天然首长”的地位。他的利益是要从他们身上尽可能取得尽量多和尽量好的劳动；为此目的，就必须把他们训练得驯服顺从。他自已是信教的，他的宗教曾经是他用来战胜国王和贵族的旗帜；不久他就发现这同一个宗教可以用来操纵他的天然下属的灵魂，使他们服从那些由上帝安置在他们头上的主人的命令。简言之，英国资产阶级这时已经参加镇压“下层等级”、从事生产的广大人民群众，而用来达到这一目的的手段之一，就是宗教的影响。"},{"type":"paragraph","text":"另外还有一件事情也助长了资产阶级的宗教倾向。这就是唯物主义在英国的兴起。这个新的①学说，不仅震动了中等阶级的宗教情感，而且还宣布自已是仅仅适合于世界上的学者和有教养的人们的暂学，而跟适合于包括资产阶级在内的没有受过教育的群众的宗教大大不同。随着霍布斯，它作为至高无上的王权的保卫者登上了舞台，并且号召君主专制制度镇压这个强壮而心怀恶意的小伙子40，即人民。同样地，在霍布斯的后继者博林布罗克、舍夫茨别利等人那里，唯物主义的新的自然神论形式，仍然是一种贵族的、秘传的学说，可见，唯物主义之所以被中等阶级仇视，既由于它是宗教的异端，也由于它具有反资产阶级的政治联系。于是，同贵族的唯"},{"type":"paragraph","text":"①在德译文中，在“新的”的后面加有：“无种论的”。一编者注物主义和自然神论相反，过去曾经为反对斯图亚特王朝的斗争提供旗帜和战士的新教教派，继续提供了进步的中等阶级的主要战斗力量，并且直到今天还是“伟大的自由党”的主要骨干。"},{"type":"paragraph","text":"这时候，唯物主义从英国传到了法国，它在那里遇到了另一个唯物主义哲学学派，即笛卡儿学派41的-个支脉，并且和这个学派汇合了。在法国，唯物主义最初也完全是贵族的学说。但是不久，它的革命性就呈现出来了。法国的唯物主义者没有把他们的批评局限于宗教信仰问题；他们把批评扩大到他们所遇到的每一个科学传统或政治设施；而为了证明他们的学说可以普遍应用，他们选择了最简便的道路：在他们因以得名的巨著《百科全书》中，他们大胆地把这一学说应用于所有的知识对象。这样，唯物主义就以其两种形式中的这种或那种形式-一公开的唯物主义或自然神论，成了法国一切有教养的青年的信条。它的影响是如此巨大，以致在大革命爆发时，这个由英国保皇党孕育出来的学说，竞给了法国共和党人和恐怖主义者一面理论旗帜，并且为《人权宣言》42提供了底本。"},{"type":"paragraph","text":"法国大革命是资产阶级的第三次起义，然而这是第一次完全抛开了宗教外衣，并在毫不掩饰的政治战线上作战；这也是第一次真正把斗争进行到底，直到交战的一方即贵族被消灭而另一方即资产阶级获得完全胜利。在英国，革命以前和革命以后的制度之间的继承关系、地主和资本家之间的妥协，表现在诉讼程序被继续应用和封建法律形式被虔诚地保存下来这方面。在法国，革命同过去的传统完全决裂；它扫清了封建制度的最后遗迹，并且在民法典43中把古代罗马法-一它差不多完满地表现了马克思称为商品生产的那个经济发展阶段的法律关系一一巧妙地运用于现代的资本主义条件；它运用得如此巧妙，以致这部法国的革命的法典，直到现在还是包括英国在内的所有其他国家在财产法方面实行改革时所依据的范本。可是我们不要忘记，虽然英国的法律仍然用野蛮的封建的语言来表达资本主义社会的经济关系，一这种语言之符合于它所表达的事物，正象英文的拼法符合于英文的读音一样（-个法国人说过：你们写下伦敦，而读出来却是君士坦丁堡）--但是也只有这个英国法律把大陆上那些在君主专制时期已经丧失而到现在还没有在任何地方完全恢复起来的个人自由、地方自治以及除法庭干涉以外不受任何干涉的独立性，即古代日耳曼自由中的精华部分，保存了几个世纪，并且把它们移植到美洲和各殖民地。"},{"type":"paragraph","text":"还是回过来谈我们的英国资产者吧，法国革命给了他一个极好的机会，使他能够借助大陆上的君主国家来破坏法国的海上贸易，兼并法国的殖民地，并且完全摧毁法国争霸海上的野心。这是他向法国革命进行斗争的原因之一。另一个原因是，这次革命的方法很不合他的胃口。这不仅仅是由于这次革命的“可恶的”恐怖政策，而且还由于这次革命企图使资产阶级的统治走向极端。英国资产者如果没有本国的贵族教他象贵族-一样待人接物，替他开创新风气，给他提供陆军军官去维持国内秋序，提供海军军官去夺取殖民地和新的海外市场，那他怎么能行呢？诚然，资产阶级中也有少数进步的人，他们并没有从妥协中得到多大利益；这一部分人主要是不太富裕的中等阶级，他们同情这次革命44，但是在议会中没有势力。"},{"type":"paragraph","text":"这样，如果说唯物主义成了法国革命的信条，那末敬畏上帝的英国资产者就更加紧紧地抓住自已的宗教。难道巴黎的恐怖时代没有证明，群众的宗教本能一旦失去，会有什么样的结局？唯物主义愈是从法国传播到邻近的国家，愈是得到各种类似的理论思潮、特别是德国哲学的支持，唯物主义和自由思想愈是在大陆上普遍地真正成为--个有教养的人所必需具备的条件，英国的中等阶级就愈是固执地坚守它的各种各样的宗教信条。这些信条，尽可以彼此不同，但是它们全都是明显的宗教信条，基督教信条。"},{"type":"paragraph","text":"当革命在法国保证了资产阶级的政治胜利的时候，在英国，瓦特、阿克莱、卡特赖特以及其他等人，开始了产业革命，这一革命把经济力量的重心完全转移了。资产阶级的财富，比土地贵族的财富增长得快得多。在资产阶级内部，金融贵族、银行家等等，愈来愈被工厂主推到后台去了。1689年的妥协，甚至在经过-些逐步的对资产阶级有利的修改以后，也不再适合这个妥协的参与者的力量对比了。这些参与者的性质也改变了；1830年的资产阶级，同前一世纪的资产阶级是大不相同的。仍然留在贵族手中并且被贵族用来抵制新工业资产阶级的野心的政治权力，已经同新的经济利益不能相容了。于是必须同贵族进行一次新的斗争；这-一斗争的结局只能是新的经济力量的胜利。首先，在1830年的法国革命的刺激下，不顾一切抵抗，通过了改革法案45。这使资产阶级在议会里获得了公认的和强大的地位。随后是谷物法的废除，这永远确定了资产阶级、特别是资产阶级中最活跃的部分即工厂主对土地贵族的优势。这是资产阶级的最大的胜利；然而这也是它专门为自已的利益获得的最后一次胜利。它后来取得的任何一次胜利，都不得不同一个新的社会力量分享，这个新的社会力量起初是它的同盟者，但是不久就成了它的对手。"},{"type":"paragraph","text":"？"},{"type":"paragraph","text":"产业革命创造了一个大工业资本家的阶级，但是也创造了一个人数远远超过前者的产业工人的阶级。这个阶级．随着产业革命对一个又一个的工业部门的占领，在人数上不断地增加；而随着人数的增加，它在力量上也增加了。这一力量早在1824年就表现了出来，当时它迫使议会勉强地废除了禁止工人结社的法律46。在改革运动中，工人是改革派的激进的一翼；当1832年的法案剥夺了他们的选举权的时候，他们就把自已的要求写进人民宪章47，并且为了同强大的资产阶级反谷物法同盟48相对抗，组成了一个独立的政党，即宪章派。这是近代第一个工人政党。"},{"type":"paragraph","text":"后来，大陆上发生了1848年2月和3月的革命，在这些革命中，工人起了很重要的作用，而且，至少在巴黎，提出了从资本主义社会的观点看来决不能允许的要求。接着而来的是普遍的反动。最初是1848年4月10日宪章派的失败；其次是同年6月巴黎工人起义的被镇压；再其次是1849年意大利、匈牙利和德国南部的不幸事件；最后是1851年12月2日路易·波拿巴战胜巴黎。这样，工人阶级的要求的吓人声势，至少在短时期内被压制下去了，可是用了多少代价啊！如果说，英国资产者先前已经确信有必要使普通人民保持宗教情绪，那末，在经历了这一切之后，他一定会如何更加强烈地感觉到这种必要性呢？他不理会大陆上的伙伴们的讥笑，年复一年地继续把成千上万的金钱花在向下层等级宣传福音方面；他不满足于他本国的宗教机关，还求助于当时宗教买卖的最大组织者“乔纳森大哥”，从美国输入了基督复活派49，穆迪和桑基之流；最后他还接受了“救世军”的危险的帮助，“救世军”恢复了早期基督教的宣传，把穷人当做上帝的选民看待，用宗教方式反对资本主义，从而使早期基督教的阶级对抗的"},{"type":"paragraph","text":"因素得到滋长，这对于日前在这上面花现钱的富翁来说，总有?"},{"type":"paragraph","text":"一天会带来麻烦的。me"},{"type":"paragraph","text":"看来这似乎是历史发展的规律：资产阶级在欧洲任何个国家都不能一至少是不能长时期地一一象中世纪的封建贯族那样独自掌握政权。即使在封建制度已经完全消灭了的法国，资产阶级作为一个整体，也只是在很短的时期内完全掌握了政权。在路易-菲力浦统治时期，即1830一1848年，是极小一部分资产阶级统治着王国，而大得多的一部分，则被高标准的选举资格限制剥夺了选举权。在第二共和国时代，即：1848一1851年，整个资产阶级统治了国家，但只有三年之久；资产阶级的无能，带来了第二帝国。只是在现在，在第三共和国时代，资产阶级作为一个整体，掌握了政权达二十年以上；而它已经显露出衰落的鲜明征兆了。资产阶级的长期统治，，只有在美国那样一个从来没有过封建制度而且社会一开始就建立在资产阶级基础之上的国家中，才是可能的。但是即使在法国和美国，资产阶级的继承者--工人，也已经在敲门了。"},{"type":"paragraph","text":"在英国，资产阶级从来没有掌握过全权。甚至1832年的胜利，也还是让土地贵族几乎独占了政府所有的高级职位。富裕的中等阶级对此表示的温顺态度，在自由党的大工厂主威·爱·福斯特先生发表那次公开演说以前，我是一直不能理解的。福斯特先生在那次演说中劝告布莱得弗德的青年学习法语，以此作为出人头地的手段，并且援引自已的经验说，当他作为一个内阁大臣而必须出入于那种说法语至少和说英语同样必要的社交场合时，他是感到多么难堪！的确，当时的英国中等阶级通常都是完全没有受过教育的暴发户，他们没有办法不把政府的那些高级职位让给贵族，因为那里所需要的，是其他一些条件，而不是加上了商业干练气味的岛国狭隘性和岛国自大心。①甚至目前报纸上关于中等阶级教育的无休止的争论，也表明英国中等阶级仍然认为自已不配受最好的教育，而为自己寻找某种比较谦卑的东西。所以，似乎很自然，甚至在谷物法废除以后，那些取得了胜利的人物，科布顿们、布莱特们、福斯特们等等，还不能正式参与统治国家，直到二十年之后，新的改革法案50才为他们开了内阁的大门。直到今天，英国的资产阶级还深深感到自已的社会地位很低，甚至用自已的和人民的金钱去养一个供装饰用的有闲等级，要它在-一切庄严的场合体面地代表民族；而且当他们自己中间有人被认为有资格进入这个归根到底是他们自已造就的"},{"type":"paragraph","text":"即使在商业上，采取民族沙文主义的自大态度也是足以坏事的。直到最近，普通的英国工厂主还以为，英国人不说本国话而说外国话，是有失体面的，而且当他看到外国的“可怜虫”迁居到英闻，使他免去向国外推销产品的麻烦时，便颇为自做了，他根本没有觉察到，这些外国人（大部分是德国人）这样一来就控制了英国对外贸易（不论是进口还是出口）的很大--部分，而英国人的直接对外贸易则变得几乎只局限于殖民地、中国、美国和南美洲了。他也没有觉察到，这些德国人同在外国的其他德国人进行贸易，后者逐渐组织了一个遍及世界各地的完整的商业殖民地网。大约四十年前，当德国认真地开始生产出口商品的时候，这个商业殖民地网，就给德国帮了很大的忙，使它在很短的时期内从一个输出粮食的国家变成~个头等的工业国。后来，大约十年前，英润的工厂主才大吃一惊，去问英国的大使们和领事们：为什么他再也保持不住自已的颤客。一致的答复是：（1）你们不学你们的顾客的语言，却要求他们说你们的语言；（2）你们不但不设法去适应你们的顾客的需要、习惯和爱好，反而要他们迁就你们的英国式的需要、习惯和爱好。高等特权集团里去的时候，他们便认为是无上的光荣。"},{"type":"paragraph","text":"这样，工商业中等阶级还没有来得及把土地贵族从政权中完全赶走，另一个竞争者，工人阶级，便已经登上舞台了。宪章运动和大陆革命以后的反动，以及1848一1866年英国贸易的空前繁荣（通常以为这只是由于自由贸易，其实在更大得多的程度上是由于铁路、远洋轮船以及全部交通工具的巨大发展），重新迫使工人阶级处于依附自由党的地位，他们在这个党内，也象在宪章运动以前一样，组成了激进的一翼。可是，工人们对选举权的要求逐渐成为不可遇制的了；在辉格党人即自由党的首领们“畏缩不前”的时候，迪斯累里却显示了自已的高明，他促使托利党人抓紧有利的时机，在城市选区中实施了户主的选举权①，并且重新划分了选区。随着实行了秘密投票；1881年文把户主的选举权推广到各郡，并且又重新划分了选区，使各选区在某种程度上趋于平衡。51这-切措施大大增加了工人阶级在选举中的力量，使工人阶级至少在一百五十个到两百个选区中现在已经占选民的大多数。但是议会制度是训练人们尊重传统的最好的学校；如果说，中等阶级曾经怀着敬畏的心情仰望约翰·曼纳斯勋爵所戏称的“我们的老贵族”，那末，工人群众则以尊重和恭敬的态度去看待当时所谓的“优越者”即中等阶级。的确，大约在十五年前，英国的工人是模范工人，他们对雇主的恭敬，以及他们在为自己要求权利时所表现的克已的谦逊，大可排解我们德国的讲坛社会主义学派52的经济学家们由于他们本国工人的不可救药的共产主义倾向和革命倾向而产生的烦恼。"},{"type":"paragraph","text":"（在德译文中，在“户主的选举权”的后面加有：“（它适用于每一个租有单独住房的人）”。一一编者注"},{"type":"paragraph","text":"但是英国的中等阶级一-毕竞是很好的生意人一比德国的教授们看得远。他们只是追不得已才同工人阶级分享了政权。他们在宪章运动的年代里领教过人民这个强壮而心怀恶意的小伙子的作为。从那时以来，他们被道把人民宪章的·大部分要求纳入了联合王国的法律之中。现在比以往任何时候都更需要用精神手段去控制人民，而一切能影响群众的精神手段中第一个和最重要的手段依然是宗教。于是，学校董事会中就让牧师占据优势；于是，资产阶级日益增加自我捕税，以维持各种基督复活派，从崇礼派53直到“救世军”。"},{"type":"paragraph","text":"现在，英国的体面人物战胜了大陆资产者的自由思想和对待宗教的冷淡态度。法国和德国的工人已经变成了叛乱者。他们全都感染了社会主义，而且根据相当充分的理由，他们在选择取得统治的手段时，丝毫不在乎这种手段是否合法。这个强壮的小伙子一天比一天更心怀恶意。法国和德国的资产阶级，只好采取最后的办法，不声不响地丢掉了他们的自由思想，就象一个年轻人，感到晕船晕得厉害的时候，把他在船上装模作样抽着玩的雪茄烟俏悄地丢掉一样；嘲笑宗教的人，一个-个地在外表上变成了笃信宗教的人，他们毕恭毕敬地谈论教会、它的教条和仪式，甚至在实在不得已的时候，自己也行起这些仪式来了。法国资产者每逢星期五进素食，德国资产者每逢星期日就坐在教堂的椅子上耐心地听完新教的冗长的布道。他们已经吃了唯物主义的苦头。《DieReligionmussdemVolkerhaltenwerden》--“必须为人民保存宗教”，这是拯救社会于完全毁灭的唯一的和最后的手段。对他"},{"type":"paragraph","text":"①在德译文中不是“以维持各种基督复活派”，而是“以利用各种各样的宗教蛊惑方式”。“一一编者注们白己不幸的是：等到他们发现这一点的时候，他们已经用尽一切力量把宗教永远破坏了。现在轮到英国资产者来嘲笑他们了：“鑫才！这个我早在两百年前就可以告诉你们了！”"},{"type":"paragraph","text":"然而，无论英国资产者的宗教愚钝，或是大陆资产者的事后皈依宗教，恐怕都不能阻止日益高涨的无产阶级的潮流。传统是一种巨大的阻力，是历史的情性力，但是由于它只是消极的，所以一定要被摧毁；因此，宗教也不能长期成为资本主义社会的保护物。如果说，我们的法律的、哲学的和宗教的观念，都是在一定社会内占统治地位的经济关系的或近或远的枝叶，那末，这些观念终究抵抗不住因这种经济关系完全改变而产生的影响。除非我们相信超自然的奇迹，否则，我们就必须承认，任何宗教教义都不足以支持一个摇摇欲坠的社会。"},{"type":"paragraph","text":"事实上，在英国，工人也开始重新动起来了。毫无疑义，他们还被各种传统束缚着。有资产阶级的传统，例如一种很普遍的看法，以为只能有两个政党保守党和自由党，而工人阶级必须依靠和通过伟大的自由党来谋取自身的解放。还有工人的传统，从工人们最初摸索着从事独立行动的努力中继承下来的传统，例如，把一切没有经过正规学徒训练的工人排斥于许多旧工联之外；这就等于每一个采取这种做法的工会在为自已培养工贼。但是尽管如此，英国的工人阶级还是在前进，甚至布伦坦诺教授也不能不碗借地把这一点告诉他的讲坛社会主义者同仁54。如同英国的一切事情一样，工人阶级用缓慢而适度的步伐前进着，前进中有时跨踏不定，有时做一些没有效果的尝试；它在前进中有时由于过分小心而对“社会主义”这个名称表示不信任，同时却逐渐地吸收着社会主义的实质；运动在扩展着，并且一批接着一批地把工人吸引进来。现在它已经把伦敦东头的没有技术的工人从沉睡中唤醒了，我们全都看到，这些新的力量反过来又给了工人阶级以多么有力的推动。如果运动的步伐赶不上某些人的急躁要求，那末就请他们不要忘记：正是英国工人阶级保存着英国民族性格的最优秀的品质，在英国，一个进步-经取得，照例以后永不会失去。如果说老宪章派的儿子们，由于上述原因，还做得不够，那末，孙子们则可望不辱没他们的祖父。"},{"type":"paragraph","text":"但是，欧洲工人阶级的胜利，不是只依靠英国一个国家。它至少需要英法德三国的共同努力，才能得到保证。在法国和德国，工人运动大大超过了英国。在德国，工人运动的胜利甚至指日可待了。那里的工人运动在最近二十五年所获得的进展是空前的。它正以日益增加的速度前进着。如果说，德国的中等阶级已经表明自己非常缺乏政治才能、纪律、勇气、坚韧和毅力，那末，德国工人阶级则充分证明了自已具备这些品质。四百年前，德国是欧洲中等阶级第一次起义的出发点；依目前的形势来判断，德国难道不可能同样成为欧洲无产阶级第一次伟大胜利的舞台吗？"},{"type":"paragraph","text":"弗·恩格斯"},{"type":"paragraph","text":"1892年4月20日"},{"type":"paragraph","text":"原文是英文载于1892年在伦敦出版的《社会主义从空想到科学的发展》一书，"},{"type":"paragraph","text":"选自《马克息恩格斯选集》并由作者译成德文摘要发表于"},{"type":"paragraph","text":"第23卷第339-403页1892一1893年《新时代》杂志第1卷第1期和第2期"}],"authors":["恩格斯"],"dates":[{"year":1892,"month":4,"day":20}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":12,"page_end":38},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"97a600705a"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
