script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"革命统帅生产　生产热气腾腾杨行公社干部群众以搞好春耕生产的实际行动回击右倾翻案风","authors":[],"dates":[{"year":1976,"month":2,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　宝山县杨行公社党委，以阶级斗争为纲，发动干部、社员迅速掀起春耕生产热潮，用实际行动批判“三项指示为纲”的修正主义纲领，反击右倾翻案风。"},{"type":"paragraph","text":"反击右倾翻案风的斗争开展以来，杨行公社广大干部和社员在公社党委的领导下，认真学习了毛主席关于“安定团结不是不要阶级斗争，阶级斗争是纲，其余都是目”的指示，全公社十一个大队普遍举办学习班，提高了坚持以阶级斗争为纲的自觉性。许多同志说，我们一定要牢牢掌握阶级斗争这个纲，深入批判“三项指示为纲”的修正主义纲领及其理论基础阶级斗争熄灭论和唯生产力论，做到以纲带目，深入开展农业学大寨运动，为夺取今年农业丰收，打好春耕生产这一仗，以实际行动反击右倾翻案风。"},{"type":"paragraph","text":"连日来，这个公社的西街大队干部、社员晚上坚持学理论，白天举铁臂，挥银锄，大闹春耕生产。他们在抓紧三麦、油菜春管的同时，发扬“自力更生”、“艰苦奋斗”的革命精神，大积土杂肥。最近三天，全大队已积土杂肥八十多潭，每潭约三、四百担。这个大队何蒙湾生产队的社员们在队干部带领下，不怕早春寒冷，踏着冰霜，每天出动三十多个社员，挖积肥池，挑河泥，清垃圾，大积土杂肥，努力为早稻备足基肥。桂家木大队党支部以阶级斗争为纲，发动干部社员批判资本主义倾向，干部、群众齐动手，挑肥积肥忙备耕，十八个生产队，队队行动。入春以来，他们已积有机肥料五万多担，运进城市垃圾杂肥六千多担，基本上解决了棉花田所需的基肥。"},{"type":"paragraph","text":"杨行公社党委还抓住以阶级斗争为纲，大闹春耕备耕取得良好成绩的典型，先后两次召开现场会，加以总结推广，使全公社春耕备耕生产迅速掀起热潮。现在全公社每天有八千多名社员奋战在春耕备耕第一线，全公社在去冬积肥一百六十多万担的基础上，又增积了近十万担土杂肥，为四千六百多亩早稻解决了基肥，同时，他们对八千四百多亩棉田深捣了两次，对三千五百多亩菜，四千九百多亩三麦抢施了春肥，以促进春发。　(本报通讯员)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"29cdc7de56"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
