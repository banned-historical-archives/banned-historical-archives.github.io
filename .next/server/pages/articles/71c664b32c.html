<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"力争完成经济作物播种计划","authors":["《人民日报》社论"],"dates":[{"year":1961,"month":4,"day":28}],"is_range_date":false,"parts":[{"text":"力争完成经济作物播种计划","type":"title"},{"text":"《人民日报》社论","type":"authors"},{"text":"“谷雨”已过，各种重要经济作物的播种工作已经开始或即将开始。认真贯彻执行党的关于发展经济作物的政策，保证国家经济作物播种面积、品种计划的完成，努力提高播种质量，为今年经济作物有个好收成打下基础，是当前农业战线的一个重要任务。","type":"paragraph"},{"text":"经济作物种类多，用途广，经济价值高，它同国家经济建设和人民生活有着极为密切的关系。大家知道，经济作物是轻工业原料的主要来源，目前我国轻工业原料有 80％是来自农业。努力发展经济作物，就能为轻工业的发展提供必要的物质条件。轻工业发展了，不仅能给国家积累大量的建设资金，而且能够大大增加市场商品 的供应量，更好地满足社会日益增长的需要。经济作物也是国家出口货源的主要部分。经济作物更是人民生活中不可缺少的必需品，关系到人们日常吃的、穿的、用 的各个方面。为了满足国家经济建设和人民生活的需要，必须在大力发展粮食生产的同时，努力发展经济作物生产。","type":"appellation"},{"text":"粮食生产和经济作物生产的相互关系必须是以粮为纲，全面发展，互相促进。粮食生产是整个农业生产的基础，是发展经济作物生产的前提条件。所以大办农业，首 先必须大办粮食。只有粮食生产极大地发展了，才能为经济作物生产的发展提供必要的物质条件。但反过来，在一定的条件下，经济作物生产的发展，同样可以促进 粮食生产更快发展。一般说来，经济作物产值比较高。根据有些地区典型调查，如果经济作物占用15％左右的耕地，它的收入可以达到农副业总收入的30％左 右。所以，根据当地的生产习惯和可能的条件，种植一定比重的经济作物，不仅对国家有好处，而且对于公社各级组织集体经济的增长和社员收入的增加，都有好 处。当然，粮食生产和经济作物生产，在一定程度上也会存在着争土地、肥料、劳动力的矛盾。但是，只要我们正确执行农村人民公社的各项政策，坚决贯彻执行以 粮为纲，积极发展经济作物的各项具体措施，对于粮食和经济作物的生产，实行统筹兼顾，全面安排，从实际出发采取适当措施，矛盾是不难解决的。","type":"paragraph"},{"text":"经济作物包括的方面很多，主要的有棉花、油料、烤烟、麻类、茶叶、糖料、水果、药材等等。这些作物生产的特点是：有些是数量大，产区集中，像棉花等；有些 是数量小，产区广而分散，像药材等。以生产经济作物为主的地区，领导起来比较集中，群众生产有经验，它可以向全国提供大量的经济作物。由于种植集中，就必 须正确地解决与发展经济作物有关的一系列的政策问题。比如大部耕地种植经济作物之后，粮食的供应和奖励问题；经济作物生产费工多、投资大，如何使生产大队 和全体社员相应地增加收入，等等。分散产区，如何调动广大群众的积极性，把各种小项目经济作物发展起来，也关系到政策问题，尤其是收购政策的问题。所以， 无论是哪一种产区的经济作物生产，关键都在于正确执行发展经济作物生产的各项政策，加强思想政治工作，进一步鼓舞农民种植经济作物的积极性。","type":"paragraph"},{"text":"种植经济作物费工多，技术性强，投资大，对于国家的经济建设和全国人民的生活需要贡献很大。因此，必须使以种植经济作物为主的公社、生产大队和生产队的实 际收入比种植一般粮食作物的单位高一些。经济作物产区社员的口粮标准要保证他们能吃到与附近的余粮队相当的口粮，并且在他们出售经济作物产品的时候，按照 出售的数量，给予一定的物质奖励。只有这样，才能把广大农民种植经济作物的积极性更充分地调动起来，乐于抽出一部分好地、肥料和劳动力，种植经济作物。一 定要使种植经济作物的公社、大队和生产队，真正能得到奖励和优待，这样才有利于经济作物生产的发展。","type":"paragraph"},{"text":"力争完成今年国家规定的经济作物播种计划，是关系到国家经济建设和人民生活的一件大事。各级党委除了认真贯彻执行党的关于发展经济作物的政策以外，还必须 加强思想政治工作，广泛地向农民宣传种植经济作物的重要性，坚持政治挂帅与物质保证相结合，使经济作物区的农民能够及时地多种一些经济作物。领导机关应当 进行细致的调查工作，及时了解政策执行中的各种情况，一有问题就去解决。各有关业务部门要在党委的统一领导下，与生产大队或生产队签订结合合同，互相提供 必要的保证，力争更好地完成经济作物的生产计划和收购计划。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"71c664b32c"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
