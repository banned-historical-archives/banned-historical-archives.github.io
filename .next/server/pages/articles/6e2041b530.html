script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"wenji6","type":"pdf","name":"毛泽东文集第六卷（1999）","internal":false,"official":true,"author":"中央文献研究室","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/wenji6.pdf"],"article":{"title":"革命的转变和党在过渡时期的总路线","description":"","dates":[{"year":1953,"month":12}],"parts":[{"text":"革命的转变和党在过渡时期的总路线","type":"title"},{"type":"subtitle","text":"一"},{"type":"paragraph","text":"我们说标志着革命性质的转变、标志着新民主主义革命阶段的基本结束和社会主义革命阶段的开始的东西是政权的转变，是国民党反革命政权的灭亡和中华人民共和国的成立，并不是说社会主义改造这样一个伟大的任务，在人民共和国成立以后就可以立即在全国一切方面着手施行了。不是的，那时，我们还须在广大的农村中解决封建主义与民主主义即地主与农民之间的矛盾。那时在农村中的主要矛盾是封建主义与民主主义之间的矛盾，而不是资本主义与社会主义之间的矛盾，因此需要有两年至三年时间在农村实行土地改革。那时我们一方面在农村实行民主主义的土地改革，一方面在城市立即着手接收官僚资本主义企业使之变为社会主义的企业，建立社会主义的国家银行，同时在全国范围内着手建立社会主义的国营商业和合作社商业，并已在过去几年中对私人资本主义企业开始实行了国家资本主义的措施。所有这些显示着我国过渡时期头几年中的错综复杂的形象。"},{"type":"subtitle","text":"二"},{"type":"paragraph","text":"从中华人民共和国成立，到社会主义改造基本完成，这是一个过渡时期。党在这个过渡时期的总路线和总任务，是要在一个相当长的时期内，逐步实现国家的社会主义工业化，并逐步实现国家对农业、对手工业和对资本主义工商业的社会主义改造。这条总路线是照耀我们各项工作的灯塔，各项工作离开它，就要犯右倾或“左”倾的错误。"},{"type":"subtitle","text":"三"},{"type":"paragraph","text":"党在过渡时期的总路线的实质，就是使生产资料的社会主义所有制成为我国国家和社会的唯一的经济基础。我们所以必须这样做，是因为只有完成了由生产资料的私人所有制到社会主义所有制的过渡，才利于社会生产力的迅速向前发展，才利于在技术上起一个革命，把在我国绝大部分社会经济中使用简单的落后的工具农具去工作的情况，改变为使用各类机器直至最先进的机器去工作的情况，借以达到大规模地出产各种工业和农业产品，满足人民日益增长着的需要，提高人民的生活水平，确有把握地增强国防力量，反对帝国主义的侵略，以及最后地巩固人民政权，防止反革命复辟这些目的。要完成这个任务，大约需要经过三个五年计划，就是大约十五年左右的时间（从一九五三年算起，到一九六七年基本上完成，加上经济恢复时期的三年，则为十八年，这十八年中已经过去了四年），那时中国就可以基本上建设成为一个伟大的社会主义国家。"},{"type":"paragraph","text":"根据人民出版社一九五七年十二月"},{"type":"paragraph","text":"出版的《社会主义教育课程的阅读"},{"type":"paragraph","text":"文件汇编》（第一编）刊印。"}],"comment_pivots":[{"part_idx":0,"offset":16,"index":1},{"part_idx":6,"offset":47,"index":2}],"is_range_date":false,"authors":["毛泽东"],"comments":["这是毛泽东在审阅中共中央宣传部编写的《为动员一切力量把我国建设成为一个伟大的社会主义国家而斗争——关于党在过渡时期总路线的学习和宣传提纲》稿时，加写或改定的三段文字。关于党在过渡时期的总路线，毛泽东从一九五二年下半年开始提出，一九五三年六月十五日在中共中央政治局会议上作了比较完整的表述，八月正式写到周恩来在一九五三年全国财经工作会议上的结论中。本篇二是毛泽东最后改定的关于过渡时期总路线的表述。","这句话是中共中央宣传部《关于党在过渡时期总路线的学习和宣传提纲》送审稿中原有的。"],"page_start":329,"page_end":331,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6e2041b530"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
