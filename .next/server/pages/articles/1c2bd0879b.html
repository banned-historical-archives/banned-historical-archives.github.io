script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji45","name":"毛泽东全集第45卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji45.pdf"],"article":{"title":"在中共八届十中全会华东组情况简报上的批语","alias":"","parts":[{"type":"paragraph","text":"在中共八届十中全会华东组情况"},{"type":"paragraph","text":"简报上的批语"},{"type":"paragraph","text":"（1962年9月）此二件”，江青阅。退毛。可看，很好。"},{"type":"paragraph","text":"[1]其中一件是中共中央办公厅机要室1962年9月16日印发的八届十中全会简报华东组第20号刊登的中共中央政治局委员、国务院副总理兼外交部部长陈毅9月14日下午在华东组的发言。陈毅说，现在有一股风，叫“三面和一面少”。意思是说我们对美国斗得过分了，对修正主义斗得过分了，对尼赫鲁斗得过分了，要和缓一点。一少，是指我们对亚洲、非洲、拉丁美洲支持太多了，要少一点。这种“三和一少”的思想是错误的。大量的事实说明我们同肯尼迪、赫鲁晓夫、尼赫鲁联合战线的斗争是躲不掉的，是非常必要的，但是我们的斗争又都是有分寸、有约束的，不能说已经斗过分了。对于民族解放运动，随看我们力量的不断增长和技术的提高，我们还应当给他们以更多的支持。在这个问题上，我们不能目光短浅，不能打小算盘，要打大算盘，不能只算经济账，要算政治账。所以又吹起了“三和一少”那样一股歪风，主要是三年的暂时困难，把一些马列主义立场不坚定的人吓昏了。要批驳这种意见。现在我们的外交政策是正确的，它有助于我们争取时间，克服暂时的困难。如果采取机会主义的政策，不仅会影响对外斗争，而且也会影响国内局势。另一件不详。"}],"authors":["毛泽东"],"dates":[{"year":1962,"month":9}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":276,"page_end":276},"tags":[{"name":"陈毅","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1c2bd0879b"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
