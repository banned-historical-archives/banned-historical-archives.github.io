<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"广州工商界对进一步实行社会主义改造的反应","authors":[],"dates":[{"year":1955,"month":11,"day":22}],"is_range_date":false,"parts":[{"text":"广州工商界对进一步实行社会主义改造的反应","type":"title"},{"text":"【广东分社二十二日讯】最近各方面加紧进行私营工商业的社会主义改造工作，在广州市工商界中引起了许多怀疑和顾虑，他们对进一步接受改造和全行业实行公私合营有四“怕”：","type":"paragraph"},{"text":"(一)怕很快改变所有制。他们对资本家所有制表示无穷忧虑，“快要国有化”的论调笼罩着整个工商界。一般认为“大难临头”。中区副区长陈鲠斧(资本家)说：“目前不是怕合营太快，而是怕全民所有制太快！”市工商联副秘书长梁华根说：“原以为可以分红十五年，谁知这么快！”目前正在市公私合营厂资方人员学习班学习的资本家，普遍把这次学习看作是“取消资本家所有制的前奏曲！”珠江染织厂副厂长孔敬之说：“合营时已丢了半截(一半资金的意思)，此次学习便连那半截都丢光了。”棉布业新正大店资方龙耀庭出席花纱布公司召开的座谈会讨论北京棉布商业全业合营的时候，当场面色发白，不作声。","type":"paragraph"},{"text":"(二)怕利润更受限制，经营更受束缚。轮船业资本家马余化提出：加快社会主义改造，股息八厘是否也逐步削减呢？靠股息维持一部分生活的，有困难，能否照顾呢？进出口业资本家也表示不愿搞全行业大合营，怕经验丰富更不自由。","type":"paragraph"},{"text":"(三)怕职位安排不适当，公私合营厂资方学习班里许多资本家垂头丧气轮船业资本家刘荣光说：“轮船业一般顾虑全业合营后，许多经理、副经理会降为科长、股长，原有科长、股长又怎么安排呢?”","type":"paragraph"},{"text":"(四)怕斗争。制药业资本家张自励说：“地主和反革命分子的改造，就是要他们改造成为‘自食其力’的人，我们的改造也称‘自食其力’，是否就是这样的出处呢？(意思是指对他们是否同地主、反革命分子一样看待)”轮船业资本家徐原说：“现在资本家都是公民啦，为什么又说将来要争取成为一个社会主义公民，是否资产阶级还要有一关过呢？”现在有些资本家已藉故想离开广州下乡。","type":"paragraph"},{"text":"从资本家各种类型人物来看：上层分子紧张，中层顾虑，下层比较不大关心。从行业来看：反应最敏感的是进出口业、棉布业和日用百货业。其原因：一、行业大，有些大户资金较多；二、上层人物较多；三、看到了北京棉布业全业合营的消息。","type":"paragraph"},{"text":"目前由于一些右派的上层人物(如陈祖沛、林志澄等)都在北京开会没有回来，再加上毛主席的讲话已由资本家信中传来，对一些资本家起了稳定情绪和鼓励的作用，因此，一般人的思想已从乱中趋稳。如陈祖沛(市工商联副主委)从北京来信给代理人董江说：“我们是有前途的，而不是以前所想像要完蛋的，要积极找同业组织合并合营，投资是有利息可收的。……”这安定了一些资本家的情绪。","type":"paragraph"},{"text":"现在资本家的具体动态有如下几方面：","type":"paragraph"},{"text":"(一)为了争取政治地位，积极进行全业公私合营的活动，如百货业已定出计划送市财粮贸办公室审核。估计别的行业也会仿效。","type":"paragraph"},{"text":"(二)以各种方式频频接头商议对策，也可能是酝酿合营。仓库业公会主任委员刘建新发动五十多个同业人员旅行，并且向公会索取仓库业户数和仓库容量的资料，说准备合营。饮食业和文化用品业也有同样情况。","type":"paragraph"},{"text":"(三)消极经营，浪费资金。进出口业资本家潘以和(过去是积极分子)到桂林游山玩水。另一进出口业资本家潘永湘借招待港澳同业为名，到酒家一顿就花了三百元，藉此削弱企业资金。","type":"paragraph"},{"text":" (方力)","type":"paragraph"}],"comments":[],"origin":"1955年11月26日新华通讯社编《内部参考》。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4f2f3f2891"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
