<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"批评教育部对高等师范教育的领导","authors":["南京师范学院","高觉敷"],"dates":[{"year":1957,"month":6,"day":4}],"is_range_date":false,"parts":[{"text":"批评教育部对高等师范教育的领导","type":"title"},{"text":"南京师范学院高觉敷","type":"authors"},{"text":"南京师范学院副院长高觉敷于6月4日写了一篇稿件投给上海文汇报，批评教育部对高等师范教育的领导。","type":"paragraph"},{"text":"强调“三点困难”","type":"subtitle"},{"text":"他在这篇稿件一开头就说“高等师范教育是教育中一个重要五一节，因为高师教育的成败，上可以影响高等教育，中可以影响中等学校教育，下还可以通过师范学校影响小学教育，通过幼儿师范学校影响幼儿教育。”但是，他认为“师范学校是不容易办理的”，列举了三点理由：第一、中国经济情形还很困难，中小学教师的待遇一时不能改善到合理的程度，所以师范学校对青年的吸引力不大；第二、院系调整时某些领导干部对师范教育没有正确的认识，所以为新建立的师范院校所配备的人力、物资、图书、仪器都很不够，因此这些院校在高等学校中相形见绌；第三、高等师范学校为了培养人民教师，所以它的教学计划包含政治学科、教育学科、专业学科和教育实习，专业学科和教育学科的矛盾由来已久，到现在还没有得到解决。","type":"paragraph"},{"text":"教育部的“四害”","type":"subtitle"},{"text":"接着，高觉敷批评了教育部，认为“教育部对高师教育的艰巨性估计不足，采取了简单化的办法发号施令，推行高师教育。去年不问条件大量发展，进一步降低了高师教育的质量，增加了各院校的困难”。他说“学习苏联上教条主义”也是一害，应和主观主义、官僚主义、宗派主义并称为教育部的“四害”。他说“高师教育已经走上了歧途”。“过去大家怕被扣帽子，不敢公开表示怀疑，现在已经是非难之声四处可以听到了。”","type":"paragraph"},{"text":"“共产党不懂学术”","type":"subtitle"},{"text":"高觉敷在这篇文章中，散布了共产党不懂学术、不能领导科学的谬论。他说：“在政治上有地位的人，不一定在学术上也有相应的地位。柳副部长(指教育部副部长柳湜同志)把政治和学术混同起来。”“柳副部长到南师视察时，俨然一位大员……对教师们讲话采取了教训人的口吻，因此教师们不愿意和他谈话。”他还批评了1956年4月高教会议中纪司长的态度“更加粗暴”。据说会议上听取了北师大关于教学工作和教育工作的经验报告后，小组讨论会开得不好。纪司长第二天给大家提出了批评：“你们各个院校都可能有梅兰芳，你们要把梅兰芳的霸王别姬拿出来，没有的话就可以别谈了。”下午小组会一齐冷场，大家说：“我们没有梅兰芳，更没有梅兰芳的霸王别姬，谈什么呢？”高觉敷从这一件事出发，很感慨地写道：“教育部领导高等师范学校，而领导同志对大学教授却这样地没有礼貌，这是不应该的。”高又说1955年他到某地遇到一位师范学院的非党副校长。“这位副校长是老教育家，却被柳副部长分配去领导基建工作，而领导教学工作的则是一位不懂业务的党员副校长。”他引用了那位副校长的话：“我们党外人士是没有资格领导教学的。”在高觉敷的原稿上还可以看到他用红笔删去的一句话：“一个人只要是党员，就可以不问他有无能力或修养，都可以为领导教学的校长。”从这句话中，我们可以看出高觉敷露骨地诬蔑我们党既不懂科学又不重视非党的高级知识分子。","type":"paragraph"},{"text":"“苏联专家不了解中国情况”","type":"subtitle"},{"text":"高觉敷在文章中还诬蔑学习苏联教学经验是教条主义，是“四害”之一。1954年11月，高在南京师范学院担任教务长时，柳湜副部长曾陪同苏联专家费拉托夫来院视察。柳副部长在视察报告中说：“专家强调指出一个高等学校必须有一位副校长掌握全部教学工作，批评了对系的领导不统一，无理由地把系的领导分割开来，由校长、副校长和教务长分担的现象。按照今天中国制度，教务长应该是管教学工作的副校长的助手，教务处是一个工作机构，为学校教学领导工作办事。有的学校曾经发生教务处和校长间的矛盾，认为副校长到系了解工作，一定要经过教务处，那显然是错误的。”高觉敷认为苏联专家的“批评是与事实不符”。他说：“费拉托夫专家到中国不到一个星期就到南师视察。他用苏联高等学校二级制的观点来看南师，所以有那样的‘指出’。”“专家是外国人，不懂中国话，不了解我们的实际情况”。“副部长是中国人，我们对他的片面论断，就不免感到遗憾了”。","type":"paragraph"},{"text":"工作消极　归咎于党","type":"subtitle"},{"text":"高觉敷在文章中把自己工作消极，归咎于领导上的宗派主义。他说：费拉托夫到南京师范学院视察，曾召集党组织汇报工作，党外行政负责同志没有　一次参加，“这不能不影响党外同志的积极性。”“从柳副部长到南师之后，过了一个很长的时期，我对教学领导工作一直是消极的。1956年暑假前院内宣布我改任副院长。暑假后院长分工，我还是把教学领导工作推给党员副院长，我任科学研究部主任。我在表面上的理由是借此可以减轻负担，以便有较多的时间兼任心理研究所的研究工作，但在骨子里我是有顾虑的。教育部党组织的主观主义、官僚主义、宗派主义和学习苏联的教条主义，使我不敢自告奋勇地担任教学领导工作。当然这对南师教学工作的领导是有一定影响的，但是这个影响主要是应该由教育部负责的。(原载新华日报第二十一号“参考”)","type":"paragraph"},{"text":" 来源：1957年7月1日新华通讯社编《内部参考》。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"efdbe16251"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
