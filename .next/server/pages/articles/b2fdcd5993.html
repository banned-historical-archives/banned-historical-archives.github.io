script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"响应伟大领袖和导师毛主席的号召  武汉长沙南宁北京军民举行群众性游泳活动","authors":[],"dates":[{"year":1978,"month":7,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"响应伟大领袖和导师毛主席的号召"},{"type":"paragraph","text":"武汉长沙南宁北京军民举行群众性游泳活动"},{"type":"paragraph","text":"新华社北京七月十六日电　“长江水深流急，可以锻炼身体，可以锻炼意志。”响应伟大领袖毛主席的号召，武汉、长沙、南宁、北京等地军民，今天举行了横渡长江和畅游湘江、邕江等群众性游泳活动。"},{"type":"paragraph","text":"今天，武汉市六千多人举行了横渡长江活动。"},{"type":"paragraph","text":"中共湖北省委、省革委会、武汉市委、市革委会和中国人民解放军驻武汉部队主要负责同志，乘船检阅了游泳队伍。"},{"type":"paragraph","text":"武汉市渡江游泳活动指挥部向最先到达终点的一百二十名优胜者颁发了奖章。"},{"type":"paragraph","text":"武汉市及各区、县去年夏季普遍成立了渡江游泳活动指挥部，组织群众利用当地条件开展各种游泳活动。许多区、县还举办了不同类型的游泳训练班，为各基层单位培训了大批游泳骨干。今年夏季，已有五万多人到江、河、湖、塘等水域游泳锻炼。据去年统计，武汉全市三百万人口中有八十六万人学会了游泳，涌现了一百三十多个群众性游泳活动的先进单位。"},{"type":"paragraph","text":"长沙市七百多名游泳健儿今天畅游湘江。游泳健儿排着整齐的队列，从桔子洲头下水，顺流而下。"},{"type":"paragraph","text":"长沙群众喜爱游泳。每到夏季，许多工厂、机关都组织群众开展游泳活动。有些学校，还开了游泳课。今年，长沙热得早，全市每天约有一万五千多人次参加游泳活动。"},{"type":"paragraph","text":"三十名桔子洲头学校的小朋友参加了今天的游泳活动。其中最小的只有七岁。一九五九年，毛主席畅游湘江上岸后，视察了桔子洲头学校，并与师生照了相。从这以后，游泳就成为这个学校的传统体育项目。学校绝大部分学生都会游泳，有百分之三十的人，能横渡湘江。"},{"type":"paragraph","text":"在广西南宁市，三千五百多军民畅游了毛主席冬泳过的邕江。毛主席冬泳邕江时乘坐过的“喷水二号”在前头导航。畅游活动的起点是邕江大桥桥头，终点是当年毛主席第二次冬泳邕江起水处对岸的白沙大队渡口。全程十五里。"},{"type":"paragraph","text":"今年入夏，南宁市革委会发出了广泛开展群众性游泳活动的通知。从自治区、南宁市的领导同志、机关干部，到学校的青少年、幼儿园的儿童和各界群众，积极参加游泳锻炼。仅据区、市的六个游泳池的不完全统计，入夏以来，游泳人数已达十二万多人次。"},{"type":"paragraph","text":"今天，北京市国营青云仪器厂的基干民兵横渡了颐和园的昆明湖。北京市的一些单位还分别举行了职工、学生和幼儿游泳比赛，北京市游泳、跳水和航模代表队也分别在陶然亭和丰台游泳池为广大群众作了表演。从昨天起，来自十九所高等学校的五百多名大学生运动员，参加了北京市高等院校举行的学生游泳运动会。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b2fdcd5993"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
