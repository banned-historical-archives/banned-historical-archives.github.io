script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"石庄公营裕民面粉公司　营私舞弊剥削军食  华北人民政府下令澈查","authors":["陈勇进"],"dates":[{"year":1949,"month":3,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"石庄公营裕民面粉公司"},{"type":"paragraph","text":"营私舞弊剥削军食"},{"type":"paragraph","text":"华北人民政府下令澈查"},{"type":"paragraph","text":"【本报专访】石家庄裕民面粉公司不顾信誉，降低粉质，营私舞弊，剥削军食，此种恶劣作风直接影响了支援前线工作，华北人民政府已下令查办。裕民公司是人民之公营公司，去年七、八、九三个月份，曾与石庄供应局订立以小麦换面粉之合同，其合同的内容要点是：一、供应局自七月一日至二十日交给裕民公司小麦一百八十万斤，至八月二十日交付小麦一百二十万斤，共三百万斤，以小麦每百斤换通粉七十一斤，供给军用，供应局每十天取面一次，每次不超过二十二万斤，双方均持有麦样粉样，不得更换。二、裕民公司如遇人力不能抵抗之损失（如敌机轰炸），可报请供应局，审核属实后，由供应局负责。在合同执行过程中，供应局由于当时不需要全部面粉，未按期交麦。至七月二十日交麦一百五十万斤，八月十日交麦十一万五千斤，遂与裕民公司口头约定延长合同一个月。至十月份因军需甚急，又交出小麦四十五万九千八百五十斤，但此时裕民公司却不按期给予面粉，该公司为更多的取得利润，竟违背合同，私从面粉中提取特粉三万斤卖给大兴纱厂，因而降低了通粉质量，部队均反映裕民公司供应的面粉太坏，经供应局派人至裕民公司查问后，始停止提取。当石家庄备战情况到来的时候，裕民公司又借口这是人力不可抵抗之危险，将供应局交来收帐之小麦八十万斤送回三十八万五千四百五十五斤，并自行在石家庄德州两地出卖小麦四十余万斤，当时卖价三百六十元一斤，至十二月份麦价已涨至五百五十元一斤，此中亏损，裕民公司提出由供应局负担，供应局不同意，因而发生争执。裕民公司此种恶劣作风，完全违背了公营企业应有的立场与态度，供应局发现裕民公司提取特粉时，未能及时追究，纠正其错误，以致浪费了人力物力，影响了支援前线，这种不负责任的态度，也是应该检讨的。问题发生后，双方均未及时请示报告，更是无政府无纪律的严重表现。华北人民政府对以上两机关已提出批评，并令石庄市政府监察专员刘绠对裕民公司之舞弊详情切实澈查呈报华北人民政府核办。"},{"type":"paragraph","text":"（陈勇进）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d78813abf3"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
