script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"华东暨上海妇女昨集会纪念妇女节章蕴同志号召妇女们积极参加到三反和五反斗争中去　杭佩兰等发言保证发挥力量打退资产阶级的疯狂进攻","authors":[],"dates":[{"year":1952,"month":3,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　华东暨上海市各界妇女代表近两千人，昨日假座市府大礼堂举行大会，隆重纪念“三八”国际妇女节。陈毅市长亦莅会参加。"},{"type":"paragraph","text":"下午一时大会开始。首先通过方令孺、王云、左金妹、李仲培、沈粹缜、何宇珍、周敏先、施小妹、胡绣枫、姜德菊、姚天珍、张文秀、徐镜平、陈善祥、陈修良、章蕴、董珍、刘孟、刘洁民、赵先、蒋秀琳、卢粹持、韩学章等为主席团。此时乐队奏起代国歌和“三八”歌，会场情绪兴奋热烈。"},{"type":"paragraph","text":"大会执行主席市民主妇联秘书长徐镜平在致开会词中指出:“三八”国际妇女节是国际劳动妇女在解放运动中奋斗出来的日子。今年我们纪念“三八”国际妇女节，上海正展开轰轰烈烈的三反、五反运动，在这一场激烈的阶级斗争中，涌现出大批站稳立场，积极劝说、检举自己亲属坦白贪污等罪行的妻子们和母亲们，证明妇女们在毛主席领导下，已成为一支坚强的战斗力量。她最后说:姊妹们今后要进一步团结起来，积极投入三反、五反运动中去。我们要把今天的纪念大会成为誓师大会，成为向不法商人及贪污犯开火的大示威，这就是今天纪念“三八”的基本精神和要求。"},{"type":"paragraph","text":"在陈毅市长讲话(全文另刊)后，华东暨上海市民主妇联主席章蕴同志讲话。她首先说明新中国的妇女，已从政治上、法律上获得解放。但在新民主主义社会里，妇女参加社会劳动的机会还不多，妇女们必须普遍走上生产岗位，才能获彻底解放，而要使妇女普遍走上生产岗位，只有社会主义社会才有可能。今天全国大张旗鼓地进行三反、五反运动，正是为了去除障碍，使美好的社会主义前途获得保证。所以今天做好三反、五反运动，正是为建设工业化国家、为妇女的彻底解放铺平道路。因此，必须使每个姊妹都了解三反、五反运动对于妇女解放的密切关系，使她们了解做好三反、五反运动工作，不但对祖国对人民有利，同时对家庭对自己也是有利的。最后，她号召姊妹们积极参加到这个具有历史意义的运动中来，站稳立场，勇敢检举不法奸商和贪污分子，争取在运动中立功。"},{"type":"paragraph","text":"劳模杭佩兰、打虎英雄陈岫岑在发言中，都保证要在工作岗位上发挥更大的力量，搞好三反、五反运动，坚决打退资产阶级的猖狂进攻。"},{"type":"paragraph","text":"在热烈情绪中，常熟区谢茝英大姊要求当场检举丈夫。"},{"type":"paragraph","text":"大会通过了致毛主席、全国民主妇联和国际民主妇联的三个通电。在放映电影“山野的春天”后闭幕。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"陈毅","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"949d01aff3"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
