<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共中央关于民主党派改组各级领导机构的意见","authors":[],"dates":[{"year":1957,"month":12,"day":12}],"is_range_date":false,"parts":[{"text":"中共中央关于民主党派改组各级领导机构的意见","type":"title"},{"text":"（一）","type":"subtitle"},{"text":"一九五六年社会主义改造高潮以来，各民主党派中的右派分子利用他们在中央和各级地方机构中的领导岗位，进行反党、反社会主义的活动，企图把民主党派变为反对社会主义革命和资本主义复辟的工具。","type":"paragraph"},{"text":"在反右派斗争中，各民主党派的右派分子的政治路线，受到了彻底的批判，右派分子已陷于孤立和分化。现在，各民主党派不只是要进一步清算右派分子的政治路线，还必须清除他们在各级领导机构中的政治影响，剥夺他们的领导权，建立和巩固以左派为核心的实际领导，实行各级领导机构的改组，使各民主党派在中国共产党的领导下，能够成为真正为社会主义服务的政治力量，贯彻长期共存、互相监督的方针，在它们所联系的民族资产阶级、上层小资产阶级和它们的知识分子中进行社会主义教育，实现社会主义的自我改造，并代表这些阶级、阶层的和社会主义建设相适应的合法利益，动员他们积极参加社会主义建设。","type":"paragraph"},{"text":"（二）","type":"subtitle"},{"text":"对于民主党派各级领导机构的改组，必须贯彻以左派为核心，树立左派与中左分子联盟的政治上的优势，尽量吸收中中分子和一些中右分子参加的方针。各级领导机构中也应该保留那些需要保留的右派分子。","type":"paragraph"},{"text":"（1）在民主党派各级领导机构中，必须使左派形成核心力量、建立左派与中左分子联盟的优势。左派和中左分子联盟的优势，是指政治上质量强，善于领导和团结干部，通过工作和斗争贯彻为社会主义服务的政治路线，作好广大中间分子的工作，而不应该单纯追求数量。反之，单纯的数量上的优势，必然会把许多中中分子和中右分子排挤在各级领导机构之外，这样就会造成单纯的组织控制，脱离群众，反而不能发挥领导作用。","type":"paragraph"},{"text":"必须积极帮助和培养左派和中左分子，改进他们的工作方法，克服他们的缺点，使他们能够很好地进行工作。应该提拔一批左派与中左分子担任专职干部，负责实际领导职务。","type":"paragraph"},{"text":"（2）尽量吸收中中与中右分子参与领导工作，在各级领导机构中，必须使他们有足够的数量和相适应的职权，左派与中左分子应当同他们建立起良好的合作共事关系。","type":"paragraph"},{"text":"（3）为了更有利于争取中间分子，分化、孤立和改造右派分子，在改组民主党派各级领导机构的时候，应该保留一些过去有一定贡献、今后还有一定作用或者在反右派斗争中已有悔改表现的右派分子。但是，不能让他们担任实际领导职务。","type":"paragraph"},{"text":"（4）民主党派基层组织的成员，除了根据“关于在国家薪给人员、民主党派、高等学校学生中的右派分子处理原则”第三款的规定必须开除的分子以外，都应该保留在基层组织内继续进行教育改造。基层组织不要任意解散或合并。","type":"paragraph"},{"text":"对民主党派基层领导机构的改组，一般可以采用上述原则。有些民主党派的基层组织，没有左派和中左分子为领导骨干，可以提拔中中分子担任领导工作。","type":"paragraph"},{"text":"（5）民主党派各级领导机构的改组，应当在反右斗争取得彻底胜利的基础上，结合中央和地方人民政府对右派分子的处理和人事安排来进行。","type":"paragraph"},{"text":"对民主党派各级领导机构的改组，应该按照各民主党派自己的章程，采取适当的方式进行（如民主党派中央可以召开中央全会、扩大中央全会或代表会议等方式）。各民主党派地方组织领导机构的改组，也可以召开适当的会议或依据民主党派中央命令进行改组。","type":"paragraph"},{"text":"（三）","type":"subtitle"},{"text":"民主党派在今后长时期内，还有进一步团结、教育、改造它们所联系的阶级、阶层的群众参加社会主义建设事业的作用，在新的、为社会主义服务的统一战线的方针下，党应该加强对民主党派的领导。有人认为民主党派已经没有作用，垮了算了或者可以取消的想法都是错误的。","type":"paragraph"},{"text":"民主党派各级领导机构的改组，是一个复杂、细致的政治任务，是保证民主党派正确的领导方向和作好工作的关键，各级党委应当积极予以领导和帮助，对民主党派各级领导机构的改组，我们必须同左派一道进行认真的研究，作好排队工作，提出具体意见，并同广大中间分子，特别它们的领导人物进行充分的酝酿和协商，取得一致认识，制定改组方案，进行改组工作。","type":"paragraph"},{"text":"我们对民主党派主要是帮助他们培养左派和中左分子做骨干，使他们能够担当起领导工作，只有在民主党派主动提出要求和我们认为确有必要的时候，才可以派少数对统一战线政策认识较强和作风较好的共产党员到民主党派中去，担任政治思想领导工作，但一般不宜担任民主党派各级领导部门的正职和行政事务工作。","type":"paragraph"}],"comments":[],"origin":"中共中央统一战线工作部编《统战政策文件汇编》（1-4册），1958年（内部出版）。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cc2976c432"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
