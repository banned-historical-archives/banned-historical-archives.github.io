" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji9-1","name":"毛泽东全集第9卷(1)","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji9-1.pdf"],"article":{"title":"阻滞胡宗南部西进","alias":"","parts":[{"type":"paragraph","text":"阻滞胡宗南部西进川"},{"type":"paragraph","text":"（1936年9月17日）彭："},{"type":"paragraph","text":"胡宗南?全部到西安，正陆续西运，甚速。已连电朱张?速以主力进占界石铺。为配合打击胡宗南，似有以我一军团一部向固原南部及西南部出动之必要。而在一、二日内聂率之第一师宜集中行动，配合策应于静隆大道北侧，向大道绕击，阻滞胡敌西进，同时以利我四方面军北出界石铺大道。如何，盼复。"},{"type":"paragraph","text":"毛"},{"type":"paragraph","text":"十七日十二时"},{"type":"paragraph","text":"[1]这是毛泽东给红军第一方面军司令员、西方野战军司令员兼政治委员彭德怀的电报。"},{"type":"paragraph","text":"[2]胡宗南，当时任国民党军西北“剿匪”总司令部第一军军长兼第一师师长。"},{"type":"paragraph","text":"[3]朱，指朱德。张，指张国焘，当时任红军总政治委员。[4]聂，指聂荣臻，当时任红军第一方面军第一军团政治委员。[5]静隆大道，指甘肃静宁至隆德（今属宁夏）的公路。"}],"authors":["毛泽东"],"dates":[{"year":1936,"month":9,"day":17}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":134,"page_end":134},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"88eb3253eb"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
