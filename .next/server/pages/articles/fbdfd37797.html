<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"天津资产阶级的各阶层对全行业公私合营的反应","authors":[],"dates":[{"year":1955,"month":12,"day":14}],"is_range_date":false,"parts":[{"text":"天津资产阶级的各阶层对全行业公私合营的反应","type":"title"},{"text":"【天津分社十四日讯】在全行业公私合营中，天津资产阶级的各个阶层表现了各种不同的态度，兹分述如下：","type":"paragraph"},{"text":"多数中、上层代表人物和积极分子已初步能将个人前途和国家前途联系起来，认识到“只要你能干，有本领，政治表现好，不愁没有工作。”他们说：“阶级早晚得消灭，但我是公民一分子，生在新社会感到光荣。”这些人在接受改造的态度上还比较愉快，从目前情况看，在全行业合营过程中一般也都起了带头和推动作用。","type":"paragraph"},{"text":"多数青年资本家和资方代理人迫切要求摘帽子。他们开始认识到“金钱有限，前途无限”。表示“不计较工作、待遇，服从分配，要在实际工作中锻炼锻炼。”资方代理人形容自己的心情是：“不合营心悬两地”，“在资本家堆里受气，在工人堆里也讨不了好”，埋怨“二百元股本造成思想负担”，“七打胶鞋入的股，换来的享受抵不了委屈”，希望“赶快取消资本家的名义”，不少人在合营过程中积极负责，提前上班，通宵工作，并表示“要保护好财产，一草一木也不许资本家动。”","type":"paragraph"},{"text":"有些资本家已拿出实际行动表示接受社会主义改造。矿油业刘宝忠主动降薪一百分；德丰橡胶厂资本家要把一九五三年和一九五四年红利五千五百元转股本；百货业资本家高俊岭要把两所房子投入企业；福聚和资本家王铨主动归还了借企业的傢具；大德源资本家赶紧买了公债；天一香糕点店董子光主动找活干，并动员在柜上帮忙的侄子、外甥回乡。近来也发现有些资本家学习技术，参加劳动，表示“有了劳动观点政府不能不要”，“学好了技术进去还可贡献贡献。”","type":"paragraph"},{"text":"一般中等户资本家是随大流。他们的顾虑不外是“工作是否调动”、“待遇是否降低”、“家属是否照顾”等等。而工业小户由于设备陈旧、生产分散、技术落后、任务不足，他们盼合营“如饥如渴”。有些人表示“全面规划救了命”。他们的最大希望是要求工作。少数年纪较大、独资的资本家，对改造的新形势感到突然。认为“快了”、“完了”，表现惊讶，紧张悲伤。针织业资本家梁庆云心思很重，几夜未眠。发源斋糕点店沈庆昌听见全业合营的消息后，饮食不进，还放声大哭。地毯业李惠明感叹“这回共产了，一辈子心血完蛋了。”泉兴成资本家说：“完了，连口棺材也弄不上了。”不少虚职股东在“快共产了”的认识下，表现惊慌。星光工厂股东韩某到同业公会大闹，要求入厂。荣星工厂一个股东的太太对实职资方宋子龄说：“家里有两口人，还有一瓶红酸钠(毒药)”，要挟他给其夫安置工作。(据天津市委统战部材料编)","type":"paragraph"}],"comments":[],"origin":"新华通讯社编《内部参考》1955年12月21日","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fbdfd37797"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
