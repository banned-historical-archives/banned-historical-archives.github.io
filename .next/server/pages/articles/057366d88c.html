<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"用最新指示武装头脑　两派认真作了自我批评上海越剧院革命青年决心联合对敌双方决定立即狠抓清理文艺队伍，狠批修正主义文艺黑线","authors":[],"dates":[{"year":1968,"month":1,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　上海越剧院两派革命青年，认真学习了毛主席的最新指示，从斗争实践中增强了对敌斗争的观念，决心克服派性，增强党性，真正做到联合起来，共同对敌。"},{"type":"paragraph","text":"上海越剧院的革命青年原来就有两派，双方磨擦不休。去年八月一日，为形势所迫，实现了大联合，成立了八一公社。但由于内部之间的成见没有根本消除，派性远未克服，不久，双方就因对勤务组的名额和席位有争论，对解放干部问题有争论，又重新分裂成两派，甚至经常武斗。"},{"type":"paragraph","text":"最近，人民解放军驻沪部队和市革命委员会有关部门，对两派革命青年都做了一些政治思想工作，促使他们坐下来学习毛主席的最新指示，用毛泽东思想为武器，打倒派性。当他们反复学习了毛主席关于“在工人阶级内部，没有根本的利害冲突。在无产阶级专政下的工人阶级内部，更没有理由一定要分裂成为势不两立的两大派组织”的最新指示后，都深深感到，越剧院的革命青年也没有根本的利害冲突，为什么要分裂成为势不两立的两大派组织呢?又为什么要武斗呢?他们又反复学习了毛主席关于“两派要互相少讲别人的缺点、错误”，“各自多做自我批评”的最新指示，各自认真检查了两派长期“内战”和多次武斗的原因。一经认真的检查，他们终于发现，两派之间所以长期以来“内战”不断，甚至武斗，原来是背后有人在挑动。其中不但有顽固地站在资产阶级反动路线立场上的越剧院原当权派，勾结了代表保守势力的旧干部，而且还有一些阶级敌人和政治面目不清的坏家伙混进了革命组织，在革命青年之间拉一派打一派，经常挑拨离间，搬弄是非，干了许多破坏革命青年团结的罪恶勾当。在去年十二月中旬那次武斗中，这些混蛋更是上窜下跳，大肆活动，明目张胆地利用革命青年的派性力图扩大事态，达到破坏革命大联合，破坏无产阶级文化大革命的目的。当大家检查到这一些触目惊心的阶级斗争的事实时，无不大吃一惊。他们开始醒悟过来，真正认识到派性是一条大毒蛇，一经被它缠住，就会被阶级敌人利用，就会忘记了斗争的大方向，就会做出使亲者痛、仇者快的蠢事。最近正在上海文艺战线上轰轰烈烈地展开的清理文艺队伍的群众运动，也给了两派革命青年以很大的触动。大家深深感到旧越剧院的敌情是严重的，如果不坚决地把形形色色的牛鬼蛇神揪出来，不向一切阶级敌人猛烈地放火、开炮，不彻底清理队伍，要巩固无产阶级文化大革命的胜利成果是不可能的。大敌当前，作为决心要把无产阶级文化大革命进行到底的无产阶级革命派，怎么能不团结起来共同对敌呢?"},{"type":"paragraph","text":"在市革命委员会有关部门的帮助下，本月十六日，两派革命青年联合召开了大联合的会议。长期以来严重对立的两派革命青年，再一次坐在一起，认真地作了自我批评，共同议论了把越剧院的无产阶级文化大革命进一步搞深搞透的问题。双方一致表示:要立即举办毛泽东思想学习班，认真地进行斗私批修，克服派性，增强党性，巩固和发展革命的大联合。双方还决定，要立即狠抓清理文艺队伍的工作，并且把这一工作同大批修正主义建党路线，大批修正主义文艺黑线结合起来。他们决心立新功，建新劳，把越剧院的无产阶级文化大革命迅速推向一个新的高潮。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"派性","type":"主题/事件"},{"name":"武斗","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"057366d88c"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
