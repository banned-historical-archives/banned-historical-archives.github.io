script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"罗波两国党政代表团发表联合声明　决定加强反修正主义的斗争　主张积极促进社会主义国家的团结","authors":[],"dates":[{"year":1958,"month":5,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"罗波两国党政代表团发表联合声明"},{"type":"paragraph","text":"决定加强反修正主义的斗争"},{"type":"paragraph","text":"主张积极促进社会主义国家的团结"},{"type":"paragraph","text":"新华社布加勒斯特15日电　此间各报今天发表了罗马尼亚和波兰两国党和政府代表团的联合声明。声明说，两国代表团在最近举行的会谈中讨论了当前最重要的国际局势、现代工人运动和进一步发展两国的关系的问题。"},{"type":"paragraph","text":"在谈到国际局势时，声明首先指出，罗马尼亚和波兰两国政府以及苏联、中国和其他社会主义国家实行着和平政策，这种政策是符合各国人民的利益的。声明谴责美国和其他资本主义国家的帝国主义集团所奉行的战争政策，并且特别指出，用核武器武装西德军队是对欧洲安全的重大威胁。"},{"type":"paragraph","text":"声明说，罗、波两国人民坚决反对帝国主义干涉他们的内政的政策。"},{"type":"paragraph","text":"两国政府认为，积极促进社会主义国家团结的进一步加强是自己的首要任务。"},{"type":"paragraph","text":"双方表示完全支持苏联关于停止核武器试验的决定，支持它向美国和英国提出的普遍停止核武器试验的建议。"},{"type":"paragraph","text":"罗马尼亚政府表示相信，波兰政府提出的在欧洲中部建立无原子武器地区的建议的实现，将有助于欧洲的和平。波兰政府表示支持罗马尼亚政府去年9月间向巴尔干地区各国提出的和平倡议。"},{"type":"paragraph","text":"两国政府认为，只要帝国主义集团不停止实行他们的威胁和平的政策，两国就必须支持华沙条约组织。"},{"type":"paragraph","text":"声明接着说，罗马尼亚工人党和波兰统一工人党决定要不断地促进社会主义国家间的团结的巩固和兄弟般的互助合作。为此，两党将以共产党和工人党莫斯科会议通过的两个宣言为自己的工作指针。"},{"type":"paragraph","text":"两党声明表示要不断地为反对资产阶级的思想影响、特别是为反对修正主义而斗争。同时，也要反对教条主义和宗派主义。"},{"type":"paragraph","text":"声明最后谈到了两国的关系。声明说，罗、波两国今后将进一步加强彼此在经济、文化等方面的互助合作。双方认为，两国各方面关系的发展，将有助于发展两国人民的友谊，将有助于促进社会主义阵营国家的团结和世界和平事业。"},{"type":"paragraph","text":"代表双方在这个声明上签字的，波兰方面是哥穆尔卡和西伦凯维兹；罗马尼亚方面是乔治乌—德治和基伏·斯托伊卡。"},{"type":"paragraph","text":"据新华社布加勒斯特15日电　以哥穆尔卡和西伦凯维兹为首的波兰党和政府代表团，在罗马尼亚访问三天后，在今天早晨乘飞机离开布加勒斯特回波兰。"},{"type":"paragraph","text":"到机场为代表团送行的有罗马尼亚工人党和政府领导人乔治乌—德治和基伏·斯托伊卡，工人党中央委员会政治局委员、政府各部部长以及罗首都各界代表和上万的群众。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f5c1254e24"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
