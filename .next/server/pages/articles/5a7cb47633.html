script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"这不是剥削农民吗？","authors":["易兵"],"dates":[{"year":1978,"month":11,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"这不是剥削农民吗？"},{"type":"paragraph","text":"前些时，我到甘肃兰州出差，一些同志告诉我两件事："},{"type":"paragraph","text":"一、兰州炼油厂和化工厂紧靠陈平公社，以前，两厂都把废硫酸免费送给公社磷肥厂，既支援了农业，又处理了废料，深受农民欢迎。从一九七四年开始，这两个厂不“送”了。公社磷肥厂与兰化公司的合成制药厂建立关系，把用过的废酸按好酸的牌价（每吨一百二十元）卖给公社磷肥厂，致使公社磷肥厂亏损。今年二月，制药厂又给每吨废酸加“杂运费”四十元。从二月到六月，公社买进一百九十吨废酸，比国家牌价规定的好酸多付了七千六百多元。"},{"type":"paragraph","text":"去年七月，合成制药厂因为占用运输酸的容器罐超过了规定时间，被铁道部门罚款二千一百多元。制药厂把买进的五十四吨发烟硫酸转让给公社磷肥厂，竟把这笔罚款加到磷肥厂头上，每吨硫酸售价高达一百八十多元，使公社磷肥厂亏本更多了。"},{"type":"paragraph","text":"二、兰州铁路局第五工程工务段第一大修队，今年四月和甘肃定西县青岗公社农机厂签订了一个生产十万只毛坯垫圈的合同，每只七分钱，比规定牌价少三分八厘，十万只就少了三千八百元。生产这些钢圈要七吨多钢材，大修队不供给，全部要公社厂的采购员“自己去想办法”。这不是要社办厂搞邪门歪道么？公社农机厂把东西生产出来了，还要运到十五公里以外的地方去交货，运费也要公社农机厂负担。这种搞法，不是在剥削农民吗？"},{"type":"paragraph","text":"读者　易兵"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"甘肃文革","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5a7cb47633"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
