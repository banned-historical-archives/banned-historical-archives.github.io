<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"河北省营胡峪煤矿  “寻人铺”长期存在工人受严重剥削  该矿经理学习“二七”社论后已作反省","authors":[],"dates":[{"year":1950,"month":5,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"河北省营胡峪煤矿"},{"type":"paragraph","text":"“寻人铺”长期存在工人受严重剥削"},{"type":"paragraph","text":"该矿经理学习“二七”社论后已作反省"},{"type":"paragraph","text":"【本报讯】河北省营武安胡峪煤矿经理李永福，在河北省工矿干部集体学习“学会管理企业”社论时，经工业厅领导同志的指示，及同志间的帮助，已对该矿不依靠工人阶级，长期允许包工大柜——“寻人铺”存在的严重问题，从阶级立场上进行了检查。省工业厅即将派遣强有力干部，前往该矿协助处理这个问题。该矿自一九四六年二月开始开采时，即依靠包工大柜——“寻人铺”及与“寻人铺”密切联系的几个窑师来管理生产。他们压迫统制剥削工人极为严重。去年十一月，省府工业厅和省总工会煤业办事处检查出“寻人铺”对工人进行封建剥削的事实，就在工人中予以揭发，并启发工人进行斗争。工人清算了五个“寻人铺”。这五个“寻人铺”在六十九天到九十八天的时间内，克扣工资和伙食共计三千二百九十四斤米。其中赵二林铺当即退还工人五百一十五斤米，王清仁铺退还四百五十一斤米。其余三铺也正在追回剥削部分。但因李经理缺乏依靠工人阶级管理生产的思想，反以偿还“寻人工”的名义，补还赵二林七十个“寻人工”，折七百斤米。王清仁六十个“寻人工”，折六百斤米。较赔偿工人者尚多一百多斤，并把三个“寻人铺”掌柜弄到窑上充当管理生产的大队长，变成新的合法的统制者。工人生活遂陷于极端痛苦的境地。工人生产时间上长达十二小时至十四小时，部分工人在土地上睡觉，宿舍没门窗，百余人用一个脸盆，对于这些事情，经理从不过问。相反对农村党员、村干等积极生产的工人却认为挑皮，实际上，在该矿工作的许多农村党员、支书、村干及地方工会会员，他们自动发动生产竞赛，表现是非常好的。在学习中，经过思想斗争和教育，李永福已认识到这是阶级立场极端模糊的忘本行为，表示愿在上级的正确领导下，坚决依靠工人阶级的领导生产，用艰苦踏实的工作来赎罪，并请求党与行政给予处分。"},{"type":"paragraph","text":"（河北省工业厅）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fb4cef0fe8"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
