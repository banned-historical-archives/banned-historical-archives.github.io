<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"wengeqianqixinianlu1","name":"十年文革前期系年录（上册）","internal":false,"type":"pdf","official":false,"author":"周良霄,顾菊英","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/文革前期系年录1.pdf"],"article":{"title":"第二十八卷","parts":[{"type":"title","text":"第二十八卷"},{"type":"paragraph","text":"1966年8月13日至17日"},{"type":"paragraph","text":"(中央工作会议)8月13至17日"},{"type":"paragraph","text":"中央工作会议召开。刘少奇已不允许参加会议。会议的主要内容是解决多数领导干部思想不通的问题。毛泽东找了一些人，打通思想。林彪在会议的第一天作了关于文化革命问题与干部问题的讲话。他要求“敢字当头”，“大闹几个月”。对于干部，“要罢一批人的官，升一批人的官，保一批人的官。组织上要有个全面的调整。”他提出：对毛的指示，“理解的要执行，不理解的也要执行”。毛泽东在8月16日对林的讲话作了批示：“赞成”，印发全党。"},{"type":"paragraph","text":"林彪在中央工作会议上的讲话"},{"type":"paragraph","text":"今天开会议论一下中央全会的传达问题，工作部署问题，文化革命问题，干部问题。"},{"type":"paragraph","text":"我先讲两个问题。"},{"type":"paragraph","text":"一个是文化革命问题。"},{"type":"paragraph","text":"前天晚上我同主席谈军队的文化革命问题，主席叫我向大家讲一讲，供地方工作参考。"},{"type":"paragraph","text":"现在军队里师级以下的单位，只搞正面教育，宣传文化革命的意义，学习文件，更好地活学活用毛主席著作，批判和肃清资产阶级思想的影响。军级以上机关，则发动群众搞大民主，大字报，大鸣大放，大辩论，大搞文化革命，大体上准备搞三个月。同时，在运动中解决机关的精简问题。过去我们提倡四轻四重，主要的是机关轻，连队重。但是，机关还是很大。主席说，地方上也要注意这件事。"},{"type":"paragraph","text":"文化大革命，实际上是思想革命，就是大破一切旧思想，树立毛泽东思想。用毛泽东思想武装人的头脑，实现人的思想革命化，带动业务，带动经济建设，带动各项工作。"},{"type":"paragraph","text":"从思想的形成过程来说，是从客观到主观，从实际到思想。从办事情的过程来说，倒过来，是从主观到客观，从思想到实际。在实践中，又不断地丰富了主观，丰富了思想。要做好工作，首先要搞思想革命，即先搞主观世界，动员人的积极性。主席说的思想领先，就是从这个意义上说的。"},{"type":"paragraph","text":"马克思列宁主义的政党，必须认真搞无产阶级文化革命。苏联没有搞，所以革命失败了。我们就要搞。要大搞无产阶级文化革命，用无产阶级思想代替孔孟之道，代替资产阶级思想，代替一切旧思想。只有这样，才能防止反革命复辟，防止反革命颠覆。这方面的工作一削弱，资产阶级复辟和颠覆的可能性就要增加。"},{"type":"paragraph","text":"无产阶级的文化大革命，就是革一切旧思想的命，就是改造人的灵魂，就是要做到人的思想革命化。只有在人的灵魂改造、人的思想革命化的基础上，才能保证充分发挥人的革命积极性。才能使人变成高尚的人，纯粹的人，有道德的人，脱离了低级趣味的人，有益于人民的人。不然，就会使人变成低级的人，没有道德的人，庸俗的人，唯利是图的人，变成苏联社会出现的那种追逐名利、道德败坏的人。"},{"type":"paragraph","text":"没有无产阶级的新思想、新道德，就必然是资产阶级的旧思想、旧道德。我们应当大破旧思想、旧道德，大立新思想、新道德。这是一个重大的战略措施。"},{"type":"paragraph","text":"我们许多同志，容易埋头于粮、棉、油，还有钢铁、煤炭的指标，而忽视政治思想。其实粮、棉、油、钢铁、煤炭，怎么才能上去呢？只有把人的思想面貌改变过来。每行每业，如果都由我们想办法，不行，我们没有那么多办法。我们应该抓政治思想革命，从思想解决问题。把群众从思想上武装起来，动员起来，群众起来了，就会有办法了，亿万人思想革命化了，一切办法都会有了。这是我们党领导我们国家由弱到强，由落后到先进的根本办法。"},{"type":"paragraph","text":"毛主席说，物质变精神，精神变物质。这是一个伟大的唯物辩证法真理。这个真理既符合无产阶级的利益，又符合自然、社会发展的规律。掌握了自然、社会的发展的规律，就是掌握了正确的思想，掌握了毛泽东思想，把思想传播给群众，就能把精神力量转化为物质力量。把毛泽东思想这一个伟大的精神力量转化为物质力量，这是我国社会主义建设胜利的根本保证。否则，我们就会变成修正主义。我们一定要横扫一切牛鬼蛇神，打倒资产阶级代表人物，打倒资产阶级的学术“权威”，发挥群众的智慧，把人的精神面貌改变过来。"},{"type":"paragraph","text":"思想革命不是一个大运动能彻底解决的，但是必须要有一个大运动，才能把资产阶级的威风打倒，才能树立无产阶级的思想权威，树立毛泽东思想的权威。具体的作法是坚决按照十六条办事，字字句句都要按中央的决定去做。"},{"type":"paragraph","text":"这次文化大革命触及每个人的灵魂，党政军、工农商学兵，三里五界都是我们斗争的领域，十六条是我们具体的行动纲领。"},{"type":"paragraph","text":"不要重复压制群众、围剿左派的错误。要敢字当头，放手发动群众，坚定地依靠无产阶级革命派，集中力量，打击一小撮最反动的资产阶级右派，冲破一切阻力，把无产阶级文化大革命进行到底。不要走过场，干脆大闹几个月，弄得人们睡不着觉。这一次一定要大搞，这是破旧立新的重大的战略措施。"},{"type":"paragraph","text":"第二个问题，是军队的干部问题。"},{"type":"paragraph","text":"这个问题我有些想法，报告过主席，主席也同意，叫我来向大家讲讲。"},{"type":"paragraph","text":"对待毛泽东思想有两种人。"},{"type":"paragraph","text":"一种人拼命学毛泽东思想。有的人学得好，挨打击。因为那时候管思想的最高机关中宣部，陆定一那一帮人，上边还有根子，反对学毛泽东思想，他们污蔑学毛著像吃宣威火腿，天天吃就腻了。污蔑立竿见影，说没有太阳，就见不到影子。甚至恶毒攻击，胡说什么现在学毛著好的人，将来打起仗来，都是汉奸叛徒。这些黑帮对毛泽东思想充满了敌视、仇恨。"},{"type":"paragraph","text":"一种人不学毛泽东思想，处于落后或中间状态。"},{"type":"paragraph","text":"对待政治思想工作，也有两种人。"},{"type":"paragraph","text":"一种人重视政治思想工作。"},{"type":"paragraph","text":"一种人不重视政治思想工作，甚至捣乱。"},{"type":"paragraph","text":"我们的干部在对待工作问题上，也有两种人。"},{"type":"paragraph","text":"一种人有干劲，工作有成绩，但是性情急躁，得罪人不少，运动中大字报最多，过不了关，大家群起而攻之，要求罢他的官。"},{"type":"paragraph","text":"一种是老好人，什么事情也不做，什么斗争也不参加，谁也不得罪，人事关系搞得好好的，选举的时候能够得全票，运动中贴他的大字报也很少。"},{"type":"paragraph","text":"所以我们对干部，要来个全面考察，全面排队，全面调整。我们根据主席讲的无产阶级革命事业接班人的五条原则，提出了三条办法，主席同意了。"},{"type":"paragraph","text":"第一条，高举不高举毛泽东思想红旗。反对毛泽东思想的，罢官。"},{"type":"paragraph","text":"第二条，搞不搞政治思想工作。同政治思想工作捣乱的，同文化大革命捣乱的，罢官。"},{"type":"paragraph","text":"第三条，有没有革命干劲。完全没有干劲的，罢官。"},{"type":"paragraph","text":"这三条，同主席的五条原则是完全一致的。我们要按主席的五条和这三条，特别是第作为识别、选拔和使用干部的标准。"},{"type":"paragraph","text":"这次要罢一批人的官，升一批人的官，保一批人的官。组织上要有个全面的调整。那些犯了错误甚至犯了严重错误的人，只要他们接受教育，坚决悔改，还可以在今后工作中继续考验他们。至于那些不可救药的，就坚决罢官。不这样，就打不破死气沉沉的局面，一旦有事要搞颠覆活动的就是他们。"},{"type":"paragraph","text":"革命的根本问题是政权问题。我们的政权究竟是掌握在什么人的手上？是掌握在拥护毛泽东思想的人手上，还是掌握在反对毛泽东思想的人手上？这是一个严重问题，不解决这个问题，我们就经不起战争的考验，经不起反革命颠覆的考验。只有组织机构革命化了，我们的党才能经受得住一切考验。在干部问题上，只搞思想革命化，不搞组织革命化不行。该升的升，该降的降，该留的留，特别是关键的岗位上，不能埋下颠覆的种子。不然，在组织上就要犯机会主义的错误。"},{"type":"paragraph","text":"组织问题是严重的政治问题之一，这个问题解决不好，一切方针路线就不能贯彻。毛主席常讲出主意，用干部。一个是办什么事，一个是什么人去办，这两个缺一不可。“人存事兴，人亡事废”。用干部就是组织问题，是最重要的问题。一定要用可靠的人，要用拥护毛泽东思想的人。现在人多得很，为什么不用拥护毛泽东思想的人。拥护毛泽东思想的人很多，青年学生中就有很多拥护毛泽东思想的人。现在团中央的许多人，不如十七、八岁的青少年。为什么不用青少年？当然，有些人也可以照顾使用，但是他们不能成为工作中的骨干。"},{"type":"paragraph","text":"政权是革命的根本问题，组织问题就是政权问题。"},{"type":"paragraph","text":"历史唯物论的根本原理就是历史是人创造的。人是最重要的物质，人是一切物质中发展起来的最高物质，人是能改造客观世界的物质，是同大自然斗争的力量，也是进行阶级斗争的力量。历史是人创造的，没有人就没有历史。历史是社会生产力发展的历史，而人，劳动人民，是社会生产力的第一要素。没有人，没有劳动人民，就谈不上社会生产力和它的发展。所以，历史就是劳动人民的历史。"},{"type":"paragraph","text":"在阶级社会里，人是阶级的人。爱什么，恨什么，都是有阶级性的。所以我们要重视人的政治思想工作，不发挥人的积极性，是不能推动历史的发展的。"},{"type":"paragraph","text":"修正主义国家不重视，也不可能重视人的政治思想工作，我们不能象他们那样。我们要极度重视人的政治思想工作。政治思想工作主要是发动群众的力量和智慧，解放生产力，依靠群众去创造历史。否则，单纯军事观点，单纯技术观点，单纯业务观点，不发动群众，只自己单干，那就是少数人创造历史，不是群众创造历史。把我们整个机构来个革命化，才能更好地发挥群众力量，才能更好地动员群众参加革命斗争，才能轰轰烈烈地，干劲十足地做好各项工作。政权如果不掌握在革命分子手里，就会蜕化变质。"},{"type":"paragraph","text":"我最近心情很沉重，我的工作和我的能力是不相称的，是不称职的。我意料是要出错误的，但是要力求减少错误，依靠主席，依靠常委同志，全体同志，文化革命小组的同志，以主席为轴心，我们做磨盘，一切按主席指示办事，不能有另外做法，不能有两个方针，两个司令部，不能以想当然代替主席的想法，不能唱对台戏，要一元化，紧跟主席。主席处理问题，有全盘考虑，高瞻远瞩，还有他的想法，有很多想法我们是不了解的。我们对主席的指示要坚决执行，理解的要执行，不理解的也要执行。我没有别的本事就是依靠主席的指示。我没有别的本事，就是依靠群众的智慧。就是依靠领袖和依靠群众。要相信主席的天才，相信主席的英明，相信主席的智慧。一切请示主席，一切照主席指示办事。大事不干扰，小事不麻烦。我们就是这样去做，有时也免不了要犯错误，跟不上主席思想。怎么办？办法是朝令夕改，不坚持错误，随时修正错误。主席是世界的天才，我们同他比较差别很大，错了赶快改。中央给我的工作，我自知水平、能力不够，恳辞再三，但是，现在主席和中央既已决定了，我只好服从主席和党的决定，试一试，努力做好。我还随时准备交班给更合适的同志。"},{"type":"paragraph","text":"政治局常委、副总理李富春在工人体育馆召开的革命师生大会上宣布改组共产主义青年团中央领导机关，成立临时书记处负责工作。"},{"type":"paragraph","text":"《人民日报》发表社论《学习十六条，熟悉十六条，运用十六条》。"},{"type":"paragraph","text":"北京地质学院邹家尤工作组撤走，院文革组织欢送，与反工作组组织发生冲突。清华等校工作组亦相继撤出。8月14日"},{"type":"paragraph","text":"雷英夫写成攻击诬陷刘少奇的材料后，亲送林彪家。林嘱雷改作以个人给林彪及毛主席写信的形式呈交。雷如教办理。林立即将材料批送江青，“酌转”毛泽东。"},{"type":"paragraph","text":"雷英夫所写《有关刘少奇同志的材料》："},{"type":"paragraph","text":"建国以来，特别是最近几年，从不宣传、学习毛主席著作，也不传达执行毛主席的指示。例如：少奇同志1964年9月给江渭清同志的信，就是反对毛泽东思想，反对宣传毛主席指示的集中表现。他借口是江犯了教条主义的错误，没有蹲点，不了解情况，手里没有真理。实际上是说王光美桃园大队的经验是真理，而毛泽东思想的‘第一个十条’却不是真理，因此大家应该学习王光美的经验，不应该学习毛主席的指示，这是何其恶毒的作法。"},{"type":"paragraph","text":"二、自以为可以和主席“平起平坐”，可以当最高领袖。这里，我印象最深的有四件事：1964年12月罗瑞卿在人民代表大会上讲：‘以毛泽东同志、刘少奇同志为首的党中央领导’，事前，彭真亲自定了调子。(2)1965年9月，朱德同志在会上提出：将来打起仗来，最高统帅是刘少奇同志，根本不提毛主席。少奇同志和朱坐在一起，不加反驳，还很得意，看来很听得进去，使人吃惊。(3)近多年来，每逢十一、五一等节日，报纸上都是刊登毛主席、少奇同志两张一样大小的照片，从来未见少奇同志有谦虚的表示。(4)《九评》中提出：‘以毛泽东同志、刘少奇同志为代表的马克思列宁主义路线’。此事由来如何，不清楚。"},{"type":"paragraph","text":"三、刘少奇同志除在文化大革命中犯了路线错误之外，在历史上也犯过很多方向性的严重错误。他虽然背着‘一贯正确’的包袱，但并不是真正的马克思列宁主义者，并不懂得毛泽东思想。例如：(1)1946年所提出的‘和平民主新阶段’，完全是右倾机会主义的观点和政策，使一些地区和部门的工作受到了损失。(2)1947年西柏坡土改时，提出‘家家冒烟，村村点火’，使土改发生了大偏差。(3)1950年在天津蹲点后，提出了资本家可以管理企业的政策，有严重错误。听说当时就是在王光美的哥哥在天津所开工厂蹲点得出的结论。(4)1956年八大时，修改党章的报告中，把‘毛泽东思想是我们党的指导思想’去掉了。少奇同志说，七大时有必要，现在可以不说了。(5)1962年赞成陈云同志的右倾意见。(6)1964年农村社教中那一套完全不相信群众和广大干部的政策，这是资产阶级神秘主义和《福尔摩斯》侦探小说中的一大作法。少奇同志负责搞的《后十条》也是形“左”而实右的。(7)1964年2月12日，少奇同志和越南黎笋谈话，是和主席的谈话精神完全相反的，这是典型的大国沙文主义。主席多年来一再说，越南人在南方打的很好，对游击战、人民战争有发展。少奇同志却说越南人民军没有学会打歼灭战，不会打仗。主席历来说：我们要向越南同志学习，并说他要到越南南方去。少奇同志却说：越南同志要先承认自己不会打歼灭战，然后才肯学习。或者，越南派旅以上干部到中国来学习；或者中国派韦国清同志到越南去教。主席历来说，要防止大国沙文主义，不要盛气凌人，干涉别人内政。越南的事归胡志明负责，我们做后方和支援。少奇同志却以老子训儿子的方法和人家谈话，并干涉人家内政。说什么你们两次歼灭战都是陈赓和韦国清代替你们指挥的。这引起武元甲的不高兴，说：我这些话只能告诉胡志明、范文同同志，其他人不能讲等等。主席从来不愿多讲自己，一谈到自己总是很谦虚。少奇同志却相反，他说：从1949年我就过问越南问题，陈赓、罗贵波、韦国清、乔晓光等，都是我派到越南去的。(8)1966年2月，少奇同志在政治局扩大会议上提出可以考虑派代表团到苏联参加二十三大。这样的好处是可以了解情况。(这个会上总理等多数人是主张不派代表团的)"},{"type":"paragraph","text":"少奇同志在组织路线方面也有很多错误：(1)不传达不执行主席的指示(如文化大革命)。(2)对主席不请示不报告，搞独立王国。(3)安插私人，有宗派圈子。(4)包庇坏人(如彭真包庇罗瑞卿，对小型会所定的清规戒律，都请示过少奇同志)。彭真在刘的支持下，非常狂妄。例如：在65年彭德怀调离北京去西南前，彭真竟说：“如林彪同志身体不好，你还是国防部长。”(5)打击镇压左派，实行白色恐怖(文化大革命就是典型例子)。"},{"type":"paragraph","text":"思想作风"},{"type":"paragraph","text":"(1)唯我独尊，一言堂，但又拿不出什么办法。(2)经常拿帽子、棍人压人、打人，很多人说他是阎王。(3)吹捧老婆，达到非常庸俗、低级的地步。如王光美在桃园大队蹲点后，少奇带着她到全国各地去作报告，要中央批发了她的报告，并加了许多按语，说她的经验“带有普遍意义”，要全国县以上各级党委和所有社会主义教育工作队的队员阅读。少奇同志给江渭清的信中又提出要“学习王光美同志的报告”，因为她手里有“真理”。王光美作报告时，少奇同志也当众大肆吹捧，很多话说的肉麻。(4)少奇同志的岳母是资本家老婆，常住少奇同志家，享受常委待遇。少奇外出时，也带到各地游山玩水。这是丧失立场的事，影响很坏。"},{"type":"paragraph","text":"攻击养病的老同志"},{"type":"paragraph","text":"1963年5月底，少奇同志在昆明说：“不作工作比什么错误都大。”又说：“这些人已经不是无产阶级了，现在他们已经有产了。有产不只是有钱，老资格、名誉、地位、功劳、文章写得好都可以成为资本”等等。这些话中有无影射攻击林彪同志之意，值得怀疑。"},{"type":"paragraph","text":"雷英夫"},{"type":"paragraph","text":"8月13日"},{"type":"paragraph","text":"中共中央将八届十一中全会选举结果的通知发至县团级干部，刘少奇在党内由第二号人物降至排名第八；林彪上升第二，陶铸上升第四。"},{"type":"paragraph","text":"中共中央通知(一九六六年八月十四日)"},{"type":"paragraph","text":"中国共产党第八届委员会第十一次全体会议，补选了中央政治局委员、候补委员，选举了政治局的常务委员会，补选了书记处书记。现将上述选举结果通知你们。此名单传达到县团级，不向党外传达。"},{"type":"paragraph","text":"(一)补选中央政治局委员六人："},{"type":"paragraph","text":"陶铸"},{"type":"paragraph","text":"陈伯达"},{"type":"paragraph","text":"康生"},{"type":"paragraph","text":"徐向前"},{"type":"paragraph","text":"聂荣臻"},{"type":"paragraph","text":"叶剑英"},{"type":"paragraph","text":"(二)补选中央政治局候补委员三人："},{"type":"paragraph","text":"李雪峰"},{"type":"paragraph","text":"宋任穷"},{"type":"paragraph","text":"谢富治"},{"type":"paragraph","text":"(三)选举中央政治局常务委员会委员十一人："},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"林彪"},{"type":"paragraph","text":"周恩来"},{"type":"paragraph","text":"陶铸"},{"type":"paragraph","text":"陈伯达邓小平"},{"type":"paragraph","text":"康生"},{"type":"paragraph","text":"刘少奇"},{"type":"paragraph","text":"朱德"},{"type":"paragraph","text":"李富春"},{"type":"paragraph","text":"陈云"},{"type":"paragraph","text":"(四)补选中央书记处书记二人："},{"type":"paragraph","text":"谢富治"},{"type":"paragraph","text":"刘宁一"},{"type":"paragraph","text":"《人民日报》在第一版上用套红大字标题刊登了《中国共产党第八届中央委员会第十一次全体会议公报》。"},{"type":"paragraph","text":"邓小平、陶铸指责人民大学师生“已两个月了，斗黑帮还未开始，没人理他，自己内部争论不休，搞的很紧张”，命令马上斗黑帮。并说保郭(影秋)派有阶级感情。"},{"type":"paragraph","text":"《毛主席语录》即所谓小红书开始公开发行。(前此在部队中已流行二年)至1968年间，共发行了七亿四千多册，人手数本，泛滥成灾。8月15日"},{"type":"paragraph","text":"李富春在共青团中央机关全体人员大会上宣布，团中央书记胡耀邦、胡克实、胡启立、王伟积极派出工作组，阻遏群众革命造反，犯了错误，中央决定令其停职反省。成立临时团中央书记处，由路金栋、王道义负责，筹备召开团中央全会。(《传信录66》)"},{"type":"paragraph","text":"中宣部按照陶铸的指示，选出文革委员会，旋即恢复了党的基层组织。"},{"type":"paragraph","text":"《人民日报》发表社论《大海航行靠舵手》指出：几十年来，在中国革命的重要关头，都是因为有毛泽东这样天才的舵手掌舵，有毛的思想作指南，才能“拨开迷雾，端正航向”，“绕过无数的险滩和暗礁”，“沿着马克思列宁主义的革命轨道，胜利前进”。"},{"type":"paragraph","text":"新北京市委限令各校在短期内成立文革筹委会，马上开始斗黑帮，“不要因批判工作组，转移斗争大方向。”"},{"type":"paragraph","text":"在北京航空学院原工作组组长赵如璋的检查会上，支持工作组的文革会组织师生进行游行，邻近院校亦组织人员前来参加。北航红卫兵(多数派)又向国务院告状，想一举摧毁反工作组的少数派。"},{"type":"paragraph","text":"北大师生在工人体育馆召开十万人大会，批判陆平、彭珮云。"},{"type":"paragraph","text":"北京二中红卫兵改苏联大使馆所在的扬威路为反修路。嗣后改名之风大行，许多街道、公共场所、商店、甚至个人都改为含有政治意义的新名，如“卫东”、“卫彪”、\"永红’’之类。8月16日"},{"type":"paragraph","text":"天津各院校师生大批来京进行革命串连。陈伯达在工人体育场召开的“外地来京学生群众大会”上，作了《在大风大浪里成长》的报告，实际上是号召进行“大串连”的动员令。(《传信录67》)当晚，毛泽东决定18日接见来京的红卫兵以示支持。早在八届十一中全会开会中，汪东兴在华东组会议上就提到，当时每天都有上千学生、上百批来中南海接待站，其中一些是外地的。外地学生涌向北京的形势已初见苗头。本月中，外地学生大批进京，北京学生亦小批流向外地，进行点火。8月17日，王任重就曾批评北大学生到天津去点火。"},{"type":"paragraph","text":"《文化大革命十年史》：最早从北京出去串连的人，主要是在“批判资产阶级反动路线”中受到冲击的红卫兵，其中，有相当一部分人掌握着本单位的领导权。由于受到批判，那种耀武扬威的神气一下子变成了垂头丧气的神情。他们结帮搭伙，不问本单位的运动，离校外出了。由于对立面的消失，文化大革命初期因为家庭出身等等问题一直受压抑的人，一下子觉得束缚他们自由活动的禁令不击自溃，便也设法弄到免费乘车证加入了原来不允许加入的外出行列。全国大串连，象是在不断加热时分子作的布朗运动一样，愈演愈烈。而大部分“分子”又是没有“革命目标”地在全国游逛。为此，全国各地在自上而下的统一布置下，专辟了串连接待站来统管各地前来串连的人员。北京作为全国性串连的集散中心，每天接待大批的串连人群，各大、中、小学校由于“革命”和串连而几乎空了的校舍，首先被开放为接待站，教室的桌椅被高高地堆放在一起，地上铺着篾席，连成长长的通铺。随着人流的骤增，机关、单位也纷纷腾出房屋开设接待站。各街道办事处则把被驱赶离京人家的空房作为接待站。请专人做饭，专人管理串连人员的免费食宿问题。作为：“毛主席的客人”，红卫兵在北京受到特别的款待，每人都有免费乘坐市内交通工具的乘坐证，并能免费进入公园等游乐场所。(第84—85页)"},{"type":"paragraph","text":"陶铸在中宣部文革常委第一次会议上说：常委等于党委。并说张子意的问题：“四类当三类处理”。"},{"type":"paragraph","text":"陈毅在接见外语学院等三校代表时说：“对工作组要一分为二”，“......工作组是我派的，张彦(中央外办副主任)工作组也是我派的，工作组的错误由我来承担。”“我的后台是谁？当然是毛主席了，各人有各人的帐，我有我的帐，不要用大帽子压人，压也是压不住的。说刘新权(外交部副部长)是黑帮，不对。说工作组是黑帮，不对。工作组有错误，应检讨，工作组没有黑帮也不能那么说。”“我不能损害少数派、损害多数派，也不能损害工作组。”"},{"type":"paragraph","text":"西安交通大学师生在省委门前静坐示威，抗议大批造反者被打致伤。当时各地保与反的群众互斗成风，兰州发生围攻造反者事件，打伤数十人。8月17日"},{"type":"paragraph","text":"毛泽东为《新北大》校刊题写刊名，北大师生为此欢呼庆祝。8月23日，《人民日报》还为毛的题字发表社论。和其他院校两派开始形成势均力敌的情况相反，北大则由中央文革一手扶植的聂元梓独揽校文革会领导大权。"},{"type":"paragraph","text":"《无产阶级文化大革命大事记》：八月中旬，工作组走了，资产阶级反动路线的活魂犹在，不过采取了新的形式。工作组从前门出去，北京新市委派出的联络员、观察员、巡视员、顾问就从后门进来，控制运动。王任重一手就操纵了北大、清华、北大附中，清华附中四个学校，并勾结刘志坚从军队调来大量的联络员派往这些学校。陶铸、王任重和新市委利用群众“多数”还受反动路线蒙蔽的所谓“有利时机”，限令各校三天之内选出文革。他们违背巴黎公社原则，不顾少数派的反对，暗中操纵，预先指定，成立了御用的“文革筹委会”、“文革小组”等等，夺取了各学校、机关单位文化革命运动的领导权。他们指使这些文革会“立即转入斗黑帮”，以所谓“斗、批、改”来压制少数派批判资产阶级反动路线。这些文革会继承了工作组的衣钵，把矛头指向革命群众，原来受压制被打成“反革命”的革命小将并未得到解放，依然被文革会的老爷们视为“痞子”。而原来被工作组利用、欺骗的群众，也没有受到应有的教育，有的还当上了各级文革的头头。在干部问题上他们继续执行“打击一大片，保护一小撮”的刘邓路线。各大专院校还刮起了大办劳改队的歪风。两条路线斗争进入了新阶段。在对待工作组问题上，一个要革，一个要保，两派斗争激烈发展。"},{"type":"paragraph","text":"《北航》十日，四百多名同学去中央文革，坚决要求赵如璋回校检查。十一日晚，工作组回航院，北航红卫兵挽臂保驾，贴大标语：“工作组是革命的”。并撕毁少数派所贴要求工作组、赵如璋作深刻检查的大标语。十四日，执行了五十多天错误路线的赵如璋上台作了十二分钟的“检查”，而后，伪院文革急急忙忙开始“斗黑帮”。"},{"type":"paragraph","text":"《地院》八月十一日，“斗批改兵团”毫无准备地斗聂克(院党委副书记)，会上竟有人责问聂克是不是6．20事件的后台。"},{"type":"paragraph","text":"《北工大》工作组长杜万荣走后，被加封为新市委文革办公室副主任，继续指挥他一手扶植起来的谭力夫文革，执行资产阶级反动路线。谭力夫以确保主攻方向为名，布置8·3—8·11以斗黑帮为中心。少数派提出批判资产阶级反动路线，被打成“大阴谋家”。校文革还声称：“谁敢动杜万荣一根毫毛，就把他砸得稀巴烂”。谭力夫更是肉麻地说：“你就是说的天花乱坠，我也是喜欢杜万荣。”"},{"type":"paragraph","text":"《清华》8·9派提出一个理论，吸取工作组教训，必须坚持一斗二批三改的大方向。大喊“立即斗黑帮”。8月15日，匆忙开会斗争党委副书记艾知生。但是，蒯大富革命小将依然被伪临筹压在下层。很多革命和要革命的教师、干部被赶进庞大的劳改队。"},{"type":"paragraph","text":"《北师大》8月16日，不顾革命师生的反对，宣布筹委会正式成立，十分荒谬地提出：“斗黑帮就是对工作组错误路线的有力批判”，“不要因为批判工作组转移了斗争大方向。”北京其他学校的情况也都是如此。为了把运动运纳入所谓斗黑帮的“正轨”，新市委苦心地炮制了石油学院的所谓“学毛选斗黑帮经验”。这是一个假学假用，打着“红旗”反红旗的修正主义典型。北京各校校园里冷冷清清，运动被拉向右转。全国各地一些党内走资派继续挑动群众斗群众，制造流血事件。"},{"type":"paragraph","text":"《西安》8·14，8·16交大等校革命师生举行静坐示威，揭发西北局、陕西省委挑动工农群众斗学生。从8月4日起，到8月25日内，连续发生流血事件，宝鸡、汉中、铜川等地亦然。"},{"type":"paragraph","text":"《长沙》在陶铸、王任重的控制下，王延春一手制造了8·19事件，血腥镇压革命学生。"},{"type":"paragraph","text":"《天津》天大等校革命师生大造了资产阶级反动路线的反，他们有多少知心的话要向毛主席倾诉！但刘邓的走狗百般阻拦，不给车，不给粮。天大“8·13红卫兵”毅然徒步上京。毛主席知道后，立即派车去接。"},{"type":"paragraph","text":"太原，长沙、西安等地的革命小将冲破重重阻力，上京告状，来京学习。北京的革命小将开始北上、南下，西进、东征、煸风点火，支援各地革命战友。革命大串连开始兴起。(第89—91页)"},{"type":"paragraph","text":"周恩来与北京三十一中七一赤卫队员谈话。当时中学生中广泛发展红卫兵、红旗、赤卫兵等组织，周恩来认为，以后会统一起来，我看赤卫队这个名字好。“我的出身不好。我到清华去，当我要讲出身时(封建家庭)，出身好的同志不要我讲，说你要是讲了以后，出身不好的就要向你学习。”"},{"type":"paragraph","text":"《人民日报》发表社论《在游泳中学会游泳》，鼓励青年要经风雨，见世面，要在“毛泽东思想的阳光照耀下，勇敢地在波澜壮阔的文化革命的激流中战斗。”"},{"type":"paragraph","text":"北京地质学院革命造反组织“东方红公社”成立。"},{"type":"paragraph","text":"比利时共产党中央委员会书记雅克·格里巴来华访问。"},{"type":"paragraph","text":"第四编"},{"type":"paragraph","text":"红卫兵狂飚"}],"authors":["周良霄","顾菊英"],"dates":[{"year":2008}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":339,"page_end":347,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"谢富治","type":"人物"},{"name":"康生","type":"人物"},{"name":"陈伯达","type":"人物"},{"name":"陶铸","type":"人物"},{"name":"邓小平","type":"人物"},{"name":"王光美","type":"人物"},{"name":"李富春","type":"人物"},{"name":"王任重","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"彭真","type":"人物"},{"name":"陈云","type":"人物"},{"name":"罗瑞卿","type":"人物"},{"name":"朱德","type":"人物"},{"name":"中央文革","type":"人物"},{"name":"捍卫毛泽东思想工人赤卫队上海总部（赤卫队）","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"天津文革","type":"人物"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"人民战争","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]},{"id":"wengeqianqixinianlu2","name":"十年文革前期系年录（中册）","internal":false,"type":"pdf","official":false,"author":"周良霄,顾菊英","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/文革前期系年录2.pdf"],"article":{"title":"第五十八卷","parts":[{"type":"title","text":"第五十八卷"},{"type":"paragraph","text":"1967年1月18日至23日1月18日"},{"type":"paragraph","text":"周恩来约请李富春、江青与贺龙谈话，江青拒绝参加。造反派组织宣传车开到中南海墙外，高喊“打倒贺龙”的口号。周恩来向贺龙表示住中南海已无法保证安全，“另外给你找个安静的地方，去休息一下。你先去吧！到秋天我去接你。”"},{"type":"paragraph","text":"中南海内造反派切断刘少奇住处电话线，断绝其与政治局的联系。"},{"type":"paragraph","text":"周恩来、陈伯达、江青召集部分工矿企业代表及学生代表座谈。周表示：上海走到前面去了，我们要急起猛追。铁道部已夺了吕正操的权。今晚已有30多个单位到北京市委夺权去了。北京的几所综合大学在夺权中要下大力量，要起主要作用。陈伯达说：我们同资产阶级夺权是解放后夺权的继续。(《传信录420》)"},{"type":"paragraph","text":"全军文革小组长徐向前谈海军问题：海军政委苏振华是邓小平安插在海军的钉子。海军文革改组，以萧劲光为组长，王洪坤为副组长，李作鹏为常务秘书长。北京部队政委廖汉生是贺龙的亲信(外甥)。(《传信录421》)"},{"type":"paragraph","text":"中共中央通报各地党委，表扬天津建筑材料公司“毛泽东思想红色造反队”上缴附加工资。"},{"type":"paragraph","text":"中共中央文件"},{"type":"paragraph","text":"中发(67)26号各地党委："},{"type":"paragraph","text":"天津建筑材料公司毛泽东思想红色造反队来电报说，他们积极响应中央号召，把公司批准给他们的三千九百多元钱和附加工资，全部上交银行，进行封存，等运动后期处理。中央认为：天津建筑材料公司造反队交银行的做法好，赞成他们。"},{"type":"paragraph","text":"中央"},{"type":"paragraph","text":"一九六七年一月十八日周恩来、刘宁一对工资问题作紧急指示。"},{"type":"paragraph","text":"(1967年1月18日)"},{"type":"paragraph","text":"1．临时工、合同工现在制度不变，因为生产需要，行业需要。如果改成固定工，工资势必提高，工资提高后对农民有很大影响。并按主席给林彪同志的信办。"},{"type":"paragraph","text":"2．学徒工制度从长远看，可改为半工半读，但是现在不变。"},{"type":"paragraph","text":"3．关于精简人员能不能复工、复职，今后按生产需要可由劳动部门介绍。"},{"type":"paragraph","text":"4．工资和工资标准问题，未经中央批准以前，一律不动。如果走资本主义道路的当权派批准的，应向他们斗争。"},{"type":"paragraph","text":"5．各种补发工资问题。以前没按有关规定执行的，可以经企业和群众讨论并报上级，按照规定执行，以前错了的一律不补。如果过去执行错了的，有关领导挑担子，向群众检讨承认错误。"},{"type":"paragraph","text":"6．各种奖金问题......(不清)。"},{"type":"paragraph","text":"全国各系统中第一个联合起来的财贸系统的革命造反派十万人，在北京工人体育场举行反对经济主义，彻底粉碎资产阶级反动路线新反扑的誓师大会。周恩来、李先念出席。周恩来代表毛泽东、林彪向全体革命造反派战士表示亲切慰问。大会宣读了给毛的致敬电和《紧急通电》。"},{"type":"paragraph","text":"光明日报社造反派及中央财经学院“八·八战斗队”、清华大学“井冈山”揪斗穆欣夫妇。"},{"type":"paragraph","text":"教育部、外交部联合向中国驻外使馆发出《关于国外留学生回国参加文化大革命运动的通知》。"},{"type":"paragraph","text":"北京一些群众组织发布打击经济主义的第二号紧急通告。"},{"type":"paragraph","text":"紧急通告"},{"type":"paragraph","text":"第二号"},{"type":"paragraph","text":"目前，在无产阶级文化大革命的一派大好形势下，一小撮党内走资本主义道路的当权派，为了破坏无产阶级文化大革命，转移斗争目标，挑动不明真象的少数人，大闹经济主义。经济主义从来就是资产阶级对无产阶级进行政治斗争的手段，是彻头彻尾的反革命修正主义的东西，是麻醉人民的鸦片，是包着蜜糖的砒霜，是资产阶级和无产阶级你死我活的阶级斗争的表现。"},{"type":"paragraph","text":"我们坚决执行中共中央的指示，立刻制止这种破坏无产阶级文化大革命的行为，立即制止这种大闹经济主义的倾向。"},{"type":"paragraph","text":"为此，我指挥部于元月十七日发出一个紧急通令。"},{"type":"paragraph","text":"但是，革命每前进一步，敌人总是要耍出新花招的，我们必须警惕党内一小撮资本主义道路的当权派和社会上的地、富、反、坏、右分子互相勾结起来，歪曲我十七日的通令，阴谋策划罢市活动，企图破坏社会主义经济，达到破坏无产阶级文化大革命的目的，我们必须戳穿阶级敌人的阴谋，彻底粉碎资产阶级反动路线的新反扑。"},{"type":"paragraph","text":"为此，现紧急通告如下："},{"type":"paragraph","text":"1．一切革命群众都要提高警惕，用毛泽东思想作武器，说服少数被蒙蔽的群众要顾全大局，打回老家去，就地闹革命，坚决贯彻执行毛主席的“抓革命，促生产”的伟大号召。彻底揭露一小撮党内走资本主义道路的当权派和地、富、反、坏、右的阴谋诡计，保护国家财产，坚决贯彻执行“中共中央关于反对经济主义的通知”。"},{"type":"paragraph","text":"2．除本指挥部元月十七日通令所指出的暂时冻结的部分商品(呢绒、绸缎、手表、皮货、半导体、收音机、自行车、缝纫机、照相机、不凭劵的毛线及毛织品)以外，不许任何组织和个人以任何借口私自扩大暂时冻结的商品的范围。"},{"type":"paragraph","text":"3．不许任何组织和个人以任何借口私自封闭商店。"},{"type":"paragraph","text":"我们呼吁：一切革命造反派联合起来！坚决响应毛主席和党中央的伟大号召，打倒经济主义，彻底粉碎资产阶级反动路线的新反扑，将无产阶级文化大革命进行到底！"},{"type":"paragraph","text":"首都打倒经济主义联合指挥部"},{"type":"paragraph","text":"北京市财贸职工革命造反尖兵总部"},{"type":"paragraph","text":"北京百货大楼红色暴动委员会"},{"type":"paragraph","text":"北京工业大学东方红公社"},{"type":"paragraph","text":"北京地质学院东方红公社"},{"type":"paragraph","text":"北京机械学院东方红公社"},{"type":"paragraph","text":"首都中学革命造反联络站"},{"type":"paragraph","text":"中央乐团井冈山革命造反团"},{"type":"paragraph","text":"首都职工革命造反者大楼工厂战斗队"},{"type":"paragraph","text":"北京石油学院大庆公社"},{"type":"paragraph","text":"中央歌舞团红旗造反团"},{"type":"paragraph","text":"中国人民大学东方红公社"},{"type":"paragraph","text":"东方歌舞团誓死捍卫毛泽东思想革命造反队"},{"type":"paragraph","text":"一九六七年一月十八日"},{"type":"paragraph","text":"天津市“工农学联合战斗团”、天津市“荣复转退战斗兵团”劫走解学恭、胡昭衡、赵武成、阎达开等市书记处书记五人，秘密囚禁。中央对这类全国性的联合组织拒绝承认。1月19日"},{"type":"paragraph","text":"中央发布关于保护粮食物资仓库和监狱等的规定。"},{"type":"paragraph","text":"关于保护粮食、物资仓库和监狱等问题的规定"},{"type":"paragraph","text":"中发(67)24号各级党委、人委，各军区、军分区："},{"type":"paragraph","text":"现在发现有的坏人煽动抢劫仓库的事件。中央决定：一切重要的粮食和物资仓库，监狱，以及其他中央规定必须保护和监视的重要单位，都要立即派出军队，实行军事管制。国家仓库中的一切物资，没有国家调拨的指示，任何机关和个人都不得私自动用，违背者以国家纪律严厉惩处。"},{"type":"paragraph","text":"中"},{"type":"paragraph","text":"央"},{"type":"paragraph","text":"国务院"},{"type":"paragraph","text":"中央军委"},{"type":"paragraph","text":"一九六七年一月十九日"},{"type":"paragraph","text":"毛泽东密令林彪：要整一批不服气、不买账的老帅，借此以中央文革取代中央政治局的权力。《人民日报》发表社论《让毛泽东思想占领报纸阵地》。说：“从一小撮党内走资本主义道路当权派的手里，从极少数坚持资产阶级反动路线的顽固分子手里，把被他们篡夺了的各种权力统统夺回来，是无产阶级革命派必须勇敢地承担起来的战斗任务。”(至二月中旬，毛指示，不要再提夺坚持资产阶级反动路线的顽固分子的权。)"},{"type":"paragraph","text":"周恩来、李富春、谭震林在北京体育馆接见安徽革命造反派和其他组织代表。周表示支持对李葆华资产阶级反动路线的批判。周提出：以告状串连为名，出外闲逛，妨碍无产阶级革命。必须反对经济主义。不赞成组成全国性组织。最近发现“全国工农兵红色夺权总部”、“全国工农红旗军”两个反动组织，原来的“西纠”的一些人组成了“革命造反联合行动委员会”，陕西省又有“红色恐怖队”，必须镇压。(《传信录422》)"},{"type":"paragraph","text":"下午，在京西宾馆举行军委碰头会，就军队要不要开展“四大”问题，在徐向前、叶剑英、聂荣臻等元老派与文革派陈伯达、康生、江青、姚文元之间发生激烈争论，僵持不下。文革派认为军队应与地方一样，开展“四大”，不能特殊。叶群用准备好的稿子，突然发起对总政治部主任萧华的攻击。江、陈声言：已决定于今晚在工人体育场召开十万人大会，批判萧华。北京军区司令员杨勇会后将会议情况向军区单位进行了传达。军区所属的战友文工团与总政歌舞团的造反派立即前往揪萧华，萧华从后门走脱，其家被抄。经叶剑英告毛泽东求免，于是当晚大会改为批斗彭真、罗瑞卿，刘志坚陪斗。周恩来曾命准备直升飞机，必要时营救被斗者。当时北京各大院校造反派分为以北京航空学院为首的天派及以北京地质学院为首的地派。当天的大会为天派所组织，遭到地派的冲击，在混乱中散会。"},{"type":"paragraph","text":"晚，红卫兵强烈要求揪斗陈毅，包围人大会堂，其代表与周恩来辩论达15小时。周坚持拒绝。"},{"type":"paragraph","text":"康生、王力、关锋在接见青岛造反派(其中有康生之子张子石)时，康生作了长篇讲话，谈到关于两条路线的斗争说：资产阶级反动路线的本质就是中华人民共和国是走社会主义还是走资本主义道路？它从建国时即已存在。表现为“巩固新民主主义秩序”，砍合作社，右派进攻直至62年《海瑞罢官》的出现等。文化革命就一定意义上讲，又是“整干”运动，每个干部都要整整、触及灵魂。他极力鼓励青岛接管，因为它有个好条件，就是有个王效禹。"},{"type":"paragraph","text":"李富春在团中央革命造反团夺权大会上讲话，肯定团中央夺权是革命行动。(《传信录424》)"},{"type":"paragraph","text":"文化部夺权。"},{"type":"paragraph","text":"凌晨三时，周恩来派杨德中和负责贺龙警卫工作的杨青成护送贺龙夫妇到北京近郊山区。为了安全，周恩来特意安排中途换车，并不让带工作人员，以便严格保守秘密。"},{"type":"paragraph","text":"“首都批判刘邓路线新代表陶铸联络委员会”派人到广州设立办事处，在中南地区就陶铸问题进行调查和宣传工作。"},{"type":"paragraph","text":"“上海市革命造反派组织联络总站”第一次筹备会议召开。共38个组织参加(“二兵团”、“红革会”未参加)，由姚文元起草的向中央的报告中说：“在斗争走资本主义道路当权派和顽固执行资产阶级反动路线的一小撮人的破坏活动中，各单位普遍展开了夺权斗争，革命左派用各种形式的大联合，把领导权夺到了自己手里。这个革命行动，是推进生产前进的根本因素。革命的工人和革命群众的许多新创造，实际上已形成了无产阶级专政的新形式，把过去的部长、局长、处长、科长......庞大的官僚机构，一扫而光。这就使革命大大推进了一步。”“联络总站成立，目前已实际行使着政权的作用。”"},{"type":"paragraph","text":"北京以新北大为首的一些学校的造反派组织与中央各部委机关内的造反者勾结，纷纷开进高教部、中宣部、文化部、华北局、团中央等单位，进行夺权。因中央文革进行了批评，始各行撤回。"},{"type":"paragraph","text":"造反派包围“联动”所在的石油学院附中，公安局逮捕其成员任志明、马晓军等。1月20日"},{"type":"paragraph","text":"上午，军委碰头会在京西宾馆继续召开，因萧华被抄家一事，元老派严厉指责文革派，叶剑英拍案大骂。陈、康、江等集体退出会场。此即所谓“大闹京西宾馆事件”。"},{"type":"paragraph","text":"下午，毛泽东在人民大会堂接见军委会议的参加者。杨得志等纷纷汇报各地军区受造反派冲击情况。会议结束时，毛心事重重的说：“你们不要汇报了，要说的，我全晓得了。”"},{"type":"paragraph","text":"陈伯达在下午两次紧急电话指示：《解放军报》只能由本单位革命派自己解决，外单位不能冲击。(《传信录428》)"},{"type":"paragraph","text":"王力在北京工人俱乐部接见上海工人时讲话：毛主席把上海工人阶级经验总结、提高，归结到一点就是夺权。就是无产阶级革命派联合起来，联合广大的革命群众，向走资派夺权，向坚持反动路线的顽固分子夺权。当前的中心任务是夺权。(《传信录425》)"},{"type":"paragraph","text":"财政部夺权。"},{"type":"paragraph","text":"北航\"红旗’’等组织扣押北京副市长吴德，声称夺权。陈伯达、江青电示：考虑组织北京市工农兵革命师生代表会，组织市人民政府。(《传信录426》)迁因各派矛盾流产。"},{"type":"paragraph","text":"下午，北京邮电学院“东方红”、清华“井冈山”等组织冲击北京人民广播电台，要求改名为红卫兵广播台。中央文革派王力劝阻。(《传信录427》)1月21日"},{"type":"paragraph","text":"毛泽东致林彪信：“林彪同志：应派解放军支持左派广大革命群众。请酌处。毛泽东"},{"type":"paragraph","text":"一月二十一日。又及：以后，凡是真正革命派要求支持援助，都应这样做。所谓“不介入”是假的，早已介入了。此事应重新发出命令，以前的命令作废。请酌。”林彪批：“完全赞成主席的方针，全军必须坚决支持左派广大群众，请向前、剑英同志速将主席批示转发全军照办。”"},{"type":"paragraph","text":"林彪"},{"type":"paragraph","text":"一九六七年一月二十一日"},{"type":"paragraph","text":"[按]"},{"type":"paragraph","text":"此信是批在安徽省军区关于可否派出部队警卫群众组织召开的批斗省委第一书记李葆华大会的请示报告上的。根据毛的这一指示，发布了军队支左的决定。执行三支(支工、支农、支左)两军(军训、军管)任务。实行军训始自1966年12月31日的通知，军管始于1月11日关于广播台的通知。各地军区因收存省党委转移的材料及隐藏被追捕的省领导人，屡受造反派的冲击，故毛说军队早已介入地方文化大革命。"},{"type":"paragraph","text":"林彪关于部队介入文化大革命的口头指示(一九六七年一月)"},{"type":"paragraph","text":"军队在文化大革命中一定要站在革命左派一边，支持革命左派，在革命派和保守派之间不能调和折衷，搞折衷实际上是反动路线。"},{"type":"paragraph","text":"周恩来传达毛泽东在军委扩大会议上的指示："},{"type":"paragraph","text":"一、军队对文化大革命的态度在运动开始时是不介入的，但实际上已介入了(如材料送到军队保管，有的干部去军队)，在现在的形势下，两条路线斗争非常尖锐的情况下，不可能不介入，介入就必须支持左派。"},{"type":"paragraph","text":"二、老干部多数到现在对文化大革命还不理解，多数靠吃老本。过去有功劳，要很好地在这次运动中锻炼改造自己，要立新功，立新劳，要坚决站在左派方面，不能和稀泥。坚决支持左派，然后在左派的接管和监督之下搞好工作。"},{"type":"paragraph","text":"三、关于夺权，报纸说夺走资本主义道路当权派和坚持资产阶级反动路线顽固分子的权。不是这样的能不能夺？现在看来不能细緻分，应夺来再说。不能形而上学，或者受限制。夺来后是什么性质的当权派在运动后期判定，夺权后报国务院同意。"},{"type":"paragraph","text":"四、夺权后的老干部和新干部要共同搞好业务，保守国家机密。"},{"type":"paragraph","text":"[按]"},{"type":"paragraph","text":"根据毛泽东对军委扩大会议的指示，所有全国各级政权，必须全面进行夺权，谁是走资本主义道路的当权派？谁是革命派？要等到运动后期再定性。根据这一逻辑，下面的群众组织，凡是主张打倒各级领导，进行夺权的，都是革命左派，否则为保守组织。但是实际的情况却远为复杂难分。通常各级领导中也多分裂为对立的两帮，各受一部分群众组织的支持，都称自己忠于毛泽东的革命路线，指责对方是反毛泽东思想，走资本主义道路。中央对这些干部的性质尚不清楚，因而对支持他们的对立两派群众组织究竟谁是革？谁是保？就更是糊涂难辨。譬如，解放军总后勤部的邱会作，人品极为卑劣，受到群众的反对和斗争。然而，因为他是林彪线上的人物，叶群亲自出马保护。一夜之间，他便成了小节无碍的革命领导干部，而坚持打倒他的群众组织便成了反动帮派。又如湖南的群众组织“湘江风雷”，中央文革原定为反动组织，后来又改封为革命左派。在如此纷纭的情况下，毛命令军队介入地方，进行支左。军队从它传统的认识出发，支的恰恰不是文革派的左即造反派，而是保。正如王年一所述除极个别大军区外，多数大军区经过短时间的考察、犹豫，都支持了共产党员和共青团员多的、出身好的多的、复员转业军人多的、劳动模范多的、比较遵守纪律的、拥护军队的一派。这一派一般来说是人数多的大派，是造反精神比较不强，甚至保护某些走资派的造反派，正是被与之对立的、造反精神很强的、激进的造反派所称之保守派。多数大军区支持这样的一派是很自然的，因为这一派具有遵守军委《八条》，党团员多，拥护军队等等条件。(《大动乱的年代》第200页)军队支左恰恰成了军队支“保”，把已经十分混乱的运动进而推向更大的灾难和破坏。“保”的一派有了枪杆子的撑腰，更加肆无忌惮；而造反派因恃有中央文革的支持，也有恃无恐。于是全国各地两派武斗纷起，并且有军队直接支持，发展为大规模长期的内战。"},{"type":"paragraph","text":"周恩来在人大会堂接见各军兵种机关、院校、科研等三十七个单位的四清工作队员代表时讲话。肯定了四清运动的积极成果，北京的四清虽有彭真的干扰，也不宜完全否定。(《传信录430》)"},{"type":"paragraph","text":"中央高级党校“红战团”贴出炮打康生的大字报，该团与清华“井冈山”、天津大学“八·一三”、北京体育学院“毛泽东主义兵团”共同成立了“调查康生问题联络委员会”，起草公告。"},{"type":"paragraph","text":"煤炭部发生第二次夺权。"},{"type":"paragraph","text":"北京军区司令员杨勇被军区造反派揪斗。"},{"type":"paragraph","text":"海军东海舰队司令员陶勇在招待所投井自杀，随之其家连续三次被抄。"},{"type":"paragraph","text":"北京以中学红卫兵为主，召开了“彻底批判‘联动’大会”。接着，“联动”设在北京一O一中学、北京工业学院附中、北京石油学院附中、北京师范大学附中、人民大学附中、十一学校、八一学校的据点先后被捣毁，分散在全国各地的“联动”势力也先后被镇压，头目被捕。1月22日"},{"type":"paragraph","text":"《人民日报》发表社论《无产阶级革命派大联合，夺走资本主义道路当权派的权》。文章号召，革命造反派实现大联合，向党内一小撮走资本主义道路的当权派和坚持资产阶级反动路线的顽固分子“展开全国全面的夺权斗争”。"},{"type":"paragraph","text":"《无产阶级革命派大联合，夺走资本主义道路当权派的权！》"},{"type":"paragraph","text":"一场无产阶级革命造反派大联合展开夺权斗争的伟大革命风暴，在我们伟大领袖毛主席的伟大号召下，正以排山倒海，雷霆万钧之力，席卷全中国，震动全世界。"},{"type":"paragraph","text":"无产阶级革命造反派最盛大的节日来到了！一切牛鬼蛇神的丧钟敲响了！让我们高举起双手，热烈地欢呼：无产阶级革命造反派的大联合，夺走资本主义道路当权派的权好得很！就是好得很！"},{"type":"paragraph","text":"这是我国无产阶级文化大革命的一个新的飞跃。这是今年展开全国全面阶级斗争的一个伟大开端。"},{"type":"paragraph","text":"这是国际共产主义运动中的极其伟大的创举，是人类历史上从来没有过的大事，是关系到世界前途和人类命运的大事。"},{"type":"paragraph","text":"在社会主义社会里，在无产阶级专政的条件下，亿万革命群众以无产阶级革命造反派的大联合为核心，组成浩浩荡荡的革命队伍，从党内一小撮走资本主义道路的当权派和坚持资产阶级反动路线的顽固分子手里，自下而上地夺权。这是毛主席对马克思列宁主义关于无产阶级革命和无产阶级专政学说的重大发展。"},{"type":"paragraph","text":"革命的根本问题是政权问题。我国人民民主革命的胜利，出现了无产阶级在全国范围内的夺权。但是，被打倒了的阶级敌人，他们人还在，心不死。在无产阶级和小生产者的队伍里也会产生新的资产阶级分子。无产阶级同资产阶级的夺权斗争一直在激烈地继续进行。无产阶级文化大革命，从一开始就是一场夺权斗争。这个文化大革命，就是发动亿万群众自己起来解放自己，向党内一小撮走资本主义道路的当权派夺权。只有展开这样伟大的群众运动，展开一个群众性的全面夺权斗争，才能彻底解决无产阶级的夺权问题，彻底解决无产阶级专政的问题。"},{"type":"paragraph","text":"资产阶级代表人物把持的各种权力，非夺不可！这是广大革命群众，通过几个月的艰苦斗争，掌握到的马克思列宁主义、毛泽东思想的伟大真理。"},{"type":"paragraph","text":"为什么当革命的左派响应毛主席的伟大号召，满怀着对无产阶级革命事业的无限忠诚，瞄准走资本主义道路的当权派发出第一炮的时候，就被打成“反革命”、“右派分子”？"},{"type":"paragraph","text":"为什么当“工作组”来了以后，革命左派不仅没有翻身，反而更变本加厉地遭到白色恐怖的残酷镇压？"},{"type":"paragraph","text":"为什么当广大革命群众起来揭露和批判资产阶级反动路线的时候，却发生了更大规模的群众斗群众的事件，甚至武斗流血，多少革命的闯将受打击，遭迫害，被开除，被镇压，直到最近，又出现了资产阶级反动路线新的大反扑，出现了反革命经济主义的大泛滥？"},{"type":"paragraph","text":"几个月的反复和曲折，一场场惊涛骇浪的阶级斗争暴风雨，深刻地教育了广大革命造反派。他们越来越明白了：革命之所以受挫折，原因不是别的，只是因为印把子没有攥在自己手里。那一小撮资产阶级代表人物之所以如此猖狂，之所以敢于这样欺负人，就是因为他们还有权！革命群众要掌握自己的命运，千条万条，归根结底，就是要自己掌握印把子！有了权，就有了一切，没有权，就没有一切。千重要，万重要，掌握大权最重要！于是，革命群众凝聚起对阶级敌人的深仇大恨，咬紧牙关，斩钉截铁，下定决心。联合起来，团结起来，夺权！夺权！！夺权！！！一切被反革命修正主义分子、被坚持资产阶级反动路线的顽固分子所窃取的党、政、财等各种大权，统统要夺回来！就是要把无产阶级专政的命运，把无产阶级文化大革命的命运，把社会主义经济的命运，紧紧掌握在自己的手里！他们说得好：无产阶级革命派，真正的革命左派，看的是夺权，想的是夺权，干的还是夺权！这不是什么“个人野心”，而是为无产阶级夺权，为共产主义夺权，让伟大的毛泽东思想占领一切阵地！"},{"type":"paragraph","text":"翻天覆地的无产阶级革命造反派大联合展开夺权斗争的群众运动，是一场无产阶级和资产阶级的大决战。它必然带来阶级矛盾的集中爆发，带来一场空前规模的急风暴雨。这场大决战的现实，已经为我们展现了极其激动人心的场面。"},{"type":"paragraph","text":"你看！广大无产阶级革命造反派，已经冲破重重障碍，紧急行动起来，集合于毛泽东思想的伟大红旗之下，团结起亿万革命群众，发扬了高度自觉的无产阶级革命造反精神，敢于斗争，敢于夺权，冲锋陷阵，所向披靡，正在从胜利走向胜利。"},{"type":"paragraph","text":"你看！那一小撮反革命修正主义分子，对革命造反派大联合，夺走资本主义道路当权派的权、夺坚持资产阶级反动路线的顽固分子的权，怕得要死，恨得要命。因为夺权就夺去了他们的命根子，夺去了他们赖以“秋后算账”的最后法宝。他们惊惶失措，暴跳如雷，歇斯底里大发作。然而，一切反革命的垂死挣扎都无济于事，他们正在迅速被革命造反派大联合展开夺权斗争的群众运动的洪流所淹没。"},{"type":"paragraph","text":"这对于每一个无产阶级革命者来说，真是从未有过的痛快啊！"},{"type":"paragraph","text":"无产阶级革命造反派要展开夺权斗争，就必须大联合。没有大联合，夺走资本主义道路当权派的权就只是一句空话。一百多年前，马克思、恩格斯在《共产党宣言》中，第一次提出了“全世界无产者，联合起来！”的战斗口号，为无产阶级的第一次夺权擂响了战鼓，使旧世界的资产者吓得发抖。四十几年前，我们的伟大领袖毛主席提出了“民众的大联合”的伟大号召，吹响了我国新民主主义革命的进军号。今天，在我国文化大革命的新形势下，亿万革命群众正在毛主席的新伟大号召下，在“无产阶级革命派大联合，夺走资本主义道路当权派的权”的伟大口号下动员起来，投入战斗。这就预示着党内一小撮走资本主义道路的当权派和坚持资产阶级反动路线的顽固分子的末日，已经来到了。"},{"type":"paragraph","text":"“问苍茫大地，谁主沉浮？”“我们！我们！我们！！我们广大的工农兵群众是新世界当然的主人！”这就是广大革命群众响亮的声音！"},{"type":"paragraph","text":"革命的干部、革命的学生，一定要同工人运动、农民运动相结合，使社会上的斗争同本单位的斗争结合起来，内外联合，两面夹攻，彻底打碎旧的剥削制度、修正主义制度、官僚主义机构。广大工农群众和革命知识分子、革命干部，一起当家作主，建立崭新的无产阶级新秩序。"},{"type":"paragraph","text":"大联合，要在夺权的斗争中形成。大联合，必须旗帜鲜明。它是革命造反派的大联合，而不是乱七八糟的大杂烩。那些折中主义、改良主义的东西，那些小团体主义、宗派主义、分散主义、分裂主义的东西，必须统统打倒。"},{"type":"paragraph","text":"在无产阶级革命派大联合，夺走资本主义道路当权派的权的高潮中，极少数资产阶级顽固分子总会乔装打扮一番，削尖了脑袋，力图钻进革命派大联合的队伍中来。他们虚伪地打着“革命造反”旗号，向无产阶级夺权。他们惯于制造谣言，挑拨离间，颠倒黑白，混淆是非，煽动群众，转移斗争目标，把攻击的矛头，指向革命派，指向无产阶级专政，指向无产阶级的革命司令部。我们必须遵循毛主席的教导，提高警惕，擦亮眼睛，分清敌我，辩明大是大非，戳穿他们的一切阴谋诡计，坚决回击！"},{"type":"paragraph","text":"阶级敌人空前强烈的抵抗是必然的。一小撮党内走资本主义道路的当权派，极少数坚持资产阶级反动路线的顽固分子，正在和社会上的一切牛鬼蛇神，勾结起来，拼凑起反革命的联合，来对抗革命的大联合。但是，无论遇到多少曲折和反复，我们上有毛主席的英明领导，下有用毛泽东思想武装起来的亿万革命群众，我们必将战胜一切困难，把那些在背后煽阴风、点邪火，矛头指向无产阶级专政、指向无产阶级革命司令部的家伙，一个个地揭露出来，把他们打倒。革命的大联合终将战胜反革命的小联合。"},{"type":"paragraph","text":"“多少事，从来急；天地转，光阴迫。一万年太久，只争朝夕。”革命的战友们，让我们在以毛主席为代表的无产阶级革命路线的指引下，动员起来，实现大联合，向党内一小撮走资本主义道路的当权派和坚持资产阶级反动路线的顽固分子，展开全国全面的夺权斗争，胜利完成毛主席交给我们的伟大历史任务。"},{"type":"paragraph","text":"敌人不投降，就叫它灭亡！"},{"type":"paragraph","text":"无产阶级革命派大联合，夺走资本主义道路当权派的权！"},{"type":"paragraph","text":"周恩来、陈伯达、康生、江青陪同阿尔巴尼亚来宾参加外地来京群众大会。周恩来讲话：当前主要战斗任务是无产阶级革命派联合起来，从党内一小撮走资派手里夺权。各地走资派大搞经济主义：发钱、发粮票、发车票，鼓动人们来北京，把矛盾上交。周总结了上海夺权经验：(1)必须实现革命派大联合；(2)接管必须以本单位为主体；(3)在革命群众监督下，能够工作的人都应照常工作。他动员大家回去闹革命。对军队不能夺权。对“中国红旗军”、“湖南纠察队”、“联合行动委员会”、“西安红色恐怖队”、“工农兵红色政权保卫军”等反动组织，必须镇压。(《传信录432》)"},{"type":"paragraph","text":"周恩来在全国各地来京造反派代表会上指出：有些单位不能采夺权的形式，如军队、战备工作部门等。"},{"type":"paragraph","text":"张春桥在上海说：无产阶级文化大革命自始至终就是夺权，从基层到中央，党权、政权、财权、文权以及其他权。我们对所有的权都要夺。"},{"type":"paragraph","text":"受造反派毒打，煤炭工业部部长张霖之惨死。遗体上有三十二处伤痕，颈部有多处血洞。"},{"type":"paragraph","text":"“调查康生问题联络委员会”发出公告。陈伯达在本日凌晨两次打电话给蒯大富，命清华“井冈山”退出该组织。并命对校内贴出攻击康的大字报进行反击。(《传信录433、434》)"},{"type":"paragraph","text":"“上三司”进占康平路，宣布夺上海市委的权。张春桥指使王洪文率工总司威逼撤去，上海第二次夺权迅速破产。"},{"type":"paragraph","text":"山东省青岛市在王效禹领导下，进行夺权，以“青岛市革命造反委员会”名义发布第一号通令。"},{"type":"paragraph","text":"青岛市革命造反委员会第一号通令(一九六七年一月二十二日)"},{"type":"paragraph","text":"青岛市革命造反委员会于一九六七年一月二十日宣告成立，夺取了青岛市委、青岛市人民委员会全部权力。为了巩固无产阶级专政，充分发扬无产阶级专政下的大民主，彻底粉碎资产阶级反动路线的新反扑，把无产阶级文化大革命进行到底，特作如下通令："},{"type":"paragraph","text":"一、前青岛市委、青岛市人民委员会的一切权力，自即日起完全归青岛市革命造反委员会所有。前青岛市委、青岛市人民委员会予以封闭，停止其一切活动。"},{"type":"paragraph","text":"二、前青岛市委书记、常委、委员、各部委负责人，前青岛市市长、副市长、各局局长、处长，自本通令公布日起三日内，向本委员会报到，听侯处理。其他一般工作人员坚守岗位，听从指挥，照常工作。"},{"type":"paragraph","text":"三、前青岛市委、青岛市人民委员会自一九六六年五月十六日开展无产阶级文化大革命以来，所发出的一切指示、文件(转发中共中央、国务院、中央军委和中央文革小组的文件除外)，自即日起一律作废。"},{"type":"paragraph","text":"四、一切权力归革命造反派。青岛市各级党政机关、工业、基本建设、交通运输、文化教育、医疗卫生等单位和各群众团体的权力，凡被走资本主义道路的当权派和坚持资产阶级反动路线的顽固分子所把持的，一律由革命造反派和革命群众夺权。执行资产阶级反动路线的各级领导人员和受资产阶级反动路线蒙蔽而尚未改正错误的人，无权夺权。"},{"type":"paragraph","text":"五、加强无产阶级专政，坚决贯彻执行中共中央、国务院关于在无产阶级文化大革命中加强公安工作的若干规定。号召全市革命造反组织和革命群众，积极协助监督执行，对有破坏无产阶级文化大革命，破坏革命秩序，破坏无产阶级专政的现行反革命分子，坚决依法予以惩办。"},{"type":"paragraph","text":"六、号召全市革命工人、革命农民、革命学生、革命知识分子和革命干部，必须坚决贯彻执行毛主席提出的“抓革命，促生产”的指示，积极参加无产阶级文化大革命，同时又要坚守生产岗位，成为“抓革命，促生产”的模范。坚决贯彻执行中共中央关于反对经济主义的通知，坚持无产阶级专政，坚持社会主义大方向。彻底摧垮资产阶级反动路线的新反扑。"},{"type":"paragraph","text":"七、由于山东省、山东省人民委员会，不折不扣地执行和顽固坚持资产阶级反动路线，本委员会郑重宣告：对山东省委、山东省人民委员会所发出的一切有关无产阶级文化大革命的指示，拒绝执行。并呼吁全省革命造反派联合起来，把省委、省人民委员会内部一小撮走资本主义道路的当权派和坚持资产阶级反动路线的顽固分子所把持的权力，坚决夺回到无产阶级革命造反派手中来！"},{"type":"paragraph","text":"江苏发生夺权事件。"},{"type":"paragraph","text":"以中山大学“红旗”为主的“广东省革命造反联合委员会”在广东夺权，省委在他们的监督下继续处理日常工作。"},{"type":"paragraph","text":"“1·22夺权成为一个秘密夺权。两个学校组织，一个机关组织，一个工人组织，一个珠影，四个外地组织，共九个组织。夺权成了谈判，把赵(紫阳)等叫到中大，要印给印，这是不可仿效的。夺了权，掌不了权，瘫痪了，所以中央决定实行军管。”(周恩来：4·18在广州的讲话)1月22日、23日"},{"type":"paragraph","text":"周恩来、陈伯达、康生、江青等与首都院校师生连续两次举行座谈会。江青表示，对蒯大富的清华“井冈山”与党校“红战团”调查康生材料感到震惊。我们是共过患难的，现在联合不起来，她要求学生与工农结合。陈伯达指责小团体主义、宗派主义、个人风头主义。你夺权，我也夺，夺来夺去，形成内部斗争。(《传信录435、436、437》)1月23日"},{"type":"paragraph","text":"根据毛泽东的指示，中共中央、国务院、中央军委、中央文革小组作出《关于人民解放军坚决支持革命左派群众的决定》。从此，军队开始正式介入地方。"},{"type":"paragraph","text":"关于人民解放军坚决支持革命左派群众的决定"},{"type":"paragraph","text":"中发(67)27号各中央局，各大军区，各省、市、自治区党委、人委，并转各级党委、人委、军区、军分区："},{"type":"paragraph","text":"在毛主席的领导下，无产阶级文化大革命开始了一个新阶段。这个新阶段的主要特点，就是无产阶级革命派大联合，向党内一小撮走资本主义道路的当权派和坚持资产阶级反动路线的顽固分子手里夺权。这场夺权斗争，是无产阶级对资产阶级及其在党内的代理人十七年来猖狂进攻的总反击。这是全国全面的阶级斗争，是一个阶级推翻一个阶级的大革命。"},{"type":"paragraph","text":"人民解放军是毛主席亲手缔造的无产阶级的革命军队，是无产阶级专政最重要的工具。在这场伟大的无产阶级向资产阶级的夺权斗争中，人民解放军必须坚决站在无产阶级革命派一边，坚决支持和援助无产阶级革命左派。"},{"type":"paragraph","text":"最近，毛主席指示：人民解放军应该支持左派广大群众。以后，凡有真正革命派要找军队支持、援助，都应当满足他们的要求。所谓“不介入”，是假的，早已介入了。问题不是介入不介入的问题，而是站在哪一边的问题，是支持革命派还是支持保守派甚至右派的问题。人民解放军应当积极支持革命左派。"},{"type":"paragraph","text":"我军全体指战员必须坚决执行毛主席的指示。"},{"type":"paragraph","text":"(一)以前关于军队不介入地方文化大革命以及其他违反上述精神的指示，一律作废。"},{"type":"paragraph","text":"(二)积极支持广大革命左派群众的夺权斗争。凡是真正的无产阶级左派要求军队去援助他们，军队都应当派出部队积极支持他们。"},{"type":"paragraph","text":"(三)坚决镇压反对无产阶级革命左派的反革命分子、反革命组织，如果他们动武，军队应当坚决还击。"},{"type":"paragraph","text":"(四)重申军队不得做一小撮党内走资本主义道路当权派和坚持资产阶级反动路线顽固分子防空洞的指示。"},{"type":"paragraph","text":"(五)在全军深入进行以毛主席为代表的无产阶级革命路线和以刘少奇、邓小平为代表的资产阶级反动路线斗争的教育。"},{"type":"paragraph","text":"这一指示要原原本本地传达到每个解放军战士。"},{"type":"paragraph","text":"中共中央"},{"type":"paragraph","text":"国务院"},{"type":"paragraph","text":"中央军委"},{"type":"paragraph","text":"中央文革小组"},{"type":"paragraph","text":"一九六七年一月二十三日"},{"type":"paragraph","text":"中央发布关于广播电台的补充指示。"},{"type":"paragraph","text":"关于广播电台的补充指示"},{"type":"paragraph","text":"中发(67)29号各中央局，各大军区，各省、市、自治区党委、人委，并转各级党委、人委，军区、军分区："},{"type":"paragraph","text":"在毛主席的领导下，当前无产阶级文化大革命开始了新阶段。无产阶级革命派正在联合起来，向党内一小撮走资本主义道路当权派和坚持资产阶级反动路线的顽固分子，开展群众性的夺权斗争。在这种新形势下，中共中央一九六七年一月十一日关于广播电台问题的通知，需要做如下的补充规定："},{"type":"paragraph","text":"(一)坚决支持各省、市的广播电台掌握在无产阶级革命派手里，成为各省、市无产阶级革命派大联合的喉舌。"},{"type":"paragraph","text":"(二)在无产阶级革命左派尚不能控制局面，要求人民解放军保护时，军队应当立即实行军事管制。在实行军事管制期间，军队应当坚决支持无产阶级革命派。"},{"type":"paragraph","text":"(三)实行军事管制是暂时的、过渡的措施。在无产阶级革命左派能够控制局面的时候，应当结束军事管制。"},{"type":"paragraph","text":"(四)在实行军事管制期间，除了转播中央人民广播电台的节目外，地方台可以自编一部分节目。这些节目必须是反映无产阶级革命造反派的声音，而不得反映走资本主义道路当权派的声音，不得反映资产阶级反动路线的声音。"},{"type":"paragraph","text":"中共中央"},{"type":"paragraph","text":"一九六七年一月二十三日"},{"type":"paragraph","text":"林彪就夺权问题说：“无论上层、中层、下层都要夺。有的早夺，有的迟夺。”“或者上面夺，或者下面夺，或者上下结合夺”。对于领导干部，“有的关起来，有的戴帽子，有的抄家”。“有些方式，如搞喷气式，对有些人就得用这个办法，如对彭、罗、陆、杨就需要。”"},{"type":"paragraph","text":"康生在人大会堂的座谈会上传达林彪的指示：“最最根本的问题是立场问题，是无产阶级立场问题。”"},{"type":"paragraph","text":"周恩来、陈伯达、康生、江青同体育界座谈。康生讲话：我同党校的反毛泽东思想做了十年的斗争。“红战团”造了我许多谣。周恩来也指责体校造反派与“红战团”联合炮打康生是上当了。你们应当去发表声明。(《传信录438》)"},{"type":"paragraph","text":"北京军区造反派公开提出打倒司令员杨勇。"},{"type":"paragraph","text":"七机部夺权。"},{"type":"paragraph","text":"青海军区副司令员赵永夫宣布夺了刘贤权的权，组成联合指挥部，独揽青海党政大权。"},{"type":"paragraph","text":"《人民日报》发表北京市农村来信《打退年终分配中的经济主义妖风》。编者按中说：北京市郊区一小撮坏家伙破坏文化大革命，“他们打着‘关心群众生活’的招牌，蒙蔽一部分群众，分光公共积累，分光储备粮，甚至种籽也分了”。按语提出“希望那些一时受了蒙蔽的人，......不要为了个人的眼前利益，忘了集体利益，忘了政治，忘了阶级斗争，忘了把无产阶级文化大革命进行到底！”"},{"type":"paragraph","text":"哈尔滨荣复军头子以招待看文艺节目为名，将其成员及群众集中到青年宫。节目完后，随即纠集三百余人，手持铁棒、木棍、钢丝鞭、匕首等凶器，袭击了“红色造反团”。荣复军随即遭到哈尔滨驻军镇压。"}],"authors":["周良霄","顾菊英"],"dates":[{"year":2008}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":75,"page_end":86,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"康生","type":"人物"},{"name":"江青","type":"人物"},{"name":"陈伯达","type":"人物"},{"name":"陶铸","type":"人物"},{"name":"邓小平","type":"人物"},{"name":"姚文元","type":"人物"},{"name":"贺龙","type":"人物"},{"name":"叶剑英","type":"人物"},{"name":"王力","type":"人物"},{"name":"张春桥","type":"人物"},{"name":"李富春","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"叶群","type":"人物"},{"name":"王效禹","type":"人物"},{"name":"彭真","type":"人物"},{"name":"徐向前","type":"人物"},{"name":"中央文革","type":"人物"},{"name":"浙江省红色暴动委员会（红暴）","type":"人物"},{"name":"红卫兵上海市大专院校革命委员会（红革会）","type":"人物"},{"name":"上海市工人革命造反总司令部（工总司）","type":"人物"},{"name":"山东文革","type":"人物"},{"name":"青海文革","type":"人物"},{"name":"湖南文革","type":"人物"},{"name":"安徽文革","type":"人物"},{"name":"广东文革","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"天津文革","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"武斗","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"军队支左","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4844de23be"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
