<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"新疆伊宁市阿訇思想动态","authors":[],"dates":[{"year":1953,"month":5,"day":21}],"is_range_date":false,"parts":[{"text":"新疆伊宁市阿訇思想动态","type":"title"},{"text":"【新疆分社讯】伊宁市现有礼拜寺一百三十一座：计维吾尔族寺一百一十九座，回族寺六座，乌兹别克族、塔塔尔族寺各三座。该市八万八千各族市民中，在平日经常有四千七百人到礼拜寺去做“乃玛子”礼拜，“主玛日”(礼拜日，为基督教礼拜五)到礼拜寺做“乃玛子”的有一万人左右。全市共有各族宗教职业者三百零八人：计阿訇三十三人，海里发七人，依麻木九十七人，买僧九十三人，其他七十八人；其中维吾尔族二百五十八人，回族十人，乌兹别克族三十四人，塔塔尔族五人，柯尔克兹族一人。","type":"paragraph"},{"text":"新疆省人民政府成立后，原来三区革命政权时的宗教厅无形中取消。(原宗教厅除征收“乌守尔”、“札克提”(皆为宗教税；“乌守尔”是每年征收农民粮食收获量的百分之十，“札克提”是每年征收牧民牲畜总额的百分之二点五和征收工商业户营利总额的百分之二点五)外，还设法庭，由阿訇按古兰经判案。人民政府将“乌守尔”“札克提”拨归新疆人民民主同盟。从去年起，新疆人民民主同盟已停止征收了。","type":"paragraph"},{"text":"新疆分局去年召开第二次党代表会议前，在镇压反革命和减租反霸运动中，伊宁市曾逮捕了主要阿訇和依麻木等二十二人(当时是按反革命和破坏减租反霸现行犯捕的)。第二次党代表会议期间该市将逮捕的二十二人全部释放。这些阿訇在伊宁有相当威望。如伊宁最大的阿訇维吾尔族八十三岁的阿不都木塔阿里(海里发，解放前是宗教厅厅长)，手下有三千修道士。被释放后，就有许多人去看他，还有给他送牛送羊的。","type":"paragraph"},{"text":"这些阿訇被释放后，曾沉默了一个时期，观看人民政府对他们的态度。从去年十二月起，他们就直接或间接提出了一些要求。主要的要求是：(一)成立宗教法庭，他们想掌握司法权，每个阿訇都成为法官，都可以判案。现在有的阿訇已经悄悄地判起案来了。(二)要求成立宗教厅，重新征收“乌守尔”、“扎克提”。近来有的阿訇造谣说：“要成立伊斯兰教协会了，政府要给我们成立宗教厅了。”他们并活动别的阿訇一块提。(三)要求伊犁专署把过去宗教厅的东西启封，发给他们。(四)要求把星期天的假改到星期五(即伊斯兰教的主玛日)。(五)要求把学校的经文课由每星期的二小时增加到四小时(伊宁小学校里有的有经文课，有的没有)。这些阿訇主要目的是想恢复他们个人过去在宗教上、政治、经济上的权势。现在活动最厉害的是一些不大不小的阿訇。","type":"paragraph"},{"text":" (关君放)","type":"paragraph"}],"comments":[],"origin":"1953年5月21日新华通讯社编《内部参考》。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3765364bf0"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
