script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"上海纺织工学院广大教职员工精神振奋斗志昂扬愤怒批判“四人帮”炮制的“两个估计”","authors":[],"dates":[{"year":1977,"month":11,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　上海纺织工学院广大教职员工精神振奋，斗志昂扬，以班组为单位，认真阅读和讨论教育部大批判组的重要文章《教育战线的一场大论战》。院党委召开了部分教师座谈会，批判“四人帮”炮制的“两个估计”。"},{"type":"paragraph","text":"在打好揭批“四人帮”第三战役开始的时候，教育部大批判组文章的发表，在该院引起了热烈的反响。广大教职员工一致反映:这篇文章说出了我们的心里话。院党委一位副书记说:“教育部大批判组的文章是一篇批判‘四人帮’的战斗檄文，大长了我们的志气。‘两个估计’是套在教育战线广大干部和教师头上的精神枷锁。在‘四人帮’的压制下，广大干部和知识分子的革命积极性受到很大压抑，党的教育事业受到严重破坏。这篇文章为广大教师和知识分子洗耻昭雪，为搞好教育革命扫清了道路。”机械系一位教授激动地说:“华主席十分关心教育战线。在华主席的亲切关怀下，这篇文章发表了，讲出了我们的心里话。‘四人帮’横行的时候，我们头上戴‘帽子’，脚上穿‘鞋子’，身上挨棍子。现在，可以解脱精神上的束缚，理直气壮地搞教育了。”"},{"type":"paragraph","text":"这篇重要文章传达了毛主席在一九七一年的重要指示，使全院教职员工受到莫大的鼓舞。大家激动地说:被“四人帮”封锁了六年之久的毛主席重要指示，终于和全党全国人民见面了。毛主席的重要指示和“四人帮”的“两个估计”是针锋相对的。毛主席的估计非常全面、非常正确，毛主席肯定了十七年教育战线的成绩，这对“四人帮”是一个有力的批判。机械系电气自动化教研组一位教师说:“读了教育部大批判组的重要文章，我们才知道毛主席对十七年的估计早有指示。我们一定要用毛主席的这些光辉指示作武器，深入揭批‘四人帮’炮制的反革命的‘两个估计’。”纺化系化纤教研组一位教师说:“毛主席的重要指示说的多么透彻!我越学越感到，文化大革命前十七年，教育战线是毛主席的革命路线占主导地位。伟大领袖毛主席一贯十分关怀教育战线。‘四人帮’炮制‘两个估计’，就是要否定毛主席的革命路线，否定教育战线所取得的成绩，达到他们篡党夺权的目的。”"},{"type":"paragraph","text":"在学习讨论中，广大干部、教师回顾建国二十八年来，我国教育战线的巨大变化，回忆自己在毛泽东思想哺育下成长的难忘历程，狠批“四人帮”炮制的“两个估计”。物理教研组一位教师说:“我是十七年中培养出来的大学生。但是，‘四人帮’却给我戴上了资产阶级知识分子的帽子。我感到很奇怪，他们为啥把我们骂得狗血喷头。‘四人帮’的‘两个估计’是套在我们头上的精神枷锁。我们为学生上课，也被说成是在放毒。这样，我们还有什么积极性呢?教育部的这篇文章是在以华主席为首的党中央直接关怀下发表的，把压在我们身上多年的石头搬掉了。这篇文章为教育战线广大干部和群众讲了话。”纺化系一位教授说:“我是解放前两年回国的。解放后，我在党的领导下经过历次政治运动，有了一定的进步。但是，思想上还是有资产阶级的东西需要不断改造。‘四人帮’炮制‘两个估计’，把我们说得一无是处，这不单单是对着旧社会过来的知识分子，而是对着广大知识分子，‘四人帮’不仅否定教育战线的成绩，而且把矛头指向毛主席、党中央，指向周总理。‘四人帮’炮制‘两个估计’，这是推行他们的反革命政治纲领的需要。我们要紧跟英明领袖华主席，把对‘四人帮’的仇恨化为动力，打好揭批‘四人帮’的第三战役，搞好教育革命，为实现四个现代化而奋斗。”"},{"type":"paragraph","text":"目前，该院党总支以上的干部正在进一步认真学习毛主席和华主席关于教育工作的重要指示，讨论教育部的文章，联系实际，大摆“两个估计”在该院的流毒和影响，决心打好第三战役，把揭批“四人帮”的斗争推向前进，甩开膀子搞好教育革命。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"教育革命","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d07a0eb139"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
