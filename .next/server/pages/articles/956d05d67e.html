<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"方向明  斗志昂  北京市一七一中学深入开展反击右倾翻案风的斗争","authors":["本报记者"],"dates":[{"year":1976,"month":3,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"方向明  斗志昂"},{"type":"paragraph","text":"北京市一七一中学深入开展反击右倾翻案风的斗争"},{"type":"paragraph","text":"前天，《人民日报》社论《翻案不得人心》传达了毛主席的重要指示。北京市一七一中学革命师生员工认真学习，热烈讨论，受到了极大的鼓舞。他们激情满怀地说：“正当反击右倾翻案风的伟大斗争在全国胜利发展的大好形势下，毛主席的重要指示发表了，对我们是最大的支持和鼓舞。我们坚决拥护和执行毛主席的重要指示，把反击右倾翻案风的斗争进行到底！”"},{"type":"paragraph","text":"去年夏季前后，教育界右倾翻案风的奇谈怪论也吹进了一七一中学。什么教育质量降低啦，拖了四个现代化的后腿啦，现在的主要问题是学生不读书啦等等，一时在学校里都有传闻。广大革命师生认真学习无产阶级专政理论，感到风向不对，于是勇敢地站出来，进行针锋相对的斗争。原初三（八）班徐静宜等三位红卫兵小将，把这些奇谈怪论跟毛主席有关教育革命的指示，一一作了对照，认识到这股风是冲着毛主席的革命路线刮来的，是要把教育革命的成果刮掉。她们说：这是一场两个阶级、两条路线的大搏斗，是关系到教育战线的方向、道路的大是大非问题，一定要搞清楚。她们抱着坚决捍卫毛主席无产阶级教育路线的决心，在去年十一月二十五日贴出了题为《究竟走什么路？》的大字报，勇敢地向教育界不肯改悔的走资派宣战。这是北京市东城区各中学，向右倾翻案风打出的第一炮。这张大字报贴出后，马上得到学校领导和革命师生的支持，革命大批判迅速在全校开展起来。今天，大家认真学习了毛主席的重要指示，斗争方向更明确了，劲头也更足了。"},{"type":"paragraph","text":"在学习讨论会上，一七一中学的革命师生们说：毛主席关于“翻案不得人心”的指示，深刻揭露了党内不肯改悔的走资派逆历史潮流而动的反动本质，充分表达了全国人民反对复辟倒退、坚持继续革命的强烈愿望。我们对此深有体会。"},{"type":"paragraph","text":"这个中学原名“红旗”中学，是一九五八年大跃进中创办的半工半读学校。起初，学校办工厂，学生半工半读；教师又教学，又劳动。整个学校生气勃勃，欣欣向荣。一九六○年以后，刘少奇一伙大翻教育革命的案，疯狂攻击教学改革。在这股妖风影响下，“红旗”中学这面红旗被砍倒，校办工厂的工人被赶出校门，学生也不半工半读了，教师被剥夺了劳动锻炼的机会。学校那种生动活泼的战斗气氛被吹得无影无踪。无产阶级文化大革命摧毁了刘少奇、林彪两个资产阶级司令部，“红旗”中学获得了新生，红旗又飘扬起来了。这个学校的革命师生受过搞修正主义的大人物的压制，经过无产阶级文化大革命才扬眉吐气。他们坚定地表示，党内不肯改悔的走资派，想继续搞修正主义，翻文化大革命的案，我们坚决不答应。"},{"type":"paragraph","text":"反击右倾翻案风的斗争，是无产阶级文化大革命的继续和深入。一七一中学革命师生发扬“要把无产阶级文化大革命进行到底”的革命精神，狠批那个不肯改悔的走资派的修正主义路线。在短短几个月时间内，就贴出四千多张大字报，开了八百多次批判会，发言者达三千五百多人次。许多师生寒假期间不休息，办学习班，开批判会，调查研究，总结经验，用教育革命的丰硕成果，回击右倾翻案风。"},{"type":"paragraph","text":"当前，一七一中学反击右倾翻案风的斗争形势一派大好，毛主席的革命教育路线更加深入人心，在革命大批判的基础上掀起了教育革命的高潮。广大革命师生满怀信心地说：“教育革命的车轮是不能倒转的。我们一定坚定地沿着毛主席的革命路线前进，让那些搞修正主义的大人物，在我们的胜利面前向隅而泣吧！”"},{"type":"paragraph","text":"本报记者"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"教育革命","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"956d05d67e"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
