script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反对资产阶级破坏共同纲领的不法行为","authors":["赵朴初"],"dates":[{"year":1952,"month":2,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"中国民主促进会上海分会理事　赵朴初"},{"type":"paragraph","text":"自从毛主席号召“增加生产、厉行节约以支持中国人民志愿军是当前中国人民的中心任务”后，迅速得到全国人民热烈的拥护、和增产节约紧密结合，反贪污、反浪费和反官僚主义的运动，反行贿、反偷税漏税、反盗骗国家资财、反偷工减料和反盗窃国家经济情报的运动已在全国范围内轰轰烈烈地展开；我们认为这一伟大的爱国运动，不仅有其经济上的意义，而且具有重大的政治意义。"},{"type":"paragraph","text":"我们的政府是历史上空前廉洁的、有效能的政府，但我们也不否认解放以来由于资产阶级的猖狂进攻，也有少数干部受到资产阶级思想的侵蚀而开始蜕化、只有在毛主席、中国共产党领导下的人民政府，才敢于正视和揭露这些事实，而及时予以制止和纠正，并将这一工作开展为大规模的群众运动、我们相信通过这一运动，一定能达到纯洁革命队伍、转移社会风气的目的，结果使人民政府在广大群众中的威信更加巩固、更加提高。"},{"type":"paragraph","text":"我们丝毫不怀疑资产阶级在我们人民民主国家中是四个朋友之一，有其合法的地位，但是我们也应当承认并指出资产阶级有其黑暗腐朽的一面；解放以来做出了种种违法乱纪的行为，违反了人民利益，破坏了他们自己所曾经参加制订的人民政协共同纲领、我们相信只有通过这一伟大的三反运动和五反运动，及时揭露资产阶级对人民进行卑鄙的猖狂的进攻事实，惩治少数，挽救和教育多数，从团结出发，经过斗争，达到团结目的，这结果不是削弱人民民主统一战线，而是加强人民民主统一战线。"},{"type":"paragraph","text":"上海市是帝国主义和反动派所曾经长期统治过的地方，曾是一切罪恶的渊薮，资产阶级间所存在的坏思想坏习惯坏作风，也最为严重，在上海开展三反和五反运动，将更是一场系统激烈的斗争、现在运动的开展已经进入了最重要的阶段，我们中国民主促进会上海市分会的全体成员，坚决在毛主席和中国共产党的领导下和广大人民站在一起，反对资产阶级破坏共同纲领的不法行为、我们要尽一切力量为拥护共同纲领，拥护工人阶级的领导，而对资产阶级的猖狂进攻予以坚决的、有效的、彻底的打击。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e88b8ceb74"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
