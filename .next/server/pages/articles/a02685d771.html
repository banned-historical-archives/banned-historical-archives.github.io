script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"五十一服装社狠抓服装式样问题上的阶级斗争积极批判和抵制资产阶级歪风邪气职工们主动向顾客进行宣传教育，坚决反对制作奇装异服，受到了广大工农群众的好评","authors":[],"dates":[{"year":1971,"month":10,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　本市五十一服装社党支部组织职工和营业员，认真学习毛主席关于阶级斗争的学说，以店堂橱窗作战场，狠批叛徒、内奸、工贼刘少奇一类政治骗子散布的“阶级斗争熄灭论”，在狠抓自身思想革命化的同时，向顾客宣传毛泽东思想，帮助顾客在衣着服装问题上树立无产阶级审美观，批判资产阶级审美观，抵制资产阶级歪风邪气。"},{"type":"paragraph","text":"今年夏季以来，在社会上出现了一些资产阶级的奇装异服，这是意识形态领域里的阶级斗争新动向。但有些同志对此认识不足，认为只要自己不做不穿就行了，因此看到这些现象也不抵制，不斗争。该社党支部及时组织大家学习毛主席关于“要抓意识形态领域里的阶级斗争”等教导，狠批“阶级斗争熄灭论”。"},{"type":"paragraph","text":"通过学习和批判，使大家认识到，“无产阶级要按照自己的世界观改造世界，资产阶级也要按照自己的世界观改造世界。在这一方面，社会主义和资本主义之间谁胜谁负的问题还没有真正解决。”因此，在服装式样问题上必然存在着两个阶级、两种世界观的尖锐斗争。无产阶级要占领这个阵地，资产阶级也要占领这个阵地。过去叛徒、内奸、工贼刘少奇及其在上海的代理人陈丕显、曹荻秋之流，推行反革命修正主义路线，借口“发扬特色”，“增加品种”，“美化人民生活”，大搞奇装异服，用资产阶级一套腐朽糜烂的生活方式腐蚀、毒害人们的灵魂，妄图复辟资本主义。文化大革命中，批判了反革命修正主义路线，社会主义新风尚大大发扬，广大革命人民更加喜爱反映无产阶级精神面貌的朴素大方、色调明朗、经济实惠、穿着舒适的服装。但是，阶级斗争是不以人们意志为转移的。一小撮阶级敌人常常从阴暗的角落里刮起一阵阵奇装异服的妖风，妄图以资产阶级歪风邪气来污染社会主义的新鲜空气，毒害人们的灵魂。一些有严重资产阶级思想的人，也自觉不自觉地跟着这股妖风跑，他们以资产阶级审美观来看待服装的美与丑问题，他们以奇特为美，以奢侈为荣，追求一些反映资产阶级生活方式的奇装异服。这是阶级斗争的新形式。该社职工认清了在服装问题上存在着的这种尖锐的阶级斗争，自觉地批判了那种“与我无关”的思想，认真检查自己头脑里的资产阶级审美观。他们发现，由于有的营业员阶级斗争观念不强，曾经为要制作奇装异服的开人过绿灯。个别职工本身也有追求奇装异服的情况。针对这些问题，党支部又进一步组织职工联系实际开展革命大批判。许多营业员表示:“我们要肃清‘阶级斗争熄灭论’的流毒，既要做为人民服务的营业员，也要做灭资兴无的战斗员，做毛泽东思想的宣传员。”他们不仅狠抓自身思想革命化，而且通过革命大批判专栏等形式，向顾客宣传毛泽东思想，对要求做奇装异服的人进行耐心的宣传教育，发扬社会主义新风尚，抵制资产阶级歪风邪气，得到了广大工农群众的好评。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a02685d771"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
