" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"复县人民法院对许进的判决书","authors":[],"dates":[{"year":1958,"month":10,"day":10}],"is_range_date":false,"parts":[{"text":"复县人民法院对许进的判决书","type":"title"},{"text":"[许进，时任第一机械工业部瓦房店轴承厂厂长秘书。1979年4月14日，瓦轴厂党委复查结论，确定“右派”系错划，予以改正。6月，复县人民法院下达新判决书：撤销1958年的判决，宣告无罪。]","type":"subtitle"},{"text":"查被告许进，男，三十岁。汉族，捕前住……（略）","type":"paragraph"},{"text":"被告许进因坏分子一案，已经本院审理完结。现查明：","type":"paragraph"},{"text":"查被告许进系反动官僚家庭子弟，建国前混入我人民解放（缺“军”字），在部队搞“小集团”，并说：“朋友比组织还温暖……”并宣扬胡风、阿垄反革命集团的词。同志们阅读共产党员书，其说是浪费时间，致使当时创作文艺小组政治空气极端薄弱。后由部队转业到工厂时，其仍坚持反动立场，曾在手册上写：对工人污蔑一些反动词句，并造谣说：“元宵也是由于统购统销的政策，根本绝迹……”贯彻婚姻法后，其造谣：“有多少人结而婚、离而婚”等反动言论。而污蔑厂内“领导不民主，强调个人负责发展到长短差不多，一切由上级指定，群众讨论通过只是走形式，这是主观主义领导的产物……”而污辱斯大林是“独断专行”，对肃反表示极为不满，认为肃反蹂躏人权，欲加之罪何患何词，等反动经调。其赞仝与宣扬铁托、卡德尔的所谓演说，并给很高估价。","type":"paragraph"},{"text":"查被告许进系官僚家庭出身，一贯坚持反动立场，在日常手册记载和言语上散布一些反动言论，在正风中猖狂向党进次，企图（此处缺字）翻人民民主政权，被划为右派，并诬蔑我党的各项政策，已构成犯罪，故依法判决如下：","type":"paragraph"},{"text":"判处被告许进有期徒刑伍年。","type":"paragraph"},{"text":"如不服本判决，可于接到判决的第二天起五日内向本院提提出诉状及副本，上诉于地区中级人民法院。","type":"paragraph"},{"text":"本件与原本核对无异。","type":"paragraph"},{"text":" 复县人民法院1958年10月10日","type":"paragraph"},{"text":" 来源：《往事微痕》第33期 许进专集，2009年 10月25日。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a22bdcddff"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
