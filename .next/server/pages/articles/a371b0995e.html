script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"抓住修正主义的思想政治路线这个要害深入批邓  宁河县委领导成员带头批《论总纲》","authors":[],"dates":[{"year":1976,"month":8,"day":31}],"is_range_date":false,"parts":[{"type":"paragraph","text":"抓住修正主义的思想政治路线这个要害深入批邓"},{"type":"paragraph","text":"宁河县委领导成员带头批《论总纲》"},{"type":"paragraph","text":"本报讯　中共天津市宁河县委领导成员站在批邓斗争的前列，带头学习毛主席的一系列重要指示，抓住修正主义的思想政治路线这个要害，批判邓小平授意炮制的大毒草《论总纲》。"},{"type":"paragraph","text":"宁河县同丰南县相连，这次地震中遭到损失，抗震救灾任务很重。宁河县委认为，要把抗震救灾工作做好，必须切实把阶级斗争这个纲抓起来，迅速掀起一个深入学习、深入批邓的新高潮，用批邓来推动抗震救灾工作。县委领导干部雷厉风行，带头学，带头批，抓住《论总纲》的要害，深入分析、批判。"},{"type":"paragraph","text":"批判《论总纲》否定阶级斗争为纲，鼓吹"},{"type":"paragraph","text":"“三项指示为纲”。宁河县委领导成员在大批判中指出，《论总纲》打着执行毛主席指示的幌子，实际上是歪曲和反对毛主席的指示。邓小平抛出“三项指示为纲”的修正主义纲领，目的在于否定以阶级斗争为纲，否定党的基本纲领和基本路线，贩卖阶级斗争熄灭论和唯生产力论，妄图复辟资本主义。我们要同这个修正主义纲领对着干。地震发生后，宁河县委鲜明地提出，抗震救灾要以阶级斗争为纲，深入批邓，密切注意阶级斗争的新动向，狠狠打击阶级敌人的破坏活动。全县抗震救灾工作取得很大成绩。"},{"type":"paragraph","text":"批判《论总纲》否定无产阶级文化大革命中涌现出来的社会主义新生事物的罪行。《论总纲》把文化大革命以来的全国大好形势描绘得漆黑一团，这也要“整顿”，那也要“整顿”，实际上是要整掉文化大革命的伟大成果，整掉社会主义新生事物。宁河县委领导成员联系当前抗震救灾的实际，热情歌颂社会主义新生事物，深入批判《论总纲》。他们指出：社会主义新生事物在抗震救灾中作用显著，证明具有强大的生命力。如这个县的各级三结合领导班子在抗震救灾中发挥了坚强的战斗堡垒作用，特别是青年干部，勇往直前，站在斗争的第一线，创造了许多动人的先进事迹。广大赤脚医生不怕疲劳，连续作战，在救护伤员的工作中做出了出色的成绩。铁的事实说明，社会主义新生事物代表了无产阶级和广大劳动人民的利益，它是不可战胜的。邓小平极力否定社会主义新生事物，是妄图搞翻案复辟。"},{"type":"paragraph","text":"批判《论总纲》中鼓吹的唯生产力论。县委用这个县的历史经验揭露了唯生产力论的反动实质。在三年国民经济暂时困难时期，这个县遭受了自然灾害。当时的县委受邓小平“白猫黑猫”论的影响，没有抓阶级斗争这个纲，没有坚持无产阶级政治挂帅，结果全县资本主义泛滥，农业生产受到很大损害。一九七五年，这个县又遭受了自然灾害，情况就大不相同。经过文化大革命和批林批孔锻炼的广大干部和群众，在县委领导下，坚持以阶级斗争为纲，战胜了自然灾害。在大灾之年，夺取了大丰收，全县粮食亩产第一次上了《纲要》。县委领导同志在大批判中说：只有用无产阶级政治统帅经济，社会主义经济才能发展；只有抓革命，才能促生产。"},{"type":"paragraph","text":"为了推动全县干部和群众一起批判《论总纲》，宁河县委举办了各级干部学习班和理论队伍集训班。全县迅速掀起了一个声势浩大的批邓热潮。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"批林批孔","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a371b0995e"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
