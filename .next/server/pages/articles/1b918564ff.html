script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反对垄断资本剥削　反对腐朽教育制度  意大利工人学生斗争浪潮不断高涨  各地上百万工人奋起罢工　许多地方学生罢课、示威游行、占领校舍","authors":[],"dates":[{"year":1969,"month":11,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反对垄断资本剥削　反对腐朽教育制度"},{"type":"paragraph","text":"意大利工人学生斗争浪潮不断高涨"},{"type":"paragraph","text":"各地上百万工人奋起罢工　许多地方学生罢课、示威游行、占领校舍"},{"type":"paragraph","text":"新华社十一日讯　罗马消息：意大利工人反对垄断资本的残酷剥削和意大利学生反对腐朽的资产阶级教育制度的斗争浪潮不断高涨，沉重地冲击着垄断资本集团的反动统治。"},{"type":"paragraph","text":"自从九月份以来不断高涨的意大利工人罢工斗争，是围绕着要求增加工资、缩短工时和抗议生活费用和房租上涨而展开的。据报道，一年来意大利食品费用上涨了百分之十到百分之二十三，房租上涨了百分之二十。十一月七日，从最北部的的里雅斯特到最南部的加拉布里亚，约有一百万人举行了罢工。在意大利汽车工业中心都灵，罢工的汽车工人举行了三次游行，再加上这个城市的交通工人的罢工，使整个城市陷于混乱和瘫痪状态。在罗马等地，也有许多工人举行罢工。在不少地方，罢工工人同前往镇压的警察进行了英勇搏斗。"},{"type":"paragraph","text":"十一月二日和九日，全国大部分城市的饭店工人连续两个星期日举行了二十四小时总罢工。"},{"type":"paragraph","text":"据报道，意大利工人不断高涨的罢工斗争，使意大利垄断资本家两个月来损失了三亿三千三百万英镑。九月份工业生产同去年同月相比，下降了百分之二点五。"},{"type":"paragraph","text":"在这同时，意大利学生为反对腐朽的资产阶级教育制度，为抗议对出身于工人阶级家庭的学生的歧视而展开的斗争，也日益高涨。"},{"type":"paragraph","text":"在第三大城市那不勒斯，六所职业学校的一万名罢课学生十一月七日举行示威游行，反对腐朽的资产阶级教育制度。示威的学生占领了火车站，封锁了那不勒斯—萨勒诺的汽车公路，并且同前去镇压的警察进行了顽强搏斗，有二十名学生被警察无理逮捕。十一月八日，三千多名学生在警察总局外面举行示威，要求释放被捕学生。"},{"type":"paragraph","text":"在意大利南部科森萨附近的圣乔瓦尼因菲奥雷，学生举行了总罢课。有二千名学生十一月八日举行了示威游行。同一天，在南部的康波巴索，三千名学生也举行了示威。"},{"type":"paragraph","text":"在意大利的第二大城市米兰，学生占领了两所职业学校、一所师范学校和天主教大学的大厅。"},{"type":"paragraph","text":"过去几天中，在萨萨里、恩纳、特拉巴尼、波德诺内和意大利的其他城市的学生，也采取了罢课、占领校舍和示威游行等行动，反对反动的教育制度。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1b918564ff"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
