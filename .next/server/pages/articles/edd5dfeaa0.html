" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中央军委关于军队院校、文艺团体、体工队等支左、支农、工业问题的通知","authors":[],"dates":[{"year":1967,"month":3,"day":10}],"is_range_date":false,"parts":[{"text":"中央军委关于军队院校、文艺团体、体工队等支左、支农、工业问题的通知","type":"title"},{"text":"各总部、军区、军种、兵种、院校：","type":"appellation"},{"text":"军队院校、文艺团体、体工队等单位革命群众组织外出串联人员，遵照军委规定返回本单位后，不少单位正开展整风学习，总结前一阶段斗争的经验，准备进行本单位的斗批改。有些单位的群众组织返回以后，没有切实执行军委命令，没有进行整风学习，不抓本单位的斗批改，而仍然热衷于搞大串联。有的外出人员迟迟不回，有的同地方群众组织搞串联，不通过当地驻军领导机关，擅自同地方群众组织一起去参加地方党政机关、企业、事业单位的夺权斗争。在与当地驻军发生分歧时，不尊重驻军领导机关的意见，一意孤行，甚至同地方群众组织结合起来去冲击当地驻军。这是无组织无纪律行为，是违反中央二月二十一日的通知和军委一月二十八日命令的，妨碍了我军支左工作和支农业支工业生产的进行。为此，特作如下规定：","type":"paragraph"},{"text":"一、军队院校、文艺团体、体工队等各革命群众组织，都要以两三周时间进行整风学习，学习文件，提高思想，总结经验，修正错误，尔后集中精力搞好本单位的斗批改。一律不再到外地串联，也不要同本地区外单位或地方组织搞串联。所有外出人员一律返回，地区性的和几个单位组成的联络站，一律撤销。地方群众组织，也不能到军队串联。","type":"paragraph"},{"text":"二、支左、支农、工业工作，是毛主席交给军队的光荣任务，是对人民解放军最大的信任和鼓励，一定要切实作好，努力完成。在这场尖锐复杂的阶级斗争中，必须加强领导，加强调查研究工作。各地区，各城市支左、支农、工业工作，一律由当地驻军最高领导机关统一领导、统一指挥、统一安排，院校、文艺团体、体工队等单位的支左、支农、工业工作，一定要服从当地驻军最高领导机关统一领导，不得各行其是。","type":"paragraph"},{"text":"三、军队院校、文艺团体、体工队等单位的干部，大多数是好的或者比较好的。凡是未经上级批准撤职或停职的干部，除应在群众帮助下，认真检查自己的缺点、错误，努力改正外，应该站出来做工作，把本单位的支左、支农、工业和行政管理工作管起来，各革命群众组织要帮助和支持他们领导好这几项工作。","type":"paragraph"}],"comments":[],"origin":"根据中共中央办公厅、国务院秘书厅文化革命联合接待室编印《无产阶级文化大革命有关文件汇集 （第二集）》， 北京：1967年6月","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"夺权","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"name":"军队支左","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"edd5dfeaa0"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
