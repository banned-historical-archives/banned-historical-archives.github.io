script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"东京各大学进步学生集会强烈抗议佐藤反动政府镇压学生的暴行  决心同东京大学学生团结一致战斗到底  许多学生代表发言严厉谴责日共修正主义分子的反革命叛卖行径","authors":[],"dates":[{"year":1969,"month":1,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"东京各大学进步学生集会强烈抗议佐藤反动政府镇压学生的暴行"},{"type":"paragraph","text":"决心同东京大学学生团结一致战斗到底"},{"type":"paragraph","text":"许多学生代表发言严厉谴责日共修正主义分子的反革命叛卖行径"},{"type":"paragraph","text":"新华社二十二日讯　据东方通讯社报道：东京各大学进步学生约三千人，二十一日下午在中央大学校园内举行大会，强烈抗议佐藤反动政府残暴镇压东京大学的进步学生，并且表示决心同东京大学学生团结一致，坚持进行斗争。"},{"type":"paragraph","text":"东京大学进步学生的一位领导人在大会上发表讲话，表示要摧毁反动的资产阶级教育制度，彻底粉碎日本反动派的一切镇压和欺骗。"},{"type":"paragraph","text":"他严厉谴责日共宫本修正主义集团破坏学生斗争的罪行。他强调说：“他们的行径是最可耻的反革命叛卖，因此我们必须把他们彻底击溃。”"},{"type":"paragraph","text":"他还说：“不管我们遇到什么样的镇压，我们决不放弃斗争。在全国各大学都已爆发了学生斗争。我们要同以工人为核心的人民紧密地团结在一起，把斗争进行下去，直到取得最后胜利。”"},{"type":"paragraph","text":"其他各大学的学生代表相继发言，谴责佐藤政府的镇压和日共修正主义分子的反革命叛卖，并且表示了他们坚定的斗争决心。大会结束时，全体与会者高唱《国际歌》。"},{"type":"paragraph","text":"会后，学生们分成几个纵队，高举红旗，在骏河台附近的整个地区举行声势浩大的示威游行。"},{"type":"paragraph","text":"示威群众面对武装警察高呼：“粉碎镇压！”“粉碎日共修正主义分子！”“我们要战斗到底！”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7f94db3210"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
