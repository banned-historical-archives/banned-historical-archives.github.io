script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"对资产阶级就是不讲平等","authors":[],"dates":[{"year":1967,"month":5,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"上海油墨厂革命委员会"},{"type":"paragraph","text":"我们越学党中央的《通知》，就越认识到由反革命修正主义分子彭真一手炮制的所谓“五人小组”的《汇报提纲》的反动本质。"},{"type":"paragraph","text":"我们要对这些反革命修正主义分子给予当头一棒，告诉他们:无产阶级革命派永远牢牢记住伟大领袖毛主席的教导:“凡是错误的思想，凡是毒草，凡是牛鬼蛇神，都应该进行批判，决不能让它们自由泛滥。”无产阶级革命派就是要高高举起革命的批判大旗，对资产阶级、对党内一小撮走资本主义道路当权派和他们的反动言行进行彻底的批判，要把他们批倒、批臭、批垮。"},{"type":"paragraph","text":"《汇报提纲》胡说什么“在真理面前人人平等”。这个保护资产阶级、反对无产阶级的反动口号，根本否认了真理的阶级性。无产阶级对资产阶级斗争，无产阶级对资产阶级专政，无产阶级在上层建筑其中包括在各个文化领域的专政，无产阶级继续清除资产阶级钻在共产党内打着红旗反红旗的代表人物的斗争，都是两个阶级、两条道路、两条路线的斗争，丝毫谈不到什么平等。我们革命委员会大部分同志是旧社会做工出身的，受够了资本家的剥削、压迫。我们深深体会到，在阶级社会中，有了资产阶级的平等，就没有无产阶级的平等。同样，如果没有无产阶级专政，就没有无产阶级的一切。这就好比无产阶级革命派不起来向党内一小撮走资本主义道路当权派夺权，就没有我们革命委员会的一切一样。经过一年来无产阶级文化大革命运动的教育，使我们擦亮了眼睛，认识到:阶级斗争，只能是你死我活的斗争。正如毛主席教导我们的:“阶级斗争，一些阶级胜利了，一些阶级消灭了。这就是历史，这就是几千年的文明史。”这里，根本没有什么超阶级的“平等”可言。我们无产阶级革命派决不上反动的《汇报提纲》的当，我们就是不同党内一小撮走资本主义道路当权派、不同一切牛鬼蛇神讲什么“平等”，就是要专他们的政。我们坚决高举毛泽东思想伟大红旗，搞好革命的大批判，搞好斗、批、改。把无产阶级文化大革命进行到底!"},{"type":"paragraph","text":"\u003cIMG alt=请插入5号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1967\\05\\675I040101.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e上海仪表游丝厂的革命职工认真学习中共中央《通知》　本报记者摄\u003c/FONT\u003e"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"革命委员会","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"55fdac2706"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
