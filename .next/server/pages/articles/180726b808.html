script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"陈宗汉在工会常委会扩大会议上的发言","authors":["哈尔滨工业大学","陈宗汉"],"dates":[{"year":1957,"month":6,"day":4}],"is_range_date":false,"parts":[{"text":"陈宗汉在工会常委会扩大会议上的发言","type":"title"},{"text":"哈尔滨工业大学陈宗汉","type":"authors"},{"text":"[陈宗汉：哈尔滨工业大学教授，动力系副主任]","type":"paragraph"},{"text":"六月四日工会常委扩大会议上的发言","type":"subtitle"},{"text":"工会如何领导群众进行工作，这是关键。要商量，现在党也领导，行政也领导，工会还是领导，领导太多了。工会应为群众服务，不应该想领导。我们为大家服务，工作要好做些。","type":"paragraph"},{"text":"成立检查组，问题不能一揽子都抓过来，学校领导还没有解决，工会毫无力量。这样做解决不了问题。“抓”做得到的，可以传达、催，转告群众。不是把所有的问题都研究一下。","type":"paragraph"},{"text":"上次开会（指教学部门工会代表座谈会）让到会的人多发言，问题很明白，要一起研究解决办法。群众厌恶的是问题提了没回音，不知何时解决，能不能解决，根本办法我认为是把工会生活建立起来。定期经常过，有二个小时就行了，以部门工会或小组为单位。这样提出的问题不必用大字报。综合起来逐级上转，每周整理分析问题。答复，基层工会这样就够忙，这样就是为人民服务。轻而易举的立即办之，不能办的一个时期内办，向上反映的也有交代，经常长期性的搞，问题千头万绪，困难在于时间，领导不肯给时间，似乎给了两个钟头，就会造反似的，用这个时间，若是没问题还可以学习嘛！解放初期，我们那个工厂就那么搞，三反以后挤掉了，群众民主越来越小了。这个方式大家硏究一下。","type":"paragraph"},{"text":"组成小组去整理检查问题，这应由行政做，否则不是“以工代政”？本来无职无权，这不在本份之内，这把党政置于何处。去催、收集而不是把问题抓过来。","type":"paragraph"},{"text":"六月七日工会常委扩大会议上的发言","type":"subtitle"},{"text":"党委拿出办法大家同意那好，如不同意怎么办？是全体一致呢？还是少数服从多数？资本主义国家的会议是采取投票，以多对少，我们要有少数服从多数的制度。评级问题，有不同意的领导上就是不决定，这是一种不负责任的态度。无论什么制度（党委制也好）只要少数服从多数就行了。但对少数意见必须重视在章程上可以规定，多数通过，少数意见必须有记载，以历史来验正正确与否，否则我们也可建立一种辞职的权力，如英国首相在处理问题意见不一致，可以辞职。","type":"paragraph"},{"text":"六月九日工会常委扩大会议上发言","type":"subtitle"},{"text":"因鸣放而延长考试时间是希望有结果，但上面会太多，无济于事。天天有考的，实质在延与不延之间了，总得有几天肯定不考。使教师力量不受牵涉。运动要系统化起来，会会重叠，散漫得很。我没有成熟的意见，要找几个人掌握全面情况，把形势综合起来，有多少大字报，多少问题，各楼要掌握情况，组织起来是否来得及，他们应日夜组织统计一下，出快报油印分发，使人一看了然可以省很多时间，看大字报现在有的是温习一遍，没有系统，没有头绪。大字报可以控制，订原则规定发表地点，就问题划分地区，画一个表公布地点，贴的顺序按时间先后，问题提出来了，意见也就出来了，分类统计便有中心，我们现在很乱，会要摆开，不知目前统计工作情况如何，问题分类集中、现在开会成了应景文章，到那里都是这一套，会后不动脑筋，回去睡得很好。","type":"paragraph"},{"text":"要用开座谈会的形式，党委要请代表们开会，工会就要回去有布置的时间，抓起来，做文章，搞个日程。","type":"appellation"}],"comments":[],"origin":"陈宗汉问题专辑（右派分子言论蒐集册之三），哈工大校刊编辑委员会编，1957年10月14日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"180726b808"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
