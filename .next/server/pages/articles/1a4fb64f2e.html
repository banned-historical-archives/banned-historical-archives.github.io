script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"感谢毛主席教导下的干部  对少数民族人民疾苦的关怀","authors":[],"dates":[{"year":1953,"month":7,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"感谢毛主席教导下的干部"},{"type":"paragraph","text":"对少数民族人民疾苦的关怀"},{"type":"paragraph","text":"甘肃省回族农民王德义来信：去年我们那里庄稼收成差，今年我为了搞副业生产，就将自己的和亲友家中的一些土产、药材收起来运到郑州卖了。我又在郑州买了两包花生米托铁路运到信阳。因为路局工作有差错，我的花生米在运输过程中不见了；信阳花生米的价钱又落了，就是以后运到也要亏一半本。我被困在信阳，生活没办法，并且怕回不了家。我在这种愁苦和困难的地步中，就给党报写了信。"},{"type":"paragraph","text":"报上登了我的信后（按：见五月二十八日“读者来信摘要”栏所刊“两包花生米由郑州起运，过了十来天竟不知去向”一信。因为王德义在前次来信中提出了发表时不要写明名字、以免他的家属见了耽心的要求，所以报上发表的署名是“甘肃省一个回族农民”）不几天，中央铁道部就特地派了专人来调查我的问题。那位同志对我的损失情形和当时处境做了详细了解，对我进行安慰，还说代表铁道部向我道歉。我当时生活困难，信阳车站的一位姓张的科长还叫我到他那里吃饭，有时在陪我去办理手续的路上还买馍要我吃。他说：“我们都是一家人，你的困难就是我们大家的事……。”所有许多这样真切的关怀，使我感激极了，也使我惭愧极了。使我感激的是：在毛主席教导下的干部，对我比亲兄弟还关怀，对我们少数民族人民的照顾比什么都周到；使我惭愧的是：像我遇到的这种针尖大的事，在旧社会里反动政府是连问一声都不会的，而人民政府却从千里外派专人来了解，还代表政府向我道歉，这使我心里怎么过意得去呢！"},{"type":"paragraph","text":"七月六日我到了郑州。郑州铁路局找到了我，告诉我说：政府因为照顾我，破格补偿我的全部损失。他们已将补偿我的七十五万元钱汇到信阳去了。为了怕我到信阳去取钱又要化路费，路局的好多同志们就先把他们的薪金三万五万凑起来，垫给我七十五万；还向我说了许多道歉的话。我真感激得不知道用什么话来回答才好。"},{"type":"paragraph","text":"当我回到我在郑州寄住的清真寺后，寺里的教长和所有回民知道了以上这些事，都高兴极了。他们齐声说：毛主席对我们回民太好了，这样一点事竟给了那么大的照顾。"},{"type":"paragraph","text":"我想写信向帮助我解决问题的人道谢。但帮助我的人太多了，我究竟该给谁写信呢？这使我为难了好久。后来我想到：一切好事，归根结底，都是毛主席领导得好；我应该给毛主席写封信。我又想到：写信给毛主席可不是一件平常的事，我知道我认得的识字人写信都写不好，我自己写得更不好。但是为了感激我们英明伟大的领袖，我的“良心”不允许我不写；因此就大胆写了，表示我和全家人的感激！"},{"type":"paragraph","text":"我还要将毛主席给我们的好处告诉我们穆士林们，使大家都知道毛主席对我们少数民族人民的关怀。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1a4fb64f2e"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
