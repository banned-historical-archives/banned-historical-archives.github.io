<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"云南省委根据郑州会议精神检查肿病死人的事件","authors":[],"dates":[{"year":1958,"month":11,"day":18}],"is_range_date":false,"parts":[{"text":"云南省委根据郑州会议精神检查肿病死人的事件","type":"title"},{"text":"在今年春夏之间，云南曾发生因肿病、痢疾、小儿麻疹等病造成严重死亡的情况。据最近核对的数字，至十月十日止，全省累计发病三十八万八千多人，死亡三万九千七百一十二人，其中因肿病而死者的占半数。经解剖尸体及临床治疗断定，这种病属于混合性营养不良型水肿，病因主要是过度疲劳和营养不良。据查，每个农民在正常劳动情况下，每天需要热量二千五百卡，劳动最紧张时需三千至五千卡。但今年六、七月间，青黄不接，口粮较紧，特别是去年歉收地区，有的农民每天只能吃到四、五两粮食，而劳动强度很大，因而造成死亡。","type":"paragraph"},{"text":"云南省委认为出现这一痛心的大量死亡事件，主要原因是省委领导上存在官僚主义，对于这一有关人民生命的重大问题抓得不紧，主要错误在于：","type":"paragraph"},{"text":"（一）领导作风不深入，对于今年紧张持续的苦战中需要特别关心群众的生活注意不够；尤其是对工作薄弱的地区所出现的新问题估计不足，一般看待。","type":"paragraph"},{"text":"（二）对一些干部强迫命令、违法乱纪的严重情况估计不足。特别是没有估计到，经过反右斗争和粮食大辩论，某些干部有个人主义思想，害怕被人说右倾，“宁左勿右”，不敢正视粮食问题，少数坏分子亦以“左”的面貌出现，制造混乱。如陆良县是去年地主、富农及右派分子反扑和富裕农民带头叫粮闹得最凶的一个县，当时县委思想动摇右倾，不分对象地放手供应粮食，造成干部群众的思想混乱，邪气抬头，以致减产。去年省的四级干部会上，曾严格地批判了县委的右倾思想，随后又把县委第一书记调职。肿病发生时，有些干部发现缺粮是主要原因，但由于怕犯“右倾”的错误，不敢反映真实情况。特别是今春派省委委员、监委副书记陈盛年担任该县第一书记，本想加强该县工作，但对陈缺乏真正了解，结果适得其反。他严重地缺乏阶级观点，不仅对于大量死人的严重现象熟视无睹，且当干部反映粮食问题时，反被他批评为：“代表富裕农民叫喊”；县委几次要研究粮食供应，他都借口拖延。县委委员兼总支书记刘云才同志坚持反映粮食真实情况，力求积极解决，但遭到陈盛年的打击，将刘撤职以至开除了党籍。陈盛年一面打击好同志，一面支持坏人。他分工亲自领导掌握的马街乡和茶花乡，肿病死人最多，强迫命令，违法乱纪亦最突出。当时，群众因病出工不积极，马街乡总支副书记梁理富用皮鞭组织“督战队”等手段强迫群众出工，陈不仅不批评制止，反而予以支持，在全县干部电话会议上推广这个所谓“经验”，还说什么“生产不跃进是不是大非的问题，打人是小事小非的问题”，并提拔梁理富为总支书记。全县在他这种指导下，捆绑吊打合法化，甚至产生了“打人是为了打一千斤（粮食亩产），不是国民党作风”，“不打就是没有干劲”，“打人是促进派，不打人是促退派”等说法，从而进一步助长和纵容了强迫命令的恶劣作法和违法乱纪行为。甚至有些干部谁知打人不对，也不得不打。在此期间，打人成风，该县乡以上干部直至县委委员，有百分之十曾经打过人。在这种情况下，组织不纯的乡社，阶级异己分子、坏分子乘机兴风作浪，报复打击群众。在这样的地方甚至出现了全家死绝，病死路旁，尸体无人掩埋的悲惨现象，群众生产情绪低落，怨声四起。所有打人捆人以至死人严重的地方，基层组织也多严重不纯，历次农村整党整社都不彻底。而一般地区，干部中的强迫命令，动辄罚工分、戴黑条子，“斗他一台”，“辩你一下”等整群众的现象，也相当普遍。","type":"paragraph"},{"text":"这种强迫命令现象没有得到及时发现和制止，也和省委领导思想上的片面性有关。大跃进以来绝大多数干部作风确实有极大转变，与群众同甘共苦，实行三同，艰苦朴素，密切联系了群众，领导了大生产。省委看到了也充分肯定了这个事实和变化，这是必要的。但是，在大跃进中，任务艰苦急迫，群众干劲大，听党的话，实行了组织军事化，可能掩盖强迫命令的滋长，容易产生简单急躁粗暴，对此却警惕不够，没有在这方面向干部及时进行教育，甚至有时只是压任务，表扬完成任务好的，而不去检查完成任务的手段，以致助长了强迫命令的发展。同时，通过反对右倾保守思想，提倡思想解放，敢想、敢说、敢做的风格，确实打破了许多迷信，各项工作都取得了史无前例的巨大成就。但是，对于主席和中央早就提出的可能产生浮夸、谎报、报多不报少、报喜不报忧、看好不看坏、说好不说坏的情况，则更加警惕不够。甚至省委本身也有报喜不报忧的错误。","type":"paragraph"},{"text":"（三）更严重的是：问题发现后，态度不够坚决，没有采取断然措施，及时而又严肃地处理，致使死人现象未能迅速制止。在领导思想上，常常把生产与生活对立起来；把保护干部群众的积极性和批判坏人坏事对立起来。因此，犹豫不定，决心不大。","type":"paragraph"},{"text":"在这一年当中，省委主要精力抓了工农业生产、水利积肥、春耕、抗旱、田间管理、钢铁铜；但是，对人民群众的生活则关心不够，对于群众的思想和干部作风了解不够。这是一种没有真正政治挂帅的表现。","type":"paragraph"},{"text":"关于正确处理人民内部矛盾，学习不够，体会不深，教育干部不够，以致许多基层干部分不清两类矛盾的性质，区别和正确解决的方法，仍习惯于用对付敌人的办法，来对待人民群众。","type":"paragraph"},{"text":"目前，省委正在召开地、市委第一书记会议，根据郑州会议精神，严肃认真地进行检讨，通过整风的方法，集中检查省委和地、市两级的领导作风和群众观点，认真接受经验教训。","type":"paragraph"},{"text":"（摘自云南省委“关于肿病死人情况的检查报告”）","type":"paragraph"},{"text":"来源：四川省委办公厅“省委四级干部会议文件关于农村部分(1958.11-1959.1.7)”","type":"paragraph"}],"comments":[],"origin":"四川省某档案馆","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"人民内部矛盾","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c4739134f5"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
