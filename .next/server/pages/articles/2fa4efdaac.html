" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji30","name":"毛泽东全集第30卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji30.pdf"],"article":{"title":"对薄一波报批的关于购棉储棉工作给各中央局的电报等文稿的批语","alias":"","parts":[{"type":"paragraph","text":"对薄一波报批的关于购棉储棉工作"},{"type":"paragraph","text":"给各中央局的电报等文稿的批语"},{"type":"paragraph","text":"（1951年5月31日）一波同志："},{"type":"paragraph","text":"（一）给各中央局的电报?已批发；（二）中央的公开通知退还你，请添上政务院发布指示的时间，连同指示送新华社发表；（三）农业税是否增加及是否号召捐献向题，还须等儿大中央才能召"},{"type":"paragraph","text":"[1]薄一波，当时任政务院财政经济委员会副主任兼财政部部长。[2]指为发布政务院购棉储棉指示给各中央局负责同志说明情况的电报。"},{"type":"paragraph","text":"[3]指中共中央1951年6月1日为保证政务院指示中提出的购棉储棉任务胜利完成给各级党委的通知。此通知当日在《人民日报》上发表。"},{"type":"paragraph","text":"[4]指中央人民政府政务院总理周恩来1951年6月1日发布的政务院关于购棉储棉工作的指示。指示分析了我国棉花产量供不应求，棉农存棉不肯出售，造成纱厂因原料供应困难开始停工的情况。指出：此种情况，如不设法改变，将影响到全国军民衣着的供应和物价的稳定，影响到战争和全国多数人民的利益，因此必须在全国棉农中开展一个爱国主义的售棉、储棉运动，劝告有棉花的农民在合理牌价下将存棉立即卖给国家，作为农民对于国家一种重要贡献的爱国表示。同时，国家贸易公司、合作社则应规定合理牌价，收购棉农的棉花，合作社、人民银行则应以有利于棉农的储蓄办法，吸收棉农的实物储蓄或折价储蓄。实行坚决的公私兼顾政策。这个指示亦在当日的《人民日报》上发表。"},{"type":"paragraph","text":"对薄一波报批的关于购棉储棉工作给各中央局的电报等文稿的批语集会议讨论。"},{"type":"paragraph","text":"毛泽东五月卅一日"}],"authors":["毛泽东"],"dates":[{"year":1951,"month":5,"day":31}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":354,"page_end":355},"tags":[{"name":"毛泽东","type":"人物"},{"name":"薄一波","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"批示"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2fa4efdaac"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
