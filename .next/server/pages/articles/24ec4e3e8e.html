<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"下沙公社党委成员以实际行动批判资产阶级法权观念努力学好理论　坚持参加劳动","authors":[],"dates":[{"year":1975,"month":3,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　南汇县下沙公社党委认真学习毛主席关于理论问题的重要指示和马克思、恩格斯、列宁有关无产阶级专政的论述，进一步加深了对无产阶级专政的历史任务的理解，提高了参加集体生产劳动，努力改造世界观的自觉性。"},{"type":"paragraph","text":"在学习和讨论中，下沙公社党委“一班人”从限制资产阶级法权，巩固无产阶级专政的高度，认识干部参加集体生产劳动的重大意义。他们学习了马克思关于社会主义社会“是刚刚从资本主义社会中产生出来的，因此它在各方面，在经济、道德和精神方面都还带着它脱胎出来的那个旧社会的痕迹”的论述和毛主席指出的:关于资产阶级法权，“这只能在无产阶级专政下加以限制”的教导后，认识到，干部坚持参加集体生产劳动，就是对资产阶级法权观念的挑战，干部和群众保持密切联系，正是冲洗自己头脑中的旧思想、旧观念，保证不变质、不变修，坚持无产阶级专政下继续革命的重要一环。党委一位负责同志说:“干部参加劳动是限制资产阶级法权，缩小脑力劳动和体力劳动之间差别的一个重大措施，这是巩固无产阶级专政的大事，我们一定要长期坚持下去。”"},{"type":"paragraph","text":"下沙公社党委成员还联系自己参加集体生产劳动的体会，深入批林批孔，从理论和实践的结合上提高对参加劳动的认识。去年，这个公社的干部中，参加集体生产劳动最多的达一百二十天，党委书记劳动了一百零四天，有个主持机关日常工作的副书记虽然身体不好，也经常带病坚持参加劳动。干部沉下去，生产就上去。他们带领群众深入开展“农业学大寨”运动，坚持抓革命、促生产的方针，夺得了农业生产的丰收。一九七四年，这个公社的粮、棉、油、猪四大生产全面增长。大家回顾这一年的工作，体会到:干部参加劳动，这不仅是反修防修的重大措施，而且也是农业大干快上的一个重要条件。有的同志在讨论时，联系自己在劳动中改造世界观方面的收获，深有体会地说:滚得一身泥，丢掉旧习气，扎根群众意志坚，继续革命永向前。大家批判了刘少奇、林彪一伙散布孔老二鼓吹的“劳心者治人，劳力者治于人”的反动谬论，批判了林彪一伙恶毒攻击干部走五·七道路是“变相失业”的罪行，进一步认清了这伙叛徒妄图引诱干部脱离劳动、为他们复辟资本主义服务的反动面目。"},{"type":"paragraph","text":"在学习中，大家还联系农村两个阶级、两条道路、两条路线斗争在干部队伍中的反映，对毛主席关于“工人阶级一部分，党员一部分，也有这种情况。无产阶级中，机关工作人员中，都有发生资产阶级生活作风的”这一段话，展开认真的讨论。有的同志对无产阶级文化大革命以来，公社机关和一些大队的个别干部犯错误的情况作了分析，发现他们都有一个共同的特点:就是不学习，不劳动，脱离群众，而最终蜕化变质，有的甚至走上了犯罪道路。因此，我们要自觉坚持参加集体生产劳动，抵制资产阶级生活作风。"},{"type":"paragraph","text":"最近，这个公社党委又修订了原来的学习和劳动制度，表示要和广大社员群众一起认真学好无产阶级专政的理论，一起战天斗地，搞好春耕生产，为革命作出更大的贡献。　(本报通讯　员)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"林彪","type":"人物"},{"name":"批林批孔","type":"主题/事件"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"name":"限制资产阶级法权","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"24ec4e3e8e"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
