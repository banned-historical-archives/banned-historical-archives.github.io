script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"我们不要修正主义的“教学质量”——公办变民办会影响“教学质量”吗？","authors":["吴财"],"dates":[{"year":1968,"month":11,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"我们不要修正主义的“教学质量”"},{"type":"paragraph","text":"——公办变民办会影响“教学质量”吗？"},{"type":"paragraph","text":"我们在讨论侯振民、王庆余两同志关于“公办小学下放到大队来办”的建议时，有的同志认为少年时代正是学文化、长知识的时候，因而担心公办小学下放到大队来办，劳动的时间多了，学习功课的时间少了，是否会影响到“教学质量”。现在对这个问题，谈谈我的一些看法和体会。"},{"type":"paragraph","text":"关于“教学质量”的问题，站在两种不同的立场上，就会有两种截然不同的看法。站在修正主义教育路线的立场上，就会认为“分数高低”、“升学率高低”、“书本知识的多少”是衡量“教学质量”的标准；站在毛主席无产阶级教育路线的立场上，就会认为，从学校里培养出来的人，能否全心全意地为人民服务，为无产阶级政治服务，才是衡量“教学质量”的唯一正确的标准。"},{"type":"paragraph","text":"就拿我入伍前所在的黑龙江省杜尔伯特蒙古族自治县东岗民办小学培养的学生来说吧，个个都是贫下中农打心眼里喜欢的后生。东岗小学是在大队党支部的直接领导下进行教学工作的。贫下中农为了亲手把自己的后一代培养成为可靠的革命接班人，专门给小学拨了十几亩“防修田”，每天都有“劳动课”。到了农忙季节，就让学生参加生产队的劳动。修建校舍，孩子们也搬砖运瓦。桌凳坏了，他们自己学着钉。他们从小就经受着锻炼，保持劳动人民的本色。他们上课的时间少了，是上“闭门死读书”课的时间少了，而上阶级教育课的时间多了，学习毛主席著作的课多了。学校里经常请苦大仇深的老贫农给学生进行忆苦思甜教育，并且组织他们参观阶级教育展览，学习村史、家史等等。孩子们从小就懂得什么叫剥削，什么叫压迫，在幼小的心灵里就扎下了阶级和阶级斗争的根子。学生读的书是按照毛主席教育路线自编的课本。从这所小学毕业出来的学生，最听毛主席的话，照毛主席的指示办事，毕业后积极投入到三大革命运动中去。有一期毕业生，大队想留下一部分人，当学习毛主席著作的辅导员和记工员，全班同学都争先恐后地报名。贫下中农常常称赞说：“东岗小学培养的后生是咱贫下中农自己的。”这“教学质量”是高还是低呢？我们认为“教学质量”是很高的。"},{"type":"paragraph","text":"但是，在一九六二年，我们东岗小学一个四年级班被县文教局下令合并到公办的东升小学去了，有五名贫下中农的子女因为缴不起学费，成绩不合格，被撵出了学校。就是没有失学的学生，到了公办小学后，也慢慢地变了。有个叫汪林的同学，在民办东岗小学的时候，是个多么好的孩子啊！他放学回家后，不是给队里拾粪，就是给五保户打柴，热爱集体，热爱劳动，常常利用休息时间帮助生产队干活，还不让给自己记工分。贫下中农夸奖他是个“小五好社员”。可是到了公办小学后，不久就变成了个书呆子，满脑子的分数。以前，他每天晚上帮助爸爸妈妈学习毛主席著作，到了“公办”小学后，每天回来不是背书，就是算题，家里让他干点活，他怕耽误了功课。他父亲气愤地说：“咱这孩子变得怎么这么快！”大家看，这就是公办小学的“教学质量”！"},{"type":"paragraph","text":"什么藤上结什么瓜，什么样的路线控制下的学校就会培养出什么样的人来。大叛徒刘少奇为了实现他复辟资本主义的罪恶目的，疯狂地争夺教育阵地，以“提高教学质量”为名，大砍民办小学，妄图把贫下中农的后代培养成为资产阶级的接班人。侯振民、王庆余两同志的建议，是一个全面落实毛主席最新指示“在农村，则应由工人阶级的最可靠的同盟者——贫下中农管理学校”的好建议，是一个培养无产阶级革命事业接班人的好建议。解放军某部  吴财"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6113094b9c"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
