script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"34799034-2c67-4e1f-ae74-793ab6bd754b","name":"中共党史教学参考资料 第26册 “文化大革命”参考资料 中册（1988年）","internal":true,"official":true,"type":"pdf","author":"","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives3/main/34799034-2c67-4e1f-ae74-793ab6bd754b.pdf"],"article":{"title":"《红旗》杂志发表《从上海机械学院两条路线的斗争看理工科大学的教育革命》的编者按语","alias":"","parts":[{"type":"paragraph","text":"议，进行适当的总结和关于政策的教育。"},{"type":"paragraph","text":"一九六八年九月一日《红旗》杂志发表《从上海机械学院"},{"type":"paragraph","text":"两条路线的斗争看理工科大学"},{"type":"paragraph","text":"的教育革命》的编者按语"},{"type":"paragraph","text":"（一九六八年九月五日）"},{"type":"paragraph","text":"这是上海市的又一个调查报告，现发表，供参考。全国各大、中、小工业城市所属各工厂的工程技术干部情况如何，各理工科高等、中等学校教育革命的情况如何，希望各地革命委员会组织一些人做些典型的调查，报告中央，本刊将择要予以发表。这里提出一个问题，就是对过去大量的高等及中等学校毕业生早已从事工作及现正从事工作的人们，要注意对他们进行再教育，使他们与工农结合起来。其中必有结合得好的并有所发明创造的，应予以报导，以资鼓励。实在不行的，即所谓顽固不化的走资派及资产阶级技术权威，民愤很大需要打倒的，只是极少数。就是对于这些人，也要给出路，不给出路的政策，不是无产阶级的政策。上述各项政策，无论对于文科、理科新旧知识分子，都应是如此。"},{"type":"paragraph","text":"（原载1968年9月5月《人民月报》林、周及文革各同志：现在需要规定一些具体政策，我看此件不错，建议转发各地参考。请酌定。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"九月四日"},{"type":"paragraph","text":"中共中央、中央文革"},{"type":"paragraph","text":"转发北京市《关于召开工人和解放军毛泽东思想宣传队负责人会议情况报告》"},{"type":"paragraph","text":"（一九六八年九月六日）现遵照毛主席指示将北京市革命委员会《关于召开工人和解放军毛泽东思想宣传队负责"}],"authors":[],"dates":[{"year":1968,"month":9,"day":5}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":208,"page_end":208},"tags":[{"name":"毛泽东","type":"人物"},{"name":"中央文革","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"教育革命","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":
