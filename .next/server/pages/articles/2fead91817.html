" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"江青关于拍摄《太阳与地球》影片给王洪文李先念吴德的信","authors":["江青"],"dates":[{"year":1974,"month":6,"day":14}],"is_range_date":false,"parts":[{"text":"江青关于拍摄《太阳与地球》影片给王洪文李先念吴德的信","type":"title"},{"text":"江青","type":"authors"},{"text":"江青在科影厂关于拍摄《太阳与地球》影片的信件上的批语","type":"subtitle"},{"text":"洪文、先念、吴德同志：","type":"appellation"},{"text":"这是件大事，不仅青少年需要。我们这样的人也需要学习这种知识。北京天文馆被外国人占领了，只有中国人一个画面。而天文学是中国最早发现的，并且有大量的历史记载，单是二十四史上就占有很大篇幅。","type":"paragraph"},{"text":"有些中国人不象中国人，外国人放个屁都是香的，应该批判他们。我们建议支持拍电影，并组织一个班子专门整理、研究祖国的天文学。以上意见妥否？请批示。","type":"paragraph"},{"text":" 江青一九七四年六月十四日  拂晓","type":"paragraph"},{"text":"（文化部办公厅提供）","type":"appellation"}],"comments":[],"origin":"文化部办公厅提供","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"江青","type":"人物"},{"name":"王洪文","type":"人物"},{"name":"吴德","type":"人物"},{"name":"李先念","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2fead91817"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
