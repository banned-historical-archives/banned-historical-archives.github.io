" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"刘少奇对北京建工学院“八一团”代表的讲话","authors":["刘少奇"],"dates":[{"year":1966,"month":8,"day":3}],"is_range_date":false,"parts":[{"text":"刘少奇对北京建工学院“八一团”代表的讲话","type":"title"},{"text":"刘少奇","type":"authors"},{"text":"〖纪要，于建工学院〗","type":"appellation"},{"text":"辩论会看事实怎样，有人材料知道很多，他也不揭，他也不斗，他们的话是站不住的。他们抓人很多，要抓根，谁冒点头很短，一打就缩回去了！你等他完全露出来就好了，这就可打倒了，他不完全出来是打不倒的。有些人刚刚出来点就回去了。","type":"paragraph"},{"text":"工作组有什么错误？是什么错误？是什么性质？","type":"paragraph"},{"text":"两点意见：","type":"paragraph"},{"text":"（一）学校成分不好的不少，对这些人要采取正确的政策，争取团结一切可以团结的人，这是一个很重要的政策。","type":"paragraph"},{"text":"（二）对犯了严重错误的人，应采取什么态度，他们可以改正错误，要给出路，给重新做人的出路。","type":"paragraph"},{"text":"马克思讲过：无产阶级必须解放全人类，只有全人类的解放，无产阶级才能获得自身的解放。全人类指无产阶级劳动者，还包括剥削阶级子女，还包括没有枪毙的，给他们饭吃，还种地或劳动使思想变化，改造他们，劳动改造是有变化的。对不枪毙的人还算人，你要枪毙他，他就不反（原文如此），你就改造他。他要不改造，就永不能解放。这包括帝国主义、地主、坏分子、右派分子。地主阶级枪毙了一部分，现在还有他们的家属，他儿子的父亲被杀了，他儿子有杀父之仇，他要报仇，就不能解放。解放全人类，包括那些不被枪毙的犯人，无产阶级还要镇压坏人，无产阶级不专政，就不能解放自己。把所有犯人都枪毙，杀父之仇就更多了。","type":"paragraph"},{"text":"有些家庭出身不好，他们有些人反党反社会主义，有些人也可能不反，反的是一小撮。你们要团结，不管人家怎样跟踪你们，你骂我，我不骂你，你造谣我有认识，团结多数，团结一切可以团结的人。有人“八一团”也不加入，“革命团”也不加入，要听听他们的意见。","type":"paragraph"},{"text":"昨天不开大会不行，不开大会就围起来了，今天说不完，明天还可以谈，摆事实，讲道理。讲几点意见：","type":"paragraph"},{"text":"有党员，有团员，党团支部，总支书记，总支委员组织改选，改组原支委，原支书你们不喜欢可以改选，如暂时成立不起来，可成立临时的，你们可罢官，选不出来，成立临时支委。院党委要改组，开全院党员大会，要改选。能选出来就选出来，选不出来暂时慢些，把旧的院党委、院团委罢了，选出临时的院党委，院团委，选不出来也不急，等一时再由你们选，院党委能改选就改选解散。","type":"paragraph"},{"text":"以后支部开会不要秘密，还有非党员。党员开会不开秘密会，吸收非党员参加，由院文革决定，一半一半，比如两个党员吸收两个非党员参加，他们议论怎么办？要采取多数，不要把党员搞成黑帮，搞成反党。他们多数是好的，秘密会（指党员秘密会）由市委决定。","type":"paragraph"},{"text":" （“八一”62战斗组宋大群潘洁初整理转抄）","type":"paragraph"}],"comments":[],"origin":"1967年8 月3 日北京地质学院东方红报《联合版》第4版；河北北京师范学院《斗争生活》编辑部编印《无产阶级文化大革命》第667页；《批判资料：中国赫鲁晓夫刘少奇反革命修正主义言论集（１９５８.６～１９６７.７）》（北京：人民出版社资料室，１９６７）。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"490987b2de"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
