script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"苏修叛徒集团是法国垄断资产阶级的帮凶  苏修伙同法修兜售各种骗局，卖力地为法国统治集团效劳，妄图扑灭法国人民革命烈火，充分暴露了叛徒的可耻面目","authors":[],"dates":[{"year":1968,"month":6,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"苏修叛徒集团是法国垄断资产阶级的帮凶"},{"type":"paragraph","text":"苏修伙同法修兜售各种骗局，卖力地为法国统治集团效劳，妄图扑灭法国人民革命烈火，充分暴露了叛徒的可耻面目"},{"type":"paragraph","text":"新华社八日讯　席卷全法国的革命群众运动的伟大风暴，震撼着腐朽没落的世界资本主义制度。法国统治集团为了扑灭这场危及它的反动统治的熊熊的革命烈火，在对法国的工人和学生运动采取暴力镇压的同时，还耍了政治欺骗的花招。苏修叛徒集团伙同法修叛徒集团卖力地为法国统治集团效劳，兜售各种骗局，扮演了法国垄断资产阶级的帮凶、法国人民革命事业的叛徒的可耻角色。"},{"type":"paragraph","text":"法国总统戴高乐五月三十日发表演说，公然叫嚣要对革命群众采取“其他手段”，并随即把军队调进巴黎地区，威胁革命群众。法国革命群众不畏强暴，表示要以革命的暴力回答反革命的暴力。这时，苏修集团立即出来为法国统治集团帮忙，要法国工人搞“合法斗争”，不要“闹个天翻地覆”。"},{"type":"paragraph","text":"法国统治集团伙同法修叛徒集团和黄色工会头目玩弄“三方谈判”的骗局遭到破产以后，法国统治集团又玩弄新的花招，企图通过同各行业、各地区的工会分别进行谈判的办法，实行各个击破，逐步分化瓦解罢工工人的队伍。苏修叛徒集团对此大声叫好，极力为法国统治集团这一新阴谋效劳。塔斯社大肆宣扬什么“在一些部门中”，“谈判在取得某些结果”，法国统治当局在这些“谈判”中作了“重大让步”，“劳动人民的一系列要求”都“得到了满足”，并厚颜无耻地要法国工人“逐渐恢复”工作，企图借此诱骗法国工人阶级放弃革命斗争，向垄断资产阶级屈服。塔斯社还对法修控制的总工会发表的诱骗工人复工的叛卖性声明大加吹捧，要法国工人“完全复工”。事实表明，这伙叛徒是多么迫不及待地要帮助反动统治当局尽快地扑灭革命的火焰。"},{"type":"paragraph","text":"法国统治集团为了缓和法国人民的愤怒情绪，还玩弄另一个骗局，宣布在六月下旬进行议会选举。苏修叛徒集团对此立即响应，并借机大肆贩卖“和平过渡”的修正主义破烂货。苏修胡说什么在法国“主要的斗争现在转入即将举行的国民议会选举的筹备工作方面”，即将开始的“国民议会的选举运动”，是“提到首位的”“政治问题”。苏修还大肆鼓吹什么“选民的判决”，极力宣扬在法国通过选举建立有罗歇之流的叛徒工贼参加的改头换面的资产阶级政府，即所谓的“民主联盟人民政府”，并胡说什么这是“满足广泛人民运动愿望的唯一途径”。"},{"type":"paragraph","text":"列宁当年在批判第二国际那些“议会迷”时就曾经指出：“如果把阶级斗争局限于议会斗争，或者认为议会斗争是最高的、决定性的、支配着其余一切斗争形式的斗争，那就是实际上转到资产阶级方面去而反对无产阶级。”苏修、法修这些现代“议会迷”们也就是这样一伙转到资产阶级方面去而反对无产阶级的叛徒工贼。法国的革命工人、学生愤怒地喊出了“选举就是背叛”的口号，有力地揭露了这伙叛徒工贼的丑恶嘴脸。"},{"type":"paragraph","text":"法修叛徒集团在法国人民这场伟大的革命风暴中替法国垄断资本卖尽力气，扮演了法国垄断资产阶级豢养的下贱走狗的角色。苏修叛徒集团的喉舌《真理报》六月五日特意发表了一篇编辑部文章，对法修集团大加吹捧。这篇文章恬不知耻地说法修集团在法国群众这次革命斗争中“表现了最大的”“慎重”，说法修保证在垄断资本的工厂里“保持着模范的秩序”以及示威游行的“秩序井然”等等。"},{"type":"paragraph","text":"《真理报》的文章，不仅不打自招地暴露了法修的工贼面目，也暴露了苏修集团在法国统治集团面前的奴颜婢膝。事实表明，苏修领导集团和法修领导集团是一丘之貉。"},{"type":"paragraph","text":"我们的伟大领袖毛主席指出：“捣乱，失败，再捣乱，再失败，直至灭亡——这就是帝国主义和世界上一切反动派对待人民事业的逻辑，他们决不会违背这个逻辑的。”不管苏修集团和其它形形色色的叛徒工贼怎样卖力地为法国垄断资产阶级效劳，但是他们不仅阻挡不了法国人民革命运动的发展，而且终将被人民革命的历史车轮所碾碎。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8c2703c7f0"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
