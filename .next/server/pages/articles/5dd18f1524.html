<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"批邓是推动抗震救灾的动力  河北省滦南县在抗震救灾斗争中深入批邓","authors":[],"dates":[{"year":1976,"month":8,"day":31}],"is_range_date":false,"parts":[{"type":"paragraph","text":"批邓是推动抗震救灾的动力"},{"type":"paragraph","text":"河北省滦南县在抗震救灾斗争中深入批邓"},{"type":"paragraph","text":"本报讯　在抗震救灾斗争中，河北滦南县县委带领广大干部和群众，认真学习毛主席的一系列重要指示，联系抗震救灾中的阶级斗争、路线斗争的实际，深入批判邓小平反革命的修正主义路线，推动了抗震救灾工作，促进了农业生产。"},{"type":"paragraph","text":"七月二十九日，红色电波传来了党中央的慰问电，一股强大的暖流温暖了滦南四十九万人民的心，更增强了人们战胜地震灾害的信心。县委组织广大干部和群众认真学习了党中央的慰问电。在学习和讨论中，许多基层党组织和各级干部回顾了一九六二年滦南县发生水灾后的情况。当时的灾情比现在轻得多，由于刘少奇反革命的修正主义路线的干扰，邓小平鼓吹“白猫黑猫”论，刮起了单干风，有的社队分田到户，滑向资本主义的邪路。这个事实说明，越在困难的时候，越是要抓阶级斗争、路线斗争。县委集中了广大干部和群众的意见，旗帜鲜明地提出：在抗震救灾的斗争中，要以阶级斗争为纲，坚持社会主义方向，坚定不移地执行毛主席的革命路线。全县掀起了深入批邓、反击右倾翻案风的新高潮。在被震倒的房屋旁，在解放军和医疗队的帐篷里，在田间、地头，到处都摆开了批邓的战场。"},{"type":"paragraph","text":"地震后，一小撮阶级敌人趁机捣乱破坏。广大干部和群众及时抓住阶级斗争的新动向，批判邓小平的“三项指示为纲”的修正主义纲领，批判邓小平宣扬的"},{"type":"paragraph","text":"“阶级斗争熄灭论”，对阶级敌人实行无产阶级专政。"},{"type":"paragraph","text":"在抗震救灾斗争中，广大贫下中农显示出无比的英雄气概和巨大的创造力，是对邓小平散布的“依靠工农兵是相对的”谬论的有力批判。"},{"type":"paragraph","text":"广大干部和群众从这次抗震救灾斗争中看到，人民解放军与人民同呼吸，共命运，哪里有危险，哪里就有解放军，他们是人民的子弟兵，解放军里处处有雷锋。联系这一事实，广大干部、群众同人民解放军指战员一起，批判了邓小平对子弟兵的诬蔑。"},{"type":"paragraph","text":"地震后，几千名赤脚医生不顾自己的伤痛，不顾自己被压在倒塌的房屋里的亲人，首先抢出药箱，救死扶伤，治病防病。广大干部、群众从赤脚医生的英雄行为中，看到社会主义新生事物的强大生命力。他们共同批判了邓小平攻击无产阶级文化大革命，攻击社会主义新生事物，反对限制资产阶级法权的罪行。"},{"type":"paragraph","text":"社会主义时期阶级斗争是长期的，复杂的，时起时伏的，有时甚至是很激烈的。解放以来的事实证明，每当出现严重自然灾害的时候，也就是两个阶级、两条路线、两条道路斗争激烈的时候。滦南人民记取三年国民经济暂时困难的历史教训，在抗震救灾斗争中，狠批了邓小平的“白猫黑猫”论，决心以阶级斗争为纲，依靠人民公社集体经济的力量，坚持社会主义方向，恢复生产，重建家园。"},{"type":"paragraph","text":"批邓，是当前斗争的大方向，是推动抗震救灾工作的动力。滦南人民在县委领导下深入批邓，批出了信心，批出了干劲。"},{"type":"paragraph","text":"地震后短短几天内，各社队迅速建起了临时的窝棚，群众的衣、食、住、医得到了初步安排。青坨营公社南冯大队在两天内建成了四十间半永久性的房屋，可以防雨、防风、防寒、防震。县委召开现场会加以推广。广大社员在干部的带领下，迅速恢复生产，积极排除、清理地震带来的积水、淤沙，平整土地，锄草、追肥，加强田间管理，决心夺取今年秋季农业的丰收。县委和有关部门正在重新规划，重新安排，修复被地震破坏的水利排灌系统，搞好农田基本建设，为明年夏季农业丰收打好基础。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"河北文革","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"限制资产阶级法权","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5dd18f1524"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
