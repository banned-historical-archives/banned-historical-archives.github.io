<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"北京市被服厂党委狠抓自身思想革命化  加强对“一班人”的无产阶级党性教育  带领全厂党员和革命群众沿着毛主席的革命路线胜利前进","authors":[],"dates":[{"year":1971,"month":4,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"北京市被服厂党委狠抓自身思想革命化"},{"type":"paragraph","text":"加强对“一班人”的无产阶级党性教育"},{"type":"paragraph","text":"带领全厂党员和革命群众沿着毛主席的革命路线胜利前进"},{"type":"paragraph","text":"新华社讯　北京市被服厂党委会不断加强对党委“一班人”自身的无产阶级党性教育，促使领导班子成员进一步增强革命性、科学性和组织纪律性，老老实实照毛泽东思想办事，带领全厂党员和革命群众朝气蓬勃地沿着毛主席的革命路线胜利前进。"},{"type":"paragraph","text":"这个厂的党委成员经过无产阶级文化大革命的锻炼，经过整党建党，深刻认识到：毛泽东思想是我们党的指导思想的理论基础，坚决照毛泽东思想办事，照毛主席的建党学说办事，就是无产阶级最高的党性。因此，这个厂新党委成立的第一天就作出决议，把活学活用毛泽东思想摆在一切工作的首位，坚决照毛泽东思想办事，不断增强党委成员的无产阶级党性。"},{"type":"paragraph","text":"毛主席教导我们：“没有科学的态度，即没有马克思列宁主义的理论和实践统一的态度，就叫做没有党性，或叫做党性不完全。”这个厂的党委在加强无产阶级党性教育中，引导领导班子成员联系党内两条路线斗争史和厂内阶级斗争、路线斗争的实际，深刻理解毛主席这一教导。通过学习，大家深深体会到：理论和实践相脱离，表里不一，是机会主义的特征，而理论和实践密切结合，则"},{"type":"paragraph","text":"“是我们共产党人区别于其他任何政党的显著标志之一”。在提高认识的基础上，党委把发扬理论和实践相结合的学风，当作增强领导班子成员无产阶级党性的根本来抓，既反对那种不认真读书、单凭“老经验”办事的倾向，又反对学而不用、理论脱离实际的倾向，不断提高活学活用毛泽东思想的自觉性。"},{"type":"paragraph","text":"去年有一段时间，这个厂根据国家和人民的需要，生产产值较低的灯芯绒服装。有的同志担心生产这种产品会影响产值计划的完成，就提议改做高产值的毛料服装，以达到和超过产值指标。厂党委针对这种活思想，组织大家认真学习毛主席关于“我们应该是老老实实地办事”的教导，狠批刘少奇“利润挂帅”、“生产第一”等反革命修正主义黑货，教育大家坚决按照突出无产阶级政治的原则办事，从国家和人民的需要出发，仍按原计划生产灯芯绒服装。经过充分发动群众，克服困难，终于超额完成了生产计划。党委成员从这件事情中进一步认识到，毛泽东思想是我们一切工作的指针，决不能只读在书本上，讲在口头上。只有发扬理论联系实际的革命学风，真正做到学一点，用一点，言行一致，说到做到，才能使我们的工作沿着毛泽东思想的轨道胜利前进。针对个别领导成员凭“老经验”办事的问题，厂党委组织大家认真学习毛主席关于“情况是在不断地变化，要使自己的思想适应新的情况，就得学习”的伟大教导，帮助这样的同志认识革命理论对于实践的指导作用。有一位工人出身的党委委员，一度有满足于自己局部经验而忽视理论的倾向，经过学习，他认识到实践若不以革命理论作指导，就要变成盲目的实践，就不能自觉地执行毛主席的革命路线。从此，他坚持活学活用毛泽东思想，执行毛主席革命路线的自觉性显著提高，以革命带动生产，做出了成绩。"},{"type":"paragraph","text":"北京市被服厂党委成员把认真贯彻执行党的民主集中制，作为加强无产阶级党性锻炼的重要课题。不论是党委的“班长”或其他委员，都自觉地把自己置于党委集体领导之下，一切重大问题都提交集体讨论，坚持以毛泽东思想作为分辨是非、确定取舍的最高标准。提倡“群言堂”，反对“一言堂”，防止个人包办。在发生意见分歧时，不轻易否定少数人的意见，而是把不同意见摆到桌面上来，一次讨论解决不了，就进行多次讨论，达到在毛泽东思想基础上统一认识的目的。同时，每一个党委委员除了在党委会内过组织生活以外，还在各自的岗位上同普通党员编在一个党小组内过组织生活，增强党的观念，遵守党的纪律，服从党的决议。"},{"type":"paragraph","text":"在加强无产阶级党性教育的过程中，这个厂的党委成员深深体会到改造世界观的重要性。他们根据林副主席关于“离开世界观的改造，就不能很好地增强党性锻炼”的指示，既做革命动力，又做革命对象，自觉地在改造客观世界的同时改造自己的主观世界。"},{"type":"paragraph","text":"去年十月，有的党委成员在成绩面前产生了“看过去满不错，看现在也可以，想今后差不离”的思想苗头，党委发现后，立即组织全体委员学习毛主席关于“虚心使人进步，骄傲使人落后”这一教导，并且进行开门整风，开展反对骄傲自满，提倡谦虚谨慎的自我教育活动，使大家进一步提高了继续革命的觉悟。"},{"type":"paragraph","text":"为了不断提高“一班人”改造世界观的自觉性，工厂党委还实行了两项制度：第一，坚持干部参加集体生产劳动的制度。绝大部分委员在车间顶班生产，和工人同吃、同住、同劳动、同学习，坚决反对“官”气，密切联系群众，虚心向群众学习。第二，坚持学习毛主席的哲学著作。党委成员结合实际斗争，认真学习和运用毛主席的哲学思想，不断批判唯心论和形而上学，增强无产阶级党性，加速思想革命化。党委委员、二车间党支部书记在做思想政治工作中，对一个青年女工缺点看得多，优点看得少，认为她的毛病改不了，对她的态度简单生硬。后来，这个委员认真学习了毛主席的光辉哲学思想，检查了自己头脑中的形而上学，深挖“群众落后论”的余毒，多次和这个女工谈心，热情帮助她，使这个女工的思想面貌发生了很大变化，去年年底被评为“五好”工人。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"两条路线斗争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"515dcd1037"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
