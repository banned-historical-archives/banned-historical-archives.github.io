script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"打退资产阶级“糖衣砲弹”的疯狂进攻青年团员沈伟铭英勇检举不法资方奸商黄毓嘉用尽笼络、摸底、污蔑等诡计都告失败","authors":[],"dates":[{"year":1952,"month":2,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　青年团员沈伟铭是嵩山区金陵东路义泰祥钟表店的职工，他又是基层工会的组织干部，一向很得到群众的信任。在五反斗争开始时，他就着手收集资方代理人黄毓嘉偷漏税款的材料。同时他又团结店内青工，揭穿资方向他们摸底细的阴谋及排除落后分子的冷嘲热讽，坚决检举资方的不法偷漏行为。"},{"type":"paragraph","text":"黄毓嘉虽然昌沈伟铭的业师，但由于沈伟铭入团后阶级觉悟大为提高，及最近听了五反斗争的动员报告后，就决心与逃税违法的资方划清界限。他站稳了阶级立场，首先向组织坦白了在一九五○年收受黄毓嘉私人给他的七万元钱，然后他写信给上级工会，检举资方在两年内偷漏了四十余双名牌手表的税款，并以巧妙的手法将应付税款移转在修理部帐内。他又揭露资方在五反运动中仍旧拿“糖衣砲弹”打职工的阴谋，如黄毓嘉在春节前将原来还未协议好的一个半月年奖，忽然很慷惭地自动增加到二个月，而且全部现付，企图以此笼络职工。同时又伪装坦白，要求职工向他提意见。但经过沈伟铭揭发他的阴谋诡计后，该店职工仍旧站稳立场。黄毓嘉又施出无赖手段，扬言职工也参与偷漏行为，并污衊职工也分得利益。他又胡说:大家的手都不干净，要坦白大家一起去坦白。毒辣地想拖大家一起“落水”。然而这一切都阻挡不住沈伟铭检举资方偷漏的决心，今后他将继续深入收集材料，检举同业中有类似义泰祥的偷漏行为。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bce58fa501"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
