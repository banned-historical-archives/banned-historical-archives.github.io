script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoistlibrary","name":"马列毛图书馆","internal":false,"official":false,"type":"db","author":"网络资料","files":"","article":{"title":"什么是毛主义共产党？","authors":["法国毛主义共产党"],"dates":[{"year":2016}],"is_range_date":false,"comment_pivots":[],"comments":[],"page_start":0,"page_end":0,"description":"","parts":[{"type":"paragraph","text":"法国毛主义共产党 二〇一六年"},{"type":"paragraph","text":"这是一份介绍法国毛主义共产党的宣传册的译文。"},{"type":"paragraph","text":"你觉得我们会喜欢社会的不公平吗？比如说，工作环境简直不像是给人准备的？再比如说，左翼和右翼的政客都不代表我们，选举只是个笑话？你觉得他们花上数百万去轰炸叙利亚和阿富汗是个疯狂的举动吗？你觉得所有人都应该拥有像样的住房，和不被金钱所限制的医疗保障和休闲时间吗？你觉得当我们每个月都在充当苦力中度过，有些人甚至无家可归的同时，几百万流入了老板们的腰包是一件十分耻辱的事吗？如果你这么觉得，我们的党就是为了你准备的。"},{"type":"paragraph","text":"我们的计划就是革命。是建设我们的权力，人民的权力。是去阻止那些他们在国外发动的战争，让所有人过上和平的生活。是活得更好，更加不同，是让我们在每一天都自己决定我们应该生产什么，生产多少，如何去生产，是为和我们一样的人民服务，而不是去服务那个只想着利润的统治着我们的阶级。是去创造一个让学校真正对学生负起责任，而不是只想着让他们去互相竞争的社会。是去创造一个我们喜欢自己的工作的社会，一个没有工头逼迫我们”加快工作效率“的社会，一个我们拥有更多的自由时间的社会。是去创造一个没有种族主义，男女平等，自然受到保护的社会。是去与不公正斗争，去创造一个崭新的世界。"},{"type":"paragraph","text":"政客们是不可能做到这一切的。这个系统是被操纵的，选举什么也实现不了。我们必须丢掉关于他们的一切幻想。我们唯一的希望，我们的力量，就是组织起来准备推翻资产阶级专政，建设人民的权力。他们有军警和武器，但我们有人数和思想。"},{"type":"paragraph","text":"我们不怕起来斗争。"},{"type":"paragraph","text":"什么是毛主义共产党？"},{"type":"paragraph","text":"毛主义共产党是一个革命组织。它建立在超过一个世纪的斗争经验之上，并与其他国家的力量联合在一起（比如意大利，德国，摩洛哥，突尼斯，土耳其，印度，菲律宾，阿富汗，美国，加拿大，巴西……）为法国革命做准备。我们相信，只有一个强大的组织，一个能够作为所有不再支持这个系统的人们，还有不再对统治者们卑躬屈膝，想要一场人民战争的反抗者的指挥部的组织，才能面对一个强大的敌人。我们的目标就是继续建设毛主义共产党。我们要在四面八方发展战斗组织：在大学和中学里，在建筑工地上，在写字楼和工厂里，在我们的街区里，和妇女，还有无证移民一起。"},{"type":"paragraph","text":"它和其他的党派，那些不停撒谎，不断准备参加选举的党派完全不同！作为一个为主要是被剥削者和被压迫者的需求服务，一个进行斗争的组织，毛主义共产党要和这个系统决裂。"},{"type":"paragraph","text":"毛主义共产党是一个为那些想要从根本上改变这个社会的人服务的共产主义政党。我们是大多数人！它是一个毛主义的党，是现在全世界组织得最好的革命政党。毛主义吓不倒我们，但却让资产阶级心惊胆战。毛主义共产党不是一个“宗派主义”组织，而是纪律严明，时刻处于进攻状态。"},{"type":"paragraph","text":"耻辱的终结就在今天。通过建设我们的党，我们决定了自己的道路，用自己的双手来解决面临的问题。这里也有你的一席之地。如果你想向革命的方向进发，加入毛主义共产党吧！"},{"type":"paragraph","text":""}],"alias":""},"tags":[{"name":"人民战争","type":"主题/事件"},{"name":"毛主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"649df5c750"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
