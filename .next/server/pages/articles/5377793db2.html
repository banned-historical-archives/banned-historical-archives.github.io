script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"批臭“技术第一”的资产阶级谬论","authors":["齐向东"],"dates":[{"year":1968,"month":8,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"批臭“技术第一”的资产阶级谬论"},{"type":"paragraph","text":"北京维尼纶厂甲醛车间　齐向东"},{"type":"paragraph","text":"我们伟大的领袖毛主席最近教导我们：“要无产阶级政治挂帅，走上海机床厂从工人中培养技术人员的道路。”我们从亲身经历中深深地体会到毛主席的这一指示无比正确！无比英明！无比伟大！"},{"type":"paragraph","text":"“政治挂帅”，还是“技术挂帅”，“政治第一”还是“技术第一”，这是毛主席的无产阶级革命路线和中国赫鲁晓夫的反革命修正主义路线在工交企业方面长期斗争的焦点，是关系到哪个阶级掌握企业领导大权的问题。“技术第一”的谬论，实际上是中国赫鲁晓夫为了掩盖其疯狂反对无产阶级政治挂帅，变无产阶级专政为资产阶级专政而放出的一颗烟幕弹。中国赫鲁晓夫鼓吹“技术第一”，“醉翁之意不在酒”，在于复辟资本主义。鼓吹“技术第一”，势必推行“专家路线”，让一些资产阶级“专家”掌握企业大权，专工人群众的政。这就是中国赫鲁晓夫阴谋复辟资本主义而耍弄的政治魔术。"},{"type":"paragraph","text":"我们坚持无产阶级政治挂帅，批判“技术第一”的谬论，决不意味着我们不要技术；恰恰相反，只有突出无产阶级政治，搞好人的思想革命化，才能真正在技术上攀登新的高峰，才能促进技术本身以资本主义国家所梦想不到的速度和规模向前迅猛发展。实践证明，只有那些对毛主席的无产阶级革命路线无限忠诚的革命工人和革命技术人员，才能不为名，不为利，不畏艰险，不怕困难，才能发挥集体的无穷的智慧，在生产技术上作出巨大贡献。而那些套上个人名利精神枷锁的旧的资产阶级技术人员，不但在生产技术上难以作出重大的贡献，而且必然压制群众的创造，阻碍技术的发展，并给生产造成浪费。突出无产阶级政治，突出革命群众的作用，就一通百通，就一定能够攀登科学技术的高峰，促使生产和技术高速度发展；突出技术，突出资产阶级技术“权威”，坚持“专家路线”，反而必然阻碍技术的发展，结果一事无成。生活的辩证法就是如此。"},{"type":"paragraph","text":"我们甲醛车间的生产，在无产阶级文化大革命中发生的巨大变革，再一次证明了这一个真理。"},{"type":"paragraph","text":"文化大革命以前，厂里的走资派推行“专家路线”，我们甲醛车间的大权把持在旧的资产阶级技术人员手里。他们个人名利思想相当严重，缺乏生产实践经验，却又看不起工人群众。我们工人为了给国家多生产甲醛，早就提出了一项重要的技术革新措施，但是他们认为不行，唯一的理由是：本本上没有这种规定。就这样，工人们这项重要建议就被打入冷宫，一直压了两年多。"},{"type":"paragraph","text":"无产阶级文化大革命中，经过反复的较量，我们无产阶级革命派终于掌握了车间的领导大权。我们立即成立了由革命工人、革命技术人员、革命干部组成的“三结合”战斗小组，重新研究了两年多以前工人们提出的那项增产的技术革新建议，受到重要的启发。我们在修机车间老工人的帮助下，只用三天的时间，就突破了过去三年还没突破的技术难关，使甲醛生产又跃增百分之二十七以上。这生动地说明了：无产阶级政治挂帅，是高速度发展生产和技术的光明大道；而中国赫鲁晓夫鼓吹的“技术第一”，就是要由资产阶级技术“权威”垄断大权，专工人阶级的政，并使生产和技术的发展走进一条死胡同中。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"革命三结合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5377793db2"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
