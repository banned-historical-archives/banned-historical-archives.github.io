script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"d2ac3f26-5bb1-45c7-afe7-3c880e639bae","name":"文革通讯第34期","internal":false,"official":false,"type":"pdf","author":"浙江工农兵美术大学红卫兵战斗队、毛泽东主义红卫兵","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives18/main/d2ac3f26-5bb1-45c7-afe7-3c880e639bae.pdf"],"article":{"title":"毛主席的三点指示","alias":"","parts":[{"type":"paragraph","text":"雁革文手源"},{"type":"paragraph","text":"来拿富文革通"},{"type":"paragraph","text":"公司毛主席是当代无产阶级最杰出领袖，是当代最伟大的天才。"},{"type":"paragraph","text":"毛泽东思想是马克思列第34期首央中"},{"type":"paragraph","text":"宁主义发展的一个蕲新阶"},{"type":"paragraph","text":"段，是当代最高水平的马克内部参考洋意煲存联总"},{"type":"paragraph","text":"思列宁主义，是当代改造人"},{"type":"paragraph","text":"们灵魂的马克思列宁主义、"},{"type":"paragraph","text":"今日八版阳敬祝伟大的领袖"},{"type":"paragraph","text":"1967.5.19"},{"type":"paragraph","text":"是无产阶级最强大的思想武毛主席"},{"type":"paragraph","text":"器。浙江工农兵美术大学"},{"type":"paragraph","text":"林彪万寿无疆"},{"type":"paragraph","text":"红卫兵战斗队"},{"type":"paragraph","text":"毛泽东主义红卫兵心文按：为了使广大读者能更多地看到中央首长的指示，以促进本单位的无产阶级文化大革命的进展，故我们自本期起，专门收集一些我们未刊登的，而又是比较重要的中央首长讲话，汇编出专刊。同时希望广大的读者同志能协助我们做好这一工作，把此专栏办好。为了使《文革通讯》更好地为运动服务，使它成为造反派的互通情报，上传下达的宣传毛泽东思想的工具，因此希望中广大读者能提出宝贵意见，共同把《文革通讯》办好。“业”中街，“#”中大#"},{"type":"paragraph","text":"大贵的是个毛主席的三点指示意主不"},{"type":"paragraph","text":"青政品区主席听了林副主席三个问题的报告，主席讲：这是一个很好的报告。并讲了三点指示："},{"type":"paragraph","text":"一、依靠群众。这一条是主要的，我们都是从群众中来的嘛！群众就是工农兵学商。中央办公厅所属机关的干部都是群众嘛？工作主要是群众做的，靠少数领导人是不行的，也是不够的。哪一样也不能离开群众，要有群众观点是思意的口年命的主我未我学同其味天和活志同工）翻二）依靠军队。我们的军队不仅会打仗，而且会做群众工作，宣传工作，生产工作等，军队内的很多干部，很小参加军队，很少读书，文化是在部队慢慢提高的，思想比较单纯。军队与地方不同，没有地权，没有财权，说走就走啦。省里有地盘，军队没有地盘。军队还有一条组织纪律性强，动作快，如沈阳军队的支左、支工支农经验，中央批转以后全军在二十一天内就行动起来了。如果是地方传来传去行动很慢价文工#价要人十#的#人价对当三要依靠干部。干部绝大多数是好的，很多事要让干部去办，政策靠他们去执行，有些省委书记要赶快解放出来，要他们好好检讨，有的省过去犯了错误，就是因为他们害怕群众，动员一些人去保护他们，结果害了自己#当辣未干，人贝香价众不人的击以上是毛主席关于无产阶级文化大革命三依靠指示出价衣式因、旅当价#出寒高根据中共中央办公厅主任汪东兴同志传达毛主席在几天前对他讲的三点指示的纪录。中姑汽天，义主会#的义主##思主不价中命革大文"},{"type":"paragraph","text":"主席永远是我门学习的最高典范大文"},{"type":"paragraph","text":"山工品丹主席生活记实山中首中国装花毛主席的一双拖鞋穿了十几年，常送去修补，他老人家经常穿的一双皮鞋已经十六年，上面已经裂了大大小小许多口子。寺"},{"type":"paragraph","text":"山工的男人世荣爱创产天最山工"},{"type":"paragraph","text":"天印"},{"type":"paragraph","text":"一次，一个“新影”摄影工作人员，因工作需要，到主席那儿去，看到院子里晒了一件衬衣，领子，袖口等地方打了许多补钉。他以为是一位炊事员的，后来才知道是我们伟大领袖毛主席的"},{"type":"paragraph","text":"▲主席常常一天只睡二、三小时，甚至通宵不眠。一天，一个“新影”摄影人员，因主席接见外低"},{"type":"paragraph","text":"宾，去执行任务，见到主席后，大家告诉他，主席已经有两天两夜没睡了。"},{"type":"paragraph","text":"▲主席特别关心广大群众的身体健康，经常在全国视察。一次在某地的一个人民公社，主席对社领导讲：要关心社员们的健康，大人每天睡七、八小时，小孩可睡九小时以上，夏天劳动休息时，可以躺在地头上，天冷休息时，就不要躺在地头上了，容易感冒。要果：志同青正）"}],"authors":["毛泽东"],"dates":[{"year":1967,"month":5,"day":19}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1},"tags":[{"name":"毛泽东","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"军队支左","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"66250f86d0"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
