" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"毛泽东转发华北局关于河北省委的几项决定和河北打虎任务的批语","authors":["毛泽东"],"dates":[{"year":1952,"month":2,"day":4}],"is_range_date":false,"parts":[{"text":"毛泽东转发华北局关于河北省委的几项决定和河北打虎任务的批语","type":"title"},{"text":"毛泽东","type":"authors"},{"text":"各同志：","type":"appellation"},{"text":"华北局关于河北省委的几项决定及规定河北省打虎数目，请在你处党刊上发表。河北省（不包括京津两市）人口三千万，规定打小虎二千三百只，大虎二百只，这是适当的。请各省按照人口及其他特点规定自己的打虎计划。目前的特点，正像镇反初期同志们对于反革命的严重性估计不足一样，是对于大贪污分子的存在估计不足，就是说存在着严重的右倾思想，必须不断地给以批判，才能克服此种错误思想。其严重者须由各中央局、分局和军区党委做出单独的决定，如同华北局对河北省委所做的决定那样，并且要迅速，不要迟疑不决。","type":"paragraph"},{"text":" 毛泽东二月四日","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5b507c9ff1"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
