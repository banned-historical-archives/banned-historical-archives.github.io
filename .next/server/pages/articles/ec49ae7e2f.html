" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoistlegacy.de-812","name":"对柳铁关于因‘文革’中参与杀人而受到党纪政纪处分者的工资是否升调的请示的批复","author":"广西自治区党委整党办公室","internal":false,"official":false,"type":"unknown","files":[],"article":{"title":"对柳铁关于因‘文革’中参与杀人而受到党纪政纪处分者的工资是否升调的请示的批复","dates":[{"year":1984,"month":5,"day":14}],"is_range_date":false,"authors":["广西自治区党委整党办公室"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"中共广西壮族自治区党委整党办公室, 处理“文革”遗留问题、清理“三种人”文件汇编(第四册), 276-277","tags":[{"name":"工资","type":"主题/事件"},{"name":"文革","type":"主题/事件"}],"parts":[{"type":"title","text":"对柳铁关于因“文革”中参与杀人而受到党纪政纪处分者的工资是否升调的请示的批复"},{"type":"paragraph","text":"桂整办〔1984〕12号"},{"type":"paragraph","text":"柳铁党委、并各地、市委，区直各单位党组（党委）："},{"type":"paragraph","text":"柳铁党委处遗领导小组5月3日《关于参与打死人给予党内警告行政记过处分的人员能否缓调或不调工资的请示报告》收悉。国务院国发（1982）140号文件在关于不调工资的五种情况中规定：“极少数思想品质恶劣，以及其他原因，群众意见很大，不同意其升级的人员，均不能升级。”目前我区“处遗”工作中，正在处理杀人凶手的时候，对这些人的升调工资问题，应充分考虑遗属和群众的意见。我们同意柳铁报告中所提建议，对于参与打死人的国家职工，凡受到党纪、政纪处分，群众意见很大，不同意其升级的人员，这次调整工资中一律不得升级。凡涉及“文革”参与杀人职工的工资调整问题，以前的文件精神和本文件不一致的，照本文件执行。区党委整党办公室"},{"type":"paragraph","text":"一九八四年五月十四日"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ec49ae7e2f"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
