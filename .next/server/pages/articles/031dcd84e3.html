script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"蒙古大人民呼拉尔举行首次会议  补充和修改了宪法  选举了国家领导人  泽登巴尔斥南斯拉夫修正主义给工人运动带来巨大危害","authors":[],"dates":[{"year":1960,"month":7,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"蒙古大人民呼拉尔举行首次会议"},{"type":"paragraph","text":"补充和修改了宪法  选举了国家领导人"},{"type":"paragraph","text":"泽登巴尔斥南斯拉夫修正主义给工人运动带来巨大危害"},{"type":"paragraph","text":"新华社乌兰巴托6日电　蒙古人民共和国第四届大人民呼拉尔第一次会议7月5日到6日在乌兰巴托举行。这届大人民呼拉尔的代表是在6月19日选举出来的。"},{"type":"paragraph","text":"会上，蒙古人民革命党中央委员会第一书记、部长会议主席泽登巴尔作了关于补充和修改蒙古人民共和国宪法草案的报告。"},{"type":"paragraph","text":"泽登巴尔在报告中谈到了蒙古人民共和国自1940年通过宪法以来在社会主义建设方面所取得的巨大成就。他指出，在这期间，蒙古建立了许多新的重要工业部门，1959年的工业产值比1940年增加了四点八倍，蒙古人民共和国已经从一个畜牧业国家变成农业—工业国。保证本国粮食需要的任务正在胜利地完成中。"},{"type":"paragraph","text":"报告人指出，宪法的序言应当阐明蒙古人民共和国的产生和发展情况、它的最终目标和外交政策的原则，以及蒙古人民革命党的状况。"},{"type":"paragraph","text":"泽登巴尔谈到苏联人民的兄弟援助的重大意义。他接着说，宪法草案中指出，蒙古人民共和国的最高职责以及它的全面繁荣和进一步加强独立的最重要的条件是：经常关心和全力加强社会主义国家人民在马克思列宁主义原则基础上的团结一致。"},{"type":"paragraph","text":"泽登巴尔谴责了修正主义者、特别是南斯拉夫修正主义者的立场，并且指出他们给国际工人运动带来的巨大的危害。泽登巴尔说，蒙古人民和政府完全赞同苏联和社会主义阵营在重要国际问题上的政策，并将坚定地反对帝国主义集团的侵略阴谋、为缓和国际紧张局势和争取持久和平而斗争，竭力巩固以苏联为首的社会主义阵营的团结一致。"},{"type":"paragraph","text":"在两天的会议上，有三十多个代表发了言，表示同意泽登巴尔的报告。最后，大会一致通过了经过补充和修改的蒙古人民共和国宪法。"},{"type":"paragraph","text":"大会选举了大人民呼拉尔主席团，桑布继续当选为主席团主席，巴尔吉尼雅姆为副主席。"},{"type":"paragraph","text":"大会通过了新的部长会议组成名单，泽登巴尔连任部长会议主席一副主席是莫洛姆扎木茨，副主席是拉姆苏伦、迈达尔、扎格瓦拉尔。"},{"type":"paragraph","text":"大会通过任命云登道奇尔为国家检察总署总检察长，达姆丁当选为最高法院院长。"},{"type":"paragraph","text":"蒙古人民革命党中央委员会第二书记曾德当选为本届大人民呼拉尔主席。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"031dcd84e3"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
