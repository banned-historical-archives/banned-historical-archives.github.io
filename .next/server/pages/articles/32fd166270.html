" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共中央关于同意公布施行上海市私营企业雇用临时工暂行办法草案的批复","authors":[],"dates":[{"year":1949,"month":10,"day":20}],"is_range_date":false,"parts":[{"text":"中共中央关于同意公布施行上海市私营企业雇用临时工暂行办法草案的批复","type":"title"},{"text":"上海市委：","type":"paragraph"},{"text":"酉真电所拟私营企业雇用临时工暂行办法草案，中央已略加修改，特全文发给你们，望公布施行。","type":"paragraph"},{"text":" 中央酉哿","type":"paragraph"},{"text":"附：","type":"paragraph"},{"text":"上海市委关于私营企业雇用临时工暂行办法草案的请示","type":"subtitle"},{"text":"（一九四九年十月十一日）","type":"subtitle"},{"text":"新华总社：","type":"paragraph"},{"text":"请即转中央审查。","type":"paragraph"},{"text":"上海市私营企业雇用临时工暂行办法草案","type":"subtitle"},{"text":"一、各业各厂为了生产或工作的需要，及无长期连续性之工作，应订立短期劳动契约直接雇用临时工。劳动契约须由劳资双方签字，并由劳资双方各执一份，以为凭证。","type":"paragraph"},{"text":"二、临时工之工资待遇及解雇办法，在订立劳动契约时，由劳资双方协商订定之。","type":"paragraph"},{"text":"三、各业各厂雇用临时工总数不得超过全体正式工百分之二十，但资方因生产上或工作上之必要，得申请劳动局批准增加之。","type":"paragraph"},{"text":"四、临时工之短期劳动契约期满后，资方认为无继续工作之必要时，得按照契约规定解雇之。","type":"paragraph"},{"text":"五、临时工在订约前，应有试工期，其时间不得超过七日，工资照给。","type":"paragraph"},{"text":"六、临时工短期劳动契约期满后，资方如因生产或工作之必要，尚须雇用临时工时，仍应雇用原有临时工人，继订短期劳动契约，前后契约之间隔期间，如不因生产或工作之需要而停止者，得以连续工作论。","type":"paragraph"},{"text":"七、临时工每期工作时间，以不超过三个月为原则，如连续工作满六个月后，而资方仍继续该项生产营业者，应改为正式工。","type":"paragraph"},{"text":"八、临时工于短期劳动契约所订期限满期前，劳资双方均不得任意中断契约，由于资方原因中断契约者，资方应发足至期满时止之工资。由于劳方自愿中断契约或因劳方确实违犯厂规而被开除者，除应得之工资外，不得有其他要求。劳资双方任何一方关于契约之中断，均应于前七日预告对方。","type":"paragraph"},{"text":"九、凡特殊性之短期工作，经劳动局认为必要时，其劳动契约得不受本办法之限制。","type":"paragraph"},{"text":"十、季节工暂照劳资双方原有契约办理，如有争议，任何一方得申请劳动局调处之。","type":"paragraph"},{"text":"十一、本办法得适用于上海市各公营企业。","type":"paragraph"},{"text":"十二、本办法自公布之日起施行。","type":"paragraph"},{"text":"十三、本办法解释与修改之权在军管期属本市军事管制委员会，军管时期结束后，属本市人民政府。","type":"paragraph"},{"text":" 上海市委十月十一日","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"32fd166270"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
