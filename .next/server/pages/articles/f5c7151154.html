script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"剥削重重乌烟瘴气 高桥民众不见天日","authors":[],"dates":[{"year":1946,"month":9,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【镇江通讯】高桥是镇江的一个市镇，地是三面环江的沙洲，东而隔江耸峙着巍峨的图山。胜利前，高桥有时落到敌伪的手里，有时被游击队收复，收复后又自动引退，于是人民便遭受到敌伪的蛲杀搜查敲诈，敌伪勾结了大批地方上的恶棍，对人民加以重重的压迫。胜利后，老百姓以为从此可以重见天日了，总算不白苦了八年，于是国军来了，兴奋的含泪欢迎他们，慰劳他们，然而谁知道这批国军有部分是个军改编的，他们熟悉地方情形，知道谁有钱，谁可以敲，一时抓人和敲竹杠的恐怖气氛，在每个高侨人的心头落下了阴影，从前的恶棍非但没有被检举被处置，反而以另一姿态出现了。老百姓希望安安逸逸过日子，只要胜利和平，有日子过，谁肯打草惊蛇来检举汉奸?至于苛捐什税，那更名目百出，“公粮”“田亩捐”“马草捐”“自卫队捐”……尤其奇怪的是出了捐没有收条，种田的老百姓根本不懂得什么捐，在外埠做生意的又怕找麻烦，天高皇帝远，有谁能奈何他们?"},{"type":"paragraph","text":"八月十八号是区长到高桥一周年纪念，大街上鸣锣庆祝，乡保长参谒恭贺，老百姓暗里叽咕。"},{"type":"paragraph","text":"保长时常会接到命令，就是某要人(地方要人)有毛巾或其他日用品要“配给”老百姓，所谓配给，只是老爷们的副业，价目比市面上贵，货色也并不高明。"},{"type":"paragraph","text":"前几天忙著调查户口，每人连生日总得写上户口调查表，并缴费三百元，调查大员驾到时，闹得鸦犬不宁，"},{"type":"paragraph","text":"因苛捐什税的缘故，每个种田的都怨声说“这个倒头田不要种”，“种田他本”，这里的居民完全靠种田和经商来生活，田既不种，就得经商，但是外埠商业不景气，做生意已不是路。高桥的老百姓在超经济的剥削下，只有坐以待毙，高桥的前途，实在令人担心啊!(民治社，六日)"}],"comments":[],"origin":"民治社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f5c7151154"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
