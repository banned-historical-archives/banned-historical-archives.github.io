script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"关心生产是假  复辟倒退是真  甘肃白银有色金属公司职工在各级党组织领导下联系本单位阶级斗争历史，深揭深批“三项指示为纲”修正主义纲领的反动性和欺骗性","authors":[],"dates":[{"year":1976,"month":4,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"关心生产是假  复辟倒退是真"},{"type":"paragraph","text":"甘肃白银有色金属公司职工在各级党组织领导下联系本单位阶级斗争历史，深揭深批“三项指示为纲”修正主义纲领的反动性和欺骗性"},{"type":"paragraph","text":"据新华社兰州一九七六年三月三十日电　甘肃省白银有色金属公司广大职工在各级党组织领导下，认真学习无产阶级专政的理论，联系阶级斗争的历史，深揭深批党内那个不肯改悔的走资派抛出的“三项指示为纲”的修正主义纲领，批判他打着发展国民经济的幌子，取消阶级斗争为纲，篡改党的基本路线，对文化大革命进行反攻倒算的行径。"},{"type":"paragraph","text":"反击右倾翻案风的斗争开展以后，白银有色金属公司党委带领广大群众，积极投入这场伟大的斗争。全公司所属各厂矿、单位举办了领导干部和工人理论队伍参加的学习班，各级领导干部下车间、工地，帮助基层单位组织群众看书学习。广大职工纷纷开批判会，办大批判专栏，把斗争的矛头指向党内那个不肯改悔的走资派。职工们在批判中，联系本单位阶级斗争的历史，深刻揭露党内那个不肯改悔的走资派炮制的“三项指示为纲”的反动性和欺骗性。这个公司是我国第一个五年计划期间开始重点建设的一个大型综合性冶金企业，一九六○年建成投产以后，在刘少奇修正主义路线影响下，一小撮阶级敌人一度篡夺了企业的领导权，他们招降纳叛，结党营私，和社会上的阶级敌人结合在一起，贪污盗窃，投机倒把，对工人实行资产阶级专政，把一个社会主义企业变成了资产阶级的独立王国。一九六四年社会主义教育运动中，这个公司的广大职工在党的领导下，以阶级斗争为纲，奋起批判修正主义，批判资产阶级，重新夺回了企业的领导权。经过无产阶级文化大革命和批林批孔运动，广大职工批判刘少奇、林彪的修正主义路线，不断开展上层建筑领域里的革命，认真贯彻执行“鞍钢宪法”，深入开展工业学大庆的群众运动，使全公司革命和生产的形势越来越好，成为甘肃省工业学大庆的先进企业之一。广大职工回顾这一段触目惊心的阶级斗争历史，剖析“三项指示为纲”的反动实质，进一步看清了党内那个不肯改悔的走资派的险恶用心。"},{"type":"paragraph","text":"白银有色金属公司的广大职工在革命大批判中，还联系工业战线的斗争实践，批判党内那个不肯改悔的走资派破坏社会主义建设的一系列谬论。他们说，党内那个不肯改悔的走资派抛出“三项指示为纲”的修正主义纲领以后，就到处游说，煽风点火。他打着关心“四个现代化”、关心国民经济的幌子，叫嚷这也要“整顿”，那也要“整顿”，各行各业都要“整顿”，说什么“企业问题不少”，已经“积重难返”了，“不整顿不行”。他散布“今不如昔”的谬论，活象当年孔老二哀叹人们不修仁义，不讲礼乐，天下无道那样，就是为复辟倒退大造舆论。他所以起劲地挥舞“整顿”这把板斧，就是要砍掉无产阶级文化大革命的伟大成果，砍掉社会主义的新生事物，一句话，要砍掉无产阶级专政，恢复资产阶级已经失去的“天堂”。他关心“四个现代化”是假，复辟资本主义是真；关心国民经济是假，挖社会主义墙脚是真。"},{"type":"paragraph","text":"许多职工说，在整个社会主义历史阶段，主要矛盾是无产阶级同资产阶级的矛盾。发展国民经济，实现四个现代化，究竟靠什么？我们白银公司的实践证明，首先要靠正确的思想政治路线，靠抓阶级斗争这个纲。我们公司能有今天这样的大好形势，就是因为经过社会主义教育运动和无产阶级文化大革命，抓了阶级斗争这个纲，不断同修正主义斗，同资产阶级斗，同违背毛主席革命路线的各种错误思潮和错误倾向斗，革命和生产才有了迅猛发展。我们一定要在以毛主席为首的党中央领导下，把这场反击右倾翻案风的斗争进行到底，“抓革命，促生产”，夺取社会主义革命和社会主义建设的新胜利。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"name":"甘肃文革","type":"人物"},{"name":"批林批孔","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"20b65c67bc"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
