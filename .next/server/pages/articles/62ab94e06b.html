script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"印尼民族阵线秘书长强调召开第二次亚非会议重要意义亚非人民团结是反帝斗争最有效武器严斥现代修正主义者美化美帝，阻挠世界人民革命斗争","authors":[],"dates":[{"year":1964,"month":3,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【据新华社雅加达25日电】　印度尼西亚民族阵线秘书长苏迪比约二十四日晚间在雅加达发表讲话说，只有依靠人民的斗争，才能粉碎帝国主义和殖民主义的剥削。"},{"type":"paragraph","text":"他是在印度尼西亚科学家协会为行将召开的第二次亚非会议而举办的学术讨论会闭幕会上这样说的。"},{"type":"paragraph","text":"苏迪比约说，亚非人民之间的牢固的团结和合作是鼓舞并扩大世界人民粉碎帝国主义的斗争的最重要的资本和最有效的武器。"},{"type":"paragraph","text":"他说，召开第二次亚非会议是为了加强反帝的团结。“因此，我们不能后退一步。我们应该继续前进，为会议的胜利召开而努力。”"},{"type":"paragraph","text":"苏迪比约说，在亚洲、非洲和拉丁美洲等地，正在进行着一场反对帝国主义和殖民主义的激烈斗争。这证明全世界人民的政治觉悟的成熟以及帝国主义的侵略、干涉和颠复政策的日益破产。"},{"type":"paragraph","text":"苏迪比约说，只有现代修正主义者不能理解人民爱国斗争的历史意义。他们不但不支援，反而妨碍和阻挠全世界进步人民的革命斗争。他们认为，民族解放运动是对世界和平的莫大危险。他们公然歪曲帝国主义的本性，甚至美化美帝国主义。他们硬说，帝国主义已不再是人民的敌人，而是能给人民以大米和面包的人了。修正主义者还认为，普遍的人道主义能使人民摆脱由于帝国主义和殖民主义的剥削而造成的困境。"},{"type":"paragraph","text":"苏迪比约指出，修正主义是支持帝国主义者的一支力量，因此，反对修正主义的斗争一点也不能放松。"},{"type":"paragraph","text":"苏迪比约在谈到第二次亚非会议时说，有些人不喜欢召开这个会议，他们说什么“这种会议不能反映世界人民的共同愿望”。他指出，这种说法是错误的，因为亚洲、非洲，特别是东南亚的人民正在进行最激烈的斗争。"},{"type":"paragraph","text":"闭幕会议还通过了呼吁书和决议。呼吁书说，召开第二次亚非会议对加强亚非人民反对帝国主义、新老殖民主义斗争的团结和巩固他们已经取得的成就是最必要的。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"62ab94e06b"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
