script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"英国资产阶级报刊发表文章透露  印度占领军在东巴大肆抢劫","authors":[],"dates":[{"year":1972,"month":1,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"英国资产阶级报刊发表文章透露"},{"type":"paragraph","text":"印度占领军在东巴大肆抢劫"},{"type":"paragraph","text":"新华社一九七二年一月二十五日讯　在苏修社会帝国主义的怂恿和支持下侵占了东巴基斯坦的印度占领军，在东巴基斯坦明目张胆地进行大规模的抢劫。"},{"type":"paragraph","text":"英国资产阶级报刊《卫报》一月二十二日刊登了一篇文章，透露了印度占领军在东巴基斯坦南部城市库尔纳大肆抢劫的情景。这只是印度占领军在整个东巴基斯坦所犯罪行的一个侧面。这篇文章摘要如下："},{"type":"paragraph","text":"印军对库尔纳地区的工厂和机关的有计划的抢劫已触怒了这里的文职官员并使他们感到惊异。"},{"type":"paragraph","text":"然而，用一位官员的话说，这不是“通常的抢劫”。储存机械配件的工厂仓库遭到抢劫，里面的东西装上卡车运到印度去了。"},{"type":"paragraph","text":"抢劫者特别搜寻的是机器发动机。此外，还抢劫打字机、复写机、电话机和其他办公设备。以一家黄麻厂来说，据说几乎每件机器都被抢走了。一位拒绝说出姓名的港务官员说，在战斗结束后，他回到自己的办公室，看到那里已被洗劫一空。电话机、文件橱等等全被抢走了。"},{"type":"paragraph","text":"另一位官员说，这是一种有组织的抢劫，而且有几天是大规模地进行的。"},{"type":"paragraph","text":"估计被抢的机器价值在四十万英镑左右（约合一百万美元）。"},{"type":"paragraph","text":"据这里的官员们说，在同印度之间来去方便的库尔纳地区，另一个问题是来往非法贸易的总数正与日俱增。"},{"type":"paragraph","text":"库尔纳地区（毫无疑问其他地区也是一样）普遍的走私现象表明，同印度之间的贸易是既不受控制也不纳税的。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4b6bb40db0"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
