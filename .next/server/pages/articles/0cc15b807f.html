<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"平顺县今年发生的有关破坏互助合作案件超过以往任何一年","authors":[],"dates":[{"year":1954,"month":11,"day":13}],"is_range_date":false,"parts":[{"text":"平顺县今年发生的有关破坏互助合作案件超过以往任何一年","type":"title"},{"text":"【山西分社13日讯】山西省平顺县随着互助合作运动的迅速发展，农村阶级斗争更加尖锐和复杂。据县公安局的统计，今年以来有关造谣诬告、偷盗农业生产合作社的财产、凶杀、放火等破坏互助合作的案件达69起，超过以往任何一年。","type":"paragraph"},{"text":"今年，全县组织起来的农户占全县总农户的91%，参加农业生产合作社的农户由去年占总农户31.8%发展到今年的43.7%。在农业社迅速地发展中，不少地主、富农分子也钻进了农业社，有的并窃取了社的领导权，担任了社务干部。留在社外的地主、富农分子，则处心积虑地用公开的和隐蔽的办法，进行破坏活动。到目前为止，全县农业生产合作社中有地主、富农和过去的顽伪人员共达429人，在这些人中，有一半以上是表现劳动不积极，有32人公开进行破坏活动。窃得了副社长领导职务的富农分子（已改变成份）一人，担任农业社会计的地主、富农分子有46人，担任股长、保管、生存分队长、生产小组长等社内干部职务者有57人。他们虽在土地改革以后经过改造变了成份，但是旧的仇恨仍未消除，还是乘机会想办法进行报复；有的竟公开殴打干部和农业社中领导骨干。","type":"paragraph"},{"text":"地主、富农分子多为农村的“文化人”，当农业社大量发展的同时，会计人员的训练落后于实际需要，因而这些“文化人”就乘机混进。当他们有了一定职务，且假装积极取得党支部和社内干部信任后，就大肆进行破坏活动。富农分子混入农业社放羊，先后共死羊102只，并把羊赶到山上，吃掉社员播种的林坡达50%左右。寺头村农业生产合作社地主分子申文章，入社后一年没做一个劳动日，秋收分粮很少，心中不满，动员他两个儿子和一户富农、三户过去曾被误斗过的中农，抗拒秋收分配，不要粮食。北社乡农业生产合作社中有一个改变成份的富农分子曹怀仁假装积极骗得了会计职务后，便开始进行破坏活动，挑拨社务干部间的团结，他一面和社长曹启昌说：“你当个社长还没副社长主事，叫人家把社掌握了！”一面又对副社长说：“人家社长还不积极，你们积极顶啥事。”使社内干部分裂，无人领导，生产蒙受损失。他又对许多要求入社的农民说：“农业社要的是好户口，你入社也不能解决困难。”、“入了社和管制对象一样。”在社外的破坏活动也很猖獗。留村乡富农牛怀珠，今年普选中曾拉拢错斗过的中农伪造事实诬告干部。东禅村地富陈贵素、马旺有二人暗地擦掉写着宪法草案的黑板报，打黑炮，用人粪涂了乡政府的牌子。西沟村山庄上地主分子张其昌（未入社）对着毛主席像说：“不是你，老子也不至于这样活。”随即把毛主席像上的眼睛撕掉了。在杏城村流传这样的谣言：“李顺达放个屁，中央奖个旗，郭玉恩拔根毛，新华社登个报。”","type":"paragraph"},{"text":" （郭洁）","type":"paragraph"}],"comments":[],"origin":"新华社《内部参考》1954年11月18日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0cc15b807f"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
