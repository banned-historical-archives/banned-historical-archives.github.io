" crossorigin="">{"props":{"pageProps":{"books":[{"id":"dfdd6b56-5f4e-42e1-af94-ae2ab38cc0b4","name":"毛泽东思想万岁（1913-1943卷）（1968年武汉版）","internal":true,"official":false,"type":"pdf","author":"1968年武汉","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives3/main/dfdd6b56-5f4e-42e1-af94-ae2ab38cc0b4.pdf"],"article":{"title":"在抗大成立三周年纪念大会上的讲话（摘录）","alias":"","parts":[{"type":"paragraph","text":"在抗大成立三周年纪念大会上的讲话（摘录）"},{"type":"paragraph","text":"（一九三九年六月一日）"},{"type":"paragraph","text":"“今天是你们的三周年纪念日。抗大办了三年了，我们的抗战快两年了。抗大是抗日的，抗大的目的是要打倒日本帝国主义，彻底解放中华民族。抗大三年以来创造了很多的坚强的抗日干部，到前綫去，到敌人后方去，打击敌人，消灭敌人。”"},{"type":"paragraph","text":"“今天，我们国内还有很多汪派的人，投降主义者，投降派；他们不餐成抗战到底，他们主张与日本帝国主义耕和，主张妥协、投降。我们要做什么？我们要反对投降。“抗战到底”这是蒋委员长所号召的，全国人民所拥护的。“反对投降，抗战到底”。我们抗大，一致的护。我们抗大的人，不能有-人不抗战到底，不能有一人不反对投降，不能有-人赞成和平妥协的；如果有一个，就不是抗大的学生，是抗大的败类，是中华民族的败类。全国各党派也是-一样，不许有一人和，要全体一致的抗战到底：这就是抗大的根本主张。过去三年是这样，以后三年，以后很多年也是这样。“反对投降，抗战到底”，这就是抗大的方鲜。·.....”"},{"type":"paragraph","text":"中英两国人民站在一条战线上！"},{"type":"paragraph","text":"（一九三九年六月一日）"},{"type":"paragraph","text":"正当中国人民对日本侵略坚决不挠的抗战到了第二周年的时候，英国的援华委员会在全国各地举行了“中国周”以表示援助我们的抗战。我代表朱德同志与八路军的将士，代表我们前和后方医院中的士兵，并且我自也想一，这种同情和关留的表示，是多么使我们戚到兴奋的鼓励啊。我们敬向在国际反侵略阵綫中和我们站在一起的英国人民表示感谢并致热烈的敬礼。"},{"type":"paragraph","text":"中国两年来的抗战已经证明了民主势力抵抗侵略的力量。这两年来的抗战指出了，甚至一个工业落后的，在民族生活上受着各种各样的压追与悔辱的国家，也能满怀着胜利的信心抵抗最野蛮最横暴的法西斯进攻。而且还证明了，不仅不能把中国的抗战和全世界反侵略的力量分开，而且我们给侵略者的打击，已使我们的国家，在护全世界的民主与文明的国际斗争中，在反法西斯的主要障綫中，站到了最前。"},{"type":"paragraph","text":"战争一开始，我们就看见英国人民以物支援我们的抗战，捐给我们医药用品，派送救护队到中国来服务，对我们作了许多实际上同情的表示，这，虽然我们与英国正明了相隔很远，我们的抗战对于英国人民并不是一件无关轻重的事情。但是由于我们抗战在全世界反侵略斗争中所处的地位，我们有权利要求得更多一些，要求比以前所给我们的更多的援助。"},{"type":"paragraph","text":"首先，我们要求你们严格注意你们政府的态度，你们要压迫它来最坚决的行动，不再输出军火给日本。就在几个星期以前，英国在重庆的大使馆与总领事馆，在日本来首都滥肆聂"}],"authors":["毛泽东"],"dates":[{"year":1939,"month":6,"day":1}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":249,"page_end":249},"tags":[{"name":"毛泽东","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"da0e3ae3d6"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
