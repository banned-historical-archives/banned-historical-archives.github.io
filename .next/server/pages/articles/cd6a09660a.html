script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"智利革命共产党全国执委会发表声明坚决支持捷克斯洛伐克人民起来斗争 推翻修正主义的统治驱逐苏修入侵者","authors":[],"dates":[{"year":1968,"month":8,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京二十五日电　圣地亚哥消息:智利革命共产党全国执行委员会二十三日发表声明，谴责苏修叛徒集团出兵占领捷克斯洛伐克，表示最热烈地支持捷克斯洛伐克人民。声明说，捷克斯洛伐克人民通过他们的斗争和团结，将会推翻压在他们头上的叛徒集团，并把苏修入侵者赶出他们的国土。"},{"type":"paragraph","text":"声明说:“无论是苏联还是捷克斯洛伐克，都不是在共产党人的领导之下，而是在背叛马克思列宁主义的叛徒集团和无产阶级世界革命的敌人的控制下。这两个政府的政策都是为了在它们的国家复辟资本主义，为它们国家的官僚资产阶级效劳。苏联领导集团下令对捷克斯洛伐克领土进行军事入侵，符合它的大国沙文主义的政策，并不是为了保卫一个无产阶级政权；符合它的扩张和统治的野心，也符合它的苏联和美帝国主义瓜分世界各地区的观点。”"},{"type":"paragraph","text":"智利革命共产党的声明说，修正主义对捷克斯洛伐克无耻的入侵证实了修正主义在全世界的分崩离析。声明呼吁“仍在老共产党(修正主义的)内的正直的党员抛弃腐朽的领导集团，重新走上马克思列宁主义的道路。”"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cd6a09660a"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
