script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"阿尔巴尼亚报纸谴责印度侵略巴基斯坦  揭露美帝和修正主义者支持印度扩张","authors":[],"dates":[{"year":1965,"month":9,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"阿尔巴尼亚报纸谴责印度侵略巴基斯坦"},{"type":"paragraph","text":"揭露美帝和修正主义者支持印度扩张"},{"type":"paragraph","text":"新华社地拉那七日电　阿尔巴尼亚《人民之声报》今天发表评论，谴责印度侵略巴基斯坦。"},{"type":"paragraph","text":"评论说，印度反动派严重的挑衅和侵略行动表明它继续对邻国采取敌对行动，奉行大国沙文主义和扩张主义的政策，再次暴露了它是双边协议和国际协议的违反者。"},{"type":"paragraph","text":"评论说，印度对巴基斯坦的公开的武装侵略，是在美帝国主义者对巴基斯坦施加压力，进行威胁和讹诈的时候进行的。印度侵略巴基斯坦是美帝国主义和印度反动派之间广泛合作计划的组成部分。"},{"type":"paragraph","text":"评论指出，印度反动派对中华人民共和国也扮演着挑衅和侵略者的角色。尽管遭到了惨败，但是在美帝国主义者和现代修正主义者的怂恿和支持下，印度反动派继续进行敌对的反华运动，在中国边境不断进行挑衅，对中国政府关于正确的解决中印边界冲突的富有建设性的积极努力置之不理。事情越来越清楚，印度事实上早就在为美帝国主义者的侵略和战争计划效劳。"},{"type":"paragraph","text":"评论说，约翰逊政府利用印度当局作为推行其狡猾和欺骗性阴谋的工具。印度政府在越南问题上为美帝国主义的“无条件讨论”奔走，以及最近对巴基斯坦的武装侵略行动，撕去了夏斯特里政府及其朋友——美帝国主义者与现代修正主义者所吹嘘的所谓“不结盟”政策的假面具。"},{"type":"paragraph","text":"评论指出，印度反动派在对外实行扩张主义、对内镇压民主力量的反动政策方面，得到了华盛顿巨大和全面的支持。对印度反动派的这样全面的帮助和支持也来自赫鲁晓夫修正主义者。当印度发动了对中华人民共和国的侵略时，尼赫鲁政府当时不仅得到了美帝的怂恿和公开支持，而且也得到了赫鲁晓夫的怂恿和公开支持。现在，苏联新领导继续热中于奉行他们前任的这个不光采政策。"},{"type":"paragraph","text":"评论说，印度政府不但得到了美国武器，而且得到了苏联所给予的坦克和飞机，甚至在赫鲁晓夫修正主义者的援助下，在印度正兴建生产包括米格军用飞机在内的军事工厂。"},{"type":"paragraph","text":"评论强调说，但是，印度反动派及其支持者帝国主义—修正主义的所有阴险计划，都必将象以往一样遭到失败。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"38051653b6"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
