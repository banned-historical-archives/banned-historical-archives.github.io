" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji48","name":"毛泽东全集第48卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji48.pdf"],"article":{"title":"卜算子·悼艾地同志","alias":"","parts":[{"type":"paragraph","text":"卜算子·悼艾地凹同志"},{"type":"paragraph","text":"（1965年12月）疏枝立寒窗，笑在百花前。奈何笑容难为久，春来反凋残。残固不堪残，何须自寻烦。花落自有花开日，"},{"type":"paragraph","text":"蓄芳待来年"},{"type":"paragraph","text":"[1]艾地（1923—1965），印度尼西亚共产党主要领导人，国际共产主义运动著名活动家。"},{"type":"paragraph","text":"[2]疏枝，指梅花。梅花开放时有花无叶，开花后始生叶，故其枝条稀疏。立寒窗，指梅花在冬末早春时开放，天气寒冷，人们常栽于窗前庭院中，以供观赏。"},{"type":"paragraph","text":"[3]笑，欢笑。形容花儿绽开，似人显露笑容。[4]反，反而。凋，凋谢。残，残缺，毁坏。凋残，花木枯萎，凋谢。"},{"type":"paragraph","text":"[5]固，固然，本来。不堪，不能忍受，表示程度之深。残固不堪残，梅花已经凋零得非常厉害了。"},{"type":"paragraph","text":"[6]蓄芳待来年，意思是说梅花每年都有开放的时候，现在虽然凋谢了，但是明年还会再开放，比喻只要不断地积聚力量，革命运动终会重新崛起。"}],"authors":["毛泽东"],"dates":[{"year":1965,"month":12}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":283,"page_end":283},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"602046dcf8"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
