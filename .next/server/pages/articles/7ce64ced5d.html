script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"为反对新老殖民主义和一切剥削现象而斗争全非工会联合会正式成立许多代表谴责国际自由工联的破坏和分裂行为","authors":[],"dates":[{"year":1961,"month":6,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【据新华社北京31日电】　卡萨布兰卡消息:全非工会代表大会5月30日在摩洛哥的卡萨布兰卡闭幕。会上一致通过成立全非工会联合会。联合会的章程规定，这个联合会的基本原则是:“为反对帝国主义、殖民主义、新殖民主义、封建主义、反动势力以及一切形式的人剥削人现象而斗争”。"},{"type":"paragraph","text":"摩洛哥劳工联合会总书记马佐·本·西迪克当选为全非工会联合会主席；加纳、几内亚、阿联、摩洛哥、怯尼亚、阿尔及利亚和马里的代表当选为联合会书记处的书记。联合会的会址将设在卡萨布兰卡。"},{"type":"paragraph","text":"来自三十八个非洲国家的四十五个工会组织代表团参加了这次在5月25日开幕的代表大会。一些国际工会组织以及中国、苏联和其他国家的工会组织派遣观察员参加了大会。"},{"type":"paragraph","text":"会上通过的全非工会联合会章程号召非洲的所有工会组织为非洲劳动人民的统一和团结以及非洲工会的独立而斗争。这种独立应该是不受政府、外国以及国际工会组织的干涉非洲工会内部事务的基础上的独立。"},{"type":"paragraph","text":"章程规定，属于这个联合会的全国性工会组织不得参加其它国际工会组织。至于已经参加的，规定在十个月内退出。大家知道，非洲国家的若干工会是参加国际自由工会联合会的。"},{"type":"paragraph","text":"章程指出，非洲工会的任务是保障非洲劳动人民在自己的国家内和整个大陆上的团结、为自己的权益、为非洲大陆各国的自由以及政治和经济独立而斗争。联合会支持积极中立和同全世界劳动人民团结一致的原则。"},{"type":"paragraph","text":"代表大会还通过决议，表示支持英勇的阿尔及利亚人民。决议强调指出，阿尔及利亚问题只有在阿尔及利亚自由、独立和领土完整的基础上才能解决。决议宣布撒哈拉是阿尔及利亚领土的不可分割的一部分。"},{"type":"paragraph","text":"大会还就南非联邦局势以及其他问题通过了决议。"},{"type":"paragraph","text":"许多国家的工会代表在大会上发言谴责国际自由工会联合会收买、破坏和分裂非洲工会的行为。桑给巴尔奔巴劳工联合会代表当场宣布他所属的工会退出“自由”工联，并且揭露了“自由”工联的腐败和它的破坏勾当。在这种情况下，“自由”工联的代表退出了会场。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7ce64ced5d"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
