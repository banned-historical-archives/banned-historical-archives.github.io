script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"上海电视台明晚举行电视批判会 批判“三项指示为纲”的修正主义纲领","authors":[],"dates":[{"year":1976,"month":3,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　《人民日报》一九七六年二月二十九日发表了《评“三项指示为纲”》的重要文章，进一步推动了本市各条战线批判“三项指示为纲”，反击右倾翻案风的斗争深入发展。工人阶级是反击右倾翻案风的主力军。为了彻底批判“三项指示为纲”的修正主义纲领，上海电视台定于三月五日晚上六点半举行由上钢五厂、上棉十七厂、沪东造船厂、上海钟表元件厂、上海手表厂、上港五区、上海铁路分局松江中心站等单位的部分工人和干部参加的电视批判会，希望同志们到时收看。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3a6105a9b7"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
