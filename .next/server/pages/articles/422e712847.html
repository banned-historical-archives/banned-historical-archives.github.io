script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji29","name":"毛泽东全集第29卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji29.pdf"],"article":{"title":"对中财委关于全国进出口会议情况摘报的批语","alias":"","parts":[{"type":"paragraph","text":"对中财委关于全国进出口会议"},{"type":"paragraph","text":"情况摘报的批语"},{"type":"paragraph","text":"（1950年8月7日）周、刘、朱、陈、薄、李富春阅后发。"},{"type":"paragraph","text":"文尾两个问题？，特别是第二个问题，请周找有关人员一谈，予以解决。"},{"type":"paragraph","text":"又：政务院所属各部每次召集会议决定政策方针，都应如中财委所属某些部门一样，做出总结性报告，呈报我及中央书记处看过，经同意后，除用政务院、各委或各部自己名义公告执行外，有些须用内部电报通知各地。其方式就如这个电报一样。过去有些部"},{"type":"paragraph","text":"[1]周，指周恩来。刘，指刘少奇。朱，指朱德。陈，指陈云，当时任政务院副总理兼财政经济委员会主任。薄，指薄一波，当时任政务院财政经济委员会副主任。李富春，当时任政务院财政经济委员会副主任。"},{"type":"paragraph","text":"[2]指政务院财政经济委员会1950年8月7日在进出口会议情况摘报中向中央请示的两个问题：（一）易货问题。在一般不许易货的原则下，准备允许冷货易货和与不通汇国家进行易货。这在争取进口物资上是有利的。（二）中南区公私双方一致要求允许汉口开放问题。根据目前我们航运设备能力有限，而汉口外销物资很多（主要是桐油、蛋品）的情况，允许有油柜和冷藏设备的外轮，经过特许，在指定时间、指定航线和严密监督管理下，到汉口装货，直放国外是有利的。"},{"type":"paragraph","text":"对中财委关于全国进出口会议情况摘报的批语门这样做了，有些部门尚未这样做，请周通知所属一律照办。军委所属各部亦然。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"八月七日"},{"type":"paragraph","text":"1950年，为满足国防需要，稳定市场金融，全国人民在增收节支方面做出更多的努力。"}],"authors":["毛泽东"],"dates":[{"year":1950,"month":8,"day":7}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":71,"page_end":72},"tags":[{"name":"李富春","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"422e712847"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
