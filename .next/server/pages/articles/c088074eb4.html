script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"极右翼的反动军人集团接管政权  危地马拉建立新的反共军事独裁","authors":[],"dates":[{"year":1963,"month":4,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"极右翼的反动军人集团接管政权"},{"type":"paragraph","text":"危地马拉建立新的反共军事独裁"},{"type":"paragraph","text":"据新华社一日讯　危地马拉城消息：以危地马拉国防部长恩里克·佩拉尔塔·阿苏迪亚为首的极右翼的反动军人集团在三月三十日晚发动军事政变，推翻了现任独裁总统伊迪戈拉斯，宣布接掌政权，由佩拉尔塔·阿苏迪亚继任总统。"},{"type":"paragraph","text":"以陆军当局名义发表的一项概述新政权纲领的声明，宣布停止宪法保证，解散国民议会，禁止一切政党活动以及“彻底消灭共产主义”。声明表示尊重伊迪戈拉斯独裁政权同帝国主义签订的一切出卖民族利益的国际协定。"},{"type":"paragraph","text":"在发生这次政变的前几天，危地马拉北部山区反政府游击队曾经同政府军发生战斗，反政府武装人员在其他地区也展开了活动。伊迪戈拉斯政府曾经为此在三月二十五日宣布全国处于戒严状态。"},{"type":"paragraph","text":"新的军事独裁政权首脑佩拉尔塔三月三十一日在记者招待会上宣布，戒严状态将无限期地继续下去。他说，他的“新政府将无情地对付共产党人”。"},{"type":"paragraph","text":"他还说，新政府已下令逮捕前危地马拉总统阿雷瓦洛。据报道，阿雷瓦洛已经在三月底秘密地从墨西哥回国，准备参加今秋举行的危地马拉总统选举的竞选活动。"},{"type":"paragraph","text":"被推翻的伊迪戈拉斯已经在三十一日晚到达尼加拉瓜首都马那瓜。他向记者发表谈话说，危地马拉的这次军事政变“对危地马拉是好事，对其他中美国家也是好事”。他还说，他们（指军人集团）能“更好地”打击共产主义。"},{"type":"paragraph","text":"美国国务院的一位发言人昨天表示，危地马拉的这次政变“并不令人感到意外”。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c088074eb4"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
