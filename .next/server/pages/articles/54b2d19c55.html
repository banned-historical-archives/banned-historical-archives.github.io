script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"全军纪念毛泽东百年诞辰　理论研讨会昨在北京召开于永波讲话，强调要把对毛泽东同志的纪念落实　在行动上，全面提高部队战斗力，增强部队凝聚力","authors":["徐京跃","陈维伟"],"dates":[{"year":1993,"month":7,"day":31}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社北京7月30日电　(人民日报记者　陈维伟、新华社记者　徐京跃)全军纪念毛泽东100周年诞辰理论研讨会今天在北京召开。"},{"type":"paragraph","text":"这次会议是经中央军委同意，由总政治部部署并委托军事科学院召开的。来自全军的理论工作者以坚持和发展毛泽东思想、用邓小平同志建设有中国特色社会主义理论指导部队建设和改革为主题进行研究和交流。"},{"type":"paragraph","text":"中央军委委员、总政治部主任于永波在开幕式上讲话。他指出，毛泽东同志是伟大的马克思主义者，伟大的无产阶级革命家、战略家和理论家。在长期的革命实践中，他为中国共产党和我们军队的创立与发展，为中国各族人民解放事业的胜利，为中华人民共和国的缔造和我国社会主义事业的发展，建立了永远不可磨灭的功勋。毛泽东思想是被实践证明了的关于中国革命的正确的理论原则和经验总结，是中国共产党集体智慧的结晶，是我们取得一切胜利的根本保证。作为毛泽东思想主要组成部分的毛泽东军事思想，深刻揭示了中国革命战争的基本规律，极大地丰富了马克思主义军事理论宝库，不仅在中国，而且在世界上都有着重大的影响。在新的历史时期，我们要一如既往地学习和运用毛泽东军事思想，不断加强我军革命化、现代化、正规化建设。"},{"type":"paragraph","text":"于永波指出，邓小平同志是坚持和发展毛泽东思想的光辉典范。邓小平同志关于新时期军队建设的思想，是建设有中国特色的社会主义理论的重要组成部分，是新的历史条件下军队建设和改革的根本依据和指导思想。坚持用这些思想武装全军，是我军沿着现代化道路不断前进的根本保证。"},{"type":"paragraph","text":"于永波强调，从军队来讲，把对毛泽东同志的纪念落实在实际行动上，就是要更加紧密地团结在以江泽民同志为核心的党中央、中央军委周围，不断提高“坚持党的基本路线一百年不动摇”的坚定性和自觉性；就是要坚定不移地走有中国特色的精兵之路，努力实现江主席提出的“政治合格、军事过硬、作风优良、纪律严明、保障有力”的要求，全面提高部队的战斗力；就是要认真贯彻军委一系列重要指示精神，加强和改进部队在发展社会主义市场经济条件下的思想政治工作，不断增强部队凝聚力。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"54b2d19c55"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
