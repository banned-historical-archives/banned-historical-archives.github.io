" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji31","name":"毛泽东全集第31卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji31.pdf"],"article":{"title":"对劳动部关于资产阶级向劳动行政部门进攻情况报告的批语","alias":"","parts":[{"type":"paragraph","text":"转发中财委关于财经工作"},{"type":"paragraph","text":"几点意见的批语"},{"type":"paragraph","text":"（1952年2月6日）此报应转发各中央局照办。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"二月六日"},{"type":"paragraph","text":"[1]指中财委党组1952年2月4日关于同意中南财委党组的财经工作报告给中南局并报中央的电报。电报提出三点意见：（一）今后财经工作的三个中心环节是计划（了解情况，确定政策）、基本建设（方针、设计、施工）和经营管理。在三反运动和企业民主改革运动中，彻底清除这三个环节中资产阶级的侵蚀与影响。在财经工作中严格划清无产阶级观点与资产阶级观点的界限。（二）在基本建设中，必须反对以小农经济、手工业的观点来处理近代化的工矿交通建设。要按科学办事，从早准备，才能快。地方工业的投资很大，必须提高计划性，克服盲目性。地方工业计划必须交中财委从全国着眼审核批准。（三）县以下的统计工作是否还是有重点地搞好，请加研究。计划统计干部要慎重选择，有计划地培养。要警惕资产阶级钻入计划统计部门。"}],"authors":["毛泽东"],"dates":[{"year":1952,"month":2,"day":6}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":351,"page_end":351},"tags":[{"name":"毛泽东","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4a2be1f834"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
