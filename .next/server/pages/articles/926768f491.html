" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji29","name":"毛泽东全集第29卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji29.pdf"],"article":{"title":"注意各个歼灭可能向我举行反攻之敌","alias":"","parts":[{"type":"paragraph","text":"注意各个歼灭可能向我举行反攻之敌"},{"type":"paragraph","text":"（1950年11月4日）彭、邓\"，并告高："},{"type":"paragraph","text":"（一）据伪总长四日十四时五十分令二军团称：“为适时地夺回德川、熙川，望第二军团担负此次攻击作战，并限五日十二时前提交新作战计划及攻击时间”等语。敌于收集各部略加整理后有向我军举行反攻之可能，请令我军各部注意，于其反攻时各个歼灭之，尤其注意德川方面。（二）目前敌各部甚混乱。美二师出动两个团，一在顺川以北，一在顺川布防，平壤空虚。美二十五师有一个野炮营在新安州，起掩护作用。请令我三十八军彻底击溃当面之敌，使其组织不成新防线。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十一月四日二十二时"},{"type":"paragraph","text":"[1]彭、邓，指彭德怀、邓华，当时分别任中国人民志愿军司令员兼政治委员和副司令员兼副政治委员。"},{"type":"paragraph","text":"[2]高，指高岗，当时任东北军区司令员兼政治委员。"}],"authors":["毛泽东"],"dates":[{"year":1950,"month":11,"day":4}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":345,"page_end":345},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"926768f491"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
