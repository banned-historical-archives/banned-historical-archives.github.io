script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"邓小平主任会见穆加贝总理时说中国的开放搞活不会产生资产阶级","authors":["柴世宽"],"dates":[{"year":1985,"month":8,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社北京八月二十八日电　(记者　柴世宽)中共中央顾问委员会主任邓小平今天上午会见津巴布韦非洲民族联盟主席、政府总理罗伯特·穆加贝，同他就中国社会主义建设中的一些重要问题进行了长达一百分钟的谈话。"},{"type":"paragraph","text":"两位领导人今天在人民大会堂见面时，穆加贝首先回顾了他一九八一年来中国访问的情况。他对邓小平说，我当时所到之处，你们的人民告诉我，你们在纠正错误。"},{"type":"paragraph","text":"邓小平说，我们作的那项工作叫“拨乱反正”。我们用马列主义、毛泽东思想总结了建国以来的经验教训，清理了“左”的错误。完成了拨乱反正，我们开始继续前进，这就是在坚持社会主义原则的前提下大力发展生产力，改善人民的生活。"},{"type":"paragraph","text":"邓小平对穆加贝说，中国要发展生产力，对经济体制进行改革是必由之路。你在一九八一年来访时，我国农村的改革已经有了成效。现在进行的城市改革势头不错，加上农村改革的成功经验，我们有充分的信心。但是要证明城市改革的路子走对了，还需要三年的时间。"},{"type":"paragraph","text":"穆加贝说，他很高兴有机会再次同邓小平就一些问题交换看法。他请邓小平谈谈对外开放问题。"},{"type":"paragraph","text":"邓小平说，中国过去几百年的历史告诉我们，闭关自守只会导致落后。我们是在社会主义公有制的基础上实行对外开放的。中国的对外开放，对内搞活经济，决不会导致两极分化，或产生资产阶级。"},{"type":"paragraph","text":"邓小平对穆加贝说，我们虽然搞了三十多年的社会主义，但社会主义对我们仍然是个新事物。你们现在也开始进行经济建设，希望你们在研究中国经验的时候，要结合自己国内的实际情况进行考虑，既注意我们正面的经验，又注意我们的教训。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9087ed8fbe"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
