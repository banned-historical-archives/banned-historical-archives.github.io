script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"抓好学习和批判　促进生产节节上升  火车车轮轮箍厂在反击右倾翻案风斗争中抓革命促生产，第一季度主要产品的产量提前完成计划","authors":[],"dates":[{"year":1976,"month":4,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"抓好学习和批判　促进生产节节上升"},{"type":"paragraph","text":"火车车轮轮箍厂在反击右倾翻案风斗争中抓革命促生产，第一季度主要产品的产量提前完成计划"},{"type":"paragraph","text":"据新华社一九七六年四月四日讯　我国火车车轮轮箍厂职工在反击右倾翻案风的斗争中认真抓好学习和批判，促进生产节节上升。今年第一季度，主要产品车轮、轮箍、盘件、锻件的产量都提前完成计划，比去年同期有较大幅度的增长，而且质量良好，全部达到国家规定标准。"},{"type":"paragraph","text":"火车车轮轮箍厂职工在反击右倾翻案风的斗争中进一步体会到，只有认真学习，才能在尖锐复杂的阶级斗争中心明眼亮，克敌制胜。因此，厂党委有计划地举办学习班，分期分批轮训车间干部和工人理论骨干。为了弄清楚社会主义革命的性质、对象、任务、前途，弄清楚走资派是怎么产生的，他们一次又一次地学习毛主席的重要指示，学习毛主席著作《在中国共产党第七届中央委员会第二次全体会议上的报告》、《关于正确处理人民内部矛盾的问题》。通过学习，他们进一步认清了这场反击右倾翻案风斗争的性质和意义，提高了继续革命的自觉性。"},{"type":"paragraph","text":"火车车轮轮箍厂职工在抓好学习的同时，采用多种形式，揭发批判党内那个不肯改悔的走资派及其推行的修正主义路线。他们联系本厂建设的历史，批判党内那个不肯改悔的走资派反对独立自主、自力更生，提倡洋奴哲学、爬行主义的修正主义货色。职工们表示，一定要抓好阶级斗争这个纲，坚持党的路线、方针、政策，保证企业永远沿着毛主席指引的方向胜利前进。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"人民内部矛盾","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"66eac0714c"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
