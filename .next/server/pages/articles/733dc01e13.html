script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"西方报刊赞扬美苏在印巴冲突问题上协调一致  鼓吹美苏在全世界范围内加强合作  日本资产阶级报纸说美苏两国度过了一次“蜜月旅行”","authors":[],"dates":[{"year":1965,"month":9,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"西方报刊赞扬美苏在印巴冲突问题上协调一致"},{"type":"paragraph","text":"鼓吹美苏在全世界范围内加强合作"},{"type":"paragraph","text":"日本资产阶级报纸说美苏两国度过了一次“蜜月旅行”"},{"type":"paragraph","text":"新华社二十五日讯　西方资产阶级报刊发表文章赞扬美国和苏联在印巴冲突的问题上协调一致、联合反华，并且鼓吹美苏在越南、欧洲和核武器等更广泛的世界问题上实行合作。"},{"type":"paragraph","text":"《纽约先驱论坛报》二十四日刊载劳伦斯的一篇文章，赞扬苏联在印巴冲突问题上同美国“联合起来站在一边”。文章说，这是“一个具有深远意义的事件”，“它意味着在保卫世界和平方面（苏联）同西方的和谐得到发展”。"},{"type":"paragraph","text":"文章认为，“在苏联和美国以及西欧各国之间，无疑地将有一种更加友好的感情”。"},{"type":"paragraph","text":"《基督教科学箴言报》二十三日指出：美苏“已经结成一个暗中的反对共产党中国的联盟，这个联盟比这里的任何人所敢于期望的要更为坚韧有力”。"},{"type":"paragraph","text":"《华盛顿明星晚报》二十一日刊载的一则消息说，美国的立场是使苏联放手地“同中国共产党人进行思想意识的斗争”。"},{"type":"paragraph","text":"《纽约时报》二十三日刊载赖斯顿的一篇文章进一步鼓吹美苏在更广泛的领域内实行合作。"},{"type":"paragraph","text":"文章说，“对核武器的控制和对亚洲正在发展的革命运动的控制是目前世界上两个最重要的问题，因此，应该竭尽一切努力来鼓励华盛顿和莫斯科在这些领域内的合作”。"},{"type":"paragraph","text":"英国的《太阳报》二十四日发表的一篇文章在谈到美苏合作时说，“俄国和美国在联合国安理会内执行同样的政策，这是一个历史性的发展”。这家报纸说，“只要它们继续这样干下去，希望是很大的”。"},{"type":"paragraph","text":"文章鼓吹说，在印巴发生冲突和停火以后，英国、苏联和美国面临一场“稳定亚洲局势”的重要斗争。"},{"type":"paragraph","text":"法国《费加罗报》二十三日认为，苏联和美国“有着共同的利害关系”。美苏这“两个霸权”是互相支持的。"},{"type":"paragraph","text":"法国《震旦报》说，“通过在（印巴）冲突中同西方结成联盟，克里姆林宫已经清楚地表明：它认为真正的冒险主义者，我们时代的战争狂人是中国人”。"},{"type":"paragraph","text":"新华社东京二十四日电日本资产阶级报纸《每日新闻》二十三日就印巴两国按联合国安全理事会决议实行停火发表评论说，这是美苏合作下促成的，美苏两国这次快乐地度过一次“蜜月旅行”。"},{"type":"paragraph","text":"这家报纸的评论指出，“不容否认，同印巴两国有利害关系的大国的动向，成为停火成立的一个重要因素。”“美英苏三国从武装冲突开始，就步调一致地支持联合国的调停”，这些国家的活动“获得成功”，才有联合国安理会的“停火”决议。"},{"type":"paragraph","text":"另一家资产阶级报纸《朝日新闻》二十三日报道，印巴冲突虽然暂告平息，但是对于克什米尔问题，联合国还没有提出任何具体解决办法，所有问题都遗留给今后。这家报纸的记者在座谈会中说：“联合国在十六年前就通过克什米尔公民投票的决议，以后一事无成，在这次（停火决议中）一句也没有涉及公民投票的问题只是说什么‘停火、停火’而已。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"733dc01e13"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
