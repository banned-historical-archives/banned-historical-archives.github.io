script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji41","name":"毛泽东全集第41卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji41.pdf"],"article":{"title":"在安徽省六级干部会议情况简报上的批语","alias":"","parts":[{"type":"paragraph","text":"在安徽省六级干部会议"},{"type":"paragraph","text":"情况简报上的批语"},{"type":"paragraph","text":"（1959年3月15日）小平同志："},{"type":"paragraph","text":"安徽三月十一日简报很好，请你迅即转发各省、市、区党委。他们收到后，可以印发正在开会的同志们每人一份。此外，广东的第二次简报”，山东第一次、第二次简报，都很好，请同时转发各省、市、区大会，予以印发，供他们参考。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"1959年3月15日上午六时于武昌[1]小平，即邓小平，当时任中共中央总书记、国务院副总理。"},{"type":"paragraph","text":"[2]指中共安徽省委1959年3月13日关于六级干部会议3月11日讨论情况给毛泽东并中央的简报。简报说，安徽六级干部会议，11日继续分组讨论。讨论中，社队干部一方面进一步认识到公社化的伟大成就，同时也认识到其中一度存在的问题。绝大多数人对九个指头与一个指头的关系已认识清楚。在检查缺点时，社队干部分析去年“共产风”刮起来的原因有三：一是"},{"type":"paragraph","text":"在安微省六级干部会议情况简报上的批语自己认识糊涂，把“共产风”当“好风”；二是害了“传染病”，互相传染；三是省里有关部门传下去的。讨论中，公社一级的干部发言不多，省委已专门召集他们开了一次会，再一次说明责任主要由省委负，解除他们的顾虑，但也要他们注意检查自已的经验教训，大胆发言。毛泽东在批转这一简报时，将报告的题目改为《安徽的经验》。"},{"type":"paragraph","text":"[3]指中共广东省委1959年3月11日23时关于贯彻郑州会议决议情况给中央并毛泽东的第二次汇报。"},{"type":"paragraph","text":"[4]指中共山东省委1959年3月10日关于贯彻执行郑州会议指示精神给中央并毛泽东的报告和山东省委第一书记舒同3月12日下午4时关于山东六级干部会议情况给毛泽东并中央的续报。山东省委的报告说，本月5日至8日，我们召开了地、市、县委书记会议，传达郑州会议精神，为六级干部会议作准备。会上大家一致反映，听了主席的指示，找到了解决当前农村问题的关键，就是要从所有制问题入手，重视生产队的所有制。过去公社统得过多，“一平、二调、三收款”，否定生产队的所有制，主要是有一种急于实行共产主义的思想。许多干部听了传达之后，思想上豁然开朗，纷纷打电话回去，要求停止反本位主义的做法。但讨论中也反映出许多错误认识和思想顾虑，对以生产队还是以管理区为基本核算单位争论也比较多，这些问题有待于六级于部会议进一步解决。舒同的报告说，我省的六级干部会议从本月9日开始，已举行3天。听了郑州会议精神后，群情振奋，绝大多数基层干部认为主席的指示非常正确，抓住了主要矛盾，照此去做就可以从根本上解决当前的紧张局面。粮食问题、生产问题以及其他许多矛盾也都将迎刃而解。许多干部纷纷打电话或写信回去，要求家里好好生产，纠正过去的错误做法。为了把会议搞深搞透，我们提出分两阶段进行：第一段，谈心事，摆矛盾；第二段，解疙瘩，订章程，起草有关公社管理体制及若干政策问题的文件。会后各地可以一直回到公社去开会，结合正在展开的整社运动将郑州会议精神贯彻下去。县的会议可放到后面视情况需要再开。"}],"authors":["毛泽东"],"dates":[{"year":1959,"month":3,"day":15}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":342,"page_end":343},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bd02571985"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
