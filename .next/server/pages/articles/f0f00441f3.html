script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"透明的还是污浊的?文艺报发表文章评南斯拉夫修正主义的文艺纲领","authors":[],"dates":[{"year":1958,"month":6,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"把自己装扮成真正的马克思主义者的南斯拉夫领导集团，在臭名昭著彻头彻尾的修正主义纲领中曾经提到，“南斯拉夫共产主义者联盟的思想斗争加速了思想上层建筑的发展，有助于科学艺术中创作力的解放。”真的，在这个靠美元过活的“社会主义国家”里，它的上层建筑发生了怎样的变化与发展呢?它的文学艺术到底是一些怎样的货色?在今天出版的第12期“文艺报”上发表了一篇刘白羽同志的“透明的还是污浊的?”的文章，给予了深刻透辟的批判。"},{"type":"paragraph","text":"刘自羽指出，从南共领导集团最喜欢标榜的什么“真正的创作自由”；到卡德尔在1954年的发言中所主张的，“共产党员既不表示赞同也不表示反对艺术中的某种‘主义’”；到叛徒法斯特之流大叫的什么“最充分的自由权利”，原来不过是一脉相承的东西。他们为了“在文学艺术这个思想领域内，放弃党的思想领导，放弃马克思主义立场，也就是为资产阶级的文学艺术开辟道路”，就不得不拾起资产阶级破烂的伪善的“绝对自由”和“超现实主义”来做武器，大力鼓舞与发展资产阶级的颓废的现代派，来反对科学艺术为社会主义为广大劳动人民服务的根本原则。刘白羽举了一个例子，一位南斯拉夫现代派的主要作家在回答法国杂志“你能不能成为叛徒?”的问题时说，“没有什么不能”。这个例子非常清楚地说明了他们的政治信念是什么。"},{"type":"paragraph","text":"南斯拉夫作家协会主席、老修正主义者魏德马尔宣称，思想性在作品里是毫无意义的。他极力倡导的是一种“艺术魅力”。他认为“作家的天才”、“作家内心世界的各种感受”、“作家与自己的禀赋在本身上相协调一致”就是“达到他所谓‘时代的本质’的反映”的重要因素，作品的反动或进步倒是可以不论的。他还惊呼什么“现实主义的危机”，他认为问题是在于没有做到“生活‘超物质化了的’，它一直是沉重而不透明的。”为了达到使生活“透明”的目的，他搬出了“神”、“魔鬼”……最后不能不请来了尼采。刘白羽说，“除了污秽不堪的神秘主义，除了反动的精神堕落之外，难道这里还有什么新鲜的事物吗?”"},{"type":"paragraph","text":"这种理论，“是从资产阶级的垃圾堆上生长出来的。”刘白羽举出他访问南斯拉夫时记下的一个现代派主要人物的谈话片断加以说明。这个作家说，“在灵魂深处有黑的一面，有白的一面”，这正是文学上的修正主义者的共同主张，所谓“心灵的探索”，也就正好是南共纲领中“作为社会生物的人的真理”的注脚。南共纲领中所说的“思想斗争加速了思想上层建筑的发展”，也正好可以从充斥在贝尔格莱德街头的美国黄色歌曲、“大腿美”……得到说明。“南斯拉夫领导集团则显然是在共产主义的招牌下为资产阶级在南斯拉夫从经济基础到上层建筑占领阵地，”刘白羽鲜明地指出了这种修正主义的实质，并且深信“南斯拉夫劳动人民将不会允许用沾染着血渍的美元、可口可乐、大腿美等美国生活方式和资产阶级堕落的文学艺术来长期地玷污他们自己。”"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f0f00441f3"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
