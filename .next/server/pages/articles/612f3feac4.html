script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji43","name":"毛泽东全集第43卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji43.pdf"],"article":{"title":"对《列宁主义万岁》一文送审稿的批语和修改","alias":"","parts":[{"type":"paragraph","text":"对《列宁主义万岁》一文"},{"type":"paragraph","text":"送审稿的批语和修改!"},{"type":"paragraph","text":"（1960年4月）不透，宜加几句。"},{"type":"paragraph","text":"[1]本篇一、二是毛泽东写在《红旗》杂志总编辑陈伯达1960年4月14日送审的这篇《红旗》杂志编辑部文章中的批语；本篇三、四、五是写在此文4月16日送审稿上的批语；本篇六是在4月16日送审稿中加写的一句话；本篇七、八是对4月16日送审稿的修改，其中用宋体字排印的是毛泽东加写的文字。陈伯达在4月16日的送审稿上向毛泽东报告说：“已经把您的意见告诉小平等同志，经过商量后，作了修改。原来一共有十五页提到您的名字，现在只存下四处，其中除了纸老虎问题的一处外，都是谈的国内问题。”这篇文章后来发表在《红旗》杂志1960年第八期上。"},{"type":"paragraph","text":"[2]这篇编辑部文章的送审稿写道：“铁托所说的，是帝国主义为压迫本国人民、压迫全世界、进行扩充军备的“国内建设”呢？还是社会主义为增进人民幸福、谋求世界持久和平的“国内建设”呢？”在这段话旁，毛泽东打了一个问号，并写了这句批语。这篇文章公开发表时，这段话没有修改。毛泽东全集第四十三卷"},{"type":"paragraph","text":"二东南亚，西方会挑拨。"},{"type":"paragraph","text":"三修正主义是主要危险。"},{"type":"paragraph","text":"[1]这篇编辑部文章的送审稿写道：“当社会主义国家由于帝国主义进攻而被迫进行防御战争并举行反攻的时候，像苏联在反希特勒的战争中那样，为着追击和消灭这种从国外来的敌人因而越出国境，这应该不应该呢？毫无疑问，这是完全应该的，完全必需的，完全正义的。社会主义国家的军队是正义的军队，在他们所到的地方，当然要发生影响，发生作用，但是，即使这样，在那些地方，在那些国家，也还只能根据人民群众的意志，才能够出现人民的革命，才能够建立起社会主义制度。”在公开发表时，这段话修改为：“当社会主义国家由于帝国主义进攻而被迫进行防御战争并举行反攻的时候，像苏联在反希特勒的战争中那样，为着追击和消灭这种从国外来的敌人因而越出国境，这应该不应该呢？毫无疑问，这是完全应该的，完全必需的，完全正义的。根据共产主义者的严格的原则，必须是绝对地限制在帝国主义向社会主义国家发动侵略战争的时候，社会主义国家才能够这样做。社会主义国家决不许可、决不应该、也决不能够在不是受到国外敌人侵略的情况下，使自已的军队越出国境。社会主义的国家的军队是正义的军队，在他们因为反击国外敌人而不得不越出国境的时候，当然会在他们所到的地方，发生影响，发生作用，但是，即使这样，在那些地方，在那些国家，也还只能根据人民群众的意志，才能够出现人民的革命，才能够建立起社会主义制度。”对《列宁主义方岁》一文送审稿的批语和修改"},{"type":"paragraph","text":"四和平、战争，要有两手。"},{"type":"paragraph","text":"五将各段要点，在首尾两处总提一下。"},{"type":"paragraph","text":"六宣言中这一段话，说得很正确，情形正是这样。"},{"type":"paragraph","text":"七"},{"type":"paragraph","text":"各个社会主义国家，只要有可能，都应该越来越多地掌握这类为人民谋福利的新技术口。"},{"type":"paragraph","text":"[1]这篇编辑部文章的送审稿写道：1957年11月在莫斯科召开的社会主义国家共产党和工人党代表会议宣言说：“现代修正主义企图诽谤马克思列宁主义的伟大学说，说它是“过了时的”，似乎目前对于社会发展已经丧失了意义。修正主义力图腐蚀马克思主义的灵魂，破坏工人阶级和劳动人民对于社会主义的信心。”在这段话后面，毛泽东加写了这句话。"},{"type":"paragraph","text":"[2]这里指原子能和火箭等类新技术。毛泽东全集第四十三卷"},{"type":"paragraph","text":"八"},{"type":"paragraph","text":"革命的无产阶级政党必须紧紧地依靠本阶级的群众，必须紧紧地依靠农村中的半无产阶级，即广大贫农群众，建立以无产阶级为领导的工农联盟，然后才可能在这个联盟的基础上团结一切可能团结的社会力量。"},{"type":"paragraph","text":"1960年4月，毛泽东在广州和有关同志研究《毛泽东选集》第四卷的编辑工作。"}],"authors":["毛泽东"],"dates":[{"year":1960,"month":4}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":258,"page_end":261},"tags":[{"name":"陈伯达","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"612f3feac4"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
