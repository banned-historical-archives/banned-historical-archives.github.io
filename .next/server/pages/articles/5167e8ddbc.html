script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"全国首次毛泽东哲学思想讨论会在桂林召开","authors":["哲泰"],"dates":[{"year":1981,"month":11,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"全国首次毛泽东哲学思想讨论会在桂林召开"},{"type":"paragraph","text":"不久前，全国毛泽东哲学思想讨论会在桂林举行。这次讨论会是由中国社会科学院哲学研究所、广西社会科学院、中央党校哲学教研室等八个单位发起召开的。参加会议的代表，来自中央、各省、市、自治区和部队的部分科研单位，以及部分高等院校、党校、新闻、出版、宣传等部门，共280余人。大会收到的学术论文和资料104篇。这是我国毛泽东哲学思想研究的一次盛会。"},{"type":"paragraph","text":"这次讨论会，较好地贯彻和体现了《关于建国以来党的若干历史问题的决议》的精神，贯彻和体现了全国思想战线问题座谈会的精神和实事求是、解放思想、百家争鸣的方针，因而开得比较严肃认真。通过这次会议，与会代表进一步探讨和明确了毛泽东哲学思想的研究方向、方针和方法，增强了信心，鼓舞了研究和宣传毛泽东哲学思想的主动性和积极性。"},{"type":"paragraph","text":"会议集中讨论了对毛泽东哲学思想的评价问题，实事求是地肯定了毛泽东哲学思想的历史地位和它对中国革命和建设的伟大指导作用。关于如何科学地研究和宣传毛泽东哲学思想，也进行了比较深入的讨论，澄清了一些错误认识。会议还就如何在新的历史条件下发展毛泽东思想进行了讨论，取得了比较一致的意见。"},{"type":"paragraph","text":"会议经过协商，产生了全国毛泽东哲学思想研究会筹备组，并议定在条件成熟的时候，召开研究会成立大会。"},{"type":"paragraph","text":"会议还就本学科的研究课题、资料建设、队伍培养以及加强各地区、各单位之间在学术上的互相交流和协作等问题，广泛地交换了意见。（哲泰）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5167e8ddbc"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
