script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"抗议法国垄断资本对非洲籍工人进行残酷剥削  巴黎两千非洲籍工人和法国公众大示威  示威群众冲进法国雇主联合会占领建筑物在房顶升起红旗","authors":[],"dates":[{"year":1970,"month":1,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"抗议法国垄断资本对非洲籍工人进行残酷剥削"},{"type":"paragraph","text":"巴黎两千非洲籍工人和法国公众大示威"},{"type":"paragraph","text":"示威群众冲进法国雇主联合会占领建筑物在房顶升起红旗"},{"type":"paragraph","text":"新华社巴黎十日电  在法国的非洲籍工人和法国公众共约两千人，十日在这里举行声势浩大的示威，抗议法国垄断资本对非洲籍工人进行残酷的超额剥削以及要求改善非洲籍工人的极端恶劣的生活条件。"},{"type":"paragraph","text":"这次示威是因为五名非洲籍工人的死亡而触发的。这五个工人——四个塞内加尔人和一个毛里塔尼亚人不久前由于生活困苦和冬季的严寒被痛苦地折磨而死。"},{"type":"paragraph","text":"今天，在给这五个工人送葬途中，示威群众举着红旗，高呼着谴责资本家残酷剥削的口号。许多示威者还挥动着红宝书《毛主席语录》，高唱着《国际歌》游行前进。"},{"type":"paragraph","text":"数百名示威群众愤怒地冲进法国垄断资产阶级的大本营——法国雇主联合会，占领这座建筑物，并把一面大红旗升到房顶上。他们还在墙上用红漆写上战斗性的口号：“雇主即杀人犯”、“工厂象监狱、宿舍象棺材”以及“打倒杀人的资本主义”等。"},{"type":"paragraph","text":"六、七百名非洲籍工人还占领了一间用工厂厂房改建的集体宿舍，抗议房东以切断水电供应相威胁，强迫工人增付房租。"},{"type":"paragraph","text":"法国垄断资本为了榨取超额利润，除剥削本国劳动人民外，还招雇很多非洲籍工人，对他们进行更加残酷的剥削。目前在法国的非洲籍工人大约有五万人。他们工资低、干活重，居住条件十分恶劣，挤在一些缺乏起码条件的集体宿舍里。近几天来，许多报纸消息描写非洲籍工人的住房情况：“床有五层，柱子被虫蛀空了，墙上发霉滴水，老鼠满地跑”，有的宿舍简直象“运奴隶的船一样”。"},{"type":"paragraph","text":"对于这种残酷的剥削和非人的生活条件，非洲籍工人越来越难于忍受，他们在不断加强同资本家的斗争。早在去年，数百名塞内加尔工人曾举行罢工，拒付房租。"},{"type":"paragraph","text":"（附图片）"},{"type":"paragraph","text":"来自英国各地的群众高举毛主席像，在伦敦举行示威游行，抗议英帝国主义的种族主义政策，支持非洲南部被压迫人民争取民族解放的斗争。　新华社稿"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4cdbf98fec"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
