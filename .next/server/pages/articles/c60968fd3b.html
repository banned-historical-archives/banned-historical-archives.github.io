script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反对垄断资本制造失业和残酷剥削工人的罪行  英国北爱尔兰万名群众举行示威","authors":[],"dates":[{"year":1970,"month":3,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反对垄断资本制造失业和残酷剥削工人的罪行"},{"type":"paragraph","text":"英国北爱尔兰万名群众举行示威"},{"type":"paragraph","text":"新华社伦敦电　大约一万名北爱尔兰群众最近在德里举行大规模示威游行，强烈抗议垄断资本制造严重失业、残酷剥削工人的罪恶行径，他们同前去镇压的反动军警进行了激烈搏斗。"},{"type":"paragraph","text":"北爱尔兰是英国失业率最高的地区，失业工人通常占就业人数的百分之十左右。最近一个时期，失业人数甚至高达就业人数的百分之十七，有些城市，甚至高达百分之三十五以上。垄断资本向工人阶级和其他劳动人民的猖狂进攻，迫使越来越多的人起来进行反抗。"},{"type":"paragraph","text":"三月七日，来自北爱尔兰各地的男女工人和青年学生，成群结队地聚集到古城德里。他们不顾把守在各主要街道的反动军警的威胁，高呼着口号，浩浩荡荡地向前挺进。示威者举着谴责垄断资本压榨的横幅和标语牌通过主要街道，到市政厅前面的广场上举行了抗议大会。"},{"type":"paragraph","text":"一些示威者在会上发言，揭露垄断资本制造越来越严重的失业，使数以万计的人生活无着。一些人还列举数字指出，破烂不堪的住房已占北爱尔兰全部住房的百分之二十三，在贝尔法斯特市甚至达到百分之二十九。德里的一些发言者说：德里每年都有许多人因为失业而生活困苦，流离失所。一些发言者还表示，要团结起来，继续开展反对残酷剥削和政治迫害的斗争。"},{"type":"paragraph","text":"当示威群众游行示威和开大会时，反动军警一再进行挑衅，但都遭到了工人和青年学生们的英勇还击。一些青年学生还怒斥反动军警是法西斯军队。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c60968fd3b"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
