script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"不是“出冷门”，而是资产阶级偏见","authors":["朱振声"],"dates":[{"year":1975,"month":5,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"武定中学党支部委员　朱振声"},{"type":"paragraph","text":"七二届毕业分配时，我碰到一个类似胡兆禹那样的学生。这个学生也是因为学习成绩和遵守纪律不够好，而被我认为是后进的。在学工学农中，他积极要求进步，申请加入红卫兵组织，也因为发生一些使我生气的小事情而没有被批准。毕业分配一开始，他在整个年级学生中第一个报名到吉林去插队落户。当时我认为他是“出冷门”，对他的行动表示怀疑，直到他收了通知，我才放心。在讨论培光中学中一年级教师的信时，我们一些教师分析了自己在毕业分配中为什么把一些同学的革命行动看成是“出冷门”，感到根子还是自己头脑里资产阶级偏见在作怪。"},{"type":"paragraph","text":"毛主席早就指出:要把学生培养成为“有社会主义觉悟的有文化的劳动者”，“有社会主义觉悟”是放在第一位的。但由于我们教师在旧的教育轨道上走惯了，在贯彻党的教育方针时，就走了样，名义上是搞无产阶级教育，实际上却仍然按照“学校是传授知识的场所”、“学生应该循规蹈矩地读书”那一套剥削阶级的传统观念在办事。我校在七三、七四届毕业分配中，也曾象七二届那样，那些最自觉、最坚决要求上山下乡的同学往往连红卫兵也没有被批准，而公认的好学生中，却有一些过不硬。这种情况的反复出现，同平时学校教育只求“上课安静，下课太平”，忽视共产主义理想教育，忽视“五敢”精神的培养，是密切相连的。这种状况不改变，把学校办成无产阶级专政工具也就成了空话，而离开毛主席革命路线势必越来越远。"},{"type":"paragraph","text":"张春桥同志在《论对资产阶级的全面专政》一文中说:“思想上政治上的路线是否正确，领导权掌握在哪个阶级手里，决定了这些工厂实际上归哪个阶级所有。”一所学校也是这样，如果我们领导和教师执行的不是毛主席的教育路线，而是修正主义路线，那末，我们在衡量一个同学时，就看不到学生的主流、本质，甚至把学生身上非本质的东西，当成本质的东西，这样就把是非颠倒过来了。“教育界的资产阶级偏见特别顽固”，这种资产阶级偏见不仅表现在教师身上，同样也反映在学校领导成员身上。“出冷门”的说法就是这种偏见的一种。领导班子不能带头实现思想革命化，当然要影响教师。这样上行下效，发展下去，后果是十分严重的。因此，象我这样被推上领导岗位的教师，必须带头学好无产阶级专政的理论，严于解剖自己，努力改造世界观，和旧的传统观念彻底决裂。只有这样，才能正确理解和执行毛主席的革命路线，和全校师生共同战斗，为培养无产阶级革命事业接班人作出贡献。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上山下乡","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f66ed85247"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
