<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"资产阶级向人民法院猖狂进攻的铁证——记人民法院举办的反贪污展览会","authors":[],"dates":[{"year":1952,"month":3,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报特写】　在本市人民法院所举办的“反贪污展览会”上，可以看到资产阶级卑鄙无耻地向人民司法机关猖狂进攻的铁证。资产阶级不法分子派了在解放前做为律师、投机奸商、交际花等等腐化人物，千方百计地混进人民法院，胆大妄为地做资产阶级不法分子的耳目，倒行逆施，破坏人民司法机关的威信。"},{"type":"paragraph","text":"做过伪律师的张耀广，又名张光甫，解放前，他和反革命分子夏勤(已死)勾结一起，专门包揽汉奸案件，为汉奸脱罪，从中敲诈取利。例如大经济汉奸尤菊荪案，就是由他替尤犯伪造证据，分散或隐匿尤犯的财产。尤犯答应送给他四幢洋房作酬劳。可是此案到解放后还没有解决。张耀广因此设法钻进北京新法学研究院去混资格，以便乘机继续进行不法活动；终于他混入人民法院。他在白天，坐在办公室只是打盹，一到晚上，就去和尤犯秘密商议策划如何隐匿财产。当法院领导上发觉尤犯有逃避财产情形时，他就故意在承办员面前放烟幕说:“尤菊荪是个大少爷，判他汉奸罪是冤枉的。”根据张耀广的自供，他亲手替尤犯所隐匿的财产，仅仅在本市一地就有七十幢房屋，初步估价值一百亿元以上。"},{"type":"paragraph","text":"再有所谓“上海小姐”的交际花刘德明，在一九五○年夏天，她利用学生身分到法院里“实习”。她的父亲刘道魁原是个伪律师。她所交往的一批人，都是资产阶级的洋场恶少，过着荒淫无耻的生活。她到法院去“实习”的目的，原是企图勾引工作干部去做她的俘虏，以便替资产阶级安下“坐探”。结果，人民法院的工作人员楼显康等几个人上了她的圈套。她离开法院时，就假楼显康的手盗窃刻有“人民法院”字样的毛笔和大批公用信纸、信封，作她招摇撞骗的工具。楼显康甘心做了资产阶级的走狗，利用职权，泄露法院机密给一些和刘德明有关的不法分子有好几件。"},{"type":"paragraph","text":"投机奸商出身的杨省曾，去年一月间，参加训练班，混进人民法院，被派在中区分庭房屋组工作，他就利用职权进行贪赃枉法的勾当。留用人员程瑞锟和不法资本家勾结起来，无耻地收受贿赂，包庇不法资本家非法罪行，这些材料和证据，在展览会上都公布了。"},{"type":"paragraph","text":"人民法院看守所留用医生姜天畴，为了贪图钱财，做了不法资本家的走狗。一九四九年秋天，本市证券大楼里不法奸商进行大规模扰乱金融案，人民政府及时把那批案犯加以逮捕。不法奸商在看守所中看上了姜天畴，就用金钱收买他做“狗腿子”使他替奸商通风报信。不法奸商为了进一步挟制这个“狗腿子”，就花言巧语的对姜说:“等我们放出去，就请你做我们厂里的厂医；并且送你一幢房子，给你开诊所。”姜就此死心塌地的替这批不法奸商效劳了。例如，他用给犯人送药水为名，把白兰地酒送进牢房去给奸商穆壮武喝，又故意说奸商有病，要移送到病房去治，他就借此机会替奸商们打补针。美满以为可以靠奸商吃一辈子了，所以就辞掉看守所的职务，想去开诊所。不料这批奸商被释放后，有的逃到香港去，有的隐藏起来继续进行投机活动，只给他一些钞票就把姜天畴像无用的狗一样一脚踢开了。"},{"type":"paragraph","text":"在雷厉风行的三反、五反运动中，资产阶级用“派进来”、“拉过去”的阴谋，企图侵犯到人民民主专政的高级机关，想达到他们任性做违法的行为而仍逍遥法外的罪恶目的，终于粉碎了。通过上面所举的那些资产阶级向人民司法机关猖狂进攻的例子看来，资产阶级想篡夺人民司法大权，是无所不用其极的。法院这次反贪污展览会告诉我们:必须要提高警惕，坚决的把资产阶级的猖狂进攻压下去!"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"93b313463b"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
