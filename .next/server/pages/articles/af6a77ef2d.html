<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"绥远省展开反贪污运动的情况","authors":[],"dates":[{"year":1951,"month":12,"day":12}],"is_range_date":false,"parts":[{"text":"绥远省展开反贪污运动的情况","type":"title"},{"text":"【绥远分社十二日讯】绥远省贪污现象比较严重，该省人民政府十一月一日即发出关于反贪污运动的决定，现已在省级机关及绥西地区展开了反贪污运动。但有些单位如省财经委员会等，对反贪污运动还重视不够，没有认真检查和揭露贪污事件。","type":"paragraph"},{"text":"据不完全统计，一至六月法院受理的贪污案件有三二七件。其中由绥远省人民检查署及监察委员会直接处理的有五十六件，贪污人民币三十六亿多元。贪污在财经系统、企业部门为最多，在干部中百分之九十以上是留用人员和新参加工作的干部，其次是村干部，也有个别较老的干部。陕坝公路段长傅次曲，水利局永济渠办事处主任武善立，三大股渠水利局局长杨秀川、狼山区粮库主任张进德等领导集体贪污，四案共损失国家小米六十二万余斤。前任萨县县长刘绍杰(已枪决)托县县长王志达(已判无期徒刑)两案，均贪污粮食十万斤以上，且都是集体贪污。人民银行五原支行行长渎职损失公款十亿元之钜。","type":"paragraph"},{"text":"产生贪污渎职的原因，首先是由于绥远和平解放，大批新干部及留用人员涌入革命阶伍里来。虽然这些干部大部分表现是好的，但有些是反革命统治机构里的贪污犯。其次是个别较老的干部，进城后滋长了享受腐化的思想。第三是领导上对贪污案件处理不严肃，普遍采取拖延放任的态度，法院惩办也太宽，因此助长了贪污分子的不法气焰。合作社流行着一句话：“贪污少了开个斗争会，贪污多了送法院休息几天。”","type":"paragraph"},{"text":"根据以上情况，绥远省展开了一个反贪污运动，在学习、检查中，一般干部认为：“我们不是财经部门，又不掌握经济大权，那里有贪污的”。参加工作不久没做过财经工作的青年干部认为：“自己清白，没有贪污”、“有吃有喝，谁还贪污”。因此对反贪污采取漠不关心的态度。有些起义人员认为：“老同事、老上级，不好意思提意见”或“没意见可提”。贪污分子则思想顾虑很大，不敢承认其贪污事实，怕说出后丢人，怕领导同志不信任他，怕丢掉饭碗，怕送法院，怕追赃倒赃，少数人有抵抗情绪，打击别人发言，并发现个别贪污分子与私商勾结，企图隐瞒其贪污行为。","type":"paragraph"},{"text":"有些在坦白交待中耍花样，绕湾子，有的人只谈浪费不谈贪污；有的只谈起义前贪污不谈起义后贪污，或只谈小的不谈大的，只谈商人送礼不说自己受贿，只承认自己是从犯，不承认自己是主谋。后经过多方面的教育，并发动群众揭发，现已初步暴露出一些贪污事实，目前正在逐步深入进展。","type":"paragraph"},{"text":"虽然反贪污运动的初步有一些收获，但存在着两个主要问题。一个是有些部门领导人对反贪污运动重视不够。农林厅至今未动，省财经委员会和人事局反贪污尚未很好展开即宣告结束。水利局局长李直竟说不知道，粮食局的负责人说：“工作忙，去和秘书谈”秘书忙于写“年终总结”说顾不上去搞。另一问题是有些不是财经、企业部门的单位，以为开展反贪污“没有内容”以致展不开，所以这一运动展开的范围只是省级机关和陕坝专区，不广泛，也不深入。","type":"paragraph"}],"comments":[],"origin":"1951年12月14日新华通讯社编《内部参考》。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"af6a77ef2d"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
