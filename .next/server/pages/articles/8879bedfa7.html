script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反对美国和本国垄断资本的掠夺和剥削  智利两万五千多工人和职员纷纷罢工","authors":[],"dates":[{"year":1970,"month":3,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反对美国和本国垄断资本的掠夺和剥削"},{"type":"paragraph","text":"智利两万五千多工人和职员纷纷罢工"},{"type":"paragraph","text":"据新华社十五日讯  圣地亚哥消息：最近一周来，智利两万五千多工人、农业工人和职员为反对美国和本国垄断资本的掠夺和剥削，纷纷举行罢工。"},{"type":"paragraph","text":"由智利同美国垄断企业安格洛—劳塔罗硝石公司“联营”的“联营公司”近一万名硝石工人，十一日举行罢工，要求增加工资。"},{"type":"paragraph","text":"奥伊金斯省和圣地亚哥省的两千多名农业工人在十三日开始举行无限期罢工，要求增加工资和要求恢复被地主解雇的几十个农业工人的工作。这些农业工人为了加强斗争，在这两个省的六十多个庄园内使用武力占领土地。"},{"type":"paragraph","text":"在这之前，智利政府农业各机关的一万二千职员在九日举行了罢工，要求增加工资。由于同样的原因，智利一千四百名海关工作人员在同一天也举行了罢工。他们的罢工使智利全国各港口的客运和货运工作受到了影响。"},{"type":"paragraph","text":"帕拉尔市市政服务事业的职员、圣地亚哥的邮电职工和拉塞雷纳市的面包工人最近也举行了罢工。"},{"type":"paragraph","text":"智利广大工人、农业工人和其他劳动人民的生活日益贫困化，是美国和本国垄断资本家加紧剥削和掠夺的结果。据官方公布的数字，一九六九年，外国垄断集团从智利掠走了三亿一千六百万美元的利润和一千七百万美元的专利费，还掠走了智利政府偿还其所借贷款和付利息的钱共一亿六千万美元。三项总数将近五亿美元。因此，造成智利经济恶化，生活费用迅速上涨。在最近的三天内，食品、服装的价格和房租上涨了百分之三十以上。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8879bedfa7"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
