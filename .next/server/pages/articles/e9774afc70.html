script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反右倾　鼓干劲　向国庆10周年献礼运动员们誓为祖国争光","authors":[],"dates":[{"year":1959,"month":9,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【据新华社北京10日电】　参加第一届全国运动会的各代表团，在临近比赛的日子里，深入学习党的八届八中全会文件，纷纷举行誓师大会，抓紧最后时机进行练习，掀起了一个反右倾、鼓干劲的热潮，决心创造更优异的成绩来向国庆十周年献礼。"},{"type":"paragraph","text":"解放军代表团到京的运动员举行了比赛前的动员大会，运动员在八中全会的公报鼓舞下投入了紧张的练习。女子日间1000米集体定点跳伞世界纪录创造者之一赫建华于动员大会第二天在良乡机场进行一次女子单人1500米综合定虎跳伞练习时，又创造了4.505米的新成绩，突破了6.3米的全国纪录。"},{"type":"paragraph","text":"北京代表团的运动员们在学习中干劲鼓得更足。许多运动员经过仔细研究，重新制订了指标。已经在200米低栏赛跑中创24.1秒的全国最高成绩的梁仕强，过去不敢想能在400米中栏中破全国纪录，可是他最近鼓足更大的干劲又创造53移的全国最高成绩。优秀的跳栏迁手刘书谦鼓足干劲，创造了23.9秒的200米低栏赛跑的全国最高成绩。"},{"type":"paragraph","text":"广东省体育代表团召开全体运动员、工作人员大会，各队进行座谈，深入检查了各种不同程度的岁倾情绪，纷纷表示，一定要在全运会上创造仇异的成绩。浙江坍阉团召开了全团运动员、教练员和领队会议，会后，各队纷纷进行讨论，批判“浙江省技术落后”论，坚定了“遇强愈勇，沼弱不懈，争取胜利，不怕失败”的信心和决心，不少运动员思想认识大大提高，技术水平也不断上升。"},{"type":"paragraph","text":"连日来山西、于夏、黑龙江、河北、上沼、四川等省、市、诏治区的代表团也分别开会，进行动员。四川省代表团的全体成员在8日举行的誓师大会上，通过了纷大会的保证书，和给各兄弟代表团的一封信。他们在保证书中提出:胜不骄、败不馁，加强组织性、纪律性，绝对服从裁判，严格遵守大会的一切规章、制度，做好因各兄弟，代表图的团结，积极主动与兄弟代表团互相学习和交流经验。"},{"type":"paragraph","text":"目前，参加全运会的各个代表团，意气风发，情绪饱满，积极准备投入开幕后的紧张比赛，显身手，创成绩，为祖国争光。"},{"type":"paragraph","text":"\u003cIMG alt=请插入4号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1959\\09\\599B020601.JPG\"\u003e"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e9774afc70"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
