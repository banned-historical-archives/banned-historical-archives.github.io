<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"今日慈溪征实重重剥削　丰收谷贱伤农","authors":[],"dates":[{"year":1946,"month":9,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【慈溪通讯】慈溪虽是一个地处海滨偏僻乡隅的三等县，然而民风是醇厚的。老百姓如一群驯服的羔羊，在沦陷期间受尽了敌伪的摧残，屠杀。光复后，依旧在重重剥夺下透不过气来。"},{"type":"paragraph","text":"昔日伤心病狂为虎作伥的汉奸，翻译，虽然有一部分倒了霉，但大部分受了某方的通知暂行飘流外埠了。更有一部分，至今依旧大摇大摆，阔步人群，像曾担任过敌伪特工的伪电话局局长邱明耀，非但没有被通缉，并且依旧荣任着电话局局长，据说是“地下工作者”。伪商会会长胡家昌，胜利后忙着帮助政府“接收”，将大批敌伪遗留的水泥，以修路为名运回家乡胡家坟不知下落，但居然有人恭维他为“公正士绅”，“热心公共事业。”以上不过区区两例，事实是举不胜举。"},{"type":"paragraph","text":"田赋开始了征实，田粮征收处的老爷早在两月前计划预备发一笔横财；记者曾经陪同一个远道来城的亲戚解过田赋谷，时在某日下午，这一群老爷喝醉了酒正在午睡，直等了两三个钟点，他们醒来了，然而推说没有空，却把两只脚搁在写字台上大唱其京戏。我向他们解释这是远道而来的乡民，总算接受了我的要求，所解缴之谷，明明是乾燥光泽，偏再用六扇叶子的风箱起劲地打过，八斤重的谷箩一定硬除十一斤，(其中有两只是十足十一斤重，当你和他争辩的时候，他就拿认识的，有特别标记的称给你看)，再外加每百斤亏耗谷四斤，一百斤的燥谷，让他们计算的结果，只剩八十几斤了。这种非法的剥削，挑剔，留难，在今日的中国社会，恐怕已经是正常的现象了。"},{"type":"paragraph","text":"今年是丰收了，然而整个的农村经济却开始走向崩溃；高利贷，军粮，事业谷，文化谷……连重建慈溪中学校舍一百六十余万斤的预算谷都摊派任田亩上，一连串的重压，试问丰收究竟属于谁?自外汇提高后。百物频趋上涨，然面食谷，这农村经济的唯一命脉，因着秋收的丰满，像洪水泛滥一样地充斥市场，供过于求，于是跌价了，由每百斤二万六千元跌到一万二千元，几星期来，与百物的上涨，一直呈现反比例。因此农民们望着黄金色的谷子，开始流下辛酸的眼泪。"},{"type":"paragraph","text":"(梦，六日寄)"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ecdd3ffc90"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
