script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji50","name":"毛泽东全集第50卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji50.pdf"],"article":{"title":"对上海市革委会关于解决“老大难”单位问题报告的批语","alias":"","parts":[{"type":"paragraph","text":"对上海市革委会关于解决“老大难”"},{"type":"paragraph","text":"单位问题报告的批语"},{"type":"paragraph","text":"（1968年8月16日）这个材料讲得很具体，有说服力，建议转发各地"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"八月十六日"},{"type":"paragraph","text":"[1]指上海市革委会1968年8月14日关于落实两个布告、解决400多个“老大难”单位问题给毛泽东等的报告。报告说，在宣传、学习、贯彻和落实毛主席亲自批准的“七·三”布告和“七·二四”布告，收缴武器，解决“老大难”单位问题的实践中，我们有以下几点体会：一、解决“老大难”单位的问题，要以毛主席的最新指示为武器，对群众进行深入细致的思想工作。二、解决“老大难”单位的问题，关键在于发动群众、依靠群众，让群众起来促头头。三、对“老大难”单位的革命委员会要采取积极慎重的态度，妥善处理。四、注意发扬“老大难”单位中的先进因素，促使其改变落后面貌。8月18日，中共中央、中央文革转发了这个报告。"}],"authors":["毛泽东"],"dates":[{"year":1968,"month":8,"day":16}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":266,"page_end":266},"tags":[{"name":"毛泽东","type":"人物"},{"name":"中央文革","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8e741830c7"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
