script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"伟大的导师 伟大的领袖　毛主席万岁!伟大的统帅 伟大的舵手","authors":[],"dates":[{"year":1966,"month":11,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"\u003cIMG alt=请插入5号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1966\\11\\66b4040101.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e\u003cIMG alt=请插入5号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1966\\11\\66B40401AA.JPG\"\u003e毛主席再一次接见革命小将，亲切地向我们鼓掌。毛主席啊，我们最敬爱的领袖，我们对您无限敬仰，您教导我们:“你们要关心国家大事，要把无产阶级文化大革命进行到底!”我们铭记在心永不忘。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入5号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1966\\11\\66b4040102.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e\u003cIMG alt=请插入5号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1966\\11\\66B40401AB.JPG\"\u003e我们伟大的导师、伟大的领袖、伟大的统帅、伟大的舵手毛主席和他的亲密战友林彪同志在天安门城楼上检阅红卫兵和革命师生。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入5号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1966\\11\\66b4040103.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e\u003cIMG alt=请插入5号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1966\\11\\66B40401AC.JPG\"\u003e林彪同志在接见各地革命师生和红卫兵大会上讲话。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入5号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1966\\11\\66b4040104.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e\u003cIMG alt=请插入5号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1966\\11\\66B40401AB.JPG\"\u003e战胜暴风雪、舍己护羊群的小英雄龙梅从内蒙古草原来到天安门，接受伟大领袖毛主席的检阅。龙梅、玉荣是毛泽东思想哺育下成长起来的草原英雄小姐妹，是广大青少年学习的榜样。红卫兵和革命师生纷纷前来请小英雄龙梅在《毛主席语录》上签字留念。\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入5号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1966\\11\\66b4040105.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e\u003cIMG alt=请插入5号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1966\\11\\66B40401AB.JPG\"\u003e赴京进行革命串连的各民族红卫兵和革命师生，千百次地向毛主席热烈欢呼，最坚决地向毛主席保证:誓死保卫和贯彻执行以毛主席为代表的无产阶级革命路线，彻底批判和坚决反对资产阶级反动路线，把无产阶级文化大革命进行到底!"},{"type":"paragraph","text":"本版照片均系新华社记者摄(传真照片)\u003c/FONT\u003e"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"林彪","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"288520763c"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
