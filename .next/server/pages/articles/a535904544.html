" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共中央华东局关于防止和纠正侵犯中农利益现象的通报","authors":[],"dates":[{"year":1952,"month":4,"day":3}],"is_range_date":false,"parts":[{"text":"中共中央华东局关于防止和纠正侵犯中农利益现象的通报","type":"title"},{"text":"据浙江余杭县农民代表会反映：该县普遍发生侵犯中农利益的现象，已严重地影响春耕生产的开展，各地应引起严重注意。该县建设、中溪两乡去年遭受水灾，农民之间互借九百余亩秧苗（约合九十担米）至今未还。新桥乡二村为开办民校，向六户中农借米二百六十斤，村长洪关松向富农借米五石，民兵队长魏志然向农民借米一石五斗，至今均未归还。被借户前去讨要遭痛骂。据反映在十五个村内即有一百五十三户借而未还的大米达一万零一百八十二斤，严重影响自由借贷的开展。白使耕牛的现象亦很普遍。黄湖区双溪乡农民代表王在林去年牛租一石米尚未收回。万石乡喻家村中农张建德、温惠德两户包耕一百亩田，仅收到一石米的人牛工资。据八个村统计，有四十二户牛主共二千二百九十九斤的牛工工资米收不到。由于白使耕牛，致牛主养牛信心不高，保养很差。冬春以来，全县先后死去耕牛一百余头。由于侵犯中农利益的结果，使部分农民叫苦。仓前乡三村九十三户，叫困难者达一半（真正困难的只有十三、四户）。和平乡中南村九十余户，除地主、富农外，其余皆喊困难（真正困难只有四户）。新桥乡五村农民江德顺怕借贷，讨新娘子花了三百八十余万元。上述情况，各地均可能发生，必须在当前春耕生产中，通过各级农代会、农民座谈会、村农民大会，广泛宣传发展农业生产的十大政策，并具体了解强借白使的原因，对贫苦农民生产困难，必须采取积极办法解决。例如组织副业生产，增加农本，组织互助，正确开展自由借贷，乡间尚未分配的土地改革果实应首先分配给贫苦农民，国家贷款应首先照顾帮助贫苦农民解决生产困难，并教育贫农、雇农懂得团结中农的重要性，懂得强借白使侵犯中农利益对自己是不利的。为了从实际行动上团结中农，对强借白使严重侵犯中农利益的乡村干部，除令其向群众公开检讨外，对情节严重的应分别给予应得处分。对懒汉二流子的强借白使行为，要予以制止。对强借白使的一般农民，应在双方协商的原则下，有粮的应即归还，余粮不多的分期归还，确实困难的应在双方自愿原则下，言明利息，确定还期，做好字据，藉以稳定群众情绪，打开借贷门路，以解决春耕生产中贫苦农民生产上的困难。","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a535904544"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
