" crossorigin="">{"props":{"pageProps":{"books":[{"id":"chuanxinlu3","name":"十年文革中首长讲话传信录（下册）","internal":false,"type":"pdf","official":false,"author":"周良霄,顾菊英","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/十年文革中首长讲话传信录3.pdf"],"article":{"title":"总理办公室吴斌传达总理对西安的指示","parts":[{"type":"title","text":"837.总理办公室吴斌传达总理对西安的指示"},{"type":"paragraph","text":"(1967年7月14日上午)"},{"type":"paragraph","text":"一、你给总理的来信已收到。关于毕业生的问题，如照来信所提的办法，时间会拖得很"},{"type":"paragraph","text":"长，中央现在正在研究一个妥善处理的办法。"},{"type":"paragraph","text":"二、据悉，西安最近打砸抢又在抬头，而且两方面都有，希望双方能通过协商予以制止。"},{"type":"paragraph","text":"如果不行，将来可来北京解决，但现在不要来。"},{"type":"paragraph","text":"三、听说交大对黄经耀、胡辉有意见。黄、胡两人是中央派去的，而且从一开始也是支"},{"type":"paragraph","text":"持交大造反派的，希望能注意同他们的关系。"},{"type":"paragraph","text":"四、霍士廉身体很不好，要批判他，可以。但一定要注意他的健康，中央已委托省军区"},{"type":"paragraph","text":"和驻军加以掌握。关于霍士廉是叛徒问题，根据中央所知，情况并非如此。"},{"type":"paragraph","text":"接电话人：交通大学李世英"},{"type":"paragraph","text":"七月十四日上午"}],"authors":["吴斌"],"dates":[{"year":1967,"month":7,"day":14}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":301,"page_end":301,"alias":""},"tags":[{"name":"霍士廉","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"519827cbd0"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
