<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"活学活用毛主席著作，挑起革命的重担","authors":["黄咏雪"],"dates":[{"year":1965,"month":3,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"化学工业部上海化工医药设计院技术员　黄咏雪"},{"type":"paragraph","text":"我是一个青年技术员，从几年来的切身体验中，深感要做好工作，必须以毛泽东思想武装自己的头脑。"},{"type":"paragraph","text":"记得在一九六二年，由于工作需要，组织上要我担任设计组的副组长。起先我担心做不好工作，后来我想，应该听毛主席的教导，在革命工作中要拣重担子挑。于是就鼓起勇气，努力工作和学习，尽力将工作做好。不久，上级下达一项重要的设计任务，为了迅速解决一种新材料的生产，要在两个月内完成两台高压釜，其中一台还要带电磁振动搅拌器。由于过去没有做过这种设计，任务又十分紧急，很难安排。有人甚至认为，电磁振动搅拌器不落实，不能做。怎么办呢?我反复思量，得不出答案，就去学习毛主席著作。毛主席在《关于重庆谈判》中说:“什么叫工作，工作就是斗争。那些地方有困难、有问题，需要我们去解决。我们是为着解决困难去工作、去斗争的。越是困难的地方越是要去，这才是好同志。”读着这些话，我感到充满了勇气和力量，下决心主动去接受这个光荣任务。经过比较深入的调查研究，跑了许多单位去向别人请教，在领导的关怀和其他工种的配合下，终于完成了这项紧急任务。这使我深深地体会到，搞设计工作也和做其他革命工作一样，一定要发扬敢于斗争，敢于胜利的革命精神，才会信心百倍，排除万难。"},{"type":"paragraph","text":"后来，我们组的正组长调走了，这样我的责任就更重了，既要保证生产任务的完成，又要负责培养新人。怎样才能不辜负党的委托和群众的信任呢?这对我是又一次考验。当时有人对我说些泄气的话，甚至讥笑我是“黄毛丫头”，还说什么“技术上能力不足就不要做”。听了这些话，我几夜睡不安稳，是挺身前进呢还是退却?思想上犹豫不决。这时候，我多次读了毛主席《在中国共产党全国宣传工作会议上的讲话》，毛主席说:我们要“能够勇敢地负起责任，克服困难，不要怕挫折，不要怕有人议论讥笑”。越琢磨，心里越亮，我决心依靠领导，依靠群众，努力提高思想水平和业务水平，把这副担子挑起来。"},{"type":"paragraph","text":"然而，怎样才能把小组工作搞好呢?我带着问题，学习了毛主席的《关心群众生活，注意工作方法》，认识到千百万真心实意地拥护革命的群众，是真正的铜墙铁壁，是什么力量也打不破的。我想，把全组同志的积极性充分地调动起来，团结一致，就会产生巨大的力量。因此，我按照党的指示，从抓政治工作入手，首先是针对组里存在的问题，加强学习毛主席著作；其次是建立小组核心，有事集体研究，分工负责，发挥骨干带头作用；此外是做好一人一事的思想工作。例如我组有位小青年，原来业余时间爱荡马路，经常谈吃谈穿，羡慕资产阶级生活方式，不安心工作。我就设法和他接近，了解他的思想情况，启发他的阶级觉悟，加强他的工作责任感，并且帮助他安排业余学习。我当时在离设计院很远的地方搞试验，但不管刮风下雨，每逢星期一、三、五晚上总要赶来和他一起学习。经过长期的点滴工作，他有了较大的转变，政治上已开始要求进步，争取参加共青团。"},{"type":"paragraph","text":"在加强政治思想工作的同时，我又注意把群众的干劲落实到生产中去，并且通过大练基本功等方法，提高大家的业务技术水平，同时发扬技术民主，这就保证了设计质量和加速了施工进度。去年上半年，我们小组的任务很重，如果兵力分散，就会使工作被动。这时候我就按毛主席关于集中优势兵力打歼灭战的思想办事，把小组能够投入的力量都集中起来，一以团员和青年组成突击队为核心力量，在较短时间胜利完成了任务，并且取得了打歼灭战的经验。去年一年，我们共打了三次歼灭战，在生产斗争中取得了主动地位，一些紧急任务都能及时地完成。"},{"type":"paragraph","text":"回顾这几年来，由于听毛主席的教导，做了一些工作，但因为自己对毛主席的著作还没有真正学到手，学到家，因此离开党和人民的要求还很远。今后一定要更努力、更深入地学习，沿着毛主席指示的道路奋勇前进。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b83a8ffb70"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
