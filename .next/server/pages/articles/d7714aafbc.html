script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"上钢五厂狠批地主资产阶级人性论和阶级斗争熄灭论深入开展“一打三反”运动促进生产发展今年一至五月，全厂工业总产值比去年同期增长百分之三十四","authors":[],"dates":[{"year":1971,"month":6,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　为了迎接伟大的、光荣的、正确的中国共产党诞生五十周年，上钢五厂党委遵照毛主席关于“党组织应是无产阶级先进分子所组成，应能领导无产阶级和革命群众对于阶级敌人进行战斗的朝气蓬勃的先锋队组织”的伟大教导，带领广大党员和革命群众，狠批刘少奇一类政治骗子所散布的地主资产阶级的人性论和阶级斗争熄灭论，深入开展“一打三反”运动，狠狠打击了一小撮阶级敌人的破坏活动，推动了全厂革命和生产的发展。"},{"type":"paragraph","text":"前一时期，这个厂的“一打三反”运动取得了一些成绩。但由于受到刘少奇一类政治骗子所散布的地主资产阶级人性论和阶级斗争熄灭论的余毒的影响，部分干部、群众产生了松劲思想，一度影响了运动的深入开展。针对这个情况，厂党委组织党员和群众认真学习《共产党宣言》、《法兰西内战》等马、列著作，认真学习毛主席关于阶级、阶级矛盾和阶级斗争的论述，认真学习党章。同时召开了迎接中国共产党诞生五十周年全厂党员大会，动员共产党员站到阶级斗争第一线，不断向一小撮阶级敌人发动进攻，用革命和生产的新成绩，向党诞生五十周年献礼。"},{"type":"paragraph","text":"机动部党总支在前一段时期，曾认为“生产不翻身，机动部就不能翻身”，因此放松了“一打三反”运动，一门心思想把生产搞上去。可是结果事与愿违，生产没有搞上去，无政府主义歪风邪气却有所抬头，一小撮阶级敌人乘机进行破坏和捣乱。在厂党委帮助下，机动部党总支认真吸取了经验教训，他们遵照毛主席关于“阶级斗争，一抓就灵”的教导，充分发动党内外群众，深入开展“一打三反”运动，在很短的时间内，对敌斗争取得了重大胜利。五车间日班党支部通过学习马克思主义、列宁主义、毛泽东思想关于阶级斗争的教导，狠批地主资产阶级的人性论和阶级斗争熄灭论，克服了右倾麻痹思想，揪出了一个窃取国家机密的坏家伙。广大共产党员联系这一事实，进一步开展大学习、大批判，更加勇敢地投入战斗。"},{"type":"paragraph","text":"“革命就是解放生产力，革命就是促进生产力的发展。”通过深入开展“一打三反”运动，有力地促进了生产的发展。今年一至五月，全厂工业总产值比去年同期增长百分之三十四，有些车间五月底就已完成了上半年国家生产计划。现在，这个厂党内外广大群众正再接再厉，努力作战，决心夺取革命和生产的更大胜利，向党诞生五十周年献礼。　(本报通讯员)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"name":"一打三反","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d7714aafbc"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
