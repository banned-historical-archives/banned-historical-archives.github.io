script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"沈阳部队某炮团党委成员认真学习革命理论  带头做限制资产阶级法权的模范","authors":[],"dates":[{"year":1975,"month":4,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"沈阳部队某炮团党委成员认真学习革命理论"},{"type":"paragraph","text":"带头做限制资产阶级法权的模范"},{"type":"paragraph","text":"据新华社沈阳一九七五年四月十一日电 人民解放军沈阳部队某炮团党委成员，认真学习毛主席关于理论问题的重要指示，决心坚持党的基本路线，永远和群众打成一片，不断增强抵制资产阶级思想侵蚀的自觉性，为巩固无产阶级专政而斗争。"},{"type":"paragraph","text":"几年来，这个团党委成员不离战士行列，坚持和群众打成一片。战备训练，他们和战士一起摸爬滚打，共同操炮；营建施工，他们和战士一起运土搬石，抹灰砌砖；助民劳动，他们和战士一起挖渠插秧，送肥背稻；休息的时候，战士唱歌，他们打拍子，官兵同乐，亲密无间。在这次学习中，大家围绕毛主席关于理论问题的指示，进一步讨论了抵制资产阶级思想侵蚀的问题，一致表示要把本团在长期革命实践中形成的领导干部扎根连队、扎根群众的好作风坚持下去。"},{"type":"paragraph","text":"团党委成员在学习无产阶级专政理论时还认识到，领导干部能不能自觉批判资产阶级法权思想，带头限制资产阶级法权，一个突出的问题，就是能不能把自己摆在“普通一兵”的位置上，平等待人，虚心接受群众的批评和监督。如果走上了领导岗位，便觉得自己“身价”高了，“官”升脾气长，说话嗓门粗，不再把自己置于群众的监督之下，听不进群众的批评，就会上林彪扩大资产阶级法权、搞资本主义复辟的圈套。我们的一切干部，不论职位高低，都是人民的勤务员，决不能靠权势压人，靠资格摆布人。过去，这个团党委的“一班人”都能较好地接受群众的监督，党委每次整风，都把战士和机关干部请来提意见。这次毛主席关于理论问题的重要指示发表不久，三连战士冯贵洲写信批评党委有的成员没有把主要精力放在抓好学习上。团党委连续两次开会研究，充分肯定这个普通战士的批评意见，认真讨论和制订了改进措施，全团学习很快掀起了高潮。去年以来，团党委先后收到三十一封群众来信。党委对群众正确的批评和建议，都热情欢迎，诚恳接受，使干群关系更加融洽。"},{"type":"paragraph","text":"通过这次学习，这个团的党委成员认识到，在社会主义时期，必然存在着扩大资产阶级法权与限制资产阶级法权的斗争。因此，打掉资产阶级作风，抵制资产阶级思想的侵蚀，不断提高批判资产阶级法权思想的自觉性，是领导干部世界观改造的一个长期的、艰巨的战斗任务。他们表示一定要带头学好无产阶级专政的理论，带头做限制资产阶级法权的模范，把无产阶级专政下的继续革命进行到底。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"限制资产阶级法权","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bbe50eae1b"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
