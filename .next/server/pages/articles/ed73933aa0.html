<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"齐民友的发言（摘录）","authors":[],"dates":[{"year":1958,"month":7,"day":22}],"is_range_date":false,"parts":[{"text":"齐民友的发言（摘录）","type":"title"},{"text":"（1958年7月22日在党支部大会上）","type":"paragraph"},{"text":"今天想谈一谈自己思想上跟党的方针政策相对抗的一些问题。问题主要的是这样几点：一个是关于理论联系实际的问题，一个是关于数学中间能不能出现李始美这一类的问题，再一个问题是群众路线的问题。","type":"paragraph"},{"text":"首先是关于理论联系实际的问题。听到物理系许多同志讲，说我们学的这些数学物理方程，在物理中间根本就没有什么用，最初心理很矛盾。但是后来想一想，总觉得数学嘛总是好多人化了终身力量搞出来的，尽管今天还没有什么用处，但是这些理论总还是有价值的，所以在这次运动中间对数学究竟能不能联系实际的问题，我没有公开说数学不能联系实际，但我总是感觉到数学有它自己许多特殊性。所谓特殊性，第一点就是如果一个人只懂得一点数学，那么这个人要他去解决实际问题，那多半是不可能的。所以我觉得数学要联系实际，首先要懂得生产，或者是物理、力学。这一点我觉得与物理、化学系是不同的。如果学物理学化学的话，那么学了物理化学以后，也就有了一定的生产知识，也就大体上可以解决生产中间的问题。但是如果一个人只懂得一些数学的话，去联系实际是很困难的。","type":"paragraph"},{"text":"其次一个想法是我觉得现代数学，它的产生是和大工业相联系的。所以我觉得数学要联系实际的话，就要联系尖端。在很早以前党委提出来在教学中间要贯彻四个结合。当时我就觉得要理论联系实际，体力劳动与脑力劳动相结合，这两个结合在数学系不大好搞。为什么理论联系实际不好搞呢？因为我觉得数学既然是与大生产相联系，而到现在为止，工厂里面还很少跟我们提出问题来，所以当时就觉得到底工业中有没有实际可联系，这里很成问题。后来李国平先生到生产中去，到重型机床厂去提出了一些问题来，很快就改变了我的想法，但还有一个问题就是现在生产中是不是需要那样多的数学，是不是迫切需要，对这个问题现在还没有很好地解决。","type":"paragraph"},{"text":"第三点：数学中是不是每一个分支都能够联系生产，我觉得这里边也还有些问题。有些分支能够直接跟生产相联系，例如计算数学、微分方程，另外有些东西我觉得它虽然不那样直接，但是联系生产也还有许多线索可寻，也能间按地联系实际。但是另外还有一部分比方说抽象代数中的一些问题，我觉得它并不是直接为了生产的某一种需要而产生的。你很难说代数中哪一个理论是为了解决生产中的哪一个问题。我觉得这里也有些东西是数学本身为了自己发展的需要而产生的。所以这些数学分支的产生它的目的就是为了解决数学本身的问题，要它勉强去联系实际究竟可能不可能？所以这样我就觉得数学它的构造好象一个金字塔一样，有些人懂得数学也懂得生产，那么这些人就能从生产中提出问题来形成一个数学问题。但是另外的数学家有一部分人也可以不必懂得生产，特别是学那些很抽象的东西，象代数中的某些部分或者数论或者别的。他们不懂生产也没有关系，因为别人提出数学问题来，其中如果有代数问题，有数论问题就可以提出来，这已经成为一个数学问题，他们就可以加以解决。","type":"paragraph"},{"text":"其次，关于出现李始美的问题。在报上看到出现李始美的消息以后，我自已有这样一些想法：数学界能不能出现李始美，当时是有怀疑的。觉得数学这个东西也是从劳动中来的，一切劳动当然以体力劳动为基础，这都没有疑问。但是从体力劳动中能产生一些数学知识，是不是能够产生现代比较高深一点的数学知识，当时很怀疑。我觉得一个人就是从事工农业生产的话多半也并不需要多少数学知识，或者需要的东西也并不是那样高深的东西。这样，他既然不怎么需要，那也就不会化工夫去钻研；既然不化工夫去钻研，究竟能不能出李始美呢？我就觉得有问题了。","type":"paragraph"},{"text":"第三个问题，关于群众路线的问题：我觉得数学这个东西是比较严密的，逻辑性也较强，所以我觉得一个人要掌握数学就要经过很严格的训练，同学只能在老师指导下才能把数学学好。我觉得对于数学的问题，教师的发言应该比同学多得多。因为老师懂得很多，同学就懂得少些，懂得多一些解决问题就深刻一些，发表的意见可能就正确些，同学懂得少一些，有时候就不太容易提出中肯的意见，特别是关于教学内容。所以我对在数学中搞群众运动也是有过怀疑的。这个观点现在是处于一个动摇地位。","type":"paragraph"}],"comments":[],"origin":"《高举马列主义红旗前进--武汉大学的教育大革命--》，教育与生产劳动相结合展览会湖北馆编，上海教育出版社，1958年。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ed73933aa0"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
