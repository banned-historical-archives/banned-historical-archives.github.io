script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反对“日韩会谈”　要求恢复日中邦交东京四万人举行反美集会游行日共号召人民捍卫反帝旗帜，对修正主义集团进行斗争","authors":[],"dates":[{"year":1964,"month":3,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京19日电】　东京消息:约四万日本人民昨晚在东京举行三次集会，反对“日韩会谈”。这些集会是反对“日韩会谈”全国统一行动的一部分。"},{"type":"paragraph","text":"集会上还提出了恢复日中邦交和立即无条件恢复反对日美“安全条约”国民会议的活动的要求。"},{"type":"paragraph","text":"集会所通过的宣言指出，如果日本人民在反对日美“安全条约”共同斗争组织的旗帜下进一步展开他们的斗争和加强他们的团结的话，日本人民就能够给予美帝国主义者以及日本反动派以打击。宣言还要求在这面旗帜下团结起来粉碎一小撮分裂主义者的企图。"},{"type":"paragraph","text":"日本共产党主席野坂参三在其中一次集会上讲话，认为这次集会是“具有历史意义的集会”。他指出，敌人正在匆匆忙忙地使“日韩会谈”得以告成。他呼吁说:“我们这一边有数千万爱国者。让我们的运动不断扩大，直到其规模和力量远远超过一九六○年反对缔结日美‘安全条约’的斗争。”"},{"type":"paragraph","text":"会后，人民列队前往国会，递交了反对“日韩会谈”的请愿书，接着他们冒着寒风在东京的大街上游行。越来越多的人前来参加示威游行，示威者中还包括来自十五个县的人。日本共产党积极支持昨天的群众示威游行。"},{"type":"paragraph","text":"三月十四日，日本共产党发表声明，号召日本人民捍卫反对帝国主义的旗帜，对修正主义集团和右翼社会民主主义者进行斗争以对付今天的严重局面。"},{"type":"paragraph","text":"昨天在国会的大门口，日本共产党议员野坂参三和志贺义雄接受了示威者的请愿书。"},{"type":"paragraph","text":"集会前，示威者的三十名代表前往美国大使馆、日本首相府以及南朝鲜“代表部”，要求立即停止“日韩会谈”。"},{"type":"paragraph","text":"他们还前往日本社会党总部和日本工会总评议会总部，要求他们同意无条件恢复反对日美“安全条约”国民会议的活动。"},{"type":"paragraph","text":"全国四十个地方昨天举行了类似的集会，其中包括北海道、青森、秋田、京都和宫崎等县。"},{"type":"paragraph","text":"十七日，福冈举行了有三千人参加的类似集会。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3418c1bd0e"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
