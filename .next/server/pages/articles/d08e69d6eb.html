script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"燕京大学校长陆志韦暨师生员工 国庆日函毛主席致敬","authors":[],"dates":[{"year":1951,"month":10,"day":1}],"is_range_date":false,"parts":[{"text":"燕京大学校长陆志韦暨师生员工国庆日函毛主席致敬","type":"title"},{"text":"【本报讯】燕京大学校长陆志韦暨全体师生员工，于国庆日写信向毛主席致敬。原信如下：","type":"paragraph"},{"text":"中央人民政府毛主席：","type":"paragraph"},{"text":"我们在欣逢中华人民共和国成立两周年之际，看到两年来祖国的突飞猛进，谨以至诚感谢主席和中国共产党的领导。燕京大学自从改为公立，完全解脱美帝国主义的压迫牵制之后，今天头一回逢到国庆。我们向主席保证从今以后更加深自我检讨，加强爱国主义的教育，努力完成祖国交给我们的任务。","type":"paragraph"},{"text":"一九五一年十月一日","type":"paragraph"},{"text":"1951年10月5日人民日报电子版","type":"paragraph"},{"text":"","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d08e69d6eb"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
