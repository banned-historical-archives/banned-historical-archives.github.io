<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"安徽有些农业社因统购粮食过多加重了春荒","authors":["中央救灾委员会办公室"],"dates":[{"year":1957,"month":5,"day":7}],"is_range_date":false,"parts":[{"text":"安徽有些农业社因统购粮食过多加重了春荒","type":"title"},{"text":"中央救灾委员会办公室","type":"authors"},{"text":"新华社北京7日讯　据安徽省十个农业社的调查，因去年多征购了群众的粮食，从而加重了今年的春荒。十社情况如下：","type":"paragraph"},{"text":"桐城县天成社，去年估产为三百万斤，据此征购了一百一十五万斤，而该社实产只二百六十五万斤，应征购五十四万斤，多征了六十一万斤。加之，群众卖余粮后，按估产收入用钱，结果造成生活上的严重困难。1月底，该社缺粮户即占总户数的87％。","type":"paragraph"},{"text":"贵池县同心社，去年实产二百○七万斤，征粮四十八万斤，占23．1％；购粮二十四万斤，占11．5％。这个社除“五保户”外，别的户都缺粮。","type":"paragraph"},{"text":"泗县光明社，六百七十四户，三千○六十五人。去年实产粮食一百四十九万斤。按三定计算，全社需口粮一百一十万斤，饲料十一万斤，种子三十三万斤，公粮九万○五百八十三斤，共一百六十三万○五百八十三斤。收的粮食还不够用。但却统购了二十二万四千九百○九斤(社员自卖一万二千二百六十四斤不在内)。现全社普遍缺粮，已决定供应三十七万斤。","type":"appellation"},{"text":"泗县绿化三社，五百九十二户，二千六百五十六人。去年实收一百六十万斤。征粮二十二万斤，占13．7％。按三定计算，应卖余粮十二万斤，实卖三十四万斤(社员自卖二万多斤不在内)，占21．6％。因统购过多，现已供应二十七万斤。","type":"paragraph"},{"text":"泗县协力社，八百九十二户，三千八百六十九人。去年共收粮食一百八十二万斤(有稻四十三万斤)。按三定计算，共需留口粮一百三十九万斤，饲料七万一千五百五十斤，种子十八万斤，公粮十三万斤，共一百七十七万一千五百五十斤。收入仅够维持。但却统购二十八万斤。到5月份缺粮人口占51．5％，现已定销二十四万斤。","type":"paragraph"},{"text":"蒙城县金明社，一千一百九十二户，五千二百二十七人。去年中晚秋原估产二百八十九万斤，实收一百三十三万斤。其中须开支种子四万六千一百四十三斤、牛料十三万斤、公粮十三万斤，共三十万○六千一百四十三万斤。尚剩一百○二万斤，每人平均一百九十斤。统购二十九万斤(社员自卖十三万斤不在内)，只余七十三万多斤，每人只合一百四十斤。现定销二十八万斤。","type":"paragraph"},{"text":"蒙城县双北社，一千○五十二户，四千五百五十九人。1956年秋季，第一次估产一百八十三万斤，第二次估产一百四十四万斤。实收一百○六万斤。需开支种子十二万斤、牛料六万七千斤、公粮十三万斤、公积公益金三万五千斤，共三十五万二千斤。剩粮七十万余斤，统购二十八万斤，结果每人只剩粮九十五斤。现销三十万斤。","type":"paragraph"},{"text":"无为县田桥社，一千二百八十五户，五千三百四十六人。1956年实产三百八十四万斤，交公粮八十二万斤，占21．8％，购粮十八万斤，占4．9％，现退回公粮五十七万斤。","type":"paragraph"},{"text":"和县五星社，一百二十四户，四百一十人。1956年实收三十万斤，交公粮四万斤，占13．7％，购粮一万斤，占5％。现退公粮二万○五百七十斤。","type":"paragraph"},{"text":"和县保山社，九百六十六户，三千四百八十人。1956年实收粮食一百八十五万斤，交公粮三十一万斤，占27％，现退公粮二十四万斤。","type":"appellation"},{"text":"芜湖县大闸社，一千一百六十四户，五千○一十七人。1956年实产三百八十四万斤，交公粮八十二万斤，占21．8％，购粮十八万斤，占4．9％。现退公粮五十七万斤。","type":"paragraph"},{"text":"来源：1957年5月7日新华通讯社编《内部参考》。","type":"paragraph"}],"comments":[],"origin":"美国图书馆收藏","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2aaea11fa8"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
