" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji30","name":"毛泽东全集第30卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji30.pdf"],"article":{"title":"关于对南日、邓华两个发言稿的意见致李克农电","alias":"","parts":[{"type":"paragraph","text":"关于对南日、邓华两个发言稿的意见"},{"type":"paragraph","text":"致李克农2电"},{"type":"paragraph","text":"（1951年7月9日）李克农同志，并告金、彭："},{"type":"paragraph","text":"七月八日廿三时电收到。（一）公报稿可用，已予发表。（二）南日邓华两个发言稿均可用。惟南日稿内称“愿意接受苏联驻联合国代表马立克先生的提议并准备举行停战谈判”，改为“愿意举行停战谈判”，将“接受苏联”以下二十一个字删去，因为李奇微的声明在文字上并无愿意接受马立克提议的表示，如果南日这样说，可能引起对方的无谓的批评。邓华发言稿中所说马立克提议一段则是好的，不会引起批评的。如果你们认为南日发言稿中应有提"},{"type":"paragraph","text":"[1]南日，当时任朝鲜停战谈判朝鲜人民军总司令部首席代表。邓华，当时任朝鲜停战谈判中国人民志愿军代表。"},{"type":"paragraph","text":"[2]李克农，当时任中央人民政府外交部副部长。"},{"type":"paragraph","text":"[3]金，指朝鲜民主主义人民共和国首相金日成。彭，指中国人民志愿军司令员兼政治委员彭德怀。"},{"type":"paragraph","text":"[4]指李克农发来的关于朝中方面联络官已到开城地区，为在开城举行朝鲜停战谈判会议进行布置、准备的报道稿。毛泽东据此改写为朝鲜中央通讯社的电讯稿，并指示胡乔木：“即刻用英语广播，不必登报。”"},{"type":"paragraph","text":"[5]指南日、邓华分别准备在朝鲜停战谈判首次会议上的发言稿。这两个发言稿于1951年7月11日在《人民日报》发表。"},{"type":"paragraph","text":"关于对南日、邓华两个发言稿的意见致李克农电到马立克提议的话，应在另外的地方去说。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"七月九日十二时"},{"type":"paragraph","text":"1951年7月10日，朝鲜停战谈判正式开始。图为朝鲜停战谈判的地方开城。"}],"authors":["毛泽东"],"dates":[{"year":1951,"month":7,"day":9}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":428,"page_end":429},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1af709dfdd"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
