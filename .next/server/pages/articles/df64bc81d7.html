script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"抗战前有剥削是否清算","authors":[],"dates":[{"year":1948,"month":9,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"抗战前有剥削是否清算编辑同志："},{"type":"paragraph","text":"我村张修己家中七口人，四辈劳动起家，有一百一十五亩土地，在事变前用两个长工，他自有三个人参加劳动，跟班受苦，到事变后就不用长工了。他父亲在本村参加抗日秘密活动，被敌人杀害。修己在县里工作，前年群众说他家在事变前有封建剥削将他清算了，没给留一间房子。现在生活无法维持。他家是啥成份？应如何解决？"},{"type":"paragraph","text":"沙河二区张沟村清河"},{"type":"paragraph","text":"答：张修己既然生活无法维持，应即先给以生活资料与生产资料，使其能从事生产，至于张某是否该还清算，因所提材料还不具体详细，如事变后张某土地占有多少（占当地土地平均数若干）与如何耕种，都未说明，故现在没法答复你，请你将上述说明的详细材料，迅速寄来，以便答复。"},{"type":"paragraph","text":"——编者"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"df64bc81d7"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
