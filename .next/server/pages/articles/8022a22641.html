script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"各兄弟党代表在捷共代表大会致词一致严正批判修正主义达米扬诺夫说修正主义巢穴在贝尔格莱德","authors":[],"dates":[{"year":1958,"month":6,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【据新华社布拉格19日电】　捷共第十一次代表大会在19日下午和晚间继续进行大会讨论。"},{"type":"paragraph","text":"在下午会议上发言的有11位代表。"},{"type":"paragraph","text":"在下午会议上，除了中国共产党代表团团长外，在会上致祝词的还有保加利亚共产党、波兰统一工人党、德国统一社会党和保加利亚共产党代表团团长。他们都热烈地祝贺大会的召开和成功，强调同捷共、同捷克斯洛伐克人民之间的兄弟友谊和团结。"},{"type":"paragraph","text":"保共中央政治局委员拉·达米扬诺夫说，成熟、坚定和忠于马克思列宁主义思想的捷克斯洛伐克共产党今天是站在国际共产主义运动的最前列。他在谈到帝国主义者对社会主义阵营团结的进攻时说，帝国主义者目前正在利用修正主义来进攻。"},{"type":"paragraph","text":"达米扬诺夫说，今天，现代修正主义的巢穴是在贝尔格莱德，是在南斯拉夫共产主义者联盟的领导集团中。他又说，目前反对修正主义的斗争首先是反对南斯拉夫领导人的反马克思列宁主义的立场的斗争。达米扬诺夫说，在为维护马克思列宁主义学说的纯洁性而进行的斗争中，修正主义无疑将不可避免地遭到失败。"},{"type":"paragraph","text":"波兰统一工人党中央政治局委员洛加一索文斯基说，波兰统一工人党认为，以列宁主义原则为基础的社会主义阵营的团结是最重要的东西，因此它对南斯拉夫共产主义者联盟的纲领采取了批判的态度，这个纲领在许多重要问题上背离了马克思列宁主义原则，违反了国际工人运动团结的利益。"},{"type":"paragraph","text":"下午会议休会前，主席困宣读了日本共产党的贺电。"},{"type":"paragraph","text":"代表大会在19日晚间继续举行。各国共产党和工人党代表继续在会上致祝词。"},{"type":"paragraph","text":"罗马尼亚工人党代表团团长、中央政治局委员德勒吉奇说，罗马尼亚工人党坚决反对南共纲领中所包含的修正主义理论。南共领导人对以苏联为首的社会主义阵营的诽谤以及对马克思列宁主义基本理论的恶毒歪曲只会损害国际共产主义和工人运动，而有利于帝国主义反动派。"},{"type":"paragraph","text":"阿尔巴尼亚劳动党代表团团长、中央政治局委员卡博说，捷克斯洛伐克的胜利加强了整个社会主义阵营的力量。卡博还谈到了南共纲领对苏联和社会主义国家所进行的卑鄙的攻击。他说，南斯拉夫领导人是为帝国主义者、特别是美帝国主义者服务的无耻叛徒。"},{"type":"paragraph","text":"匈牙利社会主义工人党代表团团长、中央政治局委员福克·耶诺对捷克斯洛伐克人民在匈牙利反革命暴乱期间给予匈牙利人民的声援和无私的援助表示感谢。他指出，捍卫马克思列宁主义的纯洁性、反对南共领导集团的修正主义错误是匈牙利社会主义工人党的国际义务。"},{"type":"paragraph","text":"蒙古人民革命党代表团团长、中央政治局委员杜格苏伦谈到了南共纲领所明显表示出来的修正主义的危险。"},{"type":"paragraph","text":"在兄弟党代表团团长讲话时，会场上洋溢着无产阶级国际主义的亲密友爱气氛。起立致敬、长久欢呼、热烈鼓掌、紧紧握手、相互拥抱，构成了一幅令人感动的图画，兄弟党的代表带来了世界各地劳动人民对大会的情谊和祝贺，也表达了他们对捷共和捷克斯洛伐克人民的钦佩和高度信任。"},{"type":"paragraph","text":"晚间会议在当地时间10时结束。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8022a22641"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
