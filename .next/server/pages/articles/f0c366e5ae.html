" crossorigin="">{"props":{"pageProps":{"books":[{"id":"wenji2","name":"毛泽东文集第二卷（1999）","type":"pdf","internal":false,"official":true,"author":"中央文献研究室","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/wenji2.pdf"],"article":{"title":"关于没收汉奸财产问题","description":"根据中央档案馆保存的抄件刊印。","dates":[{"year":1937,"month":10,"day":15}],"parts":[{"text":"关于没收汉奸财产问题","type":"title"},{"type":"appellation","text":"朱、彭、任："},{"type":"paragraph","text":"十一日电悉。没收大地主，指没收汉奸政策的主要阶级内容，大地主而未为汉奸者，当然不在没收之列。在一切汉奸分子中，首先应坚决没收大地主，而对中层分子之为汉奸者，在未得民众同意以前，不应急于没收。工农中有被迫为汉奸者，应取宽大政策，以说服教育为主。这是统一战线中的阶级路线，有向全体明确说明的必要。"},{"type":"paragraph","text":"洛、毛"}],"comment_pivots":[{"part_idx":1,"offset":5,"index":1},{"part_idx":3,"offset":1,"index":2}],"is_range_date":false,"authors":["毛泽东"],"comments":["朱，指朱德。彭，指彭德怀，当时任八路军副总司令。任，指任弼时，当时任八路军政治部主任。","洛，指洛甫，即张闻天，当时任中共中央政治局常委，在中央负总责。"],"page_start":54,"page_end":54,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f0c366e5ae"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
