" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中央关于严格检查与处理类似黄逸峰压制批评事件的通报","authors":[],"dates":[{"year":1953,"month":1}],"is_range_date":false,"parts":[{"text":"中央关于严格检查与处理类似黄逸峰压制批评事件的通报","type":"title"},{"text":"兹发去华东局关于公布黄逸峰事件的通知，望在报刊发表。中央认为华东局如此处置是正确的，必要的。黄逸峰事件已在解放日报和人民日报先后公布，两报都写了重要的社论。各地除应告官员注意阅读华东局各项有关文件及人民日报社论外，并且注意检查干部中类似黄逸峰这样违抗中央一九五零年四月关于在报纸刊物上展开批评和自我批评的决定，压制批评、压制民主、对上欺骗隐瞒，对下打击报复的事件。对于这些事件均应严格处置，并选择重要者在报上公布（但不必在电台广播），以推动全党对反对领导机关中的官僚主义和下属组织中的命令主义、恶霸作风，反对一部分干部目无党纪法纪、不服从党的领导、把自己所领导的单位当作独立国为所欲的极端危险的倾向。","type":"paragraph"},{"text":"附：","type":"appellation"},{"text":"华东局关于公布黄逸峰事件的通知","type":"subtitle"},{"text":"华东交通部部长黄逸峰等人反对民主、压制批评、对上隐瞒欺骗、对下打击报复，华东局已根据这种错误的严重性质，决定开除黄逸峰的党籍，并对其他有关人员分别予以应得的处分。该项有关新闻及社论，即在人民日报（已在一月二十三日人民日报发表 – 编者注）和解放日报发表，望各地党委注意组织党员干部认真学习，藉以提高党员党性修养，改善工作作风，开展自下而上的批评，加强党与群众的联系，发动坚决反对压制批评、强迫命令、违法乱纪及对党不忠诚、不老实、写假报告、虚报成绩等反党的恶劣行为和各种形式的官僚主义作风的斗争。","type":"paragraph"},{"text":"各地党报除对人民日报、解放日报有关黄逸峰事件的社论、文章、新闻及时转载外，并可根据党地实际情况，撰写社论或短论予以配合。各省市负责同志应为解放日报写一篇文章，对这一事件表明态度，并号召与组织党地干部、群众充分揭发类此事件。此类文章如认为必要，亦可在党地报纸同时发表。","type":"paragraph"},{"text":"各地对此学习情况及思想动态望及时具报，并望向解放日报报道。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ede807d8af"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
