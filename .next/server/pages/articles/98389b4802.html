" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"上海市人民政府委员会举行会议 陈市长对五反处理工作作了指示","authors":["上海市新闻处"],"dates":[{"year":1952,"month":5,"day":13}],"is_range_date":false,"parts":[{"text":"上海市人民政府委员会举行会议 陈市长对五反处理工作作了指示","type":"title"},{"text":"上海市新闻处","type":"authors"},{"text":"【上海市新闻处十三日讯】上海市人民政府委员会在十一日举行第十次会议。出席会议的，有:上海市人民政府陈毅市长，潘汉年、盛丕华副市长和委员王芸生、申葆文、吴蕴初、沈尹默、胡子婴、马纯古、张祺、许涤新、郭棣活、荣毅仁、赵祖康、刘长胜、苏延宾等共十六人。列席会议的，有:上海市各界人民代表会议协商委员会委员，上海市增产节约委员会委员，上海市人民政府各委、局、处、院、署的首长，各人民群众团体的代表和上海市工商联执监委员等共一百九十一人。","type":"paragraph"},{"text":"会议在听取并批准了上海市增产节约委员会潘汉年主任关于上海市五反运动情况的报告和许涤新秘书长关于五反处理工作的报告后，根据中央人民政府政务院的命令，决定在市人民政府领导下，设立人民法庭，处理完全违法户与严重违法户的问题；会议并批准市增产节约委员会设立评议委员会，协助人民法庭处理违法工商户案件。","type":"paragraph"},{"text":"在会议讨论时，上海市人民政府委员刘长胜、郭棣活、胡子婴和市各界人民代表会议协商委员会委员许杰、刘靖基等先后发言，一致赞扬五反运动的伟大成就，并认为:目前各界人民应该把五反运动进行彻底，巩固运动的胜利，同时，应采取有效措施，照顾生产。","type":"paragraph"},{"text":"陈毅市长在会上作了总结发言。他首先指出:本市五反运动已获得伟大成绩。他分析取得伟大成就的主要原因是:由于坚决贯彻了毛主席的指示和中央人民政府关于五反运动的各项政策；充分发动了工人、店员群众和争取团结了高级职员参加五反斗争；全面向资本家交代了五反政策，使他们大多数认识了五反运动的意义和目的；在运动中注意了“五反、生产”两不误；迅速地作好了中、小工商业户的定案处理工作。因而保证了上海市五反运动能够有领导有秩序地向前发展，步步胜利，并获得伟大成就。陈毅市长对五反的处理工作作了详细的阐述。他说:本市五反处理工作，应常按照毛主席所规定的“过去从宽，今后从严；多数从宽，少数从严；坦白从宽，抗拒从严；工业从宽，商业从严；普通商业从宽，投机商业从严”的五条基本原则，逐步地、细致地、缜密地进行；一般并应采取“退补、生产两不误”的方针，做到退款不误生产，生产不误退款，以更有利于发展生产；但对于极少数罪恶深重、不办不足以平民愤的大盗窃犯，或企图利用人民宽大妄想破坏者，则将坚决地严厉地依法严办。","type":"paragraph"},{"text":"陈毅市长在总结发言的最后，着重指出:五反运动是为开展爱国增产节约运动和大规模的经济建设创造条件，奠立基础。目前，上海市五反运动即将取得完全的彻底的胜利；我们应该在已有的胜利基础上，努力做好处理工作，及时转入增加生产、厉行节约、提高工作效率、开展增产节约运动，以支持中国人民志愿军和巩固国防，为迎接大规模的经济建设而奋斗。","type":"paragraph"}],"comments":[],"origin":"《文汇报》1952年5月13日","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"陈毅","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"98389b4802"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
