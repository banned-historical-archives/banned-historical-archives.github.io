script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"垄断资产阶级用毒品麻醉人民群众　美国吸毒流行　吸过毒的有两千万人　许多小学生已开始吸毒","authors":[],"dates":[{"year":1969,"month":8,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"垄断资产阶级用毒品麻醉人民群众"},{"type":"paragraph","text":"美国吸毒流行"},{"type":"paragraph","text":"吸过毒的有两千万人　许多小学生已开始吸毒"},{"type":"paragraph","text":"据新华社讯　华盛顿消息：吸毒在美国广泛流行。这是美国垄断资本主义制度已经腐烂透顶的一个标志。"},{"type":"paragraph","text":"由于美国国内阶级矛盾日益激化，美国垄断资产阶级为了引诱美国人民脱离现实的阶级斗争，正在加紧鼓励和引诱人们吸毒。"},{"type":"paragraph","text":"美国垄断资产阶级通过报刊、杂志、电影、电视，用各种方式宣传吸毒。美国许多地方都在种植和制造毒品。"},{"type":"paragraph","text":"七月十四日出版的《美国新闻与世界报道》就承认，“我们正在种植自己的北美大麻叶……它生长在美国许多地方”。这家杂志还承认在美国流行的许多麻醉剂，“是在美国制造的”。"},{"type":"paragraph","text":"在美国，到处可以“合法”地买到各种吸毒工具，而且这种买卖还在“日益兴隆”。"},{"type":"paragraph","text":"和警察串通一气的贩毒集团，在美国到处大摇大摆地推销毒品。"},{"type":"paragraph","text":"据美国资产阶级报刊透露，单在纽约市几个地方，去年一年就销售了一亿一千五百万美元的海洛因。"},{"type":"paragraph","text":"美帝头子尼克松十四日在给美国国会的一封信中承认，在纽约市仅吸食和注射海洛因的就约有四万人，而且以每年增加九千名左右的速度发展着。美国全国有大批大学生吸毒。"},{"type":"paragraph","text":"美国垄断资产阶级的喉舌《新闻周刊》透露，在美国，约有两千万美国人吸过毒，吸用“北美大麻叶”麻醉剂的学生很多，而且吸毒的青少年的年龄越来越轻，许多小学生已开始吸毒。纽约市中学校长联合会主席最近曾公开承认说，“我认为（吸毒）问题比大多数人所能想象的要广泛得多”。"},{"type":"paragraph","text":"据美国资产阶级刊物最近报道，在六月底的一天之内，纽约市就有二十四人因吸用海洛因而被毒死。"},{"type":"paragraph","text":"美国垄断资产阶级在侵越美军中推行吸毒，利用毒品麻醉美国士兵去为他们卖命。据美国《新闻周刊》透露，在侵越美军中，至少有百分之十五的士兵吸毒，军队里面还有专门的运输车和直升飞机给士兵运送毒品。"},{"type":"paragraph","text":"美国垄断资产阶级依靠毒品来维持统治，充分说明美国垄断资产阶级日暮途穷，美国的社会制度已经腐烂透顶。美国人民终会起来把美国垄断资产阶级和他们推销的毒品一起扫进历史垃圾堆去。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"649e295e46"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
