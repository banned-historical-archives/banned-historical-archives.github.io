script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"北京新华广播电台今日广播毛主席在人民政协会上的开幕词录音","authors":[],"dates":[{"year":1949,"month":9,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"北京新华广播电台今日广播毛主席在人民政协会上的开幕词录音"},{"type":"paragraph","text":"【本报讯】北京新华广播电台今天十三点三十分到十五点，对野战军播送毛主席在中国人民政治协商会议第一届全体会议开幕典礼上致开幕词的录音，和中国人民解放军朱德总司令、中国共产党代表刘少奇同志、人民解放军代表陈毅、第一野战军首席代表贺龙、第二野战军首席代表刘伯承、第三野战军首席代表粟裕、华中解放区、第四野战军代表黄克诚和华南解放军首席代表张云逸等，在中国人民政治协商会议第一届全体会议上讲话的录音。十八点到二十点三十分，播送中国人民政治协商会议第一届全体会议第六天中各单位代表二十多人主要发言的录音摘要。二十点三十分到二十一点三十分，播送中国人民政治协商会议第一届全体会议第六天会场实况录音。（以上各项节目本台第二台同时联播）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dafe1967b4"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
