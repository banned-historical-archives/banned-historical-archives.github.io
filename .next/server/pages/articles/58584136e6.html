script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji20","name":"毛泽东全集第20卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji20.pdf"],"article":{"title":"和国民党谈判的补充意见","alias":"","parts":[{"type":"paragraph","text":"和国民党谈判的补充意见！"},{"type":"paragraph","text":"（1945年10月29日）甲乙二十九致丙丁："},{"type":"paragraph","text":"（一）同意宥电所述办法。"},{"type":"paragraph","text":"（二）除平、津、青外，八条铁路（加上热河路、沧石路、白普路、道清路为十二条）不得驻国民党军队，平、津、青八路须驻一部。"},{"type":"paragraph","text":"（三）立即停止内战，撤退各区进攻军队。"},{"type":"paragraph","text":"（四）东北、华北、苏北、皖北及边区实行孙中山民选地方自治，不得委派人员。"},{"type":"paragraph","text":"（五）同时请向各界说明政府所谓和平民主都是骗人的，实际已[1]这是中共中央给在重庆的中共代表团的电报。"},{"type":"paragraph","text":"[2]指周恩来、王若飞1945年10月26日给中共中央的电报。电报说，为坚决避免内战，以实现和平建国基本方针，我们提议向国民党方面提出如下四项临时办法：（一）立即停止武力进攻。（二）国民党军队立即停止向解放区进兵。（三）恢复各铁路一般情形，铁路线上不得驻兵（城市不在内）。（四）国民党军队在八条铁路（平绥、同蒲、正太、陇海东段、平汉北段、津浦、胶济、北宁）上无运兵必要。"},{"type":"paragraph","text":"[3]青，指青岛。"},{"type":"paragraph","text":"[4]白晋路，指当时从山西祁县的白圭至晋城的一条未完成的铁路，后已全部拆除。道清路，指从河南滑县道口镇至博爱县清化镇的铁路。经发动了全国规模的内战，双十协定不过是废纸，政府急于要开政治会议之目的是强追各党承认旧代表及筹备登极大典。"},{"type":"paragraph","text":"1945年，毛泽东在延安。"}],"authors":["毛泽东"],"dates":[{"year":1945,"month":10,"day":29}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":484,"page_end":485},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"58584136e6"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
