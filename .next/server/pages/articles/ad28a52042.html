" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji31","name":"毛泽东全集第31卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji31.pdf"],"article":{"title":"转发华东军区捉虎报告的批语","alias":"","parts":[{"type":"paragraph","text":"对刘澜涛关于华北军区后勤部"},{"type":"paragraph","text":"捉虎报告的批语"},{"type":"paragraph","text":"（1952年2月10日）各同志："},{"type":"paragraph","text":"单是华北军区后勤部所属人员中就能捉到二百只或者还要多的大老虎，八百只以上的中小老虎，这对于那些对大贪污犯存在的情况估计不足因而对打虎预算定得很低的方面或部门，特别是有些军区的方面或部门，是一个大的教训。务请同志们以这类实例教育所属干部，增加打虎勇气。大贪污犯是人民的敌人，他们已经不是我们的同志或朋友，故应坚决彻底干净全部地将他们肃清，而不应有丝毫的留恋或同情。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"二月十日[1]刘澜涛，当时任中国人民解放军华北军区副政治委员。"}],"authors":["毛泽东"],"dates":[{"year":1952,"month":2,"day":10}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":371,"page_end":371},"tags":[{"name":"毛泽东","type":"人物"},{"name":"刘澜涛","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ad28a52042"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
