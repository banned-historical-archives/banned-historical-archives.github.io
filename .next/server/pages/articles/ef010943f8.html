script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"周恩来关于北京外语学院工作组长刘新权问题的口头指示","authors":["周恩来"],"dates":[{"year":1966,"month":10,"day":11}],"is_range_date":false,"parts":[{"text":"周恩来关于北京外语学院工作组长刘新权问题的口头指示","type":"title"},{"text":"周恩来","type":"authors"},{"text":"〖写在前面：十月十日，红旗红卫兵、毛泽东主义红卫兵、北京公社红卫兵、东方红红卫兵、二七红卫兵等五个红卫兵组织的一百多名红卫兵，前往外交部政治部，索取有关以刘新权（外交部副部长，中共外交部党委政治部主任，外语学院前工作队主要负责人）为首的工作队整理同学的材料，十一日上午，外交部副部长罗贵波同志和周总理秘书钱嘉东同志接见了我们，并听了我们反映的情况，后来由他们向周总理作了汇报和请示，周总理做了口头指示，罗贵波副部长于十一日晚十时，在外交部政治部会议室向我们进行口头传达。本文是根据罗贵波同志发言稿，逐句抄下来的，下面是罗贵波副部长传达的全文。〗","type":"appellation"},{"text":"今天下午把这里情况向周总理和陈副总理作了汇报和请示。周总理作如下口头指示，陈副总理同意这一指示，现向同学们传达：","type":"paragraph"},{"text":"一、宣布刘新权同志停职反省，因为他说在同学中没有进行排队，实际上是进行了排队，他说材料烧了，实际上是没有完全烧毁，他不但欺骗同学们，也欺骗了外交部党委、陈毅副总理和周总理。","type":"paragraph"},{"text":"二、政治部其它文件柜，如果同学们需要检查的，所以在外交部、总理秘书钱嘉东同志和1─3位同学共同参加下，打开检查，凡属于与刘新权工作队有关的材料都可以拿出来。但是希望同学们不应当利用这些材料去斗学生，与工作队无关的材料不能拿走。政治部的档案不准动。","type":"paragraph"},{"text":"三、已经拿出来的材料由检查组（外交部、总理秘书和同学代表组成）负责清查，将工作队员个人笔记本和专案材料封起来，这些材料由钱嘉东同志保存，如果同学想把这些材料拿回去保存也可以，但未经同意，不得启封，听候周总理和陈副总理的指示，其他材料都可以拿走。","type":"paragraph"},{"text":"四、至于刘新权同志说已经烧毁了，周总理和陈副总理派人彻底查清楚。","type":"paragraph"},{"text":"五、同学们可以先回学校，如果同学们还让工作队同志及昨晚有关同志去检查澄清，随传随到。","type":"paragraph"},{"text":"以上是传达周总理和陈副总理的指示。在这里说明一个问题，对于与昨晚有关的张增旺等同志，外交部党委将召集他们开会，让他们继续检查，同学们要他们什么时候去澄清随时可以去，这一点，我也报告了总理。","type":"paragraph"}],"comments":[],"origin":"北京航空学院红旗战斗队《无产阶级文化大革命运动中首长讲话》（1966.11）；首都大专院校红卫兵革命造反总部（第三司令部）一九六六年十二月印《无产阶级文化大革命中央负责同志讲话汇编第二集（上 ）》。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ef010943f8"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
