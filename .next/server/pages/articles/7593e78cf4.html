script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"苏北花厅村古墓群出土一批贵重文物展现我国最早人殉人祭现象为阐明我国奴隶制文明的发轫提供确凿论据","authors":["汪宝洪"],"dates":[{"year":1987,"month":12,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"\u003cFONT class=imgaut\u003e胡宝洪\u003c/FONT\u003e"},{"type":"paragraph","text":"本报新沂12月13日专电　南京博物院花厅考古队自10月中旬以来清理、发掘了苏北新沂县花厅村古文化遗址，至12月10日已告一段落。考古队在1500多平方米内发现了22座古墓，出土了贵重的玉制大型礼器，展现了最早的人殉和人祭现象，为阐明我国奴隶制文明的发轫提供了确凿论据。"},{"type":"paragraph","text":"根据从墓群中出土的扁足鼎、袋足鬶、高足豆、背壶、长嘴盉、大口尊等陶器，证明该遗址属大汶口文化晚期，距今约5000年。"},{"type":"paragraph","text":"此次发掘获得了很多重要发现。在三座大墓中分别出土了上百件随葬品，其中有数十件大型的玉制礼器。如一件长三四十厘米的琮形玉器，玉质晶莹、呈翠绿色，实为一级珍品。这些玉制礼器，过去已知出于上海、苏南、浙北的良渚期文化墓葬中，此次在黄淮地区发现，尚属首次。"},{"type":"paragraph","text":"以往发现的良渚文化墓葬中的体质人类学材料几近缺如，此次却有一定程度的保存。引人注目的大墓中，在仰身直肢的主体骨架的旁侧或脚后有少年男女各一，还有幼儿骨架二、三具，被认为这是我国发现的时代最早的人殉人祭事实。墓葬中的人骨和人牙由上海自然博物馆派员现场鉴定。"},{"type":"paragraph","text":"(汪宝洪)"},{"type":"paragraph","text":"\u003cIMG alt=请插入8号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1987\\12\\87CE011001.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e图为廿号大墓出土的玉质石斧等。"},{"type":"paragraph","text":"胡宝玺　摄\u003c/FONT\u003e"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7593e78cf4"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
