" crossorigin="">{"props":{"pageProps":{"books":[{"id":"45f85d41-2767-49bc-87e9-ba331b429fce","name":"毛泽东思想万岁（1961年-1968年）","internal":true,"official":false,"type":"pdf","author":"","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives3/main/45f85d41-2767-49bc-87e9-ba331b429fce.pdf"],"article":{"title":"在中央工作会议期间与各大区同志的谈话","alias":"","parts":[{"type":"paragraph","text":"在中央工作会期间与"},{"type":"paragraph","text":"各大区同志的谈话"},{"type":"paragraph","text":"（一九六六年十月）"},{"type":"paragraph","text":"大家在工作上犯了资产阶级反动路线的错误，主要责任是制定资产阶级反动路线的人，执行的人有各种情况，要区别对待。"},{"type":"paragraph","text":"致阿尔巴尼亚劳动党第"},{"type":"paragraph","text":"五次代表大会的贺电"},{"type":"paragraph","text":"（一九六六年十月二十五日）阿尔巴尼亚劳动党第五次代表大会亲爱的同志们："},{"type":"paragraph","text":"中国共产党和中国人民向阿尔巴尼亚劳动党第五次代表大会表示最热烈的祝贺。我们祝贺你们的代表大会圆满成功！"},{"type":"paragraph","text":"以恩维尔·霍查同志为首的光荣的阿尔巴尼亚劳动党，在帝国主义和现代修正主义的重，重包围之中，坚定地高举马克思列宁主义的革命红旗。"},{"type":"paragraph","text":"英雄的人民的阿尔巴尼亚，成为欧洲的一盏伟大的社会主义的明灯。"},{"type":"paragraph","text":"苏联修正主义领导集团，南斯拉夫铁托集团，一切形形色色的叛徒和工贼集团，比起你们来，他们都不过是一环黄土，而你们是入云霄的高山。他们是跪倒在帝国主义面前的奴仆和爪牙，你们是敢于同帝国主义及其走狗战斗、敢于同世界上一切暴敌战斗的大无畏的无产阶级革命家。"},{"type":"paragraph","text":"在苏联，在南斯拉夫，在那些现代修正主义集团当权的国家，已经或者正在改变颜色，，实行资本主义复辟，从无产阶级专政变成资产阶级专政。.英雄的社会主义的阿尔巴尼亚，顶住了这股反革命修正主义的逆流。你们坚持了马克思列宁主义的革命路线，朵取了一系列革命化的措施，巩固了无产阶级专政。你们沿着社会主义的道路，独立自.主地建设自已的国家，取得了辉煌的胜利。你们为无产阶级专政的历史，提供了宝贵的经验。"},{"type":"paragraph","text":"“海内存知已，天涯若比邻”。中阿两国远隔千山万水，我们的心是连在一起的。我们是你们正的朋友和同志，你们也是我们正的朋友和同志。我们和你们都不是那种口蜜腹剑的假朋友，不是那种两面派。我们之间的革命的战斗的友谊，经历过急风暴雨的考验。，"},{"type":"paragraph","text":"马克思列宁主义虞理在我们一边。国际无产阶级在我们一边。被压迫民族和被压迫人民在我们一边。全世界百分之九十以上的人民大众在我们一边。我们的朋友遍天下。我们不怕孤立，也绝不会孤立。我们是不可战胜的。一小反华、反阿尔巴尼亚的可怜虫，是注定要失败的。"},{"type":"paragraph","text":"我们现在正处于世界革命的一个新的伟大的时代。亚洲、非洲：拉丁美洲的革命风暴，276"}],"authors":["毛泽东"],"dates":[{"year":1966,"month":10,"day":null}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":289,"page_end":289},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"65c80496cd"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
