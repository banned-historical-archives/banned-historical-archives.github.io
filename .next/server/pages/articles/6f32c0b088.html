script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"毛主席电复延安各界","authors":["毛泽东"],"dates":[{"year":1949,"month":10,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【北京新华电台廿六日广播】　延安党政军民各界，在本月二号，致函毛主席和中央人民政府，热烈庆贺中华人民共和国中央人民政府的成立。"},{"type":"paragraph","text":"毛主席接到这封信以后，今天打电报回答他们，电报全文如下:"},{"type":"paragraph","text":"延安的同志们和陕甘宁边区的同胞们:"},{"type":"paragraph","text":"接到你们的贺函，使我十分愉快和感谢。延安和陕甘宁边区，从一九四三年到一九四八年，曾经是中共中央的所在地，曾经是中国人民解放斗争的总后方，延安和陕甘宁边区的人民，对于全国人民是有伟大贡献的。我谨祝延安和陕甘宁边区的人民，继续团结一致，迅速恢复战争的创伤，发展经济建设和文化建设；我并且希望全国一切革命工作人员，永远保持过去十余年间在延安和陕甘宁边区的工作人员中所具有的艰苦奋斗的作风。　毛泽东"},{"type":"paragraph","text":"一九四九年十月廿六日"}],"comments":[],"origin":"北京新华电台","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6f32c0b088"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
