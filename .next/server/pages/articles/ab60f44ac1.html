script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"日本部分资产阶级代表反对与美国单独媾和","authors":[],"dates":[{"year":1951,"month":2,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"日本部分资产阶级代表"},{"type":"paragraph","text":"反对与美国单独媾和"},{"type":"paragraph","text":"【新华社十日讯】东京消息：鉴于日本人民普遍要求全面媾和与反对重新武装以及切身的利害关系，日本资产阶级内部的一部分人士，对美国单独对日媾和与武装日本的阴谋计划表示畏缩甚至反对。日本社会党中央执行委员会主席铃木茂三郎、总书记浅沼稻次郎在二月一日会见战争贩子杜勒斯时，曾重申该党反对日本重新武装的立场，并要求缔结全面和约。当杜勒斯于二日在“美日协会”的演说中公然叫嚣美国对日单独媾和的目的在于重新武装日本以充当美国的侵略工具之后，铃木茂三郎表示：这一演说“使人失望”。铃木说：他忧虑日本参加“片面的地域性军事同盟（按指杜勒斯所说的‘集体安全’）或是和特定国（按指美国）的军事同盟”，将使日本卷入新的战争。他又说：“特定国的军队驻在日本是日本人的自尊心所不容许的，失去了独立国的意义，因此要反对。”"},{"type":"paragraph","text":"销数最大的资产阶级报纸《朝日新闻》。在二月一日再度表示反对单独媾和，该报忧虑这将“引起国际间新冲突的危险”。该报说：“假使签订了单独和约，那么日本将处于与日本已订和约国家和与日本尚无和约而仍保持敌对状态的国家之间，这是会感到左右为难，极端不便的。”"},{"type":"paragraph","text":"甚至在以吉田为首的自由党的内部，也有一部分人反对缔结单独和约。《朝日新闻》曾对自由党分子进行过一次关于和约问题的“舆论调查”，调查结果表明有百分之十八的被调查者赞成全面和约。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ab60f44ac1"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
