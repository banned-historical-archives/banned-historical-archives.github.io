<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"不是任务过重　只怪思想右倾  石楼乡批判党内右倾思想，征购粮进度由慢转快","authors":[],"dates":[{"year":1957,"month":9,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"不是任务过重　只怪思想右倾"},{"type":"paragraph","text":"石楼乡批判党内右倾思想，征购粮进度由慢转快"},{"type":"paragraph","text":"本报特约新华社广州电　中共广东省番禺县石楼乡委员会最近召开党员大会，进行粮食统购统销政策的大辩论，有力地批判了陈兆祥所代表的右倾思想。"},{"type":"paragraph","text":"今年夏季购粮工作开始后，石楼乡不少党员对完成今年的购粮任务缺乏信心，有些甚至自觉或不自觉地反映了富裕农民的资本主义倾向，在粮食问题上同富裕农民一起叫嚷。中共赤山第一农业社支部的组织委员、社里负责财务工作的副主任陈兆祥，就是这样的一个典型。陈兆祥在去年曾把社里超支户的口粮一万五千斤留下作社的饲料，没有作周转粮卖给国家；等到超支户要口粮时，却把责任推给国家，叫他们向国家要口粮。今年购粮工作开始后，他又大叫国家的购粮任务过重。他还认为，要搞好党和群众关系，必须首先满足群众的粮食要求。如果粮食购多了，群众闹缺粮，就要由领导负责。他甚至在群众中散播不满的情绪，说：“每人留粮五百五十斤，我思想也不通。”"},{"type":"paragraph","text":"在党员大会上，大家先学习了人民日报“粮食问题和思想问题”的社论，然后根据事实，针对陈兆祥的错误思想，逐点进行批判。"},{"type":"paragraph","text":"国家今年的购粮任务是不是真的过重了，因而不能完成呢？大家揭露了这样一些事实：今年购粮工作开始后，陈兆祥乘着党支部书记不在家，瞒着支部副书记，同社里几个干部秘密开会，擅自决定把每人留粮指标从五百五十斤提高到六百零六斤，并且把早造留粮时间增加到四个半月，共多分了八万二千斤。接着，他们又赶快把口粮分到社员手里。同时，又多报十一个人，多分了口粮两千二百六十斤。"},{"type":"paragraph","text":"是不是口粮指标过低，社员粮食不够吃呢？大家又从各方面列举事实来讨论。从历史上看，全社口粮是逐年增加的。据一次会议上的调查，在到会的一百三十户社员中，解放前有三十户每年每人只有三百斤口粮，有九十九户只有四百五十斤到四百八十斤，只有一户上中农有五百二十斤。这些社员中，解放前曾有七户家里饿死过人。解放后由于农业增产，口粮逐年增加。如1954年每人平均口粮是五百斤，1955年增加到五百二十斤，1956年再增到五百五十斤。许多人列举事实证明，陈兆祥所谓每人五百五十斤口粮不够吃的论调是不符合事实的，有少数人不够吃，是大吃大喝，或者把粮食在黑市卖掉了。"},{"type":"paragraph","text":"最后，大家又提出了盲目要求多留口粮、少卖余粮究竟对谁有利的问题来辩论。许多人指出，这样做只会助长少数富裕农民资本主义倾向的发展，对国家不利，对农业社和多数社员也不利。去年由于社的领导方面对闹粮的社员无原则地迁就，原有二十个养鸭能手拿了大量粮食来自己养鸭。为了自己养鸭得利，就不愿为社养鸭了，使社的养鸭副业受了很大损失。社员自己养了大量的鸭，不但为社出勤的积极性降低了，而且有些生产队长连队长会议也不参加了，有些上中农社员甚至发展到雇工剥削。会上，大家还查出去年社里闹粮最凶的三十九户中，就有二十七户是大量养鸭的上中农。"},{"type":"paragraph","text":"经过辩论，全乡的党员都受到了很大的教育，提高了阶级觉悟。许多党员还对照着检查自己在购粮问题上的错误思想和行为，表示要坚决完成国家的购粮任务。陈兆祥除承认大家所列举的事实以外，还进一步交代出他的一些错误行为，表示以坚决完成国家购粮任务的实际行动来改正自己的错误。"},{"type":"paragraph","text":"党员们开罢会回到社里，便依靠贫农和下中农开展了粮食问题的大辩论。辩论中批判了富裕农民的资本主义和个人主义思想，粮食征购工作迟滞的局面已经扭转。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e38fcce2ef"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
