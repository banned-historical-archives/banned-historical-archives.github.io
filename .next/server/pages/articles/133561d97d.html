<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"本市职工教育工作会议昨闭幕职工教育要适应现代化建设","authors":[],"dates":[{"year":1980,"month":3,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　上海市职工教育工作会议昨天闭幕。中共上海市委书记韩哲一、夏征农在会上讲话，要求本市各级领导认真学习党的十一届五中全会精神和邓小平同志的报告《目前的形势和任务》，采取有力措施，把职工教育当作一件大事继续抓好。"},{"type":"paragraph","text":"会议讨论和制订了上海市工农教育委员会《关于加强职工教育工作的意见》。根据五中全会精神，结合教育部召开的全国职工教育工作会议要求和上海的实际情况，会议提出，大力开展职工教育，全面贯彻党的教育方针，加强政治思想教育，组织职工学政治、学文化、学科学技术，在最近几年内提高文化大革命以来参加工作的青年职工的文化、技术水平，是当前职工教育的重点。对现在尚未达到初中程度的青年职工，要以学文化为主，兼学初等技术和有关业务知识；对已具有初中毕业文化水平的青年职工，要对他们进行中等专业技术教育，也可组织学习高中课程。职工高等院校，要着重提高教育质量。普通高等学校要积极恢复和发展函授教育和夜大学。还要配合经济部门培训在职干部，帮助他们学习经济管理。"},{"type":"paragraph","text":"会议对职工学校用房、设备、经费、学习时间都作了规定。各单位应切实解决职工学校用房。企业行政和工会都应帮助解决职工业余教育的经费。对于职工高等教育，干部、职工的政治、业务、技术等的教育训练经费，仍按现经费渠道分别在企业、行政、事业等单位有关费用中开支。各单位要保证职工每周有四至六小时学习时间，可以占用一部分生产时间学习，还可以有计划的抽调小部分职工脱产、半脱产学习。那些未投产的、停产的、开工不足的单位，要不失时机地组织职工学习。"},{"type":"paragraph","text":"会议指出:职工教育工作要在各级党委的统一领导下，由行政主管，工会积极协助，有条件的单位，工会也应积极办学，共青团、妇联等组织都应在办学中积极起作用。各级行政领导部门在下达生产计划的同时要下达职工教育的任务。"},{"type":"paragraph","text":"会议是分阶段召开的。一月二十四日开幕会上，传达和学习了全国职工教育工作会议精神。上海市副市长、市工农教育委员会主任杨恺作了工作报告。会议期间，各委、办按系统进行了讨论交流。在昨天的会议上，市总工会副主席、市工农教育委员会副主任张伟强也发了言，中共虹口区委和纺织工业局负责同志介绍了开展职工教育的经验。出席会议的有市工农教育委员会全体委员和市人民政府各委、办，各区、县、局，各高等学校分管职工教育的同志五百多人。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"133561d97d"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
