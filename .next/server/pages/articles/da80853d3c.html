script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"日本《人民之星》驳斥修正主义关于时代的谬论时指出  我们仍处在帝国主义和无产阶级革命时代","authors":[],"dates":[{"year":1973,"month":12,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"日本《人民之星》驳斥修正主义关于时代的谬论时指出"},{"type":"paragraph","text":"我们仍处在帝国主义和无产阶级革命时代"},{"type":"paragraph","text":"新华社东京一九七三年十二月八日电　日本共产党（左派）中央机关报《人民之星》最近发表文章，指出对时代作出正确规定的重要意义，并且批驳了现代修正主义者关于时代的谬论。"},{"type":"paragraph","text":"文章说：“关于时代的规定是认识形势的关键，由此引出革命的根本政策。关于时代的规定错了，就会从根本上对形势得出错误的认识，当然，由此产生的政策就不能不陷入‘左’右倾机会主义。”"},{"type":"paragraph","text":"文章在回顾帝国主义和无产阶级革命时代的历史过程时说：“世界资本主义在其根本矛盾的激化中，产生出资本主义国家的无产阶级和资产阶级的矛盾、被压迫民族和帝国主义的矛盾、帝国主义国家和帝国主义国家之间的矛盾这三个基本矛盾，形成了帝国主义阶段。接着，在第一次世界大战中，俄国十月社会主义革命取得了胜利，世界上产生了社会主义和帝国主义之间的矛盾，成为又一个基本矛盾。我们在考察资本主义的帝国主义阶段，也就是帝国主义和无产阶级革命的时代的时候，必须掌握这样一点：这个时代的本质是由这四个基本矛盾的存在和发展所规定的。”"},{"type":"paragraph","text":"文章说，世界的四个基本矛盾依然存在，并且更加激化了，而且这决定着目前时代的本质。文章说：“这些矛盾的存在和发展引起今天世界革命的高涨。这也表明，现代仍然是帝国主义和无产阶级革命的时代。”"},{"type":"paragraph","text":"文章说：“可是，赫鲁晓夫却主张时代变了。世界上只存在着社会主义制度和帝国主义制度这一对基本矛盾，其他矛盾是微不足道的。就战争与和平问题而言，现在只存在核武器和人类的矛盾，马克思、列宁主义的原则不能适用，帝国主义的本质变了。”“宫本显治是赫鲁晓夫的得意门徒。他在一九五六年召开了七中全会，决定了‘和平革命论’。他的辩解，归根结底也是说时代变了，马克思、列宁主义已经陈腐了。”"},{"type":"paragraph","text":"文章强调说：“中国共产党在第十次全国代表大会上把关于时代的规定明确起来，响亮地宣布：‘列宁主义的基本原则没有过时，仍然是我们今天指导思想的理论基础。’对此，我们衷心表示赞同，并且认为，这是马克思、列宁主义的胜利，是对现代修正主义和托洛茨基主义的沉重打击。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"da80853d3c"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
