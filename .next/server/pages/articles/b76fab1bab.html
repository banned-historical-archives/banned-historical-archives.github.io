script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"祝贺抗日战争胜利八周年马林科夫莫洛托夫电毛主席周总理","authors":[],"dates":[{"year":1953,"month":9,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京三日电】　我中央人民政府主席毛泽东和政务院总理兼外交部部长周恩来，收到苏联部长会议主席格马林科夫和苏联外交部部长维·莫洛托夫来电，祝贺抗日战争胜利八周年。电文如下:"},{"type":"paragraph","text":"中华人民共和国中央人民政府主席毛泽东同志"},{"type":"paragraph","text":"中华人民共和国中央人民政府政务院总理兼外交部部长周恩来同志:"},{"type":"paragraph","text":"当此战胜日本军国主义的第八周年之际，我们谨向中华人民共和国中央人民政府、中国武装部队和伟大的中国人民祝贺。"},{"type":"paragraph","text":"中苏两国人民和他们盟国一道所作的忘我的努力，保证了这一胜利，并为建立远东和平提供了可能。我们深信，苏联人民和中华人民共和国人民的伟大同盟和兄弟般的友谊，今后仍然是保证远东的和平与安全和巩固世界和平的可靠基中华人民共和国和苏联的伟大的、牢不可破的友谊万岁!"},{"type":"paragraph","text":"苏联部长会议主席　格·马林科夫"},{"type":"paragraph","text":"苏联外交部部长　维·莫洛托夫"},{"type":"paragraph","text":"一九五三年九月二日"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b76fab1bab"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
