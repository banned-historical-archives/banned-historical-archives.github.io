script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"《马来亚箴言》月刊揭露美帝在印度尼西亚的阴谋活动  强烈谴责印度尼西亚右派反共反华暴行  指斥现代修正主义者一贯暗害印度尼西亚进步力量的背叛活动","authors":[],"dates":[{"year":1965,"month":11,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"《马来亚箴言》月刊揭露美帝在印度尼西亚的阴谋活动"},{"type":"paragraph","text":"强烈谴责印度尼西亚右派反共反华暴行"},{"type":"paragraph","text":"指斥现代修正主义者一贯暗害印度尼西亚进步力量的背叛活动"},{"type":"paragraph","text":"新华社六日讯　十月三十日出版的一期《马来亚箴言》月刊以《帝国主义在印度尼西亚的破坏活动》为题发表评论说，印度尼西亚最近的事态发展清楚表明，帝国主义——特别是美国——对进步力量发动了大规模的阴谋活动。紧接着“九月三十日事件”之后，印度尼西亚的陆军当局犯下了一系列反华、反共、反民主的重大罪行。"},{"type":"paragraph","text":"评论说，必须反复地毫不含糊地说明，很久以来就有迹象表明，西方的某些帝国主义机构，特别是同美国政府有联系的机构，就一直在印度尼西亚政治、军事和经济组织的一些要害部门里肆意活动。"},{"type":"paragraph","text":"评论说，在世界其他地方知道印度尼西亚骚乱的任何直接消息以前很久，马来亚的拉赫曼当局已经在谈论近在眼前的“印度尼西亚陆军的胜利”。评论接着说，印度尼西亚反共暴徒们在放火行凶的时候，声嘶力竭地高呼“杀死艾地”、“粉碎共产党人”的口号，还叫喊“美国万岁”。"},{"type":"paragraph","text":"评论说，“在整个反‘马来西亚’的对抗运动期间，现代修正主义者和他们在印度尼西亚的朋友们一味为他们不要加紧斗争制造借口，他们反对在政治上和物质上武装工农和整个爱国力量。最恶劣的是，在反对外国敌人的斗争的最紧要的关头，国际现代修正主义者秘密地同所谓的‘马来西亚’当局靠拢，背地里伤害印度尼西亚、马来亚和其他地方的反殖民主义爱国者。这样，就不仅鼓励帝国主义势力反击马来亚、印度尼西亚和北加里曼丹的爱国者，而且也就向这些国家里的现代修正主义者发出了要他们进行各种分裂、牵制和背叛活动的讯号。这是事实，谁也否认不了。这些事实是无可争议的。”"},{"type":"paragraph","text":"评论说，帝国主义者对他们高兴地称之谓他们的初步成功的事情感到兴高采烈，但是他们的这种兴高采烈是长不了的。"},{"type":"paragraph","text":"评论说，“印度尼西亚的英勇爱国人民以及全世界所有真正的反殖民主义者无疑会记取印度尼西亚事件的教训。他们既不会低估帝国主义及其反动走狗的力量或奸诈，也不会低估现代修正主义者的背叛活动。同时，他们无需感到惊惶，但也不会动摇。在继续打击现代修正主义者的同时，他们将为反对‘马来西亚’，反对帝国主义及其走狗而并肩展开更加猛烈的斗争。”"},{"type":"paragraph","text":"评论最后说，“印度尼西亚及其爱国的人民必胜，全亚洲和全世界的反殖民主义力量必胜。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9723ae642f"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
