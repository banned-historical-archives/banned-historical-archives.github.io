<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"破除资产阶级法权思想　坚持参加集体生产劳动","authors":[],"dates":[{"year":1975,"month":7,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"破除资产阶级法权思想　坚持参加集体生产劳动"},{"type":"paragraph","text":"西藏自治区、拉萨市党政机关干部和解放军指战员坚持走“五·七”道路，从事农副业生产，取得显著成绩"},{"type":"paragraph","text":"本报讯　西藏自治区和拉萨市党政机关干部和人民解放军驻军指战员，多年来发扬艰苦奋斗的延安作风，在做好本职工作的同时，坚持从事农副业生产，取得了显著成绩。学习无产阶级专政理论以来，大家更加自觉地参加集体生产劳动，把它作为破除资产阶级法权观念、反修防修的一项重要措施。"},{"type":"paragraph","text":"在盛夏季节的高原古城拉萨市，各单位的院子和农副业生产基地里，种满了蔬菜。养猪、培育果树等事业也很兴旺。经过多年努力，各个单位已经做到蔬菜基本自给，肉食部分自给。这样，不仅改善了生活，减轻了国家和当地人民的负担，加强了民族团结，而且干部、战士通过参加劳动，受到了锻炼，增强了劳动人民的思想感情，促进了思想革命化。"},{"type":"paragraph","text":"早在西藏和平解放初期，进驻拉萨市的人民解放军指战员和各机关的干部，就遵照毛主席关于“自力更生”、“艰苦奋斗”的指示，开始从事农副业生产。他们在旷野里搭起帐篷，开荒修渠，种菜种粮，把延安作风带到了西藏高原。毛主席发出《五·七指示》以后，他们从事农副业生产的自觉性更高了。西藏军区政治部的干部、战士，在拉萨河畔的荒滩上治沙改土，建设起农场，从一九六七年到一九七四年，为国家生产粮食近八十万斤。西藏气象局的干部，自己动手，开荒整畦，上山打石头修建温室，挖水井灌溉菜地，蔬菜年年自给有余。拉萨市革委会办事组等单位种植的果树，已普遍开始结果，有的单株产量达到四五百斤。经过大家的辛勤劳动，昔日拉萨近郊乱石累累、荆棘丛生的荒滩地，变成了肥沃的良田；过去市内污水四溢的臭水坑，现在变成了菜地，一片葱绿。"},{"type":"paragraph","text":"无产阶级专政理论的学习运动，使西藏自治区和拉萨市各机关的干部和驻军指战员，进一步提高了对参加生产劳动的认识，坚持走“五·七”道路。他们以无产阶级专政的理论为武器，深入批判林彪反党集团恶毒攻击“五·七”道路的反动谬论，更加深刻地认识到，干部坚持参加集体生产劳动，是限制资产阶级法权，缩小三大差别，反修防修，巩固无产阶级专政的一项根本性措施。许多两鬓斑白的老红军、老八路，发扬战争时期那么一股劲，和广大干部、战士一起冒严寒，顶烈日，挑土垫地，种粮种菜。新走上工作岗位的藏、汉族青年干部，继承和发扬艰苦奋斗的优良传统，在生产劳动中勇挑重担，抢干脏活累活，刻苦磨练自己。"},{"type":"paragraph","text":"为了更好地锻炼干部，今年以来，自治区革委会办事组、自治区公安局、西藏日报社等单位，把原来的农副业生产基地改为“五·七”农场，组织干部分期分批去参加劳动锻炼。他们一面参加生产劳动，一面学习无产阶级专政理论，批判修正主义，批判资产阶级，革命、生产双丰收。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"西藏文革","type":"人物"},{"name":"限制资产阶级法权","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"77751e1024"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
