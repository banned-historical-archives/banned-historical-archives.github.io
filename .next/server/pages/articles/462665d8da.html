script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"印度《人民之路》月刊揭露新沙皇的丑恶面目苏修一切反华阴谋都遭到可耻的失败坐在修正主义罪恶船上的苏修叛徒集团，决计逃脱不了必然灭亡的命运","authors":[],"dates":[{"year":1969,"month":3,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京十五日电　印度《人民之路》月刊三月号发表文章，揭露克里姆林宫新沙皇的社会帝国主义真面目。"},{"type":"paragraph","text":"文章说，在全世界汹涌澎湃的人民革命运动浪潮的冲击下，苏修叛徒集团，和美帝国主义一样，日子越来越不好过了。它矛盾重重，内外交困，已经比以往任何时候变得更加孤立，它的纸老虎的虚弱本质已经充分暴露出来。"},{"type":"paragraph","text":"文章指出，苏修叛徒集团对东欧一些国家，长期奉行大国沙文主义和民族利己主义的政策。它正在把东欧一些国家变成它的附庸国和殖民地，不断加紧对这些国家的控制。"},{"type":"paragraph","text":"文章说，苏修在美帝的默许下，出兵占领捷克斯洛伐克，而苏修又默许和支持美帝进行侵越战争，并且加快步伐跟美帝做肮脏的政治交易，帮助它扑灭越南人民的斗争火焰。苏修跟美帝紧密勾结，极力兜售关于中东问题的“政治解决”骗局，以图扼杀阿拉伯人民反对帝国主义和反对侵略的斗争。苏修和美帝出于反对中国和反对革命的共同需要，一九六八年在“防止核扩散条约”方面，在提供“核保护”方面，以及在有关加强苏美双边“合作”的其他许多问题上，作了一个又一个的卑鄙交易。这一切说明美帝、苏修妄图称霸世界的反革命的罪恶勾结已进到一个新的阶段。"},{"type":"paragraph","text":"文章指出，但是苏修叛徒集团越是这样肆无忌惮地反对革命，就越清楚地暴露他们自己。他们的罪恶活动对世界人民来说起了非常有益的反面教员的作用，促使各国革命人民反对美帝和苏修的斗争的新高涨。克里姆林宫的新沙皇威信扫地，狼狈不堪。"},{"type":"paragraph","text":"文章继续说，苏修叛徒集团还伙同美帝，勾结日本、印度、印尼和其他国家的一些反动派，极力拼凑反华包围圈。在这个罪恶活动中，苏修叛徒集团纠集了世界上形形色色的牛鬼蛇神，妄图孤立中国。“蚍蜉撼树谈何易”。他们的罪恶目的决不能得逞。"},{"type":"paragraph","text":"文章说，经过了两年多的无产阶级文化大革命，社会主义中国的威信在世界各国人民中间空前提高。苏修叛徒集团的一切罪恶的反华阴谋，遭到了可耻的失败。文章指出，苏修叛徒集团今天被国内外的重重矛盾弄得焦头烂额，遭到苏联人民和全世界革命人民越来越强烈的反对，日子非常不好过。坐在修正主义罪恶船上的苏修叛徒集团，决计逃脱不了它的必然的灭亡。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"462665d8da"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
