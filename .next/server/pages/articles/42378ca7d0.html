" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji30","name":"毛泽东全集第30卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji30.pdf"],"article":{"title":"转发济南市委镇反工作报告的批语","alias":"","parts":[{"type":"paragraph","text":"转发济南市委镇反工作报告的批语"},{"type":"paragraph","text":"（1951年4月13日）各中央局，并转分局，省委，区党委，大中市委："},{"type":"paragraph","text":"下面是济南市委关于镇反工作的报告\"，很好，请各大中市委注意研究，照此办理。我希望各大中市委均有一个报告给中央。现已收到北京、天津、青岛、济南、重庆、兰州等六处的报告和上海、南京、杭州三处的计划，均很好。请各未报告的大城市和中等城市，例如各省省城及汕头、梧州、衡州、宜昌、九江、安源、芜湖、无锡、苏州、宁波、厦门、石家庄、唐山这一类城市，均向中央做一个镇反工作的报告。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"四月十三日"},{"type":"paragraph","text":"[1]指中共济南市委1951年4月5日关于济南市4月1日夜对反革命分子实行大逮捕的情况给山东分局的报告。大逮捕后，济南市委组织大批干部深入群众宣传，多方收集了对这次镇反行动的反映。"}],"authors":["毛泽东"],"dates":[{"year":1951,"month":4,"day":13}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":231,"page_end":231},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"42378ca7d0"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
