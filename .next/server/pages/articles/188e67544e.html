script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"老挝临时民族联合政府发表公告号召老挝人民维护社会治安保卫国家财产政府决定驱逐美、泰特务出境　万象极右派玩弄“辞职”骗局","authors":[],"dates":[{"year":1975,"month":5,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社万象一九七五年五月十一日电　据《巴特寮新闻》五月十日报道，老挝临时民族联合政府公共工程和运输大臣、代理经济和计划大臣辛加坡·朱拉马尼五月九日签署一项公告，号召有关部门和全体人民同联合政府合作，采取有效措施，维护社会治安和保卫国家财产，并且防止商品、货币外流。"},{"type":"paragraph","text":"公告说，目前，一些对国家和人民不怀好意的人正在散布流言蜚语，在社会治安和财经方面制造恐怖气氛，以损害联合政府保卫和平与实现民族和睦的努力。"},{"type":"paragraph","text":"公告要求老挝双方联合警察、联合警卫部队、海关、以及有关部门同联合政府合作，采取以下断然措施:检查老挝人和外侨的出境入境；禁止把商品、粮食等带出国外；禁止自由兑换外汇；禁止国家公务人员把公车带往国外；禁止抬高物价和囤积商品。联合政府对违反上述措施的人将依法惩办。"},{"type":"paragraph","text":"公告还号召公务人员、军队、警察、学生和全体人民同政府及有关部门合作，以保卫国家利益和社会治安。"},{"type":"paragraph","text":"新华社万象一九七五年五月十一日电　据巴特寮电台报道，老挝临时民族联合政府在五月七日的内阁会议上决定，把由美国人在万象搞的“苏帕尼米特”教会组织中的所有美国和泰国籍神父驱逐出境，并没收该组织的财产。"},{"type":"paragraph","text":"“苏帕尼米特”组织，是以耶稣教为掩护进行特务活动的美国中央情报局的一个组织。它自从成立以来，干了很多不利于老挝民族的勾当。"},{"type":"paragraph","text":"据新华社万象一九七五年五月十一日电　据《巴特寮新闻》报道，在人民群众运动的强大压力下，万象方面在老挝临时民族联合政府中担任职务的一些极右分子和一些反动军官已提出“辞职”。"},{"type":"paragraph","text":"报道说，正式提出“辞职”的有:财政大臣贡·萨纳尼空、外交部国务秘书占通·占塔拉西、公共工程和运输部国务秘书洪潘·赛雅西等极右反动分子以及万象军队“第二军区司令”王宝和“第五军区司令”通立等反动军官。还有一些万象方面的大臣和反动军官也在准备“辞职”。"},{"type":"paragraph","text":"《巴特寮新闻》就此发表评论，揭露万象极右反动派玩弄辞职骗局。评论指出，面对正在沸腾高涨的人民群众运动，万象方面的一些极右反动分子和军官纷纷提出“辞职”或逃往国外。“这是正在进行最后挣扎的万象极右反动派的极其险恶的阴谋，其目的是妄图嫁祸于将继续管理国家的联合政府和民族政治联合委员会，以制造混乱。”"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"188e67544e"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
