" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji16","name":"毛泽东全集第16卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji16.pdf"],"article":{"title":"关于世界反法西斯斗争和中国抗日战争的广播讲演","alias":"","parts":[{"type":"paragraph","text":"关于世界反法西斯斗争和中国抗日战争的广播讲演！！"},{"type":"paragraph","text":"（1941年11月7日）"},{"type":"paragraph","text":"如同中国共产党所曾再三指出的，目前全世界人类的任务是团结起来反对法西斯，而全中国人民的任务则是团结起来反对日本的进攻。现在这两种团结都有大大加强的必要。"},{"type":"paragraph","text":"站在人类的立场上，我们以为英国和美国应该用一切方法拿更多的飞机、坦克来供给苏联，拿更多经费和武器来援助中国，拿更的力量来援助在德、意躁之下的各国人民的起义。美国应该毫不地向德国宣战，这是一个绝对不可回避也不应回避的步骤，实现得愈迟就只有让德国炸沉更多的美国船。同时，美国绝不应听信日本的阴谋，与日本订立任何的妥协，美国应和中国及英国一道，以实力制裁日本法西斯。很显然的，我们的这种希望是和英国、美国大多数人民的希望相符合的，可惜在这两个国家的政府和国会方面，都还有一部分不明大义的人，阻挠着人民的意志的实。因此，英、美的人民现在必须努力去战胜这种时代的障碍，把世界反法西斯的斗争推向更高的阶段。中国的情形，同样处在向前更进一步的转折点。日本法西斯虽路，西进以求消灭中国是必然的。日本在晋察冀边区和长沙、郑州等地遭遇失败?以后，现在正准备着对中国的新的进攻。我们全国的人民和全国的军队，一定要保卫我们每一个抗日阵地，一定要打碎敌人的进攻阴谋。全国人民一定要更好地团结起来，拥护国民政府坚持抗战到底，准备一切反攻的条件，以便及时地驱逐日本强盗出中国。我们共产党人一向是呼吁加强团结的，处在这个敌人新进攻的前夜，改善抗战营垒中各方面的相互关系，更为迫切的需要。我们希望国民党当局能够迅速地当机立断，为了这个目的迅速地采取各种必要的措置。我们相信，只要全国真正地团结一致，日本的进攻必能阻止，反攻的准备必能办到，驱逐敌人的目的是必能实现的。"},{"type":"paragraph","text":"[1]向南扩大侵略，与英美争夺南太平洋和东南亚各国的霸权，同时，伺机向北进攻苏联，是日本帝国主义发动侵略战争的长期战争目标。1941年6月苏德战争爆发，日军大本营在《适应形势演变的帝国国策纲要》中确定，继续向南扩展，并“根据形势演变解决北方问题”。同年8月初，日军大本营宣布，放弃“北进”企图，专心向南扩展，加紧了对英美作战的准备。"},{"type":"paragraph","text":"[2]1941年8月至10月，敌后抗日军民顽强抵抗日本侵略军对晋察翼边区北岳、平西地区进行的疯狂“扫荡”，共歼敌5000余人，敌被迫撒退。9月下旬和10月初，日军曾一度进攻长沙、株洲和郑州几个城市，遭到中国"}],"authors":["毛泽东"],"dates":[{"year":1941,"month":11,"day":7}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":289,"page_end":290},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"34f201338d"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
