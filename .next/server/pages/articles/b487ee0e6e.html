<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"貴州中部苗族地区有騷乱征候","authors":[],"dates":[{"year":1957,"month":2,"day":11}],"is_range_date":false,"parts":[{"text":"贵州中部苗族地区有骚乱征候","type":"title"},{"text":"本刊讯  人民日报记者肖明报道：贵州省中部清镇、修文、息烽、开阳等县一带苗族地区，由于贯彻民族政策不坚决，最近又出现显明的骚乱征候。","type":"paragraph"},{"text":"从去年１２月以来，这些地区的骚乱组织造謡説苗家要出皇帝、穿白衣服可免除灾难，号召参加者头上插小旗迎接皇帝登基，买镰刀作为骚乱时的武器。因此，许多地区发生白布和镰刀脱销的现象，有的供销社把积压了多年的镰刀都卖掉了。有的县骚乱组织已传出具体的暴动日期和计划，弄得县机关夜晚不敢睡觉。","type":"paragraph"},{"text":"许多村寨的苗族群众，先后召开百人以上的群众大会。会上除散布迷信外，并诉共产党和工作干部的苦。从这些群众会议上，少数民族群众反映的意见，主要有以下几方面：","type":"paragraph"},{"text":"（一）“共产党、人民政府光説不作”或“説的多作得少＂。这是指我们不久以前在检查民族工作时，许多干部曾深入下层，召开了少数民族各阶层会议。会上干部们听取了意见，并向少数民族公开作了检讨。但事后许多答应作的事并没有作。如苗族要求社里留出妇女种麻用的土地，老年人用来养老的土地和耕牛，姑娘出嫁时作为赔嫁用的田地等问题（这些问题是在合作化运动中没有很好解决），至今没有认真解决。苗族妇女説：我们过去每年能织四十匹布，现在连一、二匹都织不上，就是织了也没地方染，染出来还没功夫作。","type":"paragraph"},{"text":"（二）当官的都是汉族，苗族那朝那代都受压迫。区、乡干部一个月有的挣四、五十块钱，有的挣六、七十块钱，比我们全社（指小型社）一个月的收入还多。干部有棉衣、有皮鞋，我们连土布都穿不上。","type":"paragraph"},{"text":"（三）另外还对汉族干部不尊重少数民族、以及工作中强迫命令、违法乱纪，提出一些意见。","type":"paragraph"},{"text":"这四个县的骚乱活动，从群众的情绪来看，与去年６月到１１月间黔南布依族苗族自治州罗甸、紫云、望谟三县接壤的麻山地区的少数民族武装骚乱是相同的。主要由于群众生活贫困（据反映，在这些地区两口子穿一条裤子的并不少见）。对某些政策（合作化运动和税收方面）不满，对干部作风不满。参加骚乱组织者多是基本群众，领头者多数是党团员，转业军人和基本群众，只发现个别地主富农阶级分子。不过，从地域上看，这个地区的骚乩活动更加值得注意。麻山地区是边沿深山落后地区。清镇、修文等四县则是中心地带，四个县从西到北连在一起围了贵阳的半个圆周。","type":"paragraph"},{"text":"目前，这个地区的骚乱活动已引起领导上的重视，修文、清镇经过一段工作后，形势已较为缓和，但息烽、开阳又逞现紧张状态。","type":"paragraph"},{"text":"来源：新华通讯社编：《内部参攷》第2125期，1957年2月11日","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b487ee0e6e"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
