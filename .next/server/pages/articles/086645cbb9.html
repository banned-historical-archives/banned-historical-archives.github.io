" crossorigin="">{"props":{"pageProps":{"books":[{"type":"pdf","id":"wenji5","name":"毛泽东文集第五卷（1999）","internal":false,"official":true,"author":"中央文献研究室","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/wenji5.pdf"],"article":{"title":"对知识分子应避免唯成分论的偏向","description":"根据中央档案馆保存的抄件刊印。","dates":[{"year":1948,"month":5,"day":21}],"parts":[{"text":"对知识分子应避免唯成分论的偏向","type":"title"},{"type":"appellation","text":"恩来，乔木："},{"type":"paragraph","text":"一九三三年两个文件，今上午已交通讯员送还你们。现在觉得关于知识分子部分，说得不完全，是不妥的。原件说地主出身者是地主，富农出身者是富农，中农出身者是中农，这是说社会出身，这是对的。但必须补充说，根据知识分子所从事的职业，例如参加军队者是军人，参加政府工作者是政府职员，参加生产企业者是工人、职员、技师或工程师，参加文化工作者是教员、记者、文艺家等，并将着重点不放在社会出身方面，而放在社会职业方面，方可避免唯成分论的偏向。以上请斟酌修改后发出。"},{"type":"paragraph","text":"毛 泽 东"},{"type":"paragraph","text":"二十一日十五时半"}],"comment_pivots":[{"part_idx":1,"offset":5,"index":1},{"part_idx":2,"offset":9,"index":2}],"is_range_date":false,"authors":["毛泽东"],"comments":["乔木，即胡乔木（一九一二——一九九二），江苏盐城人。当时任新华通讯社社长、毛泽东的秘书。","指中华苏维埃共和国临时中央政府一九三三年十月为纠正土地革命中的“左”倾错误、正确解决土地问题而颁发的《怎样分析农村阶级》和《关于土地斗争中一些问题的决定》。这两个文件提出了划分农村阶级的标准，并对划分阶级成分的一些具体问题作了规定。中共中央将这两个文件作若干修改后，于一九四八年五月二十五日重新发给各级党委遵照实施。毛泽东在本文提出的关于知识分子的社会出身和社会职业应有区别的意见，用“说明”的形式加在了《关于土地斗争中一些问题的决定》的知识分子部分中。《怎样分析农村阶级》，已收入《毛泽东选集》第一卷。"],"page_start":110,"page_end":110,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"086645cbb9"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
