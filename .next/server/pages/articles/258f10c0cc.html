script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"内蒙古讨论蒙古族的奴隶社会阶段问题","authors":[],"dates":[{"year":1961,"month":8,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"内蒙古历史研究所最近在编写《蒙古族简史》时，讨论了蒙古族是否经过奴隶社会的问题。有些同志认为蒙古族在氏族社会瓦解以后，没有形成奴隶社会，而是在毗邻地区高度发展的封建社会的影响下，直接过渡到封建社会的。他们的理由是:在当时蒙古社会中奴隶数量不多，如果当时需要大量奴隶，就不会发生成吉思汗在战争中杀戮大量俘虏的情况；当时出现的只是家庭奴隶，而这是原始社会末期的现象；在当时蒙古社会中也没有发现适应于奴隶社会的上层建筑。"},{"type":"paragraph","text":"另一部分同志则不同意上述看法，他们认为最迟在十世纪中期，蒙古的奴隶制已成为普遍存在的现象，而奴隶制向封建制的过渡，则开始于十一世纪，到十二世纪更有急剧的发展。在十三世纪初期，成吉思汗统一蒙古各部，建立国家的时候，已经是封建社会了。至于蒙古族奴隶制的形式正是家庭奴隶制，这是奴隶社会形成的标志之一，不应该把它看作为只是原始社会末期的现象。他们还认为蒙古族的以家庭奴隶制为标志的奴隶社会向封建社会的过渡，不是在家庭奴隶制崩溃的过程中实现的，而是在氏族或部落的互相兼并或自动结合，封建依附因素不断增长，最后成为社会制度的主导关系的时候完成的。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"258f10c0cc"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
