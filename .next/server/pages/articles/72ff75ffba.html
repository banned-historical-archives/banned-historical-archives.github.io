script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"日本毛泽东思想研究会发行的《人民新闻》发表元旦社论号召日本人民  掀起更大的反对美日反动派的风暴  帝国主义就是战争，必须用革命战争消灭反革命侵略战争","authors":[],"dates":[{"year":1970,"month":1,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"日本毛泽东思想研究会发行的《人民新闻》发表元旦社论号召日本人民"},{"type":"paragraph","text":"掀起更大的反对美日反动派的风暴"},{"type":"paragraph","text":"帝国主义就是战争，必须用革命战争消灭反革命侵略战争"},{"type":"paragraph","text":"新华社九日讯　东京消息：日本毛泽东思想研究会发行的《人民新闻》在元旦社论中指出，日本人民在一九七○年，将掀起更大的斗争风暴。"},{"type":"paragraph","text":"社论指出，在一九七○年，美帝国主义和佐藤卖国反动政府将疯狂地推行日美“安全条约”，把日本民族拖进美帝国主义企图发动的新的侵略亚洲战争。而日本人民将进一步开展斗争，向美帝国主义和一小撮日本卖国反动势力进行激烈的战斗。"},{"type":"paragraph","text":"社论说，当代最杰出的马克思列宁主义者毛泽东同志说：“从现在起，五十年内外到一百年内外，是世界上社会制度彻底变化的伟大时代，是一个翻天覆地的时代，是过去任何一个历史时代都不能比拟的。处在这样一个时代，我们必须准备进行同过去时代的斗争形式有着许多不同特点的伟大的斗争。”"},{"type":"paragraph","text":"社论接着说：我们回顾过去的一年，展望新的一年，深刻地感到这种斗争的浪潮正在日益高涨。过去的一年，世界各国人民正在开创同过去时代的斗争形式有着许多不同特点的斗争。这些斗争的矛头越来越指向美帝国主义及其在各国的帮凶和走狗。"},{"type":"paragraph","text":"社论说：越南、老挝、泰国、缅甸、马来亚、印尼、印度等国的人民，继续对美帝国主义及其在各国的傀儡展开英勇的武装斗争。阿拉伯人民的斗争，尤其是巴勒斯坦人民英勇的武装斗争，在过去的一年取得特别显著的进展。"},{"type":"paragraph","text":"在美国等帝国主义的脚底下或苏修社会帝国主义所控制的东欧一些国家，也兴起了人民的斗争。"},{"type":"paragraph","text":"社论接着指出，世界各国人民的斗争证明了这样一些真理：那里有压迫，那里就必然有反抗，必须用革命的暴力去反对反革命的暴力；“枪杆子里面出政权”；只有把马克思主义、列宁主义、毛泽东思想的普遍真理和各国革命斗争的实践相结合，才是胜利的保证。"},{"type":"paragraph","text":"社论说，去年，中国在无产阶级文化大革命取得伟大胜利的基础上召开了具有历史意义的中国共产党第九次全国代表大会。它的划时代的意义，将随着时间的前进而更加大放光芒。"},{"type":"paragraph","text":"社论说，现在，离开了毛泽东思想就不可能想象会有世界革命运动。因此，就要求必须把毛泽东思想这个光辉的普遍真理同革命斗争的具体实践结合起来，进行奋不顾身的战斗。"},{"type":"paragraph","text":"社论指出，帝国主义就是战争，就是压迫。不管是美帝国主义，还是苏修社会帝国主义都不会改变它们的这种本性。它们所玩弄的“和平”，只不过是反革命两手中的一手。在它们的反革命两手中，战争是它们的本质，“和平”是它们的伪装。"},{"type":"paragraph","text":"社论说，我们必须作好对付美帝国主义和苏修社会帝国主义阴谋策划的侵略战争的准备。这就是要用革命来消灭反革命，用革命战争来消灭反革命侵略战争。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"72ff75ffba"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
