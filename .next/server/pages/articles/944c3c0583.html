script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"科学规划委会解决了四个主要问题我国科学将在新条件下发展聂荣臻作总结发言提出今年下半年工作要点　潘梓年指出必须用马列主义观点对待资产阶级社会科学","authors":[],"dates":[{"year":1957,"month":6,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京15日电】　历时三天的国务院科学规划委员会第四次扩大会议今天结束。"},{"type":"paragraph","text":"委员会主任聂荣臻作了总结发言。"},{"type":"paragraph","text":"聂荣臻说，大家同意了我们在这次会议上提出讨论的四个主要问题:全国科学工作体制问题；1957年全国科学技术研究计划；图书资料仪器、化学试剂四个科学研究工作条件方案，以及哲学社会科学统筹安排的一些意见。在这次会议后，由于上述问题的开始解决，我们的科学工作又可以在新的有利条件下逐步向前发展了。"},{"type":"paragraph","text":"聂荣臻说，在小组讨论和大会发言中，大家提了许多意见。这些意见，绝大部分都是正确的，凡与这次会议的报告、计划和方案直接有关的，都已吸收到会议各项文件中去。根据这些意见对文件作了修改和补充。有些意见，将在会后工作中注意，或交有关部门参考。也有个别意见，和大家意见不相同，还须进一步研究，根据“百家争鸣”精神，可以暂时保留，允许存在。但这次会议必须根据绝大多数人的意见，作出决定，以便行动。有些争论已久而又已经比较成熟的意见，又是工作上的而可是学术上的问题，如果继续永远无休止地争论下去，会使我们的科学队伍中继续保持思想上的混乱，这对科学事业的发展是不利的，如果在实践中发现了更好的办法，我们可再采取新的办法。"},{"type":"paragraph","text":"聂荣臻说，科学规划委员会今年下半年打算解决下列几个主要问题:甲，健全各专业小组，并建立改善科学工作条件的工作小组，使这些方案迅速付诸实施。乙，制订科学经费(包括科学基金)的方案，并对确实使用不当的少数高级科学家进行必要的调整工作，对高级科学家的助手以及研究生等问题，也要提出一些方案。丙，制订1958年的研究计划，并修订第二个五年的科学工作计划。"},{"type":"paragraph","text":"关于哲学社会科学方面的进一步安排，科学规划委员会哲学社会科学方面的委员将专门开会讨论，委员会并将组织专门的办公机构来处理哲学社会科学方面的工作。"},{"type":"paragraph","text":"科学规划委员会副主任、国家技术委员会主任黄敬在发言中批判了有些人认为解放以来中国科学研究中断的说法。他认为解放以来八年中我国科学不是中断而是发展了；并且为今后的大发展创造了基础。"},{"type":"paragraph","text":"科学规划委员会委员潘梓年今天在会议上就旧社会科学问题发言。他不同意近来报纸上发表的有些人的说法:“要发展社会科学，首先要改变对待旧社会科学的态度。”潘梓年认为，资产阶级社会科学是为资产阶级利益服务的。解放以来对资产阶级社会科学采取重新考虑的态度是完全必要的。资产阶级社会科学中是有一些有用的东西，我们向来主张继承文化遗产。马克思主义是人类一切知识的总结。但对于社会历史的研究，真正成为科学，是马克思、恩格斯的功劳。在这以前，人们没有掌握社会历史的根本规律，不懂得阶级斗争的规律，所以过去那些被称为“社会科学”的东西，实际上是不够科学的。他说，今天我们首先要用马克思主义的观点和方法来研究当前的实际和历史，对文化遗产要批判地加以分析研究，而不应该简单地去“恢复”那些资产阶级社会科学。"},{"type":"paragraph","text":"昨天，会议进行小组讨论，今天听取了委员和地方代表共二十二人的发言。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"聂荣臻","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"944c3c0583"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
