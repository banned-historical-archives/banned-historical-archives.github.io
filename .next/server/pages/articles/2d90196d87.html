script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"搞臭资产阶级小资产阶级派性","authors":["岳反修"],"dates":[{"year":1968,"month":1,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"搞臭资产阶级小资产阶级派性"},{"type":"paragraph","text":"岳反修"},{"type":"paragraph","text":"在全国无产阶级革命派和广大革命群众，遵照毛主席的最新指示，斗私批修，迅速实现革命大联合和三结合的大好形势下，某些单位迟迟联合不起来，或者联合起来了又闹分裂，有的人甚至派性大膨胀，被小团体主义迷住眼睛，分辨不出敌友，看不清阶级斗争的严重性，继续大打“内战”。在迎接文化大革命全面胜利的紧要关头，我们必须向这些人大喝一声：打倒资产阶级、小资产阶级派性！"},{"type":"paragraph","text":"从一些地区的情况来看，派性的表现还有如下种种："},{"type":"paragraph","text":"一、不甘心。有的认为，我是老造反派，大方向正确，一切大权应该归我；有的认为，我实权在握，要联合，你就得找我“归队”；有的认为，我的组织错误少，他的组织错误多，只要继续开展“四大”，我有全然取胜的把握；有的认为，我的组织受过冲击，戴过“老保”帽子，事实证明，我“保”对了，你冲错了，等等。一句话，搞大联合么？不甘心。"},{"type":"paragraph","text":"因为“不甘心”，所以就背后搞鬼，各自暗打算盘，妄图一举搞垮对方，达到独揽大权的目的。"},{"type":"paragraph","text":"二、互相攻击。有些同志在革命的大风大浪中犯过这样或者那样的错误。本来，犯错误是难免的，改了就好了。可是，由于资产阶级、小资产阶级派性作怪，自己有了错误，自己不讲，又怕群众讲；为了护短，就拚命地往人家脸上抹黑，专挑人家毛病。你骂我是大杂烩，我骂你组织不纯，互相攻击，不讲是非。"},{"type":"paragraph","text":"三、无限上纲。两大派革命群众组织之间的矛盾，本来是人民内部矛盾，可是，那些资产阶级、小资产阶级派性十足的人，不顾大局，硬把两派矛盾说成是路线斗争，他们甚至断章取义利用毛主席语录，攻击对方。"},{"type":"paragraph","text":"四、在解放干部问题上扯皮。有些人为了本派的利益，凡是不站在自己一边的革命干部，明明知道不该打倒，就是不让站出来；反之，明明知道某某干部犯了严重错误，却硬要大喊大叫他是“响当当”的革命干部。"},{"type":"paragraph","text":"当然，派性的表现不止上述这些。总之，派性斗争，具有反动性。它破坏革命的大联合和三结合，成为无产阶级文化大革命前进道路上的绊脚石。它甚至为阶级敌人建造了防空洞，或者被阶级敌人利用和操纵，最起码也是扰乱了阶级阵线。因此，必须打倒资产阶级、小资产阶级派性！"},{"type":"paragraph","text":"毛主席说：“一切反动势力在他们行将灭亡的时候，总是要进行垂死挣扎的。”资产阶级、小资产阶级派性这股小小逆流，当然也不会例外，它一定还会采取各种形式，进行顽强的抵抗。要彻底把它搞臭、打倒，必须充分发动群众，打一场人民战争，把资产阶级、小资产阶级派性的表现、危害、根源及其罪恶，完全、彻底、干净、全部地揭露出来。"},{"type":"paragraph","text":"当然，在揭露和批判资产阶级、小资产阶级派性时，一定要划清人民内部矛盾和敌我矛盾界限。对革命群众，要坚持正面教育。这样才能达到根除资产阶级、小资产阶级派性的目的。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"派性","type":"主题/事件"},{"name":"人民战争","type":"主题/事件"},{"name":"人民内部矛盾","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2d90196d87"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
