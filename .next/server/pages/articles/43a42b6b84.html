script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"毛泽东在刘少奇作反修报告时的插话","authors":[],"dates":[{"year":1964,"month":9,"day":4}],"is_range_date":false,"parts":[{"text":"在刘少奇作反修报告时的插话","type":"title"},{"text":"毛：蛇是引出来好打，还是钻黑洞里好打？","type":"paragraph"},{"text":"刘：对苏斯洛夫报告我们赞成发表，它不发。出了八评后引出来了。","type":"paragraph"},{"text":"毛：一九五六年以来，苏联骂斯大林，我们一论、二论发表后，他就失去了主动权。点名不光我们两家，东欧也点名了。","type":"paragraph"},{"text":"刘：苏联批评罗自力更生，罗回击，用我们评苏联的话。","type":"paragraph"},{"text":"毛：不是内部的事，正在电台上干，公开干了。","type":"paragraph"},{"text":"控制、反控制的冲突，第一位的不是中国，而是东欧国家。","type":"paragraph"},{"text":"刘：罗已做了苏断绝经济关系的准备，自己不能制造武器，要求我国去人到罗访问，不讲话都可以使人震惊，去了不讲话，握握手都很重要。","type":"paragraph"},{"text":"毛：中苏关系准备两手，准备破裂，争取拖。哪天出事，不要出于意料之外，天下大事，合久必分，分久必合。","type":"paragraph"},{"text":"刘：巴西老党四万人，成立新党六千人。","type":"paragraph"},{"text":"毛：是四万人可靠，还是六千人可靠？","type":"paragraph"},{"text":"南昌暴动轰轰烈烈，剩下不多人，以后发展了三十万人，长征剩下几万人，以后发展起来，山不在高。","type":"paragraph"},{"text":"有了修正主义，列宁主义才能万岁！","type":"paragraph"},{"text":"不注意一定出修正主义，注意可能出可能不出；准备出，可能不出。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"43a42b6b84"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
