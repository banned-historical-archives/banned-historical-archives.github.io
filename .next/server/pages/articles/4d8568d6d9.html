script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"北京军区总医院党委采取多种形式  进行反对资产阶级自由化正面教育","authors":["王军　慧明"],"dates":[{"year":1987,"month":3,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"北京军区总医院党委采取多种形式"},{"type":"paragraph","text":"进行反对资产阶级自由化正面教育"},{"type":"paragraph","text":"本报讯　北京军区总医院党委，在坚持四项基本原则、反对资产阶级自由化的正面教育中，采取摆十一届三中全会以来医院建设成果、请老知识分子谈经历、让出国考察专家讲感受等多种形式，收到良好效果。"},{"type":"paragraph","text":"——组织医疗技术人员畅谈十一届三中全会以来党对知识分子的关怀爱护，对党员进行教育。许多技术人员激动地谈到：党的十一届三中全会以来，组织上先后为医院内200多名知识分子平了反、落实了政策。在住房、调级等问题上优先考虑技术人员。知识分子生活普遍明显改善。不到八年的时间，医院先后有630多项科研成果获奖，其中有很多项目达到了国内外先进水平。这一点充分说明，知识分子只有在党的领导下，才会在事业上大有作为。"},{"type":"paragraph","text":"——他们多次召开各种形式的座谈会，请老知识分子用自己在新旧社会的亲身经历，说明只有走社会主义道路中国才能富强。骨科专家、外二科主任胥少汀是经历过两种社会、两种军队生活的医疗专家。年青时，他抱着“科学救国”的志向刻苦学习，然而旧社会，到处腐败，纵有高超技术又往哪里用？解放后，他在人民解放军的行列里，医疗科研、抢险救灾处处带头。党的十一届三中全会以后，组织上让他挑起了组织领导全军创伤骨科中心的重担，并多方从人力、物力、时间上为他的医疗科研工作创造条件。在近八年的时间里，这个只有57名技术人员的单位，就有60项战伤、创伤科研成果获全军、全国科技奖。胥少汀深有感触地说：我探求了40多年，真正感到今天才是我们技术人员发挥作用的春天。"},{"type":"paragraph","text":"——医院党委请多次出国考察的专家谈对资本主义制度的看法，谈对祖国的认识，让党员在对比中加深对社会主义制度的热爱。胸外科专家胡明道，多次到一个发达的资本主义国家考察，他介绍说：那里虽然技术先进、物资丰富，但存在着金钱带来的人情冷漠，相比起来，我倍感我们温暖的社会主义好。"},{"type":"paragraph","text":"还有一些专家真诚地告诉青年党员：决不是我们什么都不好，人家什么都好。就医疗来说，我们的断指再植、显微外科、烧伤治疗等多种学科在世界上都处于领先地位。出国考察时，美国同行就十分钦佩我们在医疗卫生方面取得的成绩。"},{"type":"paragraph","text":"通过这些生动扎实、富有说服力的教育，有效地提高了全院党员坚持四项基本原则、反对资产阶级自由化的自觉性。　（王军　慧明）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4d8568d6d9"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
