" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"拜革命左派为师","authors":["《解放军报》编辑部社论"],"dates":[{"year":1967,"month":8,"day":25}],"is_range_date":false,"parts":[{"text":"拜革命左派为师","type":"title"},{"text":"《解放军报》编辑部社论","type":"authors"},{"text":"向人民群众学习，向工人阶级、向贫下中农学习，是伟大领袖毛主席对我们一贯的教导，是我军的光荣传统。","type":"paragraph"},{"text":"林彪副主席最近指示我们，部队两条路线斗争的教育，应该请地方左派来当教员，要借这个东风。坚决贯彻执行林彪副主席这个极其重要的指示，对于增强部队广大指战员两条路线斗争的观念，进一步加强军民团结，更好地完成“三支”“两军”的光荣任务，有着重大的意义。","type":"paragraph"},{"text":"“向革命左派学习，拜革命左派为师”，已经成为我军广大指战员的一致行动。武汉空军某部采取“请进来，走出去”的方式，向革命左派学习，这个东风借得好。","type":"paragraph"},{"text":"广大革命左派，在无产阶级文化大革命中，始终高举毛泽东思想伟大红旗，他们对毛主席，对毛泽东思想，对毛主席的无产阶级革命路线，无限热爱，无限忠诚，无限信仰，无限崇拜。他们在斗争中，活学活用毛主席著作，对毛主席关于无产阶级专政条件下进行革命的理论、路线、方针、方法和政策，有很实际的体会，对两条路线的斗争，对以毛主席为代表的无产阶级革命路线，有深刻的理解。向革命左派学习，可以促进我们更好地活学活用毛主席著作，加深我们对毛主席的热爱，加深我们对毛主席的无产阶级革命路线的认识，提高我们的政策水平和斗争水平。","type":"paragraph"},{"text":"广大革命左派，是捍卫毛主席的无产阶级革命路线的先锋，是揭露和批判党内一小撮走资本主义道路当权派的革命闯将。他们受过资产阶级反动路线的残酷迫害，和资产阶级反动路线作过艰苦曲折的斗争。他们以大无畏的革命造反精神，从资产阶级反动路线压制下冲杀出来，把党内一小撮走资本主义道路当权派打翻在地，为无产阶级文化大革命建立了不朽的功勋。向革命左派学习，听他们愤怒的控诉，无情的揭露，深刻的批判，可以大大激发我们对党内最大的一小撮走资本主义道路当权派的无比仇恨，对资产阶级反动路线的无比仇恨，增强两条路线斗争观念，提高我们的无产阶级阶级觉悟，坚定我们的无产阶级立场。","type":"paragraph"},{"text":"我们每到一地，紧紧地依靠左派，虚心地请教左派，将大大帮助我们在复杂的阶级斗争中熟悉情况，区分敌我，发现问题，找出办法，使我们不断地改进支左工作。","type":"paragraph"},{"text":"毛主席教导我们：“学习马克思主义，不但要从书本上学，主要地还要通过阶级斗争、工作实践和接近工农群众，才能真正学到。”进行两条路线斗争的教育，必须投身到尖锐复杂的阶级斗争中去，以毛主席著作为教材，以革命左派为老师，才能够取得立竿见影的效果。如果脱离实际，关起门来搞，是一定搞不好的。","type":"paragraph"},{"text":"当前，广大指战员在“三支”“两军”第一线，同广大革命左派在毛主席的无产阶级革命路线的指引下，高举“拥军爱民”的伟大旗帜，团结在一起，战斗在一起。这对搞好部队两条路线斗争教育，加强部队思想革命化，是一个十分有利的条件。我们一定要响应林彪副主席的号召，以甘当小学生的精神，满腔热情地向革命左派学习，把两条路线斗争的教育切实搞好，在无产阶级文化大革命运动中为人民立新功。","type":"paragraph"}],"comments":[],"origin":"原载《解放军报》1967年8月25日","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"军队支左","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dafaec7122"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
