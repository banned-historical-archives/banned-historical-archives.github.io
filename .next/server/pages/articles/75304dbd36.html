script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"瑞士坚决反对极右势力抬头  德国设反极右势力热线电话","authors":["吕鸿","陆大生"],"dates":[{"year":2000,"month":8,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"瑞士坚决反对极右势力抬头  德国设反极右势力热线电话"},{"type":"paragraph","text":"新华社日内瓦8月23日电（记者陆大生）瑞士司法和警察部长吕特·梅茨—阿诺尔德23日表示，瑞士政府决心采取一切措施，坚决反对极右势力的抬头。"},{"type":"paragraph","text":"吕特·梅茨—阿诺尔德当天对报界说，联邦政府认为，在打击极右势力的斗争中应该使用所有镇压工具和一切预防措施。她指出，仅仅靠司法机关单方面的力量还不足以制止极右势力的抬头，打击极右势力需要居民和政党、工会、媒体、经济等社会各界的广泛参与。瑞士联邦政府希望通过各方面的努力，能够阻止新纳粹活动在瑞士蔓延。"},{"type":"paragraph","text":"瑞士国家民主党今年4月在伯尔尼成立，并正在与德国极右政党德国国家民主党联络。有迹象表明，德国国家民主党打算将自己的活动范围扩大到瑞士。"},{"type":"paragraph","text":"极右势力在瑞士的活动日益猖獗，特别是以光头党为代表的新纳粹分子近来经常闹事，并利用互联网宣传种族主义，甚至聚众干扰联邦政府的国庆活动。瑞士公众和有识之士都要求有关当局对其采取严厉措施。"},{"type":"paragraph","text":"新华社柏林8月23日电（记者吕鸿）为进一步严厉打击极右势力，德国5个州的州政府内政部长23日在下萨克森州州府汉诺威举行磋商后一致同意在这5个州设立反极右势力热线电话。"},{"type":"paragraph","text":"这5个州是下萨克森、汉堡、不来梅、石荷和梅前州。通过设立热线电话，公民可以随时将他们发现的有关新纳粹活动的情况向州政府主管部门报告。据认为，这是不久前联邦政府和各州动员全体公民与极右势力作斗争的一个实际步骤。"},{"type":"paragraph","text":"当天，德国联邦总理施罗德在图林根州二战时期的一个纳粹集中营向受难者献了花圈，并发表了坚决与极右势力作斗争的讲话。他说：“面对我们的孩子，我们有义务不让纳粹历史重新成为现实。”一些银行也相继宣布，将公开那些有新纳粹背景的账号。"},{"type":"paragraph","text":"近来，德国新纳粹排外事件的屡屡发生引起了政府和社会各界的高度重视和警惕。联邦和各州政府纷纷出台一些措施，以加强对极右势力的打击力度。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"75304dbd36"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
