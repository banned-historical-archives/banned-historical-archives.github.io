script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"巴特寮电台热烈欢呼毛主席庄严声明  毛主席声明强有力鼓舞老挝人民抗美斗争  老挝人民的正义斗争必胜，美帝及其走狗必败","authors":[],"dates":[{"year":1970,"month":5,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"巴特寮电台热烈欢呼毛主席庄严声明"},{"type":"paragraph","text":"毛主席声明强有力鼓舞老挝人民抗美斗争"},{"type":"paragraph","text":"老挝人民的正义斗争必胜，美帝及其走狗必败"},{"type":"paragraph","text":"新华社二十七日讯  巴特寮电台二十六日晚广播一篇题为《毛泽东主席的庄严声明，是对老挝人民抗击美帝国主义侵略者的斗争事业的强有力的鼓舞》的评论，热烈欢呼中国人民的伟大领袖毛泽东主席发表支持世界人民反对美帝斗争的庄严声明。"},{"type":"paragraph","text":"评论说：“中国人民的伟大领袖毛泽东主席五月二十日的庄严声明，是中国人民对为争取自己的独立、和平与自由而进行民族解放斗争事业的老挝人民和印度支那各国人民的深情厚谊的又一个新标志。老挝各爱国力量和老挝人民认为，毛泽东主席的庄严声明有着极为重大的意义，是对老挝人民抗击美帝国主义侵略者及其走狗的斗争事业的强有力的鼓舞。”"},{"type":"paragraph","text":"评论说，毛主席的庄严声明表明了对印度支那人民抗击美帝国主义侵略者的革命斗争的严正立场，表明了中国人民对印度支那三国人民和世界各国人民反对美帝及其走狗的革命斗争的坚决支持。"},{"type":"paragraph","text":"评论说：“在毛泽东主席领导下的中国党、政府和兄弟的中国人民在任何时候都是老挝人民的最亲爱和最亲密的战友。中国人民尽自己的全部力量，从物质上和精神上援助老挝人民抗击美帝国主义侵略者及其走狗的救国战争。在美帝国主义拖延侵略越南南方战争，把侵略战争扩大到柬埔寨领土，加强在老挝的特种战争和不断地派遣空军对越南民主共和国进行疯狂挑衅，致使印度支那形势日益严重的情况下，兄弟的中国人民对老挝人民和印度支那各国人民更加同情，并且进一步给予了有力的支持。”"},{"type":"paragraph","text":"评论最后表示坚信，老挝人民的正义斗争事业必将取得胜利！美帝国主义及其走狗必定失败！"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"575b8a8de7"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
