script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反对极右派破坏和平　拒绝进攻各爱国力量  万象方面军队许多部队和军校学员举行起义  宣布脱离右派军队，直接服从临时民族联合政府指挥","authors":[],"dates":[{"year":1975,"month":5,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反对极右派破坏和平　拒绝进攻各爱国力量"},{"type":"paragraph","text":"万象方面军队许多部队和军校学员举行起义"},{"type":"paragraph","text":"宣布脱离右派军队，直接服从临时民族联合政府指挥"},{"type":"paragraph","text":"新华社万象一九七五年五月十一日电  据巴特寮电台报道，驻守在万荣省芒芬地区和琅勃拉邦省川银地区的万象方面军队先后于五月八日和十日举行起义，宣布完全脱离万象方面军队，而直接服从老挝临时民族联合政府的指挥。"},{"type":"paragraph","text":"报道说，五月八日，由奔亨率领的驻万荣省芒芬地区的万象方面军队第五十八义勇营指挥连全体官兵举行起义，夺取了指挥中心的指挥权，并且宣布让爱国力量部队进驻。"},{"type":"paragraph","text":"五月十日，由道·洪潘西中校指挥的万象方面军队第二师（王宝特种部队）零二战团的全体官兵在琅勃拉邦省川银地区宣布起义。该战团包括第五零六、五零八和五零九三个步兵营以及一零五毫米炮兵队、一五五毫米炮兵队和坦克车队。"},{"type":"paragraph","text":"起义部队宣布，反对万象极右反动军官要他们进攻各爱国力量的命令，拒绝参与进攻各爱国力量的战斗，并且宣布完全脱离万象右派军队，直接服从联合政府的指挥。"},{"type":"paragraph","text":"零二战团起义官兵呼吁万象方面军队的官兵和警察认清形势，起来斗争，同全国人民一道，坚决清除极右反动派，建设一个和平、独立、中立、民主、统一和繁荣的老挝。"},{"type":"paragraph","text":"新华社万象一九七五年五月十一日电  万象方面军队的吉乃莫兵营现役尉官学校一百九十多名学员五月十一日清晨举行起义，宣布直属老挝临时民族联合政府。"},{"type":"paragraph","text":"起义者发表的一项声明严厉谴责西苏·纳占巴塞、贡·萨纳尼空和“第五军区司令”通立等极右反动分子反对临时民族联合政府、反对和平与民族和睦的罪行。"},{"type":"paragraph","text":"声明说，我们对上述反动分子的胡作非为早就十分痛恨。因此，我们宣布起义，摆脱卖国集团加给我们的枷锁，直属以梭发那·富马亲王为首相的老挝临时民族联合政府。"},{"type":"paragraph","text":"声明强调说，如果万象极右派反动集团阻挠我们的爱国行动，我们将作出一切牺牲，把那些民族败类清除掉。"},{"type":"paragraph","text":"五月十一日上午，起义者的代表会见了临时民族联合政府首相梭发那·富马亲王，富马亲王满足了起义者的要求。"},{"type":"paragraph","text":"另据巴特寮电台报道，万象方面军队的空军飞行员因丹·西山四月二十一日驾驶一架T—28型飞机从沙湾拿吉空军基地起义后，投奔老挝解放区某地，受到解放区当地政权和人民的欢迎。这名飞行员在当地休息一个阶段后，于五月十日到达桑怒省解放区万赛，受到老挝人民解放军最高指挥部代表的欢迎。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9b27b406fc"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
