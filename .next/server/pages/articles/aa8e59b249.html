script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"哈尔滨市三万多工人集会  反击资产阶级右派的猖狂进攻","authors":[],"dates":[{"year":1957,"month":7,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"哈尔滨市三万多工人集会"},{"type":"paragraph","text":"反击资产阶级右派的猖狂进攻"},{"type":"paragraph","text":"新华社哈尔滨6日电　5日傍晚，哈尔滨市三万多工人集会驳斥右派分子的反动言论。"},{"type":"paragraph","text":"东北第三工程公司钢筋工人杜树华在大会上讲话，以他自己的亲身经历说明新旧社会的巨大变化。他说，现在我们工人有劳动保护，生活都改善了。我最近血压高，工厂还送我到疗养所休养，这在旧社会是做梦也想不到的。不管右派分子怎样造谣，我们是热爱共产党的。"},{"type":"paragraph","text":"哈尔滨亚麻纺织厂女工徐敏达说，右派分子说什么社会主义建设“一团黑”，就让他们睁开眼睛来看看我们的亚麻厂吧，1949年这块地方还是一片荒野，到1952年就建成了这座近代化的大工厂。在我们厂附近，量具刃具厂、电机厂也建设起来了。在党的领导下，我们厂提前一年多达到了第一个五年计划的生产水平。去年，我们厂的劳动生产率比1953年提高了173.5％。右派分子企图否定我们建设的成就，这不是睁着眼睛说瞎话吗？在会上发言的有工人、技术人员共六人。"},{"type":"paragraph","text":"当天，哈尔滨市还有十几万工人收听了会场的实况广播。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"aa8e59b249"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
