script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"坚决捍卫毛主席的革命司令部","authors":["河南“二七公社”"],"dates":[{"year":1967,"month":8,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"坚决捍卫毛主席的革命司令部"},{"type":"paragraph","text":"河南“二七公社”"},{"type":"paragraph","text":"八月五日是个光辉的日子，是个具有伟大纪念意义的日子，是铭刻在我们无产阶级革命派心上的永远不能忘记的日子！"},{"type":"paragraph","text":"去年的今天，我们伟大的领袖毛主席，写了题为《炮打司令部》的具有划时代意义的大字报。这张大字报是一把利剑，刺入党内最大的走资本主义道路当权派的心脏；是一把铁锤，砸烂了资产阶级反动路线加在无产阶级革命派身上的枷锁。这张大字报，是对资产阶级反动路线的宣判书，是向党内最大的一小撮走资本主义道路当权派发起进攻的总动员令。毛主席的这张划时代的大字报，给我们指明了斗争大方向，给了我们向党内一小撮走资本主义道路当权派勇猛冲锋的无穷力量。"},{"type":"paragraph","text":"“忆往昔峥嵘岁月稠”。一年来，我们“二七”战士和全国无产阶级革命派一道，在毛泽东思想的指引下，披荆斩棘，奋勇前进。为了捍卫毛主席的革命路线，捍卫毛主席的无产阶级司令部，我们和党内一小撮走资本主义道路的当权派进行了坚决的斗争。我们粉碎了资产阶级反动路线的迫害，揭发批判了中国赫鲁晓夫在河南的代理人的滔天罪行，戳穿了他们对革命派明支持、暗瓦解的阴谋诡计，打退了他们的反革命经济主义妖风。“一月革命”风暴后，我们实行革命的大联合，向党内一小撮走资本主义道路当权派展开夺权斗争。就在这个关键时刻，一小撮走资本主义道路当权派勾结起来，对我们“二七公社”进行了疯狂镇压。但是，我们没有被压垮，我们越战越强。在毛主席、党中央的支持和关怀下，在全国革命派的支持和帮助下，经过英勇斗争，终于赢得了胜利。"},{"type":"paragraph","text":"回顾一年来的战斗历程，更加体会到毛主席的《炮打司令部》的大字报是何等英明，何等伟大！毛主席他老人家对党内最大的走资本主义道路当权派揭露得是何等深刻，而对广大革命群众又是何等信任！"},{"type":"paragraph","text":"“雄关漫道真如铁，而今迈步从头越。”今天，我们虽然取得了一定成绩，但以后的路程更长，工作更艰苦。我们“二七”战士一定要永远捍卫毛主席的革命路线，高举革命批判的旗帜，开展革命的大批判，把党内最大的一小撮走资本主义道路当权派及其在河南的代理人彻底批倒批臭。我们要高举毛泽东思想的伟大红旗，破私立公，促进思想革命化，夺自己头脑中“私”字的权，克服小山头主义、小团体主义、无政府主义；要正确对待自己，正确对待群众，正确对待不同意见，实现革命的大联合和革命的“三结合”，组成千百万浩浩荡荡的文化革命大军，夺取无产阶级文化大革命的彻底胜利！"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"河南文革","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"一月革命","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"39c0dadb6b"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
