<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"读《关于党内政治生活的若干准则》","authors":["叶圣陶"],"dates":[{"year":1980,"month":3,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"叶圣陶"},{"type":"paragraph","text":"本月十五日，五中全会通过的《关于党内政治生活的若干准则》在全国各报上公布。这又是一件深得人心的大事。全国人民谁不急于要知道《准则》所规定的内容呢?"},{"type":"paragraph","text":"今年一月十六日，邓小平同志作《目前的形势和任务》的报告。报告分三个部分，第三部分讲的是坚持党的领导，改善党的领导。为什么要坚持党的领导呢?他的扼要的话是“从根本上说，没有党的领导，就没有现代中国的一切。”以下分项说明这个意思，我不再抄录，大家可以翻出来自己细看。总之，看了他的分项说明，谁都会连声说“对”，心悦诚服，确实相信没有党的领导就没有现代中国的一切。同时就会想到，党为祖国担负这么重的责任，尽这么大的力量，全国人民该怎么样呢?回答只能是这么一句话:坚持接受党的领导，同心同德把四化建设搞好。"},{"type":"paragraph","text":"邓小平同志讲了坚持党的领导，接着就讲“必须努力改善党的领导”，努力改善是为了加强坚持。党的领导为什么需要改善，他讲的种种理由都能使人信服，用习用的话来说，就是说到了人们心坎儿上。同时人们就会想到，党的领导得到了改善，必然更为加强，展望前程似锦，大伙儿真是有奔头啊!"},{"type":"paragraph","text":"现在《关于党内政治生活的若干准则》公布了，全国人民读了这个文件所列的十二条，详明地知道了改善的具体项目，自然更为欣慰；因为这十二条提得又重要又切实，只要党员全都能身体力行，就是党的领导的改善和加强的根本保证。"},{"type":"paragraph","text":"我凭几十年来的耳闻和目睹，学习和经历，读了《准则》的十二条，觉得党的这些优良传统相当熟悉，党向来是这么做的；有些方面有所发展，我又觉得确然应该如此，如此更好。我料想党内大多数同志必然有跟我相同的感觉，而且必然比党外的我深刻得多。可是如今还要异常郑重地讨论并且通过这份《准则》，公布全国，咸使闻知，当然有严重的必要。这严重的必要在邓小平同志的报告里已经指出，简略地说，就因为一部分党员忘却了这些准则，还有一部分党员几乎不知道这些准则。"},{"type":"paragraph","text":"按理说，党员应该个个合格。这样的观点存在人们心头，只要听平常的言谈就可以知道。人们常常说:“某某同志真是个好党员。”又常常说:“我看某某不象个党员。”说这样的话的人未必说得出党员应该合乎哪几项标准，可是他们心目中都有个标准在，这是可以肯定的。还可以肯定，人们心目中的标准是相当高的，虽然不要求是“完人”，总得象邓小平同志报告里所说的是“群众的模范，群众的核心”。全国人民这样看重党员，足以证明大家都诚心诚意希望党坚持党的领导，自己则愿意坚持接受党的领导。现在十二条准则明摆在这里，大家得以知道合格的党员有哪些标准，这就不仅在认识上得到明确，而且从良好的愿望出发，可以按照《准则》的要求监督党组织和党员，帮助党加强党纪，端正党风。"},{"type":"paragraph","text":"试想，要是三千八百万党员人人是模范，个个是核心，一鼓作气，勇往直前，全国人民齐心合力，协同精进，那么邓小平同志报告的第一部分讲的三件大事，第二部分讲的四个前提，不就一定能够完全解决了吗?"},{"type":"paragraph","text":"除了以上说的一些肤浅的意思，我以为这份《准则》对党外人士也大有用处。凡是有组织的集体和个人，如群众团体和民主党派以及它们的成员，都可以取法乎上，按照《准则》的要求来要求自己。“坚持集体领导，反对个人专断”，“要讲真话，言行一致”，“同错误倾向和坏人坏事作斗争”，“努力学习，做到又红又专”，象这些项目，不都是应当认真学习，努力实践的吗?其他项目，也可以领会它的精义，适当地应用到思想和行动中去。"},{"type":"paragraph","text":"象《准则》这样的文件，读它读到背得出来，反复讨论它讨论得头头是道，还说不上这就够了。这不仅是读和讨论的东西，必得把它化为自身的血肉，体现在自己的思想和行动中才行:我坚决地相信如此。"},{"type":"paragraph","text":"我还要说咱们教育界。教育的道理多端，教育的方法各式各样，而“身教为先”总归是最重要的一条。因此，无论党员非党员，无论人民团体、民主党派的成员或者无所属的个人，凡是担任教育工作的，认真学习这个文件，必然能在身教方面得到很多进益:我又坚决地相信如此。"},{"type":"paragraph","text":"三月十七日"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4d17f1f4ea"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
