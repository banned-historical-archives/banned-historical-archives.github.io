script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"人大常委会委员、全国总工会副主席  马纯古同志追悼会在北京举行  中共中央、人大常委会、国务院以及华国锋、叶剑英、邓小平、李先念、陈云、汪东兴等同志送了花圈。李先念、汪东兴等同志参加追悼会，邓颖超同志主持追悼会，倪志福同志致悼词","authors":[],"dates":[{"year":1979,"month":4,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"人大常委会委员、全国总工会副主席"},{"type":"paragraph","text":"马纯古同志追悼会在北京举行"},{"type":"paragraph","text":"中共中央、人大常委会、国务院以及华国锋、叶剑英、邓小平、李先念、陈云、汪东兴等同志送了花圈。李先念、汪东兴等同志参加追悼会，邓颖超同志主持追悼会，倪志福同志致悼词"},{"type":"paragraph","text":"新华社北京三月三十一日电  全国人民代表大会常务委员会委员、中华全国总工会副主席马纯古同志追悼会，今天下午在北京八宝山革命公墓礼堂举行。"},{"type":"paragraph","text":"马纯古同志因病于一九七九年三月十六日逝世，终年七十二岁。"},{"type":"paragraph","text":"中共中央、人大常委会、国务院以及华国锋、叶剑英、邓小平、李先念、陈云、汪东兴、王震、乌兰夫、邓颖超、纪登奎、余秋里、胡耀邦、耿飚、廖承志、姬鹏飞、谷牧、康世恩等同志送了花圈。中华全国总工会、全国妇女联合会、共青团中央、湖北省委和省革委会、武汉市委和市革委会、上海市委和市革委会、江苏省委和省革委会，以及全国各省、市、自治区总工会，也送了花圈。"},{"type":"paragraph","text":"李先念、汪东兴、乌兰夫、纪登奎、余秋里、胡耀邦、耿飚、廖承志、谷牧、康世恩、宋任穷、康克清等同志和中共中央有关部门、全国人大常委会、国务院有关部门、中华全国总工会、北京市总工会等单位的负责人和群众代表共五百多人，参加了追悼会。"},{"type":"paragraph","text":"追悼会由邓颖超同志主持，倪志福同志致悼词。"},{"type":"paragraph","text":"悼词说，我们怀着十分沉重的心情，悼念无产阶级的忠诚战士、优秀的共产党员、我国工会运动杰出的领导人、著名的国际工会运动活动家马纯古同志。"},{"type":"paragraph","text":"悼词说，马纯古同志是湖北省武汉市人，一九二七年一月参加中国共产党。解放前，历任中共北京朝阳大学支部干事和工人运动委员会委员，上海社会科学者联盟常委、党团书记，全国总工会上海执行局秘书，中共江苏省委工人运动委员会委员，中共上海纱厂临时工作委员会书记，中共上海工人运动委员会委员、书记，中央职工运动委员会委员，《中国工人》周刊、月刊责任编辑，中央民众运动委员会委员，中国共产党第七次全国代表大会代表，中共上海工人运动委员会副书记，中共上海市委副书记，中华全国总工会第六届执行委员会委员。全国解放后，历任中共上海市委委员、市人民政府委员会委员、市劳动局局长，上海市总工会执行委员，中华全国总工会国际部部长、书记处书记、副主席、党组副书记，第三、四、五届全国人民代表大会常务委员会委员。半个多世纪来，他在党的领导下，为我国民主革命、社会主义革命和社会主义建设事业，为我国工人运动的发展，为我国工会和世界各国工会的友好团结，献出了毕生的精力。他的一生是革命的一生，艰苦奋斗的一生，全心全意为工人阶级解放而战斗的一生。"},{"type":"paragraph","text":"悼词说，林彪、“四人帮”一再对马纯古同志进行诬陷和迫害，他不屈不挠，坚持进行抵制和斗争。粉碎“四人帮”以后，他旗帜鲜明地坚决揭露林彪、“四人帮”及其在工会九大筹备组的代理人破坏工人运动、阴谋把工会作为他们篡党夺权工具的罪行，为明确新时期工运的基本方针和任务，肃清“四人帮”在工运领域的流毒和影响，恢复和发扬我国工人运动的革命传统和优良作风，作出了巨大的贡献。"},{"type":"paragraph","text":"悼词说，马纯古同志的逝世，使我党失去了一位老党员，使我国工运战线失去了一位卓越的领导人。我们悼念马纯古同志，要化悲痛为力量，学习他的革命精神和高尚品质。我们要以实际行动，在华国锋同志为首的党中央领导下，高举毛主席的伟大旗帜，坚决贯彻党的十一届三中全会的决议，为加强安定团结，加速实现新时期的总任务，在本世纪内把我国建设成为社会主义的现代化强国而奋斗！"},{"type":"paragraph","text":"参加追悼会的还有马纯古同志的生前友好：薄一波、刘晓、钟民、张祺、朱学范、李颉伯、康永和、黄民伟、张维桢、刘子久等同志。（附图片）"},{"type":"paragraph","text":"马纯古同志遗像    新华社发"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"叶剑英","type":"人物"},{"name":"华国锋","type":"人物"},{"name":"汪东兴","type":"人物"},{"name":"李先念","type":"人物"},{"name":"林彪","type":"人物"},{"name":"谷牧","type":"人物"},{"name":"廖承志","type":"人物"},{"name":"胡耀邦","type":"人物"},{"name":"纪登奎","type":"人物"},{"name":"陈云","type":"人物"},{"name":"马纯古","type":"人物"},{"name":"余秋里","type":"人物"},{"name":"耿飚","type":"人物"},{"name":"四人帮","type":"人物"},{"name":"湖北文革","type":"人物"},{"name":"江苏文革","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"夺权","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5f428b76a3"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
