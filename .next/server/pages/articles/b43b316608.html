script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji8","name":"毛泽东全集第8卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji8.pdf"],"article":{"title":"中华苏维埃共和国中央执行委员会关于改变对富农政策的命令","alias":"","parts":[{"type":"paragraph","text":"中华苏维埃共和国中央执行委员会"},{"type":"paragraph","text":"关于改变对富农政策的命令"},{"type":"paragraph","text":"（1935年12月15日）"},{"type":"paragraph","text":"鉴于日本帝国主义之积极侵略，中国沦亡之危迫，全国工农及爱国志士均积极参加民族革命斗争，反对日本侵略者及其走狗蒋介石辈；又因蒋介石等的卖国贼统治，陷中国经济于万劫不复之域一一特别是农村经济，全国农民均群起反抗与暴动，富农已改变其仇视苏维埃革命而开始同情于反帝国主义与土地革命的斗争，苏维埃中央委员会为扩大全国抗日讨蒋之革命战线，特决定改变对于富农之政策。"},{"type":"paragraph","text":"（甲）富农之土地，除以封建性之高度佃租出租于佃农者，应以地主论而全部没收之外，其余富农自耕及雇人经营之土地，不论其土地之好坏，均一概不在没收之列。"},{"type":"paragraph","text":"（乙）富农之动产及牲畜耕具，除以封建性之高利贷出借以剥夺农民者外，均不应没收。"},{"type":"paragraph","text":"（丙）除统一累进税外，禁止地方政府对于富农之征发及特殊税捐。"},{"type":"paragraph","text":"（丁）富农在不违反苏维埃法律时，各级政府应保障其经营工商业及雇用劳动之自由。民分得同样土地之权。"},{"type":"paragraph","text":"（已）富农在违反苏维埃法令时应依法惩治之，进行反革命活动时应按暂行惩治反革命条例惩治之。"},{"type":"paragraph","text":"（庚）富农仍无权参加红军及一切武装部队（包括赤卫军在内)，并无选举权。"},{"type":"paragraph","text":"（辛）以前颁布之土地法及一切其他法令，凡与本命令有抵触者悉废除之。"},{"type":"paragraph","text":"（壬）本命令自公布日起实行之（在未联系一片之区域，文到之日实行之），在本命令实行前依以前法令施行者仍属有效，不得翻案。"},{"type":"paragraph","text":"主席毛泽东一九三五年十二月十五日"}],"authors":["毛泽东"],"dates":[{"year":1935,"month":12,"day":15}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":111,"page_end":112},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b43b316608"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
