script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji39","name":"毛泽东全集第39卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji39.pdf"],"article":{"title":"转发冶金部党组关于产钢计划的批语","alias":"","parts":[{"type":"paragraph","text":"转发治金部党组关于产钢计划的批语"},{"type":"paragraph","text":"（1958年6月22日）"},{"type":"paragraph","text":"此件“发给各大协作区，各省、市、自治区党委，各中央委员，中央各部委，中央国家机关各党组，军委会议各同志。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"六月廿二日"},{"type":"paragraph","text":"[1]指冶金部党组1958年6月21日关于产钢计划给毛泽东、中央的报告。报告说：华东区提出争取明年华东区钢的生产能力达到800万吨。这是一个极重要的建议指标。根据这一指标，我国钢铁工业的发展，又将进入一个新的水平。我们和华东区的同志研究了争取明年达到生产能力800万吨的措施，同时其他各大协作区也在最近分别召开冶金工业的规划会议，研究各大协作区明年及第二个五年计划的指标。从各大协作区会议的情况看，明年钢的产量可以超过3000万吨，而1962年的生产水平则将可能达到八九千万吨以上。目前冶金部正用全力协同各区，共同组织设计、设备制造以及技术力量的培养等项工作。"},{"type":"paragraph","text":"转发冶金部党组关于产钢计划的批语刘邓阅发。各省市用电报发去。军委会议，请克诚印发。"},{"type":"paragraph","text":"[1]刘，指刘少奇。邓，指邓小平，当时任中共中央总书记、国务院副总理。"},{"type":"paragraph","text":"[2]克诚，即黄克诚，当时任中共中央军委秘书长。"}],"authors":["毛泽东"],"dates":[{"year":1958,"month":6,"day":22}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":426,"page_end":427},"tags":[{"name":"毛泽东","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5de14091f6"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
