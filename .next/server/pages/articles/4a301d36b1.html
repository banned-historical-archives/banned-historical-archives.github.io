script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"新共全国书记处发表声明谴责印度侵巴  美苏武器援助鼓励了印度扩张野心  比共机关刊谴责美帝和修正主义者为印度侵略者撑腰","authors":[],"dates":[{"year":1965,"month":9,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新共全国书记处发表声明谴责印度侵巴"},{"type":"paragraph","text":"美苏武器援助鼓励了印度扩张野心"},{"type":"paragraph","text":"比共机关刊谴责美帝和修正主义者为印度侵略者撑腰"},{"type":"paragraph","text":"新华社惠灵顿十五日电　新西兰共产党全国书记处今天在《人民之声报》上发表声明说，“印度武装进攻巴基斯坦，目的是要完全夺取克什米尔，强行镇压人民争取自决的斗争。”"},{"type":"paragraph","text":"声明指出：“印度政府始终拒绝让克什米尔人民举行公民投票；相反，它却声称整个克什米尔（在那里，穆斯林占百分之七十）都是它的，而且对克什米尔人民实行重税和剥削的政策。”"},{"type":"paragraph","text":"“印度占领区的人民在八月间起义，要求自决权，这是很自然的事情”。"},{"type":"paragraph","text":"声明说，“自从一九四七年印度和巴基斯坦分治以来，就存在着宗教的和民族的纷争。印度统治阶级最近几年来从美国和其他帝国主义国家获得了大量的武器和金钱，它现在认为自己已经够强大了，能够靠武力来解决这个有争执的问题。必须说，遗憾的是，印度的这种扩张野心也由于得到苏联的武器援助而受到鼓励。"},{"type":"paragraph","text":"“前印度共产党在丹吉集团的修正主义领导下，支持印度政府的侵略和亲帝国主义政策，这是另一种鼓励。”"},{"type":"paragraph","text":"声明追述说，印度的扩张主义政策还表现在一九五九年对中国发动的边界挑衅行动上。声明说：“这种挑衅行动的规模后来扩大了，直到中国在一九六二年十月被迫粉碎了（印度的）一次全面进攻为止。全世界都知道，社会主义的中国在它完全击溃印度军队之后，撤到了有争议的界线后面相当远的地方，这就粉碎了所谓‘中国进行侵略和扩张’的弥天大谎。”"},{"type":"paragraph","text":"声明接着说：“尽管有了这样深刻的教训，统治印度的大资本家从那以后还是多次挑起侵犯边境的事件。他们的野心也影响到其他较小的邻国。”"},{"type":"paragraph","text":"声明强调指出：“他们的军事冒险证明，他们自称不结盟的说法是骗人的。”他们进行这种军事冒险的目的在于：进行对外扩张；转移饥饿、贫穷的人民的注意力，防止他们造反；以及从帝国主义大国取得更大的财政支援和其他支援。"},{"type":"paragraph","text":"声明最后强调指出：“除非印度遵守印—巴协定和承认克什米尔人民的正当愿望，同意克什米尔问题的合理解决，否则就不可能实现和平。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4a301d36b1"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
