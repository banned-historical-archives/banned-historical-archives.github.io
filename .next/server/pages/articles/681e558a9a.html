<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"认真展开高等学校教师中的思想改造学习运动","authors":["《人民日报》国内短评"],"dates":[{"year":1951,"month":10,"day":23}],"is_range_date":false,"parts":[{"text":"认真展开高等学校教师中的思想改造学习运动","type":"title"},{"text":"《人民日报》国内短评","type":"authors"},{"text":"最近北京、天津各高等学校的教师，在中央人民政府教育部统一领导下，进行了有系统的思想改造的学习运动。这是当前改革教育工作上一件值得十分重视的事情。","type":"paragraph"},{"text":"一年来，全国各高等学校一般都初步进行了一些课程改革和院系调整工作。为了使高等学校适应于国家培养干部的需要，这种改革是完全必要的和不能拖延的。一年来的经验证明了，要做好这改革工作，必须首先提高高等学校教职员的政治水平。如果高等学校教职员没有认真树立起全心全力为人民服务的思想，没有用马克思列宁主义思想来武装自己，没有抛弃掉个人主义、自由主义的庸俗观点和欧美反动资产阶级的文化思想，那么，高等教育的改革工作，就必然遇到种种障碍和阻力。因此教师的思想改造工作，乃是改革旧教育的重要前提之一。","type":"paragraph"},{"text":"这样的学习，和其他学习一样，必须把革命理论和学习者自己的思想意识密切联系起来，开展批评和自我批评，避免教条式的空论和无目的的漫谈，认真开展这种批评和自我批评，在现在的大学教师中显然是一个难题，但又是一个必须彻底解决而绝对不可回避的问题。新时代的大学教师，必须对于各种错误的或不正确的思想，进行严肃的、大胆的批判，必须一方面着重检讨自己，反对自满自负目无余子的态度；另一方面勇于互相批评，抛弃明哲保身的虚伪的客气。很明白，如果今天的大学教师们自己不能对于批评和自我批评的精神身体力行，以身作则，那么，怎样能希望他们用批评和自我批评的精神来训练青年的一代呢？","type":"paragraph"},{"text":"这样的学习，也必须和学校与个人的业务工作密切地联系起来。在学习过程中，必须实事求是，具有明确的目标，使经过一定时期的学习后，在学校的教育计划和个人的教学内容、教学方法上都能够实现明确的改变，逐步实现整个高等教育的彻底的改革。","type":"paragraph"},{"text":"北京、天津各高等学校的学习运动，虽然还在开始阶段，但大多数的教职员对于这次学习已经表现了重视和热心；尤其是周总理的报告，给了大家以极大的鼓励。在学习过程中，自然也可能有少数人对学习的意义还缺乏正确的认识，因而采取冷淡敷衍的态度。学习的领导者应该帮助他们了解思想改造的重要性，克服不正确的观点。我们相信，在中央人民政府教育部的严肃负责的领导下，这次学习是会得到预期的效果的。","type":"paragraph"},{"text":"北京、天津各高等学校教师的思想改造的学习运动，对于全国高等学校，具有示范的作用。希望中央教育部能够把这次学习运动的经验，及时地推广到全国各高等学校中去。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"681e558a9a"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
