script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"学雷锋创三好  广州市万松园小学排除“四人帮”的干扰破坏，坚持学雷锋，一代新人茁壮成长","authors":[],"dates":[{"year":1977,"month":3,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"学雷锋创三好"},{"type":"paragraph","text":"广州市万松园小学排除“四人帮”的干扰破坏，坚持学雷锋，一代新人茁壮成长"},{"type":"paragraph","text":"据新华社广州电　广州市万松园小学排除王张江姚“四人帮”的干扰和破坏，坚持开展“学雷锋创三好（身体好、学习好、工作好）”活动，使一代新人茁壮成长。"},{"type":"paragraph","text":"去年，在“四人帮”极力破坏教育革命和学雷锋活动的时候，这个小学的党支部组织全校师生重新学习毛主席关于“向雷锋同志学习”的伟大号召和周总理的题词，进一步明确了“学雷锋创三好”的重要意义。同时，举办展览会，突出宣传毛主席和周总理的光辉题词和学校几年来“学雷锋创三好”活动的成果，使广大师生受到很大的鼓舞，纷纷订出新的计划和措施，坚持把“学雷锋创三好”活动开展下去。以华主席为首的党中央一举粉碎“四人帮”后，这个学校师生更是意气风发，斗志昂扬，“学雷锋创三好”活动蓬勃开展。"},{"type":"paragraph","text":"学雷锋，最根本的就是要象雷锋那样刻苦学习马列著作和毛主席著作，象雷锋那样把毛主席著作当作“粮食”“武器”和“方向盘”。现在，全校共有一百六十多名理论学习辅导员，组成学校、班级、学雷锋小组三级辅导网，把学校辅导与课外自学结合起来，努力学习马列著作和毛主席著作。"},{"type":"paragraph","text":"全校二百多个学雷锋小组，还经常利用课余时间到附近的工厂、生产队、部队、商店为人民群众做好事。通过学雷锋做好事活动，使雷锋同志助人为乐，公而忘私的高尚品质在红小兵心中深深地扎根。去年，唐山、丰南一带发生强烈地震，同学们非常关心灾区人民，他们说：祖国是一个大家庭，唐山人民是我们的骨肉兄弟。他们有难，我们应该支援。于是，同学们学习雷锋精神，主动把自己节约下来的铅笔、作业簿、橡皮等一千多件文具寄给了唐山的小朋友。红小兵们还组成小组，开展互学互助活动，学习成绩好的同学帮助学习有困难的同学，共同努力学好社会主义文化课。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"name":"教育革命","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"623c9f22c6"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
