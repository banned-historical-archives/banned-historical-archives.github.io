script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"巴基斯坦群众团体和公众舆论赞扬巴中友好关系  热烈欢迎刘少奇主席访问巴基斯坦","authors":[],"dates":[{"year":1966,"month":3,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"巴基斯坦群众团体和公众舆论赞扬巴中友好关系"},{"type":"paragraph","text":"热烈欢迎刘少奇主席访问巴基斯坦"},{"type":"paragraph","text":"新华社拉瓦尔品第二十四日电　巴基斯坦群众团体和公众舆论热烈欢迎刘少奇主席即将对巴基斯坦进行的友好访问。"},{"type":"paragraph","text":"巴基斯坦亚非人民团结组织执行委员会二十四日在拉合尔举行的会议上通过决议，宣布这个组织同全体巴基斯坦人民一起最衷心地欢迎刘少奇主席访问巴基斯坦。决议表示相信，通过这次访问，中巴两国人民之间的传统友谊和善意将得到进一步增进。"},{"type":"paragraph","text":"决议说：在这个幸福的值得纪念的时候，巴基斯坦举国上下都在准备表示自己同中国人民亲密无间，休戚与共的关系，对中国人民过去和现在支持克什米尔人民的正义斗争和对巴基斯坦在反抗印度侵略时所给予的支持表示感激。"},{"type":"paragraph","text":"决议说：委员会向中国兄弟们保证：巴基斯坦人民将永远继续同中国人民一起对帝国主义和新老殖民主义进行斗争。"},{"type":"paragraph","text":"巴基斯坦临时首都拉瓦尔品第的巴基斯坦—中国友好协会二十日通过一项决议，欢迎刘少奇主席的访问。决议说，巴基斯坦人民对中国领导人和人民在克什米尔问题上的正义立场表示热烈欢迎，对他们在印度侵略期间向巴基斯坦提供的帮助表示感激。"},{"type":"paragraph","text":"查谟和克什米尔自由政府主席阿卜杜勒·哈米德·汗最近在自由克什米尔的米尔普尔一次公众集会上讲话时说，刘少奇主席访问巴基斯坦是中巴两国深厚友谊中的又一个重要里程碑。他说，中巴友好对建立这一地区真正的持久的和平将发挥重大作用。他还表示感谢中国支持克什米尔的自决事业。"},{"type":"paragraph","text":"查谟和克什米尔穆斯林会议主席萨达尔·阿卜杜勒·加尧姆汗三月二十日在这个组织的全体会议上讲话时说：“我们十分感谢中国国家首脑和中国人民不断地支持克什米尔争取自决权的斗争，感谢他们充分而且真诚地帮助巴基斯坦反对印度侵略。”"},{"type":"paragraph","text":"巴基斯坦的报纸也纷纷发表社论，欢迎刘少奇主席的访问。拉瓦尔品第《新时代报》二十一日发表题为《让我们表示最热诚的欢迎》的社论说：“当印度侵犯我们国土的时候，中国支持我们的正义事业，赢得了我们的热爱，中国的这一行动是令人难忘的。”社论指出：“渴望同中国保持光荣和高尚的友谊的愿望在每个巴基斯坦人的内心都牢牢地扎下了根。”"},{"type":"paragraph","text":"东巴基斯坦《东方考察者报》二十二日发表社论说：“刘主席在这个时候访问巴基斯坦将使我们得到一个良好的机会来加强我们同我们的伟大邻邦的关系，并且为在这个地区建立牢固的和平奠定基础。”"},{"type":"paragraph","text":"社论说：“今天我们两国的友好关系是牢固地建立在互助互谅和要为这个世界的和平而努力的共同愿望的基础上的。刘主席的访问不仅将加强这种日益发展的关系，并且将为发展两国人民的合作开辟更多的途径。”"},{"type":"paragraph","text":"社论还说：“巴基斯坦决不会忘记当我们在为维护自由和完整而进行一场剧烈的战争时中华人民共和国给予我们的及时帮助和支持。”社论说：“中国的这种道义上的支持同我们的所谓同盟者和同情者的表现形成了鲜明的对照，因为它们中间有些不仅不支持我们，甚至力图危害我们的事业。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a897a73cfc"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
