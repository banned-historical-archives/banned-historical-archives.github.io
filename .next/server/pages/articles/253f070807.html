script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"苏捷两国党政领导人一致认为  反修正主义斗争是国际职责","authors":[],"dates":[{"year":1958,"month":7,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"苏捷两国党政领导人一致认为"},{"type":"paragraph","text":"反修正主义斗争是国际职责"},{"type":"paragraph","text":"新华社13日讯　据塔斯社莫斯科12日讯：捷克斯洛伐克共产党中央委员会第一书记、捷克斯洛伐克共和国总统诺沃提尼访问苏联公报12日在莫斯科签字。"},{"type":"paragraph","text":"公报中强调指出，苏联共产党同捷克斯洛伐克共产党，苏联同捷克斯洛伐克共和国由于在一切国际政治问题和内政问题上有着共同的原则立场，它们的观点完全一致。两国之间的友好关系正在继续有效地发展和加强。"},{"type":"paragraph","text":"苏联和捷克斯洛伐克的党和国家领导人一致认为，社会主义阵营各国在无产阶级国际主义原则和忠于马克思列宁主义思想的基础上不断加强团结，是一切走上社会主义建设道路的国家有效发展的主要保证。"},{"type":"paragraph","text":"双方对中国在加强社会主义阵营的团结、争取和平和各国人民合作方面的贡献给予很高的评价。公报中强调指出在最近期内召开有政府首脑参加的国家领导人会议的重要性。并且谴责了西方国家拖延和破坏这种会议的各种企图。苏联和捷克斯洛伐克坚决谴责西方反动集团利用匈牙利司法机关对匈牙利人民的叛徒纳吉·伊姆雷和他的同谋者的合法判决，对社会主义国家发动的挑衅性的宣传运动。"},{"type":"paragraph","text":"双方表示了为反对西德进一步军国主义化而进行斗争的决心，并且指出，在中欧建立无核武器和无火箭武器的地区将有助于防止欧洲的军事危险。"},{"type":"paragraph","text":"公报中说，解决黎巴嫩的内政危机完全是黎巴嫩人民的内部事务。苏联和捷克斯洛伐克坚决地谴责一切企图把黎巴嫩事件变为国际问题的做法。"},{"type":"paragraph","text":"苏联共产党和捷克斯洛伐克共产党的领导人交换了两党工作的情况，讨论了党的相互关系问题和国际工人运动的迫切问题。他们认为在建设社会主义和共产主义的过程中始终不渝地贯彻伟大的马克思列宁主义思想是自己最重要的任务。他们认为同各种修正主义现象进行不调和的斗争是自己的国际主义职责。"},{"type":"paragraph","text":"会谈时并且讨论了进一步交流两党工作经验以及扩大两党接触方面的具体措施。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"253f070807"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
