script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"在毛主席“抓革命，促生产”伟大号召下　在全会公报指引下上海轻工业战线传来令人振奋的捷报今年生产总值超过了历史上最高水平，并提前二十六天超额完成今年生产计划","authors":[],"dates":[{"year":1968,"month":12,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　上海轻工业战线上的广大无产阶级革命派和革命群众，在党的八届扩大的十二中全会公报的指引下，以战无不胜的毛泽东思想为武器，狠抓革命、猛促生产，出现了一片欣欣向荣的新气象。在以实际行动迎接党的第九次全国代表大会胜利召开的热潮中，义传来了令人兴奋的捷报:市轻工业局系统今年生产总值已超过了历史上最高生产水平，并且提前二十六天超额完成了一九六八年生产计划。许多革命职工豪迈地说:我们又一次用铁的事实，驳倒了“二月逆流”黑干将谭震林之流“不见得”派的无耻谰言。"},{"type":"paragraph","text":"战斗在上海轻工业战线上的广大无产阶级革命派和革命群众，遵循伟大领袖毛主席“抓革命，促生产”的伟大教导，在狠抓革命的同时，猛促生产。今年以来，全局系统各级革命委员会和革命群众组织，在毛主席一系列最新指示的光辉指引下，紧跟毛主席的伟大战略部署，大办各种类型的毛泽东思想学习班，广泛深入地开展革命大批判，清理阶级队伍，实行精兵简政，巩固与发展了革命的大联合和革命的三结合，不断提高广大革命职工的阶级斗争和两条路线斗争觉悟，精神面貌起了深刻的变化，大大促进了生产。上海火柴厂革委会领导革命职工在阶级斗争和生产斗争中打进攻战，今年生产计划已提前五十四天完成，现在正在争取更多的超产，以满足城乡人民日用生活品的需要。钟表照相机工业公司所属三十三个工厂中有二十四个工厂已经提前一个多月超额完成了今年生产计划。"},{"type":"paragraph","text":"“一月革命”以来，轻工业系统的广大革命职工从资产阶级反动技术“权威”手中夺回了技术领导权后，立即狠批修正主义科技路线，把“技术科立法，检查科执法，工人守法”，“工程师动嘴，技术员动手，工人只顾做生活”等等黑货，统统扫进了历史的垃圾堆。东方红缝纫机厂有个资产阶级反动技术“权威”，一贯崇洋排“土”，抄袭外国设计资料，整整搞了两年，耗费国家四万元投资，才搞成一台徒具形式、不切实用的三米见方的十字式组合机床，一直搁置在仓库里。在无产阶级文化大革命中，工人们把这个坚持反动立场的家伙揪了出来，并狠批了修正主义科技路线，立即组成一个以车间工人为主体的“三结合”小组，只用半年多时间，试制成功了自动移位的十六孔组合机床，每台只花费二千元。这种机床体积小，生产效率高。上海日用化学制罐厂的革命职工，怀着对伟大领袖毛主席的无限热爱的深厚无产阶级感情，改革用石印机印制毛主席金属宝像，今年已经印制了八十万帧。上海缝纫机制针二厂各小组普遍开展了技术革新，两个女艺徒也在老师傅的帮助下，利用业余时间，革新成功磨车上的漏斗。许多工厂发动群众大搞小改小革，效果都很好，许多“小革新”，推动了生产大跃进。"},{"type":"paragraph","text":"在伟大的斗、批、改高潮中，局革委会及时组织介绍了一些工厂在改革不合理规章制度方面的经验，促进了全局系统狠批对群众实行管、卡、压等修正主义企业管理路线，改革了不合理的规章制度，解放了生产力。中国钟厂钟的日产水平比文化大革命以前翻了一番，而钟的校对时间，仍按陈规旧章，必须十五天才能出厂，影响了生产的持续跃进。有关领导部门接受了工人的合理化建议，把钟的校对时间缩短为十天，既不影响钟的质量，又解决了矛盾，促进了生产。"},{"type":"paragraph","text":"目前，市轻工业局系统各级革委会正高举毛泽东思想伟大红旗，全面落实毛主席一系列最新指示，进一步以全会公报为强大的政治动力，广泛发动群众，深入开展革命大批判，突出无产阶级政治，打破旧框框，继续改革不合理的规章制度，自下而上地依靠群众编制一九六九年的跃进生产计划，为夺取明年革命、生产更大的胜利，作出新的努力。"},{"type":"paragraph","text":"(上海市轻工业局革委会办公室)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"二月逆流","type":"主题/事件"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"name":"清理阶级队伍","type":"主题/事件"},{"name":"一月革命","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9db1a62ca8"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
