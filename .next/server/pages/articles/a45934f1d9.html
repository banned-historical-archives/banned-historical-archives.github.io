" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中央军委给新疆军区的明电","authors":[],"dates":[{"year":1967,"month":2,"day":12}],"is_range_date":false,"parts":[{"text":"中央军委给新疆军区的明电","type":"title"},{"text":"新疆军区并转全体指战员和革命师生，革命群众：","type":"appellation"},{"text":"新疆军区对公然违抗毛主席批准的中央军委命令的分子执行纪律是完全正确的，全体指战员，革命师生，革命工人，革命干部都必须支持这个正确的措施，希望所有包围新疆军区机关的革命群众，都自觉的回到本单位去。向违抗中央军委命令的现象作坚决斗争，否则一切后果，由冲击新疆军区的人员负完全责任。","type":"paragraph"},{"text":" 中央军委1967年2月12日","type":"paragraph"},{"text":"（原载《新疆红卫兵》（北京）1967年6月9日，第二版）","type":"appellation"}],"comments":[],"origin":"原载《新疆红卫兵》（北京）1967年6月9日，第二版","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"新疆文革","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a45934f1d9"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
