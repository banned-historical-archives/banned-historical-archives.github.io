script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"抗议垄断资产阶级残酷剥削　反对腐朽资本主义教育制度  意大利工人学生斗争怒涛滚滚向前","authors":[],"dates":[{"year":1970,"month":12,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"抗议垄断资产阶级残酷剥削　反对腐朽资本主义教育制度"},{"type":"paragraph","text":"意大利工人学生斗争怒涛滚滚向前"},{"type":"paragraph","text":"据新华社讯　罗马消息：意大利工人和学生最近不断掀起新的斗争浪潮，抗议资本家的残酷剥削，反对腐朽的资本主义教育制度。"},{"type":"paragraph","text":"在意大利南部的阿普利亚、卢卡尼亚和坎帕尼亚三大区的八个省份，两百万工人由于对失业和缺乏供水设备不满，十一月十七日举行了二十四小时总罢工。数十万工人、农民和学生在一些地方举行了声势浩大的示威游行。"},{"type":"paragraph","text":"二十五万名服装厂女工和四万名橡胶工人十七日举行了全国规模的二十四小时罢工，要求重订和改善劳工合同。罢工工人还走上街头举行了游行。十三万名制鞋工人为了同样要求举行全国规模的轮流罢工。"},{"type":"paragraph","text":"意大利钢铁公司的工人同一天也举行罢工，要求增加工资。钢铁工人的罢工使这家公司在热那亚和萨沃纳省的十一个工厂和在全国其他地方的工厂停工。"},{"type":"paragraph","text":"十一月二十日，在意大利南部西西里大区的首府巴勒莫发生了总罢工。这是最近两年中在巴勒莫举行的第十四次总罢工。同时，二万五千工人、农民、学生和市民举行游行示威和群众大会，反对失业，并且支持学生反对腐朽的教育制度的斗争。在意大利第二大城市米兰，一万七千名五金工人和机器制造工人从十八日开始罢工三天。“阿尔法、罗米欧”汽车厂、“博尔莱蒂”工厂、“法尔克”工厂以及其他一些五金工厂和机器制造厂的工人都轮番地进行了罢工。"},{"type":"paragraph","text":"在工人斗争高涨的同时，意大利二十个省会和其它一些城市的数万名学生也采取罢课、示威、占领校舍等方式，广泛开展了反对腐朽的资本主义教育制度的斗争。"},{"type":"paragraph","text":"五千多名学生十九日和十七日在罗马举行了大规模的示威游行，抗议警察十四日野蛮地闯进一所中学，镇压学生斗争。示威学生举着标语牌，并且高呼：“工人和学生团结起来进行斗争”、“释放被捕的学生”。示威学生同镇压他们的警察进行了激烈搏斗。在意大利的第三大城市那不勒斯，四十所中学和专业学校中有二十六所被学生占领了两周。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d3da0fd01a"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
