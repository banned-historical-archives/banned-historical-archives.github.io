<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"成都市惩治反革命审查委员会讨论对反革命罪犯处刑问题","authors":["洪涛"],"dates":[{"year":1951,"month":7,"day":14}],"is_range_date":false,"parts":[{"text":"成都市惩治反革命审查委员会讨论对反革命罪犯处刑问题","type":"title"},{"text":"洪涛","type":"authors"},{"text":"川西成都市人民政府、市各界人民代表会议协商委员会于六月二十五日会同召开惩治反革命审查委员会扩大会议。研究讨论由各阶层人民控诉、检举出来，又经市公安局侦查后证据确凿的66名反革命罪犯的处刑问题。出席会议的有市人民政府委员、市人民监察委员、市、区各界人民代表会议协商委员会委员、各民主党派、民主人士、工厂、机关、团体、学校代表等250人。","type":"paragraph"},{"text":"会议上，市公安局赵方局长作了清理反革命案件情况的报告，把这批反革命案件分成四种类型作了详细的介绍。接着，市惩治反革命审查委员会有4个委员分别作了关于特务、暴乱匪首、杀人凶犯、“一贯道”反动道首等反革命案件的审查工作报告。继由受害苦主、“十二桥”烈士刘骏达的爱人马力可控诉军统特务成都站站长杨犯超群杀死了她的丈夫，踢死了即将出世的胎儿的罪行；她自己也因遭长期监禁与饥饿、毒打而摧残了身体的健康。文殊院被服厂工人代表石德心控诉企图武装暴乱、妄图谋杀该厂积极分子及军事代表的反革命分子曾厚成。曾匪厚成，造谣破坏，殴打勒索工人，强迫女工齐雪梨与其同谋姚桑辉为妾。受害家属杨银三控诉窝藏暴乱匪首、阴谋组织暴乱的鹤鸣茶社老闆李匪著言，该犯因恐工友杨友三将此事报告政府，而将杨友三勒死在人民公园厕所内。冯玉清上台控诉刘全保枪杀他女儿冯慧贞和女婿的罪行：他的女婿和女儿在外南青春岛游耍时，遭刘犯等7人抢劫，女儿遭轮奸，最后又将他俩杀死。被骗道徒徐淑良控诉了中统特务、“一贯道”“点传师”严子章利用“一贯道”进行反革命活动，解放后造谣诬蔑我人民领袖和骗取群众财物的罪行。","type":"paragraph"},{"text":"控诉后该市民主党派代表、工人、农民、妇女及工商界代表相继发言，认为会议上所决定的各个案件是正确执行了镇压与宽大相结合的政策，并对政府镇压反革命的措施表示极端拥护。保证今后更要大力协助政府检举出漏网的特务匪徒，才能更加巩固人民民主专政。","type":"paragraph"},{"text":"在惩治反革命委员会彭迪先副主任委员根据各界人民代表会议协商委员会及群众团体代表提出的意见，作了总结发言，对审查委员会的审查意见作了适当的修正后，全体代表举行了庄严的举手表决，一致通过了对66名反革命分子的处理意见。计判处死刑立即执行的有军统特务前成都站站长、解放后制造金堂暴乱的杨犯超群，国民党西昌警备部少将情报处长、保密局湖北站少将站长杨犯振锋，组织与领导川西地区暴乱的郭犯槐卿，杀人犯刘犯全保等12名。判处死刑、缓期两年执行者3名。判处无期徒刑者1名；有期徒刑者39名。判决取保释放、交群众管制的共11名。","type":"paragraph"},{"text":"以上反革命案件处理意见，即日送请成都市军管会批准后，已于6月27日午后分别宣布执行。执行消息传出后，各界群众争先阅读布告，广大人民无不欢欣鼓舞，拍手称快。","type":"paragraph"}],"comments":[],"origin":"重庆《新华日报》1951年7月14日，转载于中央人民政府法制委员会编辑并出版：《镇压反革命》北京：1951年10月26日初版。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d44609591a"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
