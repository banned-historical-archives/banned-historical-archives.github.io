script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"湖北省大冶等十个县的干部反映今年粮食定购任务太重分配不下去","authors":["曲一凡"],"dates":[{"year":1955,"month":4,"day":11}],"is_range_date":false,"parts":[{"text":"湖北省大冶等十个县的干部反映今年粮食定购任务太重分配不下去","type":"title"},{"text":"曲一凡","type":"authors"},{"text":"【湖北分社十一日讯】湖北省各地在贯彻粮食“三定”政策中，大冶、浠水、黄冈、新洲、阳新、蕲春、应城、大悟、孝感、麻城等十个县的干部反映，省里派给他们的定购任务太重，向乡里分派不下去，有些县已经分派下去，但还剩下数百万斤任务不好分配。","type":"paragraph"},{"text":"应城县委反映：该县一九五三年的购粮任务为六百万斤(秋冬)，一九五四年全年统购数是七千三百多万斤，而今年派给该县的定购任务是七千九百万斤，比去年增加了六百万斤，目前有六百一十万斤分配不下去，后经孝感地委研究，对该县削减了二百万斤，但还有四百一十万斤难于分配，现在县委正在想办法把这一任务分配下去。蕲春县干部反映说：今年定购数比去年、前年的数目都加重了。咸宁县委说，咸宁县的定购任务比往年偏高三百万斤(该县是花灾县，其中主要是非灾区的任务加重了二百五十万斤)。大冶县目前也还有一百万斤购粮任务分配不下去。据该县县委反映，不是产量定高了，而是购粮任务加重了。","type":"paragraph"},{"text":"现在湖北省委据各地反映的情况，正在进一步研究处理。据初步分析，这些县叫喊任务重的原因，主要是对部分地方周转粮的处理问题。前年和去年，各地除完成统购任务外，都留有一部分周转粮，今年如果把周转粮也列为定购任务内，就不比往年重，如果定购任务之外另加周转粮，任务就稍为重了一些。","type":"paragraph"},{"text":"(据省委情况汇报材料整理)","type":"paragraph"}],"comments":[],"origin":"1955年4月16日新华通讯社编《内部参考》","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f49eced746"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
