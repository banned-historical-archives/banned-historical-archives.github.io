script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"捷“红色权利报”斥南“战斗报”  谎言掩饰不了修正主义的本相","authors":[],"dates":[{"year":1959,"month":2,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"捷“红色权利报”斥南“战斗报”"},{"type":"paragraph","text":"谎言掩饰不了修正主义的本相"},{"type":"paragraph","text":"新华社5日讯　捷克斯洛伐克“红色权利报”最近发表评论，严正驳斥南斯拉夫“战斗报”1月30日对赫鲁晓夫在苏共第二十一次代表大会上所作的报告的攻击和污蔑。评论说，南斯拉夫报纸无法抹杀有七十个共产党和工人党的代表参加苏共第二十一次代表大会这个事实。因而，许多意识到无产阶级国际主义是共产党人的基本特色的南共党员们就会提疑问：为什么南斯拉夫的党没有代表参加这个重要的代表大会呢？在国际共产主义运动的不可摧毁的团结面前，“战斗报”没有能够回答读者对南共领导人的所谓“无产阶级国际主义”的疑问。评论指出，南斯拉夫报纸企图用捏造的事实来“证明”苏联、中国和社会主义阵营其它各国的共产党，以及坚定地同国际共产主义团结在一起的资本主义国家的马克思列宁主义政党是南斯拉夫的敌人，并以此来反对所有共产党对修正主义的正确批评。"},{"type":"paragraph","text":"“红色权利报”在驳斥“战斗报”关于南斯拉夫劳动人民的境况比社会主义阵营各国劳动人民优越的论调时写道，关于这一点，只需提一下在南斯拉夫的富农和商人迄今还能大量对雇佣劳动者进行剥削这一事实就够了。"},{"type":"paragraph","text":"在评论“战斗报”关于最近社会主义国家实行的经济改组和权力下放实际上是模仿南斯拉夫的制度这一谎言时，“红色权利报”指出，这种权力下放同南斯拉夫的做法有本质的区别。它保持和增强了中央对国民经济的计划和领导，而没有形成自流。而自流正是南斯拉夫经济的隐疾和它不可克服的困难的根源。"},{"type":"paragraph","text":"评论也揭露了南斯拉夫报纸利用联合国档案中过时的、不确实的统计来证明在工业发展的速度上南斯拉夫占欧洲第一位的愚蠢企图。评论指出，这个论断就连许多南斯拉夫的经济工作者也显然感到吃惊，因为他们是熟知事实的真象的。"},{"type":"paragraph","text":"评论最后说，在“战斗报”的文章用攻击来回答各国共产党对南斯拉夫农业政策的批评时，特别暴露出文章作者的敌意。当苏联的农业以惊人的速度赶上和超过美国的农业生产水平的时候，作者竟敢谈论所谓苏联集体化政策的“崩溃”，并吹嘘南斯拉夫的合作社。但是，众所周知，在南斯拉夫这种合作社中，私人经营的成分要比社会主义成分大得多。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dc86c2b8bc"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
