script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"霍查谴责美帝国主义强盗政策  揭穿南斯拉夫修正主义者为美帝国主义帮凶的无耻行为","authors":[],"dates":[{"year":1960,"month":6,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"霍查谴责美帝国主义强盗政策"},{"type":"paragraph","text":"揭穿南斯拉夫修正主义者为美帝国主义帮凶的无耻行为"},{"type":"paragraph","text":"新华社地拉那1日电　阿尔巴尼亚“人民之声报”和“团结报”今天都刊载了阿尔巴尼亚劳动党中央第一书记霍查最近视察佩什科比区的消息和他在访问“党的道路”农业合作社时的讲话摘要。"},{"type":"paragraph","text":"霍查在讲话中谴责美帝国主义的强盗政策，特别是它派遣间谍飞机侵犯苏联领空的行径。他接着指出，美帝国主义无耻地破坏了四国首脑会议。"},{"type":"paragraph","text":"霍查强调指出，南斯拉夫修正主义者的主张无耻地竭力缩小美帝国主义这种受到整个进步人类谴责的强盗行为的严重性，同时竭力把首脑会议开不成的责任推到苏联身上。"},{"type":"paragraph","text":"霍查在同合作社社员们谈话时还谈到苏联和所有其他社会主义国家在经济方面获得的成就，以及以苏联为首的伟大的社会主义阵营的团结和坚强的力量。他还谈到农业合作化等问题。他说，到将在今年11月召开的第四次党代表大会时，阿尔巴尼亚将完成农业合作化。"},{"type":"paragraph","text":"他说，社会主义劳动竞赛能推动生产力。他还说，为了使我们的农业更快地前进，党在过去和现在采取了一系列的重要措施，如增加农业机器、扩大灌溉面积等。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7a89a823fa"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
