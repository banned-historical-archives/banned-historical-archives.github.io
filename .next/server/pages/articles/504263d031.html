script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"坚决听毛主席的话，集体化的道路我们走定了!","authors":["李顺达"],"dates":[{"year":1967,"month":4,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"山西省革命委员会委员、平顺县西沟大队大队长、全国劳动模范　李顺达"},{"type":"paragraph","text":"毛主席说:“谁是我们的敌人?谁是我们的朋友?这个问题是革命的首要问题。”党内头号走资本主义道路的当权派，是埋藏在毛主席身边的一颗定时雷，是中国人民的敌人，我们一定要把他打倒。"},{"type":"paragraph","text":"党内头号走资本主义道路的当权派，首先公开反对毛主席关于阶级和阶级斗争的英明论断。他主张向帝国主义乞求“和平”；在抗日战争胜利以后，他大力鼓吹“中国革命的主要斗争形式已变为和平的、议会的”；他还宣传什么“三和一少”的修正主义路线，大肆宣扬卖国主义谬论，心甘情愿地要去当美帝国主义的奴才。"},{"type":"paragraph","text":"我们广大贫下中农，对帝国主义在中国犯下的滔天罪行，无不咬牙切齿，恨之入骨。一九三九年日本鬼子到我们西沟扫荡，抢走了牛羊牲口、粮食钱财，不计其数。更残酷的是，活活地杀死了我们的阶级兄弟，我的四妹妹才八岁，就被敌人杀死了。伟大祖国的河山被敌人糟踏得不成个样子，这样的深仇大恨，我们怎能忘记呢?可是自吹为“老革命”的党内头号走资本主义道路的当权派，就偏偏睁着眼睛说瞎话，要我们和帝国主义讲“和平”，这简直是白日作梦!用毛泽东思想武装起来的中国人民是不好惹的。我们在伟大领袖毛主席的英明领导下组织起来，拿起武器，把日本帝国主义和它们的走狗国民党反动派打倒了。我们现在也一定能够把党内头号走资本主义道路当权派打倒，使帝国主义、现代修正主义和一切反动派妄想在中国复辟资本主义的企图，永远不能得逞。"},{"type":"paragraph","text":"党内头号走资本主义道路当权派大吹帝国主义的“帮助”，真是一只披着羊皮的恶狼。他表面讲什么“和平”呀!“议会”呀!实际上是向帝国主义投降，出卖祖国，出卖人民。他是地地道道的帝国主义的奴才，是中国人民的大敌。大敌当前，我们一定要把他打倒，使他永世不得翻身!"},{"type":"paragraph","text":"党内头号走资本主义道路的当权派不仅在对待帝国主义的问题上，贩卖修正主义，公开对抗毛主席，而且在社会主义革命和社会主义建设中，同样反对毛主席和毛泽东思想。我们西沟的广大贫下中农，在一九四三年就积极响应毛主席“组织起来”的伟大号召，第一个组织了互助组。以后又成立了农林牧生产合作社和人民公社，在集体化的道路上，步步向前，使旧社会的穷西沟变成了“山上绿油油，牛羊满山沟，五缺变五有，年年大丰收”的社会主义新山村。这都是战无不胜的毛泽东思想的伟大胜利。但是，党内头号走资本主义道路当权派，对这些却恨得要命，怕得要死，公开对抗毛主席的指示，大力提倡“四大自由”“三自一包”，鼓吹发展富农经济。那些钻进党内的一小撮走资本主义道路的当权派，秉承他这个党内头号走资本主义道路当权派的旨意，起劲地反对我们西沟的贫下中农，说我们的坏话，千方百计地打击我们，说我们合作社办“糟”了，土地“荒”了，妄图把我们的合作社砍掉，以达到复辟资本主义的目的。"},{"type":"paragraph","text":"毛主席的话字字句句说在我们贫下中农的心坎里。毛主席的话，我们坚决听，集体化的道路我们走定了!用毛泽东思想武装起来的西沟人民，战胜了种种困难，粉碎了阶级敌人的阴谋诡计，在毛主席指引的大道上胜利地前进了。"},{"type":"paragraph","text":"党内头号走资本主义道路当权派，就是中国的赫鲁晓夫。我们一定彻底清算党内头号走资本主义道路当权派反党、反社会主义、反毛泽东思想的罪行，一定要把他拉下马，让他靠边站，把他斗倒、斗垮、斗臭!"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"504263d031"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
