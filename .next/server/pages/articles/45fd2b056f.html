script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"美帝阴谋吞并台湾  旅平台胞愤怒抗议  纷纷表示台湾人民决不当奴隶","authors":[],"dates":[{"year":1949,"month":3,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"美帝阴谋吞并台湾"},{"type":"paragraph","text":"旅平台胞愤怒抗议"},{"type":"paragraph","text":"纷纷表示台湾人民决不当奴隶"},{"type":"paragraph","text":"【新华社华北二十日电】美国帝国主义阴谋吞并我台湾的消息传到北平后，激起了旅平台胞的愤怒。台胞旅平同乡会常务理事詹以昌说：“美帝国主义对台湾的侵略及卖国贼蒋介石的出卖台湾，不是从今天才开始的，现在则阴谋更形露骨。但是台湾人民绝对不愿也不会再当帝国主义的奴隶。台湾人民不能容忍美国帝国主义者及其走狗们侵略与奴役台湾人民的所谓‘独立’的阴谋，更不会接受什么托管。‘二·二八’起义便是一个有力的证明，今后我们要在中国共产党领导下将革命进行到底。台湾不解放，中国革命的事业不能算完成。”他又指出台奸廖文毅、廖文奎兄弟几个人所组织的伪“民众同盟”，决不能代表六百万台胞。他说：这些败类一定要清除。旅平台胞杨君也愤愤地说：“美国帝国主义和卖国奴才们的活动，一定要被全国人民的力量所粉碎。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"45fd2b056f"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
