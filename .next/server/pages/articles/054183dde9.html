script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"武训的剥削农民行为","authors":["卢钧"],"dates":[{"year":1951,"month":6,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"卢钧"},{"type":"paragraph","text":"武训的“兴学”是依靠了高利放贷，剥削地租而成功的，据山东通志载:“武训得钱辄寄诸富家，岁以三分计息，铢积寸累，遂至钜万。”他自己亦承认“存本钱，生利钱，兴义学，没心烦”，他的利息甚至“一年母子相等”，把钱积多了就买田地，仅在柳林镇一处，武训竟占有二百三十亩地，每年收租达三百六十八吊，压迫穷人，吮吸着农民的脂膏，来创办了他的所谓义学。"},{"type":"paragraph","text":"在另一面，他更表现出流氓的勒索行为，在其四十岁时，他以办义学为名，出入村中各家，见到人家有到达结婚年龄的男女，便对他们的父母说:“我给少爷提个媒吧!”或说:“我给小姐提门亲事吧!”他到男女两家来回一说，婚姻便告成了，在每一件亲事说成后，男女两家要各给铜钱一串或数串，到结婚时还要谢媒人，他可前去大嚼一顿，或是拿些馍馍带回来卖钱，他这样依靠替人说媒，从中剥削，作为其收入的一宗，而他却以此得意得很，唱道:"},{"type":"paragraph","text":"“义学正，做媒红，这椿亲事容易成。”"},{"type":"paragraph","text":"在他五十多岁的时候，几乎包办了那一方的男女婚事(见张默生著“武训传”)，欺压农民，把包办婚姻作为他剥削勒索的手段，简直成为当地的一个地痞了。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"054183dde9"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
