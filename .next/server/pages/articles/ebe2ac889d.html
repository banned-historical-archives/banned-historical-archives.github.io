script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"坚持走独立自主、自力更生的道路“郑州”轮干部和群众联系自己管好、开好我国第一艘二万五千吨货轮的事例，热情歌颂文化大革命，狠批崇洋迷外的右倾复辟思潮","authors":[],"dates":[{"year":1974,"month":4,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　在深入批判林彪、孔老二“克己复礼”反动纲领的过程中，上海海运局“郑州”轮的干部和群众，联系自己管好、开好我国第一艘二万五千吨货轮的事例，热情歌颂毛主席的独立自主、自力更生方针的伟大胜利，狠批崇洋迷外的右倾复辟思潮。"},{"type":"paragraph","text":"“郑州”轮是上海沪东造船厂工人在无产阶级文化大革命中，狠批了刘少奇一伙的“造船不如买船，买船不如租船”的修正主义谬论，克服重重困难，用国产钢材，自行设计、制造的我国第一艘二万五千吨货轮。它是大打造船工业翻身仗的产物，是无产阶级文化大革命的胜利成果。“郑州”轮的干部和群众在接受这艘新船时就提出:“熟悉‘二万五’，掌握‘二万五’，开好‘二万五’，管好‘二万五’”的战斗口号，对船上某些设备存在的质量问题，他们进一步树立主人翁的思想，自己动手，积极改进，使“郑州”轮自去年六月份以来，一直坚持正常航行，已往返上海至秦皇岛港十五个航次，安全航行二万零六百多海里，运煤近三十万吨，成为本市海运战线上的一条运煤的主力船。船上电工班的同志联系他们想方设法管好和不断完善旋转电吊的事例，批判林彪的“克己复礼”，他们说:“旋转电吊是现代化的船用起货设备，也是我国造船工人赶超世界先进水平的试制产品。我们在有关单位支持下，经过两个多月的反复试验，不断改进电器线路装置，使起货机保持了良好的运转状态。”电工班的同志学习了上海港杨树浦装卸站先进经验后，主动配合港区，使卸货的速度由原先的十多天缩短为四天。他们说，林彪攻击社会主义新生事物的罪恶目的就是妄图搞复辟倒退。我们坚持前进，反对倒退，就要热情支持造船工人采用的新技术、新设备，把造船工业落后的帽子抛到太平洋去。轮机部的船员在批判时，举了这样的一个例子:有一次，在海上航行时，主机发生了故障，需要调换汽缸头。他们自己动手，连续奋战十多小时，把一只五吨重的汽缸头装上了主机，为加快海上运输赢得了时间。同志们说:“我们要当社会主义新生事物的促进派，在实践中促使新生事物不断完善，我们一定要甩掉‘洋拐棍’，驾驶着‘郑州’轮，乘风破浪，不断前进。”甲板部的水手，为了缩短船舶周转期，密切配合装卸工人提高卸货速度，承担了六只四吨重的卸煤漏斗保养工作。有时海上遇到八级到十级大风，他们不顾个人安危，不怕狂风恶浪，在甲板上绑扎漏斗。他们说:“我们就是要以支持社会主义新生事物的实际行动来迎头痛击林彪攻击新生事物，污蔑我国‘国民经济停滞不前’的反动谬论，多、快、好、省地发展我国海运事业。”"},{"type":"paragraph","text":"在深入批判林彪、孔老二“克己复礼”的过程中，这艘船的干部和群众围绕着如何对待社会主义新生事物的态度问题，认真学习了列宁关于“应当缜密地研究新的幼芽，极仔细地对待它们，尽力帮助它们成长，并‘照管’这些嫩弱的幼芽”的教导，狠批崇洋迷外的右倾复辟思潮。大家针对有些人抓住这艘船某些设备质量上的问题，百般歪曲，污蔑“郑州”轮是“水上旅馆”的错误论调，从路线斗争的高度进行批判。大家说，在对待“郑州”轮问题上，是肯定还是否定，是热情支持还是讽刺挖苦，这是坚持前进还是主张倒退的大是大非问题。他们说:只有经过无产阶级文化大革命，我国才能在这么短的时间内造出具有现代化设备的“争气船”，这也说明了只要我们坚持独立自主、自力更生的方针，就一定能够不断前进。　(本报通讯员)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"林彪","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"批林批孔","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ebe2ac889d"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
