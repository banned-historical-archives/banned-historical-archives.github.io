script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"著名的马克思主义史学家、原北大副校长  翦伯赞同志追悼会在京举行  邓小平等送了花圈，王震、方毅等参加追悼会","authors":[],"dates":[{"year":1979,"month":2,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"著名的马克思主义史学家、原北大副校长"},{"type":"paragraph","text":"翦伯赞同志追悼会在京举行"},{"type":"paragraph","text":"邓小平等送了花圈，王震、方毅等参加追悼会"},{"type":"paragraph","text":"新华社北京二月二十二日电   我国著名的马克思主义史学家、原北京大学副校长翦伯赞，由于遭受林彪、“四人帮”的迫害，于一九六八年十二月十八日不幸逝世，终年七十岁。翦伯赞同志追悼会今天下午在北京八宝山革命公墓礼堂举行。"},{"type":"paragraph","text":"邓小平、王震、乌兰夫、方毅、吴德、胡耀邦、许德珩、沈雁冰、史良、朱蕴山、杨静仁送了花圈。送花圈的还有：人大常委会，政协全国委员会，中共中央组织部、宣传部、统战部，中央党校，国家民族事务委员会，文化部，教育部，国家文物事业管理局，北京大学，清华大学，中国人民大学，北京师范大学，中央民族学院，北京师范学院，内蒙古大学，中共桃源县委员会、桃源县革委会等。"},{"type":"paragraph","text":"王震、方毅参加了追悼会。"},{"type":"paragraph","text":"参加追悼会的，还有各有关方面负责人、首都教育界、史学界的知名人士、翦伯赞同志的生前友好胡乔木、黄镇、王冶秋、高沂、陆平、连贯、金城、包尔汉、刘春、于光远、周扬、夏衍、胡绳、刘仰峤、孙起孟、孙晓村、白寿彝、严信民、李普、杨西光、毛联珏、刘导生、周林、刘达、刘季平、萨空了、侯外庐、黎澍、夏鼐、翁独健、宗群、千家驹、雷洁琼、谢鹤筹、裴文中、胡华、贾兰坡、王力、朱光潜、陈岱荪等，以及翦伯赞同志的子女和北大师生员工近五百人。"},{"type":"paragraph","text":"政协全国委员会副主席杨静仁主持追悼会，北京大学校长周培源致悼词。"},{"type":"paragraph","text":"悼词说，翦伯赞同志是湖南省桃源县人，一八九八年生，维吾尔族，一九三七年五月加入中国共产党。早在一九二六年，翦伯赞同志就投身北伐战争。大革命失败后，翦伯赞同志开始运用马列主义研究中国社会的性质和中国历史。九·一八事变后，特别在抗日战争爆发后，翦伯赞同志写了大量著作，宣传党的坚持抗战、团结和进步的方针，揭露批判国民党反动派的投降阴谋和分裂倒退活动。一九四○年起，翦伯赞同志长期在周恩来同志的直接领导下，在重庆从事统一战线和理论宣传工作，以极大的努力完成了《中国史纲》第一、二卷和《中国史论集》等上百万字的重要著作。解放战争时期，翦伯赞同志按照周恩来同志的部署，在党的领导下，在南京、上海和香港继续从事统战和宣传工作，热情支持各地蓬勃发展的爱国民主运动和青年学生运动。"},{"type":"paragraph","text":"中华人民共和国成立以后，翦伯赞同志在统一战线、民族团结、理论宣传和教育事业方面进行了大量的工作。他历任第一届全国政协委员，第一、二、三届全国人民代表大会代表，中央民族事务委员会委员，中国科学院哲学社会科学部学部委员。他协同郭沫若、范文澜等同志筹建了中国史学会，团结历史学家开展史学研究和史料编纂工作，取得了重大成绩。"},{"type":"paragraph","text":"悼词说，翦伯赞同志是我国运用历史唯物主义科学地研究中国历史的老一代史学家之一，为在我国建立马克思主义历史科学作出了巨大的努力。他的大量著作，是他一生献身于革命、献身于马克思主义历史科学的珍贵成果。"},{"type":"paragraph","text":"悼词说，正因为翦伯赞同志坚持马列主义、坚持党的政策，这就引起了林彪、陈伯达、“四人帮”，以及戚本禹之流对他的仇视。他们采取造谣诬蔑、歪曲捏造、恶意中伤等卑劣手段，攻击陷害翦伯赞同志，对身患重病的翦伯赞同志进行疯狂的打击迫害，致使翦伯赞同志及其夫人戴叔宛同志于一九六八年十二月十八日不幸去世。"},{"type":"paragraph","text":"悼词说，翦伯赞同志遭受诬陷迫害，是林彪、陈伯达、“四人帮”制造的重大冤案之一，必须予以昭雪；他们强加给翦伯赞同志的一切罪名和诬陷不实之词应予推倒，翦伯赞同志的名誉必须予以恢复。翦伯赞同志的夫人戴叔宛同志的名誉也应予以恢复。"},{"type":"paragraph","text":"悼词最后说，我们要学习翦伯赞同志的革命精神，更加紧密地团结在华国锋同志为首的党中央周围，为培养造就无产阶级的史学队伍，为提高整个中华民族的科学文化水平，为实现新时期的总任务而斗争。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"陈伯达","type":"人物"},{"name":"邓小平","type":"人物"},{"name":"林彪","type":"人物"},{"name":"王震","type":"人物"},{"name":"四人帮","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7006b3d227"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
