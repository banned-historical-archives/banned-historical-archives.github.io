script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"河北省委召集有关人员开会总结留村公社强令毁瓜的教训  必须认真批判极左路线落实党的政策","authors":[],"dates":[{"year":1979,"month":8,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"河北省委召集有关人员开会总结留村公社强令毁瓜的教训"},{"type":"paragraph","text":"必须认真批判极左路线落实党的政策"},{"type":"paragraph","text":"新华社石家庄八月二十九日电  正定县留村公社党委书记强令南庄大队毁瓜的消息发表后，引起中共河北省委的重视。最近，中共河北省委书记、省革委会副主任王金山在听取这一事件的汇报时说，全省各级农村干部都要从中吸取教训，进一步肃清林彪、“四人帮”极左路线的流毒，认真落实党的十一届三中全会精神和中央关于发展农业两个文件规定的各项方针政策，夺取全年农业丰收。"},{"type":"paragraph","text":"南庄毁瓜事件在报上发表后，王金山代表省委召集正定县委、石家庄地委和省农办负责人开会，听取他们的汇报和处理意见。与会人员在汇报中指出：毁瓜事件发生在中央关于发展农业的两个文件下达半年后的今天，给我们大家敲了一次警钟。类似留村公社党委强令毁瓜的事件，在河北省其它一些地方也形式不同地发生过。这就告诉我们，必须认真批判林彪、“四人帮”的极左路线，肃清其流毒，才能更好地贯彻落实三中全会精神，加快发展农业的步伐。"},{"type":"paragraph","text":"王金山在听取汇报后说，留村公社党委书记强令毁瓜事件的发生，反映了我们做领导工作的差距。这件事使我们看到，肃清林彪、“四人帮”极左路线的流毒，是不容易的。要落实好中央关于发展农业的两个文件，靠宣读几遍是不够的。当前，来自“左”的方面的干扰，仍然是阻碍落实中央关于发展农业文件的主要矛盾。他还说，过去在林彪、“四人帮”极左路线影响下，我们只注意抓了粮食，忽视了全面发展，堵了增加集体收入的路子，造成许多“高产穷队”。穷，逼得南庄大队为种瓜增收而抗争。我们的指导思想，也导致留村公社党委书记强令毁瓜。"},{"type":"paragraph","text":"王金山完全赞成报纸上揭露留村公社党委书记强令毁瓜的错误。他说，这是必要的，对河北省的工作是个促进。毁瓜事件发生以后，石家庄地委、正定县委及时派出主要干部帮助留村公社党委书记提高认识，认真检查，总结教训。公社党委主要负责同志也亲自到南庄大队，向干部、社员作检讨，并表示要补偿毁瓜造成的经济损失，帮助南庄大队搞好秋田管理，发展多种经营。目前干部、社员的生产情绪很高，决心夺取今年农业丰收。这说明以上作法已经取得了效果。"},{"type":"paragraph","text":"王金山强调指出，留村公社的毁瓜事件还说明了我们一些干部党风不正。我们要在全省范围内对干部进行党纪党风教育以及民主和法制的教育，发扬党的实事求是，理论联系实际，批评与自我批评的优良作风，克服官僚主义、瞎指挥、脱离群众的歪风，调动全省广大农民群众的积极性，迅速把全省的农业搞上去。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"林彪","type":"人物"},{"name":"四人帮","type":"人物"},{"name":"河北文革","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"31f57bfc7d"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
