script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"市城建局养护处排水管理所举办头头学习班认真总结经验用毛泽东思想分析前阶段工作 坚持对的改正错的推动斗批改","authors":["洪汶湃"],"dates":[{"year":1969,"month":4,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　上海市城建局养护处排水管理所革委会，把落实毛主席“要认真总结经验”最新指示的过程，当作斗私批修、改造世界观的过程，大大提高了两条路线斗争觉悟，也推动了全所群众性总结经验的深入开展。"},{"type":"paragraph","text":"这个所是一个担负全市防汛排水和污水处理的基层单位。曾经是全局有名的“老大难”单位。直至去年九月，才摘掉了“老大难”的帽子。"},{"type":"paragraph","text":"毛主席关于“要认真总结经验”的最新指示发表后，所革委会的一些同志就产生了“怕”的情绪。认为“要了解运动的全过程”，势必要涉及过去的问题，弄不好资产阶级派性再抬头。结合的老干部怕“弄僵了再‘救火’”，新干部怕“翻老账、纠缠不清，会吃轧头”。"},{"type":"paragraph","text":"在上级革委会的帮助下，这个所办起了头头学习班。通过学习，他们认识到:总结经验决不是就事论事、消极地争辩谁对谁错，而是用毛泽东思想来分析过去的工作，提高大家两条路线斗争的觉悟，改造世界观，进一步树立对伟大领袖毛主席的深厚无产阶级感情，加速斗、批、改的步伐。他们说，用毛泽东思想进行总结，资产阶级派性不会抬头，而且通过总结可以挖掉产生资产阶级派性的根子。"},{"type":"paragraph","text":"认识统一了，“怕”字打消了，新老干部以毛泽东思想为基础，共同回顾了运动的全过程，对做对了的加以肯定、发扬；对做错了的，自觉地斗私批修，认真地进行自我批评。例如，在回顾原来两派联合的全过程时，一个原“联指”的常委首先检查说:以前受了阶级敌人的挑动，总想吃掉对方，致使两派长期联合不起来，这是我们头脑里的“私”字在作怪。原“大队”的队委听了以后，马上接着说:几次联合造成反复，我们也不对。当时我们思想上也想吃掉你们，只是我们一派人少，力不从心。原两派头头赤诚相见，各自作了自我批评，解开了过去由于“私”字作怪而结成的疙瘩，使大家真正了解了全过程的真实面貌，也使阶级敌人的阴谋伎俩暴露无遗。通过学习，两派进一步加强了团结。"},{"type":"paragraph","text":"由于头头自觉地斗私批修，主动作了自我批评，在回顾全过程中，总结出了许多规律性的东西。例如，他们根据阶级斗争的实践，总结出“那里有权，阶级敌人就往那里钻”，阶级敌人钻进来后，不是以极“左”的面貌出现，骗取信任，就是接过革命口号，把水搅浑，趁机来一个“浑水摸‘权’”。总结出这些经验，今后就可以及时识破阶级敌人的阴谋。"},{"type":"paragraph","text":"现在，这个所的革委会团结一致，领导群众进一步掀起总结经验的新高潮。　(洪汶湃)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"派性","type":"主题/事件"},{"name":"两条路线斗争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"32fbf41e96"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
