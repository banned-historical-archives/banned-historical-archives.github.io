script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"西藏一批翻身女农奴女奴隶当选县长  在革命斗争生产斗争中她们的阶级觉悟工作能力不断提高","authors":[],"dates":[{"year":1965,"month":8,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"西藏一批翻身女农奴女奴隶当选县长"},{"type":"paragraph","text":"在革命斗争生产斗争中她们的阶级觉悟工作能力不断提高"},{"type":"paragraph","text":"新华社拉萨二十六日电  在旧社会最受压迫、最受歧视的西藏女农奴、女奴隶当中，最近有十一人当选为正、副县长。"},{"type":"paragraph","text":"这批女县长年龄大的三十二岁，年轻的二十四岁，平均年龄二十六岁。她们过去都有一段苦难的经历。许多人从小就成了农奴主的“会说话的牲畜”，整天当差服苦役，有些人的父亲被农奴主逼死，母亲受到侮辱。在西藏的革命斗争中，她们阶级立场坚定，斗争坚决。在党的教育、培养下，她们在西藏激烈的阶级斗争中以及在生产斗争中受到了锻炼和考验，阶级觉悟和工作能力不断提高，并且都参加了中国共产党。其中不少人还被送到中央民族学院或其他学校学习过。她们在当选县长以前，都在乡、区里担任过工作，具有比较丰富的实际工作经验。"},{"type":"paragraph","text":"这批藏族女干部在当选为县长前的多年工作中，表现都很出色。她们总是和群众同甘苦，共患难。奴隶出身的隆子县副县长扎西央宗在担任新古区区长时，遇到山洪暴发，麦萨乡的大片庄稼受到洪水威胁。她立即带领这个乡的翻身农奴，跳进汹涌的急流里筑坝。经过一夜的苦战，终于堵住了洪水，保住了一百多克（一克相当一亩）庄稼，群众称赞她是党的好干部。农奴出身的江达县县长三朗哈姆，在担任中共昌都县拉多区委副书记期间，常常住在贫苦牧民的帐篷里，和牧民们一起劳动。为了克服冬季饲料不足的困难，她带领牧民们开了一千八百多克地，种植饲料和牧草。在牧区发生雪灾的时候，她又不避艰苦，领导牧民抗灾保畜。"},{"type":"paragraph","text":"在旧社会，西藏女农奴、女奴隶的社会地位，比男农奴、男奴隶更低。她们不但没有任何政治权利，还受到种种的束缚。民主改革后，她们和翻身男农奴、男奴隶一起当家作了主人。她们中间有许多人当了干部。现在西藏全区有藏族女区委书记五十人，女区长一百五十六人，还有成千的藏族妇女担任其他工作。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"西藏文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4a55cd28b6"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
