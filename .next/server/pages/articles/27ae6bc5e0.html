script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反对残酷剥削　要求充分就业意大利一百五十万建筑工人大罢工数百个建筑工地陷于瘫痪给垄断资本以很大打击","authors":[],"dates":[{"year":1971,"month":1,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京二十七日电　罗马消息:意大利全国一百五十万建筑工人二十六日举行大罢工和大示威，反对垄断资本的残酷剥削，要求充分就业、改革不合理的工资制度、减少税收和改善医疗条件。"},{"type":"paragraph","text":"这一天，意大利中部和南部的许多省的四万名建筑工人在那不勒斯市举行声势浩大的群众集会和示威游行。在米兰、波伦亚、佛罗伦萨、热那亚和其他一些城市，数千名罢工工人也举行了集会和示威游行。"},{"type":"paragraph","text":"建筑工人的罢工使数百个建筑工地陷于瘫痪，给垄断资本以很大打击。"},{"type":"paragraph","text":"同一天下午，米兰的建筑工人同其他行业的工人和学生共一万五千人举行大规模反法西斯示威游行，抗议法西斯匪徒几天前捣毁工会办事处的暴行。示威者举着写有“不要法西斯主义”、“工人阶级团结起来反对法西斯主义”的标语牌和横幅，高呼反法西斯口号，要求取缔新法西斯党“意大利社会运动”。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"27ae6bc5e0"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
