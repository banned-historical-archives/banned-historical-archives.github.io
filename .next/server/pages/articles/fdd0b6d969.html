script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"日本人民赞王杰学王杰  广大读者热烈欢迎《王杰日记》在东京翻译出版  表示要学习王杰革命精神同美帝和修正主义斗争","authors":[],"dates":[{"year":1966,"month":5,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"日本人民赞王杰学王杰"},{"type":"paragraph","text":"广大读者热烈欢迎《王杰日记》在东京翻译出版"},{"type":"paragraph","text":"表示要学习王杰革命精神同美帝和修正主义斗争"},{"type":"paragraph","text":"新华社东京三日电  日本广大读者热烈欢迎在日本先后出版的两种《王杰日记》的译本，他们热情地赞扬王杰同志的革命精神。"},{"type":"paragraph","text":"东京的青年出版社在今年三月首先翻译出版了《王杰日记》的日文译本；四月底，日本河出书店出版了另一种译本。这两种译本还刊载了中国国家领导人纪念王杰同志的题词、《人民日报》和《解放军报》的有关社论以及王杰同志的父亲和同学等写的回忆录的译文。"},{"type":"paragraph","text":"河出书店出版的《王杰日记》的译者岩佐氏健在译后记中写道：“一个新中国青年牺牲了自己一个人而拯救了十二个人的生命。人们从他的日记中看到，他把青春献给革命，他战斗的每一天都同毛泽东思想联系着。”"},{"type":"paragraph","text":"译者还说，反共国家期望中国在第二代、第三代出现现代修正主义，但是正象《王杰日记》所表明的那样，只要毛泽东思想永远占据不可动摇的地位，那种事情是绝对不会发生的。"},{"type":"paragraph","text":"日本青年出版社出版的《王杰日记》的译者伊藤敬一说，我们和王杰虽然是在不同的地方、用不同方式进行着斗争，但我们的敌人是共同的，那就是美帝国主义、各国反动派和现代修正主义。王杰的心和我们的心紧密地联结在一起，非常亲近。我们虽然感到我们不如王杰，但是应当怀着深深的敬意向他学习。"},{"type":"paragraph","text":"读者佐藤光良在二日出版的《读书之友》报上谈到他读过这本书的心得时说，《王杰日记》所以能越过国界，紧紧抓住象我这样的一个日本青年的心，是因为王杰的死表现了他对祖国、对人民和对党的无限信任以及自我牺牲精神，是因为王杰把学习和实践结合一起，严格地进行自我改造，是因为王杰表现了对美帝国主义、各国反动派以及现代修正主义的强烈憎恨和火一般的无产阶级国际主义精神。"},{"type":"paragraph","text":"日本和平委员会会长平野义太郎曾经向读者推荐这本书，他说，《王杰日记》是精神粮食，值得好好学习。（附图片）"},{"type":"paragraph","text":"上图为日本出版的《王杰日记》的封面"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fdd0b6d969"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
