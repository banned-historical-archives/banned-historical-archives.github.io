script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"坚持四项基本原则反对资产阶级自由化  上海高校加强学生党员正面教育  举办读书班培训班业余党校等收到成效","authors":["刘军"],"dates":[{"year":1987,"month":5,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"坚持四项基本原则反对资产阶级自由化"},{"type":"paragraph","text":"上海高校加强学生党员正面教育"},{"type":"paragraph","text":"举办读书班培训班业余党校等收到成效"},{"type":"paragraph","text":"新华社上海5月3日电  （记者刘军）上海交通大学、复旦大学、同济大学等高等院校，新学期开始后纷纷举办读书班、培训班、业余党校以及各种理论讨论会，对学生中的共产党员进行坚持四项基本原则、反对资产阶级自由化的正面教育。"},{"type":"paragraph","text":"上海各高等院校的学生中共有8800多名共产党员。他们年轻有朝气，关心国家大事，但是没有经过党内严格的政治生活的训练，对党的一些基本知识和马列主义基本理论缺乏了解。今年新学期开学后，各高等学校根据这一情况，采取措施加强了对他们的马列主义基础理论教育和党性教育，并且特别注意抓好党员骨干队伍的建设。上海交通大学现有学生党员1018名，77个学生党支部。校党委专门举办了党员骨干读书班，组织支部委员以上的党员干部认真学习有关文件，帮助大家深刻领会四项基本原则是立党立国之本。复旦大学举办了为期一个月的业余党校，一些学生党员中的活跃分子经过学习以后，进一步认识到了坚持四项基本原则在当今中国的重要性和加强自身党性修养的紧迫性。校党委书记林克说，经过前一阶段的学习，一些学生党员开始认真检视自己的弱点，他们觉得自己马列主义根底浅，理论上“缺氧”，看问题片面，过于急躁、自负。对自己有了新的认识，学习马列主义理论的要求就比过去迫切了。"},{"type":"paragraph","text":"新时期共产党员如何发挥先锋模范作用？上海市高教局和上海市学生联合会组织各高校研究生党员围绕这一专题重温党章，联系实际，认真思索，寻找答案。最近，在上海市研究生思想工作研讨会上，大家在真诚、坦率、民主的气氛中，通过热烈讨论对新时期共产党员究竟应该具备怎样的形象有了一致的看法。他们认为，新时期的党员应该是：坚持四项基本原则；做共产主义理想的献身人；全心全意为人民服务的贴心人；实事求是、勇于创新的中坚人；严以律己、遵纪守法的带头人。"},{"type":"paragraph","text":"一些高等院校注意采取措施提高学生新党员的政治素质。"},{"type":"paragraph","text":"同济大学利用业余党校着重对189名预备党员系统讲解党的基础知识，帮助新党员增强党性党纪观念。为期三个月的业余党校结束时，考核合格者发给结业证书，成绩及评语作为转正时的一种依据。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5b1eb33a05"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
