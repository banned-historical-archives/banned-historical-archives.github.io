script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"邓小平在中央局委员会上的报告要点（节录）","authors":["邓小平"],"dates":[{"year":1951,"month":6,"day":11}],"is_range_date":false,"parts":[{"text":"邓小平在中央局委员会上的报告要点（节录）","type":"title"},{"text":"邓小平","type":"authors"},{"text":"抗美援朝不是一个临时的或附带的工作，而是一个政治上和思想上具有革命根本性质的任务，必须坚持努力，继续贯彻和深入下去，防止‘差不多了’的倾向。…捐献飞机，坦克，大炮的运动必须以大力推行。西南应以捐献3千亿为目的（每人5斤到8斤米），这样一个大数目没有深入的爱国主义的教育是办不到的。…","type":"paragraph"},{"text":"在土改完成了的地区，必须注意是地主阶级特别是处了死刑的反革命分子的家属安定下来。专门召集他们开会，训示他们不要造反，不要胡作非为。同时认真监督和帮助他们劳动改造，给以生活出路。…","type":"paragraph"},{"text":"由于农村土改引起了经济情况的巨大变化，提出了一系列的新问题，要求我们去逐步地解决。现在的情况是：1。农民获得减租退押果实超过70亿斤米，大约还有百分之六十至七十还在农民手中。，急需找寻出路，现在多买存粮食，引起了市场粮食的恐慌。2。产品普遍不够市场的需要。3。城市的产品多不合农民的需要，农民要的市场又没有。4。私营工商业大部分还未得到改造，公私关系在有些地区还为妥善解决。故私资营积性还未充分发挥出来。5。国营经济发展的比重不如私营经济发展的快。6。土改后地主还有不小力量投入到经济事业中来。7。有一部分工商业转到农民手中，如不好好组织，有不破坏的危险。8。农业经济由集中到分散，百分之六七十的新分得田地的贫雇农的生产资料极端缺乏，如不注意扶持，不但增产困难，且有减产危险。9。我们现在的经济机构和力量远远落后于经济形势的发展，如不注意有控制不住的危险。","type":"paragraph"},{"text":"在完成了土改的地区，应把建立合作社成为领导经济工作的中心任务之一。为了连接城乡，进一步地改善农民的经济地位，为了增强社会主义经济成分的领导地位，减少私营商业对于农民的中间剥削，同时也为了吸收农民的果实，使之用于有利的方向，引导农民走向集体主义，合作社就是解决这些问题的最重要的环节。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"07d8a1656e"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
