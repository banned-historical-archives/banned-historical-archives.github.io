script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"资产阶级阴谋狠毒武汉奸商纵火谋财","authors":[],"dates":[{"year":1952,"month":3,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　据新华社汉口廿三日电:武汉市私营武汉锯木厂工人和兴华码头火灾区居民八百多人集会控诉纵火诈骗国家财产以致造成火灾的罪犯、奸商周武彝和郭嵩山。最高人民法院中南分院接受群众的正义要求，当场将周、郭二犯逮捕。"},{"type":"paragraph","text":"这一纵火谋财案的主犯周武彝及其同谋郭嵩山是私营武汉锯木厂的正、副经理。他们隐匿敌伪资产，破坏治淮工程，先后盗窃国家财产达三十五亿元。去年七月间，周、郭两犯以其材料厂(在兴华码头河滩)值一亿多元的木材一部，向公私合营的中南银行骗取质押借款两亿元，同时又将这批木材向中国人民保险公司武汉分公司投保火险三亿元，然后贿赂中南银行职员笼献利将抵押木材大部盗走，换以不能用的废料和木边。在诸事齐备后，奸商周武彝就在八月十六日乘全厂工人休假时，指使其侄子周应新纵火烧去这批木材，酿成兴华码头棚户区的大火灾，共计烧毁该区十九家居民的全部房屋，烧死未满二周岁的小孩一名，使老幼五十六人无家可归。奸商们造成了火灾后，一面制造谣言说“火是棚户引起的”；一面迫令该厂会计接连三画夜赶造假账，虚报损失七亿多元，要求中国人民保险公司武汉分公司予以赔偿。奸商周武彝、郭嵩山二犯就这样危害了当地人民生命财产，骗取了国家二亿六千六百多万元的保险赔偿费。"},{"type":"paragraph","text":"这一阴谋纵火案的执行者周应新在五反运动中受到了人民政府的教育，提高了觉悟，因而将周武彝指使他放火的犯罪事实全部交代出来。这一阴谋纵火案的真相揭晓后，该厂全体工人和附近居民莫不愤努万分，他们在十三日举行了控诉会，会上，武汉锯木厂工人萧树宽、罗治林、张正兴和被灾居民王凤莲、胡桂英等都努不可遏地控诉了奸商周武彝和郭嵩山的滔天罪行。到会工人、居民们一致要求立即逮捕罪大恶极的奸商周武彝和郭嵩山。最高人民法院中南分院当即接受群众的正义要求，将放火凶犯周武彝、郭嵩山逮捕，将依法予以惩办。"}],"comments":[],"origin":"新华社,本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6e945b906c"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
