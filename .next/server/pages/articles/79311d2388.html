script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"额济纳旗领导干部自觉破除资产阶级法权思想  带头送子女到条件差的社队锻炼  在领导干部带动下，促进了知识青年上山下乡工作的开展","authors":[],"dates":[{"year":1975,"month":4,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"额济纳旗领导干部自觉破除资产阶级法权思想"},{"type":"paragraph","text":"带头送子女到条件差的社队锻炼"},{"type":"paragraph","text":"在领导干部带动下，促进了知识青年上山下乡工作的开展"},{"type":"paragraph","text":"新华社兰州一九七五年四月七日电　甘肃省额济纳旗领导干部在学习毛主席关于理论问题的重要指示时，发扬理论联系实际的革命学风，自觉地破除资产阶级法权思想，带头把自己的子女送到条件比较艰苦的地方去接受贫下中牧的再教育，有力地推动了全旗知识青年上山下乡工作的开展。"},{"type":"paragraph","text":"地处边疆草原的额济纳旗，是甘肃省知识青年上山下乡工作搞得比较好的一个旗。为了进一步做好这项工作，这个旗的各企业事业单位最近普遍和牧区社队挂钩。"},{"type":"paragraph","text":"旗委的领导成员和旗直属机关干部认真学习毛主席关于理论问题的重要指示和马克思、恩格斯、列宁关于无产阶级专政的部分论述，深入批判刘少奇、林彪一伙鼓吹的“读书做官”、“下乡镀金”和“变相劳改”等反动谬论，进一步认识到知识青年上山下乡是培养和造就千百万无产阶级革命事业接班人的大事，对限制资产阶级法权，逐步缩小三大差别具有深远意义。旗委和旗革命委员会机关主动与条件较差的社队挂钩，旗的领导干部带头把自己的子女送到那里去锻炼。旗委常委、旗革命委员会副主任斯迪，大女儿前年下乡到了条件较差的生产队，今年又有两个儿子高中毕业。他的大儿子自愿报名到艰苦的地方去锻炼自己，二儿子经过斯迪的帮助、教育，也到了条件比较艰苦的牧区去扎根。在旗委和有关部门的统一安排下，旗领导机关干部本届毕业的子女，应上山下乡的都愉快地到全旗条件较差的公社落了户。"},{"type":"paragraph","text":"在旗委和旗革委会领导成员的带动下，全旗本届毕业的知识青年三月初已全部下到牧区社队落户，受到了贫下中牧和社员群众的欢迎。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"甘肃文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"上山下乡","type":"主题/事件"},{"name":"限制资产阶级法权","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"79311d2388"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
