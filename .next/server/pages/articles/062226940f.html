script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"dfdd6b56-5f4e-42e1-af94-ae2ab38cc0b4","name":"毛泽东思想万岁（1913-1943卷）（1968年武汉版）","internal":true,"official":false,"type":"pdf","author":"1968年武汉","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives3/main/dfdd6b56-5f4e-42e1-af94-ae2ab38cc0b4.pdf"],"article":{"title":"“湖南自治运动”应该发起了","alias":"","parts":[{"type":"paragraph","text":"（原载长沙《大公报》，抄自王无为《湖南自治运动史》上，‘太东图书局发行，一九二〇年十二月二十日初版）“湖南自治运动”应该发起了"},{"type":"paragraph","text":"（一九二○年九月二十六日）"},{"type":"paragraph","text":"无什么事，有一种“理”而没有一种“运动”继起，这种“理”的目的，是不能实现出来的。湖南自治，固然要从“自治的以必要”，“现在是湖南谋自治的最好机会”，“湖南及湖南人确有自立自治的要素与能力”等理上，加以鼓吹推究，以引起尚未觉悟的湖南人的兴趣和勇气。但若不继之以实际的运动，湖南自治，仍旧只在上好看，或在口中好听，究不能实现出来。并且在理上，好多人从鲍受痛苦后的直咸中，业已明白了。故现在所缺少的，只在实际的运动，而现在最急须的便也只在这实际的运动。"},{"type":"paragraph","text":"我觉得实际的运动有两种：-种是入于其中而为具体建设的运动，--种是立于外而为促进的运动。两者均属重要。两者均属重要，而后者在现在及将来尤为必须，差不多可设湖南自治的成不成好不好，都系在这种运动的身上。"},{"type":"paragraph","text":"我又觉得湖南的运动应由“民”来发起的。假如这-一回湖南自治，翼个办成了，而成的原因，不在于“民”，乃在于“民”以外，我敢断言这种自治，是不能长久的。虽则具了外形，其亡等是打开看不得的，打开看时，一定是腐败的，虚伪的，空的，或者是干的。"},{"type":"paragraph","text":"“润南自治运动”，在此时一定要发起了。我们不必去做具体的建设运动，却不可不做促的运动。我们不必因为人数少便不做，人数尽管少，只要有冥诚，效力总是有的。什么事情，都不是一起便可以成功，一起便可以得到多数的同情与帮助，都是从近及远，从少到多，从小至大的。颇有人湖南民智未开，交通不便，自治难于办好的话，我看大家不要信这种龄。"},{"type":"paragraph","text":"（同上）湖南受中国之累以历史及现状证明之"},{"type":"paragraph","text":"（一九二〇年九月十二日）"},{"type":"paragraph","text":"自有中国，就有湖南。湖南在古为蛮地，在周为楚口，在汉为长沙口，唐为节度夏地，朱为荆湖南道！至元建为行省，阴清仍之，迄今不变。莽莽四千年，人类总是进化的，而湖南进化的地方在那里？春秋时，荆楚屈兴，凡欲和中原大国孝长较短。其时则上无中央政府，请国并立，各得遂其发展，虽迷于竟争侵略，用事洛野心英雄的君臣而无与于小百姓，然声光赫灌，得发展一中分之特性，较之奴隶于专制黑暗的总组织者，胜得多多。不过所谓荆楚，其中心不在湖南而在湖北，潇湘片土，对于江汉，犹是卑职之于上司。所以湖南在当时之中国，仍算不得什么。长沙国，以小弱见全，可怜的国，非自主自决的国。节度史地，荆湖南道，“一言蔽之，被治之奴隶耳。五代会为马殷割据，陋儒殊不足道。至于行省，乃皇帝"}],"authors":["毛泽东"],"dates":[{"year":1920,"month":9,"day":26}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":60,"page_end":60},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"062226940f"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
