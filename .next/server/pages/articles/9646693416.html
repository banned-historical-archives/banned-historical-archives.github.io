" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji19","name":"毛泽东全集第19卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji19.pdf"],"article":{"title":"和郭述申等的谈话","alias":"","parts":[{"type":"paragraph","text":"和郭述申等的谈话！]"},{"type":"paragraph","text":"（1945年1月1日）"},{"type":"paragraph","text":"同敌人斗争要有长远准备。过去只顾眼前，扩兵筹款，不久根据地也搞空了。河南的同志做得对，他们把扩大的军队留在地方，已扩大了一万多地方部队。去年各根据地生产搞得好，部队每人每日五钱盐、五钱油、一斤菜，比前几年好多了。不管敌人是早倒还是晚倒，我们都要作好准备，有备无患，才能立于不败之地。"},{"type":"paragraph","text":"[1]这是毛泽东和前来祝贺新年的郭述申等谈话的一部分。郭述申，1941年1月任新四军第二师政治部主任，同年秋赴延安入中共中央党校学"}],"authors":["毛泽东"],"dates":[{"year":1945,"month":1,"day":1}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":270,"page_end":270},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9646693416"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
