" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji20","name":"毛泽东全集第20卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji20.pdf"],"article":{"title":"争取年底到达五岭与王震部会合","alias":"","parts":[{"type":"paragraph","text":"争取年底到达五岭与王震部会合"},{"type":"paragraph","text":"（1945年7月22日）启龙、年生\"同志："},{"type":"paragraph","text":"（一）你们现达何处，在太岳、中条境内准备休息几天（应完全恢复疲劳），部队情绪如何，军民关系、官兵关系如何？"},{"type":"paragraph","text":"（二）渡汾战役虽有损失，但已胜利通过，此次经验对于以后行军作战将有帮助。"},{"type":"paragraph","text":"（三）已令王震首道率部南开，直达粤北。在湖南中部不可久留，在此等地方不可能建立稳固根据地，日寇失败后蒋介石一定要用全力驱走我们，故应直往湘南粤北，依五岭?建立永久根据地。你们目的地亦是湘南粤北，在不使部队过于疲劳条件下应注意酌量"},{"type":"paragraph","text":"[1]启龙、年生，即张启龙、文年生，当时分别任八路军游击第二支队政治委员和游击第三支队司令员。"},{"type":"paragraph","text":"[2]太岳，即太岳山，在山西省中部、汾河东岸，长200余公里。中条，即中条山，在山西省西南部，黄河和冻水河、沁河间，长约160公里，宽10至15公里。"},{"type":"paragraph","text":"[3]王震，当时任湖南人民抗日救国军司令员。首道，即王首道，当时任湖南人民抗日救国军政治委员。"},{"type":"paragraph","text":"[4]五岭，是位于湖南、江西、广东、广西4省边境的越城、都庞、萌缩短行军过程，争取在阳历年底到达五岭与二王\"会合。"},{"type":"paragraph","text":"（四）河南解放区新创，经济极端困难，你们到时应备价购买，不要当地供给。"},{"type":"paragraph","text":"（五）你们电台应与王震首道台经常联络。"},{"type":"paragraph","text":"毛泽东午养"}],"authors":["毛泽东"],"dates":[{"year":1945,"month":7,"day":22}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":177,"page_end":178},"tags":[{"name":"毛泽东","type":"人物"},{"name":"王震","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"073726f8fc"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
