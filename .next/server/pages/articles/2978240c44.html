script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"“放”和“鸣”——我们对“徐常太对孙大雨发言的意见”的看法","authors":["仲善堡","邵之晓"],"dates":[{"year":1957,"month":6,"day":8}],"is_range_date":false,"parts":[{"text":"“放”和“鸣”——我们对“徐常太对孙大雨发言的意见”的看法","type":"title"},{"text":"仲善堡邵之晓","type":"authors"},{"text":"我们坚决拥护中国共产党的整风运动，通过这次整风来更好解决人民内部矛盾，使我国能更好地、更快地建成社会主义社会，但是在我校刚开始动员全复旦人帮助党整风的时候，就产生了与贯彻“知无不言、言无不尽、言者无罪、闻者足戒”的精神相违反的情形。例如：党委徐常太同志对孙大雨先生的发言的意见就不能令人满意。请大家看看徐常太同志的意见：“……孙先生刚才的发言，和其他先生发言的精神完全相反。不是从帮助党整风，不是解决人民内部矛盾问题；………。市委，市政协研究过，希望孙先生收回自己的意见。如果不收回，希望市政协甚至市检察院来检查；如果最后不是如此，要根据法律办事。孙先生如果不愿意这样，要求孙先生更正态度。我们认为在这个问题上孙先生应该要向以上同志们道歉”。","type":"paragraph"},{"text":"我们认为他如此肯定孙先生的发言不是为了帮助党的整风，不是处理人民内部矛盾的问题，这种说法是太主观了。而且以“法律办事”的手段来对待发言者不是在恫吓吗？我们要请问徐常太同志：假如孙大雨先生的发言有某些是夸大或不符合事实的话，要受到怎样的“法律办事”呢？这与“言者无罪”的精神相符合吗？杨副校长向大家的保证又是算什么呢？以后大家还敢“鸣”和“放”吗？","type":"paragraph"},{"text":"徐同志这样作法不难使人想到是不是怕“鸣”和“放”呢？","type":"paragraph"},{"text":"为了广开言路，帮助党整风，我们认为必须扫除这些障碍。","type":"paragraph"},{"text":" 数三　仲善堡、邵之晓等8人（6月8日）","type":"paragraph"}],"comments":[],"origin":"共青团复旦大学委员会编：《右派思想言论专辑》第一期（校内刊物、仅供参考），1957年7月11日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"人民内部矛盾","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2978240c44"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
