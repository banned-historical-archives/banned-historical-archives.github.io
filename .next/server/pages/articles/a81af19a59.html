" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共中央关于解决四川问题的批示（概要）","authors":[],"dates":[{"year":1969,"month":12,"day":25}],"is_range_date":false,"parts":[{"text":"中共中央关于解决四川问题的批示（概要）","type":"title"},{"text":"１１月５日至１２月２７日，　中共中央在北京召开解决四川问题的会议。中央有关部门负责人、四川省革命委员会、成都军区党委负责人等参加了会议。由于“文化大革命”初期的动乱和省革命委员会成立以后的“反复旧”运动，四川省的工农业生产遭到了严重破坏。会议认为，四川的革命和生产落后了，落后的原因不在群众，而在省革委会领导。根据会议讨论情况，写出了四川省革委会、成都军区党委《关于解决四川当前若干问题的报告》和《关于加速四川地区三线建设的请示报告》。省革委会、成都军区党委在报告中对省革委会成立以来工作中出现的失误集体承担了责任，同时也严肃的揭发了省革委会副主任刘结挺、张西挺的问题。《报告》提出：成立三线建设领导小组，实行统一领导，改变多头领导和无人负责的状态；按军工第一、三线第一、配套第一的要求，把国防急需的重要项目、配套项目、对全局关系重大的项目和已经基本建成能够很快投产的项目迅速搞上去，改进三线的物资供应。１２月２５日，在周恩来主持下，中共中央对两个报告作出批示，决定调整四川省革委会领导班子，确定了省革委会核心领导小组成员名单和决定成立成都军区支左领导小组、四川三线建设领导小组及其组成人员。关于刘、张的问题，中共中央领导人明确指出，刘结挺、张西挺是个人野心家，要发动群众揭发批判。此后，刘结挺、张西挺实际已被撤销职务。１９７０年２月至９月底，为进一步解决四川问题，中共中央在北京再次为四川举办了５０００人至６０００人的学习班。根据中央“１２·２５批示”后进一步掌握的材料和刘、张的恶劣表现，１９７０年８月１日，中共中央宣布把刘、张“挂起来、靠边站”的决定，１６日又宣布将他们送北京学习班学习。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"四川文革","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"name":"军队支左","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a81af19a59"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
