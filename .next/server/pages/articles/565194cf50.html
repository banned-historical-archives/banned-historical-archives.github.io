script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"电业工人决为毛主席争气","authors":[],"dates":[{"year":1968,"month":1,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"“工总司”电业系统联合指挥部"},{"type":"paragraph","text":"在全面落实毛主席最新指示，夺取无产阶级文化大革命全面胜利的战斗号令下，上海电业系统和全市各条战线一样，无产阶级文化大革命出现了新的飞跃。电业系统广大无产阶级革命派在进一步巩固革命大联合的基础上，以“只争朝夕”的革命精神，积极促进革命的三结合，决心以尽快成立华东电业管理局革命委员会的实际行动，作为夺取无产阶级文化大革命全面胜利的新起点。"},{"type":"paragraph","text":"回顾一年多来的斗争历程，我们深深地体会到:按照毛主席的指示去办，文化大革命就取得胜利。离开了毛主席的指示，文化大革命就要遇到挫折，革命事业就要遭受损失。我们电业系统革命派在一月革命以后，由于对某些问题存在一些不同意见，引起分歧，又没有按照毛主席教导进行正确处理，而是抓住对方某些缺点错误，无限上纲，所以，去年五月份以后，便从组织上分裂成两大派，从此“内战”风暴席卷整个电业系统，严重地干扰了斗争大方向。在历时三个多月的“内战”时期，我们两大派组织真是全力以赴打“内战”，把阶级敌人放在一边。我们伟大领袖毛主席教导我们:“在工人阶级内部，没有根本的利害冲突。在无产阶级专政下的工人阶级内部，更没有理由一定要分裂成为势不两立的两大派组织。”毛主席的最新指示象巨雷一样，深深地震动了我们的灵魂。难道我们非要这样干到底不可吗?革命造反派打“内战”，对谁有利?这符合无产阶级的利益吗?一系列问号在我们头脑里回转。在市革委会、人民解放军驻沪部队、“工总司”的关怀和帮助下，在全市和整个电业系统广大革命造反派战士的强烈要求下，我们原来两大派组织的头头，坐在一起，把那些无原则的争论放在一边，遵照毛主席的指示，在革命原则下，求大同，存小异，终于铲除了山头，在去年九月二十二日实现了革命的大联合。由于长期打“内战”，损伤了同志之间的感情，在组织上实行大联合后，思想上一时扭不在一起，在一座办公大楼上，三楼的同志不愿上六楼，六楼的同志不愿下到三楼，双方人员碰在一起常常是话中带刺，“触霉头”。这时，毛主席又发出了“要斗私，批修”的最新指示，我们有了“内战”的沉痛教训，原来的两派组织负责人决心要杜绝“内战”，因此在解放军同志的帮助下，举办了毛泽东思想学习班，以“斗私，批修”为纲，双方自觉地亮私，狠狠地斗私，相互有了共同语言，革命大联合进一步从思想上得到了巩固，革命大批判和斗批改开始出现了新的局面。"},{"type":"paragraph","text":"当我们读到《文汇报》编辑部、《解放日报》编辑部、《工人造反报》编辑部发表的《无产阶级革命派，联合起来!》这篇文章时，联想到电业系统文化大革命的斗争实际，使我们更进一步体会到:无产阶级革命派联合起来，才能真正把铁拳打到一小撮阶级敌人身上，同样，只有无产阶级革命派联合起来，才能把那些时时在窥测方向的一小撮阶级敌人，一个个揪出来。电业系统是关系到国计民生的要害部门，无产阶级革命派联合起来，“抓革命，促生产”，这是电业革命职工的光荣战斗任务。我们一定要为毛主席争气。我们有千条万条理由联合起来，没有半条理由闹派性，搞分裂。目前，电业系统革命大联合的形势很好。但我们也看到有个别基层单位的革命大联合还存在不少问题。毛主席教导我们:“阶级斗争，一抓就灵。”我们一定要坚持阶级斗争，时时警惕党内一小撮走资派和坏人，把黑手伸进革命派的队伍，破坏无产阶级文化大革命；同时我们也要坚持“斗私，批修”，彻底打倒资产阶级、小资产阶级派性，不给一切阶级敌人留下利用我们的派性，挑拨离间，分裂我们的革命队伍的空隙，加强无产阶级党性，进一步从思想上巩固革命大联合，促进革命三结合，为夺取无产阶级文化大革命的全面胜利而斗争。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海市工人革命造反总司令部（工总司）","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"派性","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"一月革命","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"565194cf50"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
