script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"6217a650-402c-431d-bc67-8fb48f4f35d2","name":"邓小平言论摘录（续编）（1976.4）","internal":false,"official":false,"type":"img","author":"北京大学、清华大学材料组编，1976.4","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/6217a650-402c-431d-bc67-8fb48f4f35d2/1.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/6217a650-402c-431d-bc67-8fb48f4f35d2/2.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/6217a650-402c-431d-bc67-8fb48f4f35d2/3.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/6217a650-402c-431d-bc67-8fb48f4f35d2/4.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/6217a650-402c-431d-bc67-8fb48f4f35d2/5.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/6217a650-402c-431d-bc67-8fb48f4f35d2/6.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/6217a650-402c-431d-bc67-8fb48f4f35d2/7.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/6217a650-402c-431d-bc67-8fb48f4f35d2/8.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/6217a650-402c-431d-bc67-8fb48f4f35d2/9.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/6217a650-402c-431d-bc67-8fb48f4f35d2/10.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/6217a650-402c-431d-bc67-8fb48f4f35d2/11.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/6217a650-402c-431d-bc67-8fb48f4f35d2/12.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/6217a650-402c-431d-bc67-8fb48f4f35d2/13.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/6217a650-402c-431d-bc67-8fb48f4f35d2/14.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/6217a650-402c-431d-bc67-8fb48f4f35d2/15.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/6217a650-402c-431d-bc67-8fb48f4f35d2/16.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/6217a650-402c-431d-bc67-8fb48f4f35d2/17.jpg"],"article":{"title":"XXX同志揭发的邓小平在中央农村工作座谈会期间的讲话","alias":"","parts":[{"type":"paragraph","text":"的恶攻击。"},{"type":"paragraph","text":"10、邓对我们很少谈到主席的这一指示（按：指关干评论《水游》的指示），只在一次说过所谓这是主席用三个月时间听读《水游》得到的看法，决不是指春当前党内斗争的实际。有一次，我把报刊上关于宋江架窄妮盖的话选了一些送他看，说这显然是影射他，他还故作镇静地说不会。我说这决没有错。他才看了一看，说要送给毛主席看。"},{"type":"paragraph","text":"11、科学院工作汇报提纲的出笼，是邓批起右领窃案风的一件大事。……·他要我转告胡耀郑、李日：他们的稿子涉及问题太多，不必要地太锋利，站不稳。要他们少在群众中说话，等提纲改好了，国务院通过了，毛主席“批准”了，让提纲自已说话，让群众在讨论提纲时自己说话。这是怕他们两个“乱放炮”，破坏了他的复辟美梦。·…·他交给我修改后，我因事忙，告他已请×××找几位同志共同修改了。他很不满。说这个文件非常“重要”，一定要我亲自负责，还要我约×××、××二人共同参加讨论修改办法。···在毛主席已对邓否认说过所谓科学技术是生产力的话以后，我刚好收到我要学部编的一份马恩列论科学技术是生产力的材料，竟送邓请他转主席，而邓竟转了。这是公然对抗主席的狂妄行为。在毛主席已将提纲修改稿退邓后，邓仍不收兵，还要我再次修改一次。我又修改了一次送他。不过这时路线斗争的盖子已经揭开，邓不敢再送主席了。"},{"type":"paragraph","text":"12、关于教育革命问题，邓在我面前说过以下的话："},{"type":"paragraph","text":"教育革命搞了这多年，还没有作过一次总结。我说近几年"},{"type":"paragraph","text":"·也有些重要的经验，如朝阳农学院的经验。他说，朝农的经验还不就是社来社去？··他一次对我们说，清华党委有几个"},{"type":"paragraph","text":"12人写信给毛主席，告迟群，我转了。又说，迟群也去大黎了，你们知道不知道？"},{"type":"paragraph","text":"13、去年十一月十日，邓约我去，告我说他现受批判，起因是转刘冰的信。…他说主席对他作了很严厉的批评，但去讲批评的具体内容。他又说他作了自我批评，表示信既要他砖，总是说明写信的人认为他是同情他们的。同时又要我不要提我转信的事，以免“事情复杂化”。我接着就重提以前的话说，政治研究室今后一定要吸收革命造反派参加领导。他听了马上摇头。说不要，只要吸收年青一点的就行了。"},{"type":"paragraph","text":"14、今年一月十七日，·…··他说政治研究室今后的问题要听候中央的处理。还说，毛选整理的工作也要停下来，听候中央处理。．·.邓未经毛主席、党中央决定，擅自要我将已由毛主席批准的五卷整理工作暂时停止，这在政治上和组织上都是一个极为严重的错误。"},{"type":"paragraph","text":"（七）x×x同志揭发的邓小平在中央"},{"type":"paragraph","text":"农村工作座谈会期间的讲话（摘录）"},{"type":"paragraph","text":"（一九七六年三月七日揭发）"},{"type":"paragraph","text":"我将这次会议期间，邓小平几次谈话的有关内容综合整理了一个记录稿。…现将综合记录稿中邓小平的插话、谈"},{"type":"paragraph","text":"13话部分附后。"},{"type":"paragraph","text":"关于整党整风问题"},{"type":"paragraph","text":"我向主席汇报，解决了军队的问题，现在有农业问题，背业问题和党的问题，这些间题都要一个一个地来解决，主席赞成。主说，采取什么办法解决，你们研究。"},{"type":"paragraph","text":"现在各个方面都有个整顿问题。问题相当多，不是少，领导干部没有一股劲不行。要收字当头，半年来我讲的中心就是讲个敢字当头。要放手发动群众，按主席路线方针去做，凡是方针政策方法对头，放手发动群众的见效就快，不然就慢。我们有二十几年的经验，有群众基础，干部也有正反两方面的经验。不要怕，错了就改，要横下一条心，老命。"},{"type":"paragraph","text":"整党这个题目，主席同意了。问题是究竟怎么搞？恐怕同过去的方法应该有所不同。首先是一个党的问题，各方面都要把整党当作中心。党不但有党纪，而且有党风。延安就是整顿三风，学三要三不要也就是这个意思。名行各业要抓干部队伍，抓领导班子也是解决这个问题，政治工作的中心也就是解决这个问题，××省抓了一下这个问题，经过一个月，现在好转了嘛！工厂开工了，肉也多一点了，农村比城市更好一些。×省农业历来比较好，我看恢复起来也很快。要横下一条心，老命。希望在这里，说这样不会错，原因也在这里。"},{"type":"paragraph","text":"关于反对资产阶级派性问题要敢于反资产阶级派性，××省如果不把×××抓起14来，安定得了市如果不把抓起来，安定得了Xx的是，Xx把抓来，生产就上大了。部，过去就是老虎屁股模不得，我讲不管你是六十岁、五十岁、四十岁的，老的，新的都得摸。摸一下，而就改变了嘛！"},{"type":"paragraph","text":"反对派性，你们决心下得好，要放手发动群众。"},{"type":"paragraph","text":"领与班了里硬是要下决心把派性搞干净。你们那里的领导班子由你们自己调整，硬是要把派性搞干净。无论如何要选一些好的地、县委书记到省委来。"},{"type":"paragraph","text":"你们下决心把××的材料收集收集，回去商量一下，这个人不能当常委，他不能到丰矿去蹲点，只能搞个小矿蹲蹲，到一个小工厂去或者到一个农村去。"},{"type":"paragraph","text":"关于经济工作问题"},{"type":"paragraph","text":"十一，十二月要狠抓两个月，把工业内部的关系调整好，把班子调整好，今年要把机械设备一律检修好，把规章制度整顿好。今年把这些事情抓好，明年就有希望。"},{"type":"paragraph","text":"工业管理问题，还是主席讲的矫任必须过正，现在不严格，不严格就纠正不过来。"},{"type":"paragraph","text":"全国有影响的骨干工厂大约有××个，产值占到约百分之××，今后还是打算把主要骨干企业收上来由中央各部直接管。与地方党委的关系，主要有以下几条：一、党的思想政治工作；二、保证生活供应；三、产品给点分成；四、产值、财政收入纳入地方统计；五、有些物资把前门开大一点，堵住开后门。"},{"type":"paragraph","text":"15"},{"type":"paragraph","text":"其它问题"},{"type":"paragraph","text":"凡是资本主义泛滥严瓜的地方，都要象××省一样摘几个战役（按：指所谓反派性），把资本主义整下去。"},{"type":"paragraph","text":"关键还是班子问题，只要领导班子搞好了，文件上讲的七个“自由”（作物自由种植、手工业副业自由经营、自留地自由扩大、山林自山砍伐、统购统销产品自由买卖、劳力自由流动、集体收入自由分配）不难解决。"},{"type":"paragraph","text":"关于核算单位过渡问题"},{"type":"paragraph","text":"过渡要因地制宜，各省根据自己的特点搞规划。搞几个战役，头一两年刹风，整派性、贪污盗窃、投机倒把、铺张浪费。"},{"type":"paragraph","text":"（八）×××同志揭发的邓小平的言论（摘录）"},{"type":"paragraph","text":"（一九七六年三月十一日揭发）"},{"type":"paragraph","text":"去年夏季以来，邓小平把右倾翻案风刮到了××省。他在会议和个别谈话中，一再强调以“三项指示为纲”，妄图按照这条修正主义路线扭转××省的工作。"},{"type":"paragraph","text":"一、邓小平亲自出马，大讲××省形势“今不如昔”。说什么“农业拉了工业的后腿”，“副食品供应紧张”，捏造说工人“没有肉吃”，等等。××省这也落后，那也不行，"},{"type":"paragraph","text":"16总之文化大革命搞糟了。"},{"type":"paragraph","text":"二、去年七月，邓小平专门向XX省委鼓吹唯生产力论。他讲：“XX省委的工作，第一是农业”。还说：“文化大苹命以前，省委四个书记管农业，现在谁管”，要下决心"},{"type":"paragraph","text":"“改变这种局面”。实质上是要重新按照文化大革命以前划少奇的修正主义路线办事。"},{"type":"paragraph","text":"三、邓小平一再强调“反派性”，要××省过反派性这一关。在全省基本上形成了安定团结的情况下，邓小平大讲反派性，在省级机关和×、X两市开展反派性运动，势必纠缠历史旧账，破坏安定团结，转移斗争大方向。邓小平主张采取批斗，调离、抓人的办法来反派性，更是混清两类不同性质的矛盾，打击革命群众和革命干部。"},{"type":"paragraph","text":"四、在××省端动翻案。××省有一个地委书记，攻击文化大革命“搞糟了”。批林批孔运动中，揭露了这个地委书记的严重错误，经过批评教育，省委给了他停职反省的处分，并发了一个文件。全国农业学大赛会议期间，XX×同志跑到××组，召集地、县委书记讲话，赞扬这个地委书记"},{"type":"paragraph","text":"“敢讲”，说省委那个文件是错误的，要翻案，并说他自己没有承认过是走资派。这股风一下子刮到了全省。当时，弄不清风源在哪里。现在明白了，总后台是邓小平。早在去年七月十一日，邓就指示省委向××同志“请教”。全国农业学大案会议的讲话中，邓小平搬出已经批判过的、实践证明行不通的水利方针。…这个错误方针是××同志提的，实质上是支持他翻案。x×省本来贯彻老中青三结合的方针很不够。青年干部提拔使用得差，反而指责××省没有调动老干部的积极性，去年九、十月调整省委班子也要"},{"type":"paragraph","text":"17"}],"authors":[],"dates":[{"year":1976,"month":3,"day":7}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":9,"page_end":11},"tags":[{"name":"邓小平","type":"人物"},{"name":"迟群","type":"人物"},{"name":"批林批孔","type":"主题/事件"},{"name":"教育革命","type":"主题/事件"},{"name":"派性","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"朝阳农学院","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"054c1e1dbb"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
