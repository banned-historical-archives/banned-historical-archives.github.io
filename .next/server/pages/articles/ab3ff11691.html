script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"刘主席  周总理  电贺也门国庆","authors":["刘少奇","周恩来"],"dates":[{"year":1964,"month":9,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"刘主席  周总理"},{"type":"paragraph","text":"电贺也门国庆"},{"type":"paragraph","text":"新华社二十五日讯　中华人民共和国主席刘少奇和国务院总理周恩来今天打电报给阿拉伯也门共和国总统阿卜杜拉·萨拉勒，热烈祝贺阿拉伯也门共和国国庆。电文如下：萨那阿拉伯也门共和国阿卜杜拉·萨拉勒总统阁下："},{"type":"paragraph","text":"在阿拉伯也门共和国国庆的时候，我们向阁下、也门人民和阿拉伯也门共和国政府表示热烈的祝贺。"},{"type":"paragraph","text":"中国人民高兴地看到，也门人民在抗击帝国主义侵略、争取社会进步的斗争中取得了显著的成就，并且祝愿也门人民，今后在维护民族独立、建设国家的事业中，不断取得新的胜利。"},{"type":"paragraph","text":"中也两国人民之间存在着深厚的友谊。不久以前，阁下对我国的友好访问和中也两国友好条约的签订，使这一友谊有了新的发展。我们深信，中也两国的友好合作关系，在万隆精神的照耀下，必将日益巩固和发展。"},{"type":"paragraph","text":"祝阿拉伯也门共和国繁荣，人民幸福。"},{"type":"paragraph","text":"中华人民共和国主席　刘少奇"},{"type":"paragraph","text":"中华人民共和国国务院总理　周恩来"},{"type":"paragraph","text":"一九六四年九月二十五日"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ab3ff11691"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
