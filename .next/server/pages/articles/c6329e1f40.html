script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"以华主席为典范学好毛主席著作  人民解放军兰州部队某团指战员努力提高学习自觉性","authors":[],"dates":[{"year":1977,"month":5,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"以华主席为典范学好毛主席著作"},{"type":"paragraph","text":"人民解放军兰州部队某团指战员努力提高学习自觉性"},{"type":"paragraph","text":"据新华社兰州一九七七年五月十五日电 人民解放军兰州部队某团指战员以华主席为光辉典范，提高学习毛主席著作的自觉性，努力学好《毛泽东选集》第五卷。"},{"type":"paragraph","text":"这个部队在文化大革命期间曾担负过湖南省革命委员会的警卫任务。华国锋同志多次视察了这个部队，同干部战士亲切交谈，有十五个连队的战士和二百多名干部见到过华国锋同志，聆听过华国锋同志的教诲。广大指战员深深感到，华主席一贯高举和捍卫毛主席的伟大旗帜，是伟大领袖毛主席的好学生、好接班人，是我党我军我国各族人民的好领袖。这个部队广泛开展了赞颂和学习华主席高举毛主席的伟大旗帜的革命实践的活动。他们专门组织了华主席革命实践报告团，给部队巡回作报告，并举办了反映华主席革命实践的电影汇映和图片展览。党委常委积极当好宣传员，走到哪里，讲到哪里。党委书记、政委袁超文化大革命中在湖南一个矿务局支左。当时，林彪反党集团伙同“四人帮”抛出“文攻武卫”的反动口号，挑起了“全面内战”，干扰破坏毛主席“要文斗，不要武斗”和“抓革命、促生产”伟大指示的落实。华国锋同志先后三次到这个矿务局，给支左干部讲形势，作指示。袁超同志曾多次向华国锋同志请示汇报工作，聆听华国锋同志的指示。在华国锋同志的亲切关怀下，这个局的广大干部和职工联合起来，狠抓革命，猛促生产。"},{"type":"paragraph","text":"华主席坚定不移地高举和捍卫毛主席的旗帜，在于他长期坚持努力学习和实践马列主义、毛泽东思想，有高度的马克思主义水平。从华主席身上，干部战士清楚地看到，做一名高举和捍卫毛主席旗帜的自觉战士，必须在学习马列主义、毛泽东思想上下功夫、用气力。大家把对华主席的崇敬，化为努力学习马列著作和毛主席著作的实际行动。《毛泽东选集》第五卷下发后，这个部队干部战士迅速掀起学习热潮。团、营、连层层有学习计划，干部战士人人订学习措施，有阅读能力的战士，决心在今年“七一”之前把选集五卷通读一遍。最近，这个团分散在相隔五百多里的四个点上执行军事训练、战备施工、军农生产任务。针对这一特点，团里组织七个工作组深入到各个点上，切实抓好学习。某连在抗美援朝中荣获“天德山英雄连”的光荣称号，文化大革命中，华主席亲自到这个连队视察，热情鼓励指战员高举毛主席的伟大旗帜，认真读毛主席的书，为人民扛枪打仗。学习选集五卷时，他们回忆当年的幸福情景，激发了学习热情。白天，他们执行施工任务，晚上，不顾疲劳在煤油灯下坚持学习。他们联系连史学习《给中国人民志愿军的命令》《中国人民志愿军要爱护朝鲜的一山一水一草一木》等著作，决心进一步发扬我军的光荣传统。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"华国锋","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"湖南文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"武斗","type":"主题/事件"},{"name":"编纂《毛泽东选集》第五卷","type":"主题/事件"},{"name":"军队支左","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c6329e1f40"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
