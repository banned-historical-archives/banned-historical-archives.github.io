script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"中共中央主席、国务院总理华国锋前往机场热烈欢迎中非共和国总统博卡萨和夫人","authors":[],"dates":[{"year":1976,"month":11,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"中共中央主席、国务院总理华国锋前往机场"},{"type":"paragraph","text":"热烈欢迎中非共和国总统博卡萨和夫人"},{"type":"paragraph","text":"国务院举行盛大宴会热烈欢迎贵宾"},{"type":"paragraph","text":"李先念副总理主持宴会　王震、李素文等出席作陪　李先念副总理和博卡萨总统先后发表热情洋溢的讲话"},{"type":"paragraph","text":"新华社一九七六年十一月十五日讯　中非共和国总统、中非共和国革命委员会主席萨拉赫·阿丁·艾哈迈德·博卡萨，应我国政府邀请前来进行正式访问，今天上午乘专机到达北京。随同来访的有博卡萨总统的夫人和政府的高级官员。"},{"type":"paragraph","text":"中国共产党中央委员会主席、国务院总理华国锋到机场迎接中非共和国贵宾。华国锋主席同博卡萨总统和夫人等贵宾一一握手，向远道而来的非洲朋友表示热烈欢迎。"},{"type":"paragraph","text":"到机场欢迎的还有国务院副总理李先念和林佳楣同志，副总理王震，外交部副部长何英，外贸部副部长陈洁，外经部副部长陈慕华，农林部副部长梁昌武，其他有关部门负责人石少华、李青川、刘存信和首都群众数千人。"},{"type":"paragraph","text":"正当我国人民热烈庆祝华国锋同志任中共中央主席、中央军委主席，热烈庆祝粉碎“四人帮”反党集团伟大胜利的时候，博卡萨总统带着中非共和国人民的友谊，不远万里前来我国进行访问，这使中国人民感到由衷的高兴。中国和中非共和国同属第三世界，两国人民在反帝、反殖、反霸的斗争中结成了深厚的战斗友谊，博卡萨总统这次访问必将为发展这种友谊作出贡献。"},{"type":"paragraph","text":"为欢迎中非共和国贵宾的来访，今天，首都主要街道上空彩旗迎风招展，高大建筑物上悬挂着巨幅欢迎标语，上面写着：“热烈欢迎博卡萨总统和夫人！”“热烈欢迎中非贵宾！”“坚决支持中非人民维护民族独立和国家主权的斗争！”“中国和中非共和国人民之间的友谊万岁！”“第三世界人民大团结万岁！”“全世界人民大团结万岁！”"},{"type":"paragraph","text":"在飘扬着中国国旗和中非共和国国旗的首都机场上，举行了隆重的欢迎仪式。乐队奏中非共和国国歌和中国国歌。博卡萨总统由华国锋主席陪同，检阅了中国人民解放军陆、海、空三军仪仗队。当贵宾们同欢迎群众见面时，首都民兵持枪列队向博卡萨总统致敬。活泼的青少年挥动花束、花环，载歌载舞，高呼欢迎口号。博卡萨总统高兴地向群众不断招手致意。"},{"type":"paragraph","text":"中国驻中非共和国大使李石陪同博卡萨总统到达北京。"},{"type":"paragraph","text":"以中非共和国革命委员会委员、负责国民教育和教育改革的第二副总理亨利·迈杜为团长的博卡萨总统访华先遣团，中非共和国驻中国大使米歇尔·马埃朗加莫，以及各国驻中国的外交使节，也到机场迎接。"},{"type":"paragraph","text":"新华社一九七六年十一月十五日讯　国务院今天晚上举行盛大宴会，热烈欢迎中非共和国总统、中非共和国革命委员会主席萨拉赫·阿丁·艾哈迈德·博卡萨和夫人以及随同来访的第二副总理亨利·迈杜，第三副总理阿尔方斯·科扬巴等中非共和国贵宾。"},{"type":"paragraph","text":"国务院副总理李先念主持了今天晚上的宴会。"},{"type":"paragraph","text":"中非共和国驻中国大使米歇尔·马埃朗加莫和大使馆外交官员，应邀出席了宴会。"},{"type":"paragraph","text":"出席宴会作陪的有国务院副总理王震，人大常委会副委员长李素文，外经部部长方毅，政府有关部门、中国人民解放军、北京市革命委员会、对外友协的负责人何英、陈洁、陈慕华、张才千、梁昌武、夏之栩、陶琦、姚进、华山、姚力、张之强、林佳楣、李青川、迟浩田、邓岗、石少华、刘存信、王冶秋、黄作珍、徐光、王炳南，以及中国驻中非共和国大使李石。"},{"type":"paragraph","text":"人民大会堂宴会厅里并排悬挂着中非共和国国旗和中国国旗。"},{"type":"paragraph","text":"李先念副总理和博卡萨总统先后在宴会上发表热情洋溢的讲话（全文见第二版）。他们的讲话受到热烈欢迎。讲话以后，乐队分别奏中非共和国国歌和中国国歌。"},{"type":"paragraph","text":"宴会充满中国和中非共和国两国人民团结友好的气氛。席间，宾主愉快交谈，乐队演奏了《祖国一片新面貌》等中国歌曲和《民族革命曲》等中非共和国歌曲。"},{"type":"paragraph","text":"各国驻中国的外交使节应邀出席了宴会。（附图片）"},{"type":"paragraph","text":"博卡萨总统由华国锋主席陪同步出机场时，向首都欢迎群众致意。"},{"type":"paragraph","text":"新华社记者摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"华国锋","type":"人物"},{"name":"李先念","type":"人物"},{"name":"王震","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"933b30f0d9"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
