" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji15","name":"毛泽东全集第15卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji15.pdf"],"article":{"title":"关于发动大规模反投隆反内战运动对付蒋介石的反共高潮的指示","alias":"","parts":[{"type":"paragraph","text":"关于发动大规模反投降反内战运动"},{"type":"paragraph","text":"对付蒋介石的反共高潮的指示"},{"type":"paragraph","text":"（1940年11月15日）"},{"type":"paragraph","text":"一、根据中央十一月七日对时局指示及朱彭叶项佳日联名复何拍电所取政治立场，对于蒋介石此次反共进攻，决对皖南取让步政策（即北移），对华中取自卫政策，而在全国则发动大规模反投降、反内战运动，用以争取中间势力，打击何应钦亲日派的阴谋挑畔，缓和蒋介石之反共进军，拖延抗日与国共合作时间，争取我在全国之有理有利地位。"},{"type":"paragraph","text":"二、蒋对华中压迫已具决心，因此我要积极准备自卫。但蒋进教亦有几种困难："},{"type":"paragraph","text":"第一，是我取缓和态度，何应钦缺少了挑拨的借口（虽然还有借口者)，蒋介石、白崇禧要顾虑中间派态度，故我应广泛宣传佳内容，剥夺蒋、何、白之政治资本。第二，蒋介石很怕八路军南下，尤怕我从西安突出。故我应宣被方如果打新四军，则八路军不能坐观不救，请求彼方停止二十个师之行动，否则八路军不能听新四军挨打，到处适当地散布这空气，向顽固派做大力攻势，使之有所畏而不敢胡干。第三，蒋介石怕我皖南不动，扰其后方。故我对皖南部队既要要求彼方保证华中各军停止行动，以为我方撤退皖南部队时彼方给我之交换条件。"},{"type":"paragraph","text":"第四，蒋介石、顾祝同均怕我消灭韩德勤。故我应在各地放出如下之空气，略谓苏北事件我已遵令和解，不咎既往，但如汤、李、霍（守义）、莫（德宏）不停止进攻，则我不得不打韩德勤，此空气尤应直接从韩本人及顾祝同方面着手，表示我可继续保全韩德勤，但必须停止汤、李、霍、莫进攻作交换条件。"},{"type":"paragraph","text":"第五，蒋介石进攻还有一个困难，就是在他未同日本人真正讲好条件之前（如条件讲好则全局大变）他的剿共战场是不方便的，他的东进大军不易通过淮南路、津浦路两道日本封锁线，其北进大军亦难通过涡河敌垒及以北敌据点，如彼仅使用霍、莫等小部，则我游击队即足以对付之，故我对霍、莫、何（柱国）、孙（桐轩)、马（彪）等一切接近之部队，应强调大敌当前不应内战之宣传，并加强统战工作，在彼等小部进攻时（如霍、莫）只用众多之游击队缠绕之（此等游击队主要作用是宣传队），而避免与之作真面目战斗，不损伤桂系与东北军之感情，预留尔后讲价还价余地。同时在皖东则说明该地是廖故主席划给新四军之防地，在皖东北则说明该地是卫长官承认给彭支部队的游击区，总之在这些区域要使我全体车民振振有词，使进攻者词穷理拙。"},{"type":"paragraph","text":"三、如我各方面做得好，这次反共高潮是可能打退的，虽然我们决不应该估计蒋会放弃对我的压迫政策(这是决不会的)，并且还要准备对付投降夹击的最黑暗局面。以上意见请考虑酌行之。"}],"authors":["毛泽东"],"dates":[{"year":1940,"month":11,"day":15}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":225,"page_end":226},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d5f7857b35"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
