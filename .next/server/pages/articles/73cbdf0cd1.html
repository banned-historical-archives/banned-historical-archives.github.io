script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"我国的奴隶社会始于何时","authors":[],"dates":[{"year":1980,"month":8,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"关于我国原始社会和奴隶社会的分期，比较流行的看法认为奴隶社会起于夏代。黑龙江《学习与探索》一九八○年第二期晃福林著文对此提出了不同的看法。"},{"type":"paragraph","text":"文章认为，要判断我国奴隶社会始于何时，必须首先解决社会进入奴隶制时代的标志问题。这个标志不应该是阶级的出现，而是恩格斯在《家庭、私有制和国家的起源》中论述的那样:在社会结构上，国家代替了氏族组织，在社会经济发展上进入了商品生产阶段。也就是国家的出现才是奴隶社会代替原始社会的根本标志。阶级的出现不过是原始社会内部的奴隶制的萌芽。"},{"type":"paragraph","text":"我国的奴隶制是否起于夏代，作者通过对文献记载的分析，认为夏代虽然有了阶级出现，但是不仅没有一个镇压奴隶阶级的国家出现，而且也完全不具备恩格斯提到的进入奴隶社会的经济特征。所以作者断定夏代没有进入奴隶社会。"},{"type":"paragraph","text":"作者认为，如果没有商的入侵，桀以后的夏代，会按照“最纯粹、最典型的形式”，从氏族内部产生出国家，以至进入奴隶社会。商的入侵打断了这个历史进程。通过对商的社会分析，作者认为汤灭夏是一场原始的部落殖民战争，通过这样的战争是不会从氏族的废墟上产生出国家来的。汤不过是一个原始社会后期军事民主制阶段的部落酋长，直到盘庚之前已经到了奴隶制时代的门口。"},{"type":"paragraph","text":"文章认为，盘庚迁都于殷，这不仅是商代前后分界的标志，而且是我国原始社会和奴隶社会分界的标志。商定都于殷之后，国家组织已经代替了氏族组织，成为凌驾于社会之上的权力机关。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"73cbdf0cd1"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
