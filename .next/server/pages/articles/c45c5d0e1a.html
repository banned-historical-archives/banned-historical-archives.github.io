<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"坚决肃清打虎运动中的右倾思想","authors":["铁湜"],"dates":[{"year":1952,"month":2,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"铁湜"},{"type":"paragraph","text":"我们要取得打虎战斗的彻底胜利，就必须首先清除我们中间存在的右倾思想，因为只有这样，才能使我们的头脑清醒，目光锐利，充满勇气和信心。"},{"type":"paragraph","text":"打虎斗争中的右倾思想，其表现形式是多种多样的:"},{"type":"paragraph","text":"(一)对三年来资产阶级一贯的向我们猖狂进攻的严重危害性认识不足，还没有认识到这种进攻较之明枪明刀的斗争更其危险和严重，资产阶级采取卑劣手段进行杀人不见血的进攻，迷惑我们政府干部的认识，使我们对资产阶级在革命阵营中所安置的坐探无法觉察，有些革命组织遭到了资产阶级的严重腐蚀，而仍未引起警惕，有些同志曾因资产阶级的捧场而陶醉，在亲热的握手中忽略了防范对方的暗箭伤人，这种人直到今天对目前展开的这样一个规模巨大的猛烈反攻，还表现着不很积极，对反贪污斗争的本质——是一场尖锐的阶级斗争还认识不足，因此，他就总是在领导或参加这场斗争中，处处表现着对敌情估计不足、信心不高、决心不强、斗志不坚，优柔寡断，惟恐过火。"},{"type":"paragraph","text":"(二)对资产阶级的侵蚀性和危害性估计不态度。足的人，总是在另一方面表现出敌我不分的态度，他们盲目的信任老同志、老部下，只看他平时表面现象，而不注意他们的生活情况和思想上的变化，对同乡、同学、亲戚朋友，特别是对曾经在过去革命斗争中和自己共过患难的人，以及由自己介绍到机关、企业等部门来工作的人，更是盲目的信任，浓厚的封建感情掩盖了阶级的界线，老虎在他的身边转，或老虎还在积极利用他所留下来的空隙，表面上表现得处处“安分”，有的甚至还装出“打虎”的架子，进一步来麻痹领导，但带有右倾思想的人，却完全失掉了阶级斗争中的嗅觉，即使对某些人引起怀疑，但由于没有鲜明的阶级立场，本身存在着温情主义，还乱套什么“治病救人”的帽子，对这些己堕落为资产阶级奴才的革命的叛徒，不能采取“誓不两立”的坚决"},{"type":"paragraph","text":"(三)打虎是一场极其紧张的战斗，指挥员应当亲临前线，指挥作战，但仍有少数人继续采取官僚主义的态度，放不下官僚主义的臭架子，不想亲自动手，不肯深入群众，采访敌情，不积极的组织打虎队伍，有线索有对象的去打去捉，仍然坐在屋子里空喊“打虎”，这些打虎斗争中的官僚主义者，正如某机关一首打虎打油诗所讽刺的:“山上有老虎，上山苦无路，但闻老虎叫，可惜心无数!”现在我们应警告这些官僚主义者，过去正由于你们严重的官僚主义，让老虎钻了我们的空子，你们把老虎领养得这么肥胖，使人民国家的财产遭到这样大的损失，本来应负起“养虎贻祸”的责任，难道在今天反贪污、反浪费、反官僚主义斗争中，还不痛下决心，来坚决，彻底，干脆的消灭老虎吗?如果你的官僚主义依然不改，那不但会使国家人民财产继续受到损失，而且你也不能推卸“知虎纵虎”的严重的政治责任的，国家与人民会对你加以严厉的彻处的，官僚主义者应该猛省，应该当机立断，放下臭架子，积极起来领导打虎，这是国家与人民对你的一次最现实的考验，以自己打虎打得彻底，取得胜利来弥补你过去对国家人民所造成的损失吧!"},{"type":"paragraph","text":"为了取得打虎斗争的彻底胜利，就必须采取坚决的态度，来严肃的彻底批判上述各种形态的右倾思想，所有参加打虎的人们应该提高阶级警惕性，大胆的揭发与批判右倾思想，扫除思想障碍，要勇猛的向老虎进攻!"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c45c5d0e1a"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
