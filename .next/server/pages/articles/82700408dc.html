<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"徐健生在贵州省电话会议上的讲话","authors":["贵州省副省长","赵欲樵"],"dates":[{"year":1958,"month":10,"day":10}],"is_range_date":false,"parts":[{"text":"赵欲樵讲钢铁生产问题","type":"title"},{"text":"贵州省副省长赵欲樵","type":"authors"},{"text":"一、钢在11月要放卫星。为不致在时间上与三秋工作有抵触，省委研究从11月9号开始到15号定为放钢的生产卫星周。","type":"paragraph"},{"text":"全省放好大的卫星，据推需要和可能而定。全省定30000吨卫星。从11月9日至15号每天平均应有3100吨的产量。按照这个数字分配：从9号到15号平均日产要达：贵阳市300吨，遵义900吨，毕节700吨，安顺400吨，黔东南300吨，铜仁300吨，黔南200吨。","type":"paragraph"},{"text":"完成任务的关键在于积极领导，生铁较好的山区迅速建炉，炉型可百花齐放，有把握的还是遵义尚稽的炒钢炉子，铁放进去个把钟头即可出钢，更好的是镇远清溪搞的炉子。","type":"appellation"},{"text":"二、目前各个专区搞铁的劲头很大，据说有的县非放万吨不可，这应该值得注意，注意质量问题，所炼的铁大多数含铁量在80%以下，这个不能算铁，中央冶金部要求在90%以上才能算好铁。我们如果有50%以上有含铁量达90%以上也算不错，我们要提高警惕。烧结铁多要注意。因此，在11月20号左右要放卫星不是靠石灰窑即可以烧出的。要靠真本事，要靠土高炉和正常的家庭炉，单靠石灰窑是很危险的，二天上面调时不要坏铁，要好铁那我们炼钢就没有好铁了。再一点上面二天增加任务我们就要多投劳动力，对农业则有影响了，希很快将投入生产的高炉、出铁量，群众性的如家庭炉、邵阳炉共有多少，出多少铁和石灰窑出多少，要统计一下，以便带去北京开会研究。石灰窑生产越多越被动，将来不好登报。","type":"paragraph"},{"text":"三、最后因集中力量放卫星，上调的铁很少，影响了贵阳的需要。有的厂已停工待料，这个月上调任务40000多吨，现在只上调4000多吨，希各专区很好的支持一下，遵义专区最近上调2000吨，毕节3000吨，其他专区500吨，放在马路旁，不能马虎。","type":"paragraph"},{"text":"来源：遵义地委(中国共产党遵义地方委员会章)","type":"paragraph"},{"text":"1958.10.27","type":"appellation"}],"comments":[],"origin":"贵州省某档案馆","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"82700408dc"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
