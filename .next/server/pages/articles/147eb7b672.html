script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共河南省委关于学习、宣传中央郑州会议和省委六级干部会议精神的通知","authors":[],"dates":[{"year":1959,"month":3,"day":14}],"is_range_date":false,"parts":[{"text":"中共河南省委关于学习、宣传中央郑州会议和省委六级干部会议精神的通知","type":"title"},{"text":"各地、市、县委：","type":"appellation"},{"text":"中央郑州会议的指示，是党的八届六中全会“关于人民公社若干问题的决议”的发展和具体化，具有极重要的理论意义和实践意义。省委六级干部会议具体贯彻了中央郑州会议的精神，结合我省实际情况，解决了整顿和建设人民公社中带有根本性质的问题。认真贯彻这两次会议的精神，对提高广大干部、群众的思想觉悟，巩固提高人民公社，进一步发挥人民公社的优越性和改善我们同农民的关系，更好地调动广大群众的积极性，保证实现国家的钢、煤、粮、棉4大指标，保证实现我省1959年更大的跃进，都具有决定性的作用。因此，各级党委除要立即组织全体党员、干部认真地学习讨论这两个会议的内容外，必须紧密结合生产和整社向广大群众进行深入普遍的宣传，并认真组织他们讨论。关于中央郑州会议和省六级干部会议如何宣传问题，中央已有专门通知，省委在省六级干部会议文件的处理的通知中。对有关宣传问题也作了指示，各级党委都必须按照中央和省委的通知严格执行。现对具体宣传的内容特再作如下通知：","type":"paragraph"},{"text":"在群众中，应根据省委“关于人民公社的管理体制和若干政策的规定（草稿）”和各县委关于这一问题的规定。着重宣传以下几点：（1）宣传统一领导，权力下放，分级管理，分级核算。具体说明人民公社管理委员会、生产大队、生产队以及县联社的职权范围。（2）宣传积累和消费的正确关系。具体说明人民公社收益分配的比例，各项扣除占多少，社员分配多少。（3）宣传按劳分配，多劳多得的社会主义分配原则。说明必须坚持工资制与供给制相结合的分配制度，并在发展生产的基础上，要继续增长工资的比重。说明在各生产大队之间，工资标准应当有高有低。评定社员工资应实行死级活评、评工记分、多劳有奖的方法。（4）宣传等价交换的原则。说明不论公社和生产大队之间，大队和大队之间，产品需要交换的时候，应当按照等价交换的原则进行买卖，不得无代价地调拨。国家办的大型水利工程、铁路、公路等所调用的民工，必须按规定支付工资。公社办工业，雇用工人也要合理地付给工资。社和社、队和队之间进行大协作的时候，实行换工办法，或者由用工单位付给工资。（5）宣传劳动力必须合理安排，并应把重点放在农业上。说明正确安排农业、工业及其他方面所用劳力的比例，尽量减少行政管理人员和服务人员，节约劳力，对于发展整个农村经济的重大意义。同时还必须加强劳动管理，避免浪费劳力，大力进行技术革命，大搞工具改革，不断提高劳动效率。（6）宣传勤俭办社、勤俭办一切事业的方针。说明公社的各级组织和部门都必须搞好财务管理，进行收支核算和成本核算，并切实杜绝贪污，克服铺张浪费现象。（7）宣传我省已经超额完成国家粮食征购任务，这项工作已经结束。现由公社集中管理粮食（不包括公社代管的国库粮食），应把粮食管理权下放到大队。过去隐瞒的粮食，现在公开出来，归本队支配，可以自用，可以储存，可以卖给国家。公社应把各大队已经交售给国家的粮食、棉花、油料、烟叶的价款如数付给各大队。还没有完成棉花、油料、烟叶征购任务的地方，公社、生产大队必须保证完成。社与社、队与队之间，棉油任务分配有畸轻畸重者，由县人委加以合理调整。超过统购任务者，按省委规定的办法进行奖励。个人所有粮食、棉花、油料、烟叶等农副产品，不问来源，自愿卖给国家者，现金交易，谁卖谁得。在宣传这些内容的同时，还必须继续宣传人民公社的优越性、发展方向和共产主义前景，使广大群众懂得现在这样做，正是为了有利于发展生产，有利于今年的全面大跃进，有利于巩固提高人民公社和加速实现农业机械化、电气化，以便在生产大发展和群众觉悟大提高的基础上，顺利地由集体所有制过渡到全民所有制。","type":"paragraph"},{"text":"各报刊、广播必须根据上述内容，严格按照六中全会决议的原则和语言，抓住好的典型和经验，从正面进行宣传，不要对反面现象作任何集中的报道和批评，不要提所有制问题上的改变，不要提同农民关系紧张、收购不能完成任务等。不明确的问题，应随时请示党委，不得自作主张。各地召开的县委四级干部会议和公社党委召开的三级干部会议，各级报纸、广播、党内外刊物，一律不发新闻，不作报道。","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"147eb7b672"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
