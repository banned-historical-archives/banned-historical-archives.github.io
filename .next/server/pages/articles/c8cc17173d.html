" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"章伯钧阴谋二、三事","authors":[],"dates":[{"year":1957,"month":7,"day":15}],"is_range_date":false,"parts":[{"text":"章伯钧阴谋二、三事","type":"title"},{"text":"新华社福州15日讯  据章伯钧亲信、农工党中央委员黄农（按：黄和章在1929年就有往来，黄的老婆是医生，曾是章的老婆李建生犯重病时的救命恩人，他知道章的阴谋较多，现正争取其起义，但他态度颇不老实），13日在农工党福建组织反右派斗争的小型会议上初步交代了章伯钧一些反党反人民的阴谋。","type":"paragraph"},{"text":"今年年初全国政协开幕前，黄农和余宝笙（农工党员、福建师范学院的女敎授、全国政协委员、右派骨干）等四人到章伯钧家中看章时，章要余（余曾是建党时对象）主动争取入党。黄农说，章过去一向怕农工党中有共产党员，而他现在为什么这样关心余的入党问题呢？很明显，这是他想派一些他控制得住的人参加共产党，好打听党的消息。","type":"paragraph"},{"text":"章从去年开始就到处宣传“上议院制度”，幷认为政协将来要变成上议院，要扩大到几千人，因此今年政协开会时，章要所有到会的农工党员都在会上发言，以扩大影响，为将来增加农工党的政协名额创造条件。结果出席政协会议的十二个农工党员，由李伯球出面组织写了一个联合书面发言。","type":"paragraph"},{"text":"章曾说，我和黄琪翔、李伯球等多是跑马路的，没有领导科技的力量，将来农工党中央委员中一定要有三分之二的科技人员，这样在科技界号召力就大了。","type":"paragraph"},{"text":"在4月9日到13日召开的农工党中央委员扩大会议上，章曾提出下届中央委员的名单，其中除现有的人选外，幷建议要把秘书长黄琪翔提为副主席（原话如此），把王一帆、杨逸堂（？）由中央委员提为执行局委员，把李伯球由副秘书长提为秘书长，把广西省主委×××和叶逸寿（？）两人由候补中央委员提为正式委员。这些人都是章的亲信。（陈启桐）","type":"paragraph"}],"comments":[],"origin":"新华通訊社編：《内部参考》，第2265期，1957年7月24日","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c8cc17173d"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
