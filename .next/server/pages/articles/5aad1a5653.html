<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"帮助大学生进行思想改造　首都高等学校政治课教师讨论教课方针","authors":["新华社"],"dates":[{"year":1957,"month":9,"day":11}],"is_range_date":false,"parts":[{"text":"帮助大学生进行思想改造　首都高等学校政治课教师讨论教课方针","type":"title"},{"text":"新华社","type":"authors"},{"text":"据新华社１１日讯中共北京市委高等学校党委会从８月２７日到９月６日举办了为期十天的首都高等学校政治课教师的学习会。这个学习会帮助高等学校政治课教师们进一步明确了下学年如何开设社会主义思想教育课程。","type":"paragraph"},{"text":"参加学习会的有首都各高等学校政治教研室的负责干部、学校党委的宣传干部和一部分政治课教师共二百多人。在这以前，他们都在北京市马列主义教师报告会上听了陆定一、康生的报告。这次，他们又听了蒋南翔、邓拓、胡绳、许立群、田家英、于光远、姚溱、杨述等人的报告。这些报告联系首都高等学校反右派斗争的具体情况，比较系统地分析了右派分子反共反人民反社会主义谬论的反动性和这些谬论的阶级基础，着重对民主和集中、人民民主和无产阶级专政、共产党的领导、阶级立场、国际主义和民族主义、资产阶级个人主义和自由主义、反对绝对平均主义和社会主义建设中的一些问题等，作了详细的阐明。教师们对每一个报告都作了讨论。","type":"paragraph"},{"text":"在学习过程中，教师们着重讨论和检查了政治课教师怎样对待“学习理论、联系实际、提高认识、改造思想”的教学方针问题。在检查中有些人认为过去在思想上对这一方针不明确，并且认为思想改造的提法不一定适用于高等学校。那时的理由是：高等学校学生年青，思想单纯，只要正面的系统理论教育就行了，不必联系学生的思想情况帮助学生改造思想。他们认为关于学生树立共产主义世界观问题，可等学生学完理论后自己去解决。","type":"paragraph"},{"text":"教师们在这次讨论中，联系了反右派斗争的情况，指出过去这种看法不符合实际情况。首都高等学校学生８０％是出身于地主、资产阶级或小资产阶级家庭，地主、资产阶级的思想对他们有很大的影响，这些影响在大鸣大放中已经暴露得很明显。如果政治课不努力帮助学生进行思想改造，实际上就是把政治课变成空谈，听任资产阶级思想在学生中泛滥。他们认为，政治课不做到理论联系实际，不在学生中间展开社会主义大辩论，来帮助学生提高认识、改造思想，而只是按照大纲讲讲课，那么错误思想不可能克服，共产主义人生观不可能树立，政治理论课的目的就达不到。","type":"paragraph"},{"text":"教师们在学习中还讨论清华大学一些政治课教师由于长期反对理论联系实际的教学方针、坚持资产阶级个人主义的道路而成为右派分子的情况的材料。他们认识到在马列主义政治课方面也有不可调和的两条路线的斗争：一条是克服资产阶级个人主义，按照党的理论联系实际的方针走；另一条是按照资产阶级知识分子的道路走，听任个人主义的思想滋长发展，而走上反对共产党反对社会主义的道路。也就是说，在政治课教师面前也尖锐地摆着做工人阶级的知识分子，还是做资产阶级的知识分子的问题。","type":"paragraph"},{"text":"经过十天的学习和讨论，教师们认为这次学习会的开法，对他们准备开展社会主义思想教育的工作有不少帮助。他们准备回校后，首先在全校的政治课教师中间进行关于贯彻理论联系实际的教学方针的讨论和检查，使所有政治课教师弄通社会主义思想教育的意义和目的。改变过去不从实际出发，机械地搬大纲的教学方法，把这次社会主义思想教育，成为全民性的社会主义大辩论的组成部分，作为一个群众运动来进行，做到切切实实地帮助学生弄清社会主义革命和社会主义建设中的一些根本问题。","type":"paragraph"},{"text":" ---- 原载《人民日报》1957年9月12日","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5aad1a5653"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
