" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中央首长接见刘建勋王辉时的指示","authors":["吴法宪","周恩来","康生"],"dates":[{"year":1967,"month":9,"day":5}],"is_range_date":false,"parts":[{"text":"中央首长接见刘建勋王辉时的指示","type":"title"},{"text":"周恩来康生吴法宪","type":"authors"},{"text":"〖时间：五日夜到六日晨三时。周恩来、康生、吴法宪、戚本禹等参加接见。九月七日下午，王辉同志在河南省体育馆“二七公社”基层服务员会议上传达。〗","type":"appellation"},{"text":"一、周总理及其他首长要求二七公社及河南驻军很好地学习八·二五号召，九月一日中央首长讲话，九月四日主席亲自批发的命令，很好地执行，很好地贯彻，大张旗鼓地进行宣传，在偏僻的地方，可以派飞机散发传单，使《8．25号召》、《九·五》命令家喻户晓。","type":"paragraph"},{"text":"二、集中力量搞大方向，狠斗文敏生、赵文甫，把他们斗倒、斗臭。","type":"paragraph"},{"text":"三、总理讲：你们的仓库是一级战备仓库，听说仓库被抢，问题是严重的。抢了枪的要交出来，二七公社的情况我们很清楚，军队要按中央指示办事，每天向中央汇报一次。五日晨总理来电话，让开封老保放下武器，生命有保证，（因开封发生反革命暴乱，老保给一军及“八·二四”发了最后通牒，让退出东郊）同时希望郑州驻军及二七公社给予八·二四政治上的支持。","type":"paragraph"},{"text":"四、总理讲：听说你们那儿每天都有打死人的情况，这很不好，要立即制止，对打死人、打伤人的要处理。（首长问死伤情况时，回答有八人。总理说，不止吧，有30多人。）","type":"paragraph"},{"text":"五、二七公社、驻郑解放军对不同观点及保守组织的群众，要讲政策，现在在北京告二七公社的人很多，希望你们能按政策办事。","type":"paragraph"},{"text":"六、希望你们能很好地把“抓革命，抓生产”的任务搞起来，秋收工作马上就要开始了，秋收搞得不好，你们的日子就不好过，就有罪，工业要很好地抓上去。","type":"paragraph"},{"text":"七、军分区、县人武部不搞四大，要进行正面教育。","type":"paragraph"},{"text":"八、现在有些人对全国形势的看法与党中央看法不同，请你们很好地看看九月一日的讲话，请你们与二七公社共同注意教育无政府主义的人，防止坏人混水摸鱼，现在有些行动破坏了社会治安，希望提高警惕。","type":"paragraph"},{"text":"九、枪和物资，告诉二七公社自动送回国库，协助他们坚决执行命令，你们的权力要认真执行。","type":"paragraph"},{"text":"十、军委吴法宪等首长指示：河南军区改组了，何运洪垮台了，二七公社胜利了，要紧紧掌握斗争大方向，二七公社要做送枪的模范。","type":"paragraph"},{"text":"康生同志、戚本禹等同志指示：","type":"paragraph"},{"text":"你们那里有乱打枪的现象，治安不好，人心惶惶，同志们要共同加以制止。","type":"paragraph"},{"text":"（未经本人审阅，仅供内部参考）","type":"appellation"},{"text":" 河南二七公社省直革联宣传部1967.9.7开封八·二四宣传级翻印1967.9.23","type":"paragraph"}],"comments":[],"origin":"河南二七公社省直革联宣传部1967.9.7\n          开封八·二四宣传级翻印1967.9.23","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"戚本禹","type":"人物"},{"name":"吴法宪","type":"人物"},{"name":"康生","type":"人物"},{"name":"刘建勋","type":"人物"},{"name":"河南文革","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e0eeaac54c"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
