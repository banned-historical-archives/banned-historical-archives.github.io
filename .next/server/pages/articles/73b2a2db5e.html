script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"西八师庄填补中坚持左倾错误　错斗财物拖延不退还","authors":[],"dates":[{"year":1948,"month":5,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"西八师庄填补中坚持左倾错误"},{"type":"paragraph","text":"错斗财物拖延不退还"},{"type":"paragraph","text":"【太行消息】据长治五区通讯员振华、录田、春喜三同志报导：西八、师庄（均系进行民主整党填补村）两村，仍坚持左倾错误不马上纠正，对领导生产十分轻视。该区在本月十日召开生产工作组会议，据张开肉同志谈：西八村经过两次划阶级，已知道在过去划的三十二户地主富农中，有中农十九户，是在去年审查负担时错划为富农的；他们的粮食一律被没收；三十二户共没收粮食三万五千八百八十一斤，不但顶了贫农应缴纳的公粮，相反贫农还分得不少粮食；贫农宋秀林一户就分得五百多斤。但是地主富农和错斗中农，今春却有二百多人没饭吃；工作组只领导群众借给粮二十余石救济，可是还有三十多石粮及不少果实在存放着。错斗中农的东西（如没分散的粮、衣等），也不立即退还；错斗了中农石乞的牲口至今还被村合作社用以磨粉；这牲口每日赚的半升工资，也是分给贫雇。工作组对上述严重左倾错误，还要推到农代会成立、划好阶级，经农代会决定再退还错斗中农的果实；这样使该村群众生产情绪很低，中农普遍反映：“瞎胡种上就算啦”。但工作组也不理睬。又据区干冯松斗谈：师庄村亦同样在坚持左倾错误。他说：“区生产工作组叫我组织该村下种，我即提出错斗中农无种子等困难，动员干部解决；村干部却说：基本人（贫雇）的困难还解决不完哩！谁给他们（指错斗中农）解决？！我又给工作组王××等三四个同志商议如何组织春耕下种，人家说不管，“你去办吧”！他们忙于总结填补材料，错斗中农不纠正，放弃对生产领导，至今该村仍有一千四百多亩地没下种。”"},{"type":"paragraph","text":"【又息】陵川一区苏村，在今年正月封了二十三户门，其中很多是中农户，至今仅启封了十四户；政治主任的门也被封啦！错封中农门后，将粮食农具都集中起来，并将好地抽出，留下坏地让中农种；被封门的二十三户，共抽出好地一百多亩。至今错封中农门时所没收的东西及抽出的好地均没退还或补偿，群众生产很没劲，互助组也没组织起来。据该区副区长谈：近即将到该村解决这一问题。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"73b2a2db5e"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
