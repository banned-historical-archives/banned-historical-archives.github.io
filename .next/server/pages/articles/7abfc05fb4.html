script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"检查整党中左倾错误  认识了打人不对  我们每天反对封建自己就不该乱打人","authors":[],"dates":[{"year":1948,"month":5,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"检查整党中左倾错误"},{"type":"paragraph","text":"认识了打人不对"},{"type":"paragraph","text":"我们每天反对封建自己就不该乱打人"},{"type":"paragraph","text":"【平顺消息】五区东禅工作组初步检讨纠正土改中左倾错误后，接着又检查这次整党中的偏向。李合则说：“我对打人思想就没得到彻底解决。只认识今后不要打农民，打地主富农还没啥。在鹿家庄会议上研究东禅村工作时，我就认为地主富农出身的坏干部必须叫群众打。所以一来东禅村听到程曹锁不少坏事，群众叫他一手三颗印的活阎王，贪污果实百万元，群众对他无不害怕。为了发动群众，就让群众打了他一顿，将他扣到区公所。领导上提出打人不对，解决不了问题，但我总想不打人也解决不了问题。群众起来打他时，我还踢了他一脚。我这是没按政策办事，影响没过关那几个同志也害怕起来，对全区全县也起了坏作用。”曹来水等同志说：“我们虽没有亲自动手打人，但思想上没有反对打人，是随声附和。一开始那几天，对每个党员都是核桃枣一类数，连一片好脸都没给过他们。”经过大家初步反省，明确认识是犯了原则错误，不仅吓得程曹锁一点也不敢认错，还用命来顶，一部分和曹锁有关系的也害了怕，不敢说了。特别是四外邻村干部正在怕吃打，躺倒不起时，这样使他们更加恐慌，给少数报复分子钻空子打击干部造成机。会经过检讨，大家决心纠正，忠忠实实按照党的政策办事，并在群众中作反省，要使全区及时纠正过来。接着就召集党员与贫农团及中、贫农整党代表会议，检查总结第一次整党的优缺点。大家都认为整党目的是把党整好，叫他好好领导群众，不是打倒，叫他起不来。"},{"type":"paragraph","text":"关于打人问题，王圈则说：“整党讲真理，咱村卅五个党员解决问题，就连态度都没要，问题也大部都搞清了。咱们前几天打曹锁，结果落了个一场空。”王住胜反驳说：“八路军是不打好人，象程曹锁，光打还不行。”这时会场展开了辩论。工作员提出意见，不赞成打人，将理由提出来。妇女程二花说：“咱们每天反对封建，又反对坏干部打骂群众，不民主，咱们贫农团是民主模范，不让屈了一个人，咱要再随便打人，还不和旧干部一样吗？”牛曹喜老汉说：“我过去吸金丹赌博、也受过旧政府好多处罚；但吸的人一天比一天多，八路军来了，不打不骂讲政治，咱村现在谁还吸？”王成孩说：“程曹锁吃打，结果闹了个啥？外村干部都说咱东禅村打人，吓的躺倒不工作，你们说这帐叫怎算？”王改芝意见也是这样，坏干部要教育，如果罪太大，送人民法庭按法令处理。全场绝大多数群众拥护这样做。只有二人思想不通，工作组负责同志诚心诚意的叫他们向不打人的去学习。并提出今后保证党员执行党的政策，有错误让群众随时批评，提高了大家信心。"},{"type":"paragraph","text":"（东禅村工作组）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7abfc05fb4"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
