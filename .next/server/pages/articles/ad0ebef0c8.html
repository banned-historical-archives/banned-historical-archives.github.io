script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"金日成同志接见中国共产党代表团  同张春桥团长等进行了极为亲切友好的谈话，并设午宴招待代表团","authors":[],"dates":[{"year":1975,"month":9,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"金日成同志接见中国共产党代表团"},{"type":"paragraph","text":"同张春桥团长等进行了极为亲切友好的谈话，并设午宴招待代表团"},{"type":"paragraph","text":"新华社平壤一九七五年九月二十四日电　朝鲜人民的伟大领袖金日成同志，九月二十四日上午接见了以中共中央政治局常委张春桥为团长，中共中央委员、中共中央对外联络部部长耿飚为副团长的中国共产党代表团。"},{"type":"paragraph","text":"被接见的中国共产党代表团团员有：中共中央委员、中共辽宁省委书记杨春甫，中国驻朝鲜大使李云川，中联部副组长毛宝忠、田树千。"},{"type":"paragraph","text":"接见时在座的有：朝鲜劳动党中央委员会政治委员会委员、党中央书记杨亨燮，党中央委员会政治委员会委员、朝鲜人民军总政治局局长李用茂上将，党中央委员会政治委员会候补委员、党中央书记、国际部部长金永南。"},{"type":"paragraph","text":"张春桥同志转达了毛泽东主席、周恩来总理对金日成同志的问候。金日成同志对此表示感谢，并请张春桥同志转达他对毛主席和周总理的问候。"},{"type":"paragraph","text":"金日成同志同中国共产党代表团成员进行了极为亲切友好的谈话。"},{"type":"paragraph","text":"接见前，金日成同志同中国共产党代表团成员一起照了像。"},{"type":"paragraph","text":"接见后，金日成同志设午宴招待代表团。杨亨燮、李用茂、金永南以及党中央副部长金勇舜、外交部副部长李钟木出席了午宴。（附图片）"},{"type":"paragraph","text":"朝鲜人民的伟大领袖金日成同志，九月二十四日上午接见了以张春桥为团长、耿飚为副团长的中国共产党代表团。图为接见时金日成同志和张春桥同志热烈握手。新华社记者摄（传真照片）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"张春桥","type":"人物"},{"name":"耿飚","type":"人物"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ad0ebef0c8"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
