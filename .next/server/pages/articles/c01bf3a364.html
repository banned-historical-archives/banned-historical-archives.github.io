" crossorigin="">{"props":{"pageProps":{"books":[{"id":"45f85d41-2767-49bc-87e9-ba331b429fce","name":"毛泽东思想万岁（1961年-1968年）","internal":true,"official":false,"type":"pdf","author":"","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives3/main/45f85d41-2767-49bc-87e9-ba331b429fce.pdf"],"article":{"title":"谈报纸革命化问题","alias":"","parts":[{"type":"paragraph","text":"谈报纸革命化问题"},{"type":"paragraph","text":"（一九六四年一月二十日解放日报总编辑"},{"type":"paragraph","text":"魏××在解放日报编委会上傅达）"},{"type":"paragraph","text":"毛主席认为，办好报纸的根本问题，是报社人员的革命化问题。革命化就是肃清一切封建思想、资产阶级思想影响的问题。有些错误思想是容易看得出来，有些就不容易看出来，比如文汇报的《胆与识》一文错误容易看出来。)按：此文表扬“年青一代”敢于批评将军。）不革命化的另一表现是头脑中缺乏证法，往往把问题说死了。"},{"type":"paragraph","text":"革命化是立场、观点问题。报纸究竟要宣传那些东西，究竟要系统宣传那些东西，能不能选择得好，都是革命化问题，解放日报的干部那么多，为什么写不出好东西？要革命化一定得下去，参加实际斗争的炼，要使人革命化，同时要使机务革命化。"},{"type":"paragraph","text":"报纸一定要抓思想。主席最近谈到解放日报的好处，说：“好在比较注意抓思想，比较抓思想工作。”一张报纸从头到尾都要思想化。你们（按：解放日报）过去和现在，这一点作得不够，常常把一些好的东西，当另件处理，有时候又把-一些-一般的东西当作大东西处理了。"},{"type":"paragraph","text":"依靠什么人办报？要依靠社会主义积极分子办报，好的东西应该让群众自已写。你们要善于抓住活的东西，把他提到理论高度，宣传活的哲学。报纸要有各种议论。"},{"type":"paragraph","text":"国际消息。主席说：“外宾接待消息，地方报纸可以少登一些，这样，可以让出地方求宣传活人活事活哲学。”"},{"type":"paragraph","text":"要总结报纸工作的经验。一九六四年主席对柯庆施同志讲："},{"type":"paragraph","text":"革命化的三个意思：（1）要反对封建主义、资本主义思想；（2）要下去实践，同工农结合；（3）要学习唯物瓣证法。"},{"type":"paragraph","text":"就最近日本人民反对美帝国主义的"},{"type":"paragraph","text":"爱国正义斗争发表谈话"},{"type":"paragraph","text":"（一九六四年一月二十七日）"},{"type":"paragraph","text":"日本人民在一月二十六日举行的反美大示威，是一次伟大的爱国运动。我谨代表中国人民，向英勇的日本人民，致以崇高的敬意。"},{"type":"paragraph","text":"最近，日本全国掀起了大规模的群众运动，反对美国F一105D型核飞机和核潜进驻日本，要求撤余一切美国军事基地和撤走美国武装部队，要求归还日本的领土冲绳，要求废除日美“安全条约”等等。所有这些，都反映了日本全体人民的意志和愿望。中国人民衷心"},{"type":"paragraph","text":"·81·"}],"authors":["毛泽东"],"dates":[{"year":1964,"month":1,"day":null}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":94,"page_end":94},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c01bf3a364"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
