" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji33","name":"毛泽东全集第33卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji33.pdf"],"article":{"title":"接受丹麦驻华公使格瑞杰生呈递国书时的答词","alias":"","parts":[{"type":"paragraph","text":"接受丹麦驻华公使格瑞杰生"},{"type":"paragraph","text":"呈递国书时的答词"},{"type":"paragraph","text":"（1953年12月12日）公使先生："},{"type":"paragraph","text":"我高兴地接受阁下所呈递的丹麦国王陛下的国书，并对您的祝贺表示感谢。"},{"type":"paragraph","text":"中国人民对于中、丹两国人民间商业及文化关系的发展，甚为重视，并相信这种关系的发展对于促进两国人民友谊，以及维护世界和平是有帮助的。"},{"type":"paragraph","text":"我欢迎阁下出任丹麦王国驻中华人民共和国的特命全权公使，并愿对贵公使旨在加强贵我两国友好关系的工作予以协助。"},{"type":"paragraph","text":"谨祝贵国国家繁荣，人民兴旺，并祝贵国国王陛下健康。"}],"authors":["毛泽东"],"dates":[{"year":1953,"month":12,"day":12}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":474,"page_end":474},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a6c015a6d0"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
