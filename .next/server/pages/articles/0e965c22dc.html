script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"美国七万五千码头工人坚持罢工四十六天  许多港口陷于瘫痪，美国垄断资产阶级损失七亿多美元  加利福尼亚州反动当局妄图以法西斯法律镇压学生运动只能激起学生们更强烈反抗","authors":[],"dates":[{"year":1969,"month":2,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"美国七万五千码头工人坚持罢工四十六天"},{"type":"paragraph","text":"许多港口陷于瘫痪，美国垄断资产阶级损失七亿多美元"},{"type":"paragraph","text":"加利福尼亚州反动当局妄图以法西斯法律镇压学生运动只能激起学生们更强烈反抗"},{"type":"paragraph","text":"新华社五日讯　纽约消息：美国东海岸和墨西哥湾的七万五千名码头工人的罢工到四日为止已经坚持了四十六天，给了美国垄断资本集团以有力的打击。"},{"type":"paragraph","text":"美国码头工人的这次罢工，使美国从东北部缅因州到南部得克萨斯州的所有港口全部陷于瘫痪状态。目前约有五百艘船只停泊在各海港内，已使美国垄断资产阶级损失了七亿多美元。美国垄断资产阶级的喉舌《华尔街日报》惊呼，这次码头工人的罢工“使美国特别使美国的对外商务受到严重打击”。"},{"type":"paragraph","text":"尽管尼克松政府的劳工部长乔治·舒尔茨最近亲自出马，一再叫嚷要“竭其所能”使工人尽快复工，并且玩弄种种花招企图破坏罢工，但是，码头工人不怕威胁，不受欺骗，仍在坚持斗争。"},{"type":"paragraph","text":"新华社六日讯　旧金山消息：美国加利福尼亚州反动当局妄图以法西斯手段镇压蓬勃高涨的学生运动，五日由这个州的州长里根宣布在加利福尼亚大学实行所谓“绝对紧急”状态。"},{"type":"paragraph","text":"从去年底今年初以来，加利福尼亚州学生反对美国种族歧视和腐朽的资本主义教育制度的斗争，蓬勃高涨，遍及全州。州立旧金山学院、东洛杉矶学院、州立圣费尔南多山谷学院、州立萨克拉门托学院和新开办的西南学院等院校的学生和教师，先后参加了这一斗争。一月二十二日，加利福尼亚大学学生也开始了反对种族歧视，争取改善黑人学生入学条件的斗争，并且于四日同前去镇压的法西斯警察进行了英勇搏斗。"},{"type":"paragraph","text":"里根在宣布在加利福尼亚大学实行所谓“绝对紧急”状态的同时，还命令加利福尼亚州的公路巡逻警察在所谓“必要时”随时支援地方警察镇压学生斗争，并且提出了一连串旨在镇压学生的法西斯法律。"},{"type":"paragraph","text":"里根的这些行动，反映了美国反动统治集团在轰轰烈烈的学生斗争面前惊惶不安和穷凶极恶的嘴脸。但是，可以肯定，反动统治集团的法西斯行径，不但扑灭不了美国的进步学生运动的烈火；相反，只能激起更大的学生斗争风暴。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0e965c22dc"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
