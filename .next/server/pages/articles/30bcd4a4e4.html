script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"大国民议会主席团颁发命令  消灭农村剥削残余","authors":[],"dates":[{"year":1959,"month":4,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"大国民议会主席团颁发命令"},{"type":"paragraph","text":"消灭农村剥削残余"},{"type":"paragraph","text":"据新华社布加勒斯特30日电　罗马尼亚农业社会主义改造已经获得巨大的成就，目前已出现农业合作化的高潮。"},{"type":"paragraph","text":"在这种形势下，罗马尼亚大国民议会主席团最近颁发命令，宣布最后消灭农村中剥削现象的残余。"},{"type":"paragraph","text":"命令指出，在许多农村中还存在着旧的生产关系的残余，尚存在富农出租部分或全部土地，以及以工资形式剥削他人的现象。命令指出，由于社会主义农业的迅速发展，废除土地的出租现象已成为客观的要求。"},{"type":"paragraph","text":"命令决定，今后禁止出租土地和在农业中以任何方式剥削他人，但在农忙时短期雇人帮助的中农和因丧失劳动力与别人合伙经营土地者，不在此例。富农过去已出租的土地应交给集体农庄和其它社会主义农业组织使用。移交出的土地可以得到相应的货币补偿。此外，剥削他人者可以提出自己和家人可能耕种和移交的土地面积。"},{"type":"paragraph","text":"命令还指出，凡违反和破坏上述规定者必须将土地无偿地移交给集体农庄和其它社会主义农业组织，并受到法律制裁。"},{"type":"paragraph","text":"命令还谈到了罗马尼亚党和政府在农业社会主义改造中所取得的重大成就。命令指出，目前在全国三百六十万农户中，已经有二百万以上的农户加入集体农庄和共耕社等社会主义农业组织。整个农业的社会主义部分（包括国营农场）的土地面积已达八百四十万公顷以上，占农业总耕地面积的60％以上。现在，全国各地已出现了农业合作化运动的高潮。在康斯坦萨州已全部实现了合作化，加拉齐、底密索拉和其它州目前正很快地向全部合作化前进。"},{"type":"paragraph","text":"命令说，在1956—1960年期间国家在农业方面的投资达一百一十亿列伊。1959年国家将再供给农村九千一百五十辆拖拉机、四千七百台联合收割机、六千二百台播种机和其它农业机器。到1960年农村将拥有五万八千台拖拉机。"},{"type":"paragraph","text":"命令还指出，国家将逐年增加对兴修农田水利的拨款。化学工业也将向农村提供大量的化学肥料和其它产品，从而促使农业增产。命令指出，国家还将向农村输送大批技术干部。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"30bcd4a4e4"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
