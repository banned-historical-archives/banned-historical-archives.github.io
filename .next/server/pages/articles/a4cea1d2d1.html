script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"西北大学和西安师范学院批判资产阶级唯心主义","authors":[],"dates":[{"year":1955,"month":3,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"西北大学和西安师范学院批判资产阶级唯心主义"},{"type":"paragraph","text":"西北大学和西安师范学院已有计划地展开关于批判胡适的资产阶级唯心论观点和胡风的资产阶级文艺思想的学习和讨论。"},{"type":"paragraph","text":"目前，西北大学中国语言文学、历史等系和政治课各教研组教师都已开始学习有关文件。政治课各教研组的教师并已举行过初步批判胡适思想的座谈会。西安师范学院的教师们也正在学习文件。"},{"type":"paragraph","text":"西北大学在学习和讨论中，准备以中国语言文学、历史、经济、法律等系和政治课各教研组为重点，结合业务分别批判表现在政治、哲学、历史及文学等方面的胡适反动唯心论观点。西安师范学院也订出了开展批判胡适反动唯心思想的计划，教师们将普遍学习和讨论有关批判胡适的反动的哲学、政治和文学思想的文章，教育系教师在学习中并准备进一步批判杜威的反动教育思想。（新华社）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a4cea1d2d1"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
