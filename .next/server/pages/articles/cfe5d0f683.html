script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"日本《毛泽东思想研究》号召日本人民在斗争中统一行动  同世界革命人民团结起来粉碎美帝苏修阴谋  中国文化大革命的伟大胜利是对世界革命运动的极大支持","authors":[],"dates":[{"year":1969,"month":2,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"日本《毛泽东思想研究》号召日本人民在斗争中统一行动"},{"type":"paragraph","text":"同世界革命人民团结起来粉碎美帝苏修阴谋"},{"type":"paragraph","text":"中国文化大革命的伟大胜利是对世界革命运动的极大支持"},{"type":"paragraph","text":"新华社一日讯　东京消息：日本《毛泽东思想研究》二月号发表了题为《世界革命人民面对着新时代的黎明》的社论，号召日本各阶层人民、各战斗的革命组织，在斗争中要统一行动，在一九六九年中奋勇前进。"},{"type":"paragraph","text":"社论说：“中国共产党第八届扩大的第十二次中央委员会全会，不仅是中国历史上的划时代的事件，而且也是世界人民历史上划时代的事件。"},{"type":"paragraph","text":"“这次全会的胜利，不仅夺回了被刘少奇为代表的资产阶级代理人所篡夺的权力，空前地加强了中国的无产阶级专政，取得了中国无产阶级文化大革命伟大的决定性的胜利，而且，对全世界真正的马克思列宁主义者和革命人民也是不可估量的鼓舞，对全世界革命运动和民族解放斗争也是极大的支持。”"},{"type":"paragraph","text":"社论说，这个胜利是毛泽东主席和毛泽东思想对国际共产主义运动的伟大贡献，同时也是对以美国为首的帝国主义及其追随者各国反动派和以苏修叛徒集团为中心的现代修正主义的巨大的沉重打击。"},{"type":"paragraph","text":"社论引用林彪副主席的话说：“毛泽东思想是在帝国主义走向全面崩溃，社会主义走向全世界胜利的时代的马克思列宁主义。毛泽东思想是反对帝国主义的强大的思想武器，是反对修正主义和教条主义的强大的思想武器。”社论接着指出：“一九六八年是在包括日本在内的全世界范围内无可辩驳地证明了林彪副主席这个简明的正确的论断的一年；一九六九年无疑也必将是在全世界范围内进一步为这个真理作出证明的光辉灿烂的一年。”"},{"type":"paragraph","text":"社论谈到日本进步学生运动时指出，学生们的斗争锋芒尖锐地指向美帝、苏修。我们绝不容许对学生们在当前日本革命中所起的伟大的先锋作用毫不关心。"},{"type":"paragraph","text":"社论说，一九六九年，随着学生斗争的发展，工人、农民和广大市民阶层的反美斗争必将进一步大规模地发展。日本各阶层人民广泛的反美反修爱国斗争，无疑将出现一个宏伟的局面。"},{"type":"paragraph","text":"社论号召日本各阶层人民更广泛更大规模地投入当前反美反修爱国斗争。正在为反美反修爱国斗争而共同战斗着的从各阶层人民中间产生的无数个各种各样的战斗的革命的组织，在斗争中要统一行动、统一阵线，同时通过大胆而坦率的批评与自我批评，从理论上解决谁是敌人，谁是朋友这个当前革命斗争的最重要的课题，尽快地实现思想上、政治上的统一。"},{"type":"paragraph","text":"社论说：“只有这样，我们才能同以中国共产党和中国人民为首的全世界真正的马克思列宁主义者和全世界革命人民进一步牢固地团结起来，在全世界结成广泛的统一战线，从而参加粉碎美帝国主义和苏联现代修正主义称霸世界的阴谋的雄伟的国际革命斗争。”"},{"type":"paragraph","text":"社论最后号召日本人民：“高举毛泽东思想伟大红旗，在这个光辉的时代中奋勇前进！”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cfe5d0f683"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
