<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"chuanxinlu1","name":"十年文革中首长讲话传信录（上册）","internal":false,"type":"pdf","official":false,"author":"周良霄,顾菊英","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/十年文革中首长讲话传信录1.pdf"],"article":{"title":"刘志坚在首都第三司令部成立大会上的讲话","parts":[{"type":"title","text":"109．刘志坚在首都第三司令部成立大会上的讲话"},{"type":"paragraph","text":"(1966年9月6日)"},{"type":"paragraph","text":"首都大专院校红卫兵同志们：你们好！"},{"type":"paragraph","text":"我们是来祝贺你们今天的大会的，我们是来支持你们大会的，要向大家说明一点的是：江青同志身体有病，心脏病发了，起不来，不能来参加今天的大会。我们也都在开会，谢富治同志本来想来，他正在主持会议，不能来，总理也正在开会，不能来。我代表江青同志、杨成武同志、谢富治同志以及在座的几位同志向你们致以无产阶级文化大革命的敬礼。(掌声)"},{"type":"paragraph","text":"毛主席教导我们，无产阶级文化大革命，党的八届十一中全会，十六条规定你们的任务是，一斗二批三改。同志们看过吗？(看过)我们要进行革命，首先要分清敌友，谁是我们的敌人？谁是我们的朋友？然后要组织革命队伍，要走阶级路线，对吗？(对！掌声)今天参加大会的大多数是红五类子弟，你们要根据十六条，团结要革命的同志，团结大多数，对吗？(对！)主席要我们学习解放军。解放军是毛主席亲自缔造的，这几年在林彪同志的领导下，高举毛泽东思想伟大红旗，突出政治。主席在井冈山上就订了三大纪律八项注意，三八作风。要向解放军学习，学习毛主席和林彪同志指导革命的法宝，因为这些法宝战胜了国内外一切敌人。"},{"type":"paragraph","text":"我现在代表总理、江青同志来参加大会，是总理命令我们来的。建议由公安部杨奇清同志(副部长)当你们的顾问，好不好？(好！热烈鼓掌)由杨成武、郑维山(北京军区副司令)和我当你们的辅导员，好不好？(好！热烈鼓掌)杨成武同志在开会，没有来，请原谅。"},{"type":"paragraph","text":"回忆起来，我参加革命的时候，年纪比你们还小，水平比你们还低，我们只知道革命！要造帝国主义的反！造封建主义的反！造官僚资本主义的反！要跟毛主席走！(鼓掌)你们现在水平比我们高多了，因为毛主席在身边指导你们，你们很幸福。(掌声)我们要把无产阶级文化大革命进行到底。我们要读毛主席的书，听毛主席的话，照毛主席指示办事，做毛主席的好学生。"},{"type":"paragraph","text":"回想起来，在第二次国内战争时期，有第一方面军，第二方面军，第四方面军。在抗日战争时期，有抗日八路军、新四军。在解放战争时期，有第一野战军，第二、第三、第四野战军。我为什么要讲这些东西呢？因为现在首都成立了第一司令部、第二司令部、第三司令部，只要你们按主席思想办事，是革命的，我们就坚决支持！(热烈鼓掌)"},{"type":"paragraph","text":"在解放军里，入伍后第一天，就要学习的主席语录是：“我们都是来自五湖四海，为了一个共同的目标走到一起来了......”应该团结起来，你们赞成吗？(赞成！鼓掌)"},{"type":"paragraph","text":"在毛泽东思想的伟大红旗下，要象过去的一、二、四方面军，象第一、二、三、四野战军一样，在革命的大方向一致下，就是在毛泽东思想伟大红旗下，团结起来好不好？(好！)我们自己要把我们的力量团结好，把敌人最大限度孤立起来，这样才能把敌人打倒，对不对？(对！掌声)首都革命的红卫兵成立后，希望你们按毛主席思想，按十六条，按林副主席8月18日、8月31日的讲话，按总理8月31日讲话，按《人民日报》社论好好学习，相信你们一定能把无产阶级文化大革命进行到底！(掌声)相信你们一定能够完成一斗二批三改的光荣任务！(掌声)取得文化大革命的彻底胜利！"}],"authors":["刘志坚"],"dates":[{"year":1966,"month":9,"day":6}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":159,"page_end":160,"alias":""},"tags":[{"name":"谢富治","type":"人物"},{"name":"江青","type":"人物"},{"name":"杨成武","type":"人物"},{"name":"刘志坚","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"feacf2569d"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
