<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"在南非的殖民剥削","authors":["柳门"],"dates":[{"year":1959,"month":11,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"在南非的殖民剥削"},{"type":"paragraph","text":"柳门"},{"type":"paragraph","text":"南非联邦是美英垄断资本集团在非洲的一棵摇钱树。今年4月，南非联邦高级专员万·尔金在一篇公开报告中透露了殖民者对南非掠夺和剥削的规模。"},{"type":"paragraph","text":"从有可靠记录起到1957年底止，帝国主义者在南非掠夺的矿产品的总值达五十六亿英镑之多，合一百六十亿四千万美元。帝国主义者是从十九世纪中叶就开始大规模开采南非矿产品的。因此，如果把一个世纪来英镑不断贬值的情况计算在内，帝国主义掠夺的总数应当大大超过六十五亿英镑的数目。"},{"type":"paragraph","text":"南非的矿产品主要是黄金。黄金的出口额占南非全部出口品总值的40％。自从十九世纪七十年代在魏特瓦特散德地区发现大金矿时算起，南非联邦共出产黄金达五亿八千万英两，总值四十亿英镑。由于多年来大规模地掠夺。南非金矿矿井都深入地下，最深的矿井竟深入地层一万一千英尺，因此工人劳动条件特别艰苦。目前，魏特瓦特散德矿藏已被掠夺殆尽，但其他地区金矿藏量仍然很丰富。据估计，在本世纪内，南非黄金产量仍将会继续上升。"},{"type":"paragraph","text":"放射性物质原料是南非另一重要出口物资。1957年，放射性物质原料出口总值是四千九百八十万英镑。南非的铀矿石出口价格远比国际市场价格为低。根据南非当局和美英两国的协定，在十年内，氧化铀应全部供应美英两国，主要是美国。"},{"type":"paragraph","text":"南非也盛产金刚石。1867年，南非即发现金刚石并开始发掘。1955年，仅加工过的饰用金刚石产量即达十万八千克拉，总值七百五十万英镑。美英两国除了在金刚石矿有大量投资外，而且通过“金刚石生产者协会”和“中央销售组织”控制国际市场金刚石价格。"},{"type":"paragraph","text":"除上述矿产品外，1957年南非其他矿产品出口有：铬铁矿石三百五十万英镑、精炼铅一千零六十万英镑、粗铜七百五十万英镑、煤一百四十万英镑、石棉一百万英镑。南非锑矿产品也很丰富。1957年南非共生产锑矿石一万四千多吨，产值为八百五十多万镑。南非锑矿产量目前仅次我国，居世界第二。"},{"type":"paragraph","text":"美英垄断集团依靠对非洲千万工人的残酷剥削，得到了数以十亿英镑计的利润。南非当局不仅通过它的“土著劳动组织”来强迫南非本地非洲工人进行奴隶劳动，而且不断从莫三鼻给、巴苏陀兰、贝专纳、尼亚萨兰、北罗得西亚等地诱骗非洲工人去南非充当奴隶工人。英国和葡萄牙殖民当局也靠这种奴隶出口买卖每年榨取了巨额利润。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"60d545dc70"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
