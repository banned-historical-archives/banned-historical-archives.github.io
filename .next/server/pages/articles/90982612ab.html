<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"毛主席挥手我前进","authors":["余文军"],"dates":[{"year":1968,"month":9,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"上海柴油机厂　余文军"},{"type":"paragraph","text":"毛泽东思想的灿烂阳光，照红了祖国大地。看今朝，祖国的山河，那一处不在欢腾，那一地不传佳音，一个伟大的斗、批、改的高潮已经到来，文化大革命的洪流，奔腾呼啸，滚滚向前。"},{"type":"paragraph","text":"这天，上海柴油机厂又一次沉浸在欢乐之中，从厂门口直伸展到黄浦江边的中央大道上，人群熙攘，人们跳跃。他们欢呼又一批工人毛泽东思想宣传队将从这儿出发去投入新的战斗了!持续不断的锣鼓声，带着人们的一颗颗红心，越过千山万水，飞向北京城，向我们伟大领袖毛主席报喜讯，献忠心，表决心。"},{"type":"paragraph","text":"在两个阶级、两条道路、两条路线展开激烈搏斗的无产阶级文化大革命中，上柴厂曾经是一个全市瞩目的战场，经过了阶级斗争的暴风骤雨的考验，一支坚强的无产阶级革命派的队伍已经茁壮地成长、壮大起来了。而今，我们伟大领袖毛主席发出工人阶级必须领导一切的伟大号召后，上柴厂的无产阶级革命派热烈响应。坚决执行，把一批批的骨干输送到各条战线，完成毛主席交给工人阶级的伟大历史使命。他们已经派出了八百多名优秀的革命造反派战士，怀着让毛泽东思想占领一切阵地，用工人阶级的面貌来改造一切的雄心壮志，“杀”进上层建筑领域里的各个单位。你听，到文艺团体、大专院校的同志说:“我们工人阶级就是要领导学校，掌握文权，管好笔杆子。”到机关去的同志说:“那种机关老爷作风，在我们手里一定要彻底改变。”到“老大难”单位的同志说:“老大难，老大难，有了毛泽东思想就叫它什么也不难。”你听，“针插不进的，我们工人阶级要插，水泼不进的，我们工人阶级要泼，工人阶级就是非要领导一切不可”，“有毛主席为我们撑腰，我们就天不怕，地不怕!”听着这些豪言壮语，怎么不叫人浑身是劲，热血沸腾!"},{"type":"paragraph","text":"进驻复旦大学的工人宣传队的战士们，一进学校，把厂里的“抗大”作风带进了学校，第二天天还蒙蒙亮，一支支队伍就绕着校园跑步出操，下午又冒着炎热，拎着铅桶，拿着扫把，为学校打扫厕所、走道。复旦的校园，来了这么一支生气勃勃的队伍，顿时显示出热气腾腾的景象。很快，他们又把学生们也组织了起来，举办了一个又一个“抗大”式学习班。"},{"type":"paragraph","text":"一大批骨干到各处去宣传毛泽东思想了，厂里的革命和生产怎么办?还是先看一看从各车间送到战斗指挥部——厂革委会的胜利捷报吧!"},{"type":"paragraph","text":"柴油机车间提前五天完成生产任务；油泵车间提前二天完成生产任务；全厂九月份的总产值达到工厂历史上的最高水平。"},{"type":"paragraph","text":"冷锻车间自行设计双动四六○吨油压机制造成功，柴油机车间“射流”自动控制柴油消耗量设备装置成功……"},{"type":"paragraph","text":"工具车间，铸工车间，试验车间等工人调查组纷纷成立，一个调查研究的群众运动已经在全厂掀起，各种班组批判会开得轰轰烈烈。"},{"type":"paragraph","text":"最近，上柴厂选派了三名工人代表去北京参加国庆观礼。这一特大喜事极大地鼓舞了全厂工人，他们斗志更旺，决心要创造出新的成绩向国庆献礼，报答毛主席的关怀。"},{"type":"paragraph","text":"看到了这一派欣欣向荣的景象，担心厂里工作会受到影响的想法早就烟消云散了。留厂的革命职工们说:“他们到前方去战斗，我们在后方的要继续挑起革命生产两副重担”，“用实际行动支持工人宣传队，就是要加强‘根据地’建设”。"},{"type":"paragraph","text":"呵，又一批出发的工人宣传队的队伍集合了。看，一个个英姿焕发，斗志昂扬，迎着东方升起的太阳，踏上了新的征途，朝着被火红太阳照着的道路，前进，永远前进!"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"90982612ab"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
