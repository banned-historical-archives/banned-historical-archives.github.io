script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"扫清帝国主义文化侵略影响燕京大学师生向资产阶级思想开火!","authors":[],"dates":[{"year":1952,"month":2,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【北京专讯】在反贪污、反浪费、反官僚主义运动中，燕京大学师生对长期遗留在该校的帝国主义文化侵略的影响和资产阶级的腐朽思想，展开了严肃的批判和斗争。"},{"type":"paragraph","text":"从该校群众揭发出的事实和一些教师的检讨中，可以看出美帝国主义文化侵略的影响，在该校不少教师思想上还是根深蒂固的。有的教师从教学思想到日常生活，无不表现出资产阶级思想；还有的教师甚至有严重的敌我不分的行为。如外文系有些课程的内容，仍是美英资产阶级的腐朽文学，二年级还选读福尔摩斯侦探小说。新闻系某些课程也是按照资产阶级的观点来讲解的。其他各院系的课程，特别是文法学院，都还保持着美帝国主义文化侵略影响的污臭内容。"},{"type":"paragraph","text":"西语系教师在解放后还把过去的系主任柯安喜当作“良师益友”，当柯安喜一九五○年回美国时，全系师生还为她送行，送她题有“春风化雨，惠我孔多”的锦旗；而柯安喜就是曾亲笔草拟美帝国主义的文化侵略计划“关于在华英语教学的组织与指导的建议”的帝国主义分子。解放前的教育系，一向被美帝国主义分子夏仁德所把持。在抗美援朝运动开展以后，夏仁德曾在美国“纽约时报”发表一篇文章，说“美国化许多钱办‘美国之音’还不如多办几个燕京大学。”但教育系教授对夏仁德竟不痛恨；甚至有许多教师还念念不忘“夏先生”；有的教授在去年五月以前还与夏仁德保持通信联系。"},{"type":"paragraph","text":"更严重的是，该校庶务课竟还完好地保存着美国国旗、国民党“国旗”，并且还存放着司徒雷登等帝国主义分子的东西。"},{"type":"paragraph","text":"这些严重的敌我不分的事实和资产阶级的教学思想被揭发以后，受到广大师生的严正批判。一部分未与帝国主义分子划清界限、不认识资产阶级向人民猖狂进攻的教师，现在也恍然大悟；他们在党的帮助和群众推动下，作了检讨。劳动系教授赵承信沉痛地检讨了自己在一九五○年下半年，还把中南区工矿调查的图片寄到美国去的严重事件；化学系教授蔡镏生，也着重检讨了自己在解放后还把论文寄到美国去发表的严重错误；吴兴华、耿耀西、徐献瑜等人都接受群众的意见，作了诚恳的检讨，因而得到群众的欢迎。但是，还有个别的教师，如历史系的聂崇岐、心理系的沈迺璋等人，一贯打击进步教授，在运动中不但不肯作深刻检讨，甚至散布反动言论，抗拒运动，已受到广大师生群众严正的批评和指责。"},{"type":"paragraph","text":"现在，燕大的运动已取得初步的胜利，逐渐走向高潮。一些过去被校内许多人认为是学习榜样的资产阶级思想的“旗帜”倒下来了。该校广大师生群众一致要求在燕大彻底清除帝国主义文化侵略的影响和资产阶级腐朽思想，坚强树立无产阶级思想在学校中的领导权；并诚恳地要求教师们能在这次运动中改造自己，做一个名符其实的人民教师。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2360b0653a"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
