script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"日共《赤旗报》指出不容模糊谁是和平的敌人严斥修正主义分子认贼作父肯尼迪推行“和平战略”给修正主义者打气企图在社会主义阵营中煽动反革命","authors":[],"dates":[{"year":1963,"month":7,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京21日电】　东京消息:日本共产党机关报《赤旗报》在20日和21日连续刊载题为《和平的敌人是否不清楚?》的文章，驳斥修正主义分子和右翼社会民主主义分子所谓日本禁止原子弹氢弹运动不应指出和平敌人的谬论。"},{"type":"paragraph","text":"文章指出，伪装成“和平的朋友”的肯尼迪的两面政策，在散布对美帝国主义的幻想、给修正主义者和改良主义者打气方面起了一定的作用。肯尼迪6月10日在华盛顿美利坚大学发表的演说，是肯尼迪两面手法的典型表现。"},{"type":"paragraph","text":"文章指出，“在肯尼迪的甜言蜜语里，很容易找出帝国主义好战政策的辞句。”肯尼迪表示，他打算在社会主义阵营中煽动反革命，把已取得独立的国家重新置于美帝国主义的统治下，使资本主义在社会主义国家中复辟。"},{"type":"paragraph","text":"连资产阶级的新闻记者也知道，肯尼迪是选择中苏两国共产党会谈的时机发表他的所谓和平演说的，这是打算离间苏联和中国。自称是苏联问题专家的施瓦兹曾出谋献策说，关于中苏争执，美国政府应当向苏联提出建议，保持美苏两大国对全世界的霸权。"},{"type":"paragraph","text":"文章强调指出，在对美帝国主义作估计的时候，必须观察肯尼迪政府实际上的所做所为而不是听它嘴上说什么。"},{"type":"paragraph","text":"文章指出，在欧洲，美国正在加紧推行它的核战略。在亚洲，美国的战争政策更为露骨。"},{"type":"paragraph","text":"文章问道:“我们在哪里能够找到反党修正主义者所谓的美帝国主义改变了和他们对人类的命运具有责任感呢?”"},{"type":"paragraph","text":"文章指出:当日本正在变为美国核武器基地的时候，日本禁止原子弹氢弹运动如果不阐明谁是和平的敌人这一问题、如果采取关于核武器同全人类对立的错误方案，就不能完成它对日本人民和世界其他地区人民所负的责任。"},{"type":"paragraph","text":"因此，应当与之斗争的和平的敌人是十分清楚的，模糊谁是和平的敌人这一问题就是放弃斗争。"},{"type":"paragraph","text":"文章最后号召人民揭露肯尼迪的两面政策所表现的种种欺诈手法，不断阐明谁是和平的敌人。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1231727df0"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
