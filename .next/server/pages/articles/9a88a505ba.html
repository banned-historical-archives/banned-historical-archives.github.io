script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共中央关于立即抓紧“三反”斗争的指示","authors":[],"dates":[{"year":1952,"month":1,"day":4}],"is_range_date":false,"parts":[{"text":"中共中央关于立即抓紧“三反”斗争的指示","type":"title"},{"text":"中央和军委各部门，中央人民政府各党组；各中央局，并转分局、省市区党委；各大军区，志愿军，并转各级军区：","type":"appellation"},{"text":"请你们立即抓紧“三反”斗争，缩短学文件的时间（有四五天就够了），召开干部会，限期（例如十天）展开斗争，送来报告，违者不是官僚主义分子，就是贪污分子，不管什么人，一律撤职查办。在干部会上应指名批评落后的单位及其领导人，指名奖励做得好的单位及其领导人，宣布撤职的名单及理由。中央直属总党委于十二月三十一日下午召开党政军团群部长至处长级的数百人的扩大党委会，由薄一波、安子文等同志宣布中央决定，限期一月一日至一月十日，各院委、部、会、院、署、行、局、处及其下面的一切单位，务须发动群众斗争，实行坦白检举，于一月十一日送来报告。违者，不论部长、行长、署长、处长、局长、科长、股长或经理，一律撤职查办。并在会上指名宣布几个部是做得很好的，几个部是中等的，很多部是落后的，并指出部长姓名。〔1〕这样一来，全场振奋。当日回去，连夜开会。元旦整日开会，很多部长、副部长到一下团拜会就回去，戏也不看了。至一月三日差不多所有单位都开了坦白检举的群众会议。纷纷送来报告。这样的高级干部会议，现规定每十天开一次，除重病不得请假。估计到一月底，中央一级可以基本上解决问题。这一经验，供你们参考。此外，中央已指定薄一波同志（他是中央节约检查委员会主任）用电话和各大区负责同志联络，在目前“三反”紧张时期，每三天至五天通话一次，检查各区“三反”进度。中央此电，连同薄一波同志给毛主席的信〔2〕及中央财政部党组第四号报告，〔3〕均可在党刊上发表。","type":"paragraph"},{"text":" 中    央一九五二年一月四日","type":"paragraph"},{"text":"〔1〕此处编者有删略。","type":"paragraph"},{"text":"〔2〕指薄一波一九五二年一—月三日为报送财政部党组关于“三反”运动的报告写给毛泽东的信。信中提出了四个问题：（一）有的国家机关工作人员同私商勾结，使国家受损失，私商肥起来；（二）化大公为小公，挪用巨款，已成为有机关生产的部门的通病；（三）财经机关最可怕的还是掌握审批权限的部门发生官僚主义，一不小心即造成巨大损失；（四）中财委发动群众的主要一条经验是首长彻底作自我检讨。","type":"paragraph"},{"text":"〔3〕指财政部党组一九五二年一月二日关于“三反”运动的报告。","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"薄一波","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9a88a505ba"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
