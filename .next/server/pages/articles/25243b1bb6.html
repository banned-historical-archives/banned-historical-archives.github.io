<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"让伟人精神教育后代——记韶山毛泽东同志纪念馆","authors":["吴兴华"],"dates":[{"year":2003,"month":12,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"让伟人精神教育后代"},{"type":"paragraph","text":"——记韶山毛泽东同志纪念馆"},{"type":"paragraph","text":"本报记者  吴兴华"},{"type":"paragraph","text":"1964年，湖南韶山设立了毛泽东同志纪念馆，陈列毛泽东的生平业绩。几十年来，韶山毛泽东纪念馆累计接待观众4000多万人次，教育了一代又一代人。"},{"type":"paragraph","text":"这个著名纪念馆管理着毛泽东故居、南岸、毛泽东生平业绩展览、毛氏宗祠、毛鉴公祠、毛震公祠、毛泽东铜像广场、毛泽东青少年时代塑像等纪念地和场馆。"},{"type":"paragraph","text":"纪念馆工作人员根据不同对象作侧重点不同的讲解。对于领导干部，他们着重讲解毛泽东艰苦奋斗、严于律己、一心为民的事迹；对于青少年学生，着重讲述毛主席勤奋好学、爱国成才的发展历程，并根据青少年学生不同的年龄层次和文化程度，准备了3套讲解方案：对小学生，重点讲述毛泽东青少年时代的故事，毛泽东一家六位烈士的故事，激发他们为祖国刻苦学习的热情，培育他们从小树立为祖国、为人民献身的思想；对中学生讲述上述故事时，特别注意激发他们的民族自信心、民族气节和树立正确的人生观、世界观；对大学生则重点讲述毛泽东探索救国救民真理，开辟中国革命胜利的道路的过程。这样做，收到了良好效果。贵州师大的同学听了讲解后，在纪念馆的留言簿上写道：“我们深切感受到了毛主席等老一辈革命家的奉献精神，‘没有共产党，就没有新中国’是个永恒的真理。”"},{"type":"paragraph","text":"纪念馆有革命文物25000多件。纪念馆的工作人员利用这些文物举办专题陈列，拓展陈列阵地，先后制作了《毛泽东的革命家庭》、《中南海毛泽东故居复原陈列》、《韶山风物耐人思》、《国际友人在韶山》、《毛泽东与他的儿女们》等专题陈列。"},{"type":"paragraph","text":"纪念馆工作人员从收集的毛泽东遗物中，精选出148件遗物，配置100多幅照片和文字资料，精心设计，制作成《伟人风范——毛泽东遗物展》，受到观众热烈欢迎。"},{"type":"paragraph","text":"为了扩大宣传，韶山毛泽东纪念馆的工作人员还经常到外地举办流动展览；编纂著述，宣传毛泽东思想，宣传毛泽东全心全意为人民服务的事迹。"},{"type":"paragraph","text":"从1976年开始，他们先后制作了《毛泽东同志的革命家庭和青少年时代》、《东方巨人毛泽东》、《馆藏毛泽东著作版本展》等展览，到湖北、天津、黑龙江、辽宁、吉林、河南、重庆、贵州、山东、云南、浙江、江苏、新疆、上海、广东、陕西以及湖南本省等17个省、市、自治区及澳门和新加坡等地展出，累计时间3800天，讲解1万余次，观众达500余万人次，作专题报告500余场。展览每到一地，都受到广大干部和群众的欢迎。"},{"type":"paragraph","text":"韶山有着丰富的革命史料资源和革命文物资源，韶山毛泽东纪念馆的工作人员努力挖掘这些资源，编纂文章，著书，向全国人民进行爱国主义教育。到2003年，韶山管理局共出版、发表各种研究毛泽东思想，介绍毛泽东生平业绩和韶山人民革命斗争史的书、文章400余部、篇，约400万字。"},{"type":"paragraph","text":"为增强对观众的吸引力和感染力，纪念馆不断采用新的技术手段，寻求最佳陈列效果。"},{"type":"paragraph","text":"20世纪80年代初，纪念馆开辟音像室，播放1949年9月21日毛泽东在中国人民政治协商会议第一届全体会议上的开幕词《中国人民站起来了》和1949年10月1日毛泽东在开国大典上宣读《中华人民共和国中央人民政府公告》的录音。1993年，采用热释红外开关和集成电路数字录音系统，对“开国大典”、“毛泽东遗容”置景灯箱进行了技术改造，增强了置景的现场感。1999年10月，湖南省委常委会决定投资2000万元对毛泽东纪念馆进行全面改造。这次改造，在陈列展示手段上采用了多媒体等现代技术，真实地再现了诸多历史场面，增强了感染力。今年10月1日，改造后的纪念馆对外试展。多次到过韶山的观众反映，采用许多现代技术手段后，陈列内容更加真切、生动，给人印象更加深刻。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"湖南文革","type":"人物"},{"name":"贵州文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"25243b1bb6"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
