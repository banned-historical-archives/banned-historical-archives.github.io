<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"我们坚决支持财经学院对反革命分子赵鸿翥的声讨","authors":["东北工学院教职员工学生"],"dates":[{"year":1957,"month":7,"day":17}],"is_range_date":false,"parts":[{"text":"我们坚决支持财经学院对反革命分子赵鸿翥的声讨","type":"title"},{"text":"东北工学院教职员工学生","type":"authors"},{"text":"(一九五七年七月十七日东北工学院教职员工学生全体通过)","type":"subtitle"},{"text":"我们东北工学院全体教职工学生在看到七月十六日辽宁日报和沈阳日报刊载的东北财经学院全体教职工学生的抗议书和社论以后，举行了座谈，一致愤怒斥责反革命分子赵鸿翥利用党整风的机会进行翻把和污蔑肃反的罪行。我们全院人员一致支持和声援东北财经学院教职工学生对反革命分子赵鸿翥提出的严正抗议!","type":"paragraph"},{"text":"赵鸿翥是一个血债累累，罪恶昭彰的反革命分子，本应早就归案法办的罪人，但是人民宽大了他，对其严重罪恶未予追究。在肃反运动中，未斗争他也未搜查他。人民对他可以说是仁至义尽了，但是居心险恶的赵鸿翥却趁党进行整风的时候，肆意歪曲事实，污蔑肃反运动，财经学院的同志们举出的活生生的事实，已令人信服的辩倒了赵鸿翥的谬论，我们全体教职工学生对此表示同意和支持。","type":"paragraph"},{"text":"无独有偶的是在我们东工这次“鸣放”过程中也出现一些类似赵鸿翥这样的企图趁党整风之机反把的反革命分子和一些猖狂向党进攻的右派分子。如受到宽大处理免予刑事处分，留在学校内部继续工作的反革命分子电力系副教授韩格坤在鸣放会上不顾事实的企图翻案，叫嚷着要求“平反”。右派分子陈尚烱说：“肃反错误是主要的，成绩是次要的”。右派分子许冶同说：“把对领导有意见的人当反革命嫌疑斗争。”右派分子孙文山说得更加恶毒，他说：“肃反的成绩是用许多无辜被害者的鲜血换来的……这是宁错杀三千(善良人)，不漏掉一个(反革命)”。这些企图反把的反革命分子也好，反党反社会主义的右派分子也好，他们都是切齿痛恨肃反运动的，他们异口同声的捏造、歪曲事实扩大肃反的缺点，企图以此否定肃反和通过群众运动进行肃反斗争的必要性，最后一概否定了肃反运动的伟大成绩。","type":"paragraph"},{"text":"但是，事实是不能抹杀的。反革命分子和右派分子，在事实真相面前他们就原形毕露了。经过肃反在我院共查出反革命分子、坏分子五十五名。另外还有补作结论的历史反革命分子(不以反革命分子论处)八十八名。在这些反革命分子、坏分子中有些罪恶是非常严重的。如反革命分子刘仰山系恶霸地主，解放前当过伪保长，一九四六年春与蒋匪游击队大队长唐汉卿，带领匪游击队抓我解放军战士两名，严刑拷打后将他们活埋；一九四七年七月刘仰山参加还乡团回村进行反把倒算并主谋把我村干部十二名抓去毒打后活埋；此外还强奸妇女三名。又如反革命分子刘孝书，于一九三八年二月在山东淮县参加匪游击队第二十六大队当兵，在此期间曾打死无辜群众两名，以后刘犯在二十六总队任特务长、连长期间，继续为非作歹，大肆捕杀群众，仅一次刘犯领着匪兵就活埋群众三十余名。这些反革命分子残杀无辜群众，屠杀革命战士，谁能说把这些反革命分子清查出来没必要呢？谁能说肃反没有成绩呢?此外，肃反运动还提高了我们的政治觉悟和革命警惕性。这些确凿的事实，岂是反革命分子和右派分子的歪曲污蔑所能抹杀与取消的吗?","type":"paragraph"},{"text":"因此我们说肃反运动不是糟得很，而是好得很!运动中的缺点错误是有的，但是次要的，而且这些缺点、错误已经纠正或正在纠正。","type":"paragraph"},{"text":"这些反革命分子和右派分子运用什么“宁错杀三千，不漏掉一人”等等的谬论来污蔑肃反运动，所以我们也需用事实来回击他们。","type":"paragraph"},{"text":"东北工学院在肃反运动中清查出来五十五名反革命分子和其他坏分子。另外，按照过去的政策界限应算反革命，由于全国形势的变化，对反革命分子采取了比过去更为宽大的政策，因而不把他们算作反革命分子的有三十五名，在肃反清查对象中还有补作结论的历史反革命分子和坏分子，被政府宽大处理，不以反革命分子或其他坏分子论处的三十八名，在整个肃反中被斗错的肃反清查对象只占肃反清查对象总数的百分之十一。","type":"paragraph"},{"text":"污蔑肃反运动的都是些什么样人呢?如今已经真相大白了，这就是企图翻把的反革命分子和反党反社会主义的右派分子，前者是肃反肃到他们头上，他们不仅不满，而且切齿痛恨，后者和反革命分子有着千丝万缕的联系，不仅他们的血肉牵连着，而且阴谋企图通过污蔑肃反运动来争取不明真相的人或立场不够坚定的人跟着他们走，以达到他们反党反社会主义的目的。我们全体教职工学生坚决表示，我们决不让企图翻把的反革命分子和反党反社会主义的右派分子的阴谋得逞。我们全体教职工学生完全支持东北财经学院全体师生员工撤消反革命分子赵鸿翥省政协委员，对其严重罪恶给予彻底的清算与严惩的正义要求。我们全体教职工学生以更坚决的态度来参加当前反右派的斗争，不获全胜决不收兵。我们全体教职工学生严正警告企图反扑的反革命分子和反党反社会主义的右派分子，要赶快幡然悔悟，立刻老老实实向人民低头认罪，只有如此才是他们唯一的出路。","type":"paragraph"},{"text":" 来源：1957年7月18日《沈阳日报》，选自《声讨恶毒攻击肃反的右派分子》，群众出版社，一九五七年十月。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bddcc11c86"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
