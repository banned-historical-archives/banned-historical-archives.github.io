script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"首都人民满怀崇敬心情举行各种活动纪念伟大领袖和导师毛主席逝世一周年决心在华主席为首的党中央领导下，高举毛主席伟大旗帜，把无产阶级革命事业进行到底","authors":[],"dates":[{"year":1977,"month":9,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京一九七七年九月八日电　伟大的领袖和导师毛主席离开我们已经整整一年了。首都广大干部和群众满怀对毛主席深厚的无产阶级感情，连日来纷纷前往天安门广场献花圈，广泛举行各种纪念活动。"},{"type":"paragraph","text":"天安门广场庄严肃穆。前来悼念毛主席的群众队伍，这几天从早到晚，络绎不绝。人民英雄纪念碑周围，观礼台上，金水桥畔，摆了大批花圈、花匾和花篮。人民群众怀着无限崇敬的心情，深情地思念毛主席在半个多世纪以来，领导我国人民经过艰苦卓绝的斗争，取得了新民主主义革命的彻底胜利，取得了社会主义革命和建设的伟大胜利。他们说，毛主席的旗帜就是胜利的旗帜。毛主席永远活在我们的心中。"},{"type":"paragraph","text":"在天安门广场举行纪念活动的首都人民，纷纷在毛主席像前宣誓，表示自己坚强的决心:一定要在英明领袖华主席为首的党中央领导下，高举毛主席的伟大旗帜，把毛主席开创的无产阶级革命事业进行到底。北京广播器材厂的四千多名干部职工结队而来，他们每人扎制了一朵白花，用白花组成了一幅十七米长的花匾，上面镶嵌着“伟大领袖毛主席您永远活在我们心中”的红色大字。大家怀着激动的心情在天安门前隆重举行了悼念活动。在天安门城楼前面，人民英雄纪念碑四周，毛主席纪念堂南、北门前，有大批工人、人民公社社员、解放军战士、学生、干部、知识分子和街道居民，列队举行纪念活动和宣誓仪式。有的高唱《国际歌》、《东方红》。有的朗诵怀念毛主席的诗词，表达继续革命的雄心壮志。中国人民革命军事博物馆解说队四班的十名女战士，含着热泪肃立在毛主席纪念堂前举行宣誓。中国科学院地理研究所四百多名干部、工人和科技人员，在天安门城楼红墙中央的毛主席像前宣誓说:一定要深揭狠批“四人帮”，把科研工作搞上去，为尽快实现四个现代化贡献力量!北长街居民委员会的一些白发苍苍的老人，手捧毛主席遗像来到天安门广场。他们说，我们这些从旧社会过来的人，最知毛主席的恩情，最爱英明领袖华主席，最恨万恶的“四人帮”。我们年纪大了，也要继续革命，为抓纲治国贡献力量!"},{"type":"paragraph","text":"为纪念毛主席逝世一周年，中共北京市委、市革委会直属机关和北京部队、北京卫戌区的指战员，都举行了各种形式的纪念活动。全市各工厂、农村、机关、学校、商店、街道等基层单位，有的举行纪念会、报告会，有的举行毛主席著作学习经验交流会。专业和业余文艺工作者纷纷举行文艺演出，歌颂毛主席的丰功伟绩。北京铁路分局“毛泽东号”机车组的工人们同原来在机车上工作过的老同志一起，回顾机车组三十年来的战斗历程，激动地表示:一定要永远铭记毛主席的教导，在毛主席革命路线指引下奋勇前进。十三陵水库职工列队在毛主席亲笔题字的“十三陵水库”纪念碑前，听老职工介绍当年毛主席和十万民工一起参加建库劳动的动人场面。在毛主席一九五八年亲临视察过的京郊芦沟桥人民公社，干部群众隆重召开纪念会，回忆毛主席当年视察时的幸福情景。他们说，我们要世世代代铭记毛主席的恩情，把对毛主席的无限怀念化为力量，为社会主义革命和建设作出更大贡献。全市有两千多少年儿童代表举行了集会，表示要好好学习，天天向上，做德、智、体全面发展的好学生，为在本世纪实现四个现代化的宏伟目标，准备着贡献才智和力量。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6a608f2b38"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
