<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"钱伟长全面否定苏联教育事业和中国教育改革，宣扬美国、西德和旧中国的教育制度","authors":["清华大学新清华编辑委员会"],"dates":[{"year":1957,"month":12}],"is_range_date":false,"parts":[{"text":"钱伟长全面否定苏联教育事业和中国教育改革，宣扬美国、西德和旧中国的教育制度","type":"title"},{"text":"清华大学新清华编辑委员会","type":"authors"},{"text":"编者按：资产阶级右派分子由他们的阶级本能出发，一贯地污蔑和否定苏联。他们戴了有色的眼镜，把苏联高等教育和科学技术说得无一是处，同时极力推崇美国和西德，企图纂改高等教育的方向。他们反苏的目的就是为了反党，反社会主义，反人民。","type":"appellation"},{"text":"钱伟长全面否定苏联高等教育事业","type":"subtitle"},{"text":"苏联科学技术，高等教育都落后了，苏联大学生质量低，“创造性太差”","type":"subtitle"},{"text":"(摘录自钱伟长1956年10月与樊恭烋同志的谈话，全文见第三部分。)","type":"paragraph"},{"text":"谈话是这样开始的，钱问我：“听说你要去苏联，什么时候去?”，我说“听说在苏联的进修教师，在学习上有些问题，所以要等曾昭抡付部长所领导的高等教育赴苏访问团回来才能决定。”钱就说：“不去也好，也学不到什么，不如在国内自己好好搞；我去苏联遇到一些人，都认为学不到什么，其实苏联高等学校的科学力量不强，而且不只如此，苏联整个科学力量就不强。”我问：“为什么高等学校科学力量不强?”他说：“过去苏联的高等学校里只重视教学，不重视科学研究。在1941(也许是1931，我忘了他当时谈的确切年代)前，苏联高等学校里做科学研究是非法的，当然科学研究力量很难很快生长。”他接着说：“现在苏联科学上已经各方面落后了。”………又说“再有苏联高等学校所培养出来的干部创造性太差，这和教学计划是有关系的。”","type":"paragraph"},{"text":"他说“苏联教学指导思想是反动的”","type":"subtitle"},{"text":"1956年苏共二十次代表大会以后，钱伟长大肆发表反苏言论，有一次，他对无线电系付系主任常迥先生说：“杜威的教学思想是反动的，苏联的教学思想也是反动的”。(根据清华大学教师吴佑寿揭发)","type":"paragraph"},{"text":"5月27日在市委座谈会上却又说：教学制度问题，杜威过份强调自由生长，忽视了教育改造的作用，但目前苏联和我们都过份强调了教；教学计划36小时，我认为大多。苏联专家主张40堂课，认为这样负担就能减轻。……(这些话，在语气上是反话)。","type":"paragraph"},{"text":"他说由于惰性和计划的限制使苏联技术发展潜力不大","type":"subtitle"},{"text":"1957年1月钱伟长在高教部第一次修订教学计划座谈会上的发言中说：“苏联的工程师太多了。在工业中缺乏新的技术。这是由于惰性和计划的限制。在教学中太钻毕业设计了，一切都服务于毕业设计。苏联的技术力量虽强，但发展潜力不大！”","type":"paragraph"},{"text":"他说苏联教科书的内容是“拉洋片”","type":"subtitle"},{"text":"钱伟长1957年3月在山西太原作关于科学研究报告时指责我们今天的教学法。说：“我们的教材存在着很多这样类似的情况(指片面性)，难道拉洋片拉下去吗?清华有的先生说，他的教学是在拉洋片，因为他自己也不知道在说什么，一个机器上来下去，再一个机器上来下去，难道不应该搞清楚吗?我们安于苏联的教科书吗?我想在座的同志是不会的，那为什么不工作!”","type":"paragraph"},{"text":"1957年5月在市委座谈会上的发言中说：“这几年英美科学研究在迅速发展。我们关着门翻译苏联教科书，世界的科学杂志书籍看得很少。苏联科学虽然先进，但我们翻过来的是1950年的东西，就我个人看，是落后了七、八年。”","type":"paragraph"},{"text":"他说新教学法是“紧箍咒”","type":"subtitle"},{"text":"1957年5月24日在高教部座谈会上的发言中说：“教学法是教师的紧箍咒，我反对这个名词，我一听就不要听”。","type":"paragraph"}],"comments":[],"origin":"《捍卫高等教育和科学事业的社会主义方向》，清华大学新清华编辑委员会编，1957年12月。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8a9f74cc2e"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
