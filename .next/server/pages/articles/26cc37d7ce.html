script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"希尔主席发表声明祝贺我第二次核试验成功中国原子弹是对和平的巨大贡献世界各国人民将由于中国的鼓励和支持而得到莫大鼓舞　　散布怀疑的人是美帝国主义者及其影子苏联修正主义者","authors":[],"dates":[{"year":1965,"month":5,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社墨尔本20日电　澳大利亚共产党(马克思列宁主义者)主席希尔今天发表声明，祝贺中国第二颗原子弹试验成功。"},{"type":"paragraph","text":"声明说，中国的第二次原子爆炸是对和平的巨大贡献。"},{"type":"paragraph","text":"这是一个有力的证据，证明中国人民决不会在美帝国主义面前退却，也决不会上苏联修正主义者的当。苏联修正主义者对大气层试验加以“谴责”，表示“遗憾”，并“反对”核武器扩散(这就是支持掌握在美、英、法帝国主义者手中的核武器，谴责掌握在中国手中的核武器)。"},{"type":"paragraph","text":"正是在这个时刻，当美帝国主义显得那么凶恶和危险的时候，中国的原子弹试验确实是对潜在侵略者的严正警告。"},{"type":"paragraph","text":"中国人民在必要的时候将为反对美帝国主义侵略而进行战斗以维护和平，这是毫无疑问的。"},{"type":"paragraph","text":"不管美帝国主义者策划什么不择手段的赌博，他们可以放心，世界各国人民是有办法对付他们的。"},{"type":"paragraph","text":"各国人民将由于中国的鼓励和支持以及他们知道中国的巨大力量和忠于世界各国人民的解放事业，而得到莫大的支援和鼓舞。"},{"type":"paragraph","text":"无疑，会有各式各样的人因为中国的行动而洒下鳄鱼的眼泪。那些真是怀疑的人应当想想散布怀疑的人的用心何在。散布怀疑的人是美帝国主义者自己以及他们的影子苏联修正主义者。"},{"type":"paragraph","text":"这些人假冒为善地表示抗议和叫人提出抗议。但是，纪录表明，美国总共进行了三百三十七次试验，俄国进行了一百二十七次，英国进行了二十四次，法国进行了五次。就在中国进行试验的那天，美帝国主义就对中国的第二次试验表示“遗憾”，而他们自己已进行了第三百三十八次试验，多么虚伪!"},{"type":"paragraph","text":"苏联领导人柯西金就中国的试验发表评论说，他反对扩散核武器。换句话说，他对美帝国主义者的武器和大规模试验核武器以及英法帝国主义的核武器试验感到十分高兴，而对于社会主义中国的试验却感到不高兴。"},{"type":"paragraph","text":"柯西金先生的阶级观念到哪里去了呢?显然是站在帝国主义者一边。很明显，社会主义的队伍需要团结和加强。"},{"type":"paragraph","text":"柯西金先生却在分裂和削弱他们。"},{"type":"paragraph","text":"在帝国主义横行霸道的这个世界里，澳大利亚马克思列宁主义者祝贺杰出的中国人民在第二次原子试验中取得的辉煌成就。我们非常清楚，他们的炸弹是和平的炸弹。这完全是用来对付侵略的。中华人民共和国再三说过，它不会首先使用核武器；它呼吁美帝国主义者也作出类似的保证，但是美帝国主义者拒绝了。它呼吁彻底销毁一切核武器，禁止核武器的生产和储存。这也遭到了拒绝。"},{"type":"paragraph","text":"中国取得的新的巨大成就，将鼓舞全世界人民再接再厉为反对帝国主义战争而斗争。这将给他们增添信心。这在很大程度上加强了社会主义阵营、为民族解放而斗争的人民以及资本主义国家的工人阶级和劳动人民的力量。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"26cc37d7ce"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
