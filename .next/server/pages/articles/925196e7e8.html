script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoistlegacy.de-5513","name":"东北区电信线路保护条例","author":"东北人民政府","internal":false,"official":false,"type":"unknown","files":[],"article":{"title":"东北区电信线路保护条例","dates":[{"year":1950,"month":10,"day":12}],"is_range_date":false,"authors":["东北人民政府"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"最高人民法院刑事审判第二庭, 刑事申诉工作手册, 547-548","tags":[{"name":"电线","type":"主题/事件"}],"parts":[{"type":"paragraph","text":"东北区"},{"type":"title","text":"电信线路保护条例"},{"type":"subtitle","text":"（一九五〇年十月十二日）"},{"type":"paragraph","text":"第一条 电讯线路系国家最重要的通信设施，国民均有保护使其处于完好状态之义务。"},{"type":"paragraph","text":"第二条 严禁破坏电信线路及其设施。其主犯准由当地省市政府及时处以极刑，从犯依法判处徒刑。并布告周知以警效尤。"},{"type":"paragraph","text":"第三条 为保证电信畅通，东北邮电管理局应加强技术维护，在重要干线上增加试验信号增添驻段人员，并在管理局成立保卫科，负责布置检查局内机件及线路之保安工作，指导县、区护线组织进行工作。"},{"type":"paragraph","text":"第四条 各地公安机关及其部队，应协助邮电机关进行线路保护。对屡遭偷割破坏地区及重要线路，须配备力量巡守，力求破案。"},{"type":"paragraph","text":"第五条 如电信线路发现被割，破坏，通信受阻时（特别是夜间），各级政府及公安机关须派遣武装人员及运输工具，协助邮电机关迅速修复。"},{"type":"paragraph","text":"第六条 各县交通科视当地具体情况，应指定专人与当地邮电机关取得联系，负责领导布置区内之电信线路保护事宜。县、区、村交通组织须协同邮电机关经常向群众进行宣传教育，自动爱护电信设施。"},{"type":"paragraph","text":"第七条 沿各主要电信线路（附表略）之区村，在区交通助理员及村交通委员之领导下，组织居民，成立护线小组，按区村界线划分地段，负责保护，必要时，应进行巡守。"},{"type":"paragraph","text":"第八条 担当线路巡守的居民，可免除其他公差勤务。"},{"type":"paragraph","text":"第九条 护线小组，应经常注意防止地上电线电杆，地下电线及其他有关电信设备器材遭受偷盗破坏情事之发生。如发现有偷盗破坏情形，应设法将案犯拘捕，并立即报告区、村政府或公安机关，并通知就近邮电机关。"},{"type":"paragraph","text":"第十条 村交通委员应配合公安人员，注意本村及外来可疑分子。如发现有收购或私人搬运及私藏电信线条及有关电信器材者，应予扣留，交当地政府或公安机关处理。"},{"type":"paragraph","text":"第十一条 遇有电信线路遭受风灾、水灾、荒火及其他灾害时，县、区、村政府及交通负责人员，应协同邮电机关发动群众共同抢救。"},{"type":"paragraph","text":"第十二条 凡对电信线路保护（防止线路破坏、捕获偷盗犯人等）有成绩者，得由邮电机关给予奖励（办法由东北邮电管理局拟）。如在该区、村保护段内，连续发生二次以上偷割事件者，该负责线路保护人员应受适当处分。"},{"type":"paragraph","text":"第十三条 本条例未尽事宜得随时修正。"},{"type":"paragraph","text":"第十四条 本条例自公布日起实行。"}],"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"925196e7e8"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
