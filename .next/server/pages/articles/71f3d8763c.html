script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"江青对北京市海淀区中学生的讲话","authors":["江青"],"dates":[{"year":1966,"month":7,"day":28}],"is_range_date":false,"parts":[{"text":"江青对北京市海淀区中学生的讲话","type":"title"},{"text":"江青","type":"authors"},{"text":"革命的同学们！我们小组长陈伯达，顾问康生有事退席了。其实，我要讲的话，彭小蒙（北大附中学生）已经都讲了。我要讲的是文化革命小组对你们的态度。我们坚决赞成你们这个造资产阶级反的精神，我们也相信你们能够自己组织起来，能够自己进行这场文化大革命。你们想一想，谁最了解你们？是你们自己。我就不敢说我了解你们。你们这么多人（有人说党中央，毛主席最了解你们）毛主席，党中央只了解你们这种革命精神，革命干劲，具体事情他不能一个一个了解的。太多了，国家很大，对不对？（答：对！）这个时期有很多事要办，对不对？因为我们相信你们。刚才我听到许多同学的发言，我觉得工作组不了解你们。他们都是从五湖四海凑起来的，我们同意你们的意见，建议撤销工作组，罢周杰（海淀区文化革命领导小组长）的官。你们自己完全可以成立文化革命小组，文化革命委员会或文化革命代表会议。","type":"paragraph"},{"text":"我们的无产阶级专政是牢固的，我们不怕乱。乱和治是不可分割的，那是墨守成规，乌龟爬，把你束缚在小天地里头，思想也不许解放，那是不好的。很多人递条子说：“什么集训，军训，要求那些同学回来参加文化革命。” 我们完全赞成。许多工作组都自称是党中央，毛主席亲自派来的，并说：“你们反对我们就是反对党中央，反对毛主席！”这是不对的。据我知道的没有派。就是党中央，毛主席派的工作组，也不可拿这些吓唬你们。但对工作组的成员要一分为二地看待，他们有多数是好同志，但不了解文化大革命的意义，做了不妥当的事情，错误的事情，成了运动的绊脚石。对待这样的同志，我们要说理，说服他们，我们不提倡打人，但打人也没有什么了不起嘛，以后不打就是嘛，对于工作组中另一部分犯了严重错误的或是混进我们党里的资产阶级当权派，要斗争他，要说理。你们说对不对？（对！）人的错误思想打是打不掉的，但革命风暴中出现打人的事情不是坏事。毛主席说过：“好人打坏人活该，坏人打好人，好人光荣。好人打好人是误会，不打不相识。今后不要再打人了。”","type":"paragraph"},{"text":"许多同志要求放假后，同学回校参加文化大革命，我认为这是对的，你们想想看，放假、吃饭这是两条，还有什么呢？就是要造资产阶级的反。现在有一些工作组和一些成员有意挑拨起一派学生斗另一派学生，我认为这是不对的。真正的左派在于依靠群众，充分发动群众，团结也是在斗争中逐渐团结百分之九十五。有人说，要团结百分之九十五这个问题的提法……，一开始绝对不是团结百分之九十五，有人利用团结百分之九十五这个大帽子扣在左派的头上，说你们搞宗派，不团结别人，这是不对的。任何一个革命者都要讲究策略的，这就是坚定的左派要团结广大的中间派，孤立一小撮反党反社会主义反毛泽东思想的黑帮，修正主义，资产阶级，地富反坏右。我的话就这样完了。","type":"paragraph"},{"text":"陶铸同志接着讲话：我们建议大家串联，班与班，系与系，甚至到外校去串联。群众运动就是要运，要动。说不运，不动，几个人蹲在屋子里，你看看我，我看看你，这是不行的。学生运动历来是各校串联，互相通气。","type":"appellation"},{"text":"毛主席说：当前运动的特点是什么？要有什么规律性？如何指导这次运动？这些都是实际问题……运动在发展中，又有新的东西在前头，新的东西是层出不穷的，研究这个运动的全面及其发展，是我们要时刻注意的大课题，如果有人对这些工作不作认真细致地研究，那他就不是一个马克思主义者。","type":"paragraph"}],"comments":[],"origin":"来源：一九六六年北京化工学院《红色宣传员》战斗组、北京经济学院无产阶级革命团、北京市东方红印刷厂革命造反联络处、化工部化学工业出版社印刷厂联合汇编《无产阶级文化大革命参考资料（1）》","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"江青","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]},{"id":"jqjianghua","type":"pdf","name":"江青十年讲话汇编","internal":false,"official":false,"author":"江青，本世纪初国内老左编","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/jqjianghua.pdf"],"article":{"title":"江青对北京市海淀区中学生的讲话","description":"","dates":[{"year":1966,"month":7,"day":28}],"parts":[{"text":"江青对北京市海淀区中学生的讲话","type":"title"},{"type":"paragraph","text":"革命的同学们！我们小组长陈伯达，顾问康生有事退席了。其实，我要讲的话，彭小蒙（北大附中学生）已经都讲了。我要讲的是文化革命小组对你们的态度。我们坚决赞成你们这个造资产阶级反的精神，我们也相信你们能够自己组织起来，能够自己进行这场文化大革命。你们想一想，谁最了解你们？是你们自己。我就不敢说我了解你们。你们这么多人（有人说党中央，毛主席最了解你们）毛主席，党中央只了解你们这种革命精神，革命干劲，具体事情他不能一个一个了解的。太多了，国家很大，对不对？（答：对！）这个时期有很多事要办，对不对？因为我们相信你们。刚才我听到许多同学的发言，我觉得工作组不了解你们。他们都是从五湖四海凑起来的，我们同意你们的意见，建议撤销工作组，罢周杰（海淀区文化革命领导小组长）的官。你们自己完全可以成立文化革命小组，文化革命委员会或文化革命代表会议。"},{"type":"paragraph","text":"我们的无产阶级专政是牢固的，我们不怕乱。乱和治是不可分割的，那是墨守成规，乌龟爬，把你束缚在小天地里头，思想也不许解放，那是不好的。很多人递条子说：“什么集训，军训，要求那些同学回来参加文化革命。” 我们完全赞成。许多工作组都自称是党中央，毛主席亲自派来的，并说：“你们反对我们就是反对党中央，反对毛主席！”这是不对的。据我知道的没有派。就是党中央，毛主席派的工作组，也不可拿这些吓唬你们。但对工作组的成员要一分为二地看待，他们有多数是好同志，但不了解文化大革命的意义，做了不妥当的事情，错误的事情，成了运动的绊脚石。对待这样的同志，我们要说理，说服他们，我们不提倡打人，但打人也没有什么了不起嘛，以后不打就是嘛，对于工作组中另一部分犯了严重错误的或是混进我们党里的资产阶级当权派，要斗争他，要说理。你们说对不对？（对！）人的错误思想打是打不掉的，但革命风暴中出现打人的事情不是坏事。毛主席说过：“好人打坏人活该，坏人打好人，好人光荣。好人打好人是误会，不打不相识。今后不要再打人了。”"},{"type":"paragraph","text":"许多同志要求放假后，同学回校参加文化大革命，我认为这是对的，你们想想看，放假、吃饭这是两条，还有什么呢？就是要造资产阶级的反。现在有一些工作组和一些成员有意挑拨起一派学生斗另一派学生，我认为这是不对的。真正的左派在于依靠群众，充分发动群众，团结也是在斗争中逐渐团结百分之九十五。有人说，要团结百分之九十五这个问题的提法......，一开始绝对不是团结百分之九十五，有人利用团结百分之九十五这个大帽子扣在左派的头上，说你们搞宗派，不团结别人，这是不对的。任何一个革命者都要讲究策略的，这就是坚定的左派要团结广大的中间派，孤立一小撮反党反社会主义反毛泽东思想的黑帮，修正主义，资产阶级，地富反坏右。我的话就这样完了。"},{"type":"paragraph","text":"陶铸同志接着讲话：我们建议大
