script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"澳《先锋报》报道我评莫斯科三月会议文章  世界人民必须警惕修正主义者的诡计","authors":[],"dates":[{"year":1965,"month":5,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"澳《先锋报》报道我评莫斯科三月会议文章"},{"type":"paragraph","text":"世界人民必须警惕修正主义者的诡计"},{"type":"paragraph","text":"新华社六日讯　墨尔本消息：澳大利亚共产党（马克思列宁主义者）机关报《先锋报》三月下旬出版的第二卷第二十期以《苏联领导人的修正主义被揭露》为标题，报道了人民日报和红旗杂志编辑部评莫斯科三月会议的文章，报道全文如下："},{"type":"paragraph","text":"中国共产党刚刚发表了它对一九六五年三月一日到五日莫斯科会晤的公报的评论。"},{"type":"paragraph","text":"中国的评论是一个极好的、令人鼓舞的号召，要求全世界人民对现代修正主义者的诡计保持警惕。"},{"type":"paragraph","text":"人人都从经验中知道，没有实际行动的话是空话。中国共产党在它的评论中证明了没有赫鲁晓夫的赫鲁晓夫主义说的话是空话。话讲来容易，但是考验在于这些话是否见诸行动。"},{"type":"paragraph","text":"苏联共产党领导人力图用诡诈的语言来掩饰他们的实际的背叛行为，他们在试图掩盖他们实际上为美帝国主义效劳的作法。"},{"type":"paragraph","text":"本着马克思、恩格斯、列宁和斯大林的伟大传统，中国共产党人根据苏共领导人的行动来仔细地检验他们的言论。"},{"type":"paragraph","text":"中国的评论精辟地证实并且有力地说明马克思列宁主义的进展和修正主义的没落。有一些好心人由于国际共产主义运动中的激烈争论感到沮丧和失望。但是这些问题的生死攸关的性质要求激烈地进行争论。列宁就曾极其激烈地对付他的时代的修正主义者。"},{"type":"paragraph","text":"在现代，修正主义在帝国主义濒于崩溃的时刻去挽救帝国主义。因此，立即大力揭露它是重要的。"},{"type":"paragraph","text":"在一个很短的历史时期里，争论的结果是修正主义的迅速没落和马克思列宁主义的大大发展。"},{"type":"paragraph","text":"未来将证明修正主义更加灾难深重，并且更加迅速证明马克思列宁主义的道路的正确。"},{"type":"paragraph","text":"中国共产党剥掉没有赫鲁晓夫的赫鲁晓夫主义分子的伪装，是在为全人类作出不可估量的贡献。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bad3f059c3"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
