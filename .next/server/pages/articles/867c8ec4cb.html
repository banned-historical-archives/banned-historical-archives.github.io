script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"德国　快速反应部队有功　极右暴力事件减少","authors":["王德峰"],"dates":[{"year":1998,"month":7,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"德国"},{"type":"paragraph","text":"快速反应部队有功"},{"type":"paragraph","text":"极右暴力事件减少"},{"type":"paragraph","text":"新华社柏林7月7日电  （记者王德峰）德国柏林—勃兰登堡州内政部长阿尔温·齐尔7月6日宣布，自2月中旬该州成立专门对付暴力犯罪的“快速反应部队”以来，该州极右势力暴力犯罪案件有明显下降。"},{"type":"paragraph","text":"据齐尔说，由于这支部队以及其他配合措施的共同作用，今年上半年柏林—勃兰登堡州登记的犯罪案件有了明显下降，为165起，其中暴力案件为39起。而1997年上半年则共发生各类刑事犯罪案件322起，其中暴力案为52起。"},{"type":"paragraph","text":"为对付日益猖獗的极右势力及其暴力犯罪行为，今年2月该州成立了“反暴力和排外快速反应部队”。这支快速反应部队由有经验的警察组成，并配备有一架米格—8直升机，相应的车辆和其他装备。州刑警局统一协调行动，监视极右势力动向及时采取行动，使极右势力暴力犯罪阴谋无法得逞。"},{"type":"paragraph","text":"齐尔说，快速反应部队配合全社会行动，是制止极右势力犯罪行动的有效办法。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"867c8ec4cb"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
