script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"格罗提渥谈红色专家问题  只有通过社会主义教育，克服资产阶级观点，才能适应社会主义社会的要求","authors":[],"dates":[{"year":1958,"month":6,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"格罗提渥谈红色专家问题"},{"type":"paragraph","text":"只有通过社会主义教育，克服资产阶级观点，才能适应社会主义社会的要求"},{"type":"paragraph","text":"新华社11日讯　据德意志通讯社报道，德意志民主共和国格罗提渥总理9日在柏林同将近五百位科学家、教授、艺术家和其他各界知识分子就知识分子在社会主义建设中的作用问题进行了交谈。"},{"type":"paragraph","text":"格罗提渥指出，民主德国的科学工作、研究工作和高等教育所依据的基础同西德完全不同，而且是由同西德完全不同的政治和社会力量所决定的。他说，只有社会主义国家才能够保障科学和艺术不受扰乱地、平稳地发展。"},{"type":"paragraph","text":"格罗提渥接着谈到了社会主义教育问题。他指出，有些从资本主义时代遗留下来的陈旧观点仍然在某些科学领域中占据着统治地位。这些观点同社会主义的发展格格不入。另外，大学生所受的仍然很普遍的资产阶级教育同社会主义社会向他们提出的要求之间的矛盾，只有通过社会主义教育才能克服。"},{"type":"paragraph","text":"格罗提渥说，社会主义的觉悟意味着：社会主义胜利的明确方向、为整个社会利益的集体行动、尊重人、维护和平的意愿和同各国爱好和平的人民友好。他说，有人问，我国的科学干部是不是应当首先受教育成为社会主义者，其次再成为好的专家？这样提问题是错误的。在社会主义社会制度日益扩展和巩固的时代，不是成为社会主义者还是成为专家的问题，答案只可能是：社会主义者兼专家。"},{"type":"paragraph","text":"格罗提渥进一步指出，社会主义的危险的敌人是修正主义。匈牙利的反革命叛乱以及当时在波兰发生的事件的教训突出地说明了提高社会主义觉悟的决定性意义。他说：“毫无疑问，团结在华沙条约中的社会主义国家将击败一切敌对阶级的复辟企图，就像在匈牙利发生过的那样。但是，最好是在一开始就粉碎这种进攻和阴谋。如果我们不让社会主义的敌人有可能在我们的队伍中间挑起混乱，那么我们就能够使我们自己以及全世界人民不致走上流血和流泪的道路。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"645f32df52"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
