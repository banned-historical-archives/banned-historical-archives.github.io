script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"交通部海运管理总局纠正右倾思想整顿打虎队伍","authors":["梁文"],"dates":[{"year":1952,"month":3,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"交通部海运管理总局纠正右倾思想整顿打虎队伍"},{"type":"paragraph","text":"编辑同志：自从二月十六日人民日报发表了“克服右倾思想，争取反贪污斗争的彻底胜利”社论以后，中央人民政府交通部海运管理总局反贪污指挥部，立即检查了领导方面的右倾思想，并整顿了队伍，要求全局工作人员展开对右倾思想的批评和自我批评。从大家的检讨中，证明了很多人有严重的右倾思想。财务科竟有人同情大贪污犯赵益祺。赵在大会上被群众的火力攻得假装哭起来，会后就有很多人去安慰他，认为群众有点“过火”。港务处还有很大一部分人对反贪污运动抱着漠不关心的态度，如杨维诚在检讨时说：“过去我想自己既不是贪污分子，又不是领导干部，就站在旁边看反贪污运动。”现在，大家批判了自己的右倾思想，认识了右倾思想的危害性，都表示要加强斗争意志，在下一阶段围剿“大老虎”。  梁文"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"34076c0cc8"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
