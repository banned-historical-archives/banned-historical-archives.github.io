" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"陈伯达谢富治第二次接见天津代表讲话","authors":["谢富治","陈伯达"],"dates":[{"year":1967,"month":8,"day":16}],"is_range_date":false,"parts":[{"text":"陈伯达谢富治第二次接见天津代表讲话","type":"title"},{"text":"陈伯达谢富治","type":"authors"},{"text":"(1967年8月16日晚，摘要)","type":"subtitle"},{"text":"伯达：五代会问题你们争论可能比较多，如果协议能成立的话，五代会的问题好处理。你们以哪派为核心都不要这样想。从大局着想，无产阶级着想，整个祖国的利益着想，从毛主席的革命路线着想。不以某为核心或我这个组织为核心。五代会是扩大加强的问题。扩大究竟扩到多大？加强加到多强，你们讨论吧！","type":"paragraph"},{"text":"谢副总理：中央有没么个希望，毛主席一再强调解决天津问题。按全国站队来讲，天津问题最后。由于毛主席关心天津问题，所以才提前了。如果天津条件成熟或加一把力就成熟，那就要认真解决这个问题(成立革委会)。从全国来讲，天津形势基本成熟。中央文革关怀，伯达同志亲自领导，当然首先依靠广大革命群众，我们帮一点忙，我们来做一点贡献。天津是较早提出成立革委会的，希望向前一步。如果能成立革命委员会。那时，伯达，我们可以去祝贺。","type":"paragraph"},{"text":"伯达：这个意见很好。可以考虑成立天津革命委员会的问题。","type":"paragraph"}],"comments":[],"origin":"周良霄、顾菊英编《疯狂、扭曲与堕落的年代》之二——《十年文革中首长讲话传信录》, 2009。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"谢富治","type":"人物"},{"name":"陈伯达","type":"人物"},{"name":"中央文革","type":"人物"},{"name":"天津文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"98be90c535"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
