script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"土地革命时代地主张永泰  贺中秋亲访毛主席  会客室畅谈家务毛主席盛赞他劳动翻身","authors":[],"dates":[{"year":1946,"month":9,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"土地革命时代地主张永泰"},{"type":"paragraph","text":"贺中秋亲访毛主席"},{"type":"paragraph","text":"会客室畅谈家务毛主席盛赞他劳动翻身"},{"type":"paragraph","text":"【新华社延安十二日电】“毛主席！我们老百姓心里都记着您，全国老百姓都期望着您去解救！”中秋节的下午，一个曾经骂过共产党是“土匪”的旧日地主张永泰，冒着连绵的秋雨，带着他的孙子去给毛主席、朱总司令贺节，在毛主席的会客室里，他拉着毛主席的手这样说。毛主席请他坐，他兴奋地指着他担来的两筐葡萄和桃子说：“主席号召老百姓植树，我已栽了不少的果树，现在已结出果子了！”"},{"type":"paragraph","text":"毛主席愉快地同他谈起家常，张永泰说：“我是经过清朝、国民党和现在的新社会三个时代的，我虽是个地主，可是国民党在时，到处土匪抢劫，那能像现在晚上能够安心睡觉呢？”"},{"type":"paragraph","text":"张永泰是延安县尹家沟人，十年以前他是一个有千垧地、七十多条牛的大地主，他今年六十七岁，大半辈子是靠收租放账剥削他人过活。土地革命后，政府留给他三十多亩好川地和住的房屋，给他以扩大生产的出路，此后张永泰便参加了生产。他带着回忆的表情说：“过去我要睡到太阳照进窗子才起床，又常生病。自我参加劳动后，每天稍明就起床，精神也好的多了。”他接着说：“看见我过去的佃户都和我一样过光景，我才明白了分土地是为大家的。我现在雇两个短工一个长工种蔬菜务果木，还在新市场开了一个杂货铺，一年收入够全家十口人两年吃用。现在是我管家务，大孙子管铺子，孙媳妇作饭和做针活，两个孙儿上学，一星期还开一次家务会议，现在全家都参加了劳动，吵嘴打骂已多时不见，日月已经过的很好了。”在前年，张永泰老先生还被选为植树英雄。"},{"type":"paragraph","text":"毛主席聚精会神地倾听着张老先生真诚的叙述，不时发出愉快的笑声。最后毛主席对他说：“张老先生，你像吴满有一样的翻身了，不过你们两人经过了两条不同的道路。”"},{"type":"paragraph","text":"张永泰同他的孙儿都大笑了！"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"84be9038b8"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
