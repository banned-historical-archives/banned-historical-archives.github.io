script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"紧急通告","authors":["武汉地区无产阶级革命派总指挥部"],"dates":[{"year":1967,"month":7,"day":31}],"is_range_date":false,"parts":[{"text":"紧急通告","type":"title"},{"text":"武汉地区无产阶级革命派总指挥部","type":"authors"},{"text":"正当无产阶级夺权和资产阶级反夺权，两个阶级、两条道路、两条路线决战的关键时刻，党内最大的一小撮走资本主义道路当权派及其在武汉的代理人──党内、军内一小撮走资本主义道路当权派，操纵“百万雄师”和“公检法”中坚持资产阶级反动路线的一小撮坏头头，对毛主席的革命路线，对武汉地区无产阶级革命派发动了猖狂反扑。我们无产阶级革命派为了彻底粉碎混进武汉地区党内、军内一小撮资产阶级代表人物的罪恶阴谋，为了保卫毛主席，保卫林副主席，保卫毛主席的革命路线，赤胆忠心，和党内军内一小撮资产阶级代表人物进行了针锋相对的斗争。终于在我们伟大领袖毛主席和他的亲密战友林副主席及中共中央、国务院、中央军委、中央文化革命小组的亲切关怀下，在中国人民解放军和全国无产阶级革命派的全力支持下，武汉地区的无产阶级革命派打败了武汉地区党内、军内一小撮走资本主义道路当权派狂妄的进攻。","type":"paragraph"},{"text":"中共中央、国务院、中央军委、中央文化革命小组，于七月二十七日发出了给武汉市革命群众和广大指战员的一封信。这是对我们武汉地区革命群众和广大指战员、特别是对武汉地区无产阶级革命派的巨大支持和亲切关怀，是对武汉地区党内、军内一小撮走资本主义道路的当权派的一个沉重打击。这封信，是对武汉地区文化大革命的重要指示，是我们武汉地区革命群众和广大指战员的行动指南。我们武汉地区的无产阶级革命派，对于这些指示最热烈的拥护，一定要认真学习、大力宣传，坚决执行。","type":"paragraph"},{"text":"“宜将剩勇追穷寇，不可沽名学霸王。”为了执行中共中央、国务院、中央军委、中央文化革命小组给武汉市革命群众和广大指战员的一封信中的指示，为了掀起无产阶级文化大革命的新高潮，掀起狠抓革命、猛促生产的新高潮，夺取无产阶级文化大革命的更加伟大的新胜利，特发出紧急通告如下：","type":"paragraph"},{"text":"一、全市无产阶级革命派立即掀起一个对党内最大的走资本主义道路当权派及其在武汉地区党内军内的代理人和“百万雄师”中坚持资产阶级反动路线的一小撮坏头头的大批判、大斗争的高潮，把他们从政治上、思想上、理论上彻底斗倒、斗垮、斗臭。","type":"paragraph"},{"text":"二、全市无产阶级革命派要积极响应毛主席“抓革命，促生产”的伟大号召，把革命和生产两副重担勇敢地挑起来，作抓革命促生产的模范。无产阶级革命派要作“节约闹革命”的模范。","type":"paragraph"},{"text":"三、我们无产阶级革命派最爱解放军，我们要积极响应毛主席“拥军爱民”的伟大号召，作拥军爱民的模范，要和人民解放军广大指战员一起，共同担负起武汉地区无产阶级文化大革命的重担，一定把无产阶级文化大革命进行到底。","type":"paragraph"},{"text":"四、全市无产阶级革命派要牢记毛主席关于无产阶级“只有解放全人类，才能最后解放无产阶级自己”的伟大教导。要有胆略、有气魄解放受蒙蔽的群众。受蒙蔽的一般群众，是我们的阶级兄弟，对他们决不能采取讽刺谩骂、打击报复的态度，更不能抓人，要以毛主席的《关于正确处理人民内部矛盾的问题》为武器，对他们进行耐心、深入、细致的思想工作，争取、教育、团结他们，热情地欢迎他们起来造反，欢迎他们回到毛主席的革命路线上来，在实现无产阶级革命派大联合的基础上，逐步达到团结两个百分之九十五。把仇恨和斗争矛头狠狠集中对准党内最大的走资本主义道路当权派及其在武汉地区党内军内的代理人和“百万雄师”中坚持资产阶级反动路线的一小撮坏头头。","type":"paragraph"},{"text":"五、我们无产阶级革命派从来都是把“百万雄师”中受蒙蔽的群众和坚持资产阶级反动路线的一小撮坏头头严格区别开来的。受蒙蔽无罪，反戈一击有功。我们热情地欢迎“百万雄师”中受蒙蔽的群众迅速猛醒，起来造武汉地区党内、军内一小撮资产阶级代表人物和“百万雄师”中坚持资产阶级反动路线的一小撮坏头头的反，尽快地回到毛主席的革命路线上来，和革命造反派工人一起抓革命促生产。","type":"paragraph"},{"text":"六、对于那些犯有严重罪行的“百万雄师”中的坏头头，只要他们不再为武汉地区党内、军内的资产阶级代表人物卖力，改邪归正，我们同样给予出路。如果继续与人民为敌，破坏抓革命促生产，我们将给予严厉的打击，并积极协助有关部门依法惩处。","type":"paragraph"},{"text":"此告","type":"paragraph"},{"text":" 武汉地区无产阶级革命派总指挥部一九六七年七月三十一日","type":"paragraph"}],"comments":[],"origin":"转载于《人民日报》1967年8月2日第二版","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"武汉地区无产阶级革命派百万雄师联络站（百万雄师）","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"人民内部矛盾","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1b922649e0"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
