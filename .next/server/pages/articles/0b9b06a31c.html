script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"毛主席回访苏加诺总统苏加诺总统昨离京赴苏","authors":[],"dates":[{"year":1961,"month":6,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席回访苏加诺总统苏加诺总统昨离京赴苏"},{"type":"paragraph","text":"新华社15日讯　毛泽东主席今晨前往宾馆回访印度尼西亚共和国总统苏加诺，并且在亲切友好的气氛中同苏加诺总统共进早餐。"},{"type":"paragraph","text":"回访时在座的有；中华人民共和国主席刘少奇，国务院总理周恩来，外交部副部长黄镇。"},{"type":"paragraph","text":"印度尼西亚方面在座的，有第一副首席部长兼分配部长约·莱梅纳，劳工部长阿赫姆·埃尔宁普拉贾，民用工业部长苏哈托准将，驻中国大使苏卡尼·卡托迪维约。"},{"type":"paragraph","text":"据新华社15日讯　苏加诺总统结束在中国的友好访问，今天上午乘专机离开北京去莫斯科，继续到其他国家进行访问。总统阁下及全体贵宾们，在首都机场受到中国领导人和首都群众的热烈欢送。"},{"type":"paragraph","text":"刘少奇主席、周恩来总理到宾馆陪同苏加诺总统一起乘车来到机场。董必武副主席，朱德委员长等国家领导人也到机场欢送贵宾。"},{"type":"paragraph","text":"莱梅纳第一副首席部长由习仲勋副总理陪同，从宾馆一起乘车到达机场。"},{"type":"paragraph","text":"机场上升起了中国、印度尼西亚两国国旗。数千欢送的群众拿着各种彩旗和鲜花，演奏各种民族乐器，一早赶到这里热烈欢送贵宾。当苏加诺总统等全体贵宾在八时半到达机场的时候，全场群众热烈欢呼鼓掌。"},{"type":"paragraph","text":"机场上举行了隆重的欢送仪式。乐队奏两国国歌，二十四门礼炮齐鸣二十一响，苏加诺总统由刘少奇主席陪同检阅了陆海空三军仪仗队。"},{"type":"paragraph","text":"刘少奇主席和苏加诺总统在机场讲了话（全文见第三版）。"},{"type":"paragraph","text":"苏加诺总统和其他印度尼西亚贵宾们同中国各方面领导人以及各国驻华使节握手告别以后，绕机场一周向首都欢送的群众告别。少年儿童们向苏加诺总统和全体贵宾们献了鲜花。在登上飞机以前，苏加诺总统怀着惜别的心情再一次同刘少奇主席、董必武副主席、朱德委员长、周恩来总理等领导人一一握手道别。刘少奇主席说：“总统阁下再见，祝您一路平安”。苏加诺总统对刘主席说：“再见，希望和您在印度尼西亚见面”。当苏加诺总统同彭真市长握手告别的时候，总统说：“感谢您，昨天为我举行了那样盛大的群众大会”，他向彭真市长和首都人民表示深切的谢意。"},{"type":"paragraph","text":"在飞机前告别的时候，苏加诺总统还同印度尼西亚共产党中央委员会主席、印度尼西亚临时人民协商会议副议长迪·努·艾地和印度尼西亚共产党中央政治局委员、印度尼西亚国家计划委员会副主席萨基尔曼一一握手。"},{"type":"paragraph","text":"苏加诺总统登上飞机的时候，在机舱门口频频向全场欢送的群众招手致意。专机起飞后，中国人民解放军空军部队派出八架喷气式战斗机护航。当排成人字形的机群掠过机场上空的时候，机场上又一次响起了热烈的鼓掌声和锣鼓声。"},{"type":"paragraph","text":"今天到机场欢送贵宾的中国方面领导人，还有全国人民代表大会常务委员会副委员长郭沫若、黄炎培，国务院副总理贺龙、习仲勋，政协全国委员会副主席李四光、包尔汉，国防委员会副主席傅作义，最高人民法院院长谢觉哉等。"},{"type":"paragraph","text":"前往机场欢送的，还有外交部副部长耿飚、黄镇，国务院外事办公室副主任廖承志、刘宁一、孔原、方毅，以及政府各部门、中国印度尼西亚友好协会等各人民团体、各民主党派和北京市的负责人，中国人民解放军高级将领和首都各界人士。"},{"type":"paragraph","text":"各国驻华使节和外交官员，印度尼西亚驻中国大使馆官员和印度尼西亚留学生，也到机场送行。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"彭真","type":"人物"},{"name":"朱德","type":"人物"},{"name":"习仲勋","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0b9b06a31c"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
