script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"贺敬之在全国故事片厂厂长会议上强调  反对资产阶级自由化不影响艺术上创新","authors":[],"dates":[{"year":1987,"month":3,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"贺敬之在全国故事片厂厂长会议上强调"},{"type":"paragraph","text":"反对资产阶级自由化不影响艺术上创新"},{"type":"paragraph","text":"新华社北京3月2日电  为期十天的全国故事片厂厂长会议强调指出，电影界要旗帜鲜明地反对资产阶级自由化，进一步端正创作的指导思想，繁荣社会主义的电影事业。"},{"type":"paragraph","text":"会议期间，厂长们认真学习了中央关于坚持四项基本原则，反对资产阶级自由化斗争的文件，总结了1986年的电影生产，并就近两三年内的电影题材规划问题交流了情况。"},{"type":"paragraph","text":"在今天的闭幕会上，中宣部副部长贺敬之讲了话。他认为，当前文艺战线形势很好，党中央关于反对资产阶级自由化的重要决策在文艺界受到重视和拥护。他希望文艺界要进一步学好有关文件，加强领导，掌握政策，做细致的思想工作，提高广大文艺工作者特别是文艺界各级党的领导同志对坚持四项基本原则，反对资产阶级自由化斗争重要意义的认识，严格按照党中央的要求，坚决、持久、健康地把这场斗争进行下去。贺敬之同志强调在文艺工作中要坚决贯彻“百花齐放、百家争鸣”的方针，不能把反对资产阶级自由化同贯彻党的“双百”方针和在马克思主义指导下的创作自由对立起来。他说，有的同志认为前几年讲“双百”方针讲多了，现在要“收”了，这是没有根据的。我们不但积极主张艺术作品的题材、风格、样式、表现手法的多样化，而且热情鼓励文艺在为人民服务、为社会主义服务的方向下，在艺术创作上进行各种积极的探索和创新，包括借鉴和吸收外国文艺中一切有益的东西来发展我们的文艺创作。文艺本身就得不断创新，这是它天生的品格。生活常新，艺术不能重复。在探索和创新方面，正如不能压抑青年人发挥创造才能一样，也要注意发挥生活积累丰富的老文艺家们的优势。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"db1630c800"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
