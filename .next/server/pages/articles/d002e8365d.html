<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"9a0b73c4-38fe-45d6-8c7b-5448b0ea54f2","name":"红旗一九七〇年第四期","internal":false,"official":true,"type":"pdf","author":"《红旗》杂志编辑部","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives2/main/9a0b73c4-38fe-45d6-8c7b-5448b0ea54f2.pdf"],"article":{"title":"只有破得深 才能立得牢","alias":"","parts":[{"type":"paragraph","text":"“理论的基础是实践，又转过来为实践服务。”（《实践论》）因此，正如工农兵群众说的，“只有革命的人，才能学好革命的哲学。”当前，我国人民正在认真落实毛主席“备战、备荒、为人民”的伟大战略方针，搞好上层建筑领域里的斗、批、改，发展社会主义的生产和科学文化，为进一步巩固无产阶级专政而斗争。伟大的丰富的革命实践，给一切革命的人们学习和运用毛主席的哲学思想，开辟了无限广阔的天地。广大工农兵群众和革命于部、革命知识分子，更广泛地，更深入地学习毛主席的光辉哲学思想，是革命的需要，斗争的需要。这是我国政治思想战线上的一件大事。领导同志应当经常注意把这件事抓好，并且带头学好用好。我们一定会继续看到，唯物辩证法变为广大工人阶级和革命群众手里的尖锐武器所产生的巨大的物质力量，将不断推动我国社会主义革命和社会主义建设事业向前蓬勃发展。"},{"type":"paragraph","text":"才能立得牢只有破得深"},{"type":"paragraph","text":"浙江江山县勤俭大队贫农社员姜乾位毛主席教导我们：“不破不立。”有一件事情，使我们深深感到这是千真万确的真理。"},{"type":"paragraph","text":"去年，我们第八生产队为了抵制资本主义倾向，订了一系列规定。例如，国家统购的农副产品，不准多留多分，不准白由买卖，不准高价出售，等等。“大门关得紧，歪风吹不进”。以为这样一来就万事大吉了。"},{"type":"paragraph","text":"可是，没过几天，就出了间题。生产队买化肥要一笔钱，有个别人就提出把花生拿去卖高价，还说什么：“国家任务一斤不少，集体种子也留足了，余下的多卖点钱，既增加社员收入，又解决买化肥的资金，有什么不好？”结果，就挑起花生卖高价去了。"},{"type":"paragraph","text":"为什么明文规定的制度，有人不执行呢？我们记起了毛主席关于“不破不立。破，就是批判，就是革命”的伟大教导。破和立是辩证的统一，没有破就没有立，我们想不破就立，不批就改，结果立起来也没有用。拿集体产品去卖高价，明明是坏事，偏偏有人说“有什么不好”。事实教育了我们：只有抓紧革命大批判，让大家从思想上真正解决这个“有什么不好”的问题，认清资本主义倾向的严重危害，才能抵制和克服资本主义倾向的影响。贫下中农说得好，不搞革命大批判，资本主义倾向就会象“菜篮里关泥鳅，这边关那边溜”。"},{"type":"paragraph","text":"我们就从这件事入手，深入开展对“自由买卖”的批判，摆帽状，谈危害，挖根子，认清了“自由买卖”的反动本质。有的贫下中农说：“自山买卖”是叛徒、内奸、工贼刘少奇腐蚀我们的迷魂药，如果中了他的毒，钱是多了，路却走垂了。有的说：增加的不是钱而是私心，发展的不是社会主义而是资本主义。革命人批判提高了人家的觉悟，使新制度立在思想上，落实在行动上。后来，有人用低价柴禾向我队换高价鱼，这样一件两头罐钱的生意，也遭到干部和社员的严厉拒绝。大家说：“资木主义勾当我们坚决不干，千金方银也买不去我们的社会主义思想。”并对那个搞投机买卖的人作了面对面的批判。他只得灰溜溜地走了。"},{"type":"paragraph","text":"我们在注意一种主要倾向的时候，也注意到可能掩盖着的另一种倾向，严格按照党的政策办事。我们划清了自由买卖同符合国家规定的农副产品自产自销的界限，把生产队的鱼拿到国家管理的市场上平价出售。"},{"type":"paragraph","text":"砸过斗争实践，我们深深体会到，在斗、批、改中一定要抓紧革命大批判，用革命大批判开路。只有开展革命大批判，才分得清什么是资本主文，什么是社会主义，才知道被什么，立什么，怎么破，怎么立。只有破得深，才能立得年。贫下中农说：一天不搞大批判，资本主义看不清，两天不搞大批判，不知不觉站错“线”，三天不搞大批判，修正主义围着转，长期不搞大批判，党要变修国变色。批判资本主义黑货，就象田里除草，耕了还要耙，耙了还要秒，秒了还要锄，要一直批得它彻底灾亡为止。"},{"type":"paragraph","text":"养成分析的习惯"},{"type":"paragraph","text":"浙江江山县勤俭大队党支部副书记戴香妹"},{"type":"paragraph","text":"在我们大队里，一提起贫农女社员金衰妹，贫下中农就称赞她是年老心红、热爱集体的老妈妈。去年年底总评时，大家一致评选她为五好社员："},{"type":"paragraph","text":"就是她，谁知道过去还被人称为“落后分子”理！事情是这样的：这位六十多岁的老妈妈，过去学习、开会不大参加，还经常“骂”人，大家"}],"authors":["姜乾位"],"dates":[{"year":1970,"month":4,"day":1}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":56,"page_end":57},"tags":[{"name":"浙江文革","type":"人物"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d002e8365d"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
