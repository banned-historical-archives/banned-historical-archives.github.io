script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"e2817c5d-1398-4688-94fa-c8076f9c76cc","name":"红旗一九六四年第一期","internal":false,"official":false,"type":"pdf","author":"","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives2/main/e2817c5d-1398-4688-94fa-c8076f9c76cc.pdf"],"article":{"title":"七律·到韶山","alias":"","parts":[{"type":"paragraph","text":"律到韶山"},{"type":"paragraph","text":"一九五九年六月"},{"type":"paragraph","text":"一九五九年六月二十五日到韶山。离别这个地方已有三十二周年了。别萝依稀咒逝川，故园三十二年前。红旗捲起晨奴戟，黑手高县霸主鞭。为有牲多志，敢教日月换新天。喜看稻千重浪，遍地英雄下夕烟。"},{"type":"paragraph","text":"律登庐山"},{"type":"paragraph","text":"一九五九年七月一日一山飞峙大江，上葱龙四百旋。冷眼向洋看世界，热风吹雨江天。云横九派浮黄，浪下三吴起白烟。陶令不知何处去，桃花源裹可耕田？"}],"authors":["毛泽东"],"dates":[{"year":1959,"month":6,"day":25}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":4,"page_end":4},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ee6e1c6107"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
