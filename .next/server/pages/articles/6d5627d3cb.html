" crossorigin="">{"props":{"pageProps":{"books":[{"id":"wenji8","type":"pdf","name":"毛泽东文集第八卷（1999）","internal":false,"official":true,"author":"中央文献研究室","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/wenji8.pdf"],"article":{"title":"《忆秦娥·娄山关》的写作背景","description":"根据毛泽东手稿刊印。","dates":[{"year":1962,"month":5}],"parts":[{"text":"《忆秦娥·娄山关》的写作背景","type":"title"},{"type":"paragraph","text":"我对于《娄山关》这首词作过一番研究，初以为是写一天的事。后来又觉得不对，是在写两次的事，头一阕一次，第二阕一次。我曾在广州文艺座谈会上发表了意见，主张后者（写两次的事），而否定前者（写一天），可是我错了。这是作者告诉我的。一九三五年一月党的遵义会议以后，红军第一次打娄山关，胜利了，企图经过川南，渡江北上，进入川西，直取成都，击灭刘湘，在川西建立根据地。但是事与愿违，遇到了川军的重重阻力。红军由娄山关一直向西，经过古蔺、古宋诸县打到了川滇黔三省交界的一个地方，叫做“鸡鸣三省”，突然遇到了云南军队的强大阻力，无法前进。中央政治局开了一个会，立即决定循原路反攻遵义，出敌不意，打回马枪，这是当年二月。在接近娄山关几十华里的地点，清晨出发，还有月亮，午后二三时到达娄山关，一战攻克，消灭敌军一个师，这时已近黄昏了。乘胜直追，夜战遵义，又消灭敌军一个师。此役共消灭敌军两个师，重占遵义。词是后来追写的，那天走了一百多华里，指挥作战，哪有时间和精力去哼词呢？南方有好多个省，冬天无雪，或多年无雪，而只下霜，长空有雁，晓日不甚寒，正像北方的深秋，云贵川诸省，就是这样。“苍山如海，残阳如血”两句，据作者说，是在战争中积累了多年的景物观察，一到娄山关这种战争胜利和自然景物的突然遇合，就造成了作者自以为颇为成功的这两句话。由此看来，我在广州座谈会上所说的一段话，竟是错了。解诗之难，由此可见。"}],"comment_pivots":[{"part_idx":0,"offset":14,"index":1},{"part_idx":1,"offset":66,"index":2},{"part_idx":1,"offset":106,"index":3},{"part_idx":1,"offset":136,"index":4},{"part_idx":1,"offset":167,"index":5}],"is_range_date":false,"authors":["毛泽东"],"comments":["一九六二年《人民文学》准备在五月号发表毛泽东的词六首，郭沫若应约于五月一日撰写了《喜读毛主席〈词六首〉》一文。五月九日，郭沫若将这篇文章的清样送毛泽东审改。毛泽东阅后将这篇文章中关于《忆秦娥·娄山关》写作背景的一段话全部删去，重新写了本篇的文字。","指一九六二年二月初在广州召开的诗歌座谈会。","指毛泽东。","过去有一种说法，遵义会议是一九三五年一月九日召开的。后来，经过考证确定遵义会议是一九三五年一月十五日至十七日召开的。这样，中央红军第一次打娄山关应是在遵义会议召开之前，而不是在遵义会议召开以后。","刘湘（一八八八——一九三八），四川大邑人。一九三三年任国民党军四川“剿匪”总司令部总司令，一九三四年并任国民党四川省政府主席。"],"page_start":326,"page_end":327,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6d5627d3cb"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
