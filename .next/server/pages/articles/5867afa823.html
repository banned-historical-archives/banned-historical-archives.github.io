script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"新西兰共产党全国代表大会胜利闭幕  威尔科克斯和威廉斯分别再次当选全国委员会总书记和主席  会议通过关于修正主义和社会民主主义，关于新西兰的民族独立，关于支持越南人民的斗争和关于支持印度尼西亚共产党等四个决议","authors":[],"dates":[{"year":1966,"month":4,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新西兰共产党全国代表大会胜利闭幕"},{"type":"paragraph","text":"威尔科克斯和威廉斯分别再次当选全国委员会总书记和主席"},{"type":"paragraph","text":"会议通过关于修正主义和社会民主主义，关于新西兰的民族独立，关于支持越南人民的斗争和关于支持印度尼西亚共产党等四个决议"},{"type":"paragraph","text":"新华社奥克兰十一日电　新西兰共产党第二十一次全国代表大会十一日在这里胜利闭幕。在大会结束前，维·乔·威尔科克斯在暴风雨般的掌声中再次当选为新西兰共产党全国委员会总书记，默·哈·威廉斯再次当选为全国委员会主席。"},{"type":"paragraph","text":"会上通过了关于修正主义和社会民主主义，关于新西兰的民族独立，关于支持越南人民的斗争和关于支持印度尼西亚共产党等四个决议。"},{"type":"paragraph","text":"新西兰共产党第二十一次全国代表大会是在八日晚上开幕的。维·乔·威尔科克斯代表全国委员会在开幕会上作了从上次代表大会以来的总结报告。"},{"type":"paragraph","text":"中国共产党中央委员会委员、中国共产党代表团团长刘宁一，比利时共产党政治局委员雷纳·兰多尔夫和党中央委员会委员米歇尔·格兰多热，澳大利亚共产党（马克思列宁主义者）主席爱·弗·希尔和副主席克·奥谢等兄弟党的代表出席了这次大会。由于新西兰政府拒绝发给签证，阿尔巴尼亚劳动党代表团未能参加会议。"},{"type":"paragraph","text":"大会先后收到并宣读了阿尔巴尼亚劳动党、朝鲜劳动党、越南劳动党、印度尼西亚共产党、马来亚共产党、缅甸共产党、日本共产党、锡兰共产党、泰国共产党和秘鲁共产党的贺电。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5867afa823"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
