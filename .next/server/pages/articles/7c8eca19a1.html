script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反对阮文绍集团法西斯统治和剥削工人  西贡等地工人和其他劳动者开展斗争","authors":[],"dates":[{"year":1972,"month":7,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反对阮文绍集团法西斯统治和剥削工人"},{"type":"paragraph","text":"西贡等地工人和其他劳动者开展斗争"},{"type":"paragraph","text":"新华社河内一九七二年七月十七日电　据越南南方解放通讯社报道，越南南方西贡、岘港等地的工人和其他劳动者，最近接连开展斗争，反对阮文绍集团的法西斯统治和加紧剥削工人的罪行。"},{"type":"paragraph","text":"西贡—嘉定区工人和其他劳动者，自五月份以来不断开展斗争，反对阮文绍集团提出的所谓“九项紧急措施”，要求解决失业问题和保卫民族工业。埃索和西哥威那等各大企业的工人，不顾阮文绍集团的“戒严令”，举行集会，反对资方勾结阮文绍集团加紧压迫和剥削工人的罪行。许多中、小企业的工人也纷纷开展斗争，反对阮文绍集团增加税收，要求恢复生产，解决失业问题。西贡—嘉定区全区纺织工人的代表曾在五月下旬举行集会，反对阮文绍集团加紧剥削工人，要求保卫民族工业。"},{"type":"paragraph","text":"在这期间，西贡—嘉定区工人和其他劳动者还开展了要求增加工资、反对解雇工人、反对罚款、反对禁止集市等斗争。据统计，在各个劳动人民居住区，六月份平均每天爆发十五到二十起要求民生权利的斗争。在这个月里，西贡—嘉定区的三轮车工人、石油工人、化工工人、制药工人、民航工人、火柴厂工人和三十六个市场的小商贩，接连举行会议，并且前往伪劳动部进行斗争，要求增加工资，减轻税收，反对解雇工人，反对罚款。七月三日，西哥威那纺织公司四千工人的代表举行集会，讨论反对阮文绍集团勾结厂方解雇、压迫和剥削工人的斗争措施。纺织工人的斗争，得到了西贡—嘉定区其他行业工人的同情和支持。"},{"type":"paragraph","text":"岘港市水电工人不顾阮文绍集团的“戒严令”和“禁止罢工令”，在六月二十四日上午举行罢工，抗议西普加公司无理解雇三名工会干部。紧接着，岘港商港运输、三轮车等五个行业的工人也举行罢工，支持水电工人的斗争。岘港市工人的斗争，得到了西贡运输工人的支持。"},{"type":"paragraph","text":"六月间，龙川市工人和其他劳动人民开展斗争，反对伪政权增加税收。薄辽市最近也爆发了小商贩抗议当地伪政权增加税收的斗争。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7c8eca19a1"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
