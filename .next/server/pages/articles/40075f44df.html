script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji48","name":"毛泽东全集第48卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji48.pdf"],"article":{"title":"毛泽东等祝贺阿尔巴尼亚解放二十一周年的电报","alias":"","parts":[{"type":"paragraph","text":"毛泽东等祝贺阿尔巴尼亚解放"},{"type":"paragraph","text":"二十一周年的电报"},{"type":"paragraph","text":"（1965年11月28日）地拉那阿尔巴尼亚劳动党中央委员会第一书记恩维尔·霍查同志，阿尔巴尼亚人民共和国人民议会主席团主席哈奇·列希同志，阿尔巴尼亚人民共和国部长会议主席穆罕默德·谢胡同志："},{"type":"paragraph","text":"在阿尔巴尼亚解放二十一周年的时候，我们代表中国人民、中国共产党和中华人民共和国政府，向兄弟的阿尔巴尼亚人民、阿尔巴尼亚劳动党和阿尔巴尼亚人民共和国政府，致以最热烈的节日祝贺。"},{"type":"paragraph","text":"二十一年来，勤劳勇敢的阿尔巴尼亚人民，在以恩维尔·霍查同志为首的阿尔巴尼亚劳动党久经考验的领导下，英勇顽强，艰苦奋斗，不断地把祖国的社会主义革命和社会主义建设事业胜利地推向前进。阿尔巴尼亚人民即将胜利完成第三个五年计划，并且正以更高的热情和信心准备迎接明年开始的第四个五年计划。中国人民为兄第的阿尔巴尼亚人民所取得的光辉成就感到由衷的高兴，并且预祝阿尔巴尼亚人民在今后取得新的、更加伟大的成就。"},{"type":"paragraph","text":"阿尔巴尼亚人民共和国政府和阿尔巴尼亚人民，坚决反对美帝国主义的侵略政策和战争政策，积极支援亚洲、非洲和拉丁美洲各"},{"type":"paragraph","text":"毛泽东等祝贺阿尔巴尼亚解放二十一周年的电报国人民的反帝革命运动，坚决支持越南人民的抗美救国斗争，为各国人民争取世界和平、民族解放、人民民主和社会主义的伟大事业，作出了重要的贡献。阿尔巴尼亚人民共和国在国际事务中的影响和作用正在与日俱增。"},{"type":"paragraph","text":"光荣的阿尔巴尼亚劳动党始终不渝地高举马克思列宁主义的旗帜，坚定不移地对现代修正主义进行斗争，为保卫马克思列宁主义的纯洁性，为促进国际无产阶级的革命团结，作出了卓越的贡献。阿尔巴尼亚劳动党不愧为国际共产主义运动中的一支坚强队伍，赢得了全世界马克思列宁主义者和革命人民的尊敬和赞扬。"},{"type":"paragraph","text":"中阿两党、两国、两国人民在反对帝国主义、建设社会主义、促进人类进步的事业中，在反对现代修正主义，保卫马克思列宁主义的斗争中，结成了亲密的友谊。我们两国人民建立在马克思列宁主义和无产阶级国际主义基础上的伟大友谊和战斗团结，是经得起任何考验的，是牢不可破的。我们深信，这种革命的友谊和团结必将放射出更加灿烂的光辉。"},{"type":"paragraph","text":"祝中阿两国人民永恒的、牢不可破的兄弟友谊万古长青。"},{"type":"paragraph","text":"中国共产党中央委员会主席毛泽东中华人民共和国主席刘少奇中华人民共和国全国人民代表大会常务委员会委员长朱德中华人民共和国国务院总理周恩来"},{"type":"paragraph","text":"一九六五年十一月二十八日"}],"authors":["毛泽东"],"dates":[{"year":1965,"month":11,"day":28}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":240,"page_end":241},"tags":[{"name":"毛泽东","type":"人物"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"40075f44df"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
