<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"盖平县崔家屯村农民对粮食“三定”政策的反映","authors":[],"dates":[{"year":1955,"month":3,"day":14}],"is_range_date":false,"parts":[{"text":"盖平县崔家屯村农民对粮食“三定”政策的反映","type":"title"},{"text":"【辽宁分社十四日电】辽宁省盖平县二区崔家屯村农民对“定产、定购、定销” 政策表示十分拥护。三月十一日，在全村群众大会上，许多农民都说：这个办法对他们增产的积极性是个很大的鼓励，认为是给他们指出了一个奔头，表示要用增产的实际行动来感谢共产党和人民政府对他们的关怀。","type":"paragraph"},{"text":"但是，在这次会上也暴露了一些农民存在某种不同的认识和疑虑。主要是：","type":"paragraph"},{"text":"一、该村虽然主要产粮食，但仍有很大一部分棉田。因此，植棉多的农民就认为种粮食增产部分可以由自己支配，而种棉花就不如种粮食自由。农民夏长庆说：“定产、定购、定销的办法好是好，就是这样一来谁都愿意种粮食而不愿种棉花了，因为种粮食自己多加把劲儿，增产部分可以自己支配，愿意吃点干的就吃点干的，愿意吃的稀的就吃点稀的，而种棉花就不同了，就是把收的棉花都卖给国家，国家也只能供应你五百二十斤粮食（该村平均每人供应标准五百二十斤，据农民反映，如果全家都是大人，就不太够吃），自己想吃点干的或者用粮食换点白面吃都不敢。要这样，一年吃的就不够了。”农民王永山过去三亩地全部都种棉花，这回他听说要实行“三定”后，他当场就说我今年种一亩棉花就行了。","type":"paragraph"},{"text":"上述思想顾虑，是全村农民普遍存在的。据该县中共县委书记谈，在贯彻“三定”工作前，必须对种棉农民也想出个具体办法，不然国家布置的植棉任务就很难完成。","type":"paragraph"},{"text":"二、农民听说粮食“定产、定购、定销”办法后，几乎一致认为过去统购统销政策是错了，他们都把“三定”政策与统购统销政策分开来看，虽然作传达的工作干部一再说这是统购统销的一种办法，说明过去统购统销对国家对农民的好处，但农民一时很难接受，他们只看本村统购统销时的缺点，看不到大的方面。在三月十一日的群众大会上，讨论时如果不是掌握会场的人掌握的正确，这个会议几乎成了对以前统购统销的“控诉”会了，因为每个发言的人在谈到“三定”好处后，都要说过去的缺点。有的干部并当场就检讨说，过去他们做错了等等，更助长了农民这种错误认识。","type":"paragraph"},{"text":"三、过去不好劳动的人听说要实行粮食“三定”之后，心里有些发慌。在会上，当场就有全村出名好吃懒做的农民王永山、贾润田表示态度，说若是再不好好劳动，完不成“定产”任务就要挨饿。此外，据干部说，也用不好劳动的人一声不吭，情绪不高。","type":"paragraph"},{"text":" （杨绍山）","type":"paragraph"}],"comments":[],"origin":"新华社《内部参考》1955年3月15日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5419198832"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
