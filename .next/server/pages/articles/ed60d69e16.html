script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"在日内瓦会议上  西方处处被动步步为营  美国资产阶级政论家承认西方处境尴尬","authors":[],"dates":[{"year":1959,"month":5,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"在日内瓦会议上"},{"type":"paragraph","text":"西方处处被动步步为营"},{"type":"paragraph","text":"美国资产阶级政论家承认西方处境尴尬"},{"type":"paragraph","text":"新华社18日讯　华盛顿消息：美国某些资产阶级报刊政论家最近在他们的关于日内瓦外长会议的评论中一方面承认，日内瓦外长会议上的主动权掌握在苏联手里，西方国家处处被动，另一方面又鼓吹坚持西方的顽固政策。"},{"type":"paragraph","text":"“纽约时报”外交记者苏兹贝格在12日从日内瓦发出的一篇评论中承认西方国家是被迫参加这次会谈的，他写道：“我们终于被诱入一次会议。……甚至在这场认真的争论开始之前，我们就处于不舒服的境地”。苏兹贝格在谈到两个德国的代表团参加了会议时写道，“外交家们也许说我们并没有同东德打交道，但是事实上我们已经在同东德打交道了”。"},{"type":"paragraph","text":"苏兹贝格认为，西方在日内瓦会议上所谋求的是“希望西欧的军事和政治现状得到承认，并且享有这样的权利：在有利于我们（西方）的情况下改变东欧现状”。他还说，西方不想放弃在社会主义国家“内部唯一的桥头堡——西柏林”。苏兹贝格还说，“为了加强我们的谈判地位，我们希望保持我们在谈判桌上三对一数量上的优势，而不让像波兰和捷克斯洛伐克那些苏联的朋友参加”。"},{"type":"paragraph","text":"约瑟夫·艾尔索普在14日发表在“纽约先驱论坛报”上的一篇文章中谈到西柏林问题时以“实力”政策拥护者的语调说：“一方面，……保持西方在（西）柏林的地位是同西方切身利益有关的。然而，另一方面，世界上又没有任何办法能保卫西方在（西）柏林的这个重要地位，除非准备为它而战”。他主张西方在日内瓦会议上进行战争威胁，说什么“只有最清楚明白地、最明确果断地表示出西方为柏林而战的意志，才会促成西方可以接受的那种妥协办法”。但是他又担心美国的某些盟国不愿意“为柏林而战”，并且指出美国已经丧失了"},{"type":"paragraph","text":"“核领导地位”。"},{"type":"paragraph","text":"戴维·劳伦斯在发表在最新一期“美国新闻与世界报道”周刊上的一篇文章中写道：苏联“正在同英美法三国政府打交道，而它们却不是单一的整体。在它们自己的队伍里都有分裂性的影响在起作用。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ed60d69e16"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
