script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"发展中国家遭受“剪刀差”剥削的严重损失","authors":[],"dates":[{"year":1972,"month":5,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"发展中国家遭受“剪刀差”剥削的严重损失"},{"type":"paragraph","text":"资本主义世界工业国家经常采取种种措施压低初级产品的价格，抬高制成品的价格，使这两类产品价格的“剪刀差”越来越扩大。所谓“剪刀差”，就是指初级产品和制成品比价的这种差距在统计图表上呈现的剪刀形状态。其结果使以出口初级产品为主的发展中国家遭受严重的经济损失。"},{"type":"paragraph","text":"根据第二届贸易和发展会议文件的统计，由于初级产品和制成品价格“剪刀差”的不断扩大，发展中国家每年损失二十二亿美元。一九五五年至一九六五年的十年中，发展中国家出口量每年平均增长百分之五；但由于出口价格下跌，进口价格上涨，实际收入仅增长百分之三点四，如果石油出口收入不计算在内，仅增长百分之一点八。根据联合国统计的一九六○年至一九七○年资本主义世界出口价格指数，以一九六三年为一百，十年中初级产品价格由九十九上升到一百零七，上升了八点，而制成品价格却从九十八上升到一百十七，即上升了十九点（见下图）。这种“剪刀差”的不断扩大，使发展中国家长期受到残酷的剥削和掠夺，外汇收入不断减少，人民生活水平不断下降。这是发展中国家越来越贫穷的主要原因之一。"},{"type":"paragraph","text":"资本主义发达国家所以能操纵国际市场上商品的价格，进行“剪刀差”剥削，是由于它们利用发展中国家主要依靠生产和出口一种初级产品的单一经济的弱点，而这种单一经济的出现，乃是长期殖民统治的结果。"},{"type":"paragraph","text":"其次，发达国家还实行高关税壁垒，限制发展中国家的初级产品的进口，迫使初级产品不断降价。"},{"type":"paragraph","text":"资本主义发达国家所采取的这些损害发展中国家利益的政策，在上两届联合国贸易和发展会议上都遭到发展中国家的一致反对。发展中国家强烈要求迅速改变这种不合理现象，建立一种较合理的制度来稳定初级产品的价格，改善发展中国家的经济状况。这一要求是完全正当的。"},{"type":"paragraph","text":"（附图片）"},{"type":"paragraph","text":"世界市场商品出口价格指数变化图"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9ebb6aa042"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
