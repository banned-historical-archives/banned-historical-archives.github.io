" crossorigin="">{"props":{"pageProps":{"books":[{"id":"chuanxinlu3","name":"十年文革中首长讲话传信录（下册）","internal":false,"type":"pdf","official":false,"author":"周良霄,顾菊英","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/十年文革中首长讲话传信录3.pdf"],"article":{"title":"江青谈宋江","parts":[{"type":"title","text":"1103．江青谈宋江"},{"type":"paragraph","text":"(1973年2月22日)"},{"type":"paragraph","text":"江青在一九七三年二月二十二日同中联部、外交部、对外友协的一些同志的谈话中美化宋江，现将这次她的谈话摘录于后。"},{"type":"paragraph","text":"《水浒传》中的主要人物宋江，是真实的历史人物。《宋史》上《侯蒙传》就有关于宋江的记载。"},{"type":"paragraph","text":"我们应该用历史唯物主义的观点来分析宋江等农民起义的领袖。对宋江首先应加以肯定，然后再分析他的阶级出身所带来的影响。他是一个了不起的历史人物，有智、有谋、有正义感，喜欢劫富济贫，能团结人，因此受人民群众的爱戴，人们称他作“及时雨”。在封建社会中，官逼民反，宋江被逼上梁山后，领导起义，同封建统治阶级坚决斗争，起了很大①周培源：一九O二年生，江苏宜兴人，物理学家。当时任北京大学副校长。作用。这些积极方面，应充分予以肯定。另一方面，应看到宋江由于出身于地主阶级，有阶级的局限性和动摇性。他有一种正统观念，认为不能反皇帝，以至对皇帝的招安抱有幻想，认为可以戴罪立功，可以不犯法。宋江上梁山，不是轻易上去的。在杀阎婆惜(他杀惜是因为在政治上受到威胁)后，他起初宁愿被刺配到江州，也不愿上梁山。后来统治阶级要判处他死刑，他才下决心上山。林冲也是如此，他被迫害充军后，由于高俅派陆谦火烧草料场，谋害他的性命，他才被逼上梁山。在这一点上，李逵、鲁智深和武松等人不一样，他们是反对招安的。李逵的性格不象宋江那样复杂，他心直口快，坚决反对招安。《水浒传》的一百二十回本中谈到李逵反招安，要造反。但由于他对宋江死也要跟着，所以宋江接受招安，他只好接受。"},{"type":"paragraph","text":"对宋江接受招安，还要从当时的历史背景来分析。当时，宋朝受辽、金等外寇入侵，需要抵御外敌。宋江接受招安，虽然反映了他的动摇性，但不能因此说他是两面派人物。金圣叹对宋江采取了憎恨仇视的态度。他的节本损害了宋江的形象，而且还加卢俊义的一场恶梦，说梁山泊的英雄全被杀了。李希凡不就同意金圣叹的本子。还有一出戏叫《白水滩》，是续《水浒》，但写的不象样子。"},{"type":"paragraph","text":"解放以前，描写宋江的好戏不多，《浔阳楼》应该是一出好戏，宋江在那里吟反诗，抒发了自己的反抗情绪，但一直没有排出好戏。"},{"type":"paragraph","text":"《水浒》这部书写农民起义，但只讲建立一个政权，即有饭大家吃，有衣大家穿，乌托邦的幻想，但也不完全是幻想，《宋史》上有。"},{"type":"paragraph","text":"我们不能以无产阶级政党的标准去要求历史上的农民起义的领袖。他们有历史的局限性，在这方面《水浒传》七十回本把后边的删掉了，反而看不出农民运动的全貌。他们有些人就向统治阶级投降了。如宋景诗，他一生与地主斗，但以后被迫投降了。这一点不必回避。回避这个问题就违背历史。"}],"authors":["江青"],"dates":[{"year":1973,"month":2,"day":22}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":621,"page_end":622,"alias":""},"tags":[{"name":"江青","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e9e0df8bd2"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
