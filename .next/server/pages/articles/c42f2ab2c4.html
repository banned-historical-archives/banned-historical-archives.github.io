<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji13","name":"毛泽东全集第13卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji13.pdf"],"article":{"title":"中英两国人民站在一条战线上","alias":"","parts":[{"type":"paragraph","text":"中英两国人民站在一条战线上！"},{"type":"paragraph","text":"（1939年6月1日）"},{"type":"paragraph","text":"正当中国人民对日本侵略坚决不挠的抗战到了第二周年的时候，英国的援华委员会在全国各地举行了“中国周”以表示援助我们的抗战。我代表朱德同志与八路军的将士，代表我们前线与后方医院中的士兵，并且我自己也想说一说，这种同情与关切的表示，是多么使我们感到兴奋的鼓励啊。我们向在国际反侵略阵线中和我们站在一起的英国人民表示感谢并致热烈的敬礼。"},{"type":"paragraph","text":"中国两年来的抗战已经证明了民主势力抵抗侵略的力量。这两年来的抗战指出了，甚至一个工业落后的，在民族生活上受着各种各样的压迫与侮辱的国家，也能满怀着胜利的信心抵抗最野蛮最横暴的法西斯进攻。而且还证明了，不仅不能把中国的抗战和全世界反侵略的力量分开，而且我们给侵略者的打击，已使我们的国家，在维护全世界的民主与文明的国际斗争中，在反法西斯的主要阵线中，站到了最前线。"},{"type":"paragraph","text":"战争一开始，我们就看见英国人民以物质援助我们的抗战，捐给我们医药用品，派送救护队到中国来服务，对我们作了许多实际上同情的表示，这正说明了，虽然我们与英国相隔很远，我们的抗战对于英国人民并不是一件无关轻重的事情。但是由于我们抗战在"},{"type":"paragraph","text":"[1]这是毛泽东为英国援华委员会举行的“中国周”写的文章。全世界反侵略斗争中所处的地位，我们有权利要求得更多一些，要求比以前所给我们的更多的援助。"},{"type":"paragraph","text":"首先，我们要求你们严格注意你们政府的态度，你们要压迫它采取坚决的行动，不再输出军火给日本。就在几个星期以前，英国在重庆的大使馆与总领事馆，在日本来首都滥肆轰炸的时候受了损害。对于这种侮辱，英国政府却只表示了一种外交上最软弱的姿态，只报以一纸抗议。：正是这种态度鼓励日本在一有机会的时候就到处扫除英国的利益。英国人民抑制远东强盗并且同时援助中国的最有效的办法，是对他们的政府施以断然的压力，要它立即实施对日制裁。"},{"type":"paragraph","text":"日本的共谋犯，法西斯的德意两国，在这两年内，与它狼狐为奸地破坏和平，摧毁国际条约，掀起血腥的惨无人道的战争。它们的活动已经形成了对英国安全的一种直接威胁。这里就有了另一个理由，使英国人民一定要强迫他们政府支持中国的抗战，并且自己也要采取与中国对反侵略的阵线所作的贡献相辅的步骤，反对法西斯主义并不需要我们从事于个别的战争。威胁是普遍的，因此现在必须在全世界和它作斗争。"},{"type":"paragraph","text":"举例说，最近日本在占领区域里加强了反英的宣传。因此，援助中国，援助那跟远东的敌人作战的国家，对于英国人民的自卫也是必须的。"},{"type":"paragraph","text":"鉴于上述的种种情形，我们向你们建议，请你们采取具体有效的办法，加强英国的政策，使英国政府与人民在遏制日本侵略者的愿望与行动中得以站在一起。"},{"type":"paragraph","text":"为了我们国家的独立与自由，为了全人类的和平与自由，我们已经坚决地斗争了两年了。在这两年中，日本军阀利用了汪精卫之类的卑鄙无耻的失败主义者，想用破坏抗日民族统一战线来破坏我们的抗战。"},{"type":"paragraph","text":"但是我们的朋友们可以放心。在这过去两年中，中国人民的团结已经成熟，而我们抗战到最后胜利的决心也大为加强了。中国共产党与国民党都更坚决地执行着我们共同的决议，拥护蒋委员长领导我们抗战。像汪精卫之类的失败主义者，以前还能躲在后方阴谋投降的，现在已不能够隐藏他们的真相而被揭穿被赶跑了。"},{"type":"paragraph","text":"英国与中国地理上是相隔很远的，但两国人民要打倒法西斯侵略的共同愿望却把我们连结在一起了。让我们拉起手来打倒人类的公敌。"},{"type":"paragraph","text":"中英两国人民联合起来！"}],"authors":["毛泽东"],"dates":[{"year":1939,"month":6,"day":1}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":413,"page_end":415},"tags":[{"name":"毛泽东","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c42f2ab2c4"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
