<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"在首都人民狂热欢迎下苏加诺总统昨到北京毛主席亲临机场迎接贵宾","authors":[],"dates":[{"year":1956,"month":10,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报北京30日专电】　应毛主席的邀请，印度尼西亚总统苏加诺于今天下午两时乘专机到达北京。"},{"type":"paragraph","text":"毛主席在机场上欢迎他，全北京在欢迎他，全中国在欢迎他。"},{"type":"paragraph","text":"我们第一次看到苏加诺，可是我们很早就熟悉苏加诺。当26年前他在万隆法院被非法受审，愤怒地控诉荷兰殖民者的时候，当1945年，他在烽火连天中英勇地宣布印度尼西亚独立的时候，我们就注视他；当他在亚非会议中大气磅礴地表达亚非国家决心的时候，当他在美国国会上理直气壮地维护民族的独立的时候，全世界都倾听他。他曾经说:“这种独立并不是要出售的，任何货币也不能买到它的一分一毫”，毛主席说他也代表亚洲人民说了话，我们尊敬他。"},{"type":"paragraph","text":"两国人民　紧密握手"},{"type":"paragraph","text":"当他从机舱里下来，毛主席迎上前去。两只巨大的手紧紧地握在一起。这是从火焰中诞生的两个国家的握手，这是为和平而战斗的两国人民的握手。"},{"type":"paragraph","text":"苏加诺和朱德、刘少奇等我国领导者一一见了面。他在这儿又会见了万隆会议上的老朋友周恩来总理。当他看到宋庆龄副委员长时，马上走过去，喊她:“夫人”。他亲切地握着她的手。"},{"type":"paragraph","text":"他也被介绍给来机场欢迎他的苏联、印度、埃及等各国外交使节和贵宾们见了面。"},{"type":"paragraph","text":"“独立致敬!”印度尼西亚议会代表团的团员们兴奋地向他喊着，他也用同样的话回答他们。"},{"type":"paragraph","text":"检阅仪仗　接受献花"},{"type":"paragraph","text":"“大家对我这样的尊敬，就是给印度尼西亚人民的尊敬，如果没有人民，就只是一个普通的人。”检阅了陆海空三军仪仗队，接受了红领巾们的献花后，苏加诺总统向成千上万的到机场上欢迎他的人群致辞道:“我来到这里，是为了加强印度尼西亚和中国人民之间的友谊。我们两国人民有许多共同的理想，来吧，让我们一起前进吧!”群众报以热烈的掌声。"},{"type":"paragraph","text":"致词完毕以后，毛主席陪着他向人群走去。他们走到那儿，欢呼声就响到那儿，姑娘们一群群地奔出来，把一大束一大束的鲜花，一只一只的别针献给苏加诺总统。苏加诺总统笑着向大家招手，并且有时转回身来，挽住了毛主席的手臂。一个六岁的小女孩站在人群里向他挥手，苏加诺总统喜欢得什么似的，他在她面前蹲下来了，长久地拉着她的小手。"},{"type":"paragraph","text":"廿里长街　夹道欢呼"},{"type":"paragraph","text":"毛主席和苏加诺总统坐敞蓬汽车离开了沸腾的机场，而迎接他们的是更加沸腾着的北京。盛况是空前的。北京人民家家户户都挂着国旗。从西郊机场到中南海二十几里路程中，搭了牌楼，挂了横幅，树了苏加诺总统的巨像，数十万北京人敲着锣打着鼓，举着总统的肖像，摇着两国国旗，大清早就赶到这里来，夹道欢迎，他们要看苏加诺总统，也要看毛主席。毛主席坐着敞蓬汽车在群众面前经过，这还是第一次哩。"},{"type":"paragraph","text":"汽车徐徐行进着，毛主席和苏加诺总统，像两个巨人似的站在它的上面。总统一路不断地向群众招手。毛主席也面露笑容。当敞蓬汽车经过时，姑娘把花瓣撒向他们，孩子挥着小手奔向他们，老年人揩去眼角的泪花，青年人乐得互相拥抱……他们笑着、跳着、欢叫着、拥挤着，个个被幸福的光芒照耀得满面通红，谁能抑制得住这奔腾的情感?当载着两位伟大的领袖的汽车刚刚过去，群众就一涌而上，无论是男的、女的、老的、少的，一起在后面奔跑着、追随着……"},{"type":"paragraph","text":"全世界都在注视这一天。历史上将要记载这一天。因为毛主席和苏加诺总统的会见，就标志着新生亚洲的力量，标志着和平世界的希望。"},{"type":"paragraph","text":"\u003cIMG alt=请插入3号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1956\\10\\56a1010101.JPG\"\u003e"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b40ffed1bc"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
