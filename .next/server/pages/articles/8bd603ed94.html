script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"非洲人民说中国的胜利使帝国主义修正主义发抖  你们的核武器就是我们的核武器","authors":[],"dates":[{"year":1966,"month":10,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"非洲人民说中国的胜利使帝国主义修正主义发抖"},{"type":"paragraph","text":"你们的核武器就是我们的核武器"},{"type":"paragraph","text":"本报综合报道　连日来，坦桑尼亚、马里和刚果（布）的公众舆论热烈欢呼我国发射导弹核武器试验成功是“毛泽东思想的又一胜利”。"},{"type":"paragraph","text":"坦桑尼亚首都达累斯萨拉姆的许多人在听到这个好消息后，就到中国大使馆热烈祝贺。"},{"type":"paragraph","text":"同中国经济专家一道工作的一位坦桑尼亚工人说：“这是亚洲、非洲、拉丁美洲人民的胜利，也是毛泽东思想的胜利。我们革命人民有了核武器，美帝国主义就不能再欺负我们了。”另一位年纪较大的工人说：“你们的核武器就是我们的核武器。”"},{"type":"paragraph","text":"一位坦桑尼亚部长二十九日拜访了中国驻坦桑尼亚大使何英，热烈祝贺中国发射导弹核武器试验成功。这位部长指出，中国掌握了核武器有助于维护世界和平和制止美帝国主义侵略。"},{"type":"paragraph","text":"马里首都巴马科各界人士纷纷发表谈话和声明。一位曾经访问过中国的马里朋友说，这是国际无产阶级的胜利。一位马里职员说，当我听到这个好消息时，我高兴得一夜不能入睡。"},{"type":"paragraph","text":"有许多马里朋友，包括官员、记者、工会工作者，在二十八日一听到这个消息时，就向新华社记者表示祝贺。马里亚非团结委员会主席阿卜杜拉耶·索夫对记者说，中国发射导弹核武器试验成功有助于制止帝国主义者发动世界战争。"},{"type":"paragraph","text":"马里全国工人联合会总书记马马杜·法马迪·西索科二十九日发表声明说：中国在核方面所取得的伟大的科学成果，“显示了一个决心前进的国家的人民依靠他们自己的潜力和他们生气勃勃的力量所能够创造的巨大可能性。”"},{"type":"paragraph","text":"刚果（布）各界人士欢呼中国发射导弹核武器试验成功是毛泽东思想伟大、光辉的胜利。有些人在听到这个消息后向中国朋友热情地竖起大拇指，并高呼：“毛泽东万岁！”"},{"type":"paragraph","text":"在这几天中，广播电台多次广播了来自中国的这个好消息，并一再广播了马桑巴—代巴总统发给中共中央的热烈祝贺中国新成就的重要贺电。"},{"type":"paragraph","text":"刚果（布）全国革命运动的一位老党员对新华社记者说，中国的文化大革命和这次导弹核武器试验的巨大成功，是对美帝国主义者及其仆从的最沉重的打击。他还说：“我们十分信任毛泽东。用毛泽东的光辉思想武装起来的中国人民，能够建树一切功绩，能够打败世界上的一切帝国主义者和反动势力。”"},{"type":"paragraph","text":"刚果（布）民卫队秘书长奥南加·让·皮埃尔说：在毛主席领导下的中国人民这样快地在导弹和核武器方面获得了成功，远远超出了帝国主义者和修正主义者的想像。“现在，让他们哭泣和发抖吧！”"},{"type":"paragraph","text":"（据新华社讯）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8bd603ed94"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
