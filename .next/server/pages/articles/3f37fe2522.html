" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"华北局向中央报告平原濮阳城区盐民反抗禁盐问题及其处理办法","authors":[],"dates":[{"year":1950,"month":6,"day":27}],"is_range_date":false,"parts":[{"text":"华北局向中央报告平原濮阳城区盐民反抗禁盐问题及其处理办法","type":"title"},{"text":"中央给华北局平原省的指示：","type":"subtitle"},{"text":"华北局转平原省：","type":"appellation"},{"text":"敬电悉。关于小盐海盐矛盾、影响盐民生活问题，同意你们所提给盐民生活找出路、协助转业的八项办法。但执行时不应操之过急，应向盐民进行宣传教育，说明小盐没有前途的理由，和人民政府负责协助转业的好处，在盐民自愿自觉的基础上，妥善而稳当地做到转业。","type":"paragraph"},{"text":" 六月二十七日","type":"paragraph"},{"text":"附：","type":"paragraph"},{"text":"华北局转报平原省委关于盐民反抗禁盐及协助解决生活出路问题的请示","type":"subtitle"},{"text":"1950年6月26日","type":"subtitle"},{"text":"平原省委二十四日电除抄中财委外，兹转报如下。关于土盐与国盐矛盾问题我们已于六月五日请示中央。","type":"paragraph"},{"text":"“濮阳区盐民近千户，纯盐户五百户。近闻盐务局至濮异常恐慌，现积极酝酿抵抗。区干已被封锁，不能接近。见干部即谩骂乱语，并纷言：‘共产党无良心，依靠盐民起家（指王从吾、刘晏春曾领导盐民斗争），现在又来拿我们的饭碗，是忘本’；‘政府若不叫活，就每人发一绳勒死’；‘遇大旱灾，这实在无奈，就只有造反一拼’。情势甚急，十分严重。据分析，盐民三种情绪：纯盐民坚决抵抗，半盐民观望不满，附带做盐者则听候处理。一般居民同情盐民，认为共产党‘太绝’，不给转弯的余地。禁止应早叫作准备，不要欺骗，正值盛月（一天多收一百二十斤盐，可换麦一百二十斤），突令禁止。干部一方面不满，又不能反抗，对盐民谩骂党与政府不满，又不愿说服。我们认为根本问题系盐民受生活威胁，异常激愤，情绪时常，很难怪罪。主要的是我们事前领导上配合不够，未能主动进行宣传，并表明政府态度，以后盐民臆测猜度，而造成恐慌、抵抗情绪。","type":"paragraph"},{"text":"处理办法，基本上给盐民找生活出路，协助转业。主要是给劳动力找出路。办法：一、组织运输，与合作社专业公司定合同。二、烧窑（烧砖瓦）。三、适当收购火硝（有825户）。四、秋后合作社棉花加工。五、推销工业品换回农产品。六、开粪厂。七、对其兼营副业予以适当支持，八、对其原有土地加以改造增产。","type":"paragraph"},{"text":"经过党员积极分子及盐民代表会，宣布我们的态度及方针，说明政府对盐民负责到底，协助转业，困难者适当救济。并扭转其错误认识，平息情绪，消除对立。并应为执行政府管理土盐法令而努力。为此，要求省委掌握情况，对盐民秋后实行纳税；一时难以转业者，限量经营，以便有较长时间组织转业。","type":"paragraph"},{"text":"特别困难者予以救济。","type":"paragraph"},{"text":"考虑濮阳盐民之历史情况，对其他各县之影响，应慎重处理。妥否请速示”。","type":"paragraph"},{"text":" 华北局六月二十六日","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3f37fe2522"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
