<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"上海五反战斗第一天成绩好　七十六户大部均开始突破工人店员情绪很高","authors":[],"dates":[{"year":1952,"month":3,"day":22}],"is_range_date":false,"parts":[{"text":"上海五反战斗第一天成绩好　七十六户大部均开始突破工人店员情绪很高","type":"title"},{"text":"【华东总分社二十二日讯】上海五反初战第一天(三月二十一日)成绩很好。七十六个重点户检查队都已背着被包进入厂、店，并受到工人、店员们的热烈欢迎。很多工厂工人们燃起鞭爆，排队相迎，高呼：“我们的主力军来了。”有的说：“我们等了一两个月今天你们可来了。”情绪非常高涨。一般资本家在这次突然袭击中，普遍表现惊慌，很多老板、经理在检查队宣布来意、拿出检查通知书时，吓得浑身发抖，面无人色。高级职员开始非常紧张，经分别讲清政策后，大多表示愿意检举，但仍有顾虑。","type":"paragraph"},{"text":"一天斗争的结果，七十六个户大部均开始突破，资本家一般都初步坦白了些新的材料，顽抗的较少，部分高级职员已争取过来。斗争发展相当顺利，未发生自杀、逃跑或其他严重问题；特别是被检查的厂、店，由于市委事先掌握得好，生产和营业均未停止。这一点极为广大职工拥护，是上海五反中很成功的一点。","type":"paragraph"},{"text":"斗争中也暴露出以下几个问题：","type":"paragraph"},{"text":"一、检查队下去后，工人普遍要求诉苦，控诉资本家的剥削、压迫、甚至腐化的事实。有些检查队因怕超出五反范围，拿不定主意，市委已决定可让工人诉苦，并应通过诉苦去发动工人，激起他们对资本家的仇恨，然后逐步引导他们进行五反斗争。","type":"paragraph"},{"text":"二、对争取高级职员不够耐心。有的甚至把他们和资本家一样隔离，同等看待，使他们非常害怕。就是已经争取过来的高级职员，虽然他们很积极，但也不敢放手使用。市委已及时批判了这种现象，并提出在斗争中一定要划清界线，对高级职员不但要团结他们，大胆使用，而且要保证不追问资本家向他行贿的财物，以解除他们的顾虑，争取他们迅速站过来。","type":"paragraph"},{"text":"三、部分职工有些顾虑。主要是：怀疑是否会搞彻底，怕政府将来再“照顾”一下老板，怕厂、店反掉后失业，怕减工资。为此，市委非常强调在运动中对各色人等把我们的各项政策交代清楚，统统让他们摸到我们的“底”(指政策的“底”)。","type":"paragraph"},{"text":"四、在检查中，某些军队、农村干部方式生硬，不会讲战术，对上海资本家的刁猾性认识不足，工作中碰到一些困难。因此，市委指出必须机智灵敏，要善于利用初战的有利形势，随机应变，创造经验。","type":"paragraph"},{"text":"现在市委总指挥部每日均集中研究情况，及时指挥战斗。估计第一战役会获得全胜。但为了彻底搞透，市委不强调速战速决，相反却强调深透，如果初战不透，就会大大影响以后的运动。","type":"paragraph"}],"comments":[],"origin":"新华通讯社编《内部参考》1952年3月25日","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6edee4cc8e"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
