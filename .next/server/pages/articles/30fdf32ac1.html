script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"东光县有些贫下中农组织严重不纯","authors":["石子侃"],"dates":[{"year":1963,"month":7,"day":30}],"is_range_date":false,"parts":[{"text":"东光县有些贫下中农组织严重不纯","type":"title"},{"text":"石子侃","type":"authors"},{"text":"新华社天津讯  河北省东光县结合社会主义教育运动进行了贫下中农组织整顿巩固工作的试点。从县委直接掌握的七个大队的情况看，贫下中农组织不纯以及由此而产生的一些问题相当严重。","type":"paragraph"},{"text":"这七个大队的贫下中农组织，有一个是在1960年建立的，有六个是在这次整风整社中新建的。这七个大队共建立了四十八个代表小组，吸收了八百零六名会员。这些代表小组混入了地主分子三名，富农分子一名，道会门头子二名，反革命家属四名，投机倒把分子六名，惯偷三名，蜕化变质分子一名，与地富联系密切的六名。更严重的是，这七个大队贫下中农委员会，竟有三个被地主篡夺了领导权，或者被富裕中农掌握。","type":"paragraph"},{"text":"混入皂户陈生产大队贫下中农组织的两户地主，经常雇人作买卖、放钱、放粮剥削群众。去年队上麦种不足，他们借给队上一百五十五斤，每斤麦子除当时给一斤半高粮外，下来麦子以后还得如数还本。队上搞副业没有资金，他们又借出二百块钱，日息3%。田庄大队的贫下中农委员会，由七户富裕中农操纵了大权，他们同一些坏干部相勾结，营私舞弊，为了掩饰队上的问题，他们对贫下中农阶级队伍采取了分化手段，拉拢一伙贫下中农，排挤另外一些他们认为“靠不住的贫下中农”，不让参加会，不给发言权。","type":"paragraph"},{"text":"发生上述问题的原因，首先是县委、公社党委对建立贫下中农阶级组织的重要意义领会不深，工作不细，存在急躁情绪。因此，有些贫下中农组织不是经过扎根串连，在实际斗争中建立的，而是一哄而起，少数干部包办，不分青红皂白，一律按户造册入会。有的村把土改时划阶级定成份的册子丢失了，就只凭几个干部记忆或根据现在的经济情况，商量一下就建立起来了。其次，有些基层干部本身有严重问题，怕贫下中农组织成立起来后对他们不利，但为了应付上级，又不得不建立，所以就把自己的亲信安插在这个组织里，使之变成庇护自己的工具。","type":"paragraph"},{"text":"来源：1963年7月30日新华通讯社编《内部参考》。","type":"paragraph"}],"comments":[],"origin":"美国图书馆收藏","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"30fdf32ac1"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
