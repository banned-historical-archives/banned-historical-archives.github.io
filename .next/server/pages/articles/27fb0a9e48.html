script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"一脉相承的修正主义组织路线","authors":[],"dates":[{"year":1976,"month":8,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"一脉相承的修正主义组织路线"},{"type":"paragraph","text":"广西平果县龙王大队贫下中农理论小组平果中学大批判组"},{"type":"paragraph","text":"党内走资本主义道路的当权派，为了破坏无产阶级革命事业，搞复辟倒退，不仅推行与毛主席革命路线相对抗的修正主义政治路线，而且推行为他们的政治路线服务的组织路线。"},{"type":"paragraph","text":"组织路线集中地体现着任用干部问题上的阶级路线。我们党根据毛主席的有关指示，历来重视从工人、贫下中农中选拔优秀分子到各级领导岗位上来。这是保证党和国家永不变色的重大措施。但是，刘少奇、林彪、邓小平站在历史唯心主义的立场上，污蔑劳动群众是"},{"type":"paragraph","text":"“群氓”、“阿斗”。刘少奇胡说什么“工人阶级在一定的时候，也可能是不能依靠的。”林彪污蔑劳动群众“只知柴米油盐”。邓小平则狂叫“依靠工农兵是相对的”，从工农中提拔干部“一般效果都不好”。工农掌权不好，什么人才好？刘少奇说要“先知先觉，有远见的人”。林彪说要选拔“天才”、“超天才”。邓小平则请来了“懂行”、“有能力”的“隐士”。几种腔调，一样心肠，他们都是要排斥工农，扶植资产阶级，实行资产阶级统治，变无产阶级专政为资产阶级专政。"},{"type":"paragraph","text":"物以类聚，人以群分。党内资产阶级排斥工农干部，必定推行用人唯亲的修正主义组织路线，拉山头，搞宗派，结党营私，打击革命派，拼凑反革命班底。刘少奇保护和重用他那一堆叛徒、死党，排斥打击坚持毛主席无产阶级革命路线的同志。林彪对那些为反革命的修正主义路线卖命的，都“大升”、“大保”，组织大小反革命舰队；对坚决执行毛主席革命路线的干部，则诬蔑为“小资产阶级”，“极左”，务必置之死地而后快。今天，邓小平重演他们的故伎，也鼓吹建立“强有力的，敢字当头的，有能力的”领导班子。他的目的是要把那些敢于“拚老命”，“不怕第二次被打倒”的不肯改悔的走资派重新扶上台；而对于那些敢于同他们的修正主义路线对着干的革命干部，则横加迫害、打击、排斥。走资派懂得，要搞垮毛主席的革命路线，就必须搞掉坚决执行这条路线的干部；为了推行反革命的修正主义政治路线，也必须在要害部门安插死心塌地地执行他们的路线的亲信、爪牙。这就决定了“用人唯亲”必然是修正主义组织路线的一个特点。"},{"type":"paragraph","text":"我们不难看出，从刘少奇、林彪到邓小平，他们所推行的修正主义组织路线，同他们推行的修正主义政治路线一样，也是一脉相承的。邓记商标里面裹着的无非是刘家老店、林家铺子的陈年老货。把它们连在一起来分析、批判，可以更进一步从里边看出走资派共同的活动规律，找出战胜它们的方法。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"林彪","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"革命大批判","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"27fb0a9e48"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
