script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"type":"pdf","id":"wenji5","name":"毛泽东文集第五卷（1999）","internal":false,"official":true,"author":"中央文献研究室","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/wenji5.pdf"],"article":{"title":"立脚点应放在谈判破裂用战斗方法渡江上面","description":"根据毛泽东手稿刊印。","dates":[{"year":1949,"month":4,"day":16}],"parts":[{"text":"立脚点应放在谈判破裂用战斗方法渡江上面","type":"title"},{"type":"appellation","text":"总前委，粟张，刘张李："},{"type":"paragraph","text":"（一）总前委删辰电悉。（二）对敌北岸及江心据点，凡能于一夜夺取又利于夺取后第二夜即南渡者，则于渡江前一夜夺取之；凡不能于一夜夺取，又于夺取后需要较多时间做准备工作方利于南渡者，则应提前夺取之，望按实情处理。（三）和平协定最后方案已于昨（十五）夜提交张治中代表团，今（十六）日上午黄绍竑飞南京请示。 南京是否同意签字，将取决于美国政府及蒋介石的态度。如果他们愿意，则可能于卯哿签字，否则谈判将破裂。（四）你们的立脚点应放在谈判破裂用战斗方法渡江上面，并保证于二十二日（卯养）一举渡江成功。（五）现请你们考虑者，即假如南京愿意于卯哿签字，但要求于签字后给他们几天时间以便部署，在这种情况下，我军是否可能再推迟三天，即由卯养改至卯有（二十五日）渡江。这种推迟，是否于我军士气及渡江任务之完成上发生妨碍。你们作此种考虑时，仍应假定南京虽然签了字，但汤恩伯等反动将领仍然不愿执行，我军仍需用战斗方法渡江。在此种假定上，如果你们认为不应再推迟，则我们将拒绝南京的请求。只有你们认为推迟至卯有（二十五日）实行战斗渡江并无妨碍，我们方准备允许南京的请求。如何，请考虑电复。并将近日渡江准备情形、渡江把握程度及需要多少时间才能完成全军渡江等项见告为盼。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"十六日八时"}],"comment_pivots":[{"part_idx":1,"offset":10,"index":1},{"part_idx":2,"offset":9,"index":2},{"part_idx":2,"offset":130,"index":3},{"part_idx":2,"offset":142,"index":4},{"part_idx":2,"offset":187,"index":5},{"part_idx":2,"offset":373,"index":6}],"is_range_date":false,"authors":["毛泽东"],"comments":["粟张，指粟裕、张震，当时分别任第三野战军副司令员兼第二副政治委员和参谋长。刘，指刘伯承，当时任第二野战军司令员。张，指张际春（一九○○——一九六八），湖南宜章人，当时任第二野战军副政治委员兼政治部主任。李，指李达，当时任第二野战军参谋长。","指总前委一九四九年四月十五日辰时给中共中央军委并告刘伯承、张际春、李达、粟裕、张震、谭震林的电报。电报说，我们意见争取在谈判上有政治收获，即令军事方面稍有不便，亦是值得的。故主张四月二十日行动，对江北岸和江中敌据点，凡能一夜夺取者，则一夜夺取之，不能一夜夺取者，应留置之，用二三天时间夺取。今后军事行动，以在开动后能持续进行为更有利。","指以张治中为首席代表的国民党政府和谈代表团。","黄绍竑，当时是国民党政府和谈代表。","卯哿，即四月二十日。","汤恩伯（一九○○——一九五四），浙江武义人。当时任国民党军京沪杭警备总司令部总司令。"],"page_start":294,"page_end":295,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"023ff3a508"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
