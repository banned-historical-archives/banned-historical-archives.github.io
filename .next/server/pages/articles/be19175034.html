" crossorigin="">{"props":{"pageProps":{"books":[{"id":"cb043827-1a6a-46f3-863d-a430958e5a0d","name":"无产阶级文化大革命参考资料（1966年）","internal":true,"official":false,"type":"pdf","author":"","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives3/main/cb043827-1a6a-46f3-863d-a430958e5a0d.pdf"],"article":{"title":"周总理在红卫兵司令部谈话中关于各部机关运动的一段讲话","alias":"","parts":[{"type":"paragraph","text":"个帽子很舒服了，叫他摘下来他还不干呢！有些地方传我的一句话，我赞成戴高帽子黑牌子，这是从高级党校传出来的。这完全是会，八月二十日高级党校斗林枫，他们给他身上贴了标语，头上戴了高帽子给我汇报。我当时觉得这个办法在思想上解决不了问题，可又不能给群众泼冷水，群众出于义愤，给他戴一个帽子一个牌，游一下院也没什么，还是要按十六条办事的好。当游街戴高帽子不算武斗，高帽子就是高一点嘛，有什么，但不算文斗。党校只给我传达了前一句，后一句掉了，他们从电话传了去，贴了大字报就传出去了。戴高帽子不解决问题，林彪同志讲这只能触及皮肉，不能触及灵魂，你们要学习林总这一指示。"},{"type":"paragraph","text":"当前你们山东大学的，山东海洋学院的回去还遇到许多困难，怎么办？你们知道革命不会没有阻力的，革命就是件难事。你们读了十一中全会公报有？公报中最后一段（第十一真第二段-一把文化大革命进行到底）这方面的困难都要克服，眞正的左派只能在克服各种困难当中坚定起来，成长起来。同志们应该有充分的准备。困难，我们在旧社会波知难而退，共产党是遇难而进，困难是我们进步的开始，共产党和社会主义国家遇难而进。有了困难要去克服，同志们不要被困难吓住，也不要因为困难而急躁，矛盾会不断产生，旧的矛盾解决了，新的矛盾还会出现。同志们要有信心，这个信心就是在毛泽东思想指导下，依靠广大群众，工农兵革命师生，团秸在党中央毛主席的周围，一定能够把无产阶杀文化大革命进行到底，横扫一切牛鬼蛇神。保证把社会主义革命彻底进行到底：我们不怕困难！我们有伟大的毛主席的教导和指引。劳动人民开创了社会主义革命的新阶段。"},{"type":"paragraph","text":"莱燕同志提出，在农村买毛主席著作很困难，请我帮助解决，我愿意解决，你们把数字交给我，我文化部给你办。今后我们要加紧印，今秋明年三千万套，今年出一千五百万套，要保证很快运输，运费不要钱，横版已开始印了，价格比以前减低了，同志们的要求可以基本保证。"},{"type":"paragraph","text":"时间已经是非走不可了，我们以后到山东再见面。注：此稿是根据山东大学中文系王佩增的整理稿而翻印"},{"type":"paragraph","text":"周总理九月九日给红卫兵司今部谈话中，关于机关运动中的一段"},{"type":"paragraph","text":"（根据记录整理，未经本人审）"},{"type":"paragraph","text":"··学生不要到部里去，因为他们跟你们不一样。你们整天搞运动，他们还有工作，你们去了，他们就不好工作。部是专政机关，你们有意见，可以贴大字报，可以写信，还可以派人听取你们意见嘛。你们不要干涉人家的运动。你们要相信人家自己会把运动搞好的。·····"},{"type":"paragraph","text":"地质学院学生到地质部静坐示威好儿天，我们是社会主义国家，没有必要这样搞。后来他们闹到国务院去，他们撒了，但是校内的多数派学生有人又刺激他们，他们失败了，捣乱失取，再搞乱，再失败的语录。这些学生就反而坚持错了就错了，不走了，这样也不好。·…···"},{"type":"paragraph","text":"·153."}],"authors":["周恩来"],"dates":[{"year":1966,"month":9,"day":9}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":163,"page_end":163},"tags":[{"name":"周恩来","type":"人物"},{"name":"山东文革","type":"人物"},{"name":"武斗","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"发言"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"be19175034"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
