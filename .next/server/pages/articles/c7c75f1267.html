" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"以资产阶级的“新闻自由”反对党的领导，陈朗的假面具已拆穿","authors":[],"dates":[{"year":1957,"month":8,"day":17}],"is_range_date":false,"parts":[{"text":"以资产阶级的“新闻自由”反对党的领导，陈朗的假面具已拆穿","type":"title"},{"text":"【新华社广州17日电】 在广州新闻界最近联合举行的六次反右斗争座谈会上，右派分子陈朗的“新闻自由”的假面具被揭穿了。","type":"paragraph"},{"text":"这位上海文汇报驻广州的记者，恶毒地污蔑我国没有新闻自由。他在南方日报上发表的“请改变一下对新闻记者的看法”一文中说，“新闻记者没有地位，新闻采访不自由。”","type":"paragraph"},{"text":"陈朗所要的就是向共产党和政府进攻的新闻自由。“大鸣大放”时，陈朗在广州到处寻找反面材料，加以夸张、渲染，写成煽动性的消息和文章。五、六月份，他给文汇报发去的十多篇新闻和通讯中，歪曲广州鸣放的真实情况，把共产党和政府领导的工作说成漆黑一团。例如，报道中国作家协会广州分会鸣放座谈会时，只选择一些非本质的反面事实，片面地夸大渲染，加油加醋，使人看了感到整个作家协会一团糟，不可救药。陈朗还通过广州新闻工作者关于所谓“左叶事件”座谈会的新闻报道，恶毒地攻击了广州市政府负责人。","type":"paragraph"},{"text":"这位右派分子的所谓“新闻自由”，很快的被广州新闻工作者所看穿了。大家一致认为，陈朗所代表的资产阶级的所谓“新闻自由”只是骗人的谎言。有了资产阶级的新闻自由，就没有无产阶级的新闻自由。1946年，陈朗充当国民党广东省政府秘书处新闻股股长的时由，不给那些有利于人民的新闻以自由。","type":"paragraph"},{"text":"陈朗打着“新闻自由”的旗帜来向共产党进攻并非偶然。他出身于资产阶级家庭，解放前很长时期为国民党新闻事业效劳，当过反动的江西正气日报采访主任。解放后在“三反”运动中受过处分，对共产党深怀不满。","type":"paragraph"},{"text":"据陈朗自己承认，他那套所谓“新闻自由”是别有用心的，其目的是用来否定社会主义新闻事业，反对共产党对新闻事业的领导。","type":"paragraph"},{"text":" ——原载《文汇报》1957年8月18日。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c7c75f1267"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
