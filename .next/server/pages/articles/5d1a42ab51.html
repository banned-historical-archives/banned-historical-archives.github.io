<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"北京部队某军联系实际开展真理标准问题讨论  肃清极左流毒  抓好军事训练","authors":[],"dates":[{"year":1979,"month":11,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"北京部队某军联系实际开展真理标准问题讨论"},{"type":"paragraph","text":"肃清极左流毒  抓好军事训练"},{"type":"paragraph","text":"新华社北京十一月二十二日电  人民解放军北京部队某军把真理标准问题的讨论同改进教育训练等当前实际工作结合起来，促进了指战员的思想解放和训练改革，今年训练成绩大大超过往年。"},{"type":"paragraph","text":"不久前，这个军举行了一次七个加强步兵连的考核，有十九个课目、七十六项内容都取得了优秀成绩。战士们高兴地说：解放思想好，训练大提高，干部会指挥，战士武艺高，实现现代化，前程无限好。"},{"type":"paragraph","text":"今年是这个军把工作重点转移到教育训练为中心的现代化建设上来的第一年。军党委认为，要在工作上实现这个转移，首先必须端正思想路线。为此，军党委组织指战员认真学习实践是检验真理的唯一标准这个马克思主义认识论的基本原理，学习与现代军事科学有关的天文、地理、电子对抗、红外线、激光、核武器、航天等基本知识，结合了解外军的编制装备、主要武器的技术战术性能和作战指导思想，联系我军的教育训练实际，展开大讨论。通过讨论，大大解放了思想，开阔了眼界，明确认识到，实事求是，一切从实际出发，理论联系实际，是马列主义、毛泽东思想的精髓。要使军事训练适应现代化建设的要求，必须彻底肃清林彪、“四人帮”极左路线的流毒，立足现有装备，着眼未来反侵略战争，认真吸取对越自卫还击作战的经验，大胆改革训练内容和训练方法。"},{"type":"paragraph","text":"在这个思想指导下，各级领导干部纷纷走出机关，深入基层，与广大干部和战士一同学习，一同总结军事训练中正反两方面的经验，一同研究解决军事训练中的新情况、新问题，制定切合实际的训练改革方案。几个月来，他们在以下几个方面进行了改革："},{"type":"paragraph","text":"大力加强特种兵和协同训练，以适应现代战争要求。他们组织各级指挥员学习军兵种知识，研究协同作战的组织指挥问题；组织团以下干部、战士学习各军兵种知识和多种武器的使用，开展“一专多能”训练；组织有各兵种参加的实兵战术演习。"},{"type":"paragraph","text":"把过去以打步兵为主的训练改为以“三打三防”为重点的训练，即打坦克、打飞机、打空降，防原子、防化学、防细菌，使训练真正适应未来反侵略战争的需要。"},{"type":"paragraph","text":"改变“一刀切”的训练方法，实行科学编组，分组教学，因人施教。过去的训练往往不分新兵老兵，不管基础好、差，“年年都上一年级”。这种“一刀切”的做法，切掉了训练的针对性，切掉了干部战士的主动性。现在，他们采取同一时间训练不同课目，同一课目训练不同内容，同一内容提出不同要求的方法，对新战士主要搞基础训练，对老战士和基础好的同志主要搞一专多能的训练。"},{"type":"paragraph","text":"改革训练考核，建立起一套切合实际的科学考核制度。过去训练考核考战士多，考干部少；考技术多，考战术少；考单一兵种多，考诸兵种协同少。现在，他们进行训练考核，以考核干部为重点，把训练、考核和实战要求统一起来，解决了理论与应用的一致，缩短了训练与实战的距离。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5d1a42ab51"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
