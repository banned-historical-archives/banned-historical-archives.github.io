script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"我们伟大领袖毛主席和他的亲密战友林副主席会见坦桑尼亚政府代表团和赞比亚政府代表团","authors":[],"dates":[{"year":1970,"month":7,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"我们伟大领袖毛主席和他的亲密战友林副主席会见坦桑尼亚政府代表团和赞比亚政府代表团"},{"type":"paragraph","text":"毛主席、林副主席同阿米尔·贾马勒部长和伊利贾·穆登达部长等坦桑尼亚、赞比亚贵宾热烈握手，表示欢迎，并同他们进行了亲切友好的谈话"},{"type":"paragraph","text":"周恩来总理、康生副委员长、黄永胜总参谋长、李先念副总理参加会见和谈话"},{"type":"paragraph","text":"新华社十一日讯　我们的伟大领袖毛主席和他的亲密战友林彪副主席，今天下午会见了由坦桑尼亚财政部长阿米尔·贾马勒率领的坦桑尼亚政府代表团和由赞比亚发展和财政部长伊利贾·穆登达率领的赞比亚政府代表团的全体成员。"},{"type":"paragraph","text":"会见时，毛主席、林副主席同坦桑尼亚、赞比亚贵宾热烈握手，表示欢迎，并且同他们一起照了像。"},{"type":"paragraph","text":"随后，毛主席、林副主席同坦桑尼亚和赞比亚贵宾进行了亲切友好的谈话。坦桑尼亚和赞比亚贵宾是：贾马勒部长、穆登达部长、坦桑尼亚交通运输和劳工部长卢辛德、赞比亚电力交通和工程部长米尔纳、坦桑尼亚驻中国大使万布拉、赞比亚驻中国大使恩戈马、坦桑尼亚财政部首席秘书姆苏亚、赞比亚发展和财政部常任秘书卡松德、坦桑尼亚银行总裁姆特伊、赞比亚电力交通和工程部常任秘书契桑加、坦桑尼亚交通运输和劳工部首席秘书卡杜马、赞比亚银行总裁祖卢。"},{"type":"paragraph","text":"参加会见和谈话的有：国务院总理周恩来，人大常委会副委员长康生，中国人民解放军总参谋长黄永胜，国务院副总理李先念。"},{"type":"paragraph","text":"会见时，有关方面负责人方毅、姬鹏飞、郭鲁、陈慕华、陈玉贵、布克、王海容、韩叙在场。（附图片）"},{"type":"paragraph","text":"我们的伟大领袖毛主席和他的亲密战友林彪副主席，七月十一日会见了由坦桑尼亚财政部长阿米尔·贾马勒率领的坦桑尼亚政府代表团和由赞比亚发展和财政部长伊利贾·穆登达率领的赞比亚政府代表团的全体成员。"},{"type":"paragraph","text":"周恩来总理，康生副委员长，黄永胜总参谋长，李先念副总理等参加了会见。"},{"type":"paragraph","text":"这是会见时合影。"},{"type":"paragraph","text":"新华社记者摄"},{"type":"paragraph","text":"毛主席同阿米尔·贾马勒部长热烈握手。  新华社记者摄"},{"type":"paragraph","text":"毛主席同伊利贾·穆登达部长热烈握手。  新华社记者摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"康生","type":"人物"},{"name":"李先念","type":"人物"},{"name":"林彪","type":"人物"},{"name":"黄永胜","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5d97ed563e"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
