script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"阿尔巴尼亚《团结报》发表文章揭露苏联资产阶级残酷压迫剥削工人阶级","authors":[],"dates":[{"year":1975,"month":3,"day":31}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社地拉那一九七五年三月二十九日电　阿尔巴尼亚《团结报》三月二十九日发表文章，揭露苏联资产阶级残酷压迫和剥削工人阶级和劳动群众。"},{"type":"paragraph","text":"文章说，苏联资产阶级把它们掌握的国家政权作为压迫和剥削劳动群众、发财致富和攫取物质利润的工具。"},{"type":"paragraph","text":"文章说，“苏联资产阶级在社会生产体系中起着特殊作用。它们是生产资料的实际所有者，起着统治和组织社会劳动的作用，从而掌握了工人阶级劳动不断创造的大部分价值。这个资产阶级还享有国家财产的继承权。”"},{"type":"paragraph","text":"文章说，资本主义的完全复辟，社会主义所有制蜕化为典型的国家垄断资本所有制，为产生和滋长一个适应于这一所有制的既定阶级，造成了广泛的经济基础。这就形成了由党、政、军机关的官僚主义者组成的苏联资产阶级。"},{"type":"paragraph","text":"文章指出，苏联的新兴资产阶级特权阶层为自己创造了通过剥削劳动人民而发财致富的一切可能，最大限度地强化工人劳动，以便榨取更多的剩余价值。"},{"type":"paragraph","text":"文章最后说，“今日的苏联已经变成了社会帝国主义和法西斯主义的国家，这个国家的资产阶级无情地剥削工人阶级和劳动群众。这一事实揭露了俄国社会法西斯分子的‘社会主义’口号，并且不可避免地导致苏联资产阶级和工人阶级之间鸿沟的加深，从而激化它们之间的矛盾。最近几年苏联各地发生的罢工和示威就表明了这些矛盾的尖锐程度。苏联资产阶级加紧压迫，必将引起人民对他们的更强烈的反抗。”"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"08b8b35806"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
