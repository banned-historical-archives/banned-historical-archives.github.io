script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"研究封建剥削关系有了新资料  唐代丁课银锭在长安首次发现","authors":[],"dates":[{"year":1964,"month":6,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"研究封建剥削关系有了新资料"},{"type":"paragraph","text":"唐代丁课银锭在长安首次发现"},{"type":"paragraph","text":"一个距今一千二百一十年的唐代丁课银锭最近在陕西长安县被首次发现。"},{"type":"paragraph","text":"这个银锭长三十厘米，宽八厘米，厚零点五厘米，净重合现在的市秤四斤二两。两面都刻有文字。一面是：“天宝十三载，丁课银匹锭五十两”。另一面记载着当时征收丁税银锭宣城郡县地方长官的姓名及其职衔。"},{"type":"paragraph","text":"据《旧唐书》和《新唐书》等历史书籍记载，“丁课”（又称“丁税”）的实施，是盛唐时期均田制度遭到破坏，租庸调法难以执行时，采用的一种赋税制度。丁课银锭的发现，使研究唐代赋税制度和封建剥削关系有了新的宝贵的实物资料。（据新华社西安电）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5f8bdb81c4"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
