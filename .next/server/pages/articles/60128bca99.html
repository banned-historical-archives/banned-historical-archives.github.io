script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"割断资产阶级个人主义尾巴  上海水产学院教师开展交心运动","authors":[],"dates":[{"year":1958,"month":4,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"割断资产阶级个人主义尾巴"},{"type":"paragraph","text":"上海水产学院教师开展交心运动"},{"type":"paragraph","text":"新华社上海19日电　上海水产学院教师自觉地向党向社会主义交心，批判自己的资产阶级个人主义思想。"},{"type":"paragraph","text":"水产学院教师们在全民整风运动中思想有了很大提高，进一步认识到知识分子有根本改造政治立场的必要。教师中的积极分子更体会到要“兴无灭资”，只有“破”得彻底，才能“立”得巩固。在学校党委会的鼓励下，他们自觉地把自己的个人名利、知识私有、文人相轻等种种资产阶级个人主义思想挖掘出来加以批判，以此作为向红透专深目标迈进的第一步。"},{"type":"paragraph","text":"半个月以来，在积极分子的带动下，所有的民主党派和无党派的讲师以上教师举行了许多次大小交心谈心座谈会。人人都发言检查自己，许多教师作了自我批评以后，还找自己的朋友互相诚恳耐心地启发和帮助。海洋渔业系海事教研组高鸿章副教授检查自己在教学工作中存在着严重的个人主义，将知识作为私有财产，一直不愿将讲稿给教研组内的青年教师看，生怕自己的材料被别人用去了。自己编写的讲稿不是全面、系统的，而是用有头无尾、去头去尾的办法使别人看不懂全部内容。培养助教也是留一手，使助教提高很慢。养殖生物系养殖教研组主任刘琴忠讲师自我批评说，过去领导上分配他代教研组主任时，只口头宣布；评级评薪时，自己以为评个七级没有问题，结果大家将他评为八级。这两件事使他一直很不高兴。现在才体会到这种计较个人名利的思想正是造成自己几年来思想落后、工作消极的根本原因。副教务长林亨嘉检查说，过去总认为自己是靠拢组织的，但检查起来却没有真正做到与党一条心，遇到与个人利益有关的具体问题如工资级别问题，不如自己的意，就表现了不满。"},{"type":"paragraph","text":"一些教师还检查了右派猖狂进攻时自己对“教授治校”等谬论发生共鸣的错误。一向对政治不闻不问的人，在会上踊跃地一再要求发言，几年来一直没有谈的思想问题大都谈出来了。在下定决心割断资产阶级个人主义尾巴以后，教师们心情格外舒畅愉快，大大增强了自我改造的信心和力量。现在运动还在继续深入进行。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"60128bca99"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
