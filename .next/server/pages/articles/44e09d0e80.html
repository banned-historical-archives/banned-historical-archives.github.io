" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"“如果边整边改应多和民主党派商量”","authors":["北京师范大学","董渭川"],"dates":[{"year":1957,"month":5,"day":31}],"is_range_date":false,"parts":[{"text":"“如果边整边改应多和民主党派商量”","type":"title"},{"text":"北京师范大学董渭川","type":"authors"},{"text":"(董渭川：北京师范大学教授、校委会委员、教育学院院长、副教务长)","type":"subtitle"},{"text":"在党委召集的校部党外人士座谈会土的发言","type":"subtitle"},{"text":"在整风学习的第一次会上我的发言就摊了牌，以我自己遭受的轻视和歧视作例说明师大的党是怎样对待旧知识分子的，可是校刊把我的话删改到毫无具体内容了。我要质问两位党委书记，上星期我在教育系座谈会上的发言，“师大教学”不给我登，是什么原因？","type":"paragraph"},{"text":"肃反把师大的“九三”当敌人看待。我问一句“九三有没有人被斗？”后来一位党员说我摸你们的底。我受了这么大的委屈，不能对九三同志讲，怕造成他们对党的不满。我乜也没向社的上级反映，如果统战部有人来检查，在宗派主义严重的情况下，关系岂不更坏？现在我为了帮助党整风，把这问题提出来，为什么不答复？我的话为什么不登？","type":"paragraph"},{"text":"党从来不信任我，几年来在教育实习工作上把我折磨够了。前年冬天我病了，何副校长要给我200元，我感到是对我的侮辱，当然我不接受。在肃反以后，我就摆脱了师大九三的领导工作，当一个普通社员，过去不论九三和我个人提过很多意见，都不被理采。我心中有很多气恼，偶然回家发几句牢骚，而我的爱人说：  “你这样，会给孩子们什么教育？”我只好什么也不说了。","type":"paragraph"},{"text":"董渭川副教务长又说：我认为党到现在仍没有把民主党派看在眼里，过去召集民主党派商量整风计划等，那都是形式。党现在失去了控制力，应依靠民主党派，如何边整边改？整风之后如何办？不应多和民主党派商量吗？可是到今天民主党派在一旁用不上力去。    (董先生亲自修改稿，原载“师大教学”129期)","type":"paragraph"}],"comments":[],"origin":"见《“阳谋”下的北师大之难》(真相出版社，2011)。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"44e09d0e80"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
