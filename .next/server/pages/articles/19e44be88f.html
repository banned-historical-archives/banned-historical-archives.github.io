<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反对“背公式、啃教条”批判资产阶级思想过程中的一种偏向","authors":["远征"],"dates":[{"year":1952,"month":5,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"远征"},{"type":"paragraph","text":"目前，同学们正全力投入批判资产阶级思想的运动，对三反、五反运动中所暴露出的各种问题，加以仔细分析，深刻批判，挖掘出资产阶级思想的老根，肃清它对我们的一切影响，这说明了广大青年同学是热烈要求进步的，但是今天却还存在一些问题，将使我们在思想改造中走弯路，受到一定损失，或竟“事与愿违”!改造得不彻底，其中有一种现象，叫做“背公式，啃教条”，就是光谈现象，不能接触到问题的本质。"},{"type":"paragraph","text":"某次，一位同志暴露他的资产阶级思想时，谈到他有两次在寝室里，趁同学不在时，私开人家抽屉，拿了两张信纸用，当然这是不折不扣的盗窃行为，应该批判。"},{"type":"paragraph","text":"可是另外一位同学，自以为对上述检讨“体会很深”，于是便推论出:“当别人不在时，不论有什么事，都不应该开人家抽屉”，言下大有凡属此类行为，均为资产阶级腐朽思想表现之意，有人问他:“譬如有位同学抽屉里有本书，我急需要看，而这位同学适巧不在，或竟整天不回寝室，这时是否能开抽屉拿书?”，他的回答也是否定的，他并举出:有一次当他因公到别人寝室去取一件公家的东西时，为了“避嫌”，拉了另外一个同学一道进去。以此显示他在三反、五反运动中的确“大大地提高了警惕性”，养成了“大公无私”的精神!但试问这时恰好没有人可拉，公家的东西拿不拿呢?公家的事情做不做呢?是不是因为你要表示个人“清白”而躭误工作呢?至于这位同学心里是否有个“偷”字存在，姑且不论，显然，他被现象所迷惑了，没有真正认清这一现象中所存在的思想，可能有各种各样，不能都肯定是“意图盗窃”，不从思想的本质去认识，将会使我们的思想改造运动趋于混乱，无的放矢，空穴来风，根本无法深入。"},{"type":"paragraph","text":"事实证明:单从现象上看问题，是会使我们混淆不清的。举几个例说吧，譬如你的邻居，家里没人，灶里余烬未熄，因而失了火，这时你又怎么样?当然不能不救，但如果这样，岂不是和小伦掩入无人之家去盗窃的行为同一现象吗?一望而知:前者是见义勇为，急人之难，后者则趁火打劫，是非不辨自明，两种思想，两种目的，迥不相合，“背公式、啃教条”者他们就会武断:“两种现象相同，其思想性质亦必相同。”势必至于“救火者为趁火打劫”了，甚至连一个最简单的道理:美国为侵略朝鲜而打仗，中国人民志愿军为保卫和平而战斗，按照背公式、啃教条者的“理论”，亦必扑朔迷离，是非莫辨。这样钻下去，他们将葬身在牛角尖里而不能自拔，在工作上造成缩手缩脚，不肯负责，拖拉松懈的现象，这是不可容忍的。"},{"type":"paragraph","text":"众所周知:今天我们要在三反、五反运动的基础上，进行资产阶级思想的批判工作，就是从我们在上述运动中所暴露出的问题，从当时的思想活动，肯定其思想性质，加以分析批判，认清其严重性及危害性，这样我们对资产阶级腐朽思想，就能生出强烈的憎恨，掘根堵源，摧巢扫穴，时时警惕，永不再犯!这些才是批判资产阶级思想的真正要求，“背公式、啃教条”非但不能达到这个目标，甚且迷糊了我们前进的方向。"},{"type":"paragraph","text":"教条主义者，其实是思想懒汉，不动脑筋，人云亦云，似是而非。这种人应该得到严厉批判，因为“背公式、啃教条”，对他们自己的进步，对思想改造运动的开展，都是一种阻碍。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"19e44be88f"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
