script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"朝鲜民青同盟中央扩大全会通过告青年书  加强阶级教育　反对修正主义","authors":[],"dates":[{"year":1963,"month":10,"day":31}],"is_range_date":false,"parts":[{"type":"paragraph","text":"朝鲜民青同盟中央扩大全会通过告青年书"},{"type":"paragraph","text":"加强阶级教育　反对修正主义"},{"type":"paragraph","text":"据新华社平壤三十日电　朝鲜民主青年同盟中央委员会二十五日至二十七日举行了第十七次中央扩大全会。"},{"type":"paragraph","text":"民主青年同盟中央委员会委员长洪淳权在全会上作了报告。会议通过决议，在一九六四年五月间举行朝鲜民主青年同盟第五次代表大会，并向大会提出把同盟的名称改为社会主义劳动青年同盟的建议，会议通过了其他有关的决议。会议还通过了“在朝鲜民主青年同盟第五次代表大会前夕告全体民青盟员和青年书”。"},{"type":"paragraph","text":"告全体民青盟员和青年书中说，在青年中加强阶级教育，不断提高他们的阶级觉悟，是民青同盟当前的重要任务。民青盟员和青年们必须更加高举反对帝国主义、特别是反对美帝国主义斗争的旗帜，同时必须进行反对正在为帝国主义效劳的现代修正主义的斗争。民青盟员和青年们必须反对安逸和腐化，使青年队伍不受修正主义倾向的丝毫侵害。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8b8ca63b7c"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
