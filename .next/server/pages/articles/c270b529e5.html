script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反对垄断资本残酷剥削  要求保卫生活权利  日本劳动妇女日益觉醒加强斗争","authors":[],"dates":[{"year":1974,"month":3,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反对垄断资本残酷剥削  要求保卫生活权利"},{"type":"paragraph","text":"日本劳动妇女日益觉醒加强斗争"},{"type":"paragraph","text":"新华社东京一九七四年三月八日电　日本广大劳动妇女在反对垄断资本残酷剥削、保卫生活权利的斗争中，正在日益觉醒。"},{"type":"paragraph","text":"去年冬季以来，日本妇女通过举行集会、示威游行和散发传单等活动，强烈抗议垄断资本囤积居奇和哄抬物价的行径。去年十二月二十五日，东京十七个妇女组织召开了抗议大会。有的妇女组织对某些垄断企业进行了调查，揭发它们合谋抬高物价、加紧剥削人民的行径，并且进行了斗争。"},{"type":"paragraph","text":"今年，许多劳动妇女积极参加了春季斗争。三月一日在国营铁路工人举行大罢工时，劳动妇女还单独举行了集会和游行。三月三日，参加在东京举行的反对通货膨胀大会的妇女不仅有工会会员和妇女组织的成员，还有许多家庭妇女。有些妇女还带着孩子参加了会后的示威游行。"},{"type":"paragraph","text":"三月六日和七日，五百多名来自日本全国各地的从事家庭副业的妇女代表在东京举行集会。代表们在会上愤怒地控诉了垄断资本对她们的残酷剥削，抗议通货膨胀和物价上涨，要求保卫生活权利。她们还表示要积极参加日本工人的春季斗争。"},{"type":"paragraph","text":"日本妇女还积极地参加了反对公害的斗争。她们在日本各地开展各种形式的斗争，反对垄断资本由于追求超额利润而肆意污染大气、近海、河水，严重破坏生活环境、损害人民健康的罪行。"},{"type":"paragraph","text":"日本劳动妇女通过斗争实践，觉悟正在不断提高，要求进一步加强团结的愿望日益强烈。她们一面巩固和扩大妇女组织，一面积极参加日本人民声援世界人民正义斗争的活动。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c270b529e5"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
