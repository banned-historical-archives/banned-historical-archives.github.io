<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"华北局对天津专区严重侵犯中农利益等问题致河北省委的指示","authors":[],"dates":[{"year":1949,"month":11}],"is_range_date":false,"parts":[{"text":"华北局对天津专区严重侵犯中农利益等问题致河北省委的指示","type":"title"},{"text":"看到天津市委冬季工作指示后，提出如下意见望考虑。","type":"paragraph"},{"text":"一、天津地区在生产救灾中严重侵犯了中农利益，违背了党对中农的团结政策，大大影响了中农的生产情绪，这种错误是否得到了全部纠正？在纠正中又发生了什么问题？在冬季工作中如何补救？都未见到他们在指示中提及。故特提起你们注意，望在冬季工作中严加注意防止可能发生的错误。并应对天津地委领导上进行检查，为何同时在几个县中发生同样性质的侵犯中农利益的错误？天津地委对这一原则性的错误，应向你们做专题报告并转华北局。","type":"paragraph"},{"text":"二、新区土改中，他们提出对地、富采取和平方式。这种提法如系指的禁止乱打乱杀乱扣，和平的合法斗争的方式而言，则是对的；但这绝不是说没有斗争。他们提出的和平方式，很容易使干部认为不要斗争，在工作中应加以注意。","type":"paragraph"},{"text":"三、关于地、富逃亡城市的财产，不再追究，因为这样影响城市革命秩序，并对发展城市工商业也是无害的。","type":"paragraph"},{"text":"附：","type":"appellation"},{"text":"河北省委关于天津专区五个县镇严重违反党的中农政策侵犯中农利益的通报","type":"subtitle"},{"text":"天津专区，武清、宁河、天津、静海等县镇，在生产自救运动中，曾相当普遍的发生严重的侵犯中农利益的左倾错误：如武清县几个区，自从今春到秋收都曾先后发生强借中农粮食分给贫农，甚至有的村干部借粮未遂竟砍掉四户中农的二十九棵树，赶走两口猪，种麦中为强借中农麦种曾吊打中农。静海×村对中农成份的村干部，“你借粮不积极就斗争你”。宁河×村组织合作社强迫中农入股算为贫农股金。胜芳一区违反党保护工商业政策向三十家商户强行借粮十五石。这些挖肉补疮的自杀政策，不但解决不了广大灾民的困难，反而造成这些村庄中的中贫农对立。中农大吃大喝，不愿生产，有资金也不敢拿出来生产，不仅不种麦，还向外推地，而烈军工属则更增加依赖思想，不积极生产。结果不是生产自救，却给生产以破坏，给救灾工作增加了困难。","type":"paragraph"},{"text":"产生以上错误的原因，除了有些地方是由于组织不纯外，主要是当地党委以及政府的一些干部不很好学习党的政策，仍严重顽固的存在着左倾情绪，如×区还宣传“每户每人平均五亩地以上就是富农”。区干张双见到强借中农粮食，非但不加制止，反表扬为“生产救灾的好办法”。武清的某些区级干部经县委指出还不接受。这种错误是在党已经进行过将近两年的反对左倾错误、坚决团结中农的教育情况下发生，并长期存在，未能及时纠正，甚至有某些发展。虽然地、县委近年来也做了通报、指示，但未提到原则高度，也放在不大重要的位置（四期通报的最后）。对这种严重的政策性的错误与无政府无纪律的行为，既未及时向省委报告（当省委初次得到这个消息，曾电告地委立即检查并告以如何处理，直到现在未见答复），亦未采取积极措施。因此：","type":"paragraph"},{"text":"一、地委首先依此精神做自我检讨，对某些坚持错误的干部给以教育及适当处分（如思想还不能真正接受即送党校学习政策），并以实例教育全党，务必在今后不容有类似错误发生。","type":"paragraph"},{"text":"二、并派员到较严重的县份帮助县委切实检查、检讨并认真纠正，已侵犯的中农利益，进行赔偿道歉，已用之粮款，由政府总当补偿。","type":"paragraph"},{"text":"三、对组织不纯应向群众公开揭穿并公开整顿组织、说明侵犯按利益是反动的行为，说明党坚决团结中农的政策。","type":"paragraph"},{"text":"这一严重教训望各地纪取，个新区依此精神切实检查，把结果报我们。","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f6a4b5f5aa"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
