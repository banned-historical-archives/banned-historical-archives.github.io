script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"不允许资产阶级的辩护士颠倒黑白、混淆是非!","authors":["吴超","忠基","王俊杰","石文波","陈宏述","黄桐年"],"dates":[{"year":1952,"month":4,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"说许云影同学揭露奸商父亲的罪行是为了“出风头”，那完全是不法商人的口吻，但今天居然出诸大学教授和大学生之口，岂不令人感到痛心!从这样的大学教授和大学生身上，又那能嗅得到一丝一毫工人阶级的气味?"},{"type":"paragraph","text":"解放军六十八师"},{"type":"paragraph","text":"二○四团战士　吴超"},{"type":"paragraph","text":"讲起来，他们都是大学教授和大学生呢，请他们听听许同学的十一岁弟弟、十三岁妹妹说的话吧!“你是我的好姐姐，我向你学习!”总之，许云影同学这种英勇正义的行动，是光明磊落的，是合乎全国人民利益的，她是站在毛泽东旗帜下和广大的劳动人民紧紧的团结在一起，站在一条战线上战斗着!"},{"type":"paragraph","text":"人民解放军二十四"},{"type":"paragraph","text":"军七十一师山炮营　石文波"},{"type":"paragraph","text":"养活许同学的人究竟是什么人呢，是不是那不法资本家父亲呢?不是!是每天辛勤劳动、过着牛马般的生活，那些每天工作十二小时以上的工人，不但许同学是工人养活的，就连那不法资本家自己也是工人所养活，不法资本家父亲还无耻的对许同学说:“全靠我养活你，否则你们都饿死”。看看究竟谁养活谁?“恩”在那里?“义”在何方?"},{"type":"paragraph","text":"人民海军　陈宏述"},{"type":"paragraph","text":"许云影同学的检举奸商父亲完全是一种正义行动，我们完全拥护她的正义行动，这一行动毫不过火，许同学检举的是五毒俱全的奸商，是为了保卫人民利益，只有站在资产阶级立场的人才会说她是“忘恩负义”，说她“过火”。像沪江大学部份师生颠倒黑白、混淆是非，是我们所不能容忍的!"},{"type":"paragraph","text":"上海市公安总队"},{"type":"paragraph","text":"一团四连战士　王俊杰"},{"type":"paragraph","text":"人民的眼睛是雪亮的，如今无数事实也已证明，“忘恩负义”的正是那些残害人民、偷漏国税、腐蚀干部，经过国家扶持使工商业得到发展后，而又反过来偷工减料、盗窃国家资财的许仲清之流的不法商人。一句话，谁要是以为许云影检举不法父亲是过分的话，那么，谁就是在替不法资本家作可耻的辩护。沪江大学部份师生受人民国家培植，结果替资产阶级当辩护士，那实在是非常可耻的!"},{"type":"paragraph","text":"华东军区第七陆军医院　忠基"},{"type":"paragraph","text":"许云影同志的英勇行为，对我们每个青年是生动具体的教育，我们也应以许同志的光荣事迹，作为我们努力方向。"},{"type":"paragraph","text":"但沪江大学部份师生，对许同志英勇的举动，竟无动于衷，相反的采取孤立污蔑，公开的为资产阶级辩护，助长了资产阶级的反动气焰，这是令人痛心的现象。沪江部份师生应当深入检查思想。"},{"type":"paragraph","text":"黄浦分局延安路派出所　黄桐年"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"94f5d1fd1f"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
