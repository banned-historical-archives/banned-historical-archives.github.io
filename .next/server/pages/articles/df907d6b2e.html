" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji42","name":"毛泽东全集第42卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji42.pdf"],"article":{"title":"印发《王国藩社的生产情况一直很好》等四篇文章的批语","alias":"","parts":[{"type":"paragraph","text":"印发《王国藩社的生产情况一直很好》等四篇文章的批语"},{"type":"paragraph","text":"（1959年8月6日）"},{"type":"paragraph","text":"[1]指中共中央书记处候补书记、毛泽东的秘书胡乔木1959年8月5日送阅的《经济消息》上登载的四篇文章。其中《苏联专家近来的一些表现》一文指出，近来许多苏联专家对我党在经济工作方面采取的一些措施表示热烈拥护，他们感到最满意的是各地注意了生产指标的落实和提高产品质量。许多专家现在的工作比以前更加积极，提出的建议也比过去增多。现在心情还不大愉快的是某些要“下马”的基本建设单位的专家。《王国藩社的生产情况一直很好》一文说，七年前曾被称为“穷棒子社”的河北省遵化县王国藩合作社，去年和其他农业社合并成建明人民公社以来，生产和生活都搞得很好，各项工作均名列前茅。远因是合作化以来，当地党组织一直坚持了勤俭办社的原则，逐年进行了农田基本建设，添置了耕畜和大农具等生产资料，提高了农业生产力。近因是当地党组织在大跃进高潮中工作踏实，坚持了群众路线，挡住了“共产风”，正确执行了党的政策，鼓励私人养猪，办好食堂，实行“以人定量、节约归个人”的办法。以王国藩为核心的领导骨干一直同群众保持密切的联系，遇事找群众商量，向上级请示。《自前农村中讲闲话较多的是哪些人》一文介绍了中共长沙市委最近对郊区临福公社各阶层的政治思想情况调查，指出目前农村中讲“闲话”较多的是一些新上中农和老上中农；真正反对我们的是地、富、反、坏、右五类分子，但他们人数很少；占农村人口最多的贫农和新老下中农则是衷心拥护党，坚决走公社化道路的。《明年重工业方面要多搞些什么》一文介绍了国家计委一些同志最近在研究明年计划时，对调整重工业内部比例关系问题提出的一些看法：应当少增产铁和钢，多增产钢材；多进口石油和橡胶，多搞些这方面的基本建设，少搞些消耗石油、橡胶的机器和车辆；应多注意发展基本化学工业。毛泽东全集第四十二卷"},{"type":"paragraph","text":"将这四篇印发各同志。请各省、市、区党委负责同志将王国藩人民公社一篇印发所属一切人民公社党委，并加介绍，请各公社党委予以研究，有哪些经验是可以采纳的。据我看，都是可以采纳的。第一条，勤俭办社；第二条，多养猪（不养猪的回族除外）；第三条，增殖大牲畜；第四条，增加大农具；第五条，食堂办法；第六条，工作踏实，实事求是；第七条，有事同群众商量，坚持群众路线。这些都是很好的。我想，每一个专区总可以找到一个至几个办得较好如同王国藩“那样的公社，请你们用心去找，找到了加以研究，写成文章，公开发表，予以推广。《目前农村中讲闲话较多的是哪些人》这一篇，也值得一看。这同目前在庐山讲闲话较多的人们是有联系的。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"八月六日"},{"type":"paragraph","text":"印时注意次序：1.苏联专家…；2王国藩…；3目前农村中…；4.明年重工业…………"},{"type":"paragraph","text":"[1]王国藩，当时任河北省遵化县建明人民公社主任。"}],"authors":["毛泽东"],"dates":[{"year":1959,"month":8,"day":6}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":262,"page_end":263},"tags":[{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"df907d6b2e"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
