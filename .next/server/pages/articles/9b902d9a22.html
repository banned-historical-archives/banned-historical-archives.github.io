script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"武装群众思想　批判修正主义日共举办学习马列主义讲演会","authors":[],"dates":[{"year":1965,"month":7,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京13日电　东京消息:日本共产党为了胜利召开第十一届禁止原子弹氢弹世界大会，决定从九日起到月底在东京、京都、大坂、福冈、广岛、长崎、名古屋等城市举办学习马克思列宁主义的大型讲演会。"},{"type":"paragraph","text":"据《赤旗报》最近报道这项消息时指出，正当美国加紧侵略越南，日本事实上参与了美国侵越战争的时候，战争与和平已成为广大人民最紧迫和最关心的问题，而现代修正主义者围绕这一问题又散布了很多荒诞的“理论”，企图削弱和分裂争取和平的力量。为此，日本共产党举办了这个讲演会，使日本人民通过这次讲演会，能够系统地讲解在战争与和平问题上马克思列宁主义和现代修正主义的斗争，在战争与和平这个具有根本性的问题上分清是非，并对现代修正主义进行彻底的批判。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9b902d9a22"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
