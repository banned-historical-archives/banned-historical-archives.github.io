script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"工人占领工厂　农民占领车站　学生占领学校  意各地群众不断斗争反对剥削和压迫","authors":[],"dates":[{"year":1969,"month":2,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"工人占领工厂　农民占领车站　学生占领学校"},{"type":"paragraph","text":"意各地群众不断斗争反对剥削和压迫"},{"type":"paragraph","text":"据新华社二十三日讯  罗马消息：意大利全国各地的工人、农民和学生连日来纷纷举行示威、罢工和采取占领市政厅、厂房、校舍等行动，抗议意大利垄断资产阶级的残酷剥削和压迫。"},{"type":"paragraph","text":"维琴察省瓦尔达尼奥市的“马佐托”毛纺企业的五千名罢工工人为要求增加工资，已经占领工厂将近一个月。二十一日，这个工厂的一部分工人又占领了当地市政厅，抗议当局无视工人的合理要求。"},{"type":"paragraph","text":"在卡塞塔市，已经占领了法国资本控制的“圣·戈班”玻璃厂的工人，二十一日也占领了当地市政厅，要求增加工资。"},{"type":"paragraph","text":"蒙法尔康的一家造船厂三千名工人二十一日占领了工厂，抗议资本家无理解雇工人，要求改善劳动和生活条件。"},{"type":"paragraph","text":"加拉布里亚区罗萨诺市的五千名农民十九日举行示威，抗议垄断资本家用压低桔子收购价格的手段牟取暴利。愤怒的农民占领了当地火车站，并且在铁路线上设了障碍物，使得到罗马去的火车中断了好几个小时。"},{"type":"paragraph","text":"与此同时，罗马大学几千名学生二十二日坚持斗争，继续占领这个大学的十二个学院，反对腐朽的资产阶级教育制度，并且抗议学校当局企图用关闭学校的手法来破坏学生的斗争。"},{"type":"paragraph","text":"二十二日学生们在他们占领的许多大楼上升起红旗，并且高唱《国际歌》，在校园内举行游行示威。在学校的许多大厅内，学生们还举行集会和讨论会，揭露腐朽的资产阶级教育制度，并谴责政府当局镇压学生的反动措施。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"28d5343c24"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
