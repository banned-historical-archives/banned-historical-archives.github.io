script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"拉萨市基层选举胜利结束班禅额尔德尼等同广大选民一起投票　277名当选人民代表中，80%以上是过去的农奴和奴隶","authors":[],"dates":[{"year":1962,"month":12,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社拉萨27日电】　拉萨市的基层选举到25日已经胜利结束，选出了拉萨市城关区第一届人民代表大会代表。"},{"type":"paragraph","text":"拉萨市城关区德吉路办事处第四居民区最后举行选举，住在这个居民区第十一选区的西藏自治区筹备委员会代理主任委员班禅额尔德尼·却吉坚赞，副主任委员阿沛·阿旺晋美、帕巴拉·卓列朗杰、詹东·计晋美、拉敏·益喜楚臣和选民们一起投了票。这天，作为这个选区投票站的拉萨大礼堂布置得庄严美丽，选民们高举彩旗，抬着毛主席象，敲锣打鼓、边歌边舞地来到投票站。许多选民过去是受压迫的奴隶，今天他们兴高采烈地履行了光荣的公民权利。班禅额尔德尼、阿沛·阿旺晋美、帕巴拉·卓列朗杰等在这里同广大选民们一起把选票投入票箱，他们并且在投票结束宣布当选代表的名单以后，向当选的区人民代表大会代表献了哈达，祝贺他们取得人民的信任。在这以前，中央人民政府驻西藏代表、中共西藏工委书记张经武，中共西藏工委副书记周仁山、郭锡兰也和这个居民区第八选区的选民一起投了票。"},{"type":"paragraph","text":"拉萨市在这次基层选举中，共选出二百七十七名人民代表，其中80%以上是民主改革前的贫苦农奴和奴隶。他们过去受苦最深，几年来在党的领导下认真执行党的政策，密切联系群众，提高了工作能力和思想觉悟，受到选民的信任。旦巴乡的一百七十多户居民，民主改革前几乎全部是领主的奴隶，他们没有地种，不会从事农业生产。民主改革以后的几年里，担任这个乡农民协会生产委员的贫苦女农奴措姆，带领群众学会了犁地、撒种、除草和灌水等农业生产技术，并发动群众开荒，发展农业生产。天旱时她和群众一起抗旱，今年秋季雨水多，她又和群众一起防洪排涝。在她和其他委员领导下，且巴乡连续获得三年丰收，粮食自足的农户年年增加。在这次普选中，措姆被选为旦巴乡人民代表大会代表，并在第一次乡人民代表大会上当选为乡长。许多选民在选举后怀着激动的心情说，过去我们只有给领主当牛当马的“权利”，那时每当看到八角街旗杆上挂了哈达，才知道有人升了官；现在我们能管理国家大事，选出自己满意的人为我们大家办事，我们真正成为国家的主人了。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d907fe63b3"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
