<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"一本论述毛泽东思想的读物","authors":["任明"],"dates":[{"year":1982,"month":1,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"任明"},{"type":"paragraph","text":"什么是毛泽东思想，毛泽东思想是如何形成和发展的，如何正确地评价毛泽东同志和毛泽东思想的历史地位，如何坚持和发展毛泽东思想，这都是人们十分关心的问题。最近，上海人民出版社出版的马齐彬、陈登才著《浅谈毛泽东思想》一书，比较具体地回答了这些问题。"},{"type":"paragraph","text":"马齐彬、陈登才同志是中共中央党校党史教研室的教授和讲师，对毛泽东思想有比较深刻的研究，这本书是在他们长期进行毛泽东思想教学研究过程中逐步写成的。全书立论清楚，资料丰富，不失为一本宣传毛泽东思想的较好读物。"},{"type":"paragraph","text":"比如，作者在阐述毛泽东思想是中国共产党集体智慧的结晶时，提出了自己的见解:认为毛泽东思想集中概括在毛泽东同志的全部科学著作中，而不能说毛泽东思想既概括在毛泽东同志的全部科学著作中，又概括在其他老一辈无产阶级革命家的著作中。既然这样又为什么说，毛泽东思想是党的集体智慧的结晶呢?作者分析了毛泽东同志的著作，按其来源大致可归纳为如下几个方面:有的是毛泽东同志亲自起草的决议，如《古田会议决议》，是毛泽东同志根据中央九月来信的精神，结合红四军党内的具体情况写成的，这中间包含了周恩来、朱德、陈毅等同志的集体智慧；有的是经过党中央或中央政治局反复讨论修改、由毛泽东同志亲自定稿的，如《论联台政府》；有的是由毛泽东同志和其他同志合写的，如《中国革命和中国共产党》，就是在延安时期，毛泽东同志和范文澜等同志合写的；还有的是经毛泽东同志反复征求党内意见后，作了报告，根据报告记录整理，再征求党内意见后修改审定的，如《关于正确处理人民内部矛盾的问题》等等。通过上述分析，作者得出了这样的结论:毛泽东思想的基本原理，是毛泽东同志集中了党和人民集体智慧的基础上形成的。毛泽东同志对毛泽东思想的形成作出了最伟大的贡献。"},{"type":"paragraph","text":"对毛泽东思想形成和发展的历史，作者把它划分为萌芽、形成、成熟和继续发展四个时期，这是颇有独到见解的。作者认为，从一九二一年党的成立到一九二七年大革命失败，毛泽东思想处于萌芽时期。从一九二七年大革命的失败到一九三五年一月的遵义会议，是毛泽东思想形成的重要时期。毛泽东思想比较完整地形成，并达到成熟阶段，还是在延安时期，即从一九三五年至一九四五年。从一九四六年到一九五六年，毛泽东思想又有新的发展。在这十年中，我们党创造的许多新鲜经验，给马列主义宝库增添了新的内容，是毛泽东思想发展的光辉时期。这样的分析，使我们懂得，毛泽东思想是在中国革命和建设的长期实践中逐步形成和发展起来的。"},{"type":"paragraph","text":"对坚持和发展毛泽东思想，作者认为，既要实事求是地肯定毛泽东思想的科学价值，肯定毛泽东思想的指导作用；又要实事求是地承认毛泽东同志晚年犯了错误，并把毛泽东思想和毛泽东同志晚年所犯的错误区别开来。如何才能把毛泽东思想和毛泽东同志晚年所犯的错误实事求是地区分开来呢?作者提出了划分的标准，读了能给人以启发。"},{"type":"paragraph","text":"总之，《浅谈毛泽东思想》一书，以笔者所见，是一本比较全面系统地论述毛泽东思想的读物，值得一读。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"人民内部矛盾","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b02afab5c4"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
