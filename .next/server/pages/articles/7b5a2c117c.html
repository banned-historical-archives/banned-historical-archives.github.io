script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"组织恐怖集团　进行破坏活动  南斯拉夫长期干涉阿尔巴尼亚内政  阿“人民之声报”列举大量事实揭露现代修正主义者的罪行","authors":[],"dates":[{"year":1958,"month":8,"day":31}],"is_range_date":false,"parts":[{"type":"paragraph","text":"组织恐怖集团　进行破坏活动"},{"type":"paragraph","text":"南斯拉夫长期干涉阿尔巴尼亚内政"},{"type":"paragraph","text":"阿“人民之声报”列举大量事实揭露现代修正主义者的罪行"},{"type":"paragraph","text":"新华社地拉那30日电　阿尔巴尼亚“人民之声报”21日发表了一篇以“事实在说话”为题的评论，用一连串铁的事实揭露了南斯拉夫无耻干涉阿尔巴尼亚内政的行为。"},{"type":"paragraph","text":"评论说，南斯拉夫领导者认为自己是“牺牲品”，或者是“被迫害的”，认为他们指责别人只是为了“自卫”。南斯拉夫领导人竭力企图歪曲我们两国的历史关系，从而，推卸他们应担负的严重责任。但是历史是永远改变不了的。"},{"type":"paragraph","text":"评论说，1949年11月，南斯拉夫政府声明废除阿南友好互助条约。这里应当强调指出，早在1948年以前，南斯拉夫政府就开始了反对我国的敌对活动和破坏这一个条约。1948年以后，托洛茨基的南斯拉夫领导更频繁地进行各种活动，包括组织代理人和反阿尔巴尼亚人民的集团。如在1948年年底，南斯拉夫驻阿尔巴尼亚使馆的前任工作人员萨沃·博齐达罗维奇在地拉那组织了以南斯拉夫公民赫森·塞伊迪尼为首的恐怖集团，这一集团的目的在于组织谋杀、怠工并进行反对阿尔巴尼亚人民和阿尔巴尼亚政府的宣传活动。"},{"type":"paragraph","text":"1950年在阿尔巴尼亚的领土上，曾经破获了一个由UDB（南斯拉夫保安机构名称的缩写）派遣的特务和破坏分子所组成的组织。出现这一些破坏分子的事实，对南斯拉夫领导者是一种揭发。破坏分子普伦·德达曾经招认，为了向阿尔巴尼亚派遣破坏分子和散发宣传材料，在阿尔巴尼亚国境周围建立了许多据点。当破坏分子被派出时还发给炸弹，说是为了炸死边境的哨兵。破坏分子托迪·卡罗维希招认，他曾经写下了充当UDB间谍的宣誓书，为了反对阿尔巴尼亚驻南斯拉夫公使馆，他在贝尔格莱德曾经受过训。特务阿里夫·杜夫卡和穆哈伦·贾塞等人说UDB曾经指使他们暗杀阿尔巴尼亚的军官、士兵和工作人员，剪断电话线，煽动和组织所谓“不满分子和不纯分子”逃往南斯拉夫等等。事实证明，南斯拉夫修正主义者在很早以前就广泛展开了反对阿尔巴尼亚的敌对活动。南斯拉夫内政部在南斯拉夫领土内把我国人民的叛徒组织起来。据了解，在1948年8月，南斯拉夫曾把一些特务走狗和匪徒们组成了一个政治军事委员会，这个委员会的目的在于同在巴黎由英美所组成的“自由的阿尔巴尼亚”协会进行合作。据了解，英国和美国的特务分子就曾经同南斯拉夫特务进行过合作，以反对阿尔巴尼亚的主权独立和领土完整。为了更好地领导反对我国的武装匪徒和破坏分子以及罪犯们，同一时期根据南斯拉夫内政部的指示，在阿尔巴尼亚边境周围建立了一系列的UDB中心。评论指出，所有这一切都表明南斯拉夫在干涉一个自由国家的内政。在南斯拉夫修正主义者的法典和字典里，许多字的含意被篡改了。例如，“干涉”对南斯拉夫领导人来说不意味着派遣破坏分子来阿尔巴尼亚领土，或是指示纳吉匪徒在匈牙利进行反革命活动，相反地却把苏军帮助匈牙利人民镇压反革命说成是“干涉”。"},{"type":"paragraph","text":"评论说，在1954年以后，南斯拉夫领导人并没有中断过他们的敌对活动。就是在阿尔巴尼亚和其他社会主义国家努力改善同南斯拉夫关系的时候，铁托的间谍们还在地拉那进行过破坏活动。南斯拉夫使馆前任工作人员斯维托·武契奇还对阿尔巴尼亚党和政府的敌人指示过工作。他们展开了从组织怠工、派遣破坏分子和阴谋与破坏我国党政领导，一直到迫害我国公民，以及最近谋杀哈桑·斯帕塔等一系列的活动。不过在一篇文章内，我们是不可能写下贝尔格莱德的“牺牲者”为反对阿尔巴尼亚人民所进行的各种干涉的。正是这些事实证明南斯拉夫的修正主义者们是国际共产主义运动的分裂者，是社会主义事业的敌人，是美帝国主义的代理人和走狗。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7b5a2c117c"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
