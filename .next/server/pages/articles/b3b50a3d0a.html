" crossorigin="">{"props":{"pageProps":{"books":[{"id":"dfdd6b56-5f4e-42e1-af94-ae2ab38cc0b4","name":"毛泽东思想万岁（1913-1943卷）（1968年武汉版）","internal":true,"official":false,"type":"pdf","author":"1968年武汉","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives3/main/dfdd6b56-5f4e-42e1-af94-ae2ab38cc0b4.pdf"],"article":{"title":"红军第四军司令部布告","alias":"","parts":[{"type":"paragraph","text":"红军第四军司令部布告"},{"type":"paragraph","text":"（一九二九年）"},{"type":"paragraph","text":"民权革命，缸军宗旨，"},{"type":"paragraph","text":"赣西一罩，"},{"type":"paragraph","text":"声威远震。此番计划，"},{"type":"paragraph","text":"分矢前进，"},{"type":"paragraph","text":"辅佐民伏，"},{"type":"paragraph","text":"服从命合。平买平卖，"},{"type":"paragraph","text":"事实为证，"},{"type":"paragraph","text":"乱烧乱杀，"},{"type":"paragraph","text":"在所必禁。全国各地，"},{"type":"paragraph","text":"压迫太甚，"},{"type":"paragraph","text":"工人农人，"},{"type":"paragraph","text":"十分痛苦。士豪劣辩，"},{"type":"paragraph","text":"横行乡镇，"},{"type":"paragraph","text":"重息要租，"},{"type":"paragraph","text":"人人悲。白军士兵，"},{"type":"paragraph","text":"饥寒交，"},{"type":"paragraph","text":"小资产者，"},{"type":"paragraph","text":"捐税极重。洋价越多，"},{"type":"paragraph","text":"国受困，"},{"type":"paragraph","text":"帝国主义，"},{"type":"paragraph","text":"哪个不恨。国民匪党，"},{"type":"paragraph","text":"完全反动，"},{"type":"paragraph","text":"口是心非，"},{"type":"paragraph","text":"不能过硬。蒋桂冯间，"},{"type":"paragraph","text":"同床异梦，"},{"type":"paragraph","text":"冲突已起，"},{"type":"paragraph","text":"军倒运。饭可充饥，"},{"type":"paragraph","text":"药可医病，"},{"type":"paragraph","text":"共产主张，"},{"type":"paragraph","text":"极为公正。地主田地，"},{"type":"paragraph","text":"农民收种，"},{"type":"paragraph","text":"价不要还，"},{"type":"paragraph","text":"租不要送。增加工缝，"},{"type":"paragraph","text":"老板担任，"},{"type":"paragraph","text":"八时工作，"},{"type":"paragraph","text":"恰好相称。军人待遇，"},{"type":"paragraph","text":"必须改订，"},{"type":"paragraph","text":"发给田地，"},{"type":"paragraph","text":"士兵有份。敌方士兵"},{"type":"paragraph","text":"可以投顺，"},{"type":"paragraph","text":"以前行动，"},{"type":"paragraph","text":"可以不问。累进税法，"},{"type":"paragraph","text":"最为适用，"},{"type":"paragraph","text":"苛捐杂税，"},{"type":"paragraph","text":"扫除一净。城市商人，"},{"type":"paragraph","text":"积珠累财，"},{"type":"paragraph","text":"只要服从，"},{"type":"paragraph","text":"余皆不。对待外人，"},{"type":"paragraph","text":"必须严峻，"},{"type":"paragraph","text":"工厂银行，"},{"type":"paragraph","text":"没收归供。外资外债，"},{"type":"paragraph","text":"概不承款，"},{"type":"paragraph","text":"外兵外，"},{"type":"paragraph","text":"不准入境。打倒列强，"},{"type":"paragraph","text":"人人高兴，"},{"type":"paragraph","text":"打倒军，"},{"type":"paragraph","text":"除恶务尽。一中华，"},{"type":"paragraph","text":"举国称庆，"},{"type":"paragraph","text":"满蒙回藏，"},{"type":"paragraph","text":"章程自定。国民政府，"},{"type":"paragraph","text":"合力除，一群恶棍，"},{"type":"paragraph","text":"肃清乱政。全国工农，"},{"type":"paragraph","text":"风发雷奋，"},{"type":"paragraph","text":"夺取政权，"},{"type":"paragraph","text":"为期日近。革命成功，"},{"type":"paragraph","text":"尽在民众，"},{"type":"paragraph","text":"布告四方，"},{"type":"paragraph","text":"大家起劲。"},{"type":"paragraph","text":"中国共产党红军第四军第九次代表大会决案"},{"type":"paragraph","text":"（一九二九年闻西古田会）一、关于纠正党内的错误思想（见毛选第一卷87一99页）"},{"type":"paragraph","text":"二、党的组问题红军的组织问题，现在到了非常严重之时期，特别是党员量之差和组织之松懈，影响"}],"authors":["毛泽东"],"dates":[{"year":1929}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":123,"page_end":123},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b3b50a3d0a"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
