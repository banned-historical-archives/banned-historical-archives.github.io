script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"西藏翻身奴隶组成文化工作队","authors":[],"dates":[{"year":1965,"month":7,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"一支由西藏翻身农奴和奴隶组成乌兰牧骑式的文化工作队最近离开拉萨，把革命的新文化送往山村和牧场。"},{"type":"paragraph","text":"这支文化工作队的成员，是西藏民主改革后涌现的大批群众业余文艺活动积极分子中的优秀人物，他们在参加全国少数民族群众业余艺术观摩演出时，曾以精彩的表演博得人们的赞赏。"},{"type":"paragraph","text":"这支文化工作队除给群众表演各种反映革命斗争内容的文艺节目外，还要给群众放映幻灯和电影，举办图片展览，推销革命书籍和报刊，宣传党的方针政策，讲解毛主席著作。"},{"type":"paragraph","text":"文化工作队的队员们，决心学习内蒙古“乌兰牧骑”的革命精神，同广大农牧民同生活同劳动。不少队员在下乡前还学会了理发、接生和其他各种技能，准备在进行文化宣传的同时，从多方面为群众服务。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"西藏文革","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ca2da54130"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
