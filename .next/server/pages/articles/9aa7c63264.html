" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoistlegacy.de-1731","name":"中央宣传部关于传达、宣传十一届三中全会精神应注意的几个问题","author":"中共中央宣传部","internal":false,"official":false,"type":"unknown","files":[],"article":{"title":"中央宣传部关于传达、宣传十一届三中全会精神应注意的几个问题","dates":[{"year":1979,"month":1,"day":12}],"is_range_date":false,"authors":["中共中央宣传部"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"中共中央宣传部办公厅, 党的宣传工作会议概况和文献(1951——1992年), 220-222","tags":[{"name":"拨乱反正","type":"主题/事件"},{"name":"十一届三中全会","type":"主题/事件"},{"name":"四人帮","type":"主题/事件"},{"name":"团结","type":"主题/事件"},{"name":"宣传","type":"主题/事件"},{"name":"冤假错案","type":"主题/事件"}],"parts":[{"type":"title","text":"中央宣传部关于传达、宣传十一届三中全会精神应注意的几个问题"},{"type":"subtitle","text":"(1979年1月12日)"},{"type":"paragraph","text":"各省、市、自治区党委宣传部，中央宣传系统各单位党委、党组："},{"type":"paragraph","text":"当前，各省、市、自治区和中央各部委正在传达、讨论党的十一届三中全会和中央工作会议的精神。在传达、讨论和宣传中，请注意以下几个问题："},{"type":"paragraph","text":"第一，党的十一届三中全会和中央工作会议，具有十分重大的历史意义。各级党委宣传部门要把传达、学习和宣传这两个会议的精神，作为当前的中心认真抓好。传达、学习和宣传要以十一届三中全会公报为纲，抓住工作重点转移这个中心思想，着重五个问题：一是党的工作重心转移的伟大意义；二是必须把经济建设特别是农业生产搞上去；三是要很好解决遗留问题，保持一个长时期的安定团结的政治局面；四是必须坚持马克思主义的思想路线；五是要健全党内、党外的民主生活，加强法制。抓住这五个问题，就把这两个会议的主要文件的基本精神抓住了。"},{"type":"paragraph","text":"第二，各地在传达、学习和宣传中要紧密结合本地区、本单位的实际，解决好当前存在的思想问题和实际问题。宣传工作要立足当前，放眼全局。既要看到两年来总的形势是好的和往好的方向发展的，是扭转乾坤、拨乱反正的两年，又要对林彪、“四人帮”的破坏所造成的损害，带来的困难，遗留下的麻烦，有足够的认识。当前要特别注意迅速地把国民经济特别是农业生产搞上去。要本着处理遗留问题为的是向前看的精神，继续消除不利于安定团结的种种因素，坚决而认真地处理冤案、错案、假案，以便调动一切积极因素，包括化消极因素为积极因素，团结一切可以团结的力量，把全党和全国人民的精力真正集中到经济建设上去。"},{"type":"paragraph","text":"第三，当前群众思想十分活跃，议论纷纷，敢于想问题，提出问题，敢于对党和国家大事提出各种批评和建议，这是十分可喜的。今后一个时期特别需要强调发扬民主。这次中央工作会议和三中全会开创了一个充分发扬民主的会风，我们要把它推广到全党和全国人民中去，形成一种社会风气。要坚定不移地把党和国家的民主生活健全起来，这是我们的方针和前提。同时，也要注意教育广大党员和人民群众正确地使用自己的民主权利，引导我们的民主生活往健康的方向发展，注意维护正常的工作秩序、生产秩序和社会秩序。各级宣传部门要及时掌握党内外以及社会上各阶层群众的思想政治动向，作出正确的分析和判断，加强深入细致的思想政治工作。群众提出的意见和要求，凡属合理的都要认真听取，及时解决。由于条件的限制，一时办不到的要向群众解释。对于群众中某些不正确的意见和做法，要多做工作，引导到有秩序的正确的轨道上来。对于个别别有用心的坏人趁机捣乱，也要注意，切实作工作。"},{"type":"paragraph","text":"第四，我国经济目前还很落后，人民生活和就业方面都存在不少问题。当前，我们要着重在各级干部中强调关心群众生活，强调做深入细致的思想工作，努力解决好人民生活中的一些迫切问题，反对对群众疾苦漠不关心的官僚主义；同时，也要向人民群众解释：这方面的问题，只有在生产发展的基础上才能逐步得到解决。为了迅速改变我国经济落后面貌，显著地改善人民生活，必须继续发扬自力更生、艰苦奋斗的精神，下大力把生产搞上去。"},{"type":"paragraph","text":"第五，现在我国的国际交往以及同外国经济、科学、技术、文化的交流日益增多，这将大大有助于我们利用世界上一切先进的东西来建设我们的社会主义祖国。要向干部、群众解释清楚，对于一切先进的、对我有用的东西，学习得愈多、愈快愈好。同时要使他们懂得如何正确对待一切来自国外，特别是资本主义社会的东西。要继续加强热爱社会主义祖国的教育。这种宣传教育应该是有针对性的，有说服力的。对于人民群众，特别是广大青年群众中的一些正当的健康的兴趣爱好、文化娱乐活动，决不要乱加干涉。"},{"type":"paragraph","text":"各地、各单位在传达、讨论和宣传过程中，遇有重要情况、问题和经验，望及时报中央宣传部。"}],"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9aa7c63264"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
