script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"芮杏文同大学生研究生代表谈心并殷切希望学生增强识别抵制资产阶级自由化思潮能力要珍惜得来不易的学习机会，既学习理论知识，又学习实践知识","authors":["奚迪华","张自强"],"dates":[{"year":1987,"month":1,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　(记者奚迪华、张自强)连日来，在市教卫党委、市教卫办会同高教局、教育局、教育工会召开的迎春恳谈会上，市委、市政府领导与一千七百多名来自大、中、小学、幼儿园的教师、政工管理干部、老干部、大学生、研究生代表一起畅谈当前教育战线上的大好形势，探讨如何坚持四项基本原则，坚持建设改革、开放搞活，加强和改善学生思想政治工作，把学生更好地培养成为四化建设所需要的人才等问题。"},{"type":"paragraph","text":"市委书记芮杏文和市委、市人大、市府、市政协的领导同志曾庆红、陈铁迪、赵启正、王力平、毛经权、舒文、李国豪、杨槱、叶公琦、谢丽娟，还有中共中央委员、复旦大学校长谢希德、中顾委委员夏征农等在恳谈会上与大家围桌而坐，亲切交谈。"},{"type":"paragraph","text":"市委书记芮杏文在昨天下午与大学生、研究生们一起谈心时说，今天，在会场里见到这么多年轻朋友，我自己也感到年轻起来。目前，我国正处在新的振兴时期，要使我国富强起来，这是我们大家共同的愿望，问题是怎么样使我国富强起来。我认为，全盘照搬任何外国的模式都是不行的，中国要走自己的道路，要根据中国的历史、现状，结合中国的实际，并吸收世界上一切先进科学技术和管理经营经验，建设中国式的社会主义，走共同富裕的道路。相信经过我们几代人的努力，一定能把高度文明、高度民主的四个现代化的社会主义强国建设起来。当代的青年学生肩负着光荣的历史使命。他殷切希望青年学生们珍惜得来不易的学习机会，坚持四项基本原则，坚持改革、开放，既努力学习理论知识，又参加社会实践，学习实践知识，增强识别和抵制资产阶级自由化思潮的能力，把自己培养成为祖国四化建设所需要的人才。最后，他向参加会议的同志们致以亲切的问候。他的话获得了与会同志们的热烈掌声。"},{"type":"paragraph","text":"参加恳谈会的各方面代表对改进学校教育工作也提出了许多很好的意见和建议。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8115edb9b7"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
