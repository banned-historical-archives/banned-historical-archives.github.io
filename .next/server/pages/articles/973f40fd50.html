" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji43","name":"毛泽东全集第43卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji43.pdf"],"article":{"title":"中央转发山东省委关于生活安排情况报告的批语","alias":"","parts":[{"type":"paragraph","text":"中央转发山东省委关于生活"},{"type":"paragraph","text":"安排情况报告的批语"},{"type":"paragraph","text":"（1960年3月15日）"},{"type":"paragraph","text":"山东这个报告写得很好。有调查，有分析，有研究，有办法。抓住二十个重点落后县，派二百多个得力干部，有强的领导者率领，每个重点落后县有二十多个干部下去帮助，办法很好。一定要把缺粮问题在短时间内彻底地认真地给予解决。中央建议：落后县、社、队领导干部实在不行的，当机立断，实行撤掉，换上好的。不要婆婆妈妈，优容养奸，贻误大事。"},{"type":"paragraph","text":"中央"},{"type":"paragraph","text":"1960年3月15日"},{"type":"paragraph","text":"[1]指中共山东省委1960年2月27日关于生活安排情况给中央并上海局的报告。报告的主要内容如下：（一）对于社员生活安排问题，从省委到基层各级党委都是比较重视的。省、地、县、社共组织了4.5万名干部，由各级负责同志带领，分赴各地深入调查，重点帮助，取得了较为显著的成绩。（二）目前还有部分县、社、队在生活安排方面存在着不同程度的问题，其中有一小部分问题还相当严重，生活安排没有落实，人口外流和水肿病的情况已经出现。其主要原因：第一，在分配上，包产小队和基本核算单位之间的毛泽东全集第四十三卷矛盾普遍存在，这些单位往往还交织着思想、组织不纯的问题。第二，去年我省遭受了几十年来未有过的自然灾害，其中以旱灾最为严重。第三，一部分干部对农村形势盲目乐观，报喜不报忧，不做艰苦细致的思想工作，影响了生活安排的迅速落实。（三）省委根据实际情况确定当前农村工作的方针是：以继续进行社会主义教育为纲，以春耕生产为中心，全面安排好人民生活，带动各项工作不断跃进。要求各级党委第一书记亲自挂帅，一手抓生产，一手抓生活，既要做好思想工作，又要切切实实解决问题。具体措施如下：1.抓住重点，突出解决24个落后县、市的问题。除增拨粮食统销指标和救济款外，还派出260余名干部，分赴各县，坐镇包干，负责到底。省委生活福利办公室直接控制这些县的情况，发现问题，及时解决。2.粮食统销，既要保证缺粮地区的最低供应标准，又要尽量不突破调整后的统销指标。3.拨出饲料2亿斤，有重点地解决牲蓄饲料问题。4.对社员生活已安排好的单位，要防止松劲麻痹情绪，干部要改变作风，加强与群众的联系。5.在开展节约用粮运动的同时，大抓春菜播种和冬菜管理，因地制宜地多种早熟瓜菜。1960年3月18日，中共中央转发了这个报告。"}],"authors":["毛泽东"],"dates":[{"year":1960,"month":3,"day":15}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":170,"page_end":171},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"973f40fd50"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
