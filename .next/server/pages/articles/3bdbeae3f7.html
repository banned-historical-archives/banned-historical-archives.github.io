script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反对朗诺卖国集团的残酷剥削和法西斯统治  金边四万多工人举行大罢工  所有的大工厂和公司被迫停工，朗诺集团的反动统治遭到沉重打击","authors":[],"dates":[{"year":1973,"month":2,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反对朗诺卖国集团的残酷剥削和法西斯统治"},{"type":"paragraph","text":"金边四万多工人举行大罢工"},{"type":"paragraph","text":"所有的大工厂和公司被迫停工，朗诺集团的反动统治遭到沉重打击"},{"type":"paragraph","text":"新华社一九七三年二月八日讯　金边消息：金边市四万多工人二月五日举行大罢工，反对朗诺卖国集团对工人的残酷剥削和法西斯统治，要求增加工资和发生活津贴费。这次罢工使金边所有的大工厂和公司都被迫停工。"},{"type":"paragraph","text":"据西方通讯社报道，罢工工人们占领了属于外国公司和朗诺卖国集团的十五个工厂，并在工厂大门上以及卡车上张贴了谴责朗诺集团的标语。罢工工人要求朗诺集团的伪社会事务部长下台。饮料、卷烟和纺织行业的工人还举行了静坐示威，要求朗诺集团把被迫答应增加工资和发生活津贴费这两项作为法律颁布。在罢工工人的强大压力下，朗诺集团被迫答应了工人们的一些要求。"},{"type":"paragraph","text":"金边工人为要求提高工资和发生活津贴费，两个月来一直同朗诺集团进行斗争。但是，朗诺集团迟迟不肯答应工人们的正当要求。金边市工人的这次罢工，沉重地打击了朗诺集团的反动统治。合众国际社从金边发出的消息说，这次罢工将会“危及已经摇摇欲坠的朗诺政权的基础”。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3bdbeae3f7"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
