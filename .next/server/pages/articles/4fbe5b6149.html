script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"华主席的七篇讲话和文章在挪威汇编出版挪威十月出版社在出版序言中指出，读了这本汇编书，将会得到中共继续执行毛主席路线的充分证据","authors":[],"dates":[{"year":1977,"month":9,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社斯德哥尔摩一九七七年九月十八日电　奥斯陆消息:挪威十月出版社最近翻译出版了一本题为《继续革命》的书。书中汇编了从一九七五年九月到一九七七年五月公开发表过的华国锋主席的七篇讲话和文章。"},{"type":"paragraph","text":"这些讲话和文章是:一九七五年十月十五日华主席在全国农业学大寨会议上的总结报告:《全党动员，大办农业，为普及大寨县而奋斗》；一九七六年九月十八日华主席在伟大的领袖和导师毛泽东主席追悼大会上致的悼词；一九七六年十一月二十四日华主席在毛主席纪念堂奠基仪式上的讲话；一九七六年十二月二十五日华主席在第二次全国农业学大寨会议上的讲话；一九七七年五月一日《人民日报》发表的华主席学习《毛泽东选集》第五卷的文章:《把无产阶级专政下的继续革命进行到底》；一九七七年五月九日华主席在全国工业学大庆会议上的讲话和一九七七年四月二十六日《人民日报》转载的华主席一九六三年四月二日在《新湖南报》上发表的文章:《贵在鼓劲》。"},{"type":"paragraph","text":"十月出版社在出版序言中写道:“如果你要了解真实情况，你就必须去阅读那些反映中国共产党人为中国发展制定什么路线和执行什么政策的文件，这样你就有根据来区别真理和谎言，并且自己作出判断。”"},{"type":"paragraph","text":"序言说:“当你读了这本书之后，你将会得到关于中国共产党继续执行毛泽东主席的路线和将革命继续进行下去的充分的证据。你也将会更加了解到什么是社会主义和伟大的人民中国的八亿劳动人民肩负着什么样的任务。你也将会懂得为什么中国人民热烈欢呼粉碎王洪文、张春桥、江青、姚文元‘四人帮’的胜利。”"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"name":"编纂《毛泽东选集》第五卷","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4fbe5b6149"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
