<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"陕西凤翔考古新发现揭开秦国奴隶制之谜  秦公一号大墓开始揭椁开棺  已探明整个陵园区有四十三座墓葬和宏伟的墓上建筑遗址","authors":["孟西安"],"dates":[{"year":1986,"month":5,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"陕西凤翔考古新发现揭开秦国奴隶制之谜"},{"type":"paragraph","text":"秦公一号大墓开始揭椁开棺"},{"type":"paragraph","text":"已探明整个陵园区有四十三座墓葬和宏伟的墓上建筑遗址"},{"type":"paragraph","text":"本报凤翔5月2日电  记者孟西安报道：2日晨，考古工作者和解放军战士共八十一人，进入峡谷般的秦公一号大墓，开始揭椁开棺。陕西凤翔秦公一号大墓，是迄今我国发掘的最大古墓。经过前后十年的考古发掘，二千多件珍贵文物已重见天日，墓主和一百八十多个人殉椁木再现于世，向人们展示了一幅发达的奴隶制社会的惊人情景，为研究中国奴隶社会历史提供了新的资料。"},{"type":"paragraph","text":"今天，进入墓底的考古工作者和解放军战士，依次将椁木编号，再用角铁扣好，用棉垫包扎，捆上绳索，由八个人抬起，向墓道移动。考古队负责人告诉记者，主椁室共有三层，每层五十六根椁木，最长的椁木达六米，重约八百多斤，而且木头坚硬、黄亮。全部揭完需要三天，然后进入四椁室并开棺。"},{"type":"paragraph","text":"秦公一号大墓，在西安市以西一百七十公里的凤翔县。这里东依周原，西傍汧河，地平土肥，曾是东周时秦国国都雍城所在地。据考证，一号大墓位于秦国著名风景区“北国”之内，是秦公陵园区四十三座墓葬中最大的一座，陕西省考古工作者从1959年开始，先后五次来这里探查。1976年11月，他们根据司马迁《史记》记载的线索，在当地农民配合下，在指挥村南一块禾稼不茂的田野里发现了秦公一号大墓。至今，参加发掘的数百名考古工作者、民工、解放军战士，风餐露宿，已挖移墓土七万余方。"},{"type":"paragraph","text":"秦公一号大墓墓体为“中”字形，墓室象一座钳入地下的倒“金字塔”，总面积五千三百三十四平方米，比河南安阳商代王陵大十倍以上，比马王堆一号墓大二十倍。墓底到顶有三层台阶，顶部面积象一个足球场，底部有两个篮球场大，墓深二十四米，相当八层楼高。东西通往墓底的巨型斜坡墓道长二百七十米，宽七米。"},{"type":"paragraph","text":"秦公一号大墓，向人们展示了秦国野蛮和残酷的奴隶制直观形象：主椁四周填置木炭，椁木坚硬，叩之有声；在它的四侧及上部，却埋置了一百八十二个人殉、人牲的棺椁，殉葬者有男有女，这与《史记》中记载的“三十九年缪公卒，葬雍，从死者百七十七人”相近，佐证了《史记》中“秦人哀之，为作《黄鸟》之诗”和《诗经》中“临其穴，懦懦其慓”的诗文。秦公一号大墓在发掘中，发现了二百四十七个盗洞，但相继出土的金、铜、铁、石、玉等珍贵文物，特别是十多件铁器，数量如此集中，冶炼工艺如此之高，在我国先秦墓葬中是罕见的。竖立在墓室土圹两侧的两根巨型木碑，证实了《周礼》中关于诸侯葬仪“四脖二碑”的记载，探明了碑志的源头。专家们根据出土的石磬上所刻的“天子偃喜，龚桓是嗣，高阳有灵，四方以鼎”的文字，对墓主作了多种推断。墓主究竟为何人，还有待于“开棺论定”。"},{"type":"paragraph","text":"在发掘秦公一号大墓的同时，陕西省考古工作者也调查、钻探了周围一百多平方公里，从而揭开了被湮没地下两千多年的秦公陵园区之谜。据钻探和试掘证实，整个秦公陵园区更为宏伟。陵区东西长七公里，南北宽三公里，总面积达二十一平方公里。陵区内四周环绕着十多公里的大护陵壕沟。陵区大小、形制不等的十三座小陵园，也都有或单或双的护陵壕沟。全陵区十八座“中”字型秦公大墓、三座尚不明身份的“甲”字型大墓和一些中小墓葬，面东背西，呈雁翎形排列。为大墓修建的二十一个车马坑，最大的长一百一十六米，宽二十五米。陵区在试探、发掘前已被完全覆盖在绿色禾苗之下。所有大墓上都不见封土堆和木石标志。试掘发现围绕墓顶四周的一处处卵石散水、陶制管道和柱洞、瓦片，证明了当时墓上曾耸立着一座座规模宏大的殿堂。已探明其中一座中型殿堂，长七十三米，宽二十五米，相当于我国最大的木构殿宇——故宫太和殿面积的四分之三。陵区奇特的墓葬方法，和《易经》一书记载的“古之葬者……葬之中野，不封不树”的情形完全一致，为研究古代社会的墓葬制度提供了最新的依据。"},{"type":"paragraph","text":"据史书记载，秦国包括秦始皇、秦二世、秦王子缨，共有三十六代国王（春秋时代为诸侯国，称公），其中二十代享国于雍城。秦公陵园区的试探和秦公一号大墓的发掘，证明秦国奴隶制是发达的。这无疑是对史学界“奴隶制非常薄弱的秦国一跃取得封建制革命成功”的传统史学观念的挑战。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"陕西文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"db752c9d7b"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
