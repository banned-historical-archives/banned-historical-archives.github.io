<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"忠于毛主席的海上巡逻兵——记毛主席视察乘坐过的洛阳号战舰","authors":["施海洪"],"dates":[{"year":1969,"month":11,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"忠于毛主席的海上巡逻兵"},{"type":"paragraph","text":"——记毛主席视察乘坐过的洛阳号战舰"},{"type":"paragraph","text":"红日跃出东海，金光万道，彩霞满天。英武的洛阳号战舰正巡逻在祖国的领海线上。十多年来，洛阳舰一直斩风劈浪，日日夜夜执行着战备巡逻、护渔护航的光荣任务。全舰指战员颗颗红心向北京，万里巡逻守海疆，保卫着无产阶级文化大革命，为人民立了新功。"},{"type":"paragraph","text":"洛阳舰指战员们对伟大领袖毛主席最爱、最忠。他们天天破浪迎红日，夜夜登高望北斗，无限怀念一九五三年二月二十日这个最幸福、最难忘的日子。他们曾经跟毛主席一起远航，接受伟大领袖毛主席的视察，聆听毛主席他老人家的亲切教导。当时，伟大领袖毛主席亲笔为海军题词：“为了反对帝国主义的侵略，我们一定要建立强大的海军。”"},{"type":"paragraph","text":"十六年过去了，毛主席视察舰艇的情景，永远鼓舞着洛阳舰的广大指战员去夺取一个接一个的胜利。无论遇到多大的艰难困苦，战士们一想到毛主席，就增加了无穷的力量。"},{"type":"paragraph","text":"一九六七年，当全国人民正欢庆“五一”国际劳动节时，在海上巡逻的洛阳舰突然遇到十级大风。战舰一忽儿钻进浪谷，一忽儿登上浪峰，巨浪飞过了指挥台，舰身摇晃得很厉害。就在这艰险时刻，洛阳舰指战员们心中升起红太阳，险风恶浪无阻挡。正在观察了望的信号兵丁陈被巨浪打昏在甲板上。当他摸到扶梯时，马上想到当年毛主席就是从这里走进指挥台的。他蓦地站了起来，立即抹去脸上的海水，又坚守在战位上。舰艇航行越来越危险，舰首时时被飞滚的浪山埋没，为了便于抢险，帆纤班长蓝元发接受了到舰首柱抢扎保险绳的战斗任务。他迎着巨浪冲了过去，几次被恶浪打出一丈以外。在随时都有可能牺牲的危险时刻，他一心想着毛主席的教导：“下定决心，不怕牺牲，排除万难，去争取胜利。”经过几番冲击，终于冲上了巨浪飞卷的舰首柱。他以自己对毛主席的无限忠诚，胜利地完成了这个艰险任务。"},{"type":"paragraph","text":"在战备巡逻、护渔护航中，洛阳舰指战员们随时保持着高度的革命警惕性，一次又一次地惩罚了来犯之敌，捍卫了祖国神圣的领海。一天黄昏，洛阳舰接受了监视一艘敌舰的任务。当时，风大浪急，坚守在战位上的战士，警觉地监视着敌舰在我领海线的一切阴谋活动。他们牢记毛主席的教导："},{"type":"paragraph","text":"“帝国主义者如此欺负我们，这是需要认真对付的。”做好迎击敌人的一切准备。敌舰见势不妙，只好灰溜溜地逃掉了。在毛主席乘坐过的洛阳舰面前，帝国主义这个庞然大物，又一次现出了纸老虎的原形。"},{"type":"paragraph","text":"洛阳舰指战员在长年累月的护渔护航中，和渔民结下了深厚情谊，被渔民称为海上的靠山，渔民的亲人。他们对敌人狠，对人民爱，处处关心渔民，爱护渔民。海上大风要来了，他们就挂起信号，催促渔船进港避风；渔船机器坏了，他们就帮助抢修；渔船在黑夜雾海中迷航了，他们就给领航；渔民有伤病时，他们就给护理治疗；渔船在海上遇险了，他们就奋不顾身地去抢救。那里有危险，他们就出现在那里。"},{"type":"paragraph","text":"四月的一天傍晚，海上刮着六级大风，洛阳舰正在巡逻，突然发现远方一只渔船有盏红灯在晃动。指战员们判断：一定是渔民的呼救信号。他们立即赶到那里，原来这条渔船捕获了一条四千多斤的大沙鱼，因顶风顶浪，舵被打坏了，正处在十分危险的时刻。洛阳舰指战员马上把沙鱼和船都拖到安全地带。"},{"type":"paragraph","text":"洛阳舰指战员们说：我们不但是海上的巡逻兵，而且是渔场上的毛泽东思想宣传员。他们认为，用毛泽东思想武装群众就是最大的爱民。能把每个小岛、每条渔船都办成毛泽东思想的大学校，就能成为船船是哨所，人人是哨兵，使海防前线成为真正的铜墙铁壁。只要战舰一进渔场，水兵们就用各种方言宣传毛主席的最新指示。为了把毛泽东思想传播到每个角落，洛阳舰广大指战员还组织了一个小型海上演出组，经常深入渔船、海岛演出渔民喜闻乐见的节目，和渔民一起学习“老三篇”，一起开展革命大批判，热情歌颂毛主席，毛泽东思想，毛主席的无产阶级革命路线。广大渔民群众提高了阶级斗争觉悟和两条路线斗争觉悟，时刻警惕地守卫着海防，随时准备配合人民解放军消灭敢于来犯的一切敌人。　施海洪"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4991d335f8"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
