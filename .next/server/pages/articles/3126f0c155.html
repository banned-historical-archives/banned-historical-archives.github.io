" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"重申处理“文革”遗留问题中的几项规定","authors":[],"dates":[{"year":1983,"month":6,"day":28}],"is_range_date":false,"parts":[{"text":"重申处理“文革”遗留问题中的几项规定","type":"title"},{"text":"各地、市、县委，柳铁党委，区直各单位党组（党委），各工作组，并报区党委、中央工作组：","type":"appellation"},{"text":"在处理“文革”遗留问题、拨乱反正工作中，各地对于领导班子中的一、二把手，不能坚决贯彻执行党的十一届三中全会路线方针政策的，对当前解决遗留问题，干部群众不信任的，必须及时调整，以排除工作开展的障碍。对“三种人”及有其它严重问题的人，必须从各级领导岗位上拉下来。为了确保初步调整的领导班子的人选得当，指定或者选拔党性强，没有派性，民主作风好，有工作能力，群众信得过，能坚定执行党中央路线方针政策的同志主持党政领导工作，特此重申：","type":"paragraph"},{"text":"1、中央部门、自治区直属管理的厂矿、企业和场站等单位，处理“文革”遗留工作，以块块为主，由当地党委统一领导。区直各有关部门配合。","type":"paragraph"},{"text":"2、有关人事任免问题，由当地党委和区党委工作组提出意见，按原有干部管理办法审批，属于中央、自治区直属企、事业单位的，主要领导干部的免职、停职、撤职审查，应及时告知中央、自治区主管部门备案。","type":"paragraph"},{"text":"3、免职、停职审查，属临时措施，不属组织处理，仍按区党委已发的文件规定执行。","type":"paragraph"},{"text":"4、对免职、停职、撤职审查人员，要按时上、下班，学习文件，写检查材料，对党忠诚老实，交代问题，不准串连，更不准威胁受害的干部、群众，必须严格遵守组织纪律。属区党委管理的干部必须把检查交代的材料除交所在单位外，并一式二份报给区党委人事安排领导小组一组。","type":"paragraph"},{"text":"5、干部提升，必须进行民意测验、组织考核，按干部分管权限呈报审批。","type":"paragraph"},{"text":"6、各级党委和组织人事部门必须密切配合处理好“文革”遗留问题，对干部的任免工作应抓紧进行，不得延误。凡呈报区党委组织部（区党委机构改革人事安排领导小组）的，应及时研究，争取在三天内审批和答复。","type":"paragraph"},{"text":" 中共广西壮族自治区党委机构改革人事安排领导小组一九八三年六月二十八日","type":"paragraph"}],"comments":[],"origin":"( 《处理“文革”遗留问题、清理“三种人”文件汇编》，广西壮族自治区党委整党办公室，一九八六年八月。)","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"派性","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3126f0c155"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
