" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji38","name":"毛泽东全集第38卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji38.pdf"],"article":{"title":"在杭州会议上谈两类矛盾问题的讲话提纲","alias":"","parts":[{"type":"paragraph","text":"在杭州会议！上谈两类矛盾问题的"},{"type":"paragraph","text":"讲话提纲"},{"type":"paragraph","text":"（1958年1月）两类予盾：敌我；人民内部人民内部：阶级矛盾；先进落后矛盾主要：阶级矛盾（过渡时间（期〉）大量：先进、落后"},{"type":"paragraph","text":"原因：资产阶级思想影响劳动人民；主观主义的原因；领导的原因一领导好，形势先进占多数，落后迅速克服。"},{"type":"paragraph","text":"经常把几个问题放在心里想一想，同少数人吹一吹，这是一个重要方法。"},{"type":"paragraph","text":"[1]指1958年1月上旬毛泽东在杭州召集的有部分省、市委书记参加的工作会议。另据1958年1月27日《人民日报》转载《浙江日报》报道，在杭州期间，毛泽东视察了浙江省农业科学研究所，向该所所长楼光宇询问了所里的研究工作情况，并问：“你们有没有进行农具方面的研究工作？”楼光宇答：“我们只结合做了一些。”毛泽东接着说：“要做研究工作，你们设立一个专门部门来进行农具研究工作好不好？”楼光宇回答说：“好的。”"}],"authors":["毛泽东"],"dates":[{"year":1958,"month":1}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":398,"page_end":398},"tags":[{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f9a192b62d"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
