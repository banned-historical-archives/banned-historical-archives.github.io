script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji24","name":"毛泽东全集第24卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji24.pdf"],"article":{"title":"变敌人的假和平运动为人民的真和平运动","alias":"","parts":[{"type":"paragraph","text":"变敌人的假和平运动为人民的真和平运动！"},{"type":"paragraph","text":"（1948年7月18日）"},{"type":"paragraph","text":"敌人和平运动公开出现以后，估计将产生两方面的作用。一方面，可能暂时迷惑一部分人民；另一方面，则将对国民党军队及其后方发生动摇和瓦解的作用。由于这后一种原因，国民党虽然正在准备发动和平阴谋，但仍有极大顾虑。针对这两方面的可能性，我党在全国范围内的揭露工作，应依敌方和平运动发动后的情况，一方面，坚决揭露敌人和平运动的欺骗性，使群众不被欺骗；另一方面，号召群众起来反对假和平，要求真和平。其具体要求，应是美国停止援助国民党，美军及美国军事代表团退出中国，取消中国对美国的一切卖国条约，国民党及其政府公开向人民承认发动内战的错误，惩办一切战争罪犯，取消伪宪伪国大及依据伪宪伪国大所成立的反动政府，召集人民代表大会，成立不包括反动派在内的民主联合政府，取消特务机关，实行言论集会自由，反饥饿，反迫害，没收官僚资本，实行土地改革。这样将美帝和国民党的假和平运动，转变为人民要求真和平的运动，以与人民解放军的攻势作战相配合，促进反动派瓦解崩溃的速度。在蒋管区提出上述口号时，应"},{"type":"paragraph","text":"[1]这是毛泽东在审阅中共中央关于揭露国民党反动派和平阴谋的指示稿时加写的一段话。依群众情绪及环境所许可的情况有所增减，酌量提出，并须和群众生活上的迫切要求相配合，务使美帝和国民党更加孤立，而不使自己陷于孤立。"}],"authors":["毛泽东"],"dates":[{"year":1948,"month":7,"day":18}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":367,"page_end":368},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c7da9ad383"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
