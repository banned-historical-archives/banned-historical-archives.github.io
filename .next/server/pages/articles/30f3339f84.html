script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"太岳翻身农民  参军参战保卫毛主席  晋城在一个号召下二千人入伍","authors":[],"dates":[{"year":1946,"month":11,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"太岳翻身农民"},{"type":"paragraph","text":"参军参战保卫毛主席"},{"type":"paragraph","text":"晋城在一个号召下二千人入伍"},{"type":"paragraph","text":"【本报太岳二十四日电】“保卫延安、保卫毛主席”等标语出现在阳城等地大道的墙上，人们到处在议论“毛主席是咱们的大恩人，决不能让反动派拔他半根汗毛”。一致呼声是：“打垮蒋介石的进攻”！阳城汉上村王实老汉说：“我靠毛主席翻身，不能忘了毛主席的恩，咱年纪大了，不能亲自到延安保卫毛主席，可是咱已叫孩子东林参加了毛主席的队伍”。阳城掀起了二千五百人参军的大浪潮。高平亦有一千五百人投奔前线。晋城城关十余村得到蒋介石进攻延安的消息，首先发动慰劳部队，计慰劳猪两口、羊十二只、鸡八十只、粉条八百斤、酒一百斤，亲切的嘱咐着部队“打得狠些，把他们打到黄河里去！”屯留等县重新研究了后勤工作，要把自卫战中的工作作得更好一点；同时献金四万五千元。阳城各商店为优待上前方的部队，各种货物的定价八折，他们对部队说：“同志记着一定要打垮进攻延安的反动队伍！”各机关更形紧张，行政干部学校讨论到保卫延安保卫毛主席，即有二十七个知识分子自动要求加入八路军，上前方保卫毛主席。工商局订出生产计划，增加生产支援前线；武委总会号召各地民兵配合保卫延安开展自卫反击，在十二月份须歼敌八百人。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"30f3339f84"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
