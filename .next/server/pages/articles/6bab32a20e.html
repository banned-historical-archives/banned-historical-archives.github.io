script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"173b340b-3108-4ae1-be57-d3fa78bb471a","name":"毛泽东思想万岁（1943-1949卷）（1968年武汉版）","internal":true,"official":false,"type":"pdf","author":"1968年5月，钢二司武汉大学总部、中南民院革委会宣传部、武汉师院革委会宣传部","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives3/main/173b340b-3108-4ae1-be57-d3fa78bb471a.pdf"],"article":{"title":"关于暂行婚姻条例的决议","alias":"","parts":[{"type":"paragraph","text":"革命的知藏分子加入工农队伍里来！革命的知识分子加入红军政治部民权革命万岁！全国被压迫阶级解放万岁！"},{"type":"paragraph","text":"共产党红军第四军军党部"},{"type":"paragraph","text":"关于暂行婚姻条例的决中华苏维埃共和国中央执行委员会第次会通过X"},{"type":"paragraph","text":"（一九三一年十一月二十八日）"},{"type":"paragraph","text":"在封建治之下，男女婚姻，野蛮到无人性，女子所受的压迫与痛苦，比男子更甚。只有工农革命胜利，男女从经济上得到第一步解放，男女婚姻关系才随着变更而得到自由，目前在苏区男女婚姻，已取得自由的基础，应确定婚姻以自由为原则，而废除一切封建的包办、强迫与买卖的婚烟制度"},{"type":"paragraph","text":"但是女子刚从封建压迫之下解放出来，她们的身体许多受了很大的损害（如巍足）尚未恢复，她们的经济倘未能完全独立，所以关于离婚问题，应偏于保护女子，而把因离婚而引！起的义务和责任，多交给男子负担·"},{"type":"paragraph","text":"小孩是新社会的主人，尤其在过去社会习惯上，不注意看护小孩，因此关于小孩的看护有特别的规定。"},{"type":"paragraph","text":"此条例在一九三一年十二月一日公布实行"},{"type":"paragraph","text":"中央执行委会主席毛泽东"},{"type":"paragraph","text":"付主席：填x"},{"type":"paragraph","text":"张××【婚姻条例略]"},{"type":"paragraph","text":"【]：在原稿中凡原稿涉及“苏杂埃共和国”或“苏埃政府”的地方，均改为“红色政权”易不提“苏埃”，相应的“苏埃代表”则改为“工农代表”。其原因见《毛选》一卷《中国红色政权为什么能够存在》一文中释[6]，请同志们注意。"},{"type":"paragraph","text":"执行优待红军条例实施办法（节录）中华苏维埃共和国中央执行委员会训令第九号"},{"type":"paragraph","text":"（一九三二年二月一日）"},{"type":"paragraph","text":"中华苏埃工农兵第一次全国代表大会通过了红军优待条例，这个优待条例，对于红军规定了许多优越的权利。为什么对于红军定出这许多的优待条例呢？因为红军在几年来的斗争中，是坚定实行土地革命，坚决反对帝国主义、反对国民党军履的主要力量，是苏维埃政府的有力保卫者。他在过去中国的革命斗争历史上，做了英勇斗争的光荣事业。目前中国革命是一种残酷的革命战争环境，是积极进行革命战争的时候，是要与帝国主义国民党军贱"}],"authors":["毛泽东"],"dates":[{"year":1931,"month":11,"day":28}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":133,"page_end":133},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6bab32a20e"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
