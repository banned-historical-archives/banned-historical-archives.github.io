script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"北京出版社坚持正确舆论导向  出版大批宣传四项基本原则  反对资产阶级自由化的好书","authors":["诸边"],"dates":[{"year":1990,"month":11,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"北京出版社坚持正确舆论导向"},{"type":"paragraph","text":"出版大批宣传四项基本原则"},{"type":"paragraph","text":"反对资产阶级自由化的好书"},{"type":"paragraph","text":"一年多来，在中共北京市委的领导下，北京出版社积极贯彻党的十三届四中全会以来以江泽民同志为核心的党中央的一系列指示精神，重视抓出版物的舆论导向，出版了大批宣传四项基本原则、反对资产阶级自由化的好书。"},{"type":"paragraph","text":"去年平暴以后，为了帮助广大群众认清事实真相，提高认识，在市委宣传部的支持下，北京出版社全力以赴，用最快的速度编辑出版了《学习邓小平同志重要讲话彻底平息反革命暴乱问题解答》、《制止动乱平息反革命暴乱法律问题解答》、《动乱“精英”劣迹录》、《七十天大事记》等书籍以及《北京风波纪实》画册和《没有共产党就没有新中国》歌曲磁带等。这批出版物对配合当时的宣传和思想工作，起了积极作用。"},{"type":"paragraph","text":"在此之后，为了贯彻在党的十三届五中全会上江泽民同志关于全党要学习研究马克思主义理论的号召和中共北京市委六届七次全会通过的《关于加强党的建设和思想政治工作的决定》，北京出版社编辑出版和再版了一批宣传马列主义、毛泽东思想和配合社会主义教育的通俗政治理论读物，如：《马克思主义原理》、《坚持四项基本原则反对资产阶级自由化干部读本》、《社会主义教育大纲》、《社会主义教育读本》、《基本国情和基本路线教育教材》、《企业职工政治教育读本》、《新时期的军队政治工作》、《我说美国》等。"},{"type":"paragraph","text":"同时，该社还出版了《马克思主义哲学史》（六、七卷，即中国卷）、《马克思主义哲学史通论》、《哲学方法论》、《欧洲哲学史著名命题史话》、《旅行期间六天的哲学对话》等一批研究马列主义哲学思想的学术理论著作和通俗哲学译著，配合了党中央倡导的全党学哲学的活动。"},{"type":"paragraph","text":"一年多来，该社出版的宣传四项基本原则、反对资产阶级自由化的政治读物受到了广大读者和社会各界的好评。《马克思主义哲学史》（六、七卷）获中国图书奖一等奖和北方十五省、市、自治区哲学社会科学优秀图书奖。中共中央政治局委员、北京市委书记李锡铭同志特为此书获奖给该社同志写信，对这本书在研究和宣传马克思主义理论方面的积极作用给予了充分肯定。《北京风波纪实》画册出版后，得到国内外读者的关注。据悉，这本画册是中国图书进出口公司近几年来销售量最多的画册。《学习邓小平同志重要讲话彻底平息反革命暴乱问题解答》、《坚持四项基本原则反对资产阶级自由化干部读本》自出版后几次印刷，供不应求。"},{"type":"paragraph","text":"（诸边）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"江泽民","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bf601ec6a7"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
