script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反对剥削和压迫　　反对反动的教育制度拉美工人学生运动蓬勃发展","authors":[],"dates":[{"year":1969,"month":5,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社北京二十一日电　拉丁美洲一些国家的工人不堪忍受本国反动当局和资本家对他们的压迫和剥削，最近不断开展罢工斗争，争取合理的经济待遇和其他正当权利。"},{"type":"paragraph","text":"阿根廷科尔多瓦省首府科尔多瓦市汽车制造工业的三千名工人十四日举行罢工，抗议翁加尼亚反动政府克扣工人的工资。罢工工人前往体育场开会时同反动警察进行了激烈的搏斗。他们用石块和玻璃瓶同警察激战两小时，冲破了警察的两道封锁线，到达体育场。十六日，在科尔多瓦省爆发了声援汽车制造业工人的总罢工。参加声援罢工的有交通运输业的工人、印刷工人和新闻记者等。这一天，全省交通运输中断，报纸没有出版。"},{"type":"paragraph","text":"智利大约一千名码头工人最近举行罢工，要求增加工资。罢工使智利港口陷于瘫痪状态。智利大学的五千名职员二十日举行罢工，要求参与学校的管理。"},{"type":"paragraph","text":"在玻利维亚波托西省首府波托西市，属于玻利维亚矿业公司的一家企业的两千名锡矿工人十四日举行不定期罢工，要求增加工资和开展工会活动的权利。"},{"type":"paragraph","text":"据新华社北京二十一日电　拉丁美洲一些国家的学生反抗反动当局的迫害和镇压，反对反动的教育制度的斗争继续发展。"},{"type":"paragraph","text":"阿根廷各地学生为抗议翁加尼亚亲美独裁政权屠杀学生的暴行而举行的斗争，最近几天不断扩大。十九日晚上，阿根廷首都布宜诺斯艾利斯的学生们举行了示威。他们高呼口号，抗议反动当局屠杀学生，斥责亲美独裁政权的反动政策，表示要为死难的学生报仇。在图库曼市，五百名学生上街示威，同全副武装的反动警察展开激烈搏斗。在科尔多瓦市，一千名示威学生从十九日晚开始同前往进行镇压的反动警察激烈搏斗，直到二十日黎明。"},{"type":"paragraph","text":"阿根廷学生的抗暴斗争得到各阶层人士的广泛支持，强大的斗争浪潮给翁加尼亚亲美独裁当局以沉重的打击。"},{"type":"paragraph","text":"在智利首都圣地亚哥，智利大学一万多名学生以及数千名中学生十九日举行罢课并上街游行，要求当局立即释放上星期在示威游行中被捕的学生。示威学生同前往镇压的警察展开了斗争。智利蒙特港三千名中学生在同一天举行了罢课，抗议当局的反动教育政策。"},{"type":"paragraph","text":"委内瑞拉各地学生反对反动教育制度的运动正在向中小城市发展。在拉瓜伊拉和卡维马斯，示威的学生袭击了执政党的办公所。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"04889a4eb5"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
