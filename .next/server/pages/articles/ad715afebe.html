<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"纳溪县花果公社乾隆大队关于生产力情况的调查报告","authors":[],"dates":[{"year":1962,"month":6,"day":4}],"is_range_date":false,"parts":[{"text":"纳溪县花果公社乾隆大队关于生产力情况的调查报告","type":"title"},{"text":"这是一个三类社、三类大队（偏上）的调查，从六一年下半年以来开始好转，今年将有一个高幅度的回升，大有希望，印发书记一阅，并报地委、省委检查团负责同志参考。","type":"paragraph"},{"text":" 邵贵民1962．6．4．","type":"paragraph"},{"text":"乾隆大队，是六一年秋从同印大队划分出来的。现有六个生产队，153户，600人，耕地面积1378亩，每人平均2.02亩（其中：田1280亩，土98亩，自留地104亩），是一个水利好、土质肥，田多土少，生产粮食的丘陵地区。我们对乾隆大队五个生产队，即二、三、六队（原是一个高级社，过去和现在生产都搞得较差），和五队（原是一个高级社，生产一直搞得较好），关于生产力方面的情况，作了一些调查研究。现将调查的情况报告如下：","type":"paragraph"},{"text":"（一）人口、劳动力的变化情况。","type":"subtitle"},{"text":"二、三、六队，57年有67户，329人（男171，女158）58年至62年4月底，出生14人，迁入25人，迁出34人，死亡89人，现实有69户，245人（男118，女127）比57年减少84人，减少26.6%，其中男的减少63%，女的减少37%，四、五队57年有57户，293人（男148，女145），几年来共出生3人，迁入35人，迁出28人，死亡68人，现实有51户，239人（男114人，女125），比57年减少54人，减少18.4%，其中男的减少64。7%，女的减少35.3%。","type":"paragraph"},{"text":"自61年认真贯彻了中央“12条”“60条”和“以生产队为基本核算单位”等一系列政策后，激发了广大干群的生产积极性，生产有了回升，对群众生活安排比较落实，社员体质已得到很大恢复，治病工作又抓得紧，病人大大减少，现有病人不到2%，住院的仅占0.5%，二、三、六队今年就没有死过人，四、五队也只死一个难于治好的老病号。另一方面，妇女怀孕生小孩的增多，今年已生2人，下年还可生7人，共计9人，占58年以来出生人数的33%，从这一情况可以看出，人口、劳动力已在逐渐开始恢复。但由于人口、劳动力过去死亡多，需要恢复到57年的水平还要一个相当长的时期。以二、三、六队的情况来看，现有人口比57年减少84人，今年底可生4人，恢复到57年还差80人。从这个大队出生人口的历史资料看，55年出生28人，占总人口3.8%，56年出生22人，占3%，57年出生50人，占6。3%，这三年的每年平均出生率为4.4%。从明年起，如果每年出生率为4.4%，每年可生11人，我们又对80个有劳动力的妇女逐个排队了解，有生殖能力的32人（占40%），如果每年有三分之一人生育，每年可生10人，还有13个十七、八岁的男青年，在今、明两年内就要结婚，从64年起开始生小孩，预计每年生3人，这样计算，发展得快，在6——7年的时间内（下缺）","type":"paragraph"}],"comments":[],"origin":"四川省某档案馆","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ad715afebe"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
