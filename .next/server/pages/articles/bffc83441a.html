<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"华东已完成土地改革的地区不少农民产生农业社会主义和资本主义思想","authors":[],"dates":[{"year":1951,"month":11,"day":15}],"is_range_date":false,"parts":[{"text":"华东已完成土地改革的地区不少农民产生农业社会主义和资本主义思想","type":"title"},{"text":"【华东总分社十五日讯】华东已经完成土地改革的地区，不少农民产生了农业社会主义思想和资本主义思想。有些在生产和生活上较困难的农民，企图以强借白使别人分得的土地财产来解决自己的困难；有的不积极劳动，专门依赖政府或等待实行社会主义。浙江镇海有的农民说：“现在买了水车，等一等有了拖拉机，就用不着水车了，岂不是白花钱！”在经济条件较好的农民中，有些人想冒尖，但又怕冒尖。问村干部：“再向前干，行不行？”“买田，雇人，放账，行不行？”有的农民听了特务分子造谣，怕实行社会主义，以为实行社会主义就是：“并家”、“限制衣食”、过配给制生活。有的农民发愁：“工人是领导阶级，会弄机器；我们弄不来，只好蹬在锅台上了!”以为拖拉机是工人开的，农民没有事可做了。也有的反映：“现在的世道干一点吃一点，不要再找麻烦，早晚跑不了共产。”很多农民因此大吃大喝。据浙江萧山城北区(植麻区)调查九月五日到二十五日当地各商店的营业情况，肉店营业额达二千三百万元，布店八百七十万元，豆腐店六百万元，茶馆二百万元，铁器和农具只有一百万元。","type":"paragraph"},{"text":"土地改革后农民旧的资本主义思想正逐渐表面化，不少农民、村干部能独买一张犁、一头牛，就愿意退出互助组单干，有的自己雇工，如山东东光徐连九村支部，支书、组委、宣委和一个共产党员均雇工，群众反映：“干部当掌柜了”。有些有余钱的农民，都想买地，放债，做生意。山东沂水在结束土地改革后，地价涨了百分之四十到八十，一户卖地，有十二户争买；有的放债利率高到“对本对利”。张富贵互助组里有一个组员埋怨张富贵“和政府穿一条裤子”，因为张富贵不让他做生意。很多乡村干部认为：“当干部蚀了本”，“革命成功了，还带头干吗？”福建闽侯专区干部反映：“我像吃橄榄核一样，吐掉可惜，吃又吃不下。不干吗，地主笑，群众骂。干下去吗，任务多，生产更耽误”，“大风大雨，开会开到半夜，过去老婆怕我，现在我怕老婆”，“多个香炉添个鬼，当了两年干部，损失四十挑谷子。”因此他们希望赶快改选。有的说：“土地改革后就是生产，当干部自己的田也荒了！”“要想不干，就得把工作搞坏，才能落选！”“我是土地改革干部，土地改革结束，我就不干了!”“我实在不愿工作了，今天你找，明天他找。种完地干脆抬块门板到山上凉风，谁也找不到。”山东胶东也有认为“圈有猪、栏有骡、吃着饼(包米饼)，嘬着鱼。”就很满足了，当“干部没意思”。对于今年的丰收存在相当严重的自满自足思想，有的乡村干部认为：“增产已经到了顶点了，再也增不上去了，再增产稻子就要增倒了。”有的强调“增产是由于自己出的力气，和爱国不爱国没有关系”，怕再捐献飞机大炮。","type":"paragraph"}],"comments":[],"origin":"新华通讯社编《内部参考》1951年11月19日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bffc83441a"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
