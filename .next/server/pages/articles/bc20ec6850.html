script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中央关于处理富农成份党员的党籍问题的指示","authors":[],"dates":[{"year":1952,"month":6,"day":9}],"is_range_date":false,"parts":[{"text":"中央关于处理富农成份党员的党籍问题的指示","type":"title"},{"text":"关于处理农村中富农成份的党员的党籍问题，一九四九年七月中央组织部覆东北局组织部的电中“暂保留其党籍”的规定，今天已不适用，应即作废，特作新的规定如下：","type":"paragraph"},{"text":"（一）目前消灭封建剥削制度的土地改革工作，在全国范围内即将全部完成。土地改革后，农民的生产积极性大大提高，党在农村的农业政策，基本上是“组织起来”实行农业生产互助合作运动。所以农村中党的组织和每一个共产党员，必须积极地宣传并以实际有效的行动，即以模范带头作用，来发现党的这种政策。因此对于已成为阻碍或破坏劳动互助生产合作的富农成份的党员，必须加以严肃的处理，以贯彻党的政策，保持党的纯洁。","type":"paragraph"},{"text":"（二）在处理农村中富农成份（不论是旧富农或新式富农）党员的党籍时，首先应说明：目前党和人民政府的政策，是允许社会上富农经济的存在和发展的，但共产党员则不准许剥削他人（不论是封建剥削或资本主义剥削），不准许党员去作富农，也不准许党员去作资本家、地主或高利贷者，今后农村发展生产的方向是逐渐走向农业集体化。所以要作一个共产党员就必须取消他的剥削他人的生产方式，积极地参加互助合作运动。如果他接受党的这种意见，他的其他方面，亦未丧失党员条件，自应保留其党籍，党亦不应当以富农来看待他。如果他不愿意放弃他的剥削行为，继续进行富农的或其他方式的剥削，则应无条件地开除其党籍。","type":"paragraph"},{"text":"（三）对于富农家庭出身、不直接参与剥削行为的党员，只要他能坚持党的立场，划清他与剥削者家庭的界限，则其本人的党籍不应受家庭成份的影响。","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bc20ec6850"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
