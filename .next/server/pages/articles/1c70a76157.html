<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"公社化运动顺天理合人情湖北七里坪公社社员以切身体会驳斥右倾论调","authors":[],"dates":[{"year":1959,"month":9,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社武汉1日电】　湖北省老革命根据地红安县的七里坪人民公社的干部和社员们，畅谈人民公社的优越性。他们用自己的切身体会，严正地驳斥了那些反对公社和怀疑公社优越性的右倾论调。"},{"type":"paragraph","text":"社员们首先用大量事实证明人民公社是形势发展的必然结果。早在公社化运动之前，群众就从各方面，特别是从生产方面提出建立大社的要求。柳林管理区第二生产队队长张坤银说:“我们二队原来叫安北二社，河西的那个生产队是安北一社，一社在我们社有20多亩地，我们二社在一社也有10多亩地。因为隔河阻水，年年产量很低，我们队干部碰到一起总是说，要是在一个社就好办了，建立人民公社就达到了我们心里的愿望”。在潭河管理区民苏生产队的社员们自豪地谈到他们在公社化运动之前“先跨一步”的情况，这个生产队原先是民苏第七、第五农业社，在1957年，民苏七社和五社就计划在小河上建立一座小型水床，但是由于劳力和资金不足，未能实现。后来，干部和社员为了发展生产，两个小社合并成了一个大社，修成了这个水库。1958年5、6月分大旱之后，七里坪公社所在地区就有100多个小社自动地并成了72个大社，这种并社的趋势，成了人民公社运动的雏形。"},{"type":"paragraph","text":"人们谈到人民公社优越性的时候深深体会到:越是遇到了困难，公社的优越性也就特别显著。八一生产队党支部书记郑如松说:去年农业社时，抗灾要组织三十部水车，结果拼凑了6、7天，才组织了21部，公社化后人力物力雄厚，只化半天时间就组织了30部车子，把5、6里路远的水车到了地里。红坪生产队队长张开胜说:过去我们这个队尽种的插花田，远田有20多里，分散在五个管理区，花工很多，耕种不便，产量又低，公社后调整了土地，今年籽棉的产量要由1958年的560斤增加到733斤，还抽出劳力大搞副业，社员生活大大改善了。"},{"type":"paragraph","text":"公社干部和社员们都兴奋地谈到:人民公社虽只成立一年，但是农村各个方面都起了巨大的变化:首先是公社的33个穷队经过公社加强领导、下放三百多干部，帮助确定生产方针、并拨出20，000元进行投资，已经使它们赶上了或接近赶上较富裕的生产队的发展水平。同时，公社大集体经济的迅速发展，使公社经济和生产队的经济联系加强了，公社工业有力地支援了各生产队的生产。公社多种经营的基地也对生产队起了很好的示范和推动作用。公社文化教育事业的发展也促进了公社的巩固。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1c70a76157"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
