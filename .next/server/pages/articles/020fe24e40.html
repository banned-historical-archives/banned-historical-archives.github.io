<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"批倒资产阶级反动学术“权威”","authors":["李家红"],"dates":[{"year":1968,"month":2,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"批倒资产阶级反动学术“权威”"},{"type":"paragraph","text":"中国医科大学实验员　李家红"},{"type":"paragraph","text":"我们实验员过去在学校最被人看不起，不管什么事都没有我们的发言权。今天，在毛主席领导的无产阶级文化大革命中，我们也要起来揭发批判党内一小撮走资派和资产阶级反动学术“权威”，也要作教育革命的主人。"},{"type":"paragraph","text":"我同学校里的一个反动学术“权威”一道工作近二十年，我认为，他实际上就是一个不折不扣的地主。为什么这么讲呢？地主阶级残酷剥削农民，吃得肥头大耳，一年到头只干两件事：第一收租，第二管人。资产阶级反动学术“权威”也是这样。他拿着高薪，不为人民办好事。工作的时候，爱来就来，爱去就去，来了也是抽烟喝茶，大放其毒。这个披着“专家”、“教授”外衣的反动家伙，对党对人民有刻骨的仇恨。他用他的反动思想腐蚀青年一代。他是怎样带研究生的呢？先给他们布置一些书去读，然后要我们实验员帮他作实验。出了结果，写成论文，他就拿去发表。他的名字自然列在第一位，又拿稿费，又拿审稿费，真是所谓“名利双收”。"},{"type":"paragraph","text":"这班家伙实际上是最没有知识的，最无能的。他们的知识，可以说是我们这些有亲身实践经验的人给他们的。有一次，我发现一种新的细菌，去问他，他不认识，还要胡讲一通，说是“大肠杆菌变异”。过了近一年，他突然拿一篇文章来说，有人发现一种细菌，要我帮他找一找。我拿文章一看，原来就是我一年前发现的那种细菌。我就去质问他。起初，他还一口咬定我发现的细菌是“大肠杆菌变异”。我把全部实验重复做给他看了以后，这个不要脸的家伙欣喜若狂地说：“啊，就是它！好！好！国内还没有发表过，快去写论文。”说完就把全部实验结果拿走了。你看，他象不象一个不劳而获专门剥削人的吸血鬼？"},{"type":"paragraph","text":"是谁把这样的家伙捧上了医大的讲台，戴上了“权威”“专家”的花冠呢？就是中国赫鲁晓夫及其在医大的代理人。我们伟大的领袖毛主席教导我们：“高举无产阶级文化革命的大旗，彻底揭露那批反党反社会主义的所谓‘学术权威’的资产阶级反动立场，彻底批判学术界、教育界、新闻界、文艺界、出版界的资产阶级反动思想，夺取在这些文化领域中的领导权。”我们要按照毛主席的指示办事，和革命的学生一道，彻底批判资产阶级反动“学术权威”。被党内一小撮走资派和这班反动学术“权威”颠倒的历史，要由我们再颠倒过来！"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"教育革命","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"020fe24e40"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
