script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"法国政局动荡　巴黎景象紧张　法西斯分子在巴黎和阿尔及利亚法占区准备暴乱蠢蠢欲动　一些老牌资产阶级政党在美国牵线人撮合下幕后接触频繁","authors":[],"dates":[{"year":1962,"month":2,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"法国政局动荡　巴黎景象紧张"},{"type":"paragraph","text":"法西斯分子在巴黎和阿尔及利亚法占区准备暴乱蠢蠢欲动"},{"type":"paragraph","text":"一些老牌资产阶级政党在美国牵线人撮合下幕后接触频繁"},{"type":"paragraph","text":"据新华社巴黎电　本社记者杨效农报道，法国首都巴黎近日的景象异常紧张：街上到处都是警察、宪兵和共和国保安队。入夜，通街要道和政府机关周围停着长列装满宪警的黑色警车。街头上来往巡逻的警车不时呼啸而过。车辆和行人不断受到检查。"},{"type":"paragraph","text":"首都这种风声鹤唳的气氛，反映了法国政局动荡的急遽发展。"},{"type":"paragraph","text":"这里的报纸盛传法西斯分子正在准备发动暴乱。在阿尔及利亚法国占领区，法西斯分子也在蠢蠢欲动。他们“偷窃”武器，抢劫巨额款项。仅在1月31日一天，在阿尔及尔和奥兰，法西斯恐怖组织“秘密军队组织”就作下七起劫案，劫去款项总额达六千四百四十万旧法郎。他们竭力制造恐怖气氛。"},{"type":"paragraph","text":"在这种局面下，法国一些老牌资产阶级政党正在从事十分频繁的公开商谈和秘密接触。据《快报》周刊透露，上月社会党领袖摩勒、独立党的比内、激进社会党的摩里斯·富尔和人民共和党的柯兰曾经两度会晤，而在幕后牵线的是皮埃尔·乌里，此人从1952年到1959年曾经在西欧“煤钢联营”担任过负责的职务，而现在是美国最大的银行之一利曼兄弟银行驻欧洲的负责人。《快报》周刊说：“接近法国总统府的人士认为，这是美国的一项创议，以便尽可能迅速地使忠实于欧洲一体化和忠实于大西洋集团的人上台，取代戴高乐政权。”还说，美国这种活动已经使法国政府感到不安。"},{"type":"paragraph","text":"面对着法西斯的严重威胁，法国劳动人民正纷纷组织反法西斯委员会，准备在必要时采取自卫措施。反法西斯示威的巨浪此伏彼起，席卷全国。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8a52c293b3"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
