<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"斥萧乾“出版界今不如昔”的谰言","authors":["卞之琳"],"dates":[{"year":1957,"month":9,"day":13}],"is_range_date":false,"parts":[{"text":"斥萧乾“出版界今不如昔”的谰言","type":"title"},{"text":"卞之琳","type":"authors"},{"text":"萧乾在5月20日文汇报发表的“‘人民’的出版社为什么成了衙门?”那篇文章，我最近才读到。我同意大家的看法，认为这是一支毒箭，认为这是用颠倒是非的手法配合各色各样右派分子向社会主义进行大家都承认，出版社自己也承认，人民文学出版社缺点很多，而且有的缺点可能是严重的。可是我们都认识我们的社会主义社会需要这样一个规模空前的全国性的文学出版社，而且缺点是可以改正的；出版社也正需要大家来帮助它改进工作。萧乾却是要“从根本制度上着手”，就是全部否定、推翻我们社会主义的出版制度。他的做法就是配合各方面的右派分子推翻我们整个社会主义事业!","type":"paragraph"},{"text":"萧乾的那一番狂吠，照他自己说，是“从个人经历”来的，我现在也“从个人经历”来说几句。","type":"paragraph"},{"text":"我想在这里只揭穿萧乾说得那样好的过去就够了。","type":"paragraph"},{"text":"萧乾所说的两家出版社，商务印书馆和文化生活出版社，恰好和我也发生过出版关系。","type":"appellation"},{"text":"我和萧乾一样，在商务印书馆出版过三本书。三本书的遭遇怎样呢?跟萧乾的“篱下集”放在同一套丛书里的“汉园集”(李广田何其芳和我三个人的合集)，印出来的时候把我写的一篇题记印丢了:出版社不由著者给自己的小著作一点说明:同一套丛书里，我的译文集子“西窗集”，第二辑译诗里有好几首译得和原诗一样整齐的十四行诗和其他诗体的诗，都给出版社自作聪明的随意改变分行的办法，改成各行七长八短，把有些十四行诗改成十行、八行、十一行，弄得一场胡涂，我亲自仔细校改了，印出来还是那样子!我的第三本书“维多利亚女王传”译本，因为版权由当时胡适把持的所谓“中华文化教育基金会”送给了商务印书馆，出版的时候，作为译者的我一本书都没有得到，后来听说又收入了什么“文库”，另外出一种版本，我直到今天看都没有看见过是什么样子，这本书本来头上有序，后边有前边注里提到的参考书目，还有我化过不少工夫做的几种附录，印出来都没有了，后来这本书再版改版，都不由我过问。萧乾作为好榜样的过去的商务印书馆就是这样的不照著译者的意思，随意出书，把书印得稀糟，还不给认真的著译者一点改正的权利!除非昧着良心、曲意奉迎出版社的资本家，像萧乾可能做的那样，我们普通著译者决不会受到商务印书馆这样出版社的尊重，要谈不上“非常尊重”!","type":"paragraph"},{"text":"至于巴金同志主持下的文化生活出版社，在我看来，那果然是一个绝无仅有的出版社。我解放前著译的好好歹歹的书，后来差不多全部给他们出版的，可是那究竟是一个小型的出版社，可以说是手工业方式的出版社。巴金同志和他的少数几位朋友，在旧社会不利的条件之下，诚如萧乾所说的，作了多大的牺牲，呕尽了心血，才得出这样的成绩。如果当时照合理的社会分工的制度，有人分担子巴金同志这方面的工作，他该会有更多的作为一个作家所需要的社会实践和创作实践的时间和精力。最重要的一点，萧乾不是不知道，为什么不说呢?尽管巴金同志辛辛苦苦为文化生活出版社做了这么大的成绩，他自己还是搞不下去了——被文化生活出版社的资本家一脚踢开!","type":"paragraph"},{"text":"大家想想看，这能说明“今不如昔”吗?萧乾是存心颠倒是非!","type":"paragraph"},{"text":" 来源：《文汇报》1957年9月13日。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1130d75423"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
