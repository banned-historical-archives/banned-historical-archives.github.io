" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"湖南省部分民主人士对苏共第二十次代表大会的反应","authors":["罗重璋"],"dates":[{"year":1956,"month":3,"day":14}],"is_range_date":false,"parts":[{"text":"湖南省部分民主人士对苏共第二十次代表大会的反应","type":"title"},{"text":"罗重璋","type":"authors"},{"text":"【湖南分社14日讯】湖南省部分民主人士对苏共第二十次代表大会的反应：","type":"paragraph"},{"text":"一、对赫鲁晓夫报告中提到“某些国家工人阶级借着把劳动农民、知识分子和一切爱国力量团结到自己周围……取得议会中的稳定多数……”这一点，有些人认为这是新的提法，并猜疑“这样是否是新的列宁主义原则？”“是否不要暴力了?”","type":"paragraph"},{"text":"二、大多数民主人士都注意到对斯大林的问题。许多人对米高扬的发言，感到很惊奇。湖南医学院教授陈祜鑫说：“从报告来看，斯大林是不是犯了错误呀！”长沙市工农民主党的成员彭承植说：“这次大会的报告和发言中，都强调列宁原则，是否斯大林过去对苏联国家的领导方面存在一些缺点?”","type":"paragraph"},{"text":"三、有的把这些发言看成是某个人对斯大林的不满。参事刘季文说：“米高扬对斯大林最为不满的，但当斯大林在世时，他们是很害怕的，决不敢对他有所批评。到今天米高扬才把他的一切缺点都揭露出来。”刘季文还把过去国际关系上的一些问题都说成是斯大林的过错。他说：“斯大林在位二十余年，不但在国内，在国际上也造成了损失，如南斯拉夫的问题、波兰共产党的解散、以及和美国关系的恶化，这些事实都是斯大林一手所造成的。”参事刘纯正说：“斯大林在世时，不但国内有许多人见他害怕，就是在国际上如英美见他也是极其害怕的。如对于南斯拉夫关系的恢复，布尔加宁、赫鲁晓夫之访印、缅等国，以及日内瓦会议之召开等等，都是斯大林在世时所做不到的。”","type":"paragraph"}],"comments":[],"origin":"新华通讯社编《内部参考》1956年3月14日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bef48d5194"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
