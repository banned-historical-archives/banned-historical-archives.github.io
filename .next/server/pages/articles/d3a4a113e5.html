" crossorigin="">{"props":{"pageProps":{"books":[{"id":"d4e5bc82-4b7e-437b-89ae-e720f47d3d82","name":"红旗一九六七年第九期","internal":false,"official":true,"type":"pdf","author":"《红旗》杂志编辑部","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives2/main/d4e5bc82-4b7e-437b-89ae-e720f47d3d82.pdf"],"article":{"title":"看了《逼上梁山》以后写给延安平剧院的信","alias":"","parts":[{"type":"paragraph","text":"看了《逼上梁山\u003e以后写给延安平剧院的信"},{"type":"paragraph","text":"（一九四四年一月九日）"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"看了你们的戏，你们做了很好的工作，我向你们致谢，并请代向演员同志们致谢！历史是人民创造的，但在旧戏舞台上（在一切离开人民的旧文学旧艺术上）人民却成了渣浑，由老爷太太少爷小姐们统治着舞台，这种历史的颠倒，现在由你们再颠倒过来，恢复了历史的面目，从此旧剧开了新生面，所以值得庆贺。你们这个开端将是旧剧革命的划时期的开端，我想到这一点就十分高兴，希望你们多编多演，蔚成风气，推向全国去！"}],"authors":["毛泽东"],"dates":[{"year":1944,"month":1,"day":9}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":4,"page_end":4},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d3a4a113e5"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
