" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"天主教天津教区主教将在天主教全国爱国会成立大会上提出“农村传教不自由”等问题","authors":["方凌","编"],"dates":[{"year":1957,"month":4,"day":11}],"is_range_date":false,"parts":[{"text":"天主教天津教区主教将在天主教全国爱国会成立大会上提出“农村传教不自由”等问题","type":"title"},{"text":"方凌编","type":"authors"},{"text":"新华社天津11日讯　天主教天津教区主教赵振亚，正在收集“农村传教不自由”的情况，准备在将于5月间召开的天主教全国爱国会成立大会上提出来。他已去信通知所辖区内的农村神父，帮他收集这方面的具体材料。","type":"paragraph"},{"text":"天津很多天主教神父把在农村中开展宗教活动、发展教徒的希望，寄托在天主教全国爱国会上。神甫回如愚认为“北京会议一开，乡下开堂就不难了。”神甫张德甫认为这次大会一定要解决乡下教会的活动等问题。","type":"paragraph"},{"text":"来源：1957年4月11日新华通讯社编《内部参考》。","type":"paragraph"}],"comments":[],"origin":"美国图书馆收藏","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6958612787"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
