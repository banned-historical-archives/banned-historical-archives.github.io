script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"各地党委响应毛主席号召  积极领导增产节约运动","authors":[],"dates":[{"year":1951,"month":11,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"各地党委响应毛主席号召"},{"type":"paragraph","text":"积极领导增产节约运动"},{"type":"paragraph","text":"中共湖北省委指示"},{"type":"paragraph","text":"开展增产节约运动"},{"type":"paragraph","text":"中共湖北省委会于最近发出关于开展增加生产、厉行节约运动的通知，号召全省干部坚决贯彻毛主席关于“继续加强抗美援朝工作，增加生产，厉行节约，以支持中国人民志愿军”的指示。湖北省委在通知中指出：开展增产节约运动，应与整风、整党结合进行，克服干部中的贪污浪费现象和官僚主义作风；进一步提高干部的政治水平，提高工作效率，防止某些干部蜕化思想的产生；改善党与群众的关系。对于少数干部的贪污腐化行为，必须追究处理；铺张浪费作风亦必须立即加以制止。"},{"type":"paragraph","text":"通知着重指出：各部门负责同志应以身作则地厉行节约，不请客、不送礼、不送锦旗，严格执行财务制度，保持艰苦朴素的优良传统。各级党委应抽调适当人选组织反贪污浪费检查小组，选择重点，深入检查，发现贪污浪费事件，必须立即加以处理。各级党委应利用各种干部会议进行增产节约的动员，发动机关干部及各企业职员、工人开展增产节约运动；并把爱国公约作一次检查，把节约作为一项内容补充进去。"},{"type":"paragraph","text":"通知最后指出：各地都应结合抗美援朝、土地改革等工作在党委领导下来开展增产节约运动，并注意在农民群众中进行爱国增产节约备荒的动员。"},{"type":"paragraph","text":"中共济南市委"},{"type":"paragraph","text":"布置增产节约工作"},{"type":"paragraph","text":"中共济南市委会于本月十三日召开全市党员干部会议，由市委书记谷牧作关于增产节约的动员报告。谷牧首先指出，全体党员干部应坚决贯彻毛主席的“增加生产，厉行节约，以支持中国人民志愿军”的指示。谷牧在报告中谈到，济南市各国营工厂企业，虽曾在民主改革及调整工资的基础上开展过增产节约运动，但由于许多干部对这一运动的意义认识不足，因而这一运动的收获是不大的。而在机关团体、特别是市的某些领导机关中，还严重地存在着铺张浪费的现象。有许多单位开会必须悬灯结彩、看电影、看戏、制纪念册、制纪念章，甚至还有个别单位利用会议发动祝贺献礼。在干部中，严重地存在着浪费思想。有些人甚至发展到贪污腐化，违法乱纪的严重地步。对于保持艰苦朴素作风的同志，有些人则讥笑他们是“农村观点”，或称之为“土包子”。这些错误思想和不良倾向是必须迅速坚决纠正的。谷牧指出：为了贯彻毛主席的指示，济南市全体党员应立即动员起来，团结各界人民，坚决执行人民政协第一届全国委员会第三次会议的各项决议，特别要迅速、广泛地在工厂、郊区农村开展以增产节约为主、在机关团体中开展以整编节约为主的群众性的运动。目前应即进行下述工作：（一）全市各机关、企业党委，区委，企业机关中的全体干部立即学习人民政协第一届全国委员会第三次会议的各项文件，并传达济南市第三届各界人民代表会议有关增产节约的决议，使工作人员明确认识增产节约的重大意义，以保证增产节约运动的顺利开展，并打下十二月份全市机关以整编节约反铺张浪费为主要内容的整风运动的基础。同时，在学习文件过程中，各单位应酝酿拟订减少层次、合理使用力量、改进工作制度、提高工作效率的方案，着手清理资财，制定节约计划以便迅速地进入行动。（二）成立济南市机关整编节约委员会，立即采取有效方法，消灭一切铺张浪费现象。（三）加强对增产节约运动的领导，分别召开国营、私营企业工作会议，专门研究增产节约问题，介绍先进经验，推动运动前进。"},{"type":"paragraph","text":"（根据山东大众日报材料改编）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"谷牧","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c67c86c7ff"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
