script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"意大利劳动人民日益贫困化  通货膨胀越来越严重，物价飞涨，住房恐慌，失业人数不断增加  工人阶级和劳动人民不断举行罢工，沉重打击资产阶级反动统治","authors":[],"dates":[{"year":1970,"month":1,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"意大利劳动人民日益贫困化"},{"type":"paragraph","text":"通货膨胀越来越严重，物价飞涨，住房恐慌，失业人数不断增加  工人阶级和劳动人民不断举行罢工，沉重打击资产阶级反动统治"},{"type":"paragraph","text":"新华社十二日讯　陷入越来越深刻的政治、经济危机中的意大利垄断资产阶级，正在加紧向意大利劳动人民转嫁困难，使得物价飞涨、住房恐慌，千千万万意大利劳动人民落进了贫困、失业的深渊。"},{"type":"paragraph","text":"由于意大利垄断资产阶级加紧对劳动人民的进攻，意大利的通货膨胀日益严重，生活费用特别是食品价格和房租不断上涨。据意大利中央统计局发表的数字，从一九六八年八月到去年八月的十二个月中，食品零售价格平均上涨了百分之四。去年八月以后，零售价格涨得更快。去年十一月一个月中，意大利的主食品面团就涨价百分之五，香肠涨价百分之三十，牛奶、食油以及其他一些重要食品也都涨了价。"},{"type":"paragraph","text":"意大利的住房问题非常尖锐，房租更是高得惊人。在北方工业城市都灵，房租高达工人工资的一半。由于缺乏住房，在许多地方工人们只能住阁楼和顶楼，但要付出同样昂贵的房租。在首都罗马，由于严重缺乏住房，有一万六千户居民住在板棚里，还有六万九千户居民全家同住一室。在米兰和都灵，大批工人因没有房子住，被迫在公园和车站的长凳上过夜。"},{"type":"paragraph","text":"意大利广大劳动人民越来越深重的贫困化，还表现在失业人数不断增加。据报道，失业和半失业人数已高达五百六十五万，此外，还有大约七十万人不得不背井离乡，到欧洲其他国家去寻找工作。医疗机构严重缺乏，劳动人民也看不起病。在南部每一百万人仅有三张病床，在有五百万人口的西西里，许多居民中心甚至缺乏饮用水等最基本的生活必需品。"},{"type":"paragraph","text":"意大利工人阶级和广大的劳动人民对垄断资产阶级的残酷剥削已忍无可忍。他们掀起一次又一次的声势浩大的罢工斗争和示威游行，并且常常同反动警察展开激烈的搏斗。据报道，一九六九年一年中，工人的罢工斗争，使意大利垄断资本损失了大约六亿九千四百万个工时，一万亿里拉，沉重地打击了垄断资产阶级的反动统治。随着意大利政治经济危机的日益加深，可以肯定，意大利革命群众将掀起规模更大的斗争浪潮。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0cf81ff7b5"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
