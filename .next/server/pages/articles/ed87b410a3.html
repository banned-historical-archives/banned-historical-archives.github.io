script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"中国赫鲁晓夫提出报纸上要“真实”，剥开一看，“真实”是假，反党是真。我们贫下中农决心到底批判修正主义新闻路线——哪里长毒草就在哪里把它锄掉","authors":["严高林"],"dates":[{"year":1968,"month":7,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"上海县新泾人民公社　严高林"},{"type":"paragraph","text":"中国赫鲁晓夫提出报纸上登的东西应该“客观”、“公正”、“真实”的背后，包着见不得人的东西，“假的就是假的，伪装应当剥去”。"},{"type":"paragraph","text":"中国赫鲁晓夫在一九四八年《对华北记者国的讲话》中，不怀好意地对记者讲“不要故意加油加醋，不要戴有色眼镜”，以要“真实”等为幌子，反对记者去“找左倾的例子”，实质上要华北各地党报停止纠正当时“左”倾错误的宣传，停止执行毛主席关于纠正“左”倾错误的指示，掩护他的形“左”实右的反动路线。这不明明是公然反对毛主席的革命路线吗?"},{"type":"paragraph","text":"中国赫鲁晓夫是我们贫下中农的死对头。就是他，大砍特砍农业生产合作社，妄图搞垮集体经济，又是他，恶毒地攻击人民公社，大挖社会主义墙脚。人民公社办得怎么样，我们贫下中农心里最有数。就拿我们新泾人民公社来说，也是脚踏天梯步步高，越办越兴旺，现在我们粮食亩产超千斤，蔬菜亩产超万斤，集体饲养的生猪，增长到一亩地二头猪，实现了农副业生产的全面跃进，更重要的是防止了农村中的两极分化，保证贫下中农沿着社会主义的康庄大道前进，这一切成就没有人民公社，是绝对办不到的，贫下中农深有体会地说:“共产主义是天堂，人民公社是金桥。”中国赫鲁晓夫大白天睁着眼睛说瞎话，要报纸专门登社会主义社会中的所谓“阴暗面”，这不是反党反社会主义，硬要把我们贫下中农往火坑里推，又是什么?"},{"type":"paragraph","text":"毛主席教导我们，农民也要批判资产阶级，中国赫鲁晓夫推行的这条修正主义新闻路线，我们贫下中农一定要把它批深批透，哪里长毒草，我们就要在那里把它锄掉:"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ed87b410a3"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
