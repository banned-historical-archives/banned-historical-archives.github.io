" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoistlegacy.de-2556","name":"公安部关于处理精神病患者犯罪问题的通知","author":"公安部","internal":false,"official":false,"type":"unknown","files":[],"article":{"title":"公安部关于处理精神病患者犯罪问题的通知","dates":[{"year":1978,"month":10,"day":30}],"is_range_date":false,"authors":["公安部"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"四川省民检察院研究室，检查工作手册（一），78-80","tags":[{"name":"精神病患者","type":"主题/事件"},{"name":"刑事责任","type":"主题/事件"}],"parts":[{"type":"title","text":"公安部关于处理精神病患者犯罪问题的通知"},{"type":"paragraph","text":"各省、市、自治区公安局："},{"type":"paragraph","text":"关于对精神病患者犯罪的处理问题，一些地方询问，一九五六年最高人民法院曾有一个复函，一九七二年公安部《公安工作简报》第十九期又有一个意见，究竟如何执行？经与最高人民法院商定，仍按一九五六年最高人民法院关于处理精神病患者犯罪问题的复函精神执行。特此通知。"},{"type":"subtitle","text":"一九七八年十月三十日"},{"type":"paragraph","text":"附件："},{"type":"paragraph","text":"最高人民法院关于处理精神病患者犯罪问题的复函"},{"type":"subtitle","text":"〔56〕法研字第5674号"},{"type":"paragraph","text":"河北省高级人民法院："},{"type":"paragraph","text":"你院〔56〕刑一字第2494号向司法部的请示，经司法部转送我院处理。兹提出如下意见，供参考。"},{"type":"paragraph","text":"一、精神病人在不能辨认或者不能控制自己行为的时候实行对于社会有危险性的行为，不负刑事责任。至于精神病人是否不能辨认或者不能控制自己行为，应由有关医疗部门鉴定并应就其左右邻近调查证明行凶时及行凶前后的精神状况，取得确实的证明。"},{"type":"paragraph","text":"间歇性的精神病人，在精神正常时候的犯罪，应当负刑事责任。"},{"type":"paragraph","text":"醉酒状态中的犯罪，应当负刑事责任。"},{"type":"paragraph","text":"二、 反革命分子与其家属或地主富农分子如确与上述情况相同，不应另有不同的处理。"},{"type":"paragraph","text":"三、 第三条意见可以不提。因检察机关已建立且日益健全，对精神病患者的犯罪，可由检察机关决定起诉或不起诉。"},{"type":"subtitle","text":"一九五六年六月二日"}],"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d81f426d01"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
