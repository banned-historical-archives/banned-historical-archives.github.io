" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji30","name":"毛泽东全集第30卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji30.pdf"],"article":{"title":"关于颁布队列条令草案、内务条令草案、纪律条令草案的电报","alias":"","parts":[{"type":"paragraph","text":"关于颁布队列条令草案、内务条令"},{"type":"paragraph","text":"草案、纪律条令草案的电报"},{"type":"paragraph","text":"（1951年2月1日）各大军区、各特种兵首长，并军事学院："},{"type":"paragraph","text":"于制定队列条令草案，内务条令草案及纪律条令草案，委由总参谋部发全军试行。"},{"type":"paragraph","text":"查我军由于中国革命形势的发展，曾长期处于被分割的状态，全国胜利亦仅有一年余，而我军之武器、装备大多系在战争中缴自敌人，种类及其庞杂。仅以上这些原因，就造成了我们过去在编制上、装备上、动作上，甚至在某些制度上的不统一。全国胜利后，为了实现国防军正规化、近代化的新任务，统一编制，统一装备，统一动作，统一制度，就成为全军一致的要求。为此，军事训练部曾召集各区军事教育干部共同讨论制定以上三种条令草案，作为目前统一的准则。这三种条令草案的制度，主要参照苏联军队的各种条令，同时注意我之民族习惯，故暂由总参谋部颁布试行，侯我各部队在实际体验中提出意见，经军事训练部以收集并予修正后，再送军委主席核准，然后正式下令颁布。"},{"type":"paragraph","text":"人民革命军事委员会主席毛泽东"},{"type":"paragraph","text":"一九五一年二月一日"}],"authors":["毛泽东"],"dates":[{"year":1951,"month":2,"day":1}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":103,"page_end":103},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"90dbdc9d1d"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
