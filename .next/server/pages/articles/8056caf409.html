" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"邓小平对胡耀邦等谈起草《关于建国以来党的若干历史问题的决议》","authors":["邓小平"],"dates":[{"year":1980,"month":6,"day":27}],"is_range_date":false,"parts":[{"text":"邓小平对胡耀邦等谈起草《关于建国以来党的若干历史问题的决议》","type":"title"},{"text":"邓小平","type":"authors"},{"text":"一九八零年六月二十七日，邓小平与胡耀邦、赵紫阳、胡乔木，姚依林、邓力群谈话，谈《关于建国以来党的若干历史问题的决议》草稿：","type":"paragraph"},{"text":"决议草稿看了一遍。不行，要重新来。我们一开始就说，要确立毛泽东同志的历史地位，坚持和发展毛泽东思想，现在这个稿子没有很好体现原先的设想。一九五七年以前的几部分，事实差不多，叙述的方法、次序，特别是语调，要重新斟酌、修改。要说清楚关于社会主义革命和社会主义建设，毛泽东同志有哪些贡献。他的思想还在发展中。我们要恢复毛泽东思想，坚持毛泽东思想，以至还要发展毛泽东思想，在这些方面，他都提供了一个基础。要把这些思想充分地表达出来。这段时间他的一些重要文章，如《论十大关系》、《关于正确处理人民内部矛盾的问题》、《一九五七年夏季的形势》等，都要写到。这都是我们今天要继续坚持和发展的。要给人一个很清楚的印象，究竟我们高举毛泽东思想旗帜、坚持毛泽东思想，指的是些什么内容。","type":"paragraph"},{"text":"整个文件写得太沉闷，不象一个决议。看来要进行修改，工程比较大。重点放在毛泽东思想是什么、毛泽东同志正确的东西是什么这方面。错误的东西要批评，但是要很恰当。单单讲毛泽东同志本人的错误不能解决问题，最重要的是一个制度问题。毛泽东同志说了许多好话，但因为过去一些制度不好，把他推向了反面。毛泽东同志晚年在理论和实践上的错误，要讲，但是要概括一点，要恰当。主要的内容，还是集中讲正确的东西。因为这符合历史。是不是结语写一段我们还要继续发展毛泽东思想。这中间还要批评“两个凡是”的观点。毛泽东同志的错误在于违反了他自己正确的东西。“两个凡是”的观点就是想原封不动地把毛泽东同志晚年的错误思想坚持下去。所谓按既定方针办，就是按毛泽东同志晚年的错误方针办。封建主义残余影响的问题要讲一讲，也要讲得恰当。毛泽东同志多次不赞成歌功颂德，提出不以个人名字给地方、企业命名，不祝寿、不送礼。我们现在的中央所坚持的这一套，就是毛泽东思想，当然我们也有具体化的内容。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"胡耀邦","type":"人物"},{"name":"人民内部矛盾","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8056caf409"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
