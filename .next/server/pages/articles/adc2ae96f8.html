script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"美共叛徒白劳德的修正主义路线","authors":[],"dates":[{"year":1971,"month":7,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"白劳德是现代修正主义的最早代表人物。他为了适应美帝国主义反动政策的需要，提出了一条投降主义路线。我们伟大的领袖毛主席在一九四五年七月二十九日在《给福斯特同志的电报》中指出:“白劳德的整个修正主义——投降主义路线(这条路线充分表现于白劳德所著《德黑兰》一书中)，本质上是反映了美国反动资本集团在美国工人运动中的影响。”这就是说，白劳德是美帝国主义的帮凶。"},{"type":"paragraph","text":"白劳德是一九三○年至一九四四年美国共产党的总书记。在第二次世界大战中，美国共产党内以白劳德为代表的右倾思想，曾经形成反马克思主义的修正主义——投降主义路线。白劳德从一九四三年十二月起，在许多讲演和论文中，鼓吹这种修正主义——投降主义的主张；并于一九四四年四月出版了作为他的右倾机会主义纲领的《德黑兰》一书。白劳德“修正”了列宁主义关于帝国主义是垄断的、腐朽的和垂死的资本主义的基本理论，否认美国资本主义的帝国主义性质，认为它还“保持着青年的资本主义制度的一些特点”，认为美国无产阶级和大资产阶级之间有“共同利害”，主张保护托拉斯制度，梦想经过“阶级调和”来避免美国资本主义所不可避免的危机。白劳德从对美国资本主义的荒谬估计出发，从对垄断资本作阶级合作的投降主义的路线出发，于一九四四年五月，主持解散了美国无产阶级的政党——美国共产党，而另行组织非党的美国共产主义政治协会。白劳德的这一错误路线一开始就遭到以福斯特同志为首的许多美国共产党员的反对。一九四五年六月，美国共产主义政治协会在福斯特同志领导下，通过批判白劳德路线的决议。同年七月，又举行美国共产主义政治协会特别全国代表会议，决定彻底纠正白劳德路线，重建美国共产党。白劳德后来仍然坚持其叛卖无产阶级的主张，公开拥护杜鲁门政府的帝国主义政策，并进行反党的派别活动，因此在一九四六年二月被驱逐出党。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"adc2ae96f8"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
