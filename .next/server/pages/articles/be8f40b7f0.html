script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中国人民解放军河北省玉田县公法军事管制委员会关于判处现行反革命犯王怀敬死刑的刑事判决书","authors":[],"dates":[{"year":1970,"month":3,"day":20}],"is_range_date":false,"parts":[{"text":"中国人民解放军河北省玉田县公法军事管制委员会关于判处现行反革命犯王怀敬死刑的刑事判决书","type":"title"},{"text":"现行反革命犯王怀敬, 男, 现年26岁,玉田县陈家甫公社王生甫大队人。","type":"paragraph"},{"text":"王犯自幼即养成一种专横习气。成年后, 思想极端反动, 1965年曾因多次攻击无产阶级司令部受过批判教育, 该犯不但不低头认罪, 反而变本加厉地进行反革命活动, 1969年7月以来, 除在群众中公开散布反动言论外, 还明目张胆地三次向党中央投寄长达数万言的反革命信件。咬牙切齿地攻击无产阶级司令部,其内容之反动,语言之恶毒,已达登峰造极之地步,更为严重的是,该犯被拘捕后,仍坚持反革命立场,继续负隅顽抗,狂妄至极,实属罪大恶极,不堪改造的现行反革命分子。","type":"paragraph"},{"text":"为了保卫党中央,保卫无产阶级司令部,巩固无产阶级专政,根据党的政策和广大革命群众的要求,经报请河北省革命委员会批准,依法判处王犯死刑 立即执行。","type":"paragraph"},{"text":" 中国人民解放军 河北省玉田县公法军事管制委员会(章)1970 年3月 20 日","type":"paragraph"},{"text":"【王怀敬,男,汉族,时年26岁,初中文化,共青团员,河北省玉田县王生甫村人。 1965年3月加入中国人民解放军服役, 1968年3月退役回原籍。","type":"paragraph"},{"text":"1970年2月3日, 中华人民共和国公安部以 (70) 公侦反 65 号函将王怀敬写给党中央的信转给河北省革命委员会,函称:署名“王怀敬”的“反革命分子......反动透顶, 疯狂至极,责令“列为大案,尽速侦破严处”。河北省公法军管会于1970年2月11日 以冀公军侦字(70) 第90号函告唐山地区公法军管会,该会于同月16日夜电告玉田县公法军管会侦破。玉田县公法军管会于1970年2月23日拘留了王怀敬。玉田县公安机关军事管制小组于1970年2月25日审理后判处王怀敬死刑,立即执行。同日, 玉田县 革命委员会同意判处王怀敬死刑, 立即执行。1970年3月3日唐山地区革命委员会研究认为:“该犯思想极为反动, 于1970年1月,向党中央投寄反革命信件,恶毒攻击诬蔑无产阶级司令部,实属反动透顶,罪恶累累,民愤极大。当王犯之反革命罪行被揭露后 仍负隅顽抗,坚持反革命立场,拒不认罪,反动气焰极为嚣张,我们意见判处死刑立即执行。”然后送省审批。1970年3月8日,河北省革命委员会以(70)刑复字第133号批 复唐山地区革命委员会“同意判处现行反革命犯王杯敬死刑,立即执行。希执行后函告。” 1970年3月20日玉田县公法军管会制作了判处王杯敬死刑的法律文书。1970年3月23日上午, 玉田县公法军事管制委员会将王怀敬提出监狱, 验明正身, 随即赴公判会场,进行宣判, 当日11时将王押赴刑场(海子村后),执行了枪决。","type":"paragraph"},{"text":"1975年11月16日, 玉田县革命委员会以玉革(1975) 58 号作出《关于王怀敬案件平反的决定》,与此同时,玉田县人民法院作出了宣告王怀敬无罪的刑事裁定,并撤销了中国人民解放军河北省玉田县公法军事管制委员会(70) 军刑字第13号刑事判决书。】","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"河北文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"be8f40b7f0"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
