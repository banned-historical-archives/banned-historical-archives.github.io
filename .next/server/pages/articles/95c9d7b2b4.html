" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共中央办公厅及国务院秘书厅关于做好外地来京红卫兵战士和革命师生离京工作的一封信","authors":[],"dates":[{"year":1966,"month":11,"day":12}],"is_range_date":false,"parts":[{"text":"中共中央办公厅及国务院秘书厅关于做好外地来京红卫兵战士和革命师生离京工作的一封信","type":"title"},{"text":"全国各地来京的红卫兵战士和革命师生们！","type":"appellation"},{"text":"北京红卫兵战士和革命师生们！","type":"appellation"},{"text":"解放军指战员和政治工作员同志们！","type":"appellation"},{"text":"各接待单位和铁道部门同志们！","type":"appellation"},{"text":"我们伟大导师、伟大领袖、伟大统帅、伟大舵手毛主席，和他亲密战友林彪同志，以及中央其他领导同志，十一月十日和十一日连续两天接见了各地来京的红卫兵战士和革命师生两百多万人，这是对我们最大的关怀、最大的支持和最大的鼓舞，也是我们最大的幸福。各地在京的红卫兵战士和革命师生们，希望你们带着毛主席的关怀和支持，带着革命串连经验，尽快的返回本地区，按照我们最伟大领袖毛主席的指示，关心国家大事，把无产阶级文化大革命进行到底。","type":"paragraph"},{"text":"北京的红卫兵战士和革命师生们，希望你们好好帮助外地同学办理车证，帮助他们上火车，热情欢送战友们返回他们的文化大革命的斗争前线。","type":"paragraph"},{"text":"解放军政治工作人员和指战员同志们，你们高举毛泽东思想伟大红旗，和外地来京的红卫兵战士和革命师生生活在一起，日以继夜地宣传毛泽东思想，积极进行政治动员和组织工作，出色的完成了我们最伟大领袖毛主席接见全国各地来京红卫兵战士和革命师生的光荣任务。现在，特向你们致以文化大革命的敬礼。解放军指战员和多数政治工作人员同志们，可以按照规定返回部队了，希望留下的解放军政治工作人员继续做好二百万外地革命师生的离京工作。","type":"paragraph"},{"text":"各接待单位，希望你们做好动员工作，安排外地革命师生顺利的离京并准备做好新来京的革命师生的接待工作。铁道部门，希望你们多组织一下车辆，维持好秩序，尽快的把外地革命师生输送回去。","type":"paragraph"},{"text":" 中共中央办公厅　国务院秘书厅一九六六年十一月十二日","type":"paragraph"}],"comments":[],"origin":"根据文件原件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"95c9d7b2b4"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
