script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji33","name":"毛泽东全集第33卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji33.pdf"],"article":{"title":"对金门作战建议的批语","alias":"","parts":[{"type":"paragraph","text":"对金门作战建议的批语！"},{"type":"paragraph","text":"（1953年12月19日）退彭。此意见可注意。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十二月十九日"},{"type":"paragraph","text":"[1]这是毛泽东对中央人民政府人民革命军事委员会作战部部长张震1953年12月16日给人民革命军事委员会副主席彭德怀、代理总参谋长聂荣臻信的批语。"},{"type":"paragraph","text":"[2]指张震信中提出的意见。信中说：敌人在金门已修筑了较坚固的地下工事，攻占金门想在一天或一晚解决战斗的可能性不大。如时间拖延较久，就须将台湾可能增援计算在内。再有，华东海军在上、下大陈岛未打下前不能全部参战，如制造大量机帆船不但有很大困难，而且也不合使用。作战物资所需甚巨，如第一线机场无保证，仅靠一条公路运输，困难很大。从使用兵力看，还须南下三个军。我总觉得，金门等于下围棋的一个死子，攻击主动权在我手中，只要我准备充分，任何时候都可发起攻击。在条件尚未充分具备时，以不过急发起战斗为好。彭德怀、聂荣臻将此信送呈毛泽东。"}],"authors":["毛泽东"],"dates":[{"year":1953,"month":12,"day":19}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":485,"page_end":485},"tags":[{"name":"毛泽东","type":"人物"},{"name":"聂荣臻","type":"人物"},{"name":"彭德怀","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3306de82e2"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
