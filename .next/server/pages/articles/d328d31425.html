script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"美国通用电气公司十五万工人坚持罢工一个月  罢工工人加强团结坚持斗争挫败垄断资本家破坏阴谋  澳大利亚万余工人罢工反对剥削　秘鲁尼加拉瓜工人展开反迫害斗争","authors":[],"dates":[{"year":1969,"month":11,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"美国通用电气公司十五万工人坚持罢工一个月"},{"type":"paragraph","text":"罢工工人加强团结坚持斗争挫败垄断资本家破坏阴谋  澳大利亚万余工人罢工反对剥削　秘鲁尼加拉瓜工人展开反迫害斗争"},{"type":"paragraph","text":"新华社二十七日讯华盛顿消息：从十月二十七日开始举行罢工的美国通用电气公司的约十五万工人，已经坚持斗争了一个月。目前罢工还在继续，正在给美国统治集团以越来越沉重的打击。"},{"type":"paragraph","text":"一个月来，通用电气公司的罢工工人不断识破了垄断资本家妄图挑拨工人群众间的关系，破坏罢工的种种阴谋，加强了团结，坚持了罢工。他们在一些州里还对反动当局派来破坏和镇压罢工的法西斯警察进行了坚决的斗争。"},{"type":"paragraph","text":"这次大罢工获得了美国其他许多行业工人的广泛同情和支持。据报道，钢铁、汽车、飞机、农具等工业的工人，都纷纷捐款支持通用电气公司工人的罢工。"},{"type":"paragraph","text":"通用电气公司是美国最大的军火垄断企业之一，它今年接受美国政府的军火订货额达十六亿多美元。"},{"type":"paragraph","text":"新华社墨尔本二十八日电　澳大利亚的一万二千名电力工人二十七日再次举行四十八小时的罢工，反对剥削，要求增加工资和改善工作条件。"},{"type":"paragraph","text":"电力工人的罢工，使许多工厂被迫停工，沉重地打击了澳大利亚的垄断资产阶级。"},{"type":"paragraph","text":"电力工人根本不理睬法院要他们复工的命令。罢工工人在二十七日还举行了群众集会，并在会上宣布，如果反动当局迫害参加这次罢工的工人或工会负责人，各发电站将无限期地停工。"},{"type":"paragraph","text":"此外，布里斯班港口的三千名码头工人二十七日也举行二十四小时罢工，要求增加工资。"},{"type":"paragraph","text":"新华社二十五日讯秘鲁和尼加拉瓜工人最近展开反掠夺反迫害斗争。"},{"type":"paragraph","text":"美资南秘鲁铜公司在秘鲁南部塔克纳省经营的托克帕拉铜矿的四千名工人最近举行罢工，抗议美国老板对矿工的残酷剥削和迫害，要求增加工资，改善劳动条件。参加罢工的工人还举行了集会与游行。"},{"type":"paragraph","text":"尼加拉瓜北部地区的圣巴尔瓦拉水坝工程的工人不顾尼加拉瓜反动当局的镇压，最近举行罢工，要求增加工资。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d328d31425"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
