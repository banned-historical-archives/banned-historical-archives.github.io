script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"在战无不胜的毛泽东思想指引下印度农民革命武装斗争迅速扩展","authors":[],"dates":[{"year":1969,"month":12,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社北京二日电　新德里消息:印度《解放》月刊十一月号报道，印度农民革命武装斗争正在西孟加拉邦和比哈尔邦的一些地区迅速扩展。"},{"type":"paragraph","text":"《解放》月刊的报道说，在印度共产党(马克思列宁主义)的领导下，在毛泽东思想的鼓舞和指引下，觉醒的贫农和无地农民正在开展游击战，坚决消灭封建剥削和压迫，粉碎四座大山(帝国主义、社会帝国主义、封建主义、买办官僚资本主义)的黑暗统治。被压迫和被剥削的人民群众对农民游击队所取得的每一个胜利欢欣鼓舞。统治阶级及其代理人则十分沮丧。"},{"type":"paragraph","text":"报道指出，在修正主义分子当政的西孟加拉邦，“各地纷纷传来关于农民游击队在广大农民群众的支持和积极合作下对恶霸地主和阶级敌人采取行动的消息。”"},{"type":"paragraph","text":"在这个邦的米德纳普尔县，农民游击队十月下旬消灭了两名罪大恶极的阶级敌人。在这以前，十月十三日，农民游击队在离警察哨所不远的地方袭击一个大恶霸地主兼高利贷者的住宅，并把这个反动家伙打死。农民游击队没收了这个恶霸地主的武器和文件以及他囤积的大米等食物，把这些东西交给了当地的分配委员会，并把他的剥削农民的契据全部烧掉。游击队的这一行动使当地居民拍手称快，使地主们慌作一团，纷纷向市镇逃跑。"},{"type":"paragraph","text":"十月一日，由印共(马列)领导的一支农民游击队，同大约两千名农民群众一起，袭击一个恶霸地主的住宅，没收了他的枪支弹药和大批粮食，烧毁他剥削农民的全部契据，并把粮食分配给贫农和无地农民。"},{"type":"paragraph","text":"在麦尔希达巴德县，由贫农和无地农民组成的一支游击队，不久前袭击了一个有武装保镖把守的恶霸地主的庄园。游击队勇敢地冲进庄园，用斧头劈开三道牢固的大门，杀到这个恶霸躲藏的二层楼上。保镖们怕得要死，抱头鼠窜。游击队在处决了这个恶霸地主以后，高呼“纳萨尔巴里万岁!”"},{"type":"paragraph","text":"印共(马列)领导的游击队和武装群众共约五百人，九月二十七日还在靠近西孟加拉邦米德纳普尔县的比哈尔邦辛格布姆县打死一个恶霸地主。武装群众砸烂他的汽车，没收了他囤积的大米、稻谷、布匹以及一些子弹等物资。他们把大米、稻谷、布匹分给贫苦人民。贫苦人民在这个恶霸地主的房子里欢庆胜利。"},{"type":"paragraph","text":"在比哈尔邦，印共(马列)在木扎法普尔县领导的农民武装斗争已经扩展到了达班加县。十月二日，这个县最先成立的一支游击队打死了一名大恶霸地主兼当地国大党的头子。这个可恶的阶级敌人是在交通要道上在警察的严密保护下被消灭的。"},{"type":"paragraph","text":"印度反动政府把数以千计的武装警察派往农村，要逮捕数以千计的革命者。但是，这种镇压行动却使农民群众的革命觉悟越来越高，党的工作人员的革命活动越来越活跃。新的游击队和农民共产党员不断增加。农民群众在斗争中高呼:“毛泽东主席万岁!”“印度共产党(马克思列宁主义)万岁!”“纳萨尔巴里万岁!”“武装革命万岁!”“消灭修正主义!”"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"59ab0d1c4e"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
