script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"日本朋友欢呼毛主席《支持美国黑人抗暴斗争的声明》发表一周年  帝国主义将在人民革命烈火中烧成灰烬","authors":[],"dates":[{"year":1969,"month":4,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"日本朋友欢呼毛主席《支持美国黑人抗暴斗争的声明》发表一周年"},{"type":"paragraph","text":"帝国主义将在人民革命烈火中烧成灰烬"},{"type":"paragraph","text":"新华社十六日讯　东京消息：日本朋友发表谈话，欢呼毛主席《支持美国黑人抗暴斗争的声明》发表一周年。"},{"type":"paragraph","text":"日中友好协会（正统）总部副理事长岩村三千夫说：毛主席在声明中指出：“当前，世界革命进入了一个伟大的新时代。”一年来世界形势的发展，证明毛主席的这一论断是完全正确的。去年以来，全世界人民的斗争不断发展，日本人民的反美爱国斗争也出现了新高潮。"},{"type":"paragraph","text":"岩村指出：苏修叛徒集团在武装侵略捷克斯洛伐克以后，又在中国边境进行武装挑衅，彻底地暴露了苏修社会帝国主义的本质。苏修这种侵略本质和叛徒嘴脸越来越被世界广大人民所看穿。"},{"type":"paragraph","text":"岩村说：中国人民在无产阶级文化大革命的胜利大道上阔步前进。最近，中国共产党第九次全国代表大会又隆重开幕，这对世界战斗的人民是一个巨大的鼓舞。他说，我们要遵照毛主席关于“全世界人民更紧密地团结起来，向着我们的共同敌人美帝国主义及其帮凶们发动持久的猛烈的进攻”的伟大教导，同美日反动派展开坚决的斗争。"},{"type":"paragraph","text":"日本记者同盟事务局长饭冈邦辅说：毛主席在声明中正确地、科学地分析了美国黑人抗暴斗争，阐明了美国黑人斗争的意义，指出了黑人斗争的胜利方向，这对正在为争取解放而同美帝国主义和苏联修正主义及其帮凶进行斗争的全世界人民，是一个强有力的号召。"},{"type":"paragraph","text":"饭冈指出：现在，凡是受到美帝国主义侵略的地方，都在展开猛烈的反美斗争。同时，反对美帝国主义的最大帮凶苏联修正主义的斗争也在全世界各地展开。"},{"type":"paragraph","text":"饭冈说：美帝国主义和苏联修正主义已经陷入了进退维谷的困境。为了摆脱这种困境，美帝和苏修一面争夺，一面勾结，妄图重新瓜分世界。美帝苏修这种罪恶阴谋已被全世界人民识破，越来越陷于孤立，并且遭到本国人民的猛烈反击。因此，它们将在人民革命的烈火中被烧成灰烬。"},{"type":"paragraph","text":"饭冈最后说：我们要遵照世界人民的伟大领袖毛泽东主席的教导，高举毛泽东思想伟大红旗，对美帝国主义和苏联修正主义集团及其帮凶进行坚决的斗争，不断发展和加强反美统一战线，朝着胜利的方向阔步前进。"},{"type":"paragraph","text":"亚非人民团结日本委员会事务局长板井庄作指出：一年来，世界人民英勇地站起来，沉重地打击了美帝国主义和苏联现代修正主义以及各国反动派，使他们陷入了走投无路的境地。正如毛主席在声明中所指出的：“殖民主义、帝国主义和一切剥削制度的彻底崩溃，世界上一切被压迫人民、被压迫民族的彻底翻身，已经为期不远了。”"},{"type":"paragraph","text":"板井说，一年来，日本人民的斗争证明，毛主席的这一论断是完全正确的。在日本，反对资产阶级腐朽教育制度的学生运动，反对军事基地的农民斗争，争取冲绳解放的群众斗争蓬勃发展，所有这些斗争都深刻地表明美日反动派已经陷入走投无路的深刻危机之中，日本人民必将把它们彻底埋葬。"},{"type":"paragraph","text":"板井说：目前世界形势一片大好。现在的时代，是毛泽东思想的光辉照耀的伟大的新时代。处在这样一个伟大时代，世界各国革命人民都更加满怀信心，勇往直前地争取人类的彻底解放。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"世界形势","type":"主题/事件"},{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5e5bc891c2"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
