script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"在文化大革命和批林批孔运动推动下  我国海洋地质调查事业迅速发展","authors":[],"dates":[{"year":1976,"month":5,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"在文化大革命和批林批孔运动推动下"},{"type":"paragraph","text":"我国海洋地质调查事业迅速发展"},{"type":"paragraph","text":"据新华社一九七六年五月一日讯　在无产阶级文化大革命和批林批孔运动的推动下，我国新兴的海洋地质调查事业，从无到有，由小到大，得到了迅速发展。与文化大革命以前的一九六五年相比，现在我国从事海洋地质调查的专业队伍人数增长了四点五倍，海洋地质调查船只增长七倍半；文化大革命前只能在我国的内海渤海工作，文化大革命以后发展到在黄海、东海和南海属于我国的各个海域开展工作。近两年，还对我国黄海、东海及南海海域的大批海岛和滨海砂矿进行了调查，填补了这些岛屿的地质空白，纠正了外国关于我国海区地质构造的一些错误结论。我国海洋地质调查事业迅速发展的事实，对于党内最大的不肯改悔的走资派邓小平散布“今不如昔”、妄图否定文化大革命的谬论，是一个有力的回击。"},{"type":"paragraph","text":"一九六○年，我国海洋地质调查队伍诞生伊始，就遇到了苏修叛徒集团的破坏和刘少奇反革命的修正主义路线的干扰。苏修叛徒集团撕毁合同，已经答应派遣的专家不再派遣，答应供应的设备拒绝供应，妄图卡住我们的脖子，把我国新生的海洋地质调查事业扼死在摇篮里。刘少奇则先是刮“下马”风，继则用“造船不如买船，买船不如租船”的谬论捆住海洋地质战士的手脚，使他们在一个比较长的时间里没有调查船这一从事海洋地质调查的起码条件。广大海洋地质战士与修正主义进行了坚决的斗争，顶住了苏修的压力，抵制了刘少奇的“下马”风，在极端困难的条件下坚持战斗。没有船只，他们利用小木船开展工作；没有仪器设备，就利用陆上的勘探设备自己改装，或者用别的土办法、土设备代替，克服了难以想象的困难，完成了渤海湾的地震地质概查及其他物探方法的试验，划分出主要的地质构造轮廓，初步评价了渤海的含油气远景，为后来进一步开展工作打下了基础。"},{"type":"paragraph","text":"无产阶级文化大革命以来，通过不断批判修正主义路线，我国海洋地质战线广大职工提高了两条路线斗争觉悟，更加自觉地贯彻执行毛主席的无产阶级革命路线，坚持独立自主、自力更生的伟大方针，大大加快了海洋地质工作的步伐。在设计建造我国第一艘海洋地质钻探浮船“勘探一号”的过程中，广大职工批判了脱离我国目前现实条件，贪大求洋的错误思想，使“勘探一号”比原方案提前三年半时间建造成功。批林批孔运动中，海洋地质战士胜利地把“勘探一号”开了出去，在南黄海成功地打了一口石油地质普查井，取得了可贵的收获。与此同时，海洋地质战线的广大工人、干部和技术人员自己动手，三结合搞革新，试验和研制成功多项新技术和新装备。其中地震勘探的震源和电缆，磁法勘探的核子旋进磁力仪等技术装备已经跨入世界先进行列。由于这些成果，现在我国的海洋地质调查工作，已经由文化大革命前只能作地震勘探及其他个别项目的试验，发展到可以作地震、磁法、重力、测探、地层剖面、水样、固体矿产及海底取样等多种方法的综合海洋地质调查；不仅可以作概查，还可以作普查、详查，为钻探提供井位资料；不仅作物探，还胜利地进行了海洋钻探。"},{"type":"paragraph","text":"目前我国使用的绝大多数海洋地质调查仪器设备，都是自己设计制造的。事实再一次生动地证明：无产阶级文化大革命是使我国社会生产力发展的一个强大推动力。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"name":"批林批孔","type":"主题/事件"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fd31d5331b"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
