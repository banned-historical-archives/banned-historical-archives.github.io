" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji12","name":"毛泽东全集第12卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji12.pdf"],"article":{"title":"在抗大对第三期进行总结的干部会议上的讲话","alias":"","parts":[{"type":"paragraph","text":"在抗大对第三期进行总结的"},{"type":"paragraph","text":"干部会议上的讲话1]"},{"type":"paragraph","text":"（1938年5月21日）"},{"type":"paragraph","text":"十年来的战争经验使我们在军事上形成了路线，但见之于文字的却不多。过去对战略比较忽略，现在我们提倡写书，提高战略空气，中央组织部因此也发起抗日战争研究会。军队在军事指挥上应强调单-一的指挥，强调服从，而官兵政治上平等，生活上同艰苦，这就是民主。"},{"type":"paragraph","text":"[1]1938年5月21日，毛泽东出席抗大对第三期进行总结的千部会议并讲话，讲安心当教员、编教材和军队的民主等问题。他说教员是教育干部的干部，下决心当教员，办好抗大，十分重要。他强调要编游击战、战略、战术、政治工作等教材，并说游击战争教材由他负责，战略教材他负担一部分。这是他在大会上讲话的一部分。"}],"authors":["毛泽东"],"dates":[{"year":1938,"month":5,"day":21}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":206,"page_end":206},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f8a14d8a6d"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
