script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"毛主席林副主席接见达达赫总统","authors":[],"dates":[{"year":1967,"month":10,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京二十三日电　我们最最敬爱的伟大领袖毛主席和他的亲密战友林彪副主席，今天上午接见了毛里塔尼亚伊斯兰共和国国家元首莫克塔·乌尔德·达达赫总统，和由他率领的毛里塔尼亚代表团全体成员。"},{"type":"paragraph","text":"接见时，毛主席和林彪副主席同达达赫总统等毛里塔尼亚朋友一一握手，表示欢迎，并同他们一起照了像。"},{"type":"paragraph","text":"随后，毛主席和林彪副主席同达达赫总统以及毛里塔尼亚代表团成员比拉尼·马马杜·瓦尼、艾哈迈德·乌尔德·穆罕默德·萨拉赫、穆罕默德·阿卜杜拉希·乌尔德·埃尔·哈桑、穆罕默德·阿卜杜拉希·乌尔德·哈尔希，进行了亲切友好的谈话。"},{"type":"paragraph","text":"陪同接见的，有中央领导同志周恩来、陈伯达、康生、李富春，以及外交部副部长姬鹏飞。"},{"type":"paragraph","text":"\u003cIMG alt=请插入5号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1967\\10\\67ao010101.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgaut\u003e钱嗣杰\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e我们最最敬爱的伟大领袖毛主席和他的亲密战友林彪副主席，十月二十三日接见了达达赫总统，以及由他率领的毛里塔尼亚代表团全体成员。毛主席、林彪副主席以及周恩来总理等同达达赫总统(前左五)等贵宾合影。　(新华社传真　钱嗣杰　摄)\u003c/FONT\u003e"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"林彪","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fe9098ef7d"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
