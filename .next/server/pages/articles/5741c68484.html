script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"肃清资产阶级的教育观点","authors":["乐敬毅"],"dates":[{"year":1952,"month":3,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编辑同志:“三八”国际妇女节到了，我要以肃清资产阶级的教育观点来纪念这个节日。资产阶级三年来向我们工人阶级进行了猖狂的进攻，他们不仅向国营经济、人民民主政权进攻，而且流毒所及，在我们教育界里也产生了极其恶劣的影响。如像在教学制度和教学设备上，拼命讲究形式，讲究铺张；在教学方法上墨守成规，不研究客观条件，造成理论和实际脱节的现象。在小学教师中间，更有许多同志对本身工作的重要性认识不足，以为地位“低”，收入不多，对工作的热情也因此大为降低——这明明是资产阶级唯利是图、现钱交易的市侩哲学。在抗美援朝、三反、五反斗争的今天，纪念“三八”妇女节，我们小学女教育工作者应该向女志愿军战士、女工、女店员以及其他劳动妇女学习，学习她们爱祖国、爱人民、反对资产阶级的战斗精神，积极参加以三反为中心的思想改造运动，肃清资产阶级思想的残余，为做好人民的教育工作、培养新中国的建设人才而奋斗!"},{"type":"paragraph","text":"五金工会流动分会第二工人子弟小学　乐敬毅"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5741c68484"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
