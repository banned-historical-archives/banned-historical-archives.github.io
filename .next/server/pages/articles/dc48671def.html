" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"在中共河南省委文教部座谈会上发言","authors":["李索开","河南"],"dates":[{"year":1957,"month":5,"day":22}],"is_range_date":false,"parts":[{"text":"在中共河南省委文教部座谈会上发言","type":"title"},{"text":"河南李索开","type":"authors"},{"text":"(李索开：诗人，《奔流》编辑)","type":"subtitle"},{"text":"在政治上应对创作人员重视、关怀，过去是不够重视的。","type":"paragraph"},{"text":"文艺领导是行政式的，剧协成立，要添干部，听说条件有三：一、有一定业务水平；二、有一定服务能力；三、两个字——听话。庄义顺起草的剧协章程里有些规定（后说在记录中有此一说）。","type":"paragraph"},{"text":"我们领导同志，对有些事不够虚心，明明处理错了不是党的事，非说是党的事不可，使人很不舒服，陈局长对别人提出的意见，就不虚心，将个人与党混为一谈，去年文联卫生工作曾受到郑州日报批评，局派任毅科长召集大家开会，嘉季同志叫局长看稿，先将本期内容打个草稿，说一说，就决定一个稿件的取舍，编辑部对这种审稿方式有意见。","type":"paragraph"},{"text":"我在开封宿舍里开收音机，程广说他爱人有病，竟叫小孩告诉我说：不叫我开收音机。","type":"paragraph"},{"text":" （根据记录整理）","type":"paragraph"},{"text":" 来源：《苏金伞右派集团言论与作品》（河南省文学美术工作者联合会，1958年）。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dc48671def"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
