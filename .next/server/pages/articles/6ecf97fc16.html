<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji18","name":"毛泽东全集第18卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji18.pdf"],"article":{"title":"向国民党提出的二十条谈判意见","alias":"","parts":[{"type":"paragraph","text":"向国民党提出的二十条谈判意见"},{"type":"paragraph","text":"（1944年5月15日）必武\"转伯渠同志："},{"type":"paragraph","text":"支、灰、文各电均悉，兹复如下："},{"type":"paragraph","text":"（一）王、张既屡求我方提具体意见，故决提全国者三条，两党者十七条，明日由军政部台发来，请备公函交给王、张。"},{"type":"paragraph","text":"（二）为顾全彼方面子，谈判全文暂勿向外发表，但在判明彼方毫无诚意时，准备向外发表。"},{"type":"paragraph","text":"（三）为避免刺激，王、张所指恢复新四番号及抗敌百分之五十八均未提出。"},{"type":"paragraph","text":"[1]必武，即董必武，当时任中共中央南方局副书记兼宣传部部长、统战部部长。"},{"type":"paragraph","text":"[2]伯渠，即林伯渠，当时任中共中央委员、陕甘宁边区政府主席，抗日战争时期担任中共同国民党谈判的代表，这时正在重庆进行谈判。"},{"type":"paragraph","text":"[3]王，指王世杰（1891一1981)，湖北崇阳人，国民党中央宣传部部长。张，指张治中，国民党政府军事委员会政治部部长。当时他们是参加国"},{"type":"paragraph","text":"（二）请政府承认陕甘宁边区及华北、华中、华南敌后各抗日根据地民选抗日政府为合法的地方政府，并承认其为抗日所需要的各项设施。"},{"type":"paragraph","text":"（三）中共军队防地，抗战期间维持现状，抗战结束后另行商定。"},{"type":"paragraph","text":"（四）请政府在物质上充分援助十八集团军及新四军。自一九四年以来，政府即无颗弹、片药、文钱、粒米之接济，此种状况请予改变。"},{"type":"paragraph","text":"（五）同盟国援助中国之武器弹药、药品、金钱，应请政府公平分配于中国各军，十八集团军及新四军应获得其应得之一份。"},{"type":"paragraph","text":"（六）请政府伤令军政机关撤销对于陕甘宁边区及各抗日根据地的军事封锁与经济封锁。"},{"type":"paragraph","text":"（七）请政府饰令军事机关停止对于华中新四军及广东游击队的军事攻击。"},{"type":"paragraph","text":"（八）请政府通令取消‘奸党’‘奸军’‘奸区’等诬蔑与侮辱共产党、十八集团军、新四军及抗日民主地区的称号。此等诬蔑与侮辱的称号，过去还是暗中流行，近更公开见诸报纸。"},{"type":"paragraph","text":"（九）请政府停止特务人员对于共产党、十八集团军、新四军及抗日民主地区的破坏活动。此种活动，变本加厉，中共获有充分证据，如不停止，妨碍团结实重且大。"},{"type":"paragraph","text":"（十）请政府伤令党政机关释放各地被捕人员，例如皖南事变时被俘的新四军官兵叶挺等，广东的廖承志、张文彬等，新疆的徐"},{"type":"paragraph","text":"[1]同盟国，指第二次世界大战期间共同对德、意、日轴心国作战的杰川、徐梦秋、毛泽民、杨之华、潘同等，四川的罗世文、车耀先、李椿、张少明等，湖北的何彬等，浙江的刘英等，西安的宣侠父、石作祥、李玉海、陈元英、赵祥等。此等人员，均属爱国志士，请予恢复自由，以利抗日。"},{"type":"paragraph","text":"（十一）请政府禁止在报纸、刊物上发表对中共造谣诬蔑的言论，例如西安特务人员谓延安枪毙王实味等数十人，竟伪装王实味等亲友于三月二十九日在西安大开追悼会，在报纸上登载追悼广告与追悼新闻，实则王实味等绝无所谓枪毙情事。似此完全造谣有意诬蔑，应请伤令更正，并制止再有类似此等事情发生。"},{"type":"paragraph","text":"（十二）又据确息，西安一带特务机关，准备于外国记者团到西北时，沿途伪装各种人物与伪造各种证件向外国人告状，借达破坏中共信誉之目的，闻彼辈所捏造之中共罪状共达十余项之多。似此不但妨碍团结，而且有辱国体，请政府予以制止。彼等伪装伪造，发踪指示，奔走布置，中共获有充分证据，如不制止，难免引起不快之后果。"},{"type":"paragraph","text":"（十三）请政府允许中共在全国各地办党办报，中共亦允许国民党在陕甘宁边区及敌后各抗日民主地区办党办报。"},{"type":"paragraph","text":"（十四）请政府停止对重庆中共《新华日报》之无理检查（例如禁登十八集团军及新四军的作战消息，禁登中共文件等），破坏发行，威胁订户，扣压邮寄等情事。"},{"type":"paragraph","text":"（十五）请政府发还在三原被政府军队扣留之英、美援助十八集团军的药品-百零一箱。"},{"type":"paragraph","text":"（十六）请政府允许恢复重庆、西安两处电台，以利通讯。"},{"type":"paragraph","text":"（十七）请政府允许中共代表及十八集团军办事处人员有往来于渝、延间及西、延间之自由，及允许西、渝两办事处人员有在该两地居住与购买生活物品之自由。”"},{"type":"paragraph","text":"以上各条，由你用中共中央代表名义签名，并书明年月日，以书面正式交给王、张。"},{"type":"paragraph","text":"毛泽东辰删"}],"authors":["毛泽东"],"dates":[{"year":1944,"month":5,"day":15}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":443,"page_end":446},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6ecf97fc16"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
