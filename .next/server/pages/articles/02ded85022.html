<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"上海市六万多名中学毕业生坚持上山下乡  深入批邓  铁心务农","authors":[],"dates":[{"year":1976,"month":4,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"上海市六万多名中学毕业生坚持上山下乡"},{"type":"paragraph","text":"深入批邓  铁心务农"},{"type":"paragraph","text":"据新华社上海一九七六年四月二十四日电　在反击右倾翻案风斗争深入发展的大好形势下，上海市有六万五千名应届中学毕业生，以上山下乡的实际行动，回击党内最大的不肯改悔的走资派邓小平诬蔑无产阶级文化大革命、诬蔑社会主义新生事物的修正主义谬论。其中三万多名应届中学毕业生，已在最近意气风发地奔赴黑龙江、吉林、西藏、内蒙古、安徽、江西、云南等地农村和上海郊区，为巩固和发展文化大革命的胜利成果、建设社会主义新农村，开始了新的战斗生活。"},{"type":"paragraph","text":"在这批知识青年即将奔赴农村的前夕，传来了党中央的两项英明决议。知识青年们欢欣鼓舞，他们赶回学校参加集会游行，热情欢呼毛主席革命路线的伟大胜利，愤怒声讨邓小平和制造天安门广场反革命政治事件的一小撮阶级敌人的反动罪行。培光中学毕业生沈卫国、蒋韫伟，四月十日就要奔赴云南农村。从七日晚开始，他们坚持和学校师生一起学习、讨论、写大字报，连续作战，一直到离开上海的前夕。"},{"type":"paragraph","text":"伟大领袖毛主席一九六八年发出“知识青年到农村去”的号召以来，上海已有百万知识青年奔赴祖国各地农村，成为农村三大革命运动中的一支生气勃勃的力量。这次到农村去的六万五千名知识青年，在反击右倾翻案风的斗争中认真学习毛主席的这一教导，更加深刻地认识到知识青年上山下乡运动的伟大意义，决心以实际行动来批判党内不肯改悔的走资派邓小平。许多革命小将豪迈地提出了“立下铁心务农志，回击右倾翻案风”的战斗誓言。他们说，知识青年上山下乡是社会主义的新生事物，是限制资产阶级法权、反修防修的重要战略措施。邓小平否定文化大革命，否定社会主义的新生事物，否定教育革命，妄图颠覆无产阶级专政、复辟资本主义，引诱青年爬精神贵族的小宝塔，我们就是要针锋相对，同修正主义对着干，坚定不移地走毛主席指引的与工农相结合的道路。"},{"type":"paragraph","text":"广大应届中学毕业生立志务农的革命精神，得到了上海市各级党组织的热情支持。在反击右倾翻案风的斗争中，各学校党支部都注意组织知识青年进一步批判“读书做官”、“学而优则仕”等反动思想，树立革命理想。许多学校还请在农村插队落户的知识青年介绍自己参加三大革命运动的收获和体会，举办教育革命展览会，展出本校学生在农村锻炼成长的先进事迹，激励青年一代奔赴农村干革命的豪情壮志。各个学校的应届毕业生纷纷报名、写决心书、倡议书，立志到农村去，到边疆去，到祖国最需要的地方去。上海市第二中学郑蔚、王永进，曾经十几次向学校党支部表决心，给中共上海市委写信，要求到金训华同志战斗过的地方去，踏着英雄的足迹，完成英雄未完成的事业，以实际行动批判邓小平的反革命的修正主义路线。"},{"type":"paragraph","text":"上海广大工人、干部和革命知识分子，自觉限制资产阶级法权，勇于同旧的传统观念决裂，出现了许多坚决送子务农的生动事例。许多革命家长在孩子进中学以后，就经常给他们进行“读书为革命”、“读书为人民”的革命理想教育。反击右倾翻案风的斗争开始后，革命家长们进一步提高了政治觉悟，他们和孩子们一起深入批判修正主义，批判资产阶级，批判剥削阶级的腐朽没落的意识形态孔孟之道，鼓励子女坚持走与工农相结合的道路。"},{"type":"paragraph","text":"三月底，上海市曾为上山下乡知识青年隆重召开欢送大会。革命家长和各条战线的代表，和知识青年们欢聚一堂，热情歌颂毛主席的无产阶级革命路线，歌颂教育革命的伟大胜利，歌颂知识青年上山下乡的丰硕成果，深入批判邓小平反革命的修正主义路线，鼓励知识青年们永远沿着毛主席的革命路线前进，扎根农村，做一个有社会主义觉悟的有文化的劳动者。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"云南文革","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"教育革命","type":"主题/事件"},{"name":"上山下乡","type":"主题/事件"},{"name":"限制资产阶级法权","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"02ded85022"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
