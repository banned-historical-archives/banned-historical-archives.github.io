script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji38","name":"毛泽东全集第38卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji38.pdf"],"article":{"title":"毛泽东等祝贺罗马尼亚人民共和国国庆的电报","alias":"","parts":[{"type":"paragraph","text":"毛泽东等祝贺罗马尼亚人民共和国"},{"type":"paragraph","text":"国庆的电报"},{"type":"paragraph","text":"（1957年8月21日）罗马尼亚人民共和国国民议会主席团主席彼·格罗查同志，罗马尼亚人民共和国部长会议主席基·斯托伊卡同志，罗马尼亚人民共和国外交部长扬·格·毛雷尔同志："},{"type":"paragraph","text":"当罗马尼亚人民共和国国庆十三周年纪念日的时候，我们谨代表中华人民共和国政府和人民向您们，并通过您们向罗马尼亚人民共和国政府和人民致以衷心的热烈的祝贺。"},{"type":"paragraph","text":"中国人民怀着欢欣的心情注视着罗马尼亚人民在罗马尼亚工人党和罗马尼业人民共和国政府的领导下，在发展社会主义经济和文化、提高人民的生活水平和维护世界和平的斗争中所取得的巨大成就。祝兄弟的罗马尼亚人民在建设社会主义和保卫欧洲和世界和平的斗争中获得新的、更大的成就，祝中罗两"},{"type":"paragraph","text":"[1]这是毛泽东以中华人民共和国主席的名义和全国人民代表大会常务委员会委员长刘少奇、国务院总理周恩来联名给罗马尼亚人民共和国国民议会主席团主席彼·格罗查、罗马尼亚人民共和国部长会议主席基·斯托伊卡、罗马尼亚人民共和国外交部长扬·格·毛雷尔的电报。祝贺罗马尼亚人民共和国国庆十三周年。毛泽东全集第三十八卷国人民间的兄弟友谊更加发展和巩固。"},{"type":"paragraph","text":"中华人民共和国主席毛泽东中华人民共和国全国人民代表大会常务委员会委员长刘少奇中华人民共和国国务院总理兼外交部长周恩来一九五七年八月二十一日于北京"}],"authors":["毛泽东"],"dates":[{"year":1957,"month":8,"day":21}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":211,"page_end":212},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6ef10ab879"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
