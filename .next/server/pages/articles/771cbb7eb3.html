script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"人民文学出版社和作家出版社出版一批揭露资产阶级罪恶的作品","authors":[],"dates":[{"year":1965,"month":10,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报北京讯　人民文学出版社和作家出版社今春以来陆续出版了几种揭露资产阶级罪恶和反映工人阶级反抗斗争的小说和报告文学。"},{"type":"paragraph","text":"其中，《文明地狱》、《血染三条石》和最近出版的《天亮之前》，都是以真实生活为原型，用文学手法加工表现出来的中篇小说。"},{"type":"paragraph","text":"《文明地狱》是以解放前天津某毛纺厂为背景，描写这个工厂的资本家从美国搬来一套资本主义的工厂管理制度，对工人进行极其阴险毒辣的残酷剥削。这本书通过工人的悲惨遭遇和反抗斗争，终于撕破了资本家的“文明”画皮。《血染三条石》是以天津一条有名的大街“三条石”为背景，这里解放前是铁工业作坊和小工厂的集中地，干活的都是被骗来当学徒的十多岁的童工。他们一进工厂便失去了自由，在资本家凶残毒辣的剥削和压榨下，大多数熬不到出师就被折磨而死或成为残废。《天亮之前》是以解放战争时期的上海为背景，通过一个包身工出身的纺织女工的成长过程，表现了工人阶级在中国共产党教育下的阶级觉醒，以及他们对资产阶级和国民党反动派的刻骨仇恨。"},{"type":"paragraph","text":"这几本书，由于密切配合了阶级教育，出版后得到了较好的反映，各地许多报刊曾加以连载或选载，有的电台向听众连续广播，在广大工人中问反映强烈。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"天津文革","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"771cbb7eb3"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
