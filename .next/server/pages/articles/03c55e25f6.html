script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"砸烂资产阶级教育制度","authors":["哀祖仁　许采文　李如兰　王文龙"],"dates":[{"year":1966,"month":8,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"砸烂资产阶级教育制度"},{"type":"paragraph","text":"北京化工学院有机系六一级　哀祖仁　许采文　李如兰　王文龙"},{"type":"paragraph","text":"毛主席的伟大指示，象春天的阳光，照亮了我们的心。我们一定要在这场文化大革命中，砸烂资产阶级教育制度。"},{"type":"paragraph","text":"资产阶级知识分子统治我们学校的现象，确实再也不能继续下去了。当我们一跨进北京化工学院的大门，学校就向我们极力鼓吹什么：“北京化工学院是培养高级化工技术人材的高等学府，在大学五年里，要完成工程师的基本训练。”学校搜罗来的一些资产阶级的“教授”“学者”，也向我们传播一套套资产阶级的、严重脱离实际的、从书本到书本的治学之道，用种种框框束缚学生的手脚。化工学院本来是搞化学工业的，学校却叫学生钻书堆，同学们在化工学院念了三年书，还不知道化工厂是什么样子。"},{"type":"paragraph","text":"不但如此，这些资产阶级知识分子还利用讲台千方百计向我们灌输名利思想，腐蚀青年，为他们的资产阶级教育路线服务。旧的大专学校，都强调一个“高”字。什么高等学府，讲的是高深理论，培养高等人材，大肆宣扬高人一等的思想。有一个教师，一次在讲塑料成型曲线的时候，他用手指沿着另一条曲线往上一划，提高嗓子说：“从这里就可以得到高奖金！”看！这些资产阶级知识分子就这样猖狂地用什么高奖金、高薪等物质刺激谬论来腐蚀我们。"},{"type":"paragraph","text":"在他们这种思想的影响下，不少同学中了名利思想的毒，掉进了资产阶级个人主义的泥坑，有个别同学毕业后甚至因为不能达到他个人成名成家的欲望而走上了邪路。"},{"type":"paragraph","text":"资产阶级知识分子统治着我们学校，当然就不会贯彻党的阶级路线。他们总是极力打击、排挤工农学生，其中一条办法就是把“分”当作绞索，套在我们脖子上。许多工农子弟都为过这个“分”关而被迫不问政治，埋头读书。“分”，实际上就成了资产阶级知识分子对工农同学实行专政的一种手段。"},{"type":"paragraph","text":"毛主席说：学制要缩短，教育要革命，资产阶级知识分子统治我们学校的现象，再也不能继续下去了。毛主席的伟大指示，象春天的阳光，照亮了我们的心。毛主席的伟大号召鼓舞了我们向旧世界开火的勇气。我们一定要遵循毛主席的教导，在这场文化大革命中，把资产阶级教育制度砸个稀巴烂。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"03c55e25f6"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
