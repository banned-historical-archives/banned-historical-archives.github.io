script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"周西一中师生狠批修正主义体育路线结合农村特点开展体育活动","authors":[],"dates":[{"year":1972,"month":12,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　南汇县周西公社第一中学党支部，发动革命师生，狠批修正主义体育路线，大力开展群众性体育活动，增强了学生的体质。"},{"type":"paragraph","text":"这个中学的有些同志，过去由于受修正主义体育路线的影响，认为农村学生和城市学生不同，天天参加体力劳动，不需要体育锻炼，而且农村学生体育基础差，体育活动搞不起来。学校党支部针对这些模糊思想，组织师生认真学习毛主席制定的教育方针，狠批刘少奇一类骗子散布的“劳动可以代替体育”以及反动的“天才论”等谬论，使大家认识到，劳动虽然可以锻炼身体，但不能代替体育，只有广泛开展体育活动，才能使学生的身体更好地得到锻炼；有些农村学生体育基础差，并不是他们笨，而是缺乏经常锻炼的结果。通过学习和批判，提高了认识，学校的领导和教师根据农村特点，因地制宜，大力开展群众性体育活动，促进学生德、智、体的全面发展，努力把他们培养成为无产阶级革命事业的接班人。学生们积极参加体育锻炼。许多革命家长，也积极鼓励子女参加体育锻炼。"},{"type":"paragraph","text":"现在，这个中学以田径运动为重点，全面开展了群众性体育活动，学生的身体素质普遍有了提高。在全县中小学田径运动会上，他们两次获得了团体总分第一名。今年上半年，这个学校有六名运动员参加了市中学生田径运动会。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"34f23b8448"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
