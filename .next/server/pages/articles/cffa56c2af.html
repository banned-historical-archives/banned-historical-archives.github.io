script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"各国舆论欢呼刚果（利）人民武装斗争胜利发展  美帝国主义扑灭不了刚果革命火焰  刚果人民识破现代修正主义者是美帝镇压刚果人民的合作者","authors":[],"dates":[{"year":1964,"month":6,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"各国舆论欢呼刚果（利）人民武装斗争胜利发展"},{"type":"paragraph","text":"美帝国主义扑灭不了刚果革命火焰"},{"type":"paragraph","text":"刚果人民识破现代修正主义者是美帝镇压刚果人民的合作者"},{"type":"paragraph","text":"据新华社平壤五日电　朝鲜《劳动新闻》今天发表评论，热烈赞扬刚果（利）人民的爱国武装斗争，并强烈谴责美帝国主义盗用“联合国”的旗帜侵略刚果的罪行。"},{"type":"paragraph","text":"这篇题为《胜利属于战斗的刚果（利）人民》的评论说，美帝国主义不惜利用一切手段，来扼杀刚果（利）人民的独立，妄图把刚果（利）永远变成它的殖民地。但是，它的如意算盘打错了。美帝国主义及其走狗杀害了卢蒙巴、监禁基赞加，都不能使高举民族解放的火炬进行英勇战斗的刚果（利）人民屈服，也扑灭不了刚果（利）人民内心里爱国的、革命的火焰。刚果（利）人民已经认清，美帝国主义是他们的头号敌人，而且充满着斗争到底的决心。"},{"type":"paragraph","text":"据新华社地拉那三日电  阿尔巴尼亚《人民之声报》今天发表题为《刚果人民斗争的新阶段》的评论欢呼刚果（利）人民团结反帝斗争的发展。评论说，四年前卢蒙巴点燃的火把，无论是冲伯雇佣军，还是美帝国主义者或者联合国军队都未能熄灭。爱国力量又迅速集结和组织起来，并最终拿起武器进行反对帝国主义的斗争。刚果人民清楚地知道，美帝国主义是被压迫人民和新独立国家人民的独立和自由的最野蛮的敌人。"},{"type":"paragraph","text":"评论说，在这个斗争的道路上，刚果（利）人民认清了现代修正主义的真面目，认识到它们是美帝国主义镇压刚果解放运动的合作者。刚果人民的爱国力量拿起武器是对现代修正主义者宣扬和帝国主义“和平共处”、帝国主义的本性“已经改变”等荒谬主张的致命回击。"},{"type":"paragraph","text":"据新华社桑给巴尔六日电　最近一期的桑给巴尔《黎明报》发表文章，支持刚果（利）人民的爱国武装斗争，并且指出，刚果人民终将在他们的国土上埋葬新殖民主义，成为自己国家的主人。"},{"type":"paragraph","text":"文章说，刚果人民仍然呻吟在以美国为首的帝国主义枷锁之下。但是这只老虎在人民的巨大力量面前只是一只纸老虎。虽然刚果人民在斗争的道路上还会遇到许多困难，但是最后胜利将属于他们，帝国主义者和殖民主义者是注定要失败的。"},{"type":"paragraph","text":"据新华社大马士革四日电　叙利亚《复兴报》今天发表评论说，刚果（利奥波德维尔）局势的最新发展证明：刚果爱国运动具有巨大的生命力。评论说，虽然刚果民族主义领袖卢蒙巴被杀害了，但是那里的爱国斗争仍然在继续进行。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cffa56c2af"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
