script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"剥削者的哀鸣","authors":["朱林兴","韩国璋"],"dates":[{"year":1973,"month":6,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"上海机械配件工业公司　韩国璋　朱林兴"},{"type":"paragraph","text":"刘少奇一类骗子在他们精心炮制的反革命纲领中，胡说什么要让人民“安居乐业”。这完全是为被打倒的一小撮剥削阶级叫屈，是剥削者垂死的哀鸣，十分明显地表现出他企图改变社会主义制度，颠覆无产阶级专政，复辟资本主义的极右实质。"},{"type":"paragraph","text":"在我们无产阶级专政的社会主义国家，无产阶级和劳动人民早已在政治上、经济上得到翻身解放，成为国家的主人，变成生产资料的主人。无产阶级和劳动人民从来没有象今天这样朝气蓬勃，意气风发。为了巩固无产阶级专政，为了建设社会主义，他们焕发出了无穷的力量和智慧。在毛主席的无产阶级革命路线指引下，仅仅二十多年的时间，我国无产阶级和劳动人民就把一个千疮百孔、贫困落后的旧中国建设成为一个初步繁荣昌盛的社会主义新中国。人民生活安定，越来越好，就如芝麻开花节节高一样。而被打倒的剥削阶级，由于被我们无产阶级专了政，生产资料被剥夺了，这就失去了剥削别人的手段，国他们再也不能在被剥削者的白骨堆上建立起“天堂”了。因此，他们当然感到不“安居乐业”了。显而易见，刘少奇一类骗子在反革命纲领中提出的所谓“安居乐业”，说穿了，就是要“安”地主资产阶级之“居”，“乐”地主资产阶级之“业”，他所说的“人民”只是地、富、反、坏、右的代名词而已，其罪恶目的就是企图把被中国人民打倒的地主资产阶级重新扶植起来，把历史车轮拉向后转。"},{"type":"paragraph","text":"在旧社会，剥削阶级也曾极力宣扬“安其所居，乐其所业”。这完全是一种欺骗。因为在生产资料为剥削者所占有，政权为剥削阶级所把持的情况下，劳动人民既无法“安居”，更无从“乐业”。剥削阶级提出“安居乐业”，只能是一种精神鸦片，起着麻醉人民的作用。当剥削制度被推翻之后，地主资产阶级的代表人物为了复辟剥削制度，恢复失去的“天堂”，又打出“安居乐业”的破旗，这是为被打倒的剥削阶级鸣冤叫屈。资产阶级右派分子向党进攻的时候，就捡起这个口号，攻击社会主义造成了一些人“流离失所”，要共产党给他们以“自由”，让他们“安居乐业”。现在刘少奇一类骗子把这一口号奉若金科玉律，作为自己的“纲领”抛出来，说明了他们是不折不扣的地主资产阶级代表人物，他们和历史上的剥削阶级有着共同的利益，共同的“理想”。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5d3d5c765a"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
