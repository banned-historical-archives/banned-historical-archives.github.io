script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"现代修正主义充当帮凶出卖革命进行反修斗争具有根本重要意义","authors":[],"dates":[{"year":1966,"month":4,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"现代修正主义充当帮凶出卖革命进行反修斗争具有根本重要意义"},{"type":"paragraph","text":"“马克思列宁主义同修正主义的分歧不只是策略的分歧，而且是根本原则的分歧，……"},{"type":"paragraph","text":"“实践证明，修正主义在多米尼加共和国所走的道路是在所有有关反帝斗争、群众运动、无产阶级要求和反动派需要的问题上从投降到背叛。"},{"type":"paragraph","text":"“现代修正主义是全世界各国革命运动的敌人，帝国主义和反动派的主要盟友，他们打入革命力量内部，特别是国际工人运动当中。"},{"type":"paragraph","text":"“在群众和无产阶级运动内部，反对人民社会党的修正主义影响，对多米尼加革命运动的发展，具有根本的重要意义。”"},{"type":"paragraph","text":"——多米尼加人民运动第一次预备代表大会决议"},{"type":"paragraph","text":"“宣传活命哲学的人不相信人民群众，他们是帝国主义战争讹诈政策的错误的义务保卫者。”——多米尼加《六月十四日报》"},{"type":"paragraph","text":"“他们夸大帝国主义的力量，把它说成好象是不可战胜的，他们要求武装的人民在帝国主义面前变节。他们不是向人民指出战胜帝国主义的办法，而是指出在帝国主义面前跪着活下去的办法。在帝国主义企图通过美洲国家组织来解除人民武装时，修正主义者宣扬武装的人民在‘美国军事优势’面前无能为力的论调。"},{"type":"paragraph","text":"“反对不重视修正主义，而只重视帝国主义和反动派的错误倾向。不反对内部敌人，就不可能打败外部敌人。”"},{"type":"paragraph","text":"“苏联修正主义集团没有履行无产阶级国际主义的义务，因为它实际上没有做任何事来迫使帝国主义把它的军队撤离多米尼加共和国。苏联修正主义者通过它的消极态度和‘停火’充当美国的帮凶，这种‘停火’正是承认美国佬为多米尼加冲突的一方，而多米尼加共和国根本没有同美国宣战，也没有对它进行过任何侵略行动。”"},{"type":"paragraph","text":"——多米尼加人民运动机关报《自由报》"},{"type":"paragraph","text":"“美帝国主义除了武装干涉之外，现在又企图用联合国的幌子，解除人民武装。苏联政府同意美帝国主义用联合国名义来干涉多米尼加的作法，是一种出卖行为。人民对这种情况已经看得越来越清楚。”"},{"type":"paragraph","text":"——多米尼加代表马克西姆·莫利纳在"},{"type":"paragraph","text":"第十一届禁止原子弹氢弹世界大会上发言"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a7442a7935"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
