<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"太原建筑业中残存封建制度  层层转包剥削工人","authors":["丁成名"],"dates":[{"year":1951,"month":2,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"太原建筑业中残存封建制度"},{"type":"paragraph","text":"层层转包剥削工人"},{"type":"paragraph","text":"太原市建筑业中由于残留着层层转包工程和封建把头制度，工人遭受到种种的残酷剥削，国家建设和人民财产也受到很大的损失。因此，去年一年内发生争议达三百件之多。"},{"type":"paragraph","text":"本市大部建筑公司单纯营利观点极为浓厚，只要工程转包出去，任务就算完成。部分行政负责干部对于包工头的封建剥削及其对生产的阻碍认识不足，不是依靠工人群众而是依靠工头。建筑公司包揽到工程后，不是招工备料，管理经营；而是抽取一部非法利润后，原盘转包他人。如新中土木建筑公司由水利局包到两千方石子工程，每方工价一百五十斤小米，该公司又以每方一百三十五斤十二两包给了工头李宜敏，李又以每方一百二十二斤三两包给小工头刘子明。大华建筑公司以每方土五斤小米包到水利局在清源县的引河工程，经过四次转包后，到工人手里每方土就成了二斤十二两。此类事实不胜枚举。"},{"type":"paragraph","text":"太原市人民政府虽于去年六月间颁布了“太原市公私建筑工程放工包工管理及劳动争议处理暂行办法”，严禁转包行为。但各公私厂商仍照旧暗中进行转包工程。有的公营公司把工程转包给私营厂商，就临时给加上“工程队”的名义；包工头也多改变了包工方法，几个工头合股包工，声称是劳动组合的劳合班，其实仍旧是换汤不换药的封建剥削行为。"},{"type":"paragraph","text":"由于层层转包，致使工程无人负责，偷工减料，粗制滥造，国家建设受到损失。建筑工会根据广大工人要求，组织和领导工人坚决的向封建把头及非法厂商作斗争，在政府的支持下，罪恶较大的把头张连生、唐永贵、李振生已送法院惩办，违法投机厂商，华兴、华新、新晋、利民、自成荣、同成等已被政府取缔。"},{"type":"paragraph","text":"为彻底废除建筑工业中的封建剥削制，市建筑工会一月份开始举办了基层干部轮训班，以加强基层组织力量；太原市人民政府也召集了公私厂商负责人会议，并改选了同业公会。现公营太原、新生建筑公司工人及私营大业、华泰等建筑公司及厂商，均计划今年固定一部长期工人，与工人发生直接的经营关系，实行计件工资等办法，废除中间剥削，建立新制度。"},{"type":"paragraph","text":"丁成名"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e3ef53fc4a"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
