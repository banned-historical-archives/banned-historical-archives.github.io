" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoistlegacy.de-5502","name":"华北人民政府解散所有会门道门封建迷信组织的布告","author":"华北人民政府","internal":false,"official":false,"type":"unknown","files":[],"article":{"title":"华北人民政府解散所有会门道门封建迷信组织的布告","dates":[{"year":1949,"month":1,"day":4}],"is_range_date":false,"authors":["华北人民政府"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"最高人民法院刑事审判第二庭, 刑事申诉工作手册, 522-523","tags":[{"name":"迷信","type":"主题/事件"}],"parts":[{"type":"paragraph","text":"华北人民政府"},{"type":"title","text":"解散所有会门道门封建迷信组织的布告"},{"type":"subtitle","text":"秘总字第二号  一九四九年一月四日"},{"type":"paragraph","text":"查会门道门不仅为封建迷信组织，且常为反动分子操纵利用，以进行各种反革命活动。在过去抗日战争中及目前解放战争中，都曾发生破坏作用，例如充当敌探、刺探军情、散播谣言、煽惑人心，甚至组织武装暴动，扰乱社会治安，迭经各地公安机关破获有案。若任其存在与发展，则对革命事业与人民利益必将大有损害。本府为保障人民利益、维护社会治安，并挽救一般误入歧途的会员群众及予首要分子以自救自新之路，特规定取缔办法如下："},{"type":"paragraph","text":"一、自布告之日起，所有会门道门组织，应即一律解散，不得再有任何活动。"},{"type":"paragraph","text":"二、所有会门道门的首要分子，应即向当地县市政府所属公安机关进行登记。其曾与匪特勾结或犯罪行为者，如能悔过自新，当予以宽大处理；若抗不登记，继续活动，一经查明，定予严惩。其未与匪特联系，亦未有犯罪行为者，只要履行登记，停止活动，即予免究。"},{"type":"paragraph","text":"三、所有被胁迫或被诱骗而参加会门道门的一般会员群众，一经脱离组织，停止活动，即一律不予追究。其能揭发匪特奸谋及各种破坏活动者，并酌情予以奖励。"},{"type":"paragraph","text":"以上办法，旨在保障人民利益，维护社会治安，挽救一般误入歧途之会员群众免遭祸害，并予极少数首要分子以自救自新之机会。希各界人民，共体此旨，本治病救人方针，用说服劝告方法，群众群力，贯彻实行。务望慎防破坏分子之制造谣言乘机破坏。并希不滥施斗争，以免别生枝节，予奸特以鼓煽之隙。切切"},{"type":"paragraph","text":"此布"}],"alias":""},"tags":[{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e439ccd1ce"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
