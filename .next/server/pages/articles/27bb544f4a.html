<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共中央书记处关于狠抓钢铁生产的通知","authors":[],"dates":[{"year":1960,"month":10,"day":8}],"is_range_date":false,"parts":[{"text":"中共中央书记处关于狠抓钢铁生产的通知","type":"title"},{"text":"各中央局，各省、市、区党委，并经委、冶金部、煤炭部、铁道部党组：","type":"appellation"},{"text":"自中央发出保粮、保钢指示后，钢铁日产水平上升还慢，八月平均日产四点一万吨，九月平均日产五点一万吨。到九月底，全国产钢一千二百九十万吨。","type":"paragraph"},{"text":"必须指出，目前全国钢铁生产形势是很严重的。如按公布的一千八百四十万吨钢来计算，从十月一日起，每日必须生产六万吨才能达到。按中央最近指示保证完成一千九百万吨到一千九百五十万吨钢，从十月一日起日产水平必须达到六点六万吨到七万吨。可是日产水平从九月，十日到现在一直在五万吨到五点五万吨上下波动。因此，到目前为止，从日产水平上看，公布的一千八百四十万吨钢尚未过关。","type":"paragraph"},{"text":"再从重点企业和各省市两方面形势来看：","type":"paragraph"},{"text":"按一千八百四十万吨钢计算，各省市（包括中央各部产量）应完成三百七十万吨钢，到九月末完成了二百三十八万吨，尚差一百三十二万吨。从十月一日起必须日产一点四五万吨，但从九月到现在一直就在九千吨到九千五百吨左右，每日亏五千吨。为了完成一千九百万吨到一千九百五十万吨钢，就更需要各省再提高生产水平。","type":"paragraph"},{"text":"重点企业按一千八百四十万吨钢计算，应完成一千四百七十二万吨，到九月末完成了一千零五十二万吨，尚差四百二十万吨。今后日产水平必须在四点六万吨，从九月到现在各重点企业的日产水平一直维持在四点二至四点三万吨左右，直到十月的头两天才达到四点五万吨左右。问题更严重的是为了保证一千九百万吨到一千九百五十万吨钢，各重点企业必须比公布的一千八百四十万吨，多生产五十万到一百万吨钢，因此日产水平从现在起就需要达到五万到五点五万吨。这与目前实际达到的水平，显然也有很大距离。","type":"paragraph"},{"text":"我们认为，如果生产不在十月半左右突破六万吨以上，则今后的形势，将更十分严重，因为全国的钢铁生产能力是有一定的限度的，即使各种条件（如煤炭、运输、矿石及其他辅助原料、机修、劳动力等）具备了，群众运动搞得很好了，钢的生产能力（日产水平）最多是七万吨左右，铁的生产能力（日产水平）最多是十万吨左右。如果在最短时间内钢的日产水平还上不去，以后即使有这些条件，也将因为缺乏钢铁生产能力，而完不成计划。","type":"paragraph"},{"text":"我们提出这样一个严重问题，请同志们注意，机不可失，时不再来。因此，除责成冶金部党组切实抓紧具体措施以外，请各省委第一书记和工业书记，无论如何把钢铁生产狠狠抓几次，摸清形势，依靠群众，进行具体安排，采取积极措施，快一些把生产水平提上来。","type":"paragraph"},{"text":" 中央书记处一九六O年十月八日","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"27bb544f4a"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
