script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"缅甸成立缅阿友协筹委会  支持阿尔巴尼亚人民反帝、反修正主义斗争","authors":[],"dates":[{"year":1961,"month":11,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"缅甸成立缅阿友协筹委会"},{"type":"paragraph","text":"支持阿尔巴尼亚人民反帝、反修正主义斗争"},{"type":"paragraph","text":"新华社仰光28日电　缅甸—阿尔巴尼亚友好协会筹备委员会今天在这里正式成立。"},{"type":"paragraph","text":"缅甸工人、学生、作家、新闻工作者和艺术界人士的代表一百五十多人出席了这个筹备委员会成立仪式。"},{"type":"paragraph","text":"缅甸著名作家巴莫丁昂在成立仪式上作了关于阿尔巴尼亚人民反对帝国主义、修正主义和捍卫世界和平以及建设社会主义的斗争的报告。"},{"type":"paragraph","text":"缅甸—阿尔巴尼亚友好协会（筹备委员会）还发表声明，说明成立这个协会的重要意义。"},{"type":"paragraph","text":"声明说，“目前，阿尔巴尼亚政府和人民正在极端困难的条件下建设社会主义，因为美帝国主义和现代修正主义分子，特别是南斯拉夫的铁托集团正在疯狂地对阿尔巴尼亚进行破坏活动。”"},{"type":"paragraph","text":"声明指出，“在第二次世界大战以前，阿尔巴尼亚是一个非常落后的封建国家。在第二次世界大战期间，阿尔巴尼亚人民在阿尔巴尼亚劳动党领导下击败了法西斯侵略并获得独立。随后，阿尔巴尼亚人民在阿尔巴尼亚劳动党领导下胜利地建设社会主义。”"},{"type":"paragraph","text":"声明强调说，“缅甸人民一向支持和坚决同情阿尔巴尼亚人民反对帝国主义、修正主义和建设社会主义的斗争。今天，缅甸—阿尔巴尼亚友好协会（筹备委员会）的成立是为了使缅甸人民能够在保卫世界和平和反对帝国主义与修正主义的斗争中和阿尔巴尼亚人民加强合作。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9f111f04fb"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
