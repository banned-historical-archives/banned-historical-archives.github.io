script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"武城检查土改不彻底原因　清算右倾领导思想","authors":[],"dates":[{"year":1947,"month":8,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"武城检查土改不彻底原因"},{"type":"paragraph","text":"清算右倾领导思想"},{"type":"paragraph","text":"【本报冀南二十五日电】武城检查发现去冬今春之土地改革运动，尚系“夹生饭”，浮财大部未动，百分之七十地主，仍保持地主生活；从政治上看，地主并未斗得低头，还不断向群众进攻，以金钱美女收买干部、积极分子，或假积极忧抗，借此拉拢军属，挑拨干群关系。贫农向其借取东西时，他们说风凉话：“你们翻身啦，还向我借东西？”再就是隐蔽原形，辞退雇佃，改雇短工，分家，降低成份，或钻进各种组织，暗掌统治权。据六十八村统计，九七五个村干中，有地主二三个，富农二七个，中农四四六个，赤贫农仅四七九个。由于地主未消灭，贫要求未满足，故贫农说：“翻身哩，不向人家（指地主）借取还是不行！”检查夹生原因，主要是领导思想右倾，划出圈子，规定给地主留生活，过分强调照顾军属地主，因而当贫农要求将地主扫地出门时，我们不予批准；再加未树立贫骨干，当权者中农占一半，故便斗争不彻底。"},{"type":"paragraph","text":"【本报冀南二十五日电】景县三区郝庄，七十三户，分前刘、后刘、东郝三家族，后刘以刘秉奇为首统治全村。他家在事变后尚有土地三顷多，现任司帐员，掌握村政。东郝以郝立枝为首，历任伪保长伪村长，现仍当村长，贪污村款发财。去年群运时，为逃避群众清算，这两种封建势力便勾结起来，利用家族关系，制造矛盾，转移目标。郝立枝掌握前刘农会主任刘洪草，因农会丢一个包袱，诬说后刘贫农刘金富等偷去，处罚了十一户贫农；后来刘洪章组织妇会时，前刘地主又造谣洪章搞女人，后刘地主即乘机挑拨全村叫来本村参加×团的战士，打前刘的群众。郝庄群众在他们的愚弄下，互相结下了深仇大恨。翻身队到此深入了解真实情况后，把五个地主及郝立枝弟兄三人，都扣了起来，根据具体事实深入小组酝酿，从互相对面诉苦对证中，大家认识不团结是地主造成的，群众仇恨的锋芒，转向了地主，展开诉苦斗争，地主郝立枝的威风被打垮了，决议将奸霸地主扫地出门，东西全部归农会。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bce514b1bc"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
