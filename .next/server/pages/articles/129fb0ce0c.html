<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"d4ea93d0-aee6-435e-bd9c-5020dfb6fc0d","name":"斯大林选集（诸夏怀斯社2017年5月）","internal":false,"official":false,"type":"pdf","author":"斯大林，诸夏怀斯社2017年5月","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives5/main/d4ea93d0-aee6-435e-bd9c-5020dfb6fc0d.pdf"],"article":{"title":"更紧密地团结起来","alias":"","parts":[{"type":"paragraph","text":"更紧密地团结起来"},{"type":"paragraph","text":"（一九一七年七月十五日）"},{"type":"paragraph","text":"七月三日和四日的事变是国内总危机所引起的。战争旷日持久，全国疲惫不堪，物价空前高涨，人民半饥半饱，反革命气焰上升，经济破坏日益加剧，前线团队纷纷被解散，土地问题迟迟没有解决，国家疮满目，临时政府无力使国家摆脱危机，一一这就是促使群众在七月三日和四日走上街头的原因。"},{"type":"paragraph","text":"如果把这次发动说成是某个政党恶意煽动起来的，那就是暗探的观点，因为暗探总喜欢把一切群众运动说成是由于“煽动者”和“挑拨者”的指使而发生的。"},{"type":"paragraph","text":"任何一个政党(包括布尔什维克在内)都没有号召群众在七月三日举行发动。不仅如此，彼得格勒最有威信的布尔什维克党在七月三日还号召工人和士兵不要举行发动。可是当运动终于爆发起来的时候，我们党认为自己没有权利袖手旁观，于是尽一切可能使运动具有和平的和有组织的性质。"},{"type":"paragraph","text":"但是，反革命并没有打瞌睡。他们组织了挑性的射击，用流血事件给游行示威的日子罩上一层阴霾，并依靠从前线调来的一些部队向革命发动进攻。反革命的核心立宪民主党好像早就料到这一切，事先退出了政府，取得了行动的自由。而执行委员会中的孟什维克和社会革命党人想保持已经动摇的阵地，于是背信弃义地把争取全部政权归苏维埃的游行示威宣布为反苏维埃的暴动，唆使从前线调来的部队中的落后部分进攻革命的彼得格勒。他们被派别的狂热冲昏了头脑，竟没有看到他们打击革命的工人和士兵也就是削弱整个革命阵线，鼓舞反革命。"},{"type":"paragraph","text":"结果，反革命势力猖起来，军事专政建立了。"},{"type":"paragraph","text":"捣毁“真理报”报馆和“士兵真理报”报馆，捣毁“劳动”印刷所和我们的区组织，殴打和杀害，不经审判进行逮捕和一系列“擅自进行的”追害，下贱的密探卑鄙地污蔑我党领袖和被收买的报纸的耍笔秆的强盗为非作夕，解除革命工人的武装和解散团队，恢复死刑，一这就是军事专政的“工作”。"},{"type":"paragraph","text":"这一切都是在“挽救革命”的幌子下遵照全俄执行委员会所支持的克伦斯基一策烈铁里“内阁”的“命令”干出来的。同时，被军事专政吓倒的执政党一一社会革命党和孟什维克党，竟欣然把无产阶级政党的领袖出卖给革命的敌人，庇护捣毁行为和横暴行为，不制止“擅自进行的”追害。"},{"type":"paragraph","text":"在执行委员会的公开纵容下，临时政府和反革命的大本营立宪民主党成立了默契，以反对彼得格勒的革命工人和士兵，一一目前的情况就是这样。"},{"type":"paragraph","text":"执政党愈让步，反革命分子就愈狂妄。他们已经从进攻布尔什维克转到进攻所有参加苏维埃的政党和苏维埃本身。他们捣毁彼得格勒区的和奥赫塔的孟什维克区组织，捣毁涅瓦关卡外的五金工会分会。他们闯进彼得格勒苏维埃的会场，并逮捕苏维埃代表（萨哈罗夫代表）。他们在涅瓦大街组织特别队来逮捕执行委员会委员。他们肯定地说要解散执行委员会。至于他们“阴谋”道害临时政府的某些阁员和执行委员会的首领，我们就更不用说了。"},{"type":"paragraph","text":"反革命分子的狂妄性及其行动的挑畔性正在与时俱增。而临时政府却继续解除革命工人和士兵的武装来“挽救革命”···"},{"type":"paragraph","text":"所有这一切加上国内发展着的危机，加上饥荒、破坏、战争以及和战争有关的意外事件，就使形势更加紧张起来，使新的政治危机成为不可避免。"},{"type":"paragraph","text":"做好准备，迎接即将来临的战斗，切实地有组织地迎接这些搏斗，"},{"type":"paragraph","text":"这就是我们今天的任务。因此："},{"type":"paragraph","text":"第一个训条就是不接受反革命分子的挑畔，要具有坚韧沉着的精神，养精蓄锐，迎接即将来临的斗争，不许举行任何为时过早的发动。"},{"type":"paragraph","text":"第二个训条就是要更紧密地团结在我们党的周围，更紧密地团结起来对付向我们进攻的无数敌人，把旗帜高高举起，鼓励不坚强的人带动落后的人，启发不觉悟的人。"},{"type":"paragraph","text":"决不和反革命妥协！"},{"type":"paragraph","text":"决不和充当狱卒的“社会主义者”联合。"},{"type":"paragraph","text":"革命分子联合起来反对反革命及其庇护者，一一这就是我们的口号。载于一九一七年七月十五日"},{"type":"paragraph","text":"选自新编《斯大林全集》“无产阶级事业报”（喀琅施塔得)第二号"},{"type":"paragraph","text":"第3卷第80—82页署名：俄国社会民主工党中央委员会委员科·斯大林"}],"authors":["斯大林"],"dates":[{"year":1917,"month":7,"day":15}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":321,"page_end":323},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"129fb0ce0c"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
