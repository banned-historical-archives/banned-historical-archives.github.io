script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"美机长期搜集社会主义国家情报  美国资产阶级报刊供认真象","authors":[],"dates":[{"year":1962,"month":9,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"美机长期搜集社会主义国家情报"},{"type":"paragraph","text":"美国资产阶级报刊供认真象"},{"type":"paragraph","text":"新华社13日讯　美国国务院发言人里普在为美制蒋匪帮U—2飞机窜扰中国大陆搜集情报而被击落的事件进行百般狡辩抵赖之后，昨天又在记者招待会上说什么中国方面所指出的美国在这一事件中的无容逃避的罪责“只不过是中国共产党人的宣传”。"},{"type":"paragraph","text":"但是，美国资产阶级报刊却透露了美国飞机长期以来在社会主义国家周围附近和上空进行搜集情报的真象。"},{"type":"paragraph","text":"《基督教科学箴言报》在发自华盛顿的一篇报道中指出，美国用来“在共产党集团领土上空搜集电子、红外线和摄影情报的工具不仅是U—2飞机。十五年来，像B—47、B—52和海洋巡逻飞机等这样一些飞机，都曾在苏联和它的盟国的周围附近和上空进行过搜集情报的飞行。光是在中国和苏联的太平洋沿海，就一直在不断地侦察。”"},{"type":"paragraph","text":"《华盛顿邮报》11日发表社论指出，这次被中国击落的“那架U—2飞机不是第一架飞入共产党军队所占有的领空的侦察飞机。同样可以保险地说，过去所使用的飞机大概也是美国制造的。”"},{"type":"paragraph","text":"美联社记者戴维斯在一篇报道中说，美国国务院在“颁发出口许可证允许把U—2飞机出售并运给蒋介石之前，是完全知道国民党中国将怎样使用这种涡轮发动机高空飞机的”，国民党所搜集的情报已经同美国进行交换。现在“没有迹象表明美国或国民党中国（指蒋介石匪帮）已经下令停止对共产党中国的高空侦察飞行。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"58124424cf"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
