script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji33","name":"毛泽东全集第33卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji33.pdf"],"article":{"title":"给邹普勋、谭熙春、毛锡臣的信","alias":"","parts":[{"type":"paragraph","text":"给邹普勋、谭熙春、毛锡臣的信"},{"type":"paragraph","text":"（1953年10月29日）邹普勋、谭熙春、毛锡臣同志："},{"type":"paragraph","text":"你们三位的信都收到了。熙春、锡臣（龙头山的）想来北京一次，普勋想再来北京一次，我想可以。现天气已冷，可在明年开春（阴历三月间）来，如果你们愿意早来，亦可在阳历十二月中旬来。由你们三人结伴同行，自己出路费，路上买车票等事亦由自己经理。到京住一个月即回家。如果你们同意，即可照这样办。"},{"type":"paragraph","text":"此外，我弟毛泽连（东茅塘的）要求来京治眼病，请邹普勋兄告诉他，亦可同来。除你们四人之外，别人都不要来。如有不得许可，自己来的，不便招待。锡臣、熙春二位不另复，即请普勋兄转致。此问近安"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十月廿九日"},{"type":"paragraph","text":"[1]邹普勋，毛泽东少年时的私垫同学和邻居。谭熙春，早年和毛泽东在安源搞过工人运动。毛锡臣，毛泽东的叔祖父。"},{"type":"paragraph","text":"[2]毛泽连，毛泽东的堂弟。"}],"authors":["毛泽东"],"dates":[{"year":1953,"month":10,"day":29}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":419,"page_end":419},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"94d814ada1"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
