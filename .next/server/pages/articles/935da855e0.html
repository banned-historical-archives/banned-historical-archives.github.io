" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji31","name":"毛泽东全集第31卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji31.pdf"],"article":{"title":"关于中央各部在三反中应指导下级的打虎工作与业务工作的批语","alias":"","parts":[{"type":"paragraph","text":"关于感谢苏联专家对鞍钢建设的援助"},{"type":"paragraph","text":"复高岗电"},{"type":"paragraph","text":"（1952年3月4日）高岗同志："},{"type":"paragraph","text":"二月二十八日电悉。拟侯陈云同志回后，就苏联冶金设计院长对鞍钢的恢复与改建的设计工作的成就，以我名义电斯大林同志致谢。对设计院长赫列波尼可夫同志本人，拟由政务院送给感谢状一纸，如其很快回国，则此感谢状将另行补去。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一九五二年三月四日[1]高岗，当时任中共中央东北局书记、东北人民政府主席。"},{"type":"paragraph","text":"[2]指高岗1952年2月28日关于是否以毛泽东名义对参加鞍钢设计与改建的苏联冶金设计院院长给予奖励或致电感谢斯大林问题给毛泽东的报告。"},{"type":"paragraph","text":"[3]陈云，当时任政务院副总理兼财政经济委员会主任。"}],"authors":["毛泽东"],"dates":[{"year":1952,"month":3,"day":4}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":470,"page_end":470},"tags":[{"name":"毛泽东","type":"人物"},{"name":"陈云","type":"人物"},{"name":"高岗","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"935da855e0"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
