" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共北京市委《关于撤销各大专院校工作组的决定》","authors":[],"dates":[{"year":1966,"month":7,"day":28}],"is_range_date":false,"parts":[{"text":"中共北京市委关于撤销各大专院校工作组的决定","type":"title"},{"text":"根据中共中央的指示，为了更好地放手发动群众，依靠革命师生的高度革命热情和自觉性，更有力地斗垮走资本主义道路的当权派，批判反动的学术权威，改组教育制度和教学方针方法，目前所采取的大专院校派工作组的办法，经验证明，已不适应上述的革命要求。因此，决定撤销各大专院校的工作组。在工作组撤销之后，大专院校的文化大革命，由全校师生员工分别选举，成立各级文化革命的群众组织。","type":"paragraph"},{"text":"各大专院校应在统一的会场，召开全校师生员工大会，宣布这个决定。","type":"paragraph"},{"text":"根据各校的具体情况，由本校各单位提名，成立临时委员会或筹备委员会，负责筹备全校文化革命委员会的选举工作。","type":"paragraph"},{"text":"宣布上述决定后，上级派到各校的工作组应在该校集中学习，听取群众意见；有的因工作需要，可以离校，文化革命委员会要他们全组或其中成员回校的时候，可以随时回去。","type":"paragraph"},{"text":"这个决定也适用于中等学校。","type":"paragraph"}],"comments":[],"origin":"根据群众组织传单打印，翻印者未注明","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"146f0ca4c3"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
