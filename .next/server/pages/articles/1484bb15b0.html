script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"毛主席庄严声明是对红卫兵的最高命令红卫兵代表戴德慈在首都人民支持世界人民反对美帝国主义斗争大会上的讲话","authors":[],"dates":[{"year":1970,"month":5,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京二十一日电　首都红卫兵代表、清华大学红卫兵戴德慈在首都人民支持世界人民反对美帝国主义斗争大会上的讲话，全文如下:"},{"type":"paragraph","text":"同志们:"},{"type":"paragraph","text":"我们首都红卫兵小将，最坚决地拥护我们的伟大统帅毛主席支持世界人民反对美帝国主义斗争的庄严声明。毛主席的伟大声音表达了七亿中国人民和全世界人民反对美帝国主义的战斗意志，表达了全世界人民团结起来打败美国侵略者及其一切走狗的坚强决心。毛主席的庄严声明，大长了全世界革命人民的志气，大灭了美帝国主义及其走狗的威风。这一伟大的战斗号召，必将大大推动全世界人民反对美帝国主义及其一切走狗的革命斗争。"},{"type":"paragraph","text":"美帝国主义是全世界人民最凶恶的敌人，是双手沾满世界人民鲜血的大刽子手，欠下了世界人民一笔又一笔的血债。最近，尼克松政府阴谋策动朗诺-施里玛达集团的反动政变，疯狂地派遣美国军队和南越雇佣军入侵柬埔寨，扩大对印度支那的侵略战争，对亚洲人民和全世界人民犯下了新的滔天罪行。美帝国主义在国外到处进行疯狂侵略，在国内实行法西斯统治，残酷镇压美国学生运动和美国人民的革命斗争，屠杀本国的黑人和白人。美帝国主义做尽了坏事，全世界一切受压迫的人民包括美国人民决不会饶恕他们。"},{"type":"paragraph","text":"伟大领袖毛主席教导我们:“捣乱，失败，再捣乱，再失败，直至灭亡——这就是帝国主义和世界上一切反动派对待人民事业的逻辑，他们决不会违背这个逻辑的。”美帝国主义的战争冒险决不表示他们强大，这是他们的垂死挣扎。套在他们脖子上的绞索，越拉越紧。他们已经淹没在人民战争的汪洋大海之中，离彻底灭亡的日子已经不远了。"},{"type":"paragraph","text":"我们红卫兵小将无限忠于伟大领袖毛主席。毛主席的庄严声明就是对我们的最高命令。我们的心永远同全世界人民紧紧地连在一起。我们遵照伟大领袖毛主席的教导，誓作印度支那三国人民的坚强后盾，坚决支持柬埔寨和印度支那各国人民的抗美救国战争，坚决支持美国人民反对尼克松政府的革命斗争，坚决支持全世界人民反对美帝国主义的正义斗争!我们决心永远和全世界革命人民团结在一起，战斗在一起，胜利在一起!"},{"type":"paragraph","text":"我们红卫兵小将，经过无产阶级文化大革命，锻炼得更加坚强。我们决心紧跟毛主席的伟大战略部署，全面落实“九大”提出的各项战斗任务，以实际行动支援印度支那三国人民和世界人民反对美帝国主义的正义斗争。"},{"type":"paragraph","text":"坚决拥护伟大领袖毛主席支持世界人民反对美帝国主义斗争的庄严声明!"},{"type":"paragraph","text":"热烈祝贺以柬埔寨国家元首西哈努克亲王为首的柬埔寨民族统一阵线成立!"},{"type":"paragraph","text":"热烈祝贺柬埔寨王国民族团结政府成立!坚决反对朗诺-施里玛达亲美卖国集团!"},{"type":"paragraph","text":"坚决支持印度支那三国人民的抗美救国战争!"},{"type":"paragraph","text":"全世界人民团结起来，打败美国侵略者及其一切走狗!"},{"type":"paragraph","text":"无产阶级文化大革命胜利万岁!"},{"type":"paragraph","text":"中国共产党万岁!"},{"type":"paragraph","text":"马克思主义、列宁主义、毛泽东思想万岁!"},{"type":"paragraph","text":"伟大领袖毛主席万岁!万岁!万万岁!"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"人民战争","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"发言"},{"type":"文稿类型","name":"宣言"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1484bb15b0"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
