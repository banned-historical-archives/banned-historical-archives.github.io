script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"坚持反美和反对现代修正主义斗争","authors":[],"dates":[{"year":1964,"month":9,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"日共总书记宫本显治阐述日共反对修正主义立场"},{"type":"paragraph","text":"坚持反美和反对现代修正主义斗争"},{"type":"paragraph","text":"艾地主席指出：现代修正主义者在理论和实践方面，都已破产；印度尼西亚共产党和日本共产党的观点和立场没有分歧"},{"type":"paragraph","text":"新华社雅加达四日电　据《人民日报》今天报道，日本共产党总书记宫本显治昨天访问了这里的“阿里亚哈姆”社会科学学院，并发表了一篇题为《反对现代修正主义的斗争和日本共产党对现代修正主义的立场》的讲话。"},{"type":"paragraph","text":"印度尼西亚共产党主席艾地在会上致欢迎词。他说：“日本共产党是一个真正的马克思列宁主义政党。印度尼西亚共产党和日本共产党在马克思列宁主义的观点和立场上没有分歧。”"},{"type":"paragraph","text":"艾地说：“在两党之间至少有五个共同点：第一，它们都是马克思列宁主义的政党；第二，它们都坚决对美帝国主义作斗争；第三，它们都对现代修正主义作斗争；第四，它们都是有许多干部和党员群众的党，这就是说，它们有许多的党员，它们不倦地以马克思列宁主义的理论和精神教育干部，热情而英勇地领导革命群众进行斗争；第五，它们都在努力进一步同农民打成一片。”"},{"type":"paragraph","text":"宫本登上讲台时受到了热烈的欢迎。他说：“日本共产党和日本人民正在从事反对美帝国主义、日本垄断资本家的斗争；也在国内和国际共产主义运动内部进行反对现代修正主义的斗争。日本共产党非常感谢印度尼西亚共产党对日本共产党粉碎志贺—铃木修正主义集团的斗争所给予的有力支持。”"},{"type":"paragraph","text":"宫本详细介绍了日本共产党中央委员会最近给苏联共产党中央委员会的信件的内容。他说，日本共产党在这封信里坦率地阐明了日本共产党和苏联共产党之间的关系以及两党在一些理论和策略问题上的分歧。他说，这封信是由日本共产党中央委员会最近一次全体会议一致通过的。"},{"type":"paragraph","text":"宫本说：“亚洲、非洲和拉丁美洲的实际形势已经证明，修正主义者的理论是错误的。这些地区的实际形势同修正主义者对国际局势的分析完全相反。修正主义者认为，当前主要矛盾是社会主义制度和资本主义制度之间的矛盾。而亚洲特别是东南亚的局势表明，这里是世界上各种矛盾的焦点，在这里，革命的烈火正在燃烧着。”"},{"type":"paragraph","text":"宫本还阐明了日本共产党反对三国部分禁止核试验条约的立场。"},{"type":"paragraph","text":"他接着说：“美帝国主义对社会主义国家和非社会主义国家在同一个时期分别地施行多种形式的政策。对社会主义国家，美帝国主义实行‘和平瓦解’的政策，而对其他国家，它奉行进攻的政策。这样，人们可以十分清楚地看到，在‘和平共处’问题上，日本共产党和苏联共产党之间存在着分歧，因为日本共产党在这个问题上坚持马克思列宁主义的立场。”"},{"type":"paragraph","text":"宫本说：“在国际共产主义运动中，问题在于现代修正主义者不敢对美帝国主义的侵略进行斗争，问题在于我们是动员人民起来进行反对美帝国主义的斗争，还是在一开始就放弃这种斗争？”"},{"type":"paragraph","text":"他说，“日本共产党认为：修正主义者的‘理论’是要修改马克思列宁主义的基础。”"},{"type":"paragraph","text":"宫本说：“最重要的事情是使国际共产主义运动在马克思列宁主义的基础上一致团结起来。在解决国际共产主义运动内部的问题时一定会发生许多辩论和论战。日本共产党不仅在国际民主运动中，而且也在国际共产主义运动中高举着真正马克思列宁主义团结的旗帜。”"},{"type":"paragraph","text":"宫本还说：“纠正修正主义者错误观点的目的正是为了加强日本人民和苏联人民之间的友谊。无论发生什么情况，马克思列宁主义必将赢得胜利！日本共产党深信，印度尼西亚共产党将对马克思列宁主义的胜利作出更大的贡献。”"},{"type":"paragraph","text":"在宫本显治讲话完毕后，艾地说：“现代修正主义者在意识形态，理论和实践各方面显然已经破产。日本共产党已经对马克思列宁主义作出重要贡献。现代修正主义者企图干涉其他党的内部事务，甚至想不仅在日本，而且在世界各地建立新的假的（共产）党。但是我们将紧握马克思列宁主义的旗帜，向前迈进，并且一定赢得胜利。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fa01e8f7e3"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
