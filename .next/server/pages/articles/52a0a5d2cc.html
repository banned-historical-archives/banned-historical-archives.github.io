" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"华东二十六个高等学校三百多位同学来信 坚决支持许云影同学的爱国检举行动","authors":[],"dates":[{"year":1952,"month":3,"day":31}],"is_range_date":false,"parts":[{"text":"华东二十六个高等学校三百多位同学来信 坚决支持许云影同学的爱国检举行动","type":"title"},{"text":"“在许云影同学的爱国行动中，我们看到了中国青年学生非凡的面貌，许云影同学在当前激烈的阶级斗争中体现了青年学生热爱祖国、热爱人民、忠诚、正直的高贵品质，体现了青年学生高度的冲击作用和对守旧思想——旧的伦理道德观念、资产阶级腐朽思想采取不可调和的态度。”","type":"paragraph"},{"text":"“许云影同学是我们青年学生的光荣模范!”","type":"paragraph"},{"text":"“我们不容许任何人诬蔑她；正如我们青年学生不准任何人诬蔑一样!我们青年学生在每一爱国运动中所表现的成绩，都是不准诬蔑也是无法诬蔑的，只有那些垂死的帝国主义分子说我们这也不行、那也不行，我们学生珍惜自己血汗得来的光荣传统并满怀信心的发扬这个光荣传统!”","type":"paragraph"},{"text":"“我们成千成万的学生都和许云影在一起，齐步向着光芒万丈、无比美妙的共产主义前途迈进，我们坚决反对阻碍历史前进的绊脚石，假使有谁敢顽抗到底的话，我们就辗平他!”","type":"paragraph"},{"text":"“我们相信沪江大学大部分师生都是热爱祖国、热爱真理的，我们竭诚欢迎他们积极改造自己，肃清资产阶级残余思想，投身到火热的三反、五反运动中来!”","type":"paragraph"},{"text":"交通大学吴元新、庄育扬、佘又波、李仁政、孟嘉、艾苏、熊鹏飞、李俊杰；","type":"paragraph"},{"text":"复旦大学经济系沈咏等十人、詹心微、江南岸、高年生、陈左鼎、沙洛、陈兆熊、耿裕贤、陈九皋、孙传镐、杨立其、丁胜源、顾慈观、张湛、虞先泽、王孙、叶正礼；","type":"paragraph"},{"text":"同济大学林南薰、居荣初、薛天威；","type":"paragraph"},{"text":"圣约翰大学何镜波；","type":"paragraph"},{"text":"华东师范大学教育系三年级乔兴业等十一人，数学系全体同学廿一人，陈小仪、吴忠贯、李濬卿；","type":"paragraph"},{"text":"大同大学李鼎辉、俞天锡、吴自遐；","type":"paragraph"},{"text":"东吴大学宋雅范、宫燕侠、王佩霞；","type":"paragraph"},{"text":"震旦大学邓正浩、金西铭、徐南图、汤曼凌；","type":"paragraph"},{"text":"之江大学建筑系乔芝馥；","type":"paragraph"},{"text":"南京大学朱福祥、周健迟；","type":"paragraph"},{"text":"浙江大学陈耀、厉葆初；","type":"paragraph"},{"text":"上海财经学院统计系二年级全体同学二十人、王祖华、朱复增、陈家亨；","type":"paragraph"},{"text":"上海医学院医一乙全体同学八十人、医一甲全体同学八十一人、戴克烝、蒋家树等九人；","type":"paragraph"},{"text":"上海学院张良栋、常公望、朱灏；","type":"paragraph"},{"text":"上济航务学院马震英、陈运新；","type":"paragraph"},{"text":"上海水产专科学校虚晏生；","type":"paragraph"},{"text":"上海工业专科学校徐纪良；","type":"paragraph"},{"text":"中央音乐学院上海分院赵琴、唐善食；","type":"paragraph"},{"text":"上海美专殷励箴；","type":"paragraph"},{"text":"同德医学院余瀛鳌；","type":"paragraph"},{"text":"华东革大外专何俊瑞、朱立奇、苏军；","type":"paragraph"},{"text":"华东交通专科学校李荫桐、钱秋雄；","type":"paragraph"},{"text":"华东纺织工学院方正、孟信祥、沙文；","type":"paragraph"},{"text":"立信会计补校李咏絮、周竞新；","type":"paragraph"},{"text":"上海剧专朱青；","type":"paragraph"},{"text":"苏南文教学院顾湘权。","type":"paragraph"}],"comments":[],"origin":"《文汇报》1952年3月31日","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"52a0a5d2cc"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
