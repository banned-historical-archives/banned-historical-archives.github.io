<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"内蒙古自治区水利局全体同志  向毛主席报告兴修水利战胜灾害情况","authors":[],"dates":[{"year":1952,"month":8,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"内蒙古自治区水利局全体同志"},{"type":"paragraph","text":"向毛主席报告兴修水利战胜灾害情况"},{"type":"paragraph","text":"敬爱的毛主席：您派了访问团到我们内蒙来，内蒙各族人民都衷心感激您对我们的深切关怀。我们是内蒙古自治区人民政府农牧部水利局的工作人员。现在我们把内蒙人民兴修水利、战胜自然灾害的情况报告给您。"},{"type":"paragraph","text":"在哲里木盟大平原肥沃的土地上，流贯着一条大河——西辽河。过去每当夏季庄稼茁壮的时候，往往因河水泛滥，淹没了沿岸大片良田草原，使很多人民失去了农产品和牧草。在反动统治时，人民的痛苦是没有人过问的。解放后，人民政府十分重视这件有关广大人民生活的大事，领导和组织群众进行修堤防汛工作。一九四九年，西辽河的洪水是几十年来少有的，但在共产党的领导和人民的抢救下，灾情大大减轻。为了“战胜洪水，保卫生产”，一九五○年广大人民在党的领导下，克服了种种困难，修堤九百三十公里，修闸坝构造物六百七十一个，完成了巨大的防洪工程。在人民生活贫困、物质技术条件很差的情况下，这个任务是十分艰巨的。哲里木全盟只有十几万个劳动力，但这个工程就用了四百多万个工。这是党的领导的胜利。"},{"type":"paragraph","text":"在修堤防汛工作中，出现了不少的模范人物和英雄事迹。劳动模范石尼玛，他改进了劳动组织，使小组每人工作效率由四公方提高到八公方。在凌汛期冰块滚滚下流，大堤有决坍危险时，他奋不顾身跳下水去，在严寒刺骨、水深及腰的冰河里坚持工作两天两夜。在他带动下，大家齐心努力，保住了大堤的安全。共产党员罗发，在防汛期带领一千人昼夜抢险护堤，坚持四十天。有一次他独自巡堤时发现了大堤漏水。他毫不犹豫地跳下水去，用自己的身体堵住漏洞，防止了堤岸决口。就是这许多模范人物带动了千万群众，用战斗的方式战胜了洪水，完成了防洪工程，使全盟在一九五○年获得了丰收。群众添车买马，生产积极性大大提高了。"},{"type":"paragraph","text":"一九五一年，内蒙有些地区遭受旱灾。在上级政府号召下，我们展开了防旱抗旱工作，在哲里木盟修了三个灌区。今年春，在短短二十多天中，我们完成了哲里木盟三万三千多垧的春浇工作。这就使田苗旺盛，秋收可保，并增强了群众和旱灾作斗争的信心。"},{"type":"paragraph","text":"毛主席：我们在工作中深刻体会到，在您英明伟大的领导下，紧紧依靠群众，什么困难都能克服。您的光辉照耀在我们内蒙地区，不但消除了反动统治者造成的民族仇视和隔阂，也将逐步消除反动统治者遗留下的自然灾害。现在我们在中央人民政府的直接帮助下，着手西辽河的根本治理工作。不久的将来，水患永除，河水灌溉着肥沃的土地，满仓的粮食，成群的牛羊，内蒙人民将过着更加幸福美好的生活。内蒙古自治区人民政府农牧部水利局全体人员"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"60bcf49ba3"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
