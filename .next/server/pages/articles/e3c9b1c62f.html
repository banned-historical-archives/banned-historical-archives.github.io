script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"人民军队不可诬","authors":["张林海"],"dates":[{"year":1976,"month":8,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"司务长　张林海"},{"type":"paragraph","text":"党内最大的不肯改悔的走资派邓小平，为了颠覆无产阶级专政，复辟资本主义，在他重新工作后不久，就步刘少奇、林彪的后尘，急不可待地跳出来，攻击、诽谤人民军队。他把文化大革命以来我军的大好形势说得漆黑一团，妄图以“今不如昔”的谬论来否定文化大革命给我军建设带来的巨大作用，进而翻文化大革命的案，算文化大革命的帐。"},{"type":"paragraph","text":"中国人民解放军是伟大领袖毛主席亲自缔造和指挥的无产阶级革命军队，是人民的子弟兵。在漫长的革命战争岁月里，她始终接受党的绝对领导，执行毛主席的建军路线，为推翻三座大山，创建新中国，立下了不朽的功勋。在无产阶级夺取政权后，又同全国人民一道，在社会主义革命和社会主义建设中，继续革命不停步，充分发挥了无产阶级专政的柱石作用；尤其在文化大革命中，积极参加“三支”、“两军”工作，反修防修，为人民立了新功。在缩小三大差别，限制资产阶级法权的斗争中，我军涌现出大批自觉限制资产阶级法权、甘当填平三大差别鸿沟的铺路石子的先锋战士，成为社会主义新生事物的促进派。铁的事实雄辩地说明，中国人民解放军不愧为伟大的军队，光荣的军队。"},{"type":"paragraph","text":"走资派的特征就是推行修正主义路线。而一定的军事路线从来是为一定的政治路线服务的。邓小平妄图用他那个“三项指示为纲”的修正主义纲领，按照资产阶级面貌来改造我们的军队，变无产阶级军队为资产阶级军队，把无产阶级专政的工具蜕变为对无产阶级专政的工具，我们革命战士坚决不答应!"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"限制资产阶级法权","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e3c9b1c62f"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
