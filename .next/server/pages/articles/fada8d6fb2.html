script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"壶关通讯员来信揭露  原太行五分区医院合作社  放高利贷剥削农民","authors":[],"dates":[{"year":1948,"month":2,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"壶关通讯员来信揭露"},{"type":"paragraph","text":"原太行五分区医院合作社"},{"type":"paragraph","text":"放高利贷剥削农民"},{"type":"paragraph","text":"【本报消息】壶关通讯员郭有、常吉、文付、良玉四同志在十四日给本报来信，揭露原太行五分区医院合作社用高利贷剥削农民的非法行为，要求负责方面赶快检查解决。据说："},{"type":"paragraph","text":"五分区医院一所，前在我县六区桥上村驻扎，并带有一个生产合作社。后来医院走了，合作社仍留桥上村生产。现在归哪个机关部队领导，我们并不详细了解。我们只是知道他们原由五分区领导，因之我们向五分区建个议，就不是五分区领导，你们也好转达他们直属部队想法解决。该合作社在业务上给群众毫无关系，净卖消耗品，没有农民的必需品。他们搞业务是个样子，主要是放帐（高利贷）。贷出一元钱，每月每元利钱一毛二分，合月利十二分。根据我们去年腊月二十四日了解，光在桥上和王家庄两个村，就放了九十五万元。好多群众反映利太大，把咱背干了。石河沐干部曾这样提出：“他也是搞生产，应该两下（农民和医院合作社）赚开，利太大，要求上级给交涉一下………”我们当时接受了群众的反映，给该社郭经理善意的提出时，他表面上亦没说啥，还是以扶助群众生产的论调应付我们。可是当天黑夜，即派人到王家庄逼着干部群众要款，甚至就得马上卖了骡子交款。石嘴村的小合作社，完全被该合作社背倒了。石嘴村自去年五月初十贷他款十六万元，到八月初几就上了三次利，每次都是利上加利。原本十六万元，第一次上利不起，就增成十九万八千四百元，第二次上利又上不起，又给立二万六千元的一张契纸，每月十二分行息，第三次就出了五万元利钱。结果十六万元钱，三个月时间，本上加利，利上赚利，滚到二十七万四千四百元，最后合作社连本带利不够医院合作社的了，只好全部收拾还了人家饥荒。如此经营，我们认为极不妥当，领导方面必须赶快纠正。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fada8d6fb2"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
