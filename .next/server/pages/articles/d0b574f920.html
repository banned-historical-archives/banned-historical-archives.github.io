" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"金矿县委关于召开县区乡三级扩干会议进行新三反的总结报告（节录）","authors":[],"dates":[{"year":1953,"month":7,"day":6}],"is_range_date":false,"parts":[{"text":"金矿县委关于召开县区乡三级扩干会议进行新三反的总结报告（节录）","type":"title"},{"text":"青纳乡文书，召开村干部会议强迫承认完成8%的增产任务，村干部不敢答复，用熬会的方法强迫承认。村干部回村后也照样召集群众会强迫承认，保证完成。群众支支吾吾不敢接受，但村干部说：“若不承认不散会。”结果最后勉强的承认。 专署犬防队李兆麟派往凹里工作时强迫7里到10里以外的群众集中出晨操，迫使农民如黄五冈全家6口人留下7岁小孩2人及眼瞎的弟共3人在家看门。 夫妻2人背上个乳孩每天午饭后即来等候到第二天的约午后才能返家。把饭吃了又来乡政府等候，出标时将乳孩放在操场侧边睡下。严重影响农民生产。(p. 113)","type":"paragraph"}],"comments":[],"origin":"甘肃省某档案馆","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d0b574f920"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
