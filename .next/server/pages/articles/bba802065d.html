script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"福州市农业部门干部认为南庄毁瓜事件表明：肃清极左路线流毒必须上下齐动手","authors":[],"dates":[{"year":1979,"month":8,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"福州市农业部门干部认为南庄毁瓜事件表明："},{"type":"paragraph","text":"肃清极左路线流毒必须上下齐动手"},{"type":"paragraph","text":"据新华社福州八月七日电  福州市农业部门干部对河北省正定县留村公社领导人强迫毁瓜的事件，引起强烈反响。正在参加市委举办的真理标准问题讨论会的农林水办公室的干部认为，南庄毁瓜事件表明，极左路线的流毒仍然是当前发展农业生产的主要障碍。要肃清这种流毒，必须上下一齐动手。"},{"type":"paragraph","text":"福州市农办主任丁岐秀、副主任林勤、黄万乐说：从这几年的实践看，极左路线的流毒不能低估，党的政策的真正落实并不那么容易。类似南庄那样的毁瓜事件在我们这里也发生过。去年，鼓山公社供销社在柯溪大队种了几十亩剑麻，这个公社的负责人硬逼他们拔掉，改种果树，造成严重的经济损失。"},{"type":"paragraph","text":"参加座谈的同志认为，农村经济政策不落实，生产队的自主权得不到尊重，某些基层干部的思想路线和工作作风不端正，固然是一个原因，但也有许多是上级领导机关和领导干部搞强迫命令、瞎指挥造成的。市农业局长叶文贵举了这么一个例子：郊区闽侯县荆溪公社推广水稻直播法（把稻种直接撒播，不经过育秧工序）有一、二十年的历史，可是去年新来的县委负责人却不让他们继续搞，硬说这是落后的生产方法。后来公社干部把这件事情反映到市里，坚持用直播法种了一千多亩早稻，结果增产一成多。但是这种活生生的事实还没有使那个领导人改变认识。围绕着直播稻的风波到现在还没有平息。类似这样的事情，我们市、县的干部干过，就是省里的领导人又何尝没有干过。有一件事，省的领导和我们想不到一块，实际上是和群众想不到一块。福州市闽江两岸有八千多亩沙质地，原先都是种柑桔，有“闽江桔子红”之称。林彪、“四人帮”横行时砍掉了柑桔，种了水稻。由于这些沙质田漏水严重，不宜种水稻，我们根据群众的意见，要求将这些沙质田部分改种柑桔。省领导不但不同意，反而批评说：“反对你们占粮田的作法。”"},{"type":"paragraph","text":"参加座谈的同志还联系到一些地方在劳动管理上搞“一刀切”的做法。他们认为，在福建省，极左路线还远远没有批透，极左流毒还远远没有肃清。批极左，落实三中全会的精神，还需要上下一起特别是上级领导机关花大力气去做。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bba802065d"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
