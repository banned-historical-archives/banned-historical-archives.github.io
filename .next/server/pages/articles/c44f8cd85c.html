" crossorigin="">{"props":{"pageProps":{"books":[{"id":"0b2f26ed-ad29-48e7-9c89-446932a97ab0","name":"中共党史教学参考资料 第27册 “文化大革命”参考资料 下册（1988年）","internal":true,"official":true,"type":"pdf","author":"","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives3/main/0b2f26ed-ad29-48e7-9c89-446932a97ab0.pdf"],"article":{"title":"中共中央关于在反击右倾翻案风中各地禁止来京上访的通知","alias":"","parts":[{"type":"paragraph","text":"三月二十四日毛主席批示：同意。中共中央关于在反击右倾翻案风中"},{"type":"paragraph","text":"各地禁止来京上访的通知"},{"type":"paragraph","text":"（一九七六年三月二十四日）中共浙江省委并各省、市、自治区党委："},{"type":"paragraph","text":"最近，浙江有几批学生，强行登上火车，要求来京上访和到清华、北大看大字报。经过劝阻，大部已经回去了。中央认为，这种做法是不妥当的，不符合毛主席、党中央的指示精神，影响抓革命、促生产、促工作、促战备。"},{"type":"paragraph","text":"中央要求各地要坚决贯彻执行毛主席的重要指示和中央文件的规定，对强行登车要求来京的人员，应做好思想工作，坚决劝阻。告诉他们，整个运动要根据毛主席指示，在党委一元化领导下进行。不搞串连，不搞战斗队。在本地区、本单位搞好教育革命大辩论，深入揭发批判邓小平同志的修正主义路线错误，把反击右倾翻案风的斗争进行到底。"},{"type":"paragraph","text":"一个复辟资本主义的总纲 (节录)"},{"type":"paragraph","text":"一《论全党全国各项工作的总纲》剖析"},{"type":"paragraph","text":"（一九七六年四月一日）"},{"type":"paragraph","text":"程越"},{"type":"paragraph","text":"伟大的反击右倾翻案风的斗争，正在乘胜前进。党内那个不背改悔的走资派提出的“三项指示为纲”的修正主义纲领，受到了毛主席和全党全军全国人民的深刻批判。毛主席指出：“什么‘三项指示为纲，安定团结不是不要阶级斗争，阶级斗争是纲，其余都是目。毛主席的指示从根本上指明了“三项指示为纲”否定以阶级斗争为纲，否定党的基本路线，反对无产阶级专政，复辟资本主义的反动实质。"},{"type":"paragraph","text":"有少数人曾经认为，“三项指示为纲”只是一个“提法”问题。那么，好，现在让我们再来看一篇在党内那个不肯改悔的走资派指使下炮制的文章。此文题为《论全党全国各项工作的总纲》（以下简称《总纲》），它以更露骨的语言，彻底暴露了党内那个不肯改悔的走资派抛出的“三项指示为纲”，是一个全面复辟资本主义的纲领。"},{"type":"paragraph","text":"一《论全党全国各项工作的总纲》剖析"},{"type":"paragraph","text":"（一九七六年四月一日）"},{"type":"paragraph","text":"程越"},{"type":"paragraph","text":"伟大的反击右倾翻案风的斗争，正在乘胜前进。党内那个不背改悔的走资派提出的“三项指示为纲”的修正主义纲领，受到了毛主席和全党全军全国人民的深刻批判。毛主席指出：“什么‘三项指示为纲，安定团结不是不要阶级斗争，阶级斗争是纲，其余都是目。毛主席的指示从根本上指明了“三项指示为纲”否定以阶级斗争为纲，否定党的基本路线，反对无产阶级专政，复辟资本主义的反动实质。"},{"type":"paragraph","text":"有少数人曾经认为，“三项指示为纲”只是一个“提法”问题。那么，好，现在让我们再来看一篇在党内那个不肯改悔的走资派指使下炮制的文章。此文题为《论全党全国各项工作的总纲》（以下简称《总纲》），它以更露骨的语言，彻底暴露了党内那个不肯改悔的走资派抛出的“三项指示为纲”，是一个全面复辟资本主义的纲领。"}],"authors":[],"dates":[{"year":1976,"month":3,"day":24}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":410,"page_end":410},"tags":[{"name":"浙江文革","type":"人物"},{"name":"教育革命","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]},{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共中央关于在反击右倾翻案风中各地禁止来京上访的通知","authors":[],"dates":[{"year":1976,"month":3,"day":24}],"is_range_date":false,"parts":[{"text":"中共中央关于在反击右倾翻案风中各地禁止来京上访的通知","type":"title"},{"text":"毛主席批示：同意。","type":"paragraph"},{"text":" 三月二十四日","type":"paragraph"},{"text":"中共中央通知","type":"subtitle"},{"text":"中共浙江省委并各省、市、自治区党委：","type":"appellation"},{"text":"最近，浙江有几批学生，强行登上火车，要求来京上访和到清华、北大看大字报。经过阻劝，大部已经回去了。中央认为，这种做法是不妥当的，不符合毛主席、党中央的指示精神，影响抓革命、促生产、促工作、促战备。","type":"paragraph"},{"text":"中央要求各地要坚决贯彻执行毛主席的重要指示和中央文件的规定，对强行登车要求来京的人员，应做好思想工作，坚决劝阻。告诉他们，整个运动要根据毛主席指示，在党委一元化领导下进行。不搞串连，不搞战斗队。在本地区、本单位搞好教育革命大辩论，深入揭发批判邓小平同志的修正主义路线错误，把反击右倾翻案风的斗争进行到底。","type":"paragraph"},{"text":" 中共中央一九七六年三月二十四日","type":"paragraph"},{"text":"（此件发至县、团级）","type":"appellation"},{"text":"（根据中央文件原件打印，原题为：中共中央通知）","type":"appellation"}],"comments":[],"origin":"根据中央文件原件打印，原题为：中共中央通知","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"浙江文革","type":"人物"},{"name":"教育革命","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c44f8cd85c"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
