script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"古巴革命胜利是对修正主义的否定只有展开武装斗争才能赢得胜利巴西《工人阶级报》说:古巴革命为拉丁美洲人民开辟了新时代","authors":[],"dates":[{"year":1963,"month":1,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社里约热内卢9日电】　今天出版的1月1日-15日一期巴西《工人阶级报》以“拉丁美洲历史性的胜利”为题发表纪念古巴革命胜利四周年的评论说，古巴革命的胜利“不仅为古巴人开辟了一个新时代，而且为所有的拉丁美洲人开辟了一个新时代”。"},{"type":"paragraph","text":"评论说，“古巴革命是拉丁美洲各国的榜样。它在本大陆的人民群众中有着深远的影响”。评论说，古巴鼓舞着目前仍然生活在大庄园制和帝国主义枷锁下的拉丁美洲各国人民为消灭使他们落后、饥饿和贫困的因素而斗争。"},{"type":"paragraph","text":"评论说，“古巴革命是取之不竭的教育源泉。它粉碎了所有那些有大其词的认为在美帝国主义这个经济和军事强国面前，本大陆的任何国家都不可能胜利地进行革命斗争的理论。”"},{"type":"paragraph","text":"评论强调指出，“以菲德尔·卡斯特罗为首的在1959年取得胜利的革命运动是对机会主义和修正主义的一个否定。这个革命运动表明:只有被掠夺者展开武装斗争才能赢得对帝国主义、大庄园主和大资本家的胜利。”"},{"type":"paragraph","text":"评论说，“一个社会主义国家在美洲的出现使拉丁美洲群众革命化了。因此，美国帝国主义者仇视古巴革命，他们不断地策划阴谋活动，威胁入侵那个加勒比地区的国家。”评论说，“入侵的危险仍然笼罩着何塞·马蒂的祖国。肯尼迪的不入侵古巴的保证不能相信。”"},{"type":"paragraph","text":"评论最后说，“在古巴人民战胜巴蒂斯塔独裁政权四周年的今天，巴西人民对美洲第一个社会主义国家怀着巨大的同情。帝国主义的代理人、形形色色的反动分子以及那些不相信人民革命力量的人在四年前曾经预言，菲德尔·卡斯特罗保持不了政权多久，他不可避免地要被打倒。然而，古巴革命继续存在着并且在行动中。尽管有美国进行经济封锁，有雇佣军进行挑衅活动和企图发动入侵，古巴革命在前进中。”"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e0640c1b4a"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
