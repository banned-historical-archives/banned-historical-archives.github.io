<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"世界和平力量壮大!各国共产党在迅速成长中苏联真理报著文提供统计数字并指出资产阶级急急迫害共产党员是因为他们知道历史已注定了他们必然灭亡的命运","authors":[],"dates":[{"year":1950,"month":2,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社上海二十五日讯】　塔斯社莫斯科消息:格里高良在二月二十四日的“真理报”中发表专文，列举使人信服的统计数字，证明世界各国共产党和工人党日益成长，内容摘要如下:"},{"type":"paragraph","text":"大家都知道，在战争年代中，那些右翼社会党卑怯地把本国人民的自由和国家的独立出卖给希特勒侵略者。唯有各国共产党表明了是本国人民的国家利益的真正保卫者，是为反对希特勒的占领而抗战的坚强的组织者。他们由此在人民中间博得了信任和威望、亲如兄弟的各国共产党的势力日益增长，人数日益加多，便是这一方面的具体表现。"},{"type":"paragraph","text":"各国右翼社会党及其反动的领袖们，永远不会体验到人民对党的爱，因为靠贿赂选民，或虚妄的诺言，是决不能够博得这种爱的。斯大林所说的关于已变成陈迹了的，注定灭亡的那些政党的话，关于怕见光明、怕受批评的那些政党的话，对于这一类的政党是完全可以适用的。这些政党奸诈叛逆的行为，在各国进步的劳动群众看来越过越清楚了。右翼社会党的领袖们靠欺骗人民过日子，用那些煽惑性的“革命的”漂亮话做幌子，来掩饰他们出卖工人阶级和劳动人民的利益，靠干这种勾当过日子。充当美帝奴才的右翼社会党人，在一九四八年一月十五日获得可羞的褒状，那一天，美国国务部公开断言“社会党人是在欧洲反共的最重要台柱之列”。"},{"type":"paragraph","text":"全世界人民大众空前亲密地团结在各国共产党的周围，共产党领导着为保卫和平，为反对英美帝国主义者和国内反动派而进行的斗争。在第二次世界大战前夕，法国共产党有党员三十四万名，而现在已有六十六万九千名了；意大利共产党，在大战前夕有党员五万八千名，现在已有二百三十万名，中国共产党党员人数已超过四百万。"},{"type":"paragraph","text":"在欧洲人民民主国家中，共产党和工人党的势力和威信已无限壮大成长起来。在大战前夕，捷克斯洛伐克共产党有党员八万名，而现在已有二百三十万名；波兰统一工人党在大战前夕有党员二万名，而现在已有一百三十六万名；罗马尼亚工人党在大战前夕有党员一千名，而现在已有一百万名；匈牙利工人党在大战前夕有党员三万名，而现在已有党员九十五万名；保加利亚共产党在大战前夕有党员八千名，而现在已有四十六万名。"},{"type":"paragraph","text":"这些亲如兄弟的各国共产党，用苏联共产党(布尔雪维克)的历史经验武装起来，顺利地领导着社会主义的奠基工作。"},{"type":"paragraph","text":"苏联各民族人民以及全世界亿兆劳动人民对布尔雪维克党的热爱，是由于布尔雪维克党进行了伟大的革命的使世界转形的活动，开始了资本主义制度的灭亡，而在人类史中创始了新纪元。而如果说，现在国际资产阶级看见了全世界所有各国的共产党和工人党已发展成多么惊人的力量时，不禁恼羞成怒，如果说资产阶级已诉诸形形色色的残无人道的迫害手段以对付共产党员，枪毙他们，在刑讯室中害死他们，那么，他们之所以要这么办，正是因为历史已注定了资产阶级必然灭亡。"},{"type":"paragraph","text":"\u003cIMG alt=请插入2号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1950\\02\\502q040101.JPG\"\u003e"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"de320f28f0"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
