script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"西安地区革命工人大联合协商代表会学习班建立革命好学风  用毛泽东思想之矢射自我革命之的  巩固和发展了革命大联合，为正式成立西安地区和陕西省工代会打下了思想基础","authors":[],"dates":[{"year":1968,"month":1,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"西安地区革命工人大联合协商代表会学习班建立革命好学风"},{"type":"paragraph","text":"用毛泽东思想之矢射自我革命之的"},{"type":"paragraph","text":"巩固和发展了革命大联合，为正式成立西安地区和陕西省工代会打下了思想基础"},{"type":"paragraph","text":"据新华社西安四日电　西安地区革命工人大联合协商代表会举办的毛泽东思想学习班，建立了革命的好学风，参加学习的各革命群众组织的负责人活学活用毛主席著作，理论联系实际，各自多做自我批评，从思想上巩固和发展了革命大联合，为正式成立西安地区和陕西省工人代表大会打下了良好的思想基础。"},{"type":"paragraph","text":"各革命群众组织负责人在学习中强调，理论联系实际，首先要联系思想实际。在联系思想实际中，又首先要联系自己一方的思想实际，解决自己一方的思想问题。毛主席教导我们：“两派要互相少讲别人的缺点、错误，别人的缺点、错误，让人家自己讲，各自多做自我批评，求大同，存小异。”经过反复学习，大家认识到，有无认真的自我批评，这是区别真正革命派和口头革命派的重要标志之一。真正的无产阶级革命派，有了缺点、错误，就应该认真地进行自我批评，坚决迅速地改正。容忍、迁就自己的缺点、错误，就是对革命事业的犯罪，就是对毛主席、对毛泽东思想的不忠。只有多做自我批评，坚决改正自己的缺点、错误，才能紧跟毛主席，沿着毛主席的无产阶级革命路线胜利前进。思想觉悟提高了，大家都拿起自我批评的武器，各自揭自己的疮疤。"},{"type":"paragraph","text":"学习班还强调，在联系自己一方的思想实际中，革命群众组织负责人要首先联系自己的思想实际，改变领导落后于群众的局面。毛主席说：“在某种意义上来说，最聪明、最有才能的，是最有实践经验的战士。”事实正是这样，还在西安地区革命工人大联合协商代表会成立之前，西安地区就有一批工厂企业的革命群众，遵照毛主席的教导，按系统按班组实现了革命大联合。有的单位，头头在会议桌上谈不拢，而群众在下面已经实现了革命大联合。这说明，广大工人群众对毛主席的伟大战略部署，理解得深，跟得紧，他们表现得最聪明，最有才能。在学习班学习的各革命群众组织负责人学习了毛主席的最新指示，联系一些工厂企业的实际情况，深深感到在实行革命大联合这方面，自己已经落在群众后面了，自己方面的缺点、错误首先在于自己。于是，大家首先联系自己的错误思想，展开了自我批评。他们深有体会地说，必须牢记林彪副主席的指示，要把自己当作革命的一份力量，同时又要不断地把自己当作革命的对象。无数事实证明，不革自己的命，这个革命是搞不好的。"},{"type":"paragraph","text":"大家根据一年多来在无产阶级文化大革命的斗争实践中遇到的问题和取得的经验教训，在学习班中明确地提出，自己必须努力做到四个正确对待：第一，正确对待毛主席的指示，一定要无限忠于毛主席，对毛主席的指示，一定要学了就用，认真执行，立竿见影。第二，正确对待群众，一定要生活、战斗在群众之中，遇事多和群众商量，做群众的小学生。第三，正确对待自己，一定要不断把自己当作革命的对象；要树立理论联系实际的作风，密切和人民群众相联系的作风，自我批评的作风。第四，正确对待两类不同性质的矛盾，对阶级敌人一定要狠，对人民内部矛盾一定要采取“团结——批评和自我批评——团结”的方针。大家认为，努力做到了这四个正确对待，才能成为决心把无产阶级文化大革命进行到底的无产阶级革命派。"},{"type":"paragraph","text":"各个革命群众组织负责人在学习班中还以“斗私，批修”为纲，讨论了革命大联合的问题。目前，他们正积极筹备召开西安地区和陕西省的工代会，决心紧跟毛主席的伟大战略部署，为巩固和发展革命大联合、革命三结合作出新的贡献。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"陕西文革","type":"人物"},{"name":"人民内部矛盾","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9642e10aed"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
