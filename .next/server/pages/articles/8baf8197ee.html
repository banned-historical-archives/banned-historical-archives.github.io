script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"同苏修搞“联合”就不能真正反美  阿《人民之声报》揭露苏修在欧洲搞“缓和”的叛卖行为  日本朋友赞成中共八届十一中全会公报坚决反修的主张  海地学联领导人说现代修正主义在拉美正走向彻底破产","authors":[],"dates":[{"year":1966,"month":8,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"同苏修搞“联合”就不能真正反美"},{"type":"paragraph","text":"阿《人民之声报》揭露苏修在欧洲搞“缓和”的叛卖行为"},{"type":"paragraph","text":"日本朋友赞成中共八届十一中全会公报坚决反修的主张"},{"type":"paragraph","text":"海地学联领导人说现代修正主义在拉美正走向彻底破产"},{"type":"paragraph","text":"据新华社地拉那电　阿尔巴尼亚《人民之声报》十九日发表编辑部文章指出，苏联修正主义者鼓吹建立“欧洲集体安全”，是企图找到更好的方法来建立“平静的欧洲”，以便保证美帝国主义后方的安全，使美帝国主义能够腾出手来去打击其他地区的各国人民，首先是英雄的越南人民，阻挡世界各地的革命和民族解放运动。它是帝国主义和修正主义加强包围和孤立中华人民共和国的共同计划的组成部分。"},{"type":"paragraph","text":"文章说，最近，苏联部长会议主席柯西金在苏联最高苏维埃会议上提出必须建立“欧洲集体安全体系”，再次呼吁召开“全欧会议”。苏联修正主义者在背叛了马克思列宁主义以后，正千方百计地和美帝国主义者靠拢，竭力帮助美帝国主义者实现他们同苏联和东欧其他国家“搭桥”的计划。"},{"type":"paragraph","text":"文章最后说，帝国主义和修正主义的任何阴谋也阻挡不住以雷霆万钧之势席卷全世界的革命潮流。这一潮流必将把帝国主义者及其代理人现代修正主义者从地球上一扫而净。"},{"type":"paragraph","text":"新华社东京电　日本亚非研究所研究员加藤长雄十八日向中国记者发表谈话，表示完全赞同中国共产党八届十一中全会公报中提出的不可能同以苏共领导为中心的现代修正主义集团搞什么“联合行动”的主张。"},{"type":"paragraph","text":"加藤说，这个主张是完全正确的。他说：“苏联现代修正主义到处做坏事，这是不能允许的。它打着‘社会主义’的招牌到处骗人。”"},{"type":"paragraph","text":"加藤说，“现在有人硬说苏联新领导变好了，但是他们却举不出半点具体事实。苏联新领导不仅没有变好，反而变得更坏”。"},{"type":"paragraph","text":"他说，“苏联‘援助’越南人民的真正意图，不是为了越南人民的胜利，而是为了同美帝国主义搞‘和谈’阴谋。”“苏联援助印度反动派比过去有增无减，其目的在于反华”，“不仅如此，它在亚洲其它地区和非洲也尽做坏事。”"},{"type":"paragraph","text":"加藤说，“只要苏联新领导为帝国主义效劳，就不能同它搞‘统一行动’，如果把它包括在全世界人民的国际反美统一战线中，就不可能进行真正的反美斗争。”"},{"type":"paragraph","text":"据新华社哈瓦那电　出席不久前在这里举行的第四届拉丁美洲学生代表大会的多米尼加大学生联合会代表温贝托·埃斯卡兰特说：毛主席关于帝国主义和一切反动派都是纸老虎的论断已经成为各国人民进行反帝斗争的指南。他表示，多米尼加人民决心为反对美帝国主义及同美帝国主义公开合作的敌人——以苏联领导集团为首的现代修正主义进行斗争。"},{"type":"paragraph","text":"海地全国学生联合会领导人让·尼古拉和乔治·阿历克西说，“现代修正主义分子也是纸老虎”，“在拉丁美洲过去某个时期中，现代修正主义分子似乎是强大的，他们到处散布和平过渡的论点，企图阻止革命。但是，毛泽东主席关于帝国主义和一切反动派都是纸老虎的论断，武装了拉丁美洲国家的革命者，促进他们进行革命，同美帝国主义及其走狗以及现代修正主义展开斗争。现在，在拉丁美洲许多国家，开展着革命的武装斗争，同时，现代修正主义也日益走向彻底破产。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8baf8197ee"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
