script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"日本《工农战报》指出苏联玩弄外交花招不能得逞  中国坚定不移执行毛主席革命外交路线  孟加拉国一周报赞扬中国同第三世界一起反对超级大国","authors":[],"dates":[{"year":1976,"month":12,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"日本《工农战报》指出苏联玩弄外交花招不能得逞"},{"type":"paragraph","text":"中国坚定不移执行毛主席革命外交路线"},{"type":"paragraph","text":"孟加拉国一周报赞扬中国同第三世界一起反对超级大国"},{"type":"paragraph","text":"新华社东京一九七六年十二月四日电　日本工人党中央机关报《工农战报》十二月一日发表一篇国际评论，揭露苏联社会帝国主义最近加紧玩弄外交花招，极力掩盖它同另一个超级大国争夺霸权的野心，暴露了它在国内外面临着严重的危机。"},{"type":"paragraph","text":"评论指出：“苏联力图通过加强对东欧各国的控制、压迫和剥削来缓和这一危机。由于苏联提高它提供的石油和其它重要物资的价格以及限制供给量，攫取东欧各国的资金、劳动力、粮食和制品，而使东欧各国加剧了经济困难，加深了政治上的动荡。”"},{"type":"paragraph","text":"评论说：“西欧各国对于苏联的威胁越来越加强了戒心。苏联从西方大量引进资金、机械设备、消费物资和技术来增强其军备，并企图用来缓和伴随而来的经济危机。对此，西欧各国加强了警惕。”"},{"type":"paragraph","text":"评论在列举苏联以“第三世界的天然盟友”为幌子，进一步对第三世界各国加强势力扩张的事实后指出：“第三世界各国和人民，越来越看清了苏联的行动实际上就是扩张势力，进行控制、剥削和掠夺，从而加强了团结，使反对超级大国霸权主义的斗争得到了发展。”“勃列日涅夫之流露骨的霸权主义行径，只能起到促使第三世界人民觉醒的作用。”"},{"type":"paragraph","text":"评论说：苏联修正主义集团“玩弄新的欺骗伎俩，拚命地制造一种似乎他们真正热心于同中国谋求关系正常化的印象”。但是李先念副总理在欢迎中非共和国总统宴会上的讲话，“剥下了苏联玩弄新的欺骗手法的画皮，给苏联阴险的企图以沉重打击”。评论最后强调指出：在以华国锋主席为首的中共中央领导下，中国一定会坚定不移地执行毛主席的革命外交路线和政策。苏联无论玩弄什么样的恫吓和欺骗伎俩，在团结战斗的中国人民和全世界革命人民面前，必将遭到更加可耻的失败。"},{"type":"paragraph","text":"新华社达卡一九七六年十二月四日电　孟加拉国《假日》周报最近一期发表的一封读者来信说：“人民中国再一次证明了它是贫穷弱小国家的忠实的捍卫者，是斗争中被压迫人民的坚定的维护者。”"},{"type":"paragraph","text":"这封信说，中国“对于孟加拉国在法拉卡问题上的正确立场，对于尼泊尔要求宣布自己国家为和平区的热切愿望，对于斯里兰卡要求实施二十六届联合国大会关于印度洋和平区决议的热诚愿望，对于巴基斯坦关于宣布南亚为无核区的建议，中国都给予了完全的毫不含糊的支持。”"},{"type":"paragraph","text":"这封信说：“所有这一切明确无误地显示了中国经常地关心和无保留地支持弱小国家的独立、主权和安全，坚决反对超级大国的阴谋诡计。超级大国打着骗人的缓和招牌，但是实际上在干着加紧进行军事争夺的卑鄙勾当，以夺取世界霸权，并企图重新把全世界划分为势力范围。”"},{"type":"paragraph","text":"这封读者来信说：“中国除了提供有效的政治支持之外，它的经济援助真正可以说是无私援助的典范，值得其他援助国效法，这样的大国只有中国一个。”"},{"type":"paragraph","text":"读者来信说，中国今天所以受到尊敬，“不仅是因为它在自力更生和热情劳动的基础上取得的巨大的进步使我们受到强烈的感染并令人钦佩，而且也是因为我们由衷地感到中国的力量增添了第三世界的力量，推动我们去同两个超级大国的两极政治全力以赴地作斗争。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f4a8f25393"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
