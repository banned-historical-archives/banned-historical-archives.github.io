script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"加强合作反对帝国主义剥削建立新国际经济秩序","authors":[],"dates":[{"year":1976,"month":7,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"加强合作反对帝国主义剥削建立新国际经济秩序"},{"type":"paragraph","text":"一些非洲国家和组织领导人强调争取经济解放巩固政治独立"},{"type":"paragraph","text":"罗马尼亚刊物指出应铲除发号施令政策和对别国内政的干涉"},{"type":"paragraph","text":"据新华社讯　非洲一些国家和区域性组织的领导人最近分别发表谈话，强调要加强互助合作，发展民族经济和争取建立新的国际经济秩序。"},{"type":"paragraph","text":"莫桑比克总统萨莫拉最近在坦桑尼亚首都达累斯萨拉姆的一次讲话中，强调非洲国家要互相帮助，为发展民族经济而斗争。他说，我们必须首先在非洲范围内依靠我们自己的全部力量，彼此联系在一起，寻求我们能够互相补充的方面。"},{"type":"paragraph","text":"他指出，非洲国家要争取经济解放，摆脱对外的依赖状态，以巩固政治独立。"},{"type":"paragraph","text":"塞内加尔总统桑戈尔不久前在开发塞内加尔河组织的一次会议上发表的讲话中强调说：“从联合国贸发会议的讲坛到南北对话和阿拉伯—非洲外长会议，我们都在寻求最有效的道路和方法以建立一个更加公正的新的世界秩序。”"},{"type":"paragraph","text":"东非共同体共同市场和经济事务部长罗伯特·奥乌科最近在坦桑尼亚阿鲁沙召开的东非共同体管理机构的一次讨论会上指出，发展中国家必须依靠它们自己的努力和它们之间的合作，才能改变现存的世界经济秩序。他说，第三世界国家应当懂得发达国家是不会为它们改变现存的秩序的。"},{"type":"paragraph","text":"新华社布加勒斯特电　罗马尼亚《社会主义时代》半月刊今年第十三期发表一篇文章，阐述罗马尼亚对建立新的国际经济和政治秩序的看法，强调必须消除对别国内政的干涉。"},{"type":"paragraph","text":"文章说，近几十年来在世界上所发生的深刻的革命，把从国际生活中消除那种由剥削制度和帝国主义所建立的关系体制尖锐地提到日程上来了。"},{"type":"paragraph","text":"文章指出，当前的国际政治结构是建立在把世界划分为势力范围、利益区域和集团的基础之上的。"},{"type":"paragraph","text":"文章说，铲除帝国主义在国家关系中的实力政策和发号施令政策，建立公正和权利完全平等的关系，消除不发达状态，使国际关系民主化，使各国人民要求缔造自己的生活、自己主宰自己命运的意志得到充分确立，并确保各国对民族财富的永久主权等等，这些都是建立新的国际秩序的目标，不能把这些目标同历史进步、世界革命的进程割裂开来。"},{"type":"paragraph","text":"文章强调说，从国际生活中铲除一个国家对另一个国家内政的干涉是新的国际经济与政治秩序的根本内容。为了建立新的国际经济与政治秩序，就必须创造必要条件，让每个国家人民能够“独立自主地决定自己的命运，自由地选择自己的经济、社会发展道路和社会政治制度”。"},{"type":"paragraph","text":"文章最后说，生活本身明确地指出，独立的民族国家不仅没有结束它的历史作用，相反，它们是新的国际经济与政治秩序的基本组成部分。历史表明，那种破坏民族国家的国际政治结构是造成不稳定和不安全的经常性根源。民族国家在国际政治生活中正起着越来越大的作用。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"278ce550f5"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
