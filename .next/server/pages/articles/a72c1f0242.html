script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"工人阶级争当抓革命促生产的模范  大同杏儿沟煤矿职工在反击右倾翻案风斗争中焕发出极大的社会主义积极性，提前完成今年第一季度原煤生产计划","authors":[],"dates":[{"year":1976,"month":3,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"工人阶级争当抓革命促生产的模范"},{"type":"paragraph","text":"大同杏儿沟煤矿职工在反击右倾翻案风斗争中焕发出极大的社会主义积极性，提前完成今年第一季度原煤生产计划"},{"type":"paragraph","text":"据新华社太原一九七六年三月二十六日电　在反击右倾翻案风的伟大斗争中，山西省大同市杏儿沟煤矿党总支以阶级斗争为纲，带领广大职工深入批判党内那个不肯改悔的走资派抛出的“三项指示为纲”的修正主义纲领，坚持抓阶级斗争，促煤炭生产，以实际行动痛击右倾翻案风。到三月十六日，这个矿已提前完成今年第一季度国家煤炭生产计划。与去年同期相比，原煤产量提高百分之二十一，全员劳动效率提高，成本下降，其它各项经济技术指标都取得较好的成绩。"},{"type":"paragraph","text":"伟大领袖毛主席亲自发动和领导的反击右倾翻案风的斗争开始以后，大同市杏儿沟煤矿党总支领导成员站在斗争的前列，带头认真学习毛主席关于无产阶级文化大革命和反击右倾翻案风的一系列重要指示，学习马列主义，带头批判修正主义，带头反击右倾翻案风。党总支还举办各种类型的学习班，培训理论骨干，发动广大工人群众积极投入到这场伟大的斗争中来。全矿广大职工通过学习，对社会主义革命的性质、对象、任务和前途有了进一步的认识。广大干部、工人同仇敌忾、口诛笔伐，把斗争锋芒直指抛出“三项指示为纲”的党内那个不肯改悔的走资派。他们利用班前班后的休息时间写批判文章，开批判大会，经常战斗到深夜。"},{"type":"paragraph","text":"这个矿的广大职工反复学习毛主席关于“什么‘三项指示为纲’，安定团结不是不要阶级斗争，阶级斗争是纲，其余都是目”的教导，深入批判“三项指示为纲”的修正主义纲领及其理论基础阶级斗争熄灭论和唯生产力论，进一步提高了阶级斗争、路线斗争和无产阶级专政下继续革命的觉悟。革命是历史的火车头，是发展社会主义生产的强大推动力。反击右倾翻案风的斗争，大大激发了广大工人、干部的社会主义积极性，他们提出，我们工人阶级就是要坚持抓革命、促生产，两副重担一肩挑。这个矿的领导干部和科室人员纷纷深入到生产第一线，和工人群众一起学习，一起开展大批判，一起参加生产劳动。采煤二队的广大职工，从教育战线开展革命大辩论以来，就十分关心这场斗争，他们过春节不回家，坚持与党内不肯改悔的走资派对着干，加班加点不计报酬。经过全队工人的努力，提前一个月超额完成了今年第一季度原煤生产计划。采煤一队工人们以主人翁的姿态，打破工种界限，广泛开展“一专多能”活动，工种、班组之间互相支援，互相帮助，今年第一季度的原煤产量比去年同期翻了一番。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"革命大批判","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a72c1f0242"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
