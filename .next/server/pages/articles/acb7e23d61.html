script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"华东师大同学展开对资产阶级思想的斗争","authors":["陆振山"],"dates":[{"year":1952,"month":3,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编辑同志:以三反运动为起点的思想改造运动，已在我校毛泽东思想学习委员会的领导下轰轰烈烈地展开了。经过了十天的文件学习和小组讨论，并结合了二次大报告，在上月廿九日就转入了坦白交代非无产阶级思想的阶段。在坦白交代的时候，发现资产阶级的腐朽思想，已经侵袭到我们青年学生的身上并起了腐蚀作用。有的同学坦白过去窃取伙食费、会费等公款的不法行为；有的同学交代了接受商人“回佣”的卑劣事件；有的同学愤怒地控诉资产阶级家庭给他的“享乐至上，唯利是图”的恶劣影响。总之，每个同学都或多或少的被资产阶级思想所侵蚀，而成为思想上不健康的人。"},{"type":"paragraph","text":"我们师范大学的学生，将来的任务是做“灵魂的工程师”；但我们这些未来的“灵魂的工程师”，自己的灵魂深处却都被资产阶级的思想所腐蚀了!试问我们将来如何能担当起祖国交给我们的光荣任务呢?所以，同学们对这种害人思想，都表示深恶痛绝，并坚决地对资产阶级思想展开有力的斗争!现在全师大的人都提枪上阵了。并且我们有信心在斗争中取得彻底的胜利。"},{"type":"paragraph","text":"华东师范大学学生　陆振山"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"acb7e23d61"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
