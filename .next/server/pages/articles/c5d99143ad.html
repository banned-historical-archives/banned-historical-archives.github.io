<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"解放前欺压蒙旗人民　解放后破坏民族团结","authors":[],"dates":[{"year":1957,"month":8,"day":27}],"is_range_date":false,"parts":[{"text":"解放前欺压蒙旗人民  解放后破坏民族团结：蒙族右派荣祥一贯反共反人民","type":"title"},{"text":"新华社呼和浩特27日电  右派分子荣祥(蒙古族)破坏民族团结和反共、反人民的阴谋活动已被揭露。经过蒙古和汉、回、满等族人民一个多月的说理斗争，荣祥理屈词穷，被迫认罪。","type":"paragraph"},{"text":"荣祥现任呼和浩特市副市长、内蒙古自治区人民委员会委员。解放以来，他一直对新社会不满，四处散布毒言恶语。在这次整风运动开始后，他向人民进攻的重要目标之一是破坏共产党与蒙古民族之间、蒙古民族与汉民族之间和蒙古民族内部的团结。他诬蔑说：“现在还不如清朝哩”，还颠倒黑白地说：“在清朝蒙汉人民还是相安无事的，可是现在呢？却互相整得七死八活。”从前土默特旗存在着旗县并存的不合理现象，解放后，共产党和政府为加强民族团结，按照当地大多数蒙汉人民的愿望加以合理解决。但是荣祥却借此大肆攻击，说什么：“国民党作不出来的事情，共产党作出来了。”他煽惑划到呼和浩特市的蒙古族人民说：“你们找到了后娘，不会有人替你们说话的。”他还在蒙古民族内部制造分裂，硬把内蒙古自治区分成东、西对立的两个部分，说：“东部来的蒙古人有‘关门主义’”。荣祥还诬蔑共产党和我国的各项政治制度。他说：“共产党有两个来源——主观主义和官僚主义；一个组成部分——宗派主义”，“旧官僚正在学习改造，新官僚却在发展，真是新旧官僚交替”，“共产党把人整得上天无路，入地无门。”","type":"paragraph"},{"text":"据揭露，荣祥反共反人民是一贯的，他在解放前就被人们称“土王”。他历任伪蒙旗宣慰使、国民党蒙藏委员会委员和山西省第二届参政会参政员、土默特旗总管等职务。他曾发表“蒙汉同源论”，说什么蒙古民族是汉族的一个宗支筹谬论，帮助国民党反动派推行同化、奴役蒙古民族的政策。在人民解放战争期间，荣祥又发表了“告蒙古青年书”等反共文告，要蒙古族人民和青年“投明(指国民党)弃暗(指共产党)”。","type":"paragraph"},{"text":"在最近的一个月当中，蒙古族人民与荣祥在政协内蒙古自治区委员会扩大会议上，展开了面对面的说理斗争；各机关、各阶层的蒙古族干部和人民也纷纷在报纸上发表文章揭露和批驳荣祥的反共、反人民言行。土默特旗和呼和浩特市的蒙古族人民在内蒙政协召开的反右派大会上，用他们在共产党的领导下、亲密团结的幸福生活粉碎了荣祥的谰言。并用土默特旗的变迁来说明在新旧社会里蒙古民族的不同遭遇。他们指出：在明朝时，土默特旗可以出兵三十万，经过清朝、国民党的统治到解放初期土默特旗蒙古人只剩下了两万多人。关于已往旗县并存的情况，许多人在发言中指出这是国民党对蒙汉人民采取分而治之政策的结果，极端不利于蒙汉人民的解放事业和蒙古人民的发展。取消旗县并存后，住在呼和浩特市的蒙古族人民占全市人口的5．27％，而在呼和浩特市人民代表大会中蒙古族代表却占代表总数16．75％。与会的人对荣祥的反共反人民的谰言逐条进行了驳斥。荣祥破坏民族关系的谎言被全部揭穿后，他才被迫认罪，开始交代问题。","type":"paragraph"},{"text":" 来源：《光明日报》1957年8月28日。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c5d99143ad"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
