" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji52","name":"毛泽东全集第52卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji52.pdf"],"article":{"title":"读《更记》批语","alias":"","parts":[{"type":"paragraph","text":"读《宋书》批语"},{"type":"paragraph","text":"太祖元嘉九年，诏日：“古者明王经国，司勋有典。平章以驭德刑，班瑞以畴功烈。··.…·大司马临川烈武王，故司徒南康文宣公穆之，侍中、卫将军、开府仪同三司、录尚书事、扬州刺"},{"type":"paragraph","text":"史华容县开国公弘，使持节、散骑常侍、都督江此时檀道济"},{"type":"paragraph","text":"州豫州西阳新蔡晋熙四郡军事、征南大将军、开尚未死\""},{"type":"paragraph","text":"府仪同三司、江州刺史永修县开国公道济，故左将军、青州刺史龙阳县开国侯镇恶，或履道广流，秉德冲邈，或雅量高，风鉴明远，或识唯知正，才略开迈。”[卷五十一《宗室刘道怜传》"},{"type":"paragraph","text":"第3~4页]叛徒"},{"type":"paragraph","text":"王僧达，琅邪临沂人，太保弘少子。兄锡，质讷乏风采。太祖闻僧达蚤慧，召见于德阳殿。问其书学及家事，应对闲敏。上甚知之，妻以临川王义庆女。少好学，善属文。年未二十，以为"},{"type":"paragraph","text":"始兴王后军参军，迁太子舍人。坐属疾，于杨"},{"type":"paragraph","text":"[1]《宋书·宗室传》中的诏书发于元嘉九年，檀道济在元嘉十三年被杀。"},{"type":"paragraph","text":"读《宋书》批语"},{"type":"paragraph","text":"尚未此时撒死"},{"type":"paragraph","text":"1"},{"type":"paragraph","text":"永言深怀便宜敬是前式兹嘉礼勒功天府戎每惟道动思遵合典而太常未记尚以隆景业固以姬且方轨伊邵者矣朕以算德纂鉴明远或识唯知正才略开薄咸文德以熙帝载武功县开国侯恶或履道广流秉德冲邈或雅量高风江州刺史永修县开国公道济故将军青州刺史龙阳西阳新蔡晋熙四郡军事征南大将军开府仪同二司史华容县开国公弘使持散常侍都督江州豫州公穆之侍中将军开府仪同二司录尚书事扬州刺沙景王故侍中大司马川烈武王故司徒南康文宣民青长上-列传十一"},{"type":"paragraph","text":"东读《荣书》批注的丰稿毛泽东全集第五十二卷"},{"type":"paragraph","text":"列桥观斗鸭，为有司所纠，原不问。性好鹰犬，与问里少年相驰逐，又躬自屠牛。···先是南彭城蕃县民高阔、沙门释昙标、道方等共相逛惑，自言有鬼神龙凤之瑞，常闻箫鼓音，与秣陵民蓝宏期等谋为乱。又要结殿中将军苗允、员外散骑侍郎严欣之、司空参军阙千纂、太宰府将程农、王恬等，谋克二年八月一日夜起兵攻宫门，晨掩太宰江夏王义恭，分兵袭杀诸大臣，以阔为天子。事发觉，凡党与死者数十人。僧达屡经狂逆，上以其终无俊心，因高阔事陷之。「卷七十五《王僧达传》第1~8页】"}],"authors":["毛泽东"],"dates":[],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":332,"page_end":334},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b3829c856b"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
