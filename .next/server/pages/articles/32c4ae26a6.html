" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"魏太星的右派言论","authors":["河南医学院","魏太星"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"魏太星的右派言论","type":"title"},{"text":"河南医学院魏太星","type":"authors"},{"text":"[魏太星：河南医学院内科基础教研组讲师、民盟盟员]","type":"subtitle"},{"text":"咱们医学院要弄好，非把卢长山撤职不可。","type":"paragraph"},{"text":"他们(指党)是捧人捧到云彩眼里，踩人踩到脚底下。","type":"paragraph"},{"text":"党员都是平时向党汇报的人，不敢得罪他们，得罪他们不利。","type":"paragraph"},{"text":"现在的社会是六亲不认，儿子不认父亲，妻子不认丈夫，家族不团结，社会不团结。","type":"paragraph"},{"text":"三反时没有报复不可能。当时我是工会主席，带头贴大字报，后来斗了我，这不是报复？","type":"paragraph"},{"text":"党的整风运动是开门整风还是关门整风？还是半开半关？那小舅子才知道。","type":"paragraph"},{"text":"马列主义不一定作指导思想，马克思列宁都不是中国人。","type":"paragraph"},{"text":"“实践论”要是你写的，那就不会这么讨论。","type":"paragraph"},{"text":"咱们医学院的干部太驯服了，若是别的地方早就干起来了。","type":"paragraph"},{"text":"来一个老爷带一个太太，我认为都可以走，医学院留一个赵文定就行了，咱们学校有太太阶级，光拿钱不干活，不适合这里工作，叫她们(指女党员)回农村去。","type":"paragraph"},{"text":"人事制度也要改，干部科只知掌握生死簿。咱学校会计科有一批黑名单，光拿钱不干活，都是太太阶级。","type":"paragraph"},{"text":"党员为啥不鸣呢？他们不敢说话。","type":"paragraph"},{"text":"啥“工人说话了”，还不是那几个人！","type":"paragraph"}],"comments":[],"origin":"《右派言论集》（河南医学院马列主义教研室编印，1958年4月）。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"32c4ae26a6"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
