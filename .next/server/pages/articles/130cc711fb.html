<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"罪恶的奴隶贸易","authors":["升平"],"dates":[{"year":2001,"month":9,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"罪恶的奴隶贸易"},{"type":"paragraph","text":"编者按：在第三届世界反种族主义大会上，是否应对历史上的奴隶贸易和殖民统治进行赔偿成为焦点之一。奴隶贸易到底是怎么回事？"},{"type":"paragraph","text":"从15世纪中叶至19世纪末，非洲历史上出现了一次骇人听闻的大灾难，这就是马克思称之为“贩卖人类血肉”的奴隶贸易。"},{"type":"paragraph","text":"西方殖民者一手制造了这场长达四个多世纪的历史悲剧。15世纪初，西方殖民者纷纷进行海外扩张。随着殖民扩张的发展，开始出现了掠夺黑人作为奴隶的交易活动。到了15世纪中叶，随着美洲被发现、种植园的创建、金银矿的开发，罪恶的奴隶贸易随之愈演愈烈。最早掠卖黑奴的是葡萄牙和西班牙殖民者。16世纪下半叶，荷兰、丹麦、法国、英国等国殖民者相继加入这项血腥的贸易中。18世纪初叶，英国取得奴隶贸易的垄断权，利物浦成为奴隶中心市场。19世纪前半叶，美国殖民者也大肆从非洲劫掠黑人，高价卖给美洲的矿主和种植园主作奴隶，从中牟取暴利。西方殖民者把黑人作为商品转卖到西印度群岛和南、北美洲大陆的种植园里；也有的黑奴被运到阿拉伯国家和亚洲其他国家。因此，奴隶贸易实际上涉及到今天的欧、北美、亚、非和拉丁美洲五大洲。据统计，有2亿多非洲黑人惨遭此劫。他们有的在捕捉时被杀害，有的在贩运的路上被折磨致死，幸存下来的则被作为活的商品，多数被卖到了美洲种植园，过着牛马不如的生活。"},{"type":"paragraph","text":"奴隶贸易大致可分三个阶段。从15世纪中叶至16世纪80年代是以海盗式掠卖为主要特征的奴隶贸易初期阶段；16世纪80年代到18世纪下半叶是以奴隶专卖组织垄断为中心的奴隶贸易全盛时期；从18世纪末到19世纪末是以奴隶走私为特点的“禁止”奴隶贸易时期。"},{"type":"paragraph","text":"400年的奴隶贸易为欧美西方殖民国家聚敛了巨额财富，成为其资本原始积累的重要来源之一，曾是人类文明发源地之一的非洲大陆却因此失去大量人口，社会生产力遭到严重破坏。奴隶贸易除了给非洲大陆贻祸无穷外，至今仍危害世界和平的种族主义也是其遗害之一。（升平）（附图片）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"130cc711fb"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
