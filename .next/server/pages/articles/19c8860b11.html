script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"浙江新登等地新谷登场粮价跌引起农民对劳动生产恢心失望","authors":[],"dates":[{"year":1950,"month":8,"day":30}],"is_range_date":false,"parts":[{"text":"浙江新登等地新谷登场粮价跌引起农民对劳动生产恢心失望","type":"title"},{"text":"(浙江日报八月三十日讯)浙江新登、桐庐、丽水等地农民群众纷纷要求政府迅速解决新谷登场粮价下跌问题。八月中旬，新登的粮价每担由十二万五千元跌至八万五千元。桐庐米价从每斤一千二百八十元跌至八百元。丽水粮价由每担八万元跌至六万元，还在继续下跌。而农民所需的(由五斤谷买一斤涨到十斤谷买一斤)、盐、烟(均上涨一倍)等日用必需品却不断上涨，农民把粮食拿到市场上去没有人要。因粮价下贱，农民对劳动生产恢心失望。","type":"paragraph"}],"comments":[],"origin":"新华通讯社编《内部参考》1950年9月6日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"19c8860b11"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
