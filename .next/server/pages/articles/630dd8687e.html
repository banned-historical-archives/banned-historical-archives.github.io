script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"资产阶级的反动文艺作品使我意志消沉","authors":["王纪棠"],"dates":[{"year":1952,"month":6,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"震旦附中　王纪棠"},{"type":"paragraph","text":"“飘”、“虎魄”、“风萧萧”、“塔里的女人”(无名氏作)这些传播资产阶级思想毒素的文艺作品，都是我过去最喜欢阅读的一些文艺作品；我曾经被这些作品中的悱恻的情节、浪漫的恋爱故事而倾倒。这些作品曾经使我在人生的道路上徬徨了两年多，我丧失了正确的人生观；两年多以来，常常在工作上学习上闹情绪，个人利益至上，不服从集体利益。"},{"type":"paragraph","text":"“飘”这本小说就曾经模糊了我的阶级意识；并使我错误的认为黑人总是比较愚蠢的、丑陋的，我在这部小说中接受了作者的“白种民族最优越”的宣传。我又曾在徐訏作的一本小说中看到这样一句话:人是属于情，属于虚幻，属于浪漫的。当时我认为这是一句金科玉律的话，于是在我自己平时的写作上，也是:情、虚幻、浪漫。以致同学把我叫成“浪漫作家”；我的人生观，就是“人生在世，及时行乐”。"},{"type":"paragraph","text":"由于受了这些文艺作品的影响，我就热烈地追求、羡慕、留恋资产阶级的生活方式，我穿阔肩的西装，戴阔边的太阳眼镜，我认为这是我的英俊和潇洒，同学们都叫我做“美男子”；我平时就跑跑咖啡馆，听听爵士音乐。"},{"type":"paragraph","text":"由于受了“塔里的女人”的影响，我又幻想着将来能过悠闲的生活，过田园的生活，我认为这是人生最大的幸福；为劳动人民服务的思想根本就没有；我只是想:世界上只要我一个人愉快就可以了。"},{"type":"paragraph","text":"由于这些小说的影响，在恋爱观上我曾得了这样一条定律:爱情的创造是需要金钱的。认为有了钱就能获得爱。"},{"type":"paragraph","text":"在五反运动当中，我认清了资产阶级的本质及其思想对青年的危害性，我检查了自己的思想，初步划清了界线。影响我的思想的，主要有两个来源:一是美国电影，另一就是传播资产阶级思想毒素的文艺作品的影响。我要新生，我坚定地改造自己，成为毛泽东时代的一个好青年，立志做个劳动者，并争取做一个光荣的优秀的青年团员!"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"630dd8687e"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
