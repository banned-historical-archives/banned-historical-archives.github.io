<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"向天津学术界和高等学校师生发表的讲演","authors":["南开大学","雷海宗"],"dates":[{"year":1957,"month":6,"day":2}],"is_range_date":false,"parts":[{"text":"向天津学术界和高等学校师生发表的讲演","type":"title"},{"text":"南开大学雷海宗","type":"authors"},{"text":"新华社天津3日讯　天津南开大学历史系教授雷海宗，2日向天津学术界人士和高等学校师生发表学术讲演时，受到大多数听众的热烈欢迎。这是雷海宗在人民日报对他前次在一个座谈会上的发言加了编者按语以后，第一次就他的学术思想作公开讲演。前来听讲的人比著名的明清史专家郑天挺讲演时还踊跃。在雷海宗讲演前后甚至中间休息时，听众都用长时间热烈掌声欢迎他。有些学生还找他谈。在讲演时大家精神很集中。在休息时三、五一群议论纷纷。有几个青年说：“看看人家真有学问”“过去我们讲国家的起源太简单了，人家讲的多好！”还有的说：“今天最好叫教条主义者也来听听，如果他们来，一定感到很不舒服。”据说这种情况，是过去几次学术讲座中没有的。","type":"paragraph"},{"text":"雷海宗在报告中用语很含蓄，具体材料较多，而且抓住马克思的个别语句，好像是保卫马克思主义，实际上在一些根本问题上反对马克思主义。他提出了几点论点。","type":"paragraph"},{"text":"(一)否认有奴隶社会的存在。他认为就全世界的历史来说，奴隶社会根本不存在。除了雅典、罗马奴隶制比较发展外，其他地区没有奴隶社会。即使这些奴隶制高度发展的地方，奴隶在生产中也不占主要地位。奴隶主对奴隶没有残酷的剥削(他认为生产力极低的情况下，就不可能有残酷的剥削)；相反地，大量的奴隶是寄生阶级，王公贵族用剥削劳动人民的东西来养活他们，对他们像家庭的成员一样。有的地方奴隶不但可以和自由民结婚，还可以同贵族结婚。他们和自由民的区别，只是不能服兵役，不能参加公共体育场所的活动。因此，他主张历史上有亚细亚生产方式这一个独立的时代，这个时代叫亚细亚生产方式也可以，叫其他生产方式也可以。至于铁器时代的前一段，他认为不应叫奴隶社会，应该回到马克思称的“古典生产方式”，因此奴隶社会是不存在的。","type":"paragraph"},{"text":"(二)关于生产力的概念，他同意“生产力是生产物质资料时所使用的生产工具和具有一定劳动经验和技术使用生产工具生产物质资料的人”这个定义，但他又认为如果研究历史，则不应强调人这个方面。他认为研究历史需要知道得具体一些，关于人的经验、技术究竟指的是什么？在铜器时代和铁器时代，许多所谓技术、经验，今天没人知道，只能推论。因此，这个问题不必强调。如果过多强调，遇到难说的问题就一下子滑过去了，而生产工具是滑不过去的。这个问题在理论上不能忽视，但实际上只要有这种工具，就应该假定有一定的经验、技术。比如以锯作例子，真成合用的锯是在铜器时代，好的是铁器时代，而实际上在石器时代就有了。它们的技术怎么样？恐怕石器时代的石锯要求技术更高，不然一使用就坏了。","type":"paragraph"},{"text":"(三)关于国家起源的认识，雷海宗反对目前一般的说法，就是原始社会的末期，有了剩余产品，随着阶级的产生，出现了国家。他认为：在铜器时代，很多人的意识仍然是原始社会的氏族，人与人的关系仍是氏族间的血缘关系。整个社会还是在原始的氏族公社笼罩之下。实际上原来替大家办事的氏族公社，慢慢变成了统治机构。这个变化很慢、很复杂，表面上看是原始社会，实质上变了。","type":"paragraph"},{"text":"雷海宗认为研究古代历史，与今天任何实际的政治问题没有关系。他说，他不明白为什么现在一讨论到铜器时代和铁器时代的社会性质时有人就那末动感情，他以嘲笑的口吻说，这大概是需要心理学家研究的问题。","type":"paragraph"},{"text":"最后，雷海宗还提出目前暂时不要谈这个问题，因为材料很少，不仅关于生产工具的材料少，生产关系的材料更少，要谈这个问题，就应该拿出材料来。(石坚)","type":"paragraph"},{"text":" 来源：1957年6月10日新华通讯社编《内部参考》。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"261da89b1a"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
