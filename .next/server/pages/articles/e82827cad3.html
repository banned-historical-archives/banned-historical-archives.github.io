<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"资产阶级民主进了厕所","authors":["梁汝怀"],"dates":[{"year":1958,"month":12,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"资产阶级民主进了厕所"},{"type":"paragraph","text":"梁汝怀"},{"type":"paragraph","text":"从法国的虚伪的选举，我忽然想起一部讽刺片“科伦上尉”。"},{"type":"paragraph","text":"“科伦上尉”是民主德国的出品，写的是西德一个失业的招待员阿尔培特的遭遇，跟法国的国会选举并无丝毫瓜葛。可是，戴高乐、苏斯戴尔之流的行径，总是叫人想到影片里那些从监狱、从阴黯的角落爬出来的法西斯战犯们。从这一场选举中，也容易叫人联想起那个招待员怎样当上了议员。“科伦上尉”对西德垄断资本集团及其工具——议会、政府，作了深刻的解剖。假上尉的遭遇，一片真实的镜子，照出了资产阶级统治下的选举和议会，只不过是一场骗人的把戏。法国的选举，也完全印证了这一点。"},{"type":"paragraph","text":"法兰西共和国自诩为保持了悠久的民主传统的，虽然它的民主，只是占少数的资产阶级管绝大多数人民的假民主，但时至今日，资产阶级日暮途穷，力竭声嘶，连这块遮羞布也不要了。法国人民的代表——法国共产党，在被限制、被迫害的情况下，获得了20％的选票，却只有2％的议席。而那些只骗得少数选票的资产阶级政党，却勾搭起来，依靠笑话奇谈的选举法，攫取了大部分的议席。连“纽约先驱论坛报”都不得不承认“在人民投票和议会的代表性之间存在着惊人的矛盾现象。”这样的议会，还能有什么民主可言！“科伦上尉”里有这么一段情节：被误认为战犯而被垄断资本家重用的阿尔培特正在议会讲坛上宣传大赦法案的时候，台下两个政党的头子有这么一段对话："},{"type":"paragraph","text":"甲：如果你们这样，那大赦案就通不过了！我们不是讲好了吗？……您要是真的拖我们后腿的话，那您也不见得会有好处！"},{"type":"paragraph","text":"乙：那还用说吗？不过我们的投票人有这种情绪！"},{"type":"paragraph","text":"甲：投票人的情绪？请问这值多少钱？……您考虑考虑吧！我得到了可靠情报，目前你们的党报很可能要关门大吉！如果你需要找些贴补的话，这个我有办法！乙：那再好也没有了，不过我还不知道怎么去说服全党！"},{"type":"paragraph","text":"甲：不一定全党，有个别的弃权，这不怕，而且还有好处，主要是保证我们获得多数！"},{"type":"paragraph","text":"这一场政治交易就这样谈妥了，大赦案通过了，战犯们统统出狱了。这场谈判是在厕所里进行的，这是电影制作者的一个巧妙的手法。事实不正是如此吗？这段谈话本身，连同这个充满了政治买卖的议会，不是跟厕所里一样地肮脏龌龊，一样地臭气冲天吗？"},{"type":"paragraph","text":"在戴高乐耍了他的政治把戏之后，法兰西的资产阶级民主也已经进了厕所了。从法国的资产阶级来说，在国内民主力量的强大压力、殖民地人民要求独立斗争的发展和资产阶级的反动政策到处碰壁的情况下，它不得不抛出法西斯独裁这最后一张王牌了。但从法国人民来说，这也未尝不是一件好事，因为资产阶级统治者的这最后一张王牌，说明他们的赌注已经输光了，他们也已经套上了无法解脱的绞索，而把绞索的另一端交给法国共产党和法国人民。那些对资产阶级民主还有幻想的人，也可以被厕所里的这股臭气冲得清醒一些。"},{"type":"paragraph","text":"然而法国资产阶级的这最后一张王牌，貌似很凶，其实又算得了什么货色！希特勒打过这张牌，结果全军复灭，连自己也尸骨无存；墨索里尼也打过这张牌，结果陈尸米兰街头；不料到今天还有人在这已经被全世界人民唾弃的骸骨上做好梦。试问：他们还能指望得到比这些前辈们更好的下场么？"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e82827cad3"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
