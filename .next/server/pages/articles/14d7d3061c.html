<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji38","name":"毛泽东全集第38卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji38.pdf"],"article":{"title":"关于中国人民志愿军撤出朝鲜问题给金日成的电报","alias":"","parts":[{"type":"paragraph","text":"关于中国人民志愿军撤出朝鲜问题"},{"type":"paragraph","text":"给金日成的电报"},{"type":"paragraph","text":"（1958年1月24日）金日成首相同志："},{"type":"paragraph","text":"一九五七年十二月十六日和二十五日两次来信都已经收到了。"},{"type":"paragraph","text":"来信中关于中国人民志愿军撤出朝鲜的问题所提出的两个方案，我们已经仔细地研究过。我们觉得，由朝鲜民主主义人民共和国主动提出外国军队撤出朝鲜的要求，然后由中国政府响应朝鲜政府的要求，是比较适宜的。因此，我们认为采用十二月十六日来信中所提出的方案较好。对于这个方案，我们提出一些具体意见。这些意见，我们已经同苏联政府商量过，他们表示完全同意。现将这些意见函告如下，请你和朝鲜劳动党中央考虑是否妥当。"},{"type":"paragraph","text":"1.由朝鲜民主主义人民共和国最高人民会议写信给联合国，要求联合国军撤出朝鲜，的确是有一定的好处的，因为这样可以便于苏联作为联合国的一个成员国在联合国内提出主张，推动联合国采取行动。但是，这个方式也有缺点，那就是把整个联合国作为同我们敌对的一方，而实际上派出侵略军队组成联合国军的，只是少数联合国的成员国。因此，我们建议由朝鲜民主主义人民共和国政府发表一个公开声明。声明中根据朝、中方面在一九五四年日内瓦会议上关于朝鲜问题的基本主张，提出以下的建议："},{"type":"paragraph","text":"关于中国人民志愿军撤出朝鲜问题给金日成的电报（1）联合国军和中国人民志愿军同时撤出朝鲜；"},{"type":"paragraph","text":"（2）由朝鲜南北双方在对等的基础上进行协商，以建立和发展南北朝鲜之间的经济和文化关系，并且筹备全朝鲜的自由选举；"},{"type":"paragraph","text":"（3）在外国军队完全撤出南北朝鲜以后的一定时期内，在中立国机构监督之下举行全朝鲜的自由选举。"},{"type":"paragraph","text":"2.在朝鲜民主主义人民共和国政府发表了公开声明以后，中国政府接着发表声明，支持朝鲜政府的主张，并且正式表示准备同朝鲜民主主义人民共和国政府协商分批定期撤走中国人民志愿军的问题，同时要求联合国军方面有关各国政府采取同样的步骤。"},{"type":"paragraph","text":"3.苏联政府接着也发表声明，支持朝、中政府的声明，强调联合国军方面各国政府应该像中国政府那样响应朝鲜民主主义人民共和国政府的要求，并且建议召开有关国家的会议讨论和平解决朝鲜问题。"},{"type":"paragraph","text":"4.今年二月中，周恩来同志代表中国政府访问朝鲜期间，朝中两国政府可以在联合公报中宣布，中国政府已经商得中国人民志愿军的同意，中国人民志愿军决定在一九五八年年底以前分批撤出朝鲜。在联合公报中，朝、中两国政府可以声明，中国人民志愿军在联合国军之前撤出朝鲜，是为了和缓紧张局势，便于朝鲜南北双方在对等的基础上协商朝鲜的和平统一。因此，联合国军应该采取同样的行动。同时，中国人民志愿军发表声明表示：中国人民和朝鲜人民是唇齿相依、患难与共的，中国人民志虑军撤出朝鲜决不是对朝中人民休戚相关的利益置之不理。如果李承晚\"和美国重新进行挑畔，越过停战线，那末，中国人民志愿军在朝鲜政府提出要求的"},{"type":"paragraph","text":"[1]李承晚（1875一1965），当时任南朝鲜即韩国总统。毛泽东全集第三十八卷情况下，将毫不犹豫地再一次同朝鲜人民军并肩击退侵略。"},{"type":"paragraph","text":"5.中国人民志愿军撤出朝鲜的时间表，我们初步拟定如下："},{"type":"paragraph","text":"（1）一九五八年三月至四月，在朝、中两国政府发表联合公报以后，撤回三分之一，其余的三分之二均放在第二道防线，由朝鲜人民军全部接防第一线；"},{"type":"paragraph","text":"（2）一九五八年七月至九月，撤回第二个三分之一；（3）一九五八年年底以前撤回最后的三分之一。"},{"type":"paragraph","text":"6.在朝中两国政府联合公报发表后，中立国监察委员会\"的两瑞方面很可能再次提出撤销监察委员会的要求，届时，我们可以根据联合国军尚未撤走的理由，请他们留一最小限度的人数在板门店执行监察任务，但是也要准备他们会不顾而去。"},{"type":"paragraph","text":"以上各点意见，请你们研究后答复。"},{"type":"paragraph","text":"此致敬礼"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一九五八年一月二十四日"},{"type":"paragraph","text":"[1]中立国监察委员会，是根据《朝鲜停战协定》于1954年8月1日成立的，由波兰、捷克斯洛伐克、瑞典和瑞士四国成员组成，执行《朝鲜停战协定》有关条款所规定的监督、观察、视察与调查的职能。"}],"authors":["毛泽东"],"dates":[{"year":1958,"month":1,"day":24}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":463,"page_end":465},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"14d7d3061c"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
