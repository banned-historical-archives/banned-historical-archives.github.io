" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji9-1","name":"毛泽东全集第9卷(1)","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji9-1.pdf"],"article":{"title":"四方面军有充分把握控制降静会定大道","alias":"","parts":[{"type":"paragraph","text":"四方面军有充分把握控制"},{"type":"paragraph","text":"隆静会定大道！"},{"type":"paragraph","text":"（1936年9月26日）朱、张："},{"type":"paragraph","text":"确息：胡宗南部到咸阳未动，其后续尚未到齐。四方面军有充分把握控制隆静会定大道，不会有严重战斗。一方面军可以主力南下策应，二方面军亦可向北移动钳制之。北上后粮食不成问题，若西进到甘西，则将被限制于青海一角，尔后行动困难。"},{"type":"paragraph","text":"英洛恩博稼泽"},{"type":"paragraph","text":"二十六日十二时"},{"type":"paragraph","text":"[1]这是毛泽东和林育英（张浩）、洛甫（张闻天）、周恩来、博古（秦邦宪）、王稼祥给朱德和红军总政治委员张国焘的电报。"},{"type":"paragraph","text":"[2]胡宗南，当时任国民党军西北“剿匪”总司令部第一军军长兼第一师师长。"},{"type":"paragraph","text":"[3]隆静会定大道，指甘肃隆德（今属宁夏）、静宁、会宁、定西间的公路。"}],"authors":["毛泽东"],"dates":[{"year":1936,"month":9,"day":26}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":170,"page_end":170},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"62e06529a7"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
