" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"天津市民主党派整风劲头不足","authors":["编","黄军"],"dates":[{"year":1958,"month":2,"day":21}],"is_range_date":false,"parts":[{"text":"天津市民主党派整风劲头不足","type":"title"},{"text":"黄军编","type":"authors"},{"text":"新华社天津讯　天津市各民主党派市级机关整风两个月来有一定收获。但总的看来，多数党派开展得不太好，劲头不足，解决问题不多。其原因主要是领导决心不大，发动群众不够，参加整风运动的成员有不少思想障碍。","type":"paragraph"},{"text":"(一)各党派参加整风的成员，普遍存在着“三不、五怕”的思想。三不：一是不重视。认为民主党派整风与行政整风重复，可有可无，多此一举。二是不服气。认为“民主党派组织需要改造，自己不需要”，“自己是工人阶级的一分子，还要改造立场觉得有些委屈”。“通过反右派斗争知识分子的立场已经改变了，不必再提改造了”。有人还质问“我这顶资产阶级知识分子的帽子戴了九年了，何时才摘得下来？”三是不信任。首先不相信民主党派组织，说“资产阶级性的政党，那能对知识分子进行改造呢？”其次是不信任目前的领导人，说他们的立场观点和大家是“彼此彼此”，由他们来领导整风不可能对自己有帮助。第三是怀疑大字报、辩论会能改造自己政治立场。","type":"paragraph"},{"text":"五怕是：一怕搞成右派。二怕群众批评。三怕暴露问题领导看不起。四怕揭发问题得罪人。五怕耽误业务群众不答应。","type":"paragraph"},{"text":"(二)时间短少而且分散，领导和群众都不能集中精力搞整风。前一阶段各党派整风是每周两次(一次白天，一次晚上)，时间少，相隔日期长。常常是刚辩论起来就散会了，下次辩论一隔好几天，得重新开始。同时各方面整改和行政工作忙，各党派成员参加整风的时间往往得不到保证，出席率低，影响整风的情绪和辩论的深入。","type":"paragraph"},{"text":"为了扭转这种情况，推动各民主党派市级组织认真整风，市委决定建议他们从2月份开始每天用半天时间集中进行整风，并从党内通知各有关单位帮助参加市级整风的民主党派成员安排工作，保证他们的时间，并对他们进行鼓励和督促。","type":"paragraph"},{"text":" 来源：新华社《内部参考》1958年2月21日。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"aa92e28313"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
