" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"川西区党委关于温江县反地主夺佃斗争的通报","authors":[],"dates":[{"year":1950,"month":9,"day":17}],"is_range_date":false,"parts":[{"text":"川西区党委关于温江县反地主夺佃斗争的通报","type":"title"},{"text":"西南局批语：","type":"subtitle"},{"text":"兹将川西区党委关于温江反地主夺佃斗争问题的通报，摘要转发你们参考，希望你们注意研究，并希将你区对这一问题的情况和措施报告我们。","type":"paragraph"},{"text":" 九月二十二日","type":"paragraph"},{"text":"（一）地主在解放前后用各种办法向农民夺佃的很多，以前因工作不深入没有发现，自开始组织农协以来到处发现。但尚未引起各地的普遍重视。现秋收已届，农民与地主，原佃户与新佃户，为互争收割而引起的争执和纠纷很多，影响秋收和农民之间的团结，故目前应将反夺佃作目前发动和组织农民的主要内容之一。同时可通过反夺佃斗争进一步提高农民的阶级觉悟，巩固与扩大农协组织，给地主阶级的反动行为以打击。","type":"paragraph"},{"text":"（二）地主夺佃时间在解放前解放后以及在西南减租条例公布后均有，以前农民因觉悟不够，不敢提，现在则要求一律退还，但干部还不知如何处理。县委的意见是：在解放以前的原则上既往不咎，但在解放前提出解放后正式夺佃者，仍按解放后处理，解放后在西南减租条件公布以前者，须向农民归佃并道歉，而在减租条例公布以后者，则除归佃道歉外，还应令地主赔偿原佃户因夺佃所受的损失。","type":"paragraph"},{"text":"（三）具体做法是在发动农民组织农协的基础上，有领导有组织的向夺佃地主进行说明斗争，然后分别情况，依照上述办法处理；个别顽强抵赖者送法庭判处，必要时可判处徒刑。","type":"paragraph"},{"text":"（四）地主夺回之土地自耕或雇人耕种的很多，大部份是又取得佃金转佃给别的农民了。现在原佃户和新佃户因互争收割发生纠纷，有的已按双方情况调解由双方分收，但新佃户不满意，有的当面承认而背后说二话，有的根本不同意，争吵的很利害，这实际上是侵犯了新佃户的利益。对此，县委的意见是佃权仍归原佃户，但今年的田禾苗是新佃户种的，应由新佃户收割，原佃户之损失由地主负责赔偿，这样新老佃户就可团结一致向地主斗争。对地主夺去自耕或雇人耕种者，可让原佃户收割，除地主所投资的种籽肥料外，都归原佃户所有。","type":"paragraph"},{"text":"（五）有些被夺佃的佃富农和佃中农在反夺佃斗争中，因种种原因不积极，并坚决表示不要，但在斗争出来后，有的要求要，有的仍然不要。对不要者如属佃富农，可由农协提给无地少地之贫苦农民耕种，有的要求要，有的仍然不要。对不要者如属佃富农，可由农协提给无地少地之贫苦农民耕种；但属佃中农者仍以归还原佃廖为宜。粮食如属于中农者仍归中农，属佃富者如其不要则可由农协解放失掉土地的贫苦农民的生产困难问题。","type":"paragraph"}],"comments":[],"origin":"《西南工作》 第24期，中共中央西南局编印（党内刊物发至县团），1950年10月31日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d6867944a3"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
