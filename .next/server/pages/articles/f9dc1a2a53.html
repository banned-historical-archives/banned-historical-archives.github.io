script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"雷锋永远是我们学习的榜样  北京市通县二中师生排除“四人帮”干扰，坚持开展学雷锋的活动","authors":[],"dates":[{"year":1977,"month":3,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"雷锋永远是我们学习的榜样"},{"type":"paragraph","text":"北京市通县二中师生排除“四人帮”干扰，坚持开展学雷锋的活动"},{"type":"paragraph","text":"据新华社讯　北京市通县第二中学排除“四人帮”的干扰，坚定不移地开展学雷锋活动。如今在这个学校，雷锋精神得到很好的发扬，一代新人茁壮成长。"},{"type":"paragraph","text":"在伟大的领袖和导师毛主席关于“向雷锋同志学习”的伟大号召鼓舞下，通县二中几年来坚持开展了学雷锋的活动。学校每学期都召开学雷锋的动员会、经验交流会和总结会，大力宣传雷锋精神，表彰先进，使师生的阶级斗争和路线斗争觉悟不断提高。祸国殃民的“四人帮”为了篡党夺权的需要，拉拢、腐蚀青年，猖狂反对毛主席、周总理倡导的学雷锋活动。去年三月，他们明目张胆地在所控制的报纸上把周总理的题词从新闻稿中砍掉。“四人帮”的这一卑劣行径，激起了通县二中师生的愤怒。他们想：为什么周总理的题词被砍掉，雷锋精神被歪曲，而那个交“白卷”的反革命分子张铁生却被捧上了天？他们回顾了学校开展学雷锋活动所取得的成绩，更加坚信：毛主席的题词光芒万丈，周总理的题词无比正确，任何人想破坏学雷锋的活动都是徒劳的，共产主义战士雷锋永远是我们学习的榜样。就是在“四人帮”干扰、破坏最厉害的时候，学校党支部仍然坚持开展学雷锋的活动。全校一千六百多名学生，组成了近三百个学雷锋小组。以华主席为首的党中央一举粉碎“四人帮”后，学校党支部进一步加强了对学雷锋活动的领导，全校迅速掀起学雷锋的新高潮。"},{"type":"paragraph","text":"通县二中师生认真学习雷锋同志憎爱分明的阶级立场。他们召开诗歌朗诵会，举办展览，热情歌颂伟大的领袖和导师毛主席，歌颂敬爱的周总理，歌颂英明领袖华主席。他们召开各种类型的批判会，愤怒声讨“四人帮”。为了把王张江姚反党集团推行的反革命的修正主义的极右路线批深批透，很多学雷锋小组的学生发扬雷锋同志的“钉子”精神，挤时间努力学习马列著作和毛主席著作，用马克思主义、列宁主义、毛泽东思想的锐利武器戳穿“四人帮”的伪装，揭露他们篡党夺权的罪恶阴谋。"},{"type":"paragraph","text":"通县二中师生还以雷锋同志为榜样，艰苦朴素，助人为乐，拾金不昧，舍己救人。各个学雷锋小组经常帮助附近的工厂、农村、商店、食堂、街道和年老体弱的工人、贫下中农运料、积肥、卖菜、做饭，……象雷锋同志那样满腔热情地去做平凡而有意义的工作。四年级五班团支部，坚持组织团员、青年到长途汽车站打扫候车室，擦洗汽车，扶老携幼，维持交通秩序，群众热情地称赞他们是象雷锋那样的好青年。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"夺权","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f9dc1a2a53"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
