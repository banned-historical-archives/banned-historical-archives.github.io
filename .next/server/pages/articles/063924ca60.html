script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"极右翼借移民问题煽动种族主义情绪  法国政界谴责排外主张","authors":["郑园园"],"dates":[{"year":1991,"month":11,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"极右翼借移民问题煽动种族主义情绪"},{"type":"paragraph","text":"法国政界谴责排外主张"},{"type":"paragraph","text":"本报巴黎１１月２４日电  记者郑园园报道：一周来，法国政界人士纷纷发表谈话，谴责极右翼政党国民阵线提出的解决移民问题的措施，认为这些措施充满排外主义、种族主义，绝对不能接受。"},{"type":"paragraph","text":"１１月１６日，国民阵线总干事长梅格雷在马赛举行的一次讨论会上，提出了该党关于解决移民问题的５０条“具体措施”，其中主要有：为维护法兰西民族的同一性，国籍法中实行“血缘制”；禁止任何新移民入境，强制遣返“陷于困境”的移民；取消国民教育中的“世界主义”，对每个班级的外籍学生人数作出规定；拆除城市中外籍人的居住区，禁止修建清真寺；在就业、住房、社会福利等方面“采取法国人优先”的原则，对雇用外籍人的企业增加税收等。"},{"type":"paragraph","text":"梅格雷的讲话发表后，左右翼政党一致表示反对。社会民主人士中心副主席贝尔纳·斯塔西说，南非的种族隔离制度正在瓦解，而国民阵线却企图在法国搞新的种族隔离，如果这些“措施”付诸实施，法国将被排斥在文明国家的行列之外。"},{"type":"paragraph","text":"共和党名誉主席莱奥塔说，“血缘制”是抄袭维希政府的法律条款，国籍法若恢复它是可怕的做法。"},{"type":"paragraph","text":"社会党议员、前国防部长舍韦内芒认为，国民阵线的政策是在深层社会危机中长出来的一个毒瘤，必须制定一个强有力的、长期的计划来抵制它。"},{"type":"paragraph","text":"社会和融入事务部部长比昂科说，如果国民阵线的主张得以实现，数十万加入法国籍的人将被驱逐出法国。"},{"type":"paragraph","text":"此间报刊分析说，国民阵线的上述主张，是近１０年来国民阵线领导人勒庞各种主张的大汇总，是其极右翼真面目的又一次大暴露。它利用当前法国人对经济形势的失望、对外籍人增多的担忧，蒙骗舆论，煽动种族主义情绪。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"063924ca60"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
