<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"建立抓革命促生产第一线指挥部","authors":["《人民日报》编辑部"],"dates":[{"year":1967,"month":3,"day":12}],"is_range_date":false,"parts":[{"text":"建立抓革命促生产第一线指挥部","type":"title"},{"text":"《人民日报》编辑部","type":"authors"},{"text":"本报今天发表了京郊怀柔县抓革命促生产第一线指挥部成立的消息。成立这种指挥部是当前抓好整个工农业生产，特别是抓好春耕生产的一个极其重要的措施，应当在全国普遍推广。省（市）、地、县各级革命群众组织，革命领导干部和人民解放军当地驻军，都要立即行动起来，建立抓革命捉生产第一线指挥部。尤其要迅速建立县一级的第一线指挥部，以便领导好迫在眉睫的春耕生产工作。无论在已经取得夺权斗争胜利的地区，还是没有夺权或正在夺权的地区，都应当这样做。","type":"paragraph"},{"text":"当前，我国农村无产阶级文化大革命的形势一片大好，广大贫下中农和革命干部的社会主义觉悟普遍提高。《中共中央给全国农村人民公社贫下中农和各级干部的信》发表以后，广大农村的无产阶级文化大革命和农业生产出现了新的局面。广大贫下中农和革命干部，团结一切劳动群众，在当地驻军和有关部门的大力支援下，正在争分夺秒，雷厉风行，掀起一个轰轰烈烈的春耕生产高潮。","type":"paragraph"},{"text":"搞好当前的春耕生产对于争取全年农业生产丰收有极大意义。这是关系到“备战、备荒、为人民”的大事，关系到无产阶级文化大革命胜利进行的大事，关系到巩固无产阶级专政的大事。这不仅是一场生产斗争，也是一场严重的政治斗争。","type":"paragraph"},{"text":"广大贫下中农是农村抓革命促生产的主力军。他们热情高，干劲足，强烈地要求把春耕生产搞好。在这种情况下，迫切需要建立一个坚强的领导班子，把群众的积极性组织起来。正如我们伟大领袖毛主席教导我们的：“如果只有广大群众的积极性，而无有力的领导骨干去恰当地组织群众的积极性，则群众积极性既不可能持久，也不可能走向正确的方向和提到高级的程度。”“三结合”的抓革命促生产第一线指挥部，就是领导好春耕生产最好的组织形式。这种指挥部一建立，立即受到广大贫下中农的热烈拥护，而对于阶级敌人破坏春耕生产的阴谋是一个沉重的打击。它是我国无产阶级和广大革命群众的天才创举。","type":"paragraph"},{"text":"省（市）、地、县抓革命促生产第一线指挥部建立以后，必须突出无产阶级政治，用战无不胜的毛泽东思想来指挥春耕战斗。要大张旗鼓地宣传毛主席的“抓革命，促生产”的伟大方针和《中共中央给全国农村人民公社贫下中农和各级干部的信》，通过开好公社三级干部会议，生产大队或生产队的全体社员会议以及民兵会议，使毛主席和党中央的伟大号召，家喻户晓，深入人心。精神变物质。广大贫下中农和革命干部掌握了伟大的毛泽东思想，就一定会紧紧地团结起来，发挥出冲天的革命干劲，一双铁肩膀挑起革命和春耕两副重担。","type":"paragraph"},{"text":"抓革命促生产第一线指挥部，要深入基层，发动群众，帮助公社以下各级健全领导班子。在领导班子软弱或涣散了的生产大队和生产队，要由贫下中农代表、革命干部和民兵代表组成临时的领导班子，负责生产工作。县级机关要妥善安排本单位的革命和工作，在春耕大忙期间，尽可能抽出更多的干部深入春耕第一线。","type":"paragraph"},{"text":"各级抓革命促生产第一线指挥部，要充分运用无产阶级的权威，在无产阶级大民主的基础上实行高度集中，把人力物力集中到生产第一线上去，狠抓工业、交通、财贸等部门对春耕生产的支援工作，狠抓春耕中关键性的增产措施，落实生产计划，指挥好这一场具有重大政治意义的战斗。同时要百倍地提高警惕，防止党内一小撮走资本主义道路的当权派和地、富、反、坏、右分子的阴谋破坏活动，坚决粉碎阶级敌人的反扑。","type":"paragraph"},{"text":"各级农村工作的干部，每一个共产党员，都应当积极响应毛主席和党中央的伟大号召，在春耕生产的战斗中，相信群众，依靠群众，挺起腰杆，挑起重担，建立新的功勋。犯过错误的同志，只要认真检查和决心改正自己的错误，坚守岗位，抓好春耕生产，将功补过，贫下中农就会谅解他们，支持他们工作。如果因为犯了错误，受到群众的批评，怕这怕那，满肚子怨气，消极怠工，甚至撂挑子不干，那就是错上加错。","type":"paragraph"},{"text":"“多少事，从来急”。广大贫下中农，一切劳动群众，各级干部，支援春耕的人民解放军指战员，在毛主席和党中央的伟大号召下，紧急行动起来，在各级抓革命促生产第一线指挥部的统一领导下，用“只争朝夕”的革命精神，夺取今年春耕生产的伟大胜利！","type":"paragraph"},{"text":" （载《人民日报》一九六七年三月十二日，社论）","type":"paragraph"}],"comments":[],"origin":"载《人民日报》一九六七年三月十二日，社论","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9c39252cdf"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
