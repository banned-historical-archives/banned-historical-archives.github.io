script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"把反对修正主义的斗争继续下去  巴西共产党中央委员会一九六五年五月决议的摘要","authors":[],"dates":[{"year":1965,"month":7,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"把反对修正主义的斗争继续下去"},{"type":"paragraph","text":"巴西共产党中央委员会一九六五年五月决议的摘要"},{"type":"paragraph","text":"现代修正主义虽然遭到种种失败，但仍在继续其阻挠各国人民解放斗争的不光采的任务，继续维护同美帝国主义的共处。"},{"type":"paragraph","text":"当赫鲁晓夫被撤销苏联国家和苏联党的领导职务的时候，全世界的革命者都希望这个党的现领导人，面对赫鲁晓夫给苏联和世界共产主义运动造成的极其严重的损害，走上老老实实作自我批评的道路，改正错误，为各国共产党和工人党的真正团结作出贡献。赫鲁晓夫垮台七个月来，我们遗憾地看到，他的继承人坚持执行的还是那套灾难性的修正主义政策。"},{"type":"paragraph","text":"在社会主义阵营和世界共产主义运动更迫切地需要恢复团结以对付美帝国主义这种形势下，苏共领导却在进行着分裂活动，以此为美帝国主义帮忙。我们愤怒地看到，苏联报刊发表了许许多多的具有公开反华内容的文章。就在最近，这个党的一位重要中央委员、中央书记鲍里斯·波诺马廖夫写了一本书，粗野地对中国共产党及其久经考验的领袖毛泽东发出了最荒唐的诽谤。今年三月，苏联领导人违背一九六○年莫斯科会议确定的兄弟党之间关系的准则，不顾一些重要的共产党和工人党发出反对的正当警告，在苏联首都召开了十九党会议，那是一个地地道道的分裂会议。"},{"type":"paragraph","text":"这些行为证明苏联现领导人正在奉行没有赫鲁晓夫的赫鲁晓夫主义，暴露了他们那种最令人发指的假仁假义。他们口里说要团结，实际却在正式分裂共产主义运动。他们公开攻击中国共产党，但却声称希望改善同这个党的关系。他们声明支持人民动员起来反对美国佬对越南的侵略，但同时却在莫斯科和列宁格勒用暴力镇压在美国外交机关门前举行抗议示威的学生。在纪念战胜纳粹主义二十周年的时候，他们提到斯大林是党和国家在战争期间的主要领导人，但同时却狂热地维护对这位伟大的马克思列宁主义者的令人敬仰的名声大肆抹黑的苏共二十大和二十二大。"},{"type":"paragraph","text":"苏共领导人就是这样在否定马列主义和无产阶级国际主义的基本原则，给社会主义阵营和民族解放运动造成了严重的危害。因此，人们不能不激烈地谴责赫鲁晓夫的继承者们所采取的立场，他们只不过是换了换腔调，但在行动中却表明自己是修正主义的忠实信徒。"},{"type":"paragraph","text":"不论勃列日涅夫、柯西金和苏斯洛夫等人如何在拼命掩饰其修正主义政策，这个政策正在遭到彻底的破产。没有任何力量能够挽救它。各国人民的革命斗争将粉碎现代修正主义。正因为如此，我们期待苏共领导现行的反马克思主义路线最后将被扫清。苏联各族人民将会迫使他们的党回到苏共在列宁和斯大林的领导之下所走过的光辉道路上来。"},{"type":"paragraph","text":"苏联，列宁的祖国，不可能让现代修正主义糟蹋下去。"},{"type":"paragraph","text":"巴西共产党认为，在我国必须坚持不懈地同修正主义战斗下去，虽然修正主义一再遭到失败，但还在活动。这场战斗是我国人民争取民主和民族解放的斗争的要求，是各国人民反对人类最大的敌人——野蛮的美帝国主义的共同行动的一个组成部分。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c9dd2e5bcf"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
