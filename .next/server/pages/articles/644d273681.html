" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji29","name":"毛泽东全集第29卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji29.pdf"],"article":{"title":"关于志愿军兵力使用的意见","alias":"","parts":[{"type":"paragraph","text":"关于志愿军兵力使用的意见"},{"type":"paragraph","text":"（1950年12月17日）彭\"，并告高，及告宋、陶："},{"type":"paragraph","text":"九兵团此次在东线作战，在极困难条件之下，完成了巨大的战略任务。由于气候寒冷、给养缺乏及战斗激烈，减员达四万人之多，中央对此极为怀念。为了恢复元气，养精蓄锐，以利再战，提议该兵团在当前作战完全结束后整个开回东北，补充新兵，休整两个月至三个月，然后再开朝鲜作战。在此期间内，即由西线六个军，配合朝鲜人民军，在南朝鲜作战。每一战役，以歼灭美李军一万人左右至多两万人为目标，兵力似已够用。因为在南朝鲜作战，补给线甚长，好打的战役机会，须经过精心选择和充分准备才能获得，太多的兵力也用不着。只有在进行最后决战的时机，才需要增加大的兵力。如果在两三个月内有使用更多兵力的机会，亦可照高岗同志提议，考虑将杨得志兵团使用上去。但杨兵团亦须加强装备，补充人员（该兵团十一万人，能作战者约九万人）。如使用"},{"type":"paragraph","text":"[1]彭，指彭德怀，当时任中国人民志愿军司令员兼政治委员。[2]高，指高岗，当时任东北军区司令员兼政治委员。"},{"type":"paragraph","text":"[3]宋、陶，指宋时轮、陶勇，当时分别任中国人民志愿军第九兵团司令员兼政治委员和副司令员。"},{"type":"paragraph","text":"[4]美李军，指美国军队和李承晚指挥的南朝鲜军队。[5]杨得志兵团，指第十九兵团，兵团司令员杨得志。"},{"type":"paragraph","text":"关于志愿军兵力使用的意见该兵团，亦以在明年一月下旬或二月开动为适宜。你们意见如何，盼告。"},{"type":"paragraph","text":"毛泽东十二月十七日"}],"authors":["毛泽东"],"dates":[{"year":1950,"month":12,"day":17}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":443,"page_end":444},"tags":[{"name":"杨得志","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"高岗","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"644d273681"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
