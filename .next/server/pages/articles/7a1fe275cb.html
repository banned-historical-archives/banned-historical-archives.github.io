script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"我们有决心洗清资产阶级的污毒","authors":[],"dates":[{"year":1952,"month":2,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"我们有决心洗清资产阶级的污毒"},{"type":"paragraph","text":"编辑同志：二月一日我校同学收听中央人民广播电台转播的“北京公审大贪污犯大会”的实况后，衷心地拥护人民政府的政策。枪毙薛崑山、宋德贵那种拒不坦白、坚决和人民为敌的大贪污犯，就是给人民除了大害。像孙建国、夏茂如等真心坦白，并检举其他贪污分子和奸商，人民可以减轻或免除他们的刑事处分，给以从新作人的机会。从这里，我们更加认识了中国共产党的光荣、正确、伟大，人民政府忠心耿耿为人民办事的精神。我们更加热爱党、热爱人民政府、热爱我们的优越制度。我们相信在共产党和毛主席领导下，反贪污、反浪费、反官僚主义运动一定能得到彻底的胜利。我们有信心和决心把我们学校的贪污、浪费现象彻底搞清，把资产阶级的污毒洗刷干净。"},{"type":"paragraph","text":"河北师范专科学校学生会"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7a1fe275cb"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
