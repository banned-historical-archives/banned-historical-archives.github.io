script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji21","name":"毛泽东全集第21卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji21.pdf"],"article":{"title":"关于土地政策的发言要点","alias":"","parts":[{"type":"paragraph","text":"关于士地政策的发言要点"},{"type":"paragraph","text":"（1946年5月8日）"},{"type":"paragraph","text":"（一）七大时说“寻找适当方法解决土地问题，实现‘耕者有其田’”。中央“五四”指示就是这种为群众所创造，为中央所批准的适当方法。现在类似大革命时期，农民伸出手来要土地，共产党是否批准，必须有坚定明确的态度。"},{"type":"paragraph","text":"（二）在政治上十分需要，目前国民党有大城市，有帝国主义帮助，占有四分之三人口的地区。我们只有依靠广大人民群众的伟大力量，与之斗争，才能改变这种他大我小的形势。如果在一万万几千万人口的解放区内，解决了土地问题，即可使解放区人民长期支持斗争不觉疲倦。"},{"type":"paragraph","text":"（三）这是一个最基本的问题，是一切工作的基本环节，必须使全党干部认识其重要性。"},{"type":"paragraph","text":"（四）由于广大群众的行动推平了土地（即平均分配）的地方，不要去批评农民的平均主义。相反的农民这种彻底消灭了封建势力的行动应该批准。但无止的推平，不联合中农的推平，不照顾应当照顾的各色人等的推平，就要不得，群众未提出推平的地方照群众所提方法办理，也不要推平。"},{"type":"paragraph","text":"[1]这是毛泽东、刘少奇在讨论和通过《中央关于土地问题指示》时发"},{"type":"paragraph","text":"（五）不要怕自由资产阶级和中间分子暂时的动摇，只有我们坚决实行土地改革，使农民得到土地，我之力量更加强大巩固时，我们才能有力量，更可能争取团结他们。但对自由资产阶级及中间派应作正确而有力的解释，指出减租与耕者有其田都是实行政协决议，其方式又与内战时期大不相同。"},{"type":"paragraph","text":"（六）对工商业政策和工人运动必须与土地政策农民运动有原则区别，切忌工资及其他劳动条件订得太高，应该是劳资合作，并订出共同生产计划（原料足，产品多，成本低，质量好，销路广），努力生产，使生产发展，经济繁荣，劳资两利。只有如此才能与外国和本国的垄断资本作斗争，使解放区工商业的发展立于不败之地。"}],"authors":["毛泽东"],"dates":[{"year":1946,"month":5,"day":8}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":306,"page_end":307},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8e37075934"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
