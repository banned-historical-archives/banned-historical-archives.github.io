script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"政法部门应该成为人民民主专政的武器  中共辽宁省委书记黄欧东对政法工作中的右倾思想作了批判","authors":["陆灏"],"dates":[{"year":1957,"month":8,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"政法部门应该成为人民民主专政的武器"},{"type":"paragraph","text":"中共辽宁省委书记黄欧东对政法工作中的右倾思想作了批判"},{"type":"paragraph","text":"本报讯　记者陆灏报道：必须迅速努力克服政法部门的，特别是检察院工作中的右倾思想，政法工作要真正成为维护人民民主专政的强大而锐利的武器。这是中共辽宁省委第一书记黄欧东在本月14日结束的省委第四次全体委员会议（扩大）上说的。"},{"type":"paragraph","text":"黄欧东在关于政法工作部分的讲话中，着重地批判了辽宁省检察院工作中表现的右倾思想。他说，辽宁省检察院对互相制约的原则了解得很不全面，因此它不但不能和其他政法部门共同配合作战，反而有时候起了牵制和抵消的作用。我们的检察院只强调查冤，不注意查漏，这就不是有利于巩固人民民主专政的，这种情况一定要从根本上加以改变。"},{"type":"paragraph","text":"会议对于政法工作中存在的右倾思想进行了严正的批评和自我批评。据各方面反映的情况来看，辽宁省检察院几年来的确做了很多工作；但是工作中的右倾思想也是比较严重的。这首先表现在某些检察院的领导干部把国内大规模的阶级斗争基本结束，错误地理解为阶级斗争好像已经熄灭了。因此在肃反、打击刑事犯等等问题上，检察院表现了麻木不仁，丧失了警惕。如沈阳市公安局发现北市场、南站的刑事犯，最近很嚣张，而该市检察院的一位负责同志坐了吉普车去看了一遍，却说没有问题。其次，右倾思想表现在某些检察院的领导干部曲解了对于正确处理人民内部矛盾的原则。因此，他们对待应该镇压的，不予镇压；应该逮捕法办的，不予逮捕法办。很多案件，重罪轻判，引起了人民群众的不满；而检察院的不少领导干部却不闻不问，无动于衷。"},{"type":"paragraph","text":"关于检察院的右倾思想产生的根源问题，黄欧东在分析时说，主要是我们检察院的某些领导干部，对于目前的政治形势缺乏正确的估计。他们长期把自己关在办公室里，不接触实际，不联系群众，因此对于下边某些违法乱纪的事情听不到，对于很多处理不当的案件也不知道。这样，就使自己陷于一种非常危险的地步。黄欧东接着说：政治上、思想上的两条道路——社会主义道路和资本主义道路的斗争，正在全省激烈地深入地展开，政法工作部门应该按照人民的愿望，严守自己的阵地，有力地捍卫社会主义的成果。黄欧东说：政法部门，目前特别是省的检察院，应该下决心深入群众，深入实际，应该教育自己的干部虚心地听听群众的意见，才能更迅速改正自己的错误。黄欧东对于有些政法部门片面强调垂直系统，企图脱离党的领导的倾向，也进行了批评。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"人民内部矛盾","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b80935c9f1"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
