script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"各地医务人员广泛开展向李月华学习的活动决心刻苦地改造世界观，坚定地执行毛主席的革命卫生路线，做一个象李月华那样的卫生战士","authors":[],"dates":[{"year":1973,"month":3,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京一九七三年三月十一日电　人民的好医生李月华的模范事迹发表以后，在全国医疗卫生战线引起了极为热烈的反应。两个多月来，各地医务人员广泛开展了向李月华学习的活动，决心刻苦地改造世界观，坚定地执行毛主席的革命卫生路线，做一个象李月华那样的卫生战士。许多城乡医疗单位进一步改进医疗作风，出现了新的气象。"},{"type":"paragraph","text":"李月华是安徽泗县农村的一位普通医生，她全心全意为人民服务；为了抢救一个产妇，带着重病坚持工作，不幸以身殉职。报道她模范事迹的通讯《人民的好医生李月华》，去年十二月十九日在《人民日报》和各地报纸上发表以后，全国城乡许多医疗单位，纷纷举行学习会、讨论会、报告会。广大医务人员普遍认为，李月华为医疗卫生战线树立了一个自觉执行毛主席革命路线，“完全”“彻底”为人民服务的好榜样。为了推动学习李月华的活动深入发展，中共安徽省委作出了决定，北京、上海、天津、河北、山西、辽宁、浙江、福建、江西、广西等省、市、自治区的有关部门，分别发出了通知，指出李月华的模范事迹，是进行思想和政治路线教育的好教材，号召医务人员以批修整风为纲，广泛开展向李月华学习的活动，加速医疗卫生战线的斗、批、改。"},{"type":"paragraph","text":"最近，在卫生部召开的一次会议上，来自全国各地的代表们再一次学习了李月华的模范事迹。他们激动地表示，一定要以李月华为榜样，坚定不移地贯彻执行毛主席关于“把医疗卫生工作的重点放到农村去”的伟大指示，尽快地进一步改变我国农村的医疗卫生面貌。"},{"type":"paragraph","text":"广大医务人员在开展向李月华学习的活动中，对照李月华的模范事迹，寻找自己思想上和工作上的差距，首先认真解决医疗卫生工作为什么人的这个根本问题。他们决心象处处为贫下中农着想的李月华那样，为工农兵服务得更好。安徽泗县草沟公社卫生院医生学习李月华一切为了病人的高尚风格，主动搬到草房里去住，让出五间明亮的瓦房做病房。南宁市第一人民医院两年前办了一个综合诊室，医务人员利用每天门诊休班以后的中午和晚上到这里给病人看病，方便群众。学习李月华事迹以后，大家更坚定了把这个综合诊室坚持办下去的决心，现在这个诊室越办越好。北京友谊医院神经内科坚持办家庭病床已经一年多了，医务人员学习李月华的先进事迹后，感到思想上还有差距。春节前，他们访问家庭病床的病人，征求意见，进一步改进了家庭病床的医疗工作。西安市中心医院为了方便草滩农场的职工看病，由内科、妇产科、针灸科医务人员组成巡回医疗小组，以李月华为榜样，不辞劳苦地巡回在农场各居民点之间，那里有病人，就送医送药到那里，并且积极帮助农场培训医务人员。"},{"type":"paragraph","text":"各地医务人员对照李月华“毫不利己专门利人”的共产主义精神，更加自觉地改造世界观。上海第二结核病防治院的一位内科医生，过去因为受修正主义卫生路线的毒害，对工农兵的感情比较淡薄。他学习了李月华的事迹后，深受感动，表示要狠抓自己的思想革命化，把立足点移到工农兵这方面来。今年一月二日清晨，一位老工人病重，被送到防治院，他立即提前上班看病，使这位老工人的病情有了好转。病人回家以后，他又和两位护士一起到老工人家里探望，继续认真地为他治疗。安徽和县医院的医务人员，学习了李月华的事迹后，努力改变过去小手术不愿做，大手术不敢做的状况。现在，遇到小手术，不分上班下班，什么时候方便病人就什么时候做。大手术比较困难，就积极学习，创造条件去做。由于树立了为贫下中农服务的思想，又认真地对待手术的每一个技术措施，最近他们做了几例上腹部手术都成功了。"},{"type":"paragraph","text":"活跃在全国广大农村的巡回医疗队队员，从城市到农村公社卫生院安家落户的医务人员，以及“赤脚医生”，通过学习李月华的先进事迹，受到了深刻教育，更加坚定地执行毛主席的革命卫生路线，决心为办好农村医疗卫生事业贡献自己的力量。今年一月四日傍晚，吉林省怀德县农村一对夫妇抱着得了急性肺炎的病儿，从三十里外赶到怀德镇公社卫生院求医。在这个卫生院安家落户的医生任国鹏，看到病儿快要停止呼吸，立即和两名护士一起进行抢救。任国鹏把病儿抱在自己的怀里，给孩子吸痰，并和护士一道守护在病儿身旁，直到天亮，病儿脱离了危险。卫生院领导劝他休息，他说，比起李月华同志，我还差得很远。第二天，他不顾劳累，又投入了新的战斗。李月华生前培训过的草沟公社大梁大队“赤脚医生”梁贤金，经常记起李月华的话:“光有为人民服务的良好愿望，没有为人民服务的本领，是不行的。”他刻苦为革命钻研医疗技术，一年多来，看完了近二十种中西医书籍。有些古医书看不懂，他就一个字一个字地查字典，还常常为了一个问题，步行几里向老中医请教。在内蒙古草原工作十四年的正蓝旗那日图公社卫生院医生王素珍，曾患重病，手术后身体没有完全康复，仍以顽强的革命精神坚持为贫下中牧服务。学习了李月华的模范事迹以后，王素珍更加增强了战胜疾病和困难的毅力，表示要在牧区干一辈子革命，做一个象李月华那样的好医生。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"安徽文革","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"上海文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9720262f02"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
