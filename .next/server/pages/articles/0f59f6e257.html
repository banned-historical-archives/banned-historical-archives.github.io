script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"阿《人民之声报》发表社论歌颂毛主席英明领导盛赞中国人民抓革命促生产取得辉煌胜利帝修反的诽谤和挑衅丝毫不能阻挡中国人民凯歌猛进","authors":[],"dates":[{"year":1970,"month":2,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社地拉那十七日电　阿尔巴尼亚《人民之声报》十三日发表社论，热烈赞扬中国人民在伟大领袖毛主席的“抓革命，促生产”、“备战、备荒、为人民”的伟大号召的鼓舞下，把社会主义祖国建设得更加繁荣，更加强大。"},{"type":"paragraph","text":"社论说，中华人民共和国的亿万群众空前地动员起来了，他们正以革命的乐观主义和热情卓有成效地贯彻执行光荣的中国共产党第九次全国代表大会具有历史意义的决议、毛泽东主席的马克思列宁主义思想。革命的工人、贫下中农、广大的技术人员、工程师和科学家等，在党和毛主席的“抓革命，促生产”和“备战、备荒、为人民”的战斗口号的鼓舞下，以更大的干劲投入伟大的创造性工作，以更加迅速的步伐把他们伟大祖国的社会主义革命和社会主义建设事业推向前进。他们经过了阶级斗争和无产阶级文化大革命的暴风雨的锻炼，用战无不胜的毛泽东思想武装了头脑，以他们创造性工作的出色成绩，使强大的社会主义经济日益发展，使工农业生产不断提高，使中国的科学技术迅速地攀登世界水平的高峰，使中华人民共和国的防御力量不断加强。"},{"type":"paragraph","text":"社论揭露以美帝国主义者为首的帝国主义者和以苏联勃列日涅夫-柯西金叛徒集团为中心的现代修正主义者发动疯狂的反华运动、竭力诬蔑和歪曲中国的现实的罪恶阴谋之后指出，尽管狗在吠，强大的中国却继续在革命和社会主义的光荣道路上胜利前进。帝国主义和修正主义这些敌人的诽谤欺骗不了各国人民，抹煞不了真理，掩盖不了中国的现实。"},{"type":"paragraph","text":"社论说，中华人民共和国成立才刚过二十年，这是一个比较短的时期，但是，这个伟大国家所进行的革命改造，特别是在过去三年无产阶级文化大革命期间所进行的革命改造是巨大的。恩维尔·霍查同志在庆祝阿尔巴尼亚解放二十五周年的讲话中说:“经过无产阶级文化大革命的人民中国比过去强大百倍，社会主义的阵地在中国的大地上更深地扎下了根基，中华人民共和国变得不可战胜，使敌人胆颤心惊。”"},{"type":"paragraph","text":"社论赞扬伟大的人民中国今天成了一个日益繁荣富强的社会主义国家，成了一个伟大的世界强国，成了各国人民的自由和独立的堡垒，成了革命和社会主义的堡垒。无产阶级文化大革命为生产力的发展开辟了光辉的前景，创造了工农业生产方面的大好形势。"},{"type":"paragraph","text":"社论以大量事实列举了中国工农业生产的新成就之后指出，中国人民的这些辉煌胜利，中国社会主义经济各条战线上的大好景象，又一次清楚地证明了光荣的中国共产党革命路线的正确和毛泽东同志的马克思列宁主义思想的正确。帝国主义、修正主义的诽谤、阴谋和挑衅丝毫也不能阻挡七亿中国人民在今后取得越来越巨大的新胜利的道路上凯歌猛进，在革命和社会主义的道路上凯歌猛进。"},{"type":"paragraph","text":"社论最后说，阿尔巴尼亚人民是中国人民在为了革命、社会主义和共产主义的伟大共同事业和反对以美帝为首的帝国主义、以苏联为首的现代修正主义和反动派的共同敌人的斗争中的兄弟和战友，他们为中华人民共和国所取得的全面的辉煌的胜利感到由衷的高兴。中国人民在以杰出的马克思列宁主义者毛泽东同志为首的英雄的中国共产党的领导下，一直在胜利前进，正在把自己的社会主义祖国建设得更加坚强、更加繁荣、更加强大。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0f59f6e257"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
