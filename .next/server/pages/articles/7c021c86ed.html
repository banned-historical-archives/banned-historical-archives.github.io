" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji31","name":"毛泽东全集第31卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji31.pdf"],"article":{"title":"转发华东军区党委关于大张旗鼓开展三反斗争的指示的批语","alias":"","parts":[{"type":"paragraph","text":"转发华东军区党委关于大张旗鼓开展"},{"type":"paragraph","text":"三反斗争的指示的批语"},{"type":"paragraph","text":"（1951年12月30日）各大军区，志愿军，并告各中央局："},{"type":"paragraph","text":"（一）批准华东军区党委十二月二十八日关于大张旗鼓开展反贪污反浪费反官僚主义斗争的指示\"，认为这个指示是完全正确的。"},{"type":"paragraph","text":"[1]中共华东军区委员会的这个指示，分析了华东军区所属部队中贪污浪费的严重情况，指出华东部队贪污浪费的严重现象，多发生在南京上海的机关部队中，尤其在铺张浪费方面，华东军区机关实际上起了带头作用。军区党委过去对这些严重倾向，虽然一般地提出要反对和克服，也批办了大批贪污腐化案件，处罚了许多人，但没有广泛发动群众有系统地开展斗争，未能集中火力惩办大贪污、大浪费的事件，因此便不能制止贪污浪费的狂潮。前一段着重整编而忽视了在整编前进行一次三反斗争的必要性，而使12月初的高干会议没有充分讨论反贪污浪费问题。直到毛主席再次批电指示，才帮助我们将整编与三反结合起来。指示号召华东军区的全体同志认识华东地区如上海南京等城市，乃是全国资产阶级势力和影响最集中的地方，三年来对部队所起的腐蚀作用是极为惊人的。从华东部队的处境上，更应该首先发动一场激烈而严肃的反贪污浪费、反腐化堕落的思想斗争，才能打破资本主义的影响包围，才能保持我军的纯洁，巩固部队，加强国防建设。而能否提高认识并首先反对官僚主义，是能否战胜资本主义影响，肃清贪污浪费，做好整编工作的主要关键。据此华东军区党委决定对1952年1、2、3月的工作步骤加以改变。1月份以开展反贪污、反浪费斗争为中心，结合进行整编，2、3月份以整编和转业建设工作为主，结合继续深入三反斗争。"},{"type":"paragraph","text":"转发华东军区党委关于大张旗鼓开展三反斗争的指示的批语（二）将这个指示发给各大军区及志愿军，并转发所属各级军区一律仿照办理。必须这样做才能取得主动，否则就会使自已陷于被动。华东军区在过去一段时间内有些被动，但现在已完全主动了。（三）批准华东军区党委会关于所属各部推迟报告时间的请求，只要团以上各级负责同志下定决心结合整编工作有力地深刻地发动三反斗争，第一次报告推迟至一月底是可以的。（四）将华东军区党委十二月二十八日的指示在党内刊物上发表，使广大十部都能阅读。"},{"type":"paragraph","text":"毛泽东一九五一年十二月三十日"}],"authors":["毛泽东"],"dates":[{"year":1951,"month":12,"day":30}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":199,"page_end":200},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"指示"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7c021c86ed"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
