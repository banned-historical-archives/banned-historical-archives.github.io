" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji50","name":"毛泽东全集第50卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji50.pdf"],"article":{"title":"对上海市革委会关于工宣队进入中小学情况报告的批语","alias":"","parts":[{"type":"paragraph","text":"对上海市革委会关于工宣队进人"},{"type":"paragraph","text":"中小学情况报告的批语"},{"type":"paragraph","text":"（1968年9月29日）"},{"type":"paragraph","text":"此件“很有用，似可转发各地参考。请送林、周及文革各同志酌定。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"九月廿九日"},{"type":"paragraph","text":"[1]指上海市革委会1968年9月27日关于工宣队进入中小学情况给毛泽东等的报告。报告说，9月5日至12日，我们组织了3.1万余名产业工人，进入10个区的513所中学和1249所小学。在工宣队的领导下，全市中小学于9月16日开学，广大师生纷纷到校。开学后，各校都举办了各种类型的毛泽东思想学习班。在工宣队的领导和帮助下，原来革命大联合不巩固的学校、班级，有些也联合起来了。对一些复课闹革命搞得比较好的学校，工宣队则注意针对存在的问题加强政治思想工作。此外，工宣队还做了大量的整顿校风、建立革命新秩序的工作。目前，针对工作中存在的问题，我们正在组织工宣队认真学习毛主席最新指示，开展“四好连队”“五好战士”运动。同时深入调查研究，为开展革命大批判和清理阶级队伍作准备，摸索经验，树立典型，逐步推广。1968年10月7日，中共中央、中央文革转发了这个报告。"},{"type":"paragraph","text":"[2]林，指林彪，在中共八届十一中全会上继续当选为中央政治局常委，不久被称中央副主席。周，指周恩来。"}],"authors":["毛泽东"],"dates":[{"year":1968,"month":9,"day":29}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":310,"page_end":310},"tags":[{"name":"毛泽东","type":"人物"},{"name":"中央文革","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"革命大批判","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"name":"清理阶级队伍","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9f7d82c0de"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
