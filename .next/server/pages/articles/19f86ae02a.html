script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"运用毛主席的哲学思想指导生产国毛二厂以“一分为二”观点揭露矛盾解决矛盾，推动了全厂革命和生产","authors":[],"dates":[{"year":1970,"month":8,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　上海第二毛纺织厂党委会、革委会，带领广大革命群众用毛主席的“一分为二”的光辉哲学思想，揭露矛盾，分析矛盾，解决矛盾，大破“毛纺特殊论”、“消极平衡论”等右倾保守思想，推动了革命和生产，全厂出现了崭新的面貌。"},{"type":"paragraph","text":"这个厂的纺部是全厂产量最低的部门。过去，这个厂的某些领导，有一种“消极平衡”、“毛纺特殊”的右倾保守思想，认为毛纺厂是全能厂，生产的都是出口的高档品，产量比其他行业低一些是理所当然的。因此，长期以来，生产计划只按照纺部的产量来平衡，纺部满足不了织布需要的时候，就到兄弟厂去买大量的毛纱。工人们看到这种现象，心里想不通，他们学习了毛主席的光辉著作《矛盾论》中的关于“研究任何过程，如果是存在着两个以上矛盾的复杂过程的话，就要用全力找出它的主要矛盾。捉住了这个主要矛盾，一切问题就迎刃而解了”的教导，心里豁然开了窍，找到了纺部跟不上全厂生产发展的主要矛盾，于是就大搞技术革新，车速由原来每分钟八千转上升到一万转，产量迅速提高，改变了原来毛纱的脱节现象。"},{"type":"paragraph","text":"今年五月，沪东造船厂红哨兵的一张革命大字报，对国毛二厂触动很大。二纺车间工人针对领导上的“消极平衡”思想，学习了毛主席关于“矛盾着的对立面又统一，又斗争，由此推动事物的运动和变化”的伟大教导，认识到前阶段虽然搞了技术革新，提高了车速，毛纱跃上去了，厂里生产出现了暂时的平衡，但不平衡是绝对的，同兄弟厂和其它行业比较起来，还有一段距离。因此，决不能满足于现状，只有快马加鞭，才能赶上跃进的步伐，于是决定再提高车速夺高产。厂党委会、革委会坚决支持工人的革命行动。党委书记亲自深入到二纺车间，同工人一起学习，一起商量研究问题，工人们干劲倍增，挡车工也表示:“决不拖高速后腿，要为高速出一份力。”他们纷纷利用业余时间，苦练接头基本功。经过全厂革命群众的通力协作，高速车一台又一台出现了，五十一支卡粘单产也由原来的十七点四三公斤，提高到二十一点六八公。斤，最高达到二十六点三公斤，创造了毛麻行业历史最高纪录"},{"type":"paragraph","text":"纺部上去了，全厂又出现了新的不平衡。各车间纷纷向纺部学习，迎头赶上去。织布车间工人人人动脑筋，个个想办法，采取了一些技术措施，改装了三台无梭织毛机，建立了“三勤八查”等一些合理的规章制度，生产又大幅度跃上去了。染整车间工人在全厂大好形势的鼓舞下，也不甘落后，他们对妨碍生产发展的三十年代的烘呢机，大胆地进行了改革，效率提高了三倍。过去修呢工序请外单位加工，每年加工费要付出六万六千多元，工人一算细账，大吃一惊’采取了有效措施，各道工序层层把关，提高了产品质量，修呢速度也比原来提高近一倍，把积压的一千五百多匹坯布全部修呢完工，而且为国家节省了一百八十六个劳动力和大量资金。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"19f86ae02a"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
