" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"金星生产合作社转高级社后的问题","authors":["郭洁"],"dates":[{"year":1956,"month":2,"day":17}],"is_range_date":false,"parts":[{"text":"金星生产合作社转高级社后的问题","type":"title"},{"text":"郭洁","type":"authors"},{"text":"【山西分社17日讯】山西省平顺县西沟乡金星农林牧生产合作社在转为高级社以后出现了一些新问题。这表现在如下几个方面：","type":"paragraph"},{"text":"一、原订生产计划和大生产不相适应。今年社内制订的生产计划落后于实际，曾在二十天内突破计划三次，结果不得不重新修订。中共长治地方委员会的驻社干部李怀珍说；“订计划时心中没有底子，只觉得已经超过往年好多倍了，但是对全乡全部农民都加入高级合作社以后劳动力的利用率大大提高了的新情况估计不足。”","type":"paragraph"},{"text":"二、大生产也给经济工作提出了新问题。社里社务委员会的干部觉得家当大了开支多，他们耽心投资过大了影响今年社员收入的增加。但又觉得不投资不能保证增产。但究竟今年能收入多少，应该投资多少心中没有底子。今年春节后社里要有一百七十头牲口合槽喂养，但是这些牲口如果光耕地就不合算，急需有个全盘的筹划，今年在副业生产上初步估算了一下约需投资四、五千元，但是钱从那里来还没有着落。计划工作赶不上去。又如今年向全国发起展开全国农业增产竞赛的倡议中，畜牧业方面原订计划中今年要繁殖六十头牲口，可是社里只有二十五头母畜有驹、就按百分之百的成活率也完不成这个指标。社里计划喂猪三百口，原计划由社里的母猪繁殖，可是全社母猪只有十七口，生不下这么多。社里计划繁殖小羊三百只，也只有二百六十六只母羊有羔，就是按全部成活计算尚差二十多只，而这里的成活率最多百分之九十几。","type":"paragraph"},{"text":"三、组织机构方面，今年入社的山林五百三十多亩，经常的剪修、护林工作必须有专人负责管理。还有今年公有牲口如何饲养管理也是大家关心的大问题，社务委员会的干部反映说：“每天开会研究大问题，可是“小问题”没有人管了。”在基本建设上，因为没有具体的计划，打旱井时社员不知打到那里好，领导的人也没个计划，只是号召“打井”，结果好多井因地址选择不当又返工重来。","type":"paragraph"}],"comments":[],"origin":"新华通讯社编《内部参考》1956年2月17日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"65a22c1dc2"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
