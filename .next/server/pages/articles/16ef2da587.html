script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"印度工人农民争和平  反剥削运动普遍高涨","authors":[],"dates":[{"year":1950,"month":4,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"印度工人农民争和平  反剥削运动普遍高涨"},{"type":"paragraph","text":"【新华社十七日讯】塔斯社德里十五日讯：此间报纸报道，印度工人与农民要求和平、民主与土地的运动，普遍高涨。坎伯电力厂一千八百名工人举行罢工，抗议警察应工会分裂分子——所谓印度全国职工大会的首领们——的要求，逮捕全印总工会联合省分会主席伯特纳克及其他八个工会人员。虽然警察局的若干弹压队力图镇压，但在坎伯厂工人们的顽强抵抗下，政府终于迫不得已释放了被捕的工会人员。"},{"type":"paragraph","text":"据来自联合省梅英浦利区的消息：该地科斯麦村的农民最近曾举行了巨大的示威游行。示威者们举着红旗，要求清算封建土地所有制，减少向农民征收的捐税，增加农业工人的工资，并停止反人民的镇压行为。示威者要求居民们团结起来！为拥护和平、反对美英战争贩子及其在印度的同盟者而斗争。"},{"type":"paragraph","text":"喀什米尔北部的慕沙发浦曾举行了大规模的示威，抗议反民主的镇压手段。妇女和学生走在示威队伍的前列。示威者要求印度退出不列颠帝国，印度真正独立，和不许英美战争贩子干涉印度内政。示威者曾向全世界和平民主的强有力的堡垒——苏联欢呼。警察打散了示威行列，并逮捕了八个人。"},{"type":"paragraph","text":"农民协会委员会鉴于联合省东部地区两千万以上的居民面临着饿死的威胁，力促农民、工人和知识分子组织大会和示威，要求印度政府立即援救农民，和免除灾区农民的租税。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"16ef2da587"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
