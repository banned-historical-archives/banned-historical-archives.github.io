" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中央关于转发“晋、冀、鲁、豫、北京五省市农业书记会议纪要”的指示","authors":[],"dates":[{"year":1960,"month":10,"day":7}],"is_range_date":false,"parts":[{"text":"中央关于转发“晋、冀、鲁、豫、北京五省市农业书记会议纪要”的指示","type":"title"},{"text":"现在把“晋、冀、鲁、豫、北京五省市农业书记会议纪要”发给你们。中央认为，这个文件中所提出的关于农村人民生活的安排、劳动力的安排、冬季运粮、分配工作、当前农业机械化的措施、今冬明春的水利建设、整风整社和加强基层领导等问题的意见都很重要，不仅对晋、冀、鲁、豫、北京五省市适用，而且对全国各地都有参考价值，请你们加以研究，并根据你们的具体情况，拟定今冬明春农村工作计划。","type":"paragraph"},{"text":"自从大跃进以来，我国农村工作获得了很大的成绩。这是基本的方面，是事物的主流。但是同时，随着工作的发展，也出现了不少问题。中央认为，各地在今年冬季，除了应当注意休整民力，进行冬季生产，抓住副业生产，运粮工作和准备明年春耕生产等等之外，还必须继续完成三反整风整社运动，发动干部和群众，认真学习中央关于在农村建立人民公社的决议，学习八届六中全会关于人民公社若干问题的决议，学习主席在两次郑州会议、在去年四月和今年六月两次上海会议、在今年八月北戴河会议上讲话的精神，学习保粮保钢和大办农业，大办粮食的两个指示。以上述这些文件和毛泽东同志对农村工作指导思想为武器，彻底肃清“共产”风、浮夸风、命令风和某些干部的特殊化作风，清洗混入我们队伍中的不纯分子。务必做到，通过整风整社，进一步学习毛泽东思想，进一步端正作风，贯彻政策，把国家、集体与个人之间的关系，把大集体与小集体之间的关系，把领导和群众之间的关系彻底搞好，把农村必不可少的制度建立起来。其目的，在于使广大群众心情舒畅，从而调动起更大的生产积极性，战胜目前的暂时困难，顺利地渡过灾荒，争取明年夏季大丰收，争取明年全年的大丰收。归根结底，在当前农村中，必须贯彻执行政策，切实整顿作风、整顿队伍。真正做到了这几件事，就会发挥无比强大的力量，暂时的困难就一定能够克服，明年的丰收就有更多的保证。","type":"paragraph"},{"text":"（晋、冀、鲁、豫、北京五省市农业书记会议纪要从略—编者注）","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4fdbcc3a4a"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
