script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"张家浜街道党委充分依靠和发动群众做好拆除违章搭建和清理马路仓库工作搞好环境卫生，保持市容整洁，以实际行动回击右倾翻案风","authors":[],"dates":[{"year":1976,"month":3,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　本市黄浦区张家浜街道党委，以阶级斗争为纲，拆除违章搭建，清理马路仓库，认真搞好环境卫生工作，以实际行动痛击右倾翻案风。"},{"type":"paragraph","text":"张家浜街道的违章搭建、马路仓库较多，仅在六百○七米长的启新路上，就有违章搭建四十二处；地面的堆物，如各种砖头、木材、预制件、石子、建筑垃圾等也很多。群众对此很有意见。他们说:高高低低路难行，坑坑洼洼生蚊蝇。"},{"type":"paragraph","text":"去年十一月，张家浜街道党委通过无产阶级专政理论学习，评论《水浒》，在区建设小组指导下，从启新路开始，一条马路一条马路地做工作，逐步解决违章搭建、马路仓库的问题。在街道党委统一领导下，公安整顿交通秩序组、工务所、房管所、派出所、清管站、消防队、民兵小分队等有关方面紧密配合，团结战斗。每星期二碰头研究，星期四统一行动。区房修五队领导亲自动手，带头拆除他们搭在启新路旁的违章建筑，并把堆在路旁的木材、石子、瓦片运走。街道所属几个生产组也主动把违章建筑拆掉。上塑四厂主动配合清理马路。这样，为周围群众作出了榜样。"},{"type":"paragraph","text":"这个街道在做好这项工作时，充分依靠和发动群众，做深入细致的思想工作。他们召开里弄干部会议、群众管房小组会议、向阳院会议，并运用各种宣传方式，广泛进行宣传。他们组织和依靠里弄干部、退休工人以及有关方面同志分别情况上门宣传，做好违章搭建户的工作。"},{"type":"paragraph","text":"经过两个月的工作，启新路上四十二处违章搭建全部拆除，马路上四百五十吨堆物、垃圾也清除了，被破坏的路面整修了。他们还发动附近向阳院的青少年和居民在马路两旁种了一百五十多棵树。群众高兴地说:“启新路变新了。”张家浜街道党委总结了启新路的战斗经验，决心在街道各条马路、里弄逐步推开，抓好革命，做好工作，以实际行动回击右倾翻案风。"},{"type":"paragraph","text":"(本报通讯　员)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3f1ef46390"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
