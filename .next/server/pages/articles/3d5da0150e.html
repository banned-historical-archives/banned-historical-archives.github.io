script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"《解放日报》发表评论员文章  把学习吕士才的活动再深入一步","authors":[],"dates":[{"year":1980,"month":2,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"《解放日报》发表评论员文章"},{"type":"paragraph","text":"把学习吕士才的活动再深入一步"},{"type":"paragraph","text":"本报讯  《解放日报》二月二十日发表评论员文章，分析了上海各条战线学习吕士才的情况，提出把学习吕士才的活动再深入一步。"},{"type":"paragraph","text":"评论指出：上海全市各条战线迅速掀起了“学习吕士才，献身新长征”的热潮，“学英雄，见行动，出成效”，成为大家共同的口号和自觉的行动，涌现出了许多吕士才式的好人好事。榜样的力量是无穷的。学习吕士才已经成为八十年代第一春鼓舞我们进行新长征的巨大力量。当前，我们应该把学习吕士才的活动再深入一步，推动千千万万个吕士才的出现和成长。"},{"type":"paragraph","text":"评论强调各级党的领导一定要认真把学习吕士才摆在议事日程上，当作一项重要的思想政治工作抓紧抓好，抓出成效。要发扬光大吕士才献身新长征的革命精神，培养造就千千万万吕士才式的新人，这是进行四化建设的一个重要保证。"},{"type":"paragraph","text":"评论指出，我们要在四化建设中坚持党的领导，改善党的领导，很重要的一条，就是要使广大共产党员都能在各自的战斗岗位上发挥先锋模范作用。从一定意义上来说，党员的模范作用，实际上就是党的领导作用。吕士才同志为我们提供了一个新长征中的好榜样。如果我们的共产党员都能做到象吕士才那样，那就堪称是充分发挥了先锋模范作用的共产党员，是真正合格的无产阶级先锋战士。各级党的领导干部应该毫无例外地带头认真学习吕士才。同一般党员相比，党的领导干部能不能起先锋模范作用，关系更大。如果我们的党员，尤其是党员领导干部都能象吕士才那样处处起模范作用，那我们党的威信、党的战斗力就会大大提高，党的领导作用就会大大加强。"},{"type":"paragraph","text":"评论指出，最近，邓小平同志作了关于目前形势和任务的报告，吕士才同志的模范事迹，正是有助于我们加深理解邓小平同志报告的一份生动形象的辅助材料。我们学习邓小平同志的重要报告，对照吕士才同志的模范事迹，联系本地区、本部门、本单位以及本人的实际，进行对比和分析，就可以比较深刻地领会邓小平同志报告的精神，提高贯彻执行的自觉性。"},{"type":"paragraph","text":"评论最后说，深入学习吕士才，最重要的是要学出成效，见诸行动。要把学英雄和做好本职工作结合起来，通过广泛、深入地开展学习吕士才的热潮，在各行各业造就千千万万吕士才式的英雄模范人物。这样，我们的四化事业就大有希望！"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"上海文革","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3d5da0150e"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
