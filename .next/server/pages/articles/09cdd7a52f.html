script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"我从心眼里热爱毛主席  正告邓拓：你们要推翻我们党的领导，我们就跟你们有刻骨之恨。我们一定要把毒草的老根子挖出来。","authors":["王金玉"],"dates":[{"year":1966,"month":5,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"我从心眼里热爱毛主席"},{"type":"paragraph","text":"正告邓拓：你们要推翻我们党的领导，我们就跟你们有刻骨之恨。我们一定要把毒草的老根子挖出来。"},{"type":"paragraph","text":"速度滑冰运动员　王金玉"},{"type":"paragraph","text":"邓拓你们这一小撮反党反社会主义分子，竟敢狂妄地叫喊要我们敬爱的党赶快下台“休息”，“什么话都不要说，什么事都不能做”，一切听从你们的“指导”。你们的目的就是要推翻以毛主席为首的党中央的领导。你们这种阴谋，不仅全中国人民不答应，就是在全世界一切革命的人民面前也是通不过的。我作为一个速度滑冰运动员，曾八次到国外参加国际速度滑冰比赛。我亲身感受到了全世界一切革命的人民对我们的伟大领袖毛主席是多么爱戴。我们中国的运动员，不管在哪里都是最受欢迎，最受尊重的。我们每到一处都会被群众围起来，欢呼“中国——毛泽东，中国——毛泽东！”说明了我们国家，我们伟大的党，我们伟大的领袖毛主席在全世界一切革命人民的心目中威望是多么高。在国外，许多人心向北京。今年我去瑞典参加比赛，一个瑞典老太太对我说，将来她的孩子长大以后，要送到北京来学习。他们把毛主席看成是世界革命的舵手，把中国共产党看成是国际共产主义运动伟大的旗手。一个瑞典运动员对我说：“在世界上凡是没有中国人参加的会议，就很不够意思”。可以见得，我们伟大的党，伟大的毛主席，在全世界人民中间享有最高的威信。你们这一小撮反党反社会主义分子，妄想推翻以毛主席为首的党中央的领导，全世界一切革命的人民是决不允许的。"},{"type":"paragraph","text":"在旧社会，我们一家受尽了地主的剥削和压迫。要不是共产党，毛主席领导全国人民推翻了三座大山，我和父亲不知早死到那个煤坑里了。象我这样一个穷苦的孩子，十几年来，在党的培养下，成了一名速度滑冰运动员，还经常参加国际比赛，这是毛主席救了我，培养了我，教育了我。只有共产党、毛主席所说的，才是我们的心腹之音。每当我忆起今昔之事来，我从心眼里对毛主席发出强烈的爱，毛主席每说一句话，每做一件事，我都感到倍加亲切。可是，今天你们要让我们党下台“休息”，我要正告邓拓：党和毛主席就是我们的命根子，你们和地富反坏右一起暗地使劲，要推翻我们党的领导，拔掉我们的命根子，那我们对你们就有刻骨之恨，一定要斗垮你们，打倒你们。在这场你死我活的斗争中，不管你们受什么人的支持，耍什么花招，都休想过关，我们要用冰刀把你们这些毒草的老根子挖出来，誓死保卫社会主义。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"09cdd7a52f"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
