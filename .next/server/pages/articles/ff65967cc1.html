script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"乌布利希在来比锡知识分子讨论会上说  西德资产阶级不是强大而是孱弱  宣传“人民资本主义”是企图掩盖对抗性矛盾","authors":[],"dates":[{"year":1957,"month":6,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"乌布利希在来比锡知识分子讨论会上说"},{"type":"paragraph","text":"西德资产阶级不是强大而是孱弱"},{"type":"paragraph","text":"宣传“人民资本主义”是企图掩盖对抗性矛盾"},{"type":"paragraph","text":"新华社柏林4日电　据德意志通讯社来比锡讯：德国统一社会党第一书记乌布利希2日晚上在来比锡同一百多位知识分子举行讨论会时说：西德关于“人民资本主义”的宣传表明了西德资产阶级的孱弱。"},{"type":"paragraph","text":"他说：在作为高度工业化的资本主义国家的西德，由于自动化和应用原子能，社会矛盾已经达到了顶点。资产阶级已经认识到这一点，因此正在宣传“人民资本主义”。"},{"type":"paragraph","text":"乌布利希指出：这并不是西德资产阶级强大的表现，而是孱弱的表现，因为这样做的目的是想对工人们隐瞒生产的社会性和资本主义私有制之间的对抗性矛盾。克服这个基本矛盾是历史的必然性，并且会使得人民充分发挥他们的一切才能。"},{"type":"paragraph","text":"这次讨论会是民主德国关于社会主义建设的思想认识问题、特别是现在的两个德国的前途问题和社会主义伦理和道德问题的广泛和公开的讨论的开始。"},{"type":"paragraph","text":"乌布利希在会上答复了各种问题。他着重指出，讨论中提出了一些重要的建议和批评。他说：这种讨论应当继续进行，因为每个问题都还远没有谈彻底。他说：“我们赞成举行公开讨论，因为这样做能够帮助克服社会主义建设中一些免不了要发生的错误。”"},{"type":"paragraph","text":"乌布利希在谈到卡尔·马克思大学哲学系教授施莱夫施太因博士所提出的关于德国的前途问题时说：德国人民必须从自己的历史中、特别是从两次世界大战中汲取教训。这里产生了像推翻帝国主义等问题。这些问题今天已经成了西德人们讨论的话题。"},{"type":"paragraph","text":"乌布利希指出：“我们必须在孤立原子战争贩子们方面获得成功。谁不采取明确的立场，谁就是帮助西德军国主义和北大西洋公约组织，第三条道路是没有的。必须领导对西德的军国主义和反动派的进攻。要影响西德，我们就必须正确地使用我们的力量，我们就必须争取人民的信任，以便使西德的力量对比发生重大的改变。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ff65967cc1"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
