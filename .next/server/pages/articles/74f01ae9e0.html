script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"更好地贯彻毛泽东主席的建军原则  进一步发扬人民解放军的光荣传统","authors":[],"dates":[{"year":1965,"month":5,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"《解放军报》社论阐明取消军衔制度的深远意义"},{"type":"paragraph","text":"更好地贯彻毛泽东主席的建军原则  进一步发扬人民解放军的光荣传统"},{"type":"paragraph","text":"军衔制度取消后，解放军一律佩带全红五角星帽徽，象征着党和毛主席的领导；一律佩带全红领章，象征着我军非常无产阶级化、非常战斗化。取消军衔的决定反映了解放军广大干部和战士的愿望和要求，全体指战员表示热烈拥护"},{"type":"paragraph","text":"新华社二十五日讯　二十五日《解放军报》社论，题为：《促进我军更加革命化的重大措施》，全文如下："},{"type":"paragraph","text":"全国人民代表大会常务委员会已经决定取消我军的军衔制度。刘少奇主席已经命令公布这一决定。国务院根据全国人民代表大会常务委员会的决定和刘主席的命令，决定在取消军衔制度以后，中国人民解放军陆、海、空军、公安部队所有部队人员，一律佩带全红五角星帽徽、全红领章。这是促进我军更加革命化的一项重大措施，完全符合我军的革命精神和光荣传统，反映了广大干部战士的愿望和要求。中国人民解放军全体指战员表示热烈的拥护。"},{"type":"paragraph","text":"我军是中国共产党和毛主席缔造、领导的人民军队。官兵一致，上下一致，军民一致是我军固有的优良传统。我们的干部和战士，都是亲密的战友和阶级兄弟。我们军队和人民血肉相联，鱼水相亲。在过去长期的革命战争中，我军是没有军衔制度的。全国胜利以后，在一九五五年才开始实行。十年的实践证明，实行军衔制度，与我军的光荣传统是不相符合的，与官兵之间、上下级之间、军民之间的亲密关系也是不相适应的。我军的建设，最根本的是以毛泽东思想为指针，加强政治思想工作，提高全体指战员的阶级觉悟，培养优良作风，提高军事素质，使我军更加无产阶级化，更加战斗化。因此，取消军衔制度是完全正确的、完全必要的。取消军衔制度，有利于官兵之间、上下级之间、军民之间的团结，有利于进一步发扬我军的光荣传统。"},{"type":"paragraph","text":"取消军衔制度，也有利于促进我军指战员思想的进一步革命化。毛主席说过：“我们这个队伍完全是为着解放人民的，是彻底地为人民的利益工作的。”我们的干部战士都是人民的勤务员。我们干革命，一不为名，二不为利，就是全心全意地为人民服务。取消了等级表面化的军衔制度，有利于消除助长等级观念和名利思想的一些客观条件，可以促使我们更加自觉地把自己放在普通一兵、普通劳动者的地位，更加自觉地进行思想改造，进一步树立全心全意为人民服务的思想。"},{"type":"paragraph","text":"我军是高度集中统一的战斗集体，有着严格的组织纪律。这种集中统一和组织纪律，是建筑在干部战士高度政治自觉的基础上的。毛主席说过：“这个军队之所以有力量，是因为所有参加这个军队的人，……是为着广大人民群众的利益，为着全民族的利益，而结合，而战斗的。”下级服从上级，战士尊重干部，是每个军人为了革命需要的一种自觉行动，而不是靠军衔和等级去起作用。只有具有高度的政治觉悟的人民战士，才能做到令行禁止，一切行动听指挥。在平时，自觉自愿地做好工作，完成任务；在战时，自觉自愿地冲锋陷阵，消灭敌人。"},{"type":"paragraph","text":"我们过去几十年没有军衔制度，照样打败了国内外强大的敌人。在抗美援朝战争中，中国人民志愿军也没有军衔，但是，他们发扬了爱国主义和国际主义的精神，在同朝鲜人民军并肩作战中，配合得很好，协同得很好，一起打败了美帝国主义，取得了伟大的胜利。这说明，没有军衔，是不会影响作战指挥的，也不会影响同兄弟国家军队联合作战的统一指挥的。"},{"type":"paragraph","text":"军衔制度取消以后，中国人民解放军陆、海、空军、公安部队所有部队人员，一律佩带全红五角星帽徽、全红领章。新的帽徽、领章非常大方、朴素，突出了鲜红的革命色彩。帽徽是一颗红星头上戴，象征着党和毛主席的领导；领章是革命红旗挂两边，象征着我军非常无产阶级化、非常战斗化。这就非常鲜明地非常形象地体现了我军的革命本质和光荣传统。"},{"type":"paragraph","text":"取消军衔制度，是一个进一步发扬我军光荣传统的措施，是一个促进我军更加革命化的措施。我们应该深刻地领会这一措施的深远意义，坚决地按照毛主席人民军队的建军原则，加强我军的建设。干部要更好地爱护战士，战士要更好地尊重干部；上级要更好地关心下级，下级要更好地服从上级。要进一步加强团结，加强纪律，在我军内部到处形成又有集中，又有民主，又有纪律，又有自由，又有统一意志，又有个人心情舒畅、生动活泼的政治局面。让我们更高地举起毛泽东思想的伟大红旗，在伟大的党、伟大的领袖毛主席的英明领导下，进一步发扬我们伟大人民军队的革命精神和光荣传统，在非常无产阶级化、非常战斗化的道路上奋勇前进！"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"74f01ae9e0"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
