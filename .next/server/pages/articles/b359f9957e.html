script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"是谁“欢迎剥削”？","authors":["戎冠秀"],"dates":[{"year":1967,"month":4,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"是谁“欢迎剥削”？"},{"type":"paragraph","text":"戎冠秀"},{"type":"paragraph","text":"在这场史无前例的无产阶级文化大革命中，我们揪出了中国的赫鲁晓夫——党内头号走资本主义道路的当权派，挖出了中国修正主义的总后台，这是毛主席革命路线的伟大胜利！是毛泽东思想的伟大胜利！"},{"type":"paragraph","text":"党内头号走资本主义道路的当权派，胡说什么"},{"type":"paragraph","text":"“剥削是救人”，“要欢迎剥削”，“雇工种地是合法的，对群众也有好处”。他这一派胡言乱语，使我的旧恨新仇又涌上了心头。"},{"type":"paragraph","text":"解放前，我全家老小给地主当牛做马。我给地主当使女，整天给这些吸血鬼洗衣裳、推磨、做饭。我的三个儿子给地主当长工，放牛牧羊。就是这样，我们一家老小还是吃不上穿不上。向地主借粮，春借一石，秋还一石五斗，地主还小斗出，大斗入。地主老爷不顾穷人的死活，靠剥削穷人，吃喝作乐。我要问党内头号走资本主义道路当权派：你说这是“救人”，照这样“救”下去，世上还会有我们贫下中农的活路吗？你还胡说我们“欢迎剥削”，这纯粹是对我们贫下中农的诬蔑。我们欢迎的是毛主席领导我们打倒帝国主义，打倒封建主义，打倒资本主义，打倒修正主义，建设社会主义，建设共产主义。我们坚决铲除你们这些害人虫。"},{"type":"paragraph","text":"毛主席领导我们，使我们得到了解放，建立了社会主义制度。可是党内头号走资本主义道路当权派贼心不死，到处兴妖作怪，大刮资本主义阴风。我们村的党内一小撮走资本主义道路的当权派，和没有改造好的地富分子勾结起来，同流合污，大搞投机倒把，破坏集体经济，打击贫下中农，这股妖风就是来自党内头号走资本主义道路的当权派。"},{"type":"paragraph","text":"党内头号走资本主义道路当权派的丑恶嘴脸已经暴露在光天化日之下。我们贫下中农一定高举毛泽东思想伟大红旗，坚决地、勇敢地投入战斗，用战无不胜的毛泽东思想这一最锐利的武器，批倒批臭党内头号走资本主义道路的当权派，不获全胜，绝不收兵！（据新华社电）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b359f9957e"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
