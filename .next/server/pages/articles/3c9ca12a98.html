script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"老挝爱国战线中央发言人  谴责老挝极右派进攻解放区","authors":[],"dates":[{"year":1975,"month":4,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"老挝爱国战线中央发言人"},{"type":"paragraph","text":"谴责老挝极右派进攻解放区"},{"type":"paragraph","text":"新华社万象一九七五年四月二十四日电　据巴特寮电台报道，老挝爱国战线中央委员会发言人四月二十日发表声明，谴责老挝极右派出动军队和飞机进攻解放区。"},{"type":"paragraph","text":"声明揭露了老挝极右派最近出动部队和飞机进攻沙拉富昆北部解放区和万象省的富法南等地解放区。"},{"type":"paragraph","text":"声明指出，老挝极右派在美帝支持下进行的上述行径，违反了万象协定及其议定书，破坏了老挝的和平与民族和睦。"},{"type":"paragraph","text":"声明强烈谴责老挝极右派的上述战争行径，并要求它们必须严格、彻底履行万象协定及其议定书，立即停止对解放区的进攻。"},{"type":"paragraph","text":"声明最后说：“热爱和平和民族和睦的老挝爱国战线和老挝人民一贯认真和严格履行万象协定及其议定书，但是，我们决不会放任极右派破坏老挝和平和民族和睦的战争行动。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3c9ca12a98"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
