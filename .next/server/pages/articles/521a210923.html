script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"不能满足于“不批自臭”——兰州市长新电表厂引导群众深入揭批“四人帮”","authors":[],"dates":[{"year":1977,"month":1,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"不能满足于“不批自臭”"},{"type":"paragraph","text":"——兰州市长新电表厂引导群众深入揭批“四人帮”"},{"type":"paragraph","text":"兰州市长新电表厂，是全市工业学大庆的先进单位。在揭发批判“四人帮”的斗争中，这个厂一直站在前列，并且取得了一些经验。这就是：提高认识，抓住要害，集中力量，批深批透。"},{"type":"paragraph","text":"“四人帮”垮台以后，长新电表厂的广大职工立即开展了革命大批判。但有少数同志对大批判重视不够。有的满足于了解有关“四人帮”罪行的新材料，不在深入批判上下功夫。这些同志有种想法：“四人帮”作恶多端，人心丧尽，不批自臭。厂党委认为，这是对这场斗争的性质、任务和意义认识不足的表现。他们从上而下地举办了五十多期干部、党团员和理论骨干参加的学习班，并且组织广大职工认真学习毛主席关于批判“四人帮”的重要指示和党中央的文件，学习毛主席的《论十大关系》和华主席在第二次全国农业学大寨会议上的讲话。大家认识到，我们同“四人帮”的斗争，是两个阶级、两条道路、两条路线的生死大搏斗，是中国共产党及其领导下的广大革命人民群众同国民党反动派长期斗争的继续，是无产阶级同资产阶级阶级斗争的继续。工人阶级要发挥主力军作用，带头冲锋陷阵。大家还谈到，这几年来，“四人帮”利用手中的舆论工具，散布了大量修正主义谬论。不下番功夫把这些谬论批倒批臭，我们怎么能贯彻执行毛主席的革命路线呢？认识提高以后，全厂立即掀起了揭批“四人帮”的高潮。"},{"type":"paragraph","text":"厂党委还针对有的班组在大批判中火力不集中，批判不深入的情况，提出：“批‘四人帮’必须抓住要害。”党委书记亲自挂帅，充分发挥工会、共青团、妇女、民兵等组织的作用，广泛动员群众，发动了揭批“四人帮”篡党夺权阴谋的战役。厂党委还总结推广了计数器车间把“四人帮”的罪行列出专题批判的经验，编写了批判辅导材料。这样批判，目标集中，火力猛烈，很快揭穿了“四人帮”的丑恶面目。随着揭批“四人帮”斗争的步步深入，全厂的形势越来越好。"},{"type":"paragraph","text":"本报通讯员　本报记者"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"521a210923"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
