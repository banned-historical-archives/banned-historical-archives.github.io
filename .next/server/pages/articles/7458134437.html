script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"团结一致痛批中国赫鲁晓夫闸北五金区店及所属各基层店在批判修正主义建党路线高潮中改善了党群关系和干群关系","authors":[],"dates":[{"year":1967,"month":12,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　上海闸北五金区店及所属各基层店已掀起了一个批判中国赫鲁晓夫修正主义建党路线的高潮，他们天天学习毛主席著作，天天批判中国赫鲁晓夫的修正主义建党路线，进一步改善了党群关系、干群关系。"},{"type":"paragraph","text":"这个区店的无产阶级革命派在今年初就夺了区店大权，实现了革命的大联合。夺权后，从组织上看，只有一个工人革命造反队，但由于中国赫鲁晓夫修正主义建党路线和资产阶级反动路线的影响，党群关系、革命派和革命群众的关系不够融洽，有的甚至互不服气。"},{"type":"paragraph","text":"针对这些现象，区店革委会前一时期也开了一些座谈会、谈心会，让他们坐在一起学习毛主席著作，相互关系有所改善。最近，区店党员和非党员革命派同志、革命群众对中国赫鲁晓夫修正主义建党路线同声进行揭发、批判，找到了党群关系不好的总根子还在中国赫鲁晓夫身上，就是这个中国赫鲁晓夫的修正主义建党路线及其黑《修养》毒害了党员，使有些地方的党群关系产生了不正常现象。在大小批判会上，有的党员同志说，我入党以后，产生了优越感，脱离了群众，对一些造反队员看不惯，不称心，这就是中国赫鲁晓夫把党员凌驾于群众之上的反动思想影响的结果。有的党员说，中国赫鲁晓夫说什么“我们对群众运动，一定要在领导上控制得住，……没有纪律、没有秩序的群众运动，不算群众运动。”就是这一谬论的流毒，使有些党员在无产阶级文化大革命运动初期站在群众运动的对立面。大家一致要求，用毛泽东思想武装自己的头脑彻底改造世界观，争取做一个毛主席的好党员。"},{"type":"paragraph","text":"通过一系列的批判，闸北五金区店党群关系、干群关系得到了进一步改善。他们团结在一起，战斗在一起，同声痛批中国赫鲁晓夫。区店原共青团支部书记在运动初期整理了整群众的黑材料，站错了队，被群众冲击了一下，一度同革命派思想抵触。通过学习、批判，现在又和革命派战斗在一起了。在这几天批判修正主义建党路线中，他同群众一起常常战斗到深夜。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"夺权","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7458134437"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
