<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"钱伟长如何对待科学规划？","authors":["郎世俊"],"dates":[{"year":1957,"month":7,"day":5}],"is_range_date":false,"parts":[{"text":"钱伟长如何对待科学规划？","type":"title"},{"text":"郎世俊","type":"authors"},{"text":"(1957年7月3日东北工学院郎世俊教授在本校批判钱伟长会议上揭发)","type":"subtitle"},{"text":"郎世俊说：为了使我国科学侭速赶上国际水平，去年进行了全国性的12年科学规划。在这项重大的工作中充分的体现了党领导科学事业的方针政策。它把我国现有的科学力量组织起来，根据社会主义建设的需要，加以长期安排。每一个参加规划的科学家都感到兴奋，也都感到责任重大。","type":"paragraph"},{"text":"钱先生是这项规划工件的领导人物之一。可是钱先生是以什么态度来对待这件事的呢?举两个例吧!","type":"paragraph"},{"text":"(一)12年科学规划工作中，钱先生担任过生产过程的机械化和自动化小组的组长，可是钱先生不但不掌握生产过程机械化及自动化的全部主要内容，而且也不熟悉任何一部分的具体内容，连一些基本问题的名词的含义也不很清楚，如自动化仪表组合统一化，自动电力拖动的交流电机调速问题，冶金工业的冷轧、冷拔自动化问题，自动化技术工具中的变速器，比较元件等。怪不得有一次钱先生不得不去请求钱学森先生介绍一本“薄的”自动化参考书。","type":"paragraph"},{"text":"生产过程机械化及自动化本来是一门最新的科学，中国还缺乏这方面的成熟的专家，钱先生“勇于负责”，也未尝不可，但自己不懂就应谈虚心从头学起，可是钱先生即常常以十足“内行”的姿态出现。他担任小组长后，答应了写轻工业炼油厂自动化中心问题的说明书，但是迟迟写不出来，最后只好籍口忙于其他事情而作罢。当时自动化小组共写了十六个中心问题的说明书，钱先生却没有能写出一个。","type":"paragraph"},{"text":"规划委员会综合小组要各组长执笔写任务说明书，钱先生就动手写出八千字的初稿，但经过小组讨论，一致认为空洞而不切实际，修改都很困难，最后只好由组员分段重写，集体讨论来决定。这次重新写作中，钱先生没有亲自执笔写过其中任何一段，这当然也是可体谅的，但是最后印出的任务综合说明书中却印着“本任务说明书执笔人：钱伟长”字样，把组员们的汗马功劳，一笔勾销，引起知情人士议论纷纷，这却是怎么回事?","type":"paragraph"},{"text":"(二)去年国家12年科学规划以前，科学院已经开始做了一些科学规划的准备工作，约请了各方面的中国专家草拟了一些科学规划文件。在这个工作中，钱先生曾自以为是地以农业机械专家的身份写了关于农业机械的规划。但是钱伟长在这方面并不具有足够的知识，又不屑请教农业机械的专家，草草写出几百字的草案，完全不合乎要求，因之在正式规划时贻笑大方，根本没有任何参考价值。后来，不得不另由十几位专家重订。","type":"paragraph"},{"text":"有人也许以为中国缺乏这方面的专家，只能由钱伟长勉为其难。事实绝非如此。例如清华大学就有刘仙洲付校长是这方面的一位专家。另外，在北京也不缺乏这方面的专家，如王万钧、陈百川、蹇先达、李克佐、陈立、曾德超、陶鼎来、李翰如等等。","type":"paragraph"},{"text":"农业机械规划实际上是件对国民经济具有非常重大意义的工作，内容极为丰富。正式规划完了时，任务书及中心问题就长达150页，已大非钱伟长的几百字的规划草案了。","type":"paragraph"},{"text":"钱伟长经常指责党不发挥中国专家的作用，自己又为什么这样对待这项重大的工作呢？","type":"paragraph"},{"text":" 来源：《捍卫高等教育和科学事业的社会主义方向》，清华大学新清华编辑委员会编，1957年12月。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8aa2759a58"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
