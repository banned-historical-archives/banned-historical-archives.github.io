script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"周家牌路里弄干部孙长荣利用职权剥削居民","authors":["倪学荣","刘吉金","孙朝来","陈肤"],"dates":[{"year":1952,"month":1,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编辑同志:我们临青路周家牌路居民委员会主任委员孙长荣利用职权，串通里弄小组长石汝柏，在上月中旬向居民强卖从乡间俏来的鸭子。每只重一斤或十余两的鸭子索价达一万四千元，超过市价二倍到四倍。石汝柏曾先后将鸭子强卖给居民陈三妹、谭克兰等，她们不要，石汝柏就将鸭子摔在她们家里，并大骂山门。这种恶霸行为引起群众的很大反感。居民陈吴氏反应说:“新社会里还能强行买卖吗?”希望人民政府认真处理这件事情，并以此教育其他作风不好的里弄工作人员。"},{"type":"paragraph","text":"孙朝来　陈肤　刘吉金　倪学荣"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6e69022be1"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
