script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"《印度教徒报》报道说  参加不结盟国家会议筹备会的许多国家认为印度对某些问题的态度是“极右的”","authors":[],"dates":[{"year":1961,"month":6,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"《印度教徒报》报道说"},{"type":"paragraph","text":"参加不结盟国家会议筹备会的许多国家认为印度对某些问题的态度是“极右的”"},{"type":"paragraph","text":"新华社22日讯　新德里消息，据《印度教徒报》报道，6月5日到13日在阿拉伯联合共和国首都开罗举行的不结盟国家会议筹备会议上，许多与会国家认为印度对一些问题的态度是“极右的”，“同西方的态度很相似。”"},{"type":"paragraph","text":"这家报纸说，在会议上非洲国家代表们认为，印度以阿尔及利亚不是独立国家为理由反对它参加不结盟国家会议，“只是法律上的诡辩”。这些非洲国家认为，“不时讲些空话来表示同情阿尔及利亚的独立，是没有意义的，实际上只对法国有好处。”"},{"type":"paragraph","text":"消息说，在接受刚果合法政府参加筹备会议的问题上，许多与会国家同印度存在着尖锐的分歧。会上绝大多数国家同意接纳刚果合法政府参加筹备会议，而印度却以“承认刚果一个省份的政府是不明智的”为由，表示反对。消息说，印度的这种态度，“引起了非洲国家更大的怀疑”。消息说，刚果事态的发展，使得非洲国家对印度在刚果所起的作用“表示不信任”。消息说，这些国家认为，“印度实际上是为西方解决刚果问题的办法效劳”。"},{"type":"paragraph","text":"这家报纸说，“印度提出的敞开最高级会议的大门的主张，并没有引起任何热烈的响应。许多国家同意邀请更多国家参加，但是必须仔细审查它们的外交政策。它们需要的不仅是军事意义上的不结盟，而且也是政治意义上的不结盟。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ef7b6666b6"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
