script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"彻底批判中国赫鲁晓夫的修正主义建党路线 ——杨树浦、发电厂革命大字报选","authors":[],"dates":[{"year":1967,"month":12,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编者按:一场大学大用毛主席的建党思想，大批特批中国赫鲁晓夫修正主义建党路线的群众运动，正在上海蓬勃展开。在这场战斗中，我们仍然要充分发挥革命的大字报这个极其有用的新式武器的作用。最近一个时期来，上海街头和有些单位的大批判专栏办得没有过去那样有生气了。还有些地方甚至被那些派性的大标语玷污了我们的宣传阵地，这是不能容忍的现象。"},{"type":"paragraph","text":"在这方面，上海的工人阶级是值得我们学习的。不少工厂始终牢牢掌握斗争大方向，坚持办好革命大批判专栏，在斗私批修和推动本单位斗批改中都发挥了一定的作用。杨树浦发电厂就是其中的一个好典型。"},{"type":"paragraph","text":"我们希望全市人民进一步行动起来，把以批判中国赫鲁晓夫修正主义建党路线为内容的革命大字报，迅速地贴满上海街头，贴满工厂、学校等各个单位，把我们的大批判专栏办成对阶级敌人进行战斗的强有力的宣传阵地，彻底批倒批臭中国赫鲁晓夫及其黑爪牙。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"name":"派性","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"872dee4682"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
