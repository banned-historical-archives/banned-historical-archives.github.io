script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"杨守达等妄想与党唱“对台戏”，贵州人民出版社揭穿他们出版反动刊物阴谋","authors":[],"dates":[{"year":1957,"month":8,"day":14}],"is_range_date":false,"parts":[{"text":"杨守达等妄想与党唱“对台戏”，贵州人民出版社揭穿他们出版反动刊物阴谋","type":"title"},{"text":"人民日报讯５、６月间，贵州人民出版社以编辑杨守达、钱革为首的右派集团，集中火力向党的领导开火，企图搞垮出版社的党领导。杨守达把出版社领导描绘成是“大街小巷摆香烟摊的老板”，根本不懂得出版事业的特点。把出版社几年来的工作成绩和经验完全抹煞。钱革攻击领导说：“我们总编辑的水平不高，既不是作家也不是专家，又不懂文艺，要调换总编辑。”","type":"paragraph"},{"text":"他们不仅企图取消党对出版社的领导，以该社编辑钱革、杨守达、程肇瑞、龙光沛、邓雷、胡危舟、谭涤非等七人组织的右派集团，还积极准备出版反动刊物——“文学青年”。他们有着严密的组织分工和反共纲领。他们曾先后召开五次会议，激烈地讨论过纲领。杨守达主张“不反映社会主义建设生活和少数民族生活”，邓雷说：“马列主义为指导思想这些词句干脆不要。”他们一致确定刊物要与“山花”（贵州省文联的文艺刊物）、“乌江”（贵州日报副刊）唱对台戏。胡危舟主张：要抓住“山花”、“乌江”的缺点，放它几炮，抬高自己的身价。总之，他们千方百计要搞垮“山花”和“乌江”，进一步占领贵州文坛。钱革、杨守达、胡危舟、邓宗岳、徐心荣、龙光沛等右派分子还曾在一起研究，准备以章回小说的笔法合写一本“除三害演义”，来系统地把出版社的领导一个个加以污蔑和丑化。","type":"paragraph"},{"text":"钱革在大家的追击下承认：他们的目的是要取消党的领导，把社长赶跑，使出版社按照他们的想法（资产阶级的办法）来办，把出版社拉到资产阶级的道路上去。杨守达也承认至少要把出版社搞成散垮垮的，成为无组织、无政府状态，那时就可按照自己的想法办事，把出版社引向资产阶级的方向。","type":"paragraph"},{"text":"当右派集团的反党阴谋被揭穿后，右派集团眼看着就要土崩瓦解了，钱革就亲自上阵，为右派分子打气，并写了长达六千字的论文，公开反对马列主义辩证法，说“辩证法是诡辩，说来说去都是它的对。”钱革还说：“解放了工人得政权，农民得土地，知识分子得到什么呢？”这显然是继续煽动知识分子向党进攻，坚持其反党反社会主义的立场。出版社的同志们表示一定要进一步揭发、批判他们的反动言行，继续把这一斗争深入下去，不获全胜，绝不收兵！","type":"paragraph"},{"text":" ——原载《人民日报》1957年8月14日。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a21b9cd0c6"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
