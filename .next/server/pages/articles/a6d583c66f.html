script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"抓紧革命大批判　加强革命纪律教育文化系统狠批无政府主义通过大学习、大批判，有的单位出现人人口诛笔伐，向无政府主义和一切资产阶级反动思潮放火开炮的革命景象","authors":[],"dates":[{"year":1969,"month":8,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　驻上海文化系统的工宣队、军宣队和文化系统革筹会，遵照伟大领袖毛主席“加强纪律性，革命无不胜”的教导，充分发动群众，狠抓阶级斗争，猛煞无政府主义，狠狠打击资产阶级歪风，大长了无产阶级的革命正气。"},{"type":"paragraph","text":"文化战线的阶级斗争，历来就是十分尖锐、复杂的。当前，广大革命群众在工宣队、军宣队和革筹会领导下，深入开展大学习、大批判，狠批“文化工作危险论”和斯坦尼反动“体系”，向资产阶级发动强大攻势的时刻，一小撮阶级敌人为了妄图逃脱其必然彻底灭亡的命运，极力散布资产阶级思潮，散布无政府主义、山头主义、宗派主义，向无产阶级进攻。那里有无政府主义思潮泛滥，那里就有一小撮阶级敌人在兴妖作怪。文化系统不少单位通过分析阶级斗争新动向，深刻揭露一小撮阶级敌人的翻案活动，使大家认识到无政府主义思潮是无产阶级专政下继续革命的大敌，当前不但要批判有形的无政府主义错误行为，更主要的是要肃清自己头脑中的资产阶级思想。文化系统四连(原作家协会)的革命群众在批判无政府主义的狂热吹捧者巴金时指出:“批判无政府主义的斗争，就是争夺青年的一场斗争。”有的单位采取一学(学习毛主席著作)、二摆(摆无政府主义的表现)、三批(批无政府主义的危害性)、四挖(挖无政府主义的根源)、五订(订出改正措施)的措施后，出现了人人口诛笔伐，批臭无政府主义，向资产阶级思潮放火、开炮的革命景象。"},{"type":"paragraph","text":"有些单位，过去纪律松懈，开会稀稀拉拉，工作时间谈吃喝玩乐，不以为耻，还错误地提出“人人都有‘私’字”论。通过大学习，大批判，认识到闹无政府主义和头脑中的个人主义是分不开的，很多同志自觉斗私批修，主动写批判文章，加强了纪律性，增添了革命干劲，精神面貌起了显著的变化。文化系统九连(上海合唱团、民乐团、管乐团、交响乐团)前一时期，无政府主义现象也较突出，有些人对运动不够关心，却热衷搞什么五法，即:缝纫法、裁剪法、新针疗法、毛线编结法、耳针查症法。通过批判了叛徒、内奸、工贼刘少奇的“阶级斗争熄灭论”、“活命哲学”，决心要以毛主席无产阶级专政下继续革命的思想武装自己，发扬“一不怕苦，二不怕死”的革命精神，搞好当前的清队和整党工作。"},{"type":"paragraph","text":"抓革命大批判就是抓阶级斗争。不少单位由于批判了无政府主义等资产阶级思潮，打击了资产阶级歪风邪气，大长无产阶级正气，有些长期隐蔽自己问题的人，迫于无产阶级专政的强大威力，不得不主动交代了问题。"},{"type":"paragraph","text":"驻文化系统的工宣队、军宣队和文化系统革筹会，决心遵照伟大领袖毛主席“千万不要忘记阶级斗争”的教导，进一步发动群众，不断向阶级敌人打进攻战，掀起斗、批、改的新高潮，夺取文化战线的新胜利!"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"name":"革命大批判","type":"主题/事件"},{"name":"清理阶级队伍","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a6d583c66f"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
