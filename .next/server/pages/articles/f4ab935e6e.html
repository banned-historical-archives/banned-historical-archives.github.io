script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"马万水工程队与“四人帮”针锋相对，大干社会主义   十一个月完成三年零四个月任务","authors":[],"dates":[{"year":1976,"month":12,"day":31}],"is_range_date":false,"parts":[{"type":"paragraph","text":"马万水工程队与“四人帮”针锋相对，大干社会主义"},{"type":"paragraph","text":"十一个月完成三年零四个月任务"},{"type":"paragraph","text":"据新华社石家庄电　河北省邯邢冶金矿山建设指挥部马万水工程队的工人和干部，在愤怒声讨“四人帮”反党罪行中，焕发出极大的社会主义积极性。全队大战十一月份，创造了井巷掘进月进一千四百四十八米的新纪录，一举闯过了全年掘进进尺五千米的大关，用十一个月的时间完成了三年零四个月的井巷掘进任务。"},{"type":"paragraph","text":"去年，马万水工程队根据祖国社会主义建设的需要，从宣化龙烟铁矿来到邯邢地区开发矿业。二十多年来，这个工程队坚持以阶级斗争为纲，先后十九次攀登全国黑色金属矿山掘进的高峰。为了早日实现伟大领袖毛主席提出的我国发展国民经济的两步宏图，去年，马万水工程队全体工人和干部经过反复酝酿，又制订了工程队第五个五年计划期间的跃进规划，他们决心迈出更大的步伐，为社会主义革命和社会主义建设做出新贡献。可是，“四人帮”反党集团出于篡党夺权的罪恶目的，疯狂地破坏毛主席亲自制定的“抓革命，促生产”的伟大方针。他们挥舞“唯生产力论”的大棒，一古脑儿向他们压来。工程队的广大工人和干部，进行了坚决的抵制。他们说：我们大批资本主义，大批修正主义，大干社会主义全然没有错。没有雄厚的物质基础，我们拿什么来建设社会主义，实现共产主义？国民经济上不去，无产阶级专政怎么巩固，又拿什么去支援世界人民的革命斗争？全队职工与“四人帮”针锋相对，大干社会主义，今年第一季度就超额完成了全年井巷掘进一千五百米的国家计划。"},{"type":"paragraph","text":"砸烂“四人帮”，矿工心欢畅。大家摩拳擦掌，响亮地提出“出满勤，夺高产，上班拚命干，下班做贡献”的口号。三十多名身体有病、原来已不在井下工作的老工人，不顾领导和同志们的劝阻，自愿来到井下参加战斗。一中队吕志山班的工人，怀着对“四人帮”反党集团的刻骨仇恨，一个班放了七茬炮。炮烟还没有抽尽，大家就顶着炮烟争分夺秒地出渣。在大战十一月的过程中，工人们克服了一个又一个困难，闯过了一道又一道险关。一中队的掌子面出现了罕见的断层，每天塌方五、六次。二中队遇到了少有的地下水，每小时涌水量达一百三十多吨。面对这艰苦的作业条件，工人们豪迈地说，马列主义指方向，愤怒声讨“四人帮”，天大困难无所惧，刀山火海也敢闯。他们采取各种有效措施战胜了大塌方和地下水，保证了掘进作业的胜利进行。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"name":"夺权","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f4ab935e6e"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
