script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"0b2f26ed-ad29-48e7-9c89-446932a97ab0","name":"中共党史教学参考资料 第27册 “文化大革命”参考资料 下册（1988年）","internal":true,"official":true,"type":"pdf","author":"","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives3/main/0b2f26ed-ad29-48e7-9c89-446932a97ab0.pdf"],"article":{"title":"元帅之死——贺龙同志被林、江反革命集团迫害致死前后","alias":"","parts":[{"type":"paragraph","text":"附件二："},{"type":"paragraph","text":"训"},{"type":"paragraph","text":"令"},{"type":"paragraph","text":"训令军政部部长何应钦据本行营第一厅第二处处长晏勋甫呈称熊瑞龄奉派招降贺匪惨被诱杀拟恳特加优恤令仰该部长从优议恤医月。"},{"type":"paragraph","text":"案据本行营第一厅第二处处长晏勋甫签呈称，窃查熊瑞龄于上年十一月奉派赴鄂西招降贺龙一案，兹接湖北何主任来电，谓被贺匪诱杀等语，查熊瑞龄因与贺匪昔年友善，恐该匪人川与徐匪会合，遂愿深人虎穴，招安投诚，逾行抵施南后，与该匪见面，一切办法，均已议妥，不料该匪阳为归顺，阴实回测，竞将熊瑞龄惨杀。查该故员因招降贺匪，致遭惨杀，殊堪惜，除指令外，合行令仰该部长照少将阵亡例，从优议恤，为要！此令。"},{"type":"paragraph","text":"委员长蒋中正（注：原文载一九三四年蒋匪南昌行营《军政句刊》第十八期）"},{"type":"paragraph","text":"[附]元帅之死一贺龙同志被林、江反革命集团追害致死前后"},{"type":"paragraph","text":"胡思升"},{"type":"paragraph","text":"一九六九年六月九日，身经百战、所向披的贺龙元帅，在暗害的屠刀袭击之下、倒下了："},{"type":"paragraph","text":"这一天清晨，在面临死亡威胁之前，贺龙同志神志清醒，他对夫人薛明同志说：“你可要当心啊！他们可能要下毒手啦！”"},{"type":"paragraph","text":"最高人民检察院特别检察厅的起诉书中短短一句话，“贺龙被迫害致死”，包含着什么内容？林彪、叶群、吴法宪、康生之流是如何必欲置贺龙元帅于死地而后快的黑幕，通过法庭的审理，触自惊心地被揭示了出来。"},{"type":"paragraph","text":"为了诬陷贺龙、打倒贺龙，林彪亲自赤膊上阵。"},{"type":"paragraph","text":"一九六六年八月中句的一天上午，林彪在人大会堂浙江厅召吴法宪去谈空军党委一次全会的情况，劈头就定调：“你们这次会议贺龙插手了。贺龙到处插手，总参、海军、空军、政治学院都插了手。”又说：“空军是一块肥肉，谁都想吃”，贺龙派人要“夺你的权”，“你要警惕和防备”。"},{"type":"paragraph","text":"吴法宪按照林彪的授意，马上亲笔写信，诬陷贺龙在空军内部搞地下活动、罢官夺权。"},{"type":"paragraph","text":"与此同时，林彪也召见李作鹏，诬蔑说：“要注意贺龙，贺龙实际上是罗瑞卿的后台，他采取种种卑手段拉了一批人来反我”。同吴法宪一样、李作鹏也于一九六六年九月七日给林彪写信、诬陷贺龙。"},{"type":"paragraph","text":"从一九六六年到一九六九年，林彪、叶群、吴法宪、李作鹏相互配合，给贺龙同志加了无数顶帽子、数不清的罪名：“大土匪”、“大军阀”、“向敌人投降”、“纂军夺权活动的里手”、“不知杀了多少人”、“一条以贺龙为首的黑线”、“定时炸弹”、“里通外国、苏修”、“搞反革命政变”、“在上海布置盯梢毛主席”，等等。真是挖空心思啊！"},{"type":"paragraph","text":"贺龙同志愤然地说：“他们根本没有确凿的证据。如有证据、也是假的”；“他们要是叫我签字画押，我就写·冤枉两个字”。他想到的不只是个人的冤屈，而且是林彪一伙的用心：“他们要把老同志都搞光，搞得毛主席身边没有人了，他们好大换班”。"},{"type":"paragraph","text":"凡是在林彪陷害忠良的场合，决不会没有叶群的魔影。"},{"type":"paragraph","text":"这一次，叶群选中了军队内负责警卫工作的处长，此人名叫未治国。叶群数次口授诬陷贺龙的材料，叫宋治国以自己的名义写揭发信。从一九六六年九月七日至二十四日，宋治国-共写了四封诬陷贺龙同志的信给林彪，林彪立即下令印发。"},{"type":"paragraph","text":"叶群假宋治国之手写的诬陷信的原件，如今都已查获。这些信，有些纯属捏造，有些十分荒唐可笑。为了立此存照、录以备考，不妨摘引几例："},{"type":"paragraph","text":"一、“罗瑞卿的家里办公桌，玻璃板底下压着一张照片、其中有贺（龙）、薛明、罗（瑞卿）、郝治乎四人的合影，天天看。但没有放主席的照片”。"},{"type":"paragraph","text":"二、“我觉得贺（龙）与罗（瑞卿）、彭（真）、杨尚昆反党分子来往很为密切。他们经常密谈。”“常去他（指贺龙）家的人神态不正常”。"},{"type":"paragraph","text":"三、“贺（龙）本人自已房间里亲自保管着一支精制进门的小手枪，夜间睡觉时常压在自已的枕头底下，外出带上。不知为了什么？”"},{"type":"paragraph","text":"四、“他对警卫人员的教育不是以政治佳帅，而是业务挂帅。如教育大家如何将枪法练好，并要求每个警卫人员要练得百发百中。”"},{"type":"paragraph","text":"五、“听说体委白动销毁了一百二十部电台，此事甚为可疑”。六、据说贺龙家曾经“在电话上安过--个窃听器”。等等，等等。"},{"type":"paragraph","text":"既要借刀条人，又不想留下痕迹，叶群还精心导演了一番。宋治国按照叶群的口授，在写好诬告信后，来到叶群处，叶群当着林彪办公室三位秘书的面假地问宋治国：“你写的这些材料是否都是事实？是，我们就送：不是，我们就不送了。”"},{"type":"paragraph","text":"宋治国答：“完全是事实，我完全负责。”"},{"type":"paragraph","text":"双簧演毕，叶群还嫌不足，又叫“林办\"三位秘书于一九六六年九月二十七日写了一份《关于宋治国写材料情况的证明》，无非是证明此事与叶群无关，是宋治国主动揭发的。"},{"type":"paragraph","text":"康生，这个专门经营诬陷勾当的坏人，也在贺龙同志背后插了一刀，制造了一个在北京一度闹得满城风雨的“二月兵变”事件。"},{"type":"paragraph","text":"天下本无事、何来“兵变”之说？"},{"type":"paragraph","text":"一九六六年春，经军委批准，北京军区组建一个团给北京卫戌区担负民兵训练任务，卫戌区为此派人到北京大学、人民大学商借房子。不料到了七月上旬，北大有人贴出大字报，怀疑部队向学校借房子是要搞兵变。"},{"type":"paragraph","text":"康生马上抓住这张捕风捉影的大字报、不经任何调查就宣称：“贺龙私自调动军队搞“二月兵变’，在北京郊区修了堡”。"},{"type":"paragraph","text":"这是康生一九六六年夏天的信口雌黄。到了一九六八年四月二十七日，这位身居要职的造谣家还对专案组说：“体委是贺龙现行反革命活动的重要地点。他给体委发了枪、炮，炮安在什刹海，炮口对准中南海。”"},{"type":"paragraph","text":"所谓“对准中南海”、就是要加害于毛主席。康生血口喷人，就这样无中生有地把所谓“兵变”、“谋害毛主席”的罪名强加给贺龙同志。从此以后，叶群、康生、黄永胜、吴法宪四个人完全控制了“贺龙专案组”。"},{"type":"paragraph","text":"吴法宪于一九六八年四月十八日对专案组布置任务：“贺龙是国民党右派、走资派，就是资产阶级，怎样打倒，就是把敌人的罪恶挖出来，一定要拿出实际行动做到“五个忠于””。忠于林家王朝的专案组，从各个方面向贺龙元帅进逼，他们把无说成有，把白说成黑。"},{"type":"paragraph","text":"他们拿来一个书面问题、要贺龙交代历史上的“罪行”，所谓一九三三年同蒋介石派到湘鄂西的“说客”熊贡卿“谈判”的问题。明明是贺龙当时下令逮捕并枪决了熊贡卿、并报告了中央，现在却成了他“通敌”的罪名。贺龙同志怒不可遏，吼道：“撞他妈的鬼，人都给我枪毙了嘛！栽姓！完全是栽！”"},{"type":"paragraph","text":"贺龙透过吹来的黑风，看清了林彪一伙的罪恶用心。他对薛明同志一再讲：“咳，我们党里出了鬼，出了奸臣啦！”“党怎么办？国家怎么办？”"},{"type":"paragraph","text":"一九六九年二月的一天，贺龙同志用手杖敲着当时到处泛滥的林彪相片：“你这个家伙，整起人来啦！”“还有林彪的老婆叶群，也不是个好东西”，“康生这个人，老奸巨猾，做尽了坏事”。贺龙不低头。他们的折磨越加骇人听闻了。"},{"type":"paragraph","text":"对一个七十一岁高龄的糖尿病人，大热天只给一小壶水。不洗脸，不漱口，都很难应付。贺龙同志为了接天上的雨水以救急，有一次大雨中在台阶上滑倒，扭伤了腰，十八天不能动弹。"},{"type":"paragraph","text":"贺龙同志经常吃的是清水煮白菜、·糠萝卜。有一次，送饭的人竞然把饭菜全部倒在地上。薛明同志一次望着贺龙消瘦的脸、问他：“你是不是饿啊？”元帅凄然一笑：“嘿！算你说对了。”派来治病的一个“医生”，是经过专案组六次“政审”、精心挑选的。他没收了贺龙身边必"},{"type":"paragraph","text":"【需的备用药品，贺龙的病情更加恶化了。一九六八年三月二十七日，贺龙同志突然说不出话来，口角歪斜、剧烈头疼，被送进医院。按照邱会作“医疗为专案服务”的指示，诊断书上竞然写的是“诈病”，治疗措施是：“请有关军医主宰”。堂堂中共中央政治局委员、中共中央军委副主席、国务院副总理贺龙元帅，病历上的姓名却写成：王玉"},{"type":"paragraph","text":"贺龙同志洞察其奸，对夫人说：“他们硬是想把我拖死，杀人不见血呵！”"},{"type":"paragraph","text":"一九六九年六月八日早晨，贺龙的糖尿病发展到了酸中毒的严重程度，连续呕吐，呼吸急促。找医生，迟迟不来，拖了十几个小时，直到晚上八时许，才来了“医生”。糖尿病是不能输葡萄糖的，却给输上了，输了整整一夜，整整二千毫升。"},{"type":"paragraph","text":"次日，六月九日，宣布要把贺龙送往医院。贺龙不愿去，反抗说：“我没有昏迷，我不能去住院，那个医院不是我住的地方”。上午九时，来人七手八脚地把贺龙同志往担架上抬，送上救护车，开走了。"},{"type":"paragraph","text":"下午三点多钟，来人把薛明同志带走，说是到医院核实一个材料。到了医院，薛明同志听到一个冷冰冰的宣布：“人已经死了。\"时间是六月九日下午三点零九分，也就是送往医院六小时零九分钟之后。"},{"type":"paragraph","text":"凝视着亲人的遗体，薛明同志不能自制：没有花束，没有党旗，没有同志和战友，只有一条床单覆盖着元帅的身躯和头部。"},{"type":"paragraph","text":"："},{"type":"paragraph","text":"！"},{"type":"paragraph","text":"多么令人难以置信啊！在反动统治时期，敌人悬赏十万大洋都买不去的头颅，却在自已亲手打下江山的土地上，被躲藏在内部的奸贼狠毒地谋害了生命！"},{"type":"paragraph","text":"元帅倒下了，他们也不放过贺龙的夫人薛明。特别是叶群，心怀鬼胎，盘算者如何软草除根的毒计。"},{"type":"paragraph","text":"有必要提一段往事。一九四三年延安整风时，薛明同志曾揭发过叶群参加CC特务组织、当过国民党电台广播员的问题。时隔二十三年之后的一九六六年，叶群对薛明说：“过去你说我那么多坏话，今后你只要不讲，我就既往不答了。”薛明没有置理。"},{"type":"paragraph","text":"一九六九年十一月的一天下午，叶群打电话给吴法宪：“薛明很了解我的情况，把她迁送到离北京远一点的地方，放在空军的监护下”。吴法宪一口称是。叶群责令第二天就派人送走。"},{"type":"paragraph","text":"吴法宪选定贵阳磊庄的空军干校，作为囚禁薛明的秘密地点。在派遭-一个班的兵力押送之前，吴法宪、邱会作亲自交代：“薛明去空军干校监督劳动，不许她乱说、乱道、放毒，找几个人监护。不许她写信。”"},{"type":"paragraph","text":"在公审林彪、江青反革命集团主犯的日子里，记者访问了薛明同志。讲到林彪一伙竟然无法无天地对包括贺龙同志在内的几乎所有党和国家领导人横加残酷迫害的种种令人发指的罪行时，薛明同志愤恨万分。她说：“对林彪、江青这一伙，不是私人的冤仇，他们要毁掉我们的国家，我们的民族。已经被毁掉的，何止一个贺龙！"},{"type":"paragraph","text":"（原载1980年12月13日《人民日报》）"},{"type":"paragraph","text":"{附〕贺龙被害内幕-“文化大革命”期间林彪、江青一伙追害贺龙元帅记实"},{"type":"paragraph","text":"杨金路江海洋北京。1969年6月9日。"},{"type":"paragraph","text":"301医院14病室，几个医护人员围在一张病床前紧张地忙碌着。病房的窗帘拉得严严实实，外面的走廊里，几个身穿军装、面部毫无表情的人在不停地来去。人们隐约感到有一种同医院很不协调的气氛笼罩着这里的一切。"},{"type":"paragraph","text":"医院的住院簿上记载着：患者姓名王玉，上午8时55分人院，系糖尿病性酮症酸中毒。人院前，因“误诊”为肠胃炎，确诊后又继续输人大量的高渗葡萄糖液，这对于病危的糖尿病人是绝对禁止的。这种反治疗措施，导致了病情急剧的恶化。"},{"type":"paragraph","text":"人们万万没有想到，病床上这个被称作王玉、年逾七旬、骨瘦如柴的老人，竟是中共中央政治局委员、中央军委副主席、国务院副总理贺龙元帅。"},{"type":"paragraph","text":"病床上，元帅艰难地睁开双眼，他终于回忆起来了，这里，是医院的病房。病床前，没有战友，没有亲人，只有一名住院军医和几位助手在忙碌着。他想挣扎着站起来，想马上逃出这个阴森森的病房。"},{"type":"paragraph","text":"“我不能去住院，那个医院不是我住的地方。”清晨，当医生准备送元帅住院时，元帅紧紧拉住夫人薛明的手，虚弱的语调微微有些额抖。"},{"type":"paragraph","text":"1968年初，元帅病情恶化，患了“失语症”，也是在这所医院，在医生的诊断书上，竞"}],"authors":["胡思升"],"dates":[{"year":1980,"month":12,"day":13}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":180,"page_end":183},"tags":[{"name":"吴法宪","type":"人物"},{"name":"康生","type":"人物"},{"name":"江青","type":"人物"},{"name":"贺龙","type":"人物"},{"name":"李作鹏","type":"人物"},{"name":"林彪","type":"人物"},{"name":"叶群","type":"人物"},{"name":"邱会作","type":"人物"},{"name":"罗瑞卿","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e8d40278d8"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
