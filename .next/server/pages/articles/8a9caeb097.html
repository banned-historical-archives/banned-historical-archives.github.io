script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"江西汽车制造厂革命职工发挥革命积极性和创造性  自力更生制成第一批井冈山牌汽车  革命职工狠批了党内一小撮走资派只相信洋教条和资产阶级技术“权威”的反动路线，在四个月内就实现了成批生产汽车的愿望","authors":[],"dates":[{"year":1968,"month":5,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"江西汽车制造厂革命职工发挥革命积极性和创造性"},{"type":"paragraph","text":"自力更生制成第一批井冈山牌汽车"},{"type":"paragraph","text":"革命职工狠批了党内一小撮走资派只相信洋教条和资产阶级技术“权威”的反动路线，在四个月内就实现了成批生产汽车的愿望"},{"type":"paragraph","text":"新华社南昌十日电江西汽车制造厂革命职工高举毛泽东思想伟大红旗，坚定不移地走自力更生的革命道路，在短短四个月的时间内，成功地生产了第一批井冈山牌汽车。"},{"type":"paragraph","text":"井冈山牌汽车，载重二吨半，起动容易，爬坡性能好，第一批共生产了十二辆。这次成批试生产成功，显示了毛主席无产阶级革命路线的无比威力。"},{"type":"paragraph","text":"无产阶级文化大革命以前，厂内一小撮走资派只相信洋设备、洋教条和资产阶级技术“权威”，走专家路线，不让工人过问。结果，在试生产过程中，大部分零件都靠外援，质量达不到标准，他们便把专业性的汽车制造厂改为修理、配件厂。在无产阶级文化大革命中，这个厂的无产阶级革命派造了党内一小撮走资派的反，改“汽车配件厂”为“汽车制造厂”。他们发扬自力更生、艰苦奋斗的革命精神，很快实现了成批生产汽车的愿望。"},{"type":"paragraph","text":"伟大领袖毛主席教导说：“我们是主张自力更生的。我们希望有外援，但是我们不能依赖它，我们依靠自己的努力，依靠全体军民的创造力。”在生产汽车的过程中，这个厂的广大革命职工在驻厂解放军的帮助下，遵照毛主席的这一教导，狠批了党内一小撮走资派依靠外援，依靠资产阶级技术“权威”的反动路线。广大革命职工充分发挥革命的积极性和创造性，自己动手制造了十二台专用机床、一百多件模夹具，克服了设备不足的困难。如汽缸体是一个精密度要求相当高的部件，过去，资产阶级技术“权威”一直没有搞成。现在，由三个三级技工组成的汽缸体小组，发挥集体的智慧和力量，浇铸出了百分之百的合格品。锻压大梁没有大型设备，锻工大梁小组的同志就想方设法压出了合格产品。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"江西文革","type":"人物"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8a9caeb097"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
