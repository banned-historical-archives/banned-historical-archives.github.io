script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"美国资产阶级报刊评论苏美首脑会谈说  肯尼迪使用的将是“强权政治的语言”","authors":[],"dates":[{"year":1961,"month":6,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"美国资产阶级报刊评论苏美首脑会谈说"},{"type":"paragraph","text":"肯尼迪使用的将是“强权政治的语言”"},{"type":"paragraph","text":"据新华社1日讯　美国资产阶级报刊继续广泛评论即将举行的苏美两国政府首脑会谈。"},{"type":"paragraph","text":"美国官方宣传机构美国新闻处在肯尼迪动身赴欧洲前夕5月28日从华盛顿发出的一条消息使用“实力政策”的语言说道，美国认为在维也纳会谈中最重要的是要使所谓“铁幕另一方的人民不要低估民主国家捍卫自由的决心”。它说，“自由世界真正的力量和能力空前强大”，并说“苏联人应当认识到，自由世界是有信心的……美国充分准备承担起它的义务。”"},{"type":"paragraph","text":"美国有影响的资产阶级策士、报纸评论员李普曼5月25日在《纽约先驱论坛报》上发表文章认为，美国在古巴、老挝所遭受的“挫折”以及亚拉巴马州种族歧视的丑剧，对他这次出国旅行是一个令人沮丧的序曲”。他认为，肯尼迪所以要同赫鲁晓夫会谈，是因为第二次世界大战刚结束后时期的美国“军事优势”已不复存在，这“是我们时代的中心事件，它深刻地影响到国际间的一切关系”。李普曼说：“以为任何人能够恢复美国在战后时期依靠核垄断而建立起来的至高无上的地位，这将是徒劳无益的。”但是，李普曼说，肯尼迪在维也纳谈判中所使用的仍“将必然是强权政治的语言”。"},{"type":"paragraph","text":"《纽约时报》5月22日刊载苏兹贝格的文章指出，加加林上天，对古巴的入侵被粉碎和干涉老挝的失败，这一连串事件表明“潮流是对我们不利的”，但是美国仍要在“逆潮的时候堵塞堤坝”。他说，“维也纳会晤的一个明显的含意就是：我们的总统决心要从赫鲁晓夫的脑海里消除任何这样的印象，即由于最近在外交上的失败，美国保卫它广泛散布的利益的决心已经不那么大了”。"},{"type":"paragraph","text":"这家报纸27日刊载从华盛顿发出的一篇报道也说，肯尼迪在维也纳会谈中“将以一种不容低估美国对自由的忠实的方式来陈述美国的态度”。美联社记者海托华27日说，肯尼迪要同苏联政府首脑会晤的"},{"type":"paragraph","text":"“主要原因之一是他要亲自打量一下在东西方斗争中他本人的敌人”，“尽可能懂得这位红色领袖的意图、力量和弱点”。“在肯尼迪同苏联领袖进行的全部讨论中将贯彻这一主题：美国决心履行它不仅在欧洲而且在中东、亚洲和西半球所承担的义务。”美联社记者瑞安28日在一篇评论中说：“西方已经警告世界说：（对这次会谈）不要抱很高的希望，并且不要期望会产生什么具体结果。”合众国际社30日从华盛顿发出的一条消息也强调说：在一系列的国际问题上，“肯尼迪已经决定对赫鲁晓夫采取强硬态度”。这家美国通讯社并且扬言：如果苏联拒绝美国的一些无理主张，“肯尼迪可以宣布要恢复原子试验”，它甚至叫嚷说：“美国比苏联更能进行军备竞赛。”《华盛顿明星晚报》说，肯尼迪“同意这次会晤除了想对他的苏联对手进行第一手的亲自估价以外，并没有抱丝毫的希望想要作出更多的事情”，“肯尼迪不想讨论实质问题”。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a349ea50bc"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
