" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji46","name":"毛泽东全集第46卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji46.pdf"],"article":{"title":"高级干部生病的四个原因","alias":"","parts":[{"type":"paragraph","text":"高级干部生病的四个原因"},{"type":"paragraph","text":"（1964年6月24日）"},{"type":"paragraph","text":"中国保健工作是学苏联的。我不能完全听保健医生的话。我同我的医生有一个君子协定，我发烧时请你，我不发烧时不找你，你也不找我。我说，我一年不找他，算他的功劳大，如果每个月都找他，这就证明他的工作没有做好。我对医生的话只听一半，要他一半听我。完全听医生的话病就多了，活不了。以前没有听说有那么多的高血压、肝炎，现在很多，可能是医生给找出来的。一个人如果不动动，只是吃得好、穿得好、住得好，出门坐车不走路，就会多生病。衣、食、住、行受太好的照顾，是高级干部生病的四个原因。我们的保健工作学了苏联的，把专门医生变成不专门的，不多看各种各样的病，不好，要改进。"},{"type":"paragraph","text":"[1]这是毛泽东接见越南外宾时关于保健工作讲话记录稿的一部分。"}],"authors":["毛泽东"],"dates":[{"year":1964,"month":6,"day":24}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":456,"page_end":456},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"28dc936a35"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
