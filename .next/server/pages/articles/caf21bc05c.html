script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"蕃瓜弄居民联系实际五批“克己复礼”提高了阶级斗争和路线斗争觉悟，推动了里弄各项工作的开展","authors":[],"dates":[{"year":1974,"month":6,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　伟大领袖毛主席和党中央发出批林批孔的战斗号令以来，闸北区天目西路街道蕃瓜弄党支部领导群众，联系里弄阶级斗争实际，围绕正确对待无产阶级文化大革命和社会主义新生事物这个问题，五批“克己复礼”，使广大居民进一步认清了林彪反革命的修正主义路线的极右实质和孔孟之道的反动本质，提高了阶级斗争和路线斗争觉悟。"},{"type":"paragraph","text":"蕃瓜弄是解放前著名的棚户区，生活在这里的劳动人民被压在旧社会的最底层。他们对“只有社会主义能够救中国”体会最深，对妄图复辟资本主义的野心家、阴谋家最仇恨。批林批孔运动开展以后，党支部就组织群众认真学习毛主席关于批林批孔的指示和党中央有关批林批孔的文件，学习《人民日报》、《红旗》杂志的有关言论，进行新旧社会回忆对比，用自己的亲身感受歌颂社会主义，狠批林彪“克己复礼”的反动纲领，进一步提高了为巩固无产阶级专政而奋斗的自觉性。许多退休工人尖锐地指出:林彪效法孔老二，要开历史倒车，复辟资本主义，是我们劳动人民的死对头。有些曾经不安心里弄工作的干部，通过学、批，认清了里弄是搞好社会主义革命和社会主义建设的一条重要战线，决心为巩固无产阶级专政，一辈子搞好里弄工作。"},{"type":"paragraph","text":"在提高群众对林彪修正主义路线极右实质的认识的基础上，党支部组织群众再批“克己复礼”。他们认真学习毛主席关于无产阶级文化大革命的一系列指示和党的基本路线，学习《人民日报》社论《批“克己复礼”》、《再批“克己复礼”》，对比全国、全市以及蕃瓜弄在无产阶级文化大革命前后的巨大变化，热情歌颂无产阶级文化大革命的伟大胜利，深入批判林彪否定无产阶级文化大革命的反动谬论。大家在批判中一针见血地指出:林彪妄图否定文化大革命的伟大成果，其实质是为了否定党的基本路线，颠覆无产阶级专政，复辟资本主义。有些家庭妇女说，过去中了刘少奇一类骗子谬论的流毒，只知“孩子、篮子、炉子”，经过无产阶级文化大革命，懂得了国家大事、世界大事。许多当了几十年睁眼瞎的家庭妇女，也积极学习文化，学习马列著作，动手写批林批孔的大字报。这说明全国各阶层广大群众都发动起来了。林彪一伙要“复礼”，只能在这堵反修防修的铜墙铁壁面前碰得粉身碎骨。经过学、批，一些对无产阶级文化大革命的深远意义认识不足的居民，认清了文化大革命不但粉碎了以刘少奇、林彪为头子的两个资产阶级司令部，而且对全国人民进行了反修防修的教育，人民群众识别真假马克思主义的能力普遍有了提高。"},{"type":"paragraph","text":"为了深入批判林彪一伙污蔑知识青年上山下乡是“变相劳改”的谬论，巩固和发展知识青年上山下乡这一新生事物，蕃瓜弄党支部又组织群众三批“克己复礼”。他们认真学习了《共产党宣言》中关于两个“决裂”的教导和毛主席关于知识青年上山下乡的一系列指示，狠批孔老二的“耕也，馁在其中矣”的谬论和林彪的“变相劳改”谬论，联系蕃瓜弄几年来有八百多名知识青年上山下乡的事实，大讲知识青年在农村广阔天地里茁壮成长的重大意义。通过学、批，大家深刻地认识到:对待革命的新生事物，革命阶级和反动阶级从来抱着截然相反的态度。一切反动阶级都极端仇视革命的新生事物。孔老二聚徒讲学，宣扬“耕也，馁在其中矣；学也，禄在其中矣”，是为奴隶主贵族训练忠实奴仆；林彪散布“变相劳改”的谬论，反对知识青年走与工农相结合的道路，是想把青年引上“三脱离”的修正主义邪路，为他复辟资本主义培养继承人。不少青年通过学、批，表示要与剥削阶级的传统观念决裂，与孔孟之道决裂，坚定不移地走毛主席指引的光明大道，把老一辈革命家开创的革命事业一代一代地往下传，把反修防修斗争进行到底。许多革命家长也进一步坚定了送子务农、教子扎根农村干革命的决心。"},{"type":"paragraph","text":"蕃瓜弄是外宾频繁来访的单位，接待好来自五大洲的外宾是贯彻执行毛主席革命外交路线，对广大居民进行无产阶级国际主义教育的一项重要工作。党支部在组织群众四批“克己复礼”时，首先引导大家认真学习毛主席革命外交路线，学习党中央关于外交工作的一系列指示，学习《共产党宣言》中“全世界无产者，联合起来”的教导和邓小平同志在联大特别会议上的发言，狠批林彪为了“克己复礼”而搞卖国投降的罪行，大大提高了广大居民贯彻执行毛主席革命外交路线的自觉性。有的积极分子认真学习列宁的《帝国主义是资本主义的最高阶段》，学习党内两条路线斗争史和报刊上的有关文章，懂得对外政策是对内政策的继续。林彪为了复辟资本主义，对内扶植地、富、反、坏、右，对外投靠苏修社会帝国主义，以卖国来实行“复礼”，以“复礼”来更彻底地卖国。不少居民说，机会主义路线的头子从陈独秀、王明到刘少奇、林彪，无不跪倒在“洋大人”的脚下。正如伟大领袖毛主席指出的:“只要世界上还存在着帝国主义和资产阶级，我国的反革命分子和资产阶级右派分子的活动，不但总是带着阶级斗争的性质，并且总是同国际上的反动派互相呼应的。”通过学、批，大家认识到，向全世界人民宣传马列主义、毛泽东思想，介绍我们的社会主义制度，支持各国人民的革命斗争，这是我们应尽的无产阶级国际主义责任，因而更加热情、主动地做好接待外宾的工作。"},{"type":"paragraph","text":"为了使批林批孔运动紧密地联系现实斗争，推动里弄工作，党支部组织群众五批“克己复礼”。他们学习毛主席关于培养无产阶级革命事业接班人和反修防修的一系列指示，批判林彪教子尊孔读经和孔老二的反动教育思想，批判污蔑新中国青少年“一代不如一代”和否定“三结合”教育的谬论。他们边学、边批、边行动，把广大群众在批林批孔中激发出来的社会主义积极性，及时地组织到抓好当前里弄青少年教育的工作中去。最近，经党支部研究，调整、充实和加强了“三结合”教育的领导班子，进一步巩固和发展了学校、社会、家庭三结合教育这个新生事物。"},{"type":"paragraph","text":"四个多月来，蕃瓜弄的居民在五批“克己复礼”的战斗中，写出了四百多篇批判稿，通过学习和批判，提高了阶级斗争和路线斗争觉悟，推动了里弄各项工作的开展。"},{"type":"paragraph","text":"(闸北区通讯组)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"林彪","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"批林批孔","type":"主题/事件"},{"name":"批林批孔","type":"主题/事件"},{"name":"上山下乡","type":"主题/事件"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"caf21bc05c"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
