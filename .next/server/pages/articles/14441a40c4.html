" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"公安部对理教会的处理给华东公安部的批复","authors":[],"dates":[{"year":1950,"month":12,"day":10}],"is_range_date":false,"parts":[{"text":"公安部对理教会的处理给华东公安部的批复","type":"title"},{"text":"50东公治字27653号报告及附件均悉，同意你们对苏北理教会问题的处理、此复。","type":"paragraph"},{"text":"附：","type":"appellation"},{"text":"华东公安部关于理教会组织活动如何处理的请示","type":"subtitle"},{"text":"1950.12.10","type":"subtitle"},{"text":"据苏北行局11月10日保治子第49号报称：“泰兴县理教分会负责人张仲和等积极活动，向其南京总会申请登记，现南京总会已发给证明书、宣传资料、组织通则各一份，张等私造”40人名单送往南京总会准备其领证章，并于农历9月19日私自集会一次约有8桌多人聚餐，敬仙求神等情事，查该组织在其与过去负责人系匪区长陈风翔，政治上很反动，会首等多为封建地主匪伪流氓分子，在部分地区与“先天道”、“一贯道”等反动会门关系密切。并请示：","type":"paragraph"},{"text":"一、此项组织是否属于宗教性质或系封建会门。","type":"paragraph"},{"text":"二、对该组织历史与上层组织和领导系统及其活动范围等材料不够清楚。","type":"paragraph"},{"text":"三、该组织在土改期间应停止其一切活动，加强掌握其内部的调查了解，相机进行内线打入，土改后是否可以让其进行登记活动。据此，本部答复如下：","type":"paragraph"},{"text":"1.理教会组织，应属封建结社，与青红帮等相似，无教义，无一定信仰，仅有禁烟酒迷信，多为封建地主所掌握，故不能列为宗教。但因具有一定社会基础，在群众影响较深，应以审慎态度处理。","type":"paragraph"},{"text":"2.我们基本态度是从反迷信观点，逐步瓦解其组织，逐步取缔的方针进行。","type":"paragraph"},{"text":"在目前还不宜一律宣布取缔，在其组织中有反革命分子利用该组织作破坏活动查有实据者，除其本人应以反革命论罪外，对该组织亦应宣布为非法，可揭露活动阴谋后严加取缔。目前无阴谋活动仅属迷信，应教育理教会众，促其积极生产，以免误入歧途。达到争取多数，孤立少数会首。对此类组织不能列入社团登记，以防其利用合法实行非法活动，意在土改前后均应如此。至于布置打入，掌握情况，相机取缔是十分必要的。是否有当请鉴核。示遵为祷。","type":"paragraph"}],"comments":[],"origin":"《取缔反动会道门工作历史资料汇编（1948－1992年）》，公安部一局编印， 2009年。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"14441a40c4"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
