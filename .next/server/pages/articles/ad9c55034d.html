" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共中央、国务院、中央军委、中央文革关于开好春季广州出口商品交易会的几项通知（概要）","authors":[],"dates":[{"year":1967,"month":4,"day":13}],"is_range_date":false,"parts":[{"text":"中共中央、国务院、中央军委、中央文革关于开好春季广州出口商品交易会的几项通知（概要）","type":"title"},{"text":"中共中央、国务院、中央军委、中央文革小组发出《关于开好春季广州出口商品交易会的几项通知》。主要内容是：","type":"paragraph"},{"text":"一、在交易会期间，不组织交易会以外的人员进馆参观，不在交易会及其所属组织内，进行夺权。","type":"paragraph"},{"text":"二、各省市自治区要积极组织交易会出口货源，除了派往交易会的工作人员以外，不要另外组织人员去交易会参观。","type":"paragraph"},{"text":"三、所有参加交易会工作的人员，有接待任务的宾馆、旅店、剧场和参加演出的文艺单位，在交易会期间，一律暂停“四大”。","type":"paragraph"},{"text":"四、在交易会期间，不要在出口商品陈列馆和接待外来商人的宾馆、旅店张贴大字报。","type":"paragraph"},{"text":"五、交易会安排演出的文艺节目，不要再作变动。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"中央文革","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ad9c55034d"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
