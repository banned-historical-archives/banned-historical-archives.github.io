" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji26","name":"毛泽东全集第26卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji26.pdf"],"article":{"title":"复傅作义\"中","alias":"","parts":[{"type":"paragraph","text":"复傅作义电"},{"type":"paragraph","text":"（1949年4月2日）傅作义将军："},{"type":"paragraph","text":"四月一日通电读悉。南京国民党反动政府发动反革命内战的政策，是完全错误的。数年来中国人民由于这种反革命内战所受的浩大灾难，这个政府必须负责。但是执行这个政策的国民党反动政府的文武官员，只要他们认清是非，翻然悔悟，出于真心实意，确有事实表现，因而有利于人民解放事业之推进，有利于用和平方法解决国内问题者，不问何人，我们均表欢迎。北平问题的和平解决，贵将军与有劳绩。贵将军复愿于今后站在人民方面，参加新民主主义的建设事业，我们认为这是很好的，这是应当欢迎的。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一九四九年四月二日"},{"type":"paragraph","text":"[1]傅作义，原任国民党军华北“剿匪”总司令部总司令，1949年1月21日与人民解放军达成《关于和平解决北平问题的协议》，率部接受和平改编。1949年4月1日，傅作义通电全国，表明自己拥护中国共产党的领导、"},{"type":"paragraph","text":"升福"},{"type":"paragraph","text":"h毛泽东复傅作义电的手稿。"}],"authors":["毛泽东"],"dates":[{"year":1949,"month":4,"day":2}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":241,"page_end":242},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"30b70b3361"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
