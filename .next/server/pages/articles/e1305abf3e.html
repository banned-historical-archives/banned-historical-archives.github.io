" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji52","name":"毛泽东全集第52卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji52.pdf"],"article":{"title":"关于暂时仍由邓小平主持中央日常工作的批语","alias":"","parts":[{"type":"paragraph","text":"关于暂时仍由邓小平主持"},{"type":"paragraph","text":"中央日常工作的批语!!"},{"type":"paragraph","text":"（1975年11月15日）暂时仍由小平同志主持，过一会再说。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十一月十五日二十三时"},{"type":"paragraph","text":"[1]1975年11月15日，邓小平给毛泽东写报告说：“七月份洪文同志到外地时，经主席批准，由我暂时代替主持中央日常工作。现洪文同志已回，按例，从即日起，中央日常工作仍请洪文同志主持。近日召开的十七人会议，亦应请洪文同志主持。”对此，毛泽东写了这个批语。中共中央办公厅将邓小平的信和毛泽东的批语一起作为1975年第二七0号文件印发。"}],"authors":["毛泽东"],"dates":[{"year":1975,"month":11,"day":15}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":97,"page_end":97},"tags":[{"name":"邓小平","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e1305abf3e"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
