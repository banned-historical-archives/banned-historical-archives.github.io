" crossorigin="">{"props":{"pageProps":{"books":[{"id":"chuanxinlu2","name":"十年文革中首长讲话传信录（中册）","internal":false,"type":"pdf","official":false,"author":"周良霄,顾菊英","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/十年文革中首长讲话传信录2.pdf"],"article":{"title":"陈伯达谈穆欣问题","parts":[{"type":"title","text":"440．陈伯达谈穆欣问题"},{"type":"paragraph","text":"(1967年1月23日)"},{"type":"paragraph","text":"听话记录：《光明日报》燎原公社金涛、张忠孝等同志，我不保谁，一切人都要在文化大革命中受考验，包括你、我。穆欣是不是反革命修正主义分子？定这个调子有没有把握？有没有证据？穆欣有问题，我们批评过他。对于他的工作，我们批评过，批评的比较严肃。"},{"type":"paragraph","text":"我们认为，这个人比较软弱，工作能力较差，对于行政工作，可以做一些。他过去的事，我们不太清楚，但总要在多年里看一个人，他在《光明日报》工作时间里，可能有很多错误、缺点，我没有调查，这是想当然的，因为每一个人不可避免，没有错误的人很难找的。如果他有缺点、错误，我赞成批评他，不要定反革命修正主义调子，使他没有改正的机会，使他不能在《光明日报》工作，这些看法你们考虑考虑，要考虑多年的工作，《光明日报》多年来工作比较不错的，他发表了不少好文章，这样一下子打成反革命修正主义分子，群众怎么分别好人与坏人呢？"},{"type":"paragraph","text":"对一个人不要马上弄成反革命，有错误与反革命是两类矛盾，这是我个人的意见，我的意见不强加于你们，你们对于给他的文件不要动，有些是秘密的，你们是不应当看的。看一个人要看他的具体工作，对他不要残酷斗争，无情打击。毛主席关于整风与古田会议决议等文章，要好好看一下，要一边斗争，一边学习。"},{"type":"paragraph","text":"《光明日报》金涛问：你对我们有什么要求？"},{"type":"paragraph","text":"陈答：1．不要动他的文件，不要抄他的家，抄他家是不对的，要给他自由，恢复他的自由。2．有错误可以批评。3．不要抓住一点，就把他打成反革命，正确与错误要做适当估计，象对斯大林要做三七开，不能笼统定调子。"},{"type":"paragraph","text":"问：群众揭了他好些“三反”问题。"},{"type":"paragraph","text":"答：不要轻信，不要没有虱子抓虱子。"},{"type":"paragraph","text":"问：以后报纸如何办？"},{"type":"paragraph","text":"答：让他做工作，不要把他的行政事务搞掉了。"},{"type":"paragraph","text":"问：我们准备把穆欣问题整理材料，如何交给你？"},{"type":"paragraph","text":"答：材料送中南海。"},{"type":"paragraph","text":"问：我们能不能斗穆欣？"},{"type":"paragraph","text":"答：可以开批评会。"}],"authors":["陈伯达"],"dates":[{"year":1967,"month":1,"day":23}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":110,"page_end":110,"alias":""},"tags":[{"name":"陈伯达","type":"人物"},{"name":"穆欣","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3b7ca7a1fd"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
