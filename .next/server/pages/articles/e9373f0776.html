" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji43","name":"毛泽东全集第43卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji43.pdf"],"article":{"title":"在黑龙江省农村公共食堂情况汇报上写的几句话","alias":"","parts":[{"type":"paragraph","text":"在黑龙江省农村公共食堂情况"},{"type":"paragraph","text":"汇报上写的几句话\""},{"type":"paragraph","text":"（1960年3月）"},{"type":"paragraph","text":"加强领导，全民食堂，猪菜丰富，计划用粮，指标到户，粮食到堂，以人定量，凭票吃粮，节余归己，按月算帐，明明白白，帐单上墙，生产生活，两样都强，人心振奋····"},{"type":"paragraph","text":"[1]这几句话写在中共黑龙江省委农村工作部1960年3月5日关于农村公共食堂情况的电话汇报记录上。汇报中说，目前，我省常年食堂占75%左右，季节性（农忙）食堂占25%左右。从性质上分，劳动力食堂占90%左右，全民性食堂占10%左右，但发展趋势是向全民食堂过渡。从现在的情况看，大多数食堂办得较好，一般都有菜园子，大多数养了猪，一部分养了鸡；食堂设备比较齐全，卫生情况较好，建立了一套制度；各地食堂都坚持了按人定量、凭票吃饭、节余归己、按月结账、账单上墙等制度；各级领导对食堂也抓得很紧，不少地方实行统一领导，分片包干，一手抓生产，一手抓生活。"}],"authors":["毛泽东"],"dates":[{"year":1960,"month":3}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":176,"page_end":176},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e9373f0776"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
