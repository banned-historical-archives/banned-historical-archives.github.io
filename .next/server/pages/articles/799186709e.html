script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"西欧及美洲国家报纸极端重视斯大林谈话连资产阶级报纸也不敢抹煞其重要性","authors":[],"dates":[{"year":1951,"month":10,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京十日电】　斯大林大元帅关于原子武器的谈话，受到西欧及美洲国家舆论的极大重视。不仅是这些国家的共产党的机关报与其他进步报纸，而且连许多全国性的资产阶级报纸都以最重要的地位刊出了斯大林谈话的全文或摘要。合众、美联、法新三通讯社都播发了斯大林谈话的详细摘要。各国广播电台也转播了谈话的全文或摘要，瑞典广播电台十月六日曾把谈话摘要广播了两次。"},{"type":"paragraph","text":"许多报纸都发表了社论评论斯大林的谈话。在评论中各国反动报纸显然无法掩饰它们恐惧与沮丧的情绪，而各国进步报纸则一致表示热烈的欢迎"},{"type":"paragraph","text":"各国共产党的机关报，如法国“人道报”、英国“工人日报”、美国“工人日报”、荷兰“真理报”、比利时“红旗报”、芬兰“工人报”、丹麦“国土与人民报”、瑞典“哥德堡工人报”等都特别发表了评论。它们一致指出斯大林的谈话有力地打击了战争贩子从而大大促进了和平事业，并号召人民为争取禁止原子武器与和平解决国际争端而斗争。法国一人道报一写道:斯大林同志的声明是对保卫和平事业的又一极大的贡献。这个声明使每一个以可怕的危险威胁世界各族人民的人不得不考虑一下了。斯大林同志的声明和他所提出的禁止原子武器的具体建议，一定会受到一切爱好和平的人民的拥护。芬兰“工人报”指出:斯大林每一篇声明对一切爱好和平的人类都是意义重大的事件，他这次声明指出了为禁止原子武器和世界和平而斗争的途径。荷兰“真理报”写道:“斯大林的声明已再一次严重地打击了美国战争贩子们的计划，以及他们企图以原子暴力政策来向全世界发号施令的愿望。……全世界都知道:希特勒在知道他会遭到沉重的回击时，曾不得不放弃使用毒气。防止另一次世界大战的可能性在一天天增长。这种可能性，对于和平的朋友们来讲，必定是一种新的鼓舞，鼓励他们更加努力为要求缔结五大国和平公约征集签名。”"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"799186709e"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
