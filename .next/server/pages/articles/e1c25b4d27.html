<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"77f8d60b-66c4-8b3d-7488-ffdedc1e6fd2","name":"马克思恩格斯选集 第一卷（1972年5月）","internal":false,"official":true,"type":"pdf","author":"马克思、恩格斯，人民出版社1972年5月","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives4/main/77f8d60b-66c4-8b3d-7488-ffdedc1e6fd2.pdf"],"article":{"title":"反革命在维也纳的胜利","alias":"","parts":[{"type":"paragraph","text":"马克思"},{"type":"paragraph","text":"反革命在维也纳的胜利"},{"type":"paragraph","text":"科伦11月6日。“克罗地亚的自由和秩序”胜利了，并以难以形容的丑恶罪行一一纵火、镇压、抢劫来庆祝自已的胜利。如今维也纳落到文迪施格雷茨、耶拉契奇和奥尔施佩格的手里了。在老卖国贼拉图尔被打死后，大屠杀紧接着把人类的牺牲者抛进了他的坟墓。"},{"type":"paragraph","text":"本报驻维也纳记者的全部悲观的预言149已经应验了，现在他自己可能已成为大屠杀的牺牲者了。"},{"type":"paragraph","text":"有一个时期，我们曾经希望匈牙利人来帮助解放维也纳，可是直到如今匈牙利军队的调动对我们仍然是一个谜。"},{"type":"paragraph","text":"各种背叛行为造成了维也纳的陷落。帝国国会和市议会在10月6日以后的全部历史不外是不断背叛的历史。帝国国会和市议会究竟代表什么人呢？"},{"type":"paragraph","text":"资产阶级。"},{"type":"paragraph","text":"维也纳的一部分国民自卫军在十月革命刚开始的时候公开地站到权奸那边去了。而在十月革命结束的时候，我们又看到另外一部分国民自卫军反对无产阶级和大学生军团，暗中和皇匪军勾结。这些国民自卫军归谁所有呢？"},{"type":"paragraph","text":"资产阶级。在法国，资产阶级只是在清除了阻碍本阶级进行统治的一切障碍之后，才以反革命的首领的面貌出现。而在德国，资产阶级甚至连自已的公民自由和自己的统治所必需的起码的生存条件都没有来得及取得就卑贱地做了君主专制制度和封建制度的尾巴。在法国，资产阶级以暴君的面貌出现，并实行了自已的反革命。而在德国，资产阶级则以奴婢的身分出现，并为自已暴君的利益而实行反革命。在法国，资产阶级取得了胜利是为了制服人民。而在德国，资产阶级为了不让人民胜利而自已甘愿受人摆布。历史上没有比德国资产阶级更可耻更下贱的角色了。"},{"type":"paragraph","text":"谁从维也纳成群结队地逃跑，把丢弃的财产交给宽大的人民来保管，可是在逃跑期间反而辱骂人民执行了看守的任务，而在回来时又观看他们怎样惨遭屠杀？"},{"type":"paragraph","text":"资产阶级。"},{"type":"paragraph","text":"当维也纳人民的生活稍有起色时寒暑表就下降，而当人民发出临死的呷吟时寒暑表就上升，这种寒暑表泄露了谁的最大的秘密呢？谁用股票行市上的秘密语言说话呢？"},{"type":"paragraph","text":"资产阶级。"},{"type":"paragraph","text":"“德国国民议会”和它的“中央政权”出卖了维也纳。它们代表谁呢？"},{"type":"paragraph","text":"首先代表资产阶级。"},{"type":"paragraph","text":"“克罗地亚的秩序和自由”在维也纳的胜利是以“正直的”共，和国在巴黎的胜利为先决条件的。谁在六月的日子里取得了胜利呢？"},{"type":"paragraph","text":"资产阶级。"},{"type":"paragraph","text":"欧洲的反革命势力由于自己在巴黎取得了胜利以后便开始大摆人肉筵席。"},{"type":"paragraph","text":"在二月和三月的日子里武装力量到处都被击溃。为什么呢？因为它除了代表政府本身而外不代表任何人。六月的日子以后武装力量到处都得胜奏捷，因为资产阶级处处都和它暗中妥协，另一方面它又把革命运动的正式领导权掌握在自已手中，并采取了种种不彻底的措施，其结果就自然使得革命运动流产。"},{"type":"paragraph","text":"捷克人的民族狂热是维也纳权奸手中最有力的武器。同盟者中间已经开始了纷争。我们的读者会在本号报纸上看到布拉格代表团对于在奥里缪茨遇到的侮辱性的无耻行为的抗议书。"},{"type":"paragraph","text":"这是将在以耶拉契寄为首的斯拉夫派和以文迪施格雷茨为首的粗的、凌驾于一切民族之上的权奸之间发生战争的第一个征兆。另一方面，奥地利的德国农民还没有被平定。在奥地利各民族的喧嚣声中，他们的声音特别响亮。而第三方面，爱民的沙皇的声音传到了佩斯；他的子手们在多瑙河各公国里等候救令。"},{"type":"paragraph","text":"最后，法兰克福的德国国民议会最近决定把德意志的奥地利并入德意志帝国，如果德国中央政权和德国国民议会并不认为自已的使命仅仅是登台让欧洲公众嘲骂，这个决定本身就会导致巨大的冲突。不管它们多么温顺，奥地利将展开史无前例的规模巨大的斗争。"},{"type":"paragraph","text":"第二幕戏在维也纳刚刚结束，这出戏的第一幕是在巴黎演出的，叫做《六月的日子》。在巴黎有别动队，在维也纳有“克罗地亚人”，他们都是拉察罗尼150—被武装起来的和被收买的流氓无产阶级，他们反对从事劳动的、有思想的无产阶级。我们在柏林很快就会看到第三幕。"},{"type":"paragraph","text":"就算武器能帮助反革命在全欧洲复活，金钱也会促使它在全欧洲死亡。欧洲的破产，国家的破产，注定要把它的胜利化为乌有。刺刀尖碰上了尖锐的“经济”问题会变得象软绵绵的灯芯一样。"},{"type":"paragraph","text":"但是，发展的进程将不会等待欧洲各国转嫁给欧洲社会的债务的偿还日期。在巴黎，六月革命会给以致命的反击。随着“红色共和国”在巴黎的胜利，军队将从各国的内地调到边境并越过边境，而各个斗争的党派的真正力量也将赤裸裸地暴露出来。那时我们会想起六月和十月，并且也会高声喊道："},{"type":"paragraph","text":"战败者罪该万死！"},{"type":"paragraph","text":"六月和十月的日子以后的无结果的屠杀，二月和三月以后的无止境的残害，一-仅仅这种反革命的残酷野蛮行为就足以使人民相信，只有一个方法可以缩短、简化和集中旧社会的凶猛的垂死挣扎和新社会诞生的流血痛苦，这个方法就是实行革命的恐怖。"},{"type":"paragraph","text":"原文是德文写于1848年11月6日"},{"type":"paragraph","text":"选自《马克思恩格斯全集》载于1848年11月7日"},{"type":"paragraph","text":"第5卷第540-543页《新莱茵报》第136号"}],"authors":["马克思"],"dates":[{"year":1848,"month":11,"day":6}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":370,"page_end":373},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e1c25b4d27"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
