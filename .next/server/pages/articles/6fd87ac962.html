<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"江苏省会的怪现象　主持“阎王关”的大将汉奸竟做乡长焦东乡民受尽剥削　私坐公堂痛殴保长","authors":[],"dates":[{"year":1946,"month":8,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【镇江通讯】镇江第一区焦东乡乡长张荣星，谁都知道他在敌伪时代，是主持过“阎王关”的大将。当时在敌伪的淫威之下，那些有血肉而无灵魂的大小汉奸和一般准汉奸，只须拼得认贼作父，只须拼得无耻献媚，当时就可以红的发紫，炙手可热，我们的焦东乡乡长张荣星，自然也不能例外。"},{"type":"paragraph","text":"提起了镇江象山江口的“阎王关”，每个焦东乡的老百姓，每个镇江本籍人，乃至每个会从象山江口走过的商贩和单帮客人，都曾能尝过那种敲骨吸髓的滋味。“阎王关”，已经成为镇江沦陷史上最令人伤心的一页了!过去，曾有许多的苦难同胞，为了生活，当他们走过这“阎王关”的时候，曾挨尽了张荣星不少的欺侮，辱骂。鞭鞑和榨取!由于张荣星勾结了伪单第九师温主任作为政治后台的原因，谁敢在当时的老虎头上拍苍绳呢!"},{"type":"paragraph","text":"张荣星毕竟是个聪明伶俐的角儿，他老早猜着了胜利后的一切是非黑白和曲直，还不是“大事化小”，“小事化了”。他在敌伪时代干一份税吏的小小差事，只须捞得来的钞票多多准备一点；还怕什么呢?虽然象山江口的“阎王关”，它的威名和罪恶尽管是那么大，尽管深深地还烙印在今天每个焦东乡老百姓的愤怒的心坎上。张荣星为了尝一尝乡长的滋味，为了继续施展起那一双攫人的血掌，终于在将利后的今天，从千方百计的钻营下，而获偿了这个宿愿，焦东乡乡长这项荣耀的帽子，便毫不费劲地落在他的头上了。是的，现任镇江县长张孟陶，是个安徽人，他那里还能知道张荣星是一个罪恶滔天的汉奸呢?"},{"type":"paragraph","text":"德政一览"},{"type":"paragraph","text":"现在，我来谈谈这位张乡长吧。他到任后的第一件德政是借着奉令构筑沿江碉堡这个大题目一下子便搜括了一百几十万元的人民血汗!镇江第一区全区共有四十八个乡镇，按照当时出捐的办法，是每个乡镇津贴四万元，这笔款项，是由区公所直接交给这位张乡长去经办的。结果沿江的碉堡并没有建筑，但这笔血汗的捐款，已是轻悄悄地不知道到什么地方去了。焦东乡的老百姓真倒霉，他们摊这笔捐款，是挨着饥饿，忍着痛苦的啊。"},{"type":"paragraph","text":"张乡长毕竟是个办税起家的能手，对于怎样剥削，怎样可以使自己肥胖，他是成竹在胸，不费一点心思的。他到任后的第二件德政，冒着陈上寿，徐德标，曹家江三人的名义，捺着假冒的指纹，曾向中国农民银行，贷到农民买牛的借款十一万元。这个买牛贷款，何尝是为着农民去打算呢?正相反，他把这笔款项，转行贷给焦东乡的老百姓，每万元却扣去了所谓“交际费”四百元了，农民所得到的是九六折。这种农贷方法，是不是为了农民利益?是不是剥削?"},{"type":"paragraph","text":"张乡长真是位匠心独运的智多星，在今年的端阳节下，他曾假借着龙舟竞赛的娱乐号召勒令每保缴款二万元，全乡十二保的总数是二十四万元，也计还不止这么多。其他还有什么门牌捐，每户又要缴款数百元不等，捐税急如星火，直迫得焦东乡的老百姓们，有气无力感到生活上无比的窒息，眼泪汪汪地，咀咒着胜利后的生活不比战时改善了多少，也许还更坏!"},{"type":"paragraph","text":"真是天晓得，以主持湾江“阎王关”起家的张荣星，现在居然又做起焦东乡的乡长了!那我们焦东乡的刦后余生的人民，还能活下去吗?最令人惊骇的，本乡第一保保长陈智海，因不忍同乡父老挨受这个不能挨受的痛苦，拒绝代他抽剥人民血汗的捐款，竟遭到这位张乡长的罚跪与痛殴，张荣星的私宅，竟成了衙门的公堂!想不到在抗战胜利后的今天，敌伪的余威还能这样存在，还能容许有这样擅作威福的乡长，照常违法渎职，照常贪污不法。照常横行无忌于这个江苏省会的镇江!(东方亮八月十日)"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6fd87ac962"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
