script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"许多代表在联合国粮农组织理事会会议上发言  谴责超级大国剥削掠夺发展中国家  非洲地区举行开发水利资源会议","authors":[],"dates":[{"year":1976,"month":12,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"许多代表在联合国粮农组织理事会会议上发言"},{"type":"paragraph","text":"谴责超级大国剥削掠夺发展中国家"},{"type":"paragraph","text":"非洲地区举行开发水利资源会议"},{"type":"paragraph","text":"新华社罗马一九七六年十二月九日电　联合国粮农组织第七十届理事会会议从十一月二十九日到十二月九日在罗马举行。"},{"type":"paragraph","text":"会议讨论了今年世界粮食和农业状况、以及农产品的国际贸易等问题。许多代表在发言中谴责帝国主义、殖民主义，特别是超级大国对发展中国家的剥削、控制和掠夺，要求改变不合理的旧的国际经济关系，并且强调要独立自主、自力更生地发展本国的粮食和农业生产。"},{"type":"paragraph","text":"特立尼达和多巴哥代表说，一些国家通过投资等手段控制了拉美地区国家的资源和生产指挥权，阻碍了这些国家的粮食和其他生产的发展。他说：“拉美地区长期遭受多国公司的农业剥削”，“这是一种灾难”。"},{"type":"paragraph","text":"巴西等国代表在发言中对建立新的国际经济秩序进展缓慢，表示失望。菲律宾等国代表指出，目前发达国家和发展中国家之间的不平等贸易，使发展中国家遭受很大损失。"},{"type":"paragraph","text":"哥伦比亚、几内亚、加纳等国代表在发言中强调说，发展中国家应该更重视本国的粮食生产。"},{"type":"paragraph","text":"中国代表在发言中指出，广大第三世界国家为摆脱帝国主义、殖民主义，特别是超级大国的控制、掠夺和剥削，坚持独立自主、自力更生，积极发展粮食和农业生产，使一九七六年粮食自给程度有了提高，并为建立或扩大各种农产品的生产国和出口国组织、维护国家主权和发展民族经济，开展了联合斗争。他强调指出，超级大国利用粮食来兴风作浪的基本因素并未消除，要随时警惕它们可能再一次利用粮食问题来继续干损人利己的活动。"},{"type":"paragraph","text":"中国代表说，今年我国广大农民以人定胜天的顽强意志，战胜了多种严重的自然灾害，夺得了夏粮丰收，我国的小麦和早稻产量达到了历史上最高水平，而且预计今年又是一个丰收年。"},{"type":"paragraph","text":"新华社亚的斯亚贝巴电　非洲地区开发水利资源会议不久前在埃塞俄比亚举行。来自三十七个非洲国家的代表参加了会议。代表们保证要本着非洲团结的精神，对开发非洲地区的国际性河流的潜力相互进行合作。"},{"type":"paragraph","text":"会议通过了一份包括对开发非洲水利资源工作的一系列建议在内的综合性报告。会议建议要在非洲地区成立一个相应的研究机构。会议号召有关非洲地区水利发展和管理机构要进行更多的合作。"},{"type":"paragraph","text":"会议期间，专家们对非洲的水利状况进行了考查。考查结果发现只有百分之二的水利资源被利用。因此，一些代表在发言时着重强调自力更生开发水利资源的重要性。"},{"type":"paragraph","text":"大会主席、埃塞俄比亚矿业、动力和水利资源部长海卢·伊梅努在闭幕会上讲了话。他呼吁非洲各国有关部门和人员为开发和管理好非洲大陆的水利资源和进一步利用这一资源贡献自己的力量。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"68c5a570a2"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
