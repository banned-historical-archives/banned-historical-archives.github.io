script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"广西壮族自治区革命委员会关于调整部分地区农村人民公社体制问题的通知","authors":[],"dates":[{"year":1968,"month":9,"day":28}],"is_range_date":false,"parts":[{"text":"广西壮族自治区革命委员会关于调整部分地区农村人民公社体制问题的通知","type":"title"},{"text":"为了适应生产力发展的需要，为了迎接无产阶级文化大革命引起的生产建设的飞跃发展，为了更好地组织明年的农业生产新高潮，我区部分地区，即除搞过“四清”的地区、钦州专区和4个直属市郊区外，现行农村人民公社的体制，即两级所有制（小公社、生产队），应当改为三级所有制（人民公社、生产大队、生产队）。这样，全区所有农村人民公社就都实行了三级所有制。其具体意见如下：","type":"paragraph"},{"text":"一、现设的区和区级镇改为人民公社，其规模一般都不要变动，只是换一个牌子即可。个别确实需要调整的，应由县革命委员会提出意见，报专区革命委员会审查，并经自治区革命委员会批准后始可改变。","type":"paragraph"},{"text":"现有的小公社改为生产大队，其规模一般也不要变动，个别确实需要调整的应由县革命委员会报专区革命委员会批准。","type":"paragraph"},{"text":"生产队规模小了，群众要求合并的，经公社（区）革命委员会提出方案，报县革命委员会批准，可适当合并。生产队的规模，应当遵照伟大领袖毛主席制订的“二十三条”规定的“以30户左右为有利，居住比较集中的，可以超过30户，居住比较分散的，可以少于30户”的原则，由群众充分讨论决定。","type":"paragraph"},{"text":"二、坚决维护和发展人民公社各级所有的社会主义集体经济。在调整公社体制和并队的时候，对于公社各级原单位的公共积累、基本建设、集体储备粮、耕畜、集体养的猪、种子、农机农具、生产资金等等，必须妥善保管，合理处理，不得以任何借口分散和损坏公共财物。人民公社的各级集体企业和公共积累应该是积极发展与扩大的方针，而不是倒退、缩小的方针。这里面包含着尖锐、复杂的两条路线的斗争，各地在处理这一问题时，一定要注意掌握政策。","type":"paragraph"},{"text":"合并的生产队，1968年度的收益，原则上仍按原队进行分配。","type":"paragraph"},{"text":"三、今后生产队干部的待遇，统一按照“六十条”规定的定工生产定额补贴的办法执行。实行定工生产，定额补贴的大队干部，按本大队规模大小和精简的原则，可以定为3人，4人或5人。干部要积极响应伟大领袖毛主席“必须坚持干部参加集体生产劳动的制度”的号召，向大寨干部学习，自觉以普通劳动者的身份，积极参加集体生产劳动。大队一级主要干部，至少一年要用一半以上时间参加集体生产劳动。以后随着各级领导方法的改进，还应逐步增加干部参加集体劳动的时间，那种认为生产大队干部因工作多工作忙而不能参加集体生产劳动，因而要求完全脱产的思想是错误的。这是反革命修正主义思想流毒没有肃清的一种反映。定工生产定额补贴各多少，由大队贫下中农代表大会研究决定。补贴所需的钱、粮，从1969年1月开始，由本大队所属各生产队统筹，今年的工资，仍照现行办法支付到年底。","type":"paragraph"}],"comments":[],"origin":"来源：根据文件翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"广西文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"127b3e6e02"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
