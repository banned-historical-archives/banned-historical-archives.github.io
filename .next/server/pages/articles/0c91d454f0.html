script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"type":"pdf","id":"wenji4","name":"毛泽东文集第四卷（1999）","internal":false,"official":true,"author":"中央文献研究室","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/wenji4.pdf"],"article":{"title":"在重庆机场发表的谈话","description":"","dates":[{"year":1945,"month":8,"day":28}],"parts":[{"text":"在重庆机场发表的谈话","type":"title"},{"type":"paragraph","text":"本人此次来渝，系应国民政府主席蒋介石先生之邀请，商讨团结建国大计。现在抗日战争已经胜利结束，中国即将进入和平建设时期，当前时机极为重要。目前最迫切者，为保证国内和平，实施民主政治，巩固国内团结。国内政治上军事上所存在的各项迫切问题，应在和平、民主、团结的基础上加以合理解决，以期实现全国之统一，建设独立、自由与富强的新中国。希望中国一切抗日政党及爱国志士团结起来，为实现上述任务而共同奋斗。本人对于蒋介石先生之邀请，表示谢意。"},{"type":"paragraph","text":"根据一九四五年八月二十九日"},{"type":"paragraph","text":"《新华日报》刊印。"}],"comment_pivots":[],"is_range_date":false,"authors":["毛泽东"],"comments":[],"page_start":33,"page_end":33,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"对话"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0c91d454f0"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
