<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"把资产阶级的坐探从国家经济机关中清除出去!","authors":["钟明"],"dates":[{"year":1952,"month":2,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"钟明"},{"type":"paragraph","text":"最近全国各地都破获了资产阶级中的不法分子和投机奸商，利用“派进来”和“拉过去”的坐探和经济内奸，盗窃国家经济情报、进行垄断市场攫取暴利的罪恶活动，严重的破坏了国家经济建设和人民的经济生活。有的不法资本家，甚至把国家经济机密，出卖给帝国主义奸商和帝国主义政府，使我们在对敌经济斗争中蒙受很大的损失，这种危害国家人民的罪恶活动，是绝对不能令人容忍的。"},{"type":"paragraph","text":"事实证明，不法资本家盗窃国家经济情报的活动，是完全有计划有组织的进行的。已经处决的大贪污犯薛昆山就是资产阶级派进国家经济机关的大奸细，由于他的罪恶活动，曾使北方皮毛市场一度混乱。一九五○年八月间，京、津白糖市场也曾一度发生混乱，现在查出是中国百货公司物价科科员郭中慧出卖经济情报所造成的。有一个曾当过国民党“盐务线办”的缪秋杰，混进了中央财委机关，听说盐税要加了，马上电报通知盐商、东南沿海盐商的资金立刻集中，收进一万七八千包，造成市上缺盐，而盐商大发横财。至于工商界知名之士，如上海工商联监察委员会主任委员胡厥文到北京开会，听到国家有大量机器定货计划，立刻通知自己的企业抢购原料，造成上海五金市场的巨大涨风，更是尽人皆知的事实。这种盗公肥私，假公济私的罪恶行为，难道是我们能够容忍的吗?"},{"type":"paragraph","text":"有些不法资本家还不以此为满足，他们甚至有计划的在某些国营企业机构中安置了规模庞大的坐探网。他们对这些国家机关进行恶毒的进攻，许多工作干部经不起资产阶级糖衣炮弹的进攻、逐渐堕落、成为资本家的可耻代理人。如中央财政部物资管理处上海信托商行，两年来在资产阶级的猖狂进攻之下，经营业务几乎全部被不法商人所篡夺。商行前批发部主任王士源就是资本家的坐探。根据华东人民监察委员会检查组统计，单单拍卖四十三种物资，因价格太低所造成的损失即达一百余亿。还有许多中央规定不应该卖的重要物资，由于出卖物资的实权为不法商人用欺蒙的手段所篡夺、也出卖了，损失更难以估计。又如中国畜产公司南京支公司以该公司副经理吴如周为首组成的一个奸商集团，更是资产阶级有计划有组织篡夺国营企业领导权的一个铁证。吴犯如周是个干过三十多年皮毛生意的商人，解放以后，千方百计打进了国营企业，三年来，窃踞着国营企业的领导职位，和私商相勾结，出卖国家经济情报，里应外合，肆无忌惮地盗窃国家财产，把为人民服务的国家经济机关变成为奸商集团服务的商店。吴犯和薛昆山一样，是资产阶级派进国家经济机关的大奸细。中国工业器材公司最近在三反运动中捕获的七名大贪污犯，就有五个罪犯是资产阶级派进来的坐探或拉过去的奸细。这些事实都充分说明，资产阶级三年来向人民政府的进攻是十分恶毒的，无所不用其极的。"},{"type":"paragraph","text":"为了纯洁我们的国家经济机关，切实保守国家经济机密，在三反和五反运动中，我们必须把那些资产阶级的坐探和内奸，坚决地清除出去。同时，必须克服经济工作领导人员中的右倾单纯技术观点，提高全体经济工作人员的政治警惕性，以粉碎资产阶级盗窃国家经济情报的阴谋。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"af05413916"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
