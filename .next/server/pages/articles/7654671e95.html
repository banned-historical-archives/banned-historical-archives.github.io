" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"周恩来就广州各派执行“制止武斗四项协议”发的贺电","authors":["周恩来"],"dates":[{"year":1967,"month":9,"day":6}],"is_range_date":false,"parts":[{"text":"周恩来就广州各派执行“制止武斗四项协议”发的贺电","type":"title"},{"text":"周恩来","type":"authors"},{"text":"广州军区转中央调查组魏国印同志、调查组全体同志并广州地区各群众组织由京返穗代表同志：","type":"appellation"},{"text":"广州地区各群众组织代表九月四日关于贯彻执行“拥军爱民和制止武斗的四项协议”的决定收悉，并且听说正在付诸实施。你们所取得的这一成就使我们感到很高兴。你们的决定不仅直接有助于制止广州地区的武斗，而且对于促进广州地区各革命群众组织通过大批判走向大联合，也有着重要的意义。我们热忱地希望你们能够真正按照这一决定，以实际行动保证五项措施的全部实现，并预祝你们不断取得胜利。","type":"paragraph"}],"comments":[],"origin":"1967年9月8日红代会清华井冈山一部第三动态组编《动态》第144期","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"武斗","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"革命大联合","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7654671e95"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
