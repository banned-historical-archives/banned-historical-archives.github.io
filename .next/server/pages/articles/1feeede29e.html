script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"大会致毛主席电","authors":[],"dates":[{"year":1949,"month":7,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"大会致毛主席电"},{"type":"paragraph","text":"毛主席："},{"type":"paragraph","text":"北平全体党员以无比兴奋的心情，庆祝我党诞生光辉的二十八周年纪念日并向你致热烈的敬礼！"},{"type":"paragraph","text":"二十八年来，我党坚持中华民族与中国人民的解放事业，经过大革命，土地革命，抗日战争和人民解放战争，在党中央和你的英明领导下，终于打败了帝国主义走狗万恶的国民党反动派的统治，全国最后胜利不久就可实现了。但正如党中央和你所谆谆告诫我们的，这只是万里长征走完了第一步。更伟大更复杂的任务，还在前面，我们将和全国人民及党外民主人士紧密的团结在一起，肃清反革命残余的阴谋破坏，集中一切力量恢复与发展生产事业，及文教事业，把我们的国家建设成一个独立自由富强与幸福的新中国。"},{"type":"paragraph","text":"今后，我们将继续保持谦虚、谨慎、不骄、不燥和艰苦奋斗的作风，加强马列主义理论与和马列主义的普遍真理与中国革命具体实践相结合的毛泽东思想的学习，提高自己的马列主义水平，为迅速取得全国胜利和新民主主义国家建设的成功而奋斗！"},{"type":"paragraph","text":"祝你和中央同志们的健康！"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1feeede29e"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
