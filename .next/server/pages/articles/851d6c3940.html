script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"兴塔公社下坊大队狠批反革命修正主义园林路线干部带头人人动手大搞绿化","authors":[],"dates":[{"year":1970,"month":4,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　金山县兴塔公社下坊大队革委会，从战备观点出发，充分发动群众，掀起了一个群众性的植树活动，只用了十天时间，全大队就植树一万七千多棵。"},{"type":"paragraph","text":"这个大队在开展植树活动中，首先狠抓根本，坚持用毛泽东思想武装群众，发动群众，树立为革命种树的思想。开始时，部分干部和社员认为“绿化年年搞，代价花不少，只种不管理，用场没多少。”针对这些活思想，大队革委会及时组织广大干部和群众，大学毛主席“备战、备荒、为人民”伟大战略方针和有关林业生产的光辉指示，提高了大家对“绿化祖国”重大意义的认识。许多贫下中农都说:绿化植树是毛主席的伟大号召，是战备的需要，是发展农业生产、巩固集体经济的需要，我们坚决照办，立即行动。大队革委会迅速组织了一支植树造林的专业队伍。他们一面调查研究，制订规划，一面采购树苗，组织运输，做到计划、土地、树苗、措施、人员五落实，很快地在全大队开展了一个为革命植树的群众活动。"},{"type":"paragraph","text":"在植树造林的过程中，这个大队革委会结合斗争实践，深入开展革命大批判，用战无不胜的毛泽东思想，狠批叛徒、内奸、工贼刘少奇推行的反革命修正主义园林路线。他们用大量的事实，愤怒地揭发了大叛徒刘少奇及其在上海的代理人陈丕显、曹荻秋之流鼓吹的种“观赏树”，破坏绿化的罪行。广大贫下中农深有体会地说:文化大革命以前，种的大都是一些资产阶级老爷们观赏的树木，代价花了不少，而对发展农业生产、发展集体经济毫无好处。我们一定要听毛主席的话，大种果树、用材树。他们说干就干，雷厉风行。大队干部积极带头，男女老少人人动手，在港岸、河边、堤旁、渠道、道路两旁、宅前屋后处处种上了树。三队几个社员，发扬了“一不怕苦，二不怕死”的革命精神，顶风冒雪，连续两次到七十多里以外的漕泾林场运树苗。五队为了及时栽种、保证成活，树苗一到，男女老少立即投入战斗，按照植树规格，两个小时就种了一百多棵树。这个大队的红小兵也积极投入到植树造林活动中去。一天下午，三十多个红小兵就种了七百多棵小树苗。不少老贫农都夸他们“人小心红干劲大，是毛主席教育出来的好儿童。”"},{"type":"paragraph","text":"俗语说:“三分种，七分管。”树植好以后，这个大队革委会立即落实了管理措施，做到大队和生产队都有专人负责管理树苗，改变了过去那种“春种满、夏不管、秋不见”的不良现象。这一时期来，他们对一万七千多棵树苗全面进行了认真管理，进行了浇水、培土，促使树苗成活返青。金山县兴塔公社革委会生产组"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"851d6c3940"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
