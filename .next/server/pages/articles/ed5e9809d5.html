script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"尝试塑造毛主席艺术形象的话剧《杨开慧》在首都公演受到热烈欢迎  中央电视台将在九月九日向全国录象播出","authors":[],"dates":[{"year":1978,"month":9,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"尝试塑造毛主席艺术形象的话剧《杨开慧》在首都公演受到热烈欢迎"},{"type":"paragraph","text":"中央电视台将在九月九日向全国录象播出"},{"type":"paragraph","text":"新华社北京九月七日电　尝试塑造伟大领袖和导师毛泽东同志艺术形象的话剧《杨开慧》，最近在首都演出，受到观众的热烈欢迎。中央电视台在九月九日向全国录象播出。"},{"type":"paragraph","text":"话剧《杨开慧》描写的是一九二○年到一九三○年期间，毛主席和杨开慧烈士的革命活动。全剧共分七场。前三场再现了毛主席和杨开慧烈士在长沙清水塘播撒革命火种，在湖南农村从事农民运动，与陈独秀右倾机会主义路线展开的针锋相对的斗争。第四、五、六场表现大革命失败后，毛主席以无产阶级革命家的伟大气魄，力挽狂澜，举起武装斗争的大旗，创建井冈山革命根据地，点燃了工农武装割据的星星之火，为中国革命的胜利开辟了一条建立农村革命根据地，农村包围城市，最后武装夺取全国政权的唯一正确的道路。话剧形象地告诉观众，毛主席是怎样把马克思列宁主义的普遍真理同中国革命的具体实践相结合的，同时热情地歌颂了杨开慧烈士忠于共产主义事业的崇高品德。第七场写的是狱中斗争。身陷囹圄的杨开慧，日夜惦念毛委员领导的革命事业。剧作者采用了革命浪漫主义的手法，天幕上出现了身穿红军军装的毛委员，站在红色根据地的高山上，深情地对杨开慧说：“骄——杨！你是我的骄杨！你是中国人民的骄杨！”极大地激动着每一个观众的心。剧的尾声，天幕上的熊熊烈火化为五采缤纷的礼花，青年时代的毛主席和杨开慧并肩来到湘江边，漫步在盛开的梅花丛中，寓意深远。"},{"type":"paragraph","text":"《杨开慧》是由中央戏剧学院《杨开慧》创作组集体创作的，由乔羽、王树元、郦子柏执笔，张奇虹、郦子柏、马惠田导演。剧中的毛委员和杨开慧分别由金乃千和赵奎娥扮演。在创作和演出过程中，剧组的同志曾多次到上海、武汉、广州以及井冈山、长沙、韶山、板仓等地参观、访问、学习。他们召开了各种座谈会，多方征求意见，在演出过程中不断修改，力求更好地表现毛主席和杨开慧的光辉形象。剧组的工作，得到了中央领导同志的关怀和鼓励，也得到各级领导同志以及李淑一、杨开智、李崇德等革命老人和许多同志的帮助支持。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ed5e9809d5"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
