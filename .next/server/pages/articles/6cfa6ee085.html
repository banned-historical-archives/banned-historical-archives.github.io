script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"中日友好协会代表团　日中友好协会(正统)访华代表团联合声明在京签字周总理和姚文元同志一起会见日中友协(正统)访华代表团时说，这个声明很好，中国政府支持这个声明","authors":[],"dates":[{"year":1971,"month":10,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京十六日电　中国中日友好协会代表团、日本日中友好协会(正统)访华代表团联合声明今天在北京签字。"},{"type":"paragraph","text":"昨天，周恩来总理和姚文元同志一起会见日本日中友好协会(正统)访华代表团时说，这个声明很好，中国政府支持这个声明。"},{"type":"paragraph","text":"今天在联合声明上签字的是:"},{"type":"paragraph","text":"中日友好协会代表团团长王国权、副团长张香山；"},{"type":"paragraph","text":"日中友好协会(正统)访华代表团团长黑田寿男、副团长宫崎世民。"},{"type":"paragraph","text":"据新华社北京十六日电　中日友协副会长王国权今晚举行宴会欢送由黑田寿男、宫崎世民率领的日中友协(正统)访华代表团。"},{"type":"paragraph","text":"正在北京进行友好访问的日中文化交流协会代表团团长中岛健藏和夫人、副团长宫川寅雄、秘书长白土吾夫也应邀出席了宴会。"},{"type":"paragraph","text":"出席宴会的我国有关方面负责人有:周培源、张香山、王文林、徐明、王晓云、肖向前等。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"姚文元","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6cfa6ee085"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
