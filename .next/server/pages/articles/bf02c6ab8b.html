<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"0b2f26ed-ad29-48e7-9c89-446932a97ab0","name":"中共党史教学参考资料 第27册 “文化大革命”参考资料 下册（1988年）","internal":true,"official":true,"type":"pdf","author":"","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives3/main/0b2f26ed-ad29-48e7-9c89-446932a97ab0.pdf"],"article":{"title":"评论《水浒》的现实意义","alias":"","parts":[{"type":"paragraph","text":"党的领导是我们事业取得胜利的基本保证。各级党委要加强领导，抓紧学习，教育和训练干部，认真贯彻执行毛主席的革命路线和各项方针政策。教育战线的大辩论在各级党委领"},{"type":"paragraph","text":"《导下进行，不搞战斗队。要严格区分和正确处理两类不同性质的矛盾，对于路线斗争的大是大非问题，要通过辩论，弄清思想，划清马克思主义同修正主义的界限。对犯错误的同志，要按照“团结一批评和自我批评一一团结”的公式，惩前后，治病教人。要继续注意老、中、青三结合。我们要在毛主席的革命路线指引下，团结百分之九十五以上的群众和干部，团结一切可以团结的力量，调动一切积极因素，把各项工作做得更好。"},{"type":"paragraph","text":"当前国际形势大好，天下大乱。世界各种基本矛盾日益激化，革命和战争的因素都在明显增长。“土豆烧牛肉\"的假共产主义彻底破产，各国马列主义政党和组织在反对现代修正主义的斗争中发展壮大。第三世界国家和人民在反帝、反殖和反对大国霸权主义的斗争中，发挥了主力军的作用。苏美两的争夺愈演愈烈，争夺的战略重点在欧洲。搞“声东击西”，玩弄“缓和”骗局最起劲的苏联社会帝国主义，正是今天最危险的战争策源地。我们要提高警惕，准备打仗。要继续贯彻执行毛主席提出的“深挖洞、广积粮、不称霸”，“备战、备荒、为人民”的战略方针。人民解放军和广大民兵，要发扬光荣的革命传统，加强战备，严格训练，严格要求，随时准备歼灭一切来犯之敌。我们一定要解放我国的神圣领土台湾省。"},{"type":"paragraph","text":"“世上无难事，只要肯登攀。”毛主席的光辉词句，指出了我们无限光明灿烂的前途和前进道路上所必须经历的曲折斗争，指引我们在继续革命的大道上，披荆斩棘，奋勇向前。有毛主席的无产阶级革命路线指引航向，有毛主席为首的党中央的领导，有全党全军全国人民的团结一致，我们一定能战胜任何艰难险阻，在新的一年里，夺取更大的胜利。"},{"type":"paragraph","text":"评论《水浒》的现实意义："},{"type":"paragraph","text":"（一九七六年一月一日）"},{"type":"paragraph","text":"尹铭"},{"type":"paragraph","text":"，"},{"type":"paragraph","text":"自从毛主席关于评论《水浒》的指示发表以来，从工厂到农村，从机关到部队，从商店到学校，都广泛地开展了评《水浒》的活动，取得了很大的成绩。广大干部和群众通过联系两条路线斗争的实际进行评论，认清了《水浒》宣扬投降主义的反动实质和投降派宋江的真面貌，进一步认识到刘少奇、林彪一类搞修正主义、投降主义的罪恶阴谋。随着两个阶级、两条道路、两条路线斗争的发展，评论《水浒》的现实意义，也就越来越清楚了。"},{"type":"paragraph","text":"毛主席指出：“宋江投降，·搞修正主义，把晃的聚义厅改为忠义堂，让人招安了。”搞修正主义，古代有，现代有，将来还会有。毛主席在这里概括了宋江推行修正主义、投降主义路线的全过程。梁山在晃盖的正确路线领导下，各路英雄闻风而来，“共聚大义”，“兀自要和大宋皇帝做个对头”。然而，风云突变，梁山上出了宋江这个投降派。他一上台，就篡改了晃盖既反贪官，也反皇帝，坚持农民起义的革命路线，推行一条只反贪官，不反皇帝，接受招安的投降主义路线。路线一变，一切都变：聚义厅变成了忠义堂，“托胆称王”变成了“替天行道”。结果是让人招安，去打方腊，人头落地，毁灭了整个梁山革命事业。从宋江投降的全严重啊！批判《水浒》所歌颂的这一条投降主义路线，对于我们今天深刻认识修正主义的危害性，不是一个很好的启示吗？"},{"type":"paragraph","text":"毛主席亲自领导和发动的无产阶级文化大革命，摧毁了刘少奇、林彪两个资产阶级司令部，粉碎了他们复辟资本主义的阴谋，取得了伟大的胜利。但是，无产阶级同资产阶级的斗争并没有结束，马克思主义同修正主义的斗争并没有结束。修正主义仍然是当前的主要危险。毛生席曾经指出：“如果说，法国资产阶级的国民议会里至今还有保皇党的代表人物的话，那末，在地球上全部剥削阶级彻底灭亡之后多少年内，很可能还会有蒋介石王朝的代表人物在各地活动着。”同国民党蒋介石的斗争尚且要继续这样长的时间，马克思主义同修正主义的斗争就更是长时期的了。无产阶级文化大革命从开始到现在不过九年多，如果认为不会有人再搞修正主义，没有人翻文化大革命的案，那就未免太天真了。前-一个时期，教育界出现的一些奇谈怪论，就直接关系到肯定还是否定无产阶级文化大革命的大是大非问题。毛主席提出的“教育要革命”，是在上层建筑领域里加强无产阶级对资产阶级全面专政的一项重要任务。教育界的奇谈怪论攻击“教育革命总没有解决好”，开门办学“不讲学文化”，大学生的水平“不如过去中技高”，集中到一点，就是现在应该“扭”回到刘少奇修正主义教育路线的老路上去。如果让这种修正主义路线占统治地位，那么，就象宋江把聚义厅改为忠义堂一样、学校就会由无产阶级专政的工具复辟为资产阶级专政的工具，教育革命的成果就会被断送掉。"},{"type":"paragraph","text":"我们联系当前两个阶级、两条道路、两条路线斗争的实际，就会认识到毛主席关于评论《水浒》、“使人民都知道投降派”的现实意义是很深刻的。宋江搞修正主义，有其特定的历史的和阶级的内容，但是，在改变革命路线、纂夺领导权、否定革命成果、危害革命事业等方面，却是古往今来-切修正主义的共同特征。前一时期，社会上出现的否定无产阶级文化大革命、否定社会主义新生事物、攻击教育革命的谬论，就是修正主义这一共同特征的具体表现。对这种引导人们去投降资产阶级的错误思潮能不能识别？认识不认识它的本质？敢不敢同它进行斗争？这就考验着我们是不是真正“知道投降派”。把历史的经验和这一现实的斗争结合起来、就能使《水浒》的评论评得生动深人，使我们进一步认识到开展对修正主义、投降主义批判的必要性，从而认识阶级斗争和路线斗争的普遍规律。·"},{"type":"paragraph","text":"毛主席关于评论《水浒》的指示，特别强调了领导权的重要性。“屏见盖于一百0八人之外”，就是修正主义者宋江篡夺了领导权，排斥了革命派晃盖。《水浒》这部反面教材所歌颂的宋江改变晃盖的革命路线的过程，是从算夺领导权开始的。这个混人农民革命队伍中的地主阶级的代理人一上台，就推行修正主义、投降主义的路线，很快改变了梁山农民革命根据地的颜色。这个事实说明，领导权掌握在什么阶级的手里，对于革命的成败至关重要。无产阶级文化大革命前，有些部门和单位由于领导权没有真正掌握在马克思主义者手里，因而毛主席的无产阶级革命路线得不到贯彻执行，刘少奇的修正主义路线受不到抵制和批判，资本主义到处泛滥。经过无产阶级文化大革命，我们粉碎了刘少奇、林彪两个资产阶级司令部，进一步加强了无产阶级专政。党的“十大”通过的党章指出：“要特别警惕个人野心家、阴谋家和两面派，防止这样的坏人篡夺党和国家的各级领导，保证党和国家的领导权永远掌在马克思主义革命家手里”。那里的领导权如果不是真正掌握在马克思主义者和工.人阶级手里，那里就会否定无产阶级文化大革命，改变党的基本路线，为修正主义路线翻案。工人、贫下中农给我们的权力，应当用来为巩固无产阶级专政服务，而利用这种权力搞修正主义，领，搞好各级领导班子的思想建设和组织建设，才能保证各级领导权真正掌握在马克思主义者手里。"},{"type":"paragraph","text":"《水浒》“做反面教材”能够从反面教育人民，一切修正主义和修正主义者也是这样的反面教材。批判《水浒》所产生的影响，可以帮助我们认识当前围绕着教育革命问题开展大辩论的意义。正确路线是同错误路线相比较而存在，相斗争而发展的。这场大辩论是坚持党的基本路线，·加强无产阶级在上层建筑领域里对资产阶级全面专政的重大斗争，是无产阶级文化大革命的继续和深人。通过辩论，摆事实，讲道理，就能教育干部和群众辨别什么是香花，什么是毒草，分清什么是马克思主义路线，什么是修正主义路线，弄清思想，团结同志。教育战线的这场大辩论，对于其他各条战线都有着极其重大的意义。我们要把这场大辩论坚持·进行下去，搞深搞透。解放二十多年来，无产阶级同资产阶级、马克思主义同修正主义曾经进行过多次较量，都以资产阶级、修正主义的失败而告终。经过无产阶级文化大革命的锻炼和批林批孔的教育，广大人民群众和干部的阶级斗争和路线斗争的觉悟有了很大的提高，谁要搞修正主义，谁要开历史的倒车，必然在群众中受到孤立，受到抵制和批判。毛主席为我们党制定的整个社会主义历史时期的基本路线，是完全符合社会主义社会发展规律的，广大人民群众必将沿着毛主席开辟的航道，把社会主义革命和建设事业继续推向前进、这是任何人也改变不了的历史方向。"},{"type":"paragraph","text":"阶级斗争是纲，其他一切工作都是目。评论《水浒》是学习无产阶级专政理论的一个重要内容，也是抓紧阶级斗争的一个具体内容，轻视或贬低评论《水浒》的现实意义都是错误的。我们要密切联系当前阶级斗争和路线斗争的实际，通过对《水浒》的评论，提高贯彻执行毛主席无产阶级革命路线的自觉性，增强识别真假马克思主义的能力，把反修防修的斗争进行到底。"},{"type":"paragraph","text":"（原载《红旗》1976年第1期）张铁生的新“答卷”一对教育界某刊物上奇谈怪论的批判"},{"type":"paragraph","text":"（一九七六年一月六日）"},{"type":"paragraph","text":"正当教育界大刮右倾翻案风的时候，一九七五年十一月二十九日，辽宁铁岭农学院工农兵学员张铁生又以反潮流精神挥笔上阵，针对这些奇谈怪论，写了一篇批判文章。"},{"type":"paragraph","text":"张铁生的批判文章是针对教育界一个刊物第十期的内容而写的。在这期刊物上，散布了种种否定教育革命的奇谈怪论。它一出笼，有些人高兴地把它称之为“教育战线重新调整政策的红色信号。\"张铁生在批判文章的开头，就尖锐地指出：这“不是什么红色信号，而是修正主义复辟的绿色指示灯，必须认真加以批判，一点也不能放过”。"},{"type":"paragraph","text":"这是张铁生上大学以后，在教育战线两个阶级、两条路线斗争的又一个关键时刻，在阶级斗争主课中写的一份新“答卷”"}],"authors":["尹铭"],"dates":[{"year":1976,"month":1,"day":1}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":342,"page_end":344},"tags":[{"name":"林彪","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"张铁生","type":"人物"},{"name":"批林批孔","type":"主题/事件"},{"name":"教育革命","type":"主题/事件"},{"name":"反潮流","type":"主题/事件"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"革命三结合","type":"主题/事件"},{"name":"世界形势","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bf02c6ab8b"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
