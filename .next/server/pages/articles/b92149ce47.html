<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"波匈两国党政代表团发表联合声明忠于两个宣言　反对修正主义","authors":[],"dates":[{"year":1958,"month":5,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社布达佩斯12日电】　今天这里发表了波兰党和政府代表团和匈牙利党和政府代表团昨天签署的一项联合声明。"},{"type":"paragraph","text":"联合声明说，两个代表团在亲切友好的气氛中进行的会谈，就当前国际局势、国际工人阶级运动以及波匈两国关系发展的最重要问题交换了意见，并且在所讨论的一切问题上都取得了完全一致的看法。"},{"type":"paragraph","text":"声明说，两国认为具有不同社会制度的国家应当实行和平共处。两国完全支持苏联、其它社会主义国家和全世界和平力量的目的在于制止和消除军备竞赛以及建立以各国之间互相信任为基础的关系的倡议和活动。它们完全支持苏联政府关于举行最高级会议的倡议。同时，它们认为，西方的某些反动势力和帝国主义势力企图把有关欧洲人民民主国家的制度的问题列入会议议程，这是不负责任的，是企图干涉这些国家的内政的表现。"},{"type":"paragraph","text":"双方认为，目前国际局势中的关键问题是消除原子战争的威胁，双方肯定它们完全支持苏联最高苏维埃关于单方面停止核武器试验的决定。双方还认为在欧洲以原子武器和火箭武器武装西德的做法是特别危险的。"},{"type":"paragraph","text":"联合声明强调说，匈牙利政府完全支持波兰关于建立无原子武器地区的建议。两国代表团认为，在集体安全制度建立以前，完全是防御性的华沙条约必须继续作为社会主义国家的安全的必要保证。"},{"type":"paragraph","text":"声明接着说，波兰统一工人党和匈牙利社会主义工人党的目标是本着12国共产党和工人党莫斯科宣言和和平宣言规定的原则的精神发展两党之间的合作。"},{"type":"paragraph","text":"波兰代表团满意地看到匈牙利社会主义工人党在克服国内外反动势力造成的严重困难方面取得的成就，这些反动势力曾经利用过去的错误煽动反对人民政权的反革命。"},{"type":"paragraph","text":"双方相信，为了巩固世界和平，建立在无产阶级国际主义原则基础上的社会主义阵营国家的团结一致是十分重要的。同世界上第一个、也是最强大的一个社会主义国家苏联团结一致和结成永久的联盟是社会主义国家的共同安全和独立的基本因素。两党都坚决反对修正主义，认为修正主义是威胁工人运动的最大危险；两党也坚决反对教条主义和使党同群众隔离的宗派主义倾向。"},{"type":"paragraph","text":"两国代表团表示相信，波兰统一工人党和匈牙利社会主义工人党继续进行双边接触、共产党和工人党在必要时举行多边会议、以及交换情报和交流经验是加强和巩固我们的友谊和兄弟情谊的重要因素。"},{"type":"paragraph","text":"两国代表团声明，波兰和匈牙利的友好合作互助条约应当继续存在下去，以利于发展波兰和匈牙利之间的全面友好关系的事业。两国代表团还表示要进一步发展两国经济关系。"},{"type":"paragraph","text":"两国代表团认为，除了在今年3月签订的1958年至1960年的长期贸易协定之外，有必要另行缔结几个议定书，并且在今年年底以前拟就并且签订一项规定从1961到1965年相互交付基本货物的一般贸易协定。两国代表团同意，两国政府在最近将成立一个波匈经济合作委员会。双方决定缔结关于法律协助、社会福利和保险的协定以及缔结一项领事条约，以便进一步发展两国的相互关系和合作。"},{"type":"paragraph","text":"联合声明最后说，两个代表团深信波兰党和政府代表团对匈牙利的访问将大大加强两国人民的传统友谊，并且将更加巩固社会主义阵营的团结。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b92149ce47"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
