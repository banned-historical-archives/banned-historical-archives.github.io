script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"象刘英俊那样模范执行毛主席指示  在无产阶级文化大革命中创建新功  刘英俊生前所在部队广泛深入开展学习刘英俊活动","authors":[],"dates":[{"year":1967,"month":3,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"象刘英俊那样模范执行毛主席指示"},{"type":"paragraph","text":"在无产阶级文化大革命中创建新功"},{"type":"paragraph","text":"刘英俊生前所在部队广泛深入开展学习刘英俊活动"},{"type":"paragraph","text":"据新华社哈尔滨十五日电　正当我们最高统帅毛主席号召人民解放军应该积极支持左派广大群众，向党内一小撮走资本主义道路当权派夺权的关键时刻，刘英俊生前所在部队，广泛深入地开展了学习刘英俊同志的活动。广大指战员决心象刘英俊那样，在阶级斗争的大风大浪里活学活用毛主席著作，模范地执行毛主席的最新指示，在无产阶级文化大革命中创建新功。"},{"type":"paragraph","text":"三月十五日，是刘英俊同志为保卫人民生命安全光荣牺牲一周年。这个部队的广大指战员为了坚决响应毛主席的伟大号召，更好地支持无产阶级革命派的联合夺权斗争和支援春耕生产，普遍结合当前无产阶级文化大革命的形势，重温了刘英俊的生前事迹和日记摘抄，以及报刊上有关刘英俊的社论和文章，并召开讲用会、座谈会，总结交流一年来学习刘英俊的收获和经验。部队领导机关还专门组织学习毛主席著作积极分子，到连队巡回报告在无产阶级文化大革命中，以刘英俊为榜样，活学活用毛主席著作，执行毛主席最新指示的体会。各个连队也利用广播、黑板报、幻灯等宣传工具，反复宣传刘英俊的事迹，使广大指战员又一次受到了深刻的教育。大家说：刘英俊有一千个好，一万个好，模范执行毛主席的指示是第一个好。我们学习刘英俊，就要象他那样模范地执行毛主席的指示。"},{"type":"paragraph","text":"在学习刘英俊的活动中，指战员们遵循毛主席的教导，积极支持了驻地工厂、企业无产阶级革命派的联合夺权斗争。他们深入车间、职工宿舍和食堂，热情宣传毛主席的革命路线，宣传党的方针政策，辅导工人学习毛主席著作，帮助工人用毛泽东思想来正确处理夺权斗争中的问题。某部三机连的干部战士根据某工厂的实际情况，组织这个厂的红色造反者学习毛主席关于干部政策的论述，使大家认识到，执行毛主席革命路线的领导干部，是党和人民的宝贵财富，只有团结革命领导干部，才能夺好权，掌好权。刘英俊生前说过：“多一个人掌握毛泽东思想，就多一份革命的力量。”某部喷火连发现某工厂党内一小撮走资本主义道路的当权派在工人中散布反革命经济主义的毒素，就立即组织工人学习毛主席关于反对经济主义的论述，使一些受蒙蔽的群众提高了认识，揭发了党内一小撮走资本主义道路当权派的罪行，积极投入了向党内一小撮走资本主义道路当权派夺权的斗争。"},{"type":"paragraph","text":"这期间，有些部队还开赴农村，支援农村人民公社的春耕生产。刘英俊生前所在连队的指战员，一到农村就和贫下中农一起参加备耕生产，一起学习毛主席著作，向贫下中农宣传毛主席“抓革命，促生产”的指示，宣传《中共中央给全国农村人民公社贫下中农和各级干部的信》，受到了广大贫下中农的欢迎。贫下中农赞扬说：解放军给咱们带来了毛主席的最新指示，我们一定要大抓革命，猛促生产。连续五年获得四好连队称号的某部指挥连，在支援春耕中，还同贫下中农一起座谈怎样向刘英俊学习，军民一致表示要象刘英俊那样活学活用毛主席著作，抓革命，促生产，以“只争朝夕”的精神打好春耕生产第一仗。"},{"type":"paragraph","text":"广大指战员在支持无产阶级革命派联合夺权的斗争和支援春耕生产中，处处以刘英俊为榜样，活学活用毛主席著作，大破自己头脑里的“私”字。某部七连在去某工厂支援无产阶级革命派夺权前，组织大家学习毛主席的“老三篇”和《关于纠正党内的错误思想》，同各种私心杂念作斗争，使指战员们提高了认识，增强了信心。进厂以后，他们又事事按照毛主席的教导办事，坚决支持左派广大群众，取得了夺权斗争的胜利。战士们说：只有象刘英俊那样革“私”字的命，做毛主席指示的模范执行者，才能完成党中央和毛主席交给我们的光荣任务。在春耕第一线的战士们说：只有象刘英俊那样，让“公”字在头脑里扎根，革命才能当闯将，生产才能当模范，在无产阶级文化大革命中作出新的贡献。"},{"type":"paragraph","text":"今天这支部队广大指战员隆重集会，纪念刘英俊同志牺牲一周年，他们总结了一年来开展向刘英俊同志学习活动的成绩和经验。大家一致表示，要永远象刘英俊那样，努力学习毛泽东思想，忠实贯彻毛泽东思想，热情宣传毛泽东思想，勇敢捍卫毛泽东思想，永远保持人民解放军最鲜红的旗帜。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9d9a38dda7"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
