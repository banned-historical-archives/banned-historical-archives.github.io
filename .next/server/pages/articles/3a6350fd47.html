script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji36","name":"毛泽东全集第36卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji36.pdf"],"article":{"title":"毛泽东等祝贺阿尔巴尼亚解放十一周年的电报","alias":"","parts":[{"type":"paragraph","text":"毛泽东等祝贺阿尔巴尼亚"},{"type":"paragraph","text":"解放十一周年的电报"},{"type":"paragraph","text":"（1955年11月26日）阿尔巴尼亚人民共和国人民议会主席团主席哈奇·列希同志：阿尔巴尼亚人民共和国部长会议主席穆罕默德·谢胡同志：阿尔巴尼亚人民共和国外交部长贝哈尔·什图拉同志："},{"type":"paragraph","text":"当阿尔巴尼亚人民获得解放十一周年之际，我们谨代表中国人民和中国政府向你们，并且通过你们向英雄的阿尔巴尼亚人民和政府致热烈的衷心的祝贺。"},{"type":"paragraph","text":"十一年来，具有光荣革命传统的阿尔巴尼亚人民在阿尔巴尼亚劳动党的领导下，在巩固人民民主政权，捍卫祖国独立和创造繁荣幸福的新生活方面已获得了光辉的成就。中国人民为兄弟的阿尔巴尼亚人民的成就感到欢欣，并且祝中阿两国人民的兄弟友谊和团结在我们两国建设社会主义和维护世界和平的共同事业中更加巩固和发展。"},{"type":"paragraph","text":"中华人民共和国主席毛泽东中华人民共和国全国人民代表大会常务委员会委员长刘少奇中华人民共和国国务院总理兼外交部长周恩来一九五五年十一月二十六日于北京"}],"authors":["毛泽东"],"dates":[{"year":1955,"month":11,"day":26}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":79,"page_end":79},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3a6350fd47"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
