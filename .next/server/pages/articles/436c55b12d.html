script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反对英国政府剥削政策  伦敦公共汽车工人总罢工","authors":[],"dates":[{"year":1958,"month":5,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反对英国政府剥削政策"},{"type":"paragraph","text":"伦敦公共汽车工人总罢工"},{"type":"paragraph","text":"据新华社伦敦5日电　伦敦公共汽车公司工人在4日午夜开始举行大罢工。5日清晨，伦敦八千四百辆公共汽车、无轨电车和长途汽车已经全部停驶。这是1937年以来伦敦公共汽车工人第一次举行的大罢工。"},{"type":"paragraph","text":"这次有五万人参加的罢工是由于英国政府所有的伦敦运输公司拒绝了工人提高工资的要求而引起的。"},{"type":"paragraph","text":"据新华社伦敦5日电　记者钱行报道：伦敦公共汽车工人在罢工中表现了百分之百的团结和良好的组织性。"},{"type":"paragraph","text":"八千四百辆公共汽车没有一个轮子转动。到处秩序井然。"},{"type":"paragraph","text":"中央罢工委员会今天通过决议，赞扬和感谢罢工工人表现出的团结精神。"},{"type":"paragraph","text":"各个工业部门工人的贺信和声援信今天整天不断涌入运输与普通工人工会的总部。"},{"type":"paragraph","text":"英国第二大工会，拥有九十八万二千会员的混合机械工业工会通过一项紧急决议，保证全力支持公共汽车工人。"},{"type":"paragraph","text":"苏格兰矿工工会主席亚伯拉罕·莫法特在爱丁堡举行的有十万名矿工和矿工家属参加的联欢会上保证在道义上和财政上支持公共汽车工人。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"436c55b12d"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
