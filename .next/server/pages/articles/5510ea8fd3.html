script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"日代表报告亚非人民团结理事会议情况  排除现代修正主义障碍赢得新胜利  苏代表贩卖错误路线的修正主义面目被揭露","authors":[],"dates":[{"year":1964,"month":5,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"日代表报告亚非人民团结理事会议情况"},{"type":"paragraph","text":"排除现代修正主义障碍赢得新胜利"},{"type":"paragraph","text":"苏代表贩卖错误路线的修正主义面目被揭露"},{"type":"paragraph","text":"新华社二十二日讯　东京消息：日本亚非团结委员会的领导人二十日在东京的一次讲演会上指出，三月底在阿尔及尔举行的亚非人民团结理事会第六届会议，排除了现代修正主义企图阻挠民族解放运动向前发展的障碍，从而赢得了新的胜利。"},{"type":"paragraph","text":"出席阿尔及尔会议的日本代表们在讲演会上报告了会议情况。"},{"type":"paragraph","text":"日本代表团团长、日本亚非团结委员会理事长坂本德松说，在理事会会议上，苏联代表贩卖他们的"},{"type":"paragraph","text":"“和平共处”总路线，企图歪曲反对帝国主义的民族解放斗争的方针路线。他们还声称似乎只要大国用从裁军省下来的钱提供经济援助，不发达国家就可以获得独立。这是根本错误的观点。"},{"type":"paragraph","text":"日本亚非团结委员会事务局长板井庄作说，阿尔及尔理事会会议围绕着亚非团结运动的基本方针路线同现代修正主义进行了斗争。“苏联代表提出的决议草案遭到拒绝，而通过了战斗性的决议，其中包括支持要求把冲绳归还日本的斗争的决议和支持举行第十届禁止原子弹氢弹世界大会的决议。这就反映出，现代修正主义的真面目已在亚非人民面前被揭露，反帝斗争正一天天向前推进。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5510ea8fd3"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
