script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"一四二三研究所批判修正主义科研路线用革命理论指导科研取得成绩","authors":[],"dates":[{"year":1976,"month":3,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　一四二三研究所广大工人、科技人员和干部，在痛击科技界的右倾翻案风的斗争中，认真学习无产阶级专政理论，不断清除唯心主义、形而上学和各种资产阶级思想，使科技队伍在继续革命的道路上不断前进。"},{"type":"paragraph","text":"无产阶级文化大革命前，由于执行了刘少奇的修正主义科研路线，这个所的旧党委不组织群众学习马列和毛主席著作。无产阶级文化大革命中，广大干部和群众起来批判了修正主义科研路线，一个学习马克思主义的群众运动蓬勃开展起来。几年来，广大干部和群众认真学习马列和毛主席著作，广大干部和群众的觉悟有了很大提高，不少科技人员深入工厂、部队，实行开门办科研，促进了世界观的改造，加速了科研试制工作的进展。这个所去年完成的研制项目，比文化大革命前的一九六五年增加了百分之八十，产品的小批量生产也有很大增长，为我国填补了三项空白。科技界刮右倾翻案风的人断章取义，他们根本不谈马克思主义包括自然科学，片面强调马克思主义不能代替自然科学。他们就是要否定马克思主义对自然科学的指导作用。这个所的工人和科技人员列举大量事实，说明科技单位只有坚持无产阶级专政，逐步解决为什么人的问题，并用马克思主义指导科学研究，才能缩短科研项目的周期，为人民作出贡献。这个所去年为国家填补三项空白之一的地下铁道自动控制用的漏泄电缆，就是参加研制的工人和科技人员明确了这个课题的重大政治意义后，实行研制、生产、使用三结合干出来的。"},{"type":"paragraph","text":"这个所第三研究室在文化大革命中搞的重点工程配套的某课题，充分显示了毛主席哲学思想的巨大威力，这个课题是一门新技术，资料很少，课题组的同志反复实践，不断总结，在课题研制过程中，先后五次学习毛主席《矛盾论》的有关章节，分析了各个时期的主要矛盾和主要矛盾方面，抓住了主要矛盾，攻克了一道道难关，终于胜利地完成了任务。　(本报通讯员)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"革命三结合","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7260da8862"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
