script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"在美国垄断资本的残酷剥削和掠夺下  菲律宾财政经济状况日益恶化","authors":[],"dates":[{"year":1969,"month":9,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"在美国垄断资本的残酷剥削和掠夺下"},{"type":"paragraph","text":"菲律宾财政经济状况日益恶化"},{"type":"paragraph","text":"新华社十一日讯　马尼拉消息：在美帝国主义的残酷剥削和掠夺下，菲律宾的财政经济正在陷入日益严重的困难中。"},{"type":"paragraph","text":"据马尼拉报纸报道，菲律宾外汇储备近几个月来急剧下跌，到八月底降到了一亿四千五百万美元的最低纪录。"},{"type":"paragraph","text":"菲律宾外汇储备下降的一个主要原因是：由于美国垄断资本一面向菲律宾大量倾销它的“过剩”产品，一面又竭力压低它在菲律宾搜购的原料价格，造成菲律宾国际贸易逆差的不断增加。据菲律宾中央银行最近发表的数字，一九六八年菲律宾对外贸易逆差创十九年来的纪录，达到二亿七千万美元。今年上半年菲律宾的对外贸易逆差达到一亿四千四百多万美元，比去年同一时期增加了三千六百多万美元。"},{"type":"paragraph","text":"菲律宾外汇储备急剧下降的另一个主要原因是：美国垄断资本把它在菲律宾投资所搜刮得的巨额利润源源汇回美国。"},{"type":"paragraph","text":"据菲律宾官方透露，外国公司主要是美国垄断公司每年从菲律宾汇出一亿二千万到一亿四千万美元。马尼拉报纸报道，菲律宾中央银行为了应付美元外汇的需求，已经在今年上半年把大量黄金卖给美国，并且向美国控制的世界银行以及其他外国银行借了债，但仍然无法应付外汇储备急剧下降的局面。菲律宾币比索在国外的市价急剧下跌，这使菲律宾的金融进一步受到了冲击。"},{"type":"paragraph","text":"菲律宾国会最近发表了一项报告，对外国资本（主要是美国垄断资本）控制了菲律宾的经济命脉，包括重要工业、出入口贸易、银行金融等表示很大不满。报告忧心忡忡地说，菲律宾的外债已经达八亿五千九百多万美元之巨。报告不得不承认：“菲律宾人正在受到煎熬。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"421edf9ee9"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
