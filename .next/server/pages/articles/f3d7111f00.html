" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoistlegacy.de-675","name":"中共张家口市委员会关于为‘统建会’会员平反的通知","author":"中共张家口市委员会","internal":false,"official":false,"type":"unknown","files":[],"article":{"title":"中共张家口市委员会关于为‘统建会’会员平反的通知","dates":[{"year":1981,"month":9,"day":1}],"is_range_date":false,"authors":["中共张家口市委员会"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"铁道部政治部审干办公室, 审干工作政策选编(二), 522-524","tags":[{"name":"平反","type":"主题/事件"},{"name":"清理","type":"主题/事件"}],"parts":[{"type":"title","text":"中共张家口市委员会关于为“统建会”会员平反的通知"},{"type":"subtitle","text":"(一九八二年九月一日)"},{"type":"paragraph","text":"在“文化大革命”清队中，曾对伪“张垣市统一建设协进分会”（简称统建会）一案作了全市性的清查。凡敌档中登记为统建会会员的，大都受到冲击。有的受到审问，被迫作了检查交代；有的被办班审查，进行“批评帮助”；有的被非法隔离，遭到刑讯逼供。之后，不少人按“一般政治历史问题”作了结论；在近几年的落实政策中，有些单位分析了当时的历史情况，以“不视为问题”修改了 “文革”中所作的结论。但由于对“统建会”这一组织的性质没有明确的说法，因而，有些人仍维持“一般政治历史问题”或“一般历史问题”的结论；有的仍把被编入“统建会”一事当做加入过反动党、团组织而填入个人简历；多数人因此案而形成庞杂的档案材料，至今尚未加以彻底清理，这些同志仍不同程度地背着包袱。"},{"type":"paragraph","text":"经调查，伪“张垣市统一建设运动协进分会”成立于一九四七年六月。其任务是：在政治上、组织上、行动上对曾为我工作过的人员实行全面控制。当时，敌伪将张家口第一次解放时在我工厂、商店、学校等基层单位工作过的工人、店员、教员、街道农村干部以及未随我军转移的干部家属六千五百余人编入“统建会”。被编入“统建会”的人员，有的只履行过一般登记手续，有的则是别人代为登记，本人并不知道。不论属于那种情况，都受到敌伪的严密控制。他们的户口被编入特别户口册，由伪警察局户籍员及伪行政部门进行监视；他们的身份证，印迹盖在照片的头部，以示区别；统建会员小组中实行联保连坐，并规定了 “本会会籍之员工不准擅离工作岗位，不予假期，以防企图”等制度。在当时，被编入“统建会”的会员受到敌人的种种迫害，其中也有不少人采取公开或隐蔽的手段向敌进行了斗争。鉴于此案涉及人多、牵扯面大、危害很深，遗留问题不少，请各级党委对“统建会”成员问题再做一次复查。一、在复审时，要严格把操纵“统建会”、对我方工作人员实行监视、控制的敌伪骨干与曾为我方做过有益工作，因而受到控制、监视的“统建会”会员、小组长严格区分开来。要明确宣布，“统建会”是敌伪加在曾为我方工作的人员身上的枷锁，在清队时，混淆敌我，把这些同志在“统建会”中受到的迫害当作历史问题加以审查是完全错误的，要为受审查的同志彻底平反，并在适当场合为他们消除影响。至于有些党员、干部登记自首，出卖组织，为敌效劳的，应由个人负责，并视情节做出适当结论，不要与“统建会”会员问题混为一谈。"},{"type":"paragraph","text":"二、对当时因审查“统建会”会员问题而形成的内查外调、审批结论等档案材料要全部撤销，个人检查交代材料要退还本人。过去因此案为有关亲属、亲友出示的证明材料，要通知有关党组织宣布作废。三、这些老职工、街道贫苦市民在解放前受尽压迫剥削，张家口第一次解放时就是我党的依靠力量。建国后，他们又为国民经济的恢复、社会主义建设做出了重要贡献。现在，他们仍然是各单位的骨干力量。各级党委应把他们当作实现“四化”的宝贵财富。在工作和生产建设中充分相信依靠他们，照顾和解决好他们生活中的实际问题。并教育青年—代尊重和认真学习这些老工人、老干部的优良品德，以充分发挥他们在工作和生产中的积极作用。"},{"type":"paragraph","text":"(摘自《中共张家口市委〔1981〕37号》文件)"}],"alias":""},"tags":[{"name":"清理阶级队伍","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f3d7111f00"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
