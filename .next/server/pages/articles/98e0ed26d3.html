<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"谁迫害了我们?京剧界的重重剥削真是一片乌烟瘴气","authors":[],"dates":[{"year":1950,"month":2,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"吕君樵:我以从业员的身分来讲几句话，我们剧艺界不论京剧、沪剧、越剧情况都很不好，我个人觉得，除经济问题外，最大的原因是不合理的旧制度还没有澈底改革，以京剧来说，不合理的旧制度很多:(一)旧戏班人力供过于来，以中国大戏院为例，后台有一百四十人左右，而实际上不需要这么许多人。如后台稽查有三四个，本来用来维持秩序、赶台的两旁看白戏的人的，而结果他们带人来看白戏，稽查现在已毫无用处，但仍存在着。前台有八十多人，实际上也不需要这么多，这些人大多是当时一些所谓闻人介绍来的，情面关系不得不用。这些人有时来逛一逛，有时来也不来；有一次为了报上发广告，办理广告事情的有四个人，但是一个也不在，后来你推我、我推你，责任不知在谁身上?"},{"type":"paragraph","text":"(二)讲情面，有本领而没有关系的演员，派戏的不会把好角色派给他做，拿干薪不做事的也很多。"},{"type":"paragraph","text":"(三)中问剥削，除老板外，介绍人也是中间剥削者，介绍人介绍演员进来，就得向演员拿一个折扣和津贴，过年过节演员也得送礼给他，如果不送礼，处处地方要被捣蛋，有一个演员，第二次到上海，因为忽略了这一点，介绍人就捣蛋，一下子戏派得不好，一下子角色不整齐，弄得演员焦头烂额，后来送了礼，戏码也合适了，角色也整齐了。老板剥削演员，六月十二月要帮忙，大演员帮十天忙，班底半个月，也有最高纪录演一个月只拿五天包银的，演员若是不肯，要走，老板就用流氓‘闻人’威胁他。因此也有人挨过打。"},{"type":"paragraph","text":"(四)演戏权操在老板手中，他们不管演新戏老戏，只问卖不卖钱，因此而阻碍了部分演员所进行的改革旧剧工作。解放后，共舞台若不是改为共和班，‘九件衣’决不可能演出。"},{"type":"paragraph","text":"不过部分演员也有坏毛病，如演拿手戏，要小费，一个人唱戏，带了许多闲人一起去。同时，演员保守性很强，只搞这一套，外面天翻地覆都不管。"},{"type":"paragraph","text":"中南京剧团的演员，全是旧艺人，现在他们的文化政治水准都已很高，特别是贺玉钦同志，进步非常的快，这证明京剧团的制度和组织非改革不可。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"98e0ed26d3"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
