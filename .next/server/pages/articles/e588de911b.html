<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"我爱我的祖国","authors":["白智清"],"dates":[{"year":1976,"month":2,"day":7}],"is_range_date":false,"parts":[{"text":"我爱我的祖国","type":"title"},{"text":"白智清","type":"authors"},{"text":"在边境上百万重兵压境的现在，在“不能争取三年、争取两年也好”的日子里，在国家和民族处在生死危亡的关头上，……作为七十年代的青年的我们，虽然未曾经过亡国的苦难，但是，六九年惨死在苏修疯狂的战车下的那些手拿语录牌的渔民同胞的鲜血啊!却是实实在在地淌在我们的眼前(见实况纪录片《新沙皇的罪行》)。","type":"paragraph"},{"text":"我们这些当年的造反派战士，以后的“批清”受害者，在总理骨灰未冷的而今，在民族生死存亡的关头上，我们只有一句话：“我们是中国人，我们热爱自己的祖国。”","type":"paragraph"},{"text":"我们不信神，也不相信“天朝圣威可以慑服洋人”这一类狂妄无知、自欺欺人的精神万能论的变种。我们知道，战争是物质的运动。我们深信恩格斯指出的：“在任何地方和任何时候，都是经济的条件和资源帮助‘暴力’，取得胜利”的真理，更没有忘记毛主席关于战前多流汗，战时少流血的教导。","type":"paragraph"},{"text":"我们多么希望边境上多几门大炮，战士多几样武器，海上多几艘军舰，天上多几架飞机，……多么希望……而这一切都需要钢，需要时间，需要……","type":"paragraph"},{"text":"当七四年钢铁生产大幅度下降的时候，当七四年弄出了解放二十几年来第一个财政赤字的时候，……看着多少个烟囱停止冒烟，看着多少部机器停止转动，看着多少辆火车停止运行，看着……的时候，……多少个关心自己国家前途、忧愁自己民族命运的中国人心急如焚，肝胆俱裂啊！","type":"paragraph"},{"text":"作为国家钢铁战线上的战士的我们，作为还没有完全丧尽民族天良的中国人，每当看到我们国家历年来钢产量数字的时候，就不得不引起我们对那些丧尽民族天良的修正主义者，对那些置民族危亡于不顾的畜牲们的切齿愤恨。","type":"paragraph"},{"text":"在第一个五年计划胜利结束的五七年，我国的钢产量是五百三十五万吨，大跃进的五八年，我们国家的钢产量达到一千一百万吨，比五七年多六百万吨。五九年超过了十年后的六九年，我国的钢产量只有一千一百万吨……自一九六九年的社会生产稳定到七三年这四个年头里，我国的钢产量都是从以平均每年净增三百万吨的速度上升的，七三年达到了二千三百多万吨。本来七四年我国的钢产量可达二千六百万吨，七五年越过三千万吨是毫无疑问的了。在七三年，生产上、科学上、文化教育上都有一点上升跃进的雏形。当时的不少人都盼望着一个大跃进的局面的到来。","type":"paragraph"},{"text":"然而，七四年却是生产大幅度下降的一年。七四年啊！钢产量还不足二千一百万吨。七四年啊！也是国家民族时刻都有挨打的可能的一年！","type":"paragraph"},{"text":"七五年，大家都知道是国民经济、人民生产全面恢复上升的一年。七五年我国的钢产量大幅度上升到二千四百五十万吨。七五年的钢产量是十年来净增最多、上升最快的一年。","type":"paragraph"},{"text":"如果按照七五年的步伐，今年我国的钢产量至少该是八千万吨了。如果按照五八年大跃进的速度，我国早超过苏修的一亿三千万吨了。即使就按六九年后上升的步伐，今年我国的钢产量也接近四千万吨了。但是……是谁，到底是谁，葬送了国家的高度工业化，葬送了国家的富强、民族的昌盛，人民的幸福!并且连国家和民族赖以生存、反侵略战争赖以依托的“经济条件”也不放过……","type":"paragraph"},{"text":"我们实在按制不住了，我们只有高呼，我们是中国人，我们热爱自己的祖国！","type":"paragraph"},{"text":"回首过去的日子，年华虚度，岁月枉过。祖国啊，我没有为您作出多大贡献。","type":"paragraph"},{"text":"今天啊，今天在您生死存亡的日子里，祖国啊！请您收下我一腔为您奔流的热血吧!","type":"paragraph"},{"text":" 祖国忠诚的儿子、重钢职工白智清一九七六年二月七日","type":"paragraph"}],"comments":[],"origin":"根据网络材料打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e588de911b"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
