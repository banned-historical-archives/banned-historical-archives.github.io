script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"创作思想是不是存在资产阶级倾向?上影创作干部展开大辩论","authors":[],"dates":[{"year":1958,"month":1,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　昨天上午，上海电影制片公司所属各厂、团的创作干部——编剧(辑)、导演、演员、作曲、摄影、录音、美工、剪接、化装以及制片等七百余人在上海艺术剧场集会，听取该公司副经理张骏祥为公司范围内举行的创作思想讨论会所作的动员报告。"},{"type":"paragraph","text":"在动员大会上，该公司经理袁文殊首先指出:创作思想讨论会是公司转入专题鸣放后、着重整改阶段的一个重要措施和内容。讨论会将通过观摩1957年所生产的新片，着重研究和讨论有关创作思想上所存在的问题，更好地改进工作，促进人民电影事业的进一步繁荣。"},{"type":"paragraph","text":"张骏祥副经理在动员报告时说，“上影”自从贯彻党所提出的“百花齐放、百家争鸣”的方针后，进行了分厂，实行了创作下放，组织了创作集体，拍摄了许多影片。同时通过反右派斗争，辩明了大是大非。现在正是回过头来检查自己改进工作的时候。张骏祥谈到了这次讨论的大体范围:一、创作思想上有否资产阶级的倾向。二、创作作风上有否资产阶级的思想影响，如“一部戏思想”，不顾国家财务、生产计划，在制片过程中不惜工本，大量的铺张浪费等等。三、创作关系问题。编、导、演等创作人员之间的合作关系存在什么问题，应如何解决。四、艺术领导问题。如怎样理解创作自由，怎样才算干涉创作自由，怎样才不算干涉创作自由。如何在“百花齐放、百家争鸣”的方针下，进行艺术领导和创作下放等等。"},{"type":"paragraph","text":"张骏祥在报告中特别强调今后将更好贯彻“百花齐放、百家争鸣”方针，更多的信任创作干部。他希望所有创作干部严肃认真的对待这个讨论会，充分的各抒己见，畅所欲言。"},{"type":"paragraph","text":"讨论会将通过观摩新片后组织小组讨论，结合阅读文件和大会发言的方式进行。观摩的影片有美术片“拔萝卜”；故事片“情长谊深”、“凤凰之歌”、“护士日记”、“雾海夜航”、“牧童投军”、“洞箫横吹”、“球场风波”、“乘风破浪”、“幸福”、“羊城暗哨”等十部。昨天起，创作干部已开始观摩影片。预计13日开始进行小组讨论和大会发言。"},{"type":"paragraph","text":"“上影”在进入整改阶段、再次发动大鸣大放以后，到最近为止，已经贴出了大字报近4000张，小组会及大字报中提出意见有6000条左右。其中许多意见是针对公司和厂领导上的三个坏主义，特别是领导上脱离群众、脱离实际的官僚主义作风。在运动中，从公司经理到厂长一级领导同志，都反复地表明了整改决心，在群众大会上引火烧身，作了自我检查；并根据群众所提的意见，开始改进工作，其中特别显著的是深入车间，深入基层，发现问题，解决问题，受到群众普遍的欢迎，为转入专题鸣放创造了有利条件。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"abf69ff264"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
