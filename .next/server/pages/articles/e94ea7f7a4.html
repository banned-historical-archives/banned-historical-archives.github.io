<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"日本革命人民热爱毛主席","authors":[],"dates":[{"year":1969,"month":10,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"日本革命人民热爱毛主席"},{"type":"paragraph","text":"“毛主席的声音是真理的声音”"},{"type":"paragraph","text":"今年五月七日清晨，日本朋友们从北京广播电台播送的电影录音中，听到我们伟大领袖毛主席在中国共产党“九大”上讲话的声音，受到了极大的鼓舞。"},{"type":"paragraph","text":"一位叫福井的日本朋友说：“当我听到毛主席讲话的声音时，我激动得含着眼泪，举起红宝书《毛主席语录》，连续高呼：‘毛主席万岁，万岁，万万岁！’”"},{"type":"paragraph","text":"东京的一位名叫石桥的汽车司机，在行车时，从北京广播中听到了毛主席的声音。他说：“当我听到毛主席的伟大声音时，我高兴极了！我能听到当代最伟大的马克思列宁主义者毛主席的声音，真是太幸福了！”他说：“我们日本工人要努力活学活用毛泽东思想。日本人民的解放，必须靠毛泽东思想。”"},{"type":"paragraph","text":"一位叫山本的高中学生，听了毛主席的声音以后，立即把这个喜讯告诉给他的同学。他说：“毛主席的声音是真理的声音。我把这个喜讯转告给同学们，让他们分享我的幸福和喜悦。”"},{"type":"paragraph","text":"“毛主席和我们工人在一起”"},{"type":"paragraph","text":"一位名叫松山的青年铁路工人常常向人们叙述他在四年前访问中国时，受到毛主席接见的幸福心情。他说：“伟大领袖毛主席和我们工人在一起，亲切地和我们握手，这个幸福时刻，我一辈子也忘不了。”"},{"type":"paragraph","text":"松山的家里悬挂着一张《毛主席去安源》的画。他说：“我一看到这幅画，就马上感到好象毛主席来到了我们工人中间一样。毛主席的光辉形象，给我巨大鼓舞，使我增加了巨大力量。”"},{"type":"paragraph","text":"这位青年铁路工人，已经通读了《毛泽东选集》。他还和其他十几位青年工人组织了一个“《毛主席语录》学习会”，努力在斗争实践中运用毛泽东思想。"},{"type":"paragraph","text":"今年春天，参加这个学习会的十几个人发动工人群众起来反对亲美垄断资本家用来加紧压榨工人的所谓企业“合理化”。垄断资本家叫来了反动的武装警察，对工人进行野蛮镇压。这时候，松山和他的伙伴们站在斗争队伍的最前列，不断高声朗读毛主席语录，坚持斗争，终于取得了胜利。通过这次斗争，他们进一步认识到毛主席指出的反动分子“靠我们组织起人民去把他打倒”这一真理。他们在学习会上讨论时指出，“要取得革命胜利，就一定要向群众广泛宣传毛泽东思想。只有用毛泽东思想把工人阶级武装起来，才能最后打倒美日反动派。”"},{"type":"paragraph","text":"“毛泽东思想给了我无穷力量”"},{"type":"paragraph","text":"东京一位名叫田中的女青年，在一次同美日反动派斗争中被反动警察打伤后，进医院治疗。她在住院的时候，带去了一张毛主席像摆在自己的床头。"},{"type":"paragraph","text":"田中讲到她参加这次反对美日反动派斗争的情景时说：“这次斗争是为了反对美日反动派修建‘新东京国际机场’，保卫农民的土地。我在游行队伍中，紧紧跟在写有‘毛泽东思想万岁’的红旗后面。斗争一开始，反动警察就向我们扑来。这时，我想起了毛主席的‘下定决心，不怕牺牲，排除万难，去争取胜利’的教导，鼓起了勇气，同反动警察进行了搏斗。我感到毛泽东思想给了我无穷的力量。”"},{"type":"paragraph","text":"田中凝视着毛主席像，满怀革命激情地对她的朋友说：“斗争锻炼了我。是伟大领袖毛主席给了我无穷的力量，是毛主席给我指引了前进的方向。”"},{"type":"paragraph","text":"（据新华社）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e94ea7f7a4"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
