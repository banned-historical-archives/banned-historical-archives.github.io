script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"河南落榜中小学毕业生进行反动活动","authors":["梁云"],"dates":[{"year":1957,"month":9,"day":12}],"is_range_date":false,"parts":[{"text":"河南落榜中小学毕业生进行反动活动","type":"title"},{"text":"梁云","type":"authors"},{"text":"新华社郑州12日讯　河南省落榜中小学毕业生进行反动活动。开封市三元街，一个地主家庭出身、父亲当过伪律师的初中毕业生朱振明，在8月19日早晨起来，看见他本院的一个干部去厕所时，他便立即手持菜刀赶去，把这个干部砍了四刀(身受重伤)。兰考县发生几个学生打死一个生产队长(后又救活了)的事件。","type":"paragraph"},{"text":"郑州日报于8月份先后接到几封匿名信，有两封以“本届毕业生示威游行委员会、武装实力执行委员会”署名的匿名信，在这封信上写道：“现在我们以执行委员会的名义向你们警告，如果不给广大青年谋求学习的道路，我们将举行以一万人公开的示威和实力行动，如若不行的话，请准备兵力对付吧！”在另一封信上又说：“我们要和右派分子站在一起反对政府，反对共产党，……。”","type":"paragraph"},{"text":"荥阳县县长给学生作报告时，在会场上发现了以大众党、反共党、工农党、人民党署名的十八张反动传单，内容：“同胞们，我们要过幸福的生活，就要打倒万恶的共产党，专制剥削的共产党。”","type":"paragraph"},{"text":"邓县二中在7月24日早晨，发现学校贴有“在现在的黑暗社会里，人民处在水深火热中，到处可以看见农村啼饥号寒，什么卖余粮，农民生活真是遭殃”的反动标语。","type":"paragraph"},{"text":"登封县李凹村有一个共产党员的中学生李荣朝在他家乡的一个农业社社员大会上说：“共产党员、青年团员现在都犯罪了，得向人民低头认罪。”","type":"paragraph"},{"text":"拓城县红思乡小学应届毕业生中，有十人组成“英雄第一大队”的反动组织，而且制定了章程。这个队的成员每天早起到井沿吹一口气，说到一百天井王爷就能指挥，考学不要紧，功夫成了，自然会有人答题。他们还计划买枪打倒共产党。","type":"paragraph"},{"text":"南召县刘村小学迁玉昌、艾书林等八个学生组成了一个反动小集团，这个集团的负责人艾书林自称为宋江，与其余的学生结为兄弟，盟誓：“一人在全在，一人亡全亡”。他们准备先打教师，后用石头砸死社干部。他们准备以卖假药、打连花落等方式谋取生活到南朝鲜去，向美国人谈一谈中国人的苦处。","type":"paragraph"},{"text":"来源：1957年9月20日新华通讯社编《内部参考》。","type":"paragraph"}],"comments":[],"origin":"美国图书馆收藏","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]},{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"河南落榜中小学毕业生进行反动活动","authors":["梁云"],"dates":[{"year":1957,"month":9,"day":12}
