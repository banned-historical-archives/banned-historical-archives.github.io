" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"关于王铁生同志一九五七年反右运动中问题的复查结论","authors":[],"dates":[{"year":1979,"month":1,"day":15}],"is_range_date":false,"parts":[{"text":"关于王铁生同志一九五七年反右运动中问题的复查结论","type":"title"},{"text":"王铁生，男，五十二岁，湖南衡阳人，家庭出身官僚，本人成分学生。一九四九年十二月考入华北大学俄文专修班学习。反右前为我校工业经济系讲师。一九五八年定为右派分子，给予劳动教养处分。一九六三年摘掉右派帽子。","type":"paragraph"},{"text":"根据中共中央(78)55号文件规定和王铁生同志在反右期间的言行，经复查认为属于错划，予以改正。并撤销一九五八年划王铁生同志为右派分子的决定，撤销劳动教养处分。由中国人民大学安排适当工作，从一九七八年十月恢复高教八级工资待遇。","type":"paragraph"},{"text":" 中共中国人民大学委员会一九七九年一月十五日（章）","type":"paragraph"}],"comments":[],"origin":"根据文件原件打印。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"47e1fabba5"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
