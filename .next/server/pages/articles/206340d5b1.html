script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"文明世界的奴隶","authors":["周俊生"],"dates":[{"year":1989,"month":8,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"文明世界的奴隶"},{"type":"paragraph","text":"在我们这个“文明”世界中，存在着1亿多奴隶。"},{"type":"paragraph","text":"“正牌”奴隶　非洲毛里塔尼亚存在10万“正牌”奴隶。这些奴隶多为文盲，属牧主所有，是几百年前阿拉伯人入侵塞内加尔河以南地区时掠回的黑奴的后裔，代代为奴。1960年该国独立后，政府不断号召牧主释放奴隶，1980年发布强制性废奴法令，给释放奴隶的牧主补偿金。但是，经过20多年的努力，还有些死硬派顶着不办，至今仍存10万奴隶未解放。"},{"type":"paragraph","text":"债务奴隶　印度等国都有数目可观的“贱民”，他们虽不等于奴隶，但其境遇接近奴隶。其中有一部分是负债立约入债家为奴的，完全失去了自由，被称为“债务奴隶”。总人数达2500万左右。印度的“哈里真人”是该国最下等的种姓，人数逾亿。其中最贫穷的部分，因借债难还而进债主家为奴偿债，其人数一说500万，一说2000万，官方正式承认的只有几十万。这些债务奴隶没有解约期限，直到主人宣布“债务已还清”，自愿释放为止。"},{"type":"paragraph","text":"可怜的童奴　据国际劳工组织报告，全球15岁以下童工达2亿人，其中部分失去人身权利，待遇恶劣，实际是奴隶。一些发达的西方国家，也不乏童奴的踪迹。英国《星期日邮报》曾以《丑闻——英国存在200万童奴》为题，揭露了这个问题，意大利至少有50万童工过着奴隶式的非人生活。"},{"type":"paragraph","text":"悲惨的女奴　女奴是奴隶中的一大门类，她们或沦为奴仆，或被迫卖淫。她们是一群完全丧失了人身自由、任人宰割的羊羔和泄欲工具。海湾五国共雇佣外国女佣40多万名，其中科威特占10万名左右。她们多是30岁以下的农家女，来自南亚、东南亚，许多人被人贩子骗卖到海湾市场，一些人在雇主家过着非人的日子，被雇主奸淫不敢声张，被打死殴伤也无处申诉，有的甚至被雇主强迫出卖肉体以牟利。"},{"type":"paragraph","text":"（7月19日《法制日报》  周俊生文）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"206340d5b1"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
