script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"78256f65-d15b-4800-976e-d4a9e6e7a160","name":"红旗一九五八年第二期","internal":false,"official":true,"type":"pdf","author":"《红旗》杂志编辑部","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives2/main/78256f65-d15b-4800-976e-d4a9e6e7a160.pdf"],"article":{"title":"为啥云上红旗飘","alias":"","parts":[{"type":"paragraph","text":"得成效。县委提出了“农闲大搞，农忙小搞，农民开朵，商业收蹲，季节开朵，常年冶炼，分散开朵，就地冶炼”的办法，劲头很大，计划今年生产四千吨。"},{"type":"paragraph","text":"在最近举行的有六个省商业部门的同志参加的会上，把平谷县的炼铜方法当场进行了试验。办法很简单，只用十一境土坯，几十分钟就建成一座小，一点就可把矿石炼成绸境。大家看了以后得到了鼓舞，信心很高，为只要党委加强假导，按照平谷县的办法，对劳动力圣面安排，上山开朵，收购矿石，积极治炼，完全有可能在今年后串年出三万吨。"},{"type":"paragraph","text":"儿年来的酸都明：以上所逃野生植物的利用、动物的铜养、废品的收购和矿藏的开朵，都必须过初步加工，才使于大量收购、运橡、保存，才便于对城市工业作好供成。商业部门对这些分散的、小型的加工工业，必须积极举办，才有利于发展生产，扩大流通。"},{"type":"paragraph","text":"儿年来的瓣验又多次证明：怕商品积压而不积板主动地大买大卖，势必影鸣生产发与充分供应，影响经营扩大，影响国家积累。我们的基本精神是：商晶不足时，积极促进生产，一时过多，可加工保管，多方面开辟用途，或协助改制其他商品。总之，要使生产不斯发展，流通不断扩大。商业上库存物资充分的时候，国家扩大生产，扩大建股，便有了有利的条件，而生产与建改的扩大叉会克服康存一时过多的现象。"},{"type":"paragraph","text":"从以上事例中，可以充分逾混明商业工作积概主动地千方百计地支持生产是必要的，也是可能的。在当前社会主义建股事业飞跃发展时期，社会主义商业应该把这个光荣任务担负起来。商业部门应当接受各级党委的银导，各毅党委也应当加强对商业部门的导。河北徐水、无板、广东新会等县已翻取得了经职，他们派了很多的区委委员担任商店党的支部善记，大大地加强了党对商业的领导，使商业工作围稳着党的中心工作进行，这也就大大地发择了离业的作用，促进了生产，保证了供应。"},{"type":"paragraph","text":"硬石头上种五谷，为啥云上红旗飘"},{"type":"paragraph","text":"白云上面栽仙桃。"},{"type":"paragraph","text":"！社员是荒在山腰。采朵自云天密飘，"},{"type":"paragraph","text":"头顶蓝天手拿绩，"},{"type":"paragraph","text":"太阳出海大吃惊，朵朵云上红旗据，是不是天兵开了战，"},{"type":"paragraph","text":"驾着云募蒲山跑。"},{"type":"paragraph","text":"吓得虎报到处选。"},{"type":"paragraph","text":"明天要去天官，为喻云上虹旗飘？"},{"type":"paragraph","text":"夺取天河亮细烧。“要和神仙比高低！”减声冲上九重需。"},{"type":"paragraph","text":"（山东单县国歌）仔额看，仔翻瞧，"},{"type":"paragraph","text":"• 37 ·第2期"}],"authors":[],"dates":[{"year":1958}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":39,"page_end":39},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ee14f00ec6"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
