<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"河北省级和保定市级机关党员干部对苏共第二十次代表大会的反应","authors":["吴茵"],"dates":[{"year":1956,"month":3,"day":7}],"is_range_date":false,"parts":[{"text":"河北省级和保定市级机关党员干部对苏共第二十次代表大会的反应","type":"title"},{"text":"吴茵","type":"authors"},{"text":"【河北分社7日讯】河北省总工会、粮食厅、妇联及中共河北省委员会和中共保定市委员会等机关县级以上党员干部看了苏共第二十次代表大会所公布的一些文件后，引起了不少糊涂思想。其中反应最广泛的是关于集体领导问题，认为这是对斯大林的批评，如有的同志说：“看了大会文件好像这次会主要是批评斯大林的会”。大部分同志表示不服气。不少同志提出：“报告中为什么对斯大林过去的功绩只字不提？如照米高扬所说的二十年来实际上没有集体领导，那么苏联社会主义的建成和卫国战争的胜利是如何取得的?这不是矛盾了?”还有的同志怀疑“这次代表大会是否有打击别人，抬高自己的情绪。”还有的同志责问：“就说二十年来没有集体领导，也不能由斯大林同志一人负责，在他活着时也是这一伙人，为什么不提出来，到他死后才提出来批评。连苏共党史这本书，毛主席一再提出是一部发挥了马列主义的经典著作，现在也提出不够了。‘社会主义经济问题’一书是苏共中央委员会审查过的，现在又说某些论点未必对我们有帮助，未必是正确的……等，这不是专找斯大林的差”。还有说：“要说过去歌颂斯大林是个人崇拜，那么我们还编了东方红歌颂毛主席，那也能说是个人崇拜?”还有的提出：“这次代表大会是否把三年来的成绩强调得太过火了，连开垦三千顷荒地提成是不可想像的成绩，斯大林在世时也开垦了荒地。”“还说这次代表大会是列宁逝世后最重要的一次会，斯大林在世时开的会那一次不重要?建成社会主义时开的会不重要?难道说斯大林在世时开的一些会都是形式主义?”还有同志说：“即使说斯大林有错误，也应该把具体事实摆出来，才能说服人。”","type":"paragraph"},{"text":"也有少部分同志联系到贝利亚事件、南斯拉夫问题、以及马林科夫的辞职，对斯大林同志发生怀疑。如有说：“过去早就听说苏共中央对斯大林和列宁看法不一样，一直没敢说。”还有的说：“南斯拉夫问题大概就因为斯大林过分听信贝利亚的话，独断处理的结果。”“贝利亚事件如早有集体领导，就早被发现了。”“马林科夫是斯大林的亲信，是他一手培养起来的，结果上了台，不行，又下台。”这些事大概和斯大林的错误有关。也有说过去斯大林的外交政策就是太生硬，不像现在活跃。还有说：“你看这次大会的报告中，只引用马克思、列宁的话，一句斯大林的话也没引用。”所以就有同志提出，要求中央赶快作个报告，把斯大林的著作肯定一下，那些是对的，那些是错的，否则就没法引证斯大林的著作了。还有同志问今后还买不买斯大林的著作。","type":"paragraph"},{"text":"妇联有的同志认为斯大林在世时，因为有他的英明领导，没有集体领导也行了，近三年没有了斯大林，所以要特别强调集体领导。","type":"paragraph"},{"text":"另外，在南斯拉夫问题上，大家搞不清它究竟属于什么性质的国家，五十五个列席国家没有它，决议中将它单列一行。并还提出它是独特的，究竟独特在那里。还有在和平过渡形式上，大家提出议会斗争，无产阶级如何才能取得政权，难道说资产阶级会自动缴械。从法国革命的实际情况来看，这只能说明这是根本不可能的事情。","type":"paragraph"}],"comments":[],"origin":"新华通讯社编《内部参考》1956年3月7日","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1c2d3c925d"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
