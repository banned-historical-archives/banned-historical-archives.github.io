script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"赵紫阳总理同比亚总统会谈时说中国反对资产阶级自由化 决不是反对什么民主自由而是要努力发展社会主义的民主和自由","authors":[],"dates":[{"year":1987,"month":3,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社北京3月26日电　国务院总理赵紫阳今天在这里说，中国反对资产阶级自由化决不是反对什么民主和自由，而是要努力发展社会主义的民主和自由。"},{"type":"paragraph","text":"赵紫阳今天上午在人民大会堂同喀麦隆总统保罗·比亚会谈时说，“反对资产阶级自由化”一词是有其特定的严格的政治含意的。他说，“反对资产阶级自由化是为了更好更全面地贯彻执行党的十一届三中全会以来的路线，而决不意味着我们的路线和各项方针政策有任何改变。”"},{"type":"paragraph","text":"赵紫阳说，“我们总的原则是既要坚持社会主义制度，又要把各项工作搞活”，“而资产阶级自由化是要否定党的领导和社会主义制度”。"},{"type":"paragraph","text":"会谈中，赵紫阳对喀麦隆在比亚总统领导下在稳定国内政局、发展民族经济方面所取得的令人注目的成就表示钦佩。在谈到双边关系时，赵紫阳对两国友好合作关系的日益发展表示满意。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"赵紫阳","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1527dfdcaf"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
