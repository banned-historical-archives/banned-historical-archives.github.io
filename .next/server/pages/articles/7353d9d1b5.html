script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"英澳等国若干资产阶级舆论  指责杜勒斯拟制的和约  认为美制和约旨在武装日本","authors":[],"dates":[{"year":1951,"month":4,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"英澳等国若干资产阶级舆论"},{"type":"paragraph","text":"指责杜勒斯拟制的和约 　 认为美制和约旨在武装日本"},{"type":"paragraph","text":"【新华社二十一日讯】美国政府片面拟制的对日和约草案，甚至受到了英国、澳大利亚与菲律宾的若干资产阶级舆论的指责。它们指出该和约草案的目的在于武装日本，使美国获得一军事上的盟友。"},{"type":"paragraph","text":"英国曼彻斯特卫报四月三日在社论中承认：“杜勒斯政策中的真正危险是：它可能证实美国所采取的亚洲政策，主要而且显然是以军事上的考虑为根据的”。“美国的对日政策，与其说是出于宽大，还不如说是出于需要获得一个同盟国”。英国“新政治家与民族”周刊四月六日发表社论，斥责美国的对日和约草案说：“作为一项在远东缔造持久和平的方法来说，像是一个惹起祸害的东西”。该刊在论及美国在武装日本问题上所面临的困难时指出，杜勒斯本想要一个使美国能在日本及其周围保持军事基地的和约，排除中国和苏联，但是，“他的最大困难在于：日本人对于日本的重新武装以及美国在日本保留基地两事，并不大欢迎，正如德国人的情形一样；而澳大利亚人和新西兰人都惧怕美国人扶植日本，几乎和法国人惧怕美国人扶植德国一样”。四月三日，合众社伦敦记者在说明美英两国对于对日和约并无不能解决的异见时，也说，“英国认为目前的和约草案，说明美国政策是根据军事上的要求为主，需要太平洋的军事盟友”。"},{"type":"paragraph","text":"在澳大利亚，工党领袖齐佛莱及伊瓦特两人，均曾于三月底发表声明，宣布他们反对武装日本。他们认为，如果美国把日本武装起来，南太平洋可能变成日本将来的侵略目标。"},{"type":"paragraph","text":"在菲律宾，合众社马尼拉七日电引菲外交部某人士评论称：杜勒斯所拟制的和约，不像一个对战败国的和约，“简直像一个友好条约”。菲参议员奥西雅斯十三日在演说中说：美国对日和约草案的序言是用“外交辞令装璜起来的”。该草案第一章虽然简单，“但却充满了凶兆”。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7353d9d1b5"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
