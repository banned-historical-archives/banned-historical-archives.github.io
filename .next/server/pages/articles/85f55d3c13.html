script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"打倒奴隶思想","authors":["段炼"],"dates":[{"year":1967,"month":11,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新交大红卫兵师"},{"type":"paragraph","text":"山在欢呼，海在歌唱，空前伟大的无产阶级教育革命的红色风暴在全国掀起了!"},{"type":"paragraph","text":"无产阶级教育革命是我们的前人从来没有做过的极其光荣伟大的事业。等待着我们去开拓的革命征途无疑是荆棘丛生，充满了艰难险阻的。面对着这些困难，有些人蔑视它，踩着困难走，迎着阻力上。他们以毛主席的“五·七”指示为指针，联系实际，调查研究，总结经验，订出试行方案。这种敢想敢说敢闯的精神，好得很!可是也有一些人忧心忡忡地说:我们行吗?这种人的精神状态是充满了奴隶主义思想的。他们看人家有一大堆学问，自己好象什么都不行。他们向所谓“权威”、“名人”、“洋本本”叩头如捣蒜，对自己却不敢作正确的估价。其实，在这场伟大的教育革命中，革命学生最可以大显身手。因为他们是资产阶级知识分子统治着的学校中的直接受害者，最有发言权。他们最清楚旧教育制度的要害在什么地方，根子在哪里，如何着手才能把它彻底砸烂。毛主席教导我们，要打倒奴隶思想，埋葬教条主义。革命的“小人物”战胜反动的庞然大物，学问少的人打倒学问多的人，人类历史从来就是这样。无产阶级革命派应该有这样的志气:做资产阶级旧教育制度的掘墓人，当无产阶级教育制度的拓荒者，把无产阶级文化大革命进行到底。"},{"type":"paragraph","text":"诚然，在我们面前，没有一条现成的平坦大道，但是，真正的无产阶级革命派应该以自己能成为无产阶级教育革命的开路先锋和探索者而感到自豪。在工作中，我们可能会出现这样那样的缺点错误，甚至可能会有多次反复。然而，这又有什么了不起呢?吸取教训，再来就是了!“错误常常是正确的先导。”失败了，总结经验，坏事可以变为好事。干革命哪有不经过曲折、反复，不经过艰苦的调查、研究、实践而取得成功的?无产阶级革命派应该勇于做教育革命征途上的铺路石子。"},{"type":"paragraph","text":"无产阶级教育革命是无产阶级文化大革命的重要组成部分，是教育战线上一个阶级推翻一个阶级的大革命。这场斗争的成败，关系到培养无产阶级革命事业的接班人，关系到我们党和国家的前途和命运，也就是关系到无产阶级文化大革命能否进行到底。让我们迈开大步，迎上前去，为这个即将在地平线上升起的崭新的无产阶级教育制度贡献自己的力量吧!"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"教育革命","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"85f55d3c13"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
