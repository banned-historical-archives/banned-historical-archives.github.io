" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"在民盟中央及北京市委会的座谈会上的讲话摘要","authors":["中国民盟","章伯钧","钱伟长","陶大镛"],"dates":[{"year":1957,"month":6,"day":2}],"is_range_date":false,"parts":[{"text":"在民盟中央及北京市委会的座谈会上的讲话摘要","type":"title"},{"text":"中国民盟钱伟长陶大镛章伯钧","type":"authors"},{"text":"钱伟长说：“现在学生运动的特点是要找个头，如有老师领头就可出乱子。近来有些学生的家长写信给我，要我劝劝他们的子弟不要参加闹事，我曾做过，但学生的表示十分坚决，这真像'五四’前夕，和我们做学生的时代一样不接受家长的劝告。”","type":"paragraph"},{"text":"他分析知识分子最根本的问题是出路问题，学生闹事的根本原因是没有出路，他认为只有党团员和靠近党的人才有出路。人有没有出路，命运是掌握在党员手里。","type":"paragraph"},{"text":"陶大镛就师大的情况说明问题的严重性。他说：“师大党的领导问题很多，但至今不敢承认错误。师大问题比较多的是肃反问题和评薪问题。党首先应该对肃反搞错的承认错误，进行平反。”","type":"paragraph"},{"text":"“北大曾有学生来师大，要求联合罢课。”","type":"paragraph"},{"text":"“有人说现在的情形是‘五四’以来所没有的。”","type":"paragraph"},{"text":"章伯钧的插话中说：","type":"paragraph"},{"text":"“交通部在汉口的学校，学生要请愿，其他地方也有学生罢课，形势十分严重。”","type":"paragraph"},{"text":"“共产党内部问题也大，计委差不多都是党员但撤换李富春的大字报贴在李的门口，这是估计不到的”。","type":"paragraph"},{"text":"“学生上街，市民跟上去，事情就难办了。”","type":"paragraph"},{"text":"“我主张民主党派要大大的发展，至少要发展一两百万人。无党派的人都应参加组织，现在党团员有三千几百万，民主党派发展一两百万不算多。同时民主党派应该深入到县一级，这样才能真正发挥民主党派的监督作用。”","type":"paragraph"},{"text":"“知识分子不一定要入党，真的参加了，一看党内问题也不少，就会感到加入不加入没有什么不同了。”","type":"paragraph"},{"text":"“苏共二十次代表大会以后，斯大林被批判了，各国共产党员所遵循的唯一的理论和行动的教科书----苏共党史也要修改，现在已没有一个理论和实践的标准了。列宁死后有两个人，一个是南斯拉夫的铁托成为反对派，另一个是中国的毛公，他继承了列宁主义。这次整风运动，要党外的人提意见，其后果我想毛公一定是估计到的。民主党派提意见想来总是客客气气的，但估计不足；没估计到党会犯这样多的错误。现在出的问题大大超过了估计，真是'超额’完成了任务，弄得进退失措，收不好，放也不好。现在我们民盟有责任要帮助党。”","type":"paragraph"},{"text":"章伯钧提出要大家见总理、彭真、康生和李维汉。","type":"paragraph"}],"comments":[],"origin":"转引自章诒和《顺长江 水流残月》。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7b33dcd839"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
