script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"私校教员的愤怒同样为教育效力　何故遭政府歧视日用物资供应横被剥削权利","authors":[],"dates":[{"year":1947,"month":2,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编辑先生:"},{"type":"paragraph","text":"据报载由行政院核定，经国防会议通过的公教人员“日用必需物品供应办法实施细则”内规定:“所称公教人员，系指政府及所属各机关公务员工及公立学校教职员工”，这样说来，上海几千的私立学校教职员工便无权享受这权利了。"},{"type":"paragraph","text":"我们不知道政府当局凭什么理由把私校教职员工摒弃门外，是为了私校的教师从事的不是教育工作呢?还是私校肄业的学生不配作中国的国民?是私校没有存在的必要呢?还是私校对建国大业毫无贡献?"},{"type":"paragraph","text":"大家知道，这次物价暴涨，政府无法制止，而受物价影响的，不论公立或私立学校的员工，其程度是同等的。而教育第二代的工作，不论公立或私立，其性质也是同等的。教育的对象都是中华民国的儿童，其对象也是同等的。但为什么在享受权利上要有差别呢?私校教师凭那一点应遭受到歧视呢?都经政府检定合格的，为什么政府在上海绝大部份的私校都向政府立案的，绝大部份教师，管理上一点不肯对私校马虎，而在权利上却要不顾私校员工的死活了呢?况且原来本市所举办的公教人员物品配给制度，公立和私立都有份的，为何这次偏偏又把我们私校摒弃了呢?"},{"type":"paragraph","text":"我们抗议，这种不合情理的措施。"},{"type":"paragraph","text":"我们要求政府切实做到教育不分公私的诺言，私校教师应同样享受政府的补助。"},{"type":"paragraph","text":"请舆论界予以支持，并希望全市私校教师联合起来，努力争取。"},{"type":"paragraph","text":"三个私校教员施北江陶煦钱妙蓉同上二月廿二日"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f1c593aab8"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
