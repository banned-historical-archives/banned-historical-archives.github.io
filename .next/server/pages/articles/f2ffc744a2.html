script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"湖北省革委会举办省市地区革委会成员毛泽东思想学习班  提高领导成员毛泽东思想的觉悟  切实做到毛主席教导的五个统一","authors":[],"dates":[{"year":1969,"month":1,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"湖北省革委会举办省市地区革委会成员毛泽东思想学习班"},{"type":"paragraph","text":"提高领导成员毛泽东思想的觉悟"},{"type":"paragraph","text":"切实做到毛主席教导的五个统一"},{"type":"paragraph","text":"新华社武汉十九日电　湖北省革命委员会遵照伟大领袖毛主席“革命委员会要实行一元化的领导”的伟大教导，最近举办了用毛泽东思想统一认识，统一政策，统一计划，统一指挥，统一行动的毛泽东思想学习班，把领导班子的思想革命化建设提高到一个新的水平。"},{"type":"paragraph","text":"参加这期学习班的省、市、地区和有关单位革委会的成员，满怀无限忠于伟大领袖毛主席的深厚无产阶级感情，把学习班办成了活学活用毛泽东思想的生动课堂，办成了切实做到毛主席说的五个“统一”的先进样板，办成了用毛泽东思想统帅一切的坚强阵地。"},{"type":"paragraph","text":"湖北省革委会举办这期毛泽东思想学习班的主要经验是："},{"type":"paragraph","text":"一、从形势教育入手，用战"},{"type":"paragraph","text":"无不胜的毛泽东思想统一全体学"},{"type":"paragraph","text":"员的认识"},{"type":"paragraph","text":"伟大领袖毛主席深刻地指出：“当前的运动的特点是什么？它有什么规律性？如何指导这个运动？这些都是实际的问题。”“运动在发展中，又有新的东西在前头，新东西是层出不穷的。研究这个运动的全面及其发展，是我们要时刻注意的大课题。”这期学习班的学员，遵循毛主席的伟大教导，以党的八届扩大的十二中全会公报和中央两报一刊元旦社论为武器，联系全省和本地区的实际，结合自己的切身体会，大讲无产阶级文化大革命的空前大好形势，大讲毛泽东思想的伟大胜利，大讲毛主席无产阶级革命路线的伟大胜利，大讲一九六九年在我国革命和世界革命的伟大进程中的重要意义；同时，用毛泽东思想这个望远镜和显微镜，观察、分析革委会成立后阶级斗争的新动向和新问题。他们越讲，方向越明确，革命干劲越大，越是心向毛主席；越分析，头脑越清醒，对阶级斗争的形势越是看得清，越是拧成一股绳。大家无比激动地说：用毛泽东思想统一认识，是实现毛主席教导的五个“统一”的基础。只有不断地用毛泽东思想统一对形势的认识，使自己的思想跟上飞跃发展的伟大时代，才能在复杂的阶级斗争和两条路线斗争中，心明眼亮脚跟稳，永远沿着毛主席指引的方向奋勇前进。"},{"type":"paragraph","text":"二、以斗私批修为纲，大兴"},{"type":"paragraph","text":"毛主席亲自倡导的理论联系实际"},{"type":"paragraph","text":"的革命学风"},{"type":"paragraph","text":"参加这期学习班的学员认为，毛主席怎么说，我们就怎么做；以毛主席为首、林副主席为副的无产阶级司令部怎么号召，我们就怎么执行。理解的要不折不扣地照办，暂时不理解的，也要老老实实地照办，在执行过程中加深理解，而决不能另搞一套。这就是革委会用毛泽东思想实现一元化领导，实现五个“统一”的最重要的标志。而坚持这样做的过程，就是不断斗私批修，大兴言行一致、表里一致的革命作风，大破言行不一、表里不一的不良作风，对违背毛泽东思想的一切错误言行进行坚决的抵制和斗争，排除来自右的和极“左”方面的干扰的过程。因此，在学习班里，他们进一步开展了忠于毛主席，忠于毛泽东思想，忠于毛主席无产阶级革命路线的“三忠于”活动，遵照毛主席关于“我们主张积极的思想斗争”的伟大教导，以毛主席的一系列最新指示和党的八届扩大的十二中全会公报、中央两报一刊元旦社论为镜子，对照检查了自己的思想和行动，自觉地克服言行不一、表里不一的坏作风，批判反动的资产阶级的“多中心即无中心论”，狠斗自己头脑里的资产阶级“私”字，并且对叛徒、内奸、工贼刘少奇及其代理人推行的反革命修正主义路线，展开了大揭发、大批判，彻底肃清其流毒。"},{"type":"paragraph","text":"三、认真学习两条路线斗争"},{"type":"paragraph","text":"史，提高执行毛主席的各项无产"},{"type":"paragraph","text":"阶级政策的自觉性"},{"type":"paragraph","text":"学习班的学员们遵照毛主席“历史的经验值得注意”的教导，在认真学习党内两条路线斗争历史的过程中，特别注意总结执行毛主席各项无产阶级政策的经验。同时，在深入学习毛主席各项无产阶级政策的过程中，又把执行毛主席的一系列政策，提到执行、捍卫毛主席无产阶级革命路线的高度，进一步提高了自己的无产阶级政策观念。他们深有体会地说：毛主席的各项无产阶级政策，是毛主席无产阶级革命路线的具体体现。只有不断加强政策观念，才能坚持毛主席的无产阶级革命路线。"},{"type":"paragraph","text":"四、请先进典型传经，树立"},{"type":"paragraph","text":"实现五个“统一”的样板"},{"type":"paragraph","text":"为了进一步实现毛主席的“革命委员会要实行一元化的领导”这个极其重要的教导，把全省正在深入开展的斗、批、改运动推向新的高潮，湖北省革委会还邀请了红安县革委会和城关区金沙公社革委会的同志，到学习班介绍经验。他们的经验集中到一点，就是领导班子经常带着斗、批、改中的新问题，活学活用毛主席著作，同时向贫下中农请教，把活学活用毛泽东思想同集中群众中符合毛泽东思想的好经验结合起来。他们的经验，使参加学习班的各级革委会成员深受鼓舞，纷纷以他们为榜样，制定实现五个“统一”的具体措施，并且迅速化为革命实践。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"湖北文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f2ffc744a2"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
