" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji34","name":"毛泽东全集第34卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji34.pdf"],"article":{"title":"给彭石麟的信","alias":"","parts":[{"type":"paragraph","text":"给彭石麟的信"},{"type":"paragraph","text":"（1954年3月31日）石麟先生："},{"type":"paragraph","text":"一九五四年三月九日函示敬悉。尊事已托毛蕊珠?兄，我的斡旋可以不必了。我不大愿意为乡里亲友形诸荐读，间或也有，但极少。李漱清先生、文运昌兄，以此见托，我婉辞了，他们的问题是他们自己托人解决的。先生生计困难，可以告我，在费用方面，我再助先生若干，是不难的。此复，祈谅是幸。顺致敬意"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一九五四年三月三十一日"},{"type":"paragraph","text":"[1]彭石麟，大革命时期曾任湘潭县清溪乡女子职业学校校长。毛泽东在清溪乡一带从事革命活动时得到过他的帮助。"},{"type":"paragraph","text":"[2]毛蕊珠，即毛宇居，毛泽东的堂兄和少年时的私垫老师。"},{"type":"paragraph","text":"[3]李漱清，毛泽东少年时的老师，大革命时期曾协助毛泽东在广州办过《政治周报》，建国后，曾任湖南省文史研究馆馆员。"},{"type":"paragraph","text":"[4]文运昌，毛泽东的表兄。"}],"authors":["毛泽东"],"dates":[{"year":1954,"month":3,"day":31}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":62,"page_end":62},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d31cca4705"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
