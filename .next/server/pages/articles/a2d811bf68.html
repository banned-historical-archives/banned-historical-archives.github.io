script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"中共蛟河县委展开思想批判  与资产阶级划清思想界限","authors":["王恩贵　张策"],"dates":[{"year":1952,"month":5,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"中共蛟河县委展开思想批判"},{"type":"paragraph","text":"与资产阶级划清思想界限"},{"type":"paragraph","text":"编辑同志：中共蛟河县委会自从清洗了阶级异己分子殷子华以后，曾召集蛟河全党的活动分子，批判前县委会中某些成员蜕化变质的事件。经过这次思想批判，机关工作干部基本上克服了享乐思想，决心要和资产阶级思想划清界限；农村中的党员批判了不愿领导互助组的错误思想。某些曾经雇长工和放高利贷的党员并清算了自己的剥削思想。"},{"type":"paragraph","text":"县委决定在结束春耕时，在全党的基层组织中，开展有计划、有组织、有系统的思想批判工作，使蛟河县全体党员从思想上和行动上跟资产阶级划清思想界限。"},{"type":"paragraph","text":"王恩贵　张　策"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a2d811bf68"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
