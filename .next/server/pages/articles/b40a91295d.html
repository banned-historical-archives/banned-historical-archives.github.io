" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji27","name":"毛泽东全集第27卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji27.pdf"],"article":{"title":"复陈明仁电","alias":"","parts":[{"type":"paragraph","text":"复陈明仁电"},{"type":"paragraph","text":"（1949年8月13日）长沙湖南省政府陈主席明仁勋鉴："},{"type":"paragraph","text":"未文电敬悉。湖南举义，遇迩欢迎，颂云先生及贵主席领导有方，为功极大。贵主席主持之过渡时期省政机构极为必要，仍应行使职权，借维秩序，并利号召。尚望贵主席团结所属，再接再厉，弟等则嘱中共人员与颂云先生及贵主席推诚合作，以利革命事业之推进。至人民省政府之建立，当侯军事有进一步发展，并与颂云先生及贵主席商酌，然后办理，较为适宜。贵主席如有所见，尚望随时见教。"},{"type":"paragraph","text":"毛泽东朱德未元"}],"authors":["毛泽东"],"dates":[{"year":1949,"month":8,"day":13}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":130,"page_end":130},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b40a91295d"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
