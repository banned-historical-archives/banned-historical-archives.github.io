script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"上思县处理“文革”遗留问题工作会议简报第1期","authors":["会议简报组编印"],"dates":[{"year":1983,"month":6,"day":24}],"is_range_date":false,"parts":[{"text":"上思县处理“文革”遗留问题工作会议简报第1期","type":"title"},{"text":"会议简报组编印","type":"authors"},{"text":"县委召开处理“文革”遗留问题工作会议","type":"subtitle"},{"text":"认真传达上级的会议精神","type":"subtitle"},{"text":"黄西林同志作了重要讲话","type":"subtitle"},{"text":"为传达贯彻区党委处理“文革”遗留问题工作会议和地委常委扩大会议精神，把我县“文革”遗留问题处理好。县委定于6月24日至29日召开处理“文革”遗留问题工作会议。参加这次会议的有县委、县人大常委、县人民政府的领导成员，县直机关21级和副经理以上的党员干部，各公社（镇）、厂、场、矿的有关领导以及社直机关一些单位的负责人，离休、退休的老干部，共570多人。","type":"paragraph"},{"text":"区党委机构改革指导小组钦州工作组何汉民、祝世美同志也参加了会议。","type":"paragraph"},{"text":"会议头一天，由县党委常委、县委组织部部长刘瑞益同志主持。县委书记黄西林，副书记甘小华，县人大常委会副主任、县“处遗”领导小组副组长林健军同志先后介绍了自治区、地区会议的情况，传达了区党委副书记韦纯束、黄云，中央驻广西工作组组长周一锋，广州军区副司令员张序登同志在区党委工作会议上的讲话以及地委书记孙鸿泉，区党委驻钦州地区工作组组长陈任生、副组长王克，钦州军分区司令员孙家洛同志在地委常委扩大会议上的讲话；还全文照读了乔晓光同志在区党委工作会议上的再检查。","type":"paragraph"},{"text":"在传达上级会议精神后，县委书记黄西林同志就开好这次会议作了重要讲话，他强调指出，这次会议是一次历史性的会议，会议的目的就是要以三中全会以来的路线、方针、政策和六中全会决议为标准，总结、检查、回顾我县文化大革命中的问题，提高认识，分清大是大非，统一全党的思想。要认真学习会议文件，抓住重点问题，彻底批判所谓广西在“文革”中有一条正确路线的错误观点；清算“七·三”布告所造成的恶果；揭露我县在“文革”中有计划、有组织地进行大屠杀的内幕，以充分的事实来戳穿乱杀人是所谓“群众专政”的谎言；批判“杀四类分子无罪”，“奉命杀人无罪”的论调；要为我县“枯那反革命事件”和“韦（韦成勋）林（林超）黄（黄西林）文（文德坚）反革命集团”等大案要案、假案彻底平反；要坚决把在台上的“三种人”拉下来，这样才能消除不安定团结的隐患，为我县的长治久安创造条件。","type":"paragraph"},{"text":"到会同志听了县领导同志的传达和讲话后，精神极为振奋，决心集中精力开好这次会议，不辜负党和全县人民的期望。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"广西文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"13cfd3f81f"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
