script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"击退资产阶级进攻 安定上海人民生活","authors":[],"dates":[{"year":1952,"month":3,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"解放三年来，上海资产阶级对人民日常生活的进攻是很猖狂的；他们的主要进攻方法，是破坏国营公司，破坏市场管理，在市场掀风作浪，造成物价波动。"},{"type":"paragraph","text":"单以煤和米两项来讲，黑心肠的煤商在前年制造抢购风潮，威胁市民用煤，盗窃国家财产。立达煤号一家，在去年前年就造成了国家损失达十四亿九千多万元。"},{"type":"paragraph","text":"米商们以次米换公家好米，并在代销米中掺入石粉，不仅盗窃国家财产，而且严重损害人民健康。"},{"type":"paragraph","text":"二年多来，奸商们向土产公司盗窃的财产即达四十亿以上。"},{"type":"paragraph","text":"我们必须把资产阶级的进攻彻底粉碎，才能安定我们上海人民的生活。"},{"type":"paragraph","text":"\u003cIMG alt=请插入3号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1952\\03\\523u050301.JPG\"\u003e"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"74a624bc11"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
