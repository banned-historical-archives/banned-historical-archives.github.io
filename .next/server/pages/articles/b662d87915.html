<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"学习毛主席著作克服自由主义","authors":[],"dates":[{"year":1960,"month":1,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"华东师大地理系一年级第二团小组"},{"type":"paragraph","text":"自由主义是革命的无形的敌人，也是我们前进的绊脚石，要把自己培养成为一个又红又专的革命知识分子，就必须与形形式式的自由主义作彻底的决裂，用毛主席思想武装自己。"},{"type":"paragraph","text":"在我们的小组里，自由主义存在得较严重。突出表现在团结问题上，同学间闹意气，有意见不当面提，大家关心的不是集体，而是考虑个人的比较多。反映在学习上则是:有的同学在学习上，没有雄心大志，抱着“做一天和尚撞一天钟”的打算；有的同学则认为只要自己功课能获得优良成绩，符合国家要求就行了，至于别人学习得好不好，与自己无关。这并不是说，我们的思想都是存在那么大的问题，譬如说，有的时候，某一位同学在测验时吃了一个“2”分，有时旁的同学也会感到有些难过，但是由于自由主义思想在作怪，因此往往是看到后也就过去了。在我们小组中普遍存在着的问题是:认为犯一些自由主义并不是原则性的错误，因此犯一些亦无所谓。这就使得我们小组的工作不能很好开展，学习成绩悬殊也较大。"},{"type":"paragraph","text":"自党委发出了学习毛主席著作的号召以后，我们在讨论学什么时，分析了小组的情况，感到小组的主要问题是自由主义，因此决定学习毛主席的“反对自由主义”。"},{"type":"paragraph","text":"在学习“反对自由主义”过程中，我们采取了个人精读，集体讨论，联系实际，检查思想的方法。我们以毛主席列举的自由主义的十一种表现来对照自己，检查小组同学在这些方面存在的问题。要这样做，打破同学间的“面子观点”，做到心情舒畅、畅所欲言，解决思想问题就很重要，而学习毛主席“反对自由主义”则对解决这个问题有很大作用，否则，如果仍旧抱着自由主义的态度去反对自由主义，那么，自由主义的问题是始终无法得到解决的。"},{"type":"paragraph","text":"通过相互交谈，小组讨论，使大家对自由主义有了进一步认识，如过去小组长和班主席之间合作得不够好，自由主义的态度影响了小组工作的开展。小组长由于对班主席有意见，对班主席布置的一些事情，就往往没有很好贯彻；而班主席由于对小组长存在意见，因此关心小组也很差。现在大家一交谈，发现了这种自由主义态度影响了小组集体的进步，认识到错误，同学相互之间也谈得来了。又如在学习上，过去有的同学学习基础差，上课时有时听不懂，复习时效率很低，再加上自由主义态度，形成有兴趣的课专心听；对于没兴趣的课，就不专心了。认为学习上吃个“3”分就够了，有的学习得较好的同学则抱着这样的想法:你在学习上有问题不来问我，我又何必去帮助你呢?反正你学习成绩的好坏与我无关。现在大家检查了自由主义，都认识到学习是祖国对自己的要求，不能看成只是自己的事，因此，绝不能以自由主义态度对待学习。明确了这一点后，学习得马虎的同学就对自己的要求严格了，而学习得好一些的同学，也关心别人学习的好坏了。因为，我们考虑到这样一点:国家所要求的是使每一位同学都符合标准，而不是只要求自己一个人符合标准。"},{"type":"paragraph","text":"小组的坚强集体形成了，因此就出现了一片新气象，例如，我们小组里的学习也获得了丰收，大家相互帮助，还建立了专人负责帮助的办法。在最近一次地图测验中，百分之百地获得优良成绩，有位同学本来俄语很差，得过几次“2”分，这一次测验得到了“5”分。而更主要的是:在思想上初步认识到了自由主义的危害，同学间团结紧密了。有位同学说得好:“过去大家有意见不提，闷在肚子里不谈，自己也感到很苦闷，现在大家谈心了，心情也舒畅了。”"},{"type":"paragraph","text":"总之，是毛主席给了我们思想武器，帮助我们改变了我们的思想、工作与学习，今后我们一定要更好地学习毛主席的著作。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b662d87915"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
