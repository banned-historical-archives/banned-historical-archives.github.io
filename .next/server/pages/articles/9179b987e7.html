" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"右派分子既是斗争对象又是反面教师，上海三百多高级知识分子受到深刻教育","authors":["新华社"],"dates":[{"year":1957,"month":9,"day":7}],"is_range_date":false,"parts":[{"text":"右派分子既是斗争对象又是反面教师，上海三百多高级知识分子受到深刻教育","type":"title"},{"text":"新华社","type":"authors"},{"text":"新华社上海７日电: 上海市三百多位高级知识分子和社会人士，在政协上海市委员会举行的座谈会上受到了一次深刻的社会主义教育。","type":"paragraph"},{"text":"这次座谈会是和上海市第二届人民代表大会第二次会议同时召开的，从８月１６日到９月５日举行了二十天。","type":"paragraph"},{"text":"座谈会上，科学家、艺术家、教授、医师们在会上摆出大量亲手所做、亲眼所见、亲耳所闻的事实，粉碎了右派分子王恒守、姜庆湘、杨荫溥、陈子展和潘序伦的反动言论。会上还系统地揭露和批判了罗隆基的亲信孙斯鸣和另一个右派分子薛映辉的丑恶面目。","type":"paragraph"},{"text":"这次座谈会的重要特点，是既把右派分子当做说理斗争的对象，又真正做到了把右派分子作为反面教师来教育自己。会上对每一个右派分子，都从他的反动言行中归纳出几个有关两条道路斗争的主要问题，一个个地摆事实、讲道理，逐步深入地展开大辩论。辩论中允许右派分子随时申辩，自由发表他们的意见。这样，就使问题愈辩愈深，真理愈辩愈明，大家的斗争热情也愈来愈高。复旦大学教授吴斐丹、陈传璋都说：听了右派分子王恒守关于反共言行的检查，想到解放以前茶馆、酒楼都贴着“莫谈国事”的字条。假使王恒守那时对国民党政府说了象现在这样多的敌对的话，他早已被捕甚至杀头了。今天王恒守讲了举不胜举的反共言论，我们都还同他摆事实、说道理，这不能不说明我们民主制度的优越性。六十七岁的老音乐家黎锦辉把参加这次斗争比作胜读一年书。他说他过去关心政治不够，以后要提高政治嗅觉。著名的中医石筱山，戏曲演员傅全香、王文娟和石筱英等人表示一定要加强政治思想锻炼，站稳立场，不能不问政治。华东师范大学数学教授李锐夫也表示一个人不能离开政治，他说：“我不问政治，政治要问我的。”","type":"paragraph"},{"text":"这次座谈会在同右派分子展开说理斗争之前，出席的委员和列席人员一起热烈地讨论了反右派斗争的性质、中间分子与右派分子的界限、反右派斗争和整风的关系等问题，批判和澄清了“中间路线”、“不问政治”、“言多必失”等许多错误思想，大大提高了他们参加斗争的积极性。","type":"paragraph"},{"text":" ——原载《人民日报》1957年9月8日。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9179b987e7"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
