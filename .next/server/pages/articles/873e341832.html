" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji15","name":"毛泽东全集第15卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji15.pdf"],"article":{"title":"致叶挺、项英等电","alias":"","parts":[{"type":"paragraph","text":"致叶挺、项英等电!"},{"type":"paragraph","text":"（1940年10月13日）"},{"type":"paragraph","text":"为对付日寇进攻，为巩固国内团结，华中磨擦在韩进攻失败后，应设法暂时缓和一下，采取完全自卫的方针。苏北韩失败后，我应加紧开展地方工作，建立抗日民主政权，扩大与整训自己的部队，对韩不应进攻，而应在韩再向我进攻时，各个反攻击破之，否则会妨碍我在重庆之统一战线工作。但胡服建议控制旧黄河以南阜宁一带战略要地，是必要的，可执行。对李品仙应力求和解，这是有关桂系与我们的整个关系。[1]这是毛泽东和朱德、王稼祥关于韩德勤进攻失败后华中的工作方针"}],"authors":["毛泽东"],"dates":[{"year":1940,"month":10,"day":13}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":151,"page_end":151},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"873e341832"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
