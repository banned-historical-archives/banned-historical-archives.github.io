script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共中央关于停止整党学习全力转入“三反”运动的指示","authors":[],"dates":[{"year":1951,"month":12,"day":26}],"is_range_date":false,"parts":[{"text":"中共中央关于停止整党学习全力转入“三反”运动的指示","type":"title"},{"text":"各中央局：","type":"appellation"},{"text":"据新华社西南总分社十二月二十二日内部情况报道说：“西南区已停止了原订计划的整党学习，全力转入反贪污、反浪费、反官僚主义的整风运动。西南局、西南军政委员会和西南军区均已开过党代表会议。川东、川西、川北、川南、西康及重庆市已作了一般号召，其他各地也将进入动员阶段。西南贪污浪费现象相当严重，据近来初步发现的材料：工业部约八百亿元，其中萧子言和陈松柏两大贪污案即达二百亿元；财政部初步检查为三百亿元，其中以粮食局系统最严重。川西粮食局贪污分子勾结奸商，将粮食支付书偷去给","type":"paragraph"},{"text":"奸商到各库取粮，损失公粮十万斤。川北财政厅金库被贪污分子盗走一箱人民币，贪污分子还留一字条说：‘我生活困难，暂先支借一下’。建筑中的贪污浪费最普遍，据初步了解已达数百亿元。交通系统贪污浪费约五百亿元”等语。中央认为西南局停止原订整党学习计划，全力转入反贪污、反浪费、反官僚主义的整风运动，是完全正确的，请各中央局也照这样做。","type":"paragraph"},{"text":" 中  央十二月二十六日","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"52b4e434a0"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
