" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji28","name":"毛泽东全集第28卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji28.pdf"],"article":{"title":"由西南局担负进军西藏和经营西藏的任务","alias":"","parts":[{"type":"paragraph","text":"由西南局担负进军西藏和经营西藏的任务"},{"type":"paragraph","text":"（1950年1月2日）中央、德怀同志，并请转发小平、伯承、贺龙三同志："},{"type":"paragraph","text":"（一）德怀同志十二月三十日关于西藏情况及入藏路线的电报业已收到阅悉。此电请中央转发刘、邓、贺三同志研究。（二）西藏人口虽不多，但国际地位极重要，我们必须占领，并改造为人民民主的西藏。由青海及新疆向西藏进军，既有很大困难，则向西藏进军及经营西藏的任务应确定由西南局担负。（三）既然由西北入藏每年只有五月中旬至九月中旬共四个月时间可以通行，其余八个月大雪封路，不能通行，则由西康3入藏之时间恐亦相同。而如果今年五月中旬至九月中旬不向西藏进军，则须推迟至一九五一年才能进军。我意如果没有不可克服的困难，应当争取于今年五月中旬开始"},{"type":"paragraph","text":"[1]德怀，即彭德怀，当时任中共中央西北局第一书记、中国人民解放军第一野战军司令员、西北军区司令员。"},{"type":"paragraph","text":"[2]小平，即邓小平，当时任中共中央西南局第一书记、中国人民解放军第二野战军政治委员、西南军区政治委员。伯承，即刘伯承，当时任中共中央西南局第二书记、中国人民解放军第二野战军司令员。贺龙，当时任中共中央西南局第三书记、中国人民解放军西南军区司令员。"},{"type":"paragraph","text":"[3]西康，即西康省，1955年撤销，原辖区划归四川省。"},{"type":"paragraph","text":"由西南局担负进军西藏和经营西藏的任务向西藏进军，于十月以前占领全藏。为此，建议：（甲）请刘、邓、贺三同志于最近期内（例如一月中旬）会商一次，决定入藏的部队及领导经营西藏的负责干部等项问题，并立即开始布置一切；（乙）迅即占领打箭炉\"，以此为基地筹划入藏事宜；（丙）由现在（一月上旬）至五月中旬以前共四个半月内，被指定入藏的军队，应争取由打箭炉分两路，推进至西康、西藏的接境地区，修好汽车路或大车路，准备于五月中旬开始入藏；（丁）收集藏民，训练干部；（戊）闻西藏只有六千军队，而且是分散的，似乎不需要我在上次电报中提议的三个军，而只需要一个充足的军或四个师共约四万人左右的兵力，即已够用，惟需加以特殊政治训练，配备精良武器；（己）入藏军队可定为三年一换，以励士气。（四）进军及经营西藏是我党光荣而艰苦的任务。西南刚才占领，西南局诸同志工作极忙，现又给以入藏任务，但因任务重要，且有时间性，敌作如上建议。这些建议是否可行，请西南局筹划电复为盼。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一月二日上午四时于远方[1]打箭炉，今四川省康定县。"}],"authors":["毛泽东"],"dates":[{"year":1950,"month":1,"day":2}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":140,"page_end":141},"tags":[{"name":"贺龙","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]},{"id":"wenji6","type":"pdf","name":"毛泽东文集第六卷（1999）","internal":false,"official":true,"author":"中央文献研究室","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/wenji6.pdf"],"article":{"title":"由西南局担负进军西藏和经营西藏的任务","description":"根据手稿刊印。","dates":[{"year":1950,"month":1,"day":2}],"parts":[{"text":"由西南局担负进军西藏和经营西藏的任务","type":"title"},{"type":"paragraph","text":"中央、德怀同志，并请转发小平、伯承、贺龙三同志："},{"type":"paragraph","text":"（一）德怀同志十二月三十日关于西藏情况及入藏路线的电报业已收到阅悉。此电请中央转发刘、邓、贺三同志研究。（二）西藏人口虽不多，但国际地位极重要，我们必须占领，并改造为人民民主的西藏。由青海及新疆向西藏进军，既有很大困难，则向西藏进军及经营西藏的任务应确定由西南局担负。（三）既然由西北入藏每年只有五月中旬至九月中旬共四个月时间可以通行，其余八个月大雪封路，不能通行，则由西康入藏之时间恐亦相同。而如果今年五月中旬至九月中旬不向西藏进军，则须推迟至一九五一年才能进军。我意如果没有不可克服的困难，应当争取于今年五月中旬开始向西藏进军，于十月以前占领全藏。为此，建议：（甲）请刘、邓、贺三同志于最近期内（例如一月中旬）会商一次，决定入藏的部队及领导经营西藏的负责干部等项问题，并立即开始布置一切；（乙）迅即占领打箭炉，以此为基地筹划入藏事宜；（丙）由现在（一月上旬）至五月中旬以前共四个半月内，被指定入藏的军队，应争取由打箭炉分两路，推进至西康、西藏的接境地区，修好汽车路或大车路，准备于五月中旬开始入藏；（丁）收集藏民，训练干部；（戊）闻西藏只有六千军队，而且是分散的，似乎不需要我在上次电报中提议的三个军，而只需要一个充足的军或四个师共约四万人左右的兵力，即已够用，惟需加以特殊政治训练，配备精良武器；（己）入藏军队可定为三年一换，以励士气。（四）进军及经营西藏是我党光荣而艰苦的任务。西南刚才占领，西南局诸同志工作极忙，现又给以入藏任务，但因任务重要，且有时间性，故作如上建议。这些建议是否可行，请西南局筹划电复为盼。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一月二日上午四时于远方"}],"comment_pivots":[{"part_idx":1,"offset":5,"index":1},{"part_idx":1,"offset":20,"index":2},{"part_idx":2,"offset":187,"index":3},{"part_idx":2,"offset":356,"index":4}],"is_range_date":false,"authors":["毛泽东"],"comments":["德怀，即彭德怀，当时任中共中央西北局第一书记、中国人民解放军第一野战军司令员、西北军区司令员。","小平，即邓小平，当时任中共中央西南局第一书记、中国人民解放军第二野战军政治委员、西南军区政治委员。伯承，即刘伯承，当时任中共中央西南局第二书记、中国人民解放军第二野战军司令员。贺龙，当时任中共中央西南局第三书记、中国人民解放军西南军区司令员。","西康，即西康省，一九五五年撤销，原辖区划归四川省。","打箭炉，今四川康定县。"],"page_start":50,"page_end":51,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3f28cd84d6"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
