script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"抗议垄断资本剥削　要求增加工资  日本丹麦工人举行示威和罢工  意大利上万群众举行示威抗议法西斯分子暴行","authors":[],"dates":[{"year":1974,"month":2,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"抗议垄断资本剥削　要求增加工资"},{"type":"paragraph","text":"日本丹麦工人举行示威和罢工"},{"type":"paragraph","text":"意大利上万群众举行示威抗议法西斯分子暴行"},{"type":"paragraph","text":"新华社一九七四年二月十四日讯　据东方通讯社报道，大约一万五千名日本工人、公用事业雇员和教师二月十三日晚上在东京集会和示威游行，强烈抗议通货膨胀和垄断资本的投机行为，并且要求增加工资。"},{"type":"paragraph","text":"集会上通过了一项决议，强烈谴责垄断资本家囤积居奇，哄抬物价，牟取暴利，表示要为提高工资和保障生活权利而斗争。"},{"type":"paragraph","text":"集会以后，工人们举着红旗和标语牌，高呼口号，在市中心举行了示威游行。"},{"type":"paragraph","text":"在这一天下午，有一千多名工人也集会，抗议垄断资本家剥削工人和利用石油危机牟取暴利。"},{"type":"paragraph","text":"新华社斯德哥尔摩一九七四年二月十三日电据丹麦报纸报道，二月十一日丹麦奥尔堡市有两万名工人举行罢工，并且举行示威游行和集会，愤怒抗议司法当局维护外国垄断资本的利益，对工人进行迫害。"},{"type":"paragraph","text":"一九七三年一月，美国电子计算机垄断资本霍普计算机公司在丹麦哈松的子公司的六名工人和一名工会负责人，由于参加对这家公司拒绝同工会签订新的工资合同而举行的抗议示威，受到法院无理审判。在今年二月十一日奥尔堡法院开庭审判的这天，这个城市的两万名工人举行示威游行和集会，抗议司法当局维护外国垄断资本利益迫害他们的阶级兄弟。"},{"type":"paragraph","text":"参加抗议活动的还有来自丹麦全国各地四、五百个工会组织的代表。"},{"type":"paragraph","text":"游行队伍分三路浩浩荡荡穿过奥尔堡的大街。游行后举行的抗议集会通过声明，要求无条件释放被告工人，表示广大工人决不容忍迫害工人和压制工会活动。声明还要求当局对外国垄断资本进行控制。"},{"type":"paragraph","text":"丹麦许多工厂的工人纷纷罢工声援这一抗议行动。抗议集会收到来自各地的几百份电报、信件和声明，表示支持和同情受迫害的工人。"},{"type":"paragraph","text":"新华社罗马一九七四年二月十二日电　意大利都灵市上万群众二月十一日举行示威，抗议法西斯分子的暴行。"},{"type":"paragraph","text":"九日下午，法西斯分子向都灵的一个游击队员协会所在地扔了一枚炸弹。法西斯分子的暴行激起了群众的愤怒。"},{"type":"paragraph","text":"参加这次示威的有工人和其他各界代表。示威群众还举行了集会。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"db7c955315"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
