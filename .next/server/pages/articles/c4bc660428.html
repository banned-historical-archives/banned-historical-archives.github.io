script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"浙江省捕获大贪污犯四十八名  许多干部右倾思想开始转变","authors":[],"dates":[{"year":1952,"month":2,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"浙江省捕获大贪污犯四十八名"},{"type":"paragraph","text":"许多干部右倾思想开始转变"},{"type":"paragraph","text":"【本报讯】浙江省各地反贪污斗争正在胜利进行。截至二月五日止，全省已捉到贪污一亿元以上的大贪污犯四十八名。另有贪污一千万元以上的贪污分子三百十九名已被检举或自动坦白了罪行。在捕获的四十八名大贪污犯中，省级机关有二十五名，嘉兴专区六名，宁波专区（包括宁波市）六名，衢州专区一名，温州专区一名，金华专区二名，临安专区五名，绍兴市及绍兴县共二名。"},{"type":"paragraph","text":"这些贪污犯盗窃国家资财的非法行为，已使国家经济遭受严重损失，同时说明了资产阶级两年多来的进攻是十分猖狂的。如安吉县人民政府工商科副科长董芝祥，在奸商引诱下，两年内贪污、受贿达二十一次，总数在人民币一亿七千万元以上，实际上已变为资产阶级在国家机关里的代理人。奸商黄茂松等通过董芝祥盗取了木材运销许可证，明目张胆地破坏森林，从他们手里运销出去的木材即有二、三千两码子（每两码子值六十万元）。又如中国煤业建筑器材公司丽水支公司的大贪污犯余志高，原是个投机木商，竟混入该公司充当业务科长。现查出仅在半年内以他为主的一个贪污集团便盗卖了木材达四亿三千万元之巨。"},{"type":"paragraph","text":"浙江省级机关和各专区在围剿贪污犯的斗争开始时，许多干部曾有麻痹情绪。如有的认为本单位不会有“老虎”。有些专区以下的机关，则以为本单位不是高级机关，不在大城市，也不会有“老虎”，或者以为即使有“老虎”，也不会有“大老虎”。但在过去十多天紧张的打“老虎”斗争中，这种麻痹情绪已受到事实的严格批判，许多干部在认识上已开始转变。但也有某些单位在取得了初步胜利后，便自满起来，认为“差不多”了；另外有些单位则在这一斗争中表现了畏难情绪，以致战果不大。这些想法都是错误的。事实证明：只要领导同志头脑清醒，有决心，并能充分发动群众，深入细致地组织检查，就一定能彻底捉尽“大老虎”。"},{"type":"paragraph","text":"（浙江日报消息）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c4bc660428"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
