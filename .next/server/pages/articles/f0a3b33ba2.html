script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"以毛主席最新指示为武器坚持教育革命","authors":[],"dates":[{"year":1968,"month":7,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"复旦大学物理二系革命委员会"},{"type":"paragraph","text":"在夺取无产阶级文化大革命全面胜利的凯歌声中，伟大领袖毛主席向我们发出了伟大的号召:“大学还是要办的，我这里主要说的是理工科大学还要办，但学制要缩短，教育要革命，要无产阶级政治挂帅，走上海机床厂从工人中培养技术人员的道路。要从有实践经验的工人农民中间选拔学生，到学校学几年以后，又回到生产实践中去。”毛主席的最新指示是彻底摧毁资产阶级和一切剥削阶级教育制度的进军号，是将无产阶级教育革命进行到底的伟大纲领。它开创了工农兵直接掌握无产阶级教育大权的崭新时代，是反修、防修、培养无产阶级可靠接班人的百年大计。毛主席最新指示的发表，预示着无产阶级教育革命全面高涨的光辉日子就在眼前，我们要在伟大领袖毛主席的亲自统帅下，彻底批判资产阶级和一切剥削制度，荡涤旧世界的一切污泥浊水，创造出人类历史上前所未有的光辉的无产阶级教育制度。这是我们毛泽东时代青年一代最大的幸福和骄傲。"},{"type":"paragraph","text":"前一阶段，我们系结合教改以班组、宿舍为单位批判中国赫鲁晓夫的“智育第一”“读书做官”等反动谬论，大大激发了师生教育革命的热情。我们还采取“走出去，请进来”的办法，和工人、贫下中农一起进行批判，在战斗中学习他们的坚定立场和崇高品质，进一步认识到“卑贱者最聪明!高老者最愚蠢”这个颠扑不破的真理。我们要大声宣告:工人、贫下中农就是要登上无产阶级教育的课堂，青年学生就是要坚决走一辈子同工农相结合的道路。"},{"type":"paragraph","text":"毛主席挥手我前进。毛主席的最新指示，是推动千百万革命群众投入斗批改的强大思想动力。我们决心向北京、上海的工人阶级，向贫下中农学习，坚决走毛主席所指引的道路，更深入持久地开展对中国赫鲁晓夫修正主义教育路线的批判，粉碎一切阶级敌人从极“左”或有的方面进行干扰的阴谋。万难不屈，百折不回，为贯彻毛主席的革命路线奋斗终生，誓将无产阶级翻天覆地的教育革命进行到底。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"教育革命","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f0a3b33ba2"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
