<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"以毛泽东思想指导科学研究","authors":["张攸民"],"dates":[{"year":1966,"month":1,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"一机部汽轮机锅炉研究所燃气轮机研究室主任　张攸民"},{"type":"paragraph","text":"在我国伟大的第三个五年计划的第一年，我们面临着赶上和超过世界先进水平的战斗任务。我们汽轮机锅炉研究人员充满着信心，向着先进目标冲击。"},{"type":"paragraph","text":"新中国的汽轮机锅炉事业，是在空白的基地上从无到有地搞起来的。一九五五年，我们在外力援助下制成了第一台六千瓩的汽轮发电机组。短短的几年以后，我们就自制了五万瓩汽轮机，并投入生产运转；世界上的先进技术——燃气轮机，我们也设计制造了六千瓩的机组。虽然，总的来说，我们这方面的技术还比较落后，但从走过的路来看，我们的步子还是比国外快得多。国外从一九三九年试制成第一台燃气轮机到今天已经二十多年了，我们却能在短短的几年中，很快就掌握这一新技术。这样看来，我们完全有可能在短期内迅速赶上并超过世界先进水平。"},{"type":"paragraph","text":"赶、超世界先进水平，对我们知识分子来说，最重要的是破除各种迷信，勇于去闯、敢于摸“老虎屁股”、敢于冒“风险”。一九六四年，我们参加了设计和制造一千五百瓩燃气轮机组的工作。当时，我们思想上迷信、框框比较多，把燃气轮机看得很神秘，这也不敢动，那也不敢碰。机器总装后试车时，燃烧室的火还是烧不好，我们翻书本、查资料，因为跳不出框框，束手无策。后来，发动群众一起动手，大胆地改变了燃烧室的结构，效果很好。这一来，对我们教育很大，燃气轮机并不象“本本”上讲的那么神圣不可侵犯，是可以改动的，我们的胆子大了。在以后设计更大功率的机组时，敢于去摸摸弄弄了，结果，本来认为困难的问题倒反变得好解决了。最近，我们设计的一千瓩燃气轮机，难度更大些，我们却以比常规提高两倍的速度完成了任务，在某些性能指标方面达到了世界水平。"},{"type":"paragraph","text":"在第三个五年计划期间，我们的任务是要突破大功率发电机组制造中的一系列技术关键，迎头赶上先进水平。这方面，我们有许多优越的条件:有党的正确领导，有厂、所、校大协作，有“三结合”群众路线，这些都是资本主义国家做不到的，有了这些优越条件，加上我们搞技术的人的思想革命化，我们就可以无往不胜。我决心努力学习毛主席思想，用以指导科学技术工作，积极投身到赶、超世界先进水平的斗争中去!"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"革命三结合","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d67317d181"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
