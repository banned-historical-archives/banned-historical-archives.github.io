script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"阿劳动青年联盟“四大”开幕霍查、谢胡、列希出席中国青年代表团和世界青联等应邀参加　卢鲍尼亚报告指出阿青年站在建设、反帝、反修正主义斗争前列","authors":[],"dates":[{"year":1961,"month":11,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社地拉那24日电】　阿尔巴尼亚劳动青年联盟第四次代表大会23日在地拉那开幕。"},{"type":"paragraph","text":"劳动党中央第一书记霍查、政治局委员、部长会议主席谢胡和人民议会主席团主席列希都出席了开幕式。出席代表大会的有来自全国各地的六百多名优秀青年代表。"},{"type":"paragraph","text":"应邀前来参加代表大会的有，世界民主青年联盟书记处和国际学生联合会书记处的代表，以中国共产主义青年团中央书记处书记梁步庭为首的中国青年代表团。"},{"type":"paragraph","text":"阿尔巴尼亚劳动青年联盟中央委员会第一书记卢鲍尼亚在会上作了关于劳动青年联盟中央委员会的工作和青年为建成社会主义而斗争的任务的报告。他说:我们的代表大会是在重要的历史时刻召开的:我国人民正在劳动党的领导下为建成社会主义社会忘我地进行劳动，克服前进中的困难，同以美国为首的帝国主义和南斯拉夫修正主义者的攻击进行斗争。我们青年在劳动党的领导下，站在这一斗争的最前列。"},{"type":"paragraph","text":"卢鲍尼亚指出，阿尔巴尼亚青年和劳动青年联盟支持劳动党和政府的和平政策。他说:“我们感到自豪的是，由于我们党和政府进行保卫和平、争取和平共处和反对美帝国主义的战争政策的坚决斗争，阿尔巴尼亚在国际舞台上的地位愈加巩固了。我们党以和平、友好和无产阶级国际主义的精神教育青年。我们青年一贯保持着和社会主义各国青年的兄弟般的友好联系。”"},{"type":"paragraph","text":"他说，阿尔巴尼亚青年将继续在反对帝国主义、争取和平、民族独立、民主和社会主义的斗争中作出贡献。他说，阿尔巴尼亚新的一代特继续以自己的热情乃至生命献给党的马克思列宁主义路线，这一路线的制订者是以恩维尔·霍查为首的中央委员会。他说，劳动青年联盟和阿尔巴尼亚青年将永远和党站在一起，继续进行反对帝国主义和各色各样的修正主义的斗争。"},{"type":"paragraph","text":"卢鲍尼亚说，阿尔巴尼亚青年站在争取提前完成五年计划的斗争的前列。青年们发起了社会主义劳动队竞赛，已有一万二千多名青年参加了这个竞赛。青年们还发起了以四年半时间完成五年计划的竞赛，以及其他增产节约的倡议。为了迎接这次代表大会，全国青年创造了增产节约二亿七千万里克(阿币)的成绩。"},{"type":"paragraph","text":"代表大会将举行三天。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"谢胡","type":"人物"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0fe1752d76"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
