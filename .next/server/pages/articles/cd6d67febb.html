script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"廖承志在纪念“非洲自由日”招待会上再次重申中国坚决支持越南人民抗击美帝坚决反对美帝带头、由现代修正主义分子帮腔出卖越南人民的“和谈”阴谋","authors":[],"dates":[{"year":1965,"month":4,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京14日电　中国亚非团结委.员会主席廖承志今晚在首都各界纪念“非洲自由日”的招待会上指出，亚非各国人民全力支持越南人民的抗美救国斗争也就是为了自己的斗争，亚非人民反对美帝国主义的斗争是共同的和不可分割的。"},{"type":"paragraph","text":"廖承志再次重申:六亿五千万中国人民坚决支持越南人民把美帝国主义从越南彻底赶走，解放南方、保卫北方、统一祖国的神圣斗争。中国人民决心给南越人民一切必要的包括武器在内的物资支援，并且当南越人民需要时将派出自己的人员同南越人民共同战斗。"},{"type":"paragraph","text":"廖承志着重表示，中国人民坚决反对美帝国主义带头、由现代修正主义分子帮腔出卖越南人民的“和平谈判”阴谋。他指出，越南南方人民已经打败了美帝国主义的特种战争。美帝国主义对越南北方的军事挑衅和战争讹诈已经破产了。美帝国主义不管再要什么花招，也无法挽救它已经注定的失败。"},{"type":"paragraph","text":"在这个有六十多位非洲各国朋友应邀参加的招待会上，廖承志热烈地赞扬了越南人民伟大的革命精神和战斗精神。他说，越南人民的抗美救国斗争牵制了美帝国主义的力量，打击了它的侵略气焰，减轻了它对亚非其他国家的侵略压力，这就大大地支援了亚非各国人民的斗争。"},{"type":"paragraph","text":"他在讲话中还强烈谴责美帝国主义野蛮镇压刚果(利)人民的民族解放运动，公然勾结西德军国主义加紧武装以色列。他说，中国人民坚决支持刚果人民、阿拉伯人民、安哥拉人民、葡属几内亚人民、津巴布韦人民、莫三鼻给人民、斯威士兰人民、南非人民以及全体非洲人民的正义斗争，坚决支持世界上一切被压迫民族和人民的解放斗争。"},{"type":"paragraph","text":"廖承志表示深信，觉醒的战斗的非洲是一定会得到胜利的。一个没有帝国主义和新老殖民主义的、独立自主的新非洲是一定要出现的。"},{"type":"paragraph","text":"正在北京访问的斯威士兰进步党主席恩古摩也在招待会上讲话。他在讲话中向越南、塞浦路斯、刚果、中东和巴勒斯坦人民的英勇斗争致敬，并且表示将尽其所能给予他们一切支援。"},{"type":"paragraph","text":"他说，为了对付敌人的挑战，我们都应该作出最大的牺牲，无所畏惧地面对人类的敌人，无论他们是在非洲、亚洲或拉丁美洲。他说，所有革命力量都必须努力奋斗，坚定勇敢地保卫他们的主权，直到流尽最后一滴血；必须继续不断地进行斗争，直到帝国主义豺狼被消灭。"},{"type":"paragraph","text":"他还提醒非洲新兴国家谨防所谓“经济援助”这一最狡猾敌人的渗透，希望这些国家进行毫不留情的斗争，直到把帝国主义粉碎和埋葬。"},{"type":"paragraph","text":"今晚的招待会是由中国亚非团结委员会和中国非洲人民友好协会举办的。这两个单位和首都各个全国性人民团体的负责人，都出席招待会同非洲各国朋友欢聚。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"廖承志","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cd6d67febb"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
