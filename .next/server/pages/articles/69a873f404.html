script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"加强敌情观念反对右倾翻案妖风","authors":[],"dates":[{"year":1968,"month":4,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"加强敌情观念反对右倾翻案妖风"},{"type":"paragraph","text":"伟大领袖毛主席深刻地指出：无产阶级文化大革命，实质上是在社会主义条件下，无产阶级反对资产阶级和一切剥削阶级的政治大革命，是中国共产党及其领导下的广大革命人民群众和国民党反动派长期斗争的继续，是无产阶级和资产阶级阶级斗争的继续。"},{"type":"paragraph","text":"毛主席最新指示的发表，更加激励了我省广大无产阶级革命派的革命斗志，在当前尖锐、复杂的阶级斗争中，更加心明眼亮，精神抖擞。我们一定要积极响应毛主席的伟大战斗号令，高举毛泽东思想伟大红旗，坚定不移地站在毛主席的无产阶级革命路线上，牢牢掌握斗争的大方向，对准阶级敌人发动猛烈的持久的进攻，把无产阶级文化大革命进行到底。"},{"type":"paragraph","text":"响应毛主席的伟大战斗号令，就要深入地持久地开展革命的大批判，把以中国赫鲁晓夫为首的党内最大的一小撮走资派及其在湖南的代理人王延春之流的反革命罪行和资产阶级反动路线，揭深揭透，批倒批臭，彻底肃清他们在各个领域中散布的流毒。"},{"type":"paragraph","text":"响应毛主席的伟大战斗号令，就要坚决有力地迎头痛击右倾翻案的妖风。要提高广大群众阶级斗争和路线斗争的觉悟。阶级敌人要翻案，我们就要给他们来一个群众性的大定案。阶级敌人要复辟，我们就要来一个群众性的反复辟。把他们打翻在地，再踏上一只脚，叫他们永世不得翻身。"},{"type":"paragraph","text":"响应毛主席的伟大战斗号令，就要加强敌情观念，擦亮眼睛，善于辨别那些伪装拥护革命而实际反对革命的分子，彻底粉碎他们动摇和分裂以毛主席为首的无产阶级司令部的一切罪恶阴谋。"},{"type":"paragraph","text":"响应毛主席的伟大战斗号令，就要认真学习伟大领袖毛主席关于正确区分两类不同性质矛盾的教导，要善于区分敌我矛盾和人民内部矛盾。对敌人要打得准，打得狠，打得稳。对自己人，对犯了错误的革命同志，不论是革命群众或者革命的领导干部，都要帮助他们整风，惩前毖后，治病救人。"},{"type":"paragraph","text":"要向阶级敌人发动猛烈攻击，就必须坚决反对右倾保守主义。不反对右倾保守主义，就不可能坚定地站在毛主席的革命路线上，就不可能正确地区分敌、我、友，就会给阶级敌人的右倾翻案和右倾分裂的罪恶阴谋以得逞之机，就是向阶级敌人投降。因此，紧密结合当前阶级斗争的实际，努力学习和深刻领会毛主席的这一最新指示，坚决反对右倾保守主义，是能否取得这场对敌斗争胜利的关键。"},{"type":"paragraph","text":"在毛主席最新指示的指引下，无产阶级革命派立即行动起来，向阶级敌人猛烈开火！开火！！"},{"type":"paragraph","text":"《湖南日报》四月十一日社论"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"湖南文革","type":"人物"},{"name":"人民内部矛盾","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"69a873f404"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
