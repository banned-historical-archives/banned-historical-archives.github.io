script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"加强工人阶级团结　摆脱帝国主义剥削智利统一工会举行全国代表大会我代表发言坚信智利人民斗争定能取得胜利","authors":[],"dates":[{"year":1962,"month":8,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社圣地亚哥1日电】　智利工人统一工会第三次全国代表大会今天晚上在智利首都的考波利康剧院隆重开幕。"},{"type":"paragraph","text":"参加代表大会的有来自全国各地的二千三百名代表，其中包括一百名农民代表。应邀参加大会的有中国、苏联、古巴、朝鲜民主主义人民共和国、越南民主共和国等十一个国家的工会代表。"},{"type":"paragraph","text":"智利工人统一工会总书记路易斯·菲格罗亚、智利铜矿工人联合会组织委员会主席曼努埃尔·奥瓦列在代表大会上讲了话。奥瓦列说，这次代表大会将实现工人阶级的团结，从而有利于在智利进行各种根本改革和结束帝国主义的剥削。"},{"type":"paragraph","text":"世界工会联合会的代表埃德温·克勒包姆代表这个工会组织的一亿二千万会员向大会表示了祝贺。"},{"type":"paragraph","text":"代表拉丁美洲各个代表团在会上讲话的古巴工会领导人福斯蒂诺·卡尔西内斯号召拉丁美洲的工人阶级团结起来，打垮他们的共同敌人美帝国主义。"},{"type":"paragraph","text":"中国工会代表团团长唐章代表亚洲各个工会代表团在会上讲话说，亚洲各个工会代表团相信，这次代表大会将是一次团结和胜利的代表大会，它将对智利工人运动的发展作出巨大的贡献。他在谈到智利人民争取独立的斗争传统时说，这一传统现在体现为智利人民反对帝国主义控制和掠夺的斗争。他表示相信，智利人民将用自己的双手来掌握自己的命运；智利工人阶级将在斗争中取得成就。"},{"type":"paragraph","text":"捷克斯洛伐克工会领导人约瑟夫·拉维卡代表欧洲的各工会代表团在会上讲了话。"},{"type":"paragraph","text":"这些外国来宾受到与会代表的热烈欢迎。当古巴代表发表讲话时，全场高呼“要古巴，不要美国佬”达数分钟之久。在中国工会代表团进入会场和发表讲话时，到会代表高呼:“毛泽东万岁!中华人民共和国万岁!”"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"03331c8623"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
