script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"过去的奴隶今天成为国家主人  拉萨各族选民第一次参加普选","authors":[],"dates":[{"year":1962,"month":12,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"过去的奴隶今天成为国家主人"},{"type":"paragraph","text":"拉萨各族选民第一次参加普选"},{"type":"paragraph","text":"据新华社拉萨1日电　拉萨市各居民区最近相继展开基层选举，藏、汉、回族选民们欢天喜地地参加投票，选举拉萨市城关区第一届人民代表大会代表。"},{"type":"paragraph","text":"这是拉萨市历史上第一次进行普选。在民主改革后获得翻身的居民们，都把这次选举看成是自己的又一件大喜事。他们怀着无限激动和欢乐的心情，像过盛大的节日一样涌向各投票站。投票站整天锣鼓喧天，歌声不绝。"},{"type":"paragraph","text":"11月26日，胜利路居民委员会第二选区进行投票。这个选区的五百一十七名选民穿戴一新，他们手执花束和象征丰收的染色青稞穗，从清晨就来到投票站。这些选民中有一半以上的人在三年多前还是乞丐或被农奴主视为“贱民”。今天，他们享受充分的民主权利，都把投票这天称为“扎喜洛勒”（吉祥盛年日）。在前往投票站以前，家家户户都清扫房屋庭院，并在毛主席像前献哈达，感谢党和毛主席使他们获得崭新生活。这天，这个选区百分之百的选民都投了票。"},{"type":"paragraph","text":"拉萨市的选民们无限珍惜他们的民主权利。在选举前他们普遍讨论了普选条例，认真地审查了选民资格。选民证发下后，选民们更是爱如珍宝。投票时间，无论是工人、农民、手工业者、商人、喇嘛和普通居民，都持着选民证积极参加了投票。各个选区还专门设置了流动票箱，使那些老弱残疾不能出门的选民也能履行自己的民主权利。"},{"type":"paragraph","text":"拉萨市区第一批进行普选的六个选区，共选出了三十三名代表。这些代表包括工人、农民、手工业者、商人、喇嘛等各界各阶层人士。其中大部分是翻身的藏族劳动人民，他们在党的教导下，都能认真执行党的政策，密切联系群众，办事公道，深受群众爱戴。现在，拉萨市郊区已有十个乡先后完成了普选，这十个乡共选出乡人民代表二百二十名，并且召开了乡人民代表大会，成立了新的乡人民委员会。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8f64cce65d"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
