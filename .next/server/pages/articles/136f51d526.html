" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji16","name":"毛泽东全集第16卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji16.pdf"],"article":{"title":"对国际战争形势的估计","alias":"","parts":[{"type":"paragraph","text":"对国际战争形势的估计"},{"type":"paragraph","text":"（1941年12月12日）周："},{"type":"paragraph","text":"（一）香港、泰国、马来、缅甸、菲律宾、关岛、中途岛、婆罗洲²、荷印3、澳洲、新西兰均有被日军在冬季内占领之可能，在半年内英美均非日本之敌，但只要留得新加坡、马尼拉、达尔文等二三据点，即可在半年后造成对日相持局面，以待日军之，然后举行反攻。（二）英美的总方针可能是对日取守，而对德取攻，先集英美苏力量解决德国，然后集合英美苏中力量解决日本，而两方面苏联都将是决定力量。如若在数月后欧洲出现第二条战线，便可较快解决德国，这是真正有利的方针，但不知惰性甚深的英美军政人员有此毅力否？（三）德国目前进入了进退维谷的歧途，但东线\"既已无路可走，便有迫使希特勒在东线取守势，在南线或西线?取[1]周，指周恩来。[2]婆罗洲，即加里曼丹岛，位于东南亚，是世界第三大岛。[3]荷印，指当时被荷兰殖民者侵占的印度尼西亚，又称“荷属东印度”。[4]澳洲，指澳大利亚大陆及附近的塔斯马尼亚岛等。[5]东线，指当时的苏德战场，北起列宁格勒（芬兰湾)，南至黑海边的关刻赤。南线，指当时德意联军与英军争夺北非和地中海控制权的战线。西英美采取集中主力（英是海陆空主力，美是空军与资源主力）打德之可能性。（四）太平洋战争\"对中苏两国其利有六：第一，华北华中的敌军势将逐渐减弱，即是说无大举增兵之可能了；第二，国民党进攻边区的可能性会减少；第三，给亲日亲德两派一个致命打击，我们使国民党既不能投降又不能“剿共”的可能性更大了：第四，中国民主政治的前途也更大了；第五，苏联可从东方抽调一部兵力向西；第六，欧洲有迅速造成第二条战线之可能。以上是在八号政治局会议上的一种估计（内部的，不发表的），你的看法如何盼告。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十二月十二日"},{"type":"paragraph","text":"[1]太平洋战争，指第二次世界大战期间反法西斯联盟国家与日本在太平洋地区进行的战争。1941年12月8日，日本未经宣战，以强大的海、空军突然袭击美国在太平洋地区的主要海、空军基地珍珠港，使美国太平洋舰队遭到惨重损失。12月8日，美英对日宣战，德意对美宣战，太平洋战争正式爆发。日本军队先后侵占了东南亚的许多国家和地区以及太平洋上的一些岛屿，后来在太平洋地区各反法西斯国家武装力量的沉重打击下，不断遭到失败。1945年8月，日本无条件投降，战争结束。"}],"authors":["毛泽东"],"dates":[{"year":1941,"month":12,"day":12}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":317,"page_end":318},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"136f51d526"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
