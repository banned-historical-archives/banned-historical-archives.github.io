script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"坦桑尼亚一杂志揭露苏联新资产阶级剥削压迫国内外人民  越来越多的人识破苏联新帝国主义面目  南希两国外长强调巴尔干合作　威廉斯总理指出世界继续动乱","authors":[],"dates":[{"year":1977,"month":1,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"坦桑尼亚一杂志揭露苏联新资产阶级剥削压迫国内外人民"},{"type":"paragraph","text":"越来越多的人识破苏联新帝国主义面目"},{"type":"paragraph","text":"南希两国外长强调巴尔干合作　威廉斯总理指出世界继续动乱"},{"type":"paragraph","text":"新华社达累斯萨拉姆一九七七年一月九日电　坦桑尼亚杂志《马及马及》最近出版了关于苏联社会帝国主义的专刊。专刊发表的一篇社论指出，越来越多的人已经认识到，“苏联不再是和平和社会主义的堡垒，而是一个新的帝国主义大国。”"},{"type":"paragraph","text":"社论指出：“由于苏联复辟了资本主义，一个新的资产阶级——一个帝国主义的统治阶级正在剥削和压迫苏联国内以及其他国家的劳苦大众。”"},{"type":"paragraph","text":"社论说：“不能单纯地从苏联的经济体制的表面现象，或苏联当权者的甜言蜜语来判明苏联是社会主义的或者是帝国主义的。必须透过这些言论的‘外表’，其实质——生产关系才能暴露出来。”社论说：“苏联已经复辟了资本主义，因此，支配苏联经济的是盲目的价值规律，它是驱使苏联新的资产阶级到那些能赢得最大利润的国家去投资的动力。”"},{"type":"paragraph","text":"新华社贝尔格莱德一九七七年一月八日电　应南斯拉夫联邦执行委员会副主席兼联邦外交部长米洛什·米尼奇的邀请，希腊共和国外交部长季米特里奥斯·维齐奥斯在一月五日至七日对南斯拉夫进行了正式访问。"},{"type":"paragraph","text":"访问期间，两国外长就国际上的迫切问题和双边关系举行了会谈，并在访问结束时发表了联合公报。"},{"type":"paragraph","text":"公报说：“鉴于巴尔干国家间的关系正在不断发展，双方认为应该为进一步发展这一地区的国家之间的合作而努力。双方指出，在加强双边关系的同时，应该在巴尔干各国人民平等地参加下，在存在着客观利益和可能性的经济和技术方面发展多边的合作。”"},{"type":"paragraph","text":"公报说，双方对铺设连接南、希两国的输油管、开凿从多瑙河通往爱琴海的运河以及共同治理瓦达河流域等项工程的筹备工作表示满意。"},{"type":"paragraph","text":"新华社乔治敦一九七七年一月四日电  西班牙港消息：特立尼达和多巴哥总理埃里克·威廉斯最近在众议院发表讲话指出，在全世界，对抗在加剧，面临着继续动乱的局面。"},{"type":"paragraph","text":"这位总理在向众议院提交一九七七年国家预算草案时还说：今天，“发展中国家进一步要求就一些问题进行谈判，以谋求国际经济关系中的平等地位和建立一种新的国际经济秩序。”他问道：“对于发展中国家提出的关于建立新的国际经济秩序的要求，发达的工业化国家真的认真地加以对待了吗？”他举例说，对技术的控制和使用以及技术转让的条件对发展中国家来说仍然是不利的。"},{"type":"paragraph","text":"威廉斯总理呼吁特立尼达和多巴哥人民发扬自力更生的精神。他说：“很清楚，特立尼达和多巴哥采取的实行更大程度的自力更生和积极主动地进一步调动本国财源的政策是最稳妥的战略。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"63a49e54bd"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
