script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"周恩来、江青、纪登奎、王洪文等同志会见朝鲜民主妇女同盟代表团","authors":[],"dates":[{"year":1972,"month":10,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"周恩来、江青、纪登奎、王洪文等同志会见朝鲜民主妇女同盟代表团"},{"type":"paragraph","text":"新华社一九七二年十月二十五日讯　中共中央政治局常委周恩来，中共中央政治局委员江青，中共中央政治局候补委员纪登奎，中共中央委员王洪文，今天下午同蔡畅、邓颖超、曹轶欧、康克清同志一起，会见了由朝鲜民主妇女同盟中央委员会执行委员、中央委员会书记李贞顺率领的朝鲜民主妇女同盟代表团全体成员。他们对代表团前来我国访问，表示热烈欢迎，并且同代表团成员进行了亲切友好的谈话。"},{"type":"paragraph","text":"参加会见的代表团团员有：朝鲜民主妇女同盟中央委员会执行委员、“妇女社”社长郑明姬，平壤市农村经济委员会副委员长严吉永，朝鲜民主妇女同盟中央委员会执行委员、国际部长安世民，朝鲜民主妇女同盟中央委员会委员、金日成综合大学系副主任崔彦卿，平壤纺织厂劳动英雄金琫礼，朝鲜民主妇女同盟中央委员会委员、区域女盟委员会第一书记卢顺玉，朝鲜民主妇女同盟中央委员会指导员赵连鸿、许秀莲。"},{"type":"paragraph","text":"朝鲜民主主义人民共和国驻中国大使玄峻极，大使馆一等秘书崔琫哲，也参加了会见。"},{"type":"paragraph","text":"会见时在座的我国有关方面负责人、首都妇女代表和工作人员有：申健、区棠亮、毛宝忠、方琼、田树千、傅玉芳、王家凤、徐光、罗淑珍、潘丽华、张庭延等。（附图片）"},{"type":"paragraph","text":"这是会见时合影　新华社记者摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"江青","type":"人物"},{"name":"王洪文","type":"人物"},{"name":"纪登奎","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f51b3bea79"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
