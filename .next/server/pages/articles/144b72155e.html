<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"李达剥削农民的十大罪恶","authors":[],"dates":[{"year":1966,"month":9,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"李达剥削农民的十大罪恶"},{"type":"paragraph","text":"李达这个反党反社会主义分子，还是一个漏网的地主分子。李达的父亲李甫仁，家有水田一百亩左右，房屋三十八间，是湖南零陵的大豪绅，当过当地伪团总十余年，一贯欺压人民，剥削穷人，勾结地主官僚，作威作福。"},{"type":"paragraph","text":"李达接过他父亲的衣钵，变本加厉，一贯欺压和剥削农民，过着荒淫无耻的生活。最近，当地广大农民揭发了李达剥削、压迫农民的大量罪恶。"},{"type":"paragraph","text":"一、雇工开店。早在一九一五年前后，李达在当地的蔡家埠开药店，雇工两人以上。抗战时期，李达又在楚江圩、蔡家埠、广西桂林等地开过杂货店，每店雇工两人以上。一九四四年还雇工二、三人开过酒店。此外还雇工做木排生意、纱布生意。"},{"type":"paragraph","text":"二、雇工种田。李达在解放前，每年雇长工一人以上，短工数人。一九四八年李达又雇工五人，帮他种果园、种西瓜等出卖。"},{"type":"paragraph","text":"三、出租土地。一九四七年，李达有水田十六亩，全部通过他的侄儿李定香出租，每亩收租谷一担左右。"},{"type":"paragraph","text":"四、高利盘剥。如李永贵，一九四八年以加八的利息向李达借谷三担，不到半个月，就要还谷五担四斗。还有贫农唐建豹向李达借谷两担，过了几个月连本带息共还谷六担。"},{"type":"paragraph","text":"五、蹂躏妇女。李达先后买了两个穷人的女孩做丫头。一个李姓妇女，替李达做工十多年，以后被李达占为小老婆，但不几年又将她赶出门外。"},{"type":"paragraph","text":"六、敲诈勒索。一九四三年李达将李定仁七岁的二女送给大地主张文林当丫头，后来李定仁被李达勒索稻谷三担六斗，才将二女领回。同年，李五香随李达躲日寇，李达将他二岁的妹妹送给别人，叫他的姐姐给李达做事，以后李达反而借口说养活了他的弟弟，勒索稻谷五担五斗。"},{"type":"paragraph","text":"七、拉工砌屋。李达先后砌屋四栋，杂工、小工，都是本村人做的，做了又不给钱。农民说：给李达做的是白工。"},{"type":"paragraph","text":"八、吃喝嫖赌，荒淫无耻。李达讨过一妻四妾，一贯赌钱打牌，伙赌抽头，输打赢要，耍流氓手段。"},{"type":"paragraph","text":"九、破坏土改。一九四八年，李达看见国民党反动派快要垮台了，赶快卖田，分散财产，逃脱农民对他的清算。他还指使附近三个地主唐保轩、唐金照、唐升显大肆卖田。如地主分子唐升显，把一百多亩田卖掉了七十多亩，土改时只被划为破产地主。"},{"type":"paragraph","text":"十、包庇地主。土改时，李达向乡政府写信说：“李松岭不符合划地主的条件。”包庇这个地主分子逃过了关。李达还唆使他的学生、地主胡迪源马上逃走，并介绍他到某处当财务科长。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"144b72155e"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
