" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji44","name":"毛泽东全集第44卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji44.pdf"],"article":{"title":"毛泽东等祝贺德意志民主共和国成立十二周年的电报","alias":"","parts":[{"type":"paragraph","text":"毛泽东等祝贺德意志民主共和国"},{"type":"paragraph","text":"成立十二周年的电报"},{"type":"paragraph","text":"（1961年10月6日）德国统一社会党中央委员会第一书记、德意志民主共和国国务委员会主席瓦尔特·乌布利希同志，德意志民主共和国部长会议主席奥托·格罗提渥同志，德意志民主共和国人民议院主席约翰尼斯·狄克曼博士，民主德国全国阵线全国委员会主席埃里希·柯伦斯教授博士："},{"type":"paragraph","text":"欣逢德意志民主共和国成立十二周年，我们谨代表中国共产党、中华人民共和国政府和中国人民，并以我们个人的名义，向你们，并通过你们向德意志民主共和国人民，致以热烈的祝贺。"},{"type":"paragraph","text":"德意志民主共和国一贯奉行和平外交政策，为反对帝国主义的侵略政策和战争政策、维护欧洲和世界和平，作出了积极的贡献。现在，西德军国主义在以美国为首的西方国家的扶植下，已经复活起来，日益严重地威胁着欧洲和世界的和平。同时美国帝国主义及其追随者继续顽固地阻挠对德和约的缔结，坚持对西柏林的非法占领，并且正利用它们一手制造的所谓“柏林危机”，加紧扩军备战，加剧国际紧张局势。我们再一次郑重表示：中国人民坚决支持苏联、德意志民主共和国和华沙条约缔约国关于缔结对德和约并在此基础上使西柏林局势正常化的坚定立场和合理主张。我们相信，德"},{"type":"paragraph","text":"毛泽东等祝贺德意志民主共和国成立十二周年的电报意志民主共和国的正义斗争一定能够取得最后的胜利。"},{"type":"paragraph","text":"中、德两国都是社会主义阵营的成员。我们两国间友好合作关系的发展，对于促进我们两国社会主义建设事业和增强社会主义阵营的力量，具有重要的作用。我们深信，在马克思列宁主义的旗帜下，在莫斯科会议声明的基础上，中、德两国的友好合作关系，必将得到进一步的巩固和发展。祝中、德两国人民的兄弟友谊万古长青。"},{"type":"paragraph","text":"中国共产党中央委员会主席毛泽东中华人民共和国主席刘少奇中华人民共和国全国人民代表大会常务委员会委员长朱德中华人民共和国国务院总理周恩来"},{"type":"paragraph","text":"1961年10月6日"},{"type":"paragraph","text":"[1]指1960年11月在莫斯科召开的八十一国共产党和工人党代表会议上通过的《各国共产党和工人党代表会议声明》。"}],"authors":["毛泽东"],"dates":[{"year":1961,"month":10,"day":6}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":448,"page_end":449},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1f769e557b"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
