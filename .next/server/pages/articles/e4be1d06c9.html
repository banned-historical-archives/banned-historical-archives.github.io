script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"新共党刊揭露苏修叛徒集团无耻执行反革命修正主义组织路线  苏修叛徒集团扼杀不了苏联人民的革命意志  苏联广大党员和人民群众决心为重建无产阶级专政和无产阶级政党，为推翻新沙皇的统治而斗争","authors":[],"dates":[{"year":1969,"month":9,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新共党刊揭露苏修叛徒集团无耻执行反革命修正主义组织路线"},{"type":"paragraph","text":"苏修叛徒集团扼杀不了苏联人民的革命意志"},{"type":"paragraph","text":"苏联广大党员和人民群众决心为重建无产阶级专政和无产阶级政党，为推翻新沙皇的统治而斗争"},{"type":"paragraph","text":"新华社十日讯　惠灵顿消息：新西兰共产党机关刊物《共产主义评论》九月号发表一篇文章，揭露和谴责苏修叛徒集团篡夺苏联党和国家的领导权，在苏联复辟资本主义的罪行。"},{"type":"paragraph","text":"文章指出，从赫鲁晓夫到勃列日涅夫之流，这些隐藏在苏联共产党内的走资本主义道路的当权派，在伟大的马克思列宁主义者斯大林去世之后，发动宫廷政变，篡夺了列宁和斯大林缔造的党的领导权，把世界上第一个无产阶级专政的国家变成法西斯主义的资产阶级专政的国家。"},{"type":"paragraph","text":"文章说：“苏修叛徒集团为了推行其反革命政治路线，在苏联共产党内无耻地执行一条反革命修正主义的组织路线。一方面，它无情地打击和迫害忠于马克思列宁主义的干部和党员；另一方面，招降纳叛，搜罗了一帮子叛徒、特务、走资派。它为各种各样曾经被无产阶级专政机关处罚和被党清除出去的阶级敌人‘恢复名誉’，并且‘恢复他们的党籍’。为了控制苏联共产党各级组织的领导权，他们从地方到中央，提拔了一批资产阶级代表人物和反革命修正主义分子到各级党组织的领导岗位。”"},{"type":"paragraph","text":"文章强调指出，苏修叛徒集团虽然横行一时，但是它决不能扼杀苏联广大党员和人民群众的革命传统和革命意志。"},{"type":"paragraph","text":"文章指出：苏联的广大党员和人民群众已“越来越看清克里姆林宫新沙皇的叛徒面目，决心继续列宁和斯大林开创的社会主义革命事业，为在苏联重新建立无产阶级专政和无产阶级政党，为推翻苏修新沙皇的统治而斗争。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"党内资产阶级","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e4be1d06c9"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
