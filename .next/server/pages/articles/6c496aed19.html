script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"阿尔巴尼亚《团结报》斥美苏伙同援印反华帝国主义修正主义反华阴谋必遭失败","authors":[],"dates":[{"year":1964,"month":9,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社地拉那6日电　阿尔巴尼亚《团结报》今天发表一篇题为《印度和约翰逊—赫鲁晓夫的‘和平竞赛’》的评论指出，“帝国主义和修正主义任何反对伟大中国的十字军远征都将遭到彻底的失败。”"},{"type":"paragraph","text":"评论指出，从苏联国防部长马利诺夫斯基声称苏联要给印度以最大限度的军事援助可以看出，苏联修正主义领导人决定不落后于他们的美国同事。评论说，这完全不是偶然的巧合:当印度国防部长恰范正同苏联修正主义领导人进行交易以便得到更多的武器时，印度国内成千上万的劳动者正在举行罢工，抗议印度政府的反动的战争挑衅政策所造成的灾难性的饥荒。夏斯特里政府正用武器的力量对付饥饿的罢工者，残暴地镇压他们。人们不禁要问，苏联修正主义领导人是如何想的呢，难道他们的子弹不会射穿印度罢工者的胸膛吗!这表明了苏联修正主义领导人已经堕落到何种程度。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6c496aed19"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
