script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"肃清极左路线流毒　落实三中全会精神  小平易公社用实践检验思想和政策是非","authors":[],"dates":[{"year":1979,"month":8,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"肃清极左路线流毒　落实三中全会精神"},{"type":"paragraph","text":"小平易公社用实践检验思想和政策是非"},{"type":"paragraph","text":"本报讯　通讯员杨泰、耀文、文显报道：夏收以后，山西朔县小平易公社党委组织干部补上真理标准讨论这一课，用实践来检验思想和政策是非，把人们从极左路线枷锁中解放出来，进一步扫清了落实党的三中全会精神的思想障碍。"},{"type":"paragraph","text":"为什么担心害怕"},{"type":"paragraph","text":"小平易公社贯彻落实三中全会精神和中央关于发展农业生产的两个文件以来，各方面都起了很大变化，夏季丰收，各种秋熟作物长势好；全社工副业生产形势喜人，上半年收入达到一百多万元，相当于去年全年的水平。但是，在这样大好的形势下，仍有少数干部存在着糊涂认识：一是害怕。害怕政策改变，再吃苦头。看到一些大队因搞工副业多收入几个钱，就说方向偏了；二是担心。觉得生产队有了自主权，给了社员小自由，群众难管，工作难做，主张收缩一下。甚至有极个别的干部把农村出现的一些问题，归结到三中全会制订的政策上。这种情况说明，有不少干部至今没有摆脱极左路线的框框。"},{"type":"paragraph","text":"为了帮助干部解放思想，肃清流毒，落实三中全会精神，公社党委决定在干部中开展关于实践是检验真理唯一标准的讨论，联系本地实际，进行典型对比，帮助干部澄清一些大是大非问题。"},{"type":"paragraph","text":"让实践来回答"},{"type":"paragraph","text":"生产队自主权到底是多了还是少了？就拿种植农作物来说，前几年，公社为了图好看，在种植上搞“一律化”。尤其是在公路两侧，搞“千亩方”，不管适宜不适宜，每年硬性规定种玉米。结果茬口不能倒换，施水困难，种一年败一年，群众越种越灰心，造成全社粮食产量连年下降。今年，生产队根据地性、茬口和水肥条件，在这些“千亩方”里因地制宜种上了谷子、高粱、山药等作物，看上去五花八门，实际上门门生长旺盛，群众劳动的积极性更高了。事实说明，不是生产队自主权多了乱套，恰恰是少了才导致瞎指挥、“一刀切”。实际上，现在有些队连这点种植权还没有，更谈不上其他自主权了，政策刚刚开始落实，怎么就多了呢？"},{"type":"paragraph","text":"上级指示也要受实践检验"},{"type":"paragraph","text":"在农村工作中，往往出现上级领导的意见同实际情形相矛盾的情况。公社党委成员用自己的亲身教训，帮助干部分清界限，正确对待上级领导的意见。这个公社的祝家庄大队，一九七五年粮食产量就达到了四百一十三万斤。后来上级领导来这里蹲“点”，把外地的许多具体做法都搬到这个队试行，先是搞“过渡”，随后在劳动管理上搞“大概工”，在粮食分配上搞“自报公议”。试来试去，把群众的积极性“试”光了。粮食产量不断下降，去年总产二百七十八万斤，比一九七五年减产一百多万斤。而张家口大队，公社也曾“命令”过他们搞“穷过渡”，但这个大队认为条件还不成熟，没有盲从，继续根据本队实际情况，坚持生产队核算，坚持定额管理制度，粮食产量稳步上升，经济收入年年增长。还有一件事：今年，公社领导检查生产时，发现小平易大队有八十多亩小麦因受干热风影响，长势不好，“指示”毁掉麦田，改种糜黍。大队干部考虑到小麦即将收获，种糜黍节令已过，毁麦改种，经济帐很不合算，没有盲目地照“指示”办。他们组织社员查出小麦生病原因，喷打农药，使八十亩小麦起死回生，亩产达到二百斤以上。这些事例，使干部明了一个理：当干部，对党的政策规定要认真贯彻执行，在落实过程中，既要对上级负责，更要对群众负责，绝不能单凭上级领导的一句话就盲目蛮干。上级的“命令”、“指示”对不对，也要受实践的检验；符合本地的实际情况，有利于发展生产的，坚决执行，否则，绝对不能盲目照办。"},{"type":"paragraph","text":"小平易公社讨论真理标准问题，使干部懂得了是非标准，增强了实践的观念。干部和社员们说，“四害”横行时，把正确的当右的批，把极左当正确的吹，弄得我们左右为难。现在，实践说话了，三中全会制订的农业政策，把农村搞活了，到处都充满了生气。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bf5e7031c6"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
