<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"兰州部队遵照毛主席关于“备战、备荒、为人民”的教导  同当地各族人民一起战天斗地  为加速西北地区建设贡献力量","authors":[],"dates":[{"year":1973,"month":7,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"兰州部队遵照毛主席关于“备战、备荒、为人民”的教导"},{"type":"paragraph","text":"同当地各族人民一起战天斗地"},{"type":"paragraph","text":"为加速西北地区建设贡献力量"},{"type":"paragraph","text":"据新华社兰州一九七三年七月二十八日电　人民解放军兰州部队广大指战员遵照毛主席关于“备战、备荒、为人民”的教导，继承和发扬人民军队的光荣传统，同当地各族人民一起战天斗地，为加速祖国西北地区的社会主义建设贡献力量。"},{"type":"paragraph","text":"伟大的批修整风运动，振奋了西北地区人民的革命精神，广大社员群众以大寨为榜样，治山治水，改造沙漠，改良草原，努力改变生产面貌。广大指战员经过路线教育，提高了执行毛主席建军路线的自觉性，满腔热情地关怀和支持人民群众的这种革命行动。有的部队把支援地方社会主义建设作为一项重要政治任务，纳入工作计划；有的主动到驻地社队，同当地干部和群众一道拟定改变生产条件的规划。"},{"type":"paragraph","text":"在革命老根据地陕北，各部队指战员反复学习毛主席在一九四九年十月给延安和陕甘宁边区人民的复电，意气风发地同人民群众并肩战斗。今年，延河截湾改直工程刚开始，一些从战争年代就喝延河水的老干部，率领部队到了工地。他们同人民群众一起苦干了一个多月，加快了工程进程。驻南泥湾某部的领导干部，继承三五九旅的革命传统，亲自查看地形，勘察水源，带领部队和群众整修了三座水库，使“陕北江南”的可灌农田面积扩大，稻田更多。榆林地区北部临近毛乌素沙漠，常年风沙滚滚，驻地部队每年都要和群众一道植树造林。经过几年奋战，长城内外开始出现了“绿色长城”。"},{"type":"paragraph","text":"在黄河两岸、泾渭河畔，军民协力兴建水利工程。驻在六盘山下泾河上游的某部指战员，不畏艰险，不怕困难，同人民群众并肩修建崆峒山水库，为陇东的一些地区发展生产创造条件。驻陕西部队某部同当地群众一起，完成了宝鸡峡引渭（河）工程的主要项目以后，指战员们又参加修建配套工程，让渭河水尽快地灌溉渭北高原的大片土地。在引黄（河）工地上，指战员们经常担负一些艰巨任务。甘肃景泰县某地，有一条渠道需要穿山而过，某团五连立即赶来支援。他们帮助社员打眼放炮，开山凿石，很快打通了山洞，引来了黄河水。"},{"type":"paragraph","text":"祖国西北地区，从东到西有一片片一望无际的沙漠戈壁。几年来，兰州部队的指战员们积极协同各族人民向沙漠戈壁开战，改变自然面貌，发展农牧业生产。甘肃西北部的民勤县，三面被腾格里沙漠包围。这里风沙弥漫，气候变化无常，给发展农牧业生产带来严重困难。为了取得治沙的胜利，县委常委、县人民武装部部长宋汉英带领小分队向腾格里纵深挺进。他们冒着隆冬严寒，在沙漠里度过了二十天，行程一千二百里，取得不少有关沙漠的第一手资料。宋汉英又带领武装部干部到花寨大队蹲点，亲自植树造林，探索总结治沙经验。驻守在乌兰布合沙漠地区的指战员同当地人民一道，不断取得治沙的新成绩。"},{"type":"paragraph","text":"驻守在青海、甘南和嘉峪关内外草原地区的许多部队，几年来也同各族牧民一道战天斗地，建设牧场，发展牧业生产。通天河畔骑兵某部驻地是一片草原，战士们大力帮助牧民灭虫灭鼠，保护草场，还采集大量草子送给生产队。每年春天，他们又拉出战马帮助社员耕地运肥，使草场不断扩大，牛、羊大幅度增加。"},{"type":"paragraph","text":"在协助人民群众加强农牧业基本建设的同时，各部队还派出大批人力参加抢险救灾，春种夏收，帮助群众防病治病，为保卫祖国西北边疆，加速西北地区的社会主义建设，积极贡献力量。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"甘肃文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2bdcddade3"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
