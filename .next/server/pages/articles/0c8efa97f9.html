" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"甘肃定西地委转报各县委扩大会议对中央和省委负责同志的一些意见","authors":[],"dates":[{"year":1961,"month":11,"day":25}],"is_range_date":false,"parts":[{"text":"甘肃定西地委转报各县委扩大会议对中央和省委负责同志的一些意见","type":"title"},{"text":"省委：","type":"appellation"},{"text":"现将六一年九月各县委扩大会议上对中央和省委一些领导同志的意见反映摘要报上：","type":"paragraph"},{"text":"1．甘肃出了大问题，中央一些领导同志亲自视察，也曾派工作组到甘肃工作，对甘肃工作估价很高，却没给(此处二字辨认不出)反映问题。","type":"paragraph"},{"text":"2．引洮工程中央知道，开工时发过贺电，朱德、习仲勋也视察过，没有发现问题纠正错误。","type":"paragraph"},{"text":"3．谭震林同志是主管农业工作的，全国农业出了问题与他有关。他曾说过：“粮食已经过关”，“绳索牵引是农业发展的方向”，要求限期推广，还说：“货币是货币又不是货币，商品是商品又不是商品，这是初级的按劳分配”。这些说法都给下边干部增加了糊涂认识。","type":"paragraph"},{"text":"4．李先念同志提出“两放三统一包”打乱了财贸体制。","type":"paragraph"},{"text":"5．“共产风”，大办食堂，吃饭不要钱，都是中央提出来的，应该由中央负责。","type":"paragraph"},{"text":"6．五九年四月主席六条指示下达后，中央有关部门没有检查执行情况。","type":"paragraph"},{"text":"7．刘主席视察河南工作时提出一县一社，对下面影响很大。","type":"paragraph"},{"text":"8．陈正人同志来到临洮视察工作时说：“五九年每人要有粮500斤，黄豆280斤，清油15斤，都不切合实际。”","type":"paragraph"},{"text":"9．胡耀邦同志提出“劳动不计报酬，工作不讲条件”，助长了命令风与共产风。","type":"paragraph"},{"text":"10．中央工作组在陇西、岷县生活特殊，多吃多占严重，群众说：中央工作组来解决问题，我们信心很大，现在把咀吃软了，不如以前好。","type":"paragraph"},{"text":"11．中央工作组工作方法简单，不允许被批判的同志讲意见。","type":"paragraph"},{"text":"12．中央工作组在陇西整风整社时否定一切，别人意见不采纳，根本不管生产，王生荣同志讲“陇西整个是国民党的复辟，县委书记带头抢劫”。揭盖子时不了解实际情况，只说人祸，不承认天灾。","type":"paragraph"},{"text":"13．自留地问题：省委不执行中央指示，变动太快，影响群众生产积极性。","type":"paragraph"},{"text":"14．省委讲对过去的错误不查责任，可是张仲良、窦明海还是书记，而对下面不是集训、特训，就是撤职法办。省委、地委书记虽没有直接人命，但下面违法乱纪是他们逼出来的。有的同志说：这几年发生错误的原因是：“上面出题，下面发挥，下面胡干，上面支持”，一切归罪下面是不公平的。","type":"paragraph"},{"text":"15．岷县20万吨铁，千斤县是张仲良同志来岷县逼出来的，后来还留下黄文清监督执行。","type":"paragraph"},{"text":"16．有些同志提出：特训班把没开除党籍的人，持枪管起来，不合党章规定，在生活上不如犯人，应该宽一些。","type":"paragraph"},{"text":"17．五风是从上面刮起来的，下面强迫命令是检查团逼出来的。","type":"paragraph"},{"text":"18．通渭县反映省委工作组生活特殊，吃饭不限量、买东西不限量。","type":"paragraph"},{"text":" 定西地委1961年11月25日","type":"paragraph"},{"text":"印发：各常委　成湘　秘书长　办公厅　监委　存档　　共印33分","type":"paragraph"},{"text":"中共甘肃省委办公厅　　1961年11月28日印","type":"paragraph"},{"text":" 11月28日15时40分月抄","type":"paragraph"}],"comments":[],"origin":"甘肃省某档案馆","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0c8efa97f9"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
