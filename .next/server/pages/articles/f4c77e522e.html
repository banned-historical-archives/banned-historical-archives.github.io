script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"积极提高医务人员为工农兵服务的自觉性驻静安区中心医院工宣队、军宣队和院革委会广泛发动群众，狠批资产阶级医疗作风，好人好事不断涌现","authors":[],"dates":[{"year":1971,"month":5,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　驻静安区中心医院工宣队、军宣队和院革委会，以阶级斗争为纲，广泛发动群众狠批资产阶级医疗作风，使全院广大医务人员受到了一次思想和政治路线方面的教育，提高了为工农兵服务的自觉性。"},{"type":"paragraph","text":"前一时期，这个医院的资产阶级医疗作风比较严重，医疗质量和护理质量不断下降。外科有个“老爷医生”，连续发生了几起严重的医疗事故。"},{"type":"paragraph","text":"但是，对这种严重的医疗事故，有的人还认为“不典型，没有代表性”，不去发动群众对它进行批判。工宣队、军宣队和院革委会在中共静安区委的领导和帮助下，认真学习了毛主席关于阶级和阶级斗争的教导，分析了当前医疗战线上阶级斗争的新特点，认识到这种医疗事故的发生，就是资产阶级在无影灯下、手术台上专了无产阶级的政，决不可等闲视之。那种认为“不典型，没有代表性”的说法，一方面反映了一些医务人员缺乏无产阶级思想感情，自己的资产阶级医疗作风也较严重，对资产阶级医疗作风痛恨不起来；另一方面反映了有些人的单纯业务观点，认为这些事故是技术问题，不是政治问题。针对这些思想，这个医院的领导以阶级斗争为纲，大揭大议资产阶级医疗作风的种种表现，查事故根源，全院兴起了批判资产阶级医疗作风的高潮。在一个月的时间内，全院贴出大字报二千五百多张。外科的那个“老爷医生”，经过广大医务人员的检举揭发，发现他不仅犯有不少的严重医疗事故，而且思想也极为反动。几年来，他利用手中的一把刀，对工农兵实行资产阶级专政。医院领导发动群众把他揪了出来，狠狠进行了批斗。"},{"type":"paragraph","text":"这个医院正当批判资产阶级医疗作风的群众运动深入发展的时候，又出现了另一种倾向:有些医务人员只收内科病人，不收外科病人；有些病人明明好了，也不叫他们出院，以没有床位为借口不把应该住院的重病人收进来；同时，拍片和化验的病人也大大增加。这些情况的出现，说明了医务人员对批判资产阶级医疗作风还有不正确的看法。"},{"type":"paragraph","text":"工宣队、军宣队和院革委会针对出现的问题，在批判资产阶级医疗作风的过程中，注意把有一般的资产阶级医疗作风的人和那些有严重资产阶级医疗作风的人区别开来，把有严重资产阶级医疗作风的人和一小撮有意进行阶级报复制造医疗事故的阶级敌人区别开来。他们一方面狠抓阶级斗争不放，打击极少数的坏人；另一方面对广大医务人员坚持正面教育，组织他们学习“老三篇”，以白求恩、张思德完全、彻底为人民服务的精神，对照自己的思想和工作，找出差距，在灵魂深处爆发革命，提高批判资产阶级医疗作风的自觉性，树立无产阶级医疗作风。"},{"type":"paragraph","text":"这个医院的工宣队、军宣队和革委会，还把批判资产阶级医疗作风和改革不合理的规章制度结合起来，巩固了革命大批判的成果。如医务人员上班的“班头”问题，过去不少人为了方便自己，搞了几十种“班头”，造成混乱。现在进行了整顿，“班头”大大减少，有利于搞好医疗工作和护理工作，有利于工农兵病员。又如发药，过去一天三次药并作一次发，有的病员不识字，一次就吃光了。现在作了改进，仍分三次发。"},{"type":"paragraph","text":"“灿烂的思想政治之花，必然结成丰满的经济之果”。静安区中心医院由于开展了对资产阶级医疗作风的批判，提高了医务人员为工农兵服务的自觉性，好人好事不断涌现。最近，一病区收治了两个患严重脑震荡的病人，医生们立即进行抢救，还派专人进行护理。三病区知道一病区人手少，就派人来支援。这两个脑震荡病人，经过一星期的精心治疗和护理，已脱离危险期。胸科病房的医生、护士，为了抢救阶级兄弟的生命，一天做了两个心脏手术，连续工作四十八小时。中药房的同志做到不配好处方不吃饭。营养室的炊事员，为了保证病人吃饱吃好，主动深入病房听取工农兵病员的意见，根据病人不同的口味做菜，受到病员们的赞扬。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f4c77e522e"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
