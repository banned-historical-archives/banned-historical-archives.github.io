script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"英国工人高举毛主席画像举行反美游行  示威群众在大会上纷纷争购《毛主席语录》和中国刊物","authors":[],"dates":[{"year":1967,"month":5,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"英国工人高举毛主席画像举行反美游行"},{"type":"paragraph","text":"示威群众在大会上纷纷争购《毛主席语录》和中国刊物"},{"type":"paragraph","text":"新华社伦敦七日电　数千名英国工人七日利用星期天休息的时间在伦敦的主要街道上举行示威游行，庆祝“五一”国际劳动节，抗议美帝国主义侵略越南。游行结束后，在海德公园举行群众大会。"},{"type":"paragraph","text":"在群众队伍中，示威者高举着一幅全世界人民伟大导师毛主席的巨型画像。示威群众沿途高呼：“美帝国主义滚出越南！”“帝国主义滚出去！”“威尔逊滚出去！”等口号，许多示威者还举着谴责英国侵略南也门的标语牌。"},{"type":"paragraph","text":"在海德公园门前的临时售书处，好几百本《毛主席语录》、《北京周报》、《中国画报》很快就被购买一空。"},{"type":"paragraph","text":"今天，一批青年工人前往卡尔·马克思墓前敬献花圈，并且高唱《国际歌》。一个青年工人在马克思墓前发表简短的讲话。他说，在列宁逝世以后，是毛泽东主席进一步发展了我们时代的马克思列宁主义学说。他指出，中国无产阶级文化大革命是中国人民在社会主义道路上的大步迈进。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ce9a1cae2e"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
