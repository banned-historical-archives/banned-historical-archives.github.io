script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"继续搞好教育卫生革命  中山医学院师生联系实际学习十大文件，决心深入批判修正主义，批判资产阶级世界观，办好社会主义医科大学","authors":[],"dates":[{"year":1973,"month":9,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"继续搞好教育卫生革命"},{"type":"paragraph","text":"中山医学院师生联系实际学习十大文件，决心深入批判修正主义，批判资产阶级世界观，办好社会主义医科大学"},{"type":"paragraph","text":"新华社广州一九七三年九月十七日电  广州中山医学院党委带领全院各级领导班子成员和师生员工，联系本院教育卫生革命实际，认真学习党的十大文件，决心继续搞好批林整风，认真看书学习，深入批判修正主义，批判资产阶级世界观，夺取无产阶级教育卫生革命的新胜利。"},{"type":"paragraph","text":"党的十大文件发表以后，中山医学院党委召开了扩大会议，首先组织全院各级领导班子成员认真学习，领会文件精神，并且回顾几年来本院教育卫生革命的情况，总结经验教训，提高路线斗争觉悟。几年来，中山医学院深入开展批林整风运动，用毛主席关于无产阶级专政下继续革命的理论，武装全院师生员工的头脑，使医学教育革命沿着正确方向不断前进。他们坚持按照毛主席关于“要从有实践经验的工人农民中间选拔学生”的指示，先后五次招收了两千五百多名工农兵学生；在教学和医疗改革方面，面向农村，开门办学。学院先后举办了各种专科的培训班，派出农村巡回医疗队、手术培训队，为农村培训赤脚医生等基层医务人员三千多名。学院还和省内二十二个县、市挂钩，建立农村教学基地，把医学教育同改变农村医疗卫生面貌结合起来。同时，在教材、教学方法、课程设置以及教学体制等方面进行了一系列改革试验，促进了教师队伍改造和教学质量的提高。几年来，这个学院已有七百多名工农兵学生毕业，走上三大革命运动的第一线，朝气蓬勃地为工农兵服务。回顾这段战斗历程，大家体会到：坚定不移地按照毛主席的革命路线进行教育卫生革命，就能办好社会主义医科大学，学校工作就能生气勃勃，胜利前进。"},{"type":"paragraph","text":"中山医学院各级领导班子成员学习十大文件，联系自己的切身体会，认识到尽管学院在教育和卫生革命方面已经取得很大的胜利，但是斗争并没有结束，斗、批、改任务仍然十分繁重。要抓好上层建筑领域的斗、批、改，学院党委和各级领导班子成员就要坚持认真看书学习，继续抓紧批林整风，深入实际，调查研究，不断总结两条路线斗争的经验教训，做到在路线斗争的大是大非问题上旗帜鲜明，立场坚定；正确处理两类不同性质的矛盾，正确执行党的政策。大家说：教育是上层建筑的重要部分。在教育阵地上，封、资、修的影响盘根错节、根深蒂固，我们一定要看到斗争的长期性和复杂性，坚持继续革命，反对停滞不前，更要反对倒退，坚决把无产阶级教育革命进行到底。"},{"type":"paragraph","text":"目前，在各级党组织的带领下，中山医学院师生员工已经掀起了学习十大文件、贯彻十大精神的热潮。"},{"type":"paragraph","text":"学院党委会正在结合教育卫生革命的实践，筹办各种类型的学习班，分期分批轮训各单位负责抓斗、批、改工作的领导班子成员和主要骨干；结合学习十大文件精神和批林整风，举办各种形式的读书小组，认真学习马克思主义、列宁主义、毛泽东思想，普遍提高广大师生员工的马列主义水平，继续深入批判林彪的修正主义路线和他的反动的资产阶级唯心论的世界观，并组织师生对各个学科领域的资产阶级思想体系进行批判，总结教育革命的新经验。在党的十大精神的鼓舞下，最近学院已有一千多名师生和医务人员，分赴广东省二十四个县和公社，进行教学实习和巡回医疗。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"教育革命","type":"主题/事件"},{"name":"两条路线斗争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"86a701ade1"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
