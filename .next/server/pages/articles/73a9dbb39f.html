script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"澳共（马列）《先锋报》谴责苏修破坏各国革命  号召革命人民推进反对苏修的斗争  把毛泽东思想同各国的具体革命实践相结合，才会有革命的运动；修正主义和革命之间决没有“团结”可言","authors":[],"dates":[{"year":1969,"month":9,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"澳共（马列）《先锋报》谴责苏修破坏各国革命"},{"type":"paragraph","text":"号召革命人民推进反对苏修的斗争"},{"type":"paragraph","text":"把毛泽东思想同各国的具体革命实践相结合，才会有革命的运动；修正主义和革命之间决没有“团结”可言"},{"type":"paragraph","text":"新华社墨尔本十二日电　澳大利亚共产党（马克思列宁主义）机关报《先锋报》十一日发表文章，号召澳大利亚革命人民进一步开展反对苏修叛徒集团的斗争。"},{"type":"paragraph","text":"文章说，我们生活在帝国主义走向全面崩溃，社会主义走向全世界胜利的时代。全世界范围的阶级斗争正在日益尖锐化。处在末日中的帝国主义十分倚重修正主义，而苏修叛徒集团也日益加紧同美帝国主义的勾结，他们狼狈为奸，妄图破坏各国人民的革命斗争。"},{"type":"paragraph","text":"文章说：“必须在各条战线上揭露苏修叛徒们的叛卖行径，并与之作斗争。”“以任何方式回避这场斗争，就意味着放弃革命。”"},{"type":"paragraph","text":"文章说：“当前国际革命运动在反对修正主义的斗争中积累了许多经验。”“这些经验一再证明毛泽东思想是千真万确的真理，阐明了正确的无产阶级立场。”"},{"type":"paragraph","text":"文章说：“经验表明，哪里不按毛泽东思想的革命真理办事，革命必然要失败，有时甚至要遭受灾难。”"},{"type":"paragraph","text":"文章说：经验证明，“不反对修正主义，不发扬自力更生，必然要导致右倾机会主义的阶级合作，使革命遭到失败。”“不揭露苏修叛徒集团的叛卖行径，就会导致阶级合作，从而忽视使革命力量自力更生的任务。”"},{"type":"paragraph","text":"文章指出：中国人民有着反对帝国主义及其在中国的走狗的激烈的革命斗争的悠久历史。这一经验已经由毛主席光辉地加以概括。正如毛主席所指出：“被压迫人民和被压迫民族，决不能把自己的解放寄托在帝国主义及其走狗的‘明智’上面，而只有通过加强团结、坚持斗争，才能取得胜利。”"},{"type":"paragraph","text":"文章说：“毛泽东思想是当代革命斗争，包括反对现代修正主义的斗争的理论概括。”“列宁很早以前说过，没有革命的理论，就不会有革命的运动。如果不按照当代的革命理论——毛泽东思想办事，不把毛泽东思想同各国的具体革命实践相结合，就不会有革命。”"},{"type":"paragraph","text":"文章指出苏修叛徒集团是帝国主义阵营的一部分。修正主义和革命之间决没有“团结”可言。修正主义是革命的敌人，是反革命。“在阶级斗争中，决没有‘中间道路’，也没有‘中立道路’。”"},{"type":"paragraph","text":"文章最后号召澳大利亚革命人民起来揭露苏修叛徒集团的罪恶阴谋，把反对修正主义的斗争进行到底。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"73a9dbb39f"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
