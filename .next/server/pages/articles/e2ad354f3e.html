" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji35","name":"毛泽东全集第35卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji35.pdf"],"article":{"title":"对章乃器来信的批语和复信","alias":"","parts":[{"type":"paragraph","text":"对章乃器来信的批语和复信"},{"type":"paragraph","text":"（1955年10月、11月）刘、周、陈、邓、彭真阅，退毛。章乃器的信。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"十月十九日陆定一、陈伯达阅，退毛。[1]章乃器，当时任中国民主建国会副主任委员、粮食部部长。"},{"type":"paragraph","text":"[2]刘，指刘少奇。周，指周恩来。陈，指陈云，当时任中共中央书记处书记、国务院副总理。邓，指邓小平，当时任中共中央秘书长、国务院副总理。彭真，当时任中共中央书记处候补书记、全国人大常委会副委员长。"},{"type":"paragraph","text":"[3]指章乃器1955年10月18日给毛泽东的信。信中谈了他学习毛泽东《关于农业合作化问题》一文的体会。"},{"type":"paragraph","text":"[4]陆定一，当时任中共中央宣传部部长。陈伯达，当时任中共中央宣传部副部长。毛泽东全集第三十五卷"},{"type":"paragraph","text":"二"},{"type":"paragraph","text":"此信的主要自的在这一段，意思是说，我们对资产阶级的清规戒律太多了。\""},{"type":"paragraph","text":"三周、陈、彭真、李维汉、徐冰阅，退毛。章乃器的信，值得一看。"},{"type":"paragraph","text":"四乃器部长："},{"type":"paragraph","text":"前后两信均已收到阅悉。感谢通知我这些情状和你的意见。干部中的片面观点总是会有的，问题是好好帮助他们学会实事求是全"},{"type":"paragraph","text":"[1]这个批语是针对章乃器1955年10月18日给毛泽东信的最后一段写的。信中说：“最后，提出一点建议：应该号召搞宣教工作的人们学习一些巴甫洛夫的基础知识，让他们从那里找到“与人为善”和“循循善诱”的科学根据，从而减少清规和戒律；同时还可以帮助他们正确地划清唯物和唯心的界限，以至更好地掌握辩证法则。”"},{"type":"paragraph","text":"[2]指章乃器1955年10月27日给毛泽东的信。信中说，我前些时向您反映的民建郑州市分会说当地私营工厂百分之百有违法行为的情况不准确，这是由于写稿人和签发人对社会主义改造事业的热爱有欠缺，和对违法和不违法界限不清造成的。信中还说，下面有很多人在那里随便立法，他们提出的对工商界的要求，比对国家机关和国家企业的要求都高，如按这些要求衡量，我们粮食部也是违法的。"},{"type":"paragraph","text":"对章乃器来信的批语和复信面分析的方法。附件还来不及看，待看后奉还。"},{"type":"paragraph","text":"祝好！"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一九五五年十一月一日积"},{"type":"paragraph","text":"送文馆Cr"},{"type":"paragraph","text":"1"},{"type":"paragraph","text":"1玉果不及弟浮为3"},{"type":"paragraph","text":"努业%"},{"type":"paragraph","text":"灯己了三三"},{"type":"paragraph","text":"以"},{"type":"paragraph","text":"代"},{"type":"paragraph","text":"生月一6毛泽东致章乃器信的手稿。"},{"type":"paragraph","text":"[1]指章乃器在1955年10月27日给毛泽东的信后附的关于教条主义在民主党派中的表现的专题反映等材料。"}],"authors":["毛泽东"],"dates":[{"year":1955,"month":10},{"year":1955,"month":11}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":524,"page_end":526},"tags":[{"name":"陈伯达","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"彭真","type":"人物"},{"name":"陆定一","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e2ad354f3e"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
