<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"不要“一锤定音”","authors":["仁杰"],"dates":[{"year":1979,"month":12,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"仁杰"},{"type":"paragraph","text":"一位文艺编辑告诉我:不久前，他们编发了一个描写爱情题材的剧本，有关领导同志看后感到剧本还有些问题，提了许多意见，但并不“一锤定音”，决定把该剧“枪毙”；编者与作者对领导的意见，也采取了具体分析的态度，在修改时有的采纳了，有的则没有采纳。他们认为，这样有利于发扬艺术民主。"},{"type":"paragraph","text":"“一锤定音”是从“一锤定型”演化而来的。如果用它来比喻某一个人，由于有较高的马克思主义理论素养，又比较了解实际情况，因而在他发表意见时，往往能对一人、一事、一物作出符合实际、令人信服的结论，当然是好的。但一般来说，“一锤定音”是很难做到的。因为人们对客观事物的认识有一个过程，而且人们在认识事物的过程中，常常受到许多条件的限制，譬如本人的具体知识的限制，个人所处的环境决定的视界上的限制等等。所以，不仅不同的人对于同一事物往往会有不同看法，就是同一个人对同一件事的看法，也往往先后不尽相同。在这种情况下，搞“一锤子买卖”，立即把一个人的话作为决定性意见是不好的，看来还是以民主讨论、集思广益为好。"},{"type":"paragraph","text":"就拿讨论一部文艺作品来说，领导同志的意见要不要听呢?只要讲得对，确有道理，当然要听。但由于领导同志的认识同样会受到客观条件的限制，因而在讨论时，就不能由“领导一人说了算”。正如邓小平同志在第四次全国文代会祝辞中说的:“我们提倡领导者同文艺工作者平等地交换意见”，“提倡同志式的、友好的讨论，提倡摆事实、讲道理。允许批评，允许反批评；要坚持真理，修正错误”。那个剧本的编者和作者既重视领导同志的意见，又不全盘照搬，他们把哪些意见可以接受，哪些意见还有保留，都一一向领导作了汇报，提出修改打算。领导同志看了他们的汇报，也热情鼓励他们在艺术上讲真话的作风，支持他们修改。于是，作者和编导根据领导同志的合理意见，压缩了原剧本中一些不必要的描写，着力把男女主人公为什么遭受“四人帮”迫害的脉络交待清楚，从而将一个无情鞭挞“四人帮”拆散幸福家庭，造成妻离子散的剧本写成定稿。领导和有关同志都认为，修改后的剧本，无论是在提炼主题思想、刻划人物性格，还是在语言艺术上，都比以前有了显著的进步。"},{"type":"paragraph","text":"文艺工作者有句行话，叫做“千锤百炼”。这就是说一部文艺作品只有经过反复的修改、补充、锤炼，才能够提高和完善。如果是“一锤定音”，那就违背了文艺创作的客观规律。文艺创作是如此，推而广之，对待科学研究、理论探讨、教育工作……难道不都应当采取同样的态度吗?"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c6f17e5235"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
