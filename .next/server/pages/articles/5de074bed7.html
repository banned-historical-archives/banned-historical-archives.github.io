script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"chuanxinlu3","name":"十年文革中首长讲话传信录（下册）","internal":false,"type":"pdf","official":false,"author":"周良霄,顾菊英","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/十年文革中首长讲话传信录3.pdf"],"article":{"title":"中央首长接见山东代表团的讲话","parts":[{"type":"title","text":"730．中央首长接见山东代表团的讲话"},{"type":"paragraph","text":"(1967年4月27日)"},{"type":"paragraph","text":"26日晚四点至十一点周总理在人民大会堂西门大厅接见了山东王效禹同志、杨得志同志、彭升平同志以及其他山东代表，参加接见的有陈伯达、康生、江青、王力、关锋、谢富治、张春桥、萧华、杨成武等同志，其中周总理、康生、王力、关锋自始至终与山东代表团在一起，其他首长因工作忙，不能同时接见，中央对山东的文化大革命是非常重视的，专题接见，晚上和效禹同志一块吃饭，王效禹同志作了汇报，其他人作了补充，最后杨得志、袁升平也作了汇报，后来周总理讲了话，大致是五个问题。"},{"type":"paragraph","text":"(一)山东省革命委员会集中领导要加强，部队除了军队指挥大权以外，其他各种大权都归省革委，大军区也参加革命委员会，王效禹同志作主任委员，杨得志作副主任委员。"},{"type":"paragraph","text":"(二)回去后部队要开会，要把思想问题解决一下，包括县人民武装部以上的都要参加，一周的时间差不多，中心研究支左工作问题，部队领导同志要作自我批评，王效禹同志也可以去讲讲话，给大家鼓鼓气，中央文革，中央军委也去几个人也讲讲话，表示对大会的支持，毛泽东思想宣传队完全撤回整训。"},{"type":"paragraph","text":"(三)二师要用野战军把他吃掉，并从原地撤离，改变性质。"},{"type":"paragraph","text":"(四)济南公安局的部队要撤出，要放手让革命造反派去把他冲散。"},{"type":"paragraph","text":"(五)各地革命委员会，部队不能作第一把手，根据这个意思，回去起草个核心小组，报请中央。"},{"type":"paragraph","text":"接着康老讲了话，大致四个问题。"},{"type":"paragraph","text":"(一)左派组织。山东的左派队伍不错嘛！(指红卫兵山东指挥部，山东革命工人造反总指挥部，山东文艺革命造反司令部)。(这时效禹同志插话：只要统一认识，左派队伍是听革命委员会的话的，叫干啥就干啥)这就好嘛！北京就不行，我们说了他们还不听，主席讲：无政府主义是对机会主义的惩罚(王竹泉插话：人家都说山东的造反派太温和了)这是你们的优点，不是你们的缺点。"},{"type":"paragraph","text":"(二)关于公安局。(省革命委员会同志做了汇报说：“造反派不敢动，一动就说反对解放军)这算什么解放军，这是公安纵队，他们和当权派混在一起，内蒙就有三个独立团反对毛主席嘛！市公安局的解放军是属于地方部队的，撤出去！"},{"type":"paragraph","text":"(三)市武装部。武装部就是穿着军衣的地方干部。"},{"type":"paragraph","text":"(四)公安纵队所以站在保守派中间，不但山东的问题，是带全国性的，这有一个教训，就是反罗瑞卿反的不彻底，(张春桥同志插话，黑字红卫兵有多少人？黄字红卫兵有多少人？王竹泉答：黑字兵有五、六千人，黄字红卫兵有几万人。张春桥继续讲：差的太悬殊了，这么少人，还是保字派！怎么能支持他呢？)(接着革命委员会的同志汇报了黑字兵要抓王历波、王路宾的问题)张春桥同志又说：让他抓，抓才好哩，事情就是这样，到了一定的火候，就好办了，一抓基本他们就垮台了。关锋插话说：你们对公安局、武装部太轻视了，他本来就是坏的，围攻公安厅是他们挑动的，你们安排一下，济南起火有人救，交通有人管，叫公安厅管起来就行啦，公安局放手让造反派冲，冲垮了完了。我们不提倡武斗，如果他们非给我们顶牛不可，武斗就武斗，你们造反派要学会争取群众。杨毅犯了严重的错误，要批判，但主要应解决公安局、武装部的问题，高明智要撤职。萧华插话：山东支左谁主持的？袁升平答：张仁初！萧华说：怎么能让张仁初主持工作呢？他是有名的张二疯子，袁升平你应当自己抓起来。周总理插话说：支左办公室要撤回，统一归省革命委员会办公室管，杨得志插话：我们怎么听到的反映和王效禹听的反映距离太大了！萧华说：这有什么奇怪的，就是嘛，你的屁股坐错了，高明智大家批判了他，怎么能叫他掌握公安局、武装部呢？怎么不让群众讨论呢？康老插话：有些不是调离，而是要撤职，像高明智。"}],"authors":["关锋","康生","杨成武","江青","王力","萧华","陈伯达"],"dates":[{"year":1967,"month":4,"day":27}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":88,"page_end":89,"alias":""},"tags":[{"name":"康生","type":"人物"},{"name":"江青","type":"人物"},{"name":"陈伯达","type":"人物"},{"name":"关锋","type":"人物"},{"name":"杨成武","type":"人物"},{"name":"王力","type":"人物"},{"name":"张春桥","type":"人物"},{"name":"杨得志","type":"人物"},{"name":"王效禹","type":"人物"},{"name":"中央文革","type":"人物"},{"name":"山东文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"武斗","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"军队支左","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5de074bed7"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
