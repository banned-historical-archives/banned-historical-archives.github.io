script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"党中央批转中宣部等四部门意见时强调用社会主义占领业余活动阵地要从建设精神文明和同资产阶级争夺青少年的高度抓好这项工作","authors":[],"dates":[{"year":1983,"month":9,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社北京九月二十四日电　中共中央最近批转了中央宣传部等四个部门《关于加强城市、厂矿群众文化工作的几点意见》，并就此向各级党委发出通知。通知指出，应当把开展城市、厂矿群众的文化活动提到建设社会主义精神文明和同资产阶级争夺青少年的高度来认识，切实加强领导，全面规划，统筹安排，努力用社会主义的文化活动去占领广大人民群众和青少年的业余活动阵地。"},{"type":"paragraph","text":"中共中央批转的这个文件，是由中央宣传部、文化部、全国总工会、共青团中央四个部门在今年八月提出的。这一文件对于如何认真贯彻执行党的城市、厂矿群众文化工作方针、任务，搞好城市、厂矿群众文化事业建设的问题，提出了建议。"},{"type":"paragraph","text":"中共中央在批转这一文件的通知中，要求各地要了解城市、厂矿各行各业不同工作和生活条件、不同年龄、不同兴趣的群众对文化生活的不同需要，采取适合他们各自特点的多种形式和方法，把尽可能多的群众吸引和组织到丰富多采的、高尚健康的文化娱乐、体育保健、学习知识技能等活动中来。对正在兴起的业余读书活动、兴趣小组、科普讲座、小型文化展览和各种游艺、体育比赛等，要加以扶持。"},{"type":"paragraph","text":"《通知》指出，各类群众文化活动，都要办得生动活泼，尽可能通过形象的、艺术的手段，潜移默化地达到爱国主义、集体主义、共产主义思想教育的目的。在群众文化活动中，必须特别注意、坚决防止各种腐朽的反动的东西对群众思想的侵蚀，也要克服某些活动中损害社会主义精神文明的低级趣味。"},{"type":"paragraph","text":"关于城市群众文化活动的设施问题，《通知》说，应当放在城市建设的总体规划中，通盘研究解决。要强调勤俭节约，因陋就简，量力而行。对现有的文化场所和设施，包括各部门所有的礼堂、电影院、俱乐部、体育场等等，要充分加以利用，向群众开放，逐步做到社会化。现有的文化场所、公共绿地和学校体育场地，任何单位不得侵占，已经侵占的要限期退还。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bcb18f6781"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
