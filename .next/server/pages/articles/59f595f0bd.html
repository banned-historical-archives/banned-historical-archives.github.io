script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji12","name":"毛泽东全集第12卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji12.pdf"],"article":{"title":"在中共中央党校的讲话","alias":"","parts":[{"type":"paragraph","text":"在中共中央党校的讲话！"},{"type":"paragraph","text":"（1938年8月22日）"},{"type":"paragraph","text":"学校以外是一个大学校，那里的东西多得很，学之不尽、取之不竭。孙中山关于民族民主革命的一套，不是从学校里来的，而是在大学校里学的。马克思的马克思主义，也不是从学校里来的，是在大学校里学的。列宁也是在学校外面创造了列宁主义。学校学习是第一章，出去以后是大规模的学习，要不断地学下去，活到老、学到老。在党校学得了一个方法，出了学校还是学习，在实际斗争中，在工作中，尤其要老老实实当学生。"},{"type":"paragraph","text":"[1]这是毛泽东在中共中央党校关于当学生、当先生、当战争领导者三个问题讲话的一部分。"}],"authors":["毛泽东"],"dates":[{"year":1938,"month":8,"day":22}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":429,"page_end":429},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"59f595f0bd"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
