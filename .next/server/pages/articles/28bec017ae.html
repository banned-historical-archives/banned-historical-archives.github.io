" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji47","name":"毛泽东全集第47卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji47.pdf"],"article":{"title":"在听取西南三线建设工作汇报时的讲话","alias":"","parts":[{"type":"paragraph","text":"在听取西南三线建设工作"},{"type":"paragraph","text":"汇报时的讲话\"!"},{"type":"paragraph","text":"（1964年11月26日）"},{"type":"paragraph","text":"打仗没有目标，部队拥上去了，打什么？一哄而上，一哄而下，盲目地上，盲目地下，战略思想不明确，没有敌情观念嘛！口"},{"type":"paragraph","text":"二"},{"type":"paragraph","text":"要研究斯大林的经验。斯大林一不做工事，二不搬厂，三不准备打游击战，只是仓促撤退。要研究蒋介石的经验，他没有搬，搬得很少。他是靠外国生活的，靠我们在敌后牵制住敌人，才保住重庆。"},{"type":"paragraph","text":"国民党为什么修长沙一都匀一贵阳那一条线，而不修川汉"},{"type":"paragraph","text":"[1]本篇一至三是毛泽东在听取关于西南三线建设工作汇报时讲话的一部分。"},{"type":"paragraph","text":"[2]国务院副总理、国家计委主任李富春汇报到1958年至1961年西南地区一些建设项目“上马”“下马”都有点盲目性，没有明确的战略布局思想时，毛泽东讲了这一段话。"},{"type":"paragraph","text":"在听取西南三线建设工作汇报时的讲话那一条线？是什么道理？川汉铁路，满清未修，就闹风潮，选的是北线。为什么当时要修川汉线？要找历史资料做比较，都要研究一下，做个比较。"},{"type":"paragraph","text":"《三国志》讲黄权随刘备东征，刘备打了败仗，黄权被隔断于江北，没有路走，只好降魏。降魏的人中有人造谣，说刘备杀了他的家属。曹不要给开追悼会，他说不要开，刘备不会杀他的家属。后来证实果然没有杀。是没有路走，回不去了嘛！"},{"type":"paragraph","text":"四川有七千万人口、四十万平方公里幅员。为什么刘备能在这里立国？蒋介石退也退到重庆，为什么？总有个道理嘛！"},{"type":"paragraph","text":"三"},{"type":"paragraph","text":"我研究土地革命，搞了十年，那是一九二七年前后几年的事。开始那个很不像样的纲领，到现在还保存着。取得打仗的经验，也花了十年的工夫。你看打仗，开始不就是几句话嘛！叫做“敌进我退，敌驻我扰，敌疲我打，敌退我追”。以后又发展了，什么“诱敌深入”，慢慢地就有了经验。现在取得经验，不需要那么长时间了。"},{"type":"paragraph","text":"内战期间，我们犯了错误，丢了南方，都跑到北方。不丢掉南方，我们就到不了北方，就不能建立那么多根据地。北方人口多，幅员广，大平原，不犯错误就不能来。看来犯错误也是有好处的，一犯错误就到了北方。陈独秀那个错误是不能不犯的，不犯错误，蒋介石不杀人，谁上山？我就不上山。一犯错误，蒋介石一抓人，大家就上山了。"}],"authors":["毛泽东"],"dates":[{"year":1964,"month":11,"day":26}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":276,"page_end":277},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"28bec017ae"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
