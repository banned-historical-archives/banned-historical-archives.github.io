script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"坚决不让垄断资本夺地　拿起武器进行反抗  巴西一些地区农民展开反剥削反掠夺斗争","authors":[],"dates":[{"year":1972,"month":9,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"坚决不让垄断资本夺地　拿起武器进行反抗"},{"type":"paragraph","text":"巴西一些地区农民展开反剥削反掠夺斗争"},{"type":"paragraph","text":"新华社一九七二年九月一日讯　巴西利亚消息：巴西一些地区的农民为了反抗垄断资本集团的残酷剥削和掠夺，不断开展各种形式的斗争。"},{"type":"paragraph","text":"据巴西报刊透露，由于巴西当局在北部和东北部地区实行所谓“开发”的政策和修建亚马孙公路，本国垄断资本和外国垄断资本集团在这些地区进行新的掠夺，占去了农民和印第安人的大片土地，强迫印第安人部落搬迁。据报道，圣保罗的一个苏伊亚—米苏基金会就占有八十八万公顷土地；美国的金氏农场占据了三十万公顷土地。《巴西日报》七月二十三日的一篇文章报道，伯南布哥州的百分之七十五的农民家庭由于失去土地而处于饥饿之中。在里约福尔莫索区，八十户农民坚决不让企业主夺走他们的八百公顷土地。另据《巴西日报》七月八日报道，马托格罗索州的三千有枪的沙万特族印第安人由于他们的土地被侵占而准备战斗。"},{"type":"paragraph","text":"在帕拉州，失去土地的农民在斗争中拿起武器展开了游击战。巴西当局派出了大批军队前往镇压，并且进行新闻封锁，严禁报刊报道这个州的农民武装反抗的消息。在巴西出版的《视界》杂志在六月五日一期上发表了一篇社论，谈到这个地区武装冲突的局势时说：“边远地区的殖民者和居民之间的冲突日趋频繁”，“这些冲突，例如在帕拉州和马托格罗索州发生的一些冲突，带有暴力的性质。”"},{"type":"paragraph","text":"据报道，帕拉州农民的武装斗争是在今年四月间从圣多明戈斯达斯拉塔斯村爆发的。这场斗争已经坚持了四个月，目前已扩大到阿拉瓜亚的圣若奥和康塞伊桑市镇等地区。他们的斗争，得到了戈亚斯州北部、马拉尼翁州西部和帕拉州南部的农民的支持和同情。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9ec1c00fb7"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
