script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoistlegacy.de-2050","name":"报刊宣传必须在政治上同中央保持一致","author":"中共中央宣传部","internal":false,"official":false,"type":"unknown","files":[],"article":{"title":"报刊宣传必须在政治上同中央保持一致","dates":[{"year":1981,"month":10,"day":13}],"is_range_date":false,"authors":["中共中央宣传部"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"中共中央宣传部, 宣传动态: 1981(选编), 359-361","tags":[],"parts":[{"type":"title","text":"中文"},{"type":"title","text":"报刊宣传必须在政治上同中央保持一致"},{"type":"paragraph","text":"人民日报编委会在学习思想战线问题座谈会文件中，检查了八月十四日发表《要认真杜绝个人崇拜》一文的错误。在这之前，《人民日报》已转载了《文汇报》的批评文章。这是对待错误的严肃态度。凡是宣传中发生了错误，都应该采取这样的态度。"},{"type":"paragraph","text":"党的十一届三中全会决定，报刊宣传和文艺作品要“多歌颂工农兵群众，多歌颂党和老一辈革命家，少宣传个人。”去年七月三十日，中央又发出了《关于坚持“少宣传个人”的几个问题的指示》，进一步阐明了这个方针。六中全会闭幕当天，胡耀邦同志又专门谈了这方面的问题。但是，这篇文章却对中央“少宣传个人”的方针提出非议，认为从理论原则说，这种提法是“不科学的”，如果正确地宣传个人，“那就不在乎多少”。这种说法显然是十分错误的。"},{"type":"paragraph","text":"少宣传个人，是根据历史唯物主义观点，防止个人崇拜的马克思主义的方针。英雄人物会对历史的发展起到推动作用，但归根到底，是人民群众创造历史而不是个别英雄人物创造历史。再伟大的个人和群众比较起来，毕竟是“沧海一粟”。因此，在宣传工作中，正确地反映个人和群众在历史上的作用，就要多宣传群众，多宣传集体，少宣传个人；而且在宣传个人的时候，要把它放在应有的、恰当的位置上。中央提出少宣传个人，就是从历史唯物主义的基本观点出发，指正确地宣传个人也要少，当然不包括错误地宣传个人在内，这是不言而喻的。这篇文章说如果错误地宣传个人，再少也不行。这是假设一个本来不存在的靶子然后去非难一番。这是似是而非的诡辩。不仅如此，如果象作者主张的那样，只要是“正确地”宣传个人，就“不在乎多少”，其结果，就会在所谓正确地宣传个人（不在乎多少）的借口下，使对个人的宣传大大泛滥起来，这还谈得上什么正确呢？可见，这篇文章不论在理论上、政治上都是错误的。这个错误给予我们的教训是，对于一篇文章、一个论点，不要被它的似是而非所迷惑，而要认真地检查一下它是否符合马克思主义的原理。"},{"type":"paragraph","text":"中央一再要求报刊宣传必须在政治上同中央保持一致。中央今年七号文件指出：“凡是涉及党的路线、方针、政策以及重大政治性的理论问题，对外必须统一于党的决定和口径，与党的步调一致，不得各行其是。”希望全国的报刊，在学习贯彻今年中央三十号文件中，都应以严肃认真的态度，对自己报刊上存在的问题，进行一次检查清理，开展批评与自我批评，总结经验教训。当然，对中央的决定、指示，不是不可以提出意见，但是必须按照组织原则在党内提出，决不能在报刊宣传中同中央的决定、指示相违背。否则，在政治上将会产生很坏的影响，也是党的组织纪律所不容许的。"},{"type":"paragraph","text":"（第58期，10月13日）"}],"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0aa0856bed"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
