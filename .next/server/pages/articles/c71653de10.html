script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"上海外语学院教育革命组联系本战线、本单位实际深入揭批“四人帮”　誓夺教育革命新胜利","authors":[],"dates":[{"year":1977,"month":2,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　上海外国语学院教育革命组的同志认真学习毛主席的光辉著作《论十大关系》和华主席在第二次全国农业学大寨会议上的重要讲话，联系本战线、本单位的实际，深入揭批“四人帮”疯狂破坏教育革命的罪行。"},{"type":"paragraph","text":"这个学院教育革命组的同志在抓教育革命的过程中，努力做到学好文件抓住纲。他们遵照华主席关于“通过切实的调查研究，总结历史的和无产阶级文化大革命以来的正反两个方面的经验”的指示，改变作风，深入调查研究。今年一月间，他们先后到各系参加各种类型的座谈会十六次，还召开了全院性的教育革命座谈会。同时，派人访问了一大批七五、七六届毕业生，了解对教育革命的意见。他们遵照毛主席《论十大关系》中的有关教导，分析和讨论了教育革命中的几个关系问题，特别是红与专的关系问题。"},{"type":"paragraph","text":"“四人帮”为了达到篡党夺权的反革命政治目的，肆意篡改毛主席制定的教育方针，鼓吹要培养所谓“头上长角，身上长刺”的“反潮流战士”，实际上是要培养为他们篡党夺权效劳的打手。狗头军师张春桥胡说:“宁要一个没有文化的劳动者，而不要一个有文化的剥削者、精神贵族”。“四人帮”竭力歪曲政治与业务的辩证关系，破坏红与专的关系，以批判“智育第一”为幌子，大搞愚民政策，搞得教师不敢教，学生不敢学，领导不敢抓教学。外语学院也深受影响。学生朗读外语，布置外语环境，开展外语通话，都被指责为“抢着外语书死啃，尽想红布袋装知识”；教师检查学生作业，找学生谈学习情况，又被说成搞“管卡压”、“搞拔尖”。弄得教师对学生不敢严格要求，自己也不敢钻研业务。正象毛主席在《论十大关系》中指出的:“现在，学英文的也不研究英文了，学术论文也不译成英文、法文、德文、日文同人家交换了。”外国语学院不重视外语，完全是“四人帮”倒行逆施，百般破坏，形而上学猖獗的后果。"},{"type":"paragraph","text":"该院教育革命组的同志在学习两个重要文件时，联系斗争实践，反复领会毛主席在《论十大关系》中提出的调动一切积极因素，建设强大社会主义国家的基本方针和华主席作出的抓纲治国的战略决策，认识到必须紧紧抓住揭批“四人帮”这个纲，一切服从抓纲治国的战略决策，才能步调一致，去夺取天下大治的新的伟大胜利。在院党委的统一领导下，他们抓纲带目，提出了新学期的教学工作打算，决心进一步加强学习，紧密联系实际，继续深入揭发批判“四人帮”阴谋篡党夺权，破坏教育革命的罪行。同时，领导深入教学第一线，充分调动师生的积极性，保证教学时间，合理安排教学活动，抓好教学和辅导工作，健全必要的合理的规章制度，把“一切积极因素调动起来，为社会主义事业服务”，努力搞好教育革命，夺取新的胜利。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"教育革命","type":"主题/事件"},{"name":"反潮流","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c71653de10"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
