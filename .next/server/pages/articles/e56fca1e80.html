script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"领导干部要站在斗争前列  昆明铁路局  昆明客运段党委加强领导带领群众反击右倾翻案风","authors":[],"dates":[{"year":1976,"month":3,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"领导干部要站在斗争前列"},{"type":"paragraph","text":"昆明铁路局昆明客运段党委加强领导带领群众反击右倾翻案风"},{"type":"paragraph","text":"据新华社昆明一九七六年三月二十四日电　在当前反击右倾翻案风的斗争中，昆明铁路局昆明客运段党委成员站在斗争前列，带领全段干部和群众，认真学习无产阶级专政理论，批判党内那个不肯改悔的走资派炮制的"},{"type":"paragraph","text":"“三项指示为纲”的修正主义纲领。"},{"type":"paragraph","text":"反击右倾翻案风的斗争开始以后，昆明客运段党委多次召开会议，统一党委“一班人”的思想认识。段党委还举办干部学习班，组织各级领导干部认真学习毛主席关于反击右倾翻案风的重要指示，加深认识这场斗争的性质和意义。经过学习，他们认识到，在反击右倾翻案风这样一场严竣的阶级斗争面前，领导干部要旗帜鲜明，立场坚定，站在斗争的前列，加强党的领导，带领群众积极战斗。"},{"type":"paragraph","text":"在干部先学一步的基础上，段党委和各党支部举办了七期学习班，培训了一百六十多名骨干，带动全段职工，利用批判会、大字报、专栏、黑板报等多种形式，开展大批判，把斗争的矛头直指党内那个不肯改悔的走资派。有的工人出乘回来后，放弃休息时间，抓紧学习无产阶级专政理论，积极参加批判会。女工李桂英文化水平低，自己写批判文章有困难。她晚上回家后，和全家人一起忆苦思甜，批判“三项指示为纲”的修正主义纲领，叫爱人整理成批判稿，在批判会上发言。职工们说，党内那个不肯改悔的走资派把文化大革命以来的大好形势说成是一团漆黑，抛出“三项指示为纲”的修正主义纲领，就是为了翻文化大革命的案，算文化大革命的帐，妄图复辟资本主义。但是，“翻案不得人心”。我们一定要针锋相对，彻底批判“三项指示为纲”，坚持以阶级斗争为纲，继续发展革命和生产的大好形势，进一步巩固无产阶级专政，使资产阶级的复辟阴谋不能得逞。"},{"type":"paragraph","text":"在反击右倾翻案风的过程中，昆明客运段党委把抓好理论学习放在首位。他们组织职工认真学习无产阶级专政理论，以马列主义、毛泽东思想为武器，把刮右倾翻案风的种种奇谈怪论与国内外新老修正主义头子的言论加以对照，列出若干专题，深入批判党内那个不肯改悔的走资派的修正主义路线。通过这样的专题剖析批判，职工们更加看清了党内那个不肯改悔的走资派否定党的基本路线，否定以阶级斗争为纲，反对无产阶级专政，妄图复辟资本主义的险恶用心。"},{"type":"paragraph","text":"随着反击右倾翻案风斗争的逐步深入，昆明客运段的干部、工人进一步提高了无产阶级专政下继续革命的觉悟。各级领导干部进一步转变作风，到列车班组和工人同学习、同批判、同劳动。广大工人坚持抓革命，促生产，在最近旅客增多，列车超员的情况下，努力做好列车服务工作，使全段到处呈现出一派生气勃勃的大好景象。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"革命大批判","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e56fca1e80"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
