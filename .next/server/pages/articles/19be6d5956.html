<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"山东农业生产合作社当前存在的问题","authors":[],"dates":[{"year":1954,"month":4,"day":14}],"is_range_date":false,"parts":[{"text":"山东农业生产合作社当前存在的问题","type":"title"},{"text":"【山东分社十四日讯】中共中央山东分局农村工作部在最近召集了一个地委和六个县委，座谈了当前农业生产合作社的情况。根据座谈会上汇报的材料，当前农业生产合作社中主要存在以下几个问题：","type":"paragraph"},{"text":"一、在不少农业生产合作社中，老中农占着主要的领导地位。据莒南县调查：五百五十七个正社长中，贫农(包括新中农，下同)三百二十人，中农二百三十七人；六百六十二个副社长中，贫农三百二十六人，中农三百三十六人；二千六百四十七个社务委员中，贫农一千二百六十八人，中农一千三百七十九人。曹县大马庄乡二十四个社的三十七个社长中，有地主一个，老中农二十二个，贫农十四个。由于老中农占主要领导地位，有些县的生产合作社已发生不卖余粮和排斥贫农的现象。农业生产合作社会计的成份则更为复杂，地主、富农或小商人在社里当会计的现象各地都有。","type":"paragraph"},{"text":"二、由于劳动组织和生产计划还未妥善解决，所以大部分社在生产管理上很混乱，窝工、误工的现象比较严重。据历城县的检查：各社每天大约要浪费两个到五个劳动力。清河乡的胜利农业生产合作社共四十多个劳动力，干了四十天活就浪费了一百七十多个二，社员形容社的情况是六乱、三慢、一大松。六乱是：记工评分乱、干活乱、合作社干部领导乱、使用牲口乱、出社入社乱、开会乱；三慢是：评工评到晚上十二点慢、早上起床慢、上地慢。因为六乱、三慢，有些社员已产生松劲情绪，有的社四天的生产计划八天才完成。特别是合作社干部忙于开会，参加劳动更少。莒南县寨子村农业生产合作社的八个社务委员，直到现在还没有到田里去做过活。这些情形已在社外农民中造成一些不良影响。","type":"paragraph"},{"text":"三、在新建社中还有不少遗留问题。历城县有一部分社还没有选出社务委员会。广饶县有个别社土地还没有评产作股。生产工具的使用报酬上遗留问题更多一些，有些还未确定使用方法和报酬；有些已确定但不合理。据了解有相当一部分社对耕畜是采用记工随劳动力分红的办法，而且工分评得较高。历城县八区的农业生产合作社规定牲口每干一天记十二分到十五分，因此无牲口的人宁愿自己挑粪而不愿用牲口驮粪。","type":"paragraph"},{"text":"在领导问题上，除了干部的政策水平和领导经验不能适应当前的任务和要求外，这次座谈会上比较突出的反映了两个问题：一、现在办社多了，同时照顾到对互助组的领导，因此必须改变过去那种几个干部捧一个社的领导方法，但究竟应该怎样贯彻对互助合作运动的全面领导，各地都希望有一个比较妥善的办法。二、部分地区干部已开始产生了前紧后松的情绪，认为社已经建立了，可以松一松了，因而放松了对组织农业生产合作社投入生产的领导。(陈雨明)","type":"paragraph"}],"comments":[],"origin":"1954年4月19日新华通讯社编《内部参考》。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"19be6d5956"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
