script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"首都三十万人齐集天安门广场隆重举行庆祝典礼  中华人民共和国中央人民政府成立  毛泽东主席宣读中央人民政府公告  朱总司令检阅海陆空军宣读人民解放军总部命令","authors":[],"dates":[{"year":1949,"month":10,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"首都三十万人齐集天安门广场隆重举行庆祝典礼"},{"type":"paragraph","text":"中华人民共和国中央人民政府成立  毛泽东主席宣读中央人民政府公告"},{"type":"paragraph","text":"朱总司令检阅海陆空军宣读人民解放军总部命令"},{"type":"paragraph","text":"【新华社北京一日电】中华人民共和国中央人民政府毛泽东主席，今日在新中国首都宣布中华人民共和国中央人民政府公告。这是在北京庆祝中华人民共和国中央人民政府成立的典礼上宣布的。典礼在北京天安门前举行，参加这个典礼的有中国人民政协全体代表和首都各工厂职工、各学校师生、各机关人员、市民、近郊农民和城防部队共三十万人。主席台设在天安门城楼上，面对着列满群众和飘扬满红旗的人民广场。当毛泽东主席在主席台上出现时，全场沸腾着欢呼和掌声。"},{"type":"paragraph","text":"下午三时，中央人民政府委员会秘书长林伯渠宣布典礼开始。中央人民政府主席、副主席、各委员就位，乐队奏义勇军进行曲，毛泽东主席宣布说：“中华人民共和国中央人民政府已于本日成立了。”毛主席亲自开动有电线通往广场中央国旗旗杆的电钮，使第一面新国旗在新中国首都徐徐上升。这时，在军乐声中，五十四门礼炮齐鸣二十八响。毛主席宣读中央人民政府公告（见另电）。"},{"type":"paragraph","text":"毛主席宣读公告完毕，阅兵式开始。阅兵式由人民解放军朱德总司令任检阅司令员，华北军区司令员兼京津卫戍区司令员聂荣臻将军任阅兵总指挥。朱总司令驱车检阅各兵种部队回到主席台上宣读人民解放军总部命令。受阅部队随即分列经主席台前由东向西行进，前后历时三小时。受阅部队以海军两个排为前导，接着是一个步兵师、一个炮兵师、一个战车师、一个骑兵师，相继跟进。空军包括战斗机、蚊式机、教练机共十四架在全场上空自东向西飞行受阅。在阅兵式中，全场掌声象波浪一样，一个高潮接着一个高潮。"},{"type":"paragraph","text":"阅兵式接近结束时，天色已晚，天安门广场这时变成了红灯的海洋。无数的彩色火炮从会场四周发射。欢呼着的群众在阅兵式完毕后开始游行。当群众队伍经主席台附近走出会场时，“人民共和国万岁！”“毛主席万岁！”的口号声响入云霄。毛主席在扩音机前大声地回答着：“同志们万岁！”毛主席伸出身子一再地向群众招手，群众则欢呼鼓掌，手舞足蹈，热情洋溢，不能自己。当游行的队伍都已有秩序地一一走出会场时，已是晚间九点二十五分。举着红灯游行的群众象火龙似地穿过全城，使新的首都浸在狂欢里直到深夜。（附图片）"},{"type":"paragraph","text":"毛主席宣读中央人民政府公告"},{"type":"paragraph","text":"朱德总司令阅兵"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"朱德","type":"人物"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1375bf8563"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
