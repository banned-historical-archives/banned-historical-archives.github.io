script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"太阳照到小“管庄”资产阶级思想阵地已被摧毁　政治、思想、工作开始改变面貌","authors":[],"dates":[{"year":1958,"month":3,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　本报2月5日批评的中央森林工业部上海林产化学试验室筹备处，经一个多月来有关领导部门的检查与整顿，基本上摧毁了以资产阶级思想为主导的局面，正气上升，工作也有了显著的改进。"},{"type":"paragraph","text":"上海市化学工业局所属化学原料工业公司为了加强对该室的领导，在上个月就派共产党员宁毓秀为林产化工厂筹备处主任，并兼林产化学试验室筹备处主任。一个多月来，该室在化工公司领导下进行了全面的检查。这个原来自由主义十分严重的小“管庄”，过去对各项政治运动从来无关，但这次双反运动之火也烧进了试验室，在很短时期内全室10多个人贴出了1300多张大字报，对试验室过去的无领导、无政治、无制度、无纪律、严重浪费国家财产的行为作了狠狠的批判，对个别工作懒散严重自由主义的工作人员也开展了批评与自我批评。有一张大字报上写着“试验室怎能缺乏党的专职同志来领导，更不应该让私方人员来支配行政和领导技术。”另一张大字报提出，今后室内要加强体力劳动，自己打扫清洁；定期举行室务会议，加强政治学习，开展批评工作；订立经济财务制度，加强财务管理。"},{"type":"paragraph","text":"试验室在政治面目上取得焕然一新以后，研究工作也有了新的跃进。原来该室在研究单宁、醋酸、酒精、樟脑等林产的综合利用方面，今年共提出17个课题，现在决定跃进增加为25个课题，目前，研究技术人员们在研究原有课题之外，正在为新厂的生产原料选择进行研究，并为新厂的建厂设计作进一步审查讨论。同时该室正积极争取有关单位建立联系协作关系。"},{"type":"paragraph","text":"试验室经过全面检查整顿以后，对各种器材作了处理，初步建立了财务、会计制度和办公请假制度。现在工作人员的政治学习已能经常举行，近一个时期来结合整改展开讨论，对1300张大字报基本上作了处理。每一个工作人员都订出了红专规划，其中除了个别私方人员外，绝大部分都提出要加速改造自己，今后并争取入党。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"840593c570"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
