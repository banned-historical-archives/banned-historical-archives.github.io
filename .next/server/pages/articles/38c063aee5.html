script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"认真学习马克思主义，彻底批判修正主义","authors":["干福熹"],"dates":[{"year":1973,"month":9,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"中共上海光机所委员会委员　干福熹"},{"type":"paragraph","text":"王洪文同志在关于修改党章的报告中指出:“学习马克思主义，批判修正主义，是我们加强党的思想建设的一个长期任务。”同时，十大通过的新党章，在共产党员必须做到的五条和党的基层组织的五项任务中，都规定要认真学习马克思主义、列宁主义、毛泽东思想，并且新加上了要批判修正主义的内容，这是坚持无产阶级专政下继续革命的需要，是实现党的基本纲领的需要，也是我们广大党员和革命人民的历史使命。"},{"type":"paragraph","text":"毛主席总结了党内十次路线斗争的经验，特别是粉碎了林彪反党集团的斗争经验，向我们提出了“要搞马克思主义，不要搞修正主义；要团结，不要分裂；要光明正大，不要搞阴谋诡计”的三项重要原则，这是判别正确路线和错误路线的标准。我认为，三项重要原则中，最基本的是要搞马克思主义，不要搞修正主义。在无产阶级夺取政权以后，国内被打倒的地主、资产阶级和国际上的帝、修、反，都不会甘心于他们的失败，他们总是要在我们党内寻找象刘少奇、林彪这类修正主义分子，作为他们的代理人。“修正主义上台，也就是资产阶级上台。”我们要坚持无产阶级专政，防止(9月9日2版更正为“保证”)党不变质，国不变色，就要不断地批判修正主义，用马克思主义战胜修正主义。修正主义是一种资产阶级思潮，它仍然是当前的主要危险。特别是在上层建筑领域内，批判修正主义的斗争还远没有结束，只要资产阶级和帝国主义还存在，就会有修正主义出现。在我们科技领域内，两个阶级、两条路线、两种思想的斗争也是十分尖锐和复杂的，在无产阶级文化大革命中，广大科研人员对“三脱离”、“名利挂帅”、“个人奋斗”、“技术第一”、“专家路线”等修正主义货色进行了批判，明确了科研为无产阶级政治服务、为生产服务的方向，焕发了革命精神，取得了新的成果。但是，林彪、陈伯达的修正主义的流毒和旧的习惯势力还会通过各种伪装形式冒出来，因此，我们要坚持马克思主义，就要坚持批判修正主义，这个任务仍然十分艰巨，斗争还要继续下去。"},{"type":"paragraph","text":"在复杂的阶级斗争情况下，要站稳无产阶级的立场，同各种修正主义思潮作斗争，就必须刻苦攻读马列和毛主席著作，提高识别能力，同时，不断批判资产阶级世界观，加强自己世界观的改造，发扬大无畏的革命精神，敢于抵制修正主义思潮。"},{"type":"paragraph","text":"我作为一个战斗在科技战线上的共产党员，决心认真学习马克思主义，不断批判修正主义，坚持毛主席的革命路线，贯彻十大精神，为推动我们的科学研究工作不断向前发展，赶超世界先进水平而奋斗。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"林彪","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"38c063aee5"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
