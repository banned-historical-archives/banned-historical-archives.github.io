" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共中央关于西北区普选中处理老区、半老区地主、富农阶级成分问题给西北局的批复","authors":[],"dates":[{"year":1954,"month":2,"day":13}],"is_range_date":false,"parts":[{"text":"中共中央关于西北区普选中处理老区、半老区地主、富农阶级成分问题给西北局的批复","type":"title"},{"text":"西北局并告华北局、东北局、华东局、中南局：","type":"appellation"},{"text":"12月16日《关于西北区普选中对改变老区地主、富农成分及改变半老区地主富农成分问题的意见》电悉。","type":"paragraph"},{"text":"中央同意在老区、半老区即1935年和1947年进行过土地改革的地区，在这次普选中所提的有关处理地主、富农的阶级成分问题的各项原则，惟在具体做法上请注意以下几点：","type":"paragraph"},{"text":"一、审查选民资格，势必涉及地主、富农的改变成分问题，但在做法上仍应采取以确定选民资格为主，从中体现改变地主、富农成分的方式，不必采取以普遍审定地主、富农成分为主，再确定选举权的做法。因为突出地普遍审查地主、富农成分，容易形成运动，不但拖延了时间，冲淡了选举，而且掌握上费力大，易出偏差。","type":"paragraph"},{"text":"二、普选中改变地主、富农成分的法定手续问题，由群众公议，乡选举委员会审查批准即可，只公布选民榜，不必另公布改变成分的榜。这样做，既简便易行，也可达到发动群众，划清阶级界限的目的。在规定选民资格问答第四条时，曾考虑到各乡人民代表大会尚未召开，一律送县批准，也确有困难的情况，故定为依“法定手续”改变成分，这样的规定是可以机动的，上述做法也是合乎《选举法》第39条的规定的。","type":"paragraph"},{"text":"三、外区逃来地主改变成分的处理问题，除同意对具备了条件，合于规定年限，和一时无法搞清的地主、富农均给予选举权利的意见外，对少数过去有罪恶及一时无法弄清其成分，群众也不同意给予选举权利者，可以不给选举权利（也不确定其成分）。在老区半老区考虑旧地主、富农分子的选举权利问题时，群众的意见是一项很重要的因素，无论是本地的地主、富农分子或迁居逃亡来的地主、富农分子，凡多数群众不同意给以选举权利者，均应不给以选举权利。","type":"paragraph"},{"text":"四、在落后乡执行时，更应特别考虑到群众优势确立的程度，更多地照顾到群众的意见，慎重处理，以免被动。","type":"paragraph"},{"text":" 中央1954年2月13日","type":"paragraph"}],"comments":[],"origin":"根据文件的原件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8f1ed1f26a"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
