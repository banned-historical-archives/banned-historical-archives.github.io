<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"斗争正在开始深入","authors":["《人民日报》社论"],"dates":[{"year":1957,"month":7,"day":8}],"is_range_date":false,"parts":[{"text":"斗争正在开始深入","type":"title"},{"text":"《人民日报》社论","type":"authors"},{"text":"我国人民群众反击资产阶级右派分子的斗争，现在正在开始向深入发展。开始深入的标志是：广大的工人、农民、青年学生、革命的知识分子、拥护社会主义的工商业者的觉悟大大提高了，积极地投入了反对右派的斗争；各民主党派、各高等学校、各机关对本单位的右派分子，陆续地展开了严肃的批判和揭露；右派分子已经陷入被动和孤立，右派的许多堡垒已经开始被攻破。右派在全国范围内最重要的指挥机关章罗联盟，在各方面的围攻之下，内幕已经开始暴露。在新闻界方面，罗隆基—浦熙修—文汇报编辑部这样一个民盟右派系统，也已经无法掩藏自己的秘密了。","type":"paragraph"},{"text":"由于斗争开始深入，由于右派的真面目进一步暴露，许多原来不相信有什么右派、或者不认为反对右派有什么必要的人们，现在在大吃一惊之后，也逐渐改变态度了。他们开始认识到，右派确实存在，确实在进行着反对社会主义革命、反对社会主义建设的活动，确实是人民事业的心腹之患。人民的国家是巩固的，但是它之所以巩固，当然不是因为它对于敌对性的活动熟视无睹，而是因为它经常对于这些活动保持警惕。为了提高广大群众的警惕，为了提高广大群众的革命觉悟和革命积极性，单单依靠正面的教育是不够的，还必须依靠反面的教育。右派分子的反对社会主义的言行，对于广大群众就是最好的活生生的反面的教材。","type":"paragraph"},{"text":"但是斗争还只是开始深入。右派的阴谋还远没有完全揭穿。对于右派谬论的有系统的反驳，也还只是在开始进行。正因为这样，有一部分处在中间状态的人们，对于反对右派的斗争还在将信将疑，还在抱着观望态度。他们在心里盘算着：欲知后事如何，且听下回分解。有一些人甚至以为：这是不是共产党受不了批评，不想再整风了，因而转移了目标呢？为了说服这些人，必须完全揭穿右派的阴谋，完全驳倒右派的谬论。而要达到这个目的，就必须使斗争继续深入下去。","type":"paragraph"},{"text":"为了使斗争继续深入，现在需要防止两种倾向。","type":"paragraph"},{"text":"一种倾向是对于右派分子的温情主义。抱着这种倾向的人竭力原谅右派分子，把右派分子描写成为中间分子，把他们的错误的言论行动描写成为偶然的疏忽、修辞上的夸张、被人利用等等，不愿意同他们分清界限，更不愿意对他们进行坚决的斗争。这种倾向显然妨碍着反右派斗争的发展，妨碍着群众觉悟的提高。温情主义者生怕伤害了右派，但是他们为什么不看到，右派分子的言论行动是怎样地伤害了人民的事业呢？为什么他们对于右派分子那样多情，对于人民的事业却这样寡情呢？而且，我们已经说过，除了屡犯不改，继续进行破坏活动，触犯刑律的以外，对于一般右派分子，惩前毖后，治病救人，化消极因素为积极因素，这些原则还是适用的。因此，目前的反右派斗争对于人民的社会主义事业固然完全必要，就是对于一般右派分子说来，也是他们痛改前非、洗心革面的一个机会。温情主义者的养癕贻患的立场，无论从哪一方面说来，都是完全错误的。","type":"paragraph"},{"text":"另一种倾向是对斗争的指导采取急躁粗暴的态度，希图用简单的方法“速战速决”。反对右派的斗争要求对于右派进行充分的揭露和彻底的批判。批判需要依靠有分析的、有说服力的、经得起反驳的说理，揭露需要依靠确凿的、经得起检查的事实。为了说明某些右派分子目前的反社会主义的言行并非出于偶然，而是有一定的历史根源，追溯他们的过去的若干事实是有教育意义的，但是揭露的重点仍然应该着重在目前。总之，急躁粗暴，简单从事，是不能解决问题的。有些单位，不让犯错误的人进行答辩或者保留自己的意见，不给犯错误的人指明出路，或","type":"paragraph"},{"text":"者对犯错误的人轻率地作出组织上的处理，这些办法都不利于斗争的深入。斗争的深入当然需要时间。斗争将依重点的转移形成不同的段落，在这些段落之间还会要有一些间歇。欲速则不达，在思想性质的问题上特别不能急躁。我们应该准备付出必要的时间，而不应该过低地估计斗争的复杂性艰苦性，满足于表面的暂时的效果，草率收兵。在斗争的过程中，既要坚决勇敢，又要认真调查研究，严格分清是非轻重，采取正确的说理的方法，避免一切可以避免的错误。只有这样，才能够真正达到团结和教育最大多数而击败少数右派分子的目的。","type":"appellation"},{"text":" ---- 原载《人民日报》1957年7月8日","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dfa3313f4e"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
