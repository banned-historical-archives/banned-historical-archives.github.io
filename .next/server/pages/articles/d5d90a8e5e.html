<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"wenji1","type":"pdf","name":"毛泽东文集第一卷（1999）","internal":false,"official":true,"author":"中央文献研究室","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/wenji1.pdf"],"article":{"title":"在中央紧急会议上的发言","description":"","dates":[{"year":1927,"month":8,"day":7}],"parts":[{"text":"在中央紧急会议上的发言","type":"title"},{"type":"paragraph","text":"国际代表报告的全部是很重要的。第一，国民党问题在吾党是很长久的问题，直到现在还未解决。首先是加入的问题，继又发生什么人加入，即产业工人不应加入的问题。实际上不仅产业工人，即农民都无决心令其加入。当时大家的根本观念都以为国民党是人家的，不知它是一架空房子等人去住。其后像新姑娘上花轿一样勉强挪到此空房子去了，但始终无当此房子主人的决心。我认为这是一大错误。其后有一部分人主张产业工人也加入，闻湖北亦有此决定，但仅是纸上空文，未能执行。过去群众中有偶然不听中央命令的抓住了国民党的下级党部，当了此房子的主人翁，但这是违反中央意思的。直到现在，才改变了策略，使工农群众进国民党去当主人。第二，农民问题。农民要革命，接近农民的党也要革命，但上层的党部则不同了。当我未到长沙之先，对党完全站在地主方面的决议无由反对，及到长沙后仍无法答复此问题，直到在湖南住了三十多天，才完全改变了我的态度。我曾将我的意见在湖南作了一个报告，同时向中央也作了一个报告，但此报告在湖南生了影响，对中央则毫无影响。广大的党内党外的群众要革命，党的指导却不革命，实在有点反革命的嫌疑。这个意见是农民指挥着我成立的。我素以为领袖同志的意见是对的，所以结果我未十分坚持我的意见。我的意见因他们说是不通于是也就没有成立，于是党的意见跟着许克祥走了。甚可怪的，唐军还仅承认只有八处军官家庭被毁，我党反似乎承认不知有多少军官家庭被毁。总之，过去群众对于党的领导的影响太少。第三，对军事方面，从前我们骂中山专做军事运动，我们则恰恰相反，不做军事运动专做民众运动。蒋、唐都是拿枪杆子起的，我们独不管。现在虽已注意，但仍无坚决的概念。比如秋收暴动非军事不可，此次会议应重视此问题，新政治局的常委要更加坚强起来注意此问题。湖南这次失败，可说完全由于书生主观的错误，以后要非常注意军事。须知政权是由枪杆子中取得的。第四，组织问题。以后上级机关应尽心听下级的报告，然后才能由不革命的转入革命的。"},{"type":"paragraph","text":"根据人民出版社一九八六年出版的"},{"type":"paragraph","text":"《毛泽东著作选读》刊印。"}],"comment_pivots":[{"part_idx":0,"offset":11,"index":1},{"part_idx":1,"offset":4,"index":2},{"part_idx":1,"offset":551,"index":3},{"part_idx":1,"offset":560,"index":4},{"part_idx":1,"offset":661,"index":5},{"part_idx":1,"offset":780,"index":6}],"is_range_date":false,"authors":["毛泽东"],"comments":["这是毛泽东一九二七年八月七日在汉口举行的中共中央紧急会议（八七会议）上的一次发言。一九二七年四月和七月，蒋介石和汪精卫相继背叛孙中山所决定的国共合作政策和反帝反封建政策，残酷屠杀共产党人和革命人民，第一次国内革命战争归于失败。八七会议在中国革命的这个紧急关头，坚决地纠正了和结束了陈独秀的右倾投降主义，确定了实行土地革命和武装反抗国民党反动派屠杀政策的总方针。","国际代表，指罗米那兹（一八九八——一九三四），苏联人。一九二七年七月下旬他作为共产国际代表来到中国，在八月七日召开的中共中央紧急会议上作了关于党的过去错误及新的路线的报告。","许克祥（一八九一——一九六七），湖南湘乡人。一九二七年春任国民革命军第三十五军第三十三团团长。同年五月二十一日（马日），他在长沙发动反革命事变，捣毁湖南省总工会、省农会及其他革命团体，捕杀共产党人和革命群众。","唐，指唐生智（一八八九——一九七○），湖南东安人。一九二七年四月任国民革命军第一集团军第四方面军总指挥，不久改任第四集团军总司令。","蒋，指蒋介石。唐，指唐生智。","一九二七年八月十八日，毛泽东在中共湖南省委第一次会议上的发言对这个思想作了进一步的阐述。他说：一、湖南的秋收暴动的发展，是解决农民的土地问题。这是谁都不能否认的。但要发动暴动，单靠农民的力量是不行的，必须有一个军事的帮助。有一两团兵力，暴动就可起来，否则终归于失败。二、暴动的发展是要夺取政权。要夺取政权，没有兵力的拥卫或去夺取，这是自欺的话。我们党从前的错误，就是忽略了军事。现在应以百分之六十的精力注意军事运动，实行在枪杆子上夺取政权，建设政权。"],"page_start":59,"page_end":60,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d5d90a8e5e"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
