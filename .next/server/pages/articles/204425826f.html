script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"赫鲁晓夫的阴魂不散  苏联许多刊物和书店继续大量推销赫鲁晓夫修正主义的货色，并且进行反华煽动","authors":[],"dates":[{"year":1965,"month":2,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"赫鲁晓夫的阴魂不散"},{"type":"paragraph","text":"苏联许多刊物和书店继续大量推销赫鲁晓夫修正主义的货色，并且进行反华煽动"},{"type":"paragraph","text":"新华社莫斯科二十六日电　最近出版的苏联《政治自学》、《武装力量共产党人》、《白俄罗斯共产党人》、《苏维埃拉脱维亚共产党人》、哈萨克共和国《党的生活》等杂志，公开把一些反华文件和书籍列为政治学习的文件，向苏联人民继续进行反华煽动。这些反华文件和书籍中有苏共中央一九六三年七月的公开信、苏共中央一九六四年二月全会的决议、苏斯洛夫在苏共中央二月全会上的反华报告、最近发行的由波诺马廖夫主编的攻击中国共产党的《工人阶级的国际革命运动》书籍等。"},{"type":"paragraph","text":"一月二十七日付印的苏共中央杂志《政治自学》一九六五年第二期在“对宣传员的辅导”栏中，刊登两篇供读者学习的文章：《马克思列宁主义关于群众和个人在历史过程中的作用的学说》、《现阶段资本主义国家的工人阶级斗争》。在这两篇文章后面，分别把苏联政治书籍出版局去年六月初出版的反华文集《争取国际共产主义运动的团结》，和这一文集中的以下文件，即苏共中央公开信、苏共中央一九六四年二月全会的决议、苏联政府一九六四年五月四日就第二次亚非会议发表的声明，列为学习上述两篇文章的“阅读文件”。这些文集和文件大肆宣扬赫鲁晓夫的现代修正主义观点，并对中国共产党、中国政府和中国领导人极尽诬蔑诽谤之能事。此外，这家杂志编辑部还要读者在学习前述第二篇文章时阅读苏斯洛夫在苏共中央二月全会上的反华报告的第二部分——“战争、和平与革命问题”。苏斯洛夫报告的这一部分多次指名攻击了中国党和国家的领导人毛泽东、刘少奇和周恩来，诬蔑中共和中国领导人“用靠‘战争’来推动革命”、“‘为了革命’准备同意消灭人类一半”、“扩大中印边界的武装冲突”、“急剧恶化同印度的关系”等等。"},{"type":"paragraph","text":"最近出版的苏联《武装力量共产党人》杂志第四期，在政治学习栏中发表题为《马克思列宁主义论社会主义与共产主义建设规律》的文章，并把苏斯洛夫的反华报告的第五部分——“中共领导人对苏共纲领的攻击”列为阅读文件。苏斯洛夫在报告的这一部分中百般为苏共二十二大通过的苏共纲领辩护，宣扬“全民党”、“全民国家”等谬论，同时对中国共产党对上述修正主义观点的正确批判进行了攻击。"},{"type":"paragraph","text":"《白俄罗斯共产党人》杂志一九六五年第一期在“‘白俄罗斯共产党人’讲坛”栏中刊登一篇题为《在资本国家中的阶级斗争》的文章，也把苏斯洛夫的反华报告和由波诺马廖夫主编的《工人阶级的国际革命运动》一书列入阅读文件的目录，这本书系统地宣扬了赫鲁晓夫的谬论，并对中国共产党进行了全面的攻击。"},{"type":"paragraph","text":"《苏维埃拉脱维亚共产党人》今年第一期和第二期，哈萨克共和国《党的生活》杂志今年第二期，也都把苏联去年出版的反华文集《争取国际共产主义运动的团结》、苏斯洛夫的反华报告等列为政治学习的文件。"},{"type":"paragraph","text":"除在中央和地方杂志上公开向读者推荐反华书籍和文件外，苏联各地书店几个月来一直未中断出售反华书籍和反华小册子。目前，在莫斯科各书店中大量出售的这类反华材料中就有：苏斯洛夫的反华报告，苏共中央一九六三年七月的公开信，苏共中央机关刊物《共产党人》杂志一九六四年第十一期发表的诬蔑中国共产党“压制民主”、实行“个人迷信”的编辑部文章——《共产主义是人道主义的最高体现》，苏共中央《党的生活》杂志一九六四年第十一期刊载的诬蔑中共“分裂国际共产主义运动”的编辑部文章——《反对分裂主义者，争取共产主义运动的团结》等。甚至当二月十三日莫斯科各界在工会大厦圆柱大厅举行庆祝中苏友好同盟互助条约签订十五周年大会时，圆柱大厅内的书亭中还摆着反华小册子在出售。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"204425826f"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
