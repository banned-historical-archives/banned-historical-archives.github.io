script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共中央、中央文革小组关于完成今年《毛泽东选集》出版任务的通知","authors":[],"dates":[{"year":1967,"month":10,"day":27}],"is_range_date":false,"parts":[{"text":"中共中央中央文革小组关于完成今年《毛泽东选集》出版任务的通知","type":"title"},{"text":"各省（市）革命委员会（筹备小组）、各级军区、各军管会、各革命群众组织：","type":"appellation"},{"text":"今年初，中央批准全年印刷《毛泽东选集》八十万部的计划、是全国人民的大喜事。完成这一计划是一项头等重大的、光荣的政治任务，这对大树特树毛泽东思想的绝对权威，对于推动当前无产阶级文化大革命的胜利发展，具有深远的意义。","type":"paragraph"},{"text":"接受印刷《毛泽东选集》任务的单位和部门，怀着对我们伟大领袖毛主席和光焰无际的毛泽东思想的无限热爱、无限忠诚、无限崇拜的心情，积极地印刷《毛泽东选集》。一至九月份已经出五千六百三十多万部，完成全年计划的百分之七十多。多数单位完成全年计划好不但速度快、而且质量高，但也有单位由于各方面原因完成得不够好，甚至个别地区，个别单位只完成全年计划的百分之二十左右，这样就给完成全年计划带来了影响。","type":"paragraph"},{"text":"现在距年终只有两个多月的时间了、时间紧、任务重，中央要求你们，更高地举起毛泽东思想伟大红旗，以“斗私批修”为纲，活学活用毛主席著作，加强领导，加强协作，保证质量，高速度地印刷革命宝书《毛泽东选集》保证完成全年八千万部的出版计划。","type":"paragraph"},{"text":" 中共中央中央文革小组一九六七年十月二十七日","type":"paragraph"}],"comments":[],"origin":"根据《中共中央文件汇编，1966.5-1968.5 [内部参考]》，1968年5月出版，编印者不明","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"中央文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0e039f95ff"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
