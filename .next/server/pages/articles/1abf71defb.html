" crossorigin="">{"props":{"pageProps":{"books":[{"id":"45f85d41-2767-49bc-87e9-ba331b429fce","name":"毛泽东思想万岁（1961年-1968年）","internal":true,"official":false,"type":"pdf","author":"","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives3/main/45f85d41-2767-49bc-87e9-ba331b429fce.pdf"],"article":{"title":"《中央对武汉军区的复电》","alias":"","parts":[{"type":"paragraph","text":"关于湖南军区的龙书金"},{"type":"paragraph","text":"(--九六七年七月）"},{"type":"paragraph","text":"这个人是否还可以用？你们要讲究斗争策略，你们水平怎么这么低，也不研究-下。据我了解，这个人打仗很勇敢：我对打仗很勇敢的人还是很尊重的。他犯了错误当然可以批判，但既然他表示愿意改：就应给他机会，不要太过分。你们这样做，不能争取别人同情。"},{"type":"paragraph","text":"关于教育革命的指示"},{"type":"paragraph","text":"（一九六七年七月）"},{"type":"paragraph","text":"上海的形势是好的。大学、中学、小学如何搞好教学改革，上海是否可以了解一些情况，搞些调查研究，创造-些典型材料。"},{"type":"paragraph","text":"×"},{"type":"paragraph","text":"x"},{"type":"paragraph","text":"×"},{"type":"paragraph","text":"（大学斗批改）一种可能是彻底翻身，一种可能是走回头路，一种可能是改良，能否在下阶段打硬仗了。"},{"type":"paragraph","text":"斗批就是破，改就是立。这次教育革命一定要彻底改革，否则是改良，和过去-一样，到后来是改不下去的。"},{"type":"paragraph","text":"过了夏天屁股要坐下来。"},{"type":"paragraph","text":"X"},{"type":"paragraph","text":"×"},{"type":"paragraph","text":"x"},{"type":"paragraph","text":"中学文化大革命要走向正规。军训还要搞，中学的无政府主义思潮比较严重，复课革命，有的单位搞得好，有的单位搞得不好。这是关系到革命问题，对于大学生来讲，是关系到把青年人培养成接班人，变不变色的问题。"},{"type":"paragraph","text":"《中央对武汉军区公告的复电》"},{"type":"paragraph","text":"：（一九六七年七月二十五日）林、周、中央文革小组："},{"type":"paragraph","text":"拟复电如下，请讨论酌定。"},{"type":"paragraph","text":"毛泽东一、你们现在所朵取的立场和政策是正确的，公告可以发表。"},{"type":"paragraph","text":"二、对于犯了严重错误的干部，包括你们和广大革命群众所要打倒的陈再道同志在内，只要他们不再坚持错误，认眞改正，并得到群众谅解了以后，仍然可以站起来参加革命行列。"},{"type":"paragraph","text":"三、要向思想不通的某些人员和百万雄师群众做工作，使他们转变过来。·320·四、要向左派作工作，不要乘机报复。五、要警惕坏人捣乱，不许破坏社会秩序。"},{"type":"paragraph","text":"对武汉事件的指示"},{"type":"paragraph","text":"(一九六七年七月)本来军内的问题没有机会解决，武汉问题发生了，就有机会解决了，机会是他们给的。"},{"type":"paragraph","text":"x×"},{"type":"paragraph","text":"+"},{"type":"paragraph","text":"全国都应该从武汉事件中学习。全国支持武汉地区，武汉地区的斗争推动了全国的工作。一年来发生了天翻地复的变化，当然有点乱。这里乱那里也乱，没有什么关系。象武汉这是很好的事，矛盾暴露了就好解决。"},{"type":"paragraph","text":"武汉一-小人的叛变行为可以使全国的解放军、革命造反派、群众组织从中得到教育。这次文化大革命损失是最小最小最小的，成绩是最大最大最大的。"},{"type":"paragraph","text":"×"},{"type":"paragraph","text":"x"},{"type":"paragraph","text":"+对“百万雄师”一个也不抓，几个坏头头让他们自己检举。"},{"type":"paragraph","text":"关于“八一”建军节的指示"},{"type":"paragraph","text":"（→九六七年七月）"},{"type":"paragraph","text":"“八一”不能改，这是很重要的一天。我们打响了第一枪，为井岗山的斗争揭开了序幕。"},{"type":"paragraph","text":"这个问题是历史问题，历史问题是不容倒的。"},{"type":"paragraph","text":"为一九六七年七月卅日《人民日报》"},{"type":"paragraph","text":"社加的一句话"},{"type":"paragraph","text":"(一九六七年七月）团结一致，同心同德，任何强大的敌人，任何困难的坏境，都会向我们投降的。"},{"type":"paragraph","text":"321"}],"authors":["毛泽东"],"dates":[{"year":1967,"month":7,"day":25}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":333,"page_end":334},"tags":[{"name":"毛泽东","type":"人物"},{"name":"中央文革","type":"人物"},{"name":"武汉地区无产阶级革命派百万雄师联络站（百万雄师）","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"教育革命","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1abf71defb"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
