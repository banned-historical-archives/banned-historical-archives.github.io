" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"内蒙古不少文艺干部有胡风思想和类似胡风思想的思想","authors":["师海云"],"dates":[{"year":1955,"month":7,"day":19}],"is_range_date":false,"parts":[{"text":"内蒙古不少文艺干部有胡风思想和类似胡风思想的思想","type":"title"},{"text":"师海云","type":"authors"},{"text":"【内蒙古分社十九日讯】中共内蒙古自治区委员会宣传部最近召开的扩大部务会议，检查了文艺界负责干部的胡风思想和类似胡风思想的思想，在检查中发现有如下几种错误思想：","type":"paragraph"},{"text":"一、存在着严重的脱离为政治服务和忽视普及的倾向，这一倾向集中地表现在一些文艺负责干部对待编写解放台湾演唱材料的问题上。内蒙古文联一些负责干部采取了拒绝为这一任务服务的态度，他们强调“临时任务紧，事先不能预见到，没有感受不能创作”“赶任务就会粗制滥造”等。他们还认为这是领导上“出题作文，定期交卷”，“逼着结婚，按期生孩子”，“不照顾文艺的特殊性”；并抓住宣传部领导上的个别语句，夸大成为“提倡公式化、概念化”“是路线错误”，散布不满情绪；当“内蒙古文艺”刊登的几篇诗歌受到批评后，即幸灾乐祸的说：“看!这是赶任务的结果。”","type":"paragraph"},{"text":"二、轻视和抗拒党的领导。一些文艺领导干部认为“没有创作，就不能领导文艺，宣传部领导不懂文艺，就很难领导文艺。”他们还以自由讨论来回避党的领导。如内蒙古歌舞剧团的方针任务已经由文委党组决定，但“内蒙古文艺”上还讨论这个问题。文艺领导干部之间、部门之间、学员与党员之间、党员与非党员之间存在互相猜忌、互相不满的现象。部分文艺干部不愿意参加宣传部召开的会议，不愿意参加理论学习，认为这些对他们工作关系不大。","type":"paragraph"},{"text":"三、对待反胡风反革命集团斗争的态度不积极。有的文艺干部在批判唯心主义思想数次演讲中，只听了一次讲；“内蒙古文艺”三、四、五、六月号上只转载了一篇有关的文章。最严重的是在胡风反革命集团第一批材料发表后，还把早在一个月以前就写好的一篇批判胡风(还称为胡风先生)的文章送报社发表了，内蒙古文联副主任陈清璋在讲稿中也称胡风先生。在反胡风斗争开始时，受胡风思想影响较严重的漠南说：“胡风千错万错，创作的甘苦我是知道的。”“胡风问题没甚了不起的，理论问题一解决，其他问题也都解决了。”“领导上(指宣传部领导)提倡公式化，概念化和撤消文艺两件事告到中央也有理由。”“漠南还认为反革命分子胡风有好的一面”。如说“阎副部长演讲中不说好的一面是否也是唯心主义”。","type":"paragraph"},{"text":"上述错误思想，现正展开批判中。","type":"paragraph"},{"text":"(根据内蒙古党委反胡风反革命集团斗争办公室简报编)","type":"paragraph"}],"comments":[],"origin":"1955年7月25日新华通讯社编《内部参考》。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"de40713f12"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
