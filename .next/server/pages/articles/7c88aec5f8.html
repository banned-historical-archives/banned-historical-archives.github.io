" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共中央关于为京、津、沪和辽宁调运粮食的紧急指示","authors":[],"dates":[{"year":1960,"month":6,"day":6}],"is_range_date":false,"parts":[{"text":"中共中央关于为京、津、沪和辽宁调运粮食的紧急指示","type":"title"},{"text":"各省、市、自治区党委：","type":"appellation"},{"text":"粮食部党组报告，京、津、沪和辽宁的大工业城市的粮食库存非常薄弱。北京只够销七天，天津只够销十天，上海大米已经没有库存，随调随销，天天告急，辽宁十个主要工业城市只够销八九天。中央要求各地立即采取一切有效措施，支援京、津、沪、辽和出口。抢时间，抢任务，把一切需要调运和能够调运的粮食尽快地集运外调，把粮食调运放到运输工作的第一位。中央责成粮食部全权负责，哪里有粮食，就把那里的粮食优先发运，迅速改变京、津、沪、辽这种供应紧张，临于脱销的严重情况。","type":"paragraph"},{"text":" 中  央一九六O年六月六日","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7c88aec5f8"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
