script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"太岳、冀鲁豫、北岳区党委　纠正纠左中右倾错误","authors":[],"dates":[{"year":1948,"month":11,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"太岳、冀鲁豫、北岳区党委"},{"type":"paragraph","text":"纠正纠左中右倾错误"},{"type":"paragraph","text":"【新华社华北十日电】太岳、冀鲁豫、北岳三区党委，揭发土地改革纠偏工作中某些右倾的严重错误。太岳区翼城县北丁村（自然村）共一百九十三户，八零七人，耕地四七八六亩，总平均每人土地四·九三亩。土改中被斗二十四户，误斗者占十四户。其中扫地出门者三户，仍保持中农生活者十一户。此次纠采取自上而下动员群众赔偿误斗户，“不管有无问题，一律全部退还”。群众特别是贫农不同意这种做法，但未被领导干部所接受。结果，三十二户中农退出土地七二·九五亩，牲口一头半，大车四辆，农具五十六件，衣服十三件；七十户贫农退出土地二四零亩，牲口九头半，大车两辆，农具二零九件，衣服四十一件。外加公地四六·一亩，亦拨为补偿之用。补偿后八户翻身贫农又降为赤贫；四户新中农降为贫农；另有五户农民所有土地均在五亩以下。而一户地主，两口人，每人占有土地十亩，超过全村平均数一倍；九户富农，四十五口人，每人平均占地四·九五亩，但产量超过贫农半倍。有三户富农划成了中农。改定成份时贫雇农不提意见，与误斗户对立。有些贫农退还东西后生活困难，村中积存果实尚有粮食二十石，款三十五万元，牲口一头半，却不分给他们，因此情绪甚为低落。冀鲁豫聊阳县王化村（半老重点村）一百二十五户，被斗十三户，其中两户地主及两户富农只拿出部分浮财，中农被斗者一般未影响其经济地位，生活仍超过贫农。党员及群众均认为不必补偿、安置，而工作组干部采取了“一脚踢开”的方针，另行成立农代会，进行补偿安置工作。对于贪污分子许金重，群众不愿补偿，工作组干部却认为“假如他贪污一百五十斤，反贪污时罚了二百斤，就要补他五十斤”。并召开“自报大会”，动员贫农退出果实。贫农军属张永成将分得的东西全部拿出来，说：“该穷还是穷”。村干部拿出东西，工作组嫌少，逼得农会主任许成壁哭了。有的被斗户本人也觉得这样补偿太过分。地主、富农很高兴，出门就一路唱戏。总结时县委及工作组反认为工作“成功”了。聊阳县还有一些村子情况与此类似。筑先、阳谷两县也有一些村庄封建势力仍占统治地位，纠偏开始后，地主乘机索回土地房屋，有的由干部领头退还一部分果实，有的一律退了。有的改为租佃关系，按三七、四六或对半分粮，领导上反认为“双方自愿”，默认其合法。六地委竟提出“反左就不怕右”，八地委提出“原物全部退还”等口号。改定成份时，有的将地主划成富农，对漏斗的地主富农则不追究。此外，北岳区易县鱼坨村最近召开群众会讨论补偿工作，被斗户都到了，贫农怕退东西都不到会，旧干部看笑话，会开不成，被斗户倒把村长打了一顿。其他地区近来亦有一些类似情形发生。领导机关现正注意纠正此类纠左中的右倾错误。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a5639a52e0"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
