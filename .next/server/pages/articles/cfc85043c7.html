" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"右派言论——攻击肃反运动","authors":["中南矿冶学院","余树槐","刘光中","吴传铃","符泽华","蔡承云"],"dates":[{"year":1957,"month":6}],"is_range_date":false,"parts":[{"text":"右派言论——攻击肃反运动","type":"title"},{"text":"中南矿冶学院余树槐吴传铃刘光中蔡承云符泽华","type":"authors"},{"text":"“党中央提出5％的标准是没有根据的，不知根据什么提出5％的标准，如果有5％，全国是否可能有三千万反革命呢，是否斗出了5％呢？所以下级歪曲了政策。”（中南矿冶学院　余树槐）","type":"paragraph"},{"text":"“这次肃反确切地说，是出卖良心争取雄厚的政治资本升官发财的一场肮脏的竞争，结果有的选上了积极分子，有的入了团，有的入了党，而那些被迫出卖良心的及没有出卖良心者都落后，自然是落后分子的下场。”（中南矿冶学院　吴传铃）","type":"paragraph"},{"text":"“向学院提出三大要求：（一）烧毁肃反档案；（二）惩办所谓不称职的肃反干部；（3）赔偿被斗争一切物质及精神上的损失。”（中南矿冶学院　刘光中）","type":"paragraph"},{"text":"“肃反是党整我们，现在整风是我们整党。要提意见就要搞垮，不搞垮会报复。打蛇要打死，不打死还会要咬人。”（中南矿冶学院  蔡承云）","type":"paragraph"},{"text":"“党犯下了滔天罪行，必须用暴风急雨方式，一棒子打死才痛快。”（中南矿冶学院  符泽华）","type":"paragraph"},{"text":"“要整就先整头子，其他喽啰就不敢讲话了。”（中南矿冶学院  张耀华、朱德君）","type":"paragraph"}],"comments":[],"origin":"《高等学校右派言论选编》（中共中国人民大学委员会，1958年8月）。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cfc85043c7"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
