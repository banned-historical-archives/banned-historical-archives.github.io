<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"党内右派分子、大众日报总编辑刘建畏罪自杀","authors":["林麟"],"dates":[{"year":1957,"month":10,"day":28}],"is_range_date":false,"parts":[{"text":"党内右派分子、大众日报总编辑刘建畏罪自杀","type":"title"},{"text":"林麟","type":"authors"},{"text":"新华社济南讯　党内极右派分子、原中共山东省委候补委员、大众日报总编辑刘建已于10月28日夜畏罪自杀身死。","type":"paragraph"},{"text":"刘系地主出身，1939年入党，行政十级，今年三十九岁。他的资产阶级新闻观点已形成完整的纲领。其主要论点是：一、强调群众性，取消党性。他指的群众实际上是小市民、小知识分子、旧的资产阶级知识分子。他主张报纸不登或少登省委和省人委的指示，把上级机关的指示看成是不代表群众利益的。二、强调兴趣，取消指导性。他主张报纸不登工作经验，社论也要少，强调副刊要干预生活(实际上是专门揭发工作中的阴暗面)。三、把干部和群众对立起来。说党委工作对象是干部，报纸对象是群众，干部所需要的与群众所需要的不一致。四、否定报纸的群众基础。他一方面强调他的所谓群众性，一方面却主张把记者站取消，强调以个人名义联系社会上一些有知识有本领的人。在上述观点指导下，他提出报纸要摆脱党委的领导，对抗党委批评，以至攻击党委。在他去年12月份亲拟的关于大众日报改革工作给省委的报告中曾说：“我们长期以来就只强调报纸是党委机关报的一面，强调报纸是代表党委指导工作的，……但对于报纸的群众性的一面，就十分忽视了。”在今年五月省宣传工作会议的座谈会上，他公然说，党委应该考虑报纸工作，不要省委说什么，报纸也说什么，这样要打屁股。他并把这归结为报社与省委的矛盾。他并提出将来可能出现民主党派的报纸领导党报的谬论。在省宣传会议各报总编辑的座谈会上，他提出办两张报纸的主张。一张登载工作指示、通知、工作动向，像“山东工作”一样的干部报，一张专给群众看的有“思想性”的报纸。他认为省报总编辑是省委委员也是一个束缚。他对右派分子王中、刘贯文(人大新闻系)却佩服得五体投地，甚至准备把报社的主要稿件邮到上海请王中看。他还要求王在沪物色老报人做大众日报的顾问。","type":"paragraph"},{"text":"他把党性和群众性对立的错误观点，在去年12月份省委讨论大众日报改革时就受到批判。在这以后，舒同、谭启龙、夏征农、师哲等负责同志都曾先后和他谈过话，指出他的错误的严重性，希望他认识错误、改正错误。直到10月22日报社才开群众大会让他公开检查。","type":"paragraph"},{"text":"刘建堕落成党的叛徒的原因，他在绝命书上也做了分析：一、个人主义的极度发展；二、资产阶级个人的生活爱好——心灵，精神完全和资产阶级一致；三、国际国内台风的鼓励；四、刘贯文、王中的“引诱”、“点火”。","type":"paragraph"},{"text":"他在绝命书上承认自己是山东党内最大的极右派，两处提到他的反党罪行到了无以复加的程度，竟至反起党中央来了。同时，他也承认党和大家对他作到了仁至义尽地挽救、帮助。省委认为：刘是畏罪而死，其中也有自愧的成分。目前，大众日报根据省委的指示已经和正在召开各种会议，并通过大字报，声讨刘建反党反社会主义的罪行，肃清刘的影响。在本月即将举行的省四级干部会和省第二次党代表大会也准备公布刘的罪行。","type":"paragraph"},{"text":" ——原载新华社《内部参考》1957年11月16日。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5e87a2a934"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
