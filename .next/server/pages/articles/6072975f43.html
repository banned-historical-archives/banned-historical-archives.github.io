script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"极其悲痛地哀悼伟大的领袖和导师毛泽东主席逝世（附图片）","authors":[],"dates":[{"year":1976,"month":9,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"极其悲痛地哀悼伟大的领袖和导师毛泽东主席逝世"},{"type":"paragraph","text":"毛主席是中国人民解放军的伟大缔造者和英明统帅。参加追悼大会的人民解放军陆、海、空三军指战员无比沉痛地表示，一定要继承毛主席的遗志，坚决执行毛主席的建军路线，加强军队建设，加强战备，随时准备歼灭一切敢于入侵之敌。"},{"type":"paragraph","text":"首都工人民兵怀着极其悲痛和无限崇敬的心情，参加伟大的领袖和导师毛泽东主席追悼大会。他们决心继承毛主席的遗志，加强民兵建设，提高警惕，搞好战备，狠狠打击阶级敌人的破坏活动。本报记者摄"},{"type":"paragraph","text":"参加追悼大会的北京郊区贫下中农，决心化悲痛为力量，继承毛主席的遗志，把毛主席亲自树立的大寨红旗举得更高，永远沿着毛主席指引的社会主义金光大道奋勇前进。"},{"type":"paragraph","text":"“毛泽东号”机车组的同志怀着无比沉痛的心情，为悼念伟大领袖和导师毛主席鸣笛志哀。本报记者摄"},{"type":"paragraph","text":"九月十八日下午，北京昌平县十三陵公社广大贫下中农和十三陵水库管理处的全体职工在毛主席题词纪念碑前举行伟大的领袖和导师毛泽东主席追悼大会。本报记者摄"},{"type":"paragraph","text":"参加追悼大会的各族群众，沉痛悼念各族人民的大救星毛主席。他们决心更紧密地团结在党中央的周围，巩固工人阶级领导的工农联盟为基础的各族人民的大团结，努力把我国建设成为一个强大的社会主义国家。"},{"type":"paragraph","text":"参加追悼大会的首都红卫兵决心化悲痛为力量，刻苦攻读马列著作和毛主席著作，继续发扬对反动派造反有理的革命精神，深入开展批邓、反击右倾翻案风的斗争，把同党内资产阶级的斗争进行到底。（本版照片除署名者外均为新华社记者摄）"},{"type":"paragraph","text":"在毛泽东思想阳光雨露哺育下茁壮成长的首都红小兵，沉痛地悼念毛主席。他们决心遵照毛主席的教导，好好学习，天天向上，接好革命的班，把毛主席开创的无产阶级革命事业进行到底。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6072975f43"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
