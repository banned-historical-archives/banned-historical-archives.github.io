" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中央军委关于专职武装干部参加文化大革命问题的通知","authors":[],"dates":[{"year":1967,"month":2,"day":17}],"is_range_date":false,"parts":[{"text":"中央军委关于专职武装干部参加文化大革命问题的通知","type":"title"},{"text":"目前无产阶级文化大革命，已进入全面阶级斗争的新阶段，在这种新形势下，公社、厂矿、院校等单位基层专职武装干部，要积极参加无产阶级文化大革命；又要积极作好民兵工作，保卫无产阶级文化大革命。为此，对有关专职人民武装干部参加文化大革命的问题规定如下：","type":"paragraph"},{"text":"一、公社、厂矿、院校专职人民武装干部，应当按照中共中央“关于无产阶级文化大革命的决定”，中共中央“关于抓革命、促生产的十条规定（草案）”，和中共中央“关于农村无产阶级文化大革命的指示（草案）”同地方干部一样，参加本单位、本地方的文化大革命。","type":"paragraph"},{"text":"二、公社、厂矿、院校专职人民武装干部，负有组织民兵保卫文化大革命和战备任务。所有专职武装干部都必须坚守岗位，不得擅离职守。对民兵武器弹药，按上级规定，严加保管，不经上级军事机关批准，任何人不得动用。","type":"paragraph"},{"text":" 中央军委1967年2月17日","type":"paragraph"}],"comments":[],"origin":"根据《中共中央文件汇编，1966.5-1968.5 [内部参考]》，1968年5月出版，编印者不明","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"22eee04831"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
