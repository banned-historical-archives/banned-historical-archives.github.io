<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"川北区党委关於镇压反革命活动的补充意见","authors":[],"dates":[{"year":1950,"month":11,"day":13}],"is_range_date":false,"parts":[{"text":"川北区党委关于镇压反革命活动的补充意见","type":"title"},{"text":"这一时期，各地匪特活动日益嚣张，反革命谣言甚为猖獗，破坏交通、电线、仓库、杀害农民积极份子案件，已多次发生；抢劫案件，亦有增加，被劫者且多为农民积极份子。据盐亭、岳池破获之反革命案件及其他材料证明：反革命份子正积极策划暗害破坏，组织武装暴乱。随着美帝疯狂扩大侵略战争，与农村反封建斗争的进一步展开，反革命活动将愈加紧、愈露骨。各级领导，必须将镇压反革命活动列为中心工作之一，进行深入的教育动员，提高干部政治警惕性。根据中央及西南局指示，采取有效办法，动员全党、全军，结合农村减租、反恶霸斗争，予反革命活动以坚决的镇压。除月初全区群众工作会议所布置诸项外，特再提出如下补充意见：","type":"paragraph"},{"text":"（一）务须大力展开群众性的宣传教育，宣传目前形势，宣传世界和中国人民民主力量的强大，宣传我党各项社会改革政策，用具体事实，及时公开的揭露匪特的阴谋诡计，肃清亲美、崇美、恐美思想，树立仇视、蔑视、鄙视美国的观点，使我党各项政策深入人心，使群众认识一切反革命份子的面目，使一切中间分子在思想上与反动份子划清界线；缩小谣言市场，堵塞反革命活动空隙。并号召与组织群众性的检举匪特监视坏蛋。宣传方式除发动各机关、学校、团体进行宣传外，主要应抓紧县、区、乡各种代表会议，进行报告讨论，通过代表向各阶层人民进行宣传动员。农村社会改革的每一步骤，均须随时注意对农民的宣传教育，使减租反恶霸斗争，更提高一步。","type":"paragraph"},{"text":"（二）必须及时公开的打击谣言，除加强宣传、正面驳斥外，更须深追谣根，及时公开打击，对被欺骗、愚弄、传播谣言之劳动人民及其他民主阶层人民，应公开予以教育；对有意散布谣言之地主、富农、兵痞、流氓、旧乡保人员要令其当众坦白、悔过、具结，情节严重者，应予以应得之惩处。对造作谣言，遂行破坏之反革命份子，要发动群众斗争，并经人民法庭公审严厉惩处。目前不少干部将打击谣言与其他工作任务对立起来，拖延等待，不予及时打击。或将公开斗争与秘密斗争对立起来，深恐警惕了敌人，泄露了秘密，畏首畏尾，不敢予造谣破坏份子以公开的打击。这种片面的小手小脚的腐朽的作法与想法，其结果使基本群众与我隔离，中间份子更为动摇观望，封建势力气焰高涨，匪特份子在谣言掩盖下更便于进行反革命活动。","type":"paragraph"},{"text":"（三）对一切现行反革命罪犯，必须坚决及时镇压。凡制造谣言、放火、放毒、阴谋暗害，破坏交通、电线，抢劫仓库，组织土匪，密谋暴乱之案件，要不惜一切力量，迅速侦察破案，务求捕获其组织者及罪恶重大者，经人民法庭公审惩处。对其一股份子（缺行）众对敌斗争的积极性与勇气，敌人将视我为软弱可欺，放肆进行反革命活动。对密报与提拏重大反革命罪犯之群众，应重重的公开的奖励，绝不要怕花一点钱，这些钱是值得的，可报销的。","type":"paragraph"},{"text":"（四）各地镇压反革命活动情形，望随时报来，并作为综合报告主要内容之一。","type":"paragraph"}],"comments":[],"origin":"《川北工作》1950年11月15日第二十一期","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4f4651543e"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
