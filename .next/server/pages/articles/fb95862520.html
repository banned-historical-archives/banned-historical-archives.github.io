<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"铁路上海站工人理论小组研究儒法军事路线斗争史深挖林彪资产阶级军事路线的根源","authors":[],"dates":[{"year":1974,"month":11,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　铁路上海站工人理论小组，最近在认真学习毛主席军事著作，狠批林彪资产阶级军事路线的基础上，研究了儒法两家在军事路线上的斗争，进一步看清了林彪资产阶级军事路线的极右实质和反动根源。"},{"type":"paragraph","text":"一、林彪资产阶级军事路线和儒家的“以礼治军”是一路货。在学习和批判中，上海站理论组的同志把林彪在建军问题上的反动谬论与儒家鼓吹的“以礼治军”黑货相对照，看清了两者在本质上是一致的。有的同志说:儒家搞“以礼治军”，是由他们“克己复礼”的反动政治纲领决定的，其实质就是对军队灌输腐朽没落的“周礼”，使军队成为“克己复礼”的工具。"},{"type":"paragraph","text":"大家还谈到，林彪推行资产阶级军事路线，完全是继承了儒家“以礼治军”的反动衣钵。林彪捧出儒家“先立乎其大者，则其小者不能夺也”的信条，利令智昏地认为只要他在部队先“立”起反动的孔孟之道，就可以随心所欲地干复辟资本主义的罪恶勾当了。一九六六年，林彪又发出“我希望大家都当董仲舒”的反革命叫嚣，反对用马列主义、毛泽东思想教育军队，搞他“独尊”孔孟之道的反革命一套。这就清楚地证明，林彪的资产阶级军事路线和儒家的“以礼治军”是一路货。"},{"type":"paragraph","text":"二、林彪的战争观是儒家战争观的翻版。这个站理论组运转车间的同志认真学习了毛主席关于“历史上的战争分为两类，一类是正义的，一类是非正义的。一切进步的战争都是正义的，一切阻碍进步的战争都是非正义的。我们共产党人反对一切阻碍进步的非正义的战争，但是不反对进步的正义的战争”的教导，把林彪的战争观与儒家的战争观联系起来进行批判。他们说:林彪曾胡扯“军事学起源于打架”，什么“两斗皆仇，两和皆友”，以此来混淆正义战争与非正义战争的界限。毛主席亲自部署和指挥的辽沈、平津战役，是一场打倒国民党反动派、解放全中国的正义战争，林彪却竭力加以反对，这与他反动的战争观是分不开的。"},{"type":"paragraph","text":"许多同志说，在对待战争的态度问题上，法家主张“以战去战”，“以义伐不义”，用革命暴力粉碎反动阶级的复辟阴谋，一般地是支持和参加进步的正义的战争的。而儒家出于维护没落反动阶级统治的需要，一方面鼓吹用反革命战争残酷镇压人民革命，另一方面则恶毒地把人民革命污蔑为“小人作乱”，要对“善战者服上刑”。林彪也学着孔老二的腔调，一面高唱“恃德者昌，恃力者亡”，一面则组织反革命“联合舰队”，企图向革命人民反扑过来，可见林彪与历史上的反动儒家在战争观上是一脉相承的。"},{"type":"paragraph","text":"三、林彪的所谓战略战术，来源于儒家唯心论的先验论。大家说，毛主席为我军制定的战略战术，是革命战争的客观规律的反映，是以辩证唯物主义和历史唯物主义为指导的。而林彪的所谓战术原则，是以唯心论的先验论和机械论为基础的。在讨论中，同志们联系儒法斗争史，认为历史上法家的战略战术中包含着朴素唯物主义和一定的辩证法思想。而儒家在战略战术上则鼓吹“不出户，知天下”，甚至自欺欺人地说什么“不胜犹胜”，“国君好仁，天下无敌”，实行那种“不鼓不成列”的蠢猪式战术。今天，林彪也学儒家的样子，凭着他那个“特别灵的脑袋”，炮制出“六个战术原则”，鼓吹“从主观到客观，从思想到实际”的唯心主义方法论，这只能说明林彪是儒家那套蠢猪式战略战术的忠实信徒。"},{"type":"paragraph","text":"(本报通讯　员)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"林彪","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"批林批孔","type":"主题/事件"},{"name":"儒法斗争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fb95862520"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
