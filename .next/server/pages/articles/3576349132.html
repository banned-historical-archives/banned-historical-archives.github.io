script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"狠批“三自一包”、“四大自由”等修正主义黑货  城发公社正确处理粮、豆关系","authors":[],"dates":[{"year":1971,"month":3,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"狠批“三自一包”、“四大自由”等修正主义黑货"},{"type":"paragraph","text":"城发公社正确处理粮、豆关系"},{"type":"paragraph","text":"吉林省榆树县城发公社革委会，认真贯彻执行毛主席的“以粮为纲，全面发展”的方针，正确处理粮、豆关系，为革命多种大豆，种好大豆，连年夺得了粮、豆双丰收。一九七○年，全公社粮、豆平均亩产四百二十四斤，比丰收的一九六七年增产百分之十四点八，向国家交售粮食一千二百三十四万斤，交售大豆四百万斤，超额完成了国家征购任务。"},{"type":"paragraph","text":"毛主席教导说：“正确的政治的和军事的路线，不是自然地平安地产生和发展起来的，而是从斗争中产生和发展起来的。”城发公社实现粮、豆双增产，经历了两种思想、两条路线的激烈斗争。"},{"type":"paragraph","text":"在无产阶级文化大革命以前，由于刘少奇推行“三自一包”、“四大自由”等反革命修正主义路线的干扰，全公社大豆种植面积逐年减少。无产阶级文化大革命期间，广大贫下中农抓了阶级斗争，开展革命大批判，使大豆种植面积基本稳定，产量也有所增长。但是，刘少奇反革命修正主义路线的余毒并没有彻底肃清。"},{"type":"paragraph","text":"公社革委会成立后，在研究种植计划时，又有人主张少种大豆，不能全面落实“以粮为纲，全面发展”的方针。公社革委会及时举办了毛泽东思想学习班，认真学习毛主席关于“以粮为纲，全面发展”的方针和关于“我们作计划、办事、想问题，都要从我国有六亿人口这一点出发，千万不要忘记这一点”的伟大教导，狠批了刘少奇的反革命修正主义路线，批判了资产阶级名利思想。大家认识到，只有因地制宜，既增粮又增豆，才能对国家作出更大的贡献。大家还把生产大豆与国家社会主义计划经济联系起来，与支援中国革命和世界革命联系起来，与巩固人民公社集体经济、加强工农联盟，巩固无产阶级专政联系起来，更加认清了在发展粮食生产的同时，积极生产大豆的重要意义。"},{"type":"paragraph","text":"这样，他们就把大豆生产问题提到了革委会工作的重要日程上，深入发动群众，认真落实政策，特别是正确处理国家、集体、个人三者关系，认真安排好社员生活；在作物的安排上，合理布局，积极为多生产大豆创造条件，保证了粮、豆双增产。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3576349132"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
