script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"粤菜业工潮仍在相持中劳资双方各作报告资方说:工潮系由少数人操纵并非为了生活　劳方说:不是向老板要钱而是反对剥削　社会局今日送达调解办法","authors":[],"dates":[{"year":1946,"month":2,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　粤菜业劳资双方，为该业僵持十二天的劳资纠纷，昨特假八仙桥青年会，南国酒家分别招待记者，报告此次工潮经过，及僵持之症结。资方冼冠生，洪锡章，卢梓庭等表示，此次工潮系“少数”职工所操纵，实非为生活而起，说到待遇，亦非苛刻，高级者月可得二十万至卅万元，侍应生至少也有十余万，拉门僮子收入亦有三四万元，冬夏并供给制服，待遇实较各业为佳。至此次劳方所提年赏三万五千元，资方实担负不起，并以大三元举例说明:大三元有职工二百人，假设每人发年赏三万，需六百万，为此将无钱买菜。关于小账，资方表示并不是揩职工油，而确实为了弥补器具破毁损失，和买毛巾肥皂茶叶之用，虽然如此，在谈判上资方仍是让步，而劳方却坚持条件，故谈判无结果。"},{"type":"paragraph","text":"劳力甘田朱刚宣称:此次怠工全系为“保障生活，改良待遇”而起，是全体三千职工甘心自愿，绝非少数代表所把持，我们要求改良待遇并非是伸手向老板要钱而是祈求老板少拿点我们的血汗钱，实在找不出什么不合理。关于谈判，资方是一拖再拖，毫无诚意，本月九日下午一时，资方避免出席社会局调解，即系实例。在谈判中，劳方为表示让步，年赏已减至三万元，并可分三期付款；至于小账根本是我们自己的，老板凭什么理由再来一次剥削?关于老板说我们每月可拿到二三十万元，毫无根据，并以南国一月份全部小账外赏分酌情形说明，南国一月份小账共五，七五三，八八四元，老板提去百分之二七·五，还有四，一七一，五六四元，外赏共二，○九四，六九三元，老板提百分之卅；还有一，四六六，二八五元，所余再分一百五十股，小账每股二九五○○元，外赏每股一○五○○元，最有名的厨师冯培拿的最多，小账分“三，五”股，外偿分“三，二五”股，共得一二三，七五○元。中等侍应生唐镛钜分“○，六二”股。实得二六，八五○元，最低的拉门僮潘士基分“○，二二”股，仅得八○○○元；老板说最低的可拿到三四万元，不知从何说起?又在劳方招待会上，九大公司代表，各帮菜业工会，均派代表前往致调，表示援助。"},{"type":"paragraph","text":"又讯:社会局为使该业工潮不致拖延，决定今日将决定之年赏，外赏，小账各项办法，送达劳资变方，如资方不服，可向市府提出重议，如越限不提，社会局将作强制执行。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8af312d2ce"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
