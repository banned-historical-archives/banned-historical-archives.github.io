script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"毛主席刘主席以及党和国家其他领导人接见出席人大三届首次会议的全体代表","authors":[],"dates":[{"year":1965,"month":1,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京四日电　毛泽东主席、刘少奇主席以及党和国家的其他领导人周恩来、朱德、邓小平、宋庆龄、董必武、彭真、陈毅、李富春、贺龙、李先念、李井泉，谭震林、乌兰夫、陆定一、陈伯达、康生、薄一波、李雪峰、罗瑞卿、刘澜涛、杨尚昆、陶铸、谢富治、郭沫若、何香凝、黄炎培、陈叔通、杨明轩、程潜、赛福鼎、林枫、刘宁一、张治中、阿沛·阿旺晋美、周建人，今天下午接见了出席第三届全国人民代表大会第一次会议的全体代表。"},{"type":"paragraph","text":"接见时，全场一片欢腾，响起了长时间的暴风雨般的掌声和欢呼声。"},{"type":"paragraph","text":"毛主席、刘主席以及党和国家的其他领导人，同全体代表一起合影。"},{"type":"paragraph","text":"\u003cIMG alt=请插入5号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1965\\01\\6515010201.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgaut\u003e钱嗣杰\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e毛主席、刘主席等党和国家领导人一月四日接见出席第三届全国人民代表大会第一次会议的全体代表　(新华社传真　钱嗣杰摄)\u003c/FONT\u003e"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1f3d9bf690"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
