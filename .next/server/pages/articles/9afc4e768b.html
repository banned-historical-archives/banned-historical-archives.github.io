<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"军工路上的人间活地狱失业工人在死亡线上挣扎　稍获救济又遭受种种剥削","authors":[],"dates":[{"year":1946,"month":12,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"在现今无官不贪，无油不揩，无权不施，无力不压的中国社会，讲一讲我们这一群被人遗弃了的化外之民——失业工人的几件小人小事；并非什么危言耸听吧!不过，为着我们悲愤的抗议，我们请贵报赐给一点篇幅。"},{"type":"paragraph","text":"我们似乎是一群逆来顺受的奴隶，我们好像习惯于长期地饥饿，寒冷，贫困，污秽，恐惧，侮辱，疾病，死亡的非人的生活，我们这一群失业工人，幸而经千呼万唤，才得到联总一点可怜的救济物资，再经层层的剥削，而今仍然是两餐“吃不饱，饿不死”的粥和一餐饭，小菜每人当然有两筷子老青菜；睡觉则重重叠叠堆在三层楼中，医药是几种万能的“百宝”丸，去医院无车钱，饭钱，即去者，被“无啥关系”挡驾，所以仅有一千多人，却常常有死亡，还有其他一言难尽的琐事。"},{"type":"paragraph","text":"同时在负责人与内务外务代表“总动员”之下，在外做临时工工友剩下的伙食，无声无息地不知去向了。前两月伙食剩下的三百多万元，也就在“上面没有领下来”(官场中的秘诀)，无下文了。每天面粉的卖出，米的买进，这一进一出就只有一天晓得!同病相怜的在业工人，“义送”给我们一千多袋面粉，除卖了两百袋做联总最后一次救济粉的押袋金外，其余的“阿啦勿晓得”!本来在领联总粉时，凡列名代表团名册者，无论在业，失业都有，但在发粉日，在业者“取消资格”；迟来及不来者“逾期作放弃权利论”；在发粉时，不足十人不得领正式粉条，有些人为免再度被揩油，而集十人去领，亦遭到多方刁难，有些工友只好忍气吞声，在带胁迫的叫卖之下，卖了壹万元。后因外边像证券交易所似的“自由竞争”，竟突破一万三大国；而这些当事者，“损益”不少，竟以兵戎相见，跳出了几条彪形大汉的打手，才结果了这场风波。在未当代表之前，那几位“工人”兄弟，个个衣衫褴褛，蓬头垢面，形容憔悴，真像个十足的瘪三，经荣任代表后反而个个油头粉面，洋装笔挺，大菜，包车，马立斯:更“破天荒”地用起门房，茶房来了，俨然像个不折不扣大腹便便的大亨。而我们这些可怜虫呢?快要升“棺”发“材”了!"},{"type":"paragraph","text":"敢说敢做的代表都先后被逼滚蛋了，从此我们失掉“蛇无头不走”的头了。我们稍有公开不满，就被视为捣蛋，甚至有时连他们最后看家的本领也拿出来，把有“嫌疑”的大帽子压在我们头上。我们是在过着地狱一样的生活，请社会人仕注意这被人遗忘的一群吧!　一群被遗忘了的失业工人仝启"},{"type":"paragraph","text":"十二月五日"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9afc4e768b"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
