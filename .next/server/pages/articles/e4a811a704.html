<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"并非“偏见”","authors":["姚文元"],"dates":[{"year":1958,"month":4,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"姚文元"},{"type":"paragraph","text":"新到的第七期文艺报有一栏“读者讨论会”。简单明了，生动活泼，各抒己见，是它的特色。这一期讨论的是文风。大家热烈地欢迎改革文风这件事，也有一些不同的意见。有争论，是一个好现象。“论辩出真理”，对立面的斗争才能发展出正确和新鲜的见解；一个反复的过程，就使得问题深刻化了。"},{"type":"paragraph","text":"有一篇西北大学同学李明生同志写的“必须明确什么是最根本的”，是对文艺报召开的文风问题座谈会上，有些前辈作家的发言，提出了相反的意见的，我认为写得不错。文章开头说:“就只对老舍和吴组缃两位前辈的言语，说说我的偏见。”——我这篇短文就想证明他说的有一点并非偏见，而是真理。"},{"type":"paragraph","text":"固然，“为什么什么而斗争”(注)这类词句，应该反对滥用，但由此而得出结论说，它“就没多大意思”，而反对用这种词句，我认为是多少有点“矫枉过正”了。这种词句，过去用了，今天还用着，将来也消灭不了，因为它在许多情况下，表示着一种战斗的意义，而它本身也就是战斗的口号。"},{"type":"paragraph","text":"说得好!这说到问题的关键上。人生在世，总要“为什么什么而斗争”的，“才子”为名，老板为钱，右派野心家为权，共产主义者为实现“各尽所能，各取所需”的共产主义社会。目标不同，成败不同，但要想实现自己的目标都必须“斗争”一番，则是相同的。不过那些剥削阶级的人常常是隐藏自己的目的的，唯有永远面对真理的无产阶级才把自己的斗争目的鲜明地公之于世界。右派野心家们明明肚子里喊“为打倒共产党的领导而斗争”“为从无产阶级手里夺取政权而斗争”，但他们嘴上却讲“我拥护共产党”——不，徐中玉在诅咒共产党的名文“积疑三问”中，第一句就是“我热爱共产党”——亲热得好像共产党是他亲娘一样哩!英美的富豪们每天饱吸着劳动人民的鲜血，明明是在“为超额利润而斗争”，但他们却装做相信上帝，还要到教堂去做祷告，一脸慈悲相，好像他们是在为散布耶稣的“福音”而斗争。连新年文告中，有时还加一些宗教的词儿进去。这些人都是虚伪透顶的伪君子。但无产阶级、共产主义者和他们完全相反。为共产主义而斗争，为实现社会主义而斗争，这个思想如丽日之贯中天，光芒照耀着全球，扫荡着一切剥削者所造成的黑暗王国和黑暗思想。所以，共产主义者和以前一切坚持社会进步的革命者一样，用“为什么什么而斗争”来理直气壮地表达自己的战斗的意志，来明确地表达自己奋斗的方向。它不但是一个口号，并且含有厉行不懈的实践意义。这句话，在言论、文章中被普遍运用，到处可以听到，正说明了共产主义的理想已化为千百万人的革命意志。"},{"type":"paragraph","text":"为什么会把这种说法当作“没多大意思”呢?可能是听得太多了，觉得有点儿烦厌；可能觉得这类话很枯燥，有点儿不够味；可能是为了彻底改革文风，有点儿“过正”。不管是那一种，把这个口号加以嘲弄，总是不够妥当的。就“准确、鲜明、生动”而论，这种意见和准确性这一条就不完全符合。"},{"type":"paragraph","text":"文风一定要改变，社会主义时代的文风要有自己的风格。老舍先生改革文风的决心值得我们学习。他发言中有许多宝贵的意见，值得我们这些后辈加以检查、思索、改正。只是这一点，却不能同意，因为正如李明生同志所说，这是一个“根本的”问题。什么事情，第一要紧的是方向。我们反对老八股、洋八股、党八股而树立马克思主义的文风，马克思主义的文风就是我们的方向:它准确，而不虚夸；鲜明，而不含糊；生动，而不油滑。这种文风，只有在观点正确、立场坚定、爱憎分明、感情上和劳动人民打成一片的基础上，加上词章的修养，才能够自然地产生。离开这个基础而把文风只看作多用少用几句口号，改革的方向就可能歪斜，也许在铲除八股的时候，也挫伤了其他的东西。(四月十四日)"},{"type":"paragraph","text":"(注)见文艺报第四期第七页，老舍先生在发言中说:“如果我上去说:‘为什么什么而斗争’，就没多大意思了。我们吃亏的是每个人讲的都是‘为什么什么而斗争’，别人听了也不能不鼓掌，但多少有点‘鼓’不由衷(笑声)。”"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"姚文元","type":"人物"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e4a811a704"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
