script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"齐奥塞斯库、斯托伊卡、毛雷尔同志担任新职务  毛泽东刘少奇朱德周恩来同志致电热烈祝贺  林彪陈毅同志电贺罗武装部队部部长和外交部长就任","authors":[],"dates":[{"year":1965,"month":3,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"齐奥塞斯库、斯托伊卡、毛雷尔同志担任新职务"},{"type":"paragraph","text":"毛泽东刘少奇朱德周恩来同志致电热烈祝贺"},{"type":"paragraph","text":"林彪陈毅同志电贺罗武装部队部部长和外交部长就任"},{"type":"paragraph","text":"新华社二十五日讯　我国党和国家领导人毛泽东、刘少奇、朱德、周恩来，今天打电报给罗马尼亚党和国家领导人尼古拉·齐奥塞斯库、基伏·斯托伊卡、扬·格奥尔基·毛雷尔，祝贺他们当选新的职务。电报全文如下：布加勒斯特罗马尼亚工人党中央委员会第一书记尼古拉·齐奥塞斯库同志，罗马尼亚人民共和国国务委员会主席基伏·斯托伊卡同志，罗马尼亚人民共和国部长会议主席扬·格奥尔基·毛雷尔同志，亲爱的同志们："},{"type":"paragraph","text":"我们高兴地获悉，尼古拉·齐奥塞斯库同志当选为罗马尼亚工人党中央委员会第一书记，基伏·斯托伊卡同志当选为罗马尼亚人民共和国国务委员会主席，扬·格奥尔基·毛雷尔同志当选为部长会议主席。我们谨代表中国共产党、中华人民共和国全国人民代表大会常务委员会、中华人民共和国政府和中国人民，并以我们个人的名义向你们致以热烈的祝贺。"},{"type":"paragraph","text":"伟大的勇敢的罗马尼亚人民，在罗马尼亚工人党的领导下，坚持独立自主地建设社会主义，取得了伟大成就。罗马尼亚人民在反对大国沙文主义、维护社会主义阵营和国际共产主义运动的团结和反对帝国主义、保卫世界和平的事业中作出了重要贡献。罗马尼亚人民有理由为此感到自豪。我们预祝兄弟的罗马尼亚人民在光荣的罗马尼亚工人党的领导下，今后在各个战线上不断取得新的更大的胜利。"},{"type":"paragraph","text":"中罗两国人民是兄弟，是战友。我们坚信，我们两党、两国人民的友谊和团结，必将在马克思列宁主义和无产阶级国际主义的基础上获得进一步的巩固和发展。"},{"type":"paragraph","text":"中国共产党中央委员会主席　毛泽东"},{"type":"paragraph","text":"中华人民共和国主席　刘少奇"},{"type":"paragraph","text":"中华人民共和国全国人民代表大会常务委员会委员长　朱德"},{"type":"paragraph","text":"中华人民共和国国务院总理　周恩来"},{"type":"paragraph","text":"一九六五年三月二十五日"},{"type":"paragraph","text":"新华社布加勒斯特二十四日电　罗马尼亚大国民议会二十四日晚举行会议。会议一致选举基伏·斯托伊卡同志为罗马尼亚人民共和国国务委员会主席。"},{"type":"paragraph","text":"新华社二十四日讯　国务院副总理兼国防部长林彪元帅，今天打电报给萨拉扬大将，祝贺他再次被任命为罗马尼亚人民共和国武装部队部部长。电文如下：罗马尼亚人民共和国武装部队部部长亲爱的萨拉扬大将同志："},{"type":"paragraph","text":"在您再次被任命为罗马尼亚人民共和国武装部队部部长的时候，我和中国人民解放军全体指战员谨向您致热烈的祝贺。祝中罗两国人民和军队之间的团结和友谊万古长青。"},{"type":"paragraph","text":"中华人民共和国国务院副总理兼国防部长"},{"type":"paragraph","text":"中华人民共和国元帅  林彪"},{"type":"paragraph","text":"一九六五年三月二十四日"},{"type":"paragraph","text":"新华社二十五日讯　陈毅副总理兼外交部长今天打电报给科尔内留·曼内斯库，祝贺他被任命为罗马尼亚外交部长。电报全文如下：布加勒斯特罗马尼亚人民共和国外交部长科尔内留·曼内斯库尊敬的部长同志："},{"type":"paragraph","text":"在你被任命为罗马尼亚人民共和国外交部长的时候，谨向你致以热烈的祝贺。祝中罗两国人民牢不可破的兄弟友谊日益发展。"},{"type":"paragraph","text":"中华人民共和国国务院副总理兼外交部长　陈毅"},{"type":"paragraph","text":"一九六五年三月二十五日"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"陈毅","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"朱德","type":"人物"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"002b3c91cd"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
