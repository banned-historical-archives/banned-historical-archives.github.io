script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"这里，陈列着一个资产阶级知识分子走向社会主义道路的曲折过程韬奋纪念馆今日开馆","authors":[],"dates":[{"year":1958,"month":11,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　今日是邹韬奋同志诞生64周年。筹备已久的韬奋纪念馆今日开馆。"},{"type":"paragraph","text":"韬奋纪念馆座落在重庆南路万宜坊53号，54号曾是韬奋1930到1936年居住过的地方，它也成为纪念馆一个组成部分。"},{"type":"paragraph","text":"纪念馆通过陈列着的韬奋各个时期的活动照片、绘画、主编的刊物，著作、手稿，生动地说明了作为一个爱国者的韬奋，随着时代的前进，与广大人民相结合，在党的教育和领导下，如何逐步从一个资产阶级的改良主义者，走向工人阶级革命的道路，并坚定地选择了共产主义作为自己奋斗目标。韬奋不但在自我改造的过程中，走向了社会主义革命的道路，并且鼓舞很多青年人走向了革命。这是韬奋一生最大的贡献。韬奋自我改造曲折、艰辛的过程，是一个资产阶级知识分子接受严峻考验和锻炼的过程。人们在他奋斗的一生中，将吸取到教育和力量。"},{"type":"paragraph","text":"韬奋故居与纪念馆陈列室相接相通。在那个弄堂三层小楼的住宅里，还保留着韬奋用过的物件，并且是按他生前原样布置的。卧室、会客室和他平时艰苦工作的亭子间的简单朴素的景况，表现了韬奋勤俭朴实的生活作风。"},{"type":"paragraph","text":"纪念馆地方不大，观众前往参观，请事先与该馆接洽预约登记，以免过分拥挤。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9c23f2ace4"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
