script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"上海工具设备金属制品工业公司党委举办干部学习班认真学习重要文件　愤怒声讨“四人帮”罪行","authors":[],"dates":[{"year":1976,"month":11,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　上海工具设备金属制品工业公司党委最近举办了党委学习中心组成员和基层党支部(党委、总支)书记参加的干部学习班，认真学习毛主席关于批判‘四人帮’的重要指示，学习党中央的有关文件，学习吴德同志在首都庆祝大会上的重要讲话和中央两报一刊重要社论《伟大的历史性胜利》，愤怒声讨、揭发和批判‘四人帮’反党集团篡党夺权的滔天罪行。学习班采用‘学文件、谈意义、揭问题、批罪行、表决心’的方法，办得热气腾腾。"},{"type":"paragraph","text":"同志们在学习中高兴地说，毛主席给华国锋同志亲笔写的‘你办事，我放心’，说出了我们的心里话。以华主席为首的党中央决定建立伟大的领袖和导师毛泽东主席纪念堂，作出出版《毛泽东选集》和筹备出版《毛泽东全集》的决定；采取果断措施，一举粉碎王张江姚‘四人帮’反党集团篡党夺权的阴谋。这些都充分说明:以华主席为首的党中央和我们心连心，有华主席作为全党全军全国各族人民的领袖，给我们掌舵，使我们对于继承毛主席的遗志，把毛主席开创的无产阶级革命事业进行到底，更充满了信心。"},{"type":"paragraph","text":"同志们在学习毛主席关于批判‘四人帮’的一系列重要指示和华主席为首的党中央发出的重要文件时，还回顾了党内历次路线斗争的历史。大家说，无数事实证明:凡是机会主义路线的头子都是违背毛主席制定的‘三要三不要’原则的。他们在政治上必然背叛马克思主义，大搞修正主义，在组织上必然搞分裂，拉山头，结党营私；在手法上必然大搞阴谋诡计。特别是象刘少奇、林彪、王张江姚‘四人帮’，他们是社会主义时期党内资产阶级的典型代表，他们比资本家更厉害。他们在经济上大量挥霍人民的财富，变社会主义全民所有制为走资派所有制，吸工人、贫下中农的血；在生活上腐化堕落，追求糜烂的资产阶级生活方式。同志们说，曾几何时，‘四人帮’猖獗一时，但是，他们不得人心，孤立得很。华主席为首的党中央采取英明果断措施，‘四人帮’不堪一击，很快就成为不齿于人类的狗屎堆。"},{"type":"paragraph","text":"通过学习，同志们纷纷表示:一定要最紧密地团结在以华主席为首的党中央周围，认真学习马列著作和毛主席著作，掌握思想武器，坚持以阶级斗争为纲，发动群众，彻底揭发、批判‘四人帮’的滔天罪行，抓革命，促生产，把各项工作做得更好，以实际行动，向以华主席为首的党中央汇报。　(本报通讯员)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"四人帮","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9118b4fa70"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
