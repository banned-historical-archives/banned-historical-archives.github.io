<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"39f5c300-d854-414d-a93f-a0cfd049f55b","name":"列宁选集 第三卷（1972年）","internal":false,"official":true,"type":"pdf","author":"列宁，人民出版社","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives5/main/39f5c300-d854-414d-a93f-a0cfd049f55b.pdf"],"article":{"title":"被剥削劳动人民权利宣言","alias":"","parts":[{"type":"paragraph","text":"被剥削劳动人民权利宣言7立宪会议决定："},{"type":"paragraph","text":"1.宣布俄国为工兵农代表苏维埃共和国。中央和地方全部政权属于苏维埃。"},{"type":"paragraph","text":"2.俄罗斯苏维埃共和国是建立在自由民族的自由联盟基础上的各苏维埃民族共和国联邦。"},{"type":"paragraph","text":"二"},{"type":"paragraph","text":"立宪会议的基本任务是消灭一切人剥削人的现象，完全消除社会的阶级划分，无情地镇压剥削者的反抗，建立社会主义的社会组织，使社会主义在一切国家获得胜利，因此决定："},{"type":"paragraph","text":"1.废除土地私有制。全部土地以及一切建筑物、农其和其他农业生产用具均为全体劳动人民的财产。"},{"type":"paragraph","text":"2.批准苏维埃关于工人监督和关于最高国民经济委员会的法令，以便保证劳动人民对剥削者的统治，并作为使工厂，矿山、铁路及其他生产资料和运输工具完全为工农国家所有的第一个步骤。"},{"type":"paragraph","text":"3.批准将一切银行收归工农国家所有，这是使劳动群众摆脱资本压迫的条件之一。"},{"type":"paragraph","text":"4.为了消灭社会上的寄生阶层起见，实行普遍劳动义务制。"},{"type":"paragraph","text":"5.为了保证劳动群众掌握全部政权和根除剥削者的政权复辟的一切可能，特命令实行劳动者武装，建立社会主义工农红军，解除有产阶级的全部武装。"},{"type":"paragraph","text":"三"},{"type":"paragraph","text":"1.金融资本和帝国主义所造成的这次空前的罪大恶极的战争使全世界都淹没在血泊中，立宪会议表示具有不屈不的决心，要把人类从它们的魔掌中拯救出来，因此完全赞同苏维埃政权所执行的下述政策：废除秘密条约，组织目前交战国双方军队中的工农进行最广泛的联欢，无论如何都要用革命手段争取在各国人民之间实现以自由的民族自决为基础的、不翻地不赔款的民主和平。"},{"type":"paragraph","text":"2.为了同一目的，立宪会议主张同资产阶级文明世界的野蛮政策完全断绝关系，这种政策是奴役亚洲和一切殖民地及弱小国家的数万万劳动人民，为少数特殊民族的剥削者谋福利的。"},{"type":"paragraph","text":"立宪会议欢迎人民委员会宣布芬兰完全独立、开始从波斯撤退军队，宣布阿尔明尼亚有实行自决自由的政策198"},{"type":"paragraph","text":"3.立宪会议认为苏维埃关于废除（取消）沙皇、地主和资产阶级政府所签订的贷款协定的法令，是对国际银行资本即金融资本的第一个打击，并深信苏维埃政权将坚定地沿着这条道路前进，直到国际工人反对资本压迫的起义获得完全胜利。"},{"type":"paragraph","text":"四"},{"type":"paragraph","text":"立宪会议是根据于月革命前各党所提的名单选出来的，当时人民还不可能全体起来反对剥削者，还不知道剥削者保护他们的阶级特权的全部反抗力量有多大，还没有实际着手建立社会主义社会，因此，立宪会议认为，如果它同苏维埃政权对立起来，即使从形式的观点来看，也是根本不正确的。"},{"type":"paragraph","text":"按实质说，立宪会议认为，现在正是人民同到削者进行最后斗争的时候，任何政权机关都不能有剥削者插足的余地。政权应当完全地、绝对地属于劳动群众和他们的全权代表机关一-一工兵农代表苏维埃。"},{"type":"paragraph","text":"立宪会议拥护苏维埃政权和人民委员会的法令，并且认为它本身的任务仅限子规定对社会进行社会主义改造的根本原则。"},{"type":"paragraph","text":"同时，立宪会议竭力建立俄国各民族劳动阶级的真正自由自愿的，因而也是更加紧密和巩固的联盟，它的任务只是规定俄罗期苏维埃共和国联邦的根本原则：至于每个民族的工人和农民是否愿意参加和在什么基础上参加联邦政府及其他联邦苏维埃机关，这应当由他们在自已的全权苏维埃代表大会上独立决定。写于1918年1月初"},{"type":"paragraph","text":"按手籍刊印载于1918年1月17日（4日）"},{"type":"paragraph","text":"选自《列宁全集》第26卷"},{"type":"paragraph","text":"第396-400页《真理报\u003e第2号"}],"authors":["列宁"],"dates":[{"year":1918,"month":1}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":416,"page_end":418},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7110eaf60e"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
