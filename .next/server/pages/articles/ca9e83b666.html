<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"抵制资产阶级法权思想的侵蚀","authors":[],"dates":[{"year":1975,"month":6,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"抵制资产阶级法权思想的侵蚀"},{"type":"paragraph","text":"山西临汾地区青年领导干部认真学习毛主席关于理论问题的重要指示，决心带头做限制资产阶级法权的模范，为巩固无产阶级专政而努力奋斗"},{"type":"paragraph","text":"近几年来，中共临汾地委把无产阶级文化大革命中涌现出来的一批优秀青年干部从基层提拔到各级领导岗位。这批新干部在三大革命运动中认真看书学习，努力实践，保持和发扬艰苦奋斗的作风，受到了群众的好评。最近地委召开部分青年领导干部座谈会，学习毛主席关于理论问题的重要指示。他们回顾自己成长过程，联系思想实际，畅谈了学习体会。他们说，我们新干部担任领导工作以后，能不能自觉地破除资产阶级法权思想，这是关系到能不能坚持无产阶级专政下继续革命，自觉地为巩固无产阶级专政而斗争的大问题。安泽县委副书记王文学是从公社提拔起来的新干部。担任领导工作以后，他仍然保持普通劳动者的本色，带头参加集体生产劳动，密切联系群众。在学习时他说，社会主义时期还存在着资产阶级法权，还有产生资本主义和资产阶级的土壤。我们要巩固无产阶级专政，必须对资产阶级法权加以限制，坚决破除资产阶级法权思想，带头坚持参加集体生产劳动，逐步缩小三大差别。他分工管面上工作，任务比较繁重。但他坚持参加集体生产劳动。去年，他有三分之二时间深入到基层，和群众一起学习，一起劳动；在机关时，他也尽量利用晚上开会研究工作，白天参加劳动，受到群众赞扬。"},{"type":"paragraph","text":"参加座谈的青年干部谈到走上领导岗位以后，要为无产阶级掌好权，必须同旧的传统观念决裂，做限制资产阶级法权的模范。浮山县委常委、县革委会副主任王峰，从大队提拔起来后，找上门来的人一天天多起来，有的是熟人要他给孩子安置工作，有的是亲戚朋友托他办私人事情。面对这些情况，他重温了毛主席的教导，认识到自己身为领导干部，决不能凭借职权，为少数人办私事。为了帮助教育这些人，他一一回了信，不但坚决拒绝，而且进行了批评教育。在座谈学习时，许多青年干部指出，林彪反党集团阴谋用所谓“官，禄，德”来引诱青年干部，妄想让我们做他们复辟资本主义的工具，我们决不上他们的当。我们一定要坚决抵制资产阶级的物质引诱和各种资产阶级法权思想的捧场，同旧的传统观念彻底决裂，为巩固无产阶级专政掌好权、用好权。"},{"type":"paragraph","text":"临汾地区的青年领导干部在学习时认识到，继续保持和发扬艰苦奋斗的优良作风，是抵制资产阶级思想侵蚀的一个重要方面。吉县县委常委、县革委会副主任陈刚说，保持和发扬艰苦奋斗的作风，拒腐蚀，永不沾，才能立于不败之地。他当了县革委会副主任，全家仍然住着一孔土窑洞。个人用品除买了一件劳动工具外，再没添置一件新东西，他用的挎包仍是几年前的那个旧帆布包，烂了就补。下乡坚持步行，与贫下中农实行同吃同住同劳动同学习，群众说他真象当年的老八路。（据新华社）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"限制资产阶级法权","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ca9e83b666"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
