" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共北京市委关于开除张春久党籍的决定","authors":[],"dates":[{"year":1952,"month":2}],"is_range_date":false,"parts":[{"text":"中共北京市委关于开除张春久党籍的决定","type":"title"},{"text":"张春久，原中国店员工会北京市筹委会主席（已撤职）。河南枣强县人，家庭和本人的成份都是中农。1938年入党。曾任县农会委员、冀南区总农会副主任、县长、县委书记等职。","type":"paragraph"},{"text":"张春久在入城后即被资产阶级所俘虏，与脱党蜕化沦为奸商的于子和（大众皮毛土产公司经理）相勾结，帮助于骗取资金，从事投机倒把。并公开号召店员工会的干部入股，竟至厚颜无耻地说：“入股可以发财”。张春久为了帮助于子和套购国家资财，曾写信欺骗中央人民政府财政部物资管理局所属北京信托商行的刘主任，证明“于子和为村合作社干部，过去任过冀南总农会生产科长，系共产党员，政治上经济上绝无问题。”并帮助于子和取得银行巨额贷款，又将工会会费2500余万元私自借给于子和。经过张、于拖下水的干部竟达9人之多。于子和在张春久的帮助下，窃取了国家大量资财，由1300万元的小商，一跃而为拥有数亿元资本的奸商。于子和的公司实际上成了张春久的供给部。张曾受贿自行车1辆，手表2只，派克钢笔1只，呢子衣料十多码，皮鞋2双，其他吃饭、看戏、取零用钱等不计其数。目前已查清者共贪污1100多万元。","type":"paragraph"},{"text":"在伟大的“三反”、“五反”运动中，张春久身为市店员工会主要负责人和市总工会机关节约检查委员会委员，他不但不自动坦白交代他的罪恶行为，反而与奸商于子和、干部高福等订立“攻守同盟”，抗拒“三反”、“五反”运动，妄图蒙混过关。直至被人检举，领导上与他数次谈话，他还是百般抵赖。党为了挽救他，曾开过3次会，叫他写了4次检讨，他始终不肯真诚坦白。根据以上事实，证明张春久已被资产阶级糖衣炮弹所打中，蜕化堕落，严重地损害了党与人民的利益，丧失了一个共产党员的起码条件。为了纯洁党的组织，严肃党的纪律，特决定开除其党籍。","type":"paragraph"}],"comments":[],"origin":"中共中央监察委员会办公厅编：《县委书记以上干部受到开除党籍处分的决定汇编（二）》（党内文件·注意保存），1960年。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"64c7b6c4e3"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
