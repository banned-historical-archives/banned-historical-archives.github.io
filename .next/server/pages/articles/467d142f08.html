" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoistlibrary","name":"马列毛图书馆","internal":false,"official":false,"type":"db","author":"网络资料","files":"","article":{"title":"决议：热烈庆祝印度共产党（毛主义）成立十五周年","authors":["欧洲马列毛主义政党和组织会议"],"dates":[{"year":2019,"month":9}],"is_range_date":false,"comment_pivots":[],"comments":[],"page_start":0,"page_end":0,"description":"","parts":[{"type":"paragraph","text":"第五次欧洲马列毛主义政党和组织会议二〇一九年九月"},{"type":"paragraph","text":"“既要革命，就要有一个革命党。没有一个革命党，没有一个按照马克思列宁主义的革命理论和革命风格建立起来的革命党，就不可能领导工人阶级和广大人民群众战胜帝国主义及其走狗。”"},{"type":"paragraph","text":"-毛泽东主席"},{"type":"paragraph","text":"我们向在2019年9月22日庆祝其成立15周年的印度共产党(毛主义)的同志致以最热烈和热情的无产阶级国际主义问候。"},{"type":"paragraph","text":"我们向党的中央委员会﹑总书记﹑干部﹑战士和为无产阶级世界革命服务的所有的印度的斗争群众，致以国际主义的问候。"},{"type":"paragraph","text":"我们向贾纳帕蒂同志致以问候，他自建党以来就献身于党，为国际无产阶级服务，领导党度过了光辉岁月。当反革命继续对印度人民进行最残酷的攻击时，他坚持、捍卫和应用马列毛主义，主要是毛主义。他给了印度人民和国际无产阶级必要的领导，直到高龄！"},{"type":"paragraph","text":"我们也向巴萨瓦拉吉同志致以最深切的无产阶级问候！我们对印度人民群众在他的领导下，将在新民主主义革命中坚定不移地前进充满信心！"},{"type":"paragraph","text":"我们还欢迎人民解放游击军的发展和进一步将人民解放游击军发展为人民解放军的斗争。这一步骤显示了印共（毛）的高水平和人民战争的高质量。"},{"type":"paragraph","text":"我们再次重申，我们要高举和捍卫作为战略轴心的整体意义和对无产阶级世界革命有着重大影响的印共（毛）领导的印度人民战争！"},{"type":"paragraph","text":"人民战争的进步也随着阿吉特同志的释放而显现出来。国际团结和在各国得到支持的释放阿吉特同志的国际运动，是一场为无产阶级世界革命的发展作出了贡献的胜利。这场胜利，只有通过捍卫他的自由才能维持和确认。"},{"type":"paragraph","text":"印共（毛）的斗争和胜利就是国际无产阶级和全世界所有被压迫的人民的斗争和胜利。在反对帝国主义和修正主义的斗争中团结一致，在马列毛主义，主要是毛主义的坚定指挥下，我们巩固了我们与印共(毛)的深切联系！我们确信，我们的联系代表着非常重要的客观必要性，以向统一的国际毛主义会议迈进。在马列毛主义，主要是毛主义的指挥下的国际团结中，印度人民战争的胜利将在全世界无产阶级的斗争中，在将要到来的重建和加强共产党的任务中，在人民战争的准备、发动和发展中，释放更强大的能量，服务无产阶级世界革命！"},{"type":"paragraph","text":"印度共产党(毛主义)万岁！贾纳帕蒂同志万岁！中央委员会和巴萨瓦拉吉总书记万岁！马列毛主义万岁！无产阶级世界革命万岁！"},{"type":"paragraph","text":"秘鲁人民运动巴西共产党(红色派)土耳其共产党/马克思列宁主义德国红旗委员会奥地利(毛主义)共产党建设委员会挪威为人民服务-共产主义联盟法国毛主义共产党芬兰红旗集体"},{"type":"paragraph","text":""}],"alias":""},"tags":[{"name":"人民战争","type":"主题/事件"},{"name":"毛主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"467d142f08"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
