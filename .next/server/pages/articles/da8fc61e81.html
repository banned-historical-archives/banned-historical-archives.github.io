" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"捏造罪状十二条，马平企图一棍打垮领导","authors":[],"dates":[{"year":1957,"month":7,"day":20}],"is_range_date":false,"parts":[{"text":"捏造罪状十二条，马平企图一棍打垮领导","type":"title"},{"text":"【文汇报22日讯】 上海市第一速成师范学校前天举行教工大会，声讨右派分子马平的反党、反人民、反社会主义的阴谋活动。","type":"paragraph"},{"text":"马平在学校里一贯对党不满，打击行政领导和积极分子，挑拨是非、破坏团结。大鸣大放开始后，马平的反党活动集中表现出来。他组织小集团，煽动群众，成立不要党、政、工、团的代表参加的中心小组，并把持中心小组，把鸣放引向不健康的方向。企图打垮第一速成师校的党政领导，由他们“挂帅”。他威胁中共上海市虹口区委，一定要区委或市委派干部参加他们把持的鸣放大会，说是“群众”的要求；否则，“群众”就不“放”，还要告到中央去。他们还提出了打击领导“只许成功，不许失败”的口号。在反右派斗争开始后，他又为所有右派分子叫屈，说他们受到了“围剿”。并和他小集团的成员订立攻守同盟，企图顽抗到底。","type":"paragraph"},{"text":"马平在会上的交代，避重就轻，只谈了一些别人已揭发的材料。他说他们捏造了学校领导的“12条罪状”。企图一棍子把领导打死。还提出了“革新”人事、工改制度等三个纲领，主张鉴定由各人自己做，人事材料由自己保管。他说他散布过“解放后空气窒息”，“思想改造伤了知识分子的心”等反动言论。他把反右派斗争说成是“共产党把鸣放搞到民盟头上来了”。","type":"paragraph"},{"text":"马平的交代引起了到会教工的普遍不满。他们进一步揭穿了他的丑恶面貌。语文教师陈光庸说，马平一贯挑拨是非，制造矛盾，打击领导，拉拢落后。他打击了全校三分之一以上的教工，说他们都是“幼稚”、“愚蠢”、“无知”、“低能”的人。马平还污蔑积极分子是“应声虫”、“狗腿子”。新教师一到，马平就向他们散布污蔑校长的话，说一速师搞得一团糟，使新教师失去信心。","type":"paragraph"},{"text":"会上，陈光庸、蒋哲、周继瑛、杨希震等都发了言。他们都警告右派分子马平彻底交代，回头是岸，不要自绝于人民!","type":"paragraph"},{"text":"文汇报记者沈国祥也在会上揭发了马平企图以捏造和夸大事实的稿件在文汇报上发表，以达到他向全国中小学点火的阴谋。","type":"paragraph"},{"text":" 来源：《文汇报》1957年7月22日，原题为：“捏造罪状十二条，马平企图一棍打垮领导，上海第一速师教工要他老老实实彻底交代”。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"da8fc61e81"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
