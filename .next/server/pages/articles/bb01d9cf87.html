script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"上海机械学院革委会发动毕业生深入开展大批判批臭资产阶级贪图安逸的思想 坚决到最艰苦最需要的地方去","authors":[],"dates":[{"year":1968,"month":5,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　上海机械学院革命委员会突出无产阶级政治，落实毛主席的最新指示，大办毛泽东思想学习班，加强毕业生的政治思想工作，狠抓阶级斗争，开展革命大批判，使毕业班出现了朝气勃勃的新面貌。"},{"type":"paragraph","text":"在无产阶级司令部向毕业生发出“面向农村、面向边疆、面向工矿、面向基层”的号召鼓舞下，机院革委会抓紧时机，召开了“毕业生坚决响应毛主席的伟大号召誓师大会”，动员毕业生沿着毛主席指引的方向，到工农群众中去，做一辈子工农群众的小学生，走一辈子与工农相结合的道路。"},{"type":"paragraph","text":"前一时期，全院以班、组为基础普遍办起毛泽东思想学习班。但六七届有些毕业班，由于受到无政府主义思潮的影响，工作一时抓不起。毛主席说:“办学习班，是个好办法，很多问题可以在学习班得到解决。”院、系革委会和毕业班及时开办了六七届毕业生学习班，召开毕业生座谈会，学习毛主席一系列最新指示。涡轮六二一班毕业生在学习班里，开展“三忠于”“四无限”活动，进行斗私批修。好多同学以大量事实揭发、控诉了无政府主义的反动性、危害性，批判了等待分配、甘当逍遥派的错误思想。在举办学习班的基础上，大抓活学活用毛泽东思想讲用会。有些毕业生学习了毛主席《青年运动的方向》这篇光辉著作后激动地说，成千成万革命先烈为了打江山，解放全中国，抛头颅，洒鲜血，在所不惜。我们有什么理由不到祖国最需要的地方去?有的毕业生表示:“四个面向”为我们指出了前进的方向，我们一定要投身到三大革命运动中去，到工农中去，做一个全心全意为人民服务的无产阶级革命事业的接班人。"},{"type":"paragraph","text":"机院革委会根据毛主席“千万不要忘记阶级斗争”的教导，积极组织六七届毕业生狠抓阶级斗争，克服资产阶级派性，迅速建立起班级毕业生分配工作小组。毕业生们认识到，班级内所以无政府主义这样严重，是阶级斗争的反映。因此，一些无政府主义比较严重的班级，狠抓阶级斗争和两条路线的斗争，向敌人发动进攻，击退了一小撮叛徒、特务、顽固不化的走资派以及没有改造好的地、富、反、坏、右分子的右倾翻案妖风，使广大毕业生在阶级斗争的风浪中得到了锻炼。"},{"type":"paragraph","text":"机院革委会在做好毕业生的思想工作中，引导毕业生深入开展革命大批判，彻底批判中国赫鲁晓夫之流推行的修正主义教育路线和在毕业生分配工作中的修正主义路线。有的毕业生深有体会地说，中国赫鲁晓夫推行的分配毕业生工作的修正主义路线，提倡什么东一个“照顾”，西一个“照顾”，实际上把毕业生“照顾”成脱离政治、脱离实际、脱离工农的“梁上君子”，成为资本主义复辟的工具。他们指出，这种“照顾”就是要我们贪图安逸舒适，迷恋大城市。他们表示，决不要这种“照顾”。他们指出，中国赫鲁晓夫竭力灌输“个人奋斗”“成名成家”思想，是妄想把青年培养成为高踞于工农群众头上、做官当老爷的精神贵族。我们一定要深入开展革命大批判，把中国赫鲁晓夫这一套修正主义黑货批深批透，一定要把资产阶级贪图安逸的思想批倒批臭!"},{"type":"paragraph","text":"广大毕业生通过“斗私，批修”，活学活用“老五篇”以及毛主席一系列的最新指示，进一步认识到是不是坚持走同工农相结合的道路，也就是考验自己对毛主席忠不忠的试金石。他们坚决表示:要下定决心，响应党中央“四个面向”的号召，走与工农相结合的革命道路。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"派性","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bb01d9cf87"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
