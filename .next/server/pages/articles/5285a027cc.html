script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"全总执委会会议号召全国职工实现更好跃进  更高地举起毛泽东思想的红旗  进一步大闹技术革命文化革命","authors":[],"dates":[{"year":1960,"month":3,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"全总执委会会议号召全国职工实现更好跃进"},{"type":"paragraph","text":"更高地举起毛泽东思想的红旗"},{"type":"paragraph","text":"进一步大闹技术革命文化革命"},{"type":"paragraph","text":"新华社4日讯　中华全国总工会第八届执行委员会第三次全体会议，2月21日到25日在北京举行。会议号召全国职工要更高地举起毛泽东思想的红旗，树雄心、立大志，深入开展以机械化和半机械化为中心的技术革新和技术革命运动，大力支援农业技术改造，进行文化革命，为实现1960年更好的跃进而奋斗。"},{"type":"paragraph","text":"全国总工会主席刘宁一在会议开始时作了报告。他分析了当前职工群众运动的新形势，并提出了1960年工会工作的方针和任务。"},{"type":"paragraph","text":"会议就刘宁一的报告进行了讨论。"},{"type":"paragraph","text":"有十九个执行委员在会议上发言。他们一致同意刘宁一的报告，并反映了大跃进以来，各地职工热烈学习毛泽东同志的著作，用不断革命精神，把技术革新和技术革命运动推向新高潮的情况。"},{"type":"paragraph","text":"上海市总工会主席钟民说，随着广大职工共产主义觉悟的不断提高，他们学习理论的要求已愈来愈迫切。1959年上海市职工参加以学习毛主席著作为主要内容的红旗读书运动就有二十八万七千人。他们以理论为武器，解决了不少思想和生产中的实际问题。上海国棉九厂工人学习了毛主席的“星星之火、可以燎原”的文章后，使先进经验在全厂迅速普遍开花。工人歌颂道：“红旗读书思想红，毛主席著作万年红”。"},{"type":"paragraph","text":"哈尔滨市总工会主席胡传经说，哈尔滨市以机械化、自动化为中心的技术革新和技术革命运动正在推向新高峰。到2月15日，全市已经出现了三百四十三条自动化生产线，八十个机械化的车间，改装了三万一千台旧机床和旧设备，并在一千零一十九台车床上实现了自动化。鞍山市工会副主席王群说，鞍钢由于进一步开展了技术表演赛，仅2月前十四天内，职工们就提出了十九万四千多件革新建议，其中已经实现的有四万零三百六十二件，等于1月份实现总数的两倍，因而解决了很多重大的生产关键问题。"},{"type":"paragraph","text":"许多执行委员在发言中还指出，随着生产建设高潮的一个接着一个到来，各地的文化革命也已经出现了持续上升的新局面。为了满足广大职工攀登世界科学文化的新高峰的迫切要求，各级工会必须在党的领导下，把职工业余教育工作很好地担当起来。长春市总工会副主席贺英说，经过两年大跃进，长春市的职工教育已经走向大发展、大提高的新阶段。目前，全市已办起各级各类业余学校五百七十八所，入学人数占应学习人数66％以上。她说，1960年长春市的职工教育要求做到坚决扫除文盲，以业余为主建立起从小学到大学的完整的职工教育体系，使应学习的职工全体入学、全部升级。"},{"type":"paragraph","text":"会议最后由刘宁一作总结。他说，我国社会主义建设事业已经进入高速度发展的新阶段，为了适应这个新阶段中党所交给工会的工作任务，各级工会必须在党的绝对领导下，以党的中心工作为自己的中心工作，并和妇联、共青团等单位密切协作，共同做好教育、动员和组织群众的工作。为此，各级工会组织应组织干部认真学习毛泽东同志的著作，不断提高思想认识和改进工作方法，同时要深入基层、深入群众，善于抓住典型，总结和推广先进经验。这样，使工会工作既轰轰烈烈，又扎扎实实，充分发挥共产主义学校的作用，成为党的有力助手。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"刘宁一","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5285a027cc"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
