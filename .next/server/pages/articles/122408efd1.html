script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"毛泽东同志等为捷展览会题词","authors":[],"dates":[{"year":1955,"month":5,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛泽东同志等为捷展览会题词"},{"type":"paragraph","text":"新华社十四日讯　中国共产党的领导者毛泽东同志等给捷克斯洛伐克十年社会主义建设成就展览会的题词。全文如下："},{"type":"paragraph","text":"捷克斯洛伐克十年社会主义建设成就展览会，给了我们深刻的印象。社会主义的捷克斯洛伐克的经济和文化在过去十年间得到了迅速的发展。这是捷克斯洛伐克的共产党和政府的正确领导的结果，这是捷克斯洛伐克全体劳动人民为自己的幸福生活努力奋斗的结果。捷克斯洛伐克在工业特别是机器制造业方面的迅速发展的事实大大地加强了我国人民对正在开始的工业化事业的信心，并且预示中捷两国贸易发展和科学技术合作的日见广阔的前景。祝捷克斯洛伐克日益繁荣强大，祝捷克斯洛伐克人民和中华人民共和国人民间的友谊不断增进和巩固。"},{"type":"paragraph","text":"毛泽东　刘少奇　朱德　陈云　彭真"},{"type":"paragraph","text":"林伯渠　董必武　康　生　张闻天　邓小平"},{"type":"paragraph","text":"一九五五年四月二十八日"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"122408efd1"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
