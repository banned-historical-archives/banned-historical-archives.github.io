script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"泰共领导的人民武装不断出击取得新战果  清莱府洛坤府人民武装痛击反动军警　难府人民武装击落敌人直升飞机一架  泰国工人不断展开斗争反对美帝和他侬—巴博集团残酷剥削和压迫","authors":[],"dates":[{"year":1968,"month":10,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"泰共领导的人民武装不断出击取得新战果"},{"type":"paragraph","text":"清莱府洛坤府人民武装痛击反动军警　难府人民武装击落敌人直升飞机一架"},{"type":"paragraph","text":"泰国工人不断展开斗争反对美帝和他侬—巴博集团残酷剥削和压迫"},{"type":"paragraph","text":"新华社十八日讯　“泰国人民之声”电台最近广播，在泰国共产党领导下，泰国人民武装最近不断出击，又取得了新的战果。"},{"type":"paragraph","text":"电台说，泰国北部清莱府磅县人民武装在十月六日到十二日的几天内，共三次击败前往镇压人民的反动军警，打死打伤敌人三名，并截击敌人刚从机场起飞的直升飞机，使敌人十分惊慌。"},{"type":"paragraph","text":"电台说，十月二日泰国南部洛坤府人民武装在差越县的一个区勇敢地痛击前往镇压人民的反动警察和“保卫国土志愿队”。据初步消息，人民武装打伤了三名反动警察。十月三日，人民武装又处决了一名“保卫国土志愿队”的成员。"},{"type":"paragraph","text":"电台说，人民武装还在洛坤府、素叻府和武里南府惩办敌人暗探三名，受到广大群众的热烈拥护。"},{"type":"paragraph","text":"据泰国报纸报道，他侬反动集团对中部彭世洛府人民展开武装斗争的行动十分害怕，十月十四日派遣地区的军事头目乘直升飞机到彭世洛府那空泰县进行“视察”。报纸承认，这一地区人民蔑视敌人的“围剿”，继续展开斗争，并且还进行了除奸反霸活动。"},{"type":"paragraph","text":"新华社十八日讯　据“泰国人民之声”电台十八日广播，泰国共产党领导下的英勇的泰国北部难府人民武装，九月七日击落美国—他侬反动集团的直升飞机一架，消灭了机上全部敌人。"},{"type":"paragraph","text":"电台指出，这次胜利再一次表明，美国—他侬反动集团是纸老虎，决定战争胜败的是人，不是武器。"},{"type":"paragraph","text":"新华社十九日讯　据“泰国人民之声”电台广播，泰国工人今年以来不断开展斗争，反对美帝国主义和他侬—巴博集团残酷的压迫和剥削。"},{"type":"paragraph","text":"电台说，大部分泰国工人每天要工作十二至十六个小时，终年操劳，得不到休息。工人工资十分低微，男工每日只得十到十五铢，女工只有七、八铢，童工工资更是不足糊口。在泰国现时物价高涨的情况下，这一点点工资是难以维持生活的。"},{"type":"paragraph","text":"电台说，泰国工人还经常遭受美国等外国资本家的欺压，它们制订各种苛刻条例，残酷地剥削工人，甚至拒不发给工人工资。工人的工作没有安全保障，经常发生伤亡事故。"},{"type":"paragraph","text":"电台说，为维护工人阶级的正当权利，泰国工人不断起来斗争，据不完全统计，今年初到九月份，全国共爆发了三十起工人斗争事件，参加人数约一万人。从一九六四年到现在，全国爆发工人罢工等形式的斗争共一百七十六次，参加人数共五万多人。工人的这些斗争密切地配合了农村的人民革命武装斗争，沉重地打击了美帝—他侬集团。"},{"type":"paragraph","text":"这家电台说，泰国工人阶级决心在泰国共产党的领导下，团结农民群众和全国所有爱国爱民主的人民，同他们并肩战斗，更猛烈地进攻美帝国主义和他侬—巴博卖国集团，直到把政权夺到自己手中。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"48b7c5d5d9"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
