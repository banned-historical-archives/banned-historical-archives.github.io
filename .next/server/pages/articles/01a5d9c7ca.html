<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"列希主席在庆祝共和国成立二十周年大会上说  帝国主义和修正主义阻止不了世界革命  革命经验和现实揭穿苏联领导的路线的欺骗性和背叛实质","authors":[],"dates":[{"year":1966,"month":1,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"列希主席在庆祝共和国成立二十周年大会上说"},{"type":"paragraph","text":"帝国主义和修正主义阻止不了世界革命"},{"type":"paragraph","text":"革命经验和现实揭穿苏联领导的路线的欺骗性和背叛实质"},{"type":"paragraph","text":"新华社地拉那十一日电　阿尔巴尼亚劳动党中央委员会、人民议会主席团、部长会议和阿尔巴尼亚劳动党地拉那市委会，十日晚联合在地拉那举行大会，隆重庆祝阿尔巴尼亚人民共和国成立二十周年。"},{"type":"paragraph","text":"阿尔巴尼亚党和国家领导人霍查、谢胡、列希等都出席了庆祝会。"},{"type":"paragraph","text":"阿尔巴尼亚人民议会主席团主席列希在大会上讲了话。他首先回顾了阿尔巴尼亚人民在二十年中所取得的伟大成就。他指出，赫鲁晓夫修正主义者及其追随者企图使阿尔巴尼亚劳动党和人民屈服，使之离开社会主义革命的正确道路，离开马克思列宁主义道路，为了破坏阿尔巴尼亚的第三个五年计划的顺利实现而无所不用其极。但是他们的恶毒企图可耻地失败了。在以恩维尔·霍查同志为首的阿尔巴尼亚劳动党的正确和英明领导下，并且得到社会主义兄弟国家、首先是中华人民共和国的支持，使阿尔巴尼亚整个第三个五年计划有可能得以顺利完成。目前阿尔巴尼亚人民正热情洋溢地为完成第四个五年计划而奋斗。"},{"type":"paragraph","text":"他还揭露了现代修正主义者的“捏造”和说教，说什么从现在起必须取消无产阶级专政，以“全民国家”代替无产阶级专政等等。他说，所有这一切都是对马克思列宁主义关于社会主义国家的实质和作用的肆意歪曲，是在竭力为帝国主义者效劳，给社会主义造成了史无前例的损害。"},{"type":"paragraph","text":"他接着谈到阿尔巴尼亚的外交政策。他强调指出，阿尔巴尼亚人民共和国一贯奉行在完全平等、互相尊重和互不干涉内政的基础上同社会制度不同的国家，首先是同邻国保持正常关系的政策；同时也奉行同帝国主义，特别是美帝国主义和其他反动派进行坚决斗争的政策，奉行毫不妥协和坚决地揭露帝国主义及其走狗的侵略和好战计划的政策，因为这是维护和平和国际安全的首要因素。"},{"type":"paragraph","text":"列希在谈到国际形势时，严厉谴责美帝国主义者对英雄的越南人民进行的野蛮战争和对多米尼加、刚果（利）、老挝、柬埔寨以及其他许多国家进行的干涉。他强调指出，尽管美帝国主义侵略者及其走狗作出了努力，但他们永远压不倒各国人民，永远扑灭不了为争取自由而斗争的理想。"},{"type":"paragraph","text":"列希在揭露现代修正主义者的假反帝行为时说，苏联新领导人不同于赫鲁晓夫的是，他们用极其阴险狡猾的骗人手法，用假革命的词句以及“马克思主义的”和“反帝”的词句，千方百计地掩盖他们亲帝国主义的修正主义政策，掩盖他们同美帝国主义的亲密合作以及他们对社会主义阵营和国际共产主义运动利益的背叛。他们竭力造成一种印象，好象他们正在纠正赫鲁晓夫的“虚夸”和“主观主义”的做法，而事实上他们是在丝毫不变地执行苏共二十大和二十二大的赫鲁晓夫方针，推行“和平共处”、“和平经济竞赛”和“和平过渡到社会主义”的修正主义路线。不仅如此，他们还发誓要忠实地奉行这条路线。"},{"type":"paragraph","text":"列希接着说，但是苏联新领导人的这种花招的寿命也是长不了的，假面具已经被撕破了。革命的经验和现实揭穿了他们路线的欺骗性和背叛的实质，这一路线遭到世界各国人民和所有革命的反帝力量的反对。他并指出，帝国主义和修正主义的“神圣联盟”正被各国人民所揭露，他们的失败是不可避免的。不管帝国主义者和现代修正主义者如何枉费心机，不管他们玩弄什么阴谋和进行原子讹诈，策划什么诡计来出卖革命斗争，他们都不可能阻止革命斗争的巨大发展。目前各国人民的伟大革命斗争预示着帝国主义和现代修正主义的死亡。"},{"type":"paragraph","text":"列希的讲话一再为热烈的掌声所打断。“恩维尔·霍查”、“劳动党”的口号声响彻全场。"},{"type":"paragraph","text":"庆祝会结束后，演出了精彩的文艺节目。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"name":"世界形势","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"01a5d9c7ca"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
