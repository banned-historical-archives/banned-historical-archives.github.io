<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"打退资产阶级对革命家属的进攻烈军属代表举行反贪污大会徐炳生等坦白避重就轻群众当场控诉揭发","authors":[],"dates":[{"year":1952,"month":3,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　本市民政局优抚处直接领导的军属生产单位，有上海市军属生产委员会，包括供销处、互助服务社(在黄浦、中山、襄阳、复兴、虹口五大公园内都设有分社)，及三个被服厂，一个毛巾厂。这些机构原是为本市十五万烈军属及复员、残废军人的生产和生活需要服务的。两年来由于混进了资产阶级的经济坐探，从内部进行腐蚀破坏，大肆盗窃活动的结果，使它变成了为资产阶级服务的据点。"},{"type":"paragraph","text":"本月四日民政局优抚处召开的反贪污、坦白控诉大会，把资产阶级向我们最亲爱的革命家属猖狂进攻的这个重要事实，作了公开的揭发。"},{"type":"paragraph","text":"出席大会的有上海二十个区市、区两级烈军属人民代表、互助服务社股东、职员等二百余人。大会首由民政局屠基远副局长和优抚处戴玉根科长讲话。他们指出这些贪污分子是烈军属中的败类，号召全体烈军属向贪污分子进行不调和的斗争；并警告贪污分子要坦白悔过，才能获得政府的宽大处理。接着指名贪污分子上台坦白。第一个坦白的是徐炳生。他在黄浦公园分社经理任内，擅自动用奖励金，长期不归公账，现在已成为砂轮厂拥有一千万元股本的股东。他的坦白都是鸡毛蒜皮的小问题，立即为大家轰了下来。该分社服务员钟琼等都激愤的上台揭穿他的罪行，指出:他当经理完全是恶霸作风，不准职工请假，工作时间有时长达十七小时；有一个女职员怀孕后，也被迫着拾棒冰纸。自己则逍遥自在，进行开假发票、套购物资等无耻勾当。接着被指名坦白的有复兴公园分社写票员孙克勤、黄浦公园分社摄影周焕章、中山公园分社经理江文华。他们的坦白都避重就轻，极不彻底，为到会群众当场一一揭发:如孙克勤到复兴公园写票，擅自涂改三联单，仅半年时间就盗窃了票款一千余万元。周焕章经常以营业不开发票、动用公款、以坏货报充好货等方式中饱私囊，二年多来，自己买了新房子、切面机；并纠合徐炳生等以赃款开设砂轮厂图利。江文华在中山公园分社经理任内更为恶劣，每天买菜至少揩油三万，星期日更揩油二十万；并动用公款二千多万元，也成为砂轮厂股东之一。这些家伙顶着烈军属的招牌，实际有的过去是老板，有的早已和资产阶级结成血缘，成为资产阶级安插在革命家属生产事业机构中的吸血管。政府和各界人民对革命家属物质方面的照顾，很多都被他们吸进自己的口袋里了。"},{"type":"paragraph","text":"这些事实激起了全体烈军属的极大愤怒，大家一致认识到资产阶级的猖狂进攻是无孔不入的；他们也恶毒地混进革命家属中来，使素来在群众中享有崇高威信、为群众所爱戴的光荣家属蒙受了精神和物资两方面的极大的损失。为了保持革命家属的光荣传统，为了保卫革命家属的生产事业，全市十五万革命家属坚决要和贪污、盗窃分子进行不调和的斗争。"},{"type":"paragraph","text":"这次大会对于贪污分子也是最大的教训，认识到蒙混欺骗是过不了关的。好几个贪污分子会后都补充了坦白材料。如孙克勤由坦白九百万元增加到一千四百万元；周焕章由坦白三、四百万元增加到二千多万元；江文华由坦白一千二百多万元，增加到四千多万元。襄阳公园分社经理彭年(未上台坦白)由坦白四百万元增加到一千四百多万元。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"06b8d24972"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
