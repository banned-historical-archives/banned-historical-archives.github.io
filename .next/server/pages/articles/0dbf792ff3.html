script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji41","name":"毛泽东全集第41卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji41.pdf"],"article":{"title":"对福斯特来信的批语和复信","alias":"","parts":[{"type":"paragraph","text":"对福斯特来信的批语和复信"},{"type":"paragraph","text":"（1959年1月11日、17日）少奇、小平、乔木同志阅，退王稼祥同志处理。可照小平意见?办。复信作了一点文字方面的修改。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一月十一日[1]·福斯特，美国共产党创建人之一。当时任美国共产党名誉主席。"},{"type":"paragraph","text":"[2]小平，即邓小平，当时任中共中央总书记。乔木，即胡乔木，当时任中共中央书记处候补书记、毛泽东的秘书。"},{"type":"paragraph","text":"[3]王稼祥，当时任中共中央书记处书记、中央对外联络部部长。"},{"type":"paragraph","text":"[4]邓小平1959年1月10日在中共中央对外联络部关于公开发表福斯特来信的请示报告上批示说：“我同意来信在《红旗》上发表，主席复信除用公开电发去外，亦可在《红旗》上同时发表。”福斯特的来信和毛泽东的复信后来均发表在1959年《红旗》杂志第三期上，并载于1959年2月2日《人民日报》。"},{"type":"paragraph","text":"[5]毛泽东在审阅中共中央对外联络部代拟的复信稿时，主要是对其中的第三段作了一些修改。"},{"type":"paragraph","text":"对福斯特来信的批语和复信"},{"type":"paragraph","text":"二亲爱的福斯特同志："},{"type":"paragraph","text":"十分感谢您一九五八年十二月十九日的来信。从您的充满热情的来信中，使我看到了伟大的美国共产党的灵魂，看到了伟大的美国工人阶级和美国人民的灵魂。"},{"type":"paragraph","text":"中国人民懂得，美国帝国主义对中国做了许多环事，对全世界做了许多坏事，只是美国的统治集团不好，美国人民是很好的。在美国人中间，虽然有许多人现在还没有觉醒，但是坏人只是一小部分，绝大多数是好人。中国人民同美国人民之间的友好关系，终究会冲破杜勒斯之流的障碍，日益广泛地发展起来。"},{"type":"paragraph","text":"美国共产党虽然暂时还处于不大顺利的地位，但是你们的斗争是很有意义的，将来一定会结出丰硕的果实。黑夜是有尽头的。美国反动势力现已到处碰壁，显示着他们的寿命不会很长了。你们那里自前敌强我弱这种形势，完全是暂时的现象，它一定会向相反的方向起变化。"},{"type":"paragraph","text":"请允许我代表中国共产党和中国人民向您一美国工人阶级光荣的战士和领袖，致以衷心的问候，并祝您早日恢复健康。如果您有可能的话，我热诚地欢迎您到中国来医疗和休养。"},{"type":"paragraph","text":"共产主义的敬礼！"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一九五九年一月十七日[1]杜勒斯，当时任美国国务卿。"}],"authors":["毛泽东"],"dates":[{"year":1959,"month":1,"day":11},{"year":1959,"month":1,"day":17}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":166,"page_end":167},"tags":[{"name":"邓小平","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0dbf792ff3"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
