" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoistlegacy.de-5213","name":"上海市革命委员会转发市革委会政法指挥部关于在文化大革命中被迁送后返沪人员及外地迁送来沪人员处理意见的请示报告","author":"上海市革命委员会","internal":false,"official":false,"type":"unknown","files":[],"article":{"title":"上海市革命委员会转发市革委会政法指挥部关于在文化大革命中被迁送后返沪人员及外地迁送来沪人员处理意见的请示报告","dates":[{"year":1968,"month":1,"day":20},{"year":1968,"month":1,"day":27}],"is_range_date":false,"authors":["上海市革命委员会","上海市革委会政法指挥部"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"中国人民解放军山东省公安机关军事管制委员会, 关于在无产阶级文化大革命中有关处理遣返和查抄财物问题文件汇编, 21-23 (Engman Collection)","tags":[],"parts":[{"type":"title","text":"上海市革命委员会转发市革委会政法指挥部关于在文化大革命中被迁送后返沪人员及外地迁送来沪人员处理意见的请示报告"},{"type":"paragraph","text":"各区、县、局革命委员会（筹备小组）、市、区、县、公安局军管会、各区街道革命委员会（筹备小组）各县人民公社革命委员会：市革命委员会同意市革委会政法指挥部“关于在文化大革命中被迁送后返沪人员及外地迁送来沪人员处理意见的请示报告”，现转发给你们，请按照执行。"},{"type":"subtitle","text":"一九六八年一月二十七日"},{"type":"paragraph","text":"关于在文化大革命中被迁送后返沪人员及外地迁送来沪人员处理意见的请示报告"},{"type":"paragraph","text":"市革命委员会："},{"type":"paragraph","text":"在伟大的无产阶级文化大革命中，本市广大革命红卫兵和革命羣众，高举毛泽东思想伟大红旗，先后迁送了一批地、富、反、坏、右分子和社会渣滓回乡监督劳动。这对加强无产阶级专政，维护城市社会治安具有重大意义。"},{"type":"paragraph","text":"但是，敌人是决不甘心于他们的失败。去年年底以来，有些被迁返回多的地、富、反、坏，右分子，擅自返沪，无理取闹，甚至妄图翻案，反攻倒算进行破坏活动。据有些地区的典型调查，返沪的人员，约占己迁送回乡人员的百分之二十到三十左右，有的单位还错误的重新安排工作，助长了他们的反动气焰。同时，从去年九月以来，其他城市也有一批地、富、反、坏、右分子及社会渣滓迁送来上海地区，对城市社会治安也有一定影响。"},{"type":"paragraph","text":"一九六七年三月十八日，中央转发了北京市公安局军事管制委员会的布告，布告中提出的，“关于在文化大革命中被迁送后返京人员的处理办法”（以下简称“处理办法”），我们认为基本上也适用于上海，可参照执行。在执行中必须活学活用毛主席著作，突出无产阶级政治，依靠革命羣众组织和广大革命羣众，加强无产阶级专政。现就执行中若干有关问题，提出如下意见："},{"type":"paragraph","text":"一、鉴于上海市区现有地、富、反、坏、右分子和社会渣滓有一定数量，涉及面广，在文化大革命中己迁送回农村的仅是少数，如按照“处理办法”十种人条件大批迁送，将会影响当前斗争的大方向。因此，凡符合十种人条件而尚未迁送走的人员，暂时不动，再作硏究处理。"},{"type":"paragraph","text":"二、对己迁送回岁而又返沪的人员，按照“处理办法”执行。凡属于十种人，迁送正确的应坚决责令他们返回原迁送地，其中表现很坏的，发动羣众批判斗争后，强制迁送回乡；凡不属于十种人，迁送不当的应分别情况由原单位妥善安置；那些性貭未定的人员，一般可予以安置落户。"},{"type":"paragraph","text":"三、对由其他大中城市和本市市区迁送回上海郊区各县农村的，除年老病残，不能单独生活，原籍又无依靠的外，当地人民公社，生产队，应妥善予以安置，不要让他们重返城市。对北京迁送来上海市区的人员，在本市有直系亲属、有生活依靠的，应准予落户，不要社他们返回首都；本市无直系亲属、无生活依靠的，可建议原迁送单位另行适当安置。对其他城市迁送来本市市区的人员，一律不予接受。"},{"type":"paragraph","text":"四、己迁送回乡而又返沪的人员，那些人可以留沪安置，应由原迁送单位负责提出意见，社会居民由街道的革命羣众组织负责提出意见，经上一级行政领导和公安机关审查批准。"},{"type":"paragraph","text":"凡己迁送不准返回的人员，应由原迁送对象的工作单位、社会居民由街道革委会（等）和公安派出所负责动员，将其迁送回原迁送地，并与当地商量安置落实。个别无理取闹，拒不回乡的，应发动羣众或由公支部门配合强制迁送。"},{"type":"paragraph","text":"公安机关的审批和迁送工作分工：属于街道和区属工厂、企业、机关的，由各区公安分易负责；属于市属工厂、企业、机关的由市公安局有关业务处负责。"},{"type":"paragraph","text":"五、迁送安置工作中所需经费，根据节约闹革命原则，应由原迁送对象的工作单位负责，被送对象如系社会居民，应由民政部门酌情解决。"},{"type":"paragraph","text":"以上意见，如无不当，请批转有关部门参照执行。"},{"type":"subtitle","text":"上海市革命委员会政法指挥部"},{"type":"subtitle","text":"一九六八年一月二十日"}],"alias":""},"tags":[{"name":"北京文革","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1e55e3c7cf"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
