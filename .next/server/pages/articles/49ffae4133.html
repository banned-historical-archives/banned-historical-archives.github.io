script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji25","name":"毛泽东全集第25卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji25.pdf"],"article":{"title":"让邱清泉深人断其后路并包围之","alias":"","parts":[{"type":"paragraph","text":"让邱清泉深人断其后路并包围之!"},{"type":"paragraph","text":"（1948年11月14日）粟、陈、张，并告韦、吉，谭、王，刘、陈、邓："},{"type":"paragraph","text":"（一）蒋介石以黄兵团?危急万分，令邱兵团星夜挺进，限十三日夜到达碾庄解围。（二）黄兵团本日大约可解决。目前是继续歼灭邱兵团的良机，望令正面阻击部队向东撤退，让邱匪深入。令韦吉兵团于本夜切断邱匪后路，完成对该匪之包围。否则该匪一闻黄匪被歼，将迅速退回徐州。（三）邱匪东援兵力为七个师，留下三个师（骑一旅在内）在徐州及以西。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"十四日四时"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军委起草的给华东野战军代司令员兼代政治委员粟裕、参谋长陈士和副参谋长张震的电报。"},{"type":"paragraph","text":"[2]韦、吉，指韦国清、吉洛（姬鹏飞)，当时分别任华东野战军苏北兵团司令员和副政治委员。谭、王，指谭震林、王建安，当时分别任华东野战军山东兵团政治委员和副司令员。刘、陈、邓，指刘伯承、陈毅、邓小平，当时分别任中原野战军司令员、第一副司令员和政治委员。"},{"type":"paragraph","text":"[3]黄兵团，指国民党军第七兵团，兵团司令官黄百韬。[4]邱兵团，指国民党军第二兵团，兵团司令官邱清泉。"}],"authors":["毛泽东"],"dates":[{"year":1948,"month":11,"day":14}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":211,"page_end":211},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"49ffae4133"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
