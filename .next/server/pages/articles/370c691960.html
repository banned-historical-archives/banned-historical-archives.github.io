script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"津市脚工组织起来  废除旧工头苛重剥削初步改善了脚工生活","authors":[],"dates":[{"year":1949,"month":3,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"津市脚工组织起来"},{"type":"paragraph","text":"废除旧工头苛重剥削初步改善了脚工生活"},{"type":"paragraph","text":"【天津电】津市脚行工人开始组织起来，废除旧工头的苛重剥削，初步改善了生活。二区东货场、十区台儿庄路等五处脚行工人一千六百余名，在人民政府公用局运输事务所领导下，先后成立了五个服务站。工人们结成小组，选出组长，通过运输事务所的介绍，在一定的地区内承运商行货栈货物。所得工资，除提出百分之五作为服务站的办公费用，另付一部分租用车辆及骡马费用外，其余完全由工人自己合理分配。二区饭市的第一服务站的一百零四个工人，每天每人能得一百五六十元人民币，可买十多斤玉米面，足以维持一家四、五口人的生活。五区的脚行工人三百三十五人，在该区职工会办事处领导下，亦先后成立了新的脚行组织。全体工人划分了三十三个小组，由他们自由选出组长指挥工作，记帐分钱等事也由工人们自己管理。旧有的工头，除罪大恶极者予以洗刷外，其余都给以工作机会，给他们一份工钱。河东五区六纬路煤铁部第二存煤厂的一百四十名卸煤工人，以前每天每人最多装卸四吨，现在则在五吨以上。按津市脚行工人在过去国民党统治时一向受着工头们的苛重剥削。例如二区饭市一组二十几个脚行工人，一天拉车赚一千元钱，就要把五百块钱交与脚行头子，再交给他们二百五十块钱的大车和骡马费，所余下的二百五十元，才由他们二十个出力气的人分用。还有的工人只能得到所挣工资的十分之一二，其余则全被工头侵吞。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"370c691960"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
