<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共中央十人小组关于民主党派、工商联等机关的肃反问题的通报","authors":[],"dates":[{"year":1957,"month":2,"day":5}],"is_range_date":false,"parts":[{"text":"中共中央十人小组关于民主党派、工商联等机关的肃反问题的通报","type":"title"},{"text":"[机密程度  绝密主送  上海市委专门委员会并各省市委、自治区党委五人小组 抄送  中央十人小组、中央统战部（共印41份）本件5页  中共中央十人小组 195 年3月5日印发]","type":"paragraph"},{"text":"1956年12月21日电悉。","type":"paragraph"},{"text":"一、“中央统战部关于省、市、自治区的人民政协、民主党派、工商联等机关干部中进行肃反斗争的意见”，是根据中央历次有关肃反工作的指示，“中央十人小组关于反革命分子和其他坏分子的解释及处理的政策界限的暂行规定”提出的，两者的精神基本上是一致的。但是鉴于人民政协、民主党派、工商联等机关的干部人数少，政治情况比较复杂，又是统一战线的性质，党的力量比较薄弱等具体情况，因此，在确定肃反对象上，只应把现行反革命分子，历史上有严重罪行和民愤长期隐瞒的反革命分子以及招谣撞骗、为非作歹严重违法乱纪的坏分子，放在肃反斗争中加以追查，其他需要审查的对象，应当采取个别审查的办法处理，以免牵动面大和发生偏差。因此，不能误解这是“法律上的不平等”。","type":"paragraph"},{"text":"二、同意上海市委统战部意见，在市民主党派、市区两级工商联和23个同业公会等机关中可以不进行公开的肃反运动，如发现有反革命分子和其他坏分子时作为社会镇反处理，但在结案时应当邀请该机关的负责人参加审查，并征得其同意。","type":"paragraph"},{"text":" 一九五七年二月五日","type":"paragraph"},{"text":"附原件：","type":"appellation"},{"text":"关于市政协、市级民主党派、工商联及23个同业公会等机关进行肃反的请示报告","type":"subtitle"},{"text":"中央十人小组：","type":"appellation"},{"text":"兹将市政协、市级民主党派、工商联及23个同业公会等机关进行肃反问题的情况和意见报告如下：","type":"paragraph"},{"text":"市委专门委员会第六小组所属市政协、6个高级民主党派、市工商联及23个市同业公会等机关，共有工作人员753人。一般说来，政治情况复杂。在民主党派机关中又有人少、分散、宗派斗争比较严重的特点；在其余机关中，也有不少人和资产阶级上层分子有着千丝万缕的联系。","type":"paragraph"},{"text":"上述单位的肃反运动，分为两批开展，第一批是市政协的机关干部和民主党派、工商联机关的党团员干部，共有141人。从去年6月开展运动，至今年3月——6月先后结束运动，查出反革命分子和其他坏分子4人，其中党团员各1人。其余单位的612人，列为第二批，也从去年6月进行了“关于胡风反革命集团材料”的学习，并进行了材料的准备工作。其中工商联机关从今年2月开始发动群众，号召坦白检举，4月底转入专案审查，目前已告一段落。但是，按今年3月中央批准的“中央统战部关于省、市、自治区的人民政协、民主党派、工商联等机关干部中进行肃反斗争的意见”中所规定的反革命分子和其他坏分子的标准，虽然多次排队，反复查证，至今尚未发现一个符合这个规格的分子。如果按照今年3月中央批准的“中央十人小组关于反革命分子和其他坏分子的解释及其处理的政策界限的暂行规定”，在市工商联机关参加二批单位运动的212人中，则有13个是符合规格的。","type":"paragraph"},{"text":"根据以上情况，有两个问题请予指示：","type":"paragraph"},{"text":"（一）这些单位在政策界限的执行上，对于党团员干部是按照中央批准的“中央十人小组关于反革命分子和其他坏分子的解释和处理的政策界限的暂行规定”处理的。对于非党、团员干部则是按照中央批准的“中央统战部关于省、市、自治区的人民政协、民主党派、工商联等机关干部中进行肃反斗争的意见”处理的。但在实际执行中，产生了这样一个问题：就是在一个机关单位里执行两种不同的政策标准，有的人认为这种情形不符合宪法上规定的“中华人民共和国公民在法律上一律平等”的精神，也不好向群众作解释。例如有人反映：为什么同是统战机关的干部，同样性质的问题，而党团员和非党干部就有两种不同待遇；为什么同是民主党派的一般成员，同样性质的问题，在统战机关不算反革命，而在其他机关算反革命。也有人反映：同是机关干部，为什么统战机关的非党干部就可以特殊一些。对此应如何解释，请示。","type":"paragraph"},{"text":"（二）市委统战部意见：在市级民主党派，市区两级工商联和23个同业公会等机关干部中，可以不进行公开的肃反运动。如发现反革命分子或其他坏分子即作社会镇反处理，并在处理过程中，以活生生的事实教育群众，提高群众的政治觉悟和革命警惕性。这样既可保证在这些机关内部肃清暗藏的反革命分子，达到纯洁组织的目的，又可保证我党在政治上的主动，避免产生不良影响，而利于统战工作。我们同意以上意见，是否妥当，请指示。","type":"paragraph"},{"text":" 中共上海市委专门委员会一九五六年十二月廿一日","type":"paragraph"}],"comments":[],"origin":"根据文件翻印件打印。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d93ee0adef"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
