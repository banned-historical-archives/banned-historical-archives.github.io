<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中央批转江苏省委关于立即纠正把全部农活包到户和包产到户的通知","authors":[],"dates":[{"year":1959,"month":10,"day":13}],"is_range_date":false,"parts":[{"text":"中央批转江苏省委关于立即纠正把全部农活包到户和包产到户的通知","type":"title"},{"text":"各省、市、区党委，并中央各部委、各党组：","type":"appellation"},{"text":"现在将江苏省委“关于立即纠正把全部农活包到户和包产到户的通知”转发给你们。我们认为江苏省委的意见是正确的。江苏省委指出的，把全部或者大部农活包工到户或者包产到户的作法，实际上是在农村中反对社会主义道路、而走资本主义道路的作法，凡有这种意见和活动的地方，都必须彻底地加以揭露和批判。望采取切实有效措施，加以检查纠正。","type":"paragraph"},{"text":"（发至县级）","type":"paragraph"},{"text":" 中    央一九五九年十月十三日","type":"paragraph"},{"text":"附：","type":"appellation"},{"text":"江苏省委的通知","type":"subtitle"},{"text":"各地、市、县委、公社党委并报中央农村工作部：","type":"appellation"},{"text":"最近发现有些地方把全部农活都包到户；少数地方在全部农活包到户的同时，还实行了全部或部分农作物（如山芋等）包产到户的办法，或者虽然没有公开提出包产到户，但采取了所谓“定田到户，超产奖励”等实际上是包产到户的做法；还有些地方，甚至提出“土地分到户，耕牛农具回老家”。必须指出，这些做法是错误的，都是右倾思想的表现。不论是把全部农活包到户，或者是各种形式包产到户，它们和田间管理部分农活包到户，是性质完全不同的两回事。田间管理部分农活包到户，这是劳动管理的一种方法。为了加强田间管理，把一部分零星分散的、不容易进行统一安排、不需要组织集体劳动的农活包到户，可以健全责任制，调动积极性，正如在集体化的同时，仍然保留一些社员家庭副业的道理一样，田间管理部分农活包到户，可以补集体劳动之不足，但是，决不能用它来全部代替集体劳动。如果把全部农活都包到户，这就从根本上取消了人民公社集体劳动这一基本的劳动形式，退到个体分散劳动的老路。如果把产量也包到户，这就更加错误了，产量包到户，实质上就是从集体退到单干。这些做法，就会使人民公社无法统一安排劳动力组织生产，就会使资本主义思想和行为发展起来。采取这些做法，显然不是广大基本群众的意志，只能是少数富农或富裕中农的要求。这说明了，当前农村中两条道路的斗争还是存在的，防止领导上在这些方面的右倾思想极为必要。为此，省委特作如下通知：","type":"paragraph"},{"text":"一、凡是发现把全部农活包到户，或者是包产到户的地方，不论形式如何，名目怎样，都应当立即批判，加以纠正。这种做法，既不必试行，更不能推广。","type":"paragraph"},{"text":"二、生产队组织劳动的基本形式，应当是集体劳动，包工到户的办法可以实行，但只能限于田间管理方面部分零星分散、不容易统一安排、包工到户比集体劳动更加有利的农活，这一部分农活，只占整个生产用工的一小部分，不可能是大部或全部。究竟那些农活需要包工到户，必须从有利生产、有利巩固集体出发，凡是不应包到户而已经包到户的农活，都应当纠正过来。为了防止群众对这个问题的误解，今后一律不提田间管理包到户，还是提建立全面的生产责任制和“几定”为好。","type":"paragraph"},{"text":"三、人民公社的劳动管理，是一个重大的原则问题。集体劳动还是分散劳动，“三包”到那一级等等，这些都是涉及到生产关系的重大问题。各级党委必须认真加强这一方面工作的领导。在当前，特别要注意批判和防止右倾思想。","type":"paragraph"},{"text":" 中共江苏省委员会一九五九年八月二十二日","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2b7acf6cbf"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
