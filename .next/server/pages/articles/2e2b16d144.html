script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"温州渔市场剥削渔民 县参议会上纷纷抨击十一个机关组织“反对渔市场处理委员会”","authors":["洛宜宜"],"dates":[{"year":1947,"month":4,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【永嘉通讯】温州渔市场自筹设以来，地方各界均表反对，永嘉鱼行，鱼贩及鱼班等三方面，更认为剥削其本身利益，群起反对，由城区鱼行业五十三家联名急电中央农林部揭发该渔市场之重重黑幕。上月廿九日，本县鱼硷商贩百余人，亦为温州渔市场问题向县参议会请愿，由代表陈述渔市场设立后对于地方之害，续由参议员起立报告该渔市场利用武力非法威胁拘捕挑夫时之情形，当场又有参议员黄禹石指出该渔市场之性质，与敌伪时代完全相同，其目的决非在增产而在剥削下层渔民，而其统制之手段有同于“中纺”。前台湾亦因专卖统制发生骚动风潮，前车可鉴，万不可重蹈覆辙。经大会热烈讨论后，结果通过分电各有关机关迅速饬令取消，以平民忿，并发表告民众书，定于卅一日下午招待各界征求意见，当场议决办法五项。卅一日下午二时永嘉县参议会召集地方各法团及公正士绅暨新闻界开会，到会各界代表共五百余人，会场情绪极至紧张，各代表先后陈述反对渔市场之意见，最后通过由县参议会等十一个单位组织“反对渔市场处理委员会”，经常负责反对渔市场一切事。　(洛宜宜，二日)"}],"comments":[],"origin":"永嘉","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2e2b16d144"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
