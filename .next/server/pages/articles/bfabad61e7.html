script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"特别的车队","authors":["吴振海"],"dates":[{"year":1979,"month":4,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"特别的车队"},{"type":"paragraph","text":"青海西宁钢厂  吴振海"},{"type":"paragraph","text":"丙辰清明节的第二天，西宁市上空阴沉沉，东北风带着高原上不易退尽的寒气，不时地扑到地面。"},{"type":"paragraph","text":"上午，在青藏公路上，十四辆解放牌卡车排着纵队紧挨着路边，缓慢、平稳地迎着寒风前进着。为首的一辆车上，两个工人扶着敬爱的周总理的遗像，遗像上面披着黑纱；第二辆车上高耸着一个巨大的花圈，中心的“奠”字在晦暝的天气里闪着光亮；后面的十二辆车上，车头的突出部位都有一簇醒目的大白花，车上肃立着三百多人，每个人的胸前都有一朵小白花。他们都用肃穆的目光注视着前面的道路。"},{"type":"paragraph","text":"从对面开来的车辆，见到此种情景，大多自动停下来。司机和旅客们纷纷从车窗里探出头来，向着总理遗像和花圈注目致哀。"},{"type":"paragraph","text":"这长长的车队，是青海省运输公司第三汽车场的干部和工人们组成的。他们本来计划要在汽车行进途中放哀乐，但是连一台电唱机也借不到；行车的路线，本来选中了省委和省革委会所在地的市中心，可是，因为上边不让清明节搞纪念活动，所以，工人们只好让车队在这行人稀少的青藏公路上行进，以抒发自己满腔的思念和忧愤之情。没有哀乐，只有汽车愤怒的轰鸣，以及呼呼作响的大西北特有的高原风。可是，此情此景反而增添了悲壮、肃穆的气氛。"},{"type":"paragraph","text":"车队到了西宁城区边缘的小桥，一座铁路桥横跨在公路上。高耸的花圈要从车上抬下来才能通过。十四辆车暂时都停下来。"},{"type":"paragraph","text":"这时，站在路旁围看的群众纷纷走上前去，拉住刚从车上下来的工人同志们说：“你们做得好！表达了我们的心愿，也代表了青海人民对敬爱的周总理的心意！”"},{"type":"paragraph","text":"花圈的柱脚贴着地面，勉强从四、五米高的铁路桥下通过了。"},{"type":"paragraph","text":"车队一路发出震撼人心的轰鸣，向着南郊凤凰山革命公墓驶去。中午，花圈被人们簇拥着抬上了凤凰山革命烈士墓。"},{"type":"paragraph","text":"一位三十多岁的年轻人站到刻有“革命烈士永垂不朽”的墓碑前面，面对周总理遗像，朗读在周总理追悼会上邓小平同志代表党中央致的悼词。"},{"type":"paragraph","text":"烈士墓前一片肃静。"},{"type":"paragraph","text":"这时候，在场的三百多名汽车场的干部和工人正迎着阵阵寒风站立着。然而，他们仿佛看到了高天里已透出了光亮……。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"青海文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bfabad61e7"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
