" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji6","name":"毛泽东全集第6卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji6.pdf"],"article":{"title":"违反劳动法令惩罚条例","alias":"","parts":[{"type":"paragraph","text":"违反劳动法令惩罚条例"},{"type":"paragraph","text":"（1933年10月15日）"},{"type":"paragraph","text":"第一条本条例是专为惩罚违反劳动法令的雇主（私人的国有的及合作社的）而颁布，凡违反劳动法令的一切犯法行为都根据本条例惩罚之。"},{"type":"paragraph","text":"第二条凡雇主违反劳动法令各章的规定依照以下各项分别惩罚之："},{"type":"paragraph","text":"（甲）在三个雇佣劳动者以下的企业或机关内，雇主违反劳动法者，处以三元大洋以上的罚款或三天以上的强追劳动或监禁。"},{"type":"paragraph","text":"（乙）在三个以上七个以下的雇佣劳动者的企业或机关内，倘雇主的犯法行为仅及于小部分的雇佣劳动者，处以十元大洋以上的罚款，或十天以上的强迫劳动或监禁。倘雇主的犯法行为系及于多数或全体雇佣劳动者，处以二十元大洋以上的罚款，或两个星期以上的强迫劳动或监禁。"},{"type":"paragraph","text":"（丙）在七个以上的多数雇佣劳动者的企业或机关内，雇主的犯法行为仅及于少数雇佣劳动者，处以一个月以上的强迫劳动或监禁，或三十元大洋以上的罚款。"},{"type":"paragraph","text":"倘雇主的犯法行为，系及于大多数或全体的雇佣劳动者，处以三个月以上的监禁，或一百元大洋以上的罚款。"},{"type":"paragraph","text":"第三条凡雇主违反关于劳动问题的现行法令，看雇主犯法行为罚之。"},{"type":"paragraph","text":"第四条凡私人雇主及国有或合作社企业之管理人违反与职工会订立的集体合同，而该项合同又在当地劳动部登记者，以违反劳动法论罪，按本条例第二条各项的规定处罚之。"},{"type":"paragraph","text":"第五条凡阻碍职工会及各级机关的负责人员及代表的合法行动，或妨害其使用自己的职权者，依其犯罪之程度，处以三天以上的强迫劳动或监禁，或处以三元大洋以上的罚款。"},{"type":"paragraph","text":"第六条凡用强力恐吓或收买等方法以阻止工人或职员加入工会，以企图达到违反劳动法令和集体合同之目的者，依其犯罪之程度，处以五天以上的强迫劳动或监禁，或五元大洋以上的罚款。"},{"type":"paragraph","text":"第七条凡违反劳动法或其他关于劳动问题的现行法令集体合同等案件，都归劳动法庭根据本条例的原则审理之。"},{"type":"paragraph","text":"第八条国有及合作社企业如发生有违反劳动法令及集体合同的事情，可由劳动部国民经济部及职工会组织特别委员会解决之。如不能解决时，则交劳动法庭根据本条例第二、三、四各条的原则判决强迫执行之。"},{"type":"paragraph","text":"第九条凡中农贫农及手工业者小船主，因自己的劳动力不够而使用他人劳动力以辅助自己劳动力之不足者，倘得工人及职工会之同意而没有按照劳动法令的规定者，不应机械地依照本条例第二、三、四各条处罚之。"},{"type":"paragraph","text":"第十条本条例，中央执行委员会得随时修改和废止之。"},{"type":"paragraph","text":"中央执行委员会主席毛泽东"},{"type":"paragraph","text":"副主席项英张国焘一九三三年十月十五日"}],"authors":["毛泽东"],"dates":[{"year":1933,"month":10,"day":15}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":504,"page_end":505},"tags":[{"name":"毛泽东","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ce495f4983"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
