script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"出席市人大常委会会议的委员热烈讨论形势问题发展大好形势必须坚持四项基本原则开展理论研究和思想教育，引导青年反对资产阶级自由化","authors":[],"dates":[{"year":1987,"month":1,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　市人大常委会第二十五次会议，昨天继续举行。会议就珍惜和发展当前安定团结的大好形势问题，开展了认真讨论。江泽民市长在会上汇报了当前情况(消息另发)；胡立教主任作了专题发言。"},{"type":"paragraph","text":"刘靖基副主任和杨槱和孙道临、戴润生、何永忠、卢伯明、张元震、李家镐、王克、王维、马人斌、许文思等委员在会上发了言，赵祖康副主任作了书面发言。他们认为，要发展安定团结的大好形势，必须旗帜鲜明地坚持四项基本原则，要开展理论研究和思想教育，引导青年坚决反对资产阶级自由化。"},{"type":"paragraph","text":"胡立教主任最后讲了话。他说，高度民主是社会主义的伟大目标之一。广大学生关心改革，要求加快社会主义民主建设的心情是可以理解的。但社会上极少数人利用学生缺乏政治经验和实际知识，利用他们对民主、自由的一些模糊认识，鼓吹资产阶级自由化，否定四项基本原则，这是完全错误的。我们实行的民主，是社会主义的民主，不是资产阶级的民主。我们讲民主，不能离开四项基本原则。四项基本原则已经载人宪法，反对四项基本原则的言论，就是违宪的言论，反对四项基本原则的行动，就是违宪的行动。"},{"type":"paragraph","text":"胡立教说，我们上海市人大常委会按照宪法和法律赋予的职权，几年来为加强民主和法制建设，努力做了一些工作。市人大常委会要保证宪法在本行政区域内的遵守和执行，对于任何背离四项基本原则，搞资产阶级自由化的言行，一定要旗帜鲜明地加以反对，不能听任其泛滥。搞所谓“大民主”，不是任何意义上的民主，它只能导致无政府主义的泛滥，影响安定团结，造成生产、工作不能正常进行。"},{"type":"paragraph","text":"胡立教最后说，我们上海人民和全国人民一样，饱尝了十年动乱之苦，深切地感受到安定团结的极端重要性。前一时期，市政府在处理部分大学生上街游行的问题中，做了大量的工作。我们赞同江泽民市长向学生提出的六点意见，市政府采取的果断措施是妥善的、必要的，对维护正常的社会治安秩序和交通秩序，起了积极作用。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"江泽民","type":"人物"},{"name":"上海文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"93373a8fe4"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
