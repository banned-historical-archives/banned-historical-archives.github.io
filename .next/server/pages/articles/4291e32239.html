script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"捷共代表大会闭幕决定在短期内建成社会主义诺沃提尼号召加强团结坚决反对修正主义","authors":[],"dates":[{"year":1958,"month":6,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社布拉格21日电】　捷克斯洛伐克共产党第十一次代表大会今天下午在这里胜利闭幕。"},{"type":"paragraph","text":"大会选出了由97名委员和50名候补委员组成的中央委员会，选出了由25名委员组成的中央检查委员会。党中央提出的候选名单获得了一致通过。当巴拉克同志代表选举委员会宣布选举结果的时候，全场起立长时间欢呼“共产党万岁!”“中央委员会万岁!”"},{"type":"paragraph","text":"接着，杜兰斯基同志代表提案审查委员会作报告。他建议大会通过“关于中央委员会工作报告的决议草案”、“关于中央检查委员会工作报告的决议草案”、“捷共第十一次代表大会的决议草案”和“关于党章中某些修改的决议草案”。"},{"type":"paragraph","text":"杜兰斯基在报告中说，代表大会的进程表明全党对我们过去工作和未来任务的认识完全一致。他强调中央委员会在两次代表大会期间彻底贯彻执行了建设社会主义的总路线，建立了社会主义的巩固基础，实际上消除了人剥削人的现象。他说，根据这一前提，党中央提出了在短期内把建成社会主义作为全党的直接目标和主要任务。提案审查委员会要求大会批准中央委员会在两次代表大会期间的一切活动，并且通过中央委员会的工作报告。"},{"type":"paragraph","text":"杜兰斯基还在报告中说明了对党章作某些修改的情况。"},{"type":"paragraph","text":"在杜兰斯基报告以后，大会一致通过了上述四项决议。这时全场又一次响起了热烈的掌声。“捷共万岁!”“和平万岁!”的欢呼声经久不息。"},{"type":"paragraph","text":"诺沃提尼同态接着向大会致闭幕词。他指出，代表大会表达了全党的战斗精神、思想一致和完成社会主义建设的坚定意志，表达了全党对马克思列宁主义和国际主义的忠诚。代表大会奠定了完成社会主义建设的总路线。"},{"type":"paragraph","text":"诺沃提尼接着代表大会感谢派遣代表团参加大会和向大会拍发电报的59个共产党和工人党。他特别感谢苏联共产党的支持。他说:“我们虽然语言不同，但是有一种共同语言，这就是马克思列宁主义的语言。”他还强调指出，捷共是国际革命运动中坚定的一环，它将忠实地在它的活动中以马克思列宁，主义学说为指南，它将坚决、彻底地反对修正主义。"},{"type":"paragraph","text":"诺沃提尼最后号召全党加强思想上的团结、密切同群众联系、加强政治工作和组织工作来完成社会主义建设。"},{"type":"paragraph","text":"诺沃提尼同志的讲话受到暴风雨般的经久不息的掌声的欢迎。到会者不断高呼:“捷共万岁!”“苏联万岁!”“世界革命运动万岁!”“和平万岁!”"},{"type":"paragraph","text":"代表们还以兴奋的心情通过了捷共第十一次代表大会致苏共中央的致敬信。"},{"type":"paragraph","text":"大会最后在高亢的“国际歌”声中宣布朗幕。"},{"type":"paragraph","text":"晚间，捷共中央委员会为出席大会的代表和参加大会的各兄弟党代表团和代表举行了盛大的招待会。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4291e32239"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
