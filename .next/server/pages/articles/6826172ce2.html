" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji24","name":"毛泽东全集第24卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji24.pdf"],"article":{"title":"自前北宁线正好打仗部队应迅速行动","alias":"","parts":[{"type":"paragraph","text":"目前北宁线正好打仗部队应迅速行动"},{"type":"paragraph","text":"（1948年8月9日）林、罗、刘，并告杨、罗、耿："},{"type":"paragraph","text":"齐十七时电悉。（一）杨成武部已确定二十一日由涞源以东出动，以二十天行程（九月十日左右）到达归绥、集宁附近，并开始攻击。（二）傅作义自己所有的三个军（三十五军、暂三军、暂四军）及各个独立师均位平绥线?及北平附近，并未东去，随时可增援"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军委起草的给东北野战军司令员兼政治委员林彪、副政治委员罗荣桓和参谋长刘亚楼的电报。"},{"type":"paragraph","text":"[2]杨、罗、耿，指杨得志、罗瑞卿、耿飚，当时分别任华北军区第二兵团司令员、政治委员和参谋长。"},{"type":"paragraph","text":"[3]指1948年8月8日17时林彪、罗荣桓、刘亚楼给中共中央军委的电报。电报说：傅作义主力目前业已调至锦州、唐山之线，正便于我杨成武部向西袭击。因此我杨成武部能于日内即出发西进则更好，否则，亦以愈早出发为好。为了造成杨成武部能乘虚袭取归绥、集宁，决令目前在山海关西南之我十一纵，极力威胁山海关、唐山之线，以便吸引傅作义主力。东北主力行动时间，须视杨成武部行动的迟早才能确定，故目前还不能具体确定。"},{"type":"paragraph","text":"[4]杨成武部，指华北军区第三兵团，兵团司令员杨成武。[5]归绥，旧市名，即今内蒙古呼和浩特。[6]傅作义，当时任国民党军华北“剿匪”总司令部总司令。"},{"type":"paragraph","text":"[7]平绥线，指北平（今北京）至绥远（今属内蒙古自治区）包头的铁路，即今京包线。归绥。我军是走路，敌人是乘车或空运，我军走路的二十天中可能被敌发觉，使援军先我或稍后到达。故杨罗耿必须向平古、平张配合行动，并须先几天打响，才能保障杨成武攻占归绥、集宁。（三）你们所说的九十二军、九十四军、十六军等部是交给傅作义指挥的蒋介石部队，不是傅作义自己的。这些部队的中心任务是保卫平榆？、平古、平张、平保诸线，只要杨罗耿向平古、平张行动，除九十二军外，均将迅速缩回。九十四军、十六军等部均在对付杨罗耿，且距锦榆线极远，决不会妨碍你们打锦榆线。九十四军并无到锦州讯，第八军王伯勋?部两个师（旅）由秦皇岛经上海到蚌埠，并无又回北宁线消息，只有九十二军确到滦县一带，你们以一部钳制该军，决不会妨碍你们打锦榆。你们不要被敌人的伪装所迷惑，你们应迅速决定并开始行动，自前北宁线正好打仗，你们所谓你们的行动取决于杨成武的行动，这种提法是不正确的。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"九日二十三时"},{"type":"paragraph","text":"[1]平古，即平古路，指北平（今北京）至古北口的铁路，今京通（通辽）线一段。平张，即平张路，指北平至张家口的铁路，今京包线一段。"},{"type":"paragraph","text":"[2]平榆，即平榆路，指北平（今北京）至山海关的铁路，今京哈线一段。[3]平保，即平保路，指北平（今北京）至保定的铁路，今京广线一段。[4]锦榆线，指锦州至山海关的铁路，即今京哈线一段。[5]王伯勋，当时任国民党军第三十九军军长。[6]北宁线，指北平（今北京）至沈阳的铁路，即今京哈线一段。"}],"authors":["毛泽东"],"dates":[{"year":1948,"month":8,"day":9}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":394,"page_end":395},"tags":[{"name":"杨成武","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"林彪","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6826172ce2"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
