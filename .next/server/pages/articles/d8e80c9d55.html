script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"德国禁止极右分子 举行纪念赫斯集会","authors":["夏治沔"],"dates":[{"year":1994,"month":8,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社波恩8月13日电　(记者　夏治沔)由于德国警方在全国范围内采取预防措施，德国极右分子13日未能在全国举行纪念希特勒副手赫斯死亡7周年的集会。"},{"type":"paragraph","text":"据德新社报道，极右分子在30多个城市举行集会的申请都遭到拒绝。为防不测，德国各地的警察今天都处于戒备状态。但少数极右分子流窜到卢森堡，在德国驻卢森堡大使馆前闹事。"},{"type":"paragraph","text":"柏林、不来梅、班贝格等城市今天组织了反对新纳粹的示威活动。"},{"type":"paragraph","text":"德国外长金克尔在一次记者谈话中称，德国极右分子现在拥有以计算机为基础的信息系统，并超越国界。他们可以把宣传纳粹的材料传送到不遭禁止的国家中去印刷。他表示，他将在9月初的欧洲联盟外长会议上提出此事，以便采取统一行动。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d8e80c9d55"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
