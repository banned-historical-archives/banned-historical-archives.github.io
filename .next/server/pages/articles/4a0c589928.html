<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"作协武汉分会揭批姚雪垠","authors":[],"dates":[{"year":1957,"month":9,"day":3}],"is_range_date":false,"parts":[{"text":"作协武汉分会揭批姚雪垠","type":"title"},{"text":"《人民日报》讯：中国作家协会武汉分会从８月５日至２９日召开了七次座谈会，揭发和批判了姚雪垠一贯反共反社会主义的言行。","type":"paragraph"},{"text":"姚雪垠长期以来仇视社会主义文艺方针，诬蔑执行毛主席的文艺方针是“原地踏步走，背诵去年的皇历”。攻击毛主席提的文艺批评的政治标准和艺术标准的原则“不仅是简单的，而且是死的”，一个“总原则”而已。他还把党对文艺事业的政治思想领导诬蔑为“教条主义的统治”，说什么教条主义“上有领导，下有群众，形成了一种巨大的、沉重的社会力量”。他还提出资产阶级“百无禁忌”的“文学自由”来代替党的文艺方针。他还说马列主义对作家的创作也是“教条”，他还反对作家深入生活，甚至说作家到工厂、农村生活是“划地为牢”，是“捆缚”了作家的手脚。","type":"paragraph"},{"text":"姚雪垠还借反对宗派主义之名，诬蔑党由于“宗派主义作祟，发生了轻视和打击老作家的现象”。他无中生有地造谣说：“有些作品不好的，却被捧到天上一样高，这些被推崇的大都是党员作家或解放区出来的作家”，企图借此煽动一部分作家反对党，破坏党与非党的团结，制造“两个文坛”。他还把整个文艺界说成是阴暗凄惨的，是“臣不能议其君，子不能议其父”的“封建时代”，“到处布置了绊马索，等着你一万个小心中的一个疏忽”。","type":"paragraph"},{"text":"在全国大鸣大放期间，姚雪垠还从北京写信到武汉，要右派分子李蕤在“长江文艺”辟一专栏，专门发表攻击党的文章。","type":"paragraph"},{"text":"与此同时，他还跟北京、河南等地的右派分子彭子冈、姚芳藻、梅朵、苏金伞等过往频繁，交流反党的“内幕新闻”，并到处传播谣言。","type":"paragraph"},{"text":"姚雪垠一贯以“进步作家”自居，剥开其外衣来看，却是一个彻头彻尾的资产阶级的丑恶的灵魂。他１９２７年混入共产党，不久便开了小差。他１９３７年重新混入党内，但却拒绝党分配给他的工作，并坚决主张“抗日必须统一服从国民党”、以后，他又写出“戎马恋”、“春暖花开的时候”等低级色情的作品，来帮助国民党腐蚀和麻醉青年。他还与文化特务头子张道藩勾勾搭搭，并与文化特务陈纪莹合办刊物“微波”，同时跟文化特务孙陵保存着“极其温暖的友情”。上海解放前夕，他又和叛党分子张松和、石小萍以及一些特务组成伪地下组织“中共中央华东局江南工作委员会”，他自任“宣传部长”，进行了骇人听闻的政治投机活动，最后被党取缔。直到解放后八年的今天，他还在“芦沟桥礼赞”一文中，还丧心病狂地对全国人民的公敌蒋介石作了肉麻的歌颂。","type":"paragraph"},{"text":"——原载《人民日报》1957年9月3日，原标题为“资产阶级文艺复辟的道路不通，姚雪垠的狂想破灭，作协武汉分会揭穿了这个右派分子的一贯反动本质”。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4a0c589928"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
