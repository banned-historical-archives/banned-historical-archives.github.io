script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"战胜百日大旱　反透右倾保守  新洲县水稻季季丰收","authors":[],"dates":[{"year":1959,"month":10,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"战胜百日大旱　反透右倾保守"},{"type":"paragraph","text":"新洲县水稻季季丰收"},{"type":"paragraph","text":"本报武汉28日电　今年接连几次遭到严重自然灾害袭击的湖北省新洲县，早稻、中稻和一季晚稻的总收获量比去年增长两成以上，单位面积产量分别比去年同季有不同程度的提高。正收割中的二季晚稻预计总产量和单位面积产量都可以超过去年同季的水平。"},{"type":"paragraph","text":"新洲县今年水稻大丰收，是广大干部和群众在各级党委的领导下，高举党的总路线的旗帜，坚持不懈地向右倾保守思想斗争，并不断发挥了人民公社的巨大优越性的结果。春播时期，县委提出了扩大复种面积和进一步改革耕作技术的任务后，有右倾保守思想的人就曾提出这样那样的困难来反对。可是，广大干部和群众在各级党委的领导下鼓起了冲天的干劲，超额完成了原订扩大复种面积的计划，技术改革也搞得远比去年好。"},{"type":"paragraph","text":"今年新洲县遭受自然灾害是历史上罕见的。春夏之间曾三次暴发山洪，大量秧苗受到不同程度的损害。从6月底起，又遭受了持续达一百多天的大旱灾。当时绝大多数干部和群众坚决主张全面开展抗旱斗争，确保水稻丰收；但一部分右倾保守思想严重的人，却主张保一部分、丢一部分，有的甚至主张丢掉农业去搞副业。各级党委把绝大多数干部和群众团结在自己的周围，严肃地批判右倾保守思想，同时领导群众奋勇地向灾害作斗争。这期间，他们在不断发挥人民公社威力的条件下，以移山倒海的气势大搬江、河、湖水，灌溉了二十多万亩受旱的稻田。就这样，人们终于取得了降伏百日大旱的伟大胜利，保住了水稻的季季丰收。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8e2c7fec54"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
