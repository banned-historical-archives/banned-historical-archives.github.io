script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"印度舆论支持周外长致联合国秘书长复电  英国资产阶级报纸不满美国阻挠和破坏政治会议的行动","authors":[],"dates":[{"year":1953,"month":9,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"印度舆论支持周外长致联合国秘书长复电"},{"type":"paragraph","text":"英国资产阶级报纸不满美国阻挠和破坏政治会议的行动"},{"type":"paragraph","text":"【新华社新德里十八日电】印度“今天报”十五日发表社论，评论我中央人民政府外交部部长周恩来致联合国秘书长的复电。"},{"type":"paragraph","text":"该报写道：“周恩来总理所提出的条件是很清楚的。除了南朝鲜、美国和某些受到美国压力的拉丁美洲国家之外，一切国家都同意这些建议的原则。联合国政治委员会就印度参加政治会议问题所举行的表决就说明了这一点”。该报指出，接受中国的建议，“可以大大增加政治会议成功的可能性。照现在的情况，政治会议失败的可能性是比较大的。政治会议采取圆桌会议形式的意见也是合理的。英国、加拿大、澳大利亚和其他国家也赞成这个主张”。"},{"type":"paragraph","text":"该报说：“如果美国仍然坚持己见，政治会议怎么能举行呢？如果美国坚持它的决定，英国、加拿大、澳大利亚和阿拉伯国家会赞成它吗？既然英国和其他联邦国家一直赞成这样的一些原则，现在它们能够反对这些原则吗？”"},{"type":"paragraph","text":"【新华社十八日讯】伦敦消息：英国资产阶级舆论对于美国利用联合国来阻挠与破坏朝鲜政治会议的专横行动，纷纷表示不满。"},{"type":"paragraph","text":"“泰晤士报”在十五日的社论中说：“朝鲜争端包含着许多问题，是不可能单单由交战国双方加以解决的。”该报又说：“联合国的正当性质是一种世界性质和缔造和平的性质，它必须尽量避免被迫担任一种交战国联盟的角色。”"},{"type":"paragraph","text":"“约克郡邮报”在题为“联合国大会的两项任务”的社论中说，联合国大会目前应该毫不延迟地对两个问题作出决定。“一个是关于联合国本身的地位问题。它还是继续成为真正的全世界性的组织……还是仅仅成为以美国为首的盟国反共集团的另一个名称呢？”另一个问题是朝鲜政治会议的成员问题。在谈到这个问题时，该报说，美国的观念现在“该用较为合理的论据来代替了”，“英国和赞成英国意见的国家必须继续尽可能强烈地表达它们的意见”。"},{"type":"paragraph","text":"“每日先驱报”评论邀请中朝政府代表出席联合国大会讨论政治会议成员问题的建议说，“我们希望英国代表团坚决主张邀请中国和北朝鲜，听取它们的意见。这有什么可反对的呢？……如果许多国家都采取墨菲的拒绝让他方发表意见的政策，联合国的威望将会遭受损失。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"51cfce0d1b"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
