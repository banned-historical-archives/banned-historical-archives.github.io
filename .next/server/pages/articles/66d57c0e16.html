script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"声援纺织工人的反剥削斗争  阿根廷两千多学生举行示威","authors":[],"dates":[{"year":1970,"month":1,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"声援纺织工人的反剥削斗争"},{"type":"paragraph","text":"阿根廷两千多学生举行示威"},{"type":"paragraph","text":"新华社二十二日讯布宜诺斯艾利斯消息：阿根廷重要城市图库曼的两千多名学生二十日在市内主要街道上举行示威游行，支持图库曼附近洛斯拉洛斯镇“埃斯卡拉达”纺织厂工人的斗争。“埃斯卡拉达”纺织厂工人为抗议资本家拖欠工资和解雇工人，于十四日英勇地占领了这家工厂。目前，工人们仍在坚持斗争。"},{"type":"paragraph","text":"示威学生曾前往洛斯拉洛斯镇去声援工人的斗争。他们回来以后立即集会游行，强烈谴责资本家对工人的残酷剥削。学生们在示威过程中用木棍和石块向前来对他们进行野蛮镇压的反动警察进行还击，展开了激烈的搏斗。工人和学生们通过斗争加强了战斗的团结。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"66d57c0e16"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
