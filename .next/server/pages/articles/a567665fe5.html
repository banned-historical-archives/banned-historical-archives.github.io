<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"说“难免”","authors":["北京市","舒芜"],"dates":[{"year":1956,"month":10,"day":29}],"is_range_date":false,"parts":[{"text":"说“难免”","type":"title"},{"text":"北京市舒芜","type":"authors"},{"text":"(原文署笔名“尉迟葵“，即舒芜：人民文学出版社编辑)","type":"subtitle"},{"text":"１０月１６日《文汇报》载有石渠同志的一篇杂谈：〈匹夫不可夺志也〉，里面说：“在大运动中（例如在肃反运动中），有时发生一点过火的斗争，伤了自己人的感情，甚至错误地搜了自己人的腰包，这也是难免的。但是有些领导干部，把‘难免’二字作为免战牌，陶醉于‘运动是健康的，成绩是主要的’，于是把‘亡羊补牢’的善后工作草草了之——这同样也是缺乏人道主义的表现。”","type":"paragraph"},{"text":"这段话说得很好。不过，我觉得，还可以补充一点意见。说是“难免”的事，未必都是真正难免的事。至于“把‘难免’二字作为免战牌”挂起来的地方，我看那下面简直就不是什么难免的事。","type":"paragraph"},{"text":"欧阳修的名文〈泷冈阡表〉里面记有他父亲关于治狱的一段名言：“求其生而不得，则死者与我皆无恨也。矧求而有得邪？以其有得，则知不求而死者有恨也。夫常求其生，犹失之死，而世常求其死也！”这说的是，治死狱的时候要力求其生，推而广之，定任何罪之先都要力求其无罪，犹如今天司法工作中所谓“无罪假定”，具体表现为辩护律师的制度。封建王朝的法律，本质上就是残害人民的，当然不可能有这个制度。那时，个别的对人民生命有责任感的法官，就只好这样地在思想方法上由自己来兼任被告的辩护律师。只有这种“常求其生，犹失之死”常求其无罪，犹失之有罪的情况，才能说是“难免”的。那时，正像欧阳修的父亲那样，说起来是深感疚心的。","type":"paragraph"},{"text":"可是，某些开口就是“难免”的领导干部，他们虽不是“常求其死”、常求其有罪的，至少也不是力求“能免”而竟“难免”，却是早就预期着“难免”，结果当然就有人“不免”。他们其实是粗枝大叶，浮光掠影，安闲得很，又有什么“难”在哪里！所以他们说起“难免”时也就那么飘飘然。","type":"paragraph"},{"text":"其他许多工作当中，也都有这种“难免”论。例如，工资改革评论会上，领导上提出了草案，有人对某些部分提出了不同意见，却不让展开讨论，理由是：一次改革就完全合理是不可能的，暂时还有某些不合理是难免的。结果还是非照草案通过不可。其实，会议正是为了解决问题，既已有了不同的意见，便已提出了合理不合理的问题。偏偏不让讨论，这就不是什么“难免”，只是宁肯不合理也硬要那么办罢了。","type":"paragraph"},{"text":"清代杰出的作家高鹗说过：“这‘不得已’三字也不是一概推委得的。”我想换“不得已”为“难免”，“三字”为“二字”，附“泷冈阡表”一篇，以赠“难免”论者。","type":"paragraph"},{"text":" 来源：1956年10月29日《人民日报》第7版。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a567665fe5"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
