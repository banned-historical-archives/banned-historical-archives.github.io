script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"工人、学生联合起来反对垄断资本的压迫和剥削  意大利工人学生运动蓬勃开展  学生积极支持工人罢工斗争；工人示威不许政府镇压学生","authors":[],"dates":[{"year":1968,"month":10,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"工人、学生联合起来反对垄断资本的压迫和剥削"},{"type":"paragraph","text":"意大利工人学生运动蓬勃开展"},{"type":"paragraph","text":"学生积极支持工人罢工斗争；工人示威不许政府镇压学生"},{"type":"paragraph","text":"新华社二十三日讯　罗马消息：意大利工人要求改善生活条件、反对解雇的斗争和学生反对腐朽教育制度的斗争正在意大利各地展开。工人的斗争得到了青年学生的积极参加和支持。有些示威学生提出了“学生和工人联合起来”的战斗口号。"},{"type":"paragraph","text":"在杜斯卡纳区的彼萨，几千名学生二十一日在大街上举行了游行示威，支持“圣戈班”玻璃厂坚持了八天罢工的工人。这个厂的工人为抗议资方无理解雇大约四百名工人而进行了罢工斗争。示威者在一个监狱外停了下来，声援三个因为支持玻璃工人的斗争而被监禁的学生。他们一再高呼：“释放被监禁的学生！”“不许政府镇压！”后来，示威学生前往“圣戈班”工厂会见罢工工人，对他们表示声援。"},{"type":"paragraph","text":"工人和学生二十二日还联合举行了集会。"},{"type":"paragraph","text":"在意大利首都罗马，一千多名中学生二十一日在一所学院外面举行示威，抗议学院当局勒令三名参加斗争的学生停学。他们举着标语牌，高呼“不许镇压，要自由！”“不要老板们的学校！”“学生和工人联合起来！”“这仅仅是开始，我们还要继续斗争！”等战斗口号。"},{"type":"paragraph","text":"警察野蛮地袭击他们，但是他们手挽着手，高呼“警察是法西斯”，英勇地抵抗了警察的袭击。在这场斗争中，九名学生被逮捕，五人受伤。"},{"type":"paragraph","text":"同一天，在意大利第二大城市米兰，教育部长在视察一所大学的时候，大约一千名学生包围了他，抗议政府拒绝接受学生们关于高等教育实行民主改革的要求。学生们躺在地上，不让这个部长的汽车开走。结果，这个部长不得不在许多警察的保护下狼狈溜出学校。"},{"type":"paragraph","text":"二十二日，罗马的各工厂的工人举行了时间不等的罢工，支持一家工厂的三百名工人为反对解雇而坚持了一百四十一天的斗争。"},{"type":"paragraph","text":"在罗马附近的港口城市锡维塔韦奇亚和阿布鲁佐区的阿奎拉，工人们最近举行了总罢工，反对解雇，抗议日益严重的失业现象。"},{"type":"paragraph","text":"在其他一些城市也举行了类似的罢工。这些斗争都得到了学生的积极参加和支持。"},{"type":"paragraph","text":"二十一日，在热那亚港，由于码头工人为要求提高工资而举行二十四小时的罢工，使十二艘货船的装货和卸货工作陷于停顿。"},{"type":"paragraph","text":"在农村，乌姆布利亚区的佩鲁贾的数千农民和阿浦利亚区的布林的西的数千农民也分别于十九日和二十日举行了街头示威游行，反对农业中的严重失业现象。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"546b35ee2f"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
