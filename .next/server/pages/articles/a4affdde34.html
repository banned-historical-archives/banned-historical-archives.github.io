script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"捐税重肥料贵　中间剥削严重  台湾农民叫苦不迭","authors":[],"dates":[{"year":1984,"month":5,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"捐税重肥料贵　中间剥削严重"},{"type":"paragraph","text":"台湾农民叫苦不迭"},{"type":"paragraph","text":"本报讯　据《联合报》最近报道，台湾农民绝大多数对负担过重表示不满，希望当局减低赋税和肥料价格，实施农产品保证收购价格，建立运销系统，办理低利贷款，解决劳力不足等严重问题。"},{"type":"paragraph","text":"台湾省主计处最近完成的台湾农民经营农业状况及意向“调查报告”指出了上述问题。这份报告还强调说，大多数农民认为，目前经营的最大问题是受中间商人剥削过重，这些人贱买贵卖农产品，放高利贷，无所不为。此外，耕地太少而又分散，灌溉渠道布局不合理，而且经常缺水断水，也严重影响了农业生产。"},{"type":"paragraph","text":"据调查，目前自耕农占总农户的80％左右，仍有相当数量无地可耕的佃农，这些人租田耕种或打散工，是农村中收入最差的阶层。兼业农户已占到80％以上，而农户中实际务农的劳动人口只占40％。这些人中，90％是五十五岁至六十四岁的老农。74％的务农者没有读过农业学校，劳力老化和文化科学水平低下是农业生产中的两个突出问题。耕地零散也是一个突出的问题，目前平均每一农户耕地一点一公顷，而耕地集中一处未满零点五公顷者又占68％，这严重影响了农业机械化和合理灌溉的进程。这份调查报告指出，上述问题不解决，农民经营生产会仍然困难，岛内的农业经济也难以发展。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a4affdde34"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
