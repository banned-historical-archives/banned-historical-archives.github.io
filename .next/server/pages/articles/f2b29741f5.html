script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"事实证明资产阶级真是腐臭不堪","authors":["何镜波"],"dates":[{"year":1952,"month":3,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编辑同志:最近在报上看到许多资产阶级猖狂进攻的罪恶行为，使我愤怒不已。特别是看到沪江大学许云影同学对她资产阶级的父亲的控诉一文，使我更深刻的看到资产阶级的丑恶面目和卑鄙无耻、唯利是图、阴险毒辣的本质。许云影的父亲在解放后欺压工人，以延长工时来加重残酷的剥削；解放前操纵工会，打击进步工人，并行贿腐蚀干部，大量盗窃国家资财。同时，在政治上伪装进步，担任了江宁区人民代表会议代表，他就这样利用政治地位进行窃取国家经济情报。从这一连串的罪恶行为更明确地说明了资产阶级丑恶的本质。她父亲为了更大规模的盗窃国家资财，甚至指使自己的女儿向其他的奸商们献媚，并强迫女儿嫁给不法资本家，把自己的女儿当作商品一样的到处求卖，迫害年青的儿子在革命队伍中退伍了；像这种毫无人性的资本家是何等的卑鄙无耻啊!他这样肆无忌惮的向工人阶级、向人民政府、向国防经济建设、向革命队伍进行猖狂的进攻，这还能容忍吗?我坚决站稳立场，投身到五反斗争中去，打退资产阶级猖狂的进攻!"},{"type":"paragraph","text":"圣约翰大学　何镜波"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f2b29741f5"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
