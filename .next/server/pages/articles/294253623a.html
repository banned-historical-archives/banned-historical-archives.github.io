" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji42","name":"毛泽东全集第42卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji42.pdf"],"article":{"title":"对中央转发廖鲁言关于召开十四个城市蔬菜会议情况报告的指示稿的批语","alias":"","parts":[{"type":"paragraph","text":"对中央转发廖鲁言“关于召开十四个城市蔬菜会议情况报告的指示稿的批语2"},{"type":"paragraph","text":"（1959年6月9日）少奇同志阅后，尚昆用电报告『告』发去。[1]廖鲁言，当时任中共中央农村工作部副部长、农业部部长。"},{"type":"paragraph","text":"[2]廖鲁言1959年6月3日给毛泽东、中央写报告说，5月底召集了北京、上海、天津等14个城市的蔬菜会议，了解到城市蔬菜供应仍然紧张，需要继续做好以下工作：（一）近郊区的农业生产方针应“以菜为纲”。（二）城市居民的蔬菜供应标准能保证每人每天一斤，就算很好了。（三）要注意从土地、劳动力、运输条件、种子、水源等方面来落实城市蔬菜生产计划。（四）城市商业和农业部门应组织有关方面订立蔬菜产供销合同，共同保证按合同供应生产资料。（五）蔬菜供应机构的从业人员不能太少。（六）有些销行全国和外销出口的名菜，要专门组织生产基地。（七）猪、鸡、鹅、鸭、鱼、虾的生产必须尽力发展。1959年6月9日，中央将廖鲁言的报告转发各省、市、自治区党委并各大、中城市市委，指出报告所提各项意见是正确的，希望各地切实抓紧夏菜和秋菜的生产，抓紧副食品的生产，做好产供销工作，力求早日缓和城市副食品供应紧张的局面。毛泽东的批语，就写在中央这个指示稿上。"},{"type":"paragraph","text":"[3]尚昆，即杨尚昆，当时任中共中央书记处候补书记、中央办公厅主任。"}],"authors":["毛泽东"],"dates":[{"year":1959,"month":6,"day":9}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":62,"page_end":62},"tags":[{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"指示"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"294253623a"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
