script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"斯洛伐克共产党代表大会　通过决议坚决反对南共修正主义纲领","authors":[],"dates":[{"year":1958,"month":5,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社布拉格19日电】　斯洛伐克共产党代表大会昨天在布拉迪斯拉发闭幕。在大会上一致通过的决议说:“我们坚决反对南斯拉夫共产主义者联盟代表大会上所通过的修正主义的纲领，这个纲领背离了马克思列宁主义的基本原则。”"},{"type":"paragraph","text":"决议着重说:“我们一刻也不能忘记有必要坚持不懈地同工人阶级运动中最危险的敌对的意识形态——现代修正主义的各种表现作斗争，我们必须解释从资本主义到社会主义的过渡时期的普遍特征和规律，以及国际共产主义和工人运动中的共同目的和任务。”"},{"type":"paragraph","text":"决议指出全党在意识形态战线上的活动增加了，并且要求人们注意加强对人民的社会主义教育，以便逐步克服资产阶级意识形态的一切表现。"},{"type":"paragraph","text":"决议指出了工业和农业中的主要任务，并且强调说，基本任务之一是保证农业不断的和大量的增产。"},{"type":"paragraph","text":"这次代表大会讨论了完成社会主义建设的问题、党的思想、群众和干部工作的问题、劳动人民参加国家指导工作以及其他重要的问题。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"37b95414db"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
