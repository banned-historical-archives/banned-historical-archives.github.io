<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"毛主席到了进县","authors":["万世祥","桂承铎"],"dates":[{"year":1958,"month":4,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"古老的都江堰的流水演奏起欢迎的乐曲，川西平原春意正浓。在3月的一个下午，一位穿着灰色制服、身材魁伟的人——我们敬爱的领袖毛泽东主席出现在灌县近傍的成阿公路上。"},{"type":"paragraph","text":"毛主席走到公路旁边。这里是岷江左岸的一座高山，成阿公路盘旋到山腰以后，一直向西伸去。站在这里，山脚下波涛滚滚的岷江一览无余。毛主席拿上望远镜，仔细地察看了这个有二千二百多年历史的都江堰工程，还询问了都江鱼嘴、内江、外江和“杩槎”等工程情况。"},{"type":"paragraph","text":"毛主席一面察看都江堰的工程，一面听着省委第一书记李井泉和都江堰管理处处长张建中讲述每年岁修的情况。"},{"type":"paragraph","text":"毛主席关心的问:“每年岁修给不给民工的钱?”"},{"type":"paragraph","text":"李井泉同志回答:“给的。”"},{"type":"paragraph","text":"毛主席又问:“修一次要多少工?”"},{"type":"paragraph","text":"张建中说:“大概要一百万民工。”"},{"type":"paragraph","text":"毛主席说:“今后应该改用机器修，用卷扬机、掘土机，就省人力了。”毛主席又指着索桥下的都江鱼嘴对张建中说:“今后要想办法用现代化的工程，把泥沙控制起来!”"},{"type":"paragraph","text":"听了毛主席的话，大家不禁想起了毛主席早在1934年说过的“水利是农业的命脉”这句话，也唤起了对未来的美妙想像，深感到毛主席对农田水利工作的无限关怀。"},{"type":"paragraph","text":"毛主席来到了伏龙观。这是建筑在“离堆”上的李冰祀祠。毛主席身体很好，登上数十级的石阶，步子稳健、快捷。在这里，毛主席观看了都江堰模型、都江堰灌溉区域图和宝瓶口。在看都江堰模型的时候，毛主席伏着身子观察得很细致，他指着飞沙堰溢洪道问张建中:"},{"type":"paragraph","text":"“这里修个闸不更好吗?是不是?”"},{"type":"paragraph","text":"张建中说:“是的”。张建中不仅完全同意这个看法，而且他心里想:毛主席真是一个农田水利的老行家。"},{"type":"paragraph","text":"张建中指着飞沙堰侧边的内江，告诉毛主席说:“每年岁修，就在这里挖泥、掏沙。”"},{"type":"paragraph","text":"毛主席笑着说:“那一百万年以后，成都平原的泥沙就没处堆了?”"},{"type":"paragraph","text":"张建中说:“将来岷江上游修了水库，泥沙就少了。”"},{"type":"paragraph","text":"毛主席欣然地点了点头，大家也仿佛已经看到了这个古老工程未来的新面貌，"},{"type":"paragraph","text":"到了伏龙观背后的宝瓶口，这里水流湍急，内江的滔滔春水，通过这里灌溉着成都平原。毛主席指着宝瓶口两边的岩石问:“这里岩石有没有被冲垮的?”"},{"type":"paragraph","text":"张建中说:“这是粒岩，很坚硬。”"},{"type":"paragraph","text":"毛主席又笑着问:“一百万年以后，可能要被冲毁吧?”"},{"type":"paragraph","text":"大家没有料到毛主席提出这个问题，一时都答不上来。大家都感到:毛主席的问话，使自己的眼光突然深远、广阔起来!"},{"type":"paragraph","text":"毛主席俯视宝瓶口的激流，又问张建中这里有多深，过去有没有人下去游过。"},{"type":"paragraph","text":"张建中说:“这里有八公尺深，没有人下去过。”"},{"type":"paragraph","text":"毛主席爽然地笑起来说:“我想下去。”"},{"type":"paragraph","text":"听了毛主席这句话，大家都暗暗惊讶。但是，当大家想起毛主席前年横渡长江的事迹，又亲眼看见毛主席的体魄如此健壮时，觉得，这小小的宝瓶口在毛主席的面前，又何足道!"},{"type":"paragraph","text":"不知是谁把看见毛主席的消息传开了。伏龙观外面很快就聚集了一百多人。许多青年学生、少先队员和居民，都从远处跑来看望毛主席。当毛主席走出伏龙观大门的时候，人群立刻沸腾起来。大家跳跃着欢呼:毛主席万岁!毛主席好!人们热爱自己的领袖，都要争着挤上前去多看看毛主席。毛主席微笑着走上前去，向前后左右欢呼的群众招手致意。这时，沸腾的群众，更加沸腾起来!"},{"type":"paragraph","text":"午后七点多钟，毛主席离开灌县回成都。公路两旁是一片片金黄色的油菜和油绿的麦苗。毛主席下车来，跨过公路左边的小石桥又去察看庄稼。这里是灌县新城乡莲花一社。社员冉贵全第一个看见毛主席，他几乎不相信自己的眼睛，他没有想到毛主席会来到这里。正在他不知说什么才好的时候，毛主席已经跨进了一块葱绿的麦田，茁壮的麦苗簇拥着毛主席。毛主席看见麦地里还有野草，和蔼地对冉贵全说:"},{"type":"paragraph","text":"“要把草锄干净。”"},{"type":"paragraph","text":"毛主席像一个熟练的老农，一面用手拨着麦苗，一面问冉贵全:“每亩收多少斤?”"},{"type":"paragraph","text":"冉贵全还正在迟疑的时候，毛主席已经伸出了四个指头问他:“四百斤?”"},{"type":"paragraph","text":"冉贵全说:“差不多，每亩四百二、三十斤。”这时，陆续围上来的农民都十分惊奇:毛主席在北京，每天忙于国家大事，怎么连地里能打多少麦子都知道。"},{"type":"paragraph","text":"毛主席问:“割了麦子种什么?”"},{"type":"paragraph","text":"冉贵全回答:“种水稻。”"},{"type":"paragraph","text":"毛主席又问:“水稻每亩收多少斤?”"},{"type":"paragraph","text":"冉贵全回答:“六百多斤。”"},{"type":"paragraph","text":"这时，毛主席向李井泉同志说:"},{"type":"paragraph","text":"“四百多加六百多，就是一千多，那可了不起。”"},{"type":"paragraph","text":"毛主席走上田坎，农民高浡然和他的两个孩子迎面跑上前来。毛主席问高浡然多大年纪，孩子读书没有。高浡然告诉毛主席，他已五十八岁了，两个孩子都上了学。"},{"type":"paragraph","text":"毛主席高兴地说:“好哇!”"},{"type":"paragraph","text":"沿着田坎过去，毛主席跨进了一块苕菜田，几个女社员正在那里摘苕菜，毛主席边走边问:"},{"type":"paragraph","text":"“你们摘什么?”"},{"type":"paragraph","text":"女社员王应岗回答:“摘苕菜。”"},{"type":"paragraph","text":"毛主席说:“我帮你们摘点好不好?”说着，毛主席就弯下腰去摘苕菜，毛主席摘了一把嫩绿的苕菜尖尖递给王应岗，问:“这行不行?”"},{"type":"paragraph","text":"王应岗站起身来双手捧着连声说:“行!行!”捧着毛主席采摘的苕菜，王应岗和其他的女社员，都感到浑身热呼呼的，她们想喊一声“毛主席”，但又激动得喊不出来。"},{"type":"paragraph","text":"毛主席沿着一条杂草丛生的干沟走去。这时，几个少年紧跟着毛主席的身边跑，毛主席问一个名叫任国民的少年说:“你认得‘打破碗花花’吗?”"},{"type":"paragraph","text":"任国民说:“认得。”"},{"type":"paragraph","text":"毛主席随手摘了一株“打破碗花花”给任国民，说:“你敢不敢拿?”"},{"type":"paragraph","text":"任国民说:“敢拿”，就伸手去接。"},{"type":"paragraph","text":"毛主席笑着说:“要打破碗啊!”"},{"type":"paragraph","text":"少年笑了，社员们都笑了。最初社员们看到毛主席时还有些拘谨，现在，大家都感到和毛主席在一起，真是亲如一家，温暖无比!"},{"type":"paragraph","text":"毛主席快走上公路的时候，田里的社员们都拥上来，毛主席连连称呼他们是好同志，和他们一一握手。一个社员紧握着毛主席的手，激动地说:一辈子也难得啊!社员们把毛主席一直送到公路上，这时天快黑了。他们看着毛主席的车子开去，仍久久不想离去。有的社员回家后连夜奔走，告诉别人说:“毛主席到我们莲花一社来过了!”"},{"type":"paragraph","text":"第二天晚上，莲花一社召开了一个社员大会，社员们都说:能够看到毛主席，是一辈子最大的幸福；毛主席看了自己社里的庄稼，是全社最大的幸福。于是，他们就立即把莲花一社更名为幸福社。大家还抢着说，要用争取大丰收的行动来报答毛主席的关怀，当场就组成了八个突击队，决定突击三天，每户平均积肥要达到十二万斤(原来是六万斤)。一个社员站起来说:“我提个意见，我们要在今年丰收以后，写信报告毛主席!”这时，全场响起了热烈的掌声。"},{"type":"paragraph","text":"当天夜晚，有的积肥突击队就干劲百倍地行动起来了。"},{"type":"paragraph","text":"(四川日报记者　万世祥　桂承铎)"},{"type":"paragraph","text":"\u003cIMG alt=请插入4号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1958\\04\\584c010101.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e毛主席在灌县新城乡莲花一社的苕菜田里，和女社员们一起摘苕菜。(新华社记者　侯波摄)\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgaut\u003e侯波\u003c/FONT\u003e"},{"type":"paragraph","text":"\u003cIMG alt=请插入4号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1958\\04\\584c010102.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e毛主席在郫县合兴乡红光社看可以灭蚊蝇的野生植物‘打破碗花花’。(新华社记者　侯波摄)\u003c/FONT\u003e"}],"comments":[],"origin":"新华社,四川日报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"569976a7e8"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
