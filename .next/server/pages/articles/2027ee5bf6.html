script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"阿尔巴尼亚“人民之声报”说  帝国主义和现代修正主义者的百般诬蔑  贬低不了中国在国际舞台上的巨大作用","authors":[],"dates":[{"year":1960,"month":10,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"阿尔巴尼亚“人民之声报”说"},{"type":"paragraph","text":"帝国主义和现代修正主义者的百般诬蔑"},{"type":"paragraph","text":"贬低不了中国在国际舞台上的巨大作用"},{"type":"paragraph","text":"阿尔巴尼亚“人民之声报”10月1日以“向伟大的天才的中国人民致兄弟般的敬礼”为题发表社论说，中华人民共和国的成立从国际意义上来说，是十月社会主义革命胜利以后最伟大的事件。它给了帝国主义和殖民主义以毁灭性的打击，使力量对比更加有利于和平和社会主义。"},{"type":"paragraph","text":"社论接着指出：中国伟大人民革命的胜利是中国人民在以人民亲爱的儿子、久经考验的马克思列宁主义者毛泽东同志为首的光荣的中国共产党英明和卓有远见的领导下，经过长期艰巨的斗争而取得的。"},{"type":"paragraph","text":"社论在具体介绍了中国建设成就后指出：“这些胜利生动地证明了中国共产党以列宁主义的社会主义建设原则为基础的路线，是正确的，是马克思列宁主义的路线。关于使中国迅速变为具有现代化工业、现代化农业和现代化科学文化的社会主义大国的这样一个方针，正在成功地实现着。这些成就之所以可能，是由于有了党所制定的总路线、大跃进和人民公社。”"},{"type":"paragraph","text":"社论说，中国的伟大社会主义变革及其对争取和平的斗争所作的巨大贡献，提高了它作为世界上伟大爱好和平的社会主义国家的威信。生活的实际证明，中国对消除新战争的危险、对维护和巩固亚洲和世界和平的斗争作出了、并继续作出卓越的贡献。爱好和平的各国人民尤其重视人民中国在扑灭由殖民者和帝国主义者在朝鲜等国所燃起的战火的斗争中所作出的巨大贡献。中华人民共和国关于亚洲和太平洋沿岸各国签订互不侵犯公约、并使这个地区成为无核子武器地区的和平倡议，中华人民共和国对一切有利于缓和国际紧张局势的倡议的支持——这些都清楚地证明了中国的和平政策。中华人民共和国坚决执行众所周知的和平共处原则，同一系列不同社会制度的国家建立了并保持着友好的关系。中华人民共和国是和平共处五项原则首创者之一。"},{"type":"paragraph","text":"社论说，阿尔巴尼亚人民一贯要求恢复人民中国在联合国的合法代表权。社论严词谴责了美帝国主义排斥中华人民共和国合法代表，而使蒋介石政治僵尸窃据人民中国席位的可耻勾当。"},{"type":"paragraph","text":"社论指出，美帝国主义者在其反对中国人民的肮脏活动中还动用了他们的代理人南斯拉夫铁托集团，这个修正主义集团千方百计地诬蔑人民中国。但是，帝国主义和现代修正主义者的任何诬蔑都贬低不了人民中国在国际舞台上的巨大作用，阻挠不了它的国际威信的提高和巩固。"},{"type":"paragraph","text":"社论又说，阿尔巴尼亚人民同伟大的中国人民有着永恒的、牢不可破的友谊。作为以苏联为首的社会主义阵营的成员，我们两国人民正在为进一步巩固社会主义阵营的团结而斗争，粉碎着力图分裂和破坏这种团结的帝国主义和现代修正主义的一切阴谋。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2027ee5bf6"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
