<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"cb043827-1a6a-46f3-863d-a430958e5a0d","name":"无产阶级文化大革命参考资料（1966年）","internal":true,"official":false,"type":"pdf","author":"","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives3/main/cb043827-1a6a-46f3-863d-a430958e5a0d.pdf"],"article":{"title":"就红五类提法访问中共中央、国务院联合接待站","alias":"","parts":[{"type":"paragraph","text":"我先哈语录，“我们的教育方针，应该使受教育者在德育、智育、体育几方面都得到发展，成为有社会主义党悟的有文化的劳动者。”第二段：“对于在职干部的教育和干部学校的教育，应确立的研究中国革命实际问题为中心，以马克思列宁主义基本原则为指导的方针，废除静止地孤立地研究马克思列宁主义的方法。”"},{"type":"paragraph","text":"毛主席教导我们：“学生也是这样，以学为主，兼学别样，即不但学文，也要学工、学农、学军，也要批判资产阶级。学制要缩短，教育要革命，资产阶级知识分子统治我们学校的现象，再也不能继续下去了。”"},{"type":"paragraph","text":"如果你们的半工半读是按毛主席所的教育方针，那样的半工半读是万岁的，好不好？（鼓掌）"},{"type":"paragraph","text":"北京机械学院毛泽东红卫兵红联18413战斗队翻印就红五类提法访中共中央国务院"},{"type":"paragraph","text":"文化革命联合接待室"},{"type":"paragraph","text":"前言：十月二十七日十一点一刻一一十三点二十五分，我们和北京工业学院、北京钢铁学院及哈尔滨商院部分同学、教师访问了中共中央、国务院联合接待室。接待室就有关“红五类”提法及其它问题作了解答，接待人具是伊福寿。这仅是记录整理稿，未经本人审查，只作参考。如记录有完全由我们负。间：中央有“红五类”的提法？答：从来就没有。“红五类”、“黑五类”中央不提这个。周总理也説过不要用这个。马克思列宁主"},{"type":"paragraph","text":"义者是什么出身就是什么出身。过去我们提过黑邦黑，现在也不这么提了，黑邦黑不能明它是什么性质。是资产阶毅代表人物就是餐产阶杀的代表人物，是什么就是什么。现在希望大家不要再"},{"type":"paragraph","text":"提“红五类”这个了，应大量宣传毛主席的阶级路，要完完全全地按毛主席的指示办事。问：周总理不是过红卫兵以“红五类”子女为主体？答：在那个时候，你们已经这样执行了，他不这样怎样？他现在不是已经叫你们别用这个了嘛。问：现在我们觉得“红五类”的提法不全面，不完全符合最高指示，根据主席有关阶级路的远，我们"},{"type":"paragraph","text":"觉得红卫兵应该以无产阶级，半无产阶级子女为主体，这对？答：你们按主席思想办事，我们支持你们！问：我们准备按着这个标准去发展红卫兵，但有人会我们组织“不纯”，勒合我们解散怎么办？答：那你们就理嘛！有主席著作给你们撑腰！群众运动起初的时候总不免要出一点偏差，经过你们的努"},{"type":"paragraph","text":"力，把它完全搏到主席思想的轨道上来，不就更好了？问：这些问题中央研究过了？城市的阶级成份怎样划分？答：研究过了。城市如何划分成份，现在中央还在研究，这个问题比较复杂，过去一直没有明确划过，只"},{"type":"paragraph","text":"是根据自已报的、与实际情况差不多就算定了。中央研究好了以后，将来会出文件的。问：形“左”实右的阶级路有什么表现？答：这个问题我不好回答，你们根据具体情况分析吧。：比如在我们学校，毛泽东思想红卫兵分开扬言：“非红五类子女概不接待！”参加国庆游行的外校同"},{"type":"paragraph","text":"学非红五类（无黑五类）的他们一律不准人校借歇一下，硬要把他们关在校门外。甚至有时在问"},{"type":"paragraph","text":"题时他发狂式的高叫非红五类子女滚蛋····答：这些就是形“左”实右，看来很“左”，其实右得很！你们要具体问题具体分析，就是要学会自已分"},{"type":"paragraph","text":"析，然后去跟他们説理嘛。调：他们不听怎么办？答：他们不听，你们要大力宣传毛泽东思想，宣传党的阶级政策，使群众运动越变越好。"},{"type":"paragraph","text":"中静心电1"},{"type":"paragraph","text":"伊福寿同志另外还解答了一些有关革命串联、各种组织及其它的若千问题，十三点二十五分他与我们握手告别。"},{"type":"paragraph","text":"重庆市第四十一中《狂飚》赴京小组10.28.·296·"}],"authors":[],"dates":[{"year":1966,"month":10,"day":27}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":306,"page_end":306},"tags":[{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c665e01297"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
