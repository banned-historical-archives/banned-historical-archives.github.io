script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"日共山口县委（左派）指出中国文化大革命在更高水平上发展了十月革命  世界进入以毛泽东思想为伟大旗帜的新时代  全世界革命人民热烈支持中国无产阶级文化大革命","authors":[],"dates":[{"year":1967,"month":12,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"日共山口县委（左派）指出中国文化大革命在更高水平上发展了十月革命"},{"type":"paragraph","text":"世界进入以毛泽东思想为伟大旗帜的新时代"},{"type":"paragraph","text":"全世界革命人民热烈支持中国无产阶级文化大革命"},{"type":"paragraph","text":"据新华社讯　东京消息：日本共产党山口县委员会（左派）发言人就十月社会主义革命五十周年发表谈话指出：十月革命为世界人民的解放事业开辟了广阔的可能性和现实的道路，建立起世界无产阶级和被压迫民族的革命的统一战线，开辟了被压迫民族争取解放的革命的新时代；而中国无产阶级文化大革命是在更高的水平上继承和发展了十月革命。"},{"type":"paragraph","text":"发言人说：“十月革命的胜利，反法西斯战争的胜利和中国革命的胜利，带来了人类社会历史的根本转变，开辟了帝国主义走向全面崩溃，社会主义走向全世界胜利的大好时代。”但是，斯大林逝世以后，工人贵族赫鲁晓夫、勃列日涅夫、柯西金等反革命修正主义分子篡夺了列宁和斯大林所缔造的苏联共产党和苏维埃国家的领导权，把苏联共产党变成了一个修正主义的党；在社会主义苏联，资本主义已经全面地复辟，十月革命所建立起来的无产阶级专政的国家现在已经改变颜色，变成了勃列日涅夫、柯西金等苏联特权阶层统治的资产阶级专政的国家。"},{"type":"paragraph","text":"发言人说：“伟大的毛泽东同志系统地总结了无产阶级专政的这种历史教训，作了科学的分析，阐明了阶级斗争的规律，亲自发动和领导无产阶级文化大革命，防止社会主义中国变色，进一步地巩固了无产阶级专政。七亿中国人民在伟大的毛泽东同志的领导下，意气风发，以急风暴雨之势，展开了史无前例的无产阶级文化大革命。”"},{"type":"paragraph","text":"发言人强调指出：中国无产阶级文化大革命是在更高水平上继承和发展了列宁和斯大林所领导的十月革命。以中国赫鲁晓夫为首的党内一小撮走资本主义道路当权派已经被打倒，企图复辟资本主义的资产阶级司令部已经被粉碎。发言人说：当代最卓越的马克思列宁主义者毛泽东同志所领导的中国共产党和中华人民共和国已经成了世界革命的堡垒。现在，世界革命的根据地已经从被反革命修正主义者改变了颜色的苏联转移到了伟大的毛泽东同志领导的中国。"},{"type":"paragraph","text":"发言人说：“毛泽东同志亲自领导的无产阶级文化大革命的胜利，给全世界送来了当代马克思列宁主义的顶峰——毛泽东思想，并树立了毛泽东思想的绝对权威。今天，全世界的革命人民认为中国无产阶级文化大革命和毛泽东思想是自己解放的最大保证，他们对无产阶级文化大革命寄予深切的同情和热烈的支持。”"},{"type":"paragraph","text":"发言人说：“毛泽东思想是世界革命的指导思想。世界进入了以毛泽东思想为伟大旗帜的时代。以社会主义中国为核心的全世界强大的革命统一战线，包围了美帝国主义、苏联修正主义、日共宫本修正主义集团和各国反动派，把它们孤立起来了。日本的马克思列宁主义者和广大革命人民，高举毛泽东思想的伟大红旗，一定会粉碎已经堕落成为美日反动派和苏联修正主义领导集团的走狗的日共宫本修正主义集团，把作为世界革命的一部分的日本革命引向胜利。”"},{"type":"paragraph","text":"发言人最后高呼：“沿着伟大十月社会主义革命的道路前进！”“十月革命的继续发展——无产阶级文化大革命万岁！”“世界革命的指导思想——伟大的毛泽东思想胜利万岁！”“伟大的导师、伟大的领袖、伟大的统帅、伟大的舵手毛泽东主席万岁！”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"27bd30a8f0"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
