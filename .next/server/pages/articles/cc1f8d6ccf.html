script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji23","name":"毛泽东全集第23卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji23.pdf"],"article":{"title":"山东战场的作战方针","alias":"","parts":[{"type":"paragraph","text":"山东战场的作战方针"},{"type":"paragraph","text":"（1947年5月22日）陈、粟、谭、，张、饶、邓、黎川，并告刘、邓："},{"type":"paragraph","text":"贺3电悉。歼灭七十四师，付出代价较多，但意义极大，证明在现地区作战，只要不性急，不分兵，是能够用各个歼击方法打破敌人进攻，取得决定胜利。而在现地区作战，是于我最为有利，于敌最为不利。现在全国各战场除山东外均已采取攻势，但这一切攻势的意义，均是帮助主要战场山东打破敌人进攻。蒋管区日益扩大的人民斗争，其作用也是如此，刘邓下月出击，作用也是如此。而山东方面的作战方法，是集中全部主力于济南、临沂、海州之线以北地区，准备用六七个月时间（五月起），六七万人伤亡，各个歼灭该线之敌。该线击破之日，即是全局大胜之时，尔后一切作战均将较为顺利。下一步行动方针有二：（一）休整若干天后即执行你们部"},{"type":"paragraph","text":"[1]陈、粟、谭、，指陈毅、粟裕、谭震林、陈士，当时分别任华东野战军司令员兼政治委员、副司令员、副政治委员和参谋长。张、饶、邓、黎，指张云逸、饶漱石、邓子恢、黎玉，当时分别任华东军区副司令员、政治委员，中共中央华东局副书记和华东军区副政治委员。"},{"type":"paragraph","text":"[2]刘、邓，指刘伯承、邓小平，当时分别任晋冀鲁豫野战军司令员和政治委员。"},{"type":"paragraph","text":"[3]贺，即20日。电办法，以三个纵队攻潍县\"，以六个纵队打援兵（六、七两纵均留北面不分散很对）。（二）将攻潍计划再行推迟（已经推迟一次，打了七十四师，甚为正确），考虑先打五军。该军现驻莱芜、颜庄两地，比较孤立，但不知其工事坚固程度如何？你们对打该军把握如何？我军钳制十一师等部，使之不能增援，把握如何？望你们从长考虑，分析利害电告。如能先歼五军（或该军一二个师）及其他数部，然后再打昌、潍，则利益甚大。因我打昌、潍，敌必增援（这是必然的），时间愈早，则援敌愈大，我军打援愈难；时间愈迟（即在正面多歼几部敌军之后），则援敌愈小，我军打援愈易。故应把打潍当作一种争取我军主动、使敌陷入被动之重要手段，尽可能不要过早使用。只有在正面已绝无作战机会之时，才采取打潍步骤。如何，盼复。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"辰养[1]潍县，今潍坊市寒亭区。[2]昌，指山东昌乐。"}],"authors":["毛泽东"],"dates":[{"year":1947,"month":5,"day":22}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":64,"page_end":65},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cc1f8d6ccf"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
