script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"旅大市商业局党委帮助基层单位职工  深入批判修正主义路线的实质","authors":[],"dates":[{"year":1973,"month":4,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"旅大市商业局党委帮助基层单位职工"},{"type":"paragraph","text":"深入批判修正主义路线的实质"},{"type":"paragraph","text":"据新华社沈阳一九七三年四月十五日电　辽宁省旅大市商业局党委主要领导成员坚持深入基层调查研究，切实加强对批修整风运动的领导，发展了所属各单位革命和生产的大好形势。"},{"type":"paragraph","text":"这个局的党委领导成员从去年以来，在基层蹲点中，坚持组织基层干部和职工认真学习毛主席关于批修整风的一系列重要指示，引导大家始终把革命大批判的矛头对准刘少奇一类骗子，抓住刘少奇一类骗子修正主义路线的实质狠批深批。局党委书记到大连工农兵商店蹲点时，领导这个商店的干部和职工认真学习毛主席提出的“要搞马克思主义，不要搞修正主义；要团结，不要分裂；要光明正大，不要搞阴谋诡计”三个基本原则，给职工讲解毛主席关于无产阶级专政下继续革命的理论，使大家进一步认识了刘少奇一类骗子修正主义路线的实质。他们以马克思主义、列宁主义、毛泽东思想为武器，分析刘少奇一类骗子散布的种种反动谬论，狠批刘少奇一类骗子妄图从根本上改变党在社会主义历史阶段的基本路线和政策，颠覆无产阶级专政，复辟资本主义的罪行。通过革命大批判，这个商店的干部和职工，提高了阶级斗争、路线斗争和无产阶级专政下继续革命的觉悟。大家说：“抓住实质，深入批修，才能击中刘少奇一类骗子的要害。这样批，才能越批路线是非越清。”"},{"type":"paragraph","text":"旅大市商业局党委在实践中体会到，要从政治上，思想上，理论上把刘少奇一类骗子修正主义路线批深批透，就必须认真看书学习掌握理论武器。因此，他们在深入基层领导批修整风中，认真组织干部、职工刻苦攻读马列著作和毛主席著作。局党委一位常委在市工业器材公司蹲点时，与公司党委领导成员一起深入班组，组织干部、职工读马列的书和毛主席的书，学习党在整个社会主义历史阶段的基本路线，使大家的理论水平不断提高，革命大批判步步深入。"},{"type":"paragraph","text":"旅大市商业局党委还注意及时总结交流典型经验，指导面上的批修整风运动。一年多来，他们通过蹲点总结出了十一项经验，召开了十五次全局性的经验交流会。这样做的结果，有力地推动了全局系统的批修整风运动不断深入发展。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c2e0a953c5"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
