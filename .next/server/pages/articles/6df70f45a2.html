script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"90026db3-c08e-4178-8ba8-9dd862963597","name":"给各级造反组织的几项建议","internal":false,"type":"img","official":false,"author":"上海市《五四》革命造反总联络站","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives21/main/90026db3-c08e-4178-8ba8-9dd862963597/1.jpg"],"article":{"title":"给各级造反组织的几项建议","alias":"","parts":[{"type":"paragraph","text":"最高"},{"type":"paragraph","text":"指示"},{"type":"paragraph","text":"国家的统一，人民的团结，国内各民族的团结，这是我们的事业必定要胜利的基本保证"},{"type":"paragraph","text":"粉各造反粗的儿项建上海的革命造反派经过浴血奋斗，已经打开了一个崭新的局面。革命的形势空前大好！"},{"type":"paragraph","text":"无产阶级革命造反派大联合，夺走资本主义道路当权派权的斗争，每天都在取得新的胜利，辉煌的战果。"},{"type":"paragraph","text":"我们为此欢欣鼓舞，我们向勇敢战斗的革命造反派战友们致最崇高的无产阶级革命敬礼！"},{"type":"paragraph","text":"但是形势迅速发展了，必然会有一些人，一些组织跟不上，他们采取了一些不妥当的做法，造成了一些不良的后果。出于革命的责任心，我们认为必须提出来和广大革命组织，广大革命群众共同探讨，以利于革命的团结和斗争。"},{"type":"paragraph","text":"（一）一切革命造反派应该识大体、顾大局，在大方向一致的前提下，相互谅解，相互支持。一旦发现问题，应该通过组织互换意见，不要采取砸烂对方司令部的方法，也不要动开动宣传机器，互相攻击。我们应该在毛泽东思想的伟大红旗下，团结起来，集中火力向党内一小走资本主义道路的当权派，向执迷不悟的铁杆保皇派，向一切牛鬼蛇神猛烈开火，猛烈进攻"},{"type":"paragraph","text":"（二）一切革命造反组织在政治上都是平等的，应该相互尊重。在斗争党内走资本主义道路当权派的问题上，一切革命的组织都有充分的发言权，任何组织都不得垄断革命造反权力，不得把几个走资本主义道路的当权派占为已有。各级走资本主义道路的当权派必须接受各革命造反组织的调令，出席一切批判揭发斗争大会。在时间上如有冲突，各革命造反组织应协商解决。在经济上应根据毛主席的“要节约闹革命”的教导，除正常的经费以外，绝不允许有任何铺张浪费的现象。"},{"type":"paragraph","text":"（三）一切革命造反组织应该经常保持联系，以达到互相交流斗争经验，互相支持，团结一致，共同战斗的目的。"},{"type":"paragraph","text":"（四）“没有调查就没有发言权。”各级造反组织对前一时期市、区各级当权派签字的各种协议（经济主义的协议除外），都应当在有关组织和接管单位充分交换意见、统一认识后，决定其有效或无效。任何组织都不得也无权以仲裁者自居，不调查研究，不协商，就片面宣布无效。"},{"type":"paragraph","text":"以上几点，请各革命造反组织认真考虑，付诸实行。"},{"type":"paragraph","text":"上海市《五四》（原《一二·九》）革命造反总联络站"},{"type":"paragraph","text":"一九六七年一月三十日"}],"authors":["上海市《五四》革命造反总联络站"],"dates":[{"year":1967,"month":1,"day":30}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1},"tags":[{"name":"上海文革","type":"人物"},{"name":"革命大联合","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6df70f45a2"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
