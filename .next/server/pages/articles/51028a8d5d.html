script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"马克思列宁主义不容篡改英国工人谴责现代修正主义者分裂国际共运的行为","authors":[],"dates":[{"year":1963,"month":8,"day":31}],"is_range_date":false,"parts":[{"type":"paragraph","text":"英国塑料工人约·皮尔斯在来信中谴责现代修正主义者分裂国际共产主义运动的行为，指出马克思列宁主义不容篡改。"},{"type":"paragraph","text":"这位英国工人写道，“中共给苏共的信说明了现代修正主义打入国际共产主义运动已达到了何种程度。”他说，“多年来我一直把苏联看作是进步的无产阶级反对资本主义的强大堡垒。我希望苏联能重新根据马克思列宁主义原则来制定他的政策。”"},{"type":"paragraph","text":"他指出，“现代修正主义必须反对。我全心支持中共在捍卫马克思列宁主义纯洁性方面的立场。”"},{"type":"paragraph","text":"这位英国工人在来信中说，“我的马克思列宁主义修养不深，但我还有一定的水平，能够从中共6月14日复信中看到中共的每个论点都是符合真正的马克思列宁主义原则的。苏共指责这封复信清楚地说明:①苏共已背弃了基本的马克思列宁主义真理，他们是修正主义；②他们害怕此信公开后在普通的苏共党员和人民群众中产生影响；③他们不愿意和真正马克思列宁主义的中共团结。苏共和其他兄弟党内的真正马克思列宁主义者将如何想呢?批评、自我批评和自由讨论是共产主义运动中极为可贵的活动。一切真正马克思列宁主义者见到违反这种基本精神的行为，必然会由此而产生疑问。他们必然会挺身而出，来保卫这些可贵的原则。苏共中央侵犯了他们党员和苏联人民的权利，他们将使自己处于不利的地位。”"},{"type":"paragraph","text":"约·皮尔斯说，“我们必须反对和根除以南斯拉夫铁托集团为首的现代修正主义，以免它对社会主义事业造成无可弥补的损失。必须回到莫斯科宣言和声明所规定的总路线上来，必须坚持这条路线。在整个社会主义建设时期，作为社会主义灵魂的无产阶级专政，非但不能放弃，而且要加强。一切对马克思列宁主义普遍真理的篡改都必须制止。”这位英国工人的来信指出，“现代修正主义者正在削弱社会主义阵营，破坏一切为反对帝国主义侵略而进行斗争的国家和组织。当前国际共产主义运动的形势是令帝国主义高兴的。修正主义代表帝国主义企图篡改党的性质所作的一切努力，是注定要失败的。真正的马克思列宁主义者将起来集合在中共周围，把修正主义抛入历史的垃圾箱。中国、阿尔巴尼亚、越南和其他真正马克思列宁主义的党，高举无产阶级国际主义的红旗，令人鼓舞。”"},{"type":"paragraph","text":"约·皮尔斯最后说，“请原谅我写了这么长一封信，我觉得我必须充分说明我对你们反对修正主义的立场的支持。”"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"51028a8d5d"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
