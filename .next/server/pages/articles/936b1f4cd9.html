<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"粉碎苏修侵略是毛泽东思想的胜利","authors":[],"dates":[{"year":1969,"month":8,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"珍宝岛地区的英雄边防战士代表和民兵代表畅谈纪录影片《珍宝岛不容侵犯》观后感，表示:头可断血可流，祖国神圣领土一寸不能丢；苏修胆敢继续来侵犯，定叫它粉身碎骨，片甲不留"},{"type":"paragraph","text":"新华社沈阳二十一日电　正在出席人民解放军沈阳部队第四次活学活用毛泽东思想积极分子代表大会的珍宝岛地区的英雄边防战士代表和民兵代表，在观看新闻纪录影片《珍宝岛不容侵犯》以后，愤怒痛斥苏修叛徒集团不断侵犯我国领土的滔天罪行，热烈欢呼粉碎苏修武装挑衅的胜利是战无不胜的毛泽东思想的胜利，决心更高地举起毛泽东思想伟大红旗，发扬一不怕苦，二不怕死的彻底革命精神，随时准备把敢于来犯的侵略者坚决、彻底、干净、全部消灭之。"},{"type":"paragraph","text":"伟大领袖毛主席教导我们:“捣乱，失败，再捣乱，再失败，直至灭亡——这就是帝国主义和世界上一切反动派对待人民事业的逻辑，他们决不会违背这个逻辑的。”守卫祖国珍宝岛的英雄边防战士和民兵代表，观看影片以后，愤怒揭露苏修社会帝国主义的丑恶嘴脸，痛斥苏修不断侵犯我国领土，制造一系列严重流血事件的滔天罪行。他们说，影片纪录的苏修强盗行径，都是我们亲眼所见的事实。苏修的飞机在我珍宝岛上空肆意侦察、骚扰，苏修的坦克、装甲车在我珍宝岛上横冲直撞，苏修侵略者依仗着这些“乌龟壳”，一次又一次地向我们执行正常巡逻任务的战友猖狂挑衅，首先向我开枪开炮，打死打伤我们的战友多名。这些罪行，有力地揭穿了苏修贼喊“捉贼”的卑劣伎俩，使人们更加看清苏修社会帝国主义的强盗面目。活学活川毛泽东思想积极分子、参加珍宝岛自卫反击战的曹建华说，苏修叛徒集团把侵略的魔爪伸进我国领土，是赖不掉的。苏修的坦克被击毁在中国的内河冰道，苏修向我发射的炮弹在中国领土上留下的弹坑、弹壳，桩桩件件，铁证如山，不管苏修新沙皇制造怎样的谎言，也掩盖不了它侵略我国的罪责。英雄的边防战士们指出，苏修叛徒集团一次又一次地制造武装挑衅，虽然都惨遭失败，但是苏修社会帝国主义的侵略本性是改变不了的。最近，他们出动直升飞机、坦克、装甲车和武装部队数百人在我新疆维吾尔自治区裕民县铁列克提地区挑起的严重流血事件，正是这伙扩张野心迷了窍的豺狼的丑恶表演，充分暴露出苏修叛徒集团顽固地坚持其侵略者的立场。我们严正警告苏修新沙皇:你们猖狂反华只能是搬起石头打自己的脚，加速你们的彻底灭亡。"},{"type":"paragraph","text":"胜利保卫祖国珍宝岛的英雄边防战士和民兵代表，在观看影片以后，笑谈苏修社会帝国主义纸老虎，热情赞颂粉碎苏修武装挑衅的胜利是毛泽东思想的伟大胜利。他们说，苏修新沙皇穷凶极恶，貌似强大，依仗着飞机、坦克、装甲车疯狂进行武装挑衅。但是，在用毛泽东思想武装起来的中国人民面前，苏修侵略者就现出了纸老虎的原形。在保卫祖国珍宝岛的自卫反击作战中荣立一等功的于洪东说，看了这部影片，使我想起三月十五日严惩苏修侵略者的战斗场面。苏修四辆坦克，在炮火的掩护下，气势汹汹地冲进我内河冰道，我们的战士靠战无不胜的毛泽东思想，把头一辆苏修坦克报销以后，其余三辆吓得掉头就逃。在激烈的战斗中，我们进一步认清了苏修新沙皇的纸老虎面目，更加坚定了彻底粉碎苏修侵略的胜利信心。在保卫祖国珍宝岛的自卫反击作战中荣立一等功的冷鹏飞说，最好的武器是战无不胜的毛泽东思想。最大的战斗力是用毛泽东思想武装起来的人。有了战无不胜的毛泽东思想，我们就有无比的勇敢，无穷的智慧，就能攻无不克，战无不胜，无敌于天下。许多入伍不久的边防战士代表，联系自己保卫祖国珍宝岛的战斗经历，满怀激情地说，我们过去没有打过仗，今天打败了苏修豺狼，全靠战无不胜的毛泽东思想。用毛泽东思想武装头脑，用毛泽东思想指挥战斗，我们就天不怕，地不怕，敢于把一切来犯的敌人统统埋葬在前沿阵地上。在保卫祖国珍宝岛的自卫反击作战中荣立三等功的护理员徐惠琴，在银幕上看到珍宝岛地区的英雄民兵，冒着敌人炮火，打着弹药，抬着担架，奔向前沿阵地，配合子弟兵英勇杀敌的战斗情景，激动地说:三月十五日自卫反击的战斗打响后，我亲眼看到民兵们以最快的速度抢救负伤的战友，他们在零下二、三十度的严寒里，把棉衣脱下来盖在伤员身上，而自己只穿一件单衣，一直坚持到战斗胜利。军民团结如一人，比钢坚，比铁硬，这就是毛主席人民战争思想的威力。在三月二日反击苏修武装挑衅的战斗中，亲自带领民兵英勇作战的珍宝岛地区民兵连长陈文忠说，保卫祖国边疆，粉碎苏修新沙皇的武装挑衅，是我们民兵的本分。我们珍宝岛地区的广大人民已经作好了一切战斗准备，家家是哨所，人人是哨兵，如果苏修胆敢继续来犯，定把它们消灭在人民战争的火海之中。"},{"type":"paragraph","text":"胜利保卫祖国珍宝岛的边防战士代表们，从银幕上看到伟大领袖毛主席和他的亲密战友林副主席在党的“九大”期间亲切接见来自珍宝岛地区的英雄边防战士孙玉国的动人情景，沉浸在无比激动、无比幸福之中。在保卫祖国珍宝岛的自卫反击作战中荣立一等功的杜永春、荣立三等功的祝登杰，激动地说:“伟大领袖毛主席和他的亲密战友林副主席亲切接见我们的战友，这是我们珍宝岛地区军民的最大光荣，也是全军和全国人民的最大光荣。受到伟大领袖毛主席亲切接见的英雄战士孙玉国看完影片以后，和战士们一起，再次向毛主席庄严宣誓:毛主席啊，毛主席!边防战士永远忠于您!头可断，血可流，祖国的神圣领土一寸也不能丢。如果苏修胆敢继续来犯，我们定叫它们粉身碎骨，片甲不留。"},{"type":"paragraph","text":"\u003cIMG alt=请插入5号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1969\\08\\698m030101.JPG\"\u003e"},{"type":"paragraph","text":"\u003cFONT class=imgsm\u003e最好的武器是毛泽东思想，最大的战斗力是用毛泽东思想武装起来的人。用毛泽东思想武装头脑，发扬一不怕苦、二不怕死的革命精神，是战备中最根本的战备。"},{"type":"paragraph","text":"这是在反修斗争中荣立一等功的孙玉国同志(中)和指战员们一起，表示永远忠于毛主席，一不怕苦、二不怕死，加强战备，保卫祖国的决心。\u003c/FONT\u003e"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"孙玉国","type":"人物"},{"name":"人民战争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"936b1f4cd9"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
