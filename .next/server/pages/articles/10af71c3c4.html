script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反对美帝和本国寡头势力的残酷剥削　智利工人、农民不怕镇压举行罢工示威","authors":[],"dates":[{"year":1970,"month":8,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反对美帝和本国寡头势力的残酷剥削"},{"type":"paragraph","text":"智利工人、农民不怕镇压举行罢工示威"},{"type":"paragraph","text":"据新华社十九日讯　圣地亚哥消息：最近以来，智利广大工人和其他阶层人民纷纷起来为争取他们的权利而斗争，反对美帝国主义和本国寡头势力的剥削。"},{"type":"paragraph","text":"智利全国四万六千多名医务卫生部门的职工从八月四日开始举行罢工，到十八日为止已经坚持了十五天。罢工的职工要求增加工资，要求医疗卫生为劳动人民服务。十七日，首都圣地亚哥数千名正在罢工的医务卫生部门的职工在市中心举行示威游行，并且抗击了警察的攻击。十八日，罢工的职工继续上街举行示威游行，并且同警察展开了搏斗。"},{"type":"paragraph","text":"从七月中旬以来的四个星期中，有九万多工人、农民和职员举行了罢工，争取切身权利。同时，从圣地亚哥省到纽夫莱省有一万多农民宣布举行罢工，占领了二百多个庄园。有的农民把地主抓起来当人质，有的农民把地主从庄园赶了出去。纽夫莱地区的马布切少数民族还采取了五次以上的群众行动，从地主手里夺回土地。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"10af71c3c4"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
