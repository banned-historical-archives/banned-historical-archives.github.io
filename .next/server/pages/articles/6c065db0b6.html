script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"日共《赤旗报》说美帝侵略本性不会因肯尼迪之死而改变  必须坚持反对美帝国主义的斗争  修正主义者美化美帝国主义，已成了美帝国主义的代理人","authors":[],"dates":[{"year":1963,"month":11,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"日共《赤旗报》说美帝侵略本性不会因肯尼迪之死而改变"},{"type":"paragraph","text":"必须坚持反对美帝国主义的斗争"},{"type":"paragraph","text":"修正主义者美化美帝国主义，已成了美帝国主义的代理人"},{"type":"paragraph","text":"新华社二十九日讯　东京消息：日本共产党机关报《赤旗报》二十五日发表题为《美帝国主义要和平吗？》的文章，强调指出：肯尼迪虽死，美帝国主义的侵略本性不会改变，必须坚持反对美帝国主义的斗争。"},{"type":"paragraph","text":"文章指出：必须正确了解美帝国主义和坚持反对美帝国主义的方针政策。就是在肯尼迪总统死去之后，这方面的问题仍然没有改变。帝国主义本身是一种制度，这同某一个人的品质或趋向无关。"},{"type":"paragraph","text":"文章说，反党修正主义分子和右翼社会民主党人一心要在美帝国主义的代表身上寻找“对和平的热诚”。他们认为在帝国主义内部存在着进步与反动的对立，在帝国主义内部有和平的因素。"},{"type":"paragraph","text":"它说，的确是存在着形形色色的帝国主义者。但是不能把他们分为反动的和非反动的帝国主义者。他们的区别只是在于花色。他们在执行帝国主义政策的根本立场上是完全一致的。"},{"type":"paragraph","text":"文章强调说：“修正主义者掩盖帝国主义的本性和企图从中找到某些进步性的那种做法，同马克思列宁主义基本分析方法毫无共同之处。修正主义者的做法证明，他们已经堕落到希望从帝国主义制度那里找到一些什么东西的反动立场上去。"},{"type":"paragraph","text":"“我们看不出有任何迹象足以证明美帝国主义希望和平。在这个问题上，当修正主义者提到‘超帝国主义论’时，他们总是抽象地谈论‘裁军’，‘裁减军备’和‘和平’。"},{"type":"paragraph","text":"“当美帝国主义者正在为大规模的军备计划和核战争作准备而不是裁减军备的时候，谈论‘裁军’而不同美国的核战争准备进行斗争，这是有害的。”"},{"type":"paragraph","text":"文章指出：修正主义者在谈论美帝国主义的战争和侵略政策已经改变的时候，已经成了美帝国主义的代理人，这样说决不是夸大。"},{"type":"paragraph","text":"我们必须继续展开反对美帝国主义的斗争。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6c065db0b6"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
