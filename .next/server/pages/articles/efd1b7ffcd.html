script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji15","name":"毛泽东全集第15卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji15.pdf"],"article":{"title":"关于经学问题给范文澜的信","alias":"","parts":[{"type":"paragraph","text":"关于经学问题给范文澜?的信"},{"type":"paragraph","text":"（1940年9月5日）文澜同志："},{"type":"paragraph","text":"提纲读了，十分高兴，倘能写出来，必有大益，因为用马克思主义清算经学这是头一次，因为目前大地主大资产阶级的复古反动十分猖獗，目前思想斗争的第一任务就是反对这种反动。你的历史学工作继续下去，对这一斗争必有大的影响。第三次讲演因病没有听到，不知对康、梁、章、胡?的错误一面有所批判否？不知涉及廖平、吴虞、叶德辉等人否？越对这些近人有所批判，越能在学术界发生影响。"},{"type":"paragraph","text":"[1]范文澜（1893—1969)，浙江绍兴人。当时任延安马列学院历史研究室主任。"},{"type":"paragraph","text":"[2]指范文澜1940年在延安新哲学会年会上关于中国经学简史的讲演提纲。这个提纲后经整理于同年连续发表在延安《中国文化》第二卷第二、第三期上，题为《中国经学史的演变》。"},{"type":"paragraph","text":"[3]康、梁、章、胡，指康有为（1858—1927，广东南海人)、梁启超、章炳麟、胡适。他们都是在近代中国经学史和思想史上有重大影响的学者。"},{"type":"paragraph","text":"[4]廖平（1852—1932），四川井研人，中国近代经学家。吴虞（1871—1949)，四川新繁（今属新都）人，五四运动前后曾写文章批判旧礼教，后来很少发表新见。叶德辉（1864—1927），湖南湘潭人，是维护封我对历史完全无研究，倘能因你的研究学得一点，深为幸事。"},{"type":"paragraph","text":"致以敬礼！"},{"type":"paragraph","text":"毛泽东九月五日"},{"type":"paragraph","text":"范文风丽外gt"},{"type":"paragraph","text":"马川抄子汽澜："},{"type":"paragraph","text":"祈批判否？不知席众房平紫提词该，非照，法算中"},{"type":"paragraph","text":"等人否？越对远些在人明所执制，"},{"type":"paragraph","text":"越科长手所黑教比判会。有羞，风行用多在物死活实院学蓬款"},{"type":"paragraph","text":"M对雁业空全年研一亮，访航同在，压方月前大地主大笑人识次的废去"},{"type":"paragraph","text":"给的开家李心一丛，为学素乔动十分指师生，用利组去的系"},{"type":"paragraph","text":"于市心纷乱远在对正什不。你风恶"},{"type":"paragraph","text":"邪次!你低候大，对正一冷有大帆"},{"type":"paragraph","text":"by4.引会。非次谦应用病及有程"},{"type":"paragraph","text":"九那月不知对本果言切愧结该一不有毛泽东致范文澜信的手稿。"}],"authors":["毛泽东"],"dates":[{"year":1940,"month":9,"day":5}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":126,"page_end":129},"tags":[{"name":"毛泽东","type":"人物"},{"name":"范文澜","type":"人物"},{"type":"文稿类型","name":"书信"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"efd1b7ffcd"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
