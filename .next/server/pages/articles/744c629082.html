script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"意大利米兰地区百余万工人总罢工  十万工人高举红旗，举行强大示威，声讨垄断资产阶级的罪恶统治  罢工使工厂、企业、商店统统关门，交通停顿，整个城市陷于瘫痪","authors":[],"dates":[{"year":1969,"month":10,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"意大利米兰地区百余万工人总罢工"},{"type":"paragraph","text":"十万工人高举红旗，举行强大示威，声讨垄断资产阶级的罪恶统治"},{"type":"paragraph","text":"罢工使工厂、企业、商店统统关门，交通停顿，整个城市陷于瘫痪"},{"type":"paragraph","text":"新华社十六日讯　罗马消息：意大利米兰地区一百多万工人十五日举行总罢工，抗议生活费用和房租飞涨，反对政府向工人征收沉重的所得税。这次总罢工使米兰地区的工厂、企业、商店统统关门，交通停顿，报纸停止出版，使得这个意大利第二大城陷于瘫痪状态。"},{"type":"paragraph","text":"十万名米兰工人高举着无数面红旗和标语牌，组成了五支浩浩荡荡的队伍，从郊区走向米兰市区，举行了强大的示威，愤怒抗议垄断资产阶级的罪恶统治。他们最后汇集在米兰市区的一个广场，举行了群众大会。"},{"type":"paragraph","text":"米兰广大学生热情支持工人们的正义斗争。一万多学生参加了工人们十五日举行的群众大会，同工人们并肩战斗。在这之前，学生们还在十一日占领了米兰大学，声援工人们罢工和占领工厂的斗争。"},{"type":"paragraph","text":"为了抗议生活费用和房租高涨，意大利北部亚历山大里亚和维切利的工人，和意大利中部庞特德拉的工人，十五日也举行了总罢工。在意大利中部的阿雷佐市，十六日也为此爆发了总罢工。近年来，意大利统治集团变本加厉地执行掠夺人民的政策，意大利生活必需品价格不断上涨，劳动人民生活更加困苦。这激起意大利人民巨大的不满。十月以来，意大利中部的特尔尼，南部的马特拉，西西里岛的首府巴勒莫，以及整个佛留利—威尼斯朱利亚区，已先后因此爆发了总罢工。意大利其他一些城市和地区的工人，也在准备举行总罢工。意大利工人反对垄断资产阶级的群众斗争的浪潮，正在一浪高过一浪地继续向前发展。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"744c629082"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
