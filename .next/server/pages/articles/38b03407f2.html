" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"四川省委检查团石柱工作组关于人吃人的调查报告","authors":["王德明","省委检查团石柱工作组"],"dates":[{"year":1961,"month":1,"day":27}],"is_range_date":false,"parts":[{"text":"四川省委检查团石柱工作组关于人吃人的调查报告","type":"title"},{"text":"省委检查团石柱工作组王德明","type":"authors"},{"text":"省委、涪陵地委：","type":"appellation"},{"text":"关于活人吃死人，杀孩子吃的案件，经我们了解证实的有：","type":"paragraph"},{"text":"石柱县华封公社反革命分子马路之，六零年二月到永进区队偷粮，被区队干部马培灵等打死，其女弟马兰艺将大腿的肉煮来吃了。马路之的父亲是惯偷，弟弟是二流子，他的母亲冉玉禄吃了四人。59年冬天大兵团作战到他家背肥料，在草堆里发现有人骨头；新华中队的李世友到区上去开会，带狗一只，路上碰见冉玉禄，狗往冉身上跳，发现冉背的是死人谭久珍，已截成两截，李走后，冉仍拖死人背回家吃了。群众揭发她吃了七人，冉玉禄自己承认吃了四人（谭久珍、马培芳、唐玉树、男孩马培生都是病死的人。）","type":"paragraph"},{"text":"石柱县大河公社二管区增产中队社员曾磐发的侄子死了，被曾的女人煮来死。刘成玉也准备将已死的侄儿煮来吃（已经砍了），被社干发现制止。新华生产队社员刘成珍有三个孩子，八岁、五岁、三岁。59年冬天三岁孩子不见了，以后刘成珍得了肿病住进医院，六零年二月请假回家将五岁的男孩用毛巾勒死分四顿煮吃，刘已病死。","type":"paragraph"},{"text":"这种惊心动魄、骇人听闻的事，在这里不只是一两椿，最近我们在大河区听说有活埋人的事，正在调查了解中。","type":"paragraph"},{"text":"石柱县的情况颇具复杂、镇反和民主改革不彻底，不少漏网的地主、反革命分子打入基层政权，混进党内窃取领导权，直到现在还有相当数量有血债的地主分子当着区委书记、公社党委书记、区队长，生产队长，有的是敬老院长、区院支书，有的已经混进国家经济部门。另一方面我们自己队伍中，干部作风问题也极是严重。“斗、打”成风，因此整社工作十分艰巨。而且生产和生活问题也比其它县都要大。力量少了确实拿不下来，建议省委再抽调一批有一定斗争经验的干部来这个县帮助整社工作。目前发生一、二类分子逃跑（大河已跑了五个），抢劫粮食，宰杀耕牛，砍伐经济林木，由于干部少，政策贯彻不到基层，工作干部晚上不能单独行走。","type":"paragraph"},{"text":" 省委检查团石柱工作组","type":"paragraph"},{"text":" 王德明","type":"paragraph"},{"text":" 一九六一年一月二十七日","type":"paragraph"},{"text":"来源：（四川）省委整风整社工作团涪陵分团，涪陵、石柱、西阳县工作组关于整风、整社、生产、生活安排及分配等问题的情况报告 （1961.1.21-5.9）。","type":"paragraph"}],"comments":[],"origin":"四川省某档案馆","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"38b03407f2"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
