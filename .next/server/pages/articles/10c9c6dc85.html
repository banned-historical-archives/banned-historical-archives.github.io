<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"正确认识右倾松劲情绪的危害性","authors":["乃平"],"dates":[{"year":1959,"month":8,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"乃平"},{"type":"paragraph","text":"气可鼓而不可泄，劲可鼓而不可松。这是一条具有普遍意义的真理。人民日报八月六日社论指出:“我们做任何工作，都必须鼓足干劲，而不是松劲泄气；都必须力争上游，而不是甘居下游；都必须又多又快又好又省，而不是又少又慢又差又费。”一九五八年的大跃进和今年上半年继续跃进的事实证明，我国人民群众在党的正确领导下的冲天干劲，是大跃进决定性的因素。反之，任何松劲、泄气，即使只是一小部分人，也会给建设社会主义的事业带来危害，这就是为什么人民日报八月六日社论要及时指出右倾松劲情绪已成为当前工作中的危险倾向的原因。"},{"type":"paragraph","text":"但是，现在，也还有些同志看不到右倾松劲情绪的危害。如有人说:“大跃进以来，我们所获得的成绩已经很大了，现在松点劲不要紧。”果真是如这些同志所说的“不要紧”吗?我们的回答是否定的，实际上，这种看法不仅是松劲，而且是自满。在这些同志看来，既然成绩很大，就可以不要继续鼓劲，而是可以松劲了。他们不知道事物互相转化的道理，不知道我们如果不继续鼓劲，而稍有松劲的话，情况就会完全两样，就有使我们走向成绩的反面去的危险。松劲情绪，会由小到大、逐步发展、蔓延起来，它会起着动摇军心、瓦解士气的作用。如果我们不加以抵制，其害处是很大的，是值得我们严重警惕的。"},{"type":"paragraph","text":"还有的同志说:“只要方向对头，松点劲不要紧”，这也是错误的。实际上，松劲的情绪的发展，本身就是个方向问题。因为，党的总路线号召我们要鼓劲，你却要松劲，一个要“鼓”，一个要“松”，这当然不是方向对头，而甚至是方向根本相反。鼓足干劲，力争上游，多快好省，是党提出的建设社会主义的总路线，是集中地反映了工人阶级的根本利益和迫切要求的，工人阶级、劳动人民要求从根本上改变我国“一穷二白”的面貌，要求把干劲愈鼓愈足。没有工人阶级的坚定立场，没有旺盛的革命意志，没有劳动人民的思想感情，是往往不能把干劲愈鼓愈足的。因此不能简单地把松劲情绪看做与方向无关的问题，而不加注意；恰恰相反，松劲情绪是与总路线的要求不符合的。如果不加以警惕与克服，而听其滋长蔓延，则必然与党的总路线背道而驰，从而使党的事业遭受损失。"},{"type":"paragraph","text":"还有的同志说，人们的思想落后于形势，这是客观的必然性，因而有点右倾思想，也是难免的。这是一种自我原谅的说法。这些同志是把事物发展的必然性与人们对待事物的态度这两者混淆起来了。是的，从事物发展过程中主客观之间的矛盾来说，是有这种情况的，即人们的思想容易落后于形势，然而也正因为如此，才要求我们时刻警惕我们自己思想是否落后，要时刻检查我们的干劲是否鼓足。因为我们是革命者，而不是“宿命论”者。我们认识了事物发展的这种可能性，就可以发挥主观能动性来创造条件，使事物的发展服务于我们的要求，“防患于未然”。正是因为我们认识到人们的思想往往会落后于形势，就应该加倍的时刻警惕自己，加强学习与经常深入实际，力求使自己的思想跟上去，不要老是掉在形势的后面。这是完全可能的。而且我们革命者，正应该以马克思列宁主义的理论武装自己，使我们能预测事物发展的前途，产生预见，来指导运动，这不是与“思想往往落后形势”的说法相矛盾，而是认识了这种情况，发挥了主观能动性的结果。所以，以思想往往落后于形势为借口，来原谅自己的右倾松劲，更是错误的。"},{"type":"paragraph","text":"总之，劲可鼓而不可松。我们每一个同志应该警觉起来，擦亮眼睛，提高嗅觉，对照自己的思想，认识右倾松劲情绪的危害性，把干劲鼓得更足，工作做得更好，来迎接国庆十周年。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"10c9c6dc85"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
