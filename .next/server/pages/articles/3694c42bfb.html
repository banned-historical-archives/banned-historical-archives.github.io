" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji34","name":"毛泽东全集第34卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji34.pdf"],"article":{"title":"祝贺保加利亚解放十周年的电报","alias":"","parts":[{"type":"paragraph","text":"祝贺保加利亚解放十周年的电报"},{"type":"paragraph","text":"（1954年9月7日）保加利亚人民共和国国民议会主席团主席格奥尔基·达米扬诺夫同志："},{"type":"paragraph","text":"值此保加利亚解放十周年之际，我谨向您并通过您向保加利亚人民和政府致以衷心的、热烈的祝贺。"},{"type":"paragraph","text":"千年来，保加利亚人民在保加利亚共产党的领导下，遵循着季米特洛夫同志的教导，巩固了人民民主制度，并在国家的社会主义建设中获得了光辉的成就。这不仅鼓舞了正在从事社会主义建设的中国人民，而且增强了以苏联为首的世界和平民主力量。"},{"type":"paragraph","text":"祝保加利亚人民在建设社会主义和维护世界和平的斗争中获得新的更大的胜利。"},{"type":"paragraph","text":"毛泽东一九五四年九月七日北京"}],"authors":["毛泽东"],"dates":[{"year":1954,"month":9,"day":7}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":225,"page_end":225},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3694c42bfb"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
