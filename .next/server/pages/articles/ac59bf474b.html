script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"民主德国政府发言人表示  坚决打击新纳粹极右势力","authors":[],"dates":[{"year":1990,"month":1,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"民主德国政府发言人表示"},{"type":"paragraph","text":"坚决打击新纳粹极右势力"},{"type":"paragraph","text":"新华社柏林１２月２８日电  民主德国政府发言人迈耶尔今天在这里表示，民主德国政府将和人民一起，坚决打击民主德国的极右势力，严厉制裁新纳粹分子及其犯罪活动。"},{"type":"paragraph","text":"据报道，近日来，民主德国各地新纳粹势力活动猖獗，正引起社会各阶层的密切关注。罗斯托克专区的一位检察官收到一封恐吓信，要他释放今年９月被判处无期徒刑的法西斯刽子手雅·霍尔茨，否则他和他的同事将被杀掉。信中还有一幅１９３７年德国疆界轮廓图，扬言要为“重建德意志帝国而战”。有人还散发法西斯传单和出版物，发表支持西德新纳粹“共和党人”的声明。"},{"type":"paragraph","text":"新纳粹在民主德国于８０年代初开始出现。今年１０月以来，特别是１１月上旬民主德国开放边界以后，新纳粹势力的活动更为频繁。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ac59bf474b"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
