" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"河北省革命委员会关于处理红卫兵抄家物资和地主、富农房产意见的批复","authors":[],"dates":[{"year":1968,"month":8,"day":8}],"is_range_date":false,"parts":[{"text":"河北省革命委员会关于处理红卫兵抄家物资和地主、富农房产意见的批复","type":"title"},{"text":"唐山地区革命委员会：","type":"appellation"},{"text":"你们《关于在文化大革命运动中处理红卫兵抄家物资和地主、富农的房产几点意见的请示》收悉。","type":"paragraph"},{"text":"（一）对于红卫兵抄家物资，同意你们的意见，切实按照中共中央《关于在文化大革命运动中处理红卫兵抄家物资的几项规定》（包括第二条）进行处理。","type":"paragraph"},{"text":"（二）对于漏划地主、富农分子多余房产的处理，一般放在文化大革命后期为宜，以免影响当前斗争大方向。如四清中已经县级机关批准，划定为地主、富农成份，并确有多余房产而又迫切需要处理的，可以先作个别问题处理。并且应当由贫下中农和社员充分讨论，提出意见，经县革命委员会批准。","type":"paragraph"},{"text":" 河北省革命委员会—九六八年八月八日","type":"paragraph"},{"text":"___________________________________________________________","type":"appellation"},{"text":"最  高  指   示","type":"subtitle"},{"text":"政策和策略是党的生命，各级领导同志务必充分注意，万万不可粗心大意。","type":"subtitle"},{"text":"唐山地区革命委员会文件","type":"subtitle"},{"text":"唐地革(68) 22 号","type":"subtitle"},{"text":"关于在文化大革命运动中，处理红卫兵抄家物资和地主、富农的房产几点意见的请示","type":"subtitle"},{"text":"河北省革命委员会：","type":"appellation"},{"text":"最近，我区有的县来信或来电话请示，在无产阶级文化大革命运动中，对红卫兵查抄地富反坏右或其它不法分子的财物，以及农村地主、富农的房产怎样处理。据报告这些财物，有的已上缴市、县级财政部门；有的还在本单位保存；有的被集体占用；有的已被群众分掉。根据中央有关指示精神和我区具体情况，提出如下处理意见：","type":"paragraph"},{"text":"一、对红卫兵抄家的物资处理，要切实贯彻执行中共中央“关于在文化大革命运动中处理红卫兵抄家物资的几项规定”。","type":"subtitle"},{"text":"（一）查抄地、富、反、坏、右或其它不法分子的财物，除日常生活必需品退给本人（如原物已遗失或损坏则不退赔）以外，一律上缴到市、县级财政部门。对尚不能定性质各类人的财物，暂由本单位妥为保管，待定性后再作处理。","type":"paragraph"},{"text":"（二）确属革命群众和劳动人民被错抄的财物，应全部退还本人。","type":"paragraph"},{"text":"（三）贪污、盗窃和私用查抄财物者，首先向其进行思想教育，让其自觉退出上缴，否则根据情节轻重严加处理。但被小集体（生产大队、生产队、革命群众组织）用于文化大革命的少量消费物资或现款，经说明情况，报上级审查批准，可不予追究。","type":"paragraph"},{"text":"（四）防止地、富、反、坏、右或其它不法分子，借处理查抄财物的机会，喊冤叫屈，反攻倒算，违者必须严加惩办。","type":"paragraph"},{"text":"二、对农村地主、富农房产的处理，我们考虑：必须本着支持群众运动，打击阶级敌人，维护党的政策的原则，分别不同情况加以处理。","type":"subtitle"},{"text":"（一） 对土改时漏划的地主、富农，在伟大的四清运动中已经县级领导机关批准，划定为地主、富农成份的，其房产除现住的外，确有多余，经过全村广大贫下中农充分讨 论，报县革命委员会批准，可以没收其多余部分。没收后归大队集体所有。集体占用。个别贫下中农户，确实无房居住的，经过全村贫下中农群众讨论同意，可以暂 时借用一部。","type":"paragraph"},{"text":"（二）对土改时划定的地主、富农，当时房产已经平分或作了调整的一般不能再次平反或没收，要说服群众按党的政策办事。","type":"paragraph"},{"text":"此件如可，我们准备发给市、县革命委员会内部掌握，是否妥当，请批示。","type":"paragraph"},{"text":" 唐山地区革命委员会一九六八年五月十八日","type":"paragraph"}],"comments":[],"origin":"秦皇岛市档案馆5-201-9（9）","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"河北文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"红卫兵运动","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7ba4624649"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
