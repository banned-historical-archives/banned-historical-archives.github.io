script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"最热烈地祝贺朝鲜民主主义人民共和国成立二十五周年  毛泽东同志董必武同志朱德同志周恩来同志致电金日成同志和金一同志","authors":[],"dates":[{"year":1973,"month":9,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"最热烈地祝贺朝鲜民主主义人民共和国成立二十五周年"},{"type":"paragraph","text":"毛泽东同志董必武同志朱德同志周恩来同志致电金日成同志和金一同志"},{"type":"paragraph","text":"新华社一九七三年九月八日讯  中国共产党中央委员会主席毛泽东同志、中华人民共和国代主席董必武同志、中华人民共和国全国人民代表大会常务委员会委员长朱德同志、中华人民共和国国务院总理周恩来同志，九月八日打电报给朝鲜劳动党中央委员会总书记、朝鲜民主主义人民共和国主席金日成同志和朝鲜民主主义人民共和国政务院总理金一同志，最热烈地祝贺朝鲜民主主义人民共和国成立二十五周年。电报全文如下：平壤朝鲜劳动党中央委员会总书记朝鲜民主主义人民共和国主席　金日成同志，朝鲜民主主义人民共和国政务院总理　金一同志："},{"type":"paragraph","text":"在朝鲜民主主义人民共和国成立二十五周年的时候，我们代表中国共产党、中国政府和中国人民，向朝鲜劳动党、朝鲜民主主义人民共和国政府和兄弟的朝鲜人民，致以最热烈的祝贺。"},{"type":"paragraph","text":"二十五年来，英雄的朝鲜人民在以金日成同志为首的朝鲜劳动党的英明领导下，在反对美帝国主义侵略的斗争中，在社会主义革命和社会主义建设的各条战线上，都取得了辉煌的成就。朝鲜人民高举反帝革命旗帜，坚决支持各国人民的正义斗争，为世界人民的革命斗争事业做出了重大的贡献。中国人民为朝鲜人民在各方面取得的伟大胜利和成就感到欢欣鼓舞，为有朝鲜人民这样英雄的人民作为自己的亲密战友感到自豪。"},{"type":"paragraph","text":"在争取祖国自主和平统一的斗争中，朝鲜劳动党和朝鲜民主主义人民共和国政府提出的正确路线和一系列合理主张，是符合全体朝鲜人民的民族愿望的，也是切实可行的，因而受到了世界各国人民的同情和支持。任何制造“两个朝鲜”、妄图使朝鲜的分裂永久化的阴谋，都是不能得逞的。中国人民将一如既往，坚决支持朝鲜人民争取自主和平统一祖国的正义斗争，直到取得完全的胜利。"},{"type":"paragraph","text":"中朝两国人民在反对共同敌人的长期斗争中用鲜血结成的战斗友谊和革命团结，是鼓舞我们两国人民不断前进的强大力量。中朝两党、两国和两国人民建立在马克思列宁主义和无产阶级国际主义基础上的这种友谊和团结，必将不断得到加强和发展。衷心祝愿兄弟的朝鲜人民今后取得新的更大的胜利，朝鲜民主主义人民共和国更加繁荣富强。"},{"type":"paragraph","text":"中国共产党中央委员会主席　毛泽东"},{"type":"paragraph","text":"中华人民共和国代主席　　　董必武"},{"type":"paragraph","text":"中华人民共和国全国人民"},{"type":"paragraph","text":"代表大会常务委员会委员长　朱德"},{"type":"paragraph","text":"中华人民共和国国务院总理　周恩来"},{"type":"paragraph","text":"一九七三年九月八日于北京"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"朱德","type":"人物"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a69b1e1b18"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
