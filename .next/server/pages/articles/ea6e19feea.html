script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"克服左倾思想是搞好调整的关键","authors":["田蓝田"],"dates":[{"year":1981,"month":1,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"经济战线上左倾错误的产生，不外来自几个方面:一是出于一种良好愿望，希望尽早尽快地摆脱贫穷落后的状况，而又顽固地不能接受历史的教训；二是反映了汪洋大海的小资产阶级的急躁冒进情绪，这是左倾的思想根源和社会根源；三是不少领导干部缺少自然科学知识和不注意学习马克思主义的经济理论；四是有些领导干部出于私心杂念、本位主义、好大喜功；五是党内长期反右斗争形成的左是方法问题、右是立场问题等宁左勿右思想的影响；还可能有其它原因。因此，只有进一步克服左倾思想，肃清左倾路线的影响，才能切实搞好国民经济的调整工作；只有抓好调整，才能保持政治上的安定团结。克服左倾思想是搞好调整的关键。调整的中心环节是调整积累与消费的比例关系，把积累的比重放在恰当的位置上，把超过国力的高积累逐步降下来。调整就是要坚决压缩基本建设战线，要真正退够，要压缩各方面的开支。"},{"type":"paragraph","text":"(摘自江苏《群众》一九八一年第一期田蓝田文)"}],"comments":[],"origin":"江苏,《群众》","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ea6e19feea"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
