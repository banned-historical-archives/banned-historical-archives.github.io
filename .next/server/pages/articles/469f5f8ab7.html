" crossorigin="">{"props":{"pageProps":{"books":[{"id":"cb043827-1a6a-46f3-863d-a430958e5a0d","name":"无产阶级文化大革命参考资料（1966年）","internal":true,"official":false,"type":"pdf","author":"","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives3/main/cb043827-1a6a-46f3-863d-a430958e5a0d.pdf"],"article":{"title":"炮打司合部——我的第一张大字报","alias":"","parts":[{"type":"paragraph","text":"炮打司合部"},{"type":"paragraph","text":"我的第一张大字报"},{"type":"paragraph","text":"我国第一张马列主义的大学报人民日报部员的写得何等好啊：请同志们重一遍这张大字报和这篇郭。可是五十多天里，从中央到地方的某些同志，反其道而行之，他们站在反动的资产阶级立场上，执行资产阶杀专政。将无产阶杀鞋烈烈的文化大革命运动打下去，颤倒是非、混淆黑白，围剿革命派，压制革命派，实行白色恐怖，自以为得意，长资产阶级威风、火无产阶极的志气，又何其毒也。"},{"type":"paragraph","text":"联系一九六二年右倾和一九六四年的形“左”实右的错倾向，岂不合人深省？"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"1966.8.5.誓死保卫毛主席"},{"type":"paragraph","text":"转抄一份大字报前"},{"type":"paragraph","text":"营"},{"type":"paragraph","text":"我们在伟大领袖毛主席的家乡一一一韶山展宽馆见到毛主席家的六位革命烈士的遗像，并知道他们的简单生平。毛主席的家庭是革命家庭。毛主席的一家为革命献出了六位亲人，作了重大的牺牲。为了我们革命接班人永远不忘革命前流血牺牲，永远高举毛泽东思想伟大红旗，永远继承革命先烈的遗志，永远革命，永葆革命江山不变色，特将六位烈土的简单生平连同一段非常生动的解説词写在下面。希望大家看后好好想想，不要之，这是用鲜血与生命成的呵！"},{"type":"paragraph","text":"六位烈士简单生平毛泽民烈±：《1896-—1943年》毛主席的大弟弟，1922年人党，1942年于新疆被扑，1943年英勇就义，牺牲时年43岁。毛泽潭烈±：《1905-—-1935年》"},{"type":"paragraph","text":"毛主席的小弟，1923年参加革命，1924年人党，1935年长征途中在江西省和福建省交界长汀地带和敌人作战时英勇牺性，当时他已历任五年红军独立师师长，牺牲时不满30岁，"},{"type":"paragraph","text":"杨开慧烈±：《1901-一-1930\u003e"},{"type":"paragraph","text":"毛主席的爱人，1921年与毛主席结婚，1921年人党，我党第一批党员之一，1925年和毛主席回乡开展农民运动，1927年秋收起义以后，毛主席带着队伍上了井尚山，杨开慧同志留在长沙，坚持武装斗筝，1930年在长沙被白匪何健逮扑，施加重刑，她坚真不届，表现了一个共产党真的大无畏的英雄气概，于1930年4月被敌人杀害于长沙，牺牲时只有29岁。"},{"type":"paragraph","text":"毛泽建烈±：《1905-一—1929》"},{"type":"paragraph","text":"毛主席的堂妹，与毛主席一块参加革命，1923年人党，1927年毛主席带领队伍上井岗山，她带游击队上山坚持武装斗争，1929年一次战斗中负伤被扑，受尽重刑，坚真不届、牺牲时仅24岁。"},{"type":"paragraph","text":"毛岸英烈-上：《1922-一一1950》"},{"type":"paragraph","text":"·6."}],"authors":["毛泽东"],"dates":[{"year":1966,"month":8,"day":5}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":16,"page_end":16},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"469f5f8ab7"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
