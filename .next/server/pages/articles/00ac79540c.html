script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"三项基本原则是识别走资派的照妖镜","authors":["延安毛主席旧居警卫连"],"dates":[{"year":1976,"month":10,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"三项基本原则是识别走资派的照妖镜"},{"type":"paragraph","text":"延安毛主席旧居警卫连"},{"type":"paragraph","text":"宝塔山高延水长，延安儿女永远心向红太阳。十月九日凌晨，我们延安毛主席旧居警卫连的全体指战员，分别聚集在凤凰山麓、杨家岭、枣园、王家坪毛主席旧居前，反复收听了中央的两项重要决定。全连指战员个个精神振奋，无比激动。大家把毛主席用过的文物擦了又擦，把毛主席著作的手稿看了又看，无限深情地说：“毛主席啊，毛主席！我们多么渴望能瞻仰您的遗容，多么迫切希望读到您的全部文献。中央的两项重要决定，完全表达了全国亿万军民的共同心愿，充分表明以华国锋同志为首的党中央和我们心连着心。”一份份坚决拥护以华国锋同志为首的党中央、努力学习马列著作和毛主席著作的决心书送到党支部。“一切听从党中央的指挥”、“继承毛主席遗志，把无产阶级革命事业进行到底”的响亮口号声，在毛主席旧居上空久久回荡。"},{"type":"paragraph","text":"每当我们翻开毛主席著作，回忆起毛主席在延安的伟大革命实践，就想到毛主席在延安窑洞里的油灯下写的篇篇光辉著作，指引全国军民打败了日本帝国主义，推翻了蒋家王朝，建立了新中国。今天，我们要巩固无产阶级专政，把无产阶级革命事业进行到底，必须认真学习毛主席著作。我们决心响应以华国锋同志为首的党中央的号召，掀起学习马列著作和毛主席著作的新高潮。"},{"type":"paragraph","text":"近日来，我们在党的“七大”礼堂，重温了毛主席在会上作的报告。毛主席说：这个大会“是一个团结全中国人民、团结全世界人民、争取最后胜利的大会”。毛主席还提出：“全党团结起来，为实现党的任务而斗争。”维护党的团结和统一，是毛主席的一贯教导。毛主席是维护党的团结和统一的光辉典范。毛主席在延安领导的整风运动，从思想政治路线上彻底清算了王明、张国焘的错误路线，使全党达到了空前的团结和统一。大家凝视着“七大”主席台上挂着的“在毛泽东的旗帜下胜利前进”的横幅标语，举起拳头，向毛主席宣誓，向党中央保证：最紧密地团结在以华国锋同志为首的党中央周围，高举毛泽东思想的旗帜，争取更大的胜利。"},{"type":"paragraph","text":"我们反复学习毛主席关于“要搞马克思主义，不要搞修正主义；要团结，不要分裂；要光明正大，不要搞阴谋诡计”的教导，回顾党内两条路线斗争史，认识到毛主席提出的“三要三不要”的基本原则，是识别党内走资派的重要标尺，是战胜走资派的锐利武器。党内资产阶级的代表人物都搞修正主义，搞分裂，搞阴谋诡计。要使我们的党不变修，国不变色，就必须坚持毛主席提出的三项基本原则，同一切违背这三项基本原则的言论和行动作不调和的斗争。我们是毛主席革命路线的警卫战士，要坚定不移地站在无产阶级的立场上，在以华国锋同志为首的党中央领导下，坚持以阶级斗争为纲，坚持党的基本路线，坚持无产阶级专政下的继续革命，深入批邓，继续反击右倾翻案风，同搞修正主义、搞分裂、搞阴谋诡计的走资派作坚决斗争。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"华国锋","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"00ac79540c"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
