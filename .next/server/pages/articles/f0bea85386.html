script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"读者指出“中国奴隶社会”稿内错字北大史学会来函表扬","authors":[],"dates":[{"year":1950,"month":8,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"敬启者:贵报六月十日刊载郭沫若先生中国奴隶社会一文，越石文的“文”字是否“父”字之误 ?“四公分室”，是否为“四分公室”之误?又“商行为的发达”此句有误否?如无误应作何解释?敬希示知，为盼!抑有进者，报纸为宣传政教重要工具，政论、学术论文实不应有误字，以讹传讹，会引起学习的曲解的。至于各地方新闻，设有误字，则是非颠倒，会引起误会的。请贵报校对工作者，多多注意，以利读者为要!"},{"type":"paragraph","text":"再新华月报七日号转刊贵报原文，亦不加纠正，好像亦应负责。夏伯任谨上"},{"type":"paragraph","text":"七月廿日"},{"type":"paragraph","text":"编者同志:"},{"type":"paragraph","text":"转来夏伯任先生责问关于郭沫若先生的“中国奴隶社会”讲演稿误字及不明之处一函，已经收到，今特答复如下:"},{"type":"paragraph","text":"一、越石文之“文”字，为“父”字之误:“四公分室”为“四分公室”之误，乃甚明确，敝会又查所存底稿，并无此误，当系抄稿或排印之故，请贵报更正为盼。"},{"type":"paragraph","text":"二、“商行为的发达乃郭沫若先生十批判书中‘古代研究的自我批判’一文中的原句，‘商行为’当系指具有商业性质的交换行为，而非一般的交换行为，一阅郭先生原文便知。”"},{"type":"paragraph","text":"最后，敝会对于夏先生认真研读本稿，尊重学术严肃的精神认为值得表扬。此致敬礼　北京大学史学会"},{"type":"paragraph","text":"八月二日"},{"type":"paragraph","text":"编者按:"},{"type":"paragraph","text":"谢谢夏伯任先生的指正。本报校对组同志很重视这个问题，已深入检查，作为改进工作的经验，但查出底稿并非校对组错误，显然是抄稿时的笔误了。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f0bea85386"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
