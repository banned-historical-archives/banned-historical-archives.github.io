script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"苏联企图用新花招剥削和掠夺印度印度舆论指出，对苏联的新花招必须提高警惕","authors":[],"dates":[{"year":1976,"month":4,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京一九七六年四月二十一日电　新德里消息:苏联和印度四月十五日在新德里签订了一项一九七六——八○年的长期贸易协定。签订这项协定的过程表明，苏联对待印度的损人利己的伎俩越来越行不通。"},{"type":"paragraph","text":"尽管印度方面经过一年多的费力交涉，这项新的五年贸易协定并没有使两国之间的进出口商品项目增加多少。印度方面想增加从苏联进口它急需的煤油、化肥、有色金属和白报纸，但苏联要把这些商品拿到世界市场上去换取外汇而拒绝了印度的要求；苏联极力要对印度推销民航飞机和棉花，印度方面不同意。"},{"type":"paragraph","text":"长期以来，苏联向印度倾销价格高、质量低的机器设备，从印度购入以农产品为主的廉价初级产品。在印度舆论的反对下，苏联当局感到，通过这种贸易方式来剥削和掠夺印度，困难越来越大。因此，苏联当局打算通过发展两国间的“生产合作”来促进苏印贸易。在它心目中的所谓“生产合作”，仍然是由苏联向印度倾销机器设备，在印度开设工厂，利用印度的廉价劳动力和原料制成产品运回苏联，偿还它的机器设备投资。"},{"type":"paragraph","text":"印度舆论指出，对苏联的这个新花招必须提高警惕，以免使印度的利益再受损害。《印度斯坦时报》四月十四日的社论指出:“这就要求把两国经济的某些部门紧密衔接在一起，以适应苏联的需要。”《印度教徒报》四月十七日的社论也指出:“苏联愿意在劳动力便宜的印度开设工厂，这是与发展中国家‘分工’理论的实施。”社论说:“过去的一些帝国也曾经在它们的殖民地实行过它们那种方式的‘分工’，给现今已成为广大的……不发达国家造成了巨大的损害。要保证合伙者当中较弱的一方不致再一次成为受经济剥削的对象，这个问题就必须极其精明细致地加以处理。”"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fbf4ccfbf8"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
