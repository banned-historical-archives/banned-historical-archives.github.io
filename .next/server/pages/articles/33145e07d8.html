script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"卢森堡共产党代表大会开幕  欧班尼号召加强党内和兄弟党间团结  坚决维护劳动人民利益反对修正主义","authors":[],"dates":[{"year":1958,"month":12,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"卢森堡共产党代表大会开幕"},{"type":"paragraph","text":"欧班尼号召加强党内和兄弟党间团结"},{"type":"paragraph","text":"坚决维护劳动人民利益反对修正主义"},{"type":"paragraph","text":"新华社26日讯  据塔斯社卢森堡消息：卢森堡共产党第十五次代表大会，25日在卢森堡的大工业中心鲁梅兰热市开幕。法国、德意志民主共和国、意大利、比利时和荷兰等兄弟共产党和工人党的代表团出席了大会。"},{"type":"paragraph","text":"卢森堡共产党中央委员会总书记欧班尼在会上作了“在当前形势下党的任务”的报告。他在谈到当前国际形势的特点时指出，资本主义阵营不断削弱，以苏联为首的社会主义阵营的力量不断壮大。社会主义的威力正在以史无前例的速度不断地增长。欧班尼强调指出了苏联发展国民经济七年计划的巨大意义。"},{"type":"paragraph","text":"欧班尼说，西方各国（包括卢森堡在内）的劳动人民应该加紧斗争，争取改变政府旨在鼓吹冷战和在各国人民之间造成敌对和憎恨气氛的危险政策。"},{"type":"paragraph","text":"欧班尼在报告中谈到国内政治局势时指出，目前所以发生政府危机和议会解散，是由于卢森堡的统治集团企图逃避满足劳动人民的迫切要求。现已辞职的天主教党和社会党联合政府执政七年来，卢森堡劳动人民的生活一年年恶化。今年在卢森堡各个经济部门所出现的经济衰退，给工人阶级和少土地农民带来了沉重的负担。卢森堡劳动人民对他们境况恶化和政府政策的不满正在不断增长。"},{"type":"paragraph","text":"欧班尼在谈到即将举行的选举运动时，号召共产党员揭露剥削阶级以及剥削阶级政党的手腕，为争取劳动人民的一致行动而斗争。他简略地叙述了共产党的选举纲领。纲领中要求实行独立的外交政策，实行同世界各国和平合作的政策，要求承认中华人民共和国。"},{"type":"paragraph","text":"欧班尼在报告最后，号召在争取和平、维护劳动人民利益的斗争中加强党的团结，加强党同其他国家兄弟共产党和工人党的团结。他还号召为反对工人阶级的敌人——形形色色的修正主义和宗派主义而斗争。"},{"type":"paragraph","text":"代表们就欧班尼的报告进行了讨论，大家在发言中谈到了党员人数增加和党的影响加强的情况。"},{"type":"paragraph","text":"卢森堡共产党中央委员会书记乌撒尔丁格就第二项议程——“共产党议会党团的活动”作了报告。他说，共产党议会党团向全体人民揭穿了统治集团的反动政策。他支持欧班尼报告中提出的共产党竞选纲领，并号召代表大会代表展开积极工作，在广大人民群众中宣传这个纲领。"},{"type":"paragraph","text":"大会全体代表以暴风雨般的掌声欢迎苏联共产党和其他国家兄弟党给大会的贺电。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"name":"世界形势","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"33145e07d8"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
