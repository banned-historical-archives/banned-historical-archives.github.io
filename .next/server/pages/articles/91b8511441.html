script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"不管中贫农地主工资应该是一样  长治五区纠正生产中左倾现象","authors":[],"dates":[{"year":1948,"month":4,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"不管中贫农地主工资应该是一样"},{"type":"paragraph","text":"长治五区纠正生产中左倾现象"},{"type":"paragraph","text":"【长治消息】五区在本月十九号召开全区扩干会议，检查一月春耕。经各基点汇报与干部自我检查，发现春耕生产中有三个大问题：（一）各阶层工资不一样。如西掌农会主席说：“我村群众研究，中农劳力多，贫农劳力少，为照顾穷人的困难（去年没给地主工资），今年订工资是地主一工半升米、中农升半米、贫农二升米。（二）任意侵害中农。屈家山村让中农拿出二十多亩地顶公粮。沟里村给中农加公粮四十多石，所以中农有少数户口现在没吃的。（三）不给中农贷款。如西坪贷给洗脸擦黑中农款，区干部让支书收回来，并说贷款委员会阶级不明确。大家反复讨论，一致认识过去作法与党的政策相反，与群众不利。如窑同支书说：“咱们不看西瓜光看芝麻，不给地主工资不是群众要求。去年老实农民偷给地主粮食，咱们还问人家啥思想，脱离群众。扭转左倾情绪后，大家研究出四项规定：（一）在贷粮款中满足贫雇要求，必须解决中农困难。（二）在负担上与合作社分红上不准排斥中农。（三）工资上地主富农中贫农必须一样，不准打击生产情绪。（四）必须安置地主，不准饿死一个人。接着启发大家积极讨论春耕，订出春耕具体计划。（振华、五区春耕工作组）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"91b8511441"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
