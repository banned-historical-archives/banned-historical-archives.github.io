script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"美国三万多制罐工人坚持罢工一个月  美国制罐垄断企业受到沉重打击　工人取得初步胜利   佛罗里达州农业季节工人示威反对残酷剥削","authors":[],"dates":[{"year":1971,"month":3,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"美国三万多制罐工人坚持罢工一个月"},{"type":"paragraph","text":"美国制罐垄断企业受到沉重打击　工人取得初步胜利"},{"type":"paragraph","text":"佛罗里达州农业季节工人示威反对残酷剥削"},{"type":"paragraph","text":"据新华社十五日讯　华盛顿消息：坚持了一个月的美国三大制罐公司三万六千名工人的大罢工，到十四日已经取得了初步胜利。"},{"type":"paragraph","text":"这次罢工沉重地打击了美国制罐垄断企业，使美国的制罐生产锐减了一半左右。制罐工人在罢工期间克服了种种困难和垄断资本家的破坏活动，英勇地坚持斗争，迫使资本家于三月十四日答应了工人增加工资的要求。"},{"type":"paragraph","text":"据新华社十四日讯　华盛顿消息：当美帝头子尼克松十三日到佛罗里达州比斯坎岛度假的时候，三百五十名农业季节工人在他的别墅附近举行示威，抗议美国统治集团和农业垄断资本对他们的残酷剥削。"},{"type":"paragraph","text":"这些农业季节工人来自佛罗里达州南部各地。他们在通向尼克松别墅的路上遭到尼克松一批“保镖”的阻拦。他们当即就地举行静坐示威，并且提出“要粮食不要诺言”的口号，谴责尼克松政府净说漂亮话来骗人，实际上却不顾人民的死活。示威持续了两个小时。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f9476cb850"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
