<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"重庆三反运动已深入展开 中小贪污案多已揭发“大老虎”尚未搞出","authors":[],"dates":[{"year":1952,"month":1,"day":20}],"is_range_date":false,"parts":[{"text":"重庆三反运动已深入展开中小贪污案多已揭发“大老虎”尚未搞出","type":"title"},{"text":"【西南总分社二十日讯】重庆三反运动在机关内部发展得较快，据估计一般中小贪污分子多已坦白，但大贪污案件特别是财经部门的大贪污案件还没有揭发出来。西南贸易部门已检举、坦白出来的贪污案件最高为一千万元，市属各机关也是如此。西南贸易部门已向大贪污案件围剿了一个多星期，但都没有突破，因此一周来运动发展比较缓慢。许多贪污分子正与商人结成“攻守同盟”，突破的办法正在研究中。总的方向是抓住重点，具体深入地研究材料，对证材料，准备下一阶段的大斗争。目前其他的情况是：","type":"paragraph"},{"text":"一、首长负责发动群众后，抵抗运动的现象仍然陆续发生。西南人民广播电台台长凃国林甚至漫骂提意见的人。重庆电工器材厂行政、党、团都连结在一起“监视”控告人，中层中的抵抗仍未彻底解决，特别是财经系统，一般科股干部大部分是旧人员，抵抗特别大。如市百货公司零售公司有的停职不反省，休息去了，有的要求停职，有的拿脑袋担保，有的检举别人积极，轮到自己就消极了，有的领导看见搞不出大的来，不积极想办法，想拖过去。但群众是异常英勇的，有的遇到阻力就写信给邓小平书记、市委张霖之书记、川东谢富治书记，或向报馆控告。","type":"paragraph"},{"text":"二、社会各方面的群众都已发动起来了。学校、工厂和街道都陆续动起来，目前主要的问题是如何加强领导。居民的发动步骤是首先向户籍员、公安人员的敲诈勒索贪污进行斗争，据估计户籍员中三分之二以上有敲诈勒索行为，然后转到居民自己中去。估计贪污各种捐款的也不少。学校方面现在正进行分区领导交代政策。工厂方面现正搞增产节约计划，但工人对三反运动要求十分迫切，气势极猛。现在还只能搞国营的，私营的不能搞，因为四面出击力量不够。","type":"paragraph"},{"text":"四、工商界是初步发动了一下，但气势不猛，未形成运动。资产阶级的抵抗很厉害，粮食和工业中已有一老板自杀了。有的说“重庆四万户工商业，你们关不完”，工商联及同业公会有不少人有问题，因之发动工商界还必须加强力量。","type":"paragraph"},{"text":"五、西南“三反”已推到专区与县，这方面的情况掌握较少，但估计发动的还居少数，而且“天高皇帝远”，问题一定更多，需要督促与控制。","type":"paragraph"},{"text":"六、贪污分子和贪污行为的面很大。军区坦白者占总人数六分之一，其中有一部分是战士。军政委员会系统有三分之一的人坦白，财政贸易等部甚至有四分之三以上的人坦白。也有一面坦白，一面继续贪污的。","type":"paragraph"},{"text":"七、对“三反”反映很好，贵阳人民说他们有三大解放：1、从国民党解放出来；2、从反革命分子下解放出来(指镇反运动)；现在又从贪污分子下解放出来。","type":"paragraph"},{"text":"八、为展开对投机奸商的进攻，西南局已成立一特设研究室，掌握情况，决定策略。","type":"paragraph"}],"comments":[],"origin":"新华通讯社编《内部参考》1952年1月21日","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"28427c42be"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
