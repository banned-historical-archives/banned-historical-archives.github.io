script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"去年德国极右暴力案陡增17人丧生，300多名警察受伤","authors":[],"dates":[{"year":1993,"month":1,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"中国国际广播电台波恩电　德国联邦宪法保护局12日宣布，1992年德国共发生了2285起极右或有极右背景的暴力案件，比1991年增加了50%，17人因此丧生，300多名警察受伤。"},{"type":"paragraph","text":"宪法保护局称，发案率最高的三个州是:梅克伦堡——沃波莫瑞、勃兰登堡和石荷州。暴力行动的主要攻击目标是外国人，特别是难民和难民收容所。其中攻击难民和收容所的案件多达2000多起。因暴力活动被捕的894人中，70%的罪犯年龄不到21岁。"},{"type":"paragraph","text":"极右暴力案件已经造成了几百万马克的物质损失。"}],"comments":[],"origin":"中国国际广播电台","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"84d09b6d72"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
