script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"德各界人士表示  坚决反对极右势力","authors":["刘钢"],"dates":[{"year":2000,"month":8,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"德各界人士表示"},{"type":"paragraph","text":"坚决反对极右势力"},{"type":"paragraph","text":"新华社柏林8月15日电（记者刘钢）德国极右分子不断制造暴力排外事件引起了德国各界人士的强烈反感。德国政治、宗教、文化界以及军方人士15日纷纷表示，坚决反对右翼极端主义势力。"},{"type":"paragraph","text":"德国各级政府已经制订了打击极右分子及其活动的行动计划。据悉，德国联邦及各州的内政部长将于18日召开特别会议，专门研究如何形成整体合力，在全国严厉打击极右势力问题。"},{"type":"paragraph","text":"德国北威州政府在15日举行的会议上通过了打击极右势力的一揽子措施，其中包括将警察、司法、学校、宪法保卫局和青年工作团体等各方的力量联合起来，共同制止极右思潮的蔓延。该州内政部长弗里茨·贝伦斯说：“我们要清楚地表明，在北威州绝不允许极右分子胡作非为。”"},{"type":"paragraph","text":"据将于16日出版的《南德意志报》报道，德国联邦国防军陆军总监赫尔穆特·维尔曼已致信各部队的指挥官，要求他们采取有力措施以制止军队中极右势力制造事端。他强调说，“极右势力在部队中不能有市场”，对他们的打击必须“迅速而果断”。德国文化和宗教界也对极右势力表示憎恶。德国作家协会要求其会员积极投入到反对极右暴力的活动中去，在自己的作品中鲜明地表现出反对极右势力的立场。德国福音教会主席团主席曼弗雷德·科克在接受媒体采访时说，要对青少年进行反极右的教育，而且应从小学开始。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4c1b7df06c"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
