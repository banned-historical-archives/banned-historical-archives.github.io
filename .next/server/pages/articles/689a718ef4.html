script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"巴拿马领导人发表讲话呼吁  第三世界国家团结起来反对跨国公司剥削掠夺  委内瑞拉总统驳斥所谓石油提价引起世界通货膨胀的谰言","authors":[],"dates":[{"year":1977,"month":2,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"巴拿马领导人发表讲话呼吁"},{"type":"paragraph","text":"第三世界国家团结起来反对跨国公司剥削掠夺"},{"type":"paragraph","text":"委内瑞拉总统驳斥所谓石油提价引起世界通货膨胀的谰言"},{"type":"paragraph","text":"据新华社巴拿马城电 巴拿马政府首脑奥马尔·托里霍斯一月二十二日在一次一万多人的群众大会上说：为了主权和解放，不仅要在政治上消除殖民主义，而且还要摆脱经济上的依附。"},{"type":"paragraph","text":"托里霍斯是在巴拿马城东部菲利皮略糖厂落成仪式上讲这番话的。他指出，这家糖厂的建成标志着巴拿马“在摆脱依附状态，取得解放的道路上又前进一步”。"},{"type":"paragraph","text":"巴拿马总统府部长费尔南多·曼弗雷多一月二十七日在巴拿马城发表谈话，揭露跨国公司对第三世界国家进行剥削和掠夺，呼吁第三世界国家更紧密地团结起来，坚决开展争取经济、政治和社会解放的伟大斗争。"},{"type":"paragraph","text":"曼弗雷多指出，这些跨国公司的经济和政治活动“造成了一条束缚人的锁链，牢牢地禁锢着拉美各国人民的经济，使其不能健康而充分地发展。”他说，作为通向各国人民获得经济—社会解放的最初步骤，第三世界国家必须制定并实施一个总的战略目标，来抵制跨国公司经济剥削最疯狂的活动。他又强调说，“第三世界国家明确地认识到，迫切需要执行本国的和地区性的保护政策，来制止跨国公司的掠夺阴谋。”"},{"type":"paragraph","text":"新华社加拉加斯一九七七年一月二十八日电 委内瑞拉总统卡洛斯·安德烈斯·佩雷斯一月二十七日在加拉加斯举行的一次记者招待会上驳斥了那种说是石油提价引起了世界通货膨胀的谰言，并强调指出，在原料价格和工业品价格之间一直存在着极大的不平衡，必须建立新的国际经济秩序来维护发展中国家的利益。"},{"type":"paragraph","text":"佩雷斯总统列举事实指出：“在一九七五年全年和一九七六年一部分时间里，当石油价格冻结的时候，欧洲和美国的所有制成品都涨价了。现在，当有人提出在多哈不应该提高石油价格的时候，钢的价格却提高了百分之八。这样，从我们发展中国家购买走的原料和基本产品的价格与我们必需购买的资本货和制成品的价格之间造成的不平衡很大，而且在日益扩大。”佩雷斯总统指出，石油输出国组织“不象那些人为了剥削我们国家而组成跨国公司那样，怀着利己主义的目的组成新的卡特尔”，而是为了伸张国际正义的目的。"},{"type":"paragraph","text":"佩雷斯总统接着说：“我们懂得，我们这些国家今天应该开展的根本性斗争不限于我们国内，而应该是全球性的、普遍性的。因为，只要不建立国际经济新秩序，只要不建立世界各国之间新的交换关系，只要不修改旧的不合理的国际分工，那么，我们这些国家就不可能获得经济自由，人民群众就不可能得到福利”。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"689a718ef4"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
