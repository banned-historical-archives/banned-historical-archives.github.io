script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"张春桥同志会见并宴请阿根廷革命共产党访华团","authors":[],"dates":[{"year":1975,"month":11,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"张春桥同志会见并宴请阿根廷革命共产党访华团"},{"type":"paragraph","text":"新华社一九七五年十一月二日讯　中共中央政治局常委张春桥最近会见了以阿吉雷为首的阿根廷革命共产党访华团全体成员，同他们进行了亲切友好的谈话。"},{"type":"paragraph","text":"会见后，张春桥同志设宴招待了访华团。"},{"type":"paragraph","text":"参加会见和出席宴会的有中联部副部长申健以及邢竹芳、孙也坪、石金诺等。"},{"type":"paragraph","text":"阿根廷革命共产党访华团是应中共中央的邀请前来进行友好访问的。访华团曾到延安、上海、南京、长沙、韶山、广州等地参观访问，并已在近日离京回国。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"张春桥","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"354045b4ea"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
