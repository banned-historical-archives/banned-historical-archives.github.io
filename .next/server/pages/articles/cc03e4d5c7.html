script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"老挝爱国战线党主席苏发努冯亲王致电柬埔寨国家元首西哈努克亲王坚决支持西哈努克亲王和柬人民 反对美帝和柬极右集团的正义斗争","authors":[],"dates":[{"year":1970,"month":3,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京二十四日电　据巴特寮通讯社二十四日报道，老挝爱国战线党中央委员会主席苏发努冯亲王二十二日打电报给柬埔寨国家元首诺罗敦·西哈努克亲王，表示坚决支持西哈努克亲王和柬埔寨人民反对美帝国主义和柬埔寨极右集团的正义斗争。"},{"type":"paragraph","text":"电报指出:“美帝国主义为了实行侵略印度支那国家的阴谋，在老挝扩大战争和在越南进行战争的同时，唆使他们的仆从于三月十八日在金边发动了政变。”"},{"type":"paragraph","text":"电报说:“我代表老挝爱国战线党和老挝人民，向亲王和高棉人民表示我们对美国收买的极右集团在金边从事冒险行径的极大愤慨。”"},{"type":"paragraph","text":"“我向亲王保证，在反对我们的共同敌人美帝国主义侵略者的斗争中，老挝人民定将维护与兄弟的高棉人民的友谊和坚定不移的战斗团结。”"},{"type":"paragraph","text":"电报表示，老挝爱国战线党毫无保留地支持西哈努克亲王在二十日声明中所强调的为推翻美国收买的极右集团，维护柬埔寨王国的独立、主权和领土完整的斗争，并且深信，这场斗争必将克服一切困难，赢得最后胜利。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cc03e4d5c7"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
