<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"湖北省市民盟、市民建等就汉阳暴乱事件发表声明","authors":[],"dates":[{"year":1957,"month":8,"day":7}],"is_range_date":false,"parts":[{"text":"湖北省市民盟、市民建等就汉阳暴乱事件发表声明","type":"title"},{"text":"[《湖北日报》消息] 暗藏在汉阳第一中学的反革命集团制造暴乱的罪行在本报发表后，激起了广大人民的愤怒。民盟湖北省委整风领导小组、民盟武汉市委整风领导小组、民建武汉市委和武汉工商业联合会都发表了书面声明，拥护政府逮捕反革命分子的有力措施，严厉斥责了民盟成员杨焕尧（即杨白庚）和反革命分子勾结制造暴乱的罪行，并表示要把反右派的斗争进行到底。","type":"paragraph"},{"text":"民盟湖北省委整风领导小组完全同意昨天本报社论“汉阳事件说明了什么”中的论点，表示要更积极地团结全省盟员，继续与马哲民及其他右派分子展开斗争，不获全胜，决不收兵。整风领导小组还进一步揭发了民盟成员杨焕尧的丑恶面目。杨焕尧在解放前就干过20多年的伪司法工作，是一个有血债有民愤的历史反革命分子。司法改革后，调他到汉阳文化馆工作整风运动开始后，他在马哲民的直接唆使和间接影响下，向党猖狂进攻。他认为“政协今后要变成实权机关”，就怂恿盟员潜入政协活动。他利用文化馆经常接近学生，向他们灌输毒素。他在省民盟听了马哲民的报告后，回到汉阳就积极准备“招兵买马”，发展组织，并带回省民盟的“工作简报”进行宣传。到后来就直接参与了汉阳反革命集团的暴乱行动。事件平息之后。在中共汉阳县委统战部召开的座谈会上，杨焕尧不但不肯承认错误，反而替反革命分子打掩护，说什么“县中事件没有美蒋特务联系，不能当敌我矛盾处理”。并向省民盟写假检讨，企图蒙混过关。省民盟现已建议盟中央开除他的盟籍，并函请政府有关机关给以必要的法律处分。民盟武汉市委整风领导小组在书面声明中说：“从民盟右派分子杨焕尧与这次反革命暴乱的事实看，不是很明显地说明了资产阶级右派分子借口帮助党整风所进行的一切阴谋活动最终目的么？”整风领导小组召盟员提高警惕，对右派分子不能有一丝一毫的温情。要彻底粉碎马哲民右派集团，彻底肃清右派分子在盟内的思想影响。","type":"paragraph"},{"text":"市民建和市工商联的书面声明说：从这事件中，充分暴露了右派分子与反革命分子沆瀣一气，阴谋在中国制造“匈牙利事件”，推翻共产党的领导，企图使资本主义重新在中国复辟。这已经是一件明目张胆的、彻头彻尾的反革命阴谋活动。现在人民政府已经依法将这一批反革命分子逮捕法办，我们对政府的这一英明措施竭诚拥护。","type":"paragraph"},{"text":"从这一事件中，使我们更进一步认识到反右派斗争的严重意义，深刻体会到反右派斗争在实质上就是社会主义与资本主义两条道路的斗争，是一场极为深刻的阶级斗争，是一个政治上和思想上的社会主义革命，这场斗争对于以协助政府对资本主义工商业进行社会主义改造为主要任务的民建会和工商联来说更有其深刻而现实的意义。","type":"paragraph"},{"text":"声明说：通过汉阳第一中学反革命事件，使我们工商界进一步擦亮了眼睛，提高了警惕，深切认识到如果让右派分子的阴谋得逞，将要使千百万革命人民的人头落地。这一场反右派斗争，是一场你死我活的阶级斗争，我们一定要从这一事件中吸取教训，一定要引导全市工商界把反右派斗争进行到底，不获全胜，决不收兵！","type":"paragraph"}],"comments":[],"origin":"《湖北日报》1957年8月7日。原题为：“省市民盟、市民建等就汉阳暴乱事件发表声明/必须肃清反革命把反右斗争进行到底/省民盟已建议盟中央开除杨焕尧盟籍并函请政府有关机关给予他法律处分”。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0e472c0bf5"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
