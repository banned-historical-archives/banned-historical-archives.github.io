script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"资产阶级不剥削农民吗？","authors":["史长旭"],"dates":[{"year":1965,"month":6,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"资产阶级不剥削农民吗？"},{"type":"paragraph","text":"战士　史长旭"},{"type":"paragraph","text":"电影《林家铺子》里面写了农民和资本家的关系。这里有一场农民到林家铺子买帽子的戏。影片的改编者别有用心地通过这场戏告诉观众：林老板这样的资本家是不剥削农民的，他和农民之间和睦共处，称兄道弟，农民还十分感谢他。农民老通宝就曾这样说：“要说林老板待我呀，那我真是没有可说的。……他要是开粮食店，我早就阿弥陀佛了！”"},{"type":"paragraph","text":"资产阶级和农民的关系是这样的吗？我想用我亲身的经历来回答这个问题。我家离县城（河北高阳县）不远，解放前有一年，麦收之后，我和爸爸一起背着新打下的小麦进城去卖，想买把新锄头，爸爸还答应给我买件小褂。刚进城，就看见有不少背布袋的乡下人挤在一家写着“宏记”字号的铺子门前。掌柜的在那里满脸堆笑地嚷着：“乡亲们来吧，百货俱全。咱给大家个方便，不用现钱，拿粮食换就行。”爸爸信以为真，就走进去换。我们的小麦在家里量好足有三斗，可用“宏记”的斗一过，才两斗半。一讲价钱，只能换一把不带柄的锄头和两条毛巾。爸爸说了半天好话，掌柜的才大发慈悲地换给了一把锄头、一件短袖小褂。这年秋天，白洋淀一带发了大水，秋庄稼颗粒不收，家里的一点点麦子尽管掺糠掺菜也吃不了多少日子。就在这时，又听见乡里人说：“‘宏记’又给大伙方便啦，铺子里不单卖杂货，还卖粮食。”爸爸东凑西凑，弄了几个钱进城去买。他们卖的麦子又湿又贵，不论斗卖论斤卖，爸爸拿去的钱只能买五斤，同麦收时他们的收价一对比，贵四倍还多。五斤麦子很快就吃光了，爸爸没办法，又去求“宏记”掌柜的赊点粮食。好话说了千千万，掌柜的才答应让爸爸给他出劳力运货，来换点粮食。寒冬腊月，爸爸尽管衣不遮体，为了一家老小，也要去给“宏记”运货。一天中午，爸爸推车走冰过河，一下掉到了冰洞里。人虽然被乡亲们救上来，半车子年货却都被水浸湿了。爸爸得了重病，一直躺在床上。“宏记”铺子不管人的死活，把半车年货按最高的市价合了钱。叫我家赔偿。他还说，看在老主顾的面上，没要赔现钱，就写在账本上吧。这样，我家就欠下了“宏记”铺子驴打滚的账，每月都有穿长大褂的人来我家逼账。"},{"type":"paragraph","text":"在旧社会象我家这样受城市资产阶级剥削的农民又何止千万？"},{"type":"paragraph","text":"影片既写了农民和资产阶级之间的关系，夏衍同志作为一个党员作家，就应该站在无产阶级的立场，选择有代表性的而不是个别的事例，正确地反映他们之间的阶级矛盾，揭露资产阶级对农民的剥削。夏衍同志根本没有这样做，相反，还让农民来赞美林老板，这不是与社会主义革命唱对台戏又是什么呢？我们是革命战士，对《林家铺子》这样的坏电影，我们一定要坚决予以批判。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5da726eeff"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
