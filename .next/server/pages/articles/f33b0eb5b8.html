<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"华东区石油公司打虎队智勇兼备一夜打出三只大老虎新市区公安分局克服右倾思想　首长亲自上阵擒获老虎十余只","authors":["杭宝华","袁凌"],"dates":[{"year":1952,"month":2,"day":27}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　中国石油公司华东区公司三反运动已经进入紧张的“打虎”阶段。打虎队伍声势浩大，穷追猛打，二月廿二日晚上一夜打出了三只大老虎，现正乘胜追击继续扩大战果中。"},{"type":"paragraph","text":"这次围剿战役是十分猛烈的，战果也是很辉煌的，廿二日晚上打出的三只大老虎，都是原来坦白不诚的。战斗开始时这些老虎一口咬定已讲的数字，坚持不肯“加码”，但是打虎队智勇兼备，队员们个个勇猛非凡，向前冲击突破敌阵，穷追猛打，有一只大老虎已供出了贪污三亿几千万元的巨大数字。"},{"type":"paragraph","text":"根据该公司增产节约委员会掌握的材料，已经打出的“老虎”还只是所有材料的一部份；未经清剿出来的大老虎还有很多很多。该公司打虎队正在胜利的基础上跟踪追击，继续扩大战果，直到把所有大小老虎捕捉干净为止。　(袁凌)"},{"type":"paragraph","text":"【本报讯】　本市新市区公安分局三反运动开始时，一般同志的思想是很麻痹的，有的同志甚至于说:“解放快近三年了，贪污一定很少、很小。”在运动进入“打虎”阶段，许多同志还是严重地存在着右倾思想，认为“穷乡僻壤”一个小小的分局，既不掌握财政，又不管理物资，那里来的“老虎”呢?个别领导同志也是同样认为“此山无虎”。因此群众的斗争锋芒就显得无力，使一些贪污分子就隐蔽起来，把自己严重的贪污、盗窃国家资财的事件不谈，只谈一些浪费几只公家信封或打了几只私人电话等等的“鸡毛蒜皮”小事。"},{"type":"paragraph","text":"运动一天比一天紧张起来，领导上首先就召开了坦白、检举大会，发动群众开展群众性的检举运动；分局首长着重指出“思想老虎”的危害性，批判了各种右倾思想，使同志们明确右倾思想是开展反贪污斗争的绊脚石。同时又组织了力量，进行研究策略、战术、打虎经验，做好一切“打虎”的准备工作。"},{"type":"paragraph","text":"“大会攻，小会轰”的进攻形势，必然使贪污分子“手忙脚乱”惊慌失措起来，在群众面前就露出了“虎”迹。由于分局首长的亲自领导，临阵指挥战斗，大大地鼓励了全体打虎队同志的作战精神，在近一个星期不分昼夜的追打下，获得了辉煌战果，擒获大、小老虎十余只。"},{"type":"paragraph","text":"这些“老虎”都是非常狡猾，可以说是没有一只“老虎”是老实的，玩弄哭、叫、喊冤、写血书、自杀等等卑鄙无耻的手段企图朦混过关。在作战过程中是经历了许多困难的。举两个例子说吧:第一股的一只“大老虎”，在运动开始时“故作镇静”，每天笑嘻嘻，表面上学习也伪装得“一本正经”。由于打虎队同志克服了右倾思想，四面围剿，终于捉住了这只在解放前夕盗窃了公粮五百余担(其余物资在外)的“大老虎”。"},{"type":"paragraph","text":"其次是供管股的一只小老虎，干的是管理伙食团工作，在民主检查阶段时，他只承认曾贪污过一千五百元，其余没有。他当场并愿意写“保证书”，并且说“如果今后查出有贪污，愿意杀头”。贪污分子就想用这种无赖手段吓唬同志，企图逃避同志们对他的火力。其实他在不到一年的管理工作上，就贪污了大米六千经验证明，认为“穷乡僻壤”、“此山无虎”的右倾思想是错误的，是完全没有根据的。在运动中首长必须亲自负责，临阵指挥；发动群众肃清右倾思想，向群众说明克服“思想老虎”，是取得战斗胜利的重大关键。否则，反贪污斗争就不能获得彻底的胜利。　(杭宝华)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f33b0eb5b8"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
