script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"资产阶级有没有两面性？  晁幼德、郑东园提出了一些材料","authors":[],"dates":[{"year":1957,"month":5,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"资产阶级有没有两面性？"},{"type":"paragraph","text":"晁幼德、郑东园提出了一些材料"},{"type":"paragraph","text":"河北省政协委员晁幼德、郑东园在河北省政协会上发言说：一年多以来，唐山市有97％以上的私方人员参加了劳动竞赛。被评为先进工作者和受到物质奖励的有一千二百七十九人次，其中有三十九人连续三个季度获得了先进工作者的称号。但是，根据今年1月份在四百八十八个合营商业门市部的检查，我们私方人员的消极一面非常突出。因为对企业经营不负责任，管理不善，长短款达二千五百四十九次，商品发生损失的有八千九百二十九种；违法乱纪贪污盗窃的二十九件事件中，私方人员占二十件；占公家便宜的事件八百八十五件中私方人员占五百四十一件；挪用公款二百四十七件事件中，私方人员占一百九十六件。按长短款和商品损失两者相抵计算，使国家遭到五千八百多元的损失。贪污盗窃的手段是卖货不开发票，收回应收账款不入账，购进原料时多开数量，有的甚至每天直接盗窃货款。挪用公款的则是利用出外采购或企业留有备用现金的方便而进行挪用，有的竟达三月之久。晁幼德和郑东园说：难道这还不是资产阶级损公利私的消极一面的具体表现吗？"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ab4f893aaa"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
