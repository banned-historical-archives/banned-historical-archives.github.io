" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji22","name":"毛泽东全集第22卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji22.pdf"],"article":{"title":"须准备连续打几个大使","alias":"","parts":[{"type":"paragraph","text":"须准备连续打几个大仗！"},{"type":"paragraph","text":"（1946年9月30日）聂、刘、萧、罗："},{"type":"paragraph","text":"（一）傅作义不可能出很多兵向东，且有我张宗逊陈正湘两部钳制，东面李文两师五个旅集中与进攻都很缓慢，兵力不多。平绥线是我巩固区域，我集中全力配合民兵各个歼敌，可以粉碎敌之进攻。（二）为此目的，你们须准备连续打几个大仗，杨成武纵队最好不要分散，并须准备新兵补充伤亡，发动劳军，鼓励士气。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"申三十"},{"type":"paragraph","text":"[1]这是毛泽东为中共中央军委起草的给晋察冀军区司令员兼政治委员聂荣臻、副政治委员刘澜涛和晋察冀野战军司令员萧克、政治委员罗瑞卿的电报。"},{"type":"paragraph","text":"[2]傅作义，当时任国民党军第十二战区司令长官。"},{"type":"paragraph","text":"[3]张宗逊，当时任晋绥野战军副司令员。陈正湘，当时任晋察冀野战军第四纵队司令员。"},{"type":"paragraph","text":"[4]李文，当时任国民党军第三十四集团军总司令。"},{"type":"paragraph","text":"[5]平绥线，指北平（今北京）至绥远（今属内蒙古自治区）包头的铁路，即今京包线。"}],"authors":["毛泽东"],"dates":[{"year":1946,"month":9,"day":30}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":196,"page_end":196},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"bda1f0b2bf"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
