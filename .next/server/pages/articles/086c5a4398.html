script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"美资产阶级舆论对美英政策分歧表现不安","authors":[],"dates":[{"year":1953,"month":5,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"美资产阶级舆论对美英政策分歧表现不安"},{"type":"paragraph","text":"【新华社十五日讯】美国资产阶级的报纸和通讯社对于英美在国际政治问题上的分歧的表面化表现不安。"},{"type":"paragraph","text":"合众社十三日发自伦敦的消息说：“在与苏联举行会议问题上，英美之间今日有发生第二次大战结束以来最严重的外交政策分歧之虑。对于邱吉尔首相的举行大国会谈的建议，艾森豪威尔总统接连两天保持沉默，而英国与西欧赞成这个建议的人却越来越多，因而分歧更加深了。”这则消息认为，英美之间的“明显分歧的严重性”还由于“英国是美国最亲密的盟友”。"},{"type":"paragraph","text":"美联社十二日从旧金山发出的一则消息中认为邱吉尔是“表达了一种在美国和欧洲、特别是在英国似乎日益增长的公众情绪”，他的演说“表明了在如何进行大国会议的原则问题上他和艾森豪威尔总统的意见有分歧”。"},{"type":"paragraph","text":"该社十二日伦敦消息说，“邱吉尔透露了伦敦与华盛顿之间在政治趋势上有所分歧”，“邱吉尔所提出的英国外交政策和西方的外交政策有区别”。消息中引所谓“外交人士”的意见说，邱吉尔“力图以英国的眼光来看世界及整个世界的各种问题”。 “纽约时报”说，邱吉尔的关于大国会议的意见“已被某些人士认为说明了美英两国政策中的巨大分歧。无疑地，不仅美国与英国之间，而且美国与其他自由国家之间在重视时间，甚至可能在最后和平解决的条件方面都存在着分歧的意见”。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"086c5a4398"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
