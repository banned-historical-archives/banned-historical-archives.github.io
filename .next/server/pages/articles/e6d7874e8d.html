script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反对资产阶级教育制度　抗击反动政府野蛮镇压  日本大学学生连日同警察搏斗","authors":[],"dates":[{"year":1968,"month":9,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反对资产阶级教育制度　抗击反动政府野蛮镇压"},{"type":"paragraph","text":"日本大学学生连日同警察搏斗"},{"type":"paragraph","text":"学生斗争得到工人和市民热情支持，斗争规模越来越大"},{"type":"paragraph","text":"新华社七日讯　据东方通讯社报道：东京日本大学进步学生，为反对资产阶级腐朽的教育制度，连日来继续同佐藤反动政府派遣的武装警察进行激烈搏斗，第四次占领了这个学校经济系和法学系的教学大楼。"},{"type":"paragraph","text":"他们在斗争中得到了学校附近的工人和市民的热情支持，使斗争规模越来越大。"},{"type":"paragraph","text":"早在六月十五日，日本大学的进步学生就进行了斗争，他们占领校部和各系大楼，在校园里升起了红旗，并坚持斗争。"},{"type":"paragraph","text":"学校反动当局召来大批武装警察，从九月四日以来连续几次闯进学校，大肆袭击和搜捕学生，因而激起了学生斗争的进一步发展。"},{"type":"paragraph","text":"不顾佐藤反动政府武装警察的野蛮袭击，日本大学的学生们，六日组成了一些几百个人一队的战斗队，分别在经济系、法学系和理工系的教学楼周围展开了斗争。"},{"type":"paragraph","text":"经济系和法学系的学生，英勇地赶走了学校当局雇佣来镇压学生的打手，第四次占领了这两个系的教学大楼。"},{"type":"paragraph","text":"对学生的斗争怕得要死的佐藤反动政府，悍然出动了两千多名全副武装的警察以及许多辆装甲车和喷水车，对学生进行野蛮袭击。"},{"type":"paragraph","text":"学生们对武装警察的镇压极为愤慨，立刻从四面八方集合到经济系大楼前，他们举着红旗，到大街上举行示威游行。"},{"type":"paragraph","text":"沿途的工人和市民不断地加入游行队伍，使示威群众增加到近万人。他们一面高呼“打倒古田（日本大学董事长）”、“警察滚回去”等口号，一面向市民们宣传学生的正义斗争。"},{"type":"paragraph","text":"在游行线路上的一家书店的职员挥动起写着“毛泽东思想万岁”的红旗，表示支持示威的群众。"},{"type":"paragraph","text":"两千多名反动警察对示威群众进行野蛮镇压，他们用催泪弹和水龙袭击学生。学生们猛烈地投掷石块，对警察进行英勇反击。反动警察无理逮捕了三十五名学生。"},{"type":"paragraph","text":"目前，学生的斗争还在继续进行着。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e6d7874e8d"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
