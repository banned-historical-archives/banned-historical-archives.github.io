<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"全椒县一个生产队生产力的破坏与恢复情况的调查","authors":["吴进洪","张文礼","新华通讯社","施栋民"],"dates":[{"year":1962,"month":4,"day":30}],"is_range_date":false,"parts":[{"text":"全椒县一个生产队生产力的破坏与恢复情况的调查","type":"title"},{"text":"新华通讯社吴进洪施栋民张文礼","type":"authors"},{"text":"新华社合肥讯　安徽省全椒县左河公社大同大队西刘生产队是遭“五风”危害最大的一个队，生产力受到严重破坏，人民生活也受到了摧残。整风整社以后，比较彻底地纠正了“五风”，加以贯彻了十二条、六十条等政策，今春又调整了基本核算单位，人民生活得到了改善，生产积极性大有提高，生产力也开始恢复。但要恢复到1957年的水平，还须较长时期。","type":"paragraph"},{"text":"五风危害情况","type":"subtitle"},{"text":"这个队从1958年下半年开始刮起了“五风”，刮得比较严重的是1959年下半年到1960年春。据统计，在此期间，全队减少人口一百二十八人，占全队总人口二百四十一人的53.1%，其中男女整半劳力六十六人，占全队总劳力一百一十三人的58.4%。1958年到1960年共减少耕牛十二头，损坏犁、耙等大型农具四十七件，划出土地一百七十四亩，很多田由于无人管理，地力减退。社员的住房破坏得也很严重，全队原有住房一百八十三间，三年来拆毁、倒塌了七十二间。","type":"paragraph"},{"text":"1957年农业生产和生产力情况","type":"subtitle"},{"text":"据干部和社员们的回忆，1957年是西刘生产队解放后粮食产量和社员收入比较高的一年。当时全队有五十三户，二百四十一人，其中男一百一十人，女一百三十一人，男女整半劳动力一百一十三人，总耕田面积五百八十六亩，其中水田百六十七亩，旱地五十九亩，秋麦田一百六十亩。全队有耕牛十八点五头（其中有一头是与外队合养的），大型农具有犁十八张，耙二十二张，水车十四部，禾桶二个。全年粮食总产量十九万多斤，平均单产三百五十四斤。油料和经济作物有：油菜一千五百三十斤，花生一万斤，芝麻一百五十斤，棉花五百二十五斤，生产队留足种子、口粮、饲料后，还卖给国家粮食六万四千三百多斤，油料六千多斤，棉花二百六十多斤，出售给国家生猪十头，家禽一百四十只。社员分配的实物，全年每人平均口粮四百八十斤，棉花一斤，油料二十五斤（花生），平均每个劳动力可以集体收入中分配到一百四十多元。社员家庭副业有家禽三百七十多只，猪二十九头。","type":"paragraph"},{"text":"1961年农业生产和生产力的情况","type":"subtitle"},{"text":"到1961年底，全队还有四十三户，一百一十三人，其中男五十四人，女五十九人，男女整半劳动力六十五人，总耕田面积四百一十三亩，耕牛十一头（其中能用的只有九头），大型农具有：犁十张，耙四张，水车四部，禾桶一个。1961年全年粮食总产量六万七千多斤，平均单产一百七十二斤（1961年该队实行“责任田”的办法，社员私人所得的超产粮未计算在内）。社员全年每人平均留口粮三百六十五斤，留下种子、饲料以后，出售给国家的余粮有二万五千多斤，油料五十四斤，生猪三头，家禽一百一十只，鲜蛋三十五斤。社员家庭养猪二十四头，家禽四百三十五只。","type":"paragraph"},{"text":"什么时候才能恢复到1957年的水平","type":"subtitle"},{"text":"1961年以来，西刘生产队的生产、生产力以及人民的生活都有了一定的恢复，社员的体质也已好转。但距离1957年的水平还很远。据社员和干部们估计，要恢复到1957年的人口和劳动力，最少要十五年左右的时间。大家认为，现在全村有生育能力的妇女共二十八人，除去正常的死亡以外，估计每年可能增加十个人左右。耕牛的恢复主要是靠自繁，全队现在只有母牛三头，据估计，每头母牛三年可以繁殖一头（能耕田），到1967年才能在数量上赶上1957年，但今明两年还有二头老牛要淘汰，这样，大约需要八、九年的时间才能恢复到1957年的水平。水库、犁、耙等大型农具，主要是靠国家供应木料，按照生产队现有的经济力量，二、三年内就可以恢复到1957年的水平。粮食产量什么时候才能恢复到1957年的水平呢？干部和社员们一致认为，在正常年景下，粮食产量要看耕牛和劳动力的恢复情况，因为现在的耕牛和劳动力比1957年减少了50%多，不能做到精耕细作，粮食产量不可能有显著的增长。1961年粮食作物单产只有一百七十二斤（去年受了严重的旱灾），比1957年平均单三百五十四斤减少了一百八十二斤。其他如家畜、家禽的恢复和发展都比较容易，仅去年一年，这个队的生猪饲养量就已接近1957年，今年全队社员家庭饲养的猪共三十六头，已经超过了1957年的水平。家禽现在养了一百七十多只，春孵以后，就可以赶上1957年的水平。","type":"paragraph"},{"text":"来源：1962年4月30日新华社《内部参考》。","type":"paragraph"}],"comments":[],"origin":"美国图书馆收藏","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"28fb94536a"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
