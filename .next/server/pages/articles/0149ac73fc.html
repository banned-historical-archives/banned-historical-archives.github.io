script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"大长无产阶级革命左派志气 大灭资产阶级反动路线威风","authors":[],"dates":[{"year":1967,"month":1,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"《人民日报》转载了《文汇报》一月五日发表的《告上海全市人民书》，并在编者按中对这个极其重要的文件以及《文汇报》《解放日报》的新生给予极高的评价，这是我们心中最红最红的红太阳毛主席对我们革命造反派最深切的关怀，最巨大的支持和鼓舞。这是大快人心的喜讯，它大灭了资产阶级反动路线的威风，大长了无产阶级革命左派的志气!这是全市、全国革命人民政治生活中的一件大事!"},{"type":"paragraph","text":"我们千遍万遍地热烈欢呼《文汇报》《解放日报》的新生，我们最最热烈地拥护《人民日报》转载《文汇报》的这个极其重要的文件，我们最最衷心地欢呼毛泽东思想在无产阶级文化大革命中的又一伟大胜利!"},{"type":"paragraph","text":"最近，党内一小撮走资本主义道路的当权派和极少数顽固坚持资产阶级反动路线的人，他们利用金钱物质来转移斗争的大方向，来分化、瓦解、腐蚀革命左派队伍，抗拒毛主席的关于“抓革命，促生产”的伟大号召，破坏无产阶级文化大革命。革命造反派的战友们，革命的同志们，我们一定要及时地戳穿他们的阴谋诡计，煞住这股邪风，迎头痛击资产阶级反动路线的新挑战!任何人想从中捞到一根救命稻草都是绝对办不到的。一时受了蒙蔽的革命同志们，我们一定要擦亮眼睛，拨开迷雾，丢掉“私”字，坚决照毛主席的指示办事!坚决响应毛主席的关于“抓革命，促生产”的伟大号召!紧紧掌握无产阶级文化大革命的大方向!"},{"type":"paragraph","text":"革命造反派联合起来!革命的同志们联合起来!让我们更高地举起毛泽东思想伟大红旗，团结在一起，战斗在一起，胜利在一起!彻底粉碎资产阶级反动路线的新阴谋，把无产阶级文化大革命进行到底!"},{"type":"paragraph","text":"毛主席的革命路线胜利万岁!"},{"type":"paragraph","text":"战无不胜的毛泽东思想万岁!"},{"type":"paragraph","text":"伟大的中国共产党万岁!"},{"type":"paragraph","text":"我们最最敬爱的伟大领袖毛主席万岁!万岁!万万岁!"},{"type":"paragraph","text":"首都大专院校红卫兵革命造反总司令部(第三司令部)驻沪联络站"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"红卫兵运动","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0149ac73fc"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
