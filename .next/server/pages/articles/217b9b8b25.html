script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"《红旗》第二十一期刊登施东向文章:《列宁斯大林论十月革命的道路》同时发表万光写的《美国帝国主义是最大的国际剥削者》","authors":[],"dates":[{"year":1963,"month":11,"day":7}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京6日电】　《红旗》杂志第二十一期将于十一月七日出版。这一期杂志发表了施东向写的《列宁斯大林论十月革命的道路》一文。文章指出，十月革命的道路反映了社会主义革命和建设的普遍规律，是全人类走向社会主义和共产主义的光明大道。"},{"type":"paragraph","text":"文章论述了十月革命的几个基本经验，指出:无产阶级只有经过革命斗争，打碎资产阶级国家机器，才能实现社会主义；无产阶级革命胜利后，必须坚持实行无产阶级专政，为彻底消灭阶级、过渡到无阶级的共产主义社会创造条件；无产阶级专政的国家，应当有步骤地废除一切生产资料的私有制，有计划地发展社会主义经济；社会主义国家必须实行无产阶级国际主义的对外政策，积极援助各国人民并取得各国人民的援助；要进行无产阶级革命，巩固无产阶级专政，建设社会主义和共产主义，就必须建设一个无产阶级的革命的政党。"},{"type":"paragraph","text":"文章引述了毛泽东同志关于十月革命和中国革命的关系的著名论点说，中国革命是十月革命的继续，中国人民正是沿着十月革命的道路，取得今天的胜利和成就的。坚持十月革命道路，被压迫阶级和被压迫民族的革命斗争，就一定能够在全世界取得最后胜利。"},{"type":"paragraph","text":"这一期还刊登了万光写的《美国帝国主义是最大的国际剥削者》一文。文章首先论证了美国帝国主义正在以帝国主义历史上空前的规模向国外进行经济扩张，已经成为当代最富有寄生性和掠夺性的帝国主义国家。接着作者运用大量材料论证了美国帝国主义比其他任何国家都更厉害地榨取亚洲、非洲和拉丁美洲国家的财富，成为现代殖民主义的主要堡垒；同时，揭露了美国新殖民主义的本质。然后论证了美国帝国主义不仅在兼并经济不发达国家方，而且在兼并经济发达的帝国主义国家方面，也达到了最大的规模。文章的最后从对外掠夺的角度，分析了美国帝国主义推行侵略政策和战争政策的，源，揭露了美国帝国主义所以成为侵略和战争的主要力量，最根本的一个重要原因是它为了保障美国垄断资本对外扩张和维护它的新殖民主义利益。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"217b9b8b25"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
