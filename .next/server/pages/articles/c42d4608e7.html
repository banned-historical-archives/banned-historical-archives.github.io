" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"向毛主席请罪","authors":["北京工农兵体院毛泽东主义兵团赴党校调查组"],"dates":[{"year":1967,"month":1,"day":23}],"is_range_date":false,"parts":[{"text":"向毛主席请罪","type":"title"},{"text":"北京工农兵体院毛泽东主义兵团赴党校调查组","type":"authors"},{"text":"我们是北京工农兵体育学院毛泽东主义兵团赴党校调查组。我们以万分沉痛的心情，向我们最最敬爱的领袖毛主席请罪。向高级党校《红旗》战斗队及全体革命同志赔礼道歉。我们从1月19日来到党校，名义上是作调查，实际上是带着框框进校，没有认真地全面地进行调查研究，偏听偏信，支持了“红战团”这个反动组织，被一小撮别有用心的人所利用。他们的流言蜚语，恶意诽谤，又正好迎合了我们思想中形“左”实右的思潮。我们站在错误的立场上，转抄了清华的大字报，自己也写了矛头指向革命左派的大字报，打击了坚持正确路线的李广文同志和《红旗》战斗队。尤其严重的是，在没有征得兵团总部及全体战士同意的情况下，就以兵团名义参与发起了“调查康生问题联络委员会”，并发出了一个反动的公告，炮打了无产阶级司令部，给党、给人民、给无产阶级文化大革命带来了严重的损失。在此，我们再一次向同志们请罪，我们愿意接受同志们的严厉批判。","type":"paragraph"},{"text":"毛主席教导我们：“共产党人必须随时准备坚持真理，因为任何真理都是符合于人民利益的。共产党人必须随时准备修正错误，因为任何错误都是不符合于人民利益的。”我们决心遵循毛主席的教导，修正错误，向真理投降！","type":"paragraph"},{"text":"我们在哪里摔倒，一定要在哪里爬起来。我们一定用实际行动回到毛主席的革命路线上来，誓死捍卫毛主席的革命路线，把无产阶级文化大革命进行到底！","type":"paragraph"},{"text":"在此，我们并作以下几点声明：","type":"paragraph"},{"text":"1、《调查康生问题联络委员会》是炮打无产阶级司令部，攻击康生同志的反动组织。因此，我们坚决退出并决心把它彻底砸烂！","type":"paragraph"},{"text":"2、我们向党校的革命组织《红旗》战斗队赔礼道歉，诚恳接受你们的严厉批判，坚决支持你们的革命行动！","type":"paragraph"},{"text":"战无不胜的毛泽东思想万岁！","type":"paragraph"},{"text":"我们最最敬爱的领袖毛主席万岁！万万岁！","type":"paragraph"},{"text":" 北京工农兵体院毛泽东主义兵团赴党校调查组","type":"paragraph"}],"comments":[],"origin":"《体育战线》(增刊)，1967年1月23日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"康生","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c42d4608e7"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
