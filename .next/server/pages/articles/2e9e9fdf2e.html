script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"朱总司令故乡的烈属和军属向毛主席朱总司令报告生活情况","authors":[],"dates":[{"year":1951,"month":8,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"朱总司令故乡的烈属和军属"},{"type":"paragraph","text":"向毛主席朱总司令报告生活情况"},{"type":"paragraph","text":"亲爱的毛主席、朱总司令："},{"type":"paragraph","text":"我们都是贫苦的农民。我们的子弟有的在一九三三年参加了红军，有的在抗日时期偷偷跑到延安参加了八路军，有的是被蒋匪军抓去当兵而在解放战争中被解放后参加解放军的，有的是解放后为了保家卫国而光荣参军的。在庆祝人民解放军“八一”建军节的时候，我们心中真有说不出的高兴。回想过去地主、伪乡保人员剥削压迫得我们好苦啊！逼租、逼押、拉壮丁，逼得我们气也喘不过来。红军家属更是饱受了蒋匪军的各种欺压迫害。解放后，一切都变了样子了。我们不但伸直了腰，而且受到了广大群众一致的尊敬。各种大小节日，人民都来慰问。春节时，人民政府代表和群众带着礼物和光荣牌，来给我们拜年。区长一看见我们就要问：生活上生产上有没有困难？村上代耕工作做得怎样？军队中的子弟有没有来信？这些在过去谁也没有来问过。发救济粮和农贷时，总是优先照顾我们。特别困难的还给发优待粮。如送了两个儿子参军的朱梁氏老太婆就领到西南军区发的两次优待粮，一次大米三百斤，一次二百七十斤；她又领到县上发的两次优待粮，每次都是八十斤。一家人的生活也就可以过了。群众还热心的帮我们解决困难。彭显忠的母亲去世时，邻近农民就帮助安葬。潘长清脚上生了病，代耕队就帮他把田薅了。同院住的代耕队员潘明雁、潘明志还帮他担水。我们缺牛缺农具，群众争着供给我们用。缺肥料种籽时政府又优先贷给我们。由于大家的帮助，今年我们的庄稼长得很好。虽然前几月这里下过冰雹，遭过天旱，起过虫害，但是这些都没有难着我们。我们的庄稼仍栽插完，没有缺窝。"},{"type":"paragraph","text":"毛主席、朱总司令：感谢你们的领导教育，使我们的子弟在军队中学得很多本领。像朱书籙的孩子朱香南，过去一字不识，现在已认得一千多字了。我们的子弟都能亲笔写信回来。这是多大的变化啊！他们在信里常说首长、同志像父兄一样关怀他们。他们说一定要为消灭蒋匪帮，打垮美帝国主义的侵略，巩固国防而奋斗。我们也写信嘱咐他们努力前进，不要念家。家里一定做好庄稼，支援他们。现在我们已普遍订立了爱国公约和增产捐献计划。如朱代印提出要从增产中捐献十斤皮棉、二十斤黄谷。他妻子朱吴氏也提出要保证喂好猪，努力纺纱，积极支援前线。"},{"type":"paragraph","text":"毛主席、朱总司令：我们保证我们的爱国公约条条作到。我们要勉励我们的子弟人人当英雄。我们自己也一定要保持住“光荣之家”的称号。"},{"type":"paragraph","text":"敬祝   你们身体健康"},{"type":"paragraph","text":"川北仪陇县马鞍场琳琅村全体烈、军属敬上"},{"type":"paragraph","text":"七月二十五日  （新华社）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2e9e9fdf2e"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
