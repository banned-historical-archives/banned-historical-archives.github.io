script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"梁山泊出新英雄  宋江支队孙班长率队击退进犯军  侵陷区人民不愿做奴隶  夜袭济宁市捉拿还乡团","authors":[],"dates":[{"year":1946,"month":11,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"梁山泊出新英雄"},{"type":"paragraph","text":"宋江支队孙班长率队击退进犯军"},{"type":"paragraph","text":"侵陷区人民不愿做奴隶"},{"type":"paragraph","text":"夜袭济宁市捉拿还乡团"},{"type":"paragraph","text":"【本报冀鲁豫前线记者团十六日电】蒋军侵占郓城、济宁后，历代不甘做任何暴君独裁者奴隶的梁山泊人民，英勇拿起武器，组成了运河支队与宋江支队，随时随地打击敌人。十一月五日清早，蒋家嫡系十一师三百多人，赶着几匹驮美国炮的大马，由堤南摇摆着走过来，守卫着河堤的宋江支队班长孙进贤，早就看准了敌人。他命令另外三个队员分散到刘楼庄、小马楼等三个小村，他自己伏在刘口的正面。蒋军慢慢的爬上大堤，孙进贤从正面打了第一枪，三个村子的枪也一齐打过来，吓得蒋军伏在堤上不敢抬头。后来拉着四个伤员窜回去了。正如孙进贤所料，十分钟后蒋军的大炮、机枪，一阵一阵的齐轰起来，但再没有一个敢爬上大堤，直到中午收兵回营。济宁的蒋特武装“还乡团”，由市内移到南关，在关里勒索商家，抢掠住户，更猖狂的是捕杀所谓“暗八路”。在“不让他残害咱家弟兄”的口号下，济宁民兵组成的运河支队，在十月九号的夜里，悄悄的进入南关，支队里的任大队副把两挺机枪安放在运河的南岸，对准城里，使蒋军不敢走出一步，任大队副带领着几个队员，爬上“还乡团”的大楼，十几个“还乡团”员被抓了出来，然后把报纸和宣传品递进各处的门窗里。东方亮了，他们带着俘虏离开了济宁。“八路军并没走，迟早总要找点事的。”南关的“还乡团”，第二天全都缩回城里去了。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4828389d4b"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
