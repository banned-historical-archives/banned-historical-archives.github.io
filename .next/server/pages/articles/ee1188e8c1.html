script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji18","name":"毛泽东全集第18卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji18.pdf"],"article":{"title":"关于宪政问题","alias":"","parts":[{"type":"paragraph","text":"关于宪政问题"},{"type":"paragraph","text":"（1944年3月1日）各中央局、中央分局，并转各区党委："},{"type":"paragraph","text":"关于宪政问题：（一）在国际国内形势逼迫及舆论要求下，国民党不得不于十一中全会\"允许于抗战结束后一年内实行宪政，并允许各地在其种种限制下讨论宪政问题。虽其目的在于欺骗人民，借以拖延时日，稳固国民党的统治，但是只要允许人民讨论，就有可能逐渐冲破国民党的限制，使民主运动推进一步。（二）中央决定我党参加此种宪政运动，以期吸引一切可能的民主分子于自己周围，达到战胜日寇与建立民主国家之目的。（三）除我党代表已参加重庆方面国民党召集的宪政协进会会议外，延安亦已举行宪政座谈会。各根据地亦可于适当时机举行有多数党外人士参加的座谈会，借以团结这些党外人士于真正民主主义的目标之下。并向党内干部说明党对宪政运动的政策，防止过左过右的偏向，检查“三三制”执行情形，力求巩固与非党人士的民主合作。"},{"type":"paragraph","text":"中央政治局三月一日"}],"authors":["毛泽东"],"dates":[{"year":1944,"month":3,"day":1}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":329,"page_end":329},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ee1188e8c1"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
