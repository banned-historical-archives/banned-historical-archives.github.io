<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"《农村工作情况简报》第101号附件","authors":["中共四川省委农村工作部办公室"],"dates":[{"year":1961,"month":2}],"is_range_date":false,"parts":[{"text":"《农村工作情况简报》第101号附件","type":"title"},{"text":"中共四川省委农村工作部办公室","type":"authors"},{"text":"乐山县棉竹公社第二管理区当前生产、生活上的几个情况","type":"subtitle"},{"text":"（一）生产方面：今年小春粮食播种1690亩，每人平均9.6分，比去年实收面积多68%，其中小麦多52%。油菜栽种176亩。每人平均1分，比去年少27.6%。正式耕地和田边地角都已种满，部分坟坝也种上了粮食。但据互助、解放两生产队调查，小麦有4%的虚数，油菜有13%因生长太坏已经改种。","type":"paragraph"},{"text":"目前，小麦生长普遍比去年好，油菜则不如去年。","type":"paragraph"},{"text":"小麦，由于面积扩大。种了一部分瘦土、湿田，据互助、解放两人调查，共占小麦面积的38%；另有10%左右种得较晚（12月1日），才生起来。油菜，早育的苗子因病大都死去，栽的不多，80%以上都是11月中旬点播的，还未定亩，并有30%的缺窝；由于点种迟，好田大部被小麦占去，种在坏地里的较多（约25%）。部分干部和群众对坏地迟种的油菜缺乏信心，一般种时就套上胡、豌豆，管理不好，目前生长较差。现在小麦翻黄的约占10%。油菜翻黄的约占40%，现在急需追肥。但目前肥料很缺，现有肥料一般只够小麦、油菜追头道，管理区已在积极想法解决。","type":"paragraph"},{"text":"（二）生猪方面：最大的问题是缺乏饲料。目前烂红苕、红苕皮、菜等都搞成代食品人吃了，猪吃的是青草、粗谷壳糠、沼水，而且数量也少。互相生产队第二养猪场，27头猪，每天只有150斤青草，80斤粗谷壳糠（实际未吃，都堆在槽里），和两三斤干苕叶，平均每头只有6斤。顺江生产队母猪饲养场，26号晚上一头母猪生了9头小猪，因无精料（如黄豆）喂母猪，母猪无奶，次日9头小猪全部死亡。防寒设备一般搞的不好。猪只仍在继续死亡。全管理区12月13号有猪462头，24号减为423头，28号再减为407头（50-80斤的26头，再大的没有），15天下降12%。柴火很缺，刀、锅、桶、铲、瓢等饲养工具也不够。饲养员很多不安心，不愿继续干下去。","type":"paragraph"},{"text":"（三）群众生活方面：社员口粮按每人每天半斤贸易粮计算，可以吃到元月底，但目前普遍烂红苕（已烂2万斤，占现有口粮的20%左右），这就影响了口粮。烂的红苕，通过磨细后混上一些菜、盐，仍然当饭吃，现在还没有发现什么副作用。蔬菜一般长得很好，但现有的菜不多，互助、解放两个生产队，平均每人还不到一分。现在每人每天吃菜1.5斤到2斤，到旧历年后就要缺菜。目前群众意见较多的有下面几个问题。","type":"paragraph"},{"text":"（1）缺盐。现在吃菜多，每人每月供应一斤盐不够，群众要求增加半斤。社员家里做盐菜（每户每月要半斤左右）。猪、牛也要吃点盐（每头每月2两），但都没有供应。特别是每人每月供应的1斤，现在也不保证（12月份差11%，11月份也没买够），群众意见较大。","type":"paragraph"},{"text":"（2）缺灯油。现在社员家里不供应，每个食堂每月供应1.5斤煤油（有时不能保证）。社员晚上吃饭、睡觉、带小孩都很不方便。尤其妇女意见大，每次开会都要提这个问题。","type":"paragraph"},{"text":"（3）缺线。现在买不到线，缝补成问题，妇女的意见也大。","type":"paragraph"},{"text":"（4）缺柴。各食堂都没有存柴，过雨季成问题。现在每个食堂都固定了三、四个人打柴，以后可望好转。（下缺）","type":"paragraph"}],"comments":[],"origin":"四川省某档案馆","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"dd26241688"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
