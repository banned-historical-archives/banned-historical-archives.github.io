script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"抓好学习、批判　推动各项工作上丝七厂在反击右倾翻案风斗争中提前完成首季度任　　益民食品三厂职工狠批“三项指示为纲”，促进生产不断发","authors":[],"dates":[{"year":1976,"month":3,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　上海第七丝织厂的广大干部和工人，遵照毛主席“抓革命，促生产”的伟大方针，狠批党内那个不肯改悔的走资派抛出的“三项指示为纲”的修正主义纲领，进一步激发了革命热情和社会主义积极性，以大学大批推动大干，提前十一天全面完成今年第一季度生产计划。"},{"type":"paragraph","text":"在党总支的领导下，全厂先后举办了十余次学习班，职工们上班拼命干、班前班后狠狠批，用大学大批带动了大干。尽管今年产品品种翻改面大，原料变化多，劳动力和设备比较紧，再加一些过去从没有过的困难，但广大职工满怀战斗必胜的信心，坚持与党内那个不肯改悔的走资派斗，与生产中的困难斗，争分夺秒，忘我劳动。"},{"type":"paragraph","text":"这个厂的干部和工人在大学大批促大干中，还十分注意抓好质量、品种和技术革新。二月份，全厂质量指标创历史最好水平。他们大挖设备潜力，还增产了一批少数民族特需的花软缎、市场上大量需要的绉类真丝产品和一些提花真丝织物等产品。他们针对生产中的薄弱环节，在准备车间进行革新络丝大卷装、牵经三自停等项目，力织车间也将在年内全面推广织绸座车化。　(本报通讯员)"},{"type":"paragraph","text":"本报讯　上海益民食品三厂党总支带领广大工人坚持以阶级斗争为纲，狠批党内那个不肯改悔的走资派抛出的“三项指示为纲”的修正主义纲领，正确处理革命和生产的关系，超额完成了今年一、二月份国家生产计划，三月上旬又比去年同期增长百分之三十四。与此同时，还提前完成面粉塔等九个重大技术革新项目。"},{"type":"paragraph","text":"今年这个厂的生产任务重，但场地小，设备老，劳动力紧张。该厂党总支遵照毛主席关于“阶级斗争是纲，其余都是目”的教导，带领干部带头学，带头揭，带头批，带头反击右倾翻案风。到目前为止，全厂已举办各种类型的学习班五十一期，车间、班组普遍召开了批判会，掀起了群众性的大学习、大批判热潮。厂党总支领导成员还深入车间班组，和工人群众一起劳动，一起学习革命理论，发动群众以反击右倾翻案风为强大政治动力，大搞技术革新。在集中力量攻下共可储藏面粉六十吨的三座散装面粉储藏塔的会战务中，许多工人和技术人员展发扬了“可上九天揽月，可下五洋捉鳖”的革命精神和不计时间、不讲报酬的共产主义风格。广大工人通过批判党内那个不肯改悔的走资派，坚持以阶级斗争这个纲，发扬自力更生、艰苦奋斗的革命精神，及时解决了许多关键问题。"},{"type":"paragraph","text":"由于实现了三座面粉储藏塔这一技术革新，使饼干车间面粉进料达到了管道化、自动化和电气化。这样，每年就能为国家节约新布十一万米，节约包装费用二十七万元，节约粮食四万八千斤，还节约了劳动力十二人，既提高了食品的卫生质量，又改善了劳动条件。"},{"type":"paragraph","text":"(本报通讯　员)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"name":"革命大批判","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3f9a7df050"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
