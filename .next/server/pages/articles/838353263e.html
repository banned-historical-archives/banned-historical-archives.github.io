" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"我区上思县与广东钦县互相配合，全歼一大股土匪","authors":["上思县公安局　何席重"],"dates":[{"year":1961,"month":3,"day":25}],"is_range_date":false,"parts":[{"text":"我区上思县与广东钦县互相配合，全歼一大股土匪","type":"title"},{"text":"上思县公安局　何席重","type":"authors"},{"text":"我区上思县公安局和广东省钦县配合作战，于2月17日全歼以广东反革命分子曾文基为首的“中华农民志愿军”一股武装土匪。击毙匪司令曾文基和匪骨干分子高斗团，活捉匪付司令高月行、黄雄威，匪参谋长黄瑞熙等骨干分子22名及匪徒21名，缴获步枪3支，子弹136发，手榴弹6个，尖刀4把，匪“中华农民志愿军”等反动印信2枚，以及其他物资罪证等。","type":"appellation"},{"text":"反革命分子曾文基，1955年就因参加反革命案被判劳改。刑满释放后，不但没有痛改前非，而且再次逃跑上山进行反革命活动。1960年10月间，该匪利用两广结合部的山区，纠合一帮逃跑上山为匪的反、坏分子，组织武装土匪，活动于广东省钦县和我区上思县公正公社等地区，进行造谣煽动，积极收集武器，抢劫国家和人民财产，前后共抢我粮食仓库6个，抢去稻谷16249斤，抢杀耕牛13头、生猪5头，抢去民兵枪2支、子弹4发，曾一度严重地扰乱了社会治安。","type":"appellation"},{"text":"自今年元月19日起，我区上思县和广东省钦县互派武装共同进行侦察围剿，至2月17日止，该股土匪已被全部歼灭。除击毙和活捉的外，敌人在“坦白从宽，抗拒从严”的政策感召下，先后共有10名向我坦白自首；受骗的46名群众，也在群众大会上报上当和揭发检举，并表示今后要擦亮眼睛，提高警惕，不再上敌人的当，保证遵守政府法令，努力生产。","type":"appellation"}],"comments":[],"origin":"《广西公安》 1961年第 5期，1961年3月25日。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"838353263e"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
