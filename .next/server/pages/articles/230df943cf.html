script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"保加利亚隆重纪念季米特洛夫  托多罗夫严斥南共修正主义者  认为他们扮演着阶级敌人内奸的角色","authors":[],"dates":[{"year":1958,"month":6,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"保加利亚隆重纪念季米特洛夫"},{"type":"paragraph","text":"托多罗夫严斥南共修正主义者"},{"type":"paragraph","text":"认为他们扮演着阶级敌人内奸的角色"},{"type":"paragraph","text":"新华社索非亚17日电　保加利亚共产党中央委员会、祖国阵线全国委员会和保加利亚共产党索非亚市委员会17日晚在这里举行隆重集会，纪念保加利亚人民的领袖和导师季米特洛夫七十六周年诞辰。"},{"type":"paragraph","text":"保加利亚党政领导人日夫科夫、于哥夫等出席了纪念会。"},{"type":"paragraph","text":"保共中央书记托多罗夫在会上作了报告。他在报告中详细地谈到了季米特洛夫无限忠于人民、忠于社会主义和无产阶级国际主义原则的精神，并且严正地批判了南斯拉夫共产主义者联盟的纲领。他说，帝国主义分子非常仇视社会主义阵营和国际工人运动所取得的巨大成就，他们正在千方百计地企图破坏我们的团结和削弱我们的队伍。在国际工人运动中，现代修正主义者扮演着阶级敌人内奸的角色。现代修正主义在南共第七次代表大会所通过的纲领中得到了最明显的表现。"},{"type":"paragraph","text":"托多罗夫说，我们的党是由布拉戈耶夫和季米特洛夫教导和锻炼出来的，它同任何修正主义分子和任何歪曲马克思主义的企图始终是不调和的。到目前为止，我们党的历史证实了这一点，不久前闭幕的保共第七次代表大会又特别有力地表明了这一点。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"230df943cf"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
