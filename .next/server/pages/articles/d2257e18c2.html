script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"戴高乐总统电谢刘少奇主席对法国国庆的祝贺","authors":[],"dates":[{"year":1964,"month":7,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"戴高乐总统电谢刘少奇主席对法国国庆的祝贺"},{"type":"paragraph","text":"新华社二十日讯　中华人民共和国主席刘少奇接到了法国总统戴高乐的一份电报，电报感谢他对法国国庆的祝贺。电报全文如下：北京中华人民共和国主席刘少奇先生阁下："},{"type":"paragraph","text":"在法国国庆的时候，承蒙阁下来电祝贺，使我极为感动。我谨向阁下表示衷心的谢意和最良好的祝愿，祝阁下本人幸福，并祝中国人民有一个幸福的前途。我诚挚地祝愿，我们两国之间建立外交关系，将有助于增进我们两国人民之间的传统的友好联系。"},{"type":"paragraph","text":"夏尔·戴高乐"},{"type":"paragraph","text":"一九六四年七月十六日于巴黎"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"刘少奇","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d2257e18c2"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
