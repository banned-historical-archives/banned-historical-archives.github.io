script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"越人宁死不作奴隶决定浴血斗争胡志明发表宣言称","authors":[],"dates":[{"year":1946,"month":12,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【联合社西贡廿三日电】　越南人民共和政府主席胡志明于上星期四战事发作后，即率领政府官员逃至河内东北十五哩之巴宁。昨日首次发表宣言，谓越南人民宁死不为奴隶，决定长期浴血斗争，争取自由，“二千万越南人最后必能歼灭十万反动份子”。胡氏以发动战争之责任，归之于法国当局在北圻南圻大捕人民，施行恐怖政策，并指责法军以飞机轰炸妇孺。"},{"type":"paragraph","text":"【合众社巴黎廿三日电】　此间维明代表团顷向报界发表宣言称:倘法国欲以武力与维明进行谈判，则将遭遇维明二千万男女人民之反抗，决与保障国族之自由而与之作战。但吾人并不愿作战，吾人需要协定中所订定之和平，故法国倘能遵行此项协定，则吾人当与之议和，吾人相信法殖民部长穆泰特之前往越南，对和平当将有所努力，此乃白鲁姆之社会党内阁欲获与互相谅解之表现云。"}],"comments":[],"origin":"联合社,合众社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"a7631207cc"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
