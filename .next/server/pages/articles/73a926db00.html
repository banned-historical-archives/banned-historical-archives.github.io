<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"把活学活用毛泽东思想放在第一位——《中国青年报》元旦社论摘要","authors":[],"dates":[{"year":1966,"month":1,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"把活学活用毛泽东思想放在第一位"},{"type":"paragraph","text":"——《中国青年报》元旦社论摘要"},{"type":"paragraph","text":"我国人民和青年，高举着毛泽东思想的伟大红旗，满载社会主义革命和社会主义建设的巨大成果，充满信心地跨进了一九六六年。"},{"type":"paragraph","text":"在新的一年，党和人民对青年一代寄托着很大希望。我国青年要完成党交给的光荣而艰巨的任务，最根本的就是要突出政治，活学活用毛主席著作，在毛泽东思想的指引下，以阶级斗争、两条道路斗争为纲，积极参加阶级斗争、生产斗争和科学实验三大革命运动，为完成第三个五年计划作出贡献，在斗争中实现思想革命化。"},{"type":"paragraph","text":"毛泽东思想，是我们完成一切任务最强大的思想武器。突出政治，就是突出毛泽东思想。掌握了毛泽东思想，在帝国主义和一切反动派面前，就无所畏惧，战无不胜；掌握了毛泽东思想，在生产建设中，就可以敢于革新，敢于创造，多快好省地完成任务。"},{"type":"paragraph","text":"每个青年，只有学习和掌握毛泽东思想，才能实现思想革命化，保证永远革命，永不变质。过去一年中，我国青年的思想革命化出现了新的高涨，就是用毛泽东思想武装了头脑，在三大革命运动中锻炼的结果。王杰所以能一不怕苦，二不怕死，一心为革命，就是因为他做到了“毛主席怎样说的，我就怎样做”。中国女子乒乓球队就是由于学了毛主席著作，振奋了敢于斗争敢于胜利的革命精神，才在第二十八届世界乒乓球锦标赛中“翻了身”。因此，在新的一年中，我们必须把活学活用毛泽东思想放在第一位，更广泛更深入地开展学习毛主席著作的运动，在革命实践中，用毛泽东思想指导行动，用毛泽东思想解决实际斗争中的问题。"},{"type":"paragraph","text":"突出政治，学习毛泽东思想，归根到底是为了闹革命，革客观世界的命，革主观世界的命，把改造客观世界和改造主观世界紧密结合起来。如果学归学，做归做，互相不沾边，那就不但谈不上学好毛主席著作，而且根本违背了毛泽东思想。所以，我们学习毛主席著作，一定要切实在“用”字上下功夫，落实到革命两个字上，敢于同帝国主义、现代修正主义和一切反动派作斗争；敢于同国内阶级敌人和破坏社会主义事业的坏人坏事作斗争；敢于改天换地，改造大自然；敢于同资产阶级思想决裂，进行严格的自我思想革命，在改造客观世界的斗争中改造主观世界。"},{"type":"paragraph","text":"学习毛主席著作，落实到革命行动上，就是要落实到准备对付美帝国主义的侵略上。我们要学习毛主席关于人民战争的思想，关于帝国主义是纸老虎的论断，树立起仇视美帝、鄙视美帝、蔑视美帝的思想。同时，要努力锻炼身体，学习军事技术，开展军事体育活动，发扬一不怕苦，二不怕死的革命精神，做到能文能武，随时做好准备，一旦祖国需要，立即响应召唤。"},{"type":"paragraph","text":"学习毛主席著作，落实到革命行动上，就是要落实到积极参加国内阶级斗争中去。社会主义时期，存在着阶级斗争，存在着两条道路斗争。我们要学习毛主席关于社会主义时期阶级、阶级矛盾、阶级斗争和社会主义与资本主义两条道路斗争的理论，参加社会主义教育运动，参加意识形态领域的阶级斗争，兴无产阶级思想，灭资产阶级思想。"},{"type":"paragraph","text":"学习毛主席著作，落实到革命行动上，就是要落实到完成第三个五年计划上去。我们要学习毛主席关于自力更生、奋发图强、艰苦奋斗、勤俭建国的指示，坚决贯彻社会主义建设总路线，鼓足干劲，力争上游。我们要发扬大庆、大寨精神，树立雄心壮志，把革命干劲和科学态度结合起来，在各个战线上，做到有所发现，有所发明，有所创造，有所前进，为第三个五年计划贡献最大的力量。"},{"type":"paragraph","text":"为了带领青年完成新的伟大任务，共青团的工作必须进一步实现革命化。团的工作的革命化，首先要求团干部思想革命化。团的干部要跟上形势，力争主动，振奋革命的精神状态。这种革命精神状态，应当是：以毛泽东思想挂帅，处处讲政治，把活学活用毛主席著作放在一切工作的首位；应当是在一切工作中贯彻革命两个字，要敢于改变现状，坚决支持革命的新事物，要用最大的力量去抓典型，表扬先进；应当是有雷厉风行和扎扎实实的工作作风。要充分走群众路线，充分做调查研究，不断地总结经验，把我们的工作做得更加活跃，更加实在，更加生气勃勃。"},{"type":"paragraph","text":"让我们在新的一年里，更高地举起毛泽东思想红旗，把毛主席著作学得更好，用得更好，充当实现第三个五年计划的突击队，为中国革命和世界革命做出更大的贡献！"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"人民战争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"73a926db00"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
