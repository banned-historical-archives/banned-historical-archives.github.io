script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"希尔同志离京回国姚文元、耿飚同志等前往机场欢送","authors":[],"dates":[{"year":1971,"month":12,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社北京四日电　澳大利亚共产党(马克思列宁主义)主席爱·弗·希尔同志结束了在北京的访问，于二日乘飞机离开北京经广州回国。"},{"type":"paragraph","text":"中共中央政治局委员姚文元同志，中共中央委员、中共中央对外联络部部长耿飚同志，和有关方面负责人任允中、申健、冯铉、朱达成、邢竹芳、林棠等同志，前往机场欢送。"},{"type":"paragraph","text":"中共中央对外联络部有关方面负责人李肖白同志陪同希尔同志前往广州。"},{"type":"paragraph","text":"希尔同志在北京期间曾访问了北京石油化工总厂、北京医学院第三附属医院、北京体育学院，并参观了在无产阶级文化大革命期间出土的历史文物。希尔同志所到之处，受到了革命群众的热烈欢迎。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"姚文元","type":"人物"},{"name":"耿飚","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b8cf710362"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
