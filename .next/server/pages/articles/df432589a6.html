script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"日本《毛泽东思想月刊》回顾一九七三年大好形势  各国人民斗争洪流在天下大乱中滚滚向前  不容美苏两个超级大国随心所欲地瓜分和统治世界","authors":[],"dates":[{"year":1974,"month":1,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"日本《毛泽东思想月刊》回顾一九七三年大好形势"},{"type":"paragraph","text":"各国人民斗争洪流在天下大乱中滚滚向前"},{"type":"paragraph","text":"不容美苏两个超级大国随心所欲地瓜分和统治世界"},{"type":"paragraph","text":"新华社东京一九七四年一月四日电　日本《毛泽东思想月刊》一九七四年一月号登载的“卷头语”回顾了一九七三年的大好形势。这篇文章说：“一九七三年真是个‘天下大乱’的一年。无论是西方还是东方，一点稳定的形势也看不到。”"},{"type":"paragraph","text":"文章说：“‘大乱’中有陈腐的灭亡、新生的兴起这样两股鲜明的潮流。这一年的世界形势雄辩地证明我们正处于列宁曾经说过的"},{"type":"paragraph","text":"‘帝国主义是无产阶级社会革命的前夜’这个时代之中。”文章指出，当前美、苏两个超级大国的争霸在继续进行着。然而，社会主义国家的存在和发展、第三世界的成长及其抵抗的高涨，已经不容它们随心所欲地瓜分和统治世界。国家要独立，民族要解放，人民要革命的世界历史潮流，已经成为任何人也阻挡不了的滚滚洪流。"},{"type":"paragraph","text":"文章在谈到要对美帝国主义保持警惕并继续同它斗争以后着重指出，“新的帝国主义即苏联社会帝国主义的扩张欲及其掠夺资源的活动今天已遍及全世界。”“十多年来，苏联的特权统治阶级疯狂地扩充军备，追求利润，残酷地搜刮人民，以致国内生产停滞，通货膨胀和商品匮乏变成慢性病，连粮食都不能自给。因此，勃列日涅夫不顾体面，向美国等西方国家乞求贷款，引进外国的资本和技术，千方百计想以开发丰富的国内资源来解除燃眉之急。然而，‘失道寡助’。它所到之处，都因穷凶极恶而暴露了贪婪本质，遭到发展中国家的反对，引起西方国家的警惕，没有能够取得它预期的成果。如今，军事大国苏联由于迫在眉睫的经济危机和苏联人民的不满日益增强而胆战心惊。在第三世界人民的觉醒和斗争的高涨中，它已日趋孤立。”"},{"type":"paragraph","text":"文章指出，苏联社会帝国主义“为扩张权利而拚命四出活动。这决不是强大的表现，而只是内部腐败、危机加深和虚弱的表现。”文章说，必须更加有效地揭露它的凶恶而阴险的本质。"},{"type":"paragraph","text":"文章还说：“社会主义国家、发展中国家、全世界被压迫民族和被压迫人民的斗争在全世界范围内空前发展着。社会主义国家、发展中国家、全世界被压迫民族和被压迫人民通过自己的斗争，分别巩固了各自争取新的飞跃的基础，同帝国主义、社会帝国主义、所谓先进工业国家的工人阶级和人民群众的斗争相呼应，朝着光辉灿烂的未来迎接新年。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"name":"世界形势","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"df432589a6"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
