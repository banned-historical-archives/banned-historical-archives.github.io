" crossorigin="">{"props":{"pageProps":{"books":[{"id":"yaowenyuan","name":"姚文元文录","internal":false,"type":"pdf","official":false,"author":"姚文元","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/姚文元文录.pdf"],"article":{"title":"姚文元1976年4月5日有关天安门事件的日记","parts":[{"type":"title","text":"姚文元1976年4月5日有关天安门事件的日记"},{"type":"paragraph","text":"姚文元"},{"type":"paragraph","text":"下午二时，政治局紧急开会，人民（天安门）广场上发生了赤裸裸的反革命煽动，反革命暴动事件，打了解放军烧了汽车，打了民警，打了革命群众，并且冲到人民大会堂东门。"},{"type":"paragraph","text":"一批人在纪念碑进行反革命煽动，号召成立反革命组织，以“悼念”总理为名，猖狂地把矛头指向伟大领袖毛主席，指向中央，提出要邓小平上台，喊“总理万岁！”"},{"type":"paragraph","text":"一个有组织、有计划的反革命阴谋越来越露骨。"},{"type":"paragraph","text":"其中提到反击右倾翻案风是“一小撮野心家”搞的，邓小平主持工作是他们“决定性胜利”。听了这个情况，我提出此事已带有反革命政变性质，要立即采取措施，开短会，不要多议。当即决定：由吴德发表讲话，指出这是反革命性质事件，号召群众离开广场，然后立即组织民兵进行包围、分割后拘留其骨干分子，予以有力打击。"},{"type":"paragraph","text":"三时散会，我先到人民大会堂厅外，看见了广场全景，四大批人拥来拥去，两堆火还在历史博物馆外燃烧。我即请政治局同志都上来看一看，在江西厅，大家都来了。这是触目惊心的反革命事件，一场匈牙利反革命事件的前奏。碑前核心部分有一批坏蛋始终不动，谁去反对就打谁，另有一伙人进行反革命演说，送花圈、贴传单。外面有好几万人，流来流去。再外面有一批骑脚踏车的人飞快地来回巡逻，看来是通风报信的。还有不少小汽车，有不少是部队的。不一会，解放军营房的小楼着火了，又一辆车着火了，火光熊熊，黑烟冲天。于是，看见楼上把被子、床单、衣服、书箱、纸张一批一批地从窗口掷了出来，掷到火中去烧。救火车无法接近。"},{"type":"paragraph","text":"望远镜中，看见有一个家伙爬上纪念碑放了一个大花圈，用绳子把它围起来。政治局同志看到这一切，无不仇恨满腔，阶级斗争是这样尖锐，这已经是武装暴乱性质了！"},{"type":"paragraph","text":"大喇叭还不响，我们很急，一再查问。华国锋要求王洪文、张春桥、我留下来处理。我同意。终于，在六时二十五分，人民广场的大喇叭一响，立即看见广场上的大多数人潮水一样一批又一批向外退去，不到一小时，广场上人已大为减少，看热闹的走了，核心部分就越来越暴露在面前。"},{"type":"paragraph","text":"九点二十五分，民兵开始行动。"},{"type":"paragraph","text":"一小撮反革命分子在无产阶级专政威力下迅速被击溃。带着棍子的民兵雄赳赳、气昂昂地开进广场，从南北两方面加以包围，敌人彻底瓦解了。"},{"type":"paragraph","text":"晚，政治局开会听汇报。战果辉煌。抓住了二百多人，放了一些之外，还留下一百多人，突击审查。"}],"authors":["姚文元"],"dates":[{"year":1976,"month":4,"day":5}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":863,"page_end":864,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"姚文元","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f6a0ab416a"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
