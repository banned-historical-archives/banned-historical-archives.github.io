script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"毛泽东关于通报中国共产党全国代表会议情况和征求对我国第一个五年计划的意见给赫鲁晓夫的信","authors":[],"dates":[{"year":1955,"month":4,"day":5}],"is_range_date":false,"parts":[{"text":"毛泽东关于通报中国共产党全国代表会议情况和征求对我国第一个五年计划的意见给赫鲁晓夫的信","type":"title"},{"text":"一","type":"subtitle"},{"text":"尚昆同志：","type":"appellation"},{"text":"五年计划，陈、邓两个报告，我的开幕词，少奇发言等五件正译成俄文，准备十号送交尤金转苏共中央，请其提意见。请你即于今日为中共中央起草一个致苏共中央的信，于下午交我看。","type":"paragraph"},{"text":" 毛泽东四月五日一时","type":"paragraph"},{"text":"二","type":"subtitle"},{"text":"苏共中央赫鲁晓夫同志：","type":"appellation"},{"text":"中国共产党中央委员会在三月二十一日至三十一日召集了全国代表会议(不是代表大会)，议程为下列三项：(一)关于发展国民经济的第一个五年计划；(二)关于高岗、饶漱石反党联盟；(三)关于成立党的中央和地方监察委员会。","type":"paragraph"},{"text":"关于中国共产党全国代表会议的公报和关于上述三个问题的决议，已在报上发表，想来你们或许已经看到了。现特送上中华人民共和国发展国民经济的第一个五年计划(草案)和陈云同志关于发展国民经济的第一个五年计划的报告，请求你们替我们加以审阅，提出修改的意见。你们的意见希望于六月一日以前通知我们，因为六月间我国要召开全国人民代表大会审查和通过第一个五年计划的纲要，并要公开发表。自然，提向全国人民代表大会审查和公布的计划，不应当和我们送给你们看的这个计划一模一样，有些机密的部分，我们是不准备公开的。亲爱的同志，要求你们看这样麻烦的文件，实在是过分的请求，但是你们的经验比我们多，为了少犯错误起见，还是请你们替我们看一下吧。","type":"paragraph"},{"text":"此外，在我们党的全国代表会议上，还有邓小平同志关于高岗、饶漱石反党联盟的报告，刘少奇同志关于目前国际形势问题的发言和我的开幕词，一并送给你们，作为参考，你们如有兴趣，也可以看一下，如有意见，也请向我们提出。这些都是不公开发表的，刘少奇同志的发言并且是机密的。","type":"paragraph"},{"text":"致以","type":"paragraph"},{"text":"同志的敬礼！","type":"appellation"},{"text":" 毛泽东一九五五年四月六日","type":"paragraph"},{"text":"三","type":"subtitle"},{"text":"亲爱的赫鲁晓夫同志：","type":"appellation"},{"text":"三月二十五日来信收到。对于您的热情的邀请，我表示衷心的感谢。","type":"paragraph"},{"text":"我很愿意能到苏联和同志们聚谈和往各地参观。但因我近日身体有些不舒服，周恩来同志本月内又要出席亚非会议，因此不能成行，待以后再约时间吧。此复。","type":"paragraph"},{"text":"致以","type":"paragraph"},{"text":"同志的敬礼！","type":"appellation"},{"text":" 毛泽东一九五五年四月六日","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"高岗","type":"人物"},{"name":"饶漱石","type":"人物"},{"name":"世界形势","type":"主题/事件"},{"type":"文稿类型","name":"书信"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c9ffca1175"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
