script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"朝鲜内阁盛宴庆祝解放十八周年崔庸健强调高举反帝大旗坚决反对修正主义","authors":[],"dates":[{"year":1963,"month":8,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社平壤15日电】　朝鲜内阁今天晚上在平壤玉流馆举行宴会，庆祝朝鲜解放十八周年。"},{"type":"paragraph","text":"朝鲜党政领导人崔庸健、金光侠、郑一龙、南日、季钟玉、郑准泽、玄武光出席了宴会。出席宴会的还有内阁各相，人民军高级将领，各政党、社会团体负责人以及劳动英雄、千里马骑手们。"},{"type":"paragraph","text":"各国驻朝鲜的外交使节和在平壤的外国客人应邀出席了宴会。"},{"type":"paragraph","text":"朝鲜最高人民会议常任委员会委员长崔庸健在宴会上致词说:“十八年来，朝鲜人民在朝鲜劳动党的领导下，发挥无比的爱国主义忘我精神和创造才能，摆脱了剥削和贫穷，压迫和屈辱，在建设自由、幸福的新社会的事业中，树立了灿烂的业绩。在共和国北半部已经牢固地建立了先进的社会主义制度。曾经是远离技术文明、落后的农业国的我国，已经转变成为具有自己强大的重工业和轻工业的社会主义工业农业国，已经基本上解决了人民的衣、食、住问题。”"},{"type":"paragraph","text":"崔庸健说:“今天，全体人民钢铁般地团结在以金日成同志为首的朝鲜劳动党和共和国政府周围，赞扬着繁荣的社会主义祖国，怀着更大的希望和信心，继续以跨上千里马的气概奋勇前进。整个社会成为一个团结的红色家庭，所有的人都洋溢着劳动和生活的喜悦，所有的人都充满着革命热情和乐观主义精神，为了更加光明的未来进行着斗争，这就是今天的共和国北半部现实。”"},{"type":"paragraph","text":"崔庸健谴责了美帝国主义在南朝鲜的罪行。"},{"type":"paragraph","text":"他在谈到国际形势时说:“对于帝国主义，不能有任何幻想。只有对帝国主义的阴谋活动保持最大的警惕性，团结一切反帝力量，为反对帝国主义，特别是美帝国主义的侵略阴谋活动进行坚决的斗争，才能维护世界和平，实现人类的进步。世界帝国主义和一切反动势力，终会在人民的革命斗争面前灭亡的。”崔庸健说:“朝鲜劳动党和朝鲜人民将继续高举反帝斗争的旗帜，同全世界进步人类一道，为和平、民族独立和社会主义的共同事业，继续进行坚决的斗争。我们党和我国人民，为反对现代修正主义，为维护马克思列宁主义的纯洁性，为维护基于无产阶级国际主义原则的社会主义阵营和国际共产主义运动的团结，将进行更加坚决的斗争。在朝鲜劳动党和金日成同志的领导下，高举马克思列宁主义的革命旗帜前进的我国人民，在自己的正义斗争中必将百战百胜。”"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"世界形势","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2f32c55f7b"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
