script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反对佐藤政府残酷剥削　决心粉碎日美“安全条约”  日本数万铁路工人举行大罢工","authors":[],"dates":[{"year":1969,"month":11,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反对佐藤政府残酷剥削　决心粉碎日美“安全条约”"},{"type":"paragraph","text":"日本数万铁路工人举行大罢工"},{"type":"paragraph","text":"新华社一日讯　据东方通讯社报道：日本“国营铁路”工人几万人，为了反对“国营铁路”当局废除助理司机、增加工人劳动强度的剥削措施，从十月三十一日晚上到一日上午，在全国各地举行了十七小时的大罢工。"},{"type":"paragraph","text":"这是日本“国营铁路”工人继今年四月和五月两次大罢工之后举行的第三次全国大罢工。这次罢工的规模超过了以前两次。"},{"type":"paragraph","text":"“国营铁路”工人们从十月三十一日晚七时开始，在东京、大坂、北海道的室兰、九州的熊本市等地的二百个主要机车库开始举行罢工。工人们斗志昂扬地举行集会，表示要把反对佐藤反动政府的残酷剥削和美日反动派的统治的斗争进行到底。他们振臂高呼：“粉碎反动的‘合理化计划’！”“粉碎日美‘安全条约’！”等口号。"},{"type":"paragraph","text":"罢工工人举行了示威游行，还在各车站的机车库前布置了纠察线，同前来破坏罢工的“国营铁路”的“治安”人员进行了英勇的搏斗。"},{"type":"paragraph","text":"十月三十一日晚上，大约两千名进步学生到“国营铁路”东京品川车站去支持罢工工人的斗争。工人们以雷鸣般的掌声欢迎学生，并且同他们一道举行集会，表示要加强反对日美“安全条约”的共同斗争。"},{"type":"paragraph","text":"佐藤反动政府出动了反动警察来镇压罢工工人，仅在品川车站，就部署了两千名反动警察。但是，在工人和学生的高昂斗志面前，佐藤反动政府镇压罢工的阴谋没有得逞。（附图片）"},{"type":"paragraph","text":"日本工人、学生和市民在东京举行声势浩大的集会，决心粉碎日美“安全条约”和坚决反对佐藤十一月到美国进行反革命活动。"},{"type":"paragraph","text":"新华社发"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8d0a06dee8"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
