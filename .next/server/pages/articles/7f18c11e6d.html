script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"先进社要防止骄气  东方红社反掉右倾自满思想继续前进","authors":["张玉英"],"dates":[{"year":1958,"month":5,"day":6}],"is_range_date":false,"parts":[{"type":"paragraph","text":"先进社要防止骄气"},{"type":"paragraph","text":"东方红社反掉右倾自满思想继续前进"},{"type":"paragraph","text":"本报讯　山西省沁县青修乡东方红农业社通过双反运动，反掉大跃进中的思想右倾、措施保守和劳力、财力浪费之后，烧掉了暮气、骄气，把春耕播种工作推向高潮。"},{"type":"paragraph","text":"东方红社是沁县五个模范社之一。早在去年12月上旬，就订出今年产量翻一番，亩产四百一十三（斤）肥料加一倍，亩施一百担的跃进计划。但是在不久前经过检查了解，各项工作却完成得很差。积肥任务只完成50％，水渠工程完成80％，形成上述状况的原因，是大部分党团员干部，对大跃进认识不足，思想问题没得到解决。一部分人是骄傲自满，一种是认为土地好、河湾地多，不受大灾害，实现亩产四百斤不成问题。另一种认为“咱是好社，只要其它村能达到，咱就也能达到。”忽视对大跃进的领导。另一部分人是右倾保守思想严重，不相信今年能大跃进，由于党员干部是这样子，群众对跃进思想就更复杂了。"},{"type":"paragraph","text":"病根找着以后，住社工作组和党支部，共同作了研究讨论，决定采用以下办法："},{"type":"paragraph","text":"1、由党内到群众进行了大跃进重要意义的宣传教育工作，并通过检查评比，清醒了所有党团员的头脑，也教育了广大社员。"},{"type":"paragraph","text":"2、组织参观，介绍了南王社落后变先进的经验，从而使大家大吃一惊，骄傲自满的人不自满了，右倾保守的也积极起来了。"},{"type":"paragraph","text":"3、在提高党团积极分子觉悟的基础上，全社党团员群众一起开展了反对右倾保守、骄傲自满，反对劳力、农具、开支等各方面的浪费运动。通过对比算账，不仅有力地批评了党团员干部的右倾保守和骄傲自满思想，同时也大大地教育了社员群众。全社开展了人人献计献策，每个党团干部办一件好事的比先进、学先进、赶先进的爱国爱社爱家运动。大家一致保证努力实现亩产四百一十三斤的跃进计划。"},{"type":"paragraph","text":"在当前生产上，开展十天积肥二万担运动。每户交社肥一百担，在水利上，用突击办法十天内把土工完成。小麦要普追一次肥。为了克服大跃进中劳力不足的困难，先改制木轮小平车三十辆，现在社干、社员信心百倍，劲头很大，队与队、人与人展开了竞赛。"},{"type":"paragraph","text":"（张玉英）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7f18c11e6d"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
