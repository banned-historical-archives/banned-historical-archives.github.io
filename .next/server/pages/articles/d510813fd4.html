script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反对垄断资本的残酷剥削  英国二十八万煤矿工人大罢工  罢工得到其他行业工人的支持；二百多家矿井全部关闭","authors":[],"dates":[{"year":1972,"month":1,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反对垄断资本的残酷剥削"},{"type":"paragraph","text":"英国二十八万煤矿工人大罢工"},{"type":"paragraph","text":"罢工得到其他行业工人的支持；二百多家矿井全部关闭"},{"type":"paragraph","text":"新华社伦敦一九七二年一月十日电  英国二十八万名煤矿工人反对垄断资本残酷剥削的罢工斗争，到十日已经进入第二天。这是四十六年来英国煤矿工人第一次掀起的全国规模的大罢工。"},{"type":"paragraph","text":"煤矿工人的大罢工，使英国全国二百八十九个矿井全部关闭。据官方估计，这场全国性的煤矿工人罢工，将使英国煤业局每天损失一百四十多万到一百七十多万英镑。"},{"type":"paragraph","text":"在许多大煤田，矿工们从八日的中班起就纷纷离开了煤井，夜班的工人都不再上工。地下煤井和露天煤矿的采掘工人和运煤工人全部停止了生产。在苏格兰煤田，有三十四个煤井的煤矿工人在八日下午分别举行特别会议，揭露煤业局采用狡诈手法拒绝工人的合理要求，表示要坚决进行斗争。"},{"type":"paragraph","text":"这次煤矿工人的罢工斗争是从去年十一月初开始的全国性怠工斗争发展起来的。由于物价飞涨，从事体力劳动的英国煤矿工人的工资购买力迅速下降，生活受到越来越大的威胁。据英国报纸透露，在二十八万煤矿工人中，有八万以上的工人生活在英国政府所谓的“贫困线”以下。同时，煤矿的劳动条件也很差，四十五岁以上的矿工的伤亡率达到百分之十二左右。他们在去年下半年就一再地向英国煤业垄断机构英国煤业局提出增加工资等要求，并且从今年一月一日起掀起了新的怠工斗争。"},{"type":"paragraph","text":"从去年十一月到今年年初，英国煤业当局一再拖延答复工人的要求，提出许多附加条件，作为增加工资的“前提”，实际上是拒绝给工人增加工资。他们甚至露骨地对工人进行威胁，声称如果采取罢工行动，煤业局将关闭更多的煤井，解雇矿工，但是煤矿工人不怕威胁，他们进行了广泛的酝酿和发动，掀起了这场全国规模的大罢工。"},{"type":"paragraph","text":"矿工的罢工斗争得到了其他行业工人的广泛同情。许多地区的铁路工人、公路运输工人都纷纷以不到煤场装运煤炭，来支持煤矿工人的斗争。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d510813fd4"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
