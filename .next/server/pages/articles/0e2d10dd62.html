script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"法国资产阶级党派  成立两个新的政治集团","authors":[],"dates":[{"year":1958,"month":7,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"法国资产阶级党派"},{"type":"paragraph","text":"成立两个新的政治集团"},{"type":"paragraph","text":"新华社11日讯　巴黎消息：戴高乐已经下令要在一个月内把所谓"},{"type":"paragraph","text":"“法兰西第五共和国”宪法草案初稿准备好。现在，戴高乐亲自领导的一个“部际委员会”每天晚上都要开会，以便加速起草工作。"},{"type":"paragraph","text":"据透露，戴高乐的新“宪法”将规定法国总统独揽大权，而国民议会则几乎形同虚设。"},{"type":"paragraph","text":"法国各资产阶级政党人士和各种倾向的无党派人士正在法西斯独裁威胁下加紧重新集结力量。一个叫做“民主力量联盟”的新组织已经宣布成立。发起这个组织的，是以社会党人丹尼埃·麦耶为首的人权联盟；参加的有激进社会党领袖孟戴斯—弗朗斯、民主社会抵抗联盟领袖密特朗以及这两个党的一些议员，其中有社会党议员爱德华·德普勒、罗伯·维迪埃等人，还有青年共和党人、社会主义左翼联盟盟员和社会名流克劳德·布尔戴、希尔·马蒂纳等。这个组织已经得到全国教育联合会、全国教师工会和国民教育总工会的支持。"},{"type":"paragraph","text":"此外，大约有三十个“中间派”国民议会议员在10日晚上同意成立一个新的中间偏左政治集团。这个集团的成员包括前部长莫里斯·富尔、埃米尔·余格、希伯尔—儒勒和爱德华·庞纳福。据说，这个新的集团已经得到共和国参议院约六十个议员的支持。"},{"type":"paragraph","text":"右翼分子也在积极活动。人民共和党右翼头子皮杜尔正在为成立“天主教民主党”而奔走。还有一群自称为“左翼戴高乐分子”的人成立了一个所谓“共和改革中心”；这个政治集团要求彻底摧毁法兰西第四共和国宪法。"},{"type":"paragraph","text":"臭名远扬的法西斯头子夏尔·吕卡也组织了一个名叫“法兰西人民运动”的政党。他公开叫嚷说：“法西斯主义，特别是法国的法西斯主义，是我们的唯一希望。”"},{"type":"paragraph","text":"与此同时，法国共产党和进步力量正在展开规模巨大的宣传和组织工作，以便击败法西斯阴谋。目前法国共产党首先是组织全国人民在标志着法国人民革命传统的7月14日——攻陷巴士底监狱的纪念日——举行反法西斯示威，以便深入动员人民，把公民投票变成对法西斯独裁阴谋的致命打击。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0e2d10dd62"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
