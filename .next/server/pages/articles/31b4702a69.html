<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"充分发挥大字报的威力，深入农忙整风，推动生产运动，龟山区抓紧农忙整风，推动生产的几点体会","authors":[],"dates":[{"year":1958,"month":5,"day":27}],"is_range_date":false,"parts":[{"text":"各民主党派中央一致拥护总路线    决心把自我革命坚持到底","type":"title"},{"text":"新华社30日讯　各民主党派中央一致拥护中共“八大”二次会议所制定的社会主义建设总路线。他们表示要在总路线的指引下把整风运动进行到底，在运动中加速改造自己的思想和立场。","type":"paragraph"},{"text":"中国国民党革命委员会中央整风工作委员会已经作出决定，要求全体成员结合民革党内整风，认真学习中共“八大”二次会议的各项文件，贯彻执行鼓足干劲、力争 上游、多快好省地建设社会主义的总路线，批判现代修正主义。民革中央各整风小组在28日举行了第一次座谈会讨论中共“八大”二次会议的文件，很多人在会上 联系自己的政治思想情况作了发言，他们表示坚决要把自我革命进行到底，尽早地把自己改造成为一个完全的社会主义新人。","type":"paragraph"},{"text":"中国民主同盟在京中央委员、候补中央委员和盟中央专职干部在29日就中共“八大”二次会议的各项报告和决议进行了座谈。发言的人指出，社会主义建设总路线 的光辉照耀着我国的各个建设部门，全国人民一定能在党的领导下完成伟大的建设任务。民主党派的成员经过反右派斗争和整风运动，政治觉悟一般都有所提高，但 是不能因此自满，必须彻底地改造自己，绝不能中途松劲，同时还必须坚决反对现代修正主义。","type":"paragraph"},{"text":"中国民主促进会在京中央委员、候补中央委员等也在29日举行了关于中共“八大”二次会议文件的座谈会。大家在发言中都表示要在社会主义革命中认真地、彻底 地改造自己，为贯彻社会主义建设的总路线贡献出最大的力量。民进中央还决定在系统学习中共“八大”二次会议的文件时，要充分敞开思想，结合整风中所暴露出 来的有关重大问题，大胆鸣放，展开辩论。","type":"paragraph"},{"text":"中国农工民主党中央认为，中共“八大”二次会议和会议所制定的社会主义建设总路线，再一次给他们指明了正确的方向，对他们正在进行的本质改造和清除右派集 团对农工民主党的影响的斗争是一个巨大的鼓舞。农工中央号召全体成员，在整风已经取得成绩的基础上，认真学习中共“八大”二次会议文件，严肃批判现代修正 主义，把农工改造成为一个真正的为社会主义服务的政治力量。","type":"paragraph"},{"text":"中国致公党在京中央委员和成员也举行了学习中共“八大”文件的座谈会。他们一致表示要以实际行动拥护和贯彻执行社会主义建设总路线；在努力工作的同时，积极改造思想，保证自己尽快成为坚定的左派。","type":"paragraph"},{"text":"九三学社在京中央委员和参加社中央整风的成员一致认为，中共“八大”二次会议的各项报告和决议，给他们带来了莫大的鼓舞和力量。他们都表示要加速进行“兴 无灭资”的本质改造，使自己尽快成为又红又专、红透专深的新型的知识分子。大家决心在党和毛主席的领导下，用实际行动带动全体成员，和全国人民一道，全力完成技术革命和文化革命的光荣任务。","type":"paragraph"},{"text":"台湾民主自治同盟整风学习小组成员在座谈中，一致认为社会主义建设总路线始终贯串着“干”字，感到确实“形势逼人”，不进步不行。他们表示要通过整风很好地改造自己，制定好个人规划，赶上时代的列车，为实现总路线贡献自己的一切力量。","type":"paragraph"}],"comments":[],"origin":"1958年5月31日《人民日报》。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"31b4702a69"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
