<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"批臭资产阶级苦乐观","authors":["常广荣"],"dates":[{"year":1968,"month":6,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"批臭资产阶级苦乐观"},{"type":"paragraph","text":"辽宁省新民县羊草沟大队下乡知识青年　常广荣"},{"type":"paragraph","text":"吃大苦，耐大劳，是我们革命者的本色。但是，中国赫鲁晓夫向我们青年大肆兜售“先吃苦后享福”的资产阶级苦乐观。他胡说什么："},{"type":"paragraph","text":"“吃苦在前，享福在后……他们暂时吃一点亏，然而他们是，或者最后是，为我们大家及群众所信任，所尊敬，也就是说，他们是最值得的。”这就是要我们青年带着满脑袋“私”字，抱着追求个人名利地位的目的去吃点苦，以此骗取党和人民对自己的“信任”，从而换得名利双收。这是毒害人们灵魂的腐蚀剂。"},{"type":"paragraph","text":"伟大领袖毛主席教导我们：“什么叫工作，工作就是斗争。那些地方有困难、有问题，需要我们去解决。我们是为着解决困难去工作、去斗争的。越是困难的地方越是要去，这才是好同志。”我们在羊草沟大队的十六名知识青年，时刻牢记毛主席的教导，把为革命吃苦看成是无产阶级革命者的本色，四年如一日，早出晚归，风来雨去，和贫下中农战斗在一起。哪里最艰苦，我们就往哪里上；哪里最困难，我们就向哪里冲。去年夏季的一天，我和社员去牛圈起粪。烈日当空，天气酷热，牛粪稀糊糊直冒泡，发出刺鼻的酸臭味。当时，我毫不犹豫地脱去鞋子，卷起裤腿，拿着工具跳下没膝深的粪汤子里去起粪。今年春天，队里修排灌站，活计比较艰苦，田素菊等几名女同志主动报名参加。她们每天和男社员一样挖泥、挑土，手磨出血泡不说痛，肩压肿了不叫苦。大家都说，我们是在为中国革命、世界革命吃苦，是在为夺取无产阶级文化大革命全面胜利吃苦，是在为保卫毛主席、保卫毛泽东思想、保卫毛主席的无产阶级革命路线吃苦，这就是最大的甜，最大的愉快，最大的光荣。我们从来没有想到个人吃点苦就是什么“吃亏”，更没有想过象中国赫鲁晓夫所拚命宣扬的那样，现在吃点苦是为了将来得名得利，“占大便宜”。"},{"type":"paragraph","text":"毛主席教导我们：“夺取全国胜利，这只是万里长征走完了第一步。……中国的革命是伟大的，但革命以后的路程更长，工作更伟大，更艰苦。”我们深深地懂得，没有艰苦奋斗、彻底革命的精神，就不能坚持毛主席的无产阶级革命路线。没有过去的艰苦奋斗，就没有今天的胜利；没有今天的艰苦奋斗，也就没有明天全世界人民的胜利。我们知识青年在农村这个广阔的天地里，与天斗，与地斗，与人斗，是必须付出艰辛努力的。但是，这是革命的需要。干革命就是要不怕吃苦。"},{"type":"paragraph","text":"为谁吃苦，为什么吃苦，不同的阶级有不同的回答，这正反映出两种不同的世界观。张思德、焦裕禄等英雄人物，心甘情愿地为人民为革命去吃苦，他们是一个真正的无产阶级革命战士。如果一个人抱着追求个人名利地位的目的去吃苦，那末他只能为骗取党和人民的信任一时伪装积极，而绝不会真正地为人民服务。这种人就是中国赫鲁晓夫所鼓吹的“先吃苦后享福”的资产阶级苦乐观的俘虏。"},{"type":"paragraph","text":"我们无限忠于毛主席的革命青年，坚决不上中国赫鲁晓夫的当！我们要为我国的社会主义、共产主义的事业作出贡献，要为全体劳动人民的幸福作出贡献，要为全世界人民的解放作出贡献。我们要更高地举起毛泽东思想伟大红旗，持久深入地开展革命大批判，把中国赫鲁晓夫连同他的“先吃苦后享福”的资产阶级苦乐观一起抛进历史的垃圾堆！我们要牢记毛主席“吃苦在别人前头，享受在别人后头”的教导，继承和发扬我们党艰苦奋斗的光荣传统，永远保持革命者的本色！"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9f3c6c2637"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
