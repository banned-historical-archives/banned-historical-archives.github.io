script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"阿尔巴尼亚《团结报》热烈欢呼毛主席的庄严声明  毛主席声明有力支持世界人民反美斗争  指出中国人民坚定地同各国人民站在一起反对美帝及其一切走狗","authors":[],"dates":[{"year":1970,"month":5,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"阿尔巴尼亚《团结报》热烈欢呼毛主席的庄严声明"},{"type":"paragraph","text":"毛主席声明有力支持世界人民反美斗争"},{"type":"paragraph","text":"指出中国人民坚定地同各国人民站在一起反对美帝及其一切走狗"},{"type":"paragraph","text":"新华社地拉那二十三日电　阿尔巴尼亚《团结报》二十二日发表题为《对各国人民反帝斗争的巨大支持和鼓舞》的编辑部文章，热烈欢呼中国人民的伟大领袖毛主席发表《全世界人民团结起来，打败美国侵略者及其一切走狗！》的庄严声明。"},{"type":"paragraph","text":"文章说，全世界革命人民以莫大的关切和欢欣鼓舞的心情欢迎毛泽东同志五月二十日的声明。他们理所当然地把这一声明看作是对他们反对国际宪兵、人类最凶恶的敌人——美帝国主义及其同盟者和驯服的追随者的斗争的又一支持和鼓舞。"},{"type":"paragraph","text":"文章说，毛泽东同志是光荣的中国共产党和七亿中国人民的敬爱的领袖，他受到全世界真正革命者的爱戴和敬仰。他作为伟大的马克思列宁主义者，不仅忠实地捍卫了马克思列宁主义，而且把马克思列宁主义提高到新的、更高的阶段。在光荣的中国共产党和毛泽东主席的领导下，伟大的人民中国在二十年的时间里就从世界上的一个落后国家变成了具有现代化工业、先进的社会主义农业和世界高水平的科学技术的社会主义强国。她以其原则性的对外政策，以其强大的经济和军事力量成为无产阶级专政和世界社会主义革命的坚不可摧的堡垒，成为美帝国主义者及其亲密的伙伴——苏联修正主义者实现共同主宰世界的反人民和反革命的阴谋的不可逾越的障碍。伟大的七亿中国人民遵循光荣的中国共产党和毛泽东主席的教导，从来都同各国人民一起反对压迫者和剥削者，同争取自由的战士们一起反对侵略者，同革命者一起反对反动派及其公开和隐蔽的代理人，反对形形色色的叛徒和修正主义者。因此，全世界革命人民早就把视线转向了七亿人口的伟大中国，并把她看作是对他们反对压迫和剥削的斗争的最可靠的支持者和保卫者。恩维尔·霍查同志说：“毛泽东的伟大中国用事实表明，她是亚洲、非洲、拉丁美洲和欧洲各大小国家人民在反对美帝国主义者和苏联修正主义者的种种阴谋诡计的斗争中的保卫者。”"},{"type":"paragraph","text":"文章说，当美帝国主义者一开始对柬埔寨进行新的野蛮侵略的时候，在中国共产党和毛泽东主席教导下的伟大七亿中国人民就给予了柬埔寨人民以强有力的支持和援助。中华人民共和国一贯坚持对各国人民的解放斗争给予兄弟般的支持和援助的无产阶级国际主义的原则性政策；她再次表示了永远同印度支那邻国的兄弟人民站在一起的决心，并强烈谴责了美帝国主义者的侵略。"},{"type":"paragraph","text":"文章说，毛泽东主席五月二十日的声明是中华人民共和国永远在革命的道路上，在支持各国人民反对美帝国主义及其形形色色的同盟者和走狗的斗争的道路上前进的决心的又一证明，同时，清楚地指出了美帝国主义走投无路的绝望处境。"},{"type":"paragraph","text":"文章说，声明以事实证明了美帝国主义的腐朽性，证明了只要各国人民敢于拿起武器，掌握自己国家的命运，就具有不可战胜的力量。因此，毛泽东同志的声明鼓舞着各国人民的斗争，使他们充满新的毅力和力量，更勇敢地投入争取自由和独立的事业、争取革命和社会主义的伟大事业的斗争。"},{"type":"paragraph","text":"文章最后说，阿尔巴尼亚人民以欢欣鼓舞的心情欢呼毛泽东主席的声明。他们为有象伟大七亿中国人民这样的朋友和战友而感到自豪。伟大七亿中国人民在任何时候和任何情况下都巨人般地同各国人民站在一起，进行反对人类最凶恶的敌人——美帝国主义者及其同盟者和追随者的共同斗争。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"宣言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0d4c705059"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
