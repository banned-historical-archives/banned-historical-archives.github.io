" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji7-2","name":"毛泽东全集第7卷(2)","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji7-2.pdf"],"article":{"title":"近日各纵队的工作","alias":"","parts":[{"type":"paragraph","text":"近日各纵队的工作"},{"type":"paragraph","text":"（1935年10月3日）林、聂，彭、李，叶、邓："},{"type":"paragraph","text":"（一）我一、二、三纵队本日到达清江益、界石堡、高家铺之线，支队部到界石堡。明（四）日，除一纵队之两个大队外，其余一纵队主力、二纵队、三纵队及支队部均各在原地休息一天，进行纪律教育，打土豪筹粮食，准备后日向常（单）家七（集）、硝河城之线前进。（二）一纵队应以两个大队附电台由聂、陈率领，于明（四）日经圣庙到达延家庙地域（在静宁北三十里），调查隆德情况并准备后天向隆德前进相机袭取之，以利我军向平凉、绥远川、镇原、西峰镇之线前进。（三）敌八师在马营，二十四师在蔡家铺并有回援静宁讯，静宁住邓敌一部，隆德、平凉不明，但似无多敌。"},{"type":"paragraph","text":"彭毛"},{"type":"paragraph","text":"三日二十二时"},{"type":"paragraph","text":"[1]这是毛泽东和红军陕甘支队司令员彭德怀给红军陕甘支队第一纵队司令员林彪、政治委员聂荣臻，第二纵队司令员彭雪枫、政治委员李富春，"}],"authors":["毛泽东"],"dates":[{"year":1935,"month":10,"day":3}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":237,"page_end":237},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"18af64e3dc"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
