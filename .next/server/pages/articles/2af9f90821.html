script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"树立对毛泽东思想的科学态度  武汉部队党委领导成员带头学习叶剑英同志国庆讲话，从实际出发，研究如何加速部队的现代化建设","authors":[],"dates":[{"year":1979,"month":10,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"树立对毛泽东思想的科学态度"},{"type":"paragraph","text":"武汉部队党委领导成员带头学习叶剑英同志国庆讲话，从实际出发，研究如何加速部队的现代化建设"},{"type":"paragraph","text":"据新华社武汉十月二十四日电 人民解放军武汉部队党委领导成员带头学习叶剑英同志的国庆讲话，同时组织团以上干部认真学习，把各级领导干部的思想统一到这一重要讲话的精神上来，推动部队革命化现代化建设的发展。"},{"type":"paragraph","text":"武汉部队党委主要负责同志从北京参加党的四中全会回来，在部队党委会上强调指出，叶剑英同志的讲话是全党全军全国人民解放思想，团结一心、聚精会神搞四化建设的强大武器，也是我军加强革命化现代化建设的思想武器。各级党委都要把学好这一讲话当作继续端正思想路线的大事来抓，当作加强领导班子思想建设和组织建设的大事来抓。武汉部队党委决定，在今年年底以前举办两期读书班，把师以上主要领导干部轮训一遍；所属各军级单位也要分批办读书班，把团以上主要领导干部轮训一遍。武汉部队办的第一期师以上干部读书班已在十月中旬开始学习。党委第一书记、第一政治委员李成芳担任读书班临时党支部书记，领导大家学习。党委大部分领导干部都和大家同吃同住同学习。"},{"type":"paragraph","text":"叶剑英同志的讲话发表以后，武汉部队党委领导成员就进行了认真学习，现在又和参加读书班的师以上干部一起，从理论和实践上深入研究讲话的精神实质，又有了新的体会和心得。大家说，树立对毛泽东思想的科学态度，不论对当前的解放思想，还是今后正确指导四个现代化建设，都具有十分重大的意义。过去，林彪、“四人帮”出于反革命的需要，竭力篡改和歪曲马列主义、毛泽东思想。我们一些同志一度也盲目喊“高举”、“紧跟”、“照办”，而不注意研究本地区、本单位的实际。粉碎“四人帮”后，党中央从各个方面拨乱反正，恢复和发扬毛主席提倡的实事求是的光荣传统。今天，叶剑英同志的讲话使我们进一步认识到毛泽东思想是在斗争实践中不断发展的，把它固定化、绝对化是形而上学的。我们只有从现代迷信和本本主义中解放出来，对毛泽东思想树立真正的科学态度，完整准确地掌握它的科学体系，从实际出发，坚持实事求是，用来指导革命实践，这才是真正的高举。"},{"type":"paragraph","text":"在学习中，武汉部队党委的领导同志还同大家一起以叶剑英同志的讲话作指导，围绕四化建设，研究了做好各项工作的具体措施。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"叶剑英","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"四人帮","type":"人物"},{"type":"文稿类型","name":"发言"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2af9f90821"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
