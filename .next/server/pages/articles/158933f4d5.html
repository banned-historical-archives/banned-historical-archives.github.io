script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"不准雇工剥削制度借尸还魂","authors":["金兴容"],"dates":[{"year":1968,"month":5,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"不准雇工剥削制度借尸还魂"},{"type":"paragraph","text":"第三生产队老贫农　金兴容"},{"type":"paragraph","text":"中国赫鲁晓夫鼓吹“雇工自由”，胡说什么“有人问雇人耕种的土地是否有限制？我们的答复是没有限制，无论雇长工也好，雇零工也好，只要是自己所有自耕和雇人耕种的土地，我们就应该加以保护，不得侵犯。”他还更恶毒地说什么“雇农希望剥削，不是反对剥削。”这明明是要让那些垮了台的地主、富农又骑在我们头上拉屎拉尿！我们坚决不答应！"},{"type":"paragraph","text":"提起旧社会给地主、富农当雇工的苦，真是说也说不完。毛主席他老人家早就指出：“所谓农村无产阶级，是指长工、月工、零工等雇农而言。此等雇农不仅无土地，无农具，又无丝毫资金，只得营工度日。其劳动时间之长，工资之少，待遇之薄，职业之不安定，超过其他工人。此种人在乡村中是最感困难者”。在万恶的旧社会，我们为了维持最低的生活，不得不到地主、富农家卖工。地主、富农极其残酷地剥削我们，掠夺我们用血汗换来的劳动果实，坐享其成。等到我们年老体弱，从我们身上再也榨不出什么油水，地主、富农就把我们一脚踢开。我从十二岁起，就给地主当长工。从这家做到那家，天下乌鸦一般黑，天下地主一样狠。从正月初一到腊月三十，不分春夏秋冬，不管落雪下雨，我每天都起早摸黑。可是，我一年的工钱还养活不了自己，一家老小只好去讨米。我给地主做了四十多年长工，还是房无一间，地无一垄，一家人在这里弄个破屋住两个月，到那里租间牛棚住年把。一次，搬进一个又旧又破的空学堂里，住不多久，房子就塌了，一家人险些都被压死。雇工制度就是这样一个人吃人的制度。"},{"type":"paragraph","text":"可是，中国赫鲁晓夫还说什么“雇农希望剥削，不是反对剥削”。真是混账透顶！中国赫鲁晓夫和地主、富农穿的是一条裤子。他大肆鼓吹“雇工自由”的目的，就是要推翻社会主义制度，恢复人吃人的剥削制度，使毛主席亲手创建的社会主义中国，退回到半封建、半殖民地的旧中国。中国赫鲁晓夫的心比毒蛇还毒！"},{"type":"paragraph","text":"伟大领袖毛主席教导说：“只有社会主义能够救中国。”解放以来，在毛主席的英明领导下，我们贫下中农走上了共同富裕的康庄大道，集体道路越走越宽，生活越过越甜。中国赫鲁晓夫想叫我们贫下中农走回头路，吃二遍苦，这办不到！社会主义道路我们贫下中农走定了！我们为革命种田。我们坚决不准吃人的雇工剥削制度借尸还魂。我们要让全世界人民都走社会主义光明大道，让毛泽东思想伟大红旗插遍全球！"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"158933f4d5"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
