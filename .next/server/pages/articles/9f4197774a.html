" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji40","name":"毛泽东全集第40卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji40.pdf"],"article":{"title":"毛泽东等祝贺朝鲜民主主义人民共和国成立十周年的电报","alias":"","parts":[{"type":"paragraph","text":"毛泽东等祝贺朝鲜民主主义人民"},{"type":"paragraph","text":"共和国成立十周年的电报"},{"type":"paragraph","text":"（1958年9月8日）朝鲜劳动党中央委员会委员长、朝鲜民主主义人民共和国内阁首相金日成同志，朝鲜民主主义人民共和国最高人民会议常任委员会委员长崔庸健同志："},{"type":"paragraph","text":"当朝鲜民主主义人民共和国成立十周年的时候，我们代表中国政府和中国人民向你们和全体朝鲜人民致最热烈的兄弟的祝贺。"},{"type":"paragraph","text":"朝鲜民主主义人民共和国的成立标志着朝鲜人民争取独立、自由的长期的艰苦斗争的伟大胜利。十年来，英雄的朝鲜人民在朝鲜劳动党的领导下，走过了艰苦而光荣的道路。朝鲜民主主义人民共和国刚刚成立不久，美国侵略者就向它发动了疯狂的进攻，妄图在这片自由的土地上恢复黑暗的殖民制度。但是，英雄的朝鲜人民是吓不倒的，他们在以苏联为首的社会主义阵营和全世界爱好和平的人民的支持下，在中国人民志愿军的参加下，万众一心，英勇奋战，终于打败了以美帝国主义为首的侵略军队，取得了光辉的胜利。朝鲜人民这一伟大的胜利大大地鼓舞了各国人民争取独立和自由的斗争，对制止战争、保卫和平的事业是一个重大的贡献。朝鲜停战后，朝鲜人民克服了重重困难，很快地医治好了战争创伤，并"},{"type":"paragraph","text":"毛泽东等祝贺朝鲜民主主义人民共和国成立十周年的电报且正在以极大干劲进行着社会主义建设。中国人民为朝鲜兄弟的这些成就感到欢欣鼓舞。"},{"type":"paragraph","text":"中朝两国在无产阶级国际主义的基础上，在共同反对侵略的斗争中用鲜血凝成的伟大友谊是牢不可破的。我们两国人民的友谊和亲密合作对加强以苏联为首的社会主义阵营的团结和保卫亚洲和世界的和平有着巨大的意义。"},{"type":"paragraph","text":"祝朝鲜人民在建设社会主义的伟大事业和和平统一朝鲜的斗争中取得新的、更大的成就。"},{"type":"paragraph","text":"祝中朝两国人民的兄弟友谊万古长青。"},{"type":"paragraph","text":"中国共产党中央委员会主席中华人民共和国主席毛泽东中华人民共和国全国人民代表大会常务委员会委员长刘少奇中华人民共和国国务院总理周恩来"},{"type":"paragraph","text":"一九五八年九月八日于北京"}],"authors":["毛泽东"],"dates":[{"year":1958,"month":9,"day":8}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":158,"page_end":159},"tags":[{"name":"毛泽东","type":"人物"},{"name":"无产阶级国际主义","type":"主题/事件"},{"name":"无产阶级国际主义","type":"主题/事件"},{"type":"文稿类型","name":"通讯"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9f4197774a"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
