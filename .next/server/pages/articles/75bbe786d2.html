script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"家长不是“上帝”，但也不是“奴隶”","authors":["杨朱"],"dates":[{"year":1998,"month":7,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"杨朱"},{"type":"paragraph","text":"贵刊发表的“家长是‘上帝’吗?”一文，反对把不懂国家教育方针政策、向学校提不合理要求的某些大款奉为“上帝”，这无疑是正确的。但如果把少数大款和由工人、农民和知识分子组成的家长群划等号，甚至人为地把家庭与学校对立起来，便值得商榷了。"},{"type":"paragraph","text":"我们认为，学校和家庭在教育下一代问题上根本利益与根本目标是一致的，理应携起手来共担重任。当然，教师是主力军，家长是同盟军。文章谈及当前要注意克服两种不良倾向，一种是以‘教师为中心’，居高临下，不注意调动家长参与学校教育的积极性；另一种是把‘家长当作上帝，无原则迁就家长，从根本上失去教师的主导作用’。我们很赞成，但需进一步探讨两种不良倾向究竟哪一种是主要倾向?我们认为某些学校以教育者自居对待家长，轻视、忽视甚至排斥家长参与学校教育的积极性才是主要倾向，把家长视为“上帝”者只是个别现象。"},{"type":"paragraph","text":"目前，某些学校仍有体罚学生的现象，个别教师对敢于抵制体罚的家长实行打击报复，把气出在孩子身上，使受体罚的孩子不敢进学校，不敢进课堂，严重摧残了下一代的身心健康。"},{"type":"paragraph","text":"我们认为，学校教师也是国家公务人员，在执行还是违背国家教育政策法令方面应接受社会的监督。建议教育主管部门制订相应的法规，使家长有一个组织制度上的保证，给他们有一个讲话、建议和参与学校管理的地方，不要把家长当成可有可无的摆设，当成听命于“教育者”的“奴隶”。"},{"type":"paragraph","text":"总之，家长不是“上帝”，但也不是“奴隶”。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"75bbe786d2"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
