script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"踢开资产阶级家庭的绊脚石","authors":["朱立奇"],"dates":[{"year":1952,"month":3,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"革大外专　朱立奇"},{"type":"paragraph","text":"资产阶级用糖衣炮弹来攻击我们的干部，盗窃国家的财富，破坏我们的建设。同样地，资产阶级也用各种软化和利诱的卑劣手段来麻醉自己的儿女，妨碍他们的进步，干涉、破坏他们的爱国思想和行动，利用他们剥削得来的财富使自己的儿女们沉浸于资产阶级腐化堕落生活，不让他们走上革命的道路，曾经有过多少青年就这样被他们推下泥坑，消蚀了自己的革命意志。然而广大的生长在毛泽东时代的中国青年，在党的教育引导下，正勇敢地向前猛进，他们踢开了资产阶级家庭的绊脚石，冲破了那个肮脏狭隘的樊笼，坚决地改造自己，不断地走向或准备走向全心全意为人民服务的工作岗位，去为自己创造无限美好的前程。"},{"type":"paragraph","text":"几天来，我们学校里非常热闹，到处喜气洋溢，常常敲锣打鼓，欢送着我们毕业同学一批批走上为人民服务的革命工作岗位，同学中间有不少人是出身于资产阶级家庭的，不管他们的家庭曾经怎样来威胁、诱骗他们的儿女脱离革命的队伍，可是这些在同学们坚强的革命意志前面，都遭到了可耻的失败。今天我们这里毕业同学们穿着蓝布的人民装，背上背包，愉快地走向祖国各个地区，光荣地当一个人民的勤务员，他们将努力吸收苏联社会主义建设的先进经验，应用到祖国的伟大建设中去。我们这里英文班中有许多出身于资产阶级家庭的同志们今天正在朝鲜战场上教育美国俘虏，在战线上对敌人喊话，把人类的正义和真理传播给被蒙蔽欺骗的人们，以忘我的精神为世界和平事业而斗争!"},{"type":"paragraph","text":"我们这里那一些资产阶级家庭出身的同学们，由于党的伟大教育，由于自己的努力改造，今天都把自己锻炼得愈来愈坚强了!这中间有着不少动人的故事!像石中宝同志的家里曾经想为他娶媳妇，替他在洋行里找好了高薪水的职位，一切都布置好了，可是一切也都失败了!今天石同志宁愿担任供给制待遇的俄语工作，全心全意为人民服务。谁要是看不见壮阔的前途，在思想斗争中失败了，结果离开革命队伍，陷入资产阶级的泥坑，再想回头时，那就不知要在走多少弯路，后悔莫及了!今天我们生活在这样的环境，一面是广大的劳动人民在庄严地工作、战斗，一面还有着一小撮资产阶级在腐蚀着我们、陷害着我们，我们跟资产阶级家庭有关系的青年同学必须要提高警惕。我们有党领导着我们，只要我们自己在今天思想改造的运动中坚决肃清资产阶级思想的残余影响，明确地划清思想界线，不断地改造自己，为着我们新民主主义建设的胜利和社会主义灿烂的明天，迈步向前，高歌猛进!"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ccfdb6ecd8"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
