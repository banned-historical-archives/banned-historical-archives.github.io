script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"日本人民热爱毛主席的光辉著作  日文版《毛主席语录》和《毛主席的五篇著作》合订本，在日本各地发行，受到广大人民热烈欢迎","authors":[],"dates":[{"year":1970,"month":3,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"日本人民热爱毛主席的光辉著作"},{"type":"paragraph","text":"日文版《毛主席语录》和《毛主席的五篇著作》合订本，在日本各地发行，受到广大人民热烈欢迎"},{"type":"paragraph","text":"新华社九日讯　据东方通讯社报道：由北京外文出版社出版的日文版《毛主席语录》和《毛主席的五篇著作》（《为人民服务》、《纪念白求恩》、《愚公移山》、《关于纠正党内的错误思想》、《反对自由主义》）合订本，最近在日本全国各地的书店发行以来，受到日本各阶层广大人民的热烈欢迎。"},{"type":"paragraph","text":"从北部的北海道至南部的九州，日本全国各地的许多书店从二月十六日（发行的第一天）到三月三日这段时间内，已经出售了四千三百册《毛主席语录》和《毛主席的五篇著作》的合订本。目前还不断收到新的订书单。"},{"type":"paragraph","text":"红宝书《毛主席语录》自一九六六年在日本发行以来，受到广大日本工人、农民、青年、学生的热爱，仅东京一家经售中国书刊的书店就销出十四万多册。日本广大群众争相购买和学习毛主席光辉著作的事例充分证明，日本人民十分热爱毛泽东思想，他们把毛泽东思想当作他们进行革命斗争的指南。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e9ef19c00b"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
