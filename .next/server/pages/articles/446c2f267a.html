<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"吴金萃文章引起北京工商界很大兴趣","authors":[],"dates":[{"year":1957,"month":5,"day":8}],"is_range_date":false,"parts":[{"text":"吴金萃文章引起北京工商界很大兴趣","type":"title"},{"text":"本报讯  昨天本报刊出了北京公私合营裕生祥电机厂副厂长吴金萃的“怎样看工人阶级?向工人阶级学习什么?”一文以后，引起北京工商界很大兴趣，他们认为这个公开的讨论是工商界展开百家争鸣的开始。好些人准备参加讨论。","type":"paragraph"},{"text":"争鸣和接受改造矛盾吗?","type":"subtitle"},{"text":"北京公私合营艺华乐器厂厂长张焕尧认为报纸刊登吴金萃的文章是一个很好的“放”，他很拥护。他说：“知识分子的百家争鸣已经热闹了好久，工商界的声音还是很小很微。这不是说工商界的思想里平静无事，没有什么可鸣的；而是大家觉得我们的争鸣有困难，思想上还混乱，因为我们还有一个接受改造的问题。争鸣和接受改造是不是矛盾呢?要“放”，我们应该“放”到什么程度，什么范围呢？都很不清楚。但是，工商界人士的思想问题确实也不少，脑子里的问号一大堆，不鸣不放，憋在心里总是问题，譬如向工人阶级学习，就有人一直是口服心不服的。这一回，如果报纸能够掀起一场热烈讨论，帮助大家辨清是非，提高思想，这是直接响应毛主席的号召。”他最近就要写文章，争鸣一番。","type":"paragraph"},{"text":"提出了工商界实际的问题","type":"subtitle"},{"text":"中国医药公司北京市公司业务科副科长阎少青说，报纸发表吴金萃的文章，提出了一个工商界中表面说是没有问题、实际上是有疑问的问题。他认为这样公开讨论，对工商业者的进一步改造有帮助。他说：“现在没有人反对工人阶级的领导，但是向工人阶级学什么，光抽象地说什么‘大公无私’不解决问题。我自己就还没闹清楚。可是，不把这问题提出来让大家讨论，人们就只能在背后谈谈，既不能深入分析，又不能搞通思想。老实说，像我这已经当了干部的人，心里明明有问号还真不敢公开地说出来，怕人家批评：‘亏你还是个干部，白学习啦，连这也怀疑。’结果心里疙瘩没解开，还得不懂装懂。现在报纸支持争鸣，我一定参加。”阎少青还说，他希望这次讨论要让大家好好地自由思考、多多辩论，要以理服人，别扣帽子，不然，是会影响大家放心大胆地争鸣的。","type":"paragraph"},{"text":"代表资产阶级知识分子的意见","type":"subtitle"},{"text":"北京市五金工业公司副经理毛质宸也说要参加这次讨论。他表示不大同意吴金萃的某些看法。他说吴金萃是工商界中的技术人员，他的意见能代表一般资产阶级出身的知识分子，但不完全能代表像他自己这样的人。","type":"paragraph"},{"text":"工商界大都不敢敞开来谈","type":"subtitle"},{"text":"前门区工商联委员张文魁和杨承志认为吴金萃能够把自己的看法端出来谈，是很勇敢的。杨承志说：工商界的思想问题很多，大多数人有“落后感”、“委屈感”，但大家都不敢“冒险”敞开来谈。现在有人带头说，这不仅可以鼓励工商界和大家思想见面，而且有利于党对工商界的工作。","type":"paragraph"},{"text":"张文魁认为，工商界有人有思想问题不肯也不敢公开来谈，这种顾虑都是在实际工作中逐渐产生的。他说：大家对党的政策是完全拥护的，但有的干部在贯彻政策时常常犯教条主义、主观主义，净看私方人员的缺点，不看私方人员的优点，而且常常偏听偏信，给私方人员钉子碰，使得私方人员有意见也不敢提了。目前，工商界有不少人不但对靠拢党、靠拢工会有顾虑，就是对工商联也掏不出他们的真心话来。他们说：“我说十句，也顶不上工人说一句!我有意见不反映倒好，一反映就许闹糟了!”张文魁说，让大家争鸣一下吧，这样可以鼓舞工商界更好地发挥积极作用。","type":"paragraph"},{"text":"暴露思想会不会起副作用?","type":"subtitle"},{"text":"青年工商业者、北京市医疗器械公司财务科科长倪世富滔滔不绝地对记者说了许多话。他说吴金萃写这篇文章，他老早就知道，而且还参加过讨论。现在报纸把它发表出来，大家争鸣，他认为将会起很好的作用。倪世富说，全行业公私合营以后，工商界思想的大体表现是：和有关部门谈思想，只能谈三成；业务负责人之间在一起谈，也不过七、八成；只有大家在一起发牢骚的时候，真实的思想情绪才百分之百地暴露出来。","type":"paragraph"},{"text":"“为什么是这样呢?”倪世富说：“这是因为有些人，特别是搞工商界工作的人，过去有思想顾虑，他们就怕工商界暴露了思想，泛滥成灾，带来副作用。工商界的一些骨干分子、积极分子，过去对敞开思想也有顾虑，他们怕自己谈了不同的意见，犯错误，在群众中影响不好；也怕别人说自己“行动上那么积极，思想却这么落后”。","type":"paragraph"},{"text":"“会不会起副作用呢?”倪世富说，“我认为，可能会对极少数人起副作用，但这是次要的；主要的作用，将使工商界的思想大大开朗，从而使问题真正得到彻底解决。”","type":"paragraph"}],"comments":[],"origin":"《大公报》1957年5月8日。原题为：“工商业者大胆争鸣的开始＼吴金萃文章引起北京工商界很大兴趣”。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"446c2f267a"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
