script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"批判资产阶级唯心主义思想复旦大学教师展开专题讨论","authors":["鹤敏"],"dates":[{"year":1955,"month":4,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"复旦大学教师在教学和研究工作中展开宣传唯物主义，批判资产阶级唯心主义思想的工作。"},{"type":"paragraph","text":"中文系现代文学教研组和外文系英国文学教研组，曾联合举行两次座谈会。许多教师在发言中，着重揭露了胡风反马克思主义的世界观问题，以及对生活实践问题，民族遗产和民族形式问题等错误思想，进行了深刻的分析批判。外文系三四年级英语教研组教师举行座谈会，讨论对苏联先进外语教学法的体会，并批判外语教学法中资产阶级反动教育思想。经济系国民经济史教研组也对胡适反动思想的阶级根源作了详细的分析批判。"},{"type":"paragraph","text":"历史系全体教师准备举行两次讨论；批判胡适的反动历史观点，及其在中国史学界的影响。一次着重讨论胡适的历史观，一次着重讨论胡适的考据方法。"},{"type":"paragraph","text":"新闻系教师准备对资产阶级唯心主义思想在新闻学中表现的有关问题进行批判，新闻工作理论与实践教研组，举行专题报告会，由曹亨闻先生报告“新闻学在社会科学中的地位和作用”。报告着重批判了新闻学中主观唯心论思想和客观唯心主义思想。"},{"type":"paragraph","text":"马克思列宁主义教研组、中国革命史、辩证唯物主义与历史唯物主义三个教研组，最近共同制定了批判资产阶级唯心主义思想计划，批判重点有三:一，对胡风唯心主义文艺思想的批判(着重在世界观与创作关系方面)；二，实用主义批判(着重在认识方法论方面)；三，对胡适的反动历史观的批判。"},{"type":"paragraph","text":"有的教研组结合科学研究工作、教学大纲以及听课等，批判教学内容和方法中的唯心观点。教师们纷纷在不同的学术领域中选择有关题目，继续对唯心主义思想进行深入批判。"},{"type":"paragraph","text":"(鹤敏、萌)"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"98614f5412"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
