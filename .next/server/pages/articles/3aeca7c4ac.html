script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共中央关于公开发表五·一六通知的决定","authors":[],"dates":[{"year":1967,"month":5,"day":17}],"is_range_date":false,"parts":[{"text":"中共中央关于公开发表五·一六通知的决定","type":"title"},{"text":"中央各部门，各革命委员会，各军区，各革命群众组织：","type":"appellation"},{"text":"中央决定公开发表一九六六年五月十六日的中共中央《通知》，这是我国政治生活中的一件大事。这个文件，是在我们伟大领袖毛主席亲自主持下制定的，是一个伟大的马克思列宁主义的历史文件。希望各地，各部门，认真组织学习和讨论这个文件，并学习和讨论红旗杂志，人民日报有关社论，结合一年的斗争经验，领会和掌握毛主席提出的无产阶级文化大革命的理论，路线，方针和政策，紧紧掌握斗争的大方向，把斗争的矛头对准党内最大的一小撮走资本主义道路当权派，推动当前的无产阶级文化大革命运动进一步向前发展。","type":"paragraph"},{"text":" 中共中央一九六七年五月十七日","type":"paragraph"},{"text":"发至：全国各基层单位","type":"paragraph"}],"comments":[],"origin":"根据《中共中央文件汇编，1966.5-1968.5 [内部参考]》，1968年5月出版，编印者不明","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"革命委员会","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"name":"清查五·一六","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3aeca7c4ac"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
