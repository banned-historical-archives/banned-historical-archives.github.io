script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反对垄断资产阶级的残酷剥削意大利工人运动如火如荼","authors":[],"dates":[{"year":1969,"month":10,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社北京十三日电　罗马消息:意大利广大工人反对垄断资产阶级残酷剥削的罢工斗争继续在全国如火如荼地展开。大批工人开始摆脱黄色工会头目的控制，奋起占领工厂，并同前来镇压的警察进行搏斗。"},{"type":"paragraph","text":"在意大利北部的工业中心都灵，数十万冶金和机械制造工人连日来坚持罢工。菲亚特汽车公司的工人十日在公司的大楼前举行示威，并同反动当局派去的警察和资本家雇用的打手进行了斗争。数百名罢工工人占领了这家意大利最大的汽车垄断企业的最大的工厂——米拉菲奥里工厂，并且把企图阻挠和破坏工人斗争的黄色工会的头目痛打了一顿。"},{"type":"paragraph","text":"在意大利的第二大城市米兰，罢工工人在七日举行有十万人参加的示威以后，连续四天在市区举行声势浩大的游行。意大利最大的橡胶垄断企业皮雷利公司总部的大楼被罢工工人包围了三天，资方人员无法进入。"},{"type":"paragraph","text":"在意大利的另一个重要工业城市热那亚，六万冶金和机械制造业工人在九日举行了二十四小时罢工，二万五千多工人高举着红旗和标语牌在市区举行了声势浩大的示威游行。在那不勒斯，几百名罢工工人切断了铁路交通。"},{"type":"paragraph","text":"在意大利的冶金、机械制造和化学工业的一百五十多万工人进行罢工斗争的同时，意大利各省、市政府的雇用的四十万工人和职员在九日举行了全国性罢工，饮食糖果业的二十万工人接着在十日和十一日举行了全国性罢工。"},{"type":"paragraph","text":"意大利中部特尔尼各行各业的工人，为了反对生活费用和房租的飞涨，要求增加工资、充分就业、解决住房问题和改善公用事业，在八日举行了总罢工。接着，在整个佛留利一威尼斯、朱利亚地区，在西西里岛的首府巴勒莫，和意大利南部的马特拉，也由于同样原因爆发了总罢工。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2b7d63faf7"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
