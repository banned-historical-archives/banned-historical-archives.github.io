script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"右倾机会主义者清醒过来","authors":["李佐长"],"dates":[{"year":1959,"month":9,"day":2}],"is_range_date":false,"parts":[{"type":"paragraph","text":"中共上海市委党校副校长　李佐长"},{"type":"paragraph","text":"读了“公报”和“决议”之后，我感到这两个文件是我国社会主义伟大建设过程中的里程碑和继续跃进的号角，它将引导着和鼓舞着中国人民继续鼓足干劲，力争上游，多、快、好、省地为实现美好、繁荣的社会主义社会和共产主义社会而奋斗。同时这也是全国工人、农民和革命知识分子当前的无上光荣的使命。"},{"type":"paragraph","text":"其次，这两个文件又是对右倾机会主义者和右倾怀疑者的警钟和指路明灯。正如“公报”和“决议”中所指出的，大跃进和人民公社，对我国人民来说，都是史无前例的新生事物，在前进过程中当然不可避免地要遇到一些困难，产生一些缺点。右倾机会主义者或存有右倾思想的人即对于大跃进和人民公社运动中由于经验不足而产生并且已经迅速克服的缺点，估计过于严重，而对于这两个运动中阳得的巨大成绩则估计过低。“公报”和“决议”中以活生生的数字和事例指出了今年上半年工、农业生产的巨大成绩。经济事业发展的这样迅速，取得的成绩这样巨大，不但在我国历史上是空前的，即在世界范围内也是绝无仅有的，如果右倾机会主义者和悲观怀疑者在过去因为看不到这些事实而使自己的头脑不清和认识模糊的话，那么经过这次“公报”和“决议”鲜明而具体地指出之后，就应该清醒起来。在这两个文件的指示下，迅速改变自己的错误想法、看法和作法，同全国人民一道在中国共产党和毛泽东主席的领导下鼓足干劲为完成和提前完成一九五九年跃进计划而奋斗吧!"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5f41033d7a"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
