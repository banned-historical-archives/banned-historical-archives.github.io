script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"中阿朝越四国新闻界欢聚一堂一再为反帝反修正主义和建设社会主义的亲密团结干杯","authors":[],"dates":[{"year":1963,"month":9,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京29日电】　新华通讯社社长吴冷西今天中午举行宴会，热烈欢迎以阿耶特·西米基乌为首的阿尔巴尼亚通讯社代表团，以裴基浚为首的朝鲜中央通讯社代表团。"},{"type":"paragraph","text":"正在北京访问的以黄俊为首的越南通讯社代表团应邀出席了宴会。"},{"type":"paragraph","text":"在洋溢着热烈、亲切、团结友好气氛的宴会上，吴冷西、阿耶特·西米基乌和裴基浚先后讲了话。欢聚一堂的中、阿、朝、越四国的新闻界同志们，亲切交谈，一再为四个兄弟国家通讯社在反对帝国主义、现代修正主义和建设社会主义事业中的亲密团结和合作，为社会主义国家人民之间的伟大友谊而干杯。"},{"type":"paragraph","text":"出席宴会的，有中共中央宣传部副部长张磐石，对外文委副主任屈武，新华通讯社副社长朱穆之、邓岗、穆青，《人民日报》副总编辑胡绩伟，中华全国新闻工作者协会副主席范瑾，外交部新闻司副司长案加林，首都各新闻单位的负责人常芝青、周新武、穆欣、高丽生、王定坤等。"},{"type":"paragraph","text":"中阿友协秘书长刘子余，中朝友协秘书长欧阳竞也出席宴会作陪。"},{"type":"paragraph","text":"朝鲜驻中国大使馆临时代办李在成，阿尔巴尼亚驻中国大使馆一等秘书布里，应邀出席了宴会。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"958df73762"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
