script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"圆满结束对我国的国事访问  埃切维里亚总统和夫人离上海回国  李先念副总理和王洪文副主任等到机场热烈欢送墨西哥贵宾","authors":[],"dates":[{"year":1973,"month":4,"day":25}],"is_range_date":false,"parts":[{"type":"paragraph","text":"圆满结束对我国的国事访问"},{"type":"paragraph","text":"埃切维里亚总统和夫人离上海回国"},{"type":"paragraph","text":"李先念副总理和王洪文副主任等到机场热烈欢送墨西哥贵宾"},{"type":"paragraph","text":"新华社上海一九七三年四月二十四日电　墨西哥总统路易斯·埃切维里亚·阿尔瓦雷斯和夫人，圆满结束了对我国的国事访问，今天深夜乘专机离开上海回国。"},{"type":"paragraph","text":"随同埃切维里亚总统和夫人来访的外交部长埃米略·奥·拉瓦萨和夫人以及其他墨西哥贵宾今晚也离开上海回国。"},{"type":"paragraph","text":"前往机场欢送墨西哥贵宾的有："},{"type":"paragraph","text":"国务院副总理李先念和林佳楣同志；"},{"type":"paragraph","text":"上海市革命委员会副主任、中国人民解放军上海警备区政治委员王洪文，上海市革命委员会副主任、中国人民解放军上海警备区司令员周纯麟，上海市革命委员会副主任徐景贤、王秀珍、冯国柱。"},{"type":"paragraph","text":"今晚，上海虹桥机场充满了中墨两国人民团结友好的热烈气氛。当埃切维里亚总统和夫人等墨西哥贵宾在李先念副总理、王洪文副主任陪同下同欢送群众告别时，机场上一片欢腾。欢送的群众挥动着中墨两国国旗和鲜艳的花束、彩绸，青少年们跳起了团结舞、花篮舞，人们热情高呼：“中墨两国人民的友谊万岁！”“坚决支持墨西哥人民维护民族独立和国家主权的正义斗争！”“亚、非、拉人民大团结万岁！”“全世界人民大团结万岁！”“祝贺埃切维里亚总统和夫人访问中国成功！”埃切维里亚总统和夫人频频向欢送的群众招手致意。临上飞机以前埃切维里亚总统和夫人同李先念副总理、王洪文副主任一一握手告别，再次感谢中国人民对墨西哥人民的友好情谊和盛情接待。"},{"type":"paragraph","text":"前往机场欢送的还有：农林部副部长杨立功，外交部部长助理章文晋，中国驻墨西哥大使熊向晖和谌筱华同志，外交部有关方面负责人陈德和、张颖、高建中，沈阳杂技团负责人尹灿贞和部分团员；"},{"type":"paragraph","text":"上海市革命委员会和中国人民解放军驻上海部队有关方面负责人张敬标、黄涛、陈新发、杨新亚、陈德学、郑刚、叶昌明、黄金海、张振亚、王景、吴立义、薛干青、窦鸿儒。"},{"type":"paragraph","text":"墨西哥驻中国大使安吉亚诺和夫人也前往机场送行。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"王洪文","type":"人物"},{"name":"李先念","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6eb2dc5a92"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
