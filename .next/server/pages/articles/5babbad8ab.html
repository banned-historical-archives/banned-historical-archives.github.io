script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"邓小平副总理会见英萨利副总理  英萨利副总理介绍了柬军民坚持战斗抗击越南侵略军的情况  邓小平副总理表示坚决支持柬埔寨人民反抗越南侵略的斗争","authors":[],"dates":[{"year":1979,"month":1,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"邓小平副总理会见英萨利副总理"},{"type":"paragraph","text":"英萨利副总理介绍了柬军民坚持战斗抗击越南侵略军的情况"},{"type":"paragraph","text":"邓小平副总理表示坚决支持柬埔寨人民反抗越南侵略的斗争"},{"type":"paragraph","text":"新华社北京一月十三日电 中共中央副主席、国务院副总理邓小平，今天下午会见了柬共中央常委、民主柬埔寨政府负责外交事务的副总理英萨利。"},{"type":"paragraph","text":"会见时，英萨利副总理介绍了柬埔寨军民坚持战斗、抗击越南侵略军的情况。他指出，柬埔寨人民在以波尔布特同志为首的柬共中央和民主柬埔寨政府领导下，现正在各地英勇顽强地打击越南侵略者，誓死保卫柬埔寨的独立、主权和领土完整。"},{"type":"paragraph","text":"邓副总理严厉谴责了越南扩张主义者对柬埔寨野蛮侵略的暴行，表示坚决支持柬埔寨人民反抗越南侵略的斗争。"},{"type":"paragraph","text":"会见以后，邓副总理设宴招待英萨利副总理和他的随行人员。"},{"type":"paragraph","text":"中共中央政治局委员、国务院副总理耿飚，外交部长黄华、副部长韩念龙，参加了会见和宴会。中联部副部长申健参加了宴会。"},{"type":"paragraph","text":"民主柬埔寨驻中国大使毕姜应邀出席了宴会。"},{"type":"paragraph","text":"（附图片）"},{"type":"paragraph","text":"中共中央副主席、国务院副总理邓小平会见柬共中央常委、民主柬埔寨政府负责外交事务的副总理英萨利。"},{"type":"paragraph","text":"新华社记者 刘少山摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5babbad8ab"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
