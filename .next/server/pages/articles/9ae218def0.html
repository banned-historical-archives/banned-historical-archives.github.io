<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共甘肃省委对资本主义工商业改造情况报告","authors":[],"dates":[{"year":1956,"month":2,"day":3}],"is_range_date":false,"parts":[{"text":"中共甘肃省委对资本主义工商业改造情况报告","type":"title"},{"text":"我省自去年12月11日召开了对资本主义工商业改造会议和工商联执监委会议以后，全省各主要城市工商业者即相继掀起了一个拥护全行业公私合营的运动，到处张灯结彩、锣鼓喧天，大批大批地申请公私合营，但由于各级领导事先对客观形势的发展估计不足，仍采取慢慢来的方针，以致有些地区还在慢吞吞地训练干部时，工商界已全面动起来了，造成措手不及。特别是酒泉市，商人已经满街贴上“欢迎改造，掌握自己的命运，不怕共产”等标语之后，党内还未传达，以致县委部长、公安局干部认为是反动标语，派公安队四出将标语撕毁。省委看到这一形势，并在北京市先批准后改造的经验启发之下，立即召开了电话会议，发出指示，要求各地迅速克服右倾思想，加速改造速度。目前公私合营和合作化的高潮已在全省县城和主要集镇普遍深入展开，其情况大体是：第一，全省约有30％的地区，基本上已完成批准全行业公私合营和手工业合作化的阶段。其中全部完成批准工作，大体完成清产定股工作，现正进行复查和准备调网并店及人事安排工作的有兰州、天水市、酒泉县等；基本上完成批准阶段现正大力进行清产定股工作的有吴忠市、银川市、张掖、临泽、高台、中宁、惠农、甘谷、秦安、礼县、武山、清水、西和等地。第二，约有60％的地区，各项准备工作现已就绪，条件亦已成熟，将于春节前全部完成批准工作，这类地区有临夏市、定西、会宁、临洮、榆中、皋兰、武都、蒙古自治州等。第三，约有10％的地区和有些少数民族地区，因力量不足和条件不成熟，可能推迟一步。其中有吴忠自治州、武都、张掖、临夏等专区的农村小集镇，春节后才开始工作；西吉、临潭、夏河现在才开始宣传；甘南的卓尼、碌曲、玛曲春节后才开始宣传。","type":"paragraph"},{"text":"就目前运动总的发展情况看，基本上是健康的，批准后商人的情绪普遍是高涨的，清产核资工作的进行是稳当而迅速的，经营积极，营业额上涨的新气象也普遍出现，但部分地区也发生了或存在一些问题，如：","type":"paragraph"},{"text":"（一）私商和手工业者绝大多数情绪是高涨的，欢天喜地的，但也有少数人抽逃资金、顾虑很多，甚至消极抵抗。同时也发现某些干部对个别思想不通的商人，不耐心进行教育，简单强迫申请，致使其以死对抗威胁。","type":"paragraph"},{"text":"（二）天水市有些行业的清产核资工作扣的过紧、过细，压的过低，且对商人信赖不够，多是干部直接动手，致商人讥讽清产核资为“翻箱、倒柜”。","type":"paragraph"},{"text":"（三）各地程度不同的存在着不分大小、不区别情况，要求一律清产核资，进行公私合营的情绪和作法，因而在商人中较普遍的滋生了拿工资的雇佣思想，出现了不少经营积极性降低，服务质量降低，不进货，减少花色品种等现象。","type":"paragraph"},{"text":"（四）兰州市有几个行业并店调网过猛过多，致关门太多，影响供应，个别街巷居民买纸烟、缝衣服感到困难，特别是手工业搞大社、集中生产的思想很严重，甚至连钉补鞋匠也要一二十户并在一处，造成许多不便。这些现象的发生主要是有些干部只从管理方便出发，而不管消费者方便与否的思想作祟。","type":"paragraph"},{"text":"（五）兰市棉布、百货行业中的某些商店并点后，人事调整脱离实际情况，大集中、大调动，制度改变也过猛，加以思想教育不够，人员间互相生疏，工作不熟练，制度不熟悉，因而发生了一些不团结，不服从领导，感到困难，情绪不高等现象。","type":"paragraph"},{"text":"总之，由于运动热火朝天，发展情况顺利，有些干部脑子有点发热，赶急图快，简单急躁思想已经滋长，因而工作上便产生了只求形成热闹，不作深入细致工作；只求快，不讲质量；只求整齐划一，不管实际情况的多样性、复杂性等偏向。这些问题过去都随时发现，随时进行检查纠正，目前正根据中央最近的两个指示再一次地进行检查。同时为了保证并店调网、企业改造工作健康稳当的发展，对并店调网、企业改造的进度和各种具体问题的处理，都作了必要的控制。","type":"paragraph"}],"comments":[],"origin":"甘肃省某档案馆","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9ae218def0"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
