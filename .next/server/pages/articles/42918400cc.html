script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"约翰逊所谓“谈判”意味着更疯狂约侵略朝《劳动新闻》指出交替使用侵略大棒与“和平”盾牌是美帝惯伎　阿《团结报》说约翰逊“新建议”同现代修正主义方针完全吻合","authors":[],"dates":[{"year":1965,"month":4,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社平壤11日电　朝鲜《劳动新闻》今天就美国总统约翰逊七日的演说发表编辑部文章强调指出，只要美帝国主义不从越南南方滚出去，越南问题就不能得到最后解决。"},{"type":"paragraph","text":"文章说，约翰逊在这次讲话里大谈所谓“无条件讨论”、“提供援助”等等，妄图以此削弱越南人民的斗争意志和欺骗世界舆论，挽救它在越南南方遭到的可耻惨败和实现其侵略目的。"},{"type":"paragraph","text":"文章指出，在形势对自己有利的时候就挥舞侵略的大棒，而在形势对自己不利的时候就抬出“和平的盾牌”，这是美帝国主义的惯用伎俩。"},{"type":"paragraph","text":"文章指出，任何花言巧语都掩盖不了美帝国主义掠夺和侵略的本质。约翰逊声嘶力竭叫嚷什么“谈判”和“援助”只能够再一次暴露出美帝国主义的狡猾和无耻的侵略本质。"},{"type":"paragraph","text":"文章指出，约翰逊在这次讲话中大念“和平经”，是因为它在侵略越南的战争中在军事上、政治上和道又上都遭到了惨重的失败，妄图通过“和平讨论”来达到战场上所述不到的目的。约翰逊嘴里的“和平”和“谈判”，就意味着更加疯狂的侵略，这是骗不了任何人的。"},{"type":"paragraph","text":"据新华社地拉那11日电　阿尔巴尼亚《团结报》今天在一篇评论中指出，约翰逊七日的演说充满对越南民主共和国和中华人民共和国的卑鄙诽谤，是美国政府为了欺骗各国人民和使美帝国主义在越南免于完全失败的又一阴谋。"},{"type":"paragraph","text":"评论指出，约翰逊提出所谓“进行无条件讨论”的目的是美国欺骗国际舆论的总体计划的组成部分，是为了分裂印度支那人民，以便使美国得到它用武力所得不到的东西——征服东南亚。"},{"type":"paragraph","text":"评论指出，约翰逊的“进行无条件讨论”的“新建议”只不过是叛徒铁托不久前提出的类似口号的翻版。这种“意见的吻合”不是偶然的。这一建议完全同现代修正主义者破坏英雄越南人民的正义斗争以及各国人民反美革命斗争的危险方针相吻合。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"42918400cc"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
