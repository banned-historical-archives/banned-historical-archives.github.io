script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"日本众参两院议长举行盛大招待会热烈欢迎邓颖超副委员长一行滩尾议长和邓副委员长共颂中日友谊展望两国关系美好前程","authors":[],"dates":[{"year":1979,"month":4,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社东京四月九日电　日本众参两院议长今天晚上举行盛大招待会，热烈欢迎以邓颖超副委员长为团长的中国人大代表团。滩尾议长和邓副委员长在会上共颂中日两国和两国人民的友谊，展望两国关系的美好前程。"},{"type":"paragraph","text":"今天，日本众议院议长公邸的大门前，飘扬着中日两国国旗。招待会大厅里灯火辉煌。"},{"type":"paragraph","text":"当邓副委员长一行到达会场时，众议院滩尾弘吉议长、三宅正一副议长和参议院安并谦议长、加濑完副议长在门口迎接，并陪同中国客人步入会场，日本国会议员纷纷上前同邓副委员长等热烈握手，问候致意。"},{"type":"paragraph","text":"滩尾议长在充满日中友好的热烈气氛中致词。他说:"},{"type":"paragraph","text":"“去年秋天，邓小平阁下访日，我们曾有机会亲切交谈。今年春天，又迎来了盼望已久的诸位。我相信，这对增进日中两国的友好关系和互相了解将作出很大贡献。我们对通过经济和贸易方面的交流而密切两国的关系自然感到高兴，并且相信，通过两国优秀的文化、学术和体育交流来培育两国国民心心相印的友谊，就会为日中关系开创出更加光明的前景。这才是联结两国的牢固的纽带。”"},{"type":"paragraph","text":"滩尾议长说:“不言而喻，日中两国的确具有丰富多彩的两千年交流的历史。可以说，日中两国的友好是扎根于两国国民之中的，是具有传统性的友谊。我确信，我们聚集在这里的人如果今后也象今晚一样，在和谐的气氛中开诚布公地会晤，那么，两国的亲善关系必将进一步发展。”"},{"type":"paragraph","text":"滩尾议长致词后，参议院议长安井谦祝了酒。"},{"type":"paragraph","text":"邓颖超副委员长在热烈的掌声中致答词。她对两位议长的盛情款待表示衷心的感谢，并代表中华人民共和国全国人民代表大会和叶剑英委员长，向日本国会、滩尾议长、安井议长以及国会议员和所有的朋友们致以亲切的问候和良好的祝愿。她对这次到日本来之后见不到已故的前众议院议长保利茂先生而感到惋惜和怀念，并对保利茂夫人表示亲切的慰问。"},{"type":"paragraph","text":"她在回顾了中国全国人大和日本国会的交往历史后说:“贵国众、参两院代表团去冬今春对我国的访问，增进了我国人大和贵国国会之间的相互了解和友谊。今天上午，我们很荣幸地拜访了你们众参两院，会见了许多老朋友，也结识了不少新朋友。我们在亲切友好的气氛中，共同展望了我们两国最高权力机构互相交流与合作的前景。我相信，我们双方这种交往的不断加强，对巩固和发展我们两国的友好合作关系、加深我们两国人民之间的传统友谊，具有十分重要的意义。”"},{"type":"paragraph","text":"邓副委员长说:“长期以来，贵国国会在促进日中友好和发展两国关系方面，作出了宝贵的贡献。一九七二年中日邦交正常化后，贵国国会作出了《关于日中联合声明的决议》，主张在联合声明各项原则的基础上，迅速缔结《日中和平友好条约》。去年，两国政府签订《中日和平友好条约》后，贵国国会又及时批准了这一条约，我们两国的友好合作关系从此进入了一个新的阶段。回顾战后三十年来中日关系的发展，我们不能不看到广大的日本国会议员朋友们，在各个阶段中所作出的不懈努力和重大贡献。在此，我愿代表我们全国人民代表大会和中国人民，向贵国国会和国会议员朋友们表示由衷的敬意!”"},{"type":"paragraph","text":"在丰盛的招待会上，宾主频频举杯祝愿中日两国关系日益发展。"},{"type":"paragraph","text":"罗青长、林丽韫副团长、符浩大使以及代表团全体成员应邀出席了招待会。"},{"type":"paragraph","text":"日方出席招待会的有二百多人，其中包括:自民党干事长斋藤邦吉、社会党副委员长下平正一、公明党委员长竹入义胜、民社党委员长佐佐木良作、新自由俱乐部代表河野洋平、社会民主联盟代表田英夫；日中友好议员联盟会长滨野清吾；日本内阁大臣古井喜实、江崎真澄、山下元利、金子岩三、上村千一郎；众参两院国会议员中曾根康弘、前尾繁三郎、矢野绚也、田川诚一、八百板正、永末英一、久野忠治、小林进、盐谷一夫、渡部一郎、楢崎弥之助。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2082ffbab7"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
