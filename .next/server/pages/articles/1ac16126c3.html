script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"卡斯特罗在庆祝荣获列宁国际和平奖金大会上说  保卫古巴主权就是保卫世界和平  只有剥削和掠夺消灭了的时候，战争才会消灭  肯尼迪的所谓“争取进步联盟”是大鱼吃小鱼的联盟","authors":[],"dates":[{"year":1961,"month":5,"day":22}],"is_range_date":false,"parts":[{"type":"paragraph","text":"卡斯特罗在庆祝荣获列宁国际和平奖金大会上说"},{"type":"paragraph","text":"保卫古巴主权就是保卫世界和平"},{"type":"paragraph","text":"只有剥削和掠夺消灭了的时候，战争才会消灭肯尼迪的所谓“争取进步联盟”是大鱼吃小鱼的联盟"},{"type":"paragraph","text":"据新华社哈瓦那20日电昨天晚上在古巴工人联合会的大礼堂里举行了有几千人参加的大会，祝贺卡斯特罗荣获列宁国际和平奖金。"},{"type":"paragraph","text":"卡斯特罗在会上讲话时指出，为争取反殖民主义的各国人民的独立、争取把各国人民从帝国主义统治下解放出来、争取消灭人剥削人的现象以及反对帝国主义和殖民主义而进行的斗争，就是争取和平的斗争。"},{"type":"paragraph","text":"卡斯特罗在今天清晨结束的长篇的讲话中说“在人类的历史上，战争发生的原因经常是剥削和掠夺。”殖民主义者和帝国主义者“威胁世界和平和使人类处于战争边缘。”“帝国主义、垄断集团、殖民统治和人剥削人的制度只有通过暴力、武力和武器才能在本世纪中保持它的存在。”卡斯特罗谴责帝国主义者和殖民主义者利用武力对安哥拉、阿尔及利亚、刚果、老挝和拉丁美洲国家进行统治和干涉。他说，“不反对帝国主义、殖民统治和干涉主义就不能赶走他们的舰队、他们的军队以及他们的战争威胁。”他强调指出，“只有当剥削和掠夺的哲学消灭的时候，战争的哲学才会消灭。”"},{"type":"paragraph","text":"卡斯特罗指出，古巴保卫主权也就是保卫世界和平。古巴人民最近击败帝国主义雇佣兵的胜利是对世界和平作出的一个贡献。他说，距离强大的帝国主义九十海里，古巴人民没有被它直接侵略的威胁和它的近代化武器的破坏力所吓倒。如果在古巴独立和主权面临着帝国主义者的侵略威胁的时候，古巴人民不使自己武装起来的话，那末帝国主义会毫不犹豫地血洗古巴的土地。"},{"type":"paragraph","text":"接着，卡斯特罗谴责了肯尼迪所谓的“争取进步联盟”，他说这是鲨鱼和拉丁美洲的小沙丁鱼之间的联盟。"},{"type":"paragraph","text":"卡斯特罗说，“人民不会把自己出卖给帝国主义的小恩小惠。”他说，帝国主义者正在教育拉丁美洲国家人民，“帝国主义只害怕奋起斗争的人民”。他说，“帝国主义也不能在他的野蛮、挑衅、侵略和好战政策中用核武器、干涉和暴力阻止住对古巴革命的同情。”"},{"type":"paragraph","text":"卡斯特罗说，古巴被美国的军舰包围着。哈瓦那人不断地看到美国军舰。哈瓦那人不断地在首都的海堤视线内看到帝国主义的军舰。最近，古巴一艘军舰被美国的一艘潜水艇在距古巴海岸十海里的地方击沉了。"},{"type":"paragraph","text":"卡斯特罗在谈到现阶段的革命任务时说，“革命已进入一个新阶段，已经必须规划宪法的问题、国家的宪法组织以及这一宪法在社会主义和民主基础上所应具有的形式。”"},{"type":"paragraph","text":"参加这次大会的有多尔蒂科斯总统、政府和各人民团体的领导人以及外交使团。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1ac16126c3"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
