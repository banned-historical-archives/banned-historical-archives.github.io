script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"丧失土地　深受剥削　流落异乡  意大利农民处境悲惨","authors":[],"dates":[{"year":1968,"month":11,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"丧失土地　深受剥削　流落异乡"},{"type":"paragraph","text":"意大利农民处境悲惨"},{"type":"paragraph","text":"本报讯　在意大利农村，封建主义的剥削和资本主义的吞并，使广大农民失去土地，流落异乡，生活困苦。"},{"type":"paragraph","text":"今天的意大利，一小撮地主占有大量耕地，而广大农民无地或少地。例如在撒丁地区，百分之一点八的地主占有百分之四十三点九的土地，百分之八十二点八的人则只占有百分之五十六点一的土地。许多农民不得不向地主租地，受地主的剥削。"},{"type":"paragraph","text":"受剥削最重的是牧民。地主把土地租给牧民，牧民们要向地主交出他们出售的产品毛值的百分之三十五到百分之七十。这一数字占牧业生产总收入的一半。牧民生产的奶制品卖出去还要受资本家的剥削。资本家垄断着一切，他们用压低价格来掠夺牧民。碰到天灾歉收，牧民们只得借债度日。而这些债用一年的收入也偿付不了。"},{"type":"paragraph","text":"资本家和封建地主穷凶极恶地压榨农民，迫使农民破产卖地，离乡背井到城市或外国去当苦力。从一九五一年到一九六七年被迫离开农村的农民，就有四百万以上。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1e901874c8"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
