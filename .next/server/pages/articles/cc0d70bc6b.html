script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"兰州化工公司职工给党委写信要求煞住机构日益庞大的歪风  机关要革命　机构要精简　作风要改变  公司党委虚心接受工人的批评，决心在批林批孔斗争中，批判那种否定无产阶级文化大革命的成果，开历史倒车的右倾思潮，坚决抵制修正主义路线回潮的现象","authors":[],"dates":[{"year":1974,"month":2,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"兰州化工公司职工给党委写信要求煞住机构日益庞大的歪风"},{"type":"paragraph","text":"机关要革命　机构要精简　作风要改变"},{"type":"paragraph","text":"公司党委虚心接受工人的批评，决心在批林批孔斗争中，批判那种否定无产阶级文化大革命的成果，开历史倒车的右倾思潮，坚决抵制修正主义路线回潮的现象"},{"type":"paragraph","text":"新华社兰州一九七四年二月十五日电　兰州化学工业公司合成橡胶厂的部分职工，一月二十九日写信给公司党委，批评公司的一些单位从基层大量往机关调人，使这些单位的机构日益庞大，机关人数逐渐增多，干扰了基层单位抓大事，抓路线，抓政治思想工作。信中指出，这是一种“倒退”、“回潮”现象，这样下去，势必造成机关脱离基层，干部脱离群众、脱离劳动；要求公司党委立即煞住这股歪风，真正做到精兵简政。"},{"type":"paragraph","text":"这封信说：“伟大领袖毛主席在无产阶级文化大革命中指示我们要‘精简机构’，‘下放科室人员’。毛主席的光辉指示，对于搞好上层建筑领域里的革命，对于反修防修，保证我们党和国家千秋万代永不变色，有着极其深远的意义。”"},{"type":"paragraph","text":"“但是，目前我公司一些单位借‘调整充实’之名，大量往机关调人。结果，机构越来越多、越来越大，这个科，那个室，五花八门，名目繁多，造成上面千条线，下面一根针。这个要材料，那个要报表；这个叫开会，那个叫汇报；往往同一件事情，几处都在跑，弄得下面应接不暇。一些基层干部整天忙于开会，纠缠于一些事务性工作中，严重地干扰了基层抓大事，抓路线，抓政治思想工作。”"},{"type":"paragraph","text":"“一九七四年中央两报一刊元旦社论号召我们，要继续搞好上层建筑领域里的社会主义革命，要继续搞好斗、批、改。这是摆在我们面前的一个艰巨的、长期的任务。新生事物的成长必然会遇到阻力，旧的东西总是不愿轻易地退出历史舞台。我们认为，目前一些单位机关人数的逐渐增多，机构的日益庞大，就是倒退，就是回潮。它违背了毛主席关于精简机构的指示，不利于培养无产阶级革命事业的接班人，更不利于反修防修。这样下去，势必造成机关脱离基层，干部脱离群众、脱离劳动，走到邪路上去，这是很危险的。我们殷切希望公司领导重温伟大领袖毛主席在无产阶级文化大革命中的一系列教导，认真讨论和分析当前机关的情况，发动群众制定出切实可行的机关革命化的措施。”"},{"type":"paragraph","text":"“机关要革命，机构要精简，作风要改变。”"},{"type":"paragraph","text":"“立即煞住一些单位机构回潮的歪风，真正做到精兵简政。”"},{"type":"paragraph","text":"兰州化学工业公司党委收到合成橡胶厂部分群众的信以后，十分重视。党委领导成员认真研究了这封信，表示虚心接受工人群众的批评，积极支持工人群众的意见。公司党委还把这封信发给所属单位的党委和党总支，要他们进行学习、讨论，检查领导作风和机关作风，严肃认真地对待信中提出的问题，坚决抵制修正主义路线回潮的现象。"},{"type":"paragraph","text":"公司党委认为，信中批评的机构日益庞大和机关工作人员逐渐增多，从一个方面反映了上层建筑领域里两个阶级、两条路线、两种思想的尖锐斗争。公司党委决心在批林批孔斗争中，联系当前两条路线斗争的大是大非问题，批判那种否定无产阶级文化大革命的成果，反对社会主义的新生事物，开历史倒车的右倾思潮，不断提高自己的阶级斗争和路线斗争觉悟，继续搞好斗、批、改，按照毛主席关于“国家机关的改革，最根本的一条，就是联系群众”的指示，进一步精简机构，下放科室人员，彻底转变领导作风和机关作风，纠正一切不正之风，同广大群众一起，落实党的十大精神，发展革命的大好形势。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"批林批孔","type":"主题/事件"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cc0d70bc6b"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
