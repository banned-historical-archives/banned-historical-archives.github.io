" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共北京市监察委员会关于开除李国瑞党籍的决定","authors":[],"dates":[{"year":1956,"month":1,"day":16}],"is_range_date":false,"parts":[{"text":"中共北京市监察委员会关于开除李国瑞党籍的决定","type":"title"},{"text":"李国瑞，男，现年31岁，天津市人，城市贫民出身，本人工人成分，1948年参加我党的外围组织“职工青年联盟”，1949年4月入党，北京解放后曾任北京市自来水公司工会主席、副经理。现任北京市人民委员会委员、市人民代表和北京市自来水公司经理，党内任自来水公司总支委员。","type":"paragraph"},{"text":"李国瑞和惯匪李国樑是同胞兄弟，解放前李匪抢来的大衣、戒指、手表等贵重物品，有的就送给李国瑞。1946年李匪被国民党政府逮捕，判徒刑8年。1949年1月北京解放前夕，李国瑞将李匪保释出狱。在解放后，李匪又纠合惯匪王惠民（已处决）、于万明、史鸿达（现在押）等继续伙同行抢3、4次（王匪在一次行抢中并曾打死我民警2人）。李国瑞不但包庇李匪等，听任他们继续行抢；而且直接参与他们的犯罪行为：为李匪隐匿枪枝、窝藏贼物、传递消息、密约与其他匪徒的会面地点。不久，因李匪同伙匪徒史鸿达行抢时枪伤事主，政府查出史匪所用枪枝是李匪的，遂将李匪逮捕。李国瑞（这时已入党）一方面多次亲自探监、送饭和棉衣等，对李匪关怀备至，另方面继续包庇李匪的罪行、掩盖自己的罪行，不向政府检举和交代。致李匪得以隐瞒真相，伪称手枪是解放前埋在城外被人窃走的，欺骗了政府，因而，只被按藏匿枪枝罪判处徒刑1年。","type":"paragraph"},{"text":"以后，李国瑞对李匪国樑和自己的上述罪行，一直对党和政府继续隐瞒，直至此次肃反运动中，由于在押犯人的检举，和李匪国樑被我政府重新逮捕后供出了材料，才查清以上事实。","type":"paragraph"},{"text":"李国瑞长期勾结包庇惯匪，窝藏枪枝脏物，并且从中取利，是混入党内的坏分子。为了纯洁党的组织，决定开除李国瑞的党籍，并且建议政府撤销其行政职务，将其依法处理。","type":"paragraph"}],"comments":[],"origin":"中共中央监察委员会办公厅编：《县委书记以上干部受到开除党籍处分的决定汇编（二）》（党内文件·注意保存），1960年。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8fca3d6fc2"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
