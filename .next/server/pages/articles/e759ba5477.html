script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji28","name":"毛泽东全集第28卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji28.pdf"],"article":{"title":"关于周恩来赴苏时间和谈判准备工作致中央电","alias":"","parts":[{"type":"paragraph","text":"关于周恩来赴苏时间和谈判准备工作"},{"type":"paragraph","text":"致中央电"},{"type":"paragraph","text":"（1950年1月5日）中央："},{"type":"paragraph","text":"一月四日七时半电悉。（一）周带十七人左右来此已说好，可以来，无问题。一月九日晚车由北京开车一点，亦已告知此间当局。（二）包尔汉、邓力群及伊犁贸易部长似以恩来到后两三天内即一月廿一日或廿二日抵达莫斯科为适宜，或与恩来同一天即一月十九日到达，请即决定告我。包、邓等来此所需交通工具，须由此间派飞机，还是由现在新疆之空运团指派一机担任，亦请决定电告。（三）谈判要点及准备工作，你们所指出的各点都是必须注意和必需准备的。既然是谈判，就须要展开谈一谈，将我们的观点说清楚。恩来动身后，请中央继续研究，随时以意见电告。关于贸易方面的材料，如果有五天内来不及准备好的，亦可于恩来走后继续准备，随时电告。"},{"type":"paragraph","text":"毛泽东一月五日上午六时"}],"authors":["毛泽东"],"dates":[{"year":1950,"month":1,"day":5}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":146,"page_end":146},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e759ba5477"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
