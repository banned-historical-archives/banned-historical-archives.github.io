script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"老挝万象市数万群众举行集会和示威游行  反对万象极右派破坏和平  《巴特寮新闻》指出王宝特种部队是老挝走向和平的障碍应予解散","authors":[],"dates":[{"year":1975,"month":5,"day":10}],"is_range_date":false,"parts":[{"type":"paragraph","text":"老挝万象市数万群众举行集会和示威游行"},{"type":"paragraph","text":"反对万象极右派破坏和平"},{"type":"paragraph","text":"《巴特寮新闻》指出王宝特种部队是老挝走向和平的障碍应予解散"},{"type":"paragraph","text":"新华社万象一九七五年五月九日电　万象市数万名工人、学生、职员、市民、军人、警察和各界群众五月九日上午集会和示威游行，反对万象极右派破坏和平和制造经济困难的罪行，敦促国防大臣西苏·纳占巴塞等万象方面的大臣立即辞职，要求美国中央情报局等美国特务机构全部撤出老挝。"},{"type":"paragraph","text":"这次集会和示威游行是由老挝恢复和平和实现民族和睦协调委员会的二十一个群众组织发起和组织的。"},{"type":"paragraph","text":"二十一个群众组织的负责人在集会上相继发表演说。他们揭露和谴责西苏等人亲美卖国、破坏和平、欺压人民、贪污舞弊和制造经济困难等罪行，并且号召广大群众团结起来，拿起武器，奋起斗争，解放万象和全老挝。他们的演说不时地被雷鸣般的掌声、口号声和欢呼声所打断。"},{"type":"paragraph","text":"会后，与会群众举行了游行示威。沿途，许多群众自动加入游行队伍，使队伍迅速扩大至三万多人。马路两旁，成千上万的群众，对游行队伍热烈鼓掌和欢呼。"},{"type":"paragraph","text":"当游行队伍经过美国驻老挝大使馆时，示威群众高呼“美国佬，滚出去！”等口号。"},{"type":"paragraph","text":"之后，游行队伍又聚集到国家体育场继续集会。二十一个群众组织发表一项联合声明，谴责帝国主义和新、老殖民主义对老挝的侵略和干涉。"},{"type":"paragraph","text":"声明指出，为在老挝实现和平、独立、中立、民主、统一和繁荣，老挝人民必须共同团结战斗，使国家得到完全的独立，使各族、各阶层人民享受完全的自由民主权利。"},{"type":"paragraph","text":"声明指出，那些反对和平和民族和睦、贪污舞弊的人应该离开国家的重要职位。西苏·纳占巴塞等极右反动派必须立即彻底从临时民族联合政府中滚出去。"},{"type":"paragraph","text":"新华社万象一九七五年五月九日电　《巴特寮新闻》五月九日发表一篇文章指出，王宝特种部队是老挝走向和平的障碍，早就应该解散。"},{"type":"paragraph","text":"文章在列举了由美国中央情报局直接豢养和指挥的王宝特种部队进攻解放区、破坏老挝和平和民族和睦的一系列罪行之后指出，王宝特种部队是老挝走向和平、独立、民主、中立、统一和繁荣的障碍。按照万象协定的规定，这支特种部队早就应该解散。支持这支部队的万象方面顽固派也应该清醒了。"},{"type":"paragraph","text":"文章警告说，如果王宝特种部队不自量力和再不有所收敛，各爱国武装力量就将行使自卫权利，把它们及其窠穴彻底消灭和摧毁。（附图片）"},{"type":"paragraph","text":"老挝人民解放军的英雄单位、某炮兵营的指战员们加强实战训练，准备随时反击老挝极右派破坏和平的阴谋。"},{"type":"paragraph","text":"新华社记者摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7410a594b3"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
