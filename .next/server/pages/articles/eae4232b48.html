script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"朝鲜《劳动新闻》发表评论  谴责日本极右分子组织“青岚会”","authors":[],"dates":[{"year":1974,"month":2,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"朝鲜《劳动新闻》发表评论"},{"type":"paragraph","text":"谴责日本极右分子组织“青岚会”"},{"type":"paragraph","text":"新华社平壤一九七四年二月十六日电　朝鲜《劳动新闻》二月十五日发表评论，谴责日本极右分子组织“青岚会”。"},{"type":"paragraph","text":"评论揭露了“青岚会”的反动实质，揭露了“青岚会”对朝鲜民主主义人民共和国的敌对态度。评论指出，“青岚会”在“死守南朝鲜”的口号下，暴露了它企图把南朝鲜变成日本殖民地的野心。这个集团还支持所谓“日本合众国”论——日本合并南朝鲜和中国的台湾省成为一个“国家”，并且妄图为实现这个目标而猖狂活动。"},{"type":"paragraph","text":"评论说：为此，“青岚会”诽谤和中伤反映南北朝鲜全体人民争取实现祖国自主和平统一意愿的南北联合声明，叫嚣对“要求朝鲜半岛统一的趋势”“必须提高警惕”，主张加强对朴正熙法西斯分子的支持和“援助”。"},{"type":"paragraph","text":"评论说：“众所周知，‘青岚会’为了破坏朝日两国人民的友好关系，正在进行各种阴谋活动，在背后鼓励和推动日本右派流氓对旅日朝侨学生的野蛮的暴行。”"},{"type":"paragraph","text":"评论说：“‘青岚会’正在加紧进行反对中国人民的阴谋活动。他们说什么今后日本必须同蒋介石集团进行‘更加紧密的合作’，公然暴露出企图攫取中国的神圣领土——台湾的强盗野心。”"},{"type":"paragraph","text":"评论说：“青岚会”狂妄地企图实现“大东亚共荣圈”的旧梦，加紧向东南亚进行扩张和侵略，他们鼓吹“必须向世界进军”，叫嚷“这正是青岚会的灵魂”。"},{"type":"paragraph","text":"评论说：“日本的法西斯化和向外侵略的道路，是已经受到历史严峻审判的老帝国主义者走过的自杀的道路。"},{"type":"paragraph","text":"“今天的亚洲人民已经不是过去落后的亚洲人民。觉醒的日本人民也决不会容许国家的法西斯化和向外侵略。”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"eae4232b48"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
