script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"老挝琅勃拉邦省和琅勃拉邦市建立新政权参加夺权的人民群众纷纷表示，决心保卫胜利成果，彻底　清除美帝的走狗——极右反动派，把老挝建成繁荣富强的国家","authors":[],"dates":[{"year":1975,"month":8,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"新华社万象一九七五年八月十九日电　据巴特寮电台广播，琅勃拉邦省和琅勃拉邦市各阶层人民八月十八日在琅勃拉邦市举行夺权大会，宣布推翻各级旧政权，建立从省、市到村的各级人民革命新政权。"},{"type":"paragraph","text":"夺权委员会在会上宣读一项声明，强烈谴责旧的腐朽政权的罪行，宣布建立新的琅勃拉邦省行政委员会、新的琅勃拉邦市行政委员会和新的市属县行政委员会。"},{"type":"paragraph","text":"夺权委员会在会上宣布，新的省、市行政委员会将尊重王位，直属临时民族联合政府和民族政治联合委员会领导。"},{"type":"paragraph","text":"夺权委员会还在会上公布了新政权提出的政治纲领。"},{"type":"paragraph","text":"参加夺权的人民群众纷纷表示，决心保卫革命胜利果实，彻底清除美帝国主义的走狗——极右反动派，把老挝建设成一个繁荣富强的国家。"},{"type":"paragraph","text":"另据老挝《人民之声报》报道，目前，老挝原万象方面控制区的夺权斗争正在深入发展。最近，万象市的一些乡和村相继建立了人民革命新政权，其中有西沙达那县的皮瓦乡、瓦索乡和宗森乡，赛塞塔县的农奔乡，以及西科达邦县的西开乡和北西坦乡。"},{"type":"paragraph","text":"老挝《人民之声报》八月十九日发表文章指出，在乡和村一级进行的夺权斗争是很重要的，因为要彻底推翻美国新殖民主义制度，就必须铲除它在乡和村的基础。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"夺权","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4cd6a3c2c3"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
