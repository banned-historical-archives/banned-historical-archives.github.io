" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji41","name":"毛泽东全集第41卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji41.pdf"],"article":{"title":"在河南九县讨论郑州会议讲话情况报告上的批语","alias":"","parts":[{"type":"paragraph","text":"在河南九县讨论郑州会议讲话"},{"type":"paragraph","text":"情况报告上的批语！"},{"type":"paragraph","text":"（1959年2月）"},{"type":"paragraph","text":"还有集中过多思想，即集中起来的权力、物力、人力过多了一点。"},{"type":"paragraph","text":"[1]这个批语写在中共河南省委四级干部会议办公室1959年2月27日夜整理的关于巩县、太康等九县干部讨论毛泽东当日在郑州举行的中共中央政治局扩大会议上的讲话的情况报告上。报告说，绝大多数干部听了主席指示的传达后，都表示非常拥护，讨论特别热烈。但由于大家思想没有准备，还存在着不少顾虑和糊涂认识。有人认为，生产队成了一级核算单位，这下不背大包袱了，但统一种植计划不好办了，工业化机械化速度慢了，抽调劳力不好办了，因此对人民公社统一调动人力、物力和财力的优越性发生怀疑。有人认为，这样搞公社还有什么权？生产队的权力大了，本位主义会更大。毛泽东的批语，就是针对这些情况而写的。"}],"authors":["毛泽东"],"dates":[{"year":1959,"month":2}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":280,"page_end":280},"tags":[{"name":"毛泽东","type":"人物"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"发言"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"97b60177dc"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
