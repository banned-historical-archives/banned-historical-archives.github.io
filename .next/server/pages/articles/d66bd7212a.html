script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"华沙数千群众游行表示不作任何人的奴隶","authors":[],"dates":[{"year":1979,"month":9,"day":4}],"is_range_date":false,"parts":[{"type":"paragraph","text":"华沙数千群众游行表示不作任何人的奴隶"},{"type":"paragraph","text":"新华社北京九月三日电  华沙消息：据西方通讯社报道，九月一日晚，波兰首都华沙约有两三千名群众手持火炬举行了游行，纪念第二次世界大战爆发四十周年。"},{"type":"paragraph","text":"据报道，这次游行和集会是由以前积极参加一个笃信天主教的民族主义团体——保卫人权运动——的持不同政见者组织的。"},{"type":"paragraph","text":"消息说，大约有两三千人在举行了纪念希特勒进攻波兰的周年日的追思弥撒后，从华沙古城的圣约翰大教堂出来组成了游行队伍。他们步行一公里走到华沙市中心的胜利广场。领头的人举着波兰的旗帜、火炬和横幅标语，在无名战士墓前举行了花圈安放仪式。"},{"type":"paragraph","text":"据消息报道说，有一个名叫约瑟夫·米哈尔·雅诺夫斯基的发言者宣称，波兰要与它所有的邻国友好相处，但是，波兰人“将不是任何人”的奴隶。"},{"type":"paragraph","text":"后来，一个年轻姑娘宣告波兰第一个持不同政见的政党——“独立波兰联合会”成立。报道说，这个新党的几名创始人已经被警察拘留。"},{"type":"paragraph","text":"华沙九月一日的游行示威是最近九个月来第三次大规模的未经批准的游行，都是由同样一些持不同政见者组织的。一次是去年十一月份波兰独立六十周年时举行的，另外一次是一个月以前，在华沙起义反对德国占领三十五周年的日子里举行的。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d66bd7212a"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
