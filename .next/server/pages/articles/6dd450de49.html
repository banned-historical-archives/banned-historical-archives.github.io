script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"非洲民族主义者谴责“开罗会议”破坏亚非反帝团结  现代修正主义者的分裂活动决不能得逞","authors":[],"dates":[{"year":1966,"month":6,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"非洲民族主义者谴责“开罗会议”破坏亚非反帝团结"},{"type":"paragraph","text":"现代修正主义者的分裂活动决不能得逞"},{"type":"paragraph","text":"新华社达累斯萨拉姆二十二日电　在这里的西南非洲和阿扎尼亚（南非）民族主义政党的领导人强烈谴责现代修正主义集团盗用亚非作家常设局的名义在开罗召开分裂会议。他们要求亚非国家的革命作家对分裂和破坏亚非人民团结反对以美国为首的帝国主义的活动提高警惕，并且指出，这种破坏亚非国家人民伟大的反帝事业的罪恶活动不会得逞。"},{"type":"paragraph","text":"西南非洲民族联盟泛非和外交事务书记韦尔纳·马穆格韦二十二日在这里向新华社记者发表谈话说：“我们反对大国沙文主义者的这种分裂活动。修正主义者为了挤入进步组织，往往采取在这些组织中制造分裂的手段，把这些组织变成为他们效劳的工具。”"},{"type":"paragraph","text":"他强调指出：“进步团体的任务是，联合起来，同现代修正主义的这些做法进行斗争，组成反对美帝国主义的强大力量。”"},{"type":"paragraph","text":"西南非洲民族联盟驻这里的代表阿·布伊斯对新华社记者说：“我们最强烈地谴责现代修正主义者的分裂活动。他们正在破坏亚非人民在反对以美国为首的帝国主义的正义斗争中的革命联系和革命活动。”"},{"type":"paragraph","text":"他指出，现代修正主义者的这种分裂活动，不仅是针对亚非人民的，而且是为了破坏全世界革命人民的革命事业。“因此，我们不能不对这些分裂活动表示我们的愤慨。我们要求亚非的革命作家对这种活动保持警惕，不要因为这种活动而气馁，应当继续斗争，激发各国革命人民的精神。”"},{"type":"paragraph","text":"阿扎尼亚泛非主义者大会二十二日在由教育书记彼得·拉波罗库和驻这里的首席代表戴维·西贝科签署的一项声明中说，阿扎尼亚泛非主义者大会要求停止破坏合法的亚非作家常设局。声明指出，常设局对全世界被压迫人民进行反帝斗争起着重要的作用。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6dd450de49"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
