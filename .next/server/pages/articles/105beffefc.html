script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"几本揭露资产阶级的作品","authors":["徐扬"],"dates":[{"year":1965,"month":11,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"几本揭露资产阶级的作品"},{"type":"paragraph","text":"今春以来，适应阶级教育的需要，适应广大读者的要求，人民文学出版社、作家出版社陆续出版了几本揭露资产阶级罪恶的作品。"},{"type":"paragraph","text":"《一张工票》和《药老虎发家史》是两本报告集。作者大多是受过资产阶级残酷压迫、剥削的工人和店员。他们以见证人的身份，以自己血泪斑斑的亲身经历，揭穿了资本家所谓“勤劳起家”的无耻谎言，控诉了资本家敲骨吸髓榨取工人的罪恶。"},{"type":"paragraph","text":"《文明地狱》、《血染三条石》和《天亮之前》等三部作品，是以真实生活为基础、又经过艺术加工创作出来的中篇小说。《文明地狱》通过解放前天津某毛纺厂工人悲惨境遇和反抗斗争的描写，戳穿了资本家“文明”的画皮。《血染三条石》以解放前天津有名的大街“三条石”为背景，画出了一家铁工厂资本家的狰狞的嘴脸，写出了一群徒工在这人间地狱里的辛酸的血泪史。《天亮之前》的背景是解放战争时期的上海。作品通过一个女包身工的成长，揭露了资本家令人发指的压迫剥削罪行，同时表现了中国工人阶级在中国共产党领导下的阶级觉醒和阶级反抗。这三部作品的篇幅都不长，但由于作者掌握了丰富的材料，特别是能以鲜明的无产阶级思想感情来驾驭材料，并在艺术上加以集中、概括、提高，因此都做到了内容充实，故事生动，具有相当的感染力量。"},{"type":"paragraph","text":"（徐扬）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"天津文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"105beffefc"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
