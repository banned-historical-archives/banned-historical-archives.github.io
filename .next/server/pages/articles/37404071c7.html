script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"开展反对资产阶级自由化正面教育  海军五百多师以上干部带头学理论","authors":["黄彩虹"],"dates":[{"year":1987,"month":4,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"开展反对资产阶级自由化正面教育"},{"type":"paragraph","text":"海军五百多师以上干部带头学理论"},{"type":"paragraph","text":"据新华社北京4月17日电  （记者黄彩虹）2月下旬以来，海军500多名师以上领导干部带头学习马列主义理论，为基层宣讲党的四项基本原则，指导部队深入开展反对资产阶级自由化的正面教育。"},{"type":"paragraph","text":"海军党委认为，要把部队反对资产阶级自由化的正面教育深入进行下去，各级领导干部首先要带头学好中央有关文件和马列主义理论。为此，海军领导机关为直属各大部门的领导和师以上干部举办了坚持四项基本原则理论讲座，邀请有关专家、教授系统讲授《关于反对资产阶级自由化》、《坚持党的领导》、《坚持马列主义、毛泽东思想》、《坚持社会主义道路》、《坚持人民民主专政，正确认识民主与自由》等5个方面的理论问题。海军领导同志和机关干部一起认真听讲，并深入到院校同学员们一起学习和探讨坚持四项基本原则、反对资产阶级自由化方面的理论问题，用自己的学习体会，帮助学员从理论上弄清宪法赋予我们的自由与资产阶级自由化、社会主义民主与资产阶级民主的本质区别。"},{"type":"paragraph","text":"海军一些军、师两级党委还采取集中时间或分期分批学习的形式，组织师以上干部学习《建设有中国特色的社会主义》、《坚持四项基本原则，反对资产阶级自由化》两本书。在掌握马列主义理论的基础上，军师领导干部分头下部队，给基层干部战士上理论辅导课，作宣讲。目前，全海军师以上领导干部深入基层抓坚持四项基本原则正面教育的试点单位已有25个。东海舰队某基地有7名军级领导干部分别到舰艇、海岛等偏远单位，巡回为基层宣讲四项基本原则。基地政委刘庆勇在830舰上，用了10天的时间，带领干部和水兵学理论，搞对比，作调查，系统进行四项基本原则的专题教育。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"37404071c7"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
