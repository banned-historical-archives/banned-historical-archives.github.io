script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"对美帝迫害美共领袖暴行　京市人民纷起抗议  美帝法西斯的行为，撕掉了资产阶级最后的一块“民主布”。","authors":[],"dates":[{"year":1949,"month":10,"day":21}],"is_range_date":false,"parts":[{"type":"paragraph","text":"对美帝迫害美共领袖暴行"},{"type":"paragraph","text":"京市人民纷起抗议"},{"type":"paragraph","text":"美帝法西斯的行为，撕掉了资产阶级最后的一块“民主布”。"},{"type":"paragraph","text":"【本报讯】美国反动政府无耻地判处十一位美共领袖徒刑的消息传到首都后，各界人民纷纷表示愤怒与抗议。华北农业机械总厂全体工人职员于二十日举行了全体大会，北京电话二局工人举行了座谈会。在会上工人们控诉了美帝暴行，认为这不仅是对美国工人阶级的无耻进攻，也是对全世界工人阶级的无耻进攻。他们一致表示坚决声援美国工人阶级。华北农业机械厂全体工人大会并发出宣言，向美国政府提出抗议，要求无条件释放美共领袖。华北电业分公司和大华密业厂工人也纷纷表示抗议。电业分公司王继美并致书美共主席福斯特表示慰问与声援。北京市农会筹备会主任柴泽民、委员苏民、刘刚亦发表谈话表示抗议。柴泽民说：“美帝正重复着墨索里尼、希特勒的道路。我们郊区六十四万农民体验到，只有共产党才是人民的救星，才有真正的民主。”他们号召全世界劳动人民团结起来，“把一切血腥的法西斯反动派打倒。”三区中共区委会宋国藩、韩冲、张玮、萧刚等在表示抗议美帝反动暴动之后说：这一举动正表示美帝的脆弱，他们已撕去了最后一块“民主布”，这一事件对于对美国式资产阶级“民主”抱幻想的民主个人主义者是一个很好的教育。北京师范大学学生会发表了抗议书，抗议书中说：“这是美帝为进行新战争挑拨及侵犯其本国人民利益的一系列罪行中最无耻的一页。……我们正告美帝法西斯匪徒们：你们这种可耻的“判决”，决吓不退为劳动人民利益奋斗的美国共产党，相反的更将唤醒激动广大爱好和平自由的美国人民。你们疯狂地向美国工人阶级进攻必遭失败！希特勒蒋介石的命运等待着你们！”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b6c52d6a02"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
