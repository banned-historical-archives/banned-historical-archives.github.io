script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"国务院办公室为庆祝中华人民共和国成立二十四周年举行招待会  欢迎台湾同胞、港澳同胞和海外华侨、外籍华人  叶剑英李富春邓小平傅作义廖承志蔡啸林丽韫出席邓小平致祝酒词","authors":[],"dates":[{"year":1973,"month":9,"day":30}],"is_range_date":false,"parts":[{"type":"paragraph","text":"国务院办公室为庆祝中华人民共和国成立二十四周年举行招待会"},{"type":"paragraph","text":"欢迎台湾同胞、港澳同胞和海外华侨、外籍华人"},{"type":"paragraph","text":"叶剑英李富春邓小平傅作义廖承志蔡啸林丽韫出席邓小平致祝酒词"},{"type":"paragraph","text":"新华社一九七三年九月二十九日讯  为庆祝中华人民共和国成立二十四周年，国务院办公室今晚举行招待会，欢迎前来参加国庆活动和观光的台湾同胞、港澳同胞和海外华侨、外籍华人。"},{"type":"paragraph","text":"中共中央副主席、军委副主席叶剑英，中共中央委员、国务院副总理李富春、邓小平，政协全国委员会副主席傅作义，中共中央委员廖承志、蔡啸、林丽韫，出席了招待会。"},{"type":"paragraph","text":"台湾同胞、港澳同胞，以及来自五大洲的海外华侨和外籍华人四百多人，出席了招待会。他们当中有：以费彝民为团长，高卓雄、周宏明为副团长的港澳各界人士代表团；以杨光为团长，马质彬、陈煌年为副团长的港澳工人代表团；以黄文钦为团长的我国台湾省旅日、旅美同胞乒乓球代表团和我国台湾省旅居西德同胞代表；以李南辉为领队、陈济明为名誉领队的我国旅美台湾省同胞和留学生篮球队；以博仁特古斯为团长，李天图、吕漱石为副团长的我国旅日华侨代表团；以张廖富源为团长、刘正为副团长的我国台湾省旅日同胞观光团；我国台湾省籍留日学生回国参观团；以郑嘉乐为团长的我国旅居澳大利亚悉尼华侨、澳大利亚籍华人旅行参观团；以陈兆昌为团长的马达加斯加华侨回国观光团。"},{"type":"paragraph","text":"招待会在人民大会堂宴会厅举行。宴会厅里悬挂着我国人民伟大领袖毛主席的巨幅画像，两边是十面鲜艳的红旗。"},{"type":"paragraph","text":"邓小平副总理在招待会上致祝酒词。他首先代表伟大领袖毛主席、中国共产党中央委员会和国务院，向出席招待会的各位台湾同胞、港澳同胞和海外侨胞，表示热烈的欢迎和亲切的问候。"},{"type":"paragraph","text":"邓小平副总理谈到了伟大祖国在毛主席的英明领导下，二十四年来在社会主义革命和社会主义建设各条战线上，取得的巨大胜利。他说，不久前，中国共产党胜利地召开了具有重要历史意义的第十次全国代表大会，选举了以毛主席为首的第十届中央委员会，宣告粉碎了林彪反党集团。在毛主席无产阶级革命路线指引下，我们的党更加团结，我们的人民解放军更加坚强，我国的无产阶级专政更加巩固，我国的各项建设事业呈现一片兴旺景象。目前，全国各族人民正满怀信心，在以毛主席为首的党中央领导下，为胜利完成党的十大提出的各项战斗任务而努力奋斗。"},{"type":"paragraph","text":"邓小平副总理说，“大家知道，我们的侨胞过去在发展当地经济建设，促进中国人民和各国人民的友好方面作出了贡献。我们希望他们继续同侨居国人民友好相处，虚心学习侨居国人民的长处，遵守所在国的法令。我们保护华侨的正当权益。他们中许多人已经加入所在国国籍，我们赞成他们的选择。我们相信，他们将对自己的国家作出更多的贡献！”"},{"type":"paragraph","text":"他说，“台湾省是祖国神圣的领土，台湾同胞是我们的骨肉兄弟。我们对台湾同胞寄与无限的关怀。台湾同胞只有回到祖国的怀抱，才有光明的前途。我们希望一切爱国的同胞，本着‘爱国一家，爱国不分先后，的精神，为解放台湾，统一祖国的伟大事业贡献自己的力量。”"},{"type":"paragraph","text":"邓小平副总理的讲话，不断激起全场的热烈掌声。"},{"type":"paragraph","text":"在充满欢乐气氛的招待会上，我国领导人、各界人士和首都群众代表、归国华侨，同台湾同胞、港澳同胞和海外侨胞欢聚一堂，畅叙骨肉情谊。席间，大家频频举杯，不断为伟大的社会主义祖国的繁荣昌盛，为实现解放台湾、统一祖国的伟大事业，为台湾同胞、港澳同胞、海外侨胞的爱国大团结，为中国人民和各国人民的友谊，为伟大领袖毛主席的健康长寿，干杯！"},{"type":"paragraph","text":"出席招待会作陪的有："},{"type":"paragraph","text":"人大常委会委员王淦昌、卢汉、庄希泉、严济慈、林兰英、林巧稚、罗叔章、赵忠尧、谢扶民；"},{"type":"paragraph","text":"政协全国委员会常务委员于树德、王芸生、王雪莹、孙晓村、苏子蘅、闻家驷、钟惠澜；"},{"type":"paragraph","text":"政府部门、北京市革命委员会等有关方面负责人罗青长、丁国钰、庄则栋、吴庆彤、马文波、何英、李金德、童小鹏、连贯、陈洁、郭鲁、黄政基、方皋、赵正洪、钱信忠、李琦、江东平、肖剑秋、吴印咸、缪海棱、经普椿、王浩、沈晨；"},{"type":"paragraph","text":"各界人士黄长水、吴阶平、田富达、李纯青、陈文彬、徐萌山、宋希濂、侯镜如、陈离、林盛中、江重光、李蒸、宋伟斌。（附图片）"},{"type":"paragraph","text":"国务院办公室举行招待会，欢迎前来参加国庆活动和观光的台湾同胞、港澳同胞和海外华侨、外籍华人。"},{"type":"paragraph","text":"新华社记者摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"叶剑英","type":"人物"},{"name":"李富春","type":"人物"},{"name":"廖承志","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"03001e5da5"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
