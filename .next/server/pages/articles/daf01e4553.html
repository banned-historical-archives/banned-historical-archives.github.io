" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji9-2","name":"毛泽东全集第9卷(2)","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji9-2.pdf"],"article":{"title":"对胡军勿作优敌，应尽力争取","alias":"","parts":[{"type":"paragraph","text":"对胡军勿作仇敌，应尽力争取！"},{"type":"paragraph","text":"（1936年11月30日）"},{"type":"paragraph","text":"我们完全同意张的建议，希望立即采取如下具体办法：（一）首先释放一部分俘虏，勿骂其长官。（二）用诚恳和气与尊重彼方态度，分别写信致胡宗南、孔令恂、周祥初。（三）派人到豫旺见胡。（四）用毛、朱、张、周及各方面军各军团各军首长名义，发表告胡军官佐士兵书，简单明了说明停战议和、一致抗日的志愿。"},{"type":"paragraph","text":"[1]这是毛泽东致彭德怀电的主要内容。该电报通报胡宗南败后其内部充满联俄容共、一致抗日空气，张学良建议“对胡军勿作仇敌，应尽力争取”。"}],"authors":["毛泽东"],"dates":[{"year":1936,"month":11,"day":30}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":25,"page_end":25},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"daf01e4553"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
