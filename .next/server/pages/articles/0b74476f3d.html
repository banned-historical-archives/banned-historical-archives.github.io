script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"我们种了马铃薯　算算反而要亏本肥料太贵了，因为中间商的剥削太重。龙华区一群农民请求当局帮助解除困难。","authors":["纪康","陈火余","陈锡杨"],"dates":[{"year":1949,"month":7,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"编辑先生:我们是龙华区\u003cIMG alt=请插入2号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1949\\07\\49780408AA.JPG\"\u003e上村的农民，我们有一个关于农业生产上的问题，要求我们的政府当局注意这件事，快快来帮助我们解决。"},{"type":"paragraph","text":"本区农地大都种植菜蔬和马铃薯，尤其以马铃薯的种植最多。但是本期种植马铃薯的农民，没有一个不被剥削得无法生存。我们现在把本期种植马铃薯每亩的成本和收入计算在下面:"},{"type":"paragraph","text":"收入:每亩收获15担每担子500元=2250元"},{"type":"paragraph","text":"成本:每亩种籽2担半每担子1500元=3750元"},{"type":"paragraph","text":"(肥料)"},{"type":"paragraph","text":"每亩人粪60担=1600元(人粪60担售米1石，买粪用米计算)"},{"type":"paragraph","text":"每亩人工艺工每工800元=9600元(人工每工以米五升计，)29350元"},{"type":"paragraph","text":"2935元-22500元=6850元(亏蚀)"},{"type":"paragraph","text":"附注:米价每石16000元时，马铃署每担子1500元"},{"type":"paragraph","text":"我们流汗出力的结果，每亩田上要亏这么计多钱!而这还是自耕农的情形，至于租种人家地的那更是痛苦!像这样下去，谁还愿种田耕地呢?但是我们是农民，不种又怎么样?"},{"type":"paragraph","text":"我们发觉我们的痛苦是由于中间商的剥削太重——最吃亏就在肥料上面，在市区人家出了钱卖出粪便，而我们郊区的农民却要以一石白米的代价，换进六十担清粪(薄质粪)。我们有时用自由车到市区买些自己踏回家，每担浓粪只有二百五十元，回家可以化成清粪五六担。但是我们个别零星去买，人工实在吃不消!因此我们只有向专运粪便的船户去买。"},{"type":"paragraph","text":"是不是我们可以集团用船到市区自己大量采运呢?没有解放前我们早想到过这点，但是我们当时是无法插进粪码头的，就是宁愿挨打受骂还是得不到肥料的!现在上海解放了，是不是已有了合理的改进呢?我们要求政府注意这件事。"},{"type":"paragraph","text":"肥料太贵了，大家只有少施肥，于是土地渐渐变成瘦劣，减少了农作物的产量。这对国家是个多么大的损失!有人说农民可以改用化学肥料，但是上海郊区，土质如何，谁都没有精确的试验过，同时农业改良非经过几期试验是不行的。"},{"type":"paragraph","text":"我们农民为了生存，为了增产，为了不再继续贫困下去，我们发出这样一个要求，希望大家帮助我解决!祝撰安龙华区\u003cIMG alt=请插入2号盘，按F5键刷新后显示本插图！ src=\"D:\\inset\\1949\\07\\49780408AA.JPG\"\u003e上村农民陈锡杨，陈火余、曹纪康、陈福余、魏永兴、陈锡品、陈锡祺、魏厚生、余见兵、陈伯余、陈坤余、陈龙其、魏友祥、陈念全、同上七月四日"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"0b74476f3d"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
