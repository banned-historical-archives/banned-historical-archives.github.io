<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"清除极左  调整班子  增强团结  振奋精神  山西运城地区变化喜人","authors":["晋学苏","王艾生"],"dates":[{"year":1982,"month":1,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"清除极左  调整班子  增强团结  振奋精神"},{"type":"paragraph","text":"山西运城地区变化喜人"},{"type":"paragraph","text":"本报讯  记者王艾生、通讯员晋学苏报道：山西省运城地区近两年来，清除极左影响，人民生活得到进一步改善。农民赞扬说：没粮变有粮，粗粮变细粮，缺钱变有钱，破房变新房。"},{"type":"paragraph","text":"运城地区是山西省著名的棉麦产区，全区13个县的930万亩耕地中，水地就有390万亩，每人平均有水地一亩一分。土地平坦，自然条件很好。但是，在粉碎“四人帮”之后，原地委书记张怀英，违背党中央政策，自立清查标准，借机打击报复，迫害大批干部和群众。农业上硬性推广极左一套，以"},{"type":"paragraph","text":"“真学大寨”为名，盲目扩大麦田，挤掉了棉田、经济作物和苜蓿，有的地方甚至提出“粮食要过千，多种三尺三（高粱）”，破坏了农业内部结构的平衡。党的三中全会方针、政策不能很好贯彻执行，生产停滞，人民生活得不到应有的改善。正象农民说的：“守着刮金板，腰里没有钱”，缺钱少粮的穷困面貌改变不大。"},{"type":"paragraph","text":"党中央和山西省委很关心运城地区的问题，派出工作组依靠群众，彻底揭露并查清了张怀英的问题，调整了地委领导班子。"},{"type":"paragraph","text":"改组后的中共运城地委坚决贯彻党的三中全会方针政策，落实胡耀邦同志和其他中央领导同志代表党中央对山西工作的指示。坚决为在清查中被错整的原地委副书记王景康同志等干部和群众平反。给需要做平反结论的1，520人，作出平反结论。为412名被错误撤职和停职的干部恢复职务。错误一旦纠正，团结振奋的面貌就开始出现。全区城乡民气顺，正气升，社会秩序较安定。1981年河津、夏县、芮城等县刑事案件的发案率显著下降，全区1981年下半年比上半年刑事案件发案下降172件。"},{"type":"paragraph","text":"运城地区99．9％的生产队实行联产责任制（其中“双包”队占87．2％）。“责任到了人，土地变成聚宝盆；责任到了户，双手成了摇钱树。”农民们因地种植，调整了农业内部结构，挖掘土地潜力，讲究经济实效。1981年在遭受严重旱涝灾害的不利情况下，除棉花外，粮食、花生、芝麻、瓜菜等都获丰收。全区粮食总产二十二亿三千余万斤，比1980年增加5．3％，农业总收入六亿二千余万元，比1980年增加25％，其中多种经营收入3亿多元，比1980年增加10％，油料总产4，800余万斤，比1980年增加4．9倍。"},{"type":"paragraph","text":"运城人民丰收不忘国家，超额1，000余万斤完成粮食征购任务，棉花收购进度也较快。全区人均口粮373斤，比1980年增加34斤。据概算，1981年人均分配85．70元，比1980年增加6．30元。出现人均收入分配1，000元以上的户349户，人均500元以上的生产队50个，人均300元以上的大队11个。全区有1，613个穷队变成较富裕的队。农民喜气洋洋欢庆丰收。有的生产队请蒲剧团下乡演出，有的包专场电影，农贸市场分外热闹，农副产品丰富，粮价平稳。农民手头有钱，首先用来安排生产，踊跃购置生产资料。全区社员集资购买大中小型拖拉机3，517台，中小农具10，246件，比1980年增加一倍。农民个人购买化肥5，000多吨，买回大牲畜5万多头，全区13个小化肥厂生产的化肥，曾一度积压，在1981年种麦时节被社员抢购一空。"},{"type":"paragraph","text":"随着生产的发展，农民群众生活也进一步得到改善。全区农民储蓄达1亿多元，比1980年增加46．9％，平均每个农民储蓄31元。近两年全区社员共盖新房30多万间。地处中条山区的垣曲县，集体收入、积累、社员分配和口粮都大为增加，近两年农民共盖新房3万多间，平均每4人有1间新房。永济县的韩阳公社多年来人均口粮只有200斤，每年要吃返销粮600多万斤，欠国家贷款80万元。1981年他们因地种植，适当扩大棉花、花生、芝麻、瓜菜等经济作物面积6，000亩，总收入增加46万元，人均分配增加120元，口粮也增加到400斤以上。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"山西文革","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"aa6ac2def0"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
