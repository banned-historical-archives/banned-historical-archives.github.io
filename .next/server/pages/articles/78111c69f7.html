script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"以革命统帅生产　以出色成绩向毛主席汇报国棉三十厂提前超额完成全年总产值全厂革命职工戒骄、戒躁，进一步掀起斗、批、改新高潮，争取超产再超产","authors":[],"dates":[{"year":1968,"month":10,"day":17}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　在热烈欢迎从毛主席身边光荣归来的工人代表的大喜日子里，上海国棉三十厂传出了振奋人心的生产捷报:一九六八年的总产值已提前两个半月在十六日超额完成了!今天，国棉三十厂广大革命职工正以战斗的姿态，豪迈地跨进了一九六九年!这是战无不胜的毛泽东思想的伟大胜利，是无产阶级文化大革命的丰硕成果。"},{"type":"paragraph","text":"我们最最敬爱的伟大领袖毛主席发出“认真搞好斗、批、改”和“我国有七亿人口，工人阶级是领导阶级。要充分发挥工人阶级在文化大革命中和一切工作中的领导作用”的光辉指示，极大地鼓舞了国棉三十厂广大革命职工，他们怀着对毛主席无限热爱、无限忠诚的深厚阶级感情，狠抓革命、猛促生产。九月份，当他们听到伟大领袖毛主席和他的亲密战友林副主席亲自批准邀请七百名上海工人代表赴京参加国庆观礼的喜讯后，全厂广大革命职工欢欣鼓舞，更加感到肩上的重任，决心掀起斗、批、改新高潮。"},{"type":"paragraph","text":"国棉三十厂广大工人在斗、批、改新高潮中，狠抓阶级斗争不转向，深入持久地开展革命大批判，以本厂党内一小撮走资派以及叛徒、特务为活靶，狠批中国赫鲁晓夫修正主义建党路线和企业路线。"},{"type":"paragraph","text":"革命大批判会一个接着一个，全厂开，车间开，班组开，大大提高了广大工人政治觉悟。他们坚决落实毛主席一系列最新指示，认真搞好斗、批、改。全厂组织了六个斗、批、改工人调查小组，深入到原科室部门进行调查。在这基础上举办了斗、批、改展览会，为进一步开展革命大批判，搞好斗、批、改提供了活材料。广大革命职工对在中国赫鲁晓夫修正主义建党路线和干部路线以及修正主义企业路线控制下所设置的一整套不合理规章制度进行了彻底批判和改革。通过革命的大批判，生产迅速上升。例如，纺部过去订定的一个支数纱一定要用一个号头钢丝圈的旧规章，使车速无法提高，大大影响产量上升。在斗、批、改高潮中，工人把这个旧规章冲掉后，选用了最适合的钢丝圈，使车速大大提高，产量直线上升，创造了棉纱单产四十四点五四公斤的先进水平。在斗、批、改群众运动的推动下，棉布单产水平也有了提高。"},{"type":"paragraph","text":"厂革委会在抓革命、促生产中，注意抓人的思想革命化，大办抗大式毛泽东思想学习班，落实毛主席一系列最新指示。他们一方面，在全厂实行精兵简政，把大批科室干部下放车间劳动，接受工人阶级再教育；另一方面，又着手抓好班组建设。一个大学人民解放军，创造四好班组的群众运动正在开展。织部甲班四工区和纺部甲班细纱第二组工人都订出了规划，提出了保证，要学习解放军的优良传统，大兴三八作风，为实现人的思想革命化而努力。在这个基础上，工人群众发扬了勇敢战斗、不怕牺牲、不怕疲劳和连续作战(即在短期内不休息地接连打几仗)的作风。干劲冲天地夺得了高产，提前和超额完成了今年全年总产值，以出色成绩迎接从毛主席身边光荣归来的战友，向毛主席汇报。他们决心牢记毛主席“我们应该谦虚，谨慎，戒骄，戒躁，全心全意地为中国人民服务”的伟大教导，以革命统帅生产，高举革命批判大旗，进一步掀起斗、批、改新高潮。同时，开展技术革新和技术革命的群众运动，争取在今年最后两个多月时间内超产再超产，生产更多的棉纱、棉布，为夺取无产阶级文化大革命全面胜利而奋斗。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"革命大批判","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"78111c69f7"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
