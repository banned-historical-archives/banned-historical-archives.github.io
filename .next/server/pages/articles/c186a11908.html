script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"陕西省委工作组向志丹县人民传达中央负责同志的指示  发动群众揭批“四人帮”解决志丹县问题","authors":[],"dates":[{"year":1978,"month":7,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"陕西省委工作组向志丹县人民传达中央负责同志的指示"},{"type":"paragraph","text":"发动群众揭批“四人帮”解决志丹县问题"},{"type":"paragraph","text":"本报讯　六月下旬，由中共陕西省委书记李尔重同志带领的省委工作组，到达志丹县以后，传达了华主席为首的党中央对陕北老革命根据地人民的亲切关怀，发动全县广大干部群众，深揭狠批“四人帮”，拨乱反正，大张旗鼓地解决志丹县存在的严重问题。"},{"type":"paragraph","text":"省委工作组到达志丹县的第二天，立即召开全县广播动员大会，传达中央负责同志的重要批示。六月二十三日，由省、地、县三级二百三十人组成的工作队，分赴全县十一个公社，分片包干，组织群众大学习，大宣传，很快地把中央负责同志的重要批示传达到群众中，家喻户晓，人人皆知。"},{"type":"paragraph","text":"省委负责同志连续召开受害群众、老红军、老干部和县级中层领导干部座谈会。并爬山涉水，分头深入到问题严重的地区和公社，走队串村，挨门逐户，宣传中央负责同志的重要批示，同干部、群众促膝恳谈，了解疾苦，倾听意见，对志丹县问题进行全面调查。"},{"type":"paragraph","text":"志丹县广大干部、群众一遍又一遍地学习中央负责同志的重要批示，心情十分舒畅。他们欢呼：“共产党又回来了”。参加过长征的老红军战士严和廷表示，要拿出当年爬雪山、过草地的劲头，和全县人民一起，把志丹县问题解决好。十多天来，广大干部、群众贴出一批又一批大字报，送来一份又一份检举揭发材料。在省委工作组驻地和工作组同志所到之处，从早到晚，来访群众络绎不绝，他们怀着强烈的革命义愤，揭发志丹县存在的严重问题，诉说遭受迫害的惨痛情形，满腔热情地帮助工作组全面了解志丹县的问题。"},{"type":"paragraph","text":"广大干部群众揭发的大量事实说明，由于林彪、“四人帮”反革命修正主义路线的干扰破坏，近几年来，县委主要领导人歪曲了大寨的根本经验，犯了严重的路线错误。他们违背毛主席关于革命接班人的五项条件，提拔重用了一批所谓敢打敢斗的“老虎干部”。这些人违法乱纪，打击报复，强迫命令，残酷地摧残社员群众；他们为了争个人名誉，大搞瞎指挥和浮夸，使农业生产受到严重影响，给全县人民带来深重灾难，造成十分严重的后果。粉碎“四人帮”以后，这个县揭批“四人帮”的斗争一直冷冷清清，捂盖子，掩饰错误，压抑群众，使问题得不到解决。"},{"type":"paragraph","text":"通过直接接触群众和深入调查研究，省委工作组为了大张旗鼓地贯彻中央负责同志的重要批示，迅速揭开志丹县委阶级斗争的盖子，最近依法捕办一些残酷迫害群众、造成严重后果、民愤很大的犯罪分子，以及进行阶级报复的坏人；对一些犯有严重错误、被提拔重用的干部，分别采取了停职检查和隔离审查等组织措施。同时，调来新的县委书记和其他领导干部，加强县委领导班子。六月二十八日晚，召开广播大会，向全县宣布了这些决定，广大干部群众欢欣鼓舞，奔走相告。有的老贫农热泪盈眶地说：“华主席为首的党中央，真是英明伟大。”对那些违背毛主席革命路线和党中央规定的“土政策”，发出通知，坚决废除。同时，做过细的思想政治工作，引导犯有一般错误的同志，积极主动地到群众中去，赔礼道歉，改正错误，大力恢复和发扬党的光荣传统和优良作风。对受害的干部、群众，该平反的平反，应治疗的治疗，对受到经济损失的给予补偿，生活困难的给予适当安排。"},{"type":"paragraph","text":"工作组决心继续深入发动群众，联系志丹县存在的严重问题，肃清“四人帮”反革命修正主义流毒，端正学大寨的方向。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"name":"陕西文革","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"c186a11908"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
