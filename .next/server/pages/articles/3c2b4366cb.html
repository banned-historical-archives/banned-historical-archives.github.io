script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"贵州各地在兴修水利中不断发生火药爆炸事故","authors":["谷克东"],"dates":[{"year":1958,"month":4,"day":3}],"is_range_date":false,"parts":[{"text":"沧县破获学生反动活动案件六起","type":"title"},{"text":"谷克东","type":"authors"},{"text":"新华社保定2日讯　最近沧县破获青年学生的反动活动案件六起。成员都是在校的学生和回乡生产的学生。","type":"paragraph"},{"text":"在泊镇市一个师范学校里就有三十多个有反动言行的学生，其中由三人组成的反革命小集团，活动很猖狂。吴桥县木庄乡发现的反动标语上写着：“我长大了一定要起义，今年火烧木庄乡。蒋主席万岁”。沧县高官屯学生张文起在2月间企图号召青年们起来叛乱，在“新民党宣言”上写道：“各位青年傻瓜们，你们还在昏迷吗？现在把人当牛马，还不觉悟，我们准备举行大规模的起义，参加的已有一百五十名，你愿意参加这个起义团，马上到高官屯南里松林去报名。”兴济镇狩厂村发现的以陈德木、李中凯为首组织的反动集团(共六人)，公开在墙上写“打倒共产党”等反动口号。泊镇二中学生刘志鹏(家庭原是没落地主)，散发发展反动组织、重建国号的反动计划的传单，声言要组织“四民党”。他还准备回到家乡，组织民校，拉拢青年，企图暴乱。","type":"paragraph"},{"text":"据有关部门负责人的分析，这些青年学生进行的反动活动的原因，一方面是因为有的学生是反动阶级家庭出身，或者是被斗被镇压的反动分子的子弟，受家长的影响；另一方面是有些学生对回到农村参加农业生产有抵触情绪，学生回到农村后又受到一些落后群众的影响，看到村、社干部的一些缺点，怨气越来越大，便走上了反动的道路。","type":"paragraph"}],"comments":[],"origin":"1958年4月4日新华通讯社编《内部参考》。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"3c2b4366cb"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
