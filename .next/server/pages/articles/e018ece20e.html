script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji37","name":"毛泽东全集第37卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji37.pdf"],"article":{"title":"关于调查河北县尚庄乡联盟农业合作社问题的批语","alias":"","parts":[{"type":"paragraph","text":"关于调查河北涿县尚庄乡联盟农业合作社问题的批语"},{"type":"paragraph","text":"（1957年2月24日）此件寄河北省委马国瑞同志："},{"type":"paragraph","text":"此件所说是否属实，原因何在，请派人去遂县尚庄乡切实调查一下，以其结果告我为盼！"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"二月廿四日"},{"type":"paragraph","text":"[1]指莫余平关于河北省逐县尚庄乡联盟农业生产合作社1956年生产情况的调查与整社意见的报告。莫余平，任冶金工业部金属回收管理局副局长，当时正在中央高级党校学习。这个报告是他利用寒假回乡探亲时写的。报告说：现在农民的生产情绪低落，社员不愿上工，积肥不积极；1956年灾情同上年差不多，但减产严重，农民收入普遍下降；有的地方出现宰杀耕畜和强行把大车、牲口拉回家的现象。报告认为1956年大量减产是人为的灾害，是主观主义、强迫命令和组织管理不善造成的。主要是生产计划指标过高；强行盲目推广新技术；耕作粗糙，荒地不少；收割时随便把粮食丢在地里糟蹋了；副业生产搞得不好。报告还反映了社员对社领导和党支部的意见，说社领导强迫农民入社、投资，作风不民主，经济不公开，办事不公平，关心社员少，干部之间闹宗派，党支部包办社的工作等，因而社员思想极为混乱，任其发展下去，合作社有垮台的危险。"},{"type":"paragraph","text":"[2]马国瑞，当时任中共河北省委书记处书记。"}],"authors":["毛泽东"],"dates":[{"year":1957,"month":2,"day":24}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":290,"page_end":290},"tags":[{"name":"毛泽东","type":"人物"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e018ece20e"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
