script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"批判极左路线 落实各项政策  富平县户户自养奶山羊","authors":[],"dates":[{"year":1979,"month":8,"day":13}],"is_range_date":false,"parts":[{"type":"paragraph","text":"批判极左路线 落实各项政策"},{"type":"paragraph","text":"富平县户户自养奶山羊"},{"type":"paragraph","text":"新华社西安八月九日电  我国著名的奶山羊基地陕西省富平县，目前社员自养的奶山羊已由去年年底的七万六千只增加到十一万多只，达到一户一只；羊只日产奶量普遍比去年增加一斤左右。今年上半年，  除社员自食自用外，已提供商品奶六百三十多万斤，接近去年全年的总和。"},{"type":"paragraph","text":"奶山羊是一种小体型草食奶畜，饲养、管理方便，不占用主要劳动力，而且投资少，收益大，见效快。饲养奶山羊是一种很好的家庭副业。社员养一只奶山羊，一年可以收入一百二十元到一百五十元，还可以积攒到不少的优质粪肥。早在四十年代，富平县的农民就开始饲养奶山羊。但是前些年，在林彪、“四人帮”推行的极左路线的干扰破坏下，有些地方竟把社员家庭养羊说成是“资本主义倾向”；县、社干部中也有不少人怕背上搞“复辟倒退”的黑锅，不敢理直气壮地支持社员家庭养奶山羊，结果奶山羊发展缓慢。近两年来，特别是党的十一届三中全会以来，这个县狠批了极左路线，落实了党在农村的各项政策，干部、群众思想解放，奶山羊生产也获得了大发展。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"63e928cd40"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
