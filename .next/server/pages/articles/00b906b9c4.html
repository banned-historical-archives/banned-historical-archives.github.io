script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"工总司举行向门合同志学习，开展“三忠于”活动誓师大会在阶级斗争中建设“忠”字化的指挥部总部和各级联络站全体人员要在两条路线斗争中，带头活学活用毛泽东思想，不断提高路线斗争觉悟，促进思想革命化","authors":[],"dates":[{"year":1968,"month":6,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　坚决响应以毛主席为首、林副主席为副的无产阶级司令部发出的号召，贯彻执行上海市革命委员会的通知和“工总司”的决定，向无限忠于毛主席革命路线的好干部门合同志学习，深入持久地开展“三忠于”活动，把领导班子建设成为“忠”字化的无产阶级战斗指挥部。这是“工总司”总部和各区、县、局、公司联络站的全体工作人员在昨日誓师大会上发出的庄严誓言。"},{"type":"paragraph","text":"“工总司”昨日举行高举毛泽东思想伟大红旗，向门合同志学习，深入持久开展“三忠于”群众活动誓师大会。“工总司”总部和各级联络站工作人员一千多人出席了这次大会。参加大会的还有中国人民解放军驻各局毛泽东思想宣传队、区人民武装部和各联络站的同级革委会的代表。"},{"type":"paragraph","text":"在誓师大会上，邮电系统联络站和毛巾被单工业公司联络站等单位的代表，先后介绍了本站工作人员活学活用毛泽东思想、促进思想革命化和组织革命化的情况和经验，表达了坚决响应以毛主席为首、林副主席为副的无产阶级司令部的战斗号召，认认真真、老老实实地向门合同志学习的决心。"},{"type":"paragraph","text":"“工总司”负责人在会上讲了话。"},{"type":"paragraph","text":"大会指出，由毛主席和林副主席亲自树立的伟大典型门合同志，是在无产阶级专政条件下继续进行革命的党的好干部的光辉榜样，是无限忠于毛主席革命路线的时代英雄，是广大无产阶级革命派学习的典范。学习门合同志，最根本的是要学习他无限忠于人民，无限忠于党，无限忠于毛主席，无限忠于毛泽东思想，无限忠于毛主席革命路线的崇高品质。“忠不忠，看行动”。最最重要的行动就是要象门合同志那样，把活学活用毛泽东思想，作为生命的第一需要，带着两条路线斗争中的问题，活学活用，学用结合，彻底改造世界观，不断提高路线斗争的觉悟。各级领导机构要通过学习门合同志，把活学活用毛泽东思想的群众运动推向新阶段，掀起新高潮。“工总司”总部和各级联络站的工作人员，特别是负责人要带头学好用好。"},{"type":"paragraph","text":"大会认为，“忠”字是要在革命的烈火中锤炼。向门合同志学习，开展“三忠于”活动，必须紧扣形势，在阶级斗争的大风大浪中进行，要用战斗来捍卫毛主席的革命路线，锤炼一个“忠”字。当前，就是要坚持和发扬无产阶级的坚决彻底革命精神，牢牢掌握斗争大方向，牢牢掌握对敌斗争的主动权，深入持久开展革命大批判，向阶级敌人发动猛烈的进攻。"},{"type":"paragraph","text":"大会还提出，要通过深入开展向门合同志学习的“三忠于”群众活动，进一步加强组织建设，促进领导班子的革命化。各级组织的负责人特别要学习门合同志密切联系群众，始终保持劳动人民艰苦朴素本色的优良品质，带头用毛泽东思想“斗私，批修”，“既当‘官’，又当老百姓”，带头实现“三忠于”，把领导班子建设成为“三忠于”的领导班子，把各级组织办成红彤彤的毛泽东思想大学校。"},{"type":"paragraph","text":"大会进行时，各级联络站的工作人员，纷纷向大会递送决心书，表示坚决以门合同志为榜样，不断加深对伟大领袖毛主席的无产阶级感情，攀登“忠”字高峰，做到:“一切想着毛主席，一切服从毛主席，一切紧跟毛主席，一切为着毛主席。”"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"上海市工人革命造反总司令部（工总司）","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"00b906b9c4"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
