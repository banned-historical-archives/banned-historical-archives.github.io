" crossorigin="">{"props":{"pageProps":{"books":[{"id":"wenji8","type":"pdf","name":"毛泽东文集第八卷（1999）","internal":false,"official":true,"author":"中央文献研究室","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives9/main/books/wenji8.pdf"],"article":{"title":"如果尼克松愿意来，我愿意和他谈","description":"","dates":[{"year":1970,"month":12,"day":18}],"parts":[{"text":"如果尼克松愿意来，我愿意和他谈","type":"title"},{"type":"paragraph","text":"我欢迎尼克松上台。为什么呢？他的欺骗性也有，但比较地少一点，你信不信？他跟你来硬的多，来软的也有。他如果想到北京来，你就捎个信，叫他偷偷地，不要公开，坐上一架飞机就可以来嘛。谈不成也可以，谈得成也可以嘛。何必那么僵着？但是你们美国是没有秘密的，一个总统出国是不可能秘密的。他要到中国来，一定会大吹大擂，就会说其目的就是要拉中国整苏联，所以他现在还不敢这样做。整苏联，现在对美国不利；整中国，对于美国也不利。"},{"type":"paragraph","text":"现在我们的一个政策是不让美国人到中国来，这是不是正确？外交部要研究一下。左、中、右都让来。为什么右派要让来？就是说尼克松，他是代表垄断资本家的。当然要让他来了，因为解决问题，中派、左派是不行的，在现时要跟尼克松解决。"},{"type":"paragraph","text":"他早就到处写信说要派代表来，我们没有发表，守秘密啊！他对于波兰华沙那个会谈不感兴趣，要来当面谈。所以，我说如果尼克松愿意来，我愿意和他谈，谈得成也行，谈不成也行，吵架也行，不吵架也行，当作旅行者来谈也行，当作总统来谈也行。总而言之，都行。我看我不会跟他吵架，批评是要批评他的。我们也要作自我批评，就是讲我们的错误、缺点了，比如，我们的生产水平比美国低，别的我们不作自我批评。"},{"type":"paragraph","text":"尼克松要派代表来中国谈判，那是他自己提议的，有文件证明，说愿意在北京或者华盛顿当面谈，不要让我们外交部知道，也不要通过美国国务院。神秘得很，又是提出不要公开，又是说这种消息非常机密。"},{"type":"paragraph","text":"一九七二年美国要大选，我看，这年的上半年尼克松可能派人来，他自己不来。要来谈是那个时候。他对那个台湾舍不得，蒋介石还没有死。台湾关他什么事？台湾是杜鲁门、艾奇逊搞成这样的，然后又是一个总统，那个里面他也有一份就是了。然后又是肯尼迪。尼克松当过副总统，他那时跑过台湾。他说台湾有一千多万人。我说亚洲有十几亿人，非洲有三亿人，都在那里造反。"},{"type":"paragraph","text":"中美两国总要建交的。中国和美国难道就一百年不建交啊？我们又没有占领你们那个长岛。"},{"type":"paragraph","text":"根据中央文献出版社、世界知识出版社"},{"type":"paragraph","text":"一九九四年出版的《毛泽东外交文选》"},{"type":"paragraph","text":"刊印。"}],"comment_pivots":[{"part_idx":0,"offset":15,"index":1},{"part_idx":1,"offset":6,"index":2},{"part_idx":3,"offset":37,"index":3},{"part_idx":5,"offset":76,"index":4},{"part_idx":5,"offset":80,"index":5},{"part_idx":5,"offset":115,"index":6}],"is_range_date":false,"authors":["毛泽东"],"comments":["这是毛泽东同美国进步作家、记者埃德加·斯诺谈话的一部分。","尼克松，当时任美国总统。","指中美大使级会谈。见本卷第64页注〔8〕。","杜鲁门，一九四五年至一九五三年任美国总统。","艾奇逊（一八九三——一九七一），美国民主党人，一九四九年至一九五三年任美国国务卿。","肯尼迪，一九六○年至一九六三年任美国总统。"],"page_start":447,"page_end":448,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"北京文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"cc783a2ee6"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
