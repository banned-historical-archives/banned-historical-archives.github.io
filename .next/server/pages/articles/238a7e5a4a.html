script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"搞清楚对资产阶级专政的问题静安区中心医院党总支中心学习组成员联系实际，认真学习无产阶级专政的理论，用以指导医疗卫生革命","authors":[],"dates":[{"year":1975,"month":3,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　静安区中心医院党总支组织中心学习组成员，认真学习无产阶级专政的理论，加深对党的基本路线的理解，搞清楚对资产阶级专政的问题，更自觉地为巩固无产阶级专政而斗争。"},{"type":"paragraph","text":"静安区中心医院党总支首先组织中心学习组成员认真学习毛主席关于“列宁为什么说对资产阶级专政，这个问题要搞清楚。这个问题不搞清楚，就会变修正主义。要使全国知道”的重要指示，并和学习《国家与革命》、《论人民民主专政》等马列著作和毛主席著作的有关章节结合起来。在认真自学的基础上，党总支又引导大家联系国际共产主义运动史，联系医疗卫生战线上两条路线斗争史，联系现实阶级斗争的情况，认真讨论为什么必须对资产阶级实行专政的问题，加深对党的基本路线和无产阶级专政理论问题的认识。大家说，世界上第一个社会主义国家被修正主义者篡夺了领导权，丢掉了无产阶级专政这把刀子，结果变成了社会帝国主义国家。这说明无产阶级在夺取政权后，进行反修防修，防止资本主义复辟的重要性。如果我们不从理论上搞清楚对资产阶级专政的问题，就不能自觉地贯彻执行毛主席的革命路线，就会迷失方向。大家举了医院里贯彻执行毛主席“六·二六”指示的例子。一九六五年，这个医院的医务人员响应毛主席关于“把医疗卫生工作的重点放到农村去”的伟大号召，全院有百分之二十五的医务人员下乡下厂。后来受到修正主义卫生路线的影响，下乡下厂的人数一度大大减少，使医院又变成了为少数人服务的城市老爷医院。大家说，在医院里是执行毛主席的无产阶级革命卫生路线，还是执行修正主义卫生路线，实质上就是那个阶级实行专政的问题。而贯彻执行毛主席的“六·二六”指示，就是无产阶级在医疗卫生领域对资产阶级实行专政的一项重要措施。大家表示，今年一定要组织三分之一的医务人员下乡下厂，搞好医疗卫生革命。许多同志联系医院的斗争实际指出:经过文化大革命和批林批孔运动，深入批判了修正主义卫生路线，沉重地打击了资产阶级和一切剥削阶级的意识形态，但是旧的习惯势力根深蒂固，封、资、修的影响还很深，阶级敌人必然要抓住这些东西以各种形式顽固地同无产阶级对抗，搞复辟倒退，我们如果只埋头看病开刀，不抬头看路线辨方向，不懂得无产阶级专政的理论，就必然要滑到修正主义的邪路上去。大家决心发扬理论联系实际的学风，认真学习无产阶级专政的理论，从理论和实践的结合上搞清楚对资产阶级专政的问题，将医疗卫生革命进行到底。　　(本报通讯员)"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"批林批孔","type":"主题/事件"},{"name":"两条路线斗争","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"238a7e5a4a"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
