script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"李先念会见朝鲜记者同盟代表团  介绍国内形势时说，党中央是团结一致的，我们的党是有能力抵制资产阶级腐蚀的","authors":[],"dates":[{"year":1982,"month":3,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"李先念会见朝鲜记者同盟代表团"},{"type":"paragraph","text":"介绍国内形势时说，党中央是团结一致的，我们的党是有能力抵制资产阶级腐蚀的"},{"type":"paragraph","text":"新华社北京3月4日电  中共中央副主席李先念，今天下午会见由团长、朝鲜记者同盟中央委员会常务副委员长朴灿根率领的朝鲜记者同盟代表团。宾主进行了亲切友好的交谈。"},{"type":"paragraph","text":"李先念在谈到我国国内形势时指出，要发展我国的社会主义现代化建设事业，必须建设好我们的党。他说，我们全党是团结的，党中央是团结一致的。目前正在开展的精简机构和打击经济领域中的犯罪活动两件大事，都进行得很顺利。这充分证明中国共产党是伟大的、光荣的、正确的，我国的政治形势是稳定的。只有团结一致的党中央才能作出这样重大的决定，才能领导全国人民顺利进行这两项工作。"},{"type":"paragraph","text":"李先念说，不打击经济领域中的犯罪活动，我们的国家就没有希望。我们相信，我们大多数党的干部是好的和比较好的。我们的党是有能力抵制资产阶级腐蚀的。"},{"type":"paragraph","text":"李先念还谈到我国进行社会主义建设必须以计划经济为主，市场调节为辅。他说，这是一项重大原则。"},{"type":"paragraph","text":"在谈到中朝友谊时，李先念说，中朝两党两国的深厚友谊是在长期斗争中结成的。这种用鲜血凝成的友谊是经得起考验的。我们要努力发展这一友谊。"},{"type":"paragraph","text":"朴灿根说，我们在中国看到了中国人民正在为把自己国家建设成社会主义强国而斗争，表示要为进一步发展两国人民和新闻工作者的友谊而努力。"},{"type":"paragraph","text":"中国记协书记处第一书记王揖、朝鲜民主主义人民共和国驻中国大使全明洙参加了会见。（附图片）"},{"type":"paragraph","text":"李先念会见朝鲜同志。  新华社记者摄"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"李先念","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"75c30f8704"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
