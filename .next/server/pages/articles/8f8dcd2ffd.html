script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"罗贵波在全省宣传工作会议上列举极左路线流毒表现  批极左是山西当前思想战线重要任务","authors":[],"dates":[{"year":1980,"month":10,"day":24}],"is_range_date":false,"parts":[{"type":"paragraph","text":"罗贵波在全省宣传工作会议上列举极左路线流毒表现"},{"type":"paragraph","text":"批极左是山西当前思想战线重要任务"},{"type":"paragraph","text":"新华社太原10月23日电　中共山西省委第二书记罗贵波21日在全省宣传工作会议上讲话时指出，在山西省，极左路线的流毒和影响是严重的，必须继续批判极左路线，肃清其流毒和影响。这是山西省当前思想战线的一项重要任务。"},{"type":"paragraph","text":"罗贵波说，在山西省，极左路线的流毒和影响的突出表现是：（一）在学大寨运动中，各条战线、各个方面都推行了一套极左的东西，危害很深，流毒很广。（二）在清查问题上，有些地方和单位，把反大寨作为清查内容；有些地方和单位，由于派性的干扰，不按中央关于清查“四人帮”运动的有关政策和规定进行清查，而是自行规定清查标准，无限上纲，混淆两类不同性质的矛盾，致使运动出现了一些偏差，至今还没有完全纠正。在十年浩劫中，林彪、“四人帮”制造的冤、假、错案，至今还有一些没有平反昭雪。（三）1978年全国开展真理标准问题的讨论时，山西没有及时组织讨论；1979年也没有很好地抓真理标准问题讨论的补课，严重影响广大干部和群众思想的解放，影响对党的三中全会精神的贯彻执行。（四）在落实知识分子政策问题上，还有不少同志没有从过去对知识分子的错误政策中解放出来，知识分子政策至今还未能全面落实。"},{"type":"paragraph","text":"罗贵波说，极左路线在山西的流毒和影响，在工业、财贸、文教、卫生等各条战线也有表现。他说，上面讲的这些问题，不是评价山西全省的整个工作。党的十一届三中全会以来，各级党委、各级宣传部门的同志，做了许多工作，是有成绩的，全省的形势也是好的。这一点我们要看到，要肯定。"},{"type":"paragraph","text":"罗贵波要求全省各级宣传部门认真学习马列主义、毛泽东思想，认真学习党的路线、方针、政策，掌握科学的武器；坚持理论联系实际的原则，敢于和善于解决实际问题；宣传工作要摆事实，讲道理，讲真话；要把贯彻中央关于领导制度改革和经济体制改革的精神，关于进一步加强和完善农业生产责任制的精神，同批极左路线结合起来进行；在批判极左路线的同时，要注意防止和克服右的倾向。要从实际出发，不搞一刀切。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"四人帮","type":"人物"},{"name":"山西文革","type":"人物"},{"name":"派性","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8f8dcd2ffd"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
