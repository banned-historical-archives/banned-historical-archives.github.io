script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"出席中国金融改革讨论会的中美银行家企业家认为  反对资产阶级自由化不影响金融改革","authors":["夏兆龙"],"dates":[{"year":1987,"month":4,"day":3}],"is_range_date":false,"parts":[{"type":"paragraph","text":"出席中国金融改革讨论会的中美银行家企业家认为"},{"type":"paragraph","text":"反对资产阶级自由化不影响金融改革"},{"type":"paragraph","text":"新华社纽约4月1日电  （记者夏兆龙）金融改革将扩大中国同世界各国金融界的联系，推动中国建成未来的经济强国。反对资产阶级自由化不会影响这一改革的进程。"},{"type":"paragraph","text":"这是出席昨天在这里举行的中国金融改革讨论会的中国和美国银行家、企业家的共同看法。"},{"type":"paragraph","text":"纽约联邦储备银行第一副行长托马斯·蒂姆兰在致欢迎词中说，随着中国执行开放政策和有意识地运用市场经济规律进行经济建设，中国金融业正在发生广泛的、深刻的变革，同世界金融界建立了更加强有力的联系。"},{"type":"paragraph","text":"美国前助理国务卿罗伯特·霍梅茨说，“从中国的现行政策和它对待眼前困难所采取的积极对策来看，人们对未来有信心。”"},{"type":"paragraph","text":"这次讨论会由香港金融专家何鸿章先生赞助，由中国人民银行、《中国日报》和《美洲华侨日报》企业集团联合举办。"},{"type":"paragraph","text":"中国人民银行、国家外汇管理局和中国国际信托投资公司的代表在会上发言，向美国朋友介绍了中国金融体制改革和利用外资的情况，受到了与会者的欢迎。"},{"type":"paragraph","text":"中国人民银行特邀顾问尚明在会上回答问题时指出，反对资产阶级自由化不在金融改革的范畴之内。如果说有影响的话，那就只会推动改革更加顺利地进行。"},{"type":"paragraph","text":"美国副总统乔治·布什给讨论会发来贺电，祝贺会议取得成功。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"83e6177c3c"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
