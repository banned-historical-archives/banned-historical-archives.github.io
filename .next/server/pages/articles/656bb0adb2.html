<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"山东省夏征和粮食统购工作中发生的问题","authors":[],"dates":[{"year":1954,"month":9,"day":13}],"is_range_date":false,"parts":[{"text":"山东省夏征和粮食统购工作中发生的问题","type":"title"},{"text":"【本刊讯】山东各地在夏征、夏购工作中，发现有以下问题：","type":"paragraph"},{"text":"一、奸商、地主、富农、反革命分子以及反动会道门分子的破坏活动均有发生，综合其破坏行为有以下几种：","type":"paragraph"},{"text":"(一)煽动群众，破坏夏征、夏购。临邑县刘家庙村地主王寿钻向群众造谣说：“没发购粮证的得把粮食卖光。”因之，引起很多群众要求政府发购粮证。禹城县九圣庙伪匪分子王风春与白庄白春茂在公布产量的群众大会上公开煽动说：“评的高，打不出来”，造成十余名群众起来反抗，将会议捣散(王、白二犯均已逮捕)。","type":"paragraph"},{"text":"(二)拒售存粮，抢购、套购麦粮。沂水县朱纯庄富农高平囤积粮食三千斤不卖，反大嚷没吃的，又在黑市抢购小麦四十斤。临沂十五区一周内即发现粮商、粮贩、地主、富农抢购贩运等破坏活动三十八起，他们中有的利用收买干部进行抢购，有的骗取群众购粮证，加以涂改后，用来套购国家粮食。上述破坏分子，已查清属实，呈准逮捕者七人。","type":"paragraph"},{"text":"(三)毁坏粮食，掺土掺假。临沂水田村富农反抗国家统购粮食，竟将二百余斤粮食投入井内。禹城县金庄富农金吉祥交统购粮八百斤，其中掺土四十余斤。有的粮贩在交统购粮时，竟使水掺拌。","type":"paragraph"},{"text":"(四)预购买青，破坏青苗。禹城县铁匠庙地主王永修通过孙家楼窑主预购小麦四千斤，现已收回一千斤。沂水县七区农民的地秧，被坏分子拔去二十余亩。","type":"paragraph"},{"text":"(五)匿报麦亩，藏粮不交。临沂徐家冲村富农李树堂家种十五亩麦田，仅报五亩。武城县李尧口村富农李连弟(被管制分子)种小麦九亩，应交统购麦四百斤，但他只交一百七十斤，其余顽抗不交。","type":"paragraph"},{"text":"此外，德州专区各县在夏征夏购工作中群众匿报麦亩现象是比较普遍的；个别地区也发现少数党员村干藏粮不售的情况。","type":"paragraph"},{"text":"(六)反动道会门制造谣言。如嘉祥道会门靳方淑，制造谣言，侮蔑我领袖，煽动群众拒卖余粮。沂水二十一区十字院大佛道经常集合唱符，每次二十余人，可能阴谋暴动，现正在侦破中。","type":"paragraph"},{"text":"在今年粮食夏征夏购工作中，上述各种违法犯罪分子的破坏活动是比较猖狂的，但由于各地政法部门分工比较明确，力量比较集中，一般地镇压比较及时，因而保证了夏征夏购工作的顺利进行。","type":"paragraph"},{"text":"二、在夏征夏购工作中，部分地区曾发生以下偏向：","type":"paragraph"},{"text":"(一)强迫命令，因追粮逼死人命现象在部分地区依然发生。据济宁、德州、昌潍、泰安、章邱、泗水、临沂、广饶、苍山等地报告，目前发现因干部强迫命令自杀已死的计二十八人，自杀未遂的二十人。如滕县四区区委组织委员朱敦华在夏征夏购中诬称中农李仲凯(工属)破坏统购统销，把李仲凯绑到乡政府押起来，并以“整出材料即送法院”来威胁，李仲凯遂于七月二十七日夜吊死于乡政府内。","type":"paragraph"},{"text":"(二)逮捕手续不严，处理权限不清。济阳在夏征夏购中，未经地委批准，擅自逮捕七名匿报麦亩和抗拒统购的案犯。夏津财委擅自处理匿报麦亩和抗拒征收案十起，在处理方法上不分轻重、不分对象，一律罚小麦百分之五十(按征购额计算)。","type":"paragraph"},{"text":"(三)政策界限不清。这主要表现在对富农与中农的界限没有严格区分，对地主、富农的破坏与农民的落后、不满不分，轻罪与重罪不分，因此在案件的处理上有些地区发生打击面过宽、量刑偏轻偏重等现象。如德县处理的一百二十五起案件中，属于地主、富农的计三十九起，中、贫农八十六起。德州分署会同公安、法院重点抽查了禹城县在夏征夏购中处理的十八名案犯，经审查案犯中不应捕而捕者十三人，三个判刑过重，一个判刑偏轻，另一个尚需进一步搞清案情。由于以上情况的存在，影响了部分群众生产情绪。(中央人民政府最高人民检察署)","type":"paragraph"},{"text":"1954年9月13日新华通讯社编《内部参考》。","type":"paragraph"}],"comments":[],"origin":"美国图书馆收藏","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"656bb0adb2"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
