script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"澳共（马列）《先锋报》发表文章  号召深入学习《毛泽东选集》第五卷  《美洲华侨日报》欢呼中国大地响起新长征的号角","authors":[],"dates":[{"year":1978,"month":3,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"澳共（马列）《先锋报》发表文章"},{"type":"paragraph","text":"号召深入学习《毛泽东选集》第五卷"},{"type":"paragraph","text":"《美洲华侨日报》欢呼中国大地响起新长征的号角"},{"type":"paragraph","text":"新华社堪培拉电　澳大利亚共产党（马列）机关报《先锋报》三月十六日发表文章，号召澳大利亚革命者深入研读《毛泽东选集》第五卷，把马列主义、毛泽东思想的普遍原则同澳大利亚的实际情况结合起来。"},{"type":"paragraph","text":"文章说：“毛泽东主席是当代最伟大的马列主义者。他的著作是马列主义的经典著作。象所有其他的马克思主义经典著作一样，毛主席的著作是行动的指南。”"},{"type":"paragraph","text":"文章写道：“对澳大利亚革命者来说，重要的是把马列主义、毛泽东思想的普遍原则同澳大利亚的实际情况结合起来，任何其他的态度都是不能允许的。”"},{"type":"paragraph","text":"文章指出，“澳大利亚的每一个革命者都应当、而且必须学习《毛泽东选集》第五卷，并且从其中所包含的丰富的教诲中学习如何更为有效地在澳大利亚工作。”"},{"type":"paragraph","text":"文章还要求澳大利亚革命者同样深入地学习华主席在中国共产党第十一次全国代表大会上所作的报告，文章说：“这个报告在各个方面都始终明确地维护了毛主席的革命路线”。"},{"type":"paragraph","text":"新华社北京三月二十四日电　纽约消息：在纽约出版的《美洲华侨日报》最近发表题为《红旗引路继续长征》的社论，热烈欢呼我国五届人大和五届政协会议胜利闭幕。"},{"type":"paragraph","text":"社论说，旅美侨胞为中国人民在以华国锋主席为首的中共中央领导下，高举毛主席的伟大旗帜，在无产阶级专政下继续革命，热烈欢呼；为中国大地上响起了新长征的号角，向四个现代化进军，决心在本世纪内把中国建设成为现代化社会主义强国，深感振奋；为中国政府扩大革命统一战线的政策，致力于解放台湾、统一中国，同声喝采。"},{"type":"paragraph","text":"社论指出，中国宪法的序言明文肯定了毛主席在中国革命史上的丰功伟绩，中国人民千秋万代铭记毛主席的不朽贡献。这项英明的决定，深得海外侨胞的心。"},{"type":"paragraph","text":"社论说，毛主席生前指出，中国要在本世纪内成为现代化社会主义强国。今天，中国八亿人民在华国锋主席为首的中共中央领导下，做好部署，誓师出发，继续长征。社论说，长征的号角，催促中国人民踏上万马奔腾的前程，也激荡着海外侨胞的心。侨胞们坚决拥护中国人民继续长征，支持这一项将会震撼世界的伟大革命事业。社论说，新宪法上明文落实毛主席统一战线的概念，写上了中国人民一定要解放台湾、统一祖国的誓言。落实这一连串的政策，中国革命的队伍一定会更加壮大，解放台湾、统一中国的日子，必将早日来临。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"华国锋","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"编纂《毛泽东选集》第五卷","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"52430a6e00"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
