" crossorigin="">{"props":{"pageProps":{"books":[{"id":"GPCRv3","name":"中国文化大革命文库（第三版）","internal":true,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中央军委关于集中力量执行支左、支农、支工、军管、军训任务的决定","authors":[],"dates":[{"year":1967,"month":3,"day":19}],"is_range_date":false,"parts":[{"text":"中央军委关于集中力量执行支左、支农、支工、军管、军训任务的决定","type":"title"},{"text":"各总部、各军区并转各省军区、各军、各军兵种、各院校：","type":"appellation"},{"text":"为了适应无产阶级文化大革命新阶段形势的需要，集中力量完成毛主席赋予军队的支左、支农、支工、军管、军训等项重大任务，军委决定：","type":"paragraph"},{"text":"一、军委各总部、各军兵种机关的“四大”，一般在三月底左右暂告一段落。除了照顾战备、援外和必需的工作外，视情况抽调三分之一，二分之一，甚至三分之二的人员，立即投入支左、支农、支工、军管、军训的工作。这些单位究竟能抽调多少人员，何时开始，由各总部、军兵种党委讨论决定。","type":"paragraph"},{"text":"二、各院校、文艺团体、体工队（包括各军区所属的这些单位），可在整风告一段落后，立即全部投入上述工作，作为这些单位文化大革命的一个重要步骤。这样做，既可以增加支左、支农、支工、军管、军训的力量，又可以使这些单位的人员，更好地同工农群众相结合，向工农群众学习，促进思想革命化。这些单位的整风何时结束，能抽调多少人员，何时开始，由各总部、军兵种、大军区党委讨论决定。","type":"paragraph"},{"text":"三、各总部、军兵种（包括在北京的所属院校）抽调的人员，由总政治部统一分配、使用。驻各军区所在地区的院校抽调的人员，统一由各大军区、省军区领导、调配和使用。","type":"paragraph"}],"comments":[],"origin":"根据中共中央办公厅、国务院秘书厅文化革命联合接待室编印《无产阶级文化大革命有关文件汇集 （第二集）》， 北京：1967年6月","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"name":"军队支左","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"88243efa3e"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
