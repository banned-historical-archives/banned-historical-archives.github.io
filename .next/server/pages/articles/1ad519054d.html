script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"巴拉克向以籍阿拉伯人道歉  极右政党支持沙龙竞选总理","authors":["戚德良","楼坚"],"dates":[{"year":2001,"month":2,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"巴拉克向以籍阿拉伯人道歉  极右政党支持沙龙竞选总理"},{"type":"paragraph","text":"新华社耶路撒冷2月4日电（记者戚德良、楼坚）以色列看守内阁总理巴拉克4日举行内阁会议，并在会上就13名以色列阿拉伯人在去年10月的冲突中被以军警枪杀一事向以色列阿拉伯人正式道歉。"},{"type":"paragraph","text":"这是巴拉克自这一事件发生以来首次公开表示正式道歉。巴拉克在会上说，13名以色列阿拉伯人是以色列合法公民，他们及全体以色列阿拉伯人有权参加任何集会，政府和他本人对他们在冲突中不幸身亡深表遗憾，并再次向他们的家人和全体阿拉伯公民表示道歉。巴拉克重申，这一惨痛教训将促使政府采取措施，防止今后再次发生类似悲剧。"},{"type":"paragraph","text":"去年9月底，以色列利库德集团主席沙龙强行参观东耶路撒冷伊斯兰圣地，由此引发的以巴冲突迅速蔓延到以色列境内。10月份，成千上万的以色列阿拉伯人走上街头，抗议以军镇压巴勒斯坦人，其中有13人在同以军警发生冲突中被打死。此后，巴拉克一直未就这一事件表示歉意。这在阿拉伯市民中激起强烈愤慨，他们发誓在即将于6日举行的总理选举中不投巴拉克的票。"},{"type":"paragraph","text":"据新华社耶路撒冷2月4日电（记者戚德良）以色列极右政党犹太圣经联盟4日宣布，将支持利库德集团主席沙龙竞选以色列下届总理，并要求其党员和追随者在6日举行的投票中投沙龙的票。犹太圣经联盟4日在其党报上刊登了该党3日晚集体作出的这一决定。据悉，该党代表与利库德集团代表进行了密谈，作为犹太圣经联盟支持沙龙的交换条件，利库德集团同意一旦沙龙当选，他将把巴拉克倡导的在正统犹太教青年中征兵的计划搁置1年。此外，以色列中间路线党领导人、前特拉维夫市长米洛3日晚也正式宣布将支持沙龙。沙龙和巴拉克正在加紧各自的竞选活动。连日来的各项民意测验表明，沙龙最近一直领先巴拉克近20个百分点。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1ad519054d"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
