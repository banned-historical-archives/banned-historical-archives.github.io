script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"“反左”的幌子　极右的实质","authors":["上钢五厂二车间工人理论小组"],"dates":[{"year":1976,"month":8,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"“反左”的幌子　极右的实质"},{"type":"paragraph","text":"《论总纲》从头到尾打着“反左”的旗号，疯狂攻击无产阶级文化大革命和批林批孔运动。林彪推行的明明是一条极右的修正主义路线，而《论总纲》却别有用心地把它说成是“极左”的路线。邓小平站在极右的立场上，妄图以“反左”为名，翻文化大革命的案，算文化大革命的帐。他们所谓的“反左”，就是反对毛主席的革命路线，就是否定文化大革命。"},{"type":"paragraph","text":"无产阶级文化大革命，实质上是在社会主义条件下，无产阶级反对资产阶级和一切剥削阶级的政治大革命。对于文化大革命的伟大胜利，广大革命人民无不热烈歌颂，尽情欢呼；可是，邓小平却恨之入骨，恶毒咒骂。他把整走资派诬蔑为“极左”，说每次运动往往“伤害”了“有经验的干部”，等等。那么反对陈独秀、瞿秋白、李立三、罗章龙，反对王明、张国焘，反对高岗、彭德怀、刘少奇、林彪都伤害了么？我们说，无产阶级文化大革命是要“伤害”人的，这就是要打倒一小撮叛徒、特务和死不改悔的走资派。不“伤害”他们，不打倒他们，我们的党就要变修，国就要变色。正因为文化大革命打倒了刘少奇、林彪两个资产阶级司令部，批判了他们所推行的修正主义路线，邓小平才那样的悲伤，拚命要为他们翻案，妄图从根本上否定文化大革命。可见，邓小平的“反左”是幌子，翻案复辟是真正的目的。"},{"type":"paragraph","text":"《论总纲》还蛊惑人心地叫嚷要打倒所谓“反马克思主义的阶级敌人”，并说这些人“继承林彪的衣钵”，“袭用林彪的老谱”。他们所说的“反马克思主义的阶级敌人”，既不是指党内走资派，也不是指地、富、反、坏和新老资产阶级分子，而是指坚决执行毛主席革命路线、坚决捍卫文化大革命胜利成果的无产阶级革命派。古往今来，一切反动派都是要搞欺骗和诽谤的，他们总想把污水泼到对方身上去，把自己的帽子戴到人家头上。蒋介石在“西安事变”后发表的一个声明中，大骂包括中国共产党在内的抗日政治力量为“反动派”。毛主席在《关于蒋介石声明的声明》一文中尖锐地指出：“蒋氏所说的‘反动派’，不是别的，就是这些势力，不过人们叫作革命派，蒋氏则叫作‘反动派’罢了。”《论总纲》所使用的不正是蒋介石的这种反动伎俩吗？大量事实证明，真正继承刘少奇、林彪反革命的修正主义路线的衣钵，袭用打着红旗反红旗老谱的，不是别人，正是邓小平自己。"},{"type":"paragraph","text":"（摘自八月二十日《解放日报》，"},{"type":"paragraph","text":"作者：上钢五厂二车间工人理论小组）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"邓小平","type":"人物"},{"name":"林彪","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"批林批孔","type":"主题/事件"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"50eaca6e25"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
