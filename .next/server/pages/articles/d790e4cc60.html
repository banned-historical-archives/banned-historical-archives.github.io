<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"上海五反运动开始后工商界的反应","authors":[],"dates":[{"year":1952,"month":3,"day":29}],"is_range_date":false,"parts":[{"text":"上海五反运动开始后工商界的反应","type":"title"},{"text":"【华东总分社二十九日讯】上海五反运动正式开始后，资产阶级有如下反应：","type":"paragraph"},{"text":"(一)政府宣布五反正式开始后，工商联首脑胡子婴等要求参加五反领导，“配合政府五反，发动工商界坦白”，“以恢复工商联的威信”。","type":"paragraph"},{"text":"(二)资产阶级一般对工商户分类办法及上海市对基本守法户限额提高到一千万元、公布八项纪律等措施感到意外的宽大，对政府很感激。许多中小工商业户两个月来“寻死迷活”的紧张情绪为之一松，有的赶紧坦白，对盗窃数字“加码”。","type":"paragraph"},{"text":"(三)上层分子对一千万元限额感到“不公允”，说：“政府只照顾小工商业，大企业偶一‘疏忽’就是几千万，宽大不到我们了”。并主张“按资金与营业额订一个比例的限额才合理”。卷烟业经叔平自己盘算一定是“严重违法户”了，表示颓丧。棉纺业中上层分子认为上海二千多家自报查账户总挨不上前二类了。","type":"paragraph"},{"text":"(四)五反开始后许多资方代理人(如会计主任、总务主任、工务主任等)纷纷辞去代理人职务(如劳资协商会议资方代理人等职务)。永安纱厂最近有三个人这样辞职，资产阶级愈陷于孤立，上层分子中有些人说：“现在真是举目无亲了。店里登不住，家里呆不下，只有同业公会里还有些‘阶级兄弟’可以谈谈，同业公会才是我们的温床。”","type":"paragraph"},{"text":"(五)资产阶级对“五反只限于五反”、“八项纪律”及“照顾生产”的政策都感兴趣，但对下层干部与工人群众能否贯彻执行仍抱怀疑态度，如说“恐怕说的是一套，做的是另外一套”。“政府宽大，职工难挨”。上层分子说：“政府照顾生产的政策多，在业务部门要好好传达才行，现在百货公司等收购只是刹价，怎样行呢?”胡子婴曾在工商联发牢骚说：“政府五反实质上是取消合法利润。”","type":"paragraph"},{"text":"(六)对“过三关”的办法，一般反应是“第二关(工人把关)最难过”。“阎王好见，小鬼难当”。","type":"paragraph"},{"text":"(七)各业首脑人物对同业中或与自己关系密切的第一批检查户很关切，机器业胡厥文第一天就知道五金商业同业公会主委翁敏如及中华铁工厂傅守璞被检查。胡与翁、傅关系密切，罪案有联系，因此很着急。他向同业公会报告：“傅守璞被逮捕了。”棉纺业刘靖基对大隆机器厂及启新纱厂被检查也很关切，他在同业公会中向工作干部摸底说：“是否听说有一家厂挖出很多黄金”(按即大隆机器厂，这次在地下掘出三百多条大金条，刘为该厂董事，又是联襟亲属)。又问工作干部：“你对我提提意见如何。”","type":"paragraph"},{"text":"此外，自一月二十五日到三月二十五日，上海因三反、五反自杀的共有四百六十六人，其中因五反自杀的约占百分之二十五左右，有三十三人是高级职员等，其余为老板。工业与商业各半。老板自杀的以三月份前两旬为最多，五反正式开始后自杀者较少。","type":"paragraph"},{"text":"家庭妇联反映：现市上流传“共产党四不要”：近视眼不要(没有远见)；麻子不要(有缺点)；跷脚不要(立场不稳)；驼背不要(有包袱的)。","type":"paragraph"}],"comments":[],"origin":"新华通讯社编《内部参考》1952年3月31日","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d790e4cc60"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
