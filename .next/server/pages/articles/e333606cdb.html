" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-dayuejin","name":"中国大跃进-大饥荒数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"东北局关于稳定工人队伍的通知","authors":[],"dates":[{"year":1961,"month":5,"day":16}],"is_range_date":false,"parts":[{"text":"东北局关于稳定工人队伍的通知","type":"title"},{"text":"辽宁、吉林、黑龙江省委，各市、地，县委，各大中厂矿企业党委：","type":"appellation"},{"text":"最近，据各地反映，厂矿企业特别是煤矿工人自动离厂离矿的情况十分严重，对生产影响很大。辽宁省各煤矿自春节到四月底，工人自动离矿人数达九千一百多人，其中采煤工一千多人，占全省煤矿回采工人的百分之四。黑龙江省各矿从一月到四月二十日离矿七千三百九十九人。吉林省仅通化煤矿四月份离矿工人即达七百多人。鞍钢运输部运输工人，从三月二十九日到四月二十七日自动离职的一百四十二人。这些人绝大部分是前、去两年流入城市的新工人，也有少数是一九五八年前入厂的老工人。出现这种情况的原因，一是在工人群众中的思想政治教育工作不够；二是生活安排工作没有搞好；还有一个重要原因是有些企业没有及时认真地、全面地向职工宣传和解释中央的“十二条”和“六十条”，职工对农村情况不托底，加以有些农村基层干部采取了不妥当的做法动员工人回家，例如有的给工人写信说，不带党、团组织介绍信回乡也能接上关系，还可以当干部，有的甚至采取不供应工人家属烧柴、蔬菜等办法，胁迫家属动员工人回家，因而助长了一部分工人的盲目流动。","type":"paragraph"},{"text":"东北局认为上述现象，必须引起各级党委的严重注意，并且应当立即根据中央四月三十日转发谷牧同志“关于迅速克服工人私自离厂现象和巩固工人队伍的意见”的批示精神，对这一问题进行一次检查，责成各企业党委切实做好工人群众的思想政治工作，安排好职工生活，以稳定工人情绪。对于当前迫切需要解决的生活福利问题，如粮食定量、生活待遇和劳动服等，凡是各地、各企业能够解决的均应认真加以解决，解决不了的，可提请上级帮助解决。农村各级党委要教育农村基层干部立即停止动员工人私自离厂离矿，并要组织工人家属写信鼓励工人安心工业生产。","type":"paragraph"},{"text":" 中共中央东北局一九六一年五月十六日","type":"paragraph"},{"text":"印发：省委常委委员，省委各部委，省直属各党委，省直属机关和人民团体各党组；吉林日报，新华分社，各市委、地委，延边自治州委；各县（市）委；共印七五○份。","type":"paragraph"},{"text":"中共吉林省委办公厅秘书处","type":"paragraph"},{"text":"一九六一年五月十七日印发","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e333606cdb"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
