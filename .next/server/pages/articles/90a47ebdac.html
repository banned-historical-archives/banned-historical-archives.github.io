" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"广东省政协下乡参观团中的右派分子对南斯拉夫问题的反应","authors":["陈炳光"],"dates":[{"year":1958,"month":6,"day":22}],"is_range_date":false,"parts":[{"text":"广东省政协下乡参观团中的右派分子对南斯拉夫问题的反应","type":"title"},{"text":"陈炳光","type":"authors"},{"text":"新华社广州22日电　广东省政协下乡参观团中的右派分子，在最近交心活动中，暴露了他们对南斯拉夫问题的一些看法。","type":"paragraph"},{"text":"有人认为南斯拉夫路线比较折衷缓和，走社会主义道路是殊途同归。而且这样还易于争取西方国家劳动人民的同情。前中山大学教授林孔湘说，南斯拉夫的整套做法也许是错误的，但它没有发生叛乱，而波、匈在苏联领导下却发生了叛乱，是令人费解的。他认为，知识分子在南斯拉夫生活和工作会更愉快些。起义军官、前省民建副秘书长许义宗说，我想南斯拉夫有苏联那样强大，他的观点也许就可成为马列主义的正统。他认为南的做法最适合殖民地独立国家建设社会主义，现代修正主义可适用于已获革命成功的国家，不适用于指导国际运动。","type":"paragraph"},{"text":"有些人对我们批判南共后果表示担忧。前省林业厅副厅长李汉冲说，最近各社会主义国家对南共修正主义的围攻，可能迫使南斯拉夫向资本主义阵营投降。","type":"paragraph"},{"text":"有人认为南斯拉夫内部会分化。前广州市文化局副局长梁若尘说，由于各国共产党向南共展开不妥协的斗争，南斯拉夫铁托集团离崩溃之期已经不远。他说，现在很明显地看到修正主义不能再骗人。因此南斯拉夫国内青年人对领导必然会不满，分化就会从这里开始。","type":"paragraph"},{"text":"有人为南向美国借款的问题进行辩解。李汉冲认为波兰向美国借款，是失当的，有损社会主义阵营的面子，且所得无多；但南斯拉夫向美国借款，则可以借此来缓和国际局势。","type":"paragraph"},{"text":"有些右派分子感到，过去的思想同南共修正主义一模一样，如果没有经过反右派斗争，一定会赞成南共的主张。梁若尘说：南共修正主义者否定工人阶级政党在社会主义国家的领导作用，而我在机关中强调行政体制办事，并且同情右派分子“党政不分”的谰言，这实际上成了南共修正主义者的徒子徒孙。南共领导人否定无产阶级政党领导在建设社会主义中的作用，而我自己也提出过党不在机关企业中发号司令，正式修正主义的具体执行人。","type":"paragraph"},{"text":"一些疑问：一、南的经济基础是社会主义的，而上层建筑是修正主义的，怎么说明这种矛盾现象？二、对南共观点、路线的斗争是属于社会主义之间的内部矛盾呢？还是已超越此范围？三、社会主义阵营有着南共这样一个异己分子，不怕它从堡垒里面进攻我们吗？每个共产党内部都不许有中间路线，难道国际共产主义阵营就可以容许有中间路线吗？四、南向两个阵营伸手、社会主义阵营何以不敢鸣鼓而攻？是不是怕它倒向帝国主义呢？","type":"paragraph"},{"text":" 来源：新华社《内部参考》。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"90a47ebdac"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
