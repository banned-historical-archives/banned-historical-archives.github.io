script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"韩加强对信息通信网管理   德打击网上极右主义宣传","authors":["刘钢","高浩荣"],"dates":[{"year":2000,"month":8,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"韩加强对信息通信网管理"},{"type":"paragraph","text":"德打击网上极右主义宣传"},{"type":"paragraph","text":"新华社汉城8月28日电（记者高浩荣）韩国情报通信部目前正在积极推进有关利用信息通信网的法律修改工作，以加强对信息通信网的管理。"},{"type":"paragraph","text":"早在今年3月，韩国情报通信部就分别成立了由学术界、科技界、产业界专家组成的有关保护个人信息、防止不健全信息流通等问题的专门研究小组，并在这些研究小组提出的方案基础上，提出了法律修改案。接着，情报通信部在7月召开了法律修改案听证会。"},{"type":"paragraph","text":"按照该法案，韩国将制定一部《关于保护个人信息和确立健全的信息通信秩序的法律》。这一法律将明确规定个人信息管理者和使用者的权限和责任，对向第三者泄漏个人信息者将加重处罚，刑期从过去的1年以下增加至7年以下，并将处以10亿韩元以下的罚款（1100韩元合1美元）。"},{"type":"paragraph","text":"与此同时，这一法律将加强对淫秽、暴力、犯罪等非法信息流通的管理，情报通信伦理委员会可以对非法信息提出刑事诉讼。法律还规定了“信息内容等级标明制”，信息提供者应根据一定的标准自律地标明内容等级，然后才能上网流通。同时，学校、图书馆等网站必须安装可以切断对青少年有害信息流通的软件。此外，法律修改案提出将对在网上损毁他人名誉、欺诈、赌博、盗用他人密码等行为进行刑事处罚。"},{"type":"paragraph","text":"这一法案将提交给今年的定期国会，在国会通过后于明年7月开始实行。"},{"type":"paragraph","text":"韩国情报通信部官员在谈到该法案时说，对于破坏因特网秩序的人和集团，有必要采取强有力的法律措施，韩国制定有关利用信息通信网法律的目的就在于此。"},{"type":"paragraph","text":"新华社柏林8月27日电（记者刘钢）德国北威州计划采取严厉措施，限制利用互联网传播右翼极端主义。司法部门将依法对网页中出现宣扬极端主义、仇外排外等极右内容的网站经营者处以高达50万马克（1马克约合0.46美元）的罚款。"},{"type":"paragraph","text":"据即将出版的最新一期德国《明镜》周刊报道，北威州政府的主管机构已要求所有在北威州注册的互联网站对其网上内容及链接网站进行认真检查，杜绝右翼极端主义内容的出现。"},{"type":"paragraph","text":"北威州州长于尔根·比索明确表示，州政府决心阻止右翼极端主义分子利用互联网进行极右宣传。他说，如果哪家网络公司继续使其网站中出现宣扬纳粹的内容，那么它将依法受到高额罚款的处罚。他同时希望，国际社会能够制定相应法规，禁止宣扬极右内容的网站进入互联网。该州内政部长贝伦斯也于27日对新闻界强调，政府必须“对互联网中的右翼极端主义采取行动”。"},{"type":"paragraph","text":"鉴于德国右翼极端主义分子的暴力倾向日益严重，德国宪法保护局副局长弗里切27日对新闻界发表谈话指出，应当通过举办展览、讨论会等方式提早对青少年进行教育，帮助他们抵制右翼分子的“蛊惑”，认清右翼极端主义反人类的本质，阻止他们成为极右分子。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"7d7762bb96"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
