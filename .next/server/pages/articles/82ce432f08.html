script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"乌拉圭工人反剥削反压迫的斗争继续发展  玻利维亚学生教师示威反对亲美独裁政权","authors":[],"dates":[{"year":1968,"month":9,"day":19}],"is_range_date":false,"parts":[{"type":"paragraph","text":"乌拉圭工人反剥削反压迫的斗争继续发展  玻利维亚学生教师示威反对亲美独裁政权"},{"type":"paragraph","text":"新华社十八日讯　乌拉圭首都蒙得维的亚工人反对垄断资本无理关厂和解雇工人的正义斗争继续发展。蒙得维的亚一千多名工人十七日继续占领国营屠宰冷藏厂。他们从十二日晚上就占领了这家工厂，抗议厂方无理关厂和解雇两千六百名工人。工人的正义行动得到了学生们的支持。"},{"type":"paragraph","text":"乌拉圭行驶国内路线的公共汽车司机十五日开始举行四十八小时罢工，要求增加工资。当一些运输公司的司机举行罢工之后，乌拉圭全国最大的运输公司翁达公司的职工举行了声援罢工。"},{"type":"paragraph","text":"智利沿海商船队的职员九月上旬举行全国性罢工，反对最近签订的劳资合同中规定的不合理的工资制度。他们的罢工得到沿海海员工人的支持。"},{"type":"paragraph","text":"新华社十六日讯　拉巴斯消息：玻利维亚科恰班巴的大学生和教师十四日举行示威，反对亲美独裁政权的反动统治。"},{"type":"paragraph","text":"这次示威是在独裁政权的头子“总统”巴里恩托斯参加这个城市的一项检阅仪式的时候举行的。示威者在检阅台前高呼反对亲美独裁政权的口号，并同镇压他们的军警进行了英勇的斗争。"},{"type":"paragraph","text":"示威的学生还发布了一项声明，强烈谴责反动军警的野蛮镇压。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"82ce432f08"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
