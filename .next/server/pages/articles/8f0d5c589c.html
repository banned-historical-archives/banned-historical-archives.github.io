<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"把学校办成无产阶级专政的工具  上海师大师生认真学习理论，批判资产阶级法权思想，推动教育革命","authors":[],"dates":[{"year":1975,"month":5,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"把学校办成无产阶级专政的工具"},{"type":"paragraph","text":"上海师大师生认真学习理论，批判资产阶级法权思想，推动教育革命"},{"type":"paragraph","text":"本报讯　上海师范大学党委在学习无产阶级专政理论的运动中，引导全校师生发扬理论联系实际的学风，忆历史，看现状，着重分析批判了资产阶级法权思想在学校里的表现，从无产阶级专政的高度，加深对教育革命的理解，决心在教育战线上对资产阶级实行全面专政，进一步把学校办成无产阶级专政的工具。"},{"type":"paragraph","text":"毛主席关于理论问题的重要指示发表以后，上海师范大学立即掀起了学习的热潮。校党委把带领大家认真学好无产阶级专政理论摆到首要位置，他们和师生员工一起逐字逐句地反复学习毛主席关于理论问题的重要指示，学习马克思、恩格斯、列宁论无产阶级专政的语录。同时，他们还认真地进行了调查研究，联系教育革命的实践，从理论和实践的结合上加深了对无产阶级专政理论的理解。他们认识到，经过无产阶级文化大革命和批林批孔运动，摧毁了刘少奇、林彪两个资产阶级司令部，在毛主席无产阶级革命路线的指引下，教育革命正在步步深入，教育战线发生了很大的变化。但是，两条路线斗争还很激烈，学校还存在着滋生资本主义的土壤。资产阶级法权还存在，资产阶级法权思想在人们的头脑中还在起作用。例如，现在还有一些人把知识当成私有财产，当成商品，当成个人发展的资本。一些世界观没有改造好的资产阶级知识分子，依仗他们从劳动人民那里获取并占有的知识，把持着一些科学领域。受“知识私有”毒害较深的人，争名于朝，争利于市。大家说，如果不从理论上弄清楚为什么要对资产阶级专政，批判资产阶级法权思想，限制资产阶级法权，那么，社会主义的大学还可能变为资本主义的大学，为资产阶级培养接班人。因此，必须认真学习无产阶级专政的理论，坚持无产阶级教育革命。"},{"type":"paragraph","text":"在思想认识提高的基础上，校党委把学习朝阳农学院教育革命的经验，提高到限制资产阶级法权，逐步消灭三大差别，巩固无产阶级专政的高度来认识，发动群众寻找思想上的差距。数学系批判“学校是传授知识的场所”的旧观念，树立“学校应成为无产阶级专政的工具”的新思想；批判“三脱离”的修正主义路线的流毒，树立上层建筑要更好地为经济基础服务的思想；批判因循守旧的观念，树立无产阶级专政下继续革命的思想。生物系抓住师生在“为农服务”问题上出现的“一阵子还是一辈子”的讨论，狠批林彪的“变相劳改”和孔老二的“学禄耕馁”等反动谬论，提高了大家的觉悟，坚定了“扎根农村”的思想。他们深有感触地说，资产阶级世界观批判过多少次了，但是没有触动资产阶级法权思想，因而一有风吹草动，旧思想就会重新抬头。有个教师联系自己的思想说：“由于自己有知识私有观念，因而老是留恋旧学校扩大资产阶级法权的一套做法。现在才知道这种思想多么危险！林彪一类如果上台，我们就会上当受骗，跟着他搞资本主义。”"},{"type":"paragraph","text":"在学习运动中，校党委还大力宣传毕业生程立标的先进事迹。生物系学生程立标，去年毕业后坚持不进城市，不蹲机关，主动要求回到老家江西省乐平县农村。一年来，程立标保持着劳动人民的本色，战斗在三大革命运动的第一线，取得了较好的成绩。许多工农兵学员纷纷围绕“进大学后和工人、贫下中农的感情是深了还是淡了”的问题，开展回忆对比活动，对照着程立标的先进思想找自己的差距，座谈如何保持工农本色，并且从一件一件小事做起。有的学员参加推粪时，就讨论怎样一辈子保持劳动人民的本色。有些学员兴高采烈地在大街上扫马路，和资产阶级思想“顶着干”。广大教师纷纷表示要把转变学生的思想放在首位。他们说：“如果我们只是传授知识，不管学生的政治思想，甚至帮学生搭向上爬的阶梯，那是多么危险啊！”"},{"type":"paragraph","text":"目前，上海师范大学教育革命出现了生气勃勃的景象。二月中旬以来，全校二千五百多名师生下乡，同广大贫下中农一起边学习，边调查，写出了许多份调查报告，加深了对毛主席关于理论问题的重要指示的理解。各级党组织成员分别去工厂、农村蹲点，搞好工厂、农村的业余教育。各系在基层建立了长期固定的教学基地，一批教师将去基层工作。在课程体系和教学内容改革方面，文科各系将围绕着毛主席的重要指示重新安排教学计划。理科各系除加强理论学习外，还将克服重工轻农倾向，增加为农业服务的教学内容。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"林彪","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"批林批孔","type":"主题/事件"},{"name":"教育革命","type":"主题/事件"},{"name":"两条路线斗争","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"name":"限制资产阶级法权","type":"主题/事件"},{"name":"朝阳农学院","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"8f0d5c589c"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
