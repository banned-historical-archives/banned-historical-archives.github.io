script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"科学院历史一、二所批判资产阶级学术思想","authors":[],"dates":[{"year":1958,"month":9,"day":26}],"is_range_date":false,"parts":[{"type":"paragraph","text":"科学院历史一、二所批判资产阶级学术思想"},{"type":"paragraph","text":"近几个月来，中国科学院历史一、二所，分别对哲学社会科学界的右派分子吴枫、李洵、张岱年以及资产阶级学者陈寅恪、岑仲勉、冯友兰、贺麟等人的著作展开了批判。"},{"type":"paragraph","text":"吴枫在“隋唐五代史”中，对帝王将相歌功颂德、夸大了个人在历史上的作用；诬蔑农民起义；挑拨民族关系、破坏民族团结；否定经济基础的决定作用及历史发展规律。李洵在“明清史”中，在分析到阶级关系、阶级矛盾以及意识形态等问题时，集中地暴露了他反人民的立场和观点。书中概念混乱，矛盾百出，东拼西凑，强不知以为知。这两个所对吴枫、李洵这两部著作进行了彻底的批判，并写成批判文章，准备发表。"},{"type":"paragraph","text":"资产阶级学者岑仲勉的“隋唐史”是一本典型的唯心史观的著作。对“隋唐史”的批判，针对以下四个主要问题进行：混淆经济基础和上层建筑的区别，根本抹杀两者的关系；以唯心主义观点解释辩证唯物主义中的偶然性和必然性，并滥用这一概念来说明历史问题；对农民起义的不正确看法；毫无根据地夸大中国文化从周以来就接受了突厥族的文化、风俗的影响。"},{"type":"paragraph","text":"对资产阶级史学界的“旗帜”陈寅恪的批判，目前已经开始。主要针对他的否认阶级斗争，夸大个人在历史上的作用，崇拜外国文化，对祖国文化遗产的不正确的估价等错误观点进行初步批判，至于有系统的、更深入的批判，将在明年进行。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b2cab0a9eb"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
