script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"《从奴隶到将军》外景拍摄速度加快","authors":["佳良"],"dates":[{"year":1979,"month":1,"day":14}],"is_range_date":false,"parts":[{"type":"paragraph","text":"歌颂老一辈无产阶级革命家陈毅同志，并描写了一个彝族奴隶娃子成长为我军优秀指挥员的故事影片《从奴隶到将军》，已提前六十三天完成了在江西、广东的外景拍摄任务，现已投入紧张的内景拍摄工作。"},{"type":"paragraph","text":"影片分上下两集，描写的历史时期跨度较大。因此在演员表演、美工场景设计、摄影构图气氛等各方面要求比较高。主要演员的化妆造型有七种，设计的服装有九套。为了真实、深刻地反映历史事实，美工组同志不怕困难，精选外景。例如表现陈毅同志谈路线斗争的一场戏，就精心选定了水塘前古城门和大榕树相恃的场景，较好地体现了艺术构思。据了解，该地就是当年陈毅同志战斗过的地方。春节后他们将赴江苏、延安等地拍外景。(佳良)"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"陈毅","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9d477352a8"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
