<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-cb1f822813244951.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"毛主席永远和我们心连心","authors":["北京变压器厂革命委员会"],"dates":[{"year":1968,"month":8,"day":8}],"is_range_date":false,"parts":[{"type":"paragraph","text":"毛主席永远和我们心连心"},{"type":"paragraph","text":"北京变压器厂革命委员会"},{"type":"paragraph","text":"一九六八年八月五日晚，是我们最最难忘的时刻。工人们刚刚开完纪念毛主席《炮打司令部》的大字报发表两周年的大会，夜班的同志回到车间鼓足革命干劲猛促生产；日班的同志回到宿舍，有的在认真地学习毛主席著作，有的在一起热烈地议论无产阶级文化大革命在各个战线上取得的伟大胜利。忽然，工厂院内，锣鼓喧天，革命委员会的同志高喊：“特大喜讯！特大喜讯！”人们顿时静下来。“我们的伟大领袖毛主席把外国朋友赠送的珍贵礼物芒果，转送给首都工农毛泽东思想宣传队啦！”话音未落，整个宿舍沸腾起来了。喜讯传到哪里，哪里就群情欢腾、欣喜若狂。“毛主席万岁！万万岁！”“祝毛主席万寿无疆！万寿无疆！”的欢呼声久久响彻夜空。"},{"type":"paragraph","text":"工人们激动地说：“毛主席赠送珍贵礼物，是对我们的最大关怀，最大信任，最大支持，最大鼓舞，毛主席永远和全国革命人民心连心，我们工人阶级永远忠于毛主席，永远忠于伟大的毛泽东思想，永远忠于毛主席的无产阶级革命路线。”"},{"type":"paragraph","text":"不少革命职工主动放弃休息，连夜搭制彩车。工人们说：“我们迎接的是毛主席送给我们的珍贵礼物，也是迎接战无不胜的毛泽东思想和威力无穷的精神原子弹，我们觉可以不睡，彩车一定要快搭，搭好，一定要搭出我们对毛主席的赤胆忠心来！”革命职工把搭彩车用的汽车擦得干干净净，一尘不染。不少上夜班的工人一再嘱咐，一定要把我们工人阶级对毛主席的无限忠诚突出地表达出来。大家精心设计，群策群力，一辆满载忠心的彩车很快搭成了。"},{"type":"paragraph","text":"第二天，雨下个不停，但工人们夹道守候在厂门口，等待最最幸福时刻的到来，都渴望着能最先看见载着珍贵礼物的彩车。虽然衣服淋湿了，吃中午饭的时间已经过了，但大家都满怀激情地表示：“饭可以不吃，衣服湿了又算什么，迎接毛主席的珍贵礼物，是从来没有的大喜事，绝对不能错过！”"},{"type":"paragraph","text":"彩车终于盼来了！大家围着彩车唱啊，跳啊，把毛主席送来的珍贵礼物一遍又一遍地看啊，闻啊，工人们心潮澎湃喜泪流，千言万语涌心头，纷纷向毛主席献忠心，立誓言：毛主席啊，毛主席！我们一定不辜负您的殷切期望和巨大关怀，一定永远读您的书，听您的话，照您的指示办事，永远紧跟您顶逆风，战恶浪，驱虎豹，赶熊罴，把帝修反一扫光。海枯石烂，忠于您的红心永不变，地动山摇，高举您光辉思想的伟大红旗不动摇。"},{"type":"paragraph","text":"工人们还把毛主席的珍贵礼物照了相，准备洗印了分发给大家。工人们满怀深情地说：“我们要让子孙万代永远记住毛主席的最大关怀，永远对以毛主席为首、林副主席为副的无产阶级司令部无限忠诚，永远高举毛泽东思想伟大红旗奋勇前进！”"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"革命委员会","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"eb3babc1ba"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
