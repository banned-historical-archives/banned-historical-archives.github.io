script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"德查封极右组织“民阵”各界人士悼念被害外国居民","authors":[],"dates":[{"year":1992,"month":11,"day":29}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社波恩11月27日电　根据德国内政部长赛特斯发布的禁令，德国警察当局27日下午采取统一行动，在全德范围内查封右翼激进组织“民族阵线”的驻地。"},{"type":"paragraph","text":"在今天的行动中，警察在“民族阵线”总部代特莫尔德及下萨尔森州和不来梅、柏林、明斯特、科隆等地的“民族阵线”驻地查获了布告、传单等宣传品和印刷机。按照内政部禁令，凡今后再使用“民族阵线”组织标记及组建类似组织的其它团体，都将受到法律制裁。内政部长赛特斯说，今天的行动是反极右暴力组织的一个“强有力的和不可忽视的警告信号”，他还说，对其它类似组织的审查也正在进行中。"},{"type":"paragraph","text":"另据报道，汉诺威地方当局今天宣布制止计划于28日召开的极右翼政党“共和党”党代会，理由是，它将危害公共安全。"},{"type":"paragraph","text":"据新华社波恩11月27日电　一万多名德国各界人士27日参加了在德国汉堡一所清真寺举行的追悼仪式，悼念本月23日在石荷州默尔恩镇发生的一起新纳粹分子纵火案中惨遭杀害的3名土耳其人。"},{"type":"paragraph","text":"据报道，德国的工会及许多团体，都号召居民于本周末举行示威，谴责极右分子排外，声援居住在德国的外国人。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"508272e2f0"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
