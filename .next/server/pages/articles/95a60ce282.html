script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"越南报刊发表文章批判资产阶级文艺倾向","authors":[],"dates":[{"year":1958,"month":2,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社河内11日电】　越南各主要报刊最近陆续发表文章，批判当前越南文艺界存在的某些严重的资产阶级思想倾向。"},{"type":"paragraph","text":"越南作家会的机关刊物“文报”(周刊)所犯的一些错误首先受到批判。这些错误主要表现在:否认文艺工作的阶级性和党性；攻击越南劳动党对文艺工作的领导；很少发表反映国家建设和人民的斗争生活的作品。"},{"type":"paragraph","text":"“人民军队报”最近指出，过去“人文报”集团的思想观点实际上已经在“文报”上复活。"},{"type":"paragraph","text":"“文报”在1957年5月创刊，到今年1月共出版了37期。目前已经暂时停刊来进行整顿。"},{"type":"paragraph","text":"越南报刊最近还批判了某些出版社出版的含有毒素的坏书和一些剧社演出的宣扬资产阶级思想的坏剧目。越南劳动党机关报“人民报”9日发表的社论指出，越南的革命文艺曾经有过不可磨灭的光荣传统。当前越南文艺界存在的一些严重错误倾向，不能再听任它发展。社论指出，必须从思想上和组织上加强党对文艺的领导，以纠正文艺工作者的错误立场，并且保证贯彻党的正确的文艺工作方针和政策。"},{"type":"paragraph","text":"“人民报”在同一天发表的另一篇文章指出，“人文报”虽然在1956年被封闭，但是它的资产阶级思想和文艺倾向并没有得到彻底的批判。文章强调指出，目前在越南，社会主义同资本主义正在展开“谁战胜谁”的斗争，文艺战线上的思想斗争就显得格外重要。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"95a60ce282"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
