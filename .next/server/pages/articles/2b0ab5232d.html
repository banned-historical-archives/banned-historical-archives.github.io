script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"人民政协首届全国委会开会毛泽东当选主席同时选出副主席六人　并议决以十月一日为中华人民共和国国庆日","authors":[],"dates":[{"year":1949,"month":10,"day":11}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【新华社北京九日电】　中国人民政治协商会议第一届全国委员会，九日下午三时在中南海勤政殿举行第一次会议。这次会议的主要议程是听取周恩来委员报告参加第一届全国委员会各单位协商经过，和选举中国人民政治协商会议第一届全国委员会主席、副主席、常务委员和秘书长。此外，会议通过了‘以十月一日为中华人民共和国开国的国庆纪念日’的建议案，决定送请中央人民政府采纳施行。"},{"type":"paragraph","text":"出席这次会议的全国委员会委员，共有毛泽东、朱德、刘少奇、李济深、张澜、周恩来、沈钧儒、黄炎培、陈叔通、郭沫若等一百五十一人。全国委员会的委员总额是一百九十八名，其中十八名是保留着准备容纳新解放地区适当代表人物的空额，二十一名已经离开北京，八名因事或因病请假，此外全部出席了今天的会议"},{"type":"paragraph","text":"会议推林伯渠委员为主席。开会后，先由周恩来报告‘参加第一届全国委员会各单位协商的经过’。他说明，自人民政治协商会议第一届全体会议闭幕以来，各方面对于第一届全国委员会的工作，协商颇多。昨(八)日晚上，各单位的首席代表作了一次最后的协商。大家认为全国委员会的工作，目前亟需确定的有两项:一个是根据中国人民政治协商会议组织法第十五、十六两条的规定，选出主席、副主席和常务委员会，以便领导工作；一个是具体计划今后应该如何进行工作。周恩来委员在叙述了关于主席、副主席、常务委员的人选协商经过，并分析了全国委员会所应当进行的政治性的和组织性的工作内容以后，说明拟订中的全国委员会工作条例，已根据各方意见，规定在全国委员会内设立政治法律、财政经济、文化教育、外交、国防、民族事务、华侨事务、党派事务等八个组，以利工作的进行。"},{"type":"paragraph","text":"会议接着一致通过了本届全国委员会的主席，副主席五人，常务委员二十八人和秘书长的名单。名单如下:(一)主席:毛泽东。(二)副主席:周恩来、李济深、沈钧儒、郭沫若、陈叔通。"},{"type":"paragraph","text":"(三)常务委员:毛泽东、刘少奇、周恩来、李维汉；李济深、王崐仑、蒋光鼐；张澜、沈钧儒、章伯钧；黄炎培、陈叔通、章乃器；郭沫若、马叙伦、张奚若；杨秀峰、乌兰夫；朱德、林彪、刘宁一、邓颖超、冯文彬；沈雁冰、梁希；吴鸿宾；陈嘉庚；邵力子(四)秘书长:李维汉。"},{"type":"paragraph","text":"在会议的其他项目中，有许广平委员代表因病请假的马叙伦委员提出建议，请政府明定十月一日为中华人民共和国国庆日，以代替十月十日的旧的国庆日。这个建议获得全体一致的通过。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"周恩来","type":"人物"},{"name":"毛泽东","type":"人物"},{"name":"刘少奇","type":"人物"},{"name":"朱德","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2b0ab5232d"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
