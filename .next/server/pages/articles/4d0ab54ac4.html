" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji27","name":"毛泽东全集第27卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji27.pdf"],"article":{"title":"转发人民解放军入疆综合报告","alias":"","parts":[{"type":"paragraph","text":"转发人民解放军人疆综合报告\""},{"type":"paragraph","text":"（1949年10月25日）菲利波夫同志："},{"type":"paragraph","text":"现将人民解放军进入新疆的先头部队的第一个详报转发给你。这个报告是人民解放军第一兵团第二军军长和政治委员在十月十八日由哈密发出的。那时，我军还只到达哈密、吐鲁番、鄯善等"},{"type":"paragraph","text":"[1]这是毛泽东给斯大林的电报。[2]菲利波夫，即斯大林。"},{"type":"paragraph","text":"[3]指中国人民解放军第一野战军第一兵团第二军军长郭鹏、政治委员王恩茂1949年10月18日20时呈送的《入疆综合报告》。报告说，我军于10月12日从酒泉、玉门、安西之线出动。到10月18日为止，我军第四师第十二团已进至吐鲁番。第十团及师指，现在鄯善。第十一团之一部正向鄯善车运中，一部仍在哈密。军指及第五师师指和第十四团、第十五团仍在哈密。综合报告如下：一、我军入疆得到新疆各民族人民的热烈欢迎。二、张治中、陶峙岳的新疆起义部队有三种不同表现：一种是解放军来到前，反动分子组织和煽动国民党军放火，但解放军到后停止了这种现象；一种是解放军到达时，反动分子煽动国民党军队杀人、放火，企图阻止解放军前进；一种是自起义后始终维护地方秩序，保护人民的生命财产。我们对这三种不同表现的部队采取了不同的方针和态度。三、肃清特务分子、反动分子是保证新疆和平解放胜利的重要条件。四、新疆民族问题仍然复杂，但有党的正确民族政策，我们有十足的信心，团结新疆各民族，为建设新新疆而奋斗。五、部队纪律在群众中有好的称赞。毛泽东全集第二十七卷地。至十月二十日时，已进到迪化“和焉者。"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"一九四九年十月二十五日[1]迪化，今新疆乌鲁木齐。"}],"authors":["毛泽东"],"dates":[{"year":1949,"month":10,"day":25}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":465,"page_end":466},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4d0ab54ac4"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
