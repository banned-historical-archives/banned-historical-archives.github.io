script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"“敢”字当头，砸烂资产阶级“正规化”的框框","authors":[],"dates":[{"year":1968,"month":11,"day":23}],"is_range_date":false,"parts":[{"type":"paragraph","text":"“敢”字当头，砸烂资产阶级“正规化”的框框"},{"type":"paragraph","text":"去年十一月，我们吉林延边朝鲜族自治州安图县石门公社北山大队，把公办小学改由大队来办。一年来我们深深体会到，毛主席关于“在农村，则应由工人阶级的最可靠的同盟者——贫下中农管理学校”的伟大教导，是非常英明，非常正确的。"},{"type":"paragraph","text":"我们贫下中农掌握了农村教育大权后，大造了修正主义教育路线的反，成立了以大队革委会领导成员为核心的教育革命领导小组，实行了中小学“九年一贯制”。为了真正向贫下中农子女敞开校门，教育革命领导小组决定，孩子上学不受年龄限制，学杂费、书费、取暖费由大队全部包下来。"},{"type":"paragraph","text":"一年来的实践，我们还体会到，必须遵照毛主席关于“最重要的问题，是选择校长教员和规定教育方针”的教导，狠抓教师的思想革命化。管学校先管人，管人先管思想。生产大队积极组织教员参加生产队的对敌斗争，到生产队参加集体生产劳动，同社员一起办学习班，一起斗私批修，一起批判修正主义教育路线。经过充分酝酿以后，教员不拿国家工资，和社员一样评工记分。为了更好地掌握农村教育大权，我们选拔了七名优秀的贫下中农社员开进了学校，登上了讲台；学校教员实行了分期分批到生产队劳动，取得社员资格以后，再回学校当教员。这样，教员和社员之间的鸿沟逐渐填平了，感情也越来越接近了，为建立起一支新型的教师队伍打下了基础。"},{"type":"paragraph","text":"一年来的实践，我们还体会到，必须按照毛主席培养“有社会主义觉悟的有文化的劳动者”的教导，“敢”字当头，“革”字当头，彻底砸烂资产阶级洋框框，摧毁旧学校的“智育第一”“分数挂帅”等等修正主义黑货，把资产阶级的陈规旧章等统统废除掉。现在，学生学的是毛主席著作，读的是无产阶级家谱。此外还增设了医师、兽医、瓦工、木工、拖拉机、果木、会计等课目，一年来共培养了既懂得阶级斗争又有实践的各种专业人材七十多名。这样培养出来的学生说话实在，办事牢靠，是毛主席放心、贫下中农满意的好接班人。"},{"type":"paragraph","text":"一年来的实践，我们也深深体会到，必须遵照毛主席关于勤俭办一切事业的教导，自力更生，勤俭办学，走抗大式的道路。我们狠狠地批判了那种办洋学堂、摆阔气的思想。校舍坏了自己修，桌椅不够自己动手做，大队的木工和学生修理、新做了一百条桌椅，修门窗五十多个。学生做到了读书兼种地，学工也学农。今年我们大队买来一台拖拉机，就是由我们学校自己培养出来的拖拉机手驾驶翻地，我们贫下中农打心眼里往外高兴。这样培养出来的学生，忘不了本，变不了修，永远和我们一个心眼。"},{"type":"paragraph","text":"吉林延边朝鲜族自治州安图县"},{"type":"paragraph","text":"石门公社北山大队全体贫下中农"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"吉林文革","type":"人物"},{"name":"教育革命","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"4120fcf38d"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
