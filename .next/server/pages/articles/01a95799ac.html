" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中国共产党全国代表会议关于中华人民共和国发展国民经济的第一个五年计划查案的决议","authors":[],"dates":[{"year":1955,"month":3,"day":31}],"is_range_date":false,"parts":[{"text":"中国共产党全国代表会议关于中华人民共和国发展国民经济的第一个五年计划查案的决议","type":"title"},{"text":"（一九五五年三月三十一日通过）","type":"subtitle"},{"text":"中国共产党代表会议同意中央委员会提出的关于中华人民共和国发展国民经济的第一个五年计划草案的内容和陈云同志代表中央委员会所作的关于发展国民经济的第一个五年计划的报告，认为这个计划是实现党在过渡时期总路线的一个重大步骤。全党同志必须在中央的领导下，团结全国各族人民群众，兢兢业业，克服困难，努力增产，厉行节约，为完成和超额完成这个计划而奋斗。","type":"paragraph"},{"text":"全国代表会议建议中央委员会根据这次会议的意见，对五年计划草案进行必要的修正，并在修正以后，提交第一届全国人民代表大会第二次会议予以审议和通过。","type":"paragraph"}],"comments":[],"origin":"根据文件的原件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"01a95799ac"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
