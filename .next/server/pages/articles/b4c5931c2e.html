" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoistlegacy.de-2489","name":"财政部中央统战部转告关于原工商业者要求领取已放弃定息的处理意见","author":"财政部","internal":false,"official":false,"type":"unknown","files":[],"article":{"title":"财政部中央统战部转告关于原工商业者要求领取已放弃定息的处理意见","dates":[{"year":1981,"month":1,"day":23}],"is_range_date":false,"authors":["中央统战部","财政部"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"中共河北省委统战部, 统一战线文件选编(第一册), 658-659","tags":[{"name":"定息","type":"主题/事件"},{"name":"捐献财产","type":"主题/事件"},{"name":"原工商业者","type":"主题/事件"}],"parts":[{"type":"title","text":"财政部中央统战部转告关于原工商业者要求领取已放弃定息的处理意见"},{"type":"subtitle","text":"（一九八一年一月二十三日）"},{"type":"paragraph","text":"上海市委统战部一九八〇年七月十七日向中央统战部报送了《关于原工商业者要求领取已放弃定息处理意见的请示报告》。遵照中央书记处负责同志批示，经中央统战部与财政部研究，于十二月三十一日复函上海市委统战部表示同意。现将上海市委统战部来文和中央统战部复文摘附于后，请参照执行。但请你们注意，不要动员原工商业者捐献定息或办理了结定息手续；申请办理了结定息手续者，应同时报经区、县以上人民政府批准。"},{"type":"paragraph","text":"附："},{"type":"paragraph","text":"（一）上海市委统战部《关于原工商业者要求领取已放弃定息处理意见的请示报告》（摘录）："},{"type":"paragraph","text":"“经我们研究，认为此事是在当时历史条件下，即在一九五八年‘加速改造’的情况下表示放弃定息的，而大多数是以改造规划或大小会议上提出的，只少数有正式书面申请，但大都未正式批准，更没有办理上交国库手续。一九六〇年‘神仙会'后，我们又公开宣布‘领不领听便’。为了体现党的政策的一贯性，有利于促进台湾回归袓国，特别是扩大对港澳和国外的影响，我们认为对这部分定息可仍作为应领未领定息处理。具体意见是："},{"type":"paragraph","text":"一、凡原工商业者过去表示过放弃，但未办过批准上交手续，现在要领取的，只要本人提出申请，就可按原规定发给。本人已经死亡的，合法继承人要求领取的，亦可凭原有领息凭证，按规定手续发给。"},{"type":"paragraph","text":"二、 对于已经要求放弃定息，现在因年老体弱，担心他日故世后子女有变，要求办理了结手续的，由本人提出书面申请，报区、县、局党委批准，即可上交国库，予以了结，并报市委统战部备案。"},{"type":"paragraph","text":"三、 对要求将已放弃定息领取后，另行捐献给指定单位、部门的，应按中央统战部‘关于处理原工商业者捐献财产问题的几点意见’的规定办理。”"},{"type":"paragraph","text":"（二）中央统战部“复关于原工商业者要求领取已放弃定息处理意见的请示报告”（摘录）：“我们同意你们的意见。”"}],"alias":""},"tags":[{"name":"上海文革","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"b4c5931c2e"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
