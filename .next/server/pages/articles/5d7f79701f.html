script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"反对垄断资本家加紧剥削　要求增加工资  日本十三万多煤矿工人罢工  意二十万农业工人和英六万煤矿工人罢工","authors":[],"dates":[{"year":1961,"month":3,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"反对垄断资本家加紧剥削　要求增加工资"},{"type":"paragraph","text":"日本十三万多煤矿工人罢工"},{"type":"paragraph","text":"意二十万农业工人和英六万煤矿工人罢工"},{"type":"paragraph","text":"据新华社27日讯　东京消息：日本煤矿工会的十三万五千多名工人今天在全国一百二十二个地方举行二十四小时罢工，反对池田政府和垄断资本家实行“企业合理化”政策，并要求提高每人每月工资三千日元。煤矿工人还在各地举行了总奋起大会。"},{"type":"paragraph","text":"为了把生产过剩危机的损失转嫁到工人身上，日本煤炭工业垄断资本正在加紧推行进一步压榨工人的“企业合理化”政策。按照他们的计划，将在1963年以前封闭一百七十九个矿山，解雇煤矿工人七万六千名。"},{"type":"paragraph","text":"新华社28日讯　罗马消息：意大利西西里岛上的二十万农业工人昨天响应意大利总工会和其他工会的号召，举行了罢工。罢工者要求对农业工人和他们的家属实施社会保险法，要求增加工资和没收那些没有完成耕种土地义务的地主的土地，并把这些土地分给无地农民。"},{"type":"paragraph","text":"据新华社伦敦27日电　约克郡为要求增加工资而举行罢工的煤矿工人，今天已经扩大到六万人，等于这个地区煤矿的总劳动力的一半。"},{"type":"paragraph","text":"三十一个矿井的生产已经完全停顿，另外十一个也受到部分的影响。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5d7f79701f"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
