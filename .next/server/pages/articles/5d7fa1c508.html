<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-fanyou","name":"中国反右运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"广东中、小城市各民主党派地方组织中的问题","authors":[],"dates":[{"year":1957,"month":8,"day":14}],"is_range_date":false,"parts":[{"text":"广东中、小城市各民主党派地方组织中的问题","type":"title"},{"text":"新华社广州14日电　广东省中小城市各民主党派地方组织及工商联问题严重。","type":"paragraph"},{"text":"右派当权","type":"subtitle"},{"text":"各民主党派地方组织和工商联多数是右派当权，领导层为右派或中右分子掌握，成员中，中、右分子占优势。左派力量单薄，骨干缺乏，反右斗争的内部核心力量尚未组成。如海口市民革五个头子有三个是右派分子；民建会有三个是右派分子，民盟有二个是右派分子（领导层以中间和中右分子占多数）；韶关市，民盟有三个头子是右派分子；民革的领导层都是右派分子，沈秉强就是头子。佛山市民盟7月初改组后仍是中间分子当权；民建、农工也是中间分子所掌握。江门市民盟为右派分子所掌握（李有杰为主委）；民建则为中间分子掌握。湛江市民盟领导层中无一左派，民建、工商联的正、副主委不是右派就是中右分子；民建两个负责人一个是右派分子。惠阳鎭民革有五个成员，十天前，省民革通知要他们成立组织机构，其中有些委员不仅是历史特务，而且是现行特务。总的说来，民盟在海口、汕头、韶关、江门、湛江、佛山、合浦的地方组织为中右分子或右派分子所掌握；农工在高要、惠阳、合浦的地方组织为中右或右派分子掌握；民革在海口、惠阳、韶关、合浦的地方组织为中右分子或右派分子掌握；民建会在海口、汕头、湛江、佛山的地方组织为中右分子或右派分子掌握。目前这种情况对反右斗争的开展有很大的影响。","type":"paragraph"},{"text":"秘密发展组织","type":"subtitle"},{"text":"各民主党派地方组织在“放”、“鸣”中乃至在最近反右斗争中还多方找寻机会急于发展成员，如农工党半月前还由省里派了两个人到韶关市，不让韶关市委统战部知道（韶关市委统战部已向他们说明在整风期间暂不发展组织），秘密地发展了成员十三人；幷揑造事实向农工党省委报称韶关市委统战部同意其成立支部。惠阳农工党组织也在大“鸣”大“放”中发展了六个小学教师；召开会议时不和我党组织取得联系，找偏僻地方去开会，不让我们知道。民革海口市组织在“放”、“鸣”期间也发展了成员十人。","type":"paragraph"},{"text":"分庭抗礼","type":"subtitle"},{"text":"海口市民革竟宣称不能反右，“要反右就必须报民革中央”！民革惠阳筹委会也在此期间要成立支委会，幷将一个历史特务选为支委，虽然我们一再表示不同意，但他们却不理睬我们的意见。他们强调这是他们组织内部问题，要我们尊重他们组织的独立性。","type":"paragraph"},{"text":"来源： 新华通讯社编：《内部参考》，第2284期，1957年8月15日。","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"5d7fa1c508"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
