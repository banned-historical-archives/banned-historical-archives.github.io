" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"沈阳装具厂发现部分工人产生极端民主化的思想　干部缩手缩脚怕负责任影响生产很大","authors":[],"dates":[{"year":1952,"month":2,"day":14}],"is_range_date":false,"parts":[{"text":"沈阳装具厂发现部分工人产生极端民主化的思想　干部缩手缩脚怕负责任影响生产很大","type":"title"},{"text":"【东北总分社十四日讯】沈阳装具厂在“三反”运动开展后，发现部分工人产生极端民主化的思想和干部怕负责任的现象，影响生产很大。该厂生产质量曾经一度普遍下降，工人缺勤，车间主任和工段长都不敢进行批评。大部分检查员发现不合格的产品不敢让工人返工，因而使产品质量一度普遍下降。有时每天不合格产品平均占百分之十到二十左右，曾有一天达百分之四十以上。该厂因不敢派工人检查仓库，已有数千多箱炮车用的挽具被老鼠咬了，另有十余万双军用棉鞋因保管不善已开始发霉。","type":"paragraph"}],"comments":[],"origin":"新华通讯社编《内部参考》1952年2月15日","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"ac5c4a0c3e"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
