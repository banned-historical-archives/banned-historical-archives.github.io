script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"彻底清算右倾思想","authors":["蒋虹"],"dates":[{"year":1952,"month":3,"day":12}],"is_range_date":false,"parts":[{"type":"paragraph","text":"蒋虹"},{"type":"paragraph","text":"三月六日人民日报“党的生活”栏刊出阮迪民同志对自己右倾思想的检讨。事情是这样的:甘肃日报社社长兼甘肃人民广播电台台长阮迪民，在三反运动展开后，曾于二月四日给中共甘肃省委写了一封信，信上说:“我以对党绝对负责的态度，保证没有一亿元以上的大贪污分子(指他负责的二个机关——笔者)。如果查出大贪污分子，我愿受党的处分。”可是，仅仅四天以后(二月八日)，在外部的检举下，甘肃人民广播电台发现了大老虎，这才使阮迪民同志大吃一惊。"},{"type":"paragraph","text":"在这件事情中，我们可以明白地看出，右倾思想对三反、五反运动的严重危害性。阮迪民同志认为自己负责的是文教机关，“清水衙门”，不至于有大老虎；这种右倾思想，使他向省委来一个聪明得可笑的保证。要不是外部把甘肃人民广播电台的大老虎检举出来，使阮迪民猛然醒悟；那么，他这种右倾思想必然会成为大小老虎的“深山密林”，成为他们的“防空洞”。一个人的右倾思想，就会使无数老虎逍遥自在，就会大大阻碍三反、五反斗争取得最后胜利。这还不明白吗?"},{"type":"paragraph","text":"而阮迪民同志这种右倾思想，也存在于很多首长和干部们之中。有的认为“清水衙门”不会有什么问题；有的认为自己单位这么小，既然已发现了几只老虎，差不多了吧?有的认为拒不坦白的老虎很多已经落网，不会再有“老虎”有那份胆量拒不投降了吧?因为他们终究是人……这些思想表面看来虽有不同，但都是右倾思想在不同情况下的表现。"},{"type":"paragraph","text":"目前，由于全国人民奋起参战，由于毛主席、共产党的英明指挥，我们在三反、五反战线上已取得了辉煌的战果，但还没有把敌人全部肃清。为了把三反、五反斗争进行到底，并取得最后胜利，我们应该迅速、坚决、彻底清算我们的右倾思想。"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"806f22cb0d"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
