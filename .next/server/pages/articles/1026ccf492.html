script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"法国画商生财有道  画家遭到层层剥削","authors":[],"dates":[{"year":1957,"month":8,"day":1}],"is_range_date":false,"parts":[{"type":"paragraph","text":"法国画商生财有道  画家遭到层层剥削"},{"type":"paragraph","text":"本报讯  法国画商操纵了“绘画市场”，他们拥有私人绘画馆和古今名画，而且还掌握了绘画界大权。他们不仅能任意给一幅画评价，而且选派参加国际画展的画家和作品也由他们包办，按照私人绘画馆的契约一个有名望的画家从画商手里得到一个月的生活费，至少得画十五张到三十张画，这就迫得画家们星期日也得紧张工作。可是画家这一笔收入还要被扣除数目可观的职业性开支：如画室费、颜料费及其他各种苛捐杂税。因此即使是名画家单靠创作也不能维持一家大小的最低生活。为此他们不得不从事第二种职业。"},{"type":"paragraph","text":"通常画商卖掉一幅画能得好几十万法郎。这比付给画家一个月的报酬多好多倍。但是画商们并不想马上把所有的画卖出去。他们把绘画当作股票，在市场上作投机买卖，以获暴利。"},{"type":"paragraph","text":"如果画家要想在艺术界取得一定的地位，就必须在画商的私人绘画馆举办画展。画家除了缴纳十万到五十万法郎的房费外还要出广告费。画商不出一个钱，却要从画家全部卖画款项中扣取30％至50％。结果画家终年辛苦的劳动成果，都被画商们剥削去了。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1026ccf492"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
