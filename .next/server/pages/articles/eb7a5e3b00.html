script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"在毛主席“备战、备荒、为人民”的伟大方针指引下东海农场认真学大寨粮棉双双超《纲要》今春以来，全场掀起了活学活用毛泽东思想群众运动新高潮，结合“一打三反”运动，狠批修正主义办场路线；在抓革命促生产中，充分发挥了人的主观能动作用，夺得了粮食亩产八百斤以上、皮棉亩产超百斤的优异成绩","authors":[],"dates":[{"year":1970,"month":12,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"本报讯　在毛主席的“备战、备荒、为人民”的伟大方针指引下，本市东海农场广大革命职工，以大寨为榜样，突出无产阶级政治，思想领先，在抓革命促生产中，充分发挥人的主观能动作用，夺得了今年粮、棉双丰收。粮食亩产达到八百斤以上，总产量比去年增长百分之四十七点五；皮棉每亩超百斤。在上海市郊的国营农场中，产量第一个达到和超过《全国农业发展纲要》的指标。"},{"type":"paragraph","text":"前几年，出于受修正主义办场路线的影响，这个农场的产量低，成本大，大家不满意。在不断掀起的大学习、大批判高潮中，广大青年职工尖锐地提出了这样的问题:“农场机械化程度高，化肥多，条件比附近的人民公社好，为什么对国家的贡献小?”他们从路线上找问题，从世界观上找原因，认识到，要改变农场面貌，关键在于人的思想革命化，在于突出无产阶级政治，坚决执行毛主席的革命路线。广大职工说，我们要充分发挥国营农场全民所有制的优越性，为社会主义革命和社会主义建设作出较大的贡献。"},{"type":"paragraph","text":"今年开春以来，东海农场的干部和群众结合“一打三反”运动，狠批修正主义办场路线，狠批无政府主义和各种非无产阶级思想。全场从上到下，掀起了活学活用毛泽东思想群众运动的新高潮。广大职工以班组或宿舍为单位建立学习小组，健全学习制度，无论农忙、农闲都能坚持“天天读”。三连、五连等许多连队还自觉开展了“红哨兵”活动，提倡斗争哲学，人人做思想工作，做到互相帮助，共同提高。革命的大学习、大批判，提高了青年的阶级斗争和路线斗争觉悟，推动了革命和生产的向前发展。十连原是场里较后进的连队，在个别坏人的挑动下，一度无政府主义思潮泛滥，生产搞不上去，去年每亩棉田只收皮棉五十六斤。今年以来，全连革命职工在场部领导和兄弟连队的推动、帮助下，突出无产阶级政治，狠抓阶级斗争和革命大批判，革命、生产都打了一个翻身仗，全连棉田平均亩产皮棉达一百二十斤以上。"},{"type":"paragraph","text":"东海农场在夺取今年粮、棉超《纲要》的战斗中，坚持走“农业学大寨”的道路。广大职工满怀热情学大寨，赶先进，虚心向贫下中农学习。农场邻近的泥城公社，是上海郊区农业学大寨的先进单位之一。过去，农场有些干部强调农场“特殊”，对摆在眼门前的先进典型，不去好好学习。今年春天，他们在学习、贯彻全国棉花生产会议精神时，提出了“远学大寨，近学泥城”的战斗口号，农场革委会组织干部和群众数次到泥城公社参观、学习。泥城公社的贫下中农以大寨为榜样，活学活用毛泽东思想，自力更生，艰苦奋斗，认真贯彻执行农业“八字宪法”，实行科学种田等先进事迹，使农场职工受到极大的鼓舞和教育，进一步增强了“打好农场翻身仗”的信心与决心。广大职工向贫下中农学习，发扬大寨人坚持自力更生、艰苦奋斗的革命精神，改变了农场历来不积自然肥料的大少爷作风。今年春、夏，他们车浜挑泥，全场共积了五十多万担河泥肥，为粮、棉丰收打下了基础。在播种早玉米时，因天旱影响出苗，五连等连队的青年职工，就用脸盆端水浇田，削竹片拨松泥块，保证了全苗，获得了玉米高产。一连“五·七”排的职工，都是一九六八年进场的知识青年。他们看到靠东海边有一块一百四十多亩贫瘠土地，因为远离连队，管理不便，一直没有种好，就自动组织起来，背着铺盖到这块土地上安家落户。两年来，他们用毛泽东思想武装头脑，发扬艰苦奋斗的革命精神，在海滩上住茅草棚，睡柳条床，点煤油灯，耕盐碱地，凭着一颗红心两只手，今年粮食亩产超《纲要》，棉花夺得了亩产皮棉一百五十斤以上的好收成。"},{"type":"paragraph","text":"东海农场有三千余名职工，其中百分之九十以上是从市区去的知识青年。他们遵照毛主席关于“农村是一个广阔的天地，在那里是可以大有作为的”教导，立足农场，放眼世界，在抓革命促生产中，努力改造世界观，决心为中国革命和世界革命作出应有的贡献。现在，大部分连队建立和健全了科研小组，在种、管、收等各个生产环节上，都注意认真、过细。过去有的职工施化肥，好象“天女散花”，乱施一通，既浪费肥料，又影响作物生长；现在，大家提高了为革命种田的觉悟，改用点施、条施，讲究质量、效果。各连队还普遍注意精选良种，为增产粮食和棉花打下了基础。"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"毛泽东","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"一打三反","type":"主题/事件"},{"name":"农业战线","type":"主题/事件"},{"name":"革命大批判","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"eb7a5e3b00"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
