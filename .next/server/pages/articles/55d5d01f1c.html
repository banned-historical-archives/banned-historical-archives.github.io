" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoistlegacy.de-814","name":"转发中央组织部、劳动人事部《关于犯‘三种人’错误和严重错误的人如何参加工资改革的通知》的通知","author":"中共广西壮族自治区委员会组织部","internal":false,"official":false,"type":"unknown","files":[],"article":{"title":"转发中央组织部、劳动人事部《关于犯‘三种人’错误和严重错误的人如何参加工资改革的通知》的通知","dates":[{"year":1985,"month":11,"day":19}],"is_range_date":false,"authors":["中共广西壮族自治区委员会组织部","广西壮族自治区劳动人事厅"],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"origin":"中共广西壮族自治区党委整党办公室, 处理“文革”遗留问题、清理“三种人”文件汇编(第四册), 279-281","tags":[{"name":"工资","type":"主题/事件"},{"name":"广西","type":"主题/事件"},{"name":"三种人","type":"主题/事件"},{"name":"严重错误","type":"主题/事件"}],"parts":[{"type":"title","text":"转发中央组织部、劳动人事部《关于犯“三种人”错误和严重错误的人如何参加工资改革的通知》的通知"},{"type":"paragraph","text":"桂劳人薪字〔1985〕11号"},{"type":"paragraph","text":"各地、市委，区党委各部、委办厅局室，区人民政府机关各委办厅局党组，各人民团体党组，各大专院校党委；各地行署，各市人民政府，区人民政府各直属机构："},{"type":"paragraph","text":"现将中央组织部、劳动人事部《关于犯“三种人”错误和严重错误的人如何参加工资改革的通知》转发给你们，请遵照执行。对于“文革”中犯“三种人”错误受党内严重警告或行政记大过以上处分的人如何进行工资改革的问题，应按桂办〔1985〕73号文第二条第二点中的有关规定办理：即“受党内严重警告和行政记大过以上处分，至工改开始（中、小学和幼儿园截止到一九八四年十二月三十一日，国家机关和其他事业单位截止到一九八五年六月三十日），正在处分期间或处分时间不满一年的，不能高套（如本人在案中，过去已免调过工资的可以高套）。”"},{"type":"paragraph","text":"中共广西壮族自治区委员会组织部"},{"type":"paragraph","text":"广西壮族自治区劳动人事厅"},{"type":"paragraph","text":"一九八五年十一月十九日"},{"type":"title","text":"关于犯“三种人”错误和严重错误的人如何参加工资改革的通知"},{"type":"paragraph","text":"劳人薪〔1985〕48号"},{"type":"paragraph","text":"各省、自治区、直辖市党委，中央各部委、国家机关各部委党组，各人民团体党组；各省、自治区、直辖市人民政府，中央各部委、国务院各部委、各直属机构，各人民团体："},{"type":"paragraph","text":"关于犯“三种人”错误或罪行以及在“文革”中犯严重错误的人如何进行工资改革的问题，经研究，现通知如下："},{"type":"paragraph","text":"一、对结论为犯“三种人”错误或罪行以及“文革”中犯严重错误的人，只要他们现实表现好，不再进行派性的串联活动或其他的反党活动，可按照劳人薪〔1985〕19号文件的有关规定套改新工资标准，其中现行标准工资额加10元后为122元（六类地区）以下的，符合高套条件的人员，可以在就近套级后再高套一级。"},{"type":"paragraph","text":"对于结论后受处分的上述人员，凡受降职或撤职处分的，应按其降职或撤职处分后的级别工资就近靠入新工资标准，但靠级后工资低于现任职务工资最低档的，可以进入本职务工资最低档。受其他处分的人员，均按省、自治区、直辖市的规定办理。"},{"type":"paragraph","text":"二、对正在受核查的对象，暂按本人现任职务和现行标准工资额及劳人薪〔1985〕19号文件的有关规定套改新工资标准，待问题查清后，再根据结论及处分和本人现实表现，按第一条规定办理。"}],"alias":""},"tags":[{"name":"广西文革","type":"人物"},{"name":"派性","type":"主题/事件"},{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"55d5d01f1c"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
