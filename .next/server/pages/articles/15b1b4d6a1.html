script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"老挝联合政府各部局职工和万象军队官兵纷纷起来斗争发起驱逐极右反动军政官员运动","authors":[],"dates":[{"year":1975,"month":5,"day":28}],"is_range_date":false,"parts":[{"type":"paragraph","text":"据新华社万象一九七五年五月二十七日电　老挝临时民族联合政府各部、局的职工，万象军队中的官兵纷纷起来斗争，驱逐极右反动军政官员。"},{"type":"paragraph","text":"五月二十七日，公共工程和运输部工程局职工和工程学院的学生数百人奋起斗争，要求驱逐公共工程和运输部总局长等一小撮反动分子。同日，国防和退伍军人部的退伍军人局和残废军人中心的职工和军人也起来斗争，要求驱逐退伍军人部总局长等反动分子。"},{"type":"paragraph","text":"在此之前，万象自来水公司二百多名工人于五月二十三日要求驱逐自来水局局长等七名反动官员。五月二十日，司法部一百多名职工发表声明，要求驱逐王宝死党司法部总局长等五名反动官员。"},{"type":"paragraph","text":"此外，教育、艺术和青年、体育部，经济和计划部以及农业局等部门的职工也发起了驱逐反动官员的运动。"},{"type":"paragraph","text":"从五月二十一日至二十六日，万象军队装甲兵的后勤、军需、军械等单位的官兵也纷纷发起抗议运动，要求驱逐一批反动军官。"}],"comments":[],"origin":"新华社","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"农业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"15b1b4d6a1"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
