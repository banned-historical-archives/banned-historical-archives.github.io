<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中共北京市委关于北京市协商委员会讨论第二次大批处理反革命罪犯的情况向中央、华北局的报告","authors":[],"dates":[{"year":1951,"month":5,"day":20}],"is_range_date":false,"parts":[{"text":"中共北京市委关于北京市协商委员会讨论第二次大批处理反革命罪犯的情况向中央、华北局的报告","type":"title"},{"text":"我们于5月18日召开北京市协商委员会的扩大会议，审查与讨论第二批大批处理反革命罪犯的处刑问题。出席会议的除协商委员会委员、市人民政府委员外，并邀请各民主党派中央负责人及政协全国委员会负责人陈叔通、史良、朱蕴山、吴羹梅等16人参加。刘王立明、黄炎培、黄绍竑等虽已邀请，但未到会。","type":"paragraph"},{"text":"现将会议情况报告如下：","type":"paragraph"},{"text":"（一）首先由彭真同志按照主席指示的精神，将处决这一批反革命犯的意见作了说明，着重解释了判处死刑、缓期两年执行、强迫劳动、以观后效的政策。次由罗瑞卿同志将此次准备处理的反革命罪犯的案情分类作了报告，并将量刑标准作了说明。","type":"paragraph"},{"text":"（二）与会者听了报告后，在讨论中一致拥护判处死刑缓期执行的处刑的新办法。史良说：“这是毛主席新的创造，我从司法的观点来讲，完全拥护。”彭泽民说：“能争取改造过来的就争取，但不要再来一个宽大无边。”新民报总经理陈铭德说：“这是合乎镇压与宽大相结合政策的一种创造。”北京大学校务委员会主席汤用彤说：“对一部分应该杀的反革命分子给以缓刑，用意很好。从教育的意义来讲，也可以试试看，可以取得很好的经验。”辅仁大学校长陈垣认为这个办法“仁至义尽”，并将死刑、死刑缓期执行、徒刑、取保释放、管制喻之为“新五刑”，“佩服得五体投地”。清华大学教授费孝通说“政府的精神是：一不愿错杀人，二不多杀一人，三不白杀一人”并引用贵州发生的实际例子说明杀人的教育意义：“杀了一个人，可以帮助许多人不再犯罪”。燕大宗教学院院长赵紫宸感到很兴奋，临行时说：“杀人的事叫大家讨论是从来没有的事。”并对我们办得细致认为很满意。其他发言的人也","type":"paragraph"},{"text":"都根据他们参加群众控诉会的体验，说明我们的政策是伟大的，给他们“上了一次大课”。","type":"appellation"},{"text":"（三）讨论后即开始审查案件，与会者分成8个组，将我们拟判处死刑和判处死刑缓期执行的案卷逐一精细审查，并在小组会上反复研究，陈叔通等也始终不倦，坚持到散会。在审案中他们曾对量刑轻重热烈发表意见，认为原定59个缓刑犯中有12个若处以缓刑，处理得轻了，似应改处死刑（会上已决定移到下一次处理）。在讨论到两个特务学生是否应判死刑时，认为这两个人私设刑庭，强奸两个女学生，并连续殴打大批学生将近10个月之久，实在罪行太重，不杀不足以平民愤，特别是大学教授和学生代表坚持得最厉害，最后即按决定判处死刑。","type":"paragraph"},{"text":"总起来说，这个会开得很好，很热烈，民主人士热烈发言，敢于坚持意见（多主张从重），并在取得一致意见后，表现特别高兴，一再称赞党的政策的伟大。这说明在大批处决反革命分子时，只要我们一一把罪状向群众宣布，不但可以大大祛除疑虑，而且是会取得群众的热烈拥护的。","type":"paragraph"},{"text":"会后反映俟收集后即报。","type":"paragraph"}],"comments":[],"origin":"根据《国民经济恢复时期的北京》刊印。","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1d20c6a314"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
