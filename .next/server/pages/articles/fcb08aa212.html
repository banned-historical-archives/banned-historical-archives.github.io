script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"探讨中国资产阶级革命派的形成《辛亥革命史稿》第一卷问世","authors":["史顺"],"dates":[{"year":1980,"month":12,"day":9}],"is_range_date":false,"parts":[{"type":"paragraph","text":"金冲及、胡绳武著的《辛亥革命史稿》第一卷《中国资产阶级革命派的形成》，最近已由上海人民出版社出版。这是一本史料丰富翔实、分析具体细致的学术性专著，记述了中国资产阶级的兴起到中国同盟会成立前的历史。"},{"type":"paragraph","text":"本书对甲午战后中国人民中爱国思想的嬗变以及中国资产阶级革命派及其所领导的革命活动进行了系统、详细的论述。作者在书中把革命派与改良派、下层群众反抗斗争的关系，革命派的宣传、组织活动等问题，提到一定的历史范围内加以分析，使读者清晰地寻找出中国资产阶级革命派形成、发展的基本脉络及其独特面貌。作者还对革命派形成的时间和特征，《清议报》、《新民丛报》、《国民报》、《江苏》、《浙江潮》等刊物和兴中会、湖北科学补习所、华兴会、光复会等革命团体的特点，改良派策划的自立军事件，反清思想，以及孙中山革命思想的形成和梁启超、章太炎等人的评价等一系列问题，提出了自己的看法。"},{"type":"paragraph","text":"(史顺)"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fcb08aa212"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
