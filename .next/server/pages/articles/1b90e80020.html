script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"剖析资产阶级自由化的哲学基础","authors":[],"dates":[{"year":1991,"month":10,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"剖析资产阶级自由化的哲学基础"},{"type":"paragraph","text":"《高校理论战线》第五期发表了孙伯鍨、侯惠勤的长篇文章《试论资产阶级自由化的哲学基础》。文章共分四个部分：一，必须清算资产阶级自由化的哲学基础；二，人道主义历史观和“社会主义异化”论；三，主体性实践哲学和“全盘西化”论；四，“新自由论”和“新启蒙”论。"},{"type":"paragraph","text":"文章指出，抽象人道主义和人性论服务于颠覆我国人民民主专政的政治目的大致经历了以下过程：第一步，用鼓吹抽象的人类价值和一般人性去摧毁我们社会制度的思想根基；第二步，用鼓吹抽象的个人价值和绝对个性去论证资本主义制度的合理性；第三步，用鼓吹抽象的文化价值并采取“启蒙”的方式去煽动颠覆人民民主专政的实际行动。"},{"type":"paragraph","text":"文章指出，所谓“社会主义异化”论（和“马克思主义异化”论），反对用历史唯物主义的科学态度具体地分析和总结过去的失误，而要求用“一般人道主义”揭露和批判社会主义制度下的“异化”和“非人道”现象；不是从某些非根本制度的方面去总结“十年内乱”的原因，而是认为社会主义制度本身必然地要产生这一切。因此，人道主义和异化论的提出决不仅仅是一个单纯的理论问题和道德问题。"},{"type":"paragraph","text":"文章指出，资产阶级自由化在对待改革开放上的主要表现是“全盘西化”。“全盘西化”论的前提是认为只有一种现代化，即西方资本主义模式。他们真正感兴趣的是西方的社会制度。他们从人出发，即把现代化归结为人的现代化，而把现代西方人看作是人的现代化的标本，从而导出“全盘西化”的结论。"},{"type":"paragraph","text":"和一般人道主义打出“回到青年马克思”的旗号不同，“主体性实践哲学”从一开始就打出了“回到康德去”的旗号。它针对所谓“黑格尔——马克思”人学观的两个“弱点”（缺乏心理分析和轻视个体实践）而提出了“人类学本体论”，用一种折衷主义的“全面性”（两个“双重结构”）、抽掉了马克思主义关于人的学说的基石（历史唯物主义）。他们要确立个人的本体论地位，因此，私有化、多党政治和世界观上的多元化就都成了顺理成章、呼之欲出的事情了。"},{"type":"paragraph","text":"文章提出，自由化思潮愈发展到后来，就愈加突出其政治内涵，也就必然向一定形式的政治哲学转化。“新自由”论和“新启蒙”论的出现，就是这一转折的标志。文章认为，“新启蒙”论先把它所敌视的社会主义宣布为封建主义，然后再向它宣战。它武断地认为我国现阶段的主要矛盾仍是民主和专制、科学和迷信的冲突，因而必须进行一场“新启蒙”。在它的折射下，我国人民在中国共产党领导下推翻三座大山，并建设起独立自主、初步繁荣富强的社会主义国家的七十年革命历程，竟被“封建社会主义”几个字轻轻地一笔勾销了。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"1b90e80020"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
