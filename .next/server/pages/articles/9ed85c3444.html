script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"班禅额尔德尼昨天离西宁返西藏  习仲勋同志代表毛主席中央人民政府送行  青海省各族各界人民曾举行盛大的欢送会","authors":[],"dates":[{"year":1951,"month":12,"day":20}],"is_range_date":false,"parts":[{"type":"paragraph","text":"班禅额尔德尼昨天离西宁返西藏"},{"type":"paragraph","text":"习仲勋同志代表毛主席中央人民政府送行"},{"type":"paragraph","text":"青海省各族各界人民曾举行盛大的欢送会"},{"type":"paragraph","text":"【新华社西宁十九日电】班禅额尔德尼及其行辕全体人员在十二月十九日自青海省西宁市启程返西藏。毛主席和中央人民政府特命西北军政委员会副主席习仲勋为代表，亲往送行。西宁市各界人民亦列队前往欢送。青海省人民政府除通令沿途地方人民政府准备粮食殷勤招待外，并派武装部队护送。"},{"type":"paragraph","text":"在和平解放西藏办法的协议签订后，班禅额尔德尼和达赖喇嘛曾互有电报往返。达赖数电欢迎班禅额尔德尼早日返回西藏，西藏地方政府并指派堪穷（掌理达赖宫廷内务的官员）、代本（四品官）各一人及哲蚌、色拉、噶丹三大寺堪布总代表等前趋迎接。"},{"type":"paragraph","text":"【新华社西宁十九日电】青海省各族、各界人民代表一千多人在十六日举行大会，欢送班禅额尔德尼离青海返西藏。"},{"type":"paragraph","text":"西北军政委员会副主席习仲勋代表毛主席、中央人民政府和西北军政委员会致欢送词，祝贺西藏人民和全国各兄弟民族的亲密团结。西北军政委员会委员黄正清（藏族）、中国共产党青海省委员会书记张仲良、青海省人民政府主席赵寿山、副主席兼人民解放军青海军区政治委员廖汉生和副主席喜饶嘉措（藏族）等，都在欢送会上讲话，他们一致祝贺达赖喇嘛和班禅额尔德尼的团结。喜饶嘉措在讲话中，希望班禅行辕的人员，要永远记住毛主席、中国共产党给予藏族人民的恩惠。他说：没有毛主席和中国共产党，班禅额尔德尼和堪布会议厅的人员要返回西藏是不可能的，只有在毛主席正确领导之下，达赖喇嘛和班禅额尔德尼才能消除旧日隔阂，使西藏内部更加团结起来。他希望班禅额尔德尼和堪布会议厅人员们返藏后，在毛主席、中国共产党和中央人民政府领导下，努力学习，一心一意地为人民服务，认真彻底地实现和平解放西藏办法的协议。班禅额尔德尼在致谢词中，对毛主席、中央人民政府、西北军政委员会和青海省党、政、军在解放以来的关怀和这次热情欢送，表示衷心感谢，并表示返藏后在毛主席、中国共产党和中央人民政府领导下，与达赖喇嘛紧密团结，彻底实现和平解放西藏办法的协议。会上，西宁各族各界代表和儿童向班禅额尔德尼献鲜花、锦旗。大会并通过给达赖喇嘛的贺电。"},{"type":"paragraph","text":"班禅额尔德尼及其行辕堪布会议厅人员在动身前，曾举行晚会与宴会，向毛主席、中央人民政府、西北军政委员会和青海省党政军负责人献哈达、锦旗和藏香、氆氇等礼物致谢。"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"习仲勋","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9ed85c3444"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
