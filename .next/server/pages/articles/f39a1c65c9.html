script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"毛泽东关于同意华东部队把士兵代表会议定为经常制度的建议的批语","authors":["毛泽东"],"dates":[{"year":1952,"month":1,"day":18}],"is_range_date":false,"parts":[{"text":"毛泽东关于同意华东部队把士兵代表会议定为经常制度的建议的批语","type":"title"},{"text":"毛泽东","type":"authors"},{"text":"陈毅同志，并告各大军区、志愿军和各中央局负责同志：","type":"appellation"},{"text":"一月十六日报告收到。（一）三反斗争应当照你所说的三个阶段去做。但请注意在第二阶段中要集中精力尽可能查出一切大中小贪污犯，即是嫌少不怕多，有多少就应查出多少来。特别注意查出大贪污犯，不达目的，不应停止。二月十日转入整编，仍须以专门机构担负继续穷追大贪污案和处理未了问题。此点极为重要，请各大军区一齐注意。（二）我完全同意把士兵代表会议规定为经常制度，每月或每两月开会一次，每次开一天至两天，做两个工作：通过领导者的检讨报告和通过财经报告。这个建议极好，可以在三反后保持群众民主斗争的锐气。即请你和唐亮同志起草几条简单的具体办法电告中央考虑决定，发布施行。各大军区和志愿军党委对此有何意见，望即商量电告。（三）将陈毅同志这个报告发给各大军区和志愿军同志们参考。","type":"paragraph"},{"text":" 毛  泽  东一月十八日","type":"paragraph"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"name":"陈毅","type":"人物"},{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"批示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"f39a1c65c9"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
