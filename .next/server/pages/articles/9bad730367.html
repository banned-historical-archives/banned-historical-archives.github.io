" crossorigin="">{"props":{"pageProps":{"books":[{"id":"8c1a5316-884e-465a-9775-48338f6cc6b5","name":"揭发“四人帮”王洪文插手控制上影阴谋篡党夺权的罪行（1976.12）","internal":false,"official":true,"type":"img","author":"王洪文、马天水、徐景贤、黄涛，1976.12，反攻倒算材料，中共上海电影制片厂委员会","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/8c1a5316-884e-465a-9775-48338f6cc6b5/1.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/8c1a5316-884e-465a-9775-48338f6cc6b5/2.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/8c1a5316-884e-465a-9775-48338f6cc6b5/3.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/8c1a5316-884e-465a-9775-48338f6cc6b5/4.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/8c1a5316-884e-465a-9775-48338f6cc6b5/5.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/8c1a5316-884e-465a-9775-48338f6cc6b5/6.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/8c1a5316-884e-465a-9775-48338f6cc6b5/7.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/8c1a5316-884e-465a-9775-48338f6cc6b5/8.jpg","https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives1/main/8c1a5316-884e-465a-9775-48338f6cc6b5/9.jpg"],"article":{"title":"第二部分","alias":"","parts":[{"type":"paragraph","text":"第二部分按："},{"type":"paragraph","text":"一九七五年，常大的令袖和导所毛主房对文艺工作发出了一系列营要和示，招评诗歌、小说、散文等文艺创作和文艺批评数量较少，提出要调整党内的文艺政策，对“四人帮”进行了严厉报评和时心育，但是“四人希”所心不死，反而变本加厉，严容封锁毛主席的重要恭示，疯狂对抗毛主席的严厉评，“西人帮”和马徐王为了继续控制上活文艺阵地，妄图利用文艺为信们身党夺权大造反重命奥论。十月中旬：在延安西路200号宽划否开了一个“上海文艺座该会”（简称200号会议），妄图把这次会议同毛主席名开的延安文艺座谈会指提并论"},{"type":"paragraph","text":"这次会议名为洛实毛主席的一系列示”，实际上是原原本本传达了姚文元关于《诗刊》复刊的一封信，除了毛主席在信上批示的“园意”两个字外，毛主的一系列重要扣示统统被封锁了，王洪文一面别有用心地让人搞了个统计委字，大谈特谈所谓“文化大阜命以来的成绩”，直接对抗毛主居的扩评，一面又改头换面，把毛主康的指示集改为他王决文的“扫示”"},{"type":"paragraph","text":"在竭力封锁集改对抗毛主扁扫示的同时，“四人布”和马徐王又一再把“四人和”同毛主房并列起来，无耻吹样“四人称”，完今暴显了做信等党夺权的狼子野心，如徐景贤说：今天洪文文X专门来参加会议，这是党关心文艺的表现，马老、市委富委能来的都来了，力抓好文艺工作，进主主的批示和文元××的信的传达，等会洪文XX和马老的谢话，作为东风，便上海文艺出现新的面新，”马天水私说：“会议学习毛主房批示和姚文元XX的信，为了繁荣创作，活所评诊，这是很重要的，”王洪文讲的更器骨："},{"type":"paragraph","text":"这次会议是有毛主船自一系列报示、文元××的一封信的基础上否开的"},{"type":"paragraph","text":"由此可见，这次会议比起刘少春、四条汉子一九六四年凭划召开的“南京票会”（也是疯狂对抗毛主席对文艺工作的或要批示）真是本过之而无不及，个。"},{"type":"paragraph","text":"下面是王洪文十月十四日在“上江文艺座谈会”同意会上的讲话。"},{"type":"paragraph","text":"景贤×X，天水×X都讲了，没有多少话好讲，景贤×X讲的话很章要，次会议是在毛主居的一票列示，文元XX的一封信的基础上召开的，就是要落实毛主房的一系列指示，从上洗来看，文化大革命以来，在文艺创作上取得了很大成绩，厕才出版社同志讲，文化大革命以前，长篇小说一年只出二，三部，班在有年平均是五部，也出了一些样板戏，印影也是这样，类量星不多，质量是比较好的，我也听到了后众的一些反映，这些成绮必须肯定。"},{"type":"paragraph","text":"是否能了？不够。比如讲诗歌，小说，散文，文艺评论，远是较少的，这些都需夏逐步扩大，警要我们在座同志和通过我们发动高众指新的食作，满足工农兵的需要，为社会主义事命和建设服务，绿续页献多们的力量，但这不走今天或明天可以完成的，急要一定的时间，逐步扩大，需安一年，二年，或者三年，甚至四年、五年逐步地使它经荣，总之，要禁荣社会主义文化"},{"type":"paragraph","text":"第二，政策问题，政策上，各单位领导检查一下，对知识分子的政策是否落实了，能用主是用，只要这些人不是国民党，不是叛徒、特务，就要邦助作，假用他，各级领导要了品一下，抓一下安报指毛主后拍示，调动一切和极因素，为社会主义耳命和建设服务，来察荣，发是社会主义创作，有少数人有点怕，怕出套草，其"},{"type":"paragraph","text":"一11一实这没有关系。我们要相信绝大多数人经过无产阶级文化大革命，精神面貌、觉悟都提高了。但有没有坚持资产阶级立场的？有，这也没有什么关系，我们要相信工农兵是有很高鉴别能力的，而多数剧本、作品还是好的。各级领导要克服怕字，有利于调动积极因素，有利于调整党内文艺政筑"},{"type":"paragraph","text":"另外，队伍问题，随着革命深入，工农兵对我们作品的数量和质量的要求都高了，靠在座的同志不够，要培养千千万万组成的文艺队伍，来为繁荣社会主义文化而努力工作。今天在座的，我们感到高兴的，有老的、中的。青的，也有工农兵的作者，但这不够，还需要培养更多的创作人员。只有这样，才能极大地丰富社会主义文化生活。专业要培养，业余的也要更多地培养。总之，创作不是那一个单位的事，是全党的事情，首先市委要加强领导。我相信，只要工作做得好，经过几年努力，面貌一定会有更大变化我希望今后，能有更多更好作品出现，希望大家为繁荣社会主义文化作出更大努力。"},{"type":"paragraph","text":"主席曾经讲过文化、艺术、出版。科技、卫生，有这种思想，月亮还是西方的好。这条战线很容易出修正主义。创作人员改造是否够了，改造还不够，二个阶级、二条路线斗争还在继续，过去有人说月亮还是西方的好，这种崇洋媚外思想在我们队伍中还是有的。我们任何时候不能放松这条战线的思想教育。我们上海还不断会出现新的情况，资产阶级、修正主义还会出现的，只不过程度不同。在座的创作人员要很好学习马列、毛主席著作，深入工农兵生活，这是一个十分限苦的任务"},{"type":"paragraph","text":"主席曾经讲过文化、艺术、出版。科技、卫生，有这种思想，月亮还是西方的好。这条战线很容易出修正主义。创作人员改造是否够了，改造还不够，二个阶级、二条路线斗争还在继续，过去有人说月亮还是西方的好，这种崇洋媚外思想在我们队伍中还是有的。我们任何时候不能放松这条战线的思想教育。我们上海还不断会出现新的情况，资产阶级、修正主义还会出现的，只不过程度不同。在座的创作人员要很好学习马列、毛主席著作，深入工农兵生活，这是一个十分限苦的任务"}],"authors":["中共上海电影制片厂委员会","王洪文"],"dates":[{"year":1975,"month":10,"day":14}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":6,"page_end":7},"tags":[{"name":"姚文元","type":"人物"},{"name":"王洪文","type":"人物"},{"name":"上海文革","type":"人物"},{"name":"夺权","type":"主题/事件"},{"name":"文艺战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"9bad730367"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
