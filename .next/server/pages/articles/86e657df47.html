script><script src="/_next/static/V3kifhCZS3puGXGpIWv_z/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji25","name":"毛泽东全集第25卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives8/main/maoquanji25.pdf"],"article":{"title":"抓住胡宗南使其兵方不能他调","alias":"","parts":[{"type":"paragraph","text":"抓住胡宗南使其兵力不能他调！"},{"type":"paragraph","text":"（1948年12月1日）彭、张，并告西北局："},{"type":"paragraph","text":"（一）庆贺你们歼敌二万余人的大胜利。（二）你们进行整训是必要的，但是不要提出整个冬季的整训计划，只提出一个月的整训计划，一个月计划中分为两期，半个月为一期。两期完毕后，如有作战机会，即打一仗，如无作战机会，再延长整训时间，做第三期整训计划（半个月）。我们的目的是，你们既能整训，又能不失有利的作战时机，借以拖住胡宗南使不能调至他处。（三）我们现在所要竭力争取的：一是尽可能不使傅作义部（四十个师）向江南撤退，因此东北我军仅休息二十天即已令其出动，以便早日抓住平津敌人；二是希望你们抓住胡宗南，使他的兵力不能调至沪、宁一"},{"type":"paragraph","text":"[1]1948年11月15日，西北野战军发起冬季攻势。16日在陕西合阳以东地区歼灭国民党军第一四四师大部。25日，在蒲城永丰镇地区对进入预定战场国民党军第七十六军发起攻击，激战至28日，全歼该敌。西北冬季攻势，共歼灭国民党军2.5万余人，俘虏第七十六军军长李日基。这是毛泽东为中共中央军委起草的给西北野战军司令员兼政治委员彭德怀和副司令员张宗逊的电报。"},{"type":"paragraph","text":"[2]胡宗南，当时任国民党军西安绥靖公署主任。带。（四）我刘邓、陈粟两军\"在徐蚌区域之作战，除已歼敌十八个师外，现又包围黄维兵团十一个师于宿县、蒙城之间，大约一星期内外可以解决。此敌歼灭后，即进行对于徐州附近邱清泉、李弥、孙元良三个兵团（二十二个师）之作战。假如这些敌人都能被我解决，则蚌埠淮阴以南、长江以北所余敌人不多，只有李延年、刘汝明、周、夏威四部，共约二十四个师，且分散几处，较易解决。国民党在江南的统治就很难站住，从根本上（不是说全部）打倒国民党的任务，就有可能缩短到一年左右的时间内完成之。"},{"type":"paragraph","text":"军委"},{"type":"paragraph","text":"一日十二时"},{"type":"paragraph","text":"[1]刘邓、陈粟两军，指中原野战军和华东野战军。中原野战军司令员刘伯承、政治委员邓小平。华东野战军司令员兼政治委员陈毅、代司令员兼代政治委员粟裕。"},{"type":"paragraph","text":"[2]徐蚌，指江苏徐州和安徽蚌埠。[3]黄维兵团，指国民党军第十二兵团，兵团司令官黄维。"},{"type":"paragraph","text":"[4]邱清泉、李弥、孙元良三个兵团，指国民党军第二兵团、第十三兵团和第十六兵团，兵团司令官分别为邱清泉、李弥和孙元良。"},{"type":"paragraph","text":"[5]李延年，当时任国民党军第六兵团司令官。刘汝明，当时任国民党军第八兵团司令官。周，当时任国民党军第一绥靖区司令官。夏威，当时任国民党军华中“剿匪”总司令部副总司令兼第八绥靖区司令官。"}],"authors":["毛泽东"],"dates":[{"year":1948,"month":12,"day":1}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":314,"page_end":315},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"86e657df47"},"buildId":"V3kifhCZS3puGXGpIWv_z","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
