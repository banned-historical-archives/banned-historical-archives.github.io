script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"西德的极右分子蠢蠢欲动　试图纪念希特勒百岁生日","authors":[],"dates":[{"year":1989,"month":4,"day":15}],"is_range_date":false,"parts":[{"type":"paragraph","text":"西德的极右分子蠢蠢欲动"},{"type":"paragraph","text":"试图纪念希特勒百岁生日"},{"type":"paragraph","text":"本报讯　据德通社报道，联邦德国的警察和安全部门近一时期来密切注视着２．５万名极右分子，尤其是其中１５００名最顽固的新纳粹分子的活动。根据情报部门的预计，４月２０日纳粹头子希特勒的百岁生日时，右翼分子将举行“纪念”活动。"},{"type":"paragraph","text":"据西德安全部门掌握的证据，很多欧洲国家的新纳粹分子和新法西斯分子届时将举行纪念活动。右翼势力的“铁杆”分子扬言要在西班牙集会。"},{"type":"paragraph","text":"在最近的西德地区选举中，右翼势力有所抬头。在法兰克福得票６．６％。"},{"type":"paragraph","text":"这家通讯社还指出，７０年代西德曾出现过一股纪念希特勒的逆流，出版了大量书刊，还发行了电影。目前西德２／３的人对希特勒发动的第二次世界大战的史实毫无记忆，或只有模糊的概念。很多儿童想象“元首”是位“慈善家”。"},{"type":"paragraph","text":"（文）"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"19e0689828"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
