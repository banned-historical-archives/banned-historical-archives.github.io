script><script src="/_next/static/QfxYS2D1Mh-L0DGWGmFwY/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"经过第一阶段三反学习以后交大同学昨日举行大会 控诉资产阶级思想毒害","authors":[],"dates":[{"year":1952,"month":3,"day":5}],"is_range_date":false,"parts":[{"type":"paragraph","text":"【本报讯】　交大同学在经过了第一阶段的三反学习和小组讨论后，同学们都清算了资产阶级的毒害，批判了一些错误看法。"},{"type":"paragraph","text":"昨日下午学生学委会召开了大会典型发言，并邀请了沪江大学许云影同学作报告，帮助了同学更清楚的认识了资产阶级的丑恶本质。学生会秘书长周修文同学听了航二林德宽同学在大会上交代了揩油、小便宜思想和行为后，激动地说:“只有赤裸裸的坦白交代，才能彻底改造自己的思想。想偷偷摸摸的改，是自欺欺人!”"},{"type":"paragraph","text":"最后由学生学委会陈向明同志号召同学迅速自觉坦白交代，投入校内的三反斗争中去。她说:有人以为交大是个“清水衙门”，他们说:“此山无虎”，而事实恰恰说明了:交大不仅有浪费，而贪污也严重存在着。她号召同学组织一支生力军，与工友同志在一起，向贪污、浪费和官僚主义现象猛攻!"},{"type":"paragraph","text":"会后，同学高呼:“向老虎开火，不获全胜，誓不收兵!”“在坦白交代基础上，投入校内外的三反、五反斗争!”"}],"comments":[],"origin":"本报","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"d592babd1d"},"buildId":"QfxYS2D1Mh-L0DGWGmFwY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
