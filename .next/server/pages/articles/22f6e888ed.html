<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/59671cb9865208c3.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/59671cb9865208c3.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-a1090a436b5624ca.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/fec483df-25c632b8c5d6e27e.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-b5ce109a43346fb9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/379-dd1e9c1a08e91076.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/634-ce0d63936c912dc5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-841679bd24d57fc9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-bb22cacba120f558.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"whb","name":"文汇报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"决不再让华尔街用美国青年的生命来换取利润美国广大人民渴望停止朝鲜战争反对资产阶级报纸所谓‘和平恐慌’的荒谬论调","authors":[],"dates":[{"year":1953,"month":4,"day":18}],"is_range_date":false,"parts":[{"type":"paragraph","text":"正当美国人民热烈欢迎朝中方面的和平建议，渴望停止在朝鲜的流血的时候，美国资产阶级报纸企图散布‘和平恐慌’的谬论，把这种新的和平希望形容成一种“令人忧虑”的事情。当然，对于那些靠侵朝战争自肥的华尔街大资本家，朝鲜和平的恢复的确是“令人忧虑”的。根据美国进步工会联合电气、无线电与机器工人工会的统计，从一九五○年六月朝鲜战争爆发至一九五二年年底，美国大公司在纳税前的利润达到一千零七十亿美元，平均每年为四百二十五亿美元，比第二次世界大战期间美国大公司平均每年的利润二百一十五亿美元约多一倍。"},{"type":"paragraph","text":"但是，就在朝中方面提出和平建议的消息传出以后，从事军火、战争物资生产的美国工业以及若干其他工业就掀起了一片跌风；美国市场上的战略物资和受到连带影响的商品价格也发生激烈波动。美国的垄断资本家害怕战争利润减少，因此就害怕和平的恢复，要千方百计地阻挠朝鲜停战的实现。"},{"type":"paragraph","text":"可是，华尔街的这种如意算盘，与美国人民的愿望是毫无共同之处的。美国人民对于美国资产阶级报纸企图把朝中和平建议带来的新的和平希望说成是“令人忧虑”的事情，表示愤怒。四月十日纽约“工人日报”转载别家美国报纸发表的两封具有代表性的读者来信，说明了美国人民的这种情绪。肯塔基州路易斯维尔地方的“信使日报”发表的麦·克林的信指责全国各报经济栏的“和平恐慌”的标题。克林说:“把这种标题用普通的话来解释，就是说:‘我们唯恐我们的年青人不必再在朝鲜送命，因为假使战争停止的话，生意便没有那么好了，同时我们中有些人可能会失业……’这种说法多么令人气愤!”"},{"type":"paragraph","text":"克林驳斥这种说法的荒谬，指出和平才真是符合美国人民的利益的，他说:‘浪费掉的数十百亿的美元可以用在建设性的事情上，这就可以使我们生活在一个较好的国家和世界里面’。"},{"type":"paragraph","text":"这封信在结尾时敦促拯救美国士兵的生命，以慰他们家里人的切望。"},{"type":"paragraph","text":"另一封信是马萨诸塞州斯普林腓特的一个退伍军人考门·史密斯写给“斯普林腓特每日新闻”的。"},{"type":"paragraph","text":"史密斯写道，现在朝鲜和平是比以前任何时候都更为接近了，‘在这样一个时候，本应产生期望与一定程度的乐观情绪，然而，实际的情况却似乎恰恰相反。’他责怪报纸发出悲观论调、华尔街害怕经济萧条和美国最高级官员表示怀疑。"},{"type":"paragraph","text":"他接着描述了美国人民对这个不得人心的朝鲜战争不感兴趣的情况，并说:‘现在正是值得欣慰的时机，因为战争可能快要结束了。不管停战后的情况如何，总比战场上不停地死人好些。’"}],"comments":[],"origin":"","comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"朝鲜战争","type":"主题/事件"},{"name":"工业战线","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"22f6e888ed"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
