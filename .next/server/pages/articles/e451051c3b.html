" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"中央宣传部关于福建江声、福建侨讯两报方针及其他问题的指示","authors":[],"dates":[{"year":1952,"month":7}],"is_range_date":false,"parts":[{"text":"中央宣传部关于福建江声、福建侨讯两报方针及其他问题的指示","type":"title"},{"text":"5月×日、5月××日及6月×日三次来电均悉。关于“江声报”和“福建侨讯”的合并问题和编辑方针问题及关于设立专门机构为华侨报刊统一发稿问题和华侨报刊在国内派驻记者问题，一并答复如下：","type":"paragraph"},{"text":"（一）关于江声报和福建侨讯两报是否合并，同意华东局宣传部5月×日意见，并须经过两报负责人协商，不得勉强。","type":"paragraph"},{"text":"（二）关于两报的编辑方针，除同意华东局宣传部意见外，特补充说明两点：","type":"paragraph"},{"text":"甲、两报应明确以华侨广大阶层（包括工人、学生、贫民、小资产阶级、资产阶级）为对象，而以对他们进行爱国主义教育任务。其内容和形式应使广大华侨易于接受与了解，适合大多数华侨目前的觉悟程度，因而不能要求它们和国内报纸一样，也不能使它们仅仅适合于华侨中的进步分子。两报虽在国内出版，但终究是办给大多数华侨看的，并且是在与国内完全不同的环境中发行的，因之两报言论与国内报纸有所区别，不能也不应该过份刺激敌人。如果以为既是在国内办的就要完全和国内报纸一样，否则就要另办一个不公开的灰色报纸，这样看法是片面的。两报惟有在内容与形式上适应大多数华侨的需要与水平，始能深入华侨群众，并便利扩大发行。","type":"paragraph"},{"text":"乙、两报的主要内容应为介绍祖国在政治、经济、文教、侨乡各方面的建设成就，解说共同纲领和中央人民政府的各项政策（在这方面，两报如何立足本区，照顾全国，我们完全同意华东局宣传部答复）。至于国内阶级斗争和政治运动，如土地改革、镇压反革命、“三反”、“五反”等方面的报道，均应适合华侨需要，也要和国内报纸有所区别。国内报纸的任务是要组织动员广大人民积极参加这些运动或斗争，而对华侨宣传的目的则不是这样，而在于争取广大华侨同情和拥护这些运动或斗争，消除其疑虑和误解，使他们了解祖国的建设事业如何经过这些运动或斗争而向前发展。","type":"paragraph"},{"text":"（三）关于设立专门机构为国外华侨报刊统一发稿问题，现正在研究之中，一俟有所决定，再行电告。","type":"paragraph"},{"text":"（四）关于华侨报刊在国内派驻记者问题，原则上可以允许，但以少派为宜。所派记者应事先填具申请书及记者简历报请中央华侨事务委员会审查批准，再行入境；到达国内后并应依法向相当机关进行登记；其所发稿件应经当地人民政府相当机关审查。爪哇新报原驻厦记者史琛亦应补行登记手续，所发稿件亦应经过审查，过去不加管理的态度是不对的。","type":"paragraph"},{"text":"（五）关于华侨报刊在国内聘请记者问题，亦可允许。应聘记者亦应向相当机关进行登记，所发稿件亦应经过审查，并保证登载时不得修改。","type":"paragraph"}],"comments":[],"origin":"根据文件的翻印件打印","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"指示"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"e451051c3b"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
