script><script src="/_next/static/UsB2sExR9K4GmEL317DgK/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"rmrb","name":"人民日报","internal":false,"official":false,"type":"db","author":"","files":[],"article":{"title":"山西革命造反派纷纷举行集会  声讨反革命修正主义的经济主义罪行  决心粉碎资产阶级反动路线的新反扑","authors":[],"dates":[{"year":1967,"month":1,"day":16}],"is_range_date":false,"parts":[{"type":"paragraph","text":"山西革命造反派纷纷举行集会"},{"type":"paragraph","text":"声讨反革命修正主义的经济主义罪行"},{"type":"paragraph","text":"决心粉碎资产阶级反动路线的新反扑"},{"type":"paragraph","text":"新华社太原十五日电  山西省革命造反派学习了中共中央、国务院、中央军委、中央文革小组给上海革命造反派的贺电后，纷纷揭露和批判反革命修正主义的经济主义的新罪行，决心粉碎资产阶级反动路线的新反扑。"},{"type":"paragraph","text":"山西革命工人决死纵队队员们纷纷开会声讨反革命修正主义的经济主义罪行。队员们说：反革命修正主义的经济主义是一种反动的思潮。在无产阶级文化大革命中，一小撮走资本主义道路的当权派，极少数坚持资产阶级反动路线的人，在他们的反革命阴谋破产后，又耍这个新的花招，运用物质引诱来软化我们革命造反派，瓦解我们的革命斗志，我们革命工人要坚决打垮资产阶级反动路线的新反扑。前些时候，山西省委和省人委一小撮走资本主义道路的当权派，在我们起来造反的时候，他们就用“糖衣炮弹”向我们进攻，要给我们漂亮的白纸，要给我们汽车、摩托车、电话机，还说什么我们要钱可以拿支票。我们革命派的工人，和这种反革命的经济主义进行了不调和的斗争，给了他们有力的还击。我们革命造反派是革命的硬骨头，资产阶级反动路线的新反扑压不倒我们，更激起我们的愤怒。我们革命工人，一定要彻底粉碎反革命修正主义的经济主义和资产阶级反动路线的新反扑，彻底粉碎阶级敌人的进攻，把伟大的无产阶级文化大革命进行到底！"},{"type":"paragraph","text":"山西矿山烈火战斗指挥部的造反派们揭发反革命修正主义的经济主义的罪行时说，一小撮坚持走资本主义道路的当权派，极少数坚持资产阶级反动路线的顽固分子，企图用“糖衣炮弹”软化和腐蚀革命造反派的革命意志，到处发放生活福利补助费、劳动保护费等等。对于这种资产阶级反动路线的新反扑，我们要立即揭露和粉碎他们这种新阴谋，并同它进行坚决的斗争！"}],"comments":[],"comment_pivots":[],"description":"","page_start":1,"page_end":1,"alias":""},"tags":[{"name":"中央文革","type":"人物"},{"name":"山西文革","type":"人物"},{"name":"党内资产阶级","type":"主题/事件"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"fe42bbe7f6"},"buildId":"UsB2sExR9K4GmEL317DgK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
