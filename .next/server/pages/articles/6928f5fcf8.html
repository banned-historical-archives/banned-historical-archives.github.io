<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/419d536fa98cd6d1.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/419d536fa98cd6d1.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-db9242de437f038b.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-5429a50ba5373c56.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-868f592975d6de32.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-d13fb7a4873681d1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/906a09f8-be7e7eff3f71c31c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/738-f5ab1f9c5b203d35.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/771-877b9a59ea9076fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/916-1951d895fefcd5e0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/27-f72f900e757f77f2.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/794-8bf95c189e847826.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/1-280b95eee69e9d61.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/335-dedef31bc79c876c.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/articles/%5Bid%5D-a0e843351c3511f8.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7OZsUMojoSd8vSDc8SClV/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"books":[{"id":"CCRD-shzygz","name":"中国五十年代初中期的政治运动数据库","internal":false,"official":false,"type":"db","author":"宋永毅","files":[""],"article":{"title":"我要揭发，被陷害的修女不只是舒海云","authors":["广慈医院护士","李月华"],"dates":[{"year":1955,"month":9,"day":15}],"is_range_date":false,"parts":[{"text":"我要揭发，被陷害的修女不只是舒海云","type":"title"},{"text":"广慈医院护士李月华","type":"authors"},{"text":"我在十一日的解放日报上，看到了龚品梅反革命集团私设监牢、修女舒海云被囚禁达十个月之久的消息。我相信每一个善良的教友见到了这种无法无天的罪行，都会产生无比的愤怒。现在政府已将反革命分子周葆英逮捕，使舒海云恢复自由，重见天日。我拥护政府逮捕周葆英的正确措施，我为舒海云修女的重见天日而高兴！","type":"paragraph"},{"text":"我曾在重庆南路仁爱会做了十多年的修女，暗藏在教会内的帝国主义分子和反革命分子横行霸道，对有爱国心和有正义感的中国修女的迫害，我是亲身经历过的。解放之后，我思想上有了转变，他们就监视我的行为，不许骨肉至亲、老师朋友来看我。有一次，我读书时的先生来探望我，竟坐了三个钟头，无法见到我。后来我听了反帝爱国运动的消息，怦然心动，他们晓得后硬说我是共产党“危险分子”，把我孤立起来，经常讽刺我、打击我。我受不住他们的无理迫害，毅然离开仁爱会，跳出了他们的魔掌，可是我一直想念着别的被迫害的修女们。我曾亲眼看到好几位中国修女，因为表现了爱国心，敢于反抗他们的无理措施而受到迫害。如一位徐玛加利大嬷嬷在抗日战争时期关心祖国的消息，就被帝国主义分子沙维爱（Savier）以“无圣召”为辞撵出了修会。又如一九四四年在广慈医院工作的一位陈嬷嬷生了病，“大嬷嬷”把她当做一只狗也不如，丢在一边不管，不给她吃药，热度高到四十度，“大嬷嬷”还是心如铁石，视若无睹，不久陈嬷嬷就死去了，当时她只有二十四岁。这不过是随时想起的一两个事例而已。","type":"paragraph"},{"text":"反革命分子周葆英，我们过去一向知道她很凶，但她对“大嬷嬷”帝国主义分子包天真（Ia Porte）却是俯首贴耳、百依百顺的，搬嘴舌，通风报信，既卑鄙又无耻，因而取得了包天真的“宠爱”。当时我们敢怒而不敢言。周葆英嘴巴中镶着只金牙齿，我们就以“金牙齿”作为她的代号，在谈话中一提到“金牙齿”就不言而喻，大家嗤之以鼻，作为我们反抗的一种表现。后来，帝国主义分子包天真把控制修会的“大权”交给了周葆英，于是她如虎添翼愈加无恶不作了。舒海云修女不过对她的蛮横行为表示了一点不满，这个坏蛋就用土匪的手段把舒修女关到他们私设的监牢里去。大家想一想：一位修女为了进会修道，而竟被龚品梅反革命集团折磨到如此地步，是可忍，孰不可忍！在一个以“仁爱”为名的修会内，龚品梅反革命集团分子却干出了这种侵犯人权、惨无人道的事情来，不能不令人发指！龚品梅反革命集团污辱了天主，污辱了圣教会，刺伤了耶稣圣心。亏得现在是人民政府领导，不然的话，舒海云修女将永无出头之日了。我要问问龚品梅反革命集团：舒海云修女有什么罪！你们有什么权力，可以在修会内私设监牢，囚禁她？你们眼中还有天主的诫命和国家的法律吗？","type":"paragraph"},{"text":"我要求政府严惩反革命分子周葆英，严惩龚品梅反革命集团，把他们从我们的教会中彻底清除出去。","type":"paragraph"}],"comments":[],"origin":"《解放日报》1955年9月15日","comment_pivots":[],"description":"","page_start":0,"page_end":0,"alias":""},"tags":[{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"6928f5fcf8"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
