" crossorigin="">{"props":{"pageProps":{"books":[{"id":"maoquanji32","name":"毛泽东全集第32卷","internal":false,"type":"pdf","official":false,"author":"张迪杰","files":["https://raw.githubusercontent.com/banned-historical-archives/banned-historical-archives0/main/maoquanji32.pdf"],"article":{"title":"庆祝和平解放西藏办法的协议签订一周年致达赖、班禅电","alias":"","parts":[{"type":"paragraph","text":"庆祝和平解放西藏办法的协议签订一周年致达赖、班禅电"},{"type":"paragraph","text":"（1952年5月23日）达赖喇嘛、班禅额尔德尼先生："},{"type":"paragraph","text":"感谢你们五月二十三日的来电。值此西藏和平解放周年节日，你们来电表示愿为逐步彻底实现《关于和平解放西藏办法的协议》而努力，极为欣慰。我庆祝你们和全体西藏人民更加亲密团结起来，与全国各兄弟民族人民，同心协力，建设我们伟大的祖国和繁荣幸福的新西藏，并庆祝你们的成功和健康！"},{"type":"paragraph","text":"毛泽东"},{"type":"paragraph","text":"五月二十三日"},{"type":"paragraph","text":"[1]达赖，即达赖喇嘛·丹增嘉措；班禅，即班禅额尔德尼·确吉坚赞，均为西藏宗教领袖。"}],"authors":["毛泽东"],"dates":[{"year":1952,"month":5,"day":23}],"is_range_date":false,"comments":[],"comment_pivots":[],"description":"","page_start":119,"page_end":119},"tags":[{"name":"毛泽东","type":"人物"},{"type":"文稿类型","name":"文章"}]}]},"__N_SSG":true},"page":"/articles/[id]","query":{"id":"2ef3bf40b1"},"buildId":"7OZsUMojoSd8vSDc8SClV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
